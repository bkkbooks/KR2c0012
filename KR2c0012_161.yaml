  text: 欽定四庫全書平定準噶爾方略續編卷二十二
  hash: sha256:c0449ce7f2785bdfbd491d011a39e44e41f62573043d4d0691ba7679b2fc876f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_161-1a, image: WYG0359/WYG0359-0802a.png}
body:
  text: 乾隆二十八年六月庚寅命議敘陞賞葉爾羌辦事尚書都統新柱等新柱等奏言臣等前遣伯克薩里等前往拔達克山索取搶掠齊特喇爾户口什物五月初七日據報三月初四日抵拔達克山將飭交素勒坦沙文書傅示素勒坦沙告稱從前與鄰部多有爭鬭之事自為大皇帝臣僕因得安靜至齊特喇爾原係我先世舊游牧今將軍大臣等既不准我管轄即遵飭將我弟沙卜多爾噶達爾撤回將該地方户口什物查還旋據素勒坦沙將户口牛羊什物盡行查出并派伊所屬伯克海蘭達爾等前往博洛爾逐一交還奏入上諭軍機大臣曰新柱等奏稱伯克薩里等往諭拔達克山素勒坦沙即凜遵約束將伊弟從齊特喇爾撤回其所掠人口牲隻什物俱查明交還等語新柱額敏和卓辦理妥協著交部議敘仍賞大小荷包一對鼻烟壺各一枚薩里阿布拉三甚屬効力薩里著賞三等輕車都尉世職阿竒木缺出列名請補仍賞緞六端阿布拉三於應陞處列名仍賞緞三端素勒坦沙甚屬恭順著先賞大小荷包鼻烟壺仍將葉爾羌庫貯之緞賞給十二端並傳朕嘉悦施恩之意令其知悉辛卯諭葉爾羌辦事大臣等更換駐劄事宜上諭軍機大臣曰前派額爾景額更換新柱回京適新柱有遣使拔達克山一事因傳諭令其稍待今素勒坦沙既獻波羅泥都屍骸及其妻子又查還齊特喇爾土地户口是事已完竣新柱俟額爾景額抵葉爾羌即起程回京再額敏和卓駐劄年久已派玉素富前往更換亦因拔達克山之事暫留令玉素富在阿克蘇辦事此時額敏和卓亦應起程但額爾景額甫經受事額敏和卓仍留住三月再行文玉素富赴葉爾羌更換俱著傳諭知之癸巳命鑄給伊犂四昻吉總管佐領等闗防鈐記上諭軍機大臣曰明瑞等奏現在伊犂駐防及陸續添駐之索倫察哈爾厄魯特兵丁分為四昻吉毎昻吉設總管一員佐領六員應照例鑄給闗防鈐記以昭信守謹擬定字樣請㫖等語著交該部照明瑞所定字樣兼清漢托忒回字成造闗防鈐記頒發伊犂將軍明瑞等疏奏回城换班官兵道路程期明瑞等奏言查軍機處議覆新柱等所奏回城駐劄兵丁換班之期計正月初自京起程四月至哈密六月可抵葉爾羌等城查四月間哈密水草始生相距數千里斷不能六月即至明瑞去年曾領伊犂換班兵丁向巴里坤行走請交令㑹議具奏等語臣等查自哈密經由闢展阿克蘇至葉爾羌等處地多戈壁是以去年換班兵丁由巴里坤朱爾都斯一路水草日漸豐美可以牧放牲隻緩程前進不必冒暑遄行而撤回兵丁係冬季起程雖行戈壁正當雪盛不患無水亦於人馬有益奏入報聞癸卯議酌量移派哈喇沙爾兵丁事宜軍機大臣奏言欽奉諭㫖哈喇沙爾屯田較少現在綠旗兵何以仍有八百名臣等查乾隆二十七年永貴奏定回城綠旗兵於哈喇沙爾議以東至闢展西至庫車相距千里又有魯克察克吐魯番喀喇和卓托克三庫爾勒玉古爾等城回人居住供應往來差務請將該處原有兵丁仍舊存留當經臣等覆准但該城差務雖繁而近來辦理已有章程所留兵丁自可量為裁撤派往烏魯木齊屯田其實應留駐若干令達桑阿酌量辦理奏入報聞丙午以乾清門二等侍衛舒常等䕶送霍罕使人任意自便命降等示罰有差上諭軍機大臣曰納世通奏稱乾清門侍衛舒常鄂蘭䕶送霍罕額爾德尼伯克使人行走並不照管同行於數日前先已起程致來使所僱車役潛逃請將舒常等交部嚴加議處等語所奏甚是舒常鄂蘭係乾清門行走之員特派前往加意照看外藩使人乃任意自便先期行走以致夫役潛逃成何體制舒常著降為三等侍衛鄂蘭著降為藍翎侍衛不准在乾清門行走應更換時著再留一年乙卯命更調喀什噶爾等城辦事之總兵侍衛等上諭軍機大臣曰永貴等奏稱喀什噶爾為總辦回部事務之地向係拕穆齊圖辦理續調英噶薩爾總兵額僧額協辦今拕穆齊圖進京惟額僧額一人辦事而奉派總兵台布恐不如額僧額之熟悉請即調赴英噶薩爾辦事又駐劄賽里木拜之原任察哈爾總管衮布策凌不甚諳練請將英噶薩爾侍衛伊凌阿調往辦事等語額僧額著仍駐喀什噶爾辦事台布著調往英噶薩爾辦事伊凌阿著調往賽里木拜辦事秋七月丁巳命留凉州莊浪官兵滋生銀兩於本處備賞上諭軍機大臣曰明瑞奏凉州莊浪移駐伊犂官兵仍領滋生紅白賞銀一摺現在移駐官兵籌辦業已豐裕毋庸再議賞給今西安官兵陸續移駐凉州莊浪著傳諭楊應琚將此項滋生銀兩留存該處俟官兵等移駐凉州莊浪後即作伊等紅白賞賚之用己未諭闢展辦事郎中徳爾格等查辦餘糧出糶事宜上諭軍機大臣曰據德爾格奏稱闢展屯田所收穀石自二十六年十一月起至本年三月止共糶銀二萬八千兩有竒本年六月又糶銀一萬二千三百兩有竒已歸入正項動撥等語闢展屯田收穫支給官兵外仍節次盈餘至四萬餘兩辦理甚善若增兵開墾糶價充公可省内地解費殊為有益但該處屯田無多又經裁撤兵丁何以有餘若此著傳諭德爾格所餘榖石作何出糶之法收穫再多俱能如此出糶否派兵增墾尚可容若干人即查明具奏再烏魯木齊屯田多而商賈衆哈喇沙爾亦有屯田若能照闢展出糶更善併傳諭旌額理達桑阿知之命以伯克薩里為阿克蘇伊沙噶伯克上諭軍機大臣曰新柱等奏稱伯克薩里此次前往拔達克山索取齊特喇爾地土人户甚屬奮勉現在阿克蘇伊沙噶伯克頗拉特解任請以薩里補授其隨往之阿布拉三亦請賞給緞疋等語新柱等昨將拔達克山遵檄送還侵掠一事具奏已賞給薩里世職阿布拉三緞疋薩里著照所請補授阿克蘇伊沙噶伯克阿布拉三仍遵㫖記名陞用命奬諭抜達克山素勒坦沙並准博洛爾使人入覲上諭軍機大臣曰新柱等奏稱往諭拔達克山素勒坦沙即將所掠齊特喇爾土地户口什物俱已交還但從前强詞飾辨仍有應得之罪現將來使暫留葉爾羌候㫖遵行再博洛爾頭目沙瑚沙黙特因所屬復還故地感激天恩遣使奏謝可否准其入覲等語素勒坦沙因大臣等檄責强詞飾辨乃外藩初附未諳體制及薩里往諭即凜遵約束尚屬恭順不必深究昨已加恩賞賜即著來使齎回至沙瑚沙黙特遣使謝恩著准其隨同本年輪班入覲之伯克等前來俱著傳諭知之庚申以䕶軍㕘領宗室松年騷擾驛站命革職於肅州永逺圏禁上諭大學士曰據楊應琚等奏平凉等州縣稟報䕶軍㕘領宗室松年沿途需索銀兩不遂踢傷管號家人等語松年由新疆奉差回程輒敢騷擾驛站到處需索并踢打州縣家人賒欠紬緞價値種種肆行無忌殊屬不堪該督撫據實㕘奏即將松年留肅候㫖所辦甚是松年著革職此等不法之員本應永逺枷號示衆但宗室向無枷號之例著即在肅州永逺圏禁不得令其出入凡有一切差遣過肅官員即令往視并曉諭伊等松年沿途騷擾勒索因係宗室僅予革職圏禁若常人有似此者定行永逺枷禁俾往來奉差人員觸目警心共知省惕癸亥申諭伊犂將軍明瑞等嚴禁外藩越境游牧上諭軍機大臣曰據永貴等奏稱住居吹地烏瓦克部落之阿哈拉克齊雅納什拜年近七十率伊子愛圖干等告稱向未經行回地因向慕天朝威德幸及此身尚存特來瞻仰并呈獻馬匹已賞緞遣回等語吹塔拉斯沙喇擘勒俱在伊犂以西此吹地未知即附近塔拉斯之吹否若果即其地原係厄魯特游牧我師平定準夷後駐兵伊犂恐地方遼濶或有右哈薩克布魯特潛來厄魯特境内游牧亦未可定前阿桂明瑞等於塔爾巴噶台等處雖加意巡查其吹阿勒和碩尚未前往著傳諭明瑞等酌派人員率同熟諳地理之厄魯特前往吹塔拉斯阿勒和碩沙喇擘勒等處巡查若哈薩克布魯特等仍有越境游牧者即曉示該頭目速行驅逐不可令伊等䦨入内地甲戌命查詢内地及回部存留厄魯特婦女願售者送往伊犂上諭軍機大臣曰明瑞等奏稱從哈薩克投來伊犂之厄魯特壯丁六百餘名並無妻室現在察哈爾厄魯特等婦女甚少若將内地綠旗兵等俘獲售買及回地所有婦女等贖出順便送往伊犂可以酌量給配等語伊犂厄魯特等已編設昻吉佐領若壯丁多係鰥居非長久之道著𫝊諭楊應琚除内地綠旗兵等所得厄魯特婦女已經匹配外其但供役使者如年少方壯酌量擇取給價贖出送往伊犂即或已經匹配情願轉售亦聽其便毋得稍涉勉强至回部厄魯特婦女頗多從前阿桂等雖行文各城給價贖取並未視為要務并著傳諭駐劄大臣與該伯克等㑹商加意辦理辛已陜甘總督楊應琚疏奏挈眷移駐烏魯木齊兵丁起程日期楊應琚奏言查烏魯木齊應駐挈眷兵丁四千名除現在移駐一千八百餘名尚須兵二千一百餘名業經移行陜甘提鎮查詢派撥又准旌額理咨所造兵房一千二百間七月内可竣足敷居住臣復行查詢據甘肅提標及凉肅二鎮所屬挈眷兵丁及家口共六百五十餘名先後抵肅於本月初十日起程其續行查送者俱照例辦理奏入報聞癸未諭伊犂將軍明瑞等巡查特穆爾圖淖爾事宜上諭軍機大臣曰據圖爾炳阿等奏稱布魯特人等帶有馬匹羊隻前來烏什貿易内有哈薩克三人告稱原在西喇蘇游牧今移於楚穆訥爾等語看來哈薩克等同布魯特來烏什貿易恐伊等至特穆爾圖淖爾游牧昨諭明瑞等派員前往伊犂以西吹塔拉斯等處巡查若有哈薩克布魯特等偷越游牧即行驅逐今特穆爾圖淖爾亦應一體巡查至此次貿易哈薩克等所移之地是否厄魯特界内亦著查詢具奏甲申喀什噶爾辦事尚書都統永貴等疏奏各城派往伊犂屯田回人足額情形永貴等奏言查續派各城回人往伊犂屯田一事臣等於各城詢問選擇約以一千五百名為率阿克蘇迤西委伯克木薩迤東委鄂寶達桑阿酌量辦理計將應派十二城回人彚齊查核已滿額數所有給與口糧行裝各事宜臣等續行定議具奏奏入報聞八月庚寅伊犂將軍明瑞等疏奏巡查塔爾巴噶台起程日期明瑞等奏言前奏塔爾巴噶台駐兵一事先行驅逐越境之哈薩克因就便勘定駐劄地方及安設卡倫處所續奉諭㫖暫停辦理惟於來年秋季領兵巡査榜示曉諭本年三月因有移駐凉州莊浪兵丁一事改議俟駐防事竣約於後年遷移駐劄伏思塔爾巴噶台駐兵雖暫緩其期仍須先為辦理來年建造城房工程及安插挈眷兵丁恐無閒暇此時正値秋高馬肥臣明瑞臣愛隆阿於七月十七日帶滿洲䝉古兵丁五百名令領隊大臣鄂津等隨往學習將從前阿桂所定塔爾巴噶台駐兵設卡倫之處詳加勘驗即有越境之哈薩克等亦可量為驅逐其沙喇擘勒特穆爾圖淖爾等處來春令伊勒圖前往巡查現在酌將印務交伊勒圖䕶理奏入報聞辛卯葉爾羌辦事尚書都統新柱等疏奏回城餘錢收買棉花事宜新柱等奏言臣等前奏請將葉爾羌和闐二城餘糧以八分作價換易紡絲布疋以二分折錢購買馬匹牲隻續奉諭㫖停止購買回人馬匹所折錢文似應流通行使臣等公議現在駐防伊犂挈眷兵丁陸續前往雖有換易布疋而棉花尤足供禦寒之用據伊犂阿竒木伯克木薩告稱伊犂曾經試種棉花土性不宜等語臣等與葉爾羌阿竒木伯克鄂對商令購買回人棉花即動用折糧錢文據稱於回人生計有益查二城折糧錢文共八千騰格有竒除購買和闐金兩外仍有七千餘騰格棉花每觔價錢十二文可得三萬餘觔其二城應交正項錢文支給官兵鹽菜一應差務之餘亦購買棉花運送伊犂則錢法流通而兵丁回人衣食亦有裨益奏入報聞壬辰諭喀什噶爾辦事尚書都統永貴等辦理哈薩克與回人貿易事宜上諭軍機大臣曰永貴等奏稱哈薩克阿布賚遣使獻馬其自帶馬九十餘匹已准令貿易等語哈薩克前在伊犂烏魯木齊往來並未至回地貿易且伊等至喀什噶爾必由布魯特等部落經過沿途頗有賊盜茍非貪圖重利焉肯前往現在伊犂等處貿易上等馬匹僅估價銀三四兩而回地則加倍有餘往來日久不但伊犂等處貿易大減亦恐滋生事端但阿布賚素稱恭順此次既經准其貿易嗣後伊等再來必禁絶回人私市但從官買較之伊犂等處價値更減不可稍令獲利伊即欲帶回亦聽其便仍曉示來人以爾等從前並未來回地貿易况回地亦無須多購馬匹其各項牲隻自有拔達克山安集延布魯特等處商販爾等不必前來如此則貿易不得便宜伊等自不肯逺赴並將此傳諭伊犂烏魯木齊駐劄將軍大臣等知之癸未烏魯木齊辦事副都統侍郎旌額理等疏奏增築城工告竣請㫖頒賜嘉名旌額理等奏言烏魯木齊所築二城六堡荷䝉欽定嘉名並准軍機處兼書滿漢䝉古回部字體臣等刋牓懸掛兹因駐劄舊城初係土堡周圍一里六分現在街市房屋漸加稠密擬將城垣加高一丈六尺厚一丈添建四門八月内即可告竣再特訥格爾新開屯田建造營房一千二百間築城一座規制相仿計至冬初亦可竣事仰懇照從前城堡之例賜以嘉名奏入報聞尋欽定烏魯木齊城曰迪化城東門曰惠孚西門曰豐慶南門曰肇阜北門曰憬惠特訥格爾城曰阜康城東門曰綏惠西門曰振威南門曰麗陽北門曰寧朔己亥陜甘總督楊應琚疏奏增墾巴里坤地畝情形楊應琚奏言前因巴里坤地土廣衍水泉敷裕請飭該同知於現在屯田之外召募開墾荷蒙俞允隨據同知佟禄陸續開報商民認墾之地共八千二百餘畝俱照水田之例六年陞科嗣後廣為勸墾務期田野日闢户口倍增以仰副聖主區畫新疆足食裕民之意奏入報聞辛亥散秩大臣伍彌泰疏奏晶河等三屯築堡告竣請㫖頒賜嘉名伍彌泰奏言上年阿思哈奏晶河有舊堡一座計房一百七十餘間業經修理庫爾喀喇烏蘇瑪納斯所修官兵駐劄營房一百餘間亦已告竣伏思現在屯田處所俱屬伊犂烏魯木齊要路今該處商人等陸續前來居人漸密可否照伊犂等處之例將庫爾喀喇烏蘇等三處增修堡座計庫爾喀喇烏蘇一堡四門晶河瑪納斯皆一堡三門仰懇恩賜嘉名以垂久逺奏入報聞尋欽定庫爾喀喇烏蘇曰綏來堡四門東曰延和西曰迎顥南曰調薰兆曰溥信晶河曰豐潤堡三門曰咸寧曰同軌曰景風瑪納斯曰遂成堡三門曰即敘曰迪康曰覃化壬子諭副都統素誠等辦理屯田回人事宜上諭軍機大臣曰據素誠奏稱烏什派出伊犂屯田回人二百户其應給口糧牲隻已向阿卜都拉籌辦來年二月可抵伊犂等語從前各城伯克頭目等因協助屯田回人俱加恩賞賚此次派往伊犂回人頗衆該伯克等既照例協助自應一體辦理若每次必候㫖遵行頗覺繁瑣著傳諭素誠等即照例分别賞給仍通諭駐劄回部各大臣嗣後有似此協助之舉一面奏聞一面賞給不必仍前候㫖九月丁巳命賞布魯特阿瓦勒比四品頂帶上諭軍機大臣曰永貴等奏稱回地水草不宜游牧因布魯特阿瓦勒比情願移於該部落派人照管伊復親身督率辦理已量給伊屬人羊隻茶封阿瓦勒比甚屬奮勉可否加賞頂帶等語阿瓦勒比夙著恭順兹復照管牧羣俾得蕃息甚屬可嘉著加恩賞給四品頂帶以示鼓勵壬戌陜甘總督楊應琚疏奏酌撥挈眷兵丁馬匹及起程日期楊應琚奏言陜甘各標營挈眷駐劄烏魯木齊兵丁俱應隨帶馬匹恐長途多費請於烏魯木齊貿易馬匹内撥給其存營馬匹又可住支草料擇厰牧放撥補缺額嗣後再有移駐兵丁俱照例辦理至本年派往挈眷兵丁五百餘名合計家口一千餘名俱於八月十六日以前全數起程奏入報聞甲子伊犂副都都伊勒圖疏奏添辦布疋事宜伊勒圖奏言准新柱等咨伊犂挈眷之滿洲索倫察哈爾等人口甚多布疋棉花俱日用所必需請將葉爾羌折糧錢文採買棉花三萬餘觔解送等語查現在駐劄伊犂滿洲綠旗官兵各有原來衣被三年内尚可不須添補其索倫察哈爾兵丁多用皮衣是伊犂現在須棉無幾而與哈薩克貿易及修補兵丁衣服所用布疋甚多請將回城折糧錢文暫買棉花數千觔其餘盡買布疋尤為適用將來必須棉花之時又可酌量通融辦理奏入報聞丙寅命議敘承辦錢法之同知圖桑阿等上諭軍機大臣曰新柱等奏稱承辦葉爾羌鼓鑄錢文之同知圖桑阿千總戴鵬等自乾隆二十五年設立鑄局以來辦理頗屬勤慎等語圖桑阿等承辦鼔鑄錢文已閱三載現届撤回著加恩交部議敘戊寅議科卜多屯田増派綠旗兵丁工匠事宜定邊左副將軍成衮扎布奏言扎拉豐阿報稱科卜多地土頗肥但䝉古等未諳耕墾若添派綠旗兵一百名木石鐵匠數人於現在修補農具將來建造城垣房屋俱有裨益奏入得㫖軍機大臣議奏尋議科卜多屯田已派喀爾喀兵一百名綠旗兵一百名今既試有成效若添派綠旗兵自屬有益臣等酌於烏里雅蘇台綠旗兵二百名内派撥一百名資送既便亦可無悞農時其缺額即以喀爾喀兵丁充補再所需工匠亦即在該處酌派奏入上從之己卯命賞給原任布政使亢保道員職銜前往哈密辦事更換三寳回京癸未烏魯木齊辦事副都統侍郎旌額理等疏奏呼圖畢屯田事宜旌額理等奏言臣於上年十月奏派兵丁二百名在特訥格爾伐木備造房屋一千二百間本年七月告竣合計三城六堡所造兵房四千八百間僅敷兵丁二千四百餘名居住其陸續挈眷兵丁約六百名仍需造房一千二百間查羅克倫以西地名呼圖畢田畝廣濶河水充裕木植亦多約可駐兵二千名相其形勢東至寧邊城七十一里西至瑪納斯一百三十五里為哈薩克往來要路臣等酌於本年冬季砍伐木植計足工料運至造房處所將羅克倫換班兵丁六百名移於呼圖畢屯田所需農具籽種口糧亦請於冬間運往俟房屋工成即趲築城垣庶屯田兵丁三千名聲勢聯絡且多留地畝備給召募民人不致兵民㕘雜似屬有益奏入得㫖如所請行平定準噶爾方略續編卷二十二
