body:
  text: 乾隆二十年夏六月戊午定北將軍班第等疏奏追擒達瓦齊情形班第等奏言達瓦齊逃竄後臣等由兩路哨探兵內派參贊大臣青滚雜卜等相繼分路追擒復派參贊大臣阿蘭泰等帶兵由别路堵禦青滚雜卜等至達瓦齊遊牧處將伊妻叔家口及喇嘛等六千餘人並遊牧附近人等俱行收獲達爾黨阿等追逐達瓦齊至奎魯克嶺見達瓦齊已入布魯特境內我兵馬匹俱乏口糧不繼旋經撤回看得奎魯克嶺外有通回子城及布魯特部落之路達瓦齊亡命遁走或入布魯特之境或向回子城或在偏僻處所藏匿俱未可定隨派親王䇿凌烏巴什等帶兵八百名前往偵探仍選侍衛台吉等向回子布魯特各處曉諭利害令擒達瓦齊來獻投誠人等恭宣聖旨善為安撫其有遊牧較遠尚未來降如伯什阿噶什等台吉古爾班和卓並大小宰桑得木齊等俱遣人分路前往招服此次收獲達瓦齊遊牧時其新降無知之厄魯特兵丁不無竊掠財物之事而達瓦齊所屬人內亦有乘間互行搶奪者臣等一面遣人查明給還原物一面遍行曉諭衆部落之鄂拓克嚴行禁止再達瓦齊之叔班株爾帶領伊子來降人甚庸懦今雖來降終係賊黨應否免其治罪量給人十户資其養贍出自聖恩其助達瓦齊為虐之宰桑衮布吞圖布並皆擒獲衮布患病身故吞圖布現在看守其餘恩克博羅特等亦已遣人往拿奏入上諭軍機大臣曰班第等奏稱達爾黨阿䇿布登扎布等追擒達瓦齊至奎魯克嶺見其已入布魯特境內現在遣人曉諭利害令其擒獻等語此次進兵無折矢遺鏃之勞衆俱降服不應使達瓦齊反得逃遁大兵追賊至切近之時誠能奮勇前進自必就擒何至令其兔脫此係官兵不能鼓勇所致乃謂因中途馬乏撤回獨不思達瓦齊脫逃時伊之馬匹盡能不乏乎若論伊等不能極力追捕即應治罪但念平定伊犁伊等與有勞績姑從寬免著傳諭班第阿睦爾撒納薩喇爾等務將達瓦齊擒獲此時達瓦齊或藏匿山林或遁入回子部落皆易於搜獲阿蘭泰額爾登額等既豫先領兵堵禦或即將達瓦齊擒獲亦未可定如果逺逃至布魯特地方班第等遣人索取務應詞嚴義正責其擒獻斷不可少示怯懦之形使布魯特不以為事仍將派出之人奏聞再我大兵深入甫定伊犁理應示以寬仁慰撫新降人衆今厄魯特兵丁等妄行搶掠大干法紀將軍等即應嚴行查拿治以軍法以示警戒乃僅傳檄禁止伊等安知畏懼但事屬既往姑毋庸深究著班第阿睦爾撒納薩喇爾等留心體察如有似此者嚴加懲治毋得稍事姑息定北將軍班第等疏奏派定厄魯特王公及投誠台吉宰桑等分班入覲班第等奏言臣等前奉諭旨將應令入覲之台吉宰桑等派定起程并將人數職名於何時起程何時可到之處豫行奏聞臣等伏思現今大功告成所有入覲人等即應派定及早起程但達瓦齊尚未拿獲新降人內有誠心歸順者亦有畏懼兵威懾服者人心尚在未定且哈薩克及布魯特各部落諸事尚未全竣其防守地方約束兵丁應酌留大員經理臣等公同酌議派親王䇿凌䇿凌烏巴什訥默庫等同去年未經入覲之親王班珠爾等五人前赴熱河入覲其都爾伯特貝勒剛多爾濟及䇿凌孟克等暫留管轄兵丁新降之台吉宰桑內量其能辦事如台吉唐古特察滚及散秩大臣阿巴噶斯宰桑約蘇圖等留營辦事其餘品級較大形迹可疑如噶爾藏多爾濟等台吉十員厄爾錐音等宰桑十三員作為第一起派親王策凌及郡王扎拉豐阿帶領起程其第二起派親王班珠爾等及阿睦爾撒納之兄台吉伊什丹津等十二人並宰桑噶都爾等十三人令參贊大臣阿蘭泰帶領起程向後伯什阿哈什等大台吉若能趕至臣等亦令起程附入第二起前進如日久不到俟明年令其入覲現在第一起人等於六月初旬起程九月下旬可至熱河第三起人等於六月二十內起程中途略加趲行亦可與第一起一同前至熱河瞻仰天顔奏入上諭軍機大臣曰班第等將今年應來入覲之台吉宰桑等列名具奏朕交軍機大臣查核有從前未經具奏之人現在派出亦有從前奏聞經朕加恩賞給爵秩之人未經派出者再朕曾特行降旨令其前來之霍集占烏爾古勒濟勒約蘇圖喀喇巴圖魯阿玉錫等二十五人俱未列入單內著傳諭班第等此次未曾派出入覲人員共有若干此外新降之人又有若干明年能全令來京與否如果不能再分作兩年以次入覲詳悉奏聞再摺內所稱品級較大形迹可疑之人俱已派出前來並著詢問班第所謂可疑者幾人其如何可疑之處遇便亦即奏聞定北將軍班第密奏阿睦爾撒納情形班第奏言五月二十二日奉到諭旨因阿睦爾撒納前請籌辦接濟兵丁口糧事宜奉旨訓示實明見其肺腑臣加意慎密不露形迹凡事仍公同商酌冀其默化惟額駙色布騰巴爾珠爾不免墮其術中於臣所行之事每多阻止以順其意阿睦爾撒納漸至相習無忌又與薩喇爾瑪木特俱不和睦每事與薩喇爾抵牾一切要務並不上緊辦理以致遲誤臣自到伊等隊內竭力調劑惟仰藉聖主威福成就大事今阿睦爾撒納漸成驕縱又利欲薰心伊所屬人等沿途搶奪有經首告者並不懲治且自言不能禁止經臣屢加提警始將遊牧內彼此搶奪之處曉諭查禁臣惟有欽遵諭旨盡心竭力與鄂容安密商協力共濟奏入得旨仍照朕從前所降諭旨令其速回但此旨一到即行催促又致易生疑懼諸凡惟在汝持重辦理諒伊亦不敢滋事也己未叛犯羅卜藏丹津巴朗孟克特穆爾等解送至京遣官告祭太廟社稷諭定西將軍永常籌辦撤兵事宜上諭軍機大臣曰永常議奏撤回兵丁摺內稱哲里木兵丁及各處兵丁編作行隊至嘉峪關肅州分隊遣回又稱哲里木兵丁若自烏魯木齊赴博羅塔拉由阿爾台一路遣回稍覺紆回不若令其回至巴里坤由北路順便遣回等語永常此奏前後矛盾殊不可解哲里木兵丁回至巴里坤時即由近日策凌等所走阿濟必濟等處遣回遊牧甚覺便捷著永常即照此辦理但伊摺內既稱至嘉峪關肅州分隊遣回又云至巴里坤由北路遣回究竟作何行走著永常即速奏聞再緑旗兵丁不必存留莽阿納帶往健鋭營滿洲兵一千名令駐劄巴里坤朕已降旨即遵照前旨行其哨探隊內兵丁俟薩喇爾辦理外所有别項兵丁著照伊所奏俟薩喇爾等移咨撤兵時即行辦理庚申上御午門樓行受俘禮巴朗孟克特穆爾命刑部即行正法羅卜藏丹津交軍機大臣等審訊命議處郡王青滚雜卜追擒巴朗不力罪上諭軍機大臣曰上年巴朗逃遁策楞等派兵令青滚雜卜努三等前往追擒在和通鄂博堵截後聞巴朗等由額林哈畢爾噶遁走即行撤回今審訊巴朗原係由哈卜塔克拜塔克逃去青滚雜卜努三等領兵在彼並不能實力追擒均屬不合努三已經治罪青滚雜卜並著交部議處辛酉命定邊右副將軍薩喇爾領兵赴布魯特部落追擒達瓦齊上諭軍機大臣曰班第等拿獲達瓦齊宰桑策凌多爾濟等訊問口供知達瓦齊現逃往布魯特境內我大兵深入平定伊犁阿睦爾撒納薩喇爾等若果輕騎掩襲達瓦齊即可擒獲乃將軍等因伊犁既定稍覺大意以致達瓦齊脫逃伊等原奏內稱達瓦齊帶領百餘人逃遁今又稱帶領千餘人其脫逃日期前後亦不相符此時務須併力擒獲現在班珠爾阿蘭泰等領兵追擒尚未回營若果已為班珠爾等擒獲甚善倘尚未擒獲達瓦齊必已入布魯特班第等量已遵朕旨遣人曉諭索取布魯特遵諭擒獻則已如不即日擒獻大兵現集伊犁即著副將軍薩喇爾帶領精兵數千名至布魯特邊界駐劄以振聲威揀選強幹人員遣往布魯特剴切曉諭如敢稍為觀望即進兵擊取務期擒獲達瓦齊此事關係甚要斷不可再失機會薩喇爾宜加意奮勉不得稍有怠忽班第阿睦爾撒納暫駐伊犁辦理事務仍將薩喇爾進兵情形隨時速奏又諭曰班第等奏稱擒獲達瓦齊宰桑策凌多爾濟摩羅等請旨作何辦理等語策凌多爾濟摩羅皆被獲之人並非誠心歸順雖不應施恩亦可無庸治罪將來似此者尚多著班第等仍將䇿凌多爾濟摩羅留於原遊牧處居住伊等若有管轄之人亦即查明給與四品總管職銜仍著伊等管轄定北將軍班第等疏奏撤兵事宜班第等奏言準噶爾全部平定遵奉諭旨令臣等籌議撤兵事宜臣等伏思達瓦齊尚未擒獲其路逺之大鄂拓克宰桑尚有未經投降者數人再將略有可疑之台吉宰桑等派入第一起甫經起程入覲若將大兵全行撤回殊有關係臣等公議將已至伊犁兵丁暫令駐劄其後隊續到兵丁內有未抵博羅塔拉者全行遣回其已抵博羅塔拉者即在彼處牧放馬匹暫行存留再西路應行遣回之索倫巴爾虎察哈爾各扎薩克蒙古兵丁若令與北路一併同行則沿途水草恐有不敷且伊等前來時牲隻行李等項俱留於巴里坤今應仍令伊等由額林哈畢爾噶至巴里坤向阿濟必濟卡倫邊外行走各回遊牧其辦理接濟西路兵丁口糧現咨薩喇爾并將軍永常於現運茶封內酌量接濟其北路續到之兵原領口糧三個月臣等酌議所有未至額爾齊斯即行撤回之兵應毋庸再給口糧如已過額爾齊斯自察罕呼濟爾等處撤回者三人合給牛一頭若已至博羅塔拉等處撤回者二人合給牛一頭以資接濟奏入報聞定北將軍班第疏奏派兵招服烏梁海事宜班第奏言和托輝特郡王青滚雜卜遵旨領兵收服汗哈屯等處居住烏梁海人等與額駙色布騰巴爾珠爾定期於五月二十六日起程據阿睦爾撒納告稱不必令青滚雜卜前往惟遣使將凖噶爾全部底定曉諭伊等自必歸降領兵前去轉恐畏懼逃避是以暫令青滚雜卜停止起程及商議遣使前往阿睦爾撒納派出新降宰桑圖布慎并伊屬下舊在烏梁海處之達巴霍爾又囑令烏梁海宰桑等前赴伊犁俟見伊之後再由此入覲臣思烏梁海等從前未經歸降不過觀望準噶爾情形今準噶爾業已底定烏梁海等可毋庸加兵自然歸順此理勢所必然但觀阿睦爾撒納之意深欲要結烏梁海且歸功於已是以臣仍令青滚雜卜前往并告以此次帶兵收服原係回途乘便並無勞費如恐烏梁海等畏懼祗於兵到之先遣人剴切曉諭伊等來降即行安慰拊循其未降順者再進兵收服至新降宰桑等即由彼處就抵烏里雅蘇台赴京入覲不致遲延時日毋庸令其前赴伊犁更為妥協奏入上諭軍機大臣曰據班第密奏阿睦爾撒納不欲遣青滚雜卜招降汗哈屯居住之烏梁海等惟派令新投宰桑圖布慎等曉諭招降班第未經允從仍遵前旨辦理等語甚屬持正得體從前曾疑阿睦爾撒納有希冀僥幸之心今觀此事阿睦爾撒納雖萌妄念班第能果斷定奪阿睦爾撒納亦並不敢有異詞似此遵行當亦無可疑慮嗣後班第惟凡事據理直行逆折其計阿睦爾撒納雖有私心班第若將正言開示料伊亦不敢故違伊係狡黠之人若過於防維日久必露形迹轉覺於事無益著密諭班第知之命免準噶爾人等本年貢賦上諭軍機大臣曰準噶爾全部底定理應加恩撫綏除各台吉屬下應征貢賦皆台吉等自行辦理毋庸另議其無台吉之宰桑等所轄人等貢賦前此諒必俱向達瓦齊交納如舊日所存尚多足敷養贍喇嘛之用著將今年伊等貢賦概行寬免若不敷用祗將養贍喇嘛之數徵收其餘即行寬免將此通行曉諭準噶爾人等仍交班第等將準噶爾人等每年應交貢賦數目多寡自明年為始令如何交納之處查議具奏壬戌命免治羅卜藏丹津罪上諭軍機大臣曰羅卜藏丹津背恩叛逃理應從重治罪但伊入準噶爾年久又率伊二子迎接大兵隨同前進朕特施恩將羅卜藏丹津父子免其死罪羅卜藏丹津著留京賞給房屋一所居住不許擅出伊二子著入正黃旗蒙古旗分授為藍翎侍衛在司轡上行走並著班第等查明羅卜藏丹津家屬及所屬二十戶不必遷移仍令在原處居住羅卜藏丹津二子於此處另行賞給妻室命查明噶爾丹䇿零所屬户口數目並加恩茂海策凌等子姓上諭軍機大臣曰薩喇爾等奏投降人數摺內稱克勒特宰桑那嚴泰二千六百户烏魯特宰桑和爾和岱耨特勒齊杭吉勒圖托克托博羅特錫克錫爾格共五千户等語伊等戶口數目甚多原係噶爾丹䇿零屬下宰桑彼處似此者尚多不得併入别部落應俱照瑪木特等人衆之例辦理著班第阿睦爾撒納薩喇爾查明此等戶口共有若干奏聞辦理再茂海䇿凌係叛往準噶爾之人理應從重治罪今俱身死伊子皆率彼處居住屬下人衆迎接大兵投降前來茂海之子齊默特多爾濟又帶兵追拏達瓦齊所有茂海策凌子姓俱著從寬免其治罪其屬下人等仍令在準噶爾居住班第等明白曉諭伊等知之命嚴緝搶劫運糧商人賊匪上諭軍機大臣曰據山西巡撫恆文奏稱運糧商人張祿宣交糧回至第二十六臺於扎薩克林丕勒所屬鄂倫淖爾地方遇賊人搶去衣服銀兩並駝馬各項等語以運送官米之人膽敢結黨搶劫目無法紀似此要犯不得照尋常盜案完結著交該部派唐喀祿嚴飭所屬扎薩克人等務令即速擒獲以示懲警毋得遲延推諉癸亥命賞都爾伯特等被災人等米石上諭軍機大臣曰納穆扎爾奏稱都爾伯特訥默庫等十旗人於去冬今春連遭霜雪牲隻多有傷損所種地畝秋間始行收穫生計稍艱等語此項人等投誠後屢次賞給牲隻口糧以資接濟今牲隻既已被傷生計拮據著加恩再賞米五百石以示體恤甲子定北將軍班第等密奏阿睦爾撒納圖占伊犁情形班第等奏言臣等自入準噶爾邊境以來悉心察訪部落人衆習尚狡詐惟圖私利罔知恩義數年來生計貧乏攘奪相尋今大兵駐劄尚有掠取站馬搶奪行人之事雖交該宰桑得木齊等緝拏遲延未到將來大兵既撤勢必益加怠玩况臣等同辦軍務之人不能秉公竭力共勷國事但借辦公之名濟其私欲如阿睦爾撒納者其初尚知感戴皇恩臣等見其貪利妄行力為勸阻伊即聽從尚有勉力速冀成功之意自入塔本集賽遊牧以來仰仗天威所至迎降伊漸志足意滿惟知尋獲被搶人口攫取牲隻為務有意遷延致誤會集博羅塔拉日期又妄自誇張謂凡來歸之衆俱係為伊投誠及入伊犁益無忌憚凡伊兄弟暨所屬人等肆行劫奪不行禁止及得達瓦齊遊牧所收牲隻財物多方隱匿貝勒䇿布登扎布曾言伊搶奪鄂勒錐宰桑遊牧處駝馬各千餘羊至二萬餘此外更不知凡幾伊素性貪忍意圖占據準噶爾地方凡有讐隙者任意殺害是以衆心怨恨伊欲擁衆自衛不願大兵撤回臣等時為催促推諉觀望且云巴里坤額爾齊斯二處仍須各留精兵五千駐防過冬語益堅執明係仗我師力威服準夷以遂私計全不知感戴皇恩籌辦善後事宜至奉曉諭哈薩克敕書時阿睦爾撒納故意猶豫欲待伊先行遣使文內又有伊領蒙古漢兵在此駐劄之語䇿布登扎布向納噶查爭論謂爾等何不將身受大皇帝之恩帶兵前來據實告知竟若自行前來者納噶查始終不遵經臣等力指其非始令侍衛順德訥同伊使奉敕前往再收取達瓦齊遊牧時伊意不欲查明一切牲隻財物數目後臣等派人同瑪木特往查仍百計阻撓至今尚未清晰至查辦牧場及遣人收服四路之事至今亦並未辦理一意遷延惟與各宰桑頭目私行往來行蹤詭祕即如各部前往熱河入覲之人並不即為派定催促再四始行開送又屢行更換及至起程仍不免舛誤凡有傳行事件並不用印信仍倣達瓦齊私用小紅鈐記臣等節次理諭終不遵行動即揚言此處人衆欲叛視薩喇爾如仇敵潛行猜忌看來阿睦爾撒納圖據伊犁戀戀不已仰懇特降諭旨令其速行入覲早定四部封汙之事以杜非分之想至納噶查居心詭詐惟知附和阿睦爾撒納已在聖明洞鑒之中此間衆論亦以納噶查前在䇿妄多爾濟那木扎爾時阻撓挾詐共相怨恨並懇降旨將納噶查調往青海駐防以散其黨再阿睦爾撒納揚言此處喇嘛等謀叛臣等請將濟隆胡土克圖速行遣往令其宣諭衆庶安輯人心若阿睦爾撒納久在此處致伊等互相猜疑必至生變或因欲實其言潛行鬼蜮故生事端俱不可不先事豫防奏入上諭軍機大臣曰班第鄂容安將阿睦爾撒納妄行覬覦阻撓事務及貪取牲隻各情形密行陳奏班第鄂容安留心察看阿睦爾撒納居心行事據實奏聞甚屬可嘉但初覽伊奏似事端已成再四詳閲仍係阿睦爾撒納希圖徼幸貪得牲隻什物耳並無圖占準噶爾確據阿睦爾撒納自投誠以來疊受朕恩事事出於望外至朕辦理庶政一惟秉公執法之處伊未經身試是以志氣驕盈希圖徼幸亦事所必有班第等即據實陳奏深得防微杜漸之意今朕於阿睦爾撒納奏摺內溫旨批諭令伊即行入覲班第等亦婉言曉諭使其起程前來毋致驚疑此時班第鄂容安再悉心察看如阿睦爾撒納占據僭越之形果有實據即行密奏朕另行定奪如並未至於此極不過希圖肥已亦不必過於苛求倘伊稍有知覺轉於事無益著班第鄂容安密與薩喇爾詳細商議公同體察奏聞若無確據而過甚其詞亦不能逃朕洞鑒班第等務宜詳密毋得稍有泄漏又諭曰阿睦爾撒納此次辦理諸事動合機宜朕甚嘉悅且修軫念想阿睦爾撒納亦必急思入覲瞻仰朕躬昨雖已降諭旨達瓦齊或往投布魯特著薩喇爾帶兵往擒班第阿睦爾撒納駐劄伊犁此特欲其協理伊犁事務今思伊犁亦無重大事務即使薩喇爾帶兵前往布魯特班第鄂容安現在伊犁足資辦理著阿睦爾撒納遵朕從前所降之旨即行馳赴熱河朕俟阿睦爾撒納到後施恩將四衛喇特分封四汗賞功䇿勳用奬勞績著即傳諭班第阿睦爾撒納知之命凱旋京兵一千名駐劄巴里坤軍營上諭大學士曰此番凱旋兵丁除索倫哲里木等兵由口外遊牧行走其由西路行走之京兵一千名現議令駐劄巴里坤軍營所有經由之甘陜河南直𨽻等省臺站車馬均可不必籌辦定北將軍班第等疏奏遣使曉諭哈薩克事宜班第等奏言臣等接奉皇上頒發哈薩克諭旨敬謹翻譯蒙古文派侍衛順德訥宰桑巴桑䇿凌前往曉諭臣等復行文哈薩克云嗣後爾等與準噶爾人等應恪遵大皇帝諭旨仍前和好所有彼此互行搶奪之物俱各給還如願歸誠承受天朝恩澤即遣明白曉事陪臣前來當即代為陳奏奏入上諭軍機大臣曰班第等奏稱派侍衛順德訥宰桑巴桑䇿凌齎奉敕書前往哈薩克曉諭其行文有從前攘奪之物各行給還仍前和好等語班第等此言甚屬錯謬伊等從前互相劫奪係達瓦齊喇嘛達爾扎時事與現在無涉止應將準噶爾地方全行底定汝等從前之事俱不深究嗣後毋許再行搶掠方合事宜其措詞殊未允協此際想已遣往俟順德訥等回時將哈薩克言語情形即速奏聞再阿睦爾撒納之兄巴特瑪車凌究在何處有無信息一併具奏定北將軍班第等疏奏遵旨定擬賞給鄂哲特頭等侍衛職銜并派定入覲人等事宜班第等奏言臣等接奉諭旨公同商議宰桑鄂哲特本非誠心來降乃畏懼兵威始行歸順若給與散秩大臣職銜似無區别蒙皇上睿鑒令臣等酌議或授散秩大臣或授頭等侍衛擬將鄂哲特授為頭等侍衛已沐聖主格外殊恩且與伊分相當現在派入第一次入覲人員內業經起程至喀什噶爾霍集占之兄波羅泥都即係西路所收回人之和卓木弟兄二人內應留一人照管遊牧其波羅泥都現已派入第二次入覲人員內再和通額默根之弟格勒克雅喇木丕勒因伊兄已派定入覲應即將格勒克雅喇木丕勒亦暫留遊牧照管奏入報聞丁卯定北將軍班第等疏奏留兵駐劄尼楚滚地方事宜班第等奏言薩喇爾奏善後事宜一摺蒙恩指示於功成後令大臣等駐劄伊犁一二年辦理事務其應留兵若干令臣等公同議奏臣薩喇爾原奏烏魯木齊魯克齊木等處駐兵遊牧係指種地而言摺內未經詳悉聲明今伊犁地方既令大臣駐劄辦事誠不可不留兵駐守以備差遣應照原議駐兵五百名派察哈爾兵三百名喀爾喀兵二百名現在達瓦齊雖未就擒諸事業經大定伊犁毋庸大兵久駐應遵諭旨撤回臣等亦遷渡伊犁河於尼楚滚地方駐劄辦理事務其凱旋兵丁分作三隊相繼起程現在博羅塔拉之兵業經移咨遣回所有北路凱旋兵丁由察罕呼濟爾額爾齊斯青吉爾布拉罕等處至巴顔珠爾克卡倫酌給口糧一個月至烏里雅蘇台時各量遊牧逺近再行辦給西路凱旋之索倫巴爾虎察哈爾扎薩克各處蒙古兵丁由額林哈畢爾噶抵巴里坤至阿濟必濟卡倫亦酌給口糧一個月至推河時亦計各遊牧逺近再行辦給其健鋭營西安寧夏涼莊阿拉善緑旗等兵丁俱由原路行走其酌給口糧馬匹等項俱令將軍永常遵議辦理奏入上諭軍機大臣曰班第等奏稱大兵陸續撤回留察哈爾兵三百名喀爾喀兵二百名駐劄尼楚滚地方以資差遣防守等語所辦甚是朕前降諭旨令在巴里坤烏里雅蘇台兩處駐劄官兵將前往西路健鋭營兵一千名留駐巴里坤命䇿楞三格駐劄辦事今又於尼楚滚地方駐兵三處聲勢聨絡互成犄角之勢務宜同心協力彼此商酌辦理以期公事有益策楞已派辦巴里坤事務著即起程前往所有應辦事務悉心籌畫俟辦理已有端緒永常即領後隊兵丁前來其帶領入覲台吉宰桑人等現有扎拉豐阿玉保二人烏里雅蘇台事務著阿蘭泰留辦俟伊到後莫爾渾即帶領入覲人等前來再巴里坤有無可種地畝及駐劄大兵或應在巴里坤或應在烏魯木齊並著班第等詳議奏聞命舒赫德仍留烏里雅蘇台以章京效力行走上諭軍機大臣曰從前因策楞舒赫德辦理錯誤特將伊等革職令在軍前效力今大功已成朕原欲一體施恩與以奮勉之路策楞人本糊塗諸事皆聽舒赫德指使已賞給都統職銜領兵駐劄巴里坤以觀後效至舒赫德遇事毫無定見且未免退有後言今查其筆札雖無怨望之詞然以滿洲世僕漸染漢人習氣每日記事作詩即不必治罪亦不宜加恩此乃伊之自誤著仍留烏里雅蘇台以章京效力行走嗣後務宜痛自改悔若仍蹈前轍朕必重治其罪戊辰定北將軍班第等疏奏擒獲達瓦齊班第等奏言從前達瓦齊敗走時臣阿睦爾撒納即令屬人朗蘇巴朗同回人阿卜都哈里克等向阿克蘇圖爾璊回人等曉諭倘達瓦齊逃避前去務即擒獲解送今於六月十三日朗蘇巴朗同圖爾璊之阿竒木霍集斯伯克遣人至軍營告知達瓦齊已被拿獲並呈霍集斯伯克之書內稱遵照來使傳語於各嶺隘口俱設卡倫瞭望本月初八日達瓦齊在喀什噶爾交界處駐劄即遣我弟擕帶酒馬迎接並稱我因病不能前來爾今欲往何處并需用何物我自當豫備何不即來我處暫住達瓦齊因遣圖巴回答有汝既有誠心我即應前去之言我因伏兵林內將伊擒獲現帶兵二百名將達瓦齊解赴軍營伊子羅卜扎宰桑愛爾齊丹津達爾巴蓋烏巴什敦多克摩羅木色克色德克吹索諾木額木齊圖巴等七十人全行擒獲懇即遣兵一隊前來木素爾口迎接等語臣等即派索倫兵三百名喀爾喀厄魯特兵二百名令副都統額爾登額喀爾喀公策登薩木丕勒等於十四日起程前往木素爾迎接令將達瓦齊嚴行看守解送並遣人前往告知回人霍集斯伯克令其一同監送前來奏入得旨下部知之定北將軍班第等密奏阿睦爾撒納擅自調兵情形班第等奏言據喀爾喀貝勒䇿布登扎布呈稱阿睦爾撒納指稱防守哈薩克布魯特調兵九千名分駐二處此事曾否會商已定密行咨詢臣等以阿睦爾撒納並未先行會商面加詰問伊始告稱傳問薩哈克有前來之信布魯特亦有搶奪邊境之語是以由博羅塔拉等鄂拓克集兵五千名擬在博羅呼濟爾地方防守哈薩克保護遊牧由阿里瑪圖等鄂拓克集兵四千名擬在布敦阿璊地方令其駐防等語臣等詰以哈薩克布魯特何敢輒行侵犯至各處調兵有無滋擾遊牧人等且豫備應至何時而止阿睦爾撒納云哈薩克布魯特前來如好言遣回則已若妄行劫擒有此豫備之兵既易於邀擊而遊牧人等亦可照常耕牧生理不致驚擾且不過豫備兩三月俟遣使回時即可撤回臣等隨公同商定派兵豫備次日正欲鈐印行文伊稱業用伊圖記發行臣等諭以一切行文俱當用皇上欽頒印信不得擅用圖記恐姦人從中假冒嗣後若非印信文移諸事不準遵行違者治罪現在通行傳飭遵行奏入報聞定北將軍班第等疏奏派波羅泥都招服回衆事宜班第等奏言據阿克蘇回人頭目阿奇木阿卜都伯克等呈稱大皇帝撫綏準夷遣兵平定俾羣生樂業今聞葉爾羌喀什噶爾將欲興兵而包沁奇卜察克和碩齊等又欲會合搶虜阿克蘇圖爾璊多蘭賽里木人衆如果前來此處兵少力弱難與抵敵求酌量發兵將我舊伯克和卓木一併遣來拯救等語臣等查和卓木即交阿巴噶斯遊牧照管之波羅泥都霍集占兩路大兵前進時伊兄弟相繼投誠業經遵旨將波羅泥都派令入覲其霍集占留管遊牧伊等原係喀什噶爾回人頭目因葉爾羌喀什噶爾人沁所服是以懇求前往阿克蘇城招服葉爾羌喀什噶爾人衆臣等公同商酌即照所請令往阿克蘇招服回衆俟事俊再令赴京入覲奏入報聞命宥茂海巴濟等子孫罪上諭軍機大臣曰班第等奏稱從前叛逃之茂海巴濟等皆陸續死亡現在祗存巴濟之弟達什達爾扎噶爾丹達爾扎另行拿解赴京其餘所有子孫或係幼時逃往或即在彼處生長應作何辦理之處具奏請旨等語罪人子弟理應治罪但伊等父兄俱已死亡姑從寬免伊等皆由喀爾喀叛逃今應仍令在喀爾喀居住但所屬户口甚多著於伊等台吉內令其大者準帶三十户次者二十户小者十户先移至喀爾喀居住其餘户口俟諸事辦竣後再行酌量辦理伊等台吉仍遣至熱河令其入覲平定準噶爾方略正編卷十四
