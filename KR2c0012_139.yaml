body:
  text: 乾隆二十五年二月丙子朔賜拔達克山霍罕額德格訥博洛爾齊里克等部落勅書奉天承運皇帝勅諭拔達克山素勒坦沙爾遠處邊陲誠心向化擒戮逆賊霍集占波羅泥都呈獻尸首願以全部為朕臣僕又遣額穆爾克克巴圖爾伯克入覲恭順之忱深可嘉尚今來使等俱安善至京朕加恩召見頻申宴賚以爾擒賊有勞特賜蟒縀文綺衣服器什若干筵宴時申賜有加爾其祇受并賞來使及從人等服飾器用銀兩有差從前準噶爾侵擾爾等部落今既為朕臣僕自必加恩撫恤其循爾舊俗以安生理約束所部永享無疆之福至來使奏稱爾部落人等恐以霍集占之故致啓釁鄰封等語夫霍集占負恩悖逆遠邇咸知况已就擒戮諒鄰部亦未敢妄動爾向來若與鄰封有隙當自行辦理或果因霍集占啓釁可呈報駐劄葉爾羌大臣俟其查奏辦理䕶送爾使之明仁等仍有面傳諭㫖爾其知悉特諭又勅諭霍罕額爾德尼伯克爾遠處邊陲聞大兵平定囘城逆賊逃竄信息即慕化歸誠請擒賊自効遣使入覲深可嘉尚來使等俱安善至京朕加恩召見頻申宴賚賜爾縀疋器什若干爾其祗受又賞來使及從人等服飾器用銀兩有差覽爾奏内有未盡之詞俾使人面陳等語今來使等並無所請朕故未有他諭但爾部落素被準噶爾侵擾今既為朕臣僕自必加恩撫恤爾其納束所部永享無疆之福䕶送爾使之索諾木車凌等仍有面傳諭㫖特諭其勅諭額德格訥阿濟比略同又勅諭博洛爾沙呼沙黙特爾遠處邊陲聞大兵平定囘部拔達克山呈獻逆賊尸首即慕化歸誠遣使沙伯克入覲深可嘉尚今來使安善至京朕加恩召見頻申宴賚賜爾縀疋器什若干爾其祗受又賞來使及從人等服飾器用銀兩有差爾部落素被準噶爾侵擾今既為朕臣僕自必加恩撫恤爾其約束所部永享無疆之福再代爾入覲之沙伯克諸凡妥協爾其知之當加以愛惜特諭其勅諭齊里克兆瑪喇特比略同丁丑命賑濟扎薩克圖汗部落上諭軍機大臣曰據扎薩克圖汗部落公拉沁蘇隆巴爾桑扎薩克台吉根敦三都卜呈稱伊等四旗因值災歉生計艱難懇借俸五年以贍貧人等語該部落被災自應官為經理若借俸以賑則伊等養贍無資著派副都統富鼐支領庫銀五千兩馳驛前往㑹同該扎薩克等酌量辦賑以示體恤庚辰諭陜甘總督楊應琚等籌議營馬補額事宜上諭軍機大臣曰閆相師奏甘肅各鎮備戰馬匹及兵丁營馬因陸續撥解軍營率多缺乏購覔維艱請將哈薩克馬匹買補足額等語西陲大功告竣内地營馬將來無須調撥而伊犁闢展一帶現議駐兵屯田皆需馬匹是以經畫市易務令有餘其甘肅各營額缺原可徐為補足不必汲汲於此今閆相師所奏或因哈薩克屢來貿易遂為籌補營馬起見抑或該督撫等催令各營補額未為官兵熟計不知内地馬匹原以儲備調撥今新疆既不需接濟與其收槽充數又不若立厰孳生若急於購補馬價昻貴兵丁必多賠累即足額後終年飼秣徒耗芻豆何如即水草以善牧養於公私均有裨益著傳諭楊應琚呉達善據現在情形妥議速奏併傳諭閆相師知之授吉林領催得寶為三等侍衛賞給巴圖魯號上諭軍機大臣曰吉林領催奬賞藍翎得寶此次軍前甚屬奮勉而喀喇烏蘇之圍力䕶將軍懋著勞績著加恩授為三等侍衛賜號布林巴圖魯仍賞銀一百兩辛巳命䕶軍統領德爾素領兵駐劄囘城上諭軍機大臣曰現在葉爾羌喀什噶爾等處領隊大臣頗多著德爾素馳驛前往同豐訥亨領兵駐劄囘部公額色尹之弟帕爾薩和卓扎薩克台吉瑪穆特之子巴巴和卓至京授帕爾薩和卓為三等台吉巴巴和卓為四等台吉壬午諭定邊將軍兆惠等借給安插囘人口糧事宜上諭軍機大臣曰書山等奏准兆惠等行文將齊凌扎卜所送囘人經過哈喇沙爾借給口糧一百石照吐魯番素賫滿所請於來年收穫時由伊處交還等語辦理殊屬錯悞兆惠等亦未能籌及葢齊凌扎卜解送囘人若經過素賚滿所駐之地偶值缺乏伊願為接濟尚屬可行至哈喇沙爾距吐魯番甚遠且以官項給發囘人而令素賚滿償還以專責伊等供應於理不合此等囘人既官為安插一切自當於公項報銷著傳諭齊凌扎卜等即以奉㫖官給口糧曉諭各降囘仍傳諭兆惠素賚滿知之癸未諭㕘贊大臣舒赫德覆奏伊犁派兵屯田事宜上諭軍機大臣曰阿桂等奏稱伊犁屯田原議今歲派兵五百名囘人三百戸前往今與楊應琚相見始知將軍等酌議派兵四五千名囘人一千戸但阿克蘇囘人業經豫備而庫爾勒等處所派尚未辦理仍俟楊應琚到葉爾羌時與舒赫德定議等語伊犁向為準夷腹地加意經畫故穡事頗修今歸我版圖若不駐兵屯田則相近之哈薩克布魯特等乘機游牧又煩驅逐大臣等自當辦理妥協不可茍且塞責以圖早歸看來駐兵屯田惟當漸次擴充今歲且照原議派兵五百名囘人三百戸或并此俱行停止來年再為舉行則我兵既得休息而回人生計亦稍寛裕又可量為添派以漸增多此事朕惟責之舒赫德伊不過於用兵時退縮至於辦事心細朕所深知若果盡心自能辦理今雖命新柱前往協辦究未熟悉舒赫德惟視若己事辦理妥協方准其更換此時應作何辦理伊前奏多派兵丁囘人及河船糧運經朕訓飭何以尚未覆奏俱著傳諭知之命駐劄烏魯木齊大臣等㑹辦屯田貿易事宜上諭軍機大臣曰安泰奏稱永德現在遵㫖囘京其哈薩克貿易事宜請令副都統伊勒圖協辦等語此奏無庸置議屯田貿易皆屬公事伊等駐劄一處自應㑹同辦理若謂未經請㫖即不當辦事乃推諉拘泥之陋習假令彼地有嗎哈沁等生發則與屯田貿易俱無干涉遂可置之不問乎抑必待請㫖而後辦乎安泰伊勒圖著傳㫖訓飭昨諭伊勒圖前往阿克蘇永瑞仍駐烏魯木齊即遵前㫖行嗣後屯田貿易事宜俱著㑹同辦理丙戌諭㕘贊大臣阿桂等𠞰捕嗎哈沁事宜上諭軍機大臣曰五吉奏稱派往阿克蘇之馬二千二百餘匹伊親行解送於正月二十八日自巴里坤起程等語以阿克蘇現有馬匹駝隻合之新到馬匹自足敷用著傳諭阿桂伊柱豐訥亨伊三人即選派官兵給以馬匹捜捕嗎哈沁務期一舉盡𠞰亦不必過於急迫惟酌量馬力奮勉行走丁亥宣諭清馥罪狀上諭軍機大臣曰據同德等將清馥招降嗎哈沁斗齊半途脱逃囑令䕶送人等不得據實稟報揑稱斗齊打牲他往未經捜獲各實情審明㕘奏斗齊乃誑誘官兵馬匹之賊清馥並未親往追捕經降㫖申飭伊始行前往今詳閲各供則清馥仍未前進不過於巴里坤相距二三程坐候耳伊前曾奏稱不獲斗齊不囘朕方謂清馥畏罪窮追固所宜然但無端勞苦官兵朕實惜之復諭以前行已二三月口糧殆盡伊即當枵腹從事斷不得累及官兵若能獲賊固善否即將官兵撤囘此特據伊所奏情辭確鑿是以諄諄訓及今觀同德等奏伊僅離巴里坤不遠遷延觀望則前此所云不獲賊人不囘之語非有心欺謾乎甚至囑令厄魯特等將賊人半途逃脱情節諱匿不報罪無大於此者今大功雖成各處駐劄大臣甚多若似此效尤何以集事著將同德等奏摺録寄舒赫德阿桂等閲看前諭將清馥革職交舒赫德差遣委用今著就伊所至之地審訊明白伊若服罪即於該處正法或妄行狡辯可派員看守解送來京所有行裝查明入官同德淑寶審理此案據實㕘奏毫無瞻徇深屬可嘉俱著交部議叙仍傳諭各處駐劄辦事大臣等知之諭㕘贊大臣阿桂辦送霍集斯家口事宜上諭軍機大臣曰阿桂奏稱辦送霍集斯之子呼岱伯爾氏同其家口來京應否將霍集斯兄弟家口一同辦送等語著傳諭阿桂霍集斯家口起程時將伊兄弟之家口及同族皆毋庸辦送戊子諭㕘贊大臣舒赫德等曉示囘人及派兵彈壓各事宜上諭軍機大臣曰阿桂奏稱辦送漠咱帊爾兄弟等來京時體察阿克蘇囘人伯克等稍生疑懼業經出示安慰等語所見甚是今仍降㫖宣諭著舒赫德等通行曉示各城再阿桂奏遵㫖派索倫兵三百名前往烏魯木齊酌於二月初旬起程等語阿克蘇等處索倫兵既行派出而阿桂等巡查伊犁又必領兵前往則阿克蘇之索倫兵益少現在囘人不無疑懼亦須彈壓著與舒赫徳酌議或調葉爾羌索倫兵二三百名駐劄阿克蘓或令安泰選索倫兵一百名由烏魯木齊前往伊犁阿桂等由穆素爾嶺與安泰㑹合亦甚有益伊等宜㑹商妥協一面辦理一面具奏不必候㫖至阿克蘇辦事甚要阿里衮現在起程囘京可就便暫駐阿克蘇俟阿桂巡查囘日再行起程現令新柱往葉爾羌協辦著海明即至阿克蘇阿里衮俟海明到日再行囘京俱著舒赫德阿桂酌議具奏申諭禁止各城囘人不得妄行告訐上諭軍機大臣傳諭駐劄各城辦事大臣曉示囘衆人等曰昨因烏什囘人等訐告霍集斯父子苦累部衆侵漁貢賦經辦事大臣等具奏朕以霍集斯輸誠効力所有過失皆從前陋習若遽行治罪心有不忍但仍令其管轄所屬則上下猜嫌必不能相安無事即如準噶爾人等亦因聚斂成讐上既凌虐下亦憤恨互相侵噬以底滅亡可為明鑒因將霍集斯父子優其廩祿安插京師而各城頭目亦自知所懲創悛改舊習但恐愚頑無識之徒因此遂長刁風摭拾已往之事公行告訐或伊沙噶等圖得阿竒木之缺或所屬人等妄生事端挾制該管大干法紀嗣後有似此者非但不行辦理仍究明情節重治其罪斷不寛宥爾等知此惟期上下相安勤於生業勉為良善永享昇平尚其敬聽毋忽特諭命核減添設臺站馬匹上諭軍機大臣曰呉達善奏現在官兵凱旋軍臺文報及欽差來往較前簡少所有口外各臺站續行增添馬匹酌量減撤解赴哈密牧放等語已降㫖如所議行甘省既如此辦理則陜西山西直𨽻等省從前添設臺站馬匹自應一體核減俾歸實用著傳諭各該督撫等令其各就本處情形查辦具奏辛卯諭定邊左副將軍成衮扎布等確查搶掠烏梁海賊人情形上諭軍機大臣曰成衮扎布等奏稱額爾克沙喇莫尼扎卜等詢問被掠脱出之烏梁海等稱係哈薩克之巴魯克巴圖魯統衆搶掠未知果否確實即同察達克圖布慎等領兵抵哈薩克邊界捉生詢問等語搶掠烏梁海一事須查詢確實不可輕舉妄動即如俄羅斯訛傳哈薩克統衆三萬前來至今毫無影響固情節可疑而烏梁海等又稱係巴魯克巴圖魯則又是哈薩克而非俄羅斯矣朕前諭謂或係俄羅斯或係哈薩克不出所指四端要於務得實信今覽額爾克沙喇等報文内稱與朕所指俄羅斯情節相近等語若稍有附㑹或拘泥辦理必至歧誤著傳諭額爾克沙喇等知之昨諭莫尼扎卜於查確後前來奏對仍著察達克同來朕既可悉彼處情形而伊等亦得承訓示易於辦理壬辰命陞賞三等侍衛塔尼布上諭軍機大臣曰三等侍衛塔尼布在軍前奮勉効力著加恩授為二等侍衛賜號特古斯巴圖魯仍賞銀一百兩癸巳諭㕘贊大臣舒赫徳等和衷集事毋得推諉貽悞上諭軍機大臣曰舒赫德奏阿克蘇現有索倫兵二百六十餘名又於齊凌扎卜所領新索倫兵内揀選三十餘名發往烏魯木齊等語阿克蘇地方𦂳要今所有索倫兵既全往烏魯木齊而阿桂又領兵巡查伊犁自應派兵防範乃舒赫德未見奏及若謂伊所駐葉爾羌之兵不便撥補阿克蘇則甚屬錯謬伊係總辦各城事務之人自當視同一體不可稍分彼此至阿桂亦未奏明巡查伊犁係派何處之兵而阿克蘇以何處兵丁駐劄自宜辦理妥協再烏什雖與阿克蘇相近仍需大員駐劄辦事著舒赫德等酌量辦理阿桂亦不得因總理有人遂生推諉當與舒赫德和衷商㩁以期集事倘互相推諉以致貽悞朕不獨責備一人也俱著傳諭知之甲午諭㕘贊大臣阿桂等酌補烏什阿竒木事宜上諭軍機大臣曰阿桂等奏准永慶呈報烏什之阿琿伯克等列欵控告霍集斯并稱葉爾羌噶雜納齊薩里行走奮勉若授為烏什之阿竒木殊屬妥協隨示以薩里縱可委用䆒係本城之人豈此外無可勝任者且補授阿竒木我等尚不敢專擅爾輩何得薦舉等語阿桂所奏曉示囘人之處甚是薩里曾控告霍集斯若即授為阿竒木則奸險之徒羣以䧟人奪缺為得計伊果行走奮勉應再行酌量加恩至所奏噶岱黙特可勝阿竒木之任伊現隨將軍等來京俟召見後再降諭㫖諭定邊左副將軍成衮扎布等辦理哈薩克搶掠烏梁海事冝上諭軍機大臣曰成衮扎布奏據探信侍衛阿扎喇稟稱扎木禪多岳特詢問貿易人等知哈薩克之巴魯克巴圖魯搶掠烏梁海又有哈巴木拜屬人亦稱巴魯克巴圖魯遇逃走之烏梁海等掠其馬匹牲隻等語是搶掠烏梁海係哈薩克之人無疑已傳諭納旺令其見阿布賚時責令拏送巴魯克巴圖魯即阿布賚不能擒獲亦即在哈薩克確訪其㳺牧處所作速奏聞若帶領新派之索倫兵一千名直入擒拏自可弋獲著傳諭成衮扎布等候㫖遵行乙未諭管陜甘總督甘肅巡撫呉達善等辦理降囘及緝拿逃犯事宜上諭軍機大臣曰齊凌扎卜奏稱伊解送之伯德爾格塔里雅沁烏沙克囘人等由阿克蘇至庫爾勒中間脱逃男丁十六名又在吐魯番闢展等處落後行走之男婦三十一名口據素賚滿咨現在拿獲二十人由哈密遞解今解至肅州者共七百九十餘名口已交與呉達善等語此等逃走囘人務期拏獲即於本處正法令囘人等觀看其已經解送者亦即於所到之地正法併傳諭自哈密至阿克蘇辦事大臣等知之其解至肅州囘人呉達善即遵㫖分賞官兵毋令聚集一處申飭㕘贊大臣阿桂等辦理霍集斯屬人事宜上諭軍機大臣曰定長等奏准阿桂咨查霍集斯有留於吐魯番之人差遊擊達興阿嚴加看守安插魯克察克又漠咱帊爾從前差往闢展購買什物之人亦行文書山納世通詳查具奏等語大臣等於應辦要務往往畏難而此等毫無闗係事件輒𤨏屑捜求甚覺過當定長即准咨辦理俱未曉事霍集斯効力軍營尚欲加恩錫爵其安插京師者特恐仍居故地為人所累原以曲示保全故賞給廩祿務從豐厚何必羈其屬人查其什物耶且辦理此事當明白曉示以霍集斯被人告訐大皇帝念功宥罪安插京師即伊存留之人疑懼逃竄不妨聽其所往而代伊市買之人縱有侵漁亦何必過問阿桂定長俱著傳㫖申飭仍降㫖曉諭囘人等其霍集斯所留之人可自備資斧來京至所查霍集斯家産力能自運則已或有不能則官為帮辦阿桂等即遵照辦理丙申諭喀爾喀副將軍䇿布登扎布辦理哈薩克搶掠烏梁海事宜上諭軍機大臣曰昨據額爾克沙喇莫尼扎卜議於額爾齊斯解凍之前速往哈薩克邊界捉生詢問又據貿易人等告稱搶掠烏梁海係巴魯克巴圖魯等語已諭成衮扎布俟索倫兵至日令䇿布登扎布帶領前往辦理但巴魯克巴圖魯不過小醜妄行蠢動所調官兵不必急行富德亦無庸同往著䇿布登扎布於七月初旬以副將軍統兵瑪瑺車木楚克扎布為叅贊大臣相機擒𠞰此時仍俟額爾克沙喇等偵探確實不可拘泥辦理己亥授定邊將軍兆惠副將軍富德俱為御前大臣命兆惠富德及㕘贊大臣明瑞阿里衮舒赫德俱於紫禁城内乘馬辛丑諭陜甘總督楊應琚等查奏解馬兵丁借欠銀兩上諭軍機大臣曰據莊浪副都統噶隆阿奏稱軍興以來莊浪兵丁解送馬匹等項所借銀兩分作六年十年扣還者仍分年坐扣外又有原任副都統佛倫接濟兵力及補買缺額並添餧馬匹尚應還銀一萬六千二百餘兩懇恩展限扣還等語甘省兵丁餧解馬匹借欠銀兩曾經黄廷桂查明具奏降㫖分别豁免展扣今噶隆阿既有此奏恐尚不止莊浪一處為然從前黄廷桂如何辦理呉逹善自必悉其原委著傳諭楊應琚呉達善將甘省各營出兵解馬兵丁借欠銀兩已經豁免者若干現在分年扣還者若干未經查奏者若干逐一查明據實具奏壬寅辰刻定邊將軍兆惠定邊右副將軍富德㕘贊大臣明瑞巴祿等振旅凱旋先是上命築壇於良鄉城南將行郊勞禮二月丙申啓蹕恭謁泰陵禮成駐蹕黄新莊將軍兆惠副將軍富德遣乾清門侍衛等齎摺恭請聖安隨御製詩一章並御筆畫幅賜兆惠富德至是親詣行禮鹵簿大駕前導軍士鳴螺鐃歌樂作壇上列纛上御吉服登壇拜天行三跪九叩禮將軍㕘贊隨征將士等皆甲胄及王公滿漢文武大臣俱隨行禮禮畢上御黄幄將軍㕘贊等行禮以次趨進御座前跪行抱見禮上撫勞之以御用朝珠親賜兆惠富德傳㫖賜坐將軍㕘贊等列坐西幄在京王公大臣列坐東幄賜茶又賜兆惠富德御馬各一匹乘騎隨行凱歌樂作駕還行宫將軍等易禮服賜將軍㕘贊隨征將士新附囘部諸伯克及王公大臣等宴禮成御製詩章勒石紀事命巴圖魯頭等侍衛海蘭察莽喀察巴圖魯二等侍衛瑪格諾爾本厄魯特巴圖魯侍衛齊里克齊巴圖魯藍翎侍衛錫喇庫勒厄魯特藍翎侍衛瑪勒占俱在乾清門行走授巴圖魯三等侍衛烏勒德克為二等侍衛巴圖魯藍翎侍衛伊登古那木扎爾俱為三等侍衛厄魯特三等侍衛庫庫濟克為二等侍衛藍翎侍衛碩通為三等侍衛㕘贊大臣舒赫德等疏奏酌定臺站事宜舒赫德等奏言大兵進𠞰囘部安設臺站馳遞事件務在迅速時有大員巡查俱知勤勉今各城平定自應酌量緩急俾不糜帑項亦不悞公事查自葉爾羌至闢展俱有囘人居住伊等善於步遞請每臺派囘人十戸兼綠旗兵五名識字之健鋭營前鋒或西安兵一名以六品頂帶署筆帖式管理每臺馬十五匹駝四隻四月至九月牧放十月至三月由各城支給芻豆其官兵等二年一換酌量保送以示鼓勵囘人等一體給與口糧及鹽菜銀兩於十戸中派出首領一人以七品頂帶管理仍令耕種臺站附近之地冬春馬草即令其収割庶馬駝得以休息餽運亦皆節省其葉爾羌至喀什噶爾和闐亦請照此辦理奏入得㫖如所請行癸卯諭㕘贊大臣阿桂等酌辦屯田𠞰賊事宜上諭軍機大臣曰據阿桂奏稱伊犁所派屯田囘人及阿克蘇應調之兵俱已辦理但須兼辦嗎哈沁而五吉所送馬匹未到若坐候則悞農時是以每兵給馬一匹先行起程等語阿桂此次辦事甚屬勇往可嘉此時自以屯田為要俟五吉送馬至日再辦嗎哈沁亦不為遲舒赫德此時亦抵阿克蘇即接收馬匹派大員加意䕶送毋為賊所盗竊交阿桂牧放至秋間捜𠞰嗎哈沁等著伊柱達爾黨阿帶領阿桂不必前往惟專辦耕作營造事宜務使兵丁囘人樂於從事昨諭安泰領兵三百名與阿桂會合著即沿途安設臺站捜捕逸賊併傳諭知之諭管陜甘總督甘肅巡撫呉達善等酌辦官兵俘獲人口事宜上諭軍機大臣曰舒常奏據鄂齊爾告稱官兵陣前俘獲男婦共二百七十餘人等語此等人口係官兵俘獲不應一體辨給口糧著傳諭呉達善等如鄂齊爾請為支給即明白曉示以定例所無不便奏銷爾等即自行通融養贍如不能亦不妨售賣或該處有願買者即酌為定價併傳諭舒常知之甲辰上御正大光明殿召哈密扎薩克郡王品級貝勒玉素富郡王品級貝勒霍集斯貝勒品級貝子鄂對等四十六人入見親加慰問賜章有差恩免德卜特爾卡倫撤囘官兵多支餉銀之半上諭軍機大臣曰據多爾濟奏稱由噶斯路通伊犁之德卜特爾卡倫官兵奉㫖撤囘計多領口糧銀三千兩有竒已行文該扎薩克追繳等語官兵多領口糧雖應交還當具奏請㫖遽令追繳殊屬不合著加恩寛免其半即諭各扎薩克知之乙巳申飭請開甘賑事例之布政使蔣炳等上諭大學士曰蔣炳明德奏甘省近年間被偏灾請暫開甘賑事例一摺所奏非是現在大功告成承辦軍需竣事其内地歉収各屬節次加恩蠲賑平糶不惜帑金億萬多方撫恤辦理就緒何必於此時為此權宜之計即地方實有應行通融籌畫事宜亦當聽督撫等據實陳奏候朕裁酌蔣炳等竟不量事體之應行與否輒冐昧凟請所奏不必行著傳㫖申飭三月丁未諭㕘贊大臣阿桂等辦理伊犁屯田事宜上諭軍機大臣曰阿桂奏稱伊犁河以南有地名海努克與固勒扎相隔一日程途水土沃衍請於此處先行屯種相其形勢分立村莊等語所辦甚是俱依議行果能實心奮勉次第辦理則屯田一事當錄伊經始之功也至村莊居住囘人需兵防䕶非尋常屯田處所可比必固其堡寨勤其瞭望庶藏匿之嗎哈沁及哈薩克等不敢滋事至所奏起程以前派囘人修理穆素爾嶺道路及將來安設臺站行知舒赫德酌辨等語從前準噶爾與囘人往來俱由穆素爾嶺一路今既屯田伊犁自應時加修理其酌派囘人及安設臺站俱傳諭舒赫德知之諭御前侍衛署副都統安泰等辦理烏魯木齊屯田事宜上諭軍機大臣曰安泰等奏屯田以漸開擴直通伊犁自烏魯木齊至羅克倫擇水土饒裕之地立四村莊每莊屯兵八百餘名委遊擊一員都司一員分派雜職等督課耕種等語所見甚是可即勉力善為經理至設立村莊尢宜防範盜賊不可輕忽所奏官兵四五千人間有疾病乞賞給醫士及藥材等語著傳諭呉達善於甘肅選良醫二名并各種藥材送至烏魯木齊備用命原任巡撫圖爾炳阿駐劄庫車辦事戊申上御豐澤園幄次賜將軍兆惠副將軍富德㕘贊大臣明瑞巴祿及新附諸囘部并王公滿漢文武大臣等宴自將軍至隨征將士賞賚銀幣有差軍機大臣奏言臣等遵㫖開列應行賞賚之將軍大臣侍衛及囘人等進呈荷䝉欽定計賞將軍兆惠緞六十端銀六千兩副將軍富德緞五十端銀四千兩㕘贊大臣明瑞阿里衮舒赫德郡王額敏和卓俱緞二十端銀一千兩㕘贊大臣巴祿阿桂郡王品級玉素富霍集斯貝勒品級鄂對俱緞十六端銀七百兩領隊大臣副都統愛隆阿由屯温布鄂博什巴圖濟爾噶爾瑚爾起端濟布副都統傅景内閣學士温福公噶岱黙特阿什黙特散秩大臣阿竒木副都統豐訥亨伊柱豐安永慶俱緞十二端銀五百兩䕶軍統領努三侍郎永貴厄魯特公衮楚克俱緞十端銀二百五十兩巴圖魯侍衛扎拉豐阿塔瑪鼐海蘭察諾爾本瑪格占頗圖那本查爾俱緞十端銀一百八十兩巴圖魯侍衛德爾森保額爾登額沙津察烏勒德克哈爾吉納和巴勒圖富彦保英德訥西爾庫爾伊登固伊薩穆莽喀察鄂里克塔巴爾琿五十保羅托愛普薩滿珠瑪虎達什齊里克齊克什克圖及賞巴圖魯號戴孔雀翎藍翎官兵三十六名俱緞八端銀一百二十兩御前侍衛敦察圖倫楚乾清門侍衛傅靈安瑚什達禮善烏三泰科普薩孟郭勒伊達木扎布二等侍衛達爾黨阿署侍讀學士和倫及藍翎侍衛五十六員戴孔雀翎官兵二十五名囘部二品三品伯克三員玉素富霍集斯子弟俱緞六端銀一百兩㕘領署㕘領佐領四員員外郎一員主事三員囘部四品五品伯克十五員及伯克子弟俱緞六端銀六十兩奬賞藍翎官兵一百十名防禦一員遊擊二員筆帖式二員奬賞藍翎六品頂帶囘人九名䕶軍校驍騎校十五員署䕶軍校驍騎校筆帖式十三員把總一員俱緞五端銀四十兩前鋒䕶軍領催馬甲供事等八十三名俱緞四端銀二十兩其遵㫖酌賞緞疋之大臣官員額駙色布騰巴爾珠爾緞六十端貝子扎拉豐阿緞四十端内大臣博爾奔察薩拉爾俱緞二十端䕶軍統領瑪瑺緞十二端副都統烏爾登額爾登額散秩大臣噶布舒俱緞八端侍衛伍岱額訥慎額爾登額索倫總管諾璊察三等侍衛烏爾衮保囘人鄂斯璊俱緞六端又賞給將軍大臣官員等荷包各有差奏入報聞臣等謹按西師大功告蕆為伊古未有之盛烈我皇上神機獨斷以數萬里之遙㒺不呼吸立應睿謨宏遠臣下莫能仰窺萬一而所以收羣策羣力之效者握要所存惟以信賞必罰為兢兢故當露布初傳疏封錫胙之殊恩應時立沛下此如克一城獲數級自列校以逮偏伍成勞可錄纎𤨏弗遺至䇿勲飲至時早已屢晉崇班頻膺懋賞矣迨乎告成天祖親莅郊壇茂禮崇隆榮施懿鑠一時臣民額手藩部傾心咸以為杕杜之勞還彤弓之覺報莫能逮焉若夫勸忠褒節酬功䘏勞誼篤藎臣仁周陪𨽻彛章燦舉無一不可以昭示萬世程法臣等遭逢聖明極盛之時備職館垣得以揄揚末簡不勝至幸嗣是新疆善後事宜謹依次第條系彚著續編如左平定準噶爾方略正編卷八十五
