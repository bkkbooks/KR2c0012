  text: 欽定四庫全書平定準噶爾方略正編卷四十四
  hash: sha256:8bade6579ed7a01878e568c30ddc554036cc2c40c3b3feba80a3be2ff5033545
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_098-1a, image: WYG0358/WYG0358-0721c.png}
body:
  text: 乾隆二十二年秋九月丙午命革駐防將軍錫特庫職留巴里坤披甲効力上諭軍機大臣曰阿里衮奏稱鹽池臺站被賊竊取馬駝拒捕傷死兵丁因患病未汗遣總兵官丑達前往查拏等語鹽池去巴里坤甚逺有何盗賊不過嗎哈沁之類乗間偷竊驛馬耳阿里衮既患病不能前往錫特庫豆斌德舒所司何事此三人内錫特庫理應率先奮往豆斌身任提督且有緑旗兵丁德舒為滿洲臣僕年力壯盛俱應奮勉乃伊三人退縮不前只令丑達前去是何意見若謂在巴里坤辦事亦不過阿里衮一人耳伊等又何嘗辦事耶錫特庫曾任將軍遇事怯懦更屬不堪著革職自備資斧留巴里坤披甲効力豆斌徳舒俱著交部嚴加議處諭定邊將軍成衮扎布等辦理臺站事宜上諭軍機大臣曰據雅爾哈善等奏稱濟爾哈朗軍營至烏魯木齊等處臺站所有嗎哈沁賊人盡皆𠞰殺仍捉生詢問尋踪追緝以靖地方等語辦理頗屬妥協著將伊等奏摺録寄成衮扎布等查照辦理併傳諭阿里衮知之丁未以副都統三格追𠞰賊人情節諭兩路將軍等核定功罪上諭軍機大臣曰前因永貴所奏三格追𠞰扎那噶爾布尼瑪等呈報賊衆潛逃情節反在將軍奏報之後恐三格有諱飾情事復諭永貴查奏今據永貴奏稱五六月間三格陸續報知河水甚大不能進發欲出山尋路至哈什等處擒𠞰而伊以道里遥逺令俟水落前往賊已潛逃至奏報遲延因往返商酌未定故在烏爾登所報之後等語是三格等不過聽伊調遣尚無大咎著將此等情節傳諭兩路將軍俟撤兵時分别功罪察議具奏戊申厄魯特額卜克特以擒拏扎那噶爾布授藍翎侍衛在上駟院行走賞銀三十兩以中秋正法情節傳諭軍前侍衛官員上諭軍機大臣曰前成衮扎布等奏中秋報稱解送之諾諾錫渡河欲逃因以刀刺落水中等語曾經傳諭查奏昨詢問來京侍衛據稱臺站人等俱云中秋撒袋馬匹俱為賊搶去逃走今中秋解到時仍執前説及詰以侍衛等所告遂俯首無辭諾諾錫原非要犯若中秋據實供出或可從寛乃巧詞欺隱自難姑貸因將中秋正法著成衮扎布傳諭軍前侍衛官員人等知之己酉定邊右副將軍兆惠疏奏逆賊阿睦爾撒納逃入俄羅斯兆惠奏言據㕘贊大臣富德咨稱八月初一日至森博羅特十二日遇副都統鄂博什告稱沿河尋覔逆賊阿睦爾撒納尸首未獲因向陸路各卡倫查看十四日侍衛順德訥回營酌議遣人告知俄羅斯瑪玉爾等約於十五日在額爾齊斯河相㑹是日瑪玉爾等具舟來迎恭請聖安後告以順徳訥所報齊倫圖喇人等遇見阿睦爾撒納之説因爾等報知溺死是以領兵尋覔今全無踪跡自屬荒唐從前與爾國定議不匿逃人且阿逆更與尋常逃犯不同溺死既無實據自難回奏此等情節爾等應亦聞知瑪玉爾等惟以溺死固屬未確但現在並無信息若果聞知自必往軍營知㑹等語支吾推諉續據索倫委署章京噶布舒塔尼布告稱在森博羅特卡倫遇厄魯特伊宛告稱七月初旬見阿睦爾撒納帶領八人步行至俄羅斯被刈草人擒獲我因認識阿睦爾撒納前去觀看阿睦爾撒納問我為誰答以達瓦齊屬人阿睦爾撒納遂入瑪玉爾室内是夜即送往察罕汗處其八人又於次日解送等語因將伊宛帶至軍營再三詰問據稱阿睦爾撒納原與達瓦齊同逃往哈薩克是以熟識瑪玉爾因伊察罕汗未經發落故詐稱溺死等語核其情節與哈薩克來使所言七月十九日阿逆步行逃出之語相符又與自哈薩克逃來之厄魯特達瓦所供亦合因公同商議若即據伊宛之言向彼索取恐瑪玉爾以前言為愧欲行對質致啟釁端仍令順德訥往告瑪玉爾云我等暫遣人往哈薩克取信若阿逆不在彼處或告知實入爾國自當遵定議給還隨將兵丁交鄂博什照舊駐候我同順徳訥願往見察罕汗以理索取祈即具奏請㫖等語二十六日臣與富德順徳訥同問伊宛仍如前説且謂哈薩克若拏送阿逆前來甘受妄言之罪等語臣等伏思阿逆逃入俄羅斯事屬確實想俄羅斯以定議為重自應送還但行文薩納特衙門及差遣使臣之處向有成例伏候訓示謹將厄魯特伊宛達瓦由驛送京以備詢問奏入上諭軍機大臣曰從前兆惠等奏稱逆賊阿睦爾撒納渡河溺死朕即以為非實今果竄入俄羅斯已命理藩院行文索取兆惠等亦不必刻期辦理但令順徳訥往告瑪玉爾云現據哈薩克報稱阿睦爾撒納帶領八人逃入爾國爾等自非有意隐匿必因送至爾察罕汗處不敢自專從前我等以阿逆溺死奏知大皇帝大皇帝早已洞鑒即命行文爾薩納特衙門索取爾察罕汗念兩國和好必循舊約送還我等亦不復在此尋訪已遵㫖撒兵矣如此曉示後即撤兵回至大營現在擒𠞰巴圖爾烏巴什哈薩克錫喇等最為切要近聞巴圖爾烏巴什有逃入哈薩克之信是兆惠等歸途正可相遇而成衮扎布又已尾追自可擒獲獲此數賊後已屆冬令即未能盡𠞰亦不妨於明春辦理即遵前㫖酌定駐兵之地成衮扎布兆惠富德等來京請訓此時俄羅斯能將阿逆擒送固善否則且俟來年平定回部後若俄羅斯果以阿逆居竒或有異志亦當先除近患然後相機辦理惟哈薩克若遣使來即可告以阿逆逃竄情形倘俄羅斯隱匿不還則阿逆懐爾等擒拏之怨必將煽惑報復因爾我一家故相告語或因便作書曉示亦可併傳諭成衮扎布等知之又諭曰前兆惠等擒獲巴雅爾時圖倫楚達禮善俱領隊催督著有勞績因飛章入告未經詳述今奏請應否邀恩議敘圖倫楚達禮善既經奮勉効力著加恩交部議敘命恩䘏總管巴寧阿并訓諭副都統三格等上諭軍機大臣曰雅爾哈善奏據三格報稱察哈爾總管巴寧阿等於博羅齊地方捉生詢問三十里外有賊人十户入山捜𠞰遇伏陣亡等語總管巴寧阿三等侍衛努呼德阿拉善二等台吉達瓦車林奮勇𠞰賊歿於王事深可憫惻著交部照例議卹三格等聞信即帶兵接應𠞰賊百餘人尚與恇怯不前者有間但所報擒獲琿齊屬人供稱琿齊額林沁達瓦往伊犁合阿巴噶斯哈丹游牧見河岸有二大營恐係大兵及哈薩克兵因逃回此地三格即遣人到彼查看皆厄魯特踪跡移去已十餘日等語伊犁之營既係厄魯特則琿齊等何以逃回三格聞信自應親身前往何以僅遣人查看甚屬疎懈著雅爾哈善傳諭三格等仍作速追𠞰琿齊等賊為巴寧阿等復讐又諭曰雅爾哈善據三格報稱賊人夤夜刼營時有兵丁八人逃去等語續有四人回至濟爾哈朗軍營詐稱迷路雅爾哈善即行研訊正法所辦甚是其在逃四人或再投回或被拏獲亦即取供正法以肅軍紀命解送厄魯特宰桑烏魯木來京上諭軍機大臣曰雅爾哈善奏稱副都統愛隆阿在察罕烏蘇收取宰桑烏魯木游牧百餘户情願内移等語著將烏魯木解送來京己酉以蘇章阿治罪情節諭察哈爾正黄旗總管巴爾品上諭軍機大臣曰前因伯格里之妻請將游牧内移派蘇章阿照管昨據副將軍等㕘奏蘇章阿偏䕶伯格里之妻肆行無恥已將蘇章阿治罪伯格里之妻係厄魯特婦人無足深責伊若聞將蘇章阿治罪必生疑畏著傳諭巴爾品密為防範不必宣露庚戌命恩卹副都統阿敏道等上諭軍機大臣曰從前將軍兆惠等駐劄伊犁遣副都統阿敏道領索倫厄魯特兵收服波羅泥都霍集占等伊等詐稱畏厄魯特擾害若肯撤回即行投順阿敏道遂撤回厄魯特兵帶索倫兵一百前往今據總管五十六等報稱到沙喇斯游牧聞波羅泥都等謀叛阿敏道及兵丁百人俱為所害等語阿敏道雖為叛賊等所愚究屬捐軀殉難深可憫惻著同隨行官兵俱照陣亡之例交部議卹諭署理定邊左副將軍印務策布登扎布等防範阿睦爾撒納事宜上諭軍機大臣曰兆惠奏稱逆賊阿睦爾撒納逃入俄羅斯屬實現在行文索取前聞烏梁海郭勒卓輝等俱逃入俄羅斯或被阿逆煽誘致擾我歸順之烏梁海亦未可定著傳諭䇿布登扎布納穆扎爾等曉示察達克加意防範若有賊人聲息如量力不能擒𠞰即報知布延圖或烏里雅蘇台軍營發兵協助但宜密為豫備不必稍涉張皇致烏梁海等驚恐甲寅諭駐劄巴里坤辦事大臣阿里衮接續臺站事宜上諭軍機大臣曰近因鹽池臺站被盜阿里衮患病未曾親往查拏此時想已全愈朕昨命滿福接續朱爾都斯臺站恐伊不能辦理著阿里衮帶兵二百名合丑達之兵接續臺站現在交送成衮扎布事件著阿里衮帶往若所到之處臺路已通即將事件遞送軍營仍回巴里坤辦事至侍衛寧古里所報沙喇斯瑪呼斯等逃叛現在信息如何著查明奏聞命免治察哈爾總管端濟布罪上諭軍機大臣曰端濟布奏稱在羅克倫孟古圖嶺收獲噶爾藏多爾濟宰桑羅卜扎尼瑪得木齊敦多克等將造言惑衆之古隆格瑪木特正法其户口什物牲隻交送巴里坤羅卜扎等送出噶爾藏多爾濟之幼女派伊屬人照管送京等語端濟布此次所辦尚合機宜從前端濟布招降琿齊達瓦惟事姑息以致復叛朕已命兆惠等查明治罪今功過相抵著加恩寛免倂傳諭兆惠等知之諭定邊將軍成衮扎布等奏報𠞰賊情形上諭軍機大臣曰成衮扎布等自初四日以來未有奏報朕昨已降㫖詢問想因臺站尚有阻滯深為厪念現命阿里衮帶兵接續臺站即將諭㫖交令馳送此時計臺路已通奏報無誤所有進𠞰巴圖爾烏巴什等賊衆情形作速奏聞乙卯諭署理定邊左副將軍印務策布登扎布等查拏搶刼侍衛之喇嘛羅卜藏阿喇卜珠爾等上諭軍機大臣曰策布登扎布奏稱去年喀爾喀盜竊生事之時塔爾拉克沁卡倫二等侍衛卓勒和等被傷身死已拏獲為從之恩克等九人供出為首起意之托音喇嘛羅卜藏阿喇卜珠爾等四人現在嚴行查拏等語喇嘛等起意刼奪傷死侍衛罪不可逭著策布登扎布等務即擒獲正法併傳諭桑寨多爾濟派伊親信人員於庫倫等處密行查拏勿令逃脱諭定邊將軍成衮扎布體察降人三都克情形上諭軍機大臣曰沙喇斯宰桑三都克在軍營頗為出力今伊游牧内移為得木齊都噶爾等所掠殊屬可憫著賞銀一百兩成衮扎布撤兵後即隨帶來京伊妻子若未被掠亦著續送此際三都克若顧戀游牧心懷叵測自當豫為體察如照常行走即加以撫慰命解送青海卡倫拏獲之厄魯特伊什克及其家口來京丙辰命以阿逆逃入俄羅斯情形宣示中外上諭大學士曰前兆惠富徳奏稱俄羅斯頭目瑪玉爾告稱有步行二人至伊齊倫圖喇自稱為阿睦爾撒納及遣人迎渡並未回報續往看視止見渡口小船泊於河灣必俱溺死水中等語朕彼時即不以為然當經傳諭兆惠等謂溺死之語不可信逆賊阿睦爾撒納奸詭狡詐非俄羅斯為所蠱惑背約私留即阿睦爾撒納設為溺死之説冀圖緩我追兵潛逃他處順德訥等不可輕信傳言沿河尋覔今據奏到行至森博羅特卡倫所遇諸人詳加訪問始知渡河溺死事屬子虛果不出朕之所料然則順德訥等率領官兵在額爾齊斯河尋覔十餘日之久如此舉動豈不為俄羅斯所笑乎準噶爾已經平定反側之諸厄魯特或捕獲正法或患病身死惟逆賊阿睦爾撒納實為悖逆之渠魁既不早投天網又未遽伏㝠誅坐使其視息偷生遊魂逺竄將來自不能久甘窮困勢必滋生事端為患邊境是逆賊一日不獲西陲之事一日不能告竣揆之事理實有不能中止之勢但時屆寒冬士馬亦宜休息已有㫖令兆惠等暫回軍營一面命理藩院行文俄羅斯薩納特衙門令將阿睦爾撒納即行送出從前與俄羅斯定議彼此不留逃人即初定伊犂時俄羅斯逋逃在彼者俱經送還若果逆賊在伊境内遵諭縛獻以全信義則渠魁就獲準噶爾一事便可從此奏功設因逆賊之搖尾乞憐遂至受其愚弄為之隱匿又或别有他意其應如何索取之處再行相機籌辦朕非窮兵黷武特以事勢所廹不得不然在軍營諸臣心存怯懦未嘗不欲借渡河溺死一語遂圖草草收局而外省諸提鎭不識事機方且飛章奏賀朕既為之一笑且深歎任事之無人也可將此通行曉諭知之丁巳諭定邊右副將軍兆惠等㑹兵𠞰賊事宜上諭軍機大臣曰成衮扎布等招降之沙喇斯瑪呼斯等復叛搶掠臺站雖經滿福阿里衮次第領兵接續但二旬有餘未見軍營奏報深為厪念因思逆賊阿睦爾撒納已逃入俄羅斯即哈薩克未有囘音俱無庸守候惟厄魯特逋賊既同往伊犂而降人又復叛去則成衮扎布等軍營兵力稍覺單弱可虞兆惠等若領兵㑹合擒𠞰賊衆軍威自振即一時不能盡𠞰酌定過冬處所暫行撤回駐劄於明年再行進𠞰亦可著兆惠富德將現在情形作速奏聞己未命議卹捜殺嗎哈沁陣亡及被傷身死之烏魯木齊等臺站筆帖式富永塔克什哈等冬十月庚申朔大學士管陜甘總督黄廷桂疏奏查拏原任遊擊對齊情由黄廷桂奏言乾隆二十一年十一月准軍機處咨據定西將軍達爾黨阿等㕘奏領運口糧之遊撃對齊沿途遲滯傷損牲隻途遇差迎之人並不親身運至即私回巴里坤等因欽奉上諭交臣拏解來京當即知㑹巴里坤大臣拏解日久未到經侍郎阿里衮准副將軍兆惠咨覆對齊於十月至濟爾哈朗正値撤兵其沿途有無遇賊陣亡或被衝散無憑查察本年九月阿里衮復准兆惠等咨沿途𠞰賊並無對齊之信臣查原任遊擊對齊既輾轉行查無憑拏解理合奏明奏入得㫖下部知之辛酉申諭辦理準噶爾回部本末上諭大學士曰逆賊阿睦爾撒納渡河溺死之事悉屬子虚昨已有㫖宣諭中外矣在逆賊之由哈薩克敗逃或竟投入俄羅斯或又逺竄他處議論紛然此時原無實據如果投入俄羅斯則我朝從前與俄羅斯定議不留逃人阿睦爾撒納乃叛逆之渠魁罪大惡極尤非他逃人可比何可置之不問以情理論之在俄羅斯素守舊約自應即為縛獻今理藩院行文向索果能遵㫖送出固屬甚善若文移往返稍有稽遲亦惟相機酌理物來順應朕於此事不設絲毫成見非以阿睦爾撒納一犯又欲用兵於俄羅斯為窮兵黷武之舉也但軍國重務諸王大臣皆為朕倚任之人自宜咸使與聞如有所見亦可據實直陳以備采擇乃大學士史貽直則有棄伊犁之説此時叛賊未獲與伊犁何涉而陳世倌所奏糧餉馬力將帥三語亦不過紙上陳言即以糧餉言之乃綠營中所謂兵行糧隨之陋習耳試問邇年來西路進𠞰曾有轉運之勞乎國家一切經費賞賚賑卹之需曾有以軍興而稍為減省者乎是以朕辦理此事之始末尚未領㑹因令莊親王等十六人公同酌議乃其所議亦俱未中肯綮無一良謀定見可以為朕分憂者朕於準噶爾一事初雖機有可乗因慮任事無人是以遲回審顧不得已而後辦理及伊犁既已平定朕意原不過就其四部分封四汗以示羈縻而已前所撰太學碑文及封四汗之詔具在此諸王大臣所共知共見者至阿睦爾撒納叛逃遂煽動降人變生意外因緣輾轉以至今日揆之事機實有不能中止之勢而衛喇特之衆或誅𠞰或病亡即舉而畀之一人且無可授之者此或者上天將以全部衛喇特賜我國家耳即如副都統阿敏道領兵前往葉爾羌喀什噶爾地方竟為兩和卓木誘殺此豈有不行征討之理而内外諸臣未必不以阿敏道之死既已加恩優卹何必因一人而用兵又滋勞費此言朕固知之殊不思諸臣設身處地如使已為阿敏道㝠㝠之中其能甘心乎且國家有何不足有何不得已而朕竟忍心於死事之臣而不為之復仇也昔樊噲請以十萬衆横行匈奴季布以為可斬此在漢時則然而非所論於我大清堂堂之天朝乃甘以唾面自乾為自全之善䇿何為者哉集思廣益固期於事有濟若徒築舎道旁不若姑置之待朕之自為應機决策耳將此通行傳諭知之臣等謹案伊犁平定以後皇上仁示綏懐即欲分封四衛喇特撫其餘衆各予安全乃阿逆偝徳叛逃以致煽動降人再加征討則逆賊之喙走逋逃實準部全局所繋有不能稍緩窮追者乃忽傳言溺死順徳訥等方信以為真而睿照如神燭知其妄未幾果聞其竄入俄羅斯境是鬼蜮伎倆已無所遁形況俄羅斯素奉不納逃人之約則執言索取彼且無辭又何庸過為顧慮至其事之進止操縱相機籌勢早已定自淵衷及䝉宣示咨詢而發言盈廷無一人能中窽要迨俄羅斯呈獻逆屍益欽聖明鑒事銖黍不爽而宸㫁之成實非諸臣拘墟淺陋所能仰窺萬一耳至如回部逆酋負恩反噬戕我王人尤聲罪致討所必及若稍存姑息何以渫士氣而慰忠魂恭繹諭㫖設身處地之訓凡有血氣心知者疇能不意恧而顔泚哉壬戌上幸南苑行圍命哈薩克使臣亨集噶爾等隨侍觀圍諭陜甘借帑採買馬匹應扣銀兩分别豁免展扣上諭大學士曰前因陜甘二省官兵採買撥解馬匹及各標營摘缺買補借動公帑若依限扣還兵力未免拮据降㫖該督應作何展限加恩之處查明具奏今據黄廷桂奏陜甘二省滿漢各標營借墊未還銀三十五萬九千三百兩零其解送馬駝添補口食盤費等項除季餉坐扣外尚未還銀六十萬八千三百兩零等語此所奏借墊未完之三十五萬餘兩著加恩免扣以示優恤其坐扣未還之六十萬餘兩著酌量分别年限按期展扣以紓兵力該督撫其善為經理務俾均霑渥澤以副朕加惠邊兵至意該部即遵諭行癸亥申諭定邊右副將軍兆惠等定議㑹兵進𠞰事宜上諭軍機大臣曰兆惠等奏稱帶兵前赴闥勒竒博羅布爾噶蘇策應成衮扎布協力擒𠞰巴圖爾烏巴什等餘兵留與富德搜查阿睦爾撒納守候差往哈薩克之使臣信息等語先經諭令兆惠帶兵㑹同成衮扎布進𠞰令富德在彼候信後因成衮扎布奏報數日未到復諭伊二人帶兵前往迄今仍未奏報深為厪念兆惠不必候成衮扎布等來信即合兵協力進𠞰富徳與其在俄羅斯哈薩克界上坐候信息莫若帶兵來迎沿途搜𠞰賊衆或於兆惠所至接應或由塔爾巴噶台相通察罕烏蘇路徑前往則各路有兵愈覺聲援相接伊等可相機商酌如三路合兵一處即有三千餘人賊雖俱到伊犂計其妻孥外亦不過二三千人且衆心渙散易於殄滅如一時不能盡𠞰即遵前㫖收兵暫回將軍成衮扎布等即來京請訓至屯田一事厄魯特不習耕作須用回人及綠旗兵丁亦著㑹議具奏甲子賜哈薩克阿布賚等勅書奉天承運皇帝勅諭哈薩克汗阿布賚阿布勒比斯爾等遣使亨集噶爾塔納錫阿塔海烏穆爾台都楞阿蘭扎拜克奈等於熱河朝覲朕加恩筵宴擬從行在遣回而亨集噶爾等懇請來京是以令其隨駕入都重申宴賚念阿布賚等逺在外藩若照内地扎薩克授以爵秩恐爾等有拘職守仍依爾舊俗各安游牧庶無擾累若爾等遣使入覲朕不靳恩賞至爾來使奏稱塔爾巴噶台原係爾等舊游牧懇恩賞給等語此地新經平定尚屬荒閒朕本無所惜但爾等甫効歸誠未有功績若即行賜給於國家體制未合爾心亦必不安爾等果將逆賊阿睦爾撒納擒送前來自當加恩賞給爾使臣來時正値大兵絡繹前進是以由西路行走今當冬季撤兵之期恐長途防䕶稍疎賞賜爾等物件致有遺失兹特派散秩大臣和碩齊巴圖魯侍衛富錫爾穆倫保帶領索倫䝉古兵丁䕶送爾使由額爾齊斯塔爾巴噶台至古爾班察爾其賜爾阿布賚阿布勒比斯衣物若干使臣到日爾等祗受又賞來使七人衣物若干及使臣隨僕等市買物件共賞銀千兩俱諭爾等知之嗣後勉抒誠悃自必賞加恩澤永享無窮之福特諭命送克勒特總管根達什等來京上諭軍機大臣曰阿里衮等奏稱侍衛寧古里等將克勒特人衆送至巴里坤其總管根達什副總管莽蘇爾及男子九百餘婦女一千七百餘俱送至肅州照前次辦理已行文黄廷桂等語甚屬拘泥從前辦理厄魯特者因其畏威降服心懐叵測今克勒特等人衆與沙喇斯瑪呼斯等游牧同行並未逃叛尚屬可憫著速傳諭黄廷桂俟根達什莽蘇爾等到日曉諭云爾等降人多難憑信巴里坤大臣原欲照例辦理大皇帝憐爾等尚屬安靜恩㫖送入内地養育即將伊等妻孥親戚同送來京其餘人如全到肅州亦不可安插一處或分賞鄰省官兵如一省難容即分發數處亦可并諭阿里衮等知之瑪呼斯得木齊達什敦多克收楞額庫克新等以呈報沙喇斯叛信授侍衛職銜仍酌賞銀兩其隨僕十人於軍營聽候委用乙丑訓諭定邊將軍成衮扎布等上諭軍機大臣曰成衮扎布等奏稱現在領兵至伊犁河因奏報逾期未回查係臺站㫁絶即於濟爾哈朗等處新設臺站并將節次奏報補遞等語閱伊等屢次奏到事件尚無端緒一意遷延即如明瑞色布騰巴爾珠爾雖應派令軍前効力但伊等初履行間豈能專倚𠞰賊奏内據明瑞等報稱追賊至伊犁河候副都統由屯兵到合力前進及由屯已到正在整理器械又因將軍處差人到來是以守候等語若果整理齊全應即速行追𠞰尚何守候之有又據愛隆阿報稱𠞰賊之厄魯特博和勒即殺宰桑吞圖布之人等語從前伊等奏稱博和勒往投巴圖爾烏巴什因其擅殺宰桑遂行殺戮等語與此次奏報不符又所奏捉生詢問察卜察里嶺口有步行踪跡等語其後來供吐若何未經奏明此數事俱屬既往亦無闗緊要但伊等心神瞀亂辦理周章之處即此可見今特為指出著於便中覆奏前曾諭進𠞰之時著鄂實同往何以止明瑞愛隆阿前去亦著明白回奏此次雖據稱𠞰殺賊衆數百人而渠魁總未弋獲宜觀後效以定功罪伊等接到此㫖能即時進𠞰固善如不能即暫時撤兵過冬所有陣亡及帶傷人員著查明優恤其厄魯特都喇勒哈什哈察罕莽鼐索倫阿卜坦察等見河岸步行數賊即渡河擒拏尚屬奮勉或應賞翎及賞給銀兩之處著將軍成衮扎布酌量辦理命駐劄巴里坤辦事大臣阿里衮㑹同滿福進𠞰上諭軍機大臣曰昨傳諭阿里衮安接臺站𠞰殺嗎哈沁等其諭成衮扎布之㫖亦發與阿里衮轉交今覽成衮扎布等奏摺知巴顔阿滿等臺站尚未接續現在軍營事件俱由額林哈畢爾噶馳遞則滿福之兵諒難𠞰賊阿里衮接到此㫖即帶兵前往與滿福㑹合共𠞰沙喇斯瑪呼斯等賊軍營奏報既由新設臺站馳遞則伊等發交軍營之㫖亦於此路發往至沿途盜賊未除吐魯番辦運軍營口糧更當加意照管其巴里坤撥送羊隻現辦撤兵無庸多發阿里衮如已起程著豆斌遵照辦理亦傳諭雅爾哈善等知之丙寅定邊右副將軍兆惠等疏奏哈薩克情形及擒送叛賊烏勒木濟兆惠等奏言據額爾克沙喇努三等報稱七月初一日入哈薩克游牧遇頭目多羅特拜報知阿布賚於二十二日相見阿布賚跪請聖安我向阿布賚云爾等歸降大皇帝深為嘉悅如頭目人等欲邀恩賜封號即開列部落姓名報知轉奏阿布賚具言逆賊阿睦爾撒納被圍脱出之事告以將軍大臣等不獲阿逆㫁不撤兵阿布賚請問將軍等來書帶領官兵協同搜捕之故答云爾處久未擒送故欲遣我兵相助又恐驚爾游牧先行告知阿布賚約於後日㑹議至日阿布賚告以現在實無阿睦爾撒納其請賜封號約明日再議次日阿布賚遣人告病十餘日未相見因向伊屬人訪問有云阿布賚等與阿睦爾撒納約誓不便擒獻八月初九日往見阿布賚備述利害阿布賚指子弟為誓因問逆黨哈舟之宰桑烏勒木濟何以未見擒送阿布賚云聞在霍集伯爾根處即遣人往取自此十數日與阿布賚相見將鄂爾圖玉斯烏拉玉斯齊竒玉斯三部落頭目開列名單阿布賚又云將軍大人等曾告言大皇帝仁恩不改我等制度更為感戴因問及行期告以必獲阿睦爾撒納始可回報阿布賚又云聞阿睦爾撒納有逃入俄羅斯之信已遣人往探等語又據額爾克沙喇等續報阿布賚請於烏隆古地方將馬匹易換貨物告以道逺商販不便約於明年七月在額林哈畢爾噶烏魯木齊等處交易等語臣等伏思阿睦爾撒納已逃入俄羅斯額爾克沙喇等不必久住哈薩克應請撤回至烏魯木齊現在酌議屯田與哈薩克貿易甚為有益臣兆惠擬於九月初十日起程向博羅塔拉布爾噶蘇台㑹合成衮扎布等値哈薩克遣使將烏勒木濟送到查係始終黨助阿逆要犯派員拏解送京十四日將哈薩克來使遣回即起程前往奏入報聞諭兩路將軍大臣籌畫進𠞰事宜上諭軍機大臣曰兆惠奏稱伊等俟哈薩克來使起程即領兵前㑹成衮扎布等語想此時已合兵一處矣但時値冬寒未必即能進𠞰或遵朕前㫖將兵撤回至哈薩克曾有拏送巴圖爾烏巴什之言但從前哈薩克尚為所敗且成衮扎布捉生詢問俱云綽和爾烏喇特昂吉岱等賊俱於八月初往投巴圖爾烏巴什賊勢頗衆仍須發兵進𠞰厄魯特情形青草未生自不移動應選兵一二千人於明春前往沿途𠞰賊收其牲隻於朱爾都斯牧放㑹合辦理回部之兵自然聲勢雄壯但巴圖爾烏巴什聞已逃往沙喇擘勒伊等過冬地方未定應計所駐之地於三月十五日以前可到沙喇擘勒即將起程日期行知黃廷桂將馬匹豫為趲送至各處兵丁合計若干𠞰巴圖爾烏巴什等賊需用若干平賊後約於何處㑹合辦理回部官兵㑹合後兵數頗多有無餘兵應令駐候更代俱著早為酌議不必候來京定奪伊等定議具奏後成衮扎布帶定邊將軍印來京兆惠右副將軍印交雅爾哈善管理羅卜藏多爾濟明瑞色布騰巴爾珠爾亦於將軍大臣後作為一起前來福齡安亦隨伊兄明瑞來京旺布多爾濟在軍前數載應暫為休息著於阿濟必濟路回伊游牧前諭富德帶兵接應兆惠今既撤兵亦無庸前往與成衮扎布等同來至額爾克沙喇努三等在哈薩克索取阿睦爾撒納今阿逆已逃入俄羅斯著富德行文撤回額爾克沙喇此次頗屬奮勉亦歸伊游牧休息可傳諭富徳知之諭大學士管陜甘總督黄廷桂烏魯木齊屯田事宜上諭軍機大臣曰兆惠等奏稱烏魯木齊地方可以耕種又與吐魯番相近若哈薩克往來交易亦屬甚便今陜甘馬匹仍須多備請於明年哈薩克馬匹到日前往交易等語著黄廷桂於緑旗兵内多選善於耕種之人發往烏魯木齊明春即令試種地畝量力授田愈多愈善即遵諭速行仍將選派官兵人數及督率員弁指交地畝陸續奏聞其送至巴里坤豫備交易之緞布亦著即速起運兆惠奏摺併發諭署定邊左副將軍策布登扎布辦理烏梁海事宜上諭軍機大臣曰策布登扎布等據總管哈克圖報稱招降阿勒坦淖爾四得秦之烏梁海伊等在準噶爾舊例每户納貂䑕一個後經俄羅斯索取並未給與今情願歸附輸納税賦等語甚可嘉憫著䇿布登扎布查明四得秦頭目若俱係得木齊則授為佐領等官其哈克圖加恩賞給孔雀翎併酌量賞給緞疋至察達克屬下烏梁海原未納賦與新降之人似屬不均從前伊等每户原納準噶爾貂鼠六個後經減二交四今著加恩止納二貂俱交與莫尼扎卜傳諭併計其户口若干應納貂鼠若干呈報具奏其察達克屬下既俱納賦則伊等亦應給俸亦交莫尼扎卜查辦按其品級照内地官員減半支給從前辦理烏梁海事務專委策布登扎布今著車木楚登扎布一同管理前令伊回游牧休息今既同察達克等辦理烏梁海博和勒等事自應奮勉前往効力竣事之後再回游牧又諭曰策布登扎布據莫尼扎卜等報稱烏梁海博和勒等歸附尚屬游移據察達克等請派兵四百名前往招服應請派布延圖軍營索倫喀爾喀兵一百名令車木楚克扎布帶領前往所辦甚是已傳諭車木楚克扎布矣但朕因納穆扎爾等所奏曾令回游牧休息想已起程著策布登扎布即將此㫖速傳車木楚克扎布仍回軍營可也諭山西巡撫塔永寧辦給降人籽種上諭軍機大臣曰策布登扎布奏達什達瓦屬人及扎哈沁等所種麥石惟大麥有收僅供食用未餘籽種可傳諭塔永寧照例辦給達什達瓦屬人籽種一百五十石扎哈沁等籽種一百石噶爾丹達爾扎等籽種五十石伊等所種地畝氣寒霜早俱用大麥為宜速為運送毋悮農時平定準噶爾方略正編卷四十四
