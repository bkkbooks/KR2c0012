body:
  text: 乾隆二十六年春正月壬寅恩免甘省滿漢各營辦解馬匹預借銀兩上諭大學士曰甘省連嵗承辦軍需兵民俱為出力其民間應徵錢糧已節年蠲免而昨嵗雨暘時若穡事大豐閭閻諒紓拮据惟滿漢各營厯年餧解馬匹尚有預借銀兩雖屢次加恩豁免至八十餘萬猶有九十餘萬之多應於各該營俸餉内扣還苐念兵弁等日用攸資按限坐扣必致艱窘兹大功既蕆恵愷宜宣所有預借銀兩著再加恩悉予豁免用示朕體恤兵力至意乙巳命解送烏魯木齊馬匹於伊犂牧放上諭軍機大臣曰安泰等奏稱烏魯木齊所有馬匹頗多須䝉古兵丁牧放請㫖於内地調取等語現在伊犂設立牧場䝉古兵丁甚多則烏魯木齊馬匹牲隻皆可解送伊犂交與阿桂編羣孳息著𫝊諭安泰阿桂等知之丙午喀什噶爾辦事都統侍郎海明疏奏拏獲逃犯烏朗噶等海明奏言臣前奏拏獲逃犯烏朗噶之家屬七口隨行文官長保等令其嚴拏烏朗噶務獲十一月二十日據報二十六日在冲噶巴什之扣喀爾嶺追及逃犯等俱藏匿山險二十七日夜大雪官長保等同布魯特藍翎侍衛䝉古勒囘人海爾圗等登山将烏朗噶及家屬十五口擒𫉬詢據供稱因曽管伯克霍集斯家務今聞将伊屬人送往京城是以挈眷逃走等語除将烏朗噶等解送阿克蘇辦理外謹将此次拏獲逃犯之官兵囘人等列單具奏奏入上諭軍機大臣曰官長保從前獲罪本應正法姑予革職自効此次拏獲逃犯尚屬奮勉著加恩授為藍翎侍衛冲噶巴什之阿瓦勒比等甚屬出力著分别賞給緞疋戊申參贊大臣阿桂等疏奏哈薩克貿易情形阿桂等奏言十一月二十五日據洪郭羅鄂博卡倫委貟報稱有哈薩克八十餘人帶馬五百餘匹前來貿易臣等𫝊該頭目阿里等進見詢係哈木巴巴遣伊子呼都雅爾同來臣等令都司陳聖謨等作為商人以緞布交易畢於二十九日遣囘奏入報聞己酉議解送伊犂牲隻事宜軍機大臣奏言查阿桂等請買喀爾喀牛羊駝隻編設牧羣經臣等議以恐礙喀爾喀等生計仍照原議從達里剛愛等處牧羣揀選送往但路遥不無疲乏正在遵㫖籌議適将軍成衮扎布來京㑹同商酌據稱烏里雅蘇台有官駝一千六百隻牛二千八百隻羊二萬四千餘隻䝉古等舊欠牲隻現在陸續交納等語臣等擬将阿桂所取牲隻即於前項内㨂選送往既無礙喀爾喀生計又可省牧羣逺送之勞至編羣解送必須間隔行走始不致蹂踐水草而官兵亦易於照看其烏里雅蘇台缺額應行文牧羣總管等照數送往抵補再從前因解送牲隻請㫖特派侍衛等官今既由烏里雅蘇台解送即以該處察看水草侍衛數貟扎薩克一貟照看官兵緩行解送其抵補烏里雅蘇台牲隻亦請令該總管等派出官兵俱照例給與行糧及整裝銀兩所有派出在京侍衛應停其前往奏入上從之乙卯命陞賞前軍參領富虎及商伯克墨墨氐敏等喀什噶爾辦事都統侍郎海明奏言前奉諭㫖查拏搶掠臺站賊黨哈子莫斯和卓等務獲臣訪得莫斯和卓逃往霍罕伊子現在布魯特即行文額爾德尼伯克令将莫斯和卓拏解此次派富虎至布魯特明伊勒哈處查拏逃犯烏朗噶因訪得莫斯和卓之子瑪瑪第斯敏呢雅斯和卓之長子呼岱巴爾氐次子阿舒爾藏匿處所隨同商伯克墨墨氐敏前鋒校雙星保等前往将瑪瑪第斯敏等全行擒獲又據布魯特冲噶巴什等囘人報稱貿易至布魯特之薩雅克薩爾巴噶什遇三十餘人搶刦等語臣亦飭富虎查辦據明伊勒哈遣伊子瑪木伯特等将為首之瑪爾喀拜為從之沙巴圗等盡行擒獲瑪爾喀拜情形頑梗直供不諱囘衆等懇請除此惡賊因即斬决梟示沙巴圗照囘法斬其手指所搶貨物全行查給商人領訖奏入上諭軍機大臣曰富虎此次因偵緝逃犯烏朗噶訪得搶臺賊黨莫斯和卓之子瑪瑪第斯敏等藏匿處所即領官兵囘人前往全行擒獲甚屬可嘉著加恩賞給副都統職銜又諭曰海明奏商伯克墨墨氐敏托古薩克之密喇卜伯克巴巴和卓俱自備資斧前往布魯特為富虎嚮導安撫衆心偵獲賊犯等語墨墨氐敏等抒誠効力甚屬可嘉著加恩賞緞各二端仍候應陞之伯克缺出補用訓飭都統侍郎海明調赴阿克蘇辦事以左都御史永貴辦喀什噶爾事務海明奏言本年六月邁喇木作亂時冲噶巴什之烏黙爾比率屬搶掠安集延商人牲隻銀兩逺遁及阿瓦勒比自京轉囘臣委令查緝今據富虎報稱聞得烏黙爾比在薩雅克即行詢問據供原搶銀一千兩除阿瓦勒比索囘四百兩外尚存二百兩其餘係衆人分用等語将烏黙爾比家口帶來喀什噶爾臣即派伊沙噶伯克阿卜都喇伊木等向分用銀兩之布魯特等查追其烏黙爾比係從前擾亂之時於卡倫外搶掠若照瑪爾喀拜一體辦理情罪稍有不同臣愚見請将烏黙爾比之職銜革去或交阿瓦勒比管轄或交竒卜察克布魯特散秩大臣阿竒木管轄伏候訓示奏入上諭軍機大臣曰海明奏稱搶掠安集延商人貨物之瑪爾喀拜已經正法其從前搶掠安集延之烏黙爾比情罪稍有不同請革退職銜交與該管約束等語所辦非是冲噶巴什之布魯特乃喀什噶爾所屬與外藩囘人不同必宜賞罰嚴明始足以昭懲勸即如阿瓦勒比抒誠効力既經加恩奬賞而烏黙爾比乗亂搶掠自應正法示懲乃僅請革職管束甚屬姑息著将烏黙爾比派員看守送京又諭曰海明辦理囘部事務多未妥協即如從前葉爾羌伯克等以鄂對不稱阿竒木之任請將額敏和卓補授一事自應嚴行查辦乃商之舒赫德方且㳺移不决以為可不奏聞甚屬非是朕念其甫經辦事姑從寛申飭此次又復姑息是海明竟不能奮發有為喀什噶爾地通安集延等處與布魯特等接壤較之葉爾羌雖通拔達克山相距尚逺者其情形尤為𦂳要辦事大臣必得精明果斷之人遇事始能妥協海明不稱喀什噶爾辦事之任現命永貴前往更代舒赫德但抵任仍需數月著𫝊諭舒赫德即赴喀什噶爾辦事令海明赴阿克蘇與和其衷同辦事務看來阿克蘇辦理伊犂屯田囘人運送什物尚不甚難俟永貴抵喀什噶爾舒赫德将現辦章程交代即行囘京俱著𫝊諭知之丙辰賜哈薩克阿布賚等勅書皇帝勅諭哈薩克阿布賚阿布勒瑪木比特爾等使人卓勒巴喇斯等與侍衛納旺俱安善前來朕即召見加恩宴賚錫宴時賜爾阿布賚阿木勒瑪木比特蟒錦緞疋器什茶芽各若干交使人齎囘其各祗受并賜來使翎頂冠服緞疋器什銀兩有差至爾等所奏朕已鑒悉從前巴魯克巴圗爾搶掠烏梁海等駐劄烏里雅蘇台将軍欲發兵問罪朕念爾等素稱恭順不允所請特命侍衛納旺前往諭令拏送罪人查還所掠爾阿布賚即同納旺親行查辦送還烏梁海人口牲隻什物又遣使入覲代巴魯克巴圗爾請寛朕為天下共主凡外藩歸附人等果能自知其罪改過遷善亦姑予矜全惟怙終不悛始加征討今巴魯克巴圗爾既惶懼祈求而爾等又専使奏懇朕恩尚屬恭順巴魯克巴圗爾著免其拏送治罪嗣後爾等惟加意約束所部各守封疆善圗生計勿謂此次有請即允遂妄圗僥倖越境盗竊斯時将軍大臣等奏請發兵朕亦不能姑息從事必致擾爾㳺牧於爾復有何益爾等當以朕意徧諭所屬俾知遵守再爾等使人拜克奈等轉囘謬言愛古斯地方已䝉大皇帝賞給哈薩克㳺牧經伊犂大臣查詢具奏從前使人奏請在塔爾巴噶台游牧朕即諭以不應越境且載在勅書而爾等屬人仍造言生事若此是徼倖之心尚未止息已諭伊犂大臣等有哈薩克越境㳺牧者即行驅逐今卓勒巴喇斯等所奏又有南界綽爾郭西界沙喇擘勒中抵勒卜什等語凡此數處皆厄魯特故地而爾使謂哈薩克俱有㳺牧隠躍其詞希圗窺伺更屬儌倖試思我國家以大兵平定之地豈可任爾等侵踞況爾等前為厄魯特所擾雖現在㳺牧之處亦逺徙避去仍不能免於搶掠今干戈寧静共樂昇平爾等㳺牧並非狹小乃妄行陳奏朕必不允是徒有貪得見小之名倘妄生窺伺或轉至失其所有甚無謂也至爾等所奏哈薩克全部已為臣僕願世世子孫永効悃誠乞賜璽書為劵等語朕嘉恱覽之爾等果能遵朕所頒勅諭約束部衆各安生業自必永綏福禄垂於萬年矣又爾阿布賚使人奏云爾所屬有三人為烏梁海所獲乞查出發囘所奏未為合理即如巴魯克巴圗爾係獲罪之人理應拏送尚加恩寛免此三人既為烏梁海所豢養何必𤨏𤨏校計如必欲查還可将巴魯克巴圗爾拏送前來朕再降諭㫖適已命爾使𫝊諭因附及之爾等其各宜領悉特諭戊午命停購巴里坤撥缺馬匹由烏魯木齊等處送補上諭軍機大臣曰據五吉等奏稱巴里坤牧放之馬已揀選二千匹解送阿克蘇至買補缺額則現在價值頗昂請於䝉古及商販等馬匹内酌量購辦等語巴里坤馬價既昂而烏魯木齊伊犂所易哈薩克馬匹甚多著𫝊諭五吉将巴里坤缺額馬匹停其購辦仍咨行安泰阿桂等将來該處馬匹漸多即送往巴里坤再多則送至内地以補營伍臺站之缺額均為有益嗣後巴里坤惟購辦牛羊以裕駐防屯田之需命賞給來投之厄魯特等馬匹價值上諭軍機大臣曰安泰等奏自哈薩克來投之厄魯特阿玉什鄂竒勒等家口騎䭾馬四十餘匹除量行變價為伊等製備衣服外餘俱編入牧羣等語伊等既苦哈薩克役使逺道來投所有編入牧羣馬匹仍著給與價值以示體恤命陞三等侍衛齊克慎為二等侍衛上諭軍機大臣曰前因舒赫德接濟伊犂口糧妥協交部議叙今據奏稱侍衛齊克慎在北路出兵多年一切公務實心奮勉所有交辦阿克蘇事件皆能領略妥協願停臣議叙将齊克慎陞用等語齊克慎既効力多年前經辦理進𠞰囘部糧餉今又㑹同囘部伯克等将續送屯田囘人糧餉亦俱辦理妥協曽經兩次保題俱降㫖於應陞之處開列著加恩授為二等侍衛以示鼓勵議闢展等處酌留屯田兵丁及籌辦承種餘田各事宜御前侍衛副都統安泰等奏言闢展喀喇和卓托克三等處係新疆往來要路請留屯田兵六百名仍量留供應差遣兵丁餘俱發往烏魯木齊陸續前往伊犂其空出地畆賞給吐魯番公素賚璊所屬分種所積糧石借給貧乏囘人以為籽種俟秋收後還官照時價出糶歸入正項錢糧銷算奏入得㫖軍機大臣議奏尋議安泰所奏俱係酌照臣等原議辦理惟闢展等處屯田兵丁遷移後空出地畆皆係官為開墾所留兵丁既不敷耕作應召募囘人承佃不便無故賞給囘人請交與安泰德爾格等查明空出地畆若干作何召募承佃交納官糧之處再行詳議具奏奏入上從之庚申命派貟䕶送哈薩克使人等囘本境㳺牧上諭軍機大臣曰哈薩克使人入覲轉囘應派貟䕶送納旺三濟扎卜對齊往返已及一載不必再令前往著乾清門侍衛烏爾圗納遜帶領使人行至烏里雅蘇台交成衮扎布等另派妥貟送伊等過烏梁海㳺牧抵其本境即行轉囘甲子命喀爾喀貝子品級額爾克沙喇辦理伊犂牲隻上諭軍機大臣曰解送伊犂牲隻已派額爾克沙喇照管伊現在來京著准其馳驛前往丙寅諭陜甘總督楊應琚查辦解送孳生羊隻倒斃過多情節上諭軍機大臣曰據德爾格奏哈密送羊一千五百隻内例斃六百七十二隻解貟賠補僅及四分之一現在行文楊應琚永寧等語此項羊隻係牧放孳生非専候食用急需趲解者可比至哈密時既屆天寒草枯自應酌量於附近處所暫留牧放乃不俟春融即行起程在永寧等不過以羊隻一經出境即與伊犂無涉殊非急公敬事之道至解員所稱道逺不能飽飼以致倒斃亦係摭飾之詞著𫝊諭楊應琚将解貟張文學沿途照管實在情節及作何著落賠補之處速查具奏并著永寧明白囘奏戊辰參贊大臣舒赫德疏奏添派伊犂防兵起程日期舒赫德奏言本年派出駐防伊犂健銳營前鋒校一貟驍騎校一貟前鋒三十七名察哈爾總管一貟佐領一貟兵八十九名厄魯特兵二十四名効力之原任總管舎通額等四名共官兵一百五十八名照例給馬二百五十匹駝四十六隻鹽菜銀兩六個月口糧羊隻三個月每五人給帳房一架并軍器等物又伊犂屯田都司一貟守備一貟千總二貟把總二貟外委把總二貟兵四百名其鹽菜口糧等項與駐防兵同因伊等将來造屋居住每十人先給帳房一架其馱載口糧軍器籽種農具等項共給牛一百九十六隻駝九十一隻兒騍馬五十七匹騸馬一百九十五匹此次官兵及屯田囘人俱辦理已竣於正月初三日派副都統伊勒圗侍衛棟保蘇魯克沁雅賽帶領自阿克蘇送往伊犂所有撥往屯田囘人户口什物及䕶送起程之伯克等職名謹列單恭呈御覽奏入報聞己巳命奬賞辦送伊犂屯田之伯克囘人等上諭軍機大臣曰上年舒赫德等辦理伊犂屯田囘人起程朕於囘部各城急公協助之伯克等特命分别賞賚其囘人等蠲免常賦十分之一今續派囘人五百戸著𫝊諭舒赫德将急公協助之伯克囘人等俱照前例辦理葉爾羌辦事都統新柱等疏奏徵收錢糧足敷公用情形新柱等奏言臣等前奏葉爾羌等處徴收正項及入官地畆錢糧是否足敷公用俟本年辦竣酌定今合計葉爾羌和闐大臣官兵等共二千五百四十七人所需鹽菜銀四萬四千八百兩有竒口糧等項一萬四千二百十七石二斗一升有竒其葉爾羌徵收普爾錢文共三萬三千六百騰格糧石二千八百帕特瑪又入官地畆收租一千餘帕特瑪和闐徵收錢文除支用外共九千零二十五騰格糧石一千五百帕特瑪總計二城徵收錢文可作銀三萬零四百四十六兩四錢二分八釐有竒放給鹽菜銀兩仍不敷一萬四千三百五十五兩五錢七分一釐有竒但二城糧石共五千八百帕特瑪有竒以一帕特瑪準五石三斗共得三萬零七百四十石除支給口糧外仍餘一萬六千五百二十二石七斗九升酌照時價可補銀兩之缺此外仍有餘存即為修造軍裝之用奏入報聞命嚴飭都統侍郎海明軍機大臣奏言據海明奏稱舒赫德新柱額敏和卓等請將阿爾虎之阿竒木伯克布魯特散秩大臣阿竒木調授塔什密里克之阿竒木伯克查布魯特阿竒木現在㳺牧頗逺不能兼管令伊弟前往署理臣正在留心偵探至塔什密里克等處並非要路惟阿爾虎自本年八月以來布魯特吐魯番烏什貿易人等行走六次若伊等所見果當又安敢以係臣所管妄生拘泥祈勅下新柱額敏和卓嗣後辦事可否與臣商確辦理等語欽奉諭㫖交臣等察議查從前舒赫德咨商新柱以塔什密里克等處與布魯特接壤而散秩大臣阿竒木係布魯特人隨臣兆恵臣富德等實心効力曽奉恩諭俟有布魯特接壤之伯克缺出補授是舒赫德等所奏原不因布魯特等往來行走之多寡也今海明因現辦喀什噶爾事務而新柱等未經咨商遂行陳奏未免分别彼此又有偵探阿竒木之語似此無故猜疑更恐滋事但業經聖明洞鑒命舒赫德暫往喀什噶爾辦事候永貴交代海明調赴阿克蘇應請行文該辦事大臣等嗣後惟計於公事有益不可稍分畛域奏入得㫖依議海明著嚴行申飭庚午諭參贊大臣舒赫德等酌籌賞給吐魯番囘人地畆事宜上諭軍機大臣曰德爾格奏稱托克三喀喇和卓等處空出地畆賞給吐魯番囘人耕種已飭交素賚璊等語近因安泰奏賞給餘田一事經軍機大臣議以此項地畆皆官為開墾未便無故賞給應召募附近囘人承佃想寄信未到故德爾格照前辦理今應否向囘人撤出及作何酌量辦理著𫝊諭舒赫德令其查核具奏二月乙亥命定屯田官弁補授本處貟缺之例上諭軍機大臣曰楊應琚奏請以現在屯所之提標左營守備馬得亨調補西寧鎮標中營守備所遺貟缺即以西寧鎮屬鎮海營千總趙印補授等語已有㫖允行矣西陲新疆初闢屯務方興現在屯兵服勤率作殊可嘉許況於屯政尢所熟諳若遇本處缺出即以補授在該貟自必益加奮勉而公事亦屬有禆嗣後遇缺需人應令管理屯務大臣即於所轄人貟内㨂選陞用不必移咨該督另行㨂補其内地缺出在屯弁貟作何與内地應陞人貟酌量分缺按次補用之處軍機大臣㑹同該部詳議具奏丁丑命以闢展等處餘糧協濟巴里坤上諭軍機大臣曰據五吉等奏稱巴里坤支給官兵口糧由肅州等處運送殊多煩費請将闢展等處出糶糧石及烏魯木齊等處餘糧俱就近僱覓商人牲隻運送巴里坤以備支給等語所奏甚是年來官兵口糧由内地不時運送者亦因巴里坤等處無可接濟耳今屯田收穫既有盈餘即照五吉等所奏辦理仍𫝊諭闢展烏魯木齊辦事大臣於商駝囘空之便酌量僱覓起運己卯諭參贊大臣阿桂等酌加屯田囘人口糧事宜上諭軍機大臣曰據定長等奏烏魯木齊屯田兵丁較常人所食頗多照例支給尚覺不敷等語已諭於常數之外每人日加米麫五合至伊犂屯田囘人亦與緑旗兵丁同事耕作自當一體加恩著𫝊諭阿桂将伊等應否加給或一二年後視其効力如何再行辦理之處酌議具奏諭烏魯木齊辦事副都統定長等查核屯田倒斃馬匹上諭軍機大臣曰定長等奏去年昌吉羅克倫等處屯田兵三千五百名每二人給馬一匹因哈薩克馬匹不習耕作倒斃将半復以三人給馬二匹為額俟巴里坤解送牛驢至日仍将馬匹撥囘牧羣等語哈薩克馬匹除屯田外無他差遣就令驟難服習亦何至倒斃如許恐有私宰情弊定長等並未查核甚屬疎忽除馬匹額數照所奏補給外前次倒斃馬匹仍行查核倘有别項情節即從重治罪嗣後仍宜加意辦理毋致傷損參贊大臣舒赫德疏奏分派囘部各城侍衛官貟舒赫德奏言軍機大臣等遵㫖将北路卡倫及看閲水草侍衛等减撤二十三貟其所得分例經領侍衛内大臣等揀選人貟遣往伊犂阿克蘇葉爾羌等處以備差遣除在途病故二貟外其達春等二十一人於正月初六日抵阿克蘇臣擬派往伊犂六貟阿克蘇六貟葉爾羌六貟查喀什噶爾亦應派侍衛三貟與軍前年久侍衛等陸續更換奏入報聞癸未諭參贊大臣阿桂酌賞遷移出境之哈薩克等上諭軍機大臣曰據阿桂奏副都統伊柱報稱領兵驅逐哈薩克人等所有附近布木察罕烏蘇勒卜什等處游牧之哈薩克等俱已遵檄遷移現派侍衛官貟查勘額米勒齋爾塔爾巴噶台等處有無哈薩克㳺牧相機辦理等語哈薩克等遵檄即行遷移尚屬恭順宜酌加賞賚以示撫恤著𫝊諭阿桂等将遵檄遷移之哈薩克等部落名目查詢存記伊等有來伊犂貿易者即行曉示云爾等恭順情形業經陳奏奉大皇帝恩㫖嘉奬並加賞賚嗣後惟謹守本境不可踰越仍酌量賞給遣囘諭參贊大臣舒赫德等酌調烏魯木齊馬匹備用上諭軍機大臣曰定長等奏烏魯木齊貿易得馬三千餘匹除留一千匹牧放外餘俱派永德解送伊犂並捜查朱爾都斯藏匿之嗎哈沁等語送馬二千餘匹事闗𦂳要永德照看前往并捜捕逸賊所辦俱妥但伊犂現在貿易所得馬匹頗多而阿克蘇葉爾羌喀什噶爾等處駐防亦需用馬匹著𫝊諭舒赫德等查明各該處馬匹若尚需補足即行文定長於預備伊犂馬内酌定數目調取定長即選派官兵照管解送永德不必再行親往俱著𫝊諭知之都統侍郎海明疏奏喀什噶爾錢糧足用情形海明奏言查舒赫德等前奏葉爾羌等城徵收正項及入官地畆錢糧是否足敷公用俟本年辦竣酌定今合計乾隆二十五年七月起二十六年六月止喀什噶爾英噶薩爾二城大臣官兵通事臺站囘人共二千二百餘人共需鹽菜銀三萬五千七百兩有竒糧石雜項一萬三千一百四十石有竒查二城正項徵收普爾錢文三萬六千四百騰格作銀二萬六千兩尚不敷銀九千七百兩有竒徴收正項糧石及入官地畝共糧二萬六千五百餘石除支給公用外餘糧一萬二千三百六十石有竒合之徴收棉花紅花共折價錢二萬八千九百二十騰格有竒作銀二萬六百兩有竒扣抵不敷之項仍餘銀一萬九百兩有竒是二城所出足敷公用且有盈餘可以接濟别城謹将出入各細數列單恭呈御覽奏入報聞丁亥議屯田人貟陞轉事宜軍機大臣㑹同兵部奏言臣等欽奉諭㫖酌議屯田人貟陞轉事例查論俸推陞由兵部通計内外人貟具奏至題補保舉則係該督撫辦理自應将内地營伍及屯田人貟一體分缺間用方為公當臣等酌議請交陜甘總督嗣後遇有内地應行題補人貟缺出務将在屯貟弁一體較其資俸淺深行走優劣酌定分數於本内聲明備查其保舉人貟亦宜秉公查辦庶勞逸適均而陞轉有階自必更加奮勉於屯政尤有裨益奏入上從之平定準噶爾方略續編卷九
