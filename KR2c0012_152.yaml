body:
  text: 乾隆二十六年八月庚午諭參贊大臣阿桂等速奏追捕塞卜騰情形上諭軍機大臣曰阿桂奏稱詢問從哈薩克來投之厄魯特等據供伊等係輝特屬人為塞卜騰所擒中途抛棄今塞卜騰已入俄羅斯等語所奏殊未明晰昨據阿桂奏伊柱未曽追及塞卜騰伊親領官兵於七月初旬前往額爾齊斯等處捜捕此時曽否起程何以未見奏及今塞卜騰等已入俄羅斯諒阿桂等必速往追索著𫝊諭阿桂嗣後辦理一切事件務宜明白具奏不可稍有含混仍将現在辦理情形作速奏聞辛未諭御前侍衛副都統安泰等籌議烏魯木齊等處屯田事宜上諭軍機大臣曰安泰等奏烏魯木齊現在屯田五處所收穀石甚屬充裕折給官兵願領者少查該處屯田有緑旗兵三千名請以二千差操一千屯田互相更換等語烏魯木齊收穫穀石雖盈餘甚多支用處少但僅以千人屯田則官兵已墾之地又必荒蕪甚屬可惜若不通融籌畫穀石陳陳相因必致朽腐因思該處兵丁俱係三年一換並未挈眷若聴兵丁等移家居住或内地㳺民有願往立業者令楊應琚查辦酌給田畆籽種安插似有禆益即不便如此辦理與其将伊等撤囘内地不若就近移往伊犂屯田著𫝊諭安泰阿桂楊應琚等相度情形妥協酌議再著軍機大臣議奏昨派旌額理阿思哈往代安泰定長今既辦理此事安泰等著在該處仍留數月俟定議具奏後即起程來京癸酉命道貟蘇凌阿協辦哈喇沙爾事務上諭軍機大臣曰昨因納世通在哈喇沙爾年久派達桑阿前往更換但達桑阿係初辦囘部事務恐未能熟悉現在闢展有德爾格等辦事著道貟蘇凌阿前往哈喇沙爾協辦命賞郡王額敏和卓第三子鄂羅木咱卜二品頂帶孔雀翎上諭軍機大臣曰額敏和卓數年辦事軍前伊長子素賚璊次子木薩俱承辦公事其吐魯番等處事務係伊第三子鄂羅木咱卜管理今據永貴奏伊辦理㳺牧約束屬人俱甚妥協著加恩賞戴二品頂帶孔雀翎以示鼓勵丙子參贊大臣阿桂等疏奏伊犂二麥豐收阿桂等奏言伊犂屯田兵八百名每人種大小麥十畆新舊囘人八百户每户給麥種一石兹於六月二十内外二麥皆熟兵丁所種約計二十分以上可得麥一萬六千石囘人每種一石除口糧及來年籽種外應交大小麥十石約可得八千石俟全行收穫得有細數及粟黍收成時再行請㫖加恩鼓勵此皆聖主洪福上蒼黙佑得以雨晹時若百穀用成臣等不勝慶幸奏入得㫖覽奏欣慰下部知之戊寅議鑄給阿竒木伯克等圗記事宜左都御史永貴奏言管轄葉爾羌等城囘人頭目俱有銅石小圗記今囘部蕩平所設阿竒木等伯克俱照内地官制分定品級賞給頂翎辦事大臣等鑄給印信其阿竒木等不便仍用私刻圗記請照各邉省土司之例一體給與印記以昭信守奏入得㫖軍機大臣議奏尋議囘部葉爾羌等城新入版圗辦事大臣俱已鑄給印信其阿竒木等伯克自應一律鑄給圗記凡有公事文移該阿竒木等應同伊沙噶噶雜納齊等伯克署名鈐用但圗記式樣宜加酌定以别等威臣等謹擬將阿竒木等圗記較辦事大臣等印信減小分寸其葉爾羌等處阿竒木伯克向來統轄小城今一體俱為天朝臣僕但品級不同自應量為區别查囘部設立阿竒木共三十一城計其大小酌為三等葉爾羌喀什噶爾阿克蘇和闐為四大城烏什英噶薩爾庫車闢展為四中城沙雅爾賽里木拜庫爾勒玉古爾牌租阿巴特塔什巴里克哈喇哈什克勒底雅玉隴哈什齊爾拉塔克阿斯騰阿喇圗什阿喇古玉斯騰阿爾圗什英額齊盤巴爾楚克沙爾呼勒魯克察克托克三喀喇和卓洋赫克勒品為二十三小城俱給與阿竒木伯克圗記其大城圗記分寸視内地佐領中小等城以次遞減謹擬定字様恭候欽定交該部照例鑄給奏入上從之辛巳議移駐巴里坤等處官兵事宜軍機大臣奏言據侍郎五吉奏巴里坤有屯田緑旗兵一千名雖經墾種而地寒霜早僅收青稞一種故屯田兵亦照駐防例支領鹽菜銀兩兼以粟麥共需銀五萬二千三百兩有竒安西兵丁三千餘名計日遷移俱係折給糧價更不需支食青稞是此項屯田兵丁竟可撤囘交總督楊應琚將安西兵派出屯田以節冗食等語又據陜甘總督楊應琚奏撤囘巴里坤屯田兵丁派安西兵五百名屯田事宜曽商之提督劉順今五吉所奏相符又查巴里坤遣犯四百八十餘名若給與口糧同安西兵屯田亦即敷用再巴里坤地氣雖寒上年曾飭屯田官貟試種豌豆一千畆亦皆成熟若以人力糞治並可種麥等語臣等伏查巴里坤屯田所收青稞僅萬餘石兵丁等既不能全行支食今安西兵又移往該處則所支銀兩米麪尤多即云試種豌豆有收亦未必常年如舊且巴里坤雖屬西北兩路要地但現在烏魯木齊已設駐防兵丁巴里坤又成内地烏魯木齊相距不逺屯田收穫有餘臣等曽議將兵丁情願挈眷者准其同往安西兵丁既與家口同行若於巴里坤留兵千餘人餘俱移駐烏魯木齊情形尤便應行造房整裝各事宜請交楊應琚安泰定長五吉劉順等會商妥議具奏其巴里坤酌留安西兵及遣犯屯田之處俱應如所奏辦理再臣等前議移駐烏魯木齊挈眷兵丁將本營應得錢糧及鹽菜銀兩口糧等項全行支給至巴里坤官兵搭放青稞及所有馬匹夏秋出牧冬春飼秣等事亦請一并交議奏入上從之壬午諭陜甘總督楊應琚辦理肅州遷移囘人地畆上諭軍機大臣曰楊應琚奏遷居吐魯番囘人現已自肅州起程出闗沿途料理護送等語前據該督奏將來囘人起程後所遺熟地肅州民人俱願認墾陞科經軍機大臣議覆令於囘人起程後文明確數按則陞科該督此時自應遵照前奏確勘妥辦其從前𤓰州囘人所遺熟地現在作何辦理之處著一并查明具奏甲申議給哈密大臣闗防軍機大臣奏言據永寧奏哈密辦理軍務以來一切文移俱用總兵官闗防今改副将駐劄闗防亦須繳囘請照巴里坤之例鑄給印信等語查巴里坤既給與管理官兵庫倫事務大臣印信請將哈密辦理糧餉事務大臣亦給與印信祗兼清漢篆文奏入報聞丙戌飭諭哈密辦事侍郎永寧等籌辦補支錢糧錯謬上諭軍機大臣曰阿桂等奏軍營官兵補領錢糧賞項向俱行文哈密巴里坤查核支給今准永寧等咨駐劄各處官兵補領錢糧均由本處支給在哈密等處雖省查核之繁於官兵究無禆益已將伊犂官兵應領之項仍照舊辦理咨覆永寧楊應琚等語所奏甚是官兵補支錢糧俱由哈密等核給既可省内地運解而所需什物即就便平價市買更有益伊等生計若如永寧等所辦均由本處支給先已多一運解之費且新疆物價昂貴伊等支銀入手只顧目前轉致不能接濟是永寧等惟知脫卸查核之責而於公事有益與否全未籌及况辦理此事即變更成例亦當具奏乃徑行定議甚屬錯謬著通行𫝊諭各處駐劄大臣所有官兵補支錢糧仍照舊辦理並詢問永寧等令其明白囘奏丁亥烏什阿竒木阿卜都拉等捐助遷往伊犂囘人牲隻什物命酌量奬賞如例壬辰諭參贊大臣舒赫德等辦理察噶爾等頭目入覲上諭軍機大臣曰舒赫德等奏察噶爾伯克之兄子孟克薩爾巴噶什伯克之兄子雅木古爾齊俱願隨布魯特明伊勒哈入覲並恭進馬匹請㫖遵辦等語孟克等輸忱入覲著准其來京所進馬匹如果堪充上駟即遇便送京若本屬平常何必逺煩人力即留於阿克蘇備用參贊大臣舒赫德等疏奏酌定囘城辦事人貟舒赫德等奏言臣等前将葉爾羌等處事務酌定成規具奏惟各城侍衛與司官筆帖式等官貟未有定制謹會議葉爾羌喀什噶爾地大近邉阿克蘇囘城總滙切近伊犂俱事務繁多擬設隨印辦事司官各一貟筆帖式各二貟専辦囘人事務司官筆帖式各一貟由陜甘同知通判内派出管糧官各一貟庫車哈喇沙爾地當要路錢糧亦多擬設筆帖式各二貟由陜甘縣丞主簿内派出管糧官各一貟烏什及喀什噶爾所屬之英噶薩爾葉爾羌所屬之和闐皆地僻事簡烏什酌設筆帖式一貟餘城令該駐劄大臣等酌量派委具奏至卡倫牧羣及差務均需侍衛擬派葉爾羌喀什噶爾各十五貟阿克蘇十貟以上文武各貟俱照例三年更換並准保舉議叙以示鼓勵如䝉俞允臣等通行各駐劄大臣按照新舊日期畫一辦理其侍衛等照例揀選引見司官筆帖式等交軍機大臣揀選引見派往奏入得㫖如所奏行癸巳葉爾羌茂特色卜伯克塔里卜以輪班入覲中途病故命賞治喪銀五十兩乙未阿克蘇阿竒木伯克色梯巴勒氐等捐助遷往伊犂囘人牲隻什物命酌量奬賞如例九月丙申朔命賞喀爾喀等應賠牛價之半上諭軍機大臣曰成衮扎布等奏稱貝子品級公額爾克沙喇等選牛三千隻前往伊犂中途因時疫倒斃一百八十八頭應著喀爾喀四部落賠補等語解送牛隻倒斃例應賠補但此次因時疫所致並非牧養疎忽著加恩將伊等應賠牛隻減半賞給價銀己亥命賞囘人錫里卜阿三四品頂帶協辦沙雅爾事務上諭軍機大臣曰書山等奏稱沙雅爾囘人錫里卜阿三曽任阿竒木伯克為霍集占所逐隨鄂對在和闐守城拒賊今又協助參將繼善守備鄭國卿等辦送前往伊犂囘人亦屬安協等語錫里卜阿三著加恩賞給四品頂帶協同阿竒木瑪哈黙特辦事辛丑諭參贊大臣阿桂籌辦塔爾巴噶台駐兵屯田事宜上諭軍機大臣曰昨據阿桂議奏塔爾巴噶台等處駐兵事宜具見實心籌辦惟遷移都爾伯特扎哈沁游牧一事不便允行前經巴蘭泰奏将都爾伯特部落遷於舊㳺牧之額爾齊斯續又内移未免紛擾今隨圍之該部落人等俱言現居烏蘭古木之地甚好生計較前富足可見伊等安土重遷巴蘭泰所奏殊屬未協至扎哈沁現在展拓卡倫㳺牧寛廣又將伊等遷於塔爾巴噶台必非所願雖此地竟置之閒曠恐有哈薩克等越界㳺牧但前此越界之人一經發兵驅逐即已移囘則是尚知畏懼即暫不駐兵每年巡查一次有越界者照前驅逐稍有違玩即收其所有以示懲戒諒可無虞朕意塔爾巴噶台雖終須駐兵此時不必太速伊犂官兵在外日久俟新兵更換後耕牧漸有積蓄再行議及始為有益著軍機大臣議奏阿桂在軍前日久今派明瑞領換班官兵至伊犂與阿桂交代其伊犂事務俱照阿桂所定章程辦理阿桂來京休息數年再往代明瑞此時塔爾巴噶台正可駐兵屯田是此事始終皆阿桂之勞績矣伊既於七月起程追捕塞卜騰並𫝊諭阿桂將現在情形作速奏聞諭定邉左副将軍成衮扎布籌辦科卜多駐兵屯田事宜上諭軍機大臣曰厄魯特囘部蕩平烏里雅蘇台事務較前甚簡雖有供應哈薩克來使及照管積貯糧餉祗須酌留官兵不必多為駐劄至卡倫侍衛前已減半今伊犂烏魯木齊各駐官兵亦應將此等侍衛撤囘以省浮費現在該處所貯糧石雖多但不預籌接濟必又煩内地之力烏里雅蘇台雖不便屯田而科卜多向屬可耕之地若令成衮扎布仍駐劄烏里雅蘇台另派參贊大臣在科卜多屯田數年後将官兵移駐将來塔爾巴噶台額爾齊斯等處駐兵便成犄角之勢著𫝊諭成衮扎布等將烏里雅蘇台現在糧石若干足敷官兵若干人之食或裁兵或折價又可省出若干可否全撤卡倫侍衛及科卜多駐兵屯田之處詳議具奏議安揷羅卜淖爾囘人事宜參贊大臣舒赫德奏言尚書公阿里衮從前收服羅卜淖爾囘人未經查辦臣遵㫖行文德爾格等查得羅卜淖爾有兩部落一為喀喇庫勒一為喀喇和卓喀喇和卓又分為五處而喀喇庫勒僅一伯克約束難周請増一貟協辦喀喇和卓五處各一伯克不相統屬請派二貟總管二貟協辦所有伊等屬人共一百八十三户一千七十一名口每年交納哈什翎百枝海倫九張其喀喇庫勒伯克哈什哈請授為該處總管伯克喀喇和卓五伯克内呢雅斯呼里率先歸附伊帕勒人頗明白請授為喀喇和卓五處總管伯克仍各管本處以二貟協辦其三處仍以舊伯克沙特璊呢雅斯什克阿子納管理伊等公舉之克什呼里阿爾蘇霍雅木巴勒氐俱授為協辦伯克就近派委又有素布爾格熟習道路請授為小伯克在吐魯番居住承辦賦役奏入得㫖軍機大臣議奏尋議從前阿里衮收服該部落囘人時因軍務未竣暫歸額敏和卓管轄今囘部蕩平各城俱添設伯克自應一體辦理舒赫德所奏喀喇庫勒喀喇和卓總管伯克三人應請授為五品伯克其舊伯克三人及新補協辦伯克三人與承辦賦役之素布爾格俱授為六品伯克五品缺出由闢展大臣奏請補授六品缺出即行補授具奏所交常賦亦准其照前辦理奏入上從之甲辰御前侍衛副都統安泰等疏奏交代起程各事宜安泰等奏言更換臣等之旌額理阿思哈於七月二十八日抵烏魯木齊臣安泰臣定長将應辦事宜㑹同交代於八月二十日起程囘京查烏魯木齊五村共屯田五萬三百餘畆計大小麥收成自八九分至十分以上約四萬五千九百石有竒又據厄魯特等報知昌吉産硝特訥格爾産磺隨飭配造火藥數百觔尚屬可用奏入報聞壬子申諭御前侍衛副都統安泰等㑹議駐兵事宜上諭軍機大臣曰據安泰定長奏稱由烏魯木齊起程至喀喇和卓奉到㑹議遷移兵丁招徠户口之㫖復囘烏魯木齊等語安泰等駐劄日久熟悉情形故令與旌額理等㑹議此外别無他事議定具奏後即行來京不必在彼守候丙辰命都爾伯特烏梁海等隨圍馬駝仍從官給上諭軍機大臣曰成衮扎布等奏都爾伯特王䇿凌烏巴什烏梁海内大臣察達克等呈稱伊等生計近漸饒裕嗣後輪班隨圍情願自備馬駝扎哈沁公扎木禪之子捫特什亦行呈請等語䇿凌烏巴什等所請具見忱悃深屬可嘉但伊等生計較前雖稍有起色未必饒裕若准其自備馬駝尚恐不無拮据著𫝊諭成衮扎布等辦理都爾伯特烏梁海扎哈沁人等輪班隨圍仍照前給與馬駝俟數年後生計果足再如所請停止官辦仍将加恩伊等之處曉示知之己未命更換伊犂等處領隊大臣上諭軍機大臣曰都統豐安等駐劄新疆日久應派貟更換著派副都統鄂津前往伊犂更換豐安副都統曹瑛更換豐訥亨副都統常岳前往喀什噶爾更換富虎副都統素誠前往烏什更換永慶副都統扎拉豐阿前往烏里雅蘇台更換扎隆阿副都統雅朗阿更換福祿又諭曰海崇阿現在病痊著以總兵官職御前往喀什噶爾更換揚寧議烏里雅蘇台馬匹撥解巴里坤事宜定邉左副將軍成衮扎布奏言查烏里雅蘇台有馬六千八百餘匹又喀爾喀四部落賠補官馬亦多現在需用處少請量撥四五千匹派官兵送至内地牧羣奏入得㫖軍機大臣議奏尋議烏里雅蘇台現在需馬無多自應通融撥解但内地牧羣馬亦足用現議派給八旗及聴直𨽻兵民購買惟來年往伊犂囘部換班官兵應給馬匹巴里坤官馬六百餘匹尚不敷用應請將此項官馬量撥四五千匹送往巴里坤交永寧等牧放備用程途既近調撥最便奏入上從之辛酉命官兵補領錢糧由大臣給照察核上諭軍機大臣曰據永寧奏稱駐劄各處官兵應行補領錢糧經總督楊應琚咨㑹各該大臣以哈密無册籍可稽不便據官兵等呈詞給發應由本處支給今奉飭諭謹將緣由囘奏請將官兵補領之項令各該處造册知㑹等語所辦亦是軍需闗係錢糧若無册籍可稽僅據官兵呈禀即行支給必致冐銷滋弊又費催追之力公私俱屬不便嗣後各該處大臣凡遇官兵補領錢糧務即出具印照以備查核並著通行𫝊諭知之壬戌議入覲囘人馬駝停止官辦事宜軍機大臣奏言查乾隆二十四年囘人漠咱帊爾入覲囘抵哈密經辦事大臣五吉給與官馬駝欽奉諭㫖申飭著賠還一半二十五年新柱等帶領布魯特葉爾羌等處囘人歸程因䭾載牲隻不敷交與永寧淑寳派貟向囘人取價代雇誠以囘部歸誠輪班來京之伯克等已成年例若每次官給牲隻轉覺勞費應請嗣後每年入覲囘人若係賞物行裝牲隻不敷仍派貟代辦至自置什物則皆以原來馬駝䭾載母庸官為辦理奏入上從之乙丑議駐防屯田兵丁事宜參贊大臣阿桂奏言塔爾巴噶台地居厄魯特西北與俄羅斯哈薩克相近自應駐兵屯田查臣等前議來年在瑪納斯等處安設林堡此次換班兵丁将屆伊犂所有籽種口糧亦足擬於癸未年二月初從伊犂派領隊大臣一貟馬兵五百名屯田兵三百名前往駐劄自輝邁拉呼至都圗嶺設卡倫二十一所並遷移都爾伯特扎哈沁等部落以壯聲援每年仍派兵巡查一次至現在伊犂所獲糧石除支用外約餘萬石可符軍機處原議駐兵五千請俟換班兵丁全到再行酌量派撥奏入得㫖軍機大臣議奏尋議阿桂所奏塔爾巴噶台駐防欽奉諭㫖俟伊犂積蓄充裕再行辦理其遷移都爾伯特等㳺牧亦遵諭停止查伊犂及囘城共有馬兵三千一百餘名緑旗兵一萬二千餘名合計屯田之兵居其大半應量為裁撤所餘地畝即召募囘人耕種庶熟地不致荒蕪請交與永貴旌額里等籌議具奏至阿桂所奏伊犂駐兵三千名今既暫停塔爾巴噶台駐兵查伊犂現駐馬兵一千五百名酌増一千名葉爾羌等城共駐兵一千名烏魯木齊駐兵五百名擬派出京師滿洲兵二千黒龍江滿洲索倫兵一千察哈爾厄魯特兵一千前往更換其察哈爾及新舊厄魯特等有願挈眷同來者聴此次換班兵丁僅係防守應照征戰之兵減半賞給滿洲兵二千人給馬二匹二人合給駝一隻仍行文甘肅哈密巴里坤烏魯木齊阿克蘇各大臣酌量接濟其阿桂奏請調取侍衛十五貟查塔爾巴噶台尚未駐兵擬暫将卡倫侍衛十一貟緩其派撥其餘四貟請派大臣等揀選引見亦交明瑞等帶往奏入得㫖葉爾羌有馬兵二百名即已足用著将新派之一百名撥往伊犂其察哈爾厄魯特等兵著富德巴圗濟爾噶爾馳驛前往㨂選再此次換班兵丁行走甚緩沿途宜加意牧養馬駝従前征戰兵丁馬駝倒斃過多尚須賠補若伊等不知愛惜則是自取罪戾著明瑞及領隊大臣通行𫝊諭官兵等知之平定準噶方略續編卷十三
