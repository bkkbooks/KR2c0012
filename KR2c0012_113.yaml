body:
  text: 乾隆二十三年七月甲辰靖逆將軍雅爾哈善等疏奏賽里木回衆歸誠沙雅爾回衆乞降雅爾哈善等奏言臣等前奏賽里木城回人阿瓜斯伯凱將霍集占所用之伯克阿里擒拏先解送伊子圖爾都錫到營六月二十九日據沙勒達朗卡倫官兵報稱回衆五百餘户已至隨派侍衛寧古禮等同貝子玉素富前往照看收其軍器安插於大營東十五里村莊復遣散秩大臣鄂對等接應至營臣等令阿瓜斯伯凱等入見據稱霍集占領兵來援派我賽里木城出兵一百名隨行又聞欲將我等家屬移於阿克蘇衆俱不願乘阿里不備於夜間持梃擊仆其助惡四十餘人除殺死二十九人外餘俱解送來營等語復詢同來回衆俱稱賽里木原有五千餘人被霍集占殘害傷損大半今願舉阿瓜斯伯凱為伯克臣等派護軍校瑚圖禮等將伯克阿里解京又據沙雅爾城舊伯克瑪哈默第遣其子阿三和卓來報聞將軍等擒獲喀啓巴巴克並未殺害久欲投誠近因霍集占新用之伯克阿布勒什木挈眷潛逃是以同心歸順如大兵前進則城鄉回衆無不帖服等語臣額敏和卓等俱知阿三和卓家世詰其來降屬實臣等加以撫賞派玉素富端濟布等領兵前往奏入報聞靖逆將軍雅爾哈善等參奏副都統順德訥疏脫霍集占雅爾哈善等奏言臣等於六月十六日擊敗霍集占等來援庫車賊衆有賊數百人被我兵截斷不敢逃走殺入庫車城西門十八日城之四門俱有賊衆踪跡被我兵攻擊仍堅閉不出據哨探副都統順德訥告稱與其坐守莫若誘令出走庫車西門通沙雅爾請暫撤圍城兵丁設卡瞭望若有賊走出即前往𠞰殺臣等令其妥協辦理詎二十四日順德訥差領催錫勒畢善稟稱昨夜有潛逃賊衆已派兵百名追趕臣等詳悉詢問據稱三更時分有騎賊數百出西門往沙雅爾當有卡倫兵報知順德訥言昏夜如何追賊且俟天曉至今早派兵前往臣等即催順德訥作速接應順德訥仍稱有面禀臣等之言䇿馬向軍營而來臣等又令侍衛齊努渾迎往催督始領兵前追二十五日午刻回營告稱追至鄂根河賊衆已渡據橋為壘以鎗炮防守天曉看賊踪跡向賽里木阿克蘇逃去我兵追逐三四十里力不能及等語臣等正欲參奏適沙雅爾回衆投誠據回人阿三和卓告稱霍集占來援庫車為大兵擊敗截斷逃入城中我沙雅爾亦有數人同入六月二十四日逃回告稱霍集占於十六日入城十八日出戰被傷二十三日率四百人出西門渡鄂根河選精騎百餘由戈壁逃走不知所向餘俱潰散等語查順德訥疏脫賊衆違悮軍令罪無可逭謹合詞參奏現在軍營領隊大臣甚少擬將巴圖魯侍衛寧古禮總管扎爾善協領薩斯泰暫行管理請發領隊大臣二員前來以備委用奏入上諭軍機大臣曰雅爾哈善等參奏順德訥疏防致霍集占等兔脫又不急往追擒真怯懦昏憒之極順德訥著革職以兵丁效力此舉雖順德訥罪無可逭雅爾哈善等身為將軍參贊大臣所司何事獨無罪乎今渠魁逺遁朕亦無可訓諭惟督䇿兆惠速往協助雅爾哈善等能從此奮勉一面攻圍庫車一面追擒霍集占尚是自贖之路否則惟有按律治罪而已昨雅爾哈善奏稱賽里木回人阿瓜斯伯凱率屬來降著賞戴孔雀翎及大荷包一對小荷包四個緞四端仍𫝊㫖慰撫以安新附所舉侍衛寧古禮總管扎爾善協領薩斯泰等俱著暫行領隊效力諭參贊大臣納穆扎爾三泰等速赴庫車軍營上諭軍機大臣曰雅爾哈善等奏請派出大臣二員前赴軍營等語可𫝊諭納穆扎爾三泰前往庫車約於何時可抵軍營即計日具奏近因順德訥等疏脫逆酋霍集占看來雅爾哈善調度乖方深負委任現在𫝊諭兆惠速往辦理納穆扎爾等其奮勉協贊以奏膚功諭定邊將軍兆惠速往辦理回部上諭軍機大臣曰雅爾哈善參奏順德訥疏脫霍集占深為可惜可恨伊等無福成功將自來送死之賊任其兔脫尚可委用耶今征回一事全付之兆惠矣前已諭兆惠速赴回部此時或從造哈嶺或從博登嶺前往皆可若已抵庫車即由彼進兵將庫車令雅爾哈善駐守至此次縱賊之罪雖由順德訥然雅爾哈善哈寧阿身為將軍及參贊大臣豈能委過他人脫身事外除將伊等嚴加議處外兆惠即訊問順德訥如縱賊情實即於軍營正法示衆若有别情應參奏者即嚴行參奏此㫖尚未頒發俟兆惠奏到再行宣布并以朕㫖𫝊諭額敏和卓伊係回人雖與雅爾哈善等不同亦不得謂為無過念其素能出力姑從寬貸用觀後效即在兆惠隊內行走乙巳命革雅爾哈善哈寧阿職以參贊大臣尚書納穆扎爾為靖逆將軍侍郎三泰為參贊大臣上諭軍機大臣曰逆賊霍集占逃脫一事雖順德訥之罪然雅爾哈善哈寧阿等所司何事伊二人深負委任俱著革職以兵丁效力靖逆將軍員缺著納穆扎爾補授參贊大臣員缺著三泰補授納穆扎爾三泰奉到此㫖速往庫車接印辦事將雅爾哈善交與永貴令在屯田處效力再前此擊敗賊衆或向鄂根河逃去或被截入城雖不知霍集占所在然所奪之纛業經認識自當從此根究且霍集占入城後又親身出戰敗而復入其情形自異尋常乃雅爾哈善等至此尚云不知可見伊等並未親履行陳著納穆扎爾等詢問所護回纛係從何處奪取即行奏聞已諭兆惠速往庫車此時霍集占既已逃脫則逆黨阿卜都克勒木亦必同逃所留之人量無關緊要雅爾哈善應已得城矣納穆扎爾等惟以擒獲霍集占為要著𫝊諭知之申諭定邊將軍兆惠等辦理回部事宜上諭軍機大臣曰雅爾哈善等縱賊僨事已諭兆惠速往庫車今革雅爾哈善職發往屯田處效力以納穆扎爾為靖逆將軍但辦理回部仍於兆惠是賴可𫝊諭兆惠從前命伊來京特以雅爾哈善尚可驅䇿今失機若此自不得不委之兆惠兆惠勿因久在軍前遂生懈怠雅爾哈善即其前鑒也朕委用大臣再三審慎一經付託即望其成功豈肯輕為更代至不得已而治罪皆其自取夫豈初心兆惠知此惟一意奮勉早為竣事即今之第一功臣也若馬匹疲乏現在庫車軍營駐牧者可以調換乘騎至兵丁口糧則回地秋禾正熟而巴里坤吐魯畨等處又俱陸續轉運無虞匱乏且我兵未進各城回衆已逺來送欵則軍鋒所至伊等自將霍集占擒送如波羅泥都伯克霍集斯等見霍集占窮蹙縛獻自贖俱令其入覲再酌量辦理至兆惠若先抵庫車不必更候納穆扎爾即收雅爾哈善印信訊問伊等情節如順德訥縱賊是實即正法示衆倘有别情或彼此相訐即將雅爾哈善哈寧阿順德訥拏解來京一面帶兵前進其靖逆將軍印暫交明瑞署理俟納穆扎爾到日仍趲赴兆惠軍前併𫝊諭納穆扎爾等知之御前侍衛敦察等疏奏索倫兵起程日期敦察等奏言臣等自京起程六月十三日至齊齊哈爾據將軍綽爾多已將前派索倫兵一千名整裝待發其添派索倫兵一千名據總管羅爾博岱等照例揀派整裝臣等於二十九日至海拉爾七月初五日官兵俱集副都統福祿等亦於初六日到來臣等於初八日帶領起程奏入報聞丙午諭參贊大臣富德等查拿哈薩克錫喇上諭軍機大臣曰富德奏稱與兆惠分兵過吹塔拉斯至西哈薩克邊界索取哈薩克錫喇如稍有推諉即領兵入境查拿或實係逃往他處亦即遍行搜捕等語所辦深合機宜看來富德有承受朕恩之福近據兆惠奏糧運章京托克托拜曽遇哈薩克額爾類問及哈薩克錫喇逃往何處而巴祿奏稱阿布賚使人哈奈巴圖爾謂哈薩克錫喇向沙喇擘勒逃去參互觀之哈薩克錫喇似不曾逃往特栁克處或藏匿幽僻亦未可定可𫝊諭富德伊能擒獲哈薩克錫喇則厄魯特全部可告成功其悉心奮勉以膺懋賞定邊將軍兆惠疏奏東布魯特歸誠兆惠奏言六月二十三日據遣往布魯特塔拉斯之侍衛托倫泰告稱招服霍索楚鄂拓克頭目邁塔克啓台鄂托克頭目喀喇博托等途中遇參贊大臣富德設宴相待因喀喇博托年百餘嵗兩目失明邁塔克年已望七亦難行走邁塔克遣其弟舒庫爾喀喇博托遣其姪哈畢啓來至軍營臣令其入見據哈畢啓等跪稱我布魯特分左右翼右翼係瑪木特呼里管領左翼係喀喇博托管領霍索楚啓台兩鄂拓克各有千餘户情願歸誠聖主遣我等入覲等語臣等加以撫慰即派托倫泰等於本日伴送起程奏入報聞參贊大臣巴祿疏奏途遇哈薩克解送叛賊布庫察罕和碩齊巴祿奏言臣於六月二十一日從古爾班察爾河起程巡查臺站途遇哈薩克阿布賚遣來貿易之哈鼐巴圖爾等據稱聞得布庫察罕投入哈薩克六月初有拜布喇克巴圖爾等將布庫察罕交與大國來使又聞哈薩克錫喇逃往沙喇擘勒舍楞投入俄羅斯等語臣即送哈奈巴圖爾於䇿布登扎布處二十六日奬賞藍翎德倫保解送布庫察罕和碩齊前來據稱同納旺等於五月二十九日至哈薩克達勒達克之拜濟格特據拜布喇克巴圖爾告稱布庫察罕同妻子屬人來投今奉將軍等索取即同伊妻交出又據霍集伯爾根屬人兆巴薩爾等將在逃原任散秩大臣和碩齊交出又前次得傷之察哈爾跟役孟克索倫披甲薩尼圖俱行交送我等起程前來納旺雅庫等仍往阿布賚處查詢哈薩克錫喇信息其布庫察罕之子年方七嵗已分給逺地俟續行查送等語又接䇿布登扎布知㑹將布庫察罕解送軍營再由烏里雅蘇台送京并詢據和碩齊供詞另單恭呈御覽奏入報聞丁未諭定邊左副將軍成衮扎布等嚴行拏解和碩齊上諭軍機大臣曰據巴祿奏稱途遇哈薩克人等解送叛賊布庫察罕和碩齊已派兵送往策布登扎布處等語可𫝊諭成衮扎布解送賊人必經由成衮扎布駐劄之地閲和碩齊供詞頗多狡辨若策布登扎布誤信其言不與布庫察罕一體鎖拿成衮扎布即嚴行拿解勿致逃脫若此時已至布延圖亦𫝊諭扎隆阿等遵照辦理戊申飭諭雅爾哈善等效力贖罪上諭軍機大臣曰雅爾哈善等疏脫霍集占朕已降㫖斥責令其效力自贖今思霍集占冒死入城必因同惡之人勢須救拔逮計窮力竭夤夜脫逃亦必與逆黨同行城內所餘不過老弱無能之輩賊尚不甚愛惜我何為盡鋭攻取惟揀派精兵務獲賊首以贖前愆又諭曰今逆賊霍集占計窮力竭乘此機㑹各城讋服必有擒獻賊首者朕思兆惠納穆扎爾尚在遄行若雅爾哈善等能進兵擒獲霍集占尚可贖罪是以仍諭其作速進兵兆惠納穆扎爾等不可因有此㫖遂疑為姑從寬貸雅爾哈善此次失機非尋常可比果能擒獲賊首兆惠等即行具奏朕當酌量施恩否則雖得阿克蘇亦不准贖罪仍遵前㫖辦理著𫝊諭兆惠等知之諭大學士管陜甘總督黃廷桂等酌量鑄造炮位上諭軍機大臣曰據凉州將軍嵩阿禮奏稱軍營需用大炮已造成兩位送往肅州其續造兩位俟演放後再行運送等語前經雅爾哈善等奏稱內地鑄造炮位轉運艱難請將匠役物料趲赴軍營酌量鑄造朕已如所請行可𫝊諭黃廷桂等此時自必遵照前㫖辦理但將已成炮位速送軍營可也諭安西提督豆斌仍行搜捕逸賊上諭軍機大臣曰前諭豆斌速往庫車與馬得勝分管祿旗兵丁今據奏稱在哈畢爾噶圖山等處拿獲嗎哈沁數人尚有宰桑巴拉等逃逸未獲等語豆斌搜捕嗎哈沁等日久未見弋獲要犯既有巴拉等在逃當悉力搜捕擒獲再遵㫖前赴庫車軍營己酉申諭定邊將軍兆惠進𠞰回部事宜上諭軍機大臣曰昨因雅爾哈善等坐失機宜命兆惠辦理回部現在官兵圍守庫車四十餘日總由初次攻城賊既久備又恃有救援是以未易即下若持此以較各城遂有畏難之心則謬矣此次大兵所至惟據其要害之地賊衆自然畏懼如必克一城再攻一城則回部堅城尚多斷非長䇿可再𫝊諭兆惠回人素稱選懦近來屢經𠞰捕畏我軍威乞降相續且伊等所保惟城而村落居人自不能兼顧若盡入城守則人衆無食亦必困敝斯時必有縛送首惡以自贖者如擒獲霍集占各城自然歸附兆惠其加意奮勉以奏膚功庚戌定邊右副將軍䇿布登扎布等疏奏哈薩克擒送布庫察罕和碩齊䇿布登扎布等奏言據遣往哈薩克之納旺報稱五月十一日至阿延庫勒遇哈薩克百餘人詢以叛賊哈薩克錫喇布庫察罕等所在有溫圖渾告稱在拜布喇克巴圖爾處我因通信阿布勒比斯等令其轉飭擒送隨至博克圖哈薩拉克溫圖渾來告己通知多羅特拜親向拜布喇克曉示毋得疏脫二十九日至達勒達克遇拜布喇克告稱已拿獲布庫察罕六月初一日至拜布喇克處我等酌給駝隻緞匹伊遂將布庫察罕交出復據多羅特拜告稱布庫察罕之子七嵗在莫倫鄂拓克之伯亨處距此甚逺已差人往喚又多羅特拜之族弟章竒什將布庫察罕之妻交出并情願送至軍營續有哈薩克之兆巴薩爾將原任散秩大臣和碩齊交出令其屬人哈勒津等押送隨派領催德倫保等解送軍營我仍同雅庫前往阿布賚游牧探取哈薩克錫喇信息等語臣等將布庫察罕和碩齊訊取供詞派侍衛富寅保托和里等解送至京臣䇿布登扎布即向伊犂探兆惠信息臣阿桂暫在布空郭勒等處搜捕逸賊候成衮扎布知㑹索取舍楞之信再行具奏奏入上諭軍機大臣曰䇿布登扎布向哈薩克索取布庫察罕等解京又請前赴兆惠軍營甚屬奮勉著加恩晉封親王品級遣往哈薩克之納旺著賞戴孔雀翎并將伊現任職銜查明具奏又所奏探取兆惠信息前己諭䇿布登扎布䇿應富德如拿獲哈薩克錫喇固善否則於應撤兵時仍回伊犁近因回部諸城望風乞降是以朕意今嵗不必撤兵以期蕆事䇿布登扎布回伊犁後再前赴回部較為便捷所慮口糧不足又須紆道烏魯木齊若稍可通融或行文永貴等先將口糧運赴庫車接濟俱著籌酌辦理至阿桂所奏暫於布空郭勒等處駐候信息阿桂既與策布登扎布合兵自宜同往䇿應富德以為效力之路何必分道却回著𫝊諭阿桂如未至布延圖則仍追及策布登扎布同行如已離布延圖不逺即令官兵回營阿桂作速來京請訓再赴西路又諭曰據策布登扎布奏稱烏里雅蘇台軍營原署參將常青察哈爾佐領署營總炳圖因疏脫盜馬賊犯等革職效力贖罪今伊等自備資斧甚屬黽勉著加恩照伊等原銜降一級將常青授為都司炳圖授為防禦職銜俾得效力行走至所奏噶克巴集賽之錫喇卜與瑪里格爾巴朗瑪濟克兄弟同行因鄂哲特等拒敵敗逃即殺伊兄弟來投大兵所掠器械衣服經厄魯特嚮導識認等語錫喇卜現在何處著即查詢并取哈薩克錫喇信息奏聞壬子雅爾哈善等疏奏沙雅爾回衆歸誠雅爾哈善等奏言前沙雅爾城舊伯克瑪哈默第遣其子阿三和卓木乞降臣等遣玉素富等往受行至其地瑪哈默第哈爾呼勒等出城迎接備陳從前久欲歸順為伯克阿布勒什木所制今已潛逃始得如願玉素富等詢問或願移往庫車或仍居原地據稱現值麥熟請俟收割後遷移隨經侍衛德爾森保入城安撫計三百餘户男婦老弱共一千一百餘口牲隻軍器俱造册呈報隨將瑪哈默第等喚至軍營臣等安撫畢示以霍集占如遣人前來即行縛送凡有信息亦即報知臣等擬進攻阿克蘇蹂其禾稼將庫車交哈寧阿圍守仍探兆惠信息奏入上諭軍機大臣曰據雅爾哈善等奏稱辦理降人既畢即領兵進發想亦自知縱賊之罪且看伊等效力如何若能擒獲霍集占則前罪皆可寬宥即不能擒獲而能驅迫賊首不拘遁入何城雅爾哈善即知㑹哈寧阿合兵圍守斯時兆惠亦必到彼威力愈壯渠魁自必就縛再霍集占曽與庫車逆黨約誓來援如果再來送死哈寧阿亦知㑹雅爾哈善回兵辦理至沙雅爾投誠回衆可照賽里木之例減半賞賚仍宣朕恩㫖云念爾等逺離故土不得安生仍令於舊地駐牧並𫝊諭賽里木回衆知悉或伊等畏賊聲勢不敢遷移不妨俟平定各城後再歸故土亦可又所奏伯克托克托己為霍集占戕害深可憫惻聞伊尚有一子著查明現在何處奏請加恩恤廕總之此次進兵乃伊等贖罪之路據奏領兵前進究未聲明兵數若干殊屬含混併𫝊諭雅爾哈善等詳悉奏聞申諭定邊將軍兆惠等察核雅爾哈善等情罪上諭軍機大臣曰昨諭兆惠納穆扎爾有先至庫車者即𫝊㫖革雅爾哈善哈寧阿職以兵丁效力今據伊等奏報分兵前進似已自知其罪可𫝊諭兆惠與雅爾哈善等㑹合時如霍集占就擒即以朕㫖令伊等閲看仍𫝊諭云若雅爾哈善等自知罪戾奮勉效力擒獲賊首則量從寬貸其𫝊諭額敏和卓之語仍遵前㫖至伊等未到之先如哈寧阿已得庫車城兆惠即令玉素富駐守派舒赫德安撫降人及籌辦屯田事宜若尚未得城即令明瑞領兵攻取俟納穆扎爾到日明瑞仍在兆惠軍前效力行走俱著𫝊諭知之癸丑諭雅爾哈善等覆奏領兵進取情形上諭軍機大臣曰昨據雅爾哈善等奏進取阿克蘇一摺未及所領兵數若干比即𫝊諭查詢今思伊等若直抵阿克蘇則中間沙雅爾等城必須安設臺站否則奏報安能迅速且沙雅爾回衆雖經歸順而大兵既逺保無變動俱應籌及陳奏設伊等因庫車久未攻克霍集占又已脫逃非遵㫖領兵前進無以塞責則更恐僨事著𫝊諭伊等據實奏聞申諭定邊將軍兆惠等速赴雅爾哈善軍營上諭軍機大臣曰雅爾哈善近雖奏請分兵進取留哈寧阿圍守庫車並未將所分兵數及安設臺站事宜陳奏看來伊等似知疏脫霍集占之罪且聊以奏請進兵茍延旦夕若果如此居心必至僨事可𫝊諭兆惠納穆扎爾等即行馳赴仍於奉到此㫖時計何日可至雅爾哈善軍營作速覆奏八月甲寅朔定邊將軍兆惠等疏奏分路搜捕厄魯特餘孽情形兆惠等奏言臣等兵抵索勒屯薩里等處招服布魯特人等遣其頭目分為三起入覲隨分兵兩路臣富德向吹塔拉斯沙喇擘勒等處搜捕厄魯特餘孽臣兆惠在特穆爾圖淖爾等處凡可漁獵資生之地俱行搜捕又遣明瑞由屯達什䇿凌占頗圖等分道前往七月初五日據明瑞報稱自巴爾呼特嶺過造哈嶺納林郭勒烏蘭烏蘇直至大雪山麓並無一賊達什策凌等所報亦同臣等仍分兵過庫努克薩勒古爾班哈卜喀克等處再行窮搜近准雅爾哈善咨文知來援庫車回衆俱已𠞰殺至哈薩克錫喇雖未就擒但隻身逃遁斷不能復行嘯聚雖使䇿妄阿拉布坦復生亦無可如何臣等仍在善塔斯等處嚴行搜捕奏入得㫖近屢諭兆惠前往庫車其搜捕哈薩克錫喇専委富德著兆惠即遵㫖速赴回部以擒獲霍集占為要駐劄布延圖參贊大臣扎隆阿疏奏烏梁海總管阿喇善潛逃扎隆阿奏言七月十八日據烏梁海副都統赤倫遣總管阿喇善之佐領圖卜慎來報阿喇善於初六日同所領一百一十户人口夤夜逃走圖布慎等於次日追至扎雜達爾阿喇善將伊等捆縛行走五日始行釋放等語臣等即知㑹喀爾喀親王品級車木楚克扎布并派公多嶽特等領兵一百名前往䇿應於十九日起程奏入報聞命定邊左副將軍成衮扎布回烏里雅蘇台辦事上諭軍機大臣曰據成衮扎布等奏參贊大臣阿桂在布空郭勒等處駐兵堵截逸賊伊在都爾伯勒津等處候信等語前命成衮扎布䇿應阿桂原為追𠞰舍楞今舍楞已入俄羅斯阿桂亦同䇿布登扎布策應富德此時諒已奉到諭㫖彼處無應辦事務著𫝊諭成衮扎布即回烏里雅蘇台辦事丙辰諭巴里坤辦事副都統阿里衮等豫備官兵口糧馬匹上諭軍機大臣曰昨派出察哈爾兵一千名由阿濟必濟往烏魯木齊所需口糧馬匹應先送至烏魯木齊豫備支給現在派出索倫兵二千名俱由此路行走亦應照前豫備至派出健鋭營兵一千名則不必至巴里坤徑由哈密吐魯畨魯克察克一路著𫝊諭阿里衮或將巴里坤現有馬匹送至哈密豫備如不敷用即將肅州牧養馬匹令伊等支領前赴軍營亦可阿里衮速咨黃廷桂籌酌辦理戊午諭大學士管陜甘總督黃廷桂不必來京上諭軍機大臣曰前命兆惠黃廷桂來京請訓㑹商一切事宜今雅爾哈善失機僨事朕以其不足復任仍令兆惠就近前往辦理回部今嵗既不復撤兵可𫝊諭黃廷桂亦不必來京惟加意籌辦糧餉馬駝以給軍用己未諭定邊將軍兆惠辦理回部事宜上諭軍機大臣曰適詢問回人巴巴克喀啓等據稱附和霍集占為惡不過阿卜都瓜卜等數人及在伊犁相從回衆其各城頭目俱不心服等語可𫝊諭兆惠速往經畫務宜𠞰撫並用即如從前準噶爾每年派兵擾害回人劫令歸附亦因伊犁與回部相近若我兵如此辦理則須由巴里坤轉餉接濟回人雖困而內地力亦難支今庫車雖似難克但此城係回部門户故伊等以死固守若一經攻克則諸城必潰又前據雅爾哈善請將緑旗兵調往屯田處所但攻克回城亦需防守將來增墾地畝仍于內地調發併𫝊諭黃廷桂等知之申諭定邊右副將軍䇿布登扎布等查拿哈薩克錫喇上諭軍機大臣曰據額駙色布騰巴爾珠爾奏對去年哈薩克額爾類搶掠昻吉岱等遊牧有鄂托圖栁之子為哈薩克錫喇所獲旋行釋放告以日後有急即來相投等語可𫝊諭䇿布登扎布富德等當以此言告之額爾類云哈薩克錫喇顯係投入爾等游牧但爾等所屬頗多一時不能覺察即如爾等屬人誤取我臺站所運官物爾即照數交還奉㫖奬賞今若獻出哈薩克錫喇則益昭恭順之忱如此開導亦擒拿賊首之一策其籌酌行之護軍統領努三疏奏籌辦哈薩克貿易及屯田事宜努三奏言臣行至巴里坤察收豫備哈薩克貿易貨物於七月十六日抵烏魯木齊隨行知臺站官員如有哈薩克貿易人等經過即行送信續據呈報兩次經過臺站共七十餘人俱在附近貿易旋回遊牧臣又咨行參贊大臣巴祿等𫝊示哈薩克人等在烏魯木齊貿易日期俟遣往阿布賚處之納旺等回報再行具奏一面察看博克達山西麓地名賽堪賽爾係布魯古特諾海竒齊克舊遊牧其地峰巒環抱水草頗饒可養馬五六千匹亦不須多兵防護至由烏魯木齊過嶺至吐魯畨駐兵過冬處所前已咨行參贊大臣永貴等隨據約㑹同往察勘臣率道員薩瀚等看得自巴里坤至木壘九臺不堪屯種自木壘至烏魯木齊有噶爾藏多爾濟遊牧之昌吉羅克倫等處可耕地畝十六處視其地土肥磽水泉多寡以定工作仍令屯兵等輪替耕種以息地力方為有益計需兵六千八百名謹繪圖恭呈御覽再木壘濟爾瑪台等處俱有舊城基址似不必遽興工築擬俟屯田收穫一二年後再為籌酌辦理奏入上諭軍機大臣曰據努三察勘木壘至烏魯木齊屯田約需兵丁六千有竒繪圖呈覽屯田為軍食所關必由近及逺以次增墾方可省餽餉而豐積貯此時雖距耕作之期尚早自當先事籌畫可𫝊諭黃廷桂於內地緑旗兵內挑選七千名調赴烏魯木齊等處其農器即於肅州辦給交兵丁帶往或併給以工作器具令兵丁就近伐木造屋俱宜酌量辦理至派往回部之緑旗兵現在軍營仍需調遣不必撤往屯田處所併𫝊諭永貴等知之平定準噶爾方略正編卷五十九
