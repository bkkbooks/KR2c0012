  text: 欽定四庫全書平定準噶爾方略續編卷三十一
  hash: sha256:2b3c373720bf0e7ba0ef7e85506057bf67244b64276b3abcd1220e3b98318532
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_170-1a, image: WYG0359/WYG0359-0927c.png}
body:
  text: 乾隆三十年六月丙午以增派兵丁互相推諉飭諭伊犂將軍明瑞等上諭軍機大臣曰阿桂奏稱前因明瑞所領之兵恐不敷用隨經札商據咨賊勢雖漸窮蹙但殲滅之期難以預定似宜增兵二千名至此事既經陳奏應候諭旨於途次就近辦理臣以烏什現在情形尚未深悉所有增派兵丁果能尅期前往與否亦難懸擬請遵旨仍候明瑞酌辦等語明瑞阿桂移文往復未免互相推諉在他人且不可況伊二人為朕所簡用者乎即如進勦烏什一事近經明瑞等奏捉生訊問俱稱賊人口糧將絶自可計日克城且攻城非策惟堵截逃竄之路最為緊要何必增調兵丁若專為圍城起見則不但二千人雖有萬衆尚恐不足況鄂津已領兵五百前往亦可協助明瑞身在烏什確按情形自當以不必增兵咨覆乃因此奏出於阿桂即令其自行辦理阿桂又不敢固執已見惟以情形未悉為言似此推諉遊移將來恐有貽誤明瑞阿桂俱著傳旨申飭增兵一事即著停止丁未諭允伊犁將軍明瑞增調官兵仍與阿桂和衷集事上諭軍機大臣曰據明瑞奏準阿桂咨已令愛隆阿由伊犂派兵二千遣赴烏什亦不必定拘原數等語昨以明瑞阿桂於增兵一事互相推諉因傳諭申飭但明瑞業經行文愛隆阿應已辦理陸續起程若又行撤回徒滋紛擾著照明瑞所奏行但明瑞奏內似以派兵一事專出阿桂之意蓋因阿桂年長又係朕特遣故相推讓阿桂不必疑為諉卸又明瑞謂身離伊犂數月未悉彼處情形應交愛隆阿酌量辦理語亦非是明瑞酌量調兵愛隆阿不過聽候委辦豈敢專主且明瑞離伊犂未久彼處情形安得諉為不知此皆明瑞未經諳練所致阿桂閲歷有年前至軍營明瑞務與和𠂻集事不可稍存彼此之見諭伊犂將軍明瑞嚴辦逆回及敘恤官兵回人等上諭軍機大臣曰明瑞奏稱自五月初七日至十二日屢次擊殺賊衆收取牲隻無算等語逆回等時出拒敵情罪重大即力竭出降亦難寬宥至此數次奮勉進𠞰及陳亡得傷官兵回人等俱著查明交部照例議敘議恤再額敏和卓之子素賚璊木薩鄂對之子鄂斯璊布魯特散秩大臣阿奇木俱著有勞績並酌賞縀匹以示鼓勵此內有應行交部議敘者仍照例具奏伊等所屬之回人布魯特等有似此實心出力者俱著查明奏聞庚戌諭烏魯木齊提督五福酌停派赴烏什兵丁上諭軍機大臣曰阿桂奏稱烏什增兵一事已行文烏魯木齊提督五福等將該處緑旗兵一千名辦理起程一面於伊犂兵丁內揀派千餘名陸續前來等語昨據阿桂奏請增兵朕即謂賊衆將屆絶糧烏什計日可克毋庸增派兵丁續慮愛隆阿已經辦理故仍準調撥今愛隆阿又調烏魯木齊兵一千名亦屬多事蓋賊衆逃竄所當預防而緑旗兵多係步行豈能追及逆回截擒其衆明瑞阿桂舉動未免張皇恐各城回人聞之妄生疑忌著傳諭五福若烏魯木齊兵丁尚未起程即行停止或遄行未逺亦可撤回惟將抵烏什即留軍營協助乙卯諭伊犂將軍明瑞等停止調派伊犂緑旗兵上諭軍機大臣曰愛隆阿等奏稱準明瑞行文已調鄂津領兵前往烏什又將熱河及涼州莊浪兵丁揀選五百名起程續準明瑞阿桂增兵二千擬將伊犂滿洲察哈爾厄魯特兵派出五百名又行文烏魯木齊將預備緑旗兵一千帶領前往烏什等語明瑞前於伊犂調兵五百名此次又增調五百已足敷用何必又派緑旗兵伊等所辦太覺張皇著傳旨申飭所調緑旗兵一千名仍著停止丁巳伊犂將軍明瑞等疏奏捉生訊問及收賊牲隻情形明瑞等奏言五月十七日夜臣等派出埋伏兵丁擒賊十四人據供舊日在城居住者尚有口糧其各莊收入之四千餘户被殺傷及病死者共二千餘人所存者大半無食惟尚能出戰之人賴黑木圖拉另以糧石分給臣等詰以城內窮蹙如此爾等何不出降據供因伯克等謂所犯罪重雖降亦死妻奴亦必被伯克所殺且不知自身得免與否是以茍延旦夕又盛京左翼鑲黃旗前鋒靈保前因派出哨探忽與同行人言欲入城諭賊使降遂馳馬向城為賊擁入續經捉生訊問云靈保見賴黑木圖拉諭令投降詞氣嚴正賊人恐其搖動衆心遂行殺害十八日賊人時來侵我卡倫臣等欲誘至平地以便𠞰殺十九日有馬上賊人兩隊前來我兵接戰即退賊亦不追轉下馬排立陸續添兵良久有步下賊人五百餘驅牛羊千餘在兩河之間牧放并刈取枯草至日西時即收集回城臣等隨傳齊侍衛官員定計直衝賊陳收其牲隻遂東西分兵兩隊乘夜埋伏又令素賚璊木薩等領精兵一隊㩦帶信炮埋伏二十日城內馬步賊人仍帶牲隻牧放如前日西時臣等聞炮聲即領兵策應見三隊伏兵一齊衝擊賊人棄其牲隻敗走追至城東門聞門內鼓聲有大隊陸續出援臣等施放大炮賊皆藏於溝渠城門亦閉始行撤回此次殺賊六十餘名生擒二十餘名獲牛六百三十餘隻連鞍馬十餘匹軍器無算兩日以來城下排列賊人雖較前加多並無牧放牲隻及割草之事而觀音保等報稱連日派兵擊賊亦有斬獲奏入上諭軍機大臣曰據明瑞等奏捉生訊問情形及連日𠞰賊收取牲隻看來賊衆矢死抗拒殊為可恨若不嚴誅何以示警明瑞阿桂斷不可仍存招撫之意此次官兵等尚屬奮勉著查明交部議敘有應賞巴圖魯號者查明請旨命奬賞吐魯番郡王額敏和卓上諭軍機大臣曰烏什滋事以來素賚璊木薩俱著有勞績今日明瑞奏現在與賊相持素賚璊木薩領援兵橫衝賊陳追至險阻之地大敗賊人等語素賚璊木薩俱額敏和卓之子能遵父訓實心奮勉已加恩賞給縀匹兹特賞額敏和卓大小荷包仍著傳旨嘉奬以示鼓勵以副都統明普辦理多倫回人乖謬申諭伊犂將軍明瑞等查辦上諭軍機大臣曰明普奏稱多倫逆回阿璊案內干連之薩爾達克愛子木毁壤刑具脫逃隨行知各處緝拏等語近據額敏和卓明普等將逆回阿璊案內干連之和碩爾阿納爾薩爾達克愛子木等分别定罪朕諭以伊等雖未曾首告尚無附和情形著加恩寬免並曉示回人知之明普一接此旨即宜將伊等省釋或候阿桂等覆訊亦應以寬免之旨先行曉諭仍照舊監禁則薩爾達克等斷無逃走之理乃並不曉示明白致將特恩寬免之人反陷脫逃之罪辦理甚屬乖謬昨因明普審訊此案將額敏和卓所言隱匿但以已意具奏業交明瑞等查該看來明普不能辦事除派員更换外將現在情節亦交明瑞阿桂額敏和卓查辦脫逃之薩爾達克愛子木嚴加查拏務獲治罪壬戌諭伊犂將軍明瑞等拏獲逃犯愛子木正法示衆上諭軍機大臣曰明普奏稱拏獲逃犯愛子木請解京照例給賞為奴其疏防兵丁免死革糧枷責等語愛子木係逆回阿璊案內人犯前經明普分别議罪朕以其本不知情特恩寬宥今乃起意潛逃自當治罪而明普仍請解京備賞殊屬非是此事已諭明瑞等辦理可再傳諭伊等俟烏什事竣後傳集回衆宣朕諭旨以愛子木業蒙恩宥即駐劄大臣定罪亦不過發遣伊犂彼若安分靜候或可邀免乃乘間潛逃自取咎戾天朝法度無心獲罪猶可從寬若明知故犯斷無姑息之理即將愛子木正法將來拏獲薩阿達克時亦照此辦理其疏防兵丁等著照明普所奏辦理伊犂將軍明瑞等疏奏納世通卞塔海俱遵旨正法明瑞等奏言欽奉諭旨以納世通卞塔海俱係僨事之人應於軍前正法以觀音保代領其衆仍候阿桂到時辦理今五月二十五日臣阿桂行抵軍營臣即將前奉諭旨傳示納世通卞塔海等隨派員監看即行正法奏入報聞甲子伊犂將軍明瑞等疏奏逆回賴黑木圖拉身死信息明瑞等奏言烏什賊衆因牧放牲隻被收屢日不敢出戰五月二十四日有馬步賊人五百餘來爭水草我卡倫兵抵禦良久臣等派兵策應斬獲賊人二十五日臣阿桂前至軍營會商暗藏大炮將城下排列之賊擊退其城西亦有割草之賊連日亦俱有斬獲二十七日有馬步賊人二千餘出戰旋即敗退我兵追至城下向伯克等所居高屋施放大炮除陳斬賊人外捉生訊問賴黑木圖拉昨傳令劫營次一死戰不期為大兵擊敗又有回人二名帶馬三匹出降詢係伊犂塔里雅沁回人因大兵內有伊親屬是以來投今賴黑木圖拉已中箭透腰墜於北山下身死係屬親見等語臣等雖未敢信以為實但恐賊衆乘亂潛逃隨遍傳東西二營併力圍截賊人仍出城下排立臣等以鎗炮急攻殺賊甚多復捉生訊問或稱賴黑木圖拉中箭身死或稱係鳥鎗傷又聞衆伯克等推額色木圖拉為首仍訪取確信奏聞奏入上諭軍機大臣曰明瑞等奏稱賴黑木圖拉中箭殞命賊衆仍另立伯克等語逆賊久抗大兵罪深惡極未得生擒寸磔已屬幸免而賊衆仍一心死守情罪可惡惟當遵節次諭旨盡行𠞰殺折毁其城不必多留官兵酌派能事員辨一二人領兵屯田聞該處所産硝磺甚多應廣為採取運解各城備用俱著於事竣後悉心商辦命留副都統伊勒圖於伊犂辦事上諭軍機大臣曰前諭伊勒圖往雅爾更换納蘇懇今伊犂大員甚少著暫留辦事俟明瑞回日再行前往諭伊犂將軍明瑞等將烏爾衮即於烏什正法示衆上諭軍機大臣曰明瑞阿桂奏稱查訊烏爾衮因向散秩大臣阿竒木索取衣裘不遂即行毆辱其餘所犯情事仍交綽克托審擬具奏等語烏爾衮仗納世通之勢任意毆詈伯克回人索取什物其事自不一而足即毆辱阿奇木一節屬實已應正法雖再毆小伯克等百人其罪寧加於此明瑞等又飭詳查甚不曉事著將烏爾衮即提至烏什正法傳集衆伯克回人觀看恩免德福應賠官糧并定布魯特等兵丁給糧之例上諭軍機大臣曰明瑞等奏稱原任布政使德福應請革職仍遵旨賠補濫給官糧其發往何處自備資斧效力贖罪請旨遵行等語德福同卞塔海在阿克蘇辦事卞塔海妄自尊大德福未能規正每相附和又將無關緊要事件由六百里馳奏卞塔海既以失機正法德福亦應治罪因諭明瑞等定擬具奏但其獲罪情由尚不至如卞塔海之甚德福著革職發往伊犂效力贖罪所給布魯特行糧免其賠補再官給布魯特回人行糧一事前因納世通等辦事瑣屑折給回人等口糧必照內地兵丁扣算日期是以諭令此次姑準給發嗣後應行裁減原因伊等遊牧甚近且遇事每多觀望不宜一概濫給口糧近因烏什一事布魯特回人等在軍營者甚屬奮勉嗣後有調遣之處著加恩照內地兵丁給與行糧不必裁減己巳申諭伊犂將軍明瑞等嚴辦烏什賊衆毋得遲疑上諭軍機大臣曰明瑞等奏稱六月初二等日賊人與城西軍營拒敵伊等領兵夾攻復捉生訊問知城中另立伯克擬相機辦理速為竣事等語賊人怙惡猖獗如此伊等所奏似仍有招撫之意殊不可解若謂事期早竣則伊等駐守已數月未嘗催促及不惜兵丁責以梯衝克城之舉也特因回人頑梗若仍準其降則伊等謂罪不加衆轉視叛逆為常事拒守為良策且忽降忽叛亦與國體有關著傳諭明瑞等惟遵節次諭旨辦理克城之日即將伊等𠞰殺不必遲疑候旨秋七月己卯以攻𠞰烏什不力飭諭伊犂將軍明瑞等明瑞等奏言臣明瑞自六月初四初九等日𠞰賊後賊衆惟伏守城下並不牧放牲隻臣恐其潛逃於十一日四鼓派兵二百伏於城西林內又派兵二百伏於城北塹下為援十二日有賊百餘騎出牧與城西伏兵相遇城北伏兵合力衝擊賊不敢入城城內又有賊千餘人突出拒戰復為我援兵擊敗共𠞰賊百餘名生擒十七名得鞍馬器械無算驅其城下所牧牲隻全數歸營其東門水磨及所積糧食悉投水中訊問生口云額色木圖拉曾查核人數已損三分之一臣阿桂所得生口俱言城內口食將盡且不能牧養牲隻俟所調兵丁到日即當圍城奏入上諭軍機大臣曰明瑞奏派兵設伏𠞰殺賊衆毁棄糧食阿桂亦稱賊食將盡俟調兵一至即可攻圍等語看來伊等意見尚謂逆賊等以死據守克復甚難雖窮蹙至此猶必待其自斃是從前之未曾力戰可知即如所奏賊人尚在城外設立水磨儲積糧石則伊等前此並未近城或較納世通卞塔海駐劄之地為稍近耳又如明瑞在城東駐劄今至西北埋伏亦屬可疑西北一帶係阿桂觀音保駐劄何以未聞會合策應昨據明瑞奏稱將擒獲生口幼弱無用者發遣入城以分其口食且使之內潰是尚欲招降不知何意又欲於城之四周掘成深塹益屬錯謬烏什四面皆山若盡行鑱鑿當於何時可竣伊等辦理竭蹙即此可見明瑞阿桂著嚴加申飭再明瑞等雖東西分營駐劄仍須一體籌辦烏什並非大城東西相隔必不甚逺焉可仍蹈覆轍各存畛域將來功過伊二人同之務遵朕節次諭旨一心協力不可稍有推諉之見命賞護軍校雅爾呼達等巴圖魯號授為藍翎侍衛上諭軍機大臣曰前因官兵等行走奮勉諭令酌量奬賞并擇其率先出力者豫以巴圖魯號今據明瑞奏稱護軍校雅爾呼達委署驍騎校岱斌徹效力居多等語雅爾呼達著賜號巴圖巴圖魯岱斌徹著賜號貝克巴圖魯各賞銀一百兩仍加恩授為藍翎侍衛壬午命查訊賊人婦女持械拒敵者一併正法上諭軍機大臣曰據阿桂奏烏什賊衆抗拒時有擒獲婦女等語賊衆以死拒守自應𠞰殺其婦女幼童曾命送往伊犂今伊等勢甚窮蹙猶然怙惡不悛並婦女亦敢行抗拒殊可痛恨著傳諭明瑞阿桂克復烏什後查訊賊人婦女內有曾經持械拒敵者一併正法毋得稍事姑息命議敘護出步兵之侍衛訥蘇等上諭軍機大臣曰明瑞奏稱從前卞塔海等進𠞰烏什時賊人出拒即棄步兵敗走因乾清門侍衛訥蘇玉麟大門侍衛喀蘭泰卞倫侍衛伊什等殿後護出步兵一半等語訥蘇等著加恩交部議敘伊犂將軍明瑞等疏奏會𠞰賊衆情形明瑞等奏言臣等於六月十二十四等日𠞰殺賊衆嗣後城下仍有馬步賊人伺我兵稍歇沿山牧馬我兵一動隨即逃走十六日臣阿桂觀音保來城東營盤議事十七日臣明瑞亦往城西於歸途察看城垣由北山下行走為賊所覺在山巔以鎗炮相拒忽西門有賊二百餘騎來援城東兵與賊相持城西亦派兵策應賊敗走渡河復以大炮追擊賊逃入東門訊問所獲生口俱稱口糧將盡臣阿桂於十七日夜設伏十八日有賊數百騎出城為鄂斯璊額森等擊敗伊什明亮永善等率兵截殺賊敗入西門臣等伏思賊衆既不敢出必夤夜潛行隨派兵於附近有草處所埋伏天未明果有割草步賊捉生訊問據供城南山內有昧諾克水泉稍足果食亦多有賊棲止又派兵搜𠞰是日巳刻城北山上有賊騎遊牧巴圖魯侍衛沙爾瑚善衝入俱行𠞰殺計前後𠞰賊四十人捉生六十餘人奪牲隻器械無算奏入報聞丙戌內大臣尚書都統阿桂等疏奏調撥新到官兵事宜阿桂等奏言臣與明瑞商調伊犂官兵一千名已抵阿克蘇臣等公譏賊力漸弱今又增兵必益加惶懼官兵一到即令在烏什五十里外之阿禪塔克就水草合隊六月十六日陸續齊集十七日夜移至哈喇巴克查城西營盤馬兵尚少擬城東酌留一百名其九百名於十八日夜調往城西尚有續調緑旗兵一千名月內可到俟全至軍營再行相機辦理奏入報聞己丑伊犂將軍明瑞等疏奏攻圍烏什奪取南山情形明瑞等奏言臣與阿桂會商移營近城合兵𠞰賊六月二十三日黎明先派公木薩等領兵攻奪南山臣等督兵續進城西官兵亦鼓勇登山兩兵既合賊衆不敢出拒惟於城垣垜口架炮施放步賊百餘人隱身放鎗我兵將賊磨房及念經處所焚燒一面舉炮向城攻擊臣等捉生訊問俱云額色木圖拉自為伯克時將伊子所積糧石分給黨惡之人屢欲悉衆拒敵因其下畏懼而止將來食盡計窮斷難固守奏入報聞壬辰議伊犂挈眷官兵營制事宜明瑞等奏言查熱河涼州莊浪三處官兵挈眷駐防伊犂所有滿洲蒙古馬步兵丁原屬因地制宜不能晝一現在送到熱河滿洲蒙古兵一千名係每百名為一佐領共十佐領此內八旗滿洲為八佐領六旗蒙古添湊兵二百名為兩佐領此十佐領之兵分為左右翼以協領二員統之每員分管五佐領涼州莊浪又復不同今移往伊犂同駐一城若仍分為三處則各旗多寡不均一切差操派委及補用之員俱難計算臣愚請將三處官兵總合為八旗蒙古兵亦照健鋭營之例合於滿洲旗分一體揀選其檔案仍行分記計三處所來協領恰有八員各管一旗現在三十八佐領共兵丁四千二百四十六名應請添設兩佐領其增添兵數於炮手匠役及養育兵缺內通融調撥總計滿洲蒙古八旗領催一百六十名前鋒三百二十名馬兵二千八百名步兵六百名炮手四十名匠役八十名養育兵二百四十名以符四千二百四十之數俟三隊官兵全到時再行均辦應行鑄給關防圖記亦請照數辦理奏入得旨軍機大臣議奏尋議駐防伊犂官兵既屬同城自應將各該處原定額數均派整齊庶管束稽查與行走操演俱昭畫一且以各兵額設錢糧酌量裁汰撥補亦並無煩費其應行裁汰添設官員及炮手匠役人等量行裁留以便通融俸餉并照所定額數給與關防圖記之處俱如所奏辦理謹將官員兵丁糧餉各數一併列單恭呈御覽奏入上從之乙未命將原任總兵和誠即於和闐正法上諭軍機大臣曰據額爾景額奏稱原任總兵和誠重利盤剝回人及折收金兩之處俱經審訊明確請將和誠解交明瑞再行覆訊擬罪等語和誠係特簡和闐辦事大員似此貪婪敗檢大干法紀實出情理之外可傳諭明瑞等將和誠即在該處正法示衆仍傳諭回人等知之申諭伊犂將軍明瑞等嚴辦烏什賊人及查奏官兵功次上諭軍機大臣曰據明瑞等奏稱六月二十九日兩營合勢進逼賊城等語是伊等從前距賊巢尚逺今始進薄其城耳官兵屢次進𠞰賊衆惟以死相拒非痛加懲創不可著傳諭明瑞等將所獲生口俱即正法得城之日遵朕節次所降諭旨辦理我兵既直逼城下而五福之兵亦到不為不多務冝晝夜巡防俾賊衆不得休息絶其芻牧斷其樵採並於隘口嚴行偵候斷不可使一賊竄逸此次烏什賊衆雖屬小醜而凶狡實甚官兵及厄魯特布魯特等不避矢石有進無退甚屬可嘉即前此平定準噶爾及回部時似此格鬭之事亦少著明瑞等於事竣後將奮勉效力勞績出衆者查明分别奏聞候朕加恩優敘至明瑞身為將軍辦理無策以致曠日持久免咎足矣何可言功併傳諭知之戊戌飭諭副都統職銜柏琨辦理霍罕文移之謬上諭軍機大臣曰據柏琨奏稱遣往霍罕偵探之回人多里野特墨特帶有額爾德尼伯克書信隨送交明瑞明瑞查驗封套係回覆喀什噶爾葉爾羌大臣之書因不知情節仍行發回今將來書譯出大概係辨明阿卜都喇伊木通信一事謂大臣等忽聽小人之言看來無甚關係似無庸置議等語所見甚屬錯謬額爾德尼並未呈書將軍柏琨並不細加譯看即送交明瑞已覺草率若因係納世通從前所辦不欲接管更屬推諉伊即不知情節豈無舊案可查且原書既經明瑞發回伊重加譯看有大臣等勿信小人之語自當將此事顚末一一指出方足見國家用法之當毫無偏聽於其間使之心服乃竟謂無甚關係含糊了事豈駕馭外藩之道且大臣等彼此更替將來後任者俱可將前事置之不問其貽誤尤不淺柏琨著嚴加申飭如霍罕尚未有來使即著永貴行文額爾德尼明白曉示明瑞雖非承辦此案之人但從前情節俱經知會此時又經譯出乃僅以發回結局亦屬非是並著傳諭知之辛丑伊犂將軍明瑞等疏奏賊衆投降情形明瑞等奏言七月初二日臣等會合官兵奪據南山雖有賊人抵禦但隱藏施放鳥鎗官兵追賊直至城下毁其垜口數處殺賊二十九人賊衆內有喀喇和卓托克三吐魯番村莊頭目夜間呈送稟帖開載投降人名並求免死臣等諭云爾等於大兵初到時何不歸附此時不過希冀免死不便準降令其回城伊等又稟欲邀結二三百人為內應又懇求公木薩素賚璊等告以若擒額色木圖拉等首惡來獻或可代乞施恩等語續有回人十四名來投告稱從前稟請來降人等為額色木圖拉所覺將為首四人俱已殺害其餘潰散我等乘間逃出等語連日捉生訊問俱稱實有其事臣等伏思賊人已將內潰此十餘名回人若即行正法愈堅賊人死守之心應暫時留於軍營相機辦理奏入上諭軍機大臣曰明瑞阿桂奏本月初二初四等日攻敗賊人直抵城下等語看來伊等從前並未近城不過較納世通等稍覺不逺耳至現在賊衆情形已覺困憊不支計接奉此旨時應早竣事矣逆賊等一心死守至於數月甚屬可惡今力窮求免斷不可允首惡額色木圖拉尤寸磔不足以蔽辜者即其屬人縛伊以降亦不可姑息仍當督兵進𠞰著明瑞阿桂遵照辦理壬寅命解送賊人家口毋得官給行糧上諭軍機大臣曰官兵等進𠞰烏什逆回攻圍既經數月賊衆無以為食自應旦夕就誅但窮蹙至此仍以死抗拒實屬凶校斷不可姑息容留前諭將丁男俱行𠞰殺其十三嵗以下幼童及婦女送往伊犂發往時俱令自備資斧不得給以口糧蓋伊等恃糧食有餘相率抗拒戕我大臣官兵而伊等家口窮迫之時轉給以養贍有是理乎著明瑞等於事竣後查明此等賊人家口若隨身尚有口糧能前往伊犂者姑貸其一死或不能自給沿途餓斃伊等獲全首領尚屬厚幸斷不可過行小惠給與口糧以致濫費公項平定準噶爾方略續編卷三十一
