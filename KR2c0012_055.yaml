body:
  text: 乾隆十八年冬十一月甲戌定邉左副將軍成衮扎布奏報準噶爾都爾伯特台吉策凌及策凌烏巴什等率部衆三千餘戶來降成衮扎布奏言據防守烏里雅蘇台參贊大臣副都統達青阿報十一月初九日卡倫章京秦布等文稱有厄魯特巴顔克什克都圖爾噶前來求見詢係都爾伯特台吉策凌與策凌烏巴什所遣因達瓦齊自立後與小策零敦多卜之孫訥默庫濟爾噶爾連歲搆兵俱派令率衆相助策凌等惶惑莫知所從因相與計議投誠天朝以求永逺生聚於十月二十一日由伊犂河起行率部衆三千餘戶來至卡倫今台吉策凌已至博東齊河其策凌烏巴什隨後亦至經卡倫侍衛布雲布並左右卡倫章京齊克慎等與來使夜至博東齊河復遇厄魯特賽奈達什博貝等三人稱係台吉策凌等所遣因策凌等率同來戶口前赴額克阿喇勒淖爾暫時駐歇特留三人候巴顔克什克都圖爾噶回歸同往報知布雲布等遂與同行約十里餘見途中老弱男婦疲乏馬駝及牛羊甚夥據稱即係續到之人察其投降情形屬實因不便逺離卡倫即回至本處各帶兵丁巡查達青阿聞報即派侍衛蒙固勒等前赴塔卜海布拉克扎爾和烏蘭布延圖哈瑪爾沙扎海等處卡倫遍傳務令小心防範又派公米什克等帶兵二百名前赴卓克索偵探但策凌等既在額克阿喇勒淖爾暫歇去卡倫甚近恐達瓦齊遣兵來追似應令其進卡在扎卜堪珠爾庫珠等處居住或追兵到卡應飭卡倫侍衛等以從前定界並無不留降人之約曉示阻止臣等伏思策凌等歸命投誠情形雖確然準夷追逐自宜預防其達青阿所呈已飭令辦理復令副將軍貝勒策登扎卜將派備之兵保護游牧又就近將賽音諾顔部落及圖謝圖汗部落所備之兵共派出一千名令副將軍公格勒克巴木丕勒與扎薩克鎮國公恭格敦丹及巴圖孟克等帶往烏里雅蘇台駐防接應奏入上諭軍機大臣曰定邊左副將軍成衮扎布等奏報準噶爾都爾伯特台吉策凌策凌烏巴什等率所部三千餘戶來降暫駐於額克阿喇勒遣使相聞已將軍營預備各游牧之兵調遣防範朕觀策凌等來降似非叵測何也達瓦齊與訥默庫濟爾噶爾搆兵不已俱令策凌等相助兩家勝敗既難預定即幸而所從者勝亦仍受其約束自不若歸降大國冀得安生伊等既經來至卡倫將情事實告應即令其入內休息可速傳諭成衮扎布即遣軍營明白厯練大員前往曉諭告以爾等率衆投誠業經奏聞大皇帝大皇帝念爾等俱準噶爾台吉大員率領部衆輸誠向化甚可嘉憫今所駐額克阿喇勒乃我卡倫外地倘有追兵至此未便應援或有所失朕心深為不忍即可移入卡倫駐劄今冬將軍成衮扎布來京伊等自必懇求赴京瞻仰朕躬即將策凌策凌烏巴什及其頭目酌帶數人同來從前準噶爾台吉阿喇卜坦丹濟拉等投誠俱封以顯爵優加賞賚其宰桑及部落人等皆授官分産至今安居樂業伊等入見後朕自格外加恩此時先命成衮扎布動用官項牛羊賞給伊等以為接濟其駐牧處所另行酌定至準噶爾素稱狡詐固宜派兵防範但伊等天性好疑亦不可啓其猜嫌倘策凌等願留卡外居住我雖預備無庸宣露若已入卡倫則更無可疑不須過為防範今特遣侍郎玉保馳驛前往并加恩將朕所用元狐帽賞給策凌策凌烏巴什各一頂端罩各一件成衮扎布可即遵㫖辦理臣等謹案都爾伯特台吉策凌策凌烏巴什等率領部衆輸忱效順其時準夷內外交訌時勢已屬瞭然將軍等未能深悉情形猶議調兵防範我皇上於甫經奏到即燭其向化之誠傳諭移入卡倫資之遊牧封爵賞賚備沐渥恩厥後阿睦爾撒納內面來歸軍前大臣復議令將兵壯屯駐軍營而移其妻子於戈壁之內措置尤為未協屢蒙嚴㫖切責籌辦悉協機宜蓋以新附之人心懷疑慮非坦然示以大公既無以示無外之模亦難以收羣策之力也自是聞風請命絡繹偕來舉數十萬窮蹙無歸之人咸出水火而登袵席其感激圖報踴躍從戎固不待領兵罙入而地勢之險要人情之向背無一不批郤導窾赴㑹投時皆仰賴聖主如天覆幬之恩有以潛運密移於不覺孰謂遐荒異域獨不可信孚而誠感哉丙子定邊左副將軍成衮扎布奏報策凌烏巴什等移入卡倫賞給安置事宜成衮扎布奏言據達青阿報藍翎侍衛布雲布等文稱十一月十一日巴顔珠爾克卡倫章京秦布來告稱厄魯特策凌烏巴什在博東齊河遣使相聞因即時起程前至其地策凌烏巴什出迎先跪請大皇帝萬安並告稱我兄策凌前赴伊蘭僧庫爾因其地險阻雪大難行今將部衆暫分欲進巴顔珠爾克博托和尼卡倫居住當即告知伊等前蒙將軍傳示準噶爾部人若大隊來歸令其於卡倫外候信若欲入卡亦令暫駐僻處候示辦理據策凌烏巴什告云我等理應在卡倫外候信但天寒雪大倘有追兵前來疲乏不能行走請得入卡無論何處俱可靜候於十二日黎明策凌烏巴什即移至卡倫前博爾濟河駐歇其所領一千二百戶人丁牲畜一時難以查察惟詢明台吉䇿凌烏巴什及其母妻子女年歲俟策凌到後再行詳查因公同酌議安插於內卡外庫卜克爾之地并請將軍臺米石一百餘斛及就近凑辦牛羊給發接濟臣等前於八月初四日哨獲自準夷脫出之蒙古額楞達什告稱台吉策凌有來降之信曽經奏請遵照乾隆十六年諭㫖以降人若求入卡倫自可加恩接濟今策凌等來降屬實恐有追兵自應防範已劄行達青阿與副將軍格勒克巴木丕勒帶兵一千名輕裝前赴扎卜堪等處駐劄給與一月糧餉仍俟策凌等到日詢問酌量派遣入京至給發接濟口糧牛羊應俟伊等人數全到再為辦理成衮扎布又奏言據達青阿報藍翎侍衛布雲布等告稱十一月十三日厄魯特策凌率其妻子部落前至卡倫合計策凌烏巴什同來部衆共三千一百七十七戶台吉五員喇嘛二百九十三名同來滿洲漢人共五十名所攜馬駝牛羊頗多已派協理台吉朗衮扎卜侍衛敦多卜撫慰伊等歸命天朝情殊可憫并著朗衮扎卜將同來滿洲內酌帶數人先回有陸續投誠者倘已疲乏難行即給與口糧令其歸入部落并通飭三十三卡倫等語臣等伏思準夷內亂台吉策凌等歸誠聖主自當預籌接濟應請酌派四部落牲畜令達青阿交與策凌等酌量賞給此時正值天寒暫令在烏里雅蘇台度歲俟春和雪化從容移至呼倫貝爾等處游牧居住奏入上諭軍機大臣曰據成衮扎布奏台吉策凌策凌烏巴什已入卡倫朕昨遣玉保撫慰此時尚不能到觀伊等急求入卡其誠心愈益可見著傳諭成衮扎布令其即派大員接應至來降之台吉自宜暫緩來京約束部衆先將伊等大員輕騎減從帶領前來其餘仍遵朕前㫖行十二月丙戌命傳諭降人未經出痘者不必來京上諭軍機大臣曰朕昨遣侍郎玉保往諭策凌等今思伊等曽否出痘之處未經諭及可傳諭成衮扎布俟策凌策凌烏巴什到軍營時即行傳諭伊等逺來歸誠必急於瞻仰朕躬但蒙古部落中未經出痘者甚多京城氣候與邊塞不同伊等到此即傷一僕從朕心亦為不忍著將伊等及所部詳悉詢明曽否出痘再行酌量同來不可忽略况明年夏令朕巡幸熱河其地較京城凉爽若今冬未得前來將來自可於彼處瞻仰更與入京無異斷勿汲汲赴京轉負朕矜恤之意將此明白曉示至伊等現駐烏里雅蘇台俟來年移居呼倫貝爾一應事宜著成衮扎布來京之日㑹同軍機大臣定議具奏丁亥定邊左副將軍成衮扎布奏報策凌等進獻馬匹並言語情形成衮扎布奏言達青阿報十一月二十三日投誠台吉策凌率台吉塞卜騰班珠爾宰桑美諾克瑪什等及策凌烏巴什所屬宰桑巴圖哈什哈桑阿扎卜得木齊巴顔克什克等并隨從三十餘人望闕跪請皇上萬安告稱我等台吉宰桑備馬十二匹恭進大皇帝又同來滿洲蒙古漢人共一百名理合報出遂同策凌等列坐告以我朝定制扎薩克以上王貝勒貝子公等始得進貢皇上以下官員並無獻馬之例念爾等逺人誠心歸順自當代為奏明並詢明策凌為都爾伯特台吉錫第之子策凌烏巴什為達賴泰什之子原係一姓今已疏逺因達瓦齊自立後與訥默庫濟爾噶爾爭鬬俱調遣伊等相助是以歸誠聖主求得安生於本年十月二十一日由額爾齊斯河起程沿途並無追兵亦未遇風雪惟在準噶爾東界之烏蘭嶺烏英齊博東齊等處掠取牲畜而來又問策凌等如有追兵來時從何取道應有何人統率據稱現在伊等攻戰之際未必得暇來追倘有追兵惟噶爾藏多爾濟尚有兵萬餘或能前來但我等來路水草俱盡或從科卜多布延圖卓克索一路而來亦未可定至達瓦齊現在相助之人惟阿睦爾撒納及噶爾藏多爾濟二人尚屬才能其宰桑中如圖魯虎雖曽經戰陳業己年邁鄂勒錐巴哈曼集俱未諳練又有衮布聞已為訥默庫濟爾噶爾所殺再策凌等親屬中尚有策凌烏巴什之姪訥默庫所屬一千戶其近族台吉有額爾德尼巴圖博羅特剛多爾濟三人所屬約有千戶倘得便亦必前來投誠至問以達瓦齊與訥默庫濟爾噶爾强弱勝敗之處據稱訥默庫濟爾噶爾之兵較達瓦齊為强如達瓦齊兵敗自必投順天朝并詢明現在策凌等俱未出痘不便即令入京或將伊台吉宰桑內選派三四人於十二月初一日自軍營由驛起程其策凌等所報滿洲蒙古漢人一百名及進獻馬匹應如何辦理再副將軍貝勒策登扎卜率部衆一千名情願效力應否支給一月錢糧候㫖遵行臣等伏思策凌等輸誠向化甚為恭順自應加意撫納並申飭各卡倫小心防範其酌辦伊等來京之處或將曽經出痘者傳至軍營伺候所進馬匹俟來春解交上駟院再策凌等所云倘有追兵或係噶爾藏多爾濟雖未足為憑亦當先事預防其策登扎卜呈請效力兵一千名既在烏里雅蘇台預備策應似為有益應酌量給與一月錢糧米石奏入報聞定邉左副將軍成衮扎布奏報凖噶爾宰桑瑪木特來追策凌闌入卡倫成衮扎布奏言達青阿等報十一月二十六日貝子車木楚克扎布文稱凖噶爾宰桑瑪木特帶兵二百來追策凌當經巴顔珠爾克卡倫侍衛布雲布等前赴博爾濟河與瑪木特相遇令其於塔布圖外暫候俟報知軍營候示而瑪木特急期追獲即行進卡又於本日車木楚克扎布報稱據卡倫護軍伊靈阿等從瞭望處見烏梁海十餘人告稱我台吉噶爾藏多爾濟率兵二千在博托和尼暫歇即來追策凌後有阿睦爾撒納率兵三千亦二三日內可到且望見博托和尼西北山麓多有火光恐分途並進均未可定祈速為發兵應援臣等即劄行達青阿與貝勒策登扎卜公格勒克巴木丕勒等領兵前往庫克嶺等處㑹合車木楚克扎布密告策凌等遷移遊牧果有追兵相機戰守以逸待勞自可無虞惟是軍營馬匹最要臣等謹遵前降諭㫖由官購馬駝內酌撥馬六千匹駝三千隻預備應用奏入上諭軍機大臣曰據成衮扎布奏稱準噶爾宰桑瑪木特來追策凌既經阻止復强入我卡倫其後噶爾藏多爾濟等又有來追之信已就近調遣預備兵丁先以理曉示再為相機辦理等語所辦尚合機宜但準噶爾人等若遵行和好應在卡倫外聲明緣由靜候處置乃我卡倫人等阻止瑪木特並不遵行直入內地是大輕視我兵如入無人之境矣不惟國家大體攸關亦衆喀爾喀部落聲名所係理應相機擒𠞰又何必以和好為言夫卡倫乃邊陲定界彼此不可相踰今瑪木特既直入無懼倘仍聽其自行回巢則將來準夷得志必至漸生覬覦出入無忌近日準夷內亂堂堂天朝固不肯乘釁發兵攻取若窮蹙來降之人朕為共主豈忍不容留養育使策凌等在卡倫外為瑪木特追及尚可不必往援今已入卡倫而瑪木特冒昧恃强儼然挑釁豈可輕縱成衮扎布等既經派兵策應伊等或知斂跡尚可徐觀動靜倘恣肆妄行自當以逸待勞盡為𠞰絶且瑪木特帶兵二百直入之時若果即為擒獲羈候則續來之人自不敢逞此時作何辦理速行具奏侍郎玉保頗悉準夷情事著在參贊大臣上㑹同將軍等相機酌辦前鋒統領努三散秩大臣薩喇爾並著在參贊大臣上行走速行前往協同辦理隨命尚書舒赫德前赴鄂爾昆軍營辦理事務並揀選索倫烏拉齊侍衛章京拜唐阿兵丁等二十人隨同差遣各賞棉甲一領並整裝銀兩有差己丑上諭軍機大臣曰準噶爾瑪木特以二百人闌入卡倫甚有輕視我兵之意若不加以懲創將來噶爾藏多爾濟阿睦爾撒納必愈恣放肆如入無人之境是邊界駐劄兵丁徒有虛名何以保護喀爾喀耶在守卡兵丁僅二三十名豈能以理曉諭阻止二百之衆成衮扎布達青阿等即應派兵擒𠞰何以姑息玩愒至此可將現在如何辦理之處速行具奏將來瑪木特即束手就擒告求歸順亦非策凌等可比仍應看守請㫖或伊自度兵力微弱逸出卡倫亦必盡為搜捕不得寬縱至噶爾藏多爾濟等倘或繼來諒成衮扎布等自必預為籌備看此情形事已不可中止非應虛言和好之時我卡倫遊牧必須速移內地使賊毫無所犯其新來歸降之人一切安撫事宜更為切要可傳諭成衮扎布等知之庚寅上諭軍機大臣曰瑪木特來追策凌闌入卡倫卡倫官兵雖少但成衮扎布已遣貝子車木楚克扎布公米什克領兵駐於巴顔珠爾克等處防禦追兵若遇瑪木特等何難擒𠞰又成衮扎布奏稱達青阿與策登扎卜己領兵前往庫克嶺等處相機戰守果否親往及與瑪木特相遇如何辦理之處可傳諭伊等速行奏聞壬辰定邊左副將軍成衮扎布奏報瑪木特逸出卡倫成衮扎布奏言達青阿報據卡倫侍衛等文稱準噶爾宰桑瑪木特追逐策凌等自進卡以來並不敢深入內地晝夜藏匿旋即陸續出卡潛回遊牧當即派章京兵丁等前往瞭望尋踪伊等或全行回巢或逃往别處現在確查至所稱噶爾藏多爾濟等領兵前來是否虛實亦派賢能台吉官兵探明申報臣等仍飭達青阿於各泛防地方用心防範堵截以備不虞奏入上諭軍機大臣曰成衮扎布等奏稱瑪木特䦨入卡倫近又畏我有備潛行逸出等語前據達青阿等因防範追兵已派貝子車木楚克扎布公米什克帶兵三百名往巴顔珠爾克博托和尼溝中間堵截續經成衮扎布派格勒克巴木丕勒兵一千名前往策應又就近派兵一千名協助是現在兵力不為不多瑪木特如此任意出入既未曽擒𠞰於前又不能追逐於後視同烏有殊為駭異達青阿現駐卡倫近地何不相機辦理夫卡倫如門户然豈容䦨入今瑪木特又經回巢聽其出入不加懲創可乎此時準夷內亂之秋尚如此恣肆數載後或養精蓄鋭侵犯卡倫其何以保我喀爾喀耶達青阿等既曽領兵防範即著迅速前往或以計取或以力攻若不能擒獲瑪木特伊尚何顔復返其駐防烏里雅蘇台著烏爾登前往至成衮扎布於瑪木特出入之際並未籌及擒𠞰方略然則將軍職掌但須查取信息據文奏報已乎著嚴行申飭今命尚書舒赫德前往軍營一應機宜與伊等商酌辦理己亥恩免哈密回民賽巴什達里雅田租上諭軍機大臣曰從前哈密賽巴什達里雅屯田給令該處回子耕種所收榖石以四分交官六分給與回子今聞伊等生計稍艱著加恩將每年耕種所獲榖石不必交官全行賞給庚子命傳諭陜甘總督永常預籌夷使事宜上諭軍機大臣曰永常奏稱準夷貿易之期將届請仍舊暫為官辦照例動帑預備等語看來可不必先期預備此時達瓦齊與訥默庫濟爾噶爾彼此搆兵應無暇計及貿易但夷人有利必趨或仍循往例遣使前來哈密亦未可定可傳諭永常令其即行却回并曉以從前加恩噶爾丹策零是以准其按年貿易嗣策妄多爾濟那木扎爾暨喇嘛達爾扎乃噶爾丹策零之子今達瓦齊非其族類且由殺奪而得又並未遣使請安何得仍循往例况近日瑪木特前來北路䦨入卡倫繼復畏懼逃回現在遣人前往究問若達瓦齊知犯界非理縳獻自贖並遣使奏明或可仍准貿易此時不當遽許如來使不肯即回宛轉求請即應剴切曉諭俾知恩不可以幸邀倘在邊生事即與賊人犯境無異自當相機擒捕不得聽其猖獗著傳諭永常妥協辦理務合機宜乙巳訓諭安西提督王進泰上諭軍機大臣曰王進泰奏哈密毗連夷壤北路既有準夷大隊來降倘再有向西路來降夷人或準夷追逐抵我卡倫均未可定現在密飭各卡辨兵嚴加防範如遇大隊逃夷即阻留卡外詳辨真僞倘有追兵自當宣諭我皇上施恩和好不便收留之處明白曉諭聽其自便若無人追逐查詢屬實務須安置僻處拘其器械馬匹等語此奏所見甚小撫馭外夷之道全在隨時籌酌相機辦理從前策妄多爾濟那木扎爾及喇嘛達爾扎皆噶爾丹策零之子是以准其遣使入覲今彼中紛爭搆釁皆篡殺之人達瓦齊又非其族類何屑以和好為言其所屬夷人避亂投誠乃窮蹙來歸自當收留安置何必阻諸卡外絶其內附之心如或引兵來追即當守我卡倫無令䦨入至所請投降人等拘其器械馬匹此向來緑旗小見飾詞既許其內屬自不當示以猜疑使之駭懼看來王進泰不過小心謹慎之人於邊務機宜未能仔肩重任己傳諭永常於明年夏秋間親往安西節制調度現在瑪木特䦨入北路卡倫不得不遣人究問已命舒赫德等前往軍營相機辦理所有先後情節王進泰未能稔知著將北路軍營奏摺并所降諭㫖一併録示王進泰知之戊申定邊左副將軍成衮扎布覆奏籌辦擒𠞰瑪木特事宜成衮扎布奏言臣等奉到十二月十二日諭㫖即嚴飭參贊大臣達青阿由現駐烏里雅蘇台三千兵丁內挑選一千名同車木楚克扎布米什克帶領相機擒𠞰瑪木特臣等與副將軍格勒克巴木丕勒參贊貝勒額林沁等領兵一千策應但時值隆冬前往阿爾台等處馬力必須充足請於官備馬六千匹駝三千隻內選馬二千匹駝一千隻送至烏里雅蘇台接濟再駐防兵丁向有錢糧其策應之兵請酌量撥給兩月錢糧俟選撥齊全即令起程前往奏入報聞庚戌侍郎玉保奏報策凌等言語情形玉保奏言臣於十二月初十日由塔米爾起程十七日至察罕廋爾扎卜堪遣人傳知來降台吉策凌策凌烏巴什及宰桑等齊集策凌等各率所部於十里外迎接恭請聖主萬安臣等十一月二十三日所奉諭㫖宣示隨以恩賜策凌等冠服傳㫖賞給並告伊等云我到來後蒙聖主恩諭爾等未經出痘者不必入京令將軍等曉示想已知悉策凌等跪泣云噶爾丹策零時我等即思歸順大皇帝其時法令頗嚴人心未變今達瓦齊等搆兵無已俱來調遣不得安生是以歸命大皇帝久思瞻仰天顔旋蒙將軍等傳奉諭㫖以口內炎熱我等未經出痘者多若傷一僕從聖心亦為不忍誠不勝欽感今酌派曽經出痘宰桑和通巴顔克什克及策凌烏巴什宰桑哈錫塔策凌孟克宰桑巴圖等十人預備瞻仰大皇帝天顔我等螻蟻微生毫無補報荷蒙恩賜衣帽頂戴無極但未得瞻仰大皇帝心實不安懇祈代奏於明年聖駕巡幸熱河時俾得遂瞻仰之願等語臣因傳諭以明年入覲行在必加爵賞策凌等合掌叩首並詢知策凌年五十六歲策凌烏巴什年二十五歲又有族叔策凌孟克因管理巴玉特台吉事務故率班珠爾塞卜騰等十台吉屬下來投大皇帝其塞卜騰約㑹各部更著勤勞祈為轉達天聽臣即令其將策凌孟克所領戶口數目開列策凌孟克告稱我所領七百十一户所屬只一百十四户餘俱巴玉特台吉屬人臣伏覩策凌等感戴聖恩殊為恭順已著派宰桑和通等四人隨從六人送至塔米爾預備起程或臣親身帶領於正月十一日前後到京或委員護送俟與成衮扎布商酌辦理奏入報聞乾隆十九年春正月癸丑定邊左副將軍成衮扎布奏報侍郎玉保帶領宰桑和通等於十八年十二月二十五日自軍營起程赴京入覲壬戌尚書舒赫德奏報分路調遣查拏瑪木特等事宜舒赫德奏言臣於十八年十二月十八日自京起程十九年正月初三日至軍營㑹同將軍成衮扎布等將烏梁海䦨入卡倫情形與卡倫侍衛前後呈報文書細加查看始知䦨入卡倫者非止烏梁海尚有準噶爾厄魯特得木齊烏巴什赤倫哈什哈等應盡行查拏辦理查厄魯特與烏梁海等原從兩處卡倫而入合於一處今若先後查拏我兵已出卡倫聲勢張揚必致鼠竄應將我兵亦分兩路令努三薩喇爾等帶兵五百名查拏烏梁海瑚圖克等並行文達青阿等將現帶兵一千名內挑選五百名查拏厄魯特瑪木特得木齊烏巴什等又派參贊大臣烏爾登喀爾喀副將軍策登扎卜帶兵五百名出卡倫接應參贊大臣安崇阿帶兵五百名於附近卡倫接應現今邊上駐兵三千兩路共調兵二千僅餘一千放牧馬匹看守營寨外其勢稍弱臣等於鄂爾昆預備之貝勒策卜登所領兵一千西喇烏蘇地方預備之副將軍得親扎卜郡王齊巴克雅喇木丕勒所領兵一千盡行調至與貝勒策卜登等帶往烏里雅蘇台就近助威駐劄奏入報聞乙丑議安插降人事宜尚書舒赫德等奏言查得來降之策凌策凌烏巴什策凌孟克等應指與遊牧地方但準噶爾之人以種地為業不似喀爾喀蒙古賴畜牧度日今若令住於推河等處與喀爾喀一同牧放伊等人衆不得種地不善牧放殊於生計無益查呼倫貝爾地方與喀爾喀車臣汗之地連界不但可以種地亦有牧放牲畜之處請即令住此處將喀爾喀遊牧向內略加移徙於新降之衆久逺有益奏入得㫖軍機大臣議奏尋議厄魯特人等雖知耕種究賴牲畜度日並非全恃田土種作前呼倫貝爾地方議令安插歸順厄魯特人等行查該將軍經傳爾丹奏稱該處駐劄索倫新巴爾虎厄魯特等人口繁庶牧場牲畜已經孳生若令陸續再往居住實恐地方狹窄今策凌等戶口甚多呼倫貝爾地方勢不能容查從前丹津阿喇卜坦歸順時安插推河洪郭羅阿濟爾罕等處後因茂海巴濟等逃歸準噶爾方將塞卜騰旺布等移居喀爾喀河等處推河洪郭羅阿濟爾罕地方寬廣水草充足若令策凌等居住似為有益但該處現在有無遊牧臣等未能懸擬今既奉㫖派玉保麒麟保前往辦理安插事宜應俟伊等到軍營之日㑹同舒赫德將軍大臣等查明定議奏聞辦理奏入上從之丁丑尚書舒赫德等奏報參贊大臣達青阿誘擒瑪木特解送京師舒赫德等奏言參贊大臣達青阿往拏擅入卡倫之賊瑪木特先遣侍衛齊克慎蒙固勒等偵探信息於正月十六日遣人誘致瑪木特達青阿設計令護軍校德明侍衛布雲布等於瑪木特來路安設二卡倫守候命公米什克護軍伊靈阿等各帶領馬步兵埋伏齊克慎等帶領瑪木特在薩拉布拉克卡倫之外引至達青阿住處遂將瑪木特等三十五人悉行擒獲臣等查問明白即行押解赴京但瑪木特係準噶爾守界之人被我兵擒獲伊等不知瑪木特擅入卡倫情由或遣人索取亦未可定現令烏爾登將原帶兵五百名在卡倫附近緊要地方防範居住將達青阿等撤回奏入上諭之曰從前降㫖原令達青阿領兵前往詢問瑪木特闌入卡倫情由應以理責其進卡之罪倘呼之不至或至而心懷不服有所抗拒即以兵力擒拿今但遣一使曉諭而瑪木特即親身前來並無抗拒情形達青阿設計誘擒辦理非是且蒙古人內名瑪木特者甚多並不詢其孰假孰真更極舛錯達青阿著來京候㫖瑪木特恭順聽命著從寬免其從前冒昧入卡之罪賞給盤費釋放回巢隨命侍郎玉保於前赴軍營之便中途遇瑪木特解送赴京即行傳㫖宣諭釋放尋玉保奏稱於鄂倫瑚都克第八臺遇見侍衛富德等解送瑪木特前來宣諭恩㫖賞給衣帽瑪木特泥首謝恩即行帶回軍營釋放奏入報聞二月甲申命前鋒統領努三為參贊大臣丁亥準噶爾部人伯勒克率衆來降命賞給安插如例庚寅尚書舒赫德等奏報參贊大臣薩喇爾等擒獲擅入卡倫之烏梁海扎木參等解送京師舒赫德等奏言正月二十五日薩喇爾努三等拿獲擅入卡倫之烏梁海得木齊扎木參瑚圖克等於三十日解至大營臣等即交與侍衛楊格等解送京師於二月初一日自扎卜堪起程奏入得㫖薩喇爾等擒獲烏梁海扎木參等不必送至京師著於烏里雅蘇台牢固圈禁俟烏梁海事定再行具奏辦理復諭軍機大臣曰據尚書舒赫德等奏稱薩喇爾領兵前往科卜多地方薩喇爾擒拏得準噶爾烏梁海得木齊扎木參收凌伯克博羅特等努三亦將得木齊瑚圖克擒獲薩喇爾感戴朕恩遵奉指示領兵前往烏梁海擒獲扎木參等無忝任使甚屬可嘉若如達青阿誘擒瑪木特則甚虧大國體統矣薩喇爾著加恩補授內大臣努三去時原有畏葸之意曽降㫖訓飭此次擒拿瑚圖克尚屬奮勉自可寬宥前愆貝勒額林沁公恭格敦丹策登薩木丕勒等協同效力亦屬可嘉著交部議叙丁酉命軍營大員有事自行封進無庸詳報將軍轉奏尚書舒赫德等奏報招諭烏梁海情形先是有㫖令將軍大臣等於薩喇爾等查拏瑚圖克等之便招諭準噶爾烏梁海如未投順即行驅逐於阿爾台以外至是舒赫德等奏言據參贊大臣薩喇爾文稱二月初一日我等放回之收凌朔岱訥庫勒等十人得領被擒之得木齊扎木參等兄弟妻子赴軍營告稱收凌朔岱放回時向宰桑雅爾都得木齊阿茂海告知扎木參等因擅入卡倫大兵前來擒拏如知罪投順即奏明大皇帝令住原遊牧處加恩安撫如不投順則逐往阿爾台以外阿茂海差人告知五宰桑一面安慰驚慌之烏梁海等一面令收凌朔岱同訥庫勒等來見大人懇請如逐往阿爾台以外則我等無遊牧之地今情願投順懇令在烏蘭古木至克木克木齊克地方居住我等向訥庫勒等云汝等誠心投順即進我卡倫在特斯河遊牧若在克木克木齊克地方居住乃卡倫外地倘有追兵難以照看據訥庫勒又再三懇求不願在特斯河遊牧我等因向訥庫勒云汝速回告汝宰桑如欲投順親自前來不則即將汝等驅逐阿爾台以外如此諭遣而去臣等竊思伊等宰桑並未前來只差訥庫勒等傳語又將自烏蘭古木至克木克木齊克地方居住之說再三固請克木克木齊克乃與阿爾台北面烏梁海居住相近在我卡倫之外是雖有投順之名轉與伊等烏梁海一處居住觀此則伊等非真心投順可知續又據薩喇爾文稱烏梁海等知我兵在卡倫切近雖有投順之心實懼兵威遲疑不進亦未可定且據卡倫侍衛告稱阿睦爾撒納有來降之信烏梁海等亦皆知此事我等公同商議將兵向內緩撤於卓克索地方揀形勢處劄營居住卓克索乃各路總口烏梁海若前來投順辦理甚易并接應阿睦爾撒納邀截追兵一切皆便已於二月初四日自科卜多河口起身前往卓克索等語臣等又將各處卡倫侍衛呈報文書一一查看大約烏梁海等聞達瓦齊復作台吉未肯投順又因懼我兵威紛紛避匿一時難以收服臣等酌議此處烏梁海宰桑都塔齊鄂哈什等與準噶爾烏梁海連界居住年久彼此互相往來若遣人令都塔齊等明白曉諭準噶爾烏梁海等仍一面令薩喇爾等領兵驅逐如此庶可全行收服奏入上諭之曰據舒赫德等奏準噶爾達瓦齊復作台吉烏梁海等不願歸順一時難以收服已令薩喇爾暫住卓克索地方宣揚兵勢另籌辦理等語舒赫德等前後所奏情形竟未諭辦理此事之㫖朕不解舒赫德何以至此前令將烏梁海收降招服者非因達瓦齊訥默庫濟爾噶爾彼此搆釁乘亂而始辦也特因烏梁海等追逐策凌直入我卡倫若不懲治必致肆意妄行且烏梁海等亦緣近處阿爾台之內故得侵犯我卡若驅之於阿爾台之外雖欲侵犯豈能猝至是以令於此時或許歸降或行驅逐一經辦定於地方長久有益原與達瓦齊之復作台吉與否全無關涉無論此時達瓦齊與訥默庫濟爾噶爾內亂之時即使噶爾丹策零尚在遇此機㑹亦當為廓清地方從長辦理更有何疑朕曽降㫖軍營將軍大臣毋得偏執已意致令薩喇爾辦理周章今觀此奏豈非故掣其肘乎若謂薩喇爾馬力疲乏即令其在駐劄處暫為休息未始不可達瓦齊復作台吉之處何必齒及此尤朕所不解也再瑪木特已經釋放伊若感恩自必來歸如不歸誠必將此事告知伊台吉其台吉豈肯晏然即已勢必遣使前來索取逃人策凌等彼時非發兵征討更無善策在舒赫德等以為既將瑪木特釋放若扎木參等亦照此釋放便可無事獨不思堂堂天朝有如是辦理之法乎今準夷正值力弱舒赫德尚如此畏怯若遇彼猖獗時伊等不過收入喀爾喀一籌莫展而已俟烏梁海辦竣之後瑪木特若不來歸亦必一律辦理今應如何防範瑪木特之處亦宜預為留心此時惟遵朕屢次所降諭㫖飭諭薩喇爾悉心妥辦舒赫德尚再行從中阻撓决不寬恕其罪癸卯命揀選察哈爾兵及新降厄魯特等發往軍營調遣上諭軍機大臣曰內大臣薩喇爾向尚書舒赫德寄信轉奏請派厄魯特兵五百名或一千名發往軍前調遣此次薩喇爾辦理招諭驅逐烏梁海事務頗屬奮勉但軍營將軍大臣等劄付不合機宜以致薩喇爾等辦理掣肘亦未可定厄魯特策凌等新降之人即行調遣亦無不可然其遊牧尚未指定伊等內倘有無知小人或致逃竄於事無益著舒赫德㑹同薩喇爾策凌策凌烏巴什等商議將伊屬下最可信之塞卜騰等台吉宰桑酌派數員領兵一二百名再令御前侍衛永柱㑹同總管阿敏道揀派察哈爾八旗兵五百名帶領交與薩喇爾為招諭驅逐烏梁海之用今春馬匹臕缺之時雖不可急行但薩喇爾係熟悉此路之人相機行事務期迅速成功不必照將軍大臣等所飭固執而行將此傳諭薩喇爾知之乙巳準噶爾烏梁海庫本來降命賞給安插如例平定準噶爾方略正編卷一
