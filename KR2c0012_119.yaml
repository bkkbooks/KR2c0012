body:
  text: 乾隆二十三年十一月丁未副都統愛隆阿疏奏靖逆將軍納穆扎爾等信息愛隆阿奏言臣隨將軍兆惠於十月初五日至葉爾羌初十日渡河令臣領兵五百名又侍衛奎瑪岱兵三百名防範喀什噶爾來援賊衆併巡查臺站候將軍納穆扎爾參贊大臣三泰等到時派兵隨至大營納穆扎爾三泰於十三日至臣營臣派騎兵二百五十名步兵二百名護送納穆扎爾等但帶騎兵於申刻起程期以黎明趲至大營將臣遣回十四日五鼓時吉林兵津保住來告云將軍等聞鎗炮聲遣奎瑪岱拏獲回人詢知賊營在近即擬衝擊臣即領步兵渡河䇿應又據署驍騎校黑柱來告云將軍等於黎明時望見回人三處營盤正遣哨探間賊衆三千餘布陳來攻將軍等即接戰人少馬乏不能衝突不知信息如何臣正在詢問間將軍兆惠遣人告知被圍之信又據隨將軍納穆扎爾等之賽里木回人等來告云我兵遇賊力戰賊衆四面合圍侍衛奎瑪岱先殞將軍納穆扎爾矢盡參贊大臣三泰墜馬徒步接戰僅餘二矢俱中賊鎗陳亡傳聞此次回賊係波羅泥都為首霍集占守城等語臣於十五日聞知兩處信息若領兵應援恐無濟於事惟遵兆惠令收集臺站向阿克蘇與舒赫德商議整兵再進兆惠處有兵三千餘宰食馬駝可至正月臣自臺站前來與副將定柱遇賊𠞰殺於二十七日至阿克蘇將所帶緑旗兵遣往烏什防守至臣未能應援將軍罪不可逭懇請正法示衆奏入得旨愛隆阿遵兆惠行文收集臺站𠞰殺賊衆尚屬效力已加恩交部議敘其送信回人等著舒赫德酌量賞給陳亡兵丁查明送部議恤俱已降諭旨命優恤靖逆將軍納穆扎爾等上諭大學士曰據愛隆阿奏稱靖逆將軍納穆扎爾參贊大臣三泰及巴圖魯侍衛奎瑪岱於十月十三日領兵二百餘名前赴將軍兆惠大營至次日有隨營兵丁等告稱十三日夜四鼓時納穆扎爾等遇逆賊三千餘人倉猝接戰納穆扎爾三泰奎瑪岱俱已陳亡等語伊等奉命前赴軍營輕裝進發所領兵丁僅二百餘人設令先到大營固可會同進𠞰即後至一二日亦與愛隆阿一同駐守乃星夜趲行之時適遇賊衆猖獗伊等並不肯於中途退避自全惟知直前衝擊以致授命捐軀忠毅之氣深可嘉憫納穆扎爾著贈公爵三泰著贈子爵俱世襲罔替其侍衛奎瑪岱著照奇徹布之例賞給世職應得恤典仍著該部察例具奏陳亡兵丁人等並著查明分别從優賞恤命參贊大臣舒赫德等補授工部尚書等缺上諭大學士曰工部尚書鑲紅旗滿洲都統納穆扎爾員缺著舒赫德補授所遺吏部侍郎員缺著阿里衮補授戶部侍郎三泰員缺著明瑞補授正紅旗漢軍副都統著鄂弼升補永貴尚未來京其刑部侍郎事務著鄂弼暫行署理戊申諭大學士管陜甘總督黃廷桂酌遣屯田兵丁備𠞰事宜上諭軍機大臣曰據黃廷桂奏稱來年添派屯田兵丁一萬三千餘名計陸續解送馬匹牲隻除倒斃外所存尚不敷用擬於臺站車騾及採買驢頭各營孳生兒騾馬匹內各派二千解送闢展以備永貴撥用等語具見實心經畫從前添派屯田原以辦理回部今年可告成功此時尚需策應軍營整師再進則屯田自可稍緩朕意於此項兵丁內選派四五千名預備進𠞰伊等雖係步兵而追隨騎兵之後聲威益壯至所備馬匹牲隻擇水草佳處牧放或供挽運或備乘騎於軍務有濟而辦理更覺裕如且來年必有應屯田之處即再派一二千亦可所派兵丁雖或先已賞給俟明年辦完回部後尚需屯種亦無庸追繳至內地採買騾驢恐民間不無貽纍所派兵丁既不及原額自可暫停採買將此傳諭黃廷桂定長等會商定議辦理一面具奏併傳諭兆惠富德舒赫德等應作何調撥酌議奏聞命分别奬飭領隊侍衛等上諭軍機大臣曰據清馥奏稱領隊侍衛豐訥亨等因前奉緩行以息馬力之諭今又準參贊大臣等催令速行咨請指示隨行文令其酌量馬力以速為要等語所見甚是軍營情形緩急不同行文日期亦有先後何必拘泥前旨行走處尚如此觀望臨陳決機安能奮勉前進可謂不曉事體著傳旨嚴行申飭適據額訥慎塔爾海烏爾圖納遜等奏稱遇舒赫德所遣五十保促令趲行雖奉旨搜捕嗎哈沁自以策應軍營為急即領兵速進等語似此方合事機著紀功候賞五十保行走甚好著加恩授為三等侍衛授故參贊大臣三泰之兄祥泰為散秩大臣上諭軍機大臣曰三泰遇賊陳亡伊家現無大員著加恩授伊兄祥泰為散秩大臣己酉諭辦理屯田副都統職銜定長等巡查臺站上諭軍機大臣曰前命侍衛額訥慎等巡查臺站今聞信速赴軍營時屆冬寒西北大山一帶嗎哈沁勢難藏匿或潛至臺站附近乘間盜竊馬匹亦未可定今屯田兵丁農務有暇著傳諭定長等選派二三百名巡查搜捕彼處若有馬匹則多派騎兵更妥豆斌在軍營尚無要務著即照定長所領之數選派兵丁前赴魯克察克闢展庫車一帶往來巡緝以清臺路庚戌申諭定邊右副將軍富德等速赴軍營上諭軍機大臣曰據富德奏稱十一月初十日遇舒赫德所遣藍翎侍衛扎勒都告知軍營情形即於現在烏魯木齊兵丁一千三百名內選索倫兵三百名吉林察哈爾緑旗兵二百名令副都統鄂博什侍衛瑪瑺額爾登額老格等為前隊又派往巴祿處之索倫兵五百名現距烏魯木齊兩站即親行帶領起程餘兵令瑚爾起帶往伊拉里克托克三等處支領馬匹軍器等語所奏甚合機宜即瑚爾起之兵不能趲赴而預備來年再舉亦甚有益惟宜加意奮勉前進仍令瑚爾起曉示兵丁以伊等效力年久本欲撤回事出倉猝暫行留用一切賞給均照初次之例沿途酌量馬力速赴阿克蘇會同舒赫德計議進𠞰辛亥恩賞阿克蘇回城頭目等翎頂緞匹上諭軍機大臣曰舒赫德奏稱管理阿克蘇之阿琿阿卜都噶頗爾副總管頗拉特巴巴克於公事各知奮勉阿爾雜默特率先歸順又督辦隘口卡倫事務俱屬效力等語伊等甫經降附即感激報效殊屬可嘉著加恩賞給阿琿阿卜都噶頗爾副總管頗拉特巴巴克孔雀翎四品帽頂阿爾雜默特藍翎仍酌量賞給緞匹諭參贊大臣巴祿等前赴兆惠軍營上諭軍機大臣曰據巴祿奏稱前聞阿巴噶斯哈丹餘賊藏匿齋爾等處隨經親往搜查並無蹤迹今遵旨回抵烏魯木齊帶領新派兵丁前往等語可傳諭巴祿此時因將軍兆惠被圍催各隊援兵速進所諭帶領之索倫兵已經停止而富德亦奏請就近帶往軍營阿巴噶斯哈丹餘賊即入俄羅斯亦無關緊要若尚在藏匿將來自可𠞰除且又非哈薩克錫喇可比巴祿即由進兵道路前赴兆惠軍營又諭曰前因招降安集延納木干二城回人約來春到伊犂投見曽降旨留兵一百名駐候續巴祿因格登山立碑紀功請照前數派兵令主事富魁駐劄料理併守候回人但駐兵必須安設臺站殊為勞費若現在立碑事竣回人尚無信息即當撤回前赴兆惠軍營可傳諭定長酌量辦理恩賞哈密貝子玉素富貝勒品級上諭軍機大臣曰舒赫德奏稱貝子玉素富調取布魯特之特穆爾占隨侍衛布占泰往布魯特發兵攻𠞰喀什噶爾今特穆爾占遣其族子烏魯特特穆爾等前來玉素富辦給馬匹又賞緞匹茶葉養贍家口伊等欣感起程等語玉素富辦事軍營駐守烏什俱能悉心奮勉甚屬可嘉著加恩給與貝勒品級壬子諭定邊右副將軍富德速往策應軍營上諭軍機大臣曰富德奏稱聞兆惠被圍之信即領兵量力馬步兼行約十二月二十內外可至阿克蘇計兵五千有奇惟急需馬駝軍器已行文各處辦事大臣務期辦馬萬餘匹駝數千隻方足敷用等語富德存心忠實甚屬可嘉以理揆之必蒙上天福佑早告功成至豫備馬駝一事昨阿里衮親送馬三千匹駝七百隻黃廷桂又送馬三千匹合之各隊兵丁乘騎者不下萬餘若再急為解送則路逺候寒徒致疲斃此時舒赫德諒已前進可傳諭富德惟在速往應援內外夾攻賊衆必潰我師暫回阿克蘇休息來年五月整兵再進計內地牧養之馬於二月起程四月可到且正當麥熟軍食有資蕩平回部在此一舉富德其加意奮勉與將軍大臣等會商辦理十二月癸丑朔諭察哈爾總管敏珠爾等巡查臺站上諭軍機大臣曰據敏珠爾等奏稱兵至托克三奉旨查拏偷盜特伯勒古臺站馬匹之賊已速行至哈喇沙爾向海都河等處搜捕等語可傳諭敏珠爾此時軍營若行文調取自當速往應援如未經起程則臺站亦屬緊要伊所領兵二百名仍往來巡查臺站以清道路諭陜西巡撫鐘音辦送西安駐防官兵事宜上諭軍機大臣曰鐘音所奏辦送官兵一摺內稱於西安雇用長騾徑送出口較設站遞送更為便捷等語昨據胡寶瑔覆奏河南現辦雇騾六千餘頭由西安送至蘭州再令陜西接换直送出口所辦甚屬妥協今蘭州以東既用河南所辦則陜西力更寬餘徑可先期趲赴蘭州接替直抵哈密彼此俱屬便捷其一切沿途委員加意照料之處均遵照前旨行甲寅命封大學士管陜甘總督黃廷桂為三等伯上諭大學士曰大學士兼管陜甘總督黃廷桂忠誠素著老成練達西陲用兵以來雖未身履行陳而籌辦一切軍需動協機宜多有朕所降諭旨尚未到肅而適相吻合旋即奏到與朕所規畫不約而同者數年以來若非黃廷桂體國奉公不遺餘力安得精詳妥協若此而毫不纍民內地若無事此其功為尤大朕心實深倚毗宜晉崇階用彰勞績黃廷桂著由騎都尉晉封為三等伯並加賞紅寶石帽頂四團龍補服以示優異又諭曰黃廷桂晉封伯爵前授騎都尉例應注銷但此職現賞給伊子著加恩仍準其本身承襲命吏部侍郎阿里衮補授兵部尚書正紅旗蒙古都統乙卯參贊大臣舒赫德疏奏和闐等城回衆歸誠舒赫德奏言十一月初五日據阿克蘇之阿奇木伯克等領散秩大臣伯克鄂對處差來伊家送信之回人投見據稱伯克鄂對同侍衛齊凌扎卜噶布舒前往招撫和闐時途間捉生詢問隨傳檄和闐頭目云大兵已至我等同天朝侍衛前來招撫爾等須作速投誠否則大兵一到將爾等盡行𠞰滅和闐頭目等聞信遂將霍集占所遣之四五十人驅逐逃走於伯克鄂對等未到三日之前即率衆出迎鄂對等於九月二十左右入城於是和闐所屬之哈喇哈什玉隴哈什塔克齊爾拉克勒底雅等城伯克等聞風俱各投誠鄂對等駐城二十五日其各城頭目二十餘人及隨從人等約於十月十七八日同侍衛等由和闐起程前往葉爾羌投見將軍等語臣詢問回人等云我侍衛同伯克鄂對各城頭目皆往見將軍曾否派委信實之人守城和闐至葉爾羌約行幾日亦有前鋒哨探否據稱城守俱有信實之人鄂對等約行七八日可至軍營仍於沿途探聽大兵信息又問爾等曾遇見由阿克蘇先差之回人三名續差之侍衛一員兵二十名否據稱由阿克蘇至和闐有兩三處路徑我等雖聞有差員經過並未相遇等語臣伏思伯克鄂對等招撫和闐六城往見將軍時雖未得大兵信息但鄂對人頗厯練且有二侍衛與索倫兵在途間留心探聽如得大兵信息料伊等必能籌辦鎮撫各城再以鄂對等起程之日計算於途間得信轉回時正可與臣等所差之回人相值一有信息即行具奏又阿克蘇之阿琿阿卜都噶頗爾副總管頗拉特巴巴克及伯克鄂對之妻因駐劄兵丁行裝俱留闢展情願辦送羊皮襖二百件布三百匹添備冬衣以表誠悃臣等加以撫慰擬酌量賞給銀兩緞匹以示奬勵奏入上諭軍機大臣曰伯克鄂對與侍衛齊凌扎卜等招降和闐等城前往軍營投見將軍兆惠殊屬可嘉著加恩授鄂對為內大臣其各城伯克應授散秩大臣及三品四品總管者候兆惠查明奏請補授仍俱賞戴孔雀翎鄂對遣來阿克蘇送信及舒赫德所遣偵探信息之回人等俱著酌量賞給銀兩其阿克蘇之阿琿及總管等願助兵丁衣服誠悃可嘉著賞緞各四端伊等所助冬衣俱計值賞給此時舒赫德應已領兵起程軍前效力人等宜加鼓勵著發孔雀翎藍翎各二十枝豫備賞賚所有軍營信息作速奏聞宣諭和闐等城歸附及軍前情形上諭大學士曰據駐劄阿克蘇城尚書舒赫德奏稱前遣散秩大臣伯克鄂對同侍衛齊凌扎卜噶布舒等前往和闐城招撫回衆今據遣人告稱和闐回人奉到傳檄傾心投誠即將逆賊霍集占遣往之數十人追逐奔竄率衆逺迎其所屬之哈喇哈什玉隴哈什塔克齊爾拉克勒底雅等五城伯克亦俱聞信來降今鄂對等率領各城頭目赴葉爾羌投見將軍等語初將軍兆惠勒兵前進聲威所至如烏什阿克蘇等城相繼迎降而伯克霍集斯復親詣軍營歸順願效前驅是賊首霍集占勢已窮蹙惟逃竄於葉爾羌以圖茍延旦夕若不乘機直入徑搗賊巢則以霍集占之姦詭狡詐焉知不又煽惑諸城回衆今觀和闐等城奉檄傾心遣人投見可知我兵為賊所拒不過霍集占見各城解體不能煽惑因悉其老弱之衆以為孤注之一擲耳則前此將軍兆惠等乘賊不備整兵疾馳亦係應機進取勢無中止之理特以對壘時不深知地利兼之馬力疲乏是以未能克捷並非賊勢猖獗所致也況軍營大臣及侍衛兵丁等聞信之下無不切齒憤恨星夜兼程前進而肅州哈密巴里坤大臣等亦各將鎗炮軍器馬匹糧餉迅速轉運朕心深為嘉悅觀大臣官兵如此奮勉同心協力則人心上應天心自然默相成功殄滅賊衆以彼勢窮力蹙之逆回我兵內外夾攻俾將軍兆惠等回至阿克蘇遵朕節次指示來年整兵進𠞰自可集事即此次進兵如蒙上天默佑遇可乘之機一舉成功亦未可定除伯克鄂對等皆已加恩外將此通行曉諭知之巴圖魯侍衛濟塞布以病留巴里坤身故授其子為恩騎尉賞銀一百兩丙辰諭刑部侍郎永貴等辦理糧運等事宜上諭軍機大臣曰永貴奏稱準舒赫德咨合計官兵一萬四千陸續運送口糧羊隻可至來年二月等語但天寒道逺所送羊隻必多倒斃自不能盡符原數而內地運糧駝隻計自闢展至庫車正月望後方到仍須休息月餘再行轉運又不能接濟二月以後之糧請將運送籽種之駝再派出二千隻作為兩隊轉運其屯田事務酌量裁減停止等語昨據舒赫德合計兵數及阿克蘇烏什所購米糧內地解送羊隻具奏即諭黃廷桂多為籌辦并停止增派屯田以籽種農具車輛轉運行糧永貴尚未聞知又如各隊新派官兵裹帶三個月口糧俟滿日再為支給則為時又屬寬裕永貴亦未計及故稍露畏難之意然兹事豈能停止至所奏各隊官兵策應兆惠後稍為休息俟來年夏令再行進取朕早降諭旨但我兵既能與兆惠會合聲威大振霍集占等逃潰之餘若能乘勢擒𠞰或伊等屬人縳獻又豈可回駐阿克蘇而坐失機會凡事惟在乘時決策不可預存意見並傳諭舒赫德曉諭官兵等加意撙節口糧毋致糜費戊午諭三等侍衛達爾黨阿等帶領派出西安駐防官兵上諭軍機大臣曰昨命都賚前往西安挑選駐防滿洲兵令嵩阿禮楊桑阿帶領前赴軍營伊署理將軍事務今據嵩阿禮參奏都賚各欵己命劉統勳前往查審嵩阿禮著仍留將軍之任所派官兵二千名著達爾黨阿哈達哈分領前赴軍營己未恩免陜甘各營借支養馬銀兩上諭大學士曰陜甘滿漢各營餧解馬匹自去秋至今春各項借支官銀據黃廷桂查奏計五十萬九千二百餘兩皆應行按限扣還之項朕軫念邊兵著加恩全行寬免用昭體恤勤勞至意該部即遵諭行庚申恩諭增給購辦喀爾喀馬駝價值上諭軍機大臣曰將軍成衮扎布等奏稱揀選達什達瓦之厄魯特等於四部落購辦馬駝令其送往巴里坤等語天氣現值冬寒喀爾喀等生計亦多貧薄若按照從前價值未免不敷可傳諭成衮扎布等購辦馬駝加恩酌量增給價值務使伊等毫無擾纍仍將現在辦理情形具奏辛酉命原任布政使同德以道銜隨布政使清馥在巴里坤辦事賜副都統溫布圖布巴圖魯號由屯克特爾克巴圖魯號所給雲騎尉職銜準伊子等承襲壬戌參贊大臣舒赫德疏奏軍營情形及駐兵和闐事宜舒赫德奏言十一月十二日夜伯克鄂對等遣回人報稱九月二十四日招服和闐等六城十月初九日遣回人四名往軍營報知將軍據回稱將軍領兵現與賊衆交戰不能通信二十一日又遣人往探二十七日回稱行遇賊營在大兵營外屯劄竟不能通彼此互相結寨放鎗看來大兵似被賊圍守若臺站不斷自可督兵應援我等或由和闐或由烏什務往軍營探信又克勒底雅城以外有人衆馱載陸續前來不知係何處之兵亦遣人往探等語臣問來人和闐等城情形如何據告稱六城人衆實心歸附各圖堅守但以無馬不能出兵等語臣伏思和闐等城今雖歸附恐聞大兵被圍之信妄生疑懼應派兵防護因商之總管噶岱默特據云現在阿克蘇烏什因駐有兵丁人心頗定和闐自應照辦臣即派緑旗兵五百名令遊擊伍凌阿守備傅能帶領人給十日口糧撥馬三十匹駝三十隻整裝起程行文伯克鄂對令其妥協辦理又臣於十一月十三日閲富德咨將軍文云富德於十月二十二日抵烏魯木齊二十四日令努三永德前往闢展於新調四千兵內先辦送索倫兵一千名挑選馬三千匹餘兵續行進發等語查各隊兵丁臣於十月十八二十等日俱已催督前進恐接富德行文或致守候遲延復差人行催并知會富德即行前進奏入報聞癸亥三等侍衛五十保以備問軍營情節來京賞銀五十兩衣一襲命齎賜將軍兆惠等章服馳驛前往軍營甲子命原任道員淑寶以道銜隨布政使清馥在巴里坤辦事丙寅諭大學士管陜甘總督黃廷桂等轉運糧餉事宜上諭軍機大臣曰黃廷桂奏稱運送來年進𠞰兵丁口糧現在闢展有駝六千隻仍需駝四五千隻方足敷用請降旨直𨽻山西督撫再行購辦趲赴甘肅備用等語可傳諭黃廷桂適已諭直隸總督方觀承辦駝二千隻山西巡撫塔永寧辦駝三千隻今又諭塔永寧量力再辦二三千隻隨得隨解以濟軍需矣運糧駝隻購辦不易朕意自庫車至阿克蘇若雇回人牛驢給以腳價遞相傳送又於屯田收穫糧石內量為撥運亦可稍省轉餉之勞但此事恐非永貴所能獨辦可傳諭舒赫德計此旨到時伊已應援將軍等回抵阿克蘇來年不必隨同進𠞰仍於阿克蘇庫車之間同永貴往來巡查糧運勸課屯田至撥運口糧時或雇回人牲隻或貧苦回人內有願肩糧步送者俱酌給價值但宜視其果否情願不可勉強派纍致失新附之心德舒既辦理庫車事務併著傳諭知之奬諭副都統巴圖濟爾噶爾等上諭軍機大臣曰定長等奏巴圖濟爾噶爾瑚爾起於十一月二十五日領兵至伊拉里克因馬駝未至兵丁等皆背負口糧軍器步行戈壁隨將現到闢展駝隻趲送仍將續到馬駝速為接濟等語伊等所領官兵皆應撤回更换者昨因懇請前赴軍營己諭照初次出兵例賞給今又不候馬駝步行速進奮勉可嘉除照前旨賞給外巴圖濟爾噶爾現任鑲黃旗蒙古副都統著加恩授伊弟恩克阿穆爾為藍翎侍衛賞伊家銀一百兩瑚爾起著補授正白旗蒙古副都統傳諭巴圖濟爾噶爾等曉示官兵勉效前驅以膺恩賞丁卯恩授呼岱巴爾氐為內大臣并賞給效力回人等上諭軍機大臣曰舒赫德奏稱霍集占遣阿卜都克勒木等潛至阿克蘇令回人克伯克默特送書與烏什之穆遜阿琿為阿克雅爾回人呢雅斯等拏獲據阿克蘇之阿琿伯克等告稱穆遜之兄薩拉阿琿現在葉爾羌故致書伊弟伊二子一孫俱在烏什隨行文商之呼岱巴爾氐將薩拉之子孫圈禁并曉示回人俟究問明白再行辦理與衆無涉勿妄驚疑等語呼岱巴爾氐之父霍集斯效力軍營伊復通曉事體深用嘉悅著加恩授為內大臣賞戴孔雀翎阿克蘇之阿琿伯克及拏獲送書人之呢雅斯等可傳諭舒赫德俱酌量賞給銀兩緞匹再所奏賽里木回人協助馬駝自應賞給價值庫車距彼頗近併傳諭德舒每馬給銀八兩每駝給銀十五兩以示體恤戊辰諭定邊右副將軍富德一體賞給官兵上諭軍機大臣曰富德奏稱伊所領滿洲索倫蒙古官兵照初次出兵之例減牛賞給整裝銀兩其緑旗厄魯特等兵應請旨遵行等語緑旗厄魯特兵丁俱在軍前效力俱著照例賞給以昭一視同仁之意諭大學士管陜甘總督黃廷桂等會商糧運事宜上諭軍機大臣曰據富德奏稱領兵進發見沿途地多戈壁兼之山險運糧騾駝多致傷損惟牛羊尚可趕送且回人等頗有口糧牲隻若折給銀兩令兵丁市買較為省便等語長途轉運維艱即內地購買牛羊亦復不易從前挑選牧羣馬牛羊隻俱在闢展牧放原備屯田之用今軍需孔亟或俟草青時趕送軍營作為口糧亦可至耕犂缺額即酌量籽種多寡輔以人力此亦苐就目前情形權其緩急不得不然者著將富德奏摺録寄黃廷桂吳逹善清馥定長等閲看悉心會商妥協辦理其市買回人口糧牲隻即將哈密巴里坤闢展三處備貯銀兩酌量動撥亦傳諭富德舒赫德永貴知之議協濟甘肅驛站事宜軍機大臣奏言黃廷桂奏稱甘肅驛站馬匹不敷應需添補奉旨令臣等酌議具奏查甘肅現辦軍務既需添設而內地驛站有差務簡少者自應隨時裒益臣等會同兵部酌議除直隸山西陜西等處現在馳遞軍務外其山東河南安徽江蘇浙江江西湖南湖北驛站不過沿塘備用並無緊急差務自應查明原額量為裁減臣等按照各省驛馬之多寡通計暫行酌減者三千三百匹仍交各督撫酌量地之衝僻事之繁簡分别抽撥其山東河南所裁一千五百匹即就近解交直隸聽候撥用安徽等五省所裁一千八百匹俱不必解送但於各驛按數即行裁扣至軍務告竣應否酌補原額臣等會同兵部再行請旨辦理奏入上從之平定準噶爾方略正編卷六十五
