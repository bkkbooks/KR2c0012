body:
  text: 乾隆二十年春正月丙子命尚書公達爾黨阿領兵速赴軍營上諭軍機大臣曰達爾黨阿帯領索倫巴爾虎兵起程從前原議於四月内齊集軍營今兩路哨探兵改期於二月内前進著傳諭黒龍江將軍綽爾多選派妥人追及達爾黨阿令於所帯索倫巴爾虎兵内酌挑二三百人親帯遄行務於二月内前赴軍營其餘兵丁亦令趲行速往陜西巡撫陳𢎞謀疏奏沿邊軍臺増派員弁協濟馬匹事宜陳𢎞謀奏言大兵進𠞰準夷一應軍機文報俱由沿邊軍臺馳送查陜西境内計程九百五十五里照雍正七年之例安設正站九臺腰站二十臺每正站止派千把總一員専司馳送兼管腰站事務不免掣肘今擬於正站添派文官一員經管馬匹腰站添派千把總一員分司接遞方得迅速再正站馬三十匹腰站馬十七匹現在雖已敷用但大兵出口以後文報繁多易於疲乏擬於南路各驛馬内酌撥馬匹前赴沿邊一帯每正腰站添馬四匹暫時協濟應差奏入報聞丁丑定軍營大臣奏事名次上諭軍機大臣曰定邊左副將軍阿睦爾撒納帯領哨探兵由北路進𠞰著㕘贊大臣額駙色布騰巴爾珠爾郡王品級青滚雜卜内大臣瑪木特奉天將軍阿蘭泰一同前進定邊右副將軍薩喇爾帯領哨探兵由西路進𠞰著㕘贊大臣郡王班珠爾貝勒品級扎拉豐阿内大臣鄂容安一同前進所有陳奏事件北路著阿睦爾撒納為首西路著薩喇爾為首㕘贊大臣等俱著並列應奏事件一靣奏聞一靣呈報將軍兩路哨探兵㑹合一處則令阿睦爾撒納為首其續進大隊兵丁到日北路著班第西路著永常為首兩路大兵㑹合一處遇有奏事即著班第為首己卯命已派出兵扎薩克等無庸復派臺務上諭軍機大臣曰軍臺雖屬𦂳要而進兵所闗尤重今閲額駙色布騰巴爾珠爾奏管臺務名单有調往西路之貝勒品級車木楚克扎布出征隊内之郡王桑寨多爾濟等著傳諭阿睦爾撒納等所派臺務之扎薩克或能託伊親信之人代辦則可若必須親往於進兵之事稍有掣肘即另選扎薩克辦理其已派出兵之人不必復派臺務庚辰命派内務府官一員解棉甲一千件送西路軍營諭協辦陜甘總督劉統勲嚴飭各員餧養應用馬匹上諭軍機大臣曰陳𢎞謀奏北路解送馬匹中多疲乏不足備甘省安臺之用仍就西安督撫標馬及挑存留省馬匹内挑選解赴甘省應用北路解送馬匹既多疲瘦即不用之備戰而安臺遞送兵丁亦屬𦂳要若不上𦂳餧養脿壯正恐臨期有悞現在西路兵丁巳於正月初旬陸續起程馬匹闗係𦂳要著傳諭劉統勲嚴飭承辦各員如𦂳飼餧以利遄行勿致稍有遺悞辛巳議平定準噶爾善後事宜軍機大臣奏言竊惟準噶爾部落逺處絶域騷擾隣封自康熙年間兩路設兵防戍用靖邊疆數年以來伊部簒奪相尋人人解體䇿凌阿睦爾撒納等各率其屬先後投誠我皇上怙冒之仁視中外為一體憫其來歸加恩撫恤仰體上蒼鴻貺乗機兩路進𠞰王師所至刻日蕩平仍令投誠之人各歸游牧照舊分封俾得永享太平之福而喀爾喀游牧地方愈展生計益豐此誠聖徳覃敷撫綏異域之盛㑹臣等遵㫖謹將善後事宜條列請㫖一準噶爾平定後將四衛喇時台吉等户口詳查於各台吉内如何給與封爵授為扎薩克及編列旗分佐領投立官員之處俟班第等妥議請㫖外其四衛喇特台吉等雖應指定四處俾各帯屬人駐劄但四衛喇特之人皆係散處原無一姓之人應令安置各原住附近地方彼時錯處不必將一姓之人安置一處一回人等俱原有住居耕種之地每嵗納貢於準噶爾且有額徴賦欵今準噶爾底定回人等俱屬臣僕其徴賦概行蠲免所納之貢亦俱議減内如吐魯番部落原係内地嗣後應將吐魯番回目查出安置吐魯番地方俾管轄所屬瓜州居住之額敏和卓屬下回人等亦仍移於吐魯番安置一收服之烏梁海等既俱編列旗分佐領俟收服汗哈屯巴斯庫斯等處烏梁海時亦請編列旗分佐領與舊服之烏梁海等一同遷移安置各原地方將各處掌管之人令班第等揀選俱奏請㫖一扎哈沁人衆現令瑪木特掌管編列旗分佐領暫行安置請將瑪木特與扎哈沁人衆安置於喀爾喀游牧之外厄魯特台吉等所住地方之内則阿爾台以内多一藩籬愈為堅固至包沁之人既與扎哈沁人相近亦應令瑪木特兼管奏入上從之癸未命查辦和通呼爾哈淖爾等處出征未回官兵及逃亡者上諭軍機大臣曰從前用兵和通呼爾哈淖爾等處時我官兵征戰未歸或尚有在準噶爾者夫以臨陣被擄偷生賊地至大兵蕩平方被查出理應分晰明正典刑此内如係兵丁及䕶軍校驍騎校等即照同䇿凌阿睦爾撒納前來之滿洲等仍給本人為奴如係大臣官員非㣲賤者可比若羅卜藏丹津巴濟茂海原任歸化城副都統衮布原任㕘領拉察卜等俱係背叛之人尤為可惡查出時即一靣奏聞一靣派員解送來京毋得令其脱逃自盡至額駙䇿凌之子嗣在伊游牧被虜與臨陣者不同如或現在自應請㫖辦理喀爾喀内有似此者亦照此例其非臨陣被虜自行逃往者亦解送來京儻係在彼處所生子孫即照收服厄魯特例辦理毋庸深究將此傳諭兩路將軍大臣等知之臣等謹案信賞必罰乃朝廷馭世之大柄矧在軍行激勸所闗其用尤不容少假我皇上於軍營任事諸大臣下逮將校士卒賞罰嚴明無㣲不當如和通呼爾哈淖爾之役其事已越數十年而聖慮周詳申明軍紀於前此臨陣被遮偷生視息之徒不令概邀寛典且即其中分别官員兵丁及本身子孫斟酌情理詳定科條其罪在不赦者固不能倖逃而情尚可原者無不為曲宥至伊犁平定後更命軍機大臣及部臣等察核和通呼爾哈淖爾出征議敘世職人員裁汰冒濫以昭覈實洵乎仁至義盡非獨一時之黜陟幽明實足為萬世之訓行法守也已命㕘贊大臣鄂容安酌議平定準噶爾善後事宜并留心察看薩喇爾上諭軍機大臣曰爾等所議平定準噶爾善後事宜著抄寄鄂容安令其詳察彼處情形應否如此辦理或尚有應酌之處即與阿睦爾撒納班第薩喇爾瑪木特等㑹議具奏再新厄魯特等進兵時肆行搶掠班第業經奏聞朕亦早已曉諭阿睦爾撒納等此次哨探兵前往理宜加意禁止薩喇爾之兄現在彼處如伊兄給伊㣲物及伊屬下人略為逢迎饋遺可以無庸深究若過分貪取牲隻或擄掠婦女鄂容安即以己意提撕薩喇爾一經指示自當斂戢鄂容安其審擇輕重留心辦理諭協辦陜甘總督劉統勲安臺送兵事宜上諭軍機大臣曰劉統勲奏接准廷議西路兵丁於二月先進數千但索倫兵自京至軍營計程八十餘站非兼程疾馳勢難尅期而至擬即日前往甘涼一帯相度各站車騾馬匹情形等語西路先進之兵係厄魯特及甘涼滿洲兵非索倫兵也原議於三月初由軍營進發是二月内即應齊集而索倫等兵自京起程長途按站次第前進即使沿途車駕無悞亦不能疾馳而至劉統勲此奏似屬誤㑹但第一二起索倫兵業於正月初三等日起行較原議已早半月若至陜甘境内再能稍為變通酌量趲行令早至軍營更為有益然亦不必改安臺站多費周章或致欲速轉遲總以妥協遄行為善其甘涼等處滿漢官兵俱當及早料理照議分起速發聽候調遣所有起程日期附摺奏聞再現議大兵到日俱駐巴里坤另摺所奏火藥軍裝口糧等項即應運至軍營不必更駐哈宻該督可留心上𦂳督率辦理以濟軍資并傳諭鄂容安鄂昌等知之甲申命定北將軍班第諭阿睦爾撒納庫克新瑪木特等和衷共事㕘贊大臣額駙色布騰巴爾珠爾等奏言據阿睦爾撒納云庫克新瑪木特通瑪木特等係軍威新收之人而庫克新瑪木特尤巧滑難信從前曽擄我游牧我等先進之兵原為偵探達瓦齊消息如帯新收扎哈沁烏梁海等人前往儻有洩漏恐致僨事不如令庫克新瑪木特等在後隊行走臣看阿睦爾撒納情形甚不願與庫克新瑪木特等進兵奏入得㫖阿睦爾撒納所慮甚是具見伊誠心欲成大功朕為欣覽但此摺未到之先朕以庫克新瑪木特老成習事於軍前不為無益故降㫖令其先行今若停止前去未免反生猜疑且伊此際尚屬奮勉即或心懷叵測有阿睦爾撒納在彼伊何能為其烏梁海之兵著即停其派往復諭軍機大臣曰阿睦爾撒納因庫克新瑪木特曽擄伊游牧是以不願同行但用人惟期於事有益豈可因伊之言即為停止著將原摺并朕批示俱抄寄班第令將伊等調劑務同心協力用奏膚功不宜稍露形跡定邊左副將軍阿睦爾撒納等疏奏收獲包沁人衆情形及安插事宜阿睦爾撒納等奏言副都統銜察達克侍衛圖倫楚文稱帯兵前至包沁華額爾齊斯地方包沁人等咸願歸降隨將包沁之宰桑阿克珠爾與數得秦人等收獲并通瑪木特家口交公恭格敦丹照管居住包沁之得木齊和濟木瑚里擒獲噶勒雜特之庫綳詢問巴朗踪跡據庫綳稱從前巴朗等在竒蘭居住聞大兵來信即逃往阿里克台地方自華額爾齊斯至喀喇額爾齊斯竒蘭阿里克台等處其間現有噶勒雜特二千餘人又有都噶爾人衆居住察達克現在領兵前往擒拏巴朗臣等以包沁乃布魯特回人種類與烏英齊博東齊甚近若為日稍久知我兵少難保無虞隨令副都統銜阿敏道酌帯兵一二百名往迎恭格敦丹將收獲包沁人等遷至齋拉罕地方居住並據照管扎哈沁游牧之侍衛䝉固勒等文稱扎哈沁之得木齊瑚爾海齊拏獲跟隨巴朗潛逃之納瑪林詢知巴朗逃時將伊逼勒同逃及到彼處即欲歸降故來扎哈沁居住數月來並未見巴朗有包沁人顔達什自伊犁來納瑪林向伊詢問據顔達什云在齋爾地方遇見台吉巴特瑪車凌額林沁及阿睦爾撒納之宰桑黙克勒齊三人帯領哈薩克兵將我牲口擄去現聞去擒達瓦齊至兵由何路來及已拏獲達瓦齊與否實俱不知臣等以顔達什由伊犁回又途遇哈薩克兵準噶爾現在情形伊必悉知即令阿敏道將顔達什并察達克等所擒庫綳二人解送軍營詢問準噶爾情形以知虚實奏入上諭軍機大臣曰阿睦爾撒納將新收包沁人等安插齋拉䍐甚是將來招服噶勒雜特人等亦著照此辦理朕從前惟聞阿睦爾撒納征戰甚勇今閲伊所奏如令顔達什庫綳前來詢問準噶爾情形及發兵接濟察達克等甚合機宜朕深嘉之察達克等不費一矢即收服包沁人衆顔達什復稱巴特瑪車凌帯領哈薩克兵往討達瓦齊看來準噶爾内亂計窮力竭我兵神速即可成功今若度量情形可無庸㑹合西路之兵即㨂選精兵數千於二月中旬奮勇深入更覺易於集事著交於阿睦爾撒納酌量辦理察達克此次收服包沁人衆及往擒巴朗等殊屬奮勉其人亦頗誠實除烏梁海兵丁不必派往外伊身及伊所帯曽經効力之烏梁海二十人仍帯領前進可即傅諭阿睦爾撒納知之隨命察達克實授副都統圖倫楚為頭等侍衛翁郭爾扎木禪為二等侍衛命賞給散秩大臣通瑪木特治喪銀兩並揀選伊子襲職上諭軍機大臣曰通瑪木特為人誠實恭敬朕甚嘉悦是以加恩授為散秩大臣賞賚衣服銀物今聞溘遊殊堪軫念著傳諭軍前大臣於軍營錢糧内支銀二百兩賞伊家屬治喪并揀選伊子襲職再伊家屬如在原游牧處著庫克新瑪木特照看或欲來察哈爾地方即相依薩喇爾居住并令其加意照看乙酉命西路將軍等尅期進兵上諭軍機大臣曰昨降㫖令阿睦爾撒納揀選精兵奮勇前進相伊接到此㫖必尅期進兵其西路大兵亦應一體趲行前進著將原㫖抄寄永常等務期竭力遄發迅奏膚功俟到哈宻時即將辦理情形覆奏丁亥命清海郡王索諾木丹津領兵駐防噶斯軍機大臣奏言青海郡王索諾木丹津奏請於游牧處豫備兵内帯兵前往噶斯効力得㫖索諾木丹津著帯兵一千名馳驛前往噶斯駐防如有投誠者即行受降照管相應遵㫖行文辦理青海事務之副都統令於伊等游牧處豫備兵一千俟索諾木丹津到彼帯領前往奏入報聞命賞厄魯特侍衛達什敦多卜副都統職銜前往軍營辦事上諭軍機大臣曰厄魯特侍衛達什敦多卜著加恩賞給副都統職銜并賞銀一百兩派乾清門侍衛徳爾森保即帯領馳驛前赴軍營申諭進兵噶勒雜特事宜上諭軍機大臣曰阿睦爾撒納等奏察達克圖倫楚等據包沁之得木齊和濟木瑚里通瑪木特所屬得木齊哈喇勒岱告稱噶勒雜特之宰桑哈薩克錫喇都噶爾領兵二千欲擄包沁人衆遂即帯兵退回此必包沁人内有陰懷異心者虚為聲揚察達克等並未詳察即已退兵適為其所愚耳因此益見阿睦爾撒納前將包沁人等安置齋拉䍐地方甚合機宜厄魯特侍衛達什敦多卜係哈薩克錫喇一處宰桑都噶爾之兄其户口尚在噶勒雜特今伊情願前往招服噶勒雜特人等并擒拏巴朗朕已賞達什敦多卜副都統職銜令其馳驛前往軍營此際察達克等雖回不過到齋拉罕等處著阿睦爾撒納速諭伊等即於所到處等候達什敦多卜不必遣包沁兵前往著於努三所管兵内再派數百名共備一千交察達克圖倫楚翁郭爾扎木禪及達什敦多卜公同帯領前進噶勒雜特聞我兵退回必然無備乗此加兵自更易於成功阿睦爾撒納即遵朕㫖明白曉諭妥協辦理一面速行回奏戊子申諭防守包沁扎哈沁人等事宜上諭軍機大臣曰阿睦爾撒納奏察達克等聞和濟木瑚里等告稱噶勒雜特備兵欲擄包沁即行退同阿睦爾撒納以察達克等為和濟木瑚里等所愚所見甚是但伊等何故布散流言著阿睦爾撒納即將和濟木瑚里哈喇勒岱二人拏至軍營嚴審再和濟木瑚里等如此欺誑必包沁人内有心懷叵測者雖已將伊等移住齊拉罕地方仍湏加意防範著將扎哈沁之得木齊内揀選親信二人派往包沁地方於包沁之得木齊内揀選親信二人調至扎哈沁地方俾叅互雜處并曉諭包沁人等此時暫為保䕶伊等之計事定後仍各歸原處阿睦爾撒納等即遵㫖妥辦仍交與喀喇巴圖魯阿玉錫善為防備毋令伊等生疑協辦陜甘總督劉統勲疏奏籌辦臺站馬匹事宜劉統勲奏言遞送官兵前議於甘省境内安馬五臺嗣經臣等籌議恐馬匹不能往來迭送酌用遞更之法馬不如勞而人可馳驟詎北路馬匹不堪不能不將安臺之馬改為戰馬而北路馬匹甫經休養若照原議安臺恐致貽悞勢必逐站備馬須馬四萬二千餘匹現在北路馬匹到臺尚可資用者約一萬六千餘匹此外應雇民間馬騾甚多辦理不易查甘省甘涼西肅一提三鎮馬匹厯年孶生蕃庶其騍馬俱積存厰内可以騎用者約有六千匹合之北路馬匹共得二萬二千匹所少二萬匹向民間馬騾車輛雇凑再有不敷則令陜省協濟臣因京兵起程在即一面奏聞一面派員前往挨站安設其孳生騍馬通行提鎮派員解送再騍馬於營伍殊不相宜在驛站則無不可俟用過歸厰後撥存一千二百匹則將來塘驛各站遇有倒斃即可於此内撥給奏入報聞己丒諭㕘贊大臣阿蘭泰等揀選喀爾喀馬匹事宜上諭軍機大臣曰此次用兵平定準噶爾特為開拓喀爾喀游牧使登袵席乃喀爾喀扎薩克等不甚奮勉求似從前丹津多爾濟者竟無其人即如採買馬匹朕聞伊等部内短少是以令於内扎薩克六㑹盟處採買特因所買馬匹稍瘦現在出兵不能得力故差大臣前往衆喀爾喀游牧另行揀選伊等勿以從前業稱馬少恐以欺隠得罪致生疑懼即此次亦只酌量挑選並非盡行取用況仍照數給還現在所給之馬不過略覺欠臕伊等收留牧放即可肥壯亦無所捐著傳諭阿蘭泰等㑹同衆扎薩克酌量採取無得刻求有傷伊等生計并寄哈達哈阿思哈知之奬賞定邊左副將軍阿睦爾撒納上諭軍機大臣曰阿睦爾撒納等奏烏梁海總管赤倫欲帯人前往招服汗哈屯之烏梁海人衆隨即差伊前往阿睦爾撒納辦事果斷毫無猶豫朕心甚為欣悦著將朕所帯荷包一對賞阿睦爾撒納并於彼處錢糧内賞給銀一千兩再傳諭阿睦爾撒納俟赤倫事竣回營一面馳奏一面即傳朕㫖賞給赤倫副都統職銜以示鼓勵命郡王品級貝勒青滚雜卜為喀爾喀副將軍上諭軍機大臣曰據阿睦爾撒納奏貝勒䇿登扎卜呈稱身有殘疾懇求解任䇿登扎卜人本平庸今既病廢求退著革去副將軍任郡王品級貝勒青滚雜卜著補授喀爾喀副將軍庚寅命豫備汗哈屯烏梁海等游牧事宜上諭軍機大臣曰昨據阿睦爾撒納奏遣赤倫前往招服汗哈屯之烏梁海等想此時赤倫已到事亦就緒厄魯特烏梁海人衆既於舊游牧處居住將來汗哈屯之烏梁海等投至或可照此辦理若必須遷移則與察達克等烏梁海游牧一同遷進俾新舊所收之人彼此連界居住亦可其宰桑等至軍營叩見將軍大臣時朕即加恩賞給品級遣回管理屬衆和托輝特郡王品級貝勒青滚雜卜熟悉烏梁海人情形朕已派令照管著傳諭阿睦爾撒納㑹同青滚雜卜妥商辦理辛卯命郡王班珠爾公納噶查仍留北路軍營副都統職銜唐禄奏言臣接奉諭㫖令班珠爾納噶查之兵調往西路隨傳和碩特郡王班珠爾公納噶查宣示聖諭據班珠爾納噶查告稱我等與阿睦爾撒納俱在塔爾巴噶台博羅塔拉地方游牧彼處相識甚多若用阿睦爾撒納舊纛帯領進兵易於招降且事成後若封阿睦爾撒納為汗哈薩克之諾顔阿布賚原係舊好我等遣使修睦帯領哈薩克數人瞻仰天顔即令與阿睦爾撒納等連界居住從此當愈加和好伊等必深感激彼此俱得樂業乞為轉奏仍留北路奏入上諭軍機大臣曰據唐喀禄奏班珠爾等懇請仍留北路先據薩喇爾奏班珠爾人甚去得而和碩特兵又最勇健若與都爾伯特兵於西路同進實為有力是以降㫖令其調往西路今班珠爾等既願留北路兼於進取事宜有益即著照伊所請仍與阿睦爾撒納前進準噶爾平定之後朕意將四衛喇特封為四汗俾各管其屬封䇿凌為都爾伯特汗阿睦爾撒納為輝特汗班珠爾為和碩特汗朕曽面諭䇿凌阿睦爾撒納二人第班珠爾尚未知悉可即諭伊知之再納噶查告稱將和碩特人移住青海之處從前納噶查來熱河時朕降㫖俟事成後或在原游牧或移居青海悉惟爾便並未諭令必移青海居住也此阿睦爾撒納訥黙庫所共聞况朕方將封班珠爾為和碩特汗乃轉令伊舍舊地而移青海乎若納噶查不過一扎薩克或欲移住青海亦無不可俟事定後伊再具奏請㫖班珠爾未來熱河而納噶查又誤傳朕㫖著唐喀禄明白曉諭班珠爾等知之又奉上諭曰唐喀禄奏班珠爾等願留北路一摺著抄寄班第薩喇爾知悉班珠爾兵少本不成隊伊既不願往西路朕已允其所請但朕觀納噶查為人狡詐喜事今所告唐喀禄之言有事成後封阿睦爾撒納為汗帯領哈薩克阿布賚等瞻仰令與阿睦爾撒納連界居住從此當愈加和好等語甚屬含糊似事成時祗封阿睦爾撒納為汗殊不知準噶爾平後朕亦不過將伊四衛喇特台吉分封為汗令各管屬下而已並非祇封阿睦爾撒納一人統管準噶爾地方也若果如此是仍如達瓦齊矣試思朕之辦理此事果専為伊等乎伊等豫為此言試探是其所望甚賖若將來祗封阿睦爾撒納為輝特汗轉不免於失望班第薩喇爾可將封阿睦爾撒納為輝特汗其餘於三姓台吉内封為三汗之處於間中言及俾伊等熟聞庶幾妄念可消至阿睦爾撒納游牧在塔爾巴噶台果否與哈薩克毗連若相距遙逺而為此説是欲借哈薩克以為擅權之地也伊等果知奮勉朕不惜格外加恩至専擅則斷乎不可著侍衛扎克蘇宻齎此㫖傳諭班第薩喇爾留心察看俟準噶爾既平阿睦爾撒納帯彼處頭目來時再將哈薩克之事㑹議請㫖辦理壬辰協辦陜甘總督劉統勲等㕘奏寧夏府知府趙本植偷漏軍需馬匹草料命革職拏問劉統勲等奏言據寧夏道孔繼泂禀查驗各處馬棚惟趙本植承餧烏蘭察卜馬匹最屬平常且聞草料有零星偷漏之弊臣等聞趙本植於督臣永常過寧夏時面懇承餧馬匹意必實心報効不意以軍需重務竟有虚冐風聲如侵肥入已固當按律治罪即胥役尅減亦罪無可逭奏入得㫖馬匹闗係軍行趙本植係承餧之員不能實心辦理即已有曠職守今該員復任草料偷漏以致馬匹脿分不足有悞軍需益屬罪無可逭當此軍興伊始即如此玩縱貽悞非嚴行治罪不足示懲趙本植著革職拏問交該督撫將侵肥偷漏情弊嚴行究訊如果侵肥屬實即應照軍法從事以為玩悞軍需者戒議定出征官兵馬駝鹽菜等事宜協辦陜甘總督劉統勲議奏酌給出征官兵馬駝鹽菜一摺得㫖軍機大臣議奏尋議此次進𠞰官兵務在輕裝減騎迅奏膚功現據北路副將軍阿睦爾撒納等將北路出征之將軍大臣及䝉古王公台吉官兵人等應得進𠞰馬駝統照舊例十分減二西北兩路事同一例應令該署督遵照辦理至鹽菜銀兩跟役名數亦應照户部核定及臣等原議辦理其道府㕔及佐雜官員應領馬匹即如該署督所議酌量給放至所稱陜甘滿營出征之人有以領催委至㕘佐領者不過擾其職銜俾得約束兵衆其應領馬駝請仍照各本銜給與查現經户部奏以䝉古王公兼叅贊大臣者應得馬駝如本銜數多照本銜支給兼銜數多則照兼銜支給滿洲官兵事同一例一切應支各項自應俱照現委之職但如驍騎校由兵㧞補委署佐領階級尚不至懸殊若領催即係兵丁豈有委署至㕘領之理或該署督行文訛錯抑或該都統誤行揀派如係誤派應令該署督即行知㑹改正另派奏入上從之定邊左副將軍阿睦爾撒納等疏奏新降包沁人等編旗管領事宜阿睦爾撒納等奏言從前收服扎哈沁烏梁海人衆俱編旗分佐領將宰桑等授為總管照舊管理其屬今新降之包沁宰桑阿克珠爾可否授為總管之處出自天恩再扎哈沁除總管外奉㫖將厄魯特侍衛喀喇巴圖魯阿玉錫授為翼領但包沁之人係回子種類别為一教若仍由厄魯特内選人為翼領令其管轄恐其教各殊易生事端臣等酌議若䝉恩授阿克珠爾為總管仍遵㫖將伊之得木齊收楞額等名色留存除分别補放佐領官員外不必另放翼領至包沁人等現有牲隻數萬可無庸另賞産業但伊等聞天兵一到即便投降甚為恭順仰體皇上懷柔至意照扎哈沁例就現在解到茶内酌撥一千封賞給以示鼔勵俟進卡倫後交努三將伊等家口細查倘有貧乏必需接濟者再行酌辦奏入報聞訓飭定西將軍永常上諭軍機大臣曰永常係滿洲大臣平日尚知奮勉是以命為將軍俾與薩喇爾盡心商酌集事今閲方觀承奏伊催趲自京起程之大隊兵丁則誤㑹朕從前催令哨探兵前進之㫖何糊塗悖謬一至此耶再劉統勲㕘趙本植承餧馬匹偷漏草料一案有永常經過寧夏該府求派餧馬之語雖永常未必因其懇求即令承餧但以軍需重事不計其人可否輙照所求委派可見漫不經心著傳諭永常嗣後務遵朕㫖諸事與薩喇爾商辦慎勿以已為將軍任意妄行再薩喇爾進兵永常不必同進務待衆兵齊集帯領前往毋得故違取罪平定準噶爾方略正編卷五
