  text: 欽定四庫全書平定準噶爾方略前編卷二十九
  hash: sha256:5eb28becaa8a412699296fed1c7e419dfee88b6a329b5bbd33eeeba4a18c1f74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_029-1a, image: WYG0357/WYG0357-0414c.png}
body:
  text: 雍正十年春二月己丑朔命踏勘翁金附近修城事冝上諭大學士等曰據奉差原任巡撫布蘭泰奏稱翁金修城地方並無樹木土少沙多不能修城等語翁金係通軍營大路適中之地其附近地方或有可以修城之處即離驛路稍遠但可掘井取土即可修城著交與驛站官員踏勘奏報辛夘命公博爾屯為㕘贊赴扎克拜達里克上諭大學士等曰推河駐防之二千䝉古兵丁著侯馬蘭泰管理公博爾屯著往扎克拜達里克在馬爾賽㕘贊處行走議伯格爾駐兵事冝大學士等遵㫖議奏曰伯格爾在察罕廋爾西南扎克拜達里克正西賊若由阿爾台阿爾穆克圖布拉罕巴爾楚克阿濟必濟等處走額濟内道必出此實為賊人出沒要路請於此駐兵萬人可以阻截北路軍營西南一帶賊人且其地去察罕廋爾扎克拜達里克僅三四百里應援亦便又屬古爾班賽堪總口應請令建勲將軍達爾濟以原撥徃古爾班賽堪兵五千人移駐伯格爾再扎克拜達里克現有家選兵二千緑旗兵五百應令左副都御史阿成阿率往益之並令大將軍順承親王於扎克拜達里克及察罕廋爾軍營調緑旗兵二千五百人赴伯格爾以足萬人之額令達爾濟統轄奏入上從之壬辰辦理哈宻事務員外郎永恒等奏報擒獲賊人孟克情形永恒等奏言正月二十二日準噶爾賊人來犯哈宻臣等從城上望賊勢甚衆周城四五里不便輕敵貝子額敏選囘兵精壯者設伏城外擒賊人孟克訊之云賊中領兵者為塞卜騰策凌那木扎爾等聞哈宻牲畜衆多發兵六千由烏魯木齊來攻臣等日夜守城相機勦殺所獲賊人令貝子額敏守之奏入報聞甲午命費雅思哈等赴推河塔爾瑪善等赴伯格爾軍營上諭大學士等曰費雅思哈伍什巴著往推河地方與侯馬蘭泰一同領兵駐劄其伍什巴所管兵丁著䕶軍㕘領委三代管副都統塔爾瑪善著同阿成阿前往將軍達爾濟軍營在㕘贊上行走庚子寧遠大將軍岳鍾琪奏報援勦擊賊情形命速議木壘築城駐兵事冝先是岳鍾琪奏言據辦理哈宻事務員外郎永恒查斯海副將焦景竤貝子額敏等稱正月二十一日鴨子泉卡倫有賊二百餘人往來二十二日賊兵逼哈宻城登城望賊約有三千餘人臣計哈宻有副將焦景竤率官兵千五百人駐防又有㕘將韓良弼率山西緑旗兵八百駐城中足以固守但賊旣逼哈宻自當遣兵截殺臣即遣總兵官曺勷等率緑旗兵五千日夜趣輝魯圖達巴罕五堡處截其尾又遣總兵官張豹率官兵二千趣科舍圖嶺前後並赴哈宻應援又據永恒等報云二十三日城外賊兵漸少其大隊悉西西喇呼魯蘇向東北沿山一帶赴塔勒納沁臣計塔勒納沁有提督顔清如率兵四千駐劄城中可以固守又令總兵官曺勷等於西喇呼魯蘇一帶扼據險要相機掩殺臣又虞賊或由摩垓圖圖爾庫勒諸路竄入北山逃遁歸巢按北山正西並西北有兩路一巴哈恩度爾一察罕春集悉賊人必經之處臣更遣副將軍石雲倬及原任兵部尚書馬㑹伯率緑旗兵三千二百赴巴哈恩度爾一路設伏署鎮安將軍卓鼐及前鋒統領宗室哈爾吉副都統僧保張正文等率驍勇官兵曁八旗滿洲兵凡三千八百赴察罕春集一路設伏副將軍常賚及都統根敦總兵官張仁孝等率滿漢兵三千二百赴烏克克嶺截殺臣等軍營士馬現在準備策應又奏言據駐劄塔勒納沁提督顔清如陸續報稱正月二十三日賊據天生圏山口先遣㕘將米彪率兵六百赴三道大坂防䕶馬厰即督兵守城自辰至酉賊始退走西北山下二十四日米彪率兵至白楊溝一帶與賊遇賊敗又遣副將陳經綸率官兵一千五百人出城擊賊賊人由西南故路而遁陳經綸率兵往追沿途搜𠞰臣以賊人舉衆深入塔勒納沁一帶意在擄掠牲畜現今軍營所留馬匹騾頭悉在山南四道溝畢留大坂中牧放官兵防䕶嚴宻牲畜無損至是又奏言臣令總兵官曹勷及副將紀成斌等率兵應援哈宻於正月二十七日將至二堡正遇賊人大隊約五千餘奮勇進擊交戰一日夜二十八日賊登山拒我曺勷等四面仰攻争先力戰自夘至午賊衆大潰殺傷無算奪其馬匹牛羊并援出所掠兵丁及漢回商民數百人餘賊由沙磧遁逃而西曺勷率兵直抵二堡下營二十九日曺勷自二堡至栁樹泉總兵官張豹及哈宻副將焦景竤塔勒納沁副將陳經綸等與曹勷軍合乘夜追𠞰臣計賊人腹背受敵殘喘奔逃必走烏克克嶺臣已檄知副將軍石雲倬常賚署鎮安將軍卓鼐等發滿漢兵六千到烏克克嶺南山口梯子泉一帶截殺仍著總兵官曺勷率官兵在沙棗泉駐劄以張聲勢謹以大捷縁由奏報奏入得㫖大將軍岳鍾琪奏報各路撥派官兵進𠞰堵截及總兵曹勷等擊敗賊人之信調度有方運籌亦備官弁兵丁奮勇効力擊敗賊衆朕心嘉慰惟是曹勷領兵一路正當賊鋒其所帶兵丁稍覺單弱而勇健將弁亦覺尚少再賊人若由烏克克嶺逃遁則有常賚石雲倬等堵邀擊殺假若敗殘餘賊由沙磧而遁必由柴達木經過吐魯番之官兵早能得信與回民併力邀擊豈不更善又木壘駐兵一事朕已䧏㫖與岳鍾琪令其計議舉行則吐魯番回民遷移之事可以緩商至木壘築城若事在必行以速為善今賊夷受創而去乘機動工更覺順便並令岳鍾琪速議奏聞丙午命正陳泰之罪大學士等議奏言陳泰世受國恩身為㕘贊傅爾丹統兵進𠞰時令率兵二千在科卜多河岸駐劄以備敵兵乃陳泰一聞索倫逃兵訛言即畏懦領兵回扎卜堪後經傅爾丹屢次催調陳泰惟事推諉又不即赴科卜多殊干法紀應照律擬斬秋後處决行文軍營令將陳泰解送來京交刑部監候奏入得㫖陳泰之罪斷無可赦著照擬處斬即在軍營監禁至秋審時擬為情實具奏俟命下之日再行正法丁未命免西寧煤税上諭内閣曰朕聞西寧北川口外白塔地方出産石煤係附近漢土番回民人挖取販賣以為生計每䭾納税錢三十文西寧府委員收解充餉約計每年收銀一千九百餘兩近因西陲用兵之際西寧移駐兵弁較前為多率皆用煤以供炊㸑煤價漸至昂貴若仍照例徴收税銀恐價值不能平減於兵民均有未便著將應收税銀寛免該督撫轉飭有司實心稽查倘胥吏人等有照舊私收或借端需索者務令察出治罪辛亥西路副將軍石雲倬失機命革職議罪寧逺大將軍岳鍾琪奏言準噶爾賊人由五堡之南沿沙磧敗遁若尋有水草之路必繞至烏克克嶺迤西奔竄臣前派副將軍常賚石雲倬所領之官兵六千餘名俱於正月二十九日午未時齊至烏克克嶺臣與副將軍常賚面議官兵一到烏克克嶺略為歇息即令石雲倬選兵四五千名先赴梯子泉一路截殺署鎮安將軍卓鼐率滿兵三千隨後接應其餘官兵令常賚帶領守截烏克克嶺山口三十日午後賊人適在山口二十里屯住石雲倬等如即遣發官兵乘夜潛襲滅此自不待朝食詎料初一初二等日杳無捷音至初三日始據卓鼐咨稱初一日賊兵業已逃竄初二日即遣驍勇官兵近搜逺捕賊人從洮賚大坂之西越向納呼山遁歸臣思將軍三員率兵萬餘乃觀望不前以致賊人驚覺遠颺深為駭異及副將軍等陸續撤兵囘營詢其情節據常賚卓鼐等同稱三十日午後見有賊人屯住山口石雲倬總不發兵直至戍時始派兵一千五百名令總兵官張存孝帶領在山下等候又數次遣人攔阻不許前進石雲倬安寢帳房初一日天明始領兵東行十餘里隨即安營造飯煎茶纔轉西而行張存孝至賊人屯住之處餘火未息報稱賊人竄遁不遠請其速行前進追𠞰石雲倬又傳令撤兵不許追襲臣以梯子泉一帶實逆賊歸巢之要路又慮烏克克嶺之西南尚有塔呼納呼一路亦係賊人歸途務須派兵堵截有涼州右營外委馬得玉乃熟識塔呼納呼道路之人令其馳赴行營聽候發兵領路不料石雲倬大怒以馬得玉為多事欲行責治並不發兵邀集賊人果由塔呼納呼一路逃歸坐失機㑹石雲倬乖戾僨事臣實難代為隠諱不得不據實奏聞奏入得㫖辦理軍機大臣嚴察議奏尋議曰石雲倬應革職交與岳鍾琪同常賚卓鼐等詢明確供解京按律究擬奏入上從之壬子命增撥駐劄伯格爾䝉古兵上諭大學士等曰派往伯格爾地方之䝉古兵丁甚少著於鄂爾多斯六旗内再派一千帶領前往仍照前令王查木陽協理台吉策旺多爾濟額黙根等㑹同該扎薩克選派俟整束行裝完備即與王查木陽所領二千兵一同起程著王查木陽等於六旗協理台吉大員内揀選人去得能管轄兵丁者二員再酌派官員帶領前往王查木陽若已起程著六旗扎薩克貝勒貝子公台吉等㑹同選派務將器械馬匹辦理整齊令其起程其賞賜兵丁銀兩另派員隨後送往訓飭寧逺大將軍岳鍾琪上諭大學士等曰據大將軍岳鍾琪奏報賊人從納呼一路遁逃并撤兵囘營各情由此次賊夷狂肆昏亂深入重地投身羅網乃自速滅亡也我師旣以逸待勞且我衆彼寡但能申明軍紀要截擊殺並不必竒謀異算斷不致脱狼奔今乃坐失機㑹不但不能屠𠞰且使賊人由坦途而遁此實朕與廷臣意料所不及者其領兵之石雲倬已降㫖治罪至大將軍岳鍾琪素諳軍旅本非庸材縁懷游移之見致乖戰守之宜前車之鑒非止一端嗣後當深悟前非痛自省惕先事綢繆臨事堅定壹號令以振軍威示威信以齊衆志庶可以奏膚功而收後效朕猶深望之癸丑命暫緩木壘駐兵籌畫吐魯番軍糧上諭大學士等曰前議三四月間木壘築城駐兵一事已降㫖大將軍岳鍾琪令其酌量辦理今再四思維以數萬官兵移駐木壘春間馬駝旣恐臕力不足且時日稍覺忙迫未必事事皆能就緒不若遲至六月夏秋之交將諸事預行慎宻辦妥大兵迅發一舉可成將來預備兵丁之時須出其不意速完城工則戰守皆易矣木壘駐兵之舉旣緩則吐魯番之兵糧當急為籌畫吐魯番旣有官兵三千名若再加三千名則軍勢益壯不但可以保䕶囘民即將來禾稼在野之時賊人前來踐踏我師合囘衆擒𠞰之亦易為力此時發兵三千前往就便可以將米糧運送或由沙磧小路零星運往亦可倘僱哈宻之人運送而令吐魯番之人接應皆照數給與脚價著岳鍾琪悉心妥議辦理命福建總督劉世明貴州巡撫張廣泗赴西路軍營上諭大學士等曰西路軍務關係𦂳要軍營之中協辦大臣甚少福建總督劉世明於西邊情形素所諳悉著馳驛來京面請訓㫖前赴軍營先賞藩庫銀一萬兩製辦行裝又諭曰西路副將軍石雲倬已革職議罪朕欲於各督撫提鎮中簡用一人前往軍前協辦軍務貴州巡撫張廣泗才幹優長實心任事數年以來苗地用兵該撫親歴戎行深諳軍務著即馳驛來京面請訓㫖前往軍營為副將軍賞藩庫銀一萬兩製辦行裝命暫停撤土黙特兵守臺站者上諭大學士等曰從前因歸化城留兵甚少諭令副都統圖爾賽等帶領土黙特一千兵前往照看臺站俟馬爾賽所領兵丁至扎克拜達里克時將土黙特兵丁撤囘貝勒僧袞扎卜等領往之喀喇沁一千兵令駐劄臺站今噶斯一路土黙特兵丁俱經撤囘歸化城歸化城旣已添兵圖爾賽等領去之土黙特一千兵著暫行停止撤囘仍令看守臺站喀喇沁一千兵丁著往扎克拜達里克地方屯劄候㫖甲寅命以䕶軍統領職銜吉當阿署綏遠將軍馬爾賽軍營前鋒統領以副都統塔爾瑪善署建勲將軍達爾濟軍營前綘統領乙夘命賞䘏塔勒納沁哈密等處出征及陣亡兵丁上諭大學士等曰賊人侵犯哈宻塔勒納沁等處所派官兵征勦堵截其中多有步行者雖因將領無能觀望退綰致令賊衆逃遁而兵丁之奮力前驅勤勞實堪軫念著大將軍將大營塔勒納沁哈宻等處此次出征之兵丁查明分别賞賚其陣亡受傷之兵丁尤可憐憫著查明照例賞䘏命優賞禦賊囘民等上諭大學士等曰哈宻被賊侵擾囘民等併力抵禦甚屬可嘉聞其在外牧放之牲畜一時不及收囘者被賊人盗去雖據報賊遁之後仍將牲畜奪囘但恐遺失倒斃者已多朕心深為軫念其遺失牲畜之頭目囘民等著賞銀一萬兩守城禦賊者著賞銀五千兩按名分給其擒獲賊人者優加賞賚務令均沾恩澤丙辰命暫留欽拜等於扎克拜達里克及伯格爾授阿思哈等副都統職銜靖邊大將軍順承親王錫保奏言臣等欽奉皇上諭㫖以現在軍前大臣甚少恐不敷調遣命於軍營營總等官中擇有可勝副都統䕶軍統領任者令臣等宻封題奏今有新調吉林佐領委署前鋒翼領阿思哈同額駙策凌効力行間黑龍江協領委署前鋒翼領布爾沙科卜多進兵時奮勇奪據山嶺効力尤著率領新調右衛兵丁㕘贊内大臣伯欽拜實心辦事善於約束馬爾賽處副都統塔爾瑪善從前在阿爾台巴里坤兩處軍營俱屬効力請賞給阿思哈布爾沙副都統職銜令欽拜塔爾瑪善前來察罕廋爾軍營奏入得㫖馬爾賽辦事甚不愜朕意扎克拜達里克軍營全頼欽拜一人伯格爾地方駐劄大員内亦無歴練之人故授塔爾瑪善為達爾濟軍營㕘贊并委署前鋒統領著將欽拜塔爾瑪善暫留扎克拜達里克伯格爾地方阿思哈布爾沙著照順承親王所請俱授為副都統職銜三月戊午朔命加賞坐卡兵丁上諭大學士等曰坐卡兵丁専司瞭望哨探之事較之在營駐劄兵丁更為辛苦且汛地離營旣遠市買鹽菜未免多費著傳諭大將軍岳鍾琪除三大卡倫外其他各處坐卡兵丁每月加賞銀一兩羊價七錢俾伊等食用充足以示朕格外加恩之至意嗣後儻再有疎忽貽悞之事定行從重治罪其如何挑選輪班之處聽大將軍酌量辦理戊辰寧遠大將軍岳鍾琪奏報獲賊巴顔所供情形岳鍾琪奏言據馬厰遊擊龍有印檻送所獲準噶爾賊人巴顔等供稱領兵來犯哈宻係台吉塞卜騰及小策零敦多卜之子策凌那木扎爾等噶爾丹策零去年九月調兵六千㑹於烏魯木齊到竒台附近過冬今年正月十二日由竒台起程於二十日夜過烏克克嶺前赴哈宻其侵阿爾台兵去年十一月間小策零敦多卜歸哈喇沙爾大策零敦多卜之子曼濟在博東齊過冬現今哈薩克兵擄準噶爾七百餘戸噶爾丹策零已撤曼濟還欲令發兵赴哈薩克部謹録供繕奏奏入報聞壬申賞阿霸垓郡王扎木巴勒扎卜等並命吳禮布等前往㑹同訓練兵丁上諭辦理軍機大臣等曰據管轄烏珠穆秦等十旗扎薩克兵丁之阿霸垓郡王扎木巴勒扎卜等奏請自京派遣大臣同伊等管轄兵丁吳禮布著賞與䕶軍統領職銜巴特瑪授為侍讀學士前往㑹同王扎木巴勒扎卜等訓練兵丁尋命賞阿霸垓郡王扎木巴勒扎卜銀一千兩貂帽貂皮短褂􅀈袍各一烏珠穆秦鎮國公朋蘇克喇卜坦銀五百兩貂帽􅀈皮短褂皮袍各一丁丑命議處寧遠大將軍岳鍾琪大學士等劾奏言據寧逺大將軍岳鍾琪奏報賊人敗遁及臺站牧厰情形諸摺情詞互異前後斘謬岳鍾琪以烏克克嶺為賊遁歸必由之路其梯子泉地方即賊鋌而走險之道則當派撥兵丁時即應指定兩處酌遣官兵邀截而必俟已至烏克克嶺始令往梯子泉并令石雲倬等略為歇息是賊人之得從塔呼納呼潛遁而歸者雖石雲倬之罪而岳鍾琪亦難辭咎也又前奏塔勒納沁各厰看守甚嚴賊人一無所得後又奏報失去牲畜并各厰弁兵亦有傷損且云截殺賊人收囘羊馬所得足償所失靦然不以為恥殊非人臣奏對之體又烏克克嶺離軍營僅九十里賊兵過嶺而軍營茫然不知所設坐卡兵丁此時何在且鏡兒泉廋集察罕哈瑪爾復設三大卡倫専為探信而設乃一無聞見則平日所云傳遞號炮頃刻可至者尚足恃乎當草枯馬瘦之時賊以五六千人入我卡倫越過軍營直至塔勒納沁我兵三萬餘衆週圍宻布旣任其來復任其去賊並不奔沙磧竟由小路而去似此玩忽縱賊奏報不實深負聖恩有玷倚任請將岳鍾琪勅部嚴加議處奏入得㫖該部嚴察議奏己夘勅諭拉達克汗徳中納木扎爾上諭曰朕統御寰區内外視為一體凡撫䘏遠人奬勵恭順懲治悖逆皆朕分内事也爾徳中納木扎爾遣使向辦理藏務大臣等呈稱臣惟以辦理國事尊崇佛教量力行走探取葉爾羌準噶爾處信息報知貝勒頗羅鼐轉行奏達乞早降恩諭等語朕覽之甚為嘉悦從前因爾父尼瑪納木扎爾與貝子康濟鼐同心報効朕已沛恩膏今爾亦效法爾父與貝勒頗羅鼐一體効力甚屬勤勞嗣後益加黽勉以紹前徽則永享朕恩於無旣矣兹特頌恩賜賞給緞疋等物爾其祗領特諭辛巳命免黜敏珠爾多爾濟等爵革成滾扎布一等台吉理藩院遵㫖帶領軍營被劾之喀爾喀郡王敏珠爾多爾濟等引見得㫖軍前退縮之罪例不容寛但敏珠爾多爾濟患病是實未能領兵前往以致伊旗下派出之兵半被賊兵截囘念伊祖墨爾根濟農首先來歸其功甚大䝉我聖祖皇考優恤今伊獲罪之故亦屬可原免其革退王爵著另派賢能台吉前往軍營管伊旗下兵丁俟伊病痊時再赴軍營効力贖罪扎薩克台吉鄂木布濟私離汛地罪固難寛但為賊人截阻不能通信囘歸游牧嚴行保守使賊人秋毫無犯且人亦去得免其革退扎薩克台吉著與王格勒克雅木丕勒一同管轄屬下兵丁前往建勲將軍達爾濟處効力贖罪成袞扎布由科卜多地方逃囘後奉調軍營又未前往人亦不及著革退一等台吉丙戍命加恩軍營裁汰老疾官兵靖邊大將軍順承親王錫保等奏言臣等遵㫖將軍營年老殘疾人等詳加察閲京城八旗奉天吉林黑龍江右衛寧夏察哈爾歸化城喀喇沁土黙特等處并防戍緑旗弁兵等官弁共五十九員兵丁共一千五百五十二名俱係殘疾候青草出時酌量辦理發囘各該旗該地方等處辦理軍機大臣等議覆如所請奏入得㫖裁汰官兵内効力被傷著有勞績若俱行革退甚屬可憫著各該管大臣等察明題奏官員賞給半俸兵丁賞給半餉官兵内如有病痊可以起用者奏聞請㫖丁亥申飭寧逺大將軍岳鍾琪上諭辦理軍機大臣等曰朕覽大將軍岳鍾琪陸續奏摺知官兵騎赴軍營之馬及塔勒納沁等處牧放之馬有沿途疲瘦倒斃者有傳染時疫委棄者有被賊人刼奪者現今存剰馬匹寥寥無幾夫以多年購買預備之馬匹而棄之有如草芥其咎將誰歸乎又據岳鍾琪奏稱木壘駐兵俟所調駝馬到營之日即速起程等語口内解送之馬遠涉長途不令休息即欲驅使前赴木壘其力實有不能目今口内駝馬陸續解送軍營賊人探知必又生窺伺之念且將來移駐木壘之後所有駝馬牲畜甚多如何牧放布置以防偷盜岳鍾琪須悉心籌算思患預防無得仍蹈前轍再者朕聞軍營中自大將軍以及將弁皆用兵丁之力伐木取土盖造房屋兵丁等雖勉供使令而退有怨言夫兵丁身列戎行枕戈荷㦸冐鏑衝鋒是其職業至於興作力役非其事也是以從前築城時凡兵丁等之情願傭工者朕皆照數給與工價而不忍輕用其力將弁欲盖造房舍自當捐己資以僱夫役豈可圖一身之便安而不恤兵丁之勞苦使伊等操練辦公之外復竭􅀈以供其私役乎從來為將帥者與士卒同甘苦然後可以得其歡心而鼓其鋭氣今軍營之行事如此豈不與古人領兵之道相左乎將來移駐木壘時倘有復蹈前轍者經朕訪聞必加嚴譴夏四月壬辰命加恩酌增西路攻戰耕屯兵丁口糧上諭辦理軍機大臣等曰西路兵丁口糧從前議定每名日支粟米八合三勺或炒麫一斤駐劄之時本無不足惟有事行走及對敵之際晝則追奔攻擊夜則防範巡查非駐劄之時可比恐舊數稍有不敷嗣後凡遇此等日期著每名日支粟米一升其應支炒麫之日每名日支一斤四兩俾兵丁等口糧寛裕以昭朕格外加恩之至意至分派屯種各兵耕耘播耨胼胝為勞其耕種之一月内所支口糧亦照行走攻戰之兵米麫一體增給著即傳諭大將軍岳鍾琪等知之己亥命豫辦駐兵木壘事冝上諭辦理軍機大臣等曰大兵移駐木壘選得六月初四日巳時從大營起行爾等可傳諭岳鍾琪將一應事冝豫先留心備辦但軍營切宜慎宻以防漏洩乙巳命降岳鍾琪爵為三等侯戴罪立功兵部遵㫖議覆大學士鄂爾泰等劾奏寧遠大將軍岳鍾琪玩忽縱賊奏報不實應行議處按岳鍾琪身為大將軍専制邊疆賊夷以五六千人從烏克克嶺入我卡倫侵犯哈宻岳鍾琪茫然不知令賊刼掠牲畜從塔呼納呼緩騎遁歸岳鍾琪智不能料敵於平時勇不能殱敵於臨事律之軍法百喙難辭應削去公爵并革去少保世職曁總督職銜仍令暫䕶大將軍印務以圖後效奏入得㫖岳鍾琪著削去公爵并革去少保降為三等侯仍留總督職銜䕶大將軍印務戴罪立功平定準噶爾方略前編卷二十九
