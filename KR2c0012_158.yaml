body:
  text: 乾隆二十七年冬十月乙巳命設總管伊犂等處將軍以領侍衛內大臣公明瑞補授上諭大學士曰伊犂為新疆都會現在駐兵屯田自應設立將軍總管事務昨已簡用明瑞往膺其任著授為總管伊犂等處將軍所有敕印旗牌該部照例頒給諭科卜多辦事參贊大臣扎拉豐阿建造城垣事宜上諭軍機大臣曰扎拉豐阿奏稱科卜多屯田需用青稞籽種一百石尚可向蒙古遊牧貿易之商民等購買不須運送等語科卜多既有內地商民行走將來生聚必繁今伊犂等處俱建造城堡若照例興工甚屬有益科卜多所有舊城基址既稱地形卑濕著傳諭扎拉豐阿伊現在安營於科卜多之南哈勒巴山即於該處擇髙燥之地計可容兵民若干不必過為寬大派屯田緑旗兵從容興築其如何辦理工程之處會同成衮扎布酌議具奏諭伊犂將軍明瑞等以訪察烏梁海搶掠情形曉示哈薩克上諭軍機大臣曰成衮扎布奏稱阿桂等前奏烏梁海搶掠哈薩克馬匹奉旨查詢即派侍衛明成同烏梁海內大臣察達克至阿勒坦淖爾總管扎喇那克處詳悉訪察俱稱哈薩克前經搶掠我等牲隻什物俱蒙恩索還其所掠俄羅斯烏梁海宰桑庫克新等之物並未給還是以伊等報復曽搶哈薩克牧羣二次等語看來情形已自明晰著傳輸明瑞遇哈薩克人等即以所訪緣由明白曉示若哈薩克欲給還牧羣當向俄羅斯索取與內附之烏梁海等無涉己酉諭定邊左副將軍成衮扎布等辦理烏梁海事宜上諭軍機大臣曰成衮扎布奏搶掠哈薩克馬匹之烏梁海庫克新係平定準噶爾後逃入俄羅斯者據內大臣察達克云辦理伊等頗易但恐與俄羅斯啓釁未敢擅便等語庫克新等假我烏梁海之名搶掠哈薩克馬匹情甚可惡且伊等前曽歸附後又隨郭勒卓輝等逃入俄羅斯理應問罪今察達克等既願辦理甚屬妥協何必復生疑慮著傳諭成衮扎布如察達克等果欲前往除擒獲為首人等送來軍營其餘俱給與伊等管轄所有俘獲即交伊分賞效力人衆事竣後朕仍加以賞賚但須慎選幹練之人前往辦理即將此曉示察達克等知之庚戌命駐防效力人員均照北路軍營之例辦理上諭軍機大臣曰海明等奏稱此次換班官兵有健鋭營前鋒參領納晉泰等六員係乾隆二十三年隨征效力後又留駐防二年驍騎校布勒庫等十二員亦效力五年請旨議敘以示鼓勵等語大功告成凡換班官兵俱係駐防非出兵可比即有分外出力人員特請議敘不過量拔一二以勵其餘若概行保送則缺少人多亦與伊等無益此次所奏尚係出兵人員納晉泰等六員著送部引見布勒庫等十二員著以應升之缺即用嗣後如専係駐防人員俱照北路軍營之例辦理可傳諭駐劄厄魯特回部各大臣等知之壬子議給伊犂將軍敕書開載職掌事宜軍機大臣奏言欽奉諭旨於伊犂設立將軍查各處駐防將軍其職掌大略相同惟新疆當戡定之初一切管轄地方調遣官兵自應酌定成規臣等謹查伊犂為新疆總滙之區既經設立將軍凡烏魯木齊巴里坤所有滿洲索倫察哈爾緑旗官兵皆聽將軍總統調遣至回部與伊犂相通自葉爾羌喀什噶爾以至哈密等處駐劄官兵亦歸將軍兼管其地方事務有各處駐劄大臣仍照舊例辦理再葉爾羌喀什噶爾等回城皆在邊陲如有應調伊犂官兵之處亦準各處大臣咨商將軍就近調撥臣等擬開明職掌載入敕書奏入上從之丁巳以誤辦換班撤回官兵軍裝訓飭喀什噶爾辦事尚書永貴等上諭軍機大臣曰永貴等奏稱喀什噶爾換班撤回之健鋭營官兵辦給馬駝帳房等件又整理弓矢撒袋鳥鎗火藥委副都統品級富虎帶領起程等語此等撤回官兵不過照常來京且道路久屬清靜並無嗎哈沁何必特行辦給軍裝撤回者既如此辦理則前往換班更當何如永貴此次所辦殊為不曉事理嗣後宜加酌量可傳諭知之十一月辛酉命設伊犂等處參贊領隊大臣等上諭大學士曰伊犂等處已授明瑞為將軍自應設參贊領隊大臣協同辦事伊犂參贊大臣著愛隆阿伊勒圖補授領隊大臣著五岱補授愛隆阿五岱賞銀各一百兩馳驛前往伊勒圖亦由喀什噶爾調赴伊犂所遺領隊副都統員缺著揚桑阿補授協同永貴辦事命議敘伊犂督辦屯田緑旗官員上諭軍機大臣曰阿桂奏本年伊犂屯田緑營官員所種禾苗為田鼠傷損較去年收成分數稍為歉薄計一夫所獲尚有二十餘石等語屯田稍被災傷而收穫尚未甚歉薄所有承辦官員頗能勸課著加恩交部議敘諭內大臣尚書都統阿桂等辦理哈薩克事宜上諭軍機大臣曰阿桂明瑞奏稱哈薩克人等性本頑愚不可以理論今春將拏獲伊等頭目及所有牲隻給回伊等轉謂大皇帝矜憐我等不行治罪復來塔爾巴噶台山陰之哈爾巴哈等處遊牧似應示以兵威來春擬同領隊大臣二員分為三路領兵前往驅逐多收其屬人牲隻釋放二三人令致書阿布賚其牲隻竟不給還以示懲創等語哈薩克等貪得無厭仍行越境遊牧理應加以懲創但自明瑞外領隊之伊勒圖鄂津伍彌泰等俱未為諳練軍務今授愛隆阿伊勒圖為參贊大臣五岱為領隊大臣計伊等前抵伊犂已屆領兵驅逐之期明瑞與愛隆阿五岱分路前往酌派伊勒圖鄂津伍彌泰隨行學習此次重懲越境人等哈薩克所屬或生畏懼貿易者少或糾衆為匪以圖報復俱未可定然亦不得因此自生顧慮遂爾姑息從事至塔爾巴噶台等處雖未便即駐滿洲緑旗兵丁似應將厄魯特兵酌令駐劄防守著傳諭明瑞等將來驅逐哈薩克後作何移駐厄魯特兵丁之處會同妥議具奏內大臣尚書都統阿桂等疏奏體訪烏默爾情形阿桂等奏言臣等遵旨體訪哈薩克使人烏默爾因何願來伊犂居住緣由隨令侍衛碩通訪問與烏默爾相識之厄魯特等據稱烏默爾係厄魯特人伊父在噶爾丹䇿零時曽唆使厄魯特等騷擾哈薩克與其部衆有怨阿布賚因係伊妻弟恐被傷害特遣為使等語臣等看阿布賚所奏與體訪情形相符其請人往迎亦係求為護庇之意但哈薩克人等多疑若以為烏默爾復居伊犂恐效前此所為途間或加以侵掠亦有關係臣等議於來年三月內酌遣數人至邊界守候烏默爾令其帶回伊犂并乘阿布賚遣信之便先行札知奏入報聞乙丑命新疆賫貢員辨不得騷擾所過地方上諭大學士曰新疆所進貢物經由各該省州縣境內行走住宿地方有司自當加意照料護送若應付不時致有褻越固非奉上之道如已照例供給全無玩誤而賫送人等轉有意藉端騷擾則斷不可蓋此等微末員辨罔識事體或不過以雕鷹犬馬之類過事矜張於應給夫馬廪給之外多方需索地方官因係貢物不敢與校而新疆貢獻嵗以為常設將來驛使踵轍為日正長滋纍何所底止此風斷不可長倘有此等滋擾之人該督撫等不行據實參奏一經察出決不稍為寬宥可速諭沿途各督撫知之命優恤病故之伊犂總兵官金梁以葉爾羌總兵官汪騰龍接辦屯田貿易事務上諭大學士曰金梁自補授總兵以來雖未著有戰功而駐劄伊犂於一切屯田貿易事務辦理俱屬黽勉今聞溘逝殊堪憫惜著加贈提督銜賞銀一千兩料理喪事以示優恤並著楊應琚於伊子中擇年長者一人送部引見候朕降旨加恩伊犂屯田貿易諸事甚屬緊要著葉爾羌總兵官汪騰龍速行接辦葉爾羌現有駐劄大臣可不須總兵官駐劄著楊應琚於副將內揀選一員前往辦事戊辰命將賞查還搶掠霍罕馬匹之布魯特比沙巴圖等上諭軍機大臣曰永貴等奏霍罕額爾德尼使人巴巴什克稟稱伊處貿易人沙薩伊特有馬八十匹為布魯特之薩魯部人掠去隨飭噶岱默特往查其頭目沙巴圖聞信即盡行取出交還等語布魯特等互相掠奪亦事之所有沙巴圖一聞查取之信即行遵照辦理甚屬恭順著傳諭永貴等酌量給賞以示鼓勵噶岱默特奉委查辦亦能實心奮勉俱著一體賞賜命酌定新疆市㕓園圃租額上諭軍機大臣曰旌額理等奏稱烏魯木齊挈眷屯田民人陸續前來其貿易人等亦接踵而至計開設市肆五百餘間開墾菜圃三百餘畝請酌量定額收租以充公用等語烏魯木齊安插兵民漸多貿易人等皆藉官地以謀生計理應稍收租價俾公費有餘即如所奏辦理至伊犂及葉爾羌等城有似此者自當一體查辦著傳諭將軍大臣等將各城商民所居酌定租額既有禆公用亦可就便稽查約束至厄魯特回人向無此例不得藉端巧取辛未喀什噶爾辦事尚書永貴等疏奏修築新城工竣永貴等奏言前因喀什噶爾舊城頗狹大臣官兵等俱駐劄郊外經臣等奏請修築新城於本年四月初一日興工至八月告竣計四門周圍二里五分版築尚屬堅固九月又造成倉庫房屋七十八間所有官兵及錢糧軍裝俱遷移新城其舊城回人照舊居住至臣等辦事公署共四百餘間原有波羅泥都等入官房屋移至新城改建冬春之間亦可竣事其兵丁營房木料一時難以湊集據衆伯克等情願捐助木料三百間甚為懇切臣等擬允其所請俟交收全完將稅款盈餘酌量賞給以示體恤奏入得旨新城距舊城道里逺近及駐劄處所俱著繪圖呈覽命停給回城換班兵丁駝隻上諭軍機大臣曰永貴新柱等俱因換班兵丁帶來駝隻設法辦理永貴請留給本人加意牧放新柱請分給臺站牧放等語看來回地不宜駝隻從前倒斃者頗多今又留該處牧放不數年間徒至傷損伊犂現在牧厰與駝隻相宜著傳諭永貴等將所有駝隻或今冬或來春草生時派兵緩行送往喀什噶爾葉爾羌俱距伊犂不逺若有需用亦無難調取再換班兵丁原非征戰可比嗣後不必給與駝隻著傳諭楊應琚照給與駝隻分例或騾頭車輛酌量辦給以資馱載丙子諭伊犂將軍明瑞等辦理哈薩克事宜上諭軍機大臣曰昨明瑞等奏稱哈薩克復來塔爾巴噶台一帶遊牧請於來春前往驅逐收其人口牲隻業經降旨允行但近據旌額里等奏左部哈薩克努爾賚遣使入覲又有烏爾根齊城哈爾卜竒齊玉斯别部之巴圖爾亦遣使前來伊等因見右部哈薩克等入覲得霑恩賞故相率倣效念其逺來歸附自必照例宴賚是來春正值伊等內向之時忽聞收其遊牧恐外藩愚頑轉生疑懼即遲至明年冬後年春再行驅逐亦無不可著傳諭明瑞等將收取牲隻之處暫停辦理仍照前次曉示逐回甲申諭定邊左副將軍成衮扎布等辦理烏梁海庫克新事宜上諭軍機大臣曰扎拉豐阿奏稱烏梁海內大臣察達克等自備資斧前往辦理庫克新伊亦領兵五十名前往偵探䇿應等語此次察達克辦理庫克新因庫克新原係伊部落人等逃入俄羅斯又指伊等名目為匪是以自請往辦原不藉扎拉豐阿之助乃伊復請自行領兵前往徒覺張皇於事無益著成衮扎布等速行傳諭停止申諭喀什噶爾辦事尚書永貴等尋常貢物不必特派人員賫送上諭軍機大臣曰永貴奏稱外藩所市鷹犬等物及回人等貢獻者因為數頗多特交護軍參領松年由驛馳賫等語近因新疆賫送官物或有鷹犬之類官兵等藉端騷擾曽降旨命督撫等查參又軍機大臣議嗣後新疆年貢仍由驛馳遞其隨時微物如鷹犬之類俱於賫送金玉之便附來俱經準行著傳諭永貴等此等尋常貢物不必多為購辦或有需用候行文知會再為附便賫送不必特派人員以致滋擾仍通諭各駐劄大臣知之丁亥諭定邊左副將軍成衮扎布等辦理哈薩克事宜上諭軍機大臣曰成衮扎布等奏烏梁海散秩大臣圖布慎之子伊蘇特在額爾齊斯河渡口見有兵馬旗纛蹤迹此處向係哈薩克行走之路恐因伊等牧羣被烏梁海竊取或如巴魯特之計圖報復亦未可定自當加意防範等語察達克等曽請自行辦理烏梁海庫克新今既有此等蹤迹當候信息明確酌量行止昨扎拉豐阿奏請領兵䇿應察達克等已諭令不必前往此次非専辦庫克新可比著扎拉豐阿同察達克等前往於偵探䇿應之處自可相資為用再成衮扎布奏伊犂撤回索倫兵現在扎布堪過冬著傳諭成衮扎布有調用伊等之處不過辦給馬匹亦屬便易但此事究係傳聞仍俟查詢明確即行具奏十二月辛卯諭黑龍江將軍國多歡等查奏安插伯什阿噶什屬人生計上諭軍機大臣曰前因伯什阿噶什身故將伊弟達瓦濟特子博東齊姪布魯特及所屬四十餘人移往通肯呼裕爾安插今已數年未知伊等生計若何著傳諭國多歡等查明奏具壬辰喀什噶爾辦事尚書永貴等疏奏酌定回人備借倉榖事宜永貴等奏言據公品級阿竒木噶岱默特等呈衆伯克及屬人等願出榖一千石就城市村莊附近收貯借給貧人嗣後每遇豐年請照此辦理即交伯克等掌管設立檔册以稽出入并懇酌定章程以垂永久等語臣等伏覩我皇上仁化感孚回人等亦知樂善好施之事既出自公請毫無勒派而於貧人生計有益因量加奬勸并酌定出納條例令其遵守奏入報聞丙申諭葉爾羌辦事都統侍郎新柱等辦理呢雅斯伯克事宜上諭軍機大臣曰新柱等奏稱克什米爾之呢雅斯伯克遣其頭目固爾班伯克賫進奏章據譯稱呢雅斯伯克係喀什噶爾人在扎那巴特居住因亂遷於克什米爾葉爾羌等各城回衆在彼者約四五百戶俱願內向遷移呢雅斯伯克因率其頭目入覲并欲取克什米爾以獻復書令其逺行入覲再定取克什米爾之䇿又恐將來不取克什米爾則伊心生悔懼請於入覲時將伊留京等語呢雅斯伯克本係喀什噶爾之人懷土思遷原可聽其自便至入覲之後作何辦理臨時自當指示若無故拘留不遣即在厄魯特回部未定之先朕亦不肯出此如謂不允所請或有悔懼之心亦當留心察看俟其形迹顯露再行辦理豈有遽為逆億之理至新柱等以克什米爾路遙中隔土默特鞭長莫及且為愛烏罕愛哈默特沙所有伊現在歸附不必辦理所見尚是但業已不辦則書中所云俟入覲後再定語涉相欺亦屬失體今因爾班伯克既在葉爾羌守候著傳諭呢雅斯伯克許其入覲候旨不必言及克什米爾之事俟呢雅斯伯克率衆來歸即為整裝入覲俟召見後再降諭旨戊戌諭喀什噶爾辦事尚書永貴等辦理霍罕拔達克山各事宜上諭軍機大臣曰永貴等奏稱霍罕額爾德尼伯克遣使呈書敘述前後情事內如呼瓦特係呼什齊布魯特舊為喀什噶爾阿竒木後被額爾德尼殺害伊弟納喇巴圖近日來投曽奏準安插額爾德尼若慮其造言離間情見乎辭又如鄂斯等處本布魯特故地額爾德尼乃飾辭以為已有但書中倘有給還之意已復書嚴飭遣拖穆齊圖等往諭若有抗拒情形即請備兵征討等語霍罕額爾德尼伯克與布魯特雜處互相侵奪亦所時有伊自內附以來尚屬恭順即所敘各情事亦未至關係重大永貴等喻以情理自必遵行可以無須用兵萬一必須用兵永貴亦祇可辦理軍務其領隊進𠞰仍須愛隆阿五岱前往伊等業已派赴伊犂著傳諭永貴等候額爾德尼回音相機辦理又諭曰永貴等奏詢問從拔達克山來投之回人阿卜都喇伊木等知波羅泥都妻子現隨摩羅巴喇特摩羅密諾羅斯二人度日又據素勒坦和卓稟稱素勒坦沙親信之密爾咱色得克與伊相好昨曽致書通問擬於素勒垣和卓覆書之便作為己意令密爾咱色得克開導素勒坦沙將波羅泥都妻子送出若仍在遲疑即遣素勒坦和卓前往索取等語此事前經新柱額敏和卓籌辦今所奏尚屬可行但昨已命素勒坦和卓往愛烏罕辦事永貴諒亦遣令前來俟到京請訓前往愛烏罕順道至拔達克山索取波羅泥都妻子甚屬近便著傳諭永貴等知之庚子命改鑄阿爾台烏梁海左右翼總管印信上諭軍機大臣曰成衮扎布前經奏請鑄給烏梁海總管察達克等印信軍機處覆準頒行今成衮扎布請將阿爾台烏梁海等作為兩翼分管遊牧著鑄給烏梁海左翼總管印一顆給與察達克其圖布慎係専管右翼亦著鑄給總管印信一顆所有察達克原領阿爾台烏梁海七旗總管之印即行繳銷辛丑申諭喀什噶爾辦事尚書永貴等嚴飭霍罕額爾德尼伯克上諭軍機大臣曰據永貴等奏霍罕額爾德尼伯克所覆書札謂前遣使人奉有諭旨稱伊為汗且以喀什噶爾嶺為界似此種種謬妄皆永貴等從前給伊之書詞氣懦弱所致著傳諭永貴再行發書嚴飭云向來寄爾之書俱稱伯克何得妄自稱汗又何嘗奉有喀什噶爾嶺為界之旨爾意以大皇帝諭旨我等俱不得見豈知凡有關係外藩事宜俱傳諭我等知之何得妄行編造嗣後往來書札惟以恭順信實為主不可仍蹈故轍致取罪戾又書內所稱呼什齊們都斯人等在鄂斯地方掠奪九人什物其喀什噶爾五人之物已經索還惟霍罕四人什物馬匹並未給發請向布魯特索取等語是否確實併著查明具奏乙巳伊犂將軍明瑞等疏奏撥給烏魯木齊屯田牛隻明瑞等奏言十一月十二日準旌額理等咨稱烏魯木齊屯田多以哈薩克馬匹耕作雖比牛較駛而性不相宜每致勞傷倒斃不若用牛之便今本處僅有牛六百餘隻因阿桂歸途之便相商據云伊犂有牛二千餘隻似可通融辦理等語臣明瑞等查伊犂現有牛三千三十餘隻除歸入孳生牧羣及老弱病廢外其餘一千九百餘隻計以一千隻屯田尚餘九百餘隻於該處屯田有益請俟來春雪消時派員加意牧放解送無誤農時奏入報聞庚戌命賞參將馬虎副將職銜承辦伊犂屯田事務上諭大學士曰楊應琚奏伊犂屯務現在需員辦理而陕甘總兵副將內熟諳田功者甚少惟西安城守營參將馬虎曽於闢展等處屯田四載妥協幹練堪以派往等語馬虎著賞給副將職銜令於明歲帶領換班兵丁前赴伊犂承辦屯田事務其西安城守營參將並著暫停開缺俟有陕甘副將缺出請旨補用壬子命布政使納世通往代尚書永貴上諭軍機大臣曰永貴辦事日久著納世通前往更換現在納世通照看入覲回人前來俟來年帶領伊等各回本處後再往喀什噶爾更換永貴回京癸丑諭葉爾羌辦事都統新柱等辦理拔達克山事宜上諭軍機大臣曰新柱等奏稱拔達克山素勒坦沙統衆搶掠博洛爾遊牧圍困城池博洛爾沙瑚沙默特情急求救已遣使將素勒坦沙嚴行斥責若仍不肯止息即當領兵問罪留額敏和卓辦事等語拔達克山博洛爾俱已歸順同為臣僕素勒坦沙不知守分託言欲報舊仇博洛爾因而情急請救若置之不問其何以服衆心如斥責不從自當進𠞰但新柱向未歷練戎行額敏和卓頗悉回部情事自當同往葉爾羌已有鄂對何必留伊辦事即至拔達克山若必須用兵葉爾羌官兵甚少昨已派愛隆阿五岱前往伊犂即於彼處派出滿洲索倫察哈爾兵千餘名厄魯特兵數百名撥給馬匹合之葉爾羌等處官兵以三千人為率始能集事現在霍罕額爾德尼亦有占據額德格納遊牧之事當量其輕重緩急相機行止新柱額敏和卓督辦軍務愛隆阿五岱領隊進𠞰其和衷商榷妥協辦理併傳諭明瑞永貴等知之葉爾羌辦事都統新柱等疏奏遣使拔達克山情形新柱等奏言臣等遣伯克薩里等曉示素勒坦沙又將來使噶巴尼雅爾斥責遣使正在束裝奉到索取波羅泥都妻子諭旨臣等因素勒坦沙有侵擾博洛爾一事嚴行斥責原欲其送出波羅泥都妻子以自贖臣額敏和卓又密行寄書令其悔罪獻俘但前項情事薩里等尚未深悉或素勒坦沙問及而伊等不知則又徒勞往返臣等公議與其密為開導不若顯行索取遂向薩里等及該來使詳悉曉示并云收取波羅泥都妻子時須詳加辨驗以防詐偽葉爾羌識波羅泥都妻子之人甚多若辨驗不實則素勒坦沙之罪更重不能再邀寬免該使叩首敬聽臣等始遣令起程奏入報聞烏魯木齊辦事副都統旌額里等疏奏撤回駐劄昌吉副都統旌額里等奏言查烏魯木齊屯田係陸續舉行而羅克倫昌吉又在其西是以駐劄領隊大臣今伊犂既建造城堡昌吉距烏魯木齊頗近所築城垣已駐劄安西提標又營移眷之兵其屯田事務即交該副將管理請將駐劄昌吉之副都統永瑞撤回烏魯木齊與臣等一同辦事奏入報聞甲寅命移涼州莊浪滿洲兵及揀選索倫察哈爾餘丁駐防伊犂上諭軍機大臣曰前因準夷未平涼州莊浪等處為西陲衝要故將西安駐防之滿洲蒙古漢軍兵丁派出數千名分地駐防今大功告成巴里坤以西皆成內地涼莊既非邊徼而該處並無行圍習藝之所以致兵丁怠惰偷安俱歸無用現在伊犂建造城堡設立將軍駐防屯田與其三年一次派兵更番戌守何如即以涼莊兵丁挈眷遷移較為省便至內地之京口杭州等處亦不必多駐官兵從前漢軍人等原準其出旗撥補緑旗兵缺此二處兵丁亦應照例裁汰撥補將所出額缺分例揀選索倫察哈爾餘丁派往伊犂駐防庶糧餉不致虛縻而伊等得以及時效用差操得所為國家增一徑旅著軍機大臣將涼州莊浪官兵作何挈眷遷移及裁汰京口杭州駐防揀選索倫察哈爾餘丁派往伊犂之處詳密定議具奏乙卯諭喀什噶爾辦事尚書永貴等辦理外藩事宜上諭軍機大臣曰永貴等奏霍罕額爾德尼占據額德格納遊牧若遷延不還勢須問罪今新柱等又有辦理拔達克山之舉應請將霍罕之事暫緩等語所見尚是伊等駐劄之兵合計祇七八百名必須派調伊犂官兵方可集事但外藩彼此爭閧亦事所常有馳書斥責自當遵奉指揮即其間未能全如約束而於大體不失亦可相機行止伊等惟遵照節次諭旨妥協辦理併傳諭新柱明瑞等知之丁巳愛烏罕使人和卓密爾哈拔達克山使人阿卜都里咱霍罕使人巴巴什克哈薩克烏爾根齊部使人塞德克勒竒齊玉斯部使人烏克巴什頗拉特回部喀什噶爾諸城三品阿竒木伯克阿克伯克等入覲恭值上詣太廟行祫祭禮於午門前跪迎聖駕上御重華宫召見賜茶賚冠服有差平定準爾方略續編卷十九
