body:
  text: 雍正十年冬十月丙辰命順承親王錫保等預備勦賊事宜上諭辦理軍機大臣等曰䝉天眷佑我國家大軍在額爾得尼招地方大敗賊人追奔逐北凡我將士不可因此懈弛當仍如未敗賊時一切備禦防範尤加嚴固朕意今年賊雖敗北明年或悉其衆力越阿爾台山分為數路每隊一二千人隨便潛來侵襲卡倫牧塲擾亂喀爾喀人等得隙則進不可則回均未可定賊計若出此則我察罕廋爾柏格爾地方之兵難於四出應援著行文順承親王與丹津多爾濟額駙策凌等將喀爾喀游牧移於僻逺堅固之處令賊斷不能到大兵分為數隊如何勦殺如何衝突令賊無隙可乗預行詳計妥辦毋忽戊午命訓飭順承親王錫保上諭辦理軍機大臣等曰今年賊衆來侵之時順承親王雖屢行文馬爾賽達爾濟等令相機而行並未示以如何截殺如何堵禦王身為大將軍馬爾賽等所屬之將喀爾喀地方及賊人所行路徑王所素悉乃不為先期指授殊屬疎忽且馬爾賽失悞軍機坐視殘冦兔脫王即應嚴加劾治直待朕降㫖將馬爾賽挐問始行㕘奏甚屬優柔觀望著行文訓飭辛酉命額爾得尼招破賊有功索倫等一體議叙奬賞上諭辦理軍機大臣等曰聞得此次在額爾得尼招敗賊時索倫等勞績懋著從前曾降諭㫖額爾得尼招大敗賊人之官兵内有在烏遜珠勒處戰敗者功罪相當不必議叙爾等可行知順承親王額爾得尼招戰勝之索倫内有在烏遜珠勒行間行走者仍照常議功奬賞癸亥以額爾得尼招破賊功命加恩王丹津多爾濟封其子多爾濟塞卜騰為世子並晉封貝子羅卜藏等上諭辦理軍機大臣等曰喀爾喀副將軍王丹津多爾濟自用兵以來實心効力去嵗奮勇追殺準噶爾賊人今又在額爾得尼招統領滿洲䝉古喀爾喀兵丁大敗賊衆斬馘萬餘挫其鋒銳賊人喪膽望風逃遁自是軍威逺震疆圉寧謐喀爾喀扎薩克等可共享太平之福如此建立大功雖賜伊墨爾根巴圖魯之號朕心猶為未足向來外藩䝉古王等之子並無晉封世子之例朕念丹津多爾濟勞績昭著用加特恩著照宗室王等之例將伊長子多爾濟塞卜騰封為世子再翁牛特貝子羅卜藏喀爾喀扎薩克台吉齊旺俱在額爾得尼招奮勇殺賊貝子羅卜藏著晉封為貝勒扎薩克台吉齊旺著晉封為輔國公命以振武將軍㕘贊都統查克旦為靖邊大將軍㕘贊甲子命治馬爾賽及李杕罪上諭内閣曰馬爾賽本屬庸材我皇考聖祖仁皇帝念伊祖大學士圖海舊日功勲望其子孫成立將馬爾賽少年襲封公爵訓誨成全優加擢用乃伊不能仰承聖恩致遭罷黜旋經一載我皇考不忍令其廢棄仍命襲封且加以格外之恩榮身兼數職無非勉勵玉成以繼名臣之後也及朕御極之初仰體皇考優待勲臣之盛心首先及於海圖晉封一等公配享太廟兼立專祠永承禋祀又推恩及於馬爾賽念其家世不同歴官年久加恩優待賞賚便蕃此舉朝所共知者雍正五年大學士富寧安奉差陜西滿洲之在内閣者僅有馬齊一人又因年老不能辦事而滿洲之官階資格可用為大學士者復不得其人是以令馬爾賽備員政府以為班聨領袖其實未能贊襄一事敷奏一言稍有補於政治之萬一此亦舉朝所共知者朕初即位時命伊兼管鑲藍旗都統伊以不能辦事力辭朕亦曲從其請蓋其茍且偷安不能出力之心朕早已知之至於伊歴來貪贜不法之案漸次敗露者朕皆暗中為之消弭其應追之贜銀數萬兩又復降㫖悉行寛免更賞世職以逮其子孫賜帑金以固其操守凡所以恩待之者逺出諸臣之上以為馬爾賽茍有人心必無有不知感恩圖報之理去年六月間傅爾丹統領北路大兵駐劄科卜多悞被賊人所誘貪功輕進至於敗北得順承親王調度運籌重加整理軍聲復振朕因傅爾丹既已失機不可再膺元戎之寄順承親王久勞於外既有保障之功應令暫解軍務回京休息於是將馬爾賽授為北路大將軍畀以討賊防邊之重任伊在京承命之時即有退縮怨望之意及領兵行走並不教訓兵丁愛惜馬力未到歸化城而馬匹已陸續倒斃於道矣行至第八臺聞賊人有侵擾科卜多信息即逡巡畏懼奏請退回駐劄相機前進乃至歸化城時又不於水草好處牧放馬匹日事遷延以致兵丁之馬損傷大半其意以為馬力不敷便可藉口推托以遂其退避之奸志也伊在京面奏朕云為將之道必須與士卒同甘苦乃伊到歸化城即伐木取材葢造煖室全忘士卒之露處竟欲久居於此為娯老之計者且心懐怨望於衆大臣齊集之前口稱領兵為大將軍不如發遣黑龍江反為安逸其但知有已而不念國家悖逆庸愚一至於此朕知其不可以為大將改授為綏逺將軍令其領兵赴扎克拜達里克駐劄以為堵禦邀截之計今年七八月間賊人侵犯察罕廋爾輒敢越過杭愛深入我境搶掠喀爾喀地方是時大將軍順承親王派委副將軍䝉古王丹津多爾濟額駙策凌㕘贊大臣塔爾岱等率領官兵尾隨賊人之後於八月初四日追至額爾得尼招地方與賊人相遇鏖戰一日自黎明至於昏黑賊衆大敗殺賊萬餘積屍遍野河流盡赤賊人魂膽俱喪抛棄馬畜器械乗夜逃遁此次對壘仰荷上天恩佑我軍大小官員只損二人兵丁被傷者不過數十乃從來罕聞之盛事大將軍順承親王及䝉古王丹津多爾濟等即將賊兵大敗情形並由推河潛逃之信馳報馬爾賽等令其發兵堵賊歸路軍營將士無不踴躍奮往有滅此朝食之心而馬爾賽立意坐視按兵不舉同事之大臣等再三約會陳說馬爾賽堅執不從傅鼐以機不可失情急至於跪求而馬爾賽始終不允且向達爾濟等差來之人云我兵不令出城夜間賊人來時我兵只在城上呐喊助威爾等兵丁若昏夜來我城下我即施放鎗礟等語似此悖逆之言聞者莫不駭異及聞賊人既已潛逃達爾濟等又復約會進勦而馬爾賽遷延不行直至次日方領兵緩行五十餘里虚作尾追之狀又越二日行數十里託言賊已逺去追趕不及遂領兵回營此胡琳身在軍前目睹情形具摺陳奏者朕又降㫖詢問軍營㕘贊欽拜等據欽拜博爾屯諾爾琿回奏賊人由推河等處逃遁馬蘭泰兵力單弱博爾屯願領兵前往應援馬爾賽不允嗣議截殺賊人之事諾爾琿向馬爾賽云我等應即派兵迎截若再遲延倘賊人全過便坐失機宜是時李杕云我等惟當固守城池而已馬爾賽惟以李杕之言為是不聴諾爾琿等之言及至佐領扎木素告稱我向扎克拜達里克來時見沿途賊人陸續經過等語馬爾賽正傳集㑹議間而李杕又向馬爾賽堅執守城之說諾爾琿等又再四告稱如後面尚有賊人此番經過之時決無燒荒之理視此燒荒情形即係後面確無餘賊之明証我等急當追勦斷不可失此機會馬爾賽方領兵起程及到博木喀喇地方僅選兵七百名令欽拜前進馬爾賽竟回至扎克拜達里克等語此欽拜博爾屯諾爾琿回奏之大槩也朕又降㫖詢問馬爾賽馬爾賽回奏之摺一味支吾强為推卸馬爾賽縱賊之罪百喙其能辭乎況欽拜等尚皆惶懼認罪而馬爾賽猶復靦顔巧辯無一媿赧之辭冀售欺於萬一則其蓄心狡獪奸險更可知矣此次賊人大敗之後狼狽不堪馬爾賽擁兵萬餘不必出奇制勝但肯遵循常理堵截賊之去路實可使之一騎不返即或有逃奔餘黨而我師以大隊追襲其後必不使殘敗之冦得以漏網生還實乃奏凱成功易於完結軍務之機會也馬爾賽身任統兵之職地當扼要之區賊過不行堵截賊去又不尾追端坐空城視同秦越衆人苦勸之言堅執不聴竟令入網之獸復得兔脫將來餘孽跳梁一時未能翦滅伊誰之咎似此有意阻撓軍機紊亂國事並非尋常失機之比馬爾賽不思國家高厚之恩不念伊祖積累之舊在國為叛臣在家為逆子不忠不孝莫此為甚若馬爾賽此番情罪或為人臣所間有尚可念其先世之勲曲加寛貸而馬爾賽縱冦之罪豈可貸乎且伊之負恩如此朕撫躬自思加厚恩而招怨望朕實無以自解亦實有所不甘此皆朕乏識人之明悞用匪人朕先謝罪宗社臣民將馬爾賽正法以為人臣受恩深重而心懐悖逆者之戒著詢問在京滿漢大臣九卿及北路軍營扎克拜達里克軍營將弁等令據實即行回奏大凡微員庶民治罪之案皆屢經審訊而後定豈有馬爾賽為國家大臣不加審訊而遽行治罪之理馬爾賽之心之罪朕知之甚悉見之甚確實無幾微可疑昔年皇考對朕兄弟輩曽數次面諭圖海乃我朝第一良臣將來應配享太廟皇考厚待圖海之恩誼朕無時敢忘今將馬爾賽治罪之時愈益思念及此伊既忍悖我皇考逆伊祖父朕執大法以理天下而於不忠不孝之人姑息寛宥遲迴不決實無以對我皇考亦負伊祖圖海之忠心矣至於李杕世受國恩不思報効居心妄誕行事乖張前在廣東將軍任内縱令所屬兵丁擁閙巡撫公堂鎗傷守備大干法紀經三法司議將李杕擬斬監候雍正六年朝審九卿擬以情實具題原應不赦朕念其為勲臣之裔免死釋放旋又降㫖將伊補授都統仍襲伯爵此朕宥過錄用莫大之恩也去年北路派出漢軍兵丁揀選領兵大員朕因李杕為漢軍世族管兵多年諸事尚屬素諳特㫖將伊派往料其感恩悔過必能黽勉自新豈知伊中懐叵測於軍機緊要之時一言僨事其罪與馬爾賽等著一併詢問具奏乙丑命議安揷新附回民事宜上諭辦理軍機大臣等曰吐魯番回民遷移近邊一事據副將軍張廣泗等計議明晰伊等身在軍營自有確見但不知此際有無賊人阻滯所議遷移之事曾否舉行若果於冬月遷移則天氣寒冷深可軫念雖張廣泗奏稱塔勒納沁向有城堡儘可令回民暫住俾其耕種朕思此地並無房屋回民何以棲身查哈宻地方和暖其城外五堡等處原係哈宻回人居住之所若將移來之回民分派此地暫行安插過冬令額敏轉飭本地回民就近照看似為有益若哈宻回民果能同心照看使之得所朕必將額敏及回民等加以重賞至於吐魯番新來之回民著查郎阿等重加賞賜派委幹員加意撫綏諸凡寛裕料理務使伊等不知有遷移之苦將來若令其在塔勒納沁居住可早為辦理物料以便及時興造房屋俾獲寧居爾等可將此寄信前去並令劉於義等知之倘冬月不即遷移可遲至春間再議舉行丁夘議喇嘛蒙古等編設佐領事宜辦理軍機大臣遵㫖議奏言張家口外所住察罕喇嘛等其徒計百七十丁合之蒙古部人嵗饑來投者及副都統瞻岱等所進新平口外蒙古凡六百有五丁請以五百丁編置三佐領給額駙策凌管理餘百丁以七十丁給喀爾喀公米什克三十丁給一等台吉丹津並按户給予牲畜資其生計奏入上從之戊辰命治貝勒達什喇卜坦等私換兵丁之罪並傳諭訓勵撫輯喀爾喀等部人上諭辦理軍機大臣等曰據將軍達爾濟奏稱撥派鄂爾多斯之兵三千名原屬精壯乃協理台吉策旺多爾濟與貝勒達什喇卜坦諾衣羅卜扎木蘇將兵丁私行更換三千兵内五百餘名不堪調用又逃亡四百餘名等語朕不惜國帑數千萬億極邊逺塞駐劄兵丁特欲保全喀爾喀内扎薩克之故也伊等理應各自奮勉勦殺賊人乃私換兵丁肆意逃遁此係扎薩克等從來未有之事今派侍郎納延泰選補缺額之兵將逃回官兵嚴加治罪為首逃遁者即著正法貝勒達什喇卜坦諾衣羅卜扎木蘇協理台吉策旺多爾濟長史䕶衛等俱著嚴加治罪其不堪調用之兵五百名著回原游牧處所夫懲罪勸功乃國家之大典今嵗八月副將軍王丹津多爾濟額駙策凌等於額爾得尼招地方大敗賊衆喀爾喀王台吉等俱已賞給巴圖魯之號備得封典陞銜恩及子孫又動庫帑二百萬兩分賞官兵給與功牌去嵗喀爾喀西邊扎薩克圖汗部落數扎薩克被賊搶擄陣亡受傷人等朕俱施恩重賞其與賊交戰已故之一等台吉策勒克已贈為公爵令伊子米什克襲替至於奴僕房産衣裝等項亦盡行賞給著納延泰即將策旺多爾濟等貽悞情節告知土爾扈特貝子丹衷王阿寶六旗鄂爾多斯三旗烏喇特毛明安四子部落及遷内游牧居住喀爾喀西邊扎薩克等伊等既在一處居住與喀爾喀内扎薩克有何分别如果訓誨屬下人等不使相奪相盜接壌地方酌設卡倫有一二不肖小人犯法即秉公懲治則其餘自不敢妄為矣伊等誠能凛遵國法協力𠞰賊不過勞苦數年將來豈不各享太平之福乎公通摩克屬下人等去嵗雖加恩賞但親屬被擄有欲尋求妻子者亦有己身被擄尋求妻子脫回者著交與公通摩克等務令給與妻室家産加意照看如有投來之人亦收留養贍詳詢賊信即報知辦事官員郎中偏圖侍衛常明乃專理西界喀爾喀扎薩克等事之員如有此等人一面交扎薩克照看一面據實奏聞命王查木陽㑹同侍郎納延泰至鄂爾多斯選兵赴軍上諭辦理軍機大臣等曰達爾濟處遣回不堪調用之鄂爾多斯兵五百餘名沿途不可無統轄之員著㕘贊散秩大臣四格帶回沿途管束到鄂爾多斯時四格著回京至鄂爾多斯扎薩克王台吉内能辦事之人甚少令王查木陽帶四五人馳驛至鄂爾多斯俟侍郎納延泰到彼會同㨂選兵一千名於明年三月間著查木陽親領前赴軍營喀爾喀扎薩克固山貝子喇卜坦卒以其子旺扎爾襲爵己巳命以張家口外及歸化城所駐兵赴洪郭爾鄂隆等處駐劄上諭辦理軍機大臣等曰張家口外駐劄之兵二千名歸化城駐劄之兵一千名若令往三旗烏喇特右邊喀爾喀北界之洪郭爾鄂隆等處駐劄保䕶西界之喀爾喀内地扎薩克等游牧實屬有益且可就近調遣著散秩大臣瞻布副都統哈達哈於今冬帶領張家口之兵前往歸化城併駐劄歸化城之兵分為三隊著滿珠錫禮同哈達哈富達禮同瞻布諾穆柱同綽爾多各領一隊行走若兵丁馬匹不敷令都統丹晉每兵再給馬一匹拺擇水草好處牧放過冬多派兵丁看守牧厰勿致亡失疲瘦癸酉大學士九卿等奏言聖祖功徳常昭景陵瑞芝疊見恭請宣付史館昭示中外奏入得㫖朕從來不言符瑞時時訓諭天下臣民屏虚文而務實行是以數年來各處奏報慶雲嘉榖等事朕悉降㫖訓勉未嘗宣示於外以為祥瑞也惟是今嵗秋間準噶爾賊人侵犯北路深入我境我師奮擊大獲全勝殱敗萬餘行間軍士及邊外䝉古無不額手歡呼以為從來未有之大㨗非荷上天皇考默佑何能至此朕心方深感激而瑞芝適産於景陵天人協應信而有徵仰見上天皇考福國庇民特賜嘉祥以昭示天下之臣庶也朕與諸大臣等同此慶幸歡忭之悃忱著照所請宣付史館庚辰命革岳鍾琪職上諭辦理軍機大臣等曰岳鍾琪受朕深恩重加任用西陲討賊之舉伊亦身任不辭是以用為西路大將軍一切徵兵運餉選將設官凡有所請無不允行實冀其殫心竭力無隠無欺克著綏靖之績乃伊秉性粗疎辦事怠忽將國家軍旅重務視同泛常且賞罰不公號令不一不恤士卒不納善言傲慢不恭剛愎自用以致防禦追擊屢失機宜軍務廢弛士氣不振以多年預備之馬駝牲畜數十萬或被賊人偷盜或因失養損傷及至需用之時寥寥無幾而凡陳奏於朕前者皆虚假詐偽之詞為怙過飾非之計其悞國負恩之罪難以悉數岳鍾琪著革職交與兵部拘禁候朕另派大臣詢問辛巳定運糧解馬考核勸懲之法大學士伯經略鄂爾泰疏言肅州當軍需總滙一切運糧解馬尤要所當考核勤惰分别勸懲前者未有定例車馬損傷米石缺少隨時詰責貽悞相仍請自今運糧出口其糧如數完車騾不損者初運註冊記功一次再運如之三運紀錄一次四運加一級五運外委千總准其實授現任千把守備以應陞缺補用其怠玩者以次記過綑責降級革職分别治之至解送軍前馬匹向例處分太輕且有罰無賞不足以示鼓勵請自今解馬者以三百匹為一起如馬臕壯無病瘦一起記功一次二起至五起叙賞如運糧有功例其怠玩者馬病瘦十匹以下罰俸一年倍者降一級再倍千總把總外委綑責守備革職並令在肅州帶罪効力奏入上從之壬午命以達鼐所掌總理青海番子事務闗防給侍郎馬爾泰管理十一月甲申以軍需採買馬匹牲畜宣諭喀爾喀内扎薩克等上諭内扎薩克王貝勒貝子台吉等曰爾等自歸附本朝以來䝉恩覆育如一家人入十餘年安居樂業凡遇行軍與滿洲兵丁一體馳驅準噶爾賊人原與衆䝉古結為仇讐是以準噶爾噶爾丹敗喀爾喀時便窺伺内扎薩克我皇考以準噶爾不滅爾喀爾喀扎薩克斷不得安居故遣大臣殄滅噶爾丹又於策妄阿喇布坦備兵防範此皆爾等所共知者嗣因噶爾丹策零兇暴殘刻居心狂悖朕仰體皇考軫恤衆喀爾喀扎薩克之意不惜數千萬糧餉駐兵極邊此豈務勤逺略以快私意乎夫本朝中外一統即全獲準噶爾之土地人民何增毫末總為衆䝉古生計安寧起見不得不爾也準噶爾去年來侵擾時因傅爾丹錯誤以致我兵受傷賊人逞志今年又悉力領兵三萬前來我大兵分為二隊接戰傅爾丹一隊失機準噶爾因此益驕欲刼取哲卜尊丹巴胡土克圖而收獲喀爾喀遂突入喀爾喀地方我大兵尾追至額爾得尼招地方大敗賊衆殺賊萬餘人賊惶懼而逃若我大兵此次不獲全勝爾等豈得安居乎準噶爾既已破膽若不乗此進取使賊人乗間復振兵勢併力而來爾等豈不滋擾乎今據大將軍順承親王奏請軍需馬匹十萬羊四十萬山羊十萬俱於喀爾喀内扎薩克處採買已經准行聞從前丹津多爾濟採買馬匹時將臕體壯大者選留羸老者退還爾等便生怨望夫丹津多爾濟採買軍需並非私事若以不任馳驅者塞責伊豈能堪因以撥回而爾等反咎丹津多爾濟謬矣此次採買之事朕特交與王額駙近侍台吉協助爾等扎薩克酌量照數選買送往軍營於從前所估之價加増給付聴屬下情願不可抑勒并酌給送牲畜人行糧若一二年内軍務告竣朕另行加恩軍務乃朕與爾等所共之事朕發數千萬錢糧採買牲畜爾等自當効力資助倘仍前茍且塞責以致有悞軍需將以為準噶爾之賊可停其征討乎抑爾等有所不願耶再王丹津多爾濟欲令新安山後之扎薩克等採買其興安山前之扎薩克亦俱有牲畜著各將該旗内願賣之牲畜若干先期報明倘若山後數目不敷再將山前之願賣者補足如此則軍需不致有悞而屬下亦不致擾累矣丙戌命料理吐魯番回民内徙事宜上諭辦理軍機大臣等曰前據副將軍張廣泗奏稱十月間料理吐魯番回民遷移之事若有賊人阻撓則遲至來春再作計議等語比來未見西路奏聞想賊人於北路大創之後力量衰竭不能復侵擾吐魯番亦未可定回民乗此遷移似屬應行朕思回民誠心歸嚮屢拒賊鋒甚屬可嘉而冬月寒冷之時倉皇轉徙又甚可憫除在途加意保䕶外伊等到時務須安揷妥貼重加賞賚出其望外使老幼男婦咸慶得所不可為愛惜錢糧起見稍負逺人内附之心也爾等可傳諭查郎阿張廣泗等知之命以寧古塔將軍常徳為北路副將軍己丑命詳詢軍前投誠及俘獲者賊中情形上諭辦理軍機大臣等曰凡將軍大臣嗣後遇有軍前投誠及擒獲之厄魯特幷脫回人等俱宜詳悉詢問彼處實信真知灼見則於辦理一切事務俱有禆益如止計聴聞順適而以逆賊勢窮力盡等情引問彼投來之人隨問而供既不能得其實情於事何益著即行文查郎阿等知之庚寅命選牧厰兵赴烏喇特駐劄以馬蘭泰轄之上諭辦理軍機大臣等曰三處牧厰挑選一千兵於明年青草發生時令往烏喇特地方駐劄著將馬蘭泰調回管轄此兵費雅思哈著暫管推河兵丁辛夘命暫緩齊齊哈爾官兵赴軍盛京户部侍郎和善等奏言齊齊哈爾所在今年九月二十八日大雪十月十五日又雪雪深草沒官兵難以進發臣與將軍卓爾海等商酌停止啓行令暫居各屬城所明年或赴達里剛愛或調遣他處候㫖遵行奏入得㫖著照和善等所請暫令居住明年青草發生時著遶過興安山嶺由呼倫貝爾直至克爾倫圖拉地方緩行休養馬匹務於七月内前抵軍營癸巳命達爾濟以䕶軍統領銜赴推河以欽拜署建勲將軍上諭辦理軍機大臣等曰商都達卜遜淖爾太僕寺馬厰人内挑選之兵一千名已將侯馬蘭泰調回管轄建勲將軍達爾濟人罷軟著以䕶軍統領銜往推河代馬蘭泰之任建勲將軍印信著署綏逺將軍欽拜署理欽拜所掌綏逺將軍印信著順承親王收貯叧派大臣一員前往扎克拜達里克領兵駐劄乙未吐魯番回部内附命封其頭目額敏和卓為扎薩克輔國公餘令大將軍查明賞賚上諭吐魯番頭目額敏和卓等曰吐魯番部落逺在邊境之外去巴里坤軍營尚有七八百里易為賊人之所窺伺我師難以庇䕶朕以仁愛為心是以聴其自便不强其歸順我朝致受賊人之侵擾也乃前嵗岳鍾琪並未奏聞直以己意遣官帶領駝隻前往採買米石致啓賊人侵擾而額敏和卓與回衆等誠心歸嚮我朝努力奮勇抗拒賊兵上年賊衆三次圍攻回衆與官兵併力抵禦不但全城無恙且出其不意乗間擊刺屢挫賊鋒忠勇之氣甚屬可嘉然賊夷狡獪異常時以侵擾吐魯番為疲敝我師之計是以副將軍張廣泗等議將爾等搬移近邊之地以避賊人侵害前月具奏到日朕深念爾等移徙之時賊人或於中途窺伺又恐天氣寒冷男婦老㓜苦於行役屢降諭㫖令署大將軍等於途次加意防䕶到時善為安揷務令人人得所此數月以來朕無時不以爾等安土重遷縈繫於心也今閱署大將軍查郎阿等奏報回民大小一萬餘口已於十月十四十七等日陸續起程羣情踴躍計日可到朕心深為欣慰因思年來爾等屢遇强寇而未遭其戕害今安穏遷移永居樂土世受我朝恩庇此皆爾等忠誠感格上天顯賜福佑之明徵也除已降㫖令署大將軍等悉心部署並優加賞賚外額敏和卓著封為扎薩克輔國公其餘頭目等有應加恩賞授官職者俟大將軍查明到日再降諭㫖著將此通行曉諭回民共知之平定準噶爾方略前編卷三十二
