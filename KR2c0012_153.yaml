  text: 欽定四庫全書平定準噶爾方略續編卷十四
  hash: sha256:900bc3546dead158ccb7e7958501605e9f421a6b90f29d7edffed6d2597395c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_153-1a, image: WYG0359/WYG0359-0688a.png}
body:
  text: 乾隆二十六年冬十月丁卯阿克蘇辦事都統侍郎海明等疏奏建倉積榖事宜海明等奏言據阿克蘇阿竒木伯克色梯巴勒氐等呈稱本年雨澤應時收穫豐裕但回人等不知撙節請將現收之榖公派五百石建倉積貯以備賑貸俟積至五十石即停其派收庶儲積益為充裕等語臣等伏思新疆積榖於回人生計有益且出自伊等公請自應準行臣等仍不時察核奏入報聞參贊大臣舒赫德等疏奏安插莽噶里克等所屬回衆舒赫德等奏言臣於九月十三日至闢展會同德爾格查辦安插回人據吐魯番公素賚璊呈稱從前莽噶里克所管回人等及原住額林哈畢爾噶之沙呼里烏默特所管回人俱係我父額敏和卓暫管因吐魯番所屬不敷差遣是以將此等回人均派其所借官榖亦一體支給今回部平定自應分析安插等語臣等傳詢沙呼里烏默特回人僉稱安插已久不願移往額林哈畢爾噶其莽噶里克所管回人亦願照舊安插臣等擬將莽噶里克屬人五百餘户設四品伯克一員總管五品伯克二員協辦六品伯克五員分管其沙呼里等屬人七十四户即以沙呼里為五品伯克總管烏默特為六品伯克協辦俱歸闢展大臣統轄奏入報聞御前侍衛副都統安泰等疏奏屯田兵民挈眷事宜安泰等奏言臣等欽奉諭旨將烏魯木齊屯田兵丁可否遷移家口之處查奏伏查巴里坤地寒霜早若將屯田之兵移於烏魯木齊甚為有益其現駐兵丁臣等詳加詢問衆俱樂從惟請於收穫後回籍挈眷臣等擬咨會楊應琚從安西等處按其程途逺近給與車輛口糧於明年三四月前來再楊應琚有招徠遊民之舉俟送到時酌給地畝其口糧籽種器具均須借給至起蓋房屋亦請官借銀兩令其自營工作官為查核照水田例六年升科其借給官項分年陸續扣還但不便與兵丁雜居應令於臣等駐劄相近之地安插奏入報聞己巳議科卜多駐兵屯田事宜定邊左副將軍成衮扎布等奏言臣等欽奉諭旨籌議移駐烏里雅蘇台兵丁在科卜多屯田查烏里雅蘇台現有卡倫二十八處從前原駐侍衛以資防守今新疆平定應請各留台吉一員所有侍衛俱可撤回其屯田兵丁先派緑旗兵一百名官給籽種農具俟收穫後再將喀爾喀都爾伯特扎哈沁人等派往仍派喀爾喀兵一百名以備參贊大臣等差遣餘兵俱行撤回奏入得旨軍機大臣議奏尋議酌減烏里雅蘇台兵丁以節虛糜之費屯田科卜多以省糧運之繁成衮扎布等既經籌度情形應如所奏派參贊大臣一員領緑旗兵一百名前往科卜多屯田領喀爾喀兵一百名以備差遣本年收穫後再將喀爾喀等揀選派往將來積貯日豐則烏里雅蘇台官兵俱可漸次移駐以展喀爾喀遊牧與塔爾巴噶台額爾齊斯互為掎角至卡倫侍衛臣等原議暫裁其半俟來年全行裁撤但軍營侍衛似應酌留數員以備差遣請於新到侍衛內揀留四員餘俱撤回其各卡倫酌留台吉俟將來再行定議奏入得旨烏里雅蘇台既留侍衛四員著再留二員派往科卜多以備參贊大臣差遣餘如所議行參贊大臣阿桂疏奏辦理哈薩克越境遊牧阿桂奏言喀爾喀梅楞達什敦多卜等追嗎哈沁被掠遇哈薩克遊牧之彰固斯得釋復派兵相助尚屬恭順但據達什敦多卜等告稱哈薩克等又來塔爾巴噶台之布庫什河遊牧查去年伊柱領兵驅逐勒卜什等處遊牧之哈薩克時因伊等隨即遷移是以未加懲創今復蹈故轍恐日久生玩擬俟搜𠞰嗎哈沁竣事領兵親往嚴行驅逐仍收其牲隻示罰如稍有支吾即將為首一二人拏赴伊犂其彰固斯等既經協助我兵應量加奬賞令其遷移奏入報聞左都御史永貴等疏奏霍罕額德格訥等處情形永貴等奏言從前額德格訥之阿濟比等與霍罕額爾德尼伯克因搶掠貿易人等成釁臣舒赫德曽於霍罕使人額里卜密爾琿回部時諭令和好旋據額里卜密爾琿復來向噶岱默特告稱布魯特等又行阻截拏獲十人噶岱默特查訊俱係樵採之人並未生事但去年霍罕曽搶割額德格訥田禾額德格訥人等乘霍罕與霍集雅特部落相攻搶掠報復又據額德格訥阿濟比等使人額勒韜第懇請遣使往諭霍罕臣等查額德格訥人等前見霍罕有事意圗僥幸續因畏勢來求講解遂以理斥責曉示並檄行霍罕隨令額里卜密爾琿與額勒韜第等同回嚴飭各守疆界不得滋事伊等俱各聽從再額爾德尼伯克從弟阿卜都爾璊與霍集雅特之丕色勒伯克交通謀害額爾德尼事泄被殺霍罕因攻霍集雅特丕色勒伯克迎敵額爾德尼被圍有伊等兩部落之大阿琿講和暫已息兵謹將前後情形及曉示文書恭呈御覽奏入報聞癸酉命酌辦伊斯拉木罪案仍曉示回人上諭軍機大臣曰永貴等奏照管屯田回人伊斯拉木因回人台因和卓之妻辱詈起釁刺殺台因和卓并傷及其妻與弟不應引照回經出財抵罪應依鬭殺律擬絞等語伊斯拉木以兵刃鬭毆致有殺傷按律擬絞情罪允當但據奏稱伊從前隨副將軍富德在阿喇巴捉生始知將軍兆惠等堅守信息曽賞給翎頂而回經又有死者之家如願受普爾一千騰格免其抵償等語著詢問死者親屬情願與否如不願受財仍將伊斯拉木論抵此案特因伊斯拉木稍有勞績是以格外加恩否則案律定擬斷不姑寬仍曉示回衆知之丙子訓飭喀爾喀郡王車木楚克扎布等追捕塞卜騰不力上諭軍機大臣曰成衮扎布奏車木楚克扎布等報稱領兵追捕嗎哈沁塞卜騰等於八月十九日在和爾沁河尋蹤前往二十五日抵額爾齊斯哨探人等捉生詢問知塞卜騰等已入俄羅斯隨追至俄羅斯之鏗格爾圗喇向瑪玉爾等索取據云塞卜騰等男婦一百六十餘口投來已行文吉納爾衙門俟回文到日再定等語塞卜騰等攜帶家口行走若果速行追襲何至使入俄羅斯且俄羅斯邊界並無城郭果直入搜捕自必弋獲車木楚克扎布莽古賚辦理遲延甚屬錯謬著嚴行申飭賊入既入俄羅斯天氣漸寒官兵不必久駐即回烏里雅蘇台休息此次哨探行走之都爾伯特烏梁海等捉生探信殊為出力都爾伯特貝勒巴桑著賞給縀匹兵丁等俱酌量賞賜以示鼓勵丁丑命安置回人阿卜都賚於京師軍機大臣奏言玉古爾阿竒木阿卜都賚因需索多倫回人革職遵旨解京今據納世通等派員解送前來查阿卜都賚係庫爾勒回人散秩大臣伯克托克托之弟托克托隨征庫車持檄往諭為逆賊等誘害因令伊弟隨營效力續將多倫回人移居哈喇沙爾以阿卜都賚為阿竒木管領又查從前海明等解送掠奪商人之沖噶巴什烏默爾比來京蒙恩旨賞給馬甲錢糧歸入回人佐領安插今阿卜都賚應否按律治罪及照例安插之處伏候欽定奏入得旨阿卜都賚著照烏默爾比辦理辛巳葉爾羌辦事都統新柱等疏奏辦理錢法事宜新柱等奏言據管理錢局同知圗桑阿等呈稱上年九月初七日辦理鼓鑄錢文迄今一載以錢五十文為一騰格計共八萬二百三十四騰格除兑給三城回人四萬三千九百九十八騰格外仍存三萬六千二百三十五騰格查回人兑支普爾錢文近將七十之數增加三十富人尚可支持貧户頗形竭蹶嗣後應請從容調劑不必勒限惟以盡收普爾錢文為止又鑄錢匠役共九十九人所收普爾漸少請裁去一半以節糜費奏入報聞丁亥命奬賞追捕塞卜騰等之大臣官兵上諭軍機大臣曰成衮扎布奏車木楚克扎布等呈稱俄羅斯鏗格爾圗喇瑪玉爾等奉伊吉納爾衙門來文將嗎哈沁塞卜騰等一百餘人及軍器馬匹等物全行送出等語車木楚克扎布等駐兵納林候俄羅斯信息曽經降旨訓飭今俄羅斯既行送出即已竣事塞卜騰雖係俄羅斯遵約呈獻非伊等擒獲但逺道追捕亦與有勞績車木楚克扎布莽古賚著加恩賞緞四端都爾伯特貝勒巴桑烏梁海散秩大臣圗布慎領兵追捕喀爾喀協理台吉恭格向俄羅斯索取頗屬出力俱著賞縀三端此項派出官兵及都爾伯特烏梁海等官兵仍酌量賞賜以示鼓勵塞卜騰著嚴行押解來京戊子諭陜甘總督楊應琚籌給青海遊牧事宜上諭軍機大臣曰前據多爾濟奏請將從前羅卜藏丹津遊牧之洮賚郭勒等處給與青海扎薩克等遊牧經理藩院議駁此等遊牧係羅卜藏丹津舊地伊逃叛之後久已入官不應再給扎薩克等但念此時新疆展拓非舊日之比即酌給伊等遊牧亦無不可惟是洮賚郭勒等處是否牧放官馬抑係向來間曠之地無妨撥給著傳諭楊應琚令其籌度如尚可查給該扎薩克等即應酌辦不必過於拘泥俟奏到再降諭旨庚寅諭參贊大臣阿桂便道搜捕嗎哈沁上諭軍機大臣曰成衮扎布等奏嗎哈沁塞卜騰等供稱上年在齋爾地方見一起嗎哈沁蹤迹沿途住宿約安六竈向西行走或藏匿額林哈畢爾噶山僻之處亦未可定已知會駐劄烏魯木齊大臣等語著傳諭阿桂等俄羅斯已將塞卜騰送出無庸搜捕可於回兵便道將塞卜騰所供賊人留意查拏如不能弋獲即回伊犂辦事前據阿桂奏已扺額爾齊斯其如何搜捕嗎哈沁之處一併奏聞辛卯陜甘總督楊應琚疏奏招募屯田户口情形楊應琚奏言臣前奉諭旨招募內地無業遊民屯田烏魯木齊隨就近飭諭河西一帶據肅州安西二處招募貧民二百户約男婦大小三百名口定於本年十月分為二起料理前往又肅州髙臺縣招民五十六户肅州招民四十四户共三百六十餘名口又山西臨晉縣民盧文忠一户五名口寄籍肅州貿易情願自備資斧不敢煩官資送此外河西附近一帶聞尚有數百户情願挈眷前往而屯兵之願攜家口者現在續行辦送其盧文忠頗知急公仰懇賞給監生頂帶以示鼓勵奏入報聞十一月乙未朔授原任副都統伊靈阿為藍翎侍衛上諭軍機大臣曰原任副都統伊靈阿前因獲罪革職發往阿克蘇效力今據永貴等奏伊諳悉回部事宜請派往巴爾楚克管轄駐劄兵丁著加恩授為藍翎侍衛辛丑議辦送新疆挈眷兵丁事宜理藩院尚書富德等奏言臣等查閲察哈爾兵丁及新舊厄魯特等尚可派出一千名效力新疆但此次係挈眷前往非換班兵丁可比應於次年三月起程派察哈爾總管副總管等官獲送其編設佐領支給馬駝賞給孳生牲隻整裝銀兩均照例辦理奏入得旨軍機大臣議奏尋議臣等前議派出索倫官兵官員預支俸銀一年兵丁賞整裝銀二十兩營長等月支鹽菜銀六兩跟役六名馬十匹佐領等月支鹽菜銀四兩跟役四名馬八匹驍騎校等月支鹽菜銀二兩跟役二名馬六匹兵丁月支鹽菜銀一兩五錢馬二匹每二兵公用跟役一名月支鹽菜銀五錢賞銀二兩及帳房鑼鍋等項今察哈爾安插官兵應照例辦理但伊等係挈眷行走應請酌加整裝銀各十兩加給人口各馬一匹駝一隻又按户折給帳房銀四兩鑼鍋銀二兩其沿途支給口糧及選派官員護送俱如所奏辦理至官兵馬駝向例於到營之日交回此次應即行賞給俟立有産業時再將鹽菜銀兩停止統計護送官兵需用銀六萬餘兩從户部關領又需馬二千八百餘匹在達里剛愛商都達卜遜淖爾太僕寺牧羣內抽撥駝一千隻行文西林郭勒盟長等將軍需餘駝㨂送如不足即令該總管巴爾品等於牧羣補給再兵丁等既挈眷前往所有跟役賞項毋庸辦給即為間散餘丁等製備軍器之用奏入上從之丁未訓諭左都御史永貴辦理回人事宜上諭軍機大臣曰永貴奏稱回部伯克等往往朘削所屬其姦徒又喜造言生事搖惑衆心請遍行曉諭嗣後大小回人倘事有欺飾除按情定罪外量其事體之輕重生計之貧富酌量罰取牲隻什物歸公遇有廉謹之伯克頭目良善之回人加以奬賞等語化導回人遷善改過有犯必懲自屬應行之事若事有欺飾即定為罰項既非贖鍰之義不過徒滋繁瑣耳且所罰牲隻什物或辦理不善致有侵蝕反貽回人口實尤為非體總之辦理回衆事務宜因其性情風俗而利導之非可盡以內地之治治也即內地人等豈竟全無欺飾耶回人等果係姦惡自當明正典刑不止罰贖若欺飾之事安能保其必無惟應懲創者懲創之應約束者約束之如謂區區牲隻什物遂可以賞善罰惡於政體人情均不可行著傳諭永貴知之又諭曰永貴奏請於伯克子弟及回人內視其人可造就者酌量揀選學習辦事請賞戴金頂以示鼓勵等語尚屬可行即照所請賞給左都御史永貴等疏奏籌運回城入貢方物事宜永貴等奏言查葉爾羌喀什噶爾嵗例各貢葡萄一千斤本年五月起程雇覓回人牲隻送至哈密約費一千餘兩其內地驛站不在此數較之本價過多臣等酌議將此項運費購買騾頭於應貢金玉之時令派出官兵帶至哈密或於千斤內㨂選一二百斤入貢餘者令回人按時價折交以為官兵鹽菜銀兩之用奏入得旨如所請行辛亥參贊大臣阿桂等疏奏驅逐越境遊牧之哈薩克情形阿桂等奏言臣等聞自哈薩克脫出之厄魯特等告稱哈薩克等又在塔爾巴噶台以內遊牧因領兵速往八月二十六日有哈薩克等在卡倫外探知臣阿桂在營隨即投見詢係霍濟伯爾根屬人因嚴行申飭令傳頭目來見次日見遊牧之哈薩克等拋棄什物連夜奔逃據厄魯特等告稱伊等畏懼兵威臣慮其過於驚擾隨追令轉回加以撫慰有彰固斯巴圗爾等三十餘人先來服罪餘人俱陸續前來臣復分途查勘越境之哈薩克等約二千餘户已全行逐出但伊等散處遊牧惟貪小利雖據稱不敢再來亦未可深信臣等仍不時巡查計駐兵設卡之後自當斂迹奏入報聞壬子諭烏魯木齊辦事副都統旌額理等辦理哈薩克貿易事宜上諭軍機大臣曰安泰駐烏魯木齊二年每年辦理哈薩克貿易數次本年自五月貿易後迄今未來哈薩克等見小貪利若概從優渥則難乎為繼或過示減省則逺人疑阻惟在大臣等悉心籌酌調劑得宜今旌額理等接辦時宜加意體察固不可刻核以阻歸順之忱亦不可虛糜以啓覬覦之漸總之內地貨物有餘而邉境馬匹最要化無用為有用莫善於此但不可因朕此旨遂不知節制著傳諭旌額理等悉心妥協辦理議瑪納斯等處屯田事宜御前侍衛副都統安泰等奏言查原議瑪納斯庫爾喀喇烏蘇晶河三處屯田共需緑旗兵八百名今按照兵數應派都司守備各一貟千總三貟把總六貟其管理糧務查瑪納斯與羅克倫相近可令該處巡檢兼辦晶河等處派貟辦理以范時綬駐劄三屯之中往來巡察其駐防瑪納斯庫爾喀喇烏蘇由烏魯木齊派索倫兵各六十名晶河由伊犂派索倫兵五十名屯田兵三人給馬二匹駐防官兵之馬共需八百四十餘匹馱載口糧籽種軍器農具需駝一千三百餘隻恐有不足又製車一百輛以所換哈薩克馬匹挽運所有官兵鹽菜銀兩瑪納斯等處由烏魯木齊支領晶河由伊犂支領奏入得旨軍機大臣議奏尋議臣等前議來年在瑪納斯等處屯田酌派官兵及就近由伊犂烏魯木齊分辦口糧籽種令范時綬駐劄辦事今安泰等所奏派出屯田管糧各官及應行派辦駐防官兵馬駝諸務俱係按照情形應如所奏辦理奏入上從之癸丑命肅州鎮總兵五福署安西提督上諭大學士曰據楊應琚奏安西提督劉順現在患病尚須調理來嵗移駐巴里坤請以肅州鎮總兵五福署理提督印務等語劉順著暫行解任調理安西提督印務即著五福署理並令帶兵移駐巴里坤命加賞阿竒木伯克鄂對等養廉上諭軍機大臣曰前因回人舊習凡伯克等多朘削所屬是以賞給各城阿竒木伯克等錢幣地畝及供役之人俾得奉公自愛近聞葉爾羌伯克鄂對喀什噶爾伯克噶岱默特等頗知守分無苛擾回人之事深屬可嘉念伊等歸誠日久效力有年著於官給六百騰格外再加二百以示鼓勵此次係出自特恩不可援以為例丙辰命理藩院衙門承辦回部事務上諭軍機大臣曰永貴等奏回部各城阿竒木等伯克俱由辦事大臣給與印信執照開載職掌造册報明軍機處等語軍機處承辦頗多理藩院専理蒙古事務尚可兼辦回部著將理藩院五司內派出一司専辦回部事務其酌擬司名及應設官貟數目承辦事宜該部詳悉定議具奏命賞原任布政使傳靖職銜上諭軍機大臣曰永貴等奏原任布政使傳靖在阿克蘇喀什噶爾效力贖罪頗知勤慎等語傳靖著加恩賞給七品筆帖式職銜命賞試用參將新德原任遊擊白衣保等職銜上諭軍機大臣曰據德爾格奏管理屯田試用參將新德原任遊擊白衣保在屯二年甚屬奮勉等語新德著加恩補授參將遇缺即補白衣保著賞給千總職銜壬戌命哈密貝勒品級玉素富往代吐魯番郡王額敏和卓上諭軍機大臣曰前因額敏和卓玉素富皆回部舊人若令伊等更替駐劄辦事於新疆有益去年玉素富來京曽諭令在哈密休息年餘今額敏和卓當還吐魯番休息以玉素富往代玉素富著即整裝候此次入覲回人等還至哈密時即同護送之乾清門侍衛等帶領前往玉素富至葉爾羌額敏和卓即回遊牧候來年入覲回人等經過吐魯畨時再同侍衛等來京玉素富亦授為參贊大臣應得公項照例支給伊子伊勒巴喇伊木看守遊牧著加恩賞戴孔雀翎癸亥葉爾羌辦事都統新柱等疏奏籌糶和闐餘糧新柱等奏言查和闐回人所交乾隆二十四五等年糧石除官兵支領外仍餘一萬四千四百餘石臣等飭令丑達照時價出糶除糶過三千六百餘石外仍有萬餘石存倉陳陳相因恐致朽腐據阿竒木伯克阿什默特等呈稱回人每年交正項普爾二萬四千騰格每月復以普爾三千騰格換易新錢故官糧難於銷售若準以紬布牲隻作價尚可通融又所屬克勒底雅每年採金入貢仍有贏餘亦可作價如蒙允準每年願認糶糧石一千八百帕特瑪等語臣等伏思回人紬布價值較糧石頗賤牲隻價雖稍昂仍減於內地辦送金亦通行之物俱可濟用且伊犂布價甚貴若由臺站轉運於兵丁等衣服有益奏入得旨如所請行議回城錢法事宜軍機大臣奏言新柱等奏回人以普爾錢文兌換新錢不能全行交納又鑄錢工役過多請量減一半以節糜費等語欽奉諭旨俟臣舒赫德到京時議奏臣等查葉爾羌鑄錢一年共得八萬餘騰格阿克蘇又開局鼓鑄與舊普爾參雜行使但回人貧富逺近不同不能全收舊錢以足十萬騰格之數臣等愚見新舊錢參雜自可流通無庸急於收舊若新錢鑄至十萬騰格時舊錢收盡自當停鑄或尚有舊錢則仍行添鑄以盡收舊錢為度每月不限定數於回人生計有益至錢局所鑄無多其工役等自當裁減俱應如所奏辦理奏入上從之平定準噶爾方略續編卷十四
