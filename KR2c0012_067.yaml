body:
  text: 乾隆二十年夏五月乙未命凱旋將軍暨新降台吉等赴熱河避暑山莊覲上諭大學士曰本年七月十六日朕恭奉皇太后鑾輿巡幸木蘭計回鑾至熱河時新附之台吉噶爾藏多爾濟暨各宰桑等前來入覲正可召見撫諭以慰其瞻仰之忱阿睦爾撒納策凌䇿凌烏巴什等功成奏凱亦宜宴賞以示酬庸仍照上年之例駐驆山莊優加饗賚舉行盛典所有一切應行豫備事宜著各該衙門照例豫備定西將軍永常疏奏西路兵丁分隊進發情形永常奏言西路兵統計一萬六千名內派入哨探兵隊內六千餘名臣帶領駐劄烏魯木齊兵二千餘名其索倫兵三千分為三隊副都統額爾登額帶領頭隊參贊大臣親王額林沁多爾濟總管畢里衮帶領二隊副都統三格帶領三隊俱於四月初九日至二十八日陸續前進其副都統莽阿納所帶健鋭營兵一千名公品級拉里達等所帶哲里木兵一千名西安將軍都賚三等侍衛公豐安所帶西安滿洲兵一千二百五十名自五月初三日至初五日陸續抵烏魯木齊軍營尚有西安滿洲兵一千二百五十名數日內亦可全到現據副將軍薩喇爾等文稱前隊哨探兵已入伊犂邊境至登努勒台地方㑹北路大兵於四月三十日一同進發所有三隊索倫兵丁仍令陸續前往䇿應其餘兵丁即令在烏魯木齊衡要地方駐劄聲援臣伏思天威遠播平定伊犁大功指日告成臣即帶領續到兵丁在烏魯木齊駐劄俟奏凱後再行籌辦撤兵事宜奏入報聞戊戌諭定北將軍班第等速解巴朗赴京上諭軍機大臣曰據班第奏逃犯巴朗已經擒獲交喀爾喀協理台吉圖巴扎卜宰桑烏勒木濟解送前來巴朗係背恩脫逃重犯應即速解來京此時量已起程著傳諭班第等轉飭圖巴扎卜等小心監押即速赴京仍將何時可到之處先行奏聞庚子定北將軍班第密奏阿睦爾撒納言語情形班第奏言據阿睦爾撒納密行告稱若以噶爾藏多爾濟為綽羅斯汗衆心多有不服準噶爾風俗素稱强悍喜生事端心所不服者雖威力挾制不久必更滋事不若於事定之時齊集各宰桑得木齊等廣為咨訪現今噶爾丹䇿零雖無嫡嗣於伊親戚中不論何姓擇其衆心誠服能禦哈薩克布魯特者公同保舉奏請皇上施恩俾領其衆則輿情既協事後可以永遠寧帖臣告以奉㫖封四衛喇特各為一汗令自管轄屢奉諭㫖甚明輝特和碩特都爾伯特已將爾及班珠爾䇿凌等加恩分封獨準噶爾一部若另選别姓管轄不獨未合聖意即準噶爾衆心亦豈能允服阿睦爾撒納復稱我䝉皇上重恩已極尊榮將來帶領屬人在阿爾台附近地方游牧生理於願已足復有何求但我等四衛喇特與喀爾喀不同若無總統之人恐人心不一不能外禦諸敵又生變亂然此亦非急務俟與額駙公同商酌再為陳請臣即密行知㑹額駙色布騰巴爾珠爾豫為留心再自收服塔本集賽以來凡有投降人衆俱云皆聞阿睦爾撒納而來又屢次聲言準噶爾衆心無論何姓惟能安撫大衆捍禦外患乃其所願伊此時惟以糾合從前失散之人圖立産業牲畜為急務又常言帶領鄂拓克投降之宰桑索薩賚等原係伊輝特部落之人種種虛張聲勢其希冀僥幸之心已經畢露俟大功告成臣與薩喇爾鄂容安等惟悉心遵㫖辦理不使稍萌妄念再內大臣瑪木特退後每摘發阿睦爾撒納之短而覿面又多迎合似屬年老昏憒不可深恃奏入上諭軍機大臣曰班第奏阿睦爾撒納言語情形一摺阿睦爾撒納不無希冀僥幸之心班第答以準噶爾地方四衛喇特封為四汗之處業已降㫖斷不可改持論甚為得體若止封阿睦爾撒納為汗則辦理準噶爾一事全為伊一人集事矣然伊即潛萌覬覦之念班第惟以奉有諭㫖不敢妄行陳奏正詞相拒料伊亦不敢遽爾妄行但此念既萌久留彼處於事無益若即促其來京使之疑懼亦有未便俟達瓦齊就擒之時將伊同衆台吉遣回固可安然無事但從前原有留伊駐劄辦事之㫖班第恐急遽遣回致伊頓起猜嫌不若仍遵前㫖行班第惟酌量情形善為籌畫不必拘泥朕㫖至瑪木特原係一狡猾之人其行為更可不必深論從前薩喇爾亦曾將衆人不願封噶爾藏多爾濟為汗之處奏聞朕曾傳諭玉保令其暫停降㫖今阿睦爾撒納又為此言看來衆心果有不願亦未可定班第留心訪問並察看噶爾藏多爾濟如果不足服衆即由噶爾丹䇿零近族內揀選一人封為綽羅斯汗之處作為己意密與阿睦爾撒納商議具奏若其人尚屬可用即不必商辦總俟伊入覲後再行定奪將此密諭班第知之諭定北將軍班第等酌留駐劄伊犁兵丁上諭軍機大臣曰據班第奏稱伊犁河北從前原有存貯米糧縀匹等物上年為哈薩克搶掠所餘馬匹牲畜俱經達瓦齊携往特克斯地方厄魯特回人等生計艱難不足以供應大兵口糧等語準噶爾地方數年以來屢遭兵革又為哈薩克搶掠現在居住之厄魯特回人等生計自屬拮据若於伊犁多駐大兵深屬未便從前薩喇爾等奏請停止伊犁駐兵經朕傳諭班第等令其酌留兵丁一二百名為駐劄大臣差遣委用今功已告成大兵即宜陸續撤回班第等現在自當即為辦理若尚未議撤即遵㫖妥協籌辦其應酌留兵丁一併詳議奏聞辛丑命詳查派遣曉諭達瓦齊之噶勒雜特得木齊拜伯勒克等加恩優恤上諭軍機大臣曰班第奏稱據投降之哈爾噶齊沙津禀稱薩喇爾遣赴達瓦齊處曉諭之人因繞道前往雖尚未見達瓦齊聞達瓦齊欲將所遣噶勒雜特之人用刑訊問等語薩喇爾等從前遣人至達瓦齊處曉諭原係彼時酌量事機辦理但以噶勒雜特甫經歸順之人即令為使前往如果受達瓦齊刑訊甚屬可憫著傳諭薩喇爾等所遣噶勒雜特得木齊拜伯勒克等若僅止於受刑即酌量加恩賞賚萬一為達瓦齊戕害即將伊子嗣查明奏聞朕從優加恩賞給世職將此一併曉諭哈薩克錫喇知之定邊右副將軍薩喇爾等疏奏堪布喇嘛等率衆來降薩喇爾等奏言臣等分兵兩路渡伊犁河追躡達瓦齊於四月三十日起程五月初三日抵伊犁河岸適副都統額爾登額帶領索倫兵一千名前來於五月初五日至初七日陸續渡河前行互為聲援一同前進軍威丕振近河居住之宰桑得木齊等自五月初一日至初七日陸續來降堪布喇嘛所屬得木齊鄂咱爾圖都布根都什厄魯特三百户回人一百戶達瓦齊之親隨兵烏克圖哈什哈等二十餘戶伊犁居住回人伯克默美特等二千餘户楚爾和特宰桑圖布慎等五十一户烏魯特宰桑烏勒木濟等二十四户烏魯特宰桑和通等十九户回人伯克默美特尼默爾等一千六百户都爾伯特扎薩克台吉達什敦多卜之弟垂羅克三户喀什噶爾伯克賽音烏蘇卜等四十九户共四千一百六十六户俱奬勵賞賚安插各原處居住其投降之達什達瓦所屬人等二千餘户內酌撥兵六百名現在隨營效力臣等復遣人前往招服伊犁河原居住之朱爾都斯空格斯哈什等處烏魯特克勒特一萬餘户人衆亦漸次來歸再臺站關係甚要擬將烏蘭烏蘇至烏魯木齊派侍衛海福管理自烏魯木齊至博羅塔拉道路較逺所係尤重派貝勒塞卜騰管理自博羅塔拉以外派總管巴祿管理復將新降回人伯克默美特派出協同巴祿等辦理奏入報聞六月癸卯朔諭定北將軍班第等曉諭準噶爾全部人衆上諭軍機大臣曰準噶爾部落自䇿妄多爾濟那木扎爾以來互相戕殺內亂頻仍至達瓦齊愈行肆虐所屬人衆皆不聊生朕憫念彼處生靈特遣兩路大兵往平準噶爾全部出水火而登袵席今伊犁已定所有投誠衆台吉等並感戴朕恩懇求入覲朕亦欲令伊等來京瞻仰慰諭撫綏施恩賞賚但現在軍行甫經平定彼處又與哈薩克布魯特各部落連界須酌留辦事之人不必俱令前來入覲著傳諭班第阿睦爾撒納等將應行入覲台吉等派定遣來外仍於每部落酌留堪任辦事之人在各游牧稽查彈壓俟下次再令更番前來方為允協將軍大臣等暫留駐劄亦因準噶爾地方初定現有應辦事宜俟一二年後諸事俱定即行撤回再將彼處各台吉酌量勞績及所屬人數衆寡分别加恩封為汗貝勒貝子公等爵雖各項爵秩視汗自有等差其為辦理各該旗事務職任維均至本部落各扎薩克等事務即不歸其統轄向來喀爾喀內扎薩克等體制皆然朕視準噶爾衆台吉與喀爾喀諸部落無異凡事俱一體辦理四衛喇特台吉亦應照喀爾喀每部落設立盟長副將軍各一員遇有應奏事件即報明駐劄大臣轉奏至大臣等回京後即著報部轉奏所有應放盟長及副將軍之人俟伊等到熱河入覲後朕量其人才再降諭㫖班第等可即通行傳諭準噶爾全部人等知之丙午定邊左副將軍阿睦爾撒納等疏奏官兵擊敗達瓦齊情形阿睦爾撒納等奏言臣等於五月初五日渡伊犁河領兵前進據散秩大臣阿巴噶斯等報稱伊等於達瓦齊未到之先前往華諾海地方保護游牧達瓦齊自格登地方復移至尚圖斯居住等語臣等隨領兵趲行與西路大兵連絡聲勢初十日至華諾輝圖西里見有賊人踪跡隨赴西路副將軍薩喇爾等營定議兩路並進逮至哈新烏蘇身親察勘則達瓦齊擁衆將及萬人後負格登山崖前臨泥淖駐營固守正在相度間據哨探人等將自達瓦齊營內脫出來投之莽漢們都二人一併俘送臣等訊據供稱係明阿特鄂拓克之人在特穆爾圖淖爾居住近為達瓦齊調取前來今見大兵情願投誠至達瓦齊自特穆爾圖淖爾帶兵來此住歇軍械不整馬匹亦疲伊之情形雖不能深悉看其現在帶兵來迎未必即有歸降之意然衆心離散願投天朝者甚多此時所有兵力己屬搜括無遺外此别無可調之兵等語臣等竊思達瓦齊雖尚率衆固守而氣衰力竭斷難久持且人心渙散日後願降若竟領兵掩殺既非所以仰體聖主拯救準噶爾衆生塗炭至意即投誠人等亦不無因此遲疑却顧臣等詳察地利於十四日兩軍各據形勝整陳以待並示欲掠游牧之勢將誘出達瓦齊乘機執縛是夜派翼領喀喇巴圖魯阿玉錫厄魯特章京巴圖濟爾噶爾並新降宰桑察哈什等帶兵二十二名往探達瓦齊果否在營而阿玉錫等奮勇突入賊營衝擊出其不意放鎗呐喊賊衆驚潰紛奔自相蹂躪達瓦齊僅率二千餘人竄去比黎明將餘衆一一收服並獲其台吉二十人宰桑四人宰桑等子弟二十五人及達瓦齊親隨兵五百餘名又各處派調兵四千餘名併收取達瓦齊所居大䝉古包一架炮六位而還臣等一面安撫人衆一面令郡王青滚雜卜訥默庫班珠爾貝勒剛多爾濟那木扎爾車蘇隆貝子䇿布登扎布沙克都爾扎卜普爾普額爾德尼公布顔特古斯參贊大臣公達爾黨阿等率領官兵分路追躡臣等亦統兵繼進收取達瓦齊妻子家屬伏念達瓦齊雖暫因夤夜兔脫仰賴聖主威福自可不日就擒奏入上諭軍機大臣曰阿睦爾撒納等帶領官兵至達瓦齊駐營之地指示調度列陳揚威所派喀喇巴圖魯阿玉錫等帶兵僅止二十二名即能賈勇無前使賊衆驚潰敗走招撫數千餘人深屬可嘉喀喇巴圖魯阿玉錫巴圖濟爾噶爾察哈什等遵令乘夜翻營一鼓先登所向披靡尤為實力奮勉俱著加恩授為散秩大臣仍加賞男爵准其世襲並賜銀三百兩兵丁二十二名俱著授三等侍衛仍各賜銀一百兩喀喇巴圖魯阿玉錫在軍營已及一年現亦無事著即馳驛赴熱河到時朕仍從重加恩遣回游牧居住其投誠之厄魯特莽漢們都原係達瓦齊調取之兵傾心歸順將賊情詳悉禀告亦堪嘉豫著阿睦爾撒納等即酌量賞賚以示奬勵臣等謹案勇士臨陳果能中誠激發義不返顧則一以當百無堅不摧固不在徒旅之衆也皇上鼓勵人材恩深感切阿玉錫等一降人耳以其材可驅䇿特命效力戎行備膺寵遇果能邁往直前以二十二人深入賊營所向辟易招服至數千餘人之多非簡練精鋭豫養士氣焉能殺敵致果若是及其攻破賊營即命加顯秩厚賚且寵錫嘉名圖形臺閣重示褒勸凡在疆場之人有不踴躍爭先者乎命賞賚投誠台吉塞卜騰諾爾布等上諭軍機大臣曰阿睦爾撒納等奏從前達瓦齊遣台吉塞卜騰諾爾布同宰桑竒塔特領兵往禦哈薩克塞卜騰諾爾布聞大兵到彼即殺宰桑竒塔特前來投誠甚屬可嘉塞卜騰諾爾布著各賞給貂帽一頂數珠一盤台吉伊什丹津係阿睦爾撒納胞兄台吉諾爾布丹津係阿睦爾撒納同族台吉巴特瑪車凌之弟伊等皆克殫誠心協力自效以冀同沐朕恩著各賞給貂帽一頂數珠一盤帶領所屬二百户以上之台吉巴桑和碩特台吉圖克進各賞給皮帽一頂荷包一對帶領三千户來降之綽和爾鄂拓克宰桑約蘇圖著授為散秩大臣並賞給衣帽帶領百户來降之得木齊巴爾達穆特著授為三等侍衛所賞衣帽等物著派侍衛濟福齎往並曉諭伊等俟入覲時仍加恩從優賞賚再台吉諾爾布即令於此次前赴熱河入覲又諭曰阿睦爾撒納等奏噶勒雜特宰桑特克勒得克帶領得木齊四人前來投誠特克勒得克上年即欲投誠因遇逹瓦齊搶掠中止今聞大兵將到即行歸順應施恩賞給職銜但所帶户口數目未經奏明著班第等即行確查特克勒得克所有户口數目或應授為散秩大臣或應授為何等侍衛之處公同酌定傳㫖加恩再帶領十三人來降之烏爾古濟爾係宰桑錫喇丹津之孫其年甚幼且伊祖母現已年邁冀得歸附受恩情尤可憫著賞給皮帽一頂俟赴熱河入覲再行加恩海爾圖納沁之孫約蘇圖亦令於此次前來入覲命定北將軍班第等分别辦理自準噶爾來歸之滿洲䝉古緑旗兵丁上諭軍機大臣曰阿睦爾撒納等將從前出兵為準噶爾所獲之滿洲䝉古緑旗兵丁等現在陸續來歸作何辦理之處奏聞請㫖滿洲兵丁出征被獲既不能歸又不識死綏之義靦顔視息安居異地至數年之久恬不為恥此等斷不宜仍令回至故土前此䇿凌阿睦爾撒納等帶來內地之人朕仍令賞給伊等今大兵前進陸續來歸之兵丁等應仍照前㫖辦理但準噶爾全部業已平定此等皆係內地人民永逺棄置心有不忍將來事定後巴里坤仍須駐兵防守著傳諭班第等將陸續來歸之滿洲䝉古緑旗人等逐一查明若係兵丁俱遣往巴里坤居住如䝉古喀爾喀兵丁其中有願歸原游牧居住者准其遣回其不願者仍留巴里坤若係大臣官員即行奏聞明正典刑以彰國憲丁未定北將軍班第等疏奏擒獲達瓦齊家屬班第等奏言達瓦齊携帶殘兵蒼黃竄去經兩路官兵追躡隨據官兵將達瓦齊所携二千餘衆內有流離散失者一路盡行收服餘隨達瓦齊逃奔偷息者僅止百餘人不敢復歸游牧繞道由奎魯克嶺向布魯特地方竄走臣青滚雜卜訥默庫扎拉豐阿鄂容安等即赴達瓦齊游牧處將達瓦齊之叔及妻子家口並喇嘛六千餘人及附近部屬人衆盡行收服達瓦齊雖一時茍延殘喘而追躡之參贊大臣阿蘭泰王班珠爾䇿凌烏巴什等悉力尾追勢難漏網况布魯特與達瓦齊素有仇隙即欲往投亦斷不肯為之容隱臣等即遣使明切曉諭自當即日就擒臣班第阿睦爾撒納薩喇爾現已會集一處一切應行籌辦之事謹遵諭㫖體察厄魯特情形次第辦理奏入上諭軍機大臣曰班第等奏達瓦齊遺棄妻子身帶百餘人逃往布魯特地方阿蘭泰等領兵尾追不日自當俘獲達瓦齊篡逆暴亂斷不可任其兔脫倘或逃入布魯特境內班第等即選派幹練人員遣往彼處明白開示務令將達瓦齊擒獻但止為索取達瓦齊無庸帶兵前往不過遣一妥員經理足矣阿睦爾撒納薩喇爾既深知彼處情形著與班第悉心斟酌籌辦務期必就擒獲現在準噶爾全部俱已底定惟餘達瓦齊一人未獲所有應行前來入覲人員即當派定著阿睦爾撒納等將派定人數及何日起程何日可到之處速行奏聞其此次收取達瓦齊家屬奮勉行走官兵著將軍班第等查明奏聞分别議叙賞賚命授定邊右副將軍薩喇爾子玉魯斯為三等侍衛上諭軍機大臣曰侍衛濟福回京奏稱薩喇爾聞知伊子信息惟以追擒達瓦齊為事並未遣人往尋等語薩喇爾出力奮勉不以私事廢公實能明曉大義朕心深為嘉豫此時伊子諒已回至游牧著加恩授為三等侍衛此朕因薩喇爾實心效力特加優眷將此傳諭薩喇爾知之己酉上諭大學士曰平定準噶爾捷聞以數十年逋寇迅就廓清荒服敉寧中外䝉福乃我國家無疆之庥緬維皇祖聖祖仁皇帝削平三孽於康熙二十三年陬吉東巡親祭闕里武功文德彪炳簡冊朕仰承先烈集此大勛保泰持盈彌深兢業親告成功於太廟郊社嶽瀆諸祀次第遣官敬謹舉行以昭茂典維先師孔子闕里理應恪循成憲躬詣行禮用申誠敬且自瞻謁林泉已逾六載仰止之念時切於懷擬於明歲春月敬奉皇太后安輿自京啓鑾恭詣曲阜翠華所經亦以體察吏治清問閭閻行慶施惠稱朕法祖尊師至意所有應行豫備事宜該部詳議以聞命查核和通呼爾哈淖爾出征議叙世職人員上諭大學士曰國家賞功酬庸豫以録叙所以激勵戒行典至重也準噶爾一事從前我皇祖皇考屢申撻伐而彼部落藩籬完固未得機會是以暫議撤兵邇年來喇嘛達爾扎達瓦齊等互相爭殺內亂頻仍其台吉䇿凌䇿凌烏巴什阿睦爾撒納等欵塞內附先後踵至朕為天下共主兼覆並幬自當為之經理游牧以計長久而又適當達瓦齊衆叛親離勢同瓦解此正機有可乘之時因議及兩路進兵而人心狃於久安挾畏難之見者多而具奮迅之衷者百無一二今賴上天默佑克集大勳計軍需所費較之從前才及十之一二耳以機會所迫一舉可成之功猶多茍安懦怯徘徊觀望倘更有艱巨過於此者尚安冀其勇往從事乎滿洲舊俗一聞用兵無不人人踴躍以不與為恥不意承平日久漸成畏葸之習至於如此是以朕於此大功克就逺夷歸化之時不為之喜而為之寒心䇿楞舒赫德之畏蕙既已屢降明㫖矣此次進勦命班第為北路將軍永常為西路將軍在班第領兵前進亦不過遵朕所授機宜黽勉無誤已邀爵賞然此爵賞非䇿楞舒赫德之所應得者乎使永常但效班第豈不同膺寵錫之榮乎乃伊自受事以來强欲自用又以不能預前進之例更沾沾以接濟兵糧為必不可緩之事以見己之長且曰自二月十二日裹兩月之糧今已將盡矣獨不思按月齎糧原祗就大概通融計算若一一計口授食則人之食量不齊有日食一盂者亦有增至數倍者以食多者一月之用即可為食少者數月之儲乃欲比量而差等之有是理乎且因糧於敵亦從來軍行勝算永常又何獨明於彼而暗於此也今大兵已集成功迅速何常有軍糧不足之事設如伊所奏辦理將輾轉挽運動逾數旬豈遂能接濟大兵之遄行耶况用兵於萬里之外斷難斤斤以餽運為事永常所見仍兵行糧隨漢人論兵故套而實昧於機宜不但此也此次功成實賴上天篤佑新附之人深感朕恩是以迅速集事耳若稍有相持情形而永常糧絶之言中於人心其害尚可問乎在永常罪且難逭何得尚與有功者一體録叙耶至於昔年和通呼爾哈淖爾進兵時岱豪等既不能殱賊立功又不能奮身拒敵束手受困徒以自盡了事夫果有捐軀之志何不死於矢石之間蹈此婦人女子之為乎對敵之際而領兵之人相率自盡豈不先折士氣似此怯懦無能之人損威失重即自行引决猶當將伊子孫議罰尚何功之可録乎且併有乘他人之勝轍將已繫頸之賊射死以示威者以今觀之豈不大可笑耶即阿岱等亦曾失誤軍機僅以身厯行間幸邀議叙此等世職勸懲攸關朕久欲查辦因西隅之事未竟隱忍未經降㫖現在大功既奏荒服敉寧有功諸臣俱已特加懋賞其前此冒濫邀功者亦不可不加釐剔以昭平允所有和通呼爾哈淖爾等處用兵所得世職人員著交軍機大臣及該部詳悉查明如有冒濫應行裁革者奏明請㫖用副核實奬厲之道庚戌詔諭準噶爾全部台吉宰桑等奉天承運皇帝詔曰爾準噶爾自台吉噶爾丹䇿凌時恭順天朝尊崇黃教部屬人衆俱得安生朕是以施恩准其遣使往來歲通貿易嗣䇿妄多爾濟那木扎爾繼立互相戕殺內亂頻仍達瓦齊更加暴虐所有準噶爾全部人衆俱受荼毒朕為天下共主念噶爾丹䇿凌之舊不忍坐視汝衆生於塗炭而各部落台吉等相繼欵關來降扶擕户口數萬朕憫其窮蹙為之經理游牧以計久長是以特派將軍大臣等恭行天討命兩路大兵進勦驅除殘暴安輯生靈爾衆台吉等去逆效順感戴朕恩輸誠納欵朕心深為嘉豫今準噶爾全部底定仍將爾四衛喇特台吉等施恩封為汗貝勒貝子公爵令各管轄屬人安居樂業爾台吉宰桑等俱宜仰體朕一視同仁之意約束所屬人等安靜謀生勿因睚眦小嫌互相搆釁亦毋得將所屬人殘虐衆屬人等亦並遵守條教畜牧耕種各勤職業以共享太平之福爾等僻處遐荒朕自當示以懷柔之道如喀爾喀內扎薩克一體辦理自不以內地法度相繩再爾準噶爾人等向知尊崇佛法朕特為廣布黃教在伊犁設立庫倫宣誦經典俾羣生咸知敬奉爾等其善體朕心皈依佛法永逺遵守爾等自受達瓦齊凌虐衆不聊生今朕如此加恩爾四衛喇特俱為天朝臣僕實屬厚幸務宜洗滌舊習永受朕恩再哈薩克人等向與爾準噶爾有隙彼此時相搶掠朕已降㫖哈薩克令其毋得仍前侵越釐定邊界勿相擾害爾等亦宜恪遵此㫖不得將哈薩克人衆肆行搶掠爾等其善體之副都統納穆扎爾疏奏辦理輝特和碩特都爾伯特各部落游牧事宜納穆扎爾奏言臣同喀爾喀王得親扎卜帶領阿睦爾撒納班珠爾等游牧人衆於四月十七日自塔米爾起程至五月二十二日陸續抵古爾班舒魯克等處喀爾喀公齊旺亦帶領都爾伯特納默庫等十旗游牧人衆於五月十二日抵鄂爾海西喇烏蘇等處臣等將游牧地方俱照阿睦爾撒納訥默庫等奏請所有輝特和碩特十三旗人令在古爾班舒魯克等處游牧都爾伯特十旗人令在鄂爾海西喇烏蘇等處游收俱各指界限令其居住仍安放卡倫以資防範奏入報聞癸丑上諭大學士曰此次大兵進勦所有從前雍正年間自青海畔逃之羅卜藏丹津及上年潛逃之都爾伯特台吉巴朗孟克特穆爾等俱已就擒即日押解來京所有獻俘典禮著該部察例具奏擇吉舉行命賞策楞都統職銜同副都統三格駐巴里坤辦事上諭軍機大臣曰巴里坤管轄兵丁辦理事務不可無大員專任䇿楞既知前愆此次在哨探兵隊內行走尚屬奮勉著施恩賞給都統職銜同副都統三格駐劄巴里坤辦理事務命授投誠宰桑圖布慎等為散秩大臣上諭軍機大臣曰薩喇爾等奏宰桑圖布慎鄂勒雖等率衆來降圗布慎鄂勒錐俱著加恩授為散秩大臣賞給翎帽衣服其帶領一千五百餘户來降之回人伯克錫里卜帕三著賞給貂帽一頂數珠一盤其餘來降人等著傳諭班第等有應行賞賚者查明具奏如應派令前來入覲俟至熱河時另行加恩並將此先諭伊等知之命升授藍翎侍衛塔竒圖等上諭軍機大臣曰薩喇爾奏前遣往曉諭達瓦齊之藍翎侍衛塔竒圖等已回軍營塔竒圖等行走甚屬奮勉塔竒圖著授為三等侍衛前鋒䇿凌授為藍翎侍衛佐領孟克賞給藍翎其巴朗拜伯勒克被達瓦齊戕害深堪憫惻著薩喇爾等查明伊等有無子嗣併其族人歸入察哈爾旗內居住乙卯命郡王青滾雜卜貝勒䇿布登扎布管理新降烏梁海事務上諭軍機大臣曰新降烏梁海等現已編次旗分佐領補放總管翼領等員足資管轄但係新降之人必須大員統理和托輝特郡王青滚雜卜稔知烏梁海情形即著管理烏梁海人衆貝勒䇿布登扎布此次在軍前行走奮勉並著一同管理現在青滚雜卜辦理烏梁海布珠庫等事務如未起程即令䇿布登扎布同往查辦若青滚雜卜業已起程策布登扎布自軍前回至伊游牧後班第等即速飭知令伊前往會同青滚雜卜商酌辦理丁巳命定北將軍班第等酌議查辦副將軍阿睦爾撒納等前經被虜人口事宜上諭軍機大臣曰永常奏副將軍阿睦爾撒納因查取伊去年被虜之人遣驍騎校賽孟阿宰桑和通向各處尋查伊等上年所失牲畜等項僅將阿睦爾撒納兄之女媳給令帶往其餘並未給還永常所奏甚是此等人口皆係阿睦爾撒納來降時中途被虜若準噶爾未經平定進兵時自尋伊等台吉前來或以軍威收服理應清查辦理今各處台吉宰桑等俱冀受朕恩輸誠歸順但向伊等索取被虜之人尚屬可行掠及牲畜豈朕撫綏衆人之意現今準噶爾全部底定一切人衆俱係朕之臣僕豈可使一人從中滋擾且被虜者亦不止阿睦爾撒納所屬之人䇿凌䇿凌烏巴什訥默庫班珠爾之人諒亦皆有俟大功告成此項被虜人等班第等逐一查明歸併各部管轄此次必因阿睦爾撒納尋取伊兄女媳所遣之賽孟阿和通等辦理不善以致滋擾新降人衆必非出自阿睦爾撒納之意著將永常所奏交班第阿睦爾撒納薩喇爾等閲看此等業經被虜人等俟諸務告竣查明應作何辦理之處議奏請㫖平定準噶爾方略正編卷十三
