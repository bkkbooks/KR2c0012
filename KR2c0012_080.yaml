body:
  text: 乾隆二十一年春三月庚辰命陜甘兩省滿洲各營借墊銀兩分年扣還上諭大學士曰陜甘兩省辦理軍需以來所有駐防滿營辦解馬匹及裹帶料草等項頗多借墊例應於餉銀內扣還但念陜甘上年收成歉薄糧價未免稍昻各兵應領糧餉若一時抵扣生計必多拮据伊等趨事急公宜加優恤著西安寧夏涼莊各將軍將該營借墊數目核實奏聞准其暫借司庫銀兩先行彌補分作三年扣還歸欵以紓兵力諭陜甘總督黃廷桂辦理瓜州回民事宜上諭軍機大臣曰據黃廷桂奏吐魯番地方並無䝉古居住瓜州回民各願遷回並稱向與準噶爾交納方物即作每年貢賦等語瓜州回民遷回吐魯番一事前已降㫖俟策楞兆惠於軍務凱旋之便先將吐魯番地方情形㑹同查勘定議辦理今雖據額敏和卓繪圖呈覽著傳諭黃廷桂仍遵前㫖曉諭回民今年仍令暫住瓜州俟策楞等查勘後再為辦理至伊等進貢方物若原係噶爾丹策零之人今伊犂既定自應充作貢賦如係噶爾藏多爾濟及巴雅爾等所屬此番遷回故土應仍歸伊等管轄方為允協統俟查勘後妥辦命授侍衛丹津為散秩大臣赴察哈爾游牧上諭軍機大臣曰侍衛丹津此次辦理訥默庫之事甚屬出力著加恩授為散秩大臣賞銀一百兩歸於察哈爾正藍旗安置仍交該總管照從前安置厄魯特之例賞給産業牲隻其牲隻未滋生之前並賞給口糧一年至丹津所屬户口及歸併居住之兄弟等並著阿蘭泰等查出同此次賞給訥默庫之二十户人等一并送至察哈爾安插壬午諭定邊左副將軍哈達哈等辦理烏梁海事宜上諭軍機大臣曰據哈達哈等奏詢問德善遣往哈薩克中途為烏梁海等阻止退回各情節伊言語支吾不能指出實情等語從前德善聞烏梁海等謠言不察虛實即行退回朕即知其怯懦無能是以將伊革職自備資斧仍隨順德訥前往哈薩克效力贖罪今觀此奏則烏梁海等原不敢遽萌阻止之念特因德善退縮不前伊等始得逞其無稽之談德善即甘受其欺紿遽行退回如果烏梁海等敢於阻止何以遵檄即辦給馬匹口糧且德善果奮勉前往即伊等有意阻止亦斷不為所惑也前已令青衮雜卜策布登扎布等領兵前往辦理烏梁海等著即行諭知將起意阻止德善之人查明從重治罪其餘並著寬免此等烏梁海原屬無知不過使知所警懼足矣再宰桑固木扎卜亦係遣往哈薩克之人伊遵噶爾藏多爾濟所諭令所屬烏梁海等將應行交納一年稅賦辦給馬匹以為遣往哈薩克之用於此見噶爾藏多爾濟誠心籌辦實屬可嘉今因德善中途退回與固木扎卜無涉且現已另派侍衛順德訥前往無庸固木扎卜與之同行著即由彼處遣回游牧傳㫖奬諭噶爾藏多爾濟其所屬烏梁海等應納稅賦仍著噶爾藏多爾濟收取參贊大臣達爾黨阿疏奏遣送回人總管阿底斯等前往伊犂事宜達爾黨阿奏言前據參贊大臣兆惠等將回人總管阿底斯侍衛嶽蘇卜阿卜都喇伊木等送至軍營現在已至臣駐劄處查伊犂回人俱係阿底斯戚屬宜遣往將軍策楞處令其招降回衆是以即於二月十六日起程前往又從前侍衛第瑪帶領前來之厄魯特公塞卜騰等亦應遣赴將軍策楞處或令仍回游牧或令隨營行走今亦陸續前來一併令其前赴策楞軍營惟散秩大臣齊巴克係塔本集賽大宰桑暫留臣營辦事奏入報聞都爾伯特台吉伯勒克卒命伯勒克之子多底巴承襲都爾伯特扎薩克一等台吉癸未命授收楞額錫喇為藍翎侍衛上諭軍機大臣曰策楞等查出擒拏宰桑察衮係哈薩克錫喇之收楞額沙喇具奏請㫖錫喇拏獲賊人奮勇效力著加恩授為藍翎侍衛賞銀五十兩命授訥默庫宰桑察罕鼐濟等為三等侍衛上諭軍機大臣曰阿蘭泰等將訥默庫妻子及宰桑護衛等解送來京著交部分别辦理其宰桑察罕鼐濟巴圖濟爾噶爾等將訥默庫背叛情形據實陳奏著免其治罪加恩授為三等侍衛至訥默庫現在新娶之妻亦不必治罪著舒明查明係何部落所屬即行發還交與管轄甲申諭陜甘總督黃廷桂拏問薩喇爾定西將軍策楞奏言據侍衛巴寧阿等自伊犂回至軍營告稱上年隨將軍等駐劄伊犂八月二十三日聞賊人搶掠臺站將軍班第等由固勒扎地方向空格斯迎出賊兵追至薩喇爾即欲奔逃參贊大臣鄂容安云賊來當戰何以急走薩喇爾答以爾何所知遂策馬而行喀爾喀察哈爾等俱隨之而去將軍處止餘司員侍衛及兵丁等六十人是夜賊益蜂聚將軍等遂各自盡我與員外郎柏琨等自刎復蘇宰桑巴桑遣人將我等俱行虜住看守後又送往伊犂喇嘛處居住至十月內喇嘛宰桑等商同薩喇爾擒賊贖罪始將我等釋放給與口糧適阿睦爾撒納又將喇嘛等遷住逺處欲將我等帶住我回佛保拴住潛行逃出等語奏入上諭軍機大臣曰策楞奏稱詢據自伊犂回至軍營之侍衛巴寧阿等供稱伊犂擾亂時薩喇爾見賊兵追及率衆先奔班第等勢不能支旋即自盡等語薩喇爾與班第等同為將軍自當奮力禦賊果至勢窮力絀班第等先以身殉薩喇爾或不得已衝突而出不識死綏之義尚無足責乃竟首先奔竄以致大衆潰敗是二臣雖死於賊而薩喇爾亦不能無罪但係巴寧阿等一面之詞應將薩喇爾解京質對著傳諭黃廷桂俟薩喇爾到肅州時即行鎖拏慎選幹員速行押解來京定西將軍策楞等疏奏領兵追襲阿逆情形策楞等奏言臣等領兵至博羅布爾噶蘇地方距伊犂甚近正當㑹合兵力迅速前往今聞阿逆自洪郭爾鄂博帶兵往烏哈爾里克往擊諾爾布臣等若由博羅布爾噶蘇大路前進路雖平曠恐逆賊易於知覺潛身逃竄是以仍從山內間道行走向烏哈爾里克往襲使賊猝不及防仍一面遣人至諾爾布處及附近之台吉宰桑等處通信協拏奏入上諭軍機大臣曰據策楞奏領兵至博羅布爾噶蘇與賊人相距甚近等語此時即宜㑹同玉保等奮力擒拏使賊不至聞風逃竄方為合宜朕意伊等所聞阿逆帶兵往擊諾爾布之言俱不可信或借此為名向洪郭爾鄂博等處逃遁亦未可定此㫖到彼量策楞等自己擒獲逆賊設從别路遁出策楞等仍遵節次所降諭㫖無論逃往何地務期弋獲不得稍存退諉朕於此事亦斷不肯草率完結策楞等其慎之乙酉命侍郎兆惠傳諭達什達瓦部落人衆上諭軍機大臣曰薩喇爾現已降㫖拏問俟到京時審訊治罪著傳諭兆惠俟伊犂事竣後回至巴里坤將拏問薩喇爾之處明白曉諭達什達瓦之妻及薩喇爾之兄布林等知悉仍諭布林罪由薩喇爾一人與伊無涉母庸疑懼薩喇爾子弟等若尚未送至察哈爾地方即留於達什達瓦部落內管轄如已至中途即令解送來京並將薩喇爾在伊犂帶回之牲隻物件俱行查出奏聞請㫖再薩喇爾自伊犂帶來達什達瓦之子布庫現在巴里坤並著兆惠向達什達瓦之妻曉諭伊等從前投誠時並未言達什達瓦尚有子嗣即鄂齊爾布林等至京亦未奏及其中不無可疑伊等或聽從薩喇爾一人之言附和朦混不可不究問明白令將實情供出奏聞後再行酌量辦理丁亥定西將軍策楞等疏奏大兵前進伊犂情形策楞等奏言二月二十四日大兵至伊犂固勒扎之濟爾哈朗地方有溫都遜拉藏大喇嘛楚里木額林沁遣伊什吹木丕勒尼爾巴車凌吹木丕勒等前來迎接稟稱阿睦爾撒納數次遣人傳喚我等我等未經前去今聞大兵已至情願投誠等語臣等隨向喇嘛等宣諭聖㫖此番大兵擒拏阿逆特因阿逆擾害爾等阿逆一日不獲則羣生一日不安今阿逆雖向察罕烏蘇地方逃竄大兵立即追拏俟擒獲時必當善為籌辦使爾等永獲安生仍令喇嘛等善自約束各安生理奏入上諭軍機大臣曰策楞等領兵雖至伊犂而阿逆業已逃竄此時所有伊犂應辦事宜尚可稍緩惟當追擒逆賊為第一要務阿逆詭詐百端策楞等屢次誤聽傳言以致首惡兔脫現在策楞等皆云阿逆逃入哈薩克境內以朕思之阿逆現與額林沁同逃額林沁殺掠哈薩克積有仇隙斷無前往之理况阿逆現領兵三千餘似此大隊兵丁哈薩克必不能容留此又係阿逆詭計揚言逃往哈薩克俟我兵往追伊或轉從别路虜掠臺站或仍至博羅塔拉塔爾巴噶台等處棲身皆屬未定策楞等務須偵探確實萬勿再為所愚如果逃入哈薩克則仍遵前㫖派達爾黨阿等領兵索取務期擒獻又如阿巴噶斯哈丹等大兵至伊等游牧時伊等已逃回阿逆處同行今伊犂地方又不聞伊等蹤跡此時恐又回至伊游牧收拾殘衆或尾出大兵之後前來抵敵或向額林哈畢爾噶等處肆行騷擾此皆不可不豫為防範者從前達爾黨阿曾奏帶兵至安濟哈雅地方直抵伊犂兆惠亦奏爾前往特訥格爾察看情形再行前進今既須分路堵禦達爾黨阿不必前赴伊犂即駐劄安濟哈雅確探阿巴噶斯等蹤跡速行辦理並著策楞派出熟悉地方情形如尼瑪哈薩克錫喇等一人協同達爾黨阿籌辦兆惠至特訥格爾後亦暫止前進或與達爾黨阿㑹合一處或另至緊要處所聲援策應其北路哈達哈等亦降㫖令伊等帶兵協拏策楞等務互相通信聯絡聲勢以期弋獲至奏稱詢問阿逆處逃出之人告稱敦多克曼集德濟特等俱欲擒獻阿逆現已遣人前往等語此語必不可信敦多克曼集等與賊聯為一氣交結甚深焉肯即為擒獻其為詭計無疑而策楞等即信以為真遣人前往無怪乎其屢次被欺而不自覺也即阿逆現帶兵三千之說亦係詭言聲張伊兩次被回人擊敗烏合之衆量已無多如果兵力尚盛何以一見大兵即行逃竄竟不敢稍為抗拒此亦不能無疑者朕所指示乃揣度形勢而言若策楞等身在彼處更應確有所見且厄爾錐音哈薩克錫喇尼瑪吞圖布等俱係熟悉彼處情形之人策楞等務宜公同籌酌計出萬全但期適合機宜亦毋庸拘泥朕㫖至塔本集賽人等前已附和阿逆此時阿逆若仍至博羅塔拉塔爾巴噶台等處應將此等人先行辦理不許仍蹈前轍或遷至伊犂安插其伊犂衆喇嘛等反覆無常必須從重辦理方知警戒俟擒獲阿逆後策楞等酌量擒拏懲治命定邊左副將軍哈達哈等領兵協拏阿逆上諭軍機大臣曰策楞等分路擒拏阿逆事宜已詳悉降㫖令伊等遵照辦理其北路哈達哈等所領兵丁現在往辦烏梁海事務著傳諭哈達哈伊原係副將軍所有同往之青滚雜卜策布登扎布並著授為參贊大臣并將扎木禪察達克二人帶往俟辦理烏梁海事竣即在彼處候㫖或策楞處寄信到時阿逆如逃往博羅塔拉等處即領兵由彼處進發協同擒拏若逃入哈薩克境內亦帶兵至哈薩克邊界駐兵遣人索取務令其速行擒獻其烏梁海等阻止德善前往哈薩克之處必係聽阿逆指使務確取實情即行奏聞戊子諭駐劄巴里坤辦事大臣和起等辦理達什達瓦屬人游牧事宜上諭軍機大臣曰前命兆惠俟伊犂事竣即回至巴里坤辦理達什達瓦屬人事務今兆惠現有應辦事宜未能即回巴里坤所有達什達瓦屬人游牧從前原議於今歲遷至阿爾台地方今伊等屬人現在派出從征俟撤兵後再令遷移著和起等轉行曉諭達什達瓦之妻知悉此時伊屬人等應行賞給口糧仍行賞給命駐劄烏里雅蘇台辦事大臣阿蘭泰等領兵防守布延圖地方上諭軍機大臣曰哈達哈等現在領兵辦理烏梁海布延圖地方一應防守事宜甚屬緊要烏里雅蘇台軍營現有普慶駐劄著阿蘭泰舒明等擕印前往布延圖駐劄防守其都爾伯特游牧事務著賞給郎中巴蘭泰副都統職銜前往辦理庚寅定西將軍策楞等疏奏分派官兵擒賊事宜策楞等奏言據參贊大臣玉保咨稱二月二十六日至烏哈爾里克地方據諾爾布禀報阿睦爾撒納向和洛霍澌前行帶兵三千餘由諾爾布游牧經過察其情形似向哈薩克逃竄我兵力單弱未敢交戰專候大兵前來等語臣等詳思阿逆斷無三千兵丁之數不過烏合之衆若乘勢攻擊何難立時潰敗乃諾爾布遷延觀望明係有心退縮今玉保等已領兵連夜追逐復派烏爾登扎那噶爾布等接續前往臣哈薩克錫喇見諾爾布觀望不前即揀選精兵五十名前往督同效力臣策楞等亦統領大兵即速進發務期擒獲逆賊奏入上諭軍機大臣曰策楞等屢次奏報擒拏阿賊情形大約勉强前進總無計出萬全必期弋獲之意此次伊等分兵追逐而哈薩克錫喇聞諾爾布之信奮勇前往督同效力看來尚能成事然策楞等於哈薩克錫喇尼瑪吞圖布等數人正宜善為撫馭使之感激效命若加以督責致失衆心則於事更為無益至阿逆蹤跡雖似逃往哈薩克或仍至博羅塔拉塔爾巴噶台等處潛行騷擾其種種詭譎伎倆昨已詳悉指示策楞等務宜加意偵探勿專聽傳聞之言以致顧此失彼方為妥協現在阿逆雖經逃竄必遣人潛赴軍營探信或留於伊犂地方皆當密加察訪如拏獲此等人詢明情節即行正法再自上年進兵以來從無滋擾各部落游牧之處伊等自必知恩今大兵駐劄日久牲隻口糧俱資接濟若將帶往茶葉銀兩向各部落等互相交易自必樂從如有遵諭即行換易及沿途協助馬匹口糧者一一登記俟事竣後酌量加恩倘稍有勉强或故將疲瘦牲隻交易者其人即屬可疑應留心辦理收取其牲隻馬匹以增兵力一切與哈薩克錫喇等斟酌辦理辛卯命授烏梁海總管圖布慎為散秩大臣上諭軍機大臣曰圖布慎從前辦理烏梁海時甚屬出力且將馬匹牲隻供給大兵著加恩授為散秩大臣伊係熟悉烏梁海情形之人哈達哈等此時領兵辦理烏梁海著將圖布慎帶領前往壬辰定西將軍策楞等疏奏領兵移駐固勒扎情形策楞等奏言臣哈薩克錫喇於二月二十七日帶兵至伯勒齊爾地方㑹同諾爾布追緝逆賊行至喀喇烏蘇見額林沁據險結壘公同商議若先攻取額林沁未免兵力稍分稽遲時日反令賊渠遠遁因遣人招降額林沁明噶特舍楞阿喇木扎木巴等伊等俱已歸降正在派兵前進是夜有布庫努特一名自阿逆處逃出告稱阿睦爾撒納一面率衆擒拏敦多克曼集一面輕騎遁走等語現在臣玉保尼瑪扎那噶爾布烏爾登及衆台吉宰桑等選精兵一千名迅速追逐前往並據玉保等咨稱現在阿逆勢力已窮即日就擒所有大隊兵丁毋庸續發等語臣等詳思阿逆雖已逃竄玉保瑪尼及衆台吉等輕騎掩襲斷不致於漏網今伊犂已定其應收集流亡撫慰各喇嘛以及安插失業貧人等事俱須經理臣等即將大兵移至固勒扎居住奏入上諭軍機大臣曰策楞等奏稱玉保等現在將次追及阿逆伊即領兵回至固勒扎等語策楞等錯謬已極阿逆即已力窮毋庸大兵深入伊等應分隊往追何必急急回至固勒扎此實朕所不解且摺內並未將玉保等相距阿逆遠近之處及阿逆究向何處逃遁一一聲明而僅以收服一額林沁為足了事是全不識事之輕重且伊等從前誤信福昭等拏獲阿逆之言即將巴里坤解送馬駝檄行停止以致軍行遲緩今又將布庫努特一小人所告之言信以為實焉知又非阿逆從中肆其詭詐緩我大兵之計策楞等一誤再誤必致阿逆逺揚伊等束手無措而已其回至固勒扎若云撫定伊犂則伊犂自昨歲已經平定所有無業窮民亦伊等附和賊人自取窮困何必急於料理且厄爾錐音現在即至彼處儘可交與辦理豈必待䇿楞親同籌畫如因兵丁馬力平常則現在既無庸大兵深入即揀選馬匹酌帶二三百名前往未始不可策楞即欲撤回亦應派扎拉豐阿在彼策應伊等領兵前往所為何事今阿逆尚未就擒即已撤兵又安用此將軍參贊為耶看今日情形則阿逆必已竄入哈薩克境內策楞等務遵朕節次所降諭㫖派達爾黨阿玉保尼瑪等迅速前往哈薩克邊境索取毋得少生退諉並曉諭伊犂台吉宰桑等伊等受阿逆暴虐今雖脫逃仍不得安然無事大兵一撤伊必前來滋擾責令伊等協助大兵窮追極捕以絶根株方為一勞永逸之計其北路哈達哈等協力擒拏之處昨已詳悉傳諭此時阿逆若逃入哈薩克中途或搶掠新收之烏梁海等或煽誘鄂木布等將察達克等游牧騷擾均未可定哈達哈務於逆賊未到之先即將烏梁海鄂木布等悉行擒治以杜後患事竣即遵㫖帶兵往哈薩克地方索取阿逆再從前遣德善往諭哈薩克中途退回實屬怯懦若此時阿逆果逃入哈薩克地方著哈達哈即將德善在軍營正法以為畏葸僨事者戒臣等謹案阿逆甫經鼠竄意料大兵未及即行進𠞰本無隄備且其時衆心瓦解羽翼方殘勢力不能自振將軍等果能及時掩襲何異釡魚幕燕乃屢為傳言所惑以致逆孽稽誅苟延殘息然當軍書初達皇上神明洞照屢蒙訓㫖切責一一預操符劵第事㑹所乘間不容髮軍郵雖速不能不需旬日之期此在事諸臣不克禀承之咎固已百喙難辭及伏讀訓諭中外明㫖迭頒猶以失之意外與失之意中為諸臣諄切剖示是不獨足以折服諸臣之心尤可見聖主料敵如神司行陳者設皆節節赴窽其勢有不捷如摧枯拉朽者哉甲午諭定西將軍策楞等防範阿逆事宜上諭軍機大臣曰從前阿逆宰桑阿睦爾濟爾噶爾告稱阿逆與伯什阿噶什交結甚深今伯什阿噶什雖有與諾爾布同來之語尚未知在何處阿逆或約同前往哈薩克亦未可定策楞等應詳加探訪如阿逆前往伯什阿噶什處即遣人曉以利害令其擒獻奏聞加恩倘有隱匿縱放之事即將伯什阿噶什擒拏治罪再阿逆至哈薩克後必煽誘哈薩克人等騷擾各游牧地方現在塔本集賽宰桑達什策凌噶勒雜特宰桑都噶爾等投往北路已降㫖令伊等於阿爾台附近地方安置其哈薩克接壤之集賽及鄂拓克等俱應豫為防範或遷至伊犂安插方為妥協策楞等即遵㫖辦理丙申定西將軍策楞等疏奏阿逆窮竄情形策楞等奏言據藍翎達永阿自阿逆處脫出告稱阿睦爾撒納搶掠喇嘛不敢與大兵抗拒此時非逃往哈薩克即奔竄布魯特而賊衆觀望又俱不願往哈薩克無不深恨切齒衆心離散等語復據扎薩克鄂諾錫帶同自阿逆處逃出之鄂勒錐圖前來告稱被阿睦爾撒納搶虜游牧之後隨伊等至和洛霍澌地方正值哨探大兵與諾爾布等㑹合占據津梁阿睦爾撒納不能渡河僅依沙岡自守大兵即於二十八日追及並從前所調卓托魯克巴爾達穆特霍勒博斯多果魯特等四鄂拓克兵五六百名亦與大兵㑹齊額林沁舍楞等台吉大兵一到即行投誠即察罕圖克人等亦聞其私相計議因伊妻子皆在內地斷不肯逃向哈薩克等語又據厄爾錐音處寄信之庫克並藍翎侍衛愛斯泰及都爾格齊哈什哈等前來告稱內大臣厄爾錐音途次聞福昭所報之信未確急赴烏魯特克勒特聚集兵丁將察哈什誘擒解送京師厄爾錐音現帶兵四千名前進其所帶之兵已抵濟爾哈朗地方等語奏入得㫖下部知之丁酉訓飭定西將軍策楞等上諭軍機大臣曰覽策楞等數次摺奏不過詳言伊犂厄魯特等流離困厄情形至如何擒縛阿逆之處反不置一詞伊等之意若以伊犂既得則追捕阿逆之事不甚緊要不知此見甚屬錯謬伊犂乃一空曠之地並無城垣駐兵與否無甚關係即為窮乏之人料理生計不過於擒獲阿逆後或將伊等移近內地過一二年令其耕種自給或於瀕河近山之處令其捕魚打牲為業俱屬可行今策楞等雖將伊等困厄情形陳奏其如何酌量措辦之處總未籌及是何意見且伊等所以窮困若此者非我使之均由誤聽阿逆之言互相劫掠自貽伊戚策楞即應將此緣由曉諭伊等鼓勵衆心尅期擒賊俟阿逆擒獲時再為籌辦生計未始不可著再傳諭策楞等其如何設法追捕壯我軍威不致漏網之處俱遵節次諭㫖悉心籌畫務合機宜以期迅速竣事夏四月戊戌朔諭定西將軍策楞等領兵前往哈薩克事宜上諭軍機大臣曰覽策楞等所奏阿逆果已逃竄朕早料伊等不能擒獲必致遷延逃避伊等尚何顔更為陳奏聞登努勒台地方水草充足牧放甚宜著策楞等領兵赴彼處駐劄俟一月後選集兵丁遵朕前㫖交與達爾黨阿等前往哈薩克辦理如先遣人往諭則非僅委派一偏禆可辦即著玉保同恩克博羅特選索倫兵五六十名先行傳諭仍派兵一二千名隨後繼進玉保係專任追捕阿逆之人乃並不親行僅令烏爾登等前往以致逆賊兔脫此次前赴哈薩克若仍不知奮勉斷不姑貸命陜甘總督黃廷桂赴巴里坤辦理事務上諭軍機大臣曰策楞等不能速行擒獲阿逆輒領兵回至伊犂奏請籌辦伊犂窮困人等此時糧餉牲隻未經運赴因降㫖令此等貧民自赴巴里坤領給將來陸續踵至人數衆多所有牛羊耔種茶麵等項俱須多方購備其料理彈壓關係頗重非和起豆斌等所能籌畫著傳諭黃廷桂一面將糧石速行撥運一面前赴巴里坤經理其厄魯特等前來就領者酌量給與口糧三四月或給與籽種即令回本處耕種並將伊等因受阿逆荼毒是以格外加恩之處明白宣示倘稍有滋事即將為首不法之人嚴加懲治其或恃衆不法即相機𠞰滅便宜行事黃廷桂酌量情形妥協辦理再前經降㫖令該督拏解薩喇爾若在巴里坤拏解現在達什達瓦部落人衆駐劄彼處不免驚疑且慮薩喇爾或畏罪脫逃著前赴嘉峪關一帶迎侯薩喇爾俟其到日即行拏解事竣再赴巴里坤籌辦一切事宜定西將軍策楞等疏奏解送賊黨額林沁來京策楞等奏言據散秩大臣吞圖布解賊黨額林沁至軍營臣等公同訊問據稱我為阿睦爾撒納挾制同行不得已勉强服從後接到將軍等諭令擒賊贖罪之文因力弱不能擒獻今大兵已到情願歸誠等語查額林沁自去年由哈薩克前來即䝉恩優加體恤乃並未至軍營中途即同阿逆背叛今力窮被執飾詞乞降且伊孫策伯克扎卜現已逃避應將額林沁解赴京師治罪仍派兵擒拏策伯克扎卜奏入報聞己亥訓諭定西將軍策楞等上諭大學士曰策楞等誤報阿睦爾撒納就擒一事不加詳審遽爾飛章入告固可駭異然此實由克勒特宰桑誤聽巴顔得木齊之子俄羅斯所傳輾轉馳報一如得之目覩遂孟浪騰布其咎尚屬可原及既知所報屬虛而大兵將抵伊犂與叛賊相距甚近若彼時疾馳倍進振作軍聲亦何難掩獲乃策楞扎拉豐阿並不身先督率而以追捕專委之玉保令其前驅玉保又僅令烏爾登尼瑪追至庫隴癸嶺獲一額林沁而返遂若足以塞責阿逆轉得飄然遠揚竄入哈薩克界內在叛賊詭計多端而諸臣一無調度朕早料其必致奔軼屢經降㫖訓責而道遠往返亦已無及天下事原難豫定使諸臣果竭盡智勇而或致失之意外則亦無可如何即當驚竄已逺而窮力以追則亦自盡人事乃漫不經心彼此玩誤是叛賊之遁迹遠引實意中之事而非意外之事矣若謂馬力疲乏則叛賊之馬何獨不疲乏耶即如多果魯特之伊勒都齊和碩齊等係在我大兵之後又何以轉能尋蹤前往耶更可異者玉保兵過伊犂不遠並不見賊僅據逃兵之言謂賊已窮蹙即馳札策楞達爾黨阿等以為叛賊困窮無煩大軍深入而策楞等亦遂不權輕重遽爾返斾以安輯伊犂為詞不知伊犂乃久經撫定之地有何可辦况經阿逆蹂躪之後所存者饑羸殘弱將軍一至不過環向乞食而已國家撫御中外固不惜加恩惠養然此等蠢夷賊至即從賊去來歸逈非內地赤子可比乃不以擒賊為事而沾沾為殘衆謀其室家豈不謬耶策楞前經獲罪至一聞阿逆逃竄稍知奮勉即速前進朕加恩授為將軍重任伊當竭力圖報乃不審機宜緩急措置失當若此總之用兵準噶爾原非朕本意蓋以無集事之人也然其始也策凌策凌烏巴什等欵關內附不得不為之經理游牧以為久長計而兩朝未竟之緒機有可乘於事勢又有不容坐失者初非窮兵黷武啓邊釁而勤逺略也逮大軍所至未折一矢諸部爭迎伊犂悉定此可見上蒼之默佑有不期然而然者至於阿逆負恩竄匿忍心怙亂人所切齒然不過一逃囚耳與此事大局全無關礙譬如獵場中走一狼脫一兔但以衆人分路捕搜竟至竄逸豈不可笑可恨哈薩克前經通使及奉朕敕諭情甚歡欣恭順阿逆即求托跡其反覆詭詐伎倆人所共知豈肯容納是尚不能及從前羅卜藏丹津之投準噶爾現已傳諭哈薩克令其協力擒獻自可計日授首惟在事諸臣之辦理未善節節錯誤則殊出情理之外朕於用兵之初所以遲回未决者原慮諸臣非任事才乃今天心垂相如此而諸臣行事不惟不能仰承竟往往相左果不出朕所慮甚為愧悶所有策楞扎拉豐阿玉保本身之罪俟叛賊就擒後再酌量分别另降諭㫖將此通行宣諭中外知之又諭曰阿逆乘間逃竄皆由策楞等偃然自廢坐失機宜即以擒獲額林沁一事而言伊等既已誘致額林沁伊所屬人內曾有肆為妄言者即當擒拏辦理取其牲隻以壯我兵力乘機即速往追乃輾轉遲疑貽誤時日坐視阿逆漏網其本意原不急急以追擒阿逆為事也朕已降㫖明白指示策楞接到此㫖可即遣玉保恩克博羅特先行隨令達爾黨阿領兵繼進策楞等亦隨達爾黨阿之後帶兵聲援倘仍復如前中止伊等之罪亦可自知無庸朕多降諭㫖再玉保曾行文策楞停其前往似伊一人即可任擒賊之事惟恐策楞與之分功何以竟致奔竄著傳諭詰問玉保再福昭策卜登等已回伊等呈報擒賊時既稱得之克勒特宰桑亦宜究問俄羅斯等因何妄報及係何人指使之處一一具奏命參贊大臣兆惠來京上諭軍機大臣曰前命兆惠赴巴里坤辦事後仍㑹同策楞領兵前進今擒拏阿逆一事已令玉保達爾黨阿等帶兵向哈薩克索取現在伊犂無事策楞所辦事宜全無成竹兆惠至巴里坤辦竣事務即速來京將伊犂及軍營情形詳細奏聞候朕面授方略再往軍營庚子諭陜甘總督黃廷桂安西駐兵事宜上諭軍機大臣曰黃廷桂奏安西添設滿兵因餉項不敷不能遽照原議五千之數請先發三千名前往等語前因分駐邊防滿洲兵丁較為有益是以令黃廷桂酌量裁汰各營冗兵於安西地方安設滿營今既稱各項裁汰節省餉銀尚在不敷正不必拘五千之數即酌撥三千名未始不可此時著先撥二千名前往俟一二年後再行辦理命安插達什達瓦部衆於阿爾台地方上諭軍機大臣曰達什達瓦之妻現已病故著公明瑞馳驛前往率同侍讀學士富森土默特台吉喇嘛扎卜等奠醊茶酒並加恩賞銀二百兩經理喪事其所屬人衆著編為三旗移住阿爾台地方交與舒明阿蘭泰等善為經理散秩大臣鄂齊爾布林托里俱著授為總管其宰桑鼐瑪克察罕庫本們都巴雅爾博羅呼爾哈阿爾該默濟格等俱著授為副總管其應補授參領佐領及編設旗分事宜一并妥協辦理具奏請㫖所有達什達瓦之弟伯格里屬人亦著鄂齊爾等管轄達什達瓦之妻止有一女著給與郡王青滚雜卜為妻並賞銀三百兩辛丑申諭定西將軍策楞等上諭軍機大臣曰覽策楞今日所奏並未將如何擒賊及遣人前往哈薩克之處籌及其意以為既至伊犂大事已畢不知伊犂地方久經平定伊等到彼與否原無關係惟當設法擒拏逆賊為要務况阿逆原意料大兵不能驟至初無防備及逃竄之意使策楞當時即行奮力直前則逆賊自必就縛何能奔逸其奈伊等之遷延不前何且伊等從前摺內尚有遣人前赴哈薩克之說今乃並無一言惟將逃人所訴阿逆逸出時帶往哈薩克阿布賚之弟嶽勒博羅斯并留於準噶爾之俄羅斯使人頗羅和爾一同前去之語敷衍具奏其意若謂阿逆既將哈薩克及俄羅斯之人帶去其勢若不見容於哈薩克必將投赴俄羅斯索取既難便可中止不知逆賊所之不論何地必當前往擒捕斷無中止之理而策楞等輒有難色是誠何心著傳諭策楞等仍遵昨日所降諭㫖辦理一面將遣赴哈薩克之人及玉保等何日起程之處速行奏聞命定西將軍策楞安插新降台吉宰桑等上諭軍機大臣曰現在軍營內新來投誠之台吉宰桑等甚多此等人須細加體察如厄爾錐音哈薩克錫喇等受恩甚深自無異志至大兵將抵伊犂始行來歸之索薩賚等原係阿逆黨羽因勢窮乞降尚屬可疑伊等身在軍營首鼠兩端潛通消息俱未可定著傳諭策楞領兵至哈薩克時不必將伊等帶往即移至額林哈畢爾噶及附近巴里坤一帶安插方為妥協伊等受阿逆騷擾生計艱窘設法遷移俾不至於窮困並將此曉諭厄爾錐音等自必益加奮勉易於集事定西將軍策楞等疏奏拏獲賊黨克什木等策楞等奏言賊黨克什木洪郭什俄羅斯等因阿睦爾撒納搶掠喇嘛各自逃散臣等派哈薩克錫喇前往俱行緝獲現在派員解送京師奏入報聞命封內大臣厄爾錐音哈薩克錫喇公爵上諭軍機大臣曰此次追拏阿逆內大臣厄爾錐音哈薩克錫喇俱屬奮勉現在逆酋未獲本非論功之時但伊等係新降之人應加恩以示鼓勵厄爾錐音由朱爾都斯進兵向各鄂拓克集兵四千餘名奮勇協力哈薩克錫喇曾擒察衮父子今復將賊黨克什木等擒獲俱能感激朕恩實心效力甚可嘉豫厄爾錐音哈薩克錫喇俱著加恩封授公爵至吞圖布管解賊黨明噶特舍楞等至軍營時中途遇見伊母相聚賊人乘間脫逃吞圖布係特授為圖什墨勒辦事之人乃至疏縱賊黨本應治罪第因母子相見偶爾踈忽致令賊人奔竄尚非出於有心著從寬免其治罪前已令玉保帶同恩克博羅特前往哈薩克吞圖布亦著同往以贖前愆命賞給員外郎唐喀祿副都統職銜赴北路軍營辦事上諭軍機大臣曰北路哈達哈軍營內辦事乏人員外郎唐喀祿尚諳䝉古事務著賞給副都統職銜授為領隊大臣隨同哈達哈辦事壬寅命噶爾藏多爾濟等各歸游牧上諭軍機大臣曰策楞等前經調取噶爾藏多爾濟前赴伊犂今逆賊已竄伊犂無庸前往噶爾藏多爾濟等游牧俱有應辦事宜且令伊等得以休息即各處台吉宰桑等邇來俱宣力行走其各鄂拓克人等應照舊管轄及時耕種以資生計俱著回至各游牧毋庸隨將軍等前進俟有用伊等兵力之處再行調取至二十一鄂拓克已授圖什墨勒管轄即著厄爾錐音等善為安撫毋使失所亦不得滋生事端方為妥協此次台吉諾爾布尚屬出力伯什阿噶什亦並未從逆應加恩封賞策楞等即㑹同厄爾錐音等將應如何加恩之處奏聞請㫖至阿玉錫擒拏克什木甚屬奮勉伊為賊人戕害著擇其子弟一人補授收楞額並加恩賞給藍翎永遠食俸命賞索倫察哈爾喀爾喀官兵上諭軍機大臣曰此次索倫察哈爾喀爾喀官兵甚屬奮勇著查明分别等第加恩賞賚一等官員著賞俸半年兵丁著賞錢糧兩月二等官員著賞俸三個月兵丁著賞錢糧一月其厄魯特人等雖不如索倫察哈爾等出力亦著查其著有勞積者每人各賞銀三兩至坐臺之察哈爾厄魯特喀爾喀等俱著賞錢糧一月以示奬勵訓飭參贊大臣玉保等上諭軍機大臣曰據玉保等奏稱多果魯特之伊勒都齊等俱隨阿逆潛逃又扎薩克薩喇爾至厄爾錐音處搶奪物件經扎那噶爾布拏獲等語薩喇爾原係阿逆黨羽今又肆行搶掠久之必且從賊著即行正法諾海竒齊克係與薩喇爾同來投誠之人亦應留心防範扎那噶爾布殊屬可嘉即著將薩喇爾户口牲隻賞給至伊勒都齊等挈其游牧尚能追及阿逆與之同逃則可知前此玉保等追緝不力之罪百喙難辭伊等尚欲諉卸於厄魯特等殊屬無恥不知尼瑪亦不過因其熟識道路令其前往至擒拏逆賊豈可專委於一二新降之人望其奮勉出力乎朕於此事實不勝憤悶此次若仍前退怯必將玉保等從重治罪甲辰諭陜甘總督黃廷桂解運軍營馬匹及赴巴里坤查辦事宜上諭軍機大臣曰黃廷桂奏准軍營咨文停解馬匹一摺此事皆由策楞辦理乖謬現在擒拏阿逆全資馬力且時值夏令草已茂長正可就近牧放以資調遣著傳諭黃廷桂即將應解馬匹仍行解送一面知㑹達爾黨阿等無為浮言所惑至厄魯特窮人甚多前已有㫖令赴巴里坤自運口糧此等人不能保無偷竊攘奪之事黃廷桂即遵前㫖親往鎮撫量為賞給令其回巢耕種倘有滋事之徒即行懲治其現在肅州應辦事務著吳達善辦理丙午申諭定西將軍策楞辦理事宜上諭軍機大臣曰策楞等奏稱據哈薩克錫喇告稱伊犂地方窮困不能取辦兵丁口糧請移駐空吉斯地方等語伊犂地本荒僻原非駐兵要地且經阿逆騷擾之後情形更屬不堪但現在大兵在彼原為擒拏逆賊並非久駐之計策楞等既知難以駐兵即應籌畫前進速擒逆賊乃僅以一奏了事意謂如此便可作撤兵之計是伊等全不以擒賊為事一味畏難退縮深可痛恨又如遣使哈薩克一事哈薩克錫喇尼瑪等俱不令遣宰桑前往僅請派一二得木齊收楞額等看來伊等俱不免有推諉之意前降㫖令玉保帶領恩克博羅特吞圖布等傳諭索取伊等倘不能奮往從事不必令其先行著達爾黨阿領兵前往玉保帶領伊等隨後繼進務期擒獻毋負委任至厄爾錐音由朱爾都斯進兵拏獲察哈什掠其户口牲隻察哈什係附從阿逆之人應行辦理著即將所獲户口牲隻賞給厄爾錐音至其收取諾爾布敦多克屬人一事殊屬非是諾爾布敦多克係同薩喇爾前至吐魯番誠之人何以將伊屬人收取且厄爾錐音現辦圖什墨勒事務諸事俱應秉公始可服衆著策楞傳諭厄爾錐音令將此項人等即行給還伊果實心效力將來自當從重施恩命加恩輝特部落人衆上諭軍機大臣曰據納穆扎爾奏稱輝特部落人數甚衆現在生計稍艱等語輝特人等俱能安分謀生皆策卜登多爾濟普爾普等善於管轄所致第因人數過多生計不能充裕著加恩賞給口糧三個月以示體恤再據策卜登多爾濟等告稱伊族中台吉巴朗巴桑策林明安鄂爾準瑪木特等五人原係舊時台吉從前因與阿逆不和未經呈報今應請㫖加恩等語巴朗等原係台吉乃為阿逆朦混未報今策卜登多爾濟據實報出甚屬可嘉著即將巴朗等户口若干查明給與或應授為扎薩克及何等台吉之處納穆扎爾奏聞請㫖命左都御史何國宗㑹同統統勳考驗西域山川道里上諭軍機大臣曰何國宗奉差前往伊犂測量晷度繪畫地圖現由巴理坤一帶及額林哈畢爾噶等處辦理約需半年至冬間氷雪凝寒著仍回至巴里坤居住俟明春再往辦理並著劉統勳㑹同前往將該處山川道里詳悉考驗纂録進呈定西將軍策楞等奏請補授吞圖布為布庫努特宰桑策楞等奏言臣等前奉諭㫖查明布庫努特人等戶口多寡數目再行請㫖授吞圖布為布庫努特宰桑今查布庫努特人等共計千户已敷一鄂拓克之數應請交與吞圖布管轄即授吞圖布為布庫努特宰桑奏入報聞丁未諭侍郎舒明等稽察卡倫事宜上諭軍機大臣曰舒明阿蘭泰等駐劄布延圖應將各處卡倫嚴行稽察即如賞扎薩克圖汗之阿睦爾撒納屬人烏勒木濟潛至訥默庫游牧給與馬匹令其逃竄此必由卡倫經過何以全無覺察此際若已緝獲即著在彼處正法嗣後如有此等逃人一經拏獲即照此辦理並將卡倫侍衛等查參至都爾伯特游牧事務已令巴蘭泰前往經理舒明現住布延圖仍著兼管平定準噶爾方略正編卷二十六
