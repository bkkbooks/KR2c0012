body:
  text: 乾隆二十九年冬十月庚辰諭烏魯木齊辦事散秩大臣伍彌泰嚴行約束遣犯上諭軍機大臣曰烏魯木齊所有遣犯甚多自應嚴行約束毋任脫逃滋事從前旌額理在彼尚能約束安靜今更替回京著傳諭伍彌泰務循照旌額理所辦章程加意約束若少有疏懈以致乘間逃走滋生事端惟於伍彌泰是問併傳諭五福知之庚寅飭諭烏魯木齊辦事副都統李景高上諭軍機大臣曰李景高奏請派伊前往雅爾效力一摺該處與烏魯木齊俱係一體辦事並非有進兵要務何必告請前往若駐劄大臣皆如此陳奏則烏魯木齊又將以何人辦事乎可見伊並非實心願往特因有留伊在烏魯木齊之旨故以一奏塞責且以見其有志奮勉耳著傳旨申飭甲午飭諭伊犂將軍明瑞等發往伊犂步甲錢糧毋庸全給上諭軍機大臣曰明瑞等奏稱自京發往伊犂令充步甲兵丁三十三名請附於挈眷兵丁旗分視其悔過自新者將伊等餘丁一同挑選等語此等發充步甲俱係怗惡不悛之人即給以錢糧亦應減半豈可與挈眷駐防兵丁一體全給至伊等不能度日乃其自取有何可憫且自京遣發一匪人伊犂轉增一額缺有是理乎如此籌辦則涼州莊浪遷移之兵又當作何辦理惟伊等子孫罪不相及㨂補餘丁尚屬可行著將現在步甲三十三名俱給與一半錢糧其餘丁準與舊兵一體挑補明瑞著傳旨申飭伊犂將軍明瑞等疏奏驅逐越界哈薩克等情形明瑞等奏言前因伊犂以北塔爾巴噶台等處有越界遊牧之哈薩克等旋經該頭目阿布勒比斯約束遷移臣等又派員查逐雖寒冬雪盛不能無潛來度嵗之人但來年正月烏魯木齊大臣移駐雅爾自可沿路巡查至伊犂西南沙喇擘勒吹塔拉斯特穆爾圖淖爾等處今年七月聞有潛住之哈薩克等因辦理挈眷官兵無暇前往惟於前來貿易人等嚴加申飭九月初沙喇擘勒一路有來投厄魯特等五十餘口告稱聞貿易人等有大兵即來驅逐之信哈薩克等晝夜遷移我等始得脫出觀此則哈薩克等畏我兵威不敢稍抗但出入無常亦非體制臣等愚見今冬雖不必派兵而來嵗北邊駐兵後其西邊一帶或每年巡查一次或大示懲創務令絶迹臣等再行相機辦理奏入報聞乙未飭諭喀什噶爾參贊大臣納世通等辦理霍罕事宜上諭軍機大臣曰納世通等奏稱奉到頒給額爾德尼伯克敕諭隨派四十七等恭齎前往又預備賞給緞布茶葉等語從前納世通奏報額爾德尼情形意涉張皇恇怯朕屢經訓諭至所派四十七等皆未經練事體恐貽外藩姍笑今又預備賞賚尤為非體此次敕諭係加恩免罪派人前往尚當嚴詞斥責有何應行給賞之處看來伊等從前相機辦理不過空言非真有成算也設額爾德尼果有侵擾內地之力何不與阿卜都喇伊木協謀舉事而克坐視其敗露耶且伊果欲內侵非賞賚所能止遏如其無力則斥責又豈能僨事辦理邊務大臣豈可憒憒如此納世通等著嚴加申飭再拖穆齊圖等前往霍罕於額爾德尼未曾出迎匿不具報此次四十七官長保至彼額爾德尼若仍不知恭敬伊等當作何面斥之處亦應預為指示曾否如此辦理並著據實奏聞命原任布政使柏琨前往喀什噶爾協辦事務上諭軍機大臣曰原任布政使柏琨著賞給副都統職銜前任喀什噶爾協同納世通辦事揚桑阿在彼年久著即回京丙申諭參贊大臣納世通與副都統柏琨和衷辦事上諭軍機大臣曰近因納世通辦理霍罕事務殊乖體制已屢加訓示因思喀什噶爾回人應照蒙古情形辦理柏琨熟習蒙古語著賞給副都統銜前往協辦此特因邊陲要地多一人則有所商𣙜柏琨至彼納世通固不當存推諉之見柏琨亦不得以曽奉特遣遂任意自專除面諭柏琨外仍傳諭納世通務期和衷集事辦理盡善則伊二人之功不善亦伊二人之咎若稍存彼我之見則為回人譏笑矣至奏事列名仍著納世通在前癸卯議烏魯木齊總兵移駐巴里坤事宜軍機大臣奏言楊應琚明瑞等議覆烏魯木齊總兵移駐巴里坤及應行裁撤大臣官兵辦理一切事宜列為四條得旨軍機大臣議奏臣等酌議一巴里坤原設提標中左右三營官兵今改為鎮標應聽該總兵管轄其由各標營派往辦差人員應請撤回原營查從前因軍需繁冗是以派出各標人員協助今大功告成辦事大臣亦經裁撤自應將本標人員差遣餘俱撤回一巴里坤現無駝隻惟餘馬四百五十餘匹應用軍務文案悉交該總兵接管查駐劄大臣既撤馬匹等項應聽該總兵管理其庫貯軍械屯田軍臺效力贖罪人員遣犯等事均照原定章程辦理一巴里坤原設滿漢檔房均請量留委署筆帖式及書役辦理查滿檔房原設署筆帖式六名漢檔房原設書役十二名請各留二名俟營伍字識熟習後再行裁汰一烏魯木齊總兵既經移駐應請換給印信查提臣移駐烏魯木齊仍統轄安西等處原領關防無庸更換至烏魯木齊總兵應换給鎮守巴里坤等處總兵之印字樣其中軍遊擊關防亦一體更換以昭信守奏入上從之又諭曰巴里坤現在移駐總兵俟駐定時著鐘音回京富明安既前往該處未久著調赴葉爾羌辦事舒泰著往雅爾更換訥素懇回京十一月癸丑參贊大臣綽克托等疏奏瑚圖畢城垣營房告竣綽克托等奏言上年九月臣旌額理等請將羅克倫屯田兵丁移駐瑚圖畢先行蓋造營房一千二百間即趲築城垣隨派參將吳士勝於十一月砍伐蘆葦木植挽運口糧籽種本年三月興工蓋造營房臣等續奏請將吳士勝派往塔爾巴噶台辦理城工又派出原任主事伏魔保協辦瑚圖畢城工務期早竣至九月二十九日瑚圖畢城垣門樓倉庫及哈薩克貿易館舍公署營房俱已告竣計城垣周圍三里五分高一丈六尺臣等前往查勘與原估式樣無異且甚屬堅固其支給鹽菜米麵飼秣馬匹芻豆俱繕册請銷再臣等伏查各處城堡工竣並蒙恩錫嘉名并將城垣房舍繪圖恭呈御覽奏入得旨吳士勝伏魔保俱著交部議敘尋欽定瑚圖畢城名曰景化城東門曰熙景西門曰寶成南門曰阜薰北門曰溥信乙卯命升參將馬虎為副將賞給吐魯番公木薩緞匹上諭軍機大臣曰明瑞等奏稱賞給副將職銜之參將馬虎辦理屯田事務所收糧石較去嵗為多公木薩辦理回人諸務及協助城工木植均屬奮勉等語馬虎著加恩即以副將用木薩著賞緞六匹命議敘辦理屯田官員上諭軍機大臣曰明瑞奏本年緑旗兵丁屯田較去年多收糧四百餘石等語官員著加恩交部議敘兵丁等分别賞給鹽菜銀兩命新疆效力贖罪大員不得循三年報滿之例上諭軍機大臣曰明瑞等以原任吉林將軍薩喇善效力三年屆滿具奏甚屬非是薩喇善獲罪發往即逗遛不前自應少為留待明瑞何以代為陳奏嗣後武職一品大臣文職二品以上大臣獲罪發往伊犂葉爾羌等處效力自贖者三年屆滿不必具奏其武職二品以下文職三品以下人員俟三年期滿之時仍照例請旨伊犂將軍明瑞等疏奏烏魯木齊三屯量留大員事宜明瑞等奏言臣等欽奉諭旨伍彌泰李景高仍留烏魯木齊辦事或一處駐劄或分駐庫爾喀喇烏蘇之處交臣等議奏查庫爾喀喇烏蘇等三屯駐兵八百名分之則每屯止二百餘名俱有文武員辨管轄若仍留大臣駐劄未免煩費臣等愚見仍令伍彌泰等在烏魯木齊同五福辦事如有巡查事務三人更替其三屯錢糧俱歸於烏魯木齊管理似有裨益且晶河駐劄侍衛額爾德蒙額未經派調若以之總管三屯如事關重大先報伊犂其尋常案件就近報知烏魯木齊亦足以資管轄臣等商之綽克托等意見相同如蒙俞允則庫爾喀喇烏蘇等處辦事人員亦可酌留協助奏入上從之乙丑恩恤協辦大學士户部尚書一等武毅謀勇公兆惠上諭大學士曰協辦大學士户部尚書一等武毅謀勇公兆惠質性精勤材猷明練西陲之役稟承廟略式畀元戎盤錯屢經膚功懋集是用酬庸晉爵協贊禁廷入直宣勞正資倚任昨偶嬰微疾遣醫診視方意稍加調攝即冀就痊遽聞溘逝深為軫悼即日親臨奠醊著加恩晉贈太保入賢良祠并賞給內帑銀五千兩治喪念伊子尚在年幼著派同族工部侍郎官保并內務府司官一員代為經理所有應得恤典該部仍察例具奏己巳定邊左副將軍成衮扎布等疏奏烏里雅蘇台城工事宜成衮扎布等奏言前經臣等奏準烏里雅蘇台築城一事隨咨明山西巡撫派兵一百名又據扎薩克圖汗等部落協助人夫牛隻臣等查烏里雅蘇台土性鬆浮難興版築似應照舊伐木造城所有舊城在齊格爾蘇特烏里雅蘇台二河之間擬加高一丈六尺厚一丈周圍共五百丈內外排樹木柵中實以土東西南三面有門北面近河掘溝引水以環三面即以溝中餘土築城此時先行伐木其現到兵丁令於近山駐劄俟春融興工奏入報聞庚午伊犂將軍明瑞等疏奏移駐官兵事宜明瑞等奏言臣等會議雅爾駐兵一事經軍機大臣議覆準行今為期已近臣綽克托等先派索倫官兵巡查驅逐哈薩克等續領官兵帶運糧餉籽種器具起程所有應行事宜謹開列具奏一烏魯木齊籽種不敷備帶臣等議將伊犂存貯之項協濟仍令參將吳士勝等於瑚圖畢等處撥運其軍器火藥亦揀選帶往一城工農務所需器具烏魯木齊存貯之項尚足敷用仍於緑旗兵內挑選匠作購辦物料以備臨時添補一挽運車輛共需八百有餘每車馬一匹俱於牧羣撥用仍量帶餘馬以備疲乏一庫貯緞匹除酌量存留烏魯木齊以備哈薩克貿易外餘皆帶往可省陸續運送之費一前議雅爾駐兵哈薩克有前來貿易者量收牲隻以備屯田其大隊商販仍令前往伊犂但恐哈薩克等貪圖就近不復前往伊犂其價值應行酌減再預備賞給之緞布茶葉均請照伊犂之例辦理奏入報聞乙亥飭諭參贊大臣納世通等辦理霍罕事宜上諭軍機大臣曰納世通等奏稱四十七等至霍罕令額爾德尼伯克出城恭迎敕諭額爾德尼隨具奏章懇求帶回又遣貿易人等投遞呈文俟四十七轉回再將霍罕情形具奏等語所辦非是額爾德尼既有奏章縱不能親身前來亦應遣其頭目賫送乃僅交四十七代進而納世通遂為陳奏殊乖體制總由伊等心存怯懦四十七等又必以為辦理不易遂至一味姑息著傳諭納世通等此時若霍罕貿易人等不知四十七接受額爾德尼咨文一事即行文額爾德尼云我大皇帝頒降敕諭尚遣侍衛前來爾既有奏章理應面陳縱爾難以輕離遊牧亦當派一大伯克齎捧入覲乃附懇代進殊屬不合一面將原奏駁回倘業經準其代進即不必如此辦理總之回人性習狡黠斷不可示以柔弱納世通等嗣後辦理外藩諸事務知大體不可存茍且塞責之見十二月壬午命增伊犂厄魯特兵丁名糧額缺上諭軍機大臣曰明瑞等奏稱現在伊犂厄魯特兵一千二百名內僅二百名每月餉銀一兩請再增二百二十名額餉合計六佐領各得月餉七十分等語著照所請將厄魯特六佐領新舊共定額餉四百二十分以裕兵丁生計諭伊犂將軍明瑞等偵探霍罕哈薩克情形上諭軍機大臣曰明瑞等奏哈薩克阿布勒比斯遣厄魯特策伯克呈稱布魯特掠伊所屬八十餘名口布魯特百餘人亦為哈薩克所獲今布魯特遣人與阿布賚阿布勒比斯約會須面同理説今阿布賚等俱往邊界但阿布勒比斯原與額爾德尼相好或藉口和解隂相勾通亦未可定已行文納世通等密查布魯特等果否實有其事再為相機辦理等語額爾德尼伯克素非安靜之人近因阿卜都喇伊木通信事發妄生疑懼業經頒給敕諭續據納世通奏所遣侍衛四十七等報稱額爾德尼伯克情形尚屬恭順又諭將往返情節確查具奏今布魯特哈薩克講和之説或出於哈薩克等誇張其詞此時宜加意偵探若果有勾通形迹必係額爾德尼伯克潛為煽誘即當乘其不備先將額爾德尼辦理然此特留心防範之舉不可輒自張皇恐伊犂兵民等傳説驚疑於事無益併傳諭納世通等遵照辦理四十七應亦轉回著將額爾德尼及所屬情形作速奏聞柏琨亦著一體加意偵探防範癸未諭葉爾羌參贊大臣額爾景額等查辦各城交收布匹事宜上諭軍機大臣曰據額爾景額等奏稱和闐每年所餘糧石除折收紡絲布匹外仍收金三十兩今駐劄伊犂官兵頗多布匹尤為緊要請將金三十兩亦折收布匹每年可多收布二千匹等語和闐折收金兩亦遐荒土貢之意業已照例徵解不必折收布匹若為官兵衣服起見則葉爾羌應收正項錢糧俱可折給布匹或將餘銀採買亦可著傳諭額爾景額將應送伊犂布匹不足若干葉爾羌等城正項錢糧及所餘普爾糧石若干是否足敷辦解即行籌議具奏己丑申飭參贊大臣納世通等辦理霍罕事宜上諭軍機大臣曰據納世通等奏四十七等自霍罕轉回告稱額爾德尼迎接敕諭甚為恭敬以不能親身入覲欲遣人代為賫奏並因冬寒不及預辦方物俟來春料理起程等語額爾德尼尚屬恭順所奏亦合情理但伊呈書納世通有云我讐人甚多嗣後有讒謗我者祈將其人發來質對以辨真偽等語雖屬畏罪之詞究因阿卜都喇伊木罪狀似未顯著致伊蒙寃不白者然納世通覆書即應將審明各確據逐一指出並以大臣等欲進兵問罪大皇帝天恩念爾平日尚屬守分姑從寬免降敕訓諭仍以嚴詞斥責伊自然知所警畏乃反云阿卜都喇伊木之事業經蒙恩寬免無須再述是其意若以前事為歉然者殊屬非是納世通辦理此事始終怯懦著嚴加申飭併傳諭柏琨務遵陸續所降諭旨加意奮勉毋再以姑息從事又諭曰納世通奏準明瑞咨巴噶什巴雅爾斯坦之布魯特搶掠哈薩克人口一事隨查投誠布魯特各部落册籍並無來咨名目恐係傳聞等語昨因明瑞奏已傳諭納世通令其加意偵探雖據稱布魯特等名目未確但阿布勒比斯呈文亦有布魯特搶掠之語未必非額爾德尼詐稱辦理邊界搶掠事而暗與哈薩克交通此則頗有關係著仍遵前旨密訪確情不得顢頇了事又四十七等至瑪爾噶朗查出緑旗兵劉偉係從前隨兆惠在葉爾羌為額爾德尼屬人所獲屢次脫出俱被伊卡倫盤獲看守等語瑪爾噶朗之人久經內附遇內地官兵理應送回何敢拘禁看守著傳諭納世通於額爾德尼遣使之便傳諭申飭嗣後再有此等情事即行重究劉偉仍準回原營甲午諭伊犂將軍明瑞等酌辦哈薩克入覲事宜上諭軍機大臣曰據綽克托奏稱哈薩克額爾類等遣愛托和卓入覲貢馬并告稱布魯特等三次搶掠遊牧隨詰問愛托和卓云爾等一面情詞未足深信俟遣人赴布魯特查詢若果實情自當明正其罪若係爾等揑飾亦當以誣告論愛托和卓等辭屈即云所掠係塔什干遊牧此等愚詐之徒若準其入覲似非體制謹酌賞紬緞酬其馬值送出卡倫等語所辦甚是看來明瑞等所奏阿布勒比斯遣人來告之語俱不可信明瑞等若似此窮詰伊或吐露實情亦未可定乃僅以一奏了事殊屬顢頇著傳諭伊犂烏魯木齊將軍大臣等嗣後哈薩克等有懇請入覲者或係蘇爾統等大頭目及有奏請要事仍準其伴送前來若僅微末回人希冀賞賚俱照綽克托所辦飭諭遣回至大臣等辦事理宜和衷共濟若明瑞因綽克托如此陳奏即與之意見不合一切會商事件輒存形迹則是伊自負造就之恩矣併著傳諭知之命議敘辦理烏魯木齊屯田總兵德昌等上諭軍機大臣曰綽克托等奏烏魯木齊等處屯田兵二千九百名共收糧五萬七千餘石可否將辦理屯田之總兵德昌及管屯官員交部議敘兵丁賞給鹽菜銀兩等語著照所請將總兵德昌及管屯官員交部議敘兵丁各賞給一月鹽菜銀兩乙未諭伊犂將軍明瑞等管束安插戴罪回人事宜上諭軍機大臣曰前因玉古爾阿竒木伯克阿卜都賚勒索屬人阿克蘇伊沙噶伯克頗拉特妄行滋事與色梯巴勒氐等不和經各該大臣等參奏審訊明確理應治罪朕念阿卜都賚之兄托克托於攻取庫車時效力捐軀頗拉特曾率所屬回人望風歸附俱加恩免罪送來京城安插看伊等近來頗知悔過自新而額敏和卓來京奏對又為懇請遣往伊犂安插因交與護送入覲回人之侍衛等照管前往伊犂但伊等素非安靜守分之人且額敏和卓之子木薩現在伊犂管轄回衆或伊二人倚恃額敏和卓輒行肆志妄為亦未可定著傳諭明瑞等留心管束伊等若安分度日則已倘不知悛改該將軍等即行具奏請旨正法癸卯葉爾羌參贊大臣額爾景額等疏奏拔達克山情形額爾景額等奏言十一月二十三日侍衛揚桑阿回自拔達克山告稱十月十三日至拔達克山素勒坦沙跪聆敕諭奏云素勒坦沙僻處邊隅不諳體制妄行陳奏自知罪重今蒙聖恩降敕訓諭惟有痛改前非以盡臣僕之分隨遣親隨鄂斯敏伯克齎奏謝恩并呈吐魯番郡王額敏和卓書函十二月二十日至葉爾羌臣等面詢鄂斯敏所言無異除覆書交鄂斯敏賫回外謹將奏章書呈驛出其奏章云臣素勒坦沙謹奏十月十三日奉到訓旨跪聆之下不勝感戴回人風俗凡事急圖表白前此所奏今始知非惟有痛自改悔而已愛烏罕原有搆怨之意今似不復相侵齊特喇爾之地臣意欲仍行賞給實甚糊塗臣處有衆萬人屬實但不知天朝無給餉之例妄行瀆請嗣後惟有約束部落不敢稍存異念以圖仰報皇恩至額敏和卓臣稱之曰父何敢誹謗或因所遣和濟克蘭造言生事今已嚴加懲治一切俱凛遵敕諭不敢稍有違悖謹奏其呈額敏和卓書云拔達克山伯克素勒坦沙奉書吐魯番郡王接來諭甚為欣悅我原以父相稱望王以我為子前遣使人和濟克蘭至葉爾羌時大概添造語言奉諭之後即將伊懲治專此辨明心迹尚望王於大皇帝前善言陳奏謹呈臣等一併恭呈御覽奏入報聞參贊大臣綽克托等疏奏烏魯木齊耕牧情形綽克托等奏言本年五月內臣等看得烏魯木齊庫爾喀喇烏蘇兩處察哈爾厄魯特情形每户牧羊四十隻除每十隻交羊羔三隻及填補倒斃數目外尚無虧缺臣等酌照前奏將來投之厄魯特等於安插之日給與餉銀一年後再行停止七月內烏魯木齊雨水霑足禾苖壯盛招募內地民人開墾之地收成在十分以上又據民人王世昌等一百三十户呈稱我等俱係內地無業貧民蒙天恩賞給口糧移居烏魯木齊所有農器籽種及種地馬匹俱係官辦準分年完項今獲豐收除來年籽種口糧外尚有盈餘前日借項情願即行交納臣等伏思分年還官之項並未督催伊等既急公交納請將借出之餘糧四百七十二斛有零照數交倉查民人等移居以來伐木采煤養育雞豚竟成村落與內地無異奏入報聞甲辰命準厄魯特策伯克安插伊犂伊犂將軍明瑞等奏言十一月二十五日哈薩克阿布勒比斯遣屬人察噶賴等四名帶領厄魯特塔爾巴噶沁鄂拓克台吉策伯克來見譯出托忒字文書云策伯克於阿布勒比斯父在時曾為養子欲來歸附今將伊身及其幼子先行送來其家口俟來年春融續送但伊之母女妻子俱未出痘祈於伊犂就近安插等語臣等詢問策伯克所告相同察噶賴又云阿布勒比斯欲遣使入覲一時不得其人且畏哈密道逺可否準由烏里雅蘇台行走臣等覆書準其代奏查策伯克從前曾蒙恩賞二品頂孔雀翎但係阿布勒比斯親信之人今忽送來伊犂安插聞得策伯克有一女於今秋同厄魯特巴朗來投或哈薩克等疑其內向因欲脫回又聞哈薩克等懼我駐兵塔爾巴噶台或令策伯克於伊犂安插可以潛通信息俱未可定但看其人尚朴實亦非大台吉似可準其安插伊家口至伊犂時策伯克仍來京朝覲臣等暫將伊父子交總管碩通照看其或將伊安插伊犂或乘伊入覲歸途之便於烏里雅蘇台安插之處伏候訓示奏入上諭軍機大臣曰明瑞奏稱哈薩克阿布勒比斯遣人帶領厄魯特台吉策伯克父子來投請安插伊犂明瑞等覆書俟奏聞請旨如蒙俞允俟與使人同至京師或在伊犂或在烏里雅蘇台安插之處未敢懸定等語所見尚未甚合機宜策伯克既誠心來投豈宜自定安插之地應曉示云厄魯特哈薩克俱大皇帝臣僕爾在哈薩克與在伊犂並無分别爾欲安插京師自當代為具奏今並不前往未便代奏等語即賞賚遣回亦可今既已允其所請雖厄魯特舊台吉不應安插伊犂然伊不過塔爾巴噶沁之小台吉尚非綽羅斯可比即準其安插亦無不可若遷移於烏里雅蘇台則顯示防範形迹轉啓伊等猜疑且伊犂似策伯克之台吉亦多來春伊家口到時一切支給官項俱與伊犂之厄魯特一例辦理並不以台吉分例相待則久之自與衆厄魯特等一體著傳諭明瑞等遵照辦理平定準噶爾方略續編卷二十七
