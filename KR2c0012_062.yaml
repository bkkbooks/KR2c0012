body:
  text: 乾隆二十年春二月丙寅命定北將軍班第等嚴審㕘贊大臣努三烏爾登等推諉隱匿之罪先是有㫖以努三烏爾登領兵收服扎哈沁後未即擒拏逃犯巴朗諸事退諉交班第阿睦爾撒納審訊並命策楞兆惠查明努三等收取牲畜等項有無隱匿一併具奏至是班第等審訊具奏上諭曰據班第等訊問努三烏爾登等供詞一切推諉俱卸過於薩喇爾一人夫薩喇爾歸順未久從前收獲烏梁海人衆時即有搶擄之事以伊舊染準夷習俗初到未知法度是以姑為寛容若努三烏爾登乃滿洲世僕亦效準夷之所為是尚可寛宥乎且烏爾登收服烏梁海時未將逃人巴爾報出努三擒獲包沁逃人特赫拜哈都理應正法乃並未奏聞請㫖俱屬舛謬策楞所查努三之事尚未奏到著傳諭班第阿睦爾撒納即將努三烏爾登併案嚴審定擬具奏若班第等已經進兵即交駐劄烏里雅蘇台大臣訊問仍報將軍等定罪奏聞再烏爾登將現有馬匹牲畜什物開單呈報伊至軍營已三四年何能將厯年所有一一登記顯係豫得消息將馬匹牲畜隱匿各處少開數目希圖卸罪或兆惠未行詳查亦未可定班第等務徹底嚴查毋得任其狡飾丁夘諭定北將軍班第密奏班珠爾等情形上諭軍機大臣曰朕前以納噶查誤記朕㫖有事成後移居青海之語令傳諭班第等明白曉諭班珠爾納噶查想班珠爾等此時已至軍營伊等一聞曉諭情形若何并有何言語之處著班第密奏毋泄諭安設軍營臺站事宜上諭軍機大臣曰據劉統勲等奏口外文報臺站從前軍營舊路由橋灣直抵巴里坤路徑久廢並無人煙請仍由安西哈密一路安至軍營口外馳送軍營文報安設臺站惟在路徑直捷方免遲滯何必定有人煙之地若由安西哈密一路必致紆遠此蓋綠旗將弁安常習故憚於遷移而不顧軍務奏報之遲悞也現在軍營臺站自當仍照舊路由橋灣一路安設其哈密安西軍臺亦不必盡撤著酌留十之三四以備偶有哈密安西各處文報往來之用議定沿邊驛站添設馬匹事宜協辦陜甘總督劉統勲奏言陜甘安設臺站備給官兵係在南路其沿邊一帶為甘省北路臣因兵行南路大臣官員亦必俱從南路而行未將沿邊各站設法籌辦每站止設馬自四匹至三四十匹不等差務絡繹實屬不敷供應現在軍務未竣正資往來且大兵指日凱旋北路赴京既近將來大臣官兵等自必仍由北路行走請將沿邊各驛俱照寧夏在城驛之例一律設馬六十匹俟南路各臺驛馬兵過捲撤時即酌調分安北路軍務告竣仍裁歸原額奏入得㫖軍機大臣議奏尋議查官兵經過甘省南路安設臺站尖宿俱有定程按站預備至奉差之大臣官員等自應就近從沿邊一帶驛路行走原非俱由南路前往沿邊各驛額設馬匹不敷自當急為籌備應如所請照寧夏在城驛之例一律設馬六十匹俟南路各臺兵過捲撤時即行酌調安設仍於軍務告竣後裁歸原額但南路各站馬匹既俟兵過捲撤分安北路則大兵凱旋所需站馬亦須另行調撥是否不致此盈彼絀應仍交該署督隨時籌畫俾軍臺驛站兩無貽悞方為妥協奏入上從之命議處遊擊高志武等協辦陜甘總督劉統勲奏言甘州提標應解出口馬駝經提臣王進泰派委遊擊高志武管押原派將弁并兵丁一千三百餘名出口近聞該處解送駝馬兵丁有囘至肅州者隨經查明遊擊高志武行至長流水地方止帶兵七百餘名前行留兵六百六十一名令其在彼等候至二月初三日未見信息口糧將斷俱行囘至肅州查選派兵丁原為牽送馬駝豈容中途留頓任意囘營應請將高志武交部嚴加議處又甘肅道公泰等稟稱查驗涼莊解到戰馬三千七百餘匹内可用者二千六百餘匹嗣因寧夏滿兵騎來馬匹臕好者居多酌量更換擇其疲乏者一千九百餘匹將涼莊馬匹換給其換下之馬遵照原奏交肅州鎮標以補營馬摘缺之數旋聞涼莊解馬兵目有與寧夏滿兵私自騰挪之弊緣該處馬匹平常不能盡數交納見寧夏滿兵騎來馬匹臕壯遂將解來疲弱之馬換給寧夏交官私借寧夏好馬呈驗仍換給寧夏滿兵騎往公泰等親赴馬棚查出弊竇解馬協領明德等毫無覺察實屬疎縱奏入得㫖該部分别議處具奏己已定邊左副將軍阿睦爾撒納疏奏預籌擒獲達瓦齊事宜阿睦爾撒納奏言臣接奉諭㫖令籌辦擒獲達瓦齊事宜查陸續投降人等俱言準噶爾情形窮蹙已極誠如聖鑒巴特瑪車凌係臣近族若伊能擒達瓦齊自必俘獻聖朝冀受殊恩倘達瓦齊為哈薩克巴朗所擒不特巴特瑪車凌不肯俯首屈服且巴朗並非噶爾丹策零之弟亦斷不能撫有準噶爾人衆臣意無論何人但來歸誠俱廣布天恩准其投順如或抗違即當領兵進𠞰雖巴特瑪車凌臣亦不敢以私情稍為寛恕現在兵已起程俟到噶勒雜特等處自當探取信息相機而行奏入報聞命移郡王訥黙庫等游牧上諭軍機大臣曰據班第奏郡王訥黙庫貝勒剛多爾濟等告稱現在所居塔楚地方喀爾喀厄魯特人等出痘伊等屬下疾病者多請將游牧移至拜達里克之北自扎卜堪河源博羅喀卜齊爾至鄂爾海西拉烏蘇等處俟大功成後仍移歸舊游牧亦甚近便訥黙庫等現在軍前効力其游牧既有病人即著移往於所請之處班第可曉諭伊等惟努力成功勿以游牧為念再從前訥黙庫等游牧與親王策凌等游牧相近故交舒明就近照管今所移游牧既與阿睦爾撒納游牧相近其訥黙庫剛多爾濟屬下都爾伯特人等即著那木扎爾兼管申諭定北將軍班第密奏班珠爾等情形上諭軍機大臣曰班第所奏曉諭班珠爾納噶查等一摺觀納噶查所告尚屬含糊前伊奏居青海時朕原諭以事定後或居原處或居青海悉從其便並未令其必居青海也今稱將伊等屬下由巴里坤遷移安插亦與原㫖未符其安插伊等於青海之語納噶查曾否告知唐喀祿亦未聲明再諭以將班珠爾封為和碩特汗及伊等或居青海悉聽其便之㫖伊等意見如何究係願居青海或仍願居準噶爾地方著傳諭班第據實密奏壬申諭定邊右副將軍薩喇爾等上諭軍機大臣曰據薩喇爾等詢問蘇珠克圖告稱哈薩克巴朗並非噶爾丹策零之弟朕前曾降㫖詢問阿睦爾撒納據奏在哈薩克時留心察訪知係冒稱巴朗名色不足為據合之薩喇爾所奏其為假冒無疑再降人齊倫曾言哈薩克兵現為達瓦齊擊敗使哈薩克力量稍强能擒達瓦齊則進兵時須豫籌所以備禦之道今並未占據伊犂早已敗退我兵進𠞰尤為便捷况兩路哨探兵會合一處已逾萬數乗機前進儘可迅奏膚功薩喇爾務加意奮勉仰副朕懷至擒獲達瓦齊後應如何辦理哈薩克事務會同班第阿睦爾撒納等詳籌妥辦諭協辦陜甘總督劉統勲等查㕘沿途遲悞驛站官員上諭軍機大臣曰薩喇爾扎拉豐阿奏前赴軍營沿途驛站馬匹缺少遲悞之處著傳諭劉統勲陳𢎞謀恒文等將各該處地方官查明㕘處癸酉定北將軍班第密奏遵㫖曉諭班珠爾等班第奏言臣接奉密諭令臣曉諭班珠爾納噶查緣由仰見我皇上先幾坐照杜漸防微之至意臣觀納噶查狡而好事且自恃才能外雖承順阿睦爾撒納而心實藐視即伊兄班珠爾人甚朴拙亦為其所輕適奉㫖以伊誤記前次面奉諭㫖甚覺惶恐即將伊告知唐喀禄之言不行承認臣隨加訓飭嗣後諸事留心不令其任意乖張並將平定準噶爾後分封四衛喇特為汗各管其屬之處明白曉諭班珠爾等又與阿睦爾撒納等聚會時亦不時提及使之熟聞阿睦爾撒納人尚明白一經開導即知悔悟兼之額駙色布騰巴爾珠爾深知其性每於言論之時化其私心俾其無所希冀臣等唯同心協力黽勉成功其善後事宜臣與鄂容安留心商辦俟阿睦爾撒納帶領哈薩克人衆入覲後臣等即同薩喇爾酌定具奏斷不許其稍有欺罔擅專事權再哈薩克游牧舊在伊犂西北後漸移至東北者甚多現在額爾齊斯之北亦有與阿睦爾撒納游牧接壤之處奏入報聞諭定北將軍班第等豫籌大功告成善後事宜上諭軍機大臣曰據投降人等均稱哈薩克兵及巴特瑪車凌等為達瓦齊所敗雖其虛實未定然亦須豫為籌畫庶臨時不致周章著傳諭班第阿睦爾撒納於大功告成後若哈薩克人等投誠前來將伊大頭目酌量赴京入覲賞給官爵其所屬之人仍於原游牧處安插不必遷移倘竟不歸誠亦不必用兵攻取其如何設立防範或應乗機辦理之處阿睦爾撒納既深知其情勢可與班第定議辦理巴特瑪車凌係阿睦爾撒納之兄今既敗走倘聞大兵一到即來投順朕必為之加恩即或伊不能來亦當遣人迎取豈有伊弟受朕重恩而令其兄遠棄於哈薩克之理乎此皆成功以後事宜但既至伊犂則相隔尤遠倘臨期再為奏辦未免稽遲是以先行曉諭惟在班第等相機集事三月甲戌朔上諭軍機大臣曰班第奏新獲烏梁海博爾貝告稱達瓦齊現派兵四千會同哈薩克兵三千向阿爾台前來烏梁海宰桑布珠庫亦同領兵前進並有令察達克赤倫車根等探信之語其意欲令致疑察達克等不為我兵遣用博爾貝所告全屬虛妄此係必無之事布珠庫乃達瓦齊信任之人故作謊言虛張聲勢冀少緩我大兵前進之意且不論其言之虛偽即使果實亦於我兵前進全無關礙達瓦齊誠帶兵前來正値阿睦爾撒納等鼓勇深入成功愈可迅速阿睦爾撒納深知彼處情形博爾貝所告之語其眞偽自必了然但布珠庫既為達瓦齊出力則遣往之赤倫或被伊戕害亦屬可慮赤倫感激朕恩輸誠効力其意深屬可嘉如果有受困之事阿睦爾撒納就近即派兵救援現在察達克亦在彼處或即派察達克前往亦可阿睦爾撒納一面酌量辦理一面仍帶大兵前進斷勿少為疑惑博爾貝係車根屬下人而聽布珠庫之指使妄言惑衆復致傷我兵丁情甚可惡著阿睦爾撒納詳細詢明即於軍前正法又諭曰阿睦爾撒納詢明博爾貝奏稱布珠庫之言或恐我兵威所至不准投順或係達瓦齊恐各處烏梁海悉行歸降設計安慰均未可定現在扎拉圖所駐之兵毋庸撤囘杭吉爾察克地方應添兵駐防已移咨班第辦理並令察達克前來面同博爾貝質對其言之眞偽使投順之烏梁海等勿致生疑俟質對後即將博爾貝正法以彰國憲阿睦爾撒納辦理甚合機宜與朕昨所降㫖脗合即著照此辦理此必布珠庫揑造謊言冀緩我軍並使我致疑於初降之烏梁海等不復遣用耳阿睦爾撒納令察達克前來面同博爾貝質問明白不特衆烏梁海俱可安心察達克亦全無疑懼自當愈感任用之恩出力報効朕意博爾貝所言哈薩克三千兵會同達瓦齊兵四千前來之語哈薩克之兵或即從前降人庫綳所稱哈薩克巴朗及巴特瑪車凌所領之兵耳果爾則巴特瑪車凌乃阿睦爾撒納之兄豈有反與達瓦齊會合之理其言全不足據於我兵亦毫無關礙招摩多等處駐兵防守亦可即不駐兵亦無不可此時惟赤倫前往事稍可慮如果須應援阿睦爾撒納即遵朕前㫖留心辦理否則俟大兵平定伊犂後此等烏梁海自必歸降此時原不必分兵前往也現已令察達克前來俟其到時即可詢知赤倫現在情形察達克如恐赤倫在彼或中布珠庫詭計伊欲帶兵策應即照伊所請給兵前往如不需策應亦即停止臣等謹案軍前間諜之言最足動搖觀聽如博爾貝妄稱達瓦齊會同哈薩克領兵前來之語其意蓋欲離間新降之烏梁海察達克等不復遣用耳於此稍涉顧慮何以祛衆惑而靖人心我皇上坐照如神灼然斷其必無是事申諭將軍等鼓勇深入設令達瓦齊尚有兵力中途一遇天兵勢同摧枯拉朽尤聖漠所洞燭靡遺者至察達克等甫經輸誠自効之人不因影響流言遂加隄備並令將軍等質對明白俾一時疑慮全消即一無知之烏梁海猶不憚推心置腹委曲成全又以宵小鼓煽為奸且念及遣往之赤倫或被戕害則凡為國宣力之人誰不感激奮勉益仰見我皇上之策勵戎行無遠弗周無微弗至也命定北將軍班第籌辦運帶軍糧事宜上諭軍機大臣曰班第奏帶領察哈爾兵丁於二月二十日起程續進令永貴將後隊官兵口糧辦理支給外所有餘剰駝隻酌量攜帶糧餉跟隨大兵相繼前進俟辦定再為奏聞此奏殊未明晰現在大兵鼓勇直入成功指日可期官兵已攜帶口糧四個月又何須額外帶往預備此或係預備賞賚之用或從前議帶兩月口糧後復定為四個月而於官兵起程時未及滿支四個月之數今特為之補運均未聲明如係帶往預備賞賚之用尚屬可行若官兵已攜帶四個月口糧今復多行裹帶接續前進萬餘兵丁應備口糧若干需用駝隻若干中途保䕶既分兵丁之力且防意外之虞殊未妥協著傳諭班第查明如係必需之項一面計數奏聞一面辦理尋班第奏言現在前隊哨探兵六千名俱攜帶四個月口糧臣帶領察哈爾兵二千名亦攜帶三個月口糧並無減半留存須俟續運者特備賞之項從前未經攜帶現計衆兵進發後馬駝尚有餘剰臣意酌帶軍餉不特大兵有需用之處可以接濟而平定準噶爾後一切賞項亦可動支且此次解餉兵丁即接續大兵前進照看亦易似可無意外之虞惟現在所餘馬駝尚難定數應交與駐劄烏里雅蘇台大臣等量臣等前進之兵成功遲速及所餘馬駝實在數目再行詳悉籌辦奏入報聞乙亥密諭定北將軍班第上諭軍機大臣曰班第陳奏阿睦爾撒納情形一摺有不時留心防範之語前因納噶查有承順阿睦爾撒納之意是以降㫖令班第善為曉諭俾其妄念不生今看阿睦爾撒納一應事宜尚屬奮往亦不宜稍存形跡致令疑懼著傳諭班第嗣後向阿睦爾撒納勿遽露防範之意並將朕節次所降密㫖即行封固繳囘丙子定西將軍永常等奏報領兵起程日期永常等奏言臣等於二月十九日至巴里坤查驗各處兵丁俱已到齊惟原派和托輝特公額林沁兵二百名丹拜兵一百名尚在未到俟到時即行帶領前往否則即於鄂容安帶來哈密安西肅州兵内揀選共足六千名之數擬遵原奉諭㫖於二月二十八日起程今聞有葉克明安巴雅爾一人帶領一千戸口移至額林哈畢爾噶地方前來投順俟到彼處辦理招降亦須數日今擬於二月二十五日由巴里坤領兵前進一路探取北路大兵信息會合辦理奏入報聞戊寅申諭定北將軍班第等派兵防守卡倫事宜上諭軍機大臣曰班第據博爾貝告稱有布珠庫現在帶兵四百名來至卡倫外招摩多地方之語現在派兵往各卡倫防守並移咨駐劄烏里雅蘇台大臣嚴行防範烏梁海等乃無用之人從前進兵時伊等但知聞風遠遁未敢侵犯現已大半聲威收服布珠庫一人豈有反敢侵犯之理此言不過布珠庫虛張聲勢冀緩我師耳原可置之不理朕已詳悉諭知班第令勿因此而分所進之兵力今此奏仍不免過於小心如為防範去年所收之烏梁海則伊等受朕厚恩安居度日不但不肯逃避即使偶有逃避之人平定伊犂後自必仍來歸附能向何處遠颺竟可無庸派兵防守况駐劄烏里雅蘇台大臣現止兆惠舒赫德等數人倘因此稍事張皇辦理未善則喀爾喀必生畏懼即新降之烏梁海等亦易生疑種種殊未詳愼但班第既已派往且兵亦不多姑無庸深論班第惟專心辦理進兵之事不必以博爾貝之言為慮並傳諭駐劄烏里雅蘇台大臣等知之庚辰命治烏梁海宰桑都塔齊教唆逃人之罪上諭軍機大臣曰班第奏烏梁海恩克什等十八戸潛逃請交與宰桑都塔齊嚴挐務獲侍衛六格等應交部議處宰桑都塔齊班珠爾應交與該扎薩克嚴懲治罪恩克什等逃遁明係都塔齊從前有覬覦管轄之意後將伊等歸與察達克管理未遂其意從中教唆所致班第即交與都塔齊查拏辦理甚合如能拏獲尚可贖伊等之罪倘致脱逃必當從重治罪此時且無庸交該扎薩克懲究六格追趕時未曾給與多人尚屬可恕著免其交部現在辦理進兵之事甚屬緊要班第惟當奮勉前往恩克什等數人即使逃遁亦無關係况平定伊犂後伊等更向何處遠颺惟都塔齊人甚奸詐俟事定後斷不可留班第將來駐劄伊犂可告知阿睦爾撒納於伊囘來時酌量辦理尋班第奏言據管理烏梁海郡王品級貝勒青滚雜卜告稱恩克什等十八戸係久經投順之人潛行逃竄皆由都塔齊不能嚴行約束反從中指使所致且逃竄後都塔齊僅報出入戸隱瞞十戸其中更有可疑如此不可信之人若仍留於巴爾楚克地方將來新來投順人衆必為其所愚且日久自恐敗露必致逃竄理應將都塔齊正法以為衆烏梁海之戒據阿睦爾撒納亦以青滚雜卜之言為是臣即交與青滚雜卜令其遣派妥人將都塔齊拏至卡倫數其罪惡即日正法以昭炯戒仍曉諭衆烏梁海等不得效尤亦不相牽累以安衆心奏入上從之申諭定西將軍永常協辦陜甘總督劉統勲等上諭軍機大臣曰劉統勲奏辦理馬駝糧運情形摺内稱挑出瘦小不堪用及疲乏駝隻俱係上年秋間查報堪用永常奏明收槽喂養者此處顯有推諉情弊永常係該省總督又命為將軍一切事務原係分所應辦即來京請訓往還亦僅數月該省辦理情形豈得諉為不知設使不令劉統勲前往寧能不辦耶此永常之無可推諉也至劉統勲以軍機大臣朕特派往協同辦理則永常所辦之事皆伊之事彼此本無可分設使永常獨力能辦亦不必派伊協辦矣此劉統勲之無可推諉也二者之中永常之責較重而其不應存彼此之見則一耳况辦理此等重大事務其中小有未協惟當隨宜籌酌令於事有濟此番進兵原議在四月内今於二月先進數千尅期部署已無悞先行進𠞰之期若僅如肉乾等項運送稍遲不過將承辦屬員照例㕘處足矣豈可以此各存意見有負朕鄭重委任之意著詳悉傳諭伊等倘再蹈前轍朕必重治其罪癸未申諭定西將軍永常上諭軍機大臣曰劉統勲奏稱前奉諭㫖以先進之兵約滿二千即帶領前進又准廷議續進官兵俱以二千為一起今綠旗官兵久駐軍營即應遵旨料理進發所謂先進之兵約滿二千即行前進者指索倫及滿洲京兵而言如係綠旗兵丁只可令供臺站等用若令前隊進發殊不足恃著傳諭永常不得將綠旗官兵帶領先進且永常此番安分自量不妄作主張尚可邀受恩典倘因薩喇爾已有就緒永常急遽單身前往則必為薩喇爾等所笑將不能承受朕恩又為永興之續矣至馬駝等項永常劉統勲彼此照應辦理無致意見參差自取罪戾又諭曰永常奏稱帶領現在所有綠旗及囘子兵於三月初九日繼前隊哨探兵進發永常辦事一味草率其急欲進兵意以事成時伊亦在彼處同有勞績耳此等意見愚而且鄙昨已降㫖令伊不得僅帶綠旗官兵前進如已起程接㫖後即在中途等候俟各處兵丁齊集再行進發永常係總辦軍務大臣凡一切應辦應催之事皆係其職分朕令劉統勲前往不過協辦伊任内事耳伊理應將一切事務籌畫周詳乃諸事推諉於劉統勲今急欲帶兵前進意以業已進兵則愈於伊無涉不思劉統勲一人不但不能辦理今又將鄂昌之事交與劉統勲豈能兼顧永常接到此㫖即將帶往綠旗官兵交與額林沁多爾濟帶領伊即囘至肅州將陸續所到之兵辦給一切糧餉馬駝全行妥協起程有日伊然後尾行前進少有違悞斷不寛宥再策凌等此次行走奮勉朕是以加恩令於中途賞給羊隻或用肉乾此亦鼓勵戎行之意若使伊等口糧充裕而羊尚未到即為少緩再給亦無不可而永常輙議令將羊隻折銀賞給試思以二千人而賞給一千餘兩之銀作何分給且現已進兵銀兩亦何所用之永常之辦理種種未協即此可見現在解往之折價銀兩既行分給不必置議仍遵原㫖辦理羊隻及肉乾等項作速解往即行分給永常務遵㫖辦理㕘贊大臣哈達哈等疏奏防守卡倫事宜哈達哈等奏言大兵前進之後各處卡倫理應嚴加防守臣等現於哈喇阿濟爾罕等處撤囘兵内揀選一千名派喀爾喀扎薩克台吉根敦帶領五百名往海喇圖庫列圖哈道里科卜多布延圖各處駐劄防守復派喀爾喀公品級諾爾布扎卜領兵五百名往烏哈爾和碩等處駐劄防守令其時常派兵哨探並管理新舊烏梁海游牧以及接收來降人衆奏入報聞乙酉命定西將軍永常籌運接濟軍營馬駝糧餉上諭軍機大臣曰班第奏請續運馬駝糧餉以備接濟大兵之用朕已交軍機大臣議覆准行其西路哨探兵已於二月二十五日進發官兵各攜帶兩個月口糧並乘騎馬駝外亦應照北路預籌接濟著傳諭永常於軍營現在所有馬駝糧餉無論何項惟量其所有酌量運往以備接濟丁亥諭定邊左副將軍阿睦爾撒納上諭軍機大臣曰朕因阿睦爾撒納領兵先進途中如有應奏事件令阿睦爾撒納一面具奏一面知㑹班第已經降㫖傳諭葢欲早聞伊等前途捷音耳今閲班第所奏都塔齊一事仍係阿睦爾撒納轉報因阿睦爾撒納尚未接到諭㫖此等本非甚𦂳要之事即或咨報具奏猶屬可行第思嗣後向前更進其信息尤欲急聞且地方情形阿睦爾撒納自較班第熟悉若必待合詞具奏不免紆迴著再傳諭阿睦爾撒納如有必須會商具奏者仍照舊辦理其有應行速為奏聞者即一面陳奏一面移咨班第庶一切事宜不致稍有遲滯定北將軍班第疏奏驗看補放扎哈沁佐領事宜班第奏言前遣員外郎納蘇圖等編定扎哈沁人等旗分佐領其應放佐領人員令内大臣總管瑪木特保送驗看今臣經過扎卜堪地方據喀喇巴圖魯阿玉錫將擬放佐領之瑪什賽音嘉納巴克等二人送驗其餘現在軍前者俱咨行阿睦爾撒納驗看另報又據瑪木特保送從前總理九得秦事務之阿勒巴齊唐古忒一員請比佐領優加一等仍令照舊總理各佐領事務阿勒巴齊唐古忒既為瑪木特信任之人應令其仍照舊管理事務可否賞給四品㕘領職銜之處出自聖恩臣隨諭令將扎哈沁游牧事務令阿勒巴齊唐古忒等會同臣等派出之協理台吉策凌旺舒克公同辦理加意管束奏入報聞戊子上諭軍機大臣曰納黙庫班珠爾齊木庫爾俱同阿睦爾撒納領兵前進伊等俱係大員著施恩賞給訥黙庫班珠爾三眼翎齊木庫爾雙眼翎和托輝特郡王品級貝勒青滚雜卜原係多年扎薩克近亦在軍前効力再西路進兵之策凌策凌烏巴什行走並屬奮勉俱著賞給三眼翎永遠服用以示奬勵命定邊左副將軍阿睦爾撒納沿途籌辦投降人等事宜上諭軍機大臣曰阿睦爾撒納奏來降之巴第阿咱特等告稱哈薩克錫喇帶領伊屬下向額林哈畢爾噶遷移其屬下數得秦人等及收楞額巴爾沁等俱有來降之信看來相繼來降之人必多此等望風納欵即應加恩優䘏但現値進兵之時無暇辦理賞賚事務著阿睦爾撒納於沿途投降人等詳悉記明在何處投降即令其住居原處不必遷徙並將功成後即行施恩之處明白曉諭此内如有大頭目等應帶往軍前者即行帶往其輝特都爾伯特和碩特各部落及達瓦齊所屬人等亦必陸續來降達瓦齊屬下人應另行分别辦理其輝特等所屬人應如何辦理即當預為籌畫庶臨時易於安插阿睦爾撒納即遵㫖妥辦並傳諭班第及西路薩喇爾等轉諭策凌等知之定邊左副將軍阿睦爾撒納疏奏詢問副都統察達克情形阿睦爾撒納奏言臣等審訊烏梁海博爾貝摺内請將副都統察達克傳至軍前與博爾貝當面質對後即將博爾貝正法嗣因博爾貝瘡口復發於察達克未到之前已經病故臣等仍將博爾貝戮屍梟首外察達克前來臣等將博爾貝前後供詞明白曉諭據察達克告稱博爾貝係車根所屬之人原係不可信之小人其言俱屬荒唐現在準噶爾内亂無存身之地布珠庫斷不能出兵即所言來至招摩多四百之兵亦係布珠庫等為瞭望蹤跡安置之數人並非敢來迎烏梁海等之兵且烏梁海等投順以來身受天朝重恩安居樂業即車根赤倫之人我不能深信若我屬下之人俱可保其必無異志現在將軍既於扎拉圖杭吉爾察克等要害之處駐兵防守即使有一二不肖之徒亦於事無礙餘俟赤倫到日俱可詳悉實在情形奏入報聞定邊左副將軍阿睦爾撒納疏奏揀派達什敦多卜等領兵先進事宜阿睦爾撒納等奏言臣等於二月十二日自烏里雅蘇台軍營起程因厄魯特兵未經全到且沿途養息馬力緩行至二十四日抵庫卜克爾支放馬匹於三月初一日至齊齊克淖爾現在支放各處兵丁馬匹口糧即出卡倫前往其達什敦多卜察達克圖倫楚等臣等帶領行走俟至布拉罕察罕托輝地方遵㫖令其先進惟期早獲逃犯巴朗復派喀爾喀貝子策卜登厄魯特貝子得濟特協同前往奏入報聞平定準噶爾方略正編卷八
