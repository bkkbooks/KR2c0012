body:
  text: 乾隆二十年秋九月壬午諭參贊大臣哈達哈等安撫齊木庫爾遊牧上諭軍機大臣曰額林沁多爾濟奏齊木庫爾於阿睦爾撒納未逃之先將伊欲叛情形告知甚屬可嘉著傳諭哈達哈阿蘭泰不必將伊遊牧遷移仍令安居原處候朕降旨諭參贊大臣哈達哈等通使哈薩克事宜上諭軍機大臣曰據額林沁多爾濟等奏報阿睦爾撒納逃竄追捕無蹤看來伊必至哈爾巴噶台遊牧否則徑投哈薩克今詢問噶爾藏多爾濟據稱自汗哈屯等處取道至哈薩克甚近彼處現有伊所屬之烏梁海等因遣伊宰桑固穆扎卜交侍衛德善帶往哈達哈等奉到諭旨著派副管旗章京職銜莫尼扎卜同往傳諭哈薩克阿布賚云爾所遣使臣額穆爾巴圖魯來見定北將軍時已將爾恭順之意奏聞大皇帝甚為嘉悅俟來使入覲後正欲加恩詎意阿睦爾撒納潛謀叛逆將來使遣回且於入覲時中途逃竄伊去年受困於達瓦齊窮極來歸所受大恩不可勝數乃心懷反覆欲總統準部恃我威力殘擾鄰近諸部落正與爾來使所云厄魯特人全不可信之語適相符合今已傳知各路堵截追擒自當弋獲如追捕甚急竄入爾境內果能即行擒送大皇帝必重加恩賞否則潛蹤日久為我師所覺徑入擒勦恐爾境內人等不無驚擾如此明白宣示看阿布賚情形若何哈達哈等候固穆扎卜莫尼扎卜到彼傳諭及歸途信息速行奏聞再烏梁海赤倫如情願同往亦令其隨往命賞給準噶爾台吉噶爾藏多爾濟等銀兩有差上諭軍機大臣曰此次入覲之綽羅斯台吉噶爾藏多爾濟和碩特台吉沙克都爾曼濟輝特台吉巴雅爾著加恩各賞銀五千兩台吉和通額默根達瓦布魯爾各賞銀一千五百兩台吉巴泰曼集鄂勒椿達克巴羅卜藏巴顏察罕吹扎卜鄂諾什本塔什索諾木丹津各賞銀一千兩間散台吉和通鄂勤策凌烏巴什琿齊衮布宰桑厄爾錐音哈薩克錫喇各賞銀三百兩普濟普賞銀一百二十兩管旗章京各賞銀一百兩副管旗章京各賞銀八十兩間散宰桑各賞銀六十兩僕人各賞銀十兩厄爾錐音等僕人亦各賞銀十兩䇿凌訥默庫去年曾賞給銀兩今來入覲著再加恩賞䇿凌銀三千兩訥默庫銀二千兩癸未上御避暑山莊淡泊敬誠殿受噶爾藏多爾濟沙克都爾曼濟巴雅爾等朝詔封台吉宰桑等爵秩有差奉天承運皇帝詔曰準噶爾部落人等互相殘殺羣遭塗炭不獲安生朕統一寰區不忍坐視特發兩路大兵進討各台吉管理鄂拓克宰桑等畏威懷德率屬來歸從軍自效今已平定伊犂擒獲達瓦齊是用廣沛仁恩酬庸錫爵準噶爾舊有四衛喇特今即仍其部落樹之君長噶爾藏多爾濟封為綽羅斯汗䇿凌封為都爾伯特汗沙克都爾扎卜封為和碩特汗巴雅爾封為輝特汗台吉和通額默根達瓦布魯爾封為公台吉巴泰曼集鄂勒椿達克巴授為扎薩克一等台吉羅卜藏巴顏察罕吹扎卜鄂諾什本塔什索諾木丹津諾爾布授為扎薩克職銜將伊等授為扎薩克及所屬編次旗分佐領之處該部察例具奏宰桑厄爾錐音哈薩克錫喇俱授為內大臣辦理圖什墨勒事務厄爾錐音仍管喀喇沁鄂拓克哈薩克錫喇仍管噶勒雜特鄂拓克宰桑拉蘇隆達什策凌鄂哲特都噶爾鄂勒錐俱授為散秩大臣仍管各鄂拓克噶爾藏多爾濟等及管理鄂拓克之宰桑厄爾錐音等受朕深恩其董率所屬各勤教養共圖生聚爾等如恪遵朕訓自永受無窮之福欽哉毋怠命封喀爾喀郡王桑寨多爾濟為親王上諭軍機大臣曰喀爾喀郡王桑寨多爾濟此次軍營行走甚屬奮勉伊祖丹津多爾濟原係親王著加恩晉封桑寨多爾濟為親王以示優眷命押解阿睦爾撒納宰桑阿穆爾濟爾噶爾來京上諭軍機大臣曰據阿蘭泰等詢問阿睦爾撒納宰桑阿穆爾濟爾噶爾供詞薩喇爾參奏阿睦爾撒納之處瑪木特屬人曾經泄漏等語此雖未知虛實然亦當密加防範至所供阿睦爾撒納在察罕扎輝或烏蘭庫圖爾等候令所遣之人由哲爾格西喇呼魯蘇地方帶遊牧前往等語阿睦爾撒納逃竄自應遇我沿途聲援及屯田兵丁若迎伊遊牧必為額林沁多爾濟追及今俱未相值究從何路潛逃著哈達哈等速遣妥員赴額林沁多爾濟處查明具奏再吞圖布恩克博羅特僕役財物前為阿睦爾撒納所掠著速行查出俟伊等至烏里雅蘇台時先為告知事定之後即行賞給至阿穆爾濟爾噶爾係阿睦爾撒納親信之人今阿蘭泰等訊伊供詞俱含糊不明著即遵前旨押解阿穆爾濟爾噶爾來京中途務嚴飭押解人員毋得令其脫逃至阿睦爾撒納之子斷不可留著即解赴京師阿睦爾撒納之妻係納默庫之姊伊二女已降旨賞與訥默庫哈達哈等並即遵旨辦理甲申訓飭定西將軍永常等上諭軍機大臣曰永常奏傳喚扎哈沁宰桑鄂爾奇木濟托故不至情形可疑已密行阿敏道喀爾納等令其酌量兵力擒拏等語鄂爾奇木濟係朕念伊兄敦多克身故加恩授職之人若果懷二心自難寬貸今授普爾普為散秩大臣扎哈沁宰桑交副都統額爾登額侍衛端濟布等帶往相機擒勦俟擒獲鄂爾奇木濟即交端濟布解送來京又將宰桑厄爾錐音哈薩克錫喇吞圖布恩克博羅特等送回遊牧整兵前進永常即傳諭哈薩克錫喇之弟塔斌令其豫為整備俟伊兄一到即協力前進勦捕又奏阿睦爾撒納現在逃叛恐搶掠巴里坤現候阿敏道等接續臺站信到即從木壘退回巴里坤防守是竟置班第等於度外甚屬錯謬巴里坤即須防守可留三格辦理永常䇿楞應整頓兵力作速前進遇阿巴噶斯哈丹之衆務行勦滅三格若亦隨軍前往即著派豆斌就近調取緑旗兵二三千名防守巴里坤至巴哈曼集將遊牧移於克什圖自係避賊豈有從亂而反內移之理永常不辨虛實存心畏怯辦理種種未協此旨接到即同策楞奮勇前進毋得仍蹈舊轍愼之命侍郎雅爾哈善前赴軍營上諭軍機大臣曰阿蘭泰等奏稱聞阿睦爾撒納現擬糾合叛黨接出遊牧並搶掠喀爾喀等語此特虛張聲勢伊不但無此力量即實冇之當乘其未集擊之甚易觀伊等奏報未免心存畏懼朕今命雅爾哈善前赴軍營會同達爾黨阿哈達哈阿蘭泰共商議進兵著達爾黨阿雅爾哈善前進哈達哈阿蘭泰續往兆惠舒赫德即著在烏里雅蘇台軍營辦事布拉罕察罕托輝地方甚近哈達哈等接得此旨即派扎爾杭阿帶現領兵丁一千名同溫布前往布拉罕察罕托輝等處追捕阿睦爾撒納若馬力不足即用阿睦爾撒納遊牧馬匹或暫派齊木庫爾等遊牧之馬亦可再青滚雜卜察達克圖倫楚等前往汗哈屯地方何以不即遣伊等從彼處追捕阿睦爾撒納如遇阿逆即行擒獲否則仍同扎爾杭阿會商勦捕命侍衛濟福等傳諭宰桑厄爾錐音等派兵前往伊犂上諭軍機大臣曰永常奏哈薩克錫喇之弟塔斌遣人來告現在派兵防守遊牧等語看來塔斌並未煽動伊遊牧既有兵力濟福烏爾登可傳諭厄爾錐音哈薩克錫喇恩克博羅特吞圖布等同至噶勒雜特遊牧將伊等兵丁挑選帶進伊犂沿途勦捕若北路現在難行或由口內沿邊速往或自烏里雅蘇台帶兵從西路前去亦可濟福烏爾登與伊等議定前往仍速行奏聞命喀爾喀親王額林沁多爾濟帶領齊木庫爾等赴熱河行在上諭軍機大臣曰額林沁多爾濟原同阿睦爾撒納及齊木庫爾德濟特普爾普納噶查等前來入覲今阿逆業已逃竄額林沁多爾濟雖領兵追擒量亦無濟著即帶齊木庫爾等小心防範速赴熱河乙酉命副都統富德送台吉噶爾藏多爾濟等前赴軍營在領隊大臣上行走申諭協辦陜甘總督劉統勳籌辦馬駝上諭軍機大臣曰前經屢諭劉統勳回至肅州辦理馬駝計已奉到今據奏現有兵丁三千四百名擬以一千四百名防守巴里坤二千名聽候永常調遣等語巴里坤無須多兵防守已傳諭策楞約存兵四五百名餘俱令其前進其馬匹僅二千六百有餘亟應籌畫務宜悉心辦理俾馬力充裕足應疾驅方為妥協定西安將軍永常疏奏領兵自木壘退駐烏爾圖布扎克永常奏言現在額林哈畢爾噶烏魯木齊等處台吉宰桑等俱已煽動斷絶臺站搶掠官兵扎哈沁部落亦懷二心不能保其不叛隨接侍衛蒙固勒呈報將軍班第之文始知阿睦爾撒納實已叛逆現在軍營馬匹疲瘦駐劄伊等遊牧之內倘有蠢動大損軍威正欲行文策楞調兵策應并調回阿敏道而濟木薩等臺及喀爾喀公米什克帶來兵丁俱被搶掠又有布庫努特得木齊巴圖爾和碩齊等及葉克明安宰桑扎木參等忽帶四千餘人前來訴求指給遊牧又屢次傳喚不到之宰桑鄂爾奇木濟亦請將家屬移於克什圖地方臣伏思此等人衆皆係假托遷移遊牧欲來侵犯且烏蘭烏蘇與克什圖噶順等處山險路狹倘夾攻我師則歸路斷絶臣即用言撫慰鄂爾奇木濟等以移營為詞將伊等帶領行走若有兵邀截即先將伊等誅戮至九月初五日已至烏爾圖布拉克䇿楞三格亦於是日帶兵來會一面將鄂爾奇木濟等遣回臣受恩深重未能接續臺站探取伊犂實信不勝惶悚奏入報聞丁丑命策楞為定西將軍革永常將軍任上諭軍機大臣曰前因永常聞西路臺站被搶即駐兵木壘指示辦理尚屬奮勉故加恩仍令辦將軍事務授為內大臣昨覽伊奏一聞阿睦爾撒納叛逃即帶兵郤走實屬怯懦不稱將軍之任著革去內大臣以副都統職銜參贊效力定西將軍著策楞補授策楞身負重譴朕加恩復用務宜奮興士氣揚播軍威不得稍生推諉計此旨到時扎拉豐阿玉保亦將至軍營䇿楞速整齊兵馬俟伊等與帶往之宰桑到時會同商酌擒勦阿巴噶斯哈丹等領兵直抵伊犂方為合宜觀準噶爾情形雖易於變亂而我師以寡敵衆奮勇衝擊即驚駭奔散可詢問帶往宰桑等將背叛之鄂拓克嚴行勦捕收其馬匹牲隻作為口糧則伊等始知畏懼且可接濟兵力再據永常奏諾爾布林沁由哈卜塔克拜塔克前去所關甚要䇿楞即選派精兵四五十名前往偵探信息並遵前旨令阿敏道等分作兩隊速至伊犂取班第等信息即速奏聞再前因永常奏扎哈沁宰桑鄂爾奇木濟形蹤可疑是以授普爾普為宰桑令侍衛端濟布帶往今觀鄂爾奇木濟尚無别故著端濟布即將普爾普帶回京師不必前往命達爾黨阿為定邊左副將軍上諭軍機大臣曰定邊左副將軍著達爾黨阿補授哈達哈阿蘭泰雅爾哈善桑寨多爾濟青滚雜卜俱著在參贊大臣上行走青滚雜卜聞與達爾黨阿阿蘭泰等不協今當用人之際達爾黨阿等務宜屏除意見和衷共濟著傳諭伊等知之戊子命喀喇巴圖魯阿玉錫仍留北路軍營命授宰桑尼瑪為散秩大臣丹津為頭等侍衛庫綳哈什哈為三等侍衛賞尼瑪丹津銀各三百兩庫綳哈什哈銀各一百兩諭定邊左副將軍達爾黨阿等進兵機宜上諭軍機大臣曰據哈達哈等屢次奏報俱稱豫備兵馬並未及前進勦擒通信伊犂各事宜今詢問解送前來之厄魯特尼瑪丹津伊等言阿睦爾撒納斷未遠揚必在額米爾鑑格爾等處潛身今年北路即由阿爾台西路即由額林哈畢爾噶博羅塔拉進兵夾攻必被擒獲看來丹津人尚明白因令尼瑪庫綳哈什哈隨噶爾藏多爾濟等往西路軍營丹津赴北路軍營哈達哈青滚雜卜帶領喀喇巴圖魯阿玉錫丹津選精兵一千名前驅達爾黨阿阿蘭泰等選兵三千名或二千名繼進軍行惟馬駝最要達爾黨阿等儘現在所有馬駝揀選應用並酌派兵丁口糧俟丹津到日即行進兵青滚雜卜前奉命堵截賊衆今奏稱兵糧俱已齊集甚為欣慰伊世受國恩已封為郡王此次若能奮勉必照親王桑寨多爾濟加恩其扎哈沁烏梁海等懇請接濟口糧已經賞給仍令扎木禪察達克等選派所屬前行哨探其恩賞照初次進兵減半支給至阿蘭泰等奏包沁部衆尚未逺去親王成衮扎布等已豫為堵截若擒獲阿克珠勒等即行正法餘黨嚴行勦捕將家口賞給桑寨多爾濟青滚雜卜等以示鼓勵再丹津到時伊等會商兩路進兵大勢由阿濟必濟通信西路此際䇿楞等自必整頓兵力俟噶爾藏多爾濟到時添派遊牧兵丁擒勦阿巴噶斯哈丹追捕阿睦爾撒納以告成功如伊等仍不竭力辦理即深負朕恩矣勉之毋怠參贊大臣阿蘭泰等疏奏擒獲包沁總管阿克珠勒阿蘭泰等奏言臣等前聞包沁人等潛行附逆逃往布拉罕察罕托輝之信即令鄂博什帶領索倫兵五百名速行追擊一面令管領聲援及屯田兵丁之喀爾喀王大臣等并駐防科卜多布延圖之扎薩克等堵截去路九月初八日據管領聲援兵丁喀爾喀郡王巴扎爾什第貝子沙克都爾扎卜公達爾扎等報稱包沁總管阿克珠勒副總管台拉克等自哈中圭逃附阿睦爾撒納由索勒畢烏拉克沁等嶺過阿爾台於八月二十九日在布拉罕等處遇見賊衆奮力截殺當將阿克珠勒擒獲餘衆俱行勦殺其妻子牲隻盡行收取將副總管台拉克及藍翎和濟木胡里收楞額額森貝等三人首級同生擒之阿克珠勒解送前來臣等查包沁部落已經收服受恩乃聽阿睦爾撒納煽誘擅殺侍衛兵丁搶奪卡倫情罪重大俟阿克珠勒解到時應詳訊明確或即行正法或解京明正典刑恭候諭旨遵行仍將户口查明男子成丁者俱行正法所有妻孥分賞效力之王公大臣官兵以示鼓勵奏入上諭軍機大臣曰喀爾喀郡王巴扎爾什第等追勦包沁叛賊生擒阿克珠勒斬馘台拉克等奮勉可嘉巴扎爾什第著加恩封為親王貝子沙克都爾扎卜封為貝勒公達爾扎諾爾布扎卜封為貝子協理台吉達瑪林封為公其餘奮勉行走官員兵丁等著哈達哈等查明報部議敘陳亡者亦查明照例恩恤阿克珠勒即派員嚴行管押來京治罪庚寅命扎拉豐阿為定西將軍革永常職拏解來京治罪上諭大學士曰阿睦爾撒納上年率衆來歸朕加恩撫納封以王爵伊於召見時面陳略定準夷之策朕以其才可用爰授定邊左副將軍為我師嚮導近官軍奏凱朕召諸部台吉齊集熱河將行飲至之典詎阿睦爾撒納在伊犂軍營時輒以私印調兵并遣使與哈薩克私通揚言非令伊總統準部不可種種不法節經班第等奏聞伊心懷叵測揣知軍前大臣必行參奏不得已赴召前來行至中途遂將印信交親王額林沁多爾濟托故逃遁潛遣護衛七人來取家屬伊兄齊木庫爾執使首告伊妻亦以其負恩逃叛憤激不從願移內地阿睦爾撒納已為無家之人而竄匿之初乘厄魯特諸部台吉現俱入覲輒布流言希圖煽惑衆聽搶掠臺站乃西路各部台吉俱堅心內向有葉克明安宰桑扎木參等率所部數千人赴永常處叩請遷移附近軍營居住以為倚庇乃永常不審虛實疑為詭計張皇失措挾其宰桑置軍中為質兼程郤走復恐或躡其後檄行䇿楞以兵接應并將前遣安接臺站之副都統阿敏道行文撤回退駐巴里坤拒守夫阿睦爾撒納負恩逃叛衆部同仇即伊兄弟妻子亦皆憤恨離心况附和同叛之包沁部落北路聞信往勦酋首即已就擒部衆殱滅是阿睦爾撒納孑身逋逃無難計日擒戮若當諸台吉叩轅請告之時永常克振軍威諸部得所依倚厲兵迅往追捕叛迹其勢甚易何至為浮言驚駭無端退避使新附寒心士卒沮氣貽誤一至於此且伊前赴軍營時籌辦諸務率多冒昧即如軍行已有定站而錯會文移遽令刻日兼程前進兵糧業經支給猶喋喋以口食不繼為詞希冀邀譽市恩竟不顧衆心搖惑此類難以枚舉朕是以但飭其駐烏魯木齊聯絡聲援不使偕衆統兵進發蓋早知其中無定見全不察事理之輕重也兹當伊犂久經平定回部率屬歸誠所辦者僅一潛蹤伏莽之逸賊耳而永常始則未知確實疑係窮夷自相劫掠奏請追逐意尚近於奮勉逮一聞阿睦爾撒納在逃之信忽爾畏葸乖張甘心僨事實出情理之外若不重治其罪何以任將帥而厲戎行永常著革職拏解來京治罪定西將軍印務前有旨著策楞補授今觀䇿楞竟不能自發一謀自出一慮惟聽永常妄行調遣恐不能勝將軍之任䇿楞著仍在參贊大臣上行走即日帶兵前往其定西將軍著扎拉豐阿補授申諭協辦陜甘總督劉統勳甘肅巡撫吳達善辦理進勦官兵馬駝口糧上諭軍機大臣曰吳達善奏劉統勳準永常來札檄調甘肅緑營官兵援勦所辦甚屬錯謬阿睦爾撒納係聞軍營大臣參奏畏罪潛逃豈能遽犯巴里坤致為邊患試思從前噶爾丹䇿零時尚不能輕犯邊境况阿睦爾撒納素為衆惡又復負恩逃竄人人恨其反覆即伊兄弟妻子亦盡離心以一窮蹙亡命何能飛度巴里坤哈密而須盡徵內地緑旗兵於數千里外為拒守計耶且現據北路官兵將附和逆賊之包沁首惡就縛黨羽殱除軍威已振西路兵力不為不敷與其調兵何若勤辦馬駝口糧應現兵之用劉統勳尚為稍知事體者何一接永常來信竟不詳加審度惶遽若此定西將軍已著扎拉豐阿補授著速傳諭劉統勳令其就軍營現有官兵料理馬駝口糧即日前進如回肅辦理尚需時日并傳諭吳達善令其就近速為籌備或調營馬或另行購買其價值不拘成例一面報知該協督即於甘肅一帶分槽豢養聽候調遣若購得臕壯之馬即先行解送軍營又諭曰劉統勳奏請退駐哈密籌辦進兵事宜甚屬錯謬朕初不意劉統勳亦張惶失措茫無定識至於如此葉克明安宰桑扎木參等久經內屬來求倚托必無被賊煽誘轉相窺伺之事此特永常望風疑畏自行驚擾所稱目覩情形者豈果實有確據耶阿睦爾撒納在此時不過一亡命逸賊耳况素為諸部所惡人皆切齒其北路同叛之包沁等已被擒戮焉能一時鼓動諸部飛越數千里至巴里坤此事理所必無者軍營衆心所恃全在領兵大臣今一將軍一總督一都統無端自相驚怖舍木壘而回巴里坤今又議舍巴里坤而就哈密軍心其何所恃劉統勳著嚴行申飭仍令速遵前旨即籌辦馬匹口糧儘現在兵數或三千或二千尅期進發現已一誤再誤豈容更為猶豫在劉統勳軍務原非所諳但識見乖謬至此實出朕意料之外此時臺站偶斷只應亟籌安接以通伊犁聲息所發班第等報匣何至盡行繳回竟漠然置之度外是何心耶著一併嚴行申飭報匣仍發回申諭參贊大臣䇿楞整兵進勦上諭軍機大臣曰據永常奏請派兵七八千名進勦今僅有五千八百餘名先辦理馬駝口糧以利遄行等語所奏益為迷謬阿睦爾撒納之力斷不能據有伊犁所依附為惡者不過阿巴噶斯哈丹數人耳今入覲諸台吉宰桑等俱云四衛喇特多係阿睦爾撒納仇讐前來入覲時即已各飭遊牧豫為防範永常聞阿睦爾撒納潛逃即心神擾亂一似賊衆已全收準部非大兵不能恢復者是以將伊拏問著傳諭䇿楞速整現有之兵相機前進俟扎拉豐阿玉保到時與噶爾藏多爾濟等台吉宰桑會商勦賊通信伊犂至臺站斷絶後發還班第等奏匣永常理應收貯俟接續後仍行發往乃遽爾繳回是置班第等於度外永常忍心若此實出情理之外若永常䇿楞在伊犁他人或棄置若此伊能甘心乎永常業經拏問著策楞即派委幹員嚴加看守如或畏罪自戕惟䇿楞是問申諭參贊大臣哈達哈等進兵事宜上諭軍機大臣曰哈達哈等奏訊問包沁總管阿克珠勒供詞及現在派兵百名令出卡倫收我被截之兵并擒生問信等語阿克珠勒所供哈薩克助兵一萬與阿巴噶斯哈丹萬人會合搶掠伊犁現在哈薩克情形何能出兵萬計而阿巴噶斯等户口僅及三千阿睦爾撒納遊牧業經收獲包沁復被殱滅安得更有萬人此皆伊等張大其詞以搖惑衆聽哈達哈等全未度量事機惟過計豫防實為怯懦至成衮扎布塔爾瑪善俱係堵截賊衆之兵既未遇阿睦爾撒納即應會兵同來今伊等現駐何處卡倫外被截者何兵被何人所截奏內均未聲明如果兵少被截再增派二百人續進今計前至察罕呼濟爾不過一月之程愈速愈合機宜阿蘭泰等即將現有兵丁馬匹通盤計算一面奏聞一面俟阿玉錫丹津到時奮勇前進以期勦滅逆賊此次進兵以休養馬力為要可令每兵一名帶馬四匹多備三四月口糧將汗哈屯烏梁海及收獲各遊牧馬匹查明應用如馬力平常即酌量購備勿拘成例仍將班第信息及現辦事宜速行奏聞命員外郎唐喀祿護送濟隆胡士克圖前往巴林俟明年移至伊犁居住命傳諭準噶爾部衆上諭準噶爾部衆曰阿睦爾撒納負恩逃叛造言煽惑爾厄魯特之衆聞風驚擾莫知適從勢所必有朕亦不加罪責現在阿睦爾撒納雖潛蹤未獲朕已兩路發兵追捕必被擒獲況聽伊調遣逃遁之包沁總管阿克珠勒等已為喀爾喀親王巴扎爾什第等擒勦無遺賊黨愈孤衆所共悉朕前因爾等連年爭鬪不獲安生特發兩路大兵救民水火西路之兵未嘗稍有侵擾惟阿睦爾撒納為北路嚮導恃威凌奪懼罪潛逃今伊妻拏遊牧已全行收獲爾等惟各矢誠心保獲遊牧大兵一進派兵協助若有擒獲阿睦爾撒納者朕必加以重恩特傳諭兩路遊牧人衆知之甲午訓飭參贊大臣哈達哈等上諭軍機大臣曰哈達哈等奏親王成衮扎布護軍統領塔爾瑪善領兵擒獲包沁之薩爾坦殺死三十人逃出十餘人所獲牲隻請分給衆兵充餉等語此次遇賊雖有斬獲亦因賊少始能若是且尚有逃者若遇大隊賊衆伊等退避亦未可定即如軍行馬力疲乏自當更換所獲馬匹追襲何得任其逋逃成衮扎布等選軟積習朕所素知伊等毋庸議敘仍著飭行其餘台吉官兵俱著查明報部議敘從前擒獲阿克珠勒之扎卜及殺賊之阿裕什巴尼彭楚克等俱著賞銀五十兩收獲牲隻什物仍照所奏賞給又據薩爾坦供詞有哈薩克錫喇與噶勒雜特塔本集賽人等共搶掠伊犁之信現在哈薩克錫喇已經入覲伊弟塔斌又釋我被獲兵丁與永常通信豈復有搶掠伊犁之事明係賊黨揚言哈達哈等惟據供陳奏似此不經之言皆信以為真而視班第等於膜外伊等即不欲通信班第亦當虛設一詞畫一䇿何竟置之不論朕思之殊為憤恨且為伊等恥之再班珠爾等乃阿睦爾撒納同黨其妻子屬人俱當賞給功臣但解送需時若賞給此次效力之喀爾喀等能保其不致逃竄否如恐滋事即解送京師亦可至扎拉豐阿玉保等由阿濟必濟前往西路如須帶兵數百名哈達哈等即行派往斷不得以北路用兵為詞著一併傳諭伊等知之命賞給準噶爾台吉巴桑等銀兩有差上諭軍機大臣曰此次入覲之台吉巴桑塞卜騰著加恩各賞銀一千五百兩台吉洪郭爾三濟特特默齊各賞銀一千兩間散台吉鄂齊爾宰桑策伯克博什烏魯木各賞銀二百兩一等侍衛巴雅斯呼朗阿雅勒虎宰桑托音瑪木特各賞銀一百五十兩宰桑齊默得庫賞銀一百二十兩管旗章京各賞銀一百兩副管旗章京各賞銀八十兩間散宰桑各賞銀四十兩僕人各賞銀十兩宰桑策伯克等僕人亦各賞銀十兩扎薩克台吉阿卜達什前派出兵曾賞給銀兩今來朝覲著再加恩賞銀五百兩乙未命封授準噶爾台吉宰桑等爵秩有差上諭軍機大臣曰此次前來朝覲之準噶爾台吉宰桑等阿克把集賽宰桑策伯克巴爾達穆特鄂拓克宰桑博什輝特宰桑烏魯木俱著授為散秩大臣達什達瓦宰桑巴雅斯呼朗阿雅勒虎授為一等侍衛已經降旨其葉克明安台吉巴桑和碩特台吉塞卜騰著封為公呼爾璊台吉洪郭爾和碩特台吉三濟特著授為一等扎薩克台吉和碩特台吉特默齊巴爾濟達克巴著授為間散扎薩克並將伊等授為扎薩克及所屬編次旗分佐領之處該部察例具奏庫圖齊訥爾鄂拓克宰桑托音管理伯得爾格鄂拓克回人之宰桑瑪木特俱著授為三品總管阿勒巴齊宰桑齊默得庫著授為四品總管策伯克博什烏魯木托音瑪木特齊默得庫仍管各鄂拓克巴雅斯呼朗著兼管翼領協助布林管理達什達瓦所屬各台吉宰桑等受朕深恩其董率所屬各勤教養永圖生聚毋負朕加恩體恤之意命賞給西北兩路官兵軍裝銀兩上諭軍機大臣曰朕命西北兩路官兵擒勦阿睦爾撒納從前業經賞給整辦銀兩此次並無加給之例但時屆隆冬且疾驅前進著加恩照從前進兵之例減半賞給命授奇徹布為二等侍衛上諭軍機大臣曰奇徹布被圍於包沁人衆奮身殺賊突圍而出勇敢可嘉著加恩授為二等侍衛并賞銀一百兩訓飭協辦陜甘總督劉統勳參贊大臣䇿楞上諭軍機大臣曰據署提督冶大雄奏劉統勳䇿楞檄調安西官兵援勦復行撤回等語劉統勳等從前之張皇失措於此益見阿睦爾撒納從北路竄逸豈有飛越西路為患之理該協督等聽信永常恇怯之辭輒逺從內地調兵援勦不思兵行全資馬力今忽而徵發忽而撤回不惟驚惑視聽使甘肅內地一帶妄生疑議即以馬力而論亦何堪此往來紛擾耶總之此事皆由永常怯懦但思退守哈密以為自衛之計又不欲出諸已口故爾張大其辭而劉統勳等遂為喋喋陳奏耳䇿楞前獲罪戾未經正法今復棄瑕任用伊應感激報效何竟遇事毫無所見若此劉統勳雖未嫻軍旅然於軍機重務亦宜審察確實初不意其茫無定識至斯也著傳諭劉統勳䇿楞令將永常如何用言聳動伊等伊等如何遽然聽信之處據實奏聞不得稍涉粉飾丙申命參贊大臣䇿楞領兵䇿應諾爾布林沁上諭軍機大臣曰據永常奏稱諾爾布林沁聚集兵丁擊敗阿巴噶斯之衆擒其得木齊班咱解送前來扎那噶爾布復來歸附又布庫努特之得木齊諾爾布亦率屬來歸等語諾爾布林沁等如此效力而永常尚不出兵接應且以馬力疲乏為辭實屬怯懦之至著傳諭䇿楞諾爾布林沁尚在幼年即能如此奮勇著加恩封為郡王䇿楞即於現在兵丁內選派千餘名疾速帶領前進策應諾爾布林沁仍傳旨奬諭諾爾布林沁並告以伊父噶爾藏多爾濟朝夕即至令其整頓兵力會合遄行協助將軍班第等勦除逆亂所擒之得木齊班咱即由臺站解送至京仍慰諭扎那噶爾布令其堅心內附以受朕恩并偵探班第等信息速為奏聞命革協辦陜甘總督劉統勳職拏解來京治罪上諭大學士曰劉統勳奏西路實在情形一摺乖謬已極現今伊犁平定之後阿睦爾撒納背恩叛竄阿巴噶斯哈丹弟兄不過一鄂拓克之宰桑為所煽誘搶奪臺站葉克明安宰桑扎木參等率衆求請於附近軍營居住而永常妄生疑懼遂退回巴里坤今噶爾藏多爾濟之子諾爾布林沁即帶兵千餘殺退阿巴噶斯兵衆則西路全勢並無絲毫變動若使永常仍駐木壘率來歸之衆令為前驅奮往直前早通伊犁聲息而追尋阿睦爾撒納逋逃蹤迹西陲當已安帖無事矣乃永常恇怯於前劉統勳附和於後實出情理之外軍營所恃全在領兵大臣今一將軍一總督無端自相恐怖衆心其何所恃耶劉統勳奏內所云諾爾布林沁等來告之説俱未可深信夫諾爾布林沁為守護遊牧始則懇求內移繼則率衆勦賊現將阿巴噶斯之得木齊班咱擒送來營情形若此尚何不可信之有又云內外之界不可不分試思各部自歸誠以來悉已隸我版圖伊犂皆我界尚何內外之可分今西路諸台吉宰桑皆知遣人來告軍營求以兵力壯其聲勢其自效之意顯然可見而永常劉統勳乃望風疑畏甚欲全調陜甘滿漢軍營馬匹且以向年巴里坤孤懸塞外馬駝被劫為詞夫雍正年間準噶爾以其全力鴟張鼠竊視今日之一舉蕩平諸部歸誠相去天壤三尺童子莫不知之劉統勳作此種種乖謬之語貽誤軍事且班第等在伊犁係辦理軍務大臣劉統勳並不與永常亟謀安接臺站竟奏請退回哈密而置班第等於不問伊身為總督現在巴里坤一切軍營應辦事宜何莫非其專責即如軍營馬匹現俱乏弱縱撤回之馬不無疲瘦而所有一切馬匹何以不豫飭豢養臕壯劉統勳所司何事糜費錢糧不能適用其罪尤無可逭昨據冶大雄奏到伊將安西官兵忽而調遣忽而停止馬匹豈不更加疲乏永常已降旨革職拏解來京劉統勳如此乖張貽誤軍旅重務若以其係漢人為之寬恕而不治以應得之罪則是朕岐視滿漢且將復何以用人何以集事耶劉統勳著革職拏解來京治罪伊子劉墉亦著革職拏交刑部永常子額爾登額著革職在軍營效力永常劉統勳在京諸子並著拏交刑部所有各本旗籍及任所資財並著查出為償補軍需馬匹之用命直隸總督方觀承辦理陜甘總督事務上諭大學士曰陜甘總督大學士黃廷桂尚未來京現在軍營有應辦糧馬事務著方觀承馳驛前往辦理命參贊大臣哈達哈等查辦扎木參等遊牧事宜上諭軍機大臣曰現在審訊扎木參係與阿睦爾撒納同黨已將伊治罪著傳諭哈達哈等查伊妻子及所屬宰桑等嚴行拘管其從前賞賚物件俱追入官所有户口牲隻什物著查出賞給齊木庫爾再前曾降旨令將班珠爾等之户口牲隻賞給此次效力之喀爾喀王公大臣等今訊其宰桑禪宗並未同謀已加恩將禪宗父子釋放所有户口牲隻並著停其賞給仍交與辦理伊等遊牧之大臣等暫行安插禪宗並著賞銀一百兩命授頭等侍衛阿雅勒虎為散秩大臣平定準噶爾方略正編卷十八
