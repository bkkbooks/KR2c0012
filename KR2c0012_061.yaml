body:
  text: 乾隆二十年春二月丙辰上諭軍機大臣曰達瓦齊雖有罪之人究屬一部台吉大兵進征倘伊屬下見事勢窮蹙將伊獻出或被巴特瑪車凌擒送阿睦爾撒納處毋加戕害一面解釋安慰密派強幹人員畱心看守一面奏聞候朕諭旨遵行至若袞布乃向助達瓦齊肆行暴虐恣奸長惡之人倘見大兵進𠞰料難逋逃俘獻達瓦齊希冀僥倖則斷不可恕班第等一到軍營即縛袞布於達瓦齊前數其罪惡派人押解來京丁巳定北將軍班第等疏奏籌辦留兵屯田各事宜先是上諭軍機大臣曰從前原議於四月内進兵且未深知達瓦齊情形故令於額爾齊斯派喀爾喀兵綠旗兵并䇿凌所屬人等留駐屯田今進兵甚早而達瓦齊之力已窮兵到即可成功其額爾齊斯仍需屯田與否應另行酌辦如需屯田或即於䇿凌等游牧所留人内派往或凱旋後再將䇿凌等人衆派往著班第阿睦爾撒納詳議具奏此次進兵特為平定準噶爾將阿睦爾撒納等四衛喇特封為四汗俾所部咸登袵席若我兵奏凱後令阿睦爾撒納䇿凌等帶領多人前赴熱河朝覲至明歲方囘原處則往返徒勞且於伊等生計無益若派阿睦爾撒納䇿凌等親信宰桑約束兵丁各就其便留於原游牧居住伊等小台吉内有情願留彼者亦准於所獲達瓦齊馬匹牲畜内酌量賞給留駐彼處看守游牧則阿睦爾撒納䇿凌等明歲將伊等家口自喀爾喀地方帶往時諸凡妥協於生計大有禆益此朕為伊等生理籌畫亦著班第阿睦爾撒納商辦併諭薩喇爾知之此時達爾黨阿如已到軍營亦照阿蘭泰著在哨探兵隊内前進烏爾登扎爾杭阿俱著在班第隊内前進但大兵前進後辦理新烏梁海等事務及照料糧餉看管游牧并一切接應俱屬𦂳要著嚴飭留駐烏里雅蘇台之大臣喀爾喀之大員等時刻畱心稍有怠忽班第即指名參奏昨朕曾諭令兆惠往看巴特瑪車凌等今既進兵阿睦爾撒納即派伊親信宰桑再於軍營大臣内酌派一人先遣往巴特瑪車凌處更為盡善兆惠仍辦理驛站糧餉游牧事務今令阿玉錫照管包沁人等特為包沁係新以軍威收服之衆故暫留伊於彼處照管俟事定後仍令阿玉錫駐扎哈沁地方所有包沁人内應放官員并存留得木齊收楞額等名目之處俟奏到日再降諭旨至是班第等奏言臣等接奉諭旨公同商酌現在準噶爾窮蹙大兵一到自可迅奏膚功而平定準噶爾後額爾齊斯地方亦必需駐劄兵丁照管新收人衆其派出屯田兵丁并牛種器械等物既俱備辦應仍照原議辦理至臣阿睦爾撒納䇿凌等俟大功告成後帶領彼處新降人衆瞻仰天顔將所屬兵丁留於原游牧處居住另派賢能宰桑約束其小台吉内有願留者亦准留彼處酌量賞給資生之具俾其看守游牧使無往返之勞仰見聖慮周詳無微不到臣等唯有感激涕零竭力奮勉以圖稍酬高厚巴特瑪車凌現在何處尚無確信俟至噶勒雜特訪問得實差人前往侍郎兆惠現在軍營商辦臺站副都統富德前往查臺俟事竣囘時臣等即㑹同將各臺安設妥協令兆惠速赴歸化城催辦運米事務達爾黨阿阿蘭泰到時俱遵㫖令往哨探兵隊内其進兵後烏里雅蘇台應辦事務交都統莫爾渾喀爾喀副將軍親王成袞扎布公旺親扎卜及舒赫德等在彼駐劄辨理至包沁人等俱係囘子種類若令厄魯特駐彼照管鈐束較難故未令阿玉錫駐包沁地方仍令照管扎哈沁人等現在阿克珠勒等入覲即便囘營所有應編旗分佐領補放官員等事宜俟其到日查辦另奏奏入上諭軍機大臣曰據班第等奏額爾齊斯仍須屯田之處即著照所請行其耕種所得穀石以備接濟往來兵丁口糧亦屬有益若欲撫綏新收人衆於額爾齊斯駐兵則大功告成後伊犂已留重兵兼有大臣駐劄額爾齊斯去阿爾台甚近又何必更設兵駐防著傳諭班第等知之定西將軍永常等覆奏催趲兵丁速赴軍營事宜永常等奏言臣等接奉正月十一日諭旨隨移咨甘肅督撫將應備兵丁駝馬糧餉速為妥辦其兵丁俱令於所定日期之前趕赴軍營二月初一日臣永常額林沁多爾濟已至肅州臣薩喇爾扎拉豐阿陸續俱到查察哈爾一千兵已經久駐哈密其厄魯特阿拉善各處兵丁俱係由口外前往想二月初十間俱可到巴里坤涼州滿洲兵於正月二十二日自肅起程寧夏滿洲兵於正月三十日自肅起程亦可按期不至遲悞至現派滿洲䝉古哨探兵丁内如有不能到者臣等遵㫖於綠旗兵丁内撥補再自京來寧夏涼州等處敎習厄魯特鎗法之健銳營䕶軍校艮音泰等十八人俱情願前往臣等即帶至軍營以備驅遣臣等度量馬力極力趲行俟到巴里坤後將彼處辦理情形并薩喇爾等帶兵前進之處另行奏報奏入報聞密諭定北將軍班第上諭軍機大臣曰現在阿睦爾撒納領哨探兵前進嗣後如有合奏事件批囘後班第閱過即寄阿睦爾撒納閲看若班第獨奏或特降諭旨俱不必寄發可即密諭班第知之命參贊大臣鄂容安採訪西陲輿地上諭軍機大臣曰漢時西陲塞地極廣烏魯木齊及囘子諸部落皆曾屯戍有為内屬者唐初都䕶開府擴地及西北邊今遺址久湮著傳諭鄂容安此次進兵凡準噶爾所屬之地囘子部落内伊所知有與漢唐史傳相合可援據者並漢唐所未至處一一詢之土人細為記載遇便奏聞以資採輯協辦陜甘總督劉統勲奏報辦理馬駝情形劉統勲奏言臣前因調來馬匹臕分不盡充足恐難供先進之用當將阿拉善兵五百名可否歸入後隊俟與將軍督臣永常面商辦理先行具奏緣彼時所調之馬全未到肅誠恐馬力不足有悞先驅是以有兵衆不如馬強之議嗣將涼莊解到馬三千八百餘匹内分别挑驗莊浪之馬可用者居多涼州亦尚有可用之馬共足二千餘匹加以涼鎭營馬三千匹已足敷將軍大臣章京等自肅出口及官兵進發之用阿拉善官兵目下猶未到肅而所調之馬已經踵至是阿拉善官兵到肅前赴軍營亦無馬匹不敷之處今將軍永常副將軍薩喇爾等於二月初一初二日先後抵肅遵奉諭旨將原派寧夏涼莊察哈爾厄魯特阿拉善等兵及貝勒車木楚克扎布公丹拜公額林沁等兵并瓜州哈密囘兵共六千一百餘名一併先進臣遵將此地現有馬匹儘數籌調并將哈密及軍營原調餘駝與裁減分例抽出之駝䭾載軍糧復議將後起官兵戰馬抽撥二千匹豫備更換其換存之馬即留軍營牧養於後起之西安滿洲兵出口時減給馬二千匹俟到軍營後將換存牧養之馬酌量添給現經該將軍等繕摺奏聞臣隨即派委將弁解送軍營其餘一應駝馬口糧等項臣一面即飭解送馬駝將弁及派出運糧委員作速遵辦奏入報聞命寛免議處寧夏副都統和起等上諭軍機大臣曰永常等參奏寧夏副都統和起侍衛海福於所帶兵丁惟領兵九百名前往留一百名在後尚未出口請將和起海福交部議處寧夏兵一千名原定於四月内前赴軍營後因歸於哨探兵隊内令和起催趲前進伊等隨將輜重留後派兵百名守䕶帶領兵九百名迅速前往尚屬奮勉且已具奏在前非無故遲畱者可比著從寛免其議處密諭定北將軍班第查察阿睦爾撒納上諭軍機大臣曰前阿睦爾撒納以托忒字奏請賞給勅書印信以便招集伊從前散失人等朕隨諭以平定準噶爾後將伊舊日所有人等即令與伊㑹合居住不必另給勅書印信不識阿睦爾撒納接到此旨情形若何議論若何著班第即行奏聞又據班珠爾納噶查告稱將阿睦爾撒納封汗帶領哈薩克人等瞻仰朕躬之處朕已降旨將四衛喇特台吉俱行封汗哈薩克事務俟平定準噶爾時令班第薩喇爾辦理具奏亦已諭知阿睦爾撒納矣此旨何以未經覆奏亦著詢問班第將阿睦爾撒納近日言動舉止密加查察據實陳奏戊午上諭軍機大臣曰班第帶領兵三千名起程之後其續到兵丁著哈達哈酌帶一二千名速行前往與班第同進或略於班第之後𦂳相接應著傳諭哈達哈知之己未參贊大臣鄂容安奏報揀選綠旗兵前赴軍營事宜鄂容安奏言二月初四日接奉諭旨恐先進官兵一時不能到齊令臣於安西哈密等處綠旗官兵内揀選豫備俟薩喇爾一到即行前進臣思北路先進官兵既於二月十五日内即行進發且巴特瑪車凌又率哈薩克兵往擒達瓦齊則西路先進之兵尤不可緩看此機㑹惟以迅速為要無須多兵隨即行文鄂昌豆斌令將安西所派兵内現在本城之三百名即日料理起程務於二月十五日内至巴里坤軍營臣星夜前赴哈密將彼處兵内揀選七八百名或千餘名計涼莊官兵一千察哈爾官兵一千合之現添綠旗兵丁巳有三千餘名即寧夏官兵厄魯特兵不能趕到亦儘足應用其所需馬駝口糧等項臣到哈密即行通融妥辦務令齊備並即率領先赴巴里坤今聞薩喇爾等二月初一日已到肅州一抵軍營即可前進無悞奏入報聞庚申協辦陜甘總督劉統勲奏報甘涼等處官兵到肅起程日期劉統勲奏言本月初八日延綏鎭總兵傅魁來至肅州現在甘涼官兵即日過肅臣即令該總兵就便帶領甘涼官兵出口沿途管束彈壓又貝勒羅卜藏多爾濟亦於本月初五日帶領阿拉善官兵來至肅州臣照例辦給馬駝口糧鹽菜等項催令前赴軍營諸處官兵所帶駝馬有餘兼程前進尚可與哨探官兵一同進發奏入報聞定北將軍班第等奏報編定扎哈沁旗分佐領事宜班第等奏言扎哈沁人等編次旗分佐領補放官職各事宜原議俟瑪木特囘時辦理今臣阿睦爾撒納色布騰巴爾珠爾帶領哨探兵於二月十二日起程臣班第亦帶領次隊兵隨後進發不及候瑪木特到時公同辦理是以臣等公議即遣人㑹同翼領阿玉錫令先辦編次旗分佐領之事其應補放佐領得木齊等官及所留收楞額等人俟瑪木特囘時公同揀選再與臣等騐看補放奏入報聞定北將軍班第等疏奏辦理分給馬匹事宜班第等奏言臣班第在京與軍機大臣㑹奏現在軍營及各處購買馬匹可得十一萬有餘除應付哨探兵及續進大兵需馬七萬有奇尚餘四萬匹參贊大臣哈達哈等往喀爾喀處揀選馬匹料亦可得數千俟到軍營後徹底清查悉心籌辦今查明已到未到馬匹内除賞給阿睦爾撒納等并前次進兵乘騎及厄魯特等騎去未交馬匹外實存馬三萬六千餘匹又陸續收到馬三千餘匹共三萬九千餘匹除揀選二萬六百餘匹解送卡倫以備六千哨探兵乘騎外所餘馬一萬八千餘匹或因前次進兵未經休息或適從遠處解來俱欠臕分俟草長牧肥方可適用其各處未到馬匹共六萬有餘除舒赫德親往翁金達什和碩地方查辦外餘皆節次差催飭令陸續趕到以備大兵前進又哈達哈於喀爾喀各旗選得馬一萬七百餘匹陸續即到一并揀選堪用者解送卡倫備用復查哨探兵於二月十二日起程後大營聲援兵及屯田等兵亦應陸續前進今察哈爾副都統銜栢起帶兵二千名於二月中旬可抵烏里雅蘇台而昭烏達兵二千名亦將次到營俟此兩次兵到時將馬匹口糧妥辦臣班第帶領前進此後續到兵丁辦令起程之處令都統莫爾渾親王成袞扎布監辦俟大兵盡行起程後再將成袞扎布遣往屯田地方辦理事務奏入報聞準噶爾噶勒雜特部人齊倫來降命賞給安插如例諭西北兩路將軍㑹兵前進事宜上諭軍機大臣曰據班第等奏稱來降之噶勒雜特部人齊倫告稱噶勒雜特之宰桑哈薩克錫喇都噶爾等俱向伊犂遷去阿睦爾撒納之兄巴特瑪車凌等皆已敗出阿睦爾撒納謂其言荒唐無據噶勒雜特人等聞我兵收服包沁雖遷移他去我兵撒囘伊等自仍歸原游牧居住且此際牲畜疲瘦又安能遂至伊犂所見甚是但既有此言則達什敦多卜等為前哨兵必須有兵接應方合機宜著傳諭西路將軍副將軍等仍照阿睦爾撒納等所奏兩路大兵至博羅塔拉㑹合前進勿拘泥從前所降之旨再都噶爾原有投順之意今達什敦多卜等又前往擒拏巴朗想都噶爾必聞我兵進發前來投誠巴特瑪車凌即眞敗出諒亦不遠聞阿睦爾撒納領兵前進亦必來尋伊弟阿睦爾撒納惟相度事機小心辦理為妥再巴朗背恩逃竄反揑浮言阻撓歸順之人甚屬可惡伊現在居近北路或聞大兵將至逃往西路亦未可定薩喇爾務遵前旨訪得巴朗信息即另派兵先行前往擒拏巴朗解送京師正法勿令遠颺又諭曰北路哨探兵起程後班第隨領兵數千尾之而進西路薩喇爾領哨探兵起程後永常亦當領兵繼進索倫巴爾虎兵前往西路約計二三千名永常可即帶領前往與哨探兵相為接應其大兵再為陸續前進至前後如何通信俾呼應相通與薩喇爾等商議妥辦將此傳諭知之壬戌諭定北將軍班第等上諭軍機大臣曰據班第等奏大兵五月内可到伊犂到彼之後事勢既定令阿睦爾撒納㑹同將軍大臣等將續行應辦事宜商辦妥協再帶領準噶爾各台吉前赴熱河入覲大約九月初旬可到阿睦爾撒納深知彼處情勢至伊犂時一切與班第㑹同定議自應妥協至衆台吉前來入覲䇿凌䇿凌烏巴什訥黙庫班珠爾等俱係參贊大臣彼處無應留辦理之事儘可帶領前來著傳諭班第阿睦爾撒納俟到伊犂後其台吉頭目即著䇿凌等帶領入覲阿睦爾撒納在彼處暫住將一切規模辦定再行輕騎前來如此則辦理彼處事務及帶領入覲之人可無兩無貽悞又諭曰覽班第等所奏軍營情事阿睦爾撒納不無欲獨成大功之意彼為將軍議事時自應向前但薩喇爾瑪木特亦皆將軍參贊大臣凡事宜㑹同商辦則將來大功告成不得謂為伊一人之力彼雖欲專擅亦不能矣著傳諭班第留心辦理切勿令彼先行獨辦然後告之班第轉奏也再帶領入覲之台吉人等若至九月未免太遲但過於催促又恐阿睦爾撒納生疑朕意將應入覲之台吉人等派䇿凌等帶領先來阿睦爾撒納暫留彼處酌定規模亦不必久駐不過月餘即可兼程前來朕已另降諭旨至彼處一切應辦事務俟阿睦爾撒納起程後班第可仍遵前旨與薩喇爾瑪木特等商議妥辦此朕密諭班第之旨著班第悉心體㑹愼勿洩漏癸亥定北將軍班第等疏稱辦理派撥兵丁起程事宜班第等奏言本月十二日哨探兵起程起隨令屯田兵起程并聲援兵亦應接續前進從前所派喀爾喀四部落之聲援兵節次咨催尚未全到除將已到者辦令起程其未到者即於現在此處之喀爾喀兵内頂補先派二千令其隨屯田兵前去留兵一千在布拉罕地方駐劄其一千在哈達青吉爾布拉罕青吉爾等處駐劄作為哨探兵後聲援照管臺站豫備接應再於續到兵内派一千名前往亦在青吉爾等處駐劄查聲援兵内除派出屯田兵七百名外看守烏里雅蘇台倉庫應存兵二百豫備烏里雅蘇台大臣差遣應存兵二百看守塔米爾倉庫應存兵一百照管三項厄魯特游牧應各存兵一百大兵進後喀喇阿濟爾罕等處既不用兵駐防俱撤令各囘游牧唯奇爾吉斯淖爾之扎拉圖地方所駐兵三百名原為堵禦新烏梁海等之出路未便全撤應酌減一百令扎薩克台吉齊巴克扎卜帶領照舊駐防所餘兵一百名令其照管屯田等處至管轄屯田兵有原派塔爾瑪善現在齊齊克淖爾居住屯田兵由彼經過即令前往額爾齊斯等處詢問可以屯田處即行耕種俟親王成袞扎布將後隊事務辦畢即往額爾齊斯公同商辦派出管轄聲援兵之郡王巴扎爾什第公達爾扎巴圖孟克齊旺多爾濟尚未到營兵丁起程之時暫令協理台吉管旗章京等帶領前往如途間遇本隊大臣即令交明管轄奏入報聞甲子定北將軍班第奏派侍衛奇撤布等照管包沁游牧班第等奏言新降包沁人等安插齋拉罕地方原令齊齊克淖爾之軍營大臣帶管今大兵前進撤囘齊齊克淖爾之兵包沁人等不可無人彈壓臣等商之瑪木特擬派三等侍衛奇徹布同協理台吉達瑪林前往照管包沁游牧併將瑪木特派出之扎哈沁得木齊阿巴䇿凌等令其相助奏入上從之命收服歸降人等不必遷移内地上諭軍機大臣曰現今達什敦多卜前往阿睦爾撒納亦領兵前進噶勒雜特人等諒必歸順但伊等投誠後必將其游牧内移則新附者未免過勞而我軍亦多一番部署著傳諭班第等於噶勒雜特人等投順後擇其宰桑頭目應帶至軍前者即行帶往餘皆不必遷移内地仍令於原游牧處居住將來歸順之人俱著照此辦理定北將軍班第等疏奏仍令瑪木特在哨探兵内前進班第等奏言臣等前奉諭旨瑪木特恐於進兵之前不及前赴軍營即不必令在哨探兵内行走今瑪木特已於二月初七日趕赴軍營應仍令其帶兵前進協辦軍務奏入報聞乙丑命議處遲悞馬駝之喀爾喀副將軍公格勒克巴木丕勒定北將軍班第等奏言上年八月奏交喀爾喀副將軍公格勒克巴木丕勒購買馬駝屢催未到僅以空文含糊咨覆查格勒克巴木丕勒係効力贖罪之人理應倍加奮勉乃以馬駝重務於去秋交銀購買至今尚未解送殊屬不合應請旨交部嚴加議處奏入得旨該部嚴加議處具奏諭定邊右副將軍薩喇爾等辦理進兵事宜上諭軍機大臣曰鄂容安奏䇿凌䇿凌烏巴什等兵於十一二日可至軍營䇿凌孟克等兵内有一半歩行十五日前後尚恐未必能至朕先令哨探兵於十五日前起程嗣又令照原定二十八日之期今看此情形即二十八日亦未能趕到著傳諭薩喇爾等若已經趕到即日帶領起程倘或不能則不必守候伊等即帶領别項兵丁先進交與賢能之員俟其到後撥給馬駝等項隨後再進如此項兵丁為數無幾又非𦂳要得力之人則可不必帶領前往即將伊等安設臺站以備驅䇿再現在侍衛拜唐阿甚多若於四五臺之間將侍衛拜唐阿安設一員約束稽查往來驅遞甚為有益薩喇爾等即遵旨辦理諭定西將軍永常等酌辦官兵分起前進事宜上諭軍機大臣曰劉統勲奏先進各兵候齊集進發尚須時日不能不於裹帶之外另給口糧以資兵食先進兵丁若俟齊集後一併進發則恐行走壅滯不若以兵到四起約滿二千名即令帶領前進如此則聲勢聯絡後先可以接應亦合用兵機宜著傳諭永常劉統勲等所有各路應行先進之兵到營約滿二千即照此辦理嗣後陸續到營即陸續進發均以二千為率巴里坤軍營無須另辦口糧再西路續進之兵原撥一萬六千名倘前隊已足敷用可以迅速成功不須復行多進即將最後兵丁酌量停止不必拘定前數可併諭薩喇爾等知之參贊大臣鄂容安疏奏籌辦官兵及裹帶口糧事宜鄂容安奏言臣於初六日到哈密詢知厄魯特兵於十一二日可到哈密相近地方則先進兵内即寧夏官兵不能趕到已有四千之數再運到哈密口糧先進官兵已足敷用惟運糧駝隻及應給厄魯特之馬駝因先進之期甫經更改尚未趕到事關軍務機不可失未便拘泥貽悞查原議先進官兵口糧自行裹帶四十日官為䭾載八十日今䭾隻既未到齊口糧又關𦂳要臣酌量自行裹帶六十日已有兩月之糧審度事機諒可成功且沿途凡有平定地方均可接濟其餘六十日口糧已行文嚴催至先進兵丁所需馬駝口糧火藥鉛彈等項臣俱不拘原議無論何項通融趕辦總於二三日内齊備臣即自哈密進發二月望前可抵巴里坤俟薩喇爾一到再公同商酌妥辦又厄魯特之兵需用茶觔軍行之後無處購覔亦於哈密現在舊茶内酌撥一千封搭運備用奏入報聞丙寅定北將軍班第等疏奏辦理扎哈沁等納貢派兵事宜班第等奏言臣等屢奉諭旨隨查扎哈沁包沁人等在準噶爾時因係駐防邊境每年冬季進獻獸肉間隔一兩年協助養贍喇嘛之牲畜一次如有出兵及差往西藏諸事即派令資助臣等愚見既䝉聖恩豁免伊等今歲貢賦自明年始令交納應俟大兵凱旋後再行定議妥辦總管阿克珠勒等既情願効力軍前俟其到軍營日照例辦給馬匹盤費等項令其趕赴臣阿睦爾撒納等帶兵過齋拉罕時酌量於包沁人内揀選二三十名賞給整裝銀兩帶往軍營奏入報聞平定準噶爾方略正編卷七
