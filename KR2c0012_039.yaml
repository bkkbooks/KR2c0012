body:
  text: 雍正十三年秋九月己亥皇上御極辛丑命加賞軍營兵丁上諭總理王大臣等曰出征兵丁勞苦效力甚屬可憫現在軍前之滿洲䝉古漢軍兵丁各賞伊家一月錢糧軍營更加賞一月其在軍營之緑旗兵丁亦加恩賞給一月命額駙策凌留駐軍營上諭王大臣等曰額駙策凌忠誠為國實心效力軍功懋著皇考深加奬賞委以軍營重任今策凌聞皇考大事必欲急赴京師恭謁梓宫并見朕躬朕亦思召見之商定軍營大事但現有準噶爾乞和定界之事甚屬緊要夷使未至正當嚴防緊備之時額駙責任甚重不可暫離軍營皇考本欲今秋調平郡王進京公慶復現差往軍營代平郡王慶復初至不能深悉軍務額駙策凌可専心一意助慶復商酌辦理候準噶爾夷使復到議定邉界事竣後再行來京謁梓宫見朕亦復不遲此際辦理軍務嚴謹防範之事惟額駙是倚著密諭額駙策凌知之癸丑訓飭總理王大臣辦理軍機大臣等上諭王大臣等曰前內大臣海望自北路軍臺回京時奏稱鄂爾昆發遣人犯在彼種地並無實濟且恐日後人數漸多致生事端似應改發他處彼時皇考以鄂爾昆現有大兵駐劄豈有不能彈壓之理此奏不合曾經降㫖教導今總理王大臣及辦理軍機大臣等議覆此事並無定議之語殊有觀望之心及朕降㫖諭令再議而王大臣等仍復游移其說介在兩岐是王大臣等尚未知皇考聖意也朕伏思皇考之意蓋以此等發遣之犯原係身獲重罪之人其發往軍前種地者乃保全之大恩令其效力贖罪耳若其中果有情罪寃抑不應發往者乃辦理刑名大臣之錯誤自應聲明具奏寬釋其罪方於情理允協若本無寃抑之情只因其不善開墾遂爾改發內地以兵丁代之是使獲罪之重犯又不肯急公趨事者轉得遂其僥幸之心矣且兵丁等平時職業惟在騎射當差耕種之事非所素習若以不能力田為辭則將遷移內地之民往耕邉塞之地乎此事之斷不可行者若以此地不應聚集多人將嗣後發遣之犯改發他處尚屬可行似此已發之犯豈有更改他處之理且無論大軍在彼儘足彈壓即使無兵亦毫無可慮若以伊等不能耕種則自應令該將軍大臣等嚴加督率定為賞罰之條以示懲勸况耕種本非難事豈工作伎藝之比若肯用力人人能之其所以茍且因循未收實效者皆該管官員疏忽怠玩之所致也海望心地純良但識見平常且有固執己見之處伊所陳奏豈可盡以為是爾等之意想以朕降特旨令海望署理戶部尚書且不時召見遂起觀望之心將伊陳奏之事向奉皇考申飭者仍復含糊議覆甚屬不合凡辦理天下之事惟有物來順應不可豫存是非可否之見於胸中不但海望所言即莊親王果親王大學士鄂爾泰張廷玉為朕所深加任用亦不可因其所言盡以為是蓋識見不到思慮未周之處人所常有也不寧惟是即朕之諭旨倘有錯悮之處亦當據實直陳不可隨聲附和如此則君臣之間開誠布公盡去瞻顧之陋習而庶事之不就理者鮮矣諸王大臣等日在左右尚不知朕心未免觀望之意則在外臣工之未曾接對者又當何如乎此事若非朕看出豈不至於錯悮向後當以此為戒並將務盡虛公持平之道曉諭內外臣工共知之己未命遍恤陳亡受傷官兵等上諭王大臣等曰朕聞和通呼爾哈之役諸路官兵及東路兵丁俱猶豫觀望亦有棄營先回者祗餘京師右衛之舊滿洲兵奮勇衝擊雖年少者亦皆效死進戰不退是以盡忠者甚衆此等效力陳亡大臣官員兵丁忘身報國殊為可憫而未及加恩者今尚有之從前皇考所以不即遍恤者特因準噶爾之事未定欲令在外辨兵愈加黽勉圖功故暫緩之以待事定再行加恩也今遭皇考大故準噶爾復陳請乞和朕不可不推廣皇考隆恩著該部詳確查明將伊等宜如何加恩之處議奏西路官員兵丁內有似此效力陳亡未及加恩者亦著查明將如何加恩之處議奏至於出衆效力身得重傷現在軍營未經敘奏之辨兵亦著該管大臣等查明具奏候朕加恩癸亥命議軍需各欵折中定價報銷上諭王大臣等曰西路軍需從前嶽鍾琪辦理之時草率從事於一切物件定價減少不能敷用又因用兵日久兵馬加增以致物價日益昻貴而甘凉肅等處尤甚皇考聖心軫念欲周知地方情形特命該處大臣將米穀草豆時價兩月一奏交戶部軍需房以備稽查近年以來陜甘督撫等奏銷軍需本章內有照定價者有照時價者更有多於時價之外者業經該部將不符定價各欵駁令查核朕思各案軍需若概照定價核銷則官員不免受纍若但據承辦官開報竟照時價准銷恐地方有司於開報時價之時即豫留餘步以為冒銷之地二者均非公平之道現在奏銷案件若不斟酌定價則部內察核既無準則而外省奏報亦無所適從徒為文移往返駁詰咨查於事無益其如何按照地方折中定價斟酌合宜俾官吏無賠纍之苦國帑無浮冒之弊著總理事務王大臣㑹同九卿悉心確議具奏其從前駁查案件或竟照時價或即照現議折中定價准其開銷之處亦著一併議奏再軍興以來承辦各官若有借軍需名色派纍百姓者著該督撫即行嚴參重治其罪若該督撫不據實參奏經朕訪聞必將該督撫一併重處冬十月壬申定邉大將軍平郡王福彭奏鄂爾昆築城事宜福彭奏言鄂爾昆建築城垣共撥滿洲䝉古緑旗兵五千七百六十八名於七月二十日興工城周一千八十丈基厚一丈三尺上廣一丈髙一丈四尺築土九尺垜髙三尺寬四尺垜間相去各二尺五寸四面共開三門建樓三其西面無樓去蓋屋三間角樓四三面設甕城城外四面濬濠城中亦如之引鄂爾昆河水以為池南門之內兩旁設銀庫米倉收貯軍器等房及兵丁鋪房共二百五十八間北門之內向南十二丈設土臺一髙一丈六尺寬十丈長五丈臣等謹按前者烏里雅蘇台築城共撥兵一萬一千三百五十名每人計十日給糧八升三合築臺兵一千八百名人賞給羊一隻雍正十二年四月蓋造倉庫撥兵四千四十八名每人日給銀六分又撥緑旗兵一百五十名人賞給羊一隻今築城之兵減半於前每人日給銀六分計工一月應人給銀一兩八錢折羊一隻價值一兩另給銀八錢營總以上官每人賞緞一匹其餘各官半匹中間出衆效力者加賞銀牌一面以示奬勵城工告竣當即咨部報銷王大臣等議應如所請奏入上從之乙亥命豫籌邉備事宜上諭王大臣等曰乃者因準噶爾遣使乞和故令北路大兵撤回駐鄂爾昆其許準噶爾乞和之事雖尚未定朕意以為和與不和總無關係惟在我籌辦協宜計及久逺耳蓋大兵之興原欲保護喀爾喀等若曠日持久我兵屯駐之地悉喀爾喀之地一切需用牲畜及遊牧行走不免有害於喀爾喀之生計既於喀爾喀等無益而糜費國帑勞瘁兵力常在極邉屯駐亦非國家之長計逺慮且戌守之處太逺仍屬無濟當量其近邉要害之地以鎮守之縱使準噶爾賊冦復萌侵擾喀爾喀之意但越阿爾台嶺逺行數千里兵寡力微豈能獲利如欲大集其衆而來近者自額爾得尼招大創之後鋭氣已折又厯年經我兩路大兵拒截人馬傷殘亦安能一時遽為整理其外况有哈薩克布魯特與之搆難設不自顧悉其遊牧以全力深入我境斷不能獲利何以旋歸耶然在我惟當嚴為之備雖賊冦潜窺不使得逞必令負創而還則自知震讋邉境可以永固於䝉古生計與我之兵力國帑俱受其益至於辦理之道戌兵宜於何處駐劄喀爾喀內扎薩克遊牧之地宜如何守護卡倫如何安設糧餉如何辦運均俟平郡王到日會同總理事務王大臣及傅鼐等詳悉確議具奏事雖未定而先事裁審則條理精詳其於久逺之計庶幾有裨癸未定議運米移臺事宜內大臣海望奏言現今大兵駐防鄂爾昆軍營所有官駝數萬隻别無所用若以給臺站䝉古等令其運米則運價大省於䝉古等生計亦有裨益按自歸化城至鄂爾昆應編置臺站三十二又自第十三臺由歸化城入殺虎口較之由張家口稍逺一二百里向者亦嘗於歸化城設臺今既由歸化城運米請自第十二臺至殺虎口之站悉行移撤仍接張家口駐劄如故每臺請給官駝一百五十隻駝屉繩索一百副三班更代日用駝五十隻運米一百石每年計八閲月可運米二萬四千石臺兵原額六十名今增丁役二十以四十名輪班運米其運米之月加給銀一兩在臺參領章京驍騎校等各加給銀三兩領催加給銀二兩牽駝往來每臺各給官馬三十匹計駝四千八百隻馬九百六十匹倒斃不得過十分之三駝一千四百四十隻每駝官價三十兩需銀四萬三千二百兩馬二百八十八匹每匹官價六兩七錢需銀一千九百二十九兩六錢每年增給䝉古官員兵丁錢糧需銀二萬九千四百四十兩又每年修補駝屉繩索三千二百副每副給銀一兩需銀三千二百兩每年運米二萬四千石一石需用口袋繩索銀二兩諸項合計需銀十二萬九千餘兩較范育馪之運價可省銀十八萬二千九百餘兩較都統丹津等之運價可省銀十二萬五千餘兩其臺站應如何移置請令總管五十四辦理尋五十四奏言前者阿爾台一路軍臺曾由殺虎口等處設站後以路繞改設於張家口自第一臺至鄂爾昆拴馬大臺二十五腰站十四戈壁中拴駝大臺四腰站二凡四十五處今既設運米臺站其腰站當撤者應如海望所奏悉行議撤自歸化城至鄂爾昆設臺遞報三十二處其運米自歸化城入殺虎口路實回逺請自張家口第一臺至歸化城設八臺歸化城三十二站用丁役八十駝二百隻張家口以外八站用丁役四十駝一百隻其移臺之事俟明年夏間青草盛時辦理王大臣等議覆應如所請奏入上從之甲申定議額爾得尼招運糧事宜都統丹津奏言今年自歸化城運米赴額爾得尼招凡四萬八百石原議募內扎薩克等牛車一萬輛用喀爾喀等官駝一萬隻已辦理訖臣等伏思官駝宜善牧以備用請以明年喀爾喀等應運之糧不用官駝運送其腳價悉給臣等更募商人駝隻挽運可以節費再者臣現督辦范育馪米石事據云育馪等所借內倉十萬石已納歸化城倉收貯聞今年山西巡撫石麟運米到歸化城多派屬吏竭蹶從事請明年運米赴額爾得尼招不必由巡撫辦理即以范育馪還項應用其口袋繩索即以臣等去年節省腳價銀兩在歸化城豫辦庶經費可省應用亦便王大臣等議覆應如丹津所奏明年運米至額爾得尼招用內扎薩克牛車挽載二萬四百石今丹津送致如故其喀爾喀應運二萬四百石停止官駝即以腳價付丹津募商人駝隻挽運至需用之米原議以石麟奏請動撥大同朔平倉米而山路遼逺犖確不平所費腳價三萬餘兩明年挽送費亦如之去嵗曾以二府厫米十萬石借給商人范育馪今值秋收正當交還之候莫若令其就近先以四萬零八百石交歸化城足充明年應運之數餘米仍還原處其口袋繩索即以腳價銀兩節省辦理定於明年五月起程七月中運至額爾得尼招奏入上從之丁亥命酌減軍營委署官員先是額駙策凌奏言京城八旗奉天等三處兵丁及家選兵每營二千現今所編每營或三四隊不一請悉編為五隊增委官員章京管轄家選營中别無間職其管隊章京請以京城所調餘員摘委驍騎校等即於本營選委再前鋒營兵丁八百亦酌增委章京護軍校等凡應增委二百二員悉於現任參領驍騎校護軍校中遞升一等委署護軍校驍騎校一百六十八人即選兵委署如是則官員兵丁之多寡相當於管轄巡查征戰調遣一切無悮而糧餉亦不致多費王大臣等議應如所請尋平郡王福彭等奏言現今自洪郭爾鄂隆撤還京城滿洲兵二千巴里坤撤還打牲烏拉兵一千其管轄官員亦宜均酌委署臣等議以京城滿洲兵二千請每旗設營總一員參領五員防禦五員護軍校十員管轄打牲烏拉兵一千兩旗合設營總一員參領五員防禦五員驍騎校十員管轄至是王大臣等議覆曰前以大兵進勦故策凌等有增委各官之請今大兵已撤過半所有留駐兵丁無庸增委平郡王所奏似覺過多請令大將軍酌量減損其已委者於缺出時扣除奏入上從之十一月戊戌命免喀爾喀等應賠駝隻定邉大將軍平郡王福彭奏言前以挽送軍餉給喀爾喀等官駝一千五百隻今悉倒斃曾令丹津多爾濟等核報據稱駝隻厯年既久倒斃略盡令各䝉古等並以私駝運送官物臣按前此所給駝隻何以並不遵例嵗報數目請以一半許充倒斃之數一半責令賠補王大臣等議覆曰喀爾喀牧放官駝每年倒斃者百隻中例不得過六隻但向值耗損悉䝉恩免償且喀爾喀等以挽送軍需漸至倒斃似應寬免奏入得㫖此項駝隻交與喀爾喀存收已近二十年又因每嵗運送軍需漸至倒斃著從寬免其賠補議格勒克雅木丕勒移居推河等處遊牧事宜喀爾喀西部落扎蕯克圖汗格勒克雅木丕勒在察罕廋爾附近空圭等處遊牧雍正九年因準噶爾侵犯移居鄂爾昆迤西哈洛那等處以其地不利畜牧奏乞移推河伊克鄂拉翁金等處住牧不惟生計可復且與軍營較近效力尤便王大臣等議請令額駙策凌王丹津多爾濟等詳議具奏尋策凌等奏言格勒克雅木丕勒等旗住哈洛那不便牲畜誠宜遷徙但所請之地現在王得親扎卜台吉阿寶春丕勒班第達胡土克圖等並住其地復令其雜處未便應令所屬八旗以那壘察罕和賴西伊克鄂拉等處為界就推河鄂羅克淖爾和爾博爾津阿爾察喀喇托和東伊克鄂拉山隂瘦濟迤西一帶居住王大臣等議覆應如所請奏入上從之己酉加恩掩埋烏遜珠勒陳亡遺胔大將軍慶復奏言臣赴軍營時奉皇上諭㫖聞烏遜珠勒之役陳亡遺骸未經埋藏伊等皆力戰死事之人暴骨原野深屬可憫爾至軍營即選髙行番僧二人到所在誦經埋骨臣即遵㫖同額駙策凌參贊大臣欽拜等酌議皇上如天之仁澤及枯骨不獨死者銜結九泉凡在見聞莫不感激但方冬遺骸為雪所掩求之難得臣等請俟明年積雪消釋即遣髙行僧二人大臣一人更撥軍營兵士仰體皇仁遍索遺骨深埋周掩誦經竣事尋慶復又奏言乾隆元年三月初旬副都統哲庫同喇嘛朋蘇克綽爾濟吹達爾朗蘇前鋒統領塔爾瑪善等到烏遜珠勒盡收所有遺骸掩訖奏入報聞庚戍命卓鼐等辦理鄂爾昆屯政錢糧大將軍慶復等奏言尚書性桂現今辦理軍糧不能親往鄂爾昆屯所今軍前效力原任寧夏將軍卓鼐尚屬可用請令駐鄂爾昆總管屯政錢糧等事原任提督周瑛協同辦理奏入報聞乙丑命復喇卜坦為台吉原任扎薩克一等台吉喇卜坦以烏遜珠勒交戰時未曾身至軍營隨衆擅歸革職尋格勒克雅木丕勒奏言喇卜坦兩次出兵奮勇與俄羅斯議定疆界及挽送米石捐羊助兵厯著勞績罷斥之後深加愧懼自願效力贖罪現在軍營實少諳練之人若給與原職當益加感奮王大臣等議覆喇卜坦可否仍復原職出自聖恩如允其請此等獲罪者並援例乞恩恐有妨軍政須遍行曉諭必如喇卜坦實著勞績一切優長始准保奏此外不得冒味妄陳以抑徼幸奏入得㫖喇卜坦著賞給原職十二月丙寅朔酌減運米腳價尚書通智等奏言現今戶部解送明年自歸化城運米赴鄂爾昆之腳價銀兩至營共三十四萬四千兩臣等給發腳價時面詢商人並云除口袋繩索外每米一石給銀七兩已足敷用加以口袋等項銀二兩計一石給銀九兩較之范育馪等運數每石減四兩扎薩克牛車運數每石減二兩又臣等於今年內扎薩克官駝一萬改用牛車一萬輛運送倉米一萬石又節省銀一萬二千兩官駝留備運送軍需之用又省召募雜項銀二萬餘兩臣等諸事惟期盡心奏入得㫖辦理雖善必於衆人等並無弊竇亦竝無艱難則為更善當節省者自應節省惟不纍商人方是朕之本意此處雪已足矣爾等處所復如何甲戌定邉大將軍慶復奏鄂爾昆開墾屯田事宜慶復奏言臣到鄂爾昆即以種地事與額駙策凌等相度形勢其地雖寬平然近山髙下不一雖二河環繞其去水逺者亦不能遍溉必須引水試看方可定議方今積雪遍地河氷盡堅其水土之肥瘠與沙石所在難以立驗且穀種收穫所宜必俟明年試種後始知又募民耕種不能一時遽集請於此間撥緑旗兵一百守營緑旗步兵二百家選兵二百自胡克新至濟爾瑪台擇水土佳處開墾試種小麥豌豆等又都統銜董相緯現在察罕托輝嘗任開渠此處引水灌田及督率兵丁耕種一切請令董相緯辦理所需耕牛給喀爾喀副將軍等銀令其採買鋤犁農具等物察罕廋爾有收貯者即令領取應用未備者令戶部辦理其所解送各種籽粒除所在已有者取用外餘悉行令歸化城都統由臺遞送試種一年有效臣等據實以土宜何穀收穫之數若干堪種田畝可得若干種地人日用所需若干器械牛種所需若干並當於何處築堡以居種地人等動支何項一一合計收穫之數果於國計有益可行久逺並俟將來詳悉確議具奏王大臣等覆議應如所請辦理奏入上從之戊寅命喀爾喀扎薩克等詳議定界防守事宜各抒所見以備採擇上諭王大臣等曰準噶爾雖遣使乞和而防邉之事自宜豫籌縱彼極其恭順遵㫖定議亦不能保其久而不變朕意彼之乞請誠與不誠俱可勿論惟嚴備邉疆而已其嚴備之道又當計其久逺而便益者蓋我大兵之興原為保護喀爾喀而駐劄多年既占其遊牧之地又用其供運之力在彼誠不免拮据而內扎薩克䝉古之在軍營者或有一二無知之徒不免以我等為喀爾喀故以致厯此艱苦為辭殊不知衆扎薩克䝉古等首先歸順於我太祖太宗之時與滿洲無異奔走效力即如一家喀爾喀等雖在後歸順䝉我皇祖皇考厯年惠愛視伊等亦同一家初無二致此次行師非特保護喀爾喀亦為遍安衆䝉古之計也但為時既久事多未便經我皇考洞鑒念黃教生靈欲息軍旅曾降諭㫖朕惟仰體皇考聖心欲悉撤大兵休息衆人現今在喀爾喀戍守之兵宜如何撤回應否仍留駐若干駐劄應在何處其喀爾喀之遊牧如何防護卡倫後殿如何安設之處著詳悉定議具奏再與準噶爾議定邉界之事已經往召額駙策凌王丹津多爾濟俟其到時令與爾等公同酌議此定界之事乃關係衆喀爾喀之遊牧永逺生計必咨詢部衆公同商定始可受益而扎薩克甚多不便並令至京著行文喀爾喀衆扎薩克等將應如何定界及伊等遊牧或用已力防守或仍須內扎薩克與滿洲兵保護著各出已見以聞俾知朕之撤兵並非不念伊等而外視之也特籌其生計有益久逺可行伊等其知朕恩恤之意共計久逺便宜之道定議具奏奏到時朕詳覽衆議其言是者朕將斟酌採用即有未協朕亦容之不加責備也丙戌議酌留駐防兵事宜總理事務王大臣等奏言大兵既撤若喀爾喀䝉古等必需內兵防護請酌留東三省兵五千名駐劄鄂爾昆現今鄂爾昆倉貯米石甚多可支五千人數年之食其察罕廋爾所貯糧三萬餘石亦應運赴鄂爾昆以備支給又歸化城當各路通衢地廣土肥若駐兵於此可以保護扎薩克䝉古等設有調用亦便侍郎德沛曾以右衛地形狹隘又純係沙磧未便屯兵請移駐歸化城南伊克圖爾根等處尚書通智曾請於歸化城西齊吉塔爾築城墾田將來鄂爾昆若仍用內兵駐防則歸化城只需兵六千請於右衛兵四千內酌撥三千并軍營所撤家選兵二千熱河鳥鎗兵一千並令㩦家駐歸化城若喀爾喀等自能防守鄂爾昆不必留駐內兵則歸化城請再酌增兵四千為一萬人令其留戍設將軍一員總理副都統二員協理所留右衛兵一千名以副都統一員領之仍隸歸化城將軍管轄并請特命大臣一人持通智德沛所奏馳驛往會右衛將軍岱琳卜歸化城都統丹津根敦尚書通智等相視形勢其戍兵如何分駐及築城墾田以足兵食等事詳悉確議具奏再扎薩克䝉古北邉因保護遊牧撥科爾沁等三處會盟兵五千駐烏爾輝音扎罕撥烏朱穆秦蘇尼特等旗下兵二千駐達里剛愛今大兵既撤伊等亦令各歸所在聽候調用再車臣汗部落曾撥兵一千在邉上遊牧操練離遊牧處甚逺亦應撤還再哈密回子等歸順已久亦應駐兵防護今哈密貯米二十萬餘石其賽巴什達里雅墾種田每年可得米一萬餘石不需內地運送現在令查郎阿等酌議安西駐兵事宜若安西增設駐兵五千可即其中撥出二千赴哈密駐守不必更議增兵再哈密安西守邉緑旗兵向隸提督總兵官管轄可以無庸更遣滿洲將軍大臣等奏入上從之戊子命停止移設臺站及用駝運糧尚書通智等奏言前者大兵駐察罕廋爾原於歸化城設臺嗣以將軍宗扎卜奏由張家口直向軍營路近千餘里水草甘美沙磧亦少因議改設頗費帑金後范育馪等亦遂由此運米今若復議移設歸化城不惟道途紆逺且恐於駝隻有損按每站設駝二百運米三萬四千石間日一運用駝五十運米百石往返二日稍有阻滯即須三日至第四日再行起運計日而算必八閲月而始畢則自三月初至十月終矣牧放之駝與飼養之駝不同三月草尚未生四月始萌五月駝隻始得飼草若三月即令遞運勢必疲瘦縱十月歇至二月經八閲月疲勞之瘦駝實難以過冬前范育馪等亦曾以萬駝遞運由察罕廋爾至科卜多每站用駝二百隻夫四十名七八月間駝隻倒斃數千後以不能再運驅駝仍還歸化城遂至倒斃無餘今各站運米之駝雖䝉聖恩許其倒斃十分之三但一經起運不過數年必至倒斃日多若䝉古官兵不能償還勢必有悮運務今軍營運糧四萬石現在臺站所運大半其小半令范育馪等别由歸化城用商人挽運諸商輻輳其運送軍糧兼販私貨即范育馪等亦藉其力若聞設站運米自謂商販不行各變賣駝馬收拾㕓屋異日或糧米不敷别有加運之事一旦購募無人實屬可虞今合計各站倒斃駝馬三分增置駝屉等物運米兵辨之糧餉辦米二萬四千之原價及內地運價繩袋等項約計每石需銀六兩三錢有竒加以軍營領取駝隻六千及繩袋駝屉等物馬一千匹價值又撥用察哈爾土默特人夫六百名支應護送烏里雅蘇台臺站䝉古人家口與送察哈爾土默特人夫家口自本地前往路費各項合計則顆粒未運之先已費帑金二十餘萬計目今奏定之數由臺站運米二萬四千石需銀十五萬一千二百兩臣等悉心籌算詳詢商人亦云用此銀數即可運致鄂爾昆且今軍機事少將來兵數漸減用米漸省應將歸化城之米石暫停量度用兵形勢俟一二年再議移站無礙目前之運務且留餘地以備他日之增運若因張家口臺多費巨一轉移間或量減數站即可節省軍糧馬匹之費倘急議移站以駝運米先增一番經費於軍務毫無裨益臣等為軍機起見不敢因王大臣已定之議稍存瞻顧奏入得㫖此奏甚是交總理事務王大臣等議奏尋經王大臣等奏言現在鄂爾昆撤回大兵惟留駐五千名每年需糧自當漸減近范育馪自請以明年運送軍前米四萬石不用腳價銀兩徑挽運赴軍以補從前虧缺之項又察罕廋爾烏里雅蘇台兩處所蓄米六萬餘石並已運至鄂爾昆合本處所存三萬餘石已十三萬石有竒足支五千兵丁數年之用無庸更運其議移臺站用駝運米應停止并通智等所奏明年用內地扎薩克喀爾喀購募車駝運送之請亦應停止奏入上從之壬辰命恤敘烏遜珠勒陳亡被傷官兵等定邉大將軍慶復奏言奉㫖恩恤和通呼爾哈受傷陳亡官兵並諭西路官員兵丁有似此者亦著核奏議恤臣等按雍正十年七月十四日烏遜珠勒之戰時有調赴駐防兵三百營總敦珠克扎爾布二人率之至什伯圖山溝方欲前發㑹日暮塵埃蔽空呼聲大起遂合衆并力邀截賊路賊衆繞出我兵之後前後夾攻我亦分兵力戰始擊却之二營總乘勢奪據髙險賊又繞出山峯之上憑髙臨下以壓我師二營總命驍勇章京尼雅哈率精兵仰攻賊陳奪據髙峯護軍桂保等生擒二賊築土壘石施發鳥鎗終夜拒戰賊殊駭懼比天明賊見孤軍形蹟合圍數重畢力攻擊我兵鎗矢齊發殺賊益多直至午初賊兵大集扎爾布與兵丁二百餘人悉行戰歿存者僅五六十人箭藥乏竭敦珠克顧語衆人曰我兵少不能據山當各力戰效死以答主恩兵丁人人慷慨自誓直入敵陳敦珠克中鳥鎗死餘衆或死或傷初扎爾布被創十一處已絶至十六日復蘇二十一日始至大營臣等察核訪問始得其詳按烏遜珠勒之役賊以大隊衝擊我師分為數處遂各奪路而歸惟此戍兵三百計不反顧感恩效命存者五十四人受重傷者且四十九揆其義烈非加恩旌别殊屬可憫王大臣等議覆陳亡者請一體加恩負傷者議敘如例奏入上從之平定準噶爾方略前編卷三十九
