body:
  text: 乾隆二十年夏四月己巳命輝特貝勒齊木庫爾與副將軍阿睦爾撒納一同進兵上諭軍機大臣曰從前派貝勒齊木庫爾在屯田處駐劄特因事勢尚在未定屯田地方不可無一幹練之員防守彈壓特將齊木庫爾派往今大兵業經進發一路情形罙入無阻屯田事務易於辦理而齊木庫爾又在伊弟阿睦爾撒納前屢次陳請情願同往軍前效力即照阿睦爾撒納所請令齊木庫爾一同進兵其屯田事務即交與派出之台吉克伯克協同塔爾瑪善辦理辛未協辦陜甘總督劉統勳疏奏添設驛站馬匹事宜劉統勳奏言口外遞送文報軍臺地方空濶每站設馬二十六匹如遇差使絡繹或馳驛人員由塘行走即虞不敷並非口內州縣地方可雇民馬添補者比昨據將軍永常咨稱大兵於五月內即可凱旋現在成功在即塘驛差使必多口外各塘實有應須籌議之處查安提肅鎮兩標俱有備戰餘馬若於此內每塘撥給馬一十四匹於軍臺馳遞甚為有益原安塘站係由驛撥馬即隨馬撥夫現在議增馬匹應即從各營兵丁內派往照料酌給口糧以資食用奏入報聞壬申定邊左副將軍阿睦爾撒納等疏奏集賽宰桑齊巴漢等率衆來降阿睦爾撒納等奏言四月初八日貝子策布登扎布普爾普等文稱據協理台吉達什等領兵至集賽見喀喇阿濟爾罕地方有人游牧即欲擒拿有得木齊丹畢前來告稱我係都噶爾宰桑屬下得木齊情願投誠已差人送信宰桑都噶爾即來投誠初九日集賽宰桑齊巴漢迎於途次告稱我游牧在額米爾河情願歸附前來迎接我等五集賽共六宰桑我兄烏克圖原係宰桑為達瓦齊拘禁今年二月將我補放宰桑由伊犁放回游牧再宰桑達瓦僧克爾二人亦為達瓦齊拘禁尚有舊宰桑策伯克達什策凌杜爾把齊巴漢此三人內杜爾把齊巴漢現在伊犁餘皆在游牧地方我聞大兵前來信息即赴投誠未及送信與衆宰桑伊等居住地方俱逺想一經聞信二三日內亦必前來投降我所管之人一千餘户五集賽原有一萬餘户因屢被哈薩克搶虜止餘七八千户現今達瓦齊附近游牧之人數年來因遇用兵牲畜虧損生計艱難達瓦齊將一切事務俱交恩克博羅特吞圖布衮布等辦理伊日在醉鄉屬下俱各離心今年二月達瓦齊因征哈薩克令五集賽出兵五千餘在察罕呼濟爾齊集預備衆人不從並未前往又十數日前巴朗帶人三十餘户至集賽地方馬匹俱為我等所掠現今流落宰桑達什策凌附近地方此外别無聞見臣等即將曉示準噶爾敕諭宣示齊巴漢不勝欣悅情願派兵效力臣等即令帶兵五十名隨臣等前進臣等酌議五集賽宰桑內齊巴漢已經投誠其達瓦齊欲調伊等之兵又未應付觀此情形則其餘宰桑自必陸續歸附今若即遣兵前往收服恐游牧人衆一見大兵未免易生疑懼因令和托輝特副都統敦多卜宰桑錫哈瑪往集賽地方收服衆宰桑即從彼處派得木齊兵丁將巴朗擒拏并遣副都統職銜達什敦多卜宰桑烏勒木濟前往招降都噶爾再數日內宰桑達瓦屬下得木齊朋楚克鄂勒椿巴圖杜爾巴齊巴漢屬下得木齊納沁哈什哈等因伊等並無宰桑情願歸附陸續前來懇請臣等已許其投誠並選兵一百六十名令隨大兵前進又據將軍班第咨送自伊犁前來之們都哈什哈告稱伊係臣阿睦爾撒納之人自伊犁起程距今止十三日大兵進𠞰達瓦齊尚未聞知日在醉鄉現欲往征哈薩克集兵數千名於額貝淖爾地方令輝特台吉和通額默根管領離此僅一日之程臣思和通額默根現在額貝淖爾與否未可懸定莫若遣人前往將臣投順以來得沾大皇帝任用厚恩并現在帶兵前進情形告知和通額默根諭令早降如不即歸順再行辦理又聞達瓦齊遣宰桑恩克博羅特吞圖布二人往集賽調取兵丁臣知二人俱係達瓦齊信用之人若將二人擒獲達瓦齊情形俱可洞悉因派參贊大臣郡王班珠爾等帶兵三百名前往進攻務期擒獲奏入上諭軍機大臣曰阿睦爾撒納等奏稱集賽宰桑齊巴漢率衆投誠即隨大軍前進並遣副都統敦多卜前往集賽招降各處宰桑俾即派兵擒獲巴朗又遣達什敦多卜招降宰桑都噶爾辦理俱合機宜朕深為嘉豫大功旦晚可望告成阿睦爾撒納等務當益加奮勉以副委任至齊巴漢冀沐朕恩親身迎接大兵甚屬可嘉著加恩授為散秩大臣並遣侍衛德善齎孔雀翎帽衣服荷包等物前往賞賜仍將大功告成後另加恩賞之處諭伊知悉再敦多卜達什敦多卜前往招降之集賽二宰桑及宰桑都噶爾並在伊犁之宰桑杜爾把齊巴漢一聞信息亦必陸續踴躍來降但俟奏聞後再頒賞賜未免遲滯將此四人亦照齊巴漢俱授為散秩大臣各賞給孔雀翎帽衣服荷包等物俟伊等投誠前來即行賞給其台吉和通額默根為達瓦齊統領兵丁駐劄額貝淖爾地方阿睦爾撒納已遣人前往招降諒亦即來投誠但不知伊係何等台吉尚未奏明量給倭刀皮帽一頂數珠一盤亦交與德善齎往豫備賞給嗣後有似此等投誠台吉俱照此頒賞其應得職銜著阿睦爾撒納查明伊等帶來户口多寡分别具奏俟其赴熱河入覲時再行賞給阿睦爾撒納此次辦理可嘉著加恩賜與朕御用珍珠數珠一盤荷包鼻煙壺各一件色布騰巴爾珠爾青滚雜卜瑪木特阿蘭泰班珠爾訥默庫策布登扎布俱著賞給荷包鼻煙壺各一件以示奬勵定北將軍班第疏奏噶勒雜特得木齊穆哈齎等率衆來降先是班第等奏言據管轄聲援兵副都統扎爾杭阿文稱三月二十六日卡倫兵根敦擒獲厄魯特善巴訊係噶勒雜特之人現住綏勒噶圖哈勒塔爾地方其噶勒雜特人衆俱向額林哈畢爾噶遷去惟穆哈齎得秦六七十户未知前來投誠抑或向彼遷移因派公巴圖孟克帶兵二百名前往收服二十七日又獲厄魯特沙喇霍他訊係阿睦爾撒納之人告稱鄂隆古河地方居住二得秦厄魯特人一百餘户沙喇霍他從中逃出途次遇見穆哈齎得秦人等向彼遷移是以復派喀爾喀副都統多嶽特帶兵一百名前往協力招撫至是奏稱據巴圖孟克等於四月初三日前往布圖爾托輝招降噶勒雜特穆哈賚得秦時伊等俱各投順查得木齊穆哈賚收楞額布喇特一得秦共一百二户四百九十五口此內阿睦爾撒納屬下吹扎布等六户三十五口內滿洲三人喀爾喀一户當將得木齊穆哈賚交侍衛薩扣送往軍營其收楞額布喇特即令管轄所屬又將穆哈賚等相近地方博克達屬人十七户一併收服臣等因大兵前進路途已逺招服人衆無庸送至軍營即令在原游牧居住并飭後至兵丁勿令滋擾奏入上諭軍機大臣曰班第奏噶勒雜特之得木齊穆哈賚等率衆投誠理應加恩賞賚但伊等俱係部落屬下得木齊非台吉宰桑可比不必特遣人前往著傳諭班第應酌量作何加恩賞賚之處即於軍營所貯茶葉縀匹內重支賞給以示鼓勵定北將軍班第疏奏烏梁海總管赤倫等回至卡倫日期班第奏言四月十一日接納米爾沙扎海卡倫侍衛琛布里文稱從前遣往烏梁海總管赤倫等六人於三月二十九日回至卡倫帶來察罕薩喇什保等男女二十九人因馬匹疲乏止將察罕及一僕人送至烏里雅蘇台軍營其餘人口牲畜俱派人送至特斯鄂衣渾游牧又據巴爾楚克卡倫侍衛桑古善等文稱四月初四日派出巡查章京兵丁等將投降厄魯特三人帶入卡倫訊係扎哈沁得木齊賽音伯勒克等共男女九口係瑪木特屬下人賽音伯勒克之父兄妻子俱在扎哈沁游牧地方當派兵丁照看送往同居奏入報聞癸酉諭駐劄烏里雅蘇台大臣莫爾渾等籌辦入覲人等馬匹口糧事宜上諭軍機大臣曰莫爾渾等奏稱現在支給各處官兵馬匹口糧外尚餘騍馬牛隻計四千餘并羊五萬隻擬送往屯田處交成袞扎布牧放備用軍行接濟馬匹口糧自當豫為籌備但現在裹帶之糧已屬寬裕而成功為期甚速莫爾渾等並未計及惟亟亟以接濟為辭此與永常節次所奏無異著將朕訓示永常諭㫖及薩喇爾等咨覆永常不必接濟之摺一併抄寄莫爾渾等閲看現在運送係騍馬牛羊尚非糧石可比姑照所請送交屯田處牧放此時阿睦爾撒納等應已奏功無須此項牲隻接濟將此即留為前來入覲之噶爾藏多爾濟等沿途支用甚屬有益著傳諭莫爾渾等遵朕前㫖入於辦理入覲人等事宜內交與兆惠妥協辦理命加恩賞賚輝特和碩游牧人等上諭軍機大臣曰納穆扎爾奏輝特和碩特等游牧人衆牲口甚少復多病斃且去收成之時尚遙現在情形深堪軫念輝特之阿睦爾撒納和碩特之班珠爾自去嵗率衆投誠朕屢次賞給口糧牲畜以資接濟但伊等來時牲畜等項俱被中途搶掠生計甚屬艱難且阿睦爾撒納等現在效力行陳奮勉從事著加恩再賞給輝特和碩特人衆兩個月口糧以示體恤即於軍營所貯米石內動支賞給並傳諭阿睦爾撒納班珠爾等知之五月乙亥諭定北將軍班第慎密防範阿睦爾撒納上諭軍機大臣曰班第奏阿睦爾撒納文稱前後隊兵丁口糧未全裹帶或將牲畜易换或將煙茶銀兩運解沿途自行交易阿睦爾撒納此言甚屬錯謬兵丁口糧未全給領者原為伊等在途難於携帶起見即陸續給領亦自有一定日期豈有原領口糧尚未全帶反行續給之理又伊稱兩路兵㑹合駐劄若不豫辦接續口糧似乎少費籌酌兩路兵一經㑹合即當長驅直入又何庸駐劄守候伊原奏四月十五日可抵博羅塔拉地方今已至十七日尚駐劄集賽查伊屬下之人此事儘可於成功後從容辦理何必亟亟查辦不過借查人為詞逗留時日竟無迅速奏功之意況欲將伊查屬下人遷移至博羅塔拉地方明係欲藉此時將伊屬下人等豫為糾合俟抵伊犁後將盡攫其財物可以就近竄逸逞其狡詐耳朕用人推心置腹何嫌何疑如係無關輕重之小過不妨置之度外似此貪詐狡獪伎倆畢露豈能逃朕洞鍳班第須察其心跡密加防範不得稍有疏虞再阿睦爾撒納文內又以養贍凖噶爾窮人為言此事斷不可行朕另行降㫖曉諭可將此密諭班第知之又諭曰據班第奏阿睦爾撒納咨商大兵前至伊犁撫定彼處人衆看來窮困者必多其作何養贍之處須豫為籌辦此奏所見非是從前都爾伯特親王策凌輝特親王阿睦爾撒納等逺離游牧前來輸誠朕是以加恩賞賜養其屬下人衆今遣兵平定準噶爾地方正為救伊等於水火令其安享太平若論窮人內地外地各部落䝉古內何處無之博施濟衆勢所不能伊等於歸順後一概妄冀養贍無論萬里之逺運送口糧難以辦理且試問伊等未歸順以前其所資以養贍者何在著即傳諭班第阿睦爾撒納等俟大功告成後將實在窮困者一一查明或於伊等富户內令其兼養即欲更為籌辦不過即以䝉古自養之道令其各籌生計若必須一一辦理養贍斷不可行再阿睦爾撒納等雖不能照原奏日期於四月十五日抵博羅塔拉地方此時定已到彼㑹合直抵伊犁矣大功一成即遵朕屢次所降諭㫖將在伊犁隨將軍大臣等駐劄兵丁酌量存留其撤回官兵即速陸續分起凱旋班第等公同妥協辦理命扎薩克郡王得木楚克為喀爾喀車臣汗部落副將軍定北將軍班第奏言喀爾喀車臣汗部落副將軍公格勒克巴木丕勒因遲誤軍營馬駝事務奉㫖革去公爵仍留軍營效力贖罪其副將軍員缺請㫖補放奏入得㫖得木楚克著授為副將軍丁丑訓諭定西將軍永常及定北將軍班第等擒捕逃人及籌辦新降人衆事宜上諭軍機大臣曰據永常奏新降之布魯特等有三百餘户私自逃歸本處者此等逃人原非甚關緊要之事但永常既聞逃遁即應派索倫巴爾虎兵丁悉力擒捕縱不能追回亦於事體無礙若所存止係緑旗無用之兵則又不如暫停擒捕俟大功告竣此等布魯特自當另行辦理乃永常並未籌及追捕之事苐向噶爾藏多爾濟來使前屢次詢問應否需兵管束似此措詞真不諳事理之甚著將永常奏摺抄寄班第等伊平定伊犁後即將此項逃人另行查辦再永常奏新降之竒齊克巴斯哈等生計艱窘有懇求接濟之意至烏蘭烏蘇等處多有為賊盜者現在準噶爾部內大亂大兵到彼甫經底定焉能保其必無竊盜之人俟綏戢安定之後自當以次廓清至於窮困人口當薩喇爾領兵經過時已經查明或令彼處富户養贍或令耕種自給斷無從內地運送口糧至彼分給之理昨已降㫖曉諭班第等酌量辦理此事亦非永常所能籌辦仍著傳諭班第阿睦爾撒納薩喇爾等遵朕前㫖妥協經理定西將軍永常等疏奏噶爾藏多爾濟遣人赴京請安日期永常等奏言四月十九日噶爾藏多爾濟遣布圖庫前來軍營告稱台吉噶爾藏多爾濟早欲歸降因向多阻隔未得其便今大兵已到現在追隨副將軍出兵效力先遣人進貂鼠三十一張恭請大皇帝聖安欽惟我皇上德威逺播率土輸誠今副將軍薩喇爾方到噶爾藏多爾濟游牧地方望風迎附效力行陳並遣人逺來請安誠心可嘉臣隨派侍衛舒隆阿護送布圖庫等四人至京以遂其瞻仰之願奏入報聞戊寅命賞定邊右副將軍薩喇爾上諭軍機大臣曰據薩喇爾奏新降額林哈畢爾噶等處台吉宰桑俱傾心歸順冀受恩澤惟察其情形俱有不願封噶爾藏多爾濟為汗之意懇將此㫖暫行停止薩喇爾相機酌辦甚可嘉豫著即傳諭玉保將朕所降封噶爾藏多爾濟為汗之㫖不必宣諭薩喇爾自進兵以來諸事奮勉今又能詳察彼處衆人情形為此陳奏甚合機宜不特額林哈畢爾噶等處之台吉宰桑等情有不願倘準噶爾全部誤認以噶爾藏多爾濟代達瓦齊為汗輾轉傳播關係更大今暫行停止不即宣諭則衆人俱無猜疑於進兵事宜大有裨益薩喇爾著加恩賞銀一千兩即有此處遣人送至伊游牧以示鼓勵己邜定邊右副將軍薩喇爾等疏奏沿途偵探達瓦齊情形薩喇爾等奏言四月十三日哈丹地方之得木齊烏勒斯等擒獲達瓦齊遣往哈丹阿巴噶斯之錫伯克沁等十三人前來臣等詢問錫伯克沁等據云達瓦齊尚在伊犁近年以來屢因派兵多事屬人甚為窮迫達瓦齊因額林哈畢爾噶等處竊掠滋擾遣伊等前往辦理於二月初旬自伊犁起程到哈丹地方始知額林哈畢爾噶等處台吉宰桑俱已各率所屬歸誠大兵一到附近達瓦齊之烏魯特克勒特及綽和爾等之鄂拓克亦必俱來歸降臣等向錫伯克沁等將聖主安撫準噶爾全部之㫖並大兵一路無擾各部落皆輸誠歸附之處剴切曉諭釋令伊等回巢布告烏魯特克勒特綽和爾等部落俟此數鄂拓克俱來歸順達瓦齊必更勢窮力竭無可容身之地矣奏入報聞庚辰定邊左副將軍阿睦爾撒納等疏奏招降都噶爾及擒獲逃人孟克特穆爾阿睦爾撒納等奏言前遣副都統職銜達什敦多卜額魯特章京烏勒木濟招降噶勒雜特宰桑都噶爾今烏勒木濟帶領都噶爾並擒獲隨同巴朗同逃之孟克特木爾前來臣等詢得都噶爾素有歸順之心為哈薩克錫喇所阻遷移至集賽游牧邊界今伊兄達什敦多卜之壻烏勒木濟前往傳諭恩㫖向化之心益深踴躍隨即前來投順並情願帶一得木齊及兵六十名隨營效力臣即令其帶兵同進又審詢得孟克特穆爾供上年巴朗逃遁時逼我同行我之母弟並無同逃尚在游牧居住後至竒蘭地方曽遣人告知庫克新瑪木特令即擒拏巴朗伊並未給回信我遂與巴朗分散往依都噶爾度日巴朗於彼處過額爾齊斯依烏梁海宰桑圖布慎處度日今巴朗聞達什敦多卜等前來遂棄其妻子步行逃去臣等現派內大臣瑪木特喀爾喀貝勒那木扎爾車蘇隆厄魯特貝勒剛多爾濟貝子德濟特等領兵三百名星往追擒務獲其孟克特穆爾暫留臣營俟擒獲巴朗時與擒獲之巴布爾等一并解京奏入上諭軍機大臣曰阿睦爾撒納等領兵抵五集賽招降宰桑達什策凌都噶爾等并擒獲逃人孟克特穆爾巴布爾葛蘇爾羅卜藏西喇卜等奏請俟擒獲已朗一并解送來京阿睦爾撒納等辦理甚合機宜但此時曽否到博羅塔拉摺內並未奏及惟於報封外填寫自博羅塔拉起程字樣相彼處地方頗大伊等或才至邊界或到時尚未見薩喇爾是以未及聲明從前薩喇爾奏阿睦爾撒納約於二十一日可到此時想已經㑹合早抵伊犁捷音自可計日而待再貝子克什克公多爾濟車登等帶侍衛台吉等往追達瓦齊所遣宰桑恩克博羅特吞圖布等乃於中途誤中恩克博羅特等之計至今逺揚如恩克博羅特果係换馬逃去豈有復寫字縛於馬鬃自言逃去甚速之理此不過欲緩我兵追趕耳使克什克等果能奮往直前必將恩克博羅特即行擒獲但其擒獲與否於事關係無甚緊要且恩克博羅特即已逃去亦必取道博羅塔拉始抵達瓦齊處則此時路經博羅塔拉或已被薩喇爾擒獲亦未可定其巴朗孟克特穆爾係首先脫逃之人情甚可惡著阿睦爾撒納即遣人將巴朗擒獲同孟克特穆爾一併械送來京其餘被脅同逃之人送往都爾伯特游牧處交與舒明約束收管定邊左副將軍阿睦爾撒納等疏奏宰桑達什策凌率衆來降阿睦爾撒納等奏言前遣喀爾喀副都統敦多卜厄魯特章京錫哈瑪前往鄂爾果楚克地方招降五集賽宰桑策伯克達什策凌等至四月十七日先據噶克布集賽宰桑達什策凌投降前來臣等詢知伊等五集賽內共有噶克布伊克胡喇勒拉布林推素隆杜爾把五鄂拓克內惟噶克布集賽四千餘户因人口衆多設二宰桑分管即係達什策凌及策伯克二人其餘四鄂拓克或千户或不及千户俱有宰桑一人二月間伊克胡喇勒宰桑齊巴漢回至游牧傳達瓦齊之言令五集賽派兵一千在察罕呼濟爾齊集往征哈薩克因春季馬匹疲瘦並未出兵今聞大兵前來誠心效順原派兵三百名前來效力緣此時馬力俱弱未能全到其宰桑䇿伯克亦隨後踵至臣等即令達什策凌隨大兵進發奏入報聞辛巳命賞賚投誠台吉和通額默根上諭軍機大臣曰班第奏稱阿睦爾撒納遣策布登扎布帶兵招服和通額默根宰桑鄂哲特所領兵五百名俱已收降朕前於阿睦爾撒納俱奏時已知其必來歸附是以遣侍衛德善將賞賜之物豫行齎往今大兵甫到果即納欵來降甚屬可嘉著班第於德善到軍營時即將所齎賞和通額默根之物傳㫖頒賜其賞給品級之處俟伊來京入覲時另降諭㫖諭定北將軍班第等遣人傳㫖曉諭哈薩克上諭軍機大臣曰班第等奏稱烏遜呼濟爾察罕呼濟爾等處係當哈薩克孔道現交塔爾瑪善扎爾杭阿等同台吉克伯克宰桑衛徴等帶兵設立卡倫以資防守倘哈薩克領兵來時一靣具奏一面令噶克布拉布林集賽㑹兵一處迎敵仍以禍福曉諭哈薩克令其作速撤兵具見籌辦周密深合機宜此時哈薩克料不能前來即使前來大約仍係阿睦爾撒納之兄巴特瑪車凌一人而已從前阿睦爾撒納曽遣人通信伊兄俟巴特瑪車凌一到即可得彼處實在情形現在兩路大兵已經㑹合膚功指日可成朕意此時正宜遣人往諭哈薩克著班第阿睦爾撒納薩喇爾同選一人前往明白曉諭告以近因準噶爾等擾亂多年互相殘殺茶毒地方朕撫有天下以安輯羣生為心特發大兵戡定準噶爾俾得休養生息不罹兵革之災共享太平之福雖準噶爾素與爾哈薩克為讐經朕平定以後已降㫖嚴禁準噶爾等不得肆意妄行劫奪哈薩克人衆爾哈薩克情願歸誠與否聽爾自為惟須各守邊界不得妄行出境劫奪準噶爾人等倘不謹遵諭㫖必發大兵征𠞰毋貽後悔將此㫖繕就往諭哈薩克其應於何時遣人前往仍相機辦理不必拘泥朕㫖往諭後即將彼處情形詳悉奏聞定北將軍班第等疏奏派兵移駐齊爾烏遜呼濟爾各地方事宜班第等奏言副將軍阿睦爾撒納文稱現在收服之塔木集賽約計户口八千有餘伊等所居游牧寬廣且係新附之衆賢愚莫辦若不駐兵防守彈壓不免盜賊奸宄從中滋擾應將駐劄察罕呼爾濟兵二千名移於齊爾烏遜呼濟爾地方駐劄駐劄烏蘭淖爾兵一千名移於察罕呼濟爾地方駐劄不特可以防範塔木集賽兼可資附近調遣之用臣即知㑹扎爾杭阿等移駐齊爾烏遜呼濟爾地方齊旺多爾濟等移駐察罕呼濟爾地方展放卡倫以資防守至四月二十一日臣至博羅塔拉地方所有新降塔本集賽宰桑齊巴漢達什策凌巴桑等來見情願各率兵效力奏入報聞定西將軍永常等疏奏額林沁多爾濟領兵進發日期永常等奏言副將軍薩喇爾文稱現在大兵已至博羅塔拉距伊犁甚近達瓦齊尚未來降我兵既已深入必須加意周防祈於二千索倫巴爾虎兵內揀選一千即今起程接應以壯軍威臣等前接副將軍咨已令副都統額爾登額領索倫兵一千前往接應今將總管畢里袞所領索倫兵一千名於四月二十五日令額林沁多爾濟同畢里袞率領起程前往接應其三隊之索倫兵丁不日即至飭令加意喂養馬匹相機進發奏入報聞壬午定北將軍班第等疏奏喀什噶爾巴喇特和卓投誠效力情形班第等奏言據散秩大臣哈丹帶喀什噶爾之巴喇特和卓前來投誠告稱我部落人等投降準噶爾已五十餘年我父昻咱里特在時為噶爾丹策零革去和卓交與阿巴噶斯鄂拓克看守我父亡後我與兄畢爾干至今尚被看守適宰桑阿巴噶斯之弟哈丹回至游牧聞伊兄弟投降天朝回來調兵我兄弟二人亦願率兵效順仰邀大皇帝之恩因選兵四十名與哈丹同來再我等原係喀什噶爾之和卓俟伊犁平定後如荷聖恩得回故土情願招服喀什噶爾葉爾羌各處人衆同來歸順現在進兵四十人懇令即持伊等旗纛前往臣阿睦爾撒納伏思伊犁回人甚多若令巴喇特持伊等旗纛前行回衆益可望風投附當即照伊所請給與奏入報聞命賞給新降台吉宰桑等職銜並頒賜衣物有差上諭軍機大臣曰班第等奏現在招降之和通額默根係伊弟格勒克雅喇木丕勒二人迫令同來宰桑鄂哲特集賽宰桑達什策凌策伯克巴桑因見往擒巴朗之兵始來歸順俱非實心向化阿睦爾撒納是以未將伊等帶往軍中亦不留在游牧處令於附近地方暫居如此則既可暗中防範而後來歸順者亦不至啓其疑懼之心其喀什噶爾之巴喇特和卓現在帶往軍中俟功成後令其招降葉爾羌各處人衆阿睦爾撒納用心周密動合機宜深可嘉豫著先賞銀三千兩遣人送往伊游牧處今兩路兵已抵伊犁捷音一到當大加賞齎也格勒克雅喇木丕勒著照賞和通額默根之例各賜大小荷包倭刀皮帽一頂數珠一盤其給與職銜之處俟入覲後再降諭㫖鄂哲時係管領一千餘户之宰桑或給與散秩大臣或一等侍衛之處交班第等酌議給賞達什䇿凌䇿伯克巴桑俱著授為散秩大臣喀什噶爾之巴喇特和卓一聞哈丹來歸即率兵效順且情願往招喀什噶爾葉爾羌人衆心甚可嘉巴喇特和卓並伊兄畢爾千俱各賞大小荷包貂帽一頂數珠一盤巴喇特和卓俱與入覲人等同至熱河再給職銜庫圖齊訥爾之宰桑索薩齎於們都哈什哈一到帶兵來歸將達瓦齊所遣之綏綳鄂勒錐圖一并擒獻亦甚可嘉並著授為散秩大臣賞給翎帽衣服著侍衛瑚費圖馳驛送往仍將事定後再行施恩之處詳悉曉諭伊等知之定北將軍班第等疏奏㑹同西路大兵進勦達瓦齊情形班第等奏言臣等至博羅塔拉行文西路副將軍薩喇爾㑹兵進𠞰今據文稱聞達瓦齊已往察卜齊雅勒地方距波羅布爾噶蘇台道路甚近若俟兩路㑹齊後始往察卜齊雅勒不免繞道紆回西路所領大兵現在輕騎徑往波羅布爾噶蘇台山梁進發其北路將軍所領大兵即從庫蘇木蘇克前進彼此互為聲援相機辦理臣等隨於四月二十三日輕騎起程過庫克托木前進額駙色布騰巴爾珠爾等亦進至博羅塔拉現在㑹合一處併力進𠞰奏入報聞定北將軍班第等疏奏宰桑烏魯木等率衆來降班第等奏言額駙色布騰巴爾珠爾等領兵前往阿勒坦特卜什地方招服人衆拏獲厄魯特庫綳一人稱係宰桑烏魯木之叔烏魯木因達瓦齊調遣帶兵一百名往距哈薩克我情願歸降並即遣人邀回烏魯木前來歸順隨據烏魯木來營告稱我等早有歸附天朝之心昨聞大兵信息即星夜領兵三十名前來我等所屬有得木齊四人人口四百餘户四項牲畜約計萬餘俱各誠心歸附又貝子䇿布登等帶領官兵分起搜查阿爾台山梁等處於四月二十七日在古爾班鼐塔克地方遇副都統察達克所屬烏梁海得木齊朝罕等屬人又於烏蘭布拉克喀喇哈巴等處遇鄂爾楚克那木達克等屬人及宰桑圖布慎所屬得木齊喀喇曼集等屬人俱行收服並獲與巴朗同逃之曼集等八户人口共收服人衆二百餘户人口一千餘名奏入報聞癸未命定西將軍永常運解軍營銀兩上諭軍機大臣曰永常接到諭㫖將立臺運米之處停止奏請就近解銀一萬二千兩以八千兩交薩喇爾處備買口糧牲畜留四千兩於烏魯木齊備用永常從前奏請運米一事並未詳細籌度其事之可行與否並有濟與否冒昧陳奏經朕屢次訓飭伊始自知謬誤奏請停止此奏尚屬可行著照所請辦理平定準噶爾方略正編卷十一
