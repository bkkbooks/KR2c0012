  text: 欽定四庫全書平定準噶爾方略正編卷五十
  hash: sha256:cc612c1c816062377c9f34035b75600db9976f59a260cfd3acfdf262f9e1c860
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_104-1a, image: WYG0358/WYG0358-0821c.png}
body:
  text: 乾隆二十三年春二月癸亥定邊將軍兆惠等疏奏軍營領隊大臣及官兵等功次兆惠等奏言臣等伏查額林哈畢爾噶路領隊大臣侍衛等或屢次進𠞰或僅行走一二次有奉㫖交部議敘又交部察議功罪相抵及解送降人未經戰陳者俱毋庸議外謹將各隊即兵行走功次查明具奏其領隊大臣羅卜藏多爾濟愛隆阿鄂卜什圗倫楚順德訥瑚爾起端濟布達禮善弩三璊綽爾圗奎瑪岱等功次列單恭呈御覽又據副都統瑚爾起呈稱從前在唐喀祿隊內行走擒拏巴圗博羅侍𠞰滅阿睦爾撒納所留烏梁海等業經邀恩議敘惟自塔爾巴噶台帶兵䇿應圗倫楚等奮勉𠞰賊各官兵查有唐喀祿交付備賞之孔雀翎一枝藍翎二枝今揀選出衆得功之副總管西通阿護軍校索薩勒圗驍騎校綽羅和爾等可否准其戴用亦將伊等功次列單恭呈御覽至軍營官兵立功列為三等仍分晰次數查一載以來以出衆效力存記者二人餘人又於二三次出衆效力之四十餘人內揀選索倫署參領塔濟爾圖等二十人巴圖魯侍衛扎延保等十人應請㫖交部補行議敘又坐臺之委署筆帖式等於事件並無遲悮又能搜𠞰嗎哈沁至五六十人以上收取牲隻軍器如健鋭營前鋒署筆帖式富魁力戰傷傷行走出衆將功次另繕清單其餘效力人等亦造冊送部議敘又臣等隨帶之喀喇沁等臺站參領納旺等及隨原任總管第魯巴前來之烏拉齊扎勒桑等十三人分管臺站搜𠞰賊衆均能奮勉效力請以應升之缺補用又據索倫委署防禦清保戴奬賞翎固寧保等呈稱伊等二十三人于乾隆二十一年隨扎拉豐阿回京時遇準噶爾復叛沿途與賊力戰內三人殘廢遣回原籍其餘十九人現隨營效力又巴圗魯侍衛瑪瑺呈稱隨行官兵十人遇賊對陳惟索倫披甲人英格勒圖肩中鳥鎗奮勇脫出今仍效力軍營其餘九人未能脫出懇乞照例辦理各呈報前來應請送部議敘其瑪瑺所報未能脫出之九人亦送部議恤又索倫總管布喇勒圖等三人俱在哨探隊奮勉行走可否量為奬賞准戴孔雀翎之處出聖恩奏入得㫖塔濟爾圖扎延保等俱交部補行議敘其朱爾都斯路官兵有似此未經查出者即查明送部富魁著授為主事仍留軍營效力餘俱照所請行又諭曰從前曾派第魯巴往管西路臺砧正值賊人變亂之際或被戕害或有他故並無信息若果為賊所害亦應加恩優恤著兆惠等查明奏聞定邊將軍兆惠等疏奏鄂羅斯拜逃走情形兆惠等奏言臣富德前奏察哈爾護軍鄂羅斯拜騎牽馬匹逃走奉㫖令將鄂羅斯拜或係逃走或係迷路之處確查具奏臣等即傳帶領鄂羅斯拜前往哈薩克之戴奬賞翎布圗訥等詢問據稱去年齎奉恩賞哈薩克霍集伯爾根等緞匹于十月二十五日回程夜間係鄂羅斯拜值班看守馬匹忽行逃走遍覔不得是以呈報等語是鄂羅斯拜逃走屬實臣等已行文哈薩克查拏務獲解送奏入報聞乙丑訓諭定邊將軍兆惠等奏敘軍營功次上諭軍機大臣曰兆惠富德將伊等去年出兵未經查出之侍衛官員分别功次補請議叙又將領隊大臣羅卜藏多爾濟等功次聲明具奏甚覺繁瑣無謂夫恩自朕出其效力行走之人皆分所應爾豈可稍生覬幸兆惠等在彼閒居並不將現在切要事件留心計議惟一味沽名瀆奏在伊等之意以為准其所奏則官兵得以邀恩即不准行人亦咸懷感激如此存心可乎且將以此為辦事乎然在侍衛官員前此疏漏未經查出者補請議敘猶可若羅卜藏多爾濟因其效力已封郡王豈以為尚未加恩乎即圖倫楚順德訥俱加恩授為副都統伊等果能勝都統之任否其餘議敘升級者尚多若謂行走一次即應加一次之恩則與傭工取直何異且兆惠身為將軍兩路俱應視同一體何以于朱爾都斯一路未經查奏耶朕因朱爾都斯一路辦理無緒將成衮扎布撤回舒赫德鄂實降革豈大臣獲咎官兵內遂無一二效力者乃兆惠僅將隨伊行走之人奏敘此何理耶若輩現在亦隨兆惠進兵如此將何以冀其出力若謂兆惠等一路功多亦不過獲一巴雅爾耳而疏脫阿睦爾撒納者獨非伊等乎至奏將存留之翎賞給西通阿等三人有何緊要况留翎三枝即有三人效力安得如此凑巧何見之小也但業經具奏姑如所請其朱爾都斯路有效力行走官兵從前未經查出者可一併查奏著傳諭兆惠等知之諭定邊將軍兆惠等酌調索倫兵丁上諭軍機大臣曰據雅爾哈善等奏稱所調陜甘緑旗兵丁計二月二十日以外可至魯克察克自魯克察克至瑪納斯又需二十日于三月初十左右始至軍營距兆惠進兵之期已逾一月等語前因兆惠屢次奏請增兵又將伊所領索倫兵一千名撥給雅爾哈善故派緑旗兵一千名前往近因雅爾哈善奏伊現在所有索倫察哈爾及富紹等送馬兵丁將及三百名擬分派哨探策應及巡察牧羣之用朕慮此數尚不敷用諭將一切差遣回程索倫兵留于魯克察克合計可得若干如有不足再自兆惠軍營遣發又諭順德訥阿里衮兵丁俱歸雅爾哈善之隊亦將及一千但未知此內有索倫兵若干若得六七百名已足敷用則兆惠所領索倫兵即無庸調遣或已經起程行走未逺亦可調回再緑旗兵雖赴調稍遲而隨後進發亦足增聲勢可仍行遣回若兆惠竟不需用即存留屯種亦可著傳諭兆惠雅爾哈善一面咨商辦理一面奏聞丁卯諭巴里坤辦事巡撫吳達善安插降人事宜上諭軍機大臣曰據吳達善等奏遵㫖將厄魯特哈爾察海等俟送到時賞給産業同緑旗兵食糧餉後有似此者查照辦理等語昨因厄魯特𠞰殺之後餘衆無多若槩行誅戮恐聞風驚怖以致各處藏匿故將哈爾察海等如此辦理但此等降人情節不一著傳諭吳達善等嗣後有似此送到者俱著奏聞請㫖哈爾察海等亦不必安插巴里坤俱發往安西歸入緑旗兵內差遣仍加意約束忽致脫逃再丑達自軍營送回巴里坤駝隻倒斃甚多所存俱屬疲瘦是全不盡心照管吳達善何以並不參奏著一併傳詢署安西提督西寧鎮總兵官劉順以辦理戈壁井泉有功命交部議敘戊辰大學士管陜甘總督黃廷桂疏奏酌辦軍需情形黃廷桂奏言伏查調往巴里坤吐魯畨屯田緑旗兵二千名先後調赴魯克察克兵九千名派提督馬得勝總兵五福副將達世朗福昌等帶領自本年正月初十至二月二十日先後出關計三月初可至魯克察克其征屯兵丁隨帶行裝并軍營咨取之器械農具籽種無一不需挽運臣再四籌酌以軍需固關緊要而轉瞬即届春耕民食攸繫雖經嚴飭各屬曉示商民出車應募尚恐稍有遲誤幸蒙我皇上天恩浩蕩各州縣借辦軍需概免賠補民間舊缺新徴叠豫蠲豁是以輿情鼓舞村堡小民亦爭出車輛晝夜飛挽今各項軍需俱已全數出關各站供支草料俱無缺乏其屯田借動民間農具俱從涼甘製辦給還現在惟晉省解駝六千隻及豫備正餘馬一萬七千匹所需豆石自可從容辦運其撥運各屬平糶倉糧尚可稍緩此時二月初旬正民間耕犁之際臣即飭知各屬將民間牛車悉令解散歸農毋許胥吏扣留勒索至豫備馬匹現飭陜甘各營挑選約于四月初間可以全到肅州再從容送到巴里坤奏入上諭軍機大臣曰據黃廷桂奏稱軍需辦解將竣請暫停可緩之糧運以便農功具見悉心調劑其所稱豫備正餘馬一萬七千匹四月初間可扺肅州等語著飭交各該員加意飼秣俟春深時口外青草豐茂陸續酌撥送赴巴里坤一帶分厰牧放臕分易于滋長兼可省內地芻豆且免五六月間經行戈壁之勞將來遇有調遣自可就近䟎赴不患長途疲乏可傳諭知之恩賞追𠞰鄂木布所屬烏梁海效力得傷之台吉班第等二十三員兵丁一百十八名緞匹銀兩有差喀爾喀馬甲索諾木傷重難痊加賞銀五十兩定邊將軍兆惠等資送造辦鎖子甲之厄魯特竒齊克瑪木特多爾濟到京命歸入蒙古旗分在武備院行走于造辦處成造戊巳命賞定邊左副將軍成衮扎布銀一千兩藍翎侍衛圖沙布蘇魯克沁銀各三十兩馳驛前赴北路軍營庚午諭副都統巴圖濟爾噶爾等防護解送馬匹上諭軍機大臣曰據兆惠等奏現在軍營口糧不敷官兵以馬為食等語看伊等如此情形不獨進兵遲滯且將所送肥馬盜作口糧亦未可定已飭諭兆惠等嚴行查拏稍有疏縱定將伊等治罪著傳諭巴圗濟爾噶爾等送馬到軍營時暫行不必分給官兵照常分厰牧放俟兆惠等到伊犁等處再行分給仍于途次嚴飭送馬官兵加意查拏盜竊庶馬匹胥歸實用以利軍行訓諭定邊將軍兆惠等酌量㨂補索倫等處員缺上諭軍機大臣曰據兆惠等奏稱索倫等處員缺行文該將軍于副都統鄂博什等保荐軍前一等人員內揀補其索倫副總管伊靈阿佐領三達保已奏特㫖補授二等侍衛副總管佐領與二等侍衛俱係四品可否令其兼管等語伊靈阿等兼銜之處著照所請行至該旗所出員缺俱于鄂博什等保荐軍前人員內選補則非矣從前索倫達呼里等缺出該將軍等㨂選未及軍前人員故降㫖亦令得與然其間亦有新舊久暫之殊若謂本處缺出皆應以現在出兵人員補授則從前在和通呼爾哈淖爾額爾得尼招等處出兵得傷曽經效力之人因年老現未從軍轉致升補無期于情理殊未平允朕于效力人員酌量加恩並非不計功次概行拔擢况索倫人等本屬渾朴若使知從軍即當優敘必且驕縱妄生冀幸即如具呈保送本伊等不知之事今如此辦理乃兆惠等欲沽美名潜相引誘之所致耳信如所奏將來軍前人等加恩則效力不加恩即不效力有是理乎兆惠富德所見甚屬錯謬俱著傳諭飭行嗣後索倫等處員缺照常于軍前及在家人員內酌量揀選補授署定邊左副將軍納穆扎爾等疏奏辦理烏梁海游牧納穆扎爾等奏言據車木楚克扎布將已降復逃之鄂木布三得秦人等分别查辦內瑪勒占五户起意惑衆情罪可惡即將男子正法婦女分給衆烏梁海等其舒都特穆爾八户因犯病人多暫留被脅尚可寬宥合併從前移來得木齊扣克勒濟等歸察達克管轄其新降烏梁海等游牧地方車木楚克扎布與察達克圖布慎等㑹同詳議伊等舊烏梁海及新降之博和勒等俱在烏蘭古木種地其游牧在吹阿勒和碩努肯穆倫哈里衮布拉克科卜多河綽和爾淖爾二扎克賽博羅布爾噶蘇察罕烏蘇索和克達爾竒圖等處聨絡居住再新降烏梁海宰桑那木查爾于去年十二月病故屬實其所屬三得秦應請令伊子阿喇善管轄又據舒都之子訥默庫供稱逃入俄羅斯之鄂木布及伊三子郭勒卓輝博博等父子俱于前年秋季出痘身死臣等將俄羅斯書信內有奈曼噶雜克之人投入內地之語詢問據供並無聞見等語奏入報聞甲戌諭靖逆將軍雅爾哈善等留心防範差遣回人上諭軍機大臣曰據雅爾哈善奏稱去年隨成衮扎布行走之庫車回人伯克鄂對等願往軍前效力俟取庫車烏什阿克蘇等處後酌量差遣或令其看守城池等語伯克鄂對等係何處頭目因何投順伊等本處更有何人其妻子現在何處著傳諭雅爾哈善查明奏聞再回人性情雖不同厄魯特而近年與厄魯特雜處不免漸染習氣未可深信取庫車等城後伯克鄂對等亦未當專令看守仍聽玉素富節制再留我領隊大臣一員彈壓始為周密否則恐似厄魯特等於大兵前進之後乘間復行變亂亦未可定著雅爾哈善㑹同額敏和卓留意辦理不可稍有疏忽定邊右副將軍策布登扎布疏奏起程日期策布登扎布奏言臣於正月初八日至巴里坤因所派官兵馬駝不敷酌留官兵三十餘名令侍衛寧古禮續進臣於十七日起程前往軍營因額林哈畢爾噶雪大由吐魯番路行走從前奏請隨帶之協理台吉旺楚克在巴里坤患病遣回遊牧又協理台吉齊旺扎卜於游牧患病據桑寨多爾濟派出本旗協理台吉恭格前來臣即帶往軍營奏入報聞乙亥命御前侍衛侍郎副都統三泰驗看阿逆身尸上諭軍機大臣曰據桑塞多爾濟奏稱林丕勒多爾濟派往俄羅斯驗看阿睦爾撒納身尸中途病故已派親王齊巴克雅喇木丕勒等前往等語著傳諭三泰齊巴克雅喇木丕勒雖經驗看仍須親信大員前往方知是否確實三泰即遵朕㫖前往詳悉驗看又諭曰林丕勒多爾濟前在軍前效力加恩封為公爵今奉差中途病故深可憫惻其公爵著加恩於伊子內㨂選一人承襲仍賞銀二百兩經理喪事喀爾喀郡王品級旺布多爾濟公品級三濟扎卜俱效力軍營遣回游牧身故旺布多爾濟之郡王品級以長子車德卜承襲三濟扎卜之公品級以長子三都卜多爾濟承襲厄魯特克勒特總管根達什副總管莽蘇爾侍衛吹木丕勒等至京命賞根達什銀五十兩縀四端莽蘇爾銀四十兩縀三端吹木丕勒銀二十兩縀二端其眷屬人等一併於察哈爾旗分安插署定邊左副將軍納穆扎爾疏奏定議烏梁海爵祿貢賦等事宜納穆扎爾奏言查烏梁海等仰沐聖主仁化全部輸誠此內舊日歸順之察達克圗布慎車根赤倫哈克圗莽噶拉克洪和等七人俱奉㫖授為內大臣散秩大臣副都統三品總管有差其新歸順之博和勒那木查爾特勒伯克扎爾納克等亦俱授為三品總管但伊所屬鄂拓克內每得秦俱有得木齊收楞額等辦理事務若准給伊等頂帶更足彈壓屬人昨奉㫖將阿勒坦淖爾之得木齊等俱賞給佐領職銜其察違克圗布慎赤倫車根哈克圗莽噶拉克洪和博和勒那木查爾之得木齊收楞額特勒伯克扎爾納克之收楞額等應請㫖將得木齊等授為佐領收楞額等授為驍騎校給與頂帶至恩㫖賞給察達克及諸總管等俸例應赴京關領但烏梁海游牧甚逺往返艱難且伊等多未出痘據車木楚克扎布扎於伊等赴京領俸之便將察達克等俸祿代為領出至烏里雅蘇台傳集分給似屬妥便再臣等將新舊烏梁海等頭目詳詢車木楚克扎布據稱輝齊賚老老人亦平常伊現管得秦人衆原係莽噶拉克之父所屬請仍歸莽噶拉克管轄其察克圗布慎車根赤倫哈克圗莽噶拉克洪和等屬人內有一百二十三户並無牲隻且俱係老幼殘廢人等又有二百六十六户雖無牲隻而年齒尚壯俟二三年後生計較裕再令納貢現在堪以納貢者共七百十九户每户令納貂皮二張計每年應納貂皮一千四百三十八張新歸順之博和勒那木查爾特楞古特鄂木布共九得秦三百九十二户堪以納貢者一百九十二户阿勒坦淖爾總管特勒伯克扎爾納克等共四得秦一百七十五户堪以納貢者一百二十二户應俱照察達克等之例一體完納其父收之例察達克博和勒等九總管內應請輪派得木齊一人送至烏里雅蘇台阿勒坦淖爾之特勒伯克扎爾納克等四得秦人等較察達克游牧更逺應請於雨總管四佐領內輪派得水齊一人交納其監收大員於策布登扎布車木楚克扎布二人內輪值一人㑹同將軍大臣等辦理所有恩賞縀布即於交收時給發又據車木楚克扎布告稱奉㫖管理烏梁海事務一應催科詞訟必須諳練之員副都統莫尼扎卜深悉烏梁海情形可否令其協辦事務豫備差委俱恭候訓示遵行奏入上從之丙子訓諭副都統濟福等毋庸調集青海兵丁上諭軍機大臣曰濟福等奏稱前至烏蘭和碩值索諾木丹津巡查卡倫未回因與貝子那木查爾策凌商議即飭傳派兵丁一千名齊集扎噶蘇台等語前諭酌量派兵不過豫備賊人䦨入並未即應起行者今當春令牲隻疲瘦之際將兵馬指定處所齊集一處不得覔厰牧放勢必愈加疲瘦且亦苦纍䝉古人等此皆濟福等未悉朕㫖辦理錯謬所致著傳諭濟福等奉到此㫖毋庸傳集兵丁即令在各游牧預備量給扎拉豐阿那木查爾兵丁前往偵探如無賊人踪跡則此兵即不可用并傳諭索諾木丹津那木查爾策凌知之授厄魯特宰桑三都克為散秩大臣上諭軍機大臣曰厄魯特宰桑三都克隨軍營將軍大臣等頗能效力行走著加恩授為散秩大臣賞給京城官房一所令其居住近同根達什等送到人內有三都克所聘妻室即令完聚其存留巴里坤家口什物著行文辦事大臣遇便送京給還丁丒定邊將軍兆惠等疏奏辦理起程事宜兆惠等奏言臣等節次奉到訓㫖敢不益加奮勉俟馬匹口糧軍器一到即速起程今副將哈尚德從巴里坤送羊二萬五千隻計倒斃一萬五千六百有竒所存九百三百餘隻合之將來運到米麵二千五百石以現兵四千五百名計之僅足四五十日之食若坐候全到則更為徒費臣等酌議惟俟軍器到日即可起程擬於二月初十日內外進兵行文巴里坤大臣速為運送至續派緑旗兵一千名雖足壯聲勢但巴里坤解送之馬已分給魯克察克軍營二千匹不敷派給又多費口糧應請停其遣發又臣等准雅爾哈善等調領隊大臣一二員巴圗魯侍衛一員查魯克察克兵丁內察哈爾最多隨派總管端濟布三等侍衛諾爾木前往奏入上諭軍機大臣曰兆惠等奏擬於二月初十日內外進兵不待口糧全到所見尚是沙喇擘勒賊衆烏合易離力亦窮乏現兵四千五百名足敷辦理緑旗兵一千名自可停其遣發著傳諭巴里坤大臣將軍器口糧速為運送至兆惠等進兵雖中途無賊人游牧若到沙喇擘勒即可收其牲隻宜加樽節以濟軍食計此時馬匹軍器口糧自當陸續送到可作速奏聞即傳諭兆惠雅爾哈善等知之又諭曰解送軍營船隻乃官兵口食所需關係緊要領解官員理應小心分起運送不致傷損倒斃今哈尚德自巴里坤送羊二萬五千隻沿途即遇霜雪何至傷損過半是全不以軍食為念哈尚德不必候阿里衮查參著即革職枷號著落照數賠補至哈尚德呈稱原領羊隻多係瘦乏兼有生癩者此語未必屬實果爾何以哈尚德並不計及能否到去竟冒昧領受耶但看其倒斃如許或巴里坤大臣交付時聊以充數亦未可定若果如此則亦難辭咎自應分賠著傳諭黃廷桂及巴里坤大臣等前項羊隻係何處辦運相距程途若干曾否休息於何日送至巴里坤如何交哈尚德實在有無瘦乏生癩彼此詳悉查奏如含糊奏覆朕另派大員查出責有攸歸嗣後辦送軍營羊隻若當需用之時始行趲赴既一時不能即到一遇寒暑勢必多有傷損應如何早為辦送或在吐魯番牧放備用期於軍食無誤著黃廷桂悉心定議辦理癸未訓諭户部侍郎阿里衮明白回奏追賊情形上諭軍機大臣曰閲阿里衮所奏伊等已至呼爾哈克山有賊人舊游牧踪跡搜查無獲今額敏和卓遵㫖回游牧休息於正月二十七日起程伊仍至羅卜淖爾搜查勦殺即回巴里坤辦事等語前據伊等奏稱追勦沙喇斯瑪呼斯等賊向呼爾塔克山前往嗣據額敏和卓之子素賚璊報稱阿里衮等已回距吐魯番五百里候勦殺藏匿之嗎哈沁等即可撤兵朕因與伊等原奏不符暫行存記今所奏殊屬含混伊等如果因馬匹口糧不足不妨奏明撤回何必稪稱前進乃既稱向前追勦俟辦畢始回而究未得賊人踪跡不過於中途遷延行走即謂為追襲巧辭飾說可乎額敏和卓係回人不足深信阿里衮何為者若朕未諭撤兵則伊等將如何辦理計此時阿里衮亦將抵巴里坤著傳諭令其眀白回奏諭靖逆將軍雅爾哈善等進勦回部事宜上諭軍機大臣曰據雅爾哈善等議奏辦理回部事務俱協機宜看來成功尚易但用兵關係緊要仍當慎之又慎於其易者難之則事成更速且永得安定矣今兆惠等進勦沙喇擘勒賊衆已諭令竣事後取道夾攻回部即勦賊需時亦必派兵堵截然雅爾哈善係専辦回部當與額敏和卓悉心計議至所奏伯克鄂對等三人俱係回人頭目懇請效力軍前甚屬可嘉著加恩授伯克鄂對為散秩大臣賞伯克色梯巴勒氐伯克噶岱默特三品頂帶俱著帶孔雀翎仍傳諭伊等若能招降各城回人即照舊令其管轄所屬仍加恩封賞又諭曰阿里衮等帶往軍前之右衛前鋒索諾木扎卜曽為厄魯特喇嘛等遣往回部熟悉伊地情形因照額敏和卓所言繪圗令其訂正奏呈朕覽著將此圗發與雅爾哈善等閲看如進兵時有因行查勘者即相機辦理索諾木扎卜仍著為前鋒在雅爾哈善隊內奮勉行走又阿里衮等前至卜葉地方搜獲回人巴雅爾等據供係庫爾勒伯克托克托之屬人等語雅爾哈善等進兵至庫爾勒彼處人等若輸誠歸附即諭以仍令伯克托克托管轄此時且隨軍效力伊等既有名稱前至葉爾羌喀什噶爾等處招降所識人等自屬有益其他收服回人頭目亦可照此辦理再義州馬甲巴爾泰去年從回部脫出頗知彼處路徑亦著在前鋒效力其從前由準噶爾脫出安插安西之旗人內有識回地路徑情願效力者俱行遣往果能奮勉將來仍令伊等來京歸入本旗俱著傳諭雅爾哈善等知之又諭吐魯番貝勒品級額敏和卓曰爾同將軍議奏進勦霍集占等情形看來成事頗易朕甚嘉悅昨賜爾貝勒品級貝勒分內有應置長史護衛司儀等官員即於爾屬人內選補俾得受朕恩爾使令亦可得力其職銜品級已據該部開列即遵照補授諭定邊將軍兆惠等協勦回部事宜上諭軍機大臣曰額敏和卓奏稱自沙喇擘勒前往回部由巴達勒可至喀什噶爾由穆素爾嶺可至阿克蘇爾路俱險僻難行另有間道選派熟識數人前赴兆惠處可作嚮導等語額敏和卓所派之人俱可信用著傳諭兆惠等務加意看待再兆惠前往沙喇擘勒在魯克察克進兵之先如勦賊事竣尚可趲赴夾攻回部萬一逾時不及即詢額敏和卓所派之人於應行堵截之路派兵防守倘回酋窮蹙竄逸自可弋獲又據阿里衮將額敏和卓同前鋒索諾木扎卜所繪回部地圗具奏朕看圖內有自沙喇擘勒通喀什噶爾葉爾羌之路著發與兆惠等閲看平定準噶爾方略正編卷五十
