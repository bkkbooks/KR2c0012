body:
  text: 乾隆二十四年夏四月乙亥訓諭八旗大臣官員上諭軍機大臣曰朕今日恭閲皇祖實録議政大臣等奉上諭太祖太宗時滿洲兵凡遇征戰馬匹口糧自備行走所向立功並無遲悞今官兵行走處馬匹口糧器械等俱給帑置辦且以為不足而怨咨生焉此皆由該管官不行嚴飭之故也朕辦理軍務閲厯甚多向時征討岳州雲南皆决於進取乃得成功後征噶爾丹中路進兵大臣官員會議以為不可惟朕與費揚古决意進兵噶爾丹聞風驚懼鼠竄而去朕將中路初次運到之米遣明珠速送費揚古軍前二次米亦令續送三次米内朕但留十八日口糧餘皆送往西路是以兵丁未至饑餒彼時若輕信大臣等之議中道撤兵則兩路兵丁安得立功奏凱耶今觀領兵大臣官員等祗為保身之計不以國事為重内存私意彼此爭論不和又向兵丁等沽名市恩多取口糧及不能䭾載至於抛棄全無珍惜之意如此居心行事可乎朕之滿洲兵俱極精鍊全在領兵者將國家之事專心辦理不圖安逸賞罰嚴明則斷無錯悞進兵西藏時塞楞不候衆人獨自前往額倫特亦隨後追至為國家奮不顧身雖致失機豈可論伊等進兵太速乎今策旺諾爾布係差往策應之兵而遲延不前雖伊所統兵丁善全而歸伊屬下之兵固然感念與國事有何禆益朕年少時每於講武練兵等事違命者必懲以法内外大小悉知儆惕由此觀之訓練之事不可疎忽也兹衆喀爾喀及青海人等俱服朕徳化而策妄阿喇卜坦之人霸占藏地毁其寺廟散其番僧朕思伊兵步行一年有餘忍饑受餒尚能到藏我兵顧不能至乎今滿漢大臣咸謂不必進兵朕思此時不進兵安藏賊冦無所忌憚或煽惑沿邊諸番部將作何處置耶故特諭爾等安藏大兵決宜前進欽此葢彼時臣工内即有囿於己私惟圖安逸之習氣故皇祖神謨獨斷毅然辦理是以毎遇用兵㒺不克捷朕御極以來曾屢降諭㫖力除此習即如數年來辦理軍務大臣中不願者居多亦因朕指示催督始能𠞰殺賊衆所向無前閲時未久即平定準噶爾且囘部葉爾羌喀什噶爾諸城早晚亦可奏績惟從前永常策楞等以馬匹口糧為詞一意退縮以致大功不成各罹罪譴雅爾哈善以大兵全力圍賊一城並不急攻且坐視逃竄國憲難宥故即行正法此皆徇私心而忘國事之炯戒也至行兵口糧固屬𦂳要亦當計其便於裹帶若但拘成例支給過多以沽名譽及至不能轉運徒然抛棄於兵丁有何禆益軍行糧隨乃前代漢人陋習曾經諭及凡將軍大臣等領兵應支口糧惟量足裹帶途中再為通融撙節何至不能接濟況官兵應支口糧歸途有補給之例若論事屬已往雖不給亦可而仍如此定例者乃朕軫念兵丁之至意俾行走時既覺便利又得補給之項以瞻身家耳數年來將軍大臣内兆惠富徳在軍前行走尚好亦因遵朕訓諭率先勇往鼓勵官兵雖間有不合機宜然究未貽誤公事至從來滿洲官兵皆係勁旅遇有攻戰惟知前進毫無退縮該管大臣官員等平時並不勤加訓練臨事又不能率先鼓勵可惜朕之精兵皆為此等大臣官員所悞若果盡心於教訓倡率則何功不成昨據富徳等具奏此次進𠞰之健鋭營滿洲兵於攻戰之時放鎗迅利奮勇直前等語健鋭營係朕新設勅大臣等勤為操演又時親簡閲始能技藝嫺熟破賊立功八旗大臣官員皆有練兵之責果能盡心教訓則兵丁技藝自皆一律健鋭又何須另立營名乎欽惟皇祖以講武練兵不可疎忽聖訓昭垂實萬萬年永當遵守者著𫝊諭八旗大臣官員等嗣後各除便己求安之私意惟知訓練兵丁務使技藝嫺熟不失滿洲舊習庶兵丁皆成勁旅而風俗日以還淳於國家之事大有禆益矣此㫖著通諭八旗仍於各旗演習騎射處所刋刻永逺奉行毋怠丙子諭定邊將軍兆惠等酌計糧餉進兵上諭軍機大臣曰定長等奏稱准兆惠等咨内地所送駝隻至哈密闢展時酌量每駝運糧一石抵阿克蘇隨以此項駝隻俱行走數千里不能多運惟擇其臕壯者輕裝䭾載等語昨以達爾黨阿等奏報所送馬匹五月間可至阿克蘇朕即謂已過麥熟之期或候囘地續種田糧再行進𠞰此特恐馬力既未齊全糧餉又不能接濟不得已而稍待之意今思阿克蘇等處亦未必有二萬餘馬牧塲且天暑易致疲乏而定長復不能多運糧餉若再停留不進而官兵又虚糜兩月之餉矣莫若仍於五月進兵雖麥熟過期必有尚未收割者可資接濟庶功以速成不必拘泥前㫖著𫝊諭兆惠富徳舒赫徳等會議具奏定長等亦令其酌量辦理定邊將軍兆惠等疏奏查詢侍衛拜達爾勞績兆惠等奏言臣等欽奉諭㫖查得三等侍衛拜達爾原在雅爾哈善軍營去秋隨臣等至葉爾羌以英額奇盤山之戰同璊綽爾圖等為前鋒遇賊陣亡業經具奏去年六月間雅哈托和鼐之戰拜達爾領巴圖魯兵二十名衝陣侍衛噶布舒等欲候大隊同進拜達爾激罵同行不許退後亦經保列頭等功次奏入得㫖拜達爾已加恩優䘏給與世職矣辦理屯田副都統定長等疏奏遣發存留滿洲索倫等官兵定長奏言臣等准兆惠咨將各處存留之滿洲索倫蒙古兵丁速令起程於四月内抵阿克蘇兹于三月三十等日呉達善送馬一千匹前來臣等除酌留臺站兵丁外計送往軍營各官兵三百八十五人辦給行糧馬匹陸續起程奏入報聞丁丑定邊將軍兆惠等疏奏酌籌進𠞰事宜兆惠等奏言臣等從前擬將和闐阿克蘇分為兩路特因和闐被圍且有通喀喇土伯特㾗都斯坦之路俟應援事竣進攻葉爾羌而阿克蘇之兵兩靣夾攻兼堵截賊人逃往拔達克山等要隘若兵多則分攻喀什噶爾互相牽制今兵數不多恐逆賊拒守葉爾羌必須兩路合兵攻圍俟克城後再分兵略地及堵截來援賊衆今接奉分兵諭㫖謹録送富徳令其定議具奏外臣舒赫徳即將阿克蘇所有馬駝内選其堪用者前往和闐安撫囘衆其酌調布魯特屬人及查拏哈薩克錫喇臣等於三月初八日即遣侍衛成果布延泰等𫝊檄布魯特候囘報定奪奏入上諭軍機大臣曰富徳至特穆爾圖淖爾攻喀什噶爾舒赫徳前往和闐皆從前酌定者今富徳已定和闐自當由彼進發兆惠雖令富徳定議恐往返需時可𫝊諭富徳令其徑從和闐進兵攻取葉爾羌一靣堵截逆賊等逃竄之路昨據舒赫徳請前赴和闐令巴禄在阿克蘇辦事已降㫖停止即此時業已起程亦仍囘阿克蘇此㫖著速行馳遞戊寅諭定邊將軍兆惠等酌籌送馬事宜上諭軍機大臣曰據富徳奏稱前往和闐一路地多戈壁詢之守備傅能亦以前途牧塲既稀而水泉亦少現將所領兵馬分為五起牽馬步行等語是解送馬匹甚闗𦂳要達爾黨阿哈達哈所送之馬二萬餘疋係分給兆惠富徳兩軍者抵阿克蘇時將送交富徳之馬作何分起解送不致疲乏可𫝊諭兆惠富徳詳加酌議具奏一靣即行辦理命以陞賞侍衛齊凌扎卜等情等宣示官兵上諭軍機大臣曰富徳奏稱途遇守備傅能等領緑旗兵五十餘名從哈喇哈什脱出告知伊與齊凌扎卜等固守情節仍願隨同進兵因其困憊令往兆惠軍營休息以備詢問等語齊凌扎卜傅能有守城之責城既失陷自當治罪但哈喇哈什係囘城初降衆心未定非内地城守可比且兵餉不足尚能勉支三月餘迨勢孤援絶内外變亂始行脱出旋又隨大兵恢復茍非齊凌扎卜堅守之功則援兵雖至亦已無及是以加恩優敘今傅能係隨同齊凌扎卜守城不必一體陞賞但亦屬勞苦著加恩遇有都司遊擊缺出即行補用隨同脱出之兵丁殊堪軫念著兆惠等查明酌賞銀兩恐軍營官兵等以齊凌扎卜傅能既已失城功不抵罪何故加恩妄生揣度亦未可定可通行曉示知之命酌定有功人員賞給巴圖魯號上諭軍機大臣曰富徳將交查之藍翎侍衛那木查爾等十人功次查奏又稱此次保舉人員内索倫藍翎伊登古奬賞藍翎科丕塔俱應賞巴圖魯號等語昨諭查奏軍營應賞巴圖魯號人員原欲拔其殊尤加以寵錫今所奏尚未明晰豈伊等多人均應賜號耶著𫝊諭富徳將此中實屬奮勉超羣立功異衆者查出四五人具奏又兆惠奉諭惟查奏綽爾布鼐一人朕已加恩賜號看來伊隊内効力人多所舉尚覺其少亦𫝊諭兆惠再照前例查出一二人奏聞請㫖命革副將髙宗瑾職押赴烏魯木齊効力上諭軍機大臣曰呉達善參奏副將髙宗瑾委令總理解送軍營羊隻托病推卸規避不職請革職發往烏魯木齊屯田効力所奏甚是髙宗瑾身為大員遇事推諉若僅予革職實不足蔽辜但甘省距烏魯木齊頗逺此等無恥懶惰之人若今其自行領咨前往中途不免揑病逗遛著𫝊諭呉達善委員押赴烏魯木齊交與屯田大臣收管令其當差効力以為官員規避者戒五月庚辰朔命欽天監監正明安圖等往繪囘部地圖上諭軍機大臣曰囘部將次竣事應照平定伊犂之例繪畫輿圖明安圖傅作霖著賞銀二百兩西洋人髙慎思籲請同行亦賞銀二百兩二等侍衛什長烏林泰乾清門行走藍翎侍衛徳保賞銀各一百兩徳保仍授為三等侍衛整裝馳驛前往辛巳恩免陜西承辦軍需各屬地丁錢糧上諭大學士曰前因陜西與甘肅毗連之各㕔州縣年來亦有承辦軍需差務小民踴躍急公深堪軫念特降㫖該督令其查明奏聞今據呉達善將辦差各屬分晰查奏前來所有出力最多之潼闗華陰華州渭南臨潼咸寧長安咸陽醴泉興平乾州永夀邠州長武府谷神木葭州懷逺榆林定邊靖邊等二十一㕔州縣本年額徵地丁錢糧著加恩普免十分之三其同官髙陵涇陽三原富平盩厔鄠縣藍田耀州大荔蒲城澄城韓城白水郃陽朝邑鳯翔岐山寳雞扶風隴州汧陽麟遊郿縣三水淳化武功等二十七州縣本年額徵地丁銀糧加恩普免十分之二南鄭褒城寧羌沔縣城固洋縣西鄉略陽鳯縣商州商南雒南鎮安山陽鄜州洛川中部等十七州縣本年額徵地丁銀糧加恩普免十分之一以示一體優䘏加惠黎元至意該部遵諭速行諭參贊大臣巴禄隨富徳由和闐進兵上諭軍機大臣曰巴禄奉到阿克蘇辦事之㫖奏請願赴軍營同將軍等進𠞰等語昨已諭巴禄領富徳存留之兵前往和闐辦事今伊既願同將軍進𠞰著即同富徳由和闐領兵前進但和闐仍須大員駐劄著福禄即留辦事務亦諭兆惠等知之總督管甘肅巡撫呉達善疏奏臺站兵糧就近擬運事宜呉達善奏言查口外軍營安設臺站從巴里坤北至烏魯木齊南至阿克蘇俱需駝隻轉運合計一月用駝二百餘倒斃者十之七八購辦不易臣查巴里坤一路臺站自今春改設山南以來兩路俱㑹哈密迤西而哈密闢展兩處均有運貯糧石其由闢展至托克三哈喇沙爾庫車阿克蘇等處俱安設糧臺兼有收穫屯糧請自五月以後不必由巴里坤辦運徑從哈密闢展等處撥運其闢展至阿克蘇各就近分臺撥運更按各地情形在百里以内者即令各臺兵按月自赴糧臺或屯所隨便支取其自托克三及烏魯木齊以東地尚平坦酌僱商車分送自哈喇沙爾至阿克蘇合計所需糧數毎月不過數十石應請即於各糧臺現有駝隻内毎月量撥二三十隻即可運送一次沿途分給需駝無多自可通融辦理奏入報聞壬午參贊大臣舒赫徳等疏奏購買囘人穀石情形舒赫徳奏言查各城囘人等感戴皇仁臣等定議糧馬價值均因其所願並無迫脅本年二月以來青黄不接臣等同伯克等照毎石二兩五錢之官價加至兩倍至囘人等最需内地布疋毎疋以二兩至二兩五錢折兑布三疋即可得穀一石其烏什阿克蘇等處穀價每石自三兩至五兩不等今市價較昻臣等公議毎石酌量增加囘衆無不踴躍出糶並行文烏什庫車等處一體辦理臣現在購買囘人馬一百匹又選駝九十隻派官兵百名運送鎗礮軍器於四月十一日自阿克蘇起程前往和闐至和闐甫經安集應及時耕作臣與永貴等㑹商擕帶銀兩縀布以備奬賞奏入上諭軍機大臣曰前諭舒赫徳同霍集斯前往和闐特為堵截逆賊霍集占等逃逸今富徳已從和闐進兵阿克蘇亦屬要地仍令駐劄辦事曾屢降諭㫖今業經前往接得此㫖即將官兵等及運往軍需交與富徳辦理仍輕騎轉囘阿克蘇亦𫝊諭兆惠等知之癸未諭定邊將軍兆惠等體察伯克霍集斯情形上諭軍機大臣曰兆惠等奏稱從前詢問霍集斯據告云烏什有通喀什噶爾之路雖覺稍近而地險多石水泉不足往葉爾羌渡河亦難今伊已抵富徳軍營應行文令其就近詢問等語烏什一路行走既難富徳仍即自和闐進兵防禦喀喇土伯特等要隘朕詳察霍集斯情形似以擒獲霍集占等後囘酋無出其右者意在總統囘部曾密諭兆惠等留心防範但霍集斯雖不可信而從前曾擒獻達瓦齊此次納降又隨將軍等在葉爾羌効力若驟行究治囘人未免驚疑著再密諭兆惠等霍集斯此時如情形巨測斷不可留則亦不得姑息從事或不過恃功率意即暫示包容俟事竣後與伊同行來京照達瓦齊之例安置亦屬妥協兆惠等宜加意慎密以合機宜甲申諭定邊將軍兆惠等通融支給火器上諭軍機大臣曰五吉奏稱提督閆相師咨取火藥鉛丸等件查從前因内地解送闢展駝隻已經搭運而楊寧等所領緑旗兵所擕亦多今駝隻已全過哈密續解尚需時日等語軍營進𠞰兵丁均屬効力所有需用器械宜量其有無緩急通融支給不可彼此岐視閆相師隊内火藥鉛丸即有不足自當於楊寧隊内取用必欲接營分領殊屬拘泥嗣後内地所送軍需兆惠等須酌量派撥勿分彼此但軍前火器最要不妨寛裕貯備五吉等既稱陸續送至闢展定長等亦當於糧運之便轉解阿克蘇俱著𫝊諭知之乙酉定邊右副將軍富德等疏奏收復塔克克勒底雅二城富徳等奏言臣等近將瑚爾起等復取哈喇哈什招撫塔克克勒底雅等城具奏四月初四日據瑚爾起等報稱三月二十一日遣往克勒底雅之索倫領催庫卜堪厄魯特錫爾魯克囘人黙密特等領克里雅城頭目十餘人前來告稱我等將近克勒底雅時有四徳和卓等將賊人阿卜都克勒木等所用頭目布庫塔斯擒執出城來迎隨飭令嚴加看守即抵其城沿途村堡囘人俱甚欣喜又據遣往塔克之索倫隨營委官徹克徳赫爾厄魯特得木齊巴蘇泰等告稱行至塔克詢問囘人知伊等頭目黙里善等避賊入山結寨自守因尋至其地黙里善出迎將賊所用頭目諾們伯克等及所遣之摩羅岳科卜等俱各擒獻今將黙里善領來又據四徳和卓等告稱從前侍衛噶布舒伯克鄂對等遣人前來我阿里木沙領兵助守額里齊人餘人因無管領是以為賊所迫黙里善告稱我等結壘深山賊人據城曾屢次迫脅並未往見再霍集占牧羊大小約四百隻阿卜都克勒木給囘字文書六件一併獻出謹先呈報其擒獲之布庫塔斯諾們伯克等俟解至軍營審訊另報等語臣等伏覩和闐等城危而復安失而復得不勞攻取悉合機宜皆頼上天黙佑聖主威福如此顯著逆酋計日可擒臣等前留侍衛章京永徳在阿克蘇等候馬匹軍器現在咨明兆惠將所到軍需先行辦給不必同巴爾楚克之兵一路起程以致紆道貽悞奏入上諭軍機大臣曰克勒底雅塔克囘人等聞官兵將至擒獲賊人所用頭目爭先迎降甚屬可嘉著富徳至和闐日將伊等功次查奏候朕加恩至從前克勒底雅囘人墨墨里提卜哈子鄂斯璊為賊内應以至城陷此二賊當查拏正法若己隨阿卜都克勒木逃去則進𠞰時亦當留心查辦不可致令漏網又諭曰富徳等現從和闐進兵若阿克蘇辦給馬匹從巴爾楚克路與兆惠同行必致遲悞業已咨行兆惠自必先為辦給至解送馬匹務使不致疲乏以歸實用朕亦已降㫖但内地馬匹送至阿克蘇分給兩路而富徳一路則仍須逺送和闐且伊又不及親身查驗以公義權之縱不擇其臕壯者解送亦當均匀分撥然官兵等惟圖便己亦情勢所必有兆惠統轄全軍自當秉公查辦作何先令起程加意照看著一靣辦理一靣具奏併𫝊諭富徳知之又瑪瑺來京據奏云巴爾楚克頗有水草牧馬二萬匹可供一月等語兆惠與富徳相約㑹兵若自阿克蘇直抵葉爾羌恐長途馬匹疲乏或在巴爾楚克稍為駐牧候富徳信息亦甚有益但恐賊人知覺豫備然我自阿克蘇進兵賊亦未有不知者其悉心計議辦理再瑪瑺奏云從前濟爾噶朗潰圍時有索倫英格圖遇賊負傷力戰甚勇現在兆惠軍營等語英格圖行走若何有無勞績亦著查明遇便奏聞丙戌諭定邊將軍兆惠等辦送兩路馬匹官兵分隊前往軍營上諭軍機大臣曰昨諭兆惠等將辦送富徳馬匹秉公挑選先行起程但此次所辦馬匹若交與永徳等送往則人數無多不敷照管且永徳已諭令隨努三囘烏魯木齊辦理哈薩克貿易事務此時業經前來亦未可定内地辦解馬匹係達爾黨阿哈達哈等䕶送應將伊等分為兩隊往和闐者著達爾黨阿傅景等帶領即在富徳軍營行走增添兵丁更於進𠞰有益兆惠如亦須增兵則先派西安滿洲兵五百名達什達瓦厄魯特兵丁二百名前往和闐其餘官兵著哈什哈伊柱官長保等帶領在兆惠軍營行走俱著𫝊諭知之庚寅恩賞糧運兵丁衣履免扣錢糧上諭大學士曰據定長等奏稱現在闢展存貯衣履等件請分給由哈密運糧送駝之西安等處滿洲緑旗兵丁其不足者支取布疋製給所用銀兩在各兵錢糧内照數扣還等語此次兵丁輓運軍需往返行走甚屬勞苦著加恩將所給衣履等件動用銀兩不必扣伊等錢糧即行賞給以示優恤壬辰諭定邊將軍兆惠等加意撙節糧餉上諭軍機大臣曰永貴等奏稱内地購辦牛羊通計十二萬隻有奇可供二萬兵丁三月口食又舒赫徳等向囘人换易及内地運送糧餉除支給官兵外所餘尚可給進兵後半月之餉等語所辦頗屬妥協現在麥秋將屆囘人既有應交糧石加以布疋换易軍食自可裕如且進𠞰之兵既有半月裹帶抵葉爾羌時賊人亦已收穫可以捜取加之羊隻接濟自無匱乏之虞兆惠等宜加意撙節為要其運送各色布五千疋已𫝊諭呉達善令其酌量採買或一時難得即奏請由京辦理解送癸巳恩䘏軍營病故緑旗兵丁上諭大學士曰兆惠等遵㫖將進攻葉爾羌及歸途病故之緑旗兵丁查明具奏從前明瑞到京朕詢以軍前情形據奏緑旗兵丁内有患病身故者朕心深為軫念今據奏病故兵丁皆係雅爾哈善自庫車帶往因採食杏實等物過多腹泄病故等語似此情節皆雅爾哈善毫無紀律所致伊等雖非身冒矢石効命行陣者可比究係奉調出征在途身故亦屬可憫著將軍兆惠等查明伊等標營姓名造冊咨送楊應琚呉達善等查出伊等子弟即或年幼亦著充補名糧徐為教育仍酌量賞給銀兩以昭朕加恩優䘏之意定邊將軍兆惠等疏奏豫籌進𠞰情形兆惠等奏言臣等查囘人所種之麥因今年有閏月六月始能收割須於賊未收穫之時大兵前進方有禆益現在内地辦送馬匹計五月望日前後可以到來除應送富徳軍營者先行辦理起程外臣等定於五月内務行進發至派出囘人等偵探聲息捉生詢問等事曾與額敏和卓相商有烏什所屬之布魯特四十户可以酌量差遣已將伊等挑選十人豫備臣等惟有勉力前進相機辦理以期迅奏成功奏入報聞乙未諭喀爾喀副將軍策布登扎布查奏沿途堵𠞰情形上諭軍機大臣曰近據策布登扎布奏稱四月十五日領兵起程前往塔爾巴噶台等處防堵逸賊等語著𫝊諭策布登扎布伊起程已經一月此時現至何處何時可抵塔爾巴噶台沿途曾遇一二嗎哈沁否再塔爾巴噶台至特穆爾圖淖爾相去有幾日之程自彼囘至烏里雅蘇台中間路徑孰近孰逺其詳悉查詢具奏丙申諭定邊左副將軍成衮扎布等籌辦折給官兵糧餉上諭軍機大臣曰前據成衮扎布等奏稱策布登扎布領兵前往塔爾巴噶台每兵支給六月錢糧其應得六月餉米酌量折給銀兩羊隻等語此次折給銀兩羊隻或仍辦給官羊或總令伊等自辦若不敷食用作何運送接濟亦曾籌備否可𫝊諭成衮扎布令其即行具奏諭熱河副都統富黨阿等安插達什達瓦屬人事宜上諭軍機大臣曰富黨阿等奏稱達什達瓦屬人等已到熱河一切辦理尚需時日先按人口每月給米二斗銀三錢暫行接濟俟查明户口若干以定官兵額數給與錢糧養贍另行具奏等語富黨阿此奏稍覺稽遲已差三和前往辦理賞給所奏支領米石即准其散給至賞給銀兩三和現在辦理或已經分賞亦不必追繳其將伊等作為官兵酌給俸餉之處著詳議具奏伊等未經出痘應授官職人等不必送京候朕駐蹕熱河時再行帶領引見己亥諭定邊將軍兆惠等覆奏和闐脱出囘人所告情形上諭軍機大臣曰兆惠等奏稱詢問伯克鄂對遣來阿克蘇之囘人瑪瑪特訥則爾據告稱賊黨阿卜都克勒木見大兵將到遣人請霍集占增添賊衆霍集占派騎賊一千五百人以喇木呼里帶領自葉爾羌行走二站駐於羅克賊黨鄂斯璊從和闐敗逃行走五站駐於固璊等語著𫝊諭富徳此時應已抵和闐鄂斯璊等若仍在固璊相去甚近自必擒𠞰或已逃囘葉爾羌即行奏聞又瑪瑪特訥則爾告稱在和闐時曾聞痕都斯坦路管賊卡倫之賽特巴沙爾聞大兵至即降因往取妻子為賊人所殺伊一孫不知其名自固璊脱出報知増添賊衆信息等語著富徳查明奏請酌量加恩賽里木伯克呢雅斯守哈喇哈什時得傷身故亦屬可憫伊有無子孫亦併查奏瑪瑪特訥則爾及同來之鄂對妻兄阿璊伯克沙雅爾囘人薩爾巴三等俱曾劾力行走兆惠現在行文富徳詢問鄂對俟咨覆得實即酌賞銀兩又諭曰據瑪瑪特訥則爾告稱霍集占於葉爾羌附近耕種等語是逆賊等尚無逺遁之意葢伊等以我兵到彼不過攻圍數月未能持久俟撤兵即可無事著𫝊諭兆惠等進兵時須加意備辦攻城器具現在呉達善於肅州造送攩牌又有鑄造大礮及雲梯等件足以突陣衝堅至賊人逃竄之路亦宜嚴為堵截再披閲地圖痕都斯坦一路似與克勒底雅相通克勒底雅為和闐六城之一冨徳等宜詳加詢問派兵防範現在駐劄何處著即奏聞命賜吉林署協領布爾哈等巴圖魯號上諭軍機大臣曰前據明瑞奏健鋭營前鋒林保不待雲梯直薄賊寨朕已賞給噶克察巴圖魯號仍諭兆惠將似此奮勇擊賊之人查出請㫖今據將吉林署協領布爾哈等十四人列單具奏著加恩將布爾哈賜號布彦圖巴圖魯索倫署參領巴勒琿賜號噶畢雅圖巴圖魯哲野勤圖賜號齊爾瑪海巴圖魯烏密勒圖賜號固濟爾巴圖魯委署防尉固勒克訥衣賜號肯特克巴圖魯吉林署驍騎校薩爾泰賜號鄂莫克圖巴圖魯馬甲英賚賜號巴爾巴圖魯索倫領催隆恰賜號超圖巴圖魯烏延察賜號阿勒達爾泰巴圖魯額黙勒肯賜號賽沙勒圖巴圖魯和帊勒圖賜號衛魯克森巴圖魯穆庫楚賜號額徳格勒圖巴圖魯錫扎布賜號噶魯克三巴圖魯察哈爾驍騎校巴圖孟克錫號巴圖巴圖魯照例賞銀各一百兩以示鼓勵命賞隨將軍納穆扎爾力戰負傷脱出兵丁上諭軍機大臣曰據兆惠等將納穆扎爾隊内脱出兵丁等查明力戰得傷情節造冊送部等語前據舒赫徳於巴爾楚克遇脱出之科科勒岱等四人業經加恩賞銀各十兩此次查送之兵丁等除交部議敘外俱著照例賞給銀兩以示優恤壬寅諭辦理屯田副都統定長等查拏藏匿嗎哈沁各事宜上諭軍機大臣曰據定長奏主事富魁於伊犂等處立碑告竣領兵丁匠役等囘至闢展并於博羅通古拏獲嗎哈沁烏勒木濟據供有綽羅斯台吉烏勒木濟等三十户七十餘人在瑪納斯山内藏匿等語著𫝊諭定長此等潛踪來往之嗎哈沁必期盡𠞰方使地方寧謐達爾黨阿等送馬曾從此經過否定長等派兵五六十名可否即能辦理至所請將烏勒木濟賞給肅州官兵為奴但據伊供詞曾殺傷二人自應抵償已𫝊諭楊應琚等俟解到時即行正法諭直隸總督方觀承酌量分撥馬匹上諭軍機大臣曰提督呉進義奏上年督臣購備馬四千匹現在軍務將竣似無急需陜甘營馬抽調以來應有缺額未補請以二千匹由邊路解赴榆林二千匹由内地解送西安等語所奏甚是此項馬匹與其額外分營收槽飼秣孰若酌量分撥陜甘以補缺額或有需用亦可就近調遣二省原有馬乾可以支給何必留於直隸致糜草豆現在甘霖未溥糧價尚昻以此節省之屯豆減價平糶亦可兼資民食著𫝊諭方觀承通融籌畫妥協辦理平定準噶爾方略正編卷七十二
