  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_025-1a, image: WYG0357/WYG0357-0365a.png}
body:
  text: 雍正九年七月丙戌上諭大學士等曰吉黨阿著授為護軍統領同欽拜帶領右衛兵丁前往北路軍前費雅思哈阿福塔齊什鄂爾多巴什等俱賞給原銜給與俸禄著同庫齊圖隨漢軍兵丁前往視㸔道路水草齊什到京後俟馬蘭泰帶領兵丁起程時一同隨往又諭曰原任盛京戸部侍郎傅鼐著調回往軍營効力免治土黙特副都統衮布等妻子罪靖邊大将軍傅爾丹奏請治臨陣逃避弁員之罪又土黙特副都統衮布營總拉察卜㕘領塞楞背恩降賊情罪尤重請先以其妻子正法上諭大學士等曰傅爾丹奏稱歸化城之土黙特副都統衮布營總拉察卜㕘領塞楞背恩降賊請将其妻子按律正法等語朕思歸化城土黙特等世受國恩凡遇用兵之地奮勇効力已厯多年總未有一背國降賊之人今衮布等不顧辱及祖父累及妻子貽羞於衆土黙特縱按律處治罪所應得朕今法外施恩衮布等之妻子從寛免死仍令伊等照舊安居著行文與丹津将此悉諭土黙特弁兵知之丁亥上諭大學士等曰康親王崇安今於八月二十一日起身前往軍前著賞給内庫銀一萬兩其隨往該屬人員照順承郡王出征之例賞給應得馬匹照定例折價交與該王辦理又諭曰馬蘭泰曽經委署前鋒統領帶領滿兵今滿兵既暫停起身馬蘭泰著同漢軍兵丁前往其卡倫等處行走之滿兵令馬蘭泰専轄又諭曰八旗漢軍官兵應扣未完車本銀兩著悉行寛免己丑訓諭西路軍營防邊破賊事宜上諭大學士等曰西路防禦賊人之事已屢經降㫖與大将軍岳鍾琪等預為留心料理但禦賊之道務須計出萬全朕披覽輿圖見軍營至肅州中間甚為遼闊而邊外一帶如赤金栁溝金塔寺沙州𤓰州等處散處之民人甚多牲畜亦衆萬一賊人乗其不備而侵擾之則巴里坤之大軍何可分勢於各路堵禦凡此黎元皆吾赤子横被擄掠荼毒於心實為不忍况搶奪民人之牲畜即可為賊衆之口糧則與我疲敝賊人之計亦大相左矣朕意當令民兵預度就近可居之地一聞賊信即遷移以避之務期免其侵害若從前駐兵之處有應添兵力以保䕶百姓者亦著大将軍即行調撥但不可分大營之兵勢總之使賊人此次逺来一無所獲所謂不戰而屈人之兵也但須善於奉行安慰民心勿使驚惶疑惑以致失所此朕惟恐邊外居民被賊侵害預籌防範之大槩也至於用兵之道固以防邊固本為先而機㑹可乗亦不可失若但堅壁自守聽其肆行無忌雖有可乗之機仍復拘泥成見則又恐賊勢猖狂将來何所底止今冬西路既已預備賊衆若來我師以逸待勞以静待動大将軍外觀形勢内度己力儻有可乗之機或發兵出撃以挫其鋒或堵禦隘口以遏其路或暗中埋伏以出其不意或趕逐馬匹以驚其衆心亦足使賊人喪膽但萬萬不可輕舉逺逐以分兵勢大将軍只在大營調度不可親身前去副将軍等亦酌量行之撃賊之時賊人以馬兵前來我師以歩兵出撃實勝于馬兵禦敵不可棄長就短是以現在添𣲖北路兵丁朕将漢軍歩兵四千名𣲖往大将軍等當共知此意則𣲖撥各得其宜且使衆人各效其所長而大功可成矣朕又細思西北兩路大營乃防邊撃賊之根本若果兩路大營堅固整齊不為賊人所揺撼則彼必瞻顧徬徨恐我軍截其歸路掃其巢穴不敢肆行無忌即如今春之率衆潛歸不敢久留西路者恐北路之兵襲其後路也此畨六月之不敢逼近科卜多軍營者又恐西路之兵搗其巢穴也目前賊既得志於北路伊知北路兵力不能進取則今冬仍往西路且増添賊衆更多於侵犯北路之力量俱未可知總在大将軍先事圖維臨時權變勿貪功前進勿坐失機宜斯為美善又如賊人侵犯刦掠多在風雨隂晦之時此際天氣潮濕鎗礟之火藥難出弓箭之力量軟懈二者均未便利當多備手鎗挑刀等械以為擊賊之具可助鎗礟弓矢之力将此傳諭岳鍾琪等知之八月辛夘議撥兵駐劄圖拉克爾倫等處上諭大學士等曰四十九旗扎薩克㳺牧之地甚屬𦂳要科爾沁等處㳺牧兵丁著𣲖數千名駐劄圖拉克爾倫等處現在軍前扎薩克兵丁著撤回數千名與伊等合為一處盛京兵亦𣲖二千名共一萬有零賊來侵擾喀爾喀等㳺牧處可以照管爾等㑹同科爾沁王額駙羅卜蔵滚布等詳議具奏尋議選𣲖科爾沁十旗兵二千名敖漢等十一旗兵一千名烏朱穆秦十一旗兵一千名軍前撤回兵四千名合盛京𣲖出兵二千名共一萬名遣官管轄給與糧餉如例往駐克爾倫捍禦奏入得㫖此等處兵丁俱行選𣲖暫在該處預備聽候調遣丁酉訓諭青海䝉古及諸畨夷上諭青海䝉古及畨夷人等曰朕統御萬方凡中外民人皆一視同仁莫不欲使之得所爾等沿邊畨夷及青海䝉古同受國家撫綏保䕶之恩並無歧視目今準噶爾賊人窺伺邊境或将來侵擾青海䝉古而黄河以南之䝉古畏避賊鋒投奔近邊畨夷之地亦未可定爾畨夷等須留心照㸔切勿因向日曾有嫌怨乗其危急而加以戕害若䝉古中有不法之徒搶掠畨人者許畨人用力抵禦不必退縮将來事定之後朕自然以理斷其曲直分别賞罰畨人䝉古皆朕赤子果能遵朕諭㫖彼此相安同受朝廷之恩澤方是爾等之福思之思之蒿齊特扎薩克多羅郡王阿噶尼斯達卒以其子策凌喇卜坦襲爵庚午諭定康親王崇安赴軍日期並議駐兵處所上召入出兵王大臣等諭曰康親王本月二十一日不必起程朕另定日期著王諭所屬人等愛惜馬力相擇水草從容前往推河等處大将軍馬爾賽到軍營後或令康親王駐劄克爾倫地方管轄扎薩克盛京等處兵丁或将扎薩克兵丁𣲖數千名滿洲兵内之懦弱者𣲖數千名駐劄圖拉扎克拜達里克等處令康親王管轄著大将軍馬爾賽順承郡王㑹同定議諭吐魯畨固守事宜上諭大學士等曰據副将軍石雲倬奏稱七月十三四等日有準噶爾賊人侵擾吐魯畨副将王廷瑞等分兵迎敵與賊連戰屢勝生擒賊人七名殺賊二百餘人獲軍器馬匹不計其數等語王廷瑞分兵迎賊甚屬孟浪此畨賊衆不過一二千人王廷瑞等幸獲小勝不但不足為喜朕更為吐魯畨憂之賊人屢被吐魯畨之敗創其懐恨益深必復以大衆報復石雲倬可速傳㫖曉諭吐魯畨嗣後賊人來犯但當堅守城垣不可迎戰若魯克察克一城可以容住回民人衆則合防守之官兵堅守一城愈妙如一城不能容住多人則别住於相近之喀喇和卓等處将馬匹牲畜速行收拾城中柴草預為多貯以備應用賊衆若分兵來圍彼此堅守堅壁清野俾賊人無所施其伎倆且有大軍襲其後奪取其馬匹坐致疲敝自必逺遁亦不可追逐賊衆長於騎射吐魯畨如於馬上比决勝負則回民十不及賊人之一若固守城垣以拒敵賊人亦十不及回民之一用我之長乗賊之短此萬全無弊之道也凡事持重鎮静為之但能保䕶吐魯畨城垣人衆其功勝於殺賊多矣辛丑諭漢軍兵牧馬行軍事宜上諭大學士等曰此次𣲖往軍前之漢軍兵四千分作四隊前往第一隊著都統李杕統領二隊著副都統佟世茂統領三隊著副都統劉汝霖統領四隊著都統祖秉衡統領漢軍人等不善牧養馬匹貝子僧衮扎卜公羅卜蔵策卜登帶領前往之喀喇沁一千兵亦著分為四隊𣲖入漢軍兵内凡漢軍牧養馬匹與行軍事宜令其指示著㕘贊侯馬蘭泰管理火器營兵部侍郎諾爾琿沿途照㸔在推河地方過冬俟明年草生時著大将軍馬爾賽另備馬駝接迎漢軍兵丁将伊等原乗馬匹交與喀喇沁兵暫行牧養此喀喇沁兵著僧衮扎卜等統領在推河駐劄俟大将軍到時調遣而行命舉有功軍校署㳺撃守備等官署陜西總督查郎阿奏言陜甘二省值軍興之際一切領兵差委需用将佐甚多仰懇敇部揀發逰擊十二人守備十二人赴陜備用奏入得㫖凡在京引見之武弁稍有可用者朕即分發各省以備題補委署之用安得尚有餘剰人員數十名之多朕思上年冬月陜西固原提督樊廷率領弁兵擊敗賊衆懋著勞績朕已逾令各回内地營汎休息以示恩恤凡此有功之人自有材技優長可膺超擢者著查郎阿問明樊廷等秉公揀選若果奮力行間人材可用即以微弁兵丁題補委署逰守等缺亦可不必以越等為嫌務期舉用公當以副朕奨勞賞功之至意封喀喇沁固山貝子僧衮扎卜為多羅貝勒癸夘靖邊大将軍傅爾丹奏言臣世受國恩有逾髙厚復䝉皇上榮施望外授以大将軍重任耳提面命訓諭周詳臣不能遵奉聖訓妄動輕舉損折将士辜恩負罪非惟國法不可緩死即臣心亦難以偷生今皇上不即加誅降㫖慰諭復加賞賜實從古未有之鴻慈但臣此次進軍失利兵弁被傷臣於時若不鼓勵将士收軍而回轉使賊人得計乃與副将軍巴賽查弼納等籌議力衛餘軍奮兵轉戰而出至建城之處以待國討今臣已至城所安置哨站並建諭喀爾喀副将軍等令其運糧固壘以息将士招集商人謐寧䝉古諸務悉已就緒伏乞皇上速遣賢将統率大軍将臣調回同臣妻子一併正法以昭國憲奏入得㫖朕從前諭㫖甚明朕之處事豈肯不持大義以定是非而聊為此目前慰勉之理惟輕信賊言冒險深入中賊詭計是爾之罪至不肯輕生自殺力戰全歸此爾能辨别輕重之處事定之後朕自有辦理之道爾若念慮紛擾以致血氣消耗不能報讎雪恥上損國威下玷家聲罪尤甚焉爾其勉勵勇氣安心敬攝計圖逺大以答朕恩丙午議科卜多察罕廋爾等處駐兵事宜靖邊大将軍傅爾丹奏言科卜多修城處所當竒蘭及庫列圖二道要隘又逼近布拉罕大路且旁通阿爾台小路處甚多實為險要之地今臣至修城處所時其城已築髙至五尺此際現令緑旗兵等加力修築令髙一丈合計垜城共髙至一丈五尺其餘防守事宜已為堅固但周圍十有二里甚屬遼闊現兵一萬五千九百餘名僅足支守城之用應再於城垣左右増兵守隘庶賊來可資攻禦計修城處所距察罕廋爾一千四百餘百難於策應伏乞皇上勅令盛京吉林黑龍江内扎薩克等處撥兵前往駐防於軍務實有禆益奏入上諭大學士等曰據靖邊大将軍傅爾丹仍欲令兵丁在科卜多地方駐劄防䕶爾等㑹同大将軍馬爾賽将應駐應撤之處確議具奏再將查克旦率領駐劄庫卜克爾地方兵丁應否撤於察罕廋爾之處一併議奏尋議科卜多所駐之兵逺隔察罕廋爾千有餘里勢難捍衛察罕廋爾地近喀爾喀㳺牧如令大兵㑹集駐劄不惟軍威强盛而防䕶亦有禆益應撤回科卜多兵駐劄察罕廋爾其庫卜克爾兵亦應撤往奏入上從之上諭理藩院曰青海扎薩克一等台吉恭格効力有年前羅卜蔵丹津叛逆時在哈瑪爾嶺奮勇殺賊今又追擒諾爾布著加恩封為公爵戊申命護軍統領馬拉自蔵回京上諭大學士等曰從前降㫖令馬拉回京今蔵内現有僧格包進忠邁禄青保苗夀等數人辦理事務馬拉著遵前㫖回京一路防衛兵丁或四五十名或百名馬拉酌量帶回謹慎行走命停土爾扈特使臣往西蔵上諭大學士等曰爾等行文與鼐格土爾扈特之使臣若至彼處暫且不必令往西藏著在達賴喇嘛處居住若已過去亦著追回伊等日用之費著四川督撫寛裕給與諭西藏貝勒頗羅鼐嚴備準噶爾西藏貝勒頗羅鼐等奏報準噶爾欲送回拉藏之子蘇爾雜於西藏立以為汗得㫖準噶爾殺害拉藏将其子蘇爾雜擄去今稱送回西藏我兵須嚴為防備從前策妄阿喇布坦遣策零敦多卜襲西藏時亦誑稱噶爾丹丹津同其女來藏乗其不備進兵襲取藏地今送回蘇爾雜之言正噶爾丹策零施行姦計若唐古忒部落少為玩忽即蹈從前策零敦多卜之故轍矣準噶爾賊人既殺拉藏豈有實心将蘇爾雜送回西藏令代父職之理著頗羅鼐将此情由曉諭衆唐古忒知之準噶爾賊人揚言發兵五千䕶送蘇爾雜道途險阻全軍豈能齊到目今西藏有内地兵丁二千名換班兵丁五百名又駐防察木多兵一千名現催來藏爾處亦有訓練䝉古兵丁應與駐劄西藏大臣㑹同商議於阿里哲斯肯圖魯克勒底雅等處要隘逺設卡倫詳加暸望協力防守準噶爾賊衆若以兵隨蘇爾雜斷不可容留即迎戰擊退賊敗走時亦斷不可追襲蘇爾雜父兄被人殺害伊豈不忿恨若果思報讎並感戴朕恩帶領數人恭順來歸爾等收留悉心安頓至若立汗之事當令達賴喇嘛班禪額爾徳尼奏聞於朕方可建立豈可令噶爾丹策零任意妄行頗羅鼐原扶助拉藏効力行走後因拉藏被賊殺害朕令爾料理西藏事務爾約束唐古忒實心効力是以加恩封爾為貝勒今蘇爾雜若果率領數人來歸爾即行奏聞候朕另頒諭㫖辛亥撫逺大将軍大學士忠達公馬爾賽赴北路軍營上命皇四子祭告奉先殿王以下官員於西長安門外送行上勅諭之曰奉天伐罪治世之常經鋤暴除兇安邊之逺略逆賊噶爾丹策零者狂悖㝠頑父子濟惡妄欲侵凌我屬國窺伺我邊陲包蔵逆心狡焉思逞朕以此賊不除終為衆䝉古之隠患是以命将興師聲罪致討然稱兵耀武非朕本懐臨以天威許其悔悟未嘗督責将士立事掃除此朕數年以來靖固邊圉撫綏屬國之謨略也兹特命爾為撫逺大将軍統領滿洲䝉古緑旗大兵爾其彈壓邊疆肅清壁壘申明紀律鼔勵戎行鎮静以俟機神明以制勝持重以固守整衆以宣威勿恃兵强而輕視賊徒勿謂已能而不納衆論宻偵逺探廣意外之防維先事熟籌决萬全之勝算勿冒險以輕進勿貪功而深入各路大兵及䝉古兵丁聽爾調遣凡遇駐劄處加謹約束兵将所過地方申嚴軍令毋得騷擾百姓毋得淫人妻女毋得離散人之父子夫婦毋得損壊人之墳墓室廬毋得彊取貨物毋得驅役平民其或臨戰退縮貽誤撓亂軍機者文官四品以下武官三品以下即以軍法示衆官兵有犯小過者徑行處治有勞必録有過必懲法紀務極嚴明賞罰悉期公當賊中有窮蹙來歸者加意撫恤其不抗拒官兵者勿加殺戮一切機宜爾酌量調遣有應知㑹西路寧逺大将軍者即行知會一同辦理爾其嚴重精詳殫心奮力以副朕戡亂靖逆安民綏衆之至意欽哉故勅甲寅寧逺大将軍岳鍾琪奏言臣遵㫖襲擊烏魯木齊於七月十二日自巴里坤啟行經行伊勒布爾和碩五百餘里直至穆壘河並無賊壘於二十三日臣統領大兵至阿察河有賊夷數百來誘我師臣即直前迎擊賊人敗走追至額勒穆克河有賊三四千人隔河踞山分兵為三隊臣先令總兵官張元佐等率歩兵為右翼提督紀成斌率馬兵為左翼總兵王緒級曹勷等率兵由中路策應又令㕘将黄正位等率勇健兵從北山抄襲賊人之後官兵争先並進攀援山梁直衝賊隊自辰至午盡奪其所據山梁賊往西遁逃殺死者無筭㑹日暮途險未可窮追即劄營留駐二十四日奉上諭令臣略行襲擊即撤兵回營臣追賊夷距納林河不逺計兩日可至烏魯木齊而烏魯木齊附近賊皆逺徙深入無益臣於七月二十五日統領大兵歸巴里坤仍按程伏兵禦後臣遵㫖襲擊并旋師日期合行奏聞得㫖岳鍾琪此次領兵襲擊賊衆進退遲速俱合機宜弁兵等鼓勇争先同心効力甚屬可嘉著岳鍾琪将在事有功之人分别造冊送部俟成功之日一併從優議叙賞賚其陣亡及帶傷之兵丁著照例賞卹靖邊大将軍傅爾丹奏言准大學士咨稱副将軍巴賽查納弼㕘賛馬爾薩副都統舒楞額等率兵進𠞰至今無信應查明奏聞臣自至科卜多後詳細訪問巴賽等總無確音今有從賊營回歸之正紅旗前鋒校薩明阿據稱中賊刀傷被擒遇土黙持營總拉察卜云副将軍巴賽查弼納於六月二十八日越嶺至一小河俱戰歿又冇賊營回歸之正黄旗䕶軍海夀係㕘賛馬爾薩𫝊事之人據稱六月二十八日隨馬爾薩至哈爾哈納河相近紅石崖下馬爾薩中鎗陣亡海夀救援被擒等語查薩明阿海夀二人俱係被擒從賊營回歸所報屬實至舒楞額未得確音俟查明再奏奏入報聞乙夘備給赴藏滇兵衣装糧馬上諭大學士等曰察木多駐劄之雲南兵一千名令其前往西藏備用爾等已行文與總督鄂爾泰及西藏辦事大臣等但雲南省城轉行察木多路途紆逺可行文與駐劄察木多之大員此旨到日該員即将兵丁應用之馬匹衣装等項料理齊備将弁等統領即速起身按程前進不必候雲南文書其一應馬匹衣装口糧俱著寛裕應付毋得遲誤丁巳上諭理藩院曰據青海郡王額爾徳尼額爾克托克托鼐奏稱年力衰邁請令伊子代伊在軍前行走額爾徳尼額爾克托克托鼐曽經効力之人甚屬可憫著将伊子内可以襲替王爵者指出一人朕加特恩封為長子令代伊効力行走平定準噶爾方略前編卷二十五
