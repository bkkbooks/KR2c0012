body:
  text: 乾隆二十五年冬十月壬辰命賞巴里坤辦事道員同德布政使職銜上諭軍機大臣曰同德奏稱採買巴里坤商販羊五千隻以五百隻為一羣選派官兵加意牧放等語同德前經獲罪遣往巴里坤效力今辦事甚屬奮勉著加恩賞給布政使銜以示鼓勵命賞革職副都統范時綬參領職銜上諭軍機大臣曰舒赫德奏范時綬自闢展解羊一萬三千四百餘隻至阿克蘇沿途倒斃不及十分之一請將官兵議敘等語范時綬此次管解羊隻督率官兵甚屬勤慎著加恩賞給參領職銜各官兵著交部議敘參贊大臣舒赫德疏奏修理穆素爾嶺及更换臺站兵丁事宜舒赫德奏言臣等恭齎欽頒祝文香帛於九月二十五日致祭穆素爾嶺仰荷神祗感應先三日天氣清和本日風霧盡斂日色昭朗官兵回人等俱驚異歡悅臣察勘穆素爾嶺形勢由山陽之亥里巴特阿璊八口兩面俱是高峯中滙大河由山崖行百八十里至塔木噶塔什臺站即山嶺之足初入嶺口繞行氷石相雜之地二十里一山橫亘盡屬堅冰臣即將派出修理道路回人一百二十户內每日派二十人更番槌鑿過此地復冰石相雜約六七十里至噶克察哈爾海臺站山陰積雪柴薪甚乏看此兩臺較各臺稍為竭蹶所有原奏臺站官兵二年一換之例請改為一年一換至修理道路回人係阿克蘇噶雜納齊伯克呢雅斯之弟巴巴克管轄數月間修理妥協並無貽誤請賞給六品頂帶以示鼓勵奏入得旨如所請行丙申諭參贊大臣舒赫德等辦理由哈薩克等處來投之厄魯特事宜上諭軍機大臣曰阿桂奏稱凡由哈薩克布魯特陸續投來之厄魯特應先行遣往阿克蘇以供役使俟一二年後再調赴伊犂等語所見甚是可即照此辦理至由哈薩克等處投來之厄魯特將來日漸加多伊等前來貿易或相識認懇求賞還當直告以此等厄魯特人因苦爾拘束始行逃出況爾等已為大皇帝臣僕事同一體不便給回亦不必向伊等稍為隱飾著傳諭舒赫德阿桂安泰定長等知之參贊大臣阿桂疏奏巡查納林阿特巴什情形阿桂奏言臣從前奏派副都統伊柱前往特穆爾圖淖爾查勘布魯特等在納林阿特巴什等處耕種有無越界今據告稱八月二十六日至特穆爾圖淖爾有十數人蹤迹一見我兵放鎗數次旋即逃走比即追擒二人據供係布魯特車里克齊所屬采鐵至此因諭以爾等部落業經歸順一時不知官兵到來姑從寬宥次日即派侍衛鐵柱佐領德勒克領兵十名前往納林九月初九日回營告稱八月二十七日由巴勒琿嶺行八百里至納林河河兩岸俱有布魯特等遊牧耕種隨有阿特巴什賞孔雀翎三品頂之布魯特頭目車里克齊等率衆接見呈送口糧羊隻并查擅放鳥鎗之屬人等解營請罪因諭以阿特巴什等處皆大兵平定準噶爾所得之地爾等不應遊牧但爾情詞恭順應候大臣轉奏至納林北岸阿特巴什東岸則斷不可踰越該頭目等敬聽遂酌賞緞匹遣回等語臣謹查阿特巴什等處舊係布魯特之地又在巴勒琿嶺之外去伊犂甚逺誠如聖主洞鑒可以不須驅逐臣等每年巡查即以納林阿特巴什為界禁止侵越至該處距喀什噶爾雖近尚隔大山而附近之布魯特遊牧更多亦可無庸辦理奏入報聞戊戌命升賞烏帕勒村回人阿卜都色里木上諭軍機大臣曰海明奏稱逆回邁喇木等倡亂時有烏帕勒村回人阿卜都色里木實心報效固守卡倫請授為六品伯克等語阿卜都色里木著授為六品伯克仍賞戴藍翎及緞二端以示鼓勵十一月辛丑朔諭陜甘總督楊應琚㨂派副將一員管領烏魯木齊屯田兵丁上諭軍機大臣曰安泰等奏稱奉到遣回涼州總兵達啓之旨已於十月十一日遣令起程續準阿桂咨送奏稿將金梁調往伊犂其烏魯木齊緑旗兵丁請派大員管領等語安泰此奏係十月十三日距達啓起程之期未逺何難即時追回乃另行請派甚屬拘泥但業已遣行且達啓亦效力有年不必再行調遣著傳諭楊應琚於陜甘副將內㨂選一員前往烏魯木齊併傳諭安泰等知之癸卯諭陜甘總督楊應琚辦送阿克蘇鑄錢工役器具上諭軍機大臣曰舒赫德奏阿克蘇等城出産紅銅現據該伯克等懇請設爐鑄錢流通行使並乞照葉爾羌之例笵為阿克蘇字樣至工役器具皆所必需業經行文該督辦送器具其工役等若於葉爾羌分撥恐彼此俱不敷用仍請於內地另行派撥等語錢文為回民日用所必需自應照葉爾羌例一體鼓鑄著傳諭楊應琚即查照上年之例速行妥辦派員送往議辦送伊犂屯田牲隻事宜軍機大臣奏言臣等遵旨查得伊犂屯田需用甡隻與其購辦解送長途疲乏虛糜經費不若在牧羣牲隻內揀派解送俾得從容牧放永逺孳生實有裨益查商都達卜遜淖爾達里岡愛牧場牲隻總計騸騍馬十萬匹有竒內馬駒一萬七千七百匹有竒騸騍駝四千五百隻有竒內駝駒六百隻有竒牛二萬六千二百頭有竒內牛犢四千七百頭有竒羊二十八萬二千八百隻有竒內羊羔六萬七千隻有竒擬抽出馬二萬匹駝一千隻牛六千頭羊六萬隻送至伊犂此係預備屯田牲隻並非急需中途儘可緩行仍就牧場官兵內選取熟習牧放勤於飼秣之人於來年草青時解送毋許損傷遺失其如何編羣分起辦給行裝即交該總管等議奏臣等另行請旨派出侍衛照管起程仍咨行巴里坤烏魯木齊大臣派兵沿途護送奏入上從之參贊大臣舒赫德等疏奏續派伊犂屯田回人事宜舒赫德等奏言臣等傳集各城阿竒木伯克等商辦屯田回人事宜據稱定於來年正月下旬起程其家口即可同往先後辨送五個月口糧可至麥熟之期其籽種口糧牲隻酌量各城人數通融派撥送往伊犂但運送牲隻恐倒斃過多請交伊犂大臣察核再將阿克蘇馬一千匹交各城飼秣以備來年之用等語臣等查該伯克等所議俱屬可行又伊犂屯田回人一千户除本年已派三百戶及續派五百戶外餘二百户於麥熟後送往則所辦籽種口糧俱可節省據該伯克等酌議派出阿克蘇回人七十五户烏什四十五户庫車十四户賽里木六户沙雅爾六户拜四户再派多倫五十户其護送之官員兵丁等臨期再行酌派奏入報聞乾清門侍衛納旺等疏奏傳諭哈薩克情形納旺等奏言臣等於六月十二日同哈薩克阿布賚前往巴魯克遊牧處所沿途遇被掠之烏梁海男婦等俱查出付還但未交明牲隻什物隨詢問烏梁海等據所告數目向阿布賚索取伊願竭力查給臣等遵旨令其將巴魯克呈獻阿布勒比斯及衆人亦勸其送出阿布賚因傳到巴魯克語之云今將汝送往京師請罪自邀寬典不必畏懼巴魯克向衆叩頭云我一身何關輕重但惟賴爾衆人救援爾等既有遣人懇求大皇帝之議且稍守候如不蒙俞允再行解送我亦無怨阿布賚復再三向臣等懇求臣等又訪聞呼克扎爾拉薩爾珠瑪特二鄂拓克俱係巴魯克姻戚阿布賚恐遽行解送則伊等生怨是以阿布賚議遣伊弟卓勒巴喇斯進表陳情其烏梁海等約來年全行送出臣等因帶領查出之烏梁海一百四十八名口馬五十六匹及牛駝軍裝等物同使人卓勒巴喇斯蘇爾統等二十四名跟役五人於八月十九日自通魯克起程十月十二日至察罕郭勒從阿爾台索勒畢嶺過烏梁海遊牧會同內大臣察達克交收人口牲隻什物仍領使人由烏里雅蘇台辦令來京奏入報聞乙巳諭葉爾羌辦事都統新柱等嚴訊解送犯屬官兵擅賣人口確情上諭軍機大臣曰新柱等奏稱準舒赫德等咨取喀什噶爾搶臺逆犯家屬九十二口分賞兵丁隨派外委把總董昌趙廷士李信及共丁二十九名解送詎董昌等因內多老弱廢疾之人不便行走除病故九口外將六十七口賣給沿途來往回人得錢二百二十一騰格有竒殊干法紀將董昌擬斬立決趙廷士等革職枷責令當苦差效力兵丁等各擬棍責等語所辦尚未妥協此等逆回家口果係老弱廢疾則海明即不應交付董昌等又豈肯收領乃既經接受何以三日僅行五十里縱使實不能行亦當就近稟知海明即英噶薩爾亦有駐劄大員可稟乃遽行售賣深屬可疑且起程未逺何以沿途收買者聞信若此之速況垂死無用之人收買者何所利而為之朕意逆回家口內必有喀什噶爾回人姻戚不願往葉爾羌遂賄通董昌等將人扣留直以空名往報又或潛約於第一站私行出錢領回董昌貪其厚利揑稱不能行走徑行賣放如果有此情節不但董昌罪無可逭即趙廷士等皆應一體正法兵丁等亦當從重治罪若實係不能行走因而冒昧售賣其罪尚不至斬決當改為監候可傳諭新柱額敏和卓等會同海明將此等官兵親加嚴訊倘舞弊情實即將董昌等正法示衆併傳諭海明知之丙午烏魯木齊辦事御前侍衛副都統安泰疏奏塔什罕回人貿易安泰奏言十月初五日哈薩克商人四十餘名內有塔什罕回人二名帶馬五百匹前來臣等欽遵諭旨照原定價值無論騸騍馬匹俱準其易換貨物并諭塔什罕回人令其傳知該部落與哈薩克一體貿易以伊等此次初來賞給飲食送出卡倫奏入報聞丁未喀什噶爾辦事都統侍郎海明疏奏酌免霍罕使人貿易納稅海明奏言侍衛索諾木策凌伍岱前奉使霍罕等處九月三十日帶領霍罕額爾德尼伯克使人瑪哈默特和卓哈子和卓并貢馬十三匹前來附呈文書為販賣牲隻請免納稅等語因與定約嗣後使人貿易免其納稅其餘商販仍照常例給文遣回侍衛索諾木策凌等於十月初四日起程赴京奏入報聞己酉命揀選烏魯木齊滿員料理伊犂屯田事宜上諭軍機大臣曰阿桂等奏稱現在伊犂屯田需員料理請於烏魯木齊滿員內或同知或知縣㨂派一員令其承辦糧餉等語烏魯木齊有發往留駐人員著安泰即行㨂選於明春屯田兵丁起程時同往如烏魯木齊需員辦事即行文陜甘總督楊應琚照例派撥併著傳諭知之參贊大臣阿桂等疏奏辦送伊犂籽種駝隻阿桂等奏言臣等前次會商舒赫德咨取烏魯木齊駝隻派緑旗兵五百名每名領運籽種一石行糧三個月送至伊犂今準安泰知會烏魯木齊有駝一千一百九十六隻甚屬寬餘應酌量每石加領籽種五斗共七百五十石今年伊犂所種皆係黍粟來年籽種應酌帶大麥一百五十石小麥六百石又咨商同德將巴里坤所購駝隻於來年青草時送至烏魯木齊以備二隊兵丁之用奏入報聞庚戌參贊大臣舒赫德等疏奏派撥賽里木拜官兵事宜舒赫德等奏言臣等前奏將賽里木拜二城駐劄緑旗兵四百名派一百五十名遣赴伊犂查二城相隔不逺而拜城在阿克蘇庫車之間應令守備一員兼轄賽里木其賽里木遊擊一員即令帶兵前往伊犂奏入報聞乙卯葉爾羌辦事都統新柱等疏奏沙莽素爾寄信情形新柱等奏言十月初二日據滚地方阿竒木沙莽素爾遣人至葉爾羌以帕爾西字書信寄臣其辭意頗為恭順并稱有來使口稟之言臣詢問來人圖里雅默特據稱拔達克山素勒坦沙因往攻博洛爾遣使借兵一百名沙莽素爾以博洛爾亦係天朝臣僕未曽借兵但恐結怨於素勒坦沙特先告知又有哈爾提根之屬人十户投入我部落或應送內地或準其居住並請定奪等語臣伏思沙莽素爾不肯借兵頗知大義因曉示來使云素勒坦沙與爾等伯克俱經歸附自不敢妄生釁隙爾伯克但當謹守部落勿生疑慮至哈爾提根亦曽歸附其屬人逃出不但不可送來內地即爾伯克若不先知會便行容留將來恐失和好應詢問情由將人發回等語仍寄沙莽素爾緞二端賞來使布二匹并繕回書於初七日遣令起程其所譯來書及臣等回書一併録呈御覽奏入報聞戊午授原任總河富勒赫郎中職銜仍在烏里雅蘇台辦理糧餉己未議酌給西路辦事大臣養廉事宜軍機大臣奏言臣等欽奉恩旨以新疆所設辦事大臣駐防屯田一切日用及賞賚之需宜酌籌寬裕除各該處官兵人等仍照舊例支給鹽菜銀兩外其駐劄辦事及領隊大臣謹遵旨酌照西藏西寧大臣之例給與養廉銀兩分為總理協辦領隊三項查伊犂增駐官兵屯田築城事務較多擬給總理養廉二千兩協辦一千二百兩領隊一千兩阿克蘇為伊犂要路辦事亦繁請照伊犂之數賞給葉爾羌喀什噶爾地處極邊擬給總理養廉一千五百兩協辦一千兩領隊八百兩烏什庫車和闐哈喇沙爾闢展烏魯木齊等處與內地相近擬給總理養廉一千二百兩協辦八百兩領隊六百兩巴里坤哈密雖係內地亦有承辦軍需事務擬給總理養廉一千兩協辦六百兩領隊五百兩吐魯番公木薩在伊犂辦理屯田亦擬給養廉五百兩其原得鹽菜銀兩應行裁省仍按月酌給米石於屯田收穫內支領至此次所給養廉銀兩係特恩加惠新疆辦事大員其伊等本任品級職銜應得分例仍準其支給謹將各該處辦事大臣職名養廉數目列單進呈伏候欽定奏入上從之辛酉命議敘辦理伊犂屯田大臣官員等上諭軍機大臣曰阿桂等奏本年屯田回人三百户所收穀石接濟前後駐劄官兵及厄魯特回人二千餘口可至來年五月來年再增加開墾則建置城堡公署兵房等事亦可次第舉行不必更需阿克蘇糧石等語今年伊犂屯田稍覺逾時尚能如此豐收皆阿桂等盡心辦理所致著加恩從優議敘協辦之伊柱常亮亦屬奮勉著交部議敘舒赫德善於籌辦接濟糧餉亦著一體交部議敘阿桂等又奏稱副前鋒章京富勒琿都司陳聖謨承辦稽查田穀催督回人耕穫亦屬黽勉等語著交部於應升之處列名其屯田回人三百名亦應加恩著各賞銀二兩以示鼓勵諭喀什噶爾辦事都統侍郎海明稽查伯什克勒木乏水地畝上諭軍機大臣曰海明奏稱伯什克勒木有地二千四百餘帕特瑪因得水甚難未及耕種等語此項地畝若果乏水聽其荒蕪亦可或係回人指稱乏水希圖隱納稅糧日後私行耕種亦未可定著傳諭海明善為稽察若有耕種之人即令按則升科命奬賞布魯特阿瓦勒拜並曉示安集延人等上諭軍機大臣曰據海明奏稱布魯特沖噶巴什之五品頂帶阿瓦勒拜來京入覲回抵遊牧聞伊屬人等搶掠安集延之物即查出銀兩馬匹等物交還而安集延人等反云尚短少銀馬若干仍令阿瓦勒拜酌量辦理呈報等語阿瓦勒拜感激恩賚查還搶掠鄰封物件甚屬可嘉著賞緞二端至安集延人等皆為臣僕若果有銀兩馬匹未獲即當再行查給倘實係無有則亦當告以阿瓦勒拜頗知守法斷不欺隱且爾安集延附近布魯特部落甚多保無他處為匪之人豈可盡責之沖噶巴什爾等仍宜訪察至卡倫以外之布魯特等倘以互相搶掠之事來告則不必如此辦理當云爾等散處邊外彼此盜竊我處無慿稽察但從爾等舊例辦理如此分别曉示方為各得其當著傳諭知之喀什噶爾辦事都統侍郎海明疏奏請設伯什克勒木伯克事宜海明奏言本年七月阿里衮奏裁伯什克勒木之三伯克并招徠回人耕種一事臣委前鋒參領富虎傳集村莊回人諭以聖主德威令其各務生業并將貧乏回人酌分三百餘户前往安插但該處距喀什噶爾五百餘里仍須另設伯克請以阿竒木伯克噶岱默特所保和卓呼里為密喇卜伯克邁蘇木為明伯克圖爾都和卓為哈子伯克招撫管轄至逆回邁喇木管入官地畝仍照兆惠奏定之例與承佃回人均分奏入報聞烏魯木齊辦事御前侍衛副都統安泰等疏奏來年送往伊犂駝隻事宜安泰等奏言前準阿桂咨來年遣兵五百名赴伊犂屯田需駝七百餘隻臣查烏魯木齊之駝因疫斃二百餘隻尚存九百餘隻約以壯健者馱運一石五斗小弱者一石共需駝一千二百隻臣已行文同德於巴里坤選駝四百隻送來牧放備用奏入報聞壬戌諭陜甘總督楊應琚查明軍需馬匹墊項確數上諭軍機大臣曰陜甘各營承辦軍需馬匹墊項自乾隆二十三年春季以前屢經加恩寬免今詢問蔣炳據稱二十三年夏季起至二十四年春季止約有墊項八十餘萬兩又二十四年解送軍需馬匹亦有墊項軍務久經告竣此項銀兩或應抵扣還項或量豫格外加恩自當速為完結著楊應琚詳悉查明據實具奏癸亥諭參贊大臣舒赫德酌定葉爾羌錢價上諭軍機大臣曰楊應琚奏稱葉爾羌現在市價每銀一兩得錢一千二百文而回人交納錢糧則每兩七十文兵丁之領餉亦然及與回人交易則不能不照市價殊未畫一請照阿克蘇等城之例每錢一文作銀一分百文為一貫凡官兵回人銀錢出入一律辦理等語回城設局鼓鑄錢文自應與內地之出入一律楊應琚此奏或緑旗官兵等傳説太過亦未可定總之官兵回人俱不可有所偏徇阿克蘇既出入相同葉爾羌等處自應照例辦理著傳諭舒赫德新柱等公同酌議嗣後回人交納錢糧著以錢百文為銀一兩倘伊等謂交錢不便即著交銀務使市有定價則公私皆獲其利併將原摺録寄閲看甲子命酌賞辦送伊犂屯田口糧之伯克回人等上諭軍機大臣曰書山奏伊犂屯田回人所需口糧經阿竒木伯克鄂斯璊等辦理從庫車沙雅爾賽里木拜四城共派出四萬八千七百餘斤陸續送往等語此項口糧俱係各該伯克回人等捐助急公可嘉著舒赫德等酌量奬賞戊辰議撥闢展等處屯田兵丁往伊犂屯田事宜副都統定長等奏言今歲闢展托克三哈喇沙爾喀喇和卓等處屯田收穫共得米麵二萬三千八百餘斛較上屆多收一萬三千餘斛請約計每兵一名墾田二十畝以上所收有餘或不及二十畝而所收亦有餘者將管轄官員分别議敘兵丁酌量奬賞計闢展所收米麵可食屯兵八百人四年九個月有竒喀喇和卓所收可食三百人二年八個月有竒托克三所收可食一千人一年三個月有竒哈喇沙爾所收可食八百人二年六個月有竒奏入得旨軍機大臣核議具奏尋議闢展等處收穫既較上屆多一萬餘斛其應行議敘官員等應照所請交部議敘兵丁等遵旨各賞給一年錢糧再查從前因進𠞰回部闢展等處俱係衝要之地故屯田以接續口糧供備調遣今軍務告竣所有屯田兵丁節次奉旨或發往伊犂或遣歸營伍請交舒赫德阿桂定長安泰會同酌議闢展等處某處係屬要地仍應存留官兵外其年久老疾之人遣歸原營餘俱陸續發往伊犂屯田至從前所墾地畝酌量留給兵丁耕種餘俱賞給本處回人所有現收糧石既敷臺站屯田兵丁數年之食亦即照各處所需之數貯備每年出陳易新毋使黴變奏入上從之參贊大臣舒赫德等疏奏就近派撥伊犂屯田兵丁舒赫德等奏言派往伊犂屯田緑旗兵四百名應乘種麥之際與回人一同起程查葉爾羌等處兵丁天寒路逺應停其調遣即於阿克蘇烏什賽里木兵丁內就近抽調自正月至三月人給麥一石此後所需或於哈密送羊一萬隻其農具即向阿克蘇回人購買計馱載六萬四千斤共設措馬駝牛驢五百四十三隻奏入報聞己巳命優恤陳亡兵丁家屬及酌議照例豫恤等差上諭軍機大臣曰綽爾多等遵旨查奏兵丁內有一家三人陳亡及三人內兩人陳亡各名數一摺默爾根城馬甲喀喇勒岱等四十九人之子弟著加恩各揀選一人以驍騎校用呼倫貝爾馬甲塔爾吉察之子葉木伯訥衣年甫八歲著暫支馬甲錢糧養贍打牲馬甲噶運察之子葉衣濟木保著加恩以驍騎校用又據查奏黑龍江等處陷賊未出及傷發身故並軍前溺斃之署參領班第等一百八十人尚未議恤伊等均殁於王事著照陳亡之例議恤至陷賊被害之員其人原與陳亡相等又如三都卜豆斌等臨陳傷重雖延至數日亦何異於陳亡惟守卡坐臺人等平時疏忽遇賊倉卒被害或得傷身故豈得遽與陳亡同議即減半賞恤已屬格外加恩此次查奏人員著該部分别辦理平定準噶爾方略續編卷七
