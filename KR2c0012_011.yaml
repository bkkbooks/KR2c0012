body:
  text: 康熙六十一年冬十一月乙未命撫逺大將軍王允禵馳驛赴京輔國公延信管理大將軍印務上諭總理事務王大臣等曰西路軍務大將軍職任重大十四阿哥允禵勢難暫離但遇皇考大事伊若不來恐於心不安著速行文大將軍王令與𢎞曙二人馳驛來京軍前事務甚屬緊要公延信著馳驛速赴甘州管理大將軍印務并行文總督年羮堯於西路軍務糧餉及地方諸事俱同延信管理年羮堯或駐肅州或至甘州辦理軍務或至西安辦理總督事務令其酌量奏聞至現在軍前大臣等職名一併繕冩進呈爾等㑹議具奏尋議曰應速行文大將軍王暫以印敕付平郡王訥爾素署理即與𢎞曙來京奏入得㫖副都統阿喇衲著隨大將軍王來京副都統阿林保著隨𢎞曙來京辛亥靖逆將軍富寧安奏報巴里坤等處屯田收穫青稞一萬五百七十石有奇十二月戊辰侍郎查克旦以罪罷留軍前効力上諭議政大臣等曰大將軍王來時朕止令副都統阿喇衲隨來𢎞曙令副都統阿林保隨來㫖意甚明侍郎查克旦係㕘贊大臣擅自違㫖前來是何意見著議政大臣詢問明白具奏尋議曰查克旦違㫖私從軍前來京應革職枷責如例其輕車都尉世職應另請承襲奏入得㫖查克旦理應治罪但係皇考簡用官至侍郎此數年軍務伊亦効力著革職留任並帶伊世職令其自備資斧速回軍前効力贖罪行走乙亥喀爾喀哲卜尊丹巴胡土克圖率達什春丕勒託音多爾濟託音至京恭弔大行皇帝喪並獻駝馬納之己夘簡撤噶斯路駐守兵上諭總理事務王大臣等曰噶斯遣兵駐劄特為防範䇿妄阿喇布坦之人侵犯青海今噶斯一路官兵無事可將駐劄年久之人撤回其新往官兵内驗看漢仗好者移至巴里坤効力再量留兵丁駐防噶斯一路之處爾等詳議具奏尋議曰噶斯現駐滿洲綠旗兵一千六百八十七人應令將軍宗扎卜選兵五百暫於噶斯一路駐防餘兵並撤回所在貝勒塞卜騰扎爾盆蘇克旺扎爾達顔之子達什䇿零等駐守所在既與噶斯相近如用兵時令伊等兵與青海西寧等處兵一同調遣奏入上從之雍正元年癸夘春正月辛巳朔壬辰封青海台吉䇿凌棟羅卜為貝勒上諭總理事務王大臣議政大臣等曰青海台吉䇿凌棟羅卜著封為貝勒自西陲用兵以來青海之王以下台吉以上各著勞績皇考曾降㫖俟凱旋之日再行計功今青海王台吉等歴年効績作何加封施恩之處察明議叙具奏丙申上親弔哲卜尊丹巴胡土克圖遣使䕶其䘮歸國先是理藩院奏曰哲卜尊丹巴胡土克圖黄教中第一流人也數世行善垂九十年當噶爾丹叛時率七旗喀爾喀等來歸最有功其家世喀爾喀汗之子土謝圖汗之弟遭逄聖朝叠膺殊遇前年聖祖仁皇帝面諭之曰嵗癸夘朕年七十爾年九十是年爾必來無食言胡土克圖承㫖還今遵諭來京謁見梓宫志願已遂泊然示寂請如達賴喇嘛班禪額爾徳尼例賜以名號印冊用示優典奏入得㫖給與名號印冊既而上且臨弔喀爾喀圖謝圖汗等請勿往上諭曰胡土克圖極䝉皇考聖祖軫念禮遇加隆皇考聖祖升遐係甲午日今胡土克圖圓寂亦係甲午日佛果聖因證明不昧胡土克圖非尋常僧人比朕躬親往懸帕供茶以盡朕心將此㫖傳與喀爾喀汗王額駙及胡土克圖徒屬人等知之至是理藩院以送哲卜尊丹巴胡土克圖龕座還請大臣等䕶行奏入上特命敦郡王允䄉世子𢎞晟齎賜印冊奠儀又命散秩大臣尚崇廙等䕶龕座行所過䝉古部落禁止騷擾需索丙午命傳諭䇿妄阿喇布坦使臣吹納木喀等䇿妄阿喇布坦使臣吹納木喀等朝見上命都統喇錫理藩院尚書特古忒傳諭曰爾國台吉在我聖祖皇考時雖有㣲勞亦多罪戾乃無故侵我哈宻發兵往招殺害拉藏毁壞佛教惟天子統御萬邦理宜興師問罪我聖祖皇考至仁如天但令陳兵邊境俟其深悔前非即加恩寛宥並無意於殄滅爾國也其後哲卜尊丹巴胡土克圖為䇿妄阿喇布坦再三求赦我聖祖皇考追念舊日㣲勞又曲鑒胡土克圖老人懇欵之意允其所奏令遣使往諭待其伏罪自陳即降恩㫖今聖祖皇考升遐朕纘承大寶胡土克圖老人逺來再為奏請是以復遣使於爾若爾台吉即遣親信之人誠懇陳辭朕即寛宥以寧爾土宇若㝠頑不靈仍搆兵端亦可明言其意如欲廣我聖祖皇考之仁恩惟爾台吉欲振我聖祖皇考之武烈亦惟爾台吉朕仰承丕緒行我軍威爾台吉詎不稔知今胡土克圖大喇嘛又已圓寂從此亦無有為爾台吉奏請者矣可作速定奪來奏若仍前支吾則兵由爾起無與於朕也爾非專使故不與爾勅書爾其謹識朕言一一往諭二月壬子命量撤各路官兵上諭各路將軍等曰䇿妄阿喇布坦無故起釁用兵八載兵丁甚屬勞苦從前雖將老弱者撤回今又歴一二年矣夫兵不務多惟在精耳須將實堪効力者存留足用裕其糧餉方有禆益現令爾等各處兵丁不拘滿洲䝉古漢人擇其精練者存留軍營其年老殘廢者於今年草青之時令其各回本處丙辰命駐柴達木將軍宗扎卜赴署大將軍延信軍効力都統宗室西綸圖往柴達木辦理撤兵事務庚午命追擒察哈爾厄魯特佐領羅卜藏錫喇卜等上諭理藩院曰據察哈爾總管諾爾布奏報察哈爾厄魯特佐領羅卜藏錫喇卜藍翎侍衛春丕勒等逃遁等語著作速傳知將軍等令其派兵各路要截捕擒再著喀爾喀蘇尼特嚴令各處哨汛追勦擒獲其現在厄魯特恐伊等妄生疑慮著一等侍衛達鼐郎中鄂賴前往照管俟將羅卜藏錫喇卜等擒獲之後再回京乙亥封賞青海王台吉等總理事務王大臣等遵㫖議曰自西陲用兵以來青海王台吉等並効力應加封賞親王羅卜藏丹津加俸銀二百兩縀五疋郡王戴青和碩齊察罕丹津封親王貝勒額爾徳尼額爾克托克托鼐封郡王貝子巴爾珠爾阿喇卜坦墨爾根戴青拉察卜封貝勒輔國公噶爾丹達什敦多卜達什封鎮國公吹喇克諾木齊亦封貝勒其貝勒阿喇卜坦温布加俸銀一百兩公諾爾布彭蘇克加俸銀五十兩其餘率兵進藏及駐防噶斯柴達木人等應令各路將軍核實具奏分别加賞奏入上從之丙子賞賚土黙特䝉古上諭總理事務王大臣等曰從前土黙特因遷移臺站殊為擾累伊等於用兵之際知係國家大事看守臺站毫無遲悞甚屬可憫除照例賞給米糧外應按人數再加恩賚此前往給賞之處或另委人員或即交與管理臺站人員辦理著議奏尋議曰土黙特䝉古坐臺者人給銀五兩公鄂倫岱軍臺事竣可無往亦不必更遣人往其當給銀即令管理臺站人員辦理奏入上從之己邜副將軍阿喇衲奏報羅卜淖爾回人等歸附阿喇衲奏言羅卜淖爾所在回人古爾班等率哈喇庫勒薩達克圖哈喇和碩三處户口千餘人輸誠投順奏入得㫖下部知之三月甲申命撤駐藏官兵上諭總理事務王大臣等曰在藏之兵或撤回或於通藏之路駐劄及西寧所餘官兵撤回之處集議以聞尋議曰西藏所在以䇿妄阿喇布坦擾亂用申撻伐平藏之後留兵防䕶恐屯劄日久唐古忒等供應繁費應盡罷之察哈爾及額駙阿寶兵應令公䇿旺諾爾布都統武格阿寶等統之由西寧路還阿寶在軍年久令與䇿旺諾爾布等並來京其江寧杭州兵令副都統吳納哈率之由雲南還四川綠旗兵令副將李現光率之由打箭爐還至察木多為通藏大路應於四川綠旗兵中選千人駐防令總督年羮堯於川陜總兵副將中揀選管轄再阿里地屬扼要今康濟鼐赴藏阿里一切無人辦理應令康濟鼐舉効力者以聞給與職銜協助防守再西寧有綠旗兵六千足以防守其都統汪悟禮所率京師兵應撤還奏入得㫖額駙阿寶令其帶領兵馬前往游牧地方休息數日再令來京餘如議行川陜總督年羮堯條奏川省事宜年羮堯疏奏一打箭爐外中渡河口為通西藏要隘不可無兵彈壓請以分駐嵐州之化林協守備移駐中渡建立土城令把總一人兵二百人分防一保縣在大河南當土番出入隘口防汛不可不増請撥威茂營千總一人率兵百人移駐保縣以資防禦其應支月糧即以威州所徵彛糧就近支給一松潘口外各番部落不一而阿樹一處最要今止給以委牌暫令土目管理不足見信於羌番請給長官司職銜以資鈐束一建昌所屬越巂衛地甚寥濶蠻猓往往出没搶奪今僅設守備一人兵二百五十人實難分撥防禦請改設一遊擊現在守備即為中軍再増一千總一把總兵二百五十凡五百人分防彈壓一金川土司之土舍莎羅奔嘗出兵羊峝著有勤勞請給以安撫司職銜以分小金川土司之勢一烏䝉土府地界最廣奸目達木等自土司祿鼎乾既死輒逞兇暴土舍祿鼎坤祿為固願擒之以獻俟二人擒獻達木給以土職各管其地一川省滿城營房有官生捐資葢造者請予議叙一川省軍前有武進士武舉等自備鞍馬資糧効力者武進士請補守備武舉請補千總兵部議均如所請奏入上從之己亥命議叙喀爾喀王貝勒等追捕厄魯特逋逃者上諭理藩院曰追勦厄魯特羅卜藏錫喇卜等之王貝勒貝子公台吉大臣侍衛暨兵丁等一聞厄魯特潛遁俱各奮力追勦賊衆斬獲無遺伊等皆因感戴聖祖皇考仁恩為朕抒誠効力朕已深悉伊等忠誠甚為欣悦凡効力之人著查明具奏朕將特加恩賚將此㫖繕寫通行傳諭至緝賊身亡受傷之人一併查奏尋又諭理藩院曰厄魯特春丕勒等逃遁䝉古人遇之俱各努力追擒伊等感激皇考覆育深恩竭誠仰報朕覽奏章為之墮淚嘉歎不已將此㫖繕冩發與達鼐令查明効力人等具奏毋使一人遺漏朕將加以特恩又諭都統喇錫曰追擒逃遁厄魯特之効力人員已諭令議叙其收管未曽逃遁厄魯特之人員亦著查明議叙於是封喀爾喀貝勒旺扎爾為多羅郡王公䇿卜登車木楚克納木扎爾為多羅貝勒追贈陣亡蘇尼特台吉進達克為輔國公給察哈爾副總管宫額遜騎都尉世職䕶軍校多爾濟喀爾喀塔布囊巴賽宰桑喀爾占巴圖爾雲騎尉世職官兵等各賞䘏有差其收輯厄魯特未逃者一等侍衛塞卜騰藍翎侍衛納木扎等悉加賞賚辛丑蠲免陜西全省未完銀米豆草上諭户部曰陜省自軍興以來大兵駐劄運送糧餉供支草豆無一不需民力皇考每為軫念今當大沛恩膏子恵元元所有康熙六十年以前陜西全省除借給籽種著該督撫查明定議分年帶徵外其餘凡有民屯衛所實在未完銀米豆草悉予蠲免倘有不肖官吏以虧空揑稱民欠濫邀曠典者一經發覺罪在不赦該部作速行文毋得遲留夏五月庚子命預籌青海事宜上諭總理事務王大臣等曰青海台吉兄弟不睦儻邊境有事大將軍延信駐劄甘州相隔遥逺朕特將一切事務俱降㫖交年羮堯辦理若有調遣軍兵動用糧餉之處著防邊辦餉大臣及川陜雲南督撫提鎮等俱照年羮堯辦理邊疆事務斷不可貽誤并傳諭大將軍延信知之撤布魯爾從征綠旗兵布魯爾所在綠旗官兵從征者令山西大同總兵官馬覿伯撤回六月庚戌命加總兵銜李如栢總兵官韓良輔等赴年羮堯軍上諭總理事務王大臣等曰三屯營副將李如栢著賜總兵銜與天津總兵官韓良輔前往總督年羮堯處聴用原任前鋒統領蘇丹原任都統噶爾弼俱賜原銜令往年羮堯處効力贖罪蘇丹噶爾弼韓良輔李如栢每人各賞内庫銀一千兩庚申赦免川陜續補駝馬價銀除額外徵收銀米上諭户部兵部曰朕惟治安天下欲兵民共得其所必以敷恩減賦為要比年以來䇿妄阿喇布坦狂逞逆命發師致討四川陜西進藏官兵歴經險逺往返萬有餘里甚屬勞苦朕深憫念其倒斃䭾載馬匹價銀及口外沿途與西藏留駐兵丁續補駝馬價銀著悉免追賠又西陲軍興以來民間急公趨事供應差役實厪朕懷聞陜西甘肅二屬各州縣衛所地丁銀兩每一錢額外徵收三釐米每斗額外徵收三合以為備荒之用此項徒有加賦之名而無賑濟之實著自雍正元年始將額外徵收銀米永行停止如有舊欠亦悉予蠲除務俾均霑實惠以副朕篤念兵民至意壬戌署撫逺大將軍貝子延信奏報青海郡王額爾徳尼額爾克托克托鼐率其妻子來奔延信奏言據青海郡王額爾徳尼額爾克托克托鼐來言羅卜藏丹津等率兵來侵交戰四次屬人多陣亡餘或逃散牲畜輒為所刼掠今率妻子來奔求援臣令暫居蘇油口内奏入報聞翼日又奏言青海公噶爾丹達什來甘州率弟台吉鄂齊爾台吉阿旺達克巴率兵與貝勒阿喇卜坦温布等相拒師敗來奔臣令噶爾丹達什暫與其叔額爾徳尼額爾克托克托鼐同居奏入報聞戊辰命遷故青海貝子丹衷家屬於游牧舊處令親王察罕丹津管轄其宰桑等舊著勤勞俟秋凉時來京加賞秋七月己夘命駐劄西寧辦青海事務兵部左侍郎常授勸諭青海上諭常授曰據貝子延信奏報親王羅卜藏丹津貝勒盆蘇克旺扎爾等率兵四千搶奪王額爾徳尼額爾克托克托鼐等爾宜遣人勸阻令其和好若羅卜藏丹津借此侵犯邊塞則不可不加懲治此事或爾親往和解或遣賢能官員喇嘛等往彼和解爾悉心籌畫與年羮堯商酌而行丁亥命各路將軍選舉官弁遇缺補用副將軍阿喇衲疏言察哈爾兵現在行間者雖於軍前補用但軍前缺少其於本處員缺例不得補轉以未嘗効力或軍前撤還者補用為䕶軍校驍騎校等揆諸情理似未允當議政大臣等議覆曰嗣後應令阿喇衲即所領察哈爾官兵中効力者核明咨送各旗遇察哈爾所在有缺請補至其缺久懸不便可揀選現在應用者引見暫令署理奏入得㫖自有䇿妄阿喇布坦之事已經八載凡出征之在京八旗及盛京黑龍江寧古塔西安右衛等處滿洲綠旗官兵内有宣力行間分内應陞者若於各本處補授恐致懸缺不敷看守是以將現在之人揀選補授以致軍前効力官兵轉壅滯其陞遷之路著行文諸路將軍等於滿洲䝉古漢軍綠旗官員兵丁内有宣力行間分内應陞人等查明選舉在京者咨送該旗外省咨送各將軍綠旗咨送各該督撫提鎮嗣後遇伊等應陞缺出令該處即行題補至補授軍前之人其缺不便虛懸著該處即行揀選人員奏請委署其補授之人若再陞轉此委署之人亦可得陞如此則軍前効力人等既獲陞遷之路即各本處才力可用人員亦不至於壅滯將此交兵部著徧行八旗諸路將軍及外省將軍督撫提鎮等知悉己丑命署撫逺大將軍貝子延信慰諭額爾徳尼額爾克托克托鼐等上諭延信曰爾移書與額爾徳尼額爾克托克托鼐等稱欽奉諭㫖青海台吉皆係顧實汗之嫡孫自我朝太宗皇帝時顧實汗與達賴喇嘛和好恭順効力至今百年䝉我皇考施以恩寵加封名號普加庇䕶後經䇿妄阿喇布坦敗壞黄教圍困西藏殺害拉藏且復謀侵爾等於是我皇考遣發大兵同爾等送達賴喇嘛至藏振興黄教今羅卜藏丹津無故稱兵以王等不入伊黨自相侵害朕仰體皇考眷念顧實汗子孫之意其罪未明尚不忍即加征討已遣侍郎常授往問羅卜藏丹津所行情事若羅卜藏丹津知罪悔過朕當定其是非和解爾衆仍令爾兄弟照舊居住青海如果羅卜藏丹津不遵朕㫖侵犯邊塞豈可不遣兵征勦今王之屬下人等盡被搶擄窮困投至甘州朕聞之不勝惻然特遣郎中通智辦給王公并屬下人等廪餼牲畜令從豐厚王等在彼安居不須憂慮朕斷不使爾等稍有拮据也可如是往諭并譯䝉古文發往翼日延信奏言額爾徳尼額爾克托克托鼐之子阿喇卜濟索諾木達什來言率兵與賊人交戰相拒六七日賊退率兵五千及妻子共千餘口來投臣已遣赴額爾徳尼額爾克托克托鼐處居住奏入報聞丙午諭飭自藏進口領兵大臣等上諭大學士等曰藏地兵馬已撤計程將至内地從前統領兵馬之大臣怠忽者多縱兵横行騷擾民人種種無恥之行朕所深知著嚴行該地方官並統領兵丁之大臣若不各自約束仍縱所屬兵丁跟役任意或前或後行走逞強搶奪肆無紀律地方官於何處拏獲即將該管官一併拘留該處請㫖將統領之大臣從重治罪若地方大臣徇情隠蔽朕别有訪聞將地方大臣官員一併治罪將此諭㫖明白曉諭兵馬經行各路軍民知悉平定準噶爾方略前編卷十一
