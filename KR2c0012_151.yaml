body:
  text: 乾隆二十六年六月壬申命升叙解送羊隻之參領范時綬等上諭軍機大臣曰阿桂奏范時綬由烏魯木齊送羊一萬三千隻全抵伊犂辦理妥協又懇于辦送回空駝隻後仍來伊犂效力等語范時綬前因解送阿克蘇羊隻妥協曽賞給參領職銜此次更屬奮勉著加恩授為頭等侍衛烏魯木齊亦有應辦事務仍在原處行走不必又往伊犂其在事官員著交部議叙兵丁等賞給錢糧一月甲戌申諭參贊大臣阿桂等曉示哈薩克貿易人等上諭軍機大臣曰成衮扎布奏驍騎校博逹勒等護送哈薩克使人行抵邊境見上年在特穆爾綽爾郭等處過冬之哈薩克等俱逺移游牧殊屬恭順歸途遇哈薩克等告稱前有二十人打牲至和博克等處被賊戕害等語近經烏魯木齊大臣等奏哈薩克貿易人等告稱伊等二十餘人被害恐係內地逃人所為朕即降㫖將來貿易人等若再行言及即告以內地並無逃人明係厄魯特嗎哈沁其言語衣服與內地大不相同嗣後爾等若再與相遇即行𠞰殺果係內地逃人亦即擒拿但不得驚動往來商旅可將此遍行𫝊諭知之丙子命優恤索倫副總管尼卜齊喀上諭軍機大臣曰索倫副總管尼卜齊喀曾于軍前奮勉效力今在英噶薩爾病故著加恩賞給恩騎尉准伊子承襲一次仍賞銀一百兩參贊大臣舒赫德等疏奏籌議回城保甲事宜舒赫德等奏言准軍機處咨稱本處議奏葉爾羌辦事都統新柱等請將回部各城照哈密吐魯番例編設保甲稽查匪類一摺查回部甫經平定辦理要貴不煩從前哈密吐魯番等處編設保甲既無案可稽而內地新疆情形亦異請行文舒赫德與新柱額敏和卓㑹同具奏得旨俞允臣等㑹議得哈密吐魯番皆仿內地之例十家設一甲長巡緝稽察甚為有益但該二處設官分職皆與旗民相似至回部各伯克凡一切事務俱係分員専管尚屬嚴密若改編保甲勢必裁汰舊缺轉覺紛更且伯克等不得其人則保甲亦屬具文應請仍照舊制責成阿竒木伯克等將各村莊頭目遴選補授即如各村莊之噶雜納齊一缺管轄地方甚為緊要倘有疏防故縱等情即行革退分别查處或地方遼濶即酌量添設該管大臣等仍與阿竒木不時巡察自足戢奸宄而安善良奏入上從之戊寅諭參贊大臣舒赫德訪查波羅泥都潛瘞處所上諭軍機大臣曰舒赫德奏稱詢問回人台里卜和卓據稱波羅泥都有子薩木薩克係阿里雅斯之妻乳哺阿里雅斯潛盜波羅泥都尸體逃往伊木瑪拉衮圖斯等處昨據海明已查出波羅泥都幼子薩木薩克今又有同名之人應行詳察等語海明前奏波羅泥都逃走時將伊子交伯什克勒木之密喇卜養育今據台里卜和卓所稱則係阿里雅斯並將尸骸盜去看來此次所奏較實但前次查出之薩木薩克業已解京若再行搜訪恐回人轉生疑懼且伊等雖稱盜尸逃走而喀什噶爾乃其先壟或潛行埋瘞並將伊子帶回亦未可定此時不必張皇辦理惟在伊等先壟附近處所伺間巡察或向微末回人等詢問尚可得其實情著傳諭舒赫德留意訪查永貴至日即將情節告知令其循照辦理壬午諭定邊左副將軍成衮扎布等辦理嗎哈沁各事宜上諭軍機大臣曰成衮扎布奏據護送哈薩克使人之喀爾喀兵朋楚克告稱哈薩克使人卓勒巴喇斯已回游牧我等歸途於五月十二日在薩里山陰之鑑格爾烏里雅蘇圖遇五十餘賊鎗傷官兵梅楞逹什敦多卜巴圖致斃惟我一人脫出等語昨阿桂奏伊柱於四月初八日在巴柴拏獲瑪哈沁數口據供同行之塞卜騰被大兵擊敗欲入俄羅斯今又移向阿勒坦特卜什伊柱即領兵往𠞰或此次賊人即塞卜騰黨類亦未可定成衮扎布已派兵三百令車木楚克扎布等前往搜捕並著𫝊諭阿桂轉飭伊柱加意奮勉一經拏獲即將朋楚克所告情節詳加查詢再朋楚克等告稱因駝隻疲瘦向哈薩克換取肥者並未給與等語伊等係微小部落原欲沾我餘潤轉向彼希圖便益甚屬見小嗣後護送哈薩克使人等當擇能知大體者派往再於乾清門行走之察哈爾侍衛等派出二三員令其照看著軍機大臣即查辦具奏癸未諭貝子品級公額爾克沙喇等查拏嗎哈沁事宜上諭軍機大臣曰成衮扎布等奏護送哈薩克使人官兵等歸途遇嗎哈沁五十餘人被其戕害等語現在額爾克沙喇等解送伊犂牲隻在途伊等領兵行走諒不致疏虞但得聞信息順便查拏安知不就擒獲成衮扎布㑹知會與否未經奏及著𫝊諭額爾克沙喇扎布禪等此次嗎哈沁傷損官兵信息伊等曾否聞知牲隻在途仍須加意防範過有嗎哈沁等即查拏訊究據實奏聞議派出侍衛照看外藩使人事宜軍機大臣奏言臣等欽奉諭旨嗣後照看哈薩克使人派出乾清門侍衛等查哈薩克等部落若遣使前來將軍大臣自必先行奏報逮入覲回京亦需時日自可從容辦裝並令其送至該部落游牧若係來見將軍大臣即行轉回之使人等則一經奏報即派侍衛等馳驛前往亦可無誤奏入報聞參贊大臣阿桂等奏報催調續到屯田回人協助收割事宜阿桂奏言伊犂屯田回人一千户現有八百户餘二百戶原議秋收後送到今阿竒木公木薩同衆伯克告稱本年春夏田功甚好必獲豐收請將回人二百戶於六月盡送來伊犂以助收割情願捐給口糧至秋收後再支官項等語臣即行文阿克蘇庫車等處大臣速為派送祗需給以行糧農具其坐糧籽種俱于伊犂辦給奏入報聞甲申奬諭參贊大臣阿桂並追擒賊首塞卜騰事宜上諭軍機大臣曰阿桂奏伊犂領兵往捕嗎哈沁塞卜騰等至五月初尚未得信息伊柱起程時曽飭以窮追務獲此時必奮往搜𠞰所帶一月口糧應速為接濟已派侍衛鄂鐸等領兵七十名前往等語阿桂此次辦事奮勉妥協深屬可嘉計伊柱此時已擒獲塞卜騰等矣若臨陳𠞰殺賊首則已否即負創亦必派員解京又搶掠護送哈薩克使人官兵等或即係塞卜騰一起擒獲時著詳訊具奏朕因嘉悅阿桂親製詩章書箑以賜嗣後宜益加意奮勉乙酉申諭定邊左副將軍成衮扎布等慎選護送哈薩克使人兵丁上諭軍機大臣曰成衮扎布等奏據派送哈薩克使人被嗎哈沁搶掠脫出之兵丁多爾濟所告與朋楚克不符其哈薩克不肯易換馬駝情節俱係揑造等語派送外藩使人即兵丁亦當擇其彊幹曉事者似此鄙瑣見小之人濫行充數乃成衮扎布等識見不到之處已諭此後特派乾清門侍衛等直送至邊界成衮扎布處派官兵隨往亦宜加意遴選毋得仍前濫派議展拓卡倫遷移臺站事宜軍機大臣奏言安泰等奏成衮扎布等以伊犂回部平定中外一家請將奈曼明安至廋濟察罕布爾噶蘇所設卡倫展至烏魯木齊駐劄派喀爾喀公朗衮扎卜烏梁海內大臣察逹克等查勘今據呈稱自巴顔珠爾克卡倫至烏拉克沁伯勒齊爾及烏魯木齊可設卡倫者十五處俱以相隔百里為率臣等會議自烏魯木齊至烏爾圖布拉克賽音塔喇納里特吉木薩四卡倫由烏魯木齊派出官兵馬匹牲隻接續駐劄其蘇伯昻阿至烏拉克沁伯勒齊爾十一卡倫交成衮扎布覆查如水草俱佳即將奈曼明安等十六卡倫遷移駐劄所需錢糧等項從前俱由烏里雅蘇台支領但現在道路既逺而烏魯木齊積貯甚豐應酌量於兩處就近分領等語臣等議得新經查勘展拓之十五處既可安設卡倫應將奈曼明安等舊卡倫遷移但千里長途喀爾喀難于全管應請將附近烏魯木齊四卡倫派出索倫緑旗等兵駐劄從阿克蘇添侍衛二員管領其餘十一卡倫令就近分領錢糧之處應如所奏辦理又查近據成衮扎布奏烏里雅蘇台至烏魯木齊既經新設臺站十八處將遞送西路一應事件俱由烏魯木齊分發其薩拉布拉克巴里坤所設臺站二十四處俱行裁撤其新設之十八處每站除章京外派兵八名仍派台吉管理是官兵不必增添錢糧亦無多費而卡倫外展地方寬濶扎哈沁喀爾喀烏梁海等游牧饒裕咸荷皇仁逺被矣奏入上從之辛卯議烏魯木齊等處餘糧折價事宜軍機大臣奏言據安泰奏稱欽奉諭㫖烏魯木齊等處屯田餘糧不必解送巴里坤酌量減價折給兵丁扣抵鹽菜銀兩查官收米麵減價折銀自屬兵丁所願但食用不盡者必籌轉售之法今烏魯木齊有商人二三百名曾有以貨物易換兵丁米麵之事若令其交銀現買似亦可行酌將兵糧一石定價九錢每次給與五斗扣銀四錢五分至商人則較兵丁加增酌令交銀一兩五六錢給糧一石較時價尚屬減省等語查從前書山等以庫車沙雅爾種石有餘曽議減價折給兵丁今安泰等所奏事同一體至折給所領銀兩之半更使兵丁日用有資應如所奏辦理其商人內如有願交銀市買米麵者亦照時價稍為減折將來烏里雅蘇台一路安設臺站商民聚集再為隨時辦理仍將折售各數咨明陜甘總督奏銷奏入上從之壬辰命押解革職原任阿竒木總管阿卜都賚來京上諭軍機大臣曰永貴奏稱審訊阿卜都賚刑逼多倫回人什物信用親戚瑪穆爾縱令侵漁請㫖革職治罪又瑪穆爾曽隨波羅泥都逃走請即行正法等語阿卜都賚係久居吐魯番之人加恩令其管理多倫回衆理宜正已率下乃貪酷敗檢若此不可留于回地著傳諭納世通等派員押解來京助惡之瑪穆爾著即行正法其妻子著發往伊犂賞給厄魯特等甲午命以布魯特烏默爾比家口仍賞給阿瓦勒比等上諭軍機大臣曰舒赫德奏稱冲噶巴什之布魯特烏默爾比搶掠安集延貿易又等業經治罪其家屬八名口請分賞各城阿竒木伯克等語烏默爾比係恩賞游牧在卡倫附近安插之人仍不改舊習肆行搶掠應照所奏將家口分賞各城伯克為奴但阿瓦勒比聞知烏默爾比不法即行呈報甚屬恭順哈爾噶齊從前亦著有勞績著加恩免其分賞回部伯克即賞給阿瓦勒比等此係格外施恩若該部落人等再有似此不法者斷不姑貸著舒赫德等遍行𫝊諭衆布魯特知之秋七月丁酉朔命酌辦駐劄官兵口糧羊隻上諭軍機大臣曰五吉等奏稱阿克蘇大臣咨取食羊八千五百隻已派官兵解送但羊隻原係辦給各城滿洲官兵若將所有官兵一概支給四個月口糧羊隻既非伊等素習轉使米麵陳陳相因又虗糜購辦之費等語所奏甚是凡辦理庶務須斟酌時宜從前曽諭支放各城官兵口糧惟滿洲兵於一年之內酌給四個月羊隻而海明等仍籠統奏請又據軍機大臣議如購辦羊隻有餘將緑旗官兵酌給一兩月亦可不足則已今五吉海明皆新疆辦事大員而所見之明昧不同若此海明能無愧乎著將五吉奏摺録寄各處大臣閲看嗣後即遵照辦理己亥諭按察使納世通等辦理哈喇沙爾堤工上諭軍機大臣曰納世通奏本年五月哈喇沙爾河水忽長三尺流至城下已將屯田處所築堤二千四百餘丈親赴督率防護幸保無虞等語堤工為屯田要務辦事大臣等自應親往查勘以時修築今派達桑阿往代納世通伊初至新疆恐未能熟諳情形著𫝊諭納世通將屯田水利事宜細為達桑阿指授此次被水田畝或係官地抑係回人産業俱著勘明具奏甲辰諭參贊大臣阿桂等搜捕嗎哈沁各事宜上諭軍機大臣曰阿桂奏稱伊柱領兵追勦嗎哈沁塞卜騰等行至和博克薩里鏗格勒克因馬乏暫回此等嗎哈沁雖有投入俄羅斯之勢或于額爾齊斯附近山僻藏匿亦未可定擬于七月親往搜捕即巡查哈薩克邊界等語嗎哈沁等雖非要犯但情甚可惡昨將護送哈薩克使人之喀爾喀兵丁朋楚克等搶掠即此等黨類阿桂雖領兵前往但伊等出入無定必兩路夾攻方不致逃脫成衮扎布已派車木楚克札布前往可即知㑹令其速至額爾齊斯與阿桂㑹合窮追務獲再據捉生詢問供稱塞卜騰等上年曽搶掠哈薩克二十人等語從前哈薩克亦經稟告並著成衮扎布等以前項情節曉示哈薩克等知之又諭曰阿桂參奏護軍參領蘇尼勒圖二等侍衛烏魯木等詬知塞卜騰在阿勒坦特卜什藏匿自應即行掩襲乃僅將嗎哈沁鄂里克等夥黨擒獲即逗遛不進請將蘇尼勒圖降為副參領烏魯木降為三等侍衛仍令其隨營效力以觀後效等語蘇尼勒圖著革職令其自備資斧效力贖罪烏魯木係厄魯特人未諳軍紀昨因伊擒獲嗎哈沁博卓壘等曽授為頭等侍衛阿桂若已得㫖即加恩曲宥或得旨而尚未傳諭則令伊仍以二等侍衛效力行走並將參奏得旨情節曉諭知之又諭曰此次搜𠞰嗎哈沁隨侍衛翹蘇爾之索倫馬甲額爾德木圖臨陳得傷仍射殺一賊奮勉可嘉著加恩授為驍騎校賞戴藍翎賜號哈坦巴圖魯仍賞銀一百兩馬甲鄂勒椿巴扎爾著阿桂酌量奬賞翹蘇爾亦頗著勞績著賞緞二端庚戌議新疆經費事宜軍機大臣奏言臣等遵旨查得平定準噶爾回部後凡陜甘等處經費應行裁減之項上年楊應琚來京與臣等㑹議具奏凡所裁之緑旗兵及已撤臺站項下共節省銀五十三萬餘兩今楊應琚奏請將陜甘滿漢營馬每年於三四月牧放又可節省銀九萬餘兩共銀六十二萬兩有竒近經臣等查奏伊犂葉爾羌等處大臣等養亷官兵鹽菜銀兩以徴收錢糧折給外每年尚需銀十五六萬兩即於陜甘節省項下動撥尚餘銀四十六七萬兩謹將節省及支給各數繕單恭呈御覽奏入報聞辛亥議遷移威魯堡回人事宜軍機大臣奏言據舒赫德等奏稱威魯堡回人擬于八月內遷居吐魯番查附近闢展之連木齊木現有裁屯熟地六千畝闢展洋赫兩處俱有熟地一千餘畝應令千戶珈如拉領前住魯克察克之回衆住連木齊木百户伊明和卓領前往闢展之回衆仍居舊地按户撥給地畝如尚不敷仍有近水之地可以開墾請將珈如拉義明和卓俱授為五品伯克將回衆公舉之瑪瑪古爾班呼岱巴爾氏授為六品副伯克各居分地管轄回衆其量輸租稅俟成熟後酌定升科奏入上從之丙辰諭定邊左副將軍成衮扎布等偵探進𠞰嗎哈沁塞卜騰等確信上諭軍機大臣曰成衮扎布等奏稱護送哈薩克使人卓勒巴喇斯等之驍騎校納爾賽等回至鏗格爾遇嗎哈沁百餘人為首者名塞卜騰將伊等掠至薩里山得脫等語昨據阿桂奏領兵往阿爾齊斯搜𠞰塞卜騰朕即謂從前搶掠朋楚克者皆其黨類曽諭車木楚克扎布領兵㑹同阿桂兩路夾攻今又搶掠納爾賽等情甚可惡今納爾賽等既知嗎哈沁等藏匿處所願為嚮導著傳諭成衮扎布等將從前所諭車木楚克扎布之旨於何時發往伊等現在何處不時探聽一得實信作速奏聞諭葉爾羌辦事都統新柱等辦理外藩入貢事宜上諭軍機大臣曰新柱奏謙珠特伯克黑斯婁遣伊子貢金隨酌量賞給又據告稱伯克訥格爾吉勒梯亦願附進土物等語外藩小部落輸誠入貢固不當較其貢物之厚薄但必親身前來或遣其子弟始足以昭忱悃若僅遣使人即當酌量辦理至訥格爾等與黑斯婁一體乃懇其代進將來行之日久便成黑斯婁之屬人矣此風斷不可長嗣後若有凂人附進者非但不加賞賚亦不必收受著傳諭新柱等知之己未議疏通錢法事宜參贊大臣舒赫德奏言阿克蘇等處鼓鑄錢文令回人等交納銅斤原非常賦一俟錢法流通即行停止與葉爾羌等處一體抽收錢文始為定制臣愚請將阿克蘇等處鑄得之七千餘騰格以四分存公六分派給回人數月後再將存公錢文折給官兵鹽菜銀兩俟來春將回人所得錢文於十分內抽回二分續鑄之錢亦照此辦理再拜城出産銅斤處所業經奏設採銅伯克請交各城大臣酌照辦理奏入得旨軍機大臣議奏尋議鼓鑄錢文宜派給回人行使日久自見流通若僅折抵官兵鹽菜銀兩則回人等並無向官兵市物之事即以緞布收錢亦屬有限恐錢法壅滯且抽收回人租稅以錢折價亦必先行給發始可上下通行應如所奏辦理將來陸續鑄得錢文即可源源接濟至增𣲖採銅伯克等事既經行文各城應俟該大臣等酌量情形具奏到日再行籌議奏入上從之庚申命飭禁北路商販與哈薩克貿易上諭軍機大臣曰阿桂奏現在喀爾喀烏梁海等展拓游牧若哈薩克等由塔爾巴噶台至新設卡倫甚為徑直倘與北路商販等貿易則伊犂烏魯木齊等處難于得馬應豫為禁約等語所奏甚是外藩貿易一事原應官為經理若聽其與北路商販往來則新疆難得馬匹而伊等債負爭鬭之釁皆從此起可傳諭成衮扎布行文各駐劄大臣扎薩克及卡倫侍衛台吉等嚴禁私向哈薩克貿易即哈薩克等以牲隻前來卡倫人等當告以本處游牧頗饒不必貿易遣令轉回該大臣等仍不時巡察如有不肖之徒私行貿易者一經察出即從重治罪並將侍衛台吉等參奏亦傳諭阿桂知之議瑪納斯等處駐兵屯田事宜參贊大臣阿桂等奏言查伊犂烏魯木齊之間有瑪納斯庫爾哈喇烏蘇晶河三處安設村莊駐兵屯田原以省額林哈畢爾噶一路臺站挽運口糧之力續經安泰等議以一時難于盡舉暫停安設臺站瑪納斯距昌吉羅克倫不逺酌派屯田兵二百名庫爾喀喇烏蘇晶河距伊犂烏魯木齊俱逺每村派兵三百名人各墾地十五畝所需籽種農具駝隻由烏魯木齊巴里坤取用其分駐馬兵五百名請以范時綬管轄又查烏魯木齊至伊犂共安設二十一臺每臺馬兵五名人給馬二匹緑旗兵十五名人給馬一匹每臺駝四隻晶河以西歸伊犂管轄托多克以東歸烏魯木齊管轄奏入得旨軍機大臣議奏尋議前據安泰等奏請瑪納斯等處駐防屯田臣等議以設立三村莊應分年酌辦今阿桂等議駐防兵丁較原奏一村五百名之數三分減二則一年內即可盡舉而屯兵八百名之收穫已足敷臺站口糧之用且距伊犂烏魯木齊不逺自可無虞其令伊犂烏魯木齊就近分管及派給馬匹籽糧農具並將三村事務委范時綬總管俱應如所奏辦理奏入上從之癸亥陜甘總督楊應琚疏奏安西等屬豌豆豐收情形楊應琚奏言查豆石為飼秣要需安西氣寒且豆種甚少就近並無出産自新疆平定糧運俱停惟嵗需豆石仍支本色今春飭令該府縣等給發倉貯盈餘及時試種悉皆成熟各處收成統計八分以上農民等感戴恩㫖將本年額糧全行蠲免情願以所穫豆石抵還春借籽種小麥豆麥兼收可得豌豆數千石是來歲安西以西豆石即可就近供支以省內地採買挽運之煩奏入報聞甲子命更調哈密巴里坤辦事大員上諭軍機大臣曰三寶著以道銜前往哈密辦事其直𨽻布政使員缺著觀音保補授同德在巴里坤辦事已經數載於採買羊隻等事俱辦理妥協著補授貴州按察使永寧著以侍郎銜前往巴里坤辦事同德俟交代後再行來京乙丑授原任按察使夔舒為户部員外郎上諭軍機大臣曰永貴等奏稱阿克蘇以司員銜行走之䕫舒隨印辦事俱能實心奮勉已經三載尚係虗銜等語䕫舒因按察使任內辦理案件錯謬革職發往北路軍臺效力續以司員在回部辦事既知黽勉著加恩授為户部員外郎遇缺即補命升用都司陳堯典等上諭軍機大臣曰永貴奏稱都司陳堯典隨印前鋒固林泰馬甲髙士綿辦事俱屬黽勉等語前經舒赫德永貴將陳堯典等保題已命分别升用今尚在候補陳堯典著加恩賞擊遊擊頂帶遇各省有遊擊缺出即行補授固林泰髙世綿著交部以筆帖式即用又諭曰守備觀虎以解送火藥留烏什駐防二年餘甚屬奮勉著加恩以應升之缺即補仍留該處辦事丙寅葉爾羌辦事都統新柱等疏奏巴勒提部落貿易情形新柱等奏言六月初六日庫克雅爾卡倫送到巴勒提部落頭目烏蘇完遣使愛哈瑪持至葉爾羌臣等接見呈獻書儀係帶領商人前來貿易臣等因伊部落上年屢經遣使恭順誠切加以撫慰仍飭該伯克等將貨物查看照例收稅俟事竣回程仍以書儀相答謹將原書翻譯並臣等復書稿本進呈御覽奏入報聞平定準噶爾方略續編卷十二
