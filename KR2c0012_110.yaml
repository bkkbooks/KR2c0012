body:
  text: 乾隆二十三年五月癸丑靖逆將軍雅爾哈善等疏奏攻圍庫車城情形雅爾哈善等奏言臣等於五月初六日至庫車之東雅哈托和鼐見有回衆遷移蹤迹次日兵抵庫車哨探副都統順德訥見庫車城附近有回人三騎因諭以兩路將軍帶領大兵擒拏賊首撫恤爾等回衆伊等隨告知守城伯克遣其弟出城告言我等須候和卓木信息乞寬限五日順德訥令其投見伊等不敢前來惟問招降文書臣等因遣散秩大臣伯克托克托署守備馬英德筆帖式官住持回字文書交給即返托克托等至城下曉諭有兩回人接取忽城中二十餘騎突出兩回人遂擒托克托馬英德官住急返亦被追擒臣等即領兵攻城因散秩大臣伯克鄂對之言令順德訥領兵二百名先據近城樹林城中亦以百餘騎來爭見我兵即退臣等圍城四面自未至酉城上鎗石如雨總兵閻相師被石傷首署前鋒侍衛常保住署參領觀音保及官兵人等亦有得傷者我兵亦殺賊甚多次日雲梯造成官兵從巳至酉四面攻襲賊於城堞內施放鳥鎗貝勒額敏和卓右顴被傷官兵亦有得傷者兩日力攻未克臣等不勝憤恨務期盡行殱滅此時先將賊人村落所種麥苖蹂踐杏桑等果摘食又於卡倫擒獲回人六名訊據供稱庫車舊有九百户去年添駐回人及厄魯特等共騎兵八百餘守城頭目名阿卜都克勒木再去年沙喇斯瑪呼斯餘衆投降安插於葉爾羌喀什噶爾小和卓木在葉爾羌大和卓木在喀什噶爾又於阿克蘇附近之烏斯哈雅築城以阿卜都克勒木之弟阿卜都哈里克守之聞大兵至必來救援等語臣等現飭卡倫人等嚴行瞭望但賊城險峻堅固威逺炮尚不能攻所㩦四大神炮係故明所造年久不甚堅固昨於哈喇沙爾試放及此次攻城俱已斷裂若領兵衝擊徒致傷損惟有合圍據險伊等自生內變至額敏和卓年逾六旬尚屬壯健臣等沿途同議伊意謂辦理霍集占等當以計取不可力爭詢其如何設計但云到彼相機酌定今因招降不從甚為慚愠督兵進攻被傷臣等以言撫慰惟云受恩深重必舍身力戰等語又伯克鄂對雖係庫車頭目其舊屬俱已被殺及遷徙葉爾羌等處伊但能指引路徑不能招服回人臣等伏思回人因額敏和卓等並非貴族未能招服必須大兵辦理奏入上諭軍機大臣曰據雅爾哈善奏稱兵至庫車攻圍二日尚未得城等語回衆恃城為守非厄魯特可比當以計取不可徒恃攻戰且亦難刻期成事雅爾哈善所奏情形未免失之躁急蓋畏朕責其怠玩也將軍大臣等領兵𠞰賊其勤怠皆在朕照鑒中不當揣摩欲速况我兵既四面攻圍扼其要路且捉生詢問知城中儲蓄無多此時即未能攻克則分兵一半令哈寧阿圍城誘令出戰或乘其防守疏懈相機攻取雅爾哈善帶兵一半離城前進聲言庫車抗拒回人已行勦殺不迎降而抗拒者罪亦如之仍蹂其禾稼俾野無餘積即有援兵必聞風逃散且庫車回人見我兵少或出城徼利斯時蹙而擊之更易為力若庫車尚難攻克雅爾哈善又當回兵併力一得庫車即可駐兵過冬明年再辦理葉爾羌等處亦可其相機設計之處不知伊等曽籌及否仍將現在情形作速奏聞又諭曰朕因額敏和卓老成諳練熟習回部情形故命其參贊軍務並非欲伊身在行間親當矢石也今聞奮勇得傷深為軫念著加恩賞賜御用荷包仍賞銀一千兩嗣後惟盡心協力相機辦理不可冒險攻戰致有疏虞密諭靖逆將軍雅爾哈善等撫慰額敏和卓上諭軍機大臣曰雅爾哈善等奏額敏和卓稍有觀望情形因招降不應奮往被傷伊並非貴族不為回人所服等語所奏非是前命額敏和卓參贊軍務不過因其熟習情形可與雅爾哈善籌畫非將平定回部之事責成取必於伊也豈有同為大臣而聽其舍身攻戰不行勸阻之理且伊既如此效力若不加愛護以結其心或詞氣間轉有相輕之意甚至别生一事亦未可定朕深為厪念可密諭雅爾哈善好為撫慰以示鼓勵即雅爾哈善等亦不得冒險欲速致徒損官兵於事無益其相機辦理之處已另降諭旨矣諭定邊左副將軍成衮扎布等辦理舍楞等事宜上諭軍機大臣曰成衮扎布奏稱前往䇿應阿桂倘叛賊舍楞已入俄羅斯即合兵駐邊索取等語所見尚是但不必久待如守候數日仍無信息當告以現在奏請行文爾薩納特衙門即行撤兵阿桂之兵在和尼邁拉呼等處堵截布庫察罕哈薩克錫喇成衮扎布之兵在科卜多豫備策應至所奏令舒明帶左副將軍印回烏里雅蘇台同福祿辦事扎隆阿隨伊在科卜多辦事伊所管盟長印信交值班處俟車木楚克扎布到日暫行護理俱照所請行前命車木楚克扎布在成衮扎布哨探隊行走今不必前往并傳諭䇿布登扎布亦不必往額爾齊斯仍於博羅塔拉等處查拏哈丹等餘賊及布庫察罕等賊首俟兆惠等至伊犂會合命新派索倫兵照進勦例賞給上諭軍機大臣曰昨命綽爾多派索倫兵一千名往伊犂等處駐防其整裝銀兩照進勦兵丁例減半賞給現在進勦回部或有調遣之處著加恩照進勦之例綽爾多即遵旨賞給豫備行裝俟御前侍衛敦察到日帶領起程甲寅定邊將軍兆惠等疏奏招服布魯特等部落兆惠等奏言臣等領兵至善塔斯嶺令巴圖濟爾噶爾瑚爾起帶兵哨探四月三十日佐領委署參領布尼馬甲委署防禦巴岱馬甲對音布巴圖等見百餘騎隨至特穆爾圗淖爾之岸收其馬羣伊等放鎗救護我兵射殺三人傷一人當令厄魯特齊里克齊聲言大兵至此忽衆騎中一人告稱我等是布魯特聞大兵在和落霍澌等處勦滅厄魯特今因馬羣被收一時不識情願投順等語齊里克齊等招其頭目圗魯啓拜鄂庫并所屬六十餘人臣等詢問圗魯啓拜等據稱圗魯啓拜係薩伊克鄂拓克之比比者即厄魯特宰桑回人伯克之謂與比舍爾伯克分管五百餘户又薩喇巴哈什鄂拓克亦有五百餘户係瑪木特呼里拜鄂庫分管舊在右部安集延遊牧去嵗聞大兵平定準噶爾招服哈薩克我等亦欲投降近聞嗎哈沁等傳説大兵將到是以前來我布魯特人等早有歸順之心因為準噶爾所隔如不見信請將我等或我子弟留以為質差人前往則各鄂拓克必相繼歸誠并派屬人協助大兵我布魯特右部十鄂石克左部五鄂拓克我等居右今遷於哈爾哈里固勒米圗古斯塔老其左部呼車薩老賀泰三鄂拓克共千餘戶距右部有十五日之程俱可令其頭目來見其餘左部二鄂拓克在安集延右部八鄂拓克與喀什噶爾相近到彼再行招服等語臣等曉示圗魯啓拜云我大兵所至順者撫恤逆者誅滅準噶爾哈薩克即其驗也爾等果誠心效順大皇帝必加恩撫恤今大兵征討回部士馬糧餉甚足不須協助資給但選派熟識道路及招服各部落之人隨軍效力至厄魯特等盡已殱滅惟布庫察罕哈薩克錫喇等脫逃如在爾境內自當擒獻據稱並無投入之人臣等又曉示云大兵啓行時計當經由爾地大皇帝洞鑒情形已有恩旨前來隨恭捧敕書譯讀宣示圗魯啓拜等叩頭告稱大皇帝仁恩如此我布魯特婦人孺子無不歡感遂復行禮拜臣等察其情形屬實即告以派員恭齎諭旨同往曉示圗魯啓拜等以馬送臣等為贄次日臣等設宴相待令觀騎射給以縀匹煙草等物俱各歡悅即派留任侍衛烏爾登原任侍衛托倫泰達什達瓦屬人伯勒克原係布魯特人同圖魯啓拜等前往招撫各鄂拓克于五月初四日起程留其子弟為質又據巴圖濟爾噶爾等報稱四月三十日佐領署營總達什扎卜馬甲委署防禦拉什雅勒圖厄魯特護軍校碩端於蒿沁托和賴見賊一騎被索倫錫勒爾圖厄魯特齊里克齊擒獲詢知賚卜里木集賽之三十餘户隨阿勒巴齊鄂勒椿居住因令導至伊等遊牧阿勒巴齊鄂勒椿等俱束手迎降收其家口馬駝軍器等語臣等即選派丁壯五十名隨軍效力奏入得旨巴圗濟爾噶爾瑚爾起等遇布魯特頭目即行招服並收逃匿之厄魯特户口此次官兵效力可嘉著加恩將布尼達什扎卜俱授為參領拉什雅勒圗巴岱俱授為領催仍委署防禦對音布巴圖錫勒爾圖俱授為領催碩端齊里克齊授為藍翎侍衛仍交部照例議敘再發孔雀翎十枝藍翎二十枝以備奬賞諭定邊將軍兆惠等進勦回部事宜上諭軍機大臣曰昨諭兆惠等進勦回部沿途相機辦理蓋因伊等帶兵尚少經過布魯特等處恐煩籌酌耳今布魯特頭目既已迎降雅爾哈善兵抵庫車攻城未克則伊等自可前往協助而䇿布登扎布亦當帶兵策應但布魯特部落無専轄頭目或見我兵既過復行盜竊亦未可定可傳諭兆惠等務宜小心防範如果徑抵葉爾羌喀什噶爾與雅爾哈善聲息相近即調策布登扎布等前往於今年竣事更為妥協若此時尚未信息或葉爾羌等處不能即得仍回伊犂查拏哈薩克錫喇布庫察罕亦可不必拘泥前奏冒昧深入至辦理回部不能恃兵力攻取當因糧於敵且蹂其禾稼俾野無所積賊勢自窮又聞霍集占將投降之沙喇斯嗎呼斯宰桑等殺害伊等舊屬必懷憤恨或遣軍營厄魯持等設間招撫亦是辦理回部一䇿皆宜加意辦理適據䇿布登扎布奏稱公品級達什巴圖魯侍衛老格等帶兵二百名於哈什河收取烏魯特得木齊托羅和卓等六十餘户等語托羅和卓等係哈栁之姪著併其家口送京其效力官兵查明送部議敘可傳諭策布登扎布不必搜查逸賊即領兵䇿應兆惠所諭兆惠之旨亦交令速行遞送併將兆惠奏摺録寄雅爾哈善令其以招降布魯特情形傳示回衆知之又諭曰據兆惠等奏稱索倫兵三千餘名久在軍營請交黑龍江將軍於從前撒回及未經派出之索倫達呼里等揀選二千名更换等語所奏甚是朕因軫念軍前索倫兵效力有年已諭另派索倫兵一千名令御前侍衛敦察帶往軍前更换此次派出兵丁到日將應撤之兵令回遊牧休息仍以恩旨宣示若所派尚不敷用即降旨增派前往命揀選炮位往雅爾哈善軍營上諭軍機大臣曰雅爾哈善等奏帶往軍前之四大神炮係故明所造年久不甚堅固試行演放俱已斷裂等語著黃廷桂阿里衮於現有之大神炮及其餘力可攻城之炮揀選堅固者數位派員送至雅爾哈善軍營軍前炮位關係最重從前係何人揀發乃輕忽若此著黃廷桂查明參奏交部議處諭勸懲晉省辦解馬駝官辨上諭大學士曰據黃廷桂查奏晉省辦解馬駝官辨分别勸懲一摺此次解赴肅州駝隻管解官辨沿途小心牧養臕分不減著交部議敘以示鼓勵其所解馬匹多有疲乏倒斃自屬該官辨等辦理不善但此次兒騪馬匹均係臨時振辦非營驛挑選者可比長途行走難免勞乏情尚可原著從寬免其議處諭大學士管陜甘總督黃廷桂等暫緩伊犂屯田事務上諭軍機大臣曰黃廷桂覆奏伊犂駐兵屯田一切應行豫備事宜不動聲色照常經理一摺已於摺內批諭矣現在辦理回部未竣則屯田伊犂原可暫緩惟於烏魯木齊一帶及噶爾藏多爾濟遊牧之羅克倫等處極宜相度地畝廣為屯種以濟軍食并可省一切轉運之費俟將來酌量情形由近及逺即俟一二年後亦無不可著傳諭黃廷桂及永貴定長等知之六月乙卯朔諭黑龍江將軍綽爾多添派索倫兵丁上諭軍機大臣曰近因辦理回部曽諭綽爾多派出駐防索倫兵一千名其整裝銀兩俱照進勦之例賞給尚慮不敷調遣著傳諭綽爾多再於索倫兵內㨂選一千名亦照前賞給銀兩與前次所派兵丁一同起程丙辰命副都統福祿散秩大臣永慶乾清門侍衛額訥慎塔爾海烏爾圖納遜帶領索倫兵丁前往軍營效力丁巳申諭靖逆將軍雅爾哈善等攻取庫車等城事宜上諭軍機大臣曰據雅爾哈善等奏現圍庫車城斷其水草誘賊出戰二次俱有殺傷俟雲梯防牌造成後即可尅期攻取等語所辦雖是但察其情形似恐以延緩取咎不知用兵之道或遲或速惟在相機行事其軍前諸臣之勇怯朕自有明鑒不必過於急迫若尚未攻克仍即分兵略地至額敏和卓年力就衰感恩圖報力戰被傷甚屬可念此時曾否痊可其善為調攝以副眷懷再額敏和卓所言從前準噶爾人等圍城九月始克之語伊等惟知野戰攻城自非所長且或因攻圍未克更迭往返亦未可知若久困城下此必無之事今以我兵力計一月間自應攻克即力有未能宜分兵往攻烏什等小城其阿克蘇城或難急攻但蹂其禾稼撤回兵丁亦可至所奏回城草料漸盡現取楊桑等樹皮葉飼馬此語從何得來可作速具奏又諭曰雅爾哈善所奏庫車情形著傳諭兆惠此時若能直取葉爾羌等城擒獲逆酋自可贖疏脫哈薩克錫喇之罪但務宜探聽雅爾哈善等信息如信息未通亦不必冒昧前進即帶兵轉回查拿哈薩克錫喇等至前據哈薩克人等所言哈薩克錫喇隻身逃走及伊母渡河溺死殊不足信或借此浮言懈我軍心因而潛行招引亦未可定兆惠回至伊犂當加意察訪如果哈薩克有招引情事即帶兵壓境嚴行索取自可弋獲仍將進兵情形作速奏聞戊午命侍衛永德馳驛前往烏魯木齊協辦哈薩克貿易事務己未議派兵牧放貿易馬匹事宜軍機大臣奏言烏魯木齊等處與哈薩克交易馬匹若送至巴里坤恐辦理回部需用徒多往返請將所易馬匹即在該處牧放聽候調遣所需牧馬兵丁應請交察哈爾總管等揀選一千名其整裝銀兩照進勦兵丁例賞給前往烏魯木齊將所收馬匹加意牧放萬一今年回部未平來嵗用此等兵丁接濟更為得力其帶兵大員已遵旨派出總管薩木都卜恐一人不足有總管敏珠爾人尚可用或從牧厰調回與薩木都卜同行甚為有益奏入得旨此次派出之察哈爾官兵著派乾清門侍衛訥齊納棟保公特通額同薩木都卜敏珠爾帶領行走其賞給官兵銀兩著蘇巴什里達青阿帶往會同薩木都卜等賞給餘依議諭護軍統領努三多易哈薩克馬匹上諭軍機大臣曰前命努三辦理哈薩克貿易事冝曾面諭以不可多給價值現在進勦回部恐本年未能竣事來嵗需馬更多可傳諭努三俟哈薩克以馬貿易時不妨多為購辦即價值稍昻亦可至所易馬匹牧放需人緑旗兵雖不可用若巴里坤有察哈爾兵當酌量揀派暫令牧放馬匹仍著一面奏聞一面咨巴里坤大臣辦理現在擬派察哈爾兵一千名星速前往其加意牧放以利軍行昨命永德協辦貿易事務努三俟其到時更宜留心指示俾得學習行走諭山西巡撫塔永寧動帑報銷解駝雜費上諭大學士曰塔永寧奏稱解肅駝隻除沿途草料口糧動項報銷外尚有鹽茶藥料等費請於通省各官養亷內公捐補欵等語所奏殊非政體年來辦理軍需一切動支公帑從無私毫派纍況官員養亷原以體恤下情使用度有資方可勵清操而急公務豈可輕言捐派現在解駝需費果係必不可少之項自應奏明於公項內支給不必在額設養亷另籌捐補山西向來因循陋習近經釐剔庶可肅清吏治若一遇辦公復有捐資之議恐不肖人員因此轉多藉口又何以飭官方集公事耶此項解駝需費著該撫查明動項咨部核銷該部即遵諭行庚申諭大學士管陜甘總督黃廷桂籌備馬匹糧餉上諭軍機大臣曰黃廷桂所奏哈薩克貿易馬匹籌辦牧放事宜一摺自屬小心防範之意昨已派察哈爾兵一千名前往烏魯木齊照看牧放可無匪竊之慮至所稱大兵指日成功亦無需馬之處則於軍務情形尚未稔悉現在雅爾哈善領兵進勦回部設一時未能就緒則來年必需添派兵馬理當豫為籌畫即口糧一項亦應酌足一二萬兵之用庶不致臨事周章雖不必過涉張皇亦不可不留心經畫若於哈薩克送來馬匹多為購備更屬妥協可傳諭知之辛酉申諭定邊將軍兆惠等招撫回人事宜上諭軍機大臣曰近以辦理回部機宜節次諭知兆惠雅爾哈善等伊等兩路進兵若今年能攻克葉爾羌喀什噶爾等城固善倘不能克於應行撤兵之時即在擒獲回人內酌揀數人明白曉示云大兵進勦惟欲擒獲波羅泥都霍集占與回衆無涉恐爾等被其恐嚇妄相附和今大兵雖暫時休息來年仍必進勦亦定將田野種植盡行蹂踐務獲二賊方止如此頻年進兵耕穫無期必致餓斃豈不為厄魯特之續爾等若悔罪歸誠即聽於本地各安生業有能擒獻首惡大皇帝必格外加恩爾等與其被脅而死鋒鏑孰若來投以樂室家利害昭然所宜熟思審處今將此意作書交爾等傳示回衆使人知覺悟等語即行釋放似亦攻心之策若慮逆酋等先期設備則次年即不進兵伊等亦未必弛備也但必俟應行撤兵之時方可如此辦理再本年或不能取葉爾羌喀什噶爾僅得庫車烏什阿克蘇等城屈撤兵之期若令降人管轄恐賊復來奪據若留兵戍守兵少則力弱兵多則餉艱雅爾哈善額敏和卓等身在行間其體察情形詳悉議奏壬戌靖逆將軍雅爾哈善等疏奏庫車回人窮迫情形雅爾哈善等奏言臣等攻圍庫車城於東南面臺上瞭望城內情形甚屬窮迫詢問伯克鄂對等據云數日內應有賽里木阿克蘇援兵臣等議於五月十八日一面誘賊出城勦殺一面攻取城池於先一日令哈密回人三百名更换衣帽旗幟由阿克蘇前來大路揚塵為救援之勢亦令我卡倫兵飛報又將滿洲索倫兵埋伏要隘令緑旗兵張滿洲索倫旗幟前往迎戰俟賊衆一出即截斷勦殺至日城內賊人果鳴鼓吹角步賊登城呼噪騎賊於西門排立不敢即出數放號火我緑旗兵逺用鳥鎗攻擊引誘賊仍不出始將各兵撤回又與額敏和卓玉素富等酌議射書招降亦無回信看來賊衆死守必當力攻計惟多造雲梯分路競進賊衆四面受敵不能支吾能由一二處入城即可攻克奏入上諭軍機大臣曰雅爾哈善等圍困庫車令回人等改裝誘賊雖驚疑未出而情形窮迫俟攻具齊備即可取城等語尚屬黽勉但攻城非野戰可比不必過於欲速萬一此時未能攻克仍遵前旨分兵攻取烏什阿克蘇等城即不能克亦可蹂其禾稼且防守嚴密伊等窮迫之至必生內變自可成功至攻城之道固難尅期但須時刻進兵作為攻擊之勢使賊疲於接應漸生怠惰然後乘間猝發自無不倉皇潰敗之理再所用官兵雖有滿洲索倫緑旗回人等隊皆朕臣僕惟視伊等效力如何不可稍有偏向著發孔雀翎十枝藍翎二十枝交雅爾哈善等酌備賞給其加意鼓勵佇待捷音諭定邊右副將軍策布登扎布等向哈薩克索取哈薩克錫喇布庫察罕上諭軍機大臣曰策布登扎布等奏稱據哈薩克察哈瑪巴圖爾來告伊等從前在嶽羅畢特巴圗爾必濟喀喇塔拉等處刺殺宰桑布圖庫擒獲布庫察罕已送與阿布賚等語朕昨諭策布登扎布不必往追舍楞俟擒拏哈薩克錫喇布庫察罕即策應兆惠今布庫察罕既為哈薩克擒獲則哈薩克錫喇亦必逃入哈薩克可傳諭䇿布登扎布在哈薩克索取布庫察罕時并索取哈薩克錫喇前問哈薩克錫喇逃入哈薩克之特栁克等處不妨告知阿布賚令具遣人至特栁克以從前縛送達什策凌齊巴罕等蒙恩厚賞為例若隱匿不送則遊牧必致驚擾眀白曉示計彼時兆惠亦已回抵伊犂兩隊合力務將哈薩克錫喇布庫察罕拏獲解京仍著策布登扎布行文兆惠知之諭大學士管陜甘總督黃廷桂查明琿齊等家口病斃虛實上諭軍機大臣曰據阿里衮等奏稱派出護軍校額爾賽解送琿齊阿南達哈什哈索遜等眷屬一百九十二口除途次患病身死一百三十口外其餘人造册送往肅州候黃廷桂分别辦理等語所奏甚屬含混解送人口病故何至如許之多即使防護人少中途逃遁不過為餓斃之嗎哈沁更將何往是解送者尚可寬宥若圗脫罪匿報則斷不可著傳諭黃廷桂俟此次厄魯特家口解到將因何致斃多人及有無匿報之處查明據實具奏癸亥恩宥叛賊和碩齊之弟姪等仍於察哈爾安插上諭軍機大臣曰據納穆扎爾奏稱伊至察哈爾將和碩齊之妻子正法所有馬匹牲隻交與該旗分收管其和碩齊之弟圗固里克及其妻子請旨辦理等語和碩齊負恩降賊伊之妻子自應正法其弟姪等尚可寬宥著加恩將圗固里克及其妻子仍留察哈爾安插明白宣示俾知感激其查出馬匹牲隻交與扎拉豐阿帶至軍營備用可傳諭署總管呼魯斯罕知之諭大學士管陜甘總督黃廷桂豫備來年軍餉上諭軍機大臣曰前經傳諭黃廷桂先期備貯糧餉為來年添派兵丁之用今思甘省河東河西各處向有存貯糧石原為儲偫軍需此時自應速行籌運如本省糧已足用自不必更事採買倘為數不敷則應咨商開泰令於四川附近甘肅各州縣先期購運大概務足二萬官兵一嵗之糧能於今冬運至巴里坤或哈密存貯應用方為有濟其妥協辦理勿致臨期遲誤可傳諭黃廷桂知之議折給官兵口糧事宜甘肅巡撫吳達善奏言軍營糧餉從肅州哈密轉運至巴里坤每石運費至十二三兩上年進勦屯田各官兵萬餘人經臣奏撥哈密倉糧二萬石今春即不敷支給又經請撥哈密甘肅三色糧二萬石運送軍營今年各項官兵計二萬餘人原數既不敷用而屯田必俟收成似應通融辦理查向來凱旋官兵口糧多支者按日扣抵少領者按日補給伊等在軍前或有借貸及添置衣履多藉補給之糧出糶應用商民乘其急需未免故抑價值請於將來平定回部凱旋官兵抵巴里坤日其未領口糧給以二成本色八成折價其折價無論色樣每石概以八兩定價倘有借食他人口糧仍準支本色其願全領折價者亦聽其便奏入得旨軍機大臣議奏尋議軍糧關係甚重現奉諭旨令黃廷桂預備接濟至巴里坤存貯糧石無多將來大兵凱旋未領口糧即需補支若概給本色既多轉運之勞而商民又未免故抑價值應如該撫所奏辦理庶兵丁需用既便亦可節省運費奏入上從之甲子諭定邊左副將軍成衮扎布等防範達什達瓦遊牧上諭軍機大臣曰據成衮扎布奏稱和碩齊隊內脫出之巴爾虎兵丁克什克圗濟雅圖告稱達什達瓦所屬八人帶同巴爾虎察哈爾兵丁二人俱逃入哈薩克等語達什達瓦屬人未必逃入哈薩克想亦往投和碩齊耳此時若明言伊等往投和碩齊恐達什達瓦人衆驚疑可傳諭成衮扎布當佯為不知仍向哈薩克索取至達什達瓦人等殊難深信雖不必遽行辦理亦當密為防範再都爾伯特人等願於卡倫外遷移遊牧與喀爾喀並無妨礙即照所請行其汗索羅木衮布因病請暫離遊牧禮拜胡土克圗亦聽其自便丙寅申諭定邊將軍兆惠等酌量接濟糧餉上諭軍機大臣曰據兆惠等奏稱伊等已過特穆爾圖淖爾所餘口糧無幾不能回至伊犂仍招撫布魯特辦理回部就其所獲以給軍食等語所奏殊不知朕軫念伊等之意譬如伊等所稱口糧不能回至伊犂辦理回部就其所獲以給軍食之説倘若不得將奈之何由此觀之朕實不能釋懷况伊等果係口糧不足自伊犂起程時又何必停止巴里坤運送口糧前後所奏自屬矛盾已諭將兆惠等停運糧餉仍送至伊犂交策布登扎布昨又令策布登扎布前往策應其應接濟兆惠等口糧即著策布登扎布帶往給與再雅爾哈善等現在尚未攻克庫車則葉爾羌喀什噶爾又焉能即至兆惠等若得雅爾哈善攻勦回部信息量其力量可以兩隊夾攻自當奮勉前進否則仍回伊犂搜捕哈薩克錫喇等渠魁其相機酌辦作速奏聞又諭曰兆惠等以糧餉不足為詞若本年未能平定回部則軍食關係甚重屯田收穫諒亦無幾巴里坤距伊犂頗逺不便一時起運當挑選駝隻陸續將米麵等物運至吐魯番烏魯木齊等處預備可傳諭阿里衮速為接濟仍行文永貴定長令將存貯處所轉運事宜酌量辦理定邊左副將軍成衮扎布疏奏安設臺站成衮扎布奏言臣等從前行文和碩齊唐喀祿等俱由科卜多送往今復帶兵䇿應阿桂若仍派兵徑送則需人多而事轉遲滯今自起程之地約行四百里即留二十五人派員安設臺站交與主事眀善總管計抵俄羅斯界止需二百餘人庶事件不至稽遲馬駝亦得休息奏入報聞丁卯賜三等侍衛伍岱號墨爾根巴圗魯賞銀一百兩授厄魯特台吉舒倫哈什哈宰桑塔什為三等侍衛及厄魯特二等侍衛衮楚克扎卜賞銀各五十兩在京居住戊辰諭定邊左副將軍成衮扎布等酌量撤兵駐劄上諭軍機大臣曰叛賊舍楞等計此時已竄入俄羅斯布空郭勒等處亦未必有逃來之厄魯特阿桂等在彼堵截徒糜糧餉著傳諭成衮扎布阿桂等若阿桂報稱舍楞尚未逺竄成衮扎布宜速行策應如未得信息即不必前往仍回科卜多駐劄阿桂奉到此旨亦視舍楞之逺竄與否若賊衆已過無復逃來之人即派兵嚴密搜捕遇有嗎哈沁俱行勦殺以十五日為期亦回科卜多軍營仍將現在堵勦情形作速奏聞平定準噶爾方略正編卷五十六
