  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_081-1a, image: WYG0358/WYG0358-0447c.png}
body:
  text: 乾隆二十一年夏四月戊申命授巴罕烏魯特宰桑托克托博羅特為散秩大臣上諭軍機大臣曰據策楞奏稱巴罕烏魯特宰桑托克托博羅特留養去嵗被掠之喀爾喀王齊巴克雅喇木丕勒協理台吉多爾濟現在護送前來等語托克托博羅特著加恩授為散秩大臣齊巴克雅喇木丕勒多爾濟即遵前㫖遣回喀爾喀游牧定西將軍策楞等疏奏額林沁病故策楞等奏言臣等派侍衛古爾格勒圖僧保等押解額林沁赴京據報行至托里地方額林沁病故臣等即遣員驗看屬實查額林沁係阿逆黨羽應行正法今雖病故仍戮尸示衆奏入報聞己酉訓飭定西將軍策楞等上諭軍機大臣曰前據玉保奏稱阿逆由庫隴癸嶺逃入哈薩克境內伊回至固勒扎商同策楞等或領兵前進或遣使索取等語而策楞等隨後奏事數次總未籌及作何擒拏逆賊之處雖有遣瑚集圖前往哈薩克之語究竟前往與否亦未奏明伊等現在作何籌畫彼此不相照應前後又復矛盾深可痛恨已節次降㫖訓示今玉保又奏及拏獲賊黨明噶特舍楞等遣人解赴軍營因䇿楞未與相見乘間脫逃其意以明噶特等脫逃係策楞疏忽所致與伊無涉此等不過附和逆賊之人無關緊要原可不必深究乃玉保輒為此奏則是與䇿楞等顯有抵牾情狀伊等不知和衷共濟協力擒拏首惡各懷意見形諸奏牘實為深負朕恩看此情形必不能望伊等奮勉出力殊不知逆賊無論竄往何處必當窮搜極捕明正典刑以彰國憲策楞玉保等能自知罪愆痛改前非尚可加恩寬宥倘仍各挾私見貽誤大事朕亦任其自取毋庸多諭辛亥命布圖庫等補授多果魯特等九鄂拓克宰桑上諭軍機大臣曰策楞等將多果魯特等九鄂拓克宰桑應行補授兼管之處奏聞請㫖所有綽和爾宰桑已降㫖將恩克博羅特補授其多果魯特宰桑員缺著布圖庫補授鄂畢特宰桑員缺著訥默庫補授額爾克騰宰桑員缺著內大臣尼瑪暫行兼管伊克巴爾達穆特宰桑員缺著賽音章吉圖補授並令圖布慎協同管理巴罕巴爾達穆特宰桑員缺著索諾木車林補授巴爾達穆特宰桑員缺著塔斯補授庫圖齊訥爾宰桑二缺著賽齎拉呼諾爾布補授壬子命參贊大臣達爾黨阿帶兵前赴哈薩克上諭軍機大臣曰策楞等領兵擒拏阿逆事事舛謬全無籌畫今西路則専任達爾黨阿北路則専任哈達哈伊二人尚屬勇往著即領兵前赴哈薩克務期擒獻現據兆惠奏稱特訥格爾安濟哈雅共有兵丁二千餘名巴里坤可用馬匹亦有二千等語著將特訥格爾等處兵丁俱交與達爾黨阿帶領並著和起等即將馬匹解赴應用迅速奏功哈寧阿鄂實俱著在參贊大臣上行走諭定西將軍策楞等籌辦伯什阿噶什事宜上諭軍機大臣曰前據策楞等奏稱伯什阿噶什然將游牧移至博羅塔拉地方此係傳聞之言策楞等並未將親見伯什阿噶什之處奏聞今又於來京入覲人員內列入伯什阿噶什之名策楞等此時果與伊相見自可無疑如尚係傳言則所稱移至博羅塔拉之語不可全信豈有遷至博羅塔拉道由伊犂伊不親身來見者此時伊若游移觀望不即向博羅塔拉遷移猶依附哈薩克邊界則係明為接應阿逆暗中聨絡不可不詳加體察果有此情䇿楞等即將伯什阿噶什擒拏辦理倘實無從逆情形亦即行奏聞命封台吉諾爾布等公爵上諭軍機大臣曰策楞等奏台吉諾爾布等隨同大兵效力甚屬奮勉等語諾爾布布庫察罕昆都斯車克爾等俱著加恩封授公爵烏巴什特古斯哈什哈額林沁扎卜貝克博爾巴里巴桑等俱著授為扎薩克台吉鄂畢特宰桑丹津上年同達瓦齊來京身故已將伊子訥默庫補授宰桑並著加恩投為散秩大臣再據奏額爾克騰得木齊格存現領三千餘户額爾克騰宰桑事務已令尼瑪兼管格存應作何加恩著策楞等議奏請㫖其額爾克騰舊宰桑俄羅斯現在何處一併奏聞癸丑命大學士忠勇公傅恆前往西路整飭軍務上諭大學士曰現在西路軍營策楞玊保等辦理諸事乖張錯誤種種不合機宜無以宣威荒服著大學士忠勇公傅恆馳驛即赴額林哈畢爾噶一帶整理軍務令衆台吉等齊集㑹盟事竣即速回京命授公明瑞副都統職銜前往西路軍營隨同達爾黨阿辦事命拏解定西將軍策楞等上諭軍機大臣曰朕因策楞等所辦事宜種種乖謬是以命大學士公傅恆前往整飭軍務策楞玉保著拏解來京治罪策楞之子特通額著革職交達爾黨阿軍前效力扎拉豐阿身為副將軍一籌莫展本應一體治罪姑念伊未經更事且係䝉古著革去郡王加恩給貝子品級來京候㫖並諭厄爾錐音哈薩克錫喇吞圖布恩克博羅特等今因將軍大臣辦事錯謬革職拏問伊等生長準噶爾地方熟悉厄魯特哈薩克情形理應奮勉效力乃遣使哈薩克一事並不實心商辦彼此推諉伊等俱不能無罪但念新降之人姑從寬免嗣後如能感恩圖報奮力贖罪仍當加以厚恩倘少存退諉亦不姑貸定西將軍策楞等疏奏招撫波羅泥都霍集占等事宜策楞等奏言據回人總管阿底斯侍衛嶽蘇卜阿卜都喇伊木等稟稱去年入覲時因伊犁地方擾亂求移至吐魯番地方業經轉奏今波羅泥都霍集占等已將回人并我等妻子俱行伊往查波羅泥都霍集占等向與葉爾羌喀什噶爾積有仇隙未必前往彼處必至庫車賽里木積木薩一帶居住若遣使同往招撫自必投誠移至吐魯番等語臣等與哈薩克錫喇等公議回人素受準噶爾役使今既舍伊犁而去必不願回應即派員同阿底斯等前往曉諭招撫令伊等遷至吐魯番居住奏入報聞甲寅諭定邊左副將軍哈達哈等辦理烏梁海事宜上諭軍機大臣曰朕因西路領兵大臣策楞等辦理乖謬特命大學士公傅恆前往經里并拏問䇿楞等治罪其北路専任哈達哈等協力擒拏阿逆迅奏虜功今日哈達哈等奏到辦理烏梁海一摺尚未合宜烏梁海等反覆無常全不可信現在有逃竄情形明係豫聞風聲欲隨阿逆遁去必須速行𠞰滅哈達哈勿少遲疑即行辦理收其牲隻以益兵力方足以示懲警倘阿逆煽同哈薩克威脅烏梁海等潛為搆釁因而搶掠察達克等游牧則並舊日收服之烏梁海皆為搖動不若早為殄滅庶可以杜後患再伊等現已進兵二千名尚餘兵若干哈達哈即同青滚雜卜迅速前往現在牧草發生務多帶領兵丁二三千名陸續進發以壯軍威著哈達哈等一靣辦理一靣即速行奏聞命參贊大臣富德來京上諭軍機大臣曰參贊大臣富德領兵擒拏唐古忒甚屬奮勉量此時巳經擒獲即或竄逸亦非阿逆可比毋庸再為追逐富德著即來京靣聆諭㫖再往軍營命散秩大臣達什敦多卜住居察哈爾上諭軍機大臣曰據哈達哈奏散秩大臣達什敦多卜上年隨將軍等駐劄伊犂伊游牧內屢次被賊搶掠今擕其妻孥懇請移至察哈爾附伊族人同居等語著照所請達什敦多卜准其移至察哈爾居住丙辰命宣示薩喇爾罪狀上諭軍機大臣曰黃廷桂已遵㫖拏解薩喇爾又奏稱達什達瓦人衆現住巴里坤已令兆惠等密為防範其拏解薩喇爾之事勿使泄漏等語薩喇爾獲罪拏解達什達瓦人衆不能保其一無聽聞伊所稱勿令宰桑等聞知一語乃詭詞要挾正伊狡獪自取罪戾也此事必當明白宣示諭以薩喇爾獲罪情節俾知罪在薩喇爾與伊等部衆無涉自不致别生事端前已令兆惠轉諭薩喇爾之兄布林兆惠如已來京即著黃廷桂到彼曉諭令伊等照舊安輯部衆赴所指阿爾台等處游牧勿使驚懼若如黃廷桂所奏令其逺徙他處則示怯生疑何以申國憲而整軍律在未經拏解之前不可不密拏解後則當宣播罪狀使衆共知令其畏服著傳諭黃廷桂知之丁巳參贊大臣富德疏奏追襲賊黨唐古忒情形富德奏言臣追逐賊黨唐古忒屢次擊敗賊衆由薩勒巴爾圖等處遁去臣等即由烏隆古河前往堵截至察罕鄂博地方忽遇哈薩克兵一千名與唐古忒合隊大兵奮勇衝擊斬首百餘級擒獲賊黨二人詢知阿睦爾撒納於正月內遣人令伊等前來搶掠烏梁海塔本集賽等游牧臣等即將被掠之集賽噶勒雜特三十餘户奪獲就近交與達什策凌都噶爾等收回共計連戰十餘次陳亡兵丁三十名其奮勉官員兵丁查明另奏奏入報聞命大學士忠勇公傅恆回京上諭大學士曰策楞等統兵追捕逆賊阿睦爾撒納既已直抵伊犂相距甚近乃不振我軍威疾馳前進以擒賊為事一接玉保札致即回駐伊犂而玉保雖追至庫隴癸嶺僅獲一額林沁而返其額林沁屬下之人仍皆相隨叛賊以去由此觀之若使策楞玉保等早能奮勇協力急行追捕則叛賊斷不致逺揚即玉保當額林沁就縛時更能取其屬下馬駝以濟我師行之用竭力窮追尚亦不難掩獲即使失之意外其所擒戮必不止一老邁之額林沁而已也此何等重務而乃輾轉延緩坐失事機前已明降諭㫖宣示中外矣夫以叛賊伏處近地尚且交臂失之今已竄入哈薩克境內其去已逺即遣使傳諭哈薩克其縛獻與否舉未可知是應懾以兵威曉以大義而先遴選勇敢將辨將命以往或庶幾耳而策楞等奏稱恐哈薩克羈留我使致開釁端欲遣哈薩克之俘留於厄魯特者令其前往如此措置豈不䙝朝命而貽笑於諸厄魯特耶庸懦之人將有以䇿楞等為曉事不知事在人為今未遣一人未發一兵是所謂自畫自棄耳即以國家經費言之雍正年間兩路用兵費帑至七千萬今未至二千萬也而府藏充盈較前轉多且朕並未因用兵加征賦稅尅減兵餉而賑恤更較往時為過優何至策楞等為國惜費耶此不過以恇怯思家之心託為忠良為國之言耳如是則人誰不能國家何賴有是臣乎是以特命大學士忠勇公傅恆馳驛前往將伊等拏問治罪並至額林哈畢爾噶一帶令衆台吉等齊集㑹盟以宣布威信整飭軍務兹以傅恆起程後二日據策楞等奏稱奉到朕三月初七日訓飭之㫖已自知罪戾畏懼惶恐即日率領官兵調集各台吉人馬直壓哈薩克邊境勒令擒獻如叛賊逃往布魯特即至布魯特索取等語是伊等既已厲兵罙入比傅恆到軍營時䇿楞等進兵已一月有餘斷無復行追還之理所欲㑹盟之台吉宰桑等任事之人又俱隨往軍前正在用兵之際亦未便齊集㑹盟大學士傅恆亦毋庸前赴即回京贊理機務策楞等軍前現有達爾黨阿同往一切機宜自應商酌而行或因有此一番懲警策楞等知所奮勉叛賊得以就擒亦未可定此亦視伊二人之福命矣即如馬匹一項現奏稱就各鄂拓克湊集二千五百餘匹則前此亦並非無馬直以畏怯不欲辦理耳近據富德奏到追殺叛賊唐古特至塞伯蘇台地方遇哈薩克一千餘衆我軍以索倫兵三百餘直前衝突悉皆潰散斬三百餘級所護軍械牲隻甚多此亦可見哈薩克本非徑旅策楞等畏怯自誤是以望而却步耳總之叛賊之逸實由於策楞玉保二人既已誤之於前罪無可逭今知畏罪思欲奮勉姑留一線豫以自贖之路視此番效力如何再降諭㫖朕用人行政不存絲毫成見如伊等果能擒賊奏功尚可相抵但恐伊等初念迫於畏懼轉念又復游移後力不能自振則朕雖曲加寬宥亦不能也將此通行宣諭知之戊午命停派厄魯特兵丁隨往上諭軍機大臣曰策楞等奏稱行文於附近鄂拓克宰桑等令其派出兵丁從征等語現在厄魯特生計甚艱人亦不能奮勉效力派往從征於事無益兵貴鋭而不貴多所有索倫察哈爾兵丁現足調遣不必更派厄魯特兵丁前往其現在投誠之台吉宰桑等自必懇求入覲伊等出兵效力殊屬勞苦宜暫為休息以示體恤俟拏獲阿逆後再行降㫖令伊等前來入覲命諾爾布之子達瓦藏布承襲公爵上諭軍機大臣曰諾爾布現在病故著加恩將伊子達瓦藏布承襲公爵從前隨同阿逆之賔巴因係諾爾布之壻懇請帶往游牧今達瓦藏布尚在幼年賔巴斷不宜留於彼處著扎拉豐阿等拏赴軍營正法己未命陜甘總督黃廷桂回駐肅州上諭軍機大臣曰前曽降㫖令厄魯特部落人衆就食巴里坤原因伊犂人等生計艱困不便聽其聚處滋事耳今已傳諭策楞等就其部落設法資助則不必逺赴巴里坤且伊犂人衆四處分散已屬無幾策楞等現在進兵亦無暇籌辦此事黃廷桂不必久駐巴里坤應仍回至肅州督辦調撥軍需事務庚申授總兵李繩武為安西提督駐劄巴里坤上諭大學士曰豆斌現在患病著解任調理安西提督員缺著李繩武補授即赴巴里坤㑹同和起等辦理糧餉事務辛酉諭防範哈薩克事宜上諭軍機大臣曰阿逆現竄入哈薩克境內西路命達爾黨阿北路命哈達哈等各領兵索取阿逆或逞其狡謀詐言哈薩克縛賊擒獻引兵深入設伏以待皆不可不豫為防備達爾黨阿等領兵前往即哈薩克有擒獻之言亦仍宜擁兵自衛多方防範毋冒昧以墮奸計方為妥協現在富德追襲唐古特等所遇哈薩克兵丁係受阿逆慫恿搶掠塔本集賽噶勒雜特等游牧在阿逆之意無非欲使哈薩克有得罪天朝之名而伊因得潛竄彼處以為藏身之固是以特降諭㫖曉諭哈薩克阿布賚令其擒獻逆賊不特將搶掠塔本集賽等事概免究問尚當加以厚恩並將富德等所獲哈薩克屬人二名即行遣回達爾黨阿等接到諭㫖即先遣幹員同伊屬人前往詳悉傳諭仍帶兵速行進發責令擒獻命傳諭左部哈薩克上諭左部哈薩克阿布賚曰逆賊阿睦爾撒納勢窮力竭竄入爾哈薩克境內又煽惑爾屬人等搶掠塔本集賽噶勒雜特等游牧誘令爾等獲罪天朝伊得以棲身爾境茍延殘喘今爾部邊境人等誤信其言私相劫掠遇大兵擊敗擒獲爾屬人呼岱巴爾氏額塞爾拜二人解送來京詢問知爾固不知情也應即將此二人正法念爾部落向屬恭順不過屬人誤聽阿逆之言是以格外加恩將爾屬人釋放遣回並齎賞內縀四匹從前侍衛順德訥奏稱爾欲受天朝厚恩遣使進貢後使人為阿逆所留未經入覲朕已早鍳爾誠悃此次接到諭㫖即將阿逆擒獻不特搶掠塔本集賽等事概免究問仍當加以厚恩現遣兩路將軍等領兵萬人將抵爾境爾等倘墮賊計迷而不悟不即擒獻則必更發大兵盡行𠞰滅爾其熟審利害毋貽後悔癸亥命曉諭準噶爾部衆上諭準噶爾部衆曰前因將軍策楞等疏縱逆賊遷延觀望而辦理一切事宜諸多未協是以特命大學士忠勇公傅恆前往軍營與爾各部落台吉宰桑等齊集㑹盟整飭軍務即如策楞等派爾等各鄂拓克兵丁隨營出征朕念爾等屢遭兵革生計艱難特降㫖令歸各游牧休息耕種其軍營支用爾等馬匹牲隻並令給豫價值以示體恤今策楞等自知前愆業已領兵前進爾台吉宰桑等亦有效力行間者不便更因會盟之事久候時日現已停止大學士公傅恆前往用須諭㫖詳悉曉諭爾準噶爾地方連年不靖互相劫奪各部落生計自不能饒裕然能及時播種牧養牲隻以務本業則一二年間元氣自可全復若徒以搶奪為事則有業之户一被搶奪即成貧乏甚至從而效尤盜賊日熾勢將何所底至因思有無相恤貧富相通即爾部落中原自有可以通融籌辦之道果能收養貧民使其耕作自給則衆人皆可不致失所久之自成善俗爾台吉宰桑等務期約束所屬禁止劫奪辛勤力作互相睭恤副朕子愛羣黎之意至於衣服制度不妨仍其舊俗若因歸順天朝必盡用內地服色勢亦有所難行爾等習慣自然一時豈能驟易且將舊時衣服盡行棄置亦殊非愛惜物力之道即朕所頒賜物件亦止宜善為收貯傳之子孫惟來京朝覲暫時服用現在喀爾喀䝉古王公及居住青海之厄魯特等平日各居游收止仍其舊惟來京及赴圍場扈從時始易服色爾等俱可倣照而行朕令爾各部落等編立旗分設官授爵其制即與爾部設立宰桑得木齊收楞額之意大略相同從前爾等不知妄生疑懼或謂難以奉行爾等應再行明白曉諭使之各奉約束勿滋事端方可永享升平之福爾台吉宰桑等皆受朕厚恩惟仰體朕一視同仁之意善為撫綏庶幾所屬人等皆知守分安居休養生息朕實有厚望焉命諾爾布敦多克之子巴雅爾拉虎承襲公爵上諭軍機大臣曰策楞奏稱諾爾布敦多克及伊子達瓦俱已病故深堪悼惜著賞銀二百兩料理喪事其公爵即著伊幼子巴雅爾拉虎承襲伊游牧與哈薩克接壤如欲遷移至額林哈畢爾噶等處悉聽其自便巴雅爾拉虎尚在幼年並著於哈薩克錫喇尼瑪內酌派一員代為管轄乙丑命劉統勳馳驛回京上諭軍機大臣曰前降㫖令劉統勳回至巴里坤協同何國宗辦理西域輿圖此時應已抵巴里坤輿圖事務仍交與何國宗専辦劉統勳著即馳驛來京丙寅命定西將軍策楞遣人曉諭回人波羅泥都等上諭軍機大臣曰策楞等奏稱回人波羅泥都霍集占等兩次遣人至軍營俱未得達今又遣厄魯特策勒伯探聽大兵抵伊犂信息欲來投誠等語波羅泥都等屢次遣人探信如投誠之意屬實策楞等應即派兵前往曉諭伊等果親至軍營即准其歸降其如何安插納貢之處奏聞請㫖命納噶查之弟巴爾濟承襲公爵上諭軍機大臣曰納噶查之弟達克巴前經加恩令其承襲公爵現在又已病故其公爵著納噶查幼弟巴爾濟承襲丁卯訓飭定西將軍策楞等上諭軍機大臣曰據策楞等奏稱玉保領兵前赴察罕烏蘇追尋阿逆踪跡達爾黨阿等由博羅塔拉進發俟至勒卜西特勒木哈達處會齊一同前赴哈薩克又策楞等因籌辦官兵馬匹口糧暫駐於登努勒台博羅布爾噶蘇等處以為聲援至應赴博羅塔拉時即行前往等語觀此可知此次仍是玉保一人領兵前赴哈薩克而策楞等並未繼進夫策楞扎拉豐阿身為將軍不親自前往反令玉保獨行是誠何心豈將軍之去反不如玉保之去為有益耶況玉保原係需人提調指揮之人伊得意則進失意則退策楞等諒所深悉豈以玊保擒獲逆賊則専屬玉保一人之功設令無功獲罪策楞等身為將軍又可脫然事外耶策楞等寧不計及此而冒昧妄行朕實為之不解伊等摺內有仍懇朕慈鑒之語試問以如此行事尚欲邀朕憐憫豈但知乞朕加恩竟不自忖作何承受耶總之伊等前奏欲赴哈薩克之意特因朕嚴㫖催促迫於不得不然姑勉強從事及稍加溫諭即自延緩不前殊不知朕所矜憫者乃行間兵辨及哈薩克錫喇尼瑪等新來歸附之人此際殊覺勞苦耳豈謂策楞等受任將帥不能奮身前進至於數數僨事轉得邀恩耶策楞等身膺重任理應勇往直前有進無退乃必待朕降㫖督促方圖前進否即退縮不前曽不思道路遙逺軍中事宜若必待朕一一指示而後奉行詎能望其成事即如官兵口糧一事當向巴里坤領取不應向厄魯特凑辦去嵗用兵時準噶爾人衆尚未困弊原可因糧於敵且大兵不久即還亦非久駐而永常懵然不知必斤斤以計日授糧為辭朕是以斥其非而加之罪今嵗進兵則諸部落當阿逆擾亂之後事勢與前大異不但派往哈薩克之兵當以接濟口糧為要即駐伊犂等處兵丁亦當由內地運給口糧豈可轉向厄魯特等凑辦在將軍惟當迅速進兵至所需口糧何難向巴里坤領取即令不能尅期全到且先趕運兒馬騍馬其羊隻隨後運送有何不可而策楞並不籌辦前後奏摺亦無一言及此豈不重堪駭怪乎且準噶爾人衆俱我臣僕伊等生計艱難尤當施恩賞賚何至索及伊等牲隻策楞等如此湊辦牲畜派撥各鄂拓克兵丁全不知事體輕重尤屬悖謬不堪又此次派往哈薩克之兵自可就現有之兵酌量調度毋庸更為徴派如富德帶兵三百即能擊敗哈薩克一千之衆伊等獨未之見乎我兵抵哈薩克時彼若即行縛獻阿逆則已否則量我兵力或可急進或應徐圖總在相度機宜隨時辦理何可豫存拘牽之見策楞等並不審量事勢而率意乖舛若此朕實不勝詫異再覽伊等所奏並未言及伯什阿噶什現在何處從前伊與阿逆頂佛結盟同惡有素此時保無私相紏合阻撓我師尤宜先事防範著達爾黨阿細加偵訪如伯什阿噶什已向內地遷移並無他故自可毋庸辦理倘有别情即先將伯什阿噶什擒拏取其牲隻助我兵力然後前赴哈薩克庶可剪除阿逆羽翼使無他患今擒拏阿逆之事業經屢降諭㫖責成達爾黨阿當善體朕意奮勉出力速圖奏功若策楞等或去或不去及伊等尚肯救過贖罪與否並聽伊等自行揣度為之朕亦毋庸多諭五月戊辰朔命革玉保參贊大臣仍在領隊大臣效力行走授達爾黨阿為定邊右副將軍巴祿為贊參大臣上諭軍機大臣曰據玉保奏伊並未行文策楞令其停止進兵一摺此語更屬悖謬試思伊即並未阻止策楞而逆賊阿睦爾撒納究竟脫於誰手伊等如果協力同心彼此不相推諉何以貽誤至此即如拏獲額林沁一事伊屬人既有抗拒情形即應奮力𠞰捕收其馬匹乘勢追擒則阿逆必不至於漏網及遣使哈薩克又復如此畏葸游移玊保獨不與聞其事乎再前奏阿逆脫逃時兵力無多今則突稱帶往二千人種種自相矛盾明係有心欺飾若仍令參贊軍務必至掣肘僨事著將玉保革去參贊大臣仍在領隊大臣上行走以供驅策此次若能奮勉尚可寬宥倘稍有退縮必重治其罪達爾黨阿近日辦事甚屬勇往著授為定邊右副將軍巴祿現往軍前辦事著授為參贊大臣命駐劄巴理坤辦事大臣和起來京上諭軍機大臣曰和起在巴里坤辦事甚屬黽勉著馳驛來京面聆訓示再往軍營同兆惠籌辦一切事宜其巴里坤事務著侍郎雅爾哈善暫行前往管理己巳諭辦理遷移輝特部落人等游牧事宜上諭軍機大臣曰準噶爾地方年來屢遭蹂躪未經安輯朕前已降㫖令策卜登多爾濟普爾普等俟明年遷至原游牧處庶於生計有禆今據納穆扎爾奏伊等今嵗請在鄂爾昆額爾得尼招等處游牧俟牲隻孳息再行遷移著即照所請行至納噶查之弟烏勒木濟等求往青海居住事屬可行但伊等原係久居準噶爾地方之人水土素所服習若移至青海轉恐無益從前納噶查曽經奏請朕已降㫖曉諭烏勒木濟等著仍遵前㫖明年同䇿卜登多爾濟普爾普等遷回原游牧居住命曉諭都爾伯特各部落禁止盜竊上諭軍機大臣曰都爾伯特人等與扎哈沁等彼此盜竊牲隻案犯纍纍皆由準噶爾連年擾亂以致劫奪成風恬不知怪抑知伊等生計全賴牲隻似此盜竊相尋牲隻不獲蕃孳生計焉能充裕亟須嚴行禁止著傳諭納穆扎爾舒明阿蘭泰巴蘭泰等通行曉諭都爾伯特輝特扎哈沁沙畢納爾人等務各嚴禁所屬毋得盜竊滋事務期守分各圖生業副朕休養羣生至意庚午命寬參贊大臣富德降革罰俸各案上諭軍機大臣曰參贊大臣富德此次追襲唐古忒雖未拏獲中途將哈薩克人等擊敗殊屬奮勉著加恩將富德所有罰俸降級革職留任之案概行寬免逆黨察噶什庫克等正法軍機大臣奏言臣等審訊察噶什附和阿逆謀叛阿逆將約蘇圖殺戮後即令察噶什管理綽和爾宰桑事務始終黨同附惡應請㫖將察噶什凌遲處死其唐古忒僕人庫克亦應處斬奏入報聞辛未命定西將軍策楞等確探阿逆逃竄地方上諭軍機大臣曰詢問富德解到哈薩克呼岱巴爾氏等告稱阿逆逃竄若由阿勒坦額默勒庫隴癸嶺經過沙喇擘勒地方可至右部哈薩克境內等語沙喇擘勒地方即係伯什阿噶什所居伊向與阿逆交結今尚未見投誠或與阿逆同投右部哈薩克亦未可定著達爾黨阿玉保確探阿逆逃竄去向追踪緝拏若伯什阿噶什與阿逆㑹合則先掠其游牧以增兵力前已降㫖令策楞等籌辦伊等身任將帥並不慮及必待朕之指示不知伊等所辦更有何事即伊等緝賊之不力於此益見且哈薩克錫喇尼瑪等皆熟諳情形之人阿逆向何處逃竄亦應詢問伊等辦理朕閲策楞等止奏遣人往哈薩克阿布賚處而不及比里坤斯伊等又何以知阿逆逃往哈薩克左部必不逃入右部境內耶並著傳諭策楞等與哈薩克錫喇尼瑪等悉心籌畫迅速追擒另有諭㫖曉諭右部哈薩克著侍衛布衮馳驛齎往命傳諭右部哈薩克上諭右部哈薩克阿比里斯曰阿睦爾撒納生性奸詐為爾等所稔悉今者背恩逃竄滋擾厄魯特各部落朕命將軍等領兵擒拏伊力窮計蹙又逃入爾哈薩克境內此特因準噶爾地方不獲棲身以爾部乃邊逺之人不深悉其罪狀易於欺妄暫求依託或乘間煽惑爾等虜掠厄魯特等游牧藉此生釁使爾部有獲罪天朝之咎不便將伊擒獻以為荀延旦夕之計爾等中伊詭謀或現將伊存留容隱亦未可定是以特行降㫖曉諭速將逆賊擒獻軍營朕必重加恩賞並令爾部落照舊安居勿令騷擾現在大兵兩路進發不過萬餘如爾等甘為賊用執迷不悟朕必興師十萬盡行𠞰滅爾等其熟計利害仰承恩典毋貽後悔命喀爾喀貝勒車木楚克扎布暫回游牧上諭軍機大臣曰據和起等奏准策楞咨現在撤回喀爾喀貝勒車木楚克扎布公旺布多爾濟等令往巴里坤聽候調遣等語車木楚克扎布等如已調遣進兵即令其前進若尚未起程著和起等降㫖曉諭伊等自去嵗在軍前行走往返勞頓今不過捕一逃犯毋庸多派人員且策楞等早已率兵前進伊等前往亦屬無及車木楚克扎布旺布多爾濟俱著帶兵各回游牧以示優恤壬申命諭定西將軍策楞等上諭軍機大臣曰策楞等雖自知不能實力追擒阿逆之罪而現在辦理亦不合機宜從前伊等奏阿逆逃竄帶兵甚少今復欲多選兵丁再行前進且派撥厄魯特兵丁更向各鄂拓克等支取口糧殊不知索倫察哈爾兵丁儘足調遣若厄魯特兵丁乘勝則進遇敵則退不能奮往出力何庸多派至向伊等支取口糧更屬不合伊等若不將巴里坤運送口糧飛檄停止此時早已運到何致如此周章此皆策楞等從前冒昧所致再伊等奏請存留伊犂兵五百名甚屬無謂若將此兵帶往追擒阿逆豈不甚善今反欲將此存留伊犂不過為保護伊等一身起見與軍務何益又稱帶兵回至登努勒台地方等語朕從前令伊等在登努勒台牧放馬匹相機進止特因伊等先令玊保前行哨探尚在未議進兵是以令其暫住陸續繼進今既已進發豈有將已進之兵復行撤回之理種種拘泥辦理甚屬謬妄此㫖到日策楞等即速行前往毋得退縮怯懦仍蹈前轍諭定邊右副將軍達爾黨阿等辦理古爾班和卓事宜上諭軍機大臣曰據策楞等奏古爾班和卓係哈薩克仇敵去年即行投誠亦無附和阿逆之事等語此奏甚屬錯誤古爾班和卓不特上年並未投降且班第等前經奏稱伊因擒獲達瓦齊曽為阿睦爾撒納稱慶則此時與阿逆同行亦未可定著傳諭達爾黨阿玊保大兵前進古爾班和卓若將伊游牧內移前來謁見則可准其投降否即用兵將伊擒拏解送京師並收取其牲隻以佐大兵進𠞰之用臣等謹案大兵平定伊犂逺近諸部懷仰恩威輸誠恐後間有一二怙終附逆首鼠兩端者無不自罹法網以速滅亡若古爾班和卓前此詐稱歸命潛懷狡謀一時軍營大臣等尚不能洞其情僞為之奏請我皇上坐照如神無幽不燭於乞降之始核其踪跡已自包藏異心是以密授方略俾知悉心防範厥後古爾班和卓猶託詞移往阿爾台乘間竄入烏梁海與阿逆狼狽交通屢肆奸宄將軍等幸得禀承廟算一殱之於西路復遇北路大兵全行剪滅於此知么麼伎倆無一能逃聖明照察而當軍書旁午時遙揣情形於數萬里之外睿慮周詳若持左劵又豈僅昔人所稱虜在目中者所能髣佛萬一也哉平定準噶爾方略正編卷二十七
