body:
  text: 乾隆十九年秋九月辛巳定邊左副將軍班第等奏報派兵收服烏梁海日期先是將軍策楞等奏言臣等商同阿睦爾撒納擬派喀爾喀兵五千五百名阿睦爾撒納訥默庫及䇿凌等兵各五百名共兵七千名於九月二十日內齊集烏里雅蘇台十月內到科卜多探取信息辦理烏梁海若遇阿睦爾撒納之兄及伊屬人等即迎接前來若烏梁海逺遁請在哈道里海喇圖等處等候相機辦理奏入得㫖䇿楞等前後所奏總不相符前稱七月內發兵辦理烏梁海回時恐為雪所阻推諉誤事今又奏稱於九月二十日齊集前往何以與前互相矛盾且辦理烏梁海是何大事何必用兵至七千名之多種種錯誤殊堪髮指此時若已遲誤不如竟俟至明年大兵進𠞰時辦理著傳諭班第等熟籌妥辦嗣經班第等奏稱參贊大臣薩喇爾等業已率領所派兵丁出卡前往計此時正與賊游牧臨近之時若再往諭令其撒回恐賊衆知覺轉來堵截殊多未便現在薩喇爾等於八月二十四日領兵前進臣等亦於二十五日自烏里雅蘇台起程前往卓克索接應奏入報聞癸未定邊左副將軍班第等疏奏牧放馬匹事宜班第等奏言明嵗進兵所需駝馬牛羊等項現在陸續送到時際冬春須擇水草好處善為牧放以備臨時應用現奉特㫖派出舒赫德經理臣等復公同商議仍令額林沁多爾濟率同貝勒旺親扎卜等各帶本部落官兵前往翁金達什和碩地方查收送到馬匹牲畜護送緩行其牧放地方查扎卜堪空圭等處冬令溫暖水草充足應令在該處牧放以收實用奏入報聞丙申侍郎玉保等奏報帶領新降台吉阿睦爾撒納等自軍營起程前赴熱河入覲丁酉定邊左副將軍班第等奏報辦理烏梁海情形班第等奏言九月初二日有準噶爾烏梁海赤倫屬下烏拉克榜博羅索克孔鄂洪胡四人到卡倫告稱我台吉達瓦齊令我宰桑察達克車根圖布慎雅爾都四人帶領一千餘户在索郭克察罕烏蘇索郭圖博羅布爾噶蘇等處居住宰桑赤倫帶領二百餘户在吹地方居住今宰桑遣我等前來懇求仍令我等往舊游牧沙畢勒沙扎海淖爾沙扎海地方居住等語查現在參贊大臣薩喇爾努三帶兵來卡倫時應將此烏梁海嚴加看守不致泄漏消息並將烏拉克榜等送交薩喇爾等以備詢問薩喇爾努三即㑹同貝勒青滚雜卜班珠爾等商議帶兵連夜前往經行博托和尼溝地方至初八日分為兩路薩喇爾同貝子車木楚克扎布公䇿布登扎布厄魯特台吉扎木參齊木庫爾德濟特帶領兵一千八百名在察罕烏蘇地方往擊四宰桑游牧努三同貝勒青滚雜卜台吉班珠爾普爾普帶領兵一千名在吹阿勒和碩地方往擊宰桑赤倫游牧查此烏梁海等性最狡詐今春驅逐伊等誆言投順實未歸誠又同瑪木特虜掠阿睦爾撒納之妻子並堵截投順天朝人衆之路尚思仍居舊日游牧情殊可惡理應大加懲創以示軍威臣當即諭令薩喇爾努三疾速進兵奮擊掠其游牧如遇阿睦爾撒納家口即行奪回伊等果畏威投順再行相機酌辦奏入報聞己亥命派健鋭營兵丁一千往西路調遣上諭軍機大臣曰前將新降厄魯特兵一千名派往西路已降㫖令於原派緑旗兵一萬名內裁減三千此外著添派健鋭營滿洲兵一千名命往西路再將緑旗兵裁減一千其所派官辨毋庸裁減照舊遣往以備調遣冬十月丙午定邊左副將軍班第等奏報𠞰捕準噶爾烏梁海情形班第等奏言九月初九日參贊公䇿布登扎布等自科卜多河見有烏梁海踪跡即分兵前進擒宰桑車根等屬人三十餘口即率兵追捕獲宰桑車根及其二子厄魯特台吉齊木庫爾德濟特宰桑烏勒木濟伯勒克和特等又擒獲二十餘人續據參贊大臣烏爾登亦於九月初九日帶兵於索郭克地方接應參贊大臣薩喇爾薩喇爾先已得勝計擒男婦老少四五十人獲馬匹牛羊甚夥又據參贊大臣努三青滚雜卜班珠爾普爾普等帶兵於初八日至喀喇莽鼐地方分兵前進於初九日至赤倫所居吹地方奮力往捕宰桑赤倫及其所屬四得木齊家口俱行擒獲又將雅爾都所屬一得秦家口擒獲詢問瑪木特踪跡據稱八月間往額爾齊斯等語現今所得烏梁海户口約計一千數百口四項牲畜共有數萬臣等伏思此次官兵直抵烏梁海巢穴將賊人頭目户口牲畜擒獲無算仰賴天威奏功迅速臣等即行文薩喇爾努三等令將科卜多河源巴斯庫斯等處居住之烏梁海乘勝𠞰捕仍探聽瑪木特巴朗等信息即行擒拏外將現獲之烏梁海等解送內地其恭順投降者留其妻子給與度日牲畜居住搶獲子女牲畜俱行送入卡倫其阿睦爾撒納屬下被虜子女今奪回者即行給與奏入報聞庚申命喀爾喀副將軍額林沁多爾濟為西路參贊大臣暫回游牧馳驛來京靣領指授前往辦事癸酉定邊左副將軍班第等奏報擒獲準噶爾宰桑瑪木時等班第等奏言據參贊大臣薩喇爾等報稱十月十二日遣人哨探得兩瑪木特在布拉罕察罕托輝之下游諾海克卜特爾地方居住並知庫克新瑪木特家産牲畜俱被通瑪木特掠去應先擒通瑪木特再將庫克新瑪木特從前釋放背恩之處一一聲罪曉諭俾知畏服薩喇爾同班珠爾等率領官兵繞出烏蘭山之後奮勇直入即將通瑪木特擒獲并查拏得伊屬下人約計百名即尋獲庫克新瑪木特令伊屬下得木齊等招撫所部人衆俱各收服參贊大臣努三等帶領官兵前至額里音淖爾喀喇烏蘇地方共擒獲扎哈沁包沁噶勒雜特兵一百五十餘人領兵居住為首之達什敦多卜亦被擒獲薩喇爾等遵照諭㫖厯數庫克新瑪木特之罪據伊告稱從前原欲投順天朝已遣人告知卡倫侍衛後因節次有事為達瓦齊差遣未得其便且我子又在達瓦齊處是以未果今正欲將通瑪木特游牧搶奪由竒蘭遷至布拉罕進內投誠反被通瑪木特設計將我擒拏如果無投降之意如何往搶通瑪木特急遷至布拉罕今我等不便在此居住懇請移入卡倫等語遂將兩瑪木特派員解送軍營將伊等户口及牲畜等項俱移至庫卜克爾克勒地方安置臣等伏思此次收獲烏梁海之後即欲前進擒拏兩瑪木特緣附近庫列圖嶺雪大難行惟索勒畢嶺一帶路徑尚無大雪可以行走惟恐瑪木特等聞知烏梁海信息逃避逺遁正在商量行止適聞瑪木特移往索勒畢嶺之附近布拉罕察罕托輝地方之信即行進兵而我兵未進之先庫克新瑪木特已被通瑪木特擒拏其所屬扎哈沁人等俱已離心毫無準備我兵前進如履無人之地將兩瑪木特並行擒獲此皆仰賴聖主威福故能尅期集事而準噶爾之背逆相仍不煩兵力明嵗大兵蒞止成功早可預卜奏入上諭大學士曰班第自到軍營以來辦理諸事俱合機宜奮勇果斷是以先經進兵擒獲阿爾台以內居住之準噶爾烏梁海宰桑三人收户口千餘今復遣兵由彼越索勒畢嶺進至布拉罕之察罕托輝額貝和碩地方將準噶爾宰桑庫克新瑪木特通瑪木特悉行擒獲收厄魯特兵一百五十餘名我兵並未傷損一人此皆班第實心奮勉調遣合宜所致深屬可嘉班第著賞給世襲子爵補授正黃旗領侍衛內大臣仍賞銀一千兩薩喇爾感戴朕恩遇事奮勇效力此次皆由伊首先進取克成此功尤當加以殊恩薩喇爾亦著賞給世襲子爵補授正白旗領侍衛內大臣又諭曰此次辦理烏梁海及擒拏瑪木特諸事因䇿楞舒赫德有心畏縮阻繞軍務是以將伊等革職伊子俱交刑部監禁無知之徒尚有以幼兒為可憫者今班第到軍營以來遵朕諭㫖相度機宜奮勉進兵收獲烏梁海二千餘户詢知兩瑪木特居址奮勇衝寒而進不致一名漏綱俱被擒獲則二人從前畏縮無能種種悖謬之處愈覺可恨伊二人之罪俟班第審明具奏時再行定奪外䇿楞之子特英額著發往莊浪時勝額發往江寧特清額發往杭州特成額發往西安特松額發往青州舒赫德之子舒寧發往涼州舒安發往成都披甲效力贖罪甲戌宣諭中外用兵事宜上諭大學士曰準噶爾本元朝臣僕竄處西北恃其荒逺憑陵番部我皇祖聖祖仁皇帝三次親征肅清沙漠皇考世宗憲皇帝時䇿妄阿喇布坦父子濟惡仍肆跳梁是用命將出師聲罪致討及朕嗣統當皇考降㫖撤兵之後而噶爾丹䇿零遵守定界遣使請安求通貿易朕特加恩俯准以示懷柔逮噶爾丹䇿零物故其子䇿妄多爾濟那木扎爾為孽兄喇嘛達爾扎所殺而喇嘛達爾扎復為達瓦齊所弒在喇嘛達爾扎雖承緒不正尚屬噶爾丹䇿零之子至達瓦齊則篡竊亂臣耳乃今年夏間遣使來京仍請赴藏熬茶靦然以噶爾丹䇿零自處試思堂堂大清中外一統而夷部亂臣妄思視同與國此其逆天悖理為何如耶上年都爾伯特台吉䇿凌䇿凌烏巴什等率衆來降今秋輝特台吉阿睦爾撒納等又舉部內附斯均窮蹙來歸之人朕為天下共主兼覆並載既無拒而不納之理而喀爾喀內地俾此輩數萬衆仰食聚處將來滋生蕃庶亦豈久安善䇿朕於達瓦齊初無興師問罪之意而事㑹所至揆之理勢實有不得不從長經理者昔皇考初議撤兵籌畫尚在未定豫䝉召同果毅親王等及軍機大臣咨度再三並諭以此時不罷兵則成功尚未可期此時若速罷又恐後人以為隳已勞之功彼時豫議以當罷為請聖意乃定二十年來邊圉晏然甲兵不試固朕初心即䇿凌等始至時朕尚無意及此奈達瓦齊衆叛親離叩關踵至此皆上蒼默佑有不期然而然者我滿洲舊俗尚義急公一聞用兵無論老壯咸以不得與為耻承平日久習於晏安擐甲執兵衝鋒陷陳不免視為畏途然以應行之事值可乘之時而牽於浮論坐失機宜朕亦斷斷不肯出此也從前䇿楞舒赫德辦理北路軍務乖張怯懦種種不合皆由存畏難之見思以退縮自全是以重治其罪今班第奉命前往奮勇果斷旬月之間收獲鳥梁海數千户口牲畜甚多又將準噶爾宰桑庫克新瑪木特通瑪木特悉行擒獲又得户口牲畜無算使䇿楞舒赫德於七八月間即能如此其成功豈不更為迅速亦必有不僅止於此者班第薩喇爾已俱授為領侍衛內大臣並各賞給世襲子爵以為大臣實心任事者勸䇿楞舒赫德應得之罪俟班第議奏到日另行降㫖其在京諸子及嵗者俱發往各省駐防披甲當差朕辦理政務信賞必罰一秉至公毫無成見亦並不為悠悠之論所奪特將此番用兵始末及在事諸臣功罪宣示中外知之十一月丁丑命侍郎吳達善查看自京至哈密臺站事務上諭大學士曰明年派往西路官兵經行臺站關係緊要已令各督撫派委司道大員於本省専司其事但自京抵哈密路經七十餘站必得大臣經理届期著派侍郎吳達善往來查看以専責成己卯命續來投誠之台吉阿卜逹什歸阿睦爾撒納部內居住上諭軍機大臣曰據班第等奏稱同兩瑪木特來歸之克爾努特台吉阿卜達什原同伊弟巴圖爾帶領户口前來因被哈薩克錫喇人等搶虜暫居扎哈沁地方今因擒獲瑪木特前來歸誠等語阿卜達什原與阿睦爾撒納等同來投順因馬力疲乏不前中途又被劫掠今既輸誠欵附亦當加恩著傳諭班第酌賞阿卜達什縀匹並照扎薩克台吉職銜辦給行糧牲畜歸於阿睦爾撒納部內一并居住癸未命寬免䇿楞舒赫德等治罪仍留軍營效力上諭軍機大臣曰䇿楞舒赫德俱係身受重恩之人乃自到軍營以來畏懦退縮辦事乖謬朕原降諭㫖令班第取具伊二人供詞奏到日再行治罪今覽班第奏摺伊二人自認重罪俯首無辭若論軍法當即在軍營正法示衆但朕念其平日差遣奮勉在內廷行走有年著格外施恩免其正法仍留軍前效力贖罪至於明嵗大兵進征之時䇿楞舒赫德俱不必同往所有糧餉事務著派永貴溫福隨同辦理丁亥新降輝特台吉阿睦爾撒納等入覲於熱河避暑山莊賜宴賞賚有差戊子命加輝特台吉阿睦爾撒納等封號上諭大學士曰輝特台吉阿睦爾撒納都爾伯特台吉訥默庫和碩特台吉班珠爾等皆準噶爾渠帥嚮慕德化率領二萬餘衆傾心來歸甚屬可嘉應施恩賞給封號以示懷柔至意阿睦爾撒納封為親王訥默庫班珠爾封為郡王都爾伯特台吉剛多爾濟巴圖博羅特輝特台吉扎木參齊木庫爾封為貝勒都爾伯特台吉布圖克森額爾德尼羅壘雲丹輝特台吉德濟特普爾普克什克封為貝子輝特台吉根敦扎卜固木扎卜都爾伯特台吉布顔特古斯孟克博羅特和碩特台吉納噶查封為公都爾伯特台吉烏巴什伯勒克輝特台吉伊什克什克特封為頭等台吉均授為扎薩克管轄所部人户其如何編次旗分佐領補授官職之處著該部照例辦理阿睦爾撒納等受朕恩育務將各該屬人等慎加約束教養勉供厥職安分謀生爾等果能仰副朕心遵循訓㫖則永沐朕恩於無既矣慎之毋怠己丑命陜甘兩省出征官兵預行支給亷餉上諭大學士曰劉統勳奏請將陜甘兩省出征滿漢官兵明年秋季應得養亷月餉移於夏季起程之前支領著照所請准其預行支給以裕戎行新降厄魯特台吉阿卜達什請在軍前效力許之辛卯命安插隨同巴朗潛逃之沙拜等上諭軍機大臣曰據班第奏收服扎哈沁人內查出隨同巴郎潛逃之沙拜等二十五名已咨送納穆扎爾令同䇿凌等查明辦理沙拜等既已投誠又同巴郎潛逃情殊可惡亦不必查問即著押解來京發往廣東福建炎熱地方安插壬辰命侍衛圖倫楚帶同新降宰桑察達克領兵追捕逃人巴朗上諭軍機大臣曰逃人巴朗所在地方詢問新降宰桑察達克據稱離我前者進兵之地甚近若未避去給兵五百情願前往擒拏巴郎於進兵時未必不逺避今我兵已回必仍回至原地著派侍衛圖倫楚帶回察達克馳驛前往由軍營揀派兵丁急速前進務期擒獲巴朗以彰國法著傳諭班第等就近選派精兵五百名多給馬匹駝隻再派瑪木特屬下兵二百名預為整備俟圖倫楚察達克到日即行帶領起程命收服扎哈沁人等不必遷移內地居住上諭軍機大臣曰班第等奏請將收服之扎哈沁人等遷至內地扎卜堪庫克嶺等處居住此事斷不可行伊等如此辦理者特慮扎哈沁人內有存二心之人潛行逃竄又慮噶勒雜特哈薩克錫喇兵來搶奪之故此皆未審事之機宜所慮殊屬過當我兵未收服烏梁海扎哈沁之前或恐新降人等逃往送信理宜防範今䇿凌阿睦爾撒納俱已來降又將烏梁海扎哈沁人等收服準夷全部早有見聞不但一二不足信之人逃往原不足惜即使泄漏信息彼知我收其屬部明年兩路進兵大加征𠞰不過愈加驚怯耳更有何慮若恐其遣兵搶奪即達瓦齊發兵前來若人數不多我兵以逸待勞儘堪𠞰滅即能以大力搶回扎哈沁不過如我未收扎哈沁而已於我未為傷損而轉可以試看達瓦齊之力量明年易於進兵今方欲辦理準夷若將投誠之人均如此遷居內地明年進大兵時收服各部又將何以辦理乎著班第等將扎哈沁人等仍令居住齊拉罕地方斷不必移至內地庚子訓飭劉統勳鄂昌等上諭軍機大臣曰劉統勳等奏酌帶賞需一摺內稱準噶爾頭目如果有交納軍器實心向化者應酌豫賞賚等語所奏非是準夷投誠人衆所帶軍器若令其一一交納則是激以使反拒之使不來既阻其向化之心復啓其疑二之漸焉有如此辦理之法若果應行奬賞則當其率衆歸誠朕自格外加恩如近日北路之阿睦爾撒納等來降何嘗不厚加寵錫如以其投降交納軍器即行議賞則是以幣賄誘之來降幾似利其所有而為之矣此從前嶽鍾琪等辦理錯繆豈可復踵前弊劉統勳原係漢人軍務非所諳練鄂昌外任年久乃亦漸染緑營惡習為此陳奏甚屬不合著飭行十二月丁未命釋放擒獲噶勒雜特包沁人等定邊左副將軍班第奏言參贊大臣薩喇爾隊內擒獲準噶爾噶勒雜特包沁人等一百五十餘人臣等遵㫖賞給口糧牲畜令參贊大臣努三曉諭釋放噶勒雜特包沁人等叩謝天恩告稱我等原係被虜之人今䝉大皇帝格外隆恩放歸回時遍告衆人情願同來歸順隨派人加意照看放出卡倫奏入報聞戊申頒發將軍班第等印信上諭大學士曰班第著給與定北將軍印信其現有定邊左副將軍印信著給與阿睦爾撒納永常著給與定西將軍印信其新鑄定邊右副將軍印信著給與薩喇爾癸丑定北將軍班第等奏報安插烏梁海及扎哈沁人等事宜班第等奏言臣等派扎薩克一等台吉三都卜多爾濟等照看新收烏梁海遷移居住共計新收烏梁海四百四十五户一千六百七十八口據三都卜多爾濟文稱於十一月初一日行至特斯鄂衣渾等處游牧交於和托輝特貝勒青滚雜卜旗內照看居住之台吉班扎喇克察等用心照看令住於特斯鄂衣渾等處其新收扎哈沁人等共六百二十二户二千三百五口亦參贊大臣努三照看安插奏入報聞甲寅命議敘收服烏梁海等軍營效力人員先是奉㫖此次收服烏梁海等效力行走之王公台吉大臣官員兵丁等著將軍班第查明請㫖議敘其派出之察哈爾喀爾喀和托輝特兵丁亦著班第等酌量賞賜尋班第等議奏得㫖著賞給班珠爾銀一千兩扎木參齊木庫爾各五百兩德濟特普爾普各三百兩其餘小台吉等各賞給一百兩其厄魯特宰桑察哈爾總管喀爾喀和托輝特台吉等俱分别賞給縀匹銀兩有差復奉㫖加青滚雜卜郡王品級車木楚克扎布貝勒品級䇿布登扎布貝子品級阿敏道副都統品級烏爾登努三喀爾喀公恭格敦丹等俱從優議敘丙辰喀爾喀郡王桑寨多爾濟請在軍前效力許之丁巳定北將軍班第赴京陛見命額駙色布騰巴爾珠爾前赴軍營㑹同阿睦爾撒納辦理事務甲子命劉統勳等籌辦馬匹軍糧事宜上諭軍機大臣曰現議明嵗大兵進𠞰之前於二月下旬先遣精鋭五六千人輕騎前往略地第思兵行馬匹最關緊要現在採買餵養及各營馬匹內臕分壯健足供馳騁者共有若干可否得二萬之數再駝隻臕壯者可得若干著傳諭劉統勳令其密速查明即行馳奏至軍糧一項前令該督暫貯安西一帶以進𠞰之期尚逺而哈密防兵恐不足恃也今既尅期進𠞰亦著陸續速行運赴軍營以備支給裹帶之用並命總督鄂容安馳赴西路協同劉統勳等公同辦理乙丑命減派西路領兵緑營官員上諭軍機大臣曰西路領兵大員前經派出豆斌等四人今緑營兵已經裁減統領無需多員總兵李中楷著停其派往其副將以下各員應隨兵數減撤者亦著一併減撤定議出征滿洲䝉古各項兵丁畫一辦給口糧事宜定北將軍班第等遵㫖將出征滿洲䝉古各項兵丁應給口糧酌議畫一辦理具奏得㫖軍機大臣議奏尋議班第等查核從前廪給之數較今給與察哈爾之項大略相仿惟喀爾喀和托輝特之兵因去游牧近比從前較少今應俟明年各路調兵前來無論滿洲䝉古索倫巴爾虎喀爾喀厄魯特俱一例按照定例給與廪給令其携帶炒米炒麵牛羊乾肉並鹽菜銀兩其初到軍營守候之時亦照定例每兵一名每月支給二十日米一斗六升六合羊一隻鹽菜銀一兩五錢至明年進兵時止議給兩月乾糧少覺不足現在於二月內先遣哨探兵前往應令其帶四月乾糧以資口食其現在軍營之察哈爾兵每月應給羊三隻查軍營米石甚裕應裁去二隻每月給二十日米羊一隻喀爾喀兵仍支給羊價銀二兩一錢其聲援之喀爾喀兵丁既不進𠞰仍給羊價銀七錢俱應如班第所奏行並行文西路將軍等亦照此畫一辦理奏入上從之庚午命寬免出征察哈爾兵丁應賠馬匹上諭軍機大臣曰察哈爾出征兵丁倒斃馬匹甚多理應查明著落賠補今據薩喇爾奏稱察哈爾此次辦理烏梁海擒拏瑪木特等事往來行走奮勉效力著有勞績若喀爾喀去伊游牧甚近行走尚易且虜掠生畜內不無暗行偷竊以抵倒斃之項其察哈爾離伊游牧甚逺虜掠牲畜不敢絲毫隱匿且倒斃俱屬實情著將察哈爾應行賠補馬匹施恩寬免後不得援以為例辛未定議各路官兵起程日期軍機大臣奏言臣等原議派往西路之京城滿洲兵定於明年正月十五日以前起程其索倫巴爾虎哲里木等兵俱隨後接續起程發往北路之京城滿洲兵定於明年二月初起程其黑龍江兵亦隨後接續起程兹據管理順天府府尹劉綸等文稱索倫巴爾虎兵於明年正月初間即到京城且現議先遣哨探兵前往臣等酌議索倫巴爾虎頭隊兵五百名即於正月初三日起程每間二日起行一隊其派往西路之京城滿洲兵及哲里木兵共二千分作四隊俱接索倫巴爾虎兵之後起程前往派往北路之京城滿洲兵一千名黑龍江兵二千名分作六隊自二月初三日起至十八日止亦間兩日一隊陸續起程其在張家口預備分給北路官兵馬駝事務現止達松阿一人不敷辦理請再派大臣一員前往奏入得㫖張家口備辦馬駝事務著派副都統鄂實前往餘依議速行癸酉定北將軍班第疏奏大兵進𠞰事宜班第奏言本月十五日臣自烏里雅蘇台軍營起程行至推河見阿睦爾撒納將軍營應辦事宜悉行曉示并將明年二月間往額爾齊斯等處種地兵丁事宜與之商酌據阿睦爾撒納云明春往額爾齊斯種地應先遣兵一萬占據地方種地牧馬探聽信息觀其形勢如易於進取即進和博克等處居住分種地人一半帶往彼處種地續遣兵二萬在後跟隨乘勢即可前進當準噶爾馬畜疲乏之際不能抗拒易於成功倘俟夏秋進兵彼處馬畜壯健牛乳充足成功稍難臣告以現在派出征𠞰之兵已到軍營及附近調取可以如期而至者僅六千有餘其索倫察哈爾等兵俱定於四月內方到馬匹乾糧等項亦不能一時備辦量準噶爾伎倆已窮衆心已叛即率兵數千號稱數萬亦無不可且如近日擒拏瑪木特時不過二三千人彼即驚惶無措可見明年進兵自屬易於成功據阿睦爾撒納云各路所調之兵一時既不能齊集但先領兵一萬帶往種地察看情形如易於進取則乘機而行否則駐額爾齊斯地方牧馬以俟後隊然畢竟後隊之兵可以接續乘機進取更為妥協再額爾齊斯等處地方原係都爾伯特巴玊特等耕種之地取用何處水泉伊等深知應令䇿凌䇿凌孟克屬下派宰桑一員種地人各五十名將兵丁一同帶往教以耕種臣等公同商議種地兵丁應先遣往一萬名其後隊續進之兵二萬名亦即隨後整頓遣往方為有益現在察哈爾喀爾喀厄魯特兵六千餘名及喀爾喀聲援兵內調取一二千名再請於喀爾喀王公等自請帶往效力之兵酌量帶往既無庸官為辦理而一萬之數亦已具足奏入報聞平定準噶爾方略正編卷四
