  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_093-1a, image: WYG0358/WYG0358-0642a.png}
body:
  text: 乾隆二十二年夏四月己卯命郎中三寶前往烏里雅蘇台軍營辦理糧餉事務調內閣學士阿思哈回京供職辛巳命奬賞擒獲輝特賊人德濟特克什克等之烏梁海內大臣察達克等上諭軍機大臣曰輝特賊人德濟特克什克等懼罪逃竄經官兵分道擒拏俱已弋獲察達克感戴朕恩奮勇效力深堪嘉豫前已授為內大臣著加恩將伊子塔斯呼勒補授藍翎侍衛並賞緞六端茶葉二十封圖布愼赤倫烘郭等亦各著有勞績如有未經賞翎者準其戴翎並各賞緞五端茶葉十五封扎薩克台吉齊巴克扎卜著賞給公品級頭等台吉德勒克丕勒索倫佐領瓦濟爾等俱著賞給孔雀翎以示奬勵其首告策卜登多爾濟潛通阿逆之厄魯特尼瑪根敦扎卜及遣赴軍營報信之阿齊俟伊等到京酌量加恩所有尼瑪根敦扎卜阿齊等親屬戶口俱著編入察哈爾旗分安插哈達哈阿桂前因疏縱首賊飭部分别議處今既經擒獲著加恩寬免參贊大臣哈達哈等疏奏解送厄魯特尼瑪赴京哈達哈等奏言厄魯特尼瑪原係阿睦爾撒納之兄沙克都爾宰桑因阿逆謀害沙克都爾尼瑪逃避伊犂上年參贊大臣富德進兵時因其熟悉哈薩克地方帶往嚮導與其子們都行走甚勤是以令歸入策卜登多爾濟遊牧居住此次首告策卜登多爾濟潛通阿逆之事尼瑪根敦扎卜等公同商議遣阿齊赴軍營報知臣等倉猝帶兵尼瑪被擒聲訴緣由始行釋放是以將伊妻孥等五十一名存留並將尼瑪同策卜登多爾濟等解送京師以備質對奏入報聞壬午諭參贊大臣唐喀祿等嚴緝阿逆蹤迹上諭軍機大臣曰昨哈達哈等奏策卜登多爾濟等遣人潛通阿逆約期逃竄阿逆聞知未必不親身迎赴現在唐喀祿車木楚克扎布等領兵前往沿途務期加意緝訪一遇賊蹤立即擒拏並著傳諭哈達哈嚴飭各卡倫派兵巡緝再策卜登多爾濟等遣往之人自必回至遊牧務即弋獲解京倘任其脫逃大有關係哈達哈等務宜詳愼辦理甲申命授都統巴祿副都統哈寧阿為參贊大臣上諭軍機大臣曰昨經降旨兩路大兵𠞰滅賊黨後將軍成袞扎布副將軍兆惠參贊大臣舒赫德等俱著回京其定邊右副將軍印務交雅爾哈善管理現在巴祿哈寧阿俱赴行在面聆指示著仍回至軍營授為參贊大臣協同雅爾哈善辦事戊子諭定邊將軍成袞扎布等會兵擊賊事宜上諭軍機大臣曰副將軍兆惠奏據巴圖魯侍衛竒徹布等拏獲賊人詢知哈薩克錫喇巴雅爾等由額爾齊斯逃向伊犂等語賊人等若徑赴哈薩克則追擒尚需時日今逃入伊犂不日應即遇大兵掩襲朕意一路由朱爾都斯一路由闥勒竒前往至伊犂附近地方會合一處擒𠞰甚易著傳諭成袞扎布兆惠等現在兩路大兵約於何地會合務期籌畫妥協迅速辦理參贊大臣阿桂疏奏赴烏里雅蘇台辦事日期阿桂奏言臣前奉諭旨令赴烏里雅蘇台協同署將軍策布登扎布辦理事務因有擒拏輝特賊人之事經臣奏請會同參贊大臣哈達哈辦理今賊人德濟特克什克等俱經拏獲臣即遵旨由科卜多前赴烏里雅蘇台辦事奏入報聞己丑定邊右副將軍兆惠等疏奏扎那噶爾布襲殺噶爾藏多爾濟情形兆惠等奏言四月初八日臣等領兵至呼圖畢遇從前坐臺之察哈爾鄂達木稟稱本月初一日尼瑪攜帶羊酒慫恿扎那噶爾布殺死噶爾藏多爾濟及其親屬人等聞扎那噶爾布即往博羅塔拉坐台吉床又聞衆喇嘛云尼瑪又欲謀害扎那噶爾布往迎阿睦爾撒納令其管理準噶爾地方現在扎那噶爾布自安濟哈雅起行未久等語看來賊人逃竄未久尚未知大兵前來之信迅速追擒不難弋獲但大兵一近賊尾賊必潰散應先派兵數百名繞出前途邀截夾攻方不虞其漏網隨行文哨探隊內參贊大臣富德等豫為堵截續於初九日至哈齊克地方據參贊大臣富德咨稱初七日總管端濟布等先至瑪納斯地方生擒得木齊鄂羅斯並收獲男女三百餘人馬駝牛羊約計二千有餘詢知扎那噶爾布移往博羅塔拉尼瑪移往朱爾都斯扎哈沁遊牧移往濟爾哈朗等語伏思賊人蹤迹現已偵探確實臣等惟有乘其內亂攻其不備奮力進𠞰以副皇上委任之至意奏入報聞諭定邊將軍成袞扎布籌辦回部及防範阿逆事宜上諭軍機大臣曰據兆惠奏扎那噶爾布遣人糾合回部為霍集占等所拒等語看來回人波羅泥都霍集占等原未附和厄魯特特徘徊觀望未即前來投順此時若仍遣五十六等帶領伊來使沙呢雅斯前往招撫如將阿敏道等送回則彼處情形皆可洞悉第波羅泥都等生性狡猾即使歸降亦不得仍居葉爾羌喀什噶爾等處著於吐魯番巴里坤二處酌量指給一地令其遷移稍有推托仍行拏解來京著傳諭成袞扎布等遵照辦理再阿逆一聞噶爾藏多爾濟被殺或脅從哈薩克人等乘機前來亦未可定伊若自投天網大兵相值正可立即掩獲或聞大兵已抵伊犂中途逃竄尤當豫為堵截如上年伊脫逃時經過之阿勒坦額默勒嶺及伊犂附近之闥勒竒一帶地方務須派兵加意堵禦成袞扎布等其悉心籌酌辦理庚寅諭定邊將軍成袞扎布等協擒阿逆事宜上諭軍機大臣曰兆惠富德等先後奏到阿逆與哈薩克不睦回至準噶爾搶掠扎那噶爾布遊牧富德帶兵追襲𠞰滅賊黨甚衆阿逆不敢迎敵望風而遁追至噶順地方遣兵豫堵逃入俄羅斯去路兆惠亦即領兵同追等語此次兆惠富德奮勇追捕俱協機宜但兆惠所奏整頓後隊兵丁先辦哈丹等遊牧事竣再同將軍成袞扎布併力辦理等語尚屬未協現在兩路分兵前進特為𠞰滅厄魯特賊衆若豫知阿逆前來則當并為一隊方合機宜今蒙上天眷佑使賊自投天網適遇大兵理應先擒首賊其他厄魯特等皆可從容辦理著即傳諭成袞扎布等兩路大兵剋期會合務躡阿逆逃竄縱迹併力擒獲並傳諭衆厄魯特等有能擒獻阿逆者不特寬宥其罪更當加以重賞反覆開導令伊等擒賊自效以贖前愆至阿逆逃竄之路不過哈薩克俄羅斯二處如逃入俄羅斯則自可申明成例向彼索取若哈薩克既與阿逆不睦將軍等領兵赴彼曉諭利害自必速為擒獻成袞扎布等遇此機會務宜奮勇辦理迅奏膚功五月辛卯朔命安插伯格里妻室屬人等於察哈爾上諭軍機大臣曰達什達瓦之弟伯格里妻室已係孀居無可依恃懇請移入內地情殊可憫著加恩準其攜帶屬人赴察哈爾正黃旗居住命議恤坐臺人員上諭軍機大臣曰昨據兆惠等奏稱上年托多克古爾圖二處坐臺人員在額卜圖地方遇賊戕害筆帖式二員等語此等人員雖非陳亡可比情亦可憫應酌量加恩著將軍成袞扎布等查明咨部照例議恤壬辰申諭參贊大臣唐喀祿等領兵擒賊事宜上諭軍機大臣曰昨兆惠具奏富德領兵擊敗阿逆現在追擒並派鄂博什帶兵二百名赴額爾齊斯納林郭勒等處擒𠞰阿逆存留之烏梁海等語現在唐喀祿等領兵赴額爾齊斯地方協同西路擒𠞰逆賊計唐喀祿等由北路抵額爾齊斯路途較近應在鄂博什未到之前領兵先赴從前不過因哈薩克錫喇尼瑪等逃竄至彼令唐喀祿等協力擒拏今阿逆自投天網復遇大兵擊敗無路奔竄或亦逃入額爾齊斯納林郭勒等處均未可定著即傳諭唐喀祿等迅速前往先將阿逆所留烏梁海等盡行𠞰滅仍加意偵探阿逆蹤迹奮勇堵截務期弋獲再上年辦理烏梁海時尚多脫逃此時有潛入俄羅斯及藏匿山谷者唐喀祿鄂博什等陸續到彼並將沿途所有烏梁海等悉力搜捕毋令脫逃甲午訓諭定邊右副將軍兆惠等上諭軍機大臣曰覽兆惠節次具奏伊並未前往擒拏阿逆惟責令富德一人實屬非是兆惠係領兵將軍即應隨富德哨探隊後奮勇前往賊人聞將軍親赴必加畏懼且可與富德併力協擒方為妥協阿逆情形已蹙正可乘此機會殱滅首惡至於其餘賊衆儘可從容辦理昨因兆惠有俟將軍成袞扎布大兵到日商同辦理之語已傳旨曉諭令其迅速前往毋致後期乃伊尚遷延未行即或尚有應行擒𠞰賊衆不過派一二人搜捕或移咨成袞扎布辦理俱屬可行且伊又移咨富德令留額爾登額端濟布二人更不可解從前擒拏阿逆時策楞未經親身接應玉保朕即重治其罪兆惠寧不知之耶著傳旨申飭並著傳諭成袞扎布舒赫德等此時伊等兩路大兵應已會合即多選兵丁馬匹速行接應富德務期擒拏首賊毋稍遲回觀望迅奏膚功乙未定邊將軍成袞扎布等疏奏遣員曉諭回人事宜成袞扎布等奏言從前奉旨遣往回城之五十六托倫泰等經臣等帶至軍營酌量遣往今於四月初五日領兵至阿勒輝河據沙喇斯宰桑三都克懇請隨營效力查沙喇斯瑪呼斯兩鄂拓克人衆並未從賊而三都克甚屬黽勉是以準其隨營所有遣往曉諭回人之員即令其從三都克等遊牧處起程赴庫車等處據三都克稟稱路徑甚便且請派人護送前往即於初六日令托倫泰五十六等帶領霍集占來使沙呢雅斯等前赴回城曉諭奏入報聞諭駐劄巴里坤辦事大臣阿里袞巡查臺站事宜上諭軍機大臣曰據阿里袞奏稱巴哈庫蘇臺站遇賊搶掠已遣員前往安設等語此等賊人非沙克都爾曼濟逃竄屬人即係附近之嗎哈沁等現在巴里坤無應辦事務即著阿里袞選派兵丁數百名往來巡查搜捕臺站自可肅清俟雅爾哈善哈寧阿等到日交與伊等辦理阿里袞仍回至巴里坤辦理事務丙申命遷移都爾伯特汗策凌等遊牧於和通呼爾哈淖爾地方上諭軍機大臣曰哈達哈等奏稱都爾伯特汗策凌等懇請移遊牧於和通呼爾哈淖爾等語前因策凌等生計未能充裕曾賞給籽種並令赴烏里雅蘇台支領口糧三月以示體恤今請移住和通呼爾哈淖爾遊牧著即照所請行策凌烏巴什如願同往居住或就近在科卜多布延圖遊牧亦從其便伊等遷移後已逾耕種之期前次所賞籽種著即作口糧賞給如尚需接濟即於科卜多等處存貯糧餉內酌量賞給命免治逆賊青滾雜卜幼子巴里等罪上諭軍機大臣曰據策布登扎布等遣員押解逆賊青滾雜卜幼子巴里及伊媳二人來京伊等皆係逆賊親屬律應正法第念青滾雜卜祖母原封貝勒博貝之妻巴勒津年逾八旬孤苦無依博貝亦曾著勞績不忍令其絶嗣著加恩將巴里等免其正法仍著策布登扎布傳諭巴勒津如情願赴京即將伊孫及孫媳等交伊同住以示格外優恤之意戊戌諭定邊將軍成袞扎布等安插厄魯特投誠效力人等上諭軍機大臣曰據成袞扎布等奏烏魯特宰桑錫克錫爾格屬人等稟稱錫克錫爾格及巴圖爾烏巴什等知阿逆現在博羅塔拉擬即領兵擒獻大兵亦即迅速前進等語成袞扎布等聞錫克錫爾格等有擒賊自效情形即日領兵前進甚合機宜逆賊窮蹙已極官兵到彼自可立即擒獲若俟錫克錫爾格等擒賊來獻則伊等係效力之人應行加恩不便一體辦理但亦不得仍歸原地方居住俱著遷至內地安插以杜後患即三都克亦並未從賊今復在軍營效力俟事竣後亦令伊等屬人遷入內地或在通肯呼裕爾或在察哈爾酌量安插其老幼人等不必悉令遷移著同內地派往駐劄兵丁同住酌量授總管職銜一二員約束毋庸照從前留各鄂拓克舊名及補放宰桑等職銜成袞扎布等即遵照辦理命奬賞藍翎伍山赴西路軍營上諭軍機大臣曰奬賞藍翎伍山熟悉準噶爾情形著賞銀五十兩馳驛前往西路軍營交將軍成袞扎布差委效力壬寅諭定邊將軍成袞扎布等沿途𠞰賊事宜上諭軍機大臣曰昨據成袞扎布奏稱巴圖爾烏巴什等欲擒阿逆呈獻今據兆惠奏巴圖爾烏巴什自稱係噶爾丹策零之壻帶領集賽人等前往伊犂等語前後所奏情節不同著將兆惠摺録寄成袞扎布閲看伊等兩路大兵自當會合即確探阿逆逃竄處所奮勇擒拏毋致疏縱巴圖爾烏巴什既前往伊犂必與大兵相遇成衮扎布即詳察情形辦理不得因其有擒賊自效之言輒行寬縱如果擒獻阿逆即遵照昨降諭旨令其遷移內地斟酌辦理再兆惠摺內稱扎那噶爾布等煽惑克勒特烏魯特各鄂拓克令尾隨大兵之後搶掠臺站等語克勒特烏魯特等俱在朱爾都斯一帶遊牧並著成袞扎布就近發兵先行𠞰滅定邊右副將軍兆惠等疏奏擒𠞰賊人鄂勒錐等兆惠等奏言據副都統鄂博什報稱四月二十一日領兵至喀喇烏蘇遇庫圖齊訥爾宰桑原任散秩大臣鄂勒錐等帶領三十餘戶大兵交戰斬賊一百二十餘人鄂勒錐及伊妻子俱經擒獲旋因鄂勒錐受傷身死呈獻首級臣查驗屬實奏入報聞駐劄巴里坤辦事大臣阿里袞等疏奏吐魯番屯種情形阿里袞等奏言吐魯番屯種事宜臣等酌派副將閻相師經理今據報稱該處所種大小米二種小米約於四月中旬耕種大米約於五月初旬耕種現在自四月初九日至二十三日已種小米二千三百四十畝此後再行接種大米又據定邊將軍成袞扎布等將新附回人沙呼里伯克托克托等留於吐魯番種地亦請給發籽種令其耕種臣即飭交哈密辦糧官員照數運往奏入報聞癸卯命定邊將軍成袞扎布等遣員曉諭左右哈薩克上諭軍機大臣曰昨據兆惠奏阿逆窮竄情形自可計日就俘惟左右哈薩克地方應豫行遣人曉諭已降旨令成袞扎布等遣員赴阿布賚處開示利害令其擒獻三等侍衛布袞藍翎明嘉薩爾熟悉彼處情形著馳驛前往軍營交與成袞扎布等選派侍衛數員帶領前往阿布賚有欲圖阿逆之意此時未必再行逃往其右部哈薩克特栁克或尚容留阿逆亦未可定第遣員徑赴右部哈薩克恐伊等墮入賊計飾辭容隱著布袞等先赴阿布賚遊牧明白曉諭即令阿布賚遣人同往右部俾知阿逆反覆無常斷難容留致貽後悔仍諭以天朝威德如果擒獻自當格外加恩一面帶兵前往索取成袞扎布等務宜妥協辦理又兆惠奏稱喀喇沁鄂勒錐之子敦多克戕殺伊父同土爾扈特舍楞遷往庫克烏蘇喀喇塔拉等語敦多克情罪可惡大兵到彼務即拏解來京毋得任其脫諭駐劄巴里坤辦事大臣阿里袞等籌辦厄魯特賊衆事宜上諭軍機大臣曰阿里袞等奏稱投至巴里坤之厄魯特孟克濟等六名即帶至奎蘇地方正法等語厄魯特等反覆狡詐飾詞投順旋即生變是以降旨令阿里袞等嚴行辦理毋事姑息第奎蘇地方離巴里坤甚近現在止辦理數人尚屬可行倘遇大隊賊衆即在彼處正法保無一二逃竄之人泄漏其事賊衆勢必畏懼不前殊未妥協著傳諭阿里袞等嗣後如有此等投至賊人或由軍營解到之厄魯特等俱委員解送至嘉峪關內再行分别辦理沿途仍飭委員等小心防範毋致脫逃亦不得任其泄漏丙午定邊將軍成袞扎布等疏奏𠞰滅烏魯特宰桑錫克錫爾格等成袞扎布等奏言臣等遣烏魯特得木齊濟木巴等傳宰桑錫克錫爾格前來詎錫克錫爾格將濟木巴等看守臣等即派兵三百名交總管溫布侍衛老格等往擒共殺烏魯特等六十餘人俘獲八十餘人駝馬牛羊甚多復曉諭濟木巴等擒獻錫克錫爾格隨據濟木巴及孟克濟爾噶爾羅卜寨巴顔哈什哈等四人殺死錫克錫爾格呈獻首級驗明屬實臣等復遣侍衛哈清阿將錫克錫爾格母妻幼子及屬人等俱行正法查詢烏魯特等惟錫克錫爾格帶兵往迎阿逆因此抗拒其餘尚未從賊至得木齊濟木巴孟克濟爾噶爾甚屬奮勉請授濟木巴為總管孟克濟爾噶爾為副總管其應帶往軍營者酌量帶往奏入上諭軍機大臣曰宰桑錫克錫爾格已為其屬人所殺成袞扎布等即將得木齊濟木巴等分别授為總管副總管尚屬妥協惟是厄魯特等生性凶殘互相戕賊斷不可少事姑息前命將軍等進𠞰各鄂拓克時務將賊衆𠞰滅其餘老幼人等暫行安撫酌量擇其人尚可信者授為總管副總管以資約束不得照從前留各鄂拓克舊名仍授為宰桑收楞額等名目屢次降旨甚明今成袞扎布等所奏原不過一時暫為權宜事竣仍當分别辦理即如錫克錫爾格詭稱帶兵擒獻阿逆乃反與阿逆同謀情罪可惡今雖為其屬人所殺而濟木巴等又安能保其不生他變成袞扎布等務宜加意防範稍有可疑即行正法至現在軍營之三都克令其回至遊牧辦理亦妥仍須留心體察果否實心效力毋墮姦計署理定邊左副將軍印務策布登扎布等疏奏拏解擅離臺站之阿扎喇等來京策布登扎布等奏言從前擅離臺站人等奉旨解京治罪查伊勒巴爾和碩臺站喀爾喀巴特瑪等七人烏蘭烏蘇阿克他斯臺站巴爾什貴等九人均應拏解今據貝勒旺布多爾濟旗內查出阿扎拉一名郡王品級車木楚克扎布旗內查出巴爾什貴信敦孟克根克濟爾噶爾共六名臣即派員解送赴京餘俟陸續拏獲再行解送再聽從逆賊青滾雜卜擅離卡倫之巴爾達納達木巴伊達瑪等一併解送京師治罪奏入報聞署理定邊左副將軍印務策布登扎布等疏奏遴選公米什克管理都爾伯特遊牧事務策布登扎布等奏言臣等遵旨令派喀爾喀扎薩克一員管理都爾伯特遊牧事務查扎薩克公米什克人甚歷練應請派往管理其所管喀爾喀臺站事務請交與公達什管理奏入報聞丁未定邊將軍成袞扎布等疏奏回部情形成袞扎布等奏言臣等帶兵至袞昭哈辦理克勒特烏魯特遊牧四月二十七日據差往葉爾羌等處之五十六托倫泰報稱我等至瑪呼斯沙喇斯等遊牧易換馬駝欲往庫爾勒城沙喇斯辦事得木齊根丕勒等呈報兩和卓木背叛將差往之副都統及兵丁百人俱行殺害等語我等不信其言因起程至海都之拜甡圖住宿有庫爾勒回人等告稱現在葉爾羌等處回人俱叛殺害官兵我等係伯克托克托屬人感激大皇帝天恩故來告知斷不可前去等語雖與根丕勒等所報相合未可遽信為實隨於沙喇斯等遊牧派兵往布古爾等處捉生詢問再行呈報等因併將回人薩替阿克薩噶等送至軍營臣等詢問薩替阿克薩噶據供兩和卓木將副都統阿敏道等一百餘人在庫車城看守今年三月間有庫車城伯克呼岱巴爾氐伯克呢雅斯聞兩和卓木欲害官兵暗行通信阿敏道等遂步行脫出殺回人三十餘兩和卓木即遣三百人追及阿敏道等盡行殺害今聚衆二千人欲拒大兵其通信之呼岱巴爾氐亦俱被殺等語臣等伏思兩和卓木若果殺害官兵固屬罪無可逭即拘留不遣亦當𠞰滅但臣等現於伊犂特克斯等處辦理厄魯特等不能即往回部俟厄魯特辦定時再行進𠞰似屬有益查庫車城與沙喇斯等遊牧相近沙喇斯散秩大臣三都克現隨軍營行走頗為效力臣等擬將三都克遣回遊牧令五十六托倫泰等暫行同住探取回部信息再兩和卓木現已背叛則遣來之沙呢雅斯不可致令脫逃亦交與五十六等嚴加防守奏入上諭軍機大臣曰成袞扎布等奏稱聞回人霍集占等擾亂戕害副都統阿敏道俟大兵至伊犂即前往回城𠞰滅等語所奏非是此次進兵專為𠞰滅厄魯特賊衆其回部事宜俟蕩平伊犂之後原可從容辦理至於擒拏阿逆原議定明歲再行進兵豈料逆賊自投羅網由哈薩克逃回適遇大兵擊敗率衆數十人奔竄此正機會可乘時不宜失現在兩路大兵應已會合即當極力搜捕明正典刑其餘賊衆尚可徐徐辦理何論回人縱回人妄逞鴟張俟平定厄魯特後再行辦理亦有何難成袞扎布等所奏殊不識事體輕重若以阿逆逃竄之路正係兆惠等進兵地方竟委其事於兆惠而伊等以專辦回部自任尤屬非是現在富德等領兵追擒阿逆兆惠逡巡未進朕尚屢次切責若兩路大兵互分彼此更豈朕簡用之意成袞扎布幼習軍旅自能奮勇爭先此等意見必出自舒赫德伊赴軍營時朕訓誡至再至三何得遲疑觀望一至於是且現在阿逆情形與上年迥不相同伊前與阿布賚交結甚深今已成嫌隙勢不能再行逃往至右部哈薩克特栁克之容留與否尚在未定且上年策楞等帶兵追擒並未深入伊料此次大兵亦復如是必潛身於險僻處所茍延殘喘俟大兵撤回仍復竄入勢所必然此時惟確探逆賊逃竄處所派富德等帶領精兵多給馬匹務期徹底搜捕擒拏首惡以彰國憲其餘賊衆不必即行辦理至霍集占使人沙呢雅斯已派員送還回部如恐其漏泄軍情則即行正法其五十六托倫泰等亦即追回毋庸遣至回部成袞扎布等即遵照妥協辦理定邊右副將軍兆惠等疏奏拏解賊人巴桑等送京治罪兆惠等奏言據侍衛竒徹布報稱領兵至古爾班呼斯坦地方拏獲宰桑巴桑得木齊普爾普達瓦蘇珠克圖等嚴訊阿逆逃竄處所知往巴爾達穆特遊牧地方即移知富德會兵前往擒拏並將普爾普達瓦帶往軍營作為嚮導解巴桑蘇珠克圖二人至營查巴桑前歲在伊犂擾亂後蒙恩寬宥授為內大臣蘇珠克圖係哈薩克錫喇得木齊曾授為二等侍衛今復背叛從賊俱係要犯臣即派員押赴巴里坤轉送京師治罪奏入報聞己酉命奬賞都爾伯特汗策凌等上諭軍機大臣曰哈達哈等奏稱都爾伯特汗策凌等因哈薩克錫喇遣得木齊巴圖濟爾噶爾至伊遊牧即行拏解軍營等語策凌等諸事誠心效順甚屬可嘉今因哈薩克錫喇等背叛即將所遣屬人拏送軍營深明大義著加恩賞給策凌等緞匹荷包以示優眷原任千總策卜登正法上諭軍機大臣曰千總策卜登派往臺站辦事當厄魯特擾亂之時叛入噶爾藏多爾濟遊牧改易厄魯特服色甘心從賊情罪可惡著即凌遲處死參贊大臣納穆扎爾疏奏前赴布延圖辦事日期納穆扎爾奏言臣于五月初七日抵烏里雅蘇台遵旨前往布延圖地方駐劄辦事更替參贊大臣哈達哈回至烏里雅蘇台辦事奏入報聞庚戌拏獲擅離卡倫賊人達什等正法上諭軍機大臣曰據索諾木喇卜坦等奏協理台吉諾爾津扎卜阿喇卜坦等領兵至瑪塔斯瑪塔干將擅離卡倫賊人達什等拏獲請旨正法等語達什等乃派守卡倫之人擅自逃回復肆行搶掠情罪可惡著將現在拏獲之三十七人即行正法並行文喀爾喀王桑寨多爾濟等轉行傳諭各卡倫人等俾知警戒協理台吉諾爾津扎卜阿喇卜坦領兵擒拏甚屬奮勉著加恩賞給緞匹兵丁等每名各賞銀三兩以示鼓勵平定準噶爾方略正編卷三十九
