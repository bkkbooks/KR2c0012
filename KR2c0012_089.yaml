body:
  text: 乾隆二十一年冬十二月戊寅定邊左副將軍成衮扎布奏報擒獲逆賊青滚雜卜上諭大學士曰據成衮扎布等奏稱參贊大臣納穆扎爾帶兵追捕叛賊和托輝特青滚雜卜於十一月二十八日追至俄羅斯交界杭哈將噶斯地方擒獲現在派委官兵押解來京等語和托輝特青滚雜卜乃喀爾喀部落之人自其祖父以來世受本朝厚恩即此次用兵準噶爾亦専為保護伊等遊牧久逺之計伊既奉派出師自應倍加奮勉力圖報效乃與阿逆私相交結竟自軍營逃歸伊部將所有卡倫臺站悉行撤回復敢散布流言多方引誘朕早洞鑒伊一人負恩背叛不過自取誅滅其衆喀爾喀等必不致為其煽惑但此等逆賊若不即行擒拏伊得竄身逺揚致稽顯戮亦何以彰國憲而昭炯成邪是以即命親王成衮扎布仍為副將軍董衆討罪而親王成衮扎布等奉命進𠞰實心協力迅速奏功深屬可嘉親王成衮扎布著加恩賞給黃帶封伊子一人為世子以奬忠勤參贊大臣納穆扎爾帶兵追擒一聞逆賊所在疾馳前進立為掩獲不致脫甚為勇往出力著加恩封為一等伯世襲罔替其在事大臣官員及蒙古王公台吉等俱著交部從優議敘又諭喀爾喀王公等曰前因逆賊青滚雜卜負恩叛逆散布流言爾喀爾喀王公等間有擅回遊牧者經朕降旨宣諭爾等旋知悔悟各奉職守不致墮賊術中今逆賊已經擒獲其前此黨同附賊人等應分别治罪以彰國法第念喀爾喀王公等為國家臣僕百餘年誤聽浮言致干罪戾並非有心附賊俱著施恩免其查究嗣後益宜仰體朕恩湔滌前愆約束所屬各安本業永受太平之福倘再罹法網朕亦不能曲為寬宥勉之命額外郎中蘇章阿管理達什達瓦所屬遊牧事務上諭軍機大臣曰富森經理達什達瓦遊牧事務俱未妥協著調往烏里雅蘇台辦理糧餉事務蘇章阿著授為額外郎中遇缺即補前往達什達瓦所屬遊牧地方駐劄辧理己卯命參贊大臣納穆扎爾查辦車臣汗部落事務上諭軍機大臣曰青滚雜卜已經擒獲軍營無應辦之事所有車臣汗部落屬人齊木齊格特等及該部落肆竊為匪人衆伊等與俄羅斯接壤易生事端前已派瑚圖靈阿多爾濟等前往查辦著再派納穆扎爾前往會同巴扎爾什第德木楚克等即將此項人等嚴行辦理並著納穆扎爾帶侍衛四五員或於現在所撤索倫巴爾虎兵內調取五百名或照前旨調呼倫貝爾兵丁五百名聽其酌量納穆扎爾到日留濟福同辦事務瑚圖靈阿多爾濟俱著回京辦事辛巳命安西提督傅魁領兵應援額敏和卓上諭軍機大臣曰據黃廷桂奏稱額敏和卓遣子素賚滿至哈密請兵救援伊保護遊牧與賊相拒靜候大兵前往等語額敏和卓拒賊固守甚可嘉豫著加恩封授貝子伊子素賚滿著賞給公品級以示奬勵現在傅魁已抵哈密馬得勝亦陸續領兵至彼即著傅魁選兵五百名帶同素賚滿馳赴額敏和卓遊牧應援務將莽噶里克設法擒拏倘兵力不足即著額敏和卓帶領屬人同傅魁回至哈密俟大兵至彼再行辧理命奬賞喀爾喀貝勒車木楚克扎布等上諭軍機大臣曰此次擒拏青滚雜卜喀爾喀貝勒車木楚克扎布奮勇效力其和托輝特貝勒旺布多爾濟公多爾濟策登率領屬人奮力追捕俱屬可嘉貝勒車木楚克扎布著加恩晉封郡王品級旺布多爾濟多爾濟策登俱賞戴雙眼孔雀翎以示優眷仍俟成衮扎布造册到日交部議敘壬午申諭安西提督傅魁領兵速進事宜上諭軍機大臣曰昨降旨令傅魁帶兵赴援額敏和卓並與額敏和卓密商辧理莽噶里克事宜今據雅爾哈善奏稱莽噶里克發兵二百名往助額敏和卓等語又與昨黃廷桂所奏情形不同但素賚滿來時並未言及莽噶里克助兵之事或因伊子白和卓未遣歸巢故有此舉實則首鼠兩端難以遽信著傳諭傅魁俟見額敏和卓時密與酌量情形如莽噶里克易於擒拏仍遵前旨辦理即助兵屬實亦係因救子起見且伊於和起被困時情罪可惡不得少為寬假若果有效順之心尚可暫為羈縻俟大兵至彼再為辦理惟聽額敏和卓相機酌定傅魁接到此旨迅速前往毋得遲誤致失機宜命侍衛順德訥領兵先赴巴里坤上諭軍機大臣曰內大臣博爾奔察赴烏里雅蘇台㨂選索倫兵丁前往西路進兵著先派兵五百名交與侍衛順德訥即速馳赴巴里坤聽候調遣癸未命副都統唐喀祿等分駐地方督辦事務上諭軍機大臣曰北路軍營大臣應分駐地方辧理事務科卜多地方著唐喀祿阿桂駐劄辦事並著郡王品級車木楚克扎布同往辦理舒明阿蘭泰著隨同副將軍成衮扎布在烏里雅蘇台軍營辦事恩擢驛站效力人員上諭軍機大臣曰據唐喀祿奏稱驛站委署主事哈琳等行走奮勉請旨加恩等語哈琳著授為主事遇缺即補滿泰著授為委署主事來京引見再降諭旨阿玉錫著賞給孔雀翎俟有參領缺出即行補授甲申申諭將軍大臣等前後疏縱逆賊罪狀上諭大學士曰逆賊阿睦爾撒納脫逃策楞玉保等畏縮推諉原欲拏至京師審明情節明正其罪乃俱於途次遇賊被害今扎拉豐阿到京伊原係定邉右副將軍續改授參贊與策楞玉保同事因將策楞玉保致脫阿逆各情節面加詢問據伊奏稱玉保前進時即慮及不能拏獲阿逆向策楞商問策楞令伊先行隨後即領兵策應後知阿逆已經脫彼時營內只餘四五日兵糧馬匹亦少諒力不能追及是以回至伊犂等語玉保係領兵追捕之參贊大臣理宜竭力奮勇務期必獲乃於未去之先預存退縮觀望之意其不肯勇往前進已可槩見至策楞身為將軍當聞阿逆兔脫時自宜兼程追捕豈有反置之不問復回伊犂之理其意蓋以追及阿逆而不能成擒獲罪滋大若僅不能追及罪尚可諉其居心不良朕早已洞鑒又以拏獲額林沁為足以委卸其罪不復奮勇前進即以額林沁而論伊係阿逆黨羽年已衰邁設欲用彼力以擒阿逆則當用計安慰如無可用之處應即行正法收其遊牧以濟兵力外此更無他策而策楞等心懷怯懦不敢犯其遊牧復將伊誘至軍營詐稱擒獲實屬無恥再烏爾登乃領隊大臣與策楞玉保同在軍營經朕召伊來京面詰據稱聞阿逆脫逃之信即請發兵五百追擒玉保策楞俱以伊妄希僥幸置之不理後伊隨同玉保前進復請兵追拏玉保止發兵五十名伊同額爾登額追至庫爾默圖嶺僅餘二十八人所騎駝隻又俱疲乏而阿逆於伊起行之日已經過嶺竄入哈薩克境內等語詢之扎拉豐阿據稱屬實核其情由阿睦爾撒納初時之得以逺揚者皆由策楞玉保等存心不良罔顧國事互相推諉所致至於此次兩路進兵哈薩克追擒阿逆當分兵各進時尚知奮勉逮至兩路會合每至抵牾更由伊等心存畛域不以國事為重以致辧理一切俱失機宜種種悖繆不勝枚舉又核計其由哈薩拉克至伊什勒椿集地方進兵時行走至五十日逮至撤回則又甚速是追擒逆賊反從容緩進如彼撤兵回日又迅速遄行如此所謂勤勞王事者固如是乎至於兩路大兵屢敗哈薩克之後㨂選兵馬前往擒拏阿逆時北路派出喀爾喀郡王策布登扎布西路派出阿里衮彼時達爾黨阿哈達哈扎拉豐阿策楞等俱在一處皆係將軍乃四人內曾無一人同往即或於參贊內派出亦當派諳練蒙古情形通曉蒙古言語之富德唐喀祿等若阿里衮不惟於蒙古地方不能諳練且不通曉蒙古言語乃令其與策布登扎布前往是誠何心是明知阿逆業已逺揚斷不能擒獲故令阿里衮一往以圖了事夫以朕所信用之將軍大臣乃如此行事朕實憤悶再達爾黨阿聞被虜臺兵逃出告知阿逆在前伊並不竭力追擒及遇哈薩克兵時隊內忽有人來告阿逆現在此處俟阿布賚到時即行擒獻之語達爾黨阿即信而不疑不即進兵久之賊衆分散始覺其詐追趕已屬無及設當遣人來告之時不為所愚速行進擊阿逆未必不可就縛何竟受人欺誆至於此極乎至哈達哈在後隊守護輜重營內報稱有賊人形迹哈達哈即遣巴圖魯侍衛奇徹布往追據奇徹布報稱已見賊形即催大隊兵丁前進而哈達哈並不星速前往遲久始進設彼時哈達哈能帶兵追及一同攻戰擒獲阿布賚亦可與哈薩克换取阿逆此又坐失事機之一端也在達爾黨阿哈達哈等兩次攻戰時朕亦非苛責其必能擒獲阿布賚與阿逆也但機有可乘而伊等才力不逮存心不堅以致屢失機宜朕實惜之又伊等奏請在哈薩拉克地方過冬明年派兵一萬及馬匹數萬駝隻數千等語伊等寧不知如許馬駝不能一時即赴縱使遄行趲運而經厯長途能保其必不疲瘦而故為此謬奏邪蓋欲表伊等並無撤兵之意第以所需軍行駝馬不能運送不得已而撤兵與伊等毫無干涉耳伊等俱係朕加恩授為將軍參贊之人揆其伎倆即能和𠂻共濟事之成否尚在未定似此不以國事為要懷私岐視各占地步又安望其奏功策楞玉保罪孽滿盈致干天譴達爾黨阿哈達哈等此次逺赴哈薩克地方亦屬勤苦使伊等協力辦理即不能擒獲阿逆朕亦必酌量加恩乃各挾已私深負委任兹以其行走之勞抵其應得之罪不另加譴責已屬朕格外施恩將此通行曉諭中外知之丙戌定邊左副將軍成衮扎布疏奏安插厄魯特人等事宜成衮扎布等奏言臣奉諭旨因阿逆未經拏獲所有來投厄魯特等未便遣回原處致滋擾動仰見睿慮周詳但此等人既不便盡遣至察哈爾安插若留在烏里雅蘇台當差則又未識道路不知法紀亦屬無益請於察罕廋爾巴顔布拉克地方令其耕種派員管轄毋許滋事如蒙俞允懇賞給籽種二百石分給伊等以廣皇仁奏入上諭軍機大臣曰成衮扎布辦理安插厄魯特事宜甚屬妥協第念此等人窮蹙來投是以加恩安插果安靜無事則應給與籽種令其耕種自給倘稍有可疑著成衮扎布即行𠞰滅或賞給喀爾喀等為奴毋得姑息滋事命免治貝勒策卜登罪上諭軍機大臣曰據成衮扎布奏貝勒策卜登從前擅回遊牧及擒賊青滚雜卜時又托病未往效力甚屬可惡請革去貝勒其應襲公爵亦不準伊子承襲等語策卜登係喀爾喀舊人年亦老邁前曾著有勞績若按律治罪有所不忍著加恩免其拏解來京治罪并免其革去貝勒至伊子齊旺多爾濟或尚可造就仍著賞給公爵以觀後效丁亥命派哈密貝子玉素富屬人應援額敏和卓上諭軍機大臣曰雅爾哈善等奏稱哈密貝子玉素富遵諭遣人寄信額敏和卓令其相機辧理等語玉素富甚屬可嘉賞縀四端以示鼓勵朕前命傅魁領兵五百名前往額敏和卓遊牧如兵尚不足著即派玉素富屬人二三百名同往伊等既通語言且識路徑較緑旗兵丁有益著雅爾哈善等遵旨辦理己丑命授烏爾登三等侍衛仍著在乾清門行走恩擢軍營效力侍衛濟塞布等上諭軍機大臣曰二等侍衛濟塞布等此次效力軍營甚屬奮勇著加恩授濟塞布頭等侍衛賞給清巴圖魯名號奎瑪岱璊綽爾圖老格俱著授為三等侍衛奎瑪岱賞給伊德爾巴圖魯名號璊綽爾圖賞給固濟爾巴圖魯名號老格賞給博克巴圖魯名號並各賞銀一百兩海林泰占丕納瑪格俱著授為三等侍衛賞銀三十兩命議敘遇賊奮勇副前鋒章京旺保祿等上諭軍機大臣曰雅爾哈善等奏副前鋒章京旺保祿及護軍校艮音泰海福等解送軍營口糧回至哈布塔克拜塔克地方遇賊五百餘人斬馘二十餘人突圍而回等語旺保祿等遇賊奮勇甚屬可嘉著交部議敘並著查明此次陳亡被傷人員交部一體議恤旺保祿即馳赴來京詢問情形命免治圖謝圖汗雅木丕勒多爾濟等罪上諭軍機大臣曰圖謝圖汗雅木丕勒多爾濟當衆喀爾喀擾亂之時既不督令扎薩克等效力伊子旺親多爾濟復帶兵擅回遊牧均應按律治罪第念雅木丕勒多爾濟年已衰邁前已將盟長副將軍革退著加恩仍留王爵旺親多爾濟著革去台吉發往軍營效力庚寅申諭辦理莽噶里克事宜上諭軍機大臣曰據黃廷桂奏額敏和卓呈稱莽噶里克送到噶爾藏多爾濟印文令與呢嗎等同赴羅克倫商謀叛逆莽噶里克並未前往等語此不過因伊子白和卓未回謬為恭順之詞未可輕信已令傅魁領兵會同額敏和卓密商辦理仍著傳諭傅魁俟見莽噶里克時即諭知伊子現在肅州並未加罪伊或親赴肅州即行拏解來京候朕辦理至噶爾藏多爾濟印文俟奏到時查勘圖記或係扎那噶爾布等揑造或實係噶爾藏多爾濟謀為不軌立可查驗彼時另行降旨辛卯定邉左副將軍成衮扎布等疏奏安插和托輝特部衆事宜成衮扎布等奏言臣奉諭旨著將青滚雜卜及策登扎卜屬人賞給臣及臣弟策布登扎布暨桑寨多爾濟等管轄臣等不勝感激查和托輝特所屬有葉克和托輝特巴罕和托輝特明噶特哈栁沁斯奢集努特等六鄂拓克並烏梁海十六鄂拓克此等皆屬無知聽從逆賊後聞大兵將至即時解散尚知感戴皇恩倘蒙施恩仍歸入和托輝特四旗之內自必益加感戴查旺布多爾濟係博貝嫡嗣公多爾濟策登亦係博貝之姪伊等並未附和逆賊又和托輝特台吉達什彭楚克亦係博貝之姪遣人報知逆賊背叛情由尤屬誠心效力請將和托輝特人等交與伊等管轄至策登扎卜往投逆賊時其台吉諾爾布率衆至烏里雅蘇台報知又在各臺站供應馬駝尚屬黽勉請將諾爾布授為扎薩克台吉管轄策登扎卜屬人如此辦理則伊等不致分離而旺布多爾濟等愈感聖恩自必嚴加約束奏入上諭軍機大臣曰從前命將青滚雜卜等屬人賞給成衮扎布策布登扎布等管轄因伊等辧理諸務俱合機宜用示奬賞今據成衮扎布奏請交與旺布多爾濟多爾濟策登達什彭楚克等編設佐領補授扎薩克嚴加約束一切安插事宜更屬妥協著照所奏辦理壬辰駐劄巴里坤辦事大臣雅爾哈善等疏奏擒𠞰沙克都爾曼濟情形雅爾哈善等奏言臣等遵旨詳察沙克都爾曼濟情形見其向內地設立卡倫又屢遣人探聽巴里坤兵馬情形其屬人普爾普首伊與扎那噶爾布等潛通信息並令伊前赴巴里坤託病不至種種可疑顯有叛逆形迹隨於十二月十六日派兵至伊遊牧擒𠞰共斬賊衆四千餘人以杜後患其赴京支領俸餉之摩羅等尚未扺巴里坤已檄知沿途地方查拏所有博爾和津等應解往肅州或應解京又巴里坤地方尚有布庫努特得木齊多爾濟所屬户口二百餘人應否送至察哈爾安插俱候諭旨遵行奏入上諭軍機大臣曰雅爾哈善等察出沙克都爾曼濟背叛情形即領兵前往擒𠞰辦理甚屬奮往雅爾哈善前已補授內大臣此次著同李繩武錫特庫一併交部照軍功議敘丑達遇有總兵缺出即用其副將員缺即著參將閻相師補授其餘效力官員查明一體交部議敘博爾和津及摩羅等俱著解送來京多爾濟等户口俱照所奏送往察哈爾安插駐劄巴里坤辦事大臣雅爾哈善等疏奏遣兵應援額敏和卓情形雅爾哈善等奏言據額敏和卓之子素賚滿告知莽噶里克等謀叛情形亟應發兵應援復詳詢素賚滿知莽噶里克琿齊二人遊牧與魯克察克毗連兵力無多可以即時擒𠞰惟巴雅爾遊牧地方路徑稍險應先擒滅莽噶里克等再行辧理臣即派副將丑達參將閻相師等領兵一千名於十二月二十四日起程前往魯克察克一切與額敏和卓相機辦理奏入上諭軍機大臣曰雅爾哈善等據素賚滿告知賊人情形即派兵前往應援額敏和卓所辦甚合機宜昨傳諭令傅魁帶兵五百名前往今丑達等即帶兵一千名赴援更屬有益其傅魁所領兵丁應否仍行遣往聽雅爾哈善等酌量辦理丑達等會同額敏和卓辦理莽噶里克之後即令駐劄吐魯番防守毋庸進𠞰巴雅爾倘巴雅爾領兵前來即行奮力擒拏至此項兵丁大半皆係緑旗究之不宜深入即使擒獲巴雅爾亦令伊等駐劄過冬一切事宜仍俟明春大兵前往辦理乾隆二十二年春正月甲午命成衮扎布為定邉將軍上諭軍機大臣曰現在齊集大兵前赴巴里坤定期三月內進𠞰將軍重任甚難其人成衮扎布熟悉蒙古事務且深感朕恩誠心報效著授為定邉將軍即帶領索倫兵丁二三百名由阿濟必濟前往巴里坤並著賞給整裝銀五千兩其子弟內有願帶往者聽其奏聞帶往北路事務亦屬緊要伊弟策布登扎布才情幹練著暫行署理定邉左副將軍印務此次進兵非初定伊犂可比現在賊勢窮蹙擒𠞰甚易成衮扎布勤勞已久應示體恤俟進兵擒獲首惡之日即速來京陛見毋庸久駐行間一切善後事宜朕另派大臣等辦理舒赫德富德鄂實俱著授為參贊大臣色布騰巴爾珠爾阿里衮明瑞額爾登額及侍衛舒布圖鎧巴圖魯奇徹布等俱著在領隊大臣上行走命傳諭都爾伯特汗策凌等防守遊牧事宜上諭軍機大臣曰大兵由西路進𠞰哈薩克錫喇等勢窮力竭或逃往哈薩克亦未可定著傳諭都爾伯特汗策凌等及內大臣阿克巴集賽宰桑達什策凌各派兵防守遊牧並通哈薩克地方隘口嚴加堵禦倘遇賊人逃竄即行擒獻此特為保護伊等遊牧起見並非令其出兵會𠞰著副都統唐喀祿親往策凌等遊牧宣諭並派員明白曉諭達什策凌知之乙未諭添派兵丁駐劄科卜多上諭軍機大臣曰成衮扎布籌辦派兵防守各地方事宜俱屬妥協惟科卜多派兵五百名駐劄尚屬不敷彼處距阿爾台甚近各厄魯特等遊牧相離不逺著於控圭扎卜堪等處所駐兵丁內派出五百名共兵一千名駐劄科卜多以資彈壓現命策布登扎布署理定邉左副將軍印務即著策布登扎布遵照辦理丁酉恩擢軍前效力侍衛英額爾圖等上諭軍機大臣曰二等侍衛英額爾圖三等侍衛六格奉恩將軍松年前鋒校扎爾畢善虛銜藍翎春布禮等俱久在軍前效力英額爾圖著授為頭等侍衛六格著授為二等侍衛松年著授為護軍參領扎爾畢善春布禮俱著授為藍翎侍衛戊戌命侍衛圖倫楚等領兵先赴伊犂上諭軍機大臣曰據雅爾哈善奏稱有自伊犂前來之察哈爾阿什達等告稱聞阿巴噶斯等屬人及布庫努特扎哈沁人等與副將軍兆惠交戰賊衆力不能敵等語此信既確亟宜遣兵赴兆惠處應援昨雅爾哈善等奏派侍衛圖倫楚等帶兵八百名先往因兵數不多是以降旨停止仍令俟大兵齊集同進今據阿什達所稱不過窮蹙賊衆原易𠞰滅再得圖倫楚等領兵協助甚合機宜著即照雅爾哈善等前奏辦理毋庸停止內大臣博爾奔察等疏奏選派兵丁駝馬事宜博爾奔察等奏言臣等於十二月二十二日至烏里雅蘇台傳諭索倫副都統鄂博什等選派兵丁據稱現在所領兵丁酌量揀選尚不足二千名其派往擒拏青滚雜卜兵一千二百餘名正月初旬可到俟到時即照數派往其現經揀選兵丁已給與口糧器械即日啓行前赴巴里坤再軍營所有馬匹尚不敷用已商同普慶阿思哈等令親王得親扎卜遣員赴附近各部落揀選應用給豫價值令其即速解送奏入報聞己亥命授哈達哈為參贊大臣駐劄科卜多地方辦理事務諭綽羅斯汗噶爾藏多爾濟協擒逆賊事宜上諭噶爾藏多爾濟曰巴雅爾哈薩克錫喇及回人莽噶里克等負恩背叛莽噶里克等供稱與爾同謀朕知爾受恩深重必無從逆之事今據雅爾哈善等奏聞知爾於哈薩克錫喇等擾亂之前即遣人往諾爾布處轉告知將軍兆惠有身受國恩斷不從賊之言爾能深明大義輸誠報效深堪嘉尚已令爾從前來使固穆扎卜隨將軍大臣前往遣赴爾遊牧地方現在大兵前進擒拏巴雅爾哈薩克錫喇等爾能遣派所屬人等協助將軍大臣擒拏逆賊朕自加以厚恩並明白曉諭爾遊牧內人衆毋為逆賊煽惑自取罪戾勉之毋忽命額林泌多爾濟之兄根扎卜多爾濟承襲貝子上諭軍機大臣曰額林沁多爾濟貽悮軍務應革去王爵不準承襲第念其祖父舊勳著加恩將伊王爵降為貝子令伊兄根扎卜多爾濟承襲仍授為扎薩克庚子諭定邉將軍成衮扎布等軍營事宜軍機大臣等奏言臣等遵旨將現在進兵事宜悉心籌議恭請皇上訓示後録交臣舒赫德帶往巴里坤會同將軍成衮扎布妥協籌辦查軍行馬駝等項已屢次傳諭黃廷桂解送巴里坤將軍成衮扎布等抵巴里坤時所調北路索倫兵二千名及吉林察哈爾兵各一千名阿拉善兵五百名陸續可到以此兵力擒𠞰逆賊已足敷用但賊衆或在一處遊牧或散處額林哈畢爾噶等處尚應臨時確查辦理如同在一處遵旨令參贊大臣富德領隊大臣阿里衮先行哨探將軍成衮扎布統兵前進若散處各地方自應分兵進𠞰現在調兵共四千五百名更派巴里坤駐劄健鋭營兵丁及察哈爾兵五百名每路用兵二千五百名更屬有益副將軍兆惠現在領兵二千名俟與大兵會合時應令成衮扎布兆惠分為兩路帶同參贊大臣等併力進𠞰務期掃穴犂庭以靖邉疆兆惠處如有實心協力隨大兵擊賊之厄魯特等臨時查明將伊屬人作何安插之處會同成衮扎布奏明辦理再查各臺站從前兼派厄魯特等在臺差委此次進兵將在臺滋事各厄魯特盡行𠞰滅嗣後惟應派察喀爾或兼用緑旗兵丁在臺差委方為妥協又今春伊犂種地應派緑旗兵丁即令巴里坤現駐緑旗兵二千名隨同大兵前進既可以聫絡聲勢並一路照看臺站俟至種地地方即酌行存留秋收後運糧至大兵駐劄地方支給糧餉其厄魯特賊人𠞰滅後所餘老幼人等悉照從前安插無庸補放圖什墨勒扎爾呼齊及得木齊收楞額各員伊等所有馬駝盡行收取惟給與牛羊度日或派令索倫兵丁管轄編作旗分佐領至駐劄大兵應在額林哈畢爾噶安濟哈雅等處臨時相機辦理俾馬匹得以休息明年再往擒拏阿逆其各回部事宜酌量遣人亦於今年前往辦理奏入上諭曰所奏甚屬詳悉俱應如所議行第軍機須相時而動非可豫定惟在將軍大臣等和衷共濟奮勇成功兆惠領兵前來若與成衮扎布同路進兵辦理事宜俱應以成衮扎布為首倘需兩路進兵則兆惠専領前往哈寧阿永貴等俱著在參贊大臣上行走但此時籌辦情形兆惠等俱未深悉著鄂實會同兆惠辦理其兆惠所領兵丁已久在行間應添派兵一二千名交額爾登額率領隨同兆惠等進發至所議索倫兵丁前往新疆管轄厄魯特事宜毋論逺道遷移事屬未便且索倫素屬驍勇若與厄魯特聚處勢必梁其餘習將來漸不可用甚屬無益其厄魯特賊人餘衆應俱分賞緑旗兵丁其實力協助大兵擊賊之人仍加恩令其管轄所屬不必更設圖什墨勒扎爾呼齊等員酌量賞給總管品級至前此厄魯特等擅行搶掠臺站皆由派伊等同管臺站所致嗣後不必令伊等同在臺站當差應指定地方令其遊牧倘有潛入臺站地方之人即行查拏究治其辦理各回部事宜現在阿敏道尚在葉爾羌未回軍營著將軍等會同額敏和卓詳細商酌或應再遣員前往曉諭即派前次托倫泰五十六前往其波羅泥都霍集占二人看來波羅泥都尚屬恭順霍集占姦詐異常應留心防範相機辦理著將此旨抄寄成衮扎布務期與軍營大臣等同心共勉迅奏膚功恩擢軍營效力鄂里克塔等為侍衛上諭軍機大臣曰此次隨同達爾黨阿等進兵之鄂里克塔寧固禮滿柱永安畢拉爾海俱著授為三等侍衛鄂里克塔著賞給哈朗圭巴圖魯名號滿柱著賞給布哈巴圖魯名號每人仍賞銀一百兩辛丑諭駐劄巴里坤辦事大臣雅爾哈善等確詢副將軍兆惠情形上諭軍機大臣曰據雅爾哈善等奏稱遣往策應兆惠之參將邁斯漢回營擒獲叛賊得木齊納遜及厄魯特齊巴克默騰巴朗額色木拜等四人咸供兆惠現在被圍是以仍令圖倫楚等前往策應等語雅爾哈善等辦理甚合機宜唯是邁斯漢等領兵前往既經守備髙天喜𠞰殺噶勒雜特哈薩克錫喇遊牧人衆并收獲駝馬等物邁斯漢即應更换駝馬徑赴厄卜推齊爾噶朗等處迎接兆惠乃一聞被圍妄言即行退回殊屬懦怯著將邁斯漢革職其參將員缺即令奮勇效力之髙天喜升授至納遜供稱哈薩克錫喇於十一月十五日已圍將軍營盤之語看來竟屬子虛計和起與哈薩克錫喇交鋒乃十一月初七日之事曾未一旬伊何能即至彼處至巴朗所供尤屬荒唐著雅爾哈善再行嚴加刑訊務究實在情形一面奏聞一面即將納遜等正法壬寅命拏解莽噶里克逆黨阿舒爾瑪特等來京治罪上諭軍機大臣曰雅爾哈善等奏拏獲莽噶里克偵探信息回人阿舒爾瑪特并同來之三達色等語阿舒爾瑪特為莽噶里克偵探消息已屬可惡三達色身係滿洲乃亦隨從探信尤堪駭異著傳諭黃廷桂將阿舒爾瑪特三達色并莽噶里克之子白和卓即速解送來京治罪前已命傅魁帶兵會同額敏和卓辦理莽噶里克著再傳諭傅魁令其迅速辦理斷不得稍存姑息平定準噶爾方略正編卷三十五
