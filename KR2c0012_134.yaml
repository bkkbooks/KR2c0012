body:
  text: 乾隆二十四年冬十月朔戊寅恩諭緩徵陜西歉收各屬新舊錢糧上諭大學士曰陜省西安各府屬之咸陽等十州縣今夏得雨稍遲收成歉薄雖於例並不成災而民力不無竭蹶所有懐逺清澗米脂呉堡四縣本年應徵未完地丁錢糧草束及帯徵舊欠常平社倉穀石籽種等項俱著加恩緩至明年秋成後徵收咸陽醴泉同官韓城商州雒南六州縣新舊民欠錢糧倉穀緩至明年麥熟後徵收以紓民力其沿邊之膚施靖邊保塞安塞延長甘泉綏徳七州縣所有上年緩徵新舊錢糧倉穀例應本年徵收但該處連年收成未能豐稔應加意撫綏以資休養著再加恩將該州縣除本年照例徵收外其帯徵之錢糧倉穀再緩一年於明年麥熟秋成後分别帯徵示朕優加體恤之意該部遵諭速行諭内閣學士清馥等管解軍營馬匹上諭軍機大臣曰據楊應琚奏稱揀選軍營馬一萬匹陸續解交清馥轉送軍營等語從來楊應琚奏送頭起馬匹之時即諭清馥如尚未回抵巴里坤著五吉舒常等一同解送今此項馬匹已全數抵巴里坤著遵照前㫖加意䕶送務期妥協濟用陜甘總督楊應琚疏奏辦給回人棉種楊應琚奏庫車等處回人人素習耕織從前服屬準噶爾嵗納布疋後因荒亂相仍將棉子俱已食盡臣思布疋為民生日用之物將來伊犂駐防通商貿易正資調劑查陜省西安同州兩府俱有產棉之地每畝種子十觔可收淨花二十餘觔棉子一百二十餘觔請先以二十畝計算將棉子二百觔遇便解至庫車散給回人俾及時佈種來年即以所得分散各城二三年後可望種植日廣不獨回人衣被無窮即屯駐官兵亦得就近購買奏入報聞己卯命頒給阿克蘇大臣闗防及葉爾羌奏匣上諭軍機大臣曰舒赫徳奏伊前往葉爾羌辦事將欽差大臣闗防帶往其阿克蘇應請給以闗防至葉爾羌距内地甚逺奏報事件宜加慎密請給賞奏匣等語阿克蘇為回城要地已派阿桂駐劄辦事著該部賫送欽差大臣闗防一顆以昭信守其賞給葉爾羌奏匣亦照所請行授回人額色尹等爵秩有差上諭軍機大臣曰回人額爾克和卓額色尹鄂托蘭珠和卓瑪穆特俱係派噶木巴爾後裔著加恩封額色尹公爵授瑪穆特為札薩克頭等台吉䕶送伊等前來之奬賞藍翎克什克巴圖魯烏克什勒圖著授為藍翎侍衛與藍翎侍衛額勒濟圖俱賞銀五十兩庚辰命御前侍衛署副都統安泰䕶送軍營馬匹上諭軍機大臣曰䕶送軍營馬匹已派侍衛舒常蘇勒仍令清馥同往若清馥未回巴里坤則五吉在哈密㑹同行走但此次馬匹為數無多䕶送之員尚少此時安泰承審㕘案應已竣事著與伊等㑹合送至葉爾羌軍營命嚴懲疎脱嗎哈沁之官兵等上諭軍機大臣曰據清馥奏稱遣往搜捕嗎哈沁之都司張遇奇察哈爾驍騎校阿喇卜坦已於喀喇莽鼐探得賊蹤並未親行追襲但遣馬甲富海索倫馬甲噶勒保領兵八名前往伊等遇賊又未報知及張遇奇等聞信往追見有男婦四十餘人反被賊誑誘借給馬匹以致逃去請將張遇奇阿喇卜坦交部嚴加議處富海噶勒保重責百鞭等語清馥係領兵追賊之人既未親身前往又不將疎懈官兵從重辦理更屬姑息著𫝊㫖申飭至追𠞰賊人若非勇往直前則將來效尤成習各顧身命安望擒獲張遇奇阿喇卜坦俱著革職留軍營効力贖罪富海噶勒保著即正法示衆辛巳諭刑部侍郎永貴等奮勉捜捕嗎哈沁上諭軍機大臣曰據永貴奏稱捜捕嗎哈沁等至阿勒坦和碩山嶺雖有賊蹤計逃去已十餘日雪盛不能前進請俟來春選兵千餘名前往追襲等語初閱永貴等請罪之詞意謂又生一事及覽竟方知為山嶺雪盛撤兵暫回耳伊從前聞徳舒被害即請追賊復仇頗為勇往今半途而返甚屬無謂若謂雪大難行嗎哈沁等又豈能飛越耶伊等馬力稍乏亦事之所有但必待來年且將貽人姍笑况朕所諭來年大兵凱旋仍嚴捜逸賊並非指此等戕害徳舒之賊亟應誅戮以紓衆憤者當此初冬雪積未厚尚可前行賊若越嶺必藏匿烏魯木齊額林哈畢爾噶等處自無庸於庫車等處捜索此時永貴應與努三㑹合既有善於嚮導之人且賊衆見久無追兵未免弛懈猝然相遇勢可擒獲著𫝊諭永貴即於阿克蘇兵内選精鋭者三百名帶至烏魯木齊現在解送軍營馬千餘匹若途中相遇即每人選給三匹餘者仍送行在是馬匹既足而存貯糧石又可接濟務期盡𠞰賊衆為徳舒復仇辦理既竣即同努三來京著納世通留庫車辦事壬午申飭捜捕嗎哈沁不力之内閣學士清馥上諭軍機大臣曰清馥奏稱詢問厄魯特嚮導鄂齊爾知喀喇莽鼐諾顔鄂博之西地名額什頗饒水草間有嗎哈沁賊人斗齊等在彼藏匿因派兵四十名委索倫營總濟彥保等前往追捕伊領兵三十名由拜塔克之北尋覔賊蹤策應濟彥保等語昨因清馥並未親身追賊而辦理官兵又復姑息業經𫝊㫖申飭伊一聞官兵疎脱賊人之信即當迅往追襲乃視若尋常仍委之濟彥保等甚屬怯懦不堪從前伊在巴里坤辦事意其尚可造就不謂一經追賊即畏縮如此本應即行治罪姑從寛免伊雖奉到解送馬匹之㫖諒亦未能趲赴著不必前往惟専辦𠞰滅嗎哈沁若仍前玩忽以致賊人逃脱朕必重治其罪伊若指稱辦送馬匹遂爾轉回即係自取罪戾併𫝊諭五吉安泰將應送馬匹徑行承辦不必候清馥信息乙酉定邊左副將軍成衮扎布等疏奏遷移烏梁海游牧成衮扎布奏言臣等前奏據烏梁海内大臣察達克等因現在游牧之科卜多等處不產貂䑕請將伊等游牧展至阿爾台額爾齊斯等處經軍機大臣議覆以額爾齊斯等處若係都爾伯特舊游牧應請㫖𫝊諭索羅木衮布策凌烏巴什如伊等情願前往即可遷移將現駐之烏蘭古木即賞給察達克等或不願再遷則額爾齊斯等處與其閒曠何如給與烏梁海等居住臣等遵㫖遣副管旗章京莫尼扎卜前往都爾伯特游牧曉示據親王策凌烏巴什等告稱察達克所請游牧係烏梁海舊地與我等游牧隔逺今烏蘭古木地畝甚肥羊隻孶生亦盛久住可以饒足情願仍前居住不行遷移等語臣等伏思都爾伯特部落既不願遷移請照察達克等所指自博爾集奇蘭一帶展至阿爾台山陽令其約束所部游牧可也奏入上從之丁亥諭定邊將軍兆惠等辦理降回各事宜上諭軍機大臣曰據兆惠等奏稱齊凌扎卜鄂對阿什黙特送到降回二千六百餘户八千三百餘口大半係伯徳爾格塔里雅沁之人擬於此内酌量人數多寡分派大小頭目逓相約束移至吐魯番庫爾勒哈喇沙爾托克三等處安插俟起程後兆惠即前往英噶薩爾又密奏阿什黙特與伯克霍集斯交好因加保薦又近日查給阿什黙特之回人百餘名口多擇富厚之家非盡係伊舊屬即霍集斯於補授葉爾羌頭目亦受餽送等語來降回人等除係霍集占逼脅同行外其烏沙克塔里雅沁伯徳爾格回人均不可信已屢諭兆惠等相機辦理至阿什黙特既與霍集斯交好俟軍務告竣即派令來京此外有附和霍集斯之人俱如此辦理此時尚宜慎密即有告發之人亦仍行安慰今逆酋等尚未授首兆惠不必往英噶薩爾仍駐劄葉爾羌辦事候富徳等信息諭䕶軍統領努三等追𠞰嗎哈沁事宜上諭軍機大臣曰努三等奏稱准清馥咨文隨派出察哈爾佐領裕木扎卜厄魯特嚮導䝉克津等領兵往喀喇莽鼐等處捜捕等語此等嗎哈沁誑誘官兵馬匹情罪可惡務必盡行𠞰滅著𫝊諭努三等此等賊人即窘廹來降仍應解送肅州正法伊從前所得降人如䝉克津等之奮勉効力則令其來京在上駟院行走其餘即賞給王大臣等不必安插舊地昨諭努三與永貴㑹合追𠞰戕害徳舒之嗎哈沁等著遵㫖奮勉辦理䕶軍統領努三等疏奏擒獲嗎哈沁及屯田收穫分數努三等奏言九月初十日派厄魯特藍翎侍衛巴桑等廵查昌吉羅克倫等處捜捕嗎哈沁據索倫領催署驍騎校噶滿泰等擒獲厄魯特巴彥夫婦及巴圖孟克等前來除巴圖孟克曽隨噶爾藏多爾濟入覲人頗誠實留充嚮導其餘人俱行正法至前次擒獲之訥克衣續奉諭㫖在烏魯木齊正法查訥克衣已於九月初四日解京應請在京辦理又䝉恩諭令臣努三兼辦屯田事務查烏魯木齊新舊屯田兵一千名舊兵除差遣外實屯田兵六百七十四名種地一萬五千一百餘畝收麥黍一萬二千二百四十餘石新兵二百名種地一千五百餘畝收麥黍二千二百四十餘石舊兵所種較上年加倍其收穫亦如之管理屯田之遊擊金梁頗屬妥協謹將大槩先行查奏奏入報聞諭定邊將軍兆惠等酌量頒給拔達克山勅諭上諭軍機大臣曰前因索取逆賊霍集占等曽勅諭拔達克山頭目素勒坦沙今思伊部落若深明利害應已呈獻渠魁故再降勅諭如拔達克山有呈獻之信即以此勅往諭或尚在游移仍將前勅頒發賜拔達克山素勒坦沙勅書奉天承運皇帝勅諭拔達克山素勒坦沙據將軍富徳等奏稱爾遵將軍大臣等𫝊檄攻圍逆賊霍集占波羅泥都俱經擒獲具見爾願為臣僕之心聞霍集占受傷身死波羅泥都尚在拘禁爾等以所奉經教不欲將派噶木巴爾後裔呈獻是以躊躇未决遣使前來軍營將軍大臣等復以逆賊等悖逆暴虐蔑棄經教大兵進𠞰降者接踵僅存餘孽竄入兩境我師惟恐騷擾尚行逺駐惟以游騎向爾約期索取若踰時不至即進兵捜捕詳加曉示節次奏報朕為天下共主内外一體俱加撫恤爾素勒坦沙慕思仁化朕已洞悉至霍集占等負恩背叛種種奸惡爾亦聞知將軍大臣再三遣使特體朕招擕懐逺之至意其務將霍集占兄弟俘馘以獻今因頒勅賜爾蟒緞四端俟逆賊等送到時朕必沛殊恩以酬誠悃爾其深思逺慮永荷無疆之福特諭諭定邊將軍兆惠等策應富徳事宜上諭軍機大臣曰前諭追索逆賊霍集占等若今年不能竣事兆惠即來京請訓昨據兆惠奏俟降回内移後即前徃英噶薩爾曽諭以不必急於起程仍在葉爾羌辦事但此時拔達克山若尚未有呈獻逆賊確信富徳等又從所駐之瓦罕移軍前駐則英噶薩爾亦須有策應之兵方可聲息相通兆惠即前徃駐劄以壯軍威如富徳酌量暫回葉爾羌則兆惠即遵前㫖來京途次辦理降回亦覺甚便俱著𫝊諭知之宣諭哈寧阿罪狀上諭軍機大臣曰用兵為國家要務賞罰必期明允為將軍者於一切軍務果能奮徃直前身親戰陣何事不可成就此内即稍有見識未到者朕亦必加曲諒若如雅爾哈善等在庫車圍困霍集占使伊等嚴加防守逆賊安能出走且早已竣事乃伊等並不親臨嚴飭轉似特開一路令其脫逃有此情理乎故將雅爾哈善拏問即行正法㕘贊大臣乃協同將軍辦事之人將軍思慮所未及㕘贊即應指陳若不見聽即應㕘奏哈寧阿為雅爾哈善之㕘贊解到時亦應正法但參贊職任較將軍究稍有間是以將伊擬斬監候揆之以理此次秋審哈寧阿即宜予勾因念伊父哈達哈現在軍前若有分外効力之處尚可稍從寛宥昨富徳等領兵至拔達克山交界遣使索取霍集占當遣額爾登額時達爾黨阿哈達哈豈不宜告請前徃與其遣額爾登額何如伊等一行之為愈哉況伊等皆獲罪之人朕加恩復用為侍衛遣徃効力不但當感激朕恩即伊自計亦當奮勉乃竟以侍衛自居與衆為伍不知愧恥實出意料之外此等大闗係處俱未計及哈寧阿豈尚可曲宥耶但朕念費英東扎爾固齊不忍將伊孫同衆犯棄市特加恩令哈寧阿自盡著曉諭哈達哈及軍營大臣官兵等知之壬辰諭䕶軍統領努三等㑹兵𠞰賊及陞賞管屯官兵上諭軍機大臣曰努三奏稱奉到㑹合永貴追𠞰嗎哈沁之諭㫖將所有官兵厄魯特兵内揀選十二人又新降之厄魯特䝉克津等十七人率領往迎永貴俟巴里坤馬匹到日永徳領所餘官兵六十餘人續行策應等語努三頗屬奮往但官兵為數無多前已諭永貴選阿克蘇兵三百名赴烏魯木齊途中遇解送軍營馬匹即揀選九百給與兵丁就近支領口糧往額林哈畢爾噶等處捜捕賊衆至永徳昨欲同努三前往已允其請但烏魯木齊乏人著仍駐劄辦事又所奏承辦屯田之遊擊金梁在軍營効力行走數年管屯二年辦理妥協等語金梁著授為㕘將賞戴孔雀翎以示鼔勵著努三𫝊諭將來伊若更知奮勉朕必加恩優叙訓飭喀爾喀副將軍策布登札布等追賊不力上諭軍機大臣曰據策布登札布奏稱八月十一日行至伊犁分兵捜捕嗎哈沁派㕘贊大臣齊努渾公品級多岳特領兵二百名往哈塔奇被賊盜馬三百餘匹追囘一百七十餘匹賊人選馬百餘匹向烏哈爾里克河上遊逃去又派扎薩克敦多卜多爾濟前往追捕齊努渾至哈什山遇見敦多卜多爾濟前至哈什河之額爾黙勒濟山嶺雪大迷蹤等語又奏稱齊努渾等令扎哈沁公扎木禪等追嗎哈沁賊蹤既過哈什向烏魯木齊西山應就近聽烏魯木齊大臣奏聞候㫖伊即從布勒噶齊戈壁經過庫隴癸河由巴顔珠爾克卞倫轉囘等語所奏殊未明晰齊努渾多岳特係專派捕賊之人反被賊盜去馬匹選其臕壯者逃去僅獲賊所棄剰者而囘甚屬疎懈著交部嚴加議處齊努渾人本平常因隨兆惠効力加恩賜號巴圖魯今被賊盜馬數百匹尚可謂之巴圖魯乎齊努渾著革去巴圖魯號此次若能𠞰賊尚可自贖否則重治其罪至齊努渾等係尋蹤追賊之人覽奏似在策布登扎布聞信遣人之後方抵哈什且䇿布登扎布身為將軍一聞此信並未親身前往仍遣此等無用之人伊從前若無効力之處必一併議處矣著傳諭申飭現在戕害徳舒之嗎哈沁深可憤恨策布登扎布若在伊犂即行捜捕如已轉囘即從去年舍楞等往俄羅斯之路過冬以便堵截就近支給口糧頃據成衮扎布奏因接濟口糧由巴顔珠爾克一路解牛一千二百頭計已收到伊等𠞰賊之時須訊問明白務期生得賊首奉到此㫖即行覆奏諭參贊大臣舒赫徳分隊安設卞倫上諭軍機大臣曰舒赫徳奏稱兆惠派副都統職銜阿定保領兵五百名馬二百匹給與兩月口糧由阿克蘇至庫車一帶尋蹤瞭望捜除隠匿賊匪請於事竣後將官兵分為兩隊一隊在賽里木拜等處之阿勒坦和碩要路安設卞倫一隊在阿克蘇之穆素爾要路安設卞倫守䕶臺站照看往來行走之人等語所辦甚是著阿定保等奮勉行走諭陜甘總督楊應琚照辦酌留公費名糧上諭軍機大臣曰楊應琚奏稱陜甘兩省酌留公費名糧除彌補各營公私借墊銀兩外尚餘存庫銀三十六萬八千餘兩等語從前酌定扣留此項銀兩原以通融調劑俾帑項不致久懸而兵丁亦免按名扣抵實為一舉兩得今自二十年辦理以來不特借墊清還更有餘剰可見行之確有成效著傳諭該督此時尚有應辦善後軍需酌扣公費名糧應仍照前辦章程妥協經理其存貯餘銀該督詳悉查明俟前項彌補全清將續辦解送馬匹及一切公務借墊等欵并將來有無應行協濟之項一一據實具奏到日候朕酌量加恩即於此項銀兩内動撥庶以奬勵急公於軍務轉輸兵丁生計均有裨益陜甘總督楊應琚疏奏軍營馬匹出闗日期楊應琚奏言臣查陜甘辦解軍營健馬萬匹分作三起第一起巴里坤留牧馬匹第二起河西滿漢各營朋餵馬匹第三起再將陜省各營朋餵馬匹凑解今十月初一初三等日侍衛舒常蘇勒過肅出闗初七初八等日侍衛兆君柱等三員同厄魯特司轡策塔爾等到肅以後尚有續到人員但有二三員先到巴里坤舒常等即可帶領行走至内地二起馬匹已於九月十六日出闗其陜甘馬匹又隨二起之後接續前往均可不致遲滯奏入報聞甲午命副都統齊努渾等仍隨副將軍策布登扎布追賊上諭軍機大臣曰據齊魯渾奏稱伊等同扎哈沁公扎木禪領兵百名追賊至阿爾齊圖覔得新踪扎木禪等先行在哈喇呼喇大山遇賊二十餘人據守正在交戰伊等亦皆趲到共𠞰賊二十人有二賊歩行逃去收囘被盜馬九十六匹扎木禪多岳特各囘游牧伊亦即轉囘等語昨策布登扎布叅奏到時朕諭以齊努渾等若仍不能𠞰賊收馬即重治其罪今幸藉扎木禪之力得以成功伊等亦何能為齊努渾多岳特雖經𠞰殺賊衆仍交部議處至伊等勦賊時理應訊明係何處賊人奏内並未聲明著遇便續奏再齊努渾係策布登扎布隊内參贊大臣今既有忝職任且參贊尚有烏爾登著革去參贊在領隊大臣上行走同多岳特仍隨䇿布登扎布領兵由去年舎楞等逃入俄羅斯之路堵截戕害徳舒之嗎哈沁來年應撤之時候㫖始囘扎木禪甚屬奮勉朕已洞鑒著策布登扎布𫝊㫖嘉奬仍賞緞四端以示鼓勵准其即囘游牧俱著𫝊諭知之命議處内閣學士清馥上諭軍機大臣曰據清馥奏稱行至蘇爾圖烏蘭與遣往追捕嗎哈沁之濟彥保相距三四日程途若再為前進往返又須十餘日恐悞送馬之期即轉囘巴里坤等語清馥與濟彥保相距數日何由得知顯係從前被賊誑誘今親往不能追捕必致獲罪因所遣有人遂以策應為名於途間逗遛觀望及得送馬之㫖即藉口轉囘殊屬取巧此與避賊何異甚屬不堪清馥所賞孔雀翎著摘去仍交部嚴加議處伊業已轉囘即同安泰五吉等解送馬匹俱傳諭知之乙未命原任副都統揚桑阿前往葉爾羌照富昌例交舒赫徳差遣委用丙申定邊將軍兆惠疏奏進兵索取逆賊情形兆惠奏言臣前偹口糧一千石以駝八百餘隻派總兵五福送往富徳軍營今富徳咨稱再遣使往拔達克山索取逆賊一靣進兵揚威將喀喇庫勒存留之兵調取協助共兵四千名應接濟口糧等語臣即於英噶薩爾貯備糧内再撥五百石派遊擊訥爾吉等送往又據副都統豐訥亨報稱廵查道路惟吉雅斯一帶嶺小雪微尚可行走將來官兵凱旋應行知㑹現在咨詢富徳囘兵道路飭令訥爾吉迎往奏入上諭軍機大臣曰昨富徳奏從瓦罕一路進兵索取逆賊曾諭兆惠往英噶薩爾策應若今嵗未能竣事富徳即回至葉爾羌辦事兆惠仍遵㫖來京此次遣使索取次第進兵料拔達克山必生畏懼佇聞凱奏以慰朕懐命查議新疆効力武職員缺上諭軍機大臣曰舒赫徳等奏稱内地遣往新疆運送什物官員多係外委千把未免呼應不靈請揀選副㕘遊守都司數員分發闢展哈喇沙爾庫車阿克蘇等處差遣委用再阿克蘇葉爾羌距哈密闢展更逺請於哈喇沙爾庫車各處額設馬駝牲隻以備通融更换等語揀發武職事屬可行但此等分發人員與内地之即可得缺不同若即帶内地職銜則緑旗營缺又復壅滯現交軍機大臣酌議著將舒赫徳奏摺録寄楊應琚查明甘肅營缺若干揀發新疆人等作何補用未得缺時或應酌給公費定議奏聞至闢展等處額設馬駝接濟於運務有裨將來官兵凱旋有帶囘馬匹及現在解送駝隻分留各處以備更换及來年有無購辦分撥俱著楊應琚籌議具奏命查陷賊偷生之官兵等正法上諭軍機大臣曰兆惠奏稱齊凌扎卜查出隨西安馬甲阿本泰之閒散都什格於康熙五十七年在噶斯被掠鑲紅旗滿洲䕶軍費雅訥等於雍正九年在和通呼爾哈被掠等語費雅訥都什格係滿洲世僕被賊掠去忍恥偷生及大兵進𠞰尚留戀妻室不行投囘情罪可惡著奉到此㫖即行正法將其家口充賞諭定原駐烏魯木齊辦事滿泰等情罪上諭軍機大臣曰安泰查審滿泰貪婪敗檢范時綬役兵漁利一案滿泰情罪確實已命於該處正法至范時綬家人郭義藉端營利伊先不知情所開店房只用官匠一名餘皆自僱并未派出兵丁范時綬係特差辦事之人理應潔己奉公乃營私求利即治以重罪亦所應得但較之滿泰尚可從末減著革職交與定長令其効力贖罪定長等原㕘全派兵丁之處亦未確實著交部察議戊戌申諭刑部侍郎永貴等酌定追𠞰嗎哈沁道路上諭軍機大臣曰永貴奏稱奉到令伊稍待努三㑹同追賊之㫖隨即起程在哈喇沙爾庫車一帶相候等語永貴前領兵至穆素爾山嶺因雪大難行今又候努三同往伊果親至其地目覩情形何妨改從他道所奏殊屬含混并其曽至穆素爾山嶺與否俱未可定矣永貴宜速行札商努三將道路酌定倘實在難行則仍遵續降諭㫖由烏魯木齊前往務期盡𠞰逸賊以紓衆憤諭御前侍衛署副都統安泰等照舊解送軍營馬匹上諭軍機大臣曰五吉等奏稱准兆惠等行文豫備凱旋官兵口糧羊隻是軍營現在需馬無多等語伊等以為撤兵在即則解馬一事可以從緩殊屬非是若軍營果不需馬朕必降㫖停止豈可預為揣摩著傳諭安泰五吉等仍遵節次諭㫖加意趲解馬匹或於中途得逆賊就俘確信即駐候朕㫖再行定奪命嚴訊庫車居住之陷賊兵丁上諭軍機大臣曰據徳文奏稱庫車有正黄旗䕶軍武善保之家人常夀肅州緑旗馬兵馬禄俱於和通呼爾哈被掠轉入回地常夀曽娶回婦生子等語伊等前為厄魯特等略賣俱忘本之人請解送肅州辦理等語常夀馬禄在回地二十餘年大兵收庫車時即應據實投回乃留戀不發顯有附和賊人情事著楊應琚嚴審具奏恩賞署防禦茂罕巴圖魯號署驍騎校塞卜騰藍翎上諭軍機大臣曰署防禦茂罕在軍營行走有年甚屬奮勉身被鳥鎗傷著加恩賜號呼爾察巴圖魯賞戴孔雀翎仍照例賞銀一百兩署驍騎校塞卜騰亦屬奮勉著賞戴藍翎仍賞銀五十兩各囘該旗休息己亥諭㕘贊大臣巴禄查奏署驍騎校塞卜騰功績上諭軍機大臣曰昨努三委解賊人訥克衣之塞卜騰經軍機處詢問據稱伊於乾隆二十三年富徳派往伊犁安設臺站有賊人七騎搶掠隨領兵擒獲報知巴禄俱經正法等語塞卜騰既有擒賊功績該管大臣自應奏請議叙巴禄何以未經奏及著傳諭令其囘奏諭喀爾喀副將軍策布登扎布酌量堵賊及撤兵事宜上諭軍機大臣曰策布登扎布奏奉到由阿爾台轉回游牧之㫖擬將印務交福禄等辦理伊與車木楚克扎布俱請入覲等語是伊等此時業已撤兵朕昨又傳諭伊等向上年舍楞逃入俄羅斯之路堵截逸賊或續經奉到又復前往亦未可定但伊等若離游牧甚近即不必再行可傳諭知之訓飭辦理招撫錯謬之内閣學士清馥上諭軍機大臣曰清馥奏稱在楚庫爾戈壁内收服噶勒雜特得木齊根敦等五十餘人内有斗齊之父巴圖克勒木令其招降伊子等語辦理甚屬錯謬此次既收服根敦等多人則斗齊藏匿處所伊等皆知理應詢明領兵往捕乃遣人招降何其畏葸之甚耶即遣人亦應留心酌量豈有即遣其父之理清馥又已被賊欺誑若果能招降斗齊則已否則重治其罪斗齊等皆誘去馬匹之狡賊即來降亦不可留除將根敦等酌挑數名前往解送馬匹外餘人俱送往肅州交楊應琚請㫖又所奏濟彥保毛庫本等圍賊數日請給以奬賞翎兵丁酌賞銀兩等語伊等收服數十嗎哈沁何至賞翎此皆清馥欲自見其功以掩前咎耳著傳㫖申飭濟彦保等各賞緞一端兵丁四十名各賞銀三兩俱著清馥備辦定邊右副將軍富徳等疏奏查詢𠞰殺賊黨富徳等奏言臣等遵㫖將𠞰殺之逆黨阿布都克勒木及有名伯克等查奏伏查七月初九日追及賊衆於阿勒楚爾捉生詢問係阿布都克勒木親隨供明伊主被殺又檢得回人内有一尸體胖靣白鬚髯連鬢身中數矢及刀鎗傷數處經伯克霍集斯等驗係阿布都克勒木其為何人所殺未能確指至本日所殺大伯克甚多謹將詢問得實者列單恭呈御覽其沙喇斯瑪呼斯厄魯特内無為首宰桑計節次𠞰殺約三四百人被拔達克山擒送者百餘人亦行正法其中並無有名要犯奏入報聞定邊左副將軍成衮扎布等疏奏定議休息喀爾喀事宜成衮扎布等奏言臣等前奏休息喀爾喀等事宜䝉恩諭交軍機大臣議奏俱經准行仍將應賠馬駝牲隻令臣等酌定年限臣等仰體聖主仁恩謹擬將原奏各案應賠之項以癸未年為始照定額交納供應侍衛官員照理藩院行文定數支給其布延圖軍營俟策布登扎布轉回即行裁撤并嚴飭四部落副將軍盟長等曉示該扎薩克加意管轄所屬以期生計饒裕俱遵㫖傳諭務期實力奉行奏入報聞平定準噶爾方略正編卷八十
