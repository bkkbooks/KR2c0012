body:
  text: 雍正十年冬十一月庚子大學士伯經略鄂爾泰奏開採硫磺山事宜鄂爾泰疏言軍中火器最重若火器不精三軍難恃以為勇臣經歷邊郡見各標營堡施放鎗炮火煙不直且半濃黑知其製藥不中法度曽嚴飭所司指示大略惟是揀材置料硝易而磺難硝賤而磺貴陜甘兩省號稱地不産磺必赴他省購買軍需所在接濟維艱查肅州嘉峪關金佛寺堡所轄汛地內南山隘口抵朱魯郭迤邐而西有硫磺山周圍四五十里遍山産磺若遣官開採煎熬如法用之不竭不獨便利軍需即陜甘兩省標營所用亦足接濟現與劉於義面商遣官經理一面先支銀兩令總兵官沈力學開工奏入得旨開採硫磺固於軍需有益但行之日久不無私販盜賣之弊著署督劉於義飭令總兵沈力學派兵防護實力稽查俟開採足用後奏聞請旨命甘肅捐納款項改折本色米石仍不得於本地採買大學士伯經略鄂爾泰疏言甘涼肅為軍需要區倉儲尤宜充裕請以現行捐納款項改折本色米石輸納奏入得旨邊地改折米石以便積貯於軍需誠為有益但在本地採買恐價值騰貴轉不便於軍民除甘涼肅本地民人援例者準即以所有糧石交納外其他處捐納人等俱應由他處運交不但於甘涼肅採買著該督等通飭曉諭稽察禁止辛丑命以鄂爾多斯等處馬匹專備西路軍需其北路以烏喇特等處馬匹應用上諭辦理軍機大臣等曰西路軍營所需馬匹向由鄂爾多斯等扎薩克處採買今北路所需馬匹又於彼處採買趕送則西路反致難得矣著將六旗鄂爾多斯所買馬匹停其趕送北路交與各旗牧養豫備西路需用烏喇特烏珠穆泰等處所買馬匹著備北路需用議發罪人赴軍營附近處屯種并增設臺站車牛辦理軍機大臣等遵旨議奏罪人當發黑龍江者有旨改發北路軍營屯種豫以自新請嗣後改發軍營附近處一切衣食如康熙五十八年例令所在酌給當發時由京城撥兵遞送赴軍罪人在途或妄行不法即於該處立斬至沿途臺站所需車輛牛隻向已裁去應請如前增設奏入上從之己酉命伊禮布統轄額塞勒津城等處兵駐劄哈爾垓圖諾穆圖等專辦修城種地事務工部左侍郎原署西安巡撫馬爾泰奏言額塞勒津城介在山谷中四面人馬往來不見蹤迹哈爾垓圖乃諸路隘口所會水草亦佳請撤額塞勒津城所駐步兵并發西寧大通馬步兵合二千人赴哈爾垓圖詳閲耕種地方令兵丁開墾其一切修葺城堡專令諾穆圖傅寧辦理再董科爾寺與西寧逼近既設一參將率兵五百駐劄無庸增兵阿布海雅蘇地氣甚寒駐兵不便扎噶素台所在水草尚佳請每年十月初臣與達鼐二人輪班率西安緑旗兵一千京師滿洲兵二百現在西寧者赴扎噶素台等處駐劄策應至正月仍還西寧辦理軍機大臣等議如所請奏入得旨哈爾垓圖地方駐劄兵丁著伊禮布統領尹扎納管承澤協同管理修城種地事務著諾穆圖傅寧辦理命四川兵調赴軍前者各歸汛地工部左侍郎原署西安巡撫馬爾泰奏言由四川調赴多巴駐劄兵二千不耐天寒所乘悉川馬出口既非所宜置之西寧徒費糧草查西寧大通二處除出征及預備兵丁外尚六千餘防守已足若更需兵現今涼州有直隸河南兵一千足支調遣請令四川兵各回所在汛地辦理軍機大臣等議如所請奏入上從之辛亥命革陳天培等職署陜西巡撫史貽直奏言統轄勇健營兵丁提督陳天培總兵官徐起鳳罷軟廢弛不能約束兵丁致令沿途生事總兵官周一德明白諳練紀律森嚴可以管領勇健營兵丁赴軍辦理軍機大臣等議如所請奏入得旨依議陳天培徐起鳳俱著革職十二月甲寅朔上諭理藩院曰額駙策凌之馬羣今年被賊騷擾著於口外官馬羣內賞給馬二千匹牛一千頭羊五千隻再額駙屬下人等之産業有被賊騷擾者曾否叧行賞給已經飭查爾等再行知順承親王務令饒裕均霑實惠乙卯命恤賞陳亡大臣副將軍尚書查弼納等吏部議奏據兵部咨靖邊大將軍和碩順承親王錫保造陳亡大臣等册送部請照例給豫世職查副將軍尚書查弼納參贊內大臣馬爾薩副都統蘇圖覺羅海蘭應授騎都尉兼雲騎尉散秩大臣一等公達福副都統戴豪西彌賴常祿前鋒統領丁夀侍郎永國應授騎都尉二等侍衛德明等一百十八人及領催委署章京傅成格等十六人並應授雲騎尉其祭葬銀兩各按品級恤賞如例奏入上從之辛酉命增撥車臣汗兵丁簡派訓練保守遊牧並收輯巴爾虎等逋逃者上諭辦理軍機大臣等曰從前車臣汗部落兵丁曽派撥三千名隨軍額爾得尼招地方交戰時惟有一千二百餘名其餘一千八百名俱行逃回續經順承親王奏請派撥車臣汗部落兵一千名前赴軍營現已準行爾等可行文特古忒除軍營所有車臣汗兵一千名與明年換班兵一千名外再叧派三千名令查克旦阿敏道帶領在伊等遊牧西界操練則於保守遊牧諸事大有裨益如不能足三千之數或一千或二千俱可著特古忒會同王吹扎卜及扎薩克等公同撥派又聞得從前貝子顔楚卜多爾濟旗分及扎薩克台吉沙克都爾扎卜旗分之巴爾虎等潛逃俄羅斯地方彼處不容伊等入境仍往我卡倫外竊取喀爾喀等什物特古忒現在車臣汗部落著會同王吹扎卜扎薩克等將脫逃之巴爾虎作何收回之處商議辦理收回時著查克旦阿敏道開𨗳理法加意訓練癸亥靖邊大將軍順承親王錫保奏報鄂爾昆扎克拜達里克等處屯田收穫大小麥糜九千四百石有奇奏入得旨下部知之丙寅授西路副將軍張廣泗為正紅旗漢軍都統仍留軍營丁卯命正馬爾賽縱賊失機罪靖邊大將軍順承親王錫保等遵旨議奏馬爾賽負恩縱冦不忠不孝豫以誅戮不足蔽辜臣等傳集軍中文武以下恭宣命旨詳加詢問莫不衆口同聲以為允當李杕曽獲重愆棄瑕録用乃復懷姦濟惡為國法所不容應將馬爾賽李杕即正典刑以昭憲典兵部等議奏馬爾賽世受國恩身邀異數為北路將軍手握重兵坐觀賊遁有心僨事貽誤軍機應將馬爾賽梟示軍前李杕庸懦卑狡與馬爾賽同惡相濟應請按律一并正法奏入得旨馬爾賽著即處斬免其梟示李杕著在軍前監候秋後處決隨命副都統索林奏事郎中張文彬馳驛前赴扎克拜達里克軍營將馬爾賽正法己巳上諭辦理軍機大臣等曰此次賊人大敗現今歸化城無備兵之事著將撫逺大將軍印信移取回京收貯康親王崇安不必前往命奬賞索倫營總等出征奮勇者額駙策凌奏言索倫兵丁擊賊者已蒙恩賞賚此次營總章京等人人奮勇自效請特加優賞以示鼓勵辦理軍機大臣等議覆曰應如所請索倫營總班圖巴爾孟古海薩勒圖並以副都統銜授之仍同布爾沙管轄索倫兵丁營總那斯泰等佐領克什克圖章京布賴等給豫孔雀翎領催達魯察等給豫藍翎奏入上從之庚午命安插吐魯番回人於瓜州上諭辦理軍機大臣等曰從前署大將軍查郎阿摺奏請將吐魯番回衆在肅州所屬王子莊安插經廷議令署總督劉於義等確勘詳查妥協辦理朕思回民等輸誠嚮化自應選給水土饒衍氣候和煦之地俾得樂業安居肅州之王子莊水泉甚少可墾之地不敷回民耕種查瓜州地土肥饒水泉滋潤氣候亦和與回民原住地方風景相似且現在開墾可種之地甚為寬闊足資回民耕收由塔勒納沁遷至瓜州路不甚逺可免跋涉之勞著署總督劉於義巡撫許容將吐魯番回衆即于瓜州安插其築堡造房給與口糧牛種等項亦即行估辦交原任潼商道王全臣料理再令查郎阿即於軍營派一武職大員先赴瓜州會同王全臣悉心妥辦回衆自塔勒納沁遷移之時著提督顔清如沿途照看至瓜州安插事畢顔清如仍回軍營辦事署寧逺大將軍查郎阿奏報巴里坤圖古里克等處屯田收穫青稞一萬二千六百石有奇魯克察克屯田收穫􅐘麥三千六百石有奇奏入得旨下部知之癸酉喀爾喀扎薩克多羅貝勒車木楚克納木扎爾卒以其子成衮扎布襲爵喀爾喀扎薩克固山貝子策旺諾爾布以老疾乞休封其子車木楚克扎卜為扎薩克鎮國公丁丑授營總疾爾璊副都統銜仍留軍營署陜西總督劉於義奏請暫緩甘州新募兵赴金塔寺劉於義疏言前者臣以金塔寺地要兵單請調髙臺滿洲兵五百移駐其地廷議以髙臺兵明春當赴大營請撥甘州提標新募兵往金塔寺駐劄甚當但臣一面奏聞一面撤髙臺兵自涼州徑赴金塔寺安頓妥帖金塔寺去肅州百餘里較髙臺赴軍尤便請俟此軍赴大營後再調甘州兵赴金塔寺奏入報聞庚辰封策布登扎布為輔國公授蘇巴什里為內大臣上諭理藩院曰額駙策凌子策布登扎布隨父軍前行走甚屬效力著封為輔國公蘇巴什里奏請派差報效著授為內大臣雍正十一年春正月丁亥命甄别勇健營兵丁署陜西總督劉於義疏言陜西勇健營兵丁請令總兵官周一德等甄别選汰其驕悍難馴者遣還原籍辦理軍機大臣等議如所請奏入得旨朕前以各省民人內必有人材壯健文勇可觀願為國家效力以圖上進者是以特降諭旨令各省督撫召募揀選送京訓練以備軍旅之用伊等如果能奮勇出力建績立功將來俱可為干城之寄故疊加恩賚於應募後即各給守糧一分贍養家口到京後撥給房屋居住月餉銀米從優給發起程赴陜又各賞衣裝路費銀兩暫今駐劄近邊地方以候差用俾伊等各展效力之心並圖進身之路是朕加恩於勇健兵者至為優渥伊等各自揣量實為過分乃其中多有放縱驕悍生事不法者上年到京即不安本分肆行爭鬬及令赴陜沿途又復生事騷擾該督撫曾具摺參奏而駐劄甘州之後竟有私自脫逃之人陳天培又經具奏此等無賴之徒固由各省督撫不慎重揀選濫募充數總統大員不能嚴行約束整飭教導而在伊等受恩而不知感自甘廢棄冥頑惡劣即令調赴大營亦不可用著總兵周一德即行甄别挑汰遞回本籍交該地方官嚴加收管不令出境生事若有心懷怨望揑造浮言并恃強肆橫鬬毆不法等事該地方官立即拘拏稟知督撫提鎮一面奏聞一面按法究治至於挑存可用之人俱應感激朕恩遵循法紀嗣後益加黽勉努力戎行以圖上進朕必加以恩澤著將此旨曉諭知悉庚寅議洪郭爾鄂隆等處駐兵防守事宜侍郎納延泰奏言臣等與喀爾喀扎薩克圖汗格勒克雅木丕勒等詳議駐兵所在查洪郭爾鄂隆可駐兵一千其東南百餘里外圖伯策克可駐兵二千西面沿西巴爾台河一帶至濟爾噶朗圖可駐兵三千既可以固喀爾喀遊牧亦足控禦阿濟諸路請令都統哈達哈副都統綽爾多等即率兵於青草發生時啓行分赴所在駐劄奏入上從之戊戌命優恤副將楊馥等上諭內閣曰大定副將楊馥統兵擊賊奮勇先登為暗鎗所傷其忠義之氣甚屬可嘉伊子楊恆新現在軍前技勇頗優亦甚有志氣著授為遊擊不必在軍前效力遇有遊擊缺出即行題補平越營遊擊羅資衮以帶兵應援勇往被害深可憫惻伊子羅雲標現在隨征效力著授為守備該督等酌量題補至楊馥羅資衮應得恤典俟事竣題報到日仍照例賞給庚子命大學士伯鄂爾泰赴北路經略軍務命山西大同總兵官張朝良陜西涼州總兵官楊􅛵赴西路軍營壬寅命陜西各營餘項悉令歸公濟用以杜攤派剋扣之弊上諭內閣曰甘涼肅等處兵丁本年應支糧料草束例應折給銀兩自行採買朕因甘省年來辦理軍需食物昂貴兵丁所領銀兩恐不敷用特令加倍增給以示格外之恩提鎮大員自應體朕軫恤兵丁至意悉心料理加意愛養近聞辨員中尚有營私瞻徇凡於過往應酬及一切雜費俱於各兵攤派即如甘提馬厰每年尚有餘利若盡歸公用於兵丁不無小補前任提督宋可進祇知網利不恤兵艱剋扣餉銀濫用公帑各鎮將辨未必不倣效而行著署督劉於義侍郎杭奕祿嚴飭陜甘提鎮將營中所有除各官俸薪及親丁名糧外凡有餘利俱歸公用接濟兵丁不得絲毫乾沒入已亦不得借公費等項名色攤派署提督劉世明受恩深重尤當實力奉行毋得仍蹈故轍自取罪戾嗣後辨員有私派侵蝕等弊該署督等即行參奏并將該管提鎮一并參處策登扎卜請赴軍前效力上許之上諭理藩院曰喀爾喀貝勒策登扎卜懇請願往軍前效力著照所請前往伊帶往之兵丁百人馬匹行糧準照內地兵丁之例支給甲辰喀爾喀固山貝子佛保陷賊未歸以其兄沙克都爾扎卜襲爵丁未增設安西兵備道一員左副都御史二格奏言自肅州抵哈密計程千五百里其間沙州安西等處舊隸肅州道按肅州道駐肅事務尤繁不能逺制邊外現今安西屯田又令吐魯番回人於瓜州安插必得大員就近彈壓撫𨗳為便户部議覆曰應如所請增設安西兵備道一員其舊設安西同知移駐瓜州辦理水利屯田與靖逆通判及四衛一所並隸安西道奏入上從之二月戊午命以吹扎卜襲封車臣汗理藩院奏言車臣汗策卜登班珠爾人不稱職請以扎薩克多羅郡王吹扎卜署理印信奏入得旨車臣汗名號即著吹扎卜承襲己未命公豐盛額統領赴洪郭爾鄂隆等處兵上諭辦理軍機大臣等曰額駙策凌去時曽奏請將都統哈達哈遣往北路軍營從前派往洪郭爾鄂隆等處駐劄兵丁曽著侯馬蘭泰管轄今馬蘭泰不必前去著留京在辦理軍機處行走伊所挑馬場兵一千名著副都統黑色於四月間由馬場起程至歸化城會同哈達哈等管領前往洪郭爾鄂隆駐劄哈達哈既往北路軍營此兵著派公豐盛額總統酌量哈達哈赴洪郭爾鄂隆之時豐盛額再由京起程庚申飭諭軍營將辨等上諭內閣曰古云兵可百年不用不可一日不備所謂備者非徒操練技勇演習行陳而已如馬匹軍裝炮火器械軍行必需之物一一預備於平時及有事調撥便可刻期起行不至拮據延緩此乃設兵之本意也我國家承平日久武備漸弛年來朕屢降諭旨諄諄訓飭雖該管大臣等稍知以訓練為務然馬力不足資裝器具不周每聞派遣之信勉強周章遷延時日所謂預備者但有虛名而無實濟此則該大臣所當深知痛改加意整理者又如營中有必需之匠役不得不酌量給與兵糧數名以資養贍而將辨等每多借此名目將水火夫役等人多占名糧又每將精壯兵丁多派為親隨不令當差及遇頭目把總缺出即於此內拔補以致荷戈持戟者差使繁多而不得上進之路朕向知此弊已屢降諭旨切加申飭近聞此風仍未全改亦著該管大臣嚴行查察毋得姑容又聞各營中間有公中餘利如甘州提標馬厰之類原係存公備用而該管將辨往往據為己有收入私槖遇有過往應酬及營中雜費仍攤派兵丁而不恤其艱苦此弊尤當禁革今再行曉諭儻敢視為具文仍蹈前轍勿謂罰不加衆希冀茍免其情罪輕者照例處分情罪重者必在本地正法壬戌命喀爾吉善以護軍統領原品赴洪郭爾鄂隆軍上諭辦理軍機大臣等曰原任護軍統領喀爾吉善久歷戎行伊願往軍前效力著賞給原品令往洪郭爾鄂隆軍前協助公豐盛額行走賞銀一千兩甲子命革喇嘛扎卜爵以其弟得親扎卜襲封扎薩克和碩親王上諭理藩院曰喇嘛扎卜前年一聞賊信即駭然驚潰及戰於克爾森齊老地方棄軍奔往遊牧處所朕恐此中别有情節令其來京訊問伊竟無一語置對甚屬怯懦無恥著革去扎薩克和碩親王令伊弟得親扎卜承襲撤回一佐領賞給額駙策凌喇嘛扎卜著交該衙門議處尋議喇嘛扎卜為喀爾喀部落親王盟長不思訓勵屬人效力軍事遇敵退縮應按律正法奏入得旨喇嘛扎卜理應照議治罪但伊祖親王善巴於喀爾喀未定之先即輸誠歸順後於軍事甚屬效力是以聖祖仁皇帝加恩於喇嘛扎卜備極愛養著從寬免死在京永逺監禁丙子命分别賞賚額爾得尼招破賊官兵銀九萬九千兩有奇命正阿三臨陳退縮罪先是靖邊大將軍順承親王參奏振武將軍傅爾丹於烏遜珠勒遇賊並未身先督戰以致士卒怯走歸營原任副都統阿三推委退縮一與賊遇首先奔北辦理軍機大臣等議覆曰應以傅爾丹阿三付三法司定擬具奏順承親王錫保不能籌畫指示應交宗人府議處奏入得旨烏遜珠勒對壘情形朕曽細問額駙策凌傅爾丹情罪尚有可原從寬免其治罪著留軍營聽大將軍等調遣效力贖罪行走阿三前嵗同陳泰貽誤軍機朕曾加恩免其治罪今據大將軍參奏情由甚屬可惡已在軍前取有確供交三法司定擬具奏餘依議至是刑部等議曰原任副都統阿三於大將軍調遣時托故後期遇賊奔北貽誤軍機應即於軍前正法奏入上從之平定準噶爾方略前編卷三十三
