  text: 欽定四庫全書平定準噶爾方略正編卷三十八
  hash: sha256:40c0d943da9788936b5f8674c48b6fd02887424404e8f892a7acc40565ddb274
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_092-1a, image: WYG0358/WYG0358-0627c.png}
body:
  text: 乾隆二十二年春三月癸卯訓諭將軍大臣等和衷集事上諭軍機大臣曰此次將軍成衮札布副將軍兆惠參贊大臣舒赫德等分路進兵伊等承辦事務雖俱有專責仍宜彼此互商斟酌辦理其兩路大兵會合後成衮扎布即應統領諸大臣公同商辦方於公事有濟即哨探隊內大臣等領兵前往與大兵相離較逺其一應事宜自當責令專辦至㑹合一處仍宜各按品級統以將軍事權始歸畫一倘領兵大臣稍分彼此或互相推諉殊非仰體朕委任之意著傳諭成衮扎布兆惠舒赫德富德等當以前次將軍大臣為戒務宜和衷共濟迅奏膚功朕實有厚望焉乙巳諭參贊大臣唐喀祿等辦理安插厄魯特人衆事宜上諭軍機大臣曰唐喀祿等奏稱喀爾喀地方現有扎哈沁特楞古特竒爾吉斯烏爾罕濟蘭及輝特存留人衆約計萬人此等均非善類日久不免滋事請將扎哈沁人等令在卡倫內居住特楞古特竒爾吉斯烏爾罕濟蘭人等賞給東三省官兵為奴其上年輝特部落遷移時存留七百餘人詢問䇿卜登多爾濟普爾普等如不願歸併同居亦照例分賞為奴等語唐喀祿等所奏甚是但不應將輝特存留人衆更向䇿卜登多爾濟等詢問方行分賞現在輝特人等形跡可疑其應行辦理之處已降㫖令伊等悉心查察此時䇿卜登多爾濟普爾普等如稍有可疑應即先行勦滅並將其所留人等一併酌辦若未辦伊等而先辦其所留人衆恐伊等轉藉為口實再扎哈沁人等此時並無别情暫令遷至卡倫內居住事屬可行至特楞古特竒爾吉斯烏爾罕濟蘭人等著即照古爾班和卓屬人之例一體賞給索倫官兵為奴其應如何遣往之處㑹同䇿布登扎布酌量辦理命革副都統扎爾杭阿職上諭軍機大臣曰從前自軍營回京大臣奏稱扎爾杭阿告稱哈達哈於𠞰滅古爾班和卓時收獲賊人珍珠等物朕以其言無據飭令密查今據舒赫德查奏哈達哈並無其事明係扎爾杭阿與哈達哈素不相能故為此傾陷之計朕辦理諸務一本至公豈肯以一空言而即治人之罪且哈達哈之罪並不在此伊身為將軍帶領大兵任意遲延以致阿布賚脫逃是亦罪有應得扎爾杭阿不以此具奏而反以全無影響之事有意傾軋此風斷不可長扎爾杭阿著革職在粘桿處行走朕簡用大臣寄以閫外重任原期同心協力共奏膚功果有應行參奏之事自當據實陳奏若彼此相傾全不以國事為重辜恩溺職斷難姑容著傳諭軍營大臣等知之丙午諭定邊將軍成衮扎布等籌辦𣲖兵耕種事宜上諭軍機大臣曰現在大兵前進賊衆諒無不知厄魯特等勢窮力竭必竄入哈薩克境內惟是大兵撤回後伊等仍復占據巢穴終非一勞永逸之計著即於進兵時召幕回人墾種地畝並將帶往緑旗兵丁派令耕種不特秋成之後可資軍食且使賊人無可歸之路哈薩克勢不能久資養贍必至自相戕賊庶可以永絶根株著傳諭成衮扎布兆惠舒赫德等將作何派令耕種及防守額林哈畢爾噶一帶地方堵禦賊人之處公同酌議一面奏聞一面即領兵前往諭黑龍江將軍綽爾多等查辦齊木齊格特人等事宜上諭軍機大臣曰齊木齊格特人等係喀爾喀車臣汗部落所屬因伊等肆行搶掠派兵查辦今據納穆扎爾奏稱齊木齊格特人等俱因懼罪逃往呼倫貝爾地方彼處係黑龍江將軍所轄著傳諭綽爾多等務即遣兵查拏將賊首解送京師治罪其情罪較重者即在彼處正法餘俱賞給索倫巴爾虎等為奴斷不得少事姑息再呼倫貝爾地方人內或有賊等戚屬私行藏留者並著嚴切曉諭責令擒獻倘敢容隱查出一併從重治罪戊申諭定邊將軍成衮扎布等籌辦𠞰滅噶勒雜特人等上諭軍機大臣曰據成衮扎布等奏稱哈薩克錫喇等帶領噶勒雜特百餘户遷往額爾齊斯前已有㫖令唐喀祿堵禦逃竄賊衆若噶勒雜特等逃向齊爾地方唐喀祿即可就近辦理等語第噶勒雜特人等如不逃向齊爾應作何辦理之處尚未籌及從前命唐喀祿前往䇿凌等游牧㑹同䇿凌等𠞰滅噶勒雜特人等伊等自能遵㫖辦理倘賊衆仍在額爾齊斯則應另行籌辦因思大兵進𠞰後即應將喀爾喀兵丁撤回與其回至巴里坤再行遣回不若即於撤兵時遣往額爾齊思𠞰滅賊衆再由彼處遣回各游牧較為便捷如喀爾喀兵丁不敷調遣現有應撤索倫兵丁亦同喀爾喀一併遣往俟將賊人辦竣即由彼處遣回路亦較便著傳諭成衮扎布等遵照辦理定邊將軍成衮扎布等疏奏大兵起程進𠞰日期成衮扎布等奏言臣等領兵七千名一路由朱爾都斯前進一路由額林哈畢爾噶前進臣成衮扎布隊內派兵一千四百名令富德博爾奔察諾爾卜扎卜鄂穆布等帶領為哨探隊又派索倫兵八百名令明瑞色布騰巴爾珠爾管理吉林兵二百五十名令滿福管理察哈爾兵二百五十名令敏珠爾多爾濟管理喀爾喀兵五百名令旺布多爾濟齊旺多爾濟管理緑旗兵四百名令明瑞兼管臣成衮扎布舒赫德總統督率哨探隊於二月初十日起程大隊於十一日起程臣兆惠隊內派兵一千五百名令額爾登額鄂卜什達體善順德訥等帶領為哨探隊又派索倫兵七百名令三格圖倫楚竒撤布管理察哈爾兵六百名令端濟布管理吉林兵三百名令愛隆阿管理阿拉善兵四百名令羅卜藏多爾濟管理緑旗兵四百名令三格兼管臣兆惠鄂實永貴總統督率哨探隊於三月初十日起程大隊兵亦於十一日起程臣等同心協力務期迅奏膚功仰副我皇上簡任之意又現在巴里坤駐劄喀爾喀台吉噶勒桑兵丁敏珠爾等八十三人或自臺站撤回或由伊犁被圍脫出僉稱情願效力甚屬奮勉內年老有疾人員遣回各部落其餘官員兵丁六十七人臣成衮扎布帶往效力奏入報聞庚戌諭參贊大臣哈達哈等擒𠞰輝特部落事宜上諭軍機大臣曰哈達哈特奏稱據輝特部落護衛阿齊呈首䇿卜登多爾濟差人潛通阿逆並謀逃竄隨即調兵前往辦理其留駐塔米爾衆輝特等亦移咨䇿布登扎布派員擒拏分賞喀爾喀等語輝特人衆本與阿逆同謀前曽降㫖令䇿布登扎布等加意防範相機辦理今阿齊既將賊情首告哈達哈即領兵進𠞰甚合機宜至留駐塔米爾衆輝特等亦不應俱行分賞著將丁壯人等悉行誅滅其婦女酌量分賞喀爾喀方為妥協又䇿布登扎布奏達什達瓦人衆現在鄂爾昆與塔米爾密邇應將分賞輝特人衆事宜曉諭伊等使其不妄生疑懼已令布林託言此項輝特人衆牲隻無多是以令其歸入哈爾哈地方分駐等語䇿布登扎布辦理甚謬厄魯特生性猜疑若不將實在情形曉諭反啓伊等疑懼著即將䇿布登多爾濟等背叛情由及領兵前往擒𠞰之處明白曉諭達什達瓦人等知悉諭貝子額敏和卓防範回人唐噶塔爾等上諭軍機大臣曰成衮扎布等奏和據額敏和卓呈報噶爾藏多爾濟所屬回人唐噶塔爾沙呼里等帶領回人一百餘户現住魯克察克地方應如何安插侯㫖遵行等語此等回人即交與額敏和卓管理但伊等久為噶爾藏多爾濟所屬倘有潜通噶爾藏多爾濟之事或乘閒潜逃葉爾羌喀什噶爾等處俱未可定著傳諭額敏和卓加意防範如尚屬安靜令其種地謀生形跡稍有可疑即奏聞請㫖辦理辛亥諭陜甘總督黃廷桂等籌辦接濟馬匹事宜上諭軍機大臣曰西路大兵現已進𠞰馬匹必須多為豫備巴里坤地方應再備馬三四千匹以資調撥方為妥協著傳諭黃廷桂速為籌辦母致臨期有誤送到馬匹阿里衮務須派兵加意牧養以備不時之需再大兵進𠞰厄魯特等自必畏罪投誠如有前赴巴里坤者即將伊等頭目先行送赴京師所屬人衆亦隨即移至內地俟過巴里坤後其應行𠞰滅者即行𠞰滅所餘妻子酌量分賞官兵毋得稍存姑息壬子命授兆垣三等侍衛官達色藍翎侍衛上諭軍機大臣曰副將軍兆惠等遣至行在備朕詢問之副護軍校兆坦奬賞藍翎官達色俱隨兆惠等沿途𠞰賊奮勉行走兆坦兩次前往噶爾藏多爾濟游牧尤屬勇往著加恩授兆坦三等侍衛官達色藍翎侍衛乙卯諭定邊將軍成衮扎布等拏解賊人事宜上諭軍機大臣曰據將軍成衮扎布等奏稱此次兩路進兵務期擒拏賊首其厄爾錐音等如赴軍營投誠暫行安撫俟凱旋後解送京師等語所奏甚合機宜衆厄魯特內惟吞圖布並未從逆尚可寬恕其餘俱不得稍存姑息再噶爾藏多爾濟所屬宰桑達什林沁沙喇沁屯圖卜三人情更可惡務將此三人拏獲同噶爾藏多爾濟扎那噶爾布尼瑪哈薩克錫喇等一併解送來京倘陳前受傷已重即在彼正法以彰國憲己未甘肅巡撫吳達善疏奏撥貯巴里坤糧餉事宜吳達善奏言巴里坤存貯糧二萬五千七百七十餘石現在支給進𠞰官兵及駐防屯田各兵口糧籽種僅存九千餘石伏思此次進𠞰賊衆易如拉朽摧枯將來官兵凱旋及駐防屯田各兵丁需糧甚多臣擬在哈密倉貯內酌撥糧二萬石於四月內運至巴里坤其哈密倉儲仍陸續撥運以備支給奏入報聞辛酉命議敘陜甘總督黃廷桂上諭大學士曰據黃廷桂奏辦解巴里坤軍營馬駝已於各官兵未起程之前全數解到經領兵大臣公同挑驗臕壯堪以乘騎等語黃廷桂此次解送馬駝妥協迅速辦理甚屬可嘉著交部議敘其管解各員辨著查明一併咨部議敘四月壬戌朔命原任總兵丒達仍馳驛往巴里坤聽候調遣癸亥署安西提督傅魁解至行在審明正法上諭軍機大臣曰向來緑營將辨懦怯取巧好為張大是以此番用兵從未委以專任知其不足集事也上年額敏和卓奏莽噶里克附和尼瑪等為逆傅魁現領兵在彼伊久在營行由總兵署理提督自當感激圖報其所領緑旗兵國家豢養有年遇事驅䇿亦足鼓舞士衆因即命伊帶兵一千㑹同額敏和卓辦理吐魯番事務適莽噶里克自行投來相遇於鹽池途次乃伊並不將莽噶里克擒獲審明實情以正國法竟並其所帶二十人盡行𠞰滅其辦理悖謬若此因即拏解行在朕親加鞫訊前後情節伊俯首無辭惟稱莽噶里克已自來降如僅拏解軍營無以見已之功並令同伊進兵之丒達對質當時曽勸伊不可遽殺伊亦毫無可辨夫以一千之兵遇數十來投之賊何難就擒非若猝遇賊衆臨陳對敵不能别白首從之可比乃必盡殺無遺是誠何心且原報殺賊三十人而丒達在彼所親見者僅二十人其十人則莽噶里克投來時所殺之厄魯特也傅魁以他人所殺掩為已功其欺誑邀功情罪甚為可惡緑營習氣惡劣如此不可不嚴加懲創傅魁著即處斬並將此通行曉諭提鎮各標營以此為鑒力除從前惡習以肅軍紀命免治原任參將邁斯漢罪上諭軍機大臣曰原任參將邁斯漢奉派領兵前往探取副將軍兆惠等信息中途並未奮勉行走輕聽訛言遽爾回營其恇怯退縮律以軍法罪不容誅然尚非傅魁之欺誑邀功者可比邁斯漢著從寬别其深罪仍查明伊隊內有無陳亡之人奏聞另降諭㫖甲子命查拏千總䇿卜登治罪上諭軍機大臣曰先經副將軍兆惠具奏千總䇿卜登陷入賊中未經脫出嗣據侍衛兆坦供稱䇿卜登在噶爾藏多爾濟游牧更換厄魯特服色已降㫖將伊妻子拏交刑部今復詢軍營前來人等俱稱上年䇿楞進兵時䇿卜登已更換厄魯特服色此皆係䇿楞疏縱之罪而䇿卜登以䝉古世僕甘心從賊罪無可逭著即嚴行查拏獲日照例凌遲處死並著將伊父雙柱革退侍衛及伊親屬人等俱拏交刑部按律定擬治罪乙丒命侍郎雅爾哈善為軍營參贊大臣留侍郎阿里衮駐劄巴里坤辦理事務上諭軍機大臣曰前降㫖令阿里衮暫留巴里坤代雅爾哈善辦理事務俟雅爾哈善回至巴里坤阿里衮仍赴軍營辦事今大兵已經前進巴里坤無緊要事務阿里衮承辦已有端緒而雅爾哈善赴行在面聆訓諭軍營一切事宜俱已詳悉指示著即前往軍營在參贊大臣上行走事竣之日成衮扎布兆惠舒赫德等俱著遵㫖來京定邊右副將軍印信即交雅爾哈善掌管留彼辦事其巴里坤現在應辦事務即著阿里衮駐劄辦理署理定邊左副將軍印務䇿布登扎布疏奏分賞籽糧事宜䇿布登扎布奏言前因輝特人等在烏蘭古木等處耕種奉㫖賞給籽種二百石今䇿布登多爾濟等潜謀背叛現經臣哈達哈等領兵辦理此項籽種無庸賞給查烏梁海內大臣察達克等向蒙皇上施恩賞給口糧伊等感激奮勉著有勞績現在奉㫖令伊等遷回舊游牧地方懇於此項籽種內賞給一百石俾得從容播種以資生理再上年自巴里坤前來之台吉噶爾丹達爾扎普爾普䇿凌及扎薩克圖汗部落公旺親扎卜等俱由準噶爾地方甫回生計稍艱並請將籽種一百石均勻分賞噶爾丹達爾扎普爾普䇿凌旺親扎卜所屬等令其種地自給奏入報聞大學士管陜甘總督黃廷桂疏奏塔勒納沁屯種情形黃廷桂奏言前經臣奏請派兵二百名赴塔勒納沁開墾屯種本年春間經署鎮臣祖雲龍派委都司王麟帶兵乘時墾種今臣往回哈密復行飭查據該鎮稟稱塔勒納沁地方從前約有地三千餘畝自乾隆七年停種之後厯今十五六載渠道淤塞開挖修築在在須費人工現在上緊開闢止可種地一千五六百畝布種青稞一百五六十石餘地至明嵗再行辦理臣查邊屯有裨兵丁創始未免稍艱今塔勒納沁荒廢地畝既已開墾一千餘畝一二年內自可次第修復並飭承辦辨員乘此春深極力墾種隨時查報奏入報聞丙寅命拏解輝特賊人䇿卜登多爾濟等來京上諭軍機大臣曰哈達哈唐喀祿等分路帶兵擒𠞰輝特人等唐喀祿擒獲䇿卜登多爾濟並將其屬人𠞰滅哈達哈阿桂僅將普爾普等游牧收取首賊普爾普德濟特克什克等俱已脫逃唐喀祿著交部議敘哈達哈阿桂俱著交部議處具奏䇿卜登多爾濟等即派委幹員押解來京其未經拏獲之普爾普等務即嚴加搜捕毋致兔脫所有厄魯特屬人等即照伊等奏請分賞烏梁海內大臣察達克等以示鼓勵喀爾喀台吉齊巴克扎卜此次甚屬奮勉著加恩賞帶孔雀翎至投赴科卜多地方之葉克明安公巴桑扎薩克阿卜達什克什克特等原非輝特族類且並無背叛情形著交與䇿布登扎布派人管理令其自備資斧遷至通背呼裕爾地方居住命參贊大臣納穆扎爾赴科卜多駐劄辦事上諭軍機大臣曰昨納穆扎爾奏稱齊木齊格特人等聞領兵往拏之信俱逃避呼倫貝爾等處地方伊等領兵追擒朕亦降㫖令黑龍江將軍綽爾多等嚴行查辦此事即可完竣北路科卜多地方關係緊要哈達哈在彼駐劄聞輝特人等背叛情形領兵往擒而首犯已皆脫逃殊屬疏忽著傳諭納穆扎爾即將齊木齊格特人等事務交與同往之喀爾喀王巴扎爾什第等上緊查辦伊即速赴科卜多籌辦事務俟納穆扎爾到日哈達哈即回至烏里雅蘇台辦事己巳命查辦喀爾喀各部落應繳馬匹牲隻上諭軍機大臣曰據䇿布登扎布等奏稱遵㫖豫備馬匹牲隻已遣員赴庫倫恰克圖等處購買馬四千匹駝數百隻所有喀爾喀部落應行追繳馬匹牲隻雖經檄摧尚未能如期送到等語此奏辦理含糊上年因衆喀爾喀等誤聽青滚雜卜煽惑將卡倫臺站所有馬匹牲隻遽行帶回各游牧嗣經擒拏青滚雜卜令將馬匹牲隻如數繳還免治其罪已屬朕格外加恩此項馬匹牲隻何得任其延挨至今未繳應即重治其罪若係平日交與各部落牧養之項或有倒斃責令賠補尚可少緩其期著䇿布登扎布等詳悉查明奏聞請㫖署理定邊左副將軍印務䇿布登扎布疏奏辦理伯什阿噶什游牧䇿布登扎布奏言臣等遵㫖將伯什阿噶什游牧劫奪侍衛佛保之為首賊人交瑚爾起帶兵擒𠞰其餘人分賞喀爾喀即行文唐喀祿辦理旋據藍翎侍衛齊凌扎卜等拏獲造言惑衆之護衛孟克柴巴岱緣孟克柴與巴岱同居情密倡言達什達瓦人衆俱已𠞰滅我等不如逃走致厄魯特沙賴古勒等搶掠牲隻伊等又欲驅趕喀勒占和碩之牧羣經巴岱之兄和錐勸阻不從有厄魯特達聞之之向綽爾濟喇嘛長史博和勒岱處首告因報知侍衛等擒獲解送軍營巴岱於途中病故臣等訊據孟克柴等知臺台達巴都噶爾曽奪佐領塞卜騰牲隻又責懲數次塞外騰因與孟克柴等糾衆搶其牲隻以致達巴都噶爾屬人困窮劫奪侍衛佛保巴岱業經病故將其子女賞給喀爾喀孟克柴正法梟示塞外騰里應正法但尚無倡逃情事此次又同侍衛等擒獲賊人應請解送到京巴岱之兄和錐曽經力阻厄魯特達啓即行首告俱送往察哈爾旗分安插其伯什阿噶什幼女三人現交喇嘛及長史等看守臣等酌量支給口糧請㫖遵行所餘五十一户大小二百四十餘口分賞喀爾喀至臣等前次奉㫖賞給伯什阿噶什貝子伍巴什牲隻應請停止解送奏入得㫖伯什阿噶什之幼女及看守人等俱著解送來京庚午參贊大臣哈達哈等疏奏擒獲輝特賊人普爾普哈達哈等奏言輝特賊人普爾普等逃竄臣等領兵擒拏據察克克所屬烏梁海巴松等拏獲厄魯特一名詢知普爾普藏匿山內臣即率兵追緝立時擒獲并伊子格楚勒僕人十餘名俱經擒拏俟拏獲德濟特克什克等一併解京奏入報聞壬申命議敘參贊大臣納穆扎爾等上諭軍機大臣曰納穆扎爾等奏稱齊木齊格特賊人什第等逃至呼倫貝爾游牧之西默爾根哈瑪爾地方盡行擒獲其應正法者即已正法餘俱遣往黑龍江打牲處安插等語辦理俱甚妥協著照所奏行納穆扎爾瑚圖靈阿多爾濟濟福伊柱德爾森保瑪尼巴達喇巴扎爾什第德木楚克格勒克巴木丕勒等俱著交部議敘其侍衛官員及喀爾喀台吉內有行走奮勉者著納穆扎爾等查明奏聞交部議敘兵丁酌量賞給錢糧以示鼓勵甲戌命移都爾伯特汗䇿凌等游牧於烏蘭古木地方上諭軍機大臣曰據唐喀祿奏稱都爾伯特汗䇿凌等因向與哈薩克厄魯特等有仇今聞伊等背叛請移游木於鳥蘭古木地方等語䇿凌等自輸誠以來感激朕恩約束屬人甚屬安靜深堪嘉豫今因叛賊扎那噶爾布哈薩克錫喇等肆行猖獗懇將游牧內移其內附之心益堅唐喀祿即前往料理亦甚妥協著照所請准其赴烏蘭古木游牧并賞給籽種令其耕種至伯什阿噶什之子博東齊等雖與都爾伯特同族歸併居住或仰藉䇿凌等養贍殊屬未便著將博東齊等送至烏里雅蘇台交䇿布登扎布等酌量移往通肯呼裕爾或呼倫貝爾地方居住再侍衛佛保奉差赴都爾伯特游牧途中沙克都爾曼濟之弟桑濟擾亂奮力交戰甚屬勇往佛保已施恩補授頭等侍衛其三等侍衛烏林泰著加恩補授二等侍衛虛銜藍翎伊靈阿副護軍校鄂多俱著補授藍翎侍衛其受傷及陳亡兵丁俱著查明賞恤䇿凌䇿凌烏巴什第聞知桑濟之信即派貝子瑪什巴圖帶兵奮擊甚屬可嘉著頒賜䇿凌䇿凌烏巴什瑪什巴圖等御用荷包以示優眷至都爾伯特台吉布圖庫班珠爾乃新降之人在卡倫派出馬匹接應佛保亦應奬賞俟伊等移往呼倫貝爾時赴烏里雅蘇台軍營各加恩賞給緞匹著傳諭䇿布登扎布遵照辦理定邊將軍成衮扎布等疏奏派兵屯種闢展地方事宜成衮扎布等奏言臣等奉㫖於進兵之時先應勘定地方派兵屯種以濟軍食並令厄魯特等無從退回復踞舊地睿慮周詳切中窽要臣等詳看吐魯番地方直通伊犁兼以各處回城聲息相通應即于吐魯番派兵屯種現在額敏和卓已駐劄此處尚有闢展地方地勢寬展可資屯種即將臣等所帶緑旗兵丁派令屯田交與副將閻相師督率管轄並令額敏和卓父子嚴密防範地方管束屬人與閻相師協同辦理奏入報聞乙亥諭定邊將軍成衮扎布等籌辦回部事宜上諭軍機大臣曰據成衮扎布奏前遣侍衛五十六托倫泰帶同霍集占使人沙呢雅斯至回城曉諭因中途阻滯仍回至魯克察克地方現令伊等隨營行走遇便再行遣回先請行文波羅泥都霍集占責令前來投順等語所辦尚合機宜第波羅泥都霍集占俱極狡詐而霍集占為尤甚伊等不即前來投順明係别生異心即應派兵擒拏特因厄魯特等尚未辦竣而伊等亦並無附和厄魯特之事倘行文深責伊等畏罪生變或反依附厄魯特轉致更生事端不若暫行停止俟辦理厄魯特諸務完竣仍令沙呢雅斯前往曉諭波羅泥都等如親身來歸亦即擒拏解京否則即派兵前往𠞰滅成衮扎布等務宜詳慎籌辦丙子命參贊大臣唐喀祿等領兵駐防額爾齊斯聲援西路署理定邊左副將軍䇿布登扎布等奏言賊人哈薩克錫喇等聞已逃向額爾齊斯地方應於阿爾台山梁等處駐劄兵丁邀截賊人臣於副都統瑚爾起所領兵內派三百名並派出科卜多駐劄兵丁五百名令郡王品級車木楚克扎布帶領前往參贊大臣唐喀祿現在都爾伯特游牧地方無應辦之事應令唐喀祿前往統領再額爾齊斯等處都爾伯特人等熟悉情形並令唐額祿詢問䇿凌等酌派兵一二百名一體帶往奏入上諭軍機大臣曰䇿布登扎布等籌辦派兵應援西路事宜甚屬妥協此項兵丁即派車木楚克扎布㑹同唐喀祿統領駐劄邀截賊衆但須直逼賊人逃竄處所方足以資䇿應如赴額爾齊斯已遇賊人踪跡即奮力𠞰捕或更應深入亦不得退縮中止唐喀祿等務宜奮勇辦理其官兵所帶口糧不妨多為豫備著裹帶口糧四箇月前往至唐喀祿所辦都爾伯特游牧事務現在伊等甚屬安靜原無所事倘有應行呈報事件即傳諭䇿凌等就近呈報駐劄科卜多大臣等查辦並著䇿布登扎布派出喀爾喀大員一人赴都爾伯特游牧管理事務丁丒命奬賞軍營效力人員上諭軍機大臣曰據副將軍兆惠等奏稱現在進兵兩次擒拏賊衆詢問賊人踪跡奮勇前往等語此兩次效力人等著查明賞給銀兩其有奮勇爭先者準其帶翎陳亡人員亦著查明具奏賜恤命安插達什達瓦部落喇嘛於熱河上諭軍機大臣曰據䇿布登扎布奏達什達瓦部落人衆生計稍艱等語達什達瓦人衆現在加恩撫綏其部落內所有喇嘛等著遷至熱河寺內居住有願將伊父母兄弟同來者悉聽其便平定準噶爾方略正編卷三十八
