body:
  text: 乾隆二十三年十一月丁酉阿克蘇辦事舒赫德疏奏將軍兆惠等信息舒赫德奏言十月二十日酉刻將軍兆惠差索倫領催阿勒丹察披甲扎奇勒圖來至阿克蘇遙到定邊將軍兆惠被圍文書并愛隆阿移文臣詢問阿勒丹察等并移文內稱因捉生詢問知霍集占牧羣皆在南山領兵往攻至葉爾羌城外見賊衆阻河為陳因度橋攻𠞰過兵甫四百餘橋斷賊衆四合將軍奮擊兩易馬俱中鳥鎗斃面及脛俱得傷明瑞福齡安馬陷泥淖明瑞唇得長鎗傷我兵力戰浮水至營又來馬步賊萬餘人合圍我兵雖有𠞰殺以無馬不能衝突遂掘濠結寨賊亦結寨相持計軍需馬駝尚可供兩月之食惟軍器火藥不足等語臣伏思霍集占恃其狡悍敢拒大兵不過暫爾跳梁終歸殄滅此時新調官兵四千名及趕送馬三千匹漸次到來計惟速行策應臣與愛隆阿一面探聽參贊大臣富德兵至何處一面選派兵馬趲赴葉爾羌其阿克蘇安設臺站鎮撫回人等事亦即酌量情形辦理又臣詢知兆惠明瑞俱傷不甚重其安營立寨亦有木植可用伊等於被圍後乘夜前行遇見愛隆阿之兵令其先來通信謹將原文進呈御覽奏入上諭軍機大臣曰據舒赫德接到兆惠行文知我兵深入逆賊霍集占等恃其黨衆敢於合圍拒敵殊可憤恨即當前往䇿應參贊大臣富德業經領兵前進著授為定邊右副將軍阿里衮愛隆阿福祿舒赫德俱授為參贊大臣無論何隊兵丁惟擇馬力有餘者作速前往其攻取回城擒獲賊首自不遽責伊等惟應援兆惠為要至兆惠領兵深入雖未免有輕賊之心亦恐朕責其怯懦若當日令伊暫駐阿克蘇候兵馬齊集當不至此然於現在情形亦未為失策朕豈肯加之責偹此時惟堅守以待援師㑹合回至阿克蘇整頓兵馬再圖大舉又富德前奏副都統鄂博什瑚爾起懇請前往回部朕因伊等在軍營年久仍命撤回今值用兵之時著准其前往富德仍酌量賞給具奏至阿里衮所奏馬駝亦經富德奏請先儘索倫兵一千名乘騎以期速到若阿里衮起程在前而官兵追及時即可給與乘騎可傳諭伊等惟計兵馬同抵軍營方克有濟併傳諭黃廷桂將所奏預備馬二萬匹加意豢養吳達善五吉等不必回巴里坤仍速赴哈密預備糧運又諭曰舒赫德現駐阿克蘇城安撫回衆甚為緊要前以軍營糧運宜多為措置有或向回人等購貯酌給價值之諭此時宜向伊等以此舉毫無擾纍明白曉示庶不致滋生事端舒赫德既領兵前進著永貴速赴阿克蘇辦事至愛隆阿領兵不及五百若應援將軍亦徒損國威無益於事今暫回阿克蘇尚無可罪惟奮勉以圖後效索倫阿勒丹察等頗屬奮勉阿勒丹察賜號什倫哈什哈巴圖魯扎奇勒圖賜號賽音伯勒克圖巴圖魯賞銀各一百兩戊戌諭大學士管陜甘總督黃廷桂運送軍需事宜上諭軍機大臣曰據舒赫德奏到軍營情形看來辦理回部必需整齊兵力於來年回人收穫時再行進𠞰昨已傳諭黃廷桂預備馬匹其糧運一事亦當加意籌畫再從前兆惠因輕騎進𠞰將所辦攻城炮位停止運送但來年大舉恐尚需應用併傳諭黃廷桂仍將從前鑄成炮位及辦造之物料工人陸續送往阿克蘇以備軍營調取己亥賜右部哈薩克阿比里斯等敕書奉天承運皇帝敕諭右部哈薩克汗阿比里斯哈木巴巴等爾等遣使卓蘭博索爾滿等於行宫朝覲朕加恩筵宴復隨駕入都重申宴賚念爾阿比里斯等遠在外藩若照內地扎薩克授以爵秩恐爾等有拘職守仍依爾舊俗各安遊牧庶無擾纍爾等如遣使入覲朕自加以恩賚一切事體已面諭來使卓蘭等回抵游牧時想宜領悉其賜爾阿比里斯衣物若干使臣到日爾其祇受又賞來使等衣物若干及使臣隨僕等市易物件共賞銀千兩又聞爾哈木巴巴當侍衛等入境時不在游牧故未遣使亦加恩酌賞衣物若干俱諭爾等知之嗣後勉抒誠悃永享無窮之福特諭諭定邊左副將軍成衮扎布派調達什達瓦游牧兵丁上諭軍機大臣曰將軍兆惠等被圍亟需策應今擬分兵兩路一路由阿克蘇烏什一路由特穆爾圖淖爾夾攻逆賊特遣侍衛官長保瑚圖禮等馳驛往鄂爾昆於達什達瓦游牧挑選兵丁一千名或八百五百名俱可令總管鄂齊爾等帶領由阿齊必濟前往西路㑹合巴祿之兵來年從特穆爾圖淖爾進𠞰可傳諭成衮扎布將現在軍營馬匹辦給如不足或於得親扎卜等所屬馬匹內通融措辦給與價值亦可其賞給伊等銀兩已交官長保等帶往命兵部尚書都賚派調西安滿洲官兵上諭軍機大臣曰都賚著馳驛前往西安署理將軍印務揀選滿洲官兵二千名著將軍嵩阿禮帶領前往烏魯木齊其應得各項銀兩俱照例辦給參贊大臣舒赫德疏奏辦理軍營文報及駐劄回城情形舒赫德奏言臣早受天恩屢䝉任使負罪至重仍邀曲貸忽聞軍營信息夙夜靡寧惟有速催兵馬帶領應援至現在接到各處咨呈軍營文報俱係亟應辦理之事未便收貯致滋遲誤臣識見淺陋何敢妄行干預因駐劄並無大員以公事為重請將所接文報即行開看酌量辦理奏聞仍逐一登記俟與將軍㑹合時呈送查閲至現在阿克蘇阿琿四人內惟阿卜都噶頗爾辦事頗有才具其副總管伯克頗拉特巴巴克意見不甚相合臣數次𫝊集勸令和衷并告以大兵與賊相持候兵馬調齊進𠞰爾等宜嚴行防範因爾處城小我兵於城外駐劄守護所有通葉爾羌喀什噶爾要隘俱安設卡倫庶無疏失回衆聞言俱甚感激其烏什城有伯克霍集斯妻子及衆伯克在內係貝子玉素富遊擊職銜丑達駐守現俱安靜近准將軍兆惠調取庫車賽里木緑旗兵二千名駝七百隻臣以現在情形不必遣發緑旗兵丁擬行文玉素富酌量調往烏什其餘存留阿克蘇再候軍營信息其駝隻仍辦給各隊續進官兵至回人應交糧米亦令其作速辦納奏入上諭軍機大臣曰舒赫德奏稱阿克蘇回人等現俱安靜毫無可疑所有通葉爾羌喀什噶爾要隘俱安設卡倫其應交糧米亦令其作速辦納等語所辦殊合機宜昨已命為參贊大臣今又授為副都統宜加意奮勉至令回人交納糧米之處仍遵前諭曉示以內地糧運陸續即至將來或償還本色或給與價值斷無絲毫擾纍仍不可稍露防範情形如得有軍營信息作速奏聞申諭參贊大臣公阿里衮趲送馬匹事宜上諭軍機大臣曰昨諭阿里衮所送馬匹務與各隊官兵相值同抵軍營伊既為參贊大臣則所遇各隊官兵俱可酌量指示或令與原馬替换乘騎或馬步相兼行走以息馬力總應相機辦理若但以速到為事催促趲行一抵阿克蘇即已疲乏更屬無益伊前聞軍營調馬之信即親身趲送頗屬奮勉今又命其承襲公爵可傳諭阿里衮更當奮勉行走其帶領新調官兵之福祿訥齊訥豐訥亨等亦當愛惜馬力以期進𠞰無悮俱著傳諭知之申諭定邊右副將軍富德賞給官兵等事冝上諭軍機大臣曰昨諭富德將鄂博什瑚爾起仍帶往回部酌量賞給具奏此等官兵久在軍前勤勞可念著照初次出兵之例賞給又吉林革職協領兆齊從前追襲善披領集賽等致賊脫逃今在烏魯木齊隨努三𠞰殺嗎哈沁頗屬奮勉併傳諭富德將兆齊酌量委署職銜令於軍營效力庚子諭郎中兼佐領職銜三寶曉示達什達瓦游牧上諭軍機大臣曰三寶等前經呈報達什達瓦屬人窮蹙情形深可憫惻已諭將存貯籽種三百石全行散給又布林等告稱伊等情願向內遷移承受恩澤等語伊等既願內移則來年交春後三寶即率領伊等量力行走至熱河居住但計遷移之前為日尚多僅給籽種亦不敷食用是以從伊遊牧選兵一千名前往西路不但入選官兵優加賞給即其餘人等亦酌給三分之一庶伊等普霑恩賚不致拮据似此格外施恩特因伊等自遷移游牧以來感戴朕恩安靜守分將來支給錢糧更於生計有益可傳諭三寶將此曉示布林等俾衆皆知悉諭大學士管陜甘總督黃廷桂等辦送西安官兵事宜上諭軍機大臣曰現在派調西安滿兵二千名前往烏魯木齊此項官兵若未經預備馬匹即照辦送健鋭營兵丁之例辦給車輛即使馬匹足用亦不妨仍用車輛俾有餘力可傳諭黃廷桂鐘音即為預備又諭曰適諭黃廷桂鐘音辦送西安官兵俱由驛站但由陜至甘自甘出口恐雇備車騾不無拮据河南與西安接壤巡撫胡寶瑔諳悉過兵事宜可傳諭令其約計足供二千兵丁之用解赴西安其西安所辦又可接濟甘肅則黃廷桂吳達善祇需料理兵丁出口之事更覺簡便妥速但官兵自西安起程本鐘音分內事今命胡寶瑔佽助蓋專為甘省辦差甚多俾有餘地可以集事鐘音不得因有此㫖遂缷責於胡寶瑔所有河南車騾一入陜境即應預飭地方官供支草料等項毋致缺乏其河南所辦若能多送數站更為有益伊等奉到此㫖即遵照酌辦一面奏聞命授參贊大臣舒赫德為吏部侍郎辛丑定邊將軍兆惠等疏奏攻城𠞰賊情形兆惠奏言十月初六日臣等派兵二千餘名聚集馬駝選巴圖魯兵二百名令公明瑞巴圖魯侍衛寧古禮為中軍前隊臣等率侍衛鄂實福齡安及閒散侍衛等為中軍總兵高天喜領炮鳥鎗隨中軍纛為後隊左翼前隊令副都統溫布侍衛富紹巴圖魯侍衛奎瑪岱鄂里克塔後隊令副都統愛隆阿巴圖魯侍衛齊努渾侍衛特通額管領右翼前隊令副都統由屯侍衛德爾森保巴圖魯侍衛扎延保後隊令總管端濟布喀爾喀公朗衮扎布阿拉善公滚楚克巴圖魯侍衛諾爾本管領仍令明瑞等以熟識霍集占之回人厄魯特從行如霍集占親身出戰即併力擒拏或發矢競射又派兵二百名令巴圖魯侍衛喀喇璊綽爾圖厄魯特散秩大臣達什䇿凌在前誘敵其各部回兵俱令該總管等率領在中隊兩翼之間各按隊伍執纛前進至葉爾羌城東北五六里見高臺一座上有騎賊四五人據伯克霍集斯云臺上賊施放鳥鎗臺前及近城俱掘大坎埋伏賊人以防衝突臣等隨傳令左翼官兵自坎東向西進攻右翼官兵覔路向東進攻誘敵兵則直前衝突又令溫布愛隆阿領兵奪臺其時臺上坎下及破屋空院內埋伏賊衆放鎗拒戰見我兵衝突乘馬敗逃我兵躍坎追擊直至城下臣等將中軍排立賊於兩門內各出四五百騎對陳我誘敵兵欲使賊離城一二里再行截殺賊不敢前亦出二三十騎來誘明瑞溫布等奮勇迎射接戰三次賊從北門出三四百騎策應由屯等即領兵阻截賊仍走入城至日暮臣等收兵留伏兵截殺是晚賊並不出城此次射斃賊人二十餘名帶箭逃去者無算倒斃驚散馬匹亦多并收軍器各數件我兵得傷者十九名傷斃馬二十餘匹官兵尚無損折者又伯克托克托之弟阿卜都賚伯克霍集斯屬人阿里木布魯特烏默爾額敏和卓之護衛沙丕呢雅斯等一同𠞰賊索倫署參領䝉郭勒肋下負傷與賊騎相扭挾有布魯古特琿齊之厄魯特卓里克圖哈什哈特克達什達瓦之厄魯特都喇勒哈什哈巴顔擊走賊騎救出䝉郭勒此外滿洲索倫兵將受傷人馬互相救出者甚多已酌量將厄魯特回人之新降者賞給翎頂緞匹其得傷官兵應請交部議敘至臣等察看賊衆情形其出城伏兵俱係厄魯特布魯古特亦間有從伊犁帶來回人城內東南角建立高臺排列數千人城上鳥鎗甚密霍集占又將村莊人等移入田榖亦皆收割未熟者焚棄至賊馬雖有四五千匹堪用者不過千餘每由各門分出旋爭門而入計可以出戰之賊亦止二三千人臣等若分地圍城恐兵少致令逃竄擬將攻城兵撤回在附近有水草處休息馬力一面派兵於痕都斯坦拔達克山土默特等去路邀截賊衆賊如固守不出則不時分兵侵擾并捉生詢問以計離間波羅泥都及貿易回人等俟賊人內潰乘機攻取奏入上諭軍機大臣曰據兆惠奏稱官兵攻城射賊衝擊數次賊衆披靡我兵雖有得傷者幸無損折等語官兵奮勇𠞰賊殊屬可嘉兆惠額敏和卓及領隊大臣侍衛官兵等效力及得傷者俱交部照例議敘昨據舒赫德奏報兆惠行知愛隆阿文書朕即傳諭各隊官兵速往應援兆惠此時即尚未突圍而出計日援兵㑹合自必無虞可傳諭舒赫德於領兵進發時馳送兆惠知悉至兆惠從前奏報一月內可到此次遂隔四旬想阿克蘇以外臺站必有稽遲著舒赫德查明具奏又諭曰兆惠奏稱攻取賊城攩牌甚為有益從前伊在四川試看鳥鎗不能穿透約重五六十斤一人可以手舉如用車輪推送足以擁蔽雲梯等語原任副將胡大勇曾於金川用兵時監造攩牌可傳諭黃廷桂詢問胡大勇令監造一百面由驛站送往軍營或胡大勇外尚有熟諳攩牌工料者亦不妨就便詢問令其監造諭參贊大臣舒赫德派兵探信各事宜上諭軍機大臣曰舒赫德奏稱有居住烏什之布魯特特穆爾占與布魯特頭目等熟識擬派侍衛布占泰同往發兵攻擾喀什噶爾以分賊勢又有現在和闐城之吉林哲魯善曾領回人來見擬知㑹伯克鄂對若回人願同擊賊即酌量鼓勵再探取兆惠信息亦派索倫兵三薩保等六人前往等語辦理俱合機宜但兆惠被圍雖據差來人等謂可守至正月而策應究屬緊要舒赫德曽奏得兵一千即速往援然兵不厭多千人未免稍弱可傳諭舒赫德於新調官兵內量抽一二千續進亦不妨待後隊齊集再行進發以節馬力至哲魯善招降克里雅之伯克阿里木沙等頗屬效力著加恩授藍翎侍衛帶來回人即酌量奬賞飭諭刑部侍郎永貴等不必更换臺站兵丁上諭軍機大臣曰永貴等奏稱看守哈喇沙爾等處臺站之喀爾喀等兵丁請照富德所奏之例撤回游牧以緑旗兵抵補等語前諭撤回年久兵丁係專指軍前進𠞰者並未及於臺站即使應行更換亦應俟新派兵丁到日交代乃先將䝉古兵全撤以緑旗兵抵補所見殊昧事幾可傳諭永貴等所有臺站兵丁仍令其照舊居住無庸更換壬寅命封賞伯克霍集斯等上諭軍機大臣曰兆惠奏稱伯克托克托之弟總管阿卜都賚伯克霍集斯之屬人阿里木布魯特烏默爾額敏和卓之護衛沙丕呢雅斯等奮勇𠞰賊已分别奬賞翎頂緞匹等語霍集斯甫經歸附即率屬奮勉殊可嘉尚著加恩封霍集斯貝子品級俟回部蕩平再加恩賞其額敏和卓等俱著交部議敘諭參贊大臣舒赫德辦理駐劄各事冝上諭軍機大臣曰舒赫德昨請領兵應援已諭永貴駐劄阿克蘇辦事倘此時未到或於阿里衮福祿中酌留一人即領隊之豐安豐訥亨等留一人駐劄亦可伊此次辦事頗屬妥協今又領兵前進著加恩賞戴孔雀翎再帶領健鋭營第五隊之侍衛那林報稱途遇舒赫德差遣催督官兵之西拉木保阿里木保等并傳諭舒赫德伊等既奮勉行走可酌量奬賞癸卯諭定邊右副將軍富德等增帶巴祿隊內新派官兵上諭軍機大臣曰據巴祿奏稱捉生詢問知阿巴噶斯哈丹餘賊欲投俄羅斯因揀選兵馬同圖倫楚達禮善等輕騎追襲餘兵交與敏珠爾多爾濟搜捕嗎哈沁等語阿巴噶斯等餘孽無多伊等兵已足用前諭新派索倫兵五百既未必能趲赴巴祿之隊而富德又現往阿克蘇可傳諭富德定長伊等從烏魯木齊往阿克蘇沿途遇見此隊兵丁即帶領行走如富德已過定長即令其速行趲赴再前諭巴圖濟爾噶爾同巴祿搜捕逸賊後再往回部今應援將軍甚屬緊要亦傳諭巴圖濟爾噶爾速赴富德軍營可也命奬賞西北兩路臺站官兵上諭大學士曰西北兩路臺站官兵連年馳遞軍報頗屬迅速奮勉宜加奬賞以示鼓勵著該督撫飭令專管臺站之大員逐一查明將作何分别賞賚之處詳悉議奏候朕降㫖加恩甲辰參贊大臣舒赫德疏奏將軍兆惠遣送奏稿及現辦兵馬各事冝舒赫德奏言十月二十五日夜將軍兆惠所遣三等侍衛伊薩穆驍騎校扎敦察奬賞藍翎馬甲五十保沙津察烏克什勒圖五人前來據告稱本月十七日夜將軍發交伊等五人文書各一分令突圍而出有能至阿克蘇者交臣處辦理臣接閲係是奏稿謹繕寫具奏復詢問伊等沿途遇賊來追奮力射退馬已疲乏遇臣處遣往探信之六人换馬行走始得至此隨將伊薩穆等四人留住其五十保尚曉事體臣令其馳驛往巴里坤催趲兵馬再臣前得愛隆阿移文時即差署把總蘇由福迎探信息今據取得回文云十月二十日至托罕塔罕有賊六七百人突出接戰與副將定柱𠞰賊百餘人餘賊越山敗走擒獲帶傷賊人訊問據供係波羅泥都霍集占等遣喀什噶爾伯克哈三愛的爾領三百騎㑹合多倫回衆四百謀搶巴爾楚克等處臺站今所領兵丁得傷者二十餘名托罕塔罕臺站被搶兵丁二十人內得脫者十二名其餘臺站未動等語適接貝子玉素富行文調緑旗兵五百前往烏什防守臣因行令愛隆阿將伊所領緑旗兵丁就近派往烏什其所調賽里木等處緑旗兵丁即留於阿克蘇以備進𠞰再愛隆阿於三日內可至阿克蘇又准永貴咨支給新派兵丁行糧用騾六百餘頭駝一百隻運至庫車其阿克蘇以外交臣辦理查此項騾駝照黃廷桂原奏應轉回內地本站但時值冬寒徒多凍斃且阿克蘇轉運軍需正資其用請飭糧運官員送交臣處其現在賽里木拜烏什阿克蘇口糧羊隻合計兵數約敷幾月另繕清單呈覽又進呈定邊將軍兆惠等奏摺云臣兆惠臣額敏和卓謹奏臣等訊問俘獲人等據供霍集占牲隻及沙喇斯戶口俱在城南英峩奇盤山臣等商議收取以分賊勢又因納穆扎爾三泰將到隨派副都統愛隆阿署總兵定柱帶滿洲索倫䝉古兵五百名緑旗兵三百名前往堵截喀什噶爾來援要路并巡查一帶臺站候納穆扎爾到時酌派官兵隨至軍營臣等領兵由葉爾羌城東渡河向城南進兵十月十三日見有賊兵迎出隨即安營選馬兵五六百名與賊對陳遙望賊勢約四五千騎各持鳥鎗長槍在前其步賊在後分持斧瓜棍棒等械溝內亦俱有步賊持鳥鎗排立臣等擬奮勇衝入生擒霍集占或用箭射死便可竣事臣等居中左副都統由屯右溫布齊聲呼噪衝入賊隊鏖戰賊騎敗走步賊即放鎗拒敵我兵暫駐賊騎又從後挑戰臣等正在奮擊賊又從兩翼夾攻因馬力不能馳驟轉回保護大營被賊截為數處互相攻擊賊遂四面合圍計兩次接戰殺賊頗多我官兵陳亡者百餘人受傷者亦多總兵高天喜原任前鋒統領侍衛鄂實原任副都統三格侍衛特通額俱歿於陳馬力疲乏陷於泥淖者甚多現在賊騎數千人步賊亦多與我兵接戰五晝夜臣等欲突圍而出因馬力不足不得已固守大營賊人來犯即以鎗炮攻擊凡我官兵俱受皇上重恩惟思殺賊圖報計口糧尚可支持一兩月現在晝夜防守相機𠞰殺臣等前因阿克蘇烏什既定擒獲渠魁機不可失遂不暇計兵之多寡馬力如何趲行前進俱在聖鑒之中總之輕敵妄進之罪在臣兆惠一人實所難逭然䇿應之兵若於年內能到尚可合力攻𠞰謹具奏稿遣人夤夜突圍送至舒赫德處繕寫轉奏奏入上諭軍機大臣曰兆惠等因𠞰賊被圍以輕敵自咎伊此次進兵甚屬奮勉復有何罪且凡事豈盡前知當我兵抵阿克蘇烏什皆望風歸順則葉爾羌喀什噶爾相繼投誠亦未可定豈必預料其敢於抗拒而轉生退阻今各隊官兵應俱抵阿克蘇聲援既接內外夾攻賊圍必解兆惠等即暫回阿克蘇待來年厚集兵力一舉蕩平此次進攻以勞取逸以少擊衆尚能屢敗逆賊堅守待援先聲所加賊已奪氣將來戡定大功皆基於此已諭加恩封兆惠謀勇公賜寶石頂四團龍補服額敏和卓伯克霍集斯明瑞由屯溫布等俱屬奮勉自必一體加恩可傳諭兆惠將效力之大臣官兵功次詳悉紀録俟回軍時奏聞其突圍送信之五人俱屬效力五十保又至巴里坤催調兵馬著授五十保為藍翎侍衛賜號卓禮克圖巴圖魯賞銀一百兩伊薩穆賜號固永巴圖魯扎敦察賜號昆都爾巴圖魯沙津察賜號克爾車格衣巴圖魯烏克什勒圖賜號克什克巴圖魯賞銀各一百兩其舒赫德差遣效力之人亦著查明具奏至舒赫德領兵應援須得馬兵二千名緑旗兵二千餘名聲威始壯或派伯克霍集斯屬人同往以釋賊衆流言惟在相機辦理并於沿途𠞰殺搶奪臺站回賊愛隆阿定柱昨遇此等賊人即奮勇𠞰殺著同效力得傷官兵交部議敘陳亡者照例議恤併傳諭富德阿里衮及領隊大臣侍衛等遵照節次諭㫖量力黽勉前進舒赫德所奏接續糧運解送弓箭等事亦傳諭黃廷桂清馥辦理宣諭定邊將軍兆惠等功績上諭大學士曰據將軍兆惠奏報領兵抵葉爾羌城逆回堅閉不出當用精兵挑誘擊敗賊衆恐由别路逃竄旋渡河分兵堵截霍集占悉其醜類圍我大兵現已飛扎舒赫德領兵䇿應此皆臣輕敵妄進罪所難逭等語辦理回部一事原因賊首霍集占等向為厄魯特拘囚阿巴噶斯之地自大兵平定伊犁出諸陷穽之中俾仍長其舊部何啻起死肉骨而狼子野心不知感戴生成輒敢負恩反噬甚至戕害將軍所遣之副都統阿敏道及隨從百人若不興師問罪何以振國威而申天討並非朕之好大喜功窮兵黷武也逮我師已得庫車兆惠勒兵前進風聲所過如阿克蘇烏什等城相繼傾心歸化其回部大頭目伯克霍集斯等復效順前驅唯霍集占奔竄葉爾羌是以兆惠率師乘機直入彼時若令其暫駐阿克蘇俟後隊到齊然後併力進取則自此發㫖到日已屬不及然此不過身處局外者事後好為議論則可耳揆諸用兵機宜兆惠尚為有進無退之良將也且我滿洲官兵所向披靡從來無敢抗敵即如今夏兆惠富德等分兵略地所領僅及千人而左右哈薩克東西布魯特各處回衆不煩攻𠞰不待招徠早已爭先納欵其回部一路之阿克蘇等城無不勢如瓦解將謂乘勝長驅直入葉爾羌喀什噶爾亦屬甚易則向來之輕視逆回乃朕之誤又何忍以妄進輕敵為兆惠責乎此蓋數年以來平定準噶爾降哈薩克布魯特實為極盛之㑹而遽有此大兵被圍之信上天仁愛之意朕實欽承感謝矣然霍集占當屢經摧挫之餘本屬計窮力蹙特因回至巢穴煽聚殘衆茍且自延而我師晝夜馳驅亦未免馬力不足以致一時困守待援所幸先事綢繆朕於六七月間即次第派遣索倫察哈爾健鋭營及陜甘之緑旗兵前往策應馬匹糧餉亦已籌運在途若無此接濟則事誠危險然其時初不知有兆惠今日之奏報也可見蒼穹垂佑默啓朕衷朕實感悚有此部署計現在可陸續俱抵葉爾羌矣兆惠等與援師合力其氣倍增從兹掃穴犂庭凶渠就縛庶幾上申國憲下慰忠魂軍務可告成事至若身膺閫寄奮勇直前計不返顧乃我滿洲大臣從來敦朴舊俗今兆惠統軍深入志在滅此朝食自不暇輾轉以為身謀忠誠勇敢朕實深為嘉豫兆惠著由一等武毅伯加二字晉封為武毅謀勇一等公加賞紅寶石帽頂四團龍補服以彰奬勞勸功之典額敏和卓著賞給郡王品級伯克霍集斯著晉封貝子加貝勒品級俱賞給寶石頂四團龍補服明瑞溫布由屯及在事之大臣侍衛等俟兆惠至阿克蘇時查明奏請加恩優敘兵丁等著照初次出兵給與整裝銀兩之例按名賞給其陳亡之高天喜鄂實三格特通額四人奮勇殺賊盡瘁捐軀深可憫惻高天喜著照一品大臣例賞給恤典鄂實三格各照伊原任前鋒統領副都統特通額照頭等侍衛從優議恤其餘陳亡帶傷官兵將軍等查明冊報一體分别賞恤將此通行曉諭知之臣等謹案行師撻代罙入為先當我兵進取回城逆酋霍集占兄弟屢經摧敗之餘鼠伏一隅久已神惢膽墮且列城相繼迎降自可乘機直入設爾時稍事遲回使賊得以繕完保聚且或新附猜疑則大功之成未必不遷延嵗月將軍等捲甲疾趨深探虎穴雖偶爾被遮而士氣益揚愈增敵愾復能以少擊衆處險如亨賊益讋聲威而沮喪戡定之速實由於此兆惠等方以輕進引咎而我皇上嘉其奮勇晉爵酬庸且申諭以勢當急攻事難逆料使從來假恇怯為持重者無可藉口實足以釋古今之惑而闡韜鈐之祕矣至於神謀廣運炳燭幾先調兵選馬皆半年前早為部署本欲以均行間之勞逸壯奏凱之觀瞻耳惟時士馬並次中途一旦檄趣赴援參贊等遂得長驅直進聲援有資內外夾攻捷書迅奏實皆淵衷睿略默契天心凡助順之鴻禧悉協宵旰所籌畫是知計出萬全固非輕於一試彼拘主客多寡之見者烏足以語非常之偉烈哉諭參贊大臣巴祿等㑹審臺站侍衛揭報情節上諭軍機大臣曰永貴等奏稱喀喇沁藍翎侍衛達爾扎桑揭報固爾圖喀喇烏蘇臺站被竊馬匹追擒一賊巴祿訊係哈丹所屬令臺站人等不許妄報請交富德查審等語昨據巴祿奏稱擒獲賊人察罕托克訊知哈丹等餘賊在齊爾等處藏匿隨領兵前往追𠞰等語是達爾扎桑所揭殊屬可疑自應根究明白已諭富德速行應援兆惠不必交令查審俟巴祿追賊轉回㑹同定長將達爾扎桑所揭情節訊明具奏命宥原任將軍革職以兵丁效力之達爾黨阿哈達哈罪授為三等侍衛馳驛來京再赴軍營效力行走乙巳諭大學士管陜甘總督黃廷桂籌備軍營馬匹上諭軍機大臣曰辦理回部一事原謂今年可竣是以前諭黃廷桂預備駝馬候兆惠文到應付今兆惠兵抵葉爾羌𠞰賊被圍已降㫖通行宣諭前派索倫察哈爾健鋭營等官兵諒陸續可到兆惠得此應援或尚不能就緒必應整兵再舉計兆惠所領之兵約有四千合之新派官兵四千西安滿兵二千達什達瓦部內亦可得一千及將來派出緑旗兵丁應有一萬五六千之數於來春齊集所需馬匹正多黃廷桂前奏有現在牧養馬匹來春可得二萬之語可傳諭黃廷桂再為籌備多多益善至糧餉一事尤關緊要其應作何廣為儲備速行轉運不致臨時周章俱宜悉心妥協辦理一面奏聞命領隊大臣公明瑞來京上諭軍機大臣曰將軍兆惠將來與援師合勢回駐阿克蘇整兵再進期在來春自當候辦理回部事竣凱旋京師至領隊大臣為數尚多明瑞即著馳驛來京朕面詢軍前情形不必以情願留軍效力固執陳奏命免擒獲賊匪之扎薩克達什彭楚克等處分上諭軍機大臣曰據福祿等奏稱扎薩克達什彭楚克副都統銜莫尼扎卜領兵將盜竊阿噶里卡倫馬匹賊首布爾古特達魯噶哈拉布奈等八人擒獲解送烏里雅蘇台軍營其為從賊匪十七人俱行釋放現飭伊等查拏等語所辦甚是可傳諭成衮扎布再行嚴飭查拏務獲其擒獲賊首之察哈爾喀爾喀官兵俱酌量奬賞至達什彭楚克等既獲為從賊人即當報明將軍大臣候示乃擅自釋放理宜議罪姑念獲賊有功從寬免其處分丙午命升賞搜獲逸賊官兵及撙節臺站馬匹等事宜上諭軍機大臣曰據富德奏稱噶爾藏多爾濟舊游牧昌吉等處聞有藏匿之嗎哈沁遣額爾登額老格等搜捕索倫署參領翁奇勒圖等縳葦渡河領催那木扎厄魯特兵丁伊什直入賊隊生擒一人叱衆投降將厄魯特護衛哈坦博羅特等二十餘人收獲解交永貴處酌量辦理等語此等賊人雖無關緊要但官兵等尚屬奮勉翁奇勒圖賞戴孔雀翎那木扎伊什俱授為藍翎侍衛其餘效力官兵俱酌量奬賞收獲之厄魯特等若屯田處不需用即送京備賞又諭曰適據富德奏綽羅斯台吉三濟扎卜由驛送京備詢又五吉清馥查出白和卓之妻米里格等五口送京俱行知該管大臣但沿邊所設臺站原為馳發諭㫖及軍營奏報其尋常事件若一槩馳驛則馬匹未免勞乏要務轉致稽遲可傳諭陜甘總督及巴里坤辦事大臣等嗣後解送人口非急需詢問者皆由西安一路以撙節沿邊臺站馬匹平定準噶爾方略正編卷六十四
