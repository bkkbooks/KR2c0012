  text: 欽定四庫全書平定準噶爾方略續編卷二十三
  hash: sha256:7fda952371e0d830bf5ee4c9a9a23c94ccdeaabab2544517e0f3d7c276916a2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_162-1a, image: WYG0359/WYG0359-0815c.png}
body:
  text: 乾隆二十八年十月乙酉伊犁辦事副都統伊勒圖疏奏巡查哈薩克越境遊牧并烏默爾等移駐伊犁情形伊勒圖奏言臣接奉諭旨令往特穆爾圖淖爾等處巡查哈薩克遊牧并查詢楚穆訥爾地名在於何境臣即詢之前在特穆爾圖淖爾等處遊牧之厄魯特據稱哈薩克遊牧之前地名西喇烏蘇哈薩克呼為西喇蘇其楚穆訥爾係一泉名源在吹之左近索和羅克哈喇巴勒塔地方又聞此等處常有哈薩克乘間遊牧來去無定頃明瑞等業已遵旨往查誠如皇上洞鑒臣愚以為嗣後應出其不意兩路前往巡查南路自特穆爾圖淖爾之南由巴爾琿嶺至塔拉斯吹地方北路沿伊犂河由古爾班阿里瑪圖至沙喇擘勒地方方能周遍再哈薩克烏默爾之弟瓜特色楞伯特二人去歲入覲蒙恩賞給五品頂翎并準其移駐伊犂現在擕帶眷屬牲隻來至卡倫理應遵照所指之處居住乃妄稱與厄魯特同居不便欲於卡倫外和洛霍澌庫隴癸等處居住又稱無糧難以度日懇求給與種種虛詞惟圖僥幸臣等詳細曉諭令於章什左近居住瓜特等又云去歲將軍成衮扎布曾傳諭旨烏默爾移駐伊犂後令於八月十五日至圍場朝見等語但詳閲成衮扎布移文並未提及其妄可知臣等留心察看俟烏默爾到時再與明瑞等定議如何給與遊牧辦理具奏奏入報聞戊子諭定邊左副將軍成衮扎布等安插自哈薩克逃出之厄魯特等事宜上諭軍機大臣曰成衮扎布奏稱從哈薩克逃出之厄魯特沙鼐布庫瑪木特等酌擬曉諭都爾伯特烏梁海等附入安插等語現在伊犂編設厄魯特佐領著傳諭成衮扎布等即將沙鼐等解送伊犂安插嗣後再有此等遇解送馬匹牲隻之便一體辦理不必專行送往己亥命議敘辦理奎素屯務員辨上諭大學士曰楊應琚等奏稱辦理奎素屯田官兵甚屬奮勉請將千總劉如桂等交部議敘等語劉如桂田希華馬成宗劉廷柱楊天成俱交部議敘所有出力兵丁著賞給一月錢糧在屯遣犯著賞給一月口糧至原任佐領柏靈保千總常際春各賞兵丁錢糧一分以示鼓勵辛丑命副都統李景髙等往新疆辦事上諭軍機大臣曰伊勒圖永瑞范時綬德爾格新疆辦事年久應派人更換伊犂大臣已有多人不須派換伊勒圖著即回京副都統李景髙著往烏魯木齊頭等侍衛額爾德蒙額著往晶河副都統髙廷棟著往闢展辦事更換永瑞等回京丙午命奬賞捐麥之伯克阿卜都拉等上諭軍機大臣曰據素誠奏稱自阿克蘇往伊犂之回人其口糧本須採買今阿奇木伯克阿卜都拉等情願於官用八百石照數採買之外再行捐麥四百石摩羅和卓願捐麥一百石懇準其所請陸續解送等語阿卜都拉等感激朕恩願捐麥自效甚屬可嘉著交與素誠照例酌量奬賞癸丑諭定邊左副將軍成衮扎布等辦理哈薩克逃人事宜上諭軍機大臣曰明瑞等奏稱巡查塔爾巴噶台等處哈薩克汗阿布勒比斯來索逃往伊犂之厄魯特且言從前曾有給回之例臣等將阿布勒比斯斥責諭以準噶爾業已平定哈薩克等所獲之厄魯特理應收取但念爾等亦係臣僕未經辦理今投至伊犂乃其故土如何稱係逃人并求降旨烏里雅蘇台將軍一體辦理等語明瑞所辦甚為得體從前雖無彼此不留逃人之言但成衮扎布曾將自哈薩克逃出之厄魯特給回阿布勒比斯遂欲援以為例著傳諭成衮扎布等嗣後遇此等事俱照明瑞等所辦駁之十一月甲寅朔申諭定邊左副將軍成衮扎布等嗣後哈薩克逃人毋得給回上諭軍機大臣曰昨明瑞奏哈薩克阿布勒比斯等索取逃入伊犂之厄魯特將阿布勒比斯嚴行駁飭所辦甚是已降旨成衮扎布嗣後悉照明瑞所辦毋許給回但成衮扎布等原奏因哈薩克脫逃之厄魯特伊等自行半路追獲且並未入我境內是以給伊領回若業經逃入內地即哈薩克再四來告亦斷然不可給與著再傳諭成衮扎布明瑞等遵照分别辦理仍將成衮扎布原奏寄明瑞等知之乙卯以定邊左副將軍成衮扎布入覲命參贊大臣扎拉豐阿往烏里雅蘇台署理將軍印務副都統雅郎阿暫往科卜多辦事戊午命原任給事中塔坦前往烏里雅蘇台辦事更換富勒賀回京辛酉陜甘總督楊應琚疏奏改設臺站事宜楊應琚奏言臣由巴里坤閲看營伍沿途親勘各營站俱屬妥協惟自沙州至庫克沙什地有沙磧恐馬力不繼於適中之黃墩堡設立腰站今查得該處地方俱係窪下與其在黃墩堡設立腰站莫若將庫克沙什一臺移設土窰子地方道路平坦里數亦屬相仿其黃墩堡腰站即可裁汰再自沽水至哈什布拉克約一百數十里俱係戈壁原於適中之紅栁硤設立腰站因井水味鹹難供汲飲故未安設正站今於紅柳硤四十里內訪有四道湖甜水用騾拉運一日可以往還應將紅柳硤改為正站奏入報聞丁卯命駐劄新疆大臣準其擕帶家口上諭軍機大臣曰現今西陲平定各該處大臣更番駐劄非從前軍營可比嗣後伊犂烏里雅蘇台喀什噶爾葉爾羌等處駐劄大臣有願帶家口者照各省將軍大臣例準其擕帶如不願者聽命升賞督造營房之參將職銜吳士勝等上命軍機大臣曰據旌額理等奏稱特訥格爾蓋造營房臣等派參將銜之吳士勝督率緑旗兵二百四十名於去年十一月起至今年九月止造成房屋一千三百十四間又以餘力修補特訥格爾及烏魯木齊兩處城郭等語吳士勝督兵造房甚屬奮勉著加恩補授參將其兵丁等交旌額理等酌量賞給以示鼓勵烏魯木齊辦事侍郎副都統旌額理等疏報挈眷移駐烏魯木齊兵丁全到日期旌額理等奏言準總督楊應琚派員送來挈眷移駐烏魯木齊兵丁五百二十二户男婦一千七百九十六名口於十月十三日以前陸續到齊臣等隨發往特訥格爾令往新造兵房伊等目覩地畝收成生計豐裕皆欣然得所所有應行更換之員辨照例遣回本營奏入報聞戊辰命揀選侍衛五員發往喀什噶爾上諭軍機大臣曰據納世通等奏稱喀什噶爾原派侍衛十五員現在缺少五員請揀選發往等語著領侍衛內大臣照例㨂選帶領引見發往喀什噶爾以備差遣己巳恩賞索回逃人之乾清門侍衛納旺並免領隊大臣五岱等失察處分上諭軍機大臣曰明瑞等奏稱納旺前往阿布勒比斯遊牧索取厄魯特逃人鄂勒錐圖詳細諭以利害其屬人綽特拜畏懼將鄂勒錐圖獻出隨即帶回臣等傳集衆厄魯特數其逃竄之罪立行正法其失察之領隊大臣五岱等請交部察議等語納旺奮勉可嘉著賞緞二匹五岱等係初次失察著加恩免其交部伊犂將軍明瑞等疏奏派定各城種地回人數目及移駐兵丁車輛行走山路情形明瑞等奏言據阿奇木公木薩回至伊犂呈稱應派各城種地回人一千五百户派出阿克蘇二百七十户烏什二百户喀什噶爾三百户葉爾羌和闐四百户賽里木拜一百三十户庫車沙雅爾一百五十户哈喇沙爾多倫五十户同員外郎拖穆齊圖按城分行驗看俱年壯可以效力之人其家口册籍並行查核收明再所派數內匠役二十六户先行帶來製造器具應照例辦給口糧再臣等準涼州將軍巴祿咨稱涼州莊浪兵丁三千二百名挈眷移駐伊犂分作三年每年一起前往此項官兵皆坐車輛自涼州至晶河並無大山可以安行自晶河前去山嶺險峻務須酌定行走之處等因臣查晶河至托和木圖臺站尚可車行惟呼蘇圖布拉克臺站中間有一里不可行車又自塔爾巴噶台伯勒齊爾臺站至闥勒奇阿璊亦不可行車臣等向已勸諭往來商賈漸次修理平坦應再派官兵於中路崎嶇之處加意平治俾挈眷移駐兵丁到時無卸車馱負之纍仍行知闢展烏魯木齊等處大臣訖奏入報聞伊犂將軍明瑞等疏奏會辦涼州莊浪兵丁移駐事宜明瑞等奏言臣等於二月十五日欽奉諭旨辦理涼州莊浪滿洲兵移駐伊犂事宜臣楊應琚即赴涼州會同巴祿將兵丁行裝各項逐一查明派員赴出産之地置備其餘銀兩照例至伊犂補給但新疆地方現有移駐之滿洲兵與索倫察哈爾兵人户衆多物價未免昂貴臣等仰體聖主惠愛兵民之至意往返札商與其厚利歸商莫若令旗人分獲利息請將前項餘銀交臣巴祿派委妥幹旗員臣楊應琚飭令地方官將日用必需物件從內地採辦購買載運牲隻車輛交三起移駐官兵陸續運至伊犂臣明瑞預辦房間開設店鋪擇人掌管按月查訪市價酌平增減每年所得餘利一體均散兵丁以為買補馬匹修理器具之用於兵丁等久遠生計大有裨益奏入報聞癸酉命議敘承辦三屯種地官員上諭軍機大臣曰據伍彌泰奏稱三屯種地兵丁每兵種地二十畝現在收獲米麵十四石至十五石不等可否將辦理屯田官員及兵丁等加恩之處請旨等語著照所請官員等交部議敘兵丁各賞一月鹽菜銀兩以示奬勸諭定邊左副將軍成衮扎布等曉示哈薩克屬下頭目毋得遣使請安上諭軍機大臣曰據成衮扎布等奏稱哈薩克哈喇巴魯克遣人請安並進獻馬匹哈薩克屬下微末頭目甚多不便令其任意行走理應曉諭遣回現派伊爾哈納令伊等暫駐卡倫臺站候旨遵行等語成衮扎布所辦甚是哈薩克阿布勒瑪木比特阿布賚等遣使來請朕安自應辦理護送若此種微末頭目但可親身入覲何得亦稱遣使著傳諭成衮扎布即作伊等意見曉示哈喇巴魯克來使云爾等職位甚卑不敢遽令入覲至爾頭目遣爾等前來之處業已順便奏聞仍即行遣回再哈喇巴魯克所遣之人原向阿布賚領取文憑應將此情由一併傳諭阿布勒瑪木比特阿布賚等知之烏魯木齊辦事散秩大臣伍彌泰疏奏修造瑪納斯晶河等處橋梁伍彌泰奏言查瑪納斯晶河為明歲所遣駐防兵丁經由之路所有橋梁渡筏必須修造堅固臣於三月抵庫爾喀喇烏蘇已委員陸續修造現在農務俱畢應多派兵丁乘時伐樹修造橋梁並多備大木倘有沖塌之處即時修補奏入報聞丁丑命革勒買哈薩克馬匹之二等侍衛穆森泰職並豫枷責示懲上諭軍機大臣曰成衮扎布等奏稱三等侍衛穆森泰向哈薩克勒買馬匹私許物件並未給與又蒙古密濟特勒索哈薩克馬匹許給倭緞亦未交付除將伊等原索馬匹交前來之哈薩克額德格等轉給本人外穆森泰請交部嚴加議處密濟特請枷責等語前經降旨哈薩克帶來馬匹官定價值不許私相貿易乃侍衛穆森泰輒敢私換馬匹所許之物又不給與甚屬不堪即穆森泰所稱給過羊隻並銀三十兩之處亦未可信伊如果給過銀物哈薩克等何以又索取轡頭等項且哈薩克豈有以馬二匹換羊二隻之理顯係穆森泰婪索敗檢揑造虛言冀圖掩飾成衮扎布等不行細加詰問僅請交部議處何足示警穆森泰著革去侍衛即於該處枷責以昭炯戒並傳諭成衮扎布等俟哈薩克到時即諭以我處官員因私換爾等馬匹具奏大皇帝治罪倘爾等揑詞陷害亦必從重辦理斷不寬恕仍即將穆森泰勒索馬匹給還其蒙古密濟特著照所奏枷責命議敘承辦伊犂屯田事務官員上諭軍機大臣曰明瑞等奏稱今年伊犂緑營兵丁耕種地畝所收米麥胡麻各項俱較上年分數倍多可否將種地官兵加恩之處候旨等語著照所請將辦事官員交部議敘兵丁等照例賞賜以示鼓勵申諭成衮扎布等曉示哈薩克哈喇巴魯克來使即行遣回上諭軍機大臣曰成衮扎布等奏稱據扎拉豐阿咨稱有哈薩克十八人前來獻馬隨令筆帖式阿林保詢得來使七名跟役十一名貢馬九匹并獻出從前令哈喇巴魯克帶去厄魯特六户等語昨成衮扎布等將哈薩克哈喇巴魯克遣使前來具奏即降旨曉諭遣回今扎拉豐阿既將來使送至烏里雅蘇台著成衮扎布等仍遵前旨曉諭遣回所進馬匹及六户厄魯特令其帶回若情願存留即作成衮扎布意見照貿易馬匹及收贖厄魯特之例折價給與再阿布賚給哈喇巴魯克之托忒字文憑翻譯閲看乃哈喇巴魯克奏文哈喇巴魯克係小頭目不應奏事應交成衮扎布等一併曉示來使知之命陜甘總督楊應琚酌辦運送伊犂茶封上諭軍機大臣曰據明瑞奏內地存貯茶封現在運送口外散給官兵於鹽菜銀內坐扣但伊犂兵丁俱帶有家口及厄魯特回人等需用甚多可否於現送二萬包之外增送數千包等語伊犂官兵需茶甚多自應寬裕運送以資食用著傳諭楊應琚酌量辦理並將茶封成本每包計值若干自甘省運至伊犂腳價若干其給發官兵坐扣鹽菜銀兩果否敷用詳查具奏庚辰恩賞阿克蘇阿奇木伯克散秩大臣色梯巴勒氐公品級上諭軍機大臣曰阿克蘇阿奇木伯克散秩大臣色梯巴勒氐前隨將軍兆惠出兵曾經奮勇效力著加恩賞給公品級以示酬庸之典議覆移駐新疆巡檢事宜軍機大臣奏言據旌額理等奏羅克倫昌吉二處種地兵丁巳陸續移駐其辦事之官亦應隨兵遷移請將羅克倫巡檢移駐特訥格爾歸烏魯木齊同知管轄昌吉巡檢移駐呼圖畢歸昌吉通判管轄應如所奏辦理其巡檢圖記既經改設請令旌額理擬定字樣交禮部鑄給奏入報聞十二月己丑定邊左副將軍成衮扎布等疏奏科卜多修造城垣事宜成衮扎布等奏言據科卜多參贊大臣扎拉豐阿咨稱科卜多地方商販漸多又建有倉庫應即遵旨修城給兵民居住現在烏里雅蘇台貯米甚多一切官兵支給本不專藉科卜多所收糧石其種地之緑旗兵四百名似尚有餘力請於此內酌派八十名委員監視修城兩年之間可以告竣既於屯田無誤而城工又得修葺實為兩便等語查科卜多修城從前酌定於屯田之暇舉行今扎拉豐阿欲於緑旗兵內撥派趕辦原為約束兵民起見應如所咨辦理奏入報聞庚寅申諭阿克蘇辦事都統侍郎海明等訊審索倫逃兵上諭軍機大臣曰前據海明等奏拏獲索倫逃兵額伊勒木保審擬治罪朕即降旨令將額伊勒木保訊明如果葉爾羌等處有伊繫戀之人事涉無恥應較尋常逃犯加倍治罪若係一時愚昧並無别故則照常例治罪今海明等仍將額伊勒木保照前擬絞監禁阿克蘇秋後處決辦理殊不明晰或尚未接到朕旨亦未可知著傳諭海明等務遵前旨審出實情定擬具奏壬辰命賞總兵丑達副都統銜往庫倫辦事癸巳諭定邊左副將軍成衮扎布等曉示哈薩克人衆毋許與烏梁海貿易上諭軍機大臣曰成衮扎布等奏稱哈薩克巴勒圖比爾等因阿布賚令向烏梁海內大臣察達克講和并稱係貿易商人擕帶牛馬來至額爾齊斯地方已經察達克之子烏爾圖納遜盤詰逐回應請俟哈薩克人到京時降旨飭諭毋得擅入邊境等語哈薩克人貪鄙性成其屬下人衆聽其往來難免盜竊爭鬭之事成衮扎布等嗣行驅逐辦理甚妥著傳諭成衮扎布等嗣後再有貿易人來應交察達克圖布慎諭以內地商人俱在伊犂烏魯木齊爾等若欲貿易自可前往且此間並無管理貿易之員萬一滋生事端亦於爾等無益是以將軍等禁止貿易諭畢遣回并將此交軍機大臣於哈薩克人到京時亦照此明白曉諭之甲午命布政使富明安往巴里坤辦事更換溫敏回京己亥巴里坤辦事原任巡撫鐘音等疏奏安設腰站事宜鐘音等奏言臣等所管巴里坤臺站由洮賚站起至那呼站止相隔一百四五十里因俱係戈壁並無水泉故未設立腰站今委員踏看掘出井水二處請即於井旁各蓋房三間從别站內通融派兵四名馬八匹分交二處作為腰站一應馳遞事件益覺迅速而人馬俱免疲乏奏入報聞壬寅命議敘喀什噶爾辦事道員固世衡上諭軍機大臣曰據納世通等奏稱道員固世衡在喀什噶爾辦事奮勉實屬稱職應請旨交部議敘等語固世衡實心辦事殊為可嘉著加恩交部議敘命以發遣烏魯木齊種地兵丁綽勒們等歸入緑旗營缺上諭軍機大臣曰旌額理等奏稱發遣烏魯木齊屯田有罪兵丁綽勒們等一百九十一名自到烏魯木齊後各奮勉耕種甚屬安分請入於擕眷駐防之緑旗兵內俟內地各營缺出陸續坐補等語著照所請交楊應琚俟各營有缺額兵丁即令綽勒們等坐補俾得自新以觀後效烏魯木齊辦事侍郎副都統旌額理等疏奏募種地畝俱獲豐收情形旌額理等奏言烏魯木齊招募民人六百餘户所種地畝本年俱得十分收成查去歲因遇鼠災蒙恩賞給籽種口糧以資接濟現今已獲豐收理應交納但民户甫經安插生計未充臣等仰體聖意將所借之項酌量緩徵以紓民力嗣據民人張國寧等一百五十六户呈稱明年所需籽種口糧業已存貯請將所借官項即於本年交還情辭懇切此皆小民等感戴天恩是以不待督催急公完辦臣等因淮其所請收納貯倉訖奏入報聞乙巳議雅爾地方築城駐兵事宜伊犂將軍明瑞等奏言臣於去年面奉諭旨令籌辦塔爾巴噶台駐兵之事臣到彼留心詳看於塔爾巴噶台山陽雅爾河以東之古爾班喀喇烏蘇地方立木為築城記號伏查卡倫馬厰共需馬兵一千五百名屯田緑旗兵五百名原議周圍安放卡倫二十一處每處派兵二十五名約共需兵五百餘名此項卡倫與哈薩克交界甚近而去伊犂雅爾河二處近者二三百里逺者千里派兵往守有鞭長莫及之勢恐不足以資防範臣等愚見與其將兵五百名分於各處莫若停止周圍所放卡倫以集兵力而令屯田兵丁俱駐劄雅爾城再留馬兵三百名在城照管貿易所餘之兵即交領隊大臣裹帶口糧於周圍地方從容巡查方為有益至雅爾城既經駐兵與伊犂往返文移必須設立臺站請自額敏河沿至巴爾楚克沁達蘭三處每處駐兵三十名設大卡倫三座其庫克托木嶺等處卡倫或酌量安設或照舊展放所需兵丁俱於相近地方輪班派出如此則塔爾巴噶台周圍聲勢相接而哈薩克懾我軍威自不敢潛來遊牧至所需之兵若從伊犂挈眷兵內派往恐伊等於軍務未能習練若從打牲索倫兵內派往則須明年方能全到遊牧未定亦有不便應請派京兵黑龍江兵或盛京錫伯兵前來駐防方為妥協此項兵駐劄三年至換班之時即可就近選派停止內地發往再現今烏魯木齊駐兵較多於巴里坤請將烏魯木齊巴里坤辦事大臣撤回其巴里坤提督移駐烏魯木齊烏里木齊總兵移駐巴里坤至從前所放卡倫侍衛十一員仍舊遣回分在伊犂塔爾巴噶台駐劄以備差遣尤於地方有益奏入得旨軍機大臣議奏尋議塔爾巴噶台與伊犂相接君不築城駐兵設放卡倫巡查遊牧則西北兩路聲勢不能聫屬今明瑞等相度形勢詳定具奏臣等按圖細閲其築城及設放卡倫之處俱合機宜應如所奏辦理至雅爾地方明年築城則塔爾巴噶台後年即需駐兵其時挈眷移駐伊犂之滿洲索倫察哈爾兵尚未全到若自京城黑龍江等處再行派往未免繁瑣應將築城事務改於三十年辦起俟三十一年移駐伊犂之兵各已到齊再照原議酌選精壯令其駐防塔爾巴噶台如謂移駐伊犂之兵不足自應將內地兵丁酌量派往查熱河有達什達瓦部厄魯特兵六百名應派出五百名喀喇和屯冇滿洲蒙古兵二千名應派出一千名又盛京有錫伯兵四五千名應派出一千名俱於明春挈眷遣往伊犂再塔爾巴噶台駐兵之後哈薩克不至烏魯木齊貿易明瑞等所請撤回大臣改駐提督總兵及分派侍衛之處度量事勢俱屬可行應令與楊應琚等公同酌辦奏入得旨雅爾地方築城駐兵應專派大臣鎮守伊犂所有將軍大臣甚少既令巴里坤提督移駐烏魯木齊即將烏魯木齊大臣移駐雅爾巴里坤既改駐總兵則巴里坤大臣可以全行撤去至出派熱河兵丁時所有樺榆溝駐兵二百名盡行派往再於喀喇和屯兵內㨂派八百名餘依議行丙午諭護送哈薩克來使之侍衛拉卜棟阿迅速進京上諭軍機大臣曰明瑞等奏稱哈薩克阿布勒比斯等遣使䇿伯克等七人隨役五名已派三等侍衛拉卜棟阿等伴送京城等語著傳諭拉卜棟阿帶領來使能於明年正月十五日以內到京甚好遲則十九日亦可若二十五日以內不能到來即具摺奏聞亦不可令來使中途過於勞苦將此並寄知駐劄烏魯木齊哈密大臣等如來使馬匹疲乏酌量更換俾得行走迅速早抵京師丁未命副都統綽克托往烏魯木齊辦事更換旌額理回京平定準噶爾方略續編卷二十三
