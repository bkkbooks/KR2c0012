body:
  text: 雍正九年夏六月庚戌寧逺大將軍嶽鍾琪疏報巴里坤城工嶽鍾琪疏言臣遵旨於巴里坤相地築城方八里髙二丈城基廣二丈頂一丈於嵗之四月十五日興工以及月城炮臺角墩垜墻一切於五月二十九日竣事其堞樓石橋角樓方次第建築所費工價等項具册呈請核銷奏入得旨下部知之辛亥寧逺大將軍嶽鍾琪奏援吐魯番命密籌定議以聞嶽鍾琪疏言賊人圍魯克察克四十餘日不下復以木梯三百攻喀喇和卓城堡回漢兵前後殺賊凡五百餘賊聞大兵將至輒倉皇遺棄器仗馬匹及所炊熟食而退總兵官張元佐等倍道追之賊已竄散即抵魯克察克城下回目額敏和卓及老幼男女出郭歡迎張元佐等雖並奮勇滅賊而天暑馬乏不敢窮追今臣以撥往馬兵駐一千於魯克察克餘悉撤回倘賊又率二三千人來侵官兵與回兵已足抵禦若傾衆而來臣當親統大軍𠞰殺俟我軍進擊烏魯木齊後可令官兵千人護送回民移入內地奏入得旨賊夷侵犯吐魯畨之衆實由我軍屯運糧石啓釁以致有不得不應援之勢今官兵遄行空勞往返恐將來似此無益之舉正多不知大將軍亦曾計及此否此番回民感戴救濟之恩歡聲大震恐將來賊夷切齒於吐魯畨必思報復以大力侵凌之儻至狼狽流離時不知仍似此感戴乎目今賊夷以三萬衆侵犯北路現據靖邊大將軍傅爾丹等奏報前嶽鍾琪曾有親統大兵前往吐魯畨𠞰殺而留紀成斌看守之奏假若賊人此畨不向北路而向西路將賊衆分為兩大隊以一隊先侵吐魯畨及嶽鍾琪領兵應援前往賊人又以大隊侵犯軍營再散其醜類於塔勒納沁及圖古里克等處不知我軍之力尚可從容肆應否今賊夷圍困魯克察克喀喇和卓二城官兵冒暑逺行疲勞士馬未遇一人未戮一賊而嶽鍾琪奏摺中有奮勇滅賊之語將以此畨之舉遂為建功樹績於戎行乎賊夷聞風而遁可謂懼我軍威乎即留兵駐防與遷移回衆朕意尚無定見大將軍身在軍營與遙揣者不同若果確有所見自當因時制宜以身任之總之向後若有應援吐魯畨之舉只可委將發兵即賊首親來攻取吐魯畨大將軍亦不可統兵前往吐魯畨一切事宜嶽鍾琪當與伊禮布常賚石雲倬等詳密籌畫作速定議壬子西安鳳翔民納運糧餘米命賞賚有差陜西總督查郎阿疏言西安鳳翔二府民挽運甘肅等處米十五萬石恐長途耗損每一石輒多持一二升為備今一路安行米無虧折收糧有司纍報餘米前後可得千餘石並令收貯奏入得旨數年以來秦省民人運送軍需俱無遲誤是以朕屢次加恩以示優恤兹因挽運西鳳米糧以資軍食特令加添腳價務期運送從容而領運之民人等敬謹承應於交完正米之外尚有餘米交官其急公敬事之念甚屬可嘉著該署督等查明交米多寡之數分别賞賚務令本人實霑恩賜勿致胥吏中飽以副朕加恩秦民之至意命執叛賊諾爾布等至京鞫訊協辦西寧總兵官事務德成等奏言擒獲叛賊諾爾布里塔爾等詢之云青海諸部合謀令我率騰格里兵為逆郡王額爾德尼額爾克托克托鼐之子阿喇布濟亦欲作亂陰約以青海全軍為援奏入得旨朕料青海王台吉等世受國恩斷無負恩背叛之事親王察罕丹津一聞伊姪拉察卜遁逃即遣人追趕郡王盆蘇克旺扎爾聞達什策凌搬移即率兵將達什策凌帶回郡王額爾德尼額爾克托克托鼐父子宣力行間伊子協理台吉阿喇布濟現在與恭格一同追擒諾爾布伊等果有異心寧肯如此奮勉宣力乎著將諾爾布里塔爾俱解送來京訊明緣由再行辦理丁巳命樊廷候旨再行陛見上諭兵部曰前降旨令陜西固原提督樊廷於秋涼時來京陛見其印務著范時捷署理今署陜西西大通總兵官管承澤帶領兵丁前往柴達木地方駐劄其西大通總兵官印務著范時捷即前往署理固原提督事務緊要樊廷到任且不必來京陛見候諭旨行若有應奏事宜著具摺陳奏戊午甘肅巡撫許容條奏青海事宜許容奏言亂賊諾爾布等攪擾臺站較拉察卜等罪尤重大達什策凌現已擒獲應請即明治其罪諾爾布妻子已檻送京師其逃遁之衆務期追獲誅其魁首庶足以示懲創又西寧兵馬鎮標額兵四千城守營兵二百五十益之以西安緑旗兵一千滿洲兵一百及應援等兵通計不下五千有餘更以土兵協助士馬富強守禦援𠞰無虞不足應請無庸加增又按西寧至柴達木八百餘里青海居其中應請於適中形勝之地移駐滿漢兵彈壓又西大通一鎮左為西寧唇齒右為涼甘籓籬關係綦重今署總兵官印務管承澤為人巽懦退縮似非將才德成馮允中雖同往來署理亦不能分身坐鎮應請旨持簡専員管理印務又噶斯統兵大臣格默爾於諾爾布等既不能撫馭安輯於前又不能即行擒𠞰於後未足膺兹巨任副統統達鼐辦理數年夷情地理皆悉近復追擒拉察卜等或宜以之専司統領以重職守又青海諸部宜加宣諭我皇上懷柔荒服一視同仁即如採買駱駝馬羊諸物亦就彼所欲售從優給直况興兵費帑實以塞外回民為準夷凌暴取彼凶殘以安良善司事各官均宜奉揚德意明白開諭庶俾夷衆咸得曉然於我朝覆庇保護之恩各懷尊親之戴矣奏入報聞己未命練習陜西等處新募兵上諭大學士等曰陜西西安督撫標下俱有新募入伍之兵丁必須勤加操演始可資戰守之用朕思撫標之兵有撫臣親自操演自然技勇日漸嫻熟督臣現駐肅州其標下辨員又大半隨往軍營現駐西安者未必多人或至訓練稀疏亦未可定侍郎馬爾泰辦理軍需駐劄西安著將督標之兵丁隨時練習加意教誨務使有勇知方以備國家干城之選命擢鑲白旗護軍統領公博爾屯為鑲黃旗滿洲都統正藍旗滿洲副都統覺羅海蘭為鑲白旗護軍統領仍留軍營七月癸亥命籌噶斯柴達木兩路防禦上諭大學士等曰噶斯一路甚屬緊要現今交青海王台吉等將伊等遊牧之處如何保護備禦等事定議其柴達木地方不必用青海兵丁駐劄著𣲖內地兵丁四千六百名防戍選西安駐防滿洲餘丁給役陜西西安將軍秦布奏言西安額設兵八千名今戶口將及四萬請於滿洲餘丁中選千人月給餉銀一兩米三斗令其給役遇調遣處依馬兵例撥往事竣陸續裁汰大學士等議覆應如所請奏入上從之丙寅命議伊遜察罕齊老圖防汛事宜上諭大學士等曰柴達木之北伊遜察罕齊老圖地方乃直達安西沙州之路為巴里坤軍營之後戶關係最為緊要此處或駐兵一千名或八百名建築小城一座以為捍禦再設卡倫以瞭望賊蹤儻賊人前來為數無多即可迎戰𠞰殺若傾其大衆而來則報知安西遣兵應援合力攻擊此乃防汛萬全之策若城工一時難成即先添兵丁為冬月預防之計一切事宜著大將軍嶽鍾琪即行定議舉行若嶽鍾琪已領兵進𠞰即著副將軍等公同會議辦理命寬副都統格默爾擅離汛地之罪上諭大學士等曰駐劄柴達木副都統格默爾擅離汛地領兵欲回西寧近邊地方甚屬悖謬理應以軍法從事朕念其𣲖遣辨員追擒青海叛賊諾爾布著免死革職令往騰格里卡倫效力贖罪丁卯命達鼐等防範賊人來投噶斯路者上諭大學士等曰傅爾丹從前奏稱準噶爾被擒之賊人丹巴曾供噶爾丹策零之妹夫羅卜藏策凌帶領所屬三千餘戶來投噶斯一路曾降諭旨與達鼐等問明緣由令在有水草之處暫行安置今情形甚屬可疑不可墮其術中著密諭達鼐衆佛保德成等令其加謹防範不可妄動戊辰命撥兵防護四十九旗遊牧地上諭大學士等曰四十九旗扎薩克遊牧之地甚屬緊要令𣲖京城八旗滿洲蒙古兵六千右衛歸化城兵二千自烏未穆秦以及烏喇持數扎薩克處𣲖兵三千共𣲖兵一萬一千名著於八月起程九月間繞至烏喇特遊牧地方後戈璧前適中處駐劄令其防護遊牧地方此所𣲖扎薩克之兵著王扎木巴勒扎卜統轄每旗各𣲖出協理台吉同往科爾沁等旗𣲖兵六千盛京𣲖兵五千俱繞至科爾沁迤西逰牧地方後駐劄其駐防烏喇特等處之兵著都統穆森管領前往副都統薩穆哈協同管轄其科爾沁兵著王羅卜藏衮布貝子喇什公噶爾弼管轄每旗各𣲖大台吉同往盛京兵丁著尚書海夀統轄副都統博第黑龍江副都統多起納協同管轄尋大學士等議以所選京城滿洲蒙古兵六千每旗應遣護軍參領一員副護軍參領二員委署護軍參領二員護軍校七員轄之奏入上從之上諭大學士等曰陜西西安巡撫武格著來京有交辦事件侍郎馬爾泰著署理西安巡撫事務杭奕祿協辦西安軍需其宣諭化導之事交與史貽直鄭禪寶分辦己巳命撥荆州兵駐劄西安上諭大學士等曰湖廣荆州兵丁著𣲖一千名令副都統觀音保帶領前往西安駐劄步軍統領阿齊圖有事差往巴里坤軍營其印務著莽鵠立署理庚午上諭大學士等曰羅卜藏喇錫統領之札薩克兵丁及盛京烏拉等處之兵從前曾令其至順承郡王軍營駐劄此內若有已到軍營者即駐劄彼處其未到者著在塔米爾地方會同一處駐劄盛京吉林黑龍江之兵著額爾勤統轄烏察喇王常協管預籌西寧調撥兵丁大學士等奏言西寧最為要地調兵駐防所當預為籌畫今莊浪乃西寧肅州之要路若增兵二千可供調撥應於西安駐防之江寧河南滿洲名內撥一千名直𨽻河南之緑旗兵內撥一千名往駐莊浪再令四川預備四千兵中撥二千名移駐松潘以備西寧調遣奏入上從之甲戌授大學士忠達公馬爾賽為撫逺大將軍赴軍營上諭大學士等曰大學士忠達公馬爾賽著授為撫逺大將軍先於𣲖出京城兵內挑選一千名輕輢前往圖拉等處形勝之地駐劄會同喀爾喀副將軍王丹津多爾濟等辦理喀爾喀遊牧及一切預備防守事務副都統達爾濟富昌著同大將軍馬爾賽前去續著侯馬蘭泰副都統胡琳帶兵一千名前去其餘兵四千名俱著預備停妥俟大將軍奏請調遣時再令前往八旗漢軍內𣲖兵四千名著都統李杕祖秉衡帶領前往四子部落後面水草茂盛之處駐劄以備調遣其𣲖出右衛及歸化城之兵各一千名俱暫在本地預備調遣其餘兵丁若有調遣之處著馬爾賽會同丹津多爾濟商酌辦理又諭曰新挑驍勇辨兵一百名著副都統敦巴帶領五十名往駐噶斯留五十名隨大將軍馬爾賽前往每名各賞銀二百兩乙亥命減科爾沁扎薩克原𣲖兵丁上諭大學士等曰前𣲖出科爾沁扎薩克等處兵丁共六千名在各遊牧處駐劄恐一時未能會集著減去二千名止𣲖四千名預備借給甘涼等處新募兵丁餉銀并增設教演辨員甘肅提督宋可進奏言甘涼西寧三處新募兵七千並貧丁請借給餉銀於四季扣償並請每兵一千增設千總二員把總四員與外委千把分領教演戶部議覆如所請奏入上從之寧逺大將軍嶽鍾琪請自西路擊賊嶽鍾琪奏言七月初五日北路都統衮泰等咨稱準噶爾賊人以全力北犯圍靖邊大將軍傅爾丹於和通淖爾臣思傅爾丹及從征官兵奮力𠞰殺自必破圍取勝惟是賊夷傾衆犯北必以往年西路被擾駝馬缺乏有輕視西路之心臣請率精兵乘此時襲擊烏魯木齊彼恐我師搗其巢穴自必撤北路之兵反顧伊犁我軍既挫其鋒即旋師休息是不待戰而賊已疲勞臣不敢坐失事機今率參贊提督紀成斌理藩院侍郎顧魯公衮布都統根敦總兵官張元佐王緒級等前進其軍營諸務暫交副將軍石雲倬辦理奏入報聞丙子諭順承郡王錫保慎籌喀爾喀等處戰守機宜上諭大學士等曰據順承郡王錫保奏稱喀爾喀遊牧之處俱已安頓妥協兵丁亦漸次到遊牧之界喀爾喀三路副將軍各思效力臣等將禦賊守城之策會同商酌預備等語觀此順承郡王錫保等辦理防範甚屬有方但須謹慎之中愈加謹慎賊人到科卜多修城之處儻不行力戰或暫時圍繞待我策應之師以施誑誘之計順承郡王喀爾喀副將軍等切勿前往策應致墮賊人術中伊等止應防護喀爾喀遊牧並看守察罕廋爾地方此最緊要之事果能固守即伊等之功矣若賊人久圍科卜多不去可俟各路兵丁俱到察罕廋爾之時錫保等於喀爾喀兵丁及防戌蒙古兵丁內挑選二三千名給與馬匹分為數起晝夜前進或尾賊後乘機將賊人馬駝盡行趕出隨得隨殺賊人牲畜日漸虧損自然逃遁矣但須防其知覺來追預思保全之策無得鹵莾再我兵果蒙天眷敗退賊衆亦斷不可深入追擊賊人逃遁後凡應行看守之處尤宜嚴加防範若賊衆被我兵擒獲或力窮來歸除凶悍必不容赦者之外其餘稍有可原即從寬宥斷不可因我兵受害之故妄行殘虐以圖泄憤至喀爾喀等現在南遷遊牧兵丁赴察罕廋爾者甚衆所帶糧糗未必敷用且需火藥鉛彈等物查察罕庾爾所有榖石羊隻等物甚多量我軍足用存備外著錫保酌量賞給喀爾喀兵丁使之充裕勿存妄費錢糧難於銷算之見朕斷不因所費過多即加譴責也將此傳諭順承郡王錫保知之免黜達什策凌貝勒爵副都統達鼐等奏言貝勒達什策凌就擒自言年幼多病聞諾爾布擾臺掠馬時我旗之墨爾根阿里克鄂木布等與俱大恐於六月八日隨母遷居遊牧內圖古里克之地即告之王盆蘇克汪扎爾遣人擒墨爾根等非敢遁逃臣思達什策凌之伯父貝勒達顔其父貝子噶爾丹戴青諾爾布皆實心報效其伯父歿封達什策凌為貝子其父歿皇上施恩合兩爵加封達什策凌為貝勒兼管扎薩克乃不知感恩仰報無故潛逃請奪達什策凌貝勒爵或降封貝子或降封公伏候聖裁奏入得旨達什策凌年幼無知聽信謡言畏懼遷移並非有意逃遁且值王盆蘇克汪扎爾追趕即迎前陳訴又將伊屬下掠馬之人拿送達什策凌從寬免其革去貝勒丁丑優賞柴達木駐防兵及青海扎薩克等更戌將卒上諭大學士等曰駐防柴達木兵丁等前因遺失口糧借過西寧西大通二鎮官兵一個月米麵著將此賞給免其扣除還項又諭曰據副都統達鼐侍郎衆佛保奏稱青海之札薩克等現在聚兵七千名但器械馬匹未能齊備請揀選三千名令其一年一換等語朕所以聚此兵者特為保全伊等家口及遊牧之計非為征伐調遣之用也其生計情形從前俱未聞知今據達鼐等陳奏朕心甚為惻然俟從容料理必有加恩之處今所聚兵七千名著選𣲖三千名照朕從前所降恩旨官員賞給半年俸銀兵丁賞銀五兩一年一次更換其更換之官兵亦照此賞給至兵丁駐防日久盤費未必接續著賞給茶葉縀布等項及每月所食之青稞再撥回之兵丁四千名官員等著賞給三月俸銀兵丁等賞銀三兩令其各回遊牧之所準噶爾賊人或來騷擾青海之遊牧不可不防朕意欲將伊等遊牧豫行從容遷移擇妥協之處居住著伊等會同詳議辦理賊人由逺路前來一無所得不待戰而力盡矣我內地兵丁與賊交戰時青海三千兵丁但追襲賊後量力將賊人馬匹趕出所得之馬匹即著賞給趕出之人仍計所得馬匹之多寡另行加恩議敘己卯命副都統佟時茂劉汝霖偕李杕等率漢軍步兵四千名赴北路軍營加恩北路軍臺效力官及各蒙古上諭大學士等曰北路軍臺人員殊屬勤勞應大沛恩膏此內廢員甚多其因何事革職情由並坐臺已經幾年之處交吏兵二部查明分晰呈覽朕看其情由或令開復或行寬免之處另降諭旨其坐臺已逾二年者俱著另委人員更換至在臺各蒙古俱著加恩賞賜命以原任吏部右侍郎阿克敦為額外內閣學士隨撫逺大將軍印庚辰議撤科卜多駐防兵移駐察罕廋爾等處上諭大學士等曰從前令在科卜多地方修城原有駐兵進𠞰之意今宜以保固疆域為要務賊退之後將科卜多駐防兵丁悉行撤回令於察罕廋爾扎卜堪等處駐劄近於喀爾喀之遊牧便彼此易於策應著行文大將軍傅爾丹順承郡王錫保會同喀爾喀副將軍等定議具奏至科卜多兵丁或乘青草即行撤回或俟阿爾台嶺下雪之後徐徐撤回令伊等公同酌量料理宣諭青海王貝勒等上諭青海王貝勒貝子公台吉等曰爾等俱係顧實汗之子孫自祖宗以來依附內地邊疆恪順恭職我聖祖仁皇帝視爾等如子孫撫育六十餘年寵遇之隆至優極渥且念爾等尊崇黃教是以我朝於達賴喇嘛班禪額爾德尼備極恩眷若準噶爾者暗遣賊兵侵犯西地殺害喇嘛毁滅供器實為黃教之罪人爾等倘違棄先人崇祀之教辜負國家厯沛之恩一家之內興起兵戎以啓賊人僥幸之端雖愚昧之人亦不出此前者羅卜藏丹津聽信流言敢行背叛我朝發兵征𠞰逃竄在準噶爾處困苦辱耻爾等無不聞知今爾等若到彼處路途如許遙逺馬畜必致疲斃彼豈能為爾等置立産業分與遊牧地方令爾等各統所屬依然保聚乎况準噶爾四面皆成讎敵終嵗爭戰不休凡用兵之處必置爾等於前虐使任意豈若各守祖父基業永享太平之為得乎爾等若不熟計利害聽伊誑誘之詞依附賊人妄思蠢動將來興師問罪必先及爾等彼時即欲悔禍國法不爾貸也朕所以頻降諭旨反覆開導令爾等會集兵丁小心防守將屬下人早行移入者實冀保全爾等非欲調遣爾等為進𠞰之用也爾等當思朕愛護安全之至意詳細曉諭屬下人等合行防範果能遵旨奉行朕自大沛恩膏爾等遊牧妻子既無吞併之憂而中外安居永享無窮之福矣辛巳擢鑲藍旗漢軍參領諾爾琿為兵部額外侍郎赴北路軍營甲申靖邊大將軍傅爾丹奏與賊戰於博克托嶺等處上命加意防守先是傅爾丹奏言臣等於六月九日進兵二十日遇賊二萬餘戰纍日賊據山扼險遂移營和通淖爾晝夜力戰殺賊數千賊益兵逼我營我軍拔圍且戰且走遂渡哈爾噶納河於七月朔至科卜多築城處以索倫等兵逃歸者訛言都統衮泰遂奏全師失利今聞賊人從科卜多河兩路來犯臣方經理防守之事奏入得旨前據北路都統衮泰等奏報大將軍傅爾丹等領兵進𠞰為賊所困全軍失利彼時已傳諭西路大將軍嶽鍾琪令其加意防守今據傅爾丹奏稱官兵為賊誘敵臣於七月初一日帶領兵馬回至科卜多軍營等語是從前北路逃軍所報竟屬子虛不過兵馬有傷損之處大將軍等原無恙也可即傳諭嶽鍾琪知之總之目前進兵之議且不必言而防守之策倍當加意著大將軍等照近日諭旨謹慎辦理至是又奏言臣等於六月十七日獲厄魯特偵者二十三人供云博克托嶺有賊二千駝馬萬餘臣遣參贊蘇圖副都統戴豪等率兵三千往𠞰十八日遣前鋒統領丁夀統兵一千五百為援與賊戰於庫列圖嶺殺賊四百餘賊驅駝馬踰嶺敗遁十九日丁夀蘇圖等與臣合兵二十日賊兵二萬餘從髙埠衝突我營力戰一日又殺賊千餘副都統塔爾岱馬爾齊率兵二十奪據西山二十一日見賊營險隘移營於和通淖爾遣丁夀蘇圖參贊覺羅海蘭副都統常祿西彌賴領兵據山梁之東塔爾岱馬爾齊據其西副都統承保居中策應參贊馬爾薩由東路公達福戴豪在前副都統舒楞額土默特公沙津達賴等在後兼護行營臣傅爾丹統大兵繼進移營時賊人列陳衝丁夀塔爾岱兩軍丁夀等力戰殺賊千餘忽大風雨雹丁夀等遂為賊圍臣遣兵援塔爾岱出之又令承保援丁夀等會日暮圍未解二十二日覺羅海蘭突圍而出丁夀蘇圖馬爾齊俱自盡常祿陳亡西彌賴命索倫兵援丁夀索倫兵潰西彌賴亦自盡二十三日賊晝夜犯臣大營力戰殺賊五百餘土默特公沙津達賴等及察哈爾等兵皆潰惟滿洲兵四千不動二十四日隨印侍郎永國及覺羅海蘭戴豪俱自盡臣等以兵退步設方營保護輜重以塔爾岱署前鋒統領達福舒楞額殿後承保統右翼馬爾薩統左翼臣傅爾丹與副將軍巴賽查弼納往來巡軍副都統德祿捧敕印啓行賊人三萬四面攻我二十五二十六兩日力戰殺賊千餘二十七日殿後公達福歿於陳二十八日臣等渡哈爾噶納河賊人尾追衝突左翼力戰殺賊五百餘人遂登山嶺分兵為二臣傅爾丹率德祿承保自右而下巴賽查弼納舒楞額自左而下臣傅爾丹於七月一日至科卜多修城處我兵陸續歸營共二千餘人臣傅爾丹遣將士往迎未歸諸將惟塔爾岱於初七日負傷至營餘尚未至臣輕舉妄動以至敗績請以臣等正法用彰國憲奏入得旨此舉損兵敗績雖屬有罪朕覽爾等之竭蹶力戰寬恕其罪痛惻難忍不覺淚下將朕親束之帶賜與軍營令傅爾丹繫之爾等忿激之下急思報復恐又妄動賊人雖來不可輕進追擊但能相機堅守即爾等之功科卜多地方若難固守可回至察罕廋爾駐劄今已授馬爾賽為撫逺大將軍領兵前來到時爾等公同商酌料理平定準噶爾方略前編卷二十四
