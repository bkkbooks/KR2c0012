  text: 欽定四庫全書平定準噶爾方略前編卷九
  hash: sha256:5ea9ccd1c78479db84205e98d86aac4ebbef71c61699160c3b5718a75b17fb7a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_009-1a, image: WYG0357/WYG0357-0152a.png}
body:
  text: 康熙六十年夏四月癸巳命副都統噶錫率赴滇兵還上諭議政大臣等曰從前令副都統吳納哈噶錫帶領江寧杭州之滿洲兵二千名前往雲南聽候調遣後派一千名進征西藏尚有一千名留駐雲南此內已著武格吳納哈帶領五百名前往守藏其餘五百名及原議自藏撤回令至成都之一千名今已回滇著噶錫俱帶回本處辛亥議輯烏梁海人衆征西將軍祁里德等疏言副都統鄂三領兵出烏蘭古木汛界收撫烏梁海部人甚衆議政大臣等議曰烏梁海人並於所在遊牧今間處軍中不便當送至巴顔珠爾克安置再兩路將軍去年師旋未以䇿妄阿喇布坦消息報知今年進取吐魯番探聽賊人消息尤要乘此雪消草長時宜令官兵收復烏梁海散亡之衆更於汛界偵探機宜奏入上從之庚申平逆將軍宗室延信以病還京命定西將軍噶爾弼率兵駐藏延信疏言遵旨辦理事竣還至中途病劇不能赴藏駐防議政大臣等議曰請調延信還京師令署四川總督噶爾弼於年羮堯還任之日仍受定西將軍印敕統兵赴藏駐守仍以都統武格參贊奏入上從之五月壬戌命撫逺大將軍允禵統兵移駐甘州允禵疏言方今駐劄巴里坤兵進取吐魯番䇿妄阿喇布坦部人必震恐以漸來歸但甘州肅州等處滿洲緑旗兵悉調赴巴里坤臣所統兵宜進甘州肅州駐劄聲援議政大臣等議曰肅州地狹甘州稍廣濶當令大將軍允禵統領現在西寧兵赴甘州駐劄經理調遣機宜西寧地亦扼要宜遣大臣一人駐劄奏入得旨依議著大將軍允禵派一要緊大臣駐劄西寧管理甲子靖逆將軍富寧安奏請駐兵於伊勒布爾和碩富寧安疏言奉旨令臣駐兵烏蘭烏蘇進取吐魯番更令臣定議具奏伏思烏蘭烏蘇地狹小難駐大兵惟伊勒布爾和碩地去烏蘭烏蘇百餘里水草既佳有險要可據薩爾海又為通吐魯番路髙處可以瞭逺當於其地駐兵馬匹需用者留之餘馬悉於烏蘭烏蘇色畢特地界令官兵牧放至進取吐魯番兵當如議政大臣所議選七千人但今已議於阿爾台路撥兵三千至巴里坤如有機會可自吐魯番進勦請更於阿爾台所撥兵增一千人計兵八千令散秩大臣阿喇衲及提督路振聲統之進取吐魯番更令率京城兵副都統一人率阿爾台兵大臣一人西安副都統及總兵官現住巴里坤者各一人同往並令阿喇衲統轄奏入上從之戊寅命諸路暫停進兵上諭議政大臣等曰從前議欲今年大兵進勦後經議政大臣等議進取吐魯番扼其要地再偵探䇿妄阿喇布坦實信相機而行已行文大將軍允禵及三路將軍近據大將軍允禵密奏以軍務重大欲俟明年進兵朕意亦如此今年大兵著暫停進勦其進取吐魯番扼住要地之處俱著停止行文各路將軍將器械馬匹口糧諸務俱令預備整齊俟來年進兵其間如有可乘之機富寧安駐兵之處相近著即酌量而行甲申以侍讀學士常授為理藩院額外侍郎駐西寧撫逺大將軍允禵疏言奉旨令大臣一人駐劄西寧辦事查西安將軍宗扎卜嘗調駐西寧又侍讀學士常授任青海事有年可否令其駐劄奏入得旨常授著授理藩院額外侍郎駐劄西寧辦事宗扎卜著赴大將軍允禵處聽候調遣乙酉以年羮堯為陜西四川總督上諭大學士等曰陜西總督鄂海著辦理軍前糧餉四川總督年羮堯著兼理四川陜西總督事務原任侍郎革職色爾圖著署理四川巡撫事務皆馳驛速行赴任庚寅命調黑龍江吉林新滿洲索倫達呼里兵及和托輝特喀爾喀烏梁海各台吉貝勒兵赴軍前上諭議政大臣等曰大將軍允禵明年欲行進兵或今年冬季䇿妄阿喇布坦處廢敗事出有機會可乘亦未可定應令副都統穆克登將黑龍江吉林之新滿洲索倫達呼里官兵揀選五百名和托輝特公博貝之弟台吉圖巴於伊兵內酌量派出幾人再喀爾喀貝勒丹津多爾濟揀選伊屬下兵丁烏梁海扎薩克台吉托穆克帶伊屬下兵丁俱赴巴里坤軍前預備調遣著速議具奏尋議黑龍江吉林之新滿洲索倫達呼里官兵當令穆克登統領進發喀爾喀兵當令貝勒丹津多爾濟統領進發奏入上從之甲午居烏梁海降人於巴顔珠爾克征西將軍祁里德等疏言新撫烏梁海二千五百三十一人應以滿洲兵三百喀爾喀兵二百送至巴顔珠爾克居之更於車臣汗等旗所統兵選三百以台吉一人副台吉二人同駐防守議政大臣等議如所奏奏入上從之六月丙申封平逆將軍延信為輔國公上諭宗人府曰平逆將軍延信朕親伯之孫朕之姪也此番統領滿洲蒙古緑旗兵丁過自古未到之煙瘴惡水無人居住之絶域殱滅醜類平定藏地允稱不辱宗支克展勇略深屬可嘉著封為輔國公撥涼州披甲者駐西寧撫逺大將軍允禵疏言臣今赴甘州率西寧兵往請調滿洲兵自西寧進藏還者赴西寧駐劄議政大臣等議曰滿洲官兵自西寧隨平逆將軍延信進藏還者前已奉諭旨令還京師請撥駐劄涼州喂馬披甲者數百人於西寧駐劄即令侍郎常授管轄奏入上從之壬子以覺羅伊禮布署西安將軍西安將軍宗扎卜疏言臣遵旨赴撫逺大將軍允禵軍但今西安左翼滿洲副都統常夀漢軍副都統鄧奇章悉在巴里坤軍前右翼滿洲副都統缺未補漢軍副都統班岱老病請遣大臣一人赴西安署將軍印務議政大臣等議曰西安右翼滿洲副都統缺已授駐劄西寧副都統覺羅伊禮布應以將軍印令伊禮布署理班岱老病應令還京奏入上從之乙卯命靖逆將軍富寧安收撫吐魯番先是富寧安疏言吐魯番歸附回人阿喇卜坦等訴言各城潛藏回人約五百餘悉願歸誠宜即派兵收撫但他哈爾齊哈喇沙爾諸處與吐魯番近聞大兵到回人必悉欲歸誠不得不派兵防守而挽運糧餉甚難以此尚未發兵收撫奏入報聞至是又奏吐魯番回人阿里木和卓等訴言䇿妄阿喇布坦將衆回人遷赴哈喇沙爾回人相率逃歸準噶爾之人來追回人併力擊退之現駐魯克察共議以托克托瑪木特等為首令我等祈請速為救援臣等議衆回人景慕德化悉願來歸當即遣兵收納但䇿妄阿喇布坦未滅將吐魯番回人收納勢必屯兵守護恐糧運艱難尚未遣兵收納奏入上諭議政大臣等曰據富寧安奏稱䇿妄阿喇布坦將吐魯番回人托克托瑪木特等遷往哈喇沙爾地方中途逃回在魯克察地方駐劄等語現今歸順之回人與準噶爾之人爭鬭將準噶爾之人殺害取甲來獻觀此情形䇿妄阿喇布坦似略無報復之意或伊同黨內有不睦亦未可定此機不可輕失朕意䇿妄阿喇布坦將伊等不能遷往哈喇沙爾又不能護衛準噶爾之人足見萬不能敵我兵今收復吐魯番若不看守則䇿妄阿喇布坦處歸順之人以及來使逃人有回人居中倘行殺掠此路必致阻隔爾等速議行文富寧安派緑旗兵一千名察哈爾厄魯特蒙古回兵一千名前赴吐魯番收納歸降回人照看駐劄將歸順之人及來使逃人往內解送之處牢設哨汛今回人歸降於我與厄魯特世成仇敵即係我民其巴里坤相距吐魯番止六百里為途不逺如果䇿妄阿喇布坦率衆侵擾我兵前去救援不遲著富寧安預行轉飭回人等於我軍尚未抵境之時若有䇿妄阿喇布坦處來使逃人萬勿隱匿侵犯即行解送著議奏尋議回人頭目托克托瑪木特等來歸當遣兵防護行文富寧安等遵諭旨行至蒙古回兵令輝特公巴濟率往察哈爾兵以巴爾虎侍衛阿玉錫為副都統與侍衛克什圖同率往緑旗馬步兵令富寧安選派總兵官一人率往更令散秩大臣阿喇衲統轄同往所需兵糧如何挽運令富寧安等酌議行奏入上從之又諭議政大臣等曰得今年歸順之厄魯特回子之信及西邊歸順之厄魯特信息知從前䇿妄阿喇布坦地方甚是震動但去冬至今䇿妄阿喇布坦移駐伊犂地方未得確信倘䇿妄阿喇布坦處果有變亂機會斷不可失著行文將軍富寧安傅爾丹祁里德等用心偵探確實信息具奏臣等謹按逋寇將殄其與必孤譬木之就稿則枝葉零落先之唐不受悉怛謀降竟以委敵失䇿甚矣吐魯番地近巴里坤為準噶爾部來使必經之路今傾慕聖化率先內附此足徵準噶爾之殘暴不能撫衆也是時任事諸臣有以調兵挽餉為慮者賴我聖祖仁皇帝睿謨內斷燭照幾先遂撫其衆且護以兵準噶爾瓦解之勢已基於此我皇上因䇿凌䇿凌烏巴什等來歸即豫收納撫順討逆神機默運威行絶域用能殄數十年之逋寇而諸蕃綏靖迹接響臻所以閎紹前猷垂光萬祀後先一揆何其盛歟庚辰遣兵救護歸順回衆撫逺大將軍允禵疏言據靖逆將軍富寧安呈報和勒博斯額穆齊宰桑率五百厄魯特兵將回人圍困彼此互有殺傷若遣兵救援厄魯特勢必逃竄回人必乞留兵護守但留兵少則無益於事多則糧運艱難不留兵則魯克察克有回人萬餘勢必隨入內地不收撫則旋師後恐厄魯特乘之欲收撫又恐無以資口食屯駐哈密則地狹小扎薩克額敏亦不能收恤移至布隆吉爾達里圖各處安置則戈壁難行需糧亦多以此籌畫再四未即救援臣即檄行富寧安云收撫回人事蒙皇上睿鑒令發兵二千赴吐魯番諭旨到即派兵速往視形勢要隘設汛哨嚴防守至挽運糧米巡撫綽奇已任其事議政大臣等議曰當如所奏更令統領官兵散秩大臣阿喇衲以所得消息報富寧安有當救援之處令富寧安酌行奏入上從之尋富寧安疏云臣遵旨派兵二千防守吐魯番令散秩大臣阿喇衲率往又烏蘭烏蘇以內有科舍圖色畢特各處為赴吐魯番隘口且與戈壁聨界臣專派署前鋒統領法瑙等率兵一千據守要害又恐賊衆由戈壁後路來襲法瑙等屯兵則科舍圖以內有地曰鄂隆吉亦為扼要當於鄂隆吉設哨兵二百令侍衛哲爾德率往議政大臣等議如所奏奏入上從之辛丑命副都統穆克登貝勒丹津多爾濟率兵五百名赴巴里坤軍前參贊軍務九月辛卯命簡撤各營官兵上諭議政大臣等曰各路隨征兵丁內有殘疾年老者虛耗糧餉無濟軍務應行文大將軍將軍等查明撤回并令派官管領回兵之時勿致沿途生事富寧安尋奏於巴里坤官兵內查出年老病廢不能效力者官七人護軍披甲二百二十五名察哈爾兵一百八十名即於其中官員內簡派管轄遣還至吐魯番科舍圖鄂隆吉各處及巴里坤留駐兵共二萬一千一百其遣還兵缺可以不補議政大臣等議如所請奏入上從之又祁里德疏奏遣還軍中年老病廢之人得旨軍中年老病廢之人著查明遣回副都統巴勒年老亦令回京其在軍中亡故之人骸骨著送回各原籍埋葬尋都統圖喇等奏吉林署營總齊理布等四十五人兵五百七十二名及自以資斧赴軍效力藍領侍衛綽爾海等二人當遣還其官兵缺停補奏入上從之甲午以公䇿旺諾爾布代噶爾弼為定西將軍赴藏四川陜西總督年羮堯疏言定西將軍噶爾弼率兵赴藏至瀘定橋病不能進奏入得旨噶爾弼患病調養尚需時日其將軍印著齎付公策旺諾爾布署理額駙阿寶都統武格俱著參贊軍務戊戌命大將軍允禵靖逆將軍富寧安等進守吐魯番征西將軍祁里德疏言遵旨令參贊副都統鄂三派遣官兵往阿爾台哈道里各處遇厄魯特烏梁海之人即為擒之探得消息亦即馳報又遣和托輝特公博貝所屬察胡賴等往洪郭壘哈撒勒扎爾圖喇各處探取䇿妄阿喇布坦消息據參贊副都統鄂三所遣官兵還報前路哨探絶無行人蹤迹據察胡賴等還報云詬洪郭壘哈撒勒扎爾圖喇居人言䇿妄阿喇布坦已死子噶爾丹䇿零收取部下之厄魯特及居於阿爾台之烏梁海等不知遷徙何處臣復遣察胡賴等往探如得實即行文將軍富寧安傅爾丹等同率大兵乘機進勦疏入上諭議政大臣等曰上年䇿妄阿喇布坦將伊邊界之人收去又將吐魯番回人移往哈喇沙爾其阿爾台烏魯木齊等處無一哨汛因其寂然以處遂有䇿妄阿喇布坦身死之信然不可據以為實也覽將軍祁里德奏䇿妄阿喇布坦若果身死則機不可失請預備進兵爾等行文大將軍及靖逆將軍富寧安等今嵗將吐魯番堅守為要又阿爾台吐魯番一帶汛地均宜加意防守冬令雪降草枯之際不可貪功輕進且將兵丁馬匹一應什物整齊備辦以俟來年大舉征勦此旨著即行抄録傳諭軍前大臣等知之庚子命靖逆將軍富寧安進兵伊勒布爾和碩先是上諭議政大臣等曰阿喇衲看守吐魯番地方恐兵勢單弱應行文將軍富寧安酌派官兵遣往吐魯番駐劄至是富寧安疏言臣奉諭旨派兵二千令副都統莊圖率領於八月十六日啓行赴吐魯番今又派兵二千令副都統穆克登等率領於九月初三日啓行赴吐魯番昨據散秩大臣阿喇衲報云十月雨雪之際擬乘賊無備進兵襲擊雖吐魯番兵勢不弱但恐賊兵乘我軍後請親率兵四千進駐伊勒布爾和碩調遣䇿應巴里坤留兵三千請令都統睦森率領奏入得旨令議政大臣等議奏尋議應如所請但今冬雨雪時祗可就近地襲擊不宜深入奏入上從之戊申增給在營兵官羊靖逆將軍富寧安疏言康熙五十七年皇上恩賚巴里坤官兵羊七萬隻經進兵襲擊及派兵吐魯番諸處撥用之外存羊二萬餘今吐魯番屯駐官兵宜續運口糧每石需運費銀幾三十兩若以一羊抵米一斗值止一兩五錢而解送尤易請再撥官羊數萬送巴里坤軍前不惟吐魯番諸處軍餉羊米兼給省費甚多即於來年進勦軍儲亦有益議政大臣等議如所請奏入上從之癸丑靖逆將軍富寧安奏報敗賊於吐魯番富寧安奏言據散秩大臣阿喇衲報九月初八日探知䇿妄阿喇布坦遣人犯吐魯番城即派侍衛克什圖等率兵迎戰阿喇衲親率官兵尾其後至中途見賊二千餘人與克什圖兵列陳交戰遂以所領䇿應兵分為三隊奮勇衝擊賊不能敵敗入林中官兵追勦入林賊復棄騎步戰我師鎗炮齊發擒殺賊百餘人獲軍械馬匹無算賊衆奔逃我師追捕數十里因時已薄暮不便深入乃派公巴濟等率兵五百伏林中偵探防守餘兵撤還伏思吐魯番地恐賊人窺伺已先奉旨添兵駐劄今果如聖算奏捷請於科舍圖駐劄處更增兵五百鄂隆吉駐劄處增兵三百防賊人由戈壁犯我哨汛且科舍圖鄂隆吉地近阿爾台有事接應調遣尤便又前以阿喇衲報今冬雨雪時欲進兵襲擊故疏請移駐伊勒布爾和碩為之聲援今賊人敗潰盡知我師在吐魯番諸處其邊境必懼而防守未可襲擊阿喇衲兵今冬宜姑緩勿進臣仍統兵駐巴里坤俟來年大舉進勦議政大臣等議如所奏奏入上從之丁巳詔立碑西藏蒙古王貝勒貝子公台吉及土伯特酋長等奏西藏平定請於招地建立豐碑以紀盛烈昭垂萬世上允所請御製碑文曰昔者太宗文皇帝崇德七年班禪額爾德厄達賴喇嘛顧實汗謂東土有聖人出特遣使自人迹不至之區經仇敵之國閲數年始達盛京至今八十載同行善事俱為施主頗極安寧後達賴喇嘛之殁第巴隱匿不奏者十有六年任意妄行拉藏滅之復興其法因而允從拉藏青海羣衆公同之請中間䇿妄阿喇布坦妄生事端動準噶爾之衆肆行姦詐滅壞達賴喇嘛并廢第五輩達賴之塔辱衊班禪毁壞寺廟殺戮喇嘛名為興法而實滅之且欲竊據土伯特國朕以其所為非法爰命皇子為大將軍又遣朕子孫等調發滿洲蒙古緑旗兵各數萬厯煙瘴之地士馬安然而至賊衆三次乘夜盜營我兵奮力擊殺賊皆喪膽逺遁一矢不發平定西藏振興法教賜今瑚畢勒罕册印封為第六輩達賴喇嘛安置禪榻撫綏土伯特僧俗人衆各復生業於是文武臣工咸謂王師西討厯瘴癘險逺之區曽未半載輒建殊勳實從古所未有而諸蒙古部落及土伯特酋長亦合詞奏曰皇帝勇略神武超越往代天兵所臨邪魔掃蕩復興蒙古向所尊奉法教坎麻藏衛等部人衆咸得拔離湯火樂土安居如此盛德大業非臣下頌揚所能宣罄請賜御製碑文鐫勒招地以垂永久朕何功焉而羣衆勤請不已爰紀斯文立石西藏俾中外知達賴喇嘛等三朝恭順之誠諸部落纍世崇奉法教之意朕之此舉所以除逆撫順綏衆興教云爾議勦郭羅克番駐劄西藏額駙阿寶報青海索羅木之西有郭羅克部落唐古忒等肆行劫掠往來行旅曽盜駐劄索羅木兵馬匹郭羅克與內附之多隆汗地相近當檄令多隆汗宣示之令遵守法度毋復肆橫倘不遵戒約請即以兵懲其首惡令多隆汗於部內選才能者使領郭羅克衆則西寧青海諸處來使及商販俱稱便議政大臣等議如所請奏入得旨額駙阿寶請將郭羅克部落懲治所言甚當郭羅克地方近四川松潘一路與多隆汗接壤應行文總督年羮堯提督嶽鍾琪等著向多隆汗處詳詢郭羅克地方形勢若何發兵進勦用力幾何如易於攻取即令嶽鍾琪帶領松潘兵進勦倘地險勢衆應酌量派遣滿洲蒙古兵丁及附近之察罕丹津處亦令派兵協助前往進勦著大將軍允禵侍郎常授總督年羮堯提督嶽鍾琪會同定議而行尋年羮堯疏言郭羅克各寨有隘口三悉險峻宜步不宜騎若調兵多則邊外聞之賊得潛為備不如以番攻畨酌遣官兵率領為便臣素知近郭羅克如雜谷諸處土司土目亦病其肆惡願以兵助勦臣與嶽鍾琪議遣官與雜谷土司等約適額駙阿寶移文奉旨命臣與嶽鍾琪酌議進勦機宜臣即移提臣令速赴松潘選領鎮兵及督率土兵進發議政大臣等議如所請奏入上從之冬十月丙寅命理藩院侍郎常授甘肅按察使巴襲管理西寧柴達木諸處軍餉事務撫逺大將軍允禵奏請赴京許之撫逺大將軍允禵疏言賊厄魯特侵犯吐魯番為我兵所敗鼠竄而去來年當大舉翦滅請容輕騎赴京請訓旨議政大臣議如所請奏入得旨大將軍允禵令其來京將印交與平郡王訥爾素此際若䇿妄阿喇布坦屬下有自相離潰率衆來歸者則大將軍停止來京可速赴肅州將軍祁里德亦令來京將印交與都統圖喇將軍傅爾丹軍前之前鋒統領丁夀護軍統領覺羅塗喇亦令將伊等事務交明來京將軍富寧安亦令於軍中派一可托大臣來京俱於年內到京以便指示來年大舉進勦方略戊辰運河南湖廣米豆赴甘州涼州辦理糧餉事陜西總督鄂海疏言遵旨至甘州料理糧餉甘州各處山多田少所獲糧草無幾不得不為多備今河南湖廣糧已運至陜西請於其中撥米六萬石豌豆四萬石以其半送甘州半送涼州如豌豆不足即以米抵之議政大臣等議如所請奏入上從之乙亥增墾烏蘭古木地征西將軍祁里德疏言於今春三月遣官兵在烏蘭古木之特里河邊耕種每麥種一斗收麥二石有餘烏蘭古木地暖土肥請於來年多墾之可望大收所收糧用駝自特里運至烏巴薩池更以過渡小船由特里河至營費省而於餉有益議政大臣等議如所請奏入上從之十一月壬辰命原任總督額倫特侍衛色楞副都統查禮渾等世職準豫承襲兼議恤提督康泰等上諭大學士等曰原任總督額倫特侍衛色楞副都統查禮渾皆陳亡伊等世職俱著承襲又陳亡提督康泰總兵官康海司九經俱著議敘伊等有世職亦著承襲西安佐領扎木素漢仗好在軍中頗出力索倫藍翎扎倫察漢仗好交戰時頗勇猛射死數賊身受重傷自盡俱著交部議敘十二月壬申四川提督嶽鍾琪奏平郭羅克番嶽鍾琪疏言勦撫郭羅克番已平得旨據嶽鍾琪奏賊番伏兵千餘突出對敵被我土兵連敗數陳逃奔過河復攻取下郭羅克之吉宜卡等二十一寨殺死賊番甚多連夜進兵直抵中郭羅克之納務等寨賊番猶敢對敵我兵奮不顧身自卯至酉連克一十九寨斬殺三百餘人擒獲賊首酸塔爾榜索布六戈復親督官兵抵上郭羅克之押六等寨正欲攻取該寨頭目旦增等將首惡假磕併為從格羅等二十二名綁縛獻出率領闔寨男婦老幼叩頭乞命只將為從賊番盡行正法首惡酸塔爾榜索布六戈假磕解送等語殊屬可嘉在事官兵著議敘具奏癸未命陜西總督鄂海按察使永泰赴吐魯番墾地上諭議政大臣等曰吐魯番現駐官兵其可種之地甚多總督鄂海按察使永泰在大將軍處無甚事務著前往吐魯番地方種地效力議政大臣等奏鄂海管理甘州糧餉今往種地糧餉事請令綽奇管理奏入上從之平定準噶爾方略前編卷九
