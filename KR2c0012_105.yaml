body:
  text: 乾隆二十三年二月甲申副都統順徳訥等疏奏擒獲庫魯特宰桑摩羅等順徳訥等奏言臣等帶領官兵從察罕嶺向烏隆古哈卜塔克拜塔克前來十二月十八日據哨探伊薩穆等報稱和博克河有十餘騎踪跡臣等即令公額爾克沙喇固濟爾巴圖魯璊綽爾圖委署營總阿逹木保委署叅領額林沁等追至賽爾山賊人放鎗迎敵次日我兵奮勇衝入前隊察哈爾那木扎卜索倫蘇勒鼐俱被鎗傷我兵將賊人十餘戸盡行𠞰殺餘二賊亦帶重傷詢係布庫努特得木齊庫本之屬人庫本亦被𠞰殺因將伊妻查出詢問據供宰桑吞圖布被殺後伊等徃投巴圖爾烏巴什不肯收納遂逃至此地打牲度日等語正月初一日在烏隆古擒獲厄魯特巴圖詢知竒薩勒比斯淖爾相近之博洛爾托輝有哈薩克錫喇之得木齊逹什扎卜等藏匿其水多魚結寨住守臣努三同璊綽爾圖藍翎侍衛薩爾哈圖莽喀察等前徃初三日遇賊人十餘戸即行𠞰殺初四日探有賊人二十餘戸踪跡令厄魯特察罕庫本班第等聲言收服有根敦扎卜等投出詢知逹什扎卜等約八十餘戸因令為前導夜行逹曉始到其地樹林深宻塹壘堅固不易攻取令察罕庫本等前徃收服逹什扎卜同一喇嘛出見後餘人俱出收其鳥鎗將丁壯二百餘𠞰殺詢問逹什扎卜知多倫和濟格爾有得木齊托拜居住又拜塔克有庫魯特宰桑摩羅等居住常向巴里坤盗取馬匹十一日臣等至西巴克鄂博令佐領阿爾噶勒沁等於多倫和濟格爾等處分兵搜緝見賊人百餘俱行𠞰殺托拜被傷擒獲詢係哈薩克錫喇所屬因年老傷重即行正法二月初一日至拜塔克附近之烏塔莫和爾探知摩羅等在拜塔克臣努三於山峪防守臣順徳訥同額爾克沙喇璊綽爾圖等令藍翎侍衛薩爾哈圖營總金濟噶爾等哨探據報賊人已將馬駝装束欲逃臣等急徃攻擊摩羅等散走山谷我兵分路截拿摩羅窮蹙放鎗拒戰阿爾噶勒沁等歩行登山射傷摩羅兩脛始被擒獲詢問摩羅據供前年冬因在巴里坤被𠞰帶領男婦四十餘人於北山盗馬一百二十餘匹逃出去年五月又徃巴里坤盗馬百餘匹今年二月間扎哈沁莫岱等從巴里坤盗馬一百餘匹來拜塔克附近居住摩羅等遂與相合今欲移徃喀喇薩爾竒打牲度日等語臣等將摩羅逹什扎卜喇嘛羅林格隆等帶至巴里坤應否送京請㫖遵行計二月十八九等日可至巴里坤其𠞰賊官兵列為三等及陣亡得傷人等造册送部至出衆効力之官兵十三人謹另繕名單功次可否特沛恩㫖以示鼓勵奏入上諭軍機大臣曰順徳訥等自哈薩克邊界撤兵途中搜查逸賊盡行𠞰殺復將哈薩克錫喇之黨摩羅逹什扎卜等生擒實屬可嘉著加恩將順徳訥交部議叙賞給世職努三授䕶軍統領額爾克沙喇封為貝子其奮勉効力之侍衛等按本身等級以次陞授防禦授為佐領佐領授為副總管遇缺即補委署防禦驍騎校䕶軍校俱令實授虚銜孔雀翎授三等侍衛虚銜藍翎准其實授藍翎侍衛餘著造册送部議叙其陣亡人等係虚銜孔雀翎藍翎俱照三等侍衛藍翎侍衛職銜委署防禦驍騎校䕶軍校俱照所署職銜送部議䘏永著為例再厄魯特察罕庫本班第二人著順徳訥查明若未經授職俱授為三等侍衛已經授職亦以次遞陞順徳訥仍遵前㫖到巴里坤後稍為休息再隨雅爾哈善奮勉前進又諭曰從前兆恵等撤兵過冬並未奏及沿途𠞰殺嗎哈沁等似伊等所行之路全無一人今順徳訥既將摩羅逹什扎卜擒獲復𠞰殺賊人如許富徳囘兵時亦然看來逃匿賊人正自不少兆恵特未留心搜捕耳事屬既徃朕不復追究著傳諭兆恵此次進𠞰沙喇擘勒賊衆斷不可仍似從前疎略務宜盡絶根株即有藏匿賊人聞信逺移者必隨其所向縱横追襲勿謂已經解散遂生玩忽順徳訥奏摺併抄發又諭曰順徳訥等審訊擒獲厄魯特宰桑摩羅等據供三次至巴里坤盗馬三百餘匹等語駐劄辦事大臣竟未見一次具奏即所屬未經呈報伊等漫無覺察所司何事且安知非被盗隱匿入於倒斃數内混行報銷者著傳諭呉逹善等將此二年内巴里坤馬匹共被盗幾次實數若干係何月日何人牧放或屬人未報或伊等未奏之處務查明據實奏聞亦諭黄廷桂一併查奏其摩羅逹什扎卜等解至巴里坤時呉逹善等即遴委官兵速解來京命賑䘏喀爾喀圖謝圖汗部落齊巴克雅喇木丕勒六旗人等上諭軍機大臣曰據桑寨多爾濟奏稱親王齊巴克雅喇木不勒公孟固貢楚克齊旺多爾濟扎薩克固魯扎卜貢楚克車林等六旗䝉古人等被灾較重生計艱窘朕心深為憫惻著派都統多爾濟帶銀一萬兩前赴圖謝圖汗部落散賑以示體䘏又諭曰桑寨多爾濟奏親王齊巴克雅喇木丕勒六旗人等被灾已降㫖賑䘏至所奏停止派差之處從前喀爾喀内一應差役朕已加恩改為官辦不知此外有何派累著傳諭成衮扎布查明若尚有差役將此六旗暫行停止至所奏請將查拿賊盗之協理台吉逹瑪林扎卜宰桑逹什扎勒賞給孔雀翎伊等查拿本地賊盗係其職掌非軍前効力可比姑照所請賞給若因已經賞翎不加奮勉著即行具奏又據奏請令三都卜多爾濟協辦事務近經將軍成衮扎布奏令公三都卜多爾濟協助桑寨多爾濟辦事朕已准行未知即此人否若非其人則仍用成衮扎布所奏但向西路軍營調取尚需時日親王齊巴克雅喇木丕勒諳練事務即著派伊協辦命駐劄西寧辦事副都統徳爾素來京以副都統濟福辦理青海事務軍營効力之厄魯特雅賽瑪木特及克勒特等十八人由巴里坤送京命查其家口之已賞官兵者給還安插乙酉定邊將軍兆惠等疏奏進兵日期兆惠等奏言臣等奉到正月十三日諭㫖以從前酌定正月進兵今已初旬尚未奏及致厪聖懐臣兆惠臣富德等䝉恩教育趨奉内廷伏覩我皇上勅幾圖政宵旰勤劬至軍營奏報雖當深夜猶於門隙傳進元旦仍辦理軍務凡軍前臣僕㣲勞無一不䝉軫念臣等常以曉示索倫䝉古官兵等俱不勝感激今巴圖爾烏巴什出痘身死係哈薩克人等傳説哈薩克錫喇等亦前往沙喇擘勒不過互相掠奪臣等雖將瑪納斯附近之嗎哈沁等搜𠞰尚未得逃匿各賊消息臣富德於進兵時在前隊哨探捉生詢問即速具奏現在都司富勒渾蘇勒逹三等侍衛訥克布藍翎侍衛愛普薩等由巴里坤將頭撥軍器口糧於二月初五日運至軍營無悞有駝隻一千八百有竒惟倒斃一百餘隻又據巴圖濟爾噶爾報稱䕶送馬匹於二月初八九可到臣等將軍器酌量分給兵丁毎人給馬二匹稍有不敷通融辦理策布登扎布於正月十六日從巴里坤起程早晚可至臣等擇吉於二月初九日起程在途次㑹合至從前係臣富徳管理臺站今在前隊行走其尾隨大兵安設臺站派巴圖魯侍衛瑪瑺管理奏入報聞命議叙都司富勒渾等上諭軍機大臣曰兆恵等奏都司富勒渾蘇勒逹三等侍衛訥克布藍翎侍衛愛普薩自巴里坤運送軍器口糧無悞且愛惜駝隻不甚傷損等語著將富勒渾等及効力兵丁造册送部照例議叙中諭叅贊大臣永貴等安設臺站事宜上諭軍機大臣曰前因軍營臺站關係𦂳要已有㫖令永貴等加意安設今兆恵等現在起程進兵臺站馬匹務冝肥壯方不悞馳送事件著傳諭永貴定長自巴里坤至軍營臺站馬匹如有疲瘦者酌量更換或自巴里坤派發馬匹前徃俱妥議辦理並諭黄廷桂呉逹善等四川解來馬匹此時料已牧養足用即揀送巴里坤以備接濟俟永貴等咨調時速為應付以驗看逆賊阿睦爾撒納身尸確實宣諭中外上諭大學士曰前據桑寨多爾濟奏俄羅斯畢爾噶底爾等報知逆賊阿睦爾撒納身死須作速遣人徃驗當諭速派認識逆賊之人前徃今據覆奏與親王齊巴克雅喇木丕勒㑹同哈畢坦等詳驗阿逆身尸肌肉尚完並未朽壞且面貎宛然但據伊等告稱薩納特衙門尚未有交付帶囘之信是以不敢輕與等語據此則阿睦爾撒納之死㿽屬確實無疑朕前經降㫖令將阿睦爾撒納尸骸解送京師特以逆賊情罪重大雖已自斃亦應懸之藁街以昭顯戮耳但其罪惡貫盈已伏天誅現今遣徃之人㑹同詳驗確實毫無可疑則俄羅斯將阿睦爾撒納之尸解送與否均可不必深論著將所奏識認阿睦爾撒納尸骸確實縁由傳諭中外知之臣等謹案阿逆逃入俄羅斯見聞既確我皇上睿斷獨操謂孰言索取亦惟乘機酌理物來順應不以一逆孽而更欲窮兵然徳威昭播逺服畏懷哈薩克以曾匿逋逃之故怵我兵臨率屬面内傳檄所至固已不勞而定俄羅斯雖飾詞隱譎未嘗敢有抗違前此詭稱溺斃早䝉洞燭其奸即不敢復萌欺妄迨逆賊既伏㝠誅更懼徒乖恭順且惟恐不能取信亟請驗尸為確據於情事尤無可疑葢處置得冝誠有不怒而威於鈇鉞者乃聖諭則謂斷不恃我國威誅求過當况彼既謹腊逆尸再經相驗則棄之窮荒以聽蟲沙之自化固無異於釁鼓懸街置而不論㿽欽聖主知明處當之權衡矣葢我皇上討逆綏遐黙運成算故兇渠未靖則力屏姑息苟且之言及操縱在我則不為索垢求瑕之舉行乎其所當行止乎其所當止順天而動悉合機冝洵足為萬世法也命副都統福禄徃代阿蘭泰辦理烏里雅蘇台事務上諭軍機大臣曰副都統職銜阿蘭泰効力軍前有年辦事雖未妥協尚無貽悞軍機之處著授為鑲黄旗漢軍副都統來京供職副都統福禄著授為叅贊大臣前徃烏里雅蘇台協同成衮扎布辦事恩免原任將軍策楞等家屬治罪上諭軍機大臣曰從前將策楞永常舒赫徳玉保等家屬治罪特以用兵伊始而伊等貽悞軍機因縁坐示懲今逆賊阿睦爾撒納已死軍務將次告竣著將策楞永常舒赫徳玉保等子嗣俱加恩免罪充發者召囘監禁者釋放玉保妻女前入辛者庫亦一併寛免令歸本旗三月丁亥朔訓諭定邊將軍兆恵等查辦送馬情節上諭軍機大臣曰據兆恵奏稱巴圖濟爾噶爾等送到馬匹派給官兵計現兵三千六百餘名富徳領兵五百為前隊哨探餘兵分半令策布登扎布哈寧阿帶領續進伊與巴禄在後進發等語所辦尚屬妥協但巴圖濟爾噶爾所奏郭木尼勒圖將伊隊内馬匹隱匿情節已命兆惠秉公審訊即未奉到諭㫖此時巴圖濟爾噶爾豈竟無一語兆惠等亦豈未風聞巴圖濟爾噶爾係一不識字之厄魯特若非情事迫切且因伊隊内送馬官員等慮賠累處分又豈肯代為繕摺兆惠等乃總未奏及顯係顢頇息事何以服人之心從前數次進兵雖厄魯特等頑梗難化反覆難信亦由此等徇私曲庇不能感服之所致朕每為追歎行軍之道當以感服人心為要兆惠等知此務將此事始末毫無偏袒詳悉審擬具奏巴圖濟爾噶爾看來人頗質實兆惠等若能服其心尚可以得其力著傳諭知之又諭曰昨諭哈寧阿在雅爾哈善隊内行走今既同策布登扎布進兵著傳諭雅爾哈善即派兵數百名委順德訥為前隊無庸更調哈寧阿前往命原任布政使署内閣侍讀學士溫福遇缺即補隨定邊將軍印辦事戊子命厄魯特散秩大臣三都克在上駟院行走賞銀一百兩己丑命安插厄魯特沙喇巴圖爾等於察哈爾上諭軍機大臣曰前因厄魯特巴雅爾等八人隨端濟布効力行走令從巴里坤咨送來京今巴雅爾諾爾布曼集於中途病故其沙喇巴圖爾穆呼頼和通托林特古斯俱授為䕶軍在察哈爾旗分安插居住庚寅諭定邊左副將軍成衮扎布等嚴禁喀爾喀四部落賊盗上諭軍機大臣曰據呉逹善奏稱喀爾喀賽音諾顔部落之策凌與同旗得秦鎗斃卡倫緑旗兵張存義談成選尤雲啟三人奪其駝隻軍器車零旋被拿獲俟緝獲得秦質審正法等語從前準噶爾猖獗時喀爾喀䝉古等畏懼無敢越境盗竊者今𠞰滅厄魯特以安喀爾喀於巴里坤轉運糧馬分臺設哨而車零等乃敢戕害兵丁轉若厄魯特既平更可向内地為盗受恩䝉古舊僕中有此敗類情甚可惡但將伊等正法不足蔽辜著查明所有家口産業分給被害三人之家仍傳諭成衮扎布等通行曉示四部落扎沙克等務冝約束所屬毋得越界為盗致干國憲辛卯靖逆將軍雅爾哈善等疏奏招撫囘部事宜雅爾哈善等奏言臣等欽遵聖訓體察囘部情形相機籌辦伏思額敏和卓乃囘部素有名望聞烏什城頭日伯克霍集斯兄弟子姪分居四城其勢與兩和卓木相等亦相聽信若額敏和卓擇親信之人設間於伯克霍集斯以離其黨或能擒送逆酋一面進兵安撫成功尤速商之額敏和卓亦以為然現在吐魯番有伯克霍集斯舊屬五六戸擬選擇數人帶徃俟取庫車後相機差遣至圖爾璊與吐魯番同異詢據額敏和卓云伯克霍集斯之父阿斯呼濟原係吐魯番頭目康熙年間大兵入吐魯番我兩兄以魯克察克城歸附阿斯呼濟逃入準噶爾及大兵撤囘策妄阿喇布坦送囘阿斯呼濟將我兩兄戕害遷吐魯番魯克察克囘衆於哈喇沙爾又遷徃烏什故仍稱烏什城為圖爾璊即係吐魯番等語再現在軍營索倫兵合計可得四百五十名臣等行文兆恵派發索倫兵五百名前來以符一千名之數奏入上諭軍機大臣曰據雅爾哈善奏招撫伯克霍集斯等事頗合機冝但額敏和卓既為叅贊大臣即應列名同奏勿存分别之見至行文兆恵調發索倫兵丁現在遣送兆恵軍營之緑旗兵一千名因慮難及師期已停其前徃是兵丁本屬無多且兆恵之機宜在𠞰雅爾哈善之機宜在撫兩路所用索倫兵自當權其多寡亦不必調徃雅爾哈善軍營可傳諭兆恵雅爾哈善等若所調索倫兵起程未逺兆恵仍即追囘此㫖著速行飛遞命肅州總兵官閆相師同丑逹五福等帶領緑旗兵丁在雅爾哈善軍營効力壬辰命更代科卜多軍營辦事大員等上諭軍機大臣曰舒明在科卜多軍營已閲數載著即來京正紅旗䝉古副都統濟福駐劄西寧其員缺著扎隆阿補授在科卜多辦事其正紅旗䝉古副都統著徳爾素署理正白旗䝉古副都統順徳訥現在軍營其員缺著舒明署理諭駐劄西寧副都統濟福等酌辦堵截賊衆事宜上諭軍機大臣曰昨據喀爾喀親王桑寨多爾濟奏報逆賊阿睦爾撒納逃入俄羅斯出痘身死已命齊巴克雅喇木丕勒徃驗屬實是大功將次告成雖尚有嗎哈沁等賊此次進𠞰即可掃除著傳諭濟福等向青海䝉古通行曉示前命扎拉豐阿等於青海豫備堵截賊衆看來即有逋逃必非大隊若扎拉豐阿等派兵備𠞰少渉張皇則䝉古等未免驚懼可酌量情形如全無踪跡即當囘京現在辦理情形若何作速具奏甲午大學士管陜甘總督黄廷桂疎奏籌辦哈薩克貿易事宜黄廷桂奏言伏查哈薩克於本年七月在烏魯木齊等處交易臣一切豫為籌辦其縀布等項俱經運赴巴里坤收貯今侍衛努三於二月二十九日抵肅臣詳悉詢問據稱哈薩克各部人皆散處凡有調遣㑹集之事俱各隨所願貿易人數多寡不能豫定内地茶葉非其所好不必備徃即粧蟒縀疋等件亦宜酌量配搭不可過多惟各色羢褐氊毯印花布等物是其所需購運亦易伊地婦女皆以白布纒頭似宜多備等語臣查烏魯木齊道途遥逺不便臨時備辦羢褐等件係西安蘭州等處出産臣擬分飭各藩司將此數項酌量購辦先期運赴巴里坤收貯倘哈薩克人數無多布褐皆官兵常用之物即於彼處散給扣餉歸疑再努三於三十日起程赴京奏入報聞丁酉命佐領職銜郎中三寳經理逹什逹瓦游牧上諭軍機大臣曰富森現在病故逹什逹瓦游牧著三寳前徃經理其糧餉事務著富勒赫僧保住辦理戊戌扎哈沁公扎木禪懇請入覲命於本年七月前赴木蘭圍塲己亥諭定邊將軍兆恵等堵𠞰沙喇擘勒等處賊衆上諭軍機大臣曰去年命和碩齊等䕶送哈薩克使臣於歸途之便在額爾齊斯相近之輝邁拉呼布空郭勒等處駐兵凡從沙喇擘勒竄逸及逃徃俄羅斯賊衆相機堵𠞰今兆恵等進𠞰賊衆必聞風奔潰或向俄羅斯或徃額爾齊斯阿爾台竄逸俱未可定兆恵等一聞信息當遣發輕騎知㑹和碩齊等令其協同堵𠞰但不可因額爾齊斯等處已有和碩齊等堵截遂將應行防範路徑轉多疎忽致賊衆得以脱逃至伊等進兵月餘此時現到何處曽過伊犁否賊衆情形若何作速奏聞諭定邊左副將軍成衮扎布等酌議撤囘索倫兵丁事冝上諭軍機大臣曰前因擒拿阿睦爾撒納𠞰捕逃竄賊衆派索倫察哈爾等兵丁在烏里雅蘇台等處駐劄今阿逆既伏㝠誅阿爾台以徃地方寧謐烏里雅蘇台兵丁初無所事轉以防範喀爾喀邊界之厄魯特恐策凌䇿凌烏巴什等不能無疑且兵丁駐劄年乆自應酌量撤囘以示休息可傳諭成衮扎布等於烏里雅蘇台科卜多等處兵丁量足看守倉庫供應差遣外其餘索倫察哈爾等兵丁應如何分隊撤囘著定議具奏和碩齊唐喀禄等帶兵不多於歸途亦撤囘游牧再從前喀爾喀四部落毎年派兵防秋今準噶爾既入版圖防秋之兵或仍照例派撥或當酌減併著議奏又諭曰索倫兵効力軍前屢年未獲休息今賊衆漸次𠞰滅大功將竣自可不日撤囘現議在烏魯木齊魯克察克等處屯田令緑旗兵駐劄雖嫻於耕作而鎮守廵防之用不及索倫若令索倫兵同駐似為有㿽伊等每年進納貂皮今移徃駐防既免其納賦又有錢糧養贍射獵資生自當更覺饒裕可傳諭綽爾多等於索倫兵丁内揀選一千名明白曉示以駐防之外並無别項差遣且於伊等生計有㿽或今年先遣兵丁前徃來年再將伊等眷屬移去料伊等自必情願至揀選兵丁時若戸口多者恐其親屬相離毋庸派徃惟小戸單丁為善其作何選派及擕眷駐防果否與伊等有㿽著綽爾多等定議具奏宣諭原任副將哈尚徳罪狀上諭大學士曰前兆恵叅奏副將哈尚徳解送軍營食羊二萬五千隻沿途倒斃一萬五千六百有竒據該員禀稱原領之羊即有疲癩等語當即降㫖交該督黄廷桂及巴里坤大臣等查明具奏今據陸續奏到此項羊隻哈密闢展兩處俱係巴里坤大臣專委哈尚徳查收牧放自哈密起程時該員自行揀選及至闢展牧放又經三四月之乆并將疲乏羊隻退囘而闢展接收之羊亦係該員親揀解徃且於正數外多帶一千六百餘隻已屬足數何至倒斃一萬五千餘隻之多哈尚徳既經收牧放又親行挑解並非倉卒交收致有病乏等情而沿途辦理不善遺失倒斃過半尚種種揑飾委之無奈哈尚徳由廢員加恩録用乃承辦此等要務並不實心出力貽悞軍需罪無可逭哈尚徳交巴里坤大臣枷號示衆並勒令照數賠補以為怠玩公事者戒俟賠補完日再請㫖發落戸部侍郎阿里衮等疏奏招撫羅卜淖爾囘衆情形阿里衮等奏言臣等於二月初九日至羅卜淖爾地甚寛廣林木深密有囘人頭目哈什哈等投見據稱伊等原有二千餘戸數十年來移徃阿克蘇多倫等處現在尚有六百餘人以漁獵為生四十年前大兵平定吐魯番時將軍等曽經招撫賞給縀布茶葉撤兵之後為準噶爾所據近聞大兵平定準爾前年曽進貢仙鶴送交吐魯番頭目莽噶里克至今未知信息昨聞額敏和卓移居吐魯番伯克托克托前年被瑪呼斯掠奪逃至此地聞亦歸附懇准我等霑受皇恩等語臣等詢問羅卜淖爾通逹何處有無厄魯特賊人藏匿哈什哈告稱此水甚大周行須兩月餘準噶爾葉爾羌喀什噶爾等處六十餘河皆滙於此地等語臣等沿途登髙瞭望不見涯岸今大兵兩路進𠞰恐將來有逋逃賊衆隨派員查明伊等戸口歸併額敏和卓管轄并曉示哈什哈等嗣後有厄魯特及他處囘人逃匿即行報知哈什哈等叩謝復以狐兔皮乾魚等物向兵丁等貿易而囘奏入報聞庚子命酌賞青海䝉古官兵上諭軍機大臣曰據濟福等奏稱奉到豫備兵丁毋庸聚集之㫖即傳諭索諾木丹津令其散遣據稱若盡行撤囘恐倉卒難於調發酌將近地者散遣逺道者仍在烏圖等處駐劄水草甚佳並無勞苦等語昨令兵丁仍囘各游牧原所以示體䘏今伊等辦理頗為妥協即照所奏行從前魯有諭㫖若調用伊等兵丁加以恩賞今雖未調發業經聚集亦應酌量賞賜著濟福等㑹議具奏申諭黒龍江將軍綽爾多等酌議索倫兵丁駐防事宜上諭軍機大臣曰昨諭綽爾多等揀選索倫兵一千名駐防烏魯木齊等處並將擕眷前徃之處議奏特慮伊等兩地瞻顧務使得所之意今思人情安土重遷或擕眷亦非所願且駐防兵丁亦不妨更番戍守著傳諭綽爾多體察情形如不願擕眷即定以年限派兵更代酌量賞賜若有更代駐防舊例即查照辦理或無例可援即照出兵例減半賞給仍曉示伊等以駐防非用兵可比出自特恩此事究竟如何辦理綽爾多等即定議具奏平定準噶爾方略正編卷五十一
