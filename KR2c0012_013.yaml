body:
  text: 雍正元年十二月戊申議叙軍前效力䝉古人等功封厄魯特多羅貝勒額駙阿寶為多羅郡王台吉沙畢多爾濟為固山貝子喀喇沁一等塔布囊噶爾瑪色楞札薩克一等台吉沙克都爾扎卜並為輔國公餘各擢賞有差己酉靖逆將軍富寧安奏報巴里坤屯田收穫青稞二萬一千六十石有奇奏入得㫖下部知之癸丑安插察罕丹津等屬人來歸者撫逺大將軍年羮堯奏言王察罕丹津屬下額爾克扎爾固齊阿勒達爾和碩齊拉布木三人共殺羅卜藏丹津之守者率其户口千餘來歸貝勒塞卜騰扎爾率青海左翼公䇿凌之弟台吉巴爾珠爾等及其屬人二千來歸臣即宣布皇仁赦其脅從之罪安插於西川口外尋又奏言察罕丹津之壻喇卜坦宰桑巴圖等屬下千四百餘户及丹衷屬下七百餘户並自羅卜藏丹津處脫身來歸仍令歸其所部奏入報聞戊午撫逺大將軍年羮堯奏請訊勘墨爾根戴青拉察卜父子及誅堪布諾們汗年羮堯奏言墨爾根戴青拉察卜二子察罕喇卜坦旺舒克喇卜坦率衆來投云我父墨爾根戴青拉察卜聞大兵來已脫奔巴爾喀木矣又堪布諾們汗亦率所屬來臣以墨爾根戴青拉察卜嘗助羅卜藏丹津劫掠察罕丹津有罪已令其子遣人招之到日勘實請㫖堪布諾們汗乃近邊塔兒寺喇嘛且察罕丹津之姪也既煽羅卜藏丹津為叛又敢令喇嘛與我兵戰勢窮來投罪不可貸到日即正法奏入報聞辛酉命賞給諸路軍前兵丁行糧一月撫逺大將軍年羮堯奏敗賊於布隆吉爾進勦郭密諸部年羮堯奏言賊兵三千餘人來侵布隆吉爾參將孫繼宗遊擊孫超節率兵迎戰兵既交副將潘至善以兵至併力擊賊殺傷甚衆所獲器械無算尋又奏言西寧一帶番賊已勦滅惟南川口外郭密九部肆行劫掠臣先招下其沙克都爾阿喇卜坦等三部餘部肆掠如故其呈庫和爾嘉二部暴橫尤甚嶽鍾琪所率瓦斯雜谷兵熟習山路臣前令嶽鍾琪往歸德堡於上寺東䇿卜下寺東䇿卜賊番助惡者或勦或撫各已安插即移師進勦郭密番賊搜其巢穴呈庫一部攻殺略盡和爾嘉諸部首惡已誅餘衆悉降奏入報聞雍正二年甲辰春正月丙子朔䇿妄阿喇布坦使臣根敦等隨班朝賀行禮上命賜宴丁丑諭免烏梁海民借餉上諭理藩院曰朕問貝勒博貝管轄之烏梁海人民近時何以資生據奏在將軍祁里德處借餉一萬八千五百六十兩買牲分給各得産業今勝於昔其所借餉銀伊將俸銀逐年抵補等語朕思博貝歷年宣力勳績卓然且烏梁海等衆均係朕之百姓豈有養育朕之百姓而借餉於朕之理所借銀兩不必扣還著行文將軍祁里德知之命治侍郎常授罪議叙筆帖式多爾濟先是千總馬超羣從侍郎常授往羅卜藏丹津處超羣還言羅卜藏丹津與常授約於察罕托羅海㑹議常授行至和爾處㑹日暮有賊二三千人突至劫常授及輜重去筆帖式多爾濟憤激抽刃自刎常授被執在堪布廟中至是撫逺大將軍年羮堯奏言十二月十三日羅卜藏丹津送侍郎常授回營并呈奏章一函筆帖式多爾濟仗節捐軀請豫優恤奏入得㫖侍郎常授乃簡任西寧辦理青海事務之員伊並不將羅卜藏丹津謀叛情形奏聞一切軍務悉推諉於年羮堯又擅棄西寧輕往青海為羅卜藏丹津所獲及羅卜藏丹津將伊釋放復靦顔生還溺職已甚著將常授拿解西安監禁至筆帖式多爾濟被賊擒獲不屈身死甚屬可嘉著交部照殉節例議叙仍著大將軍年羮堯照例豫祭戊寅命撫逺大將軍年羮堯申討羅卜藏丹津及其同謀逆黨上諭年羮堯曰朕前曽降㫖羅卜藏丹津被困時必將常授送回請罪今果將常授送回矣羅卜藏丹津從此又以甘言巧懇阻滯吾兵亦未可定羅卜藏丹津乃辜負國恩與吾兵對敵之叛賊國法斷不可宥不得因伊曽封王爵稍存疑慮再與羅卜藏丹津同謀之王貝勒貝子公等既經背叛其爵即宜削除伊等或來歸順或被擒獲不必更論其先曽封爵但論其行事之輕重可寬者從寬應治罪者治罪辦理奏聞甲申敕諭中外喇嘛上諭理藩院曰西海逆賊羅卜藏丹津一事喇嘛等理宜將叛亂之人善言開導令其和輯不致起事戕害生命是為維持佛教如其不能亦應呈明該將軍等各自閉户安居豈意反助西海悖逆之人竟糾合數千喇嘛手持兵刃公然抗拒官兵及至潰敗猶不降順入廟固守以致追殺覆滅有玷佛教甚矣欽惟太宗文皇帝時第五輩達賴喇嘛遣使入覲極為恭順及世祖章皇帝時將第五輩達賴喇嘛延至京師封為瓦齊喇達喇達賴喇嘛䝉被殊禮百年以來法教興隆皆我朝之恩賜也前者準噶爾冦犯招地殺戮僧徒折毁寺廟聖祖仁皇帝遣發大軍恢復招地俾達賴喇嘛重安法座佛教復興如此隆恩喇嘛並不感激反助悖逆之人凶惡已極於佛門之教尚可謂遵受奉行者乎將朕此㫖遍諭各處寺廟喇嘛并住居䝉古扎薩克處之大小喇嘛等知之丙戍賞給巴里坤滿洲察哈爾緑旗種地兵丁銀兩有差丁亥授四川提督嶽鍾琪為奮威將軍戊子封喀爾喀鎮國公䇿旺諾爾布為固山貝子辛卯命賞副將孫繼宗破青海賊功上諭兵部曰副將孫繼宗領兵在布隆吉爾等處同遊擊潘至善大敗青海逆賊孫繼宗著賞給總兵官職銜俟有陜西總兵缺出題補壬辰命鑲白旗䝉古都統武格總管殺虎口至阿爾台一路軍臺事務癸巳上諭總理事務王大臣等曰額駙䇿凌奏稱伊自阿爾台軍營來時副都統勒欽圖原任將軍席柱年俱衰邁原爵公德瞻在軍營患病請將此三人撤回等語席柱勒欽圖著撤回德瞻係前往效力贖罪之人俟軍務告竣再令伊回京甲午撫逺大將軍年羮堯奏破喇嘛於郭隆寺年羮堯奏言章嘉胡土克圖瑚畢勒罕住西寧東北郭隆寺所屬喇嘛甚衆與羅卜藏丹津阿喇卜坦溫布隂相結好今年正月郭隆寺喇嘛忽羣聚演兵臣方行禁止而寺中喇嘛號召東山一帶番人約於十一日拒戰臣見反狀已露即遣提督嶽鍾琪㑹同前鋒統領蘇丹副都統覺羅伊禮布等統兵進勦兵未到郭隆寺而賊衆已於十二日駐營哈喇直溝迎戰我軍直前衝擊斬賊數千據其三領焚其十寨副將宋可進總兵官吳正安黃喜林等各有斬獲沿途又焚其七寨及所居屋七十餘所次日抵郭隆寺外繞寺並山谷伏賊千餘望見我軍悉入洞逃匿我兵鎗炮並發益薪縱火焚之賊盡熏死計前後殺賊六千餘燬郭隆寺并詰問章嘉胡土克圖瑚畢勒罕消息諸喇嘛已先期挾之往大通河西雜隆處矣臣即取達克瑪瑚土克圖斬之此次效力官兵及陳亡被傷者核實咨部奏入得㫖效力官兵俟事竣議叙其勞績尤著之官辨俱著加銜二等辛丑封喀爾喀一等台吉衮布扎卜為輔國公癸卯喀爾喀多羅貝勒恭額喇卜坦卒封其子佛保為固山貝子二月丙午喀爾喀扎薩克多羅貝勒吹扎木粲卒以其子納木扎爾車素隆襲爵壬子撫逺大將軍年羮堯請分路進勦羅卜藏丹津年羮堯奏言青海貝勒羅卜藏察罕貝子濟克濟扎卜台吉衮布色卜騰納罕伊什來歸羅卜藏察罕之母率諸部妻屬及貝勒䇿零敦多卜之姊悉至西寧隨給豫茶葉大麥等物令往口外駐劄臣思羅卜藏丹津欲威脅諸部以益兵力衆心未服若不乘機進兵則來投之人勢難保全臣令提督嶽鍾琪總兵官吳正安黃喜林侍衛逹鼐副將王嵩宋可進紀成斌等率兵六千分路進勦前鋒統領蘇丹留西寧軍營辦事奏入報聞戊午命議阿爾台撤兵駐防事宜上諭總理事務王大臣等曰青海之事不日告竣而䇿妄阿喇布坦亦屬恭順其撤回各路之兵及固守地方之事應預行定議額駙䇿零貝勒博貝俱在阿爾台駐劄年久地方情形皆所悉知現皆在京可詳詢阿爾台一路兵丁如何撤回及駐防兵丁應於何處安設之處確議具奏尋議曰䇿妄阿喇布坦以使臣吹納木喀既還中心悅服遣使復來意甚恭順然永固邊陲之䇿不可不預為籌畫方今阿爾台一路振武將軍𫝊爾丹軍中兵三千八十二人征西將軍祁里德軍中兵六千九十八人並應撤回前奉聖祖仁皇帝諭㫖喀爾喀邊疆係與䇿妄阿喇布坦及俄羅斯接壤交將軍及喀爾喀王等㑹議時議以茂岱察罕廋爾扎克拜達里克二地並要害宜駐兵已即其地築城後以烏蘭古木地廣土肥可以屯田乃遣哨兵治城屯駐但烏蘭古木直抵阿爾台山與茂岱察罕廋爾扎克拜達里克及喀爾喀游牧所在相隔千里不便請罷之仍於茂岱察罕廋爾扎克拜達里克兩處撥滿洲兵二千防守四年而代䝉古兵二千永駐其地滿滿兵於京城佐領下選一千七百四十二人不足則以八旗漢軍􅀈手充補䝉古兵於八旗游牧察哈爾佐領下選一千人右衛佐領下選七百人不足則以歸化城土默特佐領下兵丁撥補凡兵四千令一將軍一副都統領之將軍駐劄察罕廋爾副都統駐劄扎克拜達里克令所司鑄給將軍印信其察哈爾右衛歸化城䝉古兵二千設總管等管轄令於兩城左右游牧駐劄阿爾台軍前現有喀爾喀扎薩克兵二千請暫留駐令王丹津多爾濟額駙䇿凌貝勒博貝等統領調遣丹津多爾濟應鑄給管轄喀爾喀左翼兵丁副將軍印信䇿凌應鑄給管轄喀爾喀中路兵丁副將軍印信博貝應鑄給管轄喀爾喀右翼兵丁副將軍印信軍營一切鎧仗令兵部工部製給俸餉馬駝等物令户部支賞京城滿洲兵於明年四月啓行令將軍副都統率之出張家口由中路察喀爾右衛歸化城兵令總管率之擇便宜游牧而前其兩地屯田俟將軍到撥兵耕種令官商范育馪等挽輸米石以備支給口糧之用其屯種事務奏遣大臣一人辦理鑄給辦理茂岱察罕廋爾扎克拜逹里克兩處兵餉關防更四年與將軍俱代再請令傅爾丹於阿爾台兩路選兵五千留駐其餘令征西將軍祁里德於今年七八月統領撤回并上征西將軍印敇至阿爾台所設軍台道路荒僻且戈壁遼濶水草不佳查張家口去珠勒輝翁吉推河甚近水草充裕請遣大臣一人從此路移設臺站庶於兵丁畜牧均有禆益奏入得㫖爾等所議令傅爾丹處暫留兵五千名阿爾台既有喀爾喀之兵著留四千名餘依議并行文大將軍年羮堯知之撫逺大將軍年羮堯奏獲阿喇卜坦溫布等賊年羮堯奏言據嶽鍾琪報二月初八日率兵出口聞巴爾珠爾阿喇卜坦在烏蘭博爾克即分兵三路進勦比到賊已遁去遂令總兵官吳正安由北路總兵官黃喜林副將宋可進由中路嶽鍾琪侍衛達鼐由南路率兵追賊副將王嵩紀成斌各率兵搜山嶽鍾琪追至伊克喀爾吉阿喇卜坦溫布竄入哈爾吉山中我兵入山獲之黃喜林亦擒獲巴爾珠爾阿喇卜坦及其叔伊克喇卜坦趣令追賊首羅卜藏丹津勿脫即攜所擒獲阿喇卜坦溫布等三賊進勦并收撫逃散部落奏入報聞己未豫陳亡原任湖廣總督額倫特祭葬諡忠勇先是上命兵部議叙總督額倫特兵部議奏應給騎都尉兼一雲騎尉額倫特前以招摩多功已給雲騎尉應并為三等輕車都尉令其長子愛三承襲請諡忠勇至是豫諡特賜祭葬且命入昭忠祠甲子撫逺大將軍年羮奏擒阿岡部落賊番年羮堯奏言羅卜藏丹津背叛阿岡部落賊番輒探取內地信息報之臣令凉莊道蔣泂等率兵四路進勦斬獲人口牲畜無算即取賊首阿岡囊蘇正法奏入得㫖蔣泂著加按察使銜丙寅中甸番夷內附雲貴總督髙其倬疏言中甸故屬麗江後為青海所據嘗受逆賊羅卜藏丹津僞劄臣遵㫖令提督郝玉麟率兵駐其地番夷悉上所受僞劄歸誠納土現在安撫其人清理疆界奏入得㫖郝玉麟遵㫖率兵至中甸揚威駐劄宣布德意中甸番夷頭目歡忭感激率衆三千五百户男婦一萬七千五百名喇嘛一千十四人投誠納土髙其倬復遣官安撫殊屬可嘉俟青海事竣之日議叙具奏撫逺大將軍年羮堯奏擒吹喇克諾木齊屬下都喇勒宰桑及扎什敦多卜之母年羮堯奏言據嶽鍾琪報二月十四日兵至西爾哈羅色知吹喇克諾木齊在天城察罕哈達即進兵擒獲人口牲畜甚衆吹喇克諾木齊於十四日夜以三百人遁走噶斯其屬下都喇勒宰桑及扎什敦多卜之毋將其所屬人馬竄走台吉盆蘇克旺扎爾等獲之來獻即各賞豫銀縀令率䝉古兵五百往噶斯路追擒吹喇克諾木齊并令守備劉廷彥率兵與俱諜知羅卜藏丹津仍居故所大兵約於十九日直抵賊所在進勦奏入報聞撫逺大將軍年羮堯奏勦喇嘛番賊於石門寺年羮堯奏言據涼莊道蔣泂報石門寺喇嘛琿囊蘇山丹等所屬多卜藏瑪嘉諸部落詭辭降我潛與謝勒蘇額勒布兩部逃人倚石門寺為巢穴往來劫掠臣即令蔣泂率緑旗土司及民兵分五路薄石門寺奮勇齊發擊殺喇嘛番賊六百搜獲寺內盔甲五千刀鎗撤袋諸物無算即火其寺而還奏入報聞癸酉命巴里坤管理屯種事務原任江西巡撫王企靖回籍以正紅旗䝉古副都統雅圖總理屯種事務楚克賴納木扎爾內附撫遠大將軍年羮堯奏言楚克賴納木扎爾率其子䇿零敦多卜及屬下一千餘户來歸臣給豫茶葉大麥諸物仍令往伊克烏蘭和碩等處居住奏入報聞三月己卯喀爾喀扎薩克輔國公䇿凌逹什卒以其子敦多卜額林沁襲爵癸未平定青海撫逺大將軍川陜總督年羮堯奏言二月初八日遣奮威將軍嶽鍾琪率大軍進勦青海逆賊羅卜藏丹津由布爾哈屯直抵賊巢額穆訥布隆吉爾處分兵一千到北路柴達木斷賊走噶斯路嶽鍾琪率兵出南路尾賊後二十日諜知賊衆逃往烏蘭穆和爾我兵跡之賊復逃往柴逹木又分兵一千追賊大軍隨之進擊擒獲羅卜藏丹津之母阿勒泰喀屯及其妹夫格勒克濟農藏巴濟扎卜等并人口牛羊無算二十二日軍至柴達木羅卜藏丹津率二百餘人逃匿即分兵至烏蘭白克擒獲吹喇克諾木齊扎什敦多卜盡收其人户駝馬其助亂之八台吉等悉擒之羅卜藏丹津母及賊黨阿喇卜坦溫布等八人並降者盆蘇克旺扎爾等四人俱檻送軍前青海部落悉平奏入報聞甲申命䇿平定青海功賞賚官兵有差上諭總理事務王大臣等曰青海逆賊羅卜藏丹津之事大將軍年羮堯奮威將軍嶽鍾琪以及兵丁皆奮勇殺賊於十五日內即能將逆賊勦滅平定殊為可嘉年羮堯著授為一等公再賞一子爵嶽鍾琪授為三等公凡效力官兵俱加優恩䇿勳外著户部動用錢糧二十萬兩送至大將軍年羮堯處分别官兵效力等次賞給以示格外加恩之意封大將軍年羮堯之父年遐齡為一等公加太傅銜賜縀九十匹乙酉命原任將軍宗扎卜總管殺虎口至阿爾台一路軍臺並辦理遷置臺站事務丁亥以平定青海命詳定告功祀典裕親王保泰等遵㫖議曰平定青海應如平定吳逆噶爾丹例遣官告祭天地宗廟社稷永陵福陵昭陵暫安奉殿孝陵孝東陵景陵并奉先殿奏入得㫖是尋各遣官所在告祭如禮命內閣學士鄂賴自藏至西寧辦理䝉古事務壬辰敕諭䇿妄阿喇布坦上敕諭準噶爾台吉䇿妄阿喇布坦曰爾前者無故侵擾我哈密疆界罪在不赦皇考聖意止令於邊地防守雖各路發兵原無勦滅準噶爾之意也其後哲卜尊丹巴胡土克圖為爾奏懇皇考欲施恩寬宥所以遣使楚揚託音等諭爾前年爾所遣吹納木喀布窄等至哲卜尊丹巴胡土克圖處轉至總督年羮堯軍前送至京師朕定爾平生功罪開示大義面諭遣回今爾深省前非歸誠請罪遣使根頓同楚揚託音前來奏辭恭順得遂皇考初心朕意嘉恱爾所奏稱惟祈休養生靈闡揚正教為第一要務等語爾台吉不過準噶爾一部落之主尚欲休養生靈闡揚正教何况朕為四海臣民之主普天之下皆朕土率土之濱皆朕臣乎用是特遣御前總管京城喇嘛班第副扎薩克大喇嘛達爾漢楚揚託音內閣學士衆佛保副都統扎什喇嘛錫喇卜格楚爾等宣諭若台吉果欲輯寧爾國尚其誠一乃心與朕所遣大臣等申定疆圻諸事循理妥議歸於和順朕必施恩軫念永加眷顧仍前通市使命往來爾台吉誠能以鮮終為戒其必惟和惟順無二無疑披瀝悃忱以期永好不特克協於朕休養生靈至意爾台吉游牧地方亦永永無虞安居樂業矣特此諭示並賜各色縀二十七匹爾其祗承撫逺大將軍年羮堯奏擊敗阿喇卜坦蘇巴泰等年羮堯奏言據副將軍阿喇納報阿喇卜坦蘇巴泰等要路劫奪急當殱除臣令總兵官孫繼宗喀爾喀扎薩克通摩克等率兵抵喀喇淖爾聞賊逃往阿魯巴爾虎即進兵及之推默爾賊兵拒戰為我兵所擊敗盡棄牛羊率其妻子遁去奏入報聞命議防邊八事撫逺大將軍年羮堯遵㫖議奏曰防守邊口八事一大兵駐巴里坤吐魯番地久今䇿妄阿喇布坦恭順遣使事雖未竟而兵可暫罷臣請於巴里坤吐魯番兵中選滿洲䝉古緑旗兵二千人於巴里坤駐劄一千五百人於吐魯番駐劄再令緑旗兵二千人駐劄哈密餘兵悉罷之一布隆吉爾築城為駐兵防守之界請令一總兵官統兵五千駐劄分為五營其遊擊守備以下等官增設如例沙州去伊遜察罕齊老圖口相近最要害應分兵設一營駐劄哈密地隘容兵無多請於巴里坤吐魯番所駐兵撤後撥鎮標遊擊一人千總一人把總二人兵五百人防守每年更代其駐兵新城乞欽定嘉名以垂永久一布隆吉爾去嘉峪關五百餘里口外募兵一時難集請以甘凉肅三州所罷兵即駐其地其眷屬官為給路費遣往如兵缺以營中餘丁選補一布隆吉爾駐劄官兵俸餉由內地轉輸多費不便前者赤金衛栁溝所等處嘗募人種地今請於每營撥餘丁二百每丁官給牛二頭籽種四石口糧三石次年給半三年但給籽種之半嗣後勿給其田即為耕者恆産無論米麥青稞計收三石以為兵丁月糧一布隆吉爾沙州請設官以理民事赤金靖逆二衛舊設通判同知應令通判兼管二衛更於布隆吉爾增設一衛守備沙州增設一千總令專管種地事務其靖逆衛同知令移駐布隆吉爾並屬肅州道統轄一肅州總兵官四營有兵三千二百肅州居口內今大兵已駐劄布隆吉爾肅州兵止於口內分守臺站事少應撥肅州鎮標兵一營八百人往布隆吉爾再撥桞溝所兵一百靖逆衛兵一百往益布隆吉爾軍靖逆衛設一都司赤金及栁溝各設一千總並屬布隆吉爾總兵官管轄一布隆吉爾沙州故䝉古地赤金衛桞溝所嘗為䝉古部人游牧所出入方大兵在外我軍士向已耕種駐劄其地若兵撤後仍聽諸䝉古游牧往來或且爭競生事今布隆吉爾南山中多隙地應遣大臣一人率賢能章京往山中分地居之庶令內外地界明晰一寧夏地廣土肥舊設總兵官駐劄遇哈密有事輒自內撥滿洲兵赴之道逺甚無益按寧夏阿拉善山外去哈密逼近宜令滿洲兵駐防寧夏其駐兵若干及設官人數俟西寧事畢臣當審視詳悉定議再奏奏入得㫖此事甚巨著議政大臣等各抒己見詳加定議具奏尋議曰撫逺大將軍年羮堯所奏八事詳晰俱應如所請奏入上從之辛丑議行慶賀禮部議曰青海搆逆天兵致勦二旬定之邊陲安輯大軍凱旋應如諸王大臣所請皇上擇日升殿行慶賀禮奏入得㫖此次平定青海實由我皇考簡用將帥之得宜豢養辨兵之有素伊等感恩效力克奏膚功此皆謨烈貽留豈可為朕有乎朕纘承前烈守而弗違應行典禮勉從所請俟告祭陵寢後擇日具奏癸卯撫逺大將軍年羮堯奏擒斬嘉木燦堪布等年羮堯奏言據侍衛達鼐報三月初三日與副將紀成斌等搜勦羅卜藏丹津屬人諜知嘉木燦堪布喇嘛竄匿布代山後恐由西藏一路遁去遣人往調台吉濟木巴等撥䝉古兵於西藏邀截即率兵抵索羅穆逼之嘉木燦堪布等拒戰敗走我兵隨後勦殺濟木巴等間道迎賊擒斬嘉木燦堪布吹扎木素二人𫝊首軍營奏入報聞平定準噶爾方略前編卷十三
