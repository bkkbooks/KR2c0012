  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_015-1a, image: WYG0357/WYG0357-0233c.png}
body:
  text: 雍正二年冬十月癸酉靖逆將軍富寧安疏報吐魯番等處屯田收穫麥糜五千五百四十石有竒奏入得㫖下部知之命議叙勦撫花海子功賞恤有差上諭兵部曰奮威將軍嶽鍾琪具奏副都統達鼐阿爾什總兵黃喜林王嵩孫繼宗營總蘇圖等統領大兵窮追羅卜藏丹津直至花海子拿獲丹津琿台吉及其妻子並招撫三十三家台吉當此口外水凍草枯之候官兵奮勇逺行甚屬可嘉自大將軍以下著從優議叙官兵勞苦朕甚憫之一切馱載輜重馬駝亦多損傷著查明免其賠補其軍營馬匹如有倒斃亦令領帑購買補數再馬兵每名賞銀八兩步兵每名賞銀六兩䝉古兵有隨軍效力者亦著奮威將軍按其行走效力等次應如何賞給之處確議奏聞己丑以甘肅巡撫綽竒為工部尚書仍留肅州辦理軍務辛卯振武將軍傅爾丹疏報烏蘭古木等處屯田穫麥四千一百七十石有竒奏入得㫖下部知之乙未賜給厄魯特多羅郡王額駙阿寶游牧地阿寶奏言自我祖顧實汗歸誠內附百年於今受聖祖仁皇帝厚恩安土樂業前者青海兄弟部內阻兵搆亂上干天討臣等當束身同受誅滅重荷寬宥令安游牧感激莫報乞於青海賜臣閒曠之地居住臣當約束青海諸部不敢復萌亂心理藩院議曰阿寶父巴圖爾額爾克濟農和羅里自青海來歸封之貝勒阿寶襲封後以平定西藏有功晉封郡王應如王所請有貝子丹衷所居地甚寬濶即令阿寶駐牧并令大將軍年羮堯遣官齎餉助其移徙安插奏入上從之增設寧夏各官撫逺大將軍年羮堯奏言寧夏駐劄滿洲兵丁處請設一將軍二副都統四滿洲協領二䝉古協領每旗二滿洲佐領一䝉古佐領每佐領下一防禦一驍騎校八旗共撥駐防兵二千二百又八旗應撥步兵一千二百令監守城池倉庫左右兩翼增設兩防禦管轄步兵擇馬甲中健者令為前鋒再寧夏既駐滿洲兵應設一理事同知奏入上從之丁酉封厄魯特多羅郡王和碩額駙阿寶之姪協理台吉恭格喇卜坦為輔國公己亥上諭兵部曰川陜進藏出口一應用兵之處倒斃騎䭾馬匹著悉免賠補十一月庚戌議遣赴寧夏官兵事宜上命加賞銀兩有差八旗滿洲䝉古都統等遵㫖議奏曰寧夏道逺方今遣往官兵各給車糧如例外其驛一站率百里今請改八十里為一站駐防兵丁各養官馬二匹兩丁共養駱駝一隻今兵丁既以家屬往請增馬一匹共給三匹到時仍令飼養二匹凡給與馬各折銀十三兩令其自置由殺虎口過鄂爾多斯進橫城口再遣理藩院章京二人於鄂爾多斯東西界各駐一人禁止䝉古盜竊約束兵丁所用口糧約四十日自京支給二十日糧至大同再給糧二十日馬匹各給草束纛旗令工部給豫炮四十位令大將軍年羮堯辦給明年四月分八旗為八隊兩日一隊啓行奏入得㫖兵丁往口外行走收拾帳房鑼鍋等物須得費用寬裕馬甲每人著加銀三十兩步甲每人著加銀十五兩賞給庚申命賞給布隆吉爾撤還滿洲䝉古索倫官兵銀兩有差乙丑議叙平定青海及擒獲桌子山碁子山番賊功加大將軍年羮堯一等男世職十二月辛巳議叙進藏軍功一等男兼雲騎尉明保加一雲騎尉授為三等子一等男滿色加一雲騎尉授為一等男兼雲騎尉一等輕車都尉魯爾金加一雲騎尉授為一等輕車都尉兼雲騎尉騎都尉兼雲騎尉邁徒加一雲騎尉纍授為三等輕車都尉騎都尉博思和爾加一雲騎尉雲騎尉廣西五十一並加一雲騎尉纍授為騎都尉副都統吳禮布寶色覺羅伊禮布許國桂侍衛納秦營總郭柱雙寶四哥貝和諾穆爾泰塞爾圖蔡玉阿爾善西第黑色覺羅都什希窩黑德四格物寶來寶茂竒塔特阿克敦色楞阿蘭泰圖閔楊鼐薩木哈顧魯什喜卜達爾扎都斯噶爾扎木巴拉色勒木素舒木努唐吉禮永寶嶽寶穆克登烏林帕戴寶柱新泰黑雅圖托木蘇魏善三碩色章巴什敦濟納拉錫泰偏圖並授為雲騎尉授鄂賴為一等輕車都尉吏部奏言理藩院侍郎鄂賴奉㫖以取藏功給與雲騎尉鄂賴已為二等輕車都尉纍功當授為一等輕車都尉奏入上從之壬辰命以丁夀為參贊穆克登為將軍花善為副都統上諭總理事務王大臣等曰丁夀已授為鎮守茂岱察罕廋爾等處地方將軍但伊漢仗雖好識見不足此處將軍乃管束邊境初駐兵丁且與喀爾喀一處居住職任緊要著丁夀以都統銜授為參贊其應補授將軍之人爾等議派三員再此處駐防兵內有䝉古兵丁應派䝉古副都統管轄爾等亦議派三員具奏尋議曰茂岱察罕廋爾等處將軍擬遣振武將軍傅爾丹護軍統領覺羅佛倫歸化城都統丹津管轄䝉古兵丁副都統擬遣察哈爾總管哈濟噶爾達仆鑲白旗䝉古參領諾爾布扎木素伏候欽定奏入得㫖巴里坤軍營前鋒統領穆克登著補授鎮守茂岱察罕廋爾等處地方將軍令其馳驛來京理藩院侍郎花善著授為副都統管轄鎮守䝉古兵丁雍正三年春正月戊辰命都統查克旦往甘州上諭兵部曰朕前降㫖甘州延信之缺著阿林前往今策妄阿喇布坦之使將到阿林不甚威重著都統查克旦前往甘州居住可賞銀二千兩令其速行料理馳驛前往二月己巳朔以布隆吉爾為安西鎮設總兵官一員標下五營遊擊守備各一員千總十員把總二十員兵五千名以陜西神木副將孫繼宗為安西總兵官丙子命衮泰額爾錦赴富寧安軍上諭總理事務王大臣等曰穆克登已經召回副都統鄧竒章病故都統穆森年齒稍邁將軍富寧安處大臣甚少朕調衮泰來京俟其到日授為護軍統領同副都統額爾錦前往富寧安處聽其指麾行走戊寅命工部侍郎巴泰內閣侍讀學士雙喜辦理阿爾台糧餉屯田事己卯以副將張成隆協辦四川提督事上諭總理事務王大臣等曰署四川提督護軍統領納秦不甚熟練緑旗兵丁之事調察木多駐劄之化林副將張成隆協同納秦辦事察木多兵丁著年羮堯派員前往管轄甲申特賜靖逆將軍富寧安及提督路振聲帑金并賞給辨兵等有差上諭富寧安曰軍興以來已經數載爾在軍前效力小心謹慎提督路振聲係初次派往之人在邊地效力已久現今策妄阿喇布坦之事未完又不便撤兵若以兵丁久戍之故即令更換轉令伊等軍前數年勞績有初鮮終矣但爾等在外年久甚厪朕懷今特賞帑金二十萬兩內給將軍二萬兩提督五千兩其餘按辨兵效力年分以為賞賜之等次緑旗兵丁向係輪班行走伊等作何賞賜之處爾㑹同路振聲商酌所賞銀兩著行文年羮堯動西安庫帑派賢能官員解送賞給己丑諭飭撫逺大將軍年羮堯上諭年羮堯曰據嶽鍾琪奏稱青海郡王額爾德尼額爾克托克托鼐所屬部落窮困流離資生窘乏親王戴青和碩齊察罕丹津等所屬部落雖稍能存活亦屬貧窮爾身為撫逺大將軍凡西陲軍務調發糧餉綏輯逺人皆爾之責理應酌量事勢緩急人口多寡盡心籌畫辦理乃僅發銀一萬兩賑濟此諸部落流離失所之衆豈萬金所能遍給是知爾於諸務皆未實盡其心矣托克托鼐等遭叛賊搶奪投命來歸全賴安插得所俾其衣食有資今爾既不能籌畫於未然又不克拯濟其現在如諸部落內或有一二人窘急萬難自存潛逃逺匿竄入策妄阿喇布坦之地者朕必重治爾罪癸巳命奮威將軍嶽鍾琪等各舉勦賊辨兵入奏上諭大學士等曰進勦青海桌子山等處兵辨其人材可觀技勇優長者著將軍嶽鍾琪揀選保奏守備二員千總二員把總二員馬兵四名總兵官黃喜林王嵩紀成斌宋可進孫繼宗每人保奏守備一員千總一員把總一員馬兵四名文到限三日書名報部候㫖調來引見録用三月辛丑命康濟鼐兼領西藏及阿里事上諭撫逺大將軍年羮堯曰爾欲令康濟鼐駐劄西藏所議雖是但康濟鼐居住阿里地方亦甚緊要不知康濟鼐情願與否且與阿爾布巴隆布鼐等彼此能和睦與否今令康濟鼐為總領帶領伊屬下唐古忒往居西藏阿爾布巴等倘有不服康濟鼐孤身在彼雖欲效忠勢必不能朕意康濟鼐仍兼兩處往來行走似有裨益若令康濟鼐居住西藏伊即欲往阿里地方照管亦不可得此事極宜酙酌如以康濟鼐兩處行走為是康濟鼐往阿里地方去後令何人居住西藏總領辦事著㑹同侍郎鄂賴詳慎妥議辦理尋議曰康濟鼐應遵㫖於招地及阿里兩處往來若康濟鼐往阿里其招地事務即令貝子阿爾布巴總理奏入上從之乙巳議駐防塔拉渡川及先密寺設官調兵事宜川陜總督年羮堯疏言桌子碁子諸山為匪人潛匿之藪相度形勢惟塔拉渡川東通莊浪西接刀林先密寺四圍皆山林木茂密盜賊輒由此路出沒應於塔拉渡川有水處設一遊擊一千總二把總騎兵步兵共五百人即移凉州髙古城遊擊等官率兵駐防先密寺請設一守備一把總騎兵步兵共三百人即移髙溝堡守備黑松堡把總率兵駐防兵部議覆如所請奏入上從之丁未議打箭爐外增汰兵丁事宜議政王大臣等議奏大學士馬齊自內捧出奏摺一件奉硃批此奏殊屬可嘉實為國家專心盡忠此所奏之人名暫且不可明揚朕務必加恩著議政王大臣詳加速議具奏臣等遵㫖議得條奏稱前大將軍年羮堯所陳善後十三事其一言打箭爐以外木雅等處當增設兵六千議汰四川重慶川北二鎮化林一協及遵義諸營兵三千四五百人按化林為打箭爐扼要關隘若使額兵千人止留五百人又分二百人守打箭爐則四川之西邊兵勢弱矣重慶總兵官標下額兵二千重慶地屬四川沿大江據湖廣荆州之上流若汰總兵官及兵千人則四川東邊兵勢弱矣至川北總兵官駐保寧額兵二千四川保寧與陜西漢中相為犄角若保寧總兵官及兵千人并汰之則四川之北邊兵勢弱矣往者於兩省接壤之處相其地勢多設兵丁者欲令互相聲援且防察諸省盜賊也應請於內地所設官兵悉留之如故再打箭爐至巴塘九百里今以內地官兵六千置邊外何以使不侵擾打箭爐土司諸部落及里塘巴塘之番人至番地産青稞不産米穀內地官兵習於穀食其挽輸米糧建造城屋當如何並未詳議請仍令年羮堯確議具奏應如條奏所請年羮堯議汰之川北重慶化林諸鎮及遵義協巫山逹州二營經制官兵悉設立如故又年羮堯奏請打箭爐外增兵六千黃勝關外潘州等處增兵二千四百所增兵過多口外撥餉既不易或致騷擾諸番今川北等處兵汰之既不便請於所議設二處兵八千四百人減二千五百餘兵尚五千九百人亦宜酌量汰減請令年羮堯於汰減兵丁及挽運糧米建造城屋諸事分晰具奏到日再議奏入上從之夏四月丙子議徙吐魯番回人等於內地上諭議政王大臣等曰策妄阿喇布坦來求吐魯番之地曾諭將從前內附諸酋長令其遷入內地今將軍穆克登奏言吐魯番處共有一萬餘人若但遷首領數人而不遷其所屬之人則伊等生計必致艱難且伊所屬內願移入內者不下四五千人等語朕思瓜州沙州地方甚寬亦必用人耕種若有願移者即在此居住給與一二年養贍令其耕種羅卜淖爾地方亦照吐魯番例有願移來者亦隨所部酋長一並移來不願者仍留本處著議奏尋議曰回人歸附者若更棄與策妄阿喇布坦必致擾纍是以願移者衆請令來者於布隆吉爾沙州瓜州等處耕種其建置村莊養贍得所令將軍富寧安等詳議辦理再羅卜淖爾回人並水居打魚自活其中有願陸居者請如吐魯番例令其移來奏入上從之後富寧安奏言回人願遷入內地者凡六百五十人應給與馬駝帳房等物奏入報聞己卯遣內閣學士衆佛保副都統扎什等往準噶爾敇諭策妄阿喇布坦上諭曰前嵗台吉遣使根敦陳奏情詞恭順朕實嘉之曾遣使答諭今覽爾使博羅瑚爾噶齎奏及口奏之詞知爾仰副朕㫖欲永息兵戈共修和好興教逸民出自誠心朕甚欣恱顧欲修和好不可不計久逺議定疆界以杜爭端乃垂久逺之道也朕去嵗遣使與爾定議疆界大概以阿爾台山嶺為界原未實指地名今爾奏稱以唐努山陰之克木克木齊克地方為詞又有哈噶斯地方係喀爾喀厄魯特之界哲爾格西喇呼魯蘇地方係㑹集之所哈濟爾地方係索林齊居住等語此爾但陳奏其故並未執意爭求應無庸議外今姑以科卜多烏蘭古木等處言之喀爾喀厄魯特未搆兵時原混雜住牧今喀爾喀西境直抵阿爾台山嶺築城種地自唐努山陰之克木克木齊克至博木地方現有策凌旺布博貝烏梁海居住今定疆界自洪郭壘至阿爾台哈道里嶺此千里內所有巴斯庫斯索羅斯畢汗和屯阿爾呼特阿勒坦淖爾等處為爾疆界自哈道里以及克木之博木地方為我疆界自哈道里以南由山嶺至額爾齊斯西邊自烏隆古布拉罕哈卜塔克拜塔克直抵烏蘭烏蘇羅卜淖爾噶斯地方即係沙磧應自克勒底野以南定為我國疆界朕為元后統一寰宇爾所請可行無不俞允豈為蕞爾廢地致啓爭論不過欲明疆界永結和好耳再爾又奏稱爾使臣貿易之人若由內地往來途逺勞苦請由喀爾喀地方行走朕今照爾所請但人數不可過三百耳嗣後惟當不渝前好以信為本普濟蒼生爾其思之特諭戊子命議開鄂爾昆圖拉屯田上諭振武將軍穆克登曰喀爾喀地方駐兵年久每年由京城運送軍糧路途遙逺一時不及恐兵丁至於乏食鄂爾昆圖拉一帶甚為寬濶若開墾屯田實為永逺之計爾㑹同喀爾喀將軍等確議具奏尋穆克登奏言鄂爾昆一帶尚有昔人耕種處及故渠灌田踪跡圖拉等處現有大麥小麥非不可墾之地也但霜降早晚不一樹穀宜否不齊請於屯長中擇十餘人於明年三月遣往耕種俟秋收後具奏議政王大臣等議覆如所請奏入上從之庚寅議敘平定西藏功一等子納穆扎卜加一雲騎尉二等子多爾濟加一雲騎尉並纍授為一等子三等輕車都尉卓爾和覺羅佛保並加一雲騎尉纍授為二等輕車都尉騎都尉格勒爾圖留保寶色東吉納並加一雲騎尉世職章京納孫泰德成查代法喀席蘭泰烏雲寶雅起納阿爾善代綬並授為雲騎尉世職故署護軍參領傅達里章京常綬珠其布護軍校哲庫訥並給一雲騎尉令其子承襲丙申議定青海諸部互市地奮威將軍嶽鍾琪奏言大將軍年羮堯前奏稱每年青海與內地定於二八月貿易以那喇薩喇為交易所經議政大臣議改令四季交易甚便按親王察罕丹津公拉察卜等諸台吉部落並居黃河之東迫近河州去松潘不逺向在河州松潘二處貿易今若定於那喇薩喇恐黃河東西兩翼䝉古所居有無不足供給不如仍於河州松潘貿易為便河州定於土門關附近雙城堡松潘定於黃勝關之西河口二地並有城堡房屋地形寬濶水草豐好可為永逺互市之所又郡王額爾德尼額爾克托克托鼐郡王塞卜騰扎爾等諸台吉部落在黃河西近西寧請移其貿易地於西寧口外丹噶爾寺至䝉古貿易悉資牲畜請於每年六月以後可毋定期聽其不時貿易則䝉古商販並獲利益議政大臣等遵㫖議覆嶽鍾琪所奏周詳應如所請奏入上從之五月戊申撤鹽池駐防兵撫逺大將軍年羮堯奏言臣在西寧時以邊外克羅冲博克所屬鹽池青海䝉古部人輒運鹽入邊貿易西寧軍民賴之臣奏設一副將駐兵一千六百令西寧通判移駐管理鹽務現今郡王額駙阿寶移居克羅冲博克如官兵仍駐劄其地恐滋事應請罷臣原議其通判亦汰之怡親王允祥等遵㫖議覆應如所請奏入上從之丙辰諭飭年羮堯遣送輝特台吉濟克濟扎卜移牧事理藩院奏言振武將軍傅爾丹咨稱輝特台吉濟克濟扎卜自西喇塔拉移牧就其族公巴濟大將軍年羮堯遣人送之出口即還道途勞困人畜憊斃乞賜軫恤應許其與公巴濟同居俟其屬人悉至再議編設佐領奏入得㫖輝特台吉濟克濟扎卜之事年羮堯止用密摺具奏並未報部亦無行文與將軍傅爾丹及該扎薩克等但交與章京一員送至口上即回將此多人致此勞苦謬亂已極著年羮堯明白回奏己未命撤巴里坤等處駐守官兵上諭議政大臣等曰策妄阿喇布坦遣使具奏言辭敬順巴里坤等處兵丁在外年久將吐魯番等處駐劄兵丁俱撤到巴里坤㑹合一處著照吐魯番烏隆吉科舍圖等處撤兵之數撤回再吐魯番地方揀選能員一人令其駐劄候我使臣歸國著行文將軍富寧安撤兵時吐魯番回人未免怯懼將策妄阿喇布坦敬謹遣使及命使臣前去不必用兵緣由曉諭回人俟使臣來時其回衆移居之處照從前所降諭㫖行著議奏尋議曰巴里坤吐魯番科舍圖烏隆吉四處計兵九千八百餘吐魯番兵中有種地兵千人可暫留之令副都統克什圖管轄餘丁如巴里坤所有兵數暫留巴里坤駐劄餘悉撤之奏入得㫖克什圖年老著留穆森一同管轄其留駐巴里坤之大臣及統領撤兵之大臣著將軍富寧安酌量派出奏聞尋靖逆將軍富寧安疏言乃者策妄阿喇布坦既遣使入朝甚屬恭順巴里坤等處所有兵丁實無可用應行撤回除遵㫖酌量留駐外其吐魯番等處所有護軍令副都統智勇薩爾禪等率回西安前鋒令委署副都統登德禮率回已於八月初二日自巴里坤啓行其各路緑旗兵丁悉令提督路振聲率回應請飭部所有撤回官員兵丁據册核明行知各旗各營管轄如故奏入上從之平定準噶爾方略前編卷十五
