body:
  text: 乾隆十一年春正月甲戌命郡王頗羅鼐保奏一子承襲封爵上諭軍機大臣等曰西藏郡王頗羅鼐素效忠誠勤勞懋著自朕御極以來一心靖共凡事俱竭力奮勉辦理妥協殊屬可嘉著加特恩將伊子內封一長子長子係日後襲王爵總理彼處事務之人關係緊要著諭知駐藏辦事之副都統傅清將朕此旨曉諭頗羅鼐在伊二子內擇一才堪繼續悅服衆心禆益公務者保奏候朕降旨乙未定議辦理投誠夷人事宜甘肅巡撫黃廷桂奏言向來沿邊蒙古及哈密瓜州回民并準夷人等投誠或令本處團聚或於别處安插今聞噶爾丹策零病故恐其部落內亂致生事端嗣後辦理投誠夷人應請少加分别如蒙古番回原非準夷所屬仍照前例辦理若有準夷頭目率衆來欵應請旨定奪如不過一二無關緊要夷人前來歸命或羈管哈密候夷使進貢曉諭帶往或即於卡倫外賞給口糧令自行回巢奉旨軍機大臣議奏尋議查噶爾丹策零病故與否未有確信如彼處有事酋目率衆欵關投誠應如所奏請旨定奪至尋常投誠之人仍照舊例辦理無庸令夷使帶回及令自行回巢致失懷逺之義奏入上從之二月辛丑北路軍營參贊大臣拉布敦烏爾登期滿以護軍統領塔爾瑪善副都統銜努三代之三月乙亥夷使哈柳至京進表請安並貢方物準噶爾台吉策妄多爾濟那木扎爾謹奏大皇帝蒙大皇帝加恩我父內外和好我父因仰體大皇帝宣揚黃教奠定蒼生之意恭順遵循今我父已故竊欲勉繼父志照舊行事以承恩典現擬遣人往西藏念經為我父修行善事循例先遣數人輕騎前往懴悔獻茶而回繼令念大經人衆進藏以宣黃教伏祈大皇帝睿鑒謹遣使臣恭請萬安並貢貂皮四十一張奏入報聞壬午賜準噶爾使臣哈栁等宴上召見哈柳諭之曰朕覽爾新台吉奏章欲效法伊父體朕宣揚黃教奠定蒼生之意冀承恩典朕甚嘉悅爾老台吉比年以來甚屬恭順遵循朕旨是以屢加恩眷今已病故深為軫惜爾新台吉又為伊父懇請遣人往西藏念經行善事乃理所應為朕自當準其所請但作為兩次前往事覺繁瑣且爾等進藏之人艱於跋踄當已深悉不若作一次前往為妥朕仍加恩照前賞給牲畜口糧中途資助且為爾老台吉作布施禮及施恩賞賚之處現交大臣等查辦豫備俟爾回時齎往哈栁跪奏大皇帝之旨大人等先經曉諭今又面聆聖訓俟回時當告知我台吉敬謹遵行上特賜玉如意一枝謂哈栁曰此名如意乃克遂心願之謂特賜與爾新台吉者爾可齎往並命賞哈栁玉如意亦一枝哈柳叩頭祗領上親賜酒三爵哈栁跪飲而退癸未命提督李繩武巡閲邊界接見夷使上諭軍機大臣等曰據李繩武奏夷使哈柳來時向都司閻相師云此次回去時求與將軍一見等語李繩武自調補安西提督以來尚未奏請巡閲邊界可傳諭令伊約計夷使回巢之時前往哈密等處巡視哈柳回巢經過欲求見面不妨與之相見備飯欵待酌量給與物件一切相見儀節務存體統不可草率從事甲申賜準噶爾台吉策妄多爾濟那木扎爾敕書奉天承運皇帝詔曰朕總理天下無分內外一視同仁惟期普天生靈各得其所台吉爾奏稱遵照爾父仰體朕廣教安生之意朕甚嘉悅前爾父仰知朕意定界以來敬謹遵奉諭旨朕屢次加恩體恤今聞溘逝深為軫惜爾奏稱遣人往西藏諷經先輕騎減從前往懴悔熬茶回時令諷大經人等續往諷經等語為爾父懴悔諷經理所當行豈有不準但分作二次徒覺繁瑣爾之人行走艱難爾亦知之當一次全往為妥朕仍照前施恩派人照看賞賜牲畜路費又為爾父作布施禮特恩賞銀滿達茶桶茶喇各一紅黃香一百束交與使臣哈柳帶往又大手帕百條小手帕千條茶葉千包令爾諷經之人往藏時由邊界支取應往人數何時起程何日可至邊界先期豫行報明又爾使臣哈柳口奏延請西藏喇嘛及今年例應來京貿易之人祈就近在肅州貿易二事延請西藏喇嘛前據爾父奏請時朕即以不便準行明白降旨矣至今歲貨物欲於肅州隨便貿易此可行之事準爾所請交與該地方官照看貿易台吉爾一切事務惟當遵照爾父仰體朕廣教安生之意敬慎奉行互相和好愈敦信實俾邊氓永享安樂持敕交使臣哈柳齎回隨敕賜爾各色緞十端蟒緞粧緞各八端玻璃磁器琺琅器皿十八事爾其祇領閏三月丁酉夷使哈柳自京起程還部辛酉安西提督李繩武奏報貿易夷人賚木瑚里等入境丙午甘肅巡撫黃廷桂疏奏豫備夷人貿易事宜黃廷桂奏言向例準噶爾夷人於子辰申年在肅貿易寅午戌年在京貿易今歲例當在京貿易經夷使哈栁奏懇將夷貨在肅就近貿易得旨準行查向年夷貨在肅貿易派委參將及知州等員照看并飭委肅州鎮道臣督率稽查今照例委肅州鎮臣許仕盛甘肅道鈕廷彩等就近照看又經臣等奏明動銀一萬五千兩往江南採辦紬緞已抵蘭州現在夷貨將到將此項紬緞交商人李永祚先行交易扣價還官俟伊自製商貨運到再與夷人兌換庶夷人不致稽遲回巢時日奏入報聞夏四月辛未命封郡王頗羅鼐次子朱爾默特那木扎爾為長子上諭內閣曰前以西藏郡王頗羅鼐一心肫誠奮勉特施恩於伊二子內封一長子令伊指出具奏今據頗羅鼐以伊長子珠爾瑪特策卜登已屬殘疾次子朱爾默特那木扎爾堪以奮勉出力伊兄弟互相遜讓並無爭競即彼處噶卜倫第巴大喇嘛等亦皆心服等因具奏應如所請將朱爾默特那木扎爾封為長子珠爾瑪特策卜登因從前帶兵在邊境出力曽施恩封為輔國公今雖有殘疾不能效力並著加恩封為鎮國公該部知道壬午安西提督李繩武疏奏籌辦夷人貿易事宜李繩武奏言查此次貿易夷人賚木瑚里等到境言語恭順而策妄多爾濟那木扎爾來文亦屬詞婉意和但此次帶來牲畜較上年之數甚多該夷等懇求在哈密變賣不但有違定例且口外實無商賈臣前接肅州鎮道等札商因肅屬牧厰狹小請於嘉峪關外之花海子等處地方牧放俟商人講定價值再為趕入接收臣現在巡查親歷花海子各處地方遼濶逼近赤靖等處營汛南通青海各路北即接連北路卡倫及往準噶爾之大北路實有不便留牧之處已將緣由札覆肅州鎮道臣思肅州既無寬展牧厰且時屆夏初正田畝長發之時而該夷等亦知牲畜衆多即口外路上水草亦屬有限恐損傷過多是以求在哈密售賣臣輾轉籌計行令哈密副將瑚寶將馬駝貨物令其先為起行赴肅其牛羊暫留卡外牧放臣現在札詢肅州鎮道上年貿易夷人牛羊在肅售變價值數目或應先在哈密講定價值豫先差員領商出口迎收抑或商人必須親自出口途中講價之處統俟覆到飛飭辦理庶不致該夷等稽延時日而於內外民田既無擾攘之虞亦與該夷實有禆益奏入報聞乙亥準噶爾部人博克等來降命賞給安插如例五月壬子安西提督李繩武奏報接見夷使情形李繩武奏言臣於四月十五日巡邊至哈密夷使哈柳於二十二日自京回程亦抵哈密二十四日至公所與臣接見據哈柳告稱我此次進京因奏聞我台吉噶爾丹策零病故之事荷蒙大皇帝待我等恩典極重賜噶爾丹策零銀滿達茶桶茶喇藏香尚有大小手帕茶葉著在邊界上支領又賜我策妄多爾濟那木扎爾各色粧蟒緞匹玻璃磁器琺琅器皿臣向哈柳云因汝台吉噶爾丹策零並策妄多爾濟那木扎爾兩世俱在大皇帝前恭順歸向是以加汝大恩大皇帝是普天之下聖主所下吉祥旨意即如汝等朝見活佛得好話一般向後常常恭順自能常受恩典哈栁又告稱此次大皇帝復準我等帶領三百人往藏熬茶我等不敢違例多帶人去臣向哈柳云既蒙恩準汝熬茶汝等起身赴藏時即豫差人送信以便豫備護送汝等相見禮畢哈柳等於二十六日起身回部訖奏入報聞六月丁亥定邊副將軍額駙策凌疏奏暫停輪派參贊大臣閲看喀爾喀四部落兵丁策凌奏言喀爾喀四部落遊牧處所備揚威兵每年應各該副將軍察看軍營參贊大臣兩年內閲看一次今歲應派軍營參贊大臣前往閲看但查四部落內在戈壁居住之扎薩克等遊牧處所因雨水不調至今青草未發牲畜尚未養好向例俱於七月內閲看完畢遊牧遠者乘時趕回馬牛牲畜尚可肥壯若遲至八九月間始行閲看實於牲畜無益應請今年暫行停止閲看交各副將軍盟長等令其就近在各遊牧處自行查閲展至明年仍派參贊大臣前往奏入上從之庚寅定議添設哈密卡倫安西提督李繩武奏言哈密三堡之西南西喇淖爾地方其西係通準夷魯克察克闢展之來路從前原有卡倫後因該處水草不便盛夏馬多倒斃奏請裁撤自裁撤之後準夷多有從此潛過被獲者防範布置不可不周況盛夏人馬難以存住之時準夷亦不能行走而春秋冬三時自可派兵守望以收扼要之益且據哈密貝子玉素富情願供辦馬草復與鎮臣王能愛商酌意見相同又巴達什地方為貝子玉素富牧放之厰西北二十餘里即係烏拉臺卡倫烏拉臺卡倫正北五十里有畢柳大坂一處畢柳大坂溝底係走鹽池通哈喇溪落等處之路而烏拉臺卡倫止能瞭望畢柳大坂溝口不能瞭望畢柳大坂溝底通出之路若於畢柳大坂安設一卡則與烏拉臺一卡並巴達什厰彼此聲氣相通遇警可早得信奉旨軍機大臣議奏尋議應如所奏西喇淖爾地方準其添設一卡派兵二名間以纒頭三名每年八月至次年四月止坐守瞭望其畢柳大坂地方亦準其安設一卡派兵三名間以纒頭二名坐守瞭望以資策應奏入上從之辛卯命還俄羅斯逃人定邊副將軍額駙策凌將自準噶爾投來之俄羅斯人伊番解京得旨軍機大臣議奏尋議向與俄羅斯定議不相容留逃人前雍正十二年俄羅斯婦人伊納博克投至本境奉旨從前準噶爾虜去我國二人投至俄羅斯曽經彼處送還應將伊納博克亦送交俄羅斯邊上頭目今請照此例令理藩院行文俄羅斯并派員將伊番解送至恰克圖地方交與俄羅斯守邊頭目奏入上從之秋七月己酉命派青海扎蕯克等更替巡守卡倫辦理青海事務副都統銜衆佛保奏言準理藩院咨稱青海扎薩克台吉達瑪林塞卜騰色特爾布木巡守卡倫偵探邊境行走數年皆自備資斧實屬勤愼伊等原為青海各蒙古遊牧起見其餘扎薩克亦應更替行走今青海扎薩克大員內長子索諾木丹津貝子丹巴年力已壯人俱明白去年木蘭隨圍王衮楚克達什策凌喇卜坦公那木扎爾策凌雖係年幼人亦明白俱蒙皇上教養令在乾清門行走宜令其輪班行走亦可以服習勤勞應令衆佛保於今年會盟時將索諾木丹津等與應派扎薩克一併揀派如何更替行走之處定議具奏得旨依議移咨到臣臣隨於會盟之日明白曉諭傳旨與衮楚克達什策凌喇卜坦索諾木丹津丹巴那木扎爾策凌據伊等五人歡忭跪稱我等纍世受皇上殊恩俱以少年承襲顯秩數年來瞻仰天顔蒙恩挑取乾清門侍衛親隨學習正欲得一效力之處稍圖報效今蒙賞給效力不勝歡忭等語再會盟處齊集各扎薩克聽知揀派差遣無不跪求效力除達瑪林塞卜騰色特爾布木二人原係防禦卡倫之人蒙恩奬賞伊二人以行走熟練請願照常派入不敢稍懈復據薩喇衮布喇布坦塔爾濟塞卜騰三台吉叩請揀派出於至誠且人皆明白應將此五人與衮楚克達什等五人共派十人分作五班行走五年之內始輪一班在伊等自可從容行走並將得卜特爾伊克柴達木二路與伊等遊牧處何旗近便之處令其自行定議續據伊等分派已定巡查前路得卜特爾卡倫派長子索諾木丹津衮布喇卜坦扎薩克台吉色特爾布木塔爾濟塞卜騰薩喇五人行走巡查北路伊克柴達木伊遜察汗齊老圖卡倫派王衮楚克達什策凌喇卜坦貝子丹巴公那木扎爾策凌扎薩克台吉達瑪林塞卜騰五人行走每年輪流巡查又據派出之衮楚克達什等叩稱前奉諭旨青海派兵二千各在旗分處豫備如有帶領行走之處著達瑪林塞卜騰色特爾布木二人帶領今我等八人既蒙補派如有帶兵之時亦請一同帶兵以效微勞又稱此項派出豫備兵丁業已十年恐有因循廢弛之弊我等各於所分備兵旗分遊牧處查明軍需器械分别等第呈報察核於三年舉行一次等語似應俱如所請辦理奏入得旨下部知之八月丁卯恩賞駐防軍營官兵緞布有差定邊副將軍額駙策凌奏言軍營駐防之宣化大同二處官兵計六百名居住五年其看守城垣倉庫巡查街市以及一切差務俱無貽誤甚屬勤勞出力臣等仰體皇上軫念至意請將庫內存貯備賞緞布鞋內動用賞賜參將遊擊官素縀各一端守備花線緞一端千把總彭縀各一端兵丁每名布各四匹鞋二雙以示鼓勵奏入報可壬辰甘肅巡撫黃廷桂奏報貿易夷人賚木瑚里等自肅州起程還部九月乙未命展放喀爾喀遊牧地方定邊副將軍額駙策凌奏言乾隆五年遵旨議定將喀爾喀遊牧自安設內卡之齊克濟扎卜堪哈薩克圖庫克嶺等處以內三四百里所有鄂爾海地方為中南至博羅椿集塔爾拉布喀岱罕淖爾登努勒台特穆爾哈巴西喇布魯圖竒齊格納之阿魯通金鄂倫淖爾岱拉突魯北至額得爾齊得爾之伯勒齊爾準蜀麻爾台桑金達賴喀喇塔爾阿勒坦噶達蘇等處為外界此內遊牧居住各按指定之界不得踰越現今戈壁地方連年少雨水草甚乏在戈壁等處遊牧者俱移居杭愛地狹人稠水草愈覺不足蒙古生計甚屬拮據請將喀爾喀遊牧少加展放令在安設內卡之扎卜堪等處內約計百里之遙遊牧居住仍飭駐劄烏里雅蘇台參贊大臣不時巡查奏入得旨軍機大臣議奏尋議從前大兵在北路駐劄時將喀爾喀遊牧曽經移進在翁金鄂爾昆之烏歸淖爾等處為界至乾隆三年因與準噶爾定界頒賜敕書指定厄魯特遊牧不得過阿爾台山梁喀爾喀遊牧不得過扎卜堪等處至乾隆五年又奉上諭從前喀爾喀四部落遊牧之地原有指定之界今允準噶爾求和將喀爾喀遊牧不得過扎卜堪等處但各部落遊牧之界若不指明恐喀爾喀不知以為所定不過扎卜堪等處遂任意妄行遊牧亦未可定著額駙策凌等會同喀爾喀之副將軍自扎卜堪以內將各住遊牧之界相度指明不準妄越之處核議以聞旋議定南至博羅椿集等處北至額得爾齊得爾之伯勒齊爾等處為外界今據額駙策凌奏為蒙古生計拮據請將喀爾喀遊牧少加展放在安設內卡之扎卜堪等處百里遊牧仍在原定界內應如所請令額駙策凌與喀爾喀副將軍等將喀爾喀遊牧指定何處起止不許踰界仍令烏里雅蘇台參贊大臣不時巡查遇有越界遊牧者查出從重治罪令將地名造册存在軍營以備稽查并移咨該部查核奏入上從之壬子定邊副將軍額駙策凌奏報巡查邊境情形策凌奏言往南路略地之二等侍衛棟梁於八月十二日出喀勒占和碩卡倫前往尋蹤瞭望見巴顔珠爾克地方有厄魯特扎勒巴克泰告稱我八人現在察罕布爾噶蘇地方坐卡我小台吉烏勒木濟帶領一百兵在察罕郭勒地方駐劄棟梁責以此非爾等地方不當在此居住扎勒巴克泰對以即刻移去又差協理台吉喇嘛扎卜等帶兵前往尋去年所埋木記至敦達都沙扎海見厄魯特得木齊索諾木塔克巴與圖魯孟克等喇嘛扎卜告以不當近我境居住索諾木塔克巴等應諾棟梁等埋換新木記而回往中路略地之藍翎前鋒布勒善協理台吉丹津參領索爾蘇前往尋蹤至花蘇魯克及沙喇努魯等處遇見厄魯特烏梁海在彼打牲丹津等斥責其非烏梁海等應諾而去丹津等埋換新木記而回並無别事奏入報聞癸丑準噶爾部人巴桑等來降命賞給安插如例冬十月丙寅賜敕密諭西藏郡王頗羅鼐上諭頗羅鼐曰達賴喇嘛看茶之綏綳喇嘛扎克巴達顔將爾鎮壓經書寫人桑寨拿獲爾從傅清之言將此事如同無事從輕完結經傅清奏聞扎克巴達顔係達賴喇嘛服役之人惟恐關係達賴喇嘛如此辦理甚合機宜達賴喇嘛係執掌闡揚西方佛教之人爾係約束管理藏內人衆之人爾二人同心協力以安地方使土伯特向化一應事務皆賴爾等辦理朕視爾二人俱屬一體從無畸重畸輕之見若爾二人稍有不合以致地方不寧甚負朕信任期望之恩再朕知鎮壓左道斷不能有損於人即以近事而論扎克巴達顔四五年前將爾鎮壓此時朕先將爾子封為長子又加恩封長子為鎮國公並施爾恩典甚重豈非不能鎮壓之明效大驗乎觀此爾可以無疑矣爾平日感激朕恩勉力報效克副委任朕所深信是以並未明降諭旨特手書此敕密諭開示爾其知之辛未甘肅巡撫黃廷桂奏報準噶爾夷人在肅州貿易情形先是黃廷桂奏言夷目賚木瑚里帶領夷人及牛馬貨物於六月十六七等日陸續到肅俱已安頓居住其原來羊隻於夷目等未曽進關之前即委文武員辨帶領商販出口迎買講明每綿羊一百隻內搭山羊五隻仍照往例每隻價銀一兩一錢以貨易貨夷人樂從於六月初八初九兩日收買完竣各項皮張牲畜約共值銀六萬餘兩夷人索價甚髙又要四成現銀臣現在遵循往例止令許給二成現銀若任其所欲添給四成恐致夷人將來引為成例難以拒絶奏入報聞至是黃廷桂又奏言據肅州鎮臣許仕盛甘肅道鈕廷彩稟稱夷人各項皮張貨物俱經收買完畢伊等所需銀貨亦已交兑明白臣查此次夷人擕來牛羊馬匹皮張等項貨物共價銀九萬五千九百二十餘兩惟貂狐豹三項皮張內搭給二成現銀九千五百四十餘兩其餘俱以內地紬緞等貨抵兑交易該夷等事竣現在回巢訖又安西提督李繩武奏言貿易夷人自肅起身經肅州鎮臣許仕盛派肅標官兵伴送至橋灣臣即派靖逆協標都司錢璽昭例帶兵前往橋灣臣標中營守備陳文現帶兵前往坡子泉接遞護送據夷目賚木瑚里告稱此次買賣原係應進京年分荷蒙大皇帝天恩準在肅州就近貿易甚為便益我等衆人仰戴大皇帝恩德實屬感激不盡等語奏入俱報聞乙酉準噶爾部人達什哈來降如例賞給發往青州隨其弟西喇口安插十一月壬寅命準準噶爾貢使赴肅貿易安西提督李繩武奏言準噶爾夷使瑪木特於十月二十三日到境據稱帶冇馬匹貂皮等物欲赴大皇帝前請安進貢但擕帶駝馱牲畜貨物甚多查定例進貢夷人不準擕帶買賣其從前進貢夷人所帶牲畜貨物準其赴肅交易者實由我皇上柔懷遠人恩施格外此次夷使瑪木特帶來駝馱牲畜甚多到哈密後勢必復懇到肅州交易其可否準照所請之處理合請旨遵行奏入得旨彼從逺路而來可告以朕恩所擕貨物姑準前赴肅州貿易以後似此多帶不準交易之處俟夷使到京當令大臣面諭該夷使等遵行也十二月丙寅準噶爾部人巴爾布達什來降命賞給安插如例命自準噶爾脫回內扎薩克蒙古人等不必解送京師辦理軍機大臣等奏言近年辦理準噶爾脫回之喀爾喀人等經將軍詢明情節即由軍營解回各遊牧安置其內扎薩克蒙古人等俱解送京師交臣等詢問仍送回各遊牧查內扎薩克各旗俱在口外離軍營甚近今解送來京復行解回各遊牧徒多往返之勞應將脫回之內扎薩克蒙古人等令額駙策凌詢明情節無庸解送京師亦照喀爾喀之例由軍營解回本遊牧安置奏入上從之癸未夷使瑪木特等至京進表請安並貢方物準噶爾台吉策妄多爾濟那木扎爾謹奏大皇帝使者哈柳等前來奉大皇帝恩旨無分內外一視同仁但願普天之下生靈各得安生因爾父遣人赴藏念經懴悔於理甚宜朕仍照從前施恩派人照管資助牲畜盤費並特恩賞銀滿達茶桶茶喇紅黃香一百束并大手帕一百件小手帕一千件茶葉一千包令在邊界領取感戴鴻恩歡欣無既今念經人三百名約於明年九月十五日前後可到哈集爾等處但前往唐古忒地方人內有帶去貨物俟貨賣後始往念經者有即將貨物帶往念經者其將貨物帶往念經之人懇令同在哈集爾得卜特爾過冬俟貿易人由東科爾貿易回歸在哈集爾得卜特爾會齊一同前往念經以廣黃教以安生靈伏乞大皇帝睿鑒其繁瑣言語令來使口奏謹具馬二匹碗一隻貂皮四十張聊申微悃奏入報聞復命尚書海望等訊問來使所欲口奏何語據瑪木特稟稱我等前往西藏一切舉行善事念經之人其施恩照管及賞助牲畜之處伏乞憐念再念經之事需銀甚要我等前往東科爾貿易之人交易時乞飭令內地商人以銀收買伏祈轉奏海望等言我大國交易之例聽商自便難用官法抑勒從前已經曉諭爾等今爾台吉以念經之事需銀甚多復行懇求俟轉奏候旨奏入報聞乙酉召見夷使瑪木特等於雍和宫大和齋並令觀步踏上諭之曰爾台吉奏疏朕已覽閲一切事宜皆遵奉朕諭旨辦理看來如此恭順必能安伊屬人禆益部落朕甚嘉悅再爾口奏之事特為乞求照看爾等念經之人資助牲畜盤費此事自照前次賞賜之例加恩賞給再懇求貿易時用銀收買爾等貨物此事止可隨商賈之便朕不便降旨於商人此次現派侍郎玉保前往照看爾等爾等與玉保商議酌量凡事屬可行者會議具奏瑪木特等瞻仰行禮賜茶跪領祇聆聖訓畢退出翊日上復命尚書海望等宣諭瑪木特等曰爾等意欲頗羅鼐資助念經人等頗羅鼐雖係承受朕封號之人究係别部落不比內地臣民彼資助與否朕不便降旨應聽伊自願故特諭爾等知之己丑侍郎玉保疏奏酌議夷使赴藏貿易事宜玉保奏言據夷使瑪木特告稱大皇帝恩旨藏內貿易事務著與玉保商酌辦理故我等特來與大人商酌我等明年九月十五前後至哈集爾得卜特爾卡倫若在卡倫即準貿易得帶銀兩入藏於事有益前歲我進藏人等於夏間由噶斯一路而來因遇蚊蠛馬畜倒斃甚多此次前來過蚊蠛時計九月十五前後至哈集爾得卜特爾卡倫前往東科爾貿易往返計需三月所以奏明懇在彼處過冬若在哈集爾得卜特爾貿易得銀十月十五前後未知可否進藏臣告之云汝等在卡倫貿易只云帶銀前往除銀之外有無應買手帕茶葉緞匹等物以便傳我貿易人等豫備貿易據瑪木特云銀兩之外别無應買物件臣告之云汝等於九月十五前後至哈集爾得卜特爾貿易十月進藏亦可但據我看來汝等與其九月十五前後前來不若於八月初十內外至哈集爾得卜特爾貿易帶銀於九月初間進藏未至大雪於汝等有益瑪木特云我台吉已經奏明我等難以專主容我歸告台吉若如我等所議則四月間差人至哈密送信若仍如原奏即不復差人等語奏入報聞平定準噶爾方略前編卷四十九
