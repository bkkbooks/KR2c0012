  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_044-1a, image: WYG0357/WYG0357-0613a.png}
body:
  text: 乾隆三年夏四月辛卯準噶爾部人巴雅爾起塔特伯勒克等來降命賞給安插如例五月戊午命暫停運送軍營米石定邊副將軍額駙䇿凌奏言大兵既撤每月需餉無多軍營現貯糧十七萬餘石屯田米三萬餘石又范育馪每年運到糧二萬石舊米支盡始動新糧蒙古等處積雪春融必有潮氣入夏未乾不時揚曬僅免黴爛虧折實多兼患鼠耗軍糧所關重大而西路橋灣布隆吉爾等處所存米石前者劉於義奏請每年一斛許耗一升業已議行此處應請一體辦理其司倉各官耗少者議敘多則劾治追償亦請如西路之例大學士等議覆曰今年應運糧俱已起程應無庸議請自明年為始暫停挽運二三年後再行請旨奏入上從之乙亥命根丕勒等遊牧仍居舊處上諭辦理軍機大臣等曰據額駙䇿凌奏稱喀爾喀公根丕勒敏珠爾因台吉特克什等屬人産業牲畜傷耗應行輸厰羊隻業已奏準展期又經各扎薩克會議量力幫助牛羊而生理尚艱請令伊等遊牧毋過綽卡圖等處有可漁獵畜牧之所暫令移居若有事仍令內移似可無虞等語前者以喀爾喀遊牧太逺可虞令向內遷移今雖邊境無事現在遣使往議分界事尚未定遽令扎薩克等遊牧外展準夷聞之妄生疑惑於事無益伊等遊牧且勿展放况羊隻既得展限又經各扎薩克幫助目下尚可度日可行文額駙䇿凌諭根丕勒等遊牧處所宜仍其舊準噶爾部人頽渾來降命賞給安插如例秋七月甲寅準噶爾部人鄂勒錐來降命賞給安插如例庚申命管領呼倫貝爾駐防兵丁塞楞額來京以副都統都依那代之八月己丑準噶爾部人尼瑪特古斯博羅特三人來降命賞給安插如例九月甲寅命副都統紀山代杭奕祿駐藏賞銀五百兩丙寅準噶爾部人巴顏烏勒木濟敦多克固木扎卜等四人來降命賞給安插如例冬十月命額駙䇿凌來京以雅爾圖暫管定邊副將軍印務上諭辦理軍機大臣等曰據額駙䇿凌奏稱遣往準噶爾侍郎阿克敦等與噶爾丹䇿零使臣哈柳等於十月二十日左右可到巴里坤此次遣使之事其始原係額駙䇿凌辦理現在軍營無事又夷使至京尚有應議一切著額駙䇿凌於十二月初十日後夷使未到之前按程至京其將軍印信著暫交雅爾圖護理又諭曰據額駙䇿凌奏已移知安西提督李繩武著即行文查郎阿夷使至肅州時照管存留人畜及貿易貨物等事著派一幹辦道員與肅州總兵官妥協辦理至來使進京所需牲畜路費等項仍照例給豫額駙䇿凌奏報鄂爾昆等處秋成收糧共八千七百五十三石有零得旨下部知之十二月戊戌準噶爾台吉噶爾丹䇿零遣哈柳等隨侍郎阿克敦等至京進表夷使哈柳等跪進表文曰準噶爾台吉噶爾丹䇿零具奏恭進大皇帝聖明去年令達什等以阿爾台遊牧事具奏奉大皇帝諭旨爾請喀爾喀與厄魯特以阿爾台山為界俱照現在駐牧無相掣肘言辭恭謹朕甚嘉之故復遣使前往幸蒙聖恩鑒允不勝歡忭又諭旨有云分界之處尚未指明蒙古遊牧無定若不指定山河為界日後邊民生釁於久逺之計仍無裨益前者我遣吹納木喀入奏亦正為此耳今議定界請循布延圖河南以博爾濟昻吉勒圖烏克克嶺噶克察等處為界北以孫多爾庫奎多爾多輝庫奎至哈爾竒喇博木喀喇巴爾楚克等處為界我邊界人等仍在山後遊牧不得越阿爾台嶺其山前居住蒙古部人只在扎卜堪等處遊牧彼此相距遼逺庶可兩無牽掣謹此具奏仰祈睿鑒前者彼此致生嫌隙祗以大皇帝兵至科卜多遂於界內築城駐兵之故今托爾和等處恐復如此惟大皇帝區處若蒙見允邊界自此而定卡倫大半向前其布延圖托爾和二卡倫並在我國境中亦祈大皇帝垂鑒再車臣汗告我使人班禪額爾德尼已經圓寂詢來使云是實我厄魯特經典中載班禪額爾德尼乃掌教大喇嘛也如果圓寂當建塔諷經意欲遣我人赴藏布施以廣黃教以福羣生亦惟大皇帝鑒允謹奏隨表進貂皮三十張奏入報聞丙午準噶爾使臣哈柳等入覲上諭哈柳等曰去年爾來使達什等賫噶爾丹䇿零奏章言詞恭順朕故遣使往諭此次所奏乞令托爾和布延圖兩處卡倫稍稍內移此事斷不可行便與不便爾等亦知之且我聖祖皇帝時所設卡倫至今豈可移動乎但噶爾丹䇿零所云遊牧不敢越阿爾台尚近於理念爾等逺來召爾入見若噶爾丹䇿零止請彼此不越阿爾台此次便可定議乃復言及卡倫故朕令大臣等與爾再議爾為噶爾丹䇿零大宰桑爾台吉本意爾無不知除所奏外尚有口囑之言否哈柳奏云並無口囑之言但前者以大皇帝之兵於科卜多築城駐兵致起釁端今噶爾丹䇿零之意以托爾和布延圖離科卜多甚近恐日後復於兩處築城駐兵故奏請乞恩耳上諭曰現今噶爾丹䇿零所奏不使遊牧卡倫越阿爾台甚屬信實朕甚嘉之至托爾和布延圖等處朕已降旨斷不修築城屋駐劄兵丁朕為中外共主所諭豈有改變之理爾等還其詳記朕旨曉諭噶爾丹䇿零哈柳奏言祈大皇帝以所降諭旨繕寫特遣使臣往與噶爾丹䇿零面議上諭曰無庸遣使爾等起程時另有敕書即付爾等頒示噶爾丹䇿零乾隆四年春正月丁巳命導夷使哈柳等往見額駙䇿凌議事先是噶爾丹䇿零致書額駙䇿凌曰字奉車臣汗前者汗為邊界卡倫事札到緣由我業已知曉今將一切事俱已陳奏大皇帝又因博克達班禪圓寂之故欲遣人前往諷經布施亦經奏懇大皇帝睿鑒車臣汗係辦理大事之人望乞方便額駙䇿凌以聞得旨與夷使議事著額駙䇿凌另見軍機大臣等請於本月二十六日導哈柳等至額駙䇿凌處相見奏入報聞壬戌賜夷使哈柳等緞布銀兩有差二月甲午命加恩往使準噶爾喀爾喀頭等台吉額默根等有差上諭辦理軍機大臣等曰喀爾喀頭等台吉額默根兩次使往準噶爾著有勞績加恩授額默根為扎薩克頭等台吉到京時仍在乾清門行走管旗章京滿集拉此次亦前往準噶爾加恩賞銀二百兩丙申準噶爾部人孟克特穆爾與其弟扎木素來降命賞給安插如例庚子賜準噶爾台吉噶爾丹䇿零敕書奉天承運皇帝詔曰諭準噶爾台吉噶爾丹䇿零前歲爾遣達什等進奏言辭恭順朕甚嘉之因分界之議未曾指定地名故朕又命侍郎阿克敦等前往與爾分别定議今爾遣哈柳同來疏言今欲定界請循布延圖河南以博爾濟昻吉爾圖烏克克嶺噶克察為界北以孫多爾庫奎多爾多輝庫奎至哈爾竒喇博木喀喇巴爾楚克為界厄魯特無踰阿爾台嶺蒙古亦止在扎卜堪遊牧伏乞大皇帝睿鑒夫定界之議非自今始爾父䇿妄阿喇布坦已經陳請誠以喀爾喀遊牧原無定處必指定山河為界庶彼此不致紛爭朕為天下共主無分畛域一視同仁凡有奏請可行則允之不可行則却之雖百請亦不允也爾言厄魯特無過阿爾台遊牧其言近理朕即信之又請蒙古止居扎卜堪現今蒙古遊牧原未嘗踰扎卜堪也爾又請托爾和無築城駐防朕既降旨撤兵托爾和等處安得復如前此科卜多有築城駐兵之事已面諭爾使哈柳矣必無改悔之理也但爾請循布延圖河南以博爾濟等處北以孫多爾庫奎等處為界謂卡倫大半向前布延圖托爾和兩卡俱在爾國界中意欲我卡倫稍向內移此必不可行之事爾豈不知乃復牽率而言乎况設卡防守所用不過數人何關輕重然自我聖祖時設立之卡倫豈可於今忽移動之乎夫休兵息民永歸和好即定界與否亦非要事但使彼此遊牧互相隔逺而卡倫則安設如故至科卜多并不復駐兵止於每年應略地時各遣二三十人前往巡視約不相害如此區處爾之猜疑亦可盡釋矣台吉其遵旨定議俟覆奏到日朕當明諭喀爾喀令其遊牧永逺無過扎卜堪也如是則事體聲名彼此均有裨益此外更無應行另議之事朕故不復遣使即以敕書付哈柳齎往台吉其熟思之如遵朕旨則遣使覆奏不然數遣使何為爾又奏稱班禪額爾德尼圓寂欲遣人往藏諷經布施伏祈鑒允朕為大君有能奉教之人豈忍阻抑但從前爾部人潛往西藏殘害土伯特今若經行彼地土伯特懷憤生事亦可未定爾誠心布施須俟遵旨定議後準用百人赴藏朕當特遣官辨護送隨敕賜各色緞十端三月壬子命免寧夏官兵應繳銀兩上諭內閣曰前嶽鍾琪撥寧夏官兵一千名移駐涼州旋以駐涼兵丁巳足敷用將此兵撤還所有領過賞銀一萬七千兩欽奉皇考諭旨暫免追繳俟大軍凱旋之後再行奏聞請旨今大學士查郎阿具奏請旨前來朕思兵丁等所領賞銀厯年已久此時料難繳還况寧夏地方去冬被災尤當加恩撫恤此所欠應繳銀一萬七千兩悉著豁免該督等可即出示曉諭衆共知之夏四月乙酉額駙䇿凌奏報商人范育馪運米至營額駙䇿凌奏言范育馪運至應交米二萬石又豫備折耗米一千石已交軍營訖此係賠補欠項其豫備米石應入次年正項奏入報聞丙戌命停止運送軍營米石辦理軍機大臣等奏言據額駙䇿凌奏報軍營現存米石足支兵餉六七年儲蓄過多恐致折耗於事無益請自明年起停止運送俟二三年後令額駙䇿凌酌量應運與否另行奏請奏入上從之乙巳巴爾布國三汗入貢駐藏侍郎杭奕祿奏言西藏西南三千里外巴爾布國有三汗一名庫庫木一名顏布一名葉楞雍正十二年曾遣使恭請聖安近年三汗彼此交惡數尋戰攻臣遣貝勒頗羅鼐宣諭皇上好生之德中外一視皆如赤子爾等宜罷息干戈結好和衆以仰報國恩三汗咸歡欣聽命以三部落户口數目遣使呈報庫庫木等各進金銀絲縀及珊瑚念珠等物交頗羅鼐轉乞臣等奏聞尋部議請加恩給賞奏入上從之五月丁卯命豫發軍營餉銀定邊副將軍額駙䇿凌奏言軍營現貯銀止二十六萬兩支給明年春季兵餉外所存無幾軍需關係綦重應豫為籌辦懇敕部今年冬即於明年應解銀兩內豫發四十萬兩備用奏入得旨照所請行六月丁酉命賞內扎薩克王貝勒暨官兵等銀緞有差辦理軍機大臣等奏言乾隆三年九月初七日奉旨內扎薩克六盟長名下遊牧豫備兵丁每年派大臣等查閲今已連閲二年俟三四年後蒙古等應如何加恩賞賚之處著辦理軍機大臣等議奏臣等酌議統領兵丁科爾沁王伊錫班第奈曼王阿咱喇蘇尼特王汪青齊蘇隆各賞龍緞一匹蟒緞一匹大緞四匹喀爾喀貝勒拉旺多爾濟蘇尼特貝勒錫禮鄂爾多思貝勒鄂衣羅卜扎木蘇巴林貝子扎什納木札爾喀喇沁公丹津烏喇特公達里木吉禮第各賞龍緞或蟒緞一匹大緞三匹協理台吉塔布囊十七人各賞大緞一匹官緞二匹間散台吉塔布囊二十七人各賞大緞一匹官緞一匹管旗章京副都統二十二人各賞官緞一匹彭緞一匹參領佐領一百二人各賞官緞一匹驍騎校六十五人各賞彭緞一匹兵丁一萬一千名各賞銀三兩今歲初屆三年所有銀緞等項俟明年遣大臣前往閲兵時持往驗明賞給奏入上從之辛丑建威將軍王常等奏報綏逺城建築城垣王常等奏言臣奉命建築綏逺城城垣衙署廟宇兵房倉厫堞樓橋梁一切工程於乾隆二年二月初七日興工至四年六月二十二日告竣形勢壯麗保障周密計用過銀一百三十萬兩有竒另行繕册報銷奏入報聞秋七月丁巳準噶爾部人喇嘛薩木黨重內率弟恩克伯勒克巴圖來降命賞給安插如例甲子命任懷德管理東路卡倫上諭內閣曰據總統駐防哈密等處提督李繩武奏稱總兵官王邦寧駐劄塔勒納沁總理東路卡倫於今年三月患病迄今半載尚未痊愈可否準其進口回任以便醫治等語王邦寧著回本任調理其員缺著興漢鎮總兵官任懷德補授其興漢鎮印務著漢中副將吕瀚署理九月丙午準噶爾部人托克托來降命賞給安插如例辛未命阿蘭泰暫管軍前糧餉事務上諭內閣曰盛京兵部侍郎員缺著常安補授常安著來京請訓再赴奉天之任其所管軍前糧餉事務著額駙䇿凌委員暫行管理尋䇿凌請以參贊大臣阿蘭泰署理奏入報聞冬十月乙亥準噶爾部台吉孟克率子格色爾津來降又回民胡岱巴克桑海來降命授孟克三等侍衛餘悉賞給安插如例丁丑準噶爾回民伊斯拉木丁率妻來降命賞給安插如例丙申命宥馬蘭泰罪上諭辦理軍機大臣等曰嶽鍾琪傅爾丹馬蘭泰均係軍前護罪之人嶽鍾琪傅爾丹既加恩寬免馬蘭泰亦著從寬釋放辛丑命降調巡撫法敏赴北路軍營管理糧餉事務壬寅命額駙䇿凌來京議事上諭辦理軍機大臣等曰據李繩武奏稱噶爾丹䇿零復差哈柳等為使前至哈密軍營約十二月初旬到京使者到時有應議之事著額駙䇿凌即起程來京其軍營印務著海蘭暫行護理十一月丁未準噶爾部人巴扎爾齊里克特穆爾來降命賞給安插如例己未準噶爾部人們都來降命賞給安插如例癸亥準噶爾送還喀爾喀喇嘛羅卜藏西瓦駐防哈密提督李繩武奏言前者被掠之喀爾喀喇嘛羅卜藏西瓦與夷使俱至請先送至京軍機大臣等議奏曰羅卜藏西瓦額駙䇿凌供養之大喇嘛也前者以請安至京賞給如大喇嘛例既而被虜今始送歸請暫令歇息酌量給與盤費仍送還額駙䇿凌奏入得旨著引見上諭羅卜藏西瓦曰爾在準噶爾居住多年噶爾丹䇿零性情爾所深知嗣後有使臣至準噶爾或者使爾同往亦未可定爾感戴朕恩今惟勤習經卷教誨弟子可也隨賞賜佛像緞帕十二月癸酉朔封額駙䇿凌長子成衮扎布為世子上諭辦理軍機大臣等曰額駙䇿凌至京入覲朕諭以噶爾丹䇿零送羅卜藏西瓦還時曾告以車臣汗妻子現在此間若車臣汗念之我當送還據額駙奏稱臣世世受恩深重前準賊入我遊牧虜二子及使婢一人而去若等應即自盡以報國恩茍且偷生至今尚在彼處居住全不知恥臣欲得此不肖之子何用且與國事何益噶爾丹䇿零性本詭詐臣若欲得二子彼必不論可否妄行干請所關非小國事為重臣斷無念子之意輸誠具奏夫父子之道關乎天性額駙䇿凌感激皇祖皇考及朕之恩止圖裨益於國家顧惜大義不思復與其子相見朕心深為惻然思有以奬之其長子貝子成衮扎布漢仗好在軍前亦頗效力著加恩封為世子乙亥準噶爾部人博固木拜來降命賞給安插如例辛巳命尹繼善辦理夷使進藏事宜上諭辦理軍機大臣等曰噶爾丹䇿零奏請進藏熬茶其事著尹繼善辦理壬午準噶爾台吉噶爾丹䇿零遣使哈柳等至京進表先是辦理軍機大臣等奏言夷使哈柳等到日一切典禮請如去年例至是哈柳等至行禮畢恭進表文曰噶爾丹䇿零謹奏大皇帝前哈柳至奉大皇帝敕書云休兵息民永歸和好即定界與否亦非要事誠使厄魯特不得過阿爾台山梁喀爾喀遊牧亦無過扎卜堪庶幾彼此遊牧隔逺如此定議俟回奏到日朕再降諭旨令喀爾喀等遵守事體聲名均有裨益竊思向來阿爾台為厄魯特遊牧杭愛為喀爾喀遊牧原無釁隙今誠廣教安民堅守舊約原不在定界與否前已再三陳請今蒙大皇帝鑒允不勝歡忭即此為定又蒙諭旨卡倫係我皇祖皇考時安設仍應如舊其科卜多所在不復駐兵每年止遣二三十人前往略地斷不致彼此相害互有牽掣已降旨爾使哈柳寧有改悔如此則我心亦不疑托爾和布延圖兩卡倫自不妨仍舊矣又大皇帝諭旨有云朕不阻奉教之人往者爾等潛往西藏殘害土伯特今遽經行彼地恐土伯特懷憤生事果誠心往藏布施俟遵朕旨定議後許用百人赴藏朕特遣官辨護送按前此起釁發兵騷擾是實今一意尊敬黃教斷不致生事但馱載什物百人不敷乞許用三百人至貿易之事令哈柳面懇允行隨表貢貂皮三十一張奏入報聞乙酉命封貝勒頗羅鼐為郡王上諭內閣曰西藏貝勒頗羅鼐遵奉諭旨敬信黃教振興經典練兵防卡甚屬黽勉著有勞績著加恩晉封郡王壬辰準噶爾使臣哈柳等入覲上諭哈柳等曰爾台吉噶爾丹䇿零奏章朕已觀覽悉遵諭旨朕深嘉與之朕為中外共主惟思與普天之下共享升平今噶爾丹䇿零既遵朕旨定界嗣後近邊居人各安故土更無爭競永逺安生矣至所請進藏熬茶乞用三百人朕已允行至貿易之事朕命大臣與爾定議去年爾來今年又至克成和好爾與有榮施朕尚欲加恩於爾爾初到時即欲命爾進見因聞爾有足疾故至今日始令入覲爾善自調理近年節時朕再令爾入朝丙申命哈柳等觀步踏賜噶爾丹䇿零及哈柳緞匹磁器上傳諭哈柳等曰此次爾台吉噶爾丹䇿零遵朕諭旨具奏甚屬恭順爾來正值新正朕有賜噶爾丹䇿零緞匹磁器爾可先令人持往給賜爾去年曾來今年又來以息事寧人之故往返再三克勝使命朕甚嘉之今日適跳步踏是以召爾入觀往年朕亦出視但需時甚久朕在上汝等或不安今年朕特停止出視汝等可安坐暢觀隨恩賜哈柳等緞匹磁器有差平定凖噶爾方略前編卷四十四
