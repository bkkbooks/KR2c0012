  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_106-1a, image: WYG0358/WYG0358-0849a.png}
body:
  text: 乾隆二十三年三月辛丑定邊將軍兆惠等疏奏進𠞰賊衆情形兆惠等奏言臣等於二月初九日起程二十一日臣富德至喀喇烏蘇捉生詢問據供哈丹鄂拓克之人與阿巴噶斯人等逃至博羅塔拉今年正月土爾扈特舍楞等忽來搶掠聞舍楞將入俄羅斯等語二十二日至庫爾喀喇烏蘇捉生詢問據供厄魯特鄂拓克人等去年俱聚於沙喇擘勒十二月間哈薩克遣兵二千將巴爾達穆特綽和爾搶掠其昻吉岱哈薩克錫喇等築壘固守因誘哈薩克云嗎哈沁等欲以妻子易換馬匹哈薩克存留百人後為伊等誘殺俱各分散聞舍楞將入俄羅斯布庫察罕向闥勒竒前來復為昻吉岱所掠再舍楞有千餘戶過闥勒竒向齋爾來時擊敗哈薩克三百人奪馬數百匹曽在博羅塔拉之博勒卓爾格訥居住布庫察罕有二百餘户曽在賽里木淖爾居住昻吉岱哈薩克錫喇鄂哲特卓托魯克喀喇沁阿巴噶斯多果魯特特穆爾齊塔本集賽喇嘛等共千餘户自和濟格爾渡伊犂河曾言向固爾扎濟爾哈朗等處居住哈丹鄂拓克之敦多克帶百餘戶遷來曽在齊格特衣布拉克地方此時不知所向等語臣富德伏思􅀈衆分為四支彼此相近若先𠞰一處必致聞風驚竄因按兵以待臣兆專等輕騎前來於本日公議從前臣等慮衆賊會合一處以抗我兵我皇上先幾洞鑒謂烏合之衆不能久聚萬里之外誠如目覩臣等擬分兵進𠞰如行圍之法約期回合盡與殱除現在合臺站兵丁計有四千餘名臣策布登扎布富德與羅卜藏多爾濟鄂博什溫布領兵一千二百名向博羅塔拉𠞰捕舍楞再向賽里木淖爾𠞰捕布庫察罕由闥勒竒至伊犂會合又派兵六百名看守馱載接續臺站臣兆惠巴祿領兵一千二百餘名由博羅布爾噶蘇向伊犂𠞰捕昻吉岱等又派兵四百名看守馱載三百名接續臺站再聞博羅布爾噶蘇嶺內鄂伯勒齊爾尼勒喀有布魯古特之渾齊二百餘戶居住臣兆惠於所領兵內派出四百名令瑚爾起巴圖濟爾噶爾等前往尼勒喀𠞰捕臣兆惠巴祿同由屯圖倫楚領兵八百至鄂伯勒齊爾會合同入伊犂額駙色布騰巴爾珠爾公明瑞去年追𠞰昻吉岱阿巴噶斯遊牧未獲成功今懇請效力亦同前往其哈丹餘衆僅百餘戶齊格特衣布拉克相距亦近令公敏珠爾多爾濟侍衛達禮善前往𠞰捕其各隊兵丁俱於伊犂會合再行進𠞰回部至賊人供內有舍楞將入俄羅斯之語臣策布登扎布等疾行進𠞰前經奉旨令和碩齊唐喀祿等堵截臣等亦行文科卜多大臣速為知會惟期奮勉效力一舉蕩平奏入報聞定邊將軍兆惠等疏奏擒獲扎哈沁得木齊哈勒拜等兆惠等奏言臣富德於二月二十二日帶兵三百名沿途偵探據侍衛拉瑪錫等報有賊人蹤迹捉生詢問據供扎哈沁得木齊哈勒拜遊牧在額卜推河得木齊達爾扎巴朗亦來相合等語即令侍衛鄂實老格拉瑪錫多爾吉勒圖蒙固勒岱等分兵追襲哈勒拜領隊大臣色布騰巴爾珠爾明瑞鄂博什巴圖濟爾噶爾侍衛正白旗額爾登額烏爾登正黃旗額爾登額特通額等各帶兵前往合圍臣富德率侍衛畢拉爾海福齡安達桑阿等尾隨追擊索倫署參領塞爾默勒圖等前至隘口橫截達爾扎巴朗等見四面攻圍甚迫率其眷屬四十餘口投棄軍器髙呼乞降侍衛鄂實老格追擒哈勒拜𠞰殺屬人八十餘口臣兆惠等續到詢問哈勒拜等據供去年大兵數次𠞰捕扎哈沁遊牧我等四十餘户僅得逃出因大兵已撤始來平原牧馬打牲度日等語查哈勒拜既殺巴哈曼集仍數抗我兵達爾扎蒙恩授三等侍衛令管臺站乃敢叛逃搶掠及至攻圍甚迫始畏威乞降罪無可逭俱於軍前正法巴朗係達什達瓦屬人熟悉伊犂博羅塔拉等處暫留為嚮導所餘人口解赴巴里坤備賞收獲牲隻軍器什物分給兵丁臣等伏思此次所遇雖非大隊賊人而擒獲渠魁盡俘黨衆進兵伊始實為順利其奮勉官兵應否交部議敘出自特恩奏入報聞諭定邊將軍兆惠等進𠞰賊衆事宜上諭軍機大臣曰兆惠富德等奏稱沙喇擘勒賊衆紛紜逃散果不出朕前諭所料但策布登扎布富德羅卜藏多爾濟等皆分𠞰舍楞而進𠞰昻吉岱等衆賊惟兆惠巴祿恐兆惠未能辦理果決然業經區畫亦追改無及其巴圖濟爾噶爾亦著為領隊大臣在前哨探此次富德等擒獲扎哈沁哈勒拜等將賊衆全行俘獲在事官兵甚屬奮勉著造册送部議敘哈勒拜等俱屬小醜自當在軍前正法其哈薩克錫喇等渠魁若經擒獲仍解送來京看來進𠞰賊衆尚易竣事雅爾哈善等辦理回部若照前定限期轉覺後時著將兆惠等奏摺録寄雅爾哈善等閲看並令將辦理情形作速奏聞又諭曰據兆惠等奏稱擒獲賊人供內有舍楞將入俄羅斯之語已行文科卜多大臣知會和碩齊唐喀祿等語前經降旨令和碩齊等在額爾齊斯等處堵截由沙喇擘勒逸出及逃往俄羅斯賊人今沙喇擘勒賊衆俱已潰散四出而舍楞又有逃入俄羅斯之信恐科卜多大臣等文移遲滯著傳諭阿桂行知和碩齊唐喀祿等倘賊衆有向額爾齊斯逃往俄羅斯蹤迹伊等務留意堵截擒拏解送來京伊等駐兵許久以逸待勞斷不可稍有玩忽致令中途逃脫此旨到日阿桂即擇健馬飛遞令和碩齊唐喀祿等遵照辦理諭參贊大臣永貴等協辦魯克察克以外臺站上諭軍機大臣曰據巴祿奏稱現在進兵由巴克庫蘇一路所設臺站馬駝倒斃者甚多經兆惠等移文永貴定長酌量添補等語軍臺關係緊要馬匹駝隻自應辦給足額方可馳遞無誤永貴等雖專辦屯田事務及巴里坤至魯克察克一路軍臺而魯克察克以外臺站更為緊要著傳諭永貴定長一體查辦勿分畛域所需馬駝即照移文添補仍協同巴祿不時巡察坐臺官兵務令加意牧放馬駝庶往還事件不致遲滯亦傳諭巴祿知之壬寅命主事巴杭阿協同佐領職銜郎中三寶照看達什達瓦遊牧癸卯靖逆將軍雅爾哈善疏奏派撥進𠞰官兵雅爾哈善奏言臣等酌派領隊侍衛官員有巴圖魯侍衛寧古禮噶布舒喀喇侍衛拜達爾藍領侍衛達克塔納桑古善賀倫泰莫寧察吉林驍騎校錫勒畢善健鋭營前鋒署筆帖式五十八佛保俱來至魯克察克軍營其侍衛富紹等陸續帶來索倫吉林察哈爾兵共一千四百餘名無庸調取兆惠等軍營兵丁又哈密貝子玉素富領回兵一百名於三月初一日到營其馬得勝丑達五福等所領緑旗兵丁現從巴里坤起程侯伊等到時照所派吐魯番三百回兵之數撤留屯田其應得之項俱移給回兵但派出回兵應得兩個月褁帶口糧鹽菜理宜豫行支給以備刻期起程請即由闢展存貯銀米內給發外至緑旗兵丁所得整裝銀兩已從本地支給又仍留伊等屯田請免其追繳惟將馬匹換給回兵其三百回兵應得整裝銀各三兩俱從奏帶備賞銀內動用賞給至伯克鄂對等俱係庫車烏什庫爾勒等城頭目乾隆二十年平定伊犂伊等迎降即隨營行走除同來子弟外其眷屬多被回酋殺害此次進𠞰令其招撫各城臣等現候緑旗兵到營即前往哈喇沙爾再將進𠞰日期具奏奏入報聞乙已命喀爾喀公林丕勒多爾濟之子孫卜登多爾濟承襲伊父公爵大學士管陜甘總督黃廷桂疏奏解送軍營駝隻數目黃廷桂奏言臣查陜甘各屬及豫省一帶購辦商民駝隻又各營挑解孳生上年晉省留餘及挑選各起厄魯特駝隻共七千一百有竒又晉省辦解駝隻六千四百有竒共駝一萬三千五百有竒本年三月初九日準吳達善咨送疏稿內開用過駝隻五千九百六十有竒現需撥給緑旗兵丁駝隻二千五百六十有竒臣已檄催速解計四月初可全抵巴里坤尚有餘駝五千餘隻陸續解送應付軍需似屬富裕奏入報聞丁未恩授軍前效力之厄魯特等官職及賞賚安插有差上諭軍機大臣曰順德訥等隊內效力之厄魯特察罕庫本班第俱著授三等侍衛賞給衣服銀兩派乾清門侍衛德爾森保等送至雅爾哈善軍營效力行走其家口安插察哈爾人少旗分嚮導擒𠞰賊衆之巴圖根敦札卜著同家口送京伊等若未出痘亦在察哈爾旗分安插巴里坤辦事巡撫吳達善等疏奏馬匹被竊情形吳達善奏言據厄魯特宰桑摩羅等供節次盜取巴里坤牧馬三百餘匹奉旨交臣等查奏查巴里坤牧放馬駝有被竊之案俱經陳奏去歲九月因雪大草枯將馬駝移於塔勒納沁十月間巴里坤並無官馬至倒斃馬匹必有耳尾可驗或牧馬人員因被竊懼罪作為倒斃亦未可定現在詳悉查辦再乾隆二十一年十二月內𠞰殺沙克都爾曼濟牧其馬駝牲隻經分賞效力兵丁係伊等自行牧放或有遺失被竊等事臣等俱未能查出不勝愧悚請交部嚴加議處奏入得旨此次著從寬免其議處嗣後當加意防範軍機大臣疏奏詢問回人阿卜都爾璊供詞軍機大臣奏言前莽噶里克差遣探信之回人阿卜都爾璊在哈密拘禁今據巴里坤大臣等遵旨解送來京臣等詢問阿卜都爾璊據供從前莽噶里克隨將軍和起厄魯特尼瑪等往拏巴雅爾行至闢展尼瑪等背叛將軍被圍并拘禁莽噶里克迫脅其弟同行莽噶里克始得脫回吐魯番尼瑪復領兵脅降莽噶里克不從彼時將軍兆惠及巴里坤大臣俱遣人至吐魯番莽噶里克即作書令伊弟多里雅特同我往魯克察克送與公素賚璊閲看復書與將軍所遣之人並差伊屬人默美特蘇卜同往哈密中途將軍所遣人等自回巴里坤我等見哈密大臣時遣默美特蘇卜即回將我拏獲拘禁莽噶里克惟令我隨同將軍差遣之人並無他説等語又詢問阿卜都爾璊從前和將軍至闢展見三十餘人蹤迹令莽噶里克帶索倫十人往探回報云係尼瑪之兵又請將馬駝於山嶺牧放未幾尼瑪等即來衝擊聞莽噶里克亦曾助力何得為其隱瞞據供將軍見有賊蹤令往看視莽噶里克並未前行係遣伊屬人同索倫往探其牧放馬駝是實但不知為何人所告至將軍被圍時莽噶里克實未助力係乘亂逃回等語奏入得旨著將阿卜都爾璊發往杭州賞給將軍薩爾哈岱為奴己酉定邊將軍兆惠等疏奏擒獲叛賊琿齊收其遊牧兆惠等奏言臣等分兵後臣兆惠派兵四百名交瑚爾起巴圖濟爾噶爾由呼斯坦至尼勒喀河襲擊叛賊琿齊臣兆惠巴祿領兵八百名入博羅布爾噶蘇口至鄂伯勒齊爾與瑚爾起等會合瑚爾起等於二月二十八日至呼斯坦適遇琿齊等百餘户遷移遊牧即行圍𠞰殺賊四五十人琿齊等登山高呼乞降巴圖濟爾噶爾遣親隨布爾特庫將琿齊喚來瑚爾起盡收其遊牧次日與臣兆惠等相見臣等責問琿齊已降復叛并詰以各賊藏匿處所據供去歲呈獻扎那噶爾布首級即欲投至軍營因宰桑美諾和什云布魯古特投誠時盡行𠞰滅等語是以中變聞得昻吉岱哈薩克錫喇鄂哲特集賽之喇嘛等會合千餘戶向伊犂前來巴圖爾烏巴什出痘身死舍楞率所屬欲往俄羅斯向博羅塔拉前去布庫察罕有二百戶在賽里木淖爾居住哈丹屬人現在齊格特衣布拉克其餘互相殺掠殆盡綽羅斯台吉阿南達哈什哈索遜因被昻吉岱搶掠僅帶數人投來我處今亦被擒等語臣兆惠等即將馱載暫留輕騎前往掩襲各賊并令瑚爾起隨後策應其琿齊阿南達哈什哈索遜先行送京所有屬人令隨我兵行走留兵看守伊等家口俟臣進𠞰昻吉岱等事竣酌量辦理效力行走官兵及得傷兵丁應請交部議敘奏入得旨巴圖濟爾噶爾瑚爾起初次進𠞰即擒獲叛賊琿齊等盡收遊牧深屬可嘉巴圖濟爾噶爾瑚爾起著交部議敘其奮勉官兵亦查明送部往喚琿齊之厄魯特布爾特庫兆惠等酌量賞給銀兩又諭軍機大臣曰覽兆惠等所奏擒獲琿齊等情形事機順利自可早奏膚功但伊等將所收琿齊等屬人俱帶領從軍效力似覺可慮倘逃走一二人潛通信息致賊衆聞風竄逸甚有關係著傳諭兆惠等宜留心體察倘稍露脫逃形迹即行辦理命分别查議運送軍需官員上諭軍機大臣曰據兆惠等奏稱由巴里坤運送口糧軍器之第二起遊擊菩薩保行走遲滯駝隻疲乏倒斃者甚多第三起遊擊唐朝舉相隔十日起程與二起同至駝隻疲斃者較少等語唐朝舉及同行官兵著與頭起之富勒渾等一體交部議敘菩薩保著交部嚴加議處命優恤察哈爾總管第魯巴上諭軍機大臣曰據兆惠等查訊扎哈沁賊人知總管第魯巴於前年十一月巡查臺站至烏蘭烏蘇遇扎那噶爾布等搶掠隻身奮勇鏖戰為賊所害深可憫惻著交部照陳亡例加恩優恤諭飭定邊將軍兆惠等查審郭木尼勒圖匿馬情節上諭軍機大臣曰昨諭兆惠等將巴圖濟爾噶爾所奏郭木尼勒圖藏匿馬匹等情節秉公查審具奏今據奏稱郭木尼勒圖支吾推委應候提取原稟之章京喀勒占到時再行質審辦理等語此案情節兆惠等宜向郭木尼勒圖嚴加詰問不當於巴圖濟爾噶爾有意吹求從來審理案件未有舍被告之人而專於原告是問者非但不足服人之心且致生其疑懼兆惠等顯有偏袒姑息之意著傳諭申飭其郭木尼勒圖仍遵前旨審明即行正法諭大學士管陜甘總督黃廷桂等辦理擒獲之厄魯特等上諭軍機大臣曰富德等擒獲厄魯特巴圖巴布寄等戶口將巴圖孟庫伯勒克留為嚮導餘俱解送巴里坤等語昨諭將來降之厄魯特等賞給産業歸入緑旗兵丁內差遣特指誠心降附者而言其兵力擒拿者不在此例此次解送之厄魯特家口係拿獲之嗎哈沁著照從前諭旨送至肅州等處辦理可傳諭黃廷桂吳逹善等知之庚戌諭定邊左副將軍成衮扎布辦理四部落遊食人等事宜上諭軍機大臣曰成衮扎布奏稱軍營附近等處四部落遊食貧人甚衆不行驅逐恐致滋生事端隨派出官兵給與口糧送回本旗交該扎薩克嚴加約束等語軍營存貯米石備官兵之用非易於運致者且蒙古等以茗酩為生向不專資榖食今將逐回人等給以口糧使各遊牧聞知貪得米石來者必多轉非資遣之法此次業經辦理嗣後倘有再來者即量為懲治驅逐無庸給與口糧定邊左副將軍成衮扎布蔬奏受事日期成衮扎布奏言臣於三月初十日至烏里雅蘇台軍營據納穆扎爾將定邊左副將軍印交送臣謹叩頭扺受納穆扎爾遵旨於十四日起程回京奏入報聞辛亥命巴里坤辦事提督豆斌巡查臺站上諭軍機大臣曰現在兩路進兵馳遞事件甚多自巴里坤至額林哈畢爾噶一帶恐尚有藏匿山谷賊人為行旅之害但嗎哈沁等諒亦無幾可傳諭吳達善在巴里坤兵丁內酌派一二百名令豆斌帶領加意巡查一遇賊人即行𠞰殺以清臺路癸丑定邊將軍兆惠等疏奏昻吉岱等賊衆情形兆惠等奏言昨據琿齊等供稱昻吉岱等賊衆向伊犂前來臣等於三月初三至額爾克巴圖爾布拉克捉生詢問據供昻吉岱自去年從阿圭雅斯逃至沙喇擘勒哈薩克錫喇鄂哲特等以昻吉岱係噶爾丹策零近族議立為大台吉布庫察罕舍楞等不從舍楞欲入俄羅斯布庫察罕拒守伊遜薩們之源昻吉岱遣特古斯孟克鄂哲特來攻為布庫察罕所敗十二月初哈薩克哈布哈之子圖古占領兵二千至沙喇擘勒掠取綽和爾及兩巴爾達穆特昻吉岱等於察林之橋渡連兵拒戰哈薩克阿布拉該爾之子額爾類又領兵千人來攻今年正月昻吉岱等遂移向伊犂布庫察罕掠取昻吉岱馬匹鄂哲特往追被擒隨行釋放因共攻昻吉岱聞昂吉岱特古斯孟克俱隻身逃出未知被獲與否鄂哲特於二月中遷移北去或往察罕烏蘇闥勒奇或合布庫察罕俱不得知現在鄂哲特有千餘戶等語臣等即尋蹤往追并行文策布登扎布若賊衆向闥勒奇即行堵𠞰又哈丹餘衆在齊格特衣布拉克前遣敏珠爾多爾濟等往𠞰據報二月二十七日追至額卜推河截其後隊三十餘戶全行𠞰殺探知哈丹阿巴噶斯餘衆尚有七十餘户逃向綽和爾等營壘隨至其地山險林密僅容單騎兩山埋伏鎗炮不能前進等語臣等即飭令奮力攻擊若不能即取當嚴守隘口不可致令逃脫并發給一月口糧又奉到諭旨令臣等酌量派給雅爾哈善索倫兵丁雅爾哈善調取索倫兵五百名咨文亦到臣等現帶之兵僅敷調遣且已至伊犂若將兵丁從額林哈畢爾噶發往魯克察克恐路遙力乏查現辦解送人口至巴里坤亦須派兵擬俟𠞰賊事竣將索倫兵五百名由朱爾都斯押解人口送交雅爾哈善將索倫兵留用派緑旗兵丁押解人口轉赴巴里坤奏入上諭軍機大臣曰據兆惠奏稱派給雅爾哈善之索倫兵請俟𠞰賊事峻再行發往等語此係伊等未進兵以前之旨近又諭令停止兆惠等若𠞰賊事竣即與雅爾哈善合兵辦理回部亦不必于押解人口時發往至所奏敏珠爾多爾濟等以哈丹等餘賊營壘堅固不能攻取已飭令嚴守隘口等語賊衆藏匿險僻不過偷生旦夕久之必無口食接濟我兵自應於要路防守相機攻𠞰斷不可委之而去此時若能辦竣固善否則將巴圖濟爾噶爾溫布由屯等派出一二員領兵協助務絶根株嗣後伊犂等處賊衆有藏匿抗拒者亦照此辦理靖逆將軍雅爾哈善等疏奏進兵日期雅爾哈善等奏言三月十一日侍衛齊凌扎卜齎送靖逆將軍印前來臣謹叩頭祇受將欽差大臣關防移交永貴定長訖都統哈寧阿於十三日前至軍營臣等即領兵起程向哈喇沙爾進發並將恩旨所賞伯克鄂對等翎頂傳諭賞給伊等感激祗領現在參贊領隊大臣總管侍衛等俱各戴翎於軍容甚為整肅惟帶領緑旗官兵自提督馬得勝外其總兵官丑逹五福閻相師俱係領隊大員可否令其戴翎出自特恩臣等欽遵節次訓示於一切機宜惟有和衷商辦益加策勵以告成功奏入上諭軍機大臣曰近因兆惠奏派哈寧阿同䇿布登扎布進兵曾諭令前往兆惠軍營行走今哈寧阿既至魯克察克同往哈喇沙爾恐接到此旨又復遄行著傳諭雅爾哈善哈寧阿此時若未趲赴兆惠軍營即停其前往如已遵前旨起程亦不必追回其帶領緑旗兵之丑達等俱照所請賞戴孔雀翎諭兩路將軍等和衷集事上諭軍機大臣曰從前兩路將軍大臣等領兵𠞰賊往往分别彼此以致所辦軍務未能迅合機宜朕曾屢降諭旨訓飭今兆惠雅爾哈善分兵前進本路應辦事務各宜奮勉至若兩路聲息相通及會合一處尤貴和衷商確兆惠雅爾哈善策布登扎布俱世受國恩為朕簡用之人自當視國事如家事合兩路為一體現在辦理回部雅爾哈善既膺專閫之寄一應章奏文檄自宜首列若兆惠進𠞰厄魯特事竣往辦回部兩路會合時又當以兆惠居首總期伊等同心協力早奏膚功勉之勿怠諭辦理屯田侍郎永貴等增兵耕種事宜上諭軍機大臣曰昨因軍需羊隻道逺多致倒斃諭永貴等於屯田處所廣為墾種以裕軍食今據永貴定長等奏稱本年在烏魯本齊闢展托克三哈喇沙爾等處共派屯田兵三千六百名墾地二萬九千二百畝計布種一千四百餘石可收榖三萬六百石較去年吐魯番闢展之數加增三倍等語多種地畝於軍食有益現派兵數尚覺其少或伊等計抽調留候成熟僅得此數耶抑或難於多得耶但添派緑旗兵丁其後隊尚未起程者多係間住不妨暫令乘時布種再陸續前往至永貴等辦理屯田當親往察看董勸兵丁其勤於力作多種地畝者即量加賞賚以示鼓勵甲寅命厄魯特喇嘛羅卜藏原端同雍和宮之扎薩克喇嘛居住議喀爾喀圖謝圖汗部落差役事宜定邊左副將軍成衮扎布奏言桑寨多爾濟奏稱圖謝圖汗親王齊巴克雅喇木丕勒等六旗蒙古等偶值災荒請暫停差役等語奉旨交臣等查明尚有何項差役酌量辦理查喀爾喀等安設臺站牧放牲隻官兵及值班台吉等現俱給與錢糧惟自遊牧起程辦給口糧軍器馬匹稍有費用從前扎薩克圖汗賽音諾顔二部落十餘旗被災暫停差役於各該部落內通融辦理今圖謝圖汗之六旗應請照扎薩克圖汗等旗之例辦理奏入得旨軍機大臣議奏尋議喀爾喀等此數年來時被災荒生計維艱我皇上特沛恩綸停其差役悉從官辦又發帑代還公私逋負近因圖謝圖汗之六旗被災復發帑賑濟具伊等除台言官兵等起程前赴軍營自行整裝之外並無别項差役今既據成衮扎布等援照扎薩克圖汗等旗之例將圖謝圖汗之六旗暫停差役於該部落內通融出派等語應如所奏辦理奏入上從之議遷移達什達瓦屬人事宜定邊左副將軍成衮扎布等奏言臣等查達什達瓦屬人現在鄂爾昆等處遊牧與喀爾喀錯處致有盜竊事端且伊等所種地畝多未收穫請遵面奉諭旨酌量移於通肯呼裕爾應乘青草萌生時給與兩月口糧派官兵照管前往通肯呼裕爾奏入得旨軍機大臣議奏尋議遷移達什達瓦屬人前經成衮扎布在京時奉旨交臣等會議臣等議以俟成衮扎布回至軍營相度情形具奏到日再議今成衮扎布既請遷移安插應如所奏辦理但上年伊等所種地畝多未收穫又蒙恩賞給籽種應仍令其照常耕種至秋收後遷移庶伊等所存牲隻得以休息至伊等遷移後時際冬春仍需接濟請行文黑龍江將軍等酌定地方豫為辦理奏入得旨遷移達什達瓦屬人一事成衮扎布等此時且不必宣露若伊等知覺即不肯努力耕種矣再從前將軍綽爾多等奏稱通肯呼裕爾地頗寬廣達什達瓦屬人遷移甚便等語此地近經安插厄魯特等今又將達什達瓦移往其如何分别指給遊牧及豫備接濟之處著綽爾多即妥議具奏平定準噶爾方略正編卷五十二
