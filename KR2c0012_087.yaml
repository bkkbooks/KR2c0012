body:
  text: 乾隆二十一年冬十月乙亥命傳諭綽羅斯汗噶爾藏多爾濟等上諭噶爾藏多爾濟沙克都爾曼濟巴雅爾等曰爾等自上年前赴熱河行在入覲後即回至各遊牧地方已踰一載甚勞逺念爾等遵朕諭旨約束所屬守分安居深堪嘉于今屆歲終特遣侍衛第瑪部員巴哈達等前往存問並齎所賜食物荷包以示優眷俱各祇受現在阿逆尚在哈薩克茍延殘喘朕念官兵效力經年時屆寒冬暫行撤回俟明年領兵再往第阿逆狡詐百出倘遣人潛赴爾等遊牧詭計煽惑爾等即行擒獻毋令脫逃至沙克都爾曼濟遣人奏稱請於巴里坤附近地方遊牧已諭知雅爾哈善等酌給口糧暫為安插俟明春賞給耔種赴廋集額卜齊布拉克等處耕種秋收後再行回至原遊牧爾等仍善自謀生永享升平之福朕有厚望焉定議派兵駐劄巴里坤大學士管陜甘總督黃廷桂奏請派滿洲兵二千名駐防瓜州地方一摺得旨黃廷桂奏請派滿洲兵二千名駐劄瓜州現在巴里坤已設庫倫其從前派往兵丁一千名應行更替著即於派駐瓜州滿洲兵內先派一千名令往巴里坤駐防其瓜州駐防兵一千名著照黃廷桂所奏俟戊寅年再行派往所有此次揀選派兵事宜著軍機大臣議奏尋議派兵駐劄巴里坤應設協領二員佐領八員防禦八員驍騎校八員筆帖式一員俱由八旗應升人員內揀選引見派往其所派兵丁由八旗前鋒護軍披甲人內挑選年力強壯者於明年二月內起程其沿途折給車輛口糧草乾銀兩悉照從前西安兵丁移駐涼州莊浪之例支給再查此項官兵攜眷前往應給與治裝立産之資臣等酌議協領佐領各給整裝銀四十兩立産銀六十兩防禦驍騎校筆帖式各給整裝銀三十兩立産銀五十兩兵丁給整裝銀二十兩立産銀三十兩整裝銀兩在京給發其立産銀兩俟抵巴里坤支給再查巴里坤現有駐兵房屋應行添蓋補修即著黃廷桂派員查明鳩工料理奏入上從之諭陜甘總督黃廷桂等籌議遣派厄魯特等駐劄瓜州上諭軍機大臣曰巴里坤駐劄滿洲兵一千名已經軍機大臣等議奏派往其瓜州議設駐防兵丁既經黃廷桂奏請俟戊寅年移駐為期尚逺該處逺在邊外滿洲兵丁攜眷前往殊屬未便現在厄魯特等前赴巴里坤者甚多伊犁等處尚有散處厄魯特人等若擇其年壯可任耕種者或一千名或數百名移住瓜州伊等既獲養贍之資加以訓練更可收日後效力之用似無庸更派滿洲兵丁前往著傳諭黃廷桂兆惠雅爾哈善等商酌辨理大學士管陜甘總督黃廷桂疏奏募民墾種瓜州地畝黃廷桂奏言查瓜州回人遷移魯克察克所遺地畝委員逐細丈量共計成熟地二萬四百五十畝應就近招民承種借給耔種照例於收成後扣除其糧石仍按官四民六徵收存貯廳倉以備供支駐防兵丁口糧奏入報聞丙子定邊右副將軍兆惠等疏奏遣使曉諭回部情形兆惠等奏言前遣往葉爾羌喀什噶爾侍衛提竒圖章京敦多克塔克慎藍翎愛新泰副前鋒校瑚圖禮等回至軍營據提竒圖稟稱前奉將軍策楞令同瑚圖禮前往葉爾羌曉諭波羅泥都霍集占兄弟等派定一人入覲並令其速定貢賦章程及派人赴軍前貿易事宜見霍集占時將文書給與霍集占並未遵行但稱已遣人同侍衛托倫泰前往一切事宜俱經具奏隨將我遣回又將帶往厄魯特人等留住在彼霍集占曾帶兵三千與布魯特交戰兩次大敗等語據敦多克稟稱前奉將軍策楞遣往葉爾羌齎送諭旨令霍集占遣人仍赴伊犁種地霍集占亦未遵行等語據塔克慎稟稱前奉副都統職銜阿敏道遣送將軍策楞文書至回部令波羅泥都等擒拏阿逆使人達什孟庫至阿克蘇地方為阿布塞塔爾看守今始放回等語據瑚圖禮稟稱我在阿克蘇聞波羅泥都向霍集占云我兄弟自祖父三世俱被準噶爾囚禁荷蒙天恩釋放仍為回部頭目受恩深重爾若有負天朝任爾自為我必不能聽從各等語臣等看塔奇圖等所稟回部情形波羅泥都似屬恭順霍集占素不安分前曾黨同阿逆後畏懼大兵又襲擊阿逆以圖掩飾其人反覆無常今為布魯特擊敗始將屢次使人遣回此時不立定貢賦章程又並未遣人前來顯有背逆情狀臣即飭知阿敏道令與宰桑巴桑等公同商議作速進兵綏靖阿克蘇庫車地方令霍集占親來謁見其伊犁種地回人即照舊派撥前來倘稍抗拒即行𠞰滅奏入上諭軍機大臣曰兆惠等據遣往回部侍衛所告波羅泥都霍集占等各情形即飭知阿敏道迅速進兵相機辨理甚合機宜第現在霍集占遣使沙呢雅斯來京奏稱感激朕恩情甚誠篤霍集占雖未可深信然其遣使逺來明有畏懼天朝之意此時如已將霍集占拏獲或伊自行投至伊犁兆惠善為安撫仍派員解送來京若阿敏道駐兵在彼未即擒獲兆惠亦遣人至彼將伊遣使前來奉旨準其投誠之處明白曉諭但令其將每年貢賦照數交納毋庸加以兵威辦理方為妥協其令回人前赴伊犁種地一節前已降旨停止著兆惠遵照辦理此次自葉爾羌回來之侍衛提竒圖目擊彼處情形著即馳驛來京以備詢問丁丑命授舒赫德副都統馳驛來京上諭軍機大臣曰舒赫德帶兵追緝烏梁海郭勒卓輝等至鏗格爾伯勒齊爾地方知郭勒卓輝逃入俄羅斯即將彼此不容留逃人之例明白曉諭俄羅斯頭目並領兵向彼索取所辦尚合機宜已令該部移咨俄羅斯薩納特衙門索取郭勒卓輝等舒赫德毋庸領兵前往著將所領兵丁交與哈達哈等帶領此旨到日即行馳驛來京仍加恩補授正紅旗漢軍副都統伊子舒常並著加恩補授三等侍衛戊寅諭定邊右副將軍兆惠等擒拏巴雅爾上諭軍機大臣曰兆惠等奏稱據綽羅斯汗噶爾藏多爾濟等咨稱巴雅爾搶掠洪霍爾拜扎哈沁等五百餘户殺傷人衆劫奪牲隻已遣和起會同噶爾藏多爾濟等設計擒拏巴雅爾等語巴雅爾原係不可深信之人今果肆行吞噬情甚可惡應即行擒拿治罪第扎哈沁人等牲隻亦甚無多今達報稱駝馬牛羊數至逾萬其中或尚有揑飾之處亦不可不詳加體察再鄂爾竒木濟係扎哈沁宰桑伊等既被搶掠應由鄂爾竒木濟轉報將軍辦理乃由噶爾藏多爾濟等咨報軍營亦屬非是噶爾藏多爾濟係綽羅斯汗若將附近各鄂拓克事務俱歸管轄亦非所宜嗣後無論何鄂拓克事務俱令徑報將軍方為妥協從前曾密諭兆惠防範巴雅爾稍有可疑即行辦理且因巴雅爾與哈薩克錫喇係同母異父之子是以勿令知覺其時哈薩克錫喇尚係新降未經受朕厚恩今伊效力軍營甚知感激奮勉且現在尚未抵伊犁兆惠等將巴雅爾擒拏後俟哈薩克錫喇到時仍如從前一同辦理事務不必稍露形迹使伊疑懼定邊右副將軍兆惠等疏奉招服回部情形兆惠等奏言據副都統職銜阿敏道報稱閏九月初五日帶兵將至庫車城探知阿克蘇城之阿布塞塔爾率衆一千人住穆舒爾河霍集占率衆約三四千人住圖爾滿因向扎爾呼齊宰桑巴桑等商議云看此情形甚屬可疑遂遣滿洲察哈爾索倫兵三十餘名并派厄魯特兵一半前行即帶餘兵續進離城三十里巴桑遇回人百餘迎敵當即擊殺四十餘名隨令厄魯特兵圍城有回衆千餘迎敵為我兵衝殺退回堅守不出因令驍騎校薩轄等入城曉諭天朝特來安撫爾等何故出城迎戰據呼岱巴爾氐達爾罕伯克遣人同來託詞支飾又促其辦納貢賦據云我等久已歸順但厄魯特向係仇敵恐為所害斷不敢輕出等語因向巴桑商議再遣人示以厄魯特斷不生事爾等既生疑懼即可撤回若再支飾即便攻城據呼岱巴爾氐云若果將厄魯特兵撤回我等即便出城再厄魯特掠我牛羊米石雖已作為行糧其馬駝懇仍給還等語因將厄魯特兵退回遊牧親帶官兵百餘名駐劄庫車城辦理招服回部據巴桑等謂兵力單弱似屬危險我向伊等云惟期於國家大事有濟豈可論其危險并令將馬駝給還巴桑等云我等風俗搶掠之物向不給還今既以大事為重即遵示退給等語初九日厄魯特等各回遊牧俟駐劄庫車城後再將辦理回部事宜報知臣等即咨覆阿敏道云前發厄魯特兵原恐回人反覆無常相機𠞰撫今既顯有抗拒形迹仍往返説降更復聽信撤兵辦理殊未妥協即如前次所遣招服之人為霍集占久留後始遣歸今以孤軍駐劄何禆於事況庫車一小城耳縱使降服其餘各回城未必一呼即應且回人即真畏厄魯特或令暫退數程相機行止乃盡行遣歸遊牧恐中緩兵之計今業已撤回所有辦理回部各城貢賦之例及遣往伊犁種地回人何時可到并令霍集占於何時至軍營投見續為呈報臣等伏思回人狡詐性成兼霍集占素不安分近因為布魯特所敗始遣歸我使今阿敏道兵力單弱恐難成功臣等擬俟圖什墨勒扎爾呼齊宰桑等到日酌看回部情形如果恭順自當撫納倘仍藉端支飾明歲即應整兵俟其田禾成熟時前往辦理奏入上諭軍機大臣曰兆惠奏阿敏道帶兵前赴庫車等處招服回人因回人見所領厄魯特兵丁不敢出城迎降隨將厄魯特等退回阿敏道親赴庫車城辦理招降事宜等語回人等向懼厄魯特戕害是以未敢前來迎降亦或事之所有昨已傳諭兆惠現在霍集占遣使來京意甚誠篤果能遵諭貢賦即不必加以兵威且時屆隆冬阿敏道所領厄魯特兵丁既已退回此時霍集占如己親身謁見將軍或遣人前赴軍營立定貢賦章程兆惠等即遵照前旨辦理己卯命分賞巴雅爾所屬人等上諭軍機大臣曰兆惠派和起會同噶爾藏多爾濟等擒拏巴雅爾此時應已辦竣擒拏巴雅爾後伊部落所屬人等應行分賞第噶爾藏多爾濟等雖同派兵擒拏至於分賞户口不必過多酌量以百户為率其餘若鄂爾竒木濟等酌量分賞令其管轄餘俱歸入二十一昻吉方為妥協再輝特部落內如和通額默根等雖與巴雅爾同一部落伊等俱屬安靜所屬户口自不得照巴雅爾一例辦理并將巴雅爾户口歸入伊等管轄亦可著傳諭兆惠遵照辦理辛巳命奬賞軍前效力喀爾喀王公等上諭軍機大臣曰哈達哈等將軍前奮勉之喀爾喀郡王策布登扎布等開列具奏已命軍機大臣等酌量伊等勞績分别奬賞策布登扎布巴扎爾什第俱著賞戴三眼翎恭格敦丹著賞戴雙眼翎向例親王不令戴翎以示優異其領兵及隨圍時並著戴翎今親王成袞扎布現辦副將軍事務亦著戴三眼翎如來京遇大典禮時仍照在京親王體制命奬賞軍營效力人員竒徹布等上諭軍機大臣曰舒布圖鎧巴圖魯頭等侍衛竒徹布著在乾清門行走索倫副總管鄂木布著補授索倫總管伊等此次效力軍前甚屬奮勉並著交部議敘賞給世職其索倫官員內卓里雅扎爾善薩壘諾穆察等四員亦屬奮勉俱著賞戴孔雀翎以示奬勵壬午命喀爾喀親王巴扎爾什第查辦遊牧匪竊人等上諭軍機大臣曰前因喀爾喀內有劫奪商人匪賊降旨令郡王德木楚克回至遊牧查辦今西路大兵已撤親王巴扎爾什第亦即回至軍營並著伊速赴遊牧會同瑚圖靈阿等辦理再據貝勒顔楚卜多爾濟奏稱伊遊牧地方所有齊木齊格特人等肆出為匪請暫移至阿壩垓地方居住等語朕已允其所請齊木齊格特人等著即嚴行查拏正法以昭炯戒甲申諭定邊右副將軍兆惠籌辦進兵哈薩克事宜上諭軍機大臣曰前因時屆寒冬降旨暫行撤兵俟一二年後相機辦理今據瑚什來京奏稱阿逆與阿布賚等雖俱逺遁彼處不能過冬偵探大兵已撤必仍赴原遊牧居住等語果爾伊等往返奔馳人馬俱已疲困正可乘機進𠞰俾賊人不得少為休息途窮計蹙自將阿逆擒獻若為日既久賊困稍舒不若此時更易為力昨已傳諭兆惠酌量派兵赴阿布賚遊牧地方襲擊並飭知各鄂拓克人等防範阿逆前來侵擾兆惠等自能遵照辦理現在兆惠所駐地方與哈薩克相近著預選索倫兵一千名以備來春進𠞰之用彼處現有巴里坤解送馬一千匹即於附近地方加意牧放俟擒拏巴雅爾後選其馬匹駝隻以益兵力兆惠等務宜悉心籌畫如有未協機宜之處即行據實奏聞若應如此辦理亦毋庸兆惠領兵朕自派員馳驛前往兆惠現在辦理一應事宜俱甚妥協著賞給佩用荷包鼻煙壺以示優眷近因舒赫德追擒烏梁海郭勒卓輝等甚屬奮勉已加恩補授副都統令其來京詢問彼處情形俟到京後即令其前赴軍營更替兆惠來京面詢一切事宜並傳諭兆惠知之乙酉諭駐劄巴里坤辦事大臣雅爾哈善等解送軍營馬匹上諭軍機大臣曰昨已傳諭兆惠揀選兵丁於明年春間進兵哈薩克擒𠞰阿逆軍行馬匹關係緊要著傳諭雅爾哈善等所有應解軍營馬一千匹即行解往仍令黃廷桂豫備馬匹解赴巴里坤交雅爾哈善轉解戊子參贊大臣舒明疏奏拏獲青滾雜卜賊黨伯爾格等舒明奏言前經副將軍成袞扎布遣察哈爾營總炳圖喀爾喀護衛齊納圖前往烏梁海地方途中拏獲青滚雜卜遣往烏梁海之伯爾格等三人臣等訊問伯爾格等供稱青滚雜卜遣伊等赴公丹拜貝子彭楚克烏梁海達爾罕巴顔及新烏梁海赤倫察達克莽噶拉克等處調兵八百名伊等俱不聽調遣等語彭楚克達爾罕巴顔等並將伊等拏獲交與炳圖等解送前來隨委員解赴成衮扎布軍營訊問奏入上諭軍機大臣曰舒明奏拏獲青滚雜卜遣往烏梁海之伯爾格等現在解送成衮扎布軍營著嚴加刑訊即行正法新舊烏梁海等並無一人附和青滚雜卜聽其調遣大兵一到送賊自可即日擒獲成滚扎布即速領兵前往勿少遲疑炳圖齊納圖及朋楚克達爾罕巴顔等擒獲逆黨俱屬奮勉著加恩賞給孔雀翎以示鼓勵庚寅大學士管陜甘總督黃廷桂疏奏設立巴里坤軍營理事同知事宜黃廷桂奏言查巴里坤地最緊要現在兵民雜處明年又派撥滿洲兵丁駐劄請設立理事同知一員專管旗民事務照各省邊缺例三年俸滿送部引見以應升之缺照例升遷並請於通省人員內揀選題補奏入上從之辛卯密諭駐劄巴里坤辦事大臣雅爾哈善等拏解巴雅爾上諭軍機大臣曰據雅爾哈善等奏稱巴雅爾遣伊護衛德爾登報稱沙克都爾曼濟屬人搶掠伊等所屬馬匹牲隻又伊克商人等亦有將伊屬人戕殺之事因其所報情形未確令其詳查再行辦理等語雅爾哈善等所辦甚是巴雅爾搶掠扎哈沁遊牧經噶爾藏多爾濟等報知副將軍兆惠已派和起前往擒拏此時和起等如已將巴雅爾拏送巴里坤軍營即委員押解來京倘尚未拏獲而巴雅爾自知其罪希圖巧為掩飾或親至巴里坤申訴伊屬人被劫之事著雅爾哈善等明白曉諭伊等皆係受恩封汗之人部內互相戕害事關重大必須來京面為陳奏自蒙鑒察伊如聽從即委員解送來京或推托不行亦即將伊拏解前來毋令兔脫癸巳諭定邊左副將軍成衮扎布停遣喀爾喀兵丁上諭軍機大臣曰成袞扎布奏稱大兵往擒青滚雜卜暫令駐劄呼雅克圖地方俟調遣喀爾喀兵丁到日即行前進等語現在逆賊情形毋庸多調兵丁往𠞰且哈達哈等大兵撤回不日可以會合其喀爾喀兵丁著停止調遣第將伊等馬匹解赴軍營以供大兵乘騎方為合宜再烏梁海等既未經遣兵助賊且深感朕恩願派兵二千名豫備調遣宰桑哈克圖圖布慎等甚屬可嘉著賞給縀匹以示鼓勵所有烏梁海兵丁亦毋庸調遣俱令在各遊牧加意防守逆賊青滚雜卜屢次遣人煽惑烏梁海俟拏獲後並將屢次遣往之人一併擒拏治罪命革巴蘭泰副都統職銜上諭軍機大臣曰前令巴蘭泰赴策凌等遊牧傳諭自應輕騎速往乃攜帶多人自為擁護實屬怯懦著革去副都統職銜加恩授為理藩院郎中以觀後效前命策凌等派兵𠞰滅烏梁海今烏梁海已經辦竣即著巴蘭泰傳諭策凌等毋庸派兵前往十一月乙未定邊左副將軍成衮扎布疏奏遣多爾濟策登回遊牧事宜成衮扎布等奏言據哈達哈咨稱現在擒拏青滚雜卜先遣多爾濟策登馳驛前赴軍營其可否遣回遊牧之處聽臣等酌議臣等查多爾濟策登之弟及妻子所屬人等現與逆賊同居一處并有訛言多爾濟策登已經正法者今聞皇上格外施恩仍封公爵其所屬人等自必倍加感激應令伊速回遊牧曉示利害如能擒獻逆賊奏請加恩倘敢黨同青滚雜卜仍俟進兵時一併拏解治罪奏入報聞丙申命奬賞軍前效力之順庫爾察克等上諭軍機大臣曰哈達哈等奏稱達瓦藏布宰桑班珠爾屬人順庫爾察克厄魯特台吉吹喇錫屬人賽音察克賓巴等進兵哈薩克時派為嚮導行走奮勉等語順庫爾察克等俱著賞給銀兩并其妻子等送往察哈爾居住庚子定邊右副將軍兆惠等疏奏拏解策楞等赴京日期兆惠等奏言十月十六日據定西將軍達爾黨阿派員解策楞抵臣軍營臣隨派護軍校伊三泰等於十七日起程由巴里坤赴京再副都統哈寧阿現在領兵將抵軍營玉保與哈寧阿同行俟其到日亦即拏解赴京其副將軍扎拉豐阿亦於十月十六日抵臣軍營臣即傳旨授為公爵於十九日令其起程赴京奏入報聞辛丑副都統唐喀祿疏奏赴科卜多辦理情形唐喀祿奏言臣遵旨於十月二十日赴科卜多承辦軍務查所存滿洲察哈爾巴爾虎緑旗兵丁共一百八名馬七百餘匹駝六百餘隻米三百餘石羊一千四百餘隻臣現在妥協豫備俟郡王策布登扎布參贊大臣哈達哈等領兵經過將牲隻口糧照數支給至科卜多地近卡倫所餘兵丁一百餘名不敷差遣請於撤回及臺站兵丁內酌量存留二百名奏入報聞壬寅參贊大臣哈達哈等疏奏領兵協擒青滚雜卜情形哈達哈等奏言臣奉命隨同副將軍成衮扎布擒拏青滚雜卜今撤兵至額爾齊斯地方復經成衮扎布調策布登扎布至克木克木齊克地方會同舒明堵截逆賊臣隨派索倫喀爾喀兵七百名交策布登扎布前往餘兵五百名臣即帶領赴將軍成衮扎布處聽候調遣再此次撤回喀爾喀王公扎薩克內派貝勒那木扎爾車蘇隆公策登薩木丕勒同副都統扎爾杭阿鄂博什管轄後隊兵丁前來其親王巴扎爾什第貝勒沙克都爾扎卜貝子達爾扎三達克多爾濟公恭格敦丹三都卜多爾濟扎薩克根敦等俱請同往擒賊以圖報效臣現帶領同行奏入報聞恩賞達什達瓦屬人口糧上諭軍機大臣曰達什達瓦所屬人等自巴里坤移駐鄂爾昆時屆天寒生計不免稍窘著加恩賞給口糧三個月以示體恤現據富森奏請派章京筆帖式等協同照看達什達瓦屬人遊牧事務著派筆帖式一員領催一名馳驛前往癸卯諭和碩特汗沙克都爾曼濟嚴禁屬人搶奪事宜上諭軍機大臣曰據雅爾哈善等奏稱沙克都爾曼濟拏解偷竊馬匹厄魯特特穆爾得默爾等至巴里坤請旨即行正法等語厄魯特等搶奪成風不可不嚴加懲創特穆爾得默爾等即照所請正法並著傳諭沙克都爾曼濟伊拏獲所屬竊盜人等原可自行辦理今解送巴里坤請旨辦理甚屬恭順伊屬人衆多必須嚴行禁止嗣後如有此等搶奪為匪之人聽伊自行查辦毋庸解送巴里坤命遣厄魯特都爾圖等赴瓜州駐防駐劄巴里坤辦事大臣雅爾哈善等奏言十月初十日鄂什喜卡倫送到厄魯特都爾圖等三十二户一百二十五人詢知係達什達瓦屬人二十日送到厄魯特畢克等四十二户一百五十人詢知係達瓦齊屬人現俱遵旨暫留巴里坤酌給口糧過冬俟明年春間再行遣往奏入上諭軍機大臣曰前經降旨令雅爾哈善派厄魯特兵一千名駐防瓜州此次厄魯特都爾圖畢克等著暫留巴里坤俟明年春間派入駐防瓜州兵內遣往丙午諭副都統濟福等查辦車臣汗部落匪竊賊人事宜上諭軍機大臣曰據濟福等奏稱查辦車臣汗部落匪竊賊人因瑪尼巴達喇現在患病未及會辦其齊木齊格特人等亦暫行慰諭緩籌辦理等語瑪尼巴達喇尚屬年幼不諳事務今既患病毋庸會同辦理伊部落內屬人滋事皆因德木楚克久在軍營未獲經理所致今已撤兵回至遊牧著濟福等會同德木楚克妥協查辦至齊木齊格特遊牧地方與呼倫貝爾鄰近著密諭伊柱豫備兵丁聽候調遣俟擒獲青滚雜卜後伊柱即領兵將齊木齊格特人等辦理此時毋得泄漏丁未諭定邊左副將軍成衮扎布等籌議防範阿逆事宜上諭軍機大臣曰阿逆姦狡性成現在尚未擒獲所有一切緊要卡倫俱應設兵豫備近據順德訥奏稱阿布賚將伊女與阿逆為妻並查出伊部落內所獲厄魯特人等交與管轄等語是阿逆當此計窮力竭猶復煽惑哈薩克斷不肯安靜無事必須預為防範使逆賊無所逞其姦宄成衮扎布既深悉喀爾喀烏梁海情形哈達哈又經深入哈薩克一切地方形勢自應瞭然或應於額爾齊斯等處派兵二三千名防守或更有緊要地方設卡防範偶有騷動以逸待勞方為妥協如應先遣兵丁乘其不備奮力擒𠞰亦即相機辦理著成衮扎布哈達哈會同軍營大臣等悉心籌畫以副委任諭定邊左副將軍成衮扎布等安插新降人等上諭軍機大臣曰據成衮扎布等奏稱新來歸降明噶特特楞古特綽羅斯等共四百户酌量賞給口糧即令前往原遊牧再輝特台吉噶爾丹達爾扎屬人前已給過口糧兩個月其續到户口請一併給與口糧等語此等新降之人前曾令其各回原處地方昨經兆惠奏請暫行安插是以復降旨雅爾哈善等今將新赴巴里坤人等暫給口糧過冬俟明年再為籌辦今此項明噶特特楞古特綽羅斯等應一體辦理著即賞給口糧令於現在所住地方過冬其明歲如何遣回并令何人兼管之處會同哈達哈等詳議具奏但特楞古特竒爾吉斯人等若係古爾班和卓屬人即不應加恩俱著照阿逆屬人之例賞給喀爾喀等為奴並著哈達哈查明辦理再嗣後有似此投誠人等其在十户以內者送至察哈爾安插三十户以內留烏里雅蘇台等處給豫口糧令其當差若至三十户以上人數衆多酌量在科卜多布延圖等處居住接濟口糧仍遣回各原遊牧成衮扎布等即遵照分别辦理至噶爾丹達爾扎人等前次雖俱經賞給口糧現在未能充裕著將新到户口及從前已經賞給口糧人等一體加恩再給口糧兩個月以示體恤命調撥馬匹赴巴里坤軍營上諭軍機大臣曰現在巴里坤馬匹雖已敷用但尚須多為預備且伊犁或尚有需用馬匹之處前降旨方觀承購馬五千匹今已收槽餵養著將直𨽻購買馬匹解往西安西安馬匹調往甘肅甘肅馬匹調往巴里坤逐次更换調撥可免長途疲瘦之虞而巴里坤得此馬匹尤覺應用裕如現又據黃廷桂奏稱接四川總督開泰咨稱川省可撥馬一千匹解甘備用等語並著傳諭開泰即於川省營驛馬內揀選一千匹就近委員解交黃廷桂驗收以備來春調遣命移扎木參遊牧於哲爾格西喇呼魯蘇地方上諭軍機大臣曰據哈達哈等奏扎木參懇將伊屬人等移住卡倫內遊牧等語即照所請準其在哲爾格西喇呼魯蘇遊牧扎哈沁人等既與喀爾喀連界居住著即令其在附近卡倫照喀爾喀等設卡防守則伊等既得效力差委支領錢糧以資養贍其喀爾喀兵丁亦可量行裁減著成衮扎布等妥協辦理定邊左副將軍成衮扎布等疏奏台吉諾爾布等請移遊牧地方成衮扎布等奏言據二等台吉諾爾布呈稱我同貝勒策登扎卜由遊牧布延圖布拉克遷至布克隨地方策登扎卜為青滚雜卜擒獲復遣協理台吉班珠爾向遊牧人衆煽誘叛逃我等世受國恩不肯附從今同協理台吉固穆扎卜阿喇卜坦二等台吉拉旺三等台吉布精旺兌楚魯木等各率屬衆俱遷至博羅哈卜齊爾地方俟厄魯特達什達瓦人等遷移之後請往察罕扎輝等處居住并請以所帶馬駝供應呼濟爾圖阿魯托卜蔡各臺站等語臣等即照所請辦理俟擒獲青滚雜卜後奏請加恩奏入報聞平定準噶爾方略正編卷三十三
