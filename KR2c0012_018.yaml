body:
  text: 雍正六年冬十一月甲子申定預備軍需尅扣之禁有㕘員短發累民者准先行動帑給之上諭兵部曰向來預備軍需如採買騾馬製辦物件之類不肖有司往往虛耗國帑派累民間種種弊端朕知之甚悉已降㫖屢行申飭禁止而此風尚未全改朕愛養斯民不使絲毫擾累凡軍務所需悉動帑金照時價購辦又恐承辦官員預留將來核減之地稍借民力以助公事特令岳鍾琪等核定折中價值倘時價可減即為節省或定價不敷據實奏加此皆體恤官員撫綏黎庶之至意也倘嗣後承辦各員再有尅扣短發侵蝕等弊其罪誠不可逭若㕘革之後必俟審擬定案方行著追則百姓守候補領之價必致累月經年而不能得深可軫念嗣後一經題㕘摘印即照數核明尅扣之價先動軍需銀兩傳集百姓如數找給仍將該員於本境枷號勒限追完如逾限不完嚴加治罪庶貪墨之人知所儆懼而軍需有益民無擾累矣己巳辦理藏務吏部尚書查郎阿疏奏西藏善後事宜查郎阿等遵㫖覆奏言進藏兵丁陜西八千人除穆魯烏蘓之東蒿沁察罕哈逹留兵二千坐站兵千八十人現至藏者四千九百二十四川四千人除黎烏蘇留兵二千坐站兵五百現至藏者一千五百雲南三千人二千留魯隆宗一千留察木多臣等謹遵㫖選陜西兵一千名四川兵一千名𨽻駐劄西藏大臣邁禄周瑛等並酌留二省遊擊以下率領駐劄以備調遣藏事方定逹賴喇嘛移居里塘於二十三日自藏啟行所撤兵丁分五隊副將惠延祖率寧夏兵一千五十名為第一隊臣查郎阿馬拉率西安滿洲兵四百名固原兵五百名四川兵一百名逹賴喇嘛即在臣隊中令副將楊大力率四川兵四百名防䕶前行為第二隊㕘將王有循率督標兵四百九十名凉州兵二百三十名為第三隊守備戴義雄潘世喜率固原兵七百五十名為第四隊總兵官周開㨗率西寧兵八百名為第五隊其雲南總兵官南天祥原領兵一千名仍暫令駐劄察木多以便應援奉入報聞十二月辛巳振武將軍宗室公巴賽疏報鄂爾昆濟爾瑪台圖拉等處屯田收穫青稞麥􅐘凡二千八百四十石有奇奏入得㫖下部知之丁亥命頗羅鼐暫管前藏事務吏部尚書查郎阿等奏言頗羅鼐為唐古忒衆所信服已遵㫖令其管理後藏直至岡底斯阿里等處其前藏事務舊設噶卜倫管理據頗羅鼐薦二人一名色朱特塞卜騰一名䇿凌旺扎爾臣訪察二人並大臣之子誠實可用但招地初定新授二噶卜倫管理諸事恐衆情未能允協今頗羅鼐既為衆所素服而前藏後藏相距不逺臣等請暫令頗羅鼐兼管前藏事務俟逹賴喇嘛移居既定招地兵撤後仍令頗羅鼐專管後藏議政王大臣等議覆悉如所請奏入上從之壬辰命四川重慶總兵官任國榮暫駐里塘上諭兵部曰逹賴喇嘛自藏起程明年二月初可至里塘此地原有喇嘛寺院可以居住著四川重慶總兵官任國榮帶領進藏兵丁二千名前赴里塘暫駐防䕶弁兵等天寒路逺効力勤勞應加賞賚以示軫念逹賴喇嘛初至里塘其應支供給預為辦理重慶總兵印務著岳鍾琪委員署理丁酉命封頗羅鼐為貝子上諭内閣曰從前西藏用兵之時頗羅鼐甚為効力䝉聖祖仁皇帝授為扎薩克台吉上年西藏噶卜倫等因嫉妬爭權彼此不睦阿爾布巴隆布鼐扎爾鼐暗結匪類公然肆惡將朝廷敕封貝子總理事務之康濟鼐擅行殺害併欲害及頗羅鼐頗羅鼐受其逼迫領兵為康濟鼐復讐將逆黨罪狀奏聞是以朕特遣大臣等領兵前往究問情由以便分别治罪頗羅鼐聞大兵將至率衆奮勇前驅直抵藏地阿爾布巴等力屈勢窮被各寺喇嘛等拘執獻出欽差大臣到彼一一究問盡得其悖逆妄亂之情已將阿爾布巴等及逆黨正法西藏殱此渠魁黄教可興番衆可輯頗羅鼐深知大義討逆鋤姦俾無辜受害者得雪沈寃背㫖肆行者早正刑辟甚屬可嘉著封為貝子以奬義勇以昭國憲戊戌命駐防哈宻官兵嵗於五月往代上諭兵部曰哈宻駐防官兵每年輪換定期於十二月内派往朕思臘月天寒草枯水凍官兵䟦涉為難查從前甘肅官兵駐防哈宻有五月内更換之例今乃著於五月内派往雍正七年春二月戊寅命吏部尚書查郎阿協辦陜西軍需事務癸巳定議進勦噶爾丹䇿零上諭諸王内閣九卿八旗大臣等曰準噶爾一部落原係元朝之臣僕其始祖曰額森額森之子托琿漸至大員因擾亂元之宗族離閒蒙古恐獲重罪遂背負元朝之恩逃匿於西北邊逺之處元末又煽誘匪類結成黨與遂自稱準噶爾肆行刼擄迨至我朝有噶爾丹䇿妄阿喇布坦二人世濟其惡擾害生靈滅棄釋教造孽多端不可枚舉當我朝定鼎之初各處蒙古傾心歸順共輸誠悃請安納貢求為屬國安享太平樂利之福八十餘年惟準噶爾一部落遁居西北五千里之外擾亂離間衆蒙古肆行刼奪噶爾丹身為喇嘛不守清窺不遵佛教破戒還俗娶青海鄂齊爾圖車臣汗之女為妻後又潛往青海賊害伊之妻父鄂齊爾圖車臣汗擄其屬下人衆續因喀爾喀七旗内彼此稍有嫌隙奏懇聖祖仁皇帝為之和解因遣大臣同逹賴喇嘛使者前往噶爾丹遣人暗探消息遂以喀爾喀等卑視逹賴喇嘛使人為辭遣伊族内㣲末台吉多爾濟扎卜將喀爾喀汗台吉等肆行凌辱喀爾喀汗等怒彼狂悖無禮㑹衆將彼殺害噶爾丹遂稱殺害伊弟多爾濟扎卜與喀爾喀搆隙掩其不備發兵猝擊喀爾喀衆潰紛紛來投聖祖仁皇帝深為軫念施恩育養遣使往噶爾丹處諭以兵為凶器令其與喀爾喀和好多方開導詎噶爾丹㝠頑不靈借追襲喀爾喀之名入犯邊汛彼時即行勦滅復有何難我聖祖仁皇帝好生為德遣使責問噶爾丹惶愧恐懼設誓撤兵乃並不歸伊住牧之所仍潛居克爾倫圖拉地方暗行窺伺聖祖仁皇帝復遣使降㫖諭以應回原住牧地方噶爾丹佯稱遵奉諭㫖仍乗隙潛掠沿邊蒙古之畜牧衆蒙古不獲安居我皇考遂上告天地親統大兵聲罪致討葛爾丹輒敢逆天與我西路大兵接戰伊軍大敗妻子被擒噶爾丹窘迫自殺彼時大兵即應直搗巢穴收其部落我聖祖仁皇帝恐天下後世有窮兵黷武之議因而中止䇿妄阿喇布坦者噶爾丹之姪也與伊叔噶爾丹不相和睦帶領七人潛逃至吐魯番地方居住聖祖仁皇帝以䇿妄阿喇布坦向與伊叔不睦懼其誅害遁跡逃生加以恩澤伊當感戴歸誠且聖心仁慈不忍遣兵將噶爾丹餘剰部落悉行勦滅恩加格外遣使賞給䇿妄阿喇布坦彼時䇿妄阿喇布坦力弱勢微甚為恭順其後離間伊之妻父土爾扈特之阿玉竒汗與其子三濟扎卜誘三濟扎卜攜帶萬餘戸至伊住牧之處因而强佔入已從此遂不安分肆意妄行窺伺青海擾害生靈率領賊兵前進被哈宻駐防輕兵擊敗遁回䇿妄阿喇布坦又假黄教為名潛兵入藏無故殺伊妻弟拉藏汗毁壞寺廟殺害喇嘛搶掠供器是以特遣大臣前往詢問乃伊愍不畏死阻兵抗命使臣率師甚少兵力單弱伊得以愈肆猖狂聖祖仁皇帝仍賜包容諭令邊外兩路大兵緩進屢次遣使示以聖意謂䇿妄阿喇布坦果其悔過懇恩具奏其時另降諭㫖若仍怙惡不悛然後將此部落人衆悉行勦滅此我聖祖仁皇帝之本意也朕紹登大寳䇿妄阿喇布坦雖遣使求和朕知非伊本懐諭伊來使云爾歸告知爾台吉朕纘承我皇考大統爾台吉若欲受我皇考天恩須盡改前非遵朕諭㫖定界安居若欲犯我皇考天威任爾備兵前來定當加以天討如此降㫖分晰利害遣使前去又恐䇿妄阿喇布坦心懐疑貳將兩路大兵盡行撤回乃伊因此愈生驕傲於定界一事妄欲侵佔界地朕又向伊來使降㫖云爾告知䇿妄阿喇布坦定界一事實於伊身有益如遵奉諭㫖即遣使具奏若不遵諭㫖亦必遣使前來乃伊並不回奏此際䇿妄阿喇布坦身故伊之長子噶爾丹䇿零遣使前來奏聞伊父身故之事稱伊父已經成佛又稱欲使衆生樂業黄教振興等語噶爾丹䇿零不過邊逺部落一微末台吉耳使衆生樂業黄教振興豈伊應出之語耶况伊果欲求和應代伊父謝罪懇恩送回青海叛送潛逃之羅卜藏丹津以贖前愆乃並不輸誠向化敢以如許妄誕之詞見之陳奏此特欲倣傚伊父之故轍耳聞噶爾丹䇿零甚屬凶暴且西藏阿爾布巴隆布鼐扎爾鼐等濟惡同謀將實心為國効力之貝子康濟鼐殺害此等叛逆罪狀皆因準噶爾與伊處相近而逃去之羅卜藏丹津原係伊等姻戚彼此相依是以敢於悖逆迨其窘迫倉猝之時則必投奔準噶爾亦屬顯然因頗羅鼐奮勇直前截其去路阿爾布巴等未得前進即被擒獲準噶爾性好搶掠若留在衆䝉古遊牧地方將來必受其害今朕已將來使遣回若伊諸事俱遵㫖陳奏臨時朕另行裁奪降㫖倘仍前推諉矜張肆恣負朕屢次遣使開導指示之仁恩抗玩不恭將來噶爾丹䇿零斷非安分守法之人必至生事妄為况西北兩路大兵盡已撤回此際伊等如或生事則我朝如許安享太平之喀爾喀等及辦理安挿妥貼之青海西藏必至被其擾害甚屬可慮且事乃聖祖皇考注意未完之事仰賴上天眷佑聖祖皇考福澤國帑充裕官員弁兵同心奮勇願為國家効力實係可以舉行之㑹若遲疑不决定貽後悔夫用兵者國家不得已之事也窮兵黷武為聖帝明王之所深戒而以大加小以强陵弱又仁人君子之所恥而不為者况準噶爾彈丸之地又在極北之區得其土不足以耕耘得其民不足以驅使即使滅此朝食亦不足以誇耀武功此皆朕所熟思而詳審者也但留此餘孽不行剪除實為衆䝉古之巨害且恐為國家之隠憂今天時人事機縁輻輳時不可遲機不可緩天與不取古訓昭然且我聖祖皇考為此籌畫多年未竟其事兹當可為之時朕不敢推諉亦不忍推諉此朕一人之見也用兵大事所闗甚重不可輕率著諸王議政大臣九卿八旗大臣各抒己見公同詳確宻議具奏尋議曰準噶爾部落自噶爾丹逞凶悖逆及䇿妄阿喇布坦復肆驕悍並伏㝠誅今噶爾丹䇿零踵惡不悛若留此餘孽則喀爾喀青海西藏等處必被擾亂伏乞皇上命將興師大彰天討以永除䝉古部人之害奏入得㫖諸王滿漢文武大臣等衆議僉同一切應行事宜著即辦理三月庚戌命副都統銜察哈爾總管馬爾薩赴軍前上諭王大臣等曰䕶軍統領塔拉圖朕聞在軍前毎日醉飲大負委任著革職來京其員缺令副都統銜察哈爾總管馬爾薩前去壬子命川陜總督岳鍾琪補給駐防哈宻甘肅提標兵厯年應領鹽菜行糧銀五萬二千八百兩丙辰命領侍衛内大臣三等公傅爾丹為靖邊大將軍北路出師川陜總督三等公岳鍾琪為寧逺大將軍西路出師討準噶爾噶爾丹䇿零辛酉定議北路出兵事宜議政王大臣等遵㫖議奏曰北路出征事宜一統兵將士應請撥定京城八旗兵六千名自總統將軍外應遣副將軍㕘贊大臣前鋒統領及營總㕘領侍衛章京前鋒校䕶軍校驍騎校等率之車騎營兵九千名應撥總兵官副將㕘將遊擊守備千總把總等率之其押運糧餉大臣隨印學士及中書司官筆帖式等並請命往奉天吉林察哈爾索倫土黙特右衛寧夏七處兵八千名應撥統領及管轄者往喀喇沁土黙特兵八百名應撥塔布囊等率之一官兵啟行分路定期北路官兵逺駐阿爾台今京城八旗兵於五六月間分五路進出口後與察哈爾土黙特兵同行車騎營兵分六路進與奉天吉林索倫右衛寧夏兵並六月啟行至駐劄處與大兵合一北路出兵計總統將軍一員副將軍一員叅贊大臣六員前鋒統領一員副都統十員總兵官二員營總二十四員㕘領副㕘領共四十一員雲麾使一員副將四員章京一百三十六員中書二員司官十三員侍衛十二員㕘將遊擊共八員前鋒校十七員䕶軍校一百八十一員驍騎校一百二十九員筆帖式四十三員守備十六員千總把總共九十六員統計官七百五十三員除奉㫖賞賚外凡馬駝器械及跟隨口糧鹽菜銀並與兵丁糧餉遵㫖寛裕支給奏入得㫖振武將軍公巴賽著為副將軍振武將軍印務著順承郡王錫保管理鑲黄旗滿洲都統侯陳泰右翼前鋒統領衮泰鑲白旗漢軍都統石禮哈正白旗滿洲副都統戴豪散秩大臣公逹福正藍旗滿洲副都統覺羅海蘭俱為㕘贊大臣原任右翼前鋒統領丁夀以都統銜為軍營前鋒統領直隸正定總兵官魏麟河南河北總兵官閃文繡統領車騎營兵奉天副都統納秦統領奉天兵白都納副都統塔爾岱副都統銜西彌賴統領索倫兵白都納副都統費雅思哈統領寧古塔兵右衛副都統阿三統領右衛兵寧夏副都統蘇圖統領寧夏兵鑲藍旗䝉古副都統承保鑲白旗滿洲副都統常禄統領察哈爾兵歸化城副都統馬爾齊衮布統領土黙特兵塔布囊丹巴沙津逹賴等統領喀喇沁土黙特兵糧餉事務派法敏伊都立巴泰西琳傅德等管理盛京禮部侍郎永國兼内閣學士銜隨靖邊大將軍印前往北路軍營其辦理各疑俱詳細妥協悉依議行乙丑命以兵丁借支出口銀為恩賞川陜總督岳鍾琪疏言河州營兵出口巡緝時值隆冬借給整裝銀五千二百兩今事訖應於應領餉中扣還奏入得㫖兵丁借支出口銀兩著即作為恩賞免其扣還庚午議開長安縣子午谷及増設各隘口官兵川陜總督岳鍾琪疏言秦省自南山通蜀道有長安之子午谷盩厔之黒水谷郿之斜谷三谷中黒水與斜谷極險僻難開惟子午谷在漢唐時為通運大道後漸荒廢若更鑿此路令坦夷由西安徑抵漢江纔五百餘里最便似宜設兵防守以便行人請於子午谷中秦嶺南五郎闗設守備一員千總二員駐兵二百五十名秦嶺北闗神里亦屬隘口請即五郎闗所設營中撥千總一員兵五十名分駐其地其黒水谷中栁葉河應増設把總一員兵五十名再移鳳翔城守營兵駐郿縣專守斜谷兼防桃川虢川等處虢川應增設巡檢千總各一員兵一百名戸部遵㫖議覆並應如所請奏入上從之夏四月丙子命選西安滿洲兵暫駐凉州及增太原城守兵上諭内閣曰川陜總督岳鍾琪統領大兵出口進勦之後甘凉一帶營汛緑旗兵力稍單著於西安滿洲駐防兵丁内挑選一千名暫行移駐凉州著都統蘇丹西安副都統尼瑪善統領此挑選兵丁可先期預備候朕再降諭㫖凉州原有兵房二千餘間著甘肅巡撫量加修理以備移駐兵丁居住山西太原府雖舊有城守滿兵今再從京城派兵五百名至彼一同居住彈壓此所派兵丁著都統鄂善統領前往駐劄丁丑命岳鍾琪定議陜西甘肅兵丁補給倒斃馬匹上諭内閣曰官兵馬匹其有倒斃免賠樁銀者各省不同從前補以中茶馬匹及後則給以朋銀採買此諸省通行之例惟有陜甘各營因停止招中茶馬之時未將動支朋銀聲明相沿至今凡有倒斃馬匹俱係兵丁出資買補深可軫念著總督岳鍾琪詳悉查明將嗣後作何准報補給之處分晰定議具奏甲午命兩路出征致祭所過名山大川上諭曰兩路大將軍統領大兵進勦準噶爾凡所經過名山大川理應致祭著撰擬祭文書寫數十道敬謹用寳付兩路大將軍帶往遇有應祭山川臨時填寫神號䖍恭致祭其所用香帛等項著該部察例辦理丁酉寧逺大將軍川陜總督岳鍾琪奏西路出征事宜岳鍾琪疏言西路出師文武各官及馬兵步兵等當有定額一切軍需可以核計今臣議定總統官兵大臣一員分領官兵提督一員總兵官四員副將十員㕘將遊擊共二十員守備四十員千總八十員把總一百二十員其管理駐防臺站撥副將遊擊各二員守備四員千總把總共八員至經理糧餉事務議撥道一員知府一員同知通判知州知縣共十員佐雜二十員凡文武大小各官三百二十四員馬兵步兵二萬六千五百名一切馬駝器械跟役口糧鹽菜銀兩等及兵丁糧餉分别支給臣陸續核明造冊報銷奏入報聞壬寅上以出師征準噶爾丹䇿零躬詣太廟告祭祝文曰恭惟我列祖聖德神功涵盖宇宙莫不尊親獨厄魯特䇿妄阿喇布坦世濟兇頑自其叔噶爾丹悖肆猖狂我皇考聖祖仁皇帝親率大軍剪除元惡以䇿妄阿喇布坦素未同逆遺餘部落聽其收撫恩澤至渥乃不思銜感漸恣鴟張殘破拉藏荼毒生靈皇考應時戡定猶未忍即加勦戮宣諭再三冀其知悔臣紹位以來復申諭㫖伊雖遣使乞和乃敢容留逋叛挾詐怙惡旋服㝠誅其子噶爾丹䇿零雖亦遣使詣闕而心志詭譎言詞妄誕揆其奸狀若不迅行撲滅將來必為䝉古之巨害貽中國之隠憂臣夙夜思維兹乃我皇考計慮多年經營未竟之緒繼先志以行師事非得已順天心而致討機不容遲廷議僉諧戎行齊奮是用簡帥臣而授鉞占良日而禡牙仰憑列祖功德崇隆聲靈赫濯旌旗所向立靖氛塵鐃鼓還歸早聞凱奏永綏藩圉萬邦戴丕昌之天惠保邊黎九服遵蕩平之路謹告癸卯上御太和殿命大學士以寧逺大將軍印並敕書一道令正使兵部尚書查弼納副使内大臣公倫布齎赴西安授川陜總督公岳鍾琪命以理藩院侍郎顧魯兼内閣學士銜隨印前往敕諭曰奉天伐罪治世之常經鋤暴除兇安邊之逺略况醜逆隂謀詭譎斯王章顯用征誅機不容遲法無可貸厄魯特䇿妄阿喇布坦乃噶爾丹之逆族也昔我聖祖仁皇帝時噶爾丹干犯天討立時殄滅本應直搗巢穴俾無孑遺䝉聖祖仁皇帝如天之仁念䇿妄阿喇布坦向與伊叔齟齬情在可原特沛鴻恩賞其部落撫綏周至再予生全是時伊力弱勢微小心恭順其後乃誘奪伊妻父之部曲萬餘戸輒敢驕肆妄行竟欲直驅青海擾其人衆又詭計發兵進藏荼毒生靈我聖祖仁皇帝雖發兵致討仍賜包容遣使宣諭再三冀其改悔而伊怙惡不悛㝠頑如故及朕紹承大寳伊雖遣使求和而中懐詐偽以背恩大逆之羅卜藏丹津負罪潛逃伊輒敢容留抗違國法中外之人莫不忿恨朕本欲於數年間命將興師向伊詢問不意䇿妄阿喇布坦遂服㝠誅其子噶爾丹䇿零繼立狡獪狂誕同於其父昨遣人陳奏之際言詞傲慢心志姦邪似此逆賊渠魁父子濟惡若不及時剪滅實為衆䝉古之巨害且恐將來貽國家之隠憂用是特發兩路大兵聲罪致討爰命爾為寧逺大將軍統領陜西等處大兵一切事宜爾與提督紀成斌酌定方略公同計議而行勿謂已能而不納衆論勿當事㑹而致失機宜勿恃兵强而輕視賊宼宻偵逺探備極周詳各路大兵及䝉古兵丁聴爾調遣凡遇有警即遣發官兵應援撲勦有能擒斬噶爾丹䇿零來歸者即行馳奏加恩優賞有情急來歸者加意撫恤其不抗拒官兵者勿加殺戮兵將所過地方須申嚴紀律毋得騷擾百姓毋得滛人婦女毋得離散人之父子夫婦毋得損壊人之墳墓室廬毋得强取貨物毋得驅役平民以副朕戡亂靖逆安民綏衆之意其或有臨戰退縮貽悞擾亂軍機者爾㑹同商議文官四品以下武官三品以下即以軍法示衆官兵有犯小過者㑹同商議徑行處治毋冺没戎行之勞績毋寛縱違法之弁兵法紀務極嚴明賞罸悉期公當一切機宜爾商酌調遣有應知㑹北路靖邊大將軍者即行知㑹一同辦理將噶爾丹䇿零速行殱勦永靖邊陲斯稱委任爾等務宜殫心用力早奏膚功欽哉故敕命肅州總兵官曹勷仍率兵出口湖廣巡撫馬㑹伯往肅州辦理軍需帶管肅州總兵官印務寧逺大將軍川陜總督岳鍾琪遵㫖議奏肅州地屬𦂳要鎮臣樊廷率兵出口其肅州鎮印務請令興漢鎮臣曹勷署理曹勷亦奉㫖領兵者今既留肅鎮臣見川北鎮臣張成隆老成練逹曉暢軍戎現今赴京陛見迄令速回陜西率兵出口以足鎮臣四人之數奏入得㫖朕思軍務闗係重大曹勷明白精壯乃實心効力之員應仍令領兵出口岳鍾琪既稱張成隆老成練逹曉暢軍戎朕觀其人尚壯健或可勝領兵之任著於原派總兵四員之外增添一員即將張成隆派出令其星速馳驛赴陜著大將軍岳鍾琪酌量委用至於肅州辦理軍需更闗𦂳要署督查郎阿相隔路逺巡撫許容又屬新任著湖北巡撫馬㑹伯前往肅州辦理軍需一切與督撫等公同計議而行即帶管肅州總兵印務甚為妥便其湖北巡撫印務著四川布政使趙宏恩前往署理四川布政使印務著四川按察使吕耀曽署理四川按察使印務著四川鹽驛道尤清署理甲辰命以振威揚武二將軍印送寧逺大將軍岳鍾琪軍前上諭兵部曰振威將軍揚武將軍印二顆送往西安交與大將軍岳鍾琪軍前有應用之處酌量委用平定準噶爾方略前編卷十八
