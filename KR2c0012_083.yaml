  text: 欽定四庫全書平定準噶爾方略正編卷二十九
  hash: sha256:637a8d1c867a2b353e78ad2501f1ff4085b543a3e682bb7d7682a5d18e9100b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_083-1a, image: WYG0358/WYG0358-0484a.png}
body:
  text: 乾隆二十一年夏六月丁未㕘贊大臣富德疏奏擒獲逆黨恩克巴雅爾等及進兵哈薩克情形富德奏言據驍騎校畢齊罕口等擒獲阿逆所屬台吉恩克巴雅爾等四十餘人查恩克巴雅爾等係從前投誠之人附和阿逆逃往哈薩克地方今計窮力竭復來歸附情罪可惡已將巴桑等四人正法其恩克巴雅爾明噶特俄羅斯等解赴北路軍營以備審訊再臣奉到諭㫖令回京面聆訓誨今既知阿逆逃往哈薩克確信而兩路軍營一時並進臣現在領兵至塔爾巴噶台容臣㑹同兩路軍營大臣前進俟擒獲逆賊後遵㫖赴京奏入上諭軍機大臣曰前曽降㫖令富德來京今據奏到擒獲逆黨恩克巴雅爾等知阿逆竄入哈薩克確信請仍帶兵前進等語富德奮勇可嘉著加恩補授正黄旗䝉古都統以示奬勵現在西北兩路將軍等領兵前往哈薩克富德就近迎往無論遇見何路即一同前進如更有捷徑可至哈薩克即著富德率領達什策凌等徑行前往或先遣竒徹布赴阿布賚處曉諭令其擒獻阿逆至伊等所帶兵丁不多不必更分前後兩隊從前西路哈薩克錫喇等奏請帶領厄魯特兵丁朕已停其派往止令哈薩克錫喇屬人數百名隨行今達什策凌既請率其所屬兵丁著准其帶往其西路未經派出厄魯特兵丁之處併諭達什策凌知之厄魯特等生性貪婪進兵時不免肆行搶掠富徳務留心防範如敢有違即行正法以示懲戒命賞給噶爾丹達爾扎等屬人口糧上諭軍機大臣曰據普慶等奏台吉噶爾丹達爾扎普爾普策凌等初從準噶爾回至游牧生計稍艱等語噶爾丹達爾扎等所屬户口著加恩賞給口糧兩月以示體䘏其普爾普策凌户口請編為旗分佐領歸入旺親扎卜旗内事宜著普慶舒明等妥協辦理命免治包沁逃人托郭斯等罪上諭軍機大臣曰據舒明等奏上年𠞰滅包沁時逃人托果斯及子特穆爾等現俱投來請㫖正法等語此等逃人理應治罪但現在畏罪來投尚可寛宥著免其正法賞給喀爾喀等為奴戊申諭定邊左副將軍哈達哈等辦理烏梁海事宜上諭軍機大臣曰昨哈達哈等奏請速赴哈薩克其烏梁海脫逃之人未及追趕辦理尚知緩急已降㫖准行第恐伊等接奉此㫖遂將烏梁海事竟置不辦亦未可定著傳諭哈達哈等俟擒獲阿逆後仍將隠匿及逃亡之烏梁海等盡行查辦其餘應行安撫及每歳作何輸納貢賦事宜并著妥協辦理己酉命授達瓦固英哈什哈等為特楞古特宰桑原任定西將軍策楞等奏言臣等𠞰滅古爾班和卓時將投誠之達瓦釋放令其協同擒賊今據達瓦將賊人伊克敦多克巴圖孟克博什等擒獲解到臣等查伊克敦多克係與古爾班和卓同謀背叛即行正法其巴圖孟克等尚屬可原應革去宰桑請㫖釋放至達瓦原係宰桑烏黙什之子帶伊所屬七百户來降今又擒獲賊衆應請㫖即授為特楞古特宰桑又據遣往葉爾羌之特楞古特宰桑固英哈什哈回至軍營告稱上年將軍等遣伊同侍衛托倫泰等前往葉爾羌等處曉諭後與葉爾羌回人對敵多所斬獲忽有阿逆遣往之人告知伊犂被陷情形托倫泰等現為回人擒獲我於正月内回至游牧宰桑事務已有敦多克管理乃係阿逆羽翼我妻子俱被擒擄等語查固英哈什哈原係宰桑亦應請㫖仍行補授奏入報聞辛亥諭定西將軍達爾黨阿遣派塔本集賽兵丁事宜上諭軍機大臣曰富德奏塔本集賽宰桑達什策凌請帶伊所屬兵丁前往哈薩克朕已允其所請第恐達爾黨阿仍遵從前所降之㫖不令厄魯特兵丁前往亦未可定塔本集賽游牧距哈薩克甚近且伊等曽被哈薩克擄掠前進時必能奮往出力其别處厄魯特兵丁仍無庸派往癸丑命復授劉統勲為刑部尚書上諭大學士曰劉統勲從前妄議棄巴里坤退守哈密正當逆賊初叛之際朕恐其搖動人心阻撓軍務且使果如所言阿逆何至窮蹙無歸束手竄入哈薩克觀其至伊犂而不能守更復有何伎倆敢於侵擾内地則巴里坤之斷無可棄理亦甚明是以將伊革職治罪然當其時劉統勲因目擊永常匆遽情形驟聞其言未能深察是以張皇失措夫永常身為將軍膺閫外之重寄尚且怯懦退回甘心僨事劉統勲本係書生未嫻軍旅其所陳奏識見固屬冒昧舛謬尚為乃心公事假使彼時藉口於職在文臣辦理軍需不豫師行進止模稜觀望緘黙自守轉可安然無事且如策楞玉保等皆統兵大臣當阿逆窮蹙逋逃距軍營密邇乃仍徘徊不進坐致遠颺彼二人者皆滿洲䝉古世僕勇敢舊風未遠而皆選懦至此以劉統勲文怯漢人相提並論則其過為可諒而其心轉為可嘉矣劉統勲著加恩補授刑部尚書甲寅命奬賞内大臣尼瑪哈薩克錫喇等上諭軍機大臣曰尼瑪哈薩克錫喇此次効力軍前甚屬奮勉已加恩封授公爵俱著賞戴寶石帽頂雙眼翎以示優眷乙卯命解逆黨巴朗來京上諭軍機大臣曰據達爾黨阿奏自阿逆處逃出賊人巴朗已解赴巴禄處令為嚮導擒拏阿巴噶斯等語現在阿巴噶斯等俱已擒獲巴朗著即派員押解來京丙辰命賞賚投誠宰桑賽音伯勒克等上諭軍機大臣曰舒明等奏伯什阿噶什宰桑賽音伯勒克等帶領户口來降伊等中途被哈薩克搶掠情形可憫著加恩賞寨音伯勒克緞四端得木齊恩克濟爾噶爾等緞各二端現在伯什阿噶什為哈薩克所逼未知逃避何處伊子博東齊已領兵前往尋覔賽音伯勒克等或即在此居住或前往㑹合博東齊俱聽其自便並傳諭舒明等詳察賽音伯勒克等情形如需酌量接濟奏聞請㫖丁巳命議處侍讀學士富森等上諭軍機大臣曰富森派往遷移達什達瓦屬人起程一月餘始抵巴里坤任意遲延著交部嚴加議處錫特庫乃駐劄巴里坤辦事大員經富德將軍前私行逃回之宰桑訥黙庫曼集等行文知㑹應即請㫖正法乃游移兩請經朕嚴加申飭降㫖將訥黙庫曼集等正法以昭懲儆錫特庫辦理此事有意姑息亦著交部嚴察議奏命吐魯番回人莽噶里克暫停入覲上諭軍機大臣曰雅爾哈善等奏吐魯番回人莽噶里克貢獻馬匹請率伊弟額什里木子呢雅斯同來入覲等語莽噶里克感戴朕恩誠篤可嘉第現在令大兵擒拏阿逆而準噶爾地方連年擾攘匪竊甚多伊游牧内正須管轄此次著於伊子弟中派出一人來京莽噶里克著暫停入覲俟一二年後再行請㫖賊黨烏魯特宰桑和爾和岱正法原任定邊右副將軍扎拉豐阿奏言烏魯特宰桑耨徳勒齊擒拏伊同族宰桑和爾和岱前來告稱上年我等共議出兵擒拏阿逆和爾和岱並不遵行反將我擒送阿逆處又阻止烏魯特鄂拓克人等不向内地遷移今次派兵伊又托病不赴應行治罪等語臣等訊得和爾和岱附和阿逆情形屬實即行正法示衆奏入報聞戊午諭定邊左副將軍哈達哈等行文俄羅斯索取烏梁海逃人上諭軍機大臣曰哈達哈等奏烏梁海宰桑鄂木布之子博羅特等已逃入俄羅斯境内伊等止遣人索取不即領兵前往所辦尚合機宜此等逃人無甚𦂳要第行文俄羅斯地方自必擒獻原無庸領兵追捕若阿逆投至其地則大兵即當尾追擒拏不得照此辦理也著即派策布登扎布帶兵赴俄羅斯邊境索取俟烏梁海逃人送到時將首犯派幹員速解來京餘即在該處正法庚申諭定西將軍達爾黨阿擒拏古爾班和卓事宜上諭軍機大臣曰䇿楞等奏跟隨玉保前往引導之鼐勒察克回至軍營告稱玉保前赴哈薩克中途遇有賊人共相迎敵等語奏内並未聲明係何人迎敵看來不過古爾班和卓逃人及彼處窮餓無聊之衆耳此皆策楞從前疎脫古爾班和卓不行追捕所致達爾黨阿即帶鼐勒察克前往務將古爾班和卓擒獲倘與阿逆同入哈薩克境内亦必責令擒獻派幹員解京治罪如鼐勒察克並未見賊人實在情形私回軍營揑詞禀告即將鼐勒察克正法示衆恩䘏内大臣瑪木特妻子上諭軍機大臣曰普慶等奏瑪木特之妻及伊子䇿凌達什出痘身故等語從前瑪木特感戴朕恩誠心効力伊孫扎木禪現在又赴軍營著加恩賞銀一百兩以示優䘏辛酉命授厄魯特摩羅盆楚克為二等侍衛各賞銀五十兩阿玉錫策凌為藍翎侍衛各賞銀三十兩癸亥命拏解喀爾喀郡王青滾雜卜上諭軍機大臣曰喀爾喀王公台吉内惟和托輝特郡王青滚雜卜受恩最深上年在軍營時將軍大臣等叅奏阿逆罪狀伊敢私自泄漏且於阿逆前百計趨承以致阿逆趾高氣揚肆行無忌後於追緝阿逆之時觀望退縮奏稱必得兩路出師五萬方可追擒種種乖謬指不勝屈前此屢欲拏問朕念伊祖博貝舊日勞績施恩寛宥今無故自軍前擅回又揚言額林沁多爾濟達木巴扎卜等治罪之後衆心疑懼而喀爾喀數年以來皆以用兵為累以其怨望之私托為他人之語妄行凟奏藐法已極斷難姑容必當明正典刑以示儆戒但達爾黨阿哈達哈等現在領兵前往哈薩克不便派兵拏解著傳諭舒明阿蘭泰等如青滚雜卜撤兵回伊游牧則此時無庸辦理俟達爾黨阿等擒獲阿逆凱旋時降㫖令伊等拏解倘伊前赴舒明等駐劄地方即降㫖拏解來京治罪舒明等務宜加意慎宻勿使洩露致伊聞風脫逃命封都爾伯特台吉伯什阿噶什為親王上諭軍機大臣曰都爾伯特台吉伯什阿噶什帶伊屬人八百餘户至額爾齊斯竒蘭庫爾圖等處遣人前來投誠等語伯什阿噶什係都爾伯特大台吉屢被哈薩克搶掠傾心投順甚屬可嘉著封為親王命傳㫖奬諭都爾伯特親王伯什阿噶什上諭伯什阿噶什曰爾誠心感戴率領屬衆投誠甚屬可嘉前大兵抵伊犁時爾即謁見將軍大臣正欲加恩封賞旋遇阿逆背叛未及舉行今爾屢被哈薩克搶擄輾轉遷徙始克内附已加恩封爾為親王並賞給數珠荷包鼻煙壺以示優眷聞爾現在抱病屬人又經逺行此時毋庸派兵從征亦不必向内地遷移著即在額爾齊斯等處游牧爾都爾伯特台吉策凌等將來即令歸至舊日游牧地方爾等皆係同族聚處一方實為允協正不必逺離故土徒勞往返也俟爾病痊後明歳來京入覲更加賞賚前博東齊告稱爾遇哈薩克擾亂未知踪跡方深厪念今覽奏不勝欣慰至博東齊並非爾子從前在軍營時揑稱情由爾即查明奏聞命授玉保頭等侍衛上諭軍機大臣曰從前阿里衮赴軍營時朕曽降㫖令拏解玉保來京治罪今據達爾黨阿奏稱玉保自知罪譴前赴哈薩克中途遇賊人交戰尚能出力著加恩毋庸拏解授為頭等侍衛以觀後效乙丑諭都爾伯特輝特各部落人等遷移游牧事宜上諭軍機大臣曰都爾伯特親王策凌等輝特郡王策卜登多爾濟等自投誠以來感戴朕恩咸知奮勉効力其屬衆亦皆安靜從前因阿逆尚未擒獲是以不即令伊等回至舊時游牧地方降㫖俟明歳再行遷移今軍營陸續奏到阿逆情形窮蹙無聊哈薩克部落現欲擒獻而達爾黨阿哈達哈等統領大兵逼近哈薩克境界逆賊計日就擒當兹準噶爾全部蕩平都爾伯特輝特人等自可各回本部落安居樂業在素所服習之地牧養耕種於伊等生計更屬有益現在正值收獲之期馬匹肥壯即乘此時遷徙毋庸更俟明年此皆朕曲為伊等籌畫生計起見著傳諭舒明巴蘭泰納穆扎爾等傳集都爾伯特輝特王公等明白曉諭一面遷移一面奏聞並諭伊等回本部落後善為撫䘏休養永圖生聚共享昇平之福命封都爾伯特台吉烏巴什為貝子上諭軍機大臣曰舒明等奏都爾伯特台吉烏巴什同伯什阿噶什前來投誠烏巴什現因患病遣人先行告知等語伯什阿噶什已加恩封為親王烏巴什亦著加恩封為貝子即同伯什阿噶什等在額爾齊斯等處地方游牧俟明年令伊等前來入覲著先行賞給數珠荷包鼻煙壺以示優眷秋七月丁卯朔定議賞給達什達瓦屬人牛羊事宜軍機大臣等奏言查達什達瓦屬人六千餘口其弟伯格里屬人一千餘口現令移至阿爾台地方游牧遵㫖酌給官厰牲隻每户牛一隻羊四隻驍騎校每員牛二隻羊八隻佐領㕘領每員牛三隻羊十二隻管旗章京副管旗章京每員牛四隻羊十六隻至宰桑鄂齊爾布林托里俱䝉恩授為散秩大臣管轄屬衆應請量加優異每員各賞牛十隻羊四十隻此等牛羊原為伊等孶息生産起見其現在食用口糧交與舒明等詳察情形酌量給予口糧數月以資接濟其牛羊等項俱由張家口牧厰挑取解用奏入上從之己巳命賞䘏陣亡協理台吉齊巴克扎卜上諭軍機大臣曰據哈達哈奏齊巴克扎卜追捕烏梁海受傷陣亡等語齊巴克扎卜致命行陣深堪惻憫著賞銀三百兩辦理喪事查明伊子奏聞授為頭等台吉内閣侍讀學士富森疏奏遷移達什達瓦屬人游牧事宜富森奏言臣至巴里坤㑹同侍郎雅爾哈善等齊集達什達瓦宰桑鄂齊爾布林托里等遵㫖遷至阿爾台地方編作三旗令鄂齊爾等三人管轄計達什達瓦及伊弟伯格里所屬共三千餘户七千五百餘人分為三隊給與途中牲隻口糧自六月十六日至二十日相繼起程臣沿途照看留心約束前赴阿爾台地方奏入報聞侍郎雅爾哈善等疏奏遷移布庫努特人等游牧事宜雅爾哈善等奏言據䇿楞咨稱布庫努特人等原同噶勒雜特部落在和博克等處居住後移至額林哈畢爾噶今噶勒雜特部落現在烏蘭烏蘇游牧所有巴里坤布庫努特人等亦應歸併一處同居等語臣等隨曉諭巴圖爾和碩齊等令其遷移計大小四百餘口給與口糧於六月二十五日自巴里坤起程前赴烏蘭烏蘇游牧又據卡倫送到布庫努特一名和推告稱上年由布庫努特派兵二十名隨宰桑吞圖布前往軍營吞圖布至伊犁時將彼處布庫努特三百餘户收獲交與和推向巴里坤前來共大小四百餘人已至蘇伯特臺站因口糧不繼前來求給等語臣等因巴圖爾和碩齊等現在遷至烏蘭烏蘇即令和推將此項人衆暫住蘇伯特臺站令巴圖爾和碩齊等至蘇伯特臺站時帶領同赴烏蘭烏蘇所需口糧亦酌量賞給奏入報聞辛未賊黨訥黙庫等正法原任定西將軍策楞等奏言六月十一日據總管畢里衮解到拏獲厄魯特一名訥黙庫訊是跟隨古爾班和卓之人又據㕘贊大臣巴禄拏獲葉克明安徳濟特屬人一名巴朗係隨徳濟特同附阿逆行走之人俱即行正法再跟隨阿巴噶斯之烏勒木濟等四人亦移咨巴禄即在軍營正法其巴朗伯爾都係阿道齊所屬之人從前阿道齊詭稱並不知阿巴噶爾等踪跡而其屬人現在阿巴噶斯處拏獲阿道齊顯係知情亦應一倂治罪奏入報聞壬申定邊右副將軍哈達哈等疏奏擒勦古爾班和卓情形哈達哈等奏言據副都統職銜唐喀祿等報稱䕶送侍衛順徳訥赴哈薩克至濟爾瑪台地方有特楞古特宰桑敦多克告稱我特楞古特部落人衆七百户及古爾班和卓部落人五百户和克沁部落人五百户俱願投誠懇求遷往阿爾台地方㳺牧等語隨將敦多克及古爾班和卓和克沁得木齊二人并竒爾吉斯宰桑送出阿逆所屬十八人一併解至軍營臣等竊思特楞古特等既請投誠移往阿爾台何以潛赴烏梁海地方形迹可疑因嚴訊敦多克等供稱伊等起程時與西路大兵交戰敗走途中又掠取玉保所帶馬駝等物殺傷兵丁今投烏梁海意圖搶掠再遣人㑹合阿睦爾撒納同逃阿睦爾撒納亦曽遣達瓦送信古爾班和卓等語臣等即將宰桑敦多克及得木齊二人并阿逆屬人等俱行截殺隨帶兵八百名疾赴伊等駐劄處乘其不備盡行勦滅古爾班和卓與伊弟正欲脱逃為察達克所獲訊問情節俱已供認隨將古爾班和卓及伊眷屬一併正法計獲駝四百隻羊一千四百餘隻馬二百餘匹分給効力官員人等臣等仍領兵前往哈薩克奏入上諭軍機大臣曰哈達哈等帶兵赴哈薩克路遇古爾班和卓等帶領户口千餘潛往烏梁海即派官兵擒獲古爾班和卓等正法其屬人全行𠞰滅甚屬奮勇可嘉哈達哈著加恩授為領侍衞内大臣賞戴雙眼翎策布登扎布著晉封郡王唐喀禄著授為副都統舒赫徳効力軍營此次亦屬奮勉著賞給副都統職銜扎薩克台吉三都卜多爾濟著封授公爵協理台吉策勒卜多爾濟著授為頭等台吉烏梁海副都統察達克著授為内大臣賞銀一百兩索倫營長卓里雅薩壘藍翎侍衛敦濟勒圖各賞銀五十兩其餘効力官兵哈達哈等查明奏聞交部議叙並著傳諭哈達哈等俟撤兵凱旋時派唐喀祿察達克等酌派兵丁前赴烏梁海將逃㪚賊衆查辦其首惡鄂木布博博郭勒卓輝及達瓦藏布等務期一併擒拏解京正法癸酉諭駐劄烏里雅蘇台辦事大臣舒明等查奏青滚雜卜情形上諭軍機大臣曰昨因哈達哈已領兵前往哈薩克是以將拏解青滚雜卜之事交與舒明等相機辧理今據舒明等奏青滚雜卜帶往兵丁俱已沿卡倫回至各游牧惟令侍衛及綠旗兵丁至舒明處送回礟位等語青滚雜卜現在已回伊游牧或尚逗留他處著傳諭舒明等確查速奏甲戌命查辦逆黨葉克明安台吉徳濟特屬人等酌量分别賞給事宜上諭軍機大臣曰據納穆扎爾奏從前收服葉克明安台吉徳濟特及察衮屬人等遵㫖交與輝特貝子徳濟特及扎薩克阿卜達什管轄今徳濟特現同阿逆逃叛應將伊屬人等酌量賞給輝特徳濟特阿卜達什其餘請分賞喀爾喀等語此項徳濟特屬人自不應照投誠之人一體辦理且伊台吉既已附賊伊等聞知不免妄生疑懼轉致滋事納穆扎爾所奏甚是著照所請將此項戸口酌量賞給貝子徳濟特及扎薩克阿卜達什等各四五户餘俱分賞喀爾喀等為奴昨已降㫖令輝特都爾伯特人等遷往各原游牧地方此時如已起程亦即查出遵照此㫖辦理丙子定邊左副將軍哈達哈等疏奏擒𠞰逆黨達瓦藏布情形哈達哈等奏言據副都統職銜唐喀祿咨稱聞達瓦藏布至額爾齊斯河與烏梁海博博共謀刦掠隨帶兵五百名派索倫總管鄂博什前往擒拏隨據鄂博什在庫爾圖阿氐爾干拏獲達瓦藏布並收服所屬三百餘人駝一百七十隻馬二百四十匹内有阿逆屬下二十八人先行正法等語將達瓦藏布解至軍營經臣等訊明從逆實情并現在糾合烏梁海博博郭勒卓輝等欲來抗拒大兵縁由遂將達瓦藏布及同行宰桑等八人阿逆所養喇嘛一名俱行正法其餘人等俱照古爾班和卓人等一例辦理所獲牲隻物件酌量賞給効力官員人等以示鼓勵擒獲賊人之時和托輝特公多爾濟䇿登至軍營告稱從前為賊拘留今始得脱懇求帶往軍前効力行走以圖報効等語奏入上諭軍機大臣曰和托輝特公多爾濟策登於伊犁擾亂時力弱被擒賊㪚之後他人俱已全歸伊獨未出朕意其或順從阿逆茍且偷生不獨深負國恩且實為衆喀爾喀之辱是以降㫖令將軍等擒拏正法今覽哈達哈等奏大兵擒拏達瓦藏布多爾濟策登始得乗間來歸前此為賊拘留身經勞瘁甚屬可憫著加恩仍復其公爵令在哈達哈軍營効力行走索倫總管鄂博什帶兵勦殺達瓦藏布甚屬奮勇著加恩授為副都統戊寅諭遷移扎哈沁人等回住游牧地方事宜上諭軍機大臣曰都爾伯特輝特人等已降㫖令遷往各原游牧地方其扎哈沁人等亦應一體辦理但扎木禪現在軍前無約束管轄之人暫令停止遷移著傳諭哈達哈俟大兵凱旋時即傳㫖扎木禪令其率領屬衆遷往原㳺牧地方安居樂業副朕體䘏伊等之意己卯命查拏擅殺宰桑恩克博羅特之得木齊綽克察等上諭軍機大臣曰阿敏道奏稱綽和爾宰桑恩克博羅特㑹集衆鄂拓克令將游牧移至朱爾都斯惟得木齊綽克察屢諭不遵恩克博羅特親往責問為綽克察戕害等語綽克察目無法紀務即拏獲正法以示懲儆恩克博羅特綽和爾宰桑員缺著吞圖布補授吞圖布員缺著達爾黨阿等擬定正陪具奏請㫖恩克博羅特性本粗暴朕見時即加訓諭從前授伊宰桑特以其為彼處舊人之子至於殘刻屬衆之事諒所不免其所屬人等亦應將實在情形告知圖什墨勒等奏聞請㫖乃竟擅自殺害此等惡習斷不可長吞圖布應嚴加約束毋得再生事端前恩克博羅特向哈薩克進兵時詐稱墜馬傷足居心欺妄宜為屬人所害若能如吞圖布之勇往任事自當承受朕恩著并將此言曉諭哈薩克錫喇尼瑪等知悉哈薩克錫喇係恩克博羅特之叔恩克博羅特有無子嗣令其查明具奏諭定西將軍達爾黨阿等查拏明噶特宰桑恩克圖等事宜上諭軍機大臣曰舒明等奏明噶特宰桑恩克圖屬人塞卜騰帶領三十餘户前來投誠等語塞卜騰等著暫歸於扎哈沁㳺牧居住如恩克圖親身來投亦照此辦理并將恩克圖解送來京從前厄爾錐音奏稱恩克圖與阿逆同謀搶掠烏喇特和碩特游牧今伊屬人塞卜騰等内附而恩克圖未見前來未知隠匿何處既是附和阿逆之人斷不得任其潛逃著傳諭達爾黨阿等俟凱旋時中途查出拏解來京并傳諭衆鄂拓克等協同搜捕再明噶特舎楞及額林沁之孫䇿伯克扎卜等至今並未拏獲亦著達爾黨阿等留心查拏其或逃入哈薩克境内此等人非阿逆可比毋庸帶兵向索可即遣人曉諭令其獻出其明噶特屬人著交與沙克都爾曼濟管轄舎楞䇿伯克扎卜屬人著交與厄爾錐音哈薩克尼瑪錫喇等管轄庚辰命貝勒車木楚克扎布管理烏里雅蘇台臺站事務駐劄烏里雅蘇台辦事大臣普慶等奏言查喀爾喀親王得親扎卜原派管理烏里雅蘇台臺站今據定邊左副將軍哈達哈奏請辦理馬匹事務其臺站事務應令派員管理查扎薩克圖汗部落貝勒品級車木楚克扎布游牧在推河等處離臺站甚近應奏明交與管理奏入報聞癸未命傳諭都爾伯特輝特王公等上諭軍機大臣曰納穆扎爾等奏都爾伯特輝特王公等帶領屬衆移於卡倫外居住請俟明年再移至原游牧地方等語都爾伯特輝特王公等感朕深恩約束所屬甚屬可嘉著舒明納穆扎爾等傳㫖奬諭明年遷至原游牧地方務宜管轄屬人耕種謀生仍如在喀爾喀時守分安居禁止盜竊其有不遵約束者即照定例治罪所有補授盟長副盟長及扎薩克等事奏明酌量補授其餘官員及辦理屬人事宜應歸扎薩克辦理者各扎薩克自行辦理應㑹同盟長者㑹同盟長等辦理朕當降㫖哈薩克令其各守邊界不得越境侵犯倘哈薩克無故滋擾伊等以逸待勞善為防禦如有投誠人衆即送至烏里雅蘇台軍營辦理伊等亦不得妄生事端與哈薩克搆釁務宜善體朕心永享承平之福命優䘏班第鄂容安等上諭大學士曰班第鄂容安靈櫬將次到京朕親臨祭奠並著三品以上大臣齊集用昭優䘏二臣臨危致命為國捐軀義烈所昭可嘉可憫其靈櫬准令入城各於本家停設並加恩入祀昭忠祠所有應得䘏典仍著該部察例具奏駐劄烏里雅蘇台辦事大臣舒明等疏奏安揷達什達瓦部衆事宜舒明等奏言内閣侍讀學士富森帶領達什達瓦屬人七千五百餘人於六月二十八九等日至阿拉克淖爾令臣等指定安插地方查和通鄂博布拉罕察罕托輝等處係扎哈沁舊游牧地甚寛展水草充足令達什達瓦部衆在彼游牧甚屬妥協隨遣主事巴杭阿往迎富森等一同帶至和通鄂博布拉罕察罕托輝地方指定疆界安揷奏入報聞甲申命定邊右副將軍兆惠籌辦伊犁善後事宜上諭軍機大臣曰前降㫖俟擒獲阿逆後令達爾黨阿富徳帶領索倫察哈爾兵丁由北路凱旋哈寜阿帶領健鋭營兵丁前往兆惠處候㫖但思索倫察哈爾兵丁俱由北路撤回即不復至伊犁所有駐劄伊犁兵丁應先行派定此時達爾黨阿應已擒獲阿逆毋庸更派兵前往兆惠亦應將抵伊犁著傳諭兆惠至伊犁時即留索倫兵二百名察哈爾兵二百名健鋭營滿洲兵或一百名或二百名共兵丁五六百名為駐劄伊犁大臣差委之用其伊犁辦事大臣亦毋庸永逺駐防一切事宜俱與圖什墨勒扎爾呼齊等商酌妥協令伊等熟悉内地條例俟一二年後即交伊等輪班管理所有辦事大臣印信已飭部鑄給管理厄魯特二十一昂吉印信頒發其圖什墨勒向用圖記之處亦著停止俟駐劄大臣撤回後此印貯於公所即令值班之圖什墨勒掌管永著為例再䝉古等遵奉黄敎固勒扎係伊犁善地理宜重新廟宇遣大喇嘛前往誦經著即將此廟為大臣等辦事之地但應酌量於厄魯特内派人就近防守準噶爾原有濟喇特轄一項人員即於此内派出防守其伊犁附近地方可否發綠旗兵前往屯田亦著兆惠等豫為籌酌奏聞丙戌命免治台吉阿道齊罪上諭軍機大臣曰前據三格奏在阿巴噶斯處拏獲阿道齊屬人應將阿道齊一併治罪等語阿道齊並未附和阿逆早同伊兄前來投誠其屬人在阿巴噶斯處毋庸深究況投誠人内似此者正復不少如必一一辦理衆心易致疑懼著傳諭達爾黨阿等免其究問平定準噶爾方略正編卷二十九
