  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_086-1a, image: WYG0358/WYG0358-0538a.png}
body:
  text: 乾隆二十一年秋閏九月丙午諭定邊右副將軍兆惠等派兵駐劄伊犂事宜兆惠等奏言臣等籌辦伊犂屯種事宜明春先令回人一百名緑旗兵一百名指定地方耕種已奉諭㫖准行俟收穫後再添派緑旗兵廣為墾種約可派兵一千名至防守地方應派索倫巴爾虎兵一千名吉林兵五百名察哈爾兵三百名滿洲兵二百名共計二千名此項兵丁即將緑旗兵耕種所穫及各部回人輸納貢賦給為糧餉既省內地運送之煩而於防守地方實有裨益奏入上諭軍機大臣曰兆惠等籌辦屯種事宜及派各處兵丁駐劄伊犂俱屬妥協第念索倫兵丁連歲在軍營行走未便多留前降㫖令伊等於大兵撤回時由北路回至游牧今未知已抵何處即著兆惠咨詢達爾黨阿等索倫兵丁如尚未過額爾齊斯著揀選三百名前往伊犂俟明年另行派出更替再哈寧阿已帶領滿洲兵前往合計伊犂已有兵丁若干俟兆惠查明奏到再由吉林察哈爾等兵丁內揀選派往定邊右副將軍兆惠等疏奏密飭副都統阿敏道辦理回部事宜兆惠等奏言據遣往回城副都統阿敏道報稱現在領兵已抵綽魯克特赫地方俟宰桑錫克錫爾格調遣各鄂拓克兵丁到時即行前進並稱中途接從前遣往回城侍衛托倫泰報文知托倫泰上年已招降喀什噶爾回人正與葉爾羌回人交戰遇阿逆遣往人員將伊等擒獲後經波羅泥都收留今年五月內霍集占到彼即將阿逆使人殺戮派人護送托倫泰前來惟將副將軍薩喇爾之兄特古斯及同往之人厄魯特等俱留在彼處據霍集占等告稱厄魯特等人不可信是以不令回至軍營俟奉到諭㫖遵行再厄魯特霍爾博斯宰桑衛徵哈什哈率領屬人六百戶現在逃入回城等語臣等即密飭阿敏道現在托倫泰已回據其所報回城地方並無事故毋庸多帶兵丁前往即令同錫克錫爾格赴彼詳察情形如無抗違之意即將回人等加意安撫並約束帶往之厄魯特等毋得任其肆行擾害所有回人應輸貢賦查明數目令其交納其應赴伊犂種地回人務於本年十二月內攜帶牛具前赴所指地方並令回人頭目親身前赴伊犂以備詢問奏入上諭軍機大臣曰兆惠等密飭阿敏道前赴回城辦理事宜甚屬妥協即照所奏辦理托倫泰著即令其來京至衛徵哈什哈帶領屬人逃入回城係從前同古爾班和卓逃竄者此時如入回城毋庸查究俟收服回人後曉諭伊等擒獻首惡所有屬人即行賞給回人為奴如或藏匿别處兆惠等應留心防範並即派兵𠞰滅毋使滋生事端方為妥協戊申命瑪瑪承襲和通額默根公爵博爾和津承襲諾爾布敦多卜貝勒上諭軍機大臣曰雅爾哈善等奏公和通額默根在軍前身故伊子瑪瑪帶領三百五十餘戶現在輝特汗巴雅爾附近薩爾海地方居住等語和通額默根公爵著伊子瑪瑪承襲並准其在薩爾海居住貝勒諾爾木敦多卜既無子嗣著加恩令伊姪博爾和津承襲貝勒博爾和津尚在幼齡其游牧事務暫交伊族人摩羅及宰桑新登等經理沙克都爾曼濟係該部盟長並著留心照看己酉命加臺站參領第魯巴三品職銜上諭軍機大臣曰第魯巴遣往西路軍營協理臺站事務著賞給三品職銜並銀一百兩即速馳驛前往庚戌命授內閣學士阿桂參贊大臣上諭軍機大臣曰成衮扎布奏稱阿桂自到軍營後辦理諸務甚屬盡心等語阿桂著授為參贊大臣同將軍成衮扎布擒𠞰逆賊務宜加意奮勉以副委任命鄂哲特等補授默得齊各宰桑上諭軍機大臣曰據兆惠等揀選應行補授默得齊宰桑等各員請㫖默得齊宰桑員缺著鄂哲特補授伊克烏魯特宰桑員缺著錫克錫爾格調補卓托魯克宰桑員缺著圖布愼補授伊克巴爾達穆特宰桑員缺著巴朗補授哈丹宰桑員缺著莽鼐調補壬子命派二十一昂吉人等管理臺站上諭軍機大臣曰據兆惠等奏噶爾藏多爾濟等屬人現在生計未能充裕等語噶爾藏多爾濟及扎那噶爾布等屬人不必派令管理臺站著將二十一昻吉人內派出坐臺人等帶領戶口與北路喀喇沁一例辦理則二十一昻吉人等得藉錢糧養贍而噶爾藏多爾濟等不得以承辦臺務藉口著兆惠等即遵照辦理惟臺站須派大員管轄今扎哈沁所設臺站即令宰桑鄂爾竒木濟管理甚屬妥協餘亦著派附近臺站各宰桑等查辦以專責成癸丑命授親王桑寨多爾濟為圖謝圖汗副將軍上諭軍機大臣曰圖謝圖汗雅木丕勒多爾濟年老殘疾不能辦事其副將軍員缺著桑寨多爾濟補授桑寨多爾濟現在成衮扎布軍營著即回至部落會同派往之瑚圖靈阿多爾濟等查拏搶奪商人匪賊務宜妥協辦理毋得姑息丙辰申諭西北兩路將軍等撤兵定西將軍達爾黨阿等奏言領兵前進之參贊大臣阿里衮策布登扎布等回至軍營臣等公同商議阿布賚現為大兵擊敗逃竄今兩路大兵已抵哈薩克極邊之境又屢經攻戰馬匹疲乏時值隆冬巴里坤解送之馬匹牲隻糧麵等項尚未送到現在咨催臣等揆度現在駐兵之處四面曠野冬月不能屯駐擬即領兵前往阿布賚游牧之哈薩拉克等處過冬使阿布賚等失其巢穴俟明年春草萌生其如何進兵征𠞰之處另行詳議具奏奏入上諭軍機大臣曰達爾黨阿等奏請在哈薩拉克過冬明歲整兵前進一摺伊等辦理一切俱未合宜朕早已料及是以八月內即降㫖令其撤兵著即遵照前㫖辦理即如伊等派阿里衮領兵前進而將軍等並未同行策楞係獲罪效力之人亦不知奮身前往阿里衮僅率七十餘人遇賊千餘獲其馬匹輜重甚多設伊等俱能如此奮勇逆賊早已就擒又遣往哈薩克之楚魯克昭華什等曾否回至軍營奏內並未聲明種種辦理未見端緒殊負委任之意哈達哈前遇阿布賚並未窮追甚屬畏葸所賞雙眼翎不准戴用撤兵回時著隨同成衮扎布辦事俟拏獲青滚雜卜後再降諭㫖從前降㫖令撤回兵丁俱由北路行走第恐接濟口糧稍覺周章現在兆惠又有請留兵駐劄安濟哈雅之奏著達爾黨阿哈達哈等於所領兵丁內派出一千名交哈寧阿帶往安濟哈雅駐劄其餘兵丁俱由北路撤回阿里衮富德著先行馳驛來京鄂實明瑞額爾登額亦著來京再哈達哈策布登扎布等撤兵回時路過烏梁海地方並著協同舒赫德擒拏郭勒卓輝等正法唐喀祿已令在科布多駐劄同阿蘭泰辦理事務舒明亦著馳驛來京至哈薩克錫喇尼瑪吞圖布等連年效力軍營殊屬勞勩著即傳諭伊等帶領所屬兵丁各回游牧以示體恤丁巳宣諭中外撤兵事宜上諭大學士曰逆賊阿睦爾撒納辜恩背叛一事正準噶爾甫定之後若留此遺孽恐其煽惑新附之衆是以嚴飭策楞玉保等帶兵追緝不意二人各懷私見坐失事機其意以為追之不及可以自謝其罪及之而不獲則罪滋大此其居心尚可問耶及朕飭催再四西北兩路之兵咸會始克稍振軍聲達爾黨阿哈達哈等遂有哈薩拉克山伊什勒等處之捷阿布賚汗巴巴等望風奔潰阿逆易服潛逃然所獲之楚魯克等兩次縱回傳諭擒獻卒以限期相誑逾月之久阿布賚遂得乘間移帳遠徙此又不免以遲徊觀望為其所愚夫自去年平定伊犂逐竄逆賊以至連敗哈薩克皆賴祖宗威靈上天默佑以成大功而朕所用大臣往往以愼重觀望坐失事機是朕之咎也今又豈肯遂非使師旅勞憊於絶域且馬力已疲而賊蹤益遠非此諸臣姑且遷延所能了事是以於八月望前即特降諭㫖令其班師乃達爾黨阿等於未經奉到此㫖之先已奏請暫回哈薩拉克地方過冬俟明春再進此不過强為之詞耳事斷難行仍諭令遵㫖撤回雖逆賊暫逃顯戮揆此情勢阿逆窮蹙奔竄之不暇必不能因我撤兵復勾連阿布賚等犯我降番諸部倘竟奮螳螂之臂則伊犂現在料理規模已定兵整糧足厄魯特諸部落傾心向化聽我指揮與去歲情形迥異逆賊到即成擒此萬無可慮者總之前年辦理準夷原非大舉而機不可失斷自朕心乃數月之間平定伊犂繫執酋長完我兩朝未竟之緒此實仰荷上天眷佑朕不敢自以為功至諸臣之不能奮然為國家出力顧此失彼朕雖未嘗不早慮及而每以途遠失之事後用是慙憤至阿逆中途叛去原於西師全局亳無輕重特已將次就擒而復致揚脫未克即正典刑然揆之天理人情從來叛賊穴鼠釜魚斷無久延之理如羅卜藏丹津自雍正年間叛入準噶爾越歲二紀昨年仍搜捕得之獻俘闕下此亦近事之明徵大驗也况以阿逆之滅倫犯紀如猰犬噬人衆咸切齒其能久逃天網耶其親屬悉早經擒縛而率先助逆之阿巴噶斯哈丹克什木等俱次第解至京師咸已伏法阿逆遠處窮荒俟一二年後朕再為相機酌理此時將雖無功而兵勞堪念是用息我師徒所有用兵前後本末宣諭中外俾共知之諭派兵駐劄伊犂事宜上諭軍機大臣曰前兆惠奏派各處兵丁二千名為駐劄防守之用已降㫖令於撤回大兵內或留索倫兵三百名並令哈寧阿帶兵一千名駐劄安濟哈雅今思安濟哈雅地方現已無事且路途較遠糧運稍艱不若將此項兵丁駐劄伊犂著傳諭兆惠查明伊犂現在兵丁若干約共駐兵一千五百名即足敷防守之用不必照伊原奏辦理戊午諭定邊右副將軍兆惠詳籌伊犂屯種事宜上諭軍機大臣曰回人伯克噶岱默特之子阿卜都爾滿來京詢知各處回人情形著即遣回游牧並著密諭兆惠回人與厄魯特等素如仇敵若今回人屯種伊犂或受厄魯特等欺凌轉恐滋事不若仍令回人各歸原處令其輸納貢賦似較妥協伊犂等處可種之地既多酌量遣派內地兵民前往屯種照安西地方之例辦理既可支給屯兵糧餉而於鎮守地方更屬有益著兆惠詳悉妥議辦理諭定邊左副將軍成衮扎布等籌辦駐兵防守事宜上諭軍機大臣曰西北兩路大兵已經撤回成衮扎布等擒拏青滚雜卜自可計日就獲惟阿逆尚未就擒自烏里雅蘇台軍營以至科布多納米爾沙扎海各處應如何駐兵防守及轉運糧餉各事宜俱須豫為籌辦哈達哈等所帶索倫兵丁等效力多年應否存留俱著傳諭成衮扎布㑹同哈達哈等悉心詳議辦理命參贊大臣舒明仍留軍營領兵協擒青滚雜卜上諭軍機大臣曰昨降㫖命舒明來京今據成衮扎布奏請派科卜多兵二百名交舒明前往協擒青滚雜卜著即帶領前往科卜多駐劄兵丁尚多並著再派三百名令侍衛巴寧阿藍翎侍衛勤泰等㑹同舒明前進定邊左副將軍成衮扎布疏奏安插博克達沙畢納爾人衆事宜成衮扎布奏言博克達沙畢納爾人等一千二百餘名原議移駐青海因道里遼遠暫行安插察罕托輝地方蒙恩賞給口糧兩月明年尚應籌辦口糧牲隻方可遷移若將此項沙畢納爾人等交與哲卜尊丹巴胡土克圖匝雅班第達胡土克圖額爾德尼班第達胡土克圖等管轄則伊等皆得其所且免遠遷青海之費奏入報聞己未諭定邊右副將軍兆惠派兵防禦哈薩克事宜上諭軍機大臣曰兆惠等奏稱向哈薩克進兵一帶臺站地方間有嗎哈沁搶奪馬匹派散秩大臣賽齎喇呼等帶兵搜拏並知會達爾黨阿於撤兵回程時沿途查緝等語辦理甚屬妥協達爾黨阿等進兵時若能於臺站地方沿途派兵搜查則嗎哈沁等必不敢肆行搶奪此即伊等辦理未到之處此時大兵已撤阿布賚等必仍歸其巢穴雖經大兵擊敗自不能更生事端或阿逆從中慫恿騷擾附近之厄魯特等亦未可定著傳諭兆惠飭知各鄂拓克等選兵數百名前往襲擊使賊不得寧處自無暇復出滋事倘遇阿逆在彼即奮力擒拏此際兵已全撤出其不意更易成功兆惠等即遵照辦理厄魯特頭目巴圖爾帶領臺站人等截殺賊衆甚屬奮勇著加恩賞給藍翎并銀三十兩以示鼓勵命賞給駐劄伊犂官兵銀兩上諭軍機大臣曰健鋭營索倫察哈爾厄魯特駐劄伊犂兵丁效力行間深堪軫念著兆惠動用正項錢糧酌量賞賜以示體恤前降㫖令圖什墨勒扎爾呼齊宰桑等輪班駐劄伊犂辦事亦應給與官項圖什墨勒著按月給銀三十兩扎爾呼齊給銀二十兩閒散宰桑給銀十兩得木齊收楞額等各給銀五兩伊等自必益加奮勉兆惠等可即遵照辦理辛酉申諭派兵駐劄伊犂事宜上諭軍機大臣曰據達爾黨阿奏稱接到撤兵諭㫖即帶領兵丁二千五百名前赴北路協擒青滚雜卜其餘兵丁三千名俱令回至西路交與兆惠差遣等語所奏非是伊犂無須多留兵丁駐劄前已降㫖兆惠令其酌留兵丁一千五百名多亦不必踰二千仍著兆惠遵㫖於此項撤回兵丁內酌量留駐其餘俱行撤回甲子訓飭定西將軍達爾黨阿上諭軍機大臣曰前因達爾黨阿哈達哈等效力軍前尚知奮勉加恩賞給雙眼翎以示鼓勵乃西北兩路大兵會合一處反彼此推諉各存意見殊委任朕念伊等遠行勞苦不即重治其罪然亦無功可録達爾黨阿所賞雙眼翎亦著同哈達哈一併繳還不准戴用諭定邊右副將軍兆惠等密飭各部落防範阿逆事宜上諭軍機大臣曰今大兵已撤阿逆奸詭百出或潛行唆誘各厄魯特等皆未可定著兆惠密飭噶爾藏多爾濟巴雅爾等並著巴蘭泰傳諭都爾伯特輝特各王公台吉等留心防範如阿逆遣人煽誘立即擒獻毋墮賊計命奬賞內大臣扎木禪察達克等上諭軍機大臣曰隨同哈達哈等進兵之內大臣扎木禪察達克等經年效力軍營深堪軫念著各賞銀一百兩即令伊等回至游牧以示體恤倘逆賊青滚雜卜逃竄至彼並著伊等加意偵探速行擒獻冬十月丙寅命釋俘獲哈薩克人等回巢上諭軍機大臣曰西北兩路大兵現在撤回已傳諭兆惠酌量派兵往襲阿布賚使賊不得寧處並通飭各鄂拓克防範哈薩克所有此次進兵俘獲哈薩克人等原無得罪天朝之處應酌量施恩釋放回巢俾伊等衆哈薩克咸知感戴自將阿逆擒獻現有㫖傳諭阿布賚擇伊等明白曉事者齎往仍加恩酌給口糧其頭目人等並著賞賜緞匹兆惠接到此㫖即轉諭哈薩克錫喇尼瑪等遵照辦理如已將哈薩克人等分給衆鄂拓克即無庸復行查回惟將烏圖卜妻子釋放再據玉保順德訥奏哈薩克察罕拜巴圖爾等久有歸誠之意著兆惠詢問哈薩克錫喇尼瑪等如察罕拜巴圖爾係哈薩克緊要之人有意投誠即著於此次釋放人內令其到彼傳諭兆惠等務宜妥協辦理命傳諭哈薩克阿布賚汗巴巴等上諭哈薩克阿布賚汗巴巴曰逆賊阿睦爾撒納背恩叛逆上干天討朕命將軍大臣等領兵追擒逆賊窮蹙奔竄入爾哈薩克境內大兵臨爾部落特為追擒逆賊一人於爾部原屬無涉前已遣使傳㫖曉諭意爾等接奉諭㫖必能明曉大義擒獻逆賊豈意爾等墮賊術中反奮螳臂迎敵大兵為我官兵兩次擊敗棄其游牧流離奔散皆爾等自取罪戾不識去逆效順之所致今朕降㫖撤兵特因時屆隆冬官兵連年效力行間令其暫回休息至於阿逆罪惡滿盈斷難久稽顯戮明歲仍派大兵前來索取爾哈薩克人等因此么䯢逃虜坐致滅亡朕心不忍從前噶爾丹策零時爾部落尚畏其强盛力不能支今準噶爾全部歸順天朝供我臂指復由內地調集大兵前往爾等自審情形將何恃而不恐朕為天下共主一視同仁雖爾部僻處荒遠不惜申命告誡是以復降㫖申諭並命將軍大臣等將俘獲爾部人等施恩釋放爾等接奉朕㫖即將阿逆擒獻遣使前來朕必曲加寬宥尚當格外施恩俾爾等永享承平之福爾等其熟計利害毋貽復悔命原任布政使德舒雁平道富尼漢前往巴里坤協辦糧餉事務丁卯命查拏西路坐臺潛逃之喀爾喀等上諭軍機大臣曰前據兆惠奏稱伊勒巴爾和碩等處坐臺喀爾喀等七名私自潛逃已降㫖嚴行查拏今復據稱喀爾喀巴雅爾圖等四人潛謀逃竄經筆帖式德明拏獲就近解送巴里坤辦事大臣查究並將各處坐臺喀爾喀等俱行撤回送至巴里坤等語此等喀爾喀派往西路坐臺竟敢潛行逃竄必是青滚雜卜遣人前往煽誘不可不嚴行查究著傳諭雅爾哈善等即將解到巴雅爾圖等四名審出實情正法示衆其餘撤回之喀爾喀等暫行看守如在彼尚屬安靜俟軍務竣後仍遣回各游牧倘敢滋事亦即正法其伊勒巴爾和碩坐臺潛逃人七名著傳諭達爾黨阿等撤兵回時沿途嚴加搜查並著阿蘭泰於各卡倫地方加意緝訪如遇此等逃人即行擒拏解交成衮扎布辦理戊辰命定西將軍達爾黨阿來京上諭軍機大臣曰達爾黨阿哈達哈等撤兵回至北路軍營哈達哈已降㫖留在軍營在參贊大臣上行走會同成衮扎布辦理事務達爾黨阿著即來京其領兵大臣內已命阿里衮富德等先行回京其餘人員有應留軍營差委及遣回京師者交與成衮扎布分别酌量奏聞請㫖辛未諭定邊右副將軍兆惠防範厄魯特人等上諭軍機大臣曰現在撤兵暫且停止擒拏阿逆所有厄魯特各游牧人等不能保無與阿逆同謀潛通消息之事從前降㫖令將伊等游牧向內遷移而駐劄大兵於各游牧之外著密諭兆惠遵照查辦並留心防範各游牧人等倘有私自逸出與阿逆往來者即行查拏務宜愼密癸酉諭駐劄巴里坤辦事大臣雅爾哈善等安插厄魯特人等事宜上諭軍機大臣曰兆惠等奏稱厄魯特人等生計甚艱所有前赴巴里坤人等請酌給口糧養贍俟明春給與籽種令赴廋集額卜齊布拉克等處及巴里坤淖爾附近地方種地秋收後仍令各回游牧等語此事甚與目前情事相協前曾降㫖令將此項人等諭令各回本游牧因伊犂地方平定如概留養贍於巴里坤則伊等原游牧轉成棄地殊為可惜今看伊等情形經阿逆蹂躪之後謀生無策若量給口糧令其回至游牧則所給之項不過暫延數日依然窮困甚至流為盜竊俱未可定著傳諭雅爾哈善等即將近日前赴巴里坤之三都克所屬人等及向後仍有似此前來者俱照兆惠所奏暫留巴里坤酌給口糧仍令伊等照達什達瓦人衆各自謀生俟明春賞給籽種種地秋收後再令回至原游牧不必拘泥前㫖辦理恩賞貝勒品級車木楚克扎布牲隻價值上諭軍機大臣曰成衮扎布等奏稱貝勒品級車木楚克扎布前聞臺站擾亂即帶兵接續復自伊游牧解送駝五十隻馬六百匹羊一千隻赴軍營交納等語車木楚克扎布屢在軍前效力已加恩封授貝勒品級賞戴三眼翎此次交納駝馬羊隻甚屬可嘉著加恩於軍需項內將此項牲隻折價賞給諭定邊左副將軍成衮扎布審訊附賊台吉班珠爾等上諭軍機大臣曰成衮扎布等奏稱博特巴達什烏巴什等管理牧放馬匹商同協理台吉班珠爾欲將馬匹帶往青滚雜卜處經章京巴顔岱德勒格爾等奪回即帶馬匹赴烏里雅蘇台等語章京巴顔岱等甚屬可嘉著成衮扎布查明似此奮勉人員奏聞加恩班珠爾及博特巴達什烏巴什等情甚可惡著即嚴行審訊究出首惡正法示衆議定西路新設臺站章程定邊右副將軍兆惠等疏奏西路新設臺站章程一摺得㫖軍機大臣議奏尋議據兆惠奏稱每臺應派察哈爾兵十名傳遞事務厄魯特人五十名管理馬匹牲隻緑旗兵五名種地每十臺派緑旗官一員總領管理臺站及種地事務五臺派筆帖式一員總領每臺派委署筆帖式一員登記檔案現在大兵撤回牲隻數目應行裁減每臺設馬四十匹駝五隻兵丁每年給錢糧八個月每月二兩茶葉四個月每月一包其種地收穫糧石即給為口糧所有厄魯特供應口糧之處永行停止至馳驛官兵馬不得過五匹駝不得過一隻跟隨臺兵不得過二名違者參奏凡馳送事件部限六百里緊要事件專行遞送其尋常事件俱交管臺人員於馳送六百里事件之便一併遞送各等語查現奉諭㫖交兆惠雅爾哈善永貴等詳籌臺站事宜毋庸專派厄魯特等承辦以示體恤並令第魯巴前往㑹同辦理兆惠所奏各事宜俱屬妥協應請交與巴里坤辦事大臣及永貴第魯巴等俱照此辦理至噶爾藏多爾濟扎那噶爾布及額林哈畢爾噶一帶各台吉等曾經供應臺站人等牲隻口糧遵㫖賞給伊等緞匹以示鼓勵一併交與兆惠查明賞給奏入上從之平定準噶爾方略正編卷三十二
