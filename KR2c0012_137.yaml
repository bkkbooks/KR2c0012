  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_137-1a, image: WYG0359/WYG0359-0462a.png}
body:
  text: 乾隆二十四年十二月丁丑朔命陞敘闢展辦事効力人員上諭軍機大臣曰定長奏西安馬甲富泰凉州領催巨佛保西安前鋒徳克精額石麟領催卓特巴莊浪馬甲佟其良等辦理臺站屯田事務俱屬奮勉効力謹分别保題等語著加恩授富泰巨佛保為驍騎校遇缺即補徳克精額石麟卓特巴佟其良著交各該將軍等遇有驍騎校缺出以次題補戊寅命解送逆賊霍集占等親屬及隨從人口來京上諭軍機大臣曰定長奏稱兆惠等解送波羅泥都霍集占等親屬十八名口已至闢展辦給口糧送京其隨從男婦等除病故外餘俱解至吐魯番暫行收管請㫖安挿等語此等回人男婦著一同解送來京俟到日著軍機大臣具奏請㫖己夘授定邊右副將軍富徳為領侍衞内大臣諭定邊左副將軍成衮扎布等確查烏梁海被掠情形上諭軍機大臣曰成衮扎布等奏據察達克呈稱扎卜堪哈克圖兩旗五佐領人等在珠特和碩布固烏蘇等處過冬於十一月十二日有哈薩克二百餘人前來搶掠章京黙勒特勒克驍騎校圖瑪達克等十人被害察達克隨帶兵徃探請即行策應防範暫停入覲等語哈薩克性同禽獸伺間搶掠亦事之所有察達克若能追𠞰固善但此等薩達克不知係何部落若阿布賚所屬似不應有此或係俄羅斯烏梁海之間所居哈薩克被俄羅斯煽誘亦未可知總之本非大事惟交察達克等加意探聴防範堵截擒𠞰即須辦理亦待來年成衮扎布仍著來京莫尼扎卜請悉烏梁海情形著前徃查勘一得確信作速具奏俱著𫝊諭知之命陞賞拏獲逃犯之商伯克邁喇木上諭軍機大臣曰兆惠等奏稱解京之喀什噶爾阿奇木伯克墨墨氐敏之子阿卜都里木於中途逃匿為商伯克邁喇木拏獲業將逃犯正法示衆賞給邁喇木縀匹以示鼓勵等語邁喇木以新附之人奮勉獲犯殊屬可嘉著加恩賞銀五十兩以應陞之缺補用仍著舒赫徳傳㫖奨諭嗣後有似此奮勉者即照例辦理諭定邊將軍兆惠等酌量安揷陷賊兵民上諭軍機大臣曰兆惠等奏稱查出先年被賊搶掠之綠旗兵及民人旗奴又上年被掠之巴爾虎喀爾喀綠旗兵逐一詢問遣回各該處其失於查報之將軍大臣官員等應交部議處等語伊等陷身回地若係臨陣得傷倉卒被掠者來投雖晚情尚可原即不妨編入原伍至若中途患病潛匿山林就近逃入回部則其心殊不可問著從寛免其正法照民人例解回原籍所有漏報之將軍大臣官員等分别議處自所應得但大功已竣亦著加恩寛免命瓜勒察兵丁與席伯旗分一體陞用上諭軍機大臣曰據吉林白都訥之瓜勒察驍騎校奨賞孔雀翎烏靈阿等呈報康熙年間伊等與席伯旗分均因獲罪停其授職續因將軍等奏准瓜勒察授職不得過驍騎校遂為定例而席伯等移駐盛京仍邀録用等語瓜勒察席伯等前雖俱停陞轉而席伯移駐後仍照常錄用今瓜勒察等行走頗屬効力著加恩一體陞轉錄用命陞藍翎侍衞啓泰為三等侍衞上諭軍機大臣曰兆惠等奏稱藍翎侍衞啓泰招降奇卜察克布魯特在阿勒楚爾伊西洱庫爾淖爾擊賊直至㧞達克山俱奮勉効力等語啟泰著加恩授為三等侍衞命奬賞孔洽沁公扎木禪等令其即回㳺牧上諭軍機大臣曰扎木禪奉到遣回㳺牧之㫖奏請仍與齊努渾等同徃齋爾錫里地方隨策布登扎布堵賊効力等語誠悃可嘉著再加恩賞縀四端今大功告成仍與多岳特各回㳺牧齊努渾亦著來京辛巳諭㕘贊大臣舒赫徳等令官兵學習牧養上諭軍機大臣曰舒赫徳等奏稱葉爾羌喀什噶爾英噶薩爾三城所留馬駝牲隻應派官兵加意牧養計兆惠交馬七百餘匹駝七百餘隻富徳交馬二百餘匹駝一百餘隻又健銳營官兵三百名馬七十餘匹駝十餘隻索倫官兵五百名馬二百餘匹駝四十餘隻厄魯特官兵二百名馬二百七十餘匹駝七十餘隻等語以滿洲索倫厄魯特人數及所有馬駝相較究屬厄魯特為多索倫次之健銳營兵為數最少看來厄魯特等習知牧事始能如此妥協今滿洲兵多屬少年不知愛養馬駝於軍務未為盡善嗣後宜倣效厄魯特等牧養之法庶伊等駐防有資而推以教習滿洲兵丁更為有益著舒赫徳𫝊諭派出之大臣官兵等即將三城所留馬駝加意牧養至厄魯特官兵等昨已諭令撤回可乘騎所有馬匹歸伊旗分併著遵照辦理參贊大臣舒赫徳等疏奏酌定和闐賦稅舒赫徳等奏言據總兵丑達將和闐六城回人應輸賦稅列欵呈報臣等逐一查核定議一收穫榖石應照各城十分取一因甫經平定酌量減収俟來年另行定數其塔里雅沁地畝所出與佃人分半收取即照舊例辦理一所産玉石視現年採取所得交納一採金三百戸每年照舊例交金六十兩一交納騰格錢文因六城生計未裕暫定為一萬二千騰格俟三年後酌量加增以四千充官兵三百員名鹽菜之需以七千七百分贍各城伯克及􅀈經支用餘三百流轉備用一貿易之伯徳爾格等十戸應交金十兩請俟商人通行後再行交納一六城官果園七處既被賊踐踏基址亦小請賞給各城伯克一和闐難得銅鉛向雖藉葉爾羌等處錢文行使現在咨取内地匠役在葉爾羌鼓鑄俟鑄出時酌量撥解奏入得㫖如所請行癸未諭㕘贊大臣舒赫徳等㑹議伊犂屯田事宜上諭軍機大臣曰同徳等奏大功告成巴里坤所駐綠旗兵二千二百餘名應酌量裁減九百餘名經軍機處議以伊犂現議屯田與其撤回不若候議定就近發徃即伊犂辦理需時亦可先徃昌吉羅克倫等處以漸遷移等語業經允行可傳諭舒赫徳楊應琚等此時曾否㑹議伊犂屯田定在何時即先徃昌吉等處而農具籽種亦湏豫備若來年可以増墾當令兵丁在巴里坤守候其或不能則駐兵守候與撤回後再行派徃孰為便益即徃酌議奏聞至屯田以足軍食自當籌其實濟以内地農民計之一人可食數人而生榖祗有此數終未見匱乏若行之邊方即僅敷屯兵口食無所留餘便屬有名無實矣今已耕之土收穫無多其故安在併𫝊諭舒赫徳楊應琚等與屯田大臣熟計覆奏諭陜甘總督楊應琚等毋禁回人私採硫磺上諭軍機大臣曰楊應琚奏庫車附近採買硫磺宜立法官辦回人不得擅取私藏等語所見殊失大體此在綠旗陋習以為如此立法足見其區處精詳殊不知回部新𨽻版圖以土著之人取土著之物或即向官兵轉售以圖微利亦情理之常安能盡行禁絶若謂不許私藏便可防患其事與撫納降人先收兵器之見等耳且現在官兵進𠞰回人戰則勝攻則取前此何嘗不産硝磺又何嘗禁其採取耶所謂民可使由不可使知非惟事有難行抑亦理所不必也著𫝊諭該督知之乙酉命吐魯番郡王額敏和卓挈眷駐劄新疆上諭軍機大臣曰現在大功告成自應令額敏和卓還家休息但葉爾羌等城俱屬新附必得熟悉回俗老成厯練之人駐劄辦理額敏和卓以舊人効力軍營頗著勞績深悉機宜是以暫令留駐但伊數年來久離家室若仍令其隻身居外朕心更為軫念是以諭照成衮扎布駐劄烏里雅蘇台之例擕眷前徃可𫝊諭額敏和卓量擕家口暫行駐劄俟諸事就緒即可復回著遵照辦理命給庫車阿奇木伯克鄂斯璊助餉價值上諭軍機大臣曰徳文奏稱庫車伯克鄂斯璊因齊凌扎卜領兵五百䕶送降回捐備一月口糧支給起程等語鄂斯璊急公助餉甚屬可嘉著𫝊諭納世通等照數酌給價值以示體恤丙戌諭定邊左副將軍成衮扎布駐候哈薩克搶掠確信上諭軍機大臣曰成衮扎布奏都爾伯特策凌烏巴什領兵三百五十名追襲搶掠烏梁海澤人伊即𫝊知額爾克沙喇等整兵暫駐俟虚銜藍翎塞音台吉都噶爾等探得確信即行進𠞰等語初聞哈薩克搶掠烏梁海之報即諭莫尼扎卜前徃查勘今策凌烏巴什聞信即領兵追襲殊屬可嘉俟查辦確實再加恩奨賞此時成衮扎布若業已起程仍入京與宴或尚在束裝即留彼辦理亦可所得信息作速奏聞丁亥諭䕶軍統領努三等酌量追賊撤兵事宜上諭軍機大臣曰努三奏稱追襲嗎哈沁等至博斯克勒克嶺據嚮導等恐賊人在附近藏匿派索倫營總巴圖魯端濟勒圖厄魯特巴圖等領兵搜捕伊等隨後策應如未能弋獲即遵㫖撤回等語努三雖派官兵追賊仍須親徃督率若擒獲渠魁即解京正法餘人俱遵節次諭㫖辦理將厄魯特等酌量遣徃烏魯木齊其帶領前來各隊官兵撤回巴里坤辦給車輛各回原處或賊已逺颺亦作速奏請撤兵俟來年再為辦理戊子諭參贊大臣舒赫徳等約束安揷降回上諭軍機大臣曰徳文奏稱齊凌扎卜等解送回人内有喀什噶爾等處男婦六十七名口安揷庫車葉爾羌等處男婦五十七名口安揷沙雅爾等語從前兆惠處請將收降回人安揷吐魯番曽諭以大功既成伯徳爾格塔里嗎沁烏沙克等回人俱從寛免死其餘回衆不必逺行安揷即留于各城若係葉爾羌喀什噶爾之人業已前來亦無庸復回遇便安揷此次人數不多即如所奏辦理但此等隨從逆賊之人恐怙惡不悛逃竄滋事著駐劄大臣等留心約束稍有可疑即酌量辦理庚寅諭定邊左副將軍成衮扎布等籌辦進兵哈薩克事宜上諭軍機大臣曰成衮扎布等奏據駐納米爾沙扎海卡倫之原任藍翎侍衞布三泰報稱伊至吹阿勒和碩遇内大臣察達克等曾詢問帶傷之哈薩克人告稱搶掠烏梁海係阿布賚宰桑噶里卜有衆五百人由吹阿貝喀卜齊勒路前來仍于來路轉回請仍照前奏領喀爾喀兵一千合都爾伯特烏梁海之衆前徃勘明就近追𠞰等語阿布賚係久經歸附之人豈敢妄動但伊不能約束所部以致乘間搶掠亦未可定自當痛加懲創此時亦不必遽徃且俟察達克策楞烏巴什莫尼扎卜等查奏於來年辦理所有糧餉馬匹則須密為豫備成衮扎布仍駐劄軍營令䇿布登扎布來京筵宴畢即同富徳等領索倫兵五百名派扎哈沁都爾伯特等千餘名餘于喀爾喀揀選約兵二千俟草青時乘哈薩克不備相機進𠞰一切密查妥辦即察達克等亦不必先使與聞惟期一舉蕆事以飭邊防而昭國法俱著𫝊諭知之辛夘諭㕘贊大臣舒赫徳等派索倫兵駐防烏魯木齊上諭軍機大臣曰成衮扎布等奏哈薩喀搶掠烏梁海係阿布賚屬人看來必非阿布賚本意乃所屬托名滋事但哈薩克人等素性喜于儌倖一面在烏魯木齊貿易一面在他處搶掠亦事之所有若不加防範則存貯貨物亦有可虞固不必先事張皇亦當豫為防範著𫝊諭舒赫徳等回部俱有城郭駐兵亦多即如阿克蘇現在無事著將所留索倫兵調徃烏魯木齊如有不敷即于葉爾羌等城抽派約三百名前徃巡察彈壓至辦理貿易之安泰等如遇哈薩克貿易留心偵探察看若來人少而馬匹牲隻多自無可疑否則未可全信當相度情形密為防範伊等即忽然竊發我已有備無患但不可以風影之疑自露形跡使逺人惶惑安泰等於哈薩克情形諒所素悉一切加意慎宻庶可杜儌倖之端亦不啟猜疑之釁方為妥協壬辰諭定邊左副將軍成衮扎布等令察達克等偵探哈薩克確信上諭軍機大臣曰成衮扎布奏據察達克等報稱哈薩克搶掠之時因分㪚㳺牧一時難聚是以追襲稍遲且未奉諭㫖不敢遽進等語察達克等所屬被掠自必奮思報復其候㫖始進亦係遵守法度但哈薩克所屬頗多諒非阿布賚㳺牧所為察達克等若能整兵前徃捉生詢問亦可得確實信息惟進兵之時不必以奉㫖為言蓋哈薩克等既經内附若小有盜竊即云奉㫖發兵則伊等未免驚懼現在大兵未進亦未免妄生輕玩且阿布賚等或遣使奏聞自可覘其虚實此時察達克若已前徃即令莫尼扎卜同行亦不必使哈薩克知之癸巳申諭定邊左副將軍成衮扎布等詳詢烏梁海被掠情形上諭軍機大臣曰昨據成衮扎布奏達薩克所掠烏梁海内脫出十餘人請令額爾克沙喇與莫尼扎卜前徃詢問并加撫恤等語烏梁海被掠一事可疑處頗多必須查詢明白方得辦理之法朕意或俄羅斯等欲阻阿布賚之内附托名搶掠或哈薩克以從前曽附俄羅斯被其詰責故以搶掠示信或阿布賚不能約束所部致其妄動或哈薩克錫喇尚存煽誘生事大槩不出此四端著𫝊諭成衮扎布即交額爾克沙喇等詳悉訪問作速奏聞仍與察達克等密商辦理定邊右副將軍富徳疏奏白都訥驍騎校署㕘領遜塔奮勉効力得㫖遜塔著賞戴孔雀翎授為三等侍衛甲午辦理屯田副都統定長等疏奏查訊隨徳舒遇賊脫出兵丁定長等奏言臣等遵㫖查訊隨徳舒遇賊脫出之綠旗兵丁除得傷不議外其無傷而脫出最後者雖詢無臨陣先逃情節仍行責革至兵丁李升蘭郭永榖尋獲徳舒身屍李善敏步行報信又遊擊素爾登額陣亡兵丁張倉右脇得傷仍尋獲本官身屍應請免議其李升蘭等三人俱鞭責發徃庫車効力贖罪奏入報聞乙未申諭定邊左副將軍成衮扎布哈薩克貿易情形上諭軍機大臣曰永徳奏哈薩克阿布賚屬人帶馬五百匹赴烏魯木齊貿易閱其情詞頗為恭順看來搶掠烏梁海者非阿布賚屬人朕昨以可疑之四端指示若有一於此則冒昧進兵反墮其術中故必詢問明白非謂大功告成遂可苟且姑息也額爾克沙喇等可告知察達克此時且不必直入哈薩克界俟促生詢問得實具奏朕再酌量辦理丙申諭駐劄大臣陜丼督撫等查拏厄魯特等逃犯上諭軍機大臣曰據阿桂奏稱現在阿克蘓拏獲厄魯特匪犯三名皆官兵隨僕盜馬潜逃業經訊明正法示衆等語此等厄魯特皆𠞰戮之餘管束三年惡習尚未悛改阿克蘇既經拏獲則沿途必尚有脱逃者若不嚴行查拏致流為嗎哈沁地方何由寧謐著通諭哈密巴里坤闢展烏魯木齊哈喇沙爾庫車等處大臣務宜留心拏獲訊明正法至分賞官兵之回人等有似此盜竊脫逃者亦照例辦理併𫝊諭楊應琚呉達善阿桂知之㕘贊大臣阿桂疏奏預籌伊犂兵糧阿桂奏言臣到阿克蘇查看牧羣牛羊除從前解徃葉爾羌一萬餘現存牛三十二頭羊一萬五千三百餘隻竊思來年伊犂駐防官兵所需糧餉須待回人收穫後方能支給其起程時所需行糧必需牛羊添補臣已飭該管官兵加意牧放以濟軍需奏入報聞丁酉參贊大臣舒赫徳等疏奏辦理回人貢賦稅務舒赫徳等奏言查兆惠等定議葉爾羌事宜内凡交納商稅外來商販二十分取一本地回人十分取一請俟商販流通時再行酌量定額等語今據自土伯特商販轉回之㧞達克山塔什罕及葉爾羌等處回人運到貨物臣等飭交該管之員仍照舊例分别收稅謹列單恭呈御覧嗣後徵收稅項應請于嵗底造冊送部核銷又和闐六城所交糧石舊例十分取一每年二千帕特瑪因甫經撫定酌量暫収九百九十五帕特瑪一帕特瑪準官石四石五斗共四千四百七十七石五斗俟來年仍照舊例徴収又招撫之沙爾呼勒伯克穆喇特告云我等所管五百戸僅餘二百餘戸今聞霍集占㐲誅自必陸續投回向例每戸貢金一錢請于來年照例交納並請添設商伯克哈子阿爾巴卜瑪喇咱爾等缺臣等照例給以翎頂令其協同阿奇木伊沙噶辦事奏入報聞戊戌命賞多倫小伯克等翎頂及陞賞効力官員上諭軍機大臣曰書山奏稱總管阿布都賚安揷多倫回人四千六十餘名于玉古爾庫車勒策達雅爾羊雜爾等四處令小伯克海底勒額帕舒庫爾密喇三克里達瑪特等分管現在率同吐魯番公素賚璊遊擊黃佳士悉心查辦等語海里勒等五名既係小伯克著加恩賞給六品頂帶素賚璊著賞縀二端黄佳士著以應陞之缺補用巴里坤辦事道銜同徳等疏奏添派臺站馬匹同徳等奏言查凱旋官兵及入覲回人等長途需馬接濟已奉諭㫖於巴里坤牧羣内挑選一千兵由哈宻至葉爾羌按臺安設今准兆惠等行文辦解肥馬五百匹至吐魯番附近之伊拉里克等處牧放以備更换等語臣等復㑹同總兵存泰如數挑選馬匹令參將齊大勇解送伊拉里克于十二月初九日起程奏入報聞己亥定邊將軍兆惠等疏奏率同伯克霍集斯來京兆惠等奏言查伯克霍集斯與臣富徳自㧞達克山撤兵回抵葉爾羌伊等歸烏什整裝約於阿克蘇㑹同入京臣等若阻其前徃恐啟猜疑即遣赴烏什臣等至阿克蘇伯克霍集斯率伊子托克托索丕來㑹今與臣等同行毫無疑貮臣等派伊同玉素富約束衆回人伯克行走伊子漠咱帊爾呼岱伯爾氐托克托索丕俱已成丁其幼子尚有幾人亦交舒赫徳查核辦理奏入上諭軍機大臣曰兆惠等宻奏伯克霍集斯業已同行其諸子自成丁之外幼者尚有幾人交舒赫徳查辦等語從前宻諭辦送霍集斯及諸子來京者恐其仍居舊地或滋事端今霍集斯既情願入覲而沿途行走情形又毫無可疑則伊來京後自必加以恩賞俾得安居此時漠咱帊爾等尚須辦理起程併傳諭舒赫徳等遵照節次諭㫖毋使長途勞苦伊等起程後則所查霍集斯之家口不妨明白曉示以霍集斯䝉恩㫖留京來取家屬團聚務宜供給饒裕加意照看蓋伊等非獲罪之人籍沒家産者可比所有積蓄俱一同辦送仍約束兵丁回人毋許妄行偷竊其田園房屋亦應變價給賞以資生計俱著查明具奏癸夘訓飭内閣學士清馥速奏追賊情形上諭軍機大臣曰清馥奏據嚮導根敦等所指道路南路由諾顔鄂博額什等處抵楚庫爾戈壁北路由烏蘭庫勒等處搜賊人營壘因水草甚乏令茂庫本等領兵二十餘名前徃其餘官兵撤回巴里坤等語所奏愈屬不堪前因清馥探得賊人藏匿處所並未親身前徃故十月以前屢經降㫖申飭今已十二月並未遇一嗎哈沁不知伊現在何處且伊前遣巴圖克勒木徃招其子斗齊特故縱其父子同逃耳不然豈有賊人肯坐候我兵擒獲此時賊人去向更覺茫無影響而徒作懼罪請追之詞茍延時日苦累官兵諒數月以來行糧恐亦不繼伊身獲咎忍饑固所當然而官兵皆隨同枵腹有是理乎著速傳諭清馥奉到此㫖若十日内能捕獲賊人自當前徃其或不能即撤回巴里坤將從前伊何以不親身捕賊但遣巴圖勒克木前徃及斗齊等今徃何處聲明請罪具奏乙巳諭㕘贊大臣舒赫徳等辦理伊犂屯田事宜上諭軍機大臣曰阿桂奏稱兆惠等經過阿克蘇㑹議伊犁駐兵及遷移回人屯田事冝從阿克蘇烏什賽里木拜庫車沙雅爾等城酌派回人二三百戸於來年二月間先遣丁壯前徃屯田以官兵五百名䕶送起程俊青草生時再將回人家口遷移等語所議尚屬可行兆惠此時雖未具奏即應如此辦理至屯田回人需兵彈壓自阿克蘇至伊犂安臺𫝊事聲息相通最闗𦂳要著𫝊諭舒赫徳阿桂今大功告成㧞達克山霍罕等部落悉皆歸附則葉爾羌自可安静無事且有額敏和卓在彼海明又已前徃舒赫徳候其到時即回阿克蘇駐劄辦事阿桂伊柱即領駐防兵丁䕶送回人徃伊犂管理屯田事務至官兵等居止自必相度地勢安營立寨土木之工以漸興作期于堅固久逺所請備造帳房原非可以常用不過自阿克蘇至伊犂沿途住宿及初到時不致露處耳所有應行事宜俱著伊等㑹商辦理丙午議移駐官兵事宜安西提督劉順奏言現議官兵移駐巴里坤歲需口糧運送回空總計需銀四十七萬餘兩殊為繁費即闢展烏魯木齊等處收穫糧石足用而相距千餘里運費亦繁查移駐巴里坤兵三千五百名内步兵一千四百名請全行改撥馬兵按每石加増銀一兩五錢之議共銀一十一萬餘兩較之運費嵗可節省銀三十六萬餘兩且馬兵錢糧較歩兵寛裕易於辦理並懇借庫銀五萬兩照䝉古之例採買牛羊孳生並買馬駝運送所借銀兩分作四年扣還奏入得㫖軍機大臣議奏尋議移駐官兵口糧嵗所必需巴里坤雖現在屯田止産青稞一種是以臣等原議以加増兵丁糧價自行購買殊費周章請令該督等查明屯田嵗收若干足敷官兵口糧與否通行籌畫妥議具奏今該提督以闢展等處收穫即敷口糧而運費亦繁等語查提督原駐安西經該督楊應琚奏請移駐巴里坤但巴里坤以外西至伊犂西南至葉爾羌等回部幅員廣衍而闢展烏魯木齊一帶地土饒沃水泉充裕現在駐兵屯田交通貿易久成内地莫若將提督之提標五營内酌留兵丁足敷巴里坤城守外其各營官兵即移駐烏魯木齊或闢展等處于嵗收屯糧内就近支給既可省輓運之勞而於新疆適中之地控制更為得宜其如何建設衙署營房及一切妥協商辦之處該督楊應琚現在出闗查勘應令其詳悉定議具奏奏入上從之平定準噶爾方略正編卷八十三
