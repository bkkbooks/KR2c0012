body:
  text: 乾隆二十四年夏四月辛亥朔申諭定邊將軍兆惠等應援和闐各事宜上諭軍機大臣曰兆惠等數日來未有奏報想瑚爾起等領兵已抵和闐此時和闐若無他故則伯克鄂對及侍衛齊凌扎卜等勞績懋著俱應加恩蓋伊等以緑旗兵數百與回人雜處尚能保守和闐較兆惠等有滿洲索倫兵數千者為更難今軍營侍衛頗多足敷調遣除伯克鄂對仍令駐劄和闐外齊凌扎卜噶布舒著即來京休息再去歲派出滿洲索倫察哈爾兵原以更替久在軍營者俾得撤回因兆惠等被圍復行發往此次平定葉爾羌後即令各回本處不必再行陳奏候㫖仍將朕軫念伊等勞苦之處曉示知之又諭曰昨兆惠等請將烏里雅蘇台存貯箭枝送往軍營因哈密巴里坤現在運送已降㫖停止但此項箭枝係在京王大臣所進甚為精好除現送十萬枝外所餘十萬枝前據黃廷桂奏已分派各營著傳諭吳達善仍行查出送往哈密以備軍需命稽察內地臺站上諭大學士曰現在青草發生正當大兵進𠞰之時各處軍臺最關緊要自哈密以外已降㫖令五吉定長等悉心整頓其哈密以內臺站各該督撫等辦理尚屬無誤著再傳諭令其督率専司軍臺大員往來照看實力稽察務使馬匹臕壯遞送迅速以收實效癸丑定邊將軍兆惠等疏奏應援和闐各事宜兆惠等奏言臣等途次聞和闐被圍已遣瑚爾起等領兵九百往援抵阿克蘇時馬駝不足因應援事急臣富德同舒赫德等挑選緑旗兵一千二百名每人給馬一匹令其牽馬步行定於三月初十日起程俟𠞰滅賊衆後由㾗都斯坦等路堵截逃賊即從彼往取葉爾羌至臣富德原議派馬兵三千步兵二千今合算瑚爾起之兵共二千一百餘名其八百餘名留副都統瑪瑺侍衛老格等管領俟馬駝軍器送到再行進發臣兆惠催齊馬駝糧餉亦即向葉爾羌進發又准瑚爾起等報稱二月二十日至和闐之達里雅河遇侍衛噶布舒遣往阿克蘇之回人等詢知額里齊哈喇哈什二城尚未失陷餘皆為賊所據若此時葉爾羌無賊衆前來尚可支持即儘力速行往援等語臣富德亦即領兵進發奏入上諭軍機大臣曰覽兆惠等所奏瑚爾起呈報和闐情形看來霍集占力已窮蹙兆惠等於正月十四日解圍而出至二月初二日相距已半月餘和闐回人尚云葉爾羌未有賊衆前來是從前圍守軍營及侵犯和闐不過烏合之衆一經𠞰殺逃散更多兆惠等應就現在兵力加意奮勉以冀大功速成再前諭福祿不必在參贊上行走今著仍其舊任昨又命明瑞為參贊大臣計伊等兩隊參贊大臣富德處較少著阿桂在伊隊內行走瑪瑺老格曽諭令來京今來奏似尚未得㫖若己隨富德前往和闐仍著領隊行走又諭曰兆惠等奏稱目安集延前來之布魯特和碩噶爾禀稱從前搶掠喀什噶爾之英噶薩爾城係布魯特呼什齊部落之納喇巴圖等語和碩噶爾何事來至軍營或係貿易到彼或因去嵗約其春間至伊犁投見可因便覆奏諭參贊大臣舒赫德酌給臺站回人口糧上諭軍機大臣曰舒赫德奏稱富德應援和闐安設臺站派察哈爾兵二十名緑旗兵五十名辦給馬駝口糧又回人三十名伊等情願自備口糧未經另給等語回人新附未便令其自備口糧可傳諭舒赫德將所派回人照軍糧折給價銀以示體恤嗣後派出回人即遵照辦理命賞乾清門侍衛瑚什等整裝銀兩上諭軍機大臣曰據兆惠等奏稱乾清門侍衛瑚什額爾登額科普薩䝉古勒侍衛班領永德來軍營時未給整裝銀兩今派出伊等進𠞰請借給二年俸銀咨明坐扣等語瑚什等自京起程既未領過整裝銀兩著加恩賞給伊等二年俸銀不必坐扣甲寅議山西撥解馬匹山西巡撫塔永寧奏言山西營驛馬匹於上年七月內挑送二千六百餘匹前赴肅州久經購補足額今聞陜甘馬匹缺額未補者尚多臣於各營馬匹內擇其臕分充足者二千一百匹可否解至安西補缺或送往肅州備用奏入得㫖軍機大臣議奏尋議西安滿營缺額馬匹前經遵㫖令方觀承節次代購二千五百餘匹無須再為抵補惟甘省軍務未竣自應多備馬匹但由山西至肅州長途未便解送臣等酌議請將西安滿營之馬挑選二千一百匹解赴肅州備用其山西馬匹即解赴西安補缺所有西安解肅馬匹或留肅飼秣或交巴里坤大臣牧放聽候調撥應令吳達善酌量情形奏明辦理奏入上從之丙辰諭辦理屯田副都統定長派送糧運駝隻上諭軍機大臣曰吳達善奏稱辦送軍營駝隻七千尚餘駝一千二百隻現在糧運緊要行文五吉令其擇出一千隻送至闢展備用等語適因富德等將糧運駝隻帶往和闐購補缺額不易議將哈密闢展庫車等處現有駝騾輕為䭾載送至阿克蘇原屬通融辦理今哈密既送䭾一千隻即當送往阿克蘇以應急需著傳諭定長不必拘泥前議止圖節省駝隻以致糧運稽遲總之辦理軍需惟在相機行止方有實濟此項駝隻可即行解送丁巳命閩浙總督楊應琚調補陜甘總督上諭大學士曰前有㫖諭閩浙總督楊應琚來京原以將來陜甘事務非一總督所能經理今明德現在丁憂一時乏人吳達善著以總督管理甘肅巡撫事務陜甘總督員缺著楊應琚調補楊應琚未到任之前吳達善仍兼管總督事務己未哈密辦事內閣學士五吉疏奏合計軍營糧餉五吉奏言派出軍營新舊兵丁共二萬二千餘名尚有一半未至阿克蘇先經舒赫德等酌計口糧行取採買羊隻查軍糧自上年八月起由哈密運至闢展共四萬石現在陸續轉運又甘肅購辦羊五萬餘隻合之巴爾品等所購計十一萬餘隻縱路逺倒斃亦可供二萬兵丁三個月之食其闢展轉運糧石可支至本年九月接濟無誤奏入報聞庚申議酌派駝隻事宜辦理屯田副都統定長等奏言解往軍營駝隻須俟將軍行知應用數目將已過闢展者即解赴軍營其餘截留補給臺站如全數俱過則托克三哈喇沙爾庫車現有未運之糧即可酌量派運接濟奏入得㫖軍機大臣速議具奏尋議軍需最關緊要駝力亦宜撙節惟在酌量情形通融辦理若駝隻本多自應將進𠞰運糧一體應付或一時偶乏又當視其緩急先後撥補不得存畏難之見致有拘泥現據吳達善奏解駝隻於備送軍營外仍有餘駝足供糧運自可無憂缺乏定長等惟宜查照辦理奏入上從之命察核屯田收穫分數定議官員功過辦理屯田副都統定長等奏言上年闢展等五處屯田收穫共三萬七千三百餘石今全數碾出通計上年奏過數目喀喇和卓托克三哈喇沙爾三處仍與原數相同惟烏魯木齊遊擊金梁較原數多收三十四石闢展都司瑪呼地畝本多較他處共多出四百一十石俱交管糧官員等照數存貯訖奏入上諭軍機大臣曰屯田糧石關係軍需定長等所報碾出數目有較上年加增者皆承辦之員實心經理所致著加恩將都司瑪呼等交部議叙嗣後各處屯田除收穫較多者准其奏請議叙外如較原報之數虧缺無多著暫行登記准以下次盈餘抵補倘再有虧缺即照所缺之數分别議處庶承辦各員知所勸懲可傳諭令其遵照辦理辛酉申諭定邊將軍兆惠等速籌進𠞰事宜上諭軍機大臣曰前因兆惠等籌議進𠞰所需兵馬過多因思數年來如進𠞰準噶爾哈薩克皆係大舉即如初次西路進𠞰僅用兵一萬六千馬五萬駝七千餘彼時從巴里坤至伊犁沿途皆厄魯特遊牧反覆無定今全部蕩平惟逆回竄伏巢穴較之準噶爾難易何如兆惠等俱親歷行陳豈不知此朕意有徑旅五千即可橫行無敵就令不足則以萬人當之何至尚虞力弱耶伊等身當重任聞朕令將派出兵數減省萬一不能集事必有後言然事勢本可不需亦何必固執成見且自阿克蘇至葉爾羌不過如巴里坤至烏魯木齊千餘里之遙而霍集占摧敗數次尚有何力量此皆伊等所宜籌及者可傳諭兆惠富德等惟就現在兵力應機速進至舒赫德將所調駝數行知定長而定長又諉之吳達善往返商辦多屬其文著將節次議奏事宜録寄兆惠等閲看令其籌畫進𠞰情形具奏命奬賞庫車辦事伯克鄂斯璊上諭軍機大臣曰據舒赫德奏稱公品級伯克鄂對之子鄂斯璊年雖少而辦事敏練等語伯克鄂對駐守和闐甚屬奮勉是以加恩賞給公品級今伊子在庫車辦事亦能盡心效力著加恩賞鄂斯璊三品頂孔雀翎舒赫德即傳㫖奬諭癸亥命賞給陷賊得脫之索倫等兵丁銀兩上諭軍機大臣曰成衮扎布奏稱從唐喀祿隊內被逆賊舍楞等誘陷之索倫兵一百三十八名察哈爾兵三十五名脫出後發回游牧酌量每名借給銀六兩令各該處照數扣還等語此等兵丁俱經力戰今既撤回應酌量賞給整裝銀兩所借之項著不必扣還以示體恤甲子命奬賞購買牛羊之烏蘭察卜郡王阿喇卜坦多爾濟等上諭軍機大臣曰據巴爾品奏稱盟長郡王阿喇卜坦多爾濟副盟長貝勒拉旺多爾濟等承辦官買牛羊甚為出力等語著分别賞給縀匹以示鼓勵乙丑議調糧運駝隻進兵事宜定邊將軍兆惠等奏言臣等先擬此次進𠞰需兵二萬咨行屯田大臣挑選緑旗兵二千名以符額數因計內地解來駝隻不敷䭾載將所調兵丁咨明停止今進兵期近駝隻仍未到來查從前屯田大臣奏准運糧駝五千隻分派闢展等處臣等愚見與其往來轉運徒致疲乏莫若每駝運糧一石由各該處送至軍營即留為進兵之用臣等㑹商阿克蘇辦事大臣舒赫德據稱分派阿克蘇駝一千五百隻除倒斃外已將一千二百隻交富德前往和闐又續到駝一千一百餘隻除倒斃外存九百餘隻已照原議交卸後發回庫車等語竊思此次進兵必於五月內由阿克蘇起程乘回地麥熟之前抵葉爾羌方妥倘駝隻不足恐誤軍行請將闢展等處現駝三千餘隻俱令運糧前來留備進𠞰俟內地續解駝隻到日補給糧運奏入得㫖軍機大臣議奏尋議適因舒赫德等將富德帶往和闐駝隻請於兆惠等奏辦駝一萬隻內撥補臣等議將去年往阿克蘇運送軍需及辦給西安滿兵厄魯特緑旗兵及陸續運糧駝隻騾頭輕裝䭾載送至阿克蘇以備進𠞰今兆惠請將闢展等處駝隻每駝運糧一石留備軍行與臣等所議相同應再行知各該處大臣等查照原議及兆惠等所奏辦理奏入上從之諭定邊右副將軍富德應援堵截各事宜上諭軍機大臣曰富德奏稱從前自伊犁過巴勒琿嶺進取喀什噶爾之奏因爾時未至回地今既應援和闐當於事定後探兆惠進兵信息夾攻賊衆仍堵截㾗都斯坦等要路等語皆朕屢諭及之者可傳諭富德即悉心奮勉前往所奏請加大神威逺等炮位號俟兆惠處查奏到日一體酌擬加給其得傷侍衛老格喀勒扎布西爾庫勒那木查爾乾清門三等侍衛塔爾海等懇留軍營效力深屬可嘉併傳諭知之訓諭副都統愛隆阿上諭軍機大臣曰據愛隆阿以奉到議叙恩㫖給與世職奏謝前來愛隆阿乃駐劄烏什大員現在本地情形及回人生計若何自應詳悉陳奏乃僅以己身䝉恩之處奏謝無一語及於地方著傳諭詢問令其明白回奏定邊將軍兆惠等疏奏優恤陳亡回人及審訊降回情節兆惠等奏言據阿克蘇回人阿卜都什呈稱本城伯克等前遣我兄圖里克默特迎降歸途遇賊中鎗暈絶後五日往尋尚活調養平復又為靖逆將軍等嚮導至葉爾羌陳亡等語經額敏和卓查核屬實伊子尚幼請將阿卜都什用為管事小頭目又烏什降回托克托默特因妄報軍營多得糧食馬駝等事奉㫖拏解審訊臣等訊得托克托默特因母兄妻室在吐魯番烏什竊馬來投所告大兵掘糧雖未至一百六十窖之多然尚有其事其餘亦屬有因又臣等擒獲回人供稱波羅泥都因牧羣被竊曽將該管之人殺戮似非逆賊所遣間諜應請同伊母兄妻室等交吐魯番公素賚璊安插管束奏入得㫖圖里克默特陳亡可憫著酌量賞恤銀兩縀匹餘照所請行丁卯諭定邊將軍兆惠等偵探賊人信息酌定進兵日期上諭軍機大臣曰兆惠等此時尚未進兵先宜偵探葉爾羌等處賊衆情形以定謀略雖現在官兵馬匹未必能捉生詢問亦當多方措置看來阿克蘇烏什等城回人必有與霍集占等賊黨熟識者兆惠即與額敏和卓玉素富等計議於伊等所知回人擇其可信者遣往葉爾羌喀什噶爾將彼處作何預備情形詢訪明白自屬有益若慮所遣之人或為賊所得轉使知我備細不知逆賊狡詐我即不遣人偵探亦斷無坐待我兵全無知覺之理兆惠等止應將不深悉軍前情事之人遣往并勿泄進兵之期庶為妥協再從前伊等擬於麥熟時進兵適據達爾黨阿等奏稱解往軍營馬匹約五月二十以外可抵阿克蘇等語此項馬匹送到後尚須飼秣一二旬恐致逾期又難因糧於敵朕意若不能速至竟將馬匹加意牧養尤可得力但不知彼處麥熟究在何時收穫後再種雜糧否亦宜相機辦理不必拘泥此㫖庚午議進𠞰糧餉事宜參贊大臣舒赫德等奏言大兵進𠞰糧餉最要今阿克蘇所餘無幾臣等咨行定長吳達善等將闢展所牧羊一萬五千隻牛一千五百隻兒騾馬五千餘匹儘五月內送到可作二十餘日行糧候肅州購送羊五萬隻接濟共敷行糧四十五日今據定長咨覆前項牲隻除倒斃外餘多瘦癩俟三月間青草發生挑選趲送等語恐不能如數刻期此時肅州及阿拉善部落所辦牛羊應已出口又哈喇沙爾存糧千餘石即咨催該管大臣等調撥駐臺駝隻運送臣等亦以銀布等物换易回人糧石奏入得㫖軍機大臣議奏尋議兆惠等昨請以闢展等處駝五千隻每駝運米一石業經准行又定長奏闢展挑送羊七千隻巴里坤送羊一千五百隻五月內可到益資接濟且適奉諭㫖如已過麥熟之期即加意牧養馬匹俟回人種植成熟再行進𠞰為期更寬將來糧運可以陸續全到自屬充裕至現在官兵口糧自有各城所收麥石支用應仍照原議辦理奏入上從之授頭等侍衛伯克噶岱默特為拜城伯克辛未命升賞索倫驍騎校庫爾布德等上諭軍機大臣曰兆惠等奏稱遵㫖升叙侍衛成果等十人內奬賞孔雀翎索倫驍騎校庫爾布德察哈爾護軍校索諾木奬賞藍翎索倫領催泰保察哈爾領催敦多克等本旗並無應升之缺乂奬賞孔雀翎索倫馬甲綽爾布鼐數次效力出衆等語庫爾布德索諾木俱著授為三等侍衛索諾木仍在參領上行走泰保敦多克授為藍翎侍衛綽爾布鼐著授為驍騎校賜號肯特克巴圖魯賞銀一百兩參贊大臣舒赫德等疏奏酌議烏什回城賦稅舒赫德等奏言臣等昨請定歸順各回城田賦其烏什城俟貝勒品級霍集斯到日定議續據報稱霍集占更改舊例於徴收地畝外增羊隻四十取一之條波羅泥都惟於地畝十分取一不徴羊隻今供給大兵應視現在物力如何似難定為成例等語又據伊子呼岱巴爾氐報稱烏什馬匹除派出外所餘無幾其糧價現在較前昂貴應請酌定等語臣等加以撫慰令其照前辦理至霍集斯已前往富德軍營臣舒赫德領富德所留兵八百名候馬駝軍器齊備亦即前往其阿克蘇辦事僅永貴納世通二人應否俟巴祿到來令其協辦請㫖遵行又遊擊伍凌阿曽於庫車力戰得傷現在和闐同齊凌扎卜等堅守查伍凌阿因遺失炮位革職可否暫行留任出自特恩奏入上諭軍機大臣曰據舒赫德奏請遵㫖前往和闐但富德已與霍集斯同往阿克蘇亦屬緊要著仍留辦事其富德所留之兵著巴祿帶領行走所奏伍凌阿既派往防守和闐著仍留原任定邊將軍兆惠等疏奏籌辦進𠞰回部兆惠等奏言臣等前奏需兵二萬名馬三萬匹駝一萬隻因未知內地辦送實數是以約略具奏及至阿克蘇即檄止所調屯田緑旗兵並撤出西安滿兵馬匹俾進𠞰官兵得有實濟計逆回所恃只有二城且賊騎不過五千臣等就現在馬駝口糧派兵前進務期蕩平回部上慰聖心奏入報聞壬申諭參贊大臣明瑞等體察霍集斯情形上諭軍機大臣曰昨據舒赫德奏霍集斯酌議賦稅等事看來殊不可信即如所稱霍集占例外徴羊以致傷損部落波羅泥都並不如此辦理等語其與波羅泥都相契已屬顯然但以現在事勢不獲霍集占不止而既獲之後伊可與波羅泥都留於彼處則甚為得計或欲俾波羅泥都擒送霍集占以自贖亦未可知故明降諭㫖令兆惠與伊同辦此事若果能招降波羅泥都將霍集占擒獻則大局已定伊等亦易於辦理不過令其入覲陸續前來再將伊妻子送京最為妥協此事大有關係可𫝊諭明瑞惟與兆惠富德額敏和卓等體察情形加意慎密辦理命散秩大臣達什策凌之弟延扎卜來京上諭軍機大臣曰據兆惠等查奏陳亡之厄魯特散秩大臣達什策凌並無子嗣惟一弟延扎卜年尚幼稚等語延扎卜著加恩授為藍翎侍衛令其來京居住諭參贊大臣舒赫德豫籌伊犁屯田事宜上諭軍機大臣曰現在內地解送馬駝將抵軍營兆惠等帶領前進攻城獲醜軍務不久告竣兆惠富德明瑞年來多著勞績應行回京舒赫德前經獲罪朕加恩復用自當暫留效力將來回部即仍其舊制而伊犁則必須官兵駐守其兵糧即於回人所出租賦內支給不勞內地轉餉方為妥協其回人租賦足養兵若干亦當查詢預備至各城回人向於準噶爾時派往伊犁耕種將來仍行辦理但厄魯特等調遣回人未必如內地屯戍兵丁辦給行裝糧餉繁費如許可𫝊諭舒赫德留心詢問得實酌議具奏定邊右副將軍富德等疏奏應援和闐收復哈喇哈什等城富德等奏言臣等領兵於三月二十五日至葉爾羌河之克木阿克齊據副都統瑚爾起等報稱初四日至蘇爾統岩里克遇侍衛齊凌扎卜自哈喇哈什來告初三日夜賊將哈喇哈什攻取等語我等即急往策應初六日至和闐額里齊時賊望風即逃尾追二十里俘獲三人詢知三日前賊人將行裝送回葉爾羌留騎賊在此今俱逃走續有守城之伯克鄂對侍衛噶布舒納爾布等相㑹我等即同齊凌扎卜等於初九日黎明至哈喇哈什忽大霧瀰漫人不相見捉生詢問知有騎賊六百人步賊百餘人在博羅齊駐營因乘霧繞出賊後午刻行抵賊營賊始知覺接戰官兵奮擊賊衆奔潰追過皂窪勒河計勦賊百餘人收取馬駝牲隻軍器次日分途搜𠞰獲賊十餘人供係從葉爾羌隨阿卜都克勒木前來昨大兵猝至射死頭目阿卜都哈里克霍集雅斯其鄂斯璊中箭達腋逃回等語初十日回至哈喇哈什齊凌扎卜等將賊營所掠及逃散回人千餘俱行安插十一日至額里齊將附近之玉隴哈什城內回人俱行收復令於各村莊居住又遣前鋒五十八索倫兵鄂提雅往齊爾拉城同伯克密喇等收獲逃散回人四千餘户其克勒底雅塔克二城亦馳書前往招撫令其頭目來見等語臣等初遣瑚爾起時未敢望成功如此之速皆賴我聖主威福上天垂佑之所致也又據噶布舒等呈稱額里齊城先係索倫署驍騎校烏爾圖保等固守是時克勒底雅齊爾拉伯克阿里木沙錫魯卜及玉隴哈什之伯克等俱突圍入城遊擊伍凌阿領緑旗步兵五百名至哈喇哈什亦入城協助并通信塔克之伯克等不可從賊其克勒底雅齊爾拉所餘回衆降賊將阿里木沙等妻子執徇城下人心動搖陷在朝夕幸得救援賊始奔潰等語又齊凌扎卜呈稱賊黨前至哈喇哈什攻圍數日又分遣賊衆攻額里齊噶布野等前往守禦我與守備富能領兵守哈喇哈什因城內乏水於城外掘二井派兵防守三月初三日賊將井填塞人心益搖爭先逃走因突圍而出適與瑚爾起相遇等語并據齊凌扎卜噶布舒等查出效力及陳亡得傷官兵三十九員名瑚爾起遣送文書之回人鄂碩爾多爾瓦曽隨伯克鄂對等安撫回衆嚮導回人喇木圖拉俱伯克霍集斯所屬又瑚爾起隊內伯克鄂對之姪阿卜都爾滿噶布舒隊內嚮導回人默們俱奮勉效力霍集斯所屬回人阿什默特領兵力戰造箭給軍查獲賊藏糧石妻室子弟俱為賊害應請㫖交部議叙議恤及酌量奬賞奏入上諭軍機大臣曰富德奏據瑚爾起等領兵前至和闐賊衆聞風潰散恢復各城深為嘉悅前所加兆惠富德等爵賞不必奏辭瑚爾起巴圖濟爾噶爾俱交部議叙給與世職齊凌扎卜噶布舒著授為散秩大臣交部議叙給與世職藍翎侍衛納爾布升授三等侍衛散秩大臣伯克鄂對係公品級著加恩封為公遊擊伍凌阿係革職留任之員著准其開復索倫驍騎校扎卜敦察𠞰賊二名將得傷之馬甲錫圖庫爾救出甚屬奮勉著授為防禦賜號達爾漢巴圖魯賞銀一百兩其餘效力之呼倫貝爾佐領署營總塔濟爾圖著升授參領健鋭營署前鋒章京富勒琿授為副前鋒章京索倫三等侍衛多爾濟勒圖達薩木保俱升授二等侍衛奬賞孔雀翎索倫驍騎校巴岱驍騎校愛新保俱授為防禦健鋭營副護軍校永格藍翎前鋒長傅僧額前鋒興住訥衣圖厄魯特護軍布顔圖俱升補護軍校奬賞藍翎索倫領催博尼塔克薩勒圖庫巴喀畢薩勒圖俱升補驍騎校吉林馬甲法林保索倫馬甲巴爾都等俱升補為領催緑旗都司常清升補遊擊馬兵韓文拔補把總厄魯特碩爾海授為藍領侍衛貝克授為護軍其陳亡官兵俱交部照例議恤又諭曰瑚爾起噶布舒等所報之前鋒五十八回人阿卜都爾滿默們著有勞績著加恩俱授為三等侍衛阿什默特著授為三品總管賞戴孔雀翎有小城伯克缺出即行酌量補授其回人鄂碩爾多爾瓦等除奬賞翎頂外仍酌賞縀匹銀兩臣等謹案和闐六城為回部扼要地當我師罙入傳檄受降不費一矢蓋諸城久苦逆酋之迫脅翕然思欲歸附天朝以安居樂業真不啻望若雲霓矣逮大軍黑水被遮賊黨因得乘間妄肆侵軼其時勢難兼顧而額里齊乘陴堅守者經三月餘將軍既解圍克捷即掄徑旅疾行戈壁中奮勇進援蟻賊懾我先聲各鳥獸散我兵遂收復額里齊而哈喇哈什亦即還定玉隴哈什齊爾拉並以次安輯且博羅齊之役因大霧瀰漫得以潛襲賊營殱渠魁而成克捷天佑所彰尤稱神異而克勒底雅塔克二城亦皆生縛賊酋跽迎道左軍威所播逆賊霍集占等遊魂驚悸惟謀捆載逋逃不敢復作嬰城之想夫六城甫定旋為賊衆所窺援兵未集之前即身在行間者亦未敢逆料成功之迅速如此乃衆志鞏固不搖逺人嚮慕罔二諸城或危而復安失而復得天心助順適叶聖謨揚景鑠而肇鴻庸即此足徴耆定之先機矣諭定邊將軍兆惠等撫賞堵𠞰各事宜上諭軍機大臣曰富德等奏叙官兵功次乃據瑚爾起呈報者著𫝊諭富德於兵抵和闐時將從前守城效力回人詳加查詢其各城伯克等果有隨同齊凌扎卜等始終一節之人即酌量補授總管令其辦事其餘回人應奬賞者惟問之齊凌扎卜噶布舒鄂對等諒必深悉至從前奏報夤夜踰城出降之回酋及醉我城守官兵迎降鄂斯璊者著富德亦查出正法示衆其脅從餘黨酌量寬免仍行安插前兆惠富德合兵後朕亟於應援和闐因其地當要隘且糧食豐足料霍集占等必以死爭今既未增兵且望風奔潰則其心寒力竭可知併𫝊諭兆惠等於逆賊逃竄之路嚴行堵截若賊仍據城堅守則攻擊仍需炮位計內地所送鑄炮匠役已抵阿克蘇此時應已成造又有健鋭營前鋒等登城乃其長技其速行進𠞰以奏膚功賜拉達克汗敕書皇帝敕諭拉達克汗爾逺處邊方感戴恩澤凡所得回人信息俱報明駐藏之章嘉胡土克圖及大臣等轉奏朕鑒爾悃忱深為嘉悅至大兵進𠞰逆酋克城甚多俱駐兵防守今進取葉爾羌喀什噶爾等處波羅泥都霍集占兄弟力窮勢蹙斷不能支惟有棄城逺遁朕亦不以出兵協𠞰之事委之於爾倘逆賊等投入爾境內當擒獲看守送至藏地朕必厚加恩賚若不即縛送日後朕必知之於爾無益今以頒降敕書賜爾上用縀十端爾其祇領特諭又諭軍機大臣曰章嘉胡土克圖等奏稱拉達克汗遵㫖遣伊屬人扎什丕勒託故至葉爾羌將所有見聞詳悉具報等語覽所報情形與軍營事體不甚差謬故降敕奬諭其所遣之扎什丕勒雖駐藏大臣業經賞給銀牌縀匹茶葉仍酌量加賞以示優奬甲戌申諭定邊右副將軍富德等續查和闐戰守勞績上諭軍機大臣曰昨富德等奏叙固守和闐各城及應援勦賊功穴朕命將節次奏報詳查前經永貴等奏據齊凌扎卜等報稱曽遣滿洲哲勒順防守克勒底雅城有回人默默里提卜哈子鄂斯璊等與鄂斯璊相應致哲勒順被害等語富德抵和闐時宜將殉難之人詳查情節擒獲凶黨即行正法至所奏戴奬賞領烏爾圖保喀爾喀章京達什回人多羅特默特等曽守額里齊自必著有勞績且回人鄂碩爾多爾瓦告稱伊隨鄂對等前往和闐聲言援兵將至阿卜都克勒木等敗走出城等語賊若已入城則烏爾圖保等豈能免害此三人現在何處及鄂碩爾多爾瓦所言虛實著再行查明具奏又賊人在哈喇哈什奪井時回人密喇卜阿卜都哈里克瑚岱訥則爾等俱得傷瑚爾起等𠞰賊時馬甲永保巴雅爾曽𠞰殺賊人俱應加恩議叙何以未入奏內至瑚爾起等所領兵丁亦屬效力著查明曽否酌賞銀兩因便奏聞平定準噶爾方略正編卷七十一
