body:
  text: 乾隆二十六年十二月丙寅以辦理新疆經費事宜宣諭中外軍機大臣奏言臣舒赫德欽奉諭旨於回京之便將新疆一切經費通盤合計較從前有無節省臣隨將經過城邑臺站需用之項查明並行文各處駐劄大臣陜甘總督逐一查核列單具奏臣等會同查核現在伊犂回部馬兵三千一百十名步兵一萬一千三百四十七名臺站卡倫兵二千六百二十三名共兵一萬七千餘名所需糧食料豆八萬二千八百餘石俱於屯田支給大臣養亷官兵鹽菜銀歲需三十三萬三千四百餘兩計葉爾羌等城所交騰格作價五萬八千餘兩每年內地添用銀二十七萬五千餘兩而自大功告成後陜甘額兵減十之一所有裁缺馬匹減撤西寧卡倫臺站哈密防兵共節省銀六十六萬六千餘兩以補新疆之用仍餘三十九萬餘兩奏入上諭大學士曰前因西陲平定新疆廣闢所有移駐大臣官兵歲需養亷經費比前或致增多是以特命在外辦事大臣等詳查奏聞頃據舒赫德覆奏軍機大臣通行校核則葉爾羌喀什噶爾等城駐防應需各項合之陜甘節省諸費視未用兵以前不但絶無所增實可減用三分之二其屯墾自給之糧既可不糜運費且將來耕種日開所入倍當充裕又不在此時約計之內此皆一一指數可按者前用兵之初庸愚無識之徒好生浮議朕固不屑深辦今武功大定或又以長駕逺馭不無多耗內地物力為疑今經查核不但未曽多費而且有所節省夫天子不言有無國家有當用者雖纍巨萬不可惜也朕非錙銖較量但因西陲用兵始末所關不得不詳為剖晰以曉庸衆俾知此番籌畫非漢唐佳兵勤逺之為朕實用以自信初非欲息衆喙而博謏聞也將此通諭中外知之臣等謹按我皇上神謨睿算戡定西陲廓二萬里之版圖靖百餘年之逋孽豐庸為亘古所未有而揆諸淵衷默運惟以寅纘祖宗欲竟之丕緒為兢兢初非好大喜功之是務况當國家全盛之時出帑藏贏餘臻此成事亦復何所校計乃前此綜核軍儲既已事半而功倍今此統衡經費尤不徒酌盈以劑虛始以駐劄大臣按欵清釐繼以軍機大臣通盤核實非直彚屯賦之正供浮於廪糈裁邊營之舊額裕於戍防其明效大驗固章章可考至將來井牧日開懋遷日衆中外生計更饒即如哈薩克等部貿易馬匹一節源源孳息又可以次灌輸陜甘腹地督撫提鎮標營之用其為資益逾引逾長又豈可以握算計哉伏讀聖諭以天子不言有無非錙銖較量欲息衆喙而博謏聞大哉皇言雖極天下庸愚無識之徒知無不曠若發矇憬然起悟者矣辛未命優恤安西提督劉順上諭大學士曰安西提督劉順前曽隨征金川頗屬奮勉此次平定西陲雖未身列行陳而安西一帶設臺鑿井諸務具見實心經理今聞溘逝深為軫惜著加恩晉贈太子少保再賞銀一千兩所有應得恤典著該部察例具奏戕害布政使德舒之嗎哈沁塞卜騰等審明正法軍機大臣奏言俄羅斯送出之嗎哈沁塞卜騰等解京臣等訊係輝特台吉們圖克屬人前年八月在阿勒坦和碩遇庫車辦事布政使德舒等輒敢肆行戕害又近日護送哈薩克使人之喀爾喀兵丁等亦被搶掠應將塞卜騰磔於德舒墓前其搶掠賊犯班珠爾等四人俱交刑部正法奏入報聞甲戌命以各城積貯糧石折給臺站回人口糧鹽菜銀兩上諭軍機大臣曰海明等奏稱自葉爾羌至闢展共計五十餘臺每臺回人十名按月各給鹽菜銀九錢今各城餘糧甚多除葉爾羌喀什噶爾各臺俱經折給錢文外其阿克蘇所屬各臺回人口糧請於來年正月起按照時價動支餘糧折給等語前因各城糧石不敷暫以銀兩折給今積貯有餘若使回人得支本色既於伊等生計有益又可省內地運送之繁除阿克蘇各臺照所奏辦理外其葉爾羌等處亦應酌看情形一體支給著通諭各城駐劄大臣等知之命調換班索倫兵駐防烏魯木齊軍機大臣奏言據副都統旌額理奏稱來年派出滿洲索倫察哈爾兵四千名前往伊犂烏魯木齊及回部各城駐防臣等按照情形分别定議外其烏魯木齊應派滿洲兵三百名察哈爾兵二百名換班駐防雖足敷調遣但巡查防守等事仍需派出索倫兵請將派往伊犂索倫兵內調撥一百名駐防烏魯木齊等語查臣等原議派出滿洲兵一千名索倫兵七百名察哈爾兵八百名駐防伊犂滿洲兵七百名索倫兵三百名駐防回部滿洲兵三百名察哈爾兵二百名駐防烏魯木齊今旌額理等所奏調撥索倫兵一百名為瑪納斯等處添設村莊安放卡倫起見但烏魯木齊等處較伊犂回部更成內地既有滿洲察哈爾兵應毋庸再議更調奏入得旨著照旌額理等所請調伊犂索倫兵一百名駐防烏魯木齊丙子命敘升辦理伊犂城工官員上諭軍機大臣曰阿桂等奏稱辦理伊犂城工副將國柱所領緑旗兵一千名內千總羅繼宗高玉均能實心奮勉請委署守備專司版築俟伊等應升缺出補用再都司哲金泰自烏魯木齊前來管理屯田甚屬奮勉兼理城工亦俱妥協等語哲金泰著賞給遊擊職銜羅繼宗高玉著委署守備俱遇缺即補所遺員缺於額外效力人員內委署命升賞伊犂屯田官兵回人并定回人交糧額數上諭軍機大臣曰阿桂等奏稱伊犂屯田八千畝收穫大小麥􅓱粟青稞等榖共二萬七千一百石有奇約二十分以上等語伊犂屯田豐收皆官兵勤於力作所致自當加恩升賞所有屯田各官員內除都司哲金泰補授遊擊千總高玉補授守備外餘俱交部議敘兵丁等著阿桂酌量賞給以示鼓勵又諭曰伊犂屯田回人八百户收穫大小麥約二十分以上􅓱粟青稞約四十分以上合算每人收榖四十石應令其各交米二十石定為成額則回人益知勤動請嗣後人給籽種一石五斗以交糧十六石為率所種四項榖石有豐歉不齊亦可通融抵補等語回人等著與兵丁一體酌量賞給管理屯田回人之前鋒參領福勒琿遊擊陳聖謨等俱著交部議敘其定額交糧之處俱如阿桂等所請行丁丑命授喀爾喀親王策布登扎布為副將軍郡王車木楚克扎布為副盟長上諭軍機大臣曰喀爾喀親王得親扎卜病故其副將軍副盟長員缺應行補授策布登扎布車木楚克扎布俱在軍前歷練奮勉副將軍員缺著策布登扎布補授副盟長員缺著車木楚克扎布補授壬午命酌敘新疆辧事年滿官員上諭軍機大臣曰淑寶等奏哈密辦事之寧夏防禦雙明等年滿請再留一年以應升之缺即用等語昨據永慶奏請將隨伊行走之前鋒廣保等即用一摺朕曽諭以大功告成伊等所辦事務非軍前效力可比且三年更換與內地各員勞逸適均不必過於優敘著酌量給豫升轉之途以示鼓勵今淑寶所奏與前事一體雙明等著再留一年酌示鼓勵不必以升銜即用癸未命升賞入覲之回部伯克等上諭軍機大臣曰此次入覲之伯克阿里瑪和卓等甚屬奮勉阿里瑪和卓特穆爾遜都拉和卓素勒坦和卓著賞戴孔雀翎阿卜都賚賞戴藍翎古爾班和卓阿卜都拉墨墨氐敏伊斯邁勒等著交與永貴等以應升之缺即用丙戌諭參贊大臣阿桂等辧理孶生牛羊事宜上諭軍機大臣曰阿桂等奏稱烏里雅蘇台送到孶生羊二萬隻若令兵丁等牧養或因更換有期不甚愛惜請分給居住伊犂之厄魯特回人等令其加意照管計羊十隻每年取孶生三隻有餘者量加賞賜不足則令其賠補其續送牛羊俱一體派撥等語辧理甚屬妥協著照所請行壬辰命察哈爾總管色楞等赴新疆效力上諭軍機大臣曰兵部奏稱來京候旨之察哈爾總管色楞係騎都尉職銜衮布策凌係世管佐領高亮係騎都尉職銜兼世管佐領請以本身職銜在該旗效力等語色楞等係加恩補授察哈爾總管之員自應實心供職訓練所部乃嗜飲偷安若所屬羣相效尤有關該旗風俗因諭令來京其員缺已另行揀選補授矣伊等既不勝總管之任若令其仍在該旗行走則適如所願轉得家居安樂非所以示懲創但其罪尚不至革職色楞衮布策凌高亮著分發伊犂阿克蘇喀什噶爾三處效力行走以贖前愆甲午命議恤齎送敕書之把總秦子雲等上諭軍機大臣曰據旌額理奏稱上年派遣把總秦子雲等十人齎捧敕書至哈薩克已交與侍衛納旺而伊等未回烏魯木齊咨查各處俱無形迹必因迷途被害等語秦子雲等雖非陳亡可比究因公事捐軀殊為軫惻著加恩照陳亡例減半議恤乾隆二十七年春正月辛丑命哈薩克使人入覲行在上諭軍機大臣曰成衮扎布等奏哈薩克阿布勒瑪木比特等遣使入覲正月初可至軍營等語著派乾清門侍衛等馳驛前往遇見使人時即帶赴南巡行在仍先期奏聞乙巳議酌留闢展等處駐劄兵丁及減收糧石事冝軍機大臣奏言永貴等奏烏魯木齊一路及回部各城共有屯田兵萬餘名除烏魯木齊五千名哈喇沙爾兵七百餘名毋庸議裁外其庫車阿克蘇葉爾羌喀什噶爾英噶薩爾和闐烏什等處或當要路或近外藩所駐兵丁俱仍其舊惟闢展兵五百四十名酌留三百名賽里木拜兵一百五十名酌留五十名等語應如所奏將所減兵數汰其老弱廢疾撥回原營其空出地畝令回人承佃又德爾格奏吐魯番應交官糧四千石俱已全完應照原議每百石賞布五匹茶五包等語查現在葉爾羌等處回人交納官糧並無賞賚事非畫一若竟行裁減或無知回人妄生他議今闢展餘糧甚裕兵丁又已議裁與其解送布匹茶葉備賞不若稍減糧額臣等酌照賞給價值減糧五百石仍傳諭回人毋得虧缺正額奏入得旨吐魯番應交官糧著加恩減免一千石餘依議庚戌恩免采銅回人應交官糧上諭軍機大臣曰海明等據阿克蘇阿奇木色梯巴勒氐等呈現在採銅回人一百户伯克二員不敷差遣請添設伯克一員回人二百户每年交銅二千八百三十餘斤等語著照所奏辦理至採銅回人所有應交官糧準其豁免俟鼓鑄既足停其採銅時再行按户徵收不必分派回人等代為完納辛亥議伊犂伯克品級印照各事宜軍機大臣奏言據阿桂奏前定回部伯克品級時曽將都管等六伯克俱定為七品續經伊犂初駐回人準戴六品頂藍翎以示奬勸但六品哈子密喇卜伯克缺俱由七品都管伯克等㨂選未免等威無别請將此次七品伯克等暫行準用六品頂帶缺出另補則仍用本身品級頂帶又舒赫德奏各城阿奇木伯克給與圖記印照今伊犂阿奇木伯克木薩亦請一體賞給等語查都官伯克等既定為七品其頂帶自應照本身品級至葉爾羌等城阿奇木伯克業經給與圖記印照伊犂之阿奇木事同一體俱應如所奏辦理奏入上從之議官買回人所役厄魯特人口事宜軍機大臣奏言德爾格奏吐魯番公素賚璊屬下回人所役厄魯特男子二名擕帶鳥鎗逃走臣即行文各處查拏並聞回人等役使厄魯特男婦頗多時有逃者恐流為瑪哈沁前次將肅州厄魯特發往伊犂曽因伊等告有眷屬在回人處即給與官銀取回完聚請照此例交與各回城駐劄大臣傳諭回人家有厄魯特願行交官者即給價取回等語臣等酌議德爾格因厄魯特不堪回人苦役以致逃出為匪議照肅州派出厄魯特之例給價贖取亦寧諡地方之意應如所奏仍酌定大口給價七兩小口給價三兩其價即於該回人應納賦稅內扣抵若無交官之項即給與現銀贖取發往伊犂安插奏入上從之丙辰諭烏魯木齊辦事副都統旌額理等辦理遣犯事宜上諭軍機大臣曰旌額理等奏稱發往烏魯木齊屯田遣犯等請先給屯地十二畝與兵丁一體計畝納糧伊等亦有携眷者酌給地五畝自行開墾其未收穫以前官為養贍家口等語著照所請行伊等俱係免死減等之犯理宜嚴加管束果能知罪守分盡力耕作尚可姑容若生事脫逃自當於本處正法即尋常鬭毆等事亦不可照內地之例辧理著即傳諭知之丁巳命更換駐防黑龍江官兵即以本管官員帶領上諭軍機大臣曰傅玉奏派往伊犂等處更換之黑龍江等城官兵一千名或候欽派大臣帶領或即令本處協領委營總等送至烏里雅蘇台再於該大臣等內出派帶領等語此次官兵係派出駐防非征戰可比毋庸派出內地及軍營大臣著即用該協領營總等送至烏里雅蘇台成衮扎布等再派嚮導一員帶領前往伊犂己未命優恤三等侍衛蘇魯克沁并酌派侍衛補缺上諭軍機大臣曰新柱等奏三等侍衛蘇魯克沁在葉爾羌病故等語蘇魯克沁病故雖非陳亡可比但伊前在軍營甚屬效力著加恩賞給恩騎尉準伊子承襲一次仍賞銀五十兩所遺員缺即交領侍衛內大臣將曽經揀選侍衛內酌派一員前往不必再行引見辛酉命優恤甘肅提督閻相師上諭大學士曰甘肅提督閻相師久歷戎行克嫺武略隨征西路奮勇策勳前因患病準令暫行解任并賞給全俸俾得盡心調攝以冀速愈遽聞溘逝深為軫惜著加贈太子太保賞銀一千兩治辦喪事所有應得恤典仍著該部察例具奏二月己巳命乾清門侍衛薩穆坦來京上諭軍機大臣曰旌額理等奏阿思哈於前往查勘瑪納斯等處屯田之便酌帶兵丁往額林哈畢爾噶搜捕嗎哈沁領隊侍衛薩穆坦告請效力已一同起程等語薩穆坦在烏魯木齊已逾三載自應令其回京現在軍營侍衛足敷差遣亦無需用乾清門侍衛之處薩穆坦回營時即著來京命賞解送牲隻之都爾伯特兵丁等一年錢糧上諭軍機大臣曰成衮扎布奏喀爾喀達什彭楚克等官兵同都爾伯特扎哈沁兵丁五十名護送伊犂牛羊駝隻於二月起程本年即可轉回似不必給與一年錢糧等語喀爾喀係舊臣僕著照所請行都爾伯特新附且人亦不多從前既有預支錢糧之例此次著仍行賞給庚午葉爾羌阿奇木伯克等辦送回人一百三十户和闐伯克等辦送回人二十四户前往伊犂屯田命加恩奬賞如例癸酉諭哈喇沙爾辦事散秩大臣達桑阿更換試用效力官員事宜上諭軍機大臣曰據達桑阿奏沙喇沙爾現有試用官四員效力官一員請照現任官員例以三年為限視其行走何如再準更換其現任道員蘇凌阿請旨定限等語前經舒赫德等定議三年更換之例今達桑阿所奏自屬循照辦理但伊等究係試用及效力人員與現任官員有間若行走平常理應仍留二三年再行請旨其蘇凌阿係命往辦事之員著候三年限滿奏請派員更換命哈喇沙爾玉古爾等處不必增派採銅回人上諭軍機大臣曰達桑阿奏玉古爾庫爾勒之伯克等因阿克蘇採銅伯克等加倍交納銅斤情願增派採銅回人四十名等語阿克蘇地廣需用錢文處多因允該伯克等所請添派採銅人戶玉古爾較阿克蘇甚小若多採銅斤恐滋紛擾可不必添派甲戌命回人交納糧石據收成實數增減上諭軍機大臣曰永貴等奏英噶薩爾阿奇木伯克素勒坦和卓呈稱本年秋收頗裕與衆伯克等議除原定糧石五百四十帕特瑪外多收五十一帕特瑪仍係十分取一嗣後查核多出之數即行呈報等語素勒坦和卓勤於勸課既足糧額復有盈餘甚屬可嘉永貴等已給與蟒緞一端著再加恩賞緞二端但豐年既多收糧石若遇歉收之年亦應酌減方為平允嗣後著據實呈報因時增減副朕體恤回人之意乙亥命以官錢收換回人普爾如數給發上諭軍機大臣曰新柱等奏稱葉爾羌喀什噶爾和闐三城回人等每月以普爾換易新錢已令減半交納請俟新錢流通時再為酌減等語換易普爾不過使回人通用新錢自應酌量情形何必限以成數况以兩普爾易一新錢行之已二三年諒所收普爾亦足供鼓鑄若仍照前例恐有妨回人生計著加恩以一普爾易一新錢則回人無所虧損而舊普爾亦必盡收著傳諭新柱等嗣後遵照辦理丙子命丁憂總兵官金梁留辦伊犂屯田事務上諭大學士曰楊應琚奏興漢總兵官金梁現丁父憂該員駐劄伊犂有承辦屯田事務請暫停開缺等語金梁在伊犂實為出力得用之人著賞給伊家銀五百兩交伊弟料理喪事令其在任守制仍留伊犂不必開缺丁丑哈薩克阿布勒瑪木比特等遣使策伯克等入覲恭遇聖駕南巡上召見於揚州行在賜冠服有差壬午諭參贊大臣阿桂等辦理哈薩克事宜上諭軍機大臣曰阿桂奏哈薩克阿卜丹素旺鄂拓克之哈喇圖魯什遣伊子弟前來貿易送出厄魯特男婦大小四十四名口已酌量奬賞布帛等語哈喇圖魯什聞伊犂安插厄魯特即將所收男婦送出固見誠悃亦不無希冀賞賚著加恩照前賞之數各增一分遇便頒給仍以朕旨宣示又諭曰阿桂奏上年越界遊牧之哈薩克等驅逐之後仍有潛來過冬者似宜微示懲創因派伊勒圖豐納亨領兵三百餘名踰庫克托木嶺將潛來巴柴勒卜什之哈薩克等拏獲三四人收其馬羣解送伊犂查訊擇人尚明白者釋放令其傳諭等語所辦甚是哈薩克等性喜徼幸伺我兵撤回乘間駐牧亦事之所有念伊等已經歸附此次姑從寬免著傳諭阿桂等若拏獲哈薩克人等至伊犂即諭云大皇帝屢降諭旨謂哈薩克不當越境遊牧我等又驅逐三次仍不悛改因拏獲數人請旨解京治罪奉大皇帝旨謂我等辦理甚是但念哈薩克等歸附未久性復愚蠢仍加恩姑從寬免嗣後若不知警畏即照爾等所奏辦理此乃格外施恩不可再得傳諭後酌量稍給口糧遣回仍將續辦情形即行具奏議酌給青海扎薩克等遊牧事宜陜甘總督楊應琚奏言理藩院議駁多爾濟請將青海入官曠地酌給該扎薩克遊牧欽奉諭旨以此時新疆展拓不應目為邊境即酌給伊等遊牧亦無不可交臣查辦臣查得從前羅卜藏丹津入官之地其係西寧肅州鎮標馬厰及番族駐牧者未便撥給惟素拉郭勒至西爾噶勒金二處東西五百餘里南北三十餘里現在間曠且與該扎薩克等遊牧相近請以賞給駐牧其西爾噶勒金過河即係産磺山場曽經開採封禁應指明定界飭交該扎薩克等就近看守奏入得旨軍機大臣議奏尋議多爾濟等據該扎薩克所指洮賚郭勒等處今該督查勘現係官馬厰地及各番族駐牧處所自不便賞給惟素拉郭勒至西爾噶勒金既屬間曠與該扎薩克遊牧相近應如所請酌量賞給其西爾噶勒金過河係産磺山場久經封禁應請北以山梁為界西以河為界河東聽其駐牧河西即照青海察察寧楚爾鉛礦之例該扎薩克等看守毋許越界盜採奏入上從之甲申賜哈薩克阿布勒瑪木比特敕書皇帝敕諭哈薩克阿布勒瑪木比特阿布勒比斯沙呢雅斯蘇爾統罕和卓博羅特蘇爾統爾等遣策伯克等入覲朕適巡幸南服特遣侍衛護送爾使人等至行在加恩宴賚今遣令起程所賜爾阿布勒瑪木比特等緞匹紬綾器什及使人冠服器什銀兩各有差從前爾等所告搶掠哈薩克之瑪哈沁查明首惡係塞卜騰等我兵追入俄羅斯該部落盡行縛獻訊出傷我官兵情事俱已正法至伊犂駐兵凡塔爾巴噶台巴爾楚克等處與爾等遊牧相近既為朕臣僕當聽將軍大臣等約束不可越境遊牧致遭驅逐又去年送爾等使人之喀爾喀梅楞達什敦多卜遇嗎哈沁被掠至爾沙呢雅斯蘇爾統所屬章呼斯巴圖爾巴雅木拜之地即派沙爾噶勒岱等護送轉回具見爾沙呢雅斯蘇爾統恭順之忱朕甚嘉悅故於常賜外賞賚有加章呼斯巴圖爾等亦俱賞賜沙爾噶勒岱此次親來又加賞銀兩其各祗受爾等惟約束所部永矢悃忱以受無窮之澤特諭庚寅烏魯木齊辦事副都統旌額理等疏奏安插屯田民人事宜旌額理等奏言臣等前議內地貧民安插烏魯木齊賞借籽種農具蓋造房屋銀兩等事荷蒙俞允查楊應琚送到人户臣等派員指給地畝督令開墾必需馬力現在市易哈薩克馬匹約有三等請將骨格小者户給一匹折銀八兩同前奏蓋房銀兩折交米麵一石分年完納其兵丁五百名原議照巴里坤蓋造房屋例每名日給米八合麵四兩外加鹽菜銀三分但所給米麵尚覺不敷請將鹽菜銀兩之半照定價折給米麵既有益兵丁口食亦可稍節帑項奏入得旨如所請行平定準噶爾方略續編卷十五
