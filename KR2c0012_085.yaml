body:
  text: 乾隆二十一年秋九月丙寅朔命停派阿拉善兵丁赴北路軍營上諭軍機大臣曰前因擒拏青滚雜卜降㫖令阿拉善貝子羅卜藏多爾濟選兵一二千名聽候調遣今將軍成衮扎布遵朕諭㫖已帶兵前往擒拏逆賊諸務俱次第辦理所有羅卜藏多爾濟豫備兵丁著停其派往侍衛誠林等疏奏接續臺站情形誠林等奏言據員外郎永常報稱自第十六臺至第二十二臺俱已派兵接續其自第二十三臺至二十七臺經貝勒達什丕勒每臺各派兵五名馬十五匹馳遞事務復據親王得親扎卜遣䕶衛達瑪林報稱已將二十八九兩臺派兵接續又聞自二十九臺至烏里雅蘇台各臺站俱經駐劄烏里雅蘇台大臣委員帶兵按站接續臣等查軍臺馳遞文報關係緊要今各臺雖皆接續所需兵丁馬匹尚應添設容臣㑹同蘇巴什里福鼐等商酌辦理奏入報聞丁夘諭定邊左副將軍成衮扎布曉諭喀爾喀王公等上諭軍機大臣曰據得親扎卜等移咨濟福文内稱舒明等已調厄魯特策凌等兵丁且有將喀爾喀王公等俱行擒治之語是以巴勒達爾等俱回游牧等語朕前降㫖令將軍成衮扎布調遣策凌達什達瓦等兵丁齊集軍營原因衆喀爾喀等均為叛賊煽惑不得不為籌辦今不過擒拏一么䯢逃虜則厄魯特策凌等兵不但無庸遣派併可不令與聞至擒治喀爾喀王公一語尤屬不經朕撫馭臣下綱紀肅清即一軍士賞罰亦必請㫖遵行喀爾喀王公等自問並無罪譴何至即行擒治此明係伊等擅棄臺站卡倫懼罹罪網故為此飾詞以藉口耳著即曉諭衆喀爾喀王公等現在各處調遣兵丁盡行撤囘伊等務宜各安游牧奮勉効力毋事驚懼舒明阿蘭泰等前此辦理殊屬未協已降㫖令成衮扎布查明具奏現命納穆扎爾為叅贊大臣舒明等務宜和衷共濟隨同將軍成衮扎布速擒逆賊毋得稍存退諉戊辰命查拏喀爾喀搶掠賊人上諭軍機大臣曰據遣往軍營侍衛瑚畢圖報稱途中遇喀爾喀等搶奪物件旋行諭止等語喀爾喀扎薩克台吉等俱不為青滚雜卜所惑仍赴臺站卡倫効力而其屬下無知人等尚有肆行搶奪者此風斷不可長且於伊等生計亦大有關係伊等所用布疋茶葉等物全賴内地商人販往今若任其搶奪不行追還則商人自必裹足不前且從此各部落互相效尤為害滋甚如準噶爾部落分裂至此皆彼此互相搶奪所致著通行飭禁並令該扎薩克台吉等將沿途搶掠賊人一一查出從重治罪以示懲戒己巳命停派察哈爾兵丁赴北路軍營上諭軍機大臣曰據瑚圖靈阿等奏稱已選派察哈爾兵丁一千名帶往軍營等語現在喀爾喀王公等俱各派兵接續臺站將軍成衮扎布亦即遵㫖往擒青滚雜卜察哈爾兵丁無庸調往著傳諭瑚圖靈阿等即令兵丁各囘游牧但念伊等迅速啓行雖行走不過數日然業經整裝前往不無所費著加恩將派出兵丁一千名各賞給錢糧兩月以示優䘏定西將軍達爾黨阿等疏奏擊敗哈薩克情形達爾黨阿等奏言臣等領兵至雅爾拉地方遣章京雅卜唐阿前往捜查知哈薩克兵丁俱潛伏於山溝幽僻之地七月初三日遣畢里衮帶兵一百名占據右翼高阜之處又派烏爾登帶兵一百名進山引出賊衆臣等帶兵一千名各按隊伍前進賊衆二千餘人迎戰臣等派齊努渾瑪瑺特通額額爾登額帶領隊伍分部前進阿里衮鄂實哈寧阿明瑞管理左右兩翼臣達爾黨阿扎拉豐阿統領大隊兵丁奮勇殺賊斬馘五百七十餘人生擒十一人中箭帶傷者甚多復於十一日追逐至努喇地方整兵前進遇賊衆二千餘人奮勇鏖戰殺賊三百四十餘人生擒十人内有阿逆宰桑扎南布臣等嚴加訊問知阿逆與霍集伯爾根帶兵迎戰阿逆恐被大兵認識改换藍纛因不能支持大兵即先遁去又據擒獲哈薩克楚魯克供稱伊兄弟二人向為阿布賚所信任情願往諭阿布賚擒獻阿逆等語查從前拏獲哈薩克楚爾滿時即供稱楚魯克阿喇勒拜兄弟二人素為阿布賚倚任臣等即將阿喇勒拜留在軍營令楚魯克於七月十二日起程限十五日令其曉諭阿布賚擒獻阿逆奏入得㫖下部知之定邊左副將軍哈達哈等疏奏擊敗哈薩克情形哈達哈等奏言據貝子達爾扎等報稱卡倫地方見哈薩克千餘人自巴顔山向西前行等語臣等即派扎薩克三都卜等帶兵六百名前往奮擊臣等隨亦帶兵策應共將哈薩克擊敗斬馘百餘人奪其馬匹輜重並生擒五人逐加刑訊供稱現在帶兵迎戰即係阿布賚其阿睦爾撒納霍集伯爾根等帶兵一千名往尋西路大兵前去阿睦爾撒納自至哈薩克境内我部落内老成曉事之人僉謂阿睦爾撒納為害四衛喇特歸附大皇帝今復背叛竄入我地是特移禍於哈薩克若不即行擒獻恐俱不能安生而阿布賚以阿睦爾撒納如窮鳥投林希圖免死不便遽行執獻遂與阿睦爾撒納商定令各游牧凑集兵丁阿布賚先領兵一千至蒿哈薩拉克山遙見兵勢甚大心懷畏懼旋為大兵擊敗前此阿布賚知大兵將至即將游牧遠移等語臣等伏思哈薩克衆情猶豫阿布賚袒䕶阿逆墮其奸計今仰賴皇上洪福擊敗逃竄阿布賚業已膽破臣等即行帶兵追逐前進奏入得㫖下部知之定邊右副將軍兆惠等疏奏籌辦屯種事宜兆惠等奏言前奉㫖令於伊犁附近地方酌量派遣綠旗兵丁屯種查自巴里坤至濟爾瑪台積木薩烏魯木齊羅克倫瑪納斯安濟哈雅晶等處俱有地畝可資耕種伊犁附近地方約有萬人耕種地畝空格斯朱爾都斯等處可種之地亦多但須豫為籌辦方不悞來春耕種之期現在伊犁有囘人三十餘名擬酌增至百人請敕巴里坤辦事大臣及甘肅撫臣派出綠旗兵一百名委員酌帶耔種農具耕牛於明年正月内前來臣等按地分給耕種俟試看一年再行辦理奏入報聞庚午定邊右副將軍兆惠等疏奏遣副都統阿敏道領兵收服囘人事宜兆惠等奏言上年遣往囘城曉諭之侍衛托倫泰至今未囘臣等詢問烏什城囘人伯克噶岱黙特及扎爾呼齊錫克錫爾格等俱稱使人遲久未囘囘人地方似有事故或波羅泥都等到彼滋事或中途有布魯特囘人生變俱未可定若遣兵赴阿克蘇庫車烏什等處曉諭收服其衆則葉爾羌喀什噶爾囘人等聞風震懾等語臣等伏思葉爾羌喀什噶爾各囘人若不及時辦理將來或與布魯特會合滋生事端因公同商議遣副都統銜阿敏道領兵一百名令扎爾呼齊錫克錫爾格帶領空格斯朱爾都斯游牧厄魯特兵三千名同烏什城伯克噶岱黙特前往酌量於九月十五日起程收服各處囘人並探取侍衛托倫泰信息如阿克蘇庫車等處囘人果能恭順每年應納貢賦或令其赴吐魯番向額敏和卓交納或送交伊犁辦事大臣俟到彼處酌定倘敢抗違即行𠞰滅奏入報聞辛未命奬賞扎薩克額林沁等上諭軍機大臣曰舒明等奏稱扎薩克額林沁等率領屬人牧放馬駝甚屬勤勉等語額林沁等當衆喀爾喀驚擾之際約束屬人無悞差委甚屬可嘉著加恩賞給額林沁策登敦多卜賚崇扎卜孔雀翎仍酌量賞給緞疋協理台吉旺楚克多爾濟班扎鄂爾本敏珠爾管旗章京敦多卜達什副管旗章京德勒格爾博特巴珠喀達爾扎叅領喀爾察海阿玉竒亦各酌賞緞疋其各該處收放兵丁例不支領錢糧並著加恩按月賞給以示鼓勵命授貝勒剛多爾濟等為都爾伯特正副盟長上諭軍機大臣曰都爾伯特部落訥黙庫盟長員缺尚未遴員補授貝勒剛多爾濟自授副盟長以來約束所屬甚屬妥協著即授為盟長其副盟長員缺著貝勒巴圖博羅特補授命扎薩克輔國公布顔特古斯之子塞楞承襲公爵甲戌諭副都統舒赫德等擒拏烏梁海郭勒卓輝事宜上諭軍機大臣曰舒赫德奏稱巡查臺站至努克木倫地方知遷移游牧之厄魯特等沿途有搶奪馬匹之事即親見策凌策凌烏巴什等嚴行查出其額爾齊斯河等處臺站為烏梁海郭勒卓輝搶奪已遣侍衛三都卜領兵𠞰滅等語舒赫德辦理俱合機宜策凌等屬人沿途偷盜馬匹經舒赫德交辦策凌等即行查出交還甚屬可嘉著賞給策凌等荷包以示奬勵至烏梁海郭勒卓輝潛蹤逃竄今復敢肆行搶掠現在策凌等已移往額爾齊斯即著舒赫德傳諭策凌等派兵擒拏以正典刑如因伊等新移游牧不便派兵舒赫德即將現在所領兵丁㑹同三都卜奮往擒拏務期弋獲再前經降㫖令郡王策布登扎布會同富德即由軍前馳赴親王成衮扎布處協同辦事令成衮扎布已領兵擒拏青滚雜卜隨同辦事之人亦多策布登扎布等領兵至汗哈屯地方即確查郭勒卓輝藏匿何處及逃竄之烏梁海等盡行𠞰滅事竣再赴成衮扎布處辦事乙亥定邊左副將軍哈達哈等疏奏追襲哈薩克情形哈達哈等奏言臣等擊敗哈薩克後復派散秩大臣達什策凌副都統職銜瑚爾起等率兵追趕並派總管鄂博什侍衛奇徹布帶兵隨後接應臣等統領大兵繼進據達什策凌瑚爾起等報稱追及阿布賚後隊斬首百餘級獲馬二百餘匹器械百餘件又與阿布賚别隊之布滚拜等交戰殺賊二十餘人生擒一人獲馬四十餘匹即由阿布賚布滚拜逃竄之路往追賊衆已紛紛四散達什策凌瑚爾起等復拏獲哈薩克賊人杭吉爾圖巴圖魯等四名詢知兩日前阿睦爾撒納為西路大兵擊敗現在逃往呢雅斯圖山中臣等即帶兵往追四面瞭望並無蹤跡因復詢問拏獲賊人告稱伊等初議在此山據守今看來已歸阿布賚巢穴等語續據鄂博什奇徹布報稱至索克地方遇賊二百餘人即行追擊斬馘八人餘衆俱逃竄等語臣等仍帶兵前進於七月二十三日抵伊什勒地方與西路大兵㑹合公同商議擒𠞰事宜奏入得㫖下部知之諭定西將軍達爾黨阿等撤兵事宜達爾黨阿等奏言臣等擒獲哈薩克楚魯克阿喇勒拜令其曉諭阿布賚擒獻阿逆續經臣哈達哈等擒獲杭吉勒圖昭華什等亦請往諭阿布賚速行擒獻是以將杭吉勒圖拘留釋放昭華什囘巢嗣於七月二十七日囘至軍營據楚魯克禀稱奉命往諭阿布賚據阿布賚云我等帶兵前來並非敢與大國相敵因尋阿睦爾撒納途間被大兵擊敗阿睦爾撒納如窮鳥投林擒獻無難懇求大皇帝開一面之網全伊一命等語昭華什亦同楚魯克前來臣等即諭知楚魯克等我等欽奉大皇帝諭㫖統領兩路大兵擒拏阿逆一日不獲斷不中止今阿布賚等並未將叛賊擒獻反二三其説為阿逆請命明係爾等緩兵之計不知反為爾衆哈薩克招禍復據楚魯克等禀稱我阿布賚為阿睦爾撒納請命亦不過希冀萬一如必責令擒獻豈敢抗違請再予限十五日我等星夜馳囘即將阿睦爾撒納擒獻不敢欺㒺等語臣等復向伊等曉諭無論爾等是否緩兵之計我等惟遵大皇帝諭㫖進兵追擒叛賊凡遇爾游牧之處盡行𠞰滅為利為害爾等與阿布賚宜熟思深計是日仍將楚魯克昭華什等遣囘臣等公同商議阿布賚果否擒獻阿逆事屬未定是以仍帶兵前進奏入上諭軍機大臣曰達爾黨阿哈達哈等奏稱遣人曉諭阿布賚責令擒獻阿逆等語阿逆自不能倖逃天網此時阿布賚即未將阿逆擒獻現在時屆冬寒前經降㫖令伊等暫行撤兵恐途中馳遞遲延伊等尚未接到著再傳諭達爾黨阿等仍遵前㫖撤兵並將擒獲哈薩克人内釋放一二人囘巢令其明白曉諭阿布賚今奉大皇帝諭㫖天氣嚴寒㫖行撤兵爾等若不即將阿逆擒獻明春仍令大兵前來盡將爾部落𠞰滅撤兵後達爾黨阿等會同成衮扎布擒拏青滚雜卜及遣哈寧阿赴伊犁協同兆惠辦事一切俱遵前㫖行至厄魯特宰桑巴桑甚著勞績著加恩補授内大臣賞銀二百兩索倫佐領莫托和里著加恩補授頭等侍衛賞銀一百兩此次軍前効力人員俱著查明議敘丙子命授台吉阿喇卜坦等公品級上諭軍機大臣曰喀爾喀扎薩克台吉阿喇卜坦辦理臺站甚屬妥協協理台吉紀瓦遇納延泰遣來奏事之慶祿等應付馬匹亦能黽勉急公著加恩賞給阿喇卜坦紀瓦公品級其台吉達爾巴圖桑寨林沁俱著賞戴孔雀翎以示鼓勵命授扎木禪察達克為内大臣上諭軍機大臣曰扎木禪察達克効力行間甚屬奮勉著加恩補授内大臣仍各賞銀一百兩現在將軍成衮扎布領兵擒拏青滚雜卜並著察達克帶領所屬兵丁協同擒拏綏遠城將軍富昌疏奏領兵赴烏里雅蘇台軍營日期富昌奏言臣遵㫖於綏遠城兵丁内先派三百名交歸化城都統阿爾賓帶領於八月二十一日起程赴尚書納延泰處差委其餘兵七百名副都統鶴山帶領於二十二日起程九月初四日已抵十六臺臣領右衛左翼兵五百名於九月初六日已抵十六臺䕶軍叅領蘇尼勒圖帶領右衛右翼兵五百名初六日亦抵十五臺現在臣等所領三隊兵丁即日兼程前赴烏里雅蘇台奏入報聞戊寅諭安插伯什阿噶什等屬人事宜上諭軍機大臣曰舒明奏稱伯什阿噶什烏巴什等屬人請暫在哈達青吉勒地方居住等語前命安插伯什阿噶什屬人等於額克阿喇勒地方今自哈達青吉勒移至彼處程途既遠且時屆嚴寒行走稍艱著即照舒明等所奏辦理其達什達瓦屬人亦照所請在鄂爾昆地方游牧並傳諭富森留彼照看一二年後再行囘京己夘命奬賞台吉達瑪林等上諭軍機大臣曰管理塔楚等五臺之車臣汗部落台吉達瑪林當臺站驚擾之際能約束該管臺站人等復令伊子塔木楚克帶兵曉諭無一人擅離臺站甚屬可嘉著查明達瑪林係何等台吉奏聞加恩其扎克臺喀爾喀章京旺扎爾亦著加恩賞戴孔雀翎辛巳命派副都統濟福侍衛德爾森保索倫總管伊柱赴車臣汗部落查拏搶掠商人匪賊命復格勒克巴木丕勒公爵上諭軍機大臣曰格勒克巴木丕勒前因辦理馬匹遲延革去公爵發往伊犂効力自至伊犂後行走甚屬奮勉遇賊拘留今始得出情形可憫著加恩仍復公爵賞戴雙眼翎伊部落現有賊人搶掠商人之事著即囘至游牧會同濟福等查辦壬午命分别奬賞協理台吉阿喇卜坦等上諭軍機大臣曰納穆扎爾奏稱喀爾喀等間有搶奪鄂爾昆商人之事協理台吉阿喇卜坦即派兵彈壓頗著勞績等語著查明阿喇卜坦係何等台吉奏聞加恩扎木叅多爾濟遵伊兄將軍成衮扎布之諭行走奮勉並著加恩賞給公品級以示鼓勵命晉封貝勒達什丕勒郡王品級上諭軍機大臣曰達什丕勒原係扎薩克台吉經朕節次加恩授為貝勒品級昨聞擅囘游牧正欲加恩曲宥觀其後效伊即派所屬兵丁馬匹接設臺站其從前擅囘游牧不過誤聽浮言不足深責仍著加恩晉封郡王品級現在臺站俱係新設非加意巡查恐有遲悞著交達什丕勒會同總管達松阿等悉心辦理癸未諭定邊左副將軍成衮扎布酌量調遣察哈爾兵丁上諭軍機大臣曰成衮扎布奏稱喀爾喀各部落調遣兵丁尅期未能齊集所有内地派往兵丁三千名現在行文催取等語綏遠城兵丁前據富昌等奏聞將抵軍營此時應已齊赴烏里雅蘇台惟察哈爾兵丁一千名已經降㫖停派著傳諭成衮扎布酌量應否仍遣此項兵丁再行調遣並令瑚圖靈阿等仍赴察哈爾揀選豫備聽候成衮扎布行文到日即速前往軍營聽候調遣如不需用仍行停止昨降㫖令瑚圖靈阿赴車臣汗部落會同濟福等查拏搶掠商人匪賊此時毋庸前往若成衮扎布行知停派察哈爾兵丁瑚圖靈阿即赴車臣汗部落會同查辦甲申諭副都統巴蘭泰傳諭輝特台吉等約束屬人及輪班入覲事宜上諭軍機大臣曰前巴蘭泰照看都爾伯特人等尚屬妥協今復令其承辦遷移輝特人等事務務宜加意經理都爾伯特人等間有一二偷竊牲隻之人俱經查出治罪著曉諭輝特台吉等嚴加約束倘有似此匪竊者即當按律治罪斷不得姑息了事庶可懲戒將來至都爾伯特王公台吉等已令三楚爾漢分作三班每年輪値一班入覲今輝特人等止一楚爾漢若令頻年入覲殊非所以示體䘏著將輝特人等亦照都爾伯特之例分作三班每年輪班入覲戊子恩免甘肅省歷年民欠錢糧上諭大學士曰前因甘省地方承辦軍需降㫖將甘涼肅三府州屬民屯及番民等本年應徵各項錢糧米豆草束一概蠲免其餘各府州縣雖地方有衝僻之不同承辦有多寡之或異朕念該處小民趨事赴公均屬勤苦著加恩將甘省十三府州㕔屬各州屬衛乾隆十一年至十五年民欠地丁錢糧草束概予蠲免十六年至二十年民欠未完正借錢糧著自丁丑年為始分作五年帶徵其安西五衛近接軍營臯蘭一縣地居省會出力尤多著將本年應徵各項錢糧俱照甘涼肅三府州之例一體蠲免其寧夏平涼鞏昌蘭州等府屬十七州縣本年應徵各項錢糧亦著蠲免十分之三以紓民力再甘肅通省尚有乾隆元年至九年蠲剰未完及十年至十五年民欠耔種口糧牛本等項銀糧非因灾出借為定例所不應免但該省承辦軍需民力實堪軫念著一併加恩蠲免該督撫等其董率屬員實心經理務使膏澤下逮以副朕格外恩施優䘏邊民之至意庚寅命授都爾伯特親王伯什阿噶什等為正副盟長上諭軍機大臣曰都爾伯特親王伯什阿噶什著授為盟長貝子烏巴什著授為副盟長所有伊等屬人應編立旗分之處著照例辦理辛夘上自木蘭迴鑾駐蹕避暑山莊都爾伯特親王伯什阿噶什貝子烏巴什等行朝見禮恩賜筵宴如例恩賞都爾伯特親王伯什阿噶什等銀兩牲隻有差上諭軍機大臣曰親王伯什阿噶什著賞銀二千兩貝子烏巴什賞銀六百兩並賞伯什阿噶什馬五百匹牛一百頭羊二千隻烏巴什馬二百匹牛五十頭羊一千隻俾伊等生息資用管旗章京每員著賞銀一百兩副管旗章京每員八十兩宰桑每員六十兩其台吉達木巴都噶爾布魯特扣肯等遣來之宰桑等每員俱著賞銀四十兩命加恩臺站兵丁上諭軍機大臣曰據蘇巴什里奏稱前歲添派内扎薩克喀爾喀烏拉齊等已在臺差委兩年妻子俱在臺站所給錢糧請照喀喇沁之例支給等語此等烏拉齊與喀喇沁一體當差著加恩照喀喇沁之例加倍支給其二十一臺至二十八臺兵丁二百三十六戸牲隻間被搶掠著加恩每戸賞米二石以示體䘏壬辰命侍衛特音保等赴伊犂差遣軍機大臣奏言據定邊右副將軍兆惠奏請揀選索倫達呼里侍衛拜唐阿等十員赴伊犂差遣臣等揀選侍衛特音保等十二員帶領引見恭請欽定十員前往差委得㫖特音保達桑阿達克塔納愛布薩塞新保南田保滿珠噶爾瑪巴沁保扎慎保俱著遣往伊犂交與兆惠差遣委用閏九月丙申朔命賞給厄魯特坐臺兵丁口糧上諭軍機大臣曰據兆惠等奏稱三格莽阿納等接設阿布喇勒等處各臺站所有兵丁口糧即令各鄂拓克運送等語朕念伊等數年來從事軍營甚屬勞瘁現在生計不能充裕此項口糧應動官項給發如伊等業已運送即賞給價値以示優䘏戊戌申諭定邊左副將軍成衮扎布擒拏青滚雜卜上諭軍機大臣曰據侍衛端濟布奏稱青滚雜卜遣人至哲卜尊丹巴胡土克圖處懇求代奏寛宥並請移至烏梁海哈喇達爾汗地方居住等語青滚雜卜之罪萬無可逭若少可寛宥朕自當格外施恩即如策登扎布雖聽信青滚雜卜之言擅囘游牧然尚無背叛情形仍派伊所屬兵丁接臺坐卡自可無庸深責至策卜登顯與逆賊同謀然其人本屬糊塗且係喀爾喀舊人不忍即治其罪已令將軍成衮扎布詳加體察再行辦理青滚雜卜種種不法非此二人之比是以降㫖擒拏治罪著傳諭哲卜尊丹巴胡土克圖不得聽其懇求代為陳奏此而可宥國法安在並著傳諭成衮扎布速遵節次所降諭㫖擒拏青滚雜卜治罪以昭國法毋致脱逃庚子諭副都統舒赫德停解軍營口糧各事宜上諭軍機大臣曰舒赫德奏稱接唐喀祿咨額爾齊斯一帶臺站應派兵巡查伊即帶兵䕶送運往哈達哈軍營口糧牲隻前赴額爾齊斯等語舒赫德辦理尚合機宜但現在額爾齊斯等處間有烏梁海肆出搶掠運送牲隻沿塗應加意防䕶前已降㫖令達爾黨阿哈達哈等暫行撤兵此項牲隻毋庸急行送往不若在中途牧放派兵防䕶俟伊等撤兵囘時即行接濟原可無悞舒赫德前遣三都卜帶兵巡查臺站至努赫圖嶺地方遇烏梁海等賊人斬獲甚衆著即令三都卜奮勇前進往迎達爾黨阿哈達哈等將節次所降撤兵諭㫖齎往宣諭令伊等即遵㫖辦理舒赫德仍領兵陸續繼往巡查一路臺站中途遇烏梁海等盡行𠞰滅毋使漏網再所奏喀爾喀協理台吉丕勒多爾濟在噶老圖地方管理臺站甚屬奮勉等語著查明丕勒多爾濟係何等台吉奏聞加恩癸夘諭安設西路臺站各事宜上諭軍機大臣曰據雅爾哈善等轉奏貝勒扎那噶爾布扎哈沁宰桑鄂爾奇木濟各摺鄂爾奇木濟應付來往官兵口糧馬匹甚屬可嘉著加恩補授散秩大臣賞戴孔雀翎並賞銀一百兩扎那噶爾布奏稱伊所屬坐臺人等並未支領口糧等語從前扎拉豐阿等奏稱厄魯特坐臺兵丁每月俱給與錢糧或因扎那噶爾布情願自備資斧未經給與著查明一體賞給並著永貴通查各路臺站將來撤兵之後應派兵丁若干酌量安設其坐臺兵丁亦應照北路之例令兵丁等帶領户口同居並賞給馬匹牲隻俾資生計㑹同兆惠及各宰桑等詳議奏聞喀喇沁臺站叅領第魯巴熟悉臺務著即前往會同永貴查辦此等皆係新設臺站應嚴行通飭毋得有悞差委及滋生事端之處永貴等務宜妥協辦理再據鄂爾奇木濟奏稱庫勒特三百戸自伊犁前來戕害伊游牧屬人等語此項庫勒特等詢之在京厄魯特等稱係達瓦齊所屬應將此項人歸於二十一昂吉内管轄何得任其肆行生事並著兆惠查明辦理命授塔木楚克扎卜為貝勒上諭軍機大臣曰貝子羅卜藏策楞上年因伊犂擾亂受傷身故甚屬可憫伊子塔木楚克扎卜近復派兵接續臺站行走奮勉著加恩封塔木楚克扎卜為貝勒以示優眷定邊左副將軍成衮扎布疏奏領兵擒拏青滚雜卜各事宜成衮扎布等奏言臣於九月二十六日抵烏里雅蘇台軍營查閲軍營兵丁約一千有餘綏遠城兵二千名計閏九月十五以前陸續可到統計兵力已足擒賊臣等即行帶領前往仍一面曉諭附近逆賊青滚雜卜之扎薩克等并和托輝特所屬人等令其協同擒獻又聞青滚雜卜將察達克赤倫烏梁海人等移入伊附近地方居住必有私相煽惑之事即移咨阿蘭泰遣人傳赤倫及察達克子弟等明白開導諭以利害毋墮賊計再貝子彭楚克公丹拜等所轄烏梁海亦與青滚雜卜烏梁海連界居住臣復遣親信人往諭剪其羽翼俾此賊窮蹙無歸則釡魚穴鼠自可不日成擒奏入報聞定邊左副將軍成衮扎布等疏奏臺站人員分别加恩治罪事宜成衮扎布等奏言臣等遵奉諭㫖查管臺台吉扎木揚因驍騎校策登伊什等不遵約束私囘游牧伊即力行阻止仍與章京多爾濟辦理臺務扎木揚係三等台吉應請㫖陞為二等台吉章京多爾濟量賞緞疋其策登伊什等十九人擅自逃散并將駝馬私行帶囘甚屬不法應交與該旗即行治罪其臺上駝馬飭令該扎薩克照數追出賠補奏入報聞甲辰諭和托輝特貝勒旺布多爾濟上諭旺布多爾濟曰青滚雜卜負恩背叛種種不法已屢次降㫖曉諭旺布多爾濟必無與賊同謀之事朕可深信昨據貝勒策登扎卜屬人告稱逆賊青滚雜卜令遷爾游牧於附近地方爾雖聽從並非眞心附賊等語今大兵將抵和托輝特部落已加恩命爾承襲貝勒如能擒獻逆賊協同大兵擒拏自當加以重賞否則即帶領所屬及各台吉等投至軍營既可永受朕恩且不墮爾祖博貝舊勲即青滚雜卜屬人誤聽指使今能棄賊來歸亦一概免其治罪倘迷而不悟大兵所至必與青滚雜卜一體擒拏治罪爾其熟思深慮善自為計毋貽後悔諭定邊左副將軍成衮扎布派兵協擒青滚雜卜事宜上諭軍機大臣曰據成衮扎布等奏稱汗哈屯烏梁海等聞與賊青滚雜卜連合已遣員往諭策凌策凌烏巴什等領兵就近𠞰滅烏梁海等語前經降㫖令舒赫德曉諭策凌等派兵𠞰滅烏梁海附賊人等成衮扎布所奏適與朕旨符合著再傳諭舒赫德遵照前㫖辦理再大兵往擒青滚雜卜應飭知附近青滚雜卜游牧各扎薩克派兵堵截以防逆賊逃竄之路方為妥協扎薩克圖汗巴勒達爾等游牧與和托輝特毗連成衮扎布應豫行知會該處令其協力堵禦此外倘有應行傳知各部落派兵協擒之處著成衮扎布一面辦理一面奏聞定西路新設臺站供應馬匹口糧章程上諭軍機大臣曰西路各處坐臺之厄魯特等皆係新降人衆生計未能充裕如往來馳驛概行取給馬匹口糧伊等力難供應嗣後除奉㫖馳驛者仍照常由臺站辦給其自各處往來差委人員俱著於各原地方辦給馬匹口糧不得沿途支取著為令乙巳諭定邊左副將軍成衮扎布速擒青滚雜卜上諭軍機大臣曰據成衮扎布等奏附近青滚雜卜游牧之台吉等俱遣人告知逆賊煽惑情形現候大兵前進等語看此情形大兵即宜速進方合機宜著成衮扎布即揀選索倫兵一千名同納穆扎爾帶領前進其餘兵丁著納延泰富昌陸續進發務宜聲勢聨絡互相策應俾附近各台吉等早得歸附不受逆賊脅從擒拏自屬更易至策登扎卜從前果否與賊同謀尚無實據今據奏稱實係附和逆賊甚屬可惡伊尚遣人告知普慶等自言其並未附賊飾詞狡詐罪不容誅著即照成衮扎布等所奏俟進兵時一併擒拏治罪其現在遣人前來之各台吉等著成衮扎布等登記俟事竣酌量加恩至扎薩克公多岳特多爾濟既無子嗣所有屬人現在需人約束伊弟密丕木多爾濟並未附和逆賊著將多岳特多爾濟公爵加恩即令密丕木多爾濟承襲命奬賞扎薩克台吉阿喇卜坦等上諭軍機大臣曰成衮扎布等奏稱管理塔米爾糧餉等事務之扎薩克台吉阿喇卜坦等行走奮勉等語台吉阿喇卜坦布達扎卜俱著賞戴孔雀翎其已經賞翎之協理台吉旺舒克及其餘効力台吉官員等俱著賞給緞疋兵丁等著賞給錢糧一月以示奬勵平定準噶爾方略正編卷三十一
