  text: 欽定四庫全書平定準噶爾方略正編卷三十七
  hash: sha256:11effee74557c21089c85a4b0cb1822424c648c3aca8a0e3203340fe92c68b4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_091-1a, image: WYG0358/WYG0358-0613a.png}
body:
  text: 乾隆二十二年春二月癸酉申諭提督傅魁辦理不協罪狀上諭軍機大臣曰雅爾哈善等奏傅魁帶兵赴魯克察克會同額敏和卓擒獲莽噶里克妻孥并宰桑等十餘人俱行正法已撫定城中回衆令蘇賚滿駐劄等語由此觀之是擒獲莽噶里克之事皆額敏和卓早為妥辦即使傅魁不往莽噶里克亦必成擒乃傅魁前至魯克察克欲掠額敏和卓之功以為伊所辦理實屬無恥著即遵前旨孥解來京審訊額敏和卓辦理一切甚屬妥協著賞緞六端以示鼓勵甲戌命調回巴里坤緑旗兵丁上諭軍機大臣曰現在巴里坤所調滿洲索倫察哈爾兵共五千名加以兆惠帶回官兵已敷進𠞰之用所有調至巴里坤緑旗兵二千名原屬無用如從前派出種地兵丁尚屬不敷即派緑旗兵充補餘俱著遣回本營乙亥駐劄巴里坤辦事大臣雅爾哈善等疏奏派兵策應副將軍兆惠事宜雅爾哈善等奏言正月三十日內大臣博爾奔察副都統鄂博什帶領索倫第二起兵丁抵巴里坤臣等查副將軍兆惠等差人前來報信時已派索倫兵二百名前往接應今復派索倫兵二百八十名交鄂博什帶領已於二月初一日自巴里坤起程現在博爾奔察亦請帶兵前往臣即飭知劉順馬得勝等解送馬二千餘匹俟此項馬匹到時兆惠等約已可至巴里坤公同商議若須速行進𠞰即令博爾奔察領兵速往倘賊衆已遁非千餘兵丁所能辦理仍俟大兵齊集一同前進奏入報聞己卯命安插都爾伯特台吉布圖庫等上諭軍機大臣曰唐喀祿奏稱據都爾伯特台吉布圖庫班珠爾等呈稱伊等與䇿凌相離年久無庸歸併同住請送至察哈爾安插等語布圖庫等既不便與策凌同居自應另籌安插第察哈爾地亦無多若將此等户口俱行送往恐於伊等生計無益著在呼倫貝爾及通肯呼裕爾等處令布圖庫等居住即傳諭策布登扎布等酌量辦理呼倫貝爾等處係黑龍江將軍所轄並著傳諭將軍綽爾多知之定邊將軍成衮扎布等疏奏賞賜烏梁海宰桑兵丁事宜成衮扎布等奏言查烏梁海遊牧人衆前經臣遣員曉喻令其協同進兵伊等隨派出貝子彭楚克公丹拜兵六百名和托輝特兵一百六十餘名令伊宰桑等帶領駐劄哈勒塘嶺克木等處防禦逆賊青滚雜卜逃竄之路甚屬奮勇今蒙恩議敘臣等所領官兵其烏梁海人等並請天恩將宰桑數員準其戴翎兵丁酌賞緞匹茶葉等物以示鼓勵奏入報聞庚辰命參贊大臣舒赫德仍帶噶爾藏多爾濟宰桑固穆扎卜等前往軍營上諭軍機大臣曰黃廷桂等奏稱接雅爾哈善咨文知噶爾藏多爾濟叛迹已著前舒赫德自京帶往噶爾藏多爾濟宰桑固穆扎卜等四人現留肅州請旨辦理等語伊等尚未識朕令固穆扎卜前去之意前舒赫德起程時朕令將固穆扎卜等帶往特因衆厄魯特等雖潛謀不軌而噶爾藏多爾濟尚無叛形是以令將伊屬人遣回遊牧伊果無異心自必率衆歸誠彼時酌量情形原可從容辦理此時雖有雅爾哈善之咨而噶爾藏多爾濟實在情形究未深悉著仍將固穆扎卜等令黃廷桂送交舒赫德帶往如舒赫德等已接有擒拏噶爾藏多爾濟之信即將固穆扎卜等停止前往毋庸拘泥此旨辦理壬午諭定邊將軍成衮扎布等防範賊人設計緩師事宜上諭軍機大臣曰上年大兵前往哈薩克阿逆尚未遠遁而賊人等屢次詭言擒獻我兵遷延不進遂致首惡脫逃朕面詢自軍營回來侍衛等皆衆口一詞則達爾黨阿等為賊所愚可為前鑒厄魯特等生性狡詐此次大兵前進畏懼兵威必將逞其故智希冀緩我之師如果擒賊自效率衆歸誠必其人親至軍營叩轅籲請今並未見其人而但遣人來往其為緩兵之計無疑著傳諭成衮扎布等帶兵前進時應將此等詭稱擒獻賊人先行斬戮慎勿輕信賊言致墮姦計命坤都爾巴圖魯總管巴寧阿墨爾根巴圖魯侍衛瑪瑺馳驛赴巴里坤軍營聽候調遣乙酉宣諭軍營大臣等功過上諭大學士曰上年逆賊阿睦爾撒納及阿布賚之得以脫身逃竄西北兩路領兵大臣彼此互相歸咎其時達爾黨阿等帶領西路官兵追捕阿逆相距不過里許乃為人所紿以致遠遁北路哈達哈等則既探知阿布賚所在任意遲延不即掩獲逮已逸去始勒兵追躡其後夫軍務機宜間不容髮竟皆交臂失之其奚所歸咎前因一時委用乏人且事在萬里之外難以懸定必須查詢明確方可定其處分今詢之陸續自軍營來者則衆口一詞前後吻合是達爾黨阿哈達哈及同時參贊諸臣均無所辭其責此等誤事之人若不明示譴責仍令安然保其爵位將來何以用人達爾黨阿哈達哈本身公爵及哈達哈之領侍衛內大臣俱著革退吏部尚書員缺著傅森調補工部尚書員缺著納穆扎爾補授即兼管廂紅旗滿洲都統阿里衮著降補户部侍郎兼管廂藍旗滿洲副都統所遺户部尚書員缺著兆惠補授即兼管廂白旗漢軍都統兆惠此次調度有方甚屬勤勞并著授為領侍衛內大臣以示鼓勵其傅森之兵部尚書員缺著舒赫德補授仍兼管廂黃旗漢軍都統納穆扎爾之户部侍郎員缺著雅爾哈善調補所遺兵部侍郎員缺著哈達哈降補即兼管廂藍旗漢軍副都統達爾黨阿之廂藍旗滿洲都統員缺著雅爾哈善兼管其正白旗滿洲副都統員缺著達爾黨阿降補至兩路參贊大臣哈寧阿現隨兆惠自伊犂回至軍營亦屬勤勞著免其議處扎拉豐阿鄂實富德唐喀祿俱著交部察議朕於諸臣功過賞罰豫奪一秉至公毫無成見惟視人之效力何如耳將此通行傳諭知之定邊右副將軍兆惠等疏奏沿途𠞰滅賊衆事宜兆惠等奏言臣等於上年十一月十四日因阿卜達里托賚及阿察郭勒臺站為噶勒雜特人搶掠派副都統三格帶兵二百名前往接續臺站十九日阿巴噶斯宰桑庫圖齊遣人報稱噶勒雜特齊默特庫等告知扎那噶爾布等已搶臺站並將扎那噶爾布哈薩克錫喇等傳示各台吉宰桑之文呈送係列噶爾藏多爾濟為首共謀肆逆之詞據庫圖齊等雖稱擒拏齊默特庫等送至軍營候至二十五日尚未送到而臣等傳喚宰桑吞圖布莽鼐等亦並未至軍營情形可疑臣等即領兵自濟爾哈朗起程二十六日至鄂壘扎拉圖地方賊人突至交戰一次二十七日據三格報稱擒戮搶掠安濟哈雅臺站之呼爾璊賊衆五十餘人嗣據遣往庫圖齊納爾鄂拓克之副護軍校兆坦藍翎諾爾木等回至軍營告稱聞宰桑吞圖布屬人共言達什䇿凌哈薩克錫喇尼瑪等在哈薩克地方即同謀叛逆現在鄂拓克兵丁俱已齊集等語十二月初一日遇賊兵數千欲來迎戰大兵半係步行堅拒自守不即與之交戰賊見大兵馬力平常俱不設備臣等令索倫委署營總伊靈阿三達保帶領精兵於初三日五更時潛行出營乘賊不備奮力衝擊賊衆紛紛敗走復派侍衛齊努渾領兵一百餘名協力攻戰斬賊四五百名復將逃匿林藪賊人盡行𠞰殺此二次交戰官兵陳亡三十四人都統莽阿納及官兵得傷者一百四人共斬賊千餘人收獲駝馬軍器甚多詢問生擒賊人據供宰桑內達什䇿凌為首圖布慎塔什布圖庫莽鼐都噶爾訥默庫等同謀叛逆惟吞圖布曾經阻止衆人不從等語十五日由烏蘭烏蘇至闥勒奇哈地方擒𠞰呼爾璊台吉圖爾根等户口拏獲圖爾根供稱呼爾璊台吉賽音伯勒克鄂爾椿等一百餘户在喀喇烏蘇居往納木奇現將遊牧移往齋爾地方等語臣隨派三格帶兵擒拏將賽音伯勒克等户口盡行𠞰殺惟鄂爾椿帶領數人逃脫收獲馬駝等物二十三日至呼圖畢地方將坐臺厄魯特孟克拏獲據供係噶爾藏多爾濟屬人現在噶爾藏多爾濟在羅克倫遊牧並未從賊等語臣等即遣藍翎愛新泰副護軍校兆坦持檄前往曉諭噶爾藏多爾濟令其領兵來會二十八日至羅克倫地方拏獲噶爾藏多爾濟屬人諾爾布據稱噶爾藏多爾濟已帶兵遷至昌吉河源居住復遣副護軍校塔克慎奬賞藍翎濟蘭泰令諾爾布引導前往守候二日未回臣等領兵起程初五日至烏魯木齊初六日遇賊衆追至交戰一日至夜往劫賊營知已逃避查軍營內馬駝無多口糧亦少暫令堅守乘賊勢懈怠再行𠞰滅十一日遣往噶爾藏多爾濟曉諭之兆坦等回營告稱持檄赴彼即為伊屬人擒拏現在噶爾藏多爾濟扎那噶爾布尼瑪哈薩克錫喇鄂哲特等會兵前來迎戰將同往之愛新泰羈留給文令伊回來臣等閲噶爾藏多爾濟文內有從前將伊等騷擾今請軍營大臣赴彼遊牧面陳之語詞語悖逆深屬可惡臣等並未給與回文自十二日至十七日賊衆千餘連次攻戰至十八日噶爾藏多爾濟等始行遁去臣等於二十三日起行赴特訥格爾地方復遇賊二百餘人鏖戰一次二十六日見賊數百人繞道而去捉生詢問知是迎截巴里坤前來應援官兵臣等擬從後夾攻而賊人藏匿樹林誘之不來追之則避軍營火藥馬匹弓箭已屬無多守至二十八日臣等曉諭官兵現在口糧不過十日若不併力死戰徒致坐困於事無益衆皆鼓勇爭先一以當百定於三十日起程適遇遣來迎接之侍衛圖倫楚達禮善等帶兵八百名沿途殺賊而至將布拉罕地方邀截大兵之扎那噶爾布尼瑪等二百餘賊擊敗其餘賊衆聞風逃竄此皆皇上洞燭幾先遣兵䇿應使臣等二千官兵得以振旅而回再造之恩雖捐糜踵頂不足以報查圖倫楚等乘騎馬匹遠道遄行亦皆疲乏賊衆遊牧已遷至烏魯木齊不能追及且所帶口糧僅敷數日是以臣等議將兵丁口糧通融散給即遵旨前赴巴里坤如巴雅爾扎哈沁等遊牧未經遠竄即前往攻襲總之準噶爾人等罪惡貫盈必應盡行𠞰滅至賊衆伎倆臣等俱已深悉將來大兵齊集一由額林哈畢爾噶一由吐魯番朱爾都斯空格斯等處兩路前進自能殱滅賊衆厄魯特俱行翦除回衆自必傾心歸順奏入上諭大學士曰前因副將軍兆惠領兵𠞰賊全師而出遣人調取援兵於雅爾哈善奏到時曾降恩旨今覽兆惠等所奏其沿途與賊交戰甚為勞苦兆惠等所領並非進𠞰之兵且馬匹無多官兵等竟能同心奮勇遇賊盡行𠞰滅振旅而回實堪嘉豫兆惠三格哈寧阿永貴莽阿納已加恩封賞其侍衛齊努渾奮勉行走著授為頭等侍衛賞給額爾克巴圖魯名號并賞銀一百兩兆惠等奬給孔雀翎之領隊署營總伊靈阿三達保俱著授為二等侍衛再前此兆惠報到署護軍校納蘭圖署防禦成果與額魯特色勒𠞰滅額魯特户口經朕加恩納蘭圖成果俱賞給孔雀翎色勒授為三等侍衛各賞銀五十兩今兆惠等既奏稱成果納蘭圖額魯特達爾漢等常在哨探隊內行走等語成果納蘭圖額魯特達爾漢俱著授為三等侍衛仍著兆惠等將此次奮勉行走暨陳亡受傷人等查明送部分别議敘賞恤圖倫楚所領官兵曾經出力者亦著兆惠查明一同報部議敘侍衛圖倫楚等疏奏沿途𠞰賊情形圖倫楚等奏言臣等遵旨帶兵八百名於上年十二月二十八日自巴里坤起程正月十九日至伊勒巴爾和碩地方𠞰殺巴雅爾屬人一百餘户嗣遇副將軍兆惠遣往巴里坤報信兵丁二名據稱兆惠現在烏魯木齊地方堅守隨令一人馳赴巴里坤臣等帶領一人令其嚮導行走至濟爾瑪台地方殱滅哈薩克錫喇屬人二十餘户二十七日遇阿察郭勒逃出之沙克都爾曼濟所屬得木齊索諾木車楞等百餘人俱行殱滅次日復𠞰殺扎哈沁百餘人二十九日至察罕烏蘇巴雅爾宰桑達巴扎哈沁宰桑塔爾巴津等帶領兵丁二百餘人迎戰復行𠞰滅并擒獲達巴塔爾巴津等詢問兆惠信息據稱現在駐守特訥格爾地方扎那噶爾布尼瑪鄂哲特等領兵迎戰等語臣等隨將達巴塔爾巴津正法前赴兆惠駐劄地方是日一更時方與兆惠等會合此數次攻戰所獲牲隻甚多除給兵丁口糧外其餘駝馬等物分給自濟爾哈朗回來兵丁今於二月初一日起程赴巴里坤奏入報聞諭定邊將軍成衮扎布等分路進𠞰事宜上諭軍機大臣曰頃據兆惠等奏請兩路進兵擒𠞰賊衆所奏甚合機宜此時成衮扎布應已到巴里坤即著成衮扎布會同兆惠分路帶兵前進務期同心協力迅奏膚功從前曾降諭旨令將回部事宜從容籌辦今看此情形大兵一進即可𠞰滅賊衆厄魯特等既皆翦除則回部自可招服並著成衮扎布等妥協籌辦再昨經舒赫德等奏請將噶爾藏多爾濟宰桑固穆扎卜暫留肅州朕以噶爾藏多爾濟宰桑固穆扎卜仍行帶往今觀兆惠所奏噶爾藏多爾濟竟敢首為叛逆固穆扎卜著即留肅監禁候旨再行辦理又吞圖布圖布慎等此次雖未同謀叛逆然不可仍留彼處曾降旨令解送來京倘稍有可疑亦即正法以絶根株毋貽後患前派鄂實為兆惠參贊大臣額爾登額領隊行走今兆惠隊內原有哈寧阿永貴三格同辦事務除派一員遵旨來京尚有二人足資助理鄂實仍著同成衮扎布辦事富德著同額爾登額在兆惠隊內領隊行走軍營現在辦事人員甚多莽阿納著即行回京辛卯命奬賞定邊右副將軍兆惠等兆惠等奏言臣等至特訥格爾地方與侍衛圖倫楚等會合隨遣員前往尋賊蹤迹二月初十日至濟爾瑪台木壘地方遇副都統鄂博什帶兵五百名接濟糧餉并解到馬匹駝隻隨派臣隊內兵二百名圖倫楚隊內兵五百名同鄂博什帶來兵五百名共一千二百名臣同哈寧阿三格圖倫楚達禮善鄂博什等帶領前往木壘烏蘭烏蘇庫舍圖等處搜緝巴雅爾扎哈沁人等其餘臣隊內兵一千六百名圖倫楚隊內兵三百名交永貴齊努渾先行帶赴巴里坤奏入上諭軍機大臣曰兆惠等沿途𠞰滅賊衆甫從遠道前來今聞巴雅爾扎哈沁等遊牧在木壘等處即帶兵前往搜捕似此奮勇實屬可嘉著將御用玉韘荷包鼻煙壺賞給兆惠以示優眷哈寧阿永貴三格圖倫楚達禮善鄂博什等亦著每人賞給玉韘荷包鼻煙壺各一件兆惠等仍將𠞰賊捷音迅速奏聞駐劄巴里坤辦事大臣雅爾哈善等疏奏額敏和卓派人曉諭波羅泥都等事宜雅爾哈善等奏言前令傅魁傳諭額敏和卓令其派人隨同五十六托倫泰等帶同霍集占使人沙呢雅斯回至葉爾羌喀什噶爾等處並令其寄信曉諭波羅泥都霍集占等今據傅魁報稱額敏和卓已選派回人六名並繕就寄與波羅泥都等書信俟五十六等抵魯克察克即令由吐魯番之南羅卜淖爾一路前往回部中途並無厄魯特等在彼阻滯等語臣等查五十六等此時應已抵魯克察克即照額敏和卓所請令伊等帶同來使即赴回部曉諭奏入報聞三月癸巳命郎中蘇章阿等管理輝特人等遊牧事務上諭軍機大臣曰巴蘭泰現在病故輝特人衆遊牧事務著蘇章阿前往管理其達什達瓦屬人事務著富森管理乙未命議侍郎雅爾哈善上諭大學士曰據雅爾哈善等奏稱將傅魁殺死莽噶里克之處詢問丑達及隨去兵丁等僉稱莽噶里克帶領二十一人遇見大兵告稱不堪厄魯特騷擾復欲探伊子白和卓信息是以投內地前來乃傅魁並不詳問伊所告言語即將莽噶里克殺死等語此事雅爾哈善初次具奏尚有慶幸之詞即黃廷桂亦不以為非也朕據奏到即謂傅魁辦理錯謬降旨拏解審訊今閲丑達等及隨去兵丁所言則傅魁之罪實所難逭俟解到審明定罪雅爾哈善從前並未參奏及奉旨查問始將實情究出其因循草率甚屬非是著交部察議定邊將軍成衮扎布等疏奏領兵抵巴里坤日期成衮扎布等奏言臣成衮扎布於二月二十日至巴里坤臣舒赫德於十七日至巴里坤其阿拉善兵五百名察哈爾兵一千名皆至巴里坤惟吉林兵一千名已過安西不日即可全到約計兆惠於此月內亦可來營臣等伏思厄魯特人衆惡貫滿盈肆行背逆現在伎倆已窮𠞰滅甚易臣等於兆惠未到之前諸務豫行籌辦俟其到時公同酌議分路進兵奮力𠞰賊以副皇上訓勉至意其提督李繩武卩遵旨傳諭令其於二月二十一日起程回京奏入報聞大學士管陜甘總督黃廷桂疏奏解送進𠞰馬駝數目黃廷桂奏言臣於本年正月初八日起至二月二十二日節次解送出口馬二萬七千五百餘匹統於三月十五以內以全抵巴里坤已足敷進𠞰官兵之用尚餘馬二千餘匹亦飭交布政使武忱等隨時補解以足三萬匹之數又於正月初八九等日將靖逆地方牧放駝九百九十餘隻先行解送續據晉省解到駝隻自二月初五日起至二十二日止陸續解送出口駝四千二百餘隻其餘續到駝隻仍隨時解往應用臣料理馬駝全數出口後即於二月二十四日起程前赴巴里坤軍營奏入報聞甘肅巡撫吳達善疏奏查辦軍需情形吳達善奏言臣奉命前赴巴里坤路經安西哈密等處見各站供支解運馬匹草料多有不敷即飭軍需局司道武忱等就近採買撥補復恐挽運稍有遲誤委安西道文綬等往來督率臣仍不時稽察臣緣巴里坤商辦一切甚屬緊要且索倫阿拉善官兵已全抵巴里坤察哈爾吉林等處官兵亦將次陸續到營所有各官兵褁帶口糧均須督率料理臣現駐劄巴里坤辦理奏入報聞丙申諭定邊將軍成衮扎布等速𠞰巴雅爾等事宜上諭軍機大臣曰據兆惠等奏稱領兵至木壘河源巴雅爾等遊牧早經遷移隨派兵至阿克他斯烏蘭烏蘇庫舍圖等處搜捕並無蹤迹是以回至巴里坤整齊兵力再行進𠞰等語前曾降旨令成衮扎布兆惠等分兵往𠞰現在巴雅爾等紛紛逃避想係聞圖倫楚等領兵追擊畏懼潛逃但圖倫楚擊賊之期甚近賊衆必不能遠揚若乘其不備即將巴雅爾等追擒甚屬易事倘必俟大兵齊赴方行進𠞰則為日稍遲恐賊衆又復遠竄著傳諭成衮扎布等即揀選現在巴里坤兵丁迅速追捕仍遵前旨辦理不得更留餘孽再觀巴雅爾畏懼逃竄則其技已窮即扎哈沁噶勒雜特等亦必互相驚竄其勢斷不能驟合大兵一入自可迅奏膚功成衮扎布等務宜奮勇辦理命免副都統鄂博什等議處上諭軍機大臣曰䇿布登扎布奏上年大兵自哈薩克撤回時索倫馬甲奇圖賀爾等六人因在額爾齊斯河等處私行打牲至今未回請將領隊副都統鄂博什及參領索音達爾等交部察議等語鄂博什係領隊大臣索音達爾等乃管兵丁之專員並不留心約束致奇圖賀爾等藉詞打牲至今未回自應交部議處但念索倫兵丁性多愚昧不諳事體且經效力行走鄂博什現又派往西路進兵著從寬免其議處丁酉諭定邊將軍成衮扎布等進兵機宜上諭軍機大臣曰額敏和卓奏稱噶爾藏多爾濟等已於二月初五日遷往伊犂等語噶爾藏多爾濟若在原遊牧地方則衆厄魯特等自必各據其地負嵎自固今乃棄其遊牧逃往伊犂明係勢窮力竭自可不日成擒且伊犂地方達瓦齊及阿睦爾撒納尚不能據守噶爾藏多爾濟又安能託足惟在官兵等奮勇前進乘其不備速行𠞰滅方合機宜再上年擒拏阿逆時因未派兵堵截逃竄之路以致逆賊潛逃著傳諭成衮扎布等此次兩路進兵務於闥勒奇等險要地方豫行派兵防守至噶爾藏多爾濟雖往伊犂其額林哈畢爾噶等處或仍係其屬人大兵過後潛來侵犯亦未可定並著成衮扎布委派幹員搜捕倘遇伊等存留賊人即派兵數百名交領隊大臣富德等奮力𠞰滅己亥駐劄巴里坤辦事大臣雅爾哈善等疏奏定邊右副將軍兆惠等抵巴里坤日期雅爾哈善等奏言二月二十三日副將軍兆惠帶兵抵巴里坤諸大臣及員辨兵丁人等仰荷天恩升賞無不感激歡忭現在會同定邊將軍成衮扎布等籌辦進兵事宜其參將邁斯漢亦同兆惠等前來遵旨拏解行在治罪奏入報聞辛丑命副都統唐喀祿傳諭都爾伯特汗䇿凌等擒賊事宜上諭軍機大臣曰成衮扎布奏達什䇿凌哈薩克錫喇等聞俱遷往額爾齊斯等語額爾齊斯地方現係都爾伯特汗䇿凌等在彼遊牧今達什䇿凌等見大兵深入紛紛逃竄前往亦未可定著傳諭唐喀祿伊赴䇿凌等遊牧時即傳旨曉諭令伊等各帶兵丁將逃往之厄魯特等悉行𠞰滅其户口牲隻等即賞給伊等屬人惟務將賊首解送來京以正國法毋任脫壬寅申諭定邊將軍成衮扎布等籌辦分路𠞰賊事宜上諭軍機大臣曰據成衮扎布等奏稱現已議定兩路進兵俟馬匹解到即行起程又達什策凌等聞已遷往額爾齊斯等語昨已傳諭唐喀祿曉諭䇿凌等派兵擒拏惟是伊等所奏特云賊衆遷往其如何擒拏及從何得信之處並未聲明著傳諭成衮扎布等悉心籌議或止須伊等分路進𠞰或尚須派北路兵丁協力擒拏如用北路兵丁約計派兵若干即敷䇿應著即妥議奏聞並著傳諭䇿布登扎布等豫行籌辦倘需用時即可應時調遣從前成衮扎布等曾有採買馬匹之奏今已採買若干及現有兵丁若干詳悉奏聞候朕酌量降旨命賞喀爾喀公齊旺多爾濟貝子品級上諭軍機大臣曰䇿布登扎布奏據公品級齊旺多爾濟呈稱現在患病不能效力擒賊其所進馬五百匹請免給價值等語觀其情詞懇切殊屬可嘉著加恩賞齊旺多爾濟貝子品級以示鼓勵平定準噶爾方略正編卷三十七
