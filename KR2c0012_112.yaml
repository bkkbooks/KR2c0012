body:
  text: 乾隆二十三年秋七月乙酉朔諭靖逆將軍雅爾哈善等與定邊將軍兆惠合兵相機擒拏霍集占上諭軍機大臣曰雅爾哈善等奏稱遣總管扎爾善等至鄂根河瞭望未見賊踪又沙雅爾有兩路可通庫車若遣兵前往恐與來援賊衆不能相值惟嚴設卡倫防範等語所辦甚是看來伊等所領滿洲索倫兵尚少昨因兆惠有分兵向厄魯特回部交界搜捕哈薩克錫喇等之奏檢閲地圖所指道途距回部甚近兆惠即前赴雅爾哈善所在以兵相付仍來京請訓若另有辦理之處則俟事竣來京亦可又雅爾哈善等奏擒獲回人阿舒爾瑪特據供前副都統阿敏道被拘霍集占曽云大國使臣不可傷害留候布魯特信息若不能取勝則仍有用處等語似阿敏道尚未被害將來取葉爾羌時宜籌畫阿敏道脫出之䇿或此時霍集占見事勢已迫詭稱不敢傷害欲行送回以緩我兵不妨乘機撫納俟其投見即時拏解若霍集占雖未害阿敏道仍留以為質則告以阿敏道已照陳亡例賞恤爾等送與不送俱可仍一面進兵辦理但能將阿敏道救出則更善苐不可因此墮賊計中致悮軍事可傳諭雅爾哈善兆惠等知之命升敘防守沙勒達朗卡倫官兵上諭軍機大臣曰雅爾哈善等奏稱沙勒達朗卡倫守備莫倫岱遇賊衆馬步六百餘前來衝擊率步兵百餘人迎敵殺賊甚衆身亦被傷等語莫倫岱以少勝衆奮勉可嘉著加恩以逰擊即用賜號墨爾根巴圖魯賞戴孔雀翎并賞銀一百兩其效力及陳亡得傷官兵著查明送部議敘議恤諭定邊右副將軍䇿布登扎布酌量馬力進兵上諭軍機大臣曰䇿布登扎布前奏和落霍澌之捷己加恩賜以伊父超勇之號今詢問擒獲之鄂哲特等知賊衆先將游牧移踞髙岡伏兵邀擊我師䇿布登扎布等奮勇衝突賊不能支侍衛瑪琥等亦奏稱我兵甚少副將軍身先士卒所向無前等語朕聞之實為嘉恱著加恩賞繫金黃帶以示旌異至䇿布登扎布敗賊之前已得舍楞逃竄信息彼時未即追𠞰或因不能兼顧亦事勢使然此時布庫察罕逃入哈薩克料伊部自必縛獻惟哈薩克錫喇往投西哈薩克之特栁克富德兵少窮追稍覺可虞昨已諭䇿布登扎布䇿應自必奮勇前往但亦須酌量馬力倘有不足即與富德撤兵暫回伊犂俟來年再舉亦可在他人遲延觀望朕每降㫖催督䇿布登扎布天性勇往是以諭令酌量現在領兵所至情形如何可即速奏聞戊子大學士管陜甘總督黃廷桂疏奏撥運巴里坤糧餉黃廷桂奏言竊巴里坤為軍需總滙之區備貯兵糧最關緊要今年春間甘肅撫臣吳達善奏准於哈密甘肅等處撥運各色糧二萬石經臣飭令沙州各衛協濟長車五百輛並廣雇駝騾現在陸續運竣恐車駝分散難於雇覔仍令軍需局查議添撥一萬石在案臣因近奉諭㫖派出索倫察哈爾兵丁明年又添派官兵二萬須豫備一嵗口糧請於甘省各屬運糧十萬石乘此夏秋之間道路便於行走又值哈密車輛駝騾聚集之時應先從哈密存貯糧石內米麵兼撥儘力運送巴里坤務於九月前運足五萬石其哈密缺額再於內地運往補足庶儲偫有資不致臨期周章繁費奏入報聞庚寅靖逆將軍雅爾哈善等疏奏擊敗霍集占援兵雅爾哈善等奏言六月十六日黎明據攻圍庫車城官兵報稱西門外有賊衆踪跡復據瞭望兵丁報稱離城十里有二三處賊衆等語臣等議將滿洲索倫蒙古緑旗兵丁派領隊大臣順德訥愛隆阿端濟布衮楚克朗衮扎卜馬得勝等帶領侍衛官員分路迎𠞰臣等駐兵髙曠之地見塵埃坌起中我兵衝擊賊陳自卯至辰賊衆不支紛紛逃竄我兵追𠞰六十餘里直抵鄂根河未刻始收兵回營據愛隆阿報稱領吉林索倫等兵至庫車城南據遣往沙雅爾路埋伏之索倫協領阿定保等望見賊踪即前往迎敵城內賊人數百自西門出衝我緑旗兵我與侍衛富紹德爾森保等接戰來援賊衆亦至夾攻我兵隨衝斷賊陳分三路敗走亦即分兵追𠞰至鄂根河賊衆爭渡殺溺甚衆我兵惟披甲昻蘇蘭陳亡領催色爾呼德得傷六處披甲六十五得傷九處據順德訥報稱我兵敗賊後城西門外尚有賊衆數百侍衛鄂里克塔等衝擊賊大敗入城鄂里克塔及侍衛達克塔納俱得鳥鎗傷又總管扎爾善等報稱同侍衛竒泰參領額林車鄂爾魁喀爾瑪勒圖等領右翼兵衝斷賊陳追至河口計殺溺賊人八百餘又據委署營總阿爾噶勒沁報稱領官兵六十餘人擊敗賊五百餘侍衛噶布舒奎瑪岱等追至河口計殺溺賊亦八百餘厄魯特侍衛班第署驍騎校特木德勒圖披甲威滿察吉克定察陳亡又得傷者八名據端濟布報稱同侍衛齊凌扎卜諾爾本齊努渾公衮楚克台吉朗衮扎卜額林沁等衝賊右翼追至河口復將逃往蘇巴什山之賊人三百餘全行𠞰殺我兵得傷者五名等語查來援賊衆共三千餘人據俘獲人口供稱霍集占率其伯克十餘人聚集各城人馬前來敗逃時左肩中箭未透衣服等語此次𠞰賊殺溺死者計一千六百餘人收獲贊巴喇特鳥鎗十鳥鎗五百弓箭撒袋百長鎗千刀斧等械五十鎖子甲三十馬一百駝二百傷斃駝馬無算又陳獲大纛二臣額敏和卓識為霍集占之纛其鐫刻圖寫字樣俱回部經教之語非屬下伯克等所敢用謹一併封奏又俘獲賊人多羅特瑪特訊係英噶薩爾城之伯克據供隨霍集占至鄂根河遇前次托和鼐敗遁之伯克阿布都哈里克同受傷賊人三十餘告知二千人俱被𠞰殺伯克鄂郭勒中箭身死霍集占駐候援兵二日遣人探知庫車城尚未破遂于十五日夜趲行至天明被大兵𠞰殺我等逃散不知霍集占存亡信息霍集占所帶從伊犂脫歸之回人二千貿易回人五百新降之沙喇斯瑪呼斯五百又阿克蘇烏什馬步兵各一千計兵五千有馬者三千伊兄波羅泥都領兵二千在喀什噶爾防範布魯特從前霍集占與各頭目定議以甫免為厄魯特役使今若投誠又當納貢不若自長一方種地守城足為扞禦波羅泥都云從前受辱於厄魯特非大國兵力安能復歸故土恩不可負即兵力亦斷不能抗霍集占不從又有屬下伯克等助其狂悖冀有掠獲起程時波羅泥都追送書信云聞大國有兵由特穆爾圖淖爾前來作何備禦霍集占今加意防守及行至鄂根河聞托和鼐之衆盡被𠞰殺衆人畏懼勸阻霍集占仍執意前來遂至此敗去年春間有布魯特之伯克呼瓜為喀什噶爾頭目所管千戶因霍集占曽搶掠布魯特之冲噶巴什哈卜察克兩鄂拓克遂啓猜疑率屬徑回布魯特波羅泥都惟恐啓釁亦不曽追趕至大國使臣阿敏道及兵丁數十名俱留養於葉爾羌霍集占此次來援帶至阿克蘇始行戕害等語查多羅特瑪特尚悉回部情事但重傷將死未便逭其顯戮謹即行正法奏入上諭軍機大臣曰據雅爾哈善等奏稱逆酋霍集占率賊衆數千親援庫車大臣官兵等斬馘搴旗逆酋負傷僅免深屬可嘉著查明功績等次造册送部議敘公衮楚克頭等台吉朗衮扎卜間散台吉額林沁在軍前素稱效力此次益為奮勉著加恩賞衮楚克孔雀翎朗衮扎卜封為公額林沁授為頭等台吉將軍雅爾哈善參贊大臣額敏和卓哈寧阿一體交部議叙額敏和卓前年自瓜州移居吐魯番魯克察克時牲隻間有傷損著雅爾哈善等籌議賞給價值籽種俾生計充裕貝子玉素富著賞縀六端亦交部議敘散秩大臣伯克鄂對總管職銜噶岱默特色梯巴勒氐各賞緞四端伊等子弟五人各賞緞二端其陳亡官兵著交部照例議恤領催色爾呼德披甲六十五得傷甚重色爾呼德賜號克爾車凱巴圖魯六十五賜號固濟爾巴圖魯賞銀各一百兩又雅爾哈善等前奏我兵奮勇縋城賊人鎗炮木石競下我兵倒落者十數人亦有得傷者縋城得傷較野戰尤為竭力著查明加倍議敘此次戰功誠為卓越但稍有不愜朕心者當此賊人破膽即宜乘勝派兵急追且賊逺道來援我兵以逸待勞偵逆酋所逃之地并力攻擊渠魁既獲各城必望風歸命不知雅爾哈善等曽否如此辦理抑或因滿洲兵少不敷調遣可𫝊諭伊等倍加奮勉再所奏庫車西門有賊人出城形跡即於十里外見賊衆塵起似內外豫先約㑹然後同時舉事若使賊得通信必我卡倫防守不嚴雅爾哈善等即查明嚴加議罪具奏至波羅泥都雖云人尚謹願頗勸阻其弟然此言亦不可深信伊果能將霍集占擒獻再行酌量辦理今亦不妨遣人諭波羅泥都及各城回衆以霍集占悖逆罪重所欲得者惟此一人與爾等無涉但遣我軍中回人恐被賊戕害可憫惟于俘獲人口內遣往更為妥協俱著雅爾哈善等作速奏聞併𫝊諭兆惠等遵照前㫖速赴回部合軍進𠞰雅爾哈善奏摺即録寄伊等閲看辛卯諭巴里坤辦事副都統阿里衮豫籌糧運事宜上諭軍機大臣曰近派察哈爾兵一千名令侍衛訥齊訥總管薩木都卜領至巴里坤前赴雅爾哈善軍營著𫝊諭阿里衮將應行豫備口糧駝隻就現在之數派撥如有不足即行文黃廷桂辦送俟訥齊訥等到日即可遄行再運送口糧駝隻若自巴里坤徑達軍營長途未免疲乏此時應先撥駝隻於吐魯畨一帶有水草處豫行牧放以備更换其吐魯畨何處水草較好應需駝若干著阿里衮與黃廷桂永貴定長等酌議具奏壬辰定邊將軍兆惠等疏奏招服布魯特部落情形兆惠等奏言臣等前抵布魯特境收服薩伊克薩喇巴哈什兩鄂拓克頭目圖魯起拜等遣侍衛烏爾登托倫泰等同往招撫各部落六月初四日據烏爾登等報稱五月十二日至圖魯起拜之游牧地名珠木罕次日𫝊齊所屬宣讀恩㫖適塔拉斯頭目邁他克之子額什博托亦在此地一同跪聽俱以手加額叩首告稱我等久欲為大皇帝臣僕被準噶爾阻隔今始得如願不勝欣恱詢額什博托云塔拉斯有四千餘户係瑪木特呼里比總管哈喇博托邁塔克阿克拜分領由此處行走五六日可至托倫泰於十四日起程前往招撫烏爾登於十八日至圖固斯塔老與薩喇巴哈什頭目車里克齊相見次日宣㫖衆俱歡恱叩拜如前車里克齊等獻牛羊百頭願謁見將軍赴京入覲於六月初三初四等日行至軍營臣等恭述皇上恩諭撫納并示以哈薩克歸誠情事若有厄魯特逋逃在爾境內者即當縛獻衆皆合掌叩首云强如厄魯特俱已𠞰滅富如哈薩克俱已降附我等微小部落不歸誠聖主更將何往臣等又告以進勦回部之兵由吐魯畨一路想已事竣但布魯特在葉爾羌喀什噶爾之右倘逆酋窮迫來投或經由爾境應協力擒送以承恩賞車里克齊等敬諾復云我等舊游牧地求給賞為業臣等曉示云爾等曽被厄魯特驅逐借安集延等處游牧即現在耕種之納里特珠木罕塔拉斯等處從前尚為厄魯特所據今大兵平定準噶爾格根喀爾竒喇特穆爾圖淖爾等處仍須安設卡倫伊犁有大兵駐防若爾等游牧狹隘惟抒誠懇請恭候大皇帝天恩指賞不可私行遷徙車里克齊等敬諾如初又詢以入覲人數據稱我瑪木特呼里比年九十餘身體過胖坐時腹垂至地不能乘馬惟車里克齊圖魯起尼沙三人赴京等語初六日臣等設宴令觀騎射衆皆驚羡初九日派三等侍衛達桑阿照看車里克齊等赴京其托倫泰招撫之塔拉斯俟回報續具奏聞奏入得㫖下部知之諭定邊將軍兆惠等分兵搜捕逸賊事宜上諭軍機大臣曰據兆惠等奏稱伊等分兵擒𠞰厄魯特餘孽伊自造哈至和爾岱海喇巴特搜捕向哈什伯勒齊爾與富德㑹合等語此等地方不但無哈薩克鍚喇等賊亦未必有嗎哈沁惟造哈和爾岱等處與回部相近即由此往㑹雅爾哈善至富德所奏經由布魯特塔拉斯游牧抵西哈薩克邊界偵探哈薩克錫喇信息搜捕吹沙喇擘勒餘賊等語從前兆惠富德雖有分兵之奏而由何路回至伊犁尚未奏及朕即諭富德務由沙喇擘勒回轉又諭策布登扎布領兵由此路䇿應令覽所奏與前㫖適相符合富德其加意搜捕逸賊若慮兵少即由沙喇擘勒通信䇿布登扎布速往㑹合俱著𫝊諭知之命安西提督豆斌分管緑旗兵丁上諭軍機大臣曰從前屢諭豆斌巡查臺站搜捕沿途之嗎哈沁等嗣據奏報所獲無幾看來未必有大隊賊人藏匿著將現領兵丁就近前赴雅爾哈善軍營其馬得勝所領緑旗兵即著豆斌分管癸巳申諭靖逆將軍雅爾哈善等速擒賊首事宜上諭軍機大臣曰逆酋霍集占親援庫車為雅爾哈善等擊敗奏到時朕即謂彼時若能乘勝追逐必獲渠魁但恐滿洲兵少不敷調遣詢問伊等如何辦理夫我兵尚欲逺攻葉爾羌喀什噶爾以擒霍集占罪人斯得則各城望風欵附今霍集占自來送死我兵既奪其纛逆酋負傷僅免此即擒賊之一大機㑹且雅爾哈善等三人於𠞰賊時駐兵髙岡以望形勢彼時雖不知霍集占親來之信而賊纛續經認識又有俘獲人口供詞若遣哈寧阿領兵追襲逆酋未必即回巢穴或被追入沙雅爾阿克蘇即移庫車之兵併力攻擊與直取葉爾羌等城何異若慮移兵時庫車賊人出城追襲則亦如𠞰殺援兵之例更覺便於殱滅乃徒以兵少坐失機㑹朕甚惜之昨已𫝊諭兆惠就近領兵與雅爾哈善㑹合即有索倫兵二千餘斯時斷不可坐困庫車須分兵另取一城或將軍營久駐之馬换給乘騎一切機宜俱當酌量辦理至軍營索倫等兵效力年久已派兵二千更换但此時未能即到且兵不厭多若有年力精壯仍願留營效力者即分别加賞其餘人俟更换後賞給遣回仍以朕㫖宣示云留營之兵必不曠日持久用昭體恤愛養之意所有現在情形著作速奏聞甲午靖逆將軍雅爾哈善等疏奏擊敗庫車賊衆及賽里木歸降信息雅爾哈善等奏言六月十八日辰刻庫車城下有騎賊三百步賊八百餘來往行走以誘我兵臣等駐兵排陳叠放鎗炮殺賊六十餘人賊復來毁我軍壘又𠞰殺四十餘人賊衆遂擁擠入城不及回顧我兵仍向稠密處攻打是以傷賊甚多城內晝夜哭聲震動此次擊賊巴圖魯侍衛海蘭察阿拉善署參領烏巴什得鳥鎗傷吉林索倫蒙古兵得傷者八人緑旗兵陳亡者十一人守備察凌阿得鳥鎗傷又兵丁得傷者三十二人是日有賽里木城回人阿瓜斯伯凱遣人報稱將霍集占所用之伯克阿里等擒獻率五百餘户歸降俟來至軍營續具奏聞奏入上諭軍機大臣曰覽雅爾哈善等所奏𠞰殺庫車賊衆二百餘人餘皆擁擠入城不敢復出是賊膽已寒自可計日攻克此次奮勇效力及陳亡得傷官兵著查明送部議叙議恤得城後留貝子玉素富駐守雅爾哈善等即領兵前進庫車圍久未破負固宜懲著將壯丁俱行𠞰殺量留老弱若賊人此時被迫獻城則仍行寬貸但渠魁必當正法可派員解送來京行至巴里坤即加拘縶至回人阿瓜斯伯凱等雖舉城歸附亦不可輕忽當收取軍器置其妻子於庫車附近村莊俟各城平定仍歸舊地亦可可𫝊諭雅爾哈善等留意辦理命陜西等省增購糧運騾頭上諭軍機大臣曰前經降㫖令陜西河南二省辦騾一千五百頭恐不敷用著陜西河南各增購騾一千頭山東購騾一千頭山西購騾二千頭統于今嵗九月趲解肅州均毋遲悮可𫝊諭鐘音胡寶瑔塔永寧阿爾泰知之大學士管陜甘總督黃廷桂疏奏籌運軍營糧餉黃廷桂奏言臣因西路大兵現在庫車糧運關係緊要查口外遐曠路徑多可旁通聞有可自哈密直趨闢展吐魯畨一帶之路隨委員查勘據報有夾山路徑騾駝皆可通行水草饒裕較繞行巴里坤更近三站今奉諭㫖令籌庫車阿克蘇等城駐防官兵糧運可否行車臣即㑹同阿里衮委員迅往查勘但思若俟覆到之日始由巴里坤辦運未免稍遲不若此時先將糧石運貯吐魯畨以後只由吐魯畨轉運更加迅速臣擬於此時將哈密現辦車騾留其半運送巴里坤備貯糧石分其半竟由哈密運至吐魯畨收貯若勘明可以行車即委員修理如山險不便請迅飭甘省各屬挑買健驢解送俟直督及山陜撫臣購辦駝騾到日均令由哈密運往軍營回空之時再將吐魯畨購備糧石轉運軍營較之巴里坤又省吐魯畨往回之二十餘站似覺更速奏入上諭軍機大臣曰黃廷桂所奏籌辦庫車等處糧運一摺甚合機宜若拘泥成規必俟查明道路解到駝隻始由巴里坤起運前往即極力趲赴已需時日朕正在降㫖籌辦而黃廷桂即能計慮及此請將糧石運貯吐魯畨與朕㫖適相吻合閲奏不勝欣慰黃廷桂身體素弱如此悉心計畫朕不惟嘉之且深憐之也其從前所請辦駝一萬隻已諭直𨽻等處購買可𫝊諭知之乙未議酌籌增辦馬匹事宜軍機大臣奏言黃廷桂所奏酌籌增辦馬匹一摺奉㫖交臣等速議具奏臣等恭查前奉諭㫖令該督豫備明年二萬官兵口糧係統計進𠞰兵數而言並非専用緑旗兵二萬該督所奏緑旗兵二萬人給馬一匹加以官員隨役得馬二萬五千匹已足敷用等語似屬悮㑹查解往巴里坤共馬一萬七千匹又陜甘兩省派撥營馬五千匹新舊買補馬內派撥八千匹共得三萬之數即如所奏再飭各營撥出五千匹亦止三萬五千若以緑旗二萬加以吉林索倫察哈爾官兵仍不敷用現在雅爾哈善辦理回部若今年可取庫車大兵前抵阿克蘇則來年需用緑旗兵不過一萬再加亦不過一萬五千其吉林等兵約以五千為率人給馬三匹緑旗兵人給馬一匹合之官役數已足用此外若有急需自可於軍營騎回馬內挑選供應至巴里坤留養馬匹既不便過多則續派之一萬八千匹應如所奏於十月內酌量逺近送至肅州加意飼秣俟軍營需用豫為知㑹再行分起轉解亦可無悮奏入上諭曰來嵗進𠞰回部合吉林索倫察哈爾及緑旗兵不過一萬五千人即再多亦不過二萬該督籌辦一切具見實心然看來未免稍形拮据轉恐逺近傳聞張皇其事當以靜鎮密籌為要至馬騾駝隻又交直𨽻及各省購辦現又於鄂爾多斯購馬四千匹駝一千隻自可無悮軍行著再𫝊諭知之己亥命派出健鋭營兵丁由哈密前赴庫車上諭軍機大臣曰現在派健鋭營官兵一千名於七月二十八日自京起程分為五起每間二日按起行走可傳諭黃廷桂京兵出口之後即由哈密取道前赴庫車較之經由巴里坤更為直捷其應給馬匹口糧即在哈密豫備并𫝊諭布政使銜德舒即赴哈密妥協辦理仍著甘肅巡撫吳達善親往督率甘肅現有賑恤事宜蘭州省城不可無大員經理著布政使蔣炳自肅回蘭辦事壬寅申諭靖逆將軍雅爾哈善等進取回城事宜上諭軍機大臣曰昨雅爾哈善有豫籌撤兵之奏雖亦先時部署但伊等身為將軍參贊大臣衆所觀聽既懷撤兵之念則情形自必宣露恐官兵等知之不免懈怠退縮且我兵圍城日久防守漸疏賊衆或乘隙衝突逃走亦未可定朕深為厪念用兵之道當于易懈之時益加意警備方無貽悮凡賊可逃之路自必安設卡倫但須多派兵丁防禦倘賊人衝突以大兵追擊更於要路堵截又安所逃至霍集占甚屬詭詐此時或又集衆來援當以偏師相持而大隊從間道直走其後兩路夾擊自當就擒雅爾哈善等宜相機辦理若不以殱渠為要務而徒事得一城再攻一城則區區庫車尚不能猝下由此而阿克蘇葉爾羌喀什噶爾愈難攻克安望成功况我兵雖未克庫車而賽里木即已降附則回部大勢可知前聞波羅泥都與霍集占不協或遣新降回人為間而所得之城仍令管領但量派緑旗兵協同防守先聲所至必有相繼迎降者總之惟在當事之人其志先定則雖暫有艱阻必終歸成就斷不可豫生畏葸其加意奮勉以佇捷音臣等謹案逆賊霍集占偝德怙亂糾黨應援脅從之衆咸懷觀望若罪人斯得則諸城震讋欵附矧其冒死入城無異釡魚阱獸茍偵諜速而堵截嚴未有不早就俘獲者我皇上握符審幾當搴旗克敵之日即先事周防惟恐游魂偷息致稽捷奏而諄諭及之且庫車木下附近城邑早已約降賊人情見勢絀乘間奔軼亦事理所必然至若頓兵持久疏懈易生斯時加意戒嚴尤軍志所最亟厥後降人踵至詢及情形始知逆賊出入自如與逆黨阿布都克勒木等先後幸脫雖終歸獻馘而重煩敵愾皆由任事者養癰貽患恭繹前後諭㫖坐照如神不獨么麼小醜無所施其伎倆即將率之畏葸恇怯亦不能自掩其情形矣申諭定邊右副將軍策布登扎布等䇿應參贊大臣富德上諭軍機大臣曰據䇿布登扎布等奏稱與巴祿同追舍楞至古爾班察爾與阿桂合兵知舍楞巴入俄羅斯隨派副都統鄂博什等前往索取又前遣往哈薩克索取布庫察罕之納旺等尚未回報因與阿桂暫行駐候巴祿仍巡查臺站等語所辦尚合機宜朕前屢諭䇿布登扎布策應富德計奉到此㫖時阿布賚已將布庫察罕縛送策布登扎布即同阿桂前往與富德合兵向阿布勒噶爾索取哈薩克錫喇如飾詞延緩或適届撤兵之期亦即相機酌辦頃已諭副都統德爾素為參贊大臣在科卜多辦事阿桂不必回科卜多倘業經轉回即來京請訓至巴祿既仍舊巡查臺站從前達禮善敏珠爾多爾濟等追𠞰阿巴噶斯哈丹等遊牧日久未見奏報巴祿著在額林哈畢爾噶等處探聽達禮善等所在協力𠞰除餘賊毋徒以搜捕嗎哈沁為事并𫝊諭知之諭定邊左副將軍成衮扎布辦理烏梁海等事宜上諭軍機大臣曰據扎隆阿奏稱烏梁海原任總管博郭勒之子恩克率所屬七十餘户逃走現在軍木楚克扎布已領兵一百名近往追捕等語可𫝊諭成衮扎布於應行調度事宜豫為籌辦至成衮扎布前奏追索舍楞一事如何辦理及領兵現於何處駐劄作速奏聞大學士管陜甘總督黃廷桂疏奏解送之厄魯特人口病故屬實黃廷桂奏言臣欽奉諭㫖以軍營解送之厄魯特等病斃大半有無疏脫捏報情節查詢辦理今厄魯特納默庫等及賚瑪里木集賽等男婦人口於七月初四五等日解到肅州隨同軍需局司道等官逐一查詢據供實因長途饑疲致斃且沿途看守無處脫逃衆口相同尚無捏報情節奏入報聞癸卯申諭靖逆將軍雅爾哈善等奮勉進取回城上諭軍機大臣曰據阿里衮奏稱由巴里坤運送庫車口糧牲隻已於七月初起程又辦米五百石接濟官兵糧餉俟車騾齊集亦即趲運等語看來巴里坤供給軍需自無貽悮近復諭吳達善等由哈密豫備糧餉送往軍營且官兵數次𠞰賊及回城田野種植俱應有收穫何必籌及撤兵可傳諭雅爾哈善等以奮勉效力為要定邊將軍兆惠疏奏右翼布魯特歸誠兆惠奏言准富德咨稱侍衛烏爾登招降布魯特瑪木特呼里比遣其弟舍爾伯克等入覲計六月十八日可至軍營烏爾登因托倫泰未到令布魯特人往迎俟降人一到即令托倫泰伴送十九日烏爾登率舍爾伯克及其族弟呼岱巴爾氐來營查瑪木特呼里比遣弟入覲甚屬恭順應即派烏爾登伴送赴京又所招布魯特人內有克勒德拜者為衆所服因先出痘不敢入京向臣等求給印文招撫各處布魯特臣酌量給發又有貿易回人阿卜達喇瑪阿卜都喇伊木願往招降安集延等處回衆臣即允其給文約於來春至伊犂相㑹又運送糧餉之健鋭營前鋒托克托拜等於五月二十三日在昌吉斯被哈薩克三百餘騎搶掠續遇其頭目額爾類諭知官兵什物即行查出交還并稱前奉將軍發給印文此行原為查拏哈薩克錫喇等語其情形甚為恭順再二月間侍衛額爾登額因馬踶傷脛不能行走請送至巴里坤調理奏入上諭軍機大臣曰據兆惠等奏稱侍衛馬爾登招降布魯特馬木特呼里比遣其弟舍爾伯克入覲等語烏爾登伴送入覲之布魯特等行至巴里坤肅州等處俱著優加宴賚以示慈惠其貿易回人願往招降安集延等處回衆恐伊等如期來至伊犂自當豫為守候庶不失信逺人䇿布登扎布富德回兵時即在彼駐劄辦理或酌派大員亦可至托克托拜遇哈薩克額爾類將屬人所掠官物查出交還具見誠懇著賞額爾類緞四端仍𫝊㫖嘉奬并諭以據擒獲人口所供哈薩克錫喇在阿勒沁部落如能𫝊示縛獻必沛殊恩前鋒托克托拜行走黽勉著授為藍翎侍衛其侍衛額爾登額受傷既重即回京調理俱各𫝊諭知之平定準噶爾方略正編卷五十八
