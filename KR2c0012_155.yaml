body:
  text: 乾隆二十七年三月甲午朔諭陜甘總督楊應琚酌通新疆商販上諭軍機大臣曰永貴等奏稱自回部蕩平內地商民經由驛路及回人村落彼此相安臺站回人又疏引河渠開墾田地沿途水草豐饒行旅並無阻滯若曉示商民不時前來貿易即可與哈密吐魯番一體於官兵亦有裨益等語新疆貿易自應流通但須聽商人自便不可官為勒派著傳諭楊應琚將此曉示商民有願往者即給以印照毋使胥吏需索人自樂於趨赴矣并傳諭永貴知之闢展辦事郎中德爾格疏奏安插屯田回人事宜德爾格奏言臣承准軍機處議覆將闢展屯田兵五百名裁汰二百四十名遣回本營所遺地畝原派吐魯番額敏和卓所屬六十户住闢展九十三户住連木齊木威魯堡珈如拉所屬六十户住連木齊木二十七户住洋赫每户給田五十畝今酌將額敏和卓人户全歸闢展珈如拉人户全歸連木齊木以便約束仍有餘田三千畝今素賚璊派給莽噶里克沙呼里回人墾種至裁汰兵丁所餘牲隻未免閒曠現在威魯堡回人尚乏屯田牲隻請量估價值給與使用其各項農具亦俱作價分給回人於二年內交納糧石抵銷奏入報聞喀什噶爾辦事尚書永貴等疏奏辦理回地水利情形永貴等奏言查回人地畝俱藉山水灌溉凡溝渠深淺墟堤厚薄俱須相地勢之高下測水流之緩急舊時俱有定式因伊等不知守護修葺以至淤阻塌陷夏濘冬冰行旅亦滯臣等派喀什噶爾伯克率所屬密喇卜伯克等遍歷村莊詳加察勘或應浚渠以通其源或應築堤以蓄其勢至若開通路徑架叠橋梁務期堅固以利行人仍行文各駐劄大臣一體酌量辦理奏入報聞壬寅命詳定發遣新疆人犯之例上諭大學士曰發遣伊犂及烏魯木齊等處人犯定例祗有給發屯田兵丁為奴之語至給與何項官兵及作何辦理之處從前未經議及伊犂等處官兵非若黑龍江之土著設換班回將攜其人歸來乎著軍機大臣㑹同該部詳悉另行定議具奏尋議查定例發往各省駐防為奴人犯俱不准典賣他所現在發遣人犯係隨屯田兵丁耕作俱照前例辦理但未經分析何項兵丁臣等公議察哈爾及緑旗屯田兵丁俱應給與為奴人犯察哈爾兵係永逺屯駐毋庸置議其緑旗兵有更換者即將所得人犯交與接班兵丁為奴或係撤回及調往他所並無接替之人亦即另行撥給屯田兵丁隨同力作奏入上從之丁未諭喀什噶爾辦事尚書永貴等查奏預備官兵馬匹牲隻欵項上諭軍機大臣曰永貴等奏本年換班官兵前來所有馬匹牲隻未免損傷應行補給其一切差遣及臺站卡倫舊兵遣回時亦應預備等語似不僅為換班官兵起見官差行走及坐臺守卡人等原有額設之項且倒斃自有准銷成例不過酌量添補奏內約計喀什噶爾葉爾羌阿克蘇三城需馬一千三四百匹并採買牛隻未經分晰欵項殊屬含混著傳諭伊等查明詳悉具奏諭烏魯木齊辦事副都統旌額理酌派侍衛事宜上諭軍機大臣曰昨旌額理奏乾清門侍衛薩穆坦告請前往額林哈畢爾噶搜捕嗎哈沁曽諭以薩穆坦在軍營年久回烏魯木齊之後即著來京倭升額係與薩穆坦一同派往者亦著回京伊等係以領隊大臣派往烏魯木齊辦事之員今該處大員足敷辦理不須再為補缺或有需用侍衛之處旌額理再行請㫖戊申命傳諭哈薩克阿布勒瑪木比特約束所部毋越境游牧上諭軍機大臣曰旌額理等將哈薩克貿易人等所賚阿布勒瑪木比特奏章進呈大意謂我兵收伊屬人牲隻之時有懇求給還者復被毆擊等語近據阿桂奏遣伊勒圖驅逐越境游牧之哈薩克此時未必即回想仍係去年所辦事屬既往伊等尚以為言此次復行驅逐必更生疑懼昨即諭阿桂等以此次姑從寬免著仍將前㫖明白宣示若仍不悛改即重治其罪將收所屬人牲隻派豐安同侍衛二員照舊管押送交阿布勒瑪木比特諭以定制不可妄干特恩不可屢得至貿易人等所稱收取游牧一事亦告以大皇帝業經洞鑒加恩免罪爾等當感激聖恩安居本界勿得踰越滋事陜甘總督楊應琚等疏奏移駐巴里坤官兵起程楊應琚等奏言安西提標五營前經酌議以中左右三營兵丁一千五百名移駐巴里坤於本年二月分起前往其前後二營兵丁一千四百九十二名移駐烏魯木齊於秋初料理起程至安西各協營現在巴里坤聽差兵丁約八九百名若皆撤回另補未免煩費請按數截留即以應行移駐兵丁扣抵俱經臣等㑹奏兹臣楊應琚同提督臣五福㑹商將三營官兵酌分十起於二月二十八九等日陸續起程奏入報聞辛亥訓諭失參疏防伯克之阿克蘇辦事都統海明等上諭軍機大臣曰新柱等奏稱額里齊城回人尼雅索丕盜馬逃來阿克蘇被伯克額肯阿克薩哈拉盤獲送交伯克帕察沙卜看守又復脫逃今為和闐巡街回人拿獲請照回例治罪等語尼雅索丕既經拿獲交伯克帕察沙卜看守復行疏脫海明自應一面拿緝一面將疏防之伯克參奏若謂該伯克諱匿不報現在新柱奏內又有疏防伯克經阿克蘇大臣斥革之語則伯克等之去留尤伊所當奏聞者著傳諭海明等將從前辦理此案不行具奏緣由明白回奏額肯阿克薩哈拉盤獲賊犯審出情節殊屬可嘉著加恩賞緞二端以示鼓勵丙辰諭副都統額爾登額辦理解送逃人事宜上諭軍機大臣曰前經成衮扎布奏稱俄羅斯比爾噶底爾將逃入伊地之烏梁海敦多克等二百八十餘名口送回俄羅斯此次甚屬遵守定約著額爾登額將從前留養熱河之俄羅斯逃人等送交該處其送來逃人中起意為首之敦多克等著派員即行解京其餘人等若盡行解京不但行走煩費且審明治罪之處烏梁海等亦不得而知著於為首各犯外再查其次情罪難逭者押送軍營正法仍傳諭烏梁海等俾知所警畏不敢恣意脫逃其罪不至死者仍陸續看守交部審明定擬發遣己未命奬賞參贊大臣阿桂等上諭軍機大臣曰阿桂等奏稱伊勒圖豐訥亨驅逐越界游牧之哈薩克拿獲和莽伯凱等五人收其馬二千餘匹前來伊犂將為首二人暫留候㫖其三人釋回令齎書曉示阿布賚等語阿桂辦理甚屬妥協著賞給荷包二對伊勒圖豐訥亨著各賞荷包一對拏獲之和莽伯凱等理應治罪示警但伊等性本愚䝉歸附日淺不深知內地法度昨已降㫖不必解京即釋回部落其馬匹亦著給回豐訥亨此次驅逐哈薩克熟悉伊等情形即著傳㫖曉諭其原派之豐安不必前往命奬賞瑪納斯等處屯田官兵以原任巡撫阿思哈駐劄辦事上諭軍機大臣曰旌額理等奏稱從烏魯木齊辦給瑪納斯庫爾喀喇烏蘇晶河屯田兵丁馬匹糧餉俱全抵各該處現在水土滋潤三月前後可盡行播種等語此次派往屯田兵丁衝寒行走照管車輛䭾載奮勉可嘉著旌額理等酌量奬賞以示鼓勵瑪納斯等處既編設村莊應駐大員總辦烏魯木齊已有旌額理永德著阿思哈即駐劄庫爾喀喇烏蘇辦理三屯事務俱著傳諭知之癸亥命定奏請黜陟回部伯克之例上諭軍機大臣曰昨新柱等審訊盜馬回人脫逃一案有疏防伯克帕察沙卜業經阿克蘇大臣斥革朕以伯克等之黜陟理宜具奏降㫖詢問但回部伯克甚多大小不等若一概具奏亦覺繁瑣嗣後伯克等有升選降革等事五品以上著各該大臣專摺具奏六品以下著年終彚奏夏四月乙丑諭闢展辦事郎中德爾格等酌辦種植事宜上諭軍機大臣曰楊應琚奏請將闢展屯兵收穫之芝麻菜子分借回人種植俟收穫後扣還籽種其餘量為交官以抵應輸額賦等語闢展所種芝麻菜子上年已試有成效自應借給回人種植以省運油之費但回地向未有此若令其分種恐非所素習著傳諭德爾格酌量辦理或伊等不願承種即毋庸拘泥該督來咨勉強從事再烏魯木齊地畝廣逺現在開墾三屯或即於該處播種以濟日用亦無不可并傳諭楊應琚知之己巳諭喀什噶爾辦事尚書永貴等酌辦官買厄魯特事宜上諭軍機大臣曰永貴等奏稱准軍機大臣議覆德爾格奏將回人收養之厄魯特官為買出送伊犂安插因詳加察訪有實受回人苦役者即給價贖取有為家主信用妻孥牽纍不願贖身者各隨其便等語從前辦理此事原因厄魯特等受回人折挫與其畏懼脫逃流為嗎哈沁不如贖出與現在伊犂之厄魯特等一同安插以靖地方此亦視伊等情願與否耳若伊等果能相安無事不致逋竄為匪又何必勉強贖出著傳諭永貴即如所奏辦理并傳諭各駐劄回部大臣等知之以辦理外藩事宜訓諭尚書永貴等上諭軍機大臣曰永貴等奏稱霍罕額爾德尼伯克因從前冲噶巴什布魯特搶掠貨物未經全還懇求補給所開銀數與邁瑪喇伊木原報不符將前後情節復書曉示等語覽永貴等復書詞氣太弱霍罕人等來喀什噶爾貿易所攜不過土産豈有齎銀四萬餘兩之理此特該部落人等見給還貨物轉生僥幸事理易明永貴等應即向來使斥責云爾等貿易往來人數及所攜貨物誰不知之安得有齎銀數萬之事況搶掠爾等之烏默爾比業已解京治罪前次查給貨物爾等屬人俱感激領回不便復據一面之詞再行辦理似爾貪得無厭將欲誰欺如此明白宣諭方為妥協乃區區致書分析殊為失體著傳諭永貴等嗣後遇此等事須加意果斷毋得稍露怯弱之意庚午諭葉爾羌辦事都統新柱等訓戒伯克等毋巧取所屬上諭軍機大臣曰新柱額敏和卓奏稱葉爾羌和闐所積榖石甚多如酌量有餘之數以二分折交錢文採買牲隻八分折交紬布運至伊犂換易哈薩克馬匹既於公事有益而該城伯克等亦俱樂從等語折交榖石既屬公私兩便自應如此辦理但回城伯克每多巧取若指稱公事科斂其下尚屬有限此等折交錢布所及者廣最宜留心查辦即如鄂對阿什默特二人鄂對尚可信無巧取之事然此特因額敏和卓在彼有所顧畏耳今以玉素富往代雖同屬舊時臣僕而資望少減恐鄂對不無玩忽額敏和卓於鄂對宜從容開導云爾當勿改初心我暫歸一二年再來駐劄仍可相見如故庶伊知所謹凛將來與玉素富交代時亦宜告知俾得留心辦理凡遇回部伯克等俱當詳悉訓戒務期正己率屬以挽頽風葉爾羌辦事都統新柱等疏奏籌辦新錢易布事宜新柱等奏言葉爾羌所鑄新錢共十萬三千騰格有奇除易換普爾錢文外尚存四萬餘騰格普爾漸次短少雖新錢與舊普爾如數相易亦未即流通適值阿桂咨商以布准糧解送伊犂與哈薩克貿易一事因思葉爾羌布價甚賤每匹只需普爾四五十文計四萬餘騰格即可買布四五萬匹與哈薩克交易每匹折銀一兩利已加倍不獨省內地運解之繁而錢文流通回人生計亦可充足臣等詢之衆伯克無不欣感謂回部舊例以二舊錢易一新錢今如數兑換已屬有益無損又以收買布匹其益更不能盡言惟多植棉花勤於紡織數年之間元氣可復臣等定議後即曉諭該伯克等現屬三月種棉之時務宜勸課屬人各勤各業奏入報聞辛未諭喀什噶爾辦事尚書永貴等暫緩採辦銅斤上諭軍機大臣曰永貴等奏稱回部鼓鑄錢文仍須採礦方足應用現派員役率領回人三十名在碩爾布拉克等處試採得銅頗旺復添派回人裹帶口糧前往採辦等語昨據達桑阿請多採銅斤曽諭以恐纍回人不必添派今永貴之意與達桑阿相同回部新鑄錢文尚多採銅原非急需著暫緩辦理諭喀什噶爾辦事尚書永貴等酌辦內附布魯特等游牧事宜上諭軍機大臣曰伊勒圖奏稱阿克賽游牧布魯特之伊穆喇特比及阿哈拉克齊三人率所屬二百户移於雅賽游牧與指給之地不合因行文曉示俟秋收後仍令移回等語布魯特等離指給之地任意遷移固屬不合但伊等性本愚䝉惟知水草之利今諭以內地定制未必通曉轉生疑懼且雅賽距阿克賽僅隔一站現屬間曠亦於事體無礙著傳諭永貴伊勒圖嗣後辦理布魯特等祗宜加意約束俾安靜無事雖不可縱令伊等任意游牧至於逐水草遷移相去不逺者不必過於拘泥葉爾羌辦事都統新柱等疏奏愛烏罕等處情形新柱等奏言由土默特前來貿易人等呈送拉達克喇嘛書譯稱聞得愛烏罕頭目愛哈默特沙統衆將㾗都斯坦汗阿里雅木吉爾殺害其子阿里雅科瓦爾逃竄愛哈默特沙立阿里雅木吉爾之孫遂回游牧又統衆至固珠喇特脅降克什米爾部落不服現在相攻等語臣等酌量復書辦令起程奏入報聞喀什噶爾副都統伊勒圖疏奏霍罕塔什干等處情形伊勒圖奏言霍罕貿易回人告稱霍罕迤北四站有塔什干原係舍氐和卓摩羅沙木什二人分管舍氐和卓漸強莫羅沙木什被其侵奪訴於霍罕額爾德尼伯克乞師復還侵地舍氐和卓㑹合西哈薩克及霍濟雅特之丕色勒伯克攻殺摩羅沙木什二子額爾德尼遂往攻塔什干丕色勒伯克亦來赴援等語臣密委阿奇木伯克噶岱默特確訪情形酌量辦理奏入報聞壬申諭陜甘總督楊應琚詳查各營馬匹額數價值上諭軍機大臣曰楊應琚奏請將烏魯木齊貿易馬匹撥補移駐新疆各營倒斃缺額一摺業經軍機大臣覆准并議將肅州各營每年額缺一體通融酌撥等語著傳諭楊應琚將肅州各營每年額缺若干向例領銀採買價值若干如此辦理較之常年節省若干一併查明具奏甲戌參贊大臣阿桂等疏奏添駐伊犂屯田回人事宜阿桂等奏言葉爾羌等城回人續請移居伊犂者二百十四户五百七十名口臣等交阿奇木伯克木薩等安插量其年力精壯者與從前移駐之一百十户共為二百五十户給與籽種口糧牲隻農具合經制屯田之回人一千户定為一千二百五十户其老弱有疾之七十四户暫交該伯克養贍年幼者俟其長成仍可充補屯田之缺再此項回人若俱令在河北固勒扎等處屯田亦尚可容但不如河南居住百餘戶則兩岸俱有莊屯於觀瞻既協而接濟穆素爾嶺臺站更為順便因於霍濟格爾巴克編設一屯安插八十户海努克編設一屯安插七十户奏入報聞戊寅申諭喀什噶爾辦事尚書永貴等採辦銅斤不必添派勒限上諭軍機大臣曰永貴海明和其𠂻等奏稱阿克蘇所添採銅回人因豁免伊等應交糧石呈乞代奏謝恩又稱各城回人等添採銅斤以四年為限等語採辦銅斤原以裕官兵回人之用自當從容辦理惟就現在所得之銅源源鼓鑄即稍有遲滯亦無甚關係何必添派回人勒定年限昨諭達桑阿等不必添採銅斤永貴似尚未奉到故如此陳奏至永貴等所奏回衆僉稱情願連年添採銅斤之處大臣等面詢回人伊等焉敢以不願為詞即謂回人愛重新錢亦事之所有但既非鑄錢賞給伊等且仍收其普爾又令其採銅為鼓鑄之資謂皆出於本願恐未必盡然凡事當權其輕重緩急不可張皇欲速著傳諭永貴等知之辛巳命副都統舒泰往葉爾羌代護軍統領德爾素上諭軍機大臣曰新柱等奏稱護軍統領德爾素忽患氣弱之症不時舉發等語德爾素看來未能即痊著派舒泰前往更換回京壬午巴里坤辦事都統永寧等疏奏酌留各營官員事宜永寧等奏言自安西挈眷赴巴里坤駐防官兵一千五百名分為十隊已陸續到齊臣等照料安插訖查巴里坤各項差務需官二十餘員現在所到三營大小官共二十員此內除撥往屯田及本營差委外所餘十餘員實不敷用臣等公議酌留舊駐都司一員守備一員千把總共十員仍令聽候差遣外其餘官員兵丁皆面為交代令回原營所留官員照各城例三年一換此後或有自營撥回或裁減差務之處再行酌量辦理奏入報聞癸未命酌賞新到伊犂之厄魯特等上諭軍機大臣曰阿桂等奏稱由哈薩克布魯特來投之布魯特等安插伊犂此內攜有牲隻可以自給者居其大半其餘多屬貧乏等語來投之厄魯特等求安生業居住伊犂於耕牧之事頗知奮勉但甫經安插一切俱須料理應酌量稍為資給俟地畝成熟牲隻孳息始可接濟著加恩將生計稍可者各賞銀一兩貧乏者大口賞布二匹小口布一匹仍賞銀一兩其各處收集之厄魯特等亦著一體給賞各頭目等酌賞緞匹此次係朕特恩著阿桂等明白曉示令嗣後益加鼓勵以裕生計議酌籌駐防官兵回程事宜陜甘總督楊應琚奏言南北兩路換班撤回之滿洲索倫察哈爾官兵共三千二百餘員名又加以跟役人衆若俱於哈密雇車送至肅州所費不資且恐難於雇覔若仍由肅州備用愈覺繁瑣請將換回之索倫察哈爾兵照前赴新疆換防官兵之例皆令行走邊外較為省便其應由內地入京之滿洲官兵除自伊犂回程者經由烏魯木齊外其南路回程官兵程途較逺莫若由博羅圖嶺等處亦取道烏魯木齊行走如有疲乏馬匹即於該處酌量撥換庶兩路官兵皆可將原來馬駝直抵肅州再行換給可省哈密雇車之費奏入得㫖軍機大臣速議具奏尋議換回駐防察哈爾官兵原議俟來春水草充足時撥給馬䭾由邊外行走其索倫兵令各城大臣酌量情形或今歲或來春俱由邊外遣回較之經行內地自覺節省俱應如所奏辦理其自南路回京之滿洲官兵該督請由烏魯木齊行走直至肅州固屬省便但查烏魯木齊馬匹業經奏准令換防之索倫察哈爾兵到彼撥換應查明此外尚有馬匹若干是否足敷回程官兵更換再烏魯木齊離肅州尚逺若其中馬匹實有疲乏或於哈密凑買接濟尚屬易辦其所稱官兵騎䭾一至肅州即就近交厰牧放以備撥補營驛缺額及倒斃過多賠補繳價各事宜並令照例咨部核辦奏入上從之丁亥命副都統素誠同原任巡撫圖爾炳阿往烏什辦事上諭軍機大臣曰烏什城與布魯特接壤安集延人等時來貿易事務頗多著派副都統素誠前往烏什更換永慶素誠係新經任事之員恐一人不能獨辦現在庫車事簡有鄂寶已足辦理著圖爾炳阿前往烏什同素誠辦事命賞給阿克蘇阿奇木伯克色梯巴勒氐看守墳塋人户上諭軍機大臣曰永貴等奏稱阿克蘇阿奇木伯克色梯巴勒氐因伊舊居烏什祖父墳墓在彼請將從前房産之入官者稍為撥給遣三四户人前往守視所給官項由阿克蘇抵交等語色梯巴勒氐前在軍營頗屬奮勉已加恩授為散秩大臣阿奇木伯克奉職亦屬盡心今以先壟之故請派數户前往守視自宜允行所有給與田産著加恩賞賜不必由阿克蘇抵交著傳諭永貴等遵照辦理并曉示色梯巴勒氐知之命優恤續查陳亡病故之呼倫貝爾等官兵親屬上諭軍機大臣曰阿桂等奏呼倫貝爾馬甲章固勒圖兄弟三人隨征兄章固岱病故弟扎什鼐陳亡今補行查出應請議恤等語章固勒圖兄弟三人內二人在軍前病故陳亡殊屬可憫章固勒圖著加恩以驍騎校用又索倫領催達本達爾等父子兄弟四人者有陳亡病故者事亦相同著該將軍等將從前曽否辦理查明具奏又諭曰阿桂隨帶之藍翎侍衛徹木布禮前在軍前頗知奮勉今於伊犂病故雖非陳亡可比殊堪憫惜著加恩賞給恩騎尉令伊子承襲一次仍賞銀五十兩喀什噶爾辦事尚書永貴等疏奏更換駐防官兵經過回地事宜永貴等奏言查現在伊犂換班之索倫兵由穆素爾嶺前來京師之滿洲兵或由朱爾都斯或由闢展前來及換班兵丁回程俱經過回人村莊哈密闢展吐魯番等處深知內地法度交易尚覺公平自庫爾勒玉古爾庫車賽里木拜至阿克蘇自阿克蘇至葉爾羌喀什噶爾之大小村莊恐回人等貪利故昂市價而兵丁等或恃強滋事俱應預為籌辦再兵過時正值禾茂水滿之候應嚴禁馬駝踐踏地畝溝渠併預備船隻橋梁等項已行文各城大臣妥協辦理奏入報聞辛卯軍機大臣疏奏通核派往伊犂等處官兵經過各省欵項軍機大臣奏言前據河南巡撫胡寶瑔將派往伊犂阿克蘇之滿洲兵二千名自河南至陜西安設臺站預備車馬給與口糧錢文共作銀二萬二千五百兩有奇列欵具奏欽奉諭㫖以河南既經奏報則自京師以至伊犂阿克蘇共費若干亦宜通查㑹核臣等遵將此次經行之直𨽻陜甘省及哈密巴里坤辦給各欵皆行文查核今據各該處將所需實數折算銀兩咨覆臣等彚核除河南業經奏銷外直𨽻共需銀一萬七千二百兩有奇陜西共銀一兩二千四百兩有奇自甘肅出口至伊犂阿克蘇共銀十五萬四百兩有奇通計自京城起至伊犂阿克蘇止需銀二十萬四千兩有奇謹將支用欵項分晰列單具奏奏入報聞平定準噶爾方略續編卷十六
