body:
  text: 乾隆二十年冬十一月乙酉諭定西將軍策楞進𠞰竊據伊犂宰桑都噶爾等事宜策楞奏言十月二十六日副都統阿敏道解察哈爾䕶軍校鄂齊爾圖等至軍營臣將現在伊犂情形詳細詢問據稱我隨將軍駐劄伊犂八月二十二日喀爾喀貝勒旺親扎卜領兵撤回為賊人搶掠回報將軍將軍等派侍衛扎克素等帶領兵丁同宰桑都噶爾偵探不意都噶爾引我等至宰桑克什木駐劄地方突將我等交得木齊布塔齊看守是日宰桑巴蘇泰與都噶爾克什木等率衆赴伊犂肆行搶掠旋至濟爾哈朗空格斯地方圍住官兵將軍等俱行自盡副將軍薩喇爾為宰桑錫克錫爾格所獲我等於九月十九日夜乘間脱出聞阿睦爾撒納於九月内前赴伊犂坐牀令各鄂拓克豫備羊酒不知現在何處伊犂從賊之人係克什木巴蘇泰敦多克曼集等數人又得木齊布塔齊云宰桑巴蘇泰與阿睦爾撒納相好是以令我等看守並非出於本心再來時至托多克地方聞知阿巴噶斯哈丹搶掠臺站歸時為諾爾布林沁之兵所敗諾爾布林沁將游牧内移阿巴噶斯等恐其復行𠞰殺親向哈丹鄂拓克借兵安設卡倫防守游牧我等潛行六日始出阿巴噶斯等游牧等語奏入上諭軍機大臣曰據策楞奏鄂齊爾圖等所供都噶爾克什本敦多克曼集巴蘇泰等竊據伊犂肆行擾害情罪可惡策楞帶兵進𠞰務期斬獲倘就擒時即派幹員解送來京治罪妻孥悉行誅戮其喀爾喀王貝勒等隨將軍等駐劄伊犂者尚多策楞訪問查出即明白傳㫖曉諭伊等猝遇寇賊兵少受困朕心甚為軫念今大兵已抵伊犂即令伊等各回游牧休息以示體䘏至所奏𠞰滅阿巴噶斯後即帶兵速赴伊犂辦理固屬奮往但不可不慎重仍遵前㫖偵探阿逆如已據伊犂候噶爾藏多爾濟等到時㑹合前進方為妥協命審擬遲悞軍糧之遊擊王國士等上諭軍機大臣曰軍行糧餉甚屬緊要遊擊王國士乃派委解糧之員半月止行數臺任意玩悞著革職治罪道員王守坤訛傳官兵等在烏爾圖布拉克地方守候糧餉以致解送遲悞著一併交與和起等審明定擬具奏丙戌命永貴等辦理糧餉上諭軍機大臣曰王守坤現因遲悞軍糧交和起等質訊永貴在北路軍營辦理糧餉尚屬黽勉著加恩賞給按察使銜署理臨洮道速往巴里坤辦理糧餉其烏里雅蘇台糧運事務著蘇章阿温福辦理諭㕘贊大臣富徳督辦西路臺站事宜上諭軍機大臣曰前已降㫖授富徳為㕘贊大臣駐劄額林哈畢爾噶協同扎拉豐阿辦事富徳前在北路管理臺站甚屬妥協今西路具奏事件失之遲緩想因臺站新設未諳馳遞而新附之厄魯特等或未能奮往効力富徳應加意督率並酌賞銀兩茶葉以示鼓勵丁亥訓諭定西將軍策楞上諭軍機大臣曰從前平定伊犂時投誠之台吉宰桑等班第等若能因其求見開誠曉諭有應鼓勵者奏聞加恩則新附之人傾心悦服遇事無不陳告不但地方情形人情向背皆可周知即伊等可信與否亦得以灼見聞班第在彼惟辦理陳奏事件不與伊等接見又與鄂容安意見不睦以致為賊所困今策楞前往當以前事為鑒遇沿途投誠厄魯特等即與接見庶可以通其情而資其力將軍大臣惟在集思廣益寧輯邊疆方為無負任使若陳奏事件自有司員承辦即稍有遲悞亦屬可原至在事大臣等俱係朕信用之人理應和衷共濟屏除一切意見為國家効力宣猷設彼此互生猜疑不特於公事無益寧不貽笑於厄魯特耶即如現往軍營之厄爾錐音哈薩克錫喇尼瑪等雖係新降之人既同在一處亦應虚衷商酌使伊等各抒所見以期集事策楞前在伊犂目擊班第等情形此時務宜遵㫖悉力妥辦毋蹈前轍再前遣尼瑪駐額林哈畢爾噶查辦臺站今伊抵巴里坤領兵前進奮往可嘉寄到佩用荷包及鼻烟壺二件著傳㫖頒賜尼瑪不必駐劄額林哈畢爾噶即同策楞領兵前進其所派管理臺站事務策楞於所知台吉或噶爾藏多爾濟屬下宰桑内選派一二員隨同富徳管理諭甘肅巡撫吳達善等派兵運糧事宜上諭軍機大臣曰軍營糧餉闗係緊要理應加意辦理何以遊擊王國士派委運糧半月僅行六臺必係僅派緑旗兵丁運送以致如此玩悞和起等辦理甚屬錯繆現在滿洲及索倫察哈爾兵丁調集巴里坤若交伊等運送不但行走迅速且於運糧之便直抵軍營一舉兩得况達什達瓦人衆此際已應至巴里坤附近地方伊等善於行走又熟悉路徑將伊等選派數百名酌給糧石與滿洲索倫等兵丁同運更為有益此皆和起等應行籌辦之事乃並未籌及所司何事著傳諭吳達善和起豆斌等遵㫖悉心辦理命潼商道薩瀚等赴肅州等處差委上諭大學士曰現在西路軍營糧餉馬駝需員經理該督撫等現經委派各員外著再派潼商道薩瀚涼莊道來朝前赴肅州及安西哈密等處聽候該督等差委分辦至巴里坤軍營委用將弁亦尚需人著派副將滿祿際泰㕘將青海邁斯漢遊擊對齊富明阿前赴巴里坤聽候和起豆斌等委派軍務命選派達什達瓦部落人衆從征効力上諭軍機大臣曰據扎拉豐阿奏稱達什達瓦部落人衆請移至扎卜堪安插等語前已降㫖令伊等暫住巴里坤附近地方俟明年另籌游牧且達什達瓦屬人正擬選派出兵若將丁壯選派遷其妻拏於扎卜堪冬季行走勞頓即至彼處亦仍須籌辦養贍今據達什達瓦之妻告稱伊等屬人内可揀選兵丁八百名應即行選派遣赴軍營進兵人衆已有口糧不須另給其餘人等應如何賞給接濟之處著於現運糧石及存貯茶斤内酌量辦理一面奏聞一面賞給達什達瓦屬人既可選派八百名而和起豆斌等但因前議派涼州莊浪兵四百名今既將此項兵丁所辦行裝給達什達瓦屬人以抵其數辦理亦屬拘泥應先派四百名起程嗣後或四百名或三百名俟馬匹到日再行續進至涼州莊浪兵丁不必遣往伊等到彼亦屬無益著即行遣回軍營正需馬匹之時不必辦給馬匹酌給車價令其行走其薩喇爾之子玉魯斯兄喇嘛羅卜藏即著由歸化城送往察哈爾游牧完聚再所奏布庫努特九十餘户如係策楞近日收服之衆應行分賞軍營効力官員若係歸順前來之人俟散秩大臣吞圖布到時令其酌量選派帶往軍營効力餘亦照達什達瓦屬人安插己丑侍衛第瑪等疏奏扎薩克三濟特等言語情形第瑪等奏言准副都統富徳咨遵㫖將班珠爾書信給和碩特扎薩克三濟特及台吉鄂齊爾等閲看并將三濟特等言語情形具奏臣等帶領三濟特等於十一月初九日至烏里雅蘇台即將班珠爾書信給三濟特鄂齊爾閲看據三濟特禀稱阿睦爾撒納負恩叛逆無人不恨查額林哈畢爾噶係鄂齊爾之父諾爾布敦多卜游牧與沙克都爾曼濟游牧相連如伊等游牧未動自可合力隨大兵前進我游牧亦在沙克都爾曼濟附近地方中雖隔綽和爾游牧其人甚少如與諾爾布敦多卜等一同進𠞰我族中台吉如瑪尼巴圖巴蘇泰瑪賚烏巴什努庫特圖魯孟克阿穆爾努斯海薩里等可通信協力其班珠爾所給衆台吉書信俟給與諾爾布敦多卜沙克都爾曼濟等看後再行曉示衆人等語據鄂齊爾禀稱我年幼即蒙皇上格外天恩將來回見我父諾爾布敦多卜惟竭力共𠞰逆賊以期報効等語至班珠爾宰桑禪宗已照例給與口糧於十一月初十日馳赴軍營三濟特出痘將愈暫為安歇臣即帶領馳赴西路軍營奏入報聞庚寅㕘贊大臣達爾黨阿等疏奏𠞰滅包沁逃竄人衆達爾黨阿等奏言前據親王成衮扎布報稱路遇逃亡包沁業經擒殺數人聞烏隆古地方尚有此項人等現在帶兵前往等語嗣據副都統扎爾杭阿㑹同成衮扎布塔爾瑪善等領兵前往遣索倫䕶軍校布音達爾等於察罕郭勒地方追殺十餘人生擒一人又遣索倫䕶軍校達海等在青吉爾地方追殺厄魯特三人喀爾喀副管旗章京扎木占至博羅鄂博地方追殺厄魯特七人十月二十日成衮扎布等親至烏隆古之扎克鄂博地方追及賊人三路堵截將肯哲顔達什巴雅爾圖薩喀及伊等妻孥盡行𠞰滅外計𠞰殺成丁男子三百餘人俘獲妻孥四百餘口鳥鎗馬匹等項俱行收獲據巴雅爾圖等供稱阿睦爾撒納現已前往伊犂等語所有此次効力人員應請㫖交部議敘其户口牲隻分賞官兵以示鼓勵奏入報聞辛卯命授二等侍衛奇徹布為頭等侍衛上諭軍機大臣曰此次𠞰滅包沁叛衆二等侍衛奇徹布甚屬奮勉著加恩授為頭等侍衛並賞銀一百兩令其前往西路軍營効力諭陜甘總督方觀承等查辦軍營馬匹上諭軍機大臣曰據扎拉豐阿奏稱甘州肅州送到馬匹内脿痩不堪乘騎仍行解回者甚多現在所收馬匹脿分亦不過四分等語此項送往馬匹俱係各營餧養備用何至疲痩若此之多即堪用者亦不能肥壯甘州肅州離巴里坤甚近現已若此路逺更何以堪策楞領兵前進為時已乆續進官兵刻不容緩乃馬匹竟不能應用此皆各營平日不盡心餧養及解送人員怠忽所致著方觀承吳達善嚴查㕘奏外仍將此項解回馬匹照數選擇補送其續解各處馬匹亦著作速送赴巴里坤應用毋得少有遲悞再解回馬匹若回至各原處必多倒斃或於安西等處地方就近餧養並著方觀承等酌量辦理壬辰定西將軍策楞疏奏進兵所過情形策楞奏言十一月初三日吐魯番之達爾漢伯克莽噶里克遣伊子自和卓前來軍營禀稱情願派兵効力但現在馬匹無多春間派兵一百五十名途間被布魯特等搶掠後達什達瓦人衆經過吐魯番復被搶奪請給與馬匹隨營効力並將自伊犂脱出之察哈爾兵伊羅勒圖送回軍營臣將伊羅勒圖安插臺站即遵㫖奬諭白和卓賞給緞疋又因軍營糧餉一時不能送到並令白和卓照今年夏間之例將伊等游牧羊麵運送軍營貿易白和卓即回至游牧遵諭運到臣領兵至特訥格爾地方呼爾璊台吉達瓦之弟鄂爾奇達遜帶領宰桑宗對等前來告稱我兄達瓦前往入覲游牧無人阿巴噶斯等逼令搶掠臺站不得已順從而行後諾爾布林沁兵至我即隨同前來所有搶掠臺站時分給駱駝一百隻尚存七十餘隻應行繳還臣亦曉諭慰撫並將駝隻分給臺站應用奏入報聞甲午定邊左副將軍哈達哈等疏奏噶勒雜特得木齊丹畢率衆來降哈達哈等奏言據沙喇布魯圖卡倫侍衛瑪賚文稱噶勒雜特得木齊丹畢率屬人一百十二户來降隨遣侍衛安崇阿前往查問據丹畢告稱係宰桑都噶爾屬人久欲投誠前為達瓦齊調遣後赴和托輝特郡王青滚雜卜處投誠令在彼處種地今行至摩和爾岱地方遇阿睦爾撒納前來搶掠我等逃避得出懇求遷移卡倫内居住等語查丹畢户口共六百有餘各有牲隻器械臣即飭管旗章京德里克將伊等移至扎卜堪安插並令管轄扎哈沁之協理台吉策凌旺舒克就近管轄奏入報聞乙未㕘贊大臣富徳疏奏帶領噶爾藏多爾濟等沿途行走情形富德奏言臣接奉諭㫖令臣於烏里雅蘇台派兵一千名䕶送噶爾藏多爾濟前往游牧臣即遵㫖曉諭噶爾藏多爾濟等伊等不勝感悦第臣等自烏里雅蘇台起程於十一月初九日已抵奈曼明安地方若更向調兵尚須守候時日前臣已奏准在奈曼明安地方豫備索倫兵三百名現已齊集計此地至巴里坤僅止七日之程由巴里坤至額林哈畢爾噶亦不過十餘日之程已與噶爾藏多爾濟等公同商酌即帶領索倫兵三百名前往沿途加意防䕶自可無虞大約十二月初間即可抵伊等游牧俟到日臣即帶領兵隨將軍等進𠞰奏入報聞辦理青海事務副都統德爾素疏奏採買馬駝數目德爾素奏言臣於十月二十二日接奉諭㫖令臣㑹同郡王索諾木丹津於各扎薩克採買馬駝解赴西路軍營臣即於十一月初一日出口前赴博羅充克克地方採買馬二千匹駝四百隻於十一月二十五日委員解赴軍營奏入報聞丙申命查審倒斃馬匹之遊擊鍾世俊等上諭大學士曰據方觀承㕘奏遊擊鍾世俊守備色爾敏接收軍營換回馬一千九百七十匹沿途並不加意牧放以至倒斃一千八百四十餘匹怠忽已極等語鍾世俊色爾敏俱著革職拏問治罪至軍營換回馬匹前據冶大雄等奏明四千有零何以該弁等所領止一千九百餘匹是冶大雄等從前並未查明實數冒昧具奏並著交部嚴加議處又諭曰方觀承㕘奏遊撃鍾世俊摺内據鍾世俊供稱此項馬匹係索倫察哈爾等兵丁自伊犂騎回又經進接永常騎往克什圖往返疲乏等語該弁等收領馬匹如果不盡心牧放以至倒斃如此之多自屬罪無可逭若實係回自伊犂又復騎往克什圖勞傷已極與有意怠玩者有間且其咎在責令收領之人而該弁等承委辦理勢非由已情尚可原著方觀承等將實在情由查核具奏候朕酌量降㫖丁酉命㕘贊大臣玉保速赴策楞軍營協辦軍務上諭軍機大臣曰據策楞奏稱諾爾布林沁遣人告稱伊父噶爾藏多爾濟所遣宰桑車木布已抵游牧一切進兵事宜現候將軍扎拉豐阿㕘贊大臣玉保等到時前來㑹商並未領兵來見等語諾爾布林沁尚未知策楞已授為將軍是以専候扎拉豐阿等到時商議朕前因策楞與永常觀望不前是以革職今策楞自知前譴奮勉効力仍復加恩録用著將此傳諭諾爾布林沁等令其聽候調遣至玉保原係在軍營行走之人稔知彼處事宜及厄魯特等情形著即馳赴軍營於一切事務悉心籌畫如有所見即與策楞商議斟酌辦理毋得稍存退諉倘各執意見或至阻撓事機自不能逃朕洞鑒命傳諭噶爾藏多爾濟聽候將軍策楞調遣上諭軍機大臣曰前阿逆搶擄臺站時諾爾布林沁頗知大義擊敗阿巴噶斯哈丹等朕加恩封為郡王後又帶兵協助將軍𠞰滅布庫努特曽降㫖嘉奬近又集聚屬下兵丁與將軍策楞約於烏魯木齊㑹合乃策楞使人督催諾爾布林沁伊遵照伊父所遣宰桑之言静候將軍扎拉豐阿等到時始發兵來㑹前因策楞與永常辦理未善朕將伊革職治罪諾爾布林沁未知策楞復任將軍遲疑未赴亦情理之常但策楞自帶兵進發奮勉行走諸事悉合機宜著富徳傳㫖曉諭噶爾藏多爾濟此時伊若已抵軍營一切調取兵馬商辦事務務協助策楞斟酌妥辦若尚未至軍營著即寄信與伊子諾爾布林沁聽候將軍策楞調遣不可稍涉觀望諭定邊右副將軍扎拉豐阿速赴軍營上諭軍機大臣曰據扎拉豐阿奏稱接奉授定邊右副將軍之㫖現在緩行候達爾黨阿交印後再行前進等語扎拉豐阿此奏殊屬錯謬策楞帶兵進發為時已乆兵力亦復不多亟宜帶兵續進互相策應扎拉豐阿身荷重任宜即奮勇効力迅奏膚功乃稱候印緩行殊不識事理輕重達爾黨阿帶兵行走到期未可豫定著即傳諭扎拉豐阿馳赴策楞處協同辦理如策楞徑往伊犂扎拉豐阿仍遵前㫖駐劄額林哈畢爾噶辦事訓飭駐劄巴里坤辦事大臣和起豆斌等上諭軍機大臣曰據策楞奏咨催和起豆斌等將應補給兵丁馬匹及甘州肅州續到馬匹即速解赴軍營現在尚未解到等語策楞帶兵進發全恃馬力和起豆斌理應上緊辦理凡解到巴里坤馬匹自宜隨到隨解俾策楞等不至有悞軍行今屢次咨催尚未解送和起等不過以策楞係得罪之人即不遵照辦理無甚闗係策楞現辦理將軍事務伊等何得不遵照辦理有意延緩著和起豆斌明白回奏命封貝勒塞卜騰郡王品級協辦北路軍務上諭軍機大臣曰據舒明奏稱貝勒塞卜騰遵㫖帶二十餘人馳赴軍營等語塞卜騰自投誠以來黽勉効力春間進兵頗著勞績今一聞朕㫖即帶兵馳赴軍前急公任事誠可嘉予著賞給郡王品級若能更立殊勲朕當加以重賞現在擒拏叛賊俱由西路進兵北路尚無所事惟今年收服之汗哈屯烏梁海等及陸續來降之輝特人衆其中尚不可全信應加防範著塞卜騰留心查察不必宣露再塞卜騰抵軍營後協同哈達哈等辦事並無馳驅之處其户口俱著帶往居住所有陳奏事件准其列名在桑寨多爾濟成衮扎布之後雅爾哈善之前定西將軍策楞疏奏偵探阿睦爾撒納情形策楞奏言據卡倫佐領桑寨將自阿巴噶斯等游牧脱出之阿道海解到臣詢知係呼爾璊台吉巴顔屬人在奎屯喀拉烏蘇坐臺八月十七日為阿巴噶斯哈丹之得木齊吹津掠去今乘間逃回問其現在情形據稱聞阿睦爾撒納帶領户口在博羅塔拉坐牀阿巴噶斯哈丹與呼爾璊三鄂拓克共帶兵二千並集賽兵一千額林沁巴特瑪車凌兵一千至額林哈畢爾噶等處搶掠游牧十月二十三日㑹合於瑪納斯地方但我逃來時各游牧並未豫備明係詭言聲張不足為據又聞呼爾璊台吉納木竒欲投順前來為阿巴噶斯哈丹所拒不能渡瑪納斯河現在各居游牧等語又據阿敏道解到之都爾伯特屬人西特所供相同惟聞阿睦爾撒納有已逃往哈薩克之語臣思賊人詭言聲張俱不可信即當乘其不備速行進兵是以即留阿道海等作為嚮導並行知諾爾布林沁令其會合同進奏入報聞命封輝特台吉達瑪林為扎薩克台吉侍郎舒明奏言輝特台吉達瑪林帶領屬人六十餘户來尋伊妻父都爾伯特汙策凌同居前經烏里雅蘇台辦事大臣奏明今應將伊屬人編入佐領同都爾伯特汗策凌同居游牧並請加恩封授職銜奏入上諭軍機大臣曰都爾伯特汗策凌之壻台吉達瑪林率衆來歸著照所請歸於策凌游牧同居達瑪林著加恩封為扎薩克台吉加賞緞六疋並著舒明查明伊户口内如須賞給口糧之處即奏聞賞給戊戌議撥綏逺城右衛馬匹軍機大臣奏言現在西路進兵馬匹應多為豫備甘肅陜西解送巴里坤營驛缺額之馬雖議令購買足額恐一時不能應用現於山西省營驛馬内揀選二千五百匹解送肅州其綏逺城右衛滿洲官員兵丁實拴馬共七千八百餘匹請於此二處㨂選馬數千匹解送備用甚為有益但此項馬匹徑解肅州途中仍恐疲乏如酌量送至寧夏等處暫補營馬缺額收槽餧養由彼處解送肅州既不至馬脿疲乏而就近亦可調遣應交與將軍富昌加意揀選酌派官兵解送並移咨督臣黄廷桂指定地方派員接收其綏逺城右衛應補馬匹即將鶴山哈寧阿帶領撤回官兵馬一千七百匹全數充補仍將所欠之數陸續採買足額奏入上從之己亥諭署陜甘總督方觀承等速運軍營糧餉上諭軍機大臣曰軍營進𠞰官兵所需口糧甚闗緊要其新到巴里坤之人亦需接濟現在運送遲滯不能應用著方觀承等速將應需各項現已辦齊者催趲前進此後亦著隨到隨運一面辧理一面將運赴之數奏聞命駐劄巴里坤辦事大臣和起等安撫普爾普策楞屬人上諭軍機大臣曰據和起等奏自伊犂前來之喀爾喀台吉普爾普策楞屬人索隆達爾嘉等請回至原游牧居住等語從前將軍班第曾將普爾普策楞稟請回至原游牧居住之處奏聞經朕降㫖俞允今索倫達爾嘉等即其屬人也此時普爾普策楞如親身投來著和起等即傳㫖慰諭伊等原係喀爾喀部落久羇異域今欲思歸舊地情甚堪憫著加恩授為扎薩克一等台吉管轄屬人准其歸於舊游牧地方㑹合親族同居但正值冬令嚴寒暫令住居巴里坤地方俟明年春草發生再行遷移至此等逺來之人自應接濟口糧和起等以現在巴里坤正辦理官兵糧餉不為接濟坐視其困設伊等因無口糧或致盜竊寧不滋生事端即巴里坤不能辦給現在哈密存貯米糧茶葉甚多相離不逺令伊等自備馬駝前往䭾載未始不可和起等全無籌畫惟一奏了事著飭行已傳諭方觀承等速將糧餉運赴巴里坤著和起等查明此等户口今冬應須賞給口糧若干即遵㫖辦理諭定邊左副將軍哈達哈等上諭軍機大臣曰據哈達哈等奏遣往哨探之蒙固勒岱遇宰桑都噶爾屬人多爾濟户口現在帶回等語多爾濟等既係都噶爾屬人無庸内移或於扎哈沁游牧或另擇地方給與游牧居住仍向伊等曉諭現在伊等宰桑哈薩克錫喇都噶爾等已加恩授為大臣効力軍前候擒獲逆賊時仍遣囘原游牧居住伊等為包沁人搶掠著酌量賞賜茶葉或給予口糧以資接濟並行文策楞傳諭哈薩克錫喇都噶爾等知之再扎木禪帶兵往尋伊祖瑪木特未遇而囘著哈達哈等遣人曉諭瑪木特之妻令其安心居住毋庸過慮瑪木特係準噶爾舊人熟悉地方情形必不至於圍困現在大兵進發伊聞信自當迎出倘有不虞必以伊孫扎木禪承襲官爵従重加恩並令扎木禪小心奉侍善於寛慰哈達哈仍不時遣人往視給與食物以示體䘏駐劄巴里坤辦事大臣和起等疏奏内大臣厄爾錐音等赴軍營日期和起等奏言侍衛烏爾登帶領内大臣厄爾錐音哈薩克錫喇等於十一月十二日至巴里坤即將伊等照例給與馬駝鹽菜等項并於原帶來之索倫兵三十名外添派兵二十名又據散秩大臣吞圖布懇請帶往効力之布庫努特兵二十名一併給與應得口糧於十一月十六日自巴里坤起程前赴軍營奏入報聞十二月庚子朔恩加餧養撥解肅州馬四草豆折價銀兩上諭軍機大臣曰據方觀承奏稱解到肅州挑存脿欠馬匹及撥補肅州鎮缺額馬匹急需飼餧充用惟所支草豆折價現在不敷採買請按馬借銀三兩分季扣還等語此項餧養馬匹係籌備軍需之用折價既屬不敷著即加恩賞給不必扣還但或因此而承餧之員轉思從中侵蝕貽誤軍需情罪尤不可恕著黄廷桂於到肅之日留心查核如有前弊即嚴㕘治罪辛丑命侍郎兆惠駐劄巴里坤辦事上諭軍機大臣曰此次大兵俱由西路進發巴里坤地方辦理馬匹口糧催督臺站及管轄達什達瓦等屬人並厄魯特新降人衆俱屬緊要今現在巴里坤辦事大員豆斌既係漢人和起亦未諳事北路現在無事著兆惠速赴西路毋庸帶領兵丁輕騎前往駐劄巴里坤辦事前命富徳管理臺站現駐額林哈畢爾噶地方僅能管理彼處其自巴里坤至額林哈畢爾噶臺站事務並交兆惠管理從前和起等不計事之緩急槩行驛遞經朕降㫖申飭伊等接㫖後并將應奏之事亦俱遲緩兆惠到日應斟酌事務分别辦理不得過於拘泥其北路臺站事務經富德兆惠等辦有成規著阿思哈接辦壬寅諭定西將軍策楞等進兵事宜上諭軍機大臣曰策楞奏稱接奉諭㫖現在暫停進兵俟後隊㑹合同進等語策楞所領兵丁無多馬力亦屬平常朕慮其輕進覽奏殊合機宜第北路大兵已降㫖停其往赴西路惟令達爾黨阿帶兵千名前往策楞止應候噶爾藏多爾濟及厄爾錐音等到時㑹同進發若伊等已到仍不進兵則又未免太緩此時如領兵直抵伊犂固須慎重若僅𠞰滅阿巴噶斯等原屬易辦設遲疑不進伊等得聞風逃避且恐阿逆别生詭計轉難辦理至諾爾布林沁等不即遵檄應付馬匹亦屬情理之常朕曾降㫖令將疲瘦馬匹與伊等换易少増以茶葉銀兩伊等既得價值將所易馬匹善為收放即可肥壯自必樂於從事此際噶爾藏多爾濟等陸續將到策楞即照此辦理齊集兵丁馬匹先往阿巴噶斯哈丹等游牧勦殺所得别項牲隻物件不須過為查察任伊等自取以示鼓勵惟馬駝必盡行收取接續兵力若辦理完竣乘勢可抵伊犂即行前進若阿逆已據伊犂則更從長計議籌出萬全方為妥協策楞係領兵將軍𠞰殺阿巴噶斯等尚不須親身前進著於扎拉豐阿玉保二人内派出一人率同台吉宰桑等鼓勇先行伊帶領大隊相機指示隨後進發至噶爾藏多爾濟等及厄爾錐音等荷朕厚恩遣往軍前効力策楞務虚衷商酌資其謀議伊等如有所見自必誠心陳告遇陳奏事件俱著伊等列名俾得各抒所見争思報効著詳悉傳諭策楞等知之定西將軍策楞疏奏散秩大臣尼瑪至軍營日期策楞奏言十一月十三日散秩大臣尼瑪來至軍營告稱大皇帝施恩宥罪授為大臣令在軍前効力惟有竭力奮勉以期報効等語臣即令其速往游牧豫備兵丁馬匹聽候一同進兵奏入報聞癸夘侍衛端濟布疏奏噶爾藏多爾濟等籌辦進兵事宜端濟布奏言臣於十一月二十日至巴里坤富徳帶領噶爾藏多爾濟等亦至臣即將恩賜噶爾藏多爾濟之子諾爾布林沁翎帽物件降㫖宣諭伊感恩叩謝並稱天朝大兵自上年前進今已經撤回現在所有馬匹俱不能肥壯前往伊犂取道博羅布爾噶蘇闥勒奇二嶺此地雪大路狹衆兵不能齊進若俟明年正月二十内進兵似為有益此時遣人由朱爾都斯一路招降烏魯特克勒特等人衆並遣使曉諭伊犂河之喇嘛等令其擒賊自効伊等自必遵行等語又據沙克都爾曼濟告稱現在進兵惟塔本集賽哈薩克邊界及附近烏梁海地方稍有可慮若令北路大兵同俟至明春約㑹前進更為妥協等語又據巴雅爾告稱大兵進伊犂道路甚窄現在水草不足又恐雪大難行不若先遣使曉諭額林沁令擒逆賊額林沁係我至戚斷不真心從賊自當遵示擒獻等語奏入上諭軍機大臣曰據端濟布奏稱噶爾藏多爾濟沙克都爾曼濟巴雅爾等公同商議請於明年正月進兵並寄信額林沁及招降伊犂衆喇嘛等令其擒賊自効伊等悉心籌畫實堪嘉予即照所請於明年正月内進兵但嵗内必須將阿巴噶斯等𠞰滅不使伊等聞風逃竄昨已傳諭策楞著仍遵前㫖辦理噶爾藏多爾濟議遣人曉諭宰桑錫克錫爾格令其招降伊犂衆喇嘛等即著派侍衛一員同往衆喇嘛處傳諭錫克錫爾格既為噶爾藏多爾濟等素知信其非真心從賊自可寛宥以期後效至如圖布慎克什木敦多克曼集輩情罪可惡必當明正典刑以彰國法此番伊犂擾亂半由彼處喇嘛等從中助惡前曾降㫖令將伊等盡行𠞰戮繼思蒙古人尊奉黄教且其中亦當示以區别先後諭㫖甚明今觀噶爾藏多爾濟等令遣人招降衆喇嘛其心事顯然可見策楞到彼應將喇嘛中起意倡亂之人即行正法其情罪稍有可原者量從寛典並商同噶爾藏多爾濟等分别妥辦今雖僉議於明年正月内進兵若已𠞰滅阿巴噶斯等游牧及收服烏魯特克勒特等時機㑹可乘勢不宜緩即當奮勇前進亦毋庸過於拘泥兵貴神速惟在相機辦理噶爾藏多爾濟等僕僕道途若已定於明年進兵伊等游牧甚近不必令其守候軍營應暫行遣囘俾得休息俟至期約赴同進並著策楞傳諭伊等知之命賞給侍衞烏爾登副都統職銜授為領隊大臣上諭軍機大臣曰此次烏爾登帶領厄魯特宰桑等前往軍營行走奮勉著加恩賞給副都統職銜在領隊大臣上行走現在進兵𠞰滅阿巴噶斯哈丹等游牧即著烏爾登領兵前往命司員唐喀禄經理薩喇爾游牧上諭軍機大臣曰薩喇爾現在軍營伊妻病故子尚幼小其自伊犂回來之子玉魯斯及同族人等尚在未到伊游牧内無人經理著派唐喀禄帶同筆帖式一員前往照看所有陸續賞賜物件及伊家産牲隻等項查明註冊俟薩喇爾回至游牧時一一明白交還毋得稍有遺漏以示體䘏定邊左副將軍哈達哈等疏奏籌辦運糧事宜哈達哈等奏言臣遵奉諭㫖領兵防守北路現派滿洲兵五百名察哈爾兵五百名駐劄烏里雅蘇台看守倉庫察哈爾兵二千餘名駐劄扎卜堪防範衆厄魯特等游牧其索倫喀爾喀和托輝特兵共七千餘名南自伊克斯淖爾北至烏哈爾和碩地方沿途安設卡倫駐劄於形勢要害之地此項兵丁内有自烏里雅蘇台支領錢糧三月者有未經支領者查布延圖科卜多距烏里雅蘇台一千五六百里庫卜克爾齋拉罕距烏里雅蘇台一千里若令伊等自行領取往返馬力易疲若運至該處散給又需另行馱載派員解送現在周圍各卡倫除蒙古兵丁外計官兵一月需米一千餘石自今年十二月至明年三月需米五千餘石查直隸山西陸續解送米石尚未全到臣行文兆惠永貴等令其即用原運駝隻運至各駐劄處酌量加増運價較為簡便奏入報聞甲辰命傳諭烏魯特宰桑錫克錫爾格上諭錫克錫爾格曰比年準夷不靖擾害羣生朕為天下共主發兵拯救既定伊犂俾安袵席詎意阿睦爾撒納背恩叛逆煽惑衆部是用再申天討以昭國法爾與阿逆素非同謀且宿有仇隙在擾亂之頃勢力不敵勉强服従已為朕所洞鑒近聞逆黨約蘇圖等知副將軍薩喇爾陷入爾部争相索取爾並不遣送其非黨惡同謀於此益信爾誠能感戴朕恩擒獲阿睦爾撒納并助惡之約蘇圖敦多克曼集克什木等來獻軍門朕必加爾厚恩或力弱不能禦賊即帶領薩喇爾㑹同大兵前進奮勉自効命内大臣厄爾錐音等由朱爾都斯進兵上諭軍機大臣曰據内大臣厄爾錐音奏稱與達什達瓦之妻商議大兵由闥勒奇博羅布爾噶蘇進發伊請帶兵四五千名由朱爾都斯進發等語朕已降㫖照伊所請將内地之兵仍由闥勒奇博羅布爾噶蘇進發即將從前選派達什達瓦兵一千名再派出索倫兵二千名噶爾藏多爾濟兵一千名由朱爾都斯進發著鄂實為領隊大臣㑹同厄爾錐音相機辦理厄爾錐音熟悉彼處情形一切事宜鄂實俱悉心商議聽其指畫平定準噶爾方略正編卷二十二
