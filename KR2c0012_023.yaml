body:
  text: 雍正九年夏四月丙午命范時捷協辦西寧總兵官事務上諭兵部曰提督馮允中熟悉邊情老成練達但聞近患目疾行走須人扶掖於訓練操防稍覺未便西寧一鎮關係緊要其總兵官事務著德成協同辦理陜西固原提督樊廷現在軍前已降旨令回固原之任俟樊廷到任後著署陜西固原提督范時捷協同馮允中辦理陜西西寧總兵官事務丁未諭宣諭化導官上諭內閣曰連年用兵邊塞挽粟飛芻不無資於民力之處而草野之間不知軍國邊防之重寄朝廷萬不得已之苦心溺於私情妄生疑議是以特遣大臣官員前往秦省宣諭化導務使僻壤遐陬家喻户曉不可視為具文潦草塞責更不可指稱公事派纍地方倘奉行不力而轉令地方有供應之繁是朕之遣官非所以安之乃適以擾之也欽差大臣等已給與驛馬廩給其分派之官員等皆厚給公帑以為僕從車馬館餐行李之資所到地方一絲一粟不許索取該有司亦不許應付餽送倘有不遵朕旨者與受同罪決不姑貸若差往之官員等有生事滋擾而總理大臣失於覺察者朕將於大臣是問倘地方辦理軍需有騷擾民間而差往之大臣官員知而隱匿者别經發覺朕於欽差之大臣官員是問將此旨通行曉諭知之庚申停運黑茶并加恤效力官上諭大學士等曰上年大將軍嶽鍾琪在京時條議進兵事宜令河南採辦黑茶三萬五千封解送西安交與巡撫武格送至巴里坤軍營以備進兵賞賚之用今大將軍既停進發則茶封非所急需聞武格等以未奉部文停止仍委人員運送軍營似此不急之務徒多勞費著即行文前去暫行停止又今春命往陜甘效力人員若在內地差遣其力量尚可自備資斧聞武格將伊等派往巴里坤軍營亦令自出盤費並無幫貼恐微員等力量不敷有誤公事一并傳諭辦理軍需大臣等知之五月癸亥朔安輯青海公拉察卜等上諭大學士等曰據殷扎納達鼐德成馮允中等先後奏稱青海居住之公拉察卜台吉察罕喇卜坦從索羅木過黃河移往他處居住又聞戴青和碩齊察罕丹津亦往他處遷移不在海流圖地方住牧因撥派兵丁官買馬羊辦理之人不甚妥協伊等暫行躲避等語朕因上年準噶爾乘我西路軍營不曽防備傾其醜類盜竊駝馬因念青海各扎薩克人衆恐遭逆賊侵害是以諭令派出兵丁為防護之計每名賞給銀兩為衣裝之用其諭令採買馬羊者原欲使伊等所有牲畜得變價值可獲利益並非大兵需此些微之助也前殷扎納赴西寧時朕面加訓誨一切派兵採買之事悉聽衆蒙古之便不可絲毫勉強並慮蒙古王台吉科派所屬之人諭令嚴行禁約豈肯令差往之人逼迫蒙古以從事乎令拉察卜等無故遷移他往其中自有情由必係殷扎納等不能宣揚朕諭使衆心共曉而採買馬羊又不聽從其便以致拉察卜等心懷疑畏暫避差徭雖拉察卜等甚屬孟浪糊塗亦殷扎納等奉行不善之所致也今特頒諭旨曉諭拉察卜等令其速回本處並將隱情據實陳奏再傳諭德成達鼐馮允中等令其明白開導善為安輯並將伊等如何疑畏遷移之處查明具奏其餘地方事宜俟侍郎衆佛保去時再行詳諭甲子命鎮安將軍常賚率兵赴安西駐劄授石雲倬為西路副將軍赴軍營命給張家口營兵月餉上諭兵部曰今嵗命往陜西西安駐防兵丁派出直隸張家口營兵一百八十餘名聞各兵家口支領錢糧而該管武辨等以各兵應有錢糧俱給與新募之兵支領無可給發以致各兵家口三月未曽領餉日食不敷四路奔訴凡兵丁撥派他往者如馬兵一名原領月餉二兩則以九錢付本兵為途中鹽菜之用以一兩一錢為養贍家口之資所有兵米亦仍令其家口支領若有新募兵丁則另行給與月餉並無以本兵錢糧付新募兵丁之事何以張家口官辨等錯誤遲延以致各兵家口糊口無資著該督該提鎮即速查明照例給發並將遲誤之處據實參奏加恩山西駐防效力丁壯山西巡撫覺羅石麟疏言太原駐防兵五百撥往西寧三百其留營者不足以供調遣據各旗間散丁壯塞爾泰等呈言自祖父以來受國家豢飬深恩願不領錢糧當差效力臣即選得年力強壯技勇可觀者百人令其給役俟兵丁缺出選補奏入得旨太原各旗間散丁壯等既令當差學習行走自當酌加恩澤以示鼓勵著每名月給銀一兩米三斗以資其食用該撫石麟時加教訓務令勤謹效力黽勉向上若有名糧缺出即將伊等揀選頂補以副朕教養兵丁之至意丙寅上諭兵部曰樊廷從軍營進口著即赴陜西固原提督之任范時捷著仍留固原俟立秋以後樊廷乘驛來京陛見其提督印務仍著范時捷署理俟樊廷回任後范時捷再往西寧協辦總兵官事務命加一等侍衛阿成阿副都統銜轄家選兵二千赴西路軍營丁卯命巴爾虎等兵由古爾班賽堪赴巴里坤上諭大學士等曰巴爾虎兵丁一百名前赴巴里坤軍營由古爾班賽堪行走路近而水草好著由此路前往所派兵丁先令於鑲藍旗察哈爾地方齊集俟阿敏道噶扎爾圖到時帶領起行京城所選驍勇兵一百名亦著由此路前往戊辰命籌援勦事宜上諭大學士等曰今年三月間準噶爾賊人侵擾吐魯番紀成斌聞信即令樊廷等領兵前往應援此舉實欠詳審蓋賊人之意原欲疲勞我士馬故為此出沒詭計耳彼時朕閲紀成斌之奏即降旨切加申飭越數日嶽鍾琪奏到其所見與朕意相同又越數日紀成斌奏到知賊人未見我師果已潛遁無蹤矣賊之狡獪如此是以朕諭令吐魯番人衆商酌遷移暫避之計蓋欲善為保全之以俟大軍凱旋共享升平之福也今據大將軍嶽鍾琪奏報賊人於四月間又復侵犯吐魯番額敏和卓求請應援大營未曾發兵前往大將軍辦理甚是但朕細思之賊人若仍以千餘人騷擾吐魯番則彼地城垣兵力足以捍禦倘復增添賊衆吐魯番力不能支朕心有所不忍況伊等前次感恩望濟之言甚為懇切朕又有令其遷移暫避之旨料賊人必知信息倘乘其遷移之隙而侵害搶掠之是吐魯番之人因遵旨而受纍尤朕所惻然者也可傳諭嶽鍾琪令其確探賊耗衆寡若何情形若何久暫若何其應否應援之處酌量變通辦理不必拘執前説至於賊兵引去後吐魯番回子有情願遷移者又應如何沿途防護不受賊人劫奪侵凌之處著大將軍留心經理辛未命通政使趙之垣等籌運進兵糧餉上諭內閣曰用兵以籌餉為先而挽運以得人為要果得其人則民力不致煩勞國帑不致麋費而兵食饒足士飽馬騰其裨益於公事良非淺鮮也年來西北兩路用兵籌餉事宜朕心甚費區畫北路軍糧范育馪承領運送諸事諳練措置得宜朕深嘉奬已加優敘西路軍糧向來俱係官運今行之日久難保無侵帑纍民之處因思通政使趙之垣副將馬龍乃三秦世族且官至大員於本地土俗民情素所熟悉若照范育馪之例領取帑銀轉輸挽運似屬可行之事朕將此詢問趙之垣據稱情願效力查內地軍糧運送巴里坤軍營者年來經理已有頭緒但自軍營進𠞰之糧尚無轉運之善䇿著趙之垣前赴軍營與馬龍公同商酌如何運送之法聽其自行定議酌量舉行每石運價若干朕悉照數給與不令絲毫賠墊但不可有浮冒侵蝕之弊總與地方有司毫無干涉其間遲速機宜及道途防護等情則與大將軍該督撫等計議而行俟趙之垣到彼與馬龍商酌定議果能承領辦理具奏到日給與欽差關防壬申定鎮安將軍常賚及歸化城兵至營日期上諭大學士等曰鎮安將軍常賚著從安西前赴軍營與大將軍嶽鍾琪副將軍石雲倬等計議進兵事宜但聞賊人有窺伺洮賚卡倫之信常賚前赴大營時途次須小心防範或帶兵丁數百名護送或探聽賊人逺遁之後再行前往務慎重妥貼總以七月初旬至營為期其現在甘涼歇息之歸化城蒙古兵一千名已有旨令其前赴軍營備用可令原管領之都統根敦等帶領出口務於七月初旬到營可傳諭查郎阿等並常賚知之癸酉上諭大學士等曰任國榮仍帶總兵銜前往北路軍營管理車騎兵兼司屯種事務著大將軍傅爾丹酌量派委照總兵官胡傑之例行走乙亥命預防賊人騷擾噶斯窺伺青海事宜上諭大學士等曰從前三月間賊衆有二千餘人來吐魯番見我兵前往應援賊兵即先行潛遁今據大將軍嶽鍾琪奏報四月間又有賊千餘來擾吐魯番并有二百餘人犯我洮賚卡倫等語朕看此情形或者將來賊人由哈喇沙爾前往噶斯地方又如上年故智暗行騷擾或增添人衆窺伺青海亦未可定格默爾等所統兵力未免稍單朕前次曽有不應調撥西寧兵丁之旨若此時有應用添兵之處恐格默爾等亦不敢調取德成亦不敢派撥可傳諭德成達鼐馮允中管承澤格默爾鼐滿岱福寧等從前所以不令調撥兵丁者蓋西寧軍務尚未就緒自以固守根本為是今西寧布置已定兵力有餘若賊人窺伺噶斯自宜發兵應援况目前青海蒙古兵丁尚未攢集齊全即器械等件亦未周備難以望其捍禦賊鋒亦賴官兵為之保護著德成等就近酌量倘有用兵之處或著管承澤鼐滿岱帶領前往或德成另議一二人前往至官兵派出之後遇有本地添兵防守之處即將土兵派出此旨著德成並諭衆佛保殷扎納知之命山東登州總兵官嶽含奇率湖廣兵赴西安上諭兵部曰山東兖州總兵官嶽含竒著調補山東登州總兵官前降諭旨令湖廣預備兵丁二千名聽侯西路調撥之用著嶽含奇前往湖廣會同總督邁柱加意挑選人材壯健技勇優長者二千名即令嶽含奇帶領前赴西安駐劄其領兵之副參遊守千把等官亦著邁柱嶽含奇揀選前往此所派兵丁內將長於藤牌者挑選五百名或一千名充入二千名之數若辨兵內有人材可用情願赴軍前效力者亦著邁柱嶽含奇酌量派用此二千兵丁於秋末冬初候旨從湖廣起身一應賞賚銀兩照例給與己卯命恤賞西路千總馬建功等上諭大學士等曰西路軍營千總馬建功奉差探聽賊兵信息帶領兵丁十人前往因人少力單遇賊被害並傷兵丁石玉張秀閻得三人深可憫惻馬建功等俱照陳亡之例加恩恤賞定西路軍營安設卡倫撥用蒙古兵事宜寧逺大將軍嶽鍾琪奏言賊夷出沒不常散設卡倫轉滋覬覦今於鏡兒泉設三大卡倫并撥兵丁登山瞭望復於途次五里一置塘站直接軍營一遇警急接遞傳報奏入得旨賊夷既施鬼蜮之技出沒紛擾意欲疲我士馬並使軍營馬匹不得牧放自當計議防範擒𠞰之䇿今安設大卡倫三處固是但此數千辨兵馬匹如何牧放看管可免賊人窺伺又三大卡倫之外尚設小卡倫否若於賊之來路設小卡倫仍屬照前而更多一番防備恐兵少力單難於捍禦若不設小卡倫則賊之來蹤日間可以登髙瞭望昏夜則如之何又不知此三大卡倫果能全堵賊之來路俾必不能近我軍營窺我牧場否倘乘小卡倫撤回之後越大卡倫擾我沿路塘站不可不防至於阿寶所領鄂爾多斯兵丁從前派往軍營者原令專司牧放之事乃大將軍等將伊等分散派守各處卡倫伊與緑旗兵丁等言語不通徒彼此推諉甚屬無益嗣後蒙古兵丁不可似此零星派用庚辰命察劾管理內地回民各官上諭內閣曰從前因準噶爾之肆虐吐魯番回民畏其侵凌有情願移居內地者諭令地方有司善為安插撫綏使之寬裕從容得所頃聞在肅州居住之回民等田瘠水少收成歉薄而所有牲畜亦不敷用生計未免艱難此皆經管之員辦理疏忽而該省大臣失於覺察之所致也著署總督查郎阿將從前辦理不善之員查出題參其有應行加恩撫恤之處亦著查郎阿酌定請旨即將此曉諭吐魯番移住內地之回民知之甲申賞敘臺站官役上諭內閣曰西路軍營臺站自上年十二月以來往來文移繁劇長途遞送從無遲誤該管臺站官辨實心供職其在塘夫役人等效力亦屬勤勞著交與辦理軍務之署陜西總督查郎阿將京城至軍營一路兵臺官役等分别內地外邊加恩給與議敘賞賚六月甲午命籌應援吐魯番進𠞰準噶爾事宜上諭大學士等曰寧逺大將軍嶽鍾琪摺奏準噶爾賊衆二千餘人圍困魯克察克之城晝夜攻打二十餘日吐魯番回子奮勇出擊殺死逆賊二百餘人帶傷之賊甚多請以三千徑兵兼程而進必獲全勝將來即以此三千兵丁駐劄吐魯番合之回民足備防禦等語朕前次聞吐魯番回民等感恩望濟之言甚為懇切恐賊衆再以大力侵凌伊等不能抵敵為其所困已降旨令大將軍嶽鍾琪酌量發兵應援不必拘執前説今嶽鍾琪具奏之日尚未接到朕旨是以仍作遊移之詞凡用兵之道在於隨機應變不容刻緩若果嶽鍾琪確有所見即應遣兵速往一面奏聞何必待降旨到日始遣兵前往乎又奏稱挑選精兵三千名駐劄吐魯番外餘剩壯健兵丁留駐新城防守儘足備進擊烏魯木齊之數等語朕思我兵進擊烏魯木齊之時若有賊衆繞道侵犯新城當思應援𠞰殺豈可但作防守之計至於此時應援吐魯番自屬應行之事但噶爾丹䇿零性情躁妄此次失利之後或於冬季多添兵力攻擾吐魯番未知我三千兵丁合之回子之力便可以從容捍禦否且我軍既駐劄吐魯番則將來不得不時為應援嶽鍾琪從前曽有吐魯番駐兵數萬之奏若此時駐兵三千將來因此牽制有不得不加增之勢此則舍本逐末必不可行者也朕又思吐魯番乃阿爾輝哈喇沙爾兩路之關鍵既有我軍駐劄則將來築城於烏魯木齊時呼吸相應賊人不敢繞襲我軍之後况我軍正欲進攻賊之巢穴若賊人果以大衆來犯吐魯番則我軍不勞逺行可以就近殄滅之亦是善䇿總在嶽鍾琪悉心籌畫務期萬全若將大營兵丁三千名派往吐魯番則此三千之數當另行撥派以足額吐魯番地方難於多養馬匹况此三千兵丁乃為防守之用非為追擊之用所帶馬匹可酌量存留其餘仍遣回大營牧放至於炮火鉛彈多帶備用上年官買吐魯番糧石不必運送軍營即著留貯吐魯番以備大兵之用吐魯番回目額敏和卓等誠心向化盡力擊賊甚屬可嘉著大將軍傳旨奬勞酌量賞給緞匹銀兩茶葉等項彼地既遭賊人侵害恐收成歉薄糧食不敷著即以官買糧石酌量賞給務使回民得所將此詳悉傳諭大將軍嶽鍾琪知之乙未命贈賞河州副將馬雲上諭大學士等曰河州副將馬雲於上年冬月在北山領兵敗賊著有勞績今聞病逝著加總兵官銜賞銀一千兩為歸櫬之費庚子寧逺大將軍嶽鍾琪請援吐魯番上飭諭之嶽鍾琪疏言賊圍吐魯番臣選馬兵三千令張元佐曹勷張存孝統之於四月二十四日進發又令顔清如率兵二千往駐塔庫又撥兵四千令紀成斌率往洮賚要隘駐劄倘賊人傾衆而來臣即親統洮賚塔庫所駐劄兵倍道進𠞰惟此時令回民內移途中行走不能便捷三千護禦兵丁首尾亦不能相顧擬於應援馬兵三千人中暫留一千駐劄吐魯番以防賊餘二千令歸大營如蒙準臣前奏撥兵三千駐防吐魯番臣請以步兵二千駐塔庫者撥補俟我師進擊烏魯木齊時然後令回民內移即以防禦兵一千護送可無劫奪之虞奏入得旨應援吐魯番之舉朕早已降旨此奏尚有計算未到之處今年秋間襲擊是第一善策至於應援吐魯畨乃相機不得已之舉耳若但加意籌畫於應援之師而不計及於襲擊之舉是舍本而逐末也且發應援兵丁三千名之外又令顔清如領兵二千名駐劄塔庫紀成斌領兵四千名駐劄洮賚是以派兵九千與前請旨駐兵三千於吐魯番之奏大不符合矣今年原議挑選精兵一萬二千名進擊烏魯木齊不知此所派應援吐魯番之九千兵在此一萬二千名兵丁之外乎抑即在其內乎此兵平定吐魯番回營人馬尚可進擊乎况前奏設三大卡倫於要隘之處安兵三千名此非大營之精兵乎今稱存營兵丁尚有萬餘足以防禦假若賊人既擾吐魯番使我兵前往應援又以大衆侵犯軍營或再如上年之故智繞過大營驚擾塔勒納沁及圖古里克等處則我軍之力既分不識尚可𠞰殺耶或但能防禦新築城也奏摺中總未言及此甚屬疏漏至於吐魯番一部落乃向來甚費商議置之度外者即上年遣發辨兵駝隻往彼搬運米糧亦俱未經奏聞致生賊人窺伺之心屢次侵擾此乃從前辦理錯誤以致目今有不得不應援之勢今大將軍親在軍營若確見速應救援便當遣兵迅往何必遲回審顧且前次奏稱留兵三千名便可防護吐魯番萬無一失今又將吐魯番應否留兵及回民應否遷移何時動身之處請旨定奪前後全不符合顯有推諉之意朕在數千里之外豈能洞悉地方情形與臨事機宜預先一一計算而指示之乎殊失朕信任倚賴之初心矣倘見此諭旨以為吐魯番不應移內勉強順合朕意輕率舉行則尤其不可丙午靖邊大將軍傅爾丹奏報進兵襲擊察罕哈達賊人傅爾丹奏言臣等於五月六日至科卜多築城處據烏蘇圖舒魯克卡倫駐防侍衛巴爾善等擒準噶爾一人曰塔蘇爾海丹巴詢之云噶爾丹策零發兵三萬令大策零敦多卜小策零敦多卜及大策零敦多卜之子多爾濟丹巴率之先後至阿爾台山奇蘭所在犯我北路今小策零敦多卜已至策罕哈達而大策零敦多卜及其子多爾濟丹巴未到現兵僅二萬餘噶爾丹策零恐哈薩克部乘虛見襲預發兵萬人令大策零敦多卜之子納木扎爾達什衛徵和碩齊駐守阿爾輝復令諾顔和碩齊率兵一萬駐守阿里瑪圖沙喇擘勒其噶爾丹策零遊牧處自守之兵不過二萬而已又云噶爾丹策零向令妹夫羅卜藏策凌率兵一萬駐劄阿里馮圖沙喇擘勒以防哈薩克而羅卜藏䇿凌向與噶爾丹䇿零有隙率其屬三千餘户來至大國噶斯地界噶爾丹䇿零聞之遣烏喇特巴哈曼濟追之為其所敗復遣喀喇沁都噶爾之子察衮追之以是大䇿零敦多卜久之未至臣思賊兵未集宜乘其不備襲之選京師各省兵一萬輕裝由科卜多河西分為三隊於六月九日出師前鋒統領丁壽散秩大臣公達福副都統塔爾岱領第一隊參贊馬爾薩副都統承保西彌賴領第二隊臣等以大兵繼之速發掩擊其科卜多之地留兵七千三百築城如故令都統衮泰總兵胡傑等管轄科卜多河東乃通奇蘭要路撥滿洲兵二千俟都統侯陳泰副都統阿三到後駐劄統轄與衮泰等互為應援所有統兵啓行日期合行具奏翊日又奏言臣等於初九日分隊出兵遣前鋒統領丁壽參贊馬爾薩副都統塔爾岱等前行瞭望擒賊夷巴爾喀等十二人於扎克賽河之地據云小䇿零敦多卜牧場在察罕哈達去臣等軍營止三日程其兵不過一千尚未立營大策零敦多卜因途中有病留駐和博克山其子多爾濟丹巴已於小策零敦多卜所住山梁之前駐劄至羅卜藏策凌已二於噶爾丹䇿零大約率其屬往土爾扈特否則徑往青海矣臣等現在乘夜進兵襲擊察罕哈達賊夷奏入報聞丁未青海扎薩克公諾爾布叛扎薩克恭格等擒之副都統格默爾奏言騰格里卡倫扎薩克諾爾布於五月二十八日背叛擾亂臺站劫掠馬匹逃往衮額爾吉庫克烏蘇遊牧處臣即令扎薩克恭格台吉阿拉卜濟等及參領巴顔等先後追擊比至喀喇郭勒諾爾布已為恭格等所圍復脫去窮追至蒙古爾托羅海獲之并其佐領里塔爾俱縛送軍營其效力之扎薩克台吉將卒等俟核明具奏奏入報聞戊申青海扎薩克公墨爾根戴青拉察卜等叛副都統達鼐等追捕獲之副都統達鼐奏言青海扎薩克公墨爾根戴青拉察卜等背叛渡索羅木河而逃臣等率兵追之及諸河其子察罕喇卜坦來歸進擊拉察卜拉察卜泥首迎降臣等攜之由索羅木河大路還青海逰牧處其效力之台吉軍校等核明具奏時拉察卜之叔察罕丹津亦相助掩捕奏入得旨從前親王戴青和碩齊察罕丹津一聞伊姪拉察卜逃走即將拉察卜部下人等收回察罕丹津歷年效力行走今已老病仍感恩效力甚屬可嘉著賜大緞二十匹再發銀一千兩令其酌量賞伊部下效力人等拉察卜雖係伊兄之子朕知其素不相睦至拉察卜之子察罕喇卜坦能知伊父之非不肯同逃殊屬可憫拉察卜甚屬庸愚雖無故逃遁見我兵追趕即便迎降罪尚可恕著將伊送至京師候將伊逃遁之故問明將伊交察罕丹津之處叧降諭旨其拉察卜公爵朕尚欲令其子察罕喇卜坦襲替並曉諭知之己酉命噶斯路偵賊備兵上諭大學士等曰大將軍傅爾丹奏稱被獲準噶爾丹巴供云噶爾丹䇿零之妹夫羅卜藏䇿凌將伊屬下三千户帶領歸至大國噶斯噶爾丹策零聞知追趕被敗等語今噶斯正值青海有事之秋倘羅卜藏策凌率衆來歸或係賊人詭計著速行文達鼐衆佛保等逺設巡哨偵探信息倘噶斯路途有準噶爾賊人來歸者將我兵整齊預備務加詳審果係真實將伊頭目數人送至京師其餘人等於泛界內有水草處暫住從優養贍一面派兵照管一面奏聞請旨平定準噶爾方略前編卷二十三
