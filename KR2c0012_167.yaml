body:
  text: 乾隆三十年春正月己酉陜甘總督楊應琚疏奏孳生馬匹事宜楊應琚奏言查巴里坤牧厰前經奏准將安西涼州肅州等處撥剩馬一千五百餘匹撥往孳生自乾隆二十六年八月起至二十九年八月三年屆滿按部定孳生例每兒騍馬三匹孳生駒一匹臣以巴里坤水草豐美孳生必繁令辨兵等據實開報較定額有贏無絀至烏魯木齊節年貿易馬匹現存二千有竒多係騸馬應俟將來雅爾駐兵廣通貿易再為撥解孳生至營馬缺額例以五年為限踰限倒斃准其領銀買補若以孳生抵補即無須動用官銀或未滿五年則按其日月分别賠補如以厰馬補給其所交價銀又可充公項是孳生補缺實於經費有所撙節再巴里坤氣候較寒一至冬令必擇避風向陽之處以資芻牧庶孳生馬匹日就蕃庶奏入報聞癸亥伊犂將軍明瑞等疏奏移駐雅爾官兵起程日期明瑞等奏言臣等前奏塔爾巴噶台駐兵所有運送什物及存留烏魯木齊之項業經派定十月二十二日派索倫厄魯特官兵前行十二月初八日據報由奎屯前往至巴爾楚克西喇呼魯蘇一路看得地土平曠積雪亦厚可以車輛挽運又至齊爾山西沁達蘭嶺東哈布塔克扎克鄂博路看得伊犂烏魯木齊兩處官兵行走俱便可以合隊臣綽克托於來年正月初六日先領滿洲索倫兵起程臣納蘇懇於初八日領滿洲緑旗兵護送糧餉農器等物起程臣明瑞等於初三日領索倫兵六百名起程在中途合隊臣綽克托總統前行沿途若有越界游牧之哈薩克即行驅逐再原議雅爾駐劄官兵則勒卜什招摩多等處仍須巡察臣明瑞派散秩大臣碩通及侍衛官員領滿洲索倫察哈爾厄魯特等官兵五百餘名以臣愛隆阿統領於初一日起程越阿勒坦額默勒巡察勒卜什招摩多一帶前赴雅爾與臣綽克托合隊查勘原立界址興作城工官兵全到後臣愛隆阿即回伊犂再臣愛隆阿至雅爾時即從前勘定之額敏河沿巴爾楚克沁達蘭三處安設大卡倫其沁達蘭與博羅塔拉相接之卡倫一處亦俱酌量安設俟副都統舒泰至雅爾時臣訥蘇懇遵㫖回京奏入報聞二月庚辰諭定邊左副將軍成衮扎布等辦送伊犂牛隻事宜上諭軍機大臣曰明瑞等奏稱伊犂屯田回人所用牲隻頗多請交成衮扎布等從烏里雅蘇台購辦孳生牛一千餘隻乘今秋草茂時解送等語著傳諭成衮扎布等烏里雅蘇台如現有牛隻即照數撥送或有不足則喀爾喀四部落來年應交馬二千餘匹著照從前改折孳生牛隻解送伊犂併傳諭明瑞等知之命賞哈薩克多羅特拜等頂翎上諭軍機大臣曰明瑞等奏稱塔爾巴噶台邊界居住之哈薩克多羅特拜庫圖什頗能抒誠效力現又查出察哈爾及回人呈獻似應加以賞賚等語多羅特拜著加恩賞給四品頂孔雀翎庫圖什賞給六品頂藍翎以示鼓勵丁酉伊犂將軍明瑞等疏奏各城資送屯田回人全抵伊犂明瑞等奏言查各城遷移屯田回人共一千七百九十六户俱陸續到齊計五月以前所需口糧照臣等原奏給發六月麥收將届尚需一月口糧交吐魯番公木薩通融辦理又據葉爾羌伯克等禀稱所有捐助口糧因天寒路遙尚屬不足祈令木薩代為辦理俟歸日償還臣以此項口糧為數無多免其取償至回人等所帶牲隻即可為屯田之用有不足再為撥補又據庫爾勒哈子伯克阿璊禀稱從前塔里雅沁回人遷居伊犂其多倫回人甚為羡慕今現有三十户情願自備資斧移來屯田臣等查伊犂地畝寬廣此三十户回人既情願前來似應准其一體安插奏入報聞戊戌諭散秩大臣伯伍彌泰等酌停購買屯田馬匹上諭軍機大臣曰伍彌泰等奏稱烏魯木齊屯田尚需馬六百九十二匹行文伊犂請給經明瑞等以伊犂現亦需用俟貿易有餘再行撥送擬派員購買每匹估給價銀八兩等語辦理殊屬錯謬烏魯木齊等處數年來積貯頗豐倘屯田馬匹稍有缺額即先將現在馬匹供用其不敷者亦無妨少緩且哈薩克貿易馬匹才值銀二三兩今以銀八兩購馬一匹頓增三四倍矣著傳諭伍彌泰所購馬匹如業經給價則已否則毋庸購買並傳諭明瑞等知之壬寅葉爾羌參贊大臣額爾景額疏奏辦理博洛爾部落事宜額爾景額等奏言前據博洛爾伯克沙瑚沙默特遣伊弟阿玉卜禀報齊特喇爾伯克邁瑪特什丕與伊弟海魯蘭合謀搶伊村莊臣等譯看來呈其如何搶掠之處未經聲明及詢之阿玉卜察其情形係兄弟相爭隨行文勸諭今據賫文前往之回人素勒坦尼咱爾告稱沙瑚沙默特及邁瑪特什丕等叩接文書不勝感激邁瑪特什丕隨往博洛爾與沙瑚沙默特誓共和好又伴送至海魯蘭處海魯蘭即具呈令伊叔沙里斯隨同前來等語臣等譯看三人呈詞乃知沙瑚沙默特平日勞苦所屬回人與伊弟海魯蘭不和又奪邁瑪特什丕之妹故海魯蘭乘便邀約搶掠村莊今已各知其非復相和好似不必再為深求但伊等性情貪鄙若不為分别是非嚴加申飭則將來互行瀆禀殊覺煩瑣臣等按其呈內情形虛實仍各行文曉諭並賞給來人口糧羊隻送出卡倫奏入報聞閏二月乙卯阿克蘇辦事副都統卞塔海疏奏烏什回人作亂情形卞塔海等奏言二月十五日申時據駐劄烏什沙圖臺站委署護軍校全福哈密通事回人呢雅斯等報稱本月十四日夜三鼓烏什城內回人忽然聚譟施放鳥鎗致傷緑旗兵丁副都統素誠㑹同阿竒木伯克阿卜都拉登山拒守一面遣人速報等語臣等詢問全福起事緣由據稱因辦送沙棗樹科派出回人二百四十名令於十五日起程所派回人等於十四日夜忽然作亂臣等即整齊官兵臣卞塔海帶領星夜前往救援臣德福防守阿克蘇城池其喀什噶爾葉爾羌庫車賽里木拜等處俱已分途飛報奏入上諭軍機大臣曰卞塔海等聞烏什城內回人滋事即領兵前往又咨行各城策應同日鄂寶明普高庭棟俱奏稱派兵前往烏什回人作亂尚未得起釁確情著傳諭柏琨額爾景額等如柏琨正抵烏什即將此事查辦所有起釁回人務嚴行根究正法以示懲創仍即曉諭各城回衆令其各安生理毋得驚恐柏琨如已過烏什即著額爾景額前往辦理再辦送沙棗樹科其事甚屬微細何必派出如許回人以致激成事端或素誠及緑旗兵丁平日擾害伊等致不能堪適因此事遂爾舉發亦未可定柏琨等辦理竣事時將素誠平日有無擾害回人情事一併查明具奏丁巳阿克蘇辦事副都統卞塔海疏奏烏什逆回情形卞塔海奏言臣於二月十五日領滿洲索倫馬兵一百名緑旗步兵二百餘名回兵一百餘名并喀什噶爾護送回人至阿克蘇兵五十名起程前往烏什沿途所有村莊俱經安撫十六日抵烏什之喀喇和卓據哨探兵見有賊八百餘臣即整兵迎戰放鎗攻擊賊俱敗走追至城外捉生詢問據供二月十三日素大人與阿竒木伯克阿卜都拉派出回人解送沙棗樹科有伯克額色木圖拉及伊子賴黑木圖拉等忽於三鼓時招集回人焚劫倉庫素大人及官兵俱被害伯克阿卜都拉現被拘禁等語臣與官兵等即將烏什城外關隘俱各據守十七十八兩日晝夜交戰殺賊百餘人得鳥鎗三十餘桿十九日有馬步賊人二三千名出城接戰因衆寡不敵雖殺賊百餘人官兵陳亡者亦約有七八十名臣與官兵現在哲爾格濟克德屯駐知會德福添調兵丁策應其葉爾羌喀什噶爾兵丁亦經催取赴援今尚未至奏入上諭軍機大臣曰卞塔海奏伊領兵前往烏什捉生詢問知駐劄大臣已為逆回戕害現在據城聚衆抗拒官兵等語初意回人小有變亂或不過械鬭案件今乃戕害官兵焚劫倉庫此固素誠等平時辦理不善以致滋事而回人等敢行叛亂情罪可恨若不盡行𠞰絶將來駐劄大臣何以辦事適據明瑞奏一聞德福所報信息即派觀音保領兵前往此時納世通額爾景額應亦赴援自可計日蕆事但逆回潰敗之後必分路潛逃斷不可防範稍疏致使漏網倘有投往額爾德尼伯克處之人即向伊索取此時卞塔海等辦理若何仍作速奏聞伊犂將軍明瑞疏奏派兵應援烏什情形明瑞奏言二月二十一日未時准德福將烏什回人作亂卞塔海領兵往援知㑹到臣查葉爾羌喀什噶爾阿克蘇等處滿洲索倫兵丁分管臺站勢難一時調集臣酌量先派精兵五百名令副都統觀音保即刻起程由穆素爾嶺前行揚言臣率領大兵隨到若烏什業經平定即將官兵撤回臣亦即整齊官兵相機進止如一時不能竣事擬將庫貯辦理伊犂等處事務大臣之印取出委派大員辦事臣帶將軍印領兵前往烏什伊犂地方緊要現在愛隆阿巡查哈薩克邊界未能即回鄂津亦難獨辦惟烏魯木齊有伍彌泰五福李景高三員臣酌調伍彌泰辦理伊犂事務俟愛隆阿到日再令接管奏入上諭軍機大臣曰今日據卞塔海奏伊領兵前往烏什知素誠已被戕害連日與賊相持等語正欲諭明瑞領兵往辦適據奏至已令觀音保前往應援加以各城陸續出兵諒逆賊無難擒戮兹命明瑞前往非專為𠞰賊特令其詳察起釁情由大臣等駐劄新疆平日失於撫馭惟偏護內地人等恣意擾害回人及僨事後又復張皇失措為若輩所輕視即如派送沙棗樹科何至二百人之多其為辦理不善顯然再烏什原係霍集斯駐劄之地或伊屬人聳衆生事亦未可定明瑞此行固不宜輕縱回人亦不可偏護官兵務得其實情加以懲創始於地方有益俱著據實奏聞阿克蘇辦事布政使德福疏奏逆回通信霍罕情形德福奏言卞塔海領兵應援烏什後臣續辦阿克蘇兵丁有現署阿竒木事務之伊沙噶伯克薩里係烏什人臣正與商派兵丁接續行糧二月十九日伊弟額伊敏從烏什脫出告知逆回等抗拒官兵情形並稱逆回等派我與噶雜納齊伯克沙資雅東及安集延四人交付元寶十九個令送與霍罕額爾德尼伯克求其應援我念兄薩里現在阿克蘇行至畢德爾山嶺住宿趂回人睡熟脫出報信等語臣思布魯特安集延俱距喀什噶爾甚近隨速行知會一體嚴加防範奏入得㫖額伊敏為賊所遣乘間脫出報知信息殊屬可嘉著傳㫖嘉奬仍賞緞五匹己未諭伊犂將軍明瑞查辦霍罕事宜上諭軍機大臣曰昨據德福奏烏什噶雜納齊伯克沙資雅東等為賊遣往霍罕求援於額爾德尼伯克有同行之額伊敏脫出送信等語額爾德尼伯克前與阿卜都喇伊木亙相通信今沙資雅東等數人內或有阿卜都喇伊木親戚意圖報復或額爾德尼伯克尚有通信往來之事亦未可定明瑞至烏什時亦當留心查明如額爾德尼伯克果有此等情事即藉此移兵進𠞰事平後霍罕雖不必駐劄大臣自可另授伯克管理俱著據實奏聞諭吐魯番郡王額敏和卓實陳辦理回部情形大諭軍機大臣曰回部自內附以來朕加意輯寧俾各安生理豈意烏什回人等忽戕害官兵搶掠倉庫情固可恨或因駐劄大臣等平日失於撫馭緑旗官兵又復恣意擾纍伊等不得已而出此又或阿卜都喇伊木親戚人等與霍罕額爾德尼伯克潛通信息煽誘妄為俱未可定額敏和卓曾與新柱同辦事務新柱有無擾纍回人及各城大臣所行若何著傳諭額敏和卓伊係效力年久之人各大臣辦事情形及回人情事自必深知伊有所見聞當據實具奏不可纎毫隱匿再額爾德尼伯克倘有通信形跡額敏和卓意中應作何辦理並著籌酌奏聞命原任伯克阿卜都賚等仍在京安置上諭軍機大臣曰額敏和卓入覲時曾請將獲罪安置回人阿卜都賚頗拉特發往伊犂居住已如所請交帶領入覲回人侍衛等便道送往伊犂今烏什回人既經叛亂此阿卜都賚等素非安靜之人或在伊犂滋事亦未可定阿卜都賚頗拉特不必送往伊犂即著侍衛素勒帶回京師照舊安置庚申命尚書阿桂等即赴伊犂辦事上諭軍機大臣曰前諭阿桂明亮俟朕南巡旋蹕時再請訓前往伊犂今明瑞既往烏什著傳諭阿桂明亮不必守候回鑾即馳驛至行在請訓前往伊犂辦事諭進𠞰逆回將軍大臣等和衷集事上諭軍機大臣曰此次進𠞰烏什逆回各城大臣俱領兵㑹合但必號令歸一方克有濟額爾景額至烏什之時即著總理軍務或觀音保先至亦可暫總其事以待額爾景額之來明瑞一至伊本係將軍自應節制各城官兵再各城大臣等會合一處尤當和衷商辦以期集事斷不可各存意見烏什之事想計日可竣但恐逆回等見官兵陸續全到或逃往霍罕投額爾德尼伯克并傳諭該將軍大臣等務於緊要關隘處所選派官兵加意瞭望擒拏勿令兔脫諭阿克蘇辦事布政使德福籌辦軍需及酌派伯克事宜上諭軍機大臣曰據德福奏稱阿克蘇庫貯軍器火藥所餘無幾恐各城官兵至日不敷配給已行文喀什噶爾葉爾羌大臣速由臺站運送等語所辦未合機宜軍器火藥自屬緊要但各城大臣既領兵㑹𠞰自必攜帶豈有專俟阿克蘇預備之理况此時各臺站俱有回人有事之秋保無心懷叵測妄行攘奪德福何見不及此再所奏阿克蘇辦事不可無大伯克因行文楊應琚等催色梯巴勒氐於入覲歸途之便馳驛速赴該處尚屬可行色梯巴勒氐抵阿克蘇日即留彼辦事至薩里係烏什人父母兄弟俱在彼處自必備知其詳著派往卞塔海軍前效力俱傳諭知之癸亥副都統卞塔海等疏奏庫車官兵協𠞰逆回情形卞塔海等奏言二月十七日至十九日臣卞塔海屢與賊戰二十四日臣柏琨等領庫車官兵回人等至哲爾格濟克德拏獲烏什逃回尼咱爾默特臣等研訊烏什馬賊六百餘人步賊二千餘人現在傷斃二百餘人并聞向布魯特求援等語又訊得首惡係魯克察克村之四品頂帶孔雀翎伯克額色木圖拉及伊子虛銜五品頂帶藍翎賴黑木圖拉連木齊木五品頂帶伯克額穆爾烏拉又雅爾村五品頂帶哈子伯克和普爾五品頂帶孔雀翎密喇卜鄂碩爾又什呼勒伯克瑪瑪里木等率衆與大兵抗拒及分辦城內事件今所屬回人等雖被迫脅因度日艱難常懷怨恨看來伊等俱以耕牧為生今廢時失事必然內潰似無難計日掃除奏入報聞諭參贊大臣納世通嚴辦烏什逆回上諭軍機大臣曰據納世通奏稱接卞塔海烏什回人作亂信息一面傳檄招撫隨帶領官兵起程等語納世通初得信息尚不知逆回有戕害大臣搶掠倉庫之舉是以意在招撫今既知逆回等肆惡情形斷難曲宥納世通額爾景額等務期大示懲創不可稍存姑息甲子諭伊犂將軍明瑞等烏什駐劄官兵毋庸先事派調上諭軍機大臣曰德福奏稱平定烏什後總辦事務及倉庫城池卡倫俱須人甚急如官兵員缺必俟內地派補未免遲滯請先從阿克蘇官員內挑選數人隨大臣辦事所用兵丁亦交楊應琚酌派等語烏什辦事雖須用官兵頗多但隨明瑞前往之人即可令其暫行辦事並調取所用兵丁無不可者不必先事張皇向各處調取并𫝊諭德福知之命奬賞協助牲隻之伯克薩里等上諭軍機大臣曰據德福奏稱卞塔海領兵前往烏什伯克薩里等助馬一百匹今因運送口糧又與阿卜都噶普爾并請助牛二百頭又賽里木阿竒木伯克阿瓜斯伯凱署拜城阿竒木伯克阿爾租默特亦請每城助馬一百匹等語薩里等急公效力協助牲隻甚屬可嘉自當示以奬勸所助牛馬俱著賞給價值仍將朕加恩奬賞之意𫝊諭伊等知之丁卯申諭伊犂將軍明瑞等確查阿卜都拉等附逆情節上諭軍機大臣曰卞塔海等奏擒獲烏什回人額伊敏供稱駐劄大臣等從前派出屯田回人前往伊犂所購馬匹牲隻及採買官糧均未給價又將瘦羊四百隻每隻令回人繳價四兩此項銀兩俱係哈密回人侵蝕至運送沙棗樹科之時賴黑木圖拉兄弟謀逆伊父額色木圖拉阻止不從因在素誠署前放火拆屋素誠與阿卜都拉殺賊數人後見賊勢愈衆先殺其子復行自盡阿卜都拉被擒以女與賴黑木圖拉之子為妻始未殺害等語前據捉生訊問阿卜都拉被回人拘禁朕尚以阿卜都拉係玉素富之弟必不肯屈節今觀伊平日縱容所屬侵蝕回人銀兩又納女於賴黑木圖拉希圖臨難茍免此與叛逆何異豈可以其為玉素富之弟遂從寬貸著𫝊諭明瑞伊至烏什之日務將此等情節查訊明確若果所傳不妄非獨逆回等當族誅示懲即阿卜都拉亦宜明正典刑其運送木植纍派回人之處俱著查明具奏諭將軍大臣等辦理烏什事宜上諭軍機大臣曰據德福奏稱卞塔海等拏送烏什賊人數名交薩里訊問等語卞塔海等一有俘獲即應研訊情形乃轉送德福德福又委之薩里據所供亦無關緊要何不於軍前正法又煩逺送朕意或趂將軍大臣等未至之先揚我軍聲釋放伊等回城令其傳說使賊人內潰此亦取烏什之一策卞塔海總未計及看來伊識見甚小不過接戰數次即束手無策徒日望援兵之至此時倘逆回等聞風兔脫又如雅爾哈善之取庫車則伊等罪尤難逭且辦理烏什亦不必定以克城為急惟嚴加防範俾無從得食自可計日就擒俱著傳諭知之己巳伊犂將軍明瑞疏奏進𠞰烏什起程日期明瑞奏言臣前遣觀音保領兵五百名先往烏什應援二月二十五日聞烏什大臣官兵被害又聞卞塔海未能即獲賊首臣自應領兵前往除愛隆阿巡查邊境領兵一千二百名觀音保領兵五百名外臣隨派滿洲索倫察哈爾兵一千一百餘名阿竒木伯克公木薩願領回兵二百名閏二月初四日渡河初五日起程由穆素爾嶺前往又派素尼爾圖往迎愛隆阿如尚未起程不必使哈薩克等聞知惟密告知綽克托即回伊犂駐劄臣伏思逆回等聞官兵漸至或逃入布魯特等處自應早為堵截一面行文德福與納世通會商如兵不能分俟與觀音保會商辦理奏入報聞伊犂將軍明瑞等以伊犂河新築滿洲駐防城及哈什回人新築城工告竣奏請賜以嘉名尋欽定伊犂河駐防城名曰惠逺東門曰景仁西門曰說澤南門曰宣闓北門曰來安其哈什回城名曰懷順壬申參贊大臣納世通疏奏會𠞰烏什逆回情形納世通奏言臣自阿喇古選兵二百名先行閏二月初三日在烏什之鄂托巴什駐營次日領隊逼城有賊百餘出戰放鎗合陳一次俱回城中臣與卞塔海會合約於初六日已時夾攻取城初五日賊人見臣兵少突出馬步千餘人四靣攻圍臣領兵施放鎗炮大戰一次擒賊四名賊人敗走入城官兵得傷者三人臣一面派卞塔海隊內翼領良福領馬兵百餘名回人二百名至巴什雅克瑪沙圖兩處卡倫堵截賊人逃走之路又𫝊諭布魯特十四部落令其拏送逸賊毋得容留奏入上諭軍機大臣曰納世通奏領兵至烏什與卞塔海會合攻城擊敗賊人等語看來賊勢窮蹙聞我兵陸續前往必畏懼潛逃今卡倫防範既嚴縱有逃脫者不過往布魯特等部落伊等焉敢容留倘稍有抗違自可一併辦理至烏什回人所傷官兵事定後自當查明優恤惟素誠咎由自取不得入於請恤之數諭將軍大臣等詳查陳亡官兵察靈阿等請恤上諭軍機大臣曰德福奏稱巴什雅克瑪駐劄卡倫侍衛巴哈布同護軍兆明額等十二人至阿克蘇告稱伊等前往烏什支領錢糧夜半聞亂即縋城約㑹卡倫人等前往應援行至古古爾魯克因附近回人俱亂更相爭戰護軍校察靈阿等八人陳亡餘人脫出禀報等語巴哈布等之言未可遽信為實但察靈阿等如果遇賊陳亡著明瑞等辦理烏什事竣後詳查奏請優恤癸酉副都統卞塔海等疏奏𠞰賊官兵回人功次卞塔海等奏言臣等聞納世通已至約於初六日兩路進兵夾攻賊人馬步兵俱於近城樹林內列隊以待我兵即施放鳥鎗庫車回兵及緑旗兵往奪樹林賊人又移隊於城牆之下或入或出不時誘戰而城濠甚深賊可藏匿間有傷者我兵亦有受傷之人正在合戰舒泰又領葉爾羌兵前來戰至日暮賊人數千衝突而前復嚴隊以待奮力一戰賊始退走殺賊百餘人我兵陳亡者一名次日黎明賊復列隊臣等不時遣人誘敵賊不敢入用鎗箭射回此次合戰左右兩翼賊人來犯乾清門侍衛訥蘇玉麟侍衛傅昌喀蘭泰巴爾賽阿克蘇委署章京職銜塔尼琿帶索倫兵三十餘名喀什噶爾兵六十餘名奮力衝殺又遊擊富昌阿都司倭赫六黑喀什噶爾護軍校烏爾訥老肖等庫車阿竒木伯克鄂斯璊領庫車回兵沙雅爾伯克阿三阿克蘇伯克呢雅斯五品伯克額伊默爾等俱係奮勉出色之人奏入得㫖此次進𠞰賊人之管隊侍衛訥蘇等及各城伯克奮勉可嘉著明瑞納世通等存記俟平定烏什後一體奏請交部議敘乙亥參贊大臣納世通疏奏預籌堵禦逸賊及奬賞布魯特等事宜納世通奏言臣前奏請派翼領良福領兵堵禦賊人之路彼時因良福尚未前來臣親領官兵前往堵禦餘兵交與主事烏爾衮藍翎侍衛官長保翼領永善參將五十六於賊人四面進攻賊見我兵少衝突數次俱被擊敗殺賊二十餘名是夜良福兵到即令其前往巴什雅克瑪一帶嚴防臣於初七日奪取城西之山殺賊三十餘名看賊情形自知罪重且慮防範嚴密惟據險死守未必逃遁但大兵相逼甚急亦難預料所有堵禦之兵須强壯者方能濟事今伊犂兵亦將次到齊俟觀音保至日臣與商議選兵防守要害乘機擒縛賊人又希卜察克布魯特散秩大臣阿竒木冲噶巴什布魯特比阿瓦勒聞臣領兵前來各領布魯特兵隨至途遇呼什齊部落那喇巴圖之侄亦情願隨軍效力臣加以奬諭與我兵一體支給行糧再布魯特等甚愛頂翎請視其出力之處酌量賞給再行彚奏奏入報聞平定準噶爾方略續編卷二十八
