body:
  text: 乾隆二十三年十二月己巳㕘贊大臣扎隆阿等疏奏擒獲烏梁海逃犯恩克扎隆阿等奏言准郡王車木楚克扎布咨十月十七日同内大臣察達克等在吹河派兵分隊捉生詢問逃犯恩克踪跡旋獲同逃之扎巴濟克四戸人口又獲其屬人鄂特赫錫等詢知恩克在蘇穆勒圖十一月初九日又獲其弟哈齊克行至蘇穆勒圖拏獲恩克之姪塞卜騰及其家口聞恩克在伊妹壻克爾奇里克游牧其地大山深林恐聞風逃匿令察哈爾三等侍衛額爾德尼藍翎侍衛羅卜章署㕘領薩第喀爾喀㕘領吹烏梁海章京扎瑪黙勒塔勒克等官兵夤夜步行拏獲恩克克爾奇里克及同逃人等將恩克之妻給與察達克同逃之妻子分給兵丁又據布延圖卡倫報稱恩克等於十二月初一日解到住宿是夜克爾奇里克逃走等語臣等即派兵行文拏緝其疎防之員查明議處奏入上諭軍機大臣曰據扎隆阿奏稱車木楚克扎布領兵拏獲逃犯恩克等甚屬効力著加恩賞緞六端察達克賞緞四端所有索倫察哈爾官兵著查明交部議敘察達克所領兵丁前雖賞給口糧今既拏獲逃犯著加恩同喀爾喀等官兵俱酌量賞給銀兩以示鼓勵諭辦理屯田副都統職銜定長酌給䇿應官兵駝隻上諭軍機大臣曰據黄廷桂奏稱富德等前進官兵需用駝隻俱以預備糧運之駝供應其巴禄瑚爾起等陸續進發亦在所必需若不加以撙節則次年糧運轉致周章已行文定長等所有續到闢展駝隻俱令牧養不得輕為派撥等語雖為來年糧運起見然䇿應兆惠更屬目前要務不得不權其緩急可傳諭定長等辦理各隊官兵起程若馬匹疲乏仍以駝隻接濟不可拘泥黄廷桂來文致有遲滯諭大學士陜甘總督黄廷桂查辦軍營逃病兵丁上諭軍機大臣曰據黄廷桂奏稱遵㫖查辦雅爾哈善等所領綠旗兵丁脱逃案内其中有實係抱病在途似與無故脫逃者不同現咨屯田大臣等將沿途逃病兵丁解訊確情定奪等語兵丁中道脱逃自應治以軍法若實因患病留後則情事逈不相侔豈可漫無區别乃雅爾哈善身為將軍馬得勝專司提督而於士卒之是逃是病一切付之不問亦可謂太無紀律矣且兵丁内有患病之人既不令隨時稟報又不派員照管及給與口糧以資調養甚至有流落者即此一事觀之雅爾哈善馬得勝二人之罪可勝誅乎今事後查辦雖有除名糧冊其中詭逃為病者亦恐不免何足為據若徒紛紛質對或承辦之員不能妥協未必盡無寃抑總之罪在雅爾哈善馬得勝著黄廷桂查明兵丁逃病情由如患病屬實但革去名糧免其治罪大學士管陜甘總督黄廷桂疏奏親驗馬匹起程日期黄廷桂奏言臣前奏擬於本月初四日親往甘州涼州一帶査驗馬匹今蕭州所養馬匹臣俱飭交甘肅道輔德寧夏道勒爾謹等公同加意飼秣初四日起程先至甘州續至涼州查驗督率務宜及時飼秣一律臕壯臣再回肅州其續到事件臣率同涼莊道明德洮岷道程燾俱於途次辦理奏入報聞諭大學士管陜甘總督黄廷桂酌議賞給送馬官兵上諭軍機大臣曰據同福柱奏稱黄廷桂調撥營馬二千匹至涼州餧養伊親行送往并派協領瑚柱等作九起行走等語解送馬匹之滿洲綠旗官兵沿途所需行糧有無應給官項伊等至涼州照看飼秣時應如何加恩賞給可傳諭黄廷桂查明議奏再降㫖賞給以示體恤壬申㕘贊大臣扎隆阿疏奏拏獲逃犯克爾奇里克扎隆阿奏言臣前奏逃犯恩克親黨克爾奇里克於解至布延圖卡倫時復行逃脱押送之索倫奬賞藍翎喇卜坦等比即追捕十二月初五日至烘郭爾鄂隆之源追及克爾奇里克走入烏梁海副都統赤倫所屬馬甲根敦扎卜處因協同拏獲臣等即嚴加鎻縳派員看守於初八日起程解京奏入得㫖赤倫根敦扎卜及効力官兵俱著酌量賞給以示鼓勵癸酉諭定邊將軍兆惠等查奏各隊効力官兵上諭軍機大臣曰據努三等奏稱伊等於庫車等處遇新派各隊官兵俱疾速行走計十二月初旬可俱抵阿克蘇等語此次大臣侍衛官員兵丁同心協力晝夜行走甚屬奮勉如此方是滿洲世僕朕心深為軫念前諭將軍營奮勉官兵查明具奏可再傳諭兆惠此次効力之大臣侍衛官兵等俱著查明註冊俟功成之日定沛恩施以酬勞績諭辦理屯田副都統品級定長豫備哈薩克貿易事宜上諭軍機大臣曰據定長奏哈薩克阿布賚遣伊屬人至烏魯木齊懇求貿易并與從前將軍等遣往哈薩克之寧古塔兵丁雅呼同來即派原任道員成德前往經理又將阿布賚呈將軍大臣文書進呈哈薩克既遣人前來自應准其貿易覽阿布賚呈文則後此仍有貿易之人若果如所約亦照此次辦理但呈文中有雅呼等兩次帶領伊等貿易懇將軍大臣奬賞以示鼓勵等語可傳諭定長伊貿易人等若代雅呼懇求即示以我等所辦者惟貿易事務至保舉効力之人則不敢干預爾等俟親見將軍時稟告若雅呼佯為不知即無庸向説若亦私自懇請即令其來京候㫖仍將伊等言語情形具奏甲戌命辦理屯田按察使納世通前往阿克蘇辦事上諭軍機大臣曰納世通奏稱舒赫德現在領兵前進辦理阿克蘇事務惟永貴一人請前往協辦等語著照所請前往阿克蘇協同永貴辦事哈喇沙爾事務著書山辦理定長范時綬仍著駐劄闢展承辦一應事務諭定邊左副將軍成衮扎布酌辦哈薩克使臣來京上諭軍機大臣曰昨據定長奏稱哈薩克阿布賚之兄阿布勒瑪木比特遣其子俄羅斯蘇爾統等三十餘人隨喀喇沁臺站章京納旺前來入覲貢馬由烏里雅蘇台行走已傳諭納旺令其帶領速行於上元節前到京如馬力不及亦不必勉强仍傳諭成衮扎布哈薩克所貢馬匹若隨同行走未免遲滯著先令使臣馳驛起程將貢馬暫留軍營從容牽送乙亥諭定邊左副將軍成衮扎布酌量賞給追賊官兵上諭軍機大臣曰福祿奏稱喀爾喀協理一等台吉鄂木布濟索倫佐領錫爾伯圖等領兵拏獲盜竊卡倫牲隻賊人滿塔克等應請正法示衆其家口分賞兵丁等語福祿得親扎卜俱著交部議敘仍加賞得親扎卜緞六端多爾濟車登達什朋楚克車都卜鄂木布濟錫爾伯圖等及効力兵丁俱著分别賞給緞疋銀兩恩免和托輝特之烏梁海本年未完貢賦上諭軍機大臣曰據成衮扎布等奏稱和托輝特之特斯奇木托濟錫爾克騰等四部烏梁海共十六鄂拓克一千一百餘戸内五百餘戸尚能交納貢賦餘皆無力現在收取伊等貂䑕猞猁猻狼狐等皮張及鵰翎麝香等物除麝香不准充貢餘物量其所值以每戸三貂計算僅得一百七十一戸其未完之項請於次年帶收等語此等烏梁海受青滚雜卜擾害生計俱屬艱難著傳諭成衮扎布將伊等未完貢賦加恩豁免乃令莫尼扎卜曉示伊等從前何等苦累今為大皇帝臣僕除正供外並無額外需索現在未交皮張又行寛免嗣後爾等應納貢賦務如數交收不可有意希恩仍致缺少莫尼扎卜辦理烏梁海事務頗屬効力著加恩賞給緞疋丙子諭㕘贊大臣舒赫德等查補調回卡倫兵丁等事宜上諭軍機大臣曰據舒赫德呈報軍機處因送回納穆扎爾等家人之便將効力年久之察哈爾佐領巴雅爾暨兵丁四十四名撤回巴里坤等語察哈爾兵調往軍營多用於卡倫臺站所闗甚要不可懸缺可傳諭舒赫德清馥此等撤回兵丁有原在卡倫臺站者自應將新派之察哈爾兵補缺納穆扎爾等之行裝至巴里坤清馥即給與驛馬由西安一路來京又所報同行有三等侍衛章武藍翎侍衛班泰等家人前愛隆阿奏報納穆扎爾三泰信息祗有侍衛奎瑪岱未及其餘侍衛官員俱著兆惠舒赫德查明奏請優卹諭定邊左副將軍成衮扎布等查辦擒獲逃犯及疎防旋獲之官兵等上諭軍機大臣曰據扎隆阿查奏擒獲恩克等之烏梁海章京等或照例賞給緞疋或送部議敘又開列一等兵丁應賞銀六兩其二等官兵與烏梁海兵丁等俱毋庸議等語昨伊等奏報獲犯時已諭將烏梁海兵丁一體賞給著照一等兵丁例賞銀六兩其二等官兵著賞銀四兩至所奏烏梁海章京等送部議敘伊等惟圖賞賚何知議敘之榮著將例賞緞疋茶葉烟草加倍賞給又侍衛喇卜坦等疎脱克爾齊里克旋行追獲自可功罪相抵喇卜坦著加恩免其革職所有看守兵丁俱免其革去名糧照所擬鞭責穿箭遊營以示薄懲丁丑諭定邊左副將軍成衮扎布等辦送哈薩克使臣事宜上諭軍機大臣曰據成衮扎布等奏稱哈薩克使臣等行至軍營隨示以車駕今在京師非爾等入覲之時但業已前來須候請㫖到日遵行等語近因定長等奏哈薩克人等由烏里雅蘇台前來己傳諭納旺令於上元節左右趲到如不能即從容行走亦可若以非時相阻則豈有令其空回或令候至次年抑或此時特為伊等臨幸熱河之理若謂伊等未經出痘則從前亨集噶爾等尚且奏請來京此次自當照辦所見殊屬拘泥著遵前㫖曉示或竟告以業經奏請䝉恩念爾等逺來若不令瞻仰未免有虚誠意況從前使臣等亦未經出痘尚懇請來京今時值隆冬更自無妨仍計正月十九日以前能否抵京酌量辦理戊寅諭乾清門頭等侍衛官長保等取道解送馬匹上諭軍機大臣曰據富德奏稱解送馬匹牲隻自巴里坤取道額林哈畢爾噶經過烏魯木齊阿勒輝伊克朱爾都斯巴哈朱爾都斯海都河喀喇淖爾庫庫努忒嶺至阿克蘇較之現行臺路既無戈壁且饒水草但須二月氷雪消化時方可行走查朱爾都斯等處係達什達瓦舊游牧本年策布登扎布帶回厄魯特梅楞察罕扣章京帕克巴達什諾爾布扎卜等三人熟識路徑等語著傳諭官長保現在派調逹什達瓦游牧兵丁富德尚未知悉伊等熟識路徑者諒不止此三人若三人業已在内自可毋庸置議即令有别項事故亦不必定派伊等或不必過巴里坤徑由阿濟必濟前往亦即詢問熟識道路之人伊等此去由巴里坤行走與否酌定取道何處即呈報軍機處以便行文辦理馬匹牲隻之大臣官員併傳諭兆惠富德舒赫德等知之又諭曰黄廷桂奏詢問侍衞德爾森保據稱額林哈畢爾噶一帶水草甚佳解送阿克蘇馬匹應由此路行走但沿途未免有嗎哈沁西安滿洲兵及達什達瓦厄魯特等若令亦由此路分起䕶送更屬妥協等語與富德所奏相符已傳諭官長保及解送馬匹之副都統伊柱富景矣可傳諭黄廷桂俟官長保將應否仍由巴里坤取道之處酌定知㑹後來年解送馬匹牲隻即照此辦理起程可也㕘贊大臣舒赫德疏奏起程策應日期舒赫德奏言臣前奏請將愛隆阿所領滿洲索倫蒙古兵丁五百名馬二百餘匹速為飼秣臕壯并酌量賽里木回人等助出馬匹辦理行裝策應大兵所調各隊新兵有先到者即帶領進發今據催督官兵人等報稱察哈爾兵健鋭營頭二起兵十二月初二三必到餘於初六七可到差往賽里木之人雖未轉回據阿克蘇阿琿伯克阿奇本伯克鄂對之妻等情願助馬一百匹城守官員等亦捐助馬駝及存留運米駝騾臣又於阿克蘇挑選綠旗鳥鎗兵五百名照管礮位兵一百二十名分給官兵一月行糧及飼馬大麥於本月初四日同愛隆阿巴圖魯侍衛占頗圖伍岱瑪呼占丕納回人總管噶岱黙特等領兵自阿克蘇起程酌於巴爾楚克留兵防䕶臺站其阿克蘇城守有綠旗兵一千餘名令副將定柱等管領烏什賽里木拜有貝子玉素富及丑達等分領官兵防守和闐等六城有伯克鄂對侍衞齊凌扎卜等管理奏入上諭軍機大臣曰舒赫德奏整頓阿克蘇等處兵馬策應兆惠軍營囘城阿琿伯克及玉素富丑達等捐助馬駝於本月初四日起程等語辦理殊屬妥協伊等以忠勇之氣激勵將士軍威逺震内外合擊倘䝉上天福佑或可𠞰賊成功佇聞㨗奏阿克蘇之阿琿伯克及玉素富等捐助馬駝急公可嘉著俱折價賞給令永貴辦理又據奏稱聞伯克鄂對有從和闐城派馬步兵一千名預備羊隻糧石之信伊從軍以來諸事奮勉此次尤徴誠悃著加恩賞給公品級兆惠舒赫德等即傳諭知之命於鄂爾多斯等處購辦牛羊上諭軍機大臣曰現在大兵進𠞰需用牛羊以資軍食著乾清門侍衛巴爾品郎中富鼐馳驛前往鄂爾多斯阿拉善山㑹同該扎薩克等於伊等牧羣内牛羊就所有酌量購辦給以官價邇來牲價稍昻可量為增給就近於寧夏庫貯銀兩内支領所購牛羊亦著寧夏地方官送交督臣駐劄處所轉送軍營庚辰諭辦理屯田副都統職銜定長曉示哈薩克貿易人等事宜上諭軍機大臣曰據定長奏稱哈薩克阿布賚遣布魯特昆都渾等十餘人前來貿易於十二月初四日至烏魯木齊已行文舒景阿照例辦理又收到阿布賚寄努三之書懇賞貿易人等口糧馬匹遣回游牧等語哈薩克人等貿易特為伊等圖獲利息情愿前來惟計物償值示以公平並無另為辦理之法若預備歸途行糧此端斷不可開著傳諭定長等伊等貿易來人知努三已離烏魯木齊或不言及此事若仍以阿布賚書信為詞舒景阿即曉示云我辦理貿易大臣因爾等踰期不來久已回京理應停止貿易但商貨尚存念爾等逺來空勞往返故酌量辦理貿易尚屬通融此外事體更不敢干預且貿易人等非請安進貢可比從前亦無給與口糧馬匹之例即將伊等遣回賜侍衛德爾森保什爾瑪海巴圖魯號賞銀一百兩辛巳貝子品級伯克霍集斯之子漠咱帊爾入覲上御乾清宫受朝漠咱帊爾行三跪九叩首禮畢賜冠帶壬午㕘贊大臣舒赫德疏奏兆惠軍營信息舒赫德奏言十二月初三日有回人托克托黙特自葉爾羌來投臣即行詢問據稱大兵至葉爾羌波羅泥都自喀什噶爾領馬步五千人來援霍集占領馬步萬人㑹合迎戰圍守大兵三十餘日因聞喀什噶爾所屬英噶薩爾城怱被布魯特搶掠二賊猝謀禦敵是日薄暮將軍領兵縱火奪取賊人營壘二處收帳房六十餘架𠞰殺看守人衆過半二賊相謂此必將軍與布魯特有約即圍守經年諒難取勝且力亦不支莫若議和或可少圖休息因遣所屬及厄魯特各一人通信將軍拘留不遣以矢射書傳諭云爾兄弟果欲納欵必先入覲大皇帝御前否則不允後二賊亦射書願送口糧撤圍相見將軍不報從此俱未交鋒又聞軍營脫出之厄魯特告稱大兵於營地掘得米一百六十窖收馬千餘匹駝千餘隻波羅泥都因喀什噶爾告急撤回防禦所留僅二百人臣詢托克托黙特係烏什回人從伯克霍集斯之弟阿卜都里木駐阿克蘇隨霍集占至葉爾羌阿卜都里木被拘以伊能相馬見釋有家口在烏什吐魯番是以來投等語臣詳察回人所告屬實尤宜亟往應援現駐阿克蘇及新派官兵先至者計二千二百有奇馬一千二百有奇帶領前進隨行文續到各隊官兵及富德阿里衮等支領糧料趲行進發又令總管噶岱黙特及阿克蘇阿琿伯克等將伊等投誠後安居樂業情形及從賊必被𠞰滅惟將霍集占等擒獻或自來投順可保身家繕寫囘字文書曉示沿途囘衆奏入上諭軍機大臣曰舒赫德奏據來投回人告稱將軍兆惠等攻奪賊人營壘霍集占等喪膽求和兆惠責令輸誠入覲始准納欵等語舉動雄偉甚屬可嘉著加恩賞給御用朝珠金黄帶荷包此帶可常時服用額敏和卓伯克霍集斯明瑞温布由屯各賞給大小荷包道逺不能多齎賞物特派御前侍衛安泰前往宣慰并傳諭兆惠等將効力官兵查明奏請交部議敘至回人所聞脱出厄魯特等傳説軍營掘得窖糧之語或係伊等掦言或實有其事亦遇便奏聞乾隆二十四年春正月甲申諭大學士管陜甘總督黄廷桂等辦送捐糧回人賞項上諭軍機大臣曰據舒赫德奏稱和闐等六城米糧甚多距葉爾羌亦近將來大兵㑹合正需接濟若由内地送銀數萬兩緞數百疋青藍等布數千疋賞給捐助糧石回人則伊等踴躍急功可省運糧駝隻之費現在阿里衮親解馬駝請將所有餘駝留運各城糧石已咨行黄廷桂吳達善定長阿里衮等語所辦甚屬妥協可傳諭黄廷桂等酌量多為運送以備賞給恩免甘肅通省來年地丁錢糧及各屬積年未完借欠雜項上諭大學士曰甘肅本年應徵地丁錢糧及厯年積欠銀兩草束等項業經上年屢次加恩豁免但念該省邊地苦寒年來承辦軍需小民急公趨事朕心深為嘉予著再加恩將甘肅通省來年應徵地丁錢糧悉予蠲免該督撫等即行出示徧為曉諭并嚴飭屬員實力奉行副朕格外優恤邊氓至意又諭曰甘省逺處邊陲地方寒瘠比嵗收成歉薄生計未免拮据雖邇年辦理軍需毫無派累而一切受僱輓運㒺不踴躍急公民情淳樸深堪軫念業經叠次加恩將連年正供雜項并厯年積欠帶緩銀糧草束概予豁免惟昨春曾被偏災之地尚有官借牛具籽種口糧及積年應交官項為從前恩㫖所未及者若照例徴收無力貧黎仍復艱於輸納著再加恩將甘省上年曾被偏災及勘不成災各州縣所有未完籽種糧九萬六千餘石又折給銀一千餘兩未完口糧四萬四千七百餘石又折給銀五千八百餘兩又各屬被旱及被雹處所内有勘不成災地畝原借籽種糧一萬一千三百餘石又折給銀二千五百餘兩口糧一百餘石又折給銀四千七百餘兩又甘州涼州肅州未完牛價銀一萬一千五百餘兩乾隆二十三年各屬借給牛本糧一萬五千九百餘石銀八千餘兩臯蘭縣借製水車未完銀兩及雍正七年起至乾隆二十二年止未完牙税磨課等銀兩普行蠲免其乾隆元年至二十二年止帶徵民欠未完各官養㢘公費銀三萬九千二百餘兩糧一十二萬三千三百餘石并雍正十三年未完耗羡銀糧均屬遠年積欠概予豁除俾免追呼以安耕作至口内之栁林湖毛目城等處口外之靖逆栁溝赤金𤓰州小灣等處屯田并著一體加恩將本年應分糧石各照交官之數酌減一半交收俾得均霑渥澤諭大學士管陜甘總督黄廷桂查奏陜西承辦軍需州縣應免錢糧上諭大學士曰年來甘省承辦軍需所有通省正供叠經寛免其帶緩各正雜錢糧亦已屢次加恩蠲豁今思陜西與甘肅毗連小民踴躍趨事未沐恩膏除上年被災各屬已加賑恤外其餘或有承辦軍需州縣應如何分别加恩著黄廷桂詳悉查明奏聞候降諭㫖乙酉命革守備唐國正等職留軍營効力贖罪并察議巴里坤辦事大臣阿里衮等上諭軍機大臣曰前據富德奏途遇巴里坤大臣辦運伊犂兵丁口糧係陜西騾夫牽送騾頭既多瘦斃而夫役衣裝單薄斷難送到朕以長途運送於夫役全無體恤諭飭行查今據清馥奏稱因巴里坤兵丁不敷差遣添給騾夫銀兩令其送往伊犂仍委守備唐國正典史王尚潤照看伊等辦理不善應行㕘奏等語唐國正王尚潤俱著革職留軍營効力贖罪阿里衮清馥辦理亦未妥協併著交部察議諭定邊將軍兆惠等查拏厄魯特宰桑瑪里格爾巴朗上諭軍機大臣曰從前進𠞰時逃脫之厄魯特瑪里格爾巴朗令詢問囘人漠咱帊爾據稱見伊隨霍集占行走等語著傳諭兆惠進𠞰囘人時查拏瑪里格爾巴朗或對陣𠞰殺則己若業經擒獲即派員解送來京至前在伊犂居住囘人及投往囘部之厄魯特等反覆可惡將來平定囘部即將伊等全行𠞰滅以示懲創定邊右副將軍富德遣二等侍衛畢拉爾海署驍騎校五格送來降之厄魯特綽羅斯台吉三濟扎卜來京授三濟扎卜為三等侍衛在上駟院行走賞衣一襲其家口留京安插畢拉爾海等俱賞給銀兩馳驛仍往軍營㕘贊大臣阿桂奏請議敘之厄魯特三等侍衛卓里克圖巴圖魯碩通至京命於乾清門行走大學士管陜甘總督黄廷桂疏奏運送軍需銀兩羊隻黄廷桂奏言欽奉諭㫖令臣酌購牛羊辦送軍營查内地之牛不習口外水土成羣趕解毎易倒斃且耕作屆期未免難於購辦惟各屬羊隻尚可購辦四五萬但時值騰貴從前定價八錢頗屬不敷懇恩毎隻准給銀一兩則小民均沾實惠此時口外嚴寒請於來年二月起程庶足接濟軍食又奉諭㫖以囘部各城有糧可購哈宻等處貯備銀兩宜寛裕解送臣於十二月初旬因哈宻需銀甚多已飭甘肅道將庫貯銀内動撥二十萬兩送往哈宻即移咨呉達善等酌量寛裕解送阿克蘇備用奏入得㫖如所議行昨據舒赫德奏籌辦糧石一摺已有㫖諭今覽來奏朕為糧運一事可以稍紓懷矣丙戌恩准甘省奏銷僱役價值并免舊欠賠補馬匹上諭大學士曰從前甘省安臺送兵多僱民間馬騾用過脚價及到站守候支給草料銀兩該部按例察核議不准銷但念領價分僱俱屬無力里民且事在乾隆二十年閲今三載若復按名查追邊氓力難完繳著加恩將送兵僱價銀三萬八千六百餘兩支過五日料草銀一萬一千九百餘兩一併准其報銷其乾隆十九年各標營州縣應賠北口馬四千六百餘匹自當照數著追苐念該省文武各官比年承辦軍需均能黽勉効力並著格外加恩一體免其賠補副朕奬恤勤勞之意大學士管陜甘總督黄廷桂疏奏派調綠旗官兵出口日期黄廷桂奏言臣遵㫖選派進𠞰兵丁五千名屯田兵一千名及永貴等奏派屯田聽差兵五百名嗣因屯田兵改調進𠞰隨飭查明補給軍裝器械并咨明吳達善補給賞項兹據軍需局各道㑹同肅州鎮呈報所派督撫提鎮各標副將遊擊都司千把外委等一百八員帶領兵丁六千五百名於本年十一月二十九日起至十二月十八日俱先後全數出闗訖奏入報聞戊子命還吐魯番公素賚滿等捐輸馬匹上諭軍機大臣曰據定長奏稱吐魯番公素賚滿協理伯克木薩呈請捐馬百匹以備軍需等語素賚滿等感激朕恩捐輸馬匹情詞懇切甚屬可嘉但念伊等甫經移駐牲隻諒亦無多仍令存留應用不必竭蹶捐輸至伊等誠心朕已洞鑒可傳諭定長將朕㫖明白曉示諭定邊將軍兆惠等以拉達克所聞囘部信息上諭軍機大臣曰據章嘉胡土克圖等奏稱現在藏地遣往拉達克探信人等據拉達克汗傳聞將軍攻取葉爾羌等城霍集占逃往西得沙堪若果來投必先縛獻且聞大兵將近伊地其情形甚為畏懼已移文撫慰請諭將軍兆惠加以體恤等語拉達克距葉爾羌甚逺我兵尚在攻城何由即近伊地此必我兵平定烏什阿克蘇等城直抵葉爾羌賊衆驚恐流傳故拉達克亦聞信息耳看來囘衆風聞全無固志尚覺易於辦理將來霍集占若果潛逃或追至拉達克伊等素稱恭順惟激令擒送霍集占不可絲毫擾累著傳諭兆惠及章嘉胡士克圖知之己丑命賞給内大臣呼岱巴爾氐捐馬價值上諭軍機大臣曰據玉素富奏稱伯克霍集斯之妻及幼丁呼岱巴爾氐等聞進兵策應軍營願捐馬四十匹以抒誠悃等語霍集斯歸誠以來効力軍營伊妻子等聞進兵信息亦願捐馬匹協濟進𠞰官兵甚屬可嘉可傳諭玉素富毎馬一匹賞給銀十兩就近於闢展阿克蘇支給仍將朕洞鑒伊等誠悃之處曉示知之命賞入覲之伯克漠咱帊爾銀三百兩從行之伯克伯克墨特鄂對色里木達爾罕伯克額穆魯勒銀各五十兩隨役七人銀各十兩平定準噶爾方略正編卷六十六
