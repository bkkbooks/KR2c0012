body:
  text: 乾隆二十四年春正月庚寅恩諭加增甘省運價辦給營驛糧料各事宜上諭大學士曰甘省承辦軍需一切糧料草束食物等項採購既多價值未免增長所有額支運腳亦恐不敷前已屢經降㫖節次量為增給而肅州安西一帶市集尤為稀少料草辦理為艱宜加渥恩用昭體恤著將該省運送賑糧兵糧腳價均照挽運軍糧之例一體增給其肅州安西塘驛應差馬匹及中路自髙臺縣至涇州等二十一州縣北路自中衛縣至靈州六府㕔州縣所管塘驛馬匹俱暫停折支料草乾銀著照例日給本色以資飼秣俟軍務告竣仍舊支給折色再涼莊滿營採買糧料草束及寧夏滿營官員應需粳米並著查明照依時價採買供支該督撫其妥協經理毋任胥吏從中侵蝕轉致滋擾癸巳宣諭雅爾哈善罪狀即行正法王公滿漢文武大臣等奏言臣等遵㫖審訊雅爾哈善爾受皇上重恩身為將軍不能盡力𠞰賊當逆賊霍集占敗入庫車時任其脫逃不親身追𠞰又順德訥疏脫霍集占之處不早據實情參奏逐一訊問據供雅爾哈善受恩深重當逆賊遁入庫車不能乘機擒獲及順德訥夜聞賊逃不即追捕即應嚴參治罪一面領兵親往追擒乃更隱忍不發及賽里木回人供出始行參奏實繫糊塗希圖掩飾罪無可辨臣等復將伊在軍營種種乖謬貽誤之處逐一嚴訊雅爾哈善俯首無辭惟稱實無可辨等語查雅爾哈善奉命𠞰賊自應奮勉從事乃進兵之初全無紀律以致緑旗兵沿途脫逃及病故者無可稽查及至庫車以八九千官兵圍守一城閲三月之久皇上天恩未加譴責乃雅爾哈善喪盡天良反示意順德訥有不論功成與否得一空城亦可報命之語且惟知安坐營帳並不親行督率巡查雖據狡供巡查數次而質之侍衛德爾森保則實止一次至聽信緑旗謬計挖掘地道反為賊所覺傷損士卒逆賊霍集占等出入庫車毫無知覺及賊首逺遁又不領兵追捕逮來降回人供出知難掩飾始將順德訥參奏欺罔之罪尤為重大又庫車頭目阿卜都克勒木潛逃所餘老弱出降雅爾哈善猶未入城撫定領兵數月老師糜餉失機僨事死不蔽辜應請㫖將雅爾哈善即行正法以昭炯戒奏入上諭大學士曰雅爾哈善以將軍征討回部乃自進兵庫車以後種種玩誤乖張失機僨事為從前行師失律諸臣所未有是以將伊拏解來京自軍興以來問夜旁午事事皆朕親理委曲莫不悉知即其罪狀昭著亦不待再加鞫訊始抵於法實因伊貽誤軍國大事欲令大廷廣衆服刑示警所以彰國憲而昭炯戒乃朕逐欵詰問伊雖一一俯首無辭而猶然靦面求活竟自舉達爾黨阿哈達哈之例冀以披甲效力豈知人世間不知羞恥之人竟有至於如此者試問伊獲罪情節與彼二人同乎即彼二人之從寬亦出於朕耳豈人臣所可示以為例乎則知伊之本心原出於怯懦延誤即使獲罪謂有例可援不失為曾作大臣之人仍然保守家業妻子耳此其心尚可問乎今據王公大臣等公同集訊合詞請㫖正法使雅爾哈善之罪尚有一線可原朕固不因王公大臣等有此陳奏然後明正典刑似此萬難寬宥之人亦不待衆論僉同游移從事也且雅爾哈善之老師糜餉安坐縱賊前後情節俱係伊隨時自行奏報經朕一一親覽洞燭者其恇怯因循居心欺罔之處實難枚舉毋論沿途不能約束兵丁任意逃竄及聽信緑旗陋說輕挖地道傷損辨兵全無馭衆敵愾之道乃至身任閫師遇事髙居簡出對敵則藉稱憑髙瞭望並不親身督戰守壘之兵戒嚴數月亦不親往巡視及庫車頭目潛遁餘衆出降又不親往經理阿克蘇回衆輸誠內附並不前往受降逮聞兆惠將至意慮分功始欲進發而卒又不果有一於此尚得謂之有人心者乎然其罪之最不可逭者一在霍集占竄入庫車則姑付之於不知且寬其西逸之路不至追捕又明知順德訥之玩賊養奸而不即參奏直至賽里木降人供出方以一奏諉罪一在庫車賊黨阿卜都克勒木等尚未盡去即不力督攻取授意順德訥有得一空城亦可報命之語則又屬何心乎此而不正其罪置國法於何地國家軍旅重寄凡在臣工無不當奮勇自效大臣中果有勤勞懋著者朕無不加以殊恩顯秩用示鼓勵若如雅爾哈善之貽誤至此實出情理之外總因前此永常策楞玉保三人以道斃漏網未經解京明正典刑是以雅爾哈善一無忌憚乃至引達爾黨阿哈達哈之例以自處則為簧鼓之說者可知朕之執法為寬乎為嚴乎雅爾哈善罪案已定即再加之刑訊亦不過恬不知恥茍延旦夕耳朕實為衆愧之亦不忍再加刑訊矣著阿蘭泰達青阿㑹同法司前往監視將雅爾哈善即行正法夫信賞必罰乃人主用人行政之大權若不謹持成憲何以整肅軍紀此不得已之苦心王公大臣等當共體此意者朕亦無可引咎惟增憤悶而已將此宣諭知之命賞侍衛德爾森保碩通銀各五十兩達呼里鏘喀保岱三保銀各三十兩治裝馳驛前往西路軍營甲午定邊右副將軍富德疏奏兵抵阿克蘇日期富德奏言臣於十一月十一日自烏魯木齊起程十二月十六日至阿克蘇舒赫德努三等於本月初四日起程相隔不逺臣輕騎晝夜趲行不過五六日即可追及其解送馬駝口糧等事飭交副將定柱辦理臣即於十七日起程再臣隨行之吉林馬甲綽卜泰久在軍前招降右部哈薩克塔什罕回人等頗屬效力請委署額外驍騎校遇缺即補奏入報聞丙申諭定邊將軍兆惠等辦理糧餉等事宜上諭軍機大臣曰據清馥奏稱趕送軍需牛羊較米麵可省駝隻但滿洲索倫䝉古等習於肉食緑旗兵則不能至回人米糧若多買則價必昻請於牛羊外仍將米麵銀兩減半運送等語所奏殊不曉事昨據舒赫德奏現備米糧牲隻已敷萬餘人兩月之食其陸續趲送之項計可支數月又多運銀兩緞布向回人購辦斷無不能至六月之理至六月則自當竣事即再需數日新降各回城種植亦已成熟足資接濟清馥並不詳籌熟計徒謂糧運艱難總無善策則一事亦不可行豈有因此撤兵之理似此空言無實轉致搖動衆心有何禆益已傳㫖申飭可傳諭兆惠等所有軍營糧餉仍照節次章程酌量辦理並將現在情形作速奏聞又諭曰清馥奏稱北路喀爾喀䝉古等時將牛羊由游牧送至巴里坤貿易請派大員向喀爾喀及達里剛愛等處採買送往軍營等語軍興以來所購蒙古等牲隻頗多伊等一聞官買即非情願往往藏匿現在軍營口糧儘足應用所請可不必行或俟伊等與商民交易再向商民買取則轉運獲利來者必多陸續解送似尚有益但仍不可明示商民恐䝉古等妄生疑畏裹足不前可傳諭清馥妥協辦理再所奏因運送軍需取用商駝二十五隻每隻折價銀二十兩等語恐未及伊等原值著再加銀三兩即行支給如己回原籍可行文黃廷桂務將該商查出補給毋任胥役侵蝕丁酉參贊大臣舒赫德等疏奏和闐等城固守情形舒赫德等奏言十二月十三日據侍衛齊凌扎卜噶布舒散秩大臣伯克鄂對等報稱逆賊霍集占遣賊黨阿卜都克勒木等六百餘人自十一月二十六日以後往來和闐之額里齊哈喇哈什等處侵犯城池搶劫村堡現同衆伯克等悉力拒守擊退賊衆將陳亡得傷官兵職名及額里齊等六城大小伯克職名戶口糧石牲隻數目開單呈報臣等移咨齊凌扎卜等令其同心固守以待援兵嗣後情形即報知阿克蘇辦事大臣永貴等具奏謹將臣等咨文及原文二件繕録進呈奏入上諭軍機大臣曰據舒赫德等奏稱侍衛齊凌扎卜噶布舒散秩大臣伯克鄂對等安撫和闐等六城擊敗霍集占所遣賊黨等語齊凌扎卜等奮勉效力深屬可嘉伯克鄂對近已加恩賞給公品級著賞銀一百兩仍交部議敘齊凌扎卜賜號穆爾德木圖巴圖魯賞銀一百兩噶布舒賞銀五十兩俱授為二等侍衛陳亡之察哈爾奬賞藍翎侍衛鄂博得傷之索倫署防禦布特木濟馬甲那蘇圖俱著交部照例分别議敘議恤得傷之回兵等著交將軍兆惠酌量賞給以示鼓勵又諭曰侍衛齊凌扎卜等據伯克阿什默特阿卜都哈里克等將和闐等六城大小伯克職名戶口糧石牲隻數目列單呈報誠悃可嘉著賞給伯克等大荷包各一對阿什默特阿布都哈里克俱著賞給三品職銜戴孔雀翎其餘伯克等有應賞品級者著兆惠等查明具奏其防守丕雅勒瑪卡倫之喀爾喀衮楚克回人伊斯邁拉和卓偵探賊信之索倫布特木濟領催烏巴什回人愛達爾等亦酌量賞給鼓勵其回人薩里克聞係霍集占妻父今遣人誘脅額里齊哈喇哈什等城伯克等殊屬可惡併傳諭兆惠等將薩里克務行拏獲解京勿致兔脫命四川總督開泰協辦陜甘事務上諭大學士曰黃廷桂偶感風寒尚需調治現在軍需緊要著開泰馳驛前往協同辦理俟黃廷桂病體痊愈開泰即由該處仍回四川總督之任己亥恩恤故大學士伯陜甘總督黃廷桂上諭大學士曰大學士伯管陜甘總督黃廷桂忠誠敏達幹練老成厯任封疆勤勞懋著西陲用兵以來籌辦軍需備極勞瘁一切規畫機宜動與朕心吻合數年來轉運糧馬事事精詳妥協毫不纍民內地不知有軍興之費厥功甚巨倚毗方深是用疊加寵錫晉爵賜金以彰勞績昨據蔣炳奏伊在涼州偶感風寒力疾視事舊恙增劇即命福隆安同御醫馳驛前往診視以冀速痊遽聞溘逝深為震悼覽其遺疏當彌留之際尚拳拳以西師垂竣籌辦軍儲為念益見體國奉公赤忱罔斁不知聲與涕俱難以自禁即著福隆安前往奠醊賞銀一萬兩交地方官料理喪事並准入祀賢良祠其伯爵即令伊子承襲所有應得恤典仍著該部察例具奏又諭曰故大學士伯總督黃廷桂現已降㫖賞賜銀兩令該省地方官經紀其喪靈柩起程時所過地方文武員辨俱著出城奠醊并派員沿途加意照料護送回京辛丑授甘肅巡撫吳達善為陜甘總督上諭大學士曰陜甘總督員缺著吳達善補授甘肅巡撫員缺著明德補授吳達善未到之前總督印務即著明德暫行護理命升賞護送漠咱帊爾之藍翎侍衛關達色等上諭軍機大臣曰藍翎侍衛關達色前鋒索諾木扎卜護送漠咱帊爾來京甚屬奮勉著授關達色為三等侍衛索諾木扎卜為藍翎侍衛索諾木扎卜仍賞銀三十兩前往右衛休息數日由彼迎候漠咱帊爾護送回伊所部回京之日賞給官房數間令其居住壬寅諭定邊將軍兆惠等通信布魯特事宜上諭軍機大臣曰據玉素富奏稱遣往布魯特之侍衛布占泰轉回伊於十一月十八日至布魯特邊界之阿特巴什聞逆賊霍集占差人請兵即向車里克齊之子策里木伯特議擒賊黨并派兵協𠞰據告稱伊等游牧係明伊勒哈辦理及前往曉示又據稱來人已經逃走游牧人少不便調發欲往瑪木特瑚里處因嶺雪甚大難於行走等語據布占泰所告是布魯特人等並未出兵前搶掠喀什噶爾所屬之英噶薩爾城係何處之兵可傳諭兆惠等訪察遇便奏聞再逆賊霍集占等若尚未擒獲需布魯特協助即傳㫖曉示車里克齊等以霍集占倘逃至爾處自當縳獻或需爾等協助亦當乘大兵威勢多所俘獲且可雪前仇車里克齊入覲遄歸亦諭清馥定長等於巴里坤一路留心傳㫖并將伊等言語若何作速奏聞癸卯諭甘肅巡撫明德等解送馬匹事宜上諭軍機大臣曰吳達善補授總督用明德為甘肅巡撫自應感激朕恩一切盡心辦理現在軍需孔亟吳達善尚未到任凡糧餉馬駝器械何一不當籌畫昨據官長保等奏報選派達什達瓦兵丁五百名於本月初十日至拜達里克擬由烏里雅蘇台取道徑往烏魯木齊前抵阿克蘇等語現在涼州解送馬匹俱由巴里坤前往官長保即由哈卜塔克拜塔克前赴巴里坤收領馬匹送至阿克蘇此項馬匹曾派副都統富景伊柱解送伊等亦前往巴里坤候官長保到日會同商辦即行起程俱著傳諭知之諭陜甘將軍提鎮等奮勉協辦軍需上諭軍機大臣曰現在進𠞰葉爾羌糧餉馬匹最關緊要前經黃廷桂董率綜理不遺餘力籌畫始有成規今印務交明德接管已傳諭令其實心實力遵循妥辦但各該將軍提督總兵等向因黃廷桂調度諸務就緒倘明德接管或稍有因循推諉及各分畛域不能彼此協力襄事則伊等罪由自取恐難曲貸著通行傳諭伊等俱係大員一切軍需經明德督飭辦理者仍如黃廷桂存日共相奮勉以濟軍務毋以玩誤取咎甲辰諭派出備𠞰緑旗官兵駐吐魯番聽調上諭軍機大臣曰吳達善奏稱現調緑旗兵五千名俟至吐魯番㑹同定長等酌議挑選調撥再照例支給賞銀等語著傳諭定長等此次派出兵丁五千名專備五月進𠞰之用伊等暫駐吐魯番聽候將軍兆惠調撥若派令進𠞰定長等即照例給賞起程或軍前不需調用即令其屯田不必照進𠞰兵丁之例亦傳諭兆惠知之諭三等侍衛達爾黨阿等搜捕藏匿賊黨上諭軍機大臣曰昨命官長保等帶領達什達瓦兵丁五百名至巴里坤同富景伊柱護送馬匹前往阿克蘇可傳諭達爾黨阿哈達哈伊等所領西安滿洲兵二千名亦前往巴里坤㑹同官長保等行走計此時阿克蘇前進之兵已抵葉爾羌㑹合將軍等擒獲賊首但賊衆敗走必分道逃匿而從逆之沙喇斯瑪呼斯等或未能盡𠞰偷越山嶺仍回舊游牧藏匿致侵擾屯田處所亦未可定達爾黨阿等當詢問熟識路徑之厄魯特於幽僻可藏之地俱派兵搜捕遇有賊黨盡行𠞰除俾地方永逺寧謐亦傳諭兆惠知之丙午哈薩克阿布勒瑪木比特阿布賚等所遣使臣俄羅斯蘇爾統等來朝上御正大光明殿俄羅斯蘇爾統等行禮畢命坐賜茶是晚於山髙水長賜觀火戲阿克蘇辦事侍郎永貴等疏奏和闐烏什各城信息永貴等奏言十二月二十日侍衛齊凌扎卜噶布舒納爾布散秩大臣鄂對等報稱自葉爾羌前來賊黨鄂斯璊塞頗爾等領衆六百於十一月二十六日至哈喇哈什額里齊中間屯駐屢次攻城因兩處騎兵共五十餘名不能互相䇿應聞賊有往葉爾羌添兵之信請調發騎兵數百名以壯聲援等語臣等行文烏什之貝子玉素富得馬二十匹副將定柱在阿克蘇得馬四十匹尚不敷用擬於哈密續送軍營馬一千餘匹內酌量扣辦將來黃廷桂續辦馬三千匹至阿克蘇時應請扣留一千匹以備調撥又十二月二十四日阿克蘇伯克博羅特等告稱本月二十日阿克蘇西南之克勒費音被賊掠去四人內一人呼圖魯克得脫識賊人密爾托遜即克勒費音之人從賊往喀什噶爾其母尚居原處擒來詰問據供伊子隨波羅泥都圖取烏什差來探聽等語臣等曉示各城以賊人未知大兵陸續進發妄行生事自可計日𠞰除一面逺設卡倫瞭望并行文玉素富預作准備并將密爾托遜之母即行正法奏入上諭軍機大臣曰永貴等奏稱賊黨鄂斯璊塞頗爾阻截額里齊哈喇哈什要路請派馬兵數百名協𠞰又稱波羅泥都有圖取烏什之信等語烏什距阿克蘇頗近駐兵亦少賊人欲圖攻取之言雖未可全信而安撫回衆防守城池自屬要務內地續送馬匹到日自應酌量扣留派兵發往至和闐前已派兵五百名若尚未起程且先發往烏什或賊人來信係屬虛傳再往和闐防守可也參贊大臣阿里衮疏奏自阿克蘇起程日期阿里衮奏言臣押送馬駝於十二月二十五日至阿克蘇計馬二千匹尚可趲行者一千八百有奇駝七百五十隻可趲行者七百二十隻有奇餘即於阿克蘇牧放備用臣與副都統鄂博什等領兵六百餘名辦給行糧即於二十六日起程奏入報聞丁未敕諭布魯特車里克齊等協擒逃賊事宜皇帝敕諭布魯特車里克齊等近據將軍大臣等奏稱差往爾等遊牧之侍衛布占泰曾見爾策里木伯特及明伊勒哈等知爾等游牧人少且牧放牲隻又值冬寒雪大不能發兵等語朕洞悉情形已降㫖傳諭爾等以極邊藩部慕義歸誠特欲共享安樂且將軍大臣此時應已成功爾等派兵與否無甚關係但逆賊波羅泥都霍集占及附和之回人厄魯特等為大兵攻𠞰有逃入爾等游牧者務將著名首惡查拏縳送即可見感恩效力之忱朕必重加恩賞又近差往右部哈薩克之章京納旺等帶領使臣入覲途遇爾布魯特喀喇巴圖等差往哈薩克之巴爾瑚圖告云厄魯特哈薩克錫喇挈眷屬二十餘人逃入爾布魯特之薩雅克薩喇巴噶什鄂拓克等語哈薩克錫喇係負恩背叛之賊不可寬宥者今逃入爾等游牧似屬實情爾等自應曉示該鄂拓克人等將逃賊夫婦即行拏送其屬人不妨存留爾車里克齊等奉到諭㫖即酌量該鄂拓克距爾等游牧逺近或親往查拏或令其擒送并傳示云若復如前隱匿則將軍大臣等領兵親往搜捕該鄂拓克必致驚擾惟速為擒送軍營將軍等奏聞定邀厚賞再我大兵昨進勦逆回傳聞爾布魯特人等曽搶掠喀什噶爾之英噶薩爾城波羅泥都轉回救應今爾游牧並無發兵之說則此舉又係何人我兵正在攻取賊城此等布魯特發兵搶掠以分賊勢甚屬可嘉朕欲加恩奬勵爾等亦查明具奏此等布魯特皆爾同類伊受朕恩爾等亦與有榮施也爾等其據實繕寫奏章交沿途所遇駐劄大臣即為轉奏特諭又諭軍機大臣曰敕諭布魯特車里克齊等之㫖著傳諭清馥即轉交車里克齊如有回奏即由臺站馳遞若伊等業自巴里坤起程清馥處即由臺站速行馳遞取其回奏轉奏諭三等侍衛達爾黨阿等辦理續送馬匹上諭軍機大臣曰據富景等奏稱涼州送馬二萬三千匹於二月下旬可至巴里坤西安滿洲兵亦於二月初旬可到等語此項兵丁馬匹全抵巴里坤後計三月初旬始行進發及至阿克蘇則前進官兵早已㑹合成功因傳諭兆惠酌量需用與否如不需用即行文知㑹將兵丁撤回其馬匹留巴里坤牧放可傳諭達爾黨阿等若接到將軍撤兵之信所有官兵即用原來車輛馬匹乘載轉回將趕送馬匹交與清馥令其加意牧放備用不可沿途更换乘騎以致疲乏俱著傳諭知之參贊大臣舒赫德等疏奏沿途詢問情形舒赫德等奏言臣等進兵以來十二月十八日至巴爾楚克收回索倫兵丁科濶勒岱阿拉善察罕察哈爾喇什扎卜博爾啓四人據稱隨將軍納穆扎爾等進兵被傷藏匿尋覔大營不得沿途再遇賊人十餘同來六人內兩察哈爾被擒又數次遇見步行之嗎哈沁等語臣等恐係賊人偵探我兵問之總管噶岱默特據稱霍集占等將沿途卡倫撤回此等回人皆從前埋藏糧食遺棄什物者今暫來尋覔耳查兆惠進兵之路水草原屬平常又經踐踏及賊人燒燬臣等沿途詢問嚮𨗳等於二十日渡葉爾羌河二十一日至額爾吉斯距軍營約八九日程期臣愛隆阿曾經行走同噶岱默特為前隊捉生詢問至巴爾楚克係通葉爾羌喀什噶爾總路岐途錯出此外若安設臺站恐被賊搶奪因於相去九十里之亨喇克以五十人設一臺有軍營要事專差馳送不過五六日可至俟富德前來應否再行安設酌量辦理奏入上諭軍機大臣曰舒赫德奏稱路遇隨納穆扎爾進兵之索倫阿拉善等被傷兵丁覔路轉回殊屬可憫著將軍大臣等酌量賞給將來我兵會合若擒獲霍集占等固稱竣事即使渠魁逃遁而回城盡皆收服亦無難追襲惟一時不能就緒必暫回阿克蘇則往返有需時日因思和闐各城去葉爾羌頗近米榖有資且當賊人逃走之路或就近駐劄和闐整頓兵馬再圖大舉似屬長策可傳諭兆惠富德舒赫德等酌量情形㑹議具奏諭阿克蘇辦事侍郎永貴賞給兵丁衣履事宜上諭軍機大臣曰據蔣炳奏稱永貴咨取藍白布各八九千匹及針線等物辦送哈密轉解庫車阿克蘇等處備賞兵丁等語兵丁衣履殘敝官為辦給事理宜然但軍營效力各兵自應一體恩恤若擇其衣履殘敝者始行賞給即非均平之道或有情願支領於鹽菜銀內坐扣還項尚屬可行惟不可令其現交銀兩可傳諭永貴所辦賞項是否向有成例及作何分賞之處聲明具奏敕諭巴里坤辦事布政使清馥酌辦哈薩克使臣馬駝上諭軍機大臣曰據清馥奏稱辦理右部哈薩克使臣起程計䭾載賜物衣裝及護送官兵口糧共需駝九十隻又支給官兵使臣等每人馬二匹共需馬一百三十餘匹等語所辦又屬錯誤哈薩克布魯特人等原有騎來馬駝至巴里坤存留牧養始從臺站更换赴京歸程之時仍應换給伊等乘騎若因其初次入覲酌量添備亦應明白曉示令入伊本境後即為發回何必盡從官辦伊等係極邊藩部惟利是圖若不定以章程則自此來者日多何以供給從前準噶爾來使回巢亦俱送至巴里坤即更换原來牲隻並無官辦之例況此等請安之微末人等乎清馥特聞知伊等到京後朕加恩宴賚即如此辦理殊屬外任習氣可傳諭清馥曉示哈薩克人等以官辦原無成例特因爾等初次入覲酌量辦給嗣後只於巴里坤更换原來騎䭾此項官馬駝至爾等境內時即交護送官兵等帶回仍將如何添辦飭交之處具奏若此時業已辦理起程即著定長照此曉示并飭知護送之侍衛官員庚戌陜甘總督吳達善疏奏自哈密馳回甘肅日期吳達善奏言正月十八日據布政使蔣炳報知大學士伯總督黃廷桂於正月十一日病故伏查現在滿兵陸續出關所調文武各官在甘州涼州等處飼秣馬匹正需挑驗起解且恐沿途供給官兵各員或聞督臣之信稍有懈弛臣隨將哈密事務交五吉辦理即馳回甘肅查辦一切俟新督臣到時仍往哈密辦事奏入得㫖汝此來甚是汝材器聲望實不及黃廷桂但若用新人恐更不如汝熟路也故不得已即用汝為總督汝其勉之但須實心實力效黃廷桂之居心行事或能勝任亦未可知有黃廷桂在實可慰西顧內地之憂一心專辦軍務今將並繫懷甘陜于寤寐也汝知朕一片苦衷感發天良不存顧己之念或不負任用之意然此際所最要者莫如鎮靜若無事不然屬員見汝底裏稍形竭蹶誤事不淺勉之勉之辛亥命喀爾喀親王桑寨多爾濟採買馬駝上諭軍機大臣曰烏里雅蘇臺軍營馬駝近年需用之處雖較前頗少但該處來往各部落人等甚多且軍營坐卡各差仍需馬駝備用著交桑寨多爾濟於喀爾喀庫倫地方採買馬匹駝隻約二三千照依官價給銀由內部撥解二月壬子朔諭定邊左副將軍成衮扎布等酌量留撤北路官兵上諭軍機大臣曰成衮扎布等奏稱北路所有索倫兵六百餘名察哈爾兵九百餘名請交營總舒都勒副都統職銜柏起等照例給豫口糧陸續遣回游牧所留滿洲喀爾喀緑旗兵一千三百名以八百名看守烏里雅蘇台塔米爾倉庫以五百名駐創布延圖等語北路現在無事兵丁在外年久索倫察哈爾兵著照所奏撤回游牧布延圖無庸駐兵五百著留三百看守倉庫其看守烏里雅蘇台塔米爾倉庫之兵丁八百名著留六百各撤二百名即同索倫察哈爾兵遣回原處布延圖兵丁亦係暫駐今嵗回部事竣即行撤回駐劄闢展副都統定長等疏奏移設臺站定長等奏言去年三月內大兵前進自托克三取道伊拉里克博爾圖嶺過哈喇沙爾至庫車安設臺站經兆惠富德等以嶺髙雪大地多戈壁應行移駐咨行又准永貴咨與阿里衮相㑹時據稱由素巴什帶領馬駝尚不甚險且有水草等語臣等即向吐魯番公素賚滿咨取熟識路徑回人同遊擊達色等查勘得由托克三之南素巴什一帶共設臺站五處可通特伯勒固臺站內素巴什庫木什阿哈瑪烏什阿克坦三處尚多水草阿克布拉克一處有駝隻可食之草惟額爾吉齊一處無水因於山中掘得一泉可供臺站人馬之用請將博爾圖嶺阿咱罕布拉克和斯特勒克塔塔爾察罕通曲輝等臺站撤回改駐謹繪圖恭呈御覽再寧古塔兵丁雅呼係前從準噶爾脫出居住安西之人今帶領哈薩克人等貿易事竣或遣往軍營或令其進京應請㫖遵行奏入得㫖臺站自應留心查辦雅呼著送京發回原旗癸丑諭陜甘總督吳達善等辦送軍營馬匹牲隻事宜上諭軍機大臣曰據明德奏稱前任督臣黃廷桂奏明撥解阿克蘇馬一萬六千匹辦給西安滿洲兵及達什達瓦兵丁馬七千匹送馬大臣官兵乘騎三百五十匹俱挑選齊全擬交代總督印務後即馳赴口外嚴加督察又阿拉善郡王羅卜藏多爾濟捐輸羊五千隻送至鎮番縣業經收領等語又據巴爾品等奏稱於鄂爾多斯扎薩克購得牛三千頭羊四萬隻山羊八千隻貝勒齊旺班珠爾等捐輸牛一千餘頭羊五千餘隻請親身送至寧夏等語軍營馬匹牲隻所關緊要現在得馬二萬三千匹牛四千餘頭羊五萬三千餘隻從前黃廷桂辦解軍需悉心籌畫以故屬員奉法毫無貽誤可傳諭吳達善等循照成規加意辦理定長永貴等接辦轉解亦宜一體勤慎郡王羅卜藏多爾濟未奉購辦之㫖即願捐輸羊隻著加恩賞給大緞六端大荷包一對小荷包六個齊旺班珠爾請將採買捐輸牲隻親身解送著加恩賞戴三眼翎仍賞大緞四端伊等捐輸牲隻俱著給與價值至所送牲隻合之運往口糧及屯田收穫榖石已足敷軍營官兵一嵗之用毋庸另行籌辦俱各傳諭知之命賞給哈薩克使人俄羅斯蘇爾統銀二百兩多遂巴圖魯阿克塔木伯爾氐巴圖魯銀各一百五十兩車里克齊等四人銀各一百兩伊氐等十八人及隨僕三人銀各五十兩陜甘總督吳達善疏奏哈密防兵懇請留班吳達善奏言查哈密防兵例係二年一换於四八月交班今據署總兵素昌阿呈報該防兵等因四月班期在邇現在大兵進𠞰及押運屯田需兵甚多伊等未能效力疆場情願告駐一班稍抒報效之忱籲請懇切自應俯順兵情准其留防如䝉俞允請照换防之例支給整裝俸賞以示體恤奏入報聞平定準噶爾方略正編卷六十七
