body:
  text: 乾隆二十五年五月辛酉諭哈密辦事布政使銜永寧查奏辦送囘使章程上諭軍機大臣曰昨據永寧奏拔達克山入覲使人至哈密時将賞賜物件照例給與駝隻其自行購辦者以並無官辦之例曉示代為僱覓馱載前往等語現在辦理囘使雖業已起程但伊等所得賞賜官為辦送若干伊等自置物件數目及僱覓馱載若干俱未分晰奏聞著再行查明具奏此次拔達克山既定有章程將來哈薩克布魯特等處使人囘時俱可循照辦理壬戌恩免索倫等處官兵應賠軍器軍機大臣奏言黑龍江将軍綽爾多奏稱索倫等處官兵五百一十七名所有損壊軍器請照數製給其價值銀兩即於各該官兵應得俸餉内分作三年扣還等語應如所奏辦理奏入上諭曰年來索倫等處官兵在軍營行走甚屬奮勉所有損壊軍器著照數造給不必令其賠補但此次係格外加恩未便援以為例著𫝊諭該将軍等曉示官兵加意愛惜軍器毋得任意損壊丙寅命各處駐劄大臣通查未經議䘏陣亾人等並前次隨從布政使銜德舒官兵一體補行議䘏上諭軍機大臣曰年來有事西陲凡陣亾官兵俱經加恩議䘏但大兵各路進𠞰屢次攻戰其中或有被賊傷害因衆人未經目擊疑為尚留賊地者今新疆平定此等迷失之人既未查獲即係陣亾伊等為國捐軀又復隠没不彰殊堪憫惻著交各該處駐劄大臣通行查核若有前經陣亾未行具報或止報未曽脫出者具令詳查具奏候朕酌量加恩又諭曰從前德舒領兵捜捕嗎哈沁被賊傷害已加恩將德舒照陣亾例議䘏其隨行各官兵有受傷及身死者著交部一體照例議䘏議定核減北路臺站馬駝事宜軍機大臣奏言臣等遵㫖核減北路軍臺馬駝查張家口外自第一臺至第十臺額馬各三十五匹第十一臺至第二十五臺額馬各二十五匹其間遇有戈壁臺站額駝各二十五隻今北路事既不繁臣等酌照舊例將額馬三十五匹者減為二十五匹額馬二十五匹者減為二十匹駝隻亦照數裁減其由烏里雅蘇台至喀喇沁之喀爾喀臺站二十處每臺額馬五十匹駝二十隻亦屬過多請於每臺各留馬二十五匹駝十隻餘俱一例裁減所有裁減各馬駝俱令歸入牧羣交與成衮扎布永興等辦理奏入上從之議定南路馳遞事件分别緩急辦理軍機大臣奏言陜甘總督楊應琚請將南路軍臺馳遞事件酌分緩急以惜馬力一摺奉㫖交臣等速議具奏查現在軍務告竣馳遞事件較前減少其中遇有𦂳要之件仍須星速馳遞該督所請分别𦂳急事件仍用六百里𫝊牌其可以稍緩者俱用四百里𫝊牌之處原為愛惜馬力起見應照所請行至應填六百里四百里之外俱係尋常事件無庸一時馳遞應令稍需數日先後彚齊馳遞或此處有應遞事件適值他處報封經過亦即隨便附奏於𫝊牌内聲明更為簡便臣等仍不時留心察看儻各處辦事大臣有尋常四百里馳遞之件及應入尋常彚齊奏報者違例遽用六百里馳遞即行奏請議處則各該處不敢輕動臺馬而口外一切應付亦不致周章奏入上從之辦理總督事務甘肅巡撫呉達善疏奏解送巴里坤牧放馬匹全數出闗呉達善奏言督臣楊應琚奏請於安西甘肅等處提鎮標營撥馬三千匹解赴巴里坤牧放備用臣承准廷議陸續動撥所有安西提標馬四百匹肅州鎮標馬六百匹西寧鎮標馬六百匹甘州提標馬七百匹涼州鎮標馬七百匹總計三千匹又於莊浪滿營撥馬三百匹作為餘馬俱於五月十四日以前出闗至橋灣中路合羣於草地隨牧隨行令副將達啟叅將書隆阿督同各解貟沿途照料交辦事道貟同德查收牧放備用奏入報聞己巳諭叅贊大臣舒赫德核定囘部各城官制職掌事宜上諭軍機大臣曰前因漠咱帊爾來京曽經詢問葉爾羌喀什噶爾等處所有阿竒木伊沙噶伯克名目及各該貟所管事務今質之霍集斯其所奏與漠咱帊爾核對多屬不符此葢伊等各就所記憶為言原無足怪今將録出名單交與舒赫德著將現在官名職掌逐一查詢核對如有遺漏錯悞者即行改正具奏庚午哈薩克阿布勒瑪木比特使人瑚圗拜阿塔賚阿布賚使人額勒斯瑚勒阿布勒比斯使人伯克奈布魯特哈木巴巴使人玉森等至京上幸同樂園召見使人等行禮畢親加慰問奏對訖賜茶果筵宴賜哈薩克阿布勒瑪木比特阿布賚等勅書奉天承運皇帝勅諭哈薩克阿布勒瑪木比特阿布賚阿布勒比斯哈木巴巴等爾等遣請朕安之瑚圗拜阿塔賚等由駐劄烏魯木齊大臣護送來京朕召見奏對後加恩宴賚賜爾等蟒錦緞疋紬綾器物若干其各祗受又賜來使等頂翎冠服朝珠銀緞器物各有差仍俾護歸㳺牧據爾等使人奏稱厄魯特之地現俱閒曠今阿布勒比斯屬人唐古塔爾現在巴爾魯克納喇巴圗在特穆爾綽爾郭哈爾克勒部落屬人額森克勒德卓羅木巴特在塔爾巴噶台圗魯木拜屬人扎喇勒噶布在阿勒坦額黙勒哈喇塔拉庫克烏蘇居住又懇朕加恩將來准哈薩克人等至伊犁游牧等語塔爾巴噶台等處向屬準噶爾㳺牧朕以大兵平定爾哈薩克及布魯特塔什罕安集延拔達克山俱輸誠内附爾哈薩克游牧頗屬寛廣理宜守其舊界不可妄思踰越爾等若謂為朕臣僕便可越境游牧則布魯特等亦皆朕臣僕各以㳺牧為請豈有大兵平定之地而分給衆人之理現在伊犂等處内地官兵陸續移往屯駐故爾阿布賚前曽懇請於塔爾巴噶台等處㳺牧朕未允行今豈得遽行専擅且從前準噶爾恃強争奪爾等尚不敢近其邉界朕平定伊犂始得各安生業尚可不知足耶至伊犂將軍大臣等於此等邉地不時遣兵巡察若見爾等屬人棲止或行驅逐或竟行俘獲則反致失其生業非朕撫恤爾等之初心也爾等内附有年諸凡恭順或爾所屬無知之人私往㳺牧即當明白曉諭令其移回故地方足以昭誠悃又來使等所奏布魯特等搶掠爾部情節其意葢欲請兵報復朕為天下共主外藩諸部一視同仁儻不遵法紀致干罪戾者必遣兵往討若彼此小有争鬭盜竊自當凖情酌理務得其平豈可偏聽一面之詞遽興師旅昨拔達克山素勒坦沙曽擒斬逆囘自効因請兵往𠞰隣部朕未嘗允行爾等應亦聞知且朕若發兵助爾等而布魯特復來請兵亦將與之否乎夫盜竊之事邉界時有能彼此教戒屬人勿貪小利而傷和好斯為安生之善䇿耳將來布魯特有使至朕亦以此諭之再從前爾等部落貿易之人有謂内地商人貨物不佳價復昂貴未行交易者夫烏魯木齊貿易之舉特念爾部難得内地之物故招募商販逺行交易期有益爾等日用耳或商貨不能精好全備諭令善為購辦尚屬可行若價值則在交易之人因物計算貴賤隨時未便官為減損其或彼此不願亦難以相强也至去年爾部巴魯克巴圗魯等搶掠烏梁海爾霍集伯爾根之姪托科洛被獲詢係隨母往探親戚非同來搶掠之人因令使人等領囘即交與伊叔仍以格外加恩之意曉示至巴魯克巴圗魯罪應致討北路將軍大臣即欲發兵朕以爾等恭順有年不欲以一人而驚擾全部因遣侍衛納旺齎勅往諭爾等應使巴魯克巴圗魯服罪將從前掠獲逐一查還尚可曲為矜宥此時自必遵㫖辦理俾納旺復命矣爾等果能懐仁向化惟約束所部各守疆域以安生理庶可仰承朕恩常享無窮之福特諭辛未諭叅贊大臣阿桂等領兵巡察邉界上諭軍機大臣曰哈薩克使人瑚圗拜阿塔賚等奏稱厄魯特之地現俱閒曠我哈薩克人等有在塔爾巴噶台庫克烏蘇綽爾渾巴爾魯克阿勒坦額黙勒等處駐牧者我等皆天朝臣僕懇恩准至伊犂游牧等語從前阿布賚請於塔爾巴噶台等處㳺牧曽經降㫖曉諭今據來使所奏則伊等已漸次䦨入自當驅逐現在頒給勅諭不允所請著𫝊諭阿桂等暫停捜捕嗎哈沁以巡察邉界為由領兵四五百名前往塔爾巴噶台等處遇有哈薩克人等在彼駐牧者即明切曉示云此天朝平定之地爾頭目等從前奏請㳺牧大皇帝並未允行何得擅行棲止因念爾等俱經歸附姑寛治罪可即速遵諭遷徙伊等如果及時移出則已或有意推諉遲延即應懾以軍威但不得遽行縱兵俘𫉬阿桂一切可相機妥恊辦理此行兵數不宜太少儻不敷用即合之安泰所領兵又得四五百名可以號稱二千其如何與安泰寄信㑹兵并約計休息馬匹二十日一同起程之處俱著酌議奏聞命議處遺失兵丁之西安領隊大貟及該管營總等上諭軍機大臣曰據嵩阿禮奏稱由阿克蘇烏什撤囘之西安駐防兵一千名内兵丁塔青阿行次哈喇沙爾未囘貴柱張俊復以患病逗留鹽池請将營總特克慎黒翰等交部分别嚴加議處等語特克慎等係領兵行走之貟漫無稽查約束以致遺失兵丁又不報明駐劄大臣官貟查緝私行尋覓無獲俱著交部嚴加議處至駐防兵丁撤囘應有領隊大貟嵩阿禮何以不行叅處著明白囘奏仍逐一查取職名續叅交部議處再塔青阿等隨同大隊行走何至迷失或係乗間潛逃亦未可定著交哈喇沙爾巴里坤駐劄大臣及甘肅巡撫嚴行查拏兵丁善福係貴柱之壻跟役張顯係張俊之弟委令照管乃於半途先返殊屬藐法著拏送來京交部審明治罪壬申命叅贊大臣舒赫德多派囘人修鑿穆素爾嶺道路上諭軍機大臣曰舒赫德奏由穆素爾嶺行走四十餘里地多氷石相雜内有二里全係氷山滑不可行每日派囘人十名鏨鑿磴道等語穆素爾嶺係往來要路既係氷堅難鑿十人之力恐不敷用舒赫德應多派囘人前往専責以修治道塗冰雪之役行走人多地氣漸就和暖則凝沍自易消融將此𫝊諭舒赫德知之命撥臺站裁撤兵丁屯田並賞給管臺囘人鹽菜銀兩上諭軍機大臣曰舒赫德奏臺站所有緑旗兵丁毎臺酌留五名其餘遣囘本營至管臺六品頂帶囘人従前未支養贍請照千總例給與鹽菜銀兩等語近因定長請撤緑旗兵丁經軍機大臣議入於闢展屯田兵内不必遣回仍著遵照辦理其臺站効力囘人照千總例賞給鹽菜銀兩著照所請行諭駐劄烏魯木齊副都統永瑞等查較解駝倒斃分數咨部分别核議上諭軍機大臣曰永瑞奏稱巴里坤解駝四百八十六隻沿途倒斃十六隻哈密解駝五百隻倒斃四十三隻等語兩處所解駝隻為數大略相等而倒斃多寡懸殊則沿途官兵其留心照管與否較然易見自應分别查核將倒斃少者議叙多者議處庶将來解送馬駝官兵皆知所懲勸可𫝊諭永瑞等即行詳查咨部辦理六月癸酉叅贊大臣阿里衮疏奏查辦舊和卓木墳墓事宜阿里衮奏言臣奉到恩㫖令派人修理看守回部舊和卓木墳墓隨宣示各回人無不感激頂禮臣委提督董孟公木薩等查辦據報稱囘部喀什噶爾舊和卓木墳墓原有三十帕特瑪地畆錢糧看守囘人十二户仍照舊管理以供祭祀修葺餘為伊等養贍之資奏入報聞總兵定柱容保等䕶送霍集斯子漠咱帊爾呼岱巴爾氐至京命隨伊父同居乙亥命豁免甘省應徵耗羨上諭大學士曰甘省乾隆二十三四兩年耗羨業經降㫖緩徵其二十五六兩年應徵耗羨該撫呉達善奏請帶徴朕念隨征耗羨遇蠲免正供例不應停緩但甘肅自辦理軍務以來小民急公趨事誠樸可嘉業已疊次加恩凡屬緩徵帶徵及一切正雜錢糧無不破格豁除以示撫綏今軍需告竣幸遇暘雨應時秋收可望正宜益加恵養俾䝉樂利著将該省二十五六兩年應徵耗羨概行豁免用彰優䘏編氓格外加恩之至意該部遵諭速行丙子命議叙叅贊大臣阿桂所領捜𠞰嗎哈沁官兵並諭奨賞管理屯田囘人伯克各事宜上諭軍機大臣曰阿桂奏稱領兵捜捕嗎哈沁至阿圭雅斯等處據侍衛喬蘇勒等於呼爾岱見有賊蹤收獲男婦二十六名口又至都木丹濟爾哈朗侍衛碩通等捜𠞰樹林賊衆收獲馬匹旋有藏匿賊匪前來争奪奬賞藍翎鐵柱等沿途共殺賊三十餘名得馬三百五十餘匹察哈爾署叅領䇿凌旺布及兵丁三名陣亾又得傷兵丁四名等語此次捜捕嗎哈沁官兵甚屬奮勉侍衛碩通前曽賜卓里克圗巴圗魯號著再賞銀一百兩喬蘇勒著賜錫勒哈達克巴圗魯號仍賞銀一百兩健銳營奬賞孔雀翎䕶軍校達什欣巴圗魯沙爾瑚善著授為三等侍衛侍衛上行走奬賞藍翎前鋒䕶軍鐵柱著授為藍翎侍衛仍賞給孔雀翎索倫署叅領驍騎校烏爾庫勒圗察哈爾䕶軍署章京扎卜俱賞給孔雀翎健銳營前鋒護軍諾海察哈爾䕶軍䇿凌多爾濟索倫署領催瑪塔木保三世保厄魯特兵丁和通俱著奬賞藍翎陣亾得傷官兵俱著造冊送部議叙議䘏再烏什之噶雜納齊伯克黙特阿克蘇之都管伯克題尼阿琿阿卜都噶普爾照看囘人屯田著加恩賞給阿卜都噶普爾緞二端伯克黙特孔雀翎都管題尼藍翎至阿桂等既經捉生詢問仍領兵與安泰同往阿勒坦特卜什阿呼喇哈爾海捜捕搶掠布魯特馬匹賊人及在庫車搶掠臺站戕害德舒之賊人塞卜騰霍濟格爾等著給發孔雀翎五枝藍翎十枝以備奬賞仍暫停捜捕嗎哈沁即巡查塔爾巴噶台驅逐哈薩克人等又據奏此行未設臺站俟事竣奏報等語未免聞信遲緩可𫝊諭舒赫德著豐納亨選派幹貟領兵二三十名前往阿桂處通信所有辦理情形阿桂即令齎囘奏聞御前侍衛署副都統安泰疏奏與㕘贊大臣阿桂同抵伊犂安泰奏言臣於三月十六日由烏魯木齊起程四月十五日至伊犂河水漲盛聞從前将軍大臣等來伊犂時曽将所造船隻埋藏臣派貟覓得五隻二十日渡河至海努克聞哈什有賊人蹤跡隨領兵往捜二十六日至哈什河見叅贊大臣阿桂云賊人已經𠞰殺於五月初五日已同至固勒扎奏入報聞丁丑諭叅贊大臣舒赫德查核新疆租賦所入酌定屯駐官兵經費上諭軍機大臣曰伊犂葉爾羌喀什噶爾阿克蘇庫車等處駐兵應即計其地之所入以定章程不可致煩内地民力今各該處約有滿洲緑旗官兵若干屯田收穫及囘人等一年所納貢賦若干足敷官兵俸餉與否可𫝊諭舒赫德查核具奏今年屯田收穫囘人貢賦未免不齊官兵等自不敷用來年經理就緒公私租稅全行輸納則經費即可從此核定并著預為酌議奏聞諭陜甘總督楊應琚等核計用兵後減省經費分數上諭軍機大臣曰伊犂等處屯田收穫糧石及囘人所納税糧約計足供屯駐官兵若干人之用現諭舒赫德令其詳查具奏至甘省經費有較從前未用兵時不惟不加多且更為減省者即如從前黄廷桂以緑旗兵借支銀兩動至數十萬一時難於扣還因奏請以兵丁缺額名糧抵補行之數年昨嵗據楊應琚奏稱業有成效將來扣清後兵丁缺額自不必再補是此項名糧較未用兵前已多減省且甘省各營缺額馬匹若由内地購補收槽飼秣其費自多今各營額馬除足敷應用外既可不必汲汲購補而屯田所用馬匹現又取給於哈薩克其價值較之甘省購辦已屬懸殊兼就水草牧放更非内地飼秣需用芻豆可比則馬匹一項較前更大有減省合此數者前後通計則軍興數年所費雖繁而将來該省經費日就減省是疆土既經増拓而財用仍可不致虚糜著𫝊諭楊應琚呉達善令其將此數項減省之處通行核計所用銀兩較未用兵以前約餘若干或現在辦理伊始所省尚少将來行之既久自必漸次増多此時亦可預行核計詳悉具奏戊寅㕘贊大臣阿桂解送伯克霍集斯前遣通信伊兄阿卜都瓜卜反告知逆賊霍集占之額敏都管霍什提卜至京命分别發遣廣東福建賞給駐防官兵辛巳諭㕘贊大臣舒赫德等酌量移駐辦事大臣及安插厄魯特兵丁事宜上諭軍機大臣曰從前用兵囘部自哈密巴里坤以外如闢展哈喇沙爾等處俱駐劄辦事大臣官兵等今軍務告竣自當酌量移駐闢展水草與屯田種植俱屬平常現在烏魯木齊與哈薩克貿易彼處係通伊犂大道若調闢展辦事之副都統定長往烏魯木齊同安泰承辦屯牧貿易等事應有裨益若闢展則不過與衝繁臺站相等酌派官兵管理足矣至哈喇沙爾地亦狹小不必駐劄辦事大臣惟近有安插之多倫囘人亦需照管應於書山和其衷二人内酌派一人駐劄一人前往阿克蘇協同舒赫德辦事則烏魯木齊伊犂阿克蘇三處勢如犄角而哈密巴里坤已成内地布置聮絡聲息相通著𫝊諭舒赫德等詳悉籌議具奏再呉達善奏稱甘省留養之厄魯特共一百七十餘名請送往熱河安插等語殊不知此等厄魯特與達什達瓦之人不同若分派烏魯木齊阿克蘇葉爾羌伊犂等處安插令其牧放馬匹尚可得力已諭吳達善仍行養贍舒赫德亦酌量如何分派各城安插一面定議具奏即行文甘肅調取至差遣厄魯特等或有厭惡任情諸事刻薄不加體䘏者或有慮其逃走優柔籠絡致令驕縱者皆未合理惟在誠心教導賞罰嚴明不為姑息亦不事操切伊等亦人耳自必共知勸懲奮勉行走併著加意辦理諭巴里坤辦事侍郎五吉等設厰牧馬事宜上諭軍機大臣曰據五吉等奏將定長送馬一百二十餘匹交齊大勇等牧放俟秋季烏魯木齊送馬數多再請㫖設立牧厰等語從前定長奏送此項馬匹時經軍機大臣議以馬匹甚少暫歸巴里坤舊有馬厰内牧養俟秋季馬多另議添設今烏魯木齊既移駐大貟則秋季所得哈薩克馬匹亦不必送至巴里坤即於本處酌量設厰斯時有安泰帶囘之索倫察哈爾兵令其用心牧養此項已送巴里坤馬匹即於臺站預備應用併𫝊諭永瑞等知之㕘贊大臣阿里衮解送隨從霍集占往拔達克山復逃至葉爾羌之囘人和濟斯和占至京命發往廣東賞給駐防官兵癸未諭巴里坤辦事侍郎五吉辦送阿克蘇駝隻騾頭各事宜上諭軍機大臣曰舒赫德奏從前撤囘官兵所交駝四百隻騾三十頭由哈密送往巴里坤牧養已經半載有餘若挑選臕壯駝三百隻併騾頭於七月内緩程送至阿克蘇即将茶葉烟草等零星物件約四五十觔一馱順帶前來尤為省便等語伊犂屯田陸續遣發自應預備馱載著交五吉等即照舒赫德所奏挑選駝隻并帶騾頭酌量從輕馱載五吉近日送馬方囘沿途水草皆所熟悉著即自行解往併諭舒赫德知之㕘贊大臣舒赫德疏奏暫派副都統伊勒圗往駐海努克事宜舒赫德奏言五月十四日准副都統豐訥亨咨五月初八日送馬至海努克本日即領兵一百名趲赴阿桂處留知府銜富尼漢同翼領立柱照管海努克兵丁囘人等語臣以屯田伊始兵丁囘人必須大貟統束阿桂豐訥亨伊柱俱往搜嗎哈沁歸期未定查阿克蘇有副都統伊勒圗即令領兵五十名前往海努克暫行駐劄俟豐訥亨等與阿桂㑹商定議何人囘駐伊勒圗再囘阿克蘇若路遇阿桂咨文即行開看如已有人轉囘即無庸前往奏入報聞甲申諭定邉左副將軍成衮扎布等查辦卡倫侍衛事宜上諭軍機大臣曰成衮扎布奏駐守卡倫之䕶軍校竈君保近病瘋狂因醫治不痊束縛看守給與兵丁口糧養贍等語所辦非是凡特㫖差往或有罪遣發及身臨戰陣忽稱患病者自當查核虚實不可遽令遣囘竈君保不過以侍衛銜駐守卡倫患病若實自可辦送來京何必留於軍營看守竈君保著即派貟送京現在軍務告竣北路卡倫已成内地亦不必每處駐一侍衛所有應行裁撤貟數及将各貟應得分例移撥伊犂等處應用事宜著軍機大臣等查明議奏乙酉命以查出囘人霍什克伯克産業留養本處家屬上諭軍機大臣曰海明奏遵㫖查出霍什克伯克所有和闐哈喇哈什葉爾羌沙古則里之房地人口行文舒赫德辦理等語従前霍集斯安插京城已諭将産業變價給伊幼子托克托索丕為業今霍什克伯克産業亦著照例辦理存留和闐為伊養贍老妻幼孫之用議減撤北路卡倫侍衛事宜軍機大臣奏言臣等查北路自奈滿明安起至津濟里克三十三卡倫每卡倫侍衛一貟又查看水草侍衛共十二貟計四十五貟今軍務告竣遵㫖酌議裁減每卡倫二處用侍衛一貟末三卡倫用侍衛一貟共留十六貟查看水草侍衛酌裁六貟仍留六貟交與成衮扎布等将北路年滿應換之布三泰等十九人再擇其次年深者四人陸續遣回所餘二十二貟存留應用年滿屆期照例派貟更換此次現議裁撤之侍衛等共計二十三貟照此缺數請令領侍衛内大臣揀選人貟帶領引見遣往伊犂阿克蘇葉爾羌等處以備差遣奏入上從之丁亥命現駐軍營未預凱宴之散秩大臣齊凌扎卜提督閆相師總兵五福照領隊大臣例賞緞十二端銀五百兩提督董孟總兵官揚寧丑達容保定柱副都統觀音保副都統銜阿定保照例減半賞給喀爾喀公朗衮扎卜厄魯特散秩大臣鄂齊爾照凱宴時公衮楚克例賞緞五端銀二百五十兩平定準噶爾方略續編卷三
