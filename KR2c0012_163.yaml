  text: 欽定四庫全書平定準噶爾方略續編卷二十四
  hash: sha256:e17bde3cf37f4d7abe6f211c56b0f5011f7bc93facc73e174a3b556259e9f2e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_163-1a, image: WYG0359/WYG0359-0829c.png}
body:
  text: 乾隆二十九年正月甲寅上御紫光閣賜博洛爾沙瑚沙黙特來使呼達瑪瑪特等宴己未葉爾羌辦事副都統額爾景額等疏奏葉爾羌等城折布餘糧改徵本色事宜額爾景額等奏言臣等准伊犂將軍咨稱伊犂所需棉花無多每年止須辦送數千觔其餘盡送布疋等因查葉爾羌和闐餘糧折布每年應送四萬疋庫内新錢所買又應有十萬疋現在乾隆二十九年應送布十萬疋尚有三萬疋未經運送此項貯庫布疋不無朽壞而葉爾羌和闐回人所納糧石僅敷官兵一年之用如遇歉收恐有不繼請將二城餘糧折收棉花除辦送伊犂三千觔外其餘仍令交納本色貯倉俟將來伊犂需用棉花之時再行停止交糧折收棉花送往奏入得㫖如所請行乙丑諭各城駐劄大臣等飭禁兵丁毋得收留掠獲婦女上諭軍機大臣曰額爾景額奏稱海明遵㫖嚴訊索倫披甲額伊勒木保葉爾羌有無繫戀之人今查出委署章京星噶勒圖等所留掠獲厄魯特回人婦女塞卜騰等據供額伊勒木保在阿勒楚爾等處掠獲回婦庫圖什擕至葉爾羌生一子因撤兵時不肯從行遂擕庫圖什逃往阿克蘇已將塞卜騰等四人解送質對等語前鍾音海明等奏稱額伊勒木保因毆伊族叔畏罪脱逃朕即謂情節未確今果不出所料額伊勒木保仍照前擬絞監候秋審入於情實所掠回婦庫圖什與查出之塞卜騰等俱著解送伊犂賞厄魯特為妻從前進兵時因準噶爾素習暴橫無恥故於兵丁掠獲婦女未經深究今全部平定各處駐兵豈可仍蹈前轍著傳諭各城大臣嚴飭所屬兵丁嗣後遇此等情事一經察出即重治其罪額爾景額接准卞塔海咨文即交舒泰等查究舒泰等亦能即行查出俱屬可嘉著加恩奬賞以示鼔勵丙寅伊犂將軍明瑞等疏奏酌辦移駐回人事宜明瑞等奏言准卞塔海等咨稱現在移駐伊犂種地回人一千五百户陸續起程每百户為一隊隔兩日令一隊起程派侍衞伊柱駐塔木噶塔什照看過穆素爾嶺侍衞富昌鼐納布率領伯克等於噶克察哈爾海按隊查㸃俟回人全行過嶺令伊柱會合富昌前後分管知會到臣臣查乾隆二十六年伊犂甫經開墾阿桂恐遣往回人或有脱逃因令豐訥亨帶兵防範今仰荷天恩伊犂已成樂土回人聞風欣悦此次移駐回人由阿克蘇派出各員已足敷用不必再由伊犂派兵往迎臣等酌量每隊派熟悉水草兵丁二名赴噶克察哈爾海帶領行走並照管渡河俟各城回衆全到時臣等按其地利編設屯庄量給籽種牲隻續行具奏奏入報聞辛未飭諭伊犂將軍明瑞等移駐伊犂之涼州莊浪兵丁錢糧毋庸拘泥内地成例并量給地畝學習耕種事宜上諭軍機大臣曰明瑞等奏請將移駐伊犂凉州莊浪兵丁辦給鹽菜銀兩外應給之糧仍照内地一半給與本色一半折價又兵丁馬匹夏秋牧放冬春牧放四分官員馬匹四季牧放四分其餘概令拴養所需米麫豌豆照巴里坤烏魯木齊之價酌中折給仍於每石添給零數以符内地倉石經軍機大臣等議准但明瑞此奏於朕移駐兵丁本意全未知悉滿洲八旗從來敦尚本業以技勇爲務原無奢侈靡費之事近來各處駐防漸染漢人習氣是以令其逺移俾習於勞苦庻還淳樸之舊既已遷移則應給之項亦應照所駐地方酌辦乃拘於内地成例纎悉計算而糧價不敷又欲増添折給實覺過優朕意伊犂地甚肥饒如田畝有餘仍酌量分給滿洲兵丁令其學習耕種更為有益著俟兵丁到齊後定議具奏現在所議糧價著照烏魯木齊價折給伊等果得地耕種一二年後所給銀米俱應停其給放餘俱如所議行壬申命尚書舒赫德挑選熱河另記檔案兵丁移駐伊犂上諭軍機大臣曰據額爾登額奏現在遵㫖於熱河等處挑選滿洲蒙古兵一千名移駐伊犂查此項兵丁除另記檔案外共有一千三百名若於此内挑出千名所餘俱非出色之兵再從京師派來補缺兵丁於隨圍事宜亦未熟練每年巡幸之時外藩部落咸來瞻仰殊有關係似未可以此項兵丁頂備差使查另記檔案兵丁六百零四名在旗年久諸事熟習請於此内一體揀選派往經軍機大臣議此項另記檔案兵丁係已經出旗之人毋庸揀選但派往伊犂俾伊等世世受恩自當踴躍從事請降㫖額爾登額詳議酌辦其管領之協領佐領驍騎校等官悉照涼州莊浪移駐兵丁之例派往此項兵丁四月間始能起程計到烏魯木齊時天氣已寒查涼州莊浪頭起兵丁於春季起程遺有房屋可以居住請令熱河兵丁到彼暫行歇息俟明年起程仍行知嵩椿將由西安往駐涼州莊浪兵丁暫行停止等語此項另記檔案兵丁久應出旗為民朕憐其生計艱難加恩仍令食糧俟出缺後裁汰今如所議於伊等生計頗有裨益但其中不願派往者未必無人著舒赫德新柱前往熱河詳悉詢問願往者即行派出其或不願逺行即令出旗為民不必勉強乙亥議派移駐塔爾巴噶台兵丁事宜軍機大臣奏言據盛京將軍社圖肯等奏稱遵㫖於盛京錫伯兵内挑選一千名挈眷移駐塔爾巴噶台應照索倫兵丁之例選派佐領十員驍騎校十員約束管理但原管錫伯兵丁向止二員且已年老請另選防禦十員驍騎校十員帶領兵丁出章古台由臺站前往仍請交理藩院照例派筆帖式二員領催二名送至烏里雅蘇台至官員兵丁應領俸餉約須銀十萬兩就近於盛京户部支領再臨期每起另添派協領城守尉一員章京四員前鋒一百名照看約束送至邊門等語臣等酌議從前索倫察哈爾兵移駐伊犂派有總管協領大員直送至該處今社圖肯所奏選派官員送至邊門並未計及長途䕶送之人應令派城守尉協領各一員送至伊犂其章京四員前鋒一百名不必派出再所奏官員兵丁俸禄銀兩俱與原議相符應准其照例辦理奏入上從之己卯命陜甘總督移駐蘭州并酌改營制事宜上諭軍機大臣曰今日召見常鈞詢及陜甘二省情形據奏督臣逺駐肅州距西安甚逺凡遇考驗官弁諸務往返動逾兩月且其所屬有司有經年不能識面者揆之控制事宜均多未便其言甚切事理朕意陜甘總督駐劄肅州原因前此辦理軍需不得不就近調遣今大功久已告成而巴里坤烏魯木齊等處屯田章程亦經大定現在更無要事必須在肅督理若準其道里適均之地將總督移駐蘭州撫署則東至省城西至甘肅程途約略相等一切官方吏治皆可居中統攝無庸更設巡撫規制實為允協其安西緣邊屯政即有應行勘驗者每隔一二年出巡一次自不患鞭長莫及至督標所轄五營向駐西安自當畫一改正或將固原提督移駐西安即將督標舊轄改為提標將涼州總兵移駐固原管轄其涼州鎭標則撥督標中軍副將一員統率并蘭州撫標一體改為督標管轄似此調劑則一舉數善皆備再西安省城近居腹地況有滿洲官兵駐防其督標議改提標弁兵或可酌量裁減以歸實用並著傳諭楊應琚令其通盤籌畫詳議覆奏候朕降㫖尋議蘭州舊撫署改爲督署無庸更設巡撫原設撫標改為督標西安督標改為提標即令固原提標移駐再將河州鎭總兵改為固原總兵奏入上從之二月癸未朔諭酌派管領熱河移駐伊犂兵丁大員及辦裝各事宜尚書舒赫德奏言現在派出移駐伊犂之厄魯特官兵起程前往交臣等詳議具奏㐲查軍機大臣議厄魯特兵前往伊犂由邊外行走一切應得之項俱照從前遣往之察哈爾兵例一體給與銀兩口糧惟是從前帶領察哈爾兵之官員等送到即回是以僅照索倫官員例給與一年俸禄按照品級給與馬匹及鹽菜銀兩不給駝隻今此次挈眷移駐情形又復不同似應給與駝隻但與伊犂水草不甚相宜臣等酌議改給牛一隻馬一匹於孳生牧羣挑用外尚少牛四百餘隻馬二千匹應交察哈爾都統巴爾品於牧羣内酌量添補並派響導帶領行走至熱河滿洲官兵亦照軍機大臣原議與涼州莊浪之滿洲官兵一體給與俸餉銀兩查涼州莊浪官兵每步兵二人合給車一輛家口每三名亦給車一輛每戸又給裝載什物車一輛臣等酌議此次官員等每家口四人給車一輛每戸給裝載什物車一輛兵丁等每户給車一輛兩户合給裝載什物車一輛已足敷用再官員等現應支給之項業經辦給其兵丁應給銀兩酌留三分之一與給賞跟役之銀現在俱不必給發俟明年由伊犂前往雅爾令將軍等照數給與庶免中途花費以上厄魯特官兵及熱河滿洲官兵現在應給之項約計五萬餘兩請於熱河道庫動支給發俾伊等料理於三四月間起程奏入得㫖移駐伊犂兵丁雖有厄魯特總管等官帶領沿途無一大員不能統束著派䕶軍統領烏爾登送往伊犂交代後仍著回京其在京往伊犂之厄魯特等即交烏爾登帶至熱河再厄魯特官兵應得馬二千餘匹牛四百餘隻及預備添補馬牛若自巴爾品處送至熱河未免長途疲乏應令緩行迎至伊等所經路口等候俟厄魯特官兵到時撥給再派出之厄魯特官兵所欠孳生官店價銀四百餘兩著加恩豁免餘依議庚寅命定熱河移駐伊犂官兵俸餉各數上諭軍機大臣曰現在伊犂官員皆給半俸兵丁每月支錢糧一兩熱河官員向例按其職衘減一等給與半俸今令伊等移駐伊犂應與現在伊犂者一例著加恩准支半俸不必減等至兵丁在熱河時支錢糧一兩五錢此時甫經移駐未免生計尚艱著仍照原數并給以孳生牲隻俟將來缺出挑補之人方照察哈爾厄魯特兵丁例月支錢糧一兩烏爾登到彼時即明白曉諭仍交明瑞等遵照辦理甲午諭伊犂將軍明瑞等預備兵丁營房上諭軍機大臣曰前據明瑞等將雅爾地方修城駐兵事宜具奏經軍機大臣議揀發熱河滿洲兵達什達瓦部之厄魯特兵盛京錫伯兵約計二千五六百名現在各令挈眷陸續起程朕意除厄魯特兵習慣游牧不妨暫住帳房至滿洲錫伯兵共有二千伊犂雅爾地方未必有如許房屋可以存住理應預先備造再雅爾駐兵若派現在伊犂兵丁則此挈眷移駐之兵即可住伊犂兵丁空閒房屋若即派此次挈眷移駐兵丁則雅爾亦須預造房屋以備兵丁到時居住前雖議奏准行若不明白指示明瑞或未能籌及著傳諭明瑞酌量定擬具奏乙未命副都統觀音保更換㕘贊大臣愛隆阿來京上諭軍機大臣曰愛隆阿伍岱久在軍前此次遣往伊犂又將二載應派員更替伍岱精力尚壯著再留一年昨遣觀音保前往伊犂著即留該處更換愛隆阿來京壬寅以誤辦節省車價彌補兵丁欠項訓飭陜甘總督楊應琚仍令酌量緩扣上諭軍機大臣曰據楊應琚覆奏涼州莊浪兵丁欠項請以節省車價彌補一摺所奏殊乖事理車價既係官辦自當核實動用所用既已實銷所餘即應實貯安得名為節省譬如辦理工程估報之初數必浮多及至奏銷自必核實為準豈可按照所估之數遽謂此非官項朕於兵丁加恩優䘏即如熱河移駐兵丁所有未完之項現俱豁免豈於該處獨為吝惜但伊等身為滿兵飼牧馬駝不知謹愼致倒斃之數較緑營更甚若一概免賠誰復知所懲創況伊等往駐伊犂錢糧已屬寛裕自可從容完項姑念遷移之始力量未足不妨展限扣除以示體恤著傳諭楊應琚現在整裝啟行祇宜照常支給將此交與伊犂將軍酌量二三年後伊等可以坐扣時奏明請㫖分年扣補已有㫖諭明瑞矣己酉陜甘總督楊應琚疏奏運往新疆茶封作價情形楊應琚奏言臣於上年十二月内奏覆伊犂茶封如數運往其茶價於該處官兵鹽菜銀兩内扣抵一摺於本年正月十六日奉到硃批此係有益官兵之舉但官項雖多節省而陳茶變價較此為何如所奏尚未明晰也臣伏查向來甘省商人交納官茶如遇庫内存積過多即請收徵折色每封收折價銀三錢若庫貯無幾仍請徵收本色自乾隆七年議定徵收本色至二十四年即積至一百五十餘萬封陳陳相因易致霉浥續經奏准調劑茶務或搭放兵餉或招商售變亦以三錢為率現在新疆需茶甚多將官茶運往搭支亦照内地搭放官兵之例每封扣銀三錢並將脚價攤入茶本之内於官兵應領鹽菜銀内扣還較之買自商人實多減省是官茶運至新疆各處除應扣脚價外其應扣茶本亦係每封作價三錢與内地搭放官兵暨招商售變均屬一例但内地係零星銷售而新疆各處係成總發運且使逺駐官兵同沾利益免受居奇較之内地陳茶變價大有裨益奏入報聞議在京厄魯特官兵移駐起程及優給領兵大臣事宜軍機大臣奏言臣等會同八旗大臣等查出在京厄魯特官兵願往伊犂者共六十五人除台吉宰桑之子十九人及現在當差之人不遣外其餘二十五人准其移駐應得之俸禄口糧與熱河厄魯特一體給與但由熱河給發則現在起程未免拮据請將官員俸禄及兵丁餉銀三十兩於京師先行給發其餘至熱河補給即交派出之烏爾登帶往熱河其自京至熱河交兵部直隸總督照滿洲蒙古兵丁行走之例給與驛站車輛再從前派出索倫察哈爾兵丁之總管等各給俸銀一年駝二隻馬十匹跟役十四人官員每月鹽菜銀八兩跟役鹽菜銀五錢賞銀二兩今烏爾登係䕶軍統領應再借俸一年加給駝一隻馬三匹每月鹽菜銀四兩伊等回程應令馳驛奏入報聞三月乙夘諭伊犂將軍大臣等次第挈眷駐劄上諭軍機大臣曰據明瑞等奏稱臣現駐伊犂辦理將軍事務若蒙恩留臣多効力數年臣情願挈眷駐劄其㕘贊領隊大臣等現在奏請挈眷者如蒙俞允請酌其得暇時不拘先後料理起程等語所奏甚是伊等輪替來京領朕訓㫖後即可擕眷前往著派阿桂往署伊犂將軍事務阿桂到後即令明瑞來京挈眷再令阿桂回京昨命觀音保往伊犂更換愛隆阿今愛隆阿願挈眷再往著照所請行觀音保仍以領隊大臣行走但阿桂未能即赴伊犂而鄂津伊勒圖伍岱各以挈眷奏請著交明瑞等酌定先後分班來京順帶家口回至伊犂該處挈眷官兵甚多今各大臣亦遷移家口可為官兵標準甚屬有益但路逺費多恐力有不及著准其馳驛前往在内地交兵部及各省督撫辦理口外著楊應琚酌量辦給馬駝帳房器什以利遄行而示體恤恩免索倫兵丁扣賠借用官駝十分之五仍展限緩扣上諭軍機大臣曰據明瑞等奏索倫總管諾們察領兵五百名至烏里雅蘇台因馬力平常借官駝二百五十隻沿途倒斃一百五十隻應於伊等月糧内坐扣賠補可否懇恩酌定分數寛免等語此項倒斃駝隻例應賠補但因擕帶家口以致疲乏著加恩寛免十分之五其應賠之項若即令坐扣未免拮据著俟一年後再行扣補將此傳諭明瑞等遵行諭伊犂將軍明瑞等核定厄魯特餘丁補缺之例上諭軍機大臣曰伊犂厄魯特兵食錢糧者止二百名餘丁皆官給孳生牲隻今自熱河移駐之達什達瓦厄魯特兵五百名其中食錢糧者多而餘丁無幾似覺厚薄不均但達什達瓦屬人受恩已久設該旗錢糧缺出亦准伊犂厄魯特餘丁挑取伊等又覺生計稍艱著傳諭明瑞俟阿桂到時會同查明兩處餘丁數目通融籌算將來伊犂餘丁如何酌增實在錢糧之處定議辦理具奏辛酉命副都統勒克挈眷駐防伊犂上命軍機大臣曰前曾降㫖涼州留副都統一員莊浪留城守尉一員管束西安移駐兵丁但伊犂移駐兵丁甚多應派大員管理興常著授為涼州副都統勒克現在伊犂明年回時應帶第二起兵丁再往伊犂著照新疆大臣例擕帶家眷一同駐劄其將軍既已裁汰巴禄著即來京癸亥上躬耕藉田回宫是日哈薩克阿布勒瑪木比特使人亨集噶爾等十二人入覲於午門外跪迎聖駕上温語慰勞賜冠服銀幣有差乙丑命新疆辦事佐雜人員歸駐劄大臣考核上諭大學士曰明德奏新疆佐雜俸滿請交該處辦事大臣甄别移咨督撫辦理一摺佐雜人員既派往新疆辦事其人之優劣勤惰内地原無從深悉自應交該處大臣就近考核著照所請嗣後此等人員遇有六年俸滿應行甄别者俱由新疆辦事大臣分别移咨督撫照例辦理該部即遵諭行戊辰諭直隸山陜等處督撫酌量筵宴夷使事宜上諭軍機大臣曰據方觀承奏保定督署筵宴哈薩克來使呼岱巴爾氐等一事雖係按照往例但此等來使歲以為常非伊等部内特遣蘇爾統及大頭目等初次入覲可比所有經過地方只須留心照料給與日用口食無庸特設筵宴致滋煩費嗣後遇有必須加恩優待示以觀瞻之處另候朕特㫖遵行著於各該督撫奏事之便傳諭知之癸酉命侍郎五吉會同㕘贊大臣納世通審訊回人阿卜都喇伊木罪案納世通奏言喀什噶爾伊沙噶伯克阿卜都喇伊木原係波羅泥都霍集占信用之人因大兵臨城始行降附每令屬人赴外藩貿易漏洩内地事務又據阿奇木伯克噶岱黙特告稱回人噶帕爾往霍罕貿易與彼處買賣頭目拜黙特等言及前年為阿濟比之事大臣遣使索還侵地阿卜都喇伊木密遣親信屬人哈勒黙特私向額爾德尼云此次内地人來專為阿濟比游牧並未帶有兵馬爾但在家坐候不必遠迎若索取侵地不妨應允將來給還與否再為商酌等語又詢之阿奇木伯克素勒坦和卓亦稱其人難信臣等查阿卜都喇伊木生性奸詐其親屬頗多富足及現為伯克頭目者又其婿墨墨氐敏於邁喇木呢雅斯叛案内即已有名亦非安静之人臣等愚見或令阿卜都喇伊木與阿克蘇伯克薩里對調或發往伊犂同木薩辦事庶不致滋生事端奏入上諭軍機大臣曰此次八覲之伊沙噶伯克阿卜都喇伊木據㕘贊大臣納世通指名㕘奏著派侍郎五吉馳驛前往審訊仍寄知經過各處大臣俟阿卜都喇伊木到時即行拏問并其跟役交侍衞訥蘇會同看守五吉到時曉諭回衆人等阿卜都喇伊木因有事被㕘是以押赴阿克蘇質審與爾等無涉再訥蘇帶阿卜都喇伊木赴阿克蘇沿途務須嚴加看守勿令知覺自戕又諭曰阿卜都喇伊木歸附以來朕因將軍大臣等保奏加恩用為伊沙噶伯克兹來京入覲已悉其人居心叵測如噶岱黙特所告其言果實豈可仍行調補應從重治罪示衆適詢問永貴亦言其人難信即應辦理又詢之拕穆齊圖據奏稱伊至霍罕額爾德尼並未遠迎則情節相符若不從重治罪不足以示懲創著五吉帶領拕穆齊圖往阿克蘇會同納世通審訊具奏納世通奉到此㫖計五吉等將到即將應行詢問回人帶至阿克蘇對質如情罪屬實阿卜都喇伊木著即正法仍降㫖曉諭衆回人我大國之例凡私將内地事務漏洩與外藩者其罪即同反叛妻子亦應從坐因阿卜都喇伊木新經歸附將其家口免死查明解京至墨墨氐敏亦不可留於彼處著傳諭納世通俟辦理阿卜都喇伊木後與噶岱黙特酌議再行解京辦理此外如有黨惡之人一體查明解送甲戌諭定邊左副將軍成衮扎布毋庸移駐科卜多上諭軍機大臣曰據成衮扎布奏移駐科卜多一摺經軍機大臣議科卜多現駐㕘贊大臣修城屯田諸務已足敷辦理至卡倫諸事自應將軍管轄請令成衮扎布仍駐烏里雅蘇台其發往屯田兵丁請俟科卜多修城事畢再行酌派等語烏里雅蘇台係𦂳要之地糧餉馬匹牲隻甚多著成衮扎布不必移駐科卜多如科卜多尚需屯田兵丁亦可另行酌調不必派烏里雅蘇台兵前往即傳諭成衮扎布等遵照辦理戊寅議安挿伊犂挈眷兵丁事宜軍機大臣奏言將軍明瑞等將熱河移駐伊犂滿洲兵需用房屋錢糧盛京錫伯及厄魯特兵應給牲隻及錫伯兵編設佐領各事宜具奏臣等遵㫖定議烏哈爾里克舊修綏定城房屋不敷居住現在伊犂河修城起屋熱河滿洲兵應即於此城駐劄現在屯田兵一千二百名今年更換請酌留六百名一同修城則十月内可竣其熱河及涼州莊浪滿州兵一處居住尤便約束應俱如所奏惟是熱河兵到期尚遙儘可從容成造不必催促務令堅固至所奏滿兵行糧前經尚書舒赫德等定議奏准其到後每年應得錢糧及分地耕種撙節糧餉之處交明瑞等酌量辦理又盛京錫伯兵及厄魯特兵應同索倫察哈爾一體游牧錫伯兵若需房屋亦令自行修造又官給孳生羊隻索倫察哈爾應給之項已奏明酌給外將來厄魯特錫伯兵照例每兵給羊二十五隻約計需四萬餘隻請將上年停止解送喀爾喀四部落之羊一萬八千隻交成衮扎布再辦一萬二千隻於兵丁等至烏里雅蘇台時交給帶往仍於哈薩克貿易内酌買一萬隻存留伊犂備用其錫伯兵丁應照索倫察哈爾厄魯特之例建立昂吉編設佐領約計一千名作一昻吉六佐領領催披甲分派各佐領下另於索倫滿洲大員内選派總管副總管各一人管束其佐領驍騎校各六名即於現往之防禦驍騎校二十名内選放如防禦内有可任副總管者亦即令充補其餘官員仍食原俸當差俟缺出選補領催二十四名亦於現往之領催内挑選餘俱照察哈爾辦理所有昻吉佐領應給關防圖記請令明瑞等擬定字樣行文該部鑄給奏入上從之平定準噶爾方略續編卷二十四
