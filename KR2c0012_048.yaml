  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_048-1a, image: WYG0357/WYG0357-0681a.png}
body:
  text: 乾隆九年夏四月乙亥準噶爾部人鄂勒錐來降命賞給安插如例川陜總督慶復奏報貿易夷人圖卜濟爾哈朗等自肅州起程還部五月戊戍駐藏副都統索拜疏奏議設哈喇哈達卡倫事宜索拜奏言准兵部咨郡王頗羅鼐欲令伊唐古忒兵丁在哈濟爾得卜特爾地方安設卡倫此欲豫得準噶爾信息以為保固之計應如頗羅鼐所請令索拜㑹同駐劄西寧副都統莽古賚公同商酌應於何處安置防範并何時應設應撤之處定議奏聞臣隨知㑹頗羅鼐續據頗羅鼐呈稱穆魯烏蘇河之前有哈喇哈達地方為哈濟爾得卜特爾通衢準噶爾賊人如欲來藏必經由此路於此置設卡倫不時瞭望可無疏虞然必㑹同駐劄西寧大臣商議簿書往返動需時日今歲將不及置設準噶爾賦性狡猾近由藏還巢益當亟加防範請遣我所信第巴巴克都率兵十五名於五月間前赴哈喇哈達瞭望賊跡偵探防範俟十月雪降役人不能行時斟酌調還於我土伯特禆益實多臣因設置卡倫為地方緊要之事不及㑹商西寧副都統即令頗羅鼐嚴諭所遣第巴巴克都至哈喇哈達時遣人赴哈濟爾得卜特爾偵探蹤跡一有賊人消息即時呈報並移文駐劄西寧副都統如彼地於哈喇哈達置設卡倫已為合宜即無庸置議倘或更有應置卡倫接應之地即行定議奏聞請㫖奏入報聞六月癸丑駐藏副都統索拜期滿以副都統傅清代之辛未準噶爾部人扎卜多爾濟鞥克濟爾哈朗等來降命賞給安插如例七月庚寅議撥西寧縣倉糧貯給沙喇庫圖爾駐防兵食甘肅巡撫黃廷桂奏言西寧口外日月山西南地名沙喇庫圖爾距丹噶爾六十餘里乃賊番出沒經由之處築堡設守備把總馬步兵駐防其地孤懸口外氣候甚寒不能耕穫又係新設之地無糧可撥官兵起支例係折色商販稀少兵丁謀食維艱請於西寧縣倉採買備貯糧內撥糧五百石交營員收貯每年存二借一秋後扣餉買還以濟兵食經軍機大臣議如所請奏入上從之辛卯輔國公索諾木達爾扎卒以其子恭格丹津承襲上諭內閣曰索諾木達爾扎之公爵部議無庸承襲固屬按例辦理第念索諾木達爾扎係達賴喇嘛之父皇考加恩達賴喇嘛特豫封爵伊亦深感皇考之恩行走謹慎歷有年所今已溘逝深為可憫著加恩令伊子恭格丹津仍襲輔國公之職以示優眷九月戊子命嚴緝解京脫逃之喇嘛羅卜藏丹怎上諭內閣曰據副都統索拜奏稱將挑取嫻於經卷之喇嘛及由準噶爾回藏之喇嘛羅卜藏丹怎等解送京師於七月初七日至察木多所屬之部郊地方喇嘛羅卜藏丹怎帶伊僕役薩木都卜達什等騎馬逃亡等語喇嘛羅卜藏丹怎乃朕特㫖令解送京師之人所關甚要把總馬雄於途次怠玩致令逃亡情甚可惡著拿送京師交刑部從重治罪索拜於送此緊要之人僅派一陋劣把總與十五名兵解送亦屬疏忽著交部嚴行察議具奏其逃亡之喇嘛羅卜藏丹怎等速交郡王頗羅鼐四川巡撫紀山提督鄭文煥等務嚴行捕獲鎖解京師如有隱匿容留濟助行糧之人亦即拿獲嚴審治罪再羅卜藏丹怎之逃亡必懷異志此去尋西路小道逃往俱未可定並速行文駐西寧之副都統莽古賚安西提督永常於一切塘汛地方及各處隘口俱令用心防禦務期弋獲己丑上又諭內閣曰駐藏辦事副都統索拜於解送朕特㫖令送京師之喇嘛羅卜藏丹怎一事並不選派强幹之人飭令嚴加防範至使中途脫逃已將索拜交部議處今既派出副都統傅清前往更替索拜此際若已經拿獲則已如未經拿獲傅清雖已抵藏索拜亦不得即行回京著解任仍留彼處俟拿獲羅卜藏丹怎時再行回京並降㫖郡王頗羅鼐伊向來諸事奮勉誠心報效於查拿此等逃亡之犯必能努力然羅卜藏丹怎原係察木多之人觀其行至原處逃亡其中必有容留藏匿濟助牲口行糧之人伊所到之處凡屬下之唐古忒等念係喇嘛瞻顧不行擒拿亦未可定著頗羅鼐留心嚴飭各處實力查拿務期弋獲再似此由準噶爾回藏之喇嘛噶津林沁等前經頗羅鼐奏請停其解送京師安置於扎什倫布廟內但以此次解送之羅卜藏丹怎中路脫逃而論則伊等必懷異志若將噶津林沁仍留藏內頗羅鼐能保其斷然無事即無庸解送若不能保仍遵前㫖飭强幹人員用心防範解送京師察木多之紀瓦帕克巴喇胡土克圖亦是荷䝉國恩之大喇嘛於伊所屬一切地方通行嚴飭務令必獲羅卜藏丹怎斷不得稍有疏忽以致漏網可即行文曉諭知之丙申準噶爾部人達爾扎卜巴朗等來降命賞給安插如例冬十月庚午命索拜帶領赴藏兵丁回京上諭內閣曰前曽降㫖令索拜留藏協同傅清等緝捕羅卜藏丹怎不必即行回京今據四川巡撫紀山奏稱將派出隨同傅清之緑旗辨兵俟抵藏後令於索拜回京時沿途隨回等語若不能即獲羅卜藏丹怎必至辨兵久待索拜既交該部察議治罪一俟傅清到藏無庸留藏仍著來京將查拿羅卜藏丹怎之事交頗羅鼐傅清等遵朕前㫖辦理十一月丙戌巡查準噶爾放卡情形定邊副將軍額駙䇿凌奏言准軍機處咨準噶爾以防範逃人為辭從伊原舊放卡處漸移距我卡甚近經額駙䇿凌於二月內奏報有厄魯特在布爾哈台阿達克布爾噶蘇放卡七月內奏報有厄魯特在巴爾楚克口察罕布爾噶蘇放卡竊照厄魯特等所稱在巴爾楚克口察罕布爾噶蘇地方坐卡者即是前在布爾哈台阿達克布爾噶蘇地方坐卡之人換回坐卡等語查此兩處地名不符詳對繪圖亦甚不明經本處奏請應行文額駙䇿凌令將巴爾楚克口與察罕布爾噶蘇地方或在阿爾台山前或在山後再此地方與內地卡倫相對離距逺近詳查具奏以便俟夷使來時曉諭令其撤回臣查去年十一月內在巴爾楚克卡倫遇厄魯特巴爾衮額木可扣在布爾哈台阿達克布爾噶蘇地方放卡一事經該卡護軍校烏得等查得巴爾衮等現住之卡與我兵所住之巴爾楚克卡倫相對在阿爾台山後相距卡倫馬行一日一夜可到又據薩拉布拉克坐卡護軍校安金保報稱準噶爾得木齊沙喇卜所住之處與我兵所住之薩拉布拉克卡倫相對馬行一日一夜可到等語今年七月內據前赴南路略地之三等侍衛佛保等報稱出喀勒占和碩到埋藏木記處有厄魯特巴濟給伊棟等放卡居住等語臣等將伊等先後所報之處訊之通知地方之䝉古等俱稱阿達克布爾噶蘇與察罕布爾噶蘇俱是一道在阿爾台山後至去年厄魯特額木可扣等所住之布爾哈台與阿達克布爾噶蘇及令年所遇之厄魯特巴濟給等所住之察罕布爾噶蘇俱是一處地名與我巴爾楚克薩拉布拉克兩卡相對與薩拉布拉克又覺稍近約略有一百餘里奏入報聞戊子安西提督永常奏稱準噶爾進貢使臣哈栁入境癸巳準噶爾部人察罕庫克新率親屬六人來降經軍機大臣等請㫖照例賞給安插奉諭㫖察罕庫克新前來投誠數次俱被擒獲始終克矢誠心來投甚屬可憫著格外施恩授為七品官賞給官用緞二端布卡匹餘依議十二月壬子恩准夷使哈栁赴肅貿易先是安西提督永常奏報準噶爾遣宰桑哈栁等請安進貢攜帶貨物懇請貿易得㫖軍機大臣議奏尋議哈栁違議帶貨自應不准貿易但乾隆七年吹納木喀來京帶有貨物再四哀懇已准售賣此次應仍准交易令該提督一面護送夷使來京一面令其運貨往肅州出售至是上諭軍機大臣等曰據永常奏稱夷使哈栁禀稱此次帶來駝馬係隨路更換並非貨賣祗求將牛羊留下售賣即是恩典情辭極為恭順其所帶牛羊并乏弱馬匹已留於哈密如䝉恩准其赴肅貿易請照吹納木喀之例派官兵照料前往等語從前進貢夷使隨帶貨物亦曾加恩准其貿易此次哈栁所有牛羊等物著准其所請在肅交易爾等可寄信與慶復黃廷桂令其派委幹員照例辦理并傳與永常知之戊辰準噶爾部人輸庫爾來降命賞給安插如例乾隆十年春正月甲午更定哈密防兵換班日期川陜總督慶復奏言哈密留防兵二千名向例二年更換一次經前督臣馬爾泰奏明四月先換一半九月再換一半俾新舊相間得以教習一切防卡事宜令乙丑年又届應換查四月九月新舊交代換回之兵於五月十月起程時值盛暑隆冬行走維艱應請酌改於三月八月更換不過移前一月既於戌卒有益亦可無誤邊防奏入上從之己亥夷使哈栁至京進表請安並貢方物準噶爾台吉噶爾丹䇿零謹奏大皇帝䝉大皇帝諭㫖接濟我等前往西藏念經之人牲畜路費念經之時又䝉大皇帝憐憫准照我等所請辦理不勝欣喜感激之至從前我等地方未立法性教現在新立此教所有西藏請來好喇嘛業已大半亡故現在所存甚少且年皆衰邁若由土伯特地方揀選通於經呪好喇嘛賞發前來則我等地方經呪之教可以永久不絶而大皇帝之恩德亦永久感戴矣為此奏請餘言令使臣口奏恭進玉碗木碗各一隻貂皮三十張並犬馬各二奏八上命尚書海望等訊問哈栁噶爾丹䇿零奏摺內令來使口奏何語據哈栁稟稱噶爾丹䇿零令我將請發喇嘛事口奏大皇帝又令我奏我等熬茶之人由藏回來頗羅鼐辦給牲畜路費不甚安協與先例不同頗羅鼐原係拉藏汗屬下書寫之人大抵仍思拉藏汗舊仇所以如此嗣後我等行走仍請照先例辦理之處伏祈明白飭諭海望等據辭覆奏報聞庚子宣諭夷使哈栁上命尚書海望等傳諭夷使哈栁曰爾噶爾丹䇿零本章朕已觀覽爾等口奏之言大臣等亦經奏聞觀噶爾丹䇿零所奏為尊佛法立法性教欲請藏內喇嘛實屬善事其詞意誠篤朕甚嘉之但爾等到藏熬茶即欲邀請喇嘛頗羅鼐未曽給發爾等回後頗羅鼐奏到準噶爾來使欲請喇嘛未奉大皇帝諭㫖未曽給發伊等回去或又奏請給發亦未可定但從前準噶爾人等擾亂藏地拆毁寺廟有侵害土伯特之仇俱不願前往乞大皇帝睿鑒爾等又稱熬茶之人頗羅鼐辦給諸物不甚妥協想因尚念拉藏汗之仇是以如此朕為天下共主不分內外逺近一視同仁因從前爾等有亂藏之事彼此猜疑至今未息衆喇嘛皆佛門弟子伊等不願前去朕豈可迫遣此事不便降㫖理應停止哈栁跪奏大皇帝諭㫖我當謹記歸告噶爾丹䇿零海望等覆奏報聞辛丑賜準噶爾使臣哈栁宴先是辦理軍機大臣等奏言此次夷使哈栁奉㫖於西厰帳殿瞻仰天顔恩賜筵宴具儀注應照上年筵宴夷使圖爾都之例預備奏入報聞至是月夷使哈栁入宴上諭之曰朕昨遣大臣所降諭㫖爾俱領悉否哈栁跪奏大皇帝諭㫖俱已敬謹領悉特因頗羅鼐與我處不睦不知如何陳奏并曾否准其所奏之處伏乞大皇帝睿鑒上諭曰頗羅鼐是僻處逺方之人爾準噶爾亦係僻處逺方之人朕為大皇帝不分內外一體眷顧為爾等不睦豈可偏聽遽罪頗羅鼐乎所以將不便降㫖之故令大臣曉諭爾等爾可謹記朕㫖歸告噶爾丹䇿零知之上親賜酒二爵禮成而退二月乙巳傳諭駐藏大臣等預籌防範事宜上諭軍機大臣等曰據此次夷使哈栁口奏有進藏熬茶之人由藏回巢頗羅鼐辦給牲畜路費不甚妥協大槩是仍念拉藏汗舊仇是以如此等語又噶爾丹䇿零奏請賢能喇嘛一事朕已降㫖西藏之人皆不願去此事頗羅鼐亦曽奏及喇嘛皆不願去朕難以强派準噶爾人等與頗羅鼐不睦之處業已顯露今雖無事不可不預為之備著傳諭駐藏副都統傅清令其密飭頗羅鼐務使留心有應如何防範預備之處詳慎辦理甲寅召見夷使哈栁賞賚有差上召見哈栁於正大光明殿諭之曰朕明日起程謁陵俟回鑾令汝等朝見恐誤汝等行期故於令日召見汝等今天時漸暖汝等整裝完備即可起程歸國不必候朕回鑾也汝台吉奏請之事可行則准行無例不可行者則不准行朕惟準情酌理初無成見汝等謹記朕諭㫖歸告噶爾丹䇿零在途謹慎行走哈栁跪奏大皇帝諭㫖當謹記歸告噶爾丹策零荷大皇帝恩典甚厚我等在路自必謹慎行走隨敕賜使臣及隨從之厄魯特等銀兩緞布如例賜準噶爾台吉噶爾丹䇿零敕書奉天承運皇帝詔曰爾奏稱前往西藏誦經人等䝉恩賞給牲畜口糧成全誦經之事不勝歡欣並請於土伯特賞給善於經呪喇嘛數人令經呪之教可垂久逺推廣不絶等語爾尊崇佛道因立法性教欲請西藏喇嘛實一善事朕觀奏內辭意敬順懇切甚屬可嘉但去年爾使臣進藏熬茶已向郡王頗羅鼐求請喇嘛彼地喇嘛因念爾等曾在藏內騷擾不願前往故頗羅鼐託言無大皇帝㫖意並未發往亦曾經頗羅鼐具奏今爾使臣哈栁口奏頗羅鼐仍念拉藏汗之仇於爾等進藏熬茶人牲畜路費並未支給妥協由此觀之爾等兩地相疑未忘舊事朕為大君不分內外視羣生如一體撫恤仁愛郎佛道亦以安撫衆主為要衆喇嘛皆係佛門弟子伊等既不情願朕勒令前往可乎即使降㫖令發給爾等喇嘛伊等亦未必肯發給賢能者此後爾等又不免藉為口實及生怨望頗羅鼐係僻處逺地之人準噶爾亦係僻處逺地之人爾等彼此互有違言朕豈可偏聽遽罪頗羅鼐乎爾等地方亦有喇嘛豈無一善於經呪者且敬佛廣教只在於心亦不必專憑經呪何必求諸他人此事朕不必降㫖今特敕付使臣哈栁齎回爾其善體朕意隨敕賜各色緞十端蟒緞粧縀各八端玻璃磁器各八事傳諭夷使咯栁令撤回移近內地游牧及定期貿易事宜先是署定邊副將軍參贊大臣拉布敦奏言上年十二月初六日據哈瑪爾沙扎海卡倫侍衛拜部遣員赴都圖淖爾布呼朱爾克等處瞭望偵探至布爾吉推河見有厄魯特宰桑額勒慎等十餘户在此居住當即諭令移去據額勒慎云今天正寒冷又當我處牲畜孶長之時乞容暫住俟稍和暖即行移去等語又十二月十二日據布延圖卡倫侍衛伯森特遣員出口偵探至布延圖河源四水總㑹地方見有烏梁海得木齊扎木禪等十餘戶居住亦諭令移去據扎木禪云因我們游牧處雪大暫住於此俟雪化後即行移去等語查厄魯特宰桑額勒慎所住之布爾吉推河與內地所放卡倫相去不逺行走一夜次早可到在都圖淖爾之西北又查烏梁海得木齊扎木禪亦係準噶爾之人並非本地烏梁海所住之布延圖河源與內地所放卡倫察罕布呼地方相去有一宿之地又查布爾吉推河在哈瑪爾沙扎海卡倫以外其地在阿爾台山梁之外布延圖河源四水總㑹處與得里衮托爾本淖爾此三處其地俱在阿爾台山梁之內現在密劄兩處坐卡侍衛并鄰近坐卡侍衛等謹慎小心嚴行防範俟稍暖雪化厄魯特人等移去後即速詳報奏入得㫖軍機大臣會同額騎䇿凌議奏尋議伊等或因避雪來尋水草至此游牧似無他故但屢向內地卡倫近處居住日久未免生事現在夷使在京應面諭以守定界址毋許任意遊牧令其回時告知噶爾丹䇿零即行撤回又議以使臣請安進貢非貿易之年不准攜貨此次哈栁仍違例攜帶貨物現奉恩㫖姑准赴肅貿易亦應俟使臣回巢之日申飭下次不准復帶奏入上從之是日命尚書海望等遵㫖傳諭夷使哈栁令其歸告噶爾丹策零永遠遵守哈栁敬謹受命海望等覆奏報聞庚申署理定邊副將軍參贊大臣拉布敦奏報巡查準噶爾烏梁海近塞游牧情形拉布敦奏言據託爾和烏蘭坐卡侍衛曩喀賴等報稱正月二十三日遣員瞭望賊踪至黃加書魯克地方見準噶爾烏梁海得木齊烏爾巴齊因游牧處雪大帶領所屬十四家在此居住隨諭令移去據得木齊烏爾巴齊云我等在此居住實於理不合但因不得住處故暫居此俟雪化後即行移回等語查託爾和烏蘭卡倫地方與科卜多城相近在科卜多河邊乃布延圖鄰卡其得木齊烏爾巴齊所住之黃加書魯克地方在阿爾台山梁以內與內地放卡之處相去八十里乃布延圖與託爾和烏蘭兩處卡倫尋跡之所現在託爾和烏蘭與上年所報布延圖哈瑪爾沙扎海一連三十以外皆有準噶爾人居住當即行文總管防守烏里雅蘇台等處之參贊大臣烏爾登令其嚴飭坐卡侍衛等小心防範俟伊等移去後即行詳報奏入報聞甲子準噶爾夷使哈栁自京起程還部戊辰更定查閲喀爾喀兵丁之例上諭內閣曰喀爾喀四部落游牧處豫備之揚威兵每年令軍營參贊大臣前往閲看但念此項兵丁頻年調遣查閲不免勞苦每年著各該處副將軍就近查閲軍營參贊大臣兩年閲看一次三月己丑查核軍營存貯米石辦理軍機大臣等奏言上年額駙策凌奏銷乾隆八年用過米石一摺軍營所貯小米七萬七千餘石大麥麥子等糧折算小米共一萬五千餘石內九年用過米石尚未奏銷現在所有兵丁一年應支米數約需九千八百餘石除上年用過米石外尚存米八萬二千餘石通計支給現在兵丁可足六七年之用前於乾隆三年五月內停止范育馪運糧原議案內俟數年後應行運糧之時著額駙策凌再行請㫖今應遵照原議將軍營現貯米石核實具奏奏入報聞戊戌準噶爾部人彭蘇克等率屬來降命賞給安插如例夏四月己未安西提督永常奏報準噶爾夷使哈栁等出境癸亥定邊副將軍額駙策凌奏報準噶爾近邊游牧人等遷回情形額駙策凌奏言三月初四日準噶爾宰桑額勒慎來至希巴爾沙扎海口內求見坐卡侍衛拜都告稱我台吉噶爾丹策零諭云䝉大皇帝之恩准允求和汝等在額克阿喇勒西喇呼魯蘇等處游牧居住如遇大國坐卡侍衛和好而行等語我遵台吉之諭到布爾吉推地方聞大國卡倫在布延圖哈瑪爾沙扎海等處故我不敢前來今我台吉令我撤回特此告知并以酒醪為獻拜都即諭之云額克阿喇勒西喇呼魯蘇皆係我卡內之地現今荷䝉我聖主隆恩許爾求和但爾地人等豈可在我卡內地方居住以後宜恪守疆界不得妄行額勒慎即移回原地而去奏入報聞丁卯停派軍營隨即察哈爾兵丁辦理軍機大臣等奏言軍營隨將軍即務察哈爾兵一百名向例三年期滿經臣等議准改為五年更換一次今春額駙策凌到京臣等與之商議現今軍營無事所有兵丁有無應行裁減據額駙策凌言隨印察哈爾兵相應減去即於軍營喀爾喀兵內挑用今察哈爾兵一百名現於本年七月內期滿應將此項兵丁令其撤回本處不必另派更替其需用隨印兵丁即於喀爾喀兵丁內揀選應用奏入上從之五月庚辰恩免誤給投誠厄魯特等應追口糧上諭內閣曰近據正黃旗䝉古旗分奏請將誤照新滿洲例辦給併入本旗回子瑚連雅爾等口糧米石之大臣官員交部察議等語瑚連雅爾等俱係從前投順照例賞給産業安插已定之人業經數年又引新滿洲例請給口糧該管官並不詳察即行支給甚屬錯誤著交部察議至因瑚連雅爾一案以致併入八旗內有已經補給亦有尚未補給者此皆誤認瑚連雅爾一案視為定例遵照而行非首先錯誤者可比俱著免其查議再此項厄魯特回子等係逺方新來投誠之人不知定例冒昧請給情屬可原著將伊等治罪及追賠多領口糧之處槩行寬免嗣後無庸支給並將此㫖明白曉諭知之己亥準噶爾部人圖魯孟克挈眷來降命賞給安插如例秋九月庚午朔議定投誠厄魯特等挑補食糧事宜辦理軍機大臣等奏言查準噶爾投誠之厄魯特回子等安插各處賞給置産等項銀兩甚為充裕其又作為額外護軍披甲支給錢糧者特因伊等感天朝仁化邊逺來投故加格外殊恩至伊等所出額外護軍等缺若再行挑取伊等子孫頂補不免過優請嗣後安插各處之厄魯特回子等所有應賞置産銀兩照例辦給外伊等俱係歸八旗分佐領之人若本身已故出有空缺即照理藩院所辦選伊子息內漢仗可觀堪供差遣者該管大臣酌量挑取本佐領下額缺不准挑補額外護軍披甲即有子息幼小不能料理産業者其未長成以前該管大臣派人照管産業令其足資養贍再此後投誠之人奉㫖賞給額外護軍披甲者毋庸支給全分錢糧均給半分錢糧仍令該管大臣不時稽查毋到妄費俾得從容養贍奏入上從之準噶爾部人烏巴什率屬九人來降命賞給安插如例冬十月己未準噶爾部人策零及德卜珠爾率屬來降命賞給安插如例甲子準噶爾部人博爾第等來降命賞給安插如例十一月己卯更定駐藏辦事大臣章京筆帖式換班成例駐藏别都統傅清奏言從前駐藏章京筆帖式換班之期照哈密等處三年一換但俱係錯綜更換以便交代嫻習後因將驛站官兵撤回錯綜更換路逺難以獨行派出駐劄里塘巴塘等處兵丁護送往來臣因此次來藏由成都派官兵護送沿路留心察看見唐古忒兵中途間有偷搶之事請嗣後在藏辦事大臣奉㫖派出時該處即行文四川總督令派換班官兵等候該部將換班章京等帶領引見派出後與大臣同至成都帶領換班官兵一同更換則不需護送之兵可無偷搶之事再藏內不比內地凡事隨到隨辦即有辦過相類事件到時亦可查按舊檔辦理似無庸錯綜更換奏入得㫖軍機大臣議奏尋議哈密瓜州西寧辦事大臣章京筆帖式俱係三年一換其駐西藏辦事大臣章京等令錯綜更換者原為新舊相參易於辦事起見令據傅清奏稱藏內事原可隨到隨辦毋庸交代嫻習而錯綜更換時必須撥兵護送轉多勞費應照傅清所奏嗣後駐藏大臣章京筆帖式等皆酌量於緑營換班之期三年一換俟更替之大臣等至藏清查事檔交代明白後舊駐大臣等帶領官兵同回內地不必仍循錯綜更換之例則可省撥兵護送之繁仍無貽誤地方事務奏入上從之壬午命西北兩路將軍大臣等籌備防範事宜上諭軍機大臣等曰據安西提督李繩武奏稱昨據由準噶爾脫回之吐魯番回民海底里禀稱噶爾丹策零於今年九月內業已病故彼於各處卡倫俱添兵防守等語應寄信密諭西北兩路將軍大臣等噶爾丹策零病故之信伊雖未遣使具奏而固我邊境防範豫備之處斷不可忽至於乘伊有喪之際發兵征討此事朕斷不為但恐伊部落內彼此心離以生變亂或潛至邊境偷奪牲畜或有意投入我境窺伺情形均未可定惟當示以大義固守邊疆嚴謹卡倫一切應行豫備之處令將軍大臣等悉心籌畫妥協辦理豫為防範十二月壬子駐藏副都統傅清奏報偵探準夷情形傅清奏言臣欽奉上諭飭令郡王頗羅鼐於今年卡倫處派素所深信之人逺出偵察準噶爾踪跡今於十月初三日據頗羅鼐呈稱今年三月二十日派深信之薩嘉達克齊博爾博等三十名探望準噶爾做善事回巢踪跡據伊等回告越過阿哈雅克卡倫到噶斯路上探得準噶爾人等回巢路上人畜多有死傷情形甚屬艱窘又據頗羅鼐呈稱拉達克汗策卜登那木扎爾寄信內稱從前葉爾羌人等每年到我所屬地方貿易自準噶爾熬茶以來一年有餘不見有人來此貿易因遣二人前往薩納珠口探取信息據伊等回告探得準噶爾部內墨得格齊巴圖魯宰桑等出痘死者十三人其屬下出痘死者甚衆噶爾丹策零畏懼向從前奪取哈薩克游牧之北地方藏避又準噶爾所屬吉爾吉爾頭目二人不和內頭目甘班圖伯克殺死一頭目併據其地修造薩瓦爾格里雅城截奪往來買賣人等後噶爾丹策零避痘回巢派兵三千名進征吉爾吉爾薩瓦爾格里雅城將吉爾吉爾之甘班圖伯克殺死屬下人等俱帶至厄魯特地方居住又噶爾丹策零遣宰桑數人向查汗薩瓦爾部落講和其現在信用大宰桑二名一係巴圖魯之子拉沁一係策零敦多卜之子扎克巴又有阿木賓禪汗强暴有力占據四處部落所屬有阿卜都爾噶里木部落中途又有博洛爾汗部落博洛爾汗部落內無汗係哈屯楚哈爾辦事噶爾丹策零在阿卜都爾噶里木看視行兵之路遣回子巴克達呼雅遜都喇呼沙巴勒賓等四十人前往彼處人猜疑殺死三十三人惟七人遁歸噶爾丹策零愈怒派厄魯特兵二萬四千哈薩克兵四千吉爾吉爾兵二千令伊族台吉策卜登圖拉爾滿積圖拉爾衮都爾圖拉爾於今年正月內起程前往但聞阿卜都爾噶里木汗力量充足兵丁强健勝負未知如何等語奏入報聞甲寅扎薩克頭等台吉齊旺多爾濟卒以其姪旺對承襲上諭內閣曰駐藏副都統傅清奏扎薩克頭等台吉齊旺多爾濟病故據郡王頗羅鼐請將齊旺多爾濟職銜賞給伊姪旺對伊係合家受恩之人令其管轄兵丁辦理諸務實為有益朕前加恩將烏鎮和碩齊作為扎薩克頭等台吉給伊弟承襲以來所交諸務奮勉出力今齊旺多爾濟病故請將伊兄訥顔和碩齊之子旺對承襲著照所請施恩令旺對承襲扎薩克頭等台吉戊午安西提督李繩武奏報準噶爾進貢使臣哈栁等入境平定準噶爾方略前編卷四十八
