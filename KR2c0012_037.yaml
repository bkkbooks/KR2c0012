  text: 欽定四庫全書平定準噶爾方略前編卷三十七
  hash: sha256:789dbe13a17c2d0a5b545d5ed87843ae3ebf9564161c514cb78c18da5d30e6e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_037-1a, image: WYG0357/WYG0357-0520c.png}
body:
  text: 雍正十三年夏四月丙午命以倉糧借給鄂爾多斯乏食䝉古上諭大學士等曰前據理藩院奏稱鄂爾多斯上年收成歉薄貝子羅卜藏請借倉糧議令辦理夷情事務郞中七十五會同該扎薩克查明乏食䝉古先借支一月口糧其在秋成之前應再行借支定議呈報等語朕已乆行又據貝勒查木陽貝子齊旺班珠爾納木扎爾色楞等請借倉糧亦經理籓院議令七十五達色照議辦理今朕聞陜西神木榆林等處上年收成歉薄糧價昻貴而鄂爾多斯䝉古之乏食者多向神木榆林城内就食甚為可憫該郞中七十五等從前未曽呈報及奉㫖查辦之後又復怠忽遲延竟不上緊辦理甚屬不合著七十五等即行㑹同該道將乏食䝉古查明一面具報該督撫一面酌動倉糧發給毋使乏食䝉古至於失所至於神木榆林等處乏食民人亦著該地方官查明酌量辦理命色楞赴西寧上諭辦理軍機大臣等曰辦理青海事務達鼐病故著散秩大臣色楞前徃西寧辦青海事務辛亥議叙北路克爾森齊老擊賊陣亡官兵吏部遵㫖議奏言北路軍營官兵於克爾森齊老擊賊大㨗陣亡官兵應加恩議叙奉天正紅旗騎都尉兼一雲騎尉北京從優授二等輕車都尉鑲白旗領催珠里黑龍江正黄旗副驍騎校費雅思哈授騎都尉吉林驍騎校奇弩鑲藍旗領催奔博里黑龍江鑲紅旗領催馬爾圖授雲騎尉各給與祭𦵏並以應襲之人引見承襲奏入上從之甲寅命停運軍糧上諭辦理軍機大臣等曰現今内地估撥軍糧有已經出口運送在途者著即於哈密橋灣布隆吉爾等處就近收貯不必再運巴里坤其未經出口糧石亦著暫停運送可傳諭署陜西總督劉於義知之命密議留駐兵丁事宜辦理軍機大臣等遵㫖議奏言北路軍營官兵臣等與副將軍常徳詳加籌畫應於新撥滿洲䝉古緑旗兵中選留二萬分駐所在形勝處餘悉撤還鄂爾昆等處去年更換緑旗兵八百仍留種地奏入得㫖北路軍營駐兵二萬之處可密行文商之大將軍平郡王今噶爾丹策零雖遣使求和而疆界尚未定議不可深信俟準噶爾傾心歸順始可酌量撤兵若駐兵不敷禦敵之用則不如不駐兵矣但兵數太多未免耗費國帑務須詳悉籌畫此二萬兵能否禦敵之處著大將軍副將軍等公同妥議密奏己未命禁止榆林邉外偷盗牲畜鬻賣人口諸弊陜西延綏總兵官米國正奏言榆林邉城以外並河套夷民雜處交易為生鄂爾多斯一部風氣素號渾樸近日多有内地民人導夷人進口者偷盗牲畜窩藏分利而神木口居民設店熟悉夷情多方欺誘或不肖弁兵通同容隠或所屬衙門糢糊了事致夷人無從申訴應請飭行沿邉文員一體稽察以安夷衆再榆林居民鮮知禮義鬻賣妻子相習成風甚至呈明地方有司彼此交易並請嚴飭所在有司立法禁止以端風化奏入得㫖著交與該地方文武官員實力奉行仍令督撫提鎮等不時稽查閏四月丁丑命安插鄂爾多斯貧乏䝉古上諭辦理軍機大臣等曰聞鄂爾多斯貧乏䝉古有就食口内典賣妻子人口者著交該地方官查明照原價賞給贖出加意安插請㫖如有隠匿遺漏者後經查出定行從重治罪戊子命以達瑪林襲封車臣汗喀爾喀車臣汗吹扎卜卒理藩院以應承襲者引見得㫖車臣汗之號著原爵車臣汗滚臣之子達瑪林承襲原爵車臣汗吹扎卜之子徳木楚克著承襲伊父扎薩克多羅郡王伊叔恭格薩木丕勒著仍在郡王上行走丁酉命遣使諭噶爾丹䇿零定議疆界賞給各色縀十疋上諭準噶爾台吉噶爾丹䇿零曰朕軫念衆庶止息兵戈振興黄教安逸生靈用是特遣使臣降㫖宣諭爾極悦服遣吹納木喀等進貢齎表内稱若使後世言某皇帝與某台吉失好以致衆生勞苦殊非美名若互相和好振興黄教安逸生靈則可垂休聲於永乆等語朕披覽之際不勝嘉許欣悅果能知此天必賜之以福若不知此惟以貪暴為事則天亦必加之以禍此常理也至於搆兵之由爾意若自朕始者昔我聖祖皇考時衆云準噶爾之人秉性貪暴好尚兵戈侵擾鄰封不崇釋氏仁慈之道彼時朕猶未深信後爾父策妄阿喇布坦無端侵我哈密又遣兵赴藏擾亂佛敎殘毁寺廟傷害喇嘛朕始知前言不妄似此則兩路之駐兵防範謂始自我皇考可乎我皇考聖心仁愛惟欲安撫衆生故遣使來徃數次乃爾父推托遷延始終無定朕纘承大統爾父又遣根敦來京朕仰體皇考仁愛之心仍欲和好俾黄敎振興生靈安逸令根敦至朕前親執其手諭云爾囬時可告知爾台吉朕執爾之手即如見爾台吉之面朕與爾台吉應俱敎訓子孫輩令其永逺和好於是遣使議和定界詎意爾父並無和好之意屢次托故遷延且藏匿我朝之逃亡羅卜藏丹津並未告知使臣以致諸事未成和議中止自此朕亦未遣使前去爾亦不遣使來京後爾父物故爾遣特磊奏云爾父已成佛矣不思佛為天下人之所尊禮者爾云成佛其誰尊禮乎且特磊舉動驕慢不知禮法是以朕諭特磊云爾台吉若果誠心遵㫖和好可將羅卜藏丹津解送前來並將邉疆定界朕豈有遣發大兵之理乃爾之和好未定則爾意實未可測不得不為防範故兩路有駐兵之舉及爾又遣特磊前來奏稱羅卜藏丹津已解至中途聞大兵發遣是以中止爾若果將羅卜藏丹津解送自應直到軍營何以中道而返耶朕因解送羅卜藏丹津之言涉於虚妄故於特磊囬時令部内加以拂意之言責以難行之事然並未勒令遵行也若果勒令遵行自應冩入勅諭之内乃不冩入勅諭祇於部内行文者特令爾知非朕意也爾縱有難行之處亦應聲明陳奏何以並無囘覆而於使臣在巴里坤軍營等候之際潜兵盗我馬匹此非搆兵自爾乎我兵果欲進勦則於特磊去後乗爾兵無備之時不行襲擊轉俟爾兵有備有是理乎此俱已徃之事朕既軫念衆生將爾從前過愆悉已寛宥無容置議今爾既遵循禮義敬奉朕㫖歡悦順從欲修和好遣使來京朕心甚嘉之再爾使吹納木喀等口奏從前曽言將羅卜藏丹津解送俟大事定後不難辦理至定界一事阿爾台原係厄魯特游牧之地杭愛原係喀爾喀游牧之地請由哲爾格西喇呼魯蘇等處至巴里坤地方定為邉界等語羅卜藏丹津爾從前既屢奏解送即與解送無異但所云阿爾台係厄魯特游牧之地此噶爾丹從前之事噶爾丹為我兵勦滅取其土地並其骨殖子孫俱經爾父獻納此衆人所共知者現今噶爾丹之屬人及丹濟拉之子孫俱在内地爾準噶爾曾未越阿爾台游牧居住乃謂為厄魯特游牧之地可乎且喀爾喀等尚不令近阿爾台游牧者原欲使兩界相隔稍逺可息争端而可令準噶爾之人居此乎夫永逺和好之事定界實為要議朕特命大臣等與吹納木喀等公同酌議務期兩有禆益指定邉界具奏而吹納木喀等云我台吉所交口奏言詞之外並無别語不便擅定等語此事在京既不能定議用是再頒敇諭遣來使吹納木喀等齎囘若果誠心修好疆界不可不明設日後無知之人越界妄行稍有争競則又生事端矣况定界之説原起於爾父策妄阿喇布坦奏請以安衆生者彼時朕曾降㫖嘉許後又請將阿爾台山梁外哈道里哈達清濟勒布拉清濟勒三處不必置為閒地朕未准行今特欲安逸衆生永逺和好將此三處空閒之地俱屬於爾祇自克木齊克汗騰格里上阿爾台山梁由索勒畢嶺下哈卜㙮克拜塔克之中過烏蘭烏蘇直抵噶斯口為界並將爾父所請自呼遜托輝至喀喇巴爾楚克悉作空閒之地似此分界在爾並無難行不便之處爾其仰體朕加恩眷注之意遵諭定界方可永逺修好朕為天下主惟思扶持黄敎利濟衆生敦崇和睦執中循禮斷不强汝以難行者至於不便大國之處亦不能俯允爾請也倘爾遵奉諭㫖議定疆界之後猶以喀爾喀之游牧逼近爾屬不免疑懼奏請稍展空閒之地亦屬可行俟爾遣使再來陳奏時朕當另降諭㫖台吉其熟思詳審酌定具奏戊戌命常賚總統留駐巴里坤兵丁顔清如馬㑹伯協同辦事辦理軍機大臣等遵㫖議奏言西路軍營兵丁臣等議以打牲烏拉兵一千赴北路駐劄選緑旗兵一萬於巴里坤駐防留兵一千増防哈密其總統協辦大臣及領兵提督總兵等應請欽命餘兵俟準噶爾使臣還後悉撤之再巴里坤既留駐兵丁一切文移並須鈴印現今軍營有鎮安將軍揚武將軍振威將軍三印請以鎮安將軍印給總統大臣掌管其揚武將軍振威將軍印應令查郞阿與寧逺大將軍印一併賫囬繳上奏入得㫖留駐巴里坤兵丁著内大臣常賚總統提督顔清如原任尚書馬㑹伯協同辦事總兵張朝良楊􅛵管領兵丁其留駐哈密兵丁著查郞阿酌派大員管領餘依議議北路軍營撤兵駐兵事宜命平郡王福彭仍留統轄薩木哈等協理事務定邉大將軍平郡王福彭遵㫖議奏言北路撤兵駐兵事宜一軍營應留滿洲䝉古兵二萬量撥洪郭爾鄂隆所調京城滿洲兵二千烏里雅蘇台駐劄滿洲兵一千令侯馬蘭泰䕶軍統領職銜吉當阿副都統富達禮轄之家選兵二千令䕶軍統領阿成阿副都統敦巴轄之漢軍兵一千令都統諾爾琿石禮哈轄之奉天兵四千令䕶軍統領瑚琳噶爾錫副都統席爾璊哲庫轄之吉林兵二千令副都統富昌阿思哈轄之索倫兵二千令副都統職銜巴里孟古翟三轄之打牲烏拉兵一千令䕶軍統領職銜哈岱轄之牧厰察哈爾兵一千令副都統綽爾多學士吳金轄之四子部落兵一千令王阿喇卜坦多爾濟轄之鄂爾多斯兵一千令貝勒查木陽轄之内扎薩克兵一千令喀喇沁公羅卜藏策卜登協理台吉羅卜藏達什轄之察哈爾厄魯特兵四百牧厰兵三百喀喇沁兵三百令散秩大臣巴咱爾轄之其留駐京城滿洲漢軍内扎薩克等兵明年撥兵往代奉天吉林呼倫貝爾牧厰察克爾等兵於丁巳年撥兵徃代俟議定界址將應減撤兵丁再行具奏至防守臺站鄂爾多斯兵一千應撤其半留兵五百令副都統圖爾賽席爾塔管轄如故其都統佟時茂副都統劉瑛協理台吉衮濟扎卜悉撤還一烏理雅蘇台地屬𦂳要請選前鋒兵六百並撥滿洲䝉古兵三千附近駐劄再撥緑旗兵一千防守城池以前鋒統領㙮爾瑪善阿岱轄之其車臣汗兵五百西三部落兵一千令於烏里雅蘇台附近鄂衣衮特里默駐劄一撥守卡倫侍衛䕶軍三十五人駐防日乆請更撥徃代一四省緑旗兵丁除烏里雅蘇台調撥一千外其扎克拜達里克推河塔米爾三地請各撥緑旗名五百遣副將等一人率領駐劄一駐劄大兵之地最要鄂爾昆所在遼濶水草並佳請於其地酌量建城駐兵糧餉官物移運收貯一兵丁留駐及撤還者所需糧餉馬匹等應給予如例其馬蘭泰隊中應撤一千請令䕶軍統領職銜塔喀爾吉善率之還京俟李如栢所率換班緑旗兵至再令軍營緑旗兵起程各還本處辦理軍機大臣等議覆悉如所請其大兵駐劄鄂爾昆或暫令大將軍平郡王福彭留駐總統或别遣大臣前徃恭候欽定奏入得㫖大將軍平郡王著暫留統轄㕘贊領侍衛内大臣薩木哈等著仍協同大將軍平郡王辦理事務前鋒統領阿岱著囘京餘依議五月甲辰命蠲免甘肅所屬本年應徵地丁錢糧上諭内閣曰西陲用兵以來一應軍需皆取資於公帑絲毫不以累民惟是甘肅等處運送糧餉不能不藉民力之輸輓朕心軫念屢沛恩膏即當豐稔之年亦下蠲租之詔所以賞百姓之急公示朕心之體恤也兹聞甘省所屬地方入夏以來有雨澤愆期之州縣或恐收成稍薄納課艱難著將雍正十三年甘肅通省所屬應徴地丁錢糧全行蠲免俾催科不擾民力寛舒該督撫可董率有司實力奉行以副朕加惠秦民之至意乙巳命議西寧涼州改駐兵丁事宜西安將軍秦布奏言前者辦理軍機大臣議選西安八旗滿洲䝉古兵三千以二千分駐凉州一千分駐西寧查西安漢軍兵丁向與滿洲蒙古一體効力比來生齒日繁請一并入選撥之列凉州增設城守步兵六百兩旗合設防禦一員西寧增設步兵四百每翼各設防禦一員轄之辦理軍機大臣等議覆曰應悉如所請至所奏内請以分駐西寧兵改駐莊浪凉州兵改駐凉州城外大七巴之處應令查郞阿馬爾泰詳議具奏奏入上從之壬子命定議出征兵丁囘汛補缺事宜山西巡撫覺羅石麟疏言赴甘出征兵丁撤還者一時不能得缺請月支養贍銀二兩米三斗俟缺出陸續頂補兵部議覆如所請奏入得㫖出征兵丁既囘營汛自應仍補原缺若係步兵自當抜補馬糧以示奬勵豈有令其待缺頂補之理至招募頂補之兵原係一時權宜之計應令出缺另議養贍候補之法方為乆協今巡撫石麟議令出征兵丁候缺兵部即照此議覆俱屬不合著另行定議並行令派兵之省分一體遵行戊午命懲江寧荆州滿洲官兵赴巴里坤者損畜失道之罪署寧逺大將軍查郞阿等奏言前者江寧荆州滿洲兵丁調赴巴里坤沿途倒斃走失馬騾應請以兩營牧馬之協領阿山泰常在等五十四人革職留任馬匹追償其餘管轄不嚴者應均著分賠至革職副都統阿克山觀音保應賠馬匹一并追出辦理軍機大臣等議覆應如所請奏入得㫖此次調徃巴里坤之江寧荆州滿洲官兵全然不知行兵之道馬匹牲畜損傷過多不耐寒冷勞苦復有迷失兵丁種種罪愆此皆官弁向日耽於安逸廢弛滿洲舊規甚為無耻此次官兵不准以出兵記檔俟兵丁撤囘時將領兵前徃之協領以下驍騎校以上等官俱著同家屬搬移囘京交該旗帶領引見其如何令其學習補用之處候朕另降諭㫖伊等員缺令該將軍另行揀選題補若該處不能得人著奏聞由京城揀選前徃庚申命北路撤還兵丁在額爾得尼招効力奮勇者該旗查奏請㫖上諭辦理軍機大臣等曰北路軍營陸續撤囘官兵内有在額爾得尼招地方打仗効力及奮勇出羣者俟到京時俱行查出併開明該將軍所出考語令各該旗具奏請㫖命革諾爾琿職仍留軍前効力定邊大將軍平郡王福彭劾奏言鑲黄旗漢軍都統諾爾琿懦弱昏憒不能管轄員弁約束家人又私用官馬擅扣兵糧殊屬溺職奏入得㫖諾爾琿著革職仍留軍前當苦差効力行走辛酉命鑲黄旗漢軍副都統劉瑛仍留軍前與鑲白旗漢軍都統石禮哈管轄漢軍兵丁丙寅上諭辦理軍機大臣等曰準噶爾使臣吹納木喀等到巴里坤軍營起身後著副將軍張廣泗囘至西安候㫖另有用處署寧逺大將軍查郞阿奏西路撤兵事宜查郞阿等奏言噶爾丹策零現今遣使齎表求和軍營滿洲䝉古官兵應行撤囘者俟準噶爾使臣囘後請按程挨次分隊行走第一隊貝勒特古斯率科爾沁兵一千名由喀爾喀河索約爾濟山前赴原駐牧處其索倫兵一百名應令營總冀本㕘領薩都拜等率之與科爾沁兵同行至喀爾喀河分路前赴齊齊哈爾第二隊内大臣顧魯率原管察哈爾兵一千名由奈曼等路赴駐牧處所其巴爾虎兵一百名應令侍衛噶扎爾圖率之同徃第三隊副都統達什率東四旗察哈爾兵一千名由翁金河前赴駐牧處所其奉天吉林兵一百名應令原管副都統烏察喇率之同行行至八溝分路各囘本處第四隊副都統班第率西四旗察哈爾兵一千名行至歸化成前赴本游牧處第五隊副都統喀喇率巴圖魯兵一百五十名令赴肅州酌量遣官分領第六隊散秩大臣安楚䕶率土默特兵四百名由塔勒納沁進嘉峪闗㑹同都統根敦沿邉前赴歸化城第七隊一等台吉定咱喇什率鄂爾多斯兵五百名行至肅州㑹同副都統班第等由寧夏出口還原游牧處第八隊協理台吉羅卜藏率和托輝特兵一百名由奈曼明安一帶赴駐牧處所第九隊貝子衮布率厄魯特兵五百名由鎮畨前赴駐牧處所其内地行走之滿洲官兵内江寧滿洲兵一千名為第一隊荆州滿洲兵一千名為第二隊分西安兵三千名為三隊與寧夏滿兵並依次起行俱令原管將軍副都統等率之進嘉峪闗抵肅州各還本處至緑旗兵丁現在軍營共二萬四千七十餘名内有勇健兵丁到營日淺應行留駐再於西安督標及固原寧夏延綏興漢等處兵丁共選留一萬一千名以一萬名駐劄巴里坤一千名增防哈密其餘俟滿洲䝉古兵丁起行後亦挨次撤囘令各營原管之大員率之進口以備訓練奏入報聞戊辰議凉州西寧設官駐兵事宜西安將軍秦布奏言凉州西寧議令設兵駐防彈壓䝉古番人今凉州駐兵二千名内請選漢仗好者二百名為前鋒滿洲八旗兩翼各設協領一員䝉古八旗兩翼各設協領一員滿洲每旗設佐領二員䝉古每旗設佐領一員每佐領各設防禦一員驍騎校一員領催五名其行文事件設筆帖式三員西寧駐兵一千名内請選漢仗好者一百名為前鋒滿洲八旗兩翼各設協領一員䝉古八旗兩翼合設協領一員滿洲每旗各設佐領一員防禦一員驍騎校一員領催五名䝉古兩旗合設佐領一員防禦各一員驍騎校各一員每旗設領催二名其行文事件設筆帖式二員西寧止議設副都統一員恐事務繁多應於協領内揀選一員令其協辦凉州將軍衙門請如西安例設立二司其將軍副都統印信二司闗防協領條記請交部鑄給至官兵俸餉口糧草豆等項支領如西安例辦理軍機大臣等議覆悉如所請奏入上從之平定準噶爾方略前編卷三十七
