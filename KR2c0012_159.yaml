body:
  text: 乾隆二十八年春正月辛酉諭伊犂将軍明瑞等預備移駐官兵各事宜上諭軍機大臣曰新疆平定有年伊犂應多駐官兵以籌乆逺昨諭将凉州荘浪等處官兵攜眷遷移交軍機大臣詳悉妥議因念官兵三四千名合之家口不下萬人所有營房糧餉俱當預為備辦著𫝊諭明瑞等将此項移駐官兵作何建造城垣廬舍及給與糧餉之處先行籌畫一面辦理即行具奏又諭曰明瑞等奏稱伊犂駐防屯田官兵及貿易商民日以増多所有附近薪木俱經取用樵採之處漸逺今查勘洪郭羅鄂博有産煤之地已𫝊示兵民等有願行開採者聽其前徃等語開採煤窑以接濟日用自屬要務但兵民既皆往採則羣聚雜處不能無爭鬬之事更當留心約束且伊犂為厄魯特故地䝉古風俗以游牧資生若居處飲食竟似直省駐防官兵則日乆漸至頺惰著𫝊諭明瑞等将索倫察哈爾兵丁令其照常游牧即滿洲兵丁亦不宜常居城市仍令其兼以游牧為事即可撙節薪芻而伊等亦不忘本業甚有禆益著即遵照辦理壬戌諭喀什噶爾辦事尚書永貴等辦理拔達克山等處事宜上諭軍機大臣曰近因拔達克山霍罕使人入覲詢素勒坦沙搶掠博洛爾一事據稱博洛爾沙呼沙黙特於上年害素勒坦沙之弟是以統衆復讐並非以舊事支飾又詢額爾徳尼伯克搶掠額徳格訥一事據稱額徳格訥人等曽搶掠安集延額爾徳尼始行報復且俱云若遣人曉諭自當遵行等語看来外藩相攻亦互有曲直不得謂之無因永貴新柱等此時當行文曉示不必張皇辦理但該部落等一切情事自應據實奏報若専云曉示而不問情事之輕重倘有貽誤則伊等當任其咎俱著𫝊諭知之癸亥葉爾羌辦事尚書都統新柱等疏奏移文拔達克山情形新柱等奏言十一月二十七日葉爾羌囘人密爾咱納喇特等往拔達克山貿易遇素勒坦沙寄有呈文一件臣等譯看據稱伊領兵至齊特喇爾攻殺讐人以伊弟沙卜多爾噶達爾為阿竒木伯克駐守其地其博洛爾頭目沙瑚沙黙特既為天朝臣僕仍令照舊管轄等語臣等查齊特喇爾曽經歸附素勒坦沙何得攻取其地又聞波羅泥都之尸仍潛瘞於牌租阿巴特現擬移文斥責並行索取十二月初一日臣等遣伯克薩里等持書問罪令其給還齊特喇爾土地人民獻出波羅泥都尸骸及其妻子若稍有抗拒即領兵進討並與布魯特散秩大臣阿竒木本城伯克鄂對等商調兵丁計四城所有滿洲索倫兵及酌派布魯特囘人共三千八百餘名俟薩里囘時酌量行止奏入上諭軍機大臣曰拔達克山雖應辦理但宜俟薩里前往曉示果能遵奉約束尚可寛宥其或狡飾延緩必須用兵新柱等當遵屢降諭㫖酌調伊犂官兵務期一舉竣事即此次素勒坦沙稍有支吾不妨再遣一使姑示羈縻藉以集我兵力此時不可輕發甲子議駐防伊犂兵丁事宜軍機大臣奏言臣等欽奉諭㫖酌議移駐滿洲䝉古兵丁查現在凉州荘浪所駐滿洲䝉古兵三千二百名閒居内地漸忘本業伊犂為新疆總滙自應挈眷移駐以裕操防至所駐漢軍一千名既不便一律遷移且從前有許令出旗之例應與各省漢軍俱交該将軍總督等裁汰其所裁額缺名糧令黒龍江将軍察哈爾總管於所轄壮丁之情願移駐伊犂者選索倫一千名察哈爾一千名作為馬甲将額缺錢糧及鹽菜銀兩全行賞給令赴伊犂駐防合之凉州荘浪官兵共五千餘名酌分四年陸續派往臣等酌議本年派索倫兵五百名察哈爾兵五百名於四五月間起程緩行前往伊犂其凉州荘浪官兵自来年起編為三隊分三年前往則一切安插事宜可以從容辦理奏入上從之己巳賜愛烏罕愛哈黙特沙勅書皇帝勅諭愛烏罕愛哈黙特沙爾逺在外藩向慕仁化遣使入覲具見悃誠朕以葉爾羌大臣奏報特派侍衛迎䕶爾使和卓密爾哈等前来入覲朕叠沛恩施屢申宴賚賜爾蟒錦緞疋紬綾器什使人歸日爾其祇受又賜爾使及隨從員役緞疋皮張器什銀兩各有差并諭爾知之覽爾所進表文請相去遼逺向為準噶爾囘部所隔未能通使中國今聞諸部率服不勝欣慰是以入覲朕深為喜悦至準囘諸部朕非利其土地人民因伊等自相殘害羣生不安是用發兵拯救從前準噶爾達瓦齊乗亂自立旋為大兵擒獲阿睦爾撒納已降復叛大兵窮追至俄羅斯遂伏㝠誅及囘部霍集占兄弟負恩反噬敗逃至拔達克山為素勒坦沙所殺獻馘歸城今伊犂葉爾羌等處咸入版圖霍罕魯特諸部盡為臣僕朕寛其貢賦有来修歳事者優加賜賚爾雖逖聽應亦聞知至爾所奏瑪爾塔汗納巴拉池聞爾取扎哈那巴特城鳩其鄰部合馬歩各數十萬衆来爭至竒里納勒聞爾領衆前来伊等俱避入帕尼帕特城爾攻圍六月殲其大伯克數十人黨衆十萬餘獲金銀器械無算夫納巴拉池既能鳩合黨衆如許乃未經接戰即入堅城坐待誅戮其事殊不可解爾又云欲往攻布哈爾聞已歸附中國不使侵伐足昭恭順之忱朕為天下共主中外一視賞善罰惡惟秉至公爾此次因素勒坦沙抒誠遣使其循理守分可知且如爾奏數年来各處攻戰未獲稍安則爾之屬人亦殊勞苦尚其和協隣封休養部落俾羣享太平之福以受朕恩澤於無窮特諭又賜拔達克山素勒坦沙霍罕額爾徳尼伯克右部哈薩克烏爾根齊哈雅卜竒齊玉斯努爾賚巴圖爾等勅書各一道辛未以奏事遺漏列名及擬補伯克錯繆訓飭辦事尚書都統永貴新柱等上諭軍機大臣曰近因永貴等㑹議蠲免囘人賦役一摺未列額敏和卓及玉素富之名已降㫖訓示今伊等㑹議擬補伯克員缺之奏復然殊不可解前此或謂所辦係加恩囘衆之事伊等不欲市徳署名已屬無謂至補授伯克自應同伊等商辦復有何嫌疑不行開列額敏和卓等俱久𨽻臣僕用至㕘贊大臣伊等如意欲辭避尚宜曉示令其勿存形迹且不但此兩人即鄂對噶岱黙特等若身當㕘贊亦無不一同辦事之理至所辦補授伯克一事尤未妥協凡囘部六品以下小伯克伊等可擬定正陪具奏若各城阿竒木則總辦事務之員與内地督撫相似宜開列應行補授人員具奏候朕特簡何得與小伯克視同一例永貴新柱等諒不敢専擅然此實謬誤之大者俱著𫝊諭申飭壬申命酌減庫爾勒玉古爾囘人應交官糧十分之二上諭軍機大臣曰達桑阿奏稱庫爾勒囘人五百八十二戸玉古爾囘人五百九十四戸每年各交官糧七百石今撥往伊犂之囘人一百四十七戸雖在交糧額内而阿克蘓和聞已查出多倫囘人五十六戸分送二處補額其戸口不甚相逺應仍照舊額徴收糧石等語撥往伊犂囘人雖以多倫囘人抵補但較之原額究屬不敷仍令照舊交糧不無攤派著加恩将庫爾勒玉古爾囘人應交糧石酌減十分之二以示體恤戊寅議撥補新疆等處馬匹事宜烏魯木齊辦事副都統旌額里等奏言烏魯木齊每年貿易哈薩克馬不過三千餘匹本年九月至十二月即易馬四千二百匹将来日漸増多請照軍機大臣原議撥補新疆額缺有餘即以撥補肅州等處標營倒斃之數臣等擬於烏魯木齊常留馬一千匹以應差務再留七百匹備阿克蘓調撥餘於来年四月送徃巴里坤牧放以供安西提標及肅州等處撥補之用奏入得㫖軍機大臣議奏尋議查上年楊應琚等請以烏魯木齊貿易馬匹撥補内地缺額經臣等議准但現在欽奉諭㫖令索倫察哈爾餘丁及凉州荘浪駐防兵丁陸續遷往伊犂更須廣設牧羣以資生殖臣等酌議先将孳生馬匹送往伊犂将騸馬暫留烏魯木齊以備調撥如於應留之一千七百匹外仍有盈餘即陸續送至伊犂以備撥補營缺将来與哈薩克交易當以孳生馬匹為要毎年彚奏馬數俟新疆足額之時再行撥補内地奏入上從之辛巳命酌辦換班綠旗兵丁應扣舊欠公項上諭軍機大臣曰從前派往軍前官兵有中途減徹者所支俸賞銀兩曽請俟将来屯戍換班時扣還今據鄂弼奏現在換班兵丁先於應給銀内扣還十分之二其餘分作兩年完給等語為期尚覺太迫著加恩定限四年俾得從容展扣以示體恤至所稱逃兵一項兵丁雖已在逃豈竟盡無家屬乃既玩視軍紀又恃有他人為之代賠情實可惡若一體展限代扣則不法之徒轉以領銀潛逸為得計著𫝊諭該撫務令嚴行緝獲按數著追毋任漏網癸未定邊左副将軍成衮扎布等疏奏擒戮烏梁海庫克新等收其游牧成衮扎布等奏言據都爾伯特親王䇿凌烏巴什烏梁海内大臣察達克副管旗章京莫尼扎卜等呈稱烏梁海庫克新等投入俄羅斯又掠哈薩克馬匹我等情願自行辦理隨領兵前往捉生詢問知庫克新在和羅圖游牧遂晝伏夜行前往掩襲伊等驚潰逃竄山僻復深入攻擊将宰桑庫克新及伊弟等並所屬五十八人俱已擒戮收其妻子給賞兵丁其餘衆七十四戸俱行收取再從前叛出宰桑呼圖克納木竒之弟瑪木特等游牧在俄羅斯圖喇居住以雪大不能前往所獲人數内有納木竒瑪木特之子詢據供稱因鄂木布郭勒卓輝之亂不得已投入俄羅斯時常驚恐情願投囘我等因遣往招撫令其於雪消後前来等語臣等酌量将招撫人戸分給察達克等管轄又詢出為首搶掠哈薩克牧羣之索隆鄂烏努雅克等由驛站解送以備查詢其庫克新首級於路口梟示俾衆人共知警惕奏入得㫖䇿凌烏巴什等俱著賞給緞疋其著有勞績之官員兵丁等著照追捕塞外騰之例分别賞給緞疋銀兩甲申命工部侍郎納世通為㕘贊大臣駐喀什噶爾辦事原任廵撫三品頂帶阿思哈前往伊犂協同将軍明瑞辦事以散秩大臣伍彌泰前往烏魯木齊協辦事務丁亥議派撥索倫兵丁辦装事宜黒龍江将軍國多歡奏言軍機處議准派撥索倫兵丁挈眷移駐伊犂行文知㑹臣即将欽奉恩㫖𫝊諭選派壮丁一千名以佐領十員驍騎校十員帶領分為二起於春夏陸續挈眷前徃其應行賞給官項及次起兵丁於何處過冬候軍機處議覆行知再所派索倫兵應由克爾倫取道烏里雅蘓台前往請交理藩院派出筆帖式領催選帶嚮導行走奏入得㫖原議之大臣等議奏尋議臣等前議頭起索倫兵不必挈眷附入次起前往今既據稱索倫兵向無跟役自應准其挈眷同行其賞給官項應照上年派往伊犂之察哈爾官兵例每戸給整装銀三十兩駝一隻折價銀十八兩人給馬一匹帳房折價銀四兩鑼鍋折價銀二兩起程之時裹帶兩月口糧毎丁月給鹽菜銀一兩五錢俟辦給孳生牲隻再行停給伊等既無跟役各賞銀十兩置辦軍器其次起兵丁應於何處過冬及派出筆帖式領催等於喀爾喀選帶嚮導行走俱交與成衮扎布酌辦再臣等近據察哈爾都統巴爾品奏應派之餘丁一千名不必分翼分旗惟揀選壮丁作為兩起前往所有帶領之員欽奉諭㫖派出逹克塔納成果即令伊等先後行走一應給與行装産業事宜俱照上年之例辦理奏入上從之二月辛夘以阻止追捕賊匪意存怯懦訓飭定邊左副将軍成衮扎布等上諭軍機大臣曰成衮扎布等奏廵查額爾齊斯等處公多爾濟䇿登等呈報據烏梁海告稱有哈薩克九人前来殺害烏梁海三人掠去羊馬什物隨究出賊匪游牧前往追捕因恐多爾濟䇿登等兵力不足令其酌量行止若追捕不及即行轉囘等語哈薩克邊境人等乗間搶掠烏梁海情節可惡自應擒治以示懲創且已知賊匪名目何難辦理乃成衮扎布慮兵力不足遣人往阻伊身為将軍派員廵查邊境宜飭令擒拏賊匪而轉於具報之事戒其勿行似此意存怯懦甚屬錯謬莽古賚雅朗阿俱以㕘贊協同辦理之人自應䂓勸亦復隨同附和所司何事俱著𫝊諭申飭丙申議駐劄伊犂挈眷兵丁事宜軍機大臣奏言臣等欽奉諭㫖籌議凉州荘浪駐防兵丁移駐伊犂一事查建造城垣房舍必須預為經理而所支糧餉亦必量其定敷食用現在伊犂屯田嵗入糧餉三萬五千餘石除給該處官兵外尚有盈餘但本年所派索倫察哈爾及移駐凉州荘浪兵丁不止萬人仍需糧三萬石應請再派屯田兵一千五百名若由内地調撥未免煩費查臣舒赫徳臣阿桂等據囘部各城伯克等告稱情願遷居伊犂之人甚多應令明瑞等與土魯畨公木薩同各駐劄大臣等籌議照從前辦理約以一千五百人為率不足再以綠旗兵充補其伊犂城署營房工程臣阿桂在彼所役綠旗兵一千人一年始竣今亦請派綠旗兵一千以三年為限至伊犂之察哈爾厄魯特等俱給與孶生牛隻今添駐之索倫察哈爾等亦當一體辦理請交都統巴爾品等揀選牧羣牛四千隻羊二萬隻令派出之索倫察哈爾等陸續帶往或伊等不能照管即酌派官兵協助其作何分給孳生交明瑞辦理再塔爾巴噶台等處駐兵臣阿桂等原奏於明年駐防但伊犂現有増辦駐防屯田營造之事應俟移駐伊犂官兵竣事再行辦理奏入上從之壬寅烏魯木齊辦事副都統旌額理等疏奏核銷屯田牛馬事宜旌額理等奏言查從前安泰等㑹議烏魯本齊屯田牛馬每年准銷倒斃分數馬百匹准銷四分牛百隻准銷二分經部覆應照巴里坤之例一體作為二分銷算臣等查得屯田馬匹非其素習且向例不支食料豆是以傷損者多又請酌為通融銷算仍未覆准歴年以来核算實在傷損自一二分至五七分不等若加餧豆料則每馬需豆價三兩二錢零哈薩克貿易馬匹原價不過三兩尤為多費臣等竊思此項馬匹與支食料豆之馬不同則倒斃分數亦宜有别請通融銷算将馬匹准銷二分半牛隻准銷一分半若倒斃逾數仍著賠補至屯田牛隻較馬為優臣等前請撥伊犂餘牛五百隻合之現存有一千餘隻再将哈薩克等所帶牛隻陸續補額将来屯田所需馬匹可以漸減矣奏入報聞甲辰命授侍郎卞塔海為正紅旗漢軍副都統往阿克蘓辦事上諭軍機大臣曰海明在阿克蘓年乆著授盛京禮部侍郎卞塔海為正紅旗漢軍副都統前往更換其侍郎員缺著永寧調補兵部侍郎員缺著旌額理補授丙午議解送伊犂孶生牛羊事宜軍機大臣奏言臣等昨議駐防伊犂之索倫察哈爾兵二千名請選牧羣牛四千隻羊二萬隻其作何解送之處咨行該都統巴爾品定議今據奏稱數年来解送烏里雅蘓台巴里坤等處牛羊惟牛性不能行逺倒斃過多若一牛折給五羊計牛四千約可折羊二萬亦不須另派官兵即以頭起行走之察哈爾五百名分為十起共解羊四萬隻較有裨益等語臣等查伊犂現有滿洲索倫兵一千五百名上年挈眷之察哈爾兵一千名今年所派五百名俱陸續即到儘足敷用此次兵丁五百名即以解送羊隻至牛隻既不能行逺自應以羊折給其分起解送各事宜俱如所奏辦理再臣等愚見伊犂屯田必需牛隻未便停其辦送查喀爾喀所有牛隻距伊犂較近請令成衮扎布或於牧羣揀選或行採買每年辦牛一千隻以内解送伊犂不必限以定數更寛其行走程期於屯田自有禆益奏入上從之癸丑諭凉州将軍巴祿等移駐凉州荘浪官兵各事宜上諭軍機大臣曰巴祿所奏籌辦凉州荘浪滿營官兵移駐伊犂及漢軍官兵出旗各事宜二摺已交軍機大臣議奏至另摺所請於凉州荘浪甲兵三千二百名内查其年老殘廢孤寡幼稚之戸酌留五百名統歸凉州駐劄改設城守尉一員管轄等語朕初閲時以移駐之兵既皆精鋭足壮新疆營伍其老弱殘廢之跋渉維艱者自不妨區别酌辦至於遷移帑項不致虚縻猶其後馬者也當於摺内批諭即可併入議行但思設立駐防原為地方起見今新疆開拓二萬餘里凉州荘浪一帶已成腹地是以特准軍機大臣所議将該處駐防官兵移往伊犂漢軍則令改調綠旗營缺則聽其散處為民而俸餉經費即可挹彼注兹化無用為有用且伊犂屯田豐收水草暢茂尤於伊等生計有益今若因老弱廢疾孤幼等户遂酌留兵額五百名改設城守尉等官不但非駐防體制而耽逸惡勞安土重遷之徒勢必紛紛託詞䂓避此風斷不可長即該将軍亦轉覺難於辦理此内果有前項戸口萬不能逺赴伊犂者伊等原從西安移駐凉州荘浪至今不過二三十年自可體察實情量為酌留仍令囘至西安交該将軍歸入佐領就便安插又何必為此委曲遷就之舉耶另摺所奏不必再議仍将此詳悉𫝊諭巴祿楊應琚知之尋軍機大臣議奏言巴祿楊應琚奏㑹議凉州荘浪滿洲䝉古兵丁挈眷移駐伊犂製備行装及車馬路費五條欽奉諭㫖交臣等議奏謹議一應需俸賞請照察哈爾兵丁派往伊犂之例賞給查上年派撥察哈爾兵一千名挈眷前往伊犂經臣等議准官員賞給一年俸銀兵丁照換防索倫兵賞銀二十兩因挈眷増銀十兩今凉州荘浪官兵應請照例辦理官兵跟役亦照例賞銀二兩於分隊起程之前賞給一應需馬匹車輛請照例分别増加折給查官員馬兵跟役向有原馬乗騎惟歩兵應照例自凉州荘浪至哈密每兵二名合跟役給車一輛其哈密至伊犂應換給馬匹每名折銀八兩自行僱覔俟至伊犂仍繳還十分之三作二年坐扣至舊例三人給車一輛此次挈眷行走未免不足請每戸添給車一輛俱應如所奏辦理一應需路費鹽菜口糧請照西安提標移駐烏魯木齊之例支給查從前挈眷移駐兵丁每百里按口給盤費銀一錢二分小口六分其官員按品支給鹽菜銀兩兵丁月支銀一兩五錢跟役五銀仍日支口糧八合三勺其官兵跟役鹽菜銀祇以一名支給并不許混入眷口數内支給路費一應需帳房鑼鍋請照察哈爾移駐之例折銀自備查挈眷兵丁自應折給帳房至伊等家居爨具自所常有若因起程一切從新置買殊非情理應無庸置議一經行道路應由闢展烏魯木齊臺路前赴伊犂查前項官兵人數衆多自應從臺路行走仍令該将軍總督及各駐劄辦事大臣等遴委妥員沿途照料務期安靜妥協奏入上從之又諭軍機大臣曰巴祿楊應琚所議凉州荘浪滿營移駐伊犂事宜一摺如加賞整装銀兩及増給車輛各條業經軍機大臣等議覆降㫖允行至所請鍋價二兩之處其事本屬瑣屑非體自當分别指駁在巴祿等不過欲為伊等多得分例起見殊不知伊等每戸既已從優賞給又加以沿途車馬路費所得並不為少何至炊爨之具尚煩鰓鰓過計伊等在凉州荘浪豈家家俱不熟食耶但伊等辦装之項如先時早為給發兵丁到手既不免任意花消若給發於瀕行之時又恐置備不周而購買亦受居竒之累何如先事官為預辦臨時散給所餘者留至伊犂分授伊等為長乆生計尤為費省而事集耶著𫝊諭楊應琚一靣自往蘭州㑹同巴祿及荘浪副都統計其必需各件預行妥備撥用更覺便易即如營中飼馬自拴之費不及攢槽之省此一定之理今一併官為計畫諸事俱得實濟至兵丁駐防日乆零星逋欠自所必有然屢經盤剥其息亦足敷本此時既當起程自不應任需索之人滯留滋擾其中辦理亦應官為主持示之節制将来起程仍應按時分作三起行走途次雖有本旗管押官員即經過地方亦必有員役料理而該将軍巴祿副都統勒克興長等尤當専任其責直至伊犂方為奉職竣事倘兵丁等途間或不安靜及有乗間逃囘情事伊三人不能辭咎逃而不獲則罪在楊應琚其拏獲者一靣正法一靣即行奏聞甲寅命囘城輪班入覲人員酌定品級年額上諭軍機大臣曰永貴等奏稱囘部六品以上伯克等四班俱經入覲今年應再從第一班起但伊等俱係已經瞻仰之人而四班尚有留辦事務及因疾未行者向来入覲約以四十員為率請先儘此項人員其第一班再行入覲者可以酌減等語六品以上伯克等既俱經入覲嗣後亦不必太煩著将四品以上之伯克等以四年一次分班五品以下不必入班或有新經除授者准其前来每年不過二十員以别等威而示體恤丙辰伊犂将軍明瑞等疏奏籌議安插駐防兵丁事宜明瑞等奏言臣等准軍機處議覆伊犂駐劄索倫察哈爾及凉州荘浪滿洲兵陸續派往以便建造城署營房及預備糧餉等事宜查察哈爾厄魯特兵丁俱以游牧為生應仍其舊索倫亦係游牧過冬自搆棚房可以臨時酌辦其給與産業再行詳議至凉州荘浪官兵若照該處給與房屋即需七千餘間須擇地土堅凝及便運木植之處今烏哈爾里克新城僅敷現在官兵駐劄惟近城三四十里伊犂河岸高阜之上可築大城所用木植有阿布喇勒山松杉甚多預行斫伐從哈什空格斯等河造筏直至城工對岸且在新城及固勒扎囘城之間糧運亦便地既産煤又採栁條蘆葦柴薪不乏来春從内地調綠旗兵一千名築城造房至秋季可成三千餘官兵房舍之半其餘至乾隆乙酉年可竣此時先派伊犂馬兵數百游牧至阿布喇勒山伐木造筏一靣咨行楊應琚遣木工鐵工數人於今秋製造器具秋收後以綠旗兵協助兼製蘆蓆麻繩可以應用無悞其兵丁糧餉以伊犂牧穫及囘人所交糧石計至乾隆丙戌年約十七萬石有竒至乾隆丁亥年麥收之前合計新舊兵丁二萬口足敷三年之食但駐防糧餉須多為籌備請以来年為始先増屯田兵五百名乾隆乙酉年城工竣事又増兵一千名歸入屯田收穫自有盈餘且孳生牛羊尚未算入将来塔爾巴噶台駐兵亦可源源接濟謹将本年二月起至乾隆丁亥年止陸續前来官兵及收支糧餉各數分晰列單恭呈御覽奏入得㫖如所議行平定準噶爾方略續編卷二十
