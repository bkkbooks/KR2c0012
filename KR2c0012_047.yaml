  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_047-1a, image: WYG0357/WYG0357-0661c.png}
body:
  text: 乾隆七年十二月戊子敕諭準噶爾台吉噶爾丹䇿零奉天承運皇帝詔曰爾遣吹納木喀等請安進貢盡知爾屬下人謊言妄行之事聲明認罪恭順奏請朕深嘉予爾稱前次奏章並非抗激因本處言語不同之故乞加寛宥朕本不以此介意也再爾前次奏請使人入藏熬茶朕加恩准行爾使半途回去今又請使人入藏從噶斯路去本不應允許但爾為父誦經作好事兼奏請之辭極其恭順朕特加恩准爾所請仍用三百人入藏并准路由噶斯但前去之人若分兩起一起先由噶斯那木罕入藏一起由多巴西寧貿易事畢方去不但我國官兵難以照看即爾國使人亦難分道而行朕已面諭吹納木喀爾等既欲往西寧貿易三百人可仍作一起同至西寧貿易事畢即由多倫鄂羅木入藏朕酌量於途間賞給牲畜路費并命大員護送爾使於本處何時起程先期須報知我邊界大臣再爾奏稱巡視者直至喀勒占卡倫係我人錯㑹大皇帝前既准我巡視科卜多今遵照此㫖每年至托爾輝而止觀爾所言仍疑我於彼處駐兵耳朕既降㫖息兵豈復食言必欲巡視可遣二三十人來令我守卡之人帶領巡察但須嚴飭來人無得生事再爾奏稱貿易之人不准由歸化城等處者由内地心疑之故既經和好豈敢妄行等語而來使吹納木喀亦懇請不拘人數年期併所往之處亦從其便倘如所請恐下人必起争端小事漸成大事欲永逺和好必使信約彌堅方為有益豈可但計一時之利而數改已定之議乎朕為大君於理可行即准行若不可行雖再三奏請亦終不允若必如此借端何如不通商之為得也爾宜酌其輕重仍遵定議而行為此特頒敇書交吹納木喀齎往隨敇賜各色緞十端磁器十二事加賞蟒緞八端並鷹犬各二己丑準噶爾部人達爾濟率親屬十六人來降命賞給安插如例庚寅賜吹納木喀等筵宴傳㫖賜噶爾丹䇿零御用朝珠并賞給吹納木喀等銀緞磁器有差辛夘準噶爾部人特古斯率親屬九人來降命賞給安插如例甲辰恩免哈密等處兵丁應賠馬匹銀兩上諭内閣曰據駐防哈密安西提督永常奏稱乾隆三年十一月十八日接辦理軍機大臣議定防所倒斃駝馬每年分欵按額准銷之文迄今俱遵照辦理惟有自乾隆二年八月十五日以後至三年十一月十八日接奉定例以前此年餘間哈密赤金厰内共倒馬八百二十六匹因俱在未定額數之前屢經提臣援例寛免送部請銷部覆按例准銷五百九十七匹其餘二百二十九匹乃逾額之項非奏明之項可比應令著賠臣查經管弁兵久已換班回營其中不無陞遷事故若逐一行催勢必累及妻子可否邀恩准銷等語此項例前逾額之馬雖例不准銷然邊地弁兵力量艱難朕所軫念著格外加恩准其一體報銷以示優恤該部可即行文該督撫等知之辛亥奏定定邊副將軍與將軍都統等文移儀注定邊副將軍額駙策凌奏言臣䝉皇上施恩授定邊左副將軍印信令酌量調遣綏逺城右衞歸化城游牧察哈爾内扎薩克兵丁凡將軍大臣等遇有事故調遣其如何行文儀注乞交部定議經辦理軍機大臣等議奏前撤兩路大兵留兵駐防邊境不復用大將軍北路以額駙策凌為總統授定邊左副將軍印信鎮守萬一有警綏逺城右衞等皆豫備副將軍調遣其職任事權去大將軍不逺請副將軍行文綏逺城將軍歸化城都統副都統等用咨伊等用咨呈行文總管用劄伊等用呈其調至軍營俱定副將軍指示遵行奏入得㫖額駙之副將軍乃大將軍之副將軍也一切俱應如大將軍儀注所議甚是癸丑命侍衞達賚等䕶送夷使入蔵辦理軍機大臣等奏言準噶爾熬茶人進蔵應派熟練之侍衞章京等四員䕶送前往去年已揀選正黄旗頭等侍衞達賚班布禮䕶軍㕘領滿晉泰鑲白旗䕶軍副㕘領來格四員引見准其派往嗣因齊默特等即自東科爾回巢達賚等亦並回京來年照管熬茶來使可否仍用此四人奏入得㫖即著此四人前往禁王貝勒等額外徴取貉皮定邊副將軍額駙策凌奏言烏梁海向來供給屬主貂皮前奉世宗憲皇帝諭㫖烏梁海人衆因伊等屬主取供貂皮過重恐其生計艱難酌量裁減照數另行施恩賞給臣等㑹同王塞布騰旺布貝勒博貝議定每人原供貂皮五張内減去二張止供三張照數賞給王貝勒等乳牛母羊毎年孳生抵償此項今聞伊等仍取供五張應請禁止經議政王大臣議奏請將厄魯特王塞布騰旺布和托輝特貝勒青滾雜卜交理藩院察議仍嚴飭伊等嗣後照例遵行如再私取逾額定行從重治罪奏入上從之更定軍營派撥看守緑旗兵五年一次換班定邊副將軍額駙策凌奏言原撥種地緑旗兵六百名今派令看守城池倉庫定限三年一換為期太近往返徒勞請此畨更換之後改為五年限滿方行替換辦理軍機大臣等議覆應如所請奏入上從之乾隆八年春正月己未定議準夷挈眷投誠者改發寧古塔安插定邊副將軍額駙䇿凌奏言向例準噶爾投誠人等其隻身來者俱發内地安插其帶領眷屬來者俱發察哈爾安插嗣因人數漸多察哈爾地窄難容故亦改發内地竊思其中婦女嬰孩大抵未經出痘不習内地水土仰懇皇仁嗣後攜眷投誠者均發東三省凉爽之地分住庶令伊等益遂其生經辦理軍機大臣等議奏盛京諸處現在行查無業游民不准編籍勒回本地不便乂令準噶爾人混處至黒龍江所屬與俄羅斯接壤又與北路相近亦不便令伊等居住惟寧古塔三姓與渾春之地在盛京之東既與邊外遙逺又屬風土凉爽應如所請凡攜眷同來者該部照例給賞發往寧古塔安插奏入上從之丙寅準噶爾部人額勒伯克率子諾海博羅特率弟庫勒沁俱來降命賞給安插如例辛巳上諭内閣曰北路軍營㕘贊大臣著副都統拉布敦前往更換阿岱烏爾登給與副都統銜前往更換塔爾瑪善二月己亥準噶爾部人阿必達鄂勒錐各率屬六人來降命賞給照新例發寧古塔安插戊申巴圖爾婦人鄂勒錐來降如例賞給發往江寧隨夫巴圖爾安插三月壬申訓飭貝勒青滚雜卜上諭軍機大臣等曰聞喀爾喀副將軍和托輝特貝勒青滾雜卜凡事怠惰並不在軍營効力去年查閲伊屬下兵丁器械指稱有病不前又將伊本身開入軍營行走之例希圖雙俸經額駙策凌查出除名嚴行訓誡喀爾喀副將軍有承辦全部落之責係衆䝉古表率豈可稍有怠玩茍且青滚雜卜世受國恩並不實心報効殊屬不合著額駙策凌查明具奏嗣經傳詢俱供認不諱額駙策凌奏請治罪奉㫖青滾雜卜既自知其罪姑行寛貸嗣後當加意奮勉効力贖罪著將此㫖諭令知之夏四月甲辰準噶爾部人巴圖博羅特夫婦來降命賞給安插如例閏四月癸亥駐防哈密提督永常摺奏酌辦夷目貿易羊隻事宜永常奏言噶爾丹䇿零令巴布等至境報稱進藏熬茶仍遣吹納木喀等於四月初旬起程前來巴布等帶有馬羊求貨臣諭以今非貿易之年與定例不符該夷甚為悔懼哀懇再三求將疲乏不能驅回者變賣臣查視馬匹雖有疲乏尚可行走羊則擦掌乏弱者甚多察其言詞懇切而羊隻實難以驅回令馬匹仍留卡倫外止將羊隻二千餘與兵民交易仍諭以嗣後非貿易之年羊亦不許攜帶巴布等俱欣喜叩謝即日起身回巢奏入報聞辛未準噶爾部人阿喇卜扎扎木蘇等各率屬來降命賞給安插如例五月戊子準噶爾部人博爾博來降命賞給安插如例庚寅署川陜總督馬爾泰摺奏酌辦塔勒納沁官弁移駐三堡事宜馬爾泰奏言前安西改設提督案内所有駐防哈密兵二千名分撥塔勒納沁駐兵三百名用遊擊一員統之三堡駐兵三百名用都司一員統之賽布什達里雅駐兵二百名用守備一員統之其餘一千二百名俱留駐哈密城臣抵哈密以來相度形勢知塔勒納沁原非極衝之地城内又無倉庫錢糧應行防守而三堡一城實係哈密與準夷往來要路又聮接烏克爾等處卡倫居五堡之中平時既可坐鎮彈壓萬一有警又可収聚各卡塘兵丁在一城防守請將塔勒納沁三百名兵酌量更換卡塘之用以千把總一員統之其餘俱併歸三堡即將駐塔勒納沁遊擊移三堡駐防其原設都司撤回哈密辦事在塔勒納沁城自無可虞而三堡實隠然成一重鎮足以固守軍機大臣等議覆應如所請奏入上從之丙申定邊副將軍額駙䇿凌奏言查閲喀爾喀四部落軍容器械向經臣處派㕘贊大臣二員前往今年實屆比丁審事大盟㑹之期既經盟㑹又派大臣前往查閲衆䝉古須兩次豫備不勝勞費請查閲軍容即交四部落之副將軍與盟主辦理分别優劣具報無容另遣大臣奏入上從之䇿凌又奏言據副將軍輔國公巴蘓呈稱扎薩克台吉格勒克怠玩公事前因閲視軍容伊屬下器械不修兵數短少經㕘贊大臣等嚴行訓飭格勒克並不悛改應備大營需用駝馬屢次嚴催全不交納容隠奸拐在逃之厄鱗經貝勒旺扎爾在伊旗下拿獲格勒克又强行奪取甚屬不法請加懲治經臣查訪屬實奏入得㫖交部議處癸卯侍郎玉保奏報熬茶夷使吹納木喀巴雅斯瑚朗等入境乙巳準噶爾部人達什林沁來降命賞給安插如例己酉命賞拉達克汗䇿卜登那木扎爾上諭軍機大臣等曰拉達克汗䇿卜登那木扎爾將自準噶爾脱出之馬甲卓鼐辦給口糧馬匹送至藏内朕甚嘉予著賞給各色緞八端玻璃磁器八事六月甲戌命辦理夷使速行進藏上諭軍機大臣等曰據侍郎玉保所奏噶爾丹䇿零此次遣使進藏熬茶其詞貌俱極恭順且請將所攜貨物先在東科爾貿易朕之恩准夷使入藏者因噶爾丹策零懇請為伊父修行善事故特允之前次來使因貿易羈留遂至過時不能前進半道空回此次所攜貨物並無從前羚羊角緑蔔萄等項止係皮張尚易於變易著行文甘肅巡撫黄廷桂令其即往西寧將夷使交易之事速行料理俾得即日起程若復遷延過時不能入蔵將來又須另為辦理此次一切俱令寛裕施恩籌辦妥協速竟其事著玉保將朕加恩接濟并令即行進蔵之故曉諭夷使等知之丙子奬賞貝子旺扎爾旗分協理台吉旺扎爾扎卜定邊副將軍額駙䇿凌奏言貝子旺扎爾旗分協理台吉旺扎爾扎卜向因屢此資助軍營牲畜部議授為頭等台吉兹以豫備游牧兵䕶視哲卜尊丹巴胡土克圖伊念本旗貧乏於本分應辦外請毎年更為代辦一百名牲畜口糧甚屬急公理合奏聞奏入得㫖旺扎爾扎卜著加恩奬賞該部議奏秋七月辛丑賞給喀爾喀官備駝馬牛羊一十四萬有竒辦理軍機大臣等奏言喀爾喀各扎薩克旗分所存官駝二萬五千有餘馬四萬有餘牛一千有餘山羊八萬有餘自置買以來並未應用今䝉聖諭此項駝馬牛羊常令䝉古收管牧放恐倒斃賠補或滋擾累可給賞伊等為業資其蕃息于生計有益臣等遵㫖請交額駙策凌均匀給賞尋䇿凌奏請留駝一萬馬二萬羊二萬以備軍營之用軍機大臣等請仍令遵㫖辦理奏入上從之九月壬午夷使吹納木喀等自哈丹和碩起程進藏侍郎玉保等傳㫖加賞口糧換給駝馬癸未訓飭哲卜尊丹巴胡土克圖辦理軍機大臣等奏言據侍衞常吉圖等報稱胡土克圖欲往額爾得尼招寺廟禮拜職等告以理應奏聞俟命下遵行伊言諸事已備前往無妨即於八月十六日自庫倫起程臣等查胡土克圖年少無職任意而行其徒楚揚托音及圖謝圖汗敦丹多爾濟既不阻止又不具報均屬不合請交部察議奏入得㫖胡土克圖欲往額爾得尼招禮拜應候朕㫖若果奏請朕自必准行乃並不具奏又不納侍衞等規勸之言急行前往甚屬錯誤著飭行餘依議戊戌準噶爾部人額勒伯克夫婦來降命賞給安插如例冬十月甲戌安西提督永常奏報準噶爾進貢使臣圖爾都等入境十一月辛巳自準噶爾脱出經拉達克送歸之馬甲卓鼐奉㫖引見授為䕶軍並賞銀五十兩戊子準噶爾部人額爾竒沙喇率弟烏蘇都姪和尼青來降並命賞給安插如例安西提督永常奏報貿易夷人圖卜濟爾哈朗等入境丙申恩免那克素番民應納銀兩上諭内閣曰據副郎都統拜奏稱那克素三十九部畨民豫備馬匹牲畜為接濟䕶送夷使官弁之用因官弁等其力尚堪自給並未動用番民所備等語此次雖未經應用但伊等番民生長邊末感激國恩黽勉急公甚屬可嘉應施特恩將伊等明年應納錢糧盡行寛免以示鼓勵十二月甲寅侍郎玉保等奏報夷使吹納木喀等自藏起程還部癸亥命準噶爾回藏之喇嘛羅卜藏丹怎來京安置將軍烏赫圖等奏言夷使吹納木喀帶回藏地之喇嘛羅卜藏丹怎經臣等詢問係從前策妄阿喇布坦留下未經遣回之人居住二十六年今因熬茶之便懇求回藏並無别情請照上年喇嘛噶津林沁之例留於羅倫布廟居住交與郡王頗羅鼐善為防範奏入得㫖羅卜藏丹怎係在準噶爾久居之人不可深信若令在藏居住恐有私行送信之事著索拜將羅卜藏丹怎及從前回藏之噶津林沁等俱送至京師寺廟安置甲子夷使圖爾都等至京進表謝恩並貢方物準噶爾台吉噶爾丹䇿零謹奏大皇帝使臣吹納木喀得從噶斯路進藏補給口糧並准每年遣二三十人查閲托爾輝又至肅州貿易人等不論何時一聴其便來京貿易者若畏京城路逺即在甘州凉州蘭州西安等處貿易皆䝉降㫖允行甚為感戴懽悦謹使圖爾都等謝恩恭請大皇帝萬安貢玉碗一隻馬二匹貂皮三十張奏入報聞丙寅準噶爾部人那木喀濟木扎率屬十人來降命賞給安插如例丁丑賜圖爾都等入覲乾清宫并令進觀步踏上諭圖爾都等曰朕本欲眀年召見爾等賜予筵宴因爾等求觀步踏故今日即令瞻仰噶爾丹䇿零疏内稱前往西藏之人准由噶斯路賜助牲畜毎年准派二三十人巡閲托爾輝等處故遣爾謝恩請安朕深為欣慰一應進藏所加恩典吹納木喀回巢時自然詳悉告知爾台吉查閲托爾輝乃係朕諭㫖但疏内又稱貿易之人不論何時皆可前來來京貿易者在甘凉等處任便皆准貿易並非朕之原㫖朕大臣等奏言此係噶爾丹䇿零巧詐以圖僥倖朕言噶爾丹策零未必如此巧詐葢伊使者禀告之誤也昨朕大臣向爾訊問果係爾等誤告之故大凡為使之人往返勞頓詞語繁多隻言片語保無錯誤朕亦不追咎爾等但爾等歸時須詳告噶爾丹䇿零知悉貿易之人於限定年分或春夏或秋冬總在一年之内不論何時皆准進邊貿易非不分年限無論何年皆可前來也若來京貿易亦應在定限來京之年但爾等貨物皆係自備脚力原屬艱難京師道逺力不能前即在肅州貿易亦屬可行肅州與爾游牧相近尚可獲利若在甘凉等處實屬不便朕並非以爾等為外夷不令留頓甘凉也爾等來時並從彼處經行其地皆屬褊小商販無多爾等貨物到彼若貨賣不盡將䭾載回歸耶抑久住以待售耶勢必反至失利於爾等何益肅州亦屬褊小不比京師因前既與爾國議定先期傳集商人至彼與爾貿易若無指定之處商人豈能各處豫備耶如欲來京貿易於定限年分仍來京不然即在肅州亦可朕此等籌畫皆與爾等有益爾明告噶爾丹策零知之夷使圖爾都叩謝奏言大皇帝諭㫖甚是所稱貿易無論何時與甘凉等處皆可貿易之語大皇帝敕書内實未開載我等來時曾向中國大臣言及意謂已經許可誤行禀告噶爾丹䇿零遂據我等之言寫入疏内乃我等之過非噶爾丹䇿零有意如此也上諭曰偶爾錯誤朕不責備想噶爾丹策零亦未必歸咎於爾爾等可勿疑懼惟以朕敕書開載者為憑自屬妥協但一切事宜既經議定自當永逺遵守今初次舉行即便反覆可乎不惟於事無益衆人觀瞻亦屬不雅朕前降㫖甚明豈有即行更改之理可傳諭噶爾丹䇿零其善體朕意圖爾都奏稱一切事宜大皇帝皆已降㫖敬謹記憶回時詳告噶爾丹䇿零知之乾隆九年春正月壬午賜凖噶爾使臣圖爾都等宴先是辦理軍機大臣等奏言準噶爾使臣圖爾都奉㫖於豐澤園設帳殿筵宴請照從前筵宴吹納木喀之例具儀以聞奏入報可至是命尚書班第等預引圖爾都於聖駕未臨之前立首班大臣末齊跪迎駕上陞座引進行禮傳㫖諭圖爾都以爾極其誠敬皇上特加恩寵不以外國異視與中國臣工一體行禮夷使叩謝入宴復傳諭㫖因爾台吉噶爾丹䇿零恭順遣爾來請朕安爾亦誠敬可嘉故特加恩賜宴爾於宴所可隨意醉飽以盡爾懽勿以大禮所在致生拘束所演各藝爾詳細觀看俟回時告知爾噶爾丹䇿零可也上親賜大臣酒時召圖爾都近前跪賜飲三爵並傳㫖賞噶爾丹策零粧緞漳絨寧紬各二端玻璃器六事琺瑯器四事使臣圖爾都大緞四端玻璃器四事白銀二百兩庚寅駐藏副都統索拜奏報熬茶夷使在藏言語情形索拜奏言據郡王頗羅鼐吿稱上年十月初四日夷使喇嘛尚卓特巴宰桑吹納木喀至大小廟拜佛謂頗羅鼐曰我噶爾丹䇿零聞拉達克人言土伯特黄敎盛興今我等到此黄敎果覺興旺比前不同頗羅鼐答曰我土伯特地方不特黄教日興民生亦日安樂此皆大皇帝廣興黄敎撫輯羣生所致十月二十二日尚卓特巴吹納木喀又謂頗羅鼐曰噶勒招穆倫河邊之䇿地方原是温都遜喇嘛等坐禪之廟聞此廟破壊我噶爾丹策零令我等攜帶銀兩而來欲煩王子代為修廟令温都遜衆喇嘛照常坐禪頗羅鼐答曰我仰賴大皇帝洪恩豈不能修一廟宇但喇嘛坐禪常在山上葢房所以䇿地方不必重修况汝台吉噶爾丹䇿零並未奏請在彼處脩廟我未奉大皇帝諭㫖何敢擅行十一月二十六日第巴喇嘛與宰桑巴雅斯瑚朗謂頗羅鼐曰我等到大小各寺廟熬茶留心細看宗喀巴佛之黄敎實屬比前興旺衆喇嘛亦覺齊整甘珠爾經丹珠爾經甚是靈應乞王子將汝誠心扶助黄教所行一切事體寫明付我等攜歸與噶爾丹策零觀看頗羅鼐答曰我本土伯特地方一㣲小台吉䝉大皇帝隆恩拔至郡王振興黄敎成就甘珠爾丹珠爾經以安土伯特之人此皆仰賴大皇帝之恩非我力所能成就若將我如何振興黄敎之處寄與噶爾丹䇿零我自愧無能不敢矜誇此事亦不可行第巴喇嘛宰桑巴雅斯瑚朗又曰我準噶爾地方並無好額木齊噶爾丹策零分付我等熬茶事畢將好額木齊與通經好大喇嘛延請一位帶回乞王子即為給發前去頗羅鼐答曰汝等欲請好額木齊及通經好喇嘛並未奏請大皇帝既未奉大皇帝諭㫖此事我何敢専主自夷使至藏後言語情形稍有闗繫者只此數項理合奏明奏入得㫖所奏俱悉頗羅鼐所辦一切事務俱極得體甚屬可嘉著傳㫖奬諭辛夘川陜總督慶復奏報貿易夷人圖卜濟爾哈朗等至肅州甲午召諭夷使圖爾都上召圖爾都入見於圓明園賜觀煙火諭之曰朕召見爾等三四次矣爾貿易事竣即可啟行歸告爾台吉噶爾丹䇿零一切事宜總憑朕所降謄黄諭㫖為定和好之事以信為本既已議定永逺奉行不爽使内外羣生均得安樂不亦善乎辛丑命恩賞郡王頗羅鼐上諭内閣曰此次準噶爾之人入藏熬茶所有賞給路費口糧雖係動用帑項豫備而郡王頗羅鼐實心効力凡來使所用之物一切俱辦理妥協甚屬可嘉著加恩賞蟒緞二端大緞四端即交與來使齎往壬寅賜準噶爾台吉噶爾丹䇿零勅書奉天承運皇帝詔曰爾奏疏内稱據使者吹納木喀歸奉到諭㫖我屬前赴西藏之人准由噶斯路行走賜助牲畜盤費托爾輝地方每年遣派二三十人前往查閲是以遣使者圖爾都具奏恭請聖安朕欣悦嘉納又奏稱曽經奉㫖來肅州貿易之人無論何時乗便而來來京貿易之人願赴京者聴其來京若以京師遙逺准在甘州凉州蘭州西安等處聴其所願貿易其貿易時與通事同往街市購買需用貨物等語此則與朕原降諭㫖迥異故我國大臣向爾使者圖爾都訊問據云大皇帝諭㫖内原未諭及兹事吹納木喀等曾向大人言及以為大人業已允行是以歸而誤告噶爾丹䇿零噶爾丹䇿零誤以為大皇帝諭㫖故寫入奏疏等語大凡使者往返行走語言繁多隻言片語豈無舛錯朕亦不咎既係爾使者誤告爾宜仍照朕前㫖遵行其來肅州貿易之人於應來年分無論何時隨到皆可准其進邊貿易至來京貿易之年爾等以京師遥逺難以前來欲在肅州貿易亦可若甘州凉州等處地方褊小商賈聚集無多與爾等交易無益朕為大皇帝事若可行則施恩准行和好之事必慮久逺既已議定永逺遵守不爽始為有信今特頒詔㫖付爾使者齎回隨勅賜佛二尊並賞各色緞十端錦緞粧緞各八端玻璃磁器十五事乙巳準噶爾使臣圖爾都自京起程還部二月庚戌命傳㫖奬諭郡王頗羅鼐駐藏副都統索拜奏言郡王頗羅鼐告臣等云準噶爾來使第巴喇嘛吹納木喀等於啓行先一日過我辭别據吹納木喀云自今以徃我台吉噶爾丹䇿零於大皇帝前永矢恭順闡揚黄敎不但兵弋永息羣生亦皆樂業不知如何始得結信於大皇帝可以永久不渝我答以大皇帝包容四海以天地為心與日月並明中外並無岐視諸部之人悉皆一體同仁即如爾等至藏熬茶大皇帝格外加恩賞給馬駝路費俾極充裕爾等將還又加恩賜爾熬茶之事得以完善者悉由爾台吉於大皇帝前恭順有加誠心懇請之所致也聞爾台吉素奉黄教自今以後惟有恭敬釋迦佛常如臨之在上䖍心供奉事大皇帝恭謹彌篤一切悉遵諭㫖訓誨必得厚福我土伯特雖為黄敎藏地前此初無如此蕃盛唐古忒人亦從無如此安樂後因大皇帝廣闡黄敎休養衆生是以自五世達賴喇嘛班禪額爾徳尼至我頗羅鼐悉予印授封疊荷隆恩有加無已人物愈加庶富此䝉古唐古忒人所共知者爾歸將我言告知爾台吉噶爾丹䇿零是否任其自擇吹納木喀等皆以為然彼又云聞前入藏人言此地唐古忒人不能乗馬兵械亦不完備今我至喀喇烏蘇時爾子扎薩克台吉珠密納木扎爾率兵迎接將軍侍郎觀爾地之人乗騎兵械亦甚可觀我答以此乃興黄敎之地素不以武備為事因爾前台吉起兵襲藏我唐古忒始重武備悉加意練習且大皇帝加恩令我統轄藏事我悉力簡閲甲兵繕治軍械他部即有以兵犯我邊圉者亦久已有備䝉古唐古忒兵藉大皇帝天威足資抵禦等語吹納木喀等唯唯而退奏入得㫖頗羅鼐與夷使應答言語極為得體此皆伊平日感朕厚恩實心報効是以所言皆合朕意實屬可嘉著傳諭頗羅鼐知之三月丙戌恩賞在藏熬茶辦理夷使郡王頗羅鼐子公朱爾默特䇿卜登等緞疋有差上諭内閣曰此次準夷進藏熬茶郡王頗羅鼐之子公朱爾默特䇿卜登等感戴朕恩管轄兵丁暗中防範各處卡哨出力報効殊屬可嘉應加特恩賞給頗羅鼐長子公朱爾默特䇿卜登次子扎薩克頭等台吉珠密納木扎爾辦理噶卜倫事務公班第達蟒緞各二端大緞各二端賞給噶卜倫扎薩克頭等台吉䇿凌旺扎爾布隆燦色玉特塞卜騰扎薩克頭等台吉齊旺多爾濟大緞各一端官用緞各二端再賞給岱綳羅卜藏達爾扎章魯占巴達顔台吉巴扎爾鼐大縀官用緞各一端以示鼓勵己丑駐防軍營㕘贊大臣副都統慶泰期滿以副都統保徳代之庚寅駐藏副都統索拜疏奏酌議安置準噶爾回藏喇嘛噶津林沁及解送羅卜藏丹怎來京事宜索拜奏言上年十二月内奏諭㫖令臣於準夷熬茶事竣將自準噶爾回藏之喇嘛羅卜藏丹怎及噶津林沁等一併送至京師寺廟安置臣當即傳諭郡王頗羅鼐據云喇嘛羅卜藏丹怎噶津林沁俱在準噶爾久居人不可信但噶津林沁乃拉達克人幼為班禪額爾徳尼弟子居扎什倫布廟我猶及見今自準噶爾回藏後我留意訪察不惟無偵探消息行間搆釁之事於班禪額爾徳尼實亦誠信敬奉今若移送京師拉達克人必得聞知若失其意後此探報準噶爾消息恐致阻礙且噶津林沁年已七十餘病腫衰殘餘生無㡬我令可信人時嚴防範必不致有啟釁之事我意噶津林沁不必赴京止將羅卜藏丹怎解送京師似為妥協等語臣思噶津林沁為拉達克人未入版圖而年老病廢移送京師彼或以老病為詞請將羅卜藏丹怎遣員解送京師噶津林沁候㫖定奪奏入得㫖著照頗羅鼐所請行惟防範之事頗羅鼐宜益加勸勉為善甲辰川陜總督慶復疏奏籌辦準夷肅州貿易事宜慶復奏言肅州鎮道呈報準噶爾甲子年貿易夷人於正月十三日到肅所攜貨物俟派出商人李永祥至肅交易其羊二萬三千餘隻路逺羸痩水草不宜夷人急於求售李永祥尚未至肅且為數甚多亦難悉售之近地應倣安西之例於公帑給值以羊分予提鎮標兵扣餉償帑但夷人索價甚昻尚未議定臣查夷人無知索值但當從容開示以釋其疑至今年已定以貨易貨之例雖前在哈密曾給現銀今在肅必將羊價議定併入諸貨之内令商人以内地貨物互易至商人到肅不能牽羊逺售分予各兵以餉抵值此係内地自行變通辦理之道但期於兵有益議亦可行復准甘肅撫臣黄廷桂手札及肅州鎮道呈報云准夷貿易方經定例以貨易貨夷人所攜貨物羊與馬駝計值銀四萬兩有竒因聞肅州地少巨價必招商異地夷人殊窘迫求售及聞以貨易貨則云上年東科爾全數給銀固為大皇帝格外深仁而俄羅斯各處我部曾有人往彼見其與内地交易有貨物有金銀何以今年肅州概不給發若盡以貨易我輩寧攜歸貨物此事所闗頗重倘夷人於以貨易貨之外仍不免索銀應如何辦理囑臣札復臣復札云準夷年來貿易獲利數倍今當恪遵諭㫖堅持易貨始可遏其無厭之心該夷今年所攜皮貨甚少而羊與馬駝值銀不過數萬彼攜回原貨之説亦狡獪之詞然因時制宜亦不必遽令觖望葢示以以貨易貨之常例可杜日久無己之貪心今若稍以銀互市再為申明定例堅其後約亦為兩得然必須文武曉諭俟商人熟察夷情詳定價值如果感服公平方稍為給銀一面辦理一面奏聞始覺周密惟當仰體聖主撫戢萬方之意審其輕重妥協辦理奏入報聞平定準噶爾方略前編卷四十七
