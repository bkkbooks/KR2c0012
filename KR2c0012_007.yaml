  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_007-1a, image: WYG0357/WYG0357-0124a.png}
body:
  text: 康熙五十八年冬十月丙寅訓飭議政大臣先是督理軍餉侍郎敦稗疏言臣等於康熙五十六年八月中收都統圖思海等先後運到米三萬五百石已散給官兵一萬七千二百五十餘石存米一萬三千二百四十餘石足支八月但道逺不可不預為儲備請明年仍挽送如故靖逆將軍富寧安復疏言都爾博勒津厯年所收穀令滿洲蒙古緑旗官兵自運至軍圖古里克官種所收穀用駱駝以次運至軍並未支用正帑今主事達理等捐種青稞一千八百餘石當自挽運至軍乃止送哈密復動支帑銀七千二百餘兩始運至營請令侍郎海夀責達理等如數繳納富寧安又疏言自哈密至巴里坤今已成通衢當減自哈密挽糧至軍腳價計糧一石減銀五錢額敏在塔勒納沁所種青稞挽送哈密計一石減銀三錢自哈密挽運至營計一石減銀五錢凡減銀四千四百兩有奇今當給銀三萬九百兩有奇請令甘肅巡撫綽奇如數速解令侍郎海夀運哈密所貯糧及額敏於塔勒納沁所種青稞至軍其在圖古里克諸處捐種人等應納穀令侍郎海夀使人自挽運至軍議政大臣議悉如所請至是上諭議政大臣等曰爾等皆係議政大臣凡議政諸事並不留心俱草率議奏聞自備運米人員親身並未前往將官駝所運米石以為本身運到竟邀議敘自備種地人員並未種地交糧而管理種地之人希圖利益揑稱交糧入倉亦邀議敘現今倉內米石已致缺乏所以侍郎敦稗等奏請明歲運米應作速運到以補缺乏爾等於諸事不甚留心草率議奏之處朕已屢降諭旨嗣後爾等須加意恪遵十二月丙辰命議政大臣及大將軍等詳議進藏軍務議政大臣軍前召至大臣九卿等集議進藏一事奏入得旨此議尚未周詳只議西地進兵並未議及阿爾台巴里坤兩路之兵兩路兵會合取吐魯番若烏魯木齊難以堵塞看守應將兩路之兵會合襲擊或各減騎進入震懾從呼爾逹爾之處襲擊則彼必畏懼自然棄此牧放牲畜之處而去再聞知西地大兵進勦並兩路兵襲擊不但驚惶無措亦且首尾不能相顧矣額駙阿寶所屬厄魯特兵五百名察哈爾兵四百名令帶往取藏此柴達木所有之兵亦令前往取藏大將軍留駐穆魯烏蘇三千兵內令派兵一千前進大將軍處之兵若少將京師每佐領下派出護軍二名馬兵一名於二月內起程前往西寧今新瑚畢勒罕奏稱各處俱有禪牀皆可安設若為我興兵實關係衆生此或是新瑚畢勒罕之意或是青海台吉等畏懼策妄阿喇布坦密囑新瑚畢勒罕奏亦難預知倘新瑚畢勒罕與青海台吉等意同此新瑚畢勒罕不可往送青海台吉等若無此意必將新瑚畢勒罕送往安設禪牀廣施法教令土伯特之衆誠心歸向則策零敦多卜自畏勢逃遁我師進藏定立法教之後或留兵一二千暫行看守或久住則土伯特之衆即如我兵縱策妄阿喇布坦策零敦多卜發兵前來伊係勞苦之兵我則安逸之兵即可勦滅朕意如此事關重大不可急迫從容周詳定議為是今若照衆大臣議惟行看守自西寧至四川雲南內外土番雜居一處西藏之人皆係土番伊等俱是一類倘藏地被策零敦多卜占據則藏兵即是彼之兵丁而邊疆土番豈能保全爾等暫且看守之議不合著另行周詳定議具奏尋議覆曰護送新瑚畢勒罕兵止八千勢稍弱當益兵四千令額駙阿寶親率厄爾特兵五百副都統常齡率察哈爾兵四百更於柴達木駐防都統阿爾納所屬兵二千中撥千五百人令侍衛阿齊圖等率之大將軍留駐穆魯烏蘇兵三千中撥兵千六百人與俱凡兵萬二千遣大臣一人授以將軍印敕令統諸軍進發封新瑚畢勒罕為達賴喇嘛應給印敕名號令所司議奏都統延信楚宗公策旺諾爾布侍讀學士常授等還時令與大將軍集議青海台吉等若誠心護送即令新瑚畢勒罕與馬兵同發若必俟事定日送往令暫居滚穆布木廟中先遣大兵攻取藏地令阿寶所領兵五百及察哈爾兵四百滿漢兵二千青海兵二千並駐劄防守更令都統法喇等酌量統兵由巴爾喀木一路進令噶爾弼年羮堯撥兵二千赴法喇軍於都統武格所統兵中選滿兵一千緑旗兵二千滿兵令都統武格副都統吳訥哈統之緑旗兵令總兵官趙坤馬會伯統之與法喇軍會軍當於何日發及會於何地令大將軍檄諸軍定奪更於阿爾台三萬兵中選兵一萬五千令持三月糧於六月杪自布拉罕布魯爾兩路進若策妄阿喇布坦無備即深入襲擊若彼覺之即引兵還於巴里坤一萬三千兵中選兵一萬令三千人輕騎襲吐魯番二千輕騎襲擊烏魯木齊餘兵五千徐徐前進令於襲擊烏魯木齊軍後策應軍中人悉持二月糧於七月初與阿爾台兵約期同進其襲擊兵及駐劄兵當以何人統之進藏兵於軍前諸大臣中以何人為將軍及西寧等處提督總兵官中遣何人往伏候諭旨奏入得旨此議甚詳事務關係重大著行令大將軍等與青海台吉等公同定議具奏戊午運大同府倉米一萬石至軍山西巡撫蘇克濟疏言兵部行文來年仍運瑚坦和碩米一萬石至軍臣按往者運米至大同購募夫車赴瑚坦和碩所需駱駝及鞍屉等物費銀萬餘若以大同府大有倉所貯米由得勝路挽運道里既近且省夫車之費議政大臣等議如所請奏入上從之己未都爾伯特固山貝子阿金卒以其子巴圖襲爵庚申調古北口宣化二鎮兵赴西寧上諭議政大臣等曰古北口宣化二鎮兵丁壯健著每處各派兵五百名發往西寧爾等議奏尋議曰令古北宣化二鎮各撥兵五百古北口兵令副將韓良輔率之宣化兵令副將陳棟率之並於二月啓行赴西寧奏入上從之辛酉蠲免陜西沿邊州縣衛所來年田賦上諭户部曰朕惟治天下之要務首以乂安民生為先故自御極以來於閭閻疾苦無不博咨廣詢渙敷庥澤其有動民力之處尤惻然軫念刻不能忘蓋六十年如一日也比年因策妄阿喇布坦狂逞跳梁興兵征勦逺厯邊陲其沿邊數處師旅屯駐一切雖皆支用正項錢糧而協辦轉輸行齎運送之事民力勞瘁朕心時切憫念曾將陜西甘肅所屬康熙五十八年額徵地丁銀一百八十八萬兩零厯年舊欠銀四萬兩零特沛恩綸悉行蠲免而沿邊各州縣衛所軍行既多飛挽之勞辦賦復滋催科之擾若非格外加恩小民恐致失業所有沿邊一帶陜西所屬府谷神木安塞綏德米脂安定吳堡保安榆林保寧常樂雙山魚河歸德響水波羅懷逺威武清平葭州龍川鎮靖鎮羅寧塞靖邊栁樹澗安邊磚井定邊饒陽水堡高家堡甘肅所屬山丹高臺古浪莊浪西寧肅鎮寧夏左屯中屯平羅中衛靈州寧州平涼衛固原州鎮戎西安阜城甜水河州蘭州洮州寧夏前衛平涼縣固原衛河州衛蘭州衛慶陽涼州衛永昌衛鎮番衛甘州左衛右衛肅州衛鎮彞所等六十六州縣衛所堡康熙五十九年錢糧米豆草束俱宜蠲免但目今係有軍務之時除米豆草束外將康熙五十九年額徵銀九萬八千一百兩零盡行蠲免爾部行文該督撫通行曉諭實心奉行務俾均沾德惠以副朕曲軫邊民之至意倘或借端科派澤不下究該督撫嚴察指參從重治罪爾部即遵諭行壬戌撥在京滿洲兵赴西寧議政大臣等遵旨議奏京城滿洲兵每佐領撥鳥鎗護軍一名護軍一名鳥鎗馬兵一名以護軍統領一人副都統二人領之每旗遣護軍參領一人每翼遣鳥鎗護軍參領一人驍騎營所屬火器營各遣參領一人為長即赴西寧所遣大臣等官給五年俸兵丁給二年錢糧驍騎營兵為一隊以副都統一人領之護軍為一隊以護軍統領一人副都統一人領之悉於明歲二月啓行再前者令山西大同平陽等處緑旗步兵一千在甘州備調今發兵萬二千人進藏明年若送達賴喇嘛登禪榻即令甘州兵一千前赴防衛奏入上從之康熙五十九年春正月壬申誥諭滿漢大臣上諭議政大臣等曰太祖太宗時滿洲兵凡遇征戰馬匹口糧自備行走所向立功並無遲誤今官兵行走處馬匹口糧器械等俱給帑置辦且以為不足而怨咨生焉此皆由該管官不行嚴飭之故也朕辦理軍務閲厯甚多向時攻取嶽州但從陸路抵禦許久不克朕諭令於洞庭湖務備船隻以水路遏賊貝勒察尼奏湖中風浪甚大船不能行恐有礙於兵丁請撤戰船朕諭以嶽州城已被困不久即下若將戰船撤回賊得由水道往來何能有得嶽州之期哉於是不撤船兵嚴飭看守未幾而嶽州下矣再征討雲南時滿漢官兵合計四十餘萬貝子章泰等離雲南城四十里安營一面臨湖一面抵山並未設兵湖中斷其水路致賊寇米糧照舊運行城內並無危急後趙良棟率寧夏兵至云我等大兵連營四布不就近速戰逮至日久米糧不繼滿兵無妨緑旗兵何以存立耶章泰云皇上豢養之滿洲豈可輕進委之於敵且爾兵逺來亦宜休養何可令其傷損趙良棟不從章泰之言自率標兵前往力戰奪取得勝橋而趙良棟之兵亦瘁甚矣章泰又向趙良棟云爾兵已瘁應暫撤回令總督蔡育榮率兵看守趙良棟云我死戰所得之地肯交與他人看守乎因此章泰亦進軍圍城賊兵被逼而出在桂花寺地方與我兵接戰大敗之吳世璠等倉皇失措無所逃匿乃自殺餘賊獻城投降此亦由決於進戰乃得成功也再出征烏蘭布通時阿密達因天晚撤兵云皇上必不以撤兵故遂殺我等將兵撤退索額圖明珠選勇士數百人近身防護勇士云挑選我輩原擬或戰或追詎意止令防護共生忿怨後中路出兵時令大臣官員等會議進兵之處衆皆謂不可獨朕與費揚古以兵為可進決意進兵及至科圖地方衆皆不欲前發大臣等勸朕撤兵朕諭以祭告天地太廟社稷親統兵前來不見賊蹤如何驟行撤去不允所請將兵前進噶爾丹聞我兵威甚是驚懼鼠竄而去朕選兵令馬思喀為將軍尾追噶爾丹又遇西路兵攻擊大敗之朕將中路初次運到之米遣明珠速送至費揚古軍前二次米亦即令續送三次米內朕但留十八日口糧餘俱送西路軍前是以西路兵丁未至飢饉得保全而回彼時若輕信大臣等言中道撤兵則兩路兵丁安得立功奏凱耶今觀領兵大臣官員等祗為保身之計不以國事為重內存私意彼此爭論不和又向兵丁等沽名市恩多取口糧及不能馱載至於拋棄全無珍惜之意如此居心行事可乎朕之滿洲兵俱極精練全在領兵者將國家之事専心辦理不圖安逸賞罰嚴明則斷無錯誤進兵西藏時色楞不候衆人獨自前往額倫特亦隨後追至為國家奮不顧身雖至失機豈可論伊等進兵太速乎今策旺諾爾布係差往策應之兵而遲延不前雖伊所統兵丁善全而歸伊屬下之兵固然感念於國事有何禆益惟西路陳亡兵丁朕甚為憐憫當分别加恩至大臣官員等在部院衙門亦能清亷自守若行軍大事義非僅清亷自守者能勝任也朕年少時每於講武練兵等事違命者必懲以法內外大小悉知警惕由此觀之訓練之事不可疏忽也兹衆喀爾喀及青海等俱服朕之風化而策妄阿喇布坦之人霸占藏地毁其寺廟散其番僧青海台吉理應棄命忘身奮勇致討乃伊等口稱維持黃教却無實心效力之人策零敦多卜領兵在藏以我兵隔逺不能往救朕思伊等兵步行一年有餘忍飢帶餒尚能到藏我兵顧不能至乎今滿漢大臣咸謂不必進兵朕思此時不進兵安藏賊冦無所忌憚或煽惑沿邊諸番部將作何處置耶故特諭爾等安藏大兵決宜前進臣等謹按夏后恭行天罰實賞用命文王赫怒整旅以篤周祜夫命之所出決之一心而其祜及於世世聖人所稱我戰則克者也伏覩我聖祖仁皇帝於西藏之役既命將軍等出師擊賊至是復諭中外大臣以決策進兵之意詳舉下嶽州討雲南征烏蘭布通及中路進兵一切大功之成並由獨斷且申言色楞額倫特等之力戰可嘉而策旺諾爾布之遲緩全師為無益於事洋洋聖謨所以作三軍之氣而為萬世長久之計者何其至也於時自六月出師以後八月甲辰將軍富寧安以擒賊之台吉垂木拍爾聞癸亥將軍祁里德以降其宰桑塞卜騰等聞甲子富寧安又以收闢展城及吐魯番部聞九月壬午將軍傅爾丹以擒賊之宰桑貝肯等聞十月庚戌將軍噶爾弼奏克西藏乙卯撫逺大將軍允禵亦奏將軍延信敗賊入藏揆厥所由惟我聖祖先幾默運既命靖逆將軍富寧安振武將軍傅爾丹征西將軍祁里德分軍三道並進以擊策妄阿喇布坦邊境令賊驚擾首尾不能自顧然後定西將軍噶爾弼一軍自拉里入平逆將軍延信一軍自青海入不數月間克有藏地收復疆圉式廓昄章成功之捷為自古所未有夫藏地西直厄爾特南帶諸番形勢互為犄角固勝算所必爭由是而平青海戡準夷定回部恭逢今日肅清西極之閎規實啓於此而推溯當年用兵始末則廟謨之神速貽謀之宏逺不皆於此可覩歟丁酉命撫逺大將軍允禵率前鋒統領𢎞曙移駐穆魯烏蘇管理進藏軍務糧餉授都統宗室延信為平逆將軍率兵進藏以公策旺諾爾布副都統阿琳寶額駙阿寶隨印侍讀學士常授提督馬見伯總兵官李麟參贊軍務調西安將軍宗扎卜駐防西寧平郡王訥爾素駐防古木等地調出征和碩裕親王保泰子廣善和碩簡親王雅爾江阿子永謙固山貝子魯賓護國將軍敬順回京準原任西安將軍席柱赴軍效力席柱呈請自備鞍馬赴軍前戴罪效力議政大臣等議如所請發往阿爾台軍前效力奏入上從之二月癸丑以護軍統領噶爾弼為定西將軍上諭大學士等曰總督年羮堯自軍興以來盡心效力訓練川兵甚是整齊可速行文與年羮堯令伊帶領兵丁進藏授為將軍如有能署理總督事務於地方不致生事者令年羮堯奏聞署理如地方緊要不得署理之人著護軍統領噶爾弼為將軍帶領雲南四川兩處兵馬前進定西將軍印速行送往尋年羮堯奏言四川總督印務一時無可署理者請授噶爾弼為定西將軍給以印信令率兵進藏并調都統法喇於打箭爐駐劄防守奏上從之命封新瑚畢勒罕為𢎞法覺衆第六世達賴喇嘛遣兵送往西藏先是撫逺大將軍允禵奏言臣遵旨傳集青海王台吉等議進兵及送新瑚畢勒罕往藏青海王台吉等皆同心協力願率兵從征并請封新瑚畢勒罕護持黃教至是命封新瑚畢勒罕為𢎞法覺衆第六世達賴喇嘛發滿漢及青海兵送之西行其四十九旗扎薩克及喀爾喀哲卜尊丹巴胡土克圖等亦令遣使護送三月己丑雲南都統武格奏報率兵赴藏都統武格疏言雲南一路滿漢官兵奉調赴巴爾喀木與將軍噶爾弼合兵進藏臣等於二月十二日自雲南啓行又麗江土知府木興請出兵效力臣選其土兵五百令木興之子率之從征奏入報聞丙申靖逆將軍富寧安征西將軍祁里德奏報分路進兵富寧安疏言今歲議發大兵進勦西藏其阿爾台巴里坤兩路兵亦相約進擊準噶爾邊境令賊擾亂可以相機行事臣請率兵三千自烏魯木齊路進分兵四千自吐魯番路進其領兵大臣請旨命往又兩路進兵後請更發兵三千策應餘兵留者暫令副都統雅圖侍郎海夀等管轄奏入得旨令議政大臣等議奏尋議應如所奏其分路襲擊吐魯番兵令散秩大臣阿喇衲率之進發奏入上從之祁里德疏言臣請將阿爾台路兵七千由布魯爾路進將軍傅爾丹將八千人由布拉罕路進襲擊準噶爾邊境餘兵請更遣大臣統轄奏入得旨令議政大臣等議奏尋議應如所奏其兵留者應令將軍顔夀都統穆賽等統轄擇形勝地駐劄奏入上從之夏四月壬寅以巴塘里塘暫歸四川省管轄四川總督年羮堯疏言近者雲貴督臣蔣陳錫請以巴塘里塘地歸麗江土知府管轄臣按巴塘里塘舊為西藏侵據臣宣示聖主恩威招撫投順雖歸蜀歸滇莫非王土但四川現值用兵一切運糧調遣道經巴塘里塘地關扼要撥歸土司則呼之不應移文滇省則往返遲延請仍歸四川管轄以利軍行又都統武格移文云雲南進藏兵當接運三月口糧山高路狹難以挽運請以四川所運米支給按今滇蜀兩省並進兵而蜀省發兵七千滇省發兵三千多寡相懸恐蜀省所運米不足供滇省用議政大臣等議曰應如年羮堯所奏令雲南督撫速運米以濟雲南兵如武格等所領兵已與噶爾弼軍會或雲南運米未到暫撥四川餘糧支給即以雲南所運米如數補還其巴塘里塘地當暫歸四川統轄俟竣事日如原議改𨽻雲南奏入上從之丙寅命靖逆將軍富寧安即軍中簡署副都統管轄駐營滿洲兵富寧安疏言巴里坤現駐西安滿洲兵二千八百令都統晏布副都統鄧其章統轄晏布雖大臣西安非其所轄鄧其章為漢軍副都統事竣後兵丁還西安不知孰為有功孰為無功至未親行陳者更或濫舉邀賞請於西安滿洲協領中每翼以一人委署副都統稽察可杜一切弊竇如蒙俞允請於軍中西安滿洲協領中選列銜名候旨簡用奏入得旨令議政大臣等議奏尋議應如所請西安滿洲兵應以西安滿洲協領委署副都統轄之即令富寧安選委奏入上從之五月辛巳命議政大臣等行文傳諭各路將軍上諭議政大臣等曰今歲稍旱應速行文與各路將軍或營中亢旱馬匹未肥或進兵之路甚旱水草不敷俱未可定勿謂既經議定進兵不敢復以亢旱為辭奏請停止朕念軍務所關甚大從前屢諭爾等及領兵大臣凡軍機之事有今日定議明日又改者未可拘執要在相其機變而行朕於用兵之事必熟思而後頒發旨意若無旨意又恐軍中之大臣難以奉行也然軍中或因亢旱而無水草馬匹倒斃則兵丁如何前進如何回旋明年又如何進兵耶總之雨水及時牧草果好前進自無艱阻應即行進兵倘或亢旱馬匹疲瘦雨水不調牧草不堪則即以不宜進兵之處令軍中之大臣等定議具奏斷不可以今歲若不進兵來年亦可再進作遊移之語陳奏也路途遙逺恐發去文書遲延遺失亦未可定須於明日行文一次續後再行文一次有一處不可進兵即著將此一處奏請停止壬申命調右衛副都統覺羅圖喇參贊振武將軍傅爾丹軍務以征西將軍祁里德軍前副都統穆克登署前鋒統領事戊寅以成都徵糧支給駐防滿洲兵月米年羮堯疏言向例蜀省兵米以銀抵給聽兵自購今成都駐防滿洲兵需米甚多年歲豐歉不一恐一時買食增值請令成都近地州縣有水路者田糧勿以銀代悉令輸米酌給運費載赴成都作滿洲兵月米議政大臣等議如所請奏入上從之六月癸卯靖逆將軍富寧安等奏報進兵日期靖逆將軍富寧安振武將軍傅爾丹征西將軍祁里德疏報巴里坤阿爾台兩路駐兵之處雨水調和兵馬騰壯又偵探沿途並有水草當如原議進擊賊境巴里坤兵於七月初一日啓行阿爾台兵於六月十六日啓行奏入報聞秋七月乙亥命漕運總督施世綸赴陜西勘視黃河運道上諭大學士等曰朕先巡幸陜西曾問黃河水路由河南通至陜西之處地方官回奏不能行走朕思上古大禹鑿龍門通濬水道漢唐之時俱經挽運豈有不能行船之理故特遣皇子允祉往勘允祉乘騎渡黃河至砥柱龍門查看竟可行船由龍門至黃河直通渭河可至西安北門從絳州汾河可至山西太原彼時山西陜西河南將軍督撫等亦曾令會看今總漕施世綸居官素優厯年漕船俱催趲全完並無遲誤本年漕船已經過淮更無他事漕運印務著暫交與總河趙世顯署理施世綸速赴豫省將河南府至西安黃河挽運路徑勘明具奏陜西現存穀石數目亦著查奏今陜西正值軍需之際施世綸暫留陜西令協同鄂海辦理糧餉事務八月甲辰靖逆將軍富寧安奏報敗賊擒其酋都爾伯特台吉垂木拍爾富寧安疏言臣於七月初一日率襲擊兵七千啓行初二日駐廋集選精兵一千輕騎趨烏爾圖晝伏夜行初六日黎明兵抵烏蘭烏蘇之源及烏蘭烏蘇口托和木圖諸處悉無賊哨四向搜捕亦無蹤迹初七日駐兵烏蘭烏蘇口內比暮令一等侍衛哲爾德等率兵赴阿克塔斯二等侍衛克什圖一等侍衛阿玉錫等率兵赴伊勒布爾和碩分擊賊哨頻行時臣密囑哲爾德等烏蘭烏蘇與阿克塔斯相距七十里與伊勒布爾和碩相距百餘里爾等至阿克塔斯近地潛兵以待度克什圖兵已至伊勒布爾和碩即發兵合擊之慎勿急進令賊人覺又與克什圖等約令沿戈壁邊界進兵於天未明時即抵伊勒布爾和碩圍擊賊哨臣率署前鋒統領法瑙副都統常夀等繼進初八日侍衛哲爾德等擊阿克塔斯賊哨賊懼甚望風走我師急追之獲一賊餘入深山潰散侍衛克什圖等擊伊勒布爾和碩賊哨見賊有馬在谷中阿玉錫率十餘騎入谷奪賊馬百餘匹而還賊以我兵掩至據高山險絶處藏身樹石間發鎗抵拒克什圖等率兵奮擊阿玉錫衝入賊中手刃三人我兵殺賊三十餘人生擒二十四人所獲馬匹器械臣即以分犒官兵奮勇者擒獲賊酋都爾伯特台吉垂木拍爾以身負重傷暫送巴里坤副都統雅圖營俟師還即檻送垂木拍爾至京餘賊檻送與否請旨定奪奏入得旨將軍富寧安圍擊賊哨生擒賊二十餘人著行文副都統雅圖派兵送來京師沿途嚴加看守勿致逃亡其垂木拍爾暫停起解俟瘡痍愈後再行解京癸丑征西將軍祁里德奏報敗賊降其宰桑塞卜騰等祁里德疏言臣率官兵進襲恐厄魯特烏梁海等賊邀我師後路即分兵千二百人留阿保喀卜沁防厄魯特賊人往來及索烏梁海賊人潛伏山谷中蹤迹擒厄魯特烏梁海賊四百餘人復於七月二十九日率兵自鏗格爾河進偵厄魯特宰桑塞卜騰等率賊衆赴鏗格爾河據山守險臣遣人招降賊恃險拒敵我師分兩道夾擊之賊衆大潰竄守山麓次日復遣人往宣布聖主威德宰桑塞卜騰等率二千餘人降所獲馬駝牛羊萬餘隻其宰桑塞卜騰等俟師還遣官兵解送京師奏入得旨此次擒獲之人及投降之宰桑塞卜騰等派官兵解送時著喀爾喀協濟先送至歸化城將其中頭目數人驛送至京其餘烏梁海之人交與公博貝等設法護視勿致逃竄甲子靖逆將軍富寧安奏降賊衆及闢展城吐魯番部富寧安疏言散秩大臣阿喇衲等於七月初八日兵進齊克塔木遇賊兵據營擊破之擒殺二十餘人賊衆悉降初十日至闢展城有回子兵守城官兵進擊擒回部一人即遣歸令諭衆回人輩我師為征勦策妄阿喇布坦而來與爾無涉若速歸順即赦勿誅否則破城悔無及矣是日闢展城回部酋長率三百餘人來降十三日大兵至吐魯番吐魯番部阿克蘇爾坦及總管酋目沙克扎拍爾等悉率衆降凡獲鳥鎗五百五十桿駝四十隻馬五百匹阿喇衲等於七月十六日率沙克扎拍爾等及官兵凱旋奏入得旨將軍富寧安所奏著發抄京城傳諸王滿漢大臣等公同閲看九月壬申靖逆將軍富寧安奏報凱旋回營富寧安疏言臣於七月十八日至烏魯木齊不見賊哨即遣兵遍索亦無蹤迹有烏魯木齊及喀什噶爾諸處逃出回人先後來降詢以策妄阿喇布坦消息據言若等乃哈密屬人為賊所掠是月十一日賊目徹格爾得自伊勒布爾和碩奔還云天兵已至台吉垂木拍爾所率兵勦殺無遺以故烏魯木齊所居垂木拍爾屬人及厄魯特衆各震駭奔竄若等乘間逃出來降又言烏魯木齊今年旱牲畜死者甚多臣遣人詳悉偵探與回人言無異其阿喇衲襲擊吐魯番兵先於七月二十四日至烏蘭烏蘇臣所領兵於八月初二日亦至烏蘭烏蘇初三日合兵凱旋初十日抵巴里坤奏入得旨令議政大臣知之戊寅罷雲南總督蔣陳錫雲南巡撫甘國璧蔣陳錫甘國璧奏都統武格將軍噶爾弼自察木多啓行撥用四川雲南二省糧餉奏入得旨蔣陳錫甘國璧皆係地方大臣雲南進藏之兵各項糧餉應預先料理如期運送今蔣陳錫甘國璧於糧餉之事並不留心料理幾至遲誤及大兵進藏之後伊等方以運送米糧之事繕摺奏聞四川之米若不到雲南之兵從何就食蔣陳錫甘國璧顯然有誤軍機俱著革職令自備口糧運米進藏若遲誤不能抵藏即行正法其雲南貴州總督事務著貴州提督張文煥署理雲南巡撫事務著貴州布政使楊名時署理貴川提督事務著河南南陽總兵官張致署理南陽總兵官事務著河南巡撫楊宗義於本省副將內揀選一人題請署理伊等俱著速行赴任壬午振武將軍傅爾丹奏報敗賊擒其宰桑貝肯等傅爾丹疏言臣率兵至格爾額爾格厄魯特人聞大兵即至委棄行帳什物四路奔潰臣等分兵進勦於七月二十一日追及之殺賊二百餘人擒宰桑貝肯等百餘人招降三百餘人獲馬駝器械無算又偵知烏蘭呼濟爾為厄魯特人屯聚耕種之所臣親率兵躪之焚其所積糧草一空整隊而還賊尾我師來襲我師截擊之賊大敗遁請以宰桑貝肯等檻送京師奏入得旨將軍傅爾丹所奏著抄發京城傳諸王文武大臣公同看閲平定準噶爾方略前編卷七
