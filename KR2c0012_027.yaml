  text: 欽定四庫全書平定準噶爾方略前編卷二十七
  hash: sha256:dc40832bedad3e2c4f0d212929a9e84c8a21ed5d265e793f491d33167b7c77c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_027-1a, image: WYG0357/WYG0357-0389c.png}
body:
  text: 雍正九年冬十月乙卯親王丹津多爾濟等大破賊於鄂登楚勒奬賞有差振武將軍順承親王錫保奏言準噶爾賊人大策零敦多卜小策零敦多卜多爾濟丹巴等於八月十一日自華額爾齊斯至索勒畢烏拉克沁留兵四千以為應援率兵二萬六千來犯科卜多等處見科卜多察罕廋爾扎卜堪軍營兵力強盛防守嚴密不敢輕進遂抵克爾倫令賊將海倫鄂勒錐等領兵三千侵掠喀爾喀遊牧大䇿零敦多卜之兵向蘇克阿勒達呼屯劄又令小䇿零敦多卜之子曼濟領兵三千往鄂爾海西喇烏蘇等處劫掠牲畜九月二十日臣令王丹津多爾濟額駙策凌等合兵邀擊賊於蘇克阿勒達呼二十一日至鄂登楚勒遣台吉巴海等領兵六百名夜入大策零敦多卜賊營擒賊三人而還大策零敦多卜遣賊將衮楚扎卜錫喇巴圖魯率兵三千來追巴海等誘至鄂登楚勒大營二十二日王丹津多爾濟策凌列陳力戰自辰至午斬賊將喀喇巴圖魯其錫喇等俱負重傷率賊敗遁我兵復擒殺數百餘賊是夜大䇿零敦多卜等即移營台西里山二十五日賊將曼濟兵亦敗北歸營俱自哈卜塔克拜塔克一路遁去臣等伏思逆賊乘機深入分路侵犯妄思劫掠仰荷皇上天威王丹津多爾濟額駙策凌等奮勇進𠞰直抵賊巢斬獲無算臣等現在選兵追襲其有功將士查明再奏奏入得旨喀爾喀副將軍親王丹津多爾濟郡王額駙策凌等率領喀爾喀辨兵奪勇爭先戰敗準噶爾擒殺追𠞰甚屬可嘉丹津多爾濟從前效力已加恩封為親王著賞銀一萬兩郡王額駙策凌晉封為和碩親王亦賞銀一萬兩扎薩克圖汗親王策旺扎卜雖未歷戰陳在軍營同順承王宣力辦事亦賞銀五千兩其餘王貝勒貝子公衆台吉官員兵丁內懋著勤勞者著順承王查明具奏加恩優賞丙辰順承親王錫保奏撤兩路追襲兵錫保奏言前於鄂登楚勒大敗賊兵臣等隨選滿洲蒙古兵四千名令王丹津多爾濟額駙策凌等分路追擊今據王丹津多爾濟等報稱大兵登達勒畢山瞭望並無賊蹤計賊人由台西里遁去已過阿爾台山難於追擊應即撤兵又據扎薩克圖汗親王策旺扎卜報稱協理台吉拜都卜等率兵追賊過察罕布爾噶蘇至通奇爾見賊人已由必濟巴爾楚克兩路過阿爾台山嶺遁去不能追及應亦撤兵奏入報聞丁巳順承親王錫保奏獲噶爾丹策零偽書錫保奏言據額駙策凌咨稱有親王喇嘛扎卜旗下人額林陳從策零敦多卜營中被我兵擒獲隨嚴加訊問據稱從前於和通淖爾交戰時為賊所虜今策零敦多卜遣令齎噶爾丹策零書一封送致王喇嘛扎卜書內稱我等原係同居一處素相和好因噶爾丹博碩克圖汗與爾等不睦遂各散處今爾等投順中國當差納貢深為爾等憾之爾等本清吉斯汗後裔並非屬人何不仍移遊牧於阿爾台與我同居以聨舊好如有兵戎協力相拒等語今齎原書呈覽奏入報聞寧逺大將軍嶽鍾琪奏禦洮賚賊兵事宜嶽鍾琪奏言烏克克嶺卡倫乃通哈密及五堡要路其附近有廋集卡倫今據廋集卡倫遊擊哈仁鳳報稱有賊四五百人侵犯烏克克嶺傷虜坐卡兵丁即前往洮賚一路等語臣思賊人敢在洮賚逗遛必非無故或以大隊犯吐魯番令此賊衆探信或因北路有事料我軍前往應援令此賊衆窺伺預伏大隊乘虛竊發或欲犯我西路以此為誘令我軍追擊墮其伏中今臣等已行知哈密加意防守並將馬匹收入城中諸事嚴備倘賊兵勢衆則堅壁以挫其鋒若為數無多即行𠞰殺斷不敢貪功妄動有負委任奏入報聞戊午命查勘察哈爾養贍生計上諭大學士等曰八旗察哈爾俱纍世效力之舊人從前征討南方𠞰滅噶爾丹並隨圍出獵以及數年用兵於準噶爾宣力之處不可枚舉此次達什率領察哈爾兵一千名較衆先到軍營又擊敗準噶爾賊人策零敦多卜等奪回駝馬等物甚屬可嘉昨厄魯特大臣來京奏稱舊察哈爾人等之生計反不如新厄魯特等語朕聞之惻憫今沿邊居住之蒙古並王大臣等放馬之蒙古多有伊主不能養贍者似此生計艱難朕心不忍爰命大臣前往查勘令伊等各得養贍將朕此旨通行傳諭訓勉靖邊大將軍傅爾丹等上諭傅爾丹等曰爾等在科卜多地方恃勇輕進墮賊詭計致失地利損兵折將軍前獲罪我朝例所不貸本應執法究治但傅爾丹整頓餘兵回至科卜多地方固守城池賊衆并力來犯復能列陳以待賊人逺遁隨即遣兵各處截殺奪回被掠馬駝此次擊賊可贖爾等前罪今朕已盡行寬免惟陳泰罪不可宥爾等嗣後須黽勉效力朕自格外加恩十一月庚申命寧逺大將軍嶽鍾琪籌畫吐魯番遷移撤兵事宜上諭大學士等曰昨據順承親王及傅爾丹等奏報知北路賊兵已退邊境寧謐已寄知大將軍嶽鍾琪令其不必發兵往阿濟必濟矣但思賊兵雖離北路冬間或向西路自應仍前防範至於吐魯番屢拒賊兵賊人銜恨將來擾害吐魯番勢所必有今雖暫派官兵三千名駐防然究非長久之策回民應否遷移官兵何時可撤著嶽鍾琪悉籌畫具奏命籌和托輝特遷移事宜上諭大學士等曰此次喀爾喀兵丁丹津多爾濟額駙策凌等率領征討並未奏有和托輝特貝勒班第之名伊之遊牧在何處輝特公巴濟已叛降準噶爾喀爾喀公通摩克之遊牧又不知如何今喀爾喀等之遊牧俱已內移若和托輝特移住之地嚴密完善令其居住如稍有可虞即令東移命加賞衮布暨所屬兵丁上諭大學士等曰額駙阿寶之子衮布帶伊屬下兵五百名效力行間勤勞懋著朕曽降旨與嶽鍾琪令其撤回原遊牧處以示寬恤今據嶽鍾琪奏稱此軍在營甚有裨益仍請留駐等語朕念此兵效力已久理應撤回但時值冬寒不便遽撤著暫在軍營俟來年青草發生時再令回伊遊牧處從前已加恩賞著嶽鍾琪再添給銀兩並傳諭額駙阿寶知之班禪額爾德尼貝勒頗羅鼐助獻軍需命如值償之辦理西藏事務護軍統領馬拉額外內閣學士僧格奏言班禪額爾德尼貝勒頗羅鼐遣使齎酥油炒麵牛羊乾糧等物以餉大軍臣等屢却之請益力今收受分賚官兵得旨馬拉僧格可將班禪額爾德尼頗羅鼐所送之物核算價值充裕給與銀兩並傳諭伊等朕遣兵在藏駐劄特為衆唐古忒防守地方使之寧謐豈有絲毫貽纍之理今所送諸物勢必在伊屬下衆人攤派未免滋擾且我兵糧餉並不缺乏無須幫助此番給還銀兩並非外視爾等也可傳諭唐古忒咸悉朕意辛酉命派將士駐歸化城賞賚有差上諭大學士等曰派往歸化城兵二千名著副都統綽爾多同瑚琳帶往綽爾多著賞銀三千兩準備起程乾清門侍衛南岱授為一等侍衛於虎鎗上行走之索倫新滿洲內挑選九名令伊統領隨此次兵丁前往照看馬畜每人賞銀二百兩至一切應得之項仍照出征官兵之例給與黜正白旗蒙古副都統馬哈達以副都統宗室諾穆柱代仍留軍營壬戌命馬爾賽率漢軍兵駐扎克拜達里克並酌緑旗兵分隸留住遣回事宜上諭大學士等曰從前曽令漢軍兵四千名即在歸化城過冬現今賊雖敗遁明年或又來侵犯宜預為防範此四千兵丁俱熟練鎗炮之技令其看守城垣甚有裨益今於年內預備妥協㨂擇吉日馬爾賽統領由上海一路按程至扎克拜達里克駐劄又諭曰扎克拜達里克處發遣人犯俱著從寬免罪即令充為緑旗兵丁給與糧餉在彼效力年過六十以上有情願當兵在彼居住者留作兵丁其並無妻子已過六旬願回內地者俟城工告竣夫役回來時將伊等由驛站從容發回各歸本籍癸亥靖邊大將軍傅爾丹奏報率兵往察罕廋爾日期命順承親王錫保掌靖邊大將軍印傅爾丹掌振武將軍印傅爾丹奏言臣等公同會商以十月十三日大兵自科卜多城起程辨兵各給口糧所有帑銀六十八萬七千三百兩分令各大臣官員兵丁攜帶並將火藥鉛子均勻馱載就近由布魯爾烏哈勒扎沿途食雪向察罕廋爾進發十月十七日行至綽諾海喇琥據振武將軍順承親王咨稱九月二十二日戰敗賊夷大策零敦多卜等俱已逃竄喀爾喀副將軍等分路逺追因賊夷已踰阿爾台山嶺即撤軍回營等語臣遂統率大兵選擇水草休養馬匹往察罕廋爾緩行至奎通烏蘭又咨稱驛站俱已接續所有軍機事件應仍由大將軍處奏聞不必據咨轉奏所有臣等回赴察罕廋爾領兵起程日期理合繕奏得旨傅爾丹既至察罕廋爾著將靖邊大將軍印交順承親王掌管振武將軍印著傅爾丹掌管協同順承親王辦理事務甲子訓飭振武將軍傅爾丹上諭大學士等曰爾等可傳諭傅爾丹伊原與順承親王不合王諸事並無過失近日傅爾丹輕進以致虧損官兵若大將軍印務仍命管理非但衆心不服即傅爾丹心亦不安伊既失蒙古等之心緑旗兵丁亦未必孚信伊所恃者惟數索倫耳豈知首先潰散幾致伊於危殆者即索倫乎順承親王諸事遵朕指示領大兵在察罕廋爾賊夷懼其聲威不敢侵擾旋即敗遁朕今令傅爾丹為王協理以贖前愆至殱賊立功惟王是賴傅爾丹宜悉心盡力勉圖報效若仍執前見妄存私意與王不和不但無益於國家傅爾丹恐益增罪戾矣命約束發往扎克拜達里克漢軍兵丁上諭大學士等曰朕聞漢軍兵四千名自京至歸化城傷損馬駝甚多及至歸化城變賣衣物任意費用甚屬不堪且路途尚近即如此窘迫亦甚屬懦弱著行文馬爾賽此次領兵大臣等若不加意統攝致兵丁仍蹈故轍或有逃回者馬爾賽即行拘拿應懲治者懲治應正法者正法再行文歸化城都統丹津右衛大同宣化等處總兵官凡兵丁家人內有逃回者拿獲奏聞即行正法其不加約束之大臣官員從重治罪馬爾賽將此曉諭大臣官員兵丁知之此兵到扎克拜達里克地方馬爾賽加意操演嚴行約束乙丑議扎克拜達里克等處分路駐兵命馬爾賽為綏逺將軍大學士等議奏言扎克拜達里克地關險要馬爾賽率漢軍兵四千名往彼駐劄應分為八隊諾爾琿富昌帶領首隊於十二月初一日啓行李杕祖秉衡佟時茂劉汝林各領一隊隨後其餘二隊令馬爾賽於營總內選擇二人各領一隊馬爾賽領後隊於十二月初八日啓行殿後倘遇嚴寒大雪難行即在推河等處駐劄俟明嵗春融再至扎克拜達里克馬爾賽啓行後撫逺大將軍印交送康親王暫管另以一印給馬爾賽其領兵至扎克拜達里克時與欽拜阿成阿等所領之兵俱聽順承親王調遣察罕廋爾處所有盛京烏拉及索倫新滿洲等兵應令順承親王在內酌派數百名遣往馬爾賽處充哨探瞭望等役至歸化城亦屬緊要俟馬爾賽至扎克拜達里克時即令馬爾賽將圖爾賽等所領土默特兵一千名遣回歸化城圖爾賽席爾塔仍令同僧衮扎卜等統領喀喇沁兵一千名由扎克拜達里克以至十三臺處分駐照看臺站察罕廋爾處調扎薩克兵二千名令其駐劄推河京城所派瑚琳綽爾多帶往之兵二千名令其於本月擇日啓行前往歸化城俟到彼時精選一千名於二月間令侯馬蘭泰副都統達爾濟瑚琳統領往鄂爾昆西形勝之地與扎薩克兵合為一處駐劄其餘兵一千名令副都統綽爾多統領在歸化城駐劄再派四子部落毛明安喀爾喀烏喇特鄂爾多斯兵二千名令鄂爾多斯王查木陽四子部落王阿喇卜坦多爾濟統轄又選派察哈爾厄魯特兵各二百名令總管雅圖統領俱於明年二月前往烏喇特西界形勝之地駐劄奏入得旨依議馬爾賽著給與綏逺將軍印阿克敦等即令隨馬爾賽前往辦理印務丙寅訓諭喀爾喀青海汗及王等上諭喀爾喀汗王貝勒貝子公扎薩克台吉並各屬下人等曰近日準噶爾賊夷噶爾丹策零寄信與王喇嘛扎卜稱喀爾喀厄魯特法教相同本屬和好及噶爾丹博碩克圖時失睦既而我父追念前好曾屢奏皇帝乞將喀爾喀青海復舊安置今皇帝欲將我如喀爾喀青海入於旗下佐領之內給與封號以故我等興兵至此若能成事則將喀爾喀青海照舊安置即不能成事亦不令統屬於人等語此實賊夷姦詐離間之詭計從前爾喀爾喀人等被噶爾丹戰敗以致失地我聖祖皇考憫念爾等歸誠存恤愛養將喀爾喀諾顔等按伊原品封為汗王貝勒貝子公扎薩克屬下人等俱各賜生業安享富饒令歸原遊牧處爾等之感恩報德同心效力乃人所共悉者準噶爾賊夷出狂悖之言借安置爾等為辭欲肆行擾亂即論爾等之封號親王郡王貝勒貝子等爵位俱係我朝册封宗室子孫兄弟之號其餘臣下雖效力立功並無封貝子之例惟四十九旗扎薩克清吉斯汗之後博爾濟錦氏台吉等誠心歸順我太宗皇帝俱賜以宗室封號視如骨月結為姻親纍世榮寵何嘗視為奴僕乎至編設旗分佐領亦欲其易於查考以便加恩並恐扎薩克等互起爭端之故今已及百年何嘗役使爾等一人乎自分旗以來爾喀爾喀之鄂托克達魯哈等屬便於查管遇飢饉則賑濟之行圍出兵則厚賞之可有催徵之事乎此亦爾等所共知者準噶爾賊夷姦詐狡獪外托黃教而擾亂藏地違背教原口雖稱為青海喀爾喀兩家而又搶掠爾等將胡土克圖俱欲搶奪姦惡極矣且準噶爾一姓自額爾柏克尼古勒蘇克齊汗之後興兵擾亂諸部落殘殺博爾濟錦氏幾至斷絶至今讐怨未已今策零敦多卜前來被爾喀爾喀等𠞰殺敗遁賊夷懷恨必深思欲報復乘隙擾亂若賊夷之事不定則爾喀爾喀不得安衆蒙古亦不得安朕是以不惜國帑發數萬大兵逺行征𠞰綏靖邊圉祗為爾等生全之計也爾屬下人等宜仰體朕心各加奮勉藉朕威力效法此次進兵之王貝勒貝子公台吉等朕必為爾等𠞰滅賊夷永保安寧前者噶爾丹作亂時爾等互為搶掠盜竊今又有搶掠盜竊者此種惡習甚屬愚賤其務力為悛改且爾等既屬內地多年共知法度若舍棄遊牧擅行掠竊干犯王章何不力戰敗夷立功雪恥乎即爾等歸順賊夷亦斷不能保全爾等令爾等安享也爾等宜熟計之又諭青海王貝勒貝子公扎薩克台吉等曰近日準噶爾賊夷遣策零敦多卜二人領賊衆越阿爾台來侵喀爾喀欲搶掠克爾倫及劫取哲卜尊丹巴胡土克圖被喀爾喀副將軍王丹津多爾濟額駙䇿凌等率兵分路迎擊𠞰殺生擒並獲其駝馬賊夷敗遁因轉思離間寄書與喀爾喀善巴戴青王之孫王喇嘛扎卜希圖誑誘擾亂成事喀爾喀深知賊夷詭計父子前後一轍忿怒痛恨不改初心今爾青海台吉等久荷聖祖皇考册封位號褒寵顯榮歷有年所至於編設旗分以便稽查賞賚復恐扎薩克以強凌弱互起爭端譬之厄魯特內有得秦者有鄂拓克者有扎薩古勒者有得木齊者皆為易於管轄而已爾有飢饉朕必加周給隨獵行兵必加賞賚從無徴輸爾蒙古者朝廷恩典至優至渥矣若以封號旗分為賤亦可奏明酌改且爾厄魯特之台吉阿巴賴諾顔之子孫現在準噶爾處果為帥領乎抑為屬下乎即如羅卜藏丹津降附賊夷即將伊所屬分散為奴較之受天朝封號孰榮孰辱準噶爾原係清吉斯汗之奴隸爾等俱係清吉斯汗之弟哈布圖哈薩爾之子孫若以博爾濟錦氏諾顔等之先世論之準噶爾乃爾等之奴隸也奈何甘心自屈受制於奴隸乎可自思之爾等當知賊夷詭計勸諭屬下分别利害令其亦如喀爾喀等之奪勇立功豈可甘為懦怯受賊夷蹂躪乎朕因準噶爾反間致書故又諄諄降旨爾等如能遵行則可以保全妻子遊牧永享安寧之福矣丁卯上諭大學士等曰科卜多兵丁回至察罕廋爾時著烏察喇暫留軍營衮泰來京塔爾岱回原任命厄魯特貝勒多爾濟塞卜騰內移上諭大學士等曰準噶爾賊人策零敦多卜等寄字與貝勒多爾濟塞卜騰原欲傾陷多爾濟塞卜騰欲行離間之意也多爾濟塞卜騰受朕恩甚重伊亦感激效力豈肯墮其術中但伊屬下人等原非伊之屬人與伊不和若仍在喀爾喀遊牧地方難以居住爾等寄信多爾濟塞卜騰令伊父子向內移住朕加恩給與生業將準噶爾賊人所寄之信並與多爾濟塞卜騰觀之戊辰命籌阿濟等處駐防事宜上諭大學士等曰王丹津多爾濟具奏據投誠之尼魯特多爾濟供稱噶爾丹策零現在華額爾齊斯遊牧因有哈薩克之人常來搶掠馬畜殺虜人衆是以噶爾丹策零親統兵一萬在遊牧外相隔一日路程防守等語查華額爾齊斯與伊犁甚逺而云噶爾丹策零在彼遊牧此言固屬謬妄但策零敦多卜領兵現在華額爾齊斯居住不可不預為防範阿濟必濟乃賊人出入之要路今廷臣議稱阿濟必濟在西北兩路軍營之間應駐兵二三千名防守堵禦朕思阿濟等處與巴里坤相隔二三百里從前朕屢降諭旨令嶽鍾琪但經理西路之事而不必防及北路者因彼時賊人情形似欲專擾西路也今賊人既盤踞華額爾齊斯則其意全在北路矣若嶽鍾琪以大將軍擁兵四五萬而但坐鎮無事之堅城於理可乎然廷議於阿濟等處駐兵二三千名朕意以為兵數太少必得萬餘名方為有益爾等行文於嶽鍾琪詳悉妥議具奏至十月間烏克克嶺卡倫被賊虜去兵丁賊人直至南山一帶盜竊馬匹我軍四五萬駐劄巴里坤一聞賊信將馬匹收入城中塔勒納沁離營不過二三百里而不能保護馬匹仍聽賊徒肆行無忌大將軍與數萬官兵未知所司何事爾等行文併及之己巳上諭大學士等曰前派出烏喇特西界駐防之鄂爾多斯王查木陽四子部落王阿喇卜坦多爾濟著來京請旨命員外郎齊里克特閲視喀爾喀遊牧上諭大學士等曰前聞喀爾喀公通摩克被賊搶虜向內遷移遊牧但未知遷於何處著派員外郎齊里克特往通摩克遊牧處將通摩克及伊屬下人內有知曉阿濟必濟等處路程之人一並帶赴京城其附近居住之扎薩克等遊牧一併閲看擢正藍旗滿洲副都統達爾濟為鑲黃旗護軍統領仍留軍營庚午加賞巴里坤等處將士上諭大學士等曰巴里坤所有阿寶屬下之兵甚屬效力已降諭旨加恩賞賚其鄂爾多斯之五百兵丁亦甚效力因彼處不可無蒙古兵丁是以將此五百名兵仍留於巴里坤著大將軍嶽鍾琪照賞賜阿寶兵丁之例賞給其歸化城之土默特兵一千名朕原擬三年撤回今尚未能即撤此土默特之官員兵丁歷年各處派撥亦甚勤勞著大將軍嶽鍾琪亦加恩賞賚其領歸化城兵丁前去之都統根敦先於阿爾台出兵效力十有餘年今又領兵前往朕甚嘉之欲另行更替一時未得其人今特頒恩賚將朕元狐冠一頂貂皮短挂一件􅀈袍一件銀二百兩賞賜根敦辛未命侍衛圖勒車等閲視山丹口等處屯駐事宜上諭大學士等曰自甘州山丹口肅州金塔寺至額濟內古爾鼐坤都倫阿濟達巴漢薩克薩圖古里克洪郭爾阿濟爾罕白格爾等處路程著侍衛圖勒車嚮道侍衛法籌原任協領根敦扎卜等馳驛前往肅州將每站水草路程里數可否設臺運糧駐兵及有遼濶平坦地方可否屯田並賊衆自阿濟前來路程詳悉看明具奏歸時仍從坤都倫進山丹口其涼州邊內路程一併詳細閲看圖勒車等每人賞銀三百兩命順承親王錫保同振武將軍傅爾丹酌撥各路辨兵分駐傅爾丹奏言臣率領大兵於本月初六日已至察罕廋爾京師滿洲兵臣自行統率在察罕廋爾之東巴顔布拉克過冬歸化城土默特之兵令於王桑里達居住之濟斯布隆附近駐劄盛京吉林右衛察哈爾喀喇沁土默特緑旗兵離滿洲營相去五里次第安營黑龍江兵令在大營之北扎哈蘇台呼濟爾圖駐營防守奏入得旨交辦理軍機事務大臣等議奏尋議本月初四日靖邊大將軍印既令順承親王掌管應行文順承親王將各路辨兵擇地屯劄之處會同傅爾丹酌量辦理上從之平定準噶爾方略前編卷二十七
