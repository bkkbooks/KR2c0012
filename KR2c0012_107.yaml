  text: 欽定四庫全書平定準噶爾方略正編卷五十三
  hash: sha256:812f2549d7ae70d6dbe772e7b18aff52dfeb61711f518d38c56ed14b5098dd99
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_107-1a, image: WYG0359/WYG0359-0001a.png}
body:
  text: 乾隆二十三年夏四月丁巳命升敘擒賊琿齊之效力出衆官兵上諭軍機大臣曰據兆惠等奏稱擒賊琿齊並收其遊牧在事官兵俱為出力此內有索倫披甲達木畢勒圖已爾虎披甲多拉瑪索倫委驍騎校阿爾吞已圖濟爾噶爾帶領之厄魯特護軍碩端勞績出衆已將備賞藍翎給令戴用等語官兵等效力出衆勞績可嘉達木畢勒圖多拉瑪著委署驍騎校阿爾吞著實授驍騎校碩端著授護軍校遇缺即補定邊將軍兆惠等疏奏偵探賊衆情形兆惠等奏言臣等昨在濟爾哈朗捉生詢問知哈薩克錫喇等欲攻昻吉岱昻吉岱知覺與特古斯孟克逃出不知所向哈薩克錫喇前往闥勒竒臣等即尋蹤追逐于三月初七日至衛和爾里克據哨探侍衛納蘭圖等在闥勒竒擒獲喇嘛卓特巴錫喇卜等據供昻吉岱等自沙喇擘勒遷移二月十六日渡伊犂河至濟爾哈朗十七日哈薩克錫喇鄂哲特等欲攻昻吉岱不果因前往闥勒竒三月初一日布庫察罕來會云于托里北之托和木圖探知大兵行走蹤迹我等宜將遊牧移往伊犂河又有差往偵探人等歸告在賽里木淖爾東之察罕布木遇大兵前哨拒戰敗回布庫察罕哈薩克錫喇鄂哲特等同議若大兵追逐甚急堅壁以守若未能追及或從塔爾巴噶台入俄羅斯或渡伊犂入回部于初三日即前往伊犂又聞布庫察罕屬人等言伊等前來時舍楞聞大兵信息即過欽達蘭嶺往塔爾巴噶台又昻吉岱因往會舍楞過察罕布木為布庫察罕卡倫人等所殺特古斯孟克與昻吉岱屬人齊默特等同行至洪郭爾鄂博遇哈薩克哨探兵五十餘人將特古斯孟克擒去齊默特得脫來投哈薩克錫喇現在台吉宰桑有鄂哲特瑪里格爾巴朗布圖庫特克勒德克烏爾古勒濟勒達什塔爾巴等又聞吞圗布去年為伊屬人殺害等語又原任侍衛托倫泰等在烏里雅蘇台捉生詢問據供布庫察罕等往伊犂之次日見闥勒竒口有大兵一隊追逐此地現有巴爾達穆特等三十户藏匿等語臣等派侍衛鄂實納蘭圗前往𠞰殺收其牲隻軍器查臣等原議分兵左右翼賊若渡伊犂逃走為右翼兵所扼若踰闥勒竒逃走為左翼兵所扼今賊人雖知覺遷移而䇿布登扎布等現已尾隨賊衆又哈薩克哨探人等既經前來或係踐上年之約且賊衆擕帶户口輜重斷難兔脫臣等晝夜前追並行知和碩齊唐喀祿等堵截以期盡𠞰奏入報聞定邊右副將軍䇿布登扎布等疏奏進𠞰賊衆情形䇿布登扎布奏言臣等分兵前往博羅塔拉進𠞰舍楞布庫察罕等一路晝伏夜行三月初一日至博羅塔拉捉生詢問知舍楞于二月十九日起程取道塔爾巴噶台欲往俄羅斯布庫察罕在闥勒竒賽里木淖爾等處而厄魯特嚮導人等云賊衆或入鄂拓克薩爾亦未可定臣䇿布登扎布過甘楚罕直尋布庫察罕遊牧臣富德紆道一日前往鄂拓克薩爾堵截約于闥勒竒相會初二日臣䇿布登扎布至賽里木淖爾詢知昻吉岱為布庫察罕屬人所殺布庫察罕聞大兵至已過闥勒竒赴察罕烏蘇等處與哈薩克錫喇相會初四日追至和落霍澌河見賊蹤迹即奪渡過河賊已遷移遊牧山上餘衆不多即領官兵四百餘名前進忽伏賊千餘突出直前衝擊因令副都統職銜溫布扎薩克達什居左公品級扎薩克三都卜多爾濟巴圖魯侍衛古爾格勒圖居右臣䇿布登扎布與郡王羅卜藏多爾濟及侍衛官員等居中奮力迎射格鬭良久賊始奔潰又賊衆二百餘名出我兵後復行擊敗計二次殺賊三百餘人緣我兵之馬晝夜趲行疲乏不能窮追暫集兵丁在和落霍澌歇息臣富德搜查鄂拓克薩爾營壘準到知會即趲回同議乘賊人喪膽之際酌派兵丁前往擒𠞰現護布庫察罕之從兄阿都齊解送兆惠軍營所得甲仗賞給奮勉兵丁查原議兆惠過博羅布爾噶蘇臣等過闥勒竒在伊犂會合今布庫察罕等聞風逃竄糾合哈薩克錫喇臣等惟有相機前進仍知會將軍兆惠以便協𠞰奏入上諭軍機大臣曰䇿布登扎布富德等探知布庫察罕往合哈薩克錫喇之信分兵追捕奮力𠞰賊斬獲頗多皆䇿布登扎布勇往所致甚屬可嘉著將從前所賜伊父額駙䇿凌超勇之號即賞與䇿布登扎布副都統職銜溫布著補授副都統公品級扎薩克三都卜多爾濟若已賞翎即賞緞四匹若未賞翎著賞翎仍賞緞二匹扎薩克達什授為公品級其餘效力之侍衛官員兵丁人等即酌量賞翎及造册送部議敘伊等既會兵一處仍候續報捷音以膺懋賞又據兆惠等奏稱哈薩克錫喇布庫察罕等被䇿布登扎布窮追或逃入俄羅斯已行知和碩齊唐喀祿等堵截所見甚是可傳諭和碩齊等嚴行堵截并傳諭成衮扎布朕原擬自科卜多派兵數百名前往䇿應恐未能趲赴但亦不妨預備成衮扎布仍酌量現有兵馬若干交阿桂等豫備䇿應此次𠞰賊兆惠䇿布登扎布等既協力尾追而哈薩克之兵若又對面迎敵前後夾攻賊可全獲至堵𠞰舍楞雖有和碩齊等若發兵一隊尾追亦夾攻之道可傳諭兆惠即派兵數百名仍令䇿布登扎布富德帶領前往相機辦理命原任按察使納世通赴巴里坤辦理糧餉上諭軍機大臣曰按察使納世通丁憂回京奏懇差遣著以原銜前往巴里坤與德舒一同辦理糧餉巴里坤辦事巡撫吳達善疏奏派遣軍營嚮導人員吳達善奏言準將軍雅爾哈善咨稱欽奉諭旨從前駐劄安西旗人內有熟悉回部路徑情願效力者遣往軍營行走但安西距魯克察克路逺恐難趲赴查從厄魯特脫出之旗人內有曾作軍營通事留于巴里坤者應行酌量派遣等語臣等查得前鋒雙全綽克圖護軍拜凌阿七十五明德烏爾德福祿等七人頗熟回部路徑通曉回語情願隨軍營效力臣等照此次進兵之滿洲索倫兵丁例治裝于三月二十日令前往雅爾哈善軍營奏入報聞戊午諭定邊將軍兆惠𠞰賊後來京上諭軍機大臣曰前諭兆惠等將厄魯特等辦竣即往辦回部章奏列名兆惠居首其傳諭事件仍以雅爾哈善首列亦可今思辦理回部既有雅爾哈善額敏和卓且䇿布登扎布富德等亦可協助兆惠久在軍營如已將哈薩克錫喇布庫察罕等擒獲惟餘舍楞著富德前往追𠞰仍令䇿布登扎布往辦回部兆惠即著來京朕既可詢悉軍前情事而伊母年邁亦得以省侍或此時止舍楞一賊即辦竣來京令富德等前往回部亦可朕意因辦理回部無用多人兆惠既可乘便省母稍為休息如有應辦事務再行前往又因一軍兩將恐有掣肘之虞不若事權歸一以專責成可傳諭兆惠等知之諭定邊左副將軍成衮扎布等辦理達什達瓦遊牧事宜上諭軍機大臣曰昨成衮扎布等請遷移達什達瓦遊牧于通肯呼裕爾經軍機大臣議奏俟秋收後辦理朕即諭成衮扎布等將遷移遊牧之事不必先使聞知恐伊等因此懈于耕作今思達什達瓦遊牧移往通肯呼裕爾恐非伊等本意若到彼無計謀生仍須接濟且或致脫逃又滋事端莫若移往察哈爾或在巴里坤附近阿濟必濟等處遊牧俟巴里坤駐兵屯田等事議定即令常住亦可此事仍待朕熟籌交議著傳諭成衮扎布此時惟勸課伊等耕種其應移駐何地俟議定後臨時再行曉諭諭約束發遣種地犯人上諭軍機大臣曰部議于發遣重犯有改發巴里坤等處種地者此等罪犯俱係素不安分之人故陸續發往肅州分派各屯田處所令緑旗兵管束種地如果守分出力自豫矜全若仍不安本業妄行生事或乘間脫逃即當嚴拏正法示衆其管束伊等之緑旗兵丁不得以伊等從內地發遣稍存姑息果有悍惡滋事即行處死亦罪所應得著傳諭黃廷桂將此等人犯扺肅時作何分遣及交與緑旗兵丁嚴加約束之處會同巴里坤魯克察克大臣等議奏己未諭大學士管陜甘總督黃廷桂來京酌議屯田事宜上諭軍機大臣曰昨命兆惠擒𠞰厄魯特賊衆後即著來京原為商辦屯田事務看來厄魯特餘賊既除則回部亦易于平定惟明嵗駐兵屯田最關緊要雖烏魯木齊等處現在耕種而伊犂尚屬荒間倘被布魯特等侵占又須經理朕意于伊犂等處駐劄索倫兵及健鋭營兵二三千名合之緑旗屯田兵丁聲威自壯此事須黃廷桂同來商辦著將兆惠等追賊奏摺録寄黃廷桂閲看黃廷桂亦不必趲行可詢問兆惠起程信息先期來京其屯田事宜即留意區畫為要奬賞藍翎豐泰解送厄魯特阿咱喇布圖巴拉至京授藍翎侍衛賞銀五十兩在雅爾哈善軍營行走庚午定邊將軍兆惠等疏奏賊衆逃竄情形兆惠等奏言查布庫察罕哈薩克錫喇等賊在和落霍澌之客伊地方會齊向伊犂下遊逃竄䇿布登扎布領兵過闥勒竒嶺尾追臣等領兵在博羅布爾噶蘇一帶䇿應後聞䇿布登扎布之兵在和落霍澌擊敗賊衆臣等即晝夜前追沿途遇有逸賊盡行殱戮三月初九日至車齊罕河準䇿布登扎布知會云兵至博羅呼濟爾數次捉生詢問或稱賊人投往哈薩克或稱投往俄羅斯或稱自庫庫托木逃去所供不一我兵自宜窮追務獲但現兵雖有四百而馬匹疲乏日有落後之人仍需揀選馬力有餘可多行數日之兵三四百名前來接濟餘兵令在伊犂等處牧放馬匹將來進𠞰回部亦可得力等語臣兆惠巴祿同領隊大臣色布騰巴爾珠爾明瑞圖倫楚巴圗濟爾噶爾選兵三百餘名晝夜兼行接應䇿布登扎布之兵再賊人蹤迹四散恐于山僻藏匿現據侍衛老格等在車齊罕河等處𠞰賊百餘人收取人口二百餘及馬駝軍器等物仍派副都統由屯瑚爾起在後收齊陸續到來之兵分往搜𠞰其疲乏馬匹于和落霍澌等處牧放以備進𠞰回部之用又臣將擒獲琿齊阿南達哈什哈等屬人五十名帶往軍前效力所有家口派索倫兵五十名同琿齊等家口俱送至吐魯番俟雅爾哈善將索倫兵留用另派緑旗兵送至巴里坤其布庫察罕之從兄阿都齊亦派索倫兵送至吐魯畨照前轉解到京奏入報聞命暫停辦理效力軍營之厄魯特等家口上諭軍機大臣曰兆惠等奏稱揀選琿齊阿南達哈什哈等屬下壯丁五十人現在隨軍效力等語可傳諭巴里坤辦事大臣等于此等效力之厄魯特等家口解到時送往肅州暫行安置看伊等在軍前出力與否再為定奪此外所送人口俱照從前辦理亦傳諭黃廷桂知之諭靖逆將軍雅爾哈善等辦理回部事宜上諭軍機大臣曰昨諭兆惠等將舍楞哈薩克錫喇布庫察罕等擒𠞰後即著䇿布登扎布富德前往回部兆惠來京另有商辦事件恐其一軍兩將或致有掣肘也雅爾哈善既總統回部事務一切事務當與額敏和卓悉心籌畫奮勉辦理看來辦理回部較準噶爾為易伊等屬人內如有悔罪求生將波羅泥都霍集占擒獻者即可竣事但附和逆酋為惡之人若不嚴加殱戮則回衆無所警懼日後又必滋事雅爾哈善宜詳詢額敏和卓將此等附和稔惡之人務必全行擒獲不留餘孽庶地方常得寧謐至蕩平回部後即當定其貢賦仍視準噶爾所取之數毋得增減或因伊等變亂之後力不如前酌量稍減尚可所有貢賦俱著齎至巴里坤官為運送其各城頭目應令入覲者作何分年來京亦定議具奏現在伊等軍行所至情形若何作速奏聞辛酉定邊左副將軍成衮扎布疏奏都爾伯特汗䇿凌身故成衮扎布奏言準駐劄科卜多辦事參贊大臣阿桂咨稱三月十九日都爾伯特護衛通噶拉克稟稱我汗䇿凌于三月十三日出痘身故等語隨曉示親王䇿凌烏巴什貝子瑪什巴圖辦理遊牧本日又據長史騰格等稟稱我汗䇿凌臨危時囑云從前準噶爾變亂我歸誠聖主以來受恩深重今病勢難生爾等于我身殁後稟知將軍大臣我只一子索羅木衮布年十九嵗懇奏請聖主仁恩等語并呈送托忒字文一紙臣等曉示騰格等云爾汗生前受皇上深恩今身故後爾等哈屯幼台吉當約束所部永承聖眷又都爾伯特扎薩克達什敦多卜亦于三月初三日身故臣等查明應襲之人再行具奏奏入上諭軍機大臣曰都爾伯特汗䇿凌當準噶爾擾亂之初即能識時慕義率屬歸誠及準部蕩平始終感激朕恩抒忱效力約束遊牧人等甚屬安靜今聞溘逝深為軫惻著加恩賞銀一千兩緞八端治辦喪事仍派乾清門侍衛官長保薩木坦前往奠醊其汗爵即令伊子索羅木衮布承襲伊子年已十九應學習辦理事務著將䇿凌盟長之缺準其實授䇿凌烏巴什等俱係現在盟長著賞䇿凌烏巴什緞六端博斯和爾緞四端剛多爾濟巴圗博羅特瑪什巴圖各緞三端可傳諭伊等與索羅木衮布同心協力約束所部以副朕懷其扎薩克達什敦多卜身故著于烏里雅蘇台侍衛內派出一員前往奠醊臣等謹案都爾伯特為四衛喇特之一台吉䇿凌值準部內亂一時渠酋咸徵其佽助乃義明順逆知若輩攘奪無成計惟歸命天朝可以保全遊牧率先欵附畢獻悃忱我皇上開誠撫納賚豫便蕃自是諸部聞風延頸跂踵洎乎恩命分封鈞崇爵號而阿逆忽心懷心測自外生成逐影吠聲之徒紛紜脅附䇿凌等卒未嘗少為搖動是以屢厪宸衷曲籌耕牧及其既殁而恩禮始終賞延後嗣較三部落之披猖反覆竟底滅亡者不啻霄壤然後知栽培傾覆天道與聖心相為默契而福由已求孽亦自作惟視其人之所取耳定議量撤烏里雅蘇台等處兵丁及停派防秋兵事宜定邊左副將軍成衮扎布等奏言臣等欽奉諭旨烏里雅蘇台等處駐劄索倫察哈爾等兵應行酌量撤回又四部落每年派出防秋兵丁亦應裁減查上年臣等奏準北路軍營留索倫兵一千名察哈爾兵一千名右衛綏逺城滿洲兵五百名喀爾喀兵五百名緑旗兵三百名除挑往西路索倫兵四百五十名外餘兵五百四十名在軍前年久應行撤回其索倫兵因和碩齊等帶去三百名又察哈爾兵一百名尚在駐防請將烏里雅蘇台科卜多之索倫察哈爾兵暫時留駐俟和碩齊等兵丁回程之便全行撤回至烏里雅蘇台等處倉庫牲隻均需照管其乾隆二十一年調來滿洲兵五百名駐防未久喀爾喀兵五百名亦在遊牧附近更换請將此兩項兵丁俱行存留同緑旗兵三百名一體給與糧餉再四部落防秋兵從前每年派兵三千名辦給三個月錢糧定地齊集今準噶爾既平此項防秋兵毋庸齊集即在各遊牧豫備以省糜費奏入得旨軍機大臣議奏尋議成衮扎布請留滿洲緑旗等兵照看倉庫牲隻應如所奏其索倫兵丁現在無多俟和碩齊等歸途一併撤回尚屬可行惟察哈爾兵丁􅀈防甚久無庸守候應請即行撤回再所請喀爾喀兵五百名一體支給錢糧查從前將喀爾喀兵派往烏里雅蘇台軍營因伊等在遊牧之內並未支領後因有差遣蒙恩賞給而現在地方無事應照舊例停支或因食糧有年準其減半支給至防秋兵丁既無庸齊集亦應如所奏令其在各遊牧豫備可也奏入得旨喀爾喀兵丁錢糧仍照原奏支絡俟索倫等兵撤回時再如所議行餘依議壬戌命派送軍營馬匹牛隻上諭軍機大臣曰現在商都達卜遜淖爾達里剛愛等牧場內㨂選馬匹牛隻送至巴里坤以備屯田及兵丁口糧之需著派乾清門侍衛瑚什科普撒額爾登額蒙古勒分隊管領仍派公扎拉豐阿統率照看乙丑定邊將軍兆惠等疏奏追𠞰賊衆情形兆惠等奏言臣等隨䇿布登扎布富德行蹤輕騎追賊三月十一日至庫克烏蘇次日遇䇿布登扎布等所留索倫營總索音達爾等詢知富德聞哈薩克錫喇等晝夜逃奔之信領兵二百裹糧前追于初七日越博羅呼濟爾嶺見賊衆分為兩隊遂令鄂博什等為左翼羅卜藏多爾濟等為右翼追及于哈魯勒托羅海擒獲卓托魯克得木齊車隆據供哈薩克錫喇鄂哲特等自薩瑪勒河分路向伊犁逃去布庫察罕現在前路等語因馬力難於疾追先遣參領納旺署營長賓圖持托忒字印文往招布庫察罕令擒哈薩克錫喇自贖行至庫克烏蘇納旺等帶布庫察罕之喇嘛等來見請暫緩大兵即率屬迎降富德等恐係飾詞仍前追襲遇賔圖來言布庫察罕等夜間商議忽然潰散台吉庫魯勒岱等宰桑塔什等來降布庫察罕逃去等語隨即前追擒獲宰桑和碩齊𠞰殺喇嘛及賊衆二百餘人捉生詢問據供布庫察罕往必濟納喇特等處現今富德尋蹤追襲䇿布登扎布相繼前行臣等伏思布庫察罕止存百餘户尚易追𠞰哈薩克錫喇傳聞逃往阿勒坦額默勒富德等約于彼處相會臣等亦前往䇿應仍令圖倫楚帶兵往額蘇克尋蹤追襲俱于伊犂會合又令由屯帶兵往追鄂哲特等現在收降台吉衮布等係綽羅斯種族派員送京其節次所收户口派索倫兵送至吐魯畨聽雅爾哈善將兵留用另派經旗兵轉解巴里坤奏入上諭軍機大臣曰兆惠等奏稱哈薩克錫喇布庫察罕鄂哲特等潰散逃走現在分兵追𠞰等語伊等皆叛賊渠魁自應全行弋獲今進𠞰回部有雅爾哈善等承辦兆惠務將此數賊擒𠞰即遵旨來京其伊犂闥勒竒等處之鄂拓克及塔本集賽遊牧藏匿之瑪哈沁等著䇿布登扎布富德嚴行搜捕不留餘孽俾地方寧謐再往辦回部至所奏酌派索倫兵給與雅爾哈善今追賊正需兵丁不當頻為遣發但業已發往亦不必調回其隨䇿布登扎布等𠞰賊效力之舒德勒瑪呼富音保佛爾賽奎蘇喀什喀賞戴孔雀翎科丕塔格森泰伊薩勒圖噶爾瑪烏木普圖丑格賞戴藍翎巴圖魯二等侍衛古爾格勒圖三等侍衛永安俱賞緞二端筆帖式覺羅七十布奮勇𠞰賊亦賞戴孔雀翎仍著交部議敘至富德所奏𠞰殺喇嘛等語準噶爾喇嘛今俱何往從前伊地屢易台吉以致覆敗若此皆由喇嘛等煽惑斷不可留嗣後遇著名之錫勒喇嘛必盡行擒𠞰庶不致滋生事端命賞給署防禦奬賞藍翎塔尼布署防禦庫爾布德孔雀翎賞銀各五十兩前往雅爾哈善軍營效力丙寅諭辦理屯田侍衛永貴等查奏墾種收支實數上諭軍機大臣曰屯田為軍食所關凡墾種地畝收支榖石俱宜豫行籌畫可傳諭永貴等將現在墾種若干收糧若干較去年多增幾倍足敷兵丁若干人幾月之食來年亦照此加增核計具奏至平定回部後屯田兵丁若同征兵撤回則將來又煩跋涉自應留住彼處來年墾種地畝應添兵丁或于征兵內酌量存留伊等口糧即在現收穀石內支給但足敷幾月之食能及收穫之期否俱著籌酌奏聞巴里坤辦事大臣阿里衮疏奏運送軍營口糧牛隻阿里衮奏言臣遵旨于三月十五日自魯克察克起程二十七日至巴里坤查應送雅爾哈善軍營駝隻口糧及烏魯木齊哈喇沙爾等處屯田牛隻俱陸續解送其進𠞰回部兵丁尚未全至雅爾哈善于三月十五日起程途中緩行以待其應送兆惠軍營之軍器口糧俱全行運送其哈尚德應賠食羊一萬五千餘隻共應扺補米麵炒麵一千八百餘石挑選現到駝隻先行起運其餘應得口糧亦即陸續運往又臣于吹什臺站查得被賊搶掠力戰中鎗身死之緑旗兵閻惠回兵呢雅斯傷重之回兵黑里默錫克請照陳亡及得傷例賞恤奏入報聞諭定邊將軍兆惠等撙節糧餉上諭軍機大臣曰據阿里衮奏稱從前哈尚德所解羊隻倒斃數多先以米麵計算扺補其應支糧餉待駝隻到齊陸續運送等語兵餉關係緊要軍行程途更逺運送正復不易自當加意撙節若運到時即盡行分給恐兵丁等糜費過多致將來不能接濟兆惠等進𠞰時所收賊人口糧牲隻自可分給兵丁其送到之糧餉酌量給發仍豫籌貯備務使留餘可傳諭兆惠等知之命按察使職銜納世通辦理屯田事務上諭軍機大臣曰昨命納世通在巴里坤辦理糧餉今駐劄既有大員且無必需承辦之事著前往魯克察克同永貴定長辦理屯田事務甘肅巡撫吳達善疏奏撥運哈密倉糧吳達善奏言臣查巴里坤軍儲關係最重現在進𠞰及臺站屯防各官兵約一萬八千有竒九月以前榖未登場尚需轉運請于哈密倉糧內撥運粟米六千七百石麵六千七百石炒麵六千六百石共二萬石陸續委員運送仍照上年之例于四月初旬起至八月以內全數運足以實軍儲奏入報聞丁卯定邊將軍兆惠等疏奏擒獲喀喇沁宰桑恩克圗及收阿勒塔沁等遊牧兆惠等奏言臣等于三月十五日據侍衛占丕納報稱行至哈套晚見煙火移入庫隴癸山口隨捉生詢問知布庫察罕敗逃後有喀喇沁宰桑恩克圖多果魯特宰桑布圖庫噶勒雜特宰桑特克勒德克阿勒塔沁宰桑塔爾巴等領二百餘户欲渡伊犂有伊等遊騎探知大兵已至遂移往庫隴癸山險藏匿臣兆惠巴祿色布騰巴爾珠爾溫布領兵一百名入庫隴癸山口臣䇿布登扎布領兵一百名過阿勒坦額默勒與富德羅卜藏多爾濟鄂博什從後掩襲臣兆惠伏兵山背派參領庫林保驍騎校卓倫德領催錫勒都內固蘭岱厄魯特嚮導䇿伯克及新降之庫本諾雅特台吉舒倫哈什哈偵知賊衆照常牧放馬匹有人巡察臣等慮黎明進𠞰賊見我兵少無援不知畏懼遂于五鼓直前掩襲行未二里扺賊遊牧一面令巴圖魯侍衛扎延保厄魯特侍衛達什䇿凌等驅其牧馬我兵即呼噪叢射賊衆驚竄值大霧迷漫賊棄其帳房器物赤身乘馬逃據山巔放鎗滚石相拒我兵奮前攻擊即部院章京筆帖式等皆爭先射賊侍讀學士職銜溫福副將高天喜各擕一炮奔赴高山將山上賊衆擊死此次鏖戰色布騰巴爾珠爾得鳥鎗傷鉛子從腋透出幸未傷骨因達什䇿凌應援得脫委署防禦衮布及兵丁一名陳亡索倫營總西通阿等三員及兵丁三名得傷藍翎侍衛伍岱射恩克圖直貫其項為厄魯特特默齊喀喇擒獲因氣息漸微即凌遲處死塔爾已亦被𠞰殺共殺賊二百餘人收獲馬駝牲隻什物派舒赫德三格查點分明賞給備用仍行䇿布登扎布截殺過嶺賊衆又圖倫楚探賊回營即令其追𠞰布圗庫特克勒德克臣等于庫隴癸山內搜捕餘賊偵探哈薩克錫喇信息奏入上諭軍機大臣曰兆惠等偵知恩克圖等藏匿庫隴癸山中即乘夜掩襲擒𠞰賊衆甚屬奮勉效力自兆惠以及效力官兵皆當加恩議敘其陳亡得傷人等俱著查明送部議敘議恤靖逆將軍雅爾哈善等疏奏軍行途次情形雅爾哈善奏言臣等前奏計算進𠞰回部之緑旗兵自肅州起程于三月初可至魯克察克自魯克察克至哈喇沙爾結筏渡海都河歇馬一二日即整旅前進麥熟之時可扺庫車今三月十四五等日馬得勝等兵丁大半至魯克察克分隊起程其續到之兵臣等因候順德訥所帶索倫兵途次緩行于二十三四等日在托克三等處全行趲赴惟照管輜重之兵尚隔四站查兵丁人給馬一匹六兵合給車一輛路遙載重多推挽緩行俟到察罕通古哈喇沙爾等牧場水足之處令哨探兵前行臣等接續進發約五月初可扺庫車奏入報聞平定準噶爾方略正編卷五十三
