  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_079-1a, image: WYG0358/WYG0358-0407a.png}
body:
  text: 乾隆二十一年春二月庚子諭駐劄烏里雅蘇台辦事大臣阿蘭泰擒治訥黙庫等事宜上諭軍機大臣曰據舒明奏稱厄魯特部人擅殺臺站侍衛並據厄魯特侍衛丹津告稱訥黙庫帯伊游牧人等移至額克阿喇勒時即欲逃叛等語看來訥黙庫已露背叛情形著即傳諭阿蘭泰令將駐劄烏里雅蘇台及附近喀爾喀兵丁酌量飛調帯領堵截其烏里雅蘇台軍營存貯錢糧派兵加意防守阿蘭泰追及訥黙庫如果抗拒即行誅戮所有屬人照阿睦爾撒納屬人一例辦理擒拏訥黙庫時並將伊宰桑察罕鼐濟巴圖濟爾噶爾烏察喇勒等一併拏獲伊等從前在熱河時面奏訥黙庫必不生事今若隨同逆賊逃竄情理可惡必應重治其罪如訥黙庫尚無背叛實據即將丹津首告情節諭知令其至烏里雅蘇台與丹津質對俟到時將丹津一并拏解來京仍諭知管解人員解至察哈爾附近地方即將丹津釋放並將加恩授丹津為散秩大臣令在察哈爾居住之㫖密行曉諭丹津俾伊不生疑懼其訥黙庫同部之剛多爾濟巴圖博羅特等曽勸阻訥黙庫逃竄著明白傳諭伊等仍照舊安居不因訥黙庫一人致受株累再昨經降㫖今哈達哈帯兵往阿爾台一路前進今既有此事應即帯領兵丁在各處卡倫防守毋使逆賊得以乗間脱逃辛丒定西將軍策楞疏報擒獲阿巴噶斯等妻孥策楞奏言據内大臣尼瑪等報稱正月十二日遣察哈爾副驍騎校巴圖孟克等偵知哈丹潛往濟爾哈朗地方躱避遂將阿巴噶斯哈丹等妻子擒獲前來臣等伏思尼瑪等帯兵擒拏哈丹乃先期豫行逃竄祗擒獲其妻孥可否免其議處奏入上諭軍機大臣曰策楞奏稱尼瑪等未經擒拏哈丹止獲阿巴噶斯哈丹等妻孥並招降衆得木齊等功罪相等應否免議等語尼瑪受朕深恩奮勇効力已擒獲阿巴噶斯哈丹妻子及招降衆得木齊哈丹聞風先遁尼瑪等非退縮不前有心縱賊者可比著策楞曉諭伊等免其處分仍觀後效再現在大兵兩路前進哈丹又逃往阿逆處軍中情形阿逆必已知悉或逞其詭計别生事端或畏懼逃竄逺處俱未可定策楞等務須相度機宜迅速前往壬寅命奬賞厄魯特克什克上諭軍機大臣曰策楞等奏稱阿巴噶斯屬人克什克知阿巴噶斯搶奪臺站前來送信並養贍臺站被掠兵丁等語克什克係一閒散厄魯特頗知大義著施恩授為藍翎侍衛賞銀五十兩以示鼓勵定邊左副將軍哈達哈疏報領兵起程日期哈達哈奏言前派䕶軍統領塔爾瑪善貝勒策卜登等帯兵一千名由北路進發現在已過烏蘭嶺等處臣等因尚未得擒獲逆賊之信亦帯領索倫喀爾喀和托輝特等兵二千餘名於正月二十二日由布延圖起程向阿爾台進發其在科卜多及烏哈爾和碩地方駐劄兵丁仍令哈爾哈公米什克等帯領防守新舊烏梁海等仍留兵三千名遵㫖交與成衮扎布舒赫徳等在烏里雅蘇台駐劄奏入報聞癸卯命給駐劄巴里坤辦事大臣和起等欽差大臣闗防駐劄巴里坤辦事大臣兆惠等疏奏遣公納噶查前往阿克蘇城日期兆惠等奏言接到將軍策楞咨應遵前奉諭㫖遣公納噶查前往阿克蘇城曉諭擒賊事宜臣等即派撥兵丁三百名辦給馬匹口糧令公納噶查帯領侍衛官長保黙得庫等於正月二十二日起程奏入報聞乙巳諭㕘贊大臣達爾黨阿進兵事宜上諭軍機大臣曰達爾黨阿奏稱薩喇爾已抵吐魯番伊等即與噶爾藏多爾濟等帯兵往西爾哈阿濟爾罕等處會齊現已先期往約薩喇爾等語所辦甚合機宜前巴桑等已回游牧地方錫克錫爾格現與達爾黨阿等同隊前進至伊等游牧時酌量調兵合之現在索倫兵丁看來足敷調遣原不必候薩喇爾前來始行進發但昨據和起等奏到薩喇爾至吐魯番即遣阿喇勒拜通信巴里坤已經和起等派巴禄帯兵往迎即由彼處㑹合前進著達爾黨阿即速寄信薩喇爾令其暫為駐兵俟達爾黨阿到彼一併進發諭定邊左副將軍哈達哈等加意防守卡倫上諭軍機大臣曰據阿蘭泰奏稱接到舒明所寄訥黙庫背叛情形即調各處兵丁豫備並遣人詢問策凌等語辦理殊未妥協阿蘭泰既得訥黙庫信息應作速領兵并帯同丹津前往擒拏今紛紛派兵防䕶必至洩漏著傳諭哈達哈等凡各處卡倫務須派兵前往加意防守仍宻行籌辦毋使聞風脱逃諭定西將軍策楞查辦事宜上諭軍機大臣曰前聞内大臣公瑪木特由闥勒竒嶺前來曽派伊孫扎木禪往迎並未相遇今又閲數月瑪木特尚無信息朕心甚為軫念著策楞留心訪問現在何處即行奏聞再沙克都爾曼濟曽告知富徳從前阿睦爾撒納班珠爾納噶查等將準噶爾鄂拓克人等私自占據等語納噶查上年在伊犂時原依附阿逆行事占據别部落人衆後因伊至熱河即將阿逆背叛情形據實供出是以施恩寛免仍令其赴軍前効力然其人終不可信事竣後必至故智復萌亦著策楞留心查辦毋得任其占據丙午定西將軍策楞等疏奏辦理歸降人衆事宜策楞等奏言據庫圖齊告稱噶勒雜特宰桑特克勒徳克一鄂拓克及數集賽人等皆願投誠請遣伊兄瑪爾達勒前往招降又遣人寄信阿巴噶斯哈丹烏勒木濟等令其擒賊贖罪臣等俱照伊所請辦理今庫圖齊帯領伊兄瑪爾達勒及阿巴噶斯得木齊達什策凌等哈丹鄂拓克得木齊沙喇薩琿等招降前來其阿巴噶斯游牧接壤居住之八得秦人等皆誠心歸順懇請供給官兵馬匹口糧臣等即宣示恩㫖令其隨大兵効力奏入報聞丁未諭定西將軍策楞等防範阿逆事宜上諭軍機大臣曰昨據策楞等奏哈丹等棄其妻子逃往阿逆駐劄地方看來阿巴噶斯哈丹並無帶兵豈能擒獻阿逆況阿逆詭計百端聞知大兵前進故令阿巴噶斯等前來近接引軍深入伊得逞其狡詐不可不小心防範總之阿巴噶斯等能擒阿逆縛獻軍門方准其來降若僅隻身來歸即將伊等拏獲嚴審究出實情一切俱遵前降諭㫖辦理此時凡遇阿逆處前來之人俱宜詳加體察毋墮奸計著詳悉傳諭策楞等知之戊申命授兆惠㕘贊大臣同達爾黨阿等領兵進𠞰上諭軍機大臣曰兆惠等奏稱接薩喇爾吐魯番來信即遣人令其由彼處進兵並赴特訥格爾㑹同商議等語兆惠辦理甚合機宜前曽降㫖令兆惠至特訥格爾辦理臺站事務今著傳諭兆惠伊到特訥格爾若事務繁多即留彼處辦事如一切尚易料里即著㑹同達爾黨阿等領兵進𠞰在㕘贊大臣上行走其特訥格爾臺站事務交與三格管理并傳諭和起等所有巴里坤一應事務俱照兆惠所定章程悉心經理密諭定西將軍策楞等進兵事宜定邊右副將軍薩喇爾奏言臣荷䝉委任駐劄伊犂遇賊竊發不能盡力𠞰滅致將軍㕘贊大臣等捐軀盡節臣力窮被執自知徒死不足以塞責隠忍偷生希圖報効遂與台吉諾爾布敦多克等聚集兵力協擒阿逆自贖前愆上年十二月内與阿逆交戰數日因力不能敵未獲擒獻隨帯同諾爾布敦多克等由吐魯番前來正月初九日至吐魯番地方據回人伯克莽噶里克告稱噶爾藏多爾濟等現在領兵擒拏阿睦爾撒納伊等公同盟誓俟擒獲阿睦爾撒納後即領兵向各游牧搶掠且以噶爾藏多爾濟之子諾爾布林沁立為總台吉管轄四衛喇特已先遣布魯古特尼瑪前往等語又聞葉克明安巴雅爾等知臣至吐魯番帯兵前來意不可測幸臣于伊等未到之前已先入城尚未舉動後聞巴里坤調兵将至伊等始回看來準噶爾人等反覆變亂全不可信以臣愚見必調取西北兩路兵三四萬併力進𠞰擒拏阿逆並將衆部落人等分别𠞰滅安撫所有準噶爾等兵丁似不可用奏入上諭軍機大臣曰兆惠等将薩喇爾所奏準噶爾情形及請派兩路大兵進𠞰一摺轉奏前來此次薩喇爾甚有畏懼準噶爾之心又恐來京治罪是以故難其説為此陳奏今大兵將抵伊犂若如薩喇爾所奏必待大兵三四萬始可前進則機㑹已失必致墮賊奸計因降㫖令其即同達爾黨阿進𠞰然伊既懷疑懼未必能盡心擒賊以圖報効即使前往亦屬無益策楞達爾黨阿竟不必候薩喇爾偕行即同厄爾錐音哈薩克錫喇等作速進兵即薩喇爾趕赴一切𦂳要機宜不必與之商酌伊所奏準噶爾人等全不可信之語亦不無所見然如噶爾藏多爾濟巴雅爾沙克都爾曼濟等朕已加恩俱封為汗其心更何所希冀巴雅爾屬人貧苦或向回人等擄掠勢不能免若謂其領兵欲擒薩喇爾此非情理所有又尼瑪現在哨探隊内行走𠞰滅阿巴噶斯等游牧頗著勞績而彼處傳言乃謂係噶爾藏多爾濟等所遣薩喇爾誤聽回人之言不察虚實信以為真著明白傳㫖曉諭令其無庸疑慮至阿逆詭計百出知噶爾藏多爾濟等現在軍中或遣人前來煽誘亦未可定不若將此情節詳悉曉諭伊等不使為逆賊所惑而阿逆亦無從更施伎倆策楞等務宜詳慎辦理庚戌命授宰桑庫圖齊為散秩大臣上諭軍機大臣曰庫圖齊自上年投誠以來詳報一應事宜復致信阿巴噶斯等令其擒賊贖罪甚屬可嘉著加恩授為散秩大臣辛亥㕘贊大臣達爾黨阿疏奏派兵擒拏唐古忒事宜達爾黨阿奏言唐古忒乃逆賊阿睦爾撒納之族去年十一月内將軍策楞調派伊游牧兵丁帶領前進時唐古忒僅領兵一百名帯來駝馬俱疲瘦不堪應用勉強塞責行走五六日即隱避山僻處所觀望不前及遣人往伊游牧察看實可派精兵六七百名馬匹駝隻亦復不少唐古忒復探知阿睦爾撒納已入伊犂欲乗機由哈卜塔克拜塔克一路往尋逆賊詭傳將軍兵敗揺惑衆心形迹詭秘種種可疑應速行擒治臣等公同商議派富徳莽阿納帯領噶爾藏多爾濟及厄魯特兵五百名前往辦理奏入報聞壬子命賞給三格副都統職銜上諭軍機大臣曰三格自革職後効力軍營尚屬黽勉著加恩賞給副都統職銜以示鼓勵甲寅諭駐劄烏里雅蘇台辦事大臣阿蘭泰等查辦訥黙庫事宜上諭軍機大臣曰據舒明奏訥黙庫屬人沿途並無搶掠馬駝之事其戕害侍衛一節未經查明此事若亦與訥黙庫無涉則其叛迹尚無實據著傳諭阿蘭泰舒明如未將訥黙庫擒治訥黙庫亦未經知覺暫行停其拏問若已經拏問仍與丹津一併解送來京再行查辦仍㑹同策凌策凌烏巴什等究出戕害侍衛之人即行正法以示儆戒命安插班禪額爾徳尼之沙畢納爾等上諭軍機大臣曰據哈達哈等奏稱遵㫖詢問自伊犂來歸之沙畢納爾沙喇哈什哈巴爾沁等原係班禪額爾徳尼舊人懇請仍往青海之柴達木居住等語著照所請移住安插並傳諭副都統徳爾素善為管轄丙辰諭定西將軍策楞等查辦唐古忒事宜上諭軍機大臣曰昨據達爾黨阿等奏稱現在領兵擒治唐古忒此時應已擒獲從前唐古忒至額林哈畢爾噶時曽告知策楞言哈薩克錫喇屬人盗其牲隻且稱哈薩克錫喇有依附阿逆之意等語此等言語哈薩克錫喇今雖未知日後豈無所聞若不明白曉諭恐伊轉生疑慮策楞等俟拏獲唐古忒之時即於衆人前指出其造言誣陷哈薩克錫喇之罪因其言不足為據是以未經奏明今果肯叛益信其從前所言之詐俾哈薩克錫喇聞知益生感激仍將曉諭後哈薩克錫喇言語情形奏聞丁巳命封沙克都爾曼濟之子圖們為貝勒上諭軍機大臣曰沙克都爾曼濟未至伊游牧之先其弟明噶特將伊游牧搶掠沙克都爾曼濟之子圖們尚在㓜年能率衆由朱爾都斯前來投順殊屬可憫著加恩封圖們為貝勒賞戴雙眼翎仍賞銀一千兩為經理生産之資以示體䘏並令圖們即由額林哈畢爾噶一路前往趕赴沙克都爾曼濟令其父子完聚明噶特俟拏獲時即委員解赴京師治罪戊午諭定西將軍策楞等安輯伊犂各事宜上諭軍機大臣曰據策楞等奏稱哈薩克錫喇尼瑪扎那噶爾布等公同商議將伊等鄂拓克游牧疆界先行區畫其各部落無業人等並籌歸併安插等語此皆圖什墨勒等應辦之事伊等公同籌辦具有條理應俱如所議行其將來歸併安插人等生計艱窘著加恩賞給茶觔以資養贍策楞等交與圖什墨勒等查明需用數目行文巴里坤辦事大臣由朱爾都斯就近運往再據伊犂前來人等告稱瑪木特約蘇圖俱為阿逆戕害約蘇圖圖什墨勒員缺著吞圖布補授吞圖布所遺扎爾呼齊員缺著恩克博羅特補授瑪木特年已就衰効力行間甚屬奮勉今聞為賊戕害深堪憫惻著加恩賞銀三百兩其公爵即著伊孫扎木禪承襲至約蘇圖從前附和阿逆行事被禍乃其自取苐念伊係準噶爾舊人海喇圖納親之孫如有子孫兄弟著策楞等查明具奏加恩將伊宰桑承襲再現在拏獲阿巴噶斯之母及伊妻室係尼瑪諾爾布之姊妹尼瑪等既合嗣懇奏且係婦女著加恩寛宥交與尼瑪等管轄若阿巴噶斯之子則應治罪之人不得倖邀寛典著即查明解送來京諭定西將軍策楞等派兵協拏唐古忒㕘贊大臣富徳奏言臣領兵擒拏唐古忒於二月初二日至鄂塔穆和爾地方唐古忒在樹林蒲葦中扎寨臣等帯兵衝擊殺賊二十餘人查唐古忒帯兵一千有餘四靣河溝難以衝突是夜賊人即由寨内逃出臣等追趕至色白口山内賊衆已據險要地方分隊攻擊將賊人所占山寨連奪六處斬獲無算唐古忒復行潛遁擒獲伊部内屬人據稱唐古忒早萌叛志近得阿睦爾撒納已入伊犂之信伊由軍中回至游牧即令伊妻子帯領户口牲隻自哈卜塔克拜塔克一路先往伊犂現在唐古忒連日戰敗亦由此路逃往等語臣即率同噶爾藏多爾濟等奮力前進務期𠞰滅奏入上諭軍機大臣曰據富徳奏稱領兵擊敗唐古忒已逃向哈卜塔克拜塔克一路前往伊犂等語著傳諭策楞酌派兵丁速往哈卜塔克拜塔克地方堵截唐古忒務期擒獲伊即窮蹙投降亦行拏問遵照前㫖押解來京治罪定西將軍策楞疏奏宰桑圖布慎等來歸情形策楞奏言據阿勒巴齊宰桑圖布慎前來告稱上年投誠時䝉恩授以官職隨將軍等在伊犂辦事不意阿逆背叛勉強服従後商同喇嘛等欲將阿逆迎至伊犂擒獻我與約蘇圖及喇嘛一名至阿逆處迎請伊懷疑不允又與副將軍薩喇爾等領兵與阿逆交戰亦未得勝我隠匿山谷今始得乗間來歸等語又據得木齊恩克博羅特告稱我係巴爾達穆特宰桑博什之得木齊博什前往入覲我與伊子塔什為阿睦爾撒納逼脅同行今聞大兵已到前來歸誠等語又噶勒雜特宰桑特克勒徳克阿勒巴齊宰桑齊黙徳庫之子鄂勒錐圖得木齊庫本等俱迎至軍營臣等即帯同伊等前進奏入報聞庚申命加恩陜甘兩省辦解馬匹官兵等上諭軍機大臣曰據兆惠奏稱此次陜西甘肅官員辦解馬匹及滿營緑旗送到馬匹臕分俱足倒斃甚少等語此等馬匹皆豫備軍需之用今正值春冬之際俱能妥協送到官兵甚屬黽勉其原辦之將軍地方官員辦理亦屬妥當並應加恩鼓勵所有此次購辦解送之文武大小官員俱著交部查明分别議敘其承送兵丁著交和起等查明詳報軍機大臣應如何恩賞之處具奏請㫖恩免陜甘兩省緑營官兵借支銀兩上諭軍機大臣曰陜甘兩省辦理軍需以來緑旗各營辦解馬匹及一切公私借墊為數頗多例應於官兵糧餉内均攤扣還朕念伊等趨事急公倍多勞苦更加扣餉生計不免拮据今軍務將竣兵艱宜卹著加恩免其按名扣抵但此等借頂均闗國帑不便虚懸著於陜甘各營兵數内酌留公費名糧通融彌補以清帑項該督黄廷桂詳細查明妥協籌酌應留名數核實奏聞一靣辦理副朕優卹戎行至意命封公納噶查為貝子上諭軍機大臣曰納噶查此次奉派差往阿克蘇城行走奮勉著加恩晉封貝子今已無庸前往即令回至伊游牧地方休息以示優䘏甲子命定邊右副將軍薩喇爾駐劄特納格爾辦事上諭軍機大臣曰前經降㫖令薩喇爾解送阿睦爾撒納來京此時若逆賊就擒之信未確薩喇爾既不必前來亦毋庸同策楞等進發策楞等統領大兵前進其一切應援事宜亦屬𦂳要薩喇爾即駐劄特訥格爾協同達爾黨阿辦事命定西將軍策楞確查阿睦爾撒納情形策楞奏言二月初三日自伊犂前來之莫和里告稱阿睦爾撒納帯兵三百名逃向伊犂北山正月十七日回人和卓木帯兵數千名在察卜齊里嶺地方擊敗阿睦爾撒納復逃至固勒扎之北山摩輝圖居住十九日令我寄信至巴爾達穆特鄂拓克推素隆噶勒雜特等處等語臣等伏查從前侍衛福招等報稱台吉諾爾布等於正月二十一日在雅瑪圖嶺擒獲阿逆詢之莫和里據稱並未聞諾爾布等擒拏之信似福昭等所報事屬子虚但賊被回人擊敗勢甚窮蹙現今台吉南泰同侍衛福昭帯兵擒拏玉保尼瑪等相繼進發臣等大隊兵丁亦剋期齊集逆賊自可計日就獲奏入上諭軍機大臣曰策楞等奏稱據伊犂脱出之莫和里告稱阿睦爾撒納於十七日被和卓木回兵擊敗十九日令伊前來等語先據福昭報稱於二十一日拏獲阿睦爾撒納莫和里於十九日前來是福昭得信在莫和里之後但福昭自二十一日以後未經續報此時曽否拏獲著䇿楞詳查確實即行奏聞丁卯㕘贊大臣達爾黨阿疏奏領兵前赴安集哈雅達爾黨阿奏言臣帯領官兵由朱爾都斯進發前聞阿逆已經拏獲准將軍策楞咨文停止進兵即在特訥格爾駐劄辦事二月十二日復接策楞咨令臣派兵一千名至安集哈雅等處接應臣現在駐劄兵丁除富徳帯往辦理唐古忒五百名外酌量揀選一千一靣行文巴里坤大臣兆惠等作速解送馬匹應用臣即於二月十七日帯兵先行起程前赴安集哈雅奏入上諭軍機大臣曰前命薩喇爾駐劄特訥格爾㑹同達爾黨阿辦事今達爾黨阿已領兵前赴安集哈雅特訥格爾一應事務亦屬𦂳要即著薩喇爾率同三格辦理所有定邊右副將軍印雖經扎拉豐阿帯往薩喇爾仍著授為副將軍俟拏獲阿逆即遵前㫖令其押解來京三月己巳朔訓諭定西將軍策楞等上諭軍機大臣曰今日覽策楞等陳奏一摺俱係尋常事件其擒獲阿睦爾撒納之處並未聲明伊等前次奏阿逆業已就擒今又隔十餘日之久此際應得確信即尚未確實亦應將現在大兵已至何地去伊犂相距逺近情形詳悉奏聞何竟無一言奏及深可駭異即如尼瑪現於玊保領兵同進賞伊騎都尉世職俟到伊犂傳㫖並未遲悞何必行文即行辦理殊屬不知緩急今策楞既經傳諭即著将賞給尼瑪恩克博羅特吞圖布等世職照伊等奏請之子承襲其達什策凌游牧現被搶掠著酌量加恩賞銀數百兩遷至和博克薩里地方暫行安插仍將現在大兵所至情形速行奏聞諭定邊左副將軍哈達哈等辦理烏梁海事宜上諭軍機大臣曰據徳善等奏報烏梁海等喧傳哈薩克與阿睦爾撒納兵勢連合共相擾亂等語此皆烏梁海等揑飾謠言搖惑衆心情罪可惡伊等畏威内附全不可信此等傳言明係聽阿逆指使妄行聲張其背叛情形已露若不嚴加懲創不足以示儆戒著傳諭哈達哈宻交和托輝特郡王青滚雜卜貝勒策布登扎布於伊等兵丁内酌量選派前往宻查其為首倡惡之人即行正法現又據遣往烏梁海换易馬匹之副都統察達克等報稱圖布慎莽噶拉克俱即將馬匹换易尚屬急公此二人應加寛宥若郭勒卓輝已屬首鼠兩端之人然從前尚有出力之處青滚雜卜等應詳加體察斟酌辦理至鄂木布博博等則斷不可恕務應查拏嚴究其屬人一併擒獲賞給軍前効力人員馬匹牲隻盡行收取以資兵力侍衛徳善奉差時已有畏懼情形及至彼處一聞烏梁海等揑造之言不審虚實即行退回甚屬懦怯徳善著革去侍衛仍同順徳訥前往哈薩克曉諭以觀後效青滚雜卜等即将何時前往辦理之處速行奏聞命授順徳訥為頭等侍衛前往哈薩克曉諭上諭軍機大臣曰順徳訥曽往哈薩克曉諭人尚明白著授為頭等侍衛賞銀一百兩令其再往哈薩克傳㫖曉諭阿布賚現在逆賊阿睦爾撒納窮蹙無聊計日就擒前阿逆曽向哈薩克借兵阿布賚並未給與深知大義實可嘉予再哈薩克屬人等亦有搶掠塔本集賽之事塔本集賽正在附和阿逆之時則伊等初非助逆行事乃正為天朝出力剪其黨羽恐伊等不知妄生疑慮是以遣使前往曉諭阿布賚從前遣使朝貢具見誠悃如能傾心内附自當格外加恩俾伊等安居樂業永享太平伊等惟善自約束毋使屬人越境滋擾其準噶爾各部已嚴行禁止亦不得擾害各部落將此明白曉諭如阿布賚遣使入覲即令順徳訥帯領前來賜哈薩克阿布賚敕書上諭哈薩克阿布賚曰準噶爾數年來内亂頻仍各部驚擾厄魯特等流離困頓並失生計朕為天下共主不忍坐視爰申天討平定伊犂令伊等共享昇平之福一切善後事宜正待將次經理以為久逺計不料逆賊阿睦爾撒納負恩背叛肆行猖獗今特命將軍大臣等統領大兵兼程追捕而準噶爾衆台吉宰桑等復糾集義旅協力擒拏現在阿睦爾撒納勢力窮蹙棄衆逺颺勢必竄入爾哈薩克境内此賊罪不容誅無論逋逃何處務期俘獲正法萬無漏網之理爾阿布賚恭順天朝從前遣使請安具見誠悃亦因逆賊中途阻止未經入覲至逆賊性情詭詐爾等素所稔知斷無容留逆賊之理設容留在彼亦於爾部有損無益爾部與準噶爾接壤從前噶爾丹策零時爾等尚受其節制邇來遭準夷衰亂始得逞志現在西域諸部落俱入我版圖爾等果将逆賊隠匿容留準噶爾部衆無一人與阿逆同心勢必羣起滋事是爾因一人而受衆人之敵也況大兵業已壓境彼時陳師索取爾部豈能晏然安處事後追悔即已無及爾其熟計利害一切俱遵朕諭㫖速行擒獻永受朕恩欽哉毋忽駐劄烏里雅蘇台辦事大臣阿蘭泰等疏奏擒拏訥黙庫解送京師阿蘭泰等奏言臣等帯兵往擒訥黙庫先令喀爾喀公達什丕勒計誘訥黙庫并察罕鼐濟巴圖濟爾噶爾等前來二月十八日察罕鼐濟巴圖濟爾噶爾等解送戕殺侍衛賊人前來次日訥黙庫亦至前後俱已拏獲派察哈爾兵二百名交侍衛端濟布徳爾森保等於二十日自布爾哈雅起程解赴京師臣等即帯領策凌策凌烏巴什等至訥黙庫游牧将伊妻子宰桑等全行拏獲陸續派人解送其牲隻物件應行解京分賞之處俱遵㫖辦理其戕殺侍衛賊人業已審明即行正法奏入上諭軍機大臣曰據阿蘭泰等奏報訥黙庫等已經擒獲現在解京等語此事係舒明籌辦甚屬妥協阿蘭泰一味推諉若照伊所奏辦理必至遲悞著將阿蘭泰男爵革去即賞給舒明以示鼓勵阿蘭泰仍著交部嚴察議奏達什丕勒能計誘訥黙庫前來亦屬奮勉著加恩封為貝子解送訥黙庫妻子等來京時著將阿睦爾撒納之二女從前交與訥黙庫者一併查出解送來京其剛多爾濟巴圖博羅特布顔特古斯等俱不必再行查辦訥黙庫所有屬人俱著分賞策凌策凌烏巴什等嚴加約束命㕘贊大臣雅爾哈善來京面聆訓示再赴軍營庚午訓飭㕘贊大臣玉保上諭軍機大臣曰據玊保等奏稱拏獲阿巴噶斯屬人烏遜供稱阿逆現領厄魯特兵八千名哈薩克兵八千名已将烏遜送往將軍營内又聞阿逆現在出痘甚重等語烏遜乃賊人黨羽所言不過虚張聲勢既已拏獲即行正法一面宻告策楞何用送往軍營搖惑衆聽玉保辦理甚屬不合且此次奏事應候探明福昭所報確信再行陳奏即福昭等所報不實或被普爾普所欺亦宜一併查明奏聞乃並無一語奏及與策楞昨日所奏正同伊等既冐昧於前又復遲疑不進是誠何心即如另摺所奏宰桑巴桑等告稱初七日阿巴噶斯烏勒木濟二人至噶順地方見大兵已到即由山路奔竄約計初八日即到阿睦爾撒納處等語由此觀之阿睦爾撒納所往地方與我軍營相距甚近而巴桑即係親見阿巴噶斯逃竄後來至軍營者若如其言即行追逐早已可抵賊營何伊等行走甚速而玉保等行走甚遲至於如此懸殊謂非退縮不前而何現在賊黨巴蘇泰又復來歸則其窮蹙情形已不能支玊保等應即迅速往擒倘在遲緩悞事斷不寛貸如阿逆果出痘身亡亦必將伊屍寸磔以彰國憲毋許草率完結壬申命都統巴禄等㑹同將軍策楞進𠞰上諭軍機大臣曰從前巴禄領兵往迎薩喇爾於吐魯番今薩喇爾已經前來巴禄想已領兵徑赴軍營或尚留於吐魯番著即速赴策楞處㑹同進𠞰巴禄由朱爾都斯一路前往中途有投順之人即行受降其有應用兵力收服者亦即酌量辦理再據達爾黨阿奏稱接准策楞咨文即帯特訥格爾兵丁一千名趕赴軍營等語現在逆賊就擒未得確信此際即接有不必調兵之文亦不得停止仍將大兵分隊陸續前往聫絡聲勢以壯軍威定議厄魯特等搶奪馬匹治罪條例侍郎舒明奏言厄魯特等奪取臺站馬匹及運糧商民駝隻財物各犯俱經審明所有首犯得勒格爾等應疑斬立决妻子給與鄰盟查出家産給與被奪之人其為從各犯應擬絞監候俟秋審減等發落等語得㫖軍機大臣議奏尋議查舒明所擬盜竊臺站馬匹賊犯俱係照例辦理但此等新降之人於遷移游牧時中途擅行搶奪甚無法紀若僅照例辦理不足示懲此案賊犯應請不分首從俱擬斬立决以示儆戒餘俱照舒明所奏辦理再厄魯特等遷至額克阿喇勒地方令伊等耕種自給出自殊恩該扎薩克剛多爾濟巴圖博羅特等理應嚴行約束不使生事今伊等目無法紀盜竊累累該扎薩克剛多爾濟等俱應交部嚴加議處奏入得㫖該扎薩克等俱應交部議處但念伊等係新降之人未知内地禁例著從寛免其交部餘依議癸酉命授沙喇薩琿等為宰桑上諭軍機大臣曰前經策楞等奏請将庫圖齊授為阿巴噶斯鄂拓克宰桑已降㫖准行今沙喇薩琿又在軍營投誠著將庫圖齊調為哈丹鄂拓克宰桑其阿巴噶斯鄂拓克宰桑著沙喇薩琿補授乙亥諭定西將軍策楞等擒拏逆賊事宜上諭軍機大臣曰覽策楞等兩次所奏分兵前往洪郭爾鄂博擒捕阿睦爾撒納之處尚屬近理但觀伊等情形並未迅速前往則於軍行緩急機宜茫然不曉據陸續脱出之人俱稱阿睦爾撒納被回人和卓木擊敗勢蹙力窮在洪郭爾鄂博居住正與現在策楞等領兵前進地方相距不逺何必又分哨探大隊之兵以次前進乎即當選集勁旅合力速行及賊人未得逃竄之先即行追及始與事機相協即使逃出之人所言未必盡實或大兵馬力平常亦應急速趨赴審量賊情如賊人之力尚強則我兵暫為緩行俟後隊既集協同進發亦無不可今乃未見一人即已如此遲滯雖逆賊勢已窮蹙豈肯坐待兵至而束手就縛乎又豈必俟目覩策楞等到後始知倉皇奔竄乎此即策楞等不知事理之明驗由伊等延緩情形度之則此賊未必即能擒獲試思逆賊一日不獲則此事一日可了乎策楞等一何悖謬至此此時逆賊若仍未獲則此㫖到日逆賊必早經兎脱或先定一竄跡之地矣如果逃往哈薩克布魯特等處斷不可虚張追逐之勢遽行撤兵即著派達爾黨阿玉保尼瑪於索倫兵内選派一二千名奮力追趕仍先遣人徃哈薩克傳諭阿睦爾撒納乃重負厚恩之逆賊今逃入汝界汝等將以擒獻大皇帝必重加恩賞伊或詭言逆賊到伊界内又逃往布魯特即當諭以逆賊所到之處大兵即當窮追期於必獲而後已並不騷擾汝等汝等少有阻撓即是甘與賊通必將一體辦理使之知所震懾出力追捕决不可稍為姑息朕觀外夷情形均多恇怯即如阿睦爾撒納如此窮蹙而伊等尚不免畏懼況我統索倫精兵前往丕振軍威伊等無有不讋服之理逆賊萬一逃往即遵㫖帯領索倫兵往追務獲此皆朕先事籌畫者若俟奏到逆賊脱逃時始行降㫖指示必致貽悞矣總之道途遼逺一切當審緩急之宜而出以果斷始能適合機宜庶叛賊可以就擒策楞等其殫心熟籌勇往辦理命定邊右副將軍薩喇爾來京上諭軍機大臣曰前經降㫖令薩喇爾俟拏獲阿逆後來京今伊已回至巴里坤朕念伊自前嵗領兵馳驅殊屬勞瘁況伊犂一切情形尚有應行靣詢之處薩喇爾著即由巴里坤起程來京平定準噶爾方略正編卷二十五
