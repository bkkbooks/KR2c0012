  text: 欽定四庫全書平定凖噶爾方略前編卷一
  hash: sha256:746eb176c891d7cb099416b155e045b8ee345b46f158d9d7eaf5217d835c9a4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_001-1a, image: WYG0357/WYG0357-0026c.png}
body:
  text: 康熙三十九年秋七月乙未命議青海事冝聖祖仁皇帝既平朔漠大功底定邊圉寧謐䇿妄阿喇布坦者噶爾丹之兄子向與噶爾丹搆怨及噶爾丹既滅震懾天威卑詞乞命聖祖仁皇帝宏如天之度特賜生全俾與厄魯特諸部仍安遊牧策妄阿喇布坦素性狡黠雖荷殊恩而貌為恭順潛懷不靖至是遣人至青海並聲言欲征第巴駐劄西寧喇嘛商南多爾濟以聞得旨下所司議理藩院以毋庸議覆奏上曰此事目前觀之雖屬甚小將來大有關係該部擬以毋庸議倘青海台吉等遣人以所奏聞事問商南多爾濟則商南多爾濟何以答之䇿妄阿喇布坦人甚狡猾其口稱往征第巴或因力不及而虛張聲勢或欲往征以此問曽往彼處侍郎常綬等再行具奏尋大學士等遵旨問侍郎常綬侍讀學士伊道郎中常明等覆奏上曰此事稍覺遲延方奏到日即為行文甚好青海台吉亦屬失算何以先將已意泄漏但將來使照常欵待禮遣斷不敢搆釁今以朕計之亦尚無妨朕巡幸蒙古之地頗多凡事朕皆熟悉䇿妄阿喇布坦人雖狡猾但由博羅塔拉至土伯特必經喀喇烏蘇等艱險之處路徑甚惡斷不能往伐何也䇿妄阿喇布坦素行姦惡故其附近哈薩克布魯特諸部皆相仇讐欲悉軍大舉則路既難行且無留護其妻孥者若兵單力弱斷難成事惟有奮激而行妻孥與俱幸而有濟則已無濟則有歸附土伯特之謀而已然䇿妄阿喇布坦奏書之意特張虛聲欲觀青海之動靜耳亦未必果欲爭戰也觀古趙充國所議五事良是應宜留意是冬哈密扎薩克額貝都拉達爾漢伯克題報䇿妄阿喇布坦處哈薩克布魯特合兵欲征哈什哈爾理藩院奏令冉偵信息報聞上從之臣等謹案易言神以知來又言唯神也故不疾而速不行而至蓋動而未形者幾感而遂通者神唯神則事炳幾先知周事後我聖祖仁皇帝親鞠六師三犁朔漠凡以剪除凶暴輯寧遐裔俾普天率土無一夫之不獲所謂征弗庭以綏兆民者此也故當噶爾丹既滅即撫安諸部並豫生全遺孽䇿妄阿喇布坦亦得以乞命假息雖天覆地載何以加茲乃犬狼異性虺蜴難馴聖明雖示包荒情偽早已洞灼至是遣人至青海聲言欲征第巴即奉聖祖仁皇帝諭曰此特張虛聲欲觀青海之動靜耳且言此事雖小將來大有關係因舉漢趙充國所奏屯田事敕所司留意伏觀充國三疏先言明德除害繼言以全取勝末言以計為本凡其指陳籌畫悉範圍於廟謨睿略之中厥後逆酋不靖興師致討決幾制勝無一不如聖算世宗憲皇帝誕紹天威載申撻伐我皇上纘兩朝之丕烈運獨斷之乾符直掃伊犁蕩除宿慝威行德屇逺薄西極為振古以來史册所罕覯而聖祖仁皇帝于小醜萌芽之初蓋不啻燭照而數計顯謨寶訓啓我聖功非天下之至神其孰能與於斯乎四十年春正月戊午青海厄魯特台吉戴青和碩齊察罕丹津率部歸附封為多羅貝勒冬十一月癸卯厄魯特䇿妄阿喇布坦遣使入貢宴賚如例四十四年秋八月庚申上視巡塞外車駕所臨閲諸部孶生牛羊馬匹及編入左翼四旗察哈爾巴爾虎厄魯特各蒙古生業諸部人等皆列廬帳擕婦子捧羊酪等物跪迎聖駕厄魯特蒙古奏曰我等原係負罪不赦之人蒙皇上如天好生特為免死又霈洪仁編入旗伍安插遊牧賜以牲畜五六年間孶牧繁息生計豐饒隆恩如此不能仰報於萬一也十一月辛酉朔命散秩大臣丹濟拉為扎薩克輔國公馳驛赴推河偕內閣侍讀學士殷扎納偵凖噶爾信息四十五年春二月辛丑以色布騰巴爾珠爾為鎮國公壻先是哈密遵諭旨俘送噶爾丹逆子色布騰巴爾珠爾至京上特赦其罪授一等侍衛至是以輕車都尉覺羅長泰之女照鎮國公女例授為鄉君妻之冬十月乙巳命以擒假達賴喇嘛情事宣示大臣先是達賴喇嘛卒第巴匿其事搆令厄魯特部內互相仇殺又立假達賴喇嘛以惑衆且計毒拉藏不死復逐之以是拉藏蓄憾發兵執第巴殺之遂奏假達賴喇嘛先後情事上命護軍統領席柱學士舒蘭為使往封拉藏為翊法恭順汗令執假達賴喇嘛來獻至是上諭大學士等曰前遣護軍統領席柱等往擒假達賴喇嘛及第巴妻子時諸皇子及諸大臣俱言一假達賴喇嘛擒之何為朕意以衆蒙古俱傾心皈嚮逹賴喇嘛此雖係假達賴喇嘛而有達賴喇嘛之名衆蒙古皆服之倘不以朝命遣人往擒若為䇿妄阿喇布坦迎去則西域蒙古皆向䇿妄阿喇布坦矣故特遣席柱等前去席柱等方到其地䇿妄阿喇布坦果令人來迎以此觀之若非遣人前往則假達賴喇嘛必已歸䇿妄阿喇布坦矣至西域回子及蒙古今衰弱已極欲取之亦甚易但併其地不足以耕種得其人不足以驅使且現今伊等已俱恪守法度是以不取此等情事漢大學士及九卿等想俱未深悉爾等可將朕諭示之翼日上又諭曰昔達賴喇嘛存日六十年來塞外不生一事俱各安靜即此可知其素行之不凡矣後達賴喇嘛身故第巴雖隱諱不言然觀其啓奏之詞非昔日達賴喇嘛語氣朕是以知其已故遣使細訪乃盡得欺詐之狀自達賴喇嘛故後第巴遂教噶爾丹各處妄行生事矣十二月丁亥駐劄西寧喇嘛商南多爾濟奏報拉藏執送假達賴喇嘛赴京護軍統領席柱等至西藏令拉藏執假達賴喇嘛赴京拉藏恐離衆喇嘛心不從席柱等奏聞上諭諸大臣曰拉藏今雖不從後必自執之來獻至是商南多爾濟奏入果如聖算衆皆驚服尋理藩院奏言假達賴喇嘛行至西寧口外病死假達賴喇嘛所行悖亂今既在途病故應行文商南多爾濟棄其尸奏入上從之五十二年夏四月乙亥增修憲書欽天監奏言據理藩院開送厄魯特貝勒阿寶輝特公羅卜藏喀爾喀六十五旗哈密扎薩克額敏厄魯特王䇿凌旺布公多爾濟塞卜騰毛海等職名依新圗推算其所居地分共十七處應於憲書內增刋頒發得旨庫倫鄂摩竒齊格訥洪郭羅阿濟爾罕此二處著裁去餘如議五十四年夏四月辛未命遷里塘瑚畢勒罕先是青海右翼貝勒戴青和碩齊察罕丹津等奏稱里塘地方新出瑚畢勒罕實係逹賴喇嘛轉世求豫册封其從前班禪胡土克圖及拉藏汗題請安置禪榻之瑚畢勒罕非實奏入上以伊等皆顧實汗子孫欲使共相和睦若留此瑚畢勒罕於青海恐其弟兄或起爭端特遣侍衛阿齊圖等往諭令送里塘之瑚畢勒罕至京又遣主事衆佛保往班禪處問彼瑚畢勒罕之真偽尋戴青和碩齊察罕丹津等奏請俟來秋送至京師上命將里塘瑚畢勒罕暫住西寧口內寺廟至是侍衛阿齊圖疏言主事衆佛保回稱據班禪以里塘瑚畢勒罕為假而戴青和碩齊察罕丹津等堅求親往班禪處詢問真偽奏入得旨下所司議理藩院議曰應令阿齊圖等傳集青海兩翼諸貝勒台吉等於會盟處宣布皇上德意并以班禪所賚印文示之令遷瑚畢勒罕住紅山寺尋侍衛阿齊圗奏言臣等至會盟處傳集青海兩翼諸貝勒台吉等宣諭上意貝勒塞卜騰扎爾等皆言應如聖旨而貝勒戴青和碩齊察罕丹津等仍諉云瑚畢勒罕年幼未出疹痘且今嵗不宜逺行奏入上命議政大臣等議奏隨議覆應行文阿齊圖暫駐西寧偵探信息上從之己卯命議哈密設備事宜遣吏部尚書富寧安等馳驛赴軍甘肅提督師懿德奏言四月初二日哈密扎薩克達爾漢伯克額敏報稱厄魯特䇿妄阿喇布坦遣兵至其北境侵掠五寨初三日又報稱賊兵於三月二十五日抵哈密城下臣檄肅州總兵官路振聲領兵先赴哈密臣俟出厰馬調集即率兵往援奏入得旨䇿妄阿喇布坦遣兵侵掠哈密肅州總兵官已領兵往救應再發西安滿洲兵三千總督標下營兵二千甘肅提督標下兵亦酌量派出星急前去救應再行文青海左翼及喀爾喀扎薩克等各令防備著議政大臣會同理藩院大臣速議具奏議曰西安滿洲兵令將軍席柱與副都統一員帶領總督標下兵令副將一員帶領甘肅提督亦令帶領標下兵於文到三日內啓行軍行所在兵馬錢糧令西安巡撫永泰沿途料理此三處兵應令大臣一員前往調遣選厄魯特巴爾虎大臣侍衛等隨行以備偵探西寧嘉峪關兩路各設臺站每臺派筆帖式一人西寧青海等處事務令侍衛阿齊圖等暫駐西寧料理青海左翼與哈密相近貝子阿喇卜珠爾與噶斯路相近西寧及四川松潘與青海相近諸路皆應行文各令整備方今甘肅兵丁俱調出口應調涼州兵之半至甘肅要路防守再䇿妄阿喇布坦既侵哈密或潛至喀爾喀邊境亦未可定應派大臣一員前往傳諭喀爾喀並厄魯特王䇿凌旺布公多爾濟塞卜騰毛海輝特公羅卜藏等各令設備得旨如議今總兵官路振聲現率標兵前往路振聲係諳練行間之人朕所稔知如䇿妄阿喇布坦兵少此兵足以制之彼若擁衆而來我兵似覺不足必須詳加籌畫相機而行著速行文提督至爾等所議三處兵派一大臣總統調度此兵乃西安將軍所管之兵將軍親往不便又令大臣管轄應派一能辦事大臣與將軍公同商酌而行著吏部尚書富寧安馳驛前往派新滿洲侍衛十員前往效力現派法瑙著隨富寧安前去祁里德原係大臣著授為散秩大臣馳驛前往推河亦派新滿洲侍衛前往著將尼牙韓楚婁徴額派出隨去厄魯特巴爾虎侍衛官員亦令挑選帶往庚辰命右衛鄂爾多斯等兵預期設備並㨂發八旗察哈爾等兵往歸化城上諭議政大臣等曰䇿妄阿喇布坦作何舉動雖不得知其實其到我哈密地方便不可為虛彼若傾國而來勢有萬餘我一總兵之力微有不足不可不預為周備也應著右衛兵即刻預備八旗察哈爾厄魯特巴爾虎兵內挑選千名發往歸化城如用右衛兵時令其一同前往鄂爾多斯及厄魯特阿寶額駙之兵亦應令預備一同前去著詳議具奏議曰選右衛兵三千令將軍費揚古預備選八旗察哈爾厄魯特巴爾虎兵一千令總管鏗特傅爾丹常濟保阿禮渾等管領速往歸化城如用右衛之兵一并遣往其右衛察哈爾兵給與六月食米錢糧撥鄂爾多斯兵二千令王董羅布貝勒甘珠爾管領又厄魯特貝勒額駙阿寶兵五百歸化城土默特兩旗兵一千令都統新泰副都統齊式預備諸軍皆屬將軍費揚古統理兵馬事務再派大臣一員與將軍費揚古一同籌畫辦理得旨現有將軍費揚古且不必派大臣若嗣後有事著都統新泰為將軍參贊餘如議議增設八旗馬駝上諭議政大臣等曰八旗馬匹俱已出厰著照出厰馬數令佐領殷實之家並該佐領人公派拴養照常給發錢糧目下雖稍覺煩難後來究竟有益如有行動則從此騎馬前去一到口上彼處之馬又到諸凡便益著詳議其拴養駱駝之處并著詳議具奏尋議政大臣等議覆八旗出厰馬一萬四千九百十四匹駝七百九十一隻今依出厰馬駝之數每佐領下添設馬十七匹八旗共添駝七百九十一隻交八旗飼養照例給發錢糧奏入得旨如議其有不能添設之佐領著借與庫帑辛巳訓諭尚書富寧安富寧安以命往軍前奏請聖訓上曰朕以爾堪信任故命爾前往軍中凡事俱冝詳慎若離朕相近猶可指授調遣今相隔甚逺遇有倉猝即馳驛傳送亦多需時日軍機大事不冝遲緩爾至彼有應調遣之事不必請旨即與將軍席柱商酌而行董大成吳坤亦著隨往甲申賞恤擊敗䇿妄阿喇布坦官兵先是䇿妄阿喇布坦遣兵至哈密北境侵掠五寨抵其城下至是提督師懿德奏言駐防哈密逰擊潘至善筆帖式常保住等於三月二十六日率領官兵二百餘人同哈密伯克額敏擊敗䇿妄阿喇布坦兵於哈密賊退駐城南二十里外奏入得旨官兵甚少輒奮往爭先殺退二千餘賊深為可嘉所有在事及受傷陳亡官兵哈密兵應行賜恤之處該部速議具奏尋兵部議覆應遣臣部司官及理藩院司官各一人於甘肅巡撫處領帑銀一萬五千兩賫往哈密賞賜伯克額敏逰擊潘至善以下及陳亡受傷兵丁等其應行議敘員辨及加恩兵丁一併查明議奏奏入上從之傳諭哲卜尊丹巴胡土克圗上諭議政大臣等曰哲卜尊丹巴胡土克圖處著派賢能司官一員馳驛前往諭以䇿妄阿喇布坦兵二千前來哈密被我逰擊潘至善等領二百緑旗兵並伯克額敏盡行擊敗殺九十人生擒三人再令胡土克圗速遣人前往䇿妄阿喇布坦處去云中國至聖皇帝大沛仁恩欲天下共享太平爾無故發兵被駐劄哈密二百緑旗兵及哈密回子盡行擊敗今既敗北如何度日何不速遣使至皇帝前跪請伏罪爾若不如此懇求必加天討衆生靈亦遭塗炭現在滿洲蒙古漢人並喀爾喀厄魯特各處兵俱已整備我係出家人但為衆生憐惜性命兼念舊好差人指示爾當作速跪請伏罪無貽後悔等語撰寫呈覽具奏發往丁亥命調黑龍江打牲索倫達呼里喀喇沁兵上諭議政大臣等曰著派黑龍江兵五百名並打牲索倫達呼里兵五百名三處喀喇沁兵一千名每人各帶長鎗鳥鎗其黑龍江及打牲索倫達呼里兵著從口外往歸化城去喀喇沁兵著乘自有馬匹從本處起程其口糧到瑚坦和碩再支領倉米倘糧不足著支領唐三營倉米於八旗出厰馬匹內給喀喇沁兵每人馬二匹如同歸化城察哈爾並右衛預備之兵發往推河地方駐劄則不拘何處俱可去得著議奏議曰右衛察哈爾歸化城兵已經預備應令將軍費揚古於文到日率領啓行所調黑龍江索倫達呼里喀喇沁兵令其陸續即往推河其厄魯特額駙阿寶及鄂爾多斯兵亦令至推河聽將軍費揚古調遣奏入得旨喀喇沁兵著格勒爾帶往侍衛色楞授為副都統前去黑龍江兵著副都統白濟帶往索倫達呼里兵著總管布珠並哈特虎之子伊禮布帶往上又諭曰喀喇沁兵行期甚速路復遙逺著侍郎覺和托一等侍衛色楞攜內帑一萬兩速往賞賜己丑籌度三路進勦事宜上諭議政大臣等曰朕經厯軍務年久且曽親統大兵出塞征討凡行兵機務靡不周知今欲用兵兵非不敷但慮路逺運餉殊難誠能挽輸無誤令全軍得至䇿妄阿喇布坦之地朕心始慰此兵多係從前在招摩多烏蘭布通屢經對敵之兵且人人懷報效之志若䇿妄阿喇布坦來戰不論何地制勝有餘再若由噶斯路進兵一萬赴伊犁河源抵彼巢穴由哈密吐魯番進兵一萬由喀爾喀進兵一萬前至博克達額林哈畢爾噶地方如此三路進勦料必成功但其間進止又在臨時相機而行未可預定爾等雖未身厯軍旅既為國家大臣於議此等要事時當詳審籌度務合機宜非可視同泛常也甲午肅州總兵官路振聲摺報䇿妄阿喇布坦兵遁路振聲奏言臣領兵兼程前往哈密於本月十二日至額爾特穆爾地方去哈密百二十里據哨探人來報哈密人聞天兵來援老幼歡忭䇿妄阿喇布坦兵聞信已於初七日悉衆潛遁奏入報聞加敘擊敗䇿妄阿喇布坦緑旗官兵上諭兵部曰逰擊潘至善率領緑旗兵二百人擊敗䇿妄阿喇布坦二千餘衆當此承平日久兵革休息時乃倉猝間能如此奮勇直前殊為可嘉前雖諭令賞給朕心猶為未足今再加恩將此二百名兵丁各給與把總劄付其中陳亡兵丁十餘人亦給與把總劄付準伊妻子食俸著速議具奏尋兵部遵旨議覆遊擊潘至善等均應越等升用奏入上從之命傳諭各路進勦官兵上諭議政大臣曰著遣侍衛一人速往諭喀喇沁此進勦兵丁路途遙逺可俟料理齊備啓行其調來黑龍江索倫達呼里等兵可將䇿妄阿喇布坦兵戰敗逃去情形傳諭之祁里德處亦遣司官一人往諭令衆喀爾喀知之厄魯特額駙阿寶輝特公羅卜藏兵即著此司官差人往諭令其前往哈密駐劄乙未定西陲用兵之䇿我世宗憲皇帝時為和碩雍親王是日與皇三子和碩誠親王入見上籌及邊事世宗憲皇帝奏曰當日天兵誅殛噶爾丹時即應將䇿妄阿喇布坦一同勦滅因伊畏罪懾服備極恭順是以特賜生全今乃漸漸狂悖居心險詐背負聖恩種種不恭至於侵擾我哈密干犯王章於國法難以寬貸自當用兵撲滅以彰天討上深然之臣等謹案天討有罪爰制五刑負固不服乃申九伐仰惟我國家撫有方夏幅員式廓西北四十九部自定鼎以來畏威懷德備沭深仁並𨽻編氓撫如戶闥厄魯特種類界連喀爾喀及喀密諸城堡名為遐裔實同近疆彼漢帝唐宗所謂勤兵逺略固非今日之形勢也噶爾丹梗化陸梁罔辭於罰我聖祖仁皇帝三駕親征天戈所麾如摧枯朽渠魁底罪爰宥脅從恩威並施覆載同量乃䇿妄阿喇布坦猶復自外生成敢行不逞擾我哈密自當大申撻伐勦除醜類為永逺敉寧計時世宗憲皇帝尚在潛邸建䇿興師允符聖指文謨武烈兩朝一揆煌煌乎顯承之丕訓也命籌核糧餉詳議三路進兵事宜上諭議政大臣等曰軍中糧務甚屬緊要前勦噶爾丹時曽由兩路運米至翁金河乃已經熟識之地而推河與翁金甚近又從前兩路所運之米至回軍時尚未用完度今所用錢糧最多不過三四百萬可以足用著戶部動支正帑運送軍務乃係大事著遣司官二員分往富寧安祁里德處令公同商議䇿妄阿喇布坦兵已大敗而去今若三路進兵或即行進勦或前逼近彼處遣使招降著富寧安與將軍提督總兵官祁里德與喀爾喀汗王台吉等各詳議具奏喀爾喀汗王台吉等若自度兵力可以進勦固善或再助以我兵及黑龍江索倫達呼里兵更為妥當再西安甘肅巡撫處著將河東鹽課銀四五十萬解往上又諭曰殺虎口藤牌烏鎗緑旗兵六百名著副將帶領前往推河令將軍費揚古統領上又諭曰噶斯口著先派滿洲緑旗兵各一千前往駐防令富寧安就隨去官員內揀一人率領前往平定凖噶爾方略前編卷一
