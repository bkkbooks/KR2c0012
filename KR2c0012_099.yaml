body:
  text: 乾隆二十二年冬十月丁卯諭參贊大臣哈寧阿帶兵會𠞰上諭軍機大臣曰哈寧阿奏稱准將軍兆惠來文由奎屯前往濟爾哈朗會同雅爾哈善等自托多克晶托里至博羅塔拉安設臺站巡查等語現在兆惠等所安臺站俱已接續哈寧阿無庸前往惟朱爾都斯路所設臺站被賊沙喇斯瑪呼斯等搶掠經滿福帶兵前往迄今二十餘日未據奏報復令阿里衮帶兵接應著哈寧阿即帶現兵徑往朱爾都斯會同滿福等進𠞰沙喇斯瑪呼斯賊衆仍候將軍等議定官兵過冬之處協助雅爾哈善辦事在參贊大臣上行走此際滿福若業經勦滅賊衆接續臺站哈寧阿即前赴雅爾哈善軍營至哈寧阿所奏從前行至巴克庫蘇臺曾派署章京濟德署守備楊天祿等搜捕相近臺站之瑪哈沁等雖非𠞰滅大隊賊衆可比亦應加恩著查明照搜勦嗎哈沁之坐臺筆帖式例一體送部議叙命副都統莽古賚馳驛前赴北路軍營在參贊大臣上行走戊辰諭署定邊左副將軍策布登扎布交代來京上諭軍機大臣曰昨命將軍成衮扎布兆惠等來京籌議軍務著䇿布登扎布亦馳驛來京將定邊左副將軍印務交納穆扎爾署理阿桂著往代納穆扎爾莽古賚著往代阿桂阿桂不必候莽古賚即前赴科卜多納穆扎爾與阿桂交代後即赴烏里雅蘇台䇿布登扎布與納穆扎爾交代後再行來京己巳諭令副都統圖倫楚等同將軍等分隊來京上諭軍機大臣曰昨諭將軍大臣等來京應同來之大臣侍衛等俱經㸃出今思圖倫楚端濟布努三亦當同來可傳諭成衮扎布令其分隊來京庚午諭定邊將軍成衮扎布等交代防勦事宜上諭軍機大臣曰將軍成衮扎布等奏稱撤兵到濟爾哈朗會同兆惠於兩路兵內酌留二三千名整備口糧馬匹於正月下旬由伊犂前往沙喇擘勒進勦巴圖爾烏巴什等賊衆所辦尚是成衮扎布兆惠將軍營事務辦理具奏後即同富德舒赫德來京明瑞著停其前來雅爾哈善在濟爾噶朗駐劄總辦軍務永貴明瑞愛隆阿額爾登額協辦軍務於濟爾哈朗至巴里坤適中之地派兵一千著哈寧阿駐劄鄂實三格瑚爾起為副其琿齊沙喇斯瑪呼斯賊衆有散逸在附近地方者即帶兵數百搜勦琿齊若過戈壁往沙喇擘勒則不必逺勞我師沙喇斯瑪呼斯等若往伊舊游牧哈喇沙爾自當與額敏和卓相遇已諭阿里衮會同追勦今尚未可懸定哈寧阿出兵後即著愛隆阿駐劄俟哈寧阿回兵再往濟爾哈朗軍營所設臺站著兩處副都統等輪班巡查行走其瑚爾起進勦琿齊陳亡帶傷官兵著成衮扎布等查明報部分别優恤議叙至駐兵所需口糧著成衮扎布兆惠等籌議速為運送即行具奏大學士管理陜甘總督黃廷桂疏奏巴里坤屯田事宜黃廷桂奏言竊查雍正年間巴里坤駐劄大臣時奎素石人子巴里坤以至尖山一帶地畝俱經開懇尚有溝塍形迹臣於上年冬月奏請派撥緑旗官兵五百名前往開墾試種以濟兵食嗣因逆賊巴雅爾等叛逃派調軍前旋議撤回臣復札知巴里坤大臣派現存緑旗兵丁將渠道先行開濬并踏勘各處水泉可溉地畝若干旋據覆稱委總兵丑達勘得尖山子起至奎素一帶百餘里內從前地畝舊迹俱存係取用南山之水共有正渠九道自山口以外多滲入沙磧必須木槽接引方可暢流其三道河以北自鏡貌泉三墩起至奎素止亦有開墾地畝正渠三道及支渠形迹荒蕪日久渠身湮塞現在工多人少且工料必須撥運等語臣查善後事宜案內巴里坤駐劄滿兵三千名緑旗屯田兵一千五百名今駐防滿兵尚需時日而開懇地畝似宜早計請於甘涼肅三處先派種地官兵一千名於來年正月前往疏濬水泉開引渠道需用工匠物料田器牛隻等項均由內地辦運至二三月間土膏萌動即分布各兵於可懇之地翻犁試種查巴里坤一帶氣寒霜早惟宜青稞應令各兵於青稞外如糜穀之類少為試種倘獲有收再行加增其官兵整裝銀兩照例給發奏入上諭軍機大臣曰黃廷桂奏派兵一千名於來春前往巴里坤等處屯田等語自應及時籌辦但此尚在近地其烏魯木齊等處亦須漸次屯種接濟兵食其如何相度水利測驗土脈及派兵前往一切口糧牛具籽種等項豫為料理之處著傳諭黃廷桂詳悉具奏辛未諭署定邊左副將軍䇿布登扎布來京請訓上諭軍機大臣曰昨諭兩路大軍大臣等於十二月初十以內來京請訓俟來春進兵今思將軍成衮扎布宣力軍營將及一載自應稍為休息來年令伊在烏里雅蘇台辦理副將軍事務策布登扎布辦理諸事皆合機宜較從前大有進益來年進兵以兆惠為定邊將軍以策布登扎布為右副將軍著策布登扎布即馳驛來京請訓喀爾喀王公內有能協同辦事之人伊即指定一二人具奏無庸派出兵丁但將親隨人役酌量足用仍加恩賞銀二千兩為整理行裝之用其行裝就近自烏里雅蘇台由阿濟必濟先遣發往巴里坤伊與納穆扎爾交代後作速來京諭大學士管理陜甘總督黃廷桂派解馬匹事宜上諭軍機大臣曰明春派兵往沙喇擘勒勦賊巴圖爾烏巴什等酌用兵二千五百名人給馬三匹計需馬七千五百匹并辦給侍衛大臣官員等馬五百匹共用馬八千匹可傳諭黃廷桂即照數挑選派賢能員辨自肅州送至巴里坤沿途加意餧養約十一月可到自巴里坤至軍營已另派官兵解送著遵㫖速行辦理諭定邊將軍成衮扎布等整頓軍裝及運送馬匹額數上諭軍機大臣曰此次出兵以來將及一年恐兵丁衣服器械未能整齊理應加意辦理著成衮扎布兆惠等查明應行補換者自巴里坤運送即行籌議具奏現在天氣已寒伊等未能進勦前曾降㫖於來春派兵二三千前往沙喇擘勒其口糧馬匹數目業經交議今朕定兵數二千五百名人給馬三匹官員大臣等添備五百匹已諭黃廷桂辦馬八千匹備用矣可傳諭將軍成衮扎布等知之又諭曰黃廷桂所辦馬匹自肅州送至巴里坤即另委官兵解送著派出厄魯特散秩大臣巴圖濟爾噶爾乾清門侍衛郭木尼勒圖富紹自巴里坤解送濟爾哈朗巴圖濟爾噶爾賞銀一百兩郭木尼勒圖富紹各賞銀五十兩即前赴巴里坤等候仍派察哈爾索倫兵四百名沿途防備嗎哈沁其馬匹加意照料如遇風雪即便住宿進兵之日以巴圖濟爾噶爾為領隊大臣郭木尼勒圖富紹照從前圖倫楚例帶兵行走諭駐劄巴里坤辦事提督豆斌派兵轉解馬匹上諭軍機大臣曰來歲進勦沙喇擘勒賊衆已諭黃廷桂派馬八千匹送至巴里坤其由巴里坤送至軍營亦派出巴圖濟爾噶爾郭木尼勒圖富紹等接管轉解著傳諭豆斌於成衮扎布等撤回之索倫蒙古兵內選派四百名交巴圖濟爾噶爾等帶領將馬匹緩行趕送到噶爾藏多爾濟游牧加意牧放俟將軍等議定駐兵之地趕送交收途次如遇風霜稍為歇息諒不至於疲乏併傳諭成衮扎布兆惠黃廷桂知之諭兩路將軍大臣特派官兵牧放軍營馬匹上諭軍機大臣曰現在酌議駐兵過冬著傳諭成衮扎布兆惠雅爾哈善等軍營所有馬匹若仍令各官兵自行餧養恐多疏懈甚至有偷宰等事自應官為收查按數特派官兵擇水草佳處加意牧放俟進勦沙喇擘勒官兵回時撥往辦理回部自然臕壯適用雅爾哈善既署理將軍事務更當盡心辦理將收數若干及牧放處所詳悉奏聞壬申諭甘肅巡撫吳達善赴巴里坤辦事上諭軍機大臣曰昨命黃廷桂派撥馬匹送至巴里坤現在阿里衮帶兵進勦著吳達善即赴巴里坤收管馬匹料理轉解事竣再回原任併傳諭黃廷桂知之諭定邊將軍成衮扎布等酌議馬匹數目上諭軍機處臣曰明春前往沙喇擘勒兵丁二千五百名共派馬八千匹已交黃廷桂等辦理今思冬寒之候解送維艱酌籌人給馬二匹合之大臣官員共五千五百匹成衮扎布等於軍營馬匹內挑選二千五百匹加意牧養以符人給三匹之數而解送之馬亦可暫存以備辦理回部之用是否可行成衮扎布等酌議具奏此時八千馬匹仍照數豫備計解送之日伊等即咨行黃廷桂酌量派撥又諭曰昨諭豆斌挑選兵丁四百名解馬八千匹沿途照看似覺不敷今又酌減為五千五百匹則已足用著傳諭豆斌再派兵丁一百名豫備若成衮扎布等議奏仍須送馬八千匹行文到日豆斌即派兵五百名解送丙子命議處户部侍郎阿里衮上諭軍機大臣曰據阿里衮奏稱將軍成衮扎布奏摺行文事件現俱馳遞無滯伊遵㫖停止帶兵前往其諭交將軍成衮扎布之㫖由濟爾哈朗路馳送等語將軍成衮扎布原係由朱爾都斯一路進兵昨被搶之阿勒輝臺站即係朱爾都斯一路所設而現在遞到事件乃由濟爾哈朗一路與朱爾都斯何涉此路臺站經滿福帶兵前往安接至今未有信息今事件雖由濟爾哈朗路遞到其朱爾都斯臺站曾否撤回滿福現在何處應如何探聽策應之處更屬緊要前因阿勒輝臺站被搶將軍成衮扎布等奏報未通阿里衮竟置之不問經朕屢降諭㫖令伊帶兵速往接應豈可因濟爾哈朗一路遞到事件而謂朱爾都斯臺站亦遂通耶且前㫖所謂臺站若通即不必前往亦專指朱爾都斯路之阿勒輝臺站而言非謂濟爾哈朗路遞到事件也阿里衮辦事若此朕實不知為何心著交部嚴察議奏伊如此行止朕早已見及昨諭阿里衮帶兵接應滿福照管行糧巡臺𠞰賊計此際已奉到朕㫖帶兵前往矣現在已至何處滿福信息如何朱爾都斯路曾否接續抑或撤回之處作速奏聞申諭定邊將軍成衮扎布等酌議駐兵事宜上諭軍機大臣曰據阿里衮奏稱准將軍成衮扎布等來文酌撥官兵口糧三百石送赴軍營又云兆惠候辦齊口糧即前赴伊犁等語看伊等現在情形未必能衝寒即往著遵朕㫖或在濟爾哈朗過冬或在烏魯木齊亦可伊等此時想已㑹合一處即將駐劄地方及昨交議馬匹數目速為議奏再來京請訓可也諭署定邊左副將軍策布登扎布等派兵搜查藏匿賊衆上諭軍機大臣曰據烏梁海人等告稱阿爾台以外納林布魯爾阿巴蘭克伊特等地方尚有隱匿之烏梁海等或阿睦爾撒納郭勒卓輝等賊藏匿於此亦未可定已諭護送哈薩克來使之和碩齊等詳細搜查恐逸賊頗多又加以阿睦爾撒納在彼兵不敷用著傳諭策布登扎布納穆扎爾等派唐喀祿帶兵二百名同侍衛二人在彼處適中之地駐劄候和碩齊信息如有阿睦爾撒納及太隊賊人在彼伊等即接應和碩齊仍報知駐劄科卜多大臣添兵接應其和碩齊有具奏事件即送交唐喀祿轉遞唐喀祿係獲罪之人今令其效力自贖宜知奮勉策布登扎布即妥協辦理署理定邊左副將軍印務策布登扎布等疏奏擒獲托音喇嘛羅卜藏阿喇卜珠爾正法策布登扎布等奏言臣等遵㫖將戕殺卡倫侍衛之托音喇嘛羅卜藏阿喇卜珠爾等嚴緝務獲即通行四部落十月初二日哈爾噶納之擕眷卡倫章京濟爾噶勒等將羅卜藏阿喇卜珠爾拏獲臣等審訊起意戕殺侍衛卓勒和等情節供認不諱即於本日正法奏入報聞戊寅諭户部侍郎阿里衮進勦事宜上諭軍機大臣曰昨因阿里衮奏成衮扎布軍營奏報皆由濟爾哈朗馳遞竟置朱爾都斯於不問已降㫖交部察議仍令帶兵㑹合滿福如額敏和卓告稱沙喇斯瑪呼斯等逃往哈喇沙爾即㑹同進勦想此時已帶兵前往矣但滿福自奏阿勒輝臺站被掠後並無奏報深為厪念是以諭阿里衮速探信息其探信之道不過由第一臺起查至何臺阻隔即已知信息不通之由乃並未如此辦理朕所不解此時額敏和卓若來告賊衆已往哈喇沙爾阿里衮即前赴協勦如未有實信即速往接應滿福沿途所得信息作速奏聞又諭曰昨諭副都統哈寧阿不必巡查兆惠等所設臺站即帶兵接應滿福想此時已會兵一處矣滿福久無奏報著哈寧阿將帶兵已至何處辦理情形如何速行具奏諭吐魯番貝子額敏和卓進勦事宜上諭貝子額敏和卓曰昨據爾報稱遣人前赴哈喇沙爾探取叛賊沙喇斯瑪呼斯等信息如賊衆赴哈喇沙爾即帶兵前往辦理朕已傳諭巴里坤辦事大臣阿里衮云如沙喇斯瑪呼斯等賊人回至哈喇沙爾可帶兵往會額敏和卓勦捕此時爾差遣探信之人亦應歸告如賊果回哈喇沙爾爾即告知閻相師作速知會阿里衮會同進勦倘未由此路亦知會阿里衮會同滿福進𠞰可也己卯申諭户部侍郎阿里衮等進𠞰事宜上諭軍機大臣曰據阿里衮奏稱奉到諭㫖帶兵二百名至阿勒輝等處會合丑達兵丁進勦等語阿里衮前奏濟爾哈朗臺站現在通行停止進兵經朕飭諭始行前往今據軍營奏報朱爾都斯臺站已經撤回自不必另辦阿里衮惟會同滿福追勦沙喇斯瑪呼斯等賊衆至額敏和卓欲帶緑旗兵二百名前去特為回兵缺馬之故阿里衮何必屢向閻相師查問甚屬糊塗今阿里衮已帶兵前往此㫖及諭額敏和卓之㫖俱著豆斌轉發又諭吐魯番貝子額敏和卓曰據爾奏報巴里坤大臣等遵朕諭㫖訪查沙喇斯瑪呼斯等賊人信息又因道逺若俟訪查回報再行前往恐致耽延已於十月初一日帶兵起程至托克三駐候等語朕深為嘉許向來辦事人員每候信息以為行止爾能奮勉如此深協機宜加恩賞給大縀四端明歲辦理葉爾羌喀什噶爾時雖有將軍大臣而回部情形爾所熟悉將命爾參贊軍務在前隊行走爾其益體朕恩實心奮勉以奏膚功永膺懋賞特諭庚辰申諭户部侍郎阿里衮接應滿福進勦上諭軍機大臣曰據滿福奏稱帶兵至朱爾都斯接續被賊搶掠之六臺站其將軍成衮扎布之兵未知所在又據瑪呼斯之博多羅克告稱賊人游牧到喀喇呼魯向呼魯木什烏䦨和屯而去已帶兵從巴顔阿滿臺站尋賊踪跡追往但馬匹多屬乏弱等語滿福進兵月餘辦理𠞰賊事宜毫無頭緒總以馬乏為詞伊在吐魯番休息許久何至遽然疲乏著傳諭阿里衮即帶兵徑往呼魯木什等處協同進勦再額敏和卓現帶兵在托克三駐劄候信呼魯木什等處若與哈喇沙爾相近阿里衮即知會額敏和卓亦帶兵赴彼協同勦賊可也壬午諭户部侍郎阿里衮等招服賊衆事宜上諭軍機大臣曰成衮扎布等奏稱遵朕諭㫖賞給宰桑三都克銀兩留於軍營派伊屬下敦多克哈什哈敦多克策凌等招服沙喇斯瑪呼斯人等雖亦勦撫並行之策但辦理此等叛賊已諭阿里衮滿福帶兵前往若伊等聞知將軍處使人招降即不奮勉勦賊又或叛賊等僞為投順使我兵弛備均未可定著速行傳諭阿里衮滿福賊衆若未歸降自當勦殺即成衮扎布遣人招服業已來降亦應沿途留心察看稍有變動即行掩襲務宜相機行事又沙喇斯瑪呼斯有倡亂數人及訛傳大兵為阿睦爾撒納所敗之數人情尤可惡阿里衮等即詢問敦多克哈什哈等務須擒拏解京至敦多克哈什哈等既隨三都克效力行走阿里衮辦理叛賊時詳問伊等賊中形勢若招降後有密行辦理之事仍示伊等以沙喇斯瑪呼斯等已降復叛是以不便存留至爾等係隨三都克輸誠效力本不相同勿生疑忌此數人俱賞給藍翎照看回營亦傳諭成衮扎布知之臣等謹案沙喇斯瑪呼斯鄂拓克叛降反覆罪不容誅我兵悉力窮追逸賊自無從逋匿勦撫並行之䇿本非勢所必需至敦多克哈什哈等即係沙喇斯瑪呼斯部衆雖一時效力軍營而若輩狡詐性成亦難深信我皇上先幾洞燭屢敕周防兹復諄誡在事諸臣奮勉勦賊毋狃降弛備並諭及臨時相機籌辦而滿福以接續臺站奏報稽時即命大臣等統兵䇿應探信亦恐其為賊所愚也厥後滿福果誤信賊人詭持軍檄墮計捐軀今恭繹前後訓㫖仰見聖明鑒察不爽纎毫而防患未萌籌畫備至諸臣乃得有所禀承雖萬里以外無異呈形目前矣諭大學士管理陜甘總督黃廷桂派兵解送馬匹上諭軍機大臣曰黃廷桂奏稱豫備軍營馬匹請派自準噶爾脫出之官兵解送等語所見甚是伊等久居邊地既知水草復嫻於牧放較之緑旗兵丁自屬不同從前派出副都統巴圖濟爾噶爾等令先至巴里坤候馬匹到日派兵四百名解送黃廷桂想已奉到此㫖即將脫出兵丁等歸入四百名數內仍傳諭伊等加意奮勉果能牧養得宜將來仍歸各本旗佐領當差至黃廷桂所奏候軍營咨取馬匹文到即行解送此係前次諭㫖今不必候咨即辦理解送可也甲申申諭户部侍郎阿里衮㑹兵進𠞰上諭軍機大臣曰阿里衮奏稱帶兵將阿勒輝等臺站巡查辦理其丑達之兵遣回鹽池等處臺站往來搜勦賊人等語鹽池距巴里坤甚近竊掠臺站不過數嗎哈沁賊耳不必將丑達遣回即速會兵前往朕屢諭阿里衮接應滿福進𠞰沙喇斯瑪呼斯賊衆務奮勉速行毋少瞻顧諭參贊大臣富德勦賊事宜上諭軍機大臣曰富德奏稱逆賊阿睦爾撒納雖已逃入俄羅斯而伊犁等處藏匿賊黨仍須勦殺現在喀喇瑪嶺駐劄古爾班察爾一帶俱安設卡倫防守等語朕屢經降㫖令伊等來京富德想尚未奉到故有此奏但逆賊琿齊額林沁達瓦詐稱歸降又復逃去富德如回兵時或遇此等叛賊或偵探去向相離不逺即帶兵勦殺富德兵馬駐憩已久自屬可用若道逺不便即徑往濟爾哈朗同成衮扎布等來京可傳諭富德知之丙戌申諭將軍大臣籌議駐兵進勦日期上諭軍機大臣曰昨諭成衮扎布兆惠富德等來京請訓今計算伊等往返日期須無誤進兵之時方為妥協著傳諭伊等將現在駐兵何處何時到京及請訓回營能與進𠞰之時適相符合處一面奏聞一面速行來京如恐稍有遲誤現在雅爾哈善駐劄濟爾哈朗軍營或令其就近帶兵前進伊等再自京馳赴料可追及即與雅爾哈善公同籌議具奏命以伯格里屬人分賞駐防官兵嚴加管束上諭軍機大臣曰前諭將伯格里之妻送京安插所有屬人一百六十餘口交直𨽻總督方觀承分給天津青州保定等處駐防滿洲為奴著傳諭各該將軍城守尉等此等厄魯特俱係獲罪之人若不遵約束即正法示衆毋得任其脫逃命參贊大臣永貴署理西安巡撫印務所辦軍營糧務俟定長服滿後前往接辦丁亥命優恤喀爾喀公品級齊巴克扎卜及議叙效力官兵上諭軍機大臣曰納穆扎爾奏稱進勦哈喇哈巴等處藏匿之明噶特烏梁海等喀爾喀公品級齊巴克扎卜帶兵前至阿爾呼特等處將賊衆盡行勦殺齊巴克扎卜被鎗傷腋陳亡等語似此奮勇捐軀深可憫惻著實封公爵令伊子承襲將其佐領屬人另編一扎薩克仍賞銀三百兩其陳亡帶傷官兵查明恩恤此次都爾伯特汗策凌等之屬人亦有奮勉者並酌量賞賜其效力得功官兵交部議叙仍將頭等得功之人優加賞賚戊子命以邁斯漢情實勾决罪案傳諭兩路軍營上諭軍機大臣曰今日刑部進情實官犯本內將原任參將邁斯漢擬以情實去年雅爾哈善等派出邁斯漢帶兵往探兆惠信息伊並非中途遇敵不能前進乃遷延道路竟自回營因命拏解審訊擬斬監候復命查其先世有無陳亡之人據該部將伊叔曾祖陳亡查奏夫陳亡之子孫從寬免死者原指尋常罪犯而言並非軍法可比今邁斯漢帶兵數百同往之高天喜亦已殺賊百餘收其牲隻邁斯漢何難奮力前行乃聽俘賊虛詞即恇怯不進爾時若不另派官兵接應兆惠必至僨事則邁斯漢之罪雖伊祖父陳亡亦難稍逭是以豫勾正法八旗世僕等若恃祖父陳亡派往軍前並不效力於習俗大有關係果其情有可矜朕亦必加原宥若似邁斯漢失機畏怯豈能屈法加恩可傳諭兩路將軍大臣等通行曉示軍營官兵等知之十一月己丑朔諭定邊將軍成衮扎布等進𠞰巴哈曼集等事宜上諭軍機大臣曰覽兆惠雅爾哈善等奏摺現在軍營辦理情形總以明春進兵為要著成衮扎布等遵㫖來京至辦理沙喇斯瑪呼斯賊衆已命阿里衮哈寧阿等陸續前往惟扎哈沁巴哈曼集等叛逃之後乘隙搶掠臺站據雅爾哈善等奏捉生詢問知巴哈曼集為得木齊哈勒拜所敗逃入烏勒郭蘇山內之沙扎海地方等語雖未可全信而賊衆究屬潛匿臺站終有疏虞今雅爾哈善已派端濟布前往著傳諭成衮扎布將哈寧阿調回令其協助端濟布若前行已逺即於濟爾哈朗軍營派兵一二百名發往倘端濟布等未能勦滅賊衆則成衮扎布等起程來京沿途搜勦以清臺路又叛逃之琿齊額林沁達瓦等已諭富德歸途之便就近搜勦併傳諭哈寧阿等知之庚寅諭署定邊左副將軍策布登扎布等協勦巴哈曼集等賊衆上諭軍機大臣曰據雅爾哈善奏稱巴哈曼集屬人藏匿烏勒郭蘇山有逃往阿爾台之信此事容亦有之伊等或投俄羅斯或合烏梁海均未可定可傳諭策布登扎布納穆扎爾等即行文科卜多軍營速交唐喀祿等令其沿途偵探協同勦殺其車木楚克扎布所辦烏梁海情形若何作速奏聞議奏派調喀爾喀等官兵事宜署定邊左副將軍策布登扎布奏言臣奉恩㫖於明年前往西路軍營請派出圖謝圖汗部落之公品級扎薩克三都卜多爾濟協理頭等台吉齊旺扎卜賽音諾顔部落之扎薩克達什協理頭等台吉敦多卜四等台吉庫爾奎扎薩克圖汗部落之協理台吉旺舒克等并調取喀爾喀兵二百名於達什達瓦扎哈沁厄魯特兵內挑選一百名將有馬之索倫兵挑選一百名若進勦時無需多兵即將現在軍營官兵之乏弱者撤回如蒙俞允請照例豫行支給整裝銀兩先行起程奏入得㫖軍機大臣速議具奏尋議策布登扎布請調取喀爾喀等兵丁更替軍營兵丁之乏弱者事屬可行但喀爾喀災歉之後生計頗艱若多為調遣不無勞費至厄魯特等新經安插復令從軍未免驚擾且伊等性多貪狡軍前有違紀律於事無益應停其調遣請將所奏兵丁四百名減為二百名派索倫兵一百五十名喀爾喀兵五十名再於達什達瓦屬人等熟悉路徑者酌帶數人作為嚮導至所奏派出喀爾喀公台吉等應請准其帶往所有派調官兵俱照例賞給整裝銀兩奏入上從之辛卯諭大學士管理陜甘總督黃廷桂解送巴雅爾等來京上諭軍機大臣曰據豆斌奏稱端濟布將嚮導巴雅爾等送至巴里坤并聲明伊等俱奮勉效力請遵㫖照情有可原之例分賞官兵并行文黃廷桂等語所辦甚屬拘泥巴雅爾等身在軍營較不從逃叛前來送信之人尤為出力非但情有可原而已可傳諭黃廷桂即曉示巴雅爾等辦事大臣請將爾等分賞官兵大皇帝念爾等俱係效力之人恩㫖送入內地即將伊等派員解送來京命加吐魯番貝子額敏和卓貝勒品級上諭軍機大臣曰吐魯番貝子額敏和卓遣人前往哈喇沙爾探取沙喇斯瑪呼斯信息即領兵前往托克三守候後因賊人未至哈喇沙爾又遣往和爾米斯和喇探聽相機進勦似此感激朕恩誠心效力甚屬可嘉著加恩給與貝勒品級明歲辦理葉爾羌喀什噶爾等處令為參贊昨已降㫖其益加奮勉以膺恩賞署章京噶布舒護軍校桑烏善押送厄魯特伊宛等來京得㫖伊宛授為藍翎侍衛賞銀五十兩達瓦在司轡上行走賞銀二十兩噶布舒授三等侍衛賞銀五十兩桑烏善授藍翎侍衛賞銀三十兩軍機大臣疏奏傳諭安插伯格里妻室軍機大臣奏言伯格里之妻到京臣等遵㫖傳諭云從前皇上加恩淮爾率屬移於察哈爾續經將軍大臣參奏爾以台吉之妻不修婦道難於管領屬人請將爾治罪皇上格外施恩命爾與噶爾藏多爾濟之妹同居傳示畢隨將伯格里妻女及婢女二人送往安插其隨僕八人暫交理藩院看守候賞駐防官兵奏入報聞壬辰申諭定邊將軍成衮扎布等酌定軍營馬匹數目上諭軍機大臣曰據黃廷桂奏稱應送巴里坤馬匹業經分起節次起程俟成衮扎布咨到照數送往等語昨曾傳諭成衮扎布兆惠等令於軍營現存馬內選出二千五百匹加意牧放以備征進則黃廷桂辦送之馬祗需五千五百匹伊等定議後即行文知㑹今黃廷桂既經奏報起程著成衮扎布兆惠等速行定議知㑹不可再遲此際伊等現在何處即速奏聞亦傳諭黃廷桂知之諭定邊將軍成衮扎布等確查叛賊琿齊蹤跡上諭軍機大臣曰昨諭將達瓦之弟鄂爾奇達遜送京今據供稱琿齊踪跡似向空格斯逃去等語著便中傳諭成衮扎布兆惠等確查具奏癸巳定議哈薩克交易事宜軍機大臣奏言黃廷桂奏籌辦哈薩克交易事宜一摺奉㫖軍機大臣議奏查臣等前因兆惠等奏阿布賚請將馬匹赴烏魯木齊交易臣等議以程途頗逺商販難於聚集請官為經理選派熟諳交易之人照商人一例不必顯露官辦形迹今據該督奏稱烏魯木齊交易運費浩繁似在吐魯番為便其明歲交易止換馬匹若哈薩克帶有駝隻牛羊亦係軍營需用請一體收買其應需緞匹若由內府辦解絲色精良而官辦後仍必招商將來恐成色略減致煩言論現在陜省採辦各色緞匹及巴里坤現存雜色梭布京莊布均可敷用哈密現存茶封為數頗多一切馱運即用軍營餘駝酌量雇覔商駝添備車輛遴委道員同知副將酌派備辨兵丁押送等語查臣等原議哈薩克交易在烏魯木齊因前與阿布賚定約奉㫖允准似不便更易致失信逺人雖運費浩繁原可增加價值至吐魯番近接邊陲建有城堡較烏魯木齊地方空濶可以隨處開市者不同恐哈薩克人等與回民熟習轉致滋擾應仍照臣等原議至收換馬匹騍馬之外有隨帶騍馬亦可量收庶於孶生有益其他牲隻亦應一體收買至疲瘦牲隻一切雜貨雖不應交易但念其攜帶逺來或減價收留以示節制其緞匹一項陜省既可採買應如所奏辦理至布匹茶封尤哈薩克所必需今哈密既存有茶封巴里坤亦有購備布匹應令雇覔商駝或添備車輛運送不必挑用軍營餘駝其遴委道員同知副將等員并酌帶將辨挑派兵丁應需鹽菜口糧及商民人等願隨前往購買零星物件各聽其便俱應如所奏再該督奏派兵一百名係因吐魯番現有屯兵足資彈壓今既仍在烏魯木齊交易應否添派兵丁亦聽該督酌量辦理明歲係初次貿易自當立定章程不可遷就而交易之際又必示以公平俾遐荒感知天朝柔逺之經方為妥協應交該督轉飭道協各員善為經理可也奏入上諭曰黃廷桂所奏籌辦來年哈薩克貿易事宜一摺已據軍機大臣議奏但貿易之事不過因其輸誠內嚮俾得懋遷有無稍資生計而彼處為産馬之區亦可以補內地調撥缺額並非藉此以示羈縻亦非利其所有而欲賤值以取之也將來交易之際不可過於繁苛更不必過於遷就但以兩得其平為是可傳諭黃廷桂令其善為經理至奏內所稱委派道㕔等員看來貿易之事終不可全以官法行之能辦政務者未必熟諳商賈朕思道員中如范清供同知中如范清曠等伊家原曾承辦軍營及一切貿易應尚有舊時商夥習練其事或可於此二人中酌調一人赴甘承辦是否有益并著妥議奏聞參贊大臣副都統哈寧阿疏奏協助端濟布勦賊情形哈寧阿奏言臣於九月二十九日至濟爾哈朗軍營聞知將軍成衮扎布等由闥勒奇回兵副將軍兆惠亦合兵一處其濟爾哈朗至博羅塔拉無庸設立臺站惟參贊大臣富德尚在博和什騰等處是以庫爾河等臺站未曾全撤臣因山中降雪恐嗎哈沁等侵擾臺站將所領兵三百名內挑選一半巡查十月十三日接雅爾哈善行文扎哈沁之得木齊哈勒拜等現在烏勒郭蘇山內之沙扎海地方藏匿已飭總管端濟布進勦速派官兵協助臣即於所帶兵丁內挑選五十名派虛銜藍翎綏神保等迅往協助端濟布奏入報聞平定凖噶爾方略正編卷四十五
