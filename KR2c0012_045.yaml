  text: 欽定四庫全書平定準噶爾方略前編卷四十五
  hash: sha256:0cd5b850a1f653f96eac2959700e8971da5b17c06e7f80d04a328e06e6b7d21e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_045-1a, image: WYG0357/WYG0357-0627a.png}
body:
  text: 乾隆五年春正月甲寅賜準噶爾使臣哈栁等與宴上諭哈栁等曰朕早欲賜爾等宴因筵宴我諸王及外藩王之來朝者故未暇宣召爾等此次噶爾丹䇿零奏章既屬恭順爾等又往返再三朕甚嘉焉今日特命爾等入內與宴可觀覽衆技不必矜持爾等䝉古人嗜酒無妨暢飲數杯朕不爾責也甲子議定準噶爾貿易事宜尚書海望等奏言臣等見準夷使臣哈栁等以所議貿易事宜示之哈栁言我等曽懇取道喀爾喀未䝉許可今議由肅州西安至肅州貿易者甚便其至京者若悉由內地未免需費較多今業已定議乞繕列條欵見付以便持歸告噶爾丹䇿零臣等謹録議札先呈御覽札云大清朝大臣等與準噶爾來使哈栁等定議貿易事宜爾等貿易一如俄羅斯例定期四年自備資斧由內地至京貿易一次人數毋過二百其至肅州貿易亦定期四年毋過百人還期悉定限八十日凡貿易之年先期以起程之日與何日可入境報知駐邉大臣轉達部院奏撥章京筆帖式等照看料理其來京者令自肅州經西安一路凡貿易除禁物外俱聽其買賣不得强抑其年期不可與俄羅斯同致貨物堆積減價按定例俄羅斯以子辰申年來爾等宜以寅午戌年來其至肅州者則令于子辰申年來若噶爾丹䇿零别有具奏事件遣使來京令減僕從由驛站遞送不得私携貨物為此定議尋軍機大臣等議覆曰準噶爾部人性本狡詐不肻安分若路經喀爾喀恐其日久生事故與哈栁等定議令由內地但至京道逺或馬力罷乏若彼更以請應否酌量加恩奏入得㫖喀爾喀之路勿令行走若伊等從內地來京貿易馬力不足懇恩奏請酌量賞給馬匹之處再行辦理辛未議定準爾赴藏事宜軍機大臣等奏言此次哈栁等至京一切並遵㫖定議惟進藏熬茶以百人不敷奏請用三百人䝉恩允行其來時請令理藩院撥章京等二員前赴哈密軍營令提督李繩武撥兵五百名遣官率領與章京等協同辦理令由扁都口邉界前至東科爾貿易事畢即由彼處護送至藏沿途有司亦令照管至入藏之人非奏事使臣可比無庸換給馬匹其經過青海等處一應䝉古遊牧及各臺站豫令移置妥協俟使臣還安設如故其應撥滿洲兵護送請就近于莊浪涼州酌撥五百名與李繩武處所撥官兵以大臣一員總領至藏時有應辦一切令駐藏副都統與郡王頗羅鼐公同核議妥協辦理奏入得㫖依議著將軍烏赫圖副都統巴靈阿領兵護理各賞銀五百兩涼州將軍印務令副都統黑色暫行署理巴靈阿所遺員缺著蟒古賴馳驛前往西寧辦理二月丙子諭哲卜尊丹巴胡土克圖仍移住庫倫上諭軍機大臣等曰哲卜尊丹巴胡土克圖寄札額駙䇿凌云前䝉世宗憲皇帝特㫖令我移居多倫淖爾前嵗瞻仰天顔奉諭俟一二年後令爾仍移居庫倫今軍事已定乞為我奏聞等語哲卜尊丹巴胡土克圖係衆喀爾喀普同供養之喇嘛前準噶爾侵犯時覬覦搶奪䝉皇考睿鑒降㫖令胡土克圖移至多倫淖爾賊人失意空還今噶爾丹䇿零革心悔過奏請求和邉庭無事應令哲卜尊丹巴胡土克圖仍居庫倫著軍機大臣等議奏尋議曰喀爾喀公敏珠爾原係照管胡土克圖之人應令代為辦裝更請交理藩院撥章京一員與駐劄多倫淖爾之侍衛同送往庫倫奏入得㫖依議但整理行裝文移知㑹已逢夏暑難于涉逺俟明年青草生時酌令起程屆期著賞給胡土克圖銀一萬兩諭喀爾喀部落王等定遊牧界址上諭額駙䇿凌等曰前者喀爾喀部落遊牧原有一定疆界現今已許準噶爾和好朕特降㫖今喀爾喀遊牧不過扎卜堪等處然非指明各部落游牧邉界則喀爾喀等但知無過扎卜堪他處或仍任意遷移亦未可定著額駙䇿凌㑹同三部落副將軍等以扎卜堪為準令各部遊牧邉界分定指明勿使妄有踰越核議具奏又諭七旗喀爾喀王扎薩克等曰前以軍務方興恐爾喀爾喀遊牧被賊侵擾悉令內徙今噶爾丹䇿零使哈栁等來一切並遵朕㫖甚屬恭順奏請厄魯特遊牧不得過阿爾台山梁彼此烏梁海居住如舊每年應行略地之時止遣二三十人巡察所轄地界又奏請喀爾喀遊牧無過扎卜堪等處乞朕降㫖指定界址故朕特㫖令爾喀爾喀遊牧母越扎卜堪齊克濟喀薩克圖庫克嶺等處爾喀爾喀王扎薩克等其仰體朕言遍諭屬人勿踰所定之界永逺遵行倘有違令生事者即嚴加治罪勿宥現今雖許其和好罷息干戈而平日不可不訓習兵丁操練技勇爾等其留意無忽己卯賜準噶爾台吉噶爾丹䇿零𠡠書奉天承運皇帝詔曰諭準噶爾台吉噶爾丹䇿零朕為闡教安民之故降㫖息兵往者以疆界必宜定議爾台吉雖數遣使來輒以必不可行之事借端要請是以議久不決前年爾遣哈栁入奏請厄魯特毋得越阿爾台山梁喀爾喀仍居扎卜堪等處此即與定議無異又請布延圖托爾和兩處卡倫稍向內移朕以卡倫不可移動之故降㫖開示令哈栁齎還今台吉復遣哈栁來辭甚恭順且謹遵朕㫖每年止遣二三十人巡察科卜多其卡倫請仍設置如舊朕覽之欣悅但原議以阿爾台山陽至哈卜塔克拜塔克烏蘭烏蘇羅卜淖爾噶斯口為界今奏中尚未聲明故朕之大臣詳問哈柳據稱以阿爾台山為界業已指明山南之人仍住原處自不待言何庸復議觀此則一切俱遵朕㫖更無可議之事朕即降㫖喀爾喀令勿踰扎卜堪等處矣朕為大君統一中外天下衆生一體愛育今為廣教安民罷息干戈彼此既咸歸于好當各飭所屬毋違定約妄生事端若遵守勿替則黃教自此愈興衆生永享安樂之福爾又奏稱前請往藏熬茶實為敬信喇嘛之故豈敢生事但帶往什物甚多百人難以運致故此次不能與哈栁同來伏乞許用三百人爾前以班禪額爾德尼圓寂之故欲使人入藏熬茶誠心奏請朕已諭行止令人數毋過百今爾又以運物百人未敷請增至三百人朕更加恩允准爾須選擇曉事之人其赴東科爾朕當遣人護送至貿易之事朕令大臣與哈栁定議亦如俄羅斯例四年貿易一次人數不得過二百限八十日還部來京者道出肅州西安其往肅州者亦以四年為限數不得過百人除禁物外買賣各從其便再爾部人來若與俄羅斯同在一年恐于爾等無益今定于寅午戌年來京子辰申年至肅先期以起程之日與何日可入境報知邉境大臣俟其奏到當更遣官護理爾亦宜擇信實之人來時更明白曉諭之無得滋事再台吉若别有奏請之事仍更遣使減省僕從勿携貨物既入我境更令馳驛前來此次台吉一一恪遵朕㫖實心恭順朕甚嘉之用從前和好之禮隨𠡠賞各色緞十六端三月丁未命籌辦準噶爾進藏需用駝馬辦理青海事務副都統巴靈阿奏言據總督鄂彌達等轉咨令于青海等處陸續採買駝馬以備夷使官兵牲畜疲乏更換之用青海山髙氣冷五六月間青草萌生牲畜始肥今夷使于三四月抵東科爾貿易事畢即行進藏倘所採買不免疲瘦恐有遺誤按西寧鎮標現有豫備駝一千餘隻馬一千六百匹臣請先以此項駝馬應用再按價給發營辨令其自購一轉移間兩有禆益軍機大臣等議覆應如所請奏入上從之夏四月辛卯命以色固鼐辦理後藏事務駐藏副都統紀山奏言據郡王頗羅鼐告稱後藏班禪額爾德尼辦事尚卓特巴伊隆羅卜藏根敦病卒請以班禪額爾德尼之徒喇嘛色固鼐補尚卓特巴辦理後藏事務奏入上從之五月壬寅定邉副將軍額駙䇿凌等奏定喀爾喀遊牧界址額駙䇿凌等奏言前值用兵曽令喀爾喀等遊牧內移以翁金之布爾察克鄂爾昆之烏貴淖爾色楞額之喀喇托郭為界今噶爾丹䇿零乞和奉㫖以喀爾喀遊牧地分飭令臣等定議臣查現今設立卡倫之扎卜堪齊克濟哈薩克圖庫克嶺等處自此以內三四百里就鄂爾海取中向南一帶至博羅椿濟塔爾喇布喀代汗淖爾黨那爾台圖穆爾哈巴沙喇布魯都竒齊格訥之阿魯通金鄂倫淖爾達蘭圖魯等處向北一帶至額德爾齊德爾之伯勒齊爾準舒瑪勒台桑金達賴喀喇塔爾阿勒坦噶達蘇等處定為外界其內遊牧人衆悉扎薩克圖汗格勒克雅木丕勒部落即著格勒克雅木丕勒稽查不許踰越定界並令駐劄烏里雅蘇台參贊大臣時時遣人巡察倘有越界遊牧者從重治罪俟命下之日飭各部落遵行軍機大臣等議覆應如所請奏入上從之丙午準噶爾部人噶克率弟巴圖來降上諭軍機大臣等曰噶克等棄其妻子前來投順甚屬可憫伊等未經出痘又無應詢之事無庸解京可即由口外送往察哈爾交該總管安插其如何賞賚之處著軍機大臣議奏尋議奏曰據噶克等自言本係台吉無憑可查又向例單身投誠者發天津等處安插今噶克等棄孥來歸應發察哈爾授額外護軍并請賞給如例奏入上從之閏六月庚子朔命諭準噶爾略地兵毋越定界上諭軍機大臣等曰據額駙䇿凌奏稱參贊大臣阿岱報知噶爾丹䇿零遣得木齊旺扎爾錫喇卜等率略地兵三十人來至喀勒占和碩卡倫臣令以原議諭之止令巡視卡倫以外彼所應閲之地而去額駙辦理此事甚合機宜觀此知噶爾丹䇿零疑我布延圖等處卡倫以內尚有大兵駐劄故因初次略地囑旺扎爾等直至喀勒占和碩卡倫探視此非甚要之事不必遣使詰問然非明白曉諭將來伊等遊牧或仍越過阿爾台嶺俟彼使來時爾等當告以天朝與爾台吉指定邉界者正欲喀爾喀與爾厄魯特相距遼逺無由起釁庶彼此安居樂業永歸和好故定議爾等遊牧毋過阿爾台山梁我喀爾喀遊牧亦毋過扎卜堪等處又知噶爾丹䇿零必懼我兵進駐科卜多故許其每年略地時用二三十人至科卜多巡視以釋其疑然我卡倫以內豈容爾等巡視乎今夏爾遣旺扎爾等直至我沙扎海布延圖二處并欲至喀勒占和碩卡倫內我將軍等遣人止之始還前所頒詔㫖甚明不宜有此事想非爾台吉所囑乃旺扎爾等誤聽所致耳但既已定約詎可食言且爾等可至我喀勒占以內巡視倘我略地之人亦至爾卡倫以內爾亦聽之乎屢屢如此日後必起爭端致乖永好之道彼此無益可明告爾台吉嗣後戒飭略地之人勿因小事而誤大事也并以此㫖行文額駙䇿凌知之尋夷使莽鼐到京大臣等遵㫖詢問據莽鼐云此事噶爾丹䇿零實不知係略地人之誤還時當告知噶爾丹䇿零即行戒諭可也甲子準噶爾台吉噶爾丹䇿零遣使莽鼐等至京進表噶爾丹䇿零謹奏大皇帝前哈栁歸奉大皇帝𠡠書諭令厄魯特在阿爾台山隂遊牧不得過山梁喀爾喀亦不得過扎卜堪等處其科卜多所在各令巡視又許我進藏熬茶之人數至三百不勝歡忭敕書有云原議本以阿爾台南哈卜塔克拜塔克烏蘭烏蘇羅卜淖爾噶斯口為界今爾一切俱遵朕㫖更無可議之事是已䝉諭㫖見許也但敕書內係䝉古舊語音我等尚未能盡解故遣哈栁入奏懇求定界既以互相牽掣訖未定議復遣吹納木喀入奏亦是此意去年哈栁奏到大皇帝諭㫖云罷兵息民永歸和好即定界與否亦非要事但令彼此游牧互相隔逺我皇祖時所設卡倫不得移動其科卜多等處朕亦不另駐兵每年應略地時仍各遣二三十人巡視既免相掣之嫌亦解爾疑惑之心朕不食言荷䝉諭㫖欲釋我疑懇將前此未能盡解之語再降㫖明示至進藏之事俟莽鼐信到即計日起程于八月二十日左右定到哈密由哈密即赴東科爾但必取道肅州則來人俱未出痘恐途中患病且道逺或遇無水草處無以接濟請一切生畜路費俱自行備辦由庫克沙什西喇喀勒占至東科爾貿易後前往至進藏時或馬匹疲乏尚需接濟伏乞加恩為此謹奏隨表敬獻玉碗一事貂皮三十張奏入報聞秋七月甲戌命暫停查閲喀爾喀四部落豫備兵丁上諭辦理軍機大臣等曰內扎薩克六盟長所豫備之兵丁器械連閲三年因伊等實心辦理訓練有方此次奉派之王貝勒台吉及官員兵丁等朕悉加恩賞賚現今噶爾丹䇿零革心歸順一切恪遵朕㫖邉境無事若仍每年派員往喀爾喀閲兵各䝉古須儲備牲畜往來承應不無勞費嗣後將每年派員查閲之處暫行停止俟二三年後令理藩院請㫖奏派前往著傳諭王貝勒台吉官員等其仰體朕軫恤䝉古至意將各屬兵丁仍不時操演整頓軍械勿因暫停閲視之故遂至懈弛倘平日怠忽從事兵不訓練器不完好致閲視大臣參奏朕斷不寬貸可諭令知之乙亥賜準噶爾台吉噶爾丹䇿零敕書奉天承運皇帝詔曰諭噶爾丹䇿零爾使莽鼐齎至奏章言哈栁奉到敕書內有云原議以阿爾台南哈卜塔克拜塔克烏蘭烏蘇羅卜淖爾噶斯口為界今既一切俱遵朕㫖更無可議之事是以䝉諭㫖見許但敕書內係䝉古舊語音未能盡解是以屢次遣人入奏訖未定議懇再降㫖明示等語朕為大君不分內外一體愛恤欲邉界民人不起爭端長享安樂所以前嵗敕書中言罷兵息民永歸和好則定界與否亦非要事惟厄魯特毋過阿爾台游牧卡倫設立如舊科卜多不更駐兵每年應略地時止遣二三十人巡視彼此既無牽掣亦可釋爾疑惑諭㫖甚明以此台吉亦喻朕㫖即此定議去年哈栁來朕甚嘉之特以前者賜爾敕中原有令遊牧人等各安所居之言及爾還奏並未言及阿爾台南遊牧人等之事此事雖非緊要但前既議及後不一一指明恐彼此遊牧人等不知或妄行踰越致起爭端有乖和好故朕之大臣面詢哈栁據云以阿爾台山為界業已指明山南遊牧之人仍居舊地自不待言復有何議因此朕亦就此完結惟諭喀爾喀等自今無得過扎卜堪齊克濟哈薩克圖庫克嶺等處游牧而已今台吉又復懷疑祈朕明降諭㫖朕為天下大皇帝豈肻食言台吉固無容過慮也又稱進藏之人若由肅州赴東科爾其人悉未出痘又道逺恐乏水草請自備牲畜路費由庫克沙什西喇喀勒占前進至進藏時或馬匹疲乏尚懇加恩接濟爾前請進藏熬茶百人不敷乞用三百人朕已允行至一切所需爾本以尊崇佛教修行善事之故致誠前往此事固未便朕為資助亦于台吉聲名有關但既經奏請倘由東科爾進藏及由藏回時途間果有匱乏量為接濟在朕固所不吝也至請路由庫克沙什等處朕邉境大臣已詳詢習知道路者俱言此路既多戈壁又缺水草行走甚難但爾來人未出痘者道經內地誠屬可虞朕已飭令邉境大臣擇戈壁少水草好有益于爾人畜者詳悉勘明導引爾人赴東科爾爾人到時朕大臣當已豫為之備矣隨敕賜各色緞十端加賞玻璃磁器四十事大緞六端丙子命喀爾喀王等及軍營大臣詳議撤兵後駐防事宜上諭軍機大臣等曰朕前以撤阿爾台之兵詢問喀爾喀王扎薩克等據奏言事尚未定若仍用兵戍守于我等殊有禆益請暫留駐至去年噶爾丹䇿零令哈栁來使一一遵照朕㫖定議請伊等遊牧毋過阿爾台山我之卡倫設置如舊至喀爾喀游牧亦無過扎卜堪其言甚屬恭順故朕遂頒敕書與噶爾丹䇿零指定喀爾喀游牧不得越扎卜堪齊克濟哈薩克圖庫克嶺等處仍以阿爾台山南哈卜塔克拜塔克烏蘭烏蘇羅卜淖爾噶斯口為界並所請熬茶貿易事亦經定議現今邉境寧謐既許其和西北兩路之兵不須留駐應行撤回北路喀爾喀扎薩克等當同心合志約束屬人就指定邉界居住其豫備兵仍訓練以時至防秋之候行圍㑹聚應略地時著額駙䇿零揀選幹員帶領二三十人巡閲隙地準噶爾略地兵所到之處亦令申報現設卡倫仍令喀爾喀台吉官員兵丁輪班駐劄如此辦理則息事寧人而且有備無患矣著行文喀爾喀四部落王扎薩克等令其于撤回內地兵之後悉心協力休養屬下緊守卡倫一切防範豫備事宜核議具奏倘謂內地兵斷不可撤則竟如呼倫貝爾駐兵例令東省索倫烏喇齊等揀發數千人携挈妻孥永逺駐劄遊牧庶于事有益若既與準噶爾定議而仍以內地兵戌守既恐滋彼之疑且喀爾喀仍須供應一切妄費無益喀爾喀副將軍王扎薩克等宜體朕為爾等籌畫之意計及久逺妥議以聞并將朕此㫖行文額駙䇿凌與軍營大臣等令其詳悉定議具奏至西路又與北路不同北路有額駙䇿凌與喀爾喀王扎薩克等俱軍前諳練本地情形之人其防範豫備相機而行自無可慮西路則哈密與準噶爾連界回人素性怯懦非喀爾喀比內地之兵不便遽撤其屆期換班須從逺處調發亦非久長之計俟數年後量裁喀密駐扎兵務使足資防守外即以附近安西等處兵丁輪流撥往其兵數如何足用軍食如何支給著行文總督尹繼善提督李繩武詳悉定議具奏尋平郡王福彭大學士查郎阿左都御史杭奕祿侍郎阿克敦等各以兩路事宜條奏奏入㫖軍機大臣等議奏尋議覆曰據查郎阿請改安西總兵官為提督增設官兵分駐哈密等處其現在駐防兵丁悉行撤回前者雍正十三年臣等曽酌議安西增設提督轄兵一萬各携家口移駐其哈密換班兵丁即于提督標下輪班撥往以總兵副將領之再豫選甘涼寧肅各營戰兵二萬二千名以備調撥令其表裏相援移咨查郎阿張廣泗等㑹議具奏其時查郎阿等議以安西産物儉少食用不敷是以增設提督之議未行今查郎阿請以安西總兵官改為提督增兵三千合原額兵七千二百共一萬二百名就中派撥二千名以副將一員率赴哈密駐劄二年一換其現在哈密布隆吉爾等處駐防兵以次撤回並與臣等原議相符實于邉防有益應以查郎阿所奏移知陜西總督尹繼善提督李繩武㑹同詳議具奏再行定議至杭奕祿奏請哈密增駐䝉古兵一千為守卡用按前者副都統旺扎爾侍郎玉保俱曽奏請未經議行杭奕祿此奏亦無庸議再平郡王奏言北路駐防兵可減不可撤阿克敦所奏亦大略相同應俟額駙䇿凌等奏到後一并酌議具奏奏入上從之八月己未命邉路各臺站歸將軍提督等官管轄副都統旺扎爾奏言殺虎口等處臺站原為喀爾喀衆䝉古接遞事件而設甚關緊要若無大員兼管必致馬匹疲瘦并致缺少請以殺虎口邉路臺站令綏逺城將軍管轄古北口邉路臺站令提督管轄獨石口邉路臺站亦令提督管轄喜峰口邉路臺站令熱河副都統管轄軍機大臣等議覆應如所請奏入上從之準噶爾部人庫本回民古爾班瑪特來降命賞給安插如例九月辛卯準噶爾部人多爾濟及彭蘇克碩博爾鄂羅爾巴額默根來降命賞給安插如例冬十月戊申定邉副將軍額駙䇿凌及扎薩克等奏覆撤兵防守事宜額駙䇿凌等奏言奉七月初七日上諭一應防守事宜喀爾喀副將軍王等另行議奏外現在軍營兵五千俱應撤回內東三省二千牧厰五百又塔米爾鄂爾昆守城直隸山西緑旗兵一千俱乾隆三年到此請于明春青草生時起程其呼倫貝爾兵一千察哈爾兵一千五百又查濟爾瑪台種地宣化大同緑旗兵六百今年始至請于明年秋起程但塔米爾鄂爾昆所貯銀米器械甚多現在詳核造冊呈送軍機處其應留應解之項請分别議覆又副將軍額爾德厄畢西勒爾圖扎薩克圖汗格勒克雅木丕勒等奏言由額駙䇿凌處接奉上諭令臣等議奏防守事宜今四部落㑹議舊設卡倫及接續卡倫之三路臺站仍令原駐台吉官員管轄外其駐防烏里雅蘇台等處之喀爾喀兵一千係與準噶爾接界備略地守卡探信之用請仍派參贊貝勒公扎薩克台吉統領駐劄鄂爾昆等處駐防兵應增五百共一千名酌派扎薩克官員管理駐劄其防秋操練兵三千名仍令于秋令在鄂爾昆駐劄三月喀爾喀三副將軍及衆扎薩克豫備兵一萬名仍令于遊牧處按時行圍操練派大臣查閲器械至撥索倫烏喇齊兵挈眷久駐之處恐䝉古既乏米糧又携家散處有事調發反多牽掣似屬未便其巡守卡倫若用䝉古人恐其怠惰乞仍派內地侍衛駐劄為便軍機大臣等議覆俱應如所請惟駐守卡倫既盡撤內兵請并用䝉古人奏入得㫖額駙䇿凌喀爾喀王扎薩克等議撤內地兵用喀爾喀兵駐防哨探但喀爾喀兵斷不可無總管辦事之人仍著額駙䇿凌督率軍務至佐理額駙捍衛遊牧查㸃器械整飭軍容等事尚需大員仍照舊例自京師派二員前往更換駐防令伊等亦得學習用兵之道再鄂爾昆烏里雅蘇台二處卡倫若用喀爾喀兵駐防伊等既離本游牧處若不給與資糧將何所倚賴其如何酌給之處著軍機大臣一併議奏癸丑準噶爾部人阿爾佐率妻來降命賞給安插如例十一月壬申酌辦官兵護送夷使進藏事宜駐藏副都統紀山奏言準噶爾進藏之人若于八月間到哈密由邉外至東科爾時屆冬寒所有護送官兵或馬匹牲畜不無瘦乏應行換給今納克舒番子百户等感戴皇恩請于官兵過時所有四千九百八十六戶五戶公出馬一匹牛二頭又每戶出羊一二隻以備應用經軍機大臣等議覆曰前夷使莽鼐言進藏人等當于本月到哈密至今絶無消息或噶爾丹䇿零布施物件未備或與鄰境交兵均未可定但護送官兵總宜豫籌接濟納克舒番子既經備辦請移知烏赫圖巴靈阿若沿途取用納克舒牲畜可于携帶銀兩內如數給與價值奏入上從之戊寅授雅爾哈藍翎侍衛軍機大臣等奏言俄羅斯遣使葛達班投遞伊處薩納特衙門文書郎喀文書送到自準噶爾脫出之護軍雅爾哈至京文書交內閣譯出進呈雅爾哈請交本旗都統令在原差上行走奏入得㫖雅爾哈著授藍翎侍衛在粘竿處行走賞銀五十兩戊子準噶爾部人圖魯孟克率壻達什夫婦來降命賞給安插如例己丑定邊副將軍額駙策凌奏報鄂爾昆屯田收穫麥黍各糧七千九百四石有奇得㫖下部知之平定準噶爾方略前編卷四十五
