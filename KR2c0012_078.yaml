  text: 欽定四庫全書平定準噶爾方略正編卷二十四
  hash: sha256:0303ca29594eb7990edef18ea1e2db10052eb76457c3f5cb5a13ff6798d796b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_078-1a, image: WYG0358/WYG0358-0390a.png}
body:
  text: 乾隆二十一年春正月庚午傳諭喀爾喀王公等上諭軍機大臣曰自辦理準噶爾以來喀爾喀王公等朕或施恩加封或按律治罪皆視其功過斟酌至當初不因喀爾喀係舊日臣僕有意苛求亦未嘗任其希圖僥幸非分加恩也喀爾喀部落素有怯懦退縮之心從前初議進兵曽經降旨訓勉冀其各自振作嗣喀爾喀王公等皆知仰承朕意平定伊犁時人皆奮勉效力是以將和托輝特郡王青滚雜卜等優敘晉封而額林沁多爾濟身為扎薩克親王參贊軍務將軍班第特派伊監視阿睦爾撒納同行先經齊木庫爾密告逆賊叛迹已露而扎薩克林丕勒多爾濟等又復屢次言及理宜相機擒治乃額林沁多爾濟並不速辦反以阿睦爾撒納係雙親王伊係單親王難以辦理為辭逡巡觀望以致阿逆乘間脫逃次日始帶兵追逐勢已無及試思此何等事而額林沁多爾濟有意貽誤致使逆賊兔脫其心尚可問乎核其情罪萬無可逭朕是以即將伊治罪而桑寨多爾濟尚屬幼年一聞阿逆逺竄即能奮身追捕巴扎爾什第等𠞰殺包沁勇往可嘉朕皆加恩封賞策布登扎布效力軍營克繼伊父勞績又將阿逆謀叛之意屢次密告將軍班第是以朕格外施恩由公爵封至貝勒以是鼓勵至額駙色布騰巴爾珠爾與和托輝特郡王青滚雜卜原係阿睦爾撒納同隊之人逆賊負恩背叛形迹顯然伊等豈無所知且朕曽經密諭色布騰巴爾珠爾令其小心防範乃全不經心反為逆賊所惑與班第等意見不和經朕降旨令色布騰巴爾珠爾來京並將青滚雜卜調辦汗哈屯事務孰意色布騰巴爾珠爾到京並未在朕前奏及阿睦爾撒納一語在色布騰巴爾珠爾身為額駙位列藩王不但伊無附賊之理即青滚雜卜世受國恩亦斷不至與逆賊通謀朕原可以深信第色布騰巴爾珠爾年幼無知一至於此朕實不勝憤悶已降旨將伊王爵革退嚴加禁錮至青滚雜卜亦係御前行走之人非他人可比且去嵗進兵甚屬奮勉其罪不過與逆賊共事之時稍為附和耳朕念伊往日勤勞姑從寬免嗣後益當痛改前非勉力報效朕用人行政一秉至公信賞必罰功罪皆由人自取毫無畸重畸輕之見可告天下後世恐伊等不知妄生疑惑著將此通行曉諭喀爾喀王公等知之辛未定邉左副將軍哈達哈疏奏阿睦爾撒納奏摺哈達哈奏言十二月十七日從前遣往哈薩克之侍衛順德訥帶同傳旨曉諭阿睦爾撒納之厄魯特兆齊回至軍營稟稱阿睦爾撒納遣回伊等時有奏摺一件令交軍營大臣轉奏據阿睦爾撒納奏稱臣受皇上天高地厚之恩諸事遵循訓示仰賴威福將達瓦齊及宰桑等擒獻闕下又將準噶爾全部歸附天朝第班第薩喇爾諸事暴急曽令額駙色布騰巴爾珠爾陳奏臣又向伊等商議四衛喇特人衆應遵皇上諭旨收其離散憫其窮蹙一切如噶爾丹䇿零時令其安全今若辦理不善伊等性情剽悍必生變亂且恐哈薩克布魯特聞風附和班第等不能聽從至臣遵旨入覲行至烏隆古地方聞有擒拏之信不得已潛避所有頒給印信不敢棄置交與額林沁多爾濟帶回其班第薩喇爾如何陳奏之處自蒙皇上洞鑒又班第薩喇爾乘馬直入喇嘛經堂將馬繫於柱上伊等並坐大喇嘛之上薩喇爾無忌妄談言四衛喇特人衆皆伊管理並於各鄂拓克內選擇婦女為妻復肆行虜掠宰桑克什木巴雅爾拉虎等衆皆切齒是以於臣未到伊犁之前忽生變亂前奉到皇上令遣使曉諭哈薩克之旨即派順德訥等及臣宰桑前往今阿布賚等共言與臣同盟結好斷不背約亦欲如臣一體沾恩此順德訥所親聞者臣現擬將四衛喇特遊牧整理並令回人布魯特塔什罕哈薩克等臣服天朝將臣遊牧與伊等會合同住斷不敢萌背叛之心接到諭旨不勝感激悚惶伏祈賞給臣管轄四衛喇特印信勉力報效等語奏入上諭軍機大臣曰朕閲哈達哈等轉奏阿睦爾撒納所奏托忒字一摺顯係窮蹙無歸故為此搖尾乞憐之狀以圖僥幸於萬一然其叛逆之迹百喙難辭現在伊犁喇嘛宰桑等前往擒拿將軍策楞亦經進兵會𠞰自可計日就擒明正其罪以伸國法至伊摺內所奏班第薩喇爾各情節雖未可盡信但阿睦爾撒納中途逃竄並未前抵伊犂而該處之喇嘛人等遂至倉皇生變則班第等之辦理不善亦可概見適與朕前降之旨相符將此宣示中外知之授努三為三等侍衛同左都御史何國宗前往伊犂測量地理定邉左副將軍哈達哈等疏奏遣使哈薩克及阿睦爾撒納現在情形哈達哈等奏言據侍衛順德訥稟稱七月二十八日前往哈薩克阿布賚所住額卜圖淖爾地方宣示敕諭阿布賚不勝歡忭告稱今準噶爾全部俱歸附天朝蒙皇上不棄荒裔遣使曉諭實出望外今遣托克錫里鄂圖里達瑚等三人齎捧奏章同往入覲並遣我弟嶽勒博羅斯帶領屬人通使軍營大臣又我尚有進獻馬匹恐路逺易致疲瘦當緩期送赴阿睦爾撒納處轉為呈獻等語並於八月二十五日至阿布賚之弟汗巴巴處宣示敕諭訖至十月十六日至博羅塔拉地方見阿睦爾撒納始知其背叛情由留住月餘因軍營遣往曉諭之厄魯特兆齊到彼阿睦爾撒納繕寫奏摺給與駝馬一併遣回阿睦爾撒納現在遊牧地方患病死傷者甚衆人亦窮困肆行搶掠計其兵丁不過二千有餘同伊在彼者係額林沁伊什丹津巴特馬車凌達瓦占布根敦扎卜策伯克敦多克舍楞敦多克曼集索薩賚布林巴圖濟爾噶爾鄂博什固穆扎卜巴桑塞克塞烏勒木濟等十餘人其餘俱不能認識看來事勢窮蹙阿逆必逃入哈薩克境內現將阿布賚等遣來入覲之人俱留於彼處等語又據遣往曉諭阿睦爾撒納之兆齊稟稱十月二十九日前往阿睦爾撒納處宣示諭旨阿睦爾撒納屏人密問伊遊牧人衆現在何處我告以奉旨將爾遊牧人衆移住塔米爾地方之內並未殺戮爾妻子已往內地乞恩於聖主之前現亦無恙爾所遣宰桑阿睦爾濟爾噶爾等已經拿獲審訊又詳察阿睦爾撒納屬人等均因家室離散人人含怨約計伊遊牧內馬匹不過千餘駝隻不及一千牛羊等項已屬無餘生計甚窘等語奏入報聞壬申命原任厄魯特散秩大臣賽音綽克托之弟賽音伯勒克為散秩大臣甲戌命安插布圖庫人衆上諭軍機大臣曰據和起等奏稱從前投誠之布圖庫等原在額爾齊斯阿塔瑪里地方居住懇請歸伊遊牧等語現在準夷平定額爾齊斯阿塔瑪里一帶盡入版圖即令其仍回原處未始不可但現在天氣尚寒行走稍艱暫令在巴里坤居住俟擒獲阿逆後再令伊等由額爾哈畢爾噶一路遷回原處居住參贊大臣達爾黨阿疏奏普爾普懇請派兵效力情形達爾黨阿奏言據普爾普告稱荷蒙皇上天恩補授散秩大臣急圖報效現在自巴里坤起程至我遊牧地方不過五六日之程遊牧內有戶口一千有餘可選兵一千名懇先派一人偕往遊牧若我弟鄂爾竒木濟已領兵前進我再選派兵三四百名由薩爾海地方會合大兵一同進𠞰擒拿逆賊等語臣等即與彼約定令藍翎兆垣偕普爾普起程前往奏入報聞丁丑參贊大臣玉保疏奏進𠞰阿巴噶斯情形玉保奏言臣帶領哨探信兵於十二月十九日抵哈齊克地方據輝特台吉諾爾布告稱聞阿睦爾撒納現在博羅塔拉居住納木竒在烏蘭烏蘇納林居住哈丹額林沁等在阿睦爾撒納附近晶河托多克等處居住近月間阿巴噶斯曽獨往安集哈雅博木地方居住近因往來人少未得確信至阿巴噶斯之五得秦人等現在烏蘭烏蘇西喇特克等處遊牧大兵前行指日可到等語臣與尼瑪等商議如兩路整兵前往將納木竒阿巴噶斯部落分路攻擊相隔遙逺軍勢稍分現在一面遣人招降納木竒一面先將阿巴噶斯之五得秦人等𠞰滅收其馬匹牲隻換給官兵再抵安集哈雅博木地方擒拿阿巴噶斯更為迅速奏入報聞戊寅命賞散秩大臣布林銀一百兩衣一襲授伊犂台吉諾爾布敦多克等來使鄂爾竒木濟烏特巴拉韋諾克鄂斯庫齊木伯勒等為三等侍衛各賞銀五十兩衣一襲己卯命郡王品級塞卜騰之子巴桑承襲貝勒上諭軍機大臣曰據阿蘭泰奏稱郡王品級貝勒塞卜騰前赴軍營中途病故等語塞卜騰自入覲以來深知感戴朕恩遇事誠心效力人亦明白今聞身故深堪憫惻著賞銀一千兩經理喪事其貝勒職銜即著伊子巴桑承襲辛巳命賞內大臣尼瑪世職上諭軍機大臣曰內大臣尼瑪深感朕恩伊回遊牧時即將該鄂拓克內派撥兵丁馳赴軍營甚屬奮勉著加恩賞給騎都尉世職即於伊子內指名具奏令其承襲壬午命授厄魯特忒克錫卓竒克三雅布達勒等為藍翎侍衛甲申命授厄魯特兆齊為侍衛上諭軍機大臣曰從前北路軍營遣往阿睦爾撒納傳諭之厄魯特兆齊今與侍衛順德訥同回著加恩授為藍翎侍衛並著哈達哈等將伊妻子查出給還令在察哈爾居住丁亥定西將軍䇿楞等疏奏進𠞰阿巴噶斯遊牧策楞等奏言臣等領兵至和洛霍澌地方聞阿巴噶斯得木齊班咱遊牧在嗎呢圖山中隨帶兵前進遇阿巴噶斯得木齊哈丹西喇布爾古特收楞額得勒克恩克等投誠前來臣等公同詢問據哈丹等告稱我等受大皇帝厚恩各安生業不意宰桑阿巴噶斯與阿睦爾撒納同惡相濟肆行叛逆我等被脅服從今天兵已到情願投誠其餘得木齊等亦俱在山林叢密中紛紛逃避至宰桑阿巴噶斯前月內為阿睦爾撒納傳往哈丹聞大兵已至帶附近遊牧兵丁三四百名不知遷徙何處其衆得木齊等若蒙寬宥即當送信前往俱來投誠並擒送哈丹贖罪又阿睦爾撒納現在博羅塔拉昨阿巴噶斯遣人告稱伊犂喇嘛宰桑等請阿睦爾撒納於本月十七日坐台吉牀等語臣等伏思逆賊阿巴噶斯屬人理宜全行誅戮但我兵一到即行投誠情尚可恕隨令曉諭各得木齊等共擒哈丹免其誅滅如果出力事成後奏明加恩臣等即帶領前進其班咱遊牧已經收取并將伊弟喇嘛達什藏布擒拿所有家口牲隻盡行收獲奏入報聞己丑命封內大臣尼瑪公爵定西將軍策楞等奏言十二月二十八日投誠之收楞額恩克帶領由哈丹處前來之阿克蘇告稱哈丹在遊牧居住聞知大兵將到正思逃避忽阿巴噶斯處遣人前來告稱現在伊犂喇嘛宰桑等會同將軍薩喇爾前往伊犂阿底斯巴克地方擒拿阿睦爾撒納特令哈丹前去哈丹即帶阿巴噶斯妻子二十餘口連夜逃往等語臣等竊思哈丹棄置遊牧僅攜數口奔竄明係與阿巴噶斯約定逃避應即遣兵追拿正擬派員前往內大臣尼瑪情願領兵追𠞰臣等即選精兵一百名令阿敏道同伊速往搜捕奏入上諭軍機大臣曰據策楞奏稱哈丹攜帶阿巴噶斯妻子脫逃內大臣尼瑪領兵前往追捕等語尼瑪自到軍營以來頗著勞績今又能勇往任事殊屬可嘉尼瑪原係布魯古特台吉之裔著施恩晉封公爵仍辦理圖什墨勒事務庚寅諭定西將軍䇿楞等偵探阿逆實在情形上諭軍機大臣曰朕覽策楞所奏伊犂台吉宰桑等在阿底斯巴克地方圍困阿睦爾撒納一事此言尚屬可疑闥勒竒嶺博羅布爾噶蘇台兩處隘口皆設兵堅守阿睦爾撒納勢不能越至阿底斯巴克地方詢之現在京師之布林鄂齊爾等俱言似非實在情形此必係阿逆勢窮力竭揚言伊在彼被圍使我軍聞信不往博羅塔拉擒拿伊得乘間兔脫以為緩軍之計著傳諭策楞等悉心偵探究竟阿逆潛蹤何處領兵直入尼瑪玉保等俱已前進並即速知會伊等務須探問明確前往追捕毋為浮言所惑諭參贊大臣玉保等進兵事宜玉保奏言臣於十二月二十九日行至鄂什默特河聞有阿巴噶斯屬人三十餘戶在彼居住即派兵前往𠞰滅並收獲其牲隻除得木齊哈丹得勒克已經投順其得木齊班咱等得秦人衆藏匿山內並行搜捕其餘阿巴噶斯屬人聞俱在大小安集哈雅兩處居住俟到彼時乘機辦理奏入上諭軍機大臣曰現在我兵既已深入而尼瑪又同阿敏道行走則後隊續進兵丁為數無多策楞玉保理應同行方為妥協今據玉保奏稱𠞰滅阿巴噶斯人衆則玉保又與策楞分兵前進伊等但因賊人散處遂各分兵前往然此際自應以擒拿首惡阿睦爾撒納及阿巴噶斯哈丹等為要著傳諭策楞玉保伊二人務須併力前進相機籌畫速期成功以副朕委任之意辛卯命革富德參贊大臣上諭軍機大臣曰據富德奏稱現在催令噶爾藏多爾濟作速進兵並稱巴雅爾未經遣人赴額林沁去等語此奏未諳事機噶爾藏多爾濟因伊子病故傷悼成疾乃情理之常朕尚降旨令其善為調攝至巴雅爾因馬匹不敷亦係實情况現在伊犂喇嘛宰桑等出兵追拿阿睦爾撒納是噶爾藏多爾濟之兵已可不遣至和通鄂勤曽經途遇布林則巴雅爾未遣使於額林沁想已知布林前來之信耳富德不論事之輕重惟恐與伊前奏不符喋喋陳奏所見殊屬鄙小富德著革去參贊大臣仍留副都統職銜専管台站事務一切軍營事宜毋得干預甲午命參贊大臣哈薩克錫之子額爾德尼莽鼐鼐承襲騎都尉世職定西將軍策楞等疏稱分兵進𠞰事宜策楞等奏言據內大臣尼瑪等將哈丹於弟庫圖齊投誠前來送至軍營臣等詳細詢問據稱去年十月間我與烏克圖及伊犂喇嘛等議定與將軍薩喇爾公丹拜等協同擒拿阿睦爾撒納約於十一月初一日在博羅布爾噶蘇台闥勒竒嶺兩路會齊我與公丹拜約蘇圖錫克錫爾格等帶兵二千名於初三日到博羅布爾噶蘇台守候十日並無諾爾布敦多克與將軍薩喇爾同來之信因暫回遊牧以圖再舉後至諾爾布敦多克處詢問知伊發兵稍遲未得會合又因敦多克曼集之弟將我等密商之事告知阿睦爾撒納豫為防備十二月十五日將軍薩喇爾及諾爾布敦多克錫克錫爾格等在伊犂諾羅斯哈濟拜甡地方與阿睦爾撒納相遇十五十六兩日彼此對敵衝殺阿睦爾撒納與回人和卓木連合共計兵四千有餘其勢頗盛遂各四散正欲前來投誠適內大臣尼瑪遣人傳諭遂即前來現在錫克錫爾格等因未得成事各懷疑懼看來未必復能聚兵等語臣等伏思伊犂喇嘛宰桑等感戴皇恩協同擒拿阿逆贖罪心甚誠篤但事機不密兵力不齊未得集事今錫克錫爾格既帶領遊牧與薩喇爾等一同由朱爾都斯前來或復整兵威以圖再舉亦未可定今阿睦爾撒納已入伊犂宜仍遵前旨兩路進兵併力搜捕計危爾錐音等日內可抵軍營仍令伊等帶兵三千名由朱爾都斯一路前進臣等仍領兵𠞰滅阿巴噶斯等遊牧直抵伊犂並將現在辦理情形遣人知會薩喇爾錫克錫爾格等以期會合再阿逆已入伊犂且與和卓木連合我兵兩路夾攻賊勢窮困勢必逃往回人地方亦應仍遵前旨令納噶查等往阿克蘇城曉諭擒拿又據參贊大臣哈薩克錫喇等報稱領兵至瑪納斯地方聞有台吉達什帶領百餘人居住即派兵前往收服隨據達什帶領伊子賽音伯勒克等前來投誠情願出兵效力至和洛霍澌河地方擒獲阿睦爾撒納信用之宰桑察衮並伊子巴朗及屬人等現派侍衛布瞻泰解送來京其阿巴噶斯屬下得木齊逹什巴圖等在大小安集哈雅地方經臣玉保等將達什巴圖三百戶俱已𠞰滅奏入上諭軍機大臣曰䇿楞等奏稱據庫圖齊告知伊犂現在情形伊等即與厄爾錐音等分路進兵等語策楞等聞知此信即議分路前進甚合機宜朕意庫圖齊所言尚屬可疑未必非阿逆詭謀冀緩大兵前進之計今策楞等不為所惑分道夾攻計日自可就獲至阿逆雖已前往伊犂其所居塔爾巴噶台博羅塔拉等處應尚有存留之人著派尼瑪帶兵數百名前往𠞰滅以分賊勢其阿巴噶斯哈丹二人雖力窮來降亦斷不宜寬貸伊等早經歸順乃助阿逆為亂情甚可惡如果知罪將阿逆擒獻來降不特免其誅戮尚當加恩如僅束身來降仍即行正法以彰國憲著曉諭庫圖齊令其轉告阿巴噶斯知之至察衮亦係助惡之人今既擒獲即嚴加看守押解來京治罪伊妻係都爾伯特汗策凌之女著加恩寬宥策楞等即交哈薩克錫喇安置甚屬妥協俟事竣後策凌等移住舊遊牧時仍令與策凌同住再厄爾錐音係準噶爾舊人甚屬幹練今既領兵由朱爾都斯進發著加恩照將軍體制統領辦事以鄂實為參贊大臣遵照前旨諸事聽其措畫悉心辦理朕意再派吞圖布偕厄爾錐音同行更屬有益此旨接到若厄爾錐音已經前進吞圖布亦毋庸更往仍令隨策楞等辦事現據鄂實奏稱遵將軍檄文即在特納格爾軍營整齊兵馬剋期前進等語伊等領兵前往遇見薩喇爾即將加恩厄爾錐音統領大兵之處詳悉諭知因厄爾錐音曽在準部辦理圖什墨勒事務招降人衆易於集事若薩喇爾乃係受恩最久之人自能仰承朕意與厄爾錐音會晤時一切事宜俱應從厄爾錐音指示和衷共濟惟期迅奏膚功以副委任其納噶查等即遵前降諭旨輕騎前往阿克蘇城曉諭衆回人等如遇阿逆逃竄往彼即行擒獻諭定邉左副將軍哈達哈等進兵事宜上諭軍機大臣曰策楞厄爾錐音等現在分路進兵所有北路兵丁前經哈達哈等奏請前往博爾塔拉協拿逆賊繼又停止進發今已值春令上年此時即已進發著傳諭哈達哈等帶領現在兵丁緩行至阿爾台以外不必深入揀選水草充足地方牧放馬匹使賊聞知西北兩路進兵進退無措中途遇各部落人衆應行擒𠞰安撫分别辦理倘阿逆迫於西路之兵逃避前來即行擒拿哈達哈等務宜悉心籌畫妥協辦理乙未參贊大臣達爾黨阿等疏奏會同副將軍薩喇爾進兵事宜達爾黨阿等奏言副將軍薩喇爾帶領衆宰桑台吉等由朱爾都斯一路前來已遣喀爾喀公恭格敦丹宰桑巴桑錫克錫爾格侍衛敦多克旺扎爾喀爾喀協理台吉博爾綽對等於正月十三日至軍營懇發兵至塔什罕地方接應薩喇爾現離軍營不過三日之程臣等即派副都統職銜瑚爾起帶兵速行往迎其此處現有兵丁作速豫備前進各路未到之兵亦即飛行催趲現在策楞處辦事之人甚多而朱爾都斯一路僅令厄爾錐音鄂實前往恐索倫厄魯特兵丁管轄難周臣等擬俟薩喇爾到時臣達爾黨阿富德哈寧阿瑚爾起等陸續按隊由朱爾都斯一路前進奏入上諭軍機大臣曰達爾黨阿等奏稱薩喇爾領兵由朱爾都斯前來已遣喀爾喀公恭格敦丹等先至俟其到時即會同前進擒𠞰逆賊等語薩喇爾帶領喀爾喀王公等辦事伊犂原無重兵駐劄一旦中賊詭謀被圍受困朕甚深軫念今能奮身歸來不特不加罪譴俟阿逆擒獲後尚當格外施恩著將此明白曉諭薩喇爾等此時現在同來者若干人其尚留彼處者若干人並陳亡及病故者俱交與薩喇爾查明奏聞分别加恩薩喇爾錫克錫爾格巴桑俱逺道前來將來又即領兵深入俱著加恩各賞銀三百兩錫克錫爾格巴桑並授為散秩大臣諾爾布敦多克前已降旨封授公爵其同來之喀爾喀察哈爾厄魯特等俱著酌量賞賜令其製裝仍往軍營效力所有定邉右副將軍印原係薩喇爾掌管今應仍行給與昨命厄爾錐音由朱爾都斯進兵伊在準部原辦圖什墨勒事務人甚厯練是以令其統領大兵照將軍體制辦事且其年較薩喇爾為長今與薩喇爾同隊其定邉右副將軍印著伊二人公同掌管其奏事列名應以厄爾錐音為首扎拉豐阿此時已應與策楞同在一處即著在參贊大臣上行走不必更用副將軍印伊等務期屏去形迹和衷共濟方為無負任使前據哈達哈等奏稱將回人阿底斯等遣往西路效力即交與厄爾錐音等帶領前往以便招服各部落回人但此內有與阿逆同謀者不可不加意覺察如有形迹可疑之人即行正法現據錫克錫爾格等告稱彼處回人附從逆賊甚屬可惡且能資給阿逆馬匹進兵時即將回人等牲隻收取亦可以增我兵力再特訥格爾一帶現有臺站事務富德不必同達爾黨阿等進兵仍著駐劄彼處辦事頃兆惠亦知薩喇爾前來之信奏請帶兵由吐魯番往迎已降旨停其前往著即前赴特訥格爾會同富德辦理臺站事務諭定西將軍策楞等進兵伊犂事宜上諭軍機大臣曰現聞阿逆已底伊犂大兵應速行進發所有各處兵丁俱已齊集即陸續繼至之兵亦絡繹奔赴策楞等此時若少為延緩則賊勢愈固殊於機宜未為允協逆賊自博羅塔拉遷至伊犁伊犁雖與博羅塔拉形勢不殊然究為準噶爾總滙之地阿逆在彼施其姦計衆人易於脅從益增黨羽大兵速進即不能一時擒獲將伊脅從之人先行𠞰滅亦足以張軍威或將阿逆逐出伊犁使其窮無所歸自可計日就俘倘伊堅拒自守我兵即踞形勝之地將伊圍困日久內變自生必有擒獻軍門邀恩封賞者此等情形皆可豫料策楞等務期加意辦理從前伊犁喇嘛等皆稱擒賊贖罪朕即降旨令將伊等寬宥免其誅戮大兵前進喇嘛等如果即時迎降著仍遵前旨辦理若又順從阿逆則反覆無常斷不容恕應即嚴行𠞰滅其額林沁巴特瑪車凌等如能擒獻逆賊束身來歸策楞即準其來降以分賊勢倘執迷不悟至事勢窮蹙方來乞命著即將伊等正法毋得少為姑息從前存貯伊犁緞匹銀兩聞係宰桑巴朗管理策楞等到彼巴朗若能將原物交出即奏聞加恩以示鼓勵再前議令沙克都爾曼濟之子圖們等帶兵協擒阿逆今沙克都爾曼濟量已抵策楞軍營應即設法通信圖們等派兵擒拿使逆賊無所逃遁何以並未籌及此時惟在早抵伊犁則諸事皆可就緒策楞等其仰體朕心奮勉從事毋稍逡巡觀望坐失事機丙申定西將軍策楞等疏奏兩路大兵會合進𠞰事宜策楞等奏言臣等遵旨派厄爾錐音等帶兵由朱爾都斯一路進發十二月初七日厄爾錐音逹什策凌拉蘇隆鄂卓特皆抵軍營公同商議據厄爾錐音告稱現在烏魯特克勒特綽和爾等鄂拓克俱已歸順天朝我等再𣲖兵三千協同辦理可以剋期告捷擒獻逆賊但我部落中可派之兵甚少其别部鄂拓克之兵又恐呼應不靈現在巴雅爾帶兵四百名前來可否即令巴雅爾統領我盡心協助於事實有禆益等語臣等即照伊所請一面差人往迎巴雅爾會同前進其臣等所領兵丁現在扎拉豐阿已起程前來軍營並行文富德將續到兵丁催趲速至共計五千名分路進發與厄爾錐音等約定日期併力擒𠞰奏入上諭軍機大臣曰策楞等與厄爾錐音等分路進兵令巴雅爾統領現在進發但觀伊等約定日期稍覺遲滯蓋伊等尚未知薩喇爾前來之信是以如此商議此時應已知悉而朕昨所降諭旨策楞等接到後自當遵照辦理大兵早抵伊犁則諸事早得就緒策楞等亦無庸俟兵至五千始行進發現在繼進兵丁亦陸續可到前後原可䇿應惟在迅速趨赴方合機宜朱爾都斯進發之兵派巴雅爾統領原屬可行今既有達爾黨阿會同進發不若竟交達爾黨阿統領達爾黨阿係協辦大學士更兼公爵軍中以公大學士帶領兩副將軍為名則阿逆聞之必以為大學士公傅恆前往傅恆荷朕倚任為阿逆所素知伊當窮蹙之時或求傅恆代為乞恩全其身命亦未可定如遣人先至達爾黨阿宜隨機應變使其不覺若束身前來即行擒拿解送京師第阿逆詭詐百端達爾黨阿等須加意防範並將此曉諭厄爾錐音薩喇爾等一體留心商酌辦理仍將兩路大兵何時可抵伊犁之處即行奏聞丁酉定西將軍策楞等疏奏遣厄爾錐音曉諭烏魯特等策楞等奏言臣等公同會商伊犁喇嘛宰桑等悔罪輸誠發兵擒賊第人心渙散未得集事今宜急遣一人前往撫慰衆心厄爾錐音係準噶爾舊人從前噶爾丹策零曽給以調遣衆鄂拓克兵馬印記伊情願先至烏魯特地方將大兵前來擒討逆賊緣由通行曉諭喇嘛宰桑等並相機行事離其黨羽即由烏蘭烏蘇小路起程前往奏入報聞參贊大臣達爾黨阿疏奏進兵日期達爾黨阿等奏言臣等會同噶爾藏多爾濟商議現在進兵闥勒竒博羅布爾噶蘇台二嶺雪大路窄阿逆以據伊犁必守此二嶺今由朱爾都斯前往至烏魯特遊牧即調集伊等兵丁併力速進較為妥協再此時若待巴里坤兵馬調齊不免遲滯是以臣達爾黨阿富德即帶索倫兵八百名於正月十五日起程往迎副將軍薩喇爾噶爾藏多爾濟亦即帶兵起程約於十七日在積水薩地方會集奏入上諭軍機大臣曰達爾黨阿富德等不俟薩喇爾迎來即帶領現在所有兵丁向朱爾都斯進發甚合機宜富德前因辦事乖張令其不必在參贊大臣上行走駐劄特訥格爾専管臺站事務今既已進兵意尚勇往著仍授為參贊大臣毋庸回至特訥格爾辦事其臺站事務著兆惠會同莽阿納辦理戊戌定西將軍策楞疏奏𠞰滅阿巴噶斯遊牧人衆策楞奏言據參贊大臣玉保報稱數日內𠞰戮阿巴噶斯所屬達什巴顔等五得秦三百餘戶又據參贊大臣尼瑪等報稱共降阿巴噶斯所屬九得秦人衆等語臣即行文尼瑪等將投誠人等俱令居住原處收其馬匹牲隻以資兵力仍令酌量出兵隨同效力並飭交庫圖齊嚴行約束并據玉保等送到四項牲隻俱已分給官兵奏入報平定準噶爾方略正編卷二十四
