body:
  text: 乾隆二十四年閏六月甲辰諭定邊將軍兆惠等相機追𠞰賊衆上諭軍機大臣曰據兆惠等詢問來降回人知波羅泥都將喀什噶爾人衆驅出肆行搶掠霍集占於四月間遷移家口輜重於葉爾羌之西恐同謀逃往拔達克山富德亦詢知霍集占遷移家産領衆於城外結營等語是喀什噶爾甚屬驚擾若從前霍集斯等早遣人招撫或可即獲渠魁今業經逃遁兆惠仍宜撫定喀什噶爾俾無失所但聞喀什噶爾城踞山巔險要難克波羅泥都斷無棄此而逃往葉爾羌之理則霍集占此時亦必逃遁葉爾羌可不攻而下若霍集占果與伊兄同逃兆惠即留阿里衮駐於喀什噶爾而前往撫定葉爾羌富德額敏和卓明瑞作速領兵偵霍集占逃竄之路窮追務獲其兵丁須選兩隊之健鋭者每兵給馬三匹并多備口糧或天寒難進即暫於葉爾羌度嵗次年辦理亦可總以擒獲逆賊兄弟始可告成功若僅取二城則事仍未竣至二城既克而渠魁未獲所有回人中阿竒木伯克等不必即令入覲致生疑懼又富德所奏波羅泥都遣霍集斯之兄阿卜都𤓰卜來兆惠軍營等語兆惠未及奏及或係𫝊聞若果前來即善為撫慰相機辦理再霍集斯鄂對俱熟習回部情形追擒霍集占等時須酌令一人隨往且將來兩軍合隊毋論賊為誰獲皆同功一體務宜和衷集事不可稍分彼此俱著𫝊諭知之臣等謹案葉爾羌城垣户口甲於回部喀什噶爾地尤險要方我兵分道罙入直搗賊巢尚疑霍集占兄弟敗衂之餘或且嬰城固拒以延殘喘縱掃穴易若摧枯未必能竟不煩一矢乃先聲所至逆酋早膽落心悁倉皇駾走兵未血刃而二城已相率迎降葢兩城之衆苦逆酋荼毒望解倒懸素仰天朝德化亟思拯水火而登袵席時雨所至蛾伏迓師歌舞載途固其宜矣而我皇上坐照幾先不特於波羅泥都驅衆肆掠時知將跳身逺遁即霍集占之必相附而逃葉爾𦍑之可不攻而下悉皆預度不爽且為䇿其去路計拔達克山懾我兵威斷不敢收匿逋逃自貽伊戚羽書星發宻示軍營我將軍等䖍奉廟謨間道馳追每戰必捷二酋遊魂驚逝鋌險無依未幾而異域獻馘輸誠膚功克奏若操券焉在昔漢通西域唐開四鎮聊示羈縻旋得旋失且不過師武臣之閫外定謀尚且艶稱史册孰有若宵旰運籌動符勝算建非常之偉績廓未有之版圖盛於今日者哉命議敘領隊大臣愛隆阿等及陞賞得功官員上諭軍機大臣曰兆惠奏稱愛隆阿福祿在軍營頗屬効力前議敘明瑞時遺漏未及等語愛隆阿福祿著交部照例補行議敘給與世職又據奏公鄂對與各回城官兵懇求隨征効力又烏什回人托克三伯克沙資雅東等似内地㕘領職任達魯罕伯克阿卜都濟帕爾等似佐領職任請賞給頂帶回人摩羅和卓去年隨霍集斯在葉爾羌已奬賞藍翎等語公鄂對及各城回人等誠懇可嘉著加倍賞給整裝銀兩沙資雅東等六人著賞給四品頂帶阿卜都濟帕爾等六人著賞給五品頂帶此内摩羅和卓仍戴奬賞藍翎又諭曰富德奏稱索倫領催英額勒圖甚屬奮勉効力等語英額勒圖著加恩賜號額爾克巴圖魯賞銀一百兩又查奏招降克勒底雅塔克之索倫署驍騎校科卜堪領催車克德赫爾厄魯特薩爾魯克巴蘇泰等功次科卜堪等俱著准其實授薩爾魯克等俱授為藍翎侍衛又將伊隊内防禦一缺驍騎校四缺查明功次擬定正陪請補防禦員缺著擬正之驍騎校𤓰里補授驍騎校員缺著擬正之領催薩爾泰赫達扎齊蘭邁松阿補授命酌派烏什駐劄官兵及議敘阿克蘇効力官員上諭軍機大臣曰據舒赫德奏稱烏什為大兵要路請派西安兵五百名交納世通帶往協同王素富辦事等語王素富係回部舊人駐劄烏什儘足辦理事務亦不必多駐兵丁酌增西安兵二百名足矣餘兵仍於阿克蘇駐劄或可不需即遵前㫖撤回前因阿克蘇辦事有人曾諭永貴回京納世通仍在阿克蘇駐劄其隨同辦事之三等侍衛齊克慎都司陳聖謨陳堯典協同玉素富辦事之遊擊王萬邦既實心奮勉著以應陞之缺補用隨印之署筆帖式西安前鋒固林泰馬甲栢秀船厰馬甲雅庫俱甚屬効力固林泰雅庫著賞八品筆帖式職銜栢秀既係開户著賞給縣丞虛銜諭㕘贊大臣阿桂速送軍營馬匹上諭軍機大臣曰富德奏據葉爾羌脱出回人等告知霍集占潛逃信息領兵從固璊薩納珠前進與兆惠約期㑹𠞰其無馬兵丁八百名留待阿桂所領送馬兵丁七百餘名作速趲赴等語適兆惠已得喀什噶爾乞降信息領兵迅往不久應與富德㑹合而富德隊内所候馬匹急需接濟可𫝊諭阿桂將所送馬匹籌畫速行不可遲滯申諭喀爾喀副將軍䇿布登扎布堵𠞰逸賊上諭軍機大臣曰據兆惠奏喀什噶爾來降回人信息知波羅泥都兄弟俱已逃遁沙喇斯瑪呼斯厄魯特等或乘亂掠取回人牲隻逃走亦未可定等語前據定長奏烏魯木齊牧羣被賊盜竊尋踪追至察拉垓俱各散走朕即諭䇿布登扎布加意捜捕今回部賊曹既經逃遁則黨衆散走者必多可𫝊諭䇿布登扎布或於特穆爾圖淖爾等處或於伊犂附近擇水草之地派出官兵於賊人逃往哈薩克俄羅斯等要路安設卡倫堵截仍徧搜山林幽僻之地倘逆賊等即在其中豈非一好機㑹䇿布登扎布其悉心籌酌辦理命通飭軍臺官員稽察遲悞上諭軍機大臣曰近見數次軍營奏報常有二三處所發一時齊到者設如兆惠之奏報經過阿克蘇而阿克蘇大臣等將所奏事件附之馳遞尚屬可行乃富德等由别路馳遞而亦與兆惠之奏齊至是必臺站人等積習接受事件不即飛遞留待後到者一同賫送之所致耳今當進𠞰之時軍機事件刻不容緩豈可任意偷安以致遲悞著將此交與兵部按照軍臺通行曉示仍令管理臺站官員等不時稽查仍有似此玩延貽悞者務宜嚴㕘治罪乙巳申諭定邊將軍兆惠等協擒霍集占上諭軍機大臣曰昨得波羅泥都逃遁之奏朕即謂霍集占若尚在逗遛大兵可并力擒獲前諭兆惠等領兵先取喀什噶爾者原以斷霍集占逃竄之路也今波羅泥都既遁喀什噶爾乞降料霍集占自不敢由此逃遁若兆惠抵喀什噶爾時霍集占尚據葉爾羌即令阿里衮額敏和卓撫定回衆伊速領本隊之兵急與富德并力攻葉爾羌擒獲霍集占波羅泥都即在逃亦可謂之竣事若霍集占聞伊兄既逃早已遁去兆惠仍遵前㫖撫定葉爾羌回衆富德額敏和卓明瑞作速領兵追襲務期擒獲俱著𫝊諭知之諭參贊大臣巴祿酌往兩路軍營上諭軍機大臣曰近據富德等奏巴祿兵少不便徑往葉爾羌朕即諭令據守要隘以斷兩城賊衆聲援仍聽兆惠調遣今波羅泥都在逃喀什噶爾乞降葉爾羌亦必有變動著𫝊諭巴祿不必據兩城要隘惟探聽兆惠富德兩軍信息就伊兵力可至何處隨何人行走有益即㑹同進發諭陜甘總督楊應琚籌辦軍需事宜上諭軍機大臣曰楊應琚奏庫車等處咨調緞布等項换易回人糧石已飭辦送等語看來布疋尤回人所需當此收穫之時用以换易糧石裕軍需而省餽餉莫便於此前已諭戸部酌撥庫貯布疋二萬解送肅州備用今復諭該部於出産省分酌量辦解總因甘省比年歉收當以民食為急其糧餉草束布疋既均無採買則本地價值自必平減為有司者正當専力撫綏賑䘏副朕嘉惠邊氓至意此時回中已有因糧之便軍務亦計日可竣該督等籌畫儲胥務使内地靜若無事斯為經理得宜耳可𫝊諭知之丙午以奏賀平定回城訓諭辦理屯田副都統定長上諭軍機大臣曰定長聞喀什噶爾回人歸誠具摺奏賀甚屬非是此次將軍大臣進兵務將逆酋兄弟全行擒獲以奏膚功今波羅泥都逃遁所餘伯克數人獻城歸附大兵所至應以未獲渠魁為恨尚何喜之有且即波羅泥都悔罪歸誠亦不足道惟生得霍集占明正其罪方可竣事定長如此陳奏特平日視此甚難耳可謂不知事體著𫝊諭知之丁未諭定邊左副將軍成衮扎布等搜捕嗎哈沁事宜上諭軍機大臣曰據成衮扎布議奏時當秋令若額爾克沙喇前赴䇿布登扎布處則馬力未免疲乏且薩拉布拉克卡倫被盜踪跡正在東南亦應速為搜捕額爾克沙喇業已起程請令其自烏魯木齊前往察拉垓等處沿途牧養馬匹詳悉搜捕既不逺行應將公䇿登薩木丕勒停其前往派台吉烏木布濟帶兵百名接濟等語即如所議行䇿登薩木丕勒已經起程與烏木布濟俱著賞緞二端并𫝊諭努三若額爾克沙喇與伊程途相近即約㑹夾攻或甚逺則仍遵㫖往博克達山搜捕盜竊烏魯木齊牧羣之賊俱著酌量辦理秋七月己酉朔定邊將軍兆惠等疏奏續聞波羅泥都霍集占逃竄信息兆惠等奏言臣等聞喀什噶爾回人信息即領兵前進一面知㑹富德又遣人由巴爾楚克知㑹阿里衮巴祿作速前來又因喀什噶爾麥熟未收派臣額敏和卓之子木薩等先行馳往安撫城堡查明逃賊地畆及應交糧石接濟軍食如布魯特兵來令其協同追賊閏六月初五日喀什噶爾所屬牌租阿巴特城伯克呢雅斯遣回人呈稱六月十二日霍集占遣阿卜都克勒木告知波羅泥都將葉爾羌喀什噶爾人等遷移焚城掘樹波羅泥都與伯克等公議未决二十日阿卜都克勒木又來𫝊信將各城回人移往拔達克山約二十四日在提斯衮齊集我即於十二日閉城拒守聞提斯衮人等俱於二十九日至英噶薩爾閏六月初七日起程霍集占兄弟約於色勒古勒之齊里衮巴蘇相㑹若大兵速來即可擒獲等語臣等復將來呈與先降之阿琿和濟默爾等詳加詰問察其情形逆賊逃竄屬實其未焚毁各城産業意尚觀望復回若但行尾追不邀截脱逃之路恐難弋獲臣等一面檄知布魯特納喇巴圖等截賊人前往色勒古勒投霍罕額爾德尼伯克之路一面儘力尾追於閏六月十二十三等日即抵喀什噶爾辦理安撫事宜聲言大兵即撤以緩賊急逃之勢再確探所逃何地速追務獲奏入報聞㕘贊大臣阿里衮等疏奏多倫降回報賊逃信阿里衮等奏言臣與巴祿等於六月二十八日兵至陽阿里克距巴爾楚克頗近派副都統由屯侍衛查拉豐阿公特通額等領兵五百捉生詢問閏六月初六日抵巴爾楚克由屯等報稱革職効力之圖倫楚達禮善等拏獲多倫回人搜黙特等三十餘口據供因聞大兵前來從喀什噶爾脱出今霍集占將巴爾楚克卡倫俱行撤回伊兄弟在兩城聚集賊衆又聞布魯特等搶其村堡霍集占兄弟商議云若逃往喀喇圖伯特恐和闐大兵邀截遣人往投霍罕額爾德尼伯克又未允從欲從拔達克山路往痕都斯坦去等語臣等見搜黙特等皆窮苦回人所言未足為實據已交解糧之員送往阿克蘇并行知兩路軍營奏入報聞㕘贊大臣舒赫德等疏奏赫色勒降回報賊逃信舒赫德等奏言閏六月十一日運送巴爾楚克糧餉回人於愛庫勒遇喀什噶爾脱出回人阿卜達喇木帶至阿克蘇據告稱本月初二日波羅泥都領喀什噶爾回人及瑪呼斯阿巴噶斯厄魯特伊犂種地回人共千餘户欲逃往拔達克山從巴克塔克拉行走三日山路甚狹我係離喀什噶爾百里赫色勒城之人因從英噶薩爾逃回本處我兄素丕爾格和卓係赫色勒頭目遣我來迎大兵等語又據告稱霍集斯之兄阿卜都𤓰卜等家屬俱被波羅泥都帶去又詢同來回人邁瑪雅爾等據告稱我等係阿克蘇所屬克勒品回人去年霍集占掠往喀什噶爾之牌租阿巴特城我兄密雜呼爾班領屬人三百戸與伯克呢雅斯守城來迎大兵等語又詢得喀什噶爾大伯克阿卜都喇伊木密里木哈子墨墨氐敏等皆與波羅泥都同逃中途棄其婦子逃歸伊等謀擒獻波羅泥都事洩後不知如何至波羅泥都之逃因霍集占先離葉爾羌是以同行現在二麥俱未收割城内馬匹雖盡去其村莊尚有存留等語并出回字呈文二紙臣等即將所得情形馳送兩路軍營奏入報聞諭定邊將軍兆惠等追𠞰賊衆事宜上諭軍機大臣曰據兆惠阿里衮等奏報霍集占兄弟商議同逃看來從拔達克山往痕都斯坦較為確實我兵未抵城下賊已竄逸非將軍等之咎但二城即定而逆賊兄弟未擒難云竣事兆惠富德等自應窮追務獲且賊人伎倆已無所施若見我聲勢可畏必自相擒獻或稍存猶豫則亦必觀望茍延現在馬力有餘加以二城村堡所有俱可接濟計奉到此㫖不過八月初旬正可長驅深入或天氣漸寒即撤回葉爾羌來年再行追襲亦可至回人等雖應撫恤而馬匹必當拘收庶不假伊等以足力俱著𫝊諭知之又諭曰額敏和卓之子木薩奉委馳往喀什噶爾安撫回衆查勘地畆甚屬効力著加恩賞給公品級庚戌申諭定邊將軍兆惠等奮勉追𠞰逃賊上諭軍機大臣曰昨據兆惠等奏稱霍集占兄弟俱經逃竄追襲最為𦂳要以我馬力有餘而逆賊等所攜萬衆雜以婦女童稚行走既不能便利多人亦易生變亂我兵當恩威並用或招撫或離間中途必自潰散或有擒獻者至堵截雖亦一䇿但急追不能紆道或致徒疲馬力若果逃往拔達克山量伊地僅一小部落斷不能收養如許逋逃且豈肯自招罪累兆惠富德等惟宜悉心奮勉以奏膚功守城拒賊之伯克呢雅斯兆惠等即量加奬賞其二城來降伯克等應如何酌予加恩俱著查明定議具奏諭定邊左副將軍成衮扎布等防範逃賊事宜上諭軍機大臣曰成衮扎布以籌畫䇿布登扎布行糧具奏今體察回部情形䇿布登扎布不須往特穆爾圖淖爾但於伊犂附近擇水草之地駐牧防範霍集占等逃入俄羅斯哈薩克之路併搜捕嗎哈沁其官兵糧餉行文定長等支給乙夘諭定邊將軍兆惠等霍集占逃竄情形上諭軍機大臣曰據五素富奏稱從葉爾羌脱出之烏什回人阿竒木和卓等告知霍集占聞大兵將至向西逃竄波羅泥都通使安集延往復之間霍集占謂其難信留來人不遣以賊衆千人附阿卜都克勒木賽里克伯克守城等語霍集占聞風逃竄自屬確實至以千人留葉爾羌則斷不能守此必逆賊等恐有追襲俾親信之人斷後揚言固守以作疑兵冀我師或不窮追久駐仍可復回抗拒耳兆惠所領兵馬尚無不足惟富德馬力稍弱頗為厪念但阿桂續進之兵亦可接濟其悉心奮勉行走至阿卜都克勒木從前固守庫車戕害托克托等實為逆黨渠魁此時果留葉爾羌務宜擒獲正法以抒衆憤俱著𫝊諭知之丁巳定邊將軍兆惠等疏奏撫定喀什噶爾兆惠等奏言臣等領兵前往喀什噶爾在城大小伯克并從前逆首霍集占自阿克蘇庫車多倫克勒品等處移來回衆於百里外來迎臣等經過村莊回人皆獻牛酒果餌情詞恭順又被脅從賊乘間脱出之回人等俱稱霍集占搶掠葉爾羌回衆馬匹牲隻及勒索回人摩羅等凑銀四千兩於閏六月初二日起程由伯克和羅木渡口向羌呼勒逃去波羅泥都於六月二十七日搶掠喀什噶爾回衆由玉魯克嶺潛逃兄弟㑹齊同行同黨止四千餘人且訛言兵至自相掠奪等語臣等於閏六月十四日抵喀什噶爾回衆復獻牛羊果餌歌舞慶幸臣等加以撫慰詢問逆賊所逃之路據回人多羅特巴凱告稱波羅泥都兄弟相㑹之後同向色勒古勒逃走雖均係拔達克山必由之路但道甚險逺伊等或往拔達克山附近之博洛爾或仍往安集延瑪爾噶朗霍罕納瑪噶等處今欲堵截擒拏則色勒古勒附近之帕密爾西通博洛爾拔達克山北通安集延等處地雖多石馬蹄釘鐵可以行走不過十數日程途等語臣等已知㑹阿里衮巴祿之兵約於本月十六七日可至臣明瑞愛隆阿溫布等即領兵二千名每人給馬二匹於閏六月十五日起程晝夜追襲阿里衮等續到亦即前往其餘兵馬暫為休息臣兆惠一面將撫定喀什噶爾葉爾羌査核户口田賦委員派兵防守各事宜辦理稍有端緒即領兵䇿應務期擒獲賊首上副聖心其富德軍營信息已遣侍衛納克布及回人總管職銜色梯巴勒氐侍衛瑚圖禮等前往探聽協助奏入得㫖下部知之定邊右副將軍富德等疏奏撫定葉爾𦍑富德奏言臣等於閏六月初一日起程由固璊薩納珠前進派瑚爾起老格豐安烏三泰等哨探十一日夜據索倫總管薩壘等捉獲回人伊巴里葉木等四人告稱霍集占於初二日棄葉爾羌逃往英噶薩爾大小伯克等情願迎降賫有鈐記呈文二紙臣等伏思降人雖未可遽信而我兵總宜進發隨派兵五百名令鄂博什等持檄往諭為首之喀瑪勒和卓等於十二日起程臣等隨即前進十三日阿桂達爾黨阿傅景送馬亦到沿途村莊回人俱扶老攜幼道左跪迎臣等宣布皇恩令其各安生業行至聽雜阿卜河岸據鄂博什等報於十四日到城并將檄𫝊之喀瑪勒和卓等送來軍營據稱我等早欲歸順奈為霍集占所脅今伊聞信潛逃始得如願自將軍檄到合城老幼無不踴躍鳴金擊鼓三晝夜共相慶賀等語十八日黎明我兵整飭旗纛按隊渡河自南門入城中觀者塞道爭獻果餌備述前受霍集占擾害從此永安生業臣等加以撫慰回衆同聲歡呼叩首復周行城垣十餘里皆以土築房屋較各城為宻村莊亦多查詢從前戸口二萬三千有竒現存仍二萬户復詢霍集占逃走所向據稱欲往拔達克山又聞欲往安集延不知確實等語臣等務期窮追速獲獻俘闕下一面探聽兆惠等收服喀什噶爾信息謹此馳奏奏入得㫖下部知之命議叙撫定回城之將軍大臣官兵等上諭軍機大臣曰據將軍兆惠富德等奏稱逆賊霍集占兄弟聞大兵前進率其親黨逃竄葉爾羌喀什噶爾回衆俱輸忱歸順現在一面安撫兩城一面派出追𠞰等語覽奏深為欣慰逆賊兄弟雖畏罪先逃而兩大城實回部著名之地既歡迎恐後則二賊亦可計日就擒此皆將軍大臣官兵等奮勉所致甚屬可嘉俱著交部議敘申諭定邊將軍兆惠等迅速追擒賊首事宜上諭軍機大臣曰兆惠富德等具奏撫定回城業經加恩議敘仍著𫝊諭伊等激勵官兵益加奮勉務使渠魁早獲以期承受寵榮從前曾降諭㫖兆惠辦理兩城事務富德明瑞等領兵速往追賊即當作速起程沿途宣布朕諭以霍集占等罪由自取與脅從之衆無渉有能擒獻者必沛殊恩雖附和為惡如沙喇斯瑪呼斯人等倘能幡然悔悟去逆效順亦從寛免罪俱著遵照辦理戊午命議敘馳遞捷奏臺站官兵上諭軍機大臣曰富德等奏撫定葉爾羌等城回衆紅旗馳報甚為迅速所有臺站人等自應加恩著將己里坤以内臺站交地方官查明其巴里坤以外交清馥定長舒赫德等查明造册送部議敘諭定邊將軍兆惠等籌畫接應糧馬各事宜上諭軍機大臣曰昨據兆惠奏派明瑞領兵二千追𠞰逆賊等語若明瑞等能速追即獲固屬甚善萬一賊衆逺颺則接濟官兵糧餉甚屬𦂳要但官兵所至多布魯特等部落伊等業已歸誠又令協擒賊首自未便責其供應著兆惠豫為籌畫且亦當酌量馬力計節次辦送之馬將二萬匹自春迄夏始能全到伊等自應加意牧養有傷損者或向回人及布魯特等换易添補縱不可得但以足敷萬人之馬派給勁旅五千自有餘裕若今嵗不能竣事即暫回葉爾羌等處休息亦可至富德奏霍集占所居應否拆毁等語著即為辦事大臣公署擒獲逆賊後或選授阿竒木伯克等亦可居住俱著𫝊諭知之己未諭㕘贊大臣舒赫德等酌議回城官制上諭軍機大臣曰舒赫德等奏稱阿克蘇係回部大城村莊甚多舊係伯克密喇卜等管理今雖不必準以内地官制而品級職掌宜為釐定庶足以辨等威而昭信守等語所奏甚是著照所請以阿竒木伯克為三品伊沙噶伯克為四品噶雜納齊伯克為五品將應陞人員奏請補授其小伯克密喇卜等為六七品俟缺出揀選補授其餘各城俱一體辦理但回部諸城皆大兵進𠞰所定非哈密吐魯番之向化歸誠可比從前玉素富額敏和卓之屬人等本其世僕故所設官員俱不支俸此等回人雖承辦公事有官職大小之殊皆係朕之臣僕將來如阿竒木等大伯克或令其輪班入覲酌給官俸其小伯克等或於所定租賦内通融支給亦可著𫝊諭舒赫徳查核定議具奏俟回部全定後舉行此時不妨以籌辦大概曉示回人俾共知感激奮勉癸亥㕘贊大臣舒赫德等疏奏查獲賊黨密爾圖遜正法舒赫德奏言上年十二月有克勒品回人密爾圖遜被霍集占移往喀什噶爾為賊嚮導捉生旋經發覺已將伊母正法今見霍集占逃竄又同克勒品回人等投回阿克蘇徼幸免死臣與本城伯克等查出嚴審服罪隨𫝊集伯克及回人等將密爾圖遜即行正法奏入報聞甲子諭䕶軍統領努三等哈薩克貿易事宜上諭軍機大臣曰據䇿布登扎布奏稱領兵至波羅呼濟爾遇哈薩克之哈喇巴喇克等言及貿易一事據稱上年哈巴木拜之子額得格等至烏魯木齊交易回抵游牧云馬一匹僅得緞一端衆人聞知俱不願前往今將軍等既准貿易須致書與阿布賚相商仍懇量為增給等語哈薩克乃㣲小部落貪利無厭若如所請増給貨物日後輾轉干求何所底止此則斷不可行况上年貿易馬匹原為進𠞰逆回今諸城盡附逆賊計日可擒何必多購馬匹置之無用著𫝊諭努三等若哈薩克人等仍来貿易或嫌工料紕薄妄求増給即行曉示云縀疋皆商人貨物民間通用難以内庫賞賚之物相衡爾等如不願交易亦聽其便豈能曲從所請轉致累我商民現在伊等曽否前來及作何辦理即著奏聞諭喀爾喀親王䇿布登扎布等撤囬堵截官兵上諭軍機大臣曰䇿布登扎布奏稱奉㫖堵截逆回逃走要路詢之嚮導人等俱云特穆爾圖淖爾天氣甚寒七月後即有大雪請先探兆惠信息聽候調遣等語前諭䇿布登扎布等堵截逆賊葢防其由哈薩克投入俄羅斯也今兆惠等既撫定葉爾羌等城霍集占兄弟向西逃走則特穆爾圖淖爾及伊犂等處俱無庸防範著即領兵由阿爾台回喀爾喀游牧併𫝊諭沿途駐劄大臣等知之庚午定邊將軍兆惠等疏奏辦理喀什噶爾等城事宜兆惠等奏言臣等撫定喀什噶爾等二城宣布皇思凡棄賊來投者俱行免罪又查出各城遷來回衆二千五百餘户一萬二千二百餘人俱送往阿克蘇以備屯田現在喀什噶爾大小十城七村莊回衆各安生業謹將各城及村莊繪圖呈覽并將設官定職徵糧鑄錢及駐兵分防事宜列欵具奏一喀什噶爾地居西北距肅州嘉峪關六千餘里其城周圍十餘里城内回人二千五百餘戸東界烏什阿克蘇有牌租阿巴特赫色勒布伊伊克阿喇圖什三城伯什克勒木阿爾巴特二大村共六千餘戸西界安集延布魯特内有巴哈阿喇圖什鄂坡勒塔什巴里克三城塞爾們托克庫爾薩克二大村共二千二百餘戸南界葉爾羌内有英噶薩爾汗阿里克二城提斯衮哈喇刻爾二大村共四千四百餘户北界布魯特内有阿喇古城霍爾干村共八百餘户總計一萬六千餘户數十萬餘口具載圖册一各城村辦事應設官職查回部頭目曰阿竒木總理一城曰伊沙噶協辦阿竒木事曰商伯克管理租賦曰哈子管理刑名曰密喇卜管理水利曰訥克布管理匠役曰帕察沙布查拏賊盜曰茂特色布承辦經教曰木特窪里管理田宅曰都管管理館驛曰巴濟格爾管理税課曰阿爾巴布派差催課曰市琿協辦都管事曰巴克邁塔爾専管園林曰明伯克其職如千總今喀什噶爾阿竒木一缺請暫委吐魯番副台吉木薩署理其餘各職臣等查隨營効力之著姓回人及並未從逆之回人子孫等三十四人揀選補授謹列名具奏一每年貢賦數目查回人一帕特瑪準官石四石五斗一噶爾布爾準五斗一察喇克準官秤十觔一騰格準制錢五十文值銀一兩初噶爾丹博碩克圖收降回衆定額每年納錢二萬六千騰格此内有種地之鄂爾托什人等納糧四萬八百九十八帕特瑪棉花一千四百六十三察喇克紅花三百六十五察喇克一帕特瑪折錢四騰格一察喇克棉花折錢四十八文紅花折錢三十二文共錢二萬一千餘騰格又克色克綽克巴什人等納錢二萬六千騰格商賈牧養人等納錢二萬騰格俱以本色折納又供給氊罽喇嘛衣帽商人金銅税園戸果税邊界貿易回人徵税十分之一外来貿易之人徵二十分之一俱未能如數全完波羅泥都居住後較前更少臣等推廣皇仁請將氊罽及零星雜税盡行蠲免嵗徵糧四千帕特瑪棉花一千四百六十三察喇克紅花三百六十五察喇克錢六千騰格俟將來駐兵與否酌交糧石銀兩金十兩葡萄一千觔解交内府其貿易税課照舊辦理一大兵進𠞰應籌糧餉除歸降回人照常納賦外其隨同逆回逃竄之人所種田禾均應入官充餉臣等查各城鄉現種麥秫綠豆共籽種一千七百九十九石五斗有竒豐年可穫七八倍荒年可二三倍但驚擾之餘應行酌減隨𫝊伯克等公議今嵗各城鄉共交糧二千帕特瑪準内地九千石其入官之地三倍交納共一千二百帕特瑪準内地五千四百石七月起至嵗底交錢一萬三千餘騰格俱折收糧石舊果園七所嵗徵葡萄俟藏貯成乾交納波羅泥都新果園十五所除給還强奪回人二所外其十三園所獲無多請充官兵賞賚之用一回部錢文應行改鑄查回城錢文俱紅銅鼓鑄計重二錢一面鑄準噶爾台吉之名一面鑄回字因所産銅少每鑄新錢一萬騰格以新錢一文易舊錢二文銷毁更鑄又行换易今雖未便全收改鑄現有鑄礮銅七千餘觔請先鑄錢五十餘萬文换回舊錢另鑄一二年間可以盡改或照内地制錢每一文重一錢二分或即照回錢體質一面鑄乾隆通寳漢字一面鑄葉爾羌清文及回字謹呈様請㫖一現在分路進兵追擒逆賊其喀什噶爾應酌量駐防擬派西安滿兵三百名阿拉善兵五十餘名委散秩大臣伯永慶阿拉善公衮楚克管理仍留綠旗兵一千五百餘名委提督閆相師酌量城鄉邊界駐防臣一面前往葉爾羌查辦於閏六月二十五日起程其和闐阿克蘇等處情形頗有不同已行文舒赫德辦理奏入得㫖下部知之諭定邊將軍兆惠等辦理回城及進𠞰事宜上諭軍機大臣曰兆惠等撫定喀什噶爾城以辦理事宜具奏俱著照所請行其新授伯克等三十四人著賞給頂帶仍將軍營緞疋酌量賞給如有奮勉出衆者准戴奬賞翎所呈錢文已交錢局鑄造二百文發往為式即用該處工役鼓鑄至從前造賊等遷移之回人著發往伊犂屯田令其自備資斧不必官為辦理現在安插阿克蘇舒赫德宜留心約束原任喀什噶爾阿竒木伯克之霍什克伯克等今若授為阿克蘇之伯克恐日久終生覬覦應送京安置為妥葉爾羌喀什噶爾二城乃回人根本補授阿竒木伯克甚為𦂳要朕意欲以額敏和卓管葉爾羌玉素富管喀什噶爾仍向伊等舊游牧往来行走如成衮扎布之游牧在塔米爾而駐劄烏里雅蘇台有此等舊人在彼始堪倚任此時且不必洩漏恐霍集斯失其希冀之心遂生懈怠俟大功告成再為辦理與額敏和卓等則不妨密商另摺所奏之回人阿卜都喇伊木等因迎我大兵賊人將伊子弟之足折傷甚屬可憫應加恩賞䘏又査出從前霍集占遣來偵探之回人既於軍營正法其烏什所送之阿竒木伯克托克托黙特曾害降回十七人亦如所奏送至哈密正法家口俱解京備賞又諭曰兆惠等奏稱從霍集占處脱出之喀什噶爾回人云霍集占兄弟在塔該黙暫住或往拔達克山或往安集延俱未可定塔該黙在塞勒古勒以内此時阿里衮巴祿之兵應尾追將及富德阿桂等相繼䇿應明瑞又已在前堵截可望擒獲即令逃入色勒古勒城則三路合圍或逃往外部落持檄往諭亦必擒獻等語覽奏殊為欣慰逆賊等既能分城拒守又不速行逃竄觀望逗遛必為我追及若慮其據險結營則我鎗礮之威斷難支持葢伊等孽由自作惡貫滿盈故天奪其魄俾早正刑誅耳至布魯特人等攻英噶薩爾村莊聞侍衛等檄止即撤兵入山恭順可嘉著𫝊㫖慰諭仍酌賞緞疋命優䘏侍衛璊綽爾圖等并誅降賊之察哈爾丹巴林沁家屬上諭大學士曰兆惠等奏據藍翎侍衛莫寕察家人瑪穆特脱出告稱前隨莫寜察及固濟爾巴圖魯侍衛璊綽爾圖與達什䇿凌等領兵百名前途偵探遇賊千餘人猝被遮斷時莫寧察璊綽爾圖各據空屋固守有察哈爾丹巴林沁開門投賊我兵矢盡力竭莫寧察遇害璊綽爾圖與索倫六品官岱屯被執罵賊不屈逆酋霍集占手斷其頸岱屯亦刳腹遇害等語達什䇿凌等前已加恩諭部優䘏今璊綽爾圖被執罵賊始終不屈慘烈捐軀忠義之氣凛然覽奏深為嘉憫璊綽爾圖有無子嗣并前此作何加恩該部即查明具奏候朕加恩優䘏以勵忠貞岱屯著一併查奏瑪穆特被擒得脱情亦可矜著加恩作為另户披甲至丹巴林沁開門投賊情甚可惡獲日應照叛逆律治罪著派乾清門侍衛舒常馳驛前往察哈爾㑹同該總管將丹巴林沁子孫查出鎖押插箭於八旗地方巡行示衆後即行正法其親兄弟妻女一併拏解來京賞給王大臣為奴定邊將軍兆惠疏奏遷移回人各事宜兆惠奏言前因布魯特居住之額爾克和卓額色尹之姪鄂托蘭珠和卓瑪穆特等投見詢其情詞與阿琿和濟黙爾相同因令隨營寄書伊叔領兵協助臣等行近喀什噶爾額色尹等來告云六月十八日遇波羅泥都所屬百餘人奪纛一桿𠞰殺多人等語臣等加以撫慰令其遣人往取家屬俟入覲後遵㫖安插臣等竊思伊等係霍集占同族又與布魯特相契恐回人等又以伊等為和卓妄行敬信應於到京後請㫖將伊等或留京城或安插安西哈密等處又多倫伯克阿爾租等領回人千戸來投云被霍集占廹脅今願歸降等語臣等查多倫回人向在巴爾楚克以内居住上年霍集占從庫車敗逃時遣阿卜都哈里克𫝊喚伊等即時遷移與實被廹脅者不同因加以斥責復宣布皇恩寛宥伊等甚屬畏懼聽候安插因將原任散秩大臣伯克托克托之弟阿卜都賚委為阿竒木令其照管暫移阿克蘇等處度嵗俟來春酌於屯田處所安插行文舒赫德辦理伊等獻羊九百餘隻即給與官兵奏入報聞平定準噶爾方略正編卷七十五
