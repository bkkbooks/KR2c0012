body:
  text: 乾隆二十三年六月己巳靖逆將軍雅爾哈善等疏奏防範庫車應援要路雅爾哈善等奏言臣等攻圍庫車城與領隊大臣及伯克鄂對等共議回城雖係土築頗屬髙堅此時賊衆不敢出戰自應多備雲梯土袋於夜間努力攻取一面絶其水道又據鄂對告稱回衆俱為阿卜都克勒木刼制未必投降所有各城應援要路俱宜安設卡倫城東南通庫爾勒哈喇沙爾係我兵來路現有臺站軍營尚無可慮惟准備截殺援兵城北通賽里木一帶髙山遮隔有沙勒達朗鄂斯克伯什二隘口若以石壘塞自難偷越彼處只有山泉可駐步兵防守城西通沙雅爾六十里外有鄂根河水長時可以行舟若安臺瞭望自無遲悮等語臣等即分派侍衛等查勘派兵防範五月二十日守備莫倫岱領緑旗兵八十名至沙勒達朗壘塞隘口忽山内有百餘騎突出莫倫岱射賊三人官兵鎗矢競發傷賊數十人向西敗走想係阿克蘇等處偵探之賊二十三日四鼓署㕘領第雅隆阿在城東北築壘處埋伏見有馬步賊二百餘人即領吉林索倫兵五名綠旗兵三十名従牆洞内放鎗發矢追至城下賊人墜馬受傷者甚衆計殺賊五十餘人其莫倫岱擬請陞補都司柏萃病故員缺第雅隆阿等應請送部議叙臣等又詢問軍營伯克及順徳訥等知霍集占等係𫝊授經教之人得脱回巢僣稱汗號殺害伊舊台吉素爾統等後嗣因令順徳納作書聲其罪惡招撫衆回其額敏和卓面傷現已平復又准将軍兆恵咨五月初旬已至布魯特㳺牧臣等仍候攻具齊全相機辦理並繪圖恭呈御覽奏入上諭軍機大臣曰雅爾哈善等以攻圍回城防守要隘繪圖具奏辦理頗屬奮勉諒賊衆自難久守倘尚未攻克仍分兵前進揚言已取庫車懈其應援再用兵之道捉生詢問可知虚實今我兵殺賊五十餘傷賊三十餘而未見擒獲一二人何耶此時賊衆即出城交納兵器乞降仍宜整肅隊伍於各要害加意廵防勿以輕敵受欺所奏勦賊之第雅隆阿著交部議叙莫倫岱即陞補都司其効力得傷官兵俱著照例議叙另摺所奏伊犁屯田尚非目前急務自可從容辦理庚午命直省等處購備馬匹上諭軍機大臣曰巴里坤一帶現在墾種地畝甚多兼之辦理回部均需豫備馬匹若就陜甘兩省採買一時恐難足數應於附近各省分路採買自易為力直隸著辦馬三千五百匹山西二千五百匹山東河南各一千匹陜西二千匹著𫝊諭各督撫即派委賢員速為購辦解赴肅州交總督黄廷桂驗收轉解務于十月内趲至巴里坤以備派撥各省若能及時買足固善或不能趲辦准於營驛馬匹内挑選壯健者凑足解往其缺額限本年内陸續買補併𫝊諭黄廷桂知之辛未命凉州將軍嵩阿禮監鑄礮位上諭軍機大臣曰據黄廷桂奏稱甘肅等處現存礮位年久不堪應用現在僱覔良工趲造大神礮二三十位請交嵩阿禮監造就近演放交臣轉解等語軍營現需礮位自宜製作精堅著𫝊諭嵩阿禮督同鎮道等員監視工匠加意鑄造但必俟全數鑄就始行轉解未免稽遲時日且解送亦殊繁費惟酌量鑄成三四位或五六位即為一起轉解可也諭大學士管陜甘總督黄廷桂續查解送人口病斃虚實上諭軍機大臣曰據阿里衮等奏稱將軍兆恵派佐領巴濟勒圖等解送厄魯特訥黙庫等男婦二百三口中途病故四十一口又署章京烏拉凱等解送賚瑪里木集賽等二百六十口病故一百九十九口等語前因解送厄魯特致斃多人曾交黄廷桂查眀具奏今兩次所解四百餘人復斃其半殊屬可疑著仍交黄廷桂將因何致斃多人及有無揑報情弊查明據實奏聞甲戌諭靖逆將軍雅爾哈善等進取回城事宜上諭軍機大臣曰據雅爾哈善等奏稱侍衛噶布舒齊凌扎卜等領兵渡鄂根河至沙雅爾城擒獲伯克之子喀啟巴巴克等復近城招降不從誘令交戰亦不出因泥濘未能衝擊將擒獲賊衆俱行勦殺惟留喀啟巴巴克送京備詢等語據喀啟等所供則沙雅爾並非大城雅爾哈善等不必久留攻擊致稽時日宜進取阿克蘇等城既克之後此等小城自然畏懼降服至所供沙喇斯瑪呼斯等餘賊竄入庫車為逆酋拒守攻克之日不可稍存姑息即回衆開門獻城亦應分别查訊或撫或勦此次進攻沙雅爾雖侍衛喀喇等有所俘獲而毁其種植俾野無餘積未見奏及何耶現因辦理回部已調索倫兵二千察哈爾兵一千徤鋭營兵一千名并挑選徤馬一萬匹遣往巴里坤豫備可𫝊諭雅爾哈善知之諭定邊將軍兆恵等曉示布魯特人等協力進勦回部上諭軍機大臣曰雅爾哈善等訊問擒獲賊人供詞有云兩和卓木曾殺害舊頭目伊克和卓木其子逃入布魯特現在撫養等語㸔来布魯特人衆與逆酋有隙前諭兆恵等速向阿克蘇不必從布魯特取道此時若尚在布魯特即曉示伊㳺牧人衆若能協力進兵則所有沿途俘獲當酌量賞給以示鼓舞即同抵葉爾羌喀什噶爾擒勦逆酋其留心體察相機辦理申諭定邊右副將軍䇿布登扎布等速向哈薩克索取哈薩克錫喇上諭軍機大臣曰據策布登扎布等奏稱領兵搜查阿呼爾哈爾海等處並無舍楞踪跡六月初一日由阿勒坦特卜什起程往塔爾巴噶台計二十日可至布空哈拉瑪嶺等語舍楞已竄入俄羅斯策布登扎布不必復往追襲仍遵前㫖至哈薩克索取哈薩克錫喇等且伊等所奏哈薩克約倫伯克巴圗爾等云哈薩克錫喇不知被阿布勒哈里之人擒獲與否我等相隔甚逺等語則愈為可據更宜速往查拏勿致遲悮命尚書納穆扎爾侍郎三泰馳驛前往軍營上諭軍機大臣曰兆恵雅爾哈善富徳等久在軍營冬季撤兵當来京請訓並籌辦一切事宜著尚書納穆扎爾侍郎三泰馳驛前往西路軍營以㕘贊大臣行走亦可漸習軍務兆恵等来京時其将軍印務即令納穆扎爾署理授察哈爾賽音圗為藍翎侍衛上諭軍機大臣曰察哈爾奨賞翎賽音圗曽擒獲勞章扎卜且於舍楞誘害官兵時奮勇脱出甚屬可嘉著加恩授為藍翎侍衛賜號固濟爾巴圖魯仍賞銀一百兩乙亥諭靖逆将軍雅爾哈善等籌備駐兵糧餉上諭軍機大臣曰昨閲雅爾哈善等進攻沙雅爾之奏已諭以不必攻圍此等小城惟將田野種植毁棄即前往阿克蘇等處今思本年若未能攻取葉爾𦍑喀什噶爾僅得庫車阿克蘇等城至應行撤兵之時若仍為賊人所據来年又煩辦理自當留兵戍守則糧餉亟宜籌備可傳諭雅爾哈善等此時攻城之際不坊令綠旗及回人等刈賊之穀以濟口糧其未成熟者亦不必毁棄蓋賊既不敢出城則種植業為我有且克城之後賊人口糧非食用俱盡即焚棄不留自當豫圗接濟惟與賊相近及我兵不必駐劄之地則仍行毁棄可耳至駐兵既逺糧運宜早為經理現在巴里坤所儲糧石當陸續運往回部復由内地撥運巴里坤備用若䭾載維艱回地頗屬平坦或可兼用車驢否亦𫝊諭黄廷桂阿里衮等籌酌具奏丙子黑龍江将軍綽爾多等疏奏續派索倫等官兵事宜綽爾多等奏言臣等奉到諭㫖續派索倫兵一千名同前派官兵前往軍營查現在索倫達呼里共二千三百餘名不敷挑選酌於呼倫貝爾等處之索倫巴爾虎兵内凑足一千其派出管轄官員俸餉銀兩均照前次賞給其軍器等件於齊齊哈爾等處凑辦共派索倫兵二千名候御前侍衛敦察等至日帶領起程奏入報聞丁丑諭定邊左副将軍成衮扎布等策應阿桂邀擊舍楞上諭軍機大臣曰成衮扎布等據和碩齊隊内脱出之厄魯特㕘領鄂勒椿告稱逆賊舍楞逃至俄羅斯圗喇附近先遣五人送信聞已被拘執狐疑不决欲投往土爾扈特復遇哈薩克四百人舍楞率衆迎敵哈薩克等佯退相誘成衮扎布即派藍翎侍衛拜靈阿知㑹阿桂令其邀擊等語所辦甚是舍楞既未入俄羅斯又遇哈薩克之衆或仍回塔爾巴噶台和尼邁拉呼必與阿桂相遇自可擒獲成衮扎布等仍整兵前往策應至鄂勒椿係散秩大臣鄂齊爾之弟中鎗被擒乘間脱出途遇索倫協領阿喇卜坦等殺馬共食步行回營甚屬可嘉著加恩授為二等侍衛賜號錫都爾呼巴圖魯賞銀一百兩可𫝊諭三寳曉示達什達瓦㳺牧人等知之戊寅申諭定邊左副將軍成衮扎布等宜速取舍楞實信上諭軍機大臣曰昨諭成衮扎布等策應阿桂擒拏逆賊舍楞因思伊等所帶口糧僅敷九月以前之食若屆期未能竣事仍須接濟今福禄已奏請預備三箇月口糧牲隻由科卜多運送軍營成衮扎布等自可咨取無悮至脱出之鄂勒椿曾到阿桂軍營自必早得賊人實信阿桂即當一面知㑹成衮扎布策應一面將辦理縁由奏聞何以總未奏及豈疾行追賊無繕摺之暇耶著成衮扎布即行𫝊諭令其速奏倘阿桂以鄂勒椿情事因成衮扎布奏聞致降㫖詢問遂爾心生猜忌則徒自取罪戾耳己夘諭定邊左副將軍成衮扎布等速取逆賊舍楞上諭軍機大臣曰據成衮扎布等奏和碩齊隊内脱出達什達瓦兵丁沙喇巴圗爾告稱五月初舍楞等遣人入俄羅斯未回又欲他往俄羅斯復行阻止遂以舟相渡安插於森博羅特城附近請遣人至彼索取並將所發俄羅斯文書呈覽従前成衮扎布起程之時即諭以舍楞若入俄羅斯即行索取今脱出人等所告確有可據自當一面索取一面奏聞乃必再行請㫖以致稽延時日實所不取但此時若仍行向索則伊圖喇人等反得飾詞預備成衮扎布不妨領兵潛至森博羅特若舍楞在彼棲止我兵即徑行擒勦若已經聞信遷移則仍聲言索取惟在相機辦理沙喇巴圗爾被擒脱出著賞銀五十兩令回㳺牧休息其䇿布登扎布不必追勦舍楞仍向哈薩克索取哈薩克錫喇并促圖倫楚達理善等速清哈丹阿巴噶斯餘孽所降諭㫖亦由西路臺站馳遞諭㕘贊大臣阿桂等勦殺往投舍楞之嗎哈沁上諭軍機大臣曰據黄廷桂奏稱詢問解到之琿齊等家口在博羅布爾噶蘇台等處遇嗎哈沁搶掠人口牲隻俱係舍楞所屬等語此等嗎哈沁雖欲往投舍楞斷不能及且有阿桂在彼堵截可𫝊諭阿桂務必留心擒勦又解送人等亦有在托里等處被掠之語并𫝊諭永貴等酌量派兵前往仍知㑹豆斌一體搜捕嗎哈沁不可致令逃脱庚辰諭巴里坤辦事副都統阿里衮等查奏揑報解犯病故官兵上諭軍機大臣曰黄廷桂奏稱詢問軍營解到之厄魯特等知搶掠人口牲隻係舍楞屬人等語従前阿里衮等奏報節次解送厄魯特等中途病故過半朕曾降諭㫖謂脱逃數名而解送之人不過疎防若揑報則為欺㒺因諭黄廷桂查奏今據奏實係被賊掠奪其病故者祇有數人當日抵巴里坤時何以並未查詢可𫝊諭阿里衮此次管解人口各官兵若仍在巴里坤即遵前旨分析查詢酌量議罪具奏若已回軍營亦行文將軍大臣等查明議罪諭大學士管陜甘總督黄廷桂等籌辦牧養馬匹事宜上諭軍機大臣曰昨諭直隸山東山西河南陜西等處購馬一萬匹由肅州轉送巴里坤豫備来年進兵之用計送到時已屆冬寒彼處雖可牧放恐馬匹臕分已減難於長發不若分槽豢養自易充肥巴里坤現未備貯草料由内地解運恐難如期足用或留其半於肅州一帶俟需用之前再行趲送亦可但我兵計日可取庫車阿克蘇等城即宜留兵戍守来年従此進兵若能於巴里坤吐魯番等處籌辦草料或即趂此時起運將馬匹陸續解送更善可𫝊諭黄廷桂酌議具奏有應行事宜亦可先舉併𫝊諭阿里衮永貴等與黄廷桂㑹商辦理辛巳靖逆將軍雅爾哈善等疏奏勦殺應援庫車賊衆雅爾哈善等奏言臣等圍困庫車城派兵防範要隘據伯克鄂對告稱城東面安設臺站之雅哈托和鼐有地名托木羅克可通賽里木拜城亦宜防範臣等即派藍翎侍衛達克塔納領綠旗兵一百八十名前往六月十五日據報托木羅克有賊人踪跡帶兵往迎見嘛尼纛一桿賊衆五六十名後面又有兩大隊誘至雅哈托和鼐賊止不行見我兵甚少遣四五百人兩路来攻我兵緩行相誘體察賊衆不及三千人在戈壁前溝邊住歇臣等即派兵二千四百名令順徳訥愛隆阿端濟布衮楚克朗衮扎卜五福帶領侍衛官員等前往次日黎眀排列隊伍綠旗回兵居中滿洲索倫䝉古兵分為兩翼往迎已刻賊望見我兵即據溝邊髙阜排列彼此施放鳥鎗賊正欲衝我兩翼我兵四面呼噪發矢放鎗合圍攻擊賊衆大亂擁聚溝中惟以鎗刀格鬭我兵奮勇擊射自午至未盡行勦殺僅逃脱一二十人俱已帶傷計勦賊二千餘人亦有厄魯特在内我兵陣亡者數人得傷者亦少獲馬千餘匹殺傷者亦千餘匹駝百餘隻鳥鎗千餘桿似礟鳥鎗二十桿又帶鞍馬二匹詢問俘獲人口供稱係領兵伯克阿卜都哈里克等之馬又據供聞得霍集占由沙雅爾路來援沙勒達朗一路亦有前来者因大營滿洲索倫兵少順徳訥等即收兵回營防範初九日據坐臺人等告稱距沙雅爾五六十里有行塵火光等語臣等即派兵往鄂根河偵探所有奮勉勦賊官兵俟辦過沙雅爾来援之賊再行查奏又擒獲受傷回人阿舒爾瑪特係伯克霍集斯屬人従前達瓦齊係其執送謹暫行看守以備詢問其餘賊即行正法奏入上諭軍機大臣曰據雅爾哈善等奏勦殺應援庫車賊衆二千餘人等語賊衆初次来援我兵即勦殺殆盡其鋒已挫諒葉爾羌喀什噶爾等處無難攻取官兵奮勉効力深屬可嘉雅爾哈善額敏和卓玉素富哈寧阿順徳訥愛隆阿各賞御用荷包鼻烟壺仍交部議叙端濟布衮楚克朗衮扎卜五福俱著議叙其奮勇勦賊及陣亡得傷官兵著查眀送部議叙議䘏伯克鄂對熟悉要隘豫籌防範著賞銀一百兩現在有攻克之回城即授為伯克藍翎侍衛達克塔納授為三等侍衛此次所勦殺賊衆因應援庫車而来其俘獲之人當遣往城下曉示令其絶望不知曽如此辦理否再據俘獲人等所供霍集占將有来援之信則葉爾羌喀什噶爾自可乘間襲取兆恵此時或候雅爾哈善信息兩路夾擊或仍回伊犂搜捕餘孽可𫝊諭今其詳悉奏聞命派健鋭營官兵前往西路軍營上諭軍機大臣曰著派健鋭營兵一千名前往西路軍營効力該營大臣務須加意挑選仍行文經過之直隸山西河南陜西甘肅等省照例備辦車馬諭大學士管陜甘總督黄廷桂辦理軍需事宜上諭軍機大臣曰甘省連年承辦軍需雖一絲一粟不以派累閭閻而起送兵丁轉輸糧餉多資民力急公趨事朕心時厪於懐今嵗得雨較遲更為軫念此時各屬曾否徧霑雨澤秋收不致甚歉從前未種之地曾補種雜糧否當此連年餽運之後繼以雨澤愆期米榖自必短少黄廷桂於拮据勞勩之後更宜曲為體恤現在派出京兵一千前往軍營朕意即令其裹帶四個月口糧以省甘肅購備之費是否簡便可行於邊民有益著𫝊諭黄廷桂籌酌具奏再前經降㫖令該督豫備來年征兵口糧如本省不敷則移咨開泰於四川購運務足二萬人一嵗之用並著速行㑹商妥協辦理辦理屯田侍郎永貴等疏奏新種地畝情形永貴等奏言臣等前奏本年屯田地方闢展烏魯木齊已經墾種喀喇和卓托克三哈喇沙爾尚在開墾今據各該管官員報稱喀喇和卓墾地八千七百畝托克三懇地五千三百畝哈喇沙爾墾地四千餘畝俱經種植臣等合併闢展所種一萬畝烏魯木齊所種八千畝共三萬六千八百餘畝較去年増墾七千三百餘畝所種禾苖先後長發臣等督率官兵盡力耕耘引水灌溉今秋可望豐收奏入報聞壬午諭吐魯番公素賚璊派兵廵查臺站上諭軍機大臣曰據屯田侍郎永貴等奏稱巴里坤解送軍營火藥鉛子等件行至庫爾勒臺站遇賊搶掠等語此等賊人或係沙喇斯瑪呼斯之馬哈沁今大兵進勦臺站闗係最要已諭巴里坤大臣派兵廵查吐魯番公素賚璊乃貝勒額敏和卓之子伊父感激朕恩在軍營奮勉効力伊必克承父志將軍雅爾哈善所設臺站距吐魯番不逺且聞搶掠之賊僅三十餘人可𫝊諭素賚璊即派所屬數十人来往廵查搜捕逸賊務期勦殺凈盡以清臺路大學士管陜甘總督黄廷桂疏奏豫備口糧牲隻等事宜黄廷桂奏言臣欽奉六月初九日諭㫖来年添派官兵先期購辦口糧查官兵二萬合之隨役餘丁約二萬五千餘人每名日給米八合三勺或炒白麵一觔計一年約需糧餉七萬六千石有竒須豫備十萬石方覺充裕現在撥運哈密倉糧六萬石祗足備巴里坤接濟軍需及本年軍營屯田臺站兵丁支用臣與司道等官籌議甘省河西糧石節經動撥河東各屬尚堪接濟謹酌於涼州寧夏蘭州鞏昌四府屬州縣内分撥米四萬石小麥四萬石青稞二萬石運赴肅州轉運出口以備来年二萬官兵之餉至甘省倉糧仍須撥補若資川省協濟則棧道險阻運費不貲應請於陜西近甘各屬採買京石未麥二十萬石以豐儲偫至羊隻一項本年前後購買共六萬隻於正月間解送出口風雪甚大疫癘𫝊染倒斃二萬四千隻有竒現在調取管解各員分别懲治臣謹捐買一萬二千隻賠補其半餘於購辦各州縣及差委各鎮營分賠解送以備兩路官兵凱旋口糧此時軍營口糧正須接濟又運送軍器農器均需駝隻来年派兵二萬加以屯田運糧必備駝一萬隻查山西歸化城直隸張家口外俱係産駝之處若山西辦駝六千直隸辦駝四千尚易集事又現在運補哈密倉糧及来年官兵口糧共十六萬石前次陜省買騾三千頭輓運日久恐有缺乏查山西河南二省商民騾頭甚為充裕若每省買騾一千五百頭似亦易辦伏祈訓示奏入報聞諭分購軍需駝騾上諭軍機大臣曰西路進兵需用駝隻已派出副都統阿蘭泰員外郎烏勒木濟齎銀前往西林郭勒等處購辦阿蘭泰等到彼即㑹同阿霸垓親王索諾木喇卜坦等揀選健駝三四千隻送往巴里坤索諾木喇卜坦従前承辦事件實心經理是以此次特加委任著停其前赴木蘭圍塲其購辦駝隻如何解送行走俟議定後再行𫝊諭又諭曰甘肅為軍需總運一切起送兵丁轉輸糧餉需用駝騾自難一時猝辦著𫝊諭方觀承於直隸辦駝四千隻塔永寧於山西辦駝三千隻呉士功於陜西辦駝一千隻并騾一千五百頭胡寳瑔於河南辦騾一千五百頭其各速為購覔務得口輕臕壯者於今年九月十月内趲解肅州以利軍行其所發官價若有未足不妨酌量加増仍一面辦理一面奏聞恩賞大學士管陜甘總督黄廷桂銀兩上諭軍機大臣曰甘省連年辦理軍需黄廷桂急公集事俱無貽悞今嵗春夏以来一切轉運糧餉復甚妥協勤勞懋著深慰朕懐著加恩再賞銀一萬兩於軍需正項錢糧内支取以示體恤議解送軍需駝隻軍機大臣奏言臣等遵㫖𫝊諭阿霸垓親王索諾木喇卜坦等購買駝隻查去年山西駝隻官價十八兩較市價不足䝉恩㫖按隻加増二兩此次應請每隻定價二十兩計駝四千隻給銀八萬兩七八月間似可購辦足數彼時雖有調往西路索倫兵可由阿濟必濟一路但送至巴里坤早巳水草枯涸恐致疲乏臣等酌議現在直隸山西陜西俱買駝解送應將西林郭勒駝隻就近送至殺虎口歸併山西駝隻内送往肅州則内地草豆甚便自可一體壯健於軍需有益如蒙俞允臣等行文山西廵撫及該親王遵照辦理奏入上従之軍營効力之厄魯特已圗根敦扎卜由巴里坤至京俱授為藍翎侍衛在上駟院行走賞給銀兩衣服如例癸未諭靖逆将軍雅爾哈善等以收獲口糧牲隻賞給兵丁上諭軍機大臣曰昨據雅爾哈善等奏稱勦殺由托木羅克来援賊衆獲馬千餘匹傷斃馬亦千餘匹駝百餘隻等語此次勦賊二千餘收獲馬駝甚多且賊衆自必裹帶口糧應為我有官兵奮勇勦賊自當均匀賞給以示鼓勵且可減内地轉運之勞何以未見奏及可𫝊諭雅爾哈善等留心辦理命釋回人莽噶里克之子白和卓授為三等侍衛賞衣一襲在上駟院行走甲申訓諭定邊将軍兆恵等查拏哈薩克錫喇上諭軍機大臣曰兆恵等接到節次諭㫖奏請停止前往回部俟招服布魯特事竣即分兵追擒哈薩克錫喇布庫察罕等語覽伊等奏摺富徳除被布庫察罕偽降逃脱外尚知自勵兆恵身為將軍於哈薩克錫喇等渠魁未能弋獲且初遇哈薩克人等已知哈薩克錫喇等所向即解送来京之特克勒徳克亦稱哈薩克錫喇投西哈薩克特栁克布庫察罕投北哈薩克汗巴巴兆恵豈竟不行詢問若伊等早抵哈薩克邊界索取何至逃脱乃此時尚稱或投入特克斯阿圭雅斯等處亦未可定欲分兵搜捕顯係掩飾前非希圗卸過且伊等奏報往往前後不符如兆恵由伊犂起程曾将運送糧餉退回後又云口糧缺乏不能回至伊犂今復云所存口糧尚敷十數日觀此情形則伊等惟圗草率結局耳再伊等領兵二千餘名請往回部朕尚慮其少今復分為三隊而富徳又取道布魯特境内愈為可慮現在䇿布登扎布由塔爾巴噶台前往哈薩克索取布庫察罕兆恵亦有布庫察罕為哈薩克之布喇鄂拓克人等所擒已解送阿布賚處之語想不久自當縛獻富徳索取哈薩克錫喇既由沙喇擘勒著策布登扎布帶兵往迎若賊果投特栁克恐不似阿布賚之已經歸附即時縛獻富徳惟酌量進兵查拏策布登扎布亦領兵䇿應以壯聲援再兆恵等前奏領兵已至布魯特不便復回朕又諭以若布魯特距回城較逺即間道襲取阿克蘇與雅爾哈善㑹合此時諒已奉到若業經遵照即毋庸復回總在酌量軍前形勢相機辦理仍將進兵情事作速奏聞訓飭㕘贊大臣阿桂追賊不力上諭軍機大臣曰阿桂奏稱詢問由逆賊舍楞處脱出之厄魯特鄂勒椿謂舍楞不能入俄羅斯将由哈薩克逃往土爾扈特或又不能達恐復回準噶爾藏匿必在輝巴朗經過一面派兵於彼處守候仍探取實信若已入哈薩克相距甚逺即帶兵索取候其擒送等語従前成衮扎布詢問鄂勒椿後即行奏聞朕因鄂勒椿過阿桂軍營曽給以口糧阿桂自應一面具奏一面領兵速追舍楞方可得真實信息乃成衮扎布又續奏舍楞入俄羅斯之信而阿桂始以鄂勒椿所告奏聞且稱舍楞若逃去已逺不能追及即在哈薩克邊界駐候擒送更屬錯繆阿桂初次領兵理應奮勉乃即如此觀望遲延甚屬不堪造就著𫝊㫖嚴行申飭平定準噶爾方略正編卷五十七
