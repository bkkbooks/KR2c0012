  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_150-1a, image: WYG0359/WYG0359-0648a.png}
body:
  text: 乾隆二十六年夏四月戊寅諭㕘贊大臣舒赫徳等酌增伊犂屯田回人事宜上諭軍機大臣曰阿桂奏稱葉爾羌喀什噶爾阿克蘓烏什等城有舊在伊犂耕種回人二三千名今聞開設屯田願來効力者甚多若添駐回人即可裁減綠旗兵丁但該伯克等或以錢粮缺額為詞惟停止協助之費并照𣲖出回人户口減其糧額則衆皆樂從等語所奏甚是伊犂再増回人千餘生齒更覺繁盛亦于伊等生計有益且裁減綠旗兵丁既省内地之力而回人田作亦較勝綠旗兵可將阿桂奏摺錄寄舒赫徳等閲看定議具奏命奬賞哈密貝勒玉素富等上諭軍機大臣曰永寧等奏稱遵㫖將安揷移往塔勒納沁屯田兵丁添蓋房間僱覔回人工作傳諭玉素富據稱情願𣲖伊所屬供役不敢領受工價等語玉素富年來甚屬奮勉此次急公趨事尤見悃誠深可嘉尚著加恩賞大縀四端大荷包一對小荷包二對至修造兵房回人即不領公價亦當加給口糧著永寧等從優酌辦命賞原任巡撫阿思哈三品頂帶往烏魯木齊辦事己卯命更換西路辦事大員上諭軍機大臣曰西路駐劄大員有辦事數年者應行更換著伊勒圖更換伊柱旌額理更換安泰阿思哈更換定長溫敏更換五吉鄂寳更換書山達桑阿更換納世通伊犂既有阿桂豐納亨伊勒圖至日伊柱即行來京安泰定長五吉書山納世通各有承辦事務著俟派往大員接辦一月交代明白後再行起程議瑪納斯等處屯田安臺事宜御前侍衛副都統安泰等奏言臣等酌議瑪納斯庫爾喀喇烏蘇晶河等處在伊犂烏魯木齊之間地可屯田應設立村堡三處以次經理來春先派兵五百名往瑪納斯以一百名起蓋倉厫房舍四百名屯田續派兵五百名往庫爾喀喇烏蘇即以瑪納斯餘糧辦給其晶河亦照此續辦再由烏魯木齊至伊犂道逺地廣若安設臺站以馬兵五百名往來巡查則外藩貿易人等觀瞻既肅於牲隻亦有禆益查烏魯木齊有索倫兵三百名來春辦理瑪納斯屯田時請先派索倫兵五十名同往分卡巡查奏入得㫖軍機大臣議奏尋議本年三月舒赫徳奏請派綠旗兵一千名於羅克倫以外瑪納斯等三處屯田今安泰等所奏相符應將派兵撥餉給與籽種農具等項令其通融酌辦再安泰等前有自伊犂至烏魯木齊安設二十四臺站之奏臣等因伊犂駐兵屯田事宜俱在阿克蘇辦理議未准行今瑪納斯等處既開設屯田則所奏現有索倫兵三百名應如何添派合為馬兵五百名徃來巡查其安臺處所毎臺用滿洲馬兵綠旗兵若干辦給馬匹牲隻俱交安泰等㑹同阿桂永貴酌辦奏入上從之辛巳命領隊大臣副都統公豐安往伊犂効力上諭軍機大臣曰舒赫徳等奏稱葉爾羌領隊大臣公豐安因有派往伊犂馬兵三百四十名懇請帶往効力若䝉俞允現在喀什噶爾有䕶軍統領徳爾素富虎俱係副都統職銜請簡一員領隊其派往伊犂綠旗兵一千名請照阿桂咨調交副將國柱帶領等語豐安既願在伊犂効力著照所請前往葉爾羌領隊員缺著徳爾素調補其派赴伊犂綠旗兵亦准令國柱帶領約束前往命以官墾餘田賞給吐魯番回人上諭軍機大臣曰舒赫徳奏稱吐魯番回人向無租賦自安西移駐以來借官糓一千石為籽種毎年交榖四千石因與官兵分種故榖石未能足額今官兵既經遷移請將吐魯番展闢等處屯田酌足留兵之用其餘賞給回人令將榖石照數交納等語昨據徳爾格奏將此項地畝賞給回人未將從前曾借官榖之處聲明朕以闢展等處屯田係官為開墾不便無故賞給著舒赫徳查辦今既查有應交糓石著加恩將闢展托克三喀喇和卓等處遷移兵丁閒曠地畝除酌留足用外餘俱賞給吐魯番回人耕種其數年來所缺官榖理應照數補還但恐有妨伊等生計亦著加恩豁免仍宣諭回人嗣後官榖四千石務宜如數交納不可似前虧缺俱著傳諭知之申諭叅贊大臣舒赫徳等安揷布魯特額穆爾比事宜上諭軍機大臣曰舒赫徳奏稱希克察克布魯特額穆爾比從霍罕來投恐霍罕額爾徳尼伯克有使人前來如但索伊所給額穆爾比回人即查出給還若額穆爾比在霍罕有為匪情事又經來文叙及似未便安揷辦理等語前據海明奏額穆爾比遣使歸誠朕即降旨嘉奬賞給頂翎令與散秩大臣阿奇木一處游牧以伊並非霍罕屬人不過因回部擾亂暫時依倚今西域蕩平俱為臣僕其在霍罕與來喀什噶爾相同額爾徳尼伯克果遣人索取即當以此曉示舒赫徳所奏其意蓋不欲如此辦理在準噶爾未亡時尚可藉口今視霍罕亦如準噶爾乎此特漢人恐啟邊釁之習氣由今觀之有何邊釁之可啟耶著傳諭舒赫徳等仍遵前旨將額穆爾比令與阿奇木一處游牧所領回人内果有霍罕所屬自當查核發還但不可聽一面之辭即行給付若額爾徳尼伯克遣使索取額穆爾比則諭以額爾徳尼伯克與額穆爾比俱屬輸誠内附並無分别如額爾徳尼伯克欲投來内地亦即加恩安揷俱著遵照辦理癸未諭陜甘總督楊應琚籌酌糧運事宜上諭軍機大臣曰楊應琚奏哈密巴里坤二處尚存糧七萬餘石可敷二千官兵暨過往員役六七年供支此外附近哈密屯田歲收糧數千石又可接濟至安西官兵向來止撥本色數百石現在各該縣倉糧充裕有備等語前諭該督等籌運糧石原為哈密巴里坤等處官兵接濟之計今既稱充裕即停運闢展等處餘糧亦無不可而該督復有嗣後各回部往來貿易寧使多為運貯之語又未免因前降諭㫖意存遷就朕辨理庶務惟以隨事制宜用歸實際為要初不拘執成見如果内地需糧接濟即當輓運屯田餘積若本不需用而必强符前説致糜運費又何如即留之本處不必官為經理之尤得乎楊應琚所奏安西折價一摺現令軍機大臣議奏此摺所奏亦未甚明晰著一併傳諭該督知之甲申定効力贖罪大臣歲支養亷之例上諭軍機大臣曰西路辦事大臣議給養亷原俾伊等公私寛裕至獲罪發往効力人員並無支給之例伹伊等既駐劄辦事仍帶大臣品級著加恩將所定養亷等項減半支給此次鄂寳阿思哈應得各項即遵照辦理著為令議派回部各城官兵移駐伊犂事宜參贊大臣舒赫徳等奏言臣等欽奉諭㫖酌將葉爾羌等城官兵移駐伊犂本年已派阿克蘇等處馬兵一百五十名綠旗兵四百名前往俟麥收後將葉爾羌等城馬兵移駐三百四十名以足一千五百之額來年再于各城選派綠旗兵一千名前往其各城仍應留兵以資防守查葉爾羌馬兵六百八十七名酌派官四員兵一百八十名喀什噶爾兵五百名酌派官二員兵一百名英噶薩爾兵一百六十名酌派官一員兵六十名通計派出滿洲兵四十名索倫兵一百名察哈爾兵二百名前往伊犂其阿克蘇馬兵三百名厄魯特兵四十三名僅足差遣毋庸派撥又查綠旗兵丁葉爾羌九百四十名喀什噶爾八百四十一名俱酌留六百名英噶薩爾三百八十六名和闐三百名俱酌留二百名餘兵八百六十七名尚不足兵一百三十三名酌將烏什兵二百五十名派出一百名庫車兵三百名派出三十三名發往伊犂其阿克蘇綠旗兵六百餘名賽里木拜一百五十餘名毋庸派撥其馬兵騎䭾牲隻之例官給馬三匹駝一隻兩兵合給馬三匹三兵合給駝一隻至葉爾羌等處補額馬匹請將巴里坤送馬二千匹調撥一千匹前往又續調之綠旗兵所需軍裝䭾載請于各城餘糧内購辦并雇覔協濟其行糧既有臺站預備仍酌給羊隻自可不需裹帶奏入得旨軍機大臣議奏尋議葉爾羌等城回人自歸附以來尚屬守分安生無需多兵駐劄應就近調往伊犂今舒赫徳欽遵諭旨酌量抽調所有撥給馬駝調取補額馬匹等事俱應如所奏辦理惟原議調往綠旗兵一千名近據阿桂奏請若多調回人一千即可減綠旗兵之額現交舒赫徳等酌議仍俟議奏到日請旨奏入上從之丙戌諭陜甘總督楊應琚確核應賠倒斃羊隻上諭軍機大臣曰據永寧等查奏千總張文學等解送羊隻倒斃情由一摺前據楊應琚奏稱此項倒斃羊隻因永寧淑寳未曾截留牧放應著落賠補朕即謂所送羊隻四萬俱已前行僅剰千餘隻即不令留牧亦未為過今據查奏張文學等不知道路將羊驅往鹻地牧放以致生癩倒斃則理應著落解員賠補伊等俱係楊應琚等派出之員當令何人賠補作何治罪之處著楊應琚核明定議具奏戊子諭㕘贊大臣舒赫徳等酌籌撥用各城餘糧事宜上諭軍機大臣曰據書山等奏庫車沙雅爾毎年交納官糧及官借籽種所收糧數共三千一百四十餘石除支給官兵口糧飼秣臺站馬駝外尚餘一千餘石以備接濟往來官兵之用等語庫車既有餘糧諒各城亦自不少雖有往來官兵亦未必需用如許與其存貯虚耗或酌量減價折給官兵鹽菜銀兩既于伊等日用有益而官糧亦不致陳積朕意伊犂回部各駐劄大臣俱當照此辦理若該處情形不便亦即據實陳奏著傳諭舒赫徳通籌各處情形是否可行酌議具奏庚寅申諭陜甘總督楊應琚再籌闢展糧運事宜上諭軍機大臣曰楊應琚請停運闢展等處餘糧一事並未計及哈密巴里坤等處官兵口食及將來接濟之法僅援引安西駐防一處折價運費較短絜長辦理全未中窽軍機大臣已經議駁今又據納世通奏哈喇沙爾一年収獲米榖九千餘石除支用外可餘四千餘石請照烏魯木齊例僱覔回空商駝運送巴里坤等語是裒屯田之糧節内地之費實為一舉兩得而楊應琚所奏則授綠旗兵折價二兩二錢之例欲議概行停運試問哈密等處辦事大臣官兵豈可盡照綠旗兵例專給折色乎將來安西官兵移駐巴里坤若從内地裹帶前往此二兩二錢之數是否半本半折抑係全給折價并合之借給購辦孳生牲隻毎石合價若干且向據地方官奏報糧價肅州安西等處毎石不下五六兩有竒今折給之數不及三之一此數年來官兵等但恃此不足糴食之折價亦豈能支此處朕殊不解且與其令伊等向内地糴買拮据何若就便於闢展等處轉運之為得乎楊應琚所奏全未明晰著再行傳諭令其詳悉確核具奏辛夘議鑄給新疆印記事宜㕘贊大臣舒赫徳等奏言回部新定辦理一切事務文移俱宜鈐用印記查阿克蘇葉爾羌喀什噶爾業䝉賞給欽差大臣關防其闢展哈喇沙爾庫車烏什和闐英噶薩爾六處請交該部鑄給印記以昭體制而杜弊端奏入得旨軍機大臣議奏尋議鑄給印記用昭信守實為新疆要務臣等近奉諭旨鑄給新疆駐劄大臣印信用清漢篆文及回字謹酌議鑄給辦理伊犂等處事務大臣之印一顆其烏魯木齊葉爾羌喀什噶爾阿克蘇同辦理闢展等處事務圖記一顆其哈喇沙爾庫車烏什和闐英噶薩爾同共計印五顆圖記六顆所有印信圖記大小分數交該部照例酌辦俟鑄成給發後將現在所用關防因便恭繳如各城有自刻鈐記俱行銷毁謹擬冩各印記三様字體恭呈御覽奏入上從之壬辰諭闢展辦事郎中德爾格停運屯田餘糧上諭軍機大臣曰據徳爾格奏僱覔回空商駝運送米麫六百餘石至巴里坤等語前因徳爾格籌運闢展餘糧經軍機大臣議比較肅州運費節省三分之二是以行文交辦嗣據楊應琚奏哈密巴里坤糧石充裕又經行文停止著傳諭徳爾格嗣後不必運送遵照續降諭旨減價扣抵官兵鹽菜銀兩其或不便亦即據實具奏諭參贊大臣阿桂等辦理伊犂回人事宜上諭軍機大臣曰據阿桂奏䕶送伊犂屯田回人之阿克蘇回人頗拉特等事竣後行至濟爾哈朗河脱逃已行文嚴緝但準噶爾舊例伊犂逃出回人嚴挐治罪回人逃來伊犂即行安揷若頗拉特係仍至伊犂可否照舊辦理等語伊犂既向有此例著照前辦理但此内有從回地犯罪逃來伊犂者仍當究明嚴懲不可姑息容留并傳諭舒赫徳等知之乙未㕘贊大臣舒赫徳疏奏葉爾羌等城應辦事宜舒赫徳奏言葉爾羌喀什噶爾為回部大城外藩要路兩城之間有英噶薩爾城距㧞達克山隘口甚近布魯特散秩大臣阿奇木及阿奇木伯克素勒坦和卓俱能熟悉外藩情形其葉爾羌所屬沙爾呼勒附近之布魯特等俱係阿竒木舊管兩城聲息相通不可自分畛域尋常該管事宜猶可自行辦理再為知㑹其闗係外藩事務或委員或移文宜會同商酌至事體較重則兩城大臣應㑹於英噶薩爾虛𠂻商確再喀什噶爾與布魯特接壤而冲噶巴什希卜察克二部落尤為切近嗣後當欽遵聖諭有似阿瓦勒比之守分効力者加以奬勸有似烏黙爾比之盗竊為匪者加以懲創庶賞罰嚴明人知懐畏又如外藩貿易一事既有裨回人生計兼可得各處信息惟減免稅課禁止盗竊則來者益多而物價自平人心益附其阿克蘇烏什相近之布魯特頭目車里克齊明伊勒哈亦請給印文往喀什噶爾貿易應一體辦理現在車里克齊來見述及入覲時欽奉諭旨奬其歸誠最早戒以守分安生數年來敬謹遵奉其明伊勒哈年已七十情願入覲懇為代奏奏入報聞五月壬寅諭參贊大臣舒赫徳等停止續派屯田回人上諭軍機大臣曰舒赫徳奏稱阿桂咨送奏稿請派舊居伊犂回人一千户可減綠旗兵丁一千名查從前所派回人雖已陸續起程尚未完畢若再行增加恐不無勉强從事者轉啟新附人等猜疑請飭各城阿奇木等隨其所願不必定以年限等語所奏甚是昨據阿桂請添派回人朕意伊等既願來伊犂屯田自可省内地兵力命舒赫徳酌定今按奏内情形知回人等甫經安集不盡情願遷移阿桂亦未能深悉著將奏派回人停其前往仍令該伯克等查有願往屯田者隨時遣發其原派伊犂綠旗兵一千名仍照舊辦理戊申諭庫車辦事按察使納世通審訊阿卜都賚求索所部情節上諭軍機大臣曰阿桂奏稱哈喇沙爾派出屯田回人係總管阿卜都賚帶領前來今准納世通移文現被屬人首告隨派員押回該處併將阿卜都賚所具訴呈譯奏等語阿卜都賚係玉古爾總管阿奇木其有無勒索情弊自當秉公究審倘係所屬誣告亦應嚴行治罪以遏刁風若所告屬實則阿卜都賚係庫車回人不便留於本處酌量發往葉爾羌阿克蘇等處安置併將所訴呈詞錄寄以便質詢己酉定邊左副將軍成衮扎布等疏奏解送伊犂牲隻起程成衮扎布等奏言臣等前奏解送伊犂駝一千隻牛三千隻羊二萬隻欽奉諭旨即派貝子品級公額爾克沙喇公扎木禪等挑選牧羣及喀爾喀游牧賠補牲隻照奏定數目於四月二十八日起程由阿爾台等處擇水草之地過夏緩行前往復將烏里雅蘇台所貯各色布五萬六千匹茶葉四萬四千觔駝屉八百副酌量馱載并將原價知會伊犂駐劄大臣查原派解送牲隻官兵三百八名續因照管什物添派喀爾喀兵一百名前往奏入得旨派出各官兵著一體照例賞給癸丑葉爾羌辦事都統新柱等疏奏添建兵房事宜新柱等奏言查大兵凱旋後所留葉爾羌之滿洲索倫綠旗兵丁除看守城垣倉庫及辦事處差遣兵役外餘俱於城外駐劄後因帳房日乆損壞分居城内逃走囘人房屋遇有差務一時不能齊集今年派兵移駐伊犁其數愈減臣等酌議現在辦事公署大門内地面寛濶可以添建房舍請於附近山林伐木造筏由河水順流放至城下以備物料其工役交總兵定柱糧餉同知圖桑阿等承辦奏入報聞甲寅諭㕘贊大臣舒赫徳查辦羅卜淖爾等處回人事宜上諭軍機大臣曰舒赫徳奏稱從前阿里衮收服羅卜淖爾回人千餘户及安揷闢展附近之沙呼里回人百餘户又莽噶里克所屬回人均請交與徳爾格選派幹員帶領吐魯番回人二名前往查辦等語徳爾格甫經任事恐未能諳悉情形著舒赫徳仍于歸途之便前往辦理即此時徳爾格已經起程辦有端緒舒赫徳仍須再加查核妥議具奏己未諭烏魯木齊辦事御前侍衛副都統安㤗等辦理傷害哈薩克之嗎哈沁事宜上諭軍機大臣曰安泰奏據貿易哈薩克頭目禀稱上年伊等部落二十人行圍遇嗎哈沁百餘人被害又烏魯木齊貿易三次内有一次來人歸途亦曾被害伊等欲率衆追捕阿布賚云此等恐係内地逃人當順便請示隨告以内地並無逃人爾等所遇即宜勦捕等語阿布賚情詞甚屬恭順嗣後伊等若再及此事仍行明白曉示令其隨遇即行𠞰捕若擒獲即解送駐劄大臣處質審再伊等頭目云曾告知烏里雅蘇台官員布達勒但成衮扎布未經具奏併傳諭令其附便奏聞壬戌諭參贊大臣舒赫徳通查駐劄臺站兵馬錢糧及應需駝隻上諭軍機大臣曰現在烏魯木齊至伊犂烏里雅蘇台至烏魯木齊及回部所有臺站俱經酌量遷移設立其官兵馬匹牲隻歲需錢糧若干較之從前有無減省仍合之伊犂等處所駐兵丁共需錢糧若干較之哈密巴里坤安西駐兵防邊之時孰多孰少著傳諭舒赫徳于歸途之便親行查核其各路亦俱行査彚奏俟伊到京時與軍機大臣等㑹核具奏再據五吉等奏報採買駝隻數目今新疆所用駝隻不過運送什物且成衮扎布又辦駝千餘隻解送伊犂牧放孳息自屬有餘併著舒赫徳查核各項駝隻足用與否若不須採買即行文巴里坤烏魯木齊哈密辦事大臣等停其辦理甲子命查辦西路保題綠旗官弁與内地一體陞用上諭大學士曰此次西路隨將軍等出兵之綠旗將弁其中有奮勉効力保列一等者自應與内地保薦人員一體陞擢以示鼓勵今將軍等俱已回京而將弁等或留駐新疆或撤回内地難以分别遴選所有現在葉爾羌等處副將㕘將逰擊都司守備等官著交與駐劄各該處大臣將列入一等人員按其原定考語逐一查核送部引見如已撤回内地營伍交與該督楊應琚亦照此查辦候朕酌量簡用丙寅諭㕘贊大臣阿桂擒解逆賊塞卜騰上諭軍機大臣曰阿桂奏稱搜捕嗎哈沁之叅將素尼勒圖侍衛烏魯木等至巴柴河之素魯圖伯勒齊爾挐獲嗎哈沁博卓壘等十三人據供在阿勒坦特卜什隨頭目塞卜騰居住查塞卜騰若果係戕害徳舒之賊甚關𦂳要即令伊柱領兵一百三十名前往搜捕至博卓壘並未拒捕且係烏魯木舊屬請免其正法酌量歸併安插等語阿桂聞塞卜騰藏匿處所即派兵往捕所辦甚是烏魯木亦屬奮勉著加恩授為頭等侍衛仍傳諭阿桂若能擒獲塞卜騰即嚴拏解京博卓壘等俱照例安插㕘贊大臣舒赫徳等疏奏査辦波羅泥都藏匿子嗣情形舒赫徳等奏言臣等風聞波羅泥都逃入㧞達克山時曾將㓜子三人擕往今據素勒坦和卓贖回之葉爾羌回人台里卜和卓密告臣額敏和卓云波羅泥都三子一名和卓阿什木一名阿卜都哈里克一名和卓巴哈敦現在㧞達克山居住所有照管養育之人俱甚窮苦且慮傷害臣等詳議若向素勒坦沙索取恐伊藉端居竒正在籌議間適奉到養育薩木薩克之恩旨臣額敏和卓即密傳台里卜和卓詢得實情隨飭親信屬人什丕同葉爾羌伯徳爾格回人數名前往因貿易之便通知養育波囉泥都三子之回人等宣示聖恩令其帶領來投再經過霍罕部落之要隘亦行文該處阿哈拉克齊密爾莽蘇爾令其照管前來一切俱以臣額敏和卓之意為詞其台里卜和卓等俱酌加奬許令其相機辦理奏入報聞平定準噶爾方畧續編卷十一
