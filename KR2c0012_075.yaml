body:
  text: 乾隆二十年冬十一月庚午朔諭定西將軍扎拉豐阿等擒賊事宜上諭軍機大臣曰阿睦爾撒納人甚奸詐此際或遣人前來或力窮詐降俱未可定如遣人前來即行擒獲或有所奏俟解到時訊問即伊自知罪譴恐懼來降亦斷不可信務將伊拏問解送京師以彰國法將此傳諭扎拉豐阿等知之諭定邊左副將軍哈達哈等駐兵防範事宜上諭軍機大臣曰哈達哈等奏據喀喇巴圖魯阿玉錫禀稱現屆天寒不宜進兵衆厄魯特等惟冀徼倖成功不可全信等語此語尚合機宜朕前命達爾黨阿帶兵前往西路北路無庸進兵惟令哈達哈雅爾哈善領兵防守或派兵數百名捉生探信相機辧理著仍遵前㫖行再烏梁海宰桑鄂木布博郭勒遣孟克什來報阿睦爾撒納宰桑尼瑪遣人至鄂木布等處告以阿逆現在領兵侵擾䝉古令其出兵協助等語量阿睦爾撒納斷無此等餘力但既有此言亦不可不豫為防範又此等烏梁海係新降之人心懐叵測首䑕兩端尤宜加意密防今既來報信即當加恩奬勵著賞宰桑鄂木布博郭勒緞疋銀兩所遣之人亦著酌量賞給其擒獲葉克明安台吉察衮屬人阿穆呼朗到日即派員解送來京餘俱照所奏正法其妻子賞給喀爾喀等為奴恩賞前往阿克蘇城宰桑兵丁銀兩上諭軍機大臣曰厄魯特公納噶查侍衛官長保等帶領額敏和卓回人及達什達瓦兵丁前往阿克蘇城額敏和卓回人甫回自伊犁達什達瓦兵丁亦従游牧初到今復派往阿克蘇城雖非進兵可比但係逺行著加恩於應得口糧外宰桑每員給銀二十兩兵丁每名給銀十兩令其寛裕整裝並著和起曉諭額敏和卓及達什達瓦之妻務揀選諳練宰桑管轄兵丁妥協前往命封額敏和卓為鎮國公上諭軍機大臣曰前額敏和卓帶領回兵直抵伊犂甚屬奮勉今復派伊所屬兵丁前赴阿克蘇城著加恩封額敏和卓為鎮國公以示奬勵辛未命貝勒塞卜騰為北路㕘贊大臣上諭軍機大臣曰都爾伯特王貝勒等前經領兵前赴伊犂是以令伊等回至游牧暫息現在擒拏阿睦爾撒納亦未派往今烏里雅蘇台無通曉厄魯特情形之人貝勒塞卜騰前在㕘贊大臣上行走甚屬奮勉著派伊屬下兵丁或百名或五十名仍授為㕘贊大臣前赴烏里雅蘇台協同哈達哈等辦理一應事務應給俸餉及兵丁口糧已降㫖哈達哈等辦理如欲將户口一併帶往即准其帶往仍賞銀三百兩令其整裝又諭曰汗哈屯烏梁海等報稱阿睦爾撒納誘伊等同來侵擾蒙古明係揚言以聳聽聞然或揣度西路進兵北路無備前來滋擾亦未可定宜先時設備使叛賊不得逞其詭計哈達哈等現領兵三千名此外烏里雅蘇台兵丁甚多米糧亦甚豐裕著合為一萬分駐烏里雅蘇台軍營及哈達哈等所據形勝之處以為聲援第以預備進兵為言不必宣露防禦阿逆前來之意使賊聞風退避再都爾伯特貝勒塞卜騰與阿睦爾撒納有讎前在軍營行走頗著勞績仍命為㕘贊大臣前往北路軍營協辦事務一應事宜哈達哈等與伊公同商議奏摺内一體列名至添兵豫備之處未經諭塞卜騰知悉哈達哈等亦不必轉諭此非疑伊恐其屬人漏洩於事無益著密諭哈達哈等知之㕘贊大臣玉保疏奏領兵由巴里坤起程日期玉保奏言臣帶領噶爾藏多爾濟沙克都爾曼濟之宰桑車木布等於十月二十日至巴里坤軍營即帶索倫察哈爾兵丁五百名於二十二日自巴里坤起程前往額林哈畢爾噶㑹同進𠞰奏入報聞壬申定議調遣羅卜藏多爾濟兵丁事宜軍機大臣等奏言厄魯特貝勒羅卜藏多爾濟願派兵五百名前往巴里坤聽候調遣臣等查西路軍營現在各路兵丁共計八千名所需馬匹俱已籌辦此項羅卜藏多爾濟兵丁五百名馬匹尚未籌及若即發往巴里坤徒致守候若俟需用之時由將軍等奏到後再行調遣已屬遲悞臣等議令羅卜藏多爾濟即回游牧選兵五百名豫備調遣仍行文扎拉豐阿等如需用羅卜藏多爾濟兵丁調遣即先將各處送到馬匹通盤核算足供乘騎即知會羅卜藏多爾濟緩行先赴巴里坤俟至巴里坤日羅卜藏多爾濟賞銀三百兩兵丁各賞銀十兩令其整裝前進奏入上從之癸酉命策楞為定西將軍扎拉豐阿為定邊右副將軍達爾黨阿為㕘贊大臣籌辦進兵伊犂事宜上諭軍機大臣曰據策楞奏稱喀爾喀貝勒車木楚克扎布台吉唐古忒宰桑鄂爾竒木濟將叛逆宰桑敦多克曼集鄂拓克之得木齊沙喇勒岱等五得秦游牧𠞰滅扎那噶爾布諾爾布林沁又將布庫努特三得秦游牧盡行殺戮等語此次辦理俱甚妥協現在領兵前進務期擒拏阿巴噶斯哈丹等解京治罪並將伊游牧𠞰滅以振軍威此時兵力甚盛策楞即㑹同諾爾布林沁扎那噶爾布唐古忒等進取伊犂如阿陸爾撒納已據伊犂恐兵力不足仍遵前㫖俟噶爾藏多爾濟等到時整頓大兵同進斷不可冒昧輕試至唐古忒自伊犂力戰而出理應加恩恐衆人不知妄思恩澤著策楞派侍衛一員至伊游牧傳諭加恩即従巴里坤支銀一千兩賞給所有𠞰滅布庫努特之受傷人員並著策楞酌賞以示鼓勵仍咨部議叙侍衛滿楚所禀豫報阿睦爾撒納謀叛之伊犂回人策楞到彼即查明賞賚策楞自知前譴奮往從事悉協機宜額林哈畢爾噶等處共知其為將軍不便更替著即授為内大臣兼定西將軍扎拉豐阿著授為定邊右副將軍即將達爾黨阿帶往之印給與掌管駐劄額林哈畢爾噶辦理軍務達爾黨阿著授為㕘贊大臣同伊辦事玉保隨將軍策楞帶兵前進伊等同心協力擒𠞰逆賊捜捕黨羽總期於事有濟共奏膚功無將軍㕘贊之分策楞等其仰體朕意以副委任策楞著加恩賞銀一千兩伊子特通額已施恩免罪授為三等侍衛並著隨往軍前効力命安撫達什達瓦游牧人衆上諭軍機大臣曰據策楞奏達什達瓦之妻遣宰桑薩喇爾族弟哈栁侍衛滿楚等告稱自伊犂前來兩次遇敵衝突率領屬人來歸等語達什達瓦之妻深知大義率領屬下棄賊來歸深屬可嘉昨已遣副都統鄂實傳㫖將達什達瓦之妻賞給名號並賜以銀兩緞疋著和起仍照前㫖辦理并令在巴里坤附近過冬俟明年向阿爾台地方遷移居住侍衛滿楚奮身脱出著授為二等侍衛宰桑哈柳䕶送薩喇爾之子玉魯斯前來亦著加恩授為藍翎侍衛仍照哈柳所請明年前往薩喇爾游牧察哈爾地方居住命免治和托輝特郡王青滚雜卜罪上諭軍機大臣曰前因阿睦爾撒納宰桑阿穆爾濟爾噶爾告稱班第薩喇爾㕘奏阿睦爾撒納之時清滚雜卜私告阿睦爾撒納以致潛逃朕因降㫖挐問令其質對今阿穆爾濟爾噶爾已經正法無從質對即青滚雜卜果有此事亦不過一時愚昧伊因與阿逆同在一處恐一併㕘處私相告語初不料阿睦爾撒納之奸惡至於此極也即如色布騰巴爾珠爾信阿睦爾撒納之言代為陳奏色布騰巴爾珠爾豈有附逆之事此皆伊等不知事體受其愚弄耳青滚雜卜自去年領兵以來甚屬奮勉從前罪愆著加恩寛免伊能感戴朕恩勿稍疑懼益加奮勉朕尚將施恩封為親王此際如已拏問即傳㫖釋放如未拏問即可無庸辦理將此傳諭哈達哈知之甲戌申諭㕘贊大臣達爾黨阿等分路進𠞰事宜上諭軍機大臣曰據哈達哈等奏各隊兵丁於緊要隘口駐劄伊等於布延圖地方過冬俟明年草萌之時㑹兵額爾齊斯併力進𠞰等語哈達哈所奏尚是但由北路進兵路較逺而部落亦少由額林哈畢爾噶進兵路途既近且經由噶爾藏多爾濟等各部落諸事可以策應是以此次進兵専賴西路北路不過遙為聲援哈達哈等應遵朕屢次所降諭㫖即令達爾黨阿領兵由西路前進哈達哈等於北路形勝處駐劄收養馬匹壯軍威而分賊勢仍將厄魯特烏梁海等游牧防守以禦逆賊乘虛擾亂如阿睦爾撒納掩襲前來則以逸待勞擒獲甚易現在達爾黨阿帶往兵一千名北路止留兵七千餘名如不足用即著哈達哈於喀爾喀兵丁内就近調取再汗哈屯烏梁海等係新附之人若如所奏於伊等地方採買馬匹或生疑懼郡王青滚雜卜深知伊等情形可否採買之處著㑹同酌量商辦如有不便即行停止命籌辦西路軍營口糧上諭軍機大臣曰此次進兵伊犂俱由西路進發策楞等攜帶口糧不甚充裕進兵後不惟路逺難於轉運且沿途亦須防䕶現在準噶爾地方擾亂互相刼奪若令伊等自行搶掠則敵勢轉盛一時難以𠞰滅官兵前進之時必須因糧於敵以壯兵力則賊勢空虚不難即破而大兵亦可藉飽騰倘尚不足或於厄魯特等及噶爾藏多爾濟等部落内將口糧牲隻暫為支用事定後運内地緞疋茶葉照價還給策楞等相度機宜妥協辦理命授從征台吉宰桑等官爵上諭軍機大臣曰厄爾錐音哈薩克錫喇尼瑪吞圖布恩克博羅特等已俱命前往西路軍營聽候調遣厄爾錐音哈薩克錫喇著授為㕘贊大臣尼瑪授為内大臣兼圖什墨勒仍授為㕘贊大臣吞圖布恩克博羅特俱著在領隊大臣上行走策楞進兵之時扎拉豐阿達爾黨阿在額林哈畢爾噶駐劄辦理軍務尼瑪著即在扎拉豐阿處管理臺站稽察奸細遇奏事時㕘贊大臣等俱著一體列名命曉諭諾爾布林沁等擒賊事宜上諭軍機大臣曰據策楞奏稱諾爾布林沁派出兵二千名合之現在帶往兵丁共計四千足以𠞰滅阿巴噶斯哈丹等但聞阿巴噶斯等遷往伊犂現派索倫兵丁前行哨探大兵暫住烏魯木齊候信辦理等語阿巴噶斯哈丹聞我兵前進而台吉諾爾布林沁又帶兵㑹合聞風逺遁遷往伊犂情形屬實然伊等帶領户口勢必不能遄行若由徑路發兵堵截必易擒獲倘至伊犂後賊勢㑹聚轉來抗拒亦未可定應曉諭諾爾布林沁等阿巴噶斯哈丹雖畏威逺去略得安息即將窺竊汝等游牧須及時𠞰滅以杜後患如已入伊犂毋庸過急俟噶爾藏多爾濟等到時㑹同前進方為妥協再策楞駐兵烏魯木齊與回人游牧相近或賊人暗生奸計誘令回人等不行换給官兵口糧或借换給口糧之時乘間擾亂策楞應密行防範至諾爾布林沁等宰桑台吉感恩奮勉派兵隨征每兵著賞銀三兩以示鼓勵乙亥申諭西路速行進兵上諭軍機大臣曰據達爾黨阿哈達哈等奏稱聞西路大兵一切俱已整備於明嵗草萌時再行進發等語此奏甚屬錯誤昨命達爾黨阿領兵前往西路哈達哈留於北路駐劄因北路地勢空曠俱無游牧不若西路之便隨時可以進兵屢經明白傳諭計達爾黨阿領兵至西路時噶爾藏多爾濟等亦陸續可到一切㑹同商酌速奏膚功方合機宜現在冬令進兵較難人人所知即爾等亦不無所見然愈遲緩則賊黨愈固賊力愈强辦理更費周章所謂兵貴神速者此也以冬令進兵為難將軍大臣尚因此退縮何以鼓士氣而振戎行即如台吉沙克都爾曼濟宰桑厄爾錐音等伊部落與伊犂密邇今伊犂信息未通伊等尚奮往前進若噶爾藏多爾濟之部落業已保䕶一聞此言勢必退後又將何以集事此時惟馬匹亟宜籌畫策楞扎拉豐阿玉保等即仿照木蘭行圍時向蒙古换馬之法通融辦理以疲乏馬匹换易肥壯馬匹酌量給以緞疋銀兩此項疲乏之馬善為牧放轉瞬即成臕壯是不但無損於彼而且大有禆益噶爾藏多爾濟等部落馬匹照此交易諒無不欣然樂從且今嵗春間進兵阿睦爾撒納屢次陳奏以迅速為善瑪木特亦以為然倘我兵緩行前進真不出叛賊所料而賊愈得以逞其負固抗拒之力矣明嵗進兵之言西路軍營諸臣並未陳奏達爾黨阿等所奏因北路已停止進兵朕是以不行深究若達爾黨阿至西路時亦出此言必至搖惑軍心所關匪細斷不姑貸現在沙克都爾曼濟厄爾錐音等已至西路如何商議進兵之處策楞等速行奏聞命奬賞各台吉宰桑等上諭軍機大臣曰據策楞等奏諾爾布林沁附近游牧等處查出喀爾喀二百三十餘人各台吉宰桑等情愿資給口糧送回原處等語衆台吉宰桑等輸成効順將衆鄂拓克所有之喀爾喀查出給與口糧回至原處辦理甚屬可嘉著策楞酌量將緞疋茶葉賞給以示鼓勵再唐古忒查出辦理臺站之察哈爾喀爾喀人等即照策楞所奏仍令辦理臺站唐古忒亦著奬賞定西將軍策楞疏奏設立臺站事宜策楞奏言臣與衆台吉等商定安設臺站之事自烏蘭烏蘇至烏魯木齊俱照各鄂拓克分派每臺設兵丁十名厄魯特兵十名傳遞事件自烏魯木齊以外如遇無游牧處即將伊等帶往兵丁存留安設并將坐臺人等每月給銀二兩恩㫖宣諭衆皆感悦再查此處臺站經將軍班第等派出喀爾喀貝子羅卜藏車凌副都統職銜阿敏道散秩大臣敦多克協理台吉固穆扎卜得木齊達什扎卜等管理今惟固穆扎卜達什扎卜二員臣令諾爾布林深另派大台吉一員同固穆扎卜達什扎卜管理奏入報聞丁丑申諭定西將軍策楞進兵𠞰賊事宜上諭軍機大臣曰據策楞奏稱布魯古特台吉諾海奇濟克呼爾璊台吉薩喇爾自伊犂前來告稱阿睦爾撒納未至伊犂彼地欲内附者甚衆等語看來與阿逆黨惡者不過阿巴噶斯哈丹烏勒木濟敦多克曼集約蘇圖克什木圖布慎錫克錫爾格巴蘇泰等數人即阿逆亦自知伊犂衆心離散疑懼未往若於叛賊未至之前速行進兵衆必迎降策楞此時想已將阿巴噶斯哈丹部落𠞰滅賊衆自必畏懼其馬匹牲隻分給兵衆以益兵力速即進兵即可平定噶爾藏多爾濟等陸續將到策楞俟其到時㑹合進兵直入伊犂固屬甚善但時不可失惟在相機辦理毋庸過於拘泥賊黨烏勒木濟等罪不容誅斷難寛貸即前來投降亦拏解來京治罪其户口人等盡行𠞰滅以示懲創惟伊犂附近有喇嘛六千餘人若一體辦理不但失衆蒙古之心其真偽亦無従區别策楞務加體察其實係聚衆黨惡者即行誅戮如係威逼相従量従寛免一切俱遵前㫖辦理諾海奇齊克薩喇爾自伊犂前來輸誠相告甚屬可嘉昨諾海奇齊克之弟琿齊薩喇爾之兄鄂勒椿弟洪郭爾等入覲時已施恩俱封為扎薩克台吉今特加恩封諾海奇齊克為公薩喇爾為扎薩克頭等台吉伊等果能奮勉効力朕必更加恩重賞著策楞傳諭伊等知之戊寅諭定邊左副將軍哈達哈等仍派侍衛徳善通使哈薩克上諭軍機大臣曰前自北路脱出之索倫跟役布顔圖供稱伊主遣往哈薩克現被擒拏看守等語當即傳諭達爾黨阿等訊問布顔圖確供具奏並令將遣往哈薩克之侍衛徳善等暫行停止今據策楞奏稱自伊犂前來之呼爾璊台吉薩喇爾告稱遣往哈薩克之侍衛達勇阿順徳訥帶領哈薩克使者同至伊犂哈薩克情願投順等語看來哈薩克阿布賚甚屬恭順並無可疑著哈達哈等傳諭徳善等仍遵前㫖前往哈薩克並將布顔圖從前所供果否實情審明具奏己卯命阿玉錫丹津等暫回游牧上諭軍機大臣曰前因北路進兵令丹津在哨探隊行走今已暫行停止丹津在軍前無事著遣回游牧令其休息伊游牧距軍營甚近有事即可調遣喀喇巴圖魯阿玉錫今年自軍營回來未得休息亦著遣回游牧俟有遣用時再行降㫖定議北路採買馬駝事宜㕘贊大臣達爾黨阿等奏言現在軍營兵丁除遣往西路外合計九千名再調喀爾喀兵一千名共為一萬令於正月内到營所有軍營馬匹二萬有餘駝三千餘隻脿分平常俱交於喀爾喀各部落牧放俟明春青草發生時選擇應用此外尚需馬一萬餘匹駝二三千隻擬向喀爾喀逺近各部落採買約於明年二三月内均可購齊並向新收烏梁海等換取馬駝應用以期無悮軍行奏入得㫖軍機大臣議奏尋議前因議定西路進兵是以令哈達哈等領兵一萬名駐劄北路遙為聲援北路雖非西路剋期進兵可比但馬駝至明年二三月間始到恐有遲悞現今西路將軍策楞等已經帶兵前進北路亦應先時預備如需㑹合即時起程原未指定明年進發應令哈達哈等於現存馬駝外就近酌撥無庸向喀爾喀四部落調取以致稽延時日至採買新收烏梁海等馬駝應用之處即遵前奉諭㫖商同郡王青滚雜卜妥協辦理奏入上從之侍郎納穆扎爾疏奏查獲阿睦爾撒納等游牧馬匹什物納穆扎爾奏言臣㑹同侍郎兆惠查得阿睦爾撒納班珠爾根敦扎卜等游牧内駝三百九十六隻馬一千八百五十三匹鳥鎗八十九桿撒袋三十九副弓四十一張腰刀二十口長鎗九桿鎖子甲一副俱交扎薩克遜都卜送交烏里雅蘇台軍營查收其餘什物俱交齊木庫爾宰桑等賞給又查得阿睦爾撒納銀一千六百兩班珠爾銀五十兩賞班珠爾之甘珠爾經一部佛三尊俱交與領催冲保解送京師奏入報聞庚辰派直隸各省大員稽查沿途軍營文報上諭軍機大臣曰軍營文報闗係𦂳要須特派大員督率稽查方無玩悞直隸著派永寧山西著派富尼漢陜西著派武忱甘肅著派明德各於所轄境地沿途來往督察如有稽延惟伊等是問命傳諭薩喇爾擒賊贖罪上諭軍機大臣曰前自伊犂脱出人等雖稱薩喇爾被錫克錫爾格擒獲但非親見適據策楞奏到諾海奇齊克等告稱並未見送往伊犂則薩喇爾果否被擒尚無實據但伊與將軍等同在伊犂辦事而惟伊脱逃或自覺無顔與策楞相見潛身逺避亦未可定策楞進兵後加意諮訪尋獲時即傳㫖曉諭伊係受恩深重之人雖以脱逃負罪然能帶兵擒獲阿逆即可自盖前愆已有㫖令其仍掌定邊右副將軍印一同進兵惟宜益加奮勉効力贖罪俟尋獲時策楞即速行奏聞命厄魯特公納噶查偵探阿逆信息上諭軍機大臣曰前慮阿逆逃竄或投入回人部落因派納噶查往阿克蘇城等處傳㫖擒拏今據諾海奇齊克等告稱阿逆尚在博羅塔拉地方居住著納噶查前至巴里坤偵探如阿逆未往伊犂而策楞已𠞰滅阿巴噶斯哈丹游牧由彼處直進伊犂堵截叛賊投回之路則納噶查不必前往回部即往策楞處協同辦事其侍衛哈清阿墨徳庫聽候策楞調遣官長保將彼處情形詳悉問明回京陳奏若策楞雖已𠞰滅阿巴噶斯等尚候噶爾藏多爾濟等未入伊犂而阿睦爾撒納已經住據納噶查等應仍往回部遵照前㫖辦理定議撥補馬匹事宜署陜甘總督方觀承等奏言甘省派調馬二萬匹除挑解軍營一萬三千餘匹及調撥各營外餘馬五千餘匹合陜省未到馬七千餘匹共一萬二千餘匹將脿分好者補足安西肅鎮甘提三標摘缺馬九千匹其脿欠者截補凉寧各營摘缺馬匹令加𦂳餧養期於適用滿漢各營摘缺未補者令其即行領銀購補奏入得㫖軍機大臣議奏尋議西路軍營現派官兵約計八千名所有馬匹除哈密解往之五千餘匹及甘省挑解之一萬三千餘匹合計一萬八千餘匹是否有贏無絀應令該署督速行咨詢軍營倘或不敷再行辦理至各營摘缺馬匹雖應按數補足而挑存之馬必須餧養遇有調遣方可應用况陜省未到馬七千匹未經騐挑臣等酌議除安肅甘三標營係近邊要地摘缺九千匹應先行補足餧養其凉寧各營道里稍逺所有餘馬無庸即行截補統留安西等處分槽飼秣以備緩急調撥之需至所奏滿漢各營摘缺未補者令領銀購補上𦂳飭辦則各營馬匹無缺而軍營馬匹愈充自應如所奏辦理奏入奉上諭曰現在調撥陜甘山西各鎮協標營馬匹陸續解赴軍營所有𦂳要之營伍驛站自應及時購補足數近據方觀承等奏稱各營摘缺之馬速令購補其已補若干未經奏明著該督撫將軍提鎮等將所屬營驛先後摘缺馬匹已經購補若干速即查明自行具奏嗣後著每月奏聞一次允達瓦齊致書台吉伯什阿噶什等協擒阿睦爾撒納軍機大臣奏言臣納延泰遵㫖傳諭達瓦齊據達瓦齊跪稱我係俘囚蒙聖主不加誅戮已屬格外隆恩又蒙賞賜衣服銀兩現在患病遣醫調治種種厚恩雖捐縻踵頂不足報効今聞阿睦爾撒納背恩逃竄苟有人心無不切齒况達瓦齊與伊有讐恨不能奮身擒獲彼處有都爾伯特台吉伯什阿噶什及庫本諾雅特台吉諾爾布等數人人尚能事不與叛賊為黨達瓦齊平日素知擬寄信伊等令其奮力擒拏阿睦爾撒納明正典刑庶足以彰國法而快人心並懇皇上降㫖於諾爾布等伊等自必感激効力懇求代為陳奏奏入報聞定邊右副將軍扎拉豐阿疏奏領兵由巴里坤前赴軍營壬午命廣州將軍錫特庫為駐防巴里坤都統馳驛來京請訓再赴新任定西將軍策楞疏奏遣副都統阿敏道前往哨探情形策楞奏言臣遵奉諭㫖令達什達瓦宰桑博羅特㑹同阿敏道先行進兵嗣因博羅特患病臣即向伊揀選識路之人同阿敏道前進令將克勒特烏魯特等奮力𠞰捕詳悉飭知阿敏道遵行外現因諾爾布林沁等游牧甫移未經安頓約臣於十一月初一日㑹齊若令阿敏道帶兵速進恐阿巴噶斯哈丹等驚駭逃避是以復行令阿敏道緩行前往俟諾爾布林沁到時再將伊兵丁揀選二百名趕赴阿敏道同進臣現已至烏蘭布拉克地方俟見諾爾布林沁後商同前進奏入報聞㕘贊大臣達爾黨阿疏奏領兵前往西路軍營癸未命封達瓦齊為親王上諭大學士曰前因準噶爾夷部數年以來簒奪頻仍所屬諸部率衆内嚮接踵而至朕為天下共主既不忍拒而不納將為之經理游牧即因其地處之為久長計而兩朝未竟之緒亦乘此事機一勞永逸此用兵之本意也至達瓦齊之立為台吉不過外夷自相簒竊原可不必聲罪致討従前所降諭㫖甚明但以達瓦齊進貢請安尚居然以噶爾丹策零自處是以降勅切責旋復遣使叩關情詞恭順則大軍已入其境未得至京將軍等取其書奏之及王師進取伊犂伊畏避逃竄亦情理所有是達瓦齊原無獲罪於天朝之處伊之殘酷暴虐亦皆出於阿睦爾撒納之口迨俘獲來京視之則一庸慤可憫之人耳且言乆思歸順特以阿睦爾撒納領兵前往實不便於其軍前納欵此其肝膈本懐非由飾説古者異國降王或優以封爵示無外也達瓦齊著加恩封為親王賜第京師奉朝請朕撫馭萬國一秉大公仁育義正惟聽人之自取可將此宣示達瓦齊并曉諭中外知之又諭曰朕已將達瓦齊宥罪施恩封為親王賜第京師帶領伊子居住伊舊日屬人著查出四五十户令其來京役使並著策楞曉諭台吉噶爾藏多爾濟等及準噶爾人衆從前進兵擒拏達瓦齊止因阿睦爾撒納愬其暴戾無狀凌虐準夷朕軫念羣生拯救水火是以聲罪致討今拏解來京乃一庸愚無用之人即伊種種虐行其初亦皆係阿睦爾撒納從中相助非伊一人之罪且達瓦齊原係綽羅斯台吉朕憐憫其愚備藩京邸斷不令回至游牧現在達瓦齊感戴朕恩思圖報効繕寫書信寄伊親信之庫本諾雅特台吉諾爾布都爾伯特台吉伯什阿噶什宰桑約蘇圖策凌多爾濟等令其協擒阿逆以彰國法具見誠悃著策楞即行轉交仍將伊等接到達瓦齊書信後言語情形速行奏聞並傳諭納穆扎爾舒明等將用兵準夷及加恩達瓦齊之處宣諭策凌齊木庫爾等知之命傳諭庫本諾雅特台吉諾爾布上諭諾爾布曰前將軍大臣等戡定準夷汝即望風歸順回心向化已傳㫖令汝前來入覲俟汝到時廣示鴻恩後因阿睦爾撒納負恩逃竄中途間隔今朕已施恩達瓦齊備藩京師伊感激朕恩思圖報効因汝從前有搶擄阿睦爾撒納游牧之事義切同仇達瓦齊又素知汝之為人不與叛賊為黨奏請寄書於汝汝能奮勉効力協助大兵擒拏叛賊朕必重加恩賞諭定邊右副將軍扎拉豐阿速行進兵上諭軍機大臣曰據扎拉豐阿奏稱准策楞咨將現在所到馬匹二千趕赴軍營俟陸續解到馬匹後無論兵丁多寡隨即繼進策應等語辦理馬匹固屬𦂳要但策楞以輕兵深入額林哈畢爾噶𠞰殺阿巴噶斯哈丹等游牧扎拉豐阿能即將現在所有兵丁迅速前進㑹同辦理尤為合宜若俟各處馬匹催齊然後進發則已緩不及事此㫖到日量扎拉豐阿業已領兵繼進如至彼處策楞又往前行扎拉豐阿即駐劄額林哈畢爾噶以作聲援並加意督催臺站稽察文報將此詳悉傳諭知之平定準噶爾方略正編卷二十一
