  text: 欽定四庫全書平定準噶爾方略前編卷二十二
  hash: sha256:9c9b0397fc4fa68571ec44acc420fdd2ae81fd01a87cd7d1eaa7942ffa809925
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_022-1a, image: WYG0357/WYG0357-0323a.png}
body:
  text: 雍正九年春二月戊午訓勵軍營將士上諭大學士等曰準噶爾父子濟惡背天逆理狡獪百端為邊方之巨患朕繼述先志綏靖西陲特遣兩路大兵聲罪致討數年以來慎選將士挽運軍需區畫周詳備辦饒裕而三軍之氣鼓勇直前人人思奮朕常教以古昔聖人之訓臨事而懼好謀而成天道惡盈謙沖受益軍氣當壯而軍心則不可驕此我將士及在廷臣工所共聞者也上年正月間西路大將軍嶽鍾琪奏報雍正七年十二月二十八日夜巴里坤軍營有紫氣祥光綿亘東北歷四時之久光華絢爛二月間又據署總督查郎阿奏報鞏昌府屬之靖逺衛紅嘴子地方乃黃河過渡之所每年正二月間東風解凍河冰漸薄冰橋既難行走渡船又難撑駕行李停滯嵗以為常乃今年正月官運糧車至此冰忽開融舟行無阻誠從來未有之竒遇等語朕覽奏不敢遽以為喜輒行宣示於外特命封貯內閣以待大軍凱旋即此可以知朕心矣此番西路撥派之將士皆遴選訓練之精鋭其氣勢倍覺壯盛遂未免有恃强輕敵之心以致賊人乘我不備侵犯汛界搶掠牧場并傷我兵辨豈軍志驕矜有干盛滿之戒天心特以此示警耶上年被賊侵擾之處朕與大將軍嶽鍾琪等不能計慮於事先實難辭疏忽之過至於軍營牧放駝馬最宜布置有方乃以牲畜置於賊人來路之旁又與大營相隔遼逺被賊人乘機盜竊則審度形勢之謂何嶽鍾琪更難辭咎又如達鼐統領噶斯之兵曽奏請製辦皮套等物以為兵丁手足禦寒之具而西路兵丁去冬出戰之時冒犯冰雪手足凍傷者多有則亦大將軍未曽留意於平時也凡此既往之錯追悔無益從來勝負乃兵家之常禍福有倚伏之理從前因疏忽而致虧損將來自可因小警而成大功惟望合營將士等以敬慎之心辦理戎事以忠義之勇對越上天自可仰䝉上帝慈恩默垂保護書經云皇天無親惟德是輔況準噶爾罄其所有甲兵不過三四萬之衆即以上年之事論之小䇿零敦多卜係伊防守沙喇擘勒要地之首領乃於冬間傾其人衆犯我卡倫我軍以數百人固守小營彼不能奪並不敢萌窺大營之念僅於中途以全力邀截我師四路畢集而我總兵官樊廷張元佐等以數千人擊敗彼數萬之衆則賊之力量伎倆不過如是而已蓋彼之所長在於偷盜駝馬而我師一時失於防範遂爾墮其術中並非彼之兵力有餘也觀賊之虛張聲勢分兵侵擾噶斯卡倫窺伺圖古里克之糧石我師以百餘人即可防守而追逐之則更鼠竊狗偷之行不堪之甚者也總之行軍之道心不可驕而氣不可餒凡我將士務去驕矜之心而鼓將來勇敢之氣候朕徐徐籌畫必有蕩冦萬全之勝䇿俾將士等歡欣鼓舞奏凱歌而膺爵賞也其軍營得傷患病之兵丁著用心調治務令痊可朕正籌畫加恩使之更換休養以恤勤勞著大將軍將朕此㫖通行曉諭出征將辨兵丁知之命加蠲西安額賦上諭大學士等曰從來備辦軍需於地方不無勞費朕深知其弊惟恐纍及民間是以於征𠞰準噶爾之舉悉心密籌於數年之前一絲一粟皆用公帑而民間並不知國家將有軍旅之事從來未聞預備軍需地方能如此毫不騷擾者也此天下所共知更為三秦百姓所深悉者及至大兵既出時日既多挽粟飛芻脂車秣馬雖不取辦於民財恐不免借資於民力此亦事勢之不得不然秖以準噶爾狡獪凶頑父子濟惡實䝉古之巨患為國家之隱憂若因循茍且縱賊養奸則狡冦一日不滅邊境一日不寧即內地之民亦一日不得休息此朕熟思詳審至於再三而出於萬不容己者並非好大喜功利其民人土地而為此舉也即以上年之事言之賊夷先遣使臣詐稱求和及朕降㫖暫停進兵而賊衆乘我不備大肆猖獗然則此等狡冦顧可置之度外聽其貽害於邊方哉即此愈見聖祖皇考當年不得已之情朕今日繼承先志不能不辦理之苦衷也惟是國家設兵所以衛民今因用兵而有不得不資民力之勢朕心實為憐憫是以年來屢蠲陜甘二省額徵錢糧使羣黎均沾膏澤而三秦紳士庶民感激國恩兼明大義踴躍趨事志切急公二十年來如一日朕實嘉之如昨嵗據督撫奏報甘肅士民等有願捐車輛以資挽運者有願捐草束以供芻牧者朕皆降㫖一一照數給與價值而其服勞宣力之誠悃亦大可見矣今年添辦軍需朕又切諭督撫有司等體恤民情不得絲毫擾纍其糧餉運費特令加增倘再有不敷仍令據實陳奏無非軫念民勞之意惟望陜甘二省紳士庶民等歡欣鼓舞勿懈初心則和氣致祥仰邀天眷不數年間必見膚功克奏不但邊城內外共享寧靜之福即爾等世世子孫永保安居之樂矣查雍正九年甘肅所屬額徵錢糧業已全行蠲免西安所屬額徵錢糧前降㫖蠲免四十萬兩著再蠲免四十萬兩以昭朕體恤之恩該督撫務飭有司敬謹奉行使閭閻同受實惠併將此㫖刋刻頒布俾陜甘二省逺鄉僻壤之民共知之命免肅州安西兵應扣借支整裝銀兩並分别加賞有差上諭大學士等曰上年臘月準噶爾侵犯卡倫署大將軍紀成斌調取肅州安西兩路兵三千名前赴軍營備用據署總督查郎阿奏稱兩路辨兵起程時衣裝之費分别借給銀兩俟將來按數扣除朕思準噶爾之事起於倉猝兩路辨兵於盛寒冬月前赴軍營日期忙迫深可軫念所借銀兩悉著賞給不必扣除並將該辨兵分别加賞銀兩著大將軍傳問伊等或本人在軍營自領或其眷屬在家支領悉從其便壬戌命代西路有功將士並增設四川總督上諭大學士等曰國家教養將士加恩於平時原欲其有勇知方緩急可恃以備干城之選果能臨戎遇敵奮勇先登勞績戰功卓然可紀尤當沛以殊恩優加體恤以奬忠誠而褒壯略也上年冬底準噶爾之事總兵官樊廷等已頒諭㫖厚加爵賞并令戰陳有功之辨兵更換休息中有侵冒冰雪觸犯鋒鏑而損傷手足者令軍營加意調治送回本汛矣著大將軍嶽鍾琪將此次隨樊廷張朝良等禦賊有功之將辨兵丁皆一一查明應令各回本任本汛者著另選撥以代之朕又思川陜二省地方數千里甚為遼濶今西邊有辦理軍需之事總督一員難於控制向來川省曽設總督今仍著添設四川總督一員即以提督黃廷桂補授四川提督著陜西固原提督紀成斌調補陜西固原提督著陜西肅州總兵官樊廷升授陜西肅州總兵官著四川重慶總兵官張朝良調補四川重慶總兵官著江南漕標副將馬義升授俟石雲倬馬紀勳等到軍營之後樊廷等各回新任紀成斌未回四川之先其提督印務仍著黃廷桂兼管癸亥命揀選八旗家人為家選兵赴軍營備用上諭八旗大臣等曰滿洲䝉古漢軍及包衣佐領下家人內有漢仗好行走歷練能受辛苦且長於鳥鎗弓箭者著揀選二千名發往西路軍營備用此挑選時聽伊等家主及本身情願入選者即著賞本主銀一百兩伊等凱旋之日俱准為另户再每口賞伊本主銀一百兩至伊等前往軍營一切錢糧馬匹器械銀兩等項著照馬甲之例另行賞給三月甲子朔訓勵喀爾喀王貝勒等上諭喀爾喀王貝勒等曰爾喀爾喀原係大部落因爾等先世但知好佛誦經廢弛戎務曽被噶爾丹戰敗爾等受聖祖仁皇帝恩養教訓四五十年練習武藝非比從前之怯懦去嵗準噶爾賊人乘西路軍營不備盜竊馬匹總兵官樊廷等率衆二千救援卡倫與二萬賊兵交戰殺賊甚多旋即遁歸倘賊人入爾等游牧之地爾等當乘時努力報恩雪恥朕遣兵進𠞰準噶爾原非利其土地人民特為爾等不能安寧之故耳其深悉朕意各加奮勉毋忽乙丑命左副都御史二格協辦肅州軍需事務丙寅以寧逺大將軍嶽鍾琪摺奏軍營事宜有㫖宣諭大學士等上諭曰寧逺大將軍嶽鍾琪先後接到所降諭㫖辦理諸務雖較之從前所奏略有頭緒而中間尚有錯謬之處如將肅州駐劄之固原寧夏兵丁二千五百名撥到軍營者原以補缺少原額也又奏稱將此二千五百名與撥出口之西安兵一千名涼州兵五百名駐劄圖古里克摩垓圖等處若北路一有調遣即將此兵丁從庫克托木一路赴阿濟卡倫應援如四千名尚不敷用再於軍營內挑選精兵四千名於喀喇烏蘇直赴必濟卡倫應援等語北路滿漢兵丁及察哈爾等處兵丁三萬餘名加以喀爾喀數萬之衆豈有尚資藉於西路應援之理設賊人果傾其全衆犯我北路則西路之師自應直向木魯河賊人留駐之所及伊勒布爾和碩放卡之處搶虜其牲畜𠞰滅其人衆又何暇分其兵衆以作應援之師乎且阿濟必濟去北路大軍之營尚逺賊人豈能越我軍營而至而勞西路應援之兵乎此等設施實未妥協至請將滿洲歸化城兵丁交與常賚帶領至安西駐劄與朕意相符及將圖古里克糧石運交軍營收貯所議亦為允協應照所請行戊辰命西路軍營嚴設防範並詳議補撥兵額事宜上諭大學士等曰準噶爾賊人留守駐防木魯河又於伊勒布爾和碩安設卡倫雖聲言欲犯北路朕料其詭計仍欲來犯西路也藍生芝之脫回未必非賊之故縱令其傳述此信以懈我西路防範之心爾等可傳諭嶽鍾琪不可稍存輕忽之心賊夷率衆來犯如為數無多西路之師固足抵禦𠞰戮即傾衆而來亦不可即調北路之兵恐賊兵復以大隊犯北路北路兵力不分方可全力擊𠞰至西路軍營現今兵馬果否敷用亦應詳審確實無致臨時周章又補撥兵丁原額或用本省之兵或用鄰省之兵或行召募令嶽鍾琪詳議具奏乙亥訓飭寧逺大將軍嶽鍾琪等上諭大學士等曰寧逺大將軍嶽鍾琪署總督查郎阿因聞賊營脫回兵丁藍生芝傳說噶爾丹䇿零帶領部落家口移住哈喇沙爾并有四月初一日小䇿零敦多卜㑹兵去犯北路之言籌畫四條具奏隨傳問多爾濟波羅特據稱哈喇沙爾係回子所住耕種之處相近有小城名庫爾勒其地氣候炎熱又甚隘小僅可容千餘家四面係開種田畝不能牧放多爾濟在哈喇沙爾居住最久波羅特亦親聽彼地人傳說二人之言的確與否雖未可必然大約其地之不甚寬大可知噶爾丹䇿零若欲移駐於此必率其全部而來少亦一二萬人哈喇沙爾果能容此大衆乎且以情理論之伊犁為賊之巢穴西北與土爾扈特哈薩克接境實皆賊之讐國噶爾丹䇿零又安敢舍其巢穴而逺居於哈喇沙爾乎如果率其大隊住於吐魯番相近之處則賊之注意在我巴里坤軍營而嶽鍾琪乃云賊人由吐魯番一路直侵哈密截我營站乘勢侵擾安西肅州沿邊一帶等語據多爾濟博羅特俱云哈喇沙爾至吐魯番雖有路徑皆係沙磧其自吐魯番至哈密一由沙磧大隊難行一沿南山係一線細路又須仍從巴里坤經過然後得達二人之言果確則賊衆不能從哈喇沙爾直至吐魯番而吐魯番一路不能直侵哈密也明矣設賊人欲侵犯哈密巴里坤大營之大軍豈竟任其出入而令阻截臺站乘勢侵擾安西肅州乎至云賊人以大隊全赴西路攻我軍營賊勢甚衆我軍衆寡莫敵當持重戒嚴堅壁固守一面知㑹北路遣兵應援一面飛調緑旗滿洲䝉古兵丁由烏克克嶺三面夾擊等語從前事起倉猝彼時軍營兵馬無幾是以諭令嶽鍾琪倘賊夷以大隊再犯當持重堅守以待應援今則軍營現在馬步車兵約有一萬九千餘名加以安西甘肅之兵六千名續泒兵四千名共二萬九千名是兵不為寡矣夫樊廷以馬步二千敵彼二萬轉戰七晝夜猶足以相當乃以二萬九千人之衆而云衆寡莫敵何懦怯至此且從前尚欲直至伊犁搗其巢穴豈有賊人來至數百里內而無𠞰殺之䇿轉堅壁而不出乎獨不思我軍堅壁不出倘賊但虛張聲勢作攻我軍之狀而分其衆以侵擾圖古里克塔勒納沁哈密等處阻截營站斷我音問此時將任賊於軍營近地肆行無忌乎嶽鍾琪又欲以圖古里克摩垓圖及安西之滿洲䝉古官兵由烏克克嶺合㑹夾擊賊人若果至巴里坤賊即敗逃亦從科舍圖一路直走伊勒布爾和碩而遁烏克克嶺相去二三百里安所得夾擊之又云賊夷或令積木薩之兵侵犯軍營而以哈喇沙爾之賊侵犯青海查哈喇沙爾至青海必由噶斯噶斯之口甚隘斷不能行且賊人既遣人侵犯大營彼豈不慮我軍之𠞰殺自必留哈喇沙爾之衆以為應援又何敢分其衆侵犯青海乎至慮賊之率其醜類悉赴沙州等處尤為背謬賊若由噶斯伊遜策罕齊老圖而進則此數路斷難容走萬餘人若由大道而來又不知何法可以越我巴里坤軍營而過也嶽鍾琪於口外地方形勢茫然不知於軍務機宜亦覺昏憒凡巴里坤軍營築城之要策及大軍勦賊之勝算並未籌及而但將旁枝末節盈篇纍牘備極周詳朕披覽之下實為煩憂如藍生芝所聞賊人有搶卡倫牲畜踐踏禾苗之語不思賊人若來搶奪我卡倫牲畜我獨不能𠞰戮此搶奪之賊乎賊人可以踐我禾苗我不可以乘其踐踏而擒之乎嶽鍾琪何以但能慮賊而不知籌已也又藍生芝云有哈密回子報信領路等語哈密回子之不可信由來已久亦當諒其苦情蓋其力量微弱遭準噶爾之凌虐恨之入骨而畏之如虎其或偶然通信於賊者乃恐懼之至為將來自全之計我軍固不可不留意隄防然不可使彼有疑懼之心我之軍力能庇護哈密哈密自不為賊人所用嶽鍾琪不必因藍生芝之言而深究也至西鳯二府運糧一事原因軫念甘肅連年挽運軍糈民間不無煩擾是以特命范時繹到彼協同巡撫武格侍郎馬爾泰將西安鳯翔二府米石運至甘肅涼州以資軍食武格等議行本運之法俾西鳯二府官民任轉運之勞甘肅地方少得息肩朕意深以為然今嶽鍾琪查郎阿又為遞運之議是與雍正元年設臺盤運相同將來必有派撥協濟之纍或更以交接卸責至將米石灌水攙沙從前誤纍豈可復蹈爾等可傳諭嶽鍾琪等知之壬午諭吐魯番回人移居近地上諭大學士等曰紀成斌聞賊人侵擾吐魯番之信即令樊廷等領兵四千前往應援此舉甚屬錯謬朕已降㫖嚴切申飭至於從前採買吐魯番糧石本應給與運價令其自送軍營乃計不出此而遣官發駝逺行搬運致啓賊人偷盜之心及至去冬逆夷猖獗之後猶不將辦糧之辨兵撤回此則疏忽錯誤之甚者也惟是朕以怙冒萬方為心若坐視吐魯番之被冦侵凌而不為之籌畫保護朕心又有所不忍從前曾降㫖與吐魯番人衆若畏懼準噶爾即移向近邊之地居住是以托克托瑪木特帶領之人移駐近邊者皆享安寧之福可再行曉諭回子等伊等倘自揣力不能敵不妨仍為移避之計朕當從厚賞給盤費並令地方官善為安插使之得所若此番曉諭之後伊等仍復觀望則賊人再來侵擾之時聽伊等自為之計我軍不便護庇矣甲申築科卜多城靖邊大將軍傅爾丹奏言北路軍營遵㫖築城審度形勢科卜多地接布魯爾與庫列圖相近乃進兵大道請於此築城為宜大學士等議覆應如所請奏入上從之丁亥命各省督撫募選技勇送部訓練備用上諭大學士等曰各省督撫著於所屬地方民人內召募揀選人材壯健技勇可觀者百餘人咨送兵部奏聞候朕揀派官員訓練教習以備軍旅之用武生武童及鄉勇民壯等俱可入選每人本籍額外給與守糧一分以養贍其家口本人進京之時著督撫動支公用銀兩賞給路費戊子命伊禮布率家選等兵赴西路軍營上諭大學士等曰都統伊禮布著帶領家選兵二千名驍勇兵一百名前往西路為副將軍若大將軍嶽鍾琪有統兵行走之處著伊禮布帶領滿洲兵丁一同前往其分管家選兵護軍校延岱等二十員各賞銀五百兩己丑選巴爾虎護軍等兵赴巴里坤上諭大學士等曰察哈爾地方居住之巴爾虎護軍披甲人等內著挑選一百名巴爾虎侍衛岱噶爾那木扎爾鄂欽敦柱克亦著派出此一百名兵丁令侍衛岱噶爾㑹同該總管詳加揀看其馬匹行糧照例辦理支給外侍衛四員各賞銀五百兩兵丁一百名各賞銀一百兩令其收拾預備俟京師兵丁定有起程日期即行文知㑹岱噶爾等帶領前往鄂爾多斯地方等候副將軍伊禮布領兵到時著伊禮布一併管轄帶往巴里坤軍營若有行走之處著於彼處所有歸化城一千兵內殘弱者撥出百名存留營內將此一百名入於歸化城兵丁數內令其防範盜竊馬匹等事俟成功之時著侍衛岱噶爾各帶回本處庚寅上諭大學士等曰何祥書著赴北路軍營令大將軍傅爾丹酌量給與緑旗職銜管理九千車騎兵效力行走四月庚子命左都御史史貽直等往陜西宣諭化導上諭內閣曰朕御極以來繼述皇考聖祖仁皇帝乂安區宇之聖心宵衣旰食朝乾夕惕欲使薄海內外休養生息物阜民安永戢兵戈咸登袵席以成蕩平熙皥之治是以宣猷敷治之間宏綱庶務凡有益於民生者莫不興舉不便於民生者莫不屏除若有幾微措置失宜即五內展轉寤寐難安豈肯好大喜功興兵搆難使百姓有供應之勞不遑寧處哉惟是鋤暴乃所以安民撫內必兼乎攘外此古今不易之至理帝王治世之常經凡爾百姓粗通大義者即莫不知之不必待髙逺之識也惟是準噶爾一部落原係元朝之臣僕其始祖曰額森額森之子托琿漸至大員因擾亂元之宗族離間䝉古惟恐獲罪遂背負元朝之恩逃遁藏匿於西北邊逺之地煽惑匪類要結黨與自稱準噶爾當我朝定鼎之初各處䝉古傾心歸順求為屬國獨準噶爾一部落違越於德化之外至噶爾丹䇿妄阿喇布坦二人則尤狡獪凶頑之甚者噶爾丹身為喇嘛不守清規不遵佛教破戒還俗娶青海鄂齊爾圖車臣汗之女為妻又潛往青海地方賊害伊之妻父而虜其人衆又復巧搆釁隙乘喀爾喀之不備發兵猝擊以致喀爾喀人衆潰散紛紛投我天朝䝉聖祖仁皇帝施恩撫恤遣使前往噶爾丹處諭令戢兵和好多方開導乃噶爾丹冥頑不靈轉借追襲喀爾喀之名犯我邊汛彼時即行𠞰滅復有何難我聖祖仁皇帝至仁如天好生為德特遣官員前往責問是時噶爾丹惶愧恐懼設誓撤兵仍復潛住近邊暗圖窺伺且乘間搶掠䝉古牲畜俾其不獲安居我聖祖仁皇帝始親統六師躬行天討噶爾丹逆天背理自速滅亡此噶爾丹之始末也策妄阿喇布坦者乃噶爾丹之姪也彼時既平噶爾丹即可鋤絶根株不留餘孽祗因我聖祖仁皇帝寬大慈仁赦罪宥過且念策妄阿喇布坦素與伊叔不相和睦情有可原於是加以天髙地厚之恩將噶爾丹餘剩部落賞伊收管此時伊力弱勢微甚為恭順其後則離間伊妻之父子誘其妻弟攜帶萬餘户至伊住牧之地因而强占入已由是勢力漸增竟敢肆意妄行窺伺青海侵犯哈密又潛兵入藏殺害伊妻弟拉藏汗毁壞寺廟荼毒人民我聖祖仁皇帝特遣大臣前往詢問乃伊愍不畏死阻兵抗命因使臣率師甚少兵力單弱伊得肆其猖狂此實天下臣民所共憤者我聖祖仁皇帝仍賜包容諭令兩路官兵姑緩前進以俟其悔罪輸誠若怙終不悛則命將徂征犁庭掃漠此我皇考之本意也朕即位以來伊雖遣使求和而詐僞作奸仍復如故且將我青海叛臣羅卜藏丹津收留藏匿朕屢次降㫖諭以定界息兵而伊狡飾支吾巧幻百出及䇿妄阿喇布坦身故伊子噶爾丹䇿零繼立其妄亂之性狂悖之行更過於其父其遣使陳奏之詞甚屬支離妄誕即如前年西藏阿爾布巴等之戕害康濟鼐亦因與準噶爾地方相近而逃匿之羅卜藏丹津又係伊等姻戚彼此相依是以敢於悖逆朝命而仗準噶爾以為狡兔之三窟也似此世濟其惡之人以逞凶挾詐為心以劫物傷人為事不可以德感不可以理喻無賴無恥藏慝藏奸時時欲戕害臣服我朝之䝉古部落以壞我屏垣若當此可以經理之㑹而瞻顧因循避興師動衆之名為耽逸偷安之計將狡冦一日不滅則䝉古一日不安邊境一日不寧內地之民一日不得休息而首先疲於奔命者即三秦之黎庶也即以上年之事論之賊夷先遣使臣僞稱請和及朕降㫖停兵以待信息而彼於深冬冰雪之時傾其醜類乘我不備侵犯汛界盜竊駝馬然則此等狡冦固可置之度外聽其貽害於將來乎從來窮兵黷武為聖帝明王之所深戒而以大加小以强凌弱又仁人君子之所不忍為者况準噶爾彈丸之地逺在極北之區得其地不足以耕耘得其民不足以驅使即使滅此朝食亦不足以誇廟略而耀武功此皆皇考與朕熟思審處先後籌畫數十年而出於萬不得已者也惟是地方有軍旅之事厲兵秣馬諸務紛繁雖不取辦於民財恐不免借資於民力向䝉皇考軫念秦民勞勩所以加恩而優恤之者無待朕之縷述矣朕御極之元年即將陜甘二省康熙六十年以前民屯衛所未完銀米豆草等項悉行蠲免又將舊例應完之三釐三合免其徵收數年以來西安所屬額徵錢糧或免四十萬或免八十萬甘肅所屬錢糧則連嵗全行輍免他如展納課之定期寬帶徵之舊缺開墾地畝修築河渠悉動帑金永為民利此皆朕之加惠於秦民者可約略舉之也即以西陲用兵之事言之北路軍需交與怡賢親王等辦理西路軍需交與大將軍嶽鍾琪辦理皆定議於雍正四年者王大臣等密奉指示一絲一粟皆用公帑製備纎毫不取給於民間是以經理數年而內外臣民並不知國家將有用兵之舉及至雍正七年大軍將發飛芻挽粟始有動用民力之時朕皆敇令地方有司照數給與腳價嚴禁尅扣短發侵蝕等弊倘有不肖官員借稱軍需科派擾民者著該管大臣即行題參革職先動帑金傳集百姓如數給還朕所以為百姓防患除弊者亦極嚴切矣上年該督撫先後奏稱民人中有願捐草束以供牧養者紳襟士庶中有願捐車輛以資挽運者朕皆奬以溫諭仍令照數給與價值去冬賊夷猖獗之後將來軍餉較前未免繁多又特加添運價一切軍務悉令有司寬裕辦理朕豈肯因戎事緊急稍涉權宜使閭閻騷擾於萬一哉意謂三秦衆庶必能諒朕不得已而用兵之苦心悉朕不忍纍民之至意矣乃近來風聞陜西之民竟有怨朕而私相謗議者總因十數年來陜西居住之允禵塞思黑年羮堯延信等皆懷挾異志包藏禍心其脅從之黨實繁有徒如塞思黑之令狐士儀年羮堯之鄒魯淨一道人延信之道姑王氏等皆公然以反叛為衆人之倡則其他匪類之造作妖言暗中煽動者又不知其幾矣地方既有奸回之人而又值軍興旁午或有司自顧考成間有奉行不善之處是以愚民無知惑於邪說溺於私情偶因用力於目前遂忘受恩於平日此亦事勢之所不免者夫秦風朴直自古為然朴則易被人欺直則善言易入祇以向來未有宣諭化導之人而該省督撫以及有司既有刑名錢穀之專責又有徵兵籌餉之軍需簿書鞅掌難於兼顧是以準噶爾之始末邊防關係之情形皇考與朕奉天討罪除暴安民萬不得已之苦衷並未家喻而户曉但聽僉邪小人搖唇鼓舌訕謗朝政變亂是非無怪乎草野之中被其迷惑者不少也今朕特頒此㫖遣左都御史史貽直侍郎杭奕祿署內務府總管鄭禪寶率領翰林院庶吉士及六部學習人員國子監肄業之選拔貢生等前往陜甘二省開導訓諭覺悟愚䝉倘合省民人等果能篤尊君親上之義消亢戾怨懟之情將見和氣致祥必邀上天默佑迅奏膚功邊塞永寧烽烟屏息不但爾等安居樂業俯仰優游即爾等世世子孫共享升平之樂矣至於軍需各項悉動帑金差員辦理不得扣尅短少貽纍小民所降諭㫖至再至三著欽差大臣悉心訪察倘有不遵諭㫖即行題參或所定官價有不敷用之處亦即據實奏聞若兵馬經過之地有不遵紀律騷擾民間者小過即告知該管大臣懲治大過即行參奏不得姑容務使兵民和洽內外輯寧以迓天庥以副朕念平定準噶爾方略前編卷二十二
