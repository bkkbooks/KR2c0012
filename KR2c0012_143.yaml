body:
  text: 乾隆二十五年六月戊子議北路驛站馬匹事宜軍機大臣奏言准永興呈稱現在驛站馬匹雖與乾隆六年之數相同但冬春草枯時未免竭蹶或仍照從前由各䝉古協助或每站酌量加增等語查臣等前因軍務告竣驛站馬匹裁照舊額自不必再為加增至令䝉古等協助亦恐奉行不善多所擾纍現在飛遞事件甚少卡倫侍衛等已裁其半每當更換之期原不必一起同行酌以二三員為一起則馬力自然寬裕請行文兵部理藩院及定邊左副將軍等凡新舊往來更換之侍衛及司員筆帖式領催等俱遵照辦理奏入上從之辛卯命新疆解送尋常人口沿途以次接遞上諭軍機大臣曰據舒赫德奏阿桂安泰等收服之嗎哈沁䝉克扎卜等四人派員解京又海明額敏和卓等奏派原任總管舍通額等解送匠藝樂工家口等語從前解送人口特派官兵原以關係緊要故令從本處直送京師今䝉克扎卜及工匠等不必派員専送嗣後遇有此等人口在葉爾羌等處祗送至阿克蘇以至庫車哈喇沙爾吐魯番哈密安西肅州如此接遞俱各回原處至肅州時始派員解京庶新疆駐劄各員不致營求差遣以圗回京自便著𫝊諭各該駐劄大臣及陜甘督撫知之議烏魯木齊牧馬事宜陜甘總督楊應琚奏言甘省各提鎮營向來俱有孳生馬厰軍興以來屢經動撥未免參差又有水草平常數處每多羸瘠若改撥巴里坤牧放似屬有益奏入得㫖軍機大臣速議具奏尋議甘省各標營牧厰其水草平常之處改撥尤為要務但巴里坤水草較之內地固佳恐緑旗官兵不善經理現在烏魯木齊一帶土沃草肥該處駐防及屯田官兵俱可就近照管將來馬匹蕃息又可就近調用并省巴里坤撥解之煩應令該督查明此項平常牧厰馬匹現有若干趁此水草豐盛之時徑行解往烏魯木齊擇厰牧放其分起解送各事宜請交阿桂安泰等㑹同楊應琚悉心酌議辦理具奏奏入上諭曰依議速行但今年若徑至烏魯木齊恐屆深秋草黃之候即於巴里坤過冬亦可併𫝊諭知之丁酉命都統侍郎海明赴喀什噶爾辦事上諭軍機大臣曰據阿里衮奏伊親赴喀什噶爾巡察卡倫將地非衝要之處所設兵丁酌量存留餘俱調往烏什又將緑旗兵四十名撤回更換索倫兵二十名等語前諭阿里衮不必赴喀什噶爾即行回京但喀什噶爾係布魯特安集延等處要路必須大員彈壓新柱至葉爾羌時海明即赴喀什噶爾辦事命以逃犯阿卜都拉等分賞南省駐防官兵上諭軍機大臣曰阿里衮奏稱從霍罕逃出之回人阿卜都拉等四名曾隨霍集占行走今詳加詢問察其户口若干送至肅州辦理等語阿卜都拉等情罪本應正法今已從寬免死至伊等妻子何必更令完聚著將阿卜都拉等審訊後即賞給南省駐防官兵為奴其妻子即未經賞人亦著查出另行備賞諭定邊左副將軍成衮扎布折賞烏梁海緞布事宜上諭軍機大臣曰成衮扎布奏阿爾台之烏梁海內大臣察達克等二年以來未將所定貢賦全行交納應不准折賞緞布等語伊等歸服以來頗知實心效力朕寬其貢賦加以賞賚始稍有起色而去年復遭哈薩克搶掠著仍賞給緞布此次出自特恩後不為例著曉示伊等知之參贊大臣舒赫德疏奏預定來年增派屯田回人事宜舒赫德等奏言伊犂屯田初次遣回人三百名小麥等種未及播種來年自應多為遣往而海努克固勒扎兩處俱派官兵屯駐亦屬有益現因各城伯克來阿克蘇之便㑹議派出回人五百户計阿克蘇一百六十一户烏什一百二十户賽里木十三户拜十三户庫車三十户沙雅爾十三户多倫一百五十户於來年二月辦給籽種器具攜眷前往其行走口糧及收穫以前食用按期接濟臣前所遣暫駐伊犂之副都統伊勒圗至穆素爾嶺聞豐訥亨已還仍行轉回將來遷移回人即令伊勒圗領兵照看奏入報聞辛丑諭參贊大臣舒赫德等曉示回人事宜上諭軍機大臣曰海明等奏葉爾羌伯克等謂鄂對不宜為阿竒木伯克懇請以額敏和卓補授隨咨商舒赫德𫝊集伊沙噶阿卜都喇伊木等嚴行申飭將呈擲還等語舒赫德指示海明所辦甚是但所遞呈詞阿琿列名於前而伊沙噶噶雜納齊等皆在後阿琿乃回人內誦經識字者與凖噶爾喇嘛相似從前厄魯特等不知事體聽信喇嘛致生變亂其可使回人因仍舊習著𫝊諭舒赫德等曉示各城回人嗣後諸事惟聽阿竒木等伯克辦理阿琿不得干與至舒赫德諳練有年於新柱海明等務宜詳加指示不得因各有分駐之地遂生推諉併𫝊諭新柱海明等知之葉爾羌辦事都統侍郎海明等疏奏巴勒提部落遣使貿易情形海明等奏言五月二十五日據裕拉里克卡倫送到巴勒提貿易人等據告稱我等係頭目默默斯帊爾烏蘇完兩處遣來貿易我等兩部落相隔一河各有八千餘人西接克什米爾又西接㾗都斯坦南接哈普倫東接土伯特北接博洛爾兩部落結姻中間亦曾爭鬭仍歸和好向來在葉爾羌貿易今聞天朝大兵平定回部各城是以欣恱願來歸附等語因呈獻兩頭目書禮臣等加以撫慰查所攜貨物無多以初次前來免其納稅并酌給口糧回人等俱感激叩首俟貿易事竣護出卡倫奏入報聞壬寅總督管甘肅巡撫吳達善疏奏年榖順成情形吳達善奏言甘省連年因旱歉收荷䝉恩㫖頻頒咸登袵席今嵗自春徂夏雨水調勻禾苗豐茂市糧價值日就平減其從前各災地展賑平糶之期俱於五月停止尚有撥運糧石未經起程者概飭停止在途者即於所到之處截留貯倉以節運費據布政司等禀報計可節省運費銀四十餘萬兩奏入得㫖節費猶其小者所喜在吾民得免溝壑也秋七月乙巳授厄魯特散秩大臣鄂齊爾為內大臣並與佐領們都額木齊錫喇卜逹什阿畢達各賞銀五十兩們都仍賞戴藍翎軍機大臣奏言從前達什達瓦兄子特古斯哈什哈有子二人其長子為沙克都爾曼濟所殺又欲殺其次子所屬們都以己子代之今們都入覲臣等遵㫖詢問據稱我台吉特古斯哈什哈存日待我甚厚伊長子莫什喇卜已死次子布圗庫巴雅爾若再被害即致絶嗣因以己子孟庫送與沙克都爾曼濟我即收養台吉次子遇伊犂之亂向巴里坤來投中途被克勒特人等拘禁布圗庫巴雅爾病故時方四嵗奏入報聞丁未諭參贊大臣舒赫德等通飭卡倫臺站毋得疏脫賊人上諭軍機大臣曰舒赫德奏據穆素爾嶺臺站擒獲嗎哈沁阿舒爾供係喀什噶爾回人幼為厄魯特所掠轉入哈薩克今逃來伊犂聞同行之厄魯特等至和濟格爾見乘白馬二人來追是以復回等語看來此等追騎必係卡倫臺站兵丁其不行拏獲情由蓋以省解送之煩但逐出該管汛地即可了事此等陋習與明知故縱無異現在逃匿之嗎哈沁等尚自不少若聚集多人盜竊滋擾亦未可定著𫝊諭舒赫德阿桂即照所供逃脫處所將乘焉二人嚴行查出審擬仍通飭各卡倫臺站人等嗣後見有嗎哈沁等即竭力追擒若但追逐出汛以致逃脫或被旁人告發或賊人於他處供出定將疏忽兵丁以軍法從事命核減臺站馬匹加意飼秣上諭軍機大臣曰據五吉等奏現在驛遞事件較從前甚簡請將巴里坤等處臺站各照例留馬十五匹駝四隻等語軍營事簡所設臺站馬匹自應通行核減如伊犂阿克蘇葉爾羌喀什噶爾等處俱著酌量情形應存若干庶得専意牧放其戈璧處所作何貯備草豆飼秣不致傷損倒斃著舒赫德等㑹商辦理參贊大臣舒赫德疏奏阿克蘇貿易及修城情形舒赫德奏言五月二十七日布魯特之瑪穆特呼里及阿特巴什部落商人帶有牛羊皮張來阿克蘇貿易內有頭目塔素爾海哈什哈曾於乾隆二十三年入覲此次即戴恩賞翎頂前來臣加以撫賞查布魯特等貿易係此次初至阿克蘇而回人等又皆力耕餘地米肉價值甚平情形喜樂再阿克蘇原有舊城在山之麓今伯克阿琿等欲加修理并添造房屋臣即准其照議辦理奏入報聞戊申命六品以上伯克等分班入覲參贊大臣舒赫德奏言前經將軍兆惠等奏定回部各城伯克分為三班輪年入覲除第一班伯克霍集斯鄂對等業經入覲其本年派出第二班伯克等臣與阿里衮議令行文各城駐劄大臣造冊知㑹於八月初旬俱來阿克蘇由臣處派員護送其不便紆道者派員前往帶領今據冊送前來謹列單恭呈御覽約八月中旬起程可於十二月抵京奏入上諭軍機大臣曰覽舒赫德奏派入覲之葉爾羌等城伯克名單人數頗多其間七品頂帶伯克約居大半但新疆辦事需人且沿途行走亦殊勞費著將應行入覲之伯克等六品以上者辦送來京其七品人員不必前來俟伊等升轉後再行輪班引見著𫝊諭舒赫德等曉示回人知之又諭曰前鄂對等入覲轉回曾派輔國公如松等護送即令其帶領第二起回人來京著𫝊諭舒赫德如松等到彼正屆伊等起程之期不必另派大員即遵前㫖辦理命賞御前侍衛圗倫楚巴圗魯號上諭軍機大臣曰圗倫楚䝉郭勒岱在軍前頗屬奮勉圗倫楚賜號果爾勒克森巴圗魯䝉郭勒岱賜號綽和木巴圗魯仍賞銀各一百兩己酉葉爾羌辦事都統侍郎海明等疏奏賊匪搶掠臺站海明等奏言六月初十日據喀什噶爾之庫勒塔里木臺站署筆帖式布占告稱初九日有回人四十餘人步行各持木棍我與兵丁俱被擊傷搶掠牲隻衣糧旋遇葉爾羌護送馬駝兵丁亦稱被掠等語臣等即派副都統豐安選兵六十名前往接續臺站擒拏賊犯十一日據葉爾羌伊沙噶伯克阿卜都喇伊木等呈送回字逆書內稱呢雅斯伯克等聞阿公起程已於六月初五日起事有阿睦爾撒納遣使來告初六日已取烏什此書由牌租阿巴特送至鄂坡勒庫勒塔里木葉爾羌等語臣等查逆賊等造言惑衆現在阿里衮舒赫德處俱未有信息又選兵五十名令藍翎侍衛富柱等策應豐安偵探情形一面備辦官兵馬駝臣額敏和卓派親信護衛等𫝊知英噶薩爾加意防範并撫慰布魯特等臣等又劄行和闐總兵丑達一體防範仍一面知㑹舒赫德等奏入上諭軍機大臣曰海明等奏逆回搶掠臺站情形回部甫經平定人心易搖或本處不逞之徒倡言煽惑或去年𠞰賊時脫逃餘黨乘間窺伺俱未可定雖非大事不可不痛加懲創以遏亂萌著𫝊諭舒赫德若喀什噶爾無事則不過賊匪流言或有變動自必派兵辦理舒赫德即領兵一二千名相機𠞰捕此等賊人恐有厄魯特在內倘逃往伊犂著阿桂就近堵𠞰至逆書所言由牌租阿巴特發行若果係此處回人務宜全行𠞰滅再臺站官兵等於無事時任意擾纍回人有事又不能擒獲雖相沿陋習而該管大臣亦難辭疏忽之咎嗣後有似此者定行嚴察治罪著通行曉諭知之庚戌參贊大臣舒赫德疏奏體察搶臺賊匪情形舒赫德奏言六月十五日准葉爾羌辦事大臣海明等咨送報明賊回搶掠臺站奏稿到臣臣詳察情由葉爾羌喀什噶爾等處各城回人雜處性習愚頑此等不過失業貧人妄言滋事又有奸狡之徒乘機煽惑詭稱凖夷餘孽以掩其搶掠臺站之跡其實回人等雖善惡不齊現在兵戈寧息欲圗生聚者居多斷不致大為搖動即如流言六月初五日喀什噶爾已亂而初六日阿里衮尚有遞到常行事件其為虛妄可知臣將海明等行知奏稿毫不宣露一面密派護軍校竈保住行文海明等將賊人言詞虛妄曉示回衆但拏獲𫝊書之人此事原由即可明晰至阿里衮現在已經辦理亦未可定俟得確實信息即行具奏奏入上諭軍機大臣曰舒赫德奏搶掠臺站賊人情形所見甚是但賊人既倡言煽惑且業經搶掠臺站深可痛恨自應酌量領兵辦理在造謀起事之人固不可疏縱其情尚可原者亦當安撫惟存之於心不可使衆人窺測反生僥幸至阿卜都喇伊木從前率先歸附此次呈出逆書絶無瞻顧殊屬可嘉舒赫德即查核情由應如何酌量加恩之處奏聞請㫖癸丑葉爾羌辦事都統侍郎海明等疏奏擒獲搶臺賊匪及喀什噶爾信息海明等奏言六月十三日總兵揚寧報稱拜什謙回人呼圗爾莫拜等搶掠人口馬匹已領兵擒獲呈報參贊大臣阿里衮本日豐安報稱從庫勒塔里木臺站起程拏獲搶臺回人邁瑪第敏等供出為首之奈納克和卓藏匿鄉村隨將伊及夥黨八人并所掠婦女牛馬擒拏收獲又英噶薩爾阿竒木伯克色梯巴勒氐喀什噶爾提督董孟等報稱本月初七日參贊大臣阿里衮領兵𠞰捕倡亂之邁喇木伯克回衆千餘𠞰殺二百餘俱投降邁喇木伯克㑹同牌租阿巴特之呢雅斯伯克逃去現在追捕等語又審得奈納克和卓係聽從呢雅斯伯克等倡亂之人即解來葉爾羌收禁又據豐安報行至鄂坡勒臺站同伯克托克托和卓聚集鄉村回人曉諭共擒送賊匪二十八獻出馬駝軍器訊據供稱為首之摩羅呼圗克等七人俱逃來葉爾羌臣等現在派員查拏其臺站官兵現據放回數人又查獲兵役二名尸身統俟覆訊明確具奏奏入報聞諭參贊大臣舒赫德等辦理賊匪事宜上諭軍機大臣曰海明奏豐安擒獲搶臺賊匪邁瑪第敏等據供阿里衮領兵擊敗賊衆噶什噶爾安靜無事又英噶薩爾阿竒木伯克色梯巴勒氐呈稱阿里衮聞邁喇木伯克等倡亂隨回喀什噶爾安撫并領兵往牌租阿巴特查拏等語新疆回人敢行倡亂必當痛加懲創著舒赫德等將首惡及其家口全行正法逆黨亦皆正法其妻子分賞官兵不必送京即已起程在途俱令解回辦理阿里衮奉到回京諭㫖不候新柱到彼即行起程雖搶臺一事非可預料而回人等素不安靜情形豈毫無體察是其意見不到處但聞信即回尚屬黽勉料理所有善後事宜務須加意併𫝊諭海明額敏和卓知之甲寅命議叙參贊大臣阿里衮等及優恤陳亡得傷官兵阿里衮奏言臣於六月初六日奉㫖起程回京初七日自喀什噶爾起行至葉爾羌之雅木扎爾本日據駐防玉斯屯阿喇圗什城把總等報稱回人搶掠臺站人馬牲隻圍困城堡又准提督董孟報稱伯克邁喇木往尋舊居之伯什克勒木村莊並未在家隨派兵查緝於中途遇邁喇木所屬回人七騎即行拏解惟哈三和卓脫逃等語臣速回喀什噶爾據董孟告稱聞商伯克邁喇木妄造阿睦爾撒納越庫庫訥克嶺已取阿克蘇之言希圗煽惑人心肆其搶掠等語臣即派兵查拏行至伯什克勒木附近已有賊衆千餘排列臣率官兵八百餘名力戰賊始入城堅守復以鎗炮攻圍是夜四鼓闔城呼號乞命即行招撫詢據供稱邁喇木同三四人渡河潛逃隨追獲邁喇木所屬托克托默特瑪穆特索丕等知向牌租阿巴特一路逃走即行尾追至克色勒河據居人云牌租阿巴特之阿竒木伯克呢雅斯聞邁喇木逃來遂與同行不知所往臣分途追捕務期擒獲此次陳亡得傷官兵及隨吐魯番公品級木薩擊賊得傷之回人等續行查明具奏奏入上諭軍機大臣曰阿里衮聞賊回搶掠臺站之信即回喀什噶爾擊敗賊衆撫定回人豐安揚寧等擒賊通信此次雖非大征戰可比但應機立辦甚屬可嘉阿里衮著交部議叙伊子拜唐阿豐盛額著授為藍翎侍衛額敏和卓豐安揚寧木薩亦著交部議叙色梯巴勒氐托克托和卓等酌量奬賞其力戰有功及陳亡得傷官兵俱著查明報部議叙議恤又諭曰賊匪倡亂拒捕一時即聚集千人必平日有潛相約結之處著舒赫德前往喀什噶爾嚴行查辦阿里衮仍著回京海明前往喀什噶爾新柱額敏和卓在葉爾羌辦事俱𫝊諭知之諭參贊大臣舒赫德等預防賊匪逃入布魯特上諭軍機大臣曰阿里衮現在領兵追賊諒能擒獲若業經脫逃必往布魯特遊牧儻不窮追務獲則回人等無所懲創且布魯特將來為逋逃之藪此風斷不可長著舒赫德等加意追捕如已入布魯特即遣人曉示利害令其擒獻受賞或稍有隱匿推諉可速整兵攻其無備以振軍威不可遲疑誤事參贊大臣阿里衮疏奏擒獲倡亂之回人邁喇木等阿里衮奏言臣等擊敗邁喇木所糾回衆千餘人復悉力攻城賊首夤夜於城北掘牆逃走臣即追至牌租阿巴特河正在造筏欲渡哨探官兵及克色勒布伊之阿里木伯克等告稱邁喇木㑹同呢雅斯逃走隨追至薩林都尋踪入布魯特即派總管巴雅爾公木薩前追臣領兵將布魯特出入要隘防守因提督董孟患病調總兵揚寧等巡查堵截六月十八日巴雅爾等報稱追至和羅木魯克見賊衆方欲㑹食即拏獲邁喇木呢雅斯將其家口屬人𠞰殺收獲馬騾軍器前來臣逐一審訊因呢雅斯聞多倫回人等𫝊說阿睦爾撒納之信告之邁喇木適值議派邁喇木輪班進京聞霍什克伯克等户口俱送京安插恐被留在內與呢雅斯商議行文搖惑人心而官兵來𠞰甚速隨糾集回人倉猝拒捕及攻潰潛逃投向呢雅斯呢雅斯又已將所縛兵丁二十人殺害遂與同逃供認不諱謹派官兵將邁喇木呢雅斯解京行文沿途大臣官貟加意防範并録供恭呈御覽奏入上諭軍機大臣曰阿里衮奏倡亂回人邁喇木呢雅斯等俱已擒獲此次辦理迅速甚屬可嘉伊子豐盛額著加恩授為三等侍衛次子倭盛額著授為藍翎侍衛公品級木薩總管巴雅爾等奮勉追賊殊為效力木薩著封公爵巴雅爾著授副都統職銜今渠魁雖獲而逆黨多人必須擒治即如明伯克薩罕和卓頗羅特和卓皆肆行殺掠之賊摩羅額都色勒木執縛牌租阿巴特城兵丁摩羅色勒木將兵丁全行戕害深可痛恨著𫝊諭舒赫德阿里衮等務須窮搜盡獲以彰國憲至呢雅斯供稱噶雜納齊邁瑪第敏見邁喇木所發逆書不肯鈐用圗記隨往投喀什噶爾是伊並未從賊深可嘉尚著酌量奬賞英噶薩爾之哈子沙巴伯克圗里野和卓等接得逆書若當時即告之色梯巴勒氐尚屬無罪或觀望欺隱則不可留於本地即拏解來京前諭拏獲賊匪不必解京今計阿里衮派貟押解已將一月舒赫德奉㫖後業已調回則已或彼此相左即在京辦理亦可其效力各官兵仍著阿里衮查明速奏戊午諭按察使銜納世通等防範多倫回衆上諭軍機大臣曰阿里衮拏獲倡亂回人邁喇木呢雅斯等供稱聞多倫回人𫝊說阿睦爾撒納來取阿克蘇等語或多倫回人造言生事或邁喇木等畏罪指稱俱未可定著𫝊諭納世通今命伊前往哈喇沙爾辦事此時且勿宣露俟邁喇木等解京後訊問明確果係多倫回人揑造再行查拏亦未為遲但伊等俱新經安插之人撫綏防範甚關緊要恐書山不能辦理故調往庫車并𫝊諭舒赫德知之命定回部伯克等犯罪解審之例上諭軍機大臣曰昨諭將倡亂回人邁喇木呢雅斯等在本處正法又因業經解送即著來京審結今思回部辦事伯克等俱係頭目若一面具奏即於該處正法則造言生事之徒轉謂駐劄大臣等激變又殺之以滅口且將來大臣等亦不能保其竟無擾纍甚有關係嗣後回部伯克身犯重罪除持械拒捕臨陳𠞰殺外若已經拏獲不可即行正法四品以上著拏送來京五品以下審明具奏請㫖著𫝊諭駐劄各大臣知之諭參贊大臣舒赫德等停止購辦回人美玉上諭軍機大臣曰海明奏稱葉爾羌伯克等採玉呈獻㨂選送京并請諭和闐伯克有獻美玉者賞給緞匹等語朕命大臣等駐劄回城原以鎮撫新疆綏徠初附至揀選玉石何關緊要舒赫德尚知此意著𫝊諭伊等嗣後除舊例照常貢玉外回人等有求售及來獻者酌給價值不可𫝊知回衆令其採辦至大臣等果能實心辦事自必優加恩遇若辦事平常雖購得美玉亦復何益伊等知此庶識事體之輕重矣辛酉諭定邉左副將軍成衮扎布等辦理防範卡倫上諭軍機大臣曰成衮扎布等奏稱布延圗卡倫虛銜藍翎伯吉呈報聞特楞古特人等搶掠烏梁海內大臣察達克等已領兵迎敵隨派福祿領兵二百名防範卡倫等語哈薩克特楞古特烏梁海等互相盜竊事所時有未必有大隊前來若果有之亦非察達克等所能禦但喀爾喀等每易於𫝊說驚疑著𫝊諭成衮扎布惟宜密為辦理仍通飭各卡倫嚴加防範并派貟巡查不可疏懈諭參贊大臣舒赫德等查勘布魯特游牧事宜上諭軍機大臣曰豐訥亨奏稱烏爾圗布拉克卡倫拏獲嗎哈沁供稱布魯特一千餘户移來阿特巴什居住詢之厄魯特藍翎侍衛塞卜騰據稱阿特巴什原係厄魯特游牧等語凖噶爾蕩平凡有舊游牧皆我版圗布魯特曽經歸附豈可妄行踰越即應體察驅逐但現在問之霍集斯又云原係布魯特之地為凖噶爾所侵大兵平定之後布魯特等已移居三四年等語自應查勘明確若果係凖噶爾故地則在所必取非可以空言曉示遂能驅逐者此時且佯為不知待來年添駐兵丁回人再行相機辦理其或此地原非凖噶爾所有又在特穆爾圗淖爾及巴勒琿嶺之外自當聽其遊牧即係凖部之地而逺處邉末與我界不相聮附者亦不必張皇遣兵驅逐著𫝊諭舒赫德阿桂等知之參贊大臣舒赫德疏奏辦送添派屯田回人舒赫德奏言臣前奏添派回人三百名於七月初送往伊犂本月初一日辦送阿克蘇回人起程初五日在海里巴特齊集副都統伊勒圗所領滿洲兵一百名索倫察哈爾厄魯特等兵一百名製備軍裝又每城派出伯克一名護送回人其伊勒圗係總辦兵丁臺站仍以敏珠爾揚桑阿協辦此次所領兵丁至伊犁後仍緩行轉回阿克蘇俟來春再送添派屯田回人計現在用馬三百餘匹駝一百二十餘隻羊八千三百六十餘隻官兵鹽菜銀五千兩又阿桂調取來年大小麥籽種一百五十石及成造碾磨之鐵器一併發往再前往伊犂一切情形臣若俟呈報到日恐奏事稍遲即令伊勒圗自行具奏奏入報聞平定凖噶爾方略續編卷四
