  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_043-1a, image: WYG0357/WYG0357-0597c.png}
body:
  text: 乾隆二年春正月壬子命殷扎那等率駐防兵赴北路更代總理王大臣等奏言前者臣等議乾隆二年撥赴北路換班兵二千五百名其察哈爾兵一千五百名應遣京城副都統一員率之索倫達呼里兵一千名應遣黒龍江副都統一員率之謹開列職名伏候欽命其兵丁應給口糧馬匹請照例支給奏入得㫖著殷扎那圖那去餘依議二月己未朔命暫留換班兵協力防秋上諭王大臣等曰去年七月内準賊侵我卡倫掠去喀爾喀二人今秋宜嚴加防範現在派徃換班察哈爾兵一千五百名黒龍江兵一千名令於五月初間由本處起程七月初間務到軍營著行文額駙䇿凌等俟換班兵到日將換回兵丁暫行留駐協力加謹防範俟過七八月𦂳要之時再將伊等發回今年準夷若復侵我卡倫應令額駙䇿凌將明年應如何防範之處先期定議具奏再西路應如何豫備之處亦行文大學士查郎阿令其先事詳議具奏辛酉恩免西寧等鎮官兵應追銀兩上諭内閣曰據劉於義奏稱西寧鎮有原調援𠞰撤回官兵二百三十九名於雍正十二年并乾隆元年節次派撥出口所有原領俸賞銀兩似應准其抵算又大通鎮撤回未經續派兵丁七十七名領過賞銀一千七百兩前曾另行派調將賞銀追給頂派各兵查頂替之兵逺役塞外俱經製辦行裝費用無存可否加恩免其追繳等語征兵借支銀兩前已降㫖盡與豁免今西寧大通官兵應追銀兩著照劉於義所請一體加恩免其追繳癸酉準噶爾部人恭格來降命賞給安揷如例三月乙卯額駙䇿凌奏請明年東三省兵二千名牧厰兵五百名當代還者亦令於防秋後九月遣還奏入上從之夏四月壬午命額駙䇿凌移書曉諭噶爾丹䇿零定邊副將軍額駙䇿凌奏言據貝勒青滚雜卜報三月初十日噶爾丹䇿零遣人送還去秋被掠津巴鄂羅思且有致車臣汗等書一通送至軍營臣等譯來書言前大皇帝賜書令我等游牧不得過阿爾台其䝉古屬人居住如故如此則遣使不如此則不必遣使想非出大皇帝㫖特喀爾喀台吉等疑我逼處阿爾台有害爾等游牧慫恿部院大人為此耳竊思阿爾台乃我祖父所貽故難讓給自今和好後彼此雜處何妨若欲興兵搆怨雖逺亦可至也前此相爭爾我兩傷用兵何益况大皇帝為爾出兵爾喀爾喀自當供應即我兵至時口糧亦不免取給於爾去年因爾等卡倫逼近阿爾台我邊界人遂生疑惑擒爾二人嗣後爾等卡倫宜稍内撤無近阿爾台游牧或致生事爾䝉古台吉等當告知内地部院大臣奏聞大皇帝惟以廣行黄教休逸羣生為意爾若以書覆我可於秋九月發來又據津巴言去年七月初八日我與鄂羅思為賊所掠至伊犁今年正月初九日見噶爾丹䇿零給書一通令致車臣汗給衣一襲并還前所掠馬駝器械撥十人䕶送即日起程二月二十日至薩里鄂羅思道病死我於三月十四日至博托和尼和羅卡倫臣等詳察噶爾丹䇿零掠我二人今又送還葢因勅書所諭甚明不便復遣使來藉此致書於臣冀得奏聞皇上書中所言仍欲得阿爾台似應覆與一書或以臣等奏聞更降勅諭或竟作臣等意見覆書開示伏候睿鑒總理王大臣等議覆日準夷此舉大有窮廹向化之意但阿爾台斷不可與前此勅書業已詳備無庸再給應令額駙䇿凌作書答之臣等恭擬呈覽奏入上從之尋進所擬額駙䇿凌與準夷書曰固倫額駙䇿凌致書準噶爾台吉今年四月津巴來得台吉書云我欲取阿爾台台吉尚未曉大皇帝之意我果有取阿爾台之心大兵豈肯盡撤我撤大兵即可知大皇帝之意矣阿爾台乃天定交界爾父渾台吉時阿爾台以南原無厄魯特游牧自滅噶爾丹博什克圖以來我等建城駐兵其地衆所共知其不令爾衆游牧者原欲以阿爾台為閒地兩不相取彼此隔逺庶永相和好不起爭端耳今台吉反云難以讓給試思阿爾台果係誰地誰能讓給大皇帝據理諭爾剖斷甚明台吉尚爾飾説是不願休息衆生也論説滋多空勞徃返總之阿爾台可以給爾與否台吉宜再詳思不可偏執利己之見也又謂逼處則有害我等游牧彼此相持誰受其害尚在未定大皇帝洞鑒留作隙地正欲廣教安民耳台吉若欲如前者首禍興兵是勞苦衆生皆爾之故於我無渉也來書又言興兵搆怨逺亦可至我大皇帝諭令分畫疆界原欲爾我自此息兵爾誠遵㫖定議我兵必不為禍始亦不復向科卜多居住倘爾復造釁端我惟坐待其來並不煩内地兵惟盡我喀爾喀之力上報主恩孰是孰非孰好生孰不好生自有天鑒我部惟體大皇帝仁育之心防邊居守勿為禍始勞苦士馬而已台吉其知之又謂我卡倫逼近阿爾台故爾生疑擒此二人自今卡倫宜向内撤按我等現在卡倫乃聖祖仁皇帝時設立至今並未外移即議定地界卡倫豈可不立今欲令我内撤是强以難行之事也又謂毋近阿爾台游牧或致生事台吉果遵大皇帝諭㫖止議定界於理甚合於爾亦無甚難行今反言生事是猶意在興兵也惟末云當告知部院大臣奏聞大皇帝以廣黄教以安衆生知台吉雖多飾辭仍意在求和耳我已舉大略奏聞欽奉大皇帝諭㫖噶爾丹䇿零遣吹納木喀來時諸事俱經降㫖曉諭何彼尚未深悉朕意彼既行文於爾爾可再以朕意曉諭之書至台吉其詳審是非利害遣使達誠如爾難於遣使我當代奏令爾使赴京共成和好若仍牽率借端於事何益奏入報聞甲申命種地綠旗兵毋庸再撥額駙䇿凌等奏言前令卓鼐等徃勘鄂爾昆可耕地畝實可給三千人耕種即以今年換班綠旗兵六百再另撥一千九百共二千五百名令一千五百名擇地耕種令一千名分駐塔米爾鄂爾昆兩處防守城池倉庫其種地事務即令總兵官管理暇時仍令操演訓練遇有撥遣可成勁兵一隊矣總理王大臣等議覆據奏除駐防兵外當用一千五百人耕種今軍營綠旗兵六百并罪人計一千有餘不必更撥兵丁前徃又現在遵㫖議運軍糧不必另議撥兵種地奏入上從之五月丁未命内扎薩克等防秋兵丁在本處備調總理王大臣等奏言臣等以理藩院所報内扎薩克等沿戈壁防兵及游牧處備兵之數具奏得㫖觀内扎薩克王等所報沿戈壁防秋駐兵所需馬匹糗糧俱伊等自辦但此兵止令其豫備用與不用尚介兩可若每年如此則䝉古等不勝其累倘必須逺駐人畜並困於徃返宜如何加賞與其每年虛糜帑項與出兵無異不若令其在游牧處豫備以候調遣遇有調遣之處倍加賞賚辦理啓行著詳議具奏并移咨詢問額駙䇿凌此兵在游牧處豫備有益與否令據所見奏聞臣等伏思内扎薩克兵沿戈壁駐防雖聲援稍近但六盟長下三千兵分駐六處相距數百里力弱勢單即歲加恩賞未必得收其用不但虚糜帑項而䝉古等徃返如織勞費殊甚若令三千兵亦在游牧處豫備於聲援不致遲悞而伊等亦不甚勞苦應行文扎薩克等令防秋兵暫停啓行與游牧處豫備兵八千名同聴調遣即於本處駐劄其兵丁馬畜軍器整理儲備聞調即行無悞時刻又查前次調遣内扎薩克䝉古官兵賞王貝勒俸一年各台吉銀一百五十兩章京銀一百二十兩副都統銀一百兩㕘領銀八十兩佐領銀六十兩驍騎校銀四十兩兵丁銀二十兩其鹽茶口糧及僕從人役悉分等支給此兵若有調遣請如前例賞給至移咨額駙䇿凌令其具奏俟奏到再議奏入得㫖依議速行尋䇿凌等奏言游牧處所撥防秋兵丁應令各游牧所在豫備每年六月該管盟長扎薩克等各令兵丁整頓器械候京城遣賢能大員七月初間徃勘再令六盟長屬下撥兵分二隊每隊以大銜扎薩克一人統之以西林郭勒烏蘭察卜伊克招三盟長兵為首隊招烏達哲里木卓索圖三盟長兵為次隊緩急有事一面具奏一面調遣令統領之人迅速率徃其每隊由某路入援之處臣等臨時酌定而行王大臣等議覆應如所請其請遣大臣徃勘每隊應遣大臣一員章京一員俟臨期令部臣開列侍郎副都統等職名奏請奏入得㫖内扎薩克等游牧處豫備兵丁最為𦂳要著今年即派大臣官員等徃勘餘依議尋命永興等前徃查勘六月甲戌命移呼倫貝爾駐兵家屬於鄂木博齊等處屯種將軍額爾圖奏言駐防呼倫貝爾之索倫達呼里巴爾虎兵向賴糧米度日而其地並無可耕又道通俄羅斯所闗𦂳要若令悉撤但以新兵守邊未協機宜臣等令㕘領那木求等相度附近并詢問衆兵並言惟興安山嶺之陽鄂木博齊及雅爾河鼐等處地勢寛平水草肥美既可屯駐兼宜耕種若使我等移居其地每年徃呼倫貝爾更番駐防甚便臣等議得呼倫貝爾兵二千名已撥赴軍營僅餘一千駐防不便更令他移請以三千兵丁之妻子盡移鄂木博齊等處居住耕種令總管一員率兵千人至呼倫貝爾防守俟軍營二千人撤還時仍令更代駐防總理王大臣議覆應如所請奏入得㫖著仍派塞楞額總管餘依議秋九月辛卯命哈岱來京上諭總理王大臣等曰軍營㕘贊大臣哈岱頗著勞績年老無子著調回京師其員缺著䕶軍統領馬尼補授前徃更換癸巳準噶爾回民米爾阿書爾來降命賞給安揷如例閏九月丙辰命侍郎杭奕祿等仍留駐西藏副都統納蘇泰奏言侍郎杭奕祿請撤駐藏兵奉㫖觀杭奕祿所奏貝勒頗羅鼐等深以内地之兵在藏駐劄於伊等有益前皇考特憫念唐古忒人衆恐内地之兵久經駐藏或有累伊等思欲撤回若果有益數百兵丁所費糧餉㡬何著將此駐防與臺站兵暫停撤回照舊換班駐劄俟一二年再定副都統納蘇泰徃駐日久著回京杭奕祿仍留藏與總兵官周起鳳一同駐劄辦事其應換部員筆帖式著該部派遣更替臣謹遵㫖於八月十五日即以印交杭奕祿九月初一日起程奏入報聞壬申命覺和托總管阿爾台軍臺白泰協同辦事辛巳準噶爾部人達什來降命賞給安揷如例冬十月丁未準噶爾部人䇿凌古爾巴納來降命賞給安揷如例庚戌命籌辦設厰牧馬事宜上諭總理王大臣等曰國家馬政最闗𦂳要必平時牧養蕃息斯緩急可以備用從前用兵之時需用馬匹俱發帑採買為數甚多且諸王等俱有進獻之馬近既撤兵此項馬匹未見下落即云每年有倒斃者亦不過百匹中數匹而已其應有之馬作何詳查辦理夫牧養馬匹必須經理得宜俾孳生繁庶日見其多方為有益然以無事之時而頻年飼養不特糜費國帑且恐畜養過多草料騰貴於兵民均有未便現今籌議馬政必經費有節而又孳生繁盛乃為䇿之善者其如何分設厰地牧放俾永逺有益之處著總理事務王大臣㑹同八旗大臣該部詳悉妥議具奏至於京師亦須用馬匹而厰地多在口外未免離京稍逺即如本年八月朕躬詣泰陵兵部奏請將京城八旗出厰馬匹調回應用夫以口外馬匹調至京城用後仍須發回則徃返之間已致疲乏又豈能濟一時之用乎附近京師如宻雲熱河諸處有可安設馬厰者亦宜酌議安設則調用更屬近便令諸王大臣等一併㑹議具奏十一月戊午定邊副將軍額駙䇿凌奏報鄂爾昆等處秋成收糧共五千四百四十五石有零得㫖下部知之壬戌準噶爾回民薩特竒率親屬五人來降命賞給安揷如例命額駙䇿凌及台吉額黙根來京先是額駙䇿凌令台吉額黙根等持答噶爾丹䇿凌書一通至準夷界上有達什敦多卜等接見同至卓索圖和碩見台吉徳齊特宰桑孟克博羅特告以來意徳齊特等即撥三十餘人令送徃伊犁額黙根告以奉命只令致書不便前徃㑹噶爾丹䇿零已先期遣博巴來迎遂於九月初七日至伊犁初九日見噶爾丹䇿零致書閏九月初四日噶爾丹䇿零告額黙根云有奏大皇帝一書又與車臣汗一書我遣宰桑達什博吉爾二人為使二十四人為從與爾同行遂於初五日起程十月二十日至布拉罕之察罕托輝額黙根馳驛先至軍營額駙䇿凌以聞且奏言前者與噶爾丹䇿零書原有如難於遣使當為代奏令爾使入京之語觀此次遣大宰桑前來定有求和之意可否令夷使進京又臣以年例當入覲夷使到時可否告以臣已奉㫖赴京即令使者來京如䝉俞允軍營印信應暫令何人署理伏候欽命奏入得㫖著額駙䇿凌率台吉額黙根馳驛來京副將軍印務暫令海蘭䕶理夷使達什等勿令窺伺軍營及䝉古游牧處導彼從口外行走并䕶送來京丙寅準噶爾部人䇿凌回民古爾巴勒來降命賞給安揷如例辛未命大學士鄂爾泰等仍辦理軍機事務上諭内閣曰昨莊親王等請裁總理事務辭意懇切朕無奈允行但西北兩路軍務尚未完竣朕日理萬㡬有時命就近交辦事件從前皇考時辦理軍機事務曾特派大臣今著大學士鄂爾泰張廷玉公訥親尚書海望侍郎那延泰班第照舊辦理十二月丙午酌定準噶爾使臣達什等至京事宜大學士鄂爾泰等奏言此次準噶爾來使達什博濟爾等到時請即引至圓明園宫門跪伏理藩院閲受表文幷貢物繙譯呈覽引來使至吏部朝房列坐賜食畢館之於聖化寺道經額駙䇿凌寓即令其遞送噶爾丹䇿零與額駙書所有給與來使食物器用夫役驛馬請悉如吹納木喀例令各處支給辦理奏入得㫖著台吉額黙根并派理藩院官一員馳驛前徃迎問達什來情伊等如係特差奏疏之人即照爾等所議接受奏疏如係差向額駙䇿凌處送書之人到時即帶徃額駙䇿凌住處呈遞來書額駙䇿凌看過所與伊書再接受奏疏轉奏餘依議乾隆三年春正月丁丑準噶爾使臣達什等至京進表先是辦理軍機大臣等奏言達什等至京其致額駙䇿凌書係答額駙前書之語謹先繙繹進呈至噶爾丹䇿零所上表文及貢物請於本月二十四日令達什等恭進奏入報聞至是理藩院導達什等至圓明園大門跪進額駙䇿凌受之繙繹轉奏表文曰準噶爾台吉噶爾丹䇿零具奏恭進大皇帝聖明雍正年間世宗憲皇帝與我父當日情事大皇帝既盡知之不敢復瀆陳近者屢欲遣使恭請聖安因前歲吹納木喀齎回勅書内有爾誠遵皇考前㫖定界則遣使來不然亦無庸復遣之諭竊思遵照大皇帝諭㫖我屬下人不得至阿爾台山實有未便倘冒昧陳請又恐有乖諭㫖勢不得已暫爾停遣去秋我邊界人言䝉古在我境内安設卡倫携二人來因念既不得遣使事又不容中止不若即藉此二人致書車臣汗令其轉達車臣汗報書令我繕奏遣使一切情事當代為詳悉具陳故今復遣達什等入奏向來阿爾台山本係我部游牧之地若盡令移住山陰恐地窄不能容納多人請嗣後喀爾喀與厄魯特各照現在駐牧無相掣肘庶㡬彼此兩安以廣黄教以息羣生伏祈大皇帝鑒憫隨表進貂皮三十一張奏入報聞命侍郎阿克敦等使準噶爾議界上諭軍機大臣等曰閲準噶爾噶爾丹䇿零遣使求額駙䇿凌轉奏之疏甚屬恭順其事有易竟之機可遣使齎勅前徃與噶爾丹䇿零將定界之事定議完結著侍郎阿克敦充正使御前三等侍衞旺扎爾乾清門頭等台吉額黙根充副使將應議事件皆明悉曉諭之即與準噶爾來使一同起程其帶領來使瞻仰之事應如何辦理幷著詳議具奏尋命阿克敦等各賞銀一千兩整裝命曉諭準噶爾使臣達什等上諭辦理軍機大臣等曰照看準噶爾來使仍派常明海望應賞物件著賞給曉諭來使前因爾等致書額駙䇿凌且稱另有奏摺是以令爾等至京照例給與口糧等物派章京等照看今據額駙䇿凌將噶爾丹䇿零表文轉奏大皇帝覽畢嘉與噶爾丹䇿零恭順故又特派大臣照看爾等戊寅命賞副都統達爾佳等辦理軍機大臣等奏言喀爾喀台吉額黙根與副都統達爾佳佐領烏巴什由額駙䇿凌處率兵丁十二人差徃準噶爾部還額黙根已䝉恩授頭等台吉其達爾佳及各兵丁等應否量加賞給奏入命賞達爾佳等銀縀有差命和托克等率兵赴鄂爾昆更代辦理軍機大臣等奏言駐防鄂爾昆東三省兵去年已代其半餘兵二千五百今年當代應撥東三省兵二千牧厰兵五百前徃東三省兵應以京城䕶軍統領等官二員率之牧厰兵應以奉天等處副都統一員率之謹開職名進呈奏入得㫖著和托克博秀管轄東三省兵和義管轄牧厰兵二月丙戌拉達克汗徳忠那木扎爾上表進貢命頒勅加賞以示奬勤駐藏侍郎杭奕祿等奏言貝勒頗羅鼐以額納特可克部落拉達克汗徳忠那木扎爾所上表文及貢物交臣轉奏查拉達克汗徳忠那木扎爾乃尼瑪那木扎爾之子父子並感國厚恩凡得準噶爾消息輙附頗羅鼐以聞自聖祖仁皇帝世宗憲皇帝數加恩賚今復進表貢物若更頒予勅命量施恩澤拉達克汗徳忠那木扎爾當益勸勉内向傾心矣辦理軍機大臣等議覆應如所請奏入命賜徳忠那木扎爾勅書一道加賞緞匹磁器有差甲午準噶爾使臣達什等入覲先是辦理軍機大臣等奏言噶爾丹䇿零使臣達什等請於本月初九日令其瞻仰天顏奏入得㫖報聞至是上御正大光明殿令達什博濟爾等入覲上諭達什等曰定界之事朕前降㫖甚明今以額駙䇿凌奏請故許見爾等噶爾丹䇿零奏章朕已觀覽其與額駙䇿凌書亦經奏聞奏内稱喀爾喀與厄魯特請悉駐牧如故彼此兩安庶㡬推廣黄教休養羣生伏乞大皇帝鑒憫觀噶爾丹䇿零此次奏言極其恭順有誠心求和之意朕甚嘉之爾等舉止亦謹慎可嘉但於分界之處仍未指明尚屬朦混䝉古游牧無常冬夏隨時遷徙若不指定山河為界日後邊人寧保無争乎必彼此各守其界無得踰越庶可永固和好若噶爾丹䇿零未嘗明諭爾等爾等自不敢擅議朕當另遣大臣前徃與噶爾丹䇿零詳悉定議又爾等曾告額駙䇿凌乞我國卡倫稍向内移卡倫之設由來已久於今豈得議移且噶爾丹䇿零奏中並未及此據爾等私見陳請不惟與噶爾丹䇿零所奏不符亦非爾等分所宜言也達什奏言此係噶爾丹䇿零口囑不然使臣等何敢妄言今大皇帝既許遣使自可與噶爾丹䇿零面議而定上諭曰爾漫云噶爾丹䇿零口囑便爾瀆陳若朕遣使至爾部彼不過遵㫖而言何敢於勅諭之外復増一言朕於中外共主無分喀爾喀與厄魯特咸一體視之並無欲益喀爾喀損厄魯特之意今噶爾丹䇿零請邊界人居住如故此事尚可俯允若乞我卡倫内徙殊未合理爾部邊界人且不肯移徙我聖祖暨皇考時舊設卡倫反可動耶朕於厄魯特尚無異視之心豈肯曲從爾意轉騷擾我喀爾喀乎凡事合於理朕無不允不然雖百請亦不允也朕即日遣使噶爾丹䇿零其遵㫖定議以固信好朕面諭之言爾等詳悉記憶歸告噶爾丹䇿零爾等臨行時朕尚有勅書付朕使者頒示噶爾丹䇿零知悉尋賜達什等銀兩緞布有差甲辰命甘肅提督李繩武赴哈宻駐防三月辛酉命海蘭管理烏里雅蘇台駐兵䕶定邊副將軍印海蘭奏報阿成阿病卒奏入得㫖烏里雅蘇台駐防兵丁即著海蘭管理俟額駙䇿凌到軍營日即起程前徃戊辰賜準噶爾台吉噶爾丹䇿零勅書奉天承運皇帝詔曰諭準噶爾台吉噶爾丹䇿零前歲爾遣吹納木喀來朕以廣教安民之故欲與爾議定疆界罷息干戈在朕寧有食言之理爾誠遵我皇考諭㫖以阿爾台山為分界止請喀爾喀游牧稍令移徙勿動原設卡倫朕尚可俯允降㫖指明喀爾喀游牧所止之處乃爾並不遵㫖反請以哲爾格西喇呼魯蘇為爾邊界如此則遣使何益故朕復諭以遵我皇考前㫖則遣使不然則無庸復遣使降㫖甚明此次爾令達什來致書額駙䇿凌又有進朕奏章乞額駙轉奏朕故召爾使入見又閲爾奏内云請令喀爾喀與厄魯特游牧俱照現在居住無相牽掣彼此兩安言亦近正但分界地名未經指明䝉古游牧無常冬夏隨時遷徙若不指定山河為界地日邊境細人或起紛争仍難要久以爾奏言恭順故朕特命大臣前來朕使到時爾與酌合機宜必使分界之事此次即得定議若仍不揆情理偏執己見托故推諉則於事無益即徃復遣使亦徒然耳朕為天下共主凡各部民人皆欲令其安生並無彼此異視之意果事屬兩便朕無不允若有一不便任誰奏請總無偏聴之理為此特降勅書命侍郎阿克敦侍衞旺扎爾台吉額黙根同爾使達什等前徃隨勅賜各色采緞十端命額駙䇿凌亦致書答噶爾丹䇿零隨書用各色采緞四端辛未恩䘏駐防哈宻提督樊廷上諭内閣曰固原提督樊廷領兵多年効力邊疆威勇素著前因駐防哈宻身患痰疾奏請解任調理朕心軫念令回固原之任并賞給參藥命太醫馳徃診視冀其痊可今見遺摺知病已不起而伊彌留之際猶於邊防事宜諄切陳奏披覽之下實不勝憫惻著大學士查郎阿經理其喪將柩送回内地并賞帑金五千兩為辦喪葬之用其應得䘏典該部從優議奏所有一等輕車都尉即令伊子樊經文承襲嗣後子孫仍准照世次襲職又伊奏稱父葬成都母葬涼州祖塋今一子年幼扶柩拮据難以逺赴成都懇請恩准葬於母墓之側等語著大學士查郎阿與伊子熟商如成都舊有產業或將伊母送徃合葬如不願逺赴成都即將伊父骸骨移至涼州葬於一處一切費用著大學士查郎阿於恩賜銀兩外另行賞給樊廷所奏邊防事宜著辦理軍機大臣定議具奏平定凖噶爾方略前編卷四十三
