body:
  text: 乾隆二十年冬十二月乙巳命遣人曉諭明噶特游牧人衆上諭軍機大臣曰從前班第等奏稱明噶特部落共二千餘戶數年以來屢被虜掠牲隻俱盡願自備資斧內移阿爾台地方居住因阿睦爾撒納阻止未行等語明噶特部衆現在何處伊等與阿睦爾撒納有隙必無從逆之事著策楞訪明游牧地方遣人通信令伊等擒賊自獻或𠞰殺與賊同黨之鄂拓克等並令其隨大兵效力於事有益即商同噶爾藏多爾濟等令其派明白可信之人前往曉諭其有似此等部落之人俱一一遣人曉諭使足供我臂指則賊勢愈蹙大兵一到即可集事策楞等務宜悉心籌畫設法辦理勿専恃朕指示遵行以副委任丙午參贊大臣玉保疏奏普爾普來告伊犁情形玉保奏言臣於十一月十七日至阿察喀喇烏蘇地方拿獲自伊犁前來克勒特宰桑巴桑之弟普爾普據稱阿睦爾撒納領兵千餘名在博羅塔拉居住另給兵一千名令巴特瑪車凌額林沁等於十一月初間起程虜掠諾爾布林沁游牧伊犁大喇嘛及宰桑烏克圖錫克錫爾格納延泰巴顔巴桑等皆言其負恩叛逆擾害地方議將阿睦爾撒納擒獻贖罪并送歸薩喇爾已於十月二十五日往闥勒奇嶺集兵遣我送信諾爾布林沁防備等語臣即將普爾普解策楞軍營令與諾爾布林沁詳加詢問奏入上諭軍機大臣曰據玉保奏稱所獲普爾普告知伊犁喇嘛等現在集兵擒獻阿逆以贖前罪等語準噶爾人等原屬反覆無常然尚知利害從前阿睦爾撒納詭言四衛喇特人衆皆其羽翼衆人不審虛實懼伊勢力脅從作亂後知諾爾布林沁出兵擊賊而北路發兵先遮賊人游牧不獲逃竄復𠞰滅包沁人等西路又將布庫弩牧等誅戮伊等聞風畏懼旋即知悔今伊犁喇嘛等知逆賊力不可恃共圖擒獻以贖前罪此非出於飾說乘此機會策楞等即應領兵直入責令伊等擒賊自效誅滅黨惡寬其脅從其勢更易且噶爾藏多爾濟等皆係該處大台吉其舊日屬人自必聞風來歸可以資其兵力若普爾普所稱阿逆派兵千名遣巴特瑪車凌等虜掠諾爾布林沁之語尚非實情不過伊等欲聨絡諾爾布林沁之意如果前來則大兵以逸待勞會同諾爾布林沁奮勇𠞰滅賊勢從此益孤更可計日就獲現在降㫖傳諭伊犁喇嘛等令其效力贖罪著加恩授普爾普為三等侍衛賞銀五十兩並派侍衛一員同伊前往伊犁宣㫖曉諭命傳諭伊犁喇嘛等效力贖罪上諭伊犁喇嘛等曰阿睦爾撒納負恩叛逆擾亂伊犁爾等畏其勢力勉强服從朕早已洞見情形昨聞宰桑錫克錫爾格不將副將軍薩喇爾遣送逆黨約蘇圖等具見誠悃已傳㫖曉諭今爾等自知前非俱欲擒賊自效遣普爾普告知將軍大臣等據實陳奏實堪嘉豫爾等果能洗心滌慮冀受朕恩即將逆賊擒送軍前不特寬宥爾等從前罪愆自當更加厚恩慎勿執迷不悟自取誅滅命免革巴里坤辦事大臣和起豆斌職上諭軍機大臣曰和起豆斌因從前辦理馬匹遲誤經部議革職仍留軍營效力行走本應如所議革職第念和起等此次辦理軍營糧餉馬匹尚屬無誤著免其革職從寬留任伊等邀恩寬宥宜益加意辦理倘再有貽誤斷不寬貸丁未定西將軍策楞疏奏㑹同諾爾布林沁進兵事宜策楞奏言臣㑹同諾爾布林沁令其派兵二千名於十一月初一日在特訥格爾華托羅海等處㑹齊進𠞰阿巴噶斯哈丹等游牧後因諾爾布林沁未能如期而至改於十一月二十日㑹合又因特訥格爾等處水草不足約至阿察地方㑹同進發現在帶兵前進奏入上諭軍機大臣曰據策楞奏稱在阿察地方㑹同諾爾布林沁進𠞰阿巴噶斯哈丹等及招服塔本集賽各事宜等語策楞等現在進兵甚合機宜惟從前因伊犁來人等告知喇嘛宰桑等圍困將軍大臣降㫖令將喇嘛等𠞰滅今伊犁喇嘛同宰桑烏克圖錫克錫爾格等請擒賊贖罪遣普爾普告知是其情尚可原策楞抵伊犁時著將喇嘛等寬宥以安衆心並責令其擒賊自效再約蘇圖尚在幼年未必有從賊之心不過聽察哈什指使察哈什斷不可容其餘如約蘇圖等尚可寬貸者著策楞等分别辦理戊申命曉諭中外西陲用兵始末上諭大學士曰阿睦爾撒納本一奸詭狡惡之人因數年來準噶爾部落篡奪相尋希圖吞噬而準噶爾台吉乃綽羅斯世傳伊係輝特勢不能遽行竊踞遂以達瓦齊為竒貨誘助攻殺伊得從中取事及達瓦齊既為台吉不遂所欲乃率衆來降彼時策楞舒赫德議留其丁壯於軍營而老幼婦女悉於歸化城安置朕為天下共主彼以窮蹙來歸而轉令妻子離散實所不忍且伊擁衆數千戶同來亦斷不肯聽其離析勢必肆出劫掠其為害於喀爾喀者甚大是以治策楞舒赫德之罪而召見阿睦爾撒納於熱河行在錫之封賞伊即面陳平定準噶爾方略準噶爾一事乃我皇祖皇考屢申撻伐未竟之緒本所當辦今既機有可乘自不容已而以夷攻夷非即用伊為先導不可是以即用為將軍然朕已早燭其未可深信故令額駙色布騰巴爾珠爾與之同行密降諭㫖阿睦爾撒納若實心出力可與之事權以誠感之若有反叛之狀則汝收將軍印便宜行事伊既向化而來朕即開誠布公實心相待加以厚恩伊亦人類寧不知感此上蒼所鑒臨初非術馭之利結之逆詐而豫圖之也逮伊犁既定朕降㫖封四衛喇特為四汗伊遂潛懷逆謀欲併準噶爾遣人至哈薩克揚言伊領兵平定伊犁而不云天朝大兵又托言哈薩克人衆謂非令伊為總台吉不可私調兵數千置將軍印不用用準噶爾台吉私印植黨修怨殘殺自恣六月班第等具以奏聞朕即降㫖令其即軍中拿問治罪班第等旋奏伊將遵㫖入覲朕召軍機大臣示以所奏機宜皆謂阿睦爾撒納自必前來瞻仰或慮其回巢後滋生事端耳而朕即豫料其必不前來是以復令班第等即於彼中相機從事若已起身在旬日內亦當追回迅速拿問蓋伊既懷叵測即詐稱入覲亦必於途次遷延若不早為完結必致生變與其俟伊交結煽動變遲而費大何如及時乘機辦理之為得也乃班第等奏稱已遵㫖遣人追取適有哈薩克使者同行恐其驚疑復將追取之人撤回獨不思哈薩克自大兵平定伊犁屢次遣使至營本極恭順且深悉阿睦爾撒納之反覆狡詐果正其罪亦何妨明切曉諭示以天討彼何驚疑之有此班第等未能遵㫖辦理自失機宜之大端也朕見班第等不能在外完結即料其至伊游牧地方必且竄匿必且潛取家屬因降㫖烏里雅蘇台軍營大臣令於撤回滿洲索倫兵內截留一千名往禦而阿睦爾撒納果密使人邀其妻子剋期奔㑹幸其所使班珠爾後期而我滿洲索倫兵已詰朝畢集遮留其妻子部衆無一人闌出者班珠爾等伎倆既窮始束身入覲仍計回時劫之以去此朕於熱河親訊時據班珠爾等一一供吐者若朕不豫為部署彼之家屬人衆安然逺揚豈不增其羽翼耶額林沁多爾濟我之扎薩克親王班第等以其老成可任令與阿睦爾撒納同行乃齊木庫爾既密告其弟逆謀已著速當擒戮而恬不知警但答以我單親王彼雙親王不敢便宜從事夫既為國家叛賊尚何雙親王之足論及阿睦爾撒納繳授將軍印信令伊先行尚不覺悟逾日乃知其遁去始以兵追捕而已無及矣此又自失機宜之一大端也班第鄂容安薩喇爾駐劄伊犁受心膂之寄當聨為一體乃班第為人過於謹慎氣局狹小好親細事鄂容安雖尚知大體而不能通䝉古語一應機密籌畫未能洞悉頗有漢人習氣至薩喇爾之在準噶爾譬之內地王府長史護衛者流耳今雖授以顯秩彼衆原所不服而伊復粗率自大三人者性習各殊安望其能和衷共濟重以阿睦爾撒納之奸其所不恱盡遣入朝三臣之左右皆其黨與三臣深信不疑疏於自衛兵散處馬逺牧而軍營金帛茶布以備賞賚者夷衆耽耽以視班第等初不介意即如敦多克曼集乃阿睦爾撒納所信用班第等一聞搶掠臺站之信即應立為擒戮以剪其瓜牙乃轉令傳諭喇嘛安撫夷衆敦多克曼集因得召集羣凶操戈相向三臣倉卒衝突賊衆大集勢不能支班第鄂容安捐軀以殉薩喇爾被執令班第鄂容安見機明決早為之計安得至此此二臣之殞命種種皆由自誤無所歸咎而朕用人失當之誤亦無可辭也所可異者阿睦爾撒納之狂悖情形色布騰巴爾珠爾在軍營時皆所深悉且曽受朕密㫖防範者乃毫不加察反為所愚與班第等如水火朕是以命其來京乃在朕前仍無一言奏及伊親為額駙位列藩王豈其與逆豎同謀實可信其必無特年少無知初不料其至此也至永常以領兵大臣駐守烏魯木齊聞臺站被掠初以為窮夷自相攻劫奏請帶兵追逐意尚近於勇往即加內大臣銜以示鼓勵及聞阿睦爾撒納逃叛較畏葸乖張甘心僨事退回巴里坤而置伊犁於度外設令永常當葉克明安宰桑扎木參等叩轅請告之時厲兵迅往諸部得所依倚協力搜捕阿睦爾撒納孑身逋軼可計日就擒西陲已早安帖無事如北路之殱滅包沁是其明驗也若以為臺站已斷難於前進則現在策楞與噶爾藏多爾濟之子諾爾布林沁又何以能偏師罙入振我軍威而伊犁之喇嘛宰桑等皆聞風內嚮悔懼自新願率衆追捕叛逆以贖前愆耶策楞既能奮勉以蓋前愆爰授以定西將軍而永常之罪不容誅今雖死於道路亦當明正典刑總之此事諸臣昧於機宜節節貽悮然其中蓋有天意何則朕思阿睦爾撒納雖傾險反側但當伊犁甫定衆或以其為國宣勞而一切罪狀惟軍營大臣見之朕及軍機大臣知之天下後世不盡知之也又設使其遵㫖入覲朕為久逺計本欲宣播其奸拿問治罪然無知者猶將有鳥盡弓藏之議是今日之逆跡彰露使人人知其必不可不誅未必非上蒼之默啓之也人情樂於觀成難與謀始上年定議用兵舉朝率多疑議及伊犁平定則以為事出意外聞阿睦爾撒納負恩逃叛又以為究不可辦且以為此固當然今聞伊犁宰桑悔罪擒賊或又以為恐未必然人心風俗一何怯懦至此此朕所以愧且懼也班第鄂容安見危授命固為可憫然於事無補迥非傅清拉布敦之殞身西藏為國除凶者可同年而語然一死已足自贖班第誠勇公爵仍著加恩令伊子巴祿承襲鄂容安襄勤伯爵著該旗帶領伊子引見令其承襲朕於軍國重務一本大公隨機順應順者嘉與之逆者誅討之奮勇者奬勵之怯懦者罰殛之惟準乎事理之當初非窮兵勤逺亦不至耗財重費合計現在軍需較之雍正年間所費不及六之一而偏灾賑恤與夫中外賞賚初未因軍興稍有裁損此王公大臣等所共知者彼妄生異議者誠何心耶將此事顛末並在事諸臣功罪宣諭中外知之臣等謹案西陲用兵始末我皇上淵衷默運上審天時中權人事旁灼物情莫不哲炳先幾神周獨斷是以規畫所及微特衆人不能窺尋萬一即身司其事如軍營大臣日賴廟謨指授其間克副稟承者固無不功立效隨捷於影響設當機領悟稍遲未獲投時赴㑹已不免毫釐千里之失此皆成蹟瞭然可指而數至臣等昕夕禁廷跪聆密勿每值羽郵進御仰荷訓示精詳並奉溫㫖垂詢參核臣等輒或扞格一時未即㑹心窽要逮乎事機顯著乃知聖明一一早為照燭如操左劵如數前籌實無由上測髙深也詩曰先民有言詢于芻蕘又曰如彼築室于道謀是用不潰于成蓋聖人於輿情日用之恆無一事不虛公博採以資集益若國家軍行至計所在則自古以為非常之原藝藝者流狃方隅末見豈易與言發謀慮始故築室之戒持之不得不堅其義政與先民所稱交引互發於此益信我皇上建從來未有之膚功先擅從來未有之睿算又豈方策中韜鈐智略所可少參擬議者哉諭定西將軍策楞安撫伊犁事宜上諭軍機大臣曰春間曽降諭㫖平定伊犁後將四衛喇特及各鄂拓克人衆編為旗分佐領其宰桑即都統職銜得木齊即佐領職銜收楞額即驍騎校職銜與準噶爾舊銜無異原屬易於遵行但此時尚可毋庸辦理現在進兵凡投誠之台吉宰桑等著策楞即速奏聞朕當酌量賞以品級職銜俟明年來京入覲再行封授準噶爾人等不知約束易生疑惑策楞至伊犁後諸凡條例務須簡易明白便於遵行不必似內地之詳密使伊等手足無措方為妥協至貢賦一項準噶爾連年不靖近又遭阿睦爾撒納滋擾疲弊已極今年貢賦著加恩寬免自明年為始減伊等原納貢賦之半徵收此項仍為賞給彼處衆人俸祿及養贍喇嘛之用著策楞詳細曉諭伊等知悉辦理大局已定其餘事務暫留玉保厄爾錐音等在彼辦理策楞著帶尼瑪哈薩克錫喇吞圖布恩克博羅特等三人同至京師詳細籌畫再行辦理其伊犁從前原議駐兵五百名今亦毋庸增添仍照舊數派索倫兵五百名駐劄惟兵丁馬匹須在一處如䝉古游牧人等庶可以資防守其議遣濟隆胡土克圖前往伊犁之處宜詳察彼處喇嘛等情形再行遣往著策楞訪問厄爾錐音等具奏此等事宜雖尚可緩亦須豫為籌及策楞等務期于事有益隨宜妥酌辦理定邉左副將軍哈達哈等疏奏防範烏梁海事宜哈達哈等奏言臣等奉到諭㫖令會同青滚雜卜商酌防範收服烏梁海事宜適青滚雜卜來至布延圖軍營臣與之商議據青滚雜卜告稱新收汗哈屯烏梁海等愚蠢無知經阿睦爾撒納遣人唆誘不可不留心防範已令郭勒卓輝等由烏梁海得木齊內選派數員帶兵駐劄哈道里等處瞭望遇事即行傳報其額爾齊斯地方有郭勒卓輝屬人博博等一百戶尤屬可疑且去宰桑處甚逺難於約束並諭令郭勒卓輝將伊等內移以防逃竄所有新收烏梁海等現在俱行加意防範奉入報聞庚戌諭山西巡撫恆文採辦商駝上諭軍機大臣曰據明德奏稱西路軍營駝隻現在陜甘二省採辦尚未充裕晉省歸化城朔平一帶商販駝隻甚多請敕下該撫採辦等語著傳諭恆文在該省商販駝隻內採辦一二千沿邉解送肅州聽用辛亥議安插噶爾丹達爾扎等軍機大臣奏言臣等詢問台吉噶爾丹達爾扎濟克濟扎卜等舊住青海因羅卜藏丹津謀叛移住喀爾喀後為茂海策凌等逼勒同逃準噶爾地方大兵平定伊犁經將軍班第等查明給與户口交與侍衛瑪瑺帶領入覲中途為呼爾璊台吉達瓦屬下搶掠今將軍策楞進兵達瓦屬人仍將伊等送回應請㫖發回喀爾喀游牧居住奏入上從之定西將軍策楞等疏奏遣人曉諭伊犁喇嘛等各事宜策楞等奏言臣等將普爾普所告伊犁喇嘛宰桑等擒賊自效情形詢之諾爾布林沁諾海竒齊克等俱云此係實在情形並無可疑宰桑烏克圖人甚明白係噶爾丹策零時舊人伊犁擾亂時並未附和從賊此次遣人前來告知亦必出伊定見等語臣即令諾爾布林沁等寄信各喇嘛宰桑知悉現在大兵進發額林哈畢爾噶各台吉宰桑等俱派兵隨行擒𠞰逆賊伊等果能擒賊來獻自當奏聞加恩若所信不實即用兵𠞰滅遣得木齊德訥克同策卜登前往曉諭並將皇上軫念將軍及曉諭準噶爾部衆各諭㫖齎往宣示又據普爾普告稱現在額林哈畢爾噶一路不便行走須由烏魯木齊取道吐魯番從朱爾都斯前進方為妥協照伊所所請前往臣並將奉到諭㫖會同諾爾布林沁等剋期𠞰滅阿巴巴噶斯等游牧事宜與諾爾布林沁等商議據稱前因伊父遣人告知靜候將軍大臣等到時商議是以未即派兵同來今現擬將附近之布魯古特呼爾璊各處兵丁先派一千餘名於十二月初五日齊抵軍營俟其到時臣即於初七日領兵前進奏入報聞定邉左副將軍哈達哈等疏奏換易烏梁海馬匹事宜哈達哈等奏言臣等遵奉諭㫖與青滚雜卜及察達克等商議换易烏梁海馬匹事宜據察達克告稱新收烏梁海等約可換馬一千匹但䭾載物件往彼換易路程較逺請將茶煙緞匹等項運至吹地方彼處離汗哈屯游牧甚近臣即派察達克等前往辦理計換馬一匹給與物件運價約銀七兩五錢其舊厄魯特貝子明楚克公丹拜及青滚雜卜所屬烏梁海等亦可購馬一千匹請每匹給與價銀七兩五錢即交青滚雜卜派人辦理再從前禁止烏梁海等在卡倫附近交易恐其滋生事端今伊等感激天恩誠心歸順請嗣後每年或一次或二次令䝉古商人等䭾運物件換易伊等牲隻即在吹地方交易似于彼此有益奏入報聞癸丑命賞給都爾伯特游牧人等籽種糧石上諭軍機大臣曰舒明奏稱都爾伯特汗策凌等告知伊屬人等生計稍艱請將游牧移至額克阿喇勒等語伊犁平定後原議定伊等遷至舊游牧額爾濟斯地方居住若額克阿喇勒則附近卡倫遷往居住事屬可行著照所請即於今嵗遷往彼處游牧俟擒獲阿逆後仍令伊等遷至額爾齊斯路更近便倘有派伊等兵丁之處即由彼派往諸事易於辦理等凌等既稱在推河地方生計稍艱著賞給籽種六百石交與恆文等運至額克阿喇勒地方務於明年三月內運到使伊等得以及時耕種毋致遲誤又據納穆扎爾奏稱輝特和碩特人等現將牲隻在塞楞額鄂爾昆等處換易籽種等語輝特和碩特人等今嵗自軍營回來又向塔米爾扎卜堪往返遷移牲隻疲瘦不必令其換易亦著納穆扎爾查明應需籽種若干石行文恆文處支領賞給以示體恤至策凌等從前騎䭾前往軍營之馬駝現在應行交納但念伊等往返軍營牲隻不無疲瘦著寬限二年陸續交納參贊大臣富德疏奏噶爾藏多爾濟等赴軍營日期富德奏言臣帶領噶爾藏多爾濟等至巴里坤遵㫖換給伊等馬駝并賞給台吉宰桑等緞匹及兵丁銀兩伊等感激奮勉議定於十一月二十四日自巴里坤起程前赴軍營旋據巴雅爾告稱自巴里坤第三臺廋集地方離伊游牧甚近擬先往備兵且與和通鄂勤商議寄信額林沁令其擒獻阿睦爾撒納即令伊等前行又於十一日三十日接到策楞咨稱普爾普來告伊犁衆喇嘛宰桑等情願擒賊自效情形臣即曉諭各台吉宰桑伊等更覺踴躍據噶爾藏多爾濟告稱現在已到伊所屬扎哈沁地方既有此信應即先往游牧整齊兵馬速行進𠞰等語亦照伊所請派營總巴雅爾等同伊前往臣亦帶領官兵尅期前進奏入報聞乙卯恩賞布庫努特等口糧上諭軍機大臣曰據和起等奏稱派出隨同吞圖布進兵之布庫努特兵二十名現照達什達瓦屬人之例賞給口糧馬匹等語前據吞圖布稱伊布庫努特人衆共九十餘戶酌量可選兵七八十名今僅用二十人殊屬太少著再選派六十名令其帶領前往此項布庫努特等九十餘戶早經投順從前永常未經奏聞是以未及施恩除揀派兵丁給與馬匹口糧外其餘人等俱著照達什達瓦屬人之例一體賞給口糧以示優恤命定西將軍策楞確勘錫克錫爾格擒賊自效情形上諭軍機大臣曰詢問侍衛滿楚知錫克錫爾格將薩喇爾羈留加之困辱情形甚屬可惡昨據策楞等奏稱伊犁喇嘛及錫克錫爾格等情願擒賊自效曽降㫖宥伊等罪愆現在大兵進發伊等果擒獻首惡悔罪輸誠尚屬可恕若因力不能支始將阿逆獻出希冀邀恩則非出於本心應仍將錫克錫爾格拿解來京治罪綽羅斯台吉達什達瓦妻車臣默爾根哈屯遣宰桑鄂齊爾入覲命授鄂齊爾為散秩大臣賞銀五十兩衣一襲丙辰駐劄巴里坤辦事大臣和起等疏奏副將軍薩喇爾遣人報知伊犁情形和起等奏言十二月初五日副將軍薩喇爾遣伊兄布林及察哈爾藍翎侍衛那木查爾等帶領和碩特台吉諾爾布敦多克來使鄂爾竒木濟烏魯特來使鄂斯庫綽和爾來使韋諾克克勒特來使齊木伯爾和碩特台吉圖們來使烏特巴拉等五人至巴里坤告稱八月二十四日宰桑克什木敦多克曼集等作亂薩喇爾及布林那木查爾和通鄂勤等衝陳力戰至二十六日夜為宰桑錫克錫爾格所執看守六十日後準噶爾台吉宰桑喇嘛等感慕天朝威德自知罪愆共怨恨阿睦爾撒納反覆叛亂商同擒賊自效現聞阿睦爾撒納同台吉額林沁舍楞在博羅塔拉道都托羅海地方居住各領兵前往擒拿薩喇爾同公丹拜藍翎侍衛和通鄂勤宰桑約蘇圖錫克錫爾格巴桑等帶兵三千餘名在博羅布爾噶蘇進發台吉諾爾布貝竒宰桑烏克圖等帶兵三千餘名在闥勒竒嶺進發於十一月初九日在托和木圖㑹集俟擒獲時交薩喇爾解送因各遣使人齎準噶爾喇嘛等奏書前來並請入覲天顔等語臣即將布林等及來使五人派員馳送京師伊等並稱由吐魯番一路前來是以行文北路將軍大臣一體豫備奏入上諭軍機大臣曰和起等奏薩喇爾同準噶爾台吉宰桑等議擒阿睦爾撒納來獻等語薩喇爾駐劄伊犁倉猝遇賊班第鄂容安捐軀盡節伊為賊拘留自必愧恨然因兵少力弱中賊詭計非伊無能被執今伊感念重恩㑹同伊犁衆台吉宰桑等分路領兵期獻逆賊是其誠心奮勉終始不渝朕聞之實深嘉豫轉復為之惻然著策楞𫝊㫖慰勞並將荷包鼻烟壺各一件俟薩喇爾至軍營時即行頒賜其宰桑烏克圖等原係歸誠之人曽降㫖給與職銜止因阿逆從中煽惑伊等勉强服從今既悔罪輸誠擒賊自效俟拿獲阿逆後將伊等悉行寬宥並當從重施恩發往荷包鼻烟壺各十五件將現在效力之宰桑等遍行賞賜策楞等詳悉曉諭伊等知之又諭曰薩喇爾原係厄魯特之人叩關投誠甫及五年隨圍出兵奔走幾無寧嵗前此命其同駐伊犁亦因伊熟彼地情形耳及阿逆背叛生變班第鄂容安捐軀盡節而薩喇爾衝陳突出其後力窮被執拘留所以不加深咎者誠以厄魯特風俗原不知致身大義未可以世受國恩之滿漢臣子相提並論初非朕之溺愛厄魯特而然也拘方之士或將謂三人同駐伊犁彼二臣臨危致命而伊乃靦顔就執其偷生負國斷難姑容如此則是以祖父世臣受恩深重明於大義者為比未免過於求全責備而其視薩喇爾為過髙矣夫責人易而當局難平居議論誰則不能獨不思身當其境可深信其能引決就義如班第鄂容安之為者恐亦未能多得也俟阿逆擒獲之日朕自分别功罪另降諭㫖恐無知之人但有所聞輒生異議並未深悉事理一味隨聲附和澆風陋習不可不亟為挽回特曉諭知之丁巳命定西將軍策楞等查辦伊犁陷賊人員上諭軍機大臣曰阿逆背叛時侍衛官員隨將軍等駐劄伊犁有陳亡及自盡者著策楞抵伊犁後查明請㫖加恩其未能死節被賊羈留者雖俱不能無罪但因留兵不多倉猝被難非昔年和通呼爾哈淖爾臨陳被執者可比有自行投到及查出者俱著從寬免其治罪遣回京師命封和碩特台吉諾爾布敦多克公爵上諭軍機大臣曰和碩特台吉諾爾布敦多克奏稱伊父羅卜藏車凌從前久欲投誠因在噶爾丹策零時未獲率衆前來今年進兵班珠爾又將伊屬下人等占據等語頃諾爾布敦多克之子鄂齊爾赴熱河入覲加恩封賞令同噶爾藏多爾濟等赴軍前效力今諾爾布敦多克㑹同薩喇爾領兵擒拿阿睦爾撒納誠悃可嘉著施恩封諾爾布敦多克為公所有班珠爾占據伊舊日屬人著策楞即行查明給還戊午諭定西將軍策楞進𠞰博羅塔拉事宜上諭軍機大臣曰據策楞奏稱此時前往伊犁尚非急務大兵進發即向博羅塔拉迎赴薩喇爾擒拿阿逆並將助惡人衆悉行𠞰滅等語所奏甚合機宜惟辦理助惡人等尚當示以區别如阿巴噶斯哈丹察滚德濟特敦多克曼集等固屬罪無可逭若巴特瑪車凌額林沁二人甫從哈薩克前來且額林沁素與阿逆積有讐隙或能協力擒拿更當格外寬宥至宰桑約蘇圖年幼無知不過為賊所誘前曽降㫖令將厄爾錐音哈薩克錫喇尼瑪約蘇圖俱授為圖什墨勒內大臣今約蘇圖已協同薩喇爾前往擒拿逆賊著策楞傳傳㫖補授其巴特瑪車凌等亦著策楞到日詳察情形奏聞請㫖命定西將軍䇿楞查辦達什敦多卜上諭軍機大臣曰據哈達哈奏稱都噶爾屬人敦多克告稱阿睦爾撒納遣宰桑色克色烏勒木齊等將達什敦多卜游牧遷去伊獨逃出來歸等語達什敦多卜係獲罪被擒之人未經治罪授伊為侍衛又賞給副都統職銜遣往軍前效力如遇阿睦爾撒納以兵力威逼不得已而脅從尚屬可恕若僅遣人傳喚即行明係有心從賊即應重治其罪著策楞至伊犁查明確實伊果遷移他處隨同阿逆行事著即將達什敦多卜拿解京師正法命齊木庫爾之子策布登多爾濟襲封郡王上諭軍機大臣曰齊木庫爾自歸誠以來感戴朕恩實心效力豫將阿逆謀叛情形告知軍營大臣並率領輝特人衆內附誠悃可嘉是以施恩封為郡王今聞溘逝深堪憫惻著賞銀一千兩料理喪事並加恩將伊子策卜登多爾濟承襲郡王兼管輝特盟長事務伊年幼不能獨辦著授普爾普為副盟長協同管轄又諭侍郎納穆扎爾曰齊木庫爾病故伊子策卜登多爾濟年幼恐不能約束衆人而其部落自普爾普外亦更無人可用是以授策卜登多爾濟為盟長即以普爾普為副協同辦事但普爾普不可深信若有妄行之處當示以節制著納穆扎爾加意防範又不可少露形跡使其生疑癸亥命奬賞貝勒車木楚克扎布等上諭軍機大臣曰據策楞奏稱現令玉保車木楚克扎布阿敏道等帶領兵丁一千一百名前進其餘辨兵策楞等隨後繼進於初七日起程其厄魯特台吉惟唐古特諾海竒齊克等數人前來餘皆未到等語今伊犁台吉宰桑等俱欲擒賊自效事機順應大兵自宜速進策楞等不俟厄魯特等兵到自行進發甚合機宜看來不必藉厄魯特兵力即可𠞰滅阿巴噶斯等助惡人衆惟在策楞等加意奮勉迅奏膚功至貝勒車木楚克扎布自去嵗即在軍前效力近又同𠞰布庫努特頗著勞績公旺布多爾濟隨伊父軍營行走始終不懈今並在哨探隊內行走實屬奮勉可嘉著加恩賞給車木楚克扎布三眼翎旺布多爾濟孔雀翎以示鼓勵諭駐劄巴里坤辦事大臣和起等上諭軍機大臣曰據和起等奏稱從前自伊犁前來之喇嘛達木巴達爾扎跟役薩喇那奔一戶現在逃竄等語此數人雖已逃竄尚屬無關緊要但駐劄巴里坤之厄魯特等甚衆達什達瓦屬人亦不下數千豈可轉相效尤任意逃竄此項人等係安插在卡倫之內抑或在卡倫之外如在卡倫內則何以無人覺察任其脫逃即在卡倫以外亦應有防範之人著和起等查明奏聞再前曽降㫖令公納噶查等帶領達什達瓦屬人及額敏和卓回人前往阿克蘇城嗣又降㫖停止此項回人業經賞給製裝銀兩此際應已抵巴里坤若即令撤回徒勞往返現派達什達瓦人等隨營效力巴里坤所有馬匹如可辦給回人乘騎即令伊等一同馳赴軍營接續大兵亦屬有益著和起等酌量辦理並傳諭策楞知之甲子命各省提鎮稽察臺站上諭軍機大臣曰軍營文報關係緊要從前特派大員督察以専責成今據黃廷桂奏稽察臺站不若責成沿邉提鎮等語沿邉臺站多屬營辨馳送責成提鎮稽查實為妥便著照所請派沿邉各提鎮不時往來查察勿致稍有玩悮其直隸山西亦著各提鎮就近督察命籌辦買補馬匹事宜上諭軍機大臣曰據黃廷桂奏稱西安滿營等摘缺馬匹在歸化城購買山西綏逺城右衛撥馬三千匹亦陸續買補一時同購必致難於採買等語現在西路用兵陜甘調缺營馬亟須購補著照大學士黃廷桂所奏先儘西安滿營各處應需馬數速為買足其綏逺城右衛應補馬匹不必同時購買乙丑諭定西將軍策楞安置唐古忒事宜上諭軍機大臣曰據策楞奏唐古忒告稱哈薩克錫喇遷至哈卜塔克拜塔克等處居住意似觀望又準噶爾人衆俱有望諾爾布林沁為台吉之意似皆唐古忒揑飾之詞已經明白開導並曉諭哈薩克錫哈等語唐古忒如此陳告特因伊係阿睦爾撒納族人今在額林哈畢爾噶居住衆皆不恱伊欲藉此傾軋即如從前恩克博羅特亦謂唐古忒全無踴躍從征之意不若將伊游牧附近馬匹牲隻全行收取盡將其丁壯攜至軍營使伊不得妄有異志等語曽告之扎拉豐阿看來明係伊等互相猜疑彼此告訐之詞全不足為據試思噶爾藏多爾濟荷朕深恩哈薩克錫喇乃係阿逆仇人必無從賊之事策楞以噶爾藏多爾濟哈薩克錫喇必無異志曉諭唐古忒並將此情節行知哈薩克錫喇甚合機宜現在唐古忒隨同進兵著留心查察事竣後若仍將唐古忒安置額林哈畢爾噶殊屬未便並著策楞存記俟彼時另指一地方安插唐古忒游牧命傳諭噶爾藏多爾濟上諭軍機大臣曰據扎拉豐阿奏稱噶爾藏多爾濟之子諾爾布林沁於十二月初七日病故等語諾爾布林沁年幼而甚奮勇前緣伊父入覲獨駐游牧頗著勤勞是以加恩封為郡王今聞病故深堪憫惻著賞銀一千兩用示優恤並傳諭噶爾藏多爾濟不必過於傷心此時若尚未同策楞帶兵前進暫令在游牧休息俟料理伊子事畢再行續進平定準噶爾方略正編卷二十三
