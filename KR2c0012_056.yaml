  text: 欽定四庫全書平定準噶爾方略正編卷二
  hash: sha256:7b8ac324f07e0f113412766ce89a43ac91614dd8dbeb19611649ec25f554af60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_056-1a, image: WYG0358/WYG0358-0021a.png}
body:
  text: 乾隆十九年春三月壬子尚書舒赫德等奏辦烏梁海事宜舒赫德等奏言臣等前令烏梁海宰桑都塔齊前往招諭準噶爾烏梁海今據都塔齊告稱二月初十日曾到準噶爾烏梁海宰桑瑪濟岱家據伊告稱此處所住烏梁海聞喀爾喀兵來將擅入卡倫之人擒去又聞將在科卜多河所住之人逐往阿爾台以外又因都爾伯特達什之子訥默庫等與阿睦爾撒納一同逃來將烏梁海宰桑博貝屬下之人搶虜今若帶我等人户往阿爾台以外雪大不能前往又正當阿睦爾撒納來路是以過唐努山往汗哈屯郭勒阿勒坦淖爾吹巴斯庫斯與俄羅斯連界地方居住查臣等前令和托輝特公青滚雜卜現帶伊旗下兵出伊都克卡倫就近驅逐烏梁海今觀瑪濟岱之言東北之烏梁海俱已遠徙但不知真假今令青滚雜卜暫停進兵先遣人往探烏梁海蹤跡果係過阿爾台唐努山是實然後撤兵如仍在阿爾台唐努山左近即行驅逐奏入上諭之曰據舒赫德等奏稱準噶爾烏梁海等已遠過唐努山徙至俄羅斯接壤地方居住再阿睦爾撒納與達瓦齊搆釁阿睦爾撒納同訥默庫等俱欲前來投順現在阿爾台雪大阿睦爾撒納未得前來等語烏梁海等現在被逐在阿爾台以外而又遇堵禦來投之阿睦爾撒納無處容身前往潛避至唐努山阿勒坦淖爾等處已屬窮困烏梁海人惟恐令伊遷徙耳今如准其投順後每年進貢減半不令遷徙自必傾心歸順前已降㫖令薩喇爾辦理著將此㫖仍交與薩喇爾等遵照曉諭妥協辦理癸丑尚書舒赫德奏報薩喇爾現在卓克索招降烏梁海今於二月二十四日臣舒赫德等亦赴卓克索㑹辦臣玉保往台吉策凌等游牧處辦理分立旗分編設佐領事務奏入報聞恩賞投誠台吉策凌等籽種羊隻有差上諭軍機大臣曰據舒赫德等奏稱投誠策凌等馬駝俱已疲乏而帶來牛羊亦屬無幾應令就近在推河拜達里克庫爾竒勒等處暫行種地游牧令麒麟保等於通肯呼裕爾等處可否居住之處查明再行移住等語策凌等始從遠處投降所有駝馬俱已疲乏若遽令遷移遠處駐劄殊非體恤之意應如舒赫德等所奏本年策凌等在推河拜達里克等處可以種地之處居住應需種地籽種令玉保麒麟保酌量向歸化城地方取用賞給至通肯呼裕爾等處應否可以居住之處俟查明具奏再行酌定並著賞給策凌策凌烏巴什羊各五千隻策凌孟克羊三千隻以資養贍乙卯恩賞附近臺站供應馬匹䝉古人等上諭軍機大臣曰北路軍營往返差人送事驛馬不敷例應就附近䝉古等馬匹應用此時差往軍營之人稍多臺路附近䝉古等各備馬匹供應公事勤勉可嘉應加恩鼓勵著派副都統富德往返巡查戶部派員備持布匹茶葉酌量加恩賞賚以示優恤丙辰命公策楞赴軍營辦事侍郎兆惠協理一切事務舒赫德成衮扎布薩喇爾來京面領諭㫖喀爾喀親王額林沁多爾濟管理喀爾喀兵丁事務貝子車木楚克扎布公齊旺隨同策楞等辦事戊辰命移軍營於烏里雅蘇台上諭軍機大臣曰前因軍營無事額駙策凌年老就近以塔米爾作為軍營今有辦理烏梁海之事軍營應移駐烏里雅蘇台以塔米爾作為內地從前驛站設自推河至塔米爾今軍營既移至烏里雅蘇台自推河直抵烏里雅蘇台為便著傳諭舒赫德成衮扎布將遷移驛路自推河直抵烏里雅蘇台之處定議辦理再軍營現貯米石亦著查明若添兵二三千名酌量支給足敷幾年之用一併具奏嗣經舒赫德等議於塔米爾鄂爾昆二處所存銀米軍器等項內將應運之物派參贊大臣安崇阿原任巡撫永貴運至烏里雅蘇台鄂爾昆塔米爾所有緑營參將守備千總各一員把總三員兵三百名俱移駐烏里雅蘇台大營再查前因以塔米爾為軍營派參贊大臣一員給與印信駐劄烏里雅蘇台今大兵既駐烏里雅蘇台所有參贊大臣印信應暫行收貯俟辦理諸務既畢將參贊大臣移於卓克索等處展界駐劄另行定擬辦理至遷移軍臺查自張家口至鄂爾昆臺站四十四臺自鄂爾昆至烏里雅蘇台設立喀爾喀臺站十八處今軍營既在烏里雅蘇台臺站可直抵軍營道里較為直捷自張家口至烏里雅蘇台道路今計現設臺站數目與應移臺站數目正足相當現派侍衛六格等及喀爾喀臺站台吉等查明舊設臺站地方及移設臺站由何處安臺應添喀爾喀官兵若干之處詳細查明酌量辦理再查軍營存貯米石現存米一萬五千餘石大麥四千九百餘石臣等現議喀爾喀官兵停其支給米石全給羊價銀兩約略計算若添兵三千名尚足敷一年有餘支用奏入報聞壬申準噶爾烏梁海額楞塞爾來降命賞給安插如例癸酉上諭軍機大臣曰昨經降㫖揀選察哈爾八旗兵五百名令侍衛永柱總管阿敏道帶往軍營調遣看來尚不敷用著再派侍衛薩木都卜前往察哈爾地方㑹同總管等於八旗兵內再行揀選五百名即令薩木都卜帶往軍營甲戌上諭內閣曰朕於五月初六日起鑾往熱河七月初五日由彼起鑾巡幸吉林所有軍營應奏事件若照舊例仍進張家口出古北口行走紆回徒勞驛站馬匹著派富德達松阿等自張家口外第三四站起察看情形酌量定議安設臺站直抵熱河以便馳送軍營事務命定議防秋事宜舒赫德等奏言準噶爾頻年內亂至今阿睦爾撒納等相爭未定雖無力侵犯喀爾喀地方而防守不可稍疏臣等公同詳議現今烏里雅蘇台地方駐兵三千名俱經遴選皇上又發察哈爾兵五百名前來由此項兵內及新到察哈爾兵揀選二千名於五月初十日內外每人給馬三匹令臣薩喇爾努三貝子車木楚克扎布沙克都爾扎卜公青滚雜卜恭格敦丹等與薩木都卜公同帶領由控圭一路緩行牧放進至卓克索查驗準噶爾烏梁海如來至阿爾台以內舊游牧地方即速前進或用招降或行驅逐遵奉屢次諭㫖悉心辦理外計烏梁海事竣之後正防秋緊要之時卓克索等處當庫列圖衝要之路將此二千兵即尋卓克索以內控圭等路駐劄防秋再派參贊大臣安崇阿副將軍貝勒策登扎卜領兵一千名駐劄庫克嶺等處防守索勒畢嶺布拉罕路其餘兵五百名並常駐劄烏里雅蘇台兵一千名令參贊大臣烏爾登帶領輪班喀爾喀大員總辦兩路一應卡倫事務其每年應派防秋兵三千名停止駐劄鄂爾昆等處臣舒赫德成衮扎布親率喀爾喀郡王桑寨多爾濟貝勒策卜登車蘇隆公齊旺等駐劄塔米爾烏里雅蘇台中間鄂爾海喀喇烏蘇等處接應各處之兵相機而行此項兵丁俱令於六月初旬齊赴軍營務選人才精壯器械整齊倘有草率塞責者即行嚴參令各扎薩克明白通飭傳諭四部落外並將喀爾喀協理台吉章京等員內揀選材能出衆者以備差遣嚴傳各卡倫侍衛台吉等加意瞭望探聽於七月底差我哨探兵往阿爾台山梁跟尋蹤跡俟雪降後將備調兵丁酌量撤回其每年豫備保護四部落游牧兵丁之處仍照舊豫備奏入上諭之曰此次策凌等既來投誠又辦理烏梁海事務防秋尤為緊要是以朕昨降㫖於察哈爾兵內再添派五百名發往現今舒赫德成衮扎布來京陛見俟至京時諸務再行面諭至伊等另摺所奏喀爾喀兵丁軍器挑選好者留用其平常者俱行駁回辦理甚是但器械為武備要項何至軍前始行挑出駁回明係喀爾喀風俗弊壞平日漫不經心茍且塞責所致著將此嚴行曉諭各扎薩克嗣後有似此者必將該副將軍及扎薩克等從重治罪斷不寬宥再庫克嶺惟安崇阿與策登扎卜二人駐劄堵截尚屬不敷現在已令副都統德寧前往軍營至防秋時即著德寧與安崇阿策登扎卜等在庫克嶺駐防乙亥命派喀爾喀兵丁防護策凌等游牧地方上諭軍機大臣曰據麒麟保奏稱策凌屬人葉爾都因尋覔馬匹為喀爾喀人射死策凌烏巴什屬人巴啓齊倫率領其子潛逃現在嚴行緝拏其防護策凌等游牧乞調取鄂爾昆兵丁及扎薩克一員前來辦理喀爾喀人等偷竊牲畜甚至將人射死目無法紀應痛加懲治著舒赫德策楞等嚴行查拏訊明正法並著派巴勒達爾總統照看扎薩克達什丕勒領兵一百五十名住於策凌等游牧用心巡查務使盜賊肅清其策凌等屬下人有逃竄者亦著舒赫德策楞遍行各卡扎薩克令其嚴行查緝拏獲之日即當詢明正法并將此㫖諭策凌等知之丙子尚書舒赫德等奏請暫撤招降烏梁海兵舒赫德等奏言據薩喇爾告稱準噶爾烏梁海宰桑圖布慎之鄂拓克聞已擒瑚圖克之信懼我兵威越過阿爾台海喇圖嶺往額爾齊斯地方雅爾都車根赤倫察達克四鄂拓克人等越過索郭克察罕烏蘇前往汗哈屯地方已於吹阿爾呼特阿寶哈卜齊海等處游牧宰桑瑪濟岱越過阿爾台唐努山間雅木圖嶺而去臣等看得烏梁海等業已紛紛遠遁時方春令我軍馬力疲乏難以遠行且大兵若駐卓克索地方烏梁海聞知必堅守自固臣等公同酌議奏請暫行撤兵至夏季烏梁海等貪戀故土必仍回游牧彼時整兵速出易於收服再阿睦爾撒納來投之信聞之已久但係傳言尚無確信若遲至五月內其時阿睦爾撒納與達瓦齊相持既久勢難中立其來降之計必决臣薩喇爾與努三留心察看情形相機酌辦奏入上從之戊寅命於附近阿爾台地方增設卡倫上諭軍機大臣曰從前定議原欲使烏梁海歸順准在原地居住如不歸順則逐出阿爾台以外今烏梁海等既由原處移於海喇圖嶺唐努山外阿爾呼特等處地方居住阿爾台以內皆成空地著即於此處增設卡倫地方愈可鞏固如烏梁海思念故土復來歸順仍准居住否則亦易於驅逐現今軍臺侍衛員少不敷委用著再揀選侍衛四十員發往駐卡將現在卡倫侍衛兵丁移於新設卡倫居住其發往侍衛俱令住於舊卡倫巡查看守再辦理烏梁海事既有就緒即當將瑪木特亦飭令移徙著交與舒赫德成衮扎布不必發兵只遣一諳事之人往諭瑪木特因伊等上年擅入我卡所以將烏梁海驅逐展設卡倫伊等游牧亦勒令遷移瑪木特聽從則已倘逾限不移即發兵驅逐現在兆惠亦起程往卓克索商辦事務著㑹同舒赫德成衮扎布遵奉朕屢降諭㫖悉心辦理但須通盤計算現在兵馬力量果否可以進兵或須候察哈爾兵到時再定進止倘兵力尚在不足則俟赫德成衮扎布陛見後熟籌一切再行辦理夏四月庚辰朔命新降台吉塞卜騰留軍前辦事不必前赴熱河上諭軍機大臣曰來降台吉策凌等一百六十餘人各求前赴熱河瞻仰朕躬但此內有台吉塞卜騰現在軍營辦理招服烏梁海事台吉塞卜騰人明白有材具朕早知之著於今年暫留軍營辦事令在參贊上行走俟明年朕巡幸木蘭之時再行前赴瞻仰至策凌策凌烏巴什等遵㫖於所屬人內選兵二百名令宰桑和通瑪什等率領俱交與塞卜騰帶赴軍營調遣丙申議北路軍營運糧事宜山西巡撫恆文等奏北路軍營運送糧米所有應行事宜謹條奏請㫖奏入得㫖軍機大臣議奏尋議據恆文等奏稱前軍機大臣奏准令於綏遠城所轄各城倉貯米石內碾米三萬石運送軍營查托克托城等處倉貯米石碾運需時且費腳價請於綏遠城倉貯米石內動撥三萬石運往俟本年秋收時採買還項應如所議辦理其運送米石需用駝隻查扎薩克䝉古有豫備馬匹之事不便雇覔伊等駝隻車輛即雇歸化城商人駝隻車輛運送查雍正十三年原任尚書通智雇覔商人駝隻車輛運送米石並無遲誤此次運送應照恆文等所議雇商人駝隻運送又奏稱現在軍營移駐烏里雅蘇台途次較前稍遠酌量地方給價查雍正十三年鄂爾昆運送米石每斛共給銀七兩今運送烏里雅蘇台加增十三站應每斛共給銀九兩八錢零查雍正年間需用䝉古牲畜甚多腳價未免稍昻今牲畜繁多非雍正年間可比恆文等照前計算未免過浮其作何節省之處應斟酌近日實在地方情形再行裁減又奏稱此次運送米石照雍正十三年派副都統一員地方大員八員微員十六員兵一百名查綏遠城歸化城副都統各有應辦之事難以久懸請欽㸃在京大臣一員照管運糧其撥派官兵即由該處滿洲土默特內派出亦應照恆文等所請總管大臣應由在京大臣內派往至歸化城與烏里雅蘇台相距窵遠水草不足難免牲畜倒斃應須豫為籌畫請撥銀二萬兩交派出大臣帶往以備需用亦應照恆文等所請辦理奏入得㫖依議著派台柱辦理運糧事務侍郎兆惠總理照看丁酉命公策楞為定邊左副將軍己亥命議處尚書舒赫德先是奉㫖舒赫德此次差往軍營辦理一切舛謬從前行文準噶爾達瓦齊一事自應奏聞請㫖遵行乃一面具奏一面即行擅發甚屬錯誤曾將應行察議之處暫令存記今令舒赫德等查奏原任貝勒額林沁公格勒克巴木丕勒未至調遣地方一案伊等公然為之奏請寬免此等奉調遲誤之罪軍務攸關豈得因其曾效微勞即從寬宥乎况此原係伊等應行查參之事乃並未參奏已屬寬縱及朕諭令查奏復敢巧為開脫辦理舛謬已極著交部將伊前次存記之案一併嚴察議奏尋經部議請㫖革職奉㫖舒赫德著將從前所有加級紀録盡行銷去從寬免其革職閏四月辛亥陜甘總督永常等奏報進貢夷使敦多克等入境庚申命撥甘肅庫貯官茶一百十萬餘封派原任巡撫鄂昌前往㑹同地方官運至北路軍營以備賞賚定邊左副將軍策楞奏報偵探準噶爾情形策楞奏言據本處烏梁海宰桑都塔齊遣人至準噶爾烏梁海宰桑瑪濟岱處探得從前原有宰桑二人在達瓦齊及阿睦爾撒納兩處彼此讒間今達瓦齊已將此二人殺死復與阿睦爾撒納和好阿睦爾撒納已往見達瓦齊等語臣等竊思烏梁海懼我出兵或者妄造阿睦爾撒納與達瓦齊復相和好之言以緩我軍心亦未可定臣等惟有固防邊疆嚴守卡倫俟至五月即將辦理烏梁海展設卡倫各事宜遵照屢降諭㫖相機而行奏入上諭軍機大臣曰據策楞等奏稱達瓦齊與阿睦爾撒納業經和好阿睦爾撒納已往見達瓦齊其助阿睦爾撒納之哈薩克兵五萬名俱已撤回等語朕思此等俱屬荒唐全不可信哈薩克各為生理並無總統之人無論不能聚兵至五萬之多即所謂阿睦爾撒給與達瓦齊業已和好亦非實語此明係準噶爾烏梁海懼我進兵驅逐伊等妄言伊內業已安定並無事故以緩我師耳策楞等勿遽以此為真惟當設法冀得實信留心辦理甲子命賜策凌等新編旗分為都爾伯特賽音濟雅哈圖部落分授策凌等為正副盟長上諭軍機大臣曰我內扎薩克與外四部落及衆喀爾喀扎薩克地方各按旗分部落設立正副盟長管理游牧事務今將新來投誠之厄魯特台吉策凌等帶來戶口俱編設旗分佐領既與內扎薩克喀爾喀扎薩克等相同應將策凌授為盟長事務其盟㑹著賜名為都爾伯特賽音濟雅哈圖部落己巳定邊左副將軍策楞奏派喀爾喀扎薩克台吉等軍營效力人員策楞等奏言喀爾喀扎薩克台吉等呈請願在軍營效力人員內除貝勒策卜登等已經奉㫖調取軍營差遣外餘二十四員臣等公同酌量揀派人材可觀之公策登薩木丕勒三達克多爾濟多爾濟策登親王得親扎卜之子一等台吉齊旺多爾濟貝勒那木扎爾車蘇隆之子一等台吉旺親多爾濟二等台吉策登扎卜貝勒青滚雜卜之子一等台吉車蘇隆多爾濟二等台吉齊旺扎卜公額林沁之子二等台吉旺布多爾濟協理台吉多爾濟扎卜旺扎爾齊巴克四等台吉羅卜藏多爾濟敦多卜達瑪林等十五員俱請留在軍營以備調遣其餘公道玉特多爾濟等九員材藝平常應毋庸調取奏入上從之辛未命封新降台吉塞卜騰為貝勒先是傳㫖諭軍營侍衛永柱曰新降台吉塞卜騰已令在參贊上行走帶兵前往軍營辦事今年不得前赴熱河瞻仰朕躬加以封爵若令其來京陛見伊未經出痘不便前來著永柱帶領塞卜騰至張家口至時著大學士公傅恆往彼接見轉傳諭㫖至是永柱遵㫖帶領前來上命大學士公傅恆至張家口傳㫖迎勞並封塞卜騰為貝勒五月壬午命總督永常豫籌西路兵丁進𠞰事宜上諭軍機大臣曰據永常奏準噶爾夷使已抵橋灣現在即可入關且據該夷使言於起程時業已派出貿易頭目亦於六月間可到等語從前準夷部落准其通貢貿易原係加恩噶爾丹策零其後策妄多爾濟那木扎爾喇嘛達爾扎繼立因係噶爾丹策零之子孫是以仍前辦理至達瓦齊篡立則係伊之僕屬矣今伊貢使前來若仍前相待我朝當全盛之時國體攸關不應委曲從事以示弱於外夷若少示貶損準夷素性猜疑陰懷叵測將來必至搆釁滋事不得不先為防範况伊部落數年以來內亂相尋又與哈薩克為難此正伊處人心離散事㑹有可乘之機若失此不圖再閲數年伊事勢稍定必將故智復萌然後倉猝備禦其勞費必且更倍於今况伊之宗族策凌策凌烏巴什等率衆投誠至萬有餘人亦當思所以安插之道朕意機不可失明歲擬欲兩路進兵直抵伊犂即將策凌等分駐游牧衆建以分其勢此從前數十年未了之局朕再四思維有不得不辦之勢所有明歲軍興一應糧餉兵丁馬駝均應豫為籌畫其西路所調兵丁約需二萬此內欲撥甘凉緑旗兵八千及西寧凉莊西安歸化城土默特察哈爾以及新降之厄魯特兵共合二萬之數如此辦理似已足敷調遣或有另行辦理之道著永常詳細籌議速行具摺馳奏候朕酌定將來十月內朕另降諭㫖令永常策楞等來京將一應機宜面加訓諭臣等謹案準噶爾􅘀狡凶頑流毒西陲諸部落貫盈將及未就翦屠實為聖祖仁皇帝世宗憲皇帝兩朝欲竟之遺緒我皇上御極以來審幾度務初猶許其請安貿易暫示羈縻未議興師問罪之舉逮達瓦齊篡奪相尋衆心瓦解台吉策凌策凌烏巴什暨阿睦爾撒納等率屬欵關內附戶口不下數萬人却之塞外既不足以彰共主之仁處之緣邊又適足以滋藩封之患是必得其地而衆建之於計為便而揆其親離衆叛則於時與勢皆不可以不乘第國家承平日久兵革不試衆皆狃於畏難之見孰喻遠圖我皇上秉獨斷於幾先力排羣議是以舉荒徼數萬里之地戡定於不浹歲之間皆由睿算訏謨實有以决策於未事之先而後行師之捷赴㑹之神成功之速為伊古郅隆之朝所未有易曰天之所助者順也人之所助者信也惟我皇上默契夫天貺之允符深維乎人謀之宜殫用能上下協應式集大勳成我大清億萬世無疆之休永永無極也歟戊子命歸化城都統莫爾渾在軍營參贊上行走庚寅命加都爾伯特台吉策凌等封號上諭內閣曰都爾伯特台吉策凌策凌烏巴什等皆準噶爾渠帥嚮慕德化率領萬衆傾心來歸甚屬可嘉應施恩賞給封號以示懷柔至意其台吉策凌封為親王策凌烏巴什封為郡王策凌孟克塞卜騰封為貝勒孟克特穆爾班珠爾根敦封為貝子剛巴圖孟克瑪什巴圖封為公達什敦多卜恭沙喇巴爾封為頭等台吉均授為扎薩克其所部人戶如何編次旗分佐領補放官職之處已俱降㫖令玉保麒麟保等辦理著該部照例遵行策凌等受朕厚恩務將所屬人等約束教養安分謀生果能仰副朕心遵循訓㫖則永沐朕恩於無既矣愼之無怠辛卯命策凌等入覲於熱河避暑山莊賜宴賞賚有差戊戌命刑部尚書劉統勳協辦陝甘總督事務調福建巡撫陳𢎞謀為西安巡撫並理軍需己亥議西北兩路派兵事宜軍機大臣奏言查西北兩路派兵之處臣等公同商議北路派兵三萬西路派兵二萬擬派京城滿洲兵四千黑龍江兵二千索倫巴爾虎兵八千綏遠城右衛兵二千五百西安滿洲兵二千五百涼州莊浪滿洲兵一千寧夏兵一千察哈爾兵四千新厄魯特兵二千歸化城土默特兵一千阿拉善䝉古兵五百哲里木兵二千昭烏達兵二千喀爾喀兵六千和托輝特兵五百宣化大同緑旗炮手兵一千甘肅各營安西緑旗兵一萬共派兵五萬分為兩路遣往計每兵需馬三匹共馬十五萬除現在北路軍營所有馬六千餘匹及交額林沁多爾濟採買馬一萬莫爾渾解送馬二萬外再令額林沁多爾濟動軍營餉銀於喀爾喀四部落買馬三萬策凌等帶來馬匹甚多著將官羊酌換馬一萬匹於內扎薩克六㑹盟處買馬六萬尚不敷馬一萬四千應令永常於緑旗營馬並孳生牧厰馬匹內照數揀派其北路所需駝隻約計一萬除現在官駝三千外交額林沁多爾濟亦動軍營餉銀再買二千於內扎薩克六㑹盟處買駝五千其口食羊隻亦於內扎薩克六㑹盟處採買二十萬西路兵丁應需駝六千隻羊十萬隻除各營現在備戰駝三千二百餘隻近經寧夏滿洲營交鄂爾多斯等旗喂養官駝八百隻與孳生駝隻一併取用外若仍不敷交永常動餉採買其口食羊隻甘肅所管番子地方羊隻甚多且薩爾楚克海努克等項牛隻亦可應用亦交永常動用餉銀或羊或牛酌量共採買十萬豫備其採買內扎薩克馬駝羊隻仍照前於御前乾清門行走之王公額駙內分派數員前往㑹同各盟長採買其價值每駝一隻給銀十八兩馬一匹給銀八兩羊一隻給銀七錢不得浮用所有應派䝉古王公等職名伏候欽定奏入得㫖依議著派齊默特多爾濟索諾木喇卜坦阿喇卜坦多爾濟余木充扎拉豐阿哈穆噶巴雅斯瑚朗圖班珠爾喇什塞楞齊旺班珠爾喇什那木扎爾德里克旺舒克拉里達外添派鄂實白衣保哈清阿誠林永興巴爾品前往辦理採買馬駝事務乙巳命豫備收納降人阿睦爾撒納等事宜上諭軍機大臣曰近有瑪木特約㑹阿睦爾撒納投誠之信伊等如來投誠即當安插在阿爾台以內將我卡倫向外展放軍營向前安設一則易於收受投來之人稽查照管伊等游牧二則明年進兵路亦較近著傳諭策楞等妥協辦理至明年進兵時如有從彼投來之人應將四衛喇特議編四部封汗另居之處且勿向彼說知只將各按伊等等級分别封爵安居本地俱為大皇帝臣僕等語曉諭再朕聞阿睦爾撒納之為人詭詐反覆全不可信若果率伊妻子前來投誠詭計亦無所施但防範不可不周策楞等務須留心覺察謹慎辦理仍勿令其知覺定分路駐兵事宜定邊左副將軍策楞等奏言臣等公同商議除庫克嶺卓克索二處各派兵一千駐防外烏里雅蘇台尚存察哈爾兵一千名喀爾喀兵三千名並繼至之防秋喀爾喀兵三千名共兵七千名若令一處屯駐不但水草不敷而庫克嶺等處去烏里雅蘇台甚遠緩急策應殊多不便臣等計其適中之地派兵一千屯駐布爾哈雅等處以為庫克嶺之應援入派兵一千屯駐西巴爾圖魯等處以為卓克索控圭之應援即令各台吉帶領前往餘察哈爾兵一千名喀爾喀兵四千名令於烏里雅蘇台附近舒魯克河哈克淖爾等處屯駐以備調遣奏入上從之丙午議西北兩路派兵起程事宜軍機大臣奏言明年進兵西路所派兵二萬名俱於明年四月內令至軍營方於進兵日期無誤但所派兵丁遠近不等且於明年春草未生時勢難趲行其索倫巴爾虎兵三千名相應交該將軍令於明年正月初十內前至京師自京師送至軍營應交直隸等省各督撫照遣往金川兵例或用馬匹或用車輛自正月十五日起間三日令起身一次其由嘉峪關送至軍營如何豫備馬匹之處交與永常辦理其察哈爾兵二千名應令總管固穆扎卜帶領㑹同京師派出侍衛各員令帶四十日口糧乘今年秋令起程沿途牧養馬畜前至推河等處時令將軍策楞等自軍營差人換給馬匹酌辦口糧送至西路駐劄哈密軍營其米石口糧由永常處辦給新降厄魯特兵一千名即令策凌烏巴什帶領於四月內前去令赴西路軍營其阿拉善兵五百名交永常鄂昌派員照例辦理令公衮楚克帶領於四月底至軍營至西安涼州莊浪滿洲兵及甘肅各營安西緑營兵俱離軍營甚近應令該將軍等㑹同永常照例支給行裝口糧如期調集以備遣用奏入得㫖依議索倫巴爾虎兵著派三格納木球帶領西安兵著派都賚豐安帶領涼州莊浪滿洲兵著派納邁齊努渾帶領甘肅安西緑營兵著派豆斌李中楷傅魁馬得勝帶領軍機大臣又奏言調往北路兵丁三萬名務於明歲四月內俱至軍營方無誤進𠞰之期若將各處調來兵丁均於本年秋間起程前往不惟軍前馬匹口糧等項一時難以辦理且衆兵齊至糧米亦恐不繼若令明春再行前往路途遙遠間隔戈壁水草乾枯牲畜疲瘦不能一時齊集臣等酌議京城兵四千名於明歲二月初旬起程黑龍江兵二千名於明歲二月十五內至京再行起程前往列於京城兵丁之末以五百名為一隊間三日起程一次其索倫巴爾虎兵五千名或應即於今年秋間起程或俟明年起程可以如期無誤應令該將軍速行熟籌定議具奏辦理察哈爾兵二千名應給與兩個月口糧於二月初間起程哲里木昭烏達兵四千名若於明年起程四月內未必能到䝉古兵丁習於游牧不如乘今年秋間水草即令起程沿途游牧緩行擇暖燠之處過冬再行前往不但不誤進勦之期而䝉古馬匹亦不致疲乏應交與各盟長妥協辦理其綏遠城右衛兵二千五百名寧夏兵一千名歸化城土默特兵一千名及宣化大同緑旗兵一千名均令該將軍都統督撫等照例辦理起程均限於四月內齊到和托輝特兵五百名令將軍策楞行令該扎薩克等辦理新厄魯特兵一千名亦令策楞處辦給賞賚交與親王策凌帶領前赴軍營以備調遣奏入得㫖依議黑龍江兵著派達色鄂博什帶領索倫巴爾虎兵著派清保鄂爾衮察溫布帶領綏遠城右衛兵著派鶴山哈寧阿帶領寧夏兵著派和起海福帶領察哈爾兵著派五什六帶領歸化城土默特兵著派阿爾賓帶領哲里木兵著派色布騰巴爾珠爾齊默特多爾濟拉里達帶領昭烏達兵著派額林沁阿咱喇朋蘇克帶領宣化大同緑旗兵著派福祿帶領丁未命賞賚派出軍營之喀爾喀王公扎薩克等上諭軍機大臣曰從前派往出兵之喀爾喀王公扎薩克等俱未經賞賜因出兵一事原為保護喀爾喀而起且與伊等游牧甚近無需賞賚此次派出喀爾喀兵六千名和托輝特兵五百名現因準噶爾投誠人衆令於喀爾喀部落內採辦羊隻牲畜接濟厄魯特口糧雖經給價恐於䝉古生計稍艱著傳諭將軍策楞等將派出喀爾喀王公扎薩克等職名開列奏聞照依內地扎薩克施恩一體賞賚平定準噶爾方略正編卷二
