body:
  text: 雍正十二年秋七月丁丑命籌拒賊及撤兵事宜上諭辦理軍機大臣等曰爾等行文平郡王賊人如犯軍營令我兵酌量拒敵若目前無事仍撤囘科卜多擇形勝處駐劄休養馬匹其哨探兵丁俱著撤囘如有應設之處務揀選幹員防守戊寅命選直隸等四省緑旗兵赴北路軍營更代上諭辦理軍機大臣等曰從前直隸山東山西河南四省派徃北路出征之緑旗兵丁在外已經數年應另派兵丁前徃更換著四省督撫提督每省選派精兵一千名一切衣裝等項於存公銀兩内動支應用豫備齊全候諭㫖到日起程癸巳命王公滿漢文武大臣等㑹議軍務上諭辦理軍機大臣等曰西北兩路用兵已經數年將士効力戎行久在邉外朕心深為不忍再四思維或應乘此兵力盛强直進賊境俾軍務早完以息將士或應遣使徃彼諭以利害俾其醒悟二者未能遽定特召北路副將軍額駙策凌西路署大將軍查郞阿來京與辦理軍機之大臣悉心計議伊等意見亦不畫一朕思軍務闗係重大應博採衆論詳慎籌畫著王公滿漢文武大臣公同㑹議各抒己見據實具奏命達賴喇嘛等還藏上諭辦理軍機大臣等曰從前令達賴喇嘛移駐泰寧原因彼時藏中有阿爾布巴等事恐準噶爾逆賊乘間來犯是以令其移至近邉地方以便照看其隨來之弟子人等久離鄉土未免懐歸今貝勒頗羅鼐實心効力將唐古忒厄魯特之兵操練精熟各處𦂳要隘口俱已嚴固防守藏中晏然無事班禪額爾徳尼年邁有疾應令達賴喇嘛囘藏著果親王允禮前徃泰寧與達賴喇嘛相見章嘉胡土克圖亦令同去并著都統鼐格前徃料理伊等起身副都統福壽等沿途照看命果親王赴泰寧沿途閲兵上諭辦理軍機大臣等曰朕命果親王前往泰寧地方沿途經過之直隸山西陜西四川等處駐防滿洲官兵並督撫提鎮標營緑旗官兵俱令順便閲看命致祭陣亡官兵於和通呼爾哈上諭辦理軍機大臣等曰爾等傳諭大將軍平郡王令其未撤兵以前酌量於和通呼爾哈處遣人將陣亡官兵遺骸收瘞動用軍中錢糧致祭命查郞阿等量撤兵丁并分别効力未効力官兵等次報部上諭辦理軍機大臣等曰額駙策凌署大將軍查郞阿囘至軍營時令其酌量留兵防守邉界其餘兵丁查無弟兄子姪之孤身及從前乆在軍營行走者或此次立有勞績被傷者俱行撤囘再將官弁効力行走之處分為三等造冊咨部其効力超卓者為一等以應陞之缺即用照常効力者為二等酌量加恩未經効力者以三等註冊各該管大臣官員等務須從公分别等次若有徇情挾私顛倒失實者後經查出定行加倍治罪戊戌命遣使徃諭噶爾丹策零撤兵駐察罕廋爾和碩康親王巴爾圖等遵㫖議奏言準噶爾賊夷世濟其惡屢次興戎噶爾丹策零狂悖兇頑較伊父策妄阿喇布坦更甚我皇上為安逸生靈計欲特賜包容遣使前徃開陳利害但賊人狡詐性成恐難遽信目今兩路大兵駐劄邉境賊夷之地勢情形俱已深悉且糧糗馬駝軍裝器械無不預備整齊宜乘此時於北路發兵三萬西路發兵二萬約㑹齊進並力殱除如賊果知畏懼悔禍乞恩我皇上再寛其罪戾議定邉界又大學士張廷玉等遵㫖議奏言噶爾丹策零擾害生靈早應發遣大兵立加屠滅惟是我聖祖仁皇帝如天之仁於策妄阿喇布坦狂悖妄行猶復曲賜包容不加誅戮我皇上以聖祖之心為心屢示恩諭俾息紛爭恐伊孟浪輕舉騷擾䝉古是以駐兵邉地以為防範仍諭兩路大將軍停止進𠞰仰見天心仁愛原非必欲毁其巢穴滅其醜類也今賊人自額爾得尼招大敗之後勢窮力竭本年春間我兵從北路襲擊直越額爾齊斯賊夷驚惶不敢迎戰但罔識聖心之寛大自以負罪深重不可復逭因此迷而不悟日益冥頑若䝉特遣大臣前徃曉以利害寛其已徃之愆予以更新之路噶爾丹䇿零審度勢力實不能支諒必誠心悔過俯首求和若仍執迷不悟則是伊自速滅亡再議征討更覺事易功倍奏入得㫖準噶爾一部落習尚貪殘世濟其惡䇿妄阿喇布坦狡獪非常當其跳梁之時我皇考聖祖仁皇帝審觀形勢洞悉機宜曾宻諭曰彼地遼逺我徃則我師徒勞彼來則彼師受困是以經理八九年惟令兩路將軍陳師邉境以待之即將軍富寧安傅爾丹之屢次襲擊亦欲誘之使來便於邀擊而賊究不至富寧安等亦未多獲而歸此當日之情形也及朕即位之初籌畫邉事敬佩皇考之明訓確知䇿妄阿喇布坦之姦頑持重不肯輕舉且以將弁兵丁等乆役于外勤勞可念因將兩路兵馬撤囘暫令休息中間縁清畫疆界一事遣人曉諭再三朕則開誠布公彼則支吾巧詐朕仍包容寛宥之未幾策妄阿喇布坦身故伊子噶爾丹䇿零繼領部落朕慮有侵擾衆䝉古之舉不得不預為防範又以其人孟浪無知剽輕任性必率賊衆冐昧前來是以仍于兩路駐劄大兵至於命將一事岳鍾琪乆在西陲習於軍旅伊亦踴躍從事因命為西路大將軍北路大將軍傅爾丹朕恐其才具不勝重任爰允廷臣之推舉並遣查弼納為副將軍伊陛辭之時朕諄諄詳諭令部署完宻度勢審機務䇿萬全實冀専閫之大臣戮力同心不負簡用也乃噶爾丹䇿零輕舉妄動果不出朕之所料於雍正八年冬月發兵侵犯西路此正我師乘時擊賊之機㑹而岳鍾琪來京陛見請將大將軍印務交與紀成斌署理前此岳鍾琪身在軍營全無布置將駝馬牲畜十數萬置於賊人來路之旁供其掠取紀成斌庸懦不堪于賊人來犯之時畏縮驚惶一籌莫展致賊人得志而去次年賊以全力向我北路初北路領兵大臣與喀爾喀等皆懐賊人斷不敢來犯之心一切軍需又未預為完備傅爾丹查弼納等復誤聼俘虜誑言並不奏聞領兵輕進彼時朕即向廷臣言之賊人恐有詭詐我師此進甚不妥協未幾奏至果墮術中雍正十年正月賊人僅以七千之衆來犯西路深入哈宻塔勒納沁地方此又易於大創之機㑹而岳鍾琪身處軍營調度乖舛坐令入網之獸復得駭逸此西路軍營人人切齒痛恨者于是賊志愈驕肆無忌憚傾其醜類以向北路越過察罕廋爾軍營直至額爾得尼招地方副將軍額駙䇿凌等奮勇擊殺殱其精鋭將及萬人餘賊喪膽乘夜遁逃經由扎克拜達里克一帶此地朕預設重兵萬有四千以遏賊歸路似此殘敗之賊誠如釜底遊魂但遣兵數千人遮擊便可使隻騎不返乃馬爾賽坐守空城一旅不發賊至不擊賊去不追俾餘孽猶存邉氛未息馬爾賽之罪誠擢髪難數也總之朕之籌畫於事先者雖未有爽而臣工之失機於臨事者則不一而足矣今賊人自額爾得尼招大創之後畏我兵威遷徙逺去看此情形兩路軍務一時難以告竣特召兩路領兵將軍來京與辦理軍機之大臣悉心計議北路副將軍額駙䇿凌西路署大將軍查郞阿力主進𠞰朕以軍務闗係重大復令在朝王公滿漢文武大臣公同集議兹覧所奏意見亦不畫一據兩路將軍皆言兵力有餘士氣奮勇賊勢窮蹙人心離散似此則遣兵進討未嘗不可但皇考當年聖意與朕本心俱不欲勞師逺涉而駐兵防守邉界又未免時日耽延將士乆勞朕心不忍朕意且遣使臣前徃準噶爾面諭噶爾丹䇿零曉以利害示以寛大之恩㫖開其迷誤從此畫清邉界彼此不得逾越著北路大將軍平郡王將進駐科卜多之大兵仍撤囘察罕廋爾以釋賊人疑懼之心若噶爾丹䇿零聞朕諭㫖果有悔心之萌一一遵行則大路大兵俱可徐徐議撤倘仍執迷怙惡自取滅亡俟使臣囘京之日别作計議辛丑命加恩青海䝉古等上諭辦理軍機大臣等曰朕聞青海䝉古生計甚艱著傳諭馬爾泰等加意施恩方於伊等生計有益命傳諭平郡王福彭撤兵事宜上諭辦理軍機大臣等曰爾等傳諭大將軍平郡王現今調兩路將軍來京商議軍營事宜將來進𠞰科卜多之兵或仍撤囘察罕廋爾其由烏里雅蘇台運徃科卜多之米糧馬匹等項有應行停止撥囘之處著預為辦理撤兵時平郡王領兵居中塔爾岱常徳領兵殿後其前隊之兵酌量𣲖委大臣帶領八月丙午命侍郞傅鼐額外内閣學士阿克敦副都統羅宻赴準噶爾傳諭噶爾丹䇿零上諭曰從前爾遣使特磊奏聞爾父亡故彼時朕即召入特磊面降諭㫖詳加開導令將羅卜藏丹津送至越二三載並無囘奏故於兩路駐兵防守邉界爾乃遣特磊奏稱已將羅卜藏丹津拏送至途間聞有兵至故暫停解送特遣人懇求指示伏願廣興黄教愛惜生靈等語朕即遣使臣杭奕禄衆佛保同特磊前徃巴里坤軍營與爾商議諸事因朕躬違和故未將特磊召見令部臣傳㫖遣囘即有疑難不便之處亦當彼此遣使議和豈有輕動兵戈之理特磊乃卑賤之人未免揑詞告爾以圖僨事爾若果無動兵之心為生靈黄教起見則當向我國使臣懇切陳奏乃並未接見使臣猝然發兵侵我巴里坤軍營搶去馬匹又發兵阿爾台地方彼時我國將軍大臣未行請㫖忽畧輕動致爾得利未幾爾兵侵我卡倫我兵於蘇克阿勒達呼地方迎戰爾遂收兵退去次歳爾復協力來擾喀爾喀游牧被我師輕騎掩殺戰於額爾得尼招地方爾兵大敗今春我哨探兵丁至額爾齊斯地方時爾游牧處人俱行遁匿烏魯木齊駐劄之人亦行移去我兩路將軍大臣即欲盡驅雄兵乘勢進𠞰朕悉諭令停止朕為天下元后惟以好生為本並無將準噶爾必行𠞰滅之意况得爾國土地人民於我大國亦何補之有爾若執迷不息干戈則我師更換駐防毫無缺乏之慮不過稍費糧餉耳但如此相持日乆彼此相勞非徒士卒苦累而馬匹牲畜亦多損傷是以朕心深為惻然今特遣使臣侍郞傅鼐學士阿克敦副都統羅宻等前來宣諭朕意與爾商議愛惜生靈彼此罷兵之事若我大兵仍在游牧附近處駐劄恐爾心生疑貳今巴里坤軍兵因使臣由彼處遣徃故暫令守候駐劄其北路已抵阿爾台軍兵俱撤至察罕廋爾爾果欲遵㫖罷兵同享安逸即與遣徃之大臣明白定議朕已將一切事務面諭大臣爾宜詳思如誠心知過痛改前愆樂遵朕㫖則朕將徃事盡行寛宥斷不食言至於是非利害爾宜酌定欲搆兵欲止戈欲安逸衆庶欲殘害生靈亦惟爾擇而行之特諭癸丑命李如栢率直𨽻等四省更代兵赴北路辦理軍機大臣等議奏言有㫖命議選直隸山東山西河南四省兵赴北路軍營更代其統領緑旗兵丁河北總兵官胡傑應一體更代請欽命一人率兵赴軍奏入得㫖總統四省緑旗兵丁著署山西大同總兵李如栢前徃甲寅命革滿珠錫禮職軍前効力贖罪上諭辦理軍機大臣等曰滿珠錫禮自朕簡用副都統以來有意敗壊國政伊身係宗室且並非愚昩無能之人乃明知故為情殊可惡著革職交與馬蘭泰令其隨披甲隊内在軍前効力贖罪如乖謬之性仍不悛改著馬蘭泰即行㕘奏丙辰議量撤北路軍營防戍等兵辦理軍機大臣等議奏言北路軍營現有滿洲䝉古緑旗兵共六萬餘今年科卜多兵撤還烏里雅蘇台請於防戍兵及傅爾丹率徃兵丁中其著有勞績或家惟單身無依者京師滿洲兵量撤五百奉天吉林黑龍江兵量撤一千寧夏右衛暨翁牛特内扎薩克等處兵悉撤之分别給與車馬餘兵暫留駐劄奏入上從之尋定邉大將軍平郡王福彭奏言北路軍營遵㫖量撤兵丁臣已令都統祖秉衡率漢軍官兵營總等率防戍兵及寧夏右衛等兵於八月十九日自軍營啟行其擕帶家口察哈爾土默特兵一千令副都統職銜色爾古楞率赴歸化城俟安插畢令色爾古楞赴京奏入報聞九月壬辰命議叙鄂隆吉大坂𠞰賊功西路副將軍張廣泗等奏言九月初四日偵知烏爾圖河地方有賊數百臣即飛檄副都統班第達什原任總兵官張元佐遊擊郞建業於初五日五鼓悉赴哈洮以南蘆草溝一帶又飛檄固原提督樊廷率兵赴鹻泉子分路搜𠞰果於哈洮遇賊潛伏我兵奪據山梁深入賊隊屢敗之遂越噶順直抵鄂隆吉大坂斬賊四百餘生擒者三十六人所獲馬匹器械糧物無算復追擊百八十里餘賊悉負傷逺遁奏入得㫖張廣泗調度分遣悉協機宜在事將弁兵丁等俱各奮勇直前得獲全勝甚屬可嘉著從優議叙賞賚署大將軍查郞阿雖奉調來京然自統兵以來與張廣泗同心協力整飭戎行鼓勵士氣此番克㨗亦由查郞阿平日訓練整頓之所致著一併交部從優議叙丁酉定邉大將軍平郡王福彭奏北路撤兵事宜福彭奏言北路兵進𠞰者臣等遵㫖撤還九月初六日臣率奉天兵二千吉林兵一千黑龍江兵一千自科卜多啟行令副都統王常率右衛兵一千前行副將軍塔爾岱常徳等率餘兵殿並逺設卡倫瞭望防範行至察罕鄂羅木分兵三隊臣率一隊由空圭中路仍令塔爾岱等居後又令公根丕勒哨兵居後殿㕘贊阿岱率一隊由扎卜堪路以公敏珠爾哨兵殿副都統哲庫訥率一隊由空圭北路以貝勒成衮扎布哨兵殿分道撤還俟大軍齊集過冬所在酌令察哈爾厄魯特兵索倫兵並内大臣哈達哈等所領黑龍江兵副都統富昌等所領吉林兵副都統額爾勤等所領奉天兵分駐魯約蘇圖䝉固勒烏拉克沁等處京城八旗兵寧夏兵察哈爾土默特兵並㕘贊阿岱所領奉天兵副都統布爾沙等所領黑龍江兵分駐布爾哈雅鏗格爾格等處家選兵駐劄濟斯布隆集魯穆㑹盟兵四子部落兵駐劄扎卜堪河都統諾爾琿等所領漢軍兵五百並駐烏里雅蘇台兵一千五百合為一營駐劄察罕廋爾城中歸化城土默特兵緑旗兵烏蘭察卜㑹盟兵並副都統白爾赫圖所領奉天兵悉在烏里雅蘇台城外附近有水草處駐劄再喀爾喀游牧所在遼逺酌令喀爾喀兵丁在大軍迤東駐劄其哨探兵分三路每路撥滿洲及内扎薩克兵二百五十喀爾喀兵二百五十所有各處卡倫減撤一半自卡倫至大營仍分三路設立臺站如故以資聲援俟大軍駐定後再酌量辦理奏入報聞尋福彭奏言臣自科卜多撤兵分三路行至空圭河擇附近有水草處將臣所率奉天吉林黑龍江兵各一千駐劄過冬其察罕鄂羅木所貯米石量給探哨官兵餘悉運至空圭河機達渾處留緑旗兵三千守之又令前鋒統領塔爾瑪善即統前鋒兵八百於機達渾附近彈壓其王羅卜藏等所率内扎薩克兵及貝勒成衮扎布等所率喀喇沁土默特兵並相接駐劄臣率右衛兵一千奉天兵一千於十月初一日抵烏里雅蘇台軍營奏入報聞冬十月丁未命察勘撫恤甘肅歉収州縣上諭内閣曰數年以來甘肅等處地方辦理軍需民人等輓輸効力朕心深為軫念已屢加恩澤以示嘉奬前據督撫等奏報今年禾麥收成俱好朕心甚慰今聞秋間有雨少之州縣如階州靖逺環縣數處収成不足民食稍艱或他處有似此者亦未可定著劉於義許容確加訪查所有歉収之處或應蠲免或應停徵其乏食之民如何撫恤一面定議奏聞一面即行辦理若西安所屬有秋田歉薄之州縣著史貽直碩色亦即確查奏聞照此辦理壬子議叙西路庫爾默圖官兵𠞰賊功陜西凉州鎮標中營遊擊郞建業等加銜有差兵丁等賞賚如例十一月戊寅命總管覺和托協同總管五十四辦理阿爾台軍臺事務戊子命額駙興德赴達里剛愛軍營上諭辦理軍機大臣等曰額駙興德著給與十年俸銀前徃達里剛愛軍營協同散秩大臣四格等操演䝉古兵丁効力行走壬辰命北路副將軍常德來京庚子命議酌賞哈宻囘民地畆事宜上諭辦理軍機大臣等曰據哈宻貝子額敏奏稱所屬囘民等有可種四百石榖之地現在軍營屯田界内願將此作為官地等語哈宻地方悉皆朕土無俟伊等獻納且大兵既撤之後此地皆可留與哈宻亦斷無因其獻地另行安置民人之理但此地現與官地交錯若不允其所請照舊令囘民耕種難免互相争角倘収為官地又係囘民生計所資朕意或另賞伊等地畆及牛具籽種或毎歳將應得穀石折給銀兩之處著署大將軍查郞阿等就近查議十二月壬寅朔議叙西路哈洮等處𠞰賊功署寧逺大將軍查郞阿等加級晉銜有差辛酉定邉大將軍福彭奏報鄂爾昆濟爾瑪台等處屯田穫大麥小麥穈子一萬九千七百石有奇奏入得㫖下部知之命罷進𠞰卓子山碁子山官弁議叙兵部以進𠞰卓子山碁子山及青海南北西三川等處功奏請議叙奏入得㫖軍功議敘乃國家賞功之大典必至公至確始足以表章勞績鼓勵軍心從前卓子山碁子山征𠞰一案乃年羮堯岳鍾琪張大其事有意揑成者即在事効力官弁亦不過以伊等私心任意開入冊内冀邀議敘並無功績可紀應不准議叙從前有已經議敘者著該部查明註銷其南北西三川青海効力人員仍准其議叙雍正十三年春二月乙巳命博第赴喀爾喀上諭辦理軍機大臣等曰管轄呼倫貝爾兵丁之都統博第著赴喀爾喀地方㑹同查克旦查辦丹津多爾濟多收駝隻事件事竣即著囘京北路軍營裁撤索倫兵丁起程時著領侍衛内大臣哈達哈帶領前徃呼倫貝爾協同永福管轄壬戌議酌定邉境駐防事宜辦理軍機大臣等遵㫖議奏言現今準噶爾逆賊敗遁又經使臣前徃宣諭諒賊夷輸欵非遙我軍班師在即應預行酌定邉境駐防事宜除漢中一府地居腹裏不必添駐外查凉州為甘肅咽喉通省闗鍵請駐兵二千名西寧地處邉隅逼近青海請駐兵一千名此添駐兵丁俱於西安駐防滿洲䝉古兵内挑選西安兵缺俟現駐凉州西寧兵丁撤囘時於養育兵暨餘丁内挑補其新駐兵丁請設將軍一員統領駐劄凉州所有應設協領佐領防禦驍騎校筆帖式等官令將軍秦布酌議具奏理事同知通判等官暨一切修理城垣營署軍裝等項令總督劉於義等詳議具奏預行辦理俟撤兵後再行派撥駐劄奏入上從之丁卯議撤原駐沙州凉鎮安西兵署陜西總督劉於義奏言沙州協標出征兵已撤還沙州足資防範其原撥徃沙州凉鎮兵五百安西兵六百請悉撤還本鎮每年夏秋撥沙州兵四十赴巴顔布拉克看守墩臺冬春撥安西兵三百赴推默勒圖等處駐防辦理軍機大臣等議覆如所請奏入上從之三月丙子命額駙䇿凌宻議定界事宜上諭辦理軍機大臣等曰據遣徃準噶爾使臣傅鼐等奏稱噶爾丹䇿零請將哲爾格西喇呼魯蘇地方為我喀爾喀游牧地界等語朕意伊既如此懇求若堅執不允恐使臣徒勞徃返終無完結之日但朕無由懸定此係喀爾喀等游牧處額駙䇿凌素所深知著將傅鼐等奏摺并地圖宻寄額駙䇿凌令其細閲噶爾丹䇿零所請應否准行如不可行或於我原定地方之内伊原定地方之外另有何處可定邉界暨定邉界之後其中空閒地方應否禁止彼此打牲之處俱著詳悉定議事闗重大務期永逺有益著於噶爾丹䇿零使臣吹納木喀等未到之前具奏尋定邉左副將軍額駙䇿凌議奏言噶爾丹䇿零請以哲爾格西喇呼魯蘇為我喀爾喀遊牧地界徃者我喀爾喀游牧尚未至此應即如所請行但我卡倫原設在阿爾台迤東額貝和碩和通鄂博布廷圖科卜多托爾和烏蘭等處此並在哲爾格西喇呼魯蘇界外應定議安設卡倫如故至厄魯特游牧應以額爾齊斯為止否則必以阿爾台嶺為界不得越哈巴博爾濟阿里克台清吉勒等處至中間錯壤之處彼此毋得打牲嗣後阿台迤東令我人巡邏迤西令彼巡巡邏如此庶争端可以永息昔䇿妄阿喇布坦在時其游牧舊在霍博克薩里察罕呼濟爾迤西數年以來漸越額爾齊斯賊性狡詐反覆無常若彼游牧逼近防守實難斷勿令過阿爾台嶺方為善䇿奏入報聞辛巳命塔爾岱囘黑龍江將軍任上諭辦理軍機大臣等曰定邉右副將軍塔爾岱在北路軍營厯有多年且身被傷痍現在軍營無事著囘黑龍江將軍任所給假一年調理病症其將軍事務仍著那蘇圖署理平定準噶爾方略前編卷三十六
