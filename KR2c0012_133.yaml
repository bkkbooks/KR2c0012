body:
  text: 乾隆二十四年九月庚午諭按察使銜納世通豫籌擒賊撤兵事宜上諭軍機大臣曰納世通領兵四百名㑹同永貴努三追捕戕害德舒之嗎哈沁等諒可立就擒獲著𫝊諭納世通如𠞰賊事竣所領兵丁或遣回阿克蘇或留駐庫車皆可倘二城俱可不需則查明此內有西安滿洲兵即撤回本處有緑旗兵即發往定長處屯田俱著酌量辦理諭辦理屯田副都統定長等解送軍營馬匹及追回庫車兵丁上諭軍機大臣曰定長等奏烏魯木齊所易哈薩克馬一千餘匹於八月二十四日由昻吉爾圖淖爾起程從伊拉里克送至庫車轉送富德等語此項馬匹原備來年進兵之用今富德在拔達克山交界若徑行解送未能妥協著𫝊諭定長等將馬匹加意牧放不必逺尋富德即從庫車送往葉爾羌備用再定長奏德文調兵一百名至庫車防範嗎哈沁昨據德文奏報朕以納世通領兵四百已足敷用業已𫝊諭申飭仍著定長將𣲖往之兵差人追回辛未定邊將軍兆惠等疏奏拔達克山信息兆惠等奏言逆賊波羅泥都霍集占等逃入拔達克山久無確信臣等遣侍衛等飛騎赴富德處探信八月三十日三等侍衛塔尼布回報本月十九日抵阿勒楚爾軍營二十三日有遣往拔達克山之厄魯特薩穆坦同來使至營據稱波羅泥都兄弟俱被伊部落拏獲霍集占受鳥鎗傷三處甚重僅存餘息我等起程二日有人追來告稱霍集占已死理合將波羅泥都送來但我等摩羅及阿琿等據經文無將同類獻與他國之理懇求寬免等語副將軍等復嚴飭來使務將波羅泥都俘獻霍集占雖死亦必獻尸否即進兵臣等伏思拔達克山非妄生事端之部落今既拏獲逆賊自必俘送但即行送出恐其屬下譏議故稍作推托之詞大兵若前進相逼則其獻尤速臣等即行知總兵官五福趕解糧餉令提督董孟等辦糧接濟并選牧養馬數百匹遣副都統豐訥亨送往軍營一面候齊凌扎卜等押送新降回衆前來分别安插解送即前駐英噶薩爾相機辦理奏入上諭軍機大臣曰兆惠奏稱差往探信之侍衛等回報逆賊波羅泥都霍集占俱為拔達克山人拏獲等語看來二賊被擒情事屬實雖未據富德奏報計此時正在促令縛獻如罪人斯得則大功告成富德仍遵前㫖同兆惠來京即明瑞阿里衮巴祿由屯溫布等參贊領隊大臣并年久侍衛等亦應分起陸續回京所有兵丁除去年更換者仍留駐防外餘俱酌量撤回不過留舒赫德一人在葉爾羌辦事足矣若二賊之被擒與死雖實而拔達克山仍未呈獻則不可中止必當示以軍威即今年不能來年亦必進兵總以必得為期倘二賊被獲情事不實或别有他故則愈不可中止今且暫息馬力於來年選兵數千名直入其境搜捕二賊即將拔達克山部落一併辦理亦無不可著𫝊諭兆惠富德等知之又諭曰兆惠等奏齊凌扎卜伯克鄂對等解送新降回人萬餘口約數日內即到解到時查明由喀什噶爾送信逆賊之回人酌量辦理又阿卜都喇伊木墨墨氐敏情俱可疑俟喀什噶爾輪班入覲時將此二人作為頭起送京等語昨富德奏稱齊凌扎卜等所解人口內塔里雅沁回人伯克特穆爾呼雅吉特兩户脫逃朕已密諭兆惠等將久從逆賊之回人相機辦理至送信賊人之語出自俘獲人口所供未可遽信即阿卜都喇伊木等與賊交通亦嚮導回人所禀保無挾嫌誣害若將此二人解京其餘人衆必生疑懼當候齊凌扎卜等到時密查逆賊親信之人令其指實如二人果與賊通即正法示衆或仍有他人亦另行查辦申諭定邊將軍兆惠等籌辦降回事宜上諭軍機大臣曰兆惠等將降回額爾克和卓額色尹鄂托蘭珠和卓瑪穆特解送來京未免辦事過急從前兆惠等奏請將二人送京朕即謂留伊等在京恐霍集斯等妄生疑懼俟擒獲霍集占時再行分别辦理今既將額色伊等送來雖留住京師其作何安插之處尚未酌定仍著𫝊諭兆惠等現在新降回衆或尚有霍集占族戚在內若逆賊已獲即行送京否則仍當酌量情形勿使回衆疑懼致生事端其作何辦理即詳悉妥議速奏癸酉賜索倫總管錫通阿巴圖魯號上諭軍機大臣曰索倫總管錫通阿因軍前得傷撤回殊可軫念著加恩賜號丹拜巴圖魯賞銀一百兩同來病廢兵丁俱著遣回游牧其臨陳得傷者仍著查奏命乾清門侍衛薩穆坦等隨辦哈薩克貿易事務上諭軍機大臣曰努三久在軍營效力俟辦理嗎哈沁事竣即起程回京哈薩克貿易事務交永德辦理永德辦事二年頗稱諳練著𣲖乾清門侍衛薩穆坦侍衛倭升額馳驛前往烏魯木齊隨永德學習行走命原任巡撫圖爾炳阿辦理庫車事務上諭軍機大臣曰現在北路軍營無事著圖爾炳阿前往庫車同納世通辦理事務甲戌命參贊大臣阿里衮留葉爾羌辦事上諭軍機大臣曰昨諭平定回部後將軍大臣等回京留舒赫德在葉爾羌辦事今思葉爾羌等處地方遼濶舒赫德一人恐難兼管著留阿里衮同辦事務可因便𫝊諭伊等知之命額爾克和卓額色尹等在京居住上諭軍機大臣曰頃詢問兆惠送來之額爾克和卓額色尹鄂托蘭珠和卓瑪穆特等據稱伊等原住葉爾羌喀什噶爾為䇿妄阿喇布坦掠往吐魯番後居伊犂又為霍集占所掠逃往塔什罕等語額色尹係霍集占一族且久住伊犂不便遣回葉爾羌等處應即留京居住除兆惠所奏現在送京之圖爾都和卓外仍將伊等家口送京其瑪穆特之子巴巴和卓兆惠等回京時亦即同來回衆中尚有似此者俱酌量辦理諭定邊將軍兆惠等查明拉達克汪所報葉爾羌逃衆上諭軍機大臣曰據官保奏拉達克汗報稱從前遣往葉爾羌探信之人未回又遣組克吉等前往距葉爾羌七日之程遇千餘人詢係葉爾羌所屬因避大兵逃出不肯放行并搶奪衣服等語著𫝊諭兆惠等查明此等人衆確係何處逃來今欲何往或係葉爾羌屬人於何時逃避大兵是否有心與霍集占不合據實奏聞諭駐藏副都統官保等停止拉達克人偵探賊信上諭軍機大臣曰據官保等奏拉達克汗請轉奏謝恩并報明探信人等未能前去朕已具悉昨因葉爾羌等處歸附仍降㫖曉諭今將軍等奏報霍集占等逃入拔達克山被伊部落人等擒獲俟其獻出時再行降㫖嗣後拉達克汗處不必遣人探信著官保等𫝊諭知之仍賜拉達克汗縀二端密諭定邊將軍兆惠等停止回人世襲上諭軍機大臣曰回城現俱平定應將霍集占等私行征斂之項嚴行禁止即辦事之阿竒木等員亦應如各省大臣之例遇缺補授或緣事革退則開缺另補至於霍集占族戚等所以留住京師并令伯克霍集斯等俟撤兵時同來者因恐伊等若仍居舊地必妄生希冀致起釁端此正所以保全之也兆惠等此時宜曲加撫慰不可稍有漏泄俟霍集斯到京後即曉諭各城回人以中外一家惟知共主阿竒木伯克不過辦事大員毋許自稱諾顔私收貢賦即阿竒木等缺出亦揀選賢員或以伊沙噶升補不准世襲章程既定則伊等希冀之念自消庶地方可以寧謐著因便密諭兆惠舒赫德遵照辦理諭參贊大臣舒赫德等酌辦和闐户口事宜上諭軍機大臣曰福祿等奏詳查和闐六城回人共一萬三千一百四十三户四萬一千二百八十六口較齊凌扎卜等原查數目缺五千四百五十七户三萬一千二百五十七口等語齊凌扎卜等原查數目本未確實而後來被圍數月或不免傷損抑係回人等圖貢賦輕減隱匿脫漏亦未可定今若有人首告自不便頇否則不必究問著𫝊諭舒赫德等此時且以停止查辦為妥若日後自行敗露亦無難再辦也參贊大臣舒赫德疏奏安插多倫等處回衆舒赫德奏言新授多倫阿竒木伯克阿卜都賚率小伯克等來見臣以奏准庫爾勒等處游牧曉示阿卜都賚云我故兄托克托游牧即在此處聞得散往羅卜淖爾舊屬亦有復回者乘此時伐木造屋以備春耕但多倫回衆內有數百人無食者請為料理臣示以撙節今將此等無食之人暫於阿克蘇留養俟安插後再來收取并將現在回人一千餘户五千三百餘口及馬駝牛羊各數行知書山外伊等來春耕作籽種不敷請照本年庫車回人例由官借給秋收後加倍償還又喀什噶爾葉爾羌等處陸續投來之阿克蘇賽里木回人一千二百餘户俱遣回本處安插奏入報聞丙子諭定邊將軍兆惠等酌辦烏沙克等回衆及送馬事宜上諭軍機大臣曰兆惠等奏齊凌扎卜解到降回一萬餘口請將伊等分别辦理再往英噶薩爾等語前諭回衆送到時烏沙克伯德爾格塔里雅沁等回人必須辦理者特為二賊未獲留之恐滋事端今既有擒獲之信伊等即懷叵測亦已絶望又何必多行殺戮兆惠等務宜體察情形若安插伊等尚可不致生事即將伊等同家口移於安西等處歸併緑旗兵或不便內移及恐沿途脫逃生事又或二賊之信未確來年仍須進兵兆惠等仍遵前㫖酌量辦理其二賊離異之妻室等著解送來京餘人暫安插於吐魯番候㫖定奪又諭曰兆惠所奏籌辦馬匹一事今復辦馬一萬匹送往葉爾羌俟逆賊等獻出與否再為酌量行止此時信息尚未確實兆惠等其相機妥辦諭刑部侍郎永貴等酌量留遣索倫兵丁上諭軍機大臣曰兆惠聞德舒被害之信令副都統銜阿定保領索倫兵五百名前赴永貴處聽候協𠞰前因永貴領兵追勦嗎哈沁曽諭努三㑹𠞰不知曽合隊否計永貴應已獲賊竣事此等索倫兵既在軍前年久而拔達克山又將逆賊等獻出即可撤回游牧如信息未確則就近暫住庫車以候調遣議休息喀爾喀部落事宜定邊左副將軍成衮扎布等奏言查喀爾喀四部落從前災傷盜竊以致失業荷䝉聖主賑貸頻施但積歉之餘尚多拮据臣伏查乾隆十八年起有交喀爾喀等牧放之馬駝羊隻除軍需應用及寬免倒斃外尚有應賠之馬一萬五千六百一十六匹駝五千二百八十三隻乳牛五千九百七隻羊二萬六千六百三十二隻又二十年進兵及擒青滚雜卜仍有應賠之馬三千六百七十匹有竒駝七百隻有竒此時西三部落將二十一年盜竊各牲隻並貸賠車臣汗部落之項雖經賠補尚未足數仰懇聖恩將應行催交各牲隻寬限二三年似於䝉古等生計有裨又查軍營更替之侍衛官員等以公事往來各部落應付馬匹䝉古等多有藏匿遺失今公務漸少臺馬足用請將侍衛官員等停其供給専由臺站辦理即有來往各旗差使亦遵限制庶䝉古等得各謀生理久自充裕至布延圖之兵從前奉有暫行駐劄之㫖現在各部落互相推諉請飭交副將軍盟長及烏梁海等令其照例均管庶不致偏枯奏入得㫖軍機大臣議奏尋議哈爾哈應賠馬匹俱經屢次展限自不便再為延緩但年來哈爾哈等委屬拮据應請交與成衮扎布令其定限具奏至北路軍營事件無多臺站馬匹亦足嗣後侍衛官員等應請停止𣲖取䝉古馬匹概從臺站辦理至差往各部落人等其應付馬匹原有官品定額或奉行日久私自多索亦未可定應再行申禁有額外騷擾䝉古者即告知該扎薩克詳報將軍查參又所奏布延圖軍營請飭各部落均辦查布延圖駐兵現在無事自應裁撤但副將軍䇿布登扎布尚在伊犂堵截逃賊請俟事竣之日即行撤回臣等更請申飭該扎薩克等宜仰體皇仁約束所部勿為逃盜有犯必懲毋事姑息則良善得以安居而生計漸臻饒裕矣奏入上從之丁丑定邊右副將軍富德等疏奏拔達克山遣使情形富德等奏言臣等遣往拔達克山之厄魯特侍衛薩穆坦及回人伯克素勒坦和卓等同拔達克山汗素勒坦沙來使鄂穆爾拜到營據薩穆坦等告稱七月十八日自巴沙楚爾起程二十六日抵素勒坦沙所居次日素勒坦沙遣人來迎相見後告以逆賊霍集占受大皇帝深恩得回故土乃反覆叛逆戕害大臣今嵗大兵進𠞰伊等望風逃竄我兵若深入爾地久已擒獲因不忍以逆賊之故驚擾無罪部落是以遣使曉示爾當速為擒獻素勒坦沙云我並不知霍集占等罪惡如此遂令霍集占遣來之鄂斯璊雅斯布庫里相見薩穆坦以言折辨不能回答二十八日素勒坦沙邀霍集占弟兄入城波羅泥都即入霍集占率餘衆於城外揚言云若將來使交出情願為爾奴僕素勒坦沙不允霍集占即搶掠村莊素勒坦沙遂將波羅泥都拘執領兵數千人圍困霍集占所據山岡霍集占胸背胯骨三處受傷旋被擒獲拉木呼里巴爾巴呼里被殺鄂斯璊雅斯布庫里亦俱受傷薩穆坦等勸令縛獻素勒坦沙商之衆頭目及阿琿摩羅數人俱稱我等經典內凡𣲖罕帕爾子孫除戰爭外不許拏送與人恐他處阿琿摩羅及外部聞而生事大國救援不及今霍集占受傷將死祈禀明將軍等語即將霍集占兄弟拘禁並聞有送往布哈爾之語薩穆坦起程二日拔達克山遣人追來告稱霍集占傷重身死臣等將素勒坦沙來書譯看與薩穆坦等所告相同隨於二十五日㑹集大臣侍衛官員令來使鄂穆爾拜進見所告如前并稱進獻馬匹臣等再三曉示仍面斥來使云汝等口稱降附若不擒獻逆賊即屬獲罪況霍集占等統衆數萬原欲據爾土地幸大兵勦殺殆盡爾等始得安生我大兵尚不肯輕入爾境恐有騷擾爾等既得保全又幸掠獲乃不擒獻逆賊我等即行進兵矣鄂穆爾拜懇告云俟𫝊知素勒坦沙再行定奪即賞茶遣出是日薄暮鄂穆爾拜再求進見述及擒獲霍集占等時阿琿摩羅俱各哭泣素勒坦沙原欲呈送因伊等有欲將房屋焚毁前往默克以爾罪𫝊知各部之語是以中止將軍大人再差人前往素勒坦沙自不敢違臣等問其送往布哈爾之事據稱雖傳言送往但既與結仇必不能行惟離拔達克山二日程途有一監禁罪人之地或送彼看守等語臣等隨給以諭素勒坦沙之書併賞來使銀兩縀匹限期二十五日如過期不至即行進兵然必將生者縛送死者呈驗將首級解送方可於二十六日清晨仍同薩穆坦等起程一面密令額爾登額伍岱成果領兵三十名㑹同薩穆坦行走復令伊柱巴圖濟爾噶爾霍集斯領兵前往瓦罕附近處所臣等亦移兵續進并據瓦罕伯克密爾莽蘇爾遣伊子蘇爾坦具呈願以所管千餘户歸降俱撫慰遣回奏入上諭軍機大臣曰富德等奏稱伊遣往拔達克山之侍衛等回報逆賊波羅泥都兄弟俱被素勒坦沙擒獲霍集占受傷身死因回人經典不便呈獻富德仍致書嚴索約日起程等語看來富德從前若直前追𠞰久經俘獲乃坐失機㑹朕深為追悔不知富德等亦知愧悔否若非伊等前此曽經效力朕必重治其罪今既遣人再索因敕諭素勒坦沙并賞伊縀匹由臺站發往將來二賊如仍未獻出則來年進兵斷不可已必以獲賊為竣事此次厄魯特侍衛薩穆坦等行走甚屬奮勉薩穆坦著加恩授為二等侍衛素勒坦和卓額勒木布爾額色木俱賞戴孔雀翎授為三等侍衛敦多卜既經奬賞藍翎即授為藍翎侍衛其隨去回人等著富德酌量賞給以示鼓勵賜拔達克山素勒坦沙敕書奉天承運皇帝敕諭拔達克山汗素勒坦沙據將軍富德等奏爾奉將軍檄文擒拏逆賊霍集占波羅泥都具見恭順聞霍集占受傷身故波羅泥都現在拘禁爾復遣鄂穆爾拜同侍衛等前來以爾等經典擒獲𣲖噶木巴爾子孫不便呈獻致别部落興戎將軍大臣等以霍集占等罪惡再行曉示若不呈獻即日進兵朕為天下共主內外一體咸加撫育況爾慕化歸誠深用嘉悅惟是霍集占兄弟前為準噶爾拘禁因大兵平定伊犂釋其囚縶俾居故地自應感激圖報乃負恩背義反將所遣大臣官兵盡行戕害是以興師問罪復敢聚黨抗命肆虐無辜强奪婦女與爾等經教大相背戾衆怨沸騰今年大兵進勦葉爾羌喀什噶爾等城咸思歸附二賊恐被縛獻先率其黨與跳身逺遁然逆徒數萬直抵拔達克山雖不敢抗我軍威實足據爾土地我大兵撫定各城即行追襲勦殺無算乞降者萬餘人僅存餘孽以入爾境將軍大臣等非不能窮追直入實體朕好生之心不忍擾害無罪部落朕亦屢諭將軍等暫停師旅故逆賊等未即就擒今爾乃以阿琿摩羅離心及别部落啓釁為詞此等情事縱實尚屬未然今大兵壓境即暫時休息來年必兵馬雲集斯時又誰能相助此中利害之重輕自宜熟計至我大國兵力爾等當亦聞知即平定準噶爾由於𫝊說若收服葉爾羌喀什噶爾逆賊數萬衆望風奔竄乃爾等目覩者爾素勒坦沙宜中有定見勿惑人言將霍集占之尸與波羅泥都送至軍前朕必厚加恩賞但爾如果已𠞰擒霍集占等又何惜而不獻其為爾部落留養飾詞以對情節顯然此等語將軍大臣尚不受爾欺矧敢於朕前支飾耶此時惟悔悟縛獻則前事皆可不論今因降敕賜爾蟒縀色縀各二端爾其深思熟計以享無窮之福特諭以索取逆賊霍集占等宣諭中外上諭大學士曰將軍兆惠富德等先後奏報大兵追𠞰逆賊霍集占波羅泥都抵拔達克山界其部長素勒坦沙告稱遵將軍大人諭邀擊二賊現已鎗斃霍集占生擒波羅泥都所差侍衛薩穆坦俱經目覩但回部信奉經典從無自擒族類轉送與人之例若竟呈獻天朝恐别部落必來滋事是以求免等語已𫝊諭兆惠富德等令即尅期勒兵向索且曉譬順逆以該部落既知歸誠內屬理應獻賊自效即以回部舊俗不自相戕為詞則已不應有生擒鎗斃之舉况慮他日諸部之滋事較此時天朝大兵之壓境其利害尤為明白易曉如果該部落即日遵諭獻出則膚功自可告竣而庸懦無識之徒或以諸城悉定各部欵降似此㷀㷀逋賊何必更事窮追致滋勞費殊不知用兵回部原非朕之本意當伊犂平定準噶爾悉入版圖而東西布魯特左右哈薩克等無不傾心向化何有於花門雜種而必欲為窮兵黷武之事實以逆賊兄弟負恩反噬不得不明正其罪以彰撻伐今葉爾羌喀什噶爾均就撫綏設官定賦其於回部大局固已全定獨逆賊兄弟尚未懸首藁街此皆從前雅爾哈善玩寇僨事於攻圍庫車時使已投羅網之逆孽復得逺揚蹉跎輾轉以至今日實為此事罪魁自兆惠富德統兵以來掃其巢穴分路進𠞰屢獲全勝獨惜富德等兵至伊西洱庫爾淖爾其時逆賊疲憊已甚即謂我軍馬力稍乏但乘勢精選數百騎緊躡其後即可直抵拔達克山協同捕獲何至該部落得以藉口此亦因富德等俘獲衆多其氣不無稍懈而明瑞在京時朕曽諭以臨陳須當慎重遂致誤㑹未免少為徘徊耳然此時大軍方駐彼地不過賈其餘勇即可集事又何所增其勞費若意在茍且遷就遽欲貢諛稱賀謂可息事寧人則朕斷斷不為也如前此阿睦爾撒納已伏冥誅並遣大臣驗實因逆尸究未獻出朕即不肯告廟受賀以為自欺欺人之計此內外諸臣所共知者况堂堂大清兵力全盛而回部之賦稅屯田之收穫以及沿途貿易城倉積貯儲需充裕不獨內地毫無飛挽饋運之勞而陜甘兩省蠲賑之恩有加無已閭閻初不知有軍興徴發豈漢唐宋明諸代疲中國之財力而不能得地尺寸者可比今統計用兵不越五年而西陲萬餘里城無不下衆無不降此實仰荷上蒼福佑得以奏兹偉績而人事之因時順應尤不可不善以承之也我滿洲風尚素稱淳朴勇往而承平日久八旗子弟多耽安逸偶遇軍旅之事轉致不能嫻習朕於此舉正欲訓誨督率之俾習勤勞而諳韜略而諸臣中或猶有狃於小利近功不知事機之緩急者古者無事之時不廢訓戎講武今以法無可逭之逆酋當功有必成之事㑹且可藉以練我殺敵致果之將材又何所顧慮而竟為浮論所惑急圖完局貽笑方來也不然則佳兵之誡朕念之熟矣豈尚存好大喜功之見以耀兵威而勤逺略耶著將此宣諭中外知之諭定邊將軍兆惠等仍駐葉爾羌上諭軍機大臣曰朕敕諭拔達克山素勒坦沙令將逆賊等擒獻倘稍有欺飾延緩則來年尚須進兵兆惠不必往英噶薩爾仍駐兵葉爾羌查辦新降回衆諭辦理屯田副都統定長等體恤雇運商駝上諭軍機大臣曰同德奏准定長咨稱從巴里坤運籽種等項駝隻已轉雇運往烏魯木齊歸途又轉運軍營衣物不必送回原處等語此等運往闢展駝隻皆係官雇商駝若節次轉運則商民畏難不前勢必更煩官辦且致貽誤即使偶從轉雇亦必視其情願與否不可勉强從事著𫝊諭定長同德知之諭陜甘總督楊應琚等辦送馬匹事宜上諭軍機大臣曰同德奏稱巴里坤所有馬匹擇其臕壯者五千匹在北山前坡牧放俟至十月收槽之時加意餧養等語此項馬匹特為軍營需用已𣲖清馥同乾清門侍衛等由去年阿里衮送馬之路緩行送往同德應即預備分起陸續起程即如阿里衮所送之馬於十月間由庫車一路前進地氣和暖水草不乏是以應用無誤若此時不行預備待至春來必不能及且轉不若額林哈畢爾噶之徑捷矣同德竟不知事體緩急漫以收槽餧養為言著𫝊諭楊應琚清馥五吉同德等遵照屢降諭㫖辦理併𫝊諭舒常等亦作速前往㑹同行走平定準噶爾方略正編卷七十九
