body:
  text: 乾隆二十三年八月庚申諭定邊左副将軍成衮扎布等嚴拏搶奪臺站馬匹賊衆上諭軍機大臣曰成衮扎布奏稱據管臺協理台吉瑪克蘇爾等報有賊人二起夤夜搶奪烏爾都里克臺馬匹隨派兵前往查拏等語此等賊人敢於搶奪臺站馬匹是否係舍楞餘黨抑或烏梁海㤙克屬人若不行嚴拏何以肅清臺路著𫝊諭成衮扎布等加意辦𫝊壬戌諭㕘贊大臣巴禄等速勦哈丹阿巴噶斯等餘賊上諭軍機大臣曰巴禄奏稱據圖倫楚達禮善等呈報追勦哈丹阿巴噶斯等餘賊至庫爾河源等處因水漲難行隨嚴飭設法渡河勦賊等語著傳諭圖倫楚從前因敏珠爾多爾濟達禮善等未能速殱逸賊是以派伊前往今賊踪已得又復託詞支飾可見全未奮勉効力其作何治罪之處伊等應亦知之現在巴禄領兵䇿應㑹同進勦其索取哈薩克鍚喇已委富徳及䇿布等扎布巴禄惟嚴行催督盡勦哈丹阿巴噶斯遺孽以靖地方議撥補寜夏等營缺額馬匹軍機大臣奏言黄廷桂奏寧夏各營摘缺之馬四千五百餘匹購補維艱請将鄂爾多斯購解馬四千匹留補缺額查臣等前議該督豫籌増備馬匹奏内以該省及巴里坤現備馬三萬五千匹来年増派官兵已足敷用其直𨽻等處辦馬八千匹應准留補各營缺額嗣因方觀承奏挑選營馬三千七百八十匹解送肅州臣等復議令豫備来春調用更屬寛裕其将鄂爾多斯馬匹留補寕夏各營缺額應如所奏辦理奏入上從之癸亥雅爾哈善等疏奏提督馬得勝等貽悞軍機雅爾哈善等奏言據提督馬得勝禀稱昨因大兵久圍庫車城堅難克請於所領兵丁内選能掘地道者令千總常繼春專管仍派副将達世朗防賊阻截俟掘至城根将火藥填滿㸃放城墻塌䧟自可直前攻取遂漸次刨掘距城祗二丈餘豫備火藥期七月十九日㸃放不意賊人知覺於十七日夜潛出城外離城十餘丈横掘大溝截斷以薪木填塞焚死掘地兵十名係達世朗等疎防等語查兵丁掘地距城甚近此一二晝夜更當加意防範探有賊踪即施鎗礮自少疎虞今伊等並不督率廵防以致兵丁被焚至次日始知覺禀報實屬昏惰溺職又臣等前於四月至哈喇沙爾馬得勝告稱副将楊景達報都司龔宜謙患病請暫留調理逾月未痊復請開缺另補臣等查龔宜謙實未患病因不能約束兵丁愧憤自行抹傷今已平復隨令查㕘仍遲延未辦六月又據報署守備陳自如行抵玉古爾有馬兵李子雲崔文彩趙繼明歩兵馬順等竊取官銀馬駝逃走臣等令查㕘該管僅請鞭責記過又據報運送口糧兵丁二千四百名有四百六十五名未到不知病故逃亡確數臣等詰以沿途何不早查惟以言語支吾至所送大神礮四位既經驗試損裂仍行充數致糜運費且馬得勝賦性怯懦七月間有卡倫兵報知十餘賊人踪跡即變色奔告云賊衆将近大營請速派索倫兵抵敵軍中傳為笑談至一切辦理事務因循含混用兵之際不可膺提督重任謹據實㕘奏請将馬得勝等革職嚴審究擬以昭炯戒奏入得㫖提督馬得勝係領隊大員似此庸懦失悞軍機著革職所領兵丁著閆相師暫管副将達世朗千總常繼春俱著革職達世朗員缺著左秀補授副将楊景達署守偹陳自如亦著革職楊景達員缺著莫倫岱補授㕘将左秀員缺著王玉廷補授諭大學士管陜甘總督黄廷桂嚴緝逃兵正法上諭軍機大臣曰據雅爾哈善等奏稱馬得勝所領緑旗兵内有馬兵李子雲等竊取官銀馬駝脱逃又運送口糧兵丁尚有四百六十餘名未到此内有病故逃亡未定等語此等兵丁既不能向前出力復敢竊物潛逃甚屬不法伊等逃回内地必由哈密安西巴里坤經過可傳諭黄廷桂行知安西提督哈密防鎮等速行通緝仍行文伊等食糧營汛及各本籍地方官一體查拏務獲不分首重即行正法以肅軍紀申諭定邊将軍兆恵辦理回部事宜上諭軍機大臣曰昨因雅爾哈善等疎脱霍集占已諭兆恵速往辦理回部然猶望雅爾哈善自知罪戾奮勉思贖旋據奏報現在分兵前進是以降㫖䇿勵以觀後效今雅爾哈善奏據俘獲人等供稱霍集占脱逃時曽與阿卜郡克勒木約誓一月之内必来救援恐分兵單弱擬候兆恵到日再行前進等語是雅爾哈善仍未進兵且㕘奏馬得勝刨掘地道為賊所覺致損兵丁罪固難逭而伊等所司何事其素無紀律可知且雅爾哈善初抵庫車因伯克托克托中計被擒心即惶惑惟思以進兵之事責成額敏和卓朕即降㫖訓飭又所奏攻克庫車後毁其城郭焚其廬舍撒兵回哈喇沙爾吐魯番等處来年再行進取朕復諭以時當夏令進兵之時遽議撒回恐衆志懈弛至得城即毁則来降回衆於何處安挿至今日所到奏摺有来降回人供稱與二十餘人出城取草等語賊既可出城取草則田穀何難收穫似此種種疎忽圍城復有何益可傳諭兆恵一抵庫車即将雅爾哈善拏解来京馬得勝失機僨事著兆恵嚴審具奏若進兵来竟無一兵防範追逐順徳訥駐兵要路固無所逃罪而将軍此時又安在耶且我兵穴地攻城本欲潛師取勝又何至遂為賊覺横開一溝而我兵轉無一知覺者甚知兵丁行竊脱逃毫無忌憚可見軍營調度乖方全無紀律己非一日雅爾哈善坐視賊酋竄逸頓兵城下不異守株待兎前後奏報情詞矛盾惟圖左枝右梧始㕘順徳訥以卸過繼㕘馬得勝以諉咎並無一語引罪殊不思身任元戎指麾諸将者誰之責歟此而不置之於法國憲安在已降㫖命兆恵就近前往庫車一帶辦理回部雅爾哈善哈寧阿順徳訥俱著革職兆恵至軍營日即著拏解来京将此先行通諭知之乙丑命議叙捜捕逸賊之營總阿薩喇勒圖等上諭軍機大臣曰據兆恵奏稱索倫營總阿薩喇勒圖於巴爾托輝西勒克搜𠞰善披領集賽賊衆百人收其馬駝軍器即係從前吉林營總兆齊等追捕未獲之賊等語阿薩喇勒圖甚屬効力著交部議叙其効力官兵及陣亡之署領催察凱等著查明送部議叙議䘏又諭曰兆恵所奏索倫領催阿丹察在阿圭雅斯山中搜獲巴爾達穆特之嗎哈沁三人訊知藏匿累年恐哈薩克錫喇亦似此潛身隨分兵捜捕等語查拏哈薩克錫喇已委富徳䇿布登扎布兆恵惟速往庫車以擒獲霍集占為要䕶軍統領努三等疏奏查勘屯田事宜努三等奏言欽遵諭㫖㑹同永貴定長納世通等查勘昌吉羅克倫等處屯田七月二十三日臣永貴等至烏魯木齊臣努三㑹同查勘昌吉距烏魯木齊六十餘里羅克倫距昌吉四十里舊係噶爾藏多爾濟之一千六百餘户㳺牧地平水足有河渠舊址修理亦易丈量得昌吉可墾田八萬餘畆羅克倫可墾田七萬餘畆臣等㑹議昌吉羅克倫各駐兵一千五百名更番開墾種植以休地力謹繪圖恭呈御覽奏入上諭軍機大臣曰努三前奏請查勘烏魯木齊屯田時朕即謂雖為期尚早亦當先事籌備隨諭黄廷桂来年木壘烏魯木齊屯田派兵七千名及辦給農工器具今昌吉等處既又可駐兵三千可傳諭黄廷桂照數添派兵丁合之前派七千即得萬人為數雖多但屯田兵惟取其習於耕作不必盡皆精壮黄廷桂宜酌量辦理如有不便即停其添派亦可仍與努三永貴等㑹商定議具奏丙寅諭定邊将軍兆恵等攻城不必専恃大礮上諭軍機大臣曰前因雅爾哈善請遣工人至軍前鑄造大礮已諭黄廷桂辦理今據奏鑄造大礮所需工料與尋常不同㣲有作難之意此特所派官員工役憚於逺行故為此説從前金川用兵兆惠曽與其事所鑄礮位自必深知若抵庫車時應需大礮則舒赫徳亦曽往金川即委令監造然朕意攻城不必專恃大礮當霍集占逃入庫車時圍守果嚴即無礮又豈能逃出若如雅爾哈善聽賊出入毫無防範雖有大礮亦復何用况現在穴地攻城反為賊斷皆由伊等高坐帳中以致官兵解體兆恵至彼務申明紀律一變從前疎懈之習可傳諭知之故違軍律之索倫佐領額楞額等正法上諭軍機大臣曰據福禄奏稱索倫總管羅爾博岱等呈報佐領額楞額因披甲烏勒噶車私請放回游牧見防禦托什奈患病誘其家奴巴岱頂替出兵請将烏勒噶車照脱逃例治罪額楞額交部議處等語額楞額徇情擅放故違軍律著即行正法烏勒噶車著嚴緝務獲正法巴岱穿箭游營後交與伊主托什奈管束托什奈即行首告不必科罪餘俱如所奏行藍翎侍衛富寅保托和里解送叛賊布庫察罕和碩齊至京審明正法授富寅保為三等侍衛賜號哈坦巴圖魯賞銀一百兩賞托和里銀三十兩賞縀各一端遣回軍營丁夘諭定邊左副将軍成衮扎布等搜捕哈薩克錫喇等賊衆上諭軍機大臣曰哈薩克錫喇雖傳聞逃入西哈薩克此時或又潛回舊㳺牧藏匿亦未可定可傳諭成衮扎布現在搜𠞰盜竊西路納呼臺砧馬匹之賊如無哈薩克錫喇在内即領兵至伊舊游牧於所遇嗎哈沁等嚴密搜𠞰再行撒回併傳諭福禄等帶領索倫兵經過哈卜塔克拜塔克等處将盜竊馬匹賊人及嗎哈沁等留心捜𠞰祗須派兵二三百名遣侍衛等分路前往亦不必過於留滯致悞前抵軍營之期察哈爾馬甲畢里克圖以親見和碩齊更衣降賊来京質對授為藍翎侍衛賜號圖爾根巴圖魯賞銀一百兩與藍領侍衛賽音圖俱遣回游牧己巳辦理屯田侍郎永貴等疏奏酌議駐兵築堡等事宜永貴等奏言臣等昨奉諭㫖因兆恵前赴庫車所需糧餉應於吐魯番貯備且現在徑從哈密至吐魯番令臣永貴定長二人内酌留一員駐劄辦理其運糧駝隻亦宜擇地牧放臣等查阿里衮從巴里坤運糧一千四百石已於六月起程向烏魯木齊進發隨行文阿里衮約計兆恵軍營需用之數留於吐魯番其牧放駝隻詢問回人等俱稱吐魯番闢展一帶可牧駝六七千隻至貯備糧餉查魯克察克喀喇和卓吐魯番俱係回人居住惟闢展舊堡尚係空閒應請苫葢倉厫收貯屯田所穫與巴里坤哈密運来糧餉軍械農器等件令同知都司分管再闢展地居衝要自巴里坤哈密及兩路軍營往来事件俱由此經過距吐魯番百餘里臣永貴定長清馥納世通内酌留二人駐劄辦事此次吐魯番截留之糧請即移貯闢展又屯田各處現在築堡葢厫派兵㸔守俟工竣之日續行具奏奏入報聞命察議辦理屯田侍郎永貴等上諭軍機大臣曰永貴等奏稱署章京巴顔徳等追捕搶奪軍需之賊因路遙馬乏回至軍營等語從前永貴等往追盜竊馬匹賊人未能擒獲今巴顔徳又復如此若追賊官兵皆似此託詞支飾則臺路何時寧靜永貴定長納世通及巴顔徳等俱著交部察議其綠旗千把總等員著永貴等查明懲治庚午恩賞喀爾喀策卜登公品級上諭軍機大臣曰原封喀爾喀貝勒䇿卜登係叛賊青滚雜卜案内之人自應按律治罪朕因其平日為人愚昧又年老可矜從寛革去貝勒仍准伊子承襲今䇿卜登感恩悔罪抒誠入覲朕念伊在皇祖皇考時曽經宣力著加恩賞給公品級遣回游牧辛未諭㕘贊大臣扎隆阿辦理擒獲烏梁海逃犯等事宜上諭軍機大臣曰據扎隆阿奏車木楚克扎布報稱内大臣察達克往追恩克至濟卜哈魯克獲其母及弟婦恩克同妻子逃往蘇穆勒乂公多岳特報稱總管車根往追阿喇善等有同逃之得木齊扎布勒岱復歸協擒阿喇善碩吹盡收其所屬等語察達克車根甚屬奮勉効力著加恩各賞縀六端其所領兵丁効力及被傷者查明酌量奨賞擒獲之阿喇善碩吹暫行監禁俟恩克獲日将伊等所屬男丁十六嵗以上者一同送京其婦人幼子即分賞察達克等扎布勒岱既悔罪復還從寛免其治罪交與該總管等約束安揷著傳諭扎隆阿行文車木楚克扎布以恩㫖曉示伊等知之命賞吐魯番貝勒額敏和卓三眼孔雀翎阿拉善公衮楚克䨇眼孔雀翎甲戌申諭定邊将軍兆恵速往辦理回部上諭軍機大臣曰從前雅爾哈善等以六月十六日撃敗霍集占援兵昨據兆恵所奏俘獲厄魯特供詞云曽隨霍集占戰敗逃入後山於七月二十四日至特勒克等語看来伊等行走月餘特因輾轉逃匿若我兵直抵庫車必較為迅速乃所奏但言捜捕哈薩克錫喇尚未有速往回部之意豈以前有往哈薩克索取叛賊亦可之諭遂爾拘泥抑或不願前往從中觀望若如此存心避難就易則更不可且兆恵等曽以厄魯特賊黨淨盡即䇿妄阿喇布坦復生亦無可如何等語見之章奏而又借搜捕逸賊留戀伊犁自相刺謬諒不至此此時應接奉屢次諭㫖迅速啓行矣現因辦理回部調發健鋭營兵一千名索倫兵二千名察哈爾兵一千名軍威甚壮今年斷不撤兵且必於今冬竣事葢大兵一撤則回人又来奪據城堡種植禾稼惟相持不解則賊人無從得食而我官兵糧餉馬匹又由哈密源源接濟自可早奏膚功兆恵其加意奮勉毋蹈覆轍議養贍屯田兵丁等事宜巴里坤辦事副都統阿里衮奏言雅爾哈善永貴等議於哈喇沙爾托克三闢展烏魯木齊等處屯田兵三千六百名外再増二千四百名酌於收穫後分往哈密巴里坤居住又哈密所設卡倫兵多亦酌量裁撤調往屯田等語查黄廷桂奏稱哈密有夾山路徑可至吐魯番而巴里坤糧餉均由哈密運送應請将撤回屯兵俱於哈密居住以節運費再哈密駐兵二千名所設卡倫七十三處除塔勒納沁等三十二卡倫仍須安設其餘一顆樹等三十九卡倫均可裁撤又聽差各兵丁内亦可裁減酌於各項兵丁内抽調六百名遣往屯田奏入得㫖軍機大臣議奏尋議屯田兵丁因耕作初興收穫不敷養贍是以議令暫回就食俟来年佈種前再行發往今阿里衮既稱哈密地方寛廣可以安挿且較巴里坤更省運費應如所奏辦理其收穫穀石農工器具前已議令回人就近㸔守量給口糧至添派屯田兵丁經雅爾哈善等議於征回兵内撤往續奉諭㫖令從内地調發應俟黄廷桂等酌議至準噶爾即經平定哈密卡倫自當酌量裁減應如所奏将所減卡倫及聽差兵丁六百名入於屯田兵數仍知㑹黄廷桂永貴阿里衮等查照辦理奏入上從之丁丑諭辦理屯田侍郎永貴等接濟䇿布登扎布軍營糧餉上諭軍機大臣曰䇿布登扎布奏稱在古爾班察爾得㫖前往西哈薩克䇿應富徳詢厄魯特嚮導云從此地須行走三個月若仍回伊犁由沙喇擘勒前往較近約計官兵口糧可至八月等語前諭䇿布登扎布䇿應富徳如哈薩克錫喇仍未弋獲即徑往庫車倘糧餉不敷可向烏魯木齊支給并令行文永貴酌量辦理今據所奏則軍前口糧現須接濟可傳諭永貴等即於烏魯木齊貯備糧餉内速行運送併傳諭䇿布登扎布知之戊寅雅爾哈善等疏奏庫車回衆出降雅爾哈善等奏言臣等攻圍庫車賊衆勢不能支八月初二日又布陣揚威遣人至城下招撫降者漸多臣等督同領隊大臣侍衛等晝夜防範初五日夜半風雨忽作有賊約四五十騎自城東北逃出副都統順徳訥侍衞徳爾森保等射殺三人順徳訥領兵向托木羅克追𠞰徳爾森保向沙勒達朗追𠞰續有賊四十餘人自城西南衝出為侍衞富紹署營總薩斯泰察哈爾㕘領索諾木等盡行𠞰殺又有賊十餘人自南衝出為吉林署㕘領濟蘇鑑保等盡行射殺總管端濟布公朗衮扎卜侍衛富紹齊凌扎卜等追至鄂根河集沿河卡倫兵丁扼守渡口邀截逃賊隨據看守南門總兵閆相師送到投誠回人五名據稱我等合城回衆早欲投誠因為阿卜都克勒木所制未敢擅動今伊既逃去我等情願歸降等語臣等示以明早可令舊頭目来見次日清晨臣等至城下有舊小伯克阿濟等将阿卜都克勒木之妻阿晒子珠勒海阿卜都哈帕爾等擒獻即行正法又擒送沙喇斯等二十八人自伊犁從逆回衆一百五十人臣等将伊等罪惡傳示回衆俱即正法又阿卜都克勒木之親兄呼爾班已被官兵射殺其妻妾亦即正法此等已經正法賊人家口分給臣額敏和卓鄂對阿𤓰斯伯凱瑪哈黙第色梯巴勒氐噶岱黙特阿卜都賚等為奴通計在城回人三千六百餘口此内有賽里木男婦一百二十四口沙雅爾一百五十八口俱給與兩處投誠頭目其庫爾勒四百八十五口因托克托被害仍安揷本城居住收獲牲隻軍器暫行存貯備賞又回人等告稱尚有助惡害人之沙泥雅斯沙珠魯卜阿克珠勒索否呢雅斯呼爾班等五人隨加審訊俱各服罪亦即正法示衆復派侍衛清保柱桑古善等廵查逸賊俱有斬獲又據順徳訥遣人告稱因昏夜追賊迷踪天明見有四五十人踪跡現在嚴追斷不空回等語臣等一面派哈寧阿入城安撫一面料理進兵擬於八月初八日起程向沙勒達朗等處收割田麥以作口糧俟順徳訥等回營即進取阿克蘇仍遵㫖令貝子玉素富領緑旗兵一千五百名回兵一百五十名駐防庫車其餘緑旗兵或暫留庫車或調往屯田請㫖遵行又與散秩大臣鄂對酌選伊勒噶爾伯克伊斯邁勒總辦庫車事務阿第勒雅科卜協辦事務又鄂對之子鄂斯璊亦隨同辦理再臣等以伯克托克托信息詢問阿濟等據稱從前被回人拘禁霍集占入城次日即行戕害查伊子塞第克現在吐魯番公素賚璊處可否准其襲職及同行之馬英徳官住等照例議卹出自聖恩奏入上諭軍機大臣曰雅爾哈善等頓兵庫車諸事疎懈朕即謂将来必致渠魁逃竄所留者無闗緊要之人今據奏稱阿卜都克勒木夤夜逃走舊小伯克等出降等語果不出朕所料此時伊等已經得城即應速行進兵乃必候順徳訥回營殊不可解著傳諭雅爾哈善朕於伊等亦無可指示惟㸔其効力如何耳申諭定邊将軍兆恵速往辦理回部上諭軍機大臣曰雅爾哈善等奏庫車賊首阿卜都克勒木逃竄餘衆出降是賊人出入自如尚得云兵力攻取乎且得城後即應進兵乃又候順徳訥追賊回營則将軍及㕘贊大臣所司何事雅爾哈善不堪任使至於此極可傳諭兆恵作速領兵前進此時順徳訥果擒獲阿卜都克勒木尚可贖罪若仍前支吾粉飾著兆恵訊明從前疎脱霍集占屬實即於彼處正法或有别情即與雅爾哈善哈寧阿一同拏問派妥員押解来京朕親訊情節至霍集占曽有再来救援之誓迄今杳無聲息可見逆賊計窮力竭以致衆人解體大軍所臨惟有孑身逺遁更有何能兆恵惟以雅爾哈善為戒堅心進𠞰一切機宜不必専候指示所留緑旗丁四千名現在攻取回城正需分守且可助大兵聲勢不必遣往屯田又諭曰伯克托克托署守偹馬英徳筆帖式官住初至庫車即為賊誘害深可憫惻托克托散秩大臣職銜令伊子塞第克承襲馬英徳官住著交部照陣亡例議卹兆恵即傳諭官兵等知之諭定邊左副将軍成衮扎布辦理烏梁海事宜上諭軍機大臣曰據成衮扎布奏稱歸附之烏梁海等毎自言如山獸河魚任意行走難以嚴加管束大凡有命者無不貪生若順其性則不勞防範且省備兵籌餉之費等語烏梁海恩克阿喇善等脱逃本非大事成衮扎布如此陳奏未免過慮從前扎隆阿等奏到時朕於行在詢問總管圖布慎據奏二人不過生計稍窘欲歸舊游牧因論圖布慎爾如欲歸游牧亦聽其便而伊懇陳不願看来並非飾詞况察達克一聞恩克等脱逃即行追緝是舊烏梁海等久循法令本無可疑其妄動者不過一二新降之人若因此并謂舊人俱不可信豈情理耶總之駕馭此輩原不必過於防範伊等安静謀生則撫慰之若叛逃滋事則擒𠞰之而已可傳諭成衮扎布知之己夘申諭定邊将軍兆恵以雅爾哈善為戒上諭軍機大臣曰昨以雅爾哈善情罪諭知兆恵令其拏解来京今覆閲伊等奏摺愈為可恨即如阿卜都克勒木以四五十騎遁去城内降人共三千餘口此言即屬可疑伊黨與若止此數則我以八千人圍城應早生内變亦何難𠞰殺無遺且得城後回衆獻出助惡之沙泥雅斯等五人遂俱正法此五人若果為阿卜都克勒木死黨則豈肯舍之而去致坐受老弱之擒獻此中情節豈復可問况納降既定雅爾哈善仍未入城但令哈寧阿前往看視而屢次奏報從未有身親其事者又焉用将軍為也試數用兵以来膺專閫之寄有似此因循疎懈者否兆恵當以為戒奮勉前進現在已至何處彼處情形若何作速奏聞宣諭雅爾哈善罪状上諭大學士曰雅爾哈善進兵庫車屢次失機貽悞前已降㫖宣諭矣今據奏庫車賊首阿卜都克勒木率衆夜遁所餘老弱出降現在順徳訥往追俟回營時再行進兵等語以八九千官兵駐守三月之久俟賊首逃去城中窮蹙出降始得其城雅爾哈善其尚何顔以得城奏報耶辦理回部一事從前因逆賊霍集占等係我兵平定伊犁時出諸厄魯特拘禁之中俾仍長舊地而狼子野心旋復戕害我副都統阿敏道負恩肆逆不得不行𠞰滅而雅爾哈善在巴里坤辦理沙克都爾曼濟一事頗能乘機奮勉是以屢加優擢今春進兵即授為将軍伊既膺討逆之任自應倍加勇往以擒獲叛賊為務詎意懈弛僨事竟有出於意料之外者前此霍集占親率賊衆来援庫車屢經挫衂乃既不能擒獲於臨陣復不能覺察於入城一任其潛入潛出並無措置而徒以堵截之責委之順徳訥而已不預至掘城一事用緑旗繆計復全聽之馬得勝轉致為賊所覺横開一溝傷我兵卒種種坐失事機以如許兵力圍一彈丸之城而賊首出入自如不知統兵大帥身在何處朕彼時觀其情形怠玩若此早知庫車城中為賊腹心拒守者必将盡行狡脱僅餘老弱而後得之當即屢降諭㫖令其加意防守勿致逃逸今觀所奏庫車頭目阿卜都克勒木領衆夜遁惟餘老弱出降一一不出所料可見雅爾哈善於霍集占脱逃時不親往追擒馬得勝掘城時又不能躬行相度又回衆出降尚不入城查閲亦不急行進𠞰數月以来惟事坐守軍營老師糜餉直待賊人兎脱䑕竄相率盡出而後得一空城以報命且忝為大師不能身先士卒致一切措置遲悞盡以委之他人初無一語引罪但知髙坐帳中以郵符奏報自任若代他人傳述者則雖芻靈木偶皆可勝任何必復簡用将軍為哉今雖得庫車而城中所存率係饑疲殘廢轉須為之養贍即得城亦復何用且伊奏内沙喇斯瑪呼斯等厄魯特及自伊犁逃歸回衆所有男丁不過一千餘名設賊黨果止此數豈能拒守如許之久又稱回衆供出沙呢雅斯等五人訊明正法此五人者既係阿卜都克勒木惡黨能鈐制諸人不令出降即何難與之同竄而必坐以待斃所奏荒唐悖謬如此謂無欺飾情弊其誰信之核其前後情罪從来悞事之臣未有若是之甚者夫賞功罰罪國有常典雅爾哈善前辦理沙克都爾曼濟時朕以其奮勉可嘉即授為内大臣并将伊子補授侍衛今乖謬失律至此雖欲為之曲貸其如國法何已降㫖兆恵等将伊拏解来京治罪伊子並著發往黒龍江當差朕於諸臣功罪毫無成見惟有信賞必罰以彰憲典而已将此通行傳諭知之辛巳㕘贊大臣富徳疏奏招撫布魯特情形富徳奏言臣與巴圖濟爾噶爾瑪常額爾登額等領兵七百名於七月初六日至布魯特之塔拉斯其頭目邁塔克哲野木又喀喇博托之弟喀喇們都孑阿薩木及分管三百餘户之納蘇卜呼里俱来求見言及侍衛托倫泰招撫情事臣詢以西哈薩克相距程期據云邊界相錯有十數日數日不等西哈薩克之特栁克圖里拜等年来與塔什罕回人相攻不知勝負若何請遣人為大兵前導臣派三等侍衛䝉古勒岱吉林署㕘領赫申等前往西哈薩克查拏哈薩克錫喇若特桞克等情願歸誠遣使入覲即照例伴送至京又詢邁塔克等云從前圖魯起等告稱塔拉斯有三鄂拓克今惟科索楚啓台兩處其薩婁鄂拓克之阿克拜何以未來據稱阿克拜及伊姪車里黒葉里黒等三人分管五千户又愛達爾伯克管百餘户相距頗逺且與回人額哲伯特相攻故前此未導侍衛前往今阿克拜過夏之地去此只四五日程期等語臣即令邁塔克遣人前導派察哈爾藍翎侍衛伊達木扎卜戴奨賞藍翎之索倫領催林保等前往十二日伊達木扎卜等回營告稱阿克拜等所居名巴倫古特聞有恩㫖招撫俱歡悦歸誠阿克拜年老遣其子伯勒克愛達爾伯克有疾遣其弟諾竒等来見請與邁塔客子弟同行入覲臣令其隨營於十三日起程前往西哈薩克邊境計䝉固勒岱等八月初可回其哈薩克錫喇有無潛匿及西哈薩克果否歸誠或伊等請来年入覲則阿克拜等使人令且回游牧臣於八月内可抵伊犁等處奏入上諭軍機大臣曰富徳已至塔拉斯将抵西哈薩克邊界索取哈薩克鍚喇但哈薩克錫喇係額爾類舊屬去年在沙喇擘勒曽相通問已屢諭向額爾類索取著傳諭䇿布登扎布富徳仍遵前㫖辦理至回抵伊犁時若能由特穆爾圖淖爾直抵葉爾羌喀什噶爾更善否則徑徃阿克蘇與兆恵㑹合恊力擒獲霍集占以奏膚功壬午命布政使銜徳舒駐劄庫車辦事上諭軍機大臣曰現在已得庫車城大兵向前進發應照巴里坤之例特派大員駐劄徳舒在哈密辦理健鋭營兵起程後著即前往庫車駐劄辦事其協同阿里衮在巴里坤辦事著清馥前往命侍郎書山辦理屯田事務上諭大學士曰永貴効力軍前已閲數年自應更换書山著以侍郎銜同定長辦理屯田事務刑部侍郎員缺著永貴補授平定準噶爾方略正編卷六十
