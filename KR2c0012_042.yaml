body:
  text: 乾隆元年夏五月庚子命治䕶送夷使都司蘇隆等罪署寧逺大將軍查郎阿奏言準噶爾使臣吹納木喀等于四月十三日自軍營起塵都司蘇隆守備馬瑞隆率官兵百名䕶送出卡十五日吹納木喀遣人前行探覔水草至噶順地方遇自準噶爾部脱歸緑旗兵一人跟役一人吹納木喀即執之與蘇隆等言現在方議和好此二人又恐敗事我等請擕以歸蘇隆云二人在爾部日久天朝大國視此等人本無闗係即聽擕去竊思二人被掠久受艱苦始乘間脱歸將及大營自應與之俱還訊問始末請㫖安置豈有聽從夷使擕去之理且伊等實我之兵役非準噶爾部人私脱者比夷使恐其洩漏彼處消息故托詞詭詐蘇隆等何竟墮其術中即吹納木喀等必欲擕去噶順地方去大營僅二百餘里亦應遣人速赴軍營告知定奪蘇隆等率官兵百人夷使不過二十餘人何至畏之如虎隨聲附和若此况職在䕶送自應撥兵前行防察一切遇此等脱出者何難别置他所不令若輩得見乃先事不能豫籌臨事隨人指使怠忽玩悮慢不經心所宜據實糾劾奏入得㫖蘇隆馬瑞隆著革職拿解來京嚴審定擬具奏該部知道甲寅命分别籌辦駐防撤兵事宜定邊大將軍慶復等奏言臣等議留索倫巴爾虎兵二千名令齋三率領一千駐劄額克嶺綽起圗等處托勒徳爾率領一千駐劄烏里雅蘇台料理運送什物至綽爾多蘇爾泰所領奉天兵一千傅達禮所領吉林烏拉兵一千令隨額駙䇿凌駐劄鄂爾昆附近有水草處李如栢所領緑旗兵一千内有山西兵五百即令李如柏率之守鄂爾昆城直𨽻兵五百令遣副將等一人率之防守塔米爾城其暫留烏地兵丁及罪人等令卓鼐周英管轄暫留烏里雅蘇台及察罪廋爾緑旗兵一千令髙翰管轄並俟青草發生時遣歸駐劄鄂尹袞特里黙然爾喀兵一千五百以一千人留駐烏里雅蘇台于喀爾喀㕘贊貝勒中用一人更番管轄餘五百人駐鄂爾昆于喀爾喀副將軍亦用一人更番管轄其撒囘官兵請如去年發還官兵例應領馬匹各減半辦給滿洲家選兵丁舊例人給馬三匹今減一匹各給二匹去年漢軍人給車脚銀十二兩今軍營馬匹甚多亦請人給馬二匹到京後赴本旗滿洲都統繳還至緑旗兵人給車價銀六兩其各項兵丁運載軍器什物亦給車價銀六兩分給口糧如前計算抵其原處逺者七十日其次六十日近者五十日種地及罪人擕帶妻子者每口給車價銀四兩大口日給米八合三勺小口半之定于五月初九日以次起行此次撒還官兵雖或未經戰陣然在營効力並已數年中亦有在額爾得尼招等處臨陣者請定以三等與前番一體揀選酌用總理王大臣等義應如所請奏入上從之六月己巳命加恩議叙有功弁丁並寛免虧項之可原者上諭總理王大臣等曰自雍正五年用兵準噶爾以來大臣官弁兵丁俱軍前効力有年今軍務已定除功績顯著黽勉効力已經加恩外尚有應加恩者著總理王大臣等查明分别將如何加恩之處議奏再軍需各項虧空當辦理紛紜之際自應從嚴俱著落追賠但其中情事固有輕重其情重應賠者仍令追賠若情有可原應加寛免者著王大臣等查明分别議奏王大臣等奏言大將軍及各大臣等現在議叙陞賞其文武官員兵丁平郡王與查郎阿等已核明分一二等送部議叙此外或有未獲沾恩者請令總督查郎阿劉於義額駙䇿凌詳悉核實報部議叙如例又虧空軍需錢糧雖與尋常不同但其中或有出于不得已挪用虧空者亦有核減浮用責償者其案牘具在乞令該部㑹同察核詳議奏入上諭之尋䇿凌覆奏言臣等詳勘自軍興以來凡勞績顯著奮勉出力者量其事跡悉已施恩並無遺漏之人查郎阿覆奏言武忱五十九佛保來成徳髙偉五人及黑色僧保常明柱索鼐等四人並列一等伊昌阿賽音察克詹布道徳常明七十五巴顔福黑達色等八人並列二等奏入報聞命以侍衛等巡察卡倫定邊大將軍慶復奏言前者戍兵駐烏里雅蘇台喀爾喀游牧未經内移是以巡視卡倫即用參贊大臣等二人並協理台吉一人周圍察閲今既移戍鄂爾昆喀爾喀游牧亦内移自南至北道途幾數千里未便仍令大臣巡視嗣後㕘贊大臣等至喀爾喀游牧處止同副將軍等閲兵及核騐器械軍裝其巡察卡倫請以侍衛二人台吉二人分道前徃㕘贊大臣駐烏里雅蘇台以待事畢報副將軍後即還大營總理王大臣議應如所請奏入上從之丁亥命免運糧車駝戸及商人應追脚價銀兩上諭總理王大臣等曰從前北路軍需内有運送科卜多截留察罕廋爾等處應追脚價銀二萬九千餘兩雖係商人承領而起運之時全數給發是以截留之後在于車駝戸名下著追已還過銀一萬四千餘兩尚有一萬四千餘兩未完朕思車駝戸較商人更為貧苦現今大兵既撒營運無多完項自屬艱難且多係並無家産之人朕心深為憫惻著將前項未完銀一萬四千一百四十四兩九錢俱行豁免又商人趙位侯等于觀音保運送軍需案内除十二案李成功脚價應行扣還外其餘數案多係因公賠累情節亦有可原且該商從前續辦軍需有節省銀二萬兩著該部查明即以節省之項抵補免其著追秋七月壬申命擢賞侍衛阿南達等上諭總理王大臣等曰北路撤囘之厄魯特二等侍衛阿南達三等侍衛巴當前在軍營頗知奮勉數次臨陣斬獲賊衆著有勞績曽經保送著加恩各陞一級阿南達授頭等侍衛巴當授二等侍衛其侍衛濟木巴等亦頗著勞績著一體加恩二等侍衛濟木巴阿喇卜珠爾阿喇卜坦俱授頭等侍衛三等侍衛巴顔授二等侍衛藍翎侍衛沙禮授三等侍衛鄂勒錐原係頭等侍衛著賞銀三百以示朕軫念軍營鼓舞効力人員之至意甲辰命免兵丁應賠馬匹上諭總理王大臣等曰軍前撒囘官兵所給馬匹定數之外有倒斃者例應賠償念其軍營効力勞苦多年此項馬匹沿途倒斃著加恩免其賠補鎮安將軍常賚等奏報撤囘兵自巴里坤起程次第常賚等奏言臣等按各營逺近定巴里坤起程次第第一隊㕘將盧度瑾等率陜西督標兵九百四十三名由中北路六月二十日起程第二隊副將王能愛等率固原標協兵二千六百四十六名由正北路副將陳經綸等率延綏兵九百二十九名由中北路並二十二日起程第三隊總兵官周一徳等率勇健營兵一千一百七十名由正北路副將王翰京等率西寧兵八百一十一名由中北路並二十四日起程第四隊總兵官楊竑等率涼州兵一千三百一十三名由中北路㕘將宋宗璋等率甘肅提標兵九百四名遊擊吴邦侯率安西土古魯坐卡兵三十名由中北路並二十六日起程第五隊總兵官張朝良率肅州兵一千二百九十名由中北路臣常賚顔清如馬㑹伯及員外郎僧保等副將韓良卿等率寧夏兵九百九十名殿後彈壓進口並二十八日起程至駐劄哈密換班兵丁五月中新兵已到遊擊孔以智等率舊駐兵一千名由中南路還安西先于六月十三日起程訖奏入報聞丁巳命豫備防賊事宜定邊副將軍額駙䇿凌奏言六月二十八日夜忽有賊至沙扎海卡倫盗馬一百二十五匹䕶軍熙卜求等跡之逃去本月初八日清晨賊兵百餘來窺卡倫熙卜求率䝉古兵登山據險鳥鎗齊發賊繞山逺伺日昃始去臣等伏思賊兩次潛至沙扎海卡倫或未知我撤兵虚實輒來探聽或將大隊設伏先以少兵誘我均未可定已令哈岱於烏里雅蘇台等處豫防賊即猝至無輕與戰臣等亦率兵由鄂爾昆出屯塔米爾等處嚴整以備奏入得㫖知道了凡事俱宜深思應機從事慎勿輕舉又諭總理王大臣等曰額駙䇿凌此奏可抄示查郎阿劉於義常賚樊廷等知之令其防範准備八月戊辰命免甘省州縣追償草束驢頭銀兩上諭内閣曰西陲用兵以來軍需浩繁有司承辦匪易其中實有浮冐情弊者自應著落賠補若事屬辦公情有可原者則當開恩寛免以示體恤朕聞甘省地方前因岳鍾琪檄令豫備喂養馬駝草束有司不得不遵照辦理後因買備多餘責令變價還項而露積日久草已霉爛隨經岳鍾琪有請照燒柴變價之奏又經許容有十分豁免三分之請朕思草束豈能久留事歴多年必至腐朽州縣實多賠累著署總督劉於義悉心確查除從前已經完補外其現在著追者即全行豁免又聞巴里坤駐兵時岳鍾琪檄令臨鞏甘涼等府買驢三萬頭以抵羊隻之用後因驢頭不能逺行將各州縣解過驢一萬四千餘頭止收六千餘頭其餘托言瘦小退囘變價所有沿途餧養草束俱不准開銷今價值尚未清結州縣實屬賠累此項亦著劉於義確查具奏將應行豁免者全行寛免俾州縣同受國恩益得盡心于職守以昭朕優恤甘省有司之至意己巳諭喀爾喀等游牧毋遽外徙上諭總理王大臣等曰西部喀爾喀等原在茂岱察罕廋爾扎卜堪河等處游牧因準噶爾厄魯特等久懐窺伺之意我皇考聖慮周詳念喀爾喀等若不豫令内徙賊來侵犯伊等游牧處不能一時就便遷移則人畜受傷而賊反獲利是以屢降諭㫖交大將軍及喀爾喀副將軍等將喀爾喀游牧内徙之處詳查定議具奏尋議喀爾喀等俱各向東移徙外以杭愛之隂塞楞額多懽鄂爾昆之鄂圭淖爾為界内以杭愛之陽翁金河古爾班賽堪等處為界去年喀爾喀扎薩克圗汗格勒克雅本丕勒奏稱伊所住哈魯納地方既無野獸又牲畜不得孶生乞移住于舊游牧推河伊克鄂拉翁金等處經大將軍議奏准其外徙現今噶爾丹策零遣使求和我大兵以次撤囘止留兵駐防邊境念準噶爾素與喀爾喀為讎寧保其不相侵犯自宜豫為之備喀爾喀等不知其故以為既經和好大兵全撤思念原游牧處漸欲向外遷移但計地方遼濶游牧從容不思居可虞之地被賊殘害牲畜擄掠子女之患是見小利而不知大計者也準噶爾定界之事尚在未决喀爾喀等之游牧且令勿遽挪移著額駙策凌等戒諭喀爾喀扎薩克人衆仍駐原駐之地禁其踰界游牧此亦為喀爾喀起見非欲竟棄其地也俟數載後準噶爾大定絶無可慮度量情形必令伊等仍移本處臨時再降諭㫖準噶爾部人孟克來降命賞給安插如例戍子準噶爾部人恭格敦多卜來降命賞給安插如例九月癸巳準噶爾部人白勒克達什來降命賞給安插如例丁酉命恩免陜甘兵丁應扣借給製造器械銀兩上諭總理王大臣等曰陜甘標營派出操演之兵所需器械有應製造添補者前經川陜總督查郎阿等奏請借給兵丁銀兩備辦于餉銀内分年坐扣朕思陜甘各標營自西路用兵以來出征者既効力行間存營者亦差遣繁重今操演各兵所需器械既據查郎阿將各項收貯之軍器可以撥給者併堪以修補者俱逐一查明料理其所需修補工價併添製器械所用銀兩著免其在各兵餉銀内坐扣工完之日據實造冊報部作正項開銷命加賞駐藏及哈宻官兵大學士川陜總督查郎阿奏言西北兩路軍營及苖彊大臣等恩詔賞俸半年兩路出征兵丁又奉上諭賞給一月錢糧按駐藏及駐哈密官弁兵丁逺戍已久與出征官兵一體効力請如西路軍營例一體加恩總理王大臣等議應如所請奏入上從之冬十月丁卯準噶爾部囘民托克托迷什來降命賞給安插如例庚午命内閣學士雙喜留京以布蘭泰管理軍營糧務壬申加恩兵丁孫海龍上諭總理王大臣等曰據提督樊廷奏稱興漢兵丁孫海龍于雍正八年在鏡兒泉出兵受傷被準噶爾擄去屢欲脱囘為賊所阻今于本年八月始得乘間脱囘等語孫海龍受傷被虜久羇賊穴今始脱囘情屬可憫著查郎阿㧞補把總在行伍効力辛巳命寛扎薩克等輸納羊隻之期上諭總理王大臣等曰總管覺和托奏請喀爾喀扎薩克等牧放官羊應令交送十萬隻以補蘇魯克所缺額數經爾等議奏十萬羊隻以遽令如數輸納恐一時趣辦不及請明嵗先令交送五萬隻其餘五萬隻戊午年再行交送業經依議行文辦理此項羊隻雖係官價備辦令其牧放但念䝉古人衆藉以孶生取乳于生計頗為有益若明年即令交送一半彼等遽失所利恐致拮据著行文額駙策凌等將明年應送之五萬隻展限戊午年送至其餘五萬隻于己未年送至丙戍準噶爾部人丹津率妻子等九人囘民和卓木巴勒第同來降命賞給安插如例命阿成阿統理烏里雅蘇台駐兵定邊副將軍額駙策凌奏言貝勒策卜登率喀爾喀兵一千駐烏里雅蘇台已届換班之期其應往代者㕘贊公敏珠爾等或有兼署或經赴京無人可遣乃策卜登不候交代擅還本處合行奏聞㕘處又烏里雅蘇台係三路通衢最闗緊要請以滿洲大臣一人駐劄總理喀爾喀㕘贊貝勒公等更番協理于特爾竒所駐二千索倫兵内選撥一千駐之總理王大臣等議覆曰策卜登不俟交代擅還本處請令理藩院議處䇿凌知換班無人不行知㑹亦屬不合應飭行烏里雅蘇台應如策凌所奏用滿洲大臣一人統理謹以軍營大臣等職名開列恭候欽㸃奏入得㫖所議是著阿成阿前徃戊子命蠲陜甘兩省明年額賦上諭内閣曰西陲用兵以來陜甘百姓轉運糧餉急公効力甚屬可嘉已䝉皇考叠沛恩膏厚加撫恤朕即位之初又將乾隆元年甘肅額徴錢糧全行豁免西安等屬豁免一半今朕復思大兵既撤正與民休息之時若再寛一年額賦則民力更可寛餘安居樂業著將乾隆二年甘肅錢糧全行蠲免西安等屬錢糧蠲免一半以示朕加恵秦民之至意十一月庚寅命員外郎諾敏等辦理安插囘民先是查郎阿奏言安插吐魯番囘人等並係安西總兵官辦理不能通曉囘人性情言語請如哈宻例令理藩院遣章京二人専辦總理王大臣等議應如所請開列理藩院章京引見得㫖依議著員外郎諾敏筆帖式色克圗前往準噶爾台吉車林率妻子等五人又厄魯特烏巴什率親屬等十七人又巴顔瑚魯什達庫楚克三人來降命授車林為三等侍衛餘悉賞給安插如例壬辰命詢準噶爾降人綽羅岱等準噶爾部人綽羅岱巴克根敦三人來降奉㫖觀此三人所供視前投誠者語較明白俟到日再行細問具奏其有應行施恩之處著從優給賞尋王大臣等詢問覆奏言據綽羅岱等云自吹納木喀歸知大皇帝欲以阿爾台山為界噶爾丹策零集宰桑大台吉等議小策零敦多卜言歴年既苦用兵本境足以游牧宜讓與大國為便其伯父之子大喇嘛拉卜立木言我出家人不知此事但我屬人日漸窮困大國必得阿爾台方許和好我意以和為美餘多阿諛噶爾丹策零者故其意亦未定又云策妄阿喇布坦死噶爾丹策零佯言為其妾塞特爾札卜所毒遂殺之并殺其所生四子四女現在與土爾扈特絶不來往與哈薩克布魯特並為讐敵凡準噶爾部人無不以定界和好為樂者奏入命安插綽羅岱等如例加賞袍帽銀緞有差丙辰命加賞駐防兵製辦冬衣銀兩上諭總理王大臣等曰現今兩路大兵已經撤囘而鄂爾昆烏里雅蘇台尚有駐防之奉天兵二千名寧古塔兵一千名黑龍江兵二千名緑旗兵二千名喀爾喀兵一千五百名屯種緑旗兵六百名哈密尚有駐防緑旗兵五百名共一萬四千一百名俱各戍守邊疆際此嚴冬卡倫瞭望偵探巡查倍覺寒苦朕心深為軫念著每名賞給銀三兩為製辦冬衣禦寒之具該管大臣即于軍營存貯銀内按名散給務令均沾實恵十二月庚申命布蘭泰留京侍養上諭總理王大臣等曰前令布蘭泰往北路管理糧餉事務聞布蘭泰之母年已七十有餘著令留京侍養其糧餉事務著常安自備資斧前往管理戊寅定議北路軍營善後事總理事務王大臣等奏言前奉上諭以果親王平郡王公慶復尚書海望來保都統傅鼐等奏摺令臣等從容議奏據諸臣所奏有請盡撤北路防兵者有請更行増兵者有請留現在兵丁者人各異見按現在鄂爾昆駐兵七千有餘喀爾喀防秋兵三千烏里雅蘇台駐兵一千喀爾喀天性怯懦若大兵盡撤則内失憑依外生疑貳賊人譎詐不無乘間滋事留兵所以安喀爾喀之心其勢既不可盡撤但増兵本為防守之計而現在既不進𠞰又何用多兵且所在皆䝉古游牧之地兵多則有礙牧放所需糧餉運送維艱且靡費無益也方今凖部兵食兩絀内外交訌又去北路甚逺冬時氷雪豈能涉逺冒險而來若夏秋之交率兵數千擾我邊境則烏里雅蘇台與鄂爾昆各有駐兵自可互為聲援倘更深入扎薩克歸化城之兵不難刻期調集烏里雅蘇台兵截其歸路扎薩克歸化城兵相為犄角鄂爾昆兵乘間夾攻賊人逺來疲弊盡殱何難賊雖至愚必不出此下策是戍兵又不必復増矣所有果親王請發京兵協助䝉古别自防守來保請于額爾得尼招駐兵一萬及傅鼐請盡撤鄂爾昆戍兵之處悉無庸議留戍兵中奉天寧古塔黑龍江五千人並三年當代但此三處兵丁皆熟練戎行若盡易新兵恐未練習請于明年先更代二千五百人又明年再更代二千五百人其慶復請撥呼倫貝爾索倫兵海望請撥索倫巴爾虎及内扎薩克與牛馬羣察喀爾兵之處臣等詳悉㕘酌明年換班時應撥察哈爾兵一千五百以在京副都統一人率之撥呼倫貝爾索倫兵一千以黑龍江副都統一人率之往代又明年選東三省兵二千馬羣兵五百往代如此則新舊相間勞逸既均而防戍兵亦皆精練又來保請每年七月撥歸化城等處兵五千至額爾得尼招駐劄按歸化城等處兵有事自可徴調若無事輒調多兵逺涉沙磧徒滋煩擾無益戎行應毋庸議又平郡王奏防秋兵三千人喀爾喀七旗中獨扎薩克圗汗部落在拜達里克西南駐牧正鄂爾昆之屏藩當令于附近駐防若撥往鄂爾昆名為進守反失其外障實屬未便且鄂爾昆即有徴調相去甚近無難立止按防秋兵自當相度便宜豫定規條庶幾臨期不悮應如所請令額駙策凌辦理又平郡王慶復並稱内地扎薩克沿磧南而居與喀爾喀接壤亦當令其發兵防秋與喀爾喀互相應接按臣等原議以扎薩克等為協濟之兵其兵數亦當議定應如平郡王慶復所請令内扎薩克等每嵗量撥兵二三千人防秋又果親王請豫令内扎薩克等各以撥兵豫備之數及率兵之王台吉等名次某處兵由某路而進悉行定議造冊報部亦應如所請辦理又平郡王請東三省及喀爾喀兵毎年於青草發生時令向西北數百里外伊克達巴罕烏蘭達巴罕齊老圖等處水草豐裕之地牧放駝馬教習田獵至秋還營如此則鄂爾昆近處之草不至匱乏可備冬春畜牧之用此議自屬可行請令額駙策凌辦理又平郡王及慶復並稱歸化城防兵亦應撥一半令于青草發生時出數百里外牧馬教獵以助鄂爾昆聲勢此奏應俟歸化城駐兵議定後再議又歸化城防兵所需牧放馬匹前以平郡王奏請䝉古兵現存馬匹令于中途牧放備用臣等議如所請歸化城倘或需馬可即以此刻期取用又戍兵口糧必當充裕屯田最要鄂爾昆地界寛廣大可耕種若撥兵三千人人各種二十五畝計可墾田七百五十頃以畝收五六斗計算可得數萬餘石少亦二三萬石現在軍營所貯尚支數年之用至數年後所需自當豫計今平郡王慶復所奏請子鄂爾昆附近屯田所見略同請以原摺付軍營將軍㕘贊大臣等按可墾之田詳悉定議更用専官辦理屯務奏入上從之平定準噶爾方略前編卷四十二
