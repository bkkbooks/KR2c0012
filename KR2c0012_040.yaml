body:
  text: 乾隆元年春正月己亥命參贊大臣薩木哈回京尚書性桂暫留鄂爾昆辦理糧餉候代定邊大將軍慶復等奏言奉硃批諭旨薩木哈年邁且身有疾病若彼處必有用伊之處則留之不然則令來京性桂亦屬老病不耐彼處寒冷若令回京調理彼處不致乏人亦行遣回爾等可公同商議辦理臣等以薩木哈病稍愈但右手右足不能轉動當即護送起程性桂雖有殘疾若便遣還此間糧餉辦理乏人請於京中遣大臣一人來軍代之再令還京王大臣等議覆曰薩木哈性桂並如所請行內閣學士雙喜現在烏里鴉蘇台辦理糧餉俟撤兵議定即令雙喜赴鄂爾昆代性桂奏入上從之丙午準噶爾使臣吹納木喀等至京進表先是議政王大臣等奏言準噶爾噶爾丹策零遣使吹納木喀額塞約於正月十一日至京至時令自長安左門入午門左翼引至箭亭前跪奉表文及進貢方物大臣閲畢受所進表文翻譯呈奏外引使臣至上駟院賜飯飯畢自右翼門出西華門令伴使各官館之於豐澤園定以某日引使入覲至日入班大臣議政大臣咸集各攜坐褥至乾清宫以次就列前引大臣十人入坐後扈大臣二人侍立並如常儀御前侍衛近寶座前侍豹尾班侍衛立寶座兩旁乾清門侍衛列豹尾班後月臺兩旁每翼排立侍衛二十人乾清門兩旁各排立侍衛班領一人侍衛二十人階下兩翼各侍衛二十人後右門侍衛二十人凡使臣所過門令前鋒統領護軍統領等增列護軍參領護軍悉令嚴整是日清晨令伴使官引使臣自西華門右翼門入至後右門皇上升乾清宫寶座令侍郎納延泰班第副都統多爾濟奏事侍衛等引使臣入乾清門右門由西階上使臣吹納木喀額塞及隨從厄魯特等分立於丹墀中路左右行三跪九叩頭禮禮畢引入乾清宫西邉槅扇內使臣一叩坐於右翼首行大臣之末稍後隨從之厄魯特等坐於槅扇外西階上皇上進茶使臣隨大臣等一叩頭賜茶使臣一跪跪領降旨使臣跪聽事畢使臣退出西邊槅扇自後右門西華門還館所其日大臣等悉常服奏入報可至是吹納木喀等至京進獻表文并獻貢物吹納木喀等聞世宗憲皇帝升遐悲蹙良久始言此乃天定之數無可如何今惟祝延聖上金甌鞏固國祚萬年永享太平耳又言我等至遊牧即欲速來以噶爾丹策零病甚留待稍愈是以遲來其噶爾丹策零所上表文云奉大皇帝諭旨朕軫恤羣生欲弭兵端以興黃教遣使諭爾爾亦悅服奏言若使後世謂某皇帝與某台吉失好興戎誠非美名今歸和好則休聲垂於永久朕披覽之下深為嘉許又奉諭旨爾前奏言喀爾喀遊牧逼近爾屬未免疑懼請稍展空地此議亦屬可行仰見大皇帝興教息民之至意曷勝歡忭又奉諭旨前噶爾丹為我兵所𠞰滅全收其疆土及其骸骨妻屬爾準噶爾部人從無越阿爾台遊牧者請舉當時情事詳悉陳之我父幼時與博碩克圖汗同居共事後彼漸強盛既害其弟又欲潛圖我父嵗在己巳我父年四十七與彼交惡收其土地人民之半建牙於額林哈畢爾噶之地彼發兵來攻我大敗於烏蘭烏蘇庚午彼興師內犯我父即日奏聞聖祖仁皇帝復親率所部夾攻其後辛未克取其撒克里烏蘭古木之地丙子彼為大國所敗丁丑死於阿查阿木他泰後其屬北歸丹濟拉挾其骸骨妻屬居庫克德卜僧我舉兵攻之獲其骸骨妻子及屬人大半丹濟拉率數人逃遁奉旨索取博碩克圖汗骸骨我即遵旨函獻自癸未至今我明阿特部落遂遊牧於科卜多屬下烏梁海人亦頗有居其地者癸巳胡土克圖曾使楚揚託音與車木沖那木扎爾之使賴沖楚揚多託諾丹津多爾濟之使達什敦多卜王之使綽當博貝之使丹巴五人同至我國實用科卜多烏梁海人為嚮𨗳甲午與我使那木西喜同來之天使亦在科卜多供給止宿諸人今尚有存者諒亦共知其事前者奉諭旨云若追論前事則勢無了期故前此未敢瀆陳竊思阿爾台本我遊牧之地杭愛乃喀爾喀遊牧之地既經和好此疆彼界原不必縷分條析又以諭旨有欲成和好須明疆界之語因念諭旨所載哲爾格西喇呼魯蘇等處雖已指明我部邊界未經指明大國邊界故尚未能妥議具奏祈再降旨命使來此酌議俾我之衷曲得以悉達又諭旨本有稍展空地亦屬可行之語故敢奏懇彼此邊界令其隔逺則衆生永安而黃教益興矣伏祈大皇帝睿鑒允行隨表恭進貂皮三十五張乙卯年十月十一日奏入報聞壬子賜準噶爾使臣吹納木喀等入覲上諭吹納木喀等曰去嵗守邊大臣奏爾等已至朕甚欣悅非特為爾準噶爾求和之故思仰副我皇考闡揚黃教休息生靈之意也今閲噶爾丹策零表文並不遵皇考諭旨定界漫指前奏未允之哲爾格西喇呼魯蘇等處為爾部邊界欲於喀爾喀境內更留空間之地是誠何言又云既經和好不必分界我大國視準噶爾之和與否定界與否原無關體要但定界之事起於伊父策妄阿喇布坦奏請其初意止欲得阿爾台山外哈道里哈達清吉爾布拉清吉爾等處而已皇考尚不允其請後因撤兵息民竟以其地賜之以克木齊克汗騰格里循阿爾台山梁下索勒畢嶺至哈卜塔克拜塔克之中過烏蘭烏蘇至噶斯口為界又允伊父所請以呼遜托輝至喀喇巴爾楚克作中間間地今爾等至京請和若不議定疆界何以為信且能保邊境小人異日不起爭端乎若噶爾丹策零但求喀爾喀無踰哲爾格西喇呼魯蘇尚可俯允不然朕遣使何為爾等至此亦何為朕知噶爾丹策零本無求和之意特借此牽率奏請希圖通市之利耳所見如此能不為朕所恥笑若能遵皇考諭旨定界朕必格外施恩所得不更多乎我皇考惟以闡揚黃教休息生靈為心朕深體皇考之心興教安民而外初無用兵之意縱爾部欲激發朕怒亦斷不勤兵於逺也朕不但欲令我內部喀爾喀各安其生視爾準噶爾部人亦如我赤子業已定議撤兵止少少量留守邊此爾等所共知朕欲天下之民舉安即守邊之事亦與和不和無涉也噶爾丹策零嗣後能體皇考與朕之心則遣使來不然各保其境可也倘更不自揣量犯我邉境朕自有辦理之道以天朝之威靈兵臨爾部尚不獲全利爾準噶爾螳臂之力勞師涉逺豈能有濟爾還其明告噶爾丹策零令更熟思審處定議具奏吹納木喀奏曰大皇帝諭旨當謹記歸告噶爾丹策零其所陳奏實遵成佛大皇帝旨意欲振興黃教安逸衆生所以輸誠上請非敢借遣使以圖通市也上諭曰噶爾丹策零如無此意甚善但興教安民乃皇考與朕之事非噶爾丹策零之任也縱彼實力行之止及準噶爾一小部落耳俾天下萬國蒙被庥澤其事自在朕躬且爾言實遵成佛大皇帝旨今日噶爾丹策零之奏與前次皇考諭旨合乎否乎果欲定議當就事論事何得牽引逺年噶爾丹之事如此瀆陳往復真無了期矣爾等不過奉使之人成則與有榮施不成則空勞往返定界之事誠非爾等所得擅議朕當另遣大臣前往爾起程時有勑書付爾噶爾丹策零能體朕意謹遵皇考原旨定界可再遣使來不然亦無庸復遣其遣使當仍遣爾來至我邊界時可告我守邊大臣噶爾丹策零表文內有遵旨定界之語方許入境如無此語決不許入也聞爾等仍携貨來不忍復令携歸可留住數日貿易事畢起程可也尋命賞給吹納木喀等袍緞銀布有差癸丑議留兵駐防事宜總理王大臣等奏言前者以兩路撤兵事宜候額駙策凌王丹津多爾濟到時會議今已會議大兵撤後宜留兵數千於鄂爾昆駐防一二年間觀其動靜庶我兵之威聲既振而喀爾喀等亦藉以安心即有調用亦為易集請於現在軍營東三省兵中留奉天兵二千吉林兵一千呼倫貝爾索倫巴爾虎兵二千暫駐鄂爾昆其李如柏率往更代緑旗兵四千中請留直𨽻山西省兵一千防守鄂爾昆所在城郭倉庫即以李如柏領之餘兵聽大將軍酌量調遣年滿更代緑旗種地兵及罪人仍暫留種地其在扎克拜達里克充兵及種地罪人一百三十人於雍正九年賊人來侵嬰城固守特恩寬免其罪許充民兵仍令種地今議撤兵應令大將軍給以口糧發回原籍願充兵者令充本處兵願為民者聽之其備用喀爾喀兵一千五百名請留一千於烏里雅蘇台給巡視卡倫出哨暸望報信放馬等差於喀爾喀副將軍以下用大臣一人領之餘兵五百仍駐鄂爾昆備調遣牧放之用以喀爾喀副將軍一人更番領之烏里雅蘇台既有駐兵即有轉遞信報運給糧餉等事就軍營簡部院章京一人駐劄辦理此外一切滿洲蒙古漢軍緑旗兵丁俱俟青草出時令大將軍陸續遣還本處再前者以運米維艱令月給喀爾喀兵羊價三兩以當月糧今烏里雅蘇台積米甚多令大將軍等合計駐防及臺站卡倫各項兵丁應給米石多寡之數斟酌留貯其餘糧餉并軍器等物辦官駝一萬隻馱載即以烏里雅蘇台所撤兵五千護送至鄂爾昆收貯其推河扎克拜達里克二處所貯各項亦令大將軍酌辦一併運赴鄂爾昆軍營現貯甲胄弓箭鳥鎗火藥帳房鑼鍋帽帶靴鞋緞布等物甚多令大將軍一一檢點應收貯者收貯應賞給兵丁者酌量賞給又職官新至者量留備用餘並遣還內閣學士雙喜暫行留辦糧餉戶部員外富明安令同雙喜辦理再令將軍一員總統兵丁參贊二員協同將軍辦事大臣五員分隊掌管留駐兵丁庶於邊疆之防守國家之糧餉蒙古之生計馬匹之牧養均有裨益至命遣大臣頒給將軍印敕再行請旨奏入得旨大兵既撤將軍公慶復俟撤兵及一切事務畢後即行來京現在留戍之兵並非常駐數年後即行撤回不必另派將軍著留副將軍印令額駙策凌暫行統轄再派參贊大臣二員協同辦理餘依議尋總理王大臣等以現在軍前領侍衛內大臣伯伊勒慎護軍統領阿成阿哈岱三人開列請旨命為參贊再駐劄鄂爾昆緑旗兵一千名令李如柏管轄外其東三省兵五千應令大臣五員管轄請以副都統綽爾多蘇爾太轄奉天兵二千副都統富達禮轄吉林兵一千副都統銜齋三總管托爾德爾轄呼倫貝爾索倫巴爾虎兵二千并請給托爾德爾副都統銜奏入得旨伊勒慎等三人皆近日往代者俱著留充參贊大臣之任托爾德爾賞給副都統銜令管索倫兵餘依議命免甘肅借給口糧籽種上諭內閣曰甘省百姓承辦軍需急公踴躍甚屬可嘉皇考屢沛恩膏朕亦彌加體恤上年聞有缺雨歉收之州縣已諭該督撫加意撫綏務令貧民得所除散賑米穀外所有借給口糧籽種之類例應秋收徴還者悉行賞給免其還項該督撫可通行曉諭并飭有司實力奉行毋使胥吏土棍侵蝕中飽甲寅命都統王常侍郎柏秀往勘屯田總理王大臣等奏言鄂爾昆既定議駐兵種地所有應墾地畝宜令大臣往勘恭候欽命并持尚書通智侍郎德沛原奏前往公同詳議具奏奏入得旨著都統王常侍郎柏秀前往命議更定臺站事宜總理王大臣等奏言今鄂爾昆酌留滿洲蒙古緑旗兵六千五百烏里雅蘇台酌留喀爾喀兵一千所有臺站事宜亦應更定臣等原議御史常明所奏鄂爾昆以外十八站蒙古等兵俟青草發生時內移於運米臺站安插每站撥兵十名章京一員駐防遣小台吉二人軍營侍衛二人周行巡察其應給行糧如卡倫官兵例給豫所有馬駝乾糧羊隻著留半備用令管臺站員外五十六筆帖式尚圖仍留管理悉經議行今臺站既停運米烏里雅蘇台扎克拜達里克推河等處所有滿洲緑旗兵悉撤還止留喀爾喀兵一千於烏里雅蘇台連接卡倫巡查瞭望所有鄂爾昆以外十八站蒙古兵應悉撤之其由鄂爾昆至烏里雅蘇台各臺站相接如故自鄂爾昆抵張家口臺站二十九俟歸化城駐劄滿洲兵時令自歸化城置臺接至鄂爾昆庶兩處軍營聨為一路彼此信息相通再大兵既撤臺站止令給差每臺置兵六十名過多應行議汰所需馬駝乾糧羊隻應減若干現在罪人悉已停發其載送牛車二十輛應歸何處坐臺官一人應管幾臺請令總管五十四等詳議具奏到日再議奏入報聞尋五十四等奏言自張家口至鄂爾昆大站二十九腰站十六每大站留四十戶披甲者二十名設章京驍騎校領催各一員每腰站留二十戶披甲者十名設驍騎校領催各一員仍以參領四員分管其汰去兵丁所留器械查明收貯俟有毁壞者即以此補之參領章京驍騎校每月各增給銀三兩領催二兩披甲一兩烏喇齊五錢參領給五品銜章京六品領催七品又大站二十九其拴馬者二十五每站馬八十匹請留五十匹拴駝者四每站駝五十隻請留四十隻腰站十六拴馬者十四每站馬四十匹請留三十匹拴駝者二每站駝三十隻請留二十隻凡汰馬一千有十匹令管站阿蘭太等於倒斃馬匹錢糧中抵用減駝六十隻分撥各站作馱載之用至臺站現留馬駝並許倒斃十分之三第二十九臺適當遞送交會之所第十五十六臺並與張家口賽爾烏蘇兩處臺站所管地接壤請於此三臺各駐官一員其餘四十二處每二站駐官一員自昌平至張家口向設大臺站七嗣以事煩又自回龍觀至邊上增設腰站十四今大兵既撤此四十處並應裁汰王大臣等議覆曰現在臺站減撤喀喇沁土默特人等並携家口同行各有零雜什物必需車輛運載應令五十四以臺站所有車牛選給備用其餘著分賞留臺蒙古等現在坐臺官二十四員內髙起等四員甫經發往又慶復等奏應待三年期滿者十員應並令留臺俟期滿更代尚缺十員請於在京筆帖式內撥往應令回旗者著五十四遣歸回龍觀至宣化臺站本以給西北兩路之用北路由張家口西路由宣化大同等處西路既撤北路亦宜一體議減其應撤與否請交兵部定議餘悉應如五十四等所奏行奏入上從之乙卯命護軍統領費雅思哈尚書海齡等次第回京總理王大臣等奏言大兵既撤烏里輝音扎罕達里剛愛車臣汗等處操演豫備兵丁一併停止其監視操演烏爾輝音扎罕護軍統領費雅思哈尚書海齡侍衛阿敏道監視操演達里剛愛散秩大臣四格額駙興德尚書特古特侍讀學士巴特瑪並令還京再前者駐劄監視車臣汗辦事侍郎塞楞額郎中麒麟保監視圖謝圖汗郎中蘇章阿根都思赫監視扎薩克圖汗侍衛常義主事阿穆瑚朗原議駐戍兵定議時悉行撤還今已定議所有塞楞額麒麟保蘇章阿根都思赫俟大兵起程後撤還常義阿穆瑚朗俟扎薩克圖汗部落蒙古移徙畢亦令還京奏入報聞丙辰恩免哈密回部屯田交糧並加賞貝子額敏等哈密貝子額敏奏言自軍興以來雍正八年至十三年令部人耕種屯田輸納糧米合計二萬七千五百石現已動用一萬八千石存者九千五百石今大兵既撤應否仍令耕種納糧總理王大臣等議覆曰回人每年官給籽種五百石收穫時納米四千石每石賞銀一兩現今大兵既撤哈密止駐兵五千從前運到米尚存二十萬石有零應移文大將軍查郎阿等自今年為始免令回人納糧貝子額敏急公效順督率部下種地協助軍需請恩賞大緞十端種地回人分賞銀一萬兩奏入上從之癸亥命珠密納木扎爾兼轄喀喇烏蘇厄魯特兵以塞臣哈什哈承襲扎薩克頭等台吉辦理藏務副都統瑪喇等奏言統轄喀喇烏蘇兵扎薩克頭等台吉那顔和碩齊卒臣等與貝勒頗羅鼐酌議可代者據云其次子頭等台吉珠密納木扎爾年富力強每年四月率塔木騰格里淖爾厄魯特兵操演練習防守卡倫塔木地去喀喇烏蘇甚近請即令其兼轄至那顔和碩齊之扎薩克頭等台吉有其弟塞臣哈什哈現在古木布駐劄辦事妥協請即令其承襲王大臣等議覆應如所請奏入得旨依議其那顔和碩齊之扎薩克頭等台吉著其弟塞臣哈什哈承襲平定準噶爾方略前編卷四十
