  text: 欽定四庫全書平定準噶爾方略前編卷十二
  hash: sha256:226e9a5b9f853c962320b42045b00cef18bae05ec69ca1164bf4c6d44d774370
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_012-1a, image: WYG0357/WYG0357-0191a.png}
body:
  text: 雍正元年秋八月甲子敘平藏功兵部分别議敘陜西四川雲南官兵平定西藏功奏入得旨平定西藏乃自古未至之絶域所以皇考曾有從優議敘之旨況皇考當春秋髙邁備兵於極邊宣揚威略峻德鴻功允垂億萬斯年之美政也此一次議敘軍功前固無例可援後亦不得為例將軍延信著封為貝勒兩路率領八旗官員進勦之將軍等著給與世襲三等輕車都尉參贊大臣給與騎都尉副都統營總等給與雲騎尉其護軍校驍騎校給與頭等功牌二面仍加一級緑旗官員經大將軍等咨送册開頭等者照攻取打箭爐功加一倍二等者功加五等三等者功加二等至於滿洲漢軍緑旗之外委官俱係一體效力人員無論由部委外委概行從優議敘以仰副我皇考恩綸特沛從優議敘之諭旨丙寅命賞察哈爾厄魯特散秩大臣羅卜藏錫喇卜等來謁梓宫者馬匹行糧庚午侍郎常授奏青海情形常授奏言臣於七月二十二日抵沙拉圖至親王羅卜藏丹津駐牧處恭宣諭旨令若等兄弟罷兵和睦據羅卜藏丹津訴言戴青和碩齊察罕丹津額爾德尼額爾克托克托鼐欲據招地詭言我遣使準噶爾與策妄阿喇布坦背叛欲讒害我是以衆台吉等不服會盟興兵且備言戴青和碩齊察罕丹津等過惡擬於數日渡河與決勝負情形如此勢難歸好後據察罕丹津訴言羅卜藏丹津興兵逐額爾德尼額爾克托克托鼐於內地脅衆台吉稱兵於巴爾托羅海其意欲獨有西招青海之地計其兵不過萬二三千其黨率多脅從若渡河來我當盡力拒之又據衆蒙古來言羅卜藏丹津脅令諸部呼已為達賴混台吉其餘台吉悉呼故號不得稱王貝勒貝子公封號其意先滅額爾德尼額爾克托克托鼐次滅察罕丹津然後集衆台吉奏請賜彼汗號駐劄招地遙制青海叛形已見臣問其遣使準噶爾消息或云聞準噶爾以青海人等不足信又云準噶爾兵聞已至噶斯口度九月可至青海臣謹即所見情形與羅卜藏丹津所呈蒙古字奏章二册並與臣蒙古字書一封密奏奏入得旨此事甚大行在總理事務王大臣議政大臣詳議并發往在京之總理事務王大臣議政大臣等詳議具奏甲戍命川陜總督年羮堯辦理西路軍務總理事務王大臣等遵旨議奏曰羅卜藏丹津久蓄異心糾衆盟誓皇上念其祖顧實汗恭敬效順不即加誅特遣侍即常授往諭以利害為之和解羅卜藏丹津不聽其言欲與戴青和碩齊察罕丹津交戰又欲要請汗號且自稱為達賴混台吉背逆莫甚今方欲往察罕丹津處決戰應調西寧兵俟羅卜藏丹津兵涉黃河即於渡口截其後路且請令提督嶽鍾琪率松潘兵往援以張聲勢其西路軍務應令年羮堯詳議辦理奏入上從之駐劄西寧侍郎常授奏報青海親王戴青和碩齊察罕丹津來奔河州常授奏言親王戴青和碩齊察罕丹津率兵與羅卜藏丹津相持久之不敵率妻子及所屬百四十餘人至河州老鴉關外臣即令入居邊內餘人令其宰桑約束於邊外要隘防守奏入報聞丙子諭蒙古諸王貝勒貝子扎薩克台吉塔布囊等上諭曰自爾先世歸附太祖太宗蒙被聖化於兹五六代矣世締國姻恩深祿重兄弟主臣洽比保聚安居樂業百有餘年其間厄魯特噶爾丹猖獗㺯兵破喀爾喀七旗侵及內扎薩克蒙古蹂躪遊牧之地皇考為爾等三次自將出師乃滅噶爾丹使爾等永享太平之福六十餘年以來爾等屬下偶有飢饉災傷莫不發帑與糧資給畜牧更派富户屯田代耕使飢者復安散者復聚皇考養育爾等蒙古恩澤重矣大矣曩者和洛霍澌以嵗飢聞朕仰體皇考聖意即遣大臣前往發倉帳救賞給牛羊今喀喇沁翁牛特八旗又以嵗飢聞復遣大臣前往即速查明飢口動用正項錢糧買米散賑夫一時阻飢朕雖賑之常年貧乏之民在爾各君長於本旗內裒多益寡互相賙恤以養育之庶幾得所耳若仍然厚斂重徭納之於阽危之域使之至於散亡孰為爾等納賦孰為爾等供徭愛民惠下是第一要務不可不知也連嵗災旱頻仍今年又遭飢饉爾等各子其民者如何減賦如何輕徭如何裕其農功如何孳其畜牧爾等王貝勒大臣等議定務使各得生理以仰副我皇考聖心以慰朕心定議之後倘有顯背公議仍然重賦苛役者國法具在非朕所得而私也我皇考目覩爾等長成愛如子孫事事包容處處軫恤爾等視皇考如祖父恃皇考之慈愛每事懈逸朕新即位務須各盡爾職謹慎小心管轄屬下訓練兵丁嚴禁盜賊奉公守法循分安生仰報我皇考軫愛之恩俾朕得以仰法皇考慈惠爾等至意始終保全永永勿替朕之願也今日特於皇考梓宫前諭爾等知之九月甲申賜準噶爾降人博羅特達什扎卜侍衛翎理藩院奏言準噶爾䇿妄阿喇布坦屬下明噶特人博羅特達什扎卜巴圖蒙克多爾濟哈喇瑪克達巴什六人來降奏入得旨若等來歸可嘉其博羅特達什扎卜率先向化著賜與侍衛翎若等稱有近族兄弟在貝勒博貝處為護衛即以此六人給與博貝加意撫輯丁亥命川陜督標中軍副將田畯為陜西涼州總兵官赴軍協助提督路振聲辦事以陜西固原提督楊盡信署理涼州總兵官己丑命川陜總督年羮堯上諭年羮堯曰侍郎常授奏報親王羅卜藏丹津攻王察罕丹津已渡黃河肆行猖狂或遣使於䇿妄阿喇布坦約期作亂或欲窺取西藏皆事所必有軍務宜預先籌度爾宜令西寧松潘甘州等處軍兵整備務期勦滅羅卜藏丹津自夏間作亂以來人馬疲乏若不乘時擊之遲延日久則賊人得以蓄養氣力爾其盡心籌畫克奏膚功辛卯議撤阿爾台諸路兵上諭川陜總督年羮堯曰目今䇿妄阿喇布坦甚屬恭順我兵在外已久著將阿爾台兵丁如何撤回永固疆圉應駐兵若干駐劄何處或作戍兵迭更或令永逺駐防應將何處兵丁移駐爾等可詳加確議具奏再吐魯番巴里坤布隆吉爾等處兵丁俱著照此行丙申以軍前副將軍阿喇衲為鑲紅旗蒙古都統乙巳恤贈台吉進達克為頭等台吉封其子噶爾瑪遜多卜為輔國公理藩院奏言台吉進達克陳亡蒙恩優加恤典其子噶爾瑪遜多卜等謝恩奏入得旨蘇尼特王吹濟拱蘇隆旗下台吉管理旗務官進達克率所屬兵與厄魯特逃者羅卜藏錫喇卜等鏖戰身亡甚屬可嘉此並非出兵時亦未嘗令其率衆追賊也而進達克奮勇前行臨敵致命朕用交部議敘部議二等台吉加一等當授為頭等台吉具奏朕已特降諭旨施恩其子噶爾瑪遜多卜著授為輔國公冬十月戊申以川陜總督年羮堯為撫逺大將軍貝勒延信為平逆將軍上諭兵部曰據川陜總督年羮堯奏稱青海羅卜藏丹津恣肆猖狂臣領兵於九月二十日自甘州起程十月初間至西寧相機行事等語總督年羮堯既往西寧辦理軍務其調遣辨兵之任甚屬緊要須給大將軍印信以專執掌著將貝勒延信護理之撫逺大將軍印即從彼處送至西寧交與總督年羮堯其貝勒延信現有防守甘州沿邊等處事務將庫內現存將軍印信著該部請旨頒發一顆送給尋議曰應以平逆將軍印授貝勒延信奏入上從之敕諭撫逺大將軍年羮堯上諭曰我朝自創業以來皆效法列祖用兵紀律無往不施仁德孟子云仁者無敵統兵者之大義莫要於此羅卜藏丹津係青海一台吉自乃祖顧實汗嵗時請安進貢至扎什巴圖爾台吉慕聖祖仁皇帝德化叩覲顔蒙聖祖仁皇帝念及顧實汗從前敬謹恭順晉封扎什巴圖爾為親王疊沛隆恩及病故後令其子羅卜藏丹津襲封羅卜藏丹津宜仰體寵眷效法祖父敬奉法紀乃妄逞強梁弟兄骨月自相仇敵欺陵親王戴青和碩齊察罕丹津郡王額爾德尼額爾克托克托鼐等恣行倡亂朕甫聞其事即遣侍郎常授前往令伊等講和修睦羅卜藏丹津等宜遵朕旨式好無尤乃肆意稱兵侵襲親王戴青和碩齊察罕丹津郡王額爾德尼額爾克托克托鼐等殺戮抄掠以致察罕丹津等情急投入內境顯負朕恩悖逆天常擾害生靈誅戮不可少緩故加天討遣發大兵以聲羅卜藏丹津之罪朕欲拯救西域生靈大張天威特命爾為撫逺大將軍統領滿洲蒙古緑旗大兵一切事宜爾與蘇丹嶽鍾琪常授等酌定方略公同計議而行勿當事會而致失機宜勿恃兵強而輕視逆寇密偵逺探罔或疏虞各路大兵暨蒙古兵丁聽爾調遣凡遇有警即遣發官兵應援撲勦防備詐降如羅卜藏丹津敢於抗拒即行勦滅其黨內亦有懼羅卜藏丹津之勢脅從其行者伊等果悔罪來歸即行寬宥有能擒斬羅卜藏丹津來歸者分别具奏有情急來歸者加意撫恤其不抗拒者無加殺戮須嚴禁將士凡經過地方勿得騷擾百姓勿離人父子夫婦勿淫人婦女勿掘人墳墓附降者勿得侵取其物勿拆毁廬舍祠宇勿擾害廟內番僧副朕戡亂靖逆之意官兵或臨陳退縮貽誤軍機爾會同商議官員以下即以軍法從事示衆官兵犯小過者徑行處治勿泯沒官兵功績勿寬縱違犯之人賞罰務極嚴明爾酌量調遣各路大兵將羅卜藏丹津殱勦廓清安靖邊圉斯稱委任爾務宜殫竭心力早奏膚功欽哉故敕臣等謹案羅卜藏丹津自其祖顧實汗父扎什巴圖爾台吉蒙被國恩備膺寵賚襲爵親王乃敢猖狂跳梁殘擾青海諸部罪在不赦世宗憲皇帝命以川陜總督年羮堯為撫逺大將軍四川提督嶽鍾琪為奮威將軍親授方略聲討其罪雍正元年十月出師自冬徂春降其貝勒貝子公台吉等二十餘人及其部衆無算聖諭猶以羅卜藏丹津束身來歸可豫全宥乃復怙惡不悛易服投荒孑身延喘天戈所指賊衆大潰羅卜藏丹津之母并其惡黨吹喇克諾木齊等皆就擒獲獻俘奏凱青海悉平計師行罙入自雍正二年二月八日至二十有二日僅旬有五日成功之速為史册所未有皇上纘承先緒耆定西陲鴻圖式擴羅卜藏丹津逋逃遺孽當伊犁既平並其子巴朗等以涸轍窮鱗籲轅乞命復縻尺組皇上念邊隅永靖此煢煢殘息不足以膏齊斧復仰體世宗憲皇帝來歸全宥之殊恩待以不死於是益見聖朝聲靈震疊當日狡焉餘醜雖遲之數十年之久終不得自逃於天網而國家服逺之神威與綏遐之至德所由並越隆古也歟以翰林院侍讀學士綽爾岱辦理北路軍營糧餉己酉復歸化城土默特兩旗都統等官上諭歸化城都統丹津曰前聖祖皇考由寧夏親征漠北時巡狩歸化城地見歸化城土默特兩旗官兵士衆委靡弓馬不嫻法度廢弛因將兩旗都統革退選在京都統副都統參領等員管轄歷年訓練有方軍律嚴整舊習漸改是以數年來將在京選用之例停止今爾保送之官兵人等盡皆弓馬嫻熟且兩旗兵辨行伍整齊凡有行圍及出征等事與內地兵丁一體效力此皆我皇考教育所致也歸化城土默特兩旗原在四十九扎薩克內其都統副都統等官皆係國初歸附之土默特功臣子孫世職今既已棄咎從忠允宜遵復舊例楚宗著授京城額外都統楚宗員缺著原任都統阿必達之子副都統根敦補授根敦員缺著丹津將爾兩旗內應補人員與原任都統副都統世家子孫及參領內人材可用儀表修偉向能管轄兵丁曾經效力行間人等查明保送引見以便簡擢甲寅敘平郭羅克功封川陜總督年羮堯為二等公給四川提督嶽鍾琪騎都尉世職遊擊姚文玉周瑛以下十五員及外委官馬萬倉等九十七員並以所得功加二等餘各賞賚有差壬戍撫逺大將軍年羮堯奏請以蘇丹嶽鍾琪為參贊年羮堯奏言兵自西藏撤還者額駙阿寶所率蒙古兵馬匹軍器並不堪用且阿寶有殘疾應令還所在定西將軍公䇿旺諾爾布所領察哈爾兵精壯請簡四百人留與都統武格管轄餘令䇿旺諾爾布率之啓行再都統西倫圖現統京城兵駐東郭爾廟甚無益其兵在外日久馬匹器械並缺乏可令侍衛班領阿齊圖率之還西倫圖漢仗尚壯請留軍前令管轄察哈爾前鋒兵西寧現駐滿洲兵無多應令署西安將軍公普照撥鳥鎗驍騎四百前鋒百人令副都統覺羅伊禮布率赴西寧再者軍中不可無參贊大臣前鋒統領蘇丹經事頗多嶽鍾琪總統緑旗土司兵丁請以參贊授之至青海事並請令侍郎常授一等侍衛達鼐參議奏入報聞乙丑以郎中衆佛保為內閣學士使準噶爾上諭怡親王允祥等曰䇿妄阿喇布坦來使將至朕亦欲遣使臣與其來使同往理藩院郎中衆佛保著授為內閣學士前去丙寅授厄魯特公茂海為固山貝子上諭理藩院曰厄魯特公茂海與其伯王丹津阿喇卜坦來時我皇考深加眷愛授以公爵茂海今在軍前輸誠效力有年著授為固山貝子丁卯撫逺大將軍年羮堯奏調諸路兵年羮堯奏言青海羅卜藏丹津等煽集各台吉肆行邊外臣已劄令察木多總兵官周瑛率兵截其往藏路但羅卜藏丹津急則遁走穆魯烏蘇等處未定臣令靖逆將軍富寧安調都統穆森往吐魯番駐防調吐魯番駐防副將軍阿喇衲率滿洲蒙古緑旗兵二千由噶斯一路截之若羅卜藏丹津實心歸順即令此二千人暫駐布隆吉爾再布隆吉爾所在駐兵甚少四圍並連厄魯特賊人喇卜坦巴蘇泰輒令所屬要奪我台站馬駝應調緑旗兵二千往布隆吉爾令參將孫繼宗管轄若用兵則令率所轄兵勦滅喇卜坦巴蘇泰與副將軍阿喇衲兵會進勦羅卜藏丹津如此賊人不得逃遁而布隆吉爾所在亦可完固奏入報聞癸酉撫逺大將軍年羮堯奏敗賊於鎮海堡年羮堯奏言十月十九日賊人來侵鎮海堡臣令都統武格率察哈爾兵西安滿洲兵救之二十日厄魯特兵二千番賊千餘圍堡自二十一日至二十三日賊益增兵日夜轉戰臣以前鋒統領蘇丹所率兵令參將宋可進等將之並率軍前效力滿洲緑旗等官於二十五日往援賊衆六千餘人或據堡前山上或伏谷中我兵分隊攻賊賊中炮死者甚衆賊走鎮海堡中滿洲察哈爾緑旗兵盡出截擊賊人四向逃去所殺傷賊六百餘我軍陳亡五人被傷者六人又多巴之囊素阿旺丹津前叛歸羅卜藏丹津今已為我擒當正法以軍務未畢暫令監禁奏入報聞十一月戊寅撥鄂爾多斯等處兵協駐甘州撫逺大將軍年羮堯疏言羅卜藏丹津率衆數千攻入西寧之南川口會守口兵少守備馬有仁等據申中堡禦之賊圍堡堡人囊素將鑿牆以納賊臣令參將宋可進遊擊元繼善等往援賊還兵迎戰我師出堡夾攻殱賊九十餘人賊遁去囊素與賊通已誅之所獲器械馬匹給與兵丁我兵陳亡七人即加賞恤俟諸路兵調集臣即日相機勦滅方今甘州兵少力弱乞調喀爾喀額爾德尼王各扎薩克蒙古兵三千協駐甘州以壯軍勢總理事務王大臣等議覆曰喀爾喀等雖近甘州但方冬嚴寒所在散處調之勿便請就近撥鄂爾多斯兵五千副都統花色等領之歸化城土默特兵五百副都統查克旦領之大同鎮兵一千總兵官馬覿伯領之令往駐甘州奏入上從之丙戌命議敘北川新城及莊浪等處破賊官兵撫逺大將軍年羮堯奏言有賊二千餘據北川新城遊擊馬成輔攻之多所擊殺臣令副將王嵩等以兵三千助之賊扼山相拒我兵奪擊破其六營賊敗走又莊浪當河西五路要害東西兩山賊人遊牧所出入賊中謝勒蘇種最強額勒布種助之為害髙山密林以為巢穴其碁子山茨爾溝兩地尤險惡臣調集涼州及土司魯華齡兵各鄉兵凡四千令涼州總兵官楊盡信等率之四面仰攻斬賊數百級俘其妻子賊奔入鐡保城生擒額勒布賊首魯木受等及謝勒蘇賊首坎柱等俱正法我軍陳亡者守備王福晉把總陳昌及兵丁二十餘人其被傷者俟核實奏報奏入得旨據奏侵犯西寧之南川西川鎮海堡北川等處逆賊厄魯特羅卜藏丹津被官兵協力奮攻勦殺殆盡賊衆墮膽逃竄並將莊浪等處截路行劫之賊番擊敗擒獲大將軍年羮堯調遣指授官兵俱各奮勇實心效力殊屬可嘉此次立功報效陳亡受傷官兵俱著注册俟事平之日該部從優議敘丁亥撫逺大將軍年羮堯奏撫勦西寧北川回人及移察罕丹津於蘭州年羮堯奏言蒙古回人據有西寧北川上北塔下北塔兩地數百里潛蓄異心臣令千總馬中孝往下北塔招下其三十村莊令率兵一千勦上北塔獲其頭目阿卜多烏園額爾克喀等正法餘人悉降馬中孝等請俟大兵凱旋議敘又奏言察罕丹津向住河州苦為羅卜藏丹津所劫臣令少卿花善率察罕丹津妻子及其屬人移住蘭州奏入報聞靖逆將軍富寧安奏報吐魯番等處屯田收穫麥糜九千三百三十石有奇奏入得旨下部知之辛邜命封青海台吉索諾木達什為貝子上諭理藩院曰據大將軍年羮堯奏稱青海台吉索諾木達什在布隆吉爾地方由羅卜藏丹津處脫身來歸等語向者索諾木達什盡忠效力乃被羅卜藏丹津誘擒今聞伊來歸良慰朕懷索諾木達已什先與駐劄柴達木地方之官兵一處效力繼又往西藏軍前竭誠報國深屬可嘉特沛殊恩著封為貝子給與上等産業加意撫綏併著大將軍傳諭俾知朕意癸巳撫逺大將軍年羮堯奏勦賊番於奇嘉寺年羮堯奏言厄魯特番賊往來劫奪新城堡等處守備李國強外委馬光永陳亡把總李孝被傷臣調西寧總兵官黃喜林等率兵進勦羅卜藏察罕等賊殺奇嘉寺賊五百喇嘛番子千餘獲賊頭目七人器械馬匹牛羊無算方冬寒臣令黃喜林等撤兵至西寧奏入報聞己亥命鑄辦理布拉罕軍前糧餉事務關防給翰林院侍讀學士綽爾岱議進勦青海事宜撫逺大將軍年羮堯奏言進勦青海一請備兵請選陜西督標西安固原寧夏四川甘州大同榆林土默特鄂爾多斯巴里坤吐魯番等處兵凡一萬九千令提督嶽鍾琪等分領之由西寧松潘甘州布隆吉爾四路進勦一防守邊口令土司兵二千及西寧滿洲兵五百留守西寧各邊口陜西撫標兵五百防守永昌西安滿洲兵五百防守甘州其布隆吉爾舊有兵一千應仍留駐防至副將張成龍現率兵五百防守巴塘其里塘駐防兵僅五百請以四川撫標兵三百益之再令署松潘鎮副將張英副都統黑色率兵一千五百出松潘口駐劄黃勝關雲南提督郝玉麟率兵二千駐劄察木多則羅卜藏丹津等必不敢至巴爾喀木等處矣一購買馬駝臣於陜西買馬一千不足用請於歸化城張家口採買或請以太僕寺商都達卜遜淖爾孳生馬匹撥送三千匹巴里坤選駝二千甘涼肅州等處採買一千五百赴軍則於兵丁進勦之期無誤一貯備軍糧臣在西安慮青海有事已預買米六萬石為備一精煉火器請以景山所製火藥給軍並給駝一百每駝載百八十斤於明年正月送至西寧奏入得旨總理事務王大臣議政大臣會議具奏尋議曰大將軍條奏事宜悉應如所請其所請馬數外增送一千匹火藥於所請數外增給一培再行文郝玉麟令由中甸率兵往察木多駐劄其中甸應令總督髙其倬選總兵官一人率兵五百駐劄奏入上從之壬寅命撥振武將軍傅爾丹營兵赴巴里坤駐劄以傅爾丹兼統祁里德軍征西將軍祁里德為參贊上諭總理事務王大臣等曰撫逺大將軍年羮堯進勦羅卜藏丹津將巴里坤吐魯番兵調往五千名朕恐巴里坤兵力單弱著於振武將軍傅爾丹軍營兵丁內撥派二千名令前鋒統領丁夀都統根敦帶領於明年二月內前往巴里坤駐劄總理事務王大臣等議曰傅爾丹營中兵既撥往巴里坤阿爾台兵少不敷調遣請以祁里德所領兵與傅爾丹軍合以一將軍統之奏入得旨兩處將軍倘有合行處著傅爾丹總統祁里德令在參贊上行走以翰林院侍讀學士綽爾岱為內閣學士兼禮部侍郎仍留軍前辦理糧餉事務甲辰召諭䇿妄阿喇布坦使臣䇿妄阿喇布坦使臣根敦等朝見上召入諭曰爾台吉於聖祖皇考時有獲罪之處亦有效力之處爾台吉今悔過引罪朕甚嘉之所貢方物朕酌量收納俟爾回日另降敕諭平定準噶爾方略前編卷十二
