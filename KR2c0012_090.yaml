  text: 欽定四庫全書平定準噶爾方略正編卷三十六
  hash: sha256:be125f788529c9620e82b28b3a41f61fc15047dca239fd05d34ea925685fa57f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_090-1a, image: WYG0358/WYG0358-0598c.png}
body:
  text: 乾隆二十二年春正月癸夘命總兵官存泰赴巴里坤軍營上諭軍機大臣曰總兵官存泰丁憂回京著馳驛赴巴里坤聽候調遣遇有總兵缺出即著署理甲辰命䇿凌孟克之子巴雅勒黨承襲郡王上諭軍機大臣曰都爾伯特郡王策凌孟克貝子羅壘原端布圖克森扎薩克台吉呢爾瓦齊等俱因出痘身故䇿凌孟克等輸誠内附深感朕恩勉力報効今聞溘逝深為軫惻著交部照例致祭派侍衞瑚畢圖前往奠醊並加恩令策凌孟克之子巴雅勒黨承襲郡王羅壘原端布圖克森並無子嗣貝勒剛多爾濟貝子額爾德尼乃羅壘原端等族人其所屬人等即交與剛多爾濟額爾德尼等管轄呢爾瓦齊亦無子姪其扎薩克台吉著伊叔布顔德勒格爾承襲乙巳命駐劄巴里坤辦事大臣雅爾哈善暫行回京上諭軍機大臣曰舒赫德現赴巴里坤俟其到時即著雅爾哈善來京面聆訓示並可看視伊毋以示體䘏其大兵未進以前巴里坤一切事務俱交舒赫德辦理進兵後著留阿里衮代辦俟雅爾哈善回至巴里坤阿里衮仍赴軍營隨同將軍等辦事命額敏和卓曉諭波羅泥都霍集占等上諭軍機大臣曰據雅爾哈善等奏稱已令傅魁帶兵一千名於正月初六日起程間道赴魯克察克會同額敏和卓辦理莽噶里克等語所辦甚合機宜傅魁等此時已應與額敏和卓㑹同滅賊如擒獲莽噶里克時務遣幹員押解來京並著傅魁曉諭額敏和卓俟霍集占所遣使人沙呢雅斯到時仍遵前諭派五十六托倫泰一同回至葉爾羗喀什噶爾額敏和卓或差人同往或寄信與波羅泥都霍集占等告知莽噶里克獲罪㐲誅並命伊管理吐魯番回人各事宜即令波羅泥都等酌定貢賦章程前來陳奏伊等遵行則已倘稍有推托俟𠞰滅厄魯特後再派兵前往辦理命授瑪瑺頭等侍衞上諭軍機大臣曰侍衞瑪瑺從哈薩克回時中途遇賊攻戰數次甚屬奮勇著加恩授為頭等侍衞仍賜墨爾根巴圖魯名號賞銀一百兩馳驛速赴行在再從前降㫖令雅爾哈善等將回至巴里坤兵丁即令各回本處今思此項索倫察哈爾兵丁途中轉戰甫抵巴里坤即令各回本處轉非所以示體䘏且巴里坤存留此項兵丁亦屬有益嗣後陸續自軍營前來兵丁著傳諭雅爾哈善等量加賞賜給與口糧暫留巴里坤不必速行遣回丙午命奬賞侍衞努古德等上諭軍機大臣曰將軍和起所遣報信之索倫侍衞努古德彰金布俱著賞銀一百兩努古德著賞給額勒斯巴圖魯名號彰金布著賞給呼爾察巴圖魯名號朕詢問伊等被圍情形據稱伊等出圍後復有兵丁九十餘名同出遇賊攻戰經署章京巴尼爾圖射退宰桑巴朗賊始散去等語著傳諭雅爾哈善查明巴尼爾圖果屬奮勇即授為三等侍衞並奏聞錫以巴圖魯名號仍賞銀一百兩再兵丁九十餘人若能救䕶將軍同出自必懋膺上賞今僅以身脱無功可録但伊等身出重圍亦屬奮勉其効力受傷之人並著查明量加賞賚至邁斯漢領兵䇿應退縮不前罪實難逭著即拏解來京治罪丁未内大臣博爾奔察疏奏領兵赴巴里坤日期博爾奔察奏言臣遵奉諭㫖派索倫兵五百名於正月初三日令侍衞順德訥帶領先行至臣應領兵一千五百名若俟調來兵丁㨂選恐致遲悞即於總管温布現在領到兵丁及此處所餘兵内揀選一千五百名同副都統鄂博什總管温布亦於初六日起程奏入報聞命議叙擒拏叛賊青滚雜卜効力人員上諭軍機大臣曰據將軍成衮扎布遵㫖將擒拏叛賊青滚雜卜大臣及喀爾喀王公台吉等分别奏聞著即交部議敘其喀爾喀二等台吉瞻布承衮扎布四等台吉衮布奮勇爭先尤屬可嘉著加恩授瞻布承衮扎布為一等台吉衮布為三等台吉並著賞給孔雀翎仍與効力人員一體議敘餘著俱照前奏賞給縀疋銀兩至叛賊青滚雜卜遣往烏梁海調兵之台吉丹珠爾從前為賊所迫已豫行禀知軍營大臣後又同旺布多爾濟擒拏叛賊著加恩免其治罪戊申命賞給哈尚德副將職衘馳驛前赴巴里坤交與總督黄廷桂派在傅魁標下効力行走庚戌諭額敏和卓酌量留兵駐劄吐魯番事宜上諭軍機大臣曰前降㫖令傅魁領兵擒拏莽噶里克後留兵五百名駐劄吐魯番候大兵同行進𠞰今思擒拏莽噶里克之後其地即賞給額敏和卓管轄留兵在彼守候大兵尚需時日額敏和卓轉不無供應兵丁之費非所以示體䘏著傳諭雅爾哈善等飭知額敏和卓如辦理莽噶里克事竣所留兵丁㑹同伊所屬回人力足以擒𠞰巴雅爾即令其同傅魁領兵辦理否則即將内地兵丁全行撤回巴里坤不必在彼駐劄倘額敏和卓懇請留兵一二百名以為聲援亦從其便辛亥申諭叅贊大臣納穆扎爾查辦齊木齊格特人衆事宜上諭軍機大臣曰前降㫖令納穆扎爾赴車臣汗部落辦理齊木齊格特人衆事務此時應已前往齊木齊格特人等原係喀爾喀貝子顔楚布多爾濟屬人因伊不能約束妄生事端若不盡行剪除則地方何由寜静著查出為首倡亂之人即行正法以昭烱戒餘亦無庸交該扎薩克管束即賞給喀爾喀内曾經効力之人為奴伊部落内似此為匪之人恐尚不少車臣汗瑪尼巴達喇年少無知不能管轄著交與得木楚克加意查察倘有似此者即嚴加懲治不得稍事姑息又前曾令納穆扎爾俟辦理此事完竣後即行回京今已命成衮扎布為定邊將軍馳赴巴里坤其烏里雅蘇台一切事宜需人佐理納穆扎爾不必回京即協同郡王䇿布登扎布辦理事務壬子命拏解莽噶克之弟糾羅卜伯克赴行在審訊上諭軍機大臣曰據侍郎裘曰修奏稱莽噶里克遣伊弟糾羅卜伯克以押送噶爾藏多爾濟宰桑碧圖庫等為名潛至哈密卡倫外探聽信息經副將祖雲龍擒獲在衣縫中捜出書信已撥兵解送肅州等語糾羅卜伯克既係莽噶里克之弟又蔵有書信潛至卡倫偵探其為奸細無疑俟其到肅時著黄廷桂即遴選員弁解送行在聽候審訊其書信一倂密封進呈再前經降㫖令將莽噶里克之婿阿舒爾瑪特等解赴行在此時當已起程途次務須隔别防範並嚴飭解員小心看守毋致疎虞命賞䘏臺站陣亡受傷兵丁上諭軍機大臣曰據唐喀禄奏稱自納米爾沙扎海至古爾班察爾所設臺站兵丁七百餘名因烏梁海等搶掠臺站各兵奮勇力戰内有陣亡兵三十名受傷兵三十名又力戰未出兵丁一百四十名等語此次坐臺各兵勇往禦賊甚屬可嘉所有陣亡應䘏之人俱著交部照例議奏其力戰未出者亦著加恩照陣亡之例一體議䘏至受傷各兵著照應賞銀兩加倍賞給癸丑命加增甘省輓運軍糧脚價銀兩上諭大學士曰西路大兵指日進𠞰運送軍糧利在迅速其脚價銀兩若照部議每石給銀一錢五分恐不敷運户往回之費所有甘省現在輓運軍糧著照雍正九年例運糧一石每百里河西給脚價銀二錢河東給脚價銀一錢六分以䘏民力俟軍務告竣各屬遇有撥補糧石仍照地方舊例辦理命授内閣學士阿思哈為叅贊大臣協同署理定邊左副將軍印務䇿布登扎布辦理事務恩䘏都爾伯特親王伯什阿噶什上諭軍機大臣曰都爾伯特親王伯什阿噶什輸誠内附具見悃忱今聞溘逝深堪憫惻著唐喀禄齎銀三百兩前往策凌部落給與伯什阿噶什家屬辦理喪事並齎茶酒往奠伯什阿噶什並無子嗣著將伊兄子協理台吉達巴都噶爾封授貝子伊弟達瓦濟特封授公爵俱授為扎薩克其所屬人衆即令此二人管轄伊等屬人無多或即歸入策凌等部落居住或願移至内地並著唐喀禄明白曉諭聽從其便奏聞辦理諭署理定邊左副將軍印務策布登扎布等防範輝特部落事宜上諭軍機大臣曰據成衮扎布等奏稱輝特部落策卜登多爾濟普爾普德濟特等向巴蘭泰告稱阿逆雖與伊等同族惟是身受厚恩斷不致墮其詭計倘阿逆潛來煽惑必奮勇力戰擒獻治罪等語觀此則策卜登多爾濟等自無異志第恐其不免疑懼著傳諭策布登扎布哈達哈等止宜密為防範不得稍露形迹令其驚疑前已降㫖令伊等仍往烏蘭古木地方種地一年再行遷移伊等不勝感悦適經唐喀禄奏請將察達克等移至烏蘭古木地方俟輝特人衆遷移後即令察達克等居住此處若照伊所奏令察達克等同居一處在察達克等既須守候伊等遷移方得安居且現與輝特人衆同往一處轉啟伊等疑惑殊屬未便已降㫖停止併傳諭策布登扎布哈達哈等知之叛賊青滚雜卜之子車蘇隆多爾濟等正法上諭軍機大臣曰據成衮扎布等奏稱叛賊青滚雜卜之子車蘇隆多爾濟齊旺扎卜交與素尼勒圖色楞額等解赴京師等語車蘇隆多爾濟齊旺扎卜皆逆賊之子應即行處斬以彰國法著傳諭大學士來保俟其解到即遵㫖押赴市曹正法甲寅命議敘各省承辦送兵官員上諭軍機大臣曰此次吉林察哈爾官兵經過直隸河南陜甘等省兼程遄進一切車馬供頓料理俱甚妥速該督撫及承辦各官均著交部議敘又據陳𢎞謀奏陜省送兵夫役有檢獲兵丁遺失衣物立即報官交還之事甚屬可嘉並著查明奬賞命加恩賞賚派往軍營阿拉善兵丁上諭軍機大臣曰貝勒羅卜藏多爾濟派領阿拉善兵丁自備駝馬前赴肅州甚屬勇往可嘉所有應給俸餉各項俱已照例賞給著傳諭黄廷桂酌量加賞縀疋茶葉以示鼓勵乙夘申諭駐劄巴里坤辦事大臣雅爾哈善等遣兵䇿應副將軍兆惠事宜上諭軍機大臣雅爾哈善等接到朕停止圖倫楚等進兵之㫖即遣人追回圖倫楚等殊屬拘泥前因邁斯漢等領兵前往是以降㫖停止續聞邁斯漢中路退回則圖倫楚等領兵接應甚合機宜即降㫖仍照所奏辦理今聞雅爾哈善等已於上年十二月間遣圖倫楚等起程接到續奉諭㫖相隔半月諒難追及若圖倫楚等已經往迎兆惠固屬甚善即使追回若尚未至巴里坤仍令其迅速前往不必拘泥前㫖辦理戊午定邊將軍成衮扎布疏奏派喀爾喀兵丁同赴軍營事宜成衮扎布奏言臣蒙恩授為定邊將軍并令臣帶索倫兵二三百名前往巴里坤臣隨行知領兵内大臣博爾奔察令其留兵三百名在奈曼明安地方俟臣到彼處帶往繼因衆喀爾喀等俱請効力戎行臣隨派喀爾喀兵七百名賞給銀兩令其隨臣前往約計三月十五日以前俱抵巴里坤奏入報聞定邊將軍成衮扎布疏奏採買馬駝事宜成衮扎布奏言現在烏里雅蘇台科卜多兩處雖有官馬二千餘匹駝一千餘隻俱係從逺道回來不免疲乏今科卜多空圭等處駐兵二千有餘西路復有辦理事件馬駝應須多備查烏梁海恰克圖一帶地方可採買馬數千匹已遣員帶銀八萬兩令其買馬六千匹駝數百隻以備軍行之用奏入報聞己未命叅贊大臣阿桂駐劄烏里雅蘇台辦事上諭軍機大臣曰前令阿桂赴科卜多駐劄辦事今據將軍成衮扎布奏稱現在領兵前赴巴里坤所有烏里雅蘇台軍營一切事宜策布登扎布未能深悉暫留阿桂令其詳悉告知等語科卜多地方已命哈達哈前往駐劄阿桂著即留烏里雅蘇台辦事庚申命拏解提督傅魁來京審訊上諭軍機大臣曰雅爾哈善等奏據署提督傅魁等呈稱帶兵一千名前至鹽池地方遇莽噶里克三十三賊盡行𠞰殺等語莽噶里克係負恩背叛附和逆賊戕害將軍和起之首惡傅魁等帶兵圍往時應將伊父子生擒解送審明附逆背叛實情以正國法况領兵一千圍住三十餘賊生擒甚屬易易並非賊人衆多交戰之際不能辨别賊首者可比是傅魁之殺戮莽噶里克非特怯懦悖繆其中不無别情著傳諭雅爾哈善即將傳魁拏解來京審訊拏解傅魁後並將副將丑達解送來京以便與傅魁質對再前曾降㫖俟辦理莽噶里克後即將吐魯番地方賞給額敏和卓管轄今莽噶里克雖死應尚有伊妻子及平日任用之人即著額敏和卓前往捜查向伊等究出莽噶里克率衆前來實在情形具奏並著額敏和卓即揀選所獲馬匹派委幹員前往探聽副將軍兆惠信息及厄魯特等情形其遣人由何路前往并現在彼處所得信息即著申報巴里坤大臣轉奏訓諭大學士管陜甘總督黄廷桂等運送馬匹事宜上諭軍機大臣曰據黃廷桂奏到札商雅爾哈善進𠞰馬匹一摺未免彼此推諉殊非為國任事之道而黄廷桂之過為大軍行非尋常可比全資馬力臕壯經理大臣尤宜為兵丁等豫行籌畫是以朕於舒赫德前往時面降諭㫖令兵丁領馬後途中酌量乗騎餘馬仍須餧養以惜馬力誠恐伊等不知愛惜臨期至於疲乏今黄廷桂惟以支給兵丁即了其責雅爾哈善又恐早收致疲試思此何等事而可如此存心耶此項馬匹仍責成黄廷桂所派員弁兵丁善為趕餧抵巴里坤時如送馬兵丁不敷餧養雅爾哈善即酌派已到兵丁協同辦理方為妥協總俟大兵起程交將軍等查騐分撥其未起程以前倘有疲瘦皆黄廷桂之責馬匹一項朕諄復降㫖黄廷桂身任其事即現往巴里坤料理亦職分所應乃以札商卸責將來進𠞰時稍有貽悞惟黄廷桂是問黄廷桂雅爾哈善俱著傳㫖申飭辛酉命額敏和卓遣人曉諭霍集占上諭軍機大臣曰前降㫖令額敏和卓遣人送回霍集占所遣使人沙呢雅斯並令五十六托倫泰同往今莽噶里克已經辦理路徑已通著即遵照前㫖遣往其從前兆惠遣往之副都統阿敏道現在何處著即曉諭霍集占等遣使送回壬戌諭定邊將軍成衮扎布等擒𠞰噶爾藏多爾濟等事宜上諭軍機大臣曰雅爾哈善等審訊噶爾藏多爾濟所遣宰桑布圖庫供稱噶爾藏多爾濟同扎那噶爾布哈薩克錫喇尼瑪等謀叛屬實又稱兆惠帶兵由招摩多前往阿爾台為塔本集賽宰桑達什策凌中途邀截等語噶爾藏多爾濟如果無背叛實情自當分别辦理然此等叵測之人難保其終不生事今既與扎那噶爾布等同叛大兵前往即將伊等盡行剪滅自可永絶根株至布圖庫所供兆惠之信未必確實果爾則塔本集賽人等斷不容貸亦應一體辦理前已降㫖令將布圖庫解送行在審訊實情另降諭㫖著仍照前㫖行至雅爾哈善奏稱布圖庫所供各鄂拓克人衆俱不可深信等語現在準噶爾當窮蹙之時其所有烏合之衆不過如是布圖庫必不肯故為示弱以誘我兵前進雅爾哈善心存怯懦所慮不免過當再傅魁辦理莽噶里克一事其中必有别情已降㫖將伊拏問此次進兵若噶爾藏多爾濟扎那噶爾布哈薩克錫喇尼瑪等果在陣前立斃則已如可生擒則舒赫德等務將伊等擒解前來不得即行正法並傳諭成衮扎布知之二月乙丑諭署理定邊左副將軍印務䇿布登扎布等籌辦輝特人衆事宜上諭軍機大臣曰據唐喀禄等奏稱輝特人衆自遷至扎克賽地方自相搶掠甚不安静且本係阿逆親屬將來不免滋事請㫖遷至呼倫貝爾齊齊哈爾等處設有事端彼處密邇索倫辦理甚易等語唐喀禄等所奏甚是輝特人等原非善類自應豫行辦理但現在科卜多駐兵無多而伊等又無背叛實據且與其遷至呼倫貝爾齊齊哈爾等處又不如即行𠞰滅永絶根株著傳諭策布登扎布等悉心查察如已有可疑形跡即將伊等𠞰滅倘尚安本分應暫為安撫惟宜加意防範俟將來再行辦理至唐喀禄所奏巴勒濟得木齊懇請同塞卜騰遷往察哈爾居住等語從前軍機大臣等議將巴勒濟屬人歸入輝特部落令在烏蘭古木種地業經准行今巴勒濟得木齊既願往察哈爾居住俟其至烏里雅蘇台時即照唐喀禄所請賞給口糧送至察哈爾地方安揷不必仍照前㫖辦理命派兵查拏都爾伯特部落搶掠侍衞賊人上諭軍機大臣曰成衮扎布等奏據遣往都爾伯特致祭之侍衞佛保報稱中途遇嗎哈沁搶掠駝隻現在勉力前進等語佛保係從前遣往致祭伯什阿噶什之妻今伯什阿噶什亦已病故佛保即可毋庸前往乃遇賊搶掠仍能奮勉行走甚屬可嘉著查明係何等侍衞加恩陞用不必再行前往再伯什阿噶什病故時朕加恩封伊弟姪貝子公爵并授為扎薩克令其屬人等歸入策凌部落安置因其懇請向内遷移復命唐喀禄詢問伊等情形奏聞辦理今伊等既自相搶掠復敢刦奪奉使侍衞駝隻則不惟不應加恩封爵亦毋庸任其向内遷移著傳諭瑚爾起等俟帶兵到時即將刦奪侍衞為首賊人盡行𠞰殺餘俱賞給喀爾喀等為奴並著傳諭策布登扎布等遣人前往曉諭伊同部落之貝子烏巴什等告知此次發兵特為擒治搶掠侍衞之人至爾等尚屬安分可仍照伊從前所請帶領屬人即赴都爾伯特汗策凌游牧同往仍將伊等何時起程及情形如何詳悉奏聞命侍衞順德訥領兵前赴軍營上諭軍機大臣曰順德訥自烏里雅蘇台領兵赴巴里坤行走迅速並奏聞即帶索倫兵丁前往𠞰賊觀其情詞懇切甚屬可嘉著賞給舒倫巴圖魯名號並賞銀一百兩即令其在軍營領隊前進副都統職衘由屯亦屬勇往著加恩賞給大縀四端其順德訥帶往官員著雅爾哈善等酌量賞賚兵丁俱著賞給錢糧一月以示鼓勵至頭等侍衞努三押送兵丁甫至嘉峪關即奏請回京已令其赴巴里坤候㫖著將努三降為藍翎侍衞仍留巴里坤交與雅爾哈善等差遣委用丙寅命封定邊右副將軍兆惠一等伯爵並議敘奮勇𠞰賊大臣官員等上諭軍機大臣曰據雅爾哈善等奏稱副將軍兆惠等遣領催雲多克等報稱於正月初五日至烏魯木齊途中殺賊千餘人其侍衞圖倫楚所領兵丁與兆惠相距止四五日又圖倫楚遣人告稱約二月初十日内即可同兆惠至巴里坤等語覽奏甚為欣悦前布圖庫供稱兆惠由招摩多前往阿爾台朕即知其言不足信今果由西路前來兆惠係駐劄伊犁等處辦事大臣適遇厄魯特等背叛奮勇𠞰賊甚屬可嘉兆惠著封為一等伯世襲㒺替并將御用荷包玉韘鼻烟壺加恩賞賜三格哈寜阿永貴莽阿納俱著賞給三等輕車都尉亦著世襲㒺替兆惠所遣報信之雲多克德倫徹俱授為三等侍衞圖倫楚等所遣之副䕶軍校濟德著授為䕶軍校圖倫楚達禮善此次亦屬奮勉著賞給圖倫楚副都統職衘授達禮善為頭等侍衞奮勇官兵著查明交部議敘並著照例賞賚所有陣亡官兵著兆惠等查明交部議䘏至健鋭營委署前鋒校納蘭圖索倫委署章京成果達什達瓦屬人色勒前往偵探擒𠞰賊人亦屬勇往著加恩賞給納蘭圖成果孔雀翎色勒授為三等侍衞仍各賞銀五十兩此時兆惠等諒已抵巴里坤軍營著㑹同將軍成衮扎布叅贊大臣舒赫德等悉心籌畫或兩路進兵或合為一路務期同心協力奮勇前往至進兵時索倫兵最為得力除兆惠等帶回受傷兵丁毋庸調遣其餘兵丁仍酌量帶領前往並著發往孔雀翎藍翎各二十枝交兆惠等分賞奮勇効力官兵以示鼓勵並著於哈寜阿永貴三格三人内酌派一人馳赴行在備朕詢問厄魯特人等反覆無常實為覆載所不容至達什策凌與哈薩克錫喇尼瑪等同謀叛逆尤為罪不容逭其屬人必應全行𠞰滅不得更留餘孽今大兵自巴里坤分路進𠞰賊人等逃入烏梁海亦未可定著策布登扎布等傳諭烏梁海内大臣察達克等加意防範如有厄魯特逃至彼處即將首賊擒拏送烏里雅蘇台將軍大臣辦理餘衆悉行擒治毋任脱逃再據坐臺厄魯特孟克告稱解到羊五百隻遇一索倫官員搶去在臺之察哈爾等亦俱隨往又千總策布登同臺站筆帖式俱往噶爾藏多爾濟游牧未回等語索倫官員及隨往之察哈爾究係何人䇿布登等因何潛往噶爾藏多爾濟游牧現在何處俱著兆惠等查明具奏諭副都統唐喀禄擒拏達什䇿凌事宜上諭軍機大臣曰前加恩賞給達什策凌屬人口糧令唐喀禄傳諭今據唐喀禄奏稱現赴䇿凌等游牧辦事其傳諭達什䇿凌事宜派侍衞烏林泰前往等語現在達什䇿凌同謀叛逆烏林泰不必遣往著即行追回此時達什䇿凌或親來領取口糧或遣人前來唐喀禄即行擒拏解送來京治罪戊辰諭定邊將軍成衮扎布等辦理衆厄魯特事宜上諭軍機大臣曰兆惠咨雅爾哈善文内有厄魯特等反覆無常應盡行𠞰滅之語兆惠目擊彼處情形所籌甚是從前朕已向舒赫德面降諭㫖伊二人見將軍成衮扎布時悉心籌畫務宜妥協辦理此等賊人斷不宜稍示姑息惟老㓜羸弱之人或可酌量存留另籌安挿前此兩次進兵皆不免過於姑容今若仍照前辦理則大兵撤回伊等復滋生事端前事可為明鑒即如厄爾錐音呑圖布庫圖齊等此際雖未敢妄動而當兆惠被圍時並未見前來䇿應此次進兵務將伊等解送來京或姑免其死給與効力之處已屬格外施恩倘稍有可疑亦一併擒拏治罪著傳諭成衮扎布兆惠舒赫德等遵照辦理倘兆惠所見或有不同之處亦即與成衮扎布等一面議定一面奏聞伊等務即奮勇前進迅奏膚功以副委任定邊將軍成衮扎布疏奏派台吉諾爾布管理科卜多臺站事宜成衮扎布等奏言前臣等奏派公齊旺辦理科卜多臺站事務今齊旺病篤不能任事其公爵請將伊子達什承襲查扎薩克圖汗部落台吉諾爾布已蒙恩授為扎薩克其游牧與科卜多相近請即派諾爾布駐劄科卜多管理臺站事務奏入報聞己巳命奬賞奮勇𠞰賊之總管温布等上諭軍機大臣曰據雅爾哈善等奏帶領索倫兵丁總管温布等沿途遇賊搶掠喀喇烏蘇臺站奮勇擒𠞰等語温布等帶兵前進中途遇賊即行擒𠞰甚屬可嘉温布著賞銀一百兩藍翎侍衞烏爾衮保著陞授三等侍衞索倫佐領魁蘇岱吉克達爾圖俱著賞給孔雀翎仍各賞銀三十兩其奮勇兵丁俱著賞錢糧一月以示鼓勵庚午諭署理定邊左副將軍印務策布登扎布等安挿郭莽胡土克圖之沙畢納爾等事宜上諭軍機大臣曰據成衮扎布等奏郭莽胡土克圖之沙畢納爾等四百餘人請送至阿拉善交羅卜藏多爾濟管轄等語此等人本非誠心歸順特因窮困無聊暫行依附日久必復滋生事端即如伊等在伊犁時留養司員栢琨等後阿逆遣人至彼隨將栢琨等送往伊等既經歸誠即不應順從阿逆乃反覆無常一至於此自應豫籌安挿著傳諭䇿布登扎布等即將伊等大喇嘛解送來京應令其何處居住再行定奪其沙畢納爾等俱著交哲卜尊丹巴胡土克圖管轄留心約束毋得任其滋事平定準噶爾方略正編卷三十六
