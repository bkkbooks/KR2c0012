  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_046-1a, image: WYG0357/WYG0357-0642a.png}
body:
  text: 乾隆六年春正月戊辰命免陜甘二省兵丁借支銀兩上諭内閣曰陜甘兩省自軍興以來出征兵丁等俱有賞賚而平時製備軍裝器械等項陸續借支司庫銀五十七萬兩有奇例應在本兵名下按季扣還者除年來已經扣除外西安司庫未扣銀約二萬六千四百餘兩甘肅司庫未扣銀約一十七萬六千餘兩前任總督鄂彌達以現今兵力不敷請緩至五年之後營伍漸充公費稍裕再為扣除部議以五年之内不免再有借支作何辦理行令總督尹繼善議奏據稱此項銀兩應均作五年帶扣如有營伍需用之處亦未便竟不借給應請酌定數目不許過多指定限期不准過久以便隨同帶扣等語朕思兵丁等現領之餉僅足供養給家口之資若將新舊借支之項一併帶扣則所存無幾食用艱難且此項借欠歴年已久若本人更換勢必至貽累妻孥及該管之將弁朕心深為憫惻況西陲軍興以來陜甘兵丁備極勤勞而甘省兵丁尤為出力著將借欠未完帑銀二十萬二千四百餘兩悉行豁免以示朕優恤邊兵之至意甲戌議安西改設提督事宜大學士查郎阿奏言安西總兵請改設提督酌増兵弁以成重鎮自嘉峪闗以西哈密以東悉令管轄甘凉肅諸營戰兵並聽其節制調遣其哈密防兵悉量撤之止留兵二千以資分駐經川陜總督尹繼善議覆與原奏相同惟所請増兵三千查安西兵食全賴屯田現額徵糧一萬餘石尚不敷兵丁七千餘人之食増兵三千并家屬不下萬口支給更難請改中營遊擊為㕘將再増城守營都司一員千總一員把總二員増兵五百馬三步七俾安西馬匹寛裕以便有事調撥毋庸増設守兵靖逆改營為協増設副將都司千總各一員把總三員兵五百名塔兒灣當靖逆北面増設守備把總各一員兵二百名赤金一營亦歸靖逆協管轄橋灣係通哈密咽喉請以栁溝都司并原設兵二百名移駐橋灣更增兵一百名改歸布隆吉爾遊擊統轄其應増設兵即於駐防甘凉肅兵中有願於安西等處入伍者就近酌留其駐防哈密兵既議全撤即令該督於安西協并甘凉肅三處各撥兵五百共二千名赴哈密防守以副將統之亦於各標内揀選熟悉邊情者撥往二年更代大學士等議應如所請奏入上從之是日得㫖永常著補授安西提督現在夷使已到李繩武仍著留原駐劄處同永常辦理一應事宜俟夷使熬茶事畢再赴甘肅新任議定撤兵事宜并給喀爾喀駐防兵丁口糧大學士伯鄂爾泰等奏言現今有㫖撤兵其北路軍營滿洲察哈爾兵五千名緑旗兵一千六百名據額駙䇿凌奏請東三省兵二千令䕶軍統領阿林副都統圖納率之吉林蘇魯克兵五百令副都統莫爾渾率之守城緑旗兵一千令總兵官呉凱曽率之並於今年青草時起程呼倫貝爾兵一千察哈爾兵一千五百去秋方到應令少歇俟今秋令副都統銜烏勒德副都統濟昌率之起程其種地緑旗兵六百名雖撤兵後可停止種地但塔米爾鄂爾昆兩處倉庫所貯銀米器械甚多不可無人管守請暫留駐守䕶城池倉庫臣等議以呼倫貝爾察哈爾緑旗種地等兵並應如䇿凌所奏定議至東三省吉林緑旗三項兵現今準噶爾遣使進藏應俟其事已畢一體撤還内兵既撤用喀爾喀兵駐防奉㫖加恩憫其勞苦議給糧餉查現在軍營存貯米石甚多所有喀爾喀駐防烏里雅蘇台兵一千名鄂爾昆兵一千名秋季防兵三千名俱每月給銀一兩五錢米一斛其辦理糧餉原任巡撫法敏應否仍留軍前伏候欽定奏入得㫖此議甚善著依議所撤之兵俱令於本年九月起程法敏著仍留軍前阿岱著駐防烏里雅蘇台另派㕘贊大臣二員前往著軍機大臣具奏請㫖嗣軍機大臣等開列職名具奏得㫖著副都統慶泰前往塔爾瑪善著再留三年賞給額駙䇿凌軍營存貯什物辦理軍機大臣等奏言軍營所有錢糧砲位鳥鎗器械什物甚多除錢糧收貯如故大銅砲四座物重道逺難運至京就近交綏逺城將軍收貯外所有子母砲過山鳥大小鳥鎗擇其好者半留軍營收藏備用其餘亦恐送京路逺應令喀爾喀兵運至綏逺城交將軍收貯至火藥鉛子硝黄繩索盔甲弓箭衣帽鞍屉一切雜項更恐年久朽壞或暫留以備將來賞賜或即給賞何人候㫖遵行奏入得㫖著賞給額駙䇿凌二月戊戌上諭軍機大臣等曰西北兩路既仍有駐劄兵準噶爾遣使往來與一切𦂳要事件宜令兩路彼此通信知悉於事方有禆益著傳諭兩路將軍大臣知之三月壬子命酌留軍營侍衛大學士伯鄂爾泰等奏言軍營向例用看視水草侍衛一十員今因撤兵額駙䇿凌等議俱撤還更遣十人前往竊思新經遣往之人原應明年期滿請酌留五人令於明年更代今年止遣五人往奏入上從之夏四月乙未朔將軍烏赫圖等奏報準噶爾使臣齊黙特等至東科爾貿易甲辰命酌減臺站弁兵駝馬管理臺站總管覺和托等奏言自張家口至鄂爾昆大臺二十九中臺十五北路既經撤兵應量汰之查大臺中臺里數無異宜令一體當差勿分彼此請兩臺共用章京一員驍騎校一員㕘領四員領催四十四名輪流管理每臺酌留十五户馬甲五名烏拉齊二名馬二十匹駝二十隻又第一臺至第十臺當京城軍營往返及察哈爾左右翼蘇尼特四子部落毛明安歸化城諸處傳遞事件總路不可照他臺裁減其間十大臺七中臺各用馬甲十名烏拉齊十名馬三十匹駝三十隻章京驍騎校領催等酌量存留軍機大臣等議應如所請其西路臺站應否裁減之處俟準噶爾熬茶事畢撤哈密兵時再行定議奏入上從之準噶爾部人鞥可濟爾噶爾達克巴等來降命賞給安插如例戊申準噶爾部人羅卜藏來降命賞給安插如例壬戌命籌辦準夷進藏駝馬川陜總督尹繼善奏言熬茶準夷三百人至東科爾臣等宣示聖恩賞給米麵羊隻皆感激祗領交牧駝一千六百餘隻馬一千一百餘匹深以馬駝疲乏難於涉逺為憂查此次夷人原非進貢可比應聽其自備資斧因噶爾丹䇿零詞語恭順䝉恩豫備駝四百隻馬八百匹現在東科爾牧放倘尚不敷請於西寧附近各營再行酌量撥給令其作速赴藏臣已移知副都統巴靈阿撫臣元展成熟籌妥辦理合奏聞得㫖所奏俱悉雖云示恩亦不可啟其無厭之心也既已如此辦理可令伊等知係殊恩後不得援以為例五月乙亥命扎薩克等保䕶哲卜尊丹巴胡土克圖上諭軍機大臣等曰從前準噶爾侵犯喀爾喀時窺伺哲卜尊丹巴胡土克圖皇考特頒諭㫖令移住多倫淖爾今兵事已定經喀爾喀王等奏請哲卜尊丹巴胡土克圖仍移住庫倫準夷性甚狡詐今雖恭順乞和恐後復變更潛行窺伺亦未可定著行文額駙䇿凌傳諭喀爾喀四部落副將軍扎薩克等及駐劄庫倫之圖謝圖汗敦丹多爾濟額駙敦多卜多爾濟等其如何保䕶防範之處公同酌議具奏前胡土克圖在多倫淖爾時每年遣侍衛二員在彼更番守䕶今在庫倫仍著遣往胡土克圖所居之處得朕侍衛守䕶諸事便益胡土克圖安穏之信朕亦不時得聞也六月丁酉䕶軍統領殷扎納遵㫖送班禪額爾德尼出世之瑚畢勒罕至後藏扎什倫布廟坐牀壬戌命更定查閱驛站年期張家口驛站總管覺和托等奏言今年既撤驛站人夫駝馬一切事務俱屬簡少請自來年為始臣與白泰輪流毎年一人前往查閲軍機大臣等議應定於三年内查閲兩次令覺和托白泰輪班辦理奏入上從之己未準噶爾部人孟克來降命賞給安插如例秋七月乙酉準噶爾部人烏巴什來降命賞給安插如例八月丙申命詰問準噶爾使臣齊黙特等䕶送夷使將軍烏赫圖奏言準噶爾使人於四月初一日到東科爾原定議五月赴藏因與商人貿易貨物索價昻貴稽遲時日託言炎暑請改期七月今於七月二十日齊黙特等忽復來言我等本擬此月起程近聞西藏地氣早寒又擕來駝隻俱不堪用難以前進擬貿易事畢即欲還部既經和好熬茶之事不論何年俱可前進臣等按準噶爾生性奸詭前後言辭反覆明係希圖貿易價昻要請増給馬駝應否仍令赴藏或聽其還部候㫖遵行奏入上諭烏赫圖等曰前因噶爾丹䇿零尊崇黄教奏請為其父赴藏熬茶施行善事朕特加恩允其所請賞給牲畜口糧派大臣官兵照看今伊使臣因貿易價值不定不欲進藏即求還部貿易之事當聽商人自便詎可官為派勒今伊等不遂所欲便欲言歸或其來時噶爾丹䇿零本囑令如此或係伊等私意若出噶爾丹䇿零之意則亦係一無信行之流朕甚鄙之伊等去後倘再請進藏亦斷難允行若噶爾丹䇿零並未出此伊等自立主張任意主行更屬詭譎嗣後再來亦斷不遣往西藏伊等果能擔承即聽其還朕為内外共主既經降㫖斷無改悔之理著將此㫖給發烏赫圖曉論伊等若伊等知悔仍照原議辦理若必欲還部亦竟聽之可也尋上諭安西提督永常等曰準噶爾熬茶之人欲中道而回此事雖尚在未定若彼執意欲回自無留彼之理亦聽其回可耳至哈密時汝等當以失信大義責之約束出境毋令生事不必如來時之接待彼出境之後更宜小心防範俟過冬令再行請㫖庚戌準噶爾部人孟克博羅特同來降命賞給安插如例乙夘恩賞喀爾喀新設駐防官兵有差定邊副將軍額駙䇿凌奏言内兵既撤所有駐防鄂爾昆之喀爾喀兵一千名防秋兵三千名已令演習戰陣本月初五日臣等親身往驗器械旗幟俱甚整齊排列陣式放鎗射箭皆已熟練臣等仰體聖主鼓舞官兵之至意酌議以軍營豫備奬賞之錦縀布疋等加賞值班副將軍郡王成衮扎布及公扎薩克台吉五名協理台吉十二名管旗章京九名㕘領佐領驍騎校二十九名兵丁四千名以示鼔勵相應請㫖奏入上從之戊午將軍烏赫圖等奏報準噶爾使臣齊黙特等自東科爾起程還部冬十月丙申命副都統索拜赴藏代紀山駐劄賞銀五百兩乙巳準噶爾部人額素克聶咱爾拜穆喇特等俱來降命賞給安插如例壬子準噶爾部人薩木湯庫本來降命賞給安插如例十一月丙寅準噶爾部人塞音察克阿古薩喇和國賴等俱來降命賞給安插如例十二月壬寅命綏逺城等處密籌備兵事宜上諭軍機大臣等曰尚書來保奏請先期派撥官兵以備不虞其言頗能慮逺經汝等議奏謂遽行派撥恐無知之人聲張揣度揺動人心大有闗係亦甚合宜然兵可不用不可不備現今雖無用兵之事倘適有調取刻期可集自當籌畫於事先者著行文綏逺城將軍大臣等令其密為整備勿似出師之狀伊等久在行間其統兵情形尤所稔悉一切如何修整如何豫備之處茍留心經理自可不數日而定必朝受命而夕可辦裝方無負邊閫重臣之寄著將辦理縁由詳悉曉示并諭官兵等共知之乾隆七年春正月戊寅恩免那克素番民應輸錢糧上諭内閣曰據副都統紀山奏稱前因準噶爾請進藏熬茶派官兵䕶送令那克素三十九部落番民等豫備馬匹牲畜接濟應用伊等率先集事惟恐後時甚屬急公且伊等頭目入見俱言䝉國家豢養之恩從無擾累各得安生惟願誠心報効等語此次準噶爾未曽進藏伊等所備之馬匹牲畜雖未經應用但番民生長邊逺感戴國家之恩黽勉報効甚屬可嘉宜施特恩著將伊等今年應輸錢糧盡數寛免以示鼓勵丁亥準噶爾部人羅斯瑪特多喇特率親屬五人俱來降命賞給安插如例二月丙申駐防哈密安西提督李繩武奏報準噶爾使臣至哈密情形李繩武奏言準噶爾使臣吹納木喀於正月十八日入境二十二日到哈密據云赴京進貢并去嵗蒙大皇帝恩許熬茶齊黙特等去藏不逺中途而返恐大皇帝見責故遣我等前來謝罪并懇仍許熬茶奏入得㫖朕已料彼必為熬茶之事再來陳請也三月辛巳準噶爾使臣吹納木喀等至京進表請安並貢方物準噶爾台吉噶爾丹䇿零謹奏乾隆大皇帝前世宗憲皇帝時謹遵頒發根敦等諭㫖是以兩次遣特磊至京懇請進藏熬茶至第二次留我部兩人編旗受爵并令我師以羅卜藏書努多爾濟塞卜騰塞卜騰旺布及其族衆悉送還若過八十日大兵當取途前進並以難行之事相要遂生釁端是釁非由我而起也後遣使者傅鼐阿克敦來謂彼此相持不特兵民被累兼之糜費糧餉牲畜宜各罷息干戈以安衆生決不食言我部之人謂既經用兵又許和好是不得已而出此竊念用兵以來衆生實受其累若得許和既可享福并有美名所以屢遣使至京定議奉大皇帝諭㫖我朝所設卡倫駐劄如舊爾等亦許每年遣二三十人至科卜多巡視去秋遵㫖遣人至科卜多守卡人等反云並無此㫖不許我人前往再赴藏熬茶之事奉大皇帝諭㫖令以三百人往既至哈密更令大臣等䕶視揀水草好處由東科爾次第進藏還時并許資助糧餉馬匹至貿易之事除禁物外悉令任便買賣比我使人赴哈密引路之人遶道逺由戈壁水草俱惡人既困乏馬多倒斃及至貿易之地並不遵大皇帝諭㫖乃禁止我人入市俱令一二人來議且減少價值不得速售欲擕往西藏又不許遂至留住四月雖去藏不逺不得前進半道而返又至京貿易之事奉㫖限定人數年分許由肅州西寧路因念從此至京道逺費多恐擕物不敷所用以上三事雖前此業已定議今遵議而行尚有委曲未便之處既䝉和好可否令我赴藏者由噶斯路則道近而水草亦便至京貿易者由歸化城路其往多巴西寧貿易者亦走噶斯之南并乞勿限定年分至巡視科卜多請如前降諭㫖每年遣人前往如䝉恩允事事便益永逺遵行於和好之道尤便伏乞大皇帝睿鑒隨表進貂皮三十張奏入報聞壬午勅諭軍營將軍大臣等上諭軍機大臣等曰覽夷使吹納木喀齎至噶爾丹䇿零奏章意甚狡詐朕斷不因言辭觸怒遽爾興兵亦不可不密為整備著移知兩路軍營大臣令伊等加意防範其奏内情形并詳悉寄知勅諭提督永常上諭軍機大臣等曰提督永常駐防哈密察其辦事尚不能深知準噶爾性情有藐視之意凡事思易則難思難則易慎其難而毋忽其易則功可成而無後悔準夷性本詭譎不可與我喀爾喀等一體相待應將此故密飭永常令其於一切事務俱留心辦理夏四月庚寅朔準噶爾使臣吹納木喀等入覲上諭吹納木喀等曰爾台吉噶爾丹䇿零奏章朕已入覽令爾口奏之語朕之大臣悉以聞前噶爾丹䇿零以其父故屢懇赴藏熬茶朕廷臣議應勿許朕施特恩念其為父諷經尊崇黄教自屬善事降㫖允之復遣大臣官兵䕶送助以牲畜口糧乃爾使齊黙特等既至東科爾惟以貿易為事遷延數月並不進藏遽欲還部朕之大臣屢諭不聽始以奏聞朕時在木蘭降㫖此係噶爾丹䇿零奏懇之事若等何得擅還或其來時噶爾丹䇿零本如此受意則嗣後復欲遣人進藏決不允行令朕之大臣再三開示若等執意起程想此意定出自噶爾丹䇿零不然雖彈丸小部落必無使臣不遵主命之理即如爾等此來除噶爾丹䇿零所囑外可任意増一辭乎汝至肅州即返可乎既乞往藏半途而還更造為種種不根之語欲變易成規非故滋事乎汝謂奏疏中並無傲慢朕大臣等悉能通汝等語言汝豈能隠匿乎朕為天下共主已許爾息兵斷不因此遽復興兵汝等若有妄舉亦聽之而已此次噶爾丹䇿零所奏與汝口奏互異朕實不解諸事難以定奪汝明記朕言詳諭噶爾丹䇿零可也吹納木喀奏云噶爾丹䇿零竭誠輸懇奏章所載乃中外言語不同之故實非傲慢其言及往事只以大皇帝有愛育羣生闡揚黄教之訓自陳歡感並無他意至進藏熬茶乃奏乞大皇帝施恩允行之事齊黙特半途而返據其言云以攔阻之故又奉㫖巡視科卜多據我巡視者云不令伊等巡閲噶爾丹䇿零並疑惑不信謹聲明始末令使臣等來剖晰至喀爾喀䝉古人等並大皇帝屬下我等豈敢侵犯生事惟是奏中所請三事允行與否恭候大皇帝睿鑒又奉上諭曰汝稱噶爾丹䇿零不信齊黙特故來具奏今奏中何無此語進藏熬茶本噶爾丹䇿零最切要事當遣可信之人奈何委之齊黙特伊等還時降㫖甚明今汝等縱仍欲進藏亦應候朕再降㫖允行然後得往豈容竟自主張但以道由噶斯為詞乎噶斯豈汝等境内乎抑聞朕前諭難以再請姑以此含糊嘗試乎原議巡視科卜多並無許入卡倫内巡視之語去年爾人不言巡視科卜多直入布延圖卡倫至喀勒占和碩卡倫朕之大臣始禁止之朕所遣略地之人有越阿爾台巡視爾卡倫以内之地者乎此事已明示蟒鼐矣爾等豈不知之至來京貿易者不得由綏逺城亦與哈栁定議尚未經行一次遽欲更張可乎噶爾丹䇿零此次所奏言辭不倫左右支吾殊非和好之道朕業已降㫖息兵汝又稱實無傲慢之意朕亦不介懷如果誠心懇乞俟再遣使來此次姑無庸議朕另有勅書付汝齎去吹納木喀又奏云前者齊黙特還並不以大皇帝諭㫖告知噶爾丹䇿零是以衆心懷疑此來何敢妄奏進藏一事在噶爾丹䇿零最為切要伏祈大皇帝恩允上諭曰此事不得允行之故噶爾丹䇿零亦所明知況人數日期俱未議定朕即加恩豈可令我䕶送官兵先勞守候乎天時近暑汝等可作速起程朕已諭我大臣為汝等辦理矣甲辰勅諭準噶爾台吉噶爾丹䇿零奉天承運皇帝詔曰爾奏中謂前此興戎釁非由爾又謂使臣傅鼐前來事非得已追論舊事為此非分大言又謂奉大皇帝諭遣人巡視科卜多為守卡人攔阻使使往藏熬茶留數月不遣半道空還定議至京貿易遶道力疲不能前進嗣後須取道噶斯伏祈睿鑒夫興戎起釁實由爾國前諭已明額爾得尼招大捷之後方行遣使我大國有何不得已而出此耶凟理前説意果何為豈又欲借端生事乎朕為天下共主業已降㫖息兵豈肯食言爾欲起釁朕亦不禁也定議巡視科卜多有巡視卡倫以内之語乎爾人由布延圖直至喀勒占和碩卡倫我始禁阻我人有過阿爾台至爾之卡倫内巡視者乎其事雖小然屢違定約豈合於和好之道朕允爾赴藏熬茶者亦鑒爾至誠故遣官䕶送豫備牲畜爾人至東科爾數月惟圖貿易不思進藏竟自還部誰為阻止乎如欲阻止何如不允爾奏之為愈也且齊黙特欲還朕降㫖詢問或來時噶爾丹䇿零囑爾或出爾等之意倘出噶爾丹䇿零則彼亦一絶無信行之人嗣後豈容復請乎今即復欲進藏亦必懇朕降㫖始可遵行如何遽作前去之計惟以道出噶斯為請況人數日期俱在未定豈有令朕之大臣官弁虚糜廪餼先勞守候乎以此問吹納木喀據稱噶爾丹䇿零實不知始末如此惟不信齊黙特語故令我等前來問明并輸誠意乞大皇帝施恩一切朕已明諭吹納木喀至貿易之事本與爾使哈栁定議並未遵行一次如何又欲更張請取道噶斯乎此次爾所陳奏不合事理念爾亦未深知將奏請之事暫行停止令吹納木喀傳諭於爾勅書亦令齎往隨勅賞各色縀十端磁器十件大緞六端五月丁丑準噶爾部人咱木巴喇克爾伯來降命賞給安插如例六月庚寅準噶爾部人阿爾咱來降命賞給安插如例秋七月辛巳準噶爾部人鞥克穆爾來降命賞給安插如例八月辛亥準噶爾部人三津根敦扎卜舒翁噶爾察克鄂爾謨泰薩里松布庫沙喇六人同來降命賞給安插如例九月辛酉準噶爾部人都噶爾來降命賞給安插如例甲戌命奬賞喀爾喀四部落軍容整頓者定邊副將軍額駙䇿凌奏言今年臣等㑹議令叅贊大臣都統塔爾瑪善於七月二十日赴塞勒壁口閲副將軍公巴素部落二十一旗兵丁扎薩克公扎木輝一旗器械堅利技勇熟練為最車臣汗達瑪琳郡王德木楚克巴扎爾什第貝勒旺扎爾貝子彦楚卜多爾濟公格勒克巴木丕勒扎薩克台吉衮楚克扎卜沙克都爾扎卜旺楚克達爾扎貝子旺扎爾公巴素䇿凌旺布薩木丕勒扎薩克台吉齊呼喇成衮扎布䇿黨敦多卜齊旺旺扎爾博洛勒十九旗次之扎薩克格勒克一旗又次之於八月初二日赴烏克圖爾濟爾哈朗閲副將軍成衮扎布部落十九旗兵丁扎薩克貝勒䇿卜登台吉彭楚克阿喇卜坦䇿卜登三旗器械堅利技勇熟練為最圖謝圖汗敦丹多爾濟親王敦多卜多爾濟郡王成衮扎布桑寨多爾濟䇿凌拜多卜公䝉固巴木丕勒多爾巴海扎薩克台吉齊巴克扎卜䇿凌旺舒克達什丕勒林丕勒多爾濟旺扎爾三都卜多爾濟十四旗次之扎薩克台吉遜多布旺布多爾濟二旗又次之令㕘贊大臣副都統慶泰於七月二十日赴桑金托羅海閲署副將軍世子成衮扎布部落二十二旗兵丁將軍王額駙䇿凌貝子車木楚克扎布公丹巴多爾濟咱雅班第達胡土克圖四旗器械堅利技勇熟練為最親王得親扎卜貝勒那木扎爾車蘇隆貝子多爾濟旺舒克公根丕勒扎木禪旺扎爾齊旺塞内扎薩克台吉巴朗額林沁額黙根春丕勒布達扎卜阿寶羅卜藏敦多卜特克什來冲扎卜額爾德尼班第達胡土克圖十八旗次之於七月二十五日赴哈里勒邁閲喀爾喀副將軍貝勒青滚雜卜十五旗兵丁扎薩克伊達木扎卜一旗器械堅利技勇熟練為最貝勒䇿登扎卜公旺舒克䇿魯卜精珠木多爾濟多爾濟䇿登扎薩克台吉喇卜坦六旗次之扎薩克圖汗巴勒達爾公旺扎爾旺沁扎卜台吉米玉特多爾濟班第五木布濟羅卜藏喇卜坦貝勒青滚雜卜又次之奏入得㫖諸部落軍容整頓者諭部議賞具奏冬十月丁亥準噶爾部人巴圖爾率屬三人來降命賞給安插如例甲午命法敏富德來京以原任按察使劉栢辦理軍營糧餉事務十一月丁巳命厄魯特等投誠者不必當差正白旗䝉古副都統䇿凌奏言額外䕶軍多爾濟等並自準噶爾向化投誠蒙恩給賞妻奴房屋授以額外䕶軍支給月糧野性漸馴當與䝉古一體効力當差嵗久著有勞績亦得量授官職其傲惰者治罪如例辦理軍機大臣等議曰準夷投誠人等嘉其向化恩施優渥伊等贍養有資遵守約束安全之道已屬盡善何必藉其材力以備驅使若必以䝉古一例當差殊非安戢逺人本意且自雍正六年至乾隆七年來降者凡三百三名計發往察哈爾寧古塔天津江寧杭州青州安插者已二百五十三名其在京者厄魯特僅二十三人回民僅二十七人為數無多不必派令當差俟其子孫長成所轄佐領或送補額甲或令當差另行辦理奏入上從之癸亥準噶爾部人和通賽音察克來降命賞給安插如例甲子準噶爾部人卓特巴率屬十三人來降命賞給安插如例乙丑準噶爾部人懇澤與第圖倫俱率妻來降命賞給安插如例壬申準噶爾台吉噶爾丹䇿零遣使吹納木喀等至京進表謝罪並乞許赴藏噶爾丹䇿零謹奏大皇帝前遣吹納木喀起程後訊問齊黙特汝赴藏熬茶既到東科爾忽中道而回諒大皇帝前㫖允行定無更改必汝有别故正詰問間吹納木喀適回齎諭㫖至備知其奉㫖不遵擅自回巢已正其罪并没其家矣欽奉上諭爾此次復請進藏人數時日俱未定議不可令䕶送大臣等虚糜守候暫行停止聖慮周詳曷勝感激今謹遵前㫖人數用三百名定期三月初起程初遣之人自應擕帶熬茶物件請先至多巴西寧貿易備物前往并請道出噶斯庶程近而水草茂人畜俱便如䝉允行更請人分兩起赴藏熬茶者由黙勒占庫車路進發往多巴西寧者由哈濟爾得卜特爾柴達木至多巴西寧再由多倫鄂摩渡口過穆魯烏蘇進藏又奉諭㫖爾人巡視科卜多者反進布延圖卡倫直至喀勒占和碩我守卡之人始禁止之按喀勒占和碩我等實不知有此地名並無令過科卜多巡察之語乃我人錯會耳前已降㫖定議請仍遵前㫖每年巡視至托爾輝而止又通商之事前哈栁所奉諭㫖令赴京貿易者道由肅州陜西其路實險逺難行往者和好時入京貿易並由歸化城赴多巴西寧聽其自便現今喀爾喀䝉古並許其由歸化城進京由青海至多巴西寧獨不允我等者中朝大臣恐我等與喀爾喀青海人交接耳前此多什布濟爾等嘗由喀爾喀歸化城進京去嵗進藏者亦由青海至東科爾何嘗滋事况䝉大皇帝許以和好自今豈敢背約妄行惟祈睿鑒又諭㫖有云爾所陳奏不合事理與吹納木喀口奏之言互異幸䝉大皇帝推心結好輸誠入奏安敢有冒凟之心或者彼此語言不同之故伏乞寛宥餘令吹納木喀口奏祈大皇帝鑒之隨表謹貢玉碗一具馬二匹貂皮三十張奏入報聞己夘命烏赫圖玉保䕶送準噶爾使臣赴藏上諭軍機大臣等曰準噶爾進藏熬茶者朕已加恩照所請行其總理䕶送仍令將軍烏赫圖及侍郎玉保前去著曉諭烏赫圖即備辦一切應行事件尋大學士等奏玉保應於明年二月間自京起程即往西寧接應來使奏入得㫖命賞烏赫圖銀一千兩玉保二千五百兩以備在途需用甲申準噶爾使臣吹納木喀等入覲上諭吹納木喀等曰噶爾丹䇿零奏表朕已覽訖令爾口奏語大臣等亦以聞噶爾丹䇿零深知爾部之人誑語妄行據實引罪詞甚恭順朕已知悉又言從前所奏非敢冒凟因中外言語不同之故懇乞寛宥此亦小過朕不介意朕為大君豈有聞一甘言即喜聞一非理之言即怒者乎凡事惟據理剖斷理可行即允之不可行縱懇乞再三亦不允也即如噶爾丹䇿零乞為父進藏熬茶朕既允行來使忽半路而回今復申前請本宜勿許但念彼實為其父之故心誠而語順故朕仍加恩允之并懇道出噶斯此次亦姑從所請但所遣三百人若分二起不特我之䕶送者難於兼顧爾等亦轉多勞費且先行赴藏者豈能久駐以待商人乎止應仍作一起或徑自爾國由噶斯入藏否則同至西寧貿易事畢由多倫鄂摩入藏爾等自酌之可也來時當告我守邊大臣由何路往朕仍賞給牲畜路費遣官䕶送吹納木喀奏言噶爾丹䇿零所奏既䝉大皇帝洞鑒我等謹記大皇帝諭㫖還告噶爾丹䇿零前者荷恩賞給牲畜路費今謹謝恩上諭曰噶爾丹䇿零前次請貿易者不拘人數年期所往亦從其便既已定議豈容數改現今與爾貿易之俄羅斯回人有任其自往自來者乎無論準噶爾人即我喀爾喀部落出入邊口必自部給票驗明許過亦爾等所知欲永逺和好豈可但記一時之便若謂道逺費多俄羅斯較爾更逺何以往來不絶且貿易乃民事從無官為辦給者今許爾換給馬駝即朕之特恩也又原議巡察科卜多並未指及托爾輝今噶爾丹䇿零以此為言特恐彼處駐兵耳朕既降㫖罷兵斷不食言若復生疑即如所請每年秋冬遣二三十人來令我守卡者率往爾等亦須嚴飭來人毋得生事吹納木喀奏言所請並䝉大皇帝洞鑒此外别無所奏使臣往來數次今年亦老矣惟懇大皇帝加恩和好之事永逺不渝上諭曰果噶爾丹策零勿萌異心即能永逺爾病已痊否爾等何時起程吹納木喀奏言使臣年老途中復感寒暑䝉大皇帝遣醫診治得愈今日瞻仰天顔更百病皆除俟貨物換就即起程還部矣上諭曰爾等行期不逺朕尚欲加恩賜宴令爾等觀賞百戲也平定準噶爾方略前編卷四十六
