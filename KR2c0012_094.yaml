body:
  text: 乾隆二十二年夏五月辛亥諭參贊大臣唐喀祿等派兵擒拏哈薩克錫喇上諭軍機大臣曰成衮扎布等奏稱哈薩克錫喇現在逃至和博克薩里地方等語彼處離北路軍營甚近著派唐喀祿車木楚克扎布領兵擒拏此時成衮扎布等如已將阿逆擒拏並著派兵數百名遣大員前往和博克薩里會同唐喀祿等兩路夾攻更為妥協再從前搶掠侍衛佛保之逆賊桑濟亦逃至額爾齊斯等處料必與哈薩克錫喇等聚集著一併嚴行查拏毋任脫命阿霸垓親王索諾木喇卜坦查拏各部落匪竊賊人上諭軍機大臣曰索諾木喇卜坦等拏獲擅離卡倫搶奪牲隻賊人晶默特等五十三名請旨正法尚有未獲賊衆現在領兵赴克爾倫地方查拏等語索諾木喇卜坦等辦理妥協所獲賊人著即正法餘著嚴行查拏毋任逃脫前命多爾濟等查拏各部落匪竊賊衆一味姑息以致賊人紛紛逃竄至今尚未完結索諾木喇卜坦既領兵赴克爾倫所有車臣汗圖謝圖汗各部落賊人俱著索諾木喇卜坦會同各該部落副將軍德木楚克桑寨多爾濟等逐一查拏以彰國憲多爾濟濟福仍著協同索諾木喇卜坦辦事瑚圖靈阿德爾森保著即回京命奬賞都爾伯特郡王策凌烏巴什上諭軍機大臣曰唐喀祿奏稱接到命往額爾齊斯協同西路大兵擒賊之旨即向策凌烏巴什曉諭策凌烏巴什隨派伊部落護衛巴顔及兵丁三十名同往效力等語策凌烏巴什正值遷移遊牧之時與唐喀祿中途相遇即派出護衛兵丁隨同前往甚屬可嘉著賞給緞匹荷包以示奬勵其護衛兵丁等俱著照例賞給署理定邊左副將軍印務策布登扎布等疏奏安插噶勒雜特人衆事宜策布登扎布等奏言噶勒雜特得木齊丹畢根敦等所領人衆二百餘戶從前陸續投誠暫行歸併扎哈沁遊牧居住今詢之扎哈沁公扎木禪告稱伊等雖尚屬安靜若另行安插更為妥協等語查此項噶勒雜特人等投誠以來並無事故尚屬安靜猶不至如明噶特特楞古特人等賞給索倫為奴應交黑龍江將軍安插奏入報聞壬子參贊大臣唐喀祿疏奏領兵赴察罕郭勒堵禦賊衆唐喀祿奏言臣奉旨領兵赴額爾齊斯等處協同西路大兵擒𠞰賊衆現在選派兵丁起程會同瑚爾起車木楚克扎布等前往正值策凌烏巴什遷向內地因告知派伊等都爾伯特兵丁之諭伊隨派護衛一員兵三十名又詢問如有逃逸之人由何路前來我兵在何處堵截據稱額爾齊斯及戈壁烏隆古地方此時正多蚊虻不能行走惟察罕郭勒地方係額林哈畢爾噶哈卜塔克拜塔克等處經由道路赴彼堵禦賊衆甚屬緊要臣即領兵前往奏入報聞癸丑申諭定邊將軍成衮扎布等速擒阿逆上諭軍機大臣曰據成衮扎布等奏烏喇特宰桑鄂勒錐綽和爾得木齊阿穆呼朗等投赴軍營現在暫行安撫等語所辦尚合機宜惟伊等並不以擒拏阿逆為要務而亟亟以辦理回部為言殊屬不知緩急昨已詳悉傳諭伊等果能即擒阿逆則其餘賊衆及回人等自可從容辦理若阿逆尚未成擒而即深入回部霍集占等畏懼大兵勢必固守力拒倘阿逆復煽惑各厄魯特等從中掩襲大兵兩路遇敵轉致顧此失彼殊未妥協總之阿逆未擒不必即辦理回部此可不再計而決即阿逆未能剋期擒獲大兵亦不得遽撒或在額林哈畢爾噶或在吐魯番駐劄過冬俟明年再行籌畫從前因阿逆已赴哈薩克未必即能前來而達爾黨阿哈達哈等又稱阿逆遠竄他往相距甚遠竭力追捕必須一月之期是以降旨暫行撤兵詎意大兵方撤賊即潛來皆由達爾黨阿等誤中賊計是以所言皆不足憑今現在賊勢窮蹙正當奮勇追捕勿蹈前轍成衮扎布兆惠等務遵節次諭旨迅速辦理毋負委任甲寅諭參贊大臣永貴等擒拏扎那噶爾布等上諭軍機大臣曰據兆惠奏永貴等領兵追擒扎那噶爾布尼瑪等至孟克圖嶺尚未成擒現在駐劄地方水草平常移駐於薩里克巴里克等語永貴等既遇賊衆即應奮勇追捕豈有將大兵遠離賊營之理若因水草平常賊衆又何能屯駐扎那噶爾布尼瑪等雖非阿逆可比既已追及安得疏縱著兆惠嚴飭永貴三格等奮勇擒拏毋得稍為退諉自取罪戾丁巳駐劄巴里坤辦事大臣阿里衮疏奏領兵巡查臺站日期阿里衮奏言臣奉旨帶領兵丁前往巴罕庫蘇一帶巡查臺站遇賊擒𠞰臣即揀選兵丁三百名於五月十七日自巴里坤起程往來巡查俟參贊大臣雅爾哈善等到時交與接辦臣仍赴巴里坤駐劄奏入報聞戊午命護軍三達色仍赴西路軍營效力上諭軍機大臣曰已革護軍三達色前同莽噶里克所遣回人阿舒爾瑪特同至哈密經駐防總兵祖雲龍拏獲因三達色在準噶爾年久或有依附賊人情節是以解送來京審訊今訊據三達色自前歲即回軍營隨征效力此次自吐魯番回至哈密亦屬因公差遣並非為莽噶里克所使且熟悉準噶爾情形三達色著加恩仍授護軍發往西路軍營效力己未命安插察哈爾之厄魯特等毋庸派令差遣上諭軍機大臣曰據察哈爾總管巴爾品奏稱前同薩喇爾投誠安插察哈爾旗分之佐領察罕鼐濟等應與察哈爾一體效力差遣所有應製軍器限三年內扣各員俸銀製辦等語所奏甚屬錯謬從前同薩喇爾投誠人等安插察哈爾地方原因伊等係初降之人加以體恤並非責令差遣且薩喇爾曾任佐領並未派令差委今因薩喇爾獲罪即令察罕鼐濟等供應差使且扣除俸銀製辦軍器伊等無知能不妄生疑懼况察哈爾地方有何緊要事務其製辦軍器一事更不必急於辦理設遇調遣自可臨時辦給巴爾品身任總管不知事體冒昧陳奏著嚴行申飭仍將朕旨曉諭察罕奈濟等知之六月癸亥命授回人阿卜都賚三品職銜駐劄巴里坤辦事大臣雅爾哈善等奏言庫爾勒回人散秩大臣伯克托克托前往庫車等城招服回人現為賊人羈留伊弟阿卜都賚呈請效力軍營情詞誠篤臣等準其所請並賞給孔雀翎以示鼓勵可否照阿濟克伯克色梯巴勒氐噶岱默特之例賞給三品職銜出自聖恩奏入上從之乙丑命授奬賞藍翎諾爾本等為三等侍衛上諭軍機大臣曰據兆惠等奏富德等擒獲阿逆宰桑烏巴什遣奬賞藍翎諾爾本解送前來中途遇賊奮勇𠞰殺等語諾爾本著授為三等侍衛並賜克丑巴圖魯名號賞銀一百兩擒獲烏巴什之領催喀勒扎卜著授為三等侍衛擒獲濟喇特轄特們喀喇之前鋒索卜坦察著授為藍翎侍衛仍各賞銀五十兩命參贊大臣唐喀祿等領兵堵截阿逆上諭軍機大臣曰據兆惠等奏擒獲阿逆宰桑烏巴什供稱阿逆現在逃往塔爾巴噶台地方等語此言雖不足憑信第塔爾巴噶台地近北路阿逆勢窮力竭或因北路現無大兵駐劄希冀潛赴烏梁海及俄羅斯等處茍延殘喘亦未可定著即傳諭唐喀祿車木楚克扎布等就近領兵前往堵截倘遇賊蹤即行擒𠞰定邊右副將軍兆惠等疏奏擒拏厄魯特烏爾古勒濟勒等兆惠等奏言據侍衛奇徹布等報稱拏獲厄魯特宰桑烏爾古勒濟勒烏魯木等及所屬人衆等語查烏爾古勒濟勒前曾加恩授為散秩大臣後復附和阿逆應即行正法第據供稱現在博羅塔拉地方遊牧阿逆曾令其同行並未前往尚屬實情且此時正在擒拏阿逆之時此等賊人似毋庸即行辦理仍令其在原處遊牧至烏魯木從前擒拏唐古忒時曾經效力蒙恩賞給翎頂今聞大兵前來即率屬數十人投至軍營已令其在軍營作為嚮導往擒阿逆其屬人亦仍令在原處遊牧俟擒拏阿逆後再行分别辦理奏入報聞己巳諭定邊將軍成衮扎布等籌辦擒賊事宜上諭軍機大臣曰此次大兵進𠞰原為剪滅厄魯特賊衆初未料阿逆潛來自投天網是以屢諭成衮扎布等將沿途背叛賊人奮勇擒𠞰其情罪少有可原者量為安撫俟兩路大兵會集伊犁後通行籌酌辦理以絶根株今大兵甫入即遇阿逆前來經參贊大臣富德等屢次擊敗乘勝追逐計日就擒此時情形又與初次定議時有異所有厄魯特賊衆若遽行剪滅伊等聞風畏懼竄入賊中是又驅令從逆增其黨援也成衮扎布等應酌量分别辦理如遇非真心附逆賊衆令其協擒阿逆不特寬免其罪且必加以殊恩將此明白曉諭伊等原屬離心且希冀重賞未必無擒賊自效之人成衮扎布等務宜妥協籌辦再伊等派額駙色布騰巴爾珠爾往擒吞圖布殊屬非是色布騰巴爾珠爾未經厯練此次命往軍營不過令其隨衆效力以贖前愆若專任𠞰賊必致誤事現在如鄂實明瑞等俱經身厯戎行何以並未遣派色布騰巴爾珠爾往擒吞圖布事已二旬此時尚未奏到著即將伊現在情形迅速奏聞庚午公素賚璊馳驛來京上諭軍機大臣曰吐魯番貝子額敏和卓因加恩封伊貝子及伊子素賚璊公爵奏請遣素賚璊來京謝恩額敏和卓及伊子素賚璊實心報效深可嘉子著照所請即令素賚璊馳驛來京備朕詢問辛未諭定邊右副將軍兆惠奮勇擒賊上諭軍機大臣曰兆惠奏稱接奉諭旨已領兵策應富德往擒阿逆所有軍營應辦事宜請交與永貴就近辦理等語著即傳諭永貴會同雅爾哈善等將應行籌辦事宜即行辦理兆惠既領兵前往務同富德協力擒拏首賊以副委任斷不得妄分彼此上年因策楞玉保等互相掣肘迄無成功乃兆惠所深悉當以此為炯鑒毋得更蹈覆轍雅爾哈善現同哈寧阿巡查臺站接到此旨著即速赴永貴駐劄地方會同商辦其臺站事務即交與哈寧阿辦理壬申訓諭領隊大臣額駙色布騰巴爾珠爾定邊將軍成衮扎布等奏言五月初六日據領隊大臣額駙色布騰巴爾珠爾報稱領兵前往擒拏吞圖布鄂哲特等沿途𠞰滅賊衆探知賊人逃竄地方在古爾班伯爾克河等處晝夜追襲已將賊人遊牧人衆盡行𠞰滅鄂哲特之妻亦被擒獲吞圖布鄂哲特僅率三十餘人逃遁復令副都統由屯輕騎追逐行至十五里之外追及吞圖布等奮力擒拏賊人占踞山頂設柵堵禦施放鳥鎗色布騰巴爾珠爾復親率侍衛等數十人衝入賊隊賊復棄柵逃竄地方險峻馬匹晝夜兼行不免疲乏是以未及擒獲等語查色布騰巴爾珠爾等帶領八日口糧追賊至千有餘里沿途因馬力平常僅率官兵數十人追襲雖吞圖布等未經擒獲而斬馘賊衆甚多收取馬駝牛羊無算行走尚屬奮勉奏入上諭軍機大臣曰前成衮扎布等派色布騰巴爾珠爾前往追擒吞圖布等朕即將辦理未善之處傳旨訓諭今果不出所料色布騰巴爾珠爾等既已追及賊人猶且任其脫逃伊等動以官兵馬力疲乏為詞獨不思賊人被追其馬力轉能馳騁乎且既獲駝馬四百有餘何不即以之換給兵丁奮力前往而乃遽爾回兵束手無措實屬怯懦色布騰巴爾珠爾原係獲罪之人今復令其效力軍營以贖前愆宜如何感激奮勉乃遇此數十垂斃之賊尚不思奮勇爭先其罪寧可復逭成衮扎布舒赫德等尚稱其斬馘甚多曲為回護甚屬非是此次副都統由屯及隨往官兵等尚屬出力著交部量加議敘色布騰巴爾珠爾姑從寬免其治罪仍著成衮扎布等派兵三百名交色布騰巴爾珠爾會同明瑞前往追擒務將吞圖布等拏獲如再行疏縱朕斷不能姑貸諭定邊將軍成衮扎布等搜捕厄魯特賊衆事宜成衮扎布等奏言臣等此次進兵由吐魯番前進所有沿途特克斯等處遊牧之克勒特烏魯特綽和爾烏喇特伊克商溫都遜集賽等數鄂拓克人等俱在山谷中棲身與額林哈畢爾噶一帶地方聲息不通上年巴雅爾等背叛此數鄂拓克並未附和亦經副將軍兆惠查明臣等暫行安撫不令驚懼又向伊等換取馬匹牲隻以濟軍行惟查拏錫克錫爾格衮布巴哈曼集等賊衆正法其餘俱令照舊遊牧並將宰桑鄂勒錐等帶往軍營效力據稱伊等咸懼哈薩克布魯特搶掠情願遷至哈喇沙爾遊牧等語查各鄂拓克內約戶口一千二百有餘應照所請令其遷移並飭令派兵三四百名豫備同往𠞰滅賊人臣等仍留心察看稍有可疑即行擒𠞰此等厄魯特俱經辦理妥協縱使阿逆前來亦無容身之處立可擒獲惟回人霍集占等戕害使臣情罪可惡且據城自守非阿逆窮蹙情形可比應即速往𠞰滅臣等現在籌辦前往奏入上諭軍機大臣曰成衮扎布等奏稱阿逆現已窮蹙不日即可就擒所有回人霍集占等應即領兵擒拏等語阿逆現在情形自可不日成擒縱令逃遁若俄羅斯哈薩克等處自可索取已詳悉降旨令兆惠等遵照辦理至辦理回人一事成衮扎布等應將厄魯特等悉行剪除再為籌辦亦經屢降諭旨即如吞圖布鄂哲特等雖甚窮蹙而色布騰巴爾珠爾等尚未能擒獲又扎那噶爾布尼瑪等相距成衮扎布軍營甚近亦未經弋獲此時未便即往回城著成衮扎布等即分派大員奮力搜捕毋使一人漏網以絶根株其克勒特等鄂拓克懇請遷移之一千二百餘户未據聲明安插何地再伊犂地方除此四鄂拓克人等之外尚有何人著一併查明奏聞辦理癸酉訓諭參贊大臣鄂實等上諭軍機大臣曰鄂實係參贊大臣諸事宜加奮勉乃並未領兵前進僅隨同成衮扎布等行走軍營事務有成衮扎布及舒赫德二人辦理鄂實並無所事伊若自居參贊大臣而將𠞰捕賊衆之事俱推委於諸領隊大臣豈朕簡任之意鄂實著嚴加申飭明瑞上年進兵哈薩克頗著勤勞此次惟追捕巴雅爾時曾奏聞派往現已降旨令同色布騰巴爾珠爾擒拏吞圖布等務宜奮勉行走用副委任命奬賞佐領巴顔岱等上諭軍機大臣曰策布登扎布等奏稱從前逆賊青滚雜卜遣班珠爾擅奪馬駝經賽音諾顔部落佐領巴顔岱等奮力抵禦等語巴顔岱奮勇拒賊甚屬可嘉署副管旗章京德勒格爾甲拉哈爾齊海驍騎校根敦扎卜等協同巴顔岱護送馬駝至烏里雅蘇台亦屬奮勉著賞給巴顔岱孔雀翎銀五十兩德勒格爾哈爾齊海亦著賞給孔雀翎銀各三十兩根敦扎卜著賞給藍翎銀二十兩以示鼓勵參贊大臣哈達哈等疏奏遣派都爾伯特兵丁赴軍營效力哈達哈等奏言臣等奉旨遣員曉諭策凌等令其酌量情形派出兵丁隨營效力今據策凌等告稱策凌烏巴什前已派兵三十名交唐喀祿帶往兹復派兵七十名情願隨營效力臣即辦給口糧四個月令其赴唐喀祿隊內行走奏入報聞甲戌命奬賞烏梁海內大臣察達克參贊大臣哈達哈等奏言臣等曉諭烏梁海內大臣察達克令其派兵防範西路逃竄賊衆隨據察達克遣人告稱現在於緊要地方安設卡倫三處每處派得木齊一員兵三十名加意防守如遇阿逆及逃竄賊人即行擒拏並豫備兵五百名聽候調遣奏入上諭軍機大臣曰內大臣察達克因哈達哈等曉諭防範賊衆事宜即派兵安設卡倫並豫備兵丁聽候調遣察達克感激朕恩實心報效甚屬可嘉著賞給銀五十兩乙亥諭定邊將軍成衮扎布等籌辦巴圖爾烏巴什事宜上諭軍機大臣曰前據將軍成衮扎布等奏稱土爾扈特台吉巴圖爾烏巴什等帶兵往擒阿逆續據兆惠等具奏又稱巴圖爾烏巴什係噶爾丹策零之壻已帶領集賽人等占踞伊犂等語兩處所奏情形不同已諭將兆惠奏摺録寄成衮扎布等籌辦嗣經成衮扎布等陸續陳奏辦理各鄂拓克事宜且稱伊犂特克斯等處現已寧謐等語但未將巴圖爾烏巴什現在情形奏聞若尚未籌辦則伊犂安得竟為寧謐著傳諭成衮扎布等速將巴圖爾烏巴什等現在駐劄何處及應如何辦理之處一面辦理一面奏聞丙子諭參贊大臣雅爾哈善等擒𠞰賊衆事宜上諭軍機大臣曰兆惠已領兵往擒阿逆所有軍營事務降旨令雅爾哈善會同永貴辦理現在擒拏扎那噶爾布尼瑪等及𠞰滅哈丹阿巴噶斯扎哈沁人等遊牧俱屬緊要雅爾哈善務宜奮往辦理再𠞰滅賊衆應帶兵極力搜捕不必專在濟爾哈朗駐劄雅爾哈善到軍營時即遣派三格等分路擒𠞰其附近之嗎哈沁等一併𠞰滅毋留餘孽前降旨令額爾登額𠞰滅扎哈沁賊衆後前往策應兆惠今兆惠富德等已經追賊遠往額爾登額諒已不能追及著即赴濟爾哈朗聽雅爾哈善等調遣丁丑諭定邊將軍成衮扎布通籌兩路軍務上諭軍機大臣曰現在兩路進兵所有額林哈畢爾噶一帶之厄魯特等或已𠞰滅或將首賊擒拏其在朱爾都斯等處之各鄂拓克人等經將軍成衮扎布等奏請暫行安撫亦屬妥協惟是伊等聲息相通知額林哈畢爾噶辦理情形其暫行安撫人衆或致妄生疑懼更滋事端成衮扎布等現擬領兵𠞰滅回部務宜將此等人衆設法安插毋遺後患方為妥協可明白曉諭云因爾等上年並未隨同額林哈畢爾噶衆厄魯特附和為逆是以加恩寬宥等語庶伊等不生疑懼仍加意防範勿少疏虞或將其頭目人等帶往軍中為質或換取伊等馬匹牲隻以益兵力其辦理回部事宜必須將各處厄魯特盡行辦竣領兵前往一切俱遵照前旨辦理至大兵雖分兩路前進而辦理一切事宜皆係將軍成衮扎布分內之事即與兆惠會合一處亦應聽成衮扎布主持今兆惠已領兵遠往所有額林哈畢爾噶一帶事務並著成衮扎布總統辦理斷不得稍分彼此互相推諉命賞恤達什達瓦部落人衆上諭軍機大臣曰達什達瓦部落人等現在生計稍艱然能守分謀生毫不滋事甚屬可嘉著查明每人各賞銀二兩仍加賞口糧兩個月以示體恤命恩恤喀爾喀各部落等上諭軍機大臣曰喀爾喀各部落遊牧原係指定地方令伊等互相聨絡以資守望今據索諾木喇卜坦等奏聞上年因逆賊青滚雜卜煽惑滋擾各部落竟有棄其遊牧遠徙他處者現在舊遊牧地方棄地既多姦匪易集以至往來商旅間被搶掠已陸續查拏按律治罪地方復得寧靜應令伊等仍歸原地方遊牧約束屬人共圖生聚庶於伊等生計有益再各部落數年來間遇災祲又因軍務未竣黽勉急公現有負欠商人銀十餘萬兩著策布登扎布詳悉查明動支公項代為清償又上年聞青滚雜卜背叛之信有將卡倫臺站內馬匹牲隻攜回各遊牧者本應即令繳還念伊等生計艱難並著格外施恩分年展限陸續繳還以紓其力著策布登扎布詳悉曉諭各部落王公扎薩克等務期仰體朕加恩曲宥之意各謀本業永靖邊隅以長享太平之福命議敘阿霸垓親王索諾木喇卜坦等上諭軍機大臣曰索諾木喇卜坦等拏獲搶奪達里剛愛多倫諾爾等處商民賊人九十餘名俱著照所奏即行正法所有各部落王公扎薩克等失察之咎本應交部議處但既會同索諾木喇卜坦等擒拏賊人不致漏網俱著從寬免議索諾木喇卜坦永興辦理妥協著交部議敘辛巳諭定邊將軍成衮扎布等𠞰除賊衆事宜上諭軍機大臣曰成衮扎布奏稱據侍衛烏爾登呈報扎那噶爾布尼瑪等帶領千餘戶自額林哈畢爾噶逃往哈什河地方隨派公明瑞內大臣博爾奔察領兵六百名前往策應等語扎那噶爾布尼瑪等皆係要賊現領千有餘戶應多選兵丁務期弋獲今僅派兵六百名尚屬不敷調遣應將永貴所領額林哈畢爾噶一帶兵丁調往協擒方為妥協兩路大兵無分彼此原可互相調用不得岐視且先經永貴等奏稱三格巴寧阿等帶兵堵截扎那噶爾布等果如所奏賊人何由前往哈什河既經逃出三格等曾否尾追著永貴查明具奏扎那噶爾布尼瑪等現在伊犂附近地方滋擾應悉行𠞰除方得寧謐現在擒拏阿逆已責成兆惠富德等帶兵前往成衮扎布等惟將扎那噶爾布尼瑪巴圖爾烏巴什等為首賊人悉行拏獲徐籌辦理回部屢經降旨傳諭成衮扎布等應即遵照辦理乃節次覽伊等所奏殊未悉合機宜甚厪朕懷伊等如能於八月初旬內將厄魯特賊衆辦理完竣即著領兵進𠞰回部倘彼時尚需辦理則天氣漸寒已屆撤兵之時應在何處駐劄過冬之處遵照前旨酌量定議具奏參贊大臣巴祿疏奏赴軍營日期巴祿奏言臣於六月初三日抵巴里坤參贊大臣雅爾哈善等已起程前赴軍營臣亦於六月初七日帶兵二十名前往奏入報聞定議解送馬匹事宜軍機大臣等奏言欽奉諭旨今歲大兵進𠞰派撥甘省馬匹甚多現在該省所存馬匹無幾明春尚有需用之處著方觀承於直𨽻省餵養馬匹內揀選五千匹解送肅州令黃廷桂加意餵養以備應用若何運送之處令臣等議奏查上年十二月內遵旨令直𨽻解送馬五千匹赴軍營調用係由直𨽻至西安西安至甘肅節次更換馬匹解往今若仍照前例辦理則西安甘肅馬匹業經調撥所存餘馬未必俱堪更換且現在為期尚寬非上年急需調撥可比惟應沿途寬豫程限善為飼秣自可以收實用臣等酌議交與直督方觀承揀選馬匹即於七月初旬起程沿途令各省督撫豫派員辨接收遞送由直𨽻至山西西安甘肅三省分省派委員辨小心餵養務使馬力不致疲乏俟至甘省交與總督黃廷桂就近牧放以備明春調用節次運解則各省員辨自顧考成必不敢生怠玩而為期寬裕原可無誤軍行奏入上從之命定邊將軍成衮扎布來京上諭軍機大臣曰成衮扎布等領兵𠞰滅厄魯特賊衆自可不日告竣其辦理回人事宜即緩至明年亦未為遲且即遣兵辦理回人亦不過派兵四五千名著一大員統領已足勝任亦無庸成衮扎布親往况伊係喀爾喀將軍北路軍營本屬緊要倘阿逆尚未弋獲或逃入北路附近地方應令成袞扎布前往籌畫著傳諭成袞扎布俟拏獲厄魯特賊衆後即行撤兵酌定地方駐劄交與舒赫德等管轄伊即來京面領訓諭癸未命拏解原任公品級達瑪林來京上諭軍機大臣曰據桑寨多爾濟奏稱接署將軍策布登扎布咨遣員同所遣侍衛瑪竒達前往查拏原任公品級達瑪林詎達瑪林先期已赴胡土克圖處現交與尚卓特巴查拏等語達瑪林係附和逆賊青滾雜卜之人罪不容逭是以降旨拏解來京桑寨多爾濟係該部落副將軍應即派幹員拏解乃草率從事以致脫逃復以現交尚卓特巴查拏塞責甚屬玩誤桑寨多爾濟在胡土克圖庫倫附近居住著即派員速將達瑪林拏解來京毋得疏縱乙酉命貝子額敏和卓領兵同𠞰回部上諭軍機大臣曰成袞扎布等辦理厄魯特賊衆事竣即應領兵𠞰滅回部已降旨令成袞扎布來京另派大員前往辦理其吐魯番貝子額敏和卓熟悉回人情形著先行傳旨曉諭俟進兵回部時令額敏和卓領兵同往辦理平定準噶爾方略正編卷四十
