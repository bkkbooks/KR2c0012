body:
  text: 雍正十一年三月壬午朔命量撒駐藏兵上諭辦理軍機大臣等曰西藏駐劄辨兵本為保護唐古忒人等以防準噶爾賊夷侵犯而設比來賊夷大敗徒步奔逃力䠞勢窮不能逺涉藏地則其無力進兵可知且頗羅鼐輸誠效力唐古忒之兵亦較前氣壯現今藏地無事兵丁多集則米穀錢糧一切費用等項雖給自內地而唐古忒人等不免解送之勞朕意量其足以防守藏地留兵數百名餘者盡行撒回其留藏之兵著總兵官周起鳳帶領駐劄青保馬拉苗夀著總理藏務至此項兵應撒若干應否將駐劄察木多之雲南兵丁一併撒回著詳議具奏尋議曰駐藏四川兵二千應留五百守護餘悉撒還本處所留兵俟三年後仍撥四川官兵更代其察木多所駐雲南兵一千本為援藏而設今既量撒駐藏兵丁雲南兵亦應撒還五百如四川例三年更代奏入上從之己丑命黜沙津達賴爵效力贖罪理藩院劾奏土默特輔國公沙津達賴前在和通呼爾哈臨戰遁歸又於烏遜珠勒敗北請黜其爵奏入得㫖沙津達賴著革去輔國公在軍前效力贖罪乙巳辦理軍機大臣等疏言閲靖邊大將軍順承親王所報陳亡官兵册與傅爾丹所奏原册彼此互異應以前報陳亡今云未還者傳令官兵家屬知之其已給恤賞銀追繳如數所給世職亦暫停其承襲奏入得㫖傅爾丹身為將軍草率查奏而該管大臣等官亦任意揑報是錯誤之咎自在傅爾丹等與該官兵無涉所賞銀兩不必追繳其應給世職著暫停承襲丙午命以恭格薩木丕勒襲封扎薩克多羅郡王上諭理藩院曰喀爾喀多羅郡王吹扎卜既承襲車臣汗名號其扎薩克多羅郡王著伊弟恭格薩木丕勒承襲命賞給車臣汗吹扎卜親王俸上諭理藩院曰喀爾喀車臣汗吹扎卜具奏懇請俸祿從前未給喀爾喀汗等俸祿者蓋欲伊等各守舊業不令同衆扎薩克王等一例將屬下人等另編旗分佐領是以未給俸祿今車臣汗吹扎卜既以請給具奏著給與親王之俸每年加賞銀二千五百兩其圖謝圖汗扎薩克圖汗亦著行文詢問伊等若不願請俸仍守舊業各聽其便若情願請俸亦著照車臣汗吹扎卜之例賞給喀爾喀扎薩克貝勒車木楚克納木扎爾陳亡命遣官致祭庚戌命以通政使司左參議徐杞署陕西甘肅布政使仍辦理噶斯軍需事務夏四月甲寅命削郡王查木陽爵以貝勒赴軍前效力降貝子齊旺班珠爾羅卜藏為輔國公上諭理藩院曰鄂爾多斯郡王查木陽身為副將軍並不將伊屬下精兵派出且遲延日期疏脫兵丁甚屬不合著削去郡王授為貝勒發往軍前效力贖罪貝子齊旺班珠爾羅卜藏於伊屬下派兵時並不詳慎以致逃回甚屬怠忽著降二等授為輔國公戊午命嚴禁造作浮言者上諭辦理軍機大臣等曰從來造作言語煽惑人心者律有不赦之條若在軍前造言傳播其罪更重應照軍法即正典刑此自古相傳之憲典也數年以來西北兩路用兵征討準噶爾該管大臣官員等居心怠忽辦理粗疏號令不嚴稽察不密間有不肖之人在軍營各處揑造全無影響之談或稱京師近有某事或稱某營近有某事一人倡先衆口附和愚昧之人不能辨别信以為實而該管之大臣官員等雖心知其非往往以為難於根究希圖省事置之不問遂致若輩肆口流傳全無忌憚又有從軍營回來之人造作言語以惑亂在京之聽聞如此等事不但有妨於公務亦且大害於人心不可不嚴加禁約著行文各路將軍令其詳細曉諭該管辨兵及跟役買賣人等嗣後倘有造作浮言者必將為首之人究出姓名奏聞請㫖即於本處正法示衆其失於覺察之該管官辨一併治罪若能查出參奏免其議處至在京造言生事之人交與步軍統領八旗大臣五城御史順天府先期曉諭倘怙惡不悛即行查拏從重治罪命馬蘭泰赴洪郭爾鄂隆軍前效力上諭辦理軍機大臣等曰朕從前以侯馬蘭泰於去年賊至推河時領兵截殺奮勇成功故將伊調回留朕左右令其學習辦事近聞軍前人等俱喧傳馬蘭泰一聞賊至甚是畏怯喀爾喀協理台吉遜都卜再四跪請出戰始行遣往馬蘭泰出營行未二十里即回朕將此問馬蘭泰據奏係人揑造陷害之語此事日後自有分曉馬蘭泰軍前事務尚未完結著仍往洪郭爾鄂隆地方督兵操演效力行走公豐盛額不必前去庚申議烏里雅蘇台築城駐兵事宜靖邊大將軍順承親王錫保等奏言察罕廋爾當阿爾台諸路要道建城駐兵歷有年所以柴草不足移駐阿勒達爾托羅海其後柴草亦不足用去年又移軍至烏里雅蘇台此外尚有額得爾齊得爾特爾啓塔米爾等處地亦寬濶然並在杭愛山陽與內地近至特斯等處僻在迤北若賊人由南路來犯邀截堵禦呼應不靈並不便駐劄大兵今已於烏里雅蘇台山頭各建炮臺其左近並令滿洲䝉古兵駐劄且特斯台西里各有駐兵萬人賊人不敢逼近應請即於烏里雅蘇台內外植木中實以土建築城垣城中設倉置庫明嵗青草發生時調集官駝以察罕廋爾所貯錢糧米石軍裝火藥等物陸續運送辦理軍機大臣等議覆應悉如所請奏入上從之辛酉命革達爾濟職以吉當阿為將軍赴推河靖邊大將軍順承親王錫保大學士伯經略鄂爾泰奏言達爾濟身為將軍沿途牧放馬匹並不加意以致損傷及到扎克拜達里克聞賊人敗走並不截殺反疾驅馬匹赴營損傷更甚既而坐視賊遁又不尾追賊人盡去始以一出博追擊之名旋即還營回奏時乃借端巧飾情屬可惡請以達爾濟交部嚴加議處辦理軍機大臣等議如所請奏入得㫖逹爾濟著革職令為護軍交與順承親王凡有苦差效力之處令其前往贖罪行走達爾濟員缺著護軍統領吉當阿前往推河領兵駐劄丙子命加賞克爾森齊老地方交戰獲傷等兵丁上諭辦理軍機大臣等曰聞順承親王賞賫此次效力兵丁將在克爾森齊老地方交戰獲傷及因患病馬疲未至額爾得尼招地方之兵丁俱不准賞給以已經交戰之人不沾賞賫殊未均平著行文順承親王查明給賞以示鼓勵命選呼倫貝爾兵二千赴察罕廋爾軍營上諭辦理軍機大臣等曰據大學士鄂爾泰等奏請將駐劄呼倫貝爾地方索倫巴爾虎兵三千名內調撥二千名前往察罕廋爾軍營其軍營現在所有殘疾兵丁應行裁退等語著照鄂爾泰等所請於呼倫貝爾兵內挑選二千名著黑龍江將軍卓爾海帶領前往軍營卓爾海到軍營後再回任所其料理兵丁起程選派官員管轄應於何日起程之處著卓爾海酌量議奏其餘兵一千名著博第達巴哈統領照管伊等遊牧妻子産業黑龍江將軍印務著奉天將軍那蘇圖馳驛前往署理奉天將軍印務著尚書海夀馳驛前往署理刑部尚書事務著公慶復署理海夀到盛京後那蘇圖再往齊齊哈爾俟卓爾海自軍營回任之日那蘇圖海夀各回任所戊寅命製帳房五千架皮衣皮帽帶各二萬件賞給北路軍營兵丁庚辰命各路軍營有分檔開户從征者許編為另户上諭辦理軍機大臣等曰家選兵丁前往軍營之時朕降恩㫖凱旋之日將伊等妻子俱令出本主之家編為另户但各路軍營從征人內亦有分檔開户之人充當領催披甲者伊等久在軍營辛苦效力甚屬可憫著各路軍營將軍大臣等將效力行走好者以伊等姓名注册俟大兵凱旋之日亦照家選兵丁例編為另户五月壬辰命護軍統領吳禮布回京以散秩大臣塞楞侍讀學士巴特瑪辦理達里剛愛軍營事務乙未預籌進兵事宜大學士伯經略鄂爾泰奏言特斯台西里兩處駐兵原為截殺賊人而設今賊已大創勢不再來其地無庸駐兵明年大兵進阿爾台乘機𠞰賊今年秋應緩行至科卜多擇有水草處駐劄則人畜不致勞苦臨發時人給兩月糧以官駝裝載餘八月糧尚需八萬石應令范育馪陸續挽赴再特斯台錫里既不駐兵應停兩處修堡於扎卜堪察罕鄂羅木更築一堡照應臺站運路大兵進𠞰必當發兵接應應於塔奔托羅海額克阿喇勒墨爾根西納所在各駐兵四千明年大兵進阿爾台即令此兵赴科卜多以備調遣此次進兵關係緊要請令副將軍額駙策凌塔爾岱常德等㑹同辦理其掌管副將軍印信恭候欽命辦理軍機大臣等議覆如所請奏入得㫖靖邊左副將軍印務著額駙策凌掌管靖邊右副將軍印務著塔爾岱掌管副將軍常德著與額駙策凌同行議政大臣永福著授為內大臣與塔爾岱同行己亥命增給兵丁羊價口糧靖邊大將軍順承親王錫保等奏言京城各省官兵喀爾喀兵每月羊價請增定為一兩京城各省及歸化城之土默特兵每月所給口糧增定為一斗八升內地扎薩克兵丁每年增給四月羊隻辦理軍機大臣等議覆如所請奏入上從之乙巳命免西路緑旗兵丁在軍前病故者支借月餉庫銀上諭辦理軍機大臣等曰北路所派四省緑旗官兵有在軍前病故者其本營於未奉部文之前家口所領月餉朕已於上年八月降㫖免其追還今思西路亦有調撥别省之緑旗兵丁其中豈無在軍前病故者若將本營未奉部文之先伊等家口所領月餉按日著追實為可憫著行文各該省若有軍前病故兵丁月餉於未奉部文之前已經支領者免其追還倘有借給庫銀之處著以該省司庫存公銀兩代為補項己酉命正紀成斌失機縱賊負恩誤國之罪先是署寧逺大將軍查郎阿劾奏言巴里坤軍營駐劄重兵廋集及烏克克嶺二處卡倫亂山環繞路徑錯雜最易藏奸是以専令副將紀成斌駐劄廋集總兵張元佐駐劄烏克克嶺乃紀成斌等漫無偵察一任賊人潛藏亂山中忽於廋集卡倫白楊溝等處劫我糧車一輛空車四輛及車戶人等由洮賚庫圖爾庫逃去所有副將紀成斌等抗違玩誤總兵官張元佐等任意疏忽謹據實劾奏辦理軍機大臣等議曰紀成斌負恩縱賊漫視軍務應請革職按律究擬張元佐等請一併交部察議奏入得㫖依議紀成斌著革職交三法司核擬具奏至是刑部等議曰前者紀成斌失機縱賊即應明正典刑䝉恩寬宥留軍前效力乃於分駐廋集卡倫時故違將令聽賊潛匿隘口復不撥兵護送糧車以致被劫核其前後情罪有心僨事玩法負恩紀成斌應斬立決張元佐應降三級調用仍留軍營效力贖罪奏入得㫖紀成斌本由行伍䝉聖祖仁皇帝恩擢至參將之職雍正元年朕因年羮堯保薦用為副將旋即補授總兵官特升提督實為逾格之恩嗣因西陲用兵闕係重大協贊務得其人嶽鍾琪薦其素嫻軍旅可以任用朕亦料其重受國恩自必力圖報效因委以協贊軍務之重寄雍正八年嶽鍾琪進京陛見將大將軍印務令伊護理伊當此大任應益加敬謹悉心籌畫於緊要卡倫嚴密偵探思患豫防庶可上報國恩下稱職守詎伊昏庸懦怯玩愒性成以軍國大事視同膜外致賊人瞷其疏忽乘隙侵擾卡倫損傷將辨戕害士卒掠去馬駝羊隻鎗炮器械口糧無算伊身在大營掌握重兵恐懼驚惶一籌莫展聽賊衆往來如入無人之境西路軍威因此大損且致逆賊資我馬駝器械得於次年侵犯北路是兩路軍營之被賊擾掠者皆紀成斌之貽害也彼時在廷大臣即奏請將紀成斌明正典刑以肅軍紀朕猶豫以自新之路特降諭㫖暫緩治罪俟事竣再定實望其抒誠勉力稍贖前愆乃伊獲罪後在營一載仍無愧悔效力之心朕始降㫖將伊革去提督降為副將凡有差遣令其盡力行走若仍不知改悔必究其前案重處所諭甚明伊若稍有人心自應感恩畏法洗滌肺腸以圖後效乃於雍正十年正月賊犯哈密之時同曹勷領兵堵截遇賊於二堡之西仍復畏縮不前致賊脫尚敢扶同曹勷揑報力戰朦混掩飾今於伊駐防廋集卡倫又敢故違將令漠視軍務以致車輛被劫是紀成斌所至之地在在疏防無不失機養冦既不思從前獲罪之重大亦不念曲加寬宥之深恩冥頑不靈誤公僨事核其前後情罪實無可貸著署大將軍等將紀成斌即於軍營處斬以為將辨失機縱賊負恩誤國者戒餘依議六月癸亥命加恩賞給勇健營兵丁上諭辦理軍機大臣等曰各省挑選之勇健兵丁原冀其黽勉出力各圖上進之路以膺國家厚澤因其中賢愚不等優劣不齊不得不甄别挑汰以示勸懲今挑出赴營各兵既循分守法有奮勇效力之心著給與馬步戰糧俾得內外充裕其自甘起程之時每人借支銀兩並上年十月借過等項俱著賞給免其在月餉內坐扣以示朕格外加恩之至意著勇健營總統周一德等曉諭各兵知悉甲子上諭理藩院曰策旺扎卜係西路喀爾喀汗兼副將軍乃與賊交戰畏懼敗回擾動衆心匆遽移居內地又並不約束屬下人等肆行偷盜官糧牲畜騷擾貿易人等甚玷國家養育之恩理應即行正法但念伊祖父原係喀爾喀內之汗纍代敬順朕不忍正法將策旺扎卜從寬免死監禁癸酉命副都統莫爾渾來京以軍前內大臣參贊顧魯統轄赴巴里坤察哈爾兵丁丁丑命兵部尚書性桂內閣學士雙喜赴北路軍營與原任工部侍郎巴泰協理軍需事務秋七月辛巳命革杭奕祿職上諭內閣曰禮部侍郎杭奕祿係朕特差稽查沿邊營伍之大臣理宜體恤辨兵潔已奉公以副委任乃聞其沿途驕奢放縱擾纍兵民甚屬溺職著革職命調齊齊哈爾副都統王常為山西右衛左翼副都統以副都統職銜布爾沙為齊齊哈爾副都統並留軍營乙酉命額駙策凌辦理進兵事務以貝子阿努里署喀爾喀中路副將軍印丙戌命羅卜藏襲封扎薩克多羅杜楞郡王上諭理藩院曰翁牛特郡王鄂齊爾諸子內貝勒羅卜藏在軍前甚屬效力著承襲扎薩克多羅杜楞郡王料理伊父喪事畢仍在軍前辦事其原襲之貝子著伊兄額爾德尼承襲暫署理扎薩克印務戊子命多羅平郡王福彭為定邊大將軍敕諭曰奉天伐罪治世之常經鋤暴除凶安邊之逺略逆賊噶爾丹策零狂悖冥頑父子濟惡妄欲侵陵我屬國窺伺我邊陲包藏逆心狡焉思逞朕以此賊不除終為衆䝉古之巨患是以命將興師聲罪致討乃數年以來錫保調度無方制防鮮術因循退縮坐失機宜為將士之所輕致軍心之不振深負任使有忝元戎上年賊兵深入我境副將軍和碩親王額駙策凌內大臣塔爾岱督率辨兵奮勇追擊大殱賊衆丕振軍聲當此乘機決勝之時必須另簡忠誠任事之親藩始克奏膚功而寧邊塞是用命爾為定邊大將軍統領滿洲䝉古緑旗大兵一切事宜爾與副將軍和碩親王額駙策凌副將軍塔爾岱常德參贊內大臣永福護軍統領阿岱內大臣伯欽拜公博爾屯等酌定方略公同計議而行勿謂已能而不納衆論勿當事㑹而猶復遲回勝算期於萬全神機定於方寸整衆須如山嶽之重撻伐以奮雷霆之威鼓勵戎行申明紀律逺偵密探先事預防各路大兵及䝉古兵丁聽爾調遣凡遇有警即遣發官兵應援撲𠞰賊中有情急來歸者加意撫恤其不抗拒官兵者毋加殺戮凡我將辨官員兵丁等其或有臨戰退避擾亂軍機者爾㑹同商議文官四品以下武官三品以下即以軍法示衆其所犯過小者亦㑹同商議即行處治毋泯沒行間之勞績毋寬縱違法之辨兵軍紀須極嚴明賞罰悉期公當相時度勢務合事機有應知㑹西路寧逺大將軍者即行知㑹一同辦理爾其殫乃心力敷厥謀猷早建功勳永綏邊徼以副朕蕩冦除殘息事寧人之至意欽哉故敕庚寅命黜順承親王錫保爵降丹津多羅濟為郡王策卜登為貝勒均留軍效力贖罪上諭辦理軍機大臣等曰前因大將軍傅爾丹輕進失利順承親王錫保在察罕廋爾調撥兵丁防範科卜多俱屬妥協是以朕格外加恩晉封親王授為大將軍及去年賊兵來犯錫保竟不預備奏稱撥兵一萬令赴烏遜珠勒而所到之兵僅有三千又將領兵之將軍傅爾丹留於大營致賊直越克爾森齊老始遇額駙策凌將軍塔爾岱等奮勇截殺一面差人呈報令其速發援兵而錫保不即發兵俟丹津多爾濟到後始遣赴援丹津多爾濟行未十里即劄營住歇是時額駙策凌等與賊拒戰二日知援兵不至始各收兵回營坐失機㑹錫保自為大將軍以來每聞賊至輒驚惶無措兵丁時撤時撥二年之內馬匹損傷數萬闔營無不怨恨夫身膺大將軍之任賊來不能邀擊及深入之後又令脫此皆調遣失宜怯懦畏葸之所致也深負朕簡用之意理宜從重治罪姑念其前嵗在科卜多尚能籌畫整備著暫革去大將軍親王其順承郡王查應襲之人承襲熙良世子之爵亦著革去現命多羅平郡王為定邊大將軍俟到軍營時著錫保聽平郡王指示效力贖罪如仍前玩忽經平郡王參奏定行從重治罪丹津多爾濟乃喀爾喀一微末台吉䝉聖祖仁皇帝施恩教育承襲伊父扎薩克貝勒朕御極之初封為郡王嗣因採買馬駝效力晉封親王屢加恩眷去年額爾得尼招大敗賊人之時伊揑奏冒功朕賞以墨爾根巴魯圖之號賜與黃帶子封其子多爾濟塞卜騰為世子乃於克爾森齊老領兵救援時故意遲延行至十里即安營住歇旋撒兵回營及額爾得尼招接戰之時額駙策凌領右翼官兵奮勇衝擊已將賊兵殱殺殆盡而丹津多爾濟坐擁左翼官兵觀望不前次日衆人皆欲急行追擊伊又支吾逗留至賊由杭愛山後逃遁伊並不尾追轉由杭愛山之南繞道遲延致誤大事且數年以來所辦馬駝甚屬不堪理應將丹津多爾濟從重治罪但念伊從前採買馬匹曽經效力暫行寬免著削去巴圖魯之號將伊子之世子革退撒回黃帶子革去親王授為郡王仍留喀爾喀副將軍之任辦理未完馬匹之事協助大將軍平郡王料理䝉古事務儻不實心效力仍蹈前轍定行從重治罪策卜登原係扎薩克公先因追擒脫逃之烏梁海羅卜藏錫喇卜等著有勞績格外加恩晉封貝勒嗣因揑奏蘇克阿勒達呼並額爾得尼招等處擊賊功績朕賞以巴圖魯之號賜與黃帶子晉封郡王今實情畢露方知伊帶兵一千遇百餘賊冦即恐懼不前故張聲勢俾賊逺遁又同塔爾岱領兵追賊誑言迷路縱賊逺揚並無為國效力之實心著革去郡王仍授為貝勒撒回黃帶子其巴圖魯之號亦著革去令往科卜多軍前效力贖罪儻仍前退縮瞻顧定行從重治罪丁未議撥兵防守邊外赤金等處署陕西總督劉於義奏言邊外赤金等處牧放馬駝宜嚴防範請於赤金之南蘇爾河口常瑪爾河口等處各撥兵駐劄赤金靖逆之北湃帶湖哨防營布魯墩等處各設墩臺撥兵巡察再布魯墩哨防營湃帶湖適中之地撥兵三百駐劄防守辦理軍機大臣等議覆應如所請奏入上從之八月丙辰上諭辦理軍機大臣等曰據署寧逺大將軍查郎阿等奏稱庫爾默圖山地方有逆賊五十餘人來侵被我官兵奮力攻擊斬殺二十餘人餘俱生擒未脫一騎等語此次經理調撥甚屬可嘉所有效力人員俟查郎阿查明等次具奏到日再降諭㫖數年以來因西路將軍等辦理疏忽是以逆賊敢於玩視今賊兵經此番損傷必懷畏懼或於今秋即整兵侵犯西路或於冬天侵犯北路俱未可知著傳諭查郎阿等令其詳悉籌畫辦理戊辰命寬給內徙回民應扣口糧總管額敏和卓等照官員例支給粳米上諭辦理軍機大臣等曰據署陕西總督劉於義等奏稱吐魯番等處回民已移至安西男婦大小共八千一十三口朕查從前回民自吐魯番移至塔勒納沁時共九千二百七十三口今其中竟有病故例應扣除口糧但伊等甫到安西寧使之食用寬裕著仍照原數支給以示朕格外之恩至總管額敏和卓及伊親丁著照官員例支給粳米以示優異庚午命以駐劄涼州河南緑旗兵移駐肅州署陕西總督劉於義奏言肅州鎮兵除出征撥防外現在單弱今涼州現有河南滿洲兵五百直𨽻河南緑旗兵一千駐劄請以河南兵五百於十月初移駐肅州餘兵仍留涼州以備調遣辦理軍機大臣等議覆應如所請奏入上從之丙子授署正白旗䝉古副都統宗室色貝為正黃旗滿洲副都統調正紅旗䝉古副都統富達禮為鑲紅旗滿洲副都統均仍留軍營平定準噶爾方略前編卷三十四
