  text: 欽定四庫全書平定準噶爾方略正編卷之十二
  hash: sha256:8ef1ecb1b36e35d207cbdaf0a3942a1085c86104758aed838cac29edd849895f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_066-1a, image: WYG0358/WYG0358-0185a.png}
body:
  text: 乾隆二十年夏五月甲申命賞賚投誠宰桑烏魯木並擒獲賊使之庫本上諭軍機大臣曰班第奏宰桑烏魯木偕伊叔庫綳帶領四百餘户來降又宰桑庫本將達瓦齊差往和通額默根使人巴朗察漢擒拏解送甚屬可嘉達瓦齊向衆鄂拓克派兵令台吉諾爾布統領在特里木哈達防守已遣侍衛鼐庫納等傳旨招降看來大兵所至勢如破竹阿睦爾撒納等辦理甚合機宜現在達瓦齊計窮力竭量必早已就擒諾爾布僅帶兵數百名在特里木哈達無關緊要來降固可即不來降亦更無可以逃匿之處矣所有率屬投誠之宰桑烏魯木並拏獲賊使之宰桑庫本著加恩授為散秩大臣加賜孔雀翎并賞衣帽荷包由驛馳遞交與侍衛瑚費圖宣旨賞給其來降之台吉宰桑等先將為首之人酌量賞賜其餘未經查明伊等品級職分者俟將來熱河入覲後當分别等差大加恩賞著班第阿睦爾撒納薩喇爾等即行曉諭知之定北將軍班第等疏奏擒獲巴朗察漢等訊問達瓦齊情形班第等奏言新降台吉和通額默根留住遊牧之宰桑庫本將達瓦齊所遣阿勒巴齊巴朗察漢擒送前來訊據巴朗察漢供達瓦齊遣我至和通額默根處調兵囑云噶爾藏多爾濟差人告知現在薩喇爾領兵七萬由巴里坤前來和通額默根毋庸往哈薩克進兵即在博羅塔拉險要地方屯兵防守沿河下遊安放卡倫偵探信息為進戰退守之計其薩喇爾所遣之人未至伊犁達瓦齊已移住特克斯是以未曾遇見伊犁舊遊牧人等俱各四散所存無幾前此達瓦齊並未調兵今始傳檄各處令我諭宰桑丹津瑪瑪什蘇拉濟爾噶爾於伊等三鄂拓克派兵防守闥勒竒察罕烏蘇摩垓圖嶺等處其丹津遊牧處所有牲畜去年俱被哈薩克虜掠現在兵力無多不過暫派百餘人在闥勒竒之東察罕布木地方安設卡倫探信瞭望至噶爾藏多爾濟遣往之人並非伊屬下頭目一係噶勒雜特哈薩克錫喇之人一係布魯古特尼瑪之人特係達瓦齊飾言噶爾藏多爾濟與伊一心彼此密通信息聊以安慰衆人之意臣等伏思巴朗察漢乃達瓦齊遣赴和通額默根處調兵之人其言不無狡飾嚴刑究詰矢口不移詳閲達瓦齊諭和通額默根之書亦與巴朗察漢所供無異至噶爾藏多爾濟現隨副將軍薩喇爾領兵同進達瓦齊揚言密遣通信明係設計離間臣等現將巴朗察漢嚴行看守再據宰桑索薩賚擒獲達瓦齊所遣調兵之鄂勒錐圖前來臣等細加詰訊據鄂勒錐圖供達瓦齊於三月十三日自伊犁遣我向和通額默根等各鄂拓克派出征哈薩克之兵令我監看起程有巴爾達穆特鄂拓克波斯宰桑等各帶兵數百名陸續起程此等兵丁俱係前往哈薩克並非豫為迎距大兵之用我因在彼守候未到之兵適值們都哈什哈信到遂為索薩賚鄂拓克之人擒獲再達瓦齊惟知終日飲酒諸事不理宰桑等亦不和睦衆心離散牲畜疲瘦即有迎距之心實已進退無路難以自存臣等隨將鄂勒錐圖一併嚴行看守奏入報聞丙戌諭定北將軍班第等平定伊犁籌辦駐兵事宜上諭軍機大臣曰據薩喇爾等奏領兵已過博羅布爾噶蘇台至登努勒台地方達瓦齊所屬並無人在彼防守其伊犁附近之台吉宰桑喇嘛等俱已遣人前往招降所辦機宜悉協不勝欣慰至所奏功成之後請停止伊犁駐兵一事薩喇爾等蓋因凖噶爾近年以來生計窮蹙若多駐官兵恐不無勞費起見耳朕前此諭令駐兵原非欲令永遠戍守以現辦四衛喇特旗分佐領并五集賽各鄂拓克人等及哈薩克布魯特邊界一切事宜若不令大臣駐劄無所統率遇有應行查辦之事僅交四衛喇特各部落汗等辦理究屬未協且既駐大臣不能不酌量駐兵數百名或一二百名以備差遣至兵丁所需口糧或收取達瓦齊輜重什物或將諸鄂拓克應納貢賦徵收支給俱已足資應用著班第阿睦爾撒納薩喇爾等至伊犁時會同妥議具奏如量度情形并一二百名之兵均可無庸籌辦則但令大臣官員駐劄亦無不可不必拘泥朕前旨丁亥命竒塔承襲都爾伯特班珠爾扎薩克貝子上諭軍機大臣曰班珠爾自同策凌等來降時朕即加恩封為貝子嗣因伊身故無子策凌等議將伊近族額布根之弟竒塔為嗣著即準其承襲扎薩克貝子所有班珠爾屬下人等即令竒塔管理戊子命賞賚喇嘛索諾木班珠爾上諭軍機大臣曰據班第等奏西北兩路會兵於達瓦齊不及設備之時當徑渡伊犁河協力擒拏阿睦爾撒納薩喇爾等辦理深為允協達瓦齊若能去逆效順朕自當另有加恩之處今既潛身遠竄一經擒獲即當獻俘京師以彰國法且宰桑莽鼐久欲歸降前往特克斯時曾與伊得木齊先行商議今達瓦齊正往伊處或即為莽鼐擒獲亦未可定朕當尅期佇望伊等捷音也再喇嘛索諾木班珠爾已彼達瓦齊擒獲自行脫出又會人救出西路被擒哨探人等深可嘉豫但喇嘛不便給與官職著班第阿睦爾撒納即行從優賞賚俟阿睦爾撒納赴熱河時將伊帶領入覲再行加恩諭將軍班第等籌辦編查新降人等旗分佐領事宜上諭軍機大臣曰據薩喇爾等奏所有新降人等編設旗分佐領若按户逐一清查恐伊等未免驚疑現議封四衛喇特為汗不若令其各將本部落台吉屬下人等户口逐一開報即交與伊等承辦薩喇爾等所奏甚是辦理一切事務當持大體况撫綏新降人等尤宜善於部署無事張皇著傳諭班第阿睦爾撒納薩喇爾等至伊犁時所有清查户口編設旗分佐領之處如係四衛喇特所屬台吉屬下人等即交四衛喇特大頭目等辦理其達瓦齊所屬應行另辦之衆鄂拓克人及回人等亦著交各該管宰桑頭目辦理苐令得其綱領大略即其中稍有遺漏亦無甚關係勿使衆人妄生猜度庶為允協命授新降宰桑塔爾巴等為散秩大臣得木齊烏巴什等為侍衛班第等奏言四月二十六日有庫圖齊訥爾之得木齊曼集烏巴什訥默里濟爾噶爾等四人來降臣等詢據得木齊烏巴什告稱我庫圖齊訥爾鄂拓克有五宰桑分管我等宰桑名克什木共有七百餘户俱在尼楚滾地方居住宰桑克什木因達瓦齊派遣帶兵六十名往距哈薩克我見大兵已抵尼楚滾即向曼集訥默里濟爾噶爾錫喇巴圖爾和通瑪瑪什等六人計議同來投降達瓦齊前此並未調兵聞大兵將到始派兵防守博羅布爾噶蘇隘口雖經行文我等亦並未遵照派防又詢得善披領集賽之得木齊蘇克都爾格齊哈什哈等告稱我等鄂拓克係喇嘛達爾扎時新立共有六百餘户半係達什達瓦所屬半係羅卜藏策凌所屬我等今有四百餘户俱在齊老海居住我宰桑莽鼐帶領二百餘户前往特克斯曾告知我等大兵不日將到我族弟阿巴噶斯已經投降準噶爾人等自必將我虜掠今暫居特克斯爾等俟大兵到時一靣投降一靣與我寄信隨即來投又詢得古里特鄂拓克之得木齊和通喀喇博羅莽鼐伊什特克咱瑪博勒等告稱我等屬人二百餘户原係羅卜藏策凌屬下達瓦齊將我等入於古里特鄂拓克達瓦齊聞大兵前來遷往特克斯我等即移居於此情願投降又臣等至尼楚滾地方據阿勒闥沁鄂拓克宰桑塔爾巴帶伊二子及五得木齊投誠前來臣等詢據塔爾巴告稱我鄂拓克得木齊十人户口七百有餘現在濟爾哈朗河居住今俱願投誠天朝臣等即恭奉恩旨一一宣示應遣回者諭令回原遊牧處居住應派往效力者即帶領行走奏入上諭軍機大臣曰據班第等奏阿勒闥沁鄂拓克宰桑塔爾巴帶領伊二子及得木齊五員前來投誠塔爾巴係達瓦齊所派出兵之人聞大兵已至冀受朕恩即行投誠甚屬可嘉著施恩授為散秩大臣庫圖齊訥爾宰桑克什木善披領集賽宰桑莽鼐一聞信息旋即來降亦著授為散秩大臣至庫圖齊納爾之得木齊烏巴什為衆人倡率投降非其餘得木齊可比著授為二等侍衛其餘得木齊曼集訥墨里濟爾噶爾錫喇巴圖爾和通瑪瑪什善披領集賽得木齊蘇克都爾格齊哈什哈古里特得木齊和通喀喇博羅莽鼐伊什特克咱瑪博勒等俱著授為三等侍衛即賞給頂翎再道路遼遠賞賚什物不能多齎俟大功告成時再遣人前往頒賜仍俟伊等至熱河入覲時另豫施恩著將此曉諭伊等知之己丑諭定北將軍班第籌辦接濟兵丁口糧事宜上諭軍機大臣曰兩路會兵追擒達瓦齊自可迅奏膚功而達瓦齊現往特克斯若更逺竄又需數日之期官兵所帶口糧大概俱已支給其中原可通融辦理但從前永常不識事體數請運米軍營兵丁均所稔聞日久未見支領不無懸望希冀情事現在正係軍行緊要之時不得不為過慮班第身任將軍西北兩路事同一體伊等辦給北路兵丁口糧甚屬妥協可以毋庸籌及其西路兵丁倘實在必需接濟或由備往茶葉銀兩內酌换口糧或由北路帶往口糧牲畜內通融辦給班第務須悉心籌辦不得稍分彼此若可毋庸接濟或薩喇爾已自行辦理班第即不必代為籌辦將此傳諭伊等知之命定邊右副將軍薩喇爾等查明新降人等請旨加恩上諭軍機大臣曰據薩喇爾等將陸續投降之台吉宰桑得木齊户口數目具奏呼爾璊台吉烏勒木濟等傾心歸順甚屬可嘉應加恩賞給官職因道逺不能詳知伊等品級著薩喇爾逐一查明如有應行賞給散秩大臣等官者一面奏聞一面將朕加恩之處先行曉諭其頂翎即由京發往仍俟大兵凱旋時再行酌量賞賚再此次投降人等內達什達瓦屬下之人甚多達什達瓦有無子嗣著薩喇爾一併查明奏聞定邊右副將軍薩喇爾等疏奏西北兩路會兵同渡伊犁日期薩喇爾等奏言臣等於四月二十七日領兵至登努勒台地方班第阿睦爾撒納等於二十八日領兵至尼楚滾地方兩路大兵駐劄相距二十里臣等商定一同進發北路兵由伊犁河之固勒扎渡口越推墨爾里克嶺前進西路兵由喀塔克渡口越扣們嶺前進如此既足以張我軍威而彼此聲息相通應援甚便由此直扺達瓦齊所居格登地方議定即於四月三十日起程奏入報聞辛卯命定北將軍班第等將羅卜藏丹津巴朗孟克特穆爾等解京獻俘上諭軍機大臣曰據班第奏擒獲羅卜藏丹津派侍衛台布等解送來京並據達什敦多卜轉報額伯津宰桑所屬得木齊諾爾布扎卜巴顔轄將逃人巴朗擒獲同從前擒獲之孟克特穆爾一併派員解送前來羅卜藏丹津負恩悖叛逃往準噶爾偷生三十餘年今兩路大兵直扺伊犁無路奔逃並將投降潛逃之巴朗一併擒獲實足以彰國憲而快人心著班第等令解送之侍衛等沿途悉心防範仍派乾清門侍衛前往張家口俟羅卜藏丹津等一到即速解京候朕擇日獻俘明正典刑其擒獲巴朗之諾爾布扎卜巴顔轄奮勉可嘉應從重加恩但前此投降人內並未見有額伯津宰桑及巴顔轄之名著班第查明如係新來投降者即照投降宰桑之例宣旨授為散秩大臣並著賞給世襲雲騎尉銀一百兩以示奬勵再副都統達什敦多卜有無協力擒拏巴朗班第等亦即查明奏聞候朕酌量加恩命寬免策凌孟克之孫巴布勒罪上諭軍機大臣曰前同巴朗潛逃策凌孟克之孫巴布勒等現已一併擒獲上年貝勒策凌孟克及伊子巴朗冀受朕恩前來歸順乃策凌孟克赴熱河入覲時巴朗乘間脫逃不獨負朕厚恩抑且悖逆其父情罪甚重國法難寬朕己降旨將伊解送來京治罪但念策凌孟克誠心感戴在軍前奮勉行走伊孫巴布勒或為巴朗所逼或與巴朗同謀俱可置之不問總因加恩策凌孟克特豫寬宥著薩喇爾將此傳諭貝勒策凌孟克知之其巴布勒至烏里雅蘇台時即著莫爾渾等遣人送至策凌孟克遊牧處居住壬辰以大兵平定伊犁捷奏宣諭王大臣等定邊左副將軍阿睦爾撒納等奏言臣等帶兵自入準噶爾邊境以來逺近皆望風歸附逮至伊犁沿途厄魯特回子喇嘛等有牽羊擕酒迎叩馬前者有率其妻子額手道旁者臣等恭奉聖主恩旨宣布曉諭所在人衆或稱準噶爾地方數十年來兵革相尋羣遭塗炭達瓦齊自為台吉荼毒所屬毁殘黃教衆人不但無以為生將立見骨月離散今大皇帝撫育羣生遣兵拯救我等得以瞻仰天日出於水火不勝歡忭臣等見道旁居人並未遷徙耕牧如常且老幼婦女毫無驚懼前後隨行踴躍鼓舞伏思皇上籌畫萬全一一洞鑒於事幾之先臣等仰承指授得以迅速奏功實千古未有之事現今即渡伊犁河北務擒達瓦齊俘獻奏入上諭王大臣等曰定邊左副將軍阿睦爾撒納等奏報大兵直抵伊犁準噶爾部衆人等載道歡迎現已撫定賊巢達瓦齊逋竄遊魂可計日就縛等語準噶爾一事實我皇祖聖祖仁皇帝皇考世宗憲皇帝籌辦未竟之緒即朕御極以來亦屢準其請安貿易初未有興師致討之成心邇年因其篡奪相尋人心瓦解諸部台吉策凌策凌烏巴什及阿睦爾撒納等叩關內附後先踵至其人皆熟悉彼地情形洞曉軍務朕於熱河召見時伊等皆深知感激朕恩以願效前驅為請是其勢有可乘機不可失因籌及兩路興師之舉而人心狃於久安在廷諸臣惟大學士傅恆與朕協心贊畫斷在必行餘無不意存畏葸今日諸王大臣具在試各自揣本心方創議伊始確然信為必當從事者誰乎甚至如策楞舒赫德身肩其任而懦怯乖張幾至僨事經朕降旨治罪而無識之徒未必不曲為致惜由今日觀之則此二人當治罪乎否乎夫準噶爾一日不定則其部曲一日不安來歸之人將日益衆非得其地何以處之蓋揆情度勢今昔逈殊在皇祖皇考時適當其聲勢方張籓籬完固彼得恃遠逋誅未及犁庭掃穴設處今日事機之會有不乘時決策迅奏膚功者乎即朕籌辦之初亦未敢遽信大功計日可就是以禡牙推轂之典概未舉行設或時會稍有濡遲朕亦惟有自為引咎耳然究不肯以畏難之見徇浮論而失機宜且近日滿洲陋習假持重以文其退縮在朕前並不能據實陳奏一惟退有後言此風實可寒心現在師行未及半載初無血刃遺鏃之勞軍資諸費較前甫及十之一二即喀爾喀部落亦並未以大兵經過稍有滋纍而所至耕牧不移壺漿夾路為亘古所未有試問前此之鰓鰓過計謂為有損無益必不可行者今果有所損乎果當行乎否乎皇祖平定朔漠詩中即有力排衆議之語足見我朝家法獨運乾剛主持振作羣臣惟當竭心協志共思奮發有為若一任因循不知其委靡頽弊流入何等矣故今雖值此捷奏頻仍遐荒底定而朕心初不以為喜惟有感戴上蒼福佑列祖貽庥與廷臣益加警朂而已其身歷戎行諸臣調度合宜克成偉績應加懋賞用示酬庸阿睦爾撒納賞親王雙俸所屬護衛官員增添一倍并加賞豹尾鎗四桿其子著加恩封為世子班第薩喇爾俱著晉封一等公并賞四團龍補服金黃縧朝珠瑪木特著晉封三等公仍賞二團龍補服雙眼孔雀翎俱準其常時服帶以示優奬色布騰巴爾珠爾著賞親王雙俸所屬護衛官員增添一倍扎拉豐阿著晉封郡王策布登扎布普爾普俱著晉封貝勒策凌著賞親王雙俸所屬護衛官員增添一倍策凌烏巴什班珠爾訥默庫俱著晉封親王策凌孟克著晉封郡王在事大臣官員兵丁著該將軍等分别等第造册送部議敘參贊大臣達爾黨阿阿蘭泰等一并交部議敘兩路管理臺站官員亦著查明議敘大學士忠勇公傅恆著加恩再授一等公爵以為力矯積習為國任事者勸軍機大臣等并著交部議敘所有一切應行典禮大學士會同各該衙門詳察具議以聞尋議大功告成所有告祭天地太廟社稷陵寢禮儀現在遵奉諭旨敬謹辦理其凱旋筵宴賞賚等事恭奉諭旨駐蹕熱河舉行所有應行典禮敬稽舊典請諏吉加上皇太后徽號前一日上詣慈寧宫恭進奏書屆期皇上率諸王貝勒文武大臣詣慈寧宫加上皇太后徽號恭進册寶宣表行慶賀禮皇上升太和殿諸王大臣官員進表行慶賀禮頒詔天下所有慶賀及凱旋應用樂章交樂部大臣撰擬進呈恭請御製碑文勒石太學其大兵所過地方有應行勒石之處及伊犁地方應建豐碑並請御製碑銘敬謹鐫石以昭盛典並開館纂輯平定準噶爾方略昭示奕祀奏入上從之命賞賚安設臺站各蒙古厄魯特人衆上諭軍機大臣曰安設臺站之蒙古等自進兵以來行走黽勉毫無貽誤深堪嘉豫今大功已成應加恩賞賚其厄魯特等俱係新降之人感戴朕恩實心奮勉尤屬可嘉著加倍賞賚班第等即行分别查辦諭參贊大臣鄂容安上諭軍機大臣曰準噶爾平定兩路將軍大臣等朕俱已加恩鄂容安在參贊大臣任內奮勉行走亦應加恩但伊從前有準噶爾不宜辦理之議伊父鄂爾泰與大逆胡中藻師生交結伊兄鄂昌又與胡中藻附和黨同鄂容安明知其事不為陳奏有負朕恩伊若不前往軍營原欲從重治罪今因此次行走免其治罪即係朕恩著將此傳諭鄂容安知之定邊左副將軍阿睦爾撒納等疏奏宰桑博什等率衆來降阿睦爾撒納等奏言前遣侍衛鼐庫納協理台吉沙克都爾扎卜等前往招降台吉諾爾布五月初一日沙克都爾扎卜回稱領兵至津集里克伯斯伯勒齊爾二處地方訪台吉諾爾布信息知伊尚在巴什干沙爾千之伯勒齊爾地方此處止有宰桑博什等率兵八百四十七名往拒哈薩克隨將聖主恩旨曉諭博什等舉手加額願率所帶兵丁歸降又據哨探兵隊內貝子策布登扎布普爾普等文稱四月二十八日至伊犁有佛寺喇嘛并回人等二千餘户看船人十户貿易宰桑博爾博等四十五戶來降臣等於五月初一日抵伊犁河投降人衆陸續前來據克爾努特台吉敦多布葉克明安台吉綽瑚鼐錫喇和通塔爾巴哈沁之輝特台吉唐古忒等俱來歸誠各請派兵隨營效力復據前往哈薩克台吉額林沁屬下宰桑鄂勒錐告稱台吉額林沁前往哈薩克後我等百餘户為達瓦齊擒拏分散今願派出五十人步行效力又喀什噶爾賽音伊蘇卜伯克告稱我原係喀什噶爾宰桑為達瓦齊革退留住伊犁今願派兵二十名效力事定之日祈遣使同往原遊牧處將舊屬二萬餘户擕帶來降又伊犁貿易回人阿卜達莫米木十三宰桑等告稱我等共二千餘户自伊犁河南哈什至伊犁河北察罕烏蘇等處地方居住俱係舊台吉噶爾丹策零屬人因達瓦齊苛虐無厭今俱窮困情願派兵三百名協力同擒達瓦齊又鄂斯莫木伯克告稱我等鄂拓克共有七得秦人丁五百餘户聞大兵前來即欲率屬來降因為達瓦齊分遣未能一時齊集今俱願歸降臣等恭奉皇上恩旨詳悉開示并將情願出兵效力之人帶往軍前餘俱諭令耕種貿易各安生理奏入得旨下部知之癸巳上諭大學士曰準噶爾用兵一事上年朕詣盛京恭謁祖陵時俱已虔誠默禱今仰邀列祖福佑迅奏膚功荒服敉寧慶洽中外實我大清萬年宗社無疆之庥理應告祭三陵躬伸謝悃惟是東巡尚未逾歲不欲以清塵除道重煩我豳岐父老永陵著派皇子永璋福陵著派皇子永琪昭陵著派皇子永珹代行告祭今秋諸皇子隨侍熱河即就近取道前往俾其周歷遼瀋仰思祖宗肇興之烈禮成後并可於奉天行圍較獵用習武事而昭家法所有應行豫備事宜著該部行文各該衙門照例豫備又諭曰平定準噶爾捷聞此皆仰蒙皇祖皇考謨烈顯承福貽宗社故得膚功迅奏荒服敉寧理應敬詣橋山躬申告祭因今春甫經展謁而目下青苗彌望農事方殷車駕所經恐滋踐踏然朕仰慰先靈之意實切於衷告廟之典宜躬詣行禮孝陵著遣皇子永璋景陵著遣皇子永珹泰陵著遣皇子永琪前往代行告祭所有應行豫備事宜著各該衙門速行豫備命優敘大學士忠勇公傅恆上諭大學士曰大學士公傅恆以加賞公爵具摺奏辭情詞懇摯及召見之際又復面陳再四至於泣下並稱金川之役叨封公爵已為過分等語觀其不自滿假倍深兢惕信出至誠實將來可以永承恩遇之道朕心轉為嘉慰應俯允所請用成厥志所有平定金川及準噶爾奏捷兩次功績均著併於現封忠勇公敕內以昭茂典仍於軍機大臣內交該部從優加等議敘命加班第薩喇爾瑪木特公爵名號上諭大學士曰班第著封為誠勇公薩喇爾著封為超勇公瑪木特著封為信勇公班第薩喇爾並著賞戴寶石帽頂以示優奬命協辦大學士達爾黨阿馳驛來京上諭大學士曰達爾黨阿帶領索倫兵在哨探兵隊內共奏膚功甚屬奮勉今大兵已平定伊犁伊亦無應辦之事阿克敦現患目疾不能行走達爾黨阿著協辦大學士即馳驛來京供職命定北將軍班第等曉諭哈薩克事宜上諭軍機大臣曰大兵平定伊犁所有應行入覲人等著班第阿睦爾撒納薩喇爾即將派定人數若干何時可到之處一面奏聞一面將應辦事宜交兆惠等妥協辦理再哈薩克處應遵照從前所降諭旨遣人前往其曉諭哈薩克阿布賚之旨應告以哈薩克先與準噶爾互相搆釁當天朝進兵之時正達瓦齊與爾等交爭因大兵前進達瓦齊始將虜掠爾等之兵停止今準噶爾地方已經平定俱為臣僕凡前此戕害爾等之事自可永行禁止爾等如願歸誠必普加恩澤若欲自為部落亦祗許靜守邊界毋得侵擾倘仍照前虜掠當發大兵征討將此明白曉諭視伊等情形若何即行奏聞再策妄阿喇布坦噶爾丹策零俱係準噶爾台吉伊等現在如有子孫朕尚欲為加恩如竟無嗣續深屬可憫著班第等查明策妄阿喇布坦噶爾丹策零墳塋照蒙古禮致祭一次仍由該鄂拓克人等內酌量派人永遠看守並嵗行祭掃之禮將此通行曉諭準噶爾人等知之命撤回噶斯駐防兵丁上諭軍機大臣曰從前青海郡王索諾木丹津奏請帶領遊牧豫備兵丁前往噶斯駐劄防範朕已降旨允行今大兵已至伊犁撫定準噶爾全部叛賊羅卜藏丹津亦已擒獲噶斯地方毋庸駐兵防守著傅諭副都統德爾素傅旨曉諭索諾木丹津將兵丁即行撤回并將準噶爾平定之處通行曉諭衆扎薩克知之定北將軍班第等疏奏籌辦運送軍糧事宜班第等奏言據駐劄烏里雅蘇台大臣莫爾渾等文稱大兵成功凱旋軍糧在所必需擬將軍前餘剩駝隻內酌量揀撥數百隻馱載米石以資接濟或令在卡倫等候或竟運往軍營咨商臣等臣與阿睦爾撒納等酌議從前睦續所送馬馱牛羊等項運至屯田處交與親王成衮扎布以備支用殊屬妥協至米石一項路逺馱運較難不若多運茶封並著帶銀數萬兩更為有益現在移飭遵行奏入報聞平定準噶爾方略正編卷十二
