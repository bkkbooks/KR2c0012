  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_096-1a, image: WYG0358/WYG0358-0690c.png}
body:
  text: 乾隆二十二年秋七月丙辰定邊右副将軍兆恵等疏奏哈薩克協擒阿睦爾撒納情形及擒獻逆黨達什策凌等兆恵等奏言臣等因察訪逆賊阿睦爾撒納踪跡遣順德訥帯兵徃古爾班察爾直至俄羅斯之境六月二十四日據順德訥報稱六月十三日至鄂遜綽確特山遇哈薩克阿布賚之弟阿布勒比斯稱係奉富叅贊之令擒拏阿睦爾撒納隨據哈薩克遣人告知阿布賚亦在此間因酌帶十數人前徃相見阿布賚云我已投順中國大皇帝願為臣僕因去年抗拒大兵昨又誤行對敵是以畏懼藏匿總為阿睦爾撒納所累今欲擒獻阿賊黨羽以贖前罪等語我告阿布賚云大皇帝三路發兵務擒阿賊因爾哈薩克投順暫将額爾齊斯一路停止進兵若阿逆不在俄羅斯烏梁海即入爾境昨又據拏獲之厄魯特等供逆黨額布濟即達什策凌烏勒木濟齊巴罕等於我副都統鄂博什兵到前一日俱各分散我等既屬一家當同徃擒拏阿布賚云伊等若入我界即當擒獻再我等哈薩克有三部落我係鄂爾圖玉斯頭目竒齊玉斯烏拉玉斯皆我族兄為長已遣人至塔什罕令其一體投順亦必遣人入貢等語隨以馬二百餘匹易换官兵衣物銀兩於十六日辭歸是日過鄂遜綽確特山至塔爾滚河見有賊行踪跡次日尋至俄羅斯境之鏗格爾圖喇遣人告知十八日俄羅斯喀丕坦等至額爾齊斯河濵相見免冠叩請大皇帝安因告以我将軍大臣為逆賊阿睦爾撒納逃竄派兵分路查拏看賊衆大概逃入爾境應遵彼此不納逃人之議擒拏送出喀丕坦等云阿睦爾撒納前遣使來已拏送我察罕汗其本身及屬人並未曽來我俄羅斯法度頗嚴豈敢背約藏匿等語隨告以阿逆等即未到來自應遵照前約傳知爾等各卡倫俟逆賊來時擒拏觧送并先将我等奉差索取之處行知薩納特衙門仍将現在並無阿逆給文為據以便我等回報将軍大臣轉奏徃復再三喀丕坦等因給與俄羅斯印文并行文邊界遂於二十日帯兵回程路經烏梁海舊地亦俱捉生詢問等因臣等又於二十七日據哈薩克阿布賚遣使觧送達什策凌齊巴罕前至軍營告稱阿布賚等於十九日至阿爾察圖適阿睦爾撒納率二十人來投告以明早相見因先散其馬匹牲隻阿賊驚覺抛棄衣物同數人逃去僅将達什策凌齊巴罕拏獲送來又遣人到霍集伯爾根處今将烏勒木濟拏獲如阿賊亦在彼處自必一併擒送等語臣等因諄切曉諭以阿布賚擒獻賊黨我皇上自必嘉悦但阿逆一日不獲則三路大兵不能撤回恐驚動爾等㳺牧若擒獻阿逆我皇上恩賞阿布賚等以及効力之人必更優渥來使等俱懽欣感激臣等復訊問達什策凌齊巴罕僉供阿逆於本年三月帯鄂畢特等人衆搶掠扎那噶爾布游牧忽聞大兵來信遂四散奔逃後大兵尾追甚急阿逆即将糾合之巴爾達穆特等游牧移至喀拉瑪而自率兵三百駐守額卜克特山復為大兵撃敗只帯二十餘人逃入哈薩克阿布賚雖好言安慰而阿逆仍生疑懼及黎明時衆哈薩克前來搶奪阿逆已不知去向又供稱阿逆投哈薩克時於途次告衆云我等若投俄羅斯則此生為人奴僕倘哈薩克再不相容則無路可去等語臣等看來使所告情形及達什策凌等所供阿逆窮蹙已極必不能倖逃法網現於哈薩克俄羅斯相通各路分哨捜拏以期必獲其達什策凌齊巴罕先行押觧送京奏入上諭軍機大臣曰兆恵富德奏稱哈薩克擒獻達什策凌齊巴罕據來使所言知阿睦爾撒納勢甚窮蹙現在分路堵截等語所辦尚合機宜順德訥此次甚屬奮勇効力著加恩賞給副都統職銜仍交部議叙鄂博什雖追賊稍遲尚能竭力進勦從寛免其議處其餘効力官兵著兆恵等查明報部議叙戊午諭叅贊大臣雅爾哈善等辦理歸降之琿齊達瓦等事宜上諭軍機大臣曰雅爾哈善等奏稱端濟布送到扎那噶爾布首級及歸降之琿齊達瓦等請㫖辦理等語扎那噶爾布首級即於肅州通衢梟示其妻女及噶爾藏多爾濟之妻俱著觧京至琿齊達瓦已諭成衮扎布許其贖罪如情願來京可派員押送倘稍有猜懼即行正法其拏觧額林沁達瓦辦理伊等游牧之處俱遵照前㫖行又扎那噶爾布之宰桑庫圖古爾等游牧已照例辦理其端濟布等隨帶博卓羅克等六人既供明巴哈曼集去向又為官兵嚮導著從寛免其正法諭兩路将軍大臣駐劄兵丁事宜上諭軍機大臣曰前經成衮扎布奏稱撤回兵丁交滿福帯領駐劄吐魯番今思伊等閒住徒費口糧昨據哈寧阿報稱巡查額林哈畢爾噶臺站頗為寧静已前赴兆恵軍營但嗎哈沁等於我兵既過復行盗竊亦未可定著滿福派兵三百名由吐魯番照哈寧阿所走臺站再行巡查其餘兵丁即回巴里坤駐劄明嵗辦理回部亦無庸多兵此項撤回巴里坤兵丁或尚需調遣或竟行發回著兩路將軍大臣酌議具奏己未訓飭定邊将軍成衮扎布等上諭軍機大臣曰朕因成衮扎布舒赫德等此次進兵辦事茫無頭緒即如辦理喇嘛一事因伊等倡言煽惑玷黄教而害生靈必須大示懲創何以總未奏及豈盡隨巴圖爾烏巴什前徃土爾扈特耶即巴圖爾烏巴什亦未必徃土爾扈特不過隠藏山僻邊界處所今巴圖爾烏巴什終在何處明瑞色布騰巴爾珠爾所辦綽和爾烏喇特昂吉岱等游牧現在如何俱應查奏正欲降㫖傳諭適成衮扎布等奏報克勒特之得木齊畢魯特等潛逃現在派兵追勦又沙喇斯之三都克等游牧内移欲帯兵尾隨防範等語夫軍營所恃惟在将軍大臣成衮扎布雖為将軍尚未面受訓㫖其一切機宜俱諭知舒赫德令與将軍同心辦理伊起程之時即有畏難之意看其節次奏摺不過招撫數鄂拓克至伊犁行走一次便謂了局即如尾隨沙喇斯㳺牧内移直欲藉作歸計耳将軍大臣欲歸官兵孰不欲歸者舒赫德係獲罪至重之人朕加恩予以自新之路早知伊仍畏怯如此不當遣徃軍前如奉到朕㫖能恐懼改悔尚屬可逭若因循如故将併治其前後之罪不知伊如何承受再鄂實為㕘贊大臣宜知自効乃此次進兵以來隨行逐隊毫無奮勉亦著嚴加申飭可惜朕之巴圖魯侍衞官兵為此輩無用之人統轄實不勝憤懣著傳諭伊等加意振作将查拏喇嘛追勦巴圖爾烏巴什等事宜相機速辦至明嵗辦理回部一事此時應加慎密現據拏獲奸細所供霍集占已聚兵防備雖究無能為總以不使知覺為善前令於吐魯番駐兵今恐聲息相聞仍令在巴里坤駐劄已傳諭貝子額敏和卓矣諭喀爾喀郡王桑寨多爾濟等觧送達瑪林上諭軍機大臣曰桑寨多爾濟等報稱副台吉占楚卜等擒獲達瑪林馳驛觧京等語桑寨多爾濟從前不行嚴拿以致達瑪林逃脱毋庸議叙其聞信擒拏奮勉効力人員分别加賞著将達瑪林觧送熱河行在達瑪林之罪與策登扎卜相等但多此一逃應将伊妻子一併查拏觧京候㫖八月辛酉諭定邊右副将軍兆恵等擒拏阿逆事宜上諭軍機大臣曰兆恵等奏稱哈薩克觧送達什策凌等之來使言及逆賊阿睦爾撒納夜遁時将器械鞍馬全行抛棄諒難免脱必被阿布勒比斯之人拏送等語哈薩克人等果能擒獻逆賊固屬甚善但前聞伊等部落心頗不齊又聞阿布賚與阿逆有誓是其擒獻與否尚未可定兆恵等曽奏云如伊等将阿逆收留不即擒送即帯兵相機徃辦亦不擾其游牧所見甚是此際如尚未将阿逆擒獻即遣使促之云恐爾等屬人衆多或有隠匿今派兵協同捜緝庶可速擒為此先行通知庶不驚擾游牧看其情形若何作速奏聞壬戌命議叙叅贊大臣唐喀禄等上諭軍機大臣曰據唐喀禄車木楚克扎布奏稱准兆恵咨文前赴科爾沁辦理阿睦爾撒納所留種地之烏梁海等派兵先行令副都統職銜瑚爾起續進途次捉生詢問知都爾伯特貝勒巴圖博羅特台吉喇喇善公舍楞等與阿逆相通潛徃額爾齊斯河未隨其汗策凌遷移游牧隨派瑚爾起於六月十五日帶兵前至輝巴朗山後擒獲巴圖博羅特等𠞰其屬人其阿逆所留種地之烏梁海五十餘户全行𠞰殺現在領兵赴塔爾巴噶台搜拏阿睦爾撒納哈薩克錫喇等語唐喀祿車木楚克扎布和𠂻商辦甚合機宜著交部議叙並将御用荷包鼻烟壺加恩賞賜其領兵擒拏巴圖博羅特等之瑚爾起亦著議叙首次得功之托郭齊等與𠞰殺烏梁海有功之侍衞穆倫保等俱分别奨賞陣亡官兵著交部議䘏又諭曰唐喀禄等奏将擒獲之巴圖博羅特等併其妻子交送布延圖軍營轉觧熱河等語著納穆扎爾派員将巴圖博羅特等觧送其妻子即於軍營正法所有差送行糧之侍衞德昇額授為二等侍衞差送文書之藍翎佛爾慶額授為三等侍衞仍令其傳送事件唐喀禄等摺奏即著其帯回癸亥定邊将軍成衮扎布等疏奏辦理克勒特游牧成衮扎布等奏言臣鄂實等帯兵辦理克勒特游牧追𠞰叛逆之各得秦人衆於七月十三日追賊至哈什河悉行𠞰殺由烏納哈嶺回營又因接應明瑞等甚屬緊要臣鄂實派兵二百名令巴圖魯侍衞濟塞布等前徃復派兵率副總管莽蘇爾等将叛賊藏匿游牧者悉行𠞰殺查克勒特一鄂拓克共十九得秦除莽蘇爾根達什等八得秦移入内地外其叛逆之各得秦俱陸續𠞰滅收馬駝三百餘牛羊五千餘又有暫委總管之阿雜喇巴圖巴拉俱年未成丁被迫從亂隨即投順協同𠞰賊但伊等祖父世為頭目未便仍居本地或於軍營正法或賞給官兵為奴至莽蘇爾根達什等情願内移可否安插巴里坤附近俱請㫖遵行奏入上諭軍機大臣曰成衮扎布等奏辦理克勒特游牧内移之八得秦俱送交巴里坤大臣辦理其阿雜喇巴圖巴拉著便中觧送來京又奏稱鄂實派兵二百交侍衞濟塞布等帯徃等語所奏究屬含混明瑞等辦理綽和爾等鄂拓克一月有餘何以並無信息且鄂實即應帶兵前徃而轉派侍衞著傳諭鄂實令其明白回奏又諭曰前據成衮扎布等奏稱沙喇斯宰桑三都克将瑪呼斯宰桑多爾濟擒獲今奏到供詞有托倫泰令勿與三都克同行已将此情節報知将軍自必轉奏後多爾濟脱逃等語多爾濟本屬可疑三都克尚欲擒拏而托倫泰令其獨行侍衞等如此舉動不惟有悞公事亦且貽厄魯特姗笑托倫泰既辦理不善以致脱逃於前又推諉三都克於後極其無恥不加懲創非特無以服三都克之心而侍衞等亦不知儆懼可傳諭成衮扎布若對質果係實情即将托倫泰正法仍傳諭兩路軍營各侍衞伊等奮勉効力者賜以巴圖魯名號倘以托倫泰挾私取巧必照例正法斷不姑貸命安插伯克托克托回人於吐魯番上諭軍機大臣曰豆斌等奏稱額敏和卓呈報伯克托克托所屬瑪木特托爾岱等男婦一百餘口自哈喇沙爾投來或照厄魯特等之例安插或令與吐魯番安插之回人同居等語從前吐魯番安插回人係伯克托克托所屬此次投來之百餘口即准其同居耕種著交與額敏和卓留心約束如有潛逃一名即行拏獲治罪乙丑諭喀爾喀四部落辦理游牧事宜上諭喀爾喀四部落汗王公台吉等曰前因爾扎薩克台吉等不善經理游牧以致畢齊罕扣等盗竊肆行理應嚴加懲治特派大臣查拏分别首從辦理又以盗賊起於饑寒即發帑辦給貧人産業牲隻并代還逋欠爾等游牧已覺寧静恐爾扎薩克台吉等習於玩愒以為盗賊既除不復為貧人籌畫生計又或目前尚知約束日乆漸至懈弛至爾四部落盟長副将軍等統率所屬尤當察其貧困之由俾謀生有策其或頑悍不悛者嚴加約束有犯必懲務俾上下安全共享昇平之福是用再申訓諭倘仍不加奮勉致蹈覆轍朕惟爾盟長副将軍及各扎薩克台吉是問丙寅定邊右副将軍兆恵等疏奏哈薩克頭目霍集伯爾根等言語情形兆恵等奏言七月初六日額卜克特西卡倫報稱有兵二百餘從愛呼斯雅爾河前來馬跡甚大似哈薩克人衆臣等遣侍衞達禮善帶兵徃探初七日帯領哈薩克霍集伯爾根之子拜達里克喀喇巴喇特之弟瑪密等到營告稱聞阿布賚投順大皇帝因徧行曉諭各游牧我父兄聞信即帶兵搜緝阿睦爾撒納先遣我等來見并擒巴雅爾屬人尼瑪為贄以求賞賜臣等言尼瑪係我兵𠞰滅餘賊無闗緊要非阿睦爾撒納可比若擒獻阿逆自有重賞因遣人徃迎霍集伯爾根等於初九日率屬六十餘人來至軍營跪請皇上聖安并唪經祝頌萬夀與臣等行禮據霍集伯爾根等言我等因掠取準噶爾逃户不知大兵已至邊界途中聞阿布賚投誠大皇帝此際前徃擒拏阿睦爾撒納我等亦願為臣僕臣等告言爾等前來甚是即将爾等職名及投誠縁由奏聞今阿布賚等已将達什策凌齊巴罕擒送祇有阿睦爾撒納尚未擒獲阿逆罪惡滿盈係奉大皇帝諭㫖擒拏之賊阿逆不獲我等斷不撤兵且我諸路之兵暫停者因阿布賚投誠之故若爾等擒獻阿逆必受大皇帝天恩重賞霍集伯爾根等言阿睦爾撒納毫無依倚我等何必留此一嗎哈沁若在我等游牧豈有不行擒獻之理或在他人游牧亦當報知協力擒拏臣等言阿逆料不能逺遁不過在爾等游牧即逺遁至布哈爾布魯特等處則我兵必由爾游牧擒拏恐有驚擾此時如有人欲獻出阿逆向爾等索馬以酬雖數百匹爾等不妨給與我大皇帝必加重賞仍給爾等馬價否則我等駐爾邊界屯田長向爾游牧捜捕利害較然爾等可自行度量霍集伯爾根等言我等豈不知此理俟回游牧後必竭力擒獻臣等勞以酒食初十日復設筵宴伊等飽食畢令其觀我兵校射相撲又懸鎻子甲為的射必洞穿並令走馬獻伎衆哈薩克皆稱讚歡笑十一日霍集伯爾根等辭歸臣等復加諄諭伊等懇給印文為投誠之據復於兩營之間安設卡倫令官兵将所餘什物及俘獲人口與哈薩克交易馬匹共得馬二百餘匹臣等伏覩霍集伯爾根喀喇巴喇特情詞恭順謹将給與卬文及伊等所屬頭目名單録呈御覽奏入得㫖下部知之申諭定邊右副将軍兆恵等擒拏阿逆事宜上諭軍機大臣曰覽兆恵等先後奏摺看其情形逆賊阿睦爾撒納即可就擒但不當因哈薩克投順遂爾倚恃頇阿逆奸狡性成或自哈薩克逃出逺離塔爾巴噶台潛伏僻地或料知入冬我必撤兵於察罕烏蘇等處藏匿此處宜分派兵丁輕騎來徃嚴行捜緝其哈薩克頭目霍集伯爾根等著傳㫖撫慰并各賞蟒縀二端大縀四端以示奨勵丁卯諭叅贊大臣納穆扎爾辦給都爾伯特部落地畝事宜上諭軍機大臣曰前納穆扎爾奏稱都爾伯特汗策凌等請於烏蘭古木種地但此地已給與察達克應請㫖遵行朕諭以烏蘭古木地畝寛廣若與察達克等地畝分畫疆界亦可准其耕種命納穆扎爾前徃查勘今策凌等於富紹前來復附奏懇請在烏蘭古木耕種在科卜多額克阿喇勒游牧等語是伊等耕牧各有處所自可相容著納穆扎爾酌量情形如事屬可行即傳諭策凌等准其所請查勘指給至所種地畝既與察達克屬人錯雜難保無盗竊之事更須派員巡緝嚴行禁止毋致滋事己巳諭兩路将軍大臣㑹𠞰巴圖爾烏巴什上諭軍機大臣曰據雅爾哈善等奏稱差徃兆恵等軍營賫送事件之索倫哲森保等行至額貝淖爾遇賊數十人搶掠致将事件遺失途遇庫圖齊訥爾之厄魯特告稱巴圖爾烏巴什近将巴爾達穆特鄂拓克搶掠我等於昨日被伊游騎搶掠得脱想爾等亦受其害又詢問巴圖爾烏巴什及阿巴噶斯哈丹游牧踪跡俱在博羅布爾噶蘇阿勒坦特卜什附近俟三格兵回即飭令進𠞰等語巴圖爾烏巴什亟宜殄滅從前成衮扎布等奏稱搶掠集賽逃徃土爾扈特朕即以為斷無是事不過仍藏僻地俟我撤兵復出耳今兵尚未撤即已肆行成衮扎布容有不知舒赫德豈未見及此一意茍且因循急圖歸計乎著速整官兵捜捕務獲計此際兆恵富德等已擒阿睦爾撒納即乘勝回兵或尚待哈薩克信息伊二人即留一守候一帯兵到額貝淖爾博羅布爾噶蘇等處成衮扎布等於闥勒竒阿勒坦特卜什等處兩路夾攻自必擒獲或賊衆為兵威所迫逃徃阿勒坦額黙勒兆恵等酌議傳諭哈薩克派兵堵截将首賊擒獻餘則聽其掠取是否可行著相機辦理諭叅贊大臣雅爾哈善等擒𠞰巴圖爾烏巴什及巡查臺站等事宜上諭軍機大臣曰雅爾哈善等奏稱差徃兆恵處賫送事件之人被瑪哈沁搶掠詢係巴圖爾烏巴什之人俟三格回兵搜捕等語已傳諭将軍成衮扎布等㑹兵進𠞰矣昨據哈寧阿奏報額林哈畢爾噶所有嗎哈沁俱已𠞰滅請巡查兆恵所設臺站今差員等被賊搶掠更當加意巡查嚴行捜𠞰以清臺路雅爾哈善等其徃來催督務期擒獲渠魁併傳諭哈寧阿知之又諭曰雅爾哈善等奏稱将扎那噶爾布所屬美諾和什等五人觧送來京等語美諾和什得勒登巴雅爾東莫俱拏觧熱河其額卜克特首擒扎那噶爾布尚可寛宥著押送前來免其拏觧諭定邊右副将軍兆恵等查拏和碩特等逃犯上諭軍機大臣曰雅爾哈善等奏稱據侍衞雲多克詢問嗎哈沁供詞自巴里坤逃出之沙克都爾曼濟所屬百餘人渡博羅塔拉河向西逃去又稱杜爾巴集賽巴蘇海得秦之人商議逃徃俄羅斯等語此等賊人雖非首惡而已降復叛未便聽其漏網兆恵等現住俄羅斯邊界即交鄂博什順德訥等留心巡緝併傳諭唐喀禄車木楚克扎布此際如已将哈薩克錫喇擒獲於沿途遇此等賊犯即行查拏辛未諭叅贊大臣納穆扎爾等辦給都爾伯特俸銀上諭軍機大臣曰納穆扎爾等奏都爾伯特汗策凌等告稱伊等應領本年及來嵗俸銀可否俱在烏里雅蘇台支領已覆以與例不符等語所辦甚是但策凌等今年初移内地著加恩准其於烏里雅蘇台支給嗣後仍來京請領著諭納穆扎爾等傳諭策凌知之諭吐魯番貝子額敏和卓辦理進兵事宜上諭額敏和卓曰據爾奏稱請於明年四月進兵願從軍自効等語朕已鑒悉至進兵之期三四月俱可又所奏兵數雖亦計出萬全之意但以我兵精鋭直抵回城尚不須多為調集爾受恩深重奮勉可嘉即授為領隊大臣於爾所屬派兵一百名在前鋒行走俱照軍營兵丁一例賞給此際宜加慎宻不可稍有漏洩命賞派員拏獲達瑪林之署理定邊左副将軍策布登扎布喀爾喀親王桑寨多爾濟大縀各四端擒拏觧送之齊旺扎卜授為一等台吉賞縀二端莫尼扎卜賞縀二端銀五十兩癸酉定邊右副将軍兆恵等疏奏擊敗哈薩克錫喇及辦理納木竒等游牧兆恵等奏言臣等前派圖倫楚帶兵一百名於和博克薩里等處進𠞰據報沿途𠞰殺賊衆收取馬駝探得哈薩克錫喇在哲克得里克等處種地於七月初十日至和博克捉生詢問知哈薩克錫喇統衆三百前來遂於阿爾噶凌圖相遇我兵奮力攻擊殺賊百餘哈薩克錫喇敗走以山險馬乏未能追及詢知哈薩克錫喇由戈壁逃徃鄂什地方臣等隨派索倫侍衞三達保帶兵前徃策應又臣等前派愛隆阿帶兵五百名自巴爾楚克至濟爾哈朗接續臺站捜𠞰賊衆有庫圖齊訥爾阿喇卜占五十餘户善披領集賽五十餘户俱先自投降隨親身投見又於沙喇博和什嶺前遇都爾伯特納木竒游牧納木竒遣人乞降旋又逃去我兵追及始行投見俱觧送軍營臣等行文收取伊等器械馬匹據報善披領屬人即行交出惟納木竒屬人口出怨言查納木竒受封貝勒職銜伊子車凌烏巴什為扎薩克台吉從前搶掠臺站隨從阿睦爾撒納今雖勉强乞降實不可信除将納木竒父子觧京其屬人六百餘俱行𠞰殺至庫圖齊訥爾善披領等俱懐叵測亦行文愛隆阿令其續行辦理奏入報聞諭兩路将軍大臣等辦理降人游牧事宜上諭軍機大臣曰現在兩路收服之厄魯特等甚多伊等外雖投順多係畏威乞降其心未可全信如姑息養奸将來必致滋事著傳諭将軍大臣等看其情形毫無可疑者即移向額林哈畢爾噶等處指給游牧以備來嵗屯田之用如稍懐叵測即移至巴里坤再令移入肅州即行誅戮朕從前本無如此辦理之心實因伊等叛服無常不得不除惡務盡也将軍成衮扎布兆恵等将現在來降之厄魯特查明具奏分别辦理如應指給游牧即不必送巴里坤其送至巴里坤者尤須慎密如稍有漏洩則聞風驚竄地方益難寧謐并傳諭阿里衮黄廷桂等知之諭定邊右副将軍兆恵等協𠞰哈薩克錫喇等事宜上諭軍機大臣曰圖倫楚途遇哈薩克錫喇以寡敵衆頗屬奮勉兆恵現在派兵策應亦合機宜昨據唐喀禄等奏稱前赴塔爾巴噶台此時計已将到伊等所帯兵丁八百名皆係挑選精壯兆恵等需用即行調遣追𠞰哈薩克錫喇但恐狡賊知哈薩克已降不敢徃投或到額林哈畢爾噶等處搶掠臺站阻截糧運逃入回部亦未可定已傳諭雅爾哈善令派三格前徃協同堵截其臺站糧運加意防䕶不可稍有疎懈軍機大臣疏奏詢問土爾扈特使臣吹扎卜情形軍機大臣奏言土爾扈特使臣吹扎卜自藏回京臣等遵㫖詢問吹扎卜爾土爾扈特舊游牧原在何地何故入於俄羅斯現在游牧與哈薩克何處毗連曽否争戰吹扎卜禀稱從前我等游牧與四衞喇特同居伊犁策妄阿喇布坦時我阿玉竒汗與彼相惡率屬經由哈薩克徃取明噶特因在額哲勒河游牧與俄羅斯相近俄羅斯即謂我等為其所屬其實並未歸降我等非奉大皇帝聖㫖及達賴喇嘛之言自不肯為人臣僕從前大皇帝遣使為俄羅斯所阻我納木喀格隆被擒者因我游牧有争奪之事耳我等現居之地與哈薩克阿布賚之子努勒蘇勒坦毗連亦有時交兵等語因告以阿布賚今已歸降遣使奉表朝夕即至吹扎卜喜云哈薩克既為大皇帝臣僕若䝉諭㫖令我等由彼前來更不紆迴道路於我等甚屬有益臣等又向吹扎卜云爾等此來欲請喇嘛同徃適遇達賴喇嘛圓寂未遂所請若敕召喇嘛與爾等同行則徃返需時必難乆候此亦無可如何今大皇帝憫爾逺來著我等傳諭撫慰吹扎卜跪奏云此大皇帝仁愛之特恩實不勝感激等語臣等謹将詢問吹扎卜地名繪圖恭呈御覽奏入報聞甲戌訓諭定邊将軍成衮扎布等奮勉進𠞰上諭軍機大臣曰據成衮扎布等奏稱准雅爾哈善移文派三格帶兵由額貝淖爾進𠞰巴圖爾烏巴什等查軍營現兵一千有餘現在辦理沙喇斯瑪呼斯克勒特等游牧令滿福照看内移并策應明瑞俱屬緊要今選兵四百名交由屯旺布多爾濟捜𠞰額林哈畢爾噶逸賊其餘兵親自帶徃策應明瑞㑹合一處於伊犁登努勒台等地方捜勦賊衆等語巴圖爾烏巴什等賊業有踪跡伊等自應疾速追擒乃遣由屯等帶兵辦理瑪哈沁竟将巴圖爾烏巴什諉之雅爾哈善意謂一經奏及即責有所歸顯係舒赫德駑怯取巧直欲脱身事外耳即如兆恵等𠞰賊甚多而伊等止擒一尼瑪且係被北路驅廹有何奮勉効力之處又伊等於𠞰賊機宜徃徃含糊覆奏而遇撤兵運糧等事輙條分縷析此皆舒赫德一意欲歸草率從事今伊等既由朱爾都斯進𠞰務将巴圖爾烏巴什擒獲朕看舒赫德此次効力與否若迄無成功惟伊等是問乙亥命釋薩喇爾於獄上諭軍機大臣曰薩喇爾當厄魯特變亂時觀望畏縮不能奮勇復仇是以降㫖拏問但伊曽奏及巴雅爾尼瑪等雖降必叛其言頗驗今巴雅爾等既已生擒扎那噶爾布亦經獻馘哈薩克阿布賚率屬歸誠計阿睦爾撒納自可旦夕俘獲著將此等情節傳諭薩喇爾施恩免罪出獄将從前賞給瑪本特房屋令其居住命副都統達爾黨阿馳驛前赴木蘭圍場平定準噶爾方略正編卷四十二
