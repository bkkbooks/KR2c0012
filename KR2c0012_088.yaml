body:
  text: 乾隆二十一年冬十一月戊申諭定邊右副將軍兆惠曉諭衆厄魯特等防守遊牧事宜上諭軍機大臣曰據兆惠奏接到派兵防範哈薩克之旨隨傳哈薩克錫喇尼瑪吞圖布等派兵二千名前赴軍營會議防守等語此奏辦理未協前降旨令兆惠將應否作何防範及今歲應否進兵哈薩拉克等處悉心籌畫如有未協機宜之處即據實奏聞原未指定即於今歲進兵即發兵前往現在兆惠所領索倫兵丁儘可調遣若哈薩克錫喇等經年效力軍營甫回遊牧豈可即行調遣使之僕僕道路伊等能不觖望且兆惠現奏今歲不及進兵而但以會商事務竟行傳至軍營更屬未合著即傳諭停止但令哈薩克錫喇等在各遊牧地方加意防守倘遇賊來侵犯即將遊牧內移使賊不獲搶掠徒費往返以疲其力一面再派兵掩襲始合機宜兆惠即遵照辦理己酉申諭定邊右副將軍兆惠等防範哈薩克事宜上諭軍機大臣曰昨日兆惠等調遣厄魯特兵丁防守未合機宜已降旨詳悉訓示從前達瓦齊據伊犁時厄魯特等各遊牧俱在博羅塔拉地方與哈薩克毗連是以哈薩克人等得以肆行搶掠今各遊牧俱移至博羅塔拉以南則彼處地方皆成間曠現在阿布賚及阿逆等屢經擊敗逃竄他往大兵撤回後不過回至伊舊時遊牧哈薩拉克等處必無力繞道前來滋擾第防範不可不周惟宜設卡巡防以備不虞至我大兵往𠞰即緩至明春前進未始不可此時厄魯特各遊牧正應令其安居休息以逸待勞未可屢議調遣也再伊等奏稱道都托羅垓巴顔阿璊二處俱屬緊要著每處派兵五百名交哈寧阿三格帶領防禦此外尚有應行防守地方並著兆惠等悉心籌辦搶掠臺站賊人綽克圖等分别治罪喀爾喀公蘇巴什里等查拏搶奪臺站賊人綽克圖等請旨分别治罪交理藩院核擬具奏得旨綽克圖等二十人著即處斬梟示其從行二次之馬甲多爾濟著即處斬所有為從之達爾馬等三百二十三人并多爾濟扎卜等二十人俱應照所奏擬絞苐念伊等皆係蒙古無知之人誤聽隨行且所搶馬匹俱如數交出著加恩寬免至圖謝圖汗雅木丕勒多爾濟等不能約束屬人本應議處但既將賊人查獲牲隻亦如數追繳加恩概豫寬免庚戌諭定邊左副將軍成衮扎布移駐軍營各事宜上諭軍機大臣曰北路科卜多等處現在駐劄大臣辦事將軍軍營應移駐烏里雅蘇台以便居中調度著傳諭成衮扎布俟擒青滚雜卜後即㩦帶眷屬前赴烏里雅蘇台駐劄現在阿逆與阿布賚交結明春必應發兵擒拏第念喀爾喀人等連年效力軍營不免勞頓俱著回至各遊牧休息明歲毋庸調遣惟由西路派兵辦理並著成衮扎布哈達哈等曉諭喀爾喀王公等知之諭陜甘總督黃廷桂進兵擒拏阿逆事宜上諭軍機大臣曰黃廷桂所奏調解西安馬匹摺內有行文甘涼各處俟其到時沿途分撥則皆知為補缺之馬不致啓人疑議等語此亦何疑議之有豈黃廷桂尚未深悉此事機宜耶阿逆之負恩逃竄罪在必誅以國法論之固不得不極力擒追用示顯戮以事理論之尤不得不深籌𠞰獲永絶根株前此降旨撤兵不過暫令休息俟一二年後再為相機酌辦其實一切進𠞰事宜仍當及時籌備若竟任其逺揚必致終貽後患況準噶爾一事實皇祖皇考未竟之緒仰承上蒼默佑適值事有可乘今伊犁等二十一昻吉皆𨽻版圖豈可留此遺孽撓我已成之功致貽將來之患阿逆從前尚不過孑身逺揚雖意其必將煽惑哈薩克以圖狂逞而勢難驟合不妨徐為之圖今據順德訥所奏則阿布賚已妻之以女假之以衆黨羽盤結其必不能忘情於伊犁已可概見且以阿逆之窮凶極惡反覆狡詐將來亦安知不吞噬阿布賚而悉奪其衆逾致滋蔓難圖是叛賊一日不獲則伊犁一日不安邊陲之事一日不靖大臣以體國為心俱應籌辦及此至用兵之費雍正年間西北兩路費至五六千萬今自用兵以來統計軍需才及一千七百餘萬即更有多費而剪此凶頑永敉荒服朕亦何惜今所慮者不過馬不足用甘肅一省屢經調撥缺額自多現令直𨽻購買馬五千匹已降旨全數解往將來即再有需用之處自當預為籌畫正不必以此鰓鰓過計也朕非舍逸好勞務勤逺略良以揆機度勢斷無中止之理既已事在必行自當明切宣諭俾衆共曉然於一勞永逸之意所有辦理軍需事宜屆期另當降旨黃廷桂令其來京面諭著將此先行傳諭知之辛亥恩擢軍營效力索倫總管畢里衮等上諭軍機大臣曰據達爾黨阿等奏索倫總管畢里衮等隨營效力甚著勞績等語總管畢里衮協領由屯俱著賞給副都統職銜二等侍衛瑪瑺著授為頭等侍衛佐領布喇勒圖俟有總管缺出即行補授三等侍衛濟塞布阿克蘇著授為二等侍衛拜唐阿額爾登額海蘭泰前鋒翹蘇勒俱著授為藍翎侍衛千總永安著補授守備五品參領錫喇卜納旺俱著賞給四品職銜管旗章京密瑪克頭等侍衛巴圖濟爾噶爾俱著授為散秩大臣吏部筆帖式額倫特著授為本部主事其革職效力贖罪之前鋒章京伊三泰著加恩仍授為健鋭營前鋒章京命議處定西將軍達爾黨阿等上諭軍機大臣曰達爾黨阿等遣哈薩克楚魯克昭華什等向阿布賚曉諭而留阿喇勒拜杭吉勒圖於軍營為質乃並不加意防守致阿喇勒拜等先後逃脫續經拏獲杭吉勒圖又不即行正法仍復疏縱辦理實屬玩誤達爾黨阿及軍營參贊大臣等俱著交部嚴加議處命拏解運糧遲誤逰擊堆齊來京治罪上諭軍機大臣曰逰擊堆齊係解送口糧牲隻之員沿途遲至數月傷損牲隻甚多且遇見達爾黨阿遣往迎接之人輒將口糧等項給與伊即回至巴里坤實屬玩誤著即拏解來京治罪壬子命留哈薩克撤回兵丁於巴里坤上諭軍機大臣曰據兆惠等奏哈薩克撤回兵丁除留伊犁外餘兵七百名已令回至巴里坤等語著傳諭雅爾哈善此項兵丁到日即將喀爾喀兵丁遣回遊牧其索倫察哈爾等兵丁留在巴里坤酌量賞給口糧聽候調遣乙卯申諭定邊左副將軍成衮扎布速擒青滚雜卜事宜上諭軍機大臣曰成衮扎布等奏稱遣往曉諭青滚雜卜侍衛巴圖孟克及曉諭旺布多爾濟之羅卜藏阿扎喇等回至軍營告稱和托輝特人等皆知青滚雜卜負恩叛逆並不附從青滚雜卜現帶兵前往托濟烏梁海等語成衮扎布派員先往曉諭辦理甚合機宜著賞給荷包鼻煙壺以示優眷侍衛巴圖孟克著有勤勞著賞給副都統職銜并銀一百兩羅卜藏阿扎喇等俱著賞戴孔雀翎和托輝特人等既知大義不附逆賊青滚雜卜隨從不過四五十人此時或已被旺布多爾濟擒獲亦未可定著即行進兵𠞰捕並曉諭烏梁海等協同擒獻逆賊即可指日就俘至所奏圖布懼赤倫明噶特特楞古特所屬人等至克木齊克偷竊牲隻請旨各遣回遊牧等語此時阿逆尚未就擒伊犁地方亦多匪竊若遽將此等人遣回勢必互相搶奪殊屬未便計其人數無多或分給喀爾喀等為奴或陸續解至察喀爾安插著成衮扎布酌量辦理丙辰命派兵擒拏巴雅爾等上諭軍機大臣曰昨據雅爾哈善等奏布庫努特得木齊多爾濟等告稱哈薩克錫喇尼瑪等負恩謀叛現在領兵搶掠巴里坤並擒拏噶爾藏多爾濟等語朕尚疑為未確降旨諭雅爾哈善李繩武等帶兵訪查會同兆惠相機辦理適又據和起遣人告知巴雅爾哈薩克錫喇尼瑪莽噶里克等同謀為逆情由事已屬實厄魯特等似此辜恩背叛必應盡行𠞰滅雅爾哈善等毋庸領兵前進第宜安輯巴里坤地方毋令衆心搖惑並派兵加意防守著傳諭哈達哈即由北路軍營馳驛來京面聆訓示再往辦理哈達哈所領索倫兵丁現留烏里雅蘇台著博爾莽察前往帶領由阿濟必濟一帶速赴巴里坤聽候調遣軍行應需馬匹著黃廷桂速行解往雅爾哈善等應即選精兵二三百名馳赴兆惠處告知現在情形並令兆惠即率所部兵丁回至巴里坤沿途遇背叛賊人悉行𠞰滅倘哈薩克錫喇尼瑪等並未與巴雅爾同謀或旋行改悔自陳罪狀雅爾哈善等即善為慰諭派委妥員解送來京再沙克都爾曼濟等現在巴里坤居住其情形如何亦應詳加體察如無别情即派伊等同往𠞰賊倘稍有可疑亦當乘其不備先行𠞰滅雅爾哈善等務宜詳慎辦理諭定邊左副將軍成衮扎布詳察達什達瓦屬人情形上諭軍機大臣曰額林哈畢爾噶等處厄魯特等同謀叛逆已派兵辦理著傳諭成衮扎布等現在達什達瓦屬人等住居鄂爾昆地方如果安靜無事毋庸辦理倘稍有可疑即著成衮扎布發兵前往𠞰滅其子女等俱賞給喀爾喀等為奴成衮扎布務宜詳慎辦理命侍郎裘曰修馳赴西路軍營辦理事務諭陜甘總督黃廷桂派兵駐防巴里坤上諭軍機大臣曰巴雅爾等現在背叛巴里坤地處邊要宜派兵前往駐劄前令派安西緑旗兵一千名交傅魁帶領前往著再派一千名令馬得勝即隨後起程如兵尚不足黃廷桂仍豫為派定以供臨期調遣所有現在辦理機宜已命裘曰修馳赴肅州面為宣諭黃廷桂即遵照辦理丁巳命授博爾奔察為內大臣上諭軍機大臣曰博爾奔察帶領索倫兵前往巴里坤聽候調遣著加恩授為內大臣同侍衛順德訥馳驛前往諭喀喇沁貝子瑚圖靈阿等查辦齊木齊格特人等事務上諭軍機大臣曰據瑚圖靈阿等奏會同俄羅斯畢爾噶底爾雅古畢等定議邊界事務業經辦竣其俄羅斯奈瑪爾等入巴爾虎等界內偷盜馬匹一事應俟俄羅斯撒納特衙門查辦等語瑚圖靈阿等守候伊等撒納特衙門查辦盜賊為日尚久毋庸在彼久待即著曉諭伊等撒納特衙門查辦明白後行文理藩院再行辦理瑚圖靈阿多爾濟即會同濟福查辦齊木齊格特人等事務至俄羅斯奈瑪爾等越境偷竊前降旨伊柱領呼倫貝爾兵丁五百名駐劄卡倫聽侯調遣即著伊柱加意稽查並著傳諭黑龍江將軍綽爾多派兵巡防嚴緝匪竊人等治罪毋得任其脫逃命調陳𢎞謀為西安巡撫派甘肅巡撫吳達善赴巴里坤承辦軍需事務命調吉林察哈爾等處兵丁赴巴里坤上諭軍機大臣曰西路現需兵丁調遣著傳諭吉林將軍額爾登選派兵丁一千名交滿福帶領來京並著察哈爾總管等選兵一千名交端濟布敏珠爾多爾濟等帶領來京分起馳赴巴里坤聽候調遣命侍衛圖倫楚達禮善馳驛前往巴里坤聽候調遣戊午命傳諭扎薩克公額敏和卓防守事宜大學士管陜甘總督黃廷桂奏言據扎薩克公額敏和卓呈稱奉將軍和起檄調兵丁四百名於十一月初一日由魯克察克起程隨同將軍行走初六日莽噶里克尼瑪等率兵搶掠將軍和起被圍莽噶里克向衆厄魯特言額敏和卓原係回人暫令回至魯克察克莽噶里克隨遣人令其赴吐魯番額敏和卓不甘從賊託病未往等語又據哈密副將祖雲龍稟稱貝子玉素富接額敏和卓來信知莽噶里克背叛情形莽噶里克之子白和卓現在內地適於是日由京抵哈密未便遽令回巢現在拘留防守等語奏入上諭軍機大臣曰據額敏和卓具報莽噶里克背叛情形甚屬可惡著傳諭雅爾哈善等即選派妥員前往曉諭額敏和卓伊係輸誠最久之人感激厚恩遣人報信朕甚嘉豫伊身在賊中實深軫念現在甫從瓜州遷至彼處諸務未經整理豈有擒拏逆賊之力如能誘擒莽噶里克固屬甚善俟奏凱後其地方悉交伊管轄倘力有不能惟將駐劄地方嚴加防範靜候內地大兵前往即可戡定現已調集各路兵丁剋期前赴著額敏和卓遵照辦理至祖雲龍將白和卓羈留防守甚合機宜著傳諭黃廷桂遇有總兵缺出即行請旨補授命阿拉善貝子羅卜藏多爾濟領兵前赴巴里坤上諭軍機大臣曰前派兵擒拏青滚雜卜降旨令羅卜藏多爾濟豫備兵丁聽候調遣嗣因北路兵丁已足敷用傳旨停止今西路尚需派兵仍著傳諭羅卜藏多爾濟於所轄兵丁內選派五百名馳赴巴里坤其沿途應給車馬口糧著黃廷桂等妥協豫備恩恤台吉額林沁多爾濟等上諭軍機大臣曰據哈達哈等奏台吉額林沁多爾濟旺辰多爾濟等進兵時出痘身故等語額林沁多爾濟等效力行間遽爾溘逝甚屬可憫額林沁多爾濟乃額駙策凌之子著格外加恩授伊子那蘇圖多爾濟公品級承襲頭等台吉仍賞銀二百兩旺辰多爾濟無子著施恩賞給伊家銀二百兩庚申申諭中外用兵事宜上諭大學士曰前據兆惠奏綽羅斯汗噶爾藏多爾濟報稱扎哈沁遊牧牲隻駝馬為巴雅爾搶掠隨令和起帶兵一百名及回人莽噶里克額敏和卓兩路兵丁并檄調厄魯特兵前往擒拏續據雅爾哈善奏和起兵駐闢展時尼瑪等所帶布魯古特都爾伯特扎哈沁兵丁約一千五百餘名竟至操戈相向而莽噶里克之兵亦遂從後鼓譟以致和起僅率親隨百餘人徒步轉戰身帶重傷觀此則是伊犁地方又生一事端矣貪殘好亂反覆狡詐固屬準夷常性然亦由阿逆未經擒獲之故昨降旨黃廷桂所謂叛賊一日不獲則伊犁一日不安邊陲之事一日不靖者正為此耳現在巴里坤地方已經添駐重兵以資彈壓并派調索倫察哈爾吉林等兵迅速前往協力擒捕其二十一昂吉中如有為其煽惑妄思蠢動者則移兵進𠞰以安反側而靖荒服夫準噶爾夷衆本非徑旅前歲平定伊犁時偏師直入業已所向披靡今該地又經阿逆蹂􅏳之後凋敝已極大兵所至自可計日戡定尚屬易於經理之事特外間無識之人又不免妄生議論必謂此事原不當辦即經辦矣仍復生變何如不辦之為愈殊不思準噶爾之為西北邊患自有明迄今垂四百餘年我皇祖皇考當噶爾丹噶爾丹策零等籓籬完固兵力強盛之時尚且屢申撻伐以為邊陲久安之計朕仰承鴻緒上荷天庥適值該夷部落㩦離人心渙散之後既已機有可乘而乃安坐失之豈不貽笑於天下後世亦何以上對皇祖皇考在天之靈耶此所以熟籌審計實有萬不得已之苦心非一時之好大喜功開邊釁而勤逺略也若謂此事本不當辦則當策凌等先後欵關時即應拒而不納然伊等窮蹙來歸而竟絶之境外在策凌策凌鳥巴什等庸懦之人尚不過失意而去竊笑無能至阿逆之凶暴殘忍既已無所歸依必至搶劫滋事其擾害於我喀爾喀諸部又不知作何景象矣其究亦必至於用兵則與其用兵於投誠之人何如因勢乘便俾得返其遊牧而各安生計乎至阿逆之負恩逃竄則又伊之自外生成非可逆料不得歸咎於從前辦理之非也然朕辦理始意亦惟欲按其四部分封四汗衆建而分其勢俾之各自為守以奉中國號令聊示羈縻而已乃伊等蠢愚無知不能承受太平之福以致自干𠞰戮實非朕之本懷豈此中實有天意故非人力所能與耶況該夷地近西陲雖定以疆界準通貿易而犬羊之性久之亦難保其不生釁端今即重煩兵力得以永靖邊圉揆之事機尚應斷然為之豈有已成之功轉為棄置之理至於用兵之費雍正年間西北兩路費至五六千萬今自軍興以來統計軍需才及一千七百餘萬將來即更有多費較之曩時終屬減省亦何惜焉朕於此事並非舍逸而好勞實由於事勢之不可已況人君日理萬幾國計民瘼實深乾惕宵衣旰食自是分內事亦不専因軍書旁午而始時厪憂勤也和起效命疆場捐軀報國忠節可嘉深為憫惻著照傅清拉布敦之例加恩贈恤並將此通行曉諭知之命奬賞大學士管陜甘總督黃廷桂等黃廷桂奏言回人莽噶里克與厄魯特等潛謀叛逆經臣雅爾哈善等將莽噶里克之子白和卓嚴拏拘禁臣查哈密與吐魯番毗連現在厄魯特及回人等貿易貨物在巴里坤哈密往來出入者甚多恐有潛通信息之事應派兵嚴加防守哈密雖有防兵二千名然安設臺站看守卡倫及分撥差使坐守倉庫其存城者不過一二百人巴里坤兵丁亦僅一千餘名各項差委之外存城亦屬無幾即密扎安西提督傅魁選兵一千名以五百名添駐哈密五百名添駐巴里坤但兵數尚少若再向內地甘涼肅各營徵調必至張皇查有派赴巴里坤種地官兵五百名及塔勒納沁種地兵二百名原議明年二月起程亦令於此時先行起程前往防守更覺有益再晉省解到駝隻出關未久若趕赴軍營又須撥兵防護已截留安西一帶牧放餧養續調馬匹未至軍營者現咨商雅爾哈善等於附近哈密和暖地方截留餧養將來一有需用即可調往而此時不即趕赴軍營亦可省撥兵防護之煩至馬駝尚須豫為籌辦奉旨解馬五千匹內安西馬一千匹已於十一月初旬先後起程計此時已抵軍營陜甘兩省滿漢各營馬尚有四五萬匹實可揀選三萬匹已數次檄飭加緊飼餧並不時差員查看務期脿壯適用但陜省各營與肅州相距遙逺按站行走即需五六十日長途趕送易致疲乏請將陜省滿漢營馬先行調解來甘令其陸續行走至甘省後分撥涼甘肅各營交州縣官加意餧養至陜省摘缺之數應聽自行領價購買如此則辦理從容而馬匹亦可收實用奏入上諭大學士曰黃廷桂經理軍務籌畫精詳一切調度甚合機宜大臣能如此明決擔承實心體國深可嘉悅著賞給雙眼孔雀翎並加賞騎都尉世職令伊子承襲雅爾哈善吳達善等宣力軍營實心辦事雅爾哈善著賞給內大臣職銜吳達善著賞給孔雀翎以示奬勵諭辦解軍營駝馬事宜上諭軍機大臣曰黃廷桂奏稱陜甘滿漢各營約可調馬三萬匹檄飭加緊餧養以備調用等語現在派調察哈爾吉林及索倫兵丁約計四千名備馬二萬匹即可敷兵丁乘騎之用著即照數挑撥分起陸續解赴巴里坤約於明春二月內到齊不致遲誤至駝隻一項前令方觀承購買一千隻又豫備行營駝一千隻解交明德轉送陜省解往巴里坤並著傳諭明德再購駝千餘隻解往備用辛酉諭籌辦軍營糧餉事宜上諭軍機大臣曰現在派調各路兵丁明春進𠞰口糧最關緊要前黃廷桂籌辦軍需曾請撥餉四五百萬彼時以軍務將次告竣未經準行今雖不必如此多備然亦須酌量足敷四五千兵之用恐甘肅一省不能猝辦著將安西糧石撥運巴里坤應用再將山西歸化城糧石撥運安西以備接濟河南麥麵於軍需食用亦為有益并著多為運送其應如何酌定數目迅速辦運之處著各該督撫詳細咨商妥協辦理十二月乙丑諭稽查臺站事宜上諭軍機大臣曰蘇巴什里等奏各處臺站請交附近臺站各扎薩克台吉等管理其總管臺站事務人員每年於春冬二季巡查兩次以核功過等語應如所請辦理伊等每年巡查後著於年冬彚奏其有應行加恩及議處各扎薩克台吉等候朕分别酌量以昭懲勸丙寅諭安插輝特郡王策登多爾濟屬人事宜上諭軍機大臣曰策登多爾濟奏請賞給口糧以資接濟等語伊等現從喀爾喀遷往若賞給口糧未免難於馱運且伊等舊逰牧地方現在滋事不能安居著傳諭阿蘭泰即令伊等赴烏蘭古木等處給與耕種地畝俟明年收成後再行遷徙其所需籽種照達什達瓦屬人之例交明德運往二百石仍令阿蘭泰加意安撫丁卯諭都爾伯特汗策凌等防範哈薩克事宜上諭軍機大臣曰哈薩克阿布賚等雖被大兵兩次擊敗潛蹤逃竄今大兵既撤自必仍回巢穴或乘間侵擾都爾伯特策凌等遊牧均未可定前已降旨令策凌等加意防範或乘其不備先發兵前往襲擊使賊不得寧處倘遇阿逆遣人前來煽誘及偵探各處情形即著策凌等拏解來京毋令脫逃至策凌等奏請派員經理伊等遊牧事務伊等約束屬人甚屬妥協毋庸再行派往現在烏里雅蘇台及科布多等處駐劄大臣辦事離伊等遊牧不逺如有緊要事務即遣人往駐劄大臣處妥協商辦其陳奏事件亦即交與轉奏戊辰命奬賞西路管理臺站人員等上諭軍機大臣曰自巴里坤至京臺站遞送文報皆能迅速無誤該管員辨及臺站兵夫等俱屬黽勉著該督撫查明請旨分别議敘賞賚以示鼓勵己巳申諭策楞玉保等擒賊不力罪狀上諭大學士曰據雅爾哈善等奏稱策楞玉保由西路軍營拏解途間遇厄魯特賊衆被害等語從前令將策楞玉保拏解來京特以伊等身係將軍參贊大臣專任擒拏逆賊乃各懷私意並不勇往向前即如達永阿自阿逆處脫出即向玉保言阿逆相距僅隔一日程途趲行即可追及玉保理應速行前往乃並不追擒祗令達永阿轉告策楞以卸其責維時策楞與玉保相距亦僅隔一程而策楞又置若罔聞託言無馬徑回伊犁試思兵丁馬匹即使難得策楞豈亦無乘騎之馬且使果無馬匹又何以將哈薩克錫喇遣往而伊等又何以返至伊犁耶其意蓋以不能追及逆賊罪尚可諉若追及而不能擒獲則罪滋大是以如此故為推卸任其逺揚其心尚可問乎如伊等彼時以去賊不逺奮勇直前即使不獲成擒朕亦必為曲諒乃已得逆賊實信反心存觀望坐失事機致令逆賊兔脫罪實萬無可逭前降旨將伊等拏解來京蓋欲審明情節通行曉諭明正其罪今策楞玉保俱於途次遇賊被害在二人身獲重罪固無足惜然使將伊等解京審明情節既可以顯彰國憲亦可使共見朕心今伊等惡孽滿盈致干天譴死於亂賊假使伊等不如此推諉受朕何等重恩或奮勇追捕逆賊雖未成擒而身歿戰陳朕亦必加以優恤同為一死視今日之為賊所害者輕重何如耶此皆不以國事為重挾私悮公為天所惡之所致也著將此通行曉諭至同時被害解送策楞玉保之官員兵丁雖與陳亡者有間然因公差遣遇賊身亡殊屬可憫著查明交該部將如何恩恤之處議奏命解莽噶里克屬人色梯巴勒氐至肅州監禁上諭軍機大臣曰雅爾哈善等奏拏獲莽噶里克遣至哈密回人色梯巴勒氐等請旨即行正法等語色梯巴勒氐等係莽噶里克所遣之人聲言搶掠哈密巴里坤搖惑衆聽甚屬可惡應照所奏辦理第在彼處正法莽噶里克聞知易生疑懼著解至肅州交黃廷桂嚴行監禁辛未命奬賞哲卜尊丹巴胡土克圖上諭軍機大臣曰據成衮扎布奏稱逆賊青滚雜卜逃往齊斯吉特地方已派納穆扎爾領兵追擒不日即可就縛等語成衮扎布辦理勇往俟擒獲逆賊時加恩優敘至哲卜尊丹巴胡土克圖於青滚雜卜煽惑衆喀爾喀時即齊集各部落王公等申明大義曉示利害俾不為逆賊所惑深堪嘉豫著晉加敷教安衆喇嘛名號賞給縀匹派侍衛黑達色齎往以示奬勵其策登扎卜䇿布登等與賊同謀應一併治罪著於擒拏青滚雜卜後俱解送來京候朕降旨丙子命白都訥副都統愛隆阿帶兵赴西路軍營諭軍機大臣曰白都訥副都統愛隆阿奏請前往軍營效力著照所請會同滿福帶領吉林兵丁前往巴里坤聽候調遣平定準噶爾方略正編卷三十四
