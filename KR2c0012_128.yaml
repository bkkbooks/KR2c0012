body:
  text: 乾隆二十四年六月丁丒諭定邊將軍兆惠等不必搜查回人牲隻上諭軍機大臣曰昨兆惠等因和闐遣來阿克蘇之回人默們訥則爾等𫝊說克勒底雅有牛羊數千及賊人所留羊千餘隻未知虛實行文富德就近詢問今據查奏伯克鄂對侍衛齊凌扎卜及克勒底雅之阿琿伯克等俱稱除現在交官外餘多被賊搶掠亦間有藏匿等語覽所譯回人呈文頗覺疑懼伊等甫經歸順即被圍三月之久雖有藏匿情事亦當佯為不知以安衆心若復逐一搜查徒滋紛擾已於富德奏摺以尚覺搜求太過批諭總之成大事者不可煩苛瑣細可𫝊諭兆惠富德等稽查此項牲隻即著停止至默們訥則爾不過新來歸附之小人所言未可全信不必將回人情事向伊究問諭定邊將軍兆惠等豫籌撙節糧餉上諭軍機大臣曰據五吉奏稱奉到續送羊隻過期即存留牧放之㫖計前後共送羊五萬隻至阿克蘇其八月內外送到者或在哈密或在巴里坤牧放等語從前因後到羊隻若仍送軍營則中途風雪必多倒斃疲瘦有名無實是以諭五吉清馥定長等議奏今清馥五吉俱已奏覆又楊應琚請撥哈密存貯米二萬石運往闢展再於肅州運米補額朕諭以各處屯田既有收穫又回人等交納糧石及收取賊人所種諒已足食甘省嵗歉應暫停撥補可𫝊諭兆惠等俾知前後辦理情形加意撙節糧餉並收取賊人積蓄以資軍食惟宜默為籌畫不可使兵丁知而𫝊說致有漏泄諭陜甘總督楊應琚等豫籌屯田事宜上諭軍機大臣曰努三奏稱查勘自木壘至烏魯木齊若盡開屯田則所用兵丁太多而間隔遙逺亦煩運費惟特訥格爾昌吉羅克倫距烏魯木齊頗近地畝亦廣將來回部全定伊犁駐防應以必需防兵若干與屯兵糧餉合算量籽種以定兵數就收穫以給軍食既可省內地挽運之煩亦不患多兵冗食等語昨楊應琚來京奏對曾請前往伊犁及屯田等處查勘而伊犁駐防議定兆惠富德回京舒赫德駐劄辦事亦已降諭㫖計楊應琚起程前往必與兆惠等凱旋相遇而舒赫德又承辦此事楊應琚宜與兆惠等酌定伊犁應駐兵幾千名其努三所奏烏魯木齊等處屯田事務作何辦理及不誤春耕與舒赫德等悉心㑹商具奏一面即行辦理著將努三奏摺録寄楊應琚閲看併𫝊諭兆惠等知之戊寅諭定邊將軍兆惠等辦理布魯特來降回人事宜上諭軍機大臣曰兆惠等奏在布魯特居住之回人鄂托蘭珠和卓瑪木特與布魯特之瑪木特呼里納喇巴圖等所遣屬人同來投見據稱伊等皆霍集占等一族從前大兵平定伊犁原欲歸附因逆賊復叛遂潛匿於布魯特游牧去年聞大兵抵葉爾羌伊叔額爾克和卓額色尹伊弟圖爾都和卓曾領兵搶掠喀什噶爾之四處村堡今仍在布魯特納喇巴圖處候進兵信息情願效力等語可𫝊諭兆惠等鄂托蘭珠和卓瑪木特與在彼之額爾克和卓額色尹等及瑪木特呼里屬人應否頒給敕諭或止應賞給縀匹著查明具奏其布魯特若有似瑪木特呼里效力之人及額爾德尼伯克若有歸誠信息或降㫖慰諭著一併查奏但布魯特回人等既係逆賊一族又曾在伊犁居住此次投見或乘我平定回城後窺伺僥幸亦未可深信我兵蕩平回部不可仍令藏匿即酌量送京安插亦宜豫籌辦理閏六月己卯朔諭定邊右副將軍富德等相機進𠞰上諭軍機大臣曰據富德等奏稱有回人哈里瑪自葉爾羌逃出將所詢供詞知㑹將軍兆惠定於六月初二日自和闐起程沿途息養馬力俟得兆惠進兵信息相機辦理又和闐六城伯克等願派兵六百五十名從軍效力甚屬誠懇請將各城為首伯克等留辦事務其小伯克等酌量派出令伯克霍集斯統領進發等語觀回人所告情詞是逆賊霍集占已無計可施大兵一至成功應速富德即行前進深合機宜朕佇聞捷奏其和闐從軍回人著加恩每名賞銀二兩領兵之大伯克賞縀二端小伯克賞縀一端仍將恩㫖𫝊諭至駐劄和闐之遊擊丑達與協同辦事之察哈爾委署章京固穆扎卜俱著賞戴孔雀翎吉林署驍騎校黑住亦賞戴藍翎諭欽天監監正明安圖等詳繪回部地圖上諭軍機大臣曰昨兆惠富德等將葉爾羌喀什噶爾等處地圖繪畫呈覽著發給明安圖德保至回部時按圖閲看再將該處地形髙下日月出入度數測量則易於定稿又所至之地其山河城邑村堡若與此圖有不相符合者即閲看更正癸未陜甘總督楊應琚疏奏辦解軍需羊隻楊應琚奏言欽奉諭㫖將解送軍需羊隻十四萬有奇計其可抵軍營者先送阿克蘇續送羊隻酌量牧放備用臣㑹同撫臣吳達善查得先從內地辦解羊五萬隻應請送至阿克蘇以備軍營口糧其續送之鄂爾多斯羊五萬餘隻及阿拉善羊五千隻俱接次前來驗其肥瘦分别留牧趲送應以到巴里坤之月日為斷截至閏六月止俱解送阿克蘇其七月以後即就近留於哈密牧放又烏蘭察卜羊三萬隻據署寧夏道知府王應瑜節次稟報併採買牛一千五百隻於六月十二日全數驗收其牛隻欽奉恩㫖每隻作價五兩賞借寧夏寧朔平羅三屬農民無不歡感至羊隻因長途多致疲瘦請於寧夏先行牧放俟解至肅州再行送往哈密奏入報聞總督管甘肅巡撫吳達善疏奏收割驛站馬匹草束吳達善奏言欽奉諭㫖於衝途驛站馬匹暫停折支乾銀日給本色料草以資飼秣臣自肅州回抵蘭州沿途查驗馬匹每多疲瘦詬知料草不敷支給邇因旱歉草價昻貴每束十斤需銀七八分且有加倍者臣思口外馬匹不必盡食榖草而雜項草束為價頗輕若雇夫收割自必更省酌以每束四分為率不獨有益軍需且無業貧民兼資糊口於錢糧亦有節省奏入得㫖此亦通融調劑之法可權時行之丙戌諭定邊將軍兆惠等查詢進𠞰情形及馬駝分數上諭軍機大臣曰據兆惠等奏稱准富德等咨送葉爾羌逃出回人哈里瑪供詞復詢問霍什克伯克仍照前定議先攻喀什噶爾侯富德信息堵截賊人逃竄之路等語昨據富德奏報朕諭以賊勢不過如此我兵即可成功今兆惠等亦定於六月十一日起程深合機宜佇聞捷奏但兆惠聞富德所送回人供詞又質之霍什克伯克似專向伊等責成詢問恐新附之人未免驚疑不以實告嗣後當於無意中慰諭咨訪庶少支詞𠞰說又所奏內地馬匹於六月初八日全到駝隻亦陸續前來等語計此時應先送馬數千匹於富德軍營矣至所送馬駝或傷損尚少是以未經聲說但數目臕分若何亦應奏及併著𫝊諭知之戊子諭定邊左副將軍成衮扎布搜捕嗎哈沁上諭軍機大臣曰據成衮扎布奏稱薩拉布拉克卡倫馬匹被賊盜取此等賊人或在拜塔克等處藏匿參贊大臣扎隆阿已領兵前往搜捕仍應派員協助請令臣子額爾克沙喇率侍衛一二員前往策應等語扎隆阿未必經練事情熟習道路額爾克沙喇則朕所深知與其同行不如獨往庶無掣肘之虞可𫝊諭成衮扎布即著額爾克沙喇前赴扎隆阿軍營代領其兵搜捕嗎哈沁若兵力尚弱即於喀爾喀兵內酌量挑選將從前盜取烏魯木齊牧放馬匹此次盜馬賊人及沿途藏匿嗎哈沁務期擒獲𠞰除事竣後在博克達山等處堵截逃竄賊衆若糧餉不繼彼處與定長所駐頗近即行文支給扎隆阿仍回烏里雅蘇台辦事現在辦理薩拉布拉克賊人情形併著奏聞己丑諭定邊將軍兆惠等酌調巴祿領兵事宜上諭軍機大臣曰富德奏稱准兆惠咨令巴祿領兵渡葉爾羌河㑹合夾攻但巴祿之兵必由聽咱阿卜呼爾璊前進距葉爾羌甚近賊人見其勢弱必相抗拒且堅守河口即大兵亦不能徑渡於事無益請令巴祿由巴爾楚克前進於葉爾羌喀什噶爾之中據其要隘可以堵截賊人俾兩路聲息相通等語近因兆惠奏定議令兆惠先取喀什噶爾富德取葉爾羌巴祿策應富德今據富德奏巴祿不足為伊聲援無需進發所見甚是巴祿即相機據守要隘仍聽兆惠調遣若二城賊衆彼此潛通信息即行堵截搜捕與兩路㑹合俱著𫝊諭知之諭定邊左副將軍成衮扎布酌議搜𠞰嗎哈沁上諭軍機大臣曰昨諭成衮扎布專遣伊子額爾克沙喇搜捕盜馬賊人今據策布登扎布奏稱伊等過阿爾台沿途搜捕並無嗎哈沁等語是盜馬賊人原非大隊可知且額爾克沙喇此行已後策布登扎布兩月餘恐歸途天寒雪盛不便行走或暫時停止前往俟回部平定再將此等嗎哈沁徹底搜捕亦可額爾克沙喇熟悉地方情形如必須一往即遵前㫖起程或趲赴策布登扎布軍中若不能相及即可勿行著伊父子詳悉酌定辦理一面具奏至馬匹被竊既非大隊賊人則卡倫人等疏懈之咎難辭著嚴行申飭令其加意防範命阿克蘇辦事侍郎永貴回京上諭軍機大臣曰舒赫德奏奉到著回阿克蘇辦事之㫖將交辦事件與富德議定於六月初十日起程等語前以永貴久在軍營令其回京續因舒赫德領兵策應阿克蘇辦事乏人故命永貴前往今舒赫德已遵㫖回阿克蘇接辦事務後永貴即著回京諭陜甘總督楊應琚以糴穀情形曉示商民上諭軍機大臣曰楊應琚奏請添撥司庫銀二十萬兩採買寧夏府屬麥豆米穀備用此舉若因甘省歉收籌備賑恤自屬應行如謂阿克蘇等處仍須籌備軍糧則正可不必蓋大兵現在起程進𫝊可以計日成功又據永貴等奏軍營糧餉已由闢展挽運加以屯田收穫回人輸助自可源源接濟著傳諭該督所糴糧石應酌量賑務需用情形辦理並曉示商民俾知採買穀石原以供本地之用非為籌備軍糧起見庶庸愚無識之人不至張皇𫝊說永貴摺並著録寄閲看辛卯諭定邊將軍兆惠等招撫波羅泥都各事宜上諭軍機大臣曰富德奏稱伯克霍集斯請遣伊親信之伯克巴喇特以回字文書招撫波羅泥都並據稱此策有效當受恩榮但慮不能成事為懼等語伯克霍集斯既感激朕恩招降以離賊黨深可嘉悅著加恩賞給縀匹至伊輸誠設䇿果如所算自必加恩萬一波羅泥都執迷不悟罪有所歸與霍集斯何與若波羅泥都悔過歸誠即令其從征葉爾羌事竣再來京入覲若但遣人乞降當以從前諭㫖及此次招降皆因波羅泥都人頗誠實不似霍集占之狂悖如欲免罪安生非親身前來不可著𫝊諭兆惠富德等遵照辦理又諭曰富德奏稱黑龍江署參領巴岱在瑚爾起等隊內奮勉出衆等語巴岱著賜號額爾克巴圖魯賞銀一百兩又回人摩里斯拉木至和闐額里齊以大兵前來曉示賊衆致被戕害甚屬可憫雖經賞伊家屬房産仍賞銀五十兩著富德傳諭回衆知之諭定邊將軍兆惠等豫籌移駐回人各事宜上諭軍機大臣曰據舒赫德等奏稱酌議平定回部後將各城回衆稍令休息於十分內派出一分遷往伊犂屯田餘人令其協助資糧其從前曾往伊犂者仍行派出等語雖有所見尚未深悉情形此等烏沙克回人與厄魯特雜居年久未免漸染惡習反覆無定恐駐防兵丁數千人難於彈壓此次進兵尚應大加懲創其餘脅從之衆亦不便居其故地或移往吐魯番安插距內地既近而額敏和卓亦能約束朕此意是否可詢問額敏和卓令其議奏至各城回衆數年來甚覺窮困驟行遷徙勢必不能或一二年後再選老成謹慎之人前往伊犂安插至伊犂駐防糧餉於回人應交貢賦內酌量折收米石運往支給似亦可行雖非現在急務自此次第辦理亦甚妥協併著兆惠等定議具奏壬辰申諭定邊將軍兆惠等招撫波羅泥都事宜上諭軍機大臣曰兆惠奏稱現在進取喀什噶爾伯克霍集斯所遣招降波羅泥都之人若即行遣往轉使賊人知我聲息擬將伯克巴喇特帶領行走相機差遣等語霍集斯招降波羅泥都之議係遵朕諭㫖昨富德具奏又已降㫖奬賞若慮賊人知我聲息則我兵自阿克蘇起程賊豈全不知覺且富德奏請差遣之人兆惠又復留待轉使霍集斯生疑至若臨時招撫波羅泥都必謂先期未見遣人此特懈我衆心必致徒增疑懼著𫝊諭兆惠等仍遵前㫖將伯克巴喇特即行遣往諭參贊大臣舒赫德等調回西安兵丁上諭軍機大臣曰據兆惠等奏稱派出西安兵五百名聽候臺站調遣餘兵一千五百名交駐劄大臣於阿克蘇烏什等處分防等語兆惠正當需用兵丁之時轉將西安兵存留者蓋因伊等不習勞苦耳但即留駐阿克蘇亦恐無禆實用徒糜糧餉不若遣回本營可𫝊諭舒赫德將此項兵丁約計從阿克蘇至巴里坤程期給以口糧令其步行回巴里坤仍將伊等未習勞苦不能從征自後宜加奮勉務為有用之人明白曉示至巴里坤日著清馥照例辦給車輛遣回西安諭巴里坤辦事內閣學士清馥等派兵搜捕嗎哈沁上諭軍機大臣曰定長等奏稱主事富奎等領兵七十名搜捕盜取烏魯木齊牧羣之嗎哈沁等至博克達山遇賊百餘殺賊四人奪馬六匹仍前往追𠞰等語所奏殊未明晰富奎所報百餘人或通計家口則我兵自可盡行俘獲但伊等帶領者係緑旗兵以致疏脫耳著𫝊諭清馥等巴里坤有存留索倫官兵即選派百餘名於內地現送馬匹內撥給二百餘匹令其追及努三前往搜𠞰若現無存留索倫而努三處亦係屯田兵丁即停其追𠞰俟來年大兵凱旋時再行辦理俱著𫝊諭知之命革驍騎校額爾登保職效力贖罪上諭軍機大臣曰成衮扎布等奏稱薩拉布拉克卡倫驍騎校額爾登保往追盜馬賊人遇雨迷踪已飭令前赴扎隆阿軍前效力自贖等語額爾登保係卡倫侍衛馬匹被竊即有應得之罪及追捕賊人又復中途轉回成衮扎布等不行奏請治罪未免姑息今既經復往著𫝊諭扎隆阿將額爾登保革退驍騎校自備資斧效力倘仍前疏懈定行從重治罪命奬賞烏梁海內大臣察達克等官兵上諭軍機大臣曰成衮扎布奏烏梁海內大臣察達克聞知歸併伊等管轄之庫庫勒濟等逃走即領兵前往追獲等語察達克著加恩賞縀四端其所領官兵照近日車木楚克扎布出兵之例賞給定邊將軍兆惠等疏奏進𠞰事宜兆惠等奏言臣等前奏派馬步兵各五千名進取喀什噶爾其和闐一路已派兵五千仍酌派三四千名令巴祿帶領由巴爾楚克路與富德會合嗣於六月初八日內地送馬全到臣等領兵九千名又巴祿領兵三千三百名於十一日起程十九日准富德咨送奏稿以巴祿所領兵少不能刻期㑹合宜令據守葉爾羌喀什噶爾兩城要隘聽臣兆惠調遣仍候臣等信息臣等查葉爾羌在南喀什噶爾在北相隔二百里如專攻葉爾羌則喀什噶爾據我之右且逃往霍罕拔達克山各路俱不能堵截又慮富德隊內兵少是以令巴祿協助今據咨仍令隨臣等行走亦不暇往來商議即率同往取喀什噶爾若霍集占自葉爾羌來援富德即可乘虛取城或喀什噶爾先得可與富德并力攻取葉爾羌又據富德咨由和闐行走二十日可抵葉爾羌臣等亦約計六月二十一二日可抵喀什噶爾奏入報聞辦理屯田副都統定長等疏奏烏魯木齊增墾畝數定長等奏言臣等查屯田舊墾共三萬三千五百四十五畝今年增墾一萬零四百七十四畝因有閏月又督課官兵於烏魯木齊等處增墾八千七百七十二畝播種粟米計新舊地共種過五萬二千七百九十一畝奏入報聞乙未陜甘總督楊應琚疏奏豫籌屯田事宜楊應琚奏言臣欽奉諭㫖豫籌駐兵屯田事宜俟大兵捷音一奏臣即遄行與將軍等㑹商駐兵事冝至辦理屯田必須先事籌畫方可無誤春耕查特訥格爾昌吉羅克倫等處地氣和暖且與烏魯木齊相近可徑行運送伊犂增兵屯田實為善策查烏魯木齊現有屯兵一千名臣擬於凱旋緑旗官兵內截留五千名以四千分墾地畝以一千豫備差遣明年收獲即可供伊犂糧餉俟伊犂屯田又可接續其巴里坤有屯兵八百名應將安西提督移往駐劄其移駐及增兵事宜臣再行㑹商定議此時農具籽種最為緊要查前督臣黃廷桂曾於上年冬月辦過籽種二萬八千石運到闢展一萬一千餘石農具一萬三千副現貯哈密農具六千餘副今於肅州雇得商駝四百餘隻請將應送烏魯木齊等處農具籽種口糧按程給值源源轉運至耕田牲隻亦屬要需查甘省各提鎮原有孳生兒騍馬匹擬於此內挑選一二千匹七八月間即令送往巴里坤牧放以備調撥奏入得㫖所見已得大要矣一切悉心為之丁酉調定邊將軍兆惠等豫籌駐兵事宜上諭軍機大臣曰舒赫德奏稱庫車以內吐魯番以外庫爾勒玉古爾等處俱有舊城且距內地不遠可以形勢連絡應擇要地築城駐兵照安西之例酌設提督總兵一員多派緑旗兵屯田以供糧餉既可約束各城回人而伊犁駐防亦不患單弱等語平定回部後築城駐兵自應豫為籌畫著𫝊諭兆惠富德等俟應行辦理時酌量定擬具奏朕意葉爾羌喀什噶爾全定霍集占兄弟俱獲仍著舒赫德於阿克蘇駐劄督辦一切事宜若逆賊等有逃遁者則仍應於葉爾羌駐兵堵截查拏始可彈壓諸城俱著兆惠等就地方情形辦理務期永逺寧謐諭護軍統領努三合策應兵𠞰賊上諭軍機大臣曰努三奏稱因烏魯木齊牧羣被竊領兵三十餘名前往博克達山一帶搜捕等語努三領兵甚少奮勉可嘉已諭清馥等將巴里坤存留索倫兵選派百餘名前往策應以壯軍威諭辦理屯田副都統定長等查辦倒斃牲隻上諭軍機大臣曰努三奏稱查核烏魯木齊屯田牲隻倒斃分數過多頗屬明晰著𫝊諭定長等詳行查辦將交收牧放官員按其倒斃分數察勤惰以定功過併𫝊諭努三知之命選派司員筆帖式等委辦阿克蘇等城事務上諭軍機大臣曰舒赫德奏稱阿克蘇等城交收回人貢賦查核户口數目需員承辦請揀發通曉蒙古語言文字練習事務之司官筆帖式等以備差委等語著於部院內揀選司官二員筆帖式四員前往阿克蘇隨舒赫德辦事癸卯定邊將軍兆惠等疏奏波羅泥都逃竄喀什噶爾回衆迎降兆惠等奏言臣等進兵喀什噶爾閏六月初三日至伊克斯哈喇據前隊參贊大臣明瑞所派之游騎巴圖魯侍衛伍岱等夜聞行走聲息即行圍截見回人六騎稱係喀什噶爾投誠之人因波羅泥都將伊等搶掠潛行逃遁伊等來迎大兵等語臣等逐一詢問稱係阿琿和濟默爾伯克和沙勒沙咱木沙扎巴爾呢雅斯俱喀什噶爾人又烏什回人額敏係霍集斯之族弟告稱去年被霍集占迫脅久欲歸誠今波羅泥都同霍集占逃去我等同喀什噶爾舊伯克奉書來迎臣等譯看呈詞云喀什噶爾大小人等謹呈阿克蘇等處駐劄將軍大人伯克霍集斯今波羅泥都將喀什噶爾男婦驅逐出城至哈喇刻爾我等仰慕大皇帝仁化復回城中看守波羅泥都同其親信人等至提斯衮暫住我等馬匹牲隻皆為所掠無力追奪且河水難渡懇大兵速來救援庶波羅泥都不致遠揚布魯特不來搶掠等語臣等詳加詰問據稱波羅泥都去年在葉爾羌被鎗矢傷因重甲未透曾遣人與霍集占計議投降霍集占不允遂分途通使拔達克山霍罕額爾德尼等處拔達克山已有回音不知何語後阿卜都克勒木兩次與波羅泥都議事聞霍集占於四月內即將家口行裝俱移往葉爾羌迤西羌呼勒之赫色勒塔克若大兵復來則逃往拔達克山波羅泥都諸事俱與親信之烏沙克塔喇沁伯德爾格瑪呼斯之厄魯特密議不令我等知之惟索取糧馬所得之物六月初十以前陸續運至塔勒巴楚克河僅與親信人等在城居住六月十五日據卡倫人報稱有布魯特百餘人在城西北之阿喇古搶掠波羅泥都令鄂斯璊伯克優駑斯伯克等拒之於濟德朗塔拉大為所敗鄂斯璊等俱得傷自此每日作為出兵之狀向我等凑集資裝二十七日突將我等兵器奪去將男婦帶至提斯衮復奪其衣服而去臣等復詢和濟默爾等波羅泥都兄弟究竟逃往何處爾等何不擒獻顯係誘我大兵輕裝前進據稱伊等遣使霍罕未有回音且慮布魯特搶掠必不敢前往惟霍集占於四月間即已遷移家口輜重而拔達克山使人已回又曾餽送拔達克山之克卜察克等部落禮物或係逃往其地我等實無力擒拏並無别情臣等詢問葉爾羌喀什噶爾從賊逃去者係何等人户現餘户口若干其喀什噶爾村莊種植若何據稱不知葉爾羌逃去人數其喀什噶爾之人波羅泥都帶去一百五十户又親信之烏沙克等男丁千餘口家口亦多我等百餘户內有帶去者此時亦多逃回計本城所屬共一萬六千餘户人五萬餘口其汗額里吉衣雅普爾古烏什哈喇城之人俱各自保守牌租阿巴特有千餘户亦不肯從賊彼此相拒此時不知勝負至所種地畝大麥已熟小麥尚未收割本城之阿奇木伯克墨氐敏伯克阿卜都爾璊俱被賊帶去城內街市俱焚城門亦燬有伯克托喀等現在修理等語臣等察看伊等投誠情形屬實但波羅泥都早已逺揚臣等議先攻喀什噶爾原欲斷其逃竄之地今約計趲送和闐馬匹閏六月初十間可到阿里衮巴祿之兵亦可抵巴爾楚克葉爾羌喀什噶爾既差人分途迎降想富德等自必聞知速往追襲現在來投人等雖無可疑而受降如受敵自應倍加謹慎不必輕騎先進即領現在馬兵三千名前往安撫一面偵賊踪跡若果赴拔達克山即直入其境宣示軍威曉以利害相機索取擒拏又和濟默爾等告稱沙喇斯瑪呼斯厄魯特已經離心恐竊取霍集占牲隻逃走亦行文策布登扎布令其隨路留心截殺奏入得㫖下部知之定邊右副將軍富德疏奏脫出回人等信息及進兵日期富德奏言六月十八日卡倫送到葉爾羌脫出額里齊回人郭爾拜默特等詬據供稱去年被阿卜都克勒木虜往葉爾羌聞知霍集占兄弟不協有伯克阿卜都瓜卜係伯克霍集斯之兄波羅泥都令其逃走等語十九日卡倫又送到從葉爾羌所屬薩納珠脫出賽里木回人海達瑪特等據供去年霍集占在庫車敗逃將賽里木伯克阿布勒阿三虜去後聞大兵進𠞰復行戕殺我因逃至薩納珠聞大兵到和闐之信葉爾羌人等驚動霍集占將家口輜重移往哈子勒塔克又聞波羅泥都與伯克阿卜都瓜卜有恩帶往喀什噶爾後又令其逃往烏什必來尋霍集斯等語臣詢之霍集斯據告云我兄似難於逃出但波羅泥都果與霍集占不協伊與我兄相得或通信歸誠亦未可定若我兄果來願以家口保其必無虛詐等語臣伏思葉爾羌脫出回人至營須行走二十日若喀什噶爾至烏什不過六七日程期應早至兆惠軍營臣自得兆惠派送臣營馬匹信後不知於何日進兵除將前項信息咨行外未便竚候回音臣於閏六月初旬即領現在馬兵一千二百餘名緑旗步兵一千二百餘名空趕馬匹徑行戈璧向固璊薩納珠前進沿途探聽兆惠進兵日期又候馬兵丁八百餘名俟參贊大臣阿桂送馬到時與所帶牧馬兵丁七百餘名仍牽馬行走於攻城擒賊庶可得力奏入報聞參贊大臣舒赫德等疏奏派撥臺站馬匹及牌租阿巴特回人信息舒赫德等奏言臣等前奏和闐一路所設臺站相去頗逺馬駝疲瘦亟宜添補又進兵葉爾羌更需增設今向內地取馬三百匹以購自回人及留牧阿克蘇馬匹參雜派撥兆惠起程之際將阿克蘇至烏什臺站交臣等辦理自烏什以外派西安兵一百五十名察哈爾兵五十名吐魯番回人三十名令二等侍衛納林承辦喀喇沁臺站章京桑圖旺舒克巡查臣等隨撥馬一百二十匹駝一百隻交納林等帶往其烏什以內於中途撥馬二十匹駝十隻緑旗兵十二名回人八名安設一臺與兆惠等臺站相接至阿克蘇距和闐一千二百餘里所設六臺不敷馳遞臣等酌於每站之中各添一臺每臺派緑旗兵六名回人四名駝十隻派員帶領前往分駐并折給糧價銀兩仍令三等侍衛伊凌阿管轄又臣等於閏六月初五日准貝勒玉素富報稱克勒品卡倫送來喀什噶爾所屬牌租阿巴特回人額里訥則爾等據稱波羅泥都於六月二十七日將喀什噶爾大小人等欲移往拔達克山回衆不願同行逃來牌租阿巴特者甚多我等千餘户回人俱願歸順今向將軍處具呈因馬乏暫住等語隨經换給馬匹派員送往軍營臣等查玉素富所報歸誠人等既經送往兆惠軍營自必酌量辦理但富德軍營亦應知㑹臣等已於本日具文由臺站馳遞奏入報聞定邊右副將軍富德等疏奏續查奬賞效力回人富德等奏言臣等前奏兵抵和闐之日將效力回人等陸績查明酌量奬賞今查得現在隨營之伯克薩里於去年進𠞰葉爾羌奮勉效力從前擒達瓦齊時薩里先攀馬􅀈達瓦齊引弓欲射薩里刀斷弓弦達瓦齊之子羅卜扎刀斫其膊者三因著棉甲未透今來和闐凡傳唤開導回人事體俱明白勤慎是以遵㫖擬賞戴五品頂孔雀翎又管採金之三百户承辦金器之伯克特穆爾於侍衛齊凌扎卜等招撫和闐時將霍集占金四十兩獻出前往兆惠軍營未達復同阿里木沙從克勒底雅領兵至額里齊固守三月現在查出賊人馬駝羊隻甚多臣等擬賞六品頂藍領又哈喇哈什回人阿賚默特塔拉和卓因兄默默勒克沙在葉爾羌欲圖歸順為霍集占所覺伊兄與家口同被害伊身逃出阿卜都克勒木攻額里齊時伊兄阿比勒和卓又被賊殺伊復效力守城為瑚爾起嚮導殺賊一人奪駝四隻亦擬賞六品頂藍翎奏入報聞平定準噶爾方略正編卷七十四
