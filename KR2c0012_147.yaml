body:
  text: 乾隆二十五年十二月辛未朔參贊大臣舒赫德疏奏辦理烏什脫逃回人烏朗噶等事宜舒赫德奏言據烏什辦事伯永慶報稱十月初十日夜喀喇巴克回人烏朗噶及厄魯特察罕等帶家口二十餘人盜馬逃走比即派兵追捕並向布魯特索取等語臣因永慶已離烏什不可無辦事大員暫令道員德文管理又派侍衛巴常端濟勒圖領兵五十名前往策應嗣據永慶續報沿途查詢並傳諭布魯特各部落嚴行拏解於十一月初二日轉回臣查烏朗噶原係布魯特種類為霍集斯所信用今聞霍集斯留京恐續行解送遂起意潛逃正在辦理索取有布魯特特穆爾占前來貿易俟其回日派侍衛等同往查拏務獲奏入報聞壬申參贊大臣阿桂等疏奏驅逐闌入邊境遊牧之哈薩克等阿桂等奏言臣近派察哈爾營總烏巴什等領兵於各路搜查嗎哈沁十月二十日回營告稱在阿勒坦額默勒見有哈薩克三十餘人又伊犂河下遊和洛霍澌見哈薩克十六人俱諭以伊犂現有駐劄大臣令其前來投見臣等即傳集侍衛官員公同詢問據頭目赫德勒奎屯等俱稱上年在勒卜什過冬今遊牧千餘戶甫經移來等語臣阿桂諭以勒卜什等處乃天朝大兵平定之地豈可越境遊牧即著移回赫德勒等以天寒雪盛求於來春遷移臣等諭以爾等私行遊牧即應治罪姑念業為大皇帝臣僕且一時無知誤入今給爾印文回報該頭目限十日遷移倘仍復遲延即發兵驅逐隨遣令起程一面派兵二百名令副都統伊柱帶領前往驅逐臣阿桂前遣侍衛碩通領兵五十名搜捕嗎哈沁即令其會合接應奏入報聞乙亥議豫備阿克蘇牧放馬駝事宜參贊大臣舒赫德等奏言現在五吉等送馬三千匹至阿克蘇除送往伊犂及散給卡倫臺站兵丁外尚存九百餘匹恐不敷來年辦送伊犂官兵及葉爾羌等城之用請於巴里坤牧放馬匹內再行挑選或一千匹或五百匹解送阿克蘇再五吉送駝三百隻除補給臺站外其餘亦不敷用嗣後一切遞送伊犂事件應請就近雇用回人牛驢尚屬省便奏入得旨軍機大臣議奏尋議阿克蘇為回地總滙差務紛繁自應多備馬匹以供調撥應如舒赫德等所奏在巴里坤牧放馬匹內挑選一千匹於來年草發時解往再臣等愚見阿克蘇附近之地尚有牧放處所似應將巴里坤馬匹陸續解送阿克蘇如蒙俞允請於來年從巴里坤再行解送一千匹以備調撥至駝隻現在不敷酌量雇用回人等牛驢既省內地購辦之煩而回人等支領租價亦於生計有益俱應如所奏辦理奏入上從之丙午葉爾羌辦事都統新柱等疏奏回城鼓鑄事宜新柱等奏言辦理鑄錢同知坤豫於八月至葉爾羌九月開爐鼓鑄十月十五日據辦理糧餉原任按察使圖桑阿等報稱共動用庫貯紅銅二千餘斤鑄錢二千五百串俟鑄足六千串時均勻散給葉爾羌喀什噶爾和闐等城以新錢一文換回地舊普爾二文銷燬更鑄臣等查庫貯銅七千餘斤可得錢一萬餘串以此兑換回錢更鑄新錢始可流通計每次鑄足新錢六千串時即兑換舊錢一次但喀什噶爾和闐等處兑換錢文恐有遲滯臣等酌量行文令各城派出頭目收集舊錢前來兑換至回人等交納官錢應於葉爾羌等三處各散給新錢二千串之後下月初次交納新錢三分二次六分三次九分四次全交新錢每次交官新錢即折給官兵鹽菜銀兩如有不足始搭用舊錢若庫內有存貯舊錢亦酌量全行搭放鼓鑄俟新錢至十萬串即將回地普爾全行收集銷燬併出示停其行使又據葉爾羌阿竒木伯克鄂對等呈從前噶爾丹策零時因鑄普爾十萬串須收舊普爾二十萬串恐不敷鼓鑄將回人所用銅器以錢一斤換銅二斤始應用無誤亦請照此辦理臣等查詢情形於回人並無虧損而錢文可以速成亦咨會舒赫德行文海明丑達一體辦理奏入報聞己卯命更換軍前厄魯特侍衛等軍機大臣奏言查軍前所有厄魯特二等侍衛烏魯木三等侍衛雅賽藍翎侍衛額卜克特塞卜騰鄂勒錐圖俱乾隆二十三年派往軍前送馬懇留效力之員今出兵已閲二年應請派員更換謹將在京之厄魯特侍衛碩通等十三人引見俟奉旨派出照例給與整裝銀兩作為二起馳驛遣往阿克蘇三員伊犂三員有願擕家口者準其帶往奏入得旨著派碩通和屯烏勒木濟達什扎卜都卜珠爾策伯克俟入覲回人轉回時派出照看仍交派出大臣管領命以厄魯特藍翎侍衛策伯克為三等侍衛賞給巴圖魯號上諭軍機大臣曰厄魯特藍翎侍衛策伯克前隨璊綽爾圖被圍既不從賊亦未逃避他往且覔路回至軍營甚屬可嘉著加恩授三等侍衛賜卓里克圖巴圖魯號仍賞銀一百兩庚辰訓飭陜甘總督楊應琚查奏甘省軍需馬匹墊項上諭軍機大臣曰前據蔣炳奏稱甘省各營承辦軍需馬匹墊項約銀八九十萬兩是以傳諭該督撫令其查明實數具奏以便頒發加恩諭旨今該督所奏雖未奉到前諭自應將歷年免過若干現在餘欠若干分晰開除乃斤斤預計明年未扣之公糧謂可抵補有餘殊屬牽混夫新疆底定無用多兵則省費乃國家經權之道豈可僅為抵補起見至歷任承辦及伊經手之項分别臚列未免意存畛域著傳諭楊應琚即速據實查明二十一年夏季以後供墊各項除歷次豁免及曽經抵扣外現在欠數若干務於歲內奏到候朕降旨加恩乙酉命以三等侍衛布占泰為二等侍衛上諭軍機大臣曰三等侍衛布占泰從前兩次差往布魯特招服頭目明伊勒哈霍什克伯克等甚屬奮勉著加恩授為二等侍衛參贊大臣舒赫德等疏奏奬賞急公回人事宜舒赫德等奏言伊犂屯田回人籽種口糧衣裝俱經各城回人捐助遵旨酌量奬賞查阿克蘇庫車烏什等城回人俱量其生計饒乏均勻資助未免人數過多若偏行賞給勢有難周現在各城接濟官兵口糧牲隻尚須回人等往來運解牲隻不無倒斃來年正月又添駐回人五百户生計尤不免竭蹶請將來交納官糧蠲免十分之一俾得均霑恩澤至葉爾羌喀什噶爾和闐三城距伊犂頗逺雖亦稍有資助未便一體奬賞奏入報聞烏魯木齊辦事御前侍衛副都統安泰等疏奏烏魯木齊等處收穫分數安泰等奏言據總兵官金梁詳報烏魯木齊昌吉羅克倫等五處村莊所收麥黍等穀共九萬四千八十九石有竒臣等查村莊地畝肥磽不同而官兵等皆能盡力工作計將收穫穀數折作米麵可得六萬四千九百五十二石九斗有竒足敷五千三百餘人四年零三個月之食自屯田以及各項差遣兵丁俱得贍給應請照例議敘其守備千把總等官應請一併酌量議敘奏入報聞丙戌諭參贊大臣阿桂曉示哈薩克等遷移遊牧上諭軍機大臣曰阿桂奏據哈薩克等告稱伊等使人拜克奈回至遊牧曽言大皇帝加恩將愛古斯等處賞給我等遊牧等語從前哈薩克使人入覲奏請在塔爾巴噶台遊牧朕即面諭不允又載入敕書此特哈薩克等希圖僥幸造言生事現在納旺等帶領哈薩克使人將至京師朕仍以阿桂所奏哈薩克等造言生事之處再行申諭並敕駐劄大臣嚴行驅逐著傳諭知之命巴里坤等處大臣購辦烏魯木齊等處屯田牲隻上諭軍機大臣曰安泰等奏稱烏魯木齊等處屯田需用牛隻請交烏里雅蘇台大臣向喀爾喀等採買一二千隻陸續解送等語此事殊為不便今喀爾喀等以馬匹牲隻赴巴里坤哈密貿易者頗多著傳交各該處駐劄大臣就近酌給價值購辦或兼用驢頭其力亦與牛相等並傳諭楊應琚於肅州一帶量為採買解送俱著遵照辦理申飭陜甘總督楊應琚查奏軍需馬匹欵項上諭軍機大臣曰陜甘兩省各營承辦軍需馬匹銀兩昨經諭令該督等作速查明實數具奏惟是軍需馬匹歷任督撫先後承辦事屬一體乃楊應琚等屢次摺奏以黃廷桂任內所辦與伊等經手之項兩相較量多寡所見甚小至摺內所稱墊用字樣尤屬非是試思連年承辦軍需一切欵項果係何人墊辦耶况以扣缺公糧抵補前項乃朕格外特恩該督等又何得以節省經費竟視為應行抵補之項耶楊應琚久任封疆向來辦事從未至如此之謬今此奏立意措詞均未得體著傳諭知之陜甘總督楊應琚疏奏籌辦哈密貿易事宜楊應琚奏言本年十月準舒赫德移送奏稿內稱有布魯特塔什罕等回人來阿克蘇貿易欲將所得銀兩前赴哈密貿易因時屆秋深令其轉回等語臣查外藩回人貿易銀兩若向內地置辦貨物可以漸次收回甚有禆益業經欽奉諭旨準其往來臣擬照新疆貿易之例行知該處辦事大臣善為妥辦奏入報聞壬辰宗室公如松等率葉爾羌喀什噶爾阿克蘇和闐烏什庫車沙雅爾賽里木拜諸回城伯克等入覲上幸瀛臺四品伯克薩里等三十三人於西華門外跪請聖安上面加慰問隨於瀛臺賜食上還宫召薩里等至重華宫賜茶果癸巳上御西厰幄次賜朝正外藩蒙古及回部郡王霍集斯等宴并命葉爾羌諸回城伯克薩里等預坐賜冠服幣帛有差參贊大臣舒赫德等疏奏補授各城伯克及分給官田事宜舒赫德等奏言查伊犂三品阿竒木伯克現將額敏和卓之子木薩補授總管屯田回人應將於吐魯番回人內補授伯克一二人以資協辦查伊犂阿竒木之外自四品伊沙噶至阿爾巴卜伯克凡十五缺其間尚有應裁應增或將來續放或於阿克蘇等城補放之處再行酌定至庫車哈喇沙爾有應行補授之伊犂都官阿爾巴卜二缺請即交該處駐劄大臣令阿竒木等保送補授帶領庫車沙雅爾賽里木拜多倫等屯田回人前往伊犂其葉爾羌等城伯克品級俱經臣等陸續定擬具奏惟賽里木拜二城阿竒木伯克等前因入覲今已轉回臣等酌定賽里木三品阿竒木伯克一員四品伊沙噶伯克一員五品噶雜納齊伯克一員六品哈子伯克一員七品明伯克密喇卜各一員其拜城較小酌定阿竒木伯克為四品亦定缺六員將哈子伯克明伯克密喇卜俱定為七品並將保送人員列單恭呈御覽其阿克蘇城向有巴濟格爾伯克一缺管理貿易又阿克蘇所屬有多倫回人四百餘户請設伯克管轄阿克蘇錢局派出回人分往雅哈里克溫巴什二處採銅每處亦請設伯克一員再從前酌定葉爾羌等處伯克有撥給官田及屯田餘丁一項庫車沙雅爾賽里木拜等城尚未酌給請一體辦理造册備查以資辦公奏入得旨如所請行丙申命參贊大臣舒赫德回京上諭軍機大臣曰舒赫德在軍前年久應派員更換著左都御史永貴帶領此次入覲之回部伯克等前往與舒赫德交代後舒赫德即起程回京命乾清門侍衛額爾登額等輪班在回部行走上諭軍機大臣曰此次入覲之回部伯克等起程時著派乾清門侍衛額爾登額伊德殷濟圖隨同永貴照看前往即留於駐劄大臣處聽候差遣其來年入覲之回人等著棟保訥齊訥帶領前來嗣後乾清門侍衛等即照此輪班行走命議敘參贊大臣阿桂等及升賞擒獲嗎哈沁官兵參贊大臣阿桂奏言從前察卜沁臺站馬匹被嗎哈沁盜竊副都統豐訥亨領兵一百名追至朱爾都斯因風雪迷蹤轉回臣仍令豐訥亨再往搜捕十一月二十一日據回報十月初四日至阿爾薩拉圖見有馬迹即令厄魯特藍翎侍衛塞卜騰署參領伊屯索倫署防禦額特訥等尋蹤追逐豐訥亨等向哈爾巴琿河令巴圖魯侍衛翹蘇爾堵截遇數賊為塞卜騰等擊敗隨尾追至夜賊棄馬登山翹蘇爾塞卜騰伊屯額特訥攻圍射殺賊四人擒賊一人豐訥亨遂過察爾圖嶺十五日翹蘇爾同藍翎隊長德爾塞行至烏納哈特嶺遇賊二十餘人擒獲五人詢係偷竊臺站馬匹之嗎哈沁豐訥亨等隨往接應翹蘇爾餘賊固守山險復攻潰擒獲數賊供稱有嗎哈沁在哈爾扎卜藏匿二十三日行至哲爾圖捉生詢問知賊在圖爾根河隨舍馬步行追入藍翎隊長特英額索倫兵哈濟噶爾斗濟勒圖等遇賊擊敗窮追兩晝夜沿途斬獲賊人於特勒克等處覔得賊蹤十一月十一日翹蘇爾等攻奪賊人馬羣詢知賊人特固斯孟克在伊克特勒克河源藏匿往阿圭雅斯打牲日內即回因分三路往迎十二日翹蘇爾等遇特固斯孟克奔逃協力擒獲計擒𠞰嗎哈沁男婦七十餘人獲馬五十餘匹臣阿桂等研訊特固斯孟克供係綽羅斯台吉昂吉岱之異母兄從哈薩克逃回偷竊臺站馬匹是實等語臣等查該犯屢拒官兵罪不可逭即同擒獲之得木齊巴朗等正法其所獲馬匹補給臺站奏入上諭軍機大臣曰據阿桂奏豐訥亨等領兵搜捕嗎哈沁擒獲偷竊臺站馬匹之庫本諾雅特台吉特固斯孟克等語阿桂豐訥亨此次搜捕逸賊奮勉可嘉著交部議敘巴圖魯侍衛翹蘇爾厄魯特藍翎侍衛塞卜騰甚屬奮勉翹蘇爾著加恩授為二等侍衛塞卜騰授為三等侍衛德爾塞著授為藍翎侍衛伊屯授為前鋒章京特英額授為護軍校額特訥斗濟勒圖哈濟噶爾俱賞戴藍翎其餘官員俱交部議敘兵丁酌量奬賞又諭曰阿桂此次辦理嗎哈沁甚合機宜今正值天寒雪盛嗎哈沁等無處棲身必四散奔走自應不時派兵搜捕但搜捕亦豈能淨盡今伊犂現議編設佐領管束厄魯特等仍應廣為招撫俾其來投可以肅清地方併省派兵搜捕之力著傳諭阿桂等出示曉諭此時嗎哈沁等能悔罪來投即行收養若負固藏匿則擒殺無赦於各處要路張挂悉使聞知可酌量辦理命以厄魯特二等侍衛碩通為伊犂佐領上諭軍機大臣曰厄魯特侍衛碩通年來效力軍前頗著勞績今伊犂收養投順之厄魯特等編設佐領管轄碩通著授為佐領俟安插厄魯特漸多令其總管俱可伊有家口在京著阿桂等令碩通由驛回京擕眷前往議伊犂編設厄魯特佐領等事宜參贊大臣阿桂等奏言現在伊犂所有厄魯特及來年自阿克蘇肅州送到之厄魯特等共百餘名將來藏匿哈薩克布魯特人等聞安插之信必陸續來投若無管束章程非經久之策請嗣後來投之厄魯特等滿百人則編為一佐領揀選佐領一員驍騎校一員領催四名管束查伊犂厄魯特二等侍衛碩通烏魯木藍翎侍衛塞卜騰俱可委用至更換侍衛之時將在京及察哈爾居住之厄魯特侍衛等揀選派出令其新舊參用三年一換其兵丁等著有勞績者照緑旗兵給與錢糧新經來投之人但給口糧候補跟役家口等酌給籽種牛羊使之耕作孳息庶伊等皆有常業奏入得旨軍機大臣議奏尋議伊犂之厄魯特等皆陸續來投詢無抗拒情形且多奮勉效力頗著勞績之人自應籌畫養贍俾得久逺安生至從肅州阿克蘇發往及投入哈薩克布魯特等部落聞風歸附者必以漸增多亦當加以管束所有編設佐領驍騎校領催等官酌當錢糧養贍及自食其力俱屬可行其選派侍衛新舊更換之處亦應如所奏辦理臣等又查得近議更換軍前厄魯特侍衛於京城侍衛內派委六人遣往無庸另行選派其策伯克等六人應請行知阿桂等酌量奏補將編設佐領名册送部備查奏入上從之議運送伊犂牲隻什物事宜參贊大臣阿桂等奏言查伊犂駐兵屯田糧餉馬匹俱可不煩內地之力即貨物亦不過酌給鹽菜銀兩購買緞匹及紙筆等物所難得者牛羊駝隻布匹茶葉耳牛羊之辦解不無煩費駝隻之倒斃亦難購補以臣愚見若採買牛三千隻羊五萬隻在伊犂設立牧羣可永逺孳息再辦駝二千隻留一千二百隻於巴里坤為換班兵丁馱載遣往伊犂自伊犂撤回兵丁之駝則於巴里坤牧放以待下次換班其傷損必少查喀爾喀等旗牛羊尚覺充裕駝隻亦多似可酌量採買至烏里雅蘇台存貯布匹茶葉頗多亦請於解駝時酌量足敷官兵之用就便馱載抵扣鹽菜銀兩則公餉可省而私用亦便奏入得旨軍機大臣議奏尋議伊犂駐兵屯田所需牲隻每年採買解送實屬煩費臣等欽奉諭旨將達里岡愛商都達卜遜淖爾等處牧羣牲隻業經定議揀選解送伊犂阿桂等所請於喀爾喀採買之處應無庸議但臣等原議馬二萬匹駝一千隻牛六千隻羊六萬隻與阿桂等籌辦之數不符應請停其解送馬匹其牛羊則照所奏之數發往至駝隻既不必全行解送亦自可陸續購買請仍照原議先送一千隻再令巴里坤哈密大臣等購買足數以備換班之用至布匹茶葉為官兵所必需烏里雅蘇台存貯雖多未免逺隔且駝隻既由巴里坤哈密購買應請即將此兩處存貯茶葉布匹輕裝運送前往其辦送牛羊酌量分羣派兵陸續照管起程及官兵行糧整裝銀兩臣管與總管巴爾品會商續奏奏入上從之丁酉申諭禮部侍郎五吉等購辦伊犂屯田牛隻上諭軍機大臣曰五吉等奏稱購辦巴里坤商販羊隻二千餘此內得牝羊三百餘隻合之從前所購共羊一萬四千餘隻內牝羊一千三百餘隻以五百隻為一羣加意牧放等語昨阿桂等請將伊犂屯田牛隻在烏里雅蘇台購辦看來喀爾喀等赴巴里坤等處貿易者頗多則牛隻亦自必不少昨已諭伊犂牛羊俱由牧羣揀送駝隻在巴里坤哈密購買著傳諭五吉等仍行購買牛隻解送烏魯木齊備用命録用回人阿克伯克及奬賞布魯特阿瓦勒比上諭軍機大臣曰海明奏稱前因英噶薩爾之阿竒木伯克素勒坦和卓入覲係色梯巴勒氐署事又往辦牌租阿巴特之阿奇木事務故令伊弟阿克伯克暫署今素勒坦和卓已回阿克伯克無應辦之事等語阿克木克暫署阿奇木以來辦事既屬妥協著交與舒赫德俟有阿奇木伊沙噶等伯克缺出將阿克伯克酌量補用又諭曰海明奏布魯特沖噶巴什之阿瓦勒比查出伊屬人搶掠安集廷什物給回此次又查拏盜馬回人烏朗噶等擒獲賊黨甚屬奮勉等語阿瓦勒比著再加恩賞緞二端所差屬人等各賞銀三兩仍以加恩奬賞之處傳諭知之訓飭喀什噶爾辦事都統侍郎海明陳奏不實上諭軍機大臣曰從前海明奏解送助逆賊犯十六人來京此內愛瓜爾和卓請發回正法朕以此等賊犯解送已久將次抵京且據阿里衮所奏情罪相同而海明又未聲明應行發回之由因傳諭查詢今據奏覆牽引前後定罪情節輾轉紛繁意圖掩飾從前海明所見即屬拘泥糊塗此次更為瑣屑人誰無過况在萬里之遙一時意見不到經朕訓諭即直承錯謬必加原宥乃掩飾其詞以圖文過尤屬非是海明係駐劄大臣此事雖屬既往將來遇有要務亦如此倉皇掩飾非徒無益且貽笑於回人矣著傳諭海明嗣後遇一切事件務加意奮勉據實辦理不可少存欺飾之見葉爾羌辦事都統新柱等疏奏三等侍衛明仁等奉使拔達克山等處情形新柱等奏言明仁額爾登額奉使拔達克山等處帶領官兵於十一月二十日回至葉爾羌告稱前於九月初七日至拔達克山素勒坦沙在瑪沙特部落與塔什瑪木特相攻聞信遣人來迎並懇前至攻戰處所明仁等因伊有仰藉天朝威德之意初十日行至該處素勒坦沙出迎跪接敕諭甚為恭敬隨以賞物傳旨頒給素勒坦沙感激致詞向東叩謝復言此塔什瑪木特係我族姪久相攻擊今聞天使前來始率所屬六百餘户歸附等語明仁等向塔什瑪木特加以慰勉素勒坦沙又言春間塔勒罕來攻今痕都斯坦又欲來攻祈示退敵之法明仁等告之云爾可恭奉大皇帝敕諭詳細紬繹素勒坦沙云聖諭訓示周詳當敬謹遵循但從前奏懇發兵萬人𠞰滅讐敵未知可否明仁等又云我等來此正為察看情形今自瓦罕沿途訪問爾遊牧人等俱稱爾與鄰部互相搶奪習以為常非實有讐敵來攻豈敢代奏請兵况我等奉使兩次不過五十人爾等尚難供給况萬人糧餉乎且爾既招服塔什瑪木特痕都斯坦等亦因爾為天朝臣僕不敢加兵皆我等目擊安敢揑詞陳奏爾惟凛遵敕諭和協鄰封等語素勒坦沙云我等既歸順大皇帝仁化雖死亦願東向何敢復存異見懇求將我奏章轉達等語隨受其奏摺於九月二十二日自拔達克山起程十月初六日至博洛爾沙瑚沙默特所居之雅爾琿伊母率其弟沙瑚沙伯克及衆伯克來迎據稱沙瑚沙默特因姻戚沙塔拉爾部落被攻前往應援聞有大皇帝敕諭即欲來迎而沙塔拉爾之瑪木特索丕再三懇留請先將敕諭頒給伊母等語明仁等不允隨遣侍衛什格阿奇木伯克素勒坦和卓先往傳諭十月二十四日沙瑚沙默特率數十人來迎跪請聖安恭奉敕諭隨給以賞物沙瑚沙默特感激叩首稱謝遂恭進奏章及貢馬匹鷹犬軍器等物明仁等接受起程行至沙爾琿有謙珠特之伯克黑斯婁向係葉爾羌所屬每年納金三兩因年來被兵力薄僅交一半而所遣又非大頭目前經辦事大臣駁回今仍懇代進明仁等受其帕爾西字奏章一件吐魯番郡王書一件與臣新柱臣額敏和卓會議該伯克情頗懇誠仰體聖主萬物一體之至意酌量收受其每年常貢若遣伊子弟及大頭目等交納即照常代進伏候訓示奏入報聞平定準噶爾方略續編卷八
