body:
  text: 乾隆二十三年夏四月戊辰定邊將軍兆惠等疏奏哈薩克錫喇等信息兆惠等奏言臣等於三月十四日過阿勒坦額默勒至眀布拉克㑹合詢問兩路俘獲人口俱稱哈薩克錫喇鄂哲特等揀選馬駝渡伊犂河或云在山僻藏匿或云逃入回部十五日侍衛占頗圖等報稱哈薩克遊騎五十餘人前來臣等唤來詢問稱係阿布勒該爾汗之子額爾類之人額爾類領兵五千名於伊犂遇哈薩克錫喇所擕餘衆將及百户盡行掠取哈薩克錫喇惟帶一人逃走追之不及臣等告以去年阿布賚等歸降承受大皇帝恩澤爾額爾類應照霍集伯爾根等之例來見隨令侍衛納蘭圗等同伊等游騎前往俟額爾類回覆再行具奏奏入上諭軍機大臣曰昨據兆惠等奏擒勦恩克圗塔爾巴等之奮勇效力官兵已令分别議叙至色布騰巴爾珠爾夤夜鏖戰致受重傷著加恩復封親王厄魯特二等侍衛達什策凌驅賊牧羣攻奪山險又應援色布騰巴爾珠爾著加恩授為散秩大臣給與三品世職仍賞銀一百兩伍岱授為三等侍衛錫勒都內授為藍翎侍衛其現戴奬賞翎者加賞縀各二端自將軍兆惠等至效力官兵俱交部議叙此次進勦頗合機宜但據哈薩克游騎所稱哈薩克錫喇脫身逃走窮蹙已極兆惠等宜遣二三十人乘健馬往追而必候哈薩克來信尚未愜朕心昨命兆惠事竣來京今渠魁未獲難云竣事務宜加意追擒以正國法再富德追勦布庫察罕信息若何作速奏聞又諭曰從前阿睦爾撒納副班第平定伊犂命色布騰巴爾珠爾同行曾諭以阿逆狡詐難信當留心體察若妄動滋事即行辦理伊若稍有識見雖不能辦理亦當據實陳奏乃伊來京並無一語設在他人竟似與阿逆相通矣朕因革其王爵以示懲戒此次遣往軍營伊自悔前愆頗知奮勉是以復封親王所封王爵在伊家達爾漢親王之外伊為朕子壻有過則督責之能改則體恤之似此效力行走庶幾不負教育之恩而於衆內扎薩克更增光寵著通行曉諭知之恩賞派送軍營牛馬之喀爾喀兵丁上諭軍機大臣曰解送巴里坤之豫備軍營牛馬已派公扎拉豐阿同侍衛等前往但沿途須有防護兵丁若遇嗎哈沁等亦可乘便搜勦著𫝊諭成衮扎布就近派喀爾喀兵一百名遣往推河豫候仍照出兵之例減半賞給銀兩以示體恤厄魯特雅賽等授職賞銀有差上諭軍機大臣曰綽和爾鄂拓克之雅賽於擒勦吞圗布時曾求為嚮導及伊等游牧叛逃復捐棄妻子偕其弟瑪木特來投效力軍營甚屬可嘉雅賽著加恩授為三等侍衛在上駟院行走賞銀三十兩瑪木特著在司轡上行走賞銀二十兩其克勒特鄂勒椿等十八人俱曽隨軍效力著加恩賞銀各十兩在察哈爾旗分安插大學士管陜甘總督黃廷桂疏奏豫籌屯田事宜黃廷桂奏言伏查巴里坤至伊犂分駐官兵屯田由近及逺漸次舉行凡厄塞諸處一切修建城堡分别營站仍聽將軍臣兆惠辦理至屯田需用牲隻我皇上特敕太僕寺解牛萬頭極為充裕其鑄造農具請於秋冬酌量運送計由巴里坤至烏魯木齊南路一帶如闢展托克三哈喇沙爾等處今歲俱已種植自烏魯木齊以內察罕烏蘇穆壘北路一帶未設臺站舊係噶爾藏多爾濟部落地多砂磧難于開墾由穆壘至烏魯木齊一帶則可墾之地最多近因哈薩克貿易派同知范清曠承辦並遵㫖㨂選副將一員帶兵二百名管押貨物應請乘便遴委道員同往彈壓即於經過之處將曾否開墾地畝及氣候寒暄土脈肥瘠水泉多寡繪圖貼說臣再加酌議請㫖遵行奏入報聞己巳命封額敏和卓為貝勒上諭軍機大臣曰吐魯番貝勒品級額敏和卓效力軍前備抒誠悃朕心嘉悅著加恩實封貝勒仍以參贊大臣同將軍等辦理軍務又諭曰現在雅爾哈善額敏和卓進取回部自可立奏膚功但擒獲逆酋後仍另選本處伯克令其辦事伊等俱係新附恐一時難知賢否且伊犂駐兵屯田關係甚重亦宜豫為籌畫從前伊犂地畝皆回人耕種今俟回城平定即將回人酌量遷移與緑旗兵參雜額敏和卓係回部望族應同將軍大臣等管束屯田兵丁俟耕作嫻習主客相安再回吐魯番方為有益昨已諭將軍成衮扎布擕眷駐烏里雅蘇台額敏和卓若願擕眷前往伊犂亦准其同往至一切進𠞰事宜額敏和卓頗屬實心效力已命實封貝勒嗣後益加奮勉策勳懋賞朕將疊沛殊恩可𫝊諭雅爾哈善額敏和卓知之庚午定邊將軍兆惠等疏奏進勦賊衆情形兆惠等奏言臣策布登扎布令副都統職銜溫布搜捕賊衆至額爾克騰鄂拓克三月初九日在鄂爾多布拉克之察起爾山追及賊衆奪其營壘殺賊四十餘人十三日偵知圗古里克有巴爾達穆特十餘户即令溫布敦多克往勦臣兆惠于十四日過阿勒坦額默勒見有塵起令公眀瑞往探隨進兵攻擊㑹溫布等正在擊賊眀瑞擒獲濟喇特轄默爾根等餘賊及家口俱行勦殺詢默爾根云數日前有推素隆集賽八十餘户亦由圗古里克逃往鄂勒錐圗嶺今願為嚮導臣等派眀瑞安泰瑪瑺即日起程晝夜尾追十六日黎眀自鄂勒錐圗嶺口追及賊衆我兵僅五十名安泰瑪瑺分為兩翼參領綽諾庫虛銜翎䝉庫爾克署驍騎校巴雅爾領催羅托截其去路明瑞帶兵合擊賊不能支將駝隻倒卧拒守隨令厄魯特阿塔什髙呼招降惟得木齊薩木坦等十一口向安泰投降其餘賊衆仍放鎗拒戰我兵四面攻擊射斃賊駝將八十餘户二百五十餘口盡行勦滅收其牲隻軍器臣等查明瑞安泰瑪瑺係御前行走之人受恩深重毋庸邀請議叙其奮勉效力之索倫領催羅托馬甲策卜登令戴奬賞藍翎其力戰及得傷官兵應請交部議叙濟喇特轄默爾根留營聽用家口送巴里坤安插奏入得㫖眀瑞等領兵甚少勦殺賊衆奮勉效力深屬可嘉眀瑞安泰瑪瑺及效力官兵俱著交部議叙餘照所請行申諭定邊將軍兆惠等速擒哈薩克錫喇等賊首上諭軍機大臣曰昨據兆惠等奏稱策布登扎布至庫隴癸嶺之北堵截逃出賊衆未見踪跡已回營暫為休息現有圗倫楚尾追且富德在前堵截賊人斷難藏匿俟富德圖倫楚等撤兵即進勦回部等語厄魯特等勢甚窮蹙勦除雖易但渠魁未獲難云竣事現據所奏明瑞安泰等勦殺推素隆集賽八十餘户不過嗎哈沁之類並無為首要犯乃遽請進勦回部不知辦理回部已專委雅爾哈善額敏和卓兆惠何為舍本身承辦之事而欲助他人且伊等此次所奏軍行道路殊未眀晰如鄂哲特哈薩克錫喇等逋逃未久若悉力窮追自當擒獲乃於賊人逃走方回俱未聲明惟以攻擊潰散便可了局且從前曾派巴圖濟爾噶爾鄂實等由沙爾塔克嶺過伊犂追賊此路似與哈薩克錫喇等踪跡相近曽否遇賊未據呈報即傳唤回營豈不徒勞往返凡此俱朕所不解兆惠等務宜速為奮勉擒獲渠魁若回部尚須協辦祗令富德等前往兆惠遵㫖來京或雅爾哈善等業已奏功亦無庸再往祗於伊犂左右搜捕逃匿賊衆俾無遺孽即將來年駐兵屯田等事相度形勢詳悉議奏壬申命革阿里衮户部侍郎職以副都統革職留任上諭軍機大臣曰阿里衮近在軍營辦理沙喇斯瑪呼斯賊衆未能奮勉著革去侍郎仍以副都統革職留任乙亥訓諭定邊將軍兆惠等奮力追勦賊衆上諭軍機大臣曰朕閲兆惠等節次奏報於追賊一事全無端緒惟圗苟且結局哈薩克錫喇瑪里格爾巴朗布庫察罕鄂哲特烏爾古勒濟勒鄂勒錐等皆叛賊渠魁俱已兔脫焉能竣事即如布庫察罕富德曾受其欺今並未奮往追擒半途即返去年富德頗為效力邇來似不如前至哈薩克錫喇隻身逋逃據俘獲生口所供伊同布庫察罕等與哈薩克約誓或逃入彼處等語兆惠等自應窮追向索乃並無一言奏及去年追阿睦爾撒納時我兵直抵哈薩克邊界今亦當提兵壓境令其速行擒送若稍有支吾即進兵搜捕方合事機不可以賊衆業已潰散遂欲往辦回部即現在起程前往亦遵㫖復回務俾渠魁全獲此次䇿布登扎布富德等尚稍能效力兆惠巴祿有何勞績前年兆惠領隊進勦軀命所關始知奮勉今統率多人即生推諉往往避難就易即如所奏賊踪已向伊犂伊等皆約於伊犂㑹合者何以未曾相遇若謂竄伏潛逃則軍營自有卡倫焉能偷越兆惠等務將何人追逐何人堵截眀白回奏又所奏巴圖濟爾噶爾擒獲噶勒雜特宰桑特克勒德克甚屬可嘉兆惠等進勦時若早遣其效力應已多擒數賊不致漏網巴圖濟爾噶爾及各隊效力官兵俱著交部分别議叙再圗倫楚尾追布圗庫未及而回若云應當議罪則兆惠等亦未能奮勇追賊獨無罪乎可𫝊諭兆惠等加意奮勉俟現在情形回奏到日再將圗倫楚等一併交部察議又諭曰適據巴里坤大臣等奏稱現在豫備軍營之馬計一萬七千匹已飭該管加意防守牧羣等語此項馬匹俱係豢養臕壯若兆惠等馬匹疲乏即休息牧放將巴里坤馬匹調赴軍前應用俟原馬臕壯時互相更替自必有益可𫝊諭兆惠等若事屬可行即派巴圗濟爾噶爾領兵至巴里坤收送軍營若軍營馬匹尚可應用即毋庸調撥再運送軍營口糧曽諭留意撙節今據奏又經續運現在收獲賊人牲隻頗多口糧自必充足兆惠等宜設法存貯勿恣糜費命送厄魯特舒倫哈什哈等來京上諭軍機大臣曰兆惠等奏稱庫本諾雅特台吉舒倫哈什哈巴爾達穆特宰桑塔什額爾克騰宰桑和碩齊及塔什之叔衮楚克扎卜等俱請送京等語伊等既在軍營效力來京之後朕將酌量加恩其眷屬人等亦查明送京不可送肅州辦理諭靖逆將軍雅爾哈善等沿途搜勦沙喇斯瑪呼斯等餘賊上諭軍機大臣曰昨據雅爾哈善等奏帶領各隊兵丁至哈喇沙爾等處取齊接續前進等語此時應已至哈喇沙爾其地為沙喇斯瑪呼斯舊游牧若有餘孽未盡即當勦除再沿途遇有嗎哈沁等亦宜搜勦度大兵既過不致乘間搶奪著將現在情形具奏申諭提督豆斌巡查臺站上諭軍機大臣曰阿里衮等奏稱現派巴里坤駐劄之索倫吉林緑旗兵二百名令豆斌帶領巡查臺站於四月初八日起程等語從前諭豆斌帶兵自巴里坤以至額林哈畢爾噶臺站左右山林幽僻之處所有嗎哈沁等盡行搜勦以清道路不可専在附近地方行走伊等馬力有餘將哈布塔克拜塔克及阿濟必濟等路亦如此辦理若必須紆道行走俟歸途巡查亦可如相隔甚逺即毋庸前往命甘肅巡撫吳達善回任并諭巴里坤辦事副都統阿里衮等辦理羅卜淖爾回人等事冝上諭軍機大臣曰現在阿里衮已抵巴里坤吳達善著回甘肅巡撫之任至阿里衮所奏招服羅卜淖爾回人一事此等回人自守其地無甚關係即有逃匿之厄魯特等伊等亦未必能擒獲前經賞給縀匹茶葉嗣後不得援以為例丙子議解送馬駝倒斃官員處分軍機大臣奏言臣等查口外解送軍需遇有倒斃馬駝俱係領兵大臣按道里逺近數目多寡酌量應賠應免咨部辦理並未定有成例其馬匹一項現據户部因陜甘督臣所請每百准銷六匹為數過多駁令再議至駝隻倒斃查乾隆二十年九月北路軍臺總管等曽因途次風雪以每百或准銷四隻或准銷八隻奏請奉㫖准銷八隻亦係一時恩准之數未可援以為例今由巴里坤運送軍需之遊擊菩薩保所倒駝隻該將軍未將應否賠補數目聲說應令查眀辦理至遲誤軍需處分兵部向議照原參情節定議其革職者於議處本內以該員應否仍留軍營效力請㫖但現在巴里坤非軍營可比若准留效力誠如聖諭轉可為異日開復地步無以杜徼幸之漸應令該督等查明菩薩保所倒駝隻如應賠補即行著追完結不必給咨送部引見奏入報聞丁丑申諭定邊將軍兆惠等速擒哈薩克錫喇等賊首上諭軍機大臣曰兆惠等據由屯呈報領兵至伊犂疾追烏爾古勒濟勒等已派瑪瑺策應由屯大兵亦相繼進發等語兆惠等自進兵以來雖數次擊敗賊衆而渠魁如哈薩克錫喇等未能擒獲且今日奏報中並未言及又有奏賀阿睦爾撒納身死一摺阿睦爾撒納之死諸人俱可慶賀惟兆惠富德疏脫逆賊未曾擒獲尚宜愧恥乃亦靦然奏賀豈謂逆賊既伏𡨕誅大事已竣而哈薩克錫喇等賊俱可置之不論乎此時賊衆若向特克斯等處即宜迅速追勦若已逃入哈薩克亦應勒兵索取仍分兵至博羅喇拉擒拏舍楞等務期弋獲至所奏喀喇烏蘇之呼魯蘇台臺站被賊搶奪兆惠等領兵進勦自應令巴祿照管臺站兩將軍兩參贊閒居一處何為而巴祿更屬無事伊等豈欲效去年西路所行乎奉到此㫖後若達禮善等尚未追勦哈丹鄂拓克善披領集賽等餘賊即派巴祿領兵二三百名前往搜捕又所奏瑚爾起等收取伊克胡喇勒得木齊巴蘇泰由屯收取杜爾把集賽等户口皆係畏威乞降解至巴里坤時仍送肅州辦理戊寅議停撤雜拉沙木等十三卡倫辦理西藏事務將軍伍彌泰等奏言前奉諭㫖準噶爾地方平定衛藏沿邊所設卡倫應行裁撤俟擒獲阿睦爾撒納後再行請㫖今阿逆已斃應行請㫖裁撤奏入得㫖軍機大臣議奏尋議衛藏之兆西起阿里東至喀喇烏蘇所設雜拉沙木等十三卡倫平定準噶爾後自應裁撤因阿睦爾撒納未獲奉㫖仍舊安設今阿逆既斃準噶爾全部蕩平但現在辦理回部該地亦與葉爾羌喀什噶爾等處相通應請暫停裁撤俟辦理回部事竣再行請㫖奏入上從之定邊左副將軍成衮扎布疏奏派兵䇿應和碩齊等成衮扎布奏言遵㫖令臣等將科卜多現在兵丁馬匹若干酌量豫備協擒叛賊舍楞伏思舍楞逃向俄羅斯此時由科卜多派兵擒拏雖覺稍遲但賊衆為大兵所迫藏匿山谷亦未可定臣等查科卜多現駐索倫察哈爾喀爾喀兵一千名應酌派三百名即行文阿桂委員帶領起程策應和碩齊臣等將烏里雅蘇台察哈爾兵三百名委副都統職銜柏起帶赴科卜多奏入報聞己卯議哈薩克入覲事宜軍機大臣奏言據努三奏稱前與哈薩克阿布賚阿布勒比斯定約在烏魯木齊貿易其阿布賚等子弟及所屬人等來京入覲事宜應請豫為籌議奉㫖交臣等議奏伏思哈薩克貿易一事努三恭承皇上訓諭敬謹遵行至阿布賚等子弟及屬人等有願瞻仰天顔者行至烏魯木齊時努三即查眀人數派員照管仍騎伊等本馬至巴里坤將所攜什物存留輕裝就道再阿布勒比斯曾言擒獲厄魯特台吉宰桑等即行呈送等語若果擒獲解送俟至烏魯木齊時如願入覲亦派員照管至京如願回游牧即接收解犯轉送酌量來人職銜大小及獲犯名多寡加以賞賜於貿易縀匹內支給以昭聖朝柔逺之至意其臨期一應事宜令努三酌量辦理奏入上從之命都爾伯特扎薩克達什敦多卜之長子博貝承襲扎薩克品級壬午辦理青海事務副都統濟福疏奏賞給備勦兵丁濟福等奏言四月十八日據查拉豐阿等報稱我等於三月二十九日領兵起程於四月初四日至噶斯等處巡查並無逃賊踪跡等語臣等即將現在駐劄烏圗兵丁計其游牧最逺者先行發回行文西寧地方官動支縀匹銀兩賞給此次派出副台吉一員管旗章京二員各賞縀二匹副管旗章京甲拉等官十八員各賞緞一匹兵丁一千名各賞銀三兩其查拉豐阿那木查爾等即遵㫖回京候德爾素與臣交代印務後續行具奏奏入報聞癸未議豫備伊犂屯田事宜軍機大臣奏言大學士管陜甘總督黃廷桂疏奏伊犂一帶屯墾要需請先期備辦一摺奉㫖交臣等議奏查臣等原議請由巴里坤以西之伊勒巴爾和碩穆壘特訥格爾烏魯木齊瑪納斯安濟哈雅濟爾哈朗等處以次建堡屯田派兵駐劄自近而逺各以就近餘糧陸續辦理直達伊犂所有伊犂等處屯田籽種農具口糧牛馬駝隻自應豫為備辦但宜漸次經理該督所奏豫備籽種七八千石農具五六千副陸續轉運尚易為力至所奏口糧一萬五千石駝一萬五千隻每駝運米一石每年可運一次毋論直隸山西一時難以購買即使拮据足數而於商民貿易有礙物價亦必騰踊且恐來年收成稍歉則又須照前餽餉更為勞費臣等愚見請俟將軍兆惠等相度定議後再為措置又查準噶爾舊例係回人耕種交租請俟回部蕩平將葉爾羌等處回人酌量遷移耕種仍查眀回人原納租糧足數屯田兵丁若干人之食其不足者以貨物交易若尚有不足或仍照原議由近及逺以次經理奏入上諭曰黃廷桂所奏豫備伊犂屯田事宜頗似欲速徒滋繁擾著將原奏及爾等所議俱録寄雅爾哈善等令其酌量情形詳悉具奏甲申定邊將軍兆惠等疏奏擒獲叛賊鄂哲特收其遊牧兆惠等奏言臣兆惠巴祿追賊至庫克烏蘇即派副都統由屯尾隨叛賊鄂哲特等踪跡過伊犂河復派巴圖魯侍衛瑪瑺前往䇿應四月初八日據由屯報稱官兵量馬力追賊三月十七日收取阿克把集賽之尼爾巴喇嘛伊什車木畢勒得木齊圖爾布等一百十三口又遣來降之特克伯克於華諾輝山口對面之和濟格爾收取杜爾把集賽得木齊伊什博什等六十八口又於阿里瑪台收取綽和爾鄂拓克之遂爾托哈什哈普爾普等二十口詢問鄂哲特瑪里格爾巴朗等踪跡據稱鄂哲特等前往察卜察里山嶺已過三日等語即帶兵二百餘名令喇嘛伊什車木畢勒等前導晝夜趲行二十一日追及賊衆於察卜察里河口之蘇瑪爾罕令哈坦巴圗魯佐領委署營總薩壘為左翼佐領委署營總奎蘇德為右翼我與新巴爾虎頭等侍衛委署營總莫托和爾三等侍衛拉瑪錫居中奪賊所踞山谷追至特克斯河殺賊二百餘人其鄂哲特瑪里格爾巴朗瑪濟克等妻子俱經收獲擒獲阿克把集賽之藍翎羅卜桑津巴遂諭所獲之固英哈什哈博倫烏克圗喀爾噶什衮布等五人云爾等若將鄂哲特等誘擒即可不死固英哈什哈等於次日將鄂哲特瑪濟克擒獻又問瑪里格爾巴朗向何處逃去烏爾古勒濟勒於何處分散俱不深知隨派營總莫托和爾等前往特克斯河上下搜捕我與奎蘇德在格登托羅垓等處追拏二十七日參領都倫保錐寬等從特克斯河下流至庫克烏蘇哈喇博和齊嶺等處追及賊人三十日莫托和爾等從特克斯河上流追賊見二十餘人從華諾輝嶺傍行走俱盡行勦殺收獲軍器馬駝衣物等語臣等查鄂哲特曽為散秩大臣扎爾呼齊瑪濟克係昻吉岱所用宰桑應送京備訊伊等家口解送巴里坤其由屯等帶領官兵三百餘人渡伊犂河又過特克斯至穆索爾嶺擒勦賊衆收其游牧應請交部議叙奏入得㫖副都統由屯領兵沿途勦殺擒獲鄂哲特等收其游牧甚屬奮勉效力由屯著賞給世職與效力官兵交部議叙其得傷官兵照例賞給銀兩仍交部議叙定邊將軍兆惠等疏奏敏珠爾多爾濟等勦賊不力情形兆惠等奏言臣等前令察哈爾公敏珠爾多爾濟侍衛達禮善將哈丹遊牧結壘固守之賊奮勉攻取今據報稱三月二十五日在濟爾哈朗遇賊二百餘人據險放鎗我兵力戰竟日殺賊十餘人捉生詢問知伊等糾合賊衆抗拒其遊牧已歸綽和爾等語計陳亡兵三名得傷官兵十四名又臣等前令吉林營總扎庫齊三等侍衛訥克布往勦善披領集賽十餘户因呼魯蘇台臺站被嗎哈沁搶掠復飭令嚴行搜捕今據報稱三月十六日攻賊山險自卯至未不能奪取計殺賊八人我兵陳亡二名得傷五名十七日聞臺站被掠一面派兵安設隨追至伊犂河殺賊十餘人捉生詢問係烏喇特屬人即收其馬駝仍回賊人所守山嶺逃去三四日等語臣等查敏珠爾多爾濟達禮善扎庫齊訥克布等或因賊人據險難攻不行防守遽爾撤兵或因接續臺站致賊乘間逃脫日久未能擒獲應請交部嚴加議處奏入得㫖該部嚴察議奏訓諭定邊將軍兆惠等速擒哈薩克錫喇布庫察罕等賊首上諭軍機大臣曰據兆惠等奏稱伊犂等處賊人游牧俱已殘破準噶爾事體將竣現兵三千餘名請分千餘名令策布登扎布巴祿同領隊大臣色布騰巴爾珠爾羅卜藏多爾濟鄂博什圗倫楚駐劄伊犂搜捕餘孽兆惠富德領兵二千餘名同領隊大臣眀瑞由屯瑚爾起溫布巴圗濟爾噶爾由伊犂進勦回部等語由屯係領隊大臣領兵甚少尚能擒賊若兆惠等協力前追更易集事徒駐兵伊犂何益且將軍及參贊大臣即不親往亦應調遣領隊大臣乃多派侍衛朕所不解此次進兵専為哈薩克錫喇布庫察罕等渠魁至鄂哲特不過稍有名目之宰桑瑪濟克更屬微末甫經擒獲遂謂準噶爾之事將竣豈不可愧富德去年頗著勞績今觀其疏脫布庫察罕焉得謂之奮勉效力著伊等眀白回奏至哈薩克錫喇等逃入哈薩克之言全不可信伊等即投哈薩克不過奴隸使之且去年哈薩克將達什策凌齊巴罕烏勒木濟等縳獻哈薩克錫喇等豈不慮為前人之續不過藏匿伊犂附近俟撤兵復出兆惠等並未計及此遽信浮言希圗塞責可乎著𫝊諭兆惠富德等此時若能擒賊尚可功過相抵如仍未擒獲富德即領兵將敏珠爾多爾濟等攻取未得之哈丹等游牧搜勦俘獲增我兵力由彼往擒布庫察罕或逃入哈薩克亦駐兵邊界索取兆惠仍追擒哈薩克錫喇如渠魁漏網斷不可謂為竣事所有現在情形作速具奏乙酉諭將軍大臣等搜捕逸賊以清臺站上諭軍機大臣曰永貴等奏據奎屯等臺站委署筆帖式拜靈阿報稱有呼爾璊台吉巴顔等百餘口在庫爾河源藏匿搶奪博羅通古臺站牲隻和落霍斯奎屯等處仍有嗎哈沁來往即派守備馬蛟雲委署章京達爾扎桑帶兵往勦仍知㑹將軍兆惠及辦理哈丹等餘賊之敏珠爾多爾濟等語所辦尚是前因搜勦嗎哈沁以清道路已命豆斌前往永貴等亦當移咨催督令其協力搜勦至兆惠等進兵時辦理哈丹等餘賊即應派大員如溫布鄂博什等前去乃用敏珠爾多爾濟未經諳練之人達禮善亦一尋常侍衛耳伊等不能取賊固責有攸歸而將軍大臣任使不當則誰執其咎昨諭富德領兵往勦哈丹等餘賊再追擒布庫察罕若敏珠爾多爾濟及馬蛟雲等此際尚不能竣事富德即遵照前例辦理并𫝊諭豆斌知之諭辦理收獲之厄魯特等上諭軍機大臣曰兆惠等奏稱收降得木齊納默庫等七十餘口已選熟識路徑之三十六人帶往軍營其餘俱送巴里坤等語現在軍前收獲賊人甚多俱係屢經叛亂非誠心降服可比自巴里坤解至肅州仍照前辦理再琿齊之宰桑齊竒爾巴朗尚係要犯如未被擒殺或在解送人口之內即看守送京著𫝊諭阿里衮黃廷桂知之命以叛賊布爾古特台吉琿齊於故總管巴寧阿墓前即行正法平定準噶爾方略正編卷五十四
