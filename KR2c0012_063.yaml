body:
  text: 乾隆二十年春三月庚寅命參贊大臣達爾黨阿會同定邊左副將軍阿睦爾撒納進兵上諭軍機大臣曰達爾黨阿奏帶領索倫兵三百名於三月初三日至軍營初六日起程繼大兵前進達爾黨阿所領係索倫徑卒又經伊自行揀選者著傳諭班第俟達爾黨阿兵到時急速前進務同阿睦爾撒納前隊哨探兵一併進發諭定北將軍班第辦理烏梁海宰桑都塔齊事宜上諭軍機大臣曰班第奏烏梁海宰桑都塔齊已送至烏里雅蘇台軍營若復令其前至卡倫路遠恐有疏虞現在移咨駐劄烏里雅蘇台大臣哈達哈等即行正法等語從前因青滾雜卜之言令將都塔齊拏至卡倫正法似都塔齊所住離卡倫甚近今據班第此奏則都塔齊送至烏里雅蘇台始赴卡倫似此輾轉迂回前奏何以並不聲明著班第查明遇便覆奏再都塔齊如已到烏里雅蘇台正法即可無庸置議倘尚在未到或伊推托不即前來即遵朕前降諭㫖俟大功告成後再為辦理此時且勿令其驚懼並傳諭班第及哈達哈等知之定北將軍班第密奏定邊左副將軍阿睦爾撒納沿途情形班第奏言昨歲阿睦爾撒納在熱河時奉㫖將貝勒扎木參派往屯田阿睦爾撒納自到軍營從未言及近又奉㫖令齊木庫爾更換扎木參前往額爾齊斯地方屯田臣隨行知阿睦爾撒納並令其派定兵丁前往屯田往返再三總未商定近始據覆遵㫖留齊木庫爾於屯田地方駐劄並派輝特和碩特兵一百名都爾伯特兵一百名並喀爾喀兵三百名一同前往以資守望仍俟伊領兵到彼酌量情形指示駐劄屯種事宜再查新來投誠之沙畢納爾得木齊錫喇哈什哈等詢係班禪之沙畢納爾並未稱係拉藏汗之屬人而阿睦爾撒納奏稿內指為拉藏汗之屬人班珠爾又向伊等言我祖原係爾青海之汗爾等或即係我和碩特部落之語其中明有希圖僥幸之意臣近經過包沁游牧地方詢知阿睦爾撒納等經過時將伊屬下人認出帶往外又多帶男女十五口並未報明臣現在行文咨查並密行寄信額駙色布騰巴爾珠爾留心詳察毋許伊等妄生僥幸奏入得㫖此尚係小事如約束太過或轉阻伊等奮往之心若遇重大事務自不得令伊等專擅也辛卯命副都統多爾濟運解阿睦爾撒納等俸餉於張家口上諭軍機大臣曰納穆扎爾奏支領阿睦爾撒納等俸餉之厄魯特人等現派領催敦珠克帶領於三月初九日自塔米爾起程來京厄魯特人等到京時已值夏令天氣漸熱恐其不耐炎暑或致患病宜加體恤著派副都統多爾濟將阿睦爾撒納等應支俸餉緞匹等項運往張家口俟厄魯特人等到時一一照數給與仍將朕體恤伊等不令入京之㫖明白曉諭令其歸至游牧時轉傳與該扎薩克宰桑等知悉並傳諭納穆扎爾知之壬辰定北將軍班第疏奏領兵起程日期班第奏言臣帶領察哈爾官兵於三月初六日至齊齊克淖爾地方放給馬匹駝隻查明隊哨探兵揀選馬匹之外現存馬四千餘匹其中有臕瘦不堪乘騎者又各處尚有未到馬匹今前隊兵出卡倫已行三日若俟馬匹全到臣始出卡倫恐相離稍遠難以策應是以即將現在所有馬駝先支給一千五百名官兵乘騎之用臣於初八日即帶領起程出巴顔珠爾克卡倫前往其餘兵五百名俟馬匹一到即以次接續前進亦不致中途遲滯奏入報聞定北將軍班第疏奏編設補放包沁人等佐領事宜班第奏言臣查包沁之七得秦所有人丁多寡不等應照扎哈沁之例每得秦編一佐領共編七佐領已交與員外郎納蘇圖編定今臣於三月初三日駐劄庫卜克爾地方據包沁總管阿克珠勒翼領台拉克父子帶領擬放佐領得木齊人等驗看伊等皆係阿克珠勒保送且人俱去得臣即照其所擬宣示諭㫖令其各勤職業約束屬人共遵法紀其阿克珠勒所請總理七佐領事務之阿勒巴齊顔達什可否照扎哈沁阿勒巴齊唐古忒之例給與參將職銜出自天恩奏入上從之癸巳命定西將軍永常仍回肅州不必迅速前進上諭軍機大臣曰據永常奏自肅州前至巴里坤即帶現在兵丁進發并咨後隊帶兵大臣等兵足一千亦即迅速前進永常之意特欲急進邀功不知伊係將軍一切事務俱應承辦劉統勳不過協同辦理乃永常諸事俱委之劉統勳伊之專責似止在帶兵一進餘皆無涉者殊屬謬誤著傳諭永常即遵前㫖仍回肅州辦理一應事務果能妥協即未帶兵前進朕亦必將伊議叙今彼處口糧既少何必又帶此無用緑旗兵汲汲先進耶至移咨索倫兵但足一千即行前往此特為伊子額爾登額耳其於事理當否亦曾悉心籌及乎永常務令各隊兵丁仍遵前㫖量足二千帶領前進不得故違取戾甲午協辦陜甘總督劉統勳疏奏各處官兵全過蘭州情形劉統勳奏言臣於三月初三日自肅州起程彼時索倫第一起兵已經出口二起甫到肅州近據肅州道閻介年等文稱索倫第三起兵於初七日亦經出口臣途次遇見西安滿洲兵及索倫健鋭營哲里木各處官兵俱按起行走整齊安靜各臺車馬均能供應遄行及臣到蘭州各處官兵已經全過其臺站所雇民間車馬據布政使史奕昻文稱河東各站已盡歸農河西各站亦於兵過後陸續遣散當此春深雨足及時力作於農事亦甚有益奏入報聞乙未定邊右副將軍薩喇爾等疏奏扎哈沁宰桑敦多克等率衆來降薩喇爾等奏言臣等領兵於三月初七日至扎哈沁游牧地方扎哈沁得木齊巴哈曼集前來投誠臣等恭奉聖主撫恤歸附人等恩㫖明白宣示巴哈曼集奏稱我等仰賴大皇帝天恩得以安生我屬下人三百餘户俱情願歸附再宰桑敦多克所居游牧尚遠我遣人送信敦多克伊亦自必投誠至初九日早宰桑敦多克歸附前來告稱我等人衆一千二百餘戶俱情願歸附臣等竊思扎哈沁係準噶爾邊界之人若甫經歸順即查開户口數目伊等未免驚疑是以臣等安慰衆心謹將敕書給宰桑敦多克得木齊巴哈曼集各一道並諭以後隊大兵經過爾地於爾等並無滋擾將此遍諭爾衆仍各照常安居並繕寫檄諭給與伏念大兵前進之信準噶爾人衆必有見聞若不將聖主恩㫖豫先傳布曉示準噶爾人衆易致驚惶逃竄是以臣等將頒發噶爾藏多爾濟之敕書即遣三等侍衛瑚集圖等帶領扎哈沁之巴巴及在噶爾藏多爾濟處之薩喇爾屬下塞貝齎送前往並將頒發布魯古特等衆之敕書亦交瑚集圖等齎去令由噶爾藏多爾濟處轉交其頒發吐魯番回民之㫖交公額敏和卓派愛特瑪特等三人齎去由此前進如有歸附之人俱遵敕㫖曉諭務令各居本地游牧不致少有驚懼奏入上諭軍機大臣曰薩喇爾等奏稱扎哈沁得木齊巴哈曼集帶領三百餘戶來降扎哈沁宰桑敦多克帶領一千餘戶來降如即細查伊等戶口恐反生疑惑隨將敕書給敦多克巴哈曼集各一道曉諭伊等使無驚懼仍令照舊安居薩喇爾辦理甚妥著傳諭班第阿睦爾撒納等料阿睦爾撒納前進似此投誠者必多俱可照此辦理又諭曰額林沁多爾濟同永常帶兵前進朕已降㫖令永常回肅額林沁多爾濟可俟濟福到後即同彼曉諭敦多克等言爾等聞大兵一到即便輸誠已據將軍奏聞大皇帝極為奬賞特授敦多克為散秩大臣賞給孔雀翎巴哈曼集為三等侍衛並各賞給衣服敦多克所屬或有應行鼓勵之人另交孔雀翎五枝令敦多克酌量賞給俟功成後仍當加以重恩務須明白曉諭令其深知朕意至彼處如必需兵彈壓額林沁多爾濟即帶兵居住倘毋庸留兵仍遵前㫖帶兵前進丙申密諭定北將軍班第上諭軍機大臣曰班第奏稱據阿睦爾撒納等咨請將綏綳喇嘛併沙畢納爾數人移至伊等現住之扎卜堪游牧居住懇降㫖將此等喇嘛暫時另行安置俟事定後遷至青海仍歸班禪額爾德尼屬下則一切爭競之端可杜班第所見雖是但將伊等遷至青海既多煩擾亦恐阿睦爾撒納生疑頃阿睦爾撒納將伊等投誠之處具奏朕令於伊犂地方設立一庫倫由京師遣胡土克圖喇嘛前往教經班第可照此辦理俟功成時入於應辦事宜內議奏此時且勿令阿睦爾撒納聞知恐其别生他意也再前班第奏稱阿睦爾撒納等過扎哈沁時私將人口帶往朕以非大事不必過於約束今觀此情形其心跡已露若俱置之不問恐其益生妄想班第可密加節制但勿泄漏為要又前令班第進兵與阿睦爾撒納相隔十日前往今既欲從中節制則須急行一兩日以相離七八日為妥然亦不必太急納噶查情願移至青海之語如係實心尚屬可憫俟將來令其遷往亦可此時尚可毋庸曉諭倘伊復行詢問惟以此非必不可行之事將來斷無不准答之可耳將此密諭班第知之諭參贊大臣哈達哈傳諭齊默特多爾濟進兵事宜上諭軍機大臣曰朕昨命齊默特多爾濟所帶之兵即行撒回特因其辦理不善故耳今齊默特多爾濟既自知其非揀選精兵三百名前進務於三月二十四五日前赴軍營尚屬可恕著傳諭哈達哈如齊默特多爾濟果於限內能到即不必令回游牧准其前往效力若在遲誤即將此㫖宣示令其撤回倘哈達哈已經起程即著莫爾渾遵㫖辦理命喀喇沁公瑚圖靈阿馳驛來京上諭軍機大臣曰現在準噶爾部落降人絡繹有應接應來人及齎物賞賚之事須用大員前往著傳諭瑚圖靈阿馳驛來京候朕遣用己亥密諭定邊右副將軍薩喇爾等班第奏言據副將軍阿睦爾撒納等稱扎哈沁內有輝特人五十餘戶并在包沁之都爾伯特及葉克明安等人請即速行給發臣即覆稱去年收服扎哈沁時爾等所收人口俱經查明帶往其包沁地方原住之輝特兵丁係從各鄂拓克攢集並非臨陳所獲未便聽其帶往且業已奉㫖編設佐領至葉克明安四十餘戶暫時另行安置俟伊等台吉到日公同辦理其包沁內所有都爾伯特人等現在包沁居住亦經奏明未便擅自給與奏入上諭軍機大臣曰班第奏稱阿睦爾撒納訥默庫請將扎哈沁包沁內所有輝特都爾伯特及葉克明安人等俱即給發伊等管轄班第不准所請辦理甚屬妥協著將原摺抄寄薩喇爾扎拉豐阿鄂容安知悉看來策凌策凌烏巴什人雖朴實然不能保其無此等僥幸之心倘有似此情事薩喇爾等即照此辦理但須密加防範勿稍宣露再北路哨探兵奏摺內將班珠爾訥默庫之名一併開列甚是西路至博羅塔拉後遇有奏摺亦將策凌策凌烏巴什策凌孟克塞卜騰之名列於鄂容安之後一併傳諭薩喇爾等知之壬寅定邊右副將軍薩喇爾等疏奏噶爾藏多爾濟等率衆來降薩喇爾等奏言臣等派侍衛瑚集圖等齎敕書前往傳諭噶爾藏多爾濟等今於三月初十日據阿巴噶斯舊宰桑德濟特之弟普爾普德濟特之子袞布投誠前來告稱我等宰桑德濟特並無過犯為達瓦齊殺害深為憤恨今聞大皇帝天兵將到情願率領我屬六十六戶人丁隨營效力十三日據布魯古特之得木齊巴拉等三人前來告稱我等因達瓦齊暴虐困苦不堪日望大皇帝天兵速至今遇將軍大人等宣諭大皇帝恩㫖現今布魯古特台吉諾海奇齊等三十餘台吉並我等屬下共五百餘戶情願投誠受大皇帝恩典又據葉克明安輝特台吉托博勒登族弟巴朗前來迎接告稱我兄台吉托博勒登因臂折不能騎馬遣我率領屬下三十餘戶投誠又同巴朗前來之噶勒雜特得木齊博勒坤策凌們綽克率領屬下一百戶來降臣等傳宣皇上恩㫖曉諭台吉巴朗等仍令在各本處居住賞給茶葉慰諭安插至十四日據巴爾瑪部落得木齊伯克勒特收楞額庫魯克等前來告稱我等原係巴爾瑪部落之人已來扎哈沁地方居住十餘年今聞大兵將到我等率領舊宰桑噶齊拜之子圖爾塔默特六十戶同來投誠本日復據侍衛瑚集圖等帶領噶爾藏多爾濟所遣迎接之宰桑扎爾布多爾濟前來告稱我等恭捧敕書於三月十二日到噶爾藏多爾濟所居額林哈畢爾噶之羅克倫地方頒發敕書噶爾藏多爾濟敬謹跪聽奏稱大皇帝洞鑒我處情形實為聖明達瓦齊殘虐所屬人衆無不離心解體達瓦齊與我勢力相等彼此不相侵犯數年以來我準噶爾互相殘殺達瓦齊自篡奪台吉以來我屢行勸阻不從是以數年中並不通信去歲向我調兵我亦不發今年移書令我在額林哈畢爾噶備兵一萬我並不豫備大兵過時我屬下人等俱令照常耕種並不逃避今大皇帝撫恤準噶爾人衆恩㫖下頒我情願率領所屬投誠仰承恩典伏思噶爾藏多爾濟乃準噶爾大台吉人亦曉事聞大兵前進飭屬照常耕種殊為誠心向化觀此則軍行所過自必踴躍歸誠勢如破竹可以豫定奏入上諭軍機大臣曰據薩喇爾等奏噶爾藏多爾濟率衆投誠看來大功告成在指顧間不勝欣慰薩拉爾遵朕訓示動合機宜實屬可嘉俟功成後加恩優叙先將朕所佩荷包賜豫並賞給雙眼翎以示優奬噶爾藏多爾濟乃準噶爾大台吉所屬之人甚衆著薩喇爾即同扎拉豐阿鄂容安策凌策凌烏巴什策凌孟克降㫖曉諭朕聞伊來降甚為喜悅特遣侍郎玉保前往降㫖奬諭因道遠不能多賚什物先將朕御用數珠荷包等賜豫俟大功告成後更加殊恩寵錫天朝此次用兵實因準噶爾地方互相殘殺民不聊生是以特命六師前來拯救俟平定準噶爾後令四衛喇特人等照舊安居並封王爵共享升平噶爾藏多爾濟既為準噶爾大台吉即封為綽羅斯汗其阿睦爾撒納應封輝特汗策凌應封都爾伯特汗班珠爾應封和碩特汗同至熱河朝覲大加宴賞故先為宣示彼汝知之再於投降各台吉等亦降㫖宣諭汝等傾誠向化皇上俱深為優奬因汝等戶口多寡差等尚未周知是以未頒賞賚什物一俟玉保查奏即行賞給策凌等帶至熱河入覲應賞給爵秩者亦即給豫可一一曉諭俾伊等踴躍歡欣佇荷朕恩又諭曰噶爾藏多爾濟乃準噶爾大台吉今率所屬來降平定準噶爾大功告成必速此實上天眷佑大兵所到不煩一矢皆已稽首歸誠著將薩喇爾原奏抄寄班第阿睦爾撒納閲看料沙克都爾曼濟此時亦當由北路來降果爾阿睦爾撒納可即宣諭汝係大台吉大皇帝必封以王爵且我等俱叨受天恩汝復更何疑慮仍將何時投誠之處速即奏聞至沙克都爾曼濟等來降後亦即應令伊等入覲西路著派扎拉豐阿北路著派阿蘭泰同策凌等帶領伊等由阿爾台前至熱河瞻仰朕躬以地處口外甚為涼爽於蒙古人頗相宜也再應入覲之人倘為數無多即俱令前來如因人衆乘傳稍難即令大台吉數人先來餘人另為一班俟明年入覲亦可仍將現在前來人數及何日起程之處奏聞其應封爵秩之人亦應查辦且查封時即可灼知其戶口多寡之數阿睦爾撒納等並應將從前先至熱河如何深受朕恩之處詳悉曉諭俾伊等共知慶忭也又諭曰莫爾渾等不知現在軍行情形未免妄生疑慮著將薩喇爾奏噶爾藏多爾濟投降一摺即行抄寄令傳諭衆喀爾喀等共知成功迅速所有應來入覲之人已另諭兩路將軍等辦理但伊等前來騎䭾牲口及所食口糧羊隻若照去年令喀爾喀等豫備未免拮据此時豫備各隊官兵牲口羊隻甚多如前隊一至伊犂成功則後隊之兵毋庸更進即可將所餘牲口羊隻安設臺站供給新降人等著派兆惠專管務即妥協辦理無致貽誤并將不令喀爾喀等豫備之處明白曉諭俾知朕體恤遠人至意癸卯命侍郎何國宗測量西陲度數上諭大學士曰西師報捷噶爾藏多爾濟抒誠內附西陲諸部相率來歸願入版圖其日出入晝夜節氣時刻宜載入時憲書頒賜正朔以昭遠裔向化之盛侍郎何國宗素諳測量著加尚書銜帶同五官正明安圖司務那海前往各該處測其北極高度東西偏度繪圖呈覽所有坤輿全圖及應需儀器著何國宗酌量帶往夏四月甲辰朔命西北兩路將軍等撫定準噶爾後即遣投誠人等入覲上諭軍機大臣曰班第奏擒獲厄魯特六人詢知巴朗與烏梁海同在訥齊庫地方都噶爾在那木地方現在遣兵往擒西路並遣人前來通信班第等亦將四月望前後可至博羅塔拉之信通知西路兩路聲息交通噶爾藏多爾濟等人衆俱各前來投誠以此觀之仰荷上天默佑膚功必能迅奏前已降㫖兩路將軍令將派出應來入覲人衆交扎拉豐阿阿蘭泰策凌等帶領由阿爾台前赴熱河著再傳諭兩路將軍伊等兵抵伊犂將撫定準噶爾全部事宜部署略定即將應行入覲者派出前來如於八月初間即到值朕駐蹕熱河時賜宴賞賚仍可令伊等扈從木蘭行圍倘時日不及則竟候朕木蘭回鑾於十月初間至熱河陛見亦可班第等即遵㫖酌量定奪一面辦理一面奏聞其安設臺站事務已降㫖令兆惠承辦即轉飭兆惠豫為妥協辦理參贊大臣哈達哈疏奏官兵起程日期哈達哈奏言臣遵奉諭㫖於莫爾渾到烏里雅蘇台後臣即領兵繼班第前進今於三月二十一日起程惟酌量馬匹力量追赴將軍班第陸續前進再喀爾喀王額林沁已領兵四百名於本月二十日前後可抵軍營其右衛歸化城之兵亦漸次可到臣已飭烏里雅蘇台辦事大臣將馬駝口糧等項豫備妥協俟各兵到日即酌給催令起程奏入報聞丙午定邊左副將軍阿睦爾撒納等疏報擒獲逃人們都阿睦爾撒納等奏言三月十五日郡王班珠爾等將與巴朗同逃之們都擒獲詢據們都供從前巴朗原同我在阿里克台地方居住繼又移向布哈和洛我從阿里克台即與彼離散不知巴朗仍在布哈和洛與否自布哈和洛至額爾齊斯約五六日趲行可到又供聞噶勒雜特之都噶爾攜達什敦多卜妻子與哈薩克錫喇同向額林哈畢爾噶去伊屬下有一得秦之人尚在奇蘭地方居住臣等查們都所供雖不足信但布哈和洛地方係臣等進兵便道而奇蘭地方又與額爾齊斯相近當即派貝子策卜登等酌帶侍衛台吉領兵三百名速赴布哈和洛地方務將巴朗擒獲如巴朗又向别處潛逃納林布魯爾居住之烏梁海宰桑博博與臣阿睦爾撒納交好令策卜登等即揀選烏梁海數人潛往博博處告知令其差人擒拏巴朗又派副都統職銜達什敦多卜等往奇蘭地方令將噶勒雜特之宰桑都噶爾留下一得秦之人收服臣與郡王班珠爾貝子德濟特仍帶兵前進奏入報聞定邊左副將軍阿睦爾撒納等疏報額林哈畢爾噶宰桑阿巴噶斯烏勒木濟哈丹等來降阿睦爾撒納等奏言三月十五日有額林哈畢爾噶之宰桑阿巴噶斯烏勒木濟哈丹等三人帶領三十人迎接大兵投誠前來詢知阿巴噶斯哈丹係兄弟二人屬下户口共二千六百有餘烏勒木濟屬下戶口共一千三百有餘伊等投誠先來至所屬現住額林哈畢爾噶地方臣等加意撫慰並恭宣諭㫖令其不必遷移仍在原住地方游牧阿巴噶斯等告稱我等雖皆願居原處但不敢妄自求請今蒙大皇帝早已洞照實不勝歡忭惟求速遣一人送信游牧處令聚集兵丁保守以備不虞隨派得木齊錫喇卜會同哈丹前赴額林哈畢爾噶地方將聖主撫恤準噶爾全部之㫖明白曉諭收服人衆其阿巴噶斯烏勒木濟二人臣等現在帶往軍前效力仍於阿巴噶斯烏勒木濟屬下兩鄂拓克三千餘戶內酌量揀選一二千兵帶來效力果能奮勉另行察核具奏又詢知去年十月內巴特瑪車凌額林沁阿布賚帶領厄魯特哈薩克兵一萬有餘將博羅塔拉等處所有游牧人衆盡行搶掠阿布賚於闥勒奇嶺東將虜掠人帶回巴特瑪車凌額林沁帶兵四千餘直入伊犂將居住伊犂河北達瓦齊之厄魯特回子盡行虜掠達瓦齊與巴特瑪車凌相拒月餘巴特瑪車凌力不能繼始行脫回現在或云在古爾班色爾克或云在庫克薩勒或云在哈喇巴噶紛紛不一究未知現在何處至問其由噶勒雜特游牧處至伊犂尚有游牧人等與否據阿巴噶斯等告稱齊爾地方尚有集賽鄂拓克四五千人係宰桑齊巴克額伯濟二人統領居住尚可得四五千兵其噶爾藏多爾濟屬下現有二千餘户前經達瓦齊調取伊等並未前往觀此必無敢抗拒軍行之意但哈薩克錫喇巴雅爾今既遷往伊等或從中挑搆生釁亦未可定臣等伏思集賽人衆既在齊爾居住自應乘機進兵於現在帶來六千兵內揀選三千臣阿睦爾撒納等帶往先至察罕呼濟爾地方展放卡倫以資守望俟有實信然後遣人齎奉敕諭招撫伊等如投誠前來即行收服否則當以兵威擒𠞰奏入上諭軍機大臣曰據阿睦爾撒納奏額林哈畢爾噶之宰桑阿巴噶斯等迎接我兵投誠前來阿睦爾撒納即曉諭撫慰遣人收服伊等屬下人衆又將我兵分路前進阿睦爾撒納親身帶領先往集賽鄂拓克處收服人衆辦理頗中機宜阿巴噶斯烏勒木濟哈丹俱係準噶爾舊日大宰桑之子孫今既誠心歸順朕深為眷念著加恩將伊三人俱授為散秩大臣先賞給孔雀翎俟另遣御前侍衛齎衣帽等物前往頒賜即將此㫖先行曉諭伊等知之再觀阿巴噶斯之詞尚未悉噶爾藏多爾濟業已投誠今西路已遣人往收噶爾藏多爾濟將此一併曉諭阿巴噶斯等知之又諭曰投誠之額林哈畢爾噶宰桑阿巴噶斯等俱係達瓦齊之宰桑應遵朕從前所降諭㫖另為一支與瑪木特等一體辦理不得令他人管轄著班第留意俟事定之時另行查辦嗣後陸續前來投誠人內有似此等者俱照此辦理著即密諭班第知之丁未定北將軍班第疏奏中途領兵減裝進發情形班第奏言三月十九日至郭勒阿里克台地方據副將軍阿睦爾撒納文稱將新經投誠宰桑阿巴噶斯烏勒木濟奏明帶往進至阿爾齊斯查明伊蘇圖鏗格圖烏拉克圖等地方俱可屯田現留貝勒齊木庫爾等候護軍統領塔爾瑪善到時一同指示耕種再現在奏明前赴察罕呼濟爾地方所有後隊續進大兵亦迅速前行方為有益臣即行催塔爾瑪善等速行前往會同辦理屯田事宜臣將現有察哈爾兵一千五百名內揀選馬力壯健者六百名臣與喀爾喀王宰桑多爾濟貝子三都爾扎卜公策登薩木丕勒等星夜減裝緊隨副將軍等進發其餘兵丁飭令副都統柏起統領繼至奏入報聞駐劄烏里雅蘇台大臣莫爾渾等奏報和碩齊郡王林沁等領兵起程日期莫爾渾等奏言巴林親王品級參贊大臣和碩齊郡王林沁帶領昭烏達兵二千名於正月三十日至喀爾喀游牧察罕布哈地方復選兵四百名與敖漢郡王喇什喇卜坦帶領先行於三月二十一日抵烏里雅蘇台二十二三兩日支給馬駝口糧等項於二十四日即起程前進又二十三日王阿咱拉貝勒彭蘇克帶兵八百名前來亦將馬駝口糧辦給於二十五日起程前進奏入報聞戊申命西北兩路將軍等酌議準噶爾投誠賜爵人員世襲事宜上諭軍機大臣曰自大兵前進準噶爾部落人衆各帶領鄂拓克陸續前來投誠者甚多朕視其所轄人數酌量加恩有授為散秩大臣及副都統總管者第思準噶爾舊例凡管鄂拓克之宰桑俱世襲罔替是以朕授瑪木特為散秩大臣即令其管轄扎哈沁人衆今陸續投誠之人尚多宜將世襲之例明晰曉諭則現在投誠人衆既益戴朕恩而相繼歸降者亦倍加感悅於事甚有裨益將此傳諭班第阿睦爾撒納薩喇爾等通行曉諭知之至如何酌定世襲及給與敕諭之處俟伊犂底定後即入於應議事宜內議奏平定準噶爾方略正編卷九
