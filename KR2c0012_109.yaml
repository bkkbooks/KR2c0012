body:
  text: 乾隆二十三年五月丙戌朔參贊大臣阿桂等疏奏派兵䇿應和碩齊唐喀祿阿桂等奏言臣等因和碩齊唐喀祿等堵截沙喇擘勒潰逃賊衆未得信息派侍衛奎薩班珠爾等領索倫察哈爾兵二百五十名於四月十五日起程前往䇿應續准成衮扎布􅢻添派兵丁五十名令協理台吉公格帶領於十八日起程合為一隊沿途偵探賊人踪跡相機堵𠞰奏入報聞丁亥訓諭巴里坤辦事副都統阿里衮等辦理遣犯事宜上諭軍機大臣曰據阿里衮等奏稱發遣巴里坤種地人犯現擬分屯築堡相度地畝酌量安插已咨行黃廷桂等語甚屬不曉事體此等發遣人犯俱係情罪重大應行正法之人因有一線可原量豫減等若留內地徒滋擾纍今魯克察克烏魯木齊等處現在屯田是以發交緑旗兵丁令其督率耕種倘稍不安靜即行處死亦罪所應得所降諭㫖甚明若在巴里坤附近分地築堡安插則是效力之兵丁轉應逺去而減等之凶犯乃當大費帑金為之籌畫久逺即從前發遣拉林等處及給與兵丁為奴之犯亦未有似此之辦理周章者豈欲伊等富饒抑或懼其背叛乎且伊等若逃歸故里即可緝獲正法或逃入回部亦不過為人奴僕何愛於此輩而為之鰓鰓過計耶凡此皆與發遣之本意全無干涉黃廷桂尚未奏到諒不至無識若此此等人犯發遣到彼即賞給屯田兵丁為奴如安分則已否則照前㫖辦理阿里衮著傳㫖申飭並𫝊諭黃廷桂永貴等知之戊子恩蠲甘肅來年地丁錢糧上諭大學士曰甘肅地方數年以來辦理軍需悉頒帑項雖絲毫不以纍民而小民急公趨事甚屬勤勞殊堪厪念前經降㫖將本年地丁錢糧槩豫蠲免又將二十二年以前舊缺銀糧草束通行豁除但該省為軍需總滙民風淳厚出力尤多朕心時切軫念著將甘肅通省乾隆二十四年分應徵地丁錢糧再行加恩悉與蠲免該督撫等其董率屬員豫行出示曉諭毋任不肖官吏從中舞弊以副朕格外加恩優恤邊氓至意該部即遵諭行己丑命革甘肅布政使武忱糧道成德職效力贖罪以蔣炳為甘肅布政使上諭大學士曰據黃廷桂參奏甘肅布政使武忱糧道成德因私廢公漠視軍務有玷方伯監司之任等語司道為方面大員非端謹率屬何以整飭官常况軍需關係緊要伊等身係滿員尤當奮勉集事乃任意怠玩悮公彼此瞻徇甚乖職守武忱成德俱著革職交與該督黃廷桂令其效力贖罪其甘肅布政使員缺著蔣炳補授即馳驛前往訓諭大學士管陜甘總督黃廷桂等辦理回人屯田貿易事宜上諭軍機大臣曰黃廷桂奏伊犁一帶駐兵屯田南路回人相距甚近請將屯兵所餘地畝分撥墾種減其租賦有情願前往者酌量賞給緞匹等語所謂知其一不知其二籌辦回人一事已屢諭雅爾哈善等悉心經理將來回部蕩平為我臣僕俾謀生有䇿較從前準噶爾之誅求無已逈不相同伊等自當踴躍急公勤耕作而豐儲偫將來果能黽勉效力或可量加賞賚以示鼓勵若豫為籌備不但招徠屯墾向無懸賞以待之事亦於駕馭逺人體制未為允協再回人安插伊犁數少則不敷耕作數多則恐駐防官兵難於約束此處正當豫為密籌看來伊犁屯田一事即不能尅期促辦稍待一二年由近及逺如前㫖所諭亦屬可行但不得因有此㫖遂存中止之見黃廷桂當綜核全局有應行豫備者不動聲色照常經理俟雅爾哈善事竣再行定奪亦未為遲悮也又諭曰前諭雅爾哈善等平定回部後在伊犁屯田量徙回人與緑旗兵丁雜耕又因黃廷桂籌運屯田兵丁口糧駝隻曾交軍機大臣議奏録寄雅爾哈善閲看總期兵民兩利緩急得宜今黃廷桂又以招募回人屯田貿易具奏看來伊犁屯田所有駐防兵丁不過二三千人非從前準噶爾之部落聚處可比若招募人多則兵少亦有可慮雅爾哈善應留心詢問額敏和卓伊自揣果能彈壓回衆且使回人等心服與否至貿易一事從前回人在準噶爾時尚且視如佃僕今既歸我版圖即應收其賦稅如有採買祗當給與平價不可與外藩交易一例過為優渥致將來轉生觖望且今嵗成功後即來年不及駐兵屯田亦自無礙可𫝊諭雅爾哈善等將一切措置機宜悉心議奏再伊等四月十二日奏事後今又兩旬軍前現在情形若何作速奏聞庚寅靖逆將軍雅爾哈善等疏奏進兵哈喇沙爾日期雅爾哈善等奏言臣等帶領各隊官兵由博爾圖嶺前進緣道路頗狹陸續行走今於四月十六七等日官兵全抵哈喇沙爾臣等㑹議庫車等處回人聚處城堡不似厄魯特四散游牧大兵所至自易成功臣額敏和卓順德訥玉素富及侍衛等官四十一員領索倫兵四百五十名吉林察哈爾兵二百三十名緑旗兵六百名回兵四百名在前哨探遇賊擒𠞰俟臨城之日㑹合大兵先示招降不服即行攻取其大隊之吉林察哈爾阿拉善喀爾喀厄魯特等兵八百餘名令愛隆阿端濟布阿拉善公衮楚克喀爾喀台吉郎衮扎卜分領緑旗兵四千餘名令馬得勝丑達五福閻相師分領臣雅爾哈善哈寧阿總統進兵官兵等皆思奮勉效力再臣等由托克三進兵時索倫參領額林䇿等渡海都河至哈喇沙爾路口遇嗎哈沁二十餘人即行𠞰殺詢據重傷婦人供係沙喇斯之人取魚為活伊等游牧久已奔散等語奏入上諭軍機大臣曰雅爾哈善等奏稱官兵已抵哈喇沙爾皆思奮勉效力等語覽之殊為欣慰從前曾議兩路進兵夾攻回部今兆惠等雖進𠞰厄魯特賊衆尚未將渠魁擒獲則辦理回部専倚雅爾哈善額敏和卓等務宜和𠂻商確早奏膚功至此次聲罪致討惟在波羅泥都霍集占及附和為惡之數人與回衆無涉雅爾哈善等應宣示回衆若將首惡擒獻非但無罪且必加恩則伊等自生內變又從前議於特穆爾圖淖爾等隘口防範逆酋等潛逸即哈薩克錫喇等由此路投入回部亦可邀擒俱宜早為布置至沙喇斯瑪呼斯賊衆大概逃入回部或哈薩克布魯特等處若謂竟自分散恐非實信雅爾哈善等亦當乘便搜捕庶逸賊盡殄臺路可清併𫝊諭兆惠等知之申諭辦理屯田侍郎永貴等籌畫墾種收成分數上諭軍機大臣曰永貴等奏稱前與雅爾哈善㑹商無分進𠞰屯田兵丁隨到即令開墾地畝續因耕牛農器不能全到先就闢展等處所有畚鍤令其開溝築堤又哈喇沙爾之海都河水勢湍急必須渠深岸固方免衝齧等語看來今年播種之期似稍遲悮但將進𠞰兵丁後隊截留人力有餘或可將烏魯木齊等處俱行墾種可𫝊諭永貴等現在籌議屯田處所交秋以後成熟穀石若干來年伊犁等處屯田能以次興作否併將伊等奏摺録寄黃廷桂閲看俾得酌量豫備壬辰諭定邊將軍兆惠等速追舍楞等賊上諭軍機大臣曰據和碩齊唐喀祿等奏稱哈薩克阿布賚遣使來告伊等派兵往博羅塔拉與舍楞布庫察罕相攻俘獲特古斯哈什哈等百餘戶哈薩克兵馬亦多傷損舍楞等尚有千餘户未知去向等語看來布庫察罕為舍楞所迫逃向伊犁又為我兵擊敗舍楞仍在博羅塔拉附近藏匿從前朕謂舍楞必不竟入俄羅斯諭兆惠等派兵搜捕與和碩齊等所奏適相符合則兆惠等向來並未疾速追擒第欲以投入俄羅斯結局昭然可見可𫝊諭兆惠等此時兆惠即往回部尚有䇿布登扎布等在伊犁先行追𠞰舍楞等賊衆兆惠奉到此㫖亦即回兵策應又有和碩齊等堵截賊勢自必窮蹙且近與哈薩克交兵未必往投即往投必被其俘送斷難漏網但不可徒恃哈薩克之協助而懈我軍心耳又阿布賚來信云伊等派兵於三月起程五月中旬可抵洪郭爾鄂隆等語併諭兆惠等知之又諭曰和碩齊等奏舍楞等賊衆未知所向現於由塔爾巴噶台愛呼斯前來之布空郭勒及和尼邁拉呼等處可入俄羅斯之要路俱安設卡倫等語從前屢諭伊等堵截逸賊今又諭兆惠等派兵搜查䇿應其加意防範勿使逋逃癸巳申諭定邊將軍兆惠等擒賊不力上諭軍機大臣曰兆惠等奏報久稽閲今日所到各摺凡𠞰賊機宜總未籌及惟信俘獲人口供詞於哈薩克錫喇則云已入哈薩克舍楞則云已入俄羅斯又不親往追襲但云已行文和碩齊唐喀祿等堵截及哈薩克阿布賚擒送遂請往辦回部聊以塞責即如鄂哲特供稱哈薩克錫喇因馬力有餘得以逃去則從前所奏被哈薩克搶掠隻身潛遁之言俱不可信矣又如巴里坤所送口糧即不能運往回部亦應留貯伊犁乃行文停其續送是何意見兆惠於去年追擒阿睦爾撒納時並未親往經朕飭諭始䇿應富德因姑從寬免何得復蹈前轍自取罪戾著𫝊諭申飭若能將渠魁弋獲尚可自贖且兆惠此時即先往回部亦當嚴促哈薩克縛送逃入之渠魁若尚在藏匿則回部既平同雅爾哈善經理後仍宜回至伊犂務將哈薩克錫喇等擒獲方為蕆事在朕意本欲於今嵗成功即可一勞永逸若來年再圖大舉糜費兵馬錢糧必歸咎於前此之逗撓不力豈伊等所能承任乎至䇿布登扎布所奏在哈什空格斯等處搜捕逸賊此等處所伊等進兵時俱已經過何必重勞馬力現在哈丹阿巴噶斯餘衆及舍楞等大隊俱未𠞰除殊屬不知緩急伊等其自知愧悟益加奮勉又據奏送從哈薩克逃出之巴顔克什克及喇嘛原端達什等行至巴里坤即解送來京併諭阿里衮知之定邊將軍兆惠等疏奏隱匿馬匹之郭木呢勒圖審明正法兆惠等奏言原任侍衛郭木呢勒圖將巴圖濟爾噶爾隊內驚走之馬七十三匹隱匿不交又故驅馬羣衝入巴圖濟爾噶爾隊內以致各羣混亂臣等請提首告之章京喀勒占對質今四月十一日喀勒占到案臣等詳訊供詞與巴圖濟爾噶爾所奏情節無異郭木呢勒圖亦俯首無辭臣等遵㫖將郭木呢勒圖正法奏入報聞庚子訓諭定邊右副將軍䇿布登扎布等量力追𠞰賊衆上諭軍機大臣曰昨諭策布登扎布等不必在經過之哈什空格斯等處搜捕逸賊惟以擒𠞰舍楞等為要但䇿布登扎布曾有舊疾復發之奏朕心深為軫念此時應已痊可羅卜藏多爾濟聞亦有足疾此時得全愈否若尚未愈則現在領隊有人即令其回遊牧調理至得傷之侍衛官兵等平復與否俱乘便查奏再哈薩克阿布賚等若遣使前至軍營或詢及伊兄成衮扎布即告以曾奉恩㫖念其在軍前一載有餘暫令於烏里雅蘇台休息是以命我接辦軍務之語庶外藩不致猜疑併𫝊諭策布登扎布知之申諭散秩大臣和碩齊等嚴防舍楞逃竄上諭軍機大臣曰近因成衮扎布奏從前遣往哈薩克之侍衛旺楚克多爾濟回營述阿布勒比斯之言謂舍楞曾在博羅塔拉之道圖托羅海藏匿遣人前往俄羅斯為哈薩克擒殺等語看來舍楞從伊犁逃往俄羅斯必有間道可行不定由布空郭勒和尼邁拉呼一路是以和碩齊等未能相遇可𫝊諭伊等將舍楞可入俄羅斯路徑逐一訪問堵截要隘遇賊即行𠞰殺不可但於布空郭勒等處駐候此㫖仍著成衮扎布派官兵數十名飛遞和碩齊等章奏即令其齎回辛丑訓諭定邊將軍兆惠等勿停運送糧餉上諭軍機大臣曰阿里衮等奏稱准兆惠咨文業經前往回部所有補給糧餉不能趲赴應停其運送已飭糧運官員止照䇿布登扎布官兵分數交收其餘給與臺站官兵等語軍需糧餉所關最要逺道䭾載物力維艱即云有賊人牲隻接濟而米石甚不易得今雖趲運不及自當先給現在伊犁及臺站官兵其餘留貯軍營派兵看守何必退回即如䇿布登扎布現稱兆惠將伊等口糧取去兆惠等進兵之初曾通計前抵沙喇擘勒再往回部之糧今從伊犁起程則已較沙喇擘勒為近當有贏餘何至取策布登扎布之糧且既取之後亦不為人豫籌補給及將來回抵伊犁之用轉行文停止運送是何意見夫此項趲運之糧兆惠等雖暫時不用而策布登扎布現在彼處即留於策布登扎布亦未為不可往返運送徒勞駝隻有是理乎可𫝊諭兆惠策布登扎布等運到糧餉務宜加意撙節有餘即當貯備併𫝊諭阿里衮速飭糧員照常運送毋得視為不急之務致有盜竊糜費壬寅參贊大臣阿桂等疏奏舍楞信息阿桂等奏言五月初四日據巴爾虎領催巴岩察哈爾署護軍校津巴索倫披甲車登至營告稱四月二十七日遇行文和碩齊之侍衛布三泰問知我等係唐喀祿前鋒於二十一日在布固圖河為叛賊舍楞等所敗因馬力脫出其大臣侍衛官兵等不知如何布三泰即給馬二匹令晝夜馳報竝行知侍衛奎薩等速來䇿應途次遇奎薩等告知前事奎薩即領兵於五月初一日輕騎前趕布三泰又换給馬匹令我等報知等語臣等詢問巴岩據稱哨探侍衛穆倫保於四月十六日捉生詢問知布庫察罕等為大兵擊敗舍楞在阿古爾哈爾海結寨拒守和碩齊等即領兵追襲哨探兵十人只三人脫出十七日遇舍楞之弟勞章扎卜被巴爾虎都圖等射傷擒獲據供伊兄現欲歸順和碩齊等遣人往撫舍楞遣宰桑三人約降十九日和碩齊唐喀祿領兵三十名往㑹舍楞約於二十一日來降先一日將勞章扎卜放回至日舍楞等賊衆二千餘人前行至河䭾載甫渡忽回向我兵排立和碩齊等詢問仍以駐候牲隻為詞日中伊等忽分兩翼衝擊與我兵互有殺傷良久惟見賊衆紛擾及帶鞍馬匹驚逸我連射三賊左手大指被傷與索倫噶什圖及一索倫一察哈爾向西衝突三人俱被賊追刺我因馬力得脫等語臣等復詢以舍楞所向大約逃往俄羅斯伏思巴岩之言雖未可盡信但奎薩等自應領兵速往臣等就現兵二百餘人并追回已撤之察哈爾兵三百人內挑選四百五十名於五月初七日起程䇿應又成衮扎布派給臣等喀爾喀兵一百名將抵軍營令圖薩拉克齊瑪克蘇爾添派兵丁五十名續行接濟口糧務得和碩齊等信息奏入上諭軍機大臣曰阿桂聞和碩齊唐喀祿為舍楞所誘我兵失利之信即領兵䇿應甚屬奮勉著加恩賞戴孔雀翎逆賊狡詐如此情殊可惡著𫝊諭䇿布登扎布計此時舍楞尚未入俄羅斯必擇地藏匿即領兵速進與阿桂合力攻擊從前亦屢降諭㫖伊等由博羅塔拉前往路亦甚近至伊犁餘賊俟兆惠歸途辦理亦可再成衮扎布亦當派兵三四百名親往科卜多駐劄候信相機䇿應并𫝊諭郎中三寶於達什達瓦遊牧派兵二百名令總管鄂齊爾帶往成衮扎布軍營聽其調遣仍查伊等游牧有無存貯錢糧有則照進兵之例賞給否則俟抵科卜多後補領其和碩齊等所領官兵有為賊傷害者著查明加恩賞恤萬一逆賊逃入俄羅斯亦作速奏聞仍命理藩院行文該薩納特衙門索取命議處寧夏解馬官員等上諭軍機大臣曰黃廷桂參奏寧夏滿營協領齊卜騰昌阿禮佐領伯色涼州佐領二格等解送巴里坤馬匹照管踈忽致多遺失請交部嚴加議處等語此項馬匹係豫備軍前調撥關係甚重自應留心看守牧放向來滿營解送馬匹勝於緑旗官兵乃齊卜騰等較之緑旗轉多遺失甚屬不知愧恥除將送馬兵丁嚴行責懲外齊卜騰等俱著交部嚴加議處仍勒令分賠將軍社圖肯嵩阿禮平時不能管束教訓亦著交部嚴加察議癸卯申諭定邊左副將軍成衮扎布等辦理舍楞賊衆上諭軍機大臣曰據成衮扎布奏稱得阿桂所報舍楞信息即同莽古賚領兵三百名前往布延圖策應所奏深協機宜適與朕所諭吻合舍楞等為我兵窮追逃竄其力有限阿桂既領兵䇿應又有成衮扎布等相繼前行愈為妥協伊等至布延圖軍營惟在相機辦理又思車未楚克扎布頗諳軍務今烏里雅蘇台無事有福祿等在彼足矣成衮扎布前往䇿應若用伊為哨探似屬有益至達什達瓦屬人亦於地方熟習但游牧稍逺未必能趲赴若軍前需用自可調來接濟或非所必需而業經派調即酌量賞給遣回亦可又諭曰阿桂昨奮勉遄行朕已加恩賞伊若得舍楞確信須量力而進倘賊勢頗强即候成衮扎布等合力攻𠞰固不可輕身嘗試亦不可心存恇怯其巴爾虎領催巴岩即令其馳驛來京以備詢問乙巳議駐劄索倫官兵事宜黑龍江將軍綽爾多等奏言臣等欽奉諭㫖揀選索倫兵一千名攜眷前往伊犁烏魯木齊等處駐防續奉有伊等若不願攜眷前往即令其更番戍守之㫖臣等遵將打牲索倫等𫝊集詢問據稱情願本身前往效力臣等揀選年力精壯者一千名派副總管二員佐領十二員驍騎校十二員於六月間由克爾倫一路起行三年一次更换查駐防官兵俱按俸餉賞給官員賞俸二年兵丁賞銀四十兩請將此次派出官兵減半賞給所有跟役馬匹及鹽菜口糧俱賞給銀兩其軍器等件酌於四城官兵內取給火藥鉛子麻繩亦於存貯數內動用仍由理藩院派出筆帖式領催等帶領前往其總統官員請候命下遵行奏入得㫖軍機大臣速議具奏尋議派撥索倫官兵蒙恩諭體恤令其更番戍守今綽爾多等請三年一次更换應如所奏辦理索倫官兵原無俸餉今照駐防官兵例減半賞給其跟役馬匹及鹽菜口糧銀兩均請照例賞給軍器等件亦照兵數帶往惟火藥鉛子麻繩䭾載多費應令向烏里雅蘇台支給此次駐防兵丁軍前自有大臣統轄似不必再派將軍副都統等即於副總管內揀派一員令其管領再西路所有索倫兵在軍前年久俟此次官兵到日即行撤回其由理藩院派員帶領亦係循照舊例應派筆帖式一員領催二名馳驛前往經過喀爾喀各游牧俱添派兵丁照管至烏里雅蘇台離西路不逺由成衮扎布派撥帶領兵丁其筆帖式等即令回京奏入得㫖帶領索倫官兵不必派出筆帖式等著御前侍衛敦察理藩院主事留保住前往至烏里雅蘇台時成衮扎布或於達什達瓦屬人或於扎哈沁屬人內熟習從阿濟必濟經過哈卜塔克拜塔克至巴里坤路徑者派出二名隨敦察等沿途搜捕嗎哈沁抵巴里坤後即著回京餘依議丙午申諭定邊右副將軍䇿布登扎布等親往會𠞰舍楞上諭軍機大臣曰據䇿布登扎布奏稱派喀爾喀公品級達什等搜捕空格斯附近逸賊俟回兵後再遵㫖前至塔爾巴噶台探叛賊舍楞所向等語伊等從前初聞舍楞逃信若即行尾追又有和碩齊等堵截必為我兵擒獲何至有約降失利之事今舍楞已逋逃兩月餘此時豈尚在塔爾巴噶台坐待追兵耶現在阿桂及成衮扎布俱前往策應可傳諭策布登扎布惟速赴額爾齊斯㑹同勦賊不可派員前往至所奏圖倫楚追擒布圖庫未獲又派往策應敏珠爾多爾濟攻勦哈丹餘賊等語圖倫楚此次追賊全未奮勉效力著革去副都統降為二等侍衛以觀後效申諭定邊將軍兆惠等進勦招降事宜上諭軍機大臣曰據兆惠等奏稱四月十三日渡伊犁河已抵格根喀爾竒喇詢問嚮導人等由特穆爾圖淖爾過巴爾琿嶺穿行布魯特境內計一月可至葉爾羌喀什噶爾等語前經屢降諭㫖令兆惠等將伊犁等處叛賊渠魁全行擒獲再往回部今來奏業已遄行自毋庸復返但伊等帶兵不多當沿途休息馬力候雅爾哈善信息隨後㑹合方克有濟此時兆惠等已往回部䇿布登扎布等又往追舍楞伊犁無兵駐守或哈薩克錫喇等乘間復出亦未可定可𫝊諭兆惠等平定回部後仍遵前㫖回抵伊犁盡𠞰遺孽如渠魁一人未獲不可謂之蕆事其沿途所見情形仍陸續奏聞又諭曰從前敕諭布魯特部落之㫖久經頒發兆惠等既經過其地即將前㫖通行曉諭或應加以撫慰或應示以兵威惟在相機辦理丁未命以發遣人犯賞給安西等處緑旗兵丁上諭軍機大臣曰發遣巴里坤屯田人犯前據阿里衮奏請分地安插已諭由黃廷桂處行文申飭今該督覆奏尚未悉辦理本意此等人犯與賞給黑龍江索倫兵為奴之犯無異但從前定議時僅將此列入屯種事宜各條內未有賞給兵丁為奴之語無怪外省之瞻顧拘泥視為萬難辦理之舉也著再行詳悉𫝊諭黃廷桂等俾得知所從事此時屯田一事既由近及逺則人犯亦不必遽行逺發著先賞安西緑旗兵為奴俟安西數足再發往哈密二三年後以次及巴里坤烏魯木齊等處兵丁為奴如滋事潛逃拿獲即行正法該督等更當留心體察并𫝊諭永貴定長知之己酉議屯田增兵措餉事宜辦理屯田侍郎永貴等奏言臣等欽奉諭㫖令將現在屯田收穀分數合計兵丁口糧來嵗可增兵墾田若干及酌留平定回部兵丁就近屯田等事籌議具奏臣等伏思平定回部後若將兵丁撤回巴里坤於次年屯田時再往未免勞費自應酌量存留現在屯田兵三千六百名可收穀三萬零六百石其魯克察克吐魯番附近喀喇和卓等處雖有餘地究為磽瘠不必增兵烏魯木齊地廣而荒擬前往查勘再議托克三餘地尚多水亦足用惟當修堤濬渠應請增兵四百名哈喇沙爾地最廣海都河水甚足但河身低於渠道須大加修築應請增兵二千名合之現在兵丁共六千名益以官員胥役自本年十月至來年九月收穫時所需耔種口糧計本年所收之穀可支六月尚不足五月餘之食須由巴里坤運送恐滋勞費但臣等查奏收成分數特就去年闢展所得約略計算若官兵奮勉力作能倍加收穫自當酌減運送之口糧或有增添亦即行文補給奏入得㫖軍機大臣議奏尋議屯田一事原為駐防兵丁省轉餉之勞必勸課力田一人所耕可給數人之食方為有益今永貴等奏稱除支給屯兵口糧外所餘無幾未免有名無實或係墾闢之初人力不齊所致嗣後若仍不能多穫則自屬辦理不善應俟秋收之日再為查核其烏魯木齊等處度地增兵應如所奏辦理至所奏六千兵丁尚不敷口糧五月餘又云運送恐滋勞費乃慮留兵太多則口糧不足之意永貴等係専辦屯田大臣見聞既確自應明白陳奏請敕下永貴等令將來年應增兵丁若干口糧若干且巴里坤既難運送可否向回人交易據實奏聞若回地出穀有限不能交易即將前後屯田兵丁暫行撤回巴里坤其附近吐魯番所收穀石令額敏和卓派兵看守惟烏魯木齊等處較逺酌於駐防索倫兵一千名內派五六百名前往看守仍令黃廷桂將屯田需用各項先期送至吐魯番俟來年將屯田兵丁遣往收穫有效再於伊犁等處漸次經理奏入上諭曰屯田積穀本意原為駐防兵丁口食有資且省餽餉之勞俾邊民得以休息若所收榖石僅足供給屯田兵丁復有何益此奏著交與雅爾哈善額敏和卓等悉心籌酌據實定議具奏壬子參贊大臣阿桂等疏奏堵𠞰舍楞官兵信息阿桂奏言臣等於五月初十日駐兵多托淖爾據和碩齊隊內察哈爾護軍賽音圖索倫署驍騎校薩爾巴圖巴爾虎領催達賚等報稱四月初八日和碩齊唐喀祿等聞哈薩克汗巴巴領兵前來將舍楞差往俄羅斯之三人拿獲十四日領兵五百名至布固圖河十七日擒獲舍楞之弟勞章扎卜據供舍楞情願歸降因釋放回巢舍楞請定地遷移遊牧唐喀祿恐為所誘和碩齊欲察看情形同唐喀祿富錫爾佛爾慶額前往和碩齊恐舍楞疑懼令官兵下馬舍楞遣人送酒和碩齊飲之即直造其營久未回返忽賊衆喧噪攻擊我兵猝起迎敵至額卜克特山察哈爾護軍畢里克圖親見和碩齊更衣走入賊隊侍衛穆倫保等奮力殺賊四十餘人傷賊二百餘人穆倫保及察哈爾署參領巴特瑪扎卜索倫署參領額爾古勒等陳亡戴奬賞翎托爾蘇岱署參領額德爾德被傷最重察哈爾營總齊巴勒索倫參領車伯勒敏遜阿喇卜坦俱被傷察哈爾署參領拜音察克受傷被擒營總齊巴勒等辨認遺尸收集兵丁二百餘名二十三日遣來呈報臣等於五月十二日兵至索勒畢布拉罕之伯勒齊爾厄魯特藍翎侍衛碩通唐喀祿家人百嵗等前來詢知唐喀祿等於四月二十日至舍楞之營坐談良久伏賊忽起害唐喀祿并斫其腹佛爾慶額同時被害富錫爾起立射殺一賊賊衆競前斫仆百嵗傷首得脫碩通告稱賊人逃走踪跡係過喀拉瑪嶺投入俄羅斯由布固圖前往十餘日可至賊衆約二千餘人又據脫出之巴爾虎兵扎雅圖親見和碩齊在賊隊內散行又聞賊衆渡額爾齊斯河將和碩齊釋放并給與馬匹等語又據前遣遞送諭㫖之護軍校七格回營告稱四月十七日至布空郭勒見和碩齊等業已移兵二十三日至布固圖河見官兵被害情形望見賊衆烟火隨潛身偵探為瞭望賊人所覺追來接戰七格與索倫署驍騎校禪新署領催祿吉圖各射殺一賊奪取馬匹軍器沿途收集官兵五十餘名分給口糧馬駝令其續到臣等仍策應侍衛奎薩營總班珠爾等速追舍楞令碩通為導一面護送脫出之得傷官兵等回科卜多休息遣回各游牧其餘官兵有情願再往雪恨者仍行帶往奏入上諭軍機大臣曰據阿桂奏報和碩齊唐喀祿等為賊舍楞所誘唐喀祿等被害和碩齊更衣降賊等語唐喀祿雖一時被誘遇害尚能奮勇捐軀深可憫惻著交部照陳亡副都統例議恤侍衛富錫爾穆倫保佛爾慶額等亦著交部議恤俱給與世職其餘陳亡得傷官兵著阿桂查明送部分别議敘議恤侍衛奎薩營總班珠爾聞信前追逆賊亦著議敘護軍校七格著加恩授為二等侍衛賜號哈坦巴圖魯藍翎侍衛碩通授為三等侍衛賜號卓里克圖巴圖魯賞銀各一百兩營總齊巴勒敏遜遇應升之缺即補驍騎校薩爾巴圖遇佐領缺出即補護軍賽音圖領催達賚以驍騎校即補至和碩齊自歸附以來加恩擢至散秩大臣今遇賊叛降情罪可惡倘戀其妻子潛回游牧即行拿送來京仍遣納穆扎爾馳驛至察哈爾將伊妻子全行誅戮以彰國憲又諭曰阿桂領兵速追逆賊尚屬奮勉若舍楞未入俄羅斯務宜體察賊勢相機擒𠞰或需增兵即知㑹成衮扎布前往䇿應阿桂仍候辦理哈薩克錫喇布庫察罕事竣再行撤回成衮扎布此時暫駐科卜多候信其脫出得傷官兵阿桂即量加賞給令回游牧休息前所派達什達瓦兵丁成衮扎布亦酌量賞給調回昨據舒明奏請與成衮扎布同往策應阿桂則科卜多軍營之任又將誰屬殊不曉事豈以一經陳奏便可塞責耶著仍駐科卜多辦事平定準噶爾方略正編卷五十五
