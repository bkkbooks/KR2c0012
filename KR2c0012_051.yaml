  text: 欽定四庫全書平定準噶爾方略前編卷五十一
  hash: sha256:89d314fead200ab920bdebd7429f9eaeec531505c08e87d5b97d78d43cf3ef67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_051-1a, image: WYG0357/WYG0357-0741a.png}
body:
  text: 乾隆十三年春正月癸卯申飭署青州將軍三達色上諭軍機大臣等曰前因安插青州之厄魯特博羅特等脫逃該將軍及副都統等不行奏報業已𫝊㫖申飭及差侍衛賽音圖理藩院郎中善泰前往㑹同三達色將已經拿獲之博羅特等五人審訊正法賽音圖等復命回京三達色並不將辦理之處奏聞又經降㫖詢問而三達色於接到朕㫖之後仍不過陳奏謝恩無一語及前事竟若置身事外者三達色著傳㫖嚴行申飭己酉議定喀爾喀四部落運送軍營米石事宜先是副都統保德奏言軍營米石交商運送糜費甚多不若令喀爾喀四部落每部落派駝五百隻四部落共派駝二千隻每駝給製造鞍屉等銀三兩派兵一名管駝五隻賞給銀三兩派章京一員管駝五十隻賞給銀六兩每部落派圖薩拉克齊二員每員各賞給銀十二兩由歸化城運至軍營計駝二千隻每年運米四千石其運費較之交商運辦僅需十分之一而於䝉古人等亦為有益經軍機大臣等請㫖交額駙策凌詳細酌議到日再行定議尋額駙策凌議奏喀爾喀四部落均情願出駝運米其酌派官兵賞給銀兩事宜應如保德所請辦理再查鄂爾昆塔米爾二城倉內現貯米五萬八千餘石大麥二萬四千三百餘石小麥九十餘石軍營每年支放官兵需米八千石大麥九百五十餘石小麥九十餘石現在米石足敷六年之用若每年再運米四千石加之本處所産大麥小麥積久存貯恐致黴爛請於此一二年內驗其米色改變者照數支放將好米加緊收貯仍照從前原議足敷二三年食用應請於庚午年起令四部落照新定之例派駝運米至軍營米石請嗣後祗支給內地官兵其喀爾喀䝉古仍請給與羊價銀兩奏入得㫖軍機大臣等議奏尋議查從前喀爾喀兵丁原無給米之例止給與羊價銀兩自乾隆六年始議以每月給銀一兩五錢米一斛現據額駙策凌以䝉古素不食米給與羊價實屬妥便為請但軍營存貯米麥甚多現在緑旗兵丁又經裁汰計每年支放無幾必致積久黴爛應將喀爾喀兵丁仍照舊支放米石又查軍營搭放米麥每年給米三百零六日大麥四十八日小麥六日今大麥一項現存二萬四千三百石有竒若將米麥酌量均搭現存數目足支內地官兵十年喀爾喀兵丁八年食用今酌議給放喀爾喀兵丁米麥至乙亥年停其給放全給羊價銀兩其內地官兵米麥亦俟給放至乙亥年令額駙策凌奏聞以丙子年為始照依現在所議支給派出喀爾喀四部落官兵運送米石交與軍營存貯再查軍營羊價每隻給銀五錢後因價昻陸續自七錢增至一兩今大兵盡撤羊價平減應每隻仍給銀七錢每月總給銀二兩一錢奏入上從之甲寅命議處原任青州將軍額爾圖等軍機大臣等奏言臣等遵㫖詢問額爾圖據稱博羅特等六人脫逃理應即行奏聞後因博山縣擒獲五人惟達什哈一人未獲欲俟審明具奏因母病故移交署將軍三達色辦理似此緊要事件又係任內經手辦理並不奏聞實屬罪無可辭請交部議處奏入得㫖自青州脫逃之厄魯特達什哈等六人俱係逆賊理應一面嚴緝一面奏聞乃額爾圖等竟視若尋常逃犯不行具奏甚屬疏忽及移交三達色後祇將錢糧咨請部示更屬舛謬額爾圖三達色著一併交部察議二月癸亥安西提督李繩武奏報進貢夷使唵集等入境丁丑恩准夷使誤帶牲畜於哈密售賣上諭軍機大臣等曰安西提督李繩武奏夷使唵集等到卡多帶牲畜欲在鳥克圖行走責以違例據稱上年瑪木特回時並未傳諭此番初來實不知定例所有帶來瘦乏牲畜懇在哈密變價次日仍由東大坂過山看其情形尚屬恭順著照上次加恩之例准其將所帶牲畜變價但須曉以與例不符姑因瑪木特未經告知致爾等誤帶此次暫准貨售乃係格外加恩明白宣示著𫝊諭李繩武一面辦理一面奏聞三月乙酉朔飭禁夷人擅入卡倫署定邊副將軍參贊大臣塔爾瑪善奏言本年正月二十九日在格濟格臺站地方拿獲準噶爾扎卜等五人訊係入卡探親經侍衛達永阿曉諭發回並未申報管臺大臣除將該侍衛嚴飭外臣隨𫝊諭各卡嗣後有似此探親者著即解烏里雅蘇台參贊大臣令將緣由報知將軍應如何辦理之處遵照辦理奏入得㫖準噶爾雖現在和好然從前並無准其人衆入卡探親之議今次被獲之人從寬發回須令伊等知係格外恩典嗣後務將部衆嚴加約束毋得視為故常違議滋事俟夷使來時將此曉諭知之丙戌訓飭侍郎玉保等上諭軍機大臣等曰據玉保奏稱準噶爾夷使知藏內有出痘之人甚屬畏懼乞將護送官兵俱行離逺居住又往大小寺內時令伊等自行守門不使官兵同入等語準噶爾人素行狡詐其欲令我官兵逺離未必無言語離間之事由此觀之其詭譎伎倆尚未盡革自應以理曉諭使之折服且我兵既已出痘豈有復出之理玉保等不即以此言駁詰乃遽令護送官兵移令逺住辦理甚屬姑息著將此傳諭玉保等知之辛卯侍郎玉保奏報熬茶夷使瑪木特等自藏起程還部癸卯命索拜等留心防範西藏事宜上諭軍機大臣等曰據索拜等奏稱因前藏有出痘之人達賴喇嘛坐禪靜養郡王朱爾默特那木扎爾避往里定地方等語從前達賴喇嘛已經圓寂伊屬下噶卜倫等隱匿不報詭稱避人坐禪以致藏內滋事準噶爾乘間擾亂今藏內出痘達賴喇嘛雖應暫避但恐伊屬下之人復蹈前轍或有事故不以實告亦未可定此事大有關係不可不用心覺察況準噶爾熬茶之事尚未完竣伊等見達賴喇嘛避人靜養或不能無猜疑生事之處更當嚴密防範著傳諭索拜傅清等令其留心體訪加意防維即準噶爾人等已經回巢亦不可稍有怠忽命駐藏副都統傅清回京上諭軍機大臣等曰近日準噶爾熬茶之事將畢傅清著即馳驛來京其藏內事務交與索拜辦理如索拜已經起程傅清仍留藏辦事俟另派員更換夏四月戊午停止夷使筵宴軍機大臣等奏言從前夷使到京俱䝉恩賜筵宴今據護送夷使員外郎甘布等報稱準噶爾夷使唵集等於本月初六日進京現遇孝賢皇后大事距百日之期尚逺應請將筵宴之處停止至夷使唵集等仰覲天顔之日一切禮儀照例辦理其齊集大臣侍衛等著仍穿素服奏入上從之己未準噶爾使臣唵集等到京進表請安並貢方物準噶爾台吉策妄多爾濟那木扎爾謹奏大皇帝陛下去嵗奏請念經一事䝉大皇帝隆恩俯准又諭我念經人等寧少毋多并令於哈濟爾地方貿易以銀易貨懼忭無極從前在土伯特處延請墨爾根喇嘛大半物故現存者皆已年邁思歸故土准於何路行走酌量派人送往以期推廣黃教安慰生靈伏祈大皇帝睿鑒未盡之言令唵集等口奏恭進馬二匹玉碗二隻貂皮四十一張奏入報聞庚申命副都統拉布敦赴藏上諭內閣曰駐藏副都統傅清已降㫖令其來京其員缺著副都統拉布敦前往更替即速整裝赴藏不必帶領換班官兵俟下次派出換班大臣時再照例帶領前往壬戌命議敘緝獲逃人之扎薩克頭等台吉達什丕勒等軍機大臣等奏言額駙策凌奏喀爾喀頭等台吉達什丕勒嚴飭伊屬將青州脫逃之厄魯特達什哈留心擒獲甚屬可嘉應請將達什丕勒紀録二次其可否賞給戴翎之處出自皇上天恩四等台吉孟克遵奉訪查於布拉罕地方將達什哈拏獲亦屬可嘉應請照額駙策凌所奏賞給粧緞一匹官用緞一匹布四匹外仍令加賞一分兵丁齊巴克等四人亦請照所奏各賞給布四匹外再加賞官用緞各一匹以示鼓勵奏入得㫖達什丕勒著戴翎再著賞粧緞二匹官用緞二匹餘依議又諭內閣曰厄魯特達什哈自青州脫逃直至喀爾喀游牧布拉罕地方其所經由內地甚逺沿途州縣安設里甲原為稽察不肖匪類今以面生䝉古任其潜逃竟漫無覺察則山東直𨽻等處地方官員平日因循茍且雖有緝拏奸匪之責並不實力奉行可知達什哈俟拏解到京其由何路經行出口之處交軍機大臣審明後即行正法外其沿途地方官員俱著查明議處尋額駙策凌將達什哈解到軍機大臣等遵㫖審訊奏言臣等訊問達什哈脫逃情由據稱因不能受青州炎熱欲逃往喀爾喀糊口亦並無一人主使再脫逃時係由青州往西北邉墻闕處出口實不知經由內地地名等語查達什哈雖因不耐炎熱起意脫逃但伊係準噶爾賊人前從邉上被獲時即應正法因其投誠前來皇上加恩安插青州乃伊不思感戴輒行逃回惟甚可惡應請將達什哈交刑部即行正法再達什哈雖供稱由青州往西北邊墻闕處出口實不知內地地名但青州西北係山東直𨽻山西之地達什哈乃面生䝉古地方官尚不能拏獲則平日怠惰不以緝匪為事可知應令該督撫查參以為承緝不力者戒奏入得㫖達什哈著即處斬其逃走經由地方不行查拏官員均應議處但既未供明內地路徑若將三省官員通行議處未免株纍其地方官查議之處著加恩寬免至直隸山東山西三省督撫按察使捕盜同知通判等平素漫不留心著交部察議癸亥安西提督李繩武奏報貿易夷人賚木瑚里等入境甲子傳諭準噶爾使臣唵集軍機大臣等奏言本年三月內據署定邊副將軍參贊大臣塔爾瑪善奏準噶爾烏梁海扎卜等五人擅入額爾遜卡倫探親經卡倫侍衛等曉諭回巢奉㫖令將此事於夷使來時明白諭知今夷使來京應遵㫖曉諭令其歸告台吉務將此等烏梁海嚴加約束不致日後滋生事端以成永久和好之道隨交尚書臣海望等傳諭來使唵集據唵集等禀稱此等烏梁海所住之處離我台吉處甚逺不能知悉乞將伊等名姓何人屬下擅入何處卡倫之處明白開載交與我等歸告我台吉嚴加懲治以靖邊界奏入報聞乙丑準噶爾使臣唵集等入覲命賞策妄多爾濟那木扎爾粧緞蟒緞漳絨及玻璃磁器等如例丙寅賜準噶爾使臣唵集等緞布銀兩冠服有差丁卯議定準噶爾肅州貿易人數年分軍機大臣等奏言定例準噶爾來京貿易之年不過二百人肅州貿易之年不過百人嗣因人京途逺䝉恩准其前赴肅州並准兩年中貿易一次人數仍以百人為率今來使唵集等又奏懇肅州貿易人數不敷乞恩准加增一百名每年來肅貿易一次臣等酌議肅州貿易准加增百人照進京貿易人數其所請每年貿易一次之處應不准行奏入上從之辛未賜準噶爾台吉策妄多爾濟那木扎爾敕書奉天承運皇帝詔曰覽奏知爾感激朕恩言詞恭順朕甚嘉之其欲將年老喇嘛請派人送歸土伯特從前並無此議且喇嘛髙年熟於經典何故轉欲送回彼出家之人隨處安身又豈必定回原處即如來京喇嘛亦從無送歸土伯特者此事不便准行再來使懇請另發喇嘛扶助黃教佛之一道惟在誠心不關念經之人從前爾父屢次奏請朕已明白開𨗳未經准行爾當稔悉不必固請也再請肅州貿易人數加增一百名每年貿易一次此事議有定例不得更張姑允所請肅州貿易人數准作二百名仍於兩年中前赴肅州貿易一次爾宜恪遵前規克修和好以圖永受朕恩特降敕令來使齎回隨敕賜各色緞十端加賞粧緞蟒緞各八端玻璃琺琅磁器十八事丁丑準噶爾使臣唵集等自京起程還部五月丙戌命蠲免那克舒番子己巳年應徴錢糧上諭內閣曰據索拜奏稱護送夷使進藏熬茶之官兵經過那克舒番子游牧將番子所備馬牛用過五百有餘又派番子在喀喇烏蘇以北安置臺站八處此係番子感激國家隆恩急公報效甚可嘉豫著加恩將該處己巳年應徴錢糧盡行寬免以示體恤申諭準噶爾人不得擅請入藏上諭軍機大臣等曰準噶爾人狡詐難信從前拉藏汗時進藏為亂至今衆喇嘛及唐古忒人懷疑懼即其來至藏地供給一應所需雖俱施恩賞給價值銀兩而唐古忒人等尚不無滋擾之處若聽其時常往來日久必致滋事近據朱爾默特那木扎爾告知索拜等以伊等時來藏內非土伯特有益之事其言不為無見近時兩次准令進藏熬茶者特因噶爾丹策零為伊父䇿妄阿喇布坦及策妄多爾濟那木扎爾為伊父噶爾丹策零之故伊既為父諄諄奏請不便過為拒絶是以加恩允准嗣後準噶爾人其有非此等事奏請入藏者應令嚴行拒絶斷不准行可將此㫖傳諭索拜等令其轉諭朱爾默特那木扎爾並達賴喇嘛知之恩賞郡王朱爾默特那木扎爾等緞匹有差上諭軍機大臣等曰此次夷使進藏熬茶所有賞賚及供給各項雖係動公備辦而郡王朱爾默特那木扎爾感激朕恩凡事能體伊父報效誠心妥協辦理甚屬可嘉著加恩賞蟒緞二端大緞四端噶卜倫公班第達等襄助辦公並無貽悮亦著加恩賞公班第達蟒緞一端大緞二端其噶卜倫扎薩克頭等台吉策零旺扎爾及色玉特塞卜騰布隆燦扎薩克頭等台吉旺對等俱著賞大緞各一端官用緞各二端逮綳達什達爾扎及章祿占巴阿蘭巴奈巴克扎奈等俱著賞大緞各一端官用緞各一端以示奬勵癸巳命停派參贊大臣往閲喀爾喀軍裝定邊副將軍額駙策凌奏言貝勒旺扎爾數旗本年有放賑之事其查閲軍裝請仍照上年所奏交與副將軍及盟長等令其在各游牧處查看參贊大臣暫停派往奏入上從之命減派喀爾喀防秋兵定邊副將軍額駙策凌奏言現在軍營無事所有調派防秋之喀爾喀兵二千名儘足策應其去嵗奏請暫減之一千名嗣後無庸撥派倘遇有調取之時一面奏聞一面調取奏入上從之議定四部落備辦十八臺站每年需用牲畜先是軍機大臣等奏言喀爾喀十八臺站每年抵補馬匹及備用羊隻歷由官備牲畜內領給今據額駙策凌酌令四部落照數捐備係由伊等感激聖恩情願輸將似應照依所請但臣等仰體皇上體恤䝉古聖心請交與軍營將軍大臣㑹同喀爾喀副將軍等令其將所需牲畜或從內厰酌解交與牧放孶生每年填補其如何辦理於喀爾喀人毫無擾纍之處妥議具奏到日另行定議尋額駙策凌等奏稱據副將軍親王額林沁多爾濟等公同呈懇轉奏喀爾喀地方安臺防守原為保護伊等地方起見况䝉聖恩賞給駐兵錢糧而所需牲畜為數無幾若復從牧厰內撥用於心實有不安等語臣等看其懇請出於至誠嗣後十八臺站需用馬匹羊隻應由喀爾喀四部落照數捐備奏入上從之己亥議定準噶爾投誠人等改發京口安插事宜軍機大臣等奏言向例携眷來降之厄魯特發往寧古塔安插單身來降之厄魯特發往江寧杭州青州天津等處安插今據安西提督李繩武解到投誠之厄魯特尼瑪等眷屬十二口應照例遞送寧古塔安插外其與尼瑪同來之單身厄魯特策凌孟克特穆爾巴雅爾們都等四人若仍照例遞送江寧等處其地人已過多應請將策凌等改發京口安插放為額外披甲給與錢糧半分無庸另給娶妻銀兩並將立産銀兩減半支給此係初次安插之人應交該將軍用心收管並派賢能官員將伊等賞給銀兩置立房地妥協料理嗣後單身來投之厄魯特即照此次辦理發往京口安插奏入上從之癸卯恩准夷人疲乏牛羊於哈密售賣安西提督李繩武奏言此次貿易夷目賚木瑚里等所帶牲畜較之上届加倍肅州牧厰既狹小難容現諭該夷於山北有水草處暫留牧放俟稍有臕力再分起趕行其疲乏牲畜約有萬餘窮夷懇求變賣勢難堅拒但哈密地處極邊自減防之後商民亦屬寥寥若仍令其趕赴肅州途中難保存活臣仍專差逰擊閻相師等設法售變俾不致於周章奏入得㫖軍機大臣等議奏尋議準噶爾赴肅貿易定有章程所帶牛羊從無在哈密變賣之例但向來夷使貿易之年及請安奏事之便多有㩦帶牛羊至哈密求售提臣等據情具奏屢奉恩㫖允准此次所帶牲畜既倍於上年其疲乏牛羊應仰體皇上懷柔逺人之意酌量於哈密地方設借售賣仍申明成例令其不得視為故常有違定議奏入上從之丁未議定分别安插投誠人等事宜安西提督李繩武奏言此次投誠之阿濟巴勒第呢雅斯等二人查明係額敏和倬部落之人昔年被虜今私自逃回雖有被獲復逃情節但遣之不去哀懇迫切情似可憫可否收留請㫖定奪奏入得㫖軍機大臣等議奏尋議收留準噶爾投誠人等屢奉諭㫖令該提等酌量情形分别辦理今阿濟巴勒第等既係額敏和卓所屬此次逃回雖經被獲復逃尚無追逐縱跡且哀懇情迫自應通融酌辦阿濟巴勒第現有弟兄可認應如所奏交與該扎薩克安插令其完聚其呢雅斯一名應照臣等奏定新例解往京口安插嗣後仍令該提等遵照原奉諭㫖不得概行收留如果情詞迫切萬難拒回再行請㫖定奪務宜審度情形隨時酌量辦理奏入上從之六月壬申命青海扎薩克公衮秦扎卜巡視卡倫辦理青海事務副都統銜衆佛保奏言青海地方巡視額色勒金柴達木兩路卡倫奉㫖派出王策凌喇卜坦等十人輪班巡察今策凌喇卜坦病故據扎薩克輔國公衮秦扎卜前至西寧告稱我䝉聖主隆恩自幼承襲公爵去年前赴木蘭瞻仰天顔賞給孔雀翎令在乾清門行走受恩深重無出力報效之處今策凌喇卜坦病故其巡視卡倫之缺懇求奏明令我在巡察卡倫處行走以圖報效奏入上從之丙子命加後藏尚卓特巴濟隆羅卜藏策旺達爾汗號封巴勒桑策凌為頭等台吉駐藏提督索拜奏言郡王朱爾默特那木扎爾告稱後藏之尚卓特巴濟隆羅卜藏策旺事奉班禪額爾得尼極為敬慎祈賜名號原任公那木扎勒塞卜騰之子巴勒桑策凌祈賞爵秩以示優奬此皆伊父頗羅鼐心內未了之事乞轉奏施恩奏入得㫖尚卓特巴濟隆羅卜藏策旺感激朕恩凡事辦理妥協殊屬可嘉著加恩錫以達爾汗號巴勒桑策凌亦著加恩封為頭等台吉嗣後當益加奮勉永受朕恩秋閏七月乙亥命加恩準噶爾脫回護軍官長保等上諭軍機大臣等曰由準噶爾脫回之護軍官長保著授為藍翎侍衛在粘杆處行走右衛前鋒伊凌阿發回右衛或在前鋒或在領催上行走遇有驍騎校缺出即行補授每人著加恩賞銀二十兩八月辛卯訓諭駐藏提督索拜等防範藏地事宜上諭軍機大臣等曰據索拜奏稱阿哈雅克卡倫人報稱碩翁土庫爾等處見有千餘人蹤跡準夷如來必由此路是以與朱爾默特那木扎爾商酌遣台吉旺對等前赴喀喇烏蘇等處整兵預備又將喀喇烏蘇及達穆各處番子游牧辦理移駐等語朕思準夷此數年來往返遣使交易甚屬恭順理應無事伊等如此辦理不免恇怯但準夷素行狡詐常有覬覦西藏之意再昨嵗進藏熬茶訪得用兵金川之信意以我國正值征𠞰金川藏地未必防範前來騷動亦未可定事之真僞雖未明白不可不為預備著傳諭索拜如果賊信確實駐藏兵丁僅止五百朕已另為籌辦此時拉布敦約略將到伊等惟護守達賴喇嘛班禪額爾德尼移至打箭爐等處駐劄不必以身係滿洲帶兵進𠞰致達賴喇嘛等稍有疏忽自取罪戾但移駐達賴喇嘛等亦不得輕舉妄動務須體察情形相機辦理此皆不過先事預籌之策若論索拜此奏不特情節未明且有自相矛盾之處即如所稱有竈五十餘處竈止五十餘則與千人蹤跡不符又因有霜霧不識去向彼時即有霜霧豈有不能尋蹤而得之理再伊等遽將附近番子移駐亦覺張皇失措此事如不確實令準夷聞之反生疑惑大有關係此時自當更得確信著索拜星速奏聞辦理甲辰傳㫖申飭駐藏提督索拜等上諭軍機大臣等曰據索拜奏郡王朱爾默特那木扎爾告稱遣往查看蹤跡之宰桑等回報至碩翁土庫爾地方分路尋查並無準夷來往止有往東北行走蹤跡或係截路唐古忒賊人亦未可知等語前經索拜具奏朕即以此事可疑伊等辦理造次令其作速確查明晰今果屬虛無索拜辦理藏務凡事宜斟酌情形詳慎妥協始能安輯地方今偶聞一語並未確查遽行整兵防備並令番子移駐游牧使準夷聞之反生疑惑冒昧張皇至此已極索拜曾經駐藏因係熟悉彼處情形之人準夷赴藏熬茶令其前往協同料理似此毫無主見舉動失措實非朕所意料著傳㫖嚴行申飭現在藏地既無事端所備兵丁應即撤回移駐番子仍令回至原地加意撫綏安慰不得仍拘泥前奏搖惑衆心並著傳諭郡王朱爾默特那木扎爾朕念伊父頗羅鼐奮勉效力施恩令其襲爵辦事想伊屬下人以伊年幼甫襲王爵未經更事未必如伊父時盡心出力此時正宜用心收服舊日任事之人協同助理始於地方有益即如此事雖因卡倫人等冒昧具報亦由伊所遣人員不能詳細妥協所致嗣後務宜效法伊父約束人衆安輯地方一切㑹同駐藏大臣等詳慎辦理辛亥議定軍臺巡輯匪竊事宜軍機大臣等奏言前因各臺站有被竊牲畜之事屢經傳諭各扎薩克等加意嚴緝乃因循廢弛並不約束所屬現據軍臺總管輝色報稱二十三臺復有被竊馬匹匪賊及兵丁追趕轉恃强奪去衣服并所騎馬匹不法已極應行令額駙策凌飭交二十三臺附近扎薩克等嚴查務將賊人拏獲治罪其此後作何巡查清除賊盜及將該扎薩克等定以處分之處仍令詳議具奏並令理藩院通行傳諭軍臺附近居住之扎薩克等各將所屬嚴行約束毋得為匪生事奏入上從之九月壬子朔命駐防哈密總兵官三年更代甘肅巡撫黃廷桂奏言駐防哈密總兵官王能愛於本年四月內二年期滿例應更換因夷使往來正資熟手料理是以未經請㫖更換今夷使陸續回巢王能愛例應回任應否照原議於安西甘凉肅各標內揀選副將一員抑或仍派總兵駐劄奏入得㫖軍機大臣等議奏尋議哈密為西陲要地實全陜藩籬夷使往來所必經防範宜加嚴密必得大員駐防方足以資彈壓查從前副將瑚寶駐防之時已䝉特恩加總兵銜嗣瑚寶丁憂奉㫖特派總兵官王能愛前往嗣後不必仍派副將應請於才具幹練之總兵官內請㫖派往且二年更換為期太速現在貿易夷使尚未回巢正資熟手料理應令該撫俟王能愛於明嵗三年期滿之後再行請㫖更換奏入上從之己未命侍衛穆克登額薩布喀善為軍營參贊大臣調塔爾瑪善努三來京上諭軍機大臣等曰現在金川用兵北路軍營無事侍衛穆克登額薩布喀善著賞給副都統銜前往軍營伊等雖未經事尚可學習著傳諭額駙䇿凌留心教𨗳塔爾瑪善努三不必俟穆克登額等到彼即於接奉諭㫖之日速行起程來京請訓後前赴金川辦事庚申恩免失察容留逃人之扎薩克圖汗巴勒達爾議處上諭軍機大臣等曰據額駙策凌奏扎薩克圖汗巴勒達爾拏獲安插荆州之厄魯特逃人察罕岱解交理藩院辦理其失察容留之巴勒達爾應否交部議處等語扎薩克圖汗巴勒達爾該管旗分容留厄魯特逃人居住年久未經查出實屬疏忽理應交部議處但經額駙策凌嚴飭而巴勒達爾即能逐戶稽察將察罕岱拏獲尚屬可恕著加恩寬免其容留察罕岱之䝉古多爾濟等亦著照策凌所奏令由本處懲治察罕岱俟解送來京該部定擬請㫖辛酉傳㫖申飭軍臺總管羅善等並飭部定議廢員聽候更換坐臺事宜上諭內閣曰據軍臺總管羅善等奏稱廢員坐臺年滿奉㫖更換其應派來臺更換之人若仍在原任及本籍尚未到京者請即將年滿人員發回其臺務交鄰臺署理無庸守候等語坐臺廢員俱係效力贖罪之人既格外施恩換回伊等即少待數日有何不可羅善等即欲令其不致久候亦當將更換人員摧促速到豈有不待更換輒行發回之理所奏明係瞻徇甚屬不合著嚴行申飭再記名發臺效力人員理應在京守候乃令其擅回原籍是該部定議本屬未周著交部將伊等應如何留京不致有悮更換之處再行妥議具奏丙寅訓諭駐藏提督索拜等上諭軍機大臣等曰據索拜等奏郡王朱爾默特那木扎爾呈稱準夷兩次由阿哈雅克來藏近又探得於阿哈雅克見有賊人踪跡雖並無確信不可不令兵丁防範願帶經過戰陳舊人前往喀喇烏蘇地方訓練彼處兵丁防範一切已令其前往等語朕派大臣駐藏特為藏地距京遙逺一切事宜俾得就近妥協辦理唐古忒人遇有禀商事件亦應酌其可否確示遵行從前索拜以猝聞碩翁土庫爾蹤跡輕率辦理朕已屢經訓飭今果並無事端而伊此奏轉若有意掩飾前非况向日索拜尚以唐古忒人往往無事造端為言則此次傳言安知非其揑造乃竟不察虛實墮其術中乎索拜駐藏辦事年久此等情節並不詳審糊塗乖謬已極但已令朱爾默特那木扎爾前往無庸置議索拜不必前往金川著即速來京副都統拉布敦初到藏地此事與伊無涉嗣後益當用心辦理其有應指示朱爾默特那木扎爾者悉心指示俾得遵循務宜詳慎體察安輯地方為要己卯命參贊大臣薩布喀善赴烏里雅蘇台軍營上諭軍機大臣等曰現在額駙策凌派巴爾品至烏里雅蘇台更換塔爾瑪善來京烏里雅蘇台係管理兵馬防守事務最關緊要俟參贊大臣薩布喀善到日即令其前赴該處軍營辦理著傳諭額駙䇿凌知之冬十月壬午安西提督永常奏報貿易夷人賚木瑚里等出境丁亥訓諭駐藏辦事副都統拉布敦上諭軍機大臣等曰拉布敦奏稱朱爾默特那木扎爾寄知阿里克地方交易回子等告稱準夷現在內亂伊即移咨嚴飭各卡謹密防守如有準夷來到即送至藏等語藏地關係緊要駐藏大臣凡事最宜查取確實權其輕重相機辦理不可稍有滋事前者索拜因傳聞之語遂將唐古忒番子任意移駐其怯懦周章已極拉布敦當以為戒再藏地不可容留準夷一人伊等素與土伯特睚眦不睦留駐在彼必生事端可傳諭拉布敦知悉現在準夷內亂與內地並無干涉惟嚴飭卡倫人等加意防守如有欲由彼進藏者可詳悉曉諭令其向兩路軍營進口此地斷不容違例收留嚴行拒絶並將此一併𫝊諭朱爾默特那木扎爾知之十一月丙辰準噶爾部人烏里克達遜來降命賞給安插如例平定準噶爾方略前編卷五十一
