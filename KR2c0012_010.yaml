  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_010-1a, image: WYG0357/WYG0357-0166a.png}
body:
  text: 康熙六十一年春正月庚子命齎諭哲卜尊丹巴胡土克圖暫停進兵上諭議政大臣等曰䇿妄阿喇布坦之兵屢被我師擊敗死傷頗多䇿零敦多卜等賊衆亦大半死亡棄藏竄走仍回伊犂地方固守三嶺若我滿洲兵至則舍命交戰勢有不敵又思逃避他所希圖存活此等情形瞭然可睹朕數日來細加尋繹伊犂山蹊險隘我朝大兵雖欲今年進勦倘為三嶺阻隔遲延時日或䇿妄阿喇布坦戰敗帶領妻子逃往則我師應否追勦不可不詳加定議今䇿妄阿喇布坦之伎倆悉已深知䇿妄阿喇布坦亦稔知天朝兵威所加勢必不能自存但此時遽遣使向䇿妄阿喇布坦處招撫彼不知我寬仁之意反以為不能取彼復生他心亦未可定爾等可議寫發往䇿妄阿喇布坦之書著哲卜尊丹巴胡土克圖選派好喇嘛為使作速差往其差往之人過阿濟嶺由吐魯番一路前往不久可到彼處信息情形亦即得聞知如胡土克圖之使者善為曉諭䇿妄阿喇布坦畏懼天討將拉藏妻子家屬并從前被虜之人送來請罪誠心投順永不敢侵犯邊隅如此可另行商酌倘䇿妄阿喇布坦已死或伊處內變生亂除向天朝投奔外彼將焉往則我兵進發亦不可緩即一面進兵一面差使亦無耽擱之處今各路兵丁或向伊犂前進或於吐魯番固守漸近烏魯木齊等處駐劄營寨相機而行或幾路前往襲擊以及大兵糧餉作何運到之處著議政大臣軍前調回將軍大臣㑹同核議妥確具奏尋議曰將齎諭胡土克圖發往䇿妄阿喇布坦書呈覽令胡土克圖選派喇嘛齎往且覘其消息果誠心歸順即馳報駐劄吐魯番協理將軍阿喇衲相機行事似宜暫緩進兵伊犂至於吐魯番駐兵固守或進烏魯木齊等處立營駐劄請令將軍富寧安阿喇衲等遵行並將牧放牲畜耕種地畝修造城池及巡防汛界挽運糧餉之事詳議入奏但自吐魯番往哈喇沙爾取道有二或沙漠水少或山巒險隘若進兵襲擊需兵幾何糧餉挽運若何亦令富寧安阿喇衲等議奏今駐巴里坤緑旗步兵五千當發吐魯番築城種地駐防令即啓行其軍糧農器令將軍富寧安總督年羮堯巡撫綽奇辦理奏入得㫖依議其向伊犂進兵之事議令暫停姑待機㑹行事此議甚是其緑旗步兵五千名議令發往吐魯番亦甚是巴里坤距吐魯番不逺催趲行走六七日可到但緑旗兵丁每二人共䭾馬一匹所䭾乾糧俱於此馬䭾載若有倒斃勢必用他馬分䭾惟恐負重以致馬匹多損漢人不能喂飬馬匹著將此緑旗兵丁乾糧俱於官馬䭾載另分隊伍令人管轄挽送再交與哲卜尊丹巴胡土克圖發往䇿妄阿喇布坦之書詞句稍繁俟朕刪改發往庚戌命侍郎敦稗都統圖思海等挽運軍餉敦稗等疏言去年七月都統圖思海等運到米撥給布魯爾一路之外其布拉罕一路存糧尚足支一年但路逺軍儲宜預又接都統圖思海文云前運糧至郭多里巴勒噶遜曾以喀爾喀駝接換䭾載運至察罕廋爾諸處但來年挽運更多請以大同宣府飼養之駝增給更換令都統圖思海等以糧運至察罕廋爾後駝乃送還大同宣府牧養議政大臣等議如所請奏入得㫖軍前運送米糧係敦稗薩哈布圖思海公同之事今敦稗薩哈布在彼處無事著調回與圖思海等一同挽運彼此看管運至察罕廋爾將軍處交納其帶回駝隻公同看管送至大同宣府交納處再往軍前二月壬申命詳議協理將軍阿喇衲征西將軍祁里德所奏軍事阿喇衲疏言臣等遵奉諭㫖將賊人形勢難易之處密奏臣觀賊人進退雖熟踪跡甚輕雖有鳥鎗鉛藥甚少我兵鎗炮悉備鉛藥充裕此勝賊者一也賊人雖有鎗㦸少弓箭我兵鋒刃銛利弓馬强徑此勝賊者二也賊衆臨陳易敗惟恃乘隙侵掠我兵部伍整齊無間可乘此勝賊者三也賊衆以乘夜盜馬為得計我兵有備彼不能入此勝賊者四也賊衆遊牧我地似若便易我兵一至輒為妻子牲畜所纍狼狽相顧不能一心迎戰此勝賊者五也從此直至伊犂搗其巢穴掃蕩匪難惟是賊人路徑處處可通我駐兵後路賊來一夕可到我兵逺設汛界或被攔截反致消息阻隔即今所種吐魯番地畝亦須防其侵擾今大兵或前移烏魯木齊駐劄臣等亦前移吐魯番布刋近地駐劄彼此接應既可斷賊人潛襲之路而屯地亦無虞侵擾謹以勘丈吐魯番相近地形繪圖呈覽為進兵計可分為三路阿爾台一路由科卜多沿河越額爾齊斯河進發巴里坤一路由烏魯木齊進發吐魯番兵由阿勒揮口越那拉特嶺進發每路可用兵一萬五千賊若三路來迎則勢分易敗若一路來迎則我以一路兵與戰以兩路兵直抵其妻子屯駐之地彼必不能兼顧且其所恃為阻隘者三嶺然可步而上非若棧道之險也彼所恃以資生者牛羊與乳若悉衆聚於一地水草無多牲畜易盡勢必人自謀食紛紛離散既散之後不能復聚乘此勦滅之其勢甚易但時日未可預定軍糧亦宜預籌今嵗吐魯番墾種之地不能多穫若米糧未即運到不若暫以諸路兵撤至哈密阿爾台新城駐劄聚積軍糧操演兵力俟賊人內變勦滅似於國帑民力悉便又祁里德疏言䇿妄阿喇布坦逞虛妄之詞集烏合之衆天兵一至勢必瓦解鼠竄若我兵如前整備調集士馬持四月糧由吐魯番烏魯木齊瞿爾山前山後四路約期同進則軍威震疊彼必不能支或即歸順或各逃亡䇿妄阿喇布坦無計逺遁若竄入阿拉克山必成擒矣倘以伊犂路逺我兵尚煩跋涉姑俟其內變乘機進取請以阿爾台兩路兵前移伊勒布爾和碩地㑹巴里坤兵秣馬裹糧駐劄以待又或以賊人竄處窮邊暫停天討以恤生靈請於駐兵處整肅兵馬墾種地畝為久駐計奏入得㫖令議政大臣議奏尋議協理將軍阿喇衲陳奏甚詳能得肯綮將軍祁里德所見相同但近日哲卜尊丹巴胡土克圖既遣使往䇿妄阿喇布坦當俟其還報定奪至大兵前移烏魯木齊堅立營寨修城種地可否駐劄防守令將軍富寧安阿喇衲速議入奏其阿爾台一軍今年在伊勒布爾和碩牧養馬匹俟來年由烏魯木齊分四路進發當如祁里德奏行奏入得㫖令在京議政大臣㑹議尋議曰將軍阿喇衲祁里德所奏與扈從諸王大臣所議甚詳今吐魯番駐兵種地多積米糧悉關機要䝉恩賜給吐魯番種地人牛羊又令哈密回人一同墾種尤於軍糧有益惟所墾之地或恐策妄阿喇布坦潛來侵犯宜嚴防守請令將軍阿喇衲等酌留馬兵以資捍禦兼備擒勦奏入上諭議政大臣等曰今年大兵前進駐劄烏魯木齊地方爾等僉慮米糧不能接濟或致遲誤彼時撤兵不可駐兵不可似有煩難之處朕亦慮及但我兵預備數載去年曽議進兵而竟不果今年若再駐劄不進則䇿妄阿喇布坦得以休息一年從此或生他志不如乘此預備之兵仍照從前令阿爾台巴里坤兩路兵丁照常襲擊前進至烏魯木齊地方兩兵㑹合如䇿妄阿喇布坦果有兵來正可勦滅若畏懼不敢前來即將我兵收回各往本處駐劄如此每年襲擊驚擾賊衆彼或生內變亦未可定爾等㑹同酌議具奏尋議巴里坤一軍由烏魯木齊進勦路近往返甚便阿爾台一軍亦進至烏魯木齊其間沙漠間隔二千餘里路逺往返較遲況賊衆偵知我兵克取吐魯番悉竄匿伊犂俟其內變統兵進取䇿尤便至一切糧馬事宜已令將軍富寧安等查明定議請俟奏至再議奏入得㫖我兵連年預備若今年進兵甚屬從容今爾等既稱口糧可慮著依議行夏四月議設兵屯田於布隆吉爾靖逆將軍富寧安疏言嘉峪關外布隆吉爾之西古瓜州沙州燉煌郡地也昔曽建築城池屯兵耕種今舊址尚存土廣可牧馬且有河水若於此屯田駐緑旗兵三四千設總兵官一人統之可扼通黨色爾騰之路而於諸處調遣悉便議政大臣等議曰請令將軍富寧安總督年羮堯提督路振聲定議入奏奏入上從之己巳命撫逺大將軍允禵復往軍前先是允禵於康熙五十七年十一月由軍前至京至是遵㫖復往五月癸巳議給吐魯番軍糧靖逆將軍富寧安疏言接部文今嵗大兵移駐烏魯木齊糧馬牲畜備否來年大兵進勦糧馬牲畜能接濟否發往阿爾台官兵一萬二千及從人自十月起支軍糧如不足供當如何增運令與總督年羮堯巡撫綽奇定議入奏按康熙五十四五兩年臣在肅州辨餉月給官兵之外又備進勦裹糧二萬一千餘石運貯軍前自去年三月運到軍糧缺少令道員王全臣將原貯糧散給復以羊給吐魯番官兵繼此運到軍糧愈少又令王全臣購買米榖青稞及銀散給以是自去年秋至今年夏軍糧無誤今巴里坤吐魯番科舍圖鄂隆吉四處滿洲蒙古緑旗官兵共二萬一千一百計從役共三萬三千四百九十月需糧六千六百九十餘石自阿爾台遣往官兵一萬二千計從役約二萬五千月需糧五千石今年巴里坤布種青稞用籽粒二千石秋成可穫糧二萬石吐魯番新墾之地收穫未可預定今給吐魯番官兵糧自五月後不能接濟已令協理將軍阿喇衲乘回人種地成熟於六月初趣其收穫借給官兵俟糧到如數償還或以我兵在吐魯番種穫之糧補給庶可接濟議政大臣等議曰應如富寧安所奏惟吐魯番種地之處前議遣步兵五千防守今年若進兵至烏魯木齊令將軍等留兵防守若暫緩進兵則防守地畝有兵不可無馬請令將軍等將馬兵酌留兼備追勦侵犯賊人至軍糧足供與否亦令將軍富寧安查明議奏奏入上從之六月庚申以總督鄂海副都統克什圖管理吐魯番墾地事靖逆將軍富寧安疏言吐魯番等處種地儲糧為要在事大臣悉有乘機征勦之責請專派大臣一人領其事奏入得㫖著交總督鄂海副都統克什圖一同管理若有軍務等事照常遣用乙丑廕授藍翎達爾第喀等世職吏部奏言正白旗藍翎達爾第喀鑲白旗護軍校委署章京奔祿鑲紅旗護軍校委署章京吳勒俱進藏至索羅木地界與賊戰陳亡當各授為雲騎尉正藍旗藍翎委署前鋒章京查倫插進藏至喀喇烏蘇地界與賊戰射殪數賊被創自盡當以陳亡例授雲騎尉悉令本旗以當襲之人奏襲奏入得㫖依議查倫插臨敵奮勇身故著給與騎都尉秋七月甲申議先給吐魯番軍糧靖逆將軍富寧安疏言前將青稞糜米籽種運至吐魯番給兵播種今據大定總兵官張宏印呈報回人之田向於正月種植青稞糜子悉已滋長我兵種植逾期今苗復被旱又據協理將軍阿喇衲呈報籽種到遲未及播種作兵糧支給伏思回人播種成熟可促令刈割借給官兵俟糧到償還但必至八月收穫此時正須預給吐魯番官兵當給糧米六分青稞麥四分今悉以米運到運送六分之外其青稞麥四分請令潼商道王全臣購買麥麵分給議政大臣等議應如所奏至四川陜西總督年羮堯甘肅巡撫綽奇疏言吐魯番駐兵地逺非巴里坤比請乘炎熱草盛時多運糧積貯請即令總督年羮堯等將起運之糧星夜飛挽奏入上從之乙未分運軍營糧餉靖逆將軍富寧安疏言前因大舉進勦當備裹帶隨運糧二萬二千餘石至軍營但今月給兵糧亦當及時運赴若一時並挽運費價銀亦同給不特需費多且恐承運官領餉易溢今巴里坤牧駝悉肥壯又於喀爾喀購買駝至八月皆肥以駝運糧甚便臣入奏即移川陜總督年羮堯乘炎熱草盛時將月給兵糧如前速運軍營至進勦裹帶隨運糧分起派官領運酌減運費南路至哈密北路至圖古里克遣官防守俟年羮堯文到即撥官兵以駝前赴哈密圖古里克䭾運軍糧至軍營收貯議政大臣等議如所奏奏入上從之丙申賚敘進藏從征官吏部議曰從定西將軍噶爾弼進藏各官功列一等者逾當遷之職一等即用其次以升階即用又其次在任官以升階先用候補候選者以本職先用奏入上從之丁酉命都統圖喇屯守烏蘭古木等處征西將軍祁里德疏言前移都統圖喇等令速諭總理屯種事蘇永祖赴烏蘭古木等處平治田畝開濬溝渠乘時播種復派委署前鋒統領卜柱及扎薩克台吉根敦等統兵一千前赴烏蘭古木度形勢立營伍以資防守隨據蘇永祖呈報烏蘭古木一路地土肥饒水泉雖少儘可引溉今農事已畢若撤軍還大營過冬俟來春往為時稍遲不如以屯種五百官兵即於烏蘭古木等處立營伍謹汛防乘農事畢引水入地來春凍開及時播種可增開田畝又據扎薩克台吉根敦等還報自喀爾奇喇之巴顔鄂博處起至塔拉托羅海止共二百五十餘里設哨汛七臣與都統圖喇等酌議如蘇永祖議屯種官兵冬時不必撤還即駐烏蘭古木等處牧放馬畜但屯地悉在哨汛以外賊人聞之或乘隙侵擾請更派滿洲官兵及烏喇索倫科爾沁喀喇沁喀爾喀官兵五百亦於烏蘭古木等處屯劄彼此應援二營各設子母炮四派大臣一人統轄官兵以時巡警有散秩大臣殷扎納願往任事請令自效議政大臣等議如所請奏入得㫖殷扎納不堪著都統圖喇前往屯守壬寅命署西安布政使塔琳署四川巡撫色爾圖馳驛赴藏四川陜西總督年羮堯疏言據駐西藏喇嘛楚爾齊木臧布及西藏辦事知府石如金等呈報在藏官兵不睦因公䇿旺諾爾布性委靡副都統常齡侍讀學士滿都員外郎巴特瑪等任意滋事謹將原文封奏若大兵未可即撤請令滿都巴特瑪自備資斧由西寧邊外撤還若大兵撤還當派官留藏偵探消息沿途仍設驛站以速郵傳更於察木多設兵聲援以安達賴喇嘛等衆議政大臣等議曰西藏被賊擾害蒙聖主獨斷發兵征勦今藏地已定土伯特唐古忒等悉賴拯救留兵防守乃年羮堯聽信喇嘛及知府飾詞妄報阻撓毁謗將軍大臣擅請撤兵冒昧殊甚請以年羮堯飭所司嚴議奏入得㫖侍讀學士滿都員外郎巴特瑪與知府石如金喇嘛楚爾齊木臧布俱著由西寧一路前來滿都員缺著署理西安布政使事塔琳往藏跟隨將軍印務效力其在藏駐劄之四川緑旗兵丁恐其生事著署理巡撫事務色爾圖進藏管轄在彼駐劄色爾圖塔琳著年羮堯速行文令其馳驛前往四川巡撫員缺朕另行補授至西安布政使事務著年羮堯舉伊所知之人令其署理員外郎巴特瑪員缺行文大將軍將彼處章京撥派一員即令速行進藏與公䇿旺諾爾布一同辦事壬子預借從征官兵俸餉靖逆將軍富寧安疏言接部文大兵移駐烏魯木齊各營軍器馬匹是否足用令臣入奏今據都統睦森副都統薩爾禪知勇甘肅提督路振聲等報云所屬護軍驍騎緑旗兵一切軍器馬匹皆足用又據副都統英柱常夀等呈報前襲擊吐魯番等處馬駝缺已將俸餉借抵購買補足以備進勦今二年餘汛防撥用馬駝又稍有缺仍於見支行糧之外借支庫銀購買補足以將來當給行糧償抵請如其議借支官兵銀十二萬六千九百九十五兩令其購買虧缺馬駝議政大臣等議曰應如富寧安所請令陜西巡撫噶什圖將銀如數解送軍營暫貯俟大兵進勦借給購買留駐官兵不必借給如常收貯奏入上從之九月乙酉誥諭廷臣上諭議政大臣等曰從前曽有以朕每年出口行圍勞苦軍士條奏者不知國家承平雖久豈可遂忘武備前噶爾丹攻破喀爾喀并侵擾我內地扎薩克至烏蘭布通朕親統大兵征討噶爾丹敗走後又侵犯克爾倫朕統兵三路並進至招摩多勦滅之今䇿妄阿喇布坦無端侵犯哈密地方朕徵發阿爾台及巴里坤兩路兵進勦䇿妄阿喇布坦聞之心膽俱碎乃遣䇿零敦多卜等潛往西藏劫掠毁壞寺廟土伯特地方已被殘蠧朕又遣大兵前往擊敗䇿零敦多卜等復取西藏救土伯特於水火之中我兵直抵西藏立功絶域此皆朕平時不忘武備勤於訓練之所致也若聽信從前條奏之言憚於勞苦不加訓練又何能逺至萬里之外而滅賊立功乎爾等諸臣咸宜知之臣等謹按王制著三田之禮周官垂四隙之文蓋以習勞講武處無事而不忘有備也伏惟聖祖仁皇帝三駕親往德威遐鬯於運籌決䇿之中猶諄諄以平時不忘訓練為誡用能招攜懲叛近則諸藩受庇逺則西藏吐魯番接踵底定成逺至邇安之懋績我皇上繩武集勳無時不以覲揚光烈為心是以時巡所至親閲戎行復嵗舉獮狩之典俾近臣禁旅莫不警宴安而嫺武備逮乎命將出師膚功迅奏為前古所未有良由逺近蕃部親見六師震疊罔不悚息讋服不率者既大申撻伐來歸者皆願效前驅於此仰見家法繩承訓行有素豈偶然哉戊子量撤守藏緑旗官兵署理四川巡撫色爾圖疏言前西藏平定留兵防守自打箭爐至拉里曽以四川緑旗土司番兵共留三千五百餘名挽運糧餉今貯藏糧餉足支二三年且藏地糧米購買可得不必重煩挽運但自打箭爐至拉里設六十六站需兵防守統計各站酌駐官兵更以土司番兵亦入數中共需兵一千九百其餘一千六百若撤還則糧亦可省議政大臣等議如所請奏入上從之冬十月辛未增給科卜多烏蘭古木特里諸處農器并核地畝榖數征西將軍祁里德疏言據總理屯種事蘇永祖呈稱科卜多烏蘭古木特里諸處可種之地悉乘時和開墾坤都倫河諸處可種之地亦悉開墾今年種麥所穫數倍往年來年更可添種但農器恐不足供乞早發給謹以所收麥麵令侍讀學士阿禮等恭齎呈覽所資農器請令大同府知府購備奏入得㫖據所奏在科卜多烏蘭古木等處開墾耕種因土沃水裕今年所得麥子一倍收有六倍爰請明年添種千石及詢問齎呈麥麵之阿禮等據云科卜多烏蘭古木地方廣濶開墾之處頗多原係厄魯特等耕種好地今應將歉收之茂岱察罕廋爾等處耕種人力移至科卜多烏蘭古木耕種可以多收再種地所用犂鋤鏵子鍬鐝等器每年給發不少何以一年之間即俱損壞鏵鋤鍬鐝俱係鐵器軍前或難於備辦犂係木器何地蔑有若隨伊所請槩行給發路途遙逺著人送往頗費錢糧再軍前種地人員禀報所收糧數一倍得有數倍等語甚不明晰應照內地或一畝一晌收得米石若干如此稟報方得明晰其科卜多烏蘭古木地方添種田畝所給犂鋤鍬鐝等物之處著議政大臣詳加議奏尋議用兵以軍儲為重種地多則積貯亦多將軍祁里德奏今年種麥多收請令來年於科卜多烏蘭古木及坤都倫河諸處可耕之地以今年所收用為籽粒增種倘不足用更以鄂勒錐圖郭勒等處所收糧給與增種至茂岱察罕廋爾種地歉收請以所用人力器具悉移為科卜多烏蘭古木耕種之用茂岱察罕廋爾地分與發配罪人開墾至鏵鋤鍬鐝諸器皆須用鐵請敕部行文山西巡撫令即製造購駝付侍讀學士阿禮等攜往秋收後以時收貯所用之犂軍前有木可造令伊等自製更行文將軍傅爾丹等將開墾地丈量頃畝計算籽粒及秋收糧數詳報今科卜多烏蘭古木有種地兵及駐劄兵五百值農隙時令多伐林木為修築大城及室廬倉廪之地奏入上從之平定準噶爾方略前編卷十
