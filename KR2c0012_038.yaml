body:
  text: 雍正十三年夏六月癸酉議西路撤兵事宜辦理軍機大臣等議覆言署寧逺大將軍查郎阿等奏西路軍營撤兵事宜一巴圖魯官兵進口後定例止給口糧索倫奉天吉林等兵並道逺恐盤費不足請官借三月俸銀兵丁借半年餉銀悉以軍需銀支給造冊報部即於俸餉內扣還如數應如所請一江寧等處滿洲兵行經內地盤費亦恐不足請於到肅日江寧荆州官借三月俸銀兵丁借四月餉銀西安寧夏官借三月俸銀兵丁借兩月餉銀所借給銀並於官兵俸餉內扣還查江寧荆州領兵各官如協領阿山泰常在等五十四人前以倒斃馬匹並議革職留任例不支俸現在無項可抵應毋庸議至江寧荆州及西安寧夏官兵等奏請借銀數亦過多臣等酌議江寧荆州兵丁給兩月餉西安寧夏官給三月俸兵丁給一月餉所借給銀報部扣還奏入得㫖索倫奉天吉林官兵效力行走頗著勤勞且路途遙逺伊等所借俸餉銀兩俱著賞給不必扣還江寧荆州滿洲之官兵在軍前諸凡不及廢弛滿洲舊規甚為無恥爾等所議不准借給官員俸銀之處甚是餘依議丙子議西路駐兵事宜署寧逺大將軍查郎阿等奏西路駐兵事宜一邉界定後廷議於巴里坤留兵二千哈密留兵二千更番駐劄按巴里坤隘口每歲雪後處處可行若留兵二千即盡數撥防亦不足用至哈密留兵二千以屯田則不敷以巡防則難遍且巴里坤與哈密中間南山大坂倉猝不通聲息比秋冬雪降呼應更難臣等酌議與其分駐於兩地不若合駐於山南應以留駐巴里坤兵二千再增一千悉駐哈密合兵五千則兵力不分巡防屯牧咸可辦理此五千人哈密實駐三千其西三堡沙棗泉東北塔勒納沁並有城堡可各駐兵一千三地聫絡指臂相應方為嚴密一軍營馬駝哈密附近一帶夏日炎熱宜牧處少應俟每年播種後山北草肥撥哈密兵一千塔勒納沁沙棗泉兵五百合二千人令統領大臣率至山北招摩多呼濟爾台沙山子鹿心山等處牧放比深秋仍還山南過冬其過夏牧馬時應增設斥堠請於烏爾圖哈達伊克恩度爾鄂什希三地各設斥堠周圍防守牧厰俟入冬過山悉撤之一哈密等處既分駐兵丁西北一帶並應設斥堠瞭望四逺乃有備無患按南山大坂為哈密北面屏藩應於駐兵中撥二百人分駐南山大坂盤道上小堡於鹿心山松樹塘烏蘭特爾木斯畢留大坂等四處各設斥堠撥兵瞭望烏克克嶺為三堡沙棗泉要隘應於駐兵中撥二百人駐烏克克嶺上小堡於索大坂白楊溝羊布納錫喇淖爾等三處各設斥堠撥兵瞭望塔勒納沁河源為塔勒納沁要口應於駐兵中撥二百人駐河源小堡於莫艾舒魯遜大坂等二處各設斥堠撥兵瞭望一大兵撤後哈密貯糧充足且有賽巴什達里雅屯種田畝可供三處兵丁口糧無庸挽運一留駐巴里坤兵丁塞外勤勞已閲七載邉界定議後應悉撤還現在安西鎮標及瓜州兵凡七千餘除駐防哈密一千外存營者尚六千餘人請豫選安西兵四千俟巴里坤兵撤還時即令大員統領赴哈密駐防以均勞逸辦理軍機大臣等議覆悉如所請奏入上從之己丑議西路駐防事宜署寧逺大將軍查郎阿等奏西路駐防事宜一巴里坤兵丁撤時廷議於安西等處增設一提一鎮兵萬人令各攜家口赴所在駐劄彈壓邉陲聲援哈密竊計增兵萬人需糧十萬安西屯田不過三千餘石口糧恐不敷給况兵丁家口移動縻費更多城堡營房事事更須籌畫不若更番迭戍既可省費亦且經久請即於肅鎮甘提涼鎮西寧鎮安西鎮各撥兵一千合五千人赴哈密駐防其安西所在不必增設提鎮兵丁一請於陜西督標撥兵一千固原提標及各協屬撥兵一千五百延綏撥兵一千寧夏撥兵一千河州撥兵五百凡五千人在赤金靖逆柳溝布隆吉爾橋灣五處駐防所在附近並有牧場可以牧放馬駝一赤金靖逆等五處兵丁期以二年悉令更代其哈密兵丁每年更代一半其半嫻熟即可教習一半新兵一哈密及赤金等處各有五千兵丁駐防其統領者應以總兵二員副將二員率遊擊守備千總把總等分轄駐防赤金等處總兵副將於兵丁更代時俱代駐防哈密總兵副將令其一年更代庶屯田斥堠諸務有新舊大員相間管領事事熟練一軍營應支口糧駐防哈密兵屯種收穫儘足供給其駐防安西兵五千加以率兵將辨歲需口糧一萬五千餘石其各衛所官屯地畝應悉付與安西鎮標營兵丁令其屯種以為恆産即以所穫籽粒供兵丁口糧如尚不足折銀給豫如例一肅鎮為臨邉重地請增城守一營設都司一員千總一員把總二員於標營兵中撥步兵二百専司城守汛防之事按肅州鎮標合新舊兵凡二千九百餘應增足三千之數以新募守兵即撥入城守營辦理軍機大臣等議覆悉應如所請但哈密及赤金等處駐防兵丁雖各有總兵官統領大兵甫撤兩總兵官分駐兩地更需總統大臣一人彈壓請再令提督一員駐劄哈密節制兩處居中調度尤便奏入上從之壬辰命安插肅州所在貧民流寓傭作者署陜西總督劉於義奏言肅州自軍興以來挽運糧車及刈草夫役並陜甘所在無業貧民流寓傭作度日不下萬人現今大兵盡撤無業窮民無所事事難以自給日則散行市廛夜則棲宿古廟日復一日恐至流入匪類應請令沿途有司給豫口糧遣佐雜千把等遞送回籍安插辦理軍機大臣等議覆應如所請奏入上從之甲午命復寧夏鎮五營之制及改設城守營都司署陜西總督劉於義奏言寧夏鎮城地處極邉鎮標舊設中左右前後五營官兵以資彈壓雍正五年新設大通一鎮始裁後營官兵撥赴大通止留中左右前四營今請仍設五營以成營制再寧夏府城舊設城守營都司一員把總二員専司門禁自康熙四十七年設寧夏審事官二員汰去都司止留把總二員歸中軍遊擊兼轄但城守乃金湯重任亦需大員専司請以大壩堡都司改為寧夏城守營都司統轄把總二員其大壩堡增設千總一員歸玉泉營遊擊管轄兵部議覆並應如所請奏入上從之丁酉命設得卜特爾伊克柴達木等卡倫選兵吏番駐防總理青海番子事務德齡等奏言哈爾垓圖駐劄西寧大通緑旗兵二千現今遵㫖撤還但噶斯一路設卡偵息防護青海䝉古游牧最要應撥青海扎薩克兵二千以備策應即隊中選精兵二百並選緑旗兵百人遣官統領赴得卜特爾伊克柴達木等要害處並設臺站卡倫每年更代以資防護辦理軍機大臣等議覆如所請奏入上從之尋德齡又奏言欽差大臣伊禮布等已率西寧大通二處緑旗兵丁各還汛地并繳欽差大臣關防一顆奏入報聞定邉大將軍平郡王福彭奏報北路軍營撤兵事宜福彭奏言北路撤兵事宜京城滿洲大營兵令參贊前鋒統領阿岱都統扣婁副都統阿那布副都統職銜紀山率之滿洲防戍兵令內大臣都統查克旦率之奉天兵令副都統額爾勤副都統白爾赫圖率之吉林兵令副都統哲庫訥率之齊齊哈爾兵令副都統職銜和托克副都統布爾沙副都統職銜班圖率之右衛兵令都統王常率之內扎薩克䝉古兵令科爾沁王羅卜藏喇什喀喇沁貝勒僧衮扎卜敖漢貝子羅卜藏等率之歸化城土默特兵令營總烏巴什等率之給豫馬匹口糧各分隊伍於六月初三日至二十日陸續啓行科爾沁額駙達爾瑪達都台吉衮濟扎卜亦令其起程四省緑旗兵俟總兵官李如柏率新兵到營更換後令總兵官胡傑等率之各還營汛奏入報聞七月壬寅命沙州採買糧石貯用署陜西總督劉於義等奏言沙州厯年採買糧石今年正屆收穫之期現今哈密橋灣布隆吉爾截留軍糧雖多而沙州無現糧收貯應仍採買各色糧一萬石貯用辦理軍機大臣等議覆應如所請奏入上從之癸卯命馬蘭泰回京上諭辦理軍機大臣等曰據軍前副都統宗室諾穆柱倭星額參奏侯馬蘭泰著傳諭大將軍平郡王令馬蘭泰回京朕有詢問之處命署理領侍衛內大臣伯伊勒慎正黃旗滿洲副都統覺羅蘇爾泰並赴北路軍營管轄兵丁辛亥命侍郎雙喜留駐烏里雅蘇台辦理糧餉事務尚書性桂辦理鄂爾昆糧餉事務學士富德協辦鄂爾昆糧餉並隨大將軍印務甲寅命免觀音保阿克山等罪赴北路軍營效力署寧逺大將軍查郎阿奏言革職荆州副都統觀音保江寧副都統阿克山久經枷號軍營今大兵已撤應否解京送刑部監候革職寧夏將軍卓鼐寧夏副都統僧保西安布政使諾穆琿俱在軍營當苦差效力贖罪今大兵撤回卓鼐等應令回旗無庸仍留軍營恭候欽定奏入得㫖觀音保阿克山從寬釋放與卓鼐僧保諾穆琿俱著自備鞍馬前赴北路軍營交大將軍平郡王令其效力贖罪丁巳命給價收贖䝉古典賣人口各還所部其不願還者酌量安插上諭辦理軍機大臣等曰朕軫念鄂爾多斯貧乏䝉古有就食口內典賣妻子人口者前已降㫖令該地方官查明賞給原價贖出照看安插今據史貽直等奏稱查出雍正十二三年邉民并延綏鎮及各將辨共買䝉古子女二千四百餘口其雍正十一年以前尚有邉民娶買乞養者今亦查出先將上年今年凡有典買䝉古人口細查贖回應否俱發夷漢衙門查明親屬轉交完聚之處相應請㫖再米國正身為鎮臣首先倡買五名以致該將辨軍民人等效尤共買二十七口臣等不敢隱徇等語䝉古乏食貧民典賣子女其已經查贖人口朕另降㫖詢問該扎薩克等情願領回者令其領回完聚倘有不願領回者再行商酌安插之法其未經查報人口務須清查辦理至米國正及將辨等因䝉古乏食用價收買俾得存養與尋常典買䝉古人口有間著將所買人口交出不必參處其雍正十一年以前邉民娶買乞養人口亦降㫖詢問該扎薩克等有情願領回者賞給原價贖回其中若有厯年既久居處相安不願領回者即聼其存留免其查究嗣後該地方官務須嚴禁邉民不得娶買乞養䝉古人口倘有故違定例私自典買者一經查出從重治罪並將該地方官一併嚴加議處署寧逺大將軍查郎阿等奏報準噶爾使臣吹納木喀起程還部查郎阿等奏言吹納木喀等於六月二十日至軍臣等給以馬駝米麵茶羊等物令副都統班第率官兵三百自軍營護送啓行已于六月二十七日出科舍圖卡倫西去奏入報聞己未命免南稱族番民補交本年貢馬價值上諭辦理軍機大臣等曰南稱族番民固魯旺舒克等來納貢馬被郭羅克賊番劫奪現在嚴拿究擬至固魯旺舒克等據德齡等奏稱已給路費送回番民復願將馬價另行補交等語朕念該番補交馬價未免勞費著將今年貢馬免其交納庚申命加恩以甘肅本年先完地丁錢糧准作來年正賦上諭辦理軍機大臣等曰西陲用兵以來甘肅等處民人急公效力甚屬可嘉是以朕屢沛恩膏免其正賦今年又將地丁錢糧全行蠲免所以優恤民力令其寬裕也今據巡撫許容奏稱五月接奉諭㫖之時已據各屬詳報完納銀一十二萬餘兩查定例已完者充餉未完者免徵此項應照例充餉等語朕因嘉奬秦民奉公趨事是以特加格外之恩而其中爭先完課者尤為良善之民著將已完若干准其作來年正賦許容可傳㫖速諭俾閭閻咸知朕意並督率有司實力奉行毋使胥吏土棍作弊中飽命陜甘等省千總把總自軍營撤還者仍留本省用并出本省俸淺未出兵各辨員缺令其即補上諭辦理軍機大臣等曰朕軫念行間將士從前曾降諭㫖令將陜西等省現出各缺於十缺之中分出三缺以升補出征辨員數年以來隨征將辨各按出力等次俱得遞行擢用現今西路官兵次第撤回凡辨員之升補他省者俱應各赴新任今據署大將軍查郎阿等奏稱將辨中有陜甘人員升補直隸山西山東河南四川五省之千把伊等隨征年久俱從兵丁拔補今甫回本籍又逺赴新任或有無力攜帶家屬者若隻身逺去則家中又恐無人養贍可否將現在西路軍營之陜甘人員內升補直隸等五省之千把仍留在陜甘各營食俸辦事遇缺挨補等語查郎阿等奏請之處甚是但伊等效力有年撤回之後留於本省候缺未免多需時日尚未允協著陜甘督撫提鎮將現任各千把之未經出征者分别查明如內有食俸年淺及未曾出力之人令其出缺候補其所出之缺即將軍營撤回之留陜千把悉行補用至該千把等既留陜甘補用則所遺直隸等五省員缺應行拔補查直隸等五省亦有自軍營撤回應補千把之人著該督撫等即將伊等補授此缺倘撤回各辨人多缺少亦照陜省將俸淺未經出征之千把內暫行出缺補用伊等以示朕體恤從征辨員之至意乙丑命議叙署寧逺大將軍查郎阿等功上諭辦理軍機大臣等曰西路官兵前因嶽鍾琪調度失宜諸事廢弛遂致軍氣不揚士心不振自雍正十年查郎阿統兵以來與張廣泗同心協力事事整頓時時訓練凡行間將士俱知奮勇效力營伍為之改觀所以十一年及十二年賊人兩次侵犯卡倫俱為我兵擒𠞰未令脫賊人因我軍嚴整畏憚懾伏從前狡獪伎倆不敢復逞此皆由查郎阿等辦理妥協之所致今大兵撤回查郎阿張廣泗俱著交部從優議叙再自雍正十年以後調往西路之奉天吉林索倫及䝉古官兵皆為奮勉其中之勞績懋著上等出力者亦宜加恩奬勵著查郎阿查明據實具奏一併交部議叙其未經著有勞績及嶽鍾琪任內行走之人不必開入丙寅定邉大將軍平郡王福彭奏報大軍至鄂爾昆福彭奏言臣等於六月二十六日率官兵自烏里雅蘇台啓行七月十二日至鄂爾昆全軍先後悉至謹擇二十日於鄂爾昆河額爾得尼招迤北興工建城奏入報聞八月戊辰命撤西路臺站設馬塘於馬蓮井子等處署寧逺大將軍查郎阿等奏言巴里坤既撤兵西北兩路無庸更相傳報應於官兵啓行時悉撤奈曼等處及西路口外臺站惟哈密橋灣等處尚有兵駐防往來遞送文檄請於馬蓮井子以東星星峽以西各撥兵設馬塘每塘給馬六匹以供馳送辦理軍機大臣等議覆應如所請奏入上從之癸未命直隸山西陜西等省自軍前撤還外委各員於本營即豫補用上諭兵部曰朕軫念出征辨員已降㫖將軍營撤回千把人員即得缺補用以奬勤勞今思軍營兵丁中有奮勇戎行出衆效力或臨陳對敵得受恩賞大將軍曾給以外委委牌者此等人回營之後亦應即為補用著該管大臣將伊等效力之處查核明確並考驗其技勇若現有外委之缺即令頂補如缺少人多即將現在外委人員內未曾出力而技藝生疏者令其出缺以軍前之外委頂補可傳諭直隸山陜等數省一體遵行丙戌命䝉古牧放馬駝倒斃酌豫定數免賠其不及數者賞賜加奬上諭辦理軍機大臣等曰北路軍營駝馬牲畜交與䝉古牧放聞未定倒斃數目以數萬牲畜經年牧放即倍加謹慎難保無一倒斃乃悉令䝉古賠補殊為可憫自軍興以來喀爾喀䝉古等甚屬效力今特沛恩施嗣後交與伊等之牲畜一年於一百匹內倒斃六匹以下者免其賠補如倒斃不至定數酌量賞賜以示鼓勵著行文大將軍平郡王等曉諭衆䝉古知之平定準噶爾方略前編卷三十八
