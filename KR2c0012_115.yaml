body:
  text: 乾隆二十三年九月甲申朔奨諭定邊将軍兆恵上諭大學士曰據兆恵奏稱遵㫖令伊前赴庫車察看情形再行回京當即領兵八百名速進一抵庫車即與雅爾哈善協心𠞰賊斷不肯半道回京有靦顔面等語所奏肫誠勇往深得領兵大臣之體軍旅為國家重務以滿洲大臣身膺簡畀統率戎行正當踴躍自効公爾忘私我朝簡䇿所垂忠勤代著逺軼前古乃近来漸染惡習或至因循選懦臨事心懷觀望或聞撤兵慶若更生曽不知奉公體國之義謂何此風深可痛恨朕慎守國憲不得不力為整頓今兆恵奉到前次回京之㫖不肯茍且了事毅然以𠞰賊自任其器識實出諸臣之右且計其具奏時並未知有雅爾哈善失機僨事不堪任用令伊往代之㫖乃如此陳奏豈揣摩而得者朕方幸得一急公任事之大臣深為嘉悦彼畏首畏尾之徒聞此而不愧汗交集其何以自列於臣子耶兆恵著加恩賞戴雙眼孔雀翎以示優奨朕於諸臣賞功罰罪一本至公毫無成見惟在諸臣之自取耳著通行傳諭知之又諭軍機大臣曰兆恵奏稱現在領兵一千擇其馬力有餘者八百名前往回部餘俱由烏魯木齊遣回游牧等語前因索倫察哈爾等兵在西路軍營年久已降㫖派撥更换今據奏軍營兵丁又復前往回部是今嵗不能即回游牧著加恩再行給賞一次其發回兵丁由烏魯木齊巴里坤肅州資送至京再回游牧著傳諭永貴阿里衮黄廷桂等照例辦理定邊将軍兆恵疏奏擒獲賊黨衛諾克正法兆恵奏言臣等派副都統温布侍衛扎延保領兵捜捕逸賊據報署㕘領哲野勒圖等詢知輝特台吉巴圖宰桑多木布綽和爾宰桑衛諾克等百餘户在阿勒坦呼斯坦游牧七月十八日行至其地遇賊百餘人據山結壘官兵奮撃賊始奔竄擒獲多木布之妻供稱伊夫被殺巴圖棄其㓜女潛逃衛諾克向阿勒坦呼斯坦嶺逃去温布因馬蹶傷脛伊子格森泰肩脇被鎗傷重身故令扎延保等往追将衛諾克擒獲計𠞰賊百餘人臣等擬於前往回部時便道搜捕其哲野勒圖奮勉出力已給與備賞孔雀翎所有得功官兵及陣亡得傷者應請㫖交部酌量議叙議卹查衛諾克曽䝉恩授以侍衛職銜乃附和昂吉岱等拒守又為賊糾合黨衆罪不可逭因其傷重即行正法奏入得㫖温布𠞰殺輝特綽和爾等鄂拓克賊衆奮勉効力著賞銀一百兩伊子格森泰受傷身故著加恩賞給世職令伊孫承襲其効力及陣亡得傷官兵俟兆恵冊報時該部即照例議叙議卹乙酉諭辦理屯田侍郎永貴等查核収成分數上諭軍機大臣曰據永貴奏稱将兆恵所議屯田收成分數毎人墾田二十五畆所收穀石可給八九人之食詢問官兵等俱稱必係成熟之地一家有四五人助力方如前數若一人墾田即盡力不過十四五畆可食三四人等語此特據緑旗官兵等飾説遂以為實不但與兆恵所奏不符即以内地情形而論四民之中農居其一尚能積貯有餘流通出糶永貴等豈未聞知或因初墾之地收成歉薄若将来由近及逺以漸増加仍執此定數安足以給軍食可傳諭永貴等加意勸課兵丁務如農民治田不留餘力視其所收分數再行定議具奏諭定邊右副将軍䇿布登扎布等暫回游牧休息上諭軍機大臣曰昨諭䇿布登扎布富徳擒獲哈薩克鍚喇回抵伊犁即取道前往阿克蘇今思辦理回部已有兆恵納穆扎爾等自易竣事䇿布登扎布在軍前効力年久撤兵後即回游牧休息來年再至熱河扈從行圍郡王品級羅卜藏多爾濟効力有年亦著回游牧富徳仍遵㫖前赴兆恵軍營丙戌上幸木蘭行圍駐蹕布扈圖口布魯特使臣車里克齊等来朝賜宴命扈從王公大臣等皆預宴上以西域諸部降附来朝自乙亥丁丑戊寅三年皆適㑹於布扈圖口地靈佳兆若有神異賜名曰伊綿峪命更代軍前侍衛等回京上諭軍機大臣曰侍衛瑪瑺圖倫楚等軍前効力年久自應更换現在派送牛馬之侍衛瑚什科普薩額爾登額䝉郭勒等至巴里坤交收後阿里衮即照例給與整装銀兩令其前赴兆恵軍營兆恵酌将軍前侍衛似瑪瑺圖倫楚行走年久者揀選四五人調回京師其員缺即以瑚什等補用命内閣學士五吉馳驛前往哈密隨同吳達善辦事己丑以雅爾哈善奏報情節申諭定邊将軍兆恵上諭軍機大臣曰雅爾哈善奏稱領兵至賽里木正值麥熟現在速行收穫候兆恵信息即前往阿克蘇等語所奏更為不解此時前途禾稼被野何處不可取給自應領兵速進而量留後隊收穫以裕軍食所得豈不更多但伊等業已如此朕亦不復諄諭可傳諭兆恵速将雅爾哈善拏解来京前曽降㫖以順徳訥若擒獲阿卜都克勒木尚可寛宥今既不能自應治罪如已遵㫖正法則己否則一同拏解派徳爾森保沿途防送不可致令自戕又據奏拏獲固原逃兵等訊係馬得勝所轄而專管之把總宋林匿不禀報等語馬得勝失機僨事罪不可逭著與把總宋林俱於軍營正法緑旗陋習最宜整頓兆恵其留意辦理又諭曰閲雅爾哈善所奏各摺全無端緒即如把總周彦恒因攻取庫車被鎗落水所攜礮位亦同沈溺為賊所得適游撃伍靈阿被傷未曽禀報克城後回人等獻出礮位始補行㕘奏不思礮位若果倉卒遺失自不妨即時禀報大槩因遇賊退怯遂為所奪及回人獻出知不可隠始行舉首耳總兵五福遊撃伍靈阿俱著交部嚴加察議仍著兆恵查訊明確具奏又所奏遣厄魯特侍衛察罕庫本通信兆恵豈軍前侍衛無一可用且即遣徳爾森保亦何不可之有數年用兵以來将軍大臣如䇿楞玉保等雖經獲罪未有如雅爾哈善之甚者所奏已無庸批示可録寄兆恵閲看當深以為戒仍将現至何處情形若何作速奏聞庚寅以詢問疎脱霍集占情形申諭定邊将軍兆恵上諭軍機大臣曰䕶軍校瑚圖禮解送伯克阿里來京朕詢以霍集占入庫車城将軍等果否聞知及逃脱時作何辦理據奏六月十六日霍集占敗走時雖見有賊纛入城實不知為何人及收兵後衆人即傳説霍集占入城之信且平日賊衆不敢出戰而入城次日即分路衝突衆人益以為實隨經伯克鄂對請於鄂根河増兵堵截迨霍集占夤夜逃出時侍衛噶布舒報知順徳訥而順徳訥必俟天曉往追賊已據橋斷後等語是疎脱霍集占實順徳訥之罪然雅爾哈善哈寧阿等並未親身督戰惟恃一順徳訥所司何事况鄂根河堵截之兵鄂對已經籌及何以疎懈如前令賊得先為之備愈可憤恨雅爾哈善等情罪俟拏解来京時再行研訊可傳諭兆恵以朕詢問軍前情節始知額敏和卓鄂對等盡心効力深用為慰特予嘉奨用示鼔勵其雅爾哈善等辦理乖繆之處或有續行查出者亦即奏聞㕘贊大臣富徳疏奏右部哈薩克圖里拜及塔什罕回人圖爾占歸誠富徳奏言臣等遣䝉固勒岱赫善等前往右部哈薩克索取哈薩克錫喇又聞塔什罕回衆與右部哈薩克相攻令其曉示息兵同来歸附臣就近進兵距莽格特城兩站駐候七月二十四日䝉固勒岱等報稱詢知右部哈薩克頭目圖里拜輝格勒徳薩薩克拜等俱在塔什罕城與回人爭戰特桞克已經病故伊子雅木巴拉克游牧亦相去不逺隨傳喚到營詢知薩薩克拜等所在亦率四十餘人来迎據稱右部哈薩克係阿比里斯汗為首其塔什罕係莫勒多薩木什沙達圖爾占分管惟圖爾占與哈薩克爭戰七月十三日薩薩克拜引導與阿比里斯等相㑹問以哈薩克錫喇踪跡俱稱不知須候圖里拜来時商議十五日見圖里拜十六日阿比里斯等集衆来見告稱我右部薩薩克久欲歸誠因被準噶爾隔絶今聞大兵平定準噶爾我左部哈薩克阿布賚歸誠受大皇帝隆恩又聞布魯特相繼歸附我等欣聞招撫情願入覲因年老不能逺行議遣圖里拜之子卓蘭輝格勒徳之族弟博索爾璊代往謹進馬三匹並㕘贊大臣贄見馬一匹等語隨於備帶縀疋内分别給賞仍示云爾等已經歸誠尚與回人争戰不如乘此解散據圖里拜告稱與塔什罕回人向無嫌隙因圖爾占逐我所用伯克莫勒多薩木什是以交惡今情願息兵遂遣索倫領催圖魯遜吉林領催留保馬甲額森特徳赫布等二十一人前往正值哈薩克塔什罕之衆拒河排列争水放鎗於是髙聲宣諭大國使臣特為息汝等爭鬭而来因為陳説利害喚出圖爾占與圖里拜相見伊等亦情願自此息兵一同歸順大皇帝其回人等仍舊供哈薩克賦役至水道仍給與塔什罕圖爾占不勝感激議定遣人入覲遂帶領哈薩克所遣之卓蘭博索爾璊莫勒多薩木什所遣之黙泥雅斯前来其圖爾占使人尚未曽到看得右部哈薩克及塔什罕事務俱係圖里拜辦理等語二十九日所遣使人来至軍營臣詳悉曉示並将䕶送来京之官兵跟役酌量派調又䝉固勒岱等在莫勒多薩木什處查出阿睦爾撤納親兄巴特瑪車凌之子伊什扎卜一併交䝉固勒岱等沿途看守於八月初四日起程赴京所有圖里拜等奏章謹齎呈御覽奏入得㫖富徳久在軍營奮勉効力今又招撫西哈薩克著加恩交部議叙給與世職䝉固勒岱赫善等俟帶領来使入覲時再加恩賞所有從行官兵著富徳酌量加賞有應行議叙者即造冊送部尋命譯進圖里拜等表文其文曰右部哈薩克臣圖里拜等跪奏大皇帝伏念臣者久思内附逺處邊末與左部阿布賚各長一方為準噶爾阻絶末由自通近聞左部輸服被恩優渥恭惟天使恵来祇領宸訓得均隸臣僕誠歡誠忭謹遣臣子弟卓蘭等入覲瞻仰天顔如天覆育之聖人在上臣願竭衰駑奮勉自効永無二心倍於左部伏祈睿鑒又莫勒多薩木什表文曰塔什罕回人臣莫勒多薩木什跪奏大仁至聖普昌羣生大皇帝伏惟天使恵臨臣土臣等不勝歡躍奉承諭㫖願為臣僕所有買得之厄魯特伊什扎卜亦願獻闕下謹遣臣弟恭聆聖諭回歸游牧宣示臣等全部但恐陳奏之詞不能達意實深惶悚謹奏奏入俱得㫖下部知之前鋒校瑚圖禮以解送回人伯克阿里至京授藍翎侍衛辛夘上駐蹕烏蘭哈達布魯特使臣舒庫爾来朝賜宴命扈從王公大臣等皆預宴諭定邊右副将軍䇿布登扎布等索取哈薩克錫喇等事宜上諭軍機大臣曰昨據富徳奏報西哈薩克部落歸誠詢無哈薩克錫喇信息前聞哈薩克之額爾類曽與交通已屢諭向彼索取計此時富徳䇿布登扎布俱陸續前往如哈薩克錫喇實在額爾類處萬一遲延不行縳獻即先示以進兵搜捕若仍復支吾不妨耀我軍威務期擒獲但信息稍有不實仍宜酌量不可輕舉滋事至伊等行糧最闗𦂳要䇿布登扎布既經行文永貴若業已運送即與富徳通融接濟再成衮扎布奏稱烏爾都里克臺站牲隻被賊搶奪其踪跡向阿勒坦額黙勒前去等語䇿布登扎布等回兵時當留心搜捕毋致漏網侍衛上行走烏爾登託倫泰帶領布魯特使人等来京授烏爾登仍為三等侍衛託倫泰為藍翎侍衛壬辰諭都爾伯特親王䇿凌烏巴什等協心辦理游牧上諭軍機大臣曰朕念已故都爾伯特汗䇿凌抒忱効力加恩准伊子索羅木衮布襲汗名號仍授為盟長但盟長辦理全部事務所係甚重聞伊襲封以後時有疾病今授伊弟巴桑為副盟長巴桑亦係年少恐未更事親王䇿凌烏巴什貝子瑪什巴圖等誼闗同族自應視如一體可傳諭伊等悉心協助加意辦理不可存彼我之見癸巳定邊将軍兆恵疏奏起程日期兆恵奏言臣於八月十九等日奉到節次諭㫖以雅爾哈善等攻圍庫車失機僨事今臣速往辦理臣前於古爾班濟爾哈朗途次得協助雅爾哈善之㫖已於本月初九日起程此時雅爾哈善應已攻取庫車前抵阿克蘇臣擬進兵夾攻行至阿勒坦呼斯坦嶺雪盛路險臣與官兵等牽馬歩行兩晝夜現在領兵四百名輕騎先進近據雅爾哈善遣来厄魯特侍衛察罕庫本告稱本月初六日已得庫車霍集占收集餘衆不過戀守巣穴豈能逺遁若雅爾哈善未得阿克蘇臣即作速攻取直抵葉爾𦍑喀什噶爾務擒霍集占中途所得各城以緑旗官兵駐守至臣受恩深重屢䝉寛宥即如濟爾哈朗之圍若非聖主督勅應援早已被賊戕害中心感激無能報稱何敢稍存家室之思乘此軍聲大振各城回衆膽寒惟期大功速竣凱旋京師事君養親永承恩澤奏入上諭軍機大臣曰兆恵奉到辦理回部諭㫖奮勉前進立志可嘉應無難擒獲逆賊但所奏霍集占不過逃往喀什噶爾朕意逆賊未必如此或仍在阿克蘇等處觀望此時計納穆扎爾三泰亦将㑹合兆恵惟偵知霍集占所在并力圍𠞰而分兵招撫諸城告以霍集占窮蹙不日就縛爾等脅從之衆降者無罪賊黨離心成功自速頃據吳達善奏稱自哈密運糧至闢展毎石運費六兩三錢有竒等語較之自歸化城運至烏里雅蘇台雖減三分之一然以肅州至庫車計之則更覺加増可見僱值甚昂兆恵宜收穫回人穀石加意撙節以省内地供億之勞俱著傳諭知之諭䕶軍統領努三等酌量守候哈薩克貿易上諭軍機大臣曰現在時屆季秋哈薩克貿易人等久應到来迄今尚無信息不便在彼守候著豫備貿易人等各回原處努三仍暫時駐劄如哈薩克人等到来而我豫備貿易者歸程未逺亦可喚回若為時既久努三即令臺砧人等於哈薩克經過時以伊等行走遲滯有渝定約致商人不能守候委曲曉示即與永徳同往庫車在兆恵軍營行走甲午議備𠞰官兵就近支餉事宜甘肅廵撫吳達善奏言准永貴咨阿里衮移送奏摺内稱派往軍營之索倫察哈爾官兵由阿濟必濟前往烏魯木齊自該處給於口糧查本處向未承准廷寄即當據咨速辦但哈密巴里坤運到糧石俱在闢展距烏魯木齊九砧需駝甚多應於哈密所僱商駝加價轉運但商人等憚於逺行必派官兵約束今屯田正當收穫應請另行選派又運糧商駝若本處遽行截留未免口糧不足且亦無項可動等語臣即行咨明阿里衮嗣據覆稱巴里坤駝隻存剰無多商民車騾亦不常有今哈密糧運往来又有夾山一路較為便易應聴酌量辦理等語查哈密運送闢展糧餉約萬餘石今官兵等兩月口糧只一千六七百石應請即於闢展截留運糧駝隻送往烏魯木齊其口糧草豆亦於闢展借給臣又解銀一萬兩交與永貴以充僱值仍俟阿里衮派出官兵遣赴闢展䕶送糧運奏入得㫖軍機大臣速議具奏尋議此次索倫察哈爾官兵原議派往烏魯木齊再赴庫車因該地有哈薩克貿易馬匹一事必須照管今貿易人等尚無信息自應以進𠞰回部為要若紆道烏魯木齊則兵丁無事逺行虚糜運費應請行文永貴将官丁口糧即令在闢展支給徑往回部一面行文領兵副都統福禄等由阿濟必濟就近前往闢展支給口糧奏入上諭曰覽吳達善所奏伊與永貴阿里衮互相推諉情節顯然况從前令派出官兵前往烏魯木齊係照彼時情形酌定永貴等身在地方自當就現在機宜通融籌辦且如兵丁等行走兩月餘即已到烏魯木齊再多行九砧至闢展裹帶口糧有何不可以多行數日之故紛紛文移往復互相推諉並不從公事籌畫而各為其身計近来大臣辦事往往如此永貴阿里衮吳達善俱著傳㫖嚴行申飭永貴係承辦之人尤為非是著将軍機大臣所議交永貴等遵照辦理前因永貴在軍營有年派書山往代恐伊初到不諳事體永貴不必急於来京俟辦理軍務竣事再行請㫖丙申雅爾哈善等疏奏阿克蘇回衆乞降雅爾哈善等奏言八月二十日卡倫侍衛奎瑪岱等送到阿克蘇回人圖拉克圖拉克拜呈獻頭目摩羅阿舒爾等降文隨将来文譯出云謹呈天朝領兵将軍等自阿克蘇城之摩羅阿舒爾阿琿等及管領千人之伯克大小共聞數年来霍集占凌虐回人勉聽役使今大兵来臨正我等之幸昨因與霍集占離隔以致被攻若大兵不来必遭其害為此謹呈等語臣等奨以言語給以飲食詳加詢問據稱霍集占從庫車逃往阿克蘇時将拜城回人移往和闐烏什復集葉爾𦍑等處回衆三千五百合阿克蘇烏什之衆一千起程向賽里木再援庫車伊之哨探人等望見大兵行塵報知霍集占頗為惶恐領衆回阿克蘇暫駐欲将阿克蘇回人亦移往烏什久皆閉城不從霍集占怒於本月十七日率衆攻城城中放鎗拒敵殺十數人用事之伯克瑪瑪第畢里野木亦在其内霍集占逃往烏什等語臣等撫慰圖拉克給以印文令其先回又卡倫侍衛達克塔納送到阿克蘇回人瑪瑪特呼里稱係總管色梯巴勒氐一族隨經識認據稱霍集占乘怒殺瑪瑪特呼里之兄弟三人伊以逃避獲免乞降屬實臣等派兵五百名令端濟布等同伯克鄂對等於二十一日起程本日據遣往兆恵軍前之厄魯特侍衞察罕庫本同兆恵遣来侍衞成果到營告稱兆恵於二十六日可至拜城共期成事奏入上諭軍機大臣曰阿克蘇回人當霍集占敗逃即已閉城拒敵斯時雅爾哈善若早為進兵不特回城久已降附而逆賊方與回衆争鬭乘機𠞰殺即擒獲亦未可定此次乞降豈雅爾哈善之力可傳諭兆恵仍遵前㫖将雅爾哈善拏問看来回衆俱懷二心我兵所至自必相繼迎降兆恵其迅速前進遵照節次諭㫖奮勉辦理又諭曰雅爾哈善遣赴兆恵軍前之厄魯特侍衛察罕庫本行走甚為迅速著傳諭兆恵查伊現在侍衛等次加陞一級俟軍務告竣将伊户口查出令其完聚安揷命叙卹郡王車木楚克扎布所領得功陣亡被傷官兵上諭軍機大臣曰據扎隆阿奏稱郡王車木楚克扎布往追恩克沿途𠞰殺賊衆看恩克踪跡渡哈屯河藏匿原游牧亦未可定請暫回吹阿勒和碩支給口糧俟冬季雪後追捕等語車木楚克扎布甚屬奮勉即照伊所請辦理所領官兵内有得功及陣亡被傷者查明酌量送部議叙議䘏丁酉申諭定邊将軍兆恵等㑹兵速平回部上諭軍機大臣曰現在阿克蘇城已經歸附看来各城自必相繼迎降可傳諭将軍納穆扎爾㕘贊大臣三泰帶領索倫察哈爾及健鋭營官兵之副都統福禄侍衛訥齊訥豐安等速行前進與兆恵㑹合仍諭永貴等将官兵糧餉速為辦給既合兩路大兵又益以三隊勁旅聲勢倍加雄壮回衆聞風震懼今嵗可考成功朕佇待伊等捷奏兆恵專膺閫寄其率先奮勉以副睠懷又諭曰昨以阿克蘇乞降諭布魯特使臣等據奏波羅泥都霍集占等從前得脱回巣以阿卜都瓜卜為葉爾𦍑伯克其長子阿卜都薩塔爾亦為阿克蘇伯克等語查雅爾哈善原奏無阿卜都薩塔爾之名摩羅阿舒爾等是否将伊殺戮及拏獲送京兆恵即查詢具奏戊戌諭大學士管陜甘總督黄廷桂等辦給口糧駝隻等事宜上諭軍機大臣曰據黄廷桂奏稱踏勘運糧道路若由巴里坤有博爾圖等處山徑險阻車不能行等語大兵進𠞰糧運攸闗𦂳要但昨據雅爾哈善奏軍行已至賽里木計田野收穫可得七千兵三月之糧尚不至窘廹可傳諭黄廷桂軍營糧餉固宜陸續接濟亦不必過於張皇既據稱哈密一路可以運往祇須酌量情形源源轉運又所奏塔勒納沁試種豌豆已有成效塔勒納沁既可種豆由此推之闢展吐魯番托克三烏魯木魯等處想皆可以試種若得成熟於牧養更為有益可傳諭永貴等将闢展等處節候地氣測騐確實即於明春佈種所需籽粒即向黄廷桂咨取照數辦給又諭曰黄廷桂奏於安西甘肅各營孳生駝隻内㨂得四百有竒送往哈密巴里坤應用現在供應大兵尚無貽悞俟直𨽻山西購解到日即行㨂送等語㸔来所有駝隻祗足逓運糧餉器械而進𠞰兵丁則不敷派撥是以黄廷桂請於官兵額支馬匹外再給駝馬一匹此次進𠞰回部沿途城堡可居非若與準噶爾等野戰必須䭾載帳房器什也况回人等乞降相繼官兵到彼自可立奏膚功尤應輕装速進以從便捷領隊大臣侍衛等至闢展支給馬匹不必拘泥成例俱著傳諭知之諭定邊将軍兆恵豫籌駐防事宜上諭軍機大臣曰覽黄廷桂奏摺有将来平定回部仍應駐兵之語於回地情形尚未深悉回部與伊犁不同伊犁入我版圖控制遼濶不得不駐兵彈壓至回部平定後不過㨂選頭目統轄城堡總歸伊犁軍營節制即從前準噶爾之於回人亦祗如此可傳諭兆恵将来辦理回部惟於歸順人内擇其有功而可信者授以職任管理貢賦等事具奏請㫖至伊犁則必需大兵駐防現在作何籌畫且由近及逺以次屯田俱著於平定後一併詳悉妥議具奏其駐防伊犁大臣即兼理回部事務己亥命賞給都爾伯特貝勒等銀兩上諭軍機大臣曰此次隨扈木蘭之都爾伯特貝勒巴桑貝子額爾徳尼各賞銀二百兩貝子竒塔扎薩克台吉䇿登䇿伯克各賞銀一百五十兩扎哈沁公扎木禪烏梁海散秩大臣圖布慎各賞銀一百兩總管莽噶拉克賞銀五十兩都統和通賞銀三十兩辛丑命暫寛刑部侍郎永貴等議處上諭軍機大臣曰永貴等追捕盗竊車需賊人未能擒獲因命交部察議經該部議以分别降革但伊等委員擒拏竊賊未獲尚非軍營失機可比永貴著帶所降之級仍留刑部侍郎任定長納世通現辦屯田事務若照部議革任及帶所降之級留於軍營恐不足資彈壓著仍以現在品級辦事俟事竣回京該部再行請㫖壬寅諭分派辦理屯田事務大員上諭軍機大臣曰前以永貴在軍營年久命書山前往更换今因屯田漸次開闢添派副都統滿泰舒景阿二員可傳諭永貴等将現在屯田酌分兩處滿泰與書山為一處舒景阿與納世通為一處以便稽察以專責成永貴起程時将印信交與定長所有兩處屯田事務令其總理平定準噶爾方略正編卷六十一
