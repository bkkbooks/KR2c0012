body:
  text: 乾隆二十一年夏五月癸酉命尚書阿里衮同前派副都統職銜公明瑞前往軍營在領隊大臣上行走訓飭定西將軍策楞等上諭軍機大臣曰策楞等奏先派玉保往哈薩克其帶往兵丁令尼瑪烏爾登等帶回登努勒台牧放馬匹等語謬誤已極從前降旨令玉保先往哈薩克特因玊保係専任追擒阿逆之人致令脫逃是以責令前往彼時䇿楞等俱已回至固勒扎即就近更至登努勒台牧放原無不可及䇿楞等接到此旨奏稱玊保等已於前月初旬起程向哈薩克乃行已數日復旨令將兵丁撤回看此情節伊等並未進發特為此飾詞誆奏耳否則玊保帶兵前進無故忽行撤回有是理乎如謂朕旨如此指示何以擒賊之事伊等並不遵旨辦理在玊保尚自知罪愆勉力前往而䇿楞轉欲令之獨行是誠何心若謂撤兵回至登努勒台可以牧放則乘此夏令曠野何地無草又或因玊保先行可以疾馳前進則玉保去後策楞何以不相繼隨行以為策應顧於人則令之獨行在已則逍遙安住朕實不解著傳旨申飭並傳諭達爾黨阿不得因策楞行文遽行撤回即著隨玉保奮勇前進迅奏膚功命奬賞內大臣哈薩克錫喇上諭軍機大臣曰此次進兵哈薩克錫喇甚屬奮勉即如厄爾錐音至今尚留遊牧並未前抵軍營而哈薩克錫喇諸事實心深堪嘉豫此時如伊已領兵同進回時著歸伊遊牧休息如尚未進兵亦暫令到伊遊牧看視再至軍營當亦不至遲悮並著賞給荷包鼻煙壺各一件以示奬勵甲戌宣諭定西將軍策楞等貽誤軍務之罪上諭大學士曰據䇿楞等奏現駐登努勒台將馬匹牧放並咨會達爾黨阿令其撤兵回駐并將玉保所帶之兵亦令撤回牧放馬匹等語達爾黨阿接到咨會隨以伊現已帶兵前進且兵糧足敷至七月下旬無庸撤回一靣咨覆一靣具奏達爾黨阿所見甚合機宜從來用兵之道有進無退況追擒叛逆期在必獲斷無兵已進發復令撤退故使往返稽頓之理朕前降旨令玉保帶領索倫兵五六十名先往哈薩克索取阿逆隨令達爾黨阿帶兵繼進策楞亦即帶兵尾隨節次諭旨甚明乃策楞等不惟不能尅期前進反將玊保所帶之兵亦行調回止令玉保以數十人先進豈不更為可駭信如伊等所辦則是以追擒叛賊之事僅委之玉保數十人而伊等安坐軍營且并欲奪其兵力而置之危地此何心耶伊等身為將軍將佐功罪皆其功罪玉保倘有僨事策楞等能脫然事外乎至前諭令將馬匹在登努勒台牧放原因大兵未經進發彼時策楞等觀望遷延藉口於馬力疲乏朕實不勝憤悶是以令將未用馬匹牧放脿壯即行進發先令玉保輕騎前進以期速達耳令達爾黨阿業經帶兵前進䇿楞不即行續進已屬大謬乃轉稱遵旨將馬匹牧放且將達爾黨阿已進之兵行令撤回幸而達爾黨阿能知事勢輕重不肯隨聲附和使竟聽其言聞調即行撤回將成何事體耶此次追擒叛逆在庸懦無識之人未必不謂策楞等坐失機宜實由馬力疲乏口糧不繼所致試思經旬已進之兵旋復調撤何不即以此回程馬力用之前進乎豈前進則疲乏而撤回則甚易乎如此進而復退馬力豈不更加疲乏乎至於隨帶口糧策楞等前赴軍營較達爾黨阿由北路起程先期二十餘日何以據達爾黨阿所奏尚可敷數月之用而策楞等則早稱缺乏且巴里坤續運口糧俱已起運在途而策楞等輒行文停止及至臨期需用乃向各鄂拓克索取伊等資生牲隻以致坐候不前又令玉保且行且待是伊等現在所奏馬力口糧之語均不可信不過以是藉口掩其怯懦之罪耳策楞等乖張謬誤種種不堪特借購集馬駝接濟牲隻為遷延之地其罪復何所逭耶用將此通行傳諭知之命達爾黨阿為定西將軍兆惠為定邊右副將軍加永貴副都統職銜在參贊大臣上行走上諭軍機大臣曰策楞等辦理軍務種種謬妄已降旨宣諭中外策楞著努解來京治罪伊子特通額著革職交與達爾黨阿令在軍前效力贖罪扎拉豐阿本應同策楞一體治罪念伊係蒙古人從寬革去郡王并副將軍令其回至巴里坤自備資斧赴伊遊牧玉保此時如已帶兵向哈薩克即無庸拏解若仍在達爾黨阿隊內即遵旨拏解來京治罪達爾黨阿著補授定西將軍兆惠著補授定邊右副將軍永貴著加恩賞給副都統職銜在參贊大臣上行走此旨著交阿里衮齎往俟至軍營遇見策楞玉保等時再行宣諭諭定西將軍達爾黨阿進兵機宜上諭軍機大臣曰達爾黨阿不聽策楞撤兵之言徑向哈薩克前進似此奮勉出力朕心甚為嘉許夫以策楞身為將軍諸凡逡巡畏縮實堪髮指已降旨將伊治罪但軍行宜計萬全方合機宜若一意勇往不量情形所關非小今達爾黨阿帶兵前進應詳探賊人形勢或用計襲或用力攻或待接濟兵到并力擒𠞰慎勿冒昧輕試朕非阻止達爾黨阿勇鋭之氣恐伊有鑒於策楞等退縮不前之罪矯往過正轉失之於太鋭著將此旨交阿里衮帶往轉諭達爾黨阿令其仰體朕意相機辦理以副委任諭定邊左副將軍哈達哈等進兵哈薩克事宜上諭軍機大臣曰哈達哈等奏稱辦理烏梁海事竣即前至哈薩克索取阿逆如不即擒獻暫且毋庸進兵掠伊邊界人等增我兵力等語現在西路達爾黨阿業已帶兵前進哈達哈應即速將烏梁海辦畢前往哈薩克斷不可稍涉觀望再伊等有預備馬匹口糧以為將來用兵之語是其心存畏怯並不思一舉成功殊屬非是現在策楞因辦理軍務種種謬誤已將伊拏解治罪哈達哈想未聞知著將朕旨及策楞等原奏鈔寄閲看舒赫德現在哈達哈軍營伊從前與策楞同獲重譴加恩寬宥此次意見若出自舒赫德朕必將伊同策楞一體治罪哈達哈務宜奮勇爭先毋蹈覆轍再大兵進發理應分為兩隊今哈達哈等領兵不過三四千毋庸分隊且清滚扎卜策布登扎布俱係蒙古今伊等帶兵前行管轄恐不能周若與哈達哈同隊進發伊等熟悉情形一切事宜俱可商辦哈達哈等即遵照辦理命封巴圖爾額默根為扎薩克頭等台吉上諭軍機大臣曰巴圖爾額默根上年投誠時未經入覲朕曽施恩封伊子和通鄂勤為扎薩克頭等台吉今巴圖爾額默根當阿逆擾亂之時並未附和管轄屬人安居遊牧甚屬可嘉亦著加恩封為扎薩克頭等台吉丙子命西北兩路領兵速赴哈薩克上諭軍機大臣曰據侍衛中秋奏稱詢問自阿逆處逃出之厄魯特巴顔告稱阿逆惟同喇嘛及哈薩克屬人三十餘人現在招摩多地方離阿布賚遊牧路止三站等語看此情形隨阿逆逃竄之人俱各離散力甚窮蹙誠能迅速追逐早應擒獲今已不免遲誤著傳諭達爾黨阿即照巴顔所供逆賊逃往之路帶兵前進途中遇見阿逆離散藏匿之人即行𠞰滅直入阿布賚遊牧悉力搜捕務期弋獲從前諭令領兵至哈薩克邊界勒取阿逆毋庸進兵因尚不知阿逆果否逃往自不便即加以兵威今偵探既確而哈薩克若不即遵諭擒獻則是有心容隱應即將哈薩克辦理達爾黨阿等務大振軍威勿稍示怯亦毋庸拘泥從前之旨已令中秋將巴顔解往達爾黨阿軍營可詳細詢問情形帶領前往再巴顔供阿逆處現止烏勒木濟同行並未言及阿巴噶斯哈丹等阿巴噶斯等或已回至遊牧或在中途隱匿達爾黨阿沿途留心查訪一并擒拏解京治罪並傳諭哈達哈等即將烏梁海事辦竣領兵徑赴阿布賚遊牧會同西路大兵奮力𠞰捕毋得少有遲誤命授普爾普為散秩大臣上諭軍機大臣曰前命策楞等至伊犂時查拏阿睦爾撒納之姊扣肯今據奏稱已為普爾普擒獲現在解送前來等語普爾普著加恩授為散秩大臣遇有宰桑員缺仍奏聞請旨補授己卯諭西北兩路將軍等進兵哈薩克機宜上諭軍機大臣曰據達爾黨阿奏現已領兵前往哈薩克不俟巴里坤解到馬匹等語所奏甚合機宜阿逆素性姦詐必須迅速進兵出其不意方為有益從前遣達永阿等由西路前往順德訥等由北路前往降旨曉諭哈薩克今達爾黨阿哈達哈率兵至哈薩克邊界若候達永阿順德訥等信息始行前進倘伊等在阿布賚處少為稽留以致淹遲時日反失機會且達永阿順德訥等孑身奉使亦不可無兵力接應著傳諭達爾黨阿哈達哈等至哈薩克邊界時即帶兵深入所過地方告以但為擒拏逆賊毫無侵擾令其各安居遊牧伊等若無抗拒情形應嚴禁我兵不得滋擾其或托詞阻撓即加以兵威無少示怯第恐我兵既進哈薩克等或從後掩襲亦不可不豫為防範達爾黨阿等務期相度機宜迅奏膚功命授三等侍衛巴圖濟爾噶爾為頭等侍衛賞銀一百兩馳驛前往達爾黨阿軍營聽候調遣命授宰桑密瑪克等官爵上諭軍機大臣曰據達爾黨阿奏達什達瓦宰桑密瑪克得木齊布圖庫等懇請隨軍營效力擒拏阿逆等語密瑪克等誠心懇請甚屬可嘉著加恩授密瑪克為管旗章京布圖庫為佐領俱賞給翎頂以示鼓勵庚辰命調扎卜堪駐劄兵丁前赴哈薩克上諭軍機大臣曰據舒明等奏將扎卜堪駐劄兵二千餘名內調撥五百名交侍衛三都卜帶領往布延圖等處駐防等語著照所奏辦理扎卜堪駐劄兵丁尚有一千五百餘名現在哈達哈辦理烏梁海事竣即由彼赴哈薩克此項兵丁與其在扎卜堪間往不若揀選一千名隨哈達哈等陸續進發則兵勢益盛著傳諭舒明等將扎卜堪所餘兵丁內挑選一千名辦給馬匹口糧前赴哈薩克並於柏起三都卜二人內酌派一人帶領若唐喀祿已到軍營即領其帶領前進訓諭定邊左副將軍哈達哈等擒賊事宜上諭軍機大臣曰哈達哈奏北路所帶馬匹牲隻不能肥壯現在勉力行走等語此不過留為日後推卸之地耳前令伊等由烏梁海進兵哈薩克原因辦理烏梁海之後取其牲隻馬匹以增兵力更易集事伊等若因阿逆係由伊犂脫逃擒拏之責應専委之西路北路相距遼逺又越烏梁海而行以此藉口逡巡觀望不但不能副朕委任直是自取罪戾耳哈達哈等如果奮勇自效朕必加以殊恩倘一味退縮雖多方支飾亦豈能逃朕洞鑒況現在西路止帶兵二千餘名北路兵丁已及四千今又派扎卜堪駐劄兵丁一千名隨後策應以兵力多寡較之北路應更加出力方為勇往任事哈達哈等惟當速期成功不得稍存岐視辛巳命查拏阿逆遣往回部人等上諭軍機大臣曰策楞等奏回人伯克噶岱默特稟稱曽遇阿逆差往回部之人將伊砍傷今與伯克烏第同來投誠等語阿逆詭計百端各回部地方必潛遣人前往煽惑若不嚴行查拏恐致妄生事端著傳諭策楞等速即行文知會前次遣往葉爾羌喀什噶爾人員曉諭各回人等所有阿逆遣往之人盡行查拏治罪毋令脫逃命策楞等確勘古爾班和卓情形上諭軍機大臣曰玉保等奏稱竒爾吉斯宰桑古爾班和卓等帶領户口渡伊犂河隨派扎薩克達克巴等擒其屬人詢問情形旋據古爾班和卓等遣人稟稱並非往投阿逆懇求移至阿爾台地方等語扎薩克達克巴差委效力奮勉可嘉著施恩賞給孔雀翎並傳諭策楞等確堪古爾班和卓等如果移往阿爾台地方俟其至時另行安插若在伊犂觀望顯有從賊情形策楞等即會同尼瑪滚楚克扎卜等所領兵丁奮力𠞰捕取其馬匹牲隻以助大兵進𠞰之用癸未命派兵隨達爾黨阿後續赴哈薩克上諭軍機大臣曰據達爾黨阿奏稱現領索倫兵六百餘名前進等語看來達爾黨阿帶兵甚少必需續為進發已令巴祿速行繼進其海福所領兵丁亦即速前往再策楞所帶索倫等兵一千餘名即日趕赴尼瑪令其帶往俟遇達爾黨阿特仍將索倫察哈爾等兵丁交與管轄策楞仍遵前旨回至伊犂駐劄辦事甲申命寧夏鎮總兵官李中楷駐防哈密大學士管陜甘總督黃廷桂奏言哈密東距安西一千餘里西距巴里坤三百餘里地處適中安西巴里坤既各駐有大員哈密似可無需専員駐劄但現在辦理軍需之際一切管理臺站彈壓官兵豢養馬駝轉運糧餉各事宜均須大員料理遵旨於陜甘兩省總兵內揀選得寧夏鎮總兵官李中楷屢次出兵熟悉軍務堪以駐劄辦理奏入報聞乙丒宣示䇿楞玉保等擒賊不力罪狀上諭大學士曰玉保奏稱據從哈薩克逃回之巴布噶津告稱阿逆逃至哈薩克界內納喇巴圖等計圖擒獻協力追捕已將叛賊所隨人衆𠞰滅現只帶兩三人逃竄阿布賚處等語與侍衛中秋詢問巴顔所供阿逆擕帶三四十人逃竄之語正相符合特中秋未向巴顔詳悉詰問緣由未得哈薩克𠞰殺叛賊實在情形故有三四十人之説耳阿逆負恩背叛反覆詭詐伎倆人人共知朕早料哈薩克不肯容納必至竄匿無歸今果止擕二三人奔逸可見策楞等若早能振作軍聲疾馳前進則叛賊早已就擒軍務當早經告竣而乃畏縮不前坐失事機即如前此諭令遴選將辨曉諭哈薩克而策楞等輒恐其羈留我使致開釁端遷延觀望仍不即時遣往今觀哈薩克之恭順如此逆賊之窮蹙如此一一不出朕所夙料而策楞玉保二人全無領會動輒後時所賴者上天默佑朕惟有額手敬承益加兢惕耳若如伊等之步步瞻顧縱賊逺揚閫外之任將何賴焉再玉保奏稱即日前往哈薩克乃明知叛賊孑身無助始敢直前追逐仍係取巧故智不然何前此恇怯之至幾於草木皆兵而今則一似勇敢任事毫無疑慮者此亦何能逃朕洞鑒耶將此宣諭中外知之命參贊大臣富德等進兵哈薩克上諭軍機大臣曰富德等此次追緝唐古忒沿途擊敗哈薩克各事宜甚屬奮勉富德莽阿納竒徹布並伯什阿噶什之子博東齊散秩大臣達什策凌都噶爾宰桑烏爾古勒濟勒卓特巴伯克孟克等俱著賞給荷包鼻煙壺以示奬勵仍加恩授達什策凌為內大臣烏爾古勒濟勒卓特巴為散秩大臣聞伯什阿噶什遭哈薩克擾亂遷徙他往著博東齊前往尋覔遇見即行奏聞倘有不測朕自加恩於博東濟其遊牧即準在額爾齊斯地方居住並著伊宰桑諾斯海等悉心善為保護至達什達瓦宰桑訥默庫曼集於一切差委事宜甚屬奮勉著加恩授為三品總管賞戴孔雀翎侍衛蘇珠克圖著授為二等侍衛得木齊三都克博貝厄爾欽哈什哈勞章津巴等俱著授為藍翎侍衛傳旨奬諭頃據玉保奏聞阿逆僅於兩三人投往哈薩克阿布賚處玉保已領兵前往索取富德等接到此旨不必追緝唐古忒即由彼處前赴哈薩克協力擒拏逆賊莽阿納達什策凌俱著在參贊大臣上行走一同帶兵速進此時各路兵丁應已齊集富德等會同前往兵勢益盛務期協助達爾黨阿等擒獻逆賊迅奏膚功歸途之便仍將唐古忒擒拏治罪丁亥命蠲免甘涼肅等處本年應徴各項錢糧上諭大學士曰甘省一應軍需多於甘涼肅等府州縣就近採辦雖一絲一粟皆取給公帑即挽運轉輸之事亦必計丁給值不以派纍閭閻但此數郡小民急公趨事較之他屬倍覺勤苦出力朕心深為軫念著加恩將甘省之甘涼肅等府州縣民户屯户及番民等本年應徴各項錢糧米豆草束一概蠲免其有已經完納者按數扣出準作來年正供戊子命辦解達爾黨阿軍營口糧上諭軍機大臣曰據黃廷桂奏達爾黨阿處兵丁口糧尚可支給三月惟策楞處兵糧現在急須接濟等語策楞進兵不過先達爾黨阿一月之期何以達爾黨阿處尚有三月之糧而策楞等已需接濟領兵將帥果能與士卒同甘苦諸事加意整飭不獨糧糈一項不至糜費何者不可得力策楞全不以為事一任兵丁耗用方至告匱今達爾黨阿帶兵深入哈薩克自應接濟糧餉資其食用倘策楞以達爾黨阿軍營尚有三月之糧將送往口糧盡留伊處則斷無是理著傳諭策楞糧到之日先儘解達爾黨阿處其餘酌留伊軍營支給命奬賞擒拏逆賊唐古忒之烏魯木等上諭軍機大臣曰據巴祿奏稱散秩大臣輝特宰桑烏魯木生擒逆賊唐古忒并𠞰滅伊屬人等烏魯木現已移至阿爾台地方等語烏魯木深感朕恩奮勉效力甚屬可嘉著傳諭舒明阿蘭泰等俟其移至阿爾台時傳旨奬諭賞銀一百兩酌量指與地方安插至陳亡之得木齊特古斯墨爾根哈什哈及兵丁三十餘人亦屬可憫著交烏魯木查明特古斯墨爾根哈什哈如有子嗣仍授為得木齊並賞銀三十兩其陳亡兵丁三十餘名俱各賞銀十兩己丒以達什達瓦宰桑訥默庫曼集自軍營逃回遊牧命巴里坤辦事大臣和起等擒拏正法示衆上諭軍機大臣曰達什達瓦宰桑訥默庫曼集在富德軍營行走昨因其奮勉效力加恩授為三品總管乃不遵守法令私自逃回遊牧殊屬可惡若不從重治罪無以示懲著傳諭和起等俟訥默庫曼集回至遊牧即行擒拏將伊不遵約束私自逃回情罪曉諭鄂齊爾布林托里等並達什達瓦部衆人等知悉即行正法其所屬兵丁不過聽從指使情尚可原著免其治罪諭輝特台吉巴雅爾上諭巴雅爾曰覽爾奏並請將所屬人等户口照都爾伯特台吉策楞等所屬編次旗分佐領永圖生聚朕實嘉之爾既向化歸誠率屬內附所有編次旗分佐領之事不必急於辦理爾即於所屬宰桑內擇其才具可用者奏明授為管旗章京副管旗章京及參領佐領之屬使之善為約束安分謀生即無異內地臣僕朕於沙克都爾曼濟之奏亦如此降旨上年平定準噶爾全部之時原為爾等籌畫安全俾共登之袵席不意阿逆背叛滋擾不特爾之所屬生計拮據即全部二十一昻吉亦皆不得寧居朕是以復命將興師殱除逆賊俟阿逆擒獲後朕降旨曉諭哈薩克部落各守邊界毋得少有侵犯爾等自可耕種牧養各務本業數年之後生計日見豐裕朕實不勝厚望爾惟仰體朕心管轄部衆嚴禁盜賊以副朕一視同仁之意寄賞爾縀匹荷包爾其祗受辛卯命籌辦北路軍營糧石上諭軍機大臣曰昨據永貴奏稱北路軍營現存米十二萬一千餘石可敷一萬兵丁四年之用等語此惟計算儲備軍需共賞給各部落屬人口糧一項未經籌及都爾伯特輝特人等明嵗雖各歸遊牧但現在伯什阿噶什之子博東齊及達什策凌烏爾古勒濟勒等俱將遊牧移至阿爾台地方尚須賞賚著傳諭普慶阿思哈等約計從前賞賚都爾伯特輝特人等每年應須糧石若干所有現存糧石足支辦給軍需並賞賚新來歸降人等幾年之用詳悉具奏至賞給厄魯特口糧原因其饔飱不給暫為補助並非定為成例即如伯什阿噶什之子博東齊等前來之時其中果有並無牲隻不能度日者即酌量資給若現在可以糊口不得俱照策凌等之例一概賞給並著傳諭舒明阿蘭泰等遵照辦理癸巳申諭定邊左副將軍哈達哈領兵速赴哈薩克上諭軍機大臣曰據哈達哈等奏稱領兵至哈屯河水勢甚大將已經渡河兵六七百名令青滚雜卜帶領輕騎前往其餘兵丁一千餘名製造小船更番渡河令策布登扎布帶領繼進等語哈達哈身為將軍理應身先士卒奮勉直前不得稍存觀望之意今青滚雜卜策布登扎布俱已輕騎前進而哈達哈獨駐河干何以督率將領若似此遲延未知何日始抵哈薩克必致貽誤大事關係非淺觀其所奏河水情形不過山水下流一時陡漲數日間即可減退且覔其淺處未嘗不可徑渡何至如此張皇從前朕已察其有遲疑之狀是以屢經降旨訓諭今計此旨到日哈達哈自當已抵哈薩克境內務宜加意奮勉斷不得稍存畏葸自取罪戾以達什達瓦宰桑烏達瑚們都自軍營私逃命巴里坤辦事大臣和起等一并正法示衆上諭軍機大臣曰前因宰桑訥默庫曼集自軍營私回遊牧已降旨交和起等擒拏正法今據富德奏稱尚有宰桑烏達瑚們都亦同訥默庫曼集私回著將烏達瑚們都一同拏獲正法餘仍照前旨辦理丙申諭策楞等擒拏古爾班和卓上諭軍機大臣曰據策楞等奏稱古爾班和卓已經擊敗收其馬匹牛羊前赴哈薩克等語策楞等此舉蓋因從前朕屢責其不能擒拏阿逆始少加振作耳然首犯現已脫逃且奏稱古爾班和卓共帶八千餘人官兵奮擊斬首二千餘級餘衆鼠竄潛逃等語其所陳奏情形尚屬可疑古爾班和卓果有八千之衆雖𠞰殺二千餘人尚餘六千非甚窮蹙何以遽行逃竄如其人已無多自可無庸置念若果如所奏向有六千餘衆則或潛伏一隅俟我兵經過後尾隨邀截皆未可定不可不豫為防範現在伊犂辦事乏人策楞接到朕旨即回伊犂不必前赴哈薩克惟傳諭各鄂托克人等協力擒拏古爾班和卓一經緝護即押解來京治罪此次疏脫古爾班和卓咎在將軍大臣官兵尚屬奮勉侍衛瑚集圖率五十餘人奮勇爭先尤屬可嘉著加恩授為頭等侍衛其餘著有勞積及中傷陳亡官兵等策楞即查明具奏候朕加恩並寄交策楞等藍翎二十枝查明奮勉人員酌量賞給命封扎薩克達克巴公爵上諭軍機大臣曰此次擊敗古爾班和卓扎薩克達克巴甚著勞績著加恩封授公爵以示鼓勵命授台吉昆都斯車克爾為扎薩克軍機大臣奏言據策楞等奏稱從前台吉昆都斯車克爾等投降時查有所領户口甚多奏請加恩奉旨封昆都斯車克爾等公爵今據哈薩克錫喇告稱昆都斯車克爾兄弟所領户口雖多皆係台吉貝克管轄今授以公爵稍覺過優所有前奉諭旨尚未宣示等語奉旨令臣等議奏查策楞等從前未經查明昆都斯車克爾等係間散台吉但據其所領户口奏聞是以授為公爵今應照加恩間散台吉之例將昆都斯車克爾等俱授為扎薩克奏入上從之定議西北兩路準通商販事宜大學士管陜甘總督黃廷桂疏奏西北兩路請準照舊通商事宜一摺得旨軍機大臣議奏尋議雍正年間北路軍營與西路哈密巴里坤一帶俱有大兵駐劄彼此商販原許流通貿易逮撤兵之後設有卡倫不許擅行出入乃専指赴準噶爾之路非赴哈密內地之路也是以厯年商販俱仍照舊貿易逮乾隆十九年北路鼐曼明安卡倫侍衛差人赴哈密置買食物前任提督王進泰行文左副將軍將侍衛等參革一切交易人等不許出入辦理原屬未善往年西路軍營所需牛羊多借資於北路商辦今巴里坤為軍營駐劄之地而一應牛羊等物秪専由肅州一帶購販前往路途遼逺難資接濟是以價值騰貴且伊犂平定以後與從前應行防範情形回異兩路商販自應準其流通應如黃廷桂等所奏行文軍營大臣即速曉諭兩路官民商販凡有載運牛羊貨物往來交易者許向該管大臣請給印票照驗放行至守卡官兵就近向巴里坤哈密置買食物者亦仍聽其自便奏入上從之六月戊戌命通瑪木特幼子沙津巴圖承襲散秩大臣上諭軍機大臣曰通瑪木特之子賽音伯勒克現在病故所有散秩大臣職銜著加恩將通瑪木特幼子沙津巴圖承襲己亥命達什策凌等補授扎爾呼齊上諭軍機大臣曰策楞等揀選堪以補授扎爾呼齊之宰桑等開列請旨左翼扎爾呼齊員缺著達什策凌補授右翼扎爾呼齊二缺著克勒特宰桑巴桑伊克巴爾達穆特宰桑圖布慎補授辛丒命授噶勒雜特宰桑根敦為佐領上諭軍機大臣曰據舒明等奏噶勒雜特宰桑根敦得木齊巴圖孟克率所屬九十餘戶投誠等語根敦等被烏梁海等劫掠率屬來歸甚屬可憫著加恩授根敦為佐領賞縀二匹暫與丹畢遊牧同居前聞噶勒雜特宰桑止哈薩克錫喇都噶爾特克勒德克等三人根敦或係宰桑子弟或係得木齊誤稱為宰桑均未可定今暫授為佐領俟詢明哈薩克錫喇等具奏到日應授何職銜再降諭旨並著舒明傳諭根敦等現在伊犂平定與內地無異伊等或歸故土或在此地遊牧悉從其便此時念伊等逺道前來復被烏梁海劫掠暫為休息再圖遷徙至奏請來京入覲現今天時暑熱根敦或尚未出痘且無庸令其前來至有所稱途中遇劫之烏梁海等現在逃赴阿逆處等語著傳諭達爾黨阿哈達哈等沿途留心遇此等投赴阿逆之烏梁海等即行𠞰滅並將為首之人拏解來京治罪壬寅命授索倫佐領由屯為協領上諭軍機大臣曰據達爾黨阿奏管領索倫兵丁佐領由屯上年進兵在哨探隊內行走甚屬奮勉此次後多勞績等語由屯著加恩授為協領遇缺即補仍賞戴孔雀翎以示鼓勵癸卯諭定邊左副將軍哈達哈等速赴哈薩克上諭軍機大臣曰據哈達哈等奏辦理烏梁海等事已將竣惟首犯鄂木布呼圖克郭勒卓輝等尚未拏獲等語前哈達哈帶兵渡哈屯河時止令青滚雜卜策布登扎布等先行而伊獨逗留河干朕已降旨申飭哈達哈身為將軍理應身先士卒何故逡巡不前今辦理烏梁海事雖多所斬獲而首犯脫逃皆伊不能督率用命之故此時亦毋庸深究著即將烏梁海辦畢速赴哈薩克緝拏逆賊毋得仍前玩誤舒赫德隨同哈達哈辦事甚屬無益不必前赴哈薩克著即回至烏里雅蘇台辦理糧餉事務命賞都爾伯特親王策凌烏巴什等屬人米石上諭軍機大臣曰據舒明等奏策凌烏巴什巴圖博羅特及達瑪林等屬人生計稍艱請旨賞賚等語策凌烏巴什等逺移遊牧生計不能充裕前已加恩賞給籽種現在播種未屆收獲之期著再加恩賞米六百石分給接濟以示體恤甲辰宣諭達什達瓦宰桑訥默庫等帶兵擅回遊牧罪狀上諭軍機大臣曰和起等將達什達瓦所屬宰桑訥默庫曼集烏達瑚們都等帶兵擅回之處訊明復以伊等係新降之人未諳法律陳奏殊屬謬誤達什達瓦屬人歸誠以來疊施厚恩昨派赴軍前效力又與內地兵丁一體賞給製裝銀兩乃訥默庫曼集等不遵法令擅自回至遊牧情罪甚屬可惡昨經和起等奉到朕即降旨令將訥默庫曼集等正法其兵丁係聽從指揮加恩寬免所以不將兵丁一併治罪者特因伊等係新降之人故從寬典至宰桑乃領兵之人豈得曲從寬宥現在將伊等移往阿爾台安插若如此藐法誤公不示警戒何以申明國憲和起等審訊既確而復為此陳奏其意惟恐訥默庫曼集等正法後致達什達瓦屬衆心懷疑二妄生事端果有此情正當使知法律森嚴不容輕犯豈得茍且姑容以示怯懦料和起尚不至此此必出於錫特庫之意著傳旨申飭訥默庫曼集烏達瑚們都仍著即行正法丙午參贊大臣巴祿疏奏擒獲賊黨阿巴噶斯哈丹等解送京師巴祿奏言五月二十三日據宰桑庫圖齊遣賽音伯勒克查得阿巴噶斯等藏匿博羅和里雅地方臣即帶領庫圖齊等星夜馳赴率領驍騎校音達爾錫護軍校衮布齊里木護軍三濟等將阿巴噶斯哈丹和津等三人拏獲并獲跟隨之烏魯木濟等六人派侍衛根敦色楞將賊黨阿巴噶斯哈丹和津等解送京師奏入上諭軍機大臣曰據巴祿奏阿巴噶斯等匿處博羅和里雅山中帶兵前往將阿巴噶斯哈丹和津及其隨從六人全行拏獲等語巴祿一聞阿巴噶斯等藏匿地方信息即能率兵前拏俾無漏網甚屬奮勉可嘉著賞給荷包鼻煙壺以示奬勵宰桑庫圖齊著賞縀六匹其探信之賽音伯勒克著授為三等侍衛賞縀三匹擒拏阿巴噶斯哈丹之驍騎校音達爾錫護軍校衮布齊里木俱授為三等侍衛擒拏和津之護軍三濟授為藍翎侍衛每員各賞銀二十兩其渡河淹沒之人照陳亡例恩恤所有跟隨阿巴噶斯等烏魯木濟等六人即著賞給庫圖齊為奴又諭曰昨據策楞奏庫本諾雅特台吉特古斯們都阿道齊投至軍營訴稱阿巴噶斯因伊弟至庫克烏魯木地方患病不能行走遂不與阿睦爾撒納同行潛往特古斯們都處居住現在嚴檄擒拏今據巴祿奏到聞阿巴噶斯藏匿博羅和里雅地方即親率官兵一晝夜兼行倍道前至該處已拏獲阿巴噶斯及伊弟哈丹和津等語阿巴噶斯首先附和阿逆助惡相濟為之羽翼後隨同奔逸今乃率其兄弟三人潛歸伊遊牧地方觀此則其窮蹙情形之阿逆衆叛親離毫無倚賴之狀昭然可見巴祿聞知阿巴噶斯所在即能帶領官兵踰山涉水星馳疾掩應時擒獲可見此等逋逃餘孽我官兵果能鼓勇窮追自必就獲而當阿逆逃竄之時距我軍營甚近乃玉保策楞妄生疑阻坐令逺揚由今日阿巴噶斯之就擒觀之則前日阿逆之兔脫豈不令人憤悶耶且如辦里額林沁一事在策楞等方且自以為功殊不知額林沁挺身前赴軍營原有歸順之意若能善加撫馭令為前驅未必不為我用即不然則當速行𠞰取伊之輜重藉其牲隻之力前進捕賊乃一無計畫以致額林沁人衆疑畏徘徊任其四散僅得一老憊之額林沁亦旋即病斃於事何濟又如辦理古爾班和卓則僅得其牲隻老弱而渠魁仍復竄逸伊等身任戎行種種乖謬貽誤如此罪將奚逭豈達爾黨阿巴祿所將之兵皆勇夫所騎之馬皆肥壯所裹之糧皆足數而策楞身為將軍所有兵馬糧石反不如人耶巴祿及在事官兵辦理妥協甚屬可嘉已另降旨并將此宣諭中外知之命仍授鄂勒椿洪郭爾等為台吉上諭軍機大臣曰據阿敏道三格奏稱烏魯木台吉薩喇爾業經正法其妻孥僕人什物等亦俱查明伊兄鄂勒椿弟洪郭爾等現在看守俟扎那噶爾布到時轉交等語此奏甚屬含糊薩喇爾係獲罪之人理應治罪其妻孥家産著遵旨賞給扎那噶爾布至伊兄弟並無罪犯不應一律辦理著傳諭兆惠阿敏道三格等將鄂勒椿洪郭爾仍授為台吉其所屬户口並著給還命尚書阿里衮副都統職銜公明瑞領兵協同前進達爾黨阿奏言頭等侍衛海福帶兵三百餘名於五月十九日至古爾圖喀喇烏蘇地方病故此項兵丁並兆惠所領兵一千名除駐劄安濟哈雅五百名外尚餘五百名共兵八百名應派大員帶領近奉到諭旨命副都統職銜公明瑞前赴軍營效力請俟明瑞到時即交與帶領奏入得旨著阿里衮明瑞協同帶領此項兵丁前進平定準噶爾方略正編卷二十八
