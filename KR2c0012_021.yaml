  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_021-1a, image: WYG0357/WYG0357-0310c.png}
body:
  text: 雍正九年春正月戊辰蠲陜西甘肅額賦上諭内閣曰朕思惠養黎元之道莫先於除賦蠲租使萬姓均霑渥澤陜西甘肅二省經理軍需數年凡米糧芻牧車馬牲畜之類皆動支公帑備辦一絲一粟不使擾民然朕毎念地方既有軍務縱不取辦於民財未嘗不資藉於民力而陜甘二省之民人踴躍趨事甚屬可嘉年來已屢降蠲賦之㫖兹特再沛恩膏將雍正九年西安所屬額征地丁銀蠲免十分之三甘肅所屬額征地丁銀全行蠲免該督撫等可轉飭有司敬謹奉行務令閭閻均霑實惠以湖廣提督兼理陜西西寧西大通總兵官事馮允中専管西寧總兵官印務正紅旗漢軍副都統管承澤署陜西西大通總兵官己巳選直𨽻山西等處兵赴陜甘上諭大學士等曰直𨽻古北口宣化鎮及督標兵丁内著總督唐執玉㑹同提督路振揚揀選馬兵一千名派委官弁領赴西安山西太原大同兩鎮標營兵丁内著巡撫石麟㑹同該鎮揀選馬兵一千五百名派委官弁領赴甘州河南南陽河北兩鎮標營兵丁内著總督田文鏡㑹同該鎮揀選馬兵一千名派委官弁領赴西安並聴大將軍岳鍾琪署總督查郎阿調遣再著湖廣總督邁柱將附近陜西之標營兵丁預選二千名聴候調撥此所派弁員俱著賞給一年俸銀再令該督撫等寛裕幫給兵丁各賞銀三十兩給與兩個月行糧月餉馬三匹其派出官弁員缺該督撫等酌量委署兵丁額缺即行召募補足併行令岳鍾琪查郎阿知之庚午命工部左侍郎馬爾泰協辦西安軍務正紅旗滿洲都統徳成協辦青海噶斯軍務敕諭副都統達鼐達鼐奏言賊圍噶斯卡倫臣以闗防交鼐滿岱並調西寧綠旗兵三百備番臣親率兵出邊往援柴達木賊若敗遁即行追襲奏入得㫖達鼐領兵前往應援格黙爾等亦是但奏稱追襲甚屬孟浪巴理坤之兵原為搗賊人巢穴而設噶斯之兵乃為駐防而設若來犯噶斯之賊兵無多勢均力敵則即行𠞰殺倘以勁力擾動青海則噶斯隘口屬無用之地即撤兵退至近邊形勝之處㑹集青海之兵駐劄防守倘賊勢頗重即領兵退入邊内爾從前曽將西寧之兵調撥五百名今又為畨人調兵三百如果畨人有事爾之三百兵丁何能濟乎兵力宜聚而不宜分頻頻分調是何計䇿防守邊圉較防守青海尤為急務目今只宜堅守切不可急遽􅏥妄辛未命保舉辦理軍需人員上諭内閣曰陜西甘肅地方辦理軍需須用年力精壯才可辦事者命往以備差委現在分部學習人員内著該堂官保送其候補候選及降革官員無錢糧未清之案者漢軍人員著該旗大臣揀選保送滿漢大臣等若有深知之人不論漢軍漢人亦准其舉出若該員身有掛欠處分果係才能出衆亦准該旗及滿漢大臣等保送請㫖此差往人員著交與巡撫武格許容協辦軍需侍郎馬爾泰酌量差遣委用將来辦事若好著該督撫等奏聞加恩議叙命派撥喀喇沁土黙特等處兵預備調遣上諭内閣曰喀喇沁三旗土黙特二旗著派兵一千名於二月間起程至張家口外形勝地方居住令貝子僧衮扎卜塔布囊羅卜藏䇿卜登統領前往預備軍營調遣歸化城兵丁著派一千名令都統根敦統領於二月間前赴凉州聴大將軍調遣其恩賞銀兩糧餉等項俱照例給發命給北路副將軍查弼納昭武將軍印馳驛赴軍癸酉命甘凉西寧三鎮增募兵丁上諭大學士等曰廿凉二鎮皆係沿邊重地必須兵力富足方可内為保障外供調撥著提督宋可進於凉州召募兵丁二千名甘州召募三千名如甘州本地不能足三千之數可於寧夏召募補足又西寧一鎮為青海門户所闗綦重亦著召募二千名此召募七千兵丁俱照例馬六步四支給錢糧命派撥奉天等處兵往北路軍營上諭大學士等曰奉天兵一千五百名著副都統額爾勤統領黒龍江兵二千名著副都統王常索倫總管沙津統領寧古塔兵一千五百名著副都統烏察喇統領察哈爾兵一千名著總管達什統領前往北路軍營應賞銀兩寛裕賞給其派出兵丁六千名著各該處將軍副都統等照數將餘丁充補諭寧逺大將軍岳鍾琪撥兵募兵事宜岳鍾琪遵㫖議奏言準噶爾逆酋犯界所有增撥官兵事宜臣詳加籌畫撥大原提標兵二千令慶陽協副將于義領之陜西督標兵八百撫標兵二百檄調山西蒲州協副將沈力學領之皆隨臣出口至安西沙州極邊之地撥鎮協標兵三千往巴理坤其安西沙州城守單弱除督臣已調甘肅提督兵一千移駐外臣又撥甘州兵一千分防其地甘肅地當要害留汛之兵不足守禦而西寧為青海門戸亦宜防範臣同西安將軍秦布撥西安八旗兵三千令副都統蘇穆爾濟率千人往西寧其一千赴甘州駐劄一千暫駐凉州候調現在西安除蘇穆爾濟以大臣率兵往西寧外秖餘兩副都統留辦軍務未可更行逺遣伏乞欽命諳練軍機大臣二人馳赴西安統兵分往甘凉奏入得㫖朕前調撥凉州駐防兵赴肅之後即著於西安滿洲兵丁内挑選一千名交與副都統僧保張正文帶領前往凉州駐劄又念西寧為青海門户特命副都御史二格馳赴西安帶領綠旗兵一千名滿洲兵一百名前赴西寧駐防今岳鍾琪將滿洲兵一千名撥往西寧殊可不必著仍遵前㫖併傳諭武格馬爾泰俟二格到日即於西安綠旗兵内或督撫兩標或城守之兵共揀選一千名再㑹同秦布挑選滿洲兵一百名令二格即行帶領前往西寧駐劄其蘇穆爾濟帶領之滿洲兵一千名即令帶往凉州俟僧保到凉之日蘇穆爾濟仍回西安其所撥駐劄甘州之滿洲兵一千名著張正文帶領前往聽候調遣至撥往凉州之兵不必起身前去仍在西安候㫖西安副都統員缺著副都統拉薩立馳驛前往署理岳鍾琪又奏言甘州固原肅州兵各派撥出口甘肅地近邊居守不容單薄應各募兵一千以馬六步四補入西安省㑹之區督撫兩標除撥調外餘兵無㡬並應募戰守兵一千五百名至固原内地無庸募補奏入得㫖朕屢降諭㫖以甘凉肅西寧等處皆沿邊要鎮必得重兵駐防既可彈壓邊陲又可分撥䇿應今岳鍾琪僅於甘凉二處議募一千名想未接到朕之諭㫖又於現今巴里坤情形未能確知是以尚存輕事之意見固原標屬雖係内地但提標之兵已撥二千名則自應召募補額西安督撫標之兵既行召募則自當仍遵原制以馬六步四充補不得悉補步兵可將甘凉固原西寧召募之事傳諭范時捷宋可進令其辦理其西安督撫兩標應募之兵著岳鍾琪查郎阿武格馬爾泰仍照馬六步四之例速行募足二千名以充行伍乙亥命優叙西路破賊將士進階賞卹有差上諭大學士等曰準噶爾賊人乗我西路軍營不備傾其醜類犯我卡倫盗趕駝馬總兵官樊廷等領兵二千轉戰七晝夜擊殺賊衆又將盜去駝馬牲畜奪回樊廷忠勇冠軍頗得勝算總兵張元佐副都統綽般台吉衮布三等台吉定咱喇什領兵應援奮力夾攻大敗賊人副將張朝良以孤軍被困而能全師出圍凡此將弁皆見義能勇致身効力均屬可嘉樊廷著賞銀一萬兩給一等輕車都尉張朝良冶大雄俱著賞銀五千兩給騎都尉張元佐綽般俱著賞銀三千兩給雲騎尉台吉衮布著封公爵三等台吉定咱喇什著授為扎薩克一等台吉其餘有功將弁俱著大將軍岳鍾琪查明奏聞加恩從優議叙再著署内務府總管鄂善馳驛前往肅州於軍需銀兩内動支十萬兩令大將軍將此番出征弁兵等查明戰功等第按名賞給至陣亡將弁兵丁分晰查明造冊具奏從優賞卹該督撫動用正項錢糧於安西地方建立忠勇祠將陣亡之將士等設造牌位致祭俾義烈將士永逺流芳以示朕崇奬忠勲之至意命選撥青海及科爾沁等旗兵於青海歸化城要地分駐調遣上諭大學士曰準噶爾賊衆犯我西路科舍圖卡倫今雖敗遁或由噶斯一路遣兵擾害青海地方刦掠馬駝羊畜亦未可定二等侍衛殷扎納著加副都統銜前往青海傳諭各扎薩克於左右翼揀選兵丁一萬名令王額爾德尼額爾克托克托鼐㑹同王盆蘇克旺扎爾公阿喇卜坦扎穆蘇公阿喇卜坦統領在青海𦂳要適中之地駐劄派出之官員照伊品級賞給半年俸銀兵丁毎名賞銀五兩再著内大臣克什圖前往青海與王額爾徳尼額爾克托克托鼐等一同管理克什圖所管阿爾台一路臺站事務著商都達卜遜淖爾總管五十四張家口管站郎中倫岱辦理又諭曰西北兩路或尚有應撥兵丁之處朕思歸化城乃通行兩路之地著理藩院傳諭四十九旗扎薩克等按旗均算派出精兵五千名由各該游牧處於二三月間前後起程沿途牧放馬駝至歸化城㑹齊擇形勝地方駐劄以備調遣其需用口糧於歸化城倉支領月餉於張家口同知存庫銀内動支户部核算尋議曰科爾沁等十旗撥兵一千八百一十五名烏朱穆秦等十旗撥兵五百六十九名翁牛特等十一旗撥兵一千三百二十四名四子部落等六旗撥兵二百三十二名鄂爾多斯等六旗撥兵一千六十名凡兵五千各轄以協理台吉管旗章京副都統㕘領佐領驍騎校等官令蘇尼特王垂際功蘇隆統之巴林王桑里達扎賴特貝子特古斯協理再撥歸化城兵一千名㕘領二人佐領四人驍騎校四人令副都統塔爾馬善領之其支給銀米如例奏入上從之命查弼納仍為北路副將軍上諭大學士等曰前令查弼納與順承郡王錫保同辦軍營之事今大將軍傅爾丹既不領兵前赴西路㑹𠞰查弼納仍以副將軍協同傅爾丹辦理軍務其昭武將軍印信查弼納攜至軍營交與傅爾丹収貯將來查弼納有分路帶兵之時即用此印癸未命㨂發直𨽻河南山西同知以下官能辦軍需者赴肅委用甘肅巡撫許容疏言甘肅地多衝要兼辦軍需請於直𨽻山東河南山西四省同知通判州縣中令各督撫選長才敏事者五人至甘肅供調遣以要缺題補奏入得㫖著照所請行山東現有賑恤之事正須幹員經理不必㨂選咨送甲申賞卹西路破賊將士上諭大學士等曰準噶爾賊衆侵犯西路汛界盜竊駝馬乘我不備事起倉卒其力戰克敵者甚屬可嘉而授命疆塲者尤為可憫前已降㫖令建忠勇祠春秋祭享以表忠節矣兹應賞給世職令其子孫承襲永誌恩施副將徐宗仁著給與騎都尉守備劉貴才劉芳雨李國勲俱著給與雲騎尉其應得卹典仍著該部察例具奏千總王大謨徐維新外委把總方正劉世勲俱著該部從優議卹此外如有應加恩卹之弁員俱著大將軍岳鍾琪查明具奏凡陣亡兵丁於卹賞定例之外俱倍加賞賜其隨役人等有受傷亡故者照兵丁卹賞定例給賞朕今以酒三爵遥酹陣亡將士著署内務府總管鄂善將酒齎往軍營凡陣亡將士毎名以羊一隻奠祭宣朕憫惻傷悼至意朕不得已而用兵本期全師克敵不損一人乃為至願豈必捐軀致命始稱効忠報國乎今此陣亡弁兵朕雖加恩優卹而惻怛不忍之念愈覺難釋於懷著鄂善將朕諭㫖徧行宣布令衆知之至所賞賚銀十萬兩鄂善至軍營時或與大將軍岳鍾琪或與䕶大將軍印務紀成斌分别將弁兵丁建功出力之等次秉公賞給務使均霑恩賜以示國家酬庸奬勲之令典尋兵部議覆西路陣亡將士署㕘將徐宗仁應贈署副將給恤銀六百兩署守備劉貴才應贈守備給恤銀四百兩各廕子弟一人以守備用劉芳雨李國勲應贈守備各給恤銀三百兩千總王大謨徐維新均贈署守備各給恤銀一百五十兩外委把總方正劉世勲並贈千總各給恤銀一百兩俱廕子弟一人以衛千總用其餘徐宗仁等祭葬銀兩令禮部工部奏明賜恤如例奏入上從之丙戌命議休息西路破賊將士上諭大學士等曰此次準噶爾之事出於不備總兵官樊廷等率領弁兵奮勇先登以寡敵衆兵丁中有凍傷手足者有冒犯鋒鏑者此等甚為可憫著傳諭大將軍岳鍾琪令其各還内地營汛另選兵以代之至將弁等雖與兵丁不同亦當曲為體恤樊廷為軍功之首朕欲擢授提督並令回居任所軍前山永副將張朝良降㫖陞為重慶總兵官其印務暫令他員署理凡此禦賊有功之將弁自總兵以至千把朕意俱遴員代其職任令暫回内地本任以息勞肩若云領兵大員一時難得其人朕已簡選石雲倬馬紀勲王緒級張存孝等數人命往軍前皆可充總兵之選况此後進取之䇿正須從容經理目前並非進𠞰之時伊等暫時休息將来大舉再赴戎行未嘗不可也著岳鍾琪細心密議以聞樊廷統兵在外遣人報知大營而外委把總馬能不畏賊鋒閲厯險阻以通音信著以守備用賞銀五百兩其同馬能報信之二人及越山赴營之弁兵並著查明從優叙賞丁亥命賞圖古里克營筆帖式竒書等上諭大學士等曰據紀成斌奏報北山之賊已退而鄂龍吉一帶尚有賊營駐劄我軍貯糧之處宜籌畫萬全圖古里克收糧之筆帖式竒書以二百餘人竭力衛糧捍賊賊衆圍困數日能固守糧營保全軍實深屬可嘉著賞給雲騎尉再賞銀五百兩其同在圖古里克之弁兵著岳鍾琪查郎阿查明到日從優叙賞二月戊戌授常賚為鎮安將軍統廿肅等處移駐兵上諭大學士等曰肅州甘州凉州移駐滿洲兵四千名又凉州有歸化城兵一千名尚無統領之員寧夏滿洲兵現今不過六百名著户部右侍郎傅泰前往署理寧夏將軍印務其肅甘凉等處兵丁著常賚前往給以鎮安將軍印信令其統領仍聽大將軍岳鍾琪調遣又諭曰常賚統領五千兵丁或應㑹駐肅州或應㑹駐安西或仍暫分駐於肅甘凉等處爾等行文知照各該處外再傳諭大將軍岳鍾琪署總督查郎阿此五千兵丁如有調遣俾其自為一隊令常賚統領不可零星分派與綠旗兵丁混雜一處恐滿漢彼此推諉轉有未便留此大隊為應援夾攻之師甚為有益擢甘肅布政使孔毓璞為都察院左副都御史仍留肅州辦理軍務庚子命晉貝子頗羅鼐及其子台吉珠爾瑪特䇿卜登爵上諭理藩院曰布魯克巴部落人等互相讐殺貝子頗羅鼐遣使解和宣朕威徳甚屬可嘉著封為貝勒伊子一等台吉珠爾瑪特䇿卜登屢次領兵効力邊疆著封為輔國公癸卯䕶理寧逺大將軍紀成斌奏賊退後防禦應援事宜命岳鍾琪核議以聞紀成斌奏言準噶爾賊兵在鄂龍吉者以正月十一日十二日退去尋有鄂爾多斯餘丁被擄脱歸詢之知賊已逺遁臣復遣人各路偵探俱無賊兵踪跡即於木城噶順鏡兒泉察罕哈瑪爾洮賚廋集所在各設卡倫置兵更戍以資哨望再我軍凡十二營自東至西首尾倉猝不能相應臣計各標營兵中除被創有病者令其調養外現在精兵可得一萬一千餘名更選九千令總兵官張元佐樊廷顔清如曹勷分領防禦東西中三處聨絡應援奏入得㫖紀成斌但言挑出精兵一萬一千餘名其固守營盤若干並安西肅州之兵六千人作何分駐之處並未詳晰且牧放官羊之鄂爾多斯餘丁被擄逃回則各厰牧放之兵亦必有被賊擄去者其陣亡若干被創若干皆未言及著傳諭大將軍岳鍾琪逐一查明據實宻奏如戰陣損傷之兵内有殘廢者照例給與半餉其被擄逃回之鄂爾多斯餘丁著送來京有詢問之處準噶爾降夷托克托和及所獲賊夷布庫著一併解京乙巳命代駐藏將士上諭大學士等曰駐藏之官弁兵丁等已經數年未曾更換朕心深為軫念查從前派往之兵係陜西一千名四川一千名今陜西兵丁現有征𠞰準噶爾之事難以派往西藏四川新募充伍之兵甚多著提督黄廷桂巡撫憲德酌量於新舊兵丁内揀選二千名前往西藏將從前駐藏之兵換回其弁員等自總兵以至千把亦應更換若大員内一時不得職銜相當之人可揀選幹員加銜委署前往奬諭貝勒頗羅鼐上諭頗羅鼐曰朕為統一天下之主凡四海生靈一視同仁無分中外乃者附近帕爾城之布魯克巴地方人等起釁搆兵互相仇殺朕聞之深為不忍軫念於懐爾能仰體朕意遣使與班禪額爾徳尼之使一同前往和説又遣使宣諭朕之恩徳布魯克巴地方人等遂感悟息争輸誠向化各帶部落敬順無違且請朕施恩訓誨朕甚嘉悦布魯克巴地方人等自兹以往宜各守疆界共相和睦永遵佛教祇奉恩綸如能黽勉力行朕自益加優眷布魯克巴之諾顔林親齊雷喇卜集後身喇嘛扎色禮布魯克古濟等著加恩賞賜噶碧東羅卜喇嘛率衆先歸尤為可嘉著從優賞給以示朕懐逺嘉順之至意爾可將此諭㫖宣諭布魯克巴地方人等知之丁未増給軍營兵月米上諭大學士等曰從前阿爾台兵丁駐劄之時糧運維艱是以廷議毎兵毎月祇給米一斗併羊價五錢邇年以来羊價漸長所給銀兩不足羊隻之值月米一斗亦有未敷不免半菽之虞朕心深為軫念查察罕廋爾毎年屯種所獲富有餘貯而運送糧石較前亦易著將現今調撥軍營防守之滿洲兵丁毎名月給米二斗四升九合其戍守阿爾台之滿洲兵丁毎名月給米二斗至察哈爾土黙特兵丁毎名月給米一斗五升以示朕恩恤兵丁之意己酉命代駐藏大臣上諭大學士等曰西藏駐劄弁兵已降諭㫖更換䕶軍統領馬拉内閣學士僧格在藏年久朕甚憫念命正藍旗䝉古副都統青保大理寺卿苗夀前往替回但二人一時回京新任之人不能熟悉西藏事宜著馬拉先回留僧格同青保等再辦事一年馬拉僧格各賞銀一千兩癸丑飭諭寧逺大將軍岳鍾琪岳鍾琪奏軍機事宜十六條一吐魯番地方饒沃宜廣屯種一吐魯番通伊犁路為逆夷出入咽喉宜設卡倫一準噶爾所屬回人宜先收撫一巴里坤等處宜多駐兵以分戰守一出兵襲擊逆夷使不得駐牧一駐吐魯番兵丁宜酌駝馬定數一領兵官宜增撥遣一牧放牲畜宜嚴防範一酌增羊隻以裕兵食一巴里坤新城宜多積糧石一綠旗兵餘丁無庸增設一酌增車兵器械一酌移駐吐魯番定期一辦運屯田農具耔種一聨絡吐魯番巴里坤聲息一預籌進𠞰兵數奏入得㫖大將軍岳鍾琪陳奏軍機十六條朕詳細披覽竟無一可採取之處朕心深為憂煩岳鍾琪以從前輕言長驅直入之説又為賊夷盜趕駝馬既恥且憤必欲襲擊進𠞰勉强踐復前説若以今日之勢命伊統率大兵直搗巢穴能保其必勝乎辦奏之事皆未妥協大學士等將朕㫖傳諭之乙卯命大學士等傳諭辦理軍需大臣武格馬爾泰上諭大學士等曰陜甘二省年來辦理軍需雖皆動用正項錢糧民間無絲毫之費然輸輓糧運伺候差徭不無勞苦朕已降諭㫖加恩奬勉但必得地方大吏仰體朕心凡料理軍務固不可任其延緩而過於迫急未免擾民查核錢糧固不可聽其浮銷而過於苛刻則必致剥民督撫等大員嚴𦂳一分則州縣官必於百姓加𦂳一倍如能寛容一分則小民必得一分之惠武格馬爾泰二人急公之心皆切但恐諸事過於苛迫可將朕㫖傳諭凡承辦州縣或於原限之外遲緩無多而其人之才有可用者不妨姑示寛容其開銷物料脚運之費亦必斟酌時價不可刻意核減但此㫖不可宣露於人恐冇不肖之州縣借此遷延浮冒其漸不可長也平定準噶爾方略前編卷二十一
