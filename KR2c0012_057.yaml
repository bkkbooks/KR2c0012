body:
  text: 乾隆十九年夏六月丁巳議備戰馬事宜陜甘總督永常奏言從前進𠞰金川安站設撥陜省正係經過地方並無再備戰馬之事調撥協濟易於辦理此次進𠞰準夷自哈密至伊犂通行三千餘里全資馬力戰馬一項最關𦂳要今照廷議按二萬兵備辦内綠旗兵八千需馬一萬六千匹滿洲兵例係一兵四馬需馬四萬八千匹加以領兵大員及隨帶餘丁共約需馬七萬餘匹兩省營馬及駐防各處馬匹全為調撥方足此數若再辦理分站設撥則兩省驛馬可調者不過一二千匹計潼關至哈密四千六百餘里併站安設亦需馬一二萬匹僅及十之一二請將歸化城土默特察哈爾黑龍江京城滿洲兵及新降之厄魯特兵仍令各騎原馬前來沿途皆有供支便於飼餧騎來之馬到甘省後就近分撥各營以備摘撥之數奏入得㫖軍機大臣議奏尋議臣等現議西路進𠞰兵二萬名内察哈爾兵於本年秋間起程新厄魯特兵及阿拉善兵俱於明春起程由口外行走其西安涼州莊浪駐防兵丁均係乘騎本營馬匹及甘肅安西綠旗兵俱近在該省并令料理車騾前往惟哲里木兵一千名索倫兵三千名係由直隸河南陜甘一路令照金川之例毎五百名一起陸續行走各該省於經由道路安臺設撥逐站更替永常尚未接閲臣等原議以為滿洲䝉古索倫兵一萬二千俱由陜甘行走是以不免周章今據稱兩省營馬約四萬餘匹驛馬共二千餘匹若於明年二月内將附近馬匹調集按站更替撥送則兵數不過四千分送僅止八起料理原屬從容所有議令各騎原馬之處應毋庸議惟是備戰兵丁馬匹關係𦂳要現議西路用兵二萬約共需馬五萬匹臣等原議於各處採買馬十六萬匹内撥給該處馬三萬六千匹并於兩省營馬内挑撥二萬四千匹共足六萬之數已極寛裕應令仍照原議以為備戰之用現在料理哲里木䝉古索倫兵設撥遞送自明春至四月時日較寛可以從容辦理並於道路寛濶之處添雇車騾俾按次進發無悞則營驛馬力儘可節省再現議於喀爾喀及内扎薩克等處採買馬匹恐尚不敷查青海一帶及附近洮岷莊浪等處各番部落俱係産馬之地並令設法購買備用奏入上從之庚申命籌辦烏梁海事宜上諭軍機大臣曰今年春薩喇爾等帶兵驅逐準噶爾之烏梁海等俱已遠避前去今我兵既撤正青草發生之時烏梁海等或仍在遠處逃避或即潛囘舊游牧居住未經查辦若仍囘原處明年大兵進𠞰時伊等或暗行送信與準夷或在大兵之後乗間偷竊俱大有關係應即遣兵先為辦理著傳諭策楞等先遣卡倫人等查騐確實俟薩喇爾塞卜騰等到軍營時公同商酌應如何辦理之處詳悉具奏戊辰命將軍策楞等派兵擒拏逃人巴朗等上諭軍機大臣曰據麒麟保奏稱策凌孟克之子巴朗帶領二百人逃竄伊等係甫經投順之人復又逃亡情殊可惡伊父策凌孟克方赴熱河未囘巴朗即背父潛逃其中必有别情著即傳諭策楞等速派弁兵堵截各卡倫路逕即時擒獲詢明實情將巴朗及同逃之台吉等押解來京其隨從同逃之屬下人等不必治罪仍交與策凌孟克加意約束策凌孟克等前赴熱河原令塞卜騰照看游牧今適因塞卜騰前往麒麟保駐劄處議事之際伊等即行逃竄看來伊平日管轄衆人尚知法紀今又前往軍營著策楞等將朕此㫖曉諭塞卜騰令其領兵追擒務期弋獲壬申陜甘總督永常疏奏官兵㩦帶器械糧餉各事宜得㫖軍機大臣議奏尋議據該督奏稱興師進𠞰利於火器擬每百名用鳥鎗手七十五名毎名於向例帶鉛藥五百出之外再加帶鉛藥三百出砲手五名帶新鑄威遠砲一位弓箭手二十名各佩弓二張梅針箭五十枝隨身插帶戰箭數十枝查現今各處挑選兵丁奉㫖俱令學習馬上長鎗該督按照馬六步四之例於各標鎭營揀選驍健令其學習長鎗擊刺之法其弓箭器械雖應預備但隨身佩帶總宜輕捷便利期於有濟實用至砲位一項舉動輙費䭾載曠野殊不適用無庸備帶鉛藥亦無庸加添仍照例用五百出為率又奏稱領兵官員口糧及兵丁進𠞰口糧俱以六個月計算應備粳米一萬一千二百餘石炒麵二百二十五萬觔白麵七十五萬觔羊二萬隻又領兵官員跟役口糧及滿漢兵丁跟役餘丁口糧應備粟米六千七百石零炒麵及青稞麵一百萬觔零白麵四十萬觔零羊七千八百餘隻再滿漢官員及跟役餘丁亦以六個月計算應支鹽菜銀一十七萬九千六百兩等語查此次進𠞰與前不同㩦帶食物簡省則進攻輕捷行走便利現奉諭㫖北路兵丁進𠞰應帶牛羊肉乾炒麵棋子可以隨身備用不必多需䭾載交策楞酌量辦理今西路官兵即有應行預備之處亦應簡便擕帶不礙行程方為妥協應令永常劉統勲另行籌辦具奏再議奏入上諭曰永常議奏進𠞰官兵器械糧餉摺内裹帶官兵跟役口糧至米麵數百萬觔此係從前岳鍾琪所辦乃相沿綠旗陋習不知岳鍾琪從前已屬失策而此番情形與前更自不同現在準夷内亂相尋人心離畔以天朝餘力乗機進取正所謂取亂侮亡之時若裹帶米麵數百萬觔䭾載前往則兵丁防䕶不暇何以輕騎進勦且與䝉古交戰惟應仍用䝉古行走之法加以官軍節制足矣若輜重為累不得鼓勇直前反啟準夷窺伺攘奪之心豈非轉資盜糧耶已據軍機大臣等議另行籌辦可將此傳諭知之丙子命都爾伯特親王策凌等約束額黙根所屬部人上諭軍機大臣曰據將軍策楞等奏稱厄魯特孟克特穆爾亦同巴朗等潛逃孟克特穆爾乃台吉額黙根之兄今孟克特穆爾既逃額黙根不便令其仍往游牧著將其屬下人等俱交與策凌等用心照管又諭曰孟克特穆爾等逼伊屬人翁郭爾同逃翁郭爾不從至於受傷仍勇往擒拏逃竄之密什爾甚屬可嘉翁郭爾著授為三等侍衛章京剛領兵同翁郭爾等奮勇追趕逃人擒其人口而囘亦屬可嘉著賞給孔雀翎並各賞銀五十兩秋七月甲申議撥解軍需銀兩甘肅巡撫鄂昌奏言軍需備用銀兩必須充裕一應撥運脚價及官兵俸賞加薪月餉鹽菜等項約共需銀二百二十八萬餘兩現貯司道府庫銀共一百四十餘萬兩實不敷用請於鄰省酌撥備用奏入得㫖軍機大臣議奏尋議西路進𠞰兵應行預備糧餉馬駝各事宜先經陜甘總督永常具奏經臣等議以此次進𠞰與前不同兵糧不須擕帶過多致行走遲滯請交與尚書劉統勲總督永常等另行籌辦鄂昌所奏大略均照永常辦理以致計算甚多但該省軍興之際需用銀兩不妨寛裕備貯應於山東本年春撥内撥銀二十萬兩河南本年春撥内撥銀三十萬兩四川原有貯司庫銀六十萬兩又乾隆十五年備貯銀五十萬兩應於此二項内撥銀五十萬兩通共撥銀一百萬兩再於户部撥銀一百萬兩交與該撫鄂昌備貯應用奏入上從之乙酉準噶爾部人呼濟雅爾來降命賞給安插如例丙戌上諭軍機大臣曰㕘贊大臣安崇阿德寧策卜登駐劄庫克嶺專為防範逃人乃巴朗脫逃三人尾隨往追並未奮身前進即行退囘著將三人帶往軍營明白質審一面奏聞一面宣諭朕㫖將安崇阿德寧即行正法以為觀望不前貽悞軍機者戒策卜登著革去貝勒給與公爵仍畱軍前効力行走戊子命永常等傳諭準噶爾貿易夷目上諭軍機大臣曰永常奏準噶爾貿易夷目阿濟伯克等到卡辦理情形甚屬妥協此時敦多克已將囘至安西可即傳諭敦多克伊在熱河時大皇帝所降諭㫖已甚明晰並非不令伊等貿易但此番貿易出自達瓦齊乃欲自比噶爾丹策零是以大皇帝不允須俟敦多克囘巢傳諭後達瓦齊果能一一遵㫖恭順懇恩亦不妨仍准貿易即敦多克在熱河時加恩賞賚亦係念從前台吉噶爾丹策零並不因達瓦齊遣來之故今伊等貿易夷目或即囘巢或在哈密候信聽其自便若留此守候所需米麵口糧准以羊馬換易此亦憐憫伊等衆人皆噶爾丹策零舊屬不忍令其饑餓是以格外施恩即令敦多克將熱河所降諭㫖宣諭於阿濟伯克等若敦多克業已囘巢則但將此㫖曉諭著傳諭總督永常提督豆斌其如何囘奏情形作速馳奏並將該夷目等各自居住不得與内地兵役稍有交涉該督提等務期加意防維妥協辦理己丑命削副都御史麒麟保職上諭軍機大臣曰麒麟保照看策凌等游牧諸事不能盡心適因塞卜騰達什丕勒暫離游牧地方麒麟保即漫無約束致令巴朗等脫逃又冐昧陳奏巴朗等已經拏獲希圖掩飾情節可惡著革職仍留章京上効力贖罪庚寅命副都統納穆扎爾前往軍營辦理策凌等游牧事務丙申擒獲準噶爾逃人巴啓等正法準噶爾新降屬人巴啓齊倫瑚雅克圖庫本等先後脱逃潛回準噶爾經將軍策楞等先後派人擒獲副都御史麒麟保㑹同郡王策凌烏巴什等審訊請將為首逃人巴啟瑚雅克圖庫本即行處斬為從逃人齊倫即行處絞奏入上從之丁酉定邊左副將軍策楞等奏報準噶爾輝特台吉阿睦爾撒納來降策楞等奏言七月初六日阿睦爾撒納等遣其部人得本齊卓特巴恰巴彦鄂爾特克至卡倫告稱阿睦爾撒納剛多爾濟訥黙庫班珠爾帶領四千餘戸投順聖主自博東齊烏英齊而來先遣我等前來送信又稟稱阿睦爾撒納舊住處原在塔爾巴噶台地方達瓦齊遣宰桑奇塔特額布進烏克圖三人來侵我等敗之移居於都蘭哈拉達瓦齊又遣策凌巴雅爾等來追經阿睦爾撒納敗之於哈布河以後宰桑布林來犯亦為我所敗阿睦爾撒納與策凌交戰時台吉諾爾布宰桑瑪木特宰桑哈薩克錫喇等帶領厄魯特烏梁海兵八千名擄我等游牧阿睦爾撒納聞信令其兄扎木㕘追至額爾齊斯河與諾爾布等交戰諾爾布等敗囘我等即將游牧向内遷移又遇扎那噶爾布帶兵堵截扎木㕘與之交戰扎那噶爾布敗走我等方得前進其包沁扎哈沁人皆已逃避只搶得瑪木特屬下得木齊庫克新錫喇布六十餘戸及牲畜等物此後並無追兵行走四十餘日到此奏入上諭軍機大臣曰據策楞等奏輝特台吉阿睦爾撒納等㩦帶眷屬四千餘户前來投誠阿睦爾撒納係準噶爾大台吉今與達瓦齊離異輸誠歸順深可嘉憫著貝子扎拉豐阿帶乾清門侍衛德善濟福等齎賞賚之物前往降㫖再令薩喇爾自軍營前往迎勞阿睦爾撒納頒以恩賞將來冬令朕自盛京囘鑾時仍派玉保照管阿睦爾撒納帶至熱河令彼瞻仰乗此便道將塞卜騰亦帶至熱河並傳諭玉保前往軍營迎勞阿睦爾撒納時暫在彼處照管游牧辦理事務俟應來時候諭㫖遵行阿睦爾撒納係何等人相見時有何言辭應詰問之處俱著詳細詰問具奏命將軍策楞等停止遷移策凌等游牧上諭軍機大臣曰策楞奏喀爾喀地方寒冷且無貿易請將策凌等游牧移在歸化城大青山以内居住現今巴朗在逃若再如此辦理不但使新降之人驚疑恇擾亦非辦理準噶爾之本意著傳諭策楞令策凌等仍在扎克拜達里克居住母庸向内遷移戊戌命賞給員外郎唐喀禄副都統職銜㑹同侍郎玉保前往軍營辦理阿睦爾撒納等安插游牧事務己亥議西北兩路軍需馬駝事宜軍機大臣奏言分送西北兩路軍需馬駝一案臣等原議西北兩路共備馬十六萬匹派出大臣侍衛䝉古王額駙等業經各處採買今卓索圖昭烏達兩處馬匹牲畜俱已買齊其餘有辦得過半者亦有尚未報到者若待採買齊備始議分送則水草荒枯於馬匹無益所有採買未得之處現在行文嚴行催取外今將已買馬匹酌量兩路分派即令解送查西路應行預備馬六萬匹由該省營馬及山東山西解送馬并青海等處採買馬匹共三萬五六千匹外應解馬二萬五千匹伊克招烏蘭察卜兩處與西路相近該二處所買馬二萬匹交該盟長等即派官兵乘水草分起陸續起程解送西路餘俟西林郭勒馬匹買得時於西南交界處就近揀選五千匹一併交與解送伊克招馬匹之扎薩克官兵送至寧夏横城等處交給其駝隻該處現有七千餘隻約已敷用今永常所奏須用數萬駝隻之處辦理殊未妥協經臣等議駁應俟永常覆奏到時另議北路所用馬十萬餘匹駝一萬隻除軍營現存馬匹駝隻及交額林沁多爾濟莫爾渾兩處採買共馬六萬六千餘匹駝七千餘隻應用外現在昭烏達卓索圖兩處所買馬二萬一千餘匹并哲里木所買馬一萬匹疾速購買亦令陸續起程解送北路軍營其由内扎薩克各處採買駝羊俱著解送北路備用每一㑹盟處派扎薩克一員同官兵加意牧養如有疲瘦倒斃責令賠補若能妥協解送奏明交部議叙奏入報聞庚子命籌辦接濟降人事宜上諭軍機大臣曰據策楞等奏七月初八日阿睦爾撒納已進卡倫共兵五千餘名婦女人衆約共二萬請簡派大臣帶領䝉古王等照看辦理等語昨聞阿睦爾撒納歸順已特派侍郎玉保並賞給唐喀禄副都統銜同往料理伊等游牧事務俟玉保到時令同努三得親扎卜等悉心經理阿睦爾撒納領兵至五千餘名人口衆多口糧必至不繼著將軍營所有牲畜及歸化城運到米石併軍營存貯糧餉内酌量動用賞給若必俟奏聞後賞給恐已緩不濟事策楞等即曉諭朕嘉惠伊等遠方輸誠納欵之意一面給發一面奏聞再阿睦爾撒納等帶來牲畜馬匹自必疲乏策楞等亦應善為曉諭令其加意牧放以備明年進兵之用其食用所需牲畜另於軍營預備羊隻内給發亦於軍務有益著將此傳諭策楞舒赫德公同商酌辦理辛丑定邊左副將軍策楞等疏奏籌辦安插降人事宜策楞等奏言現在阿睦爾撒納等來降若安插在烏里雅蘇台附近鄂爾海西喇烏蘇等處地方令臣等帶兵前進在科卜多等處居住將卡倫展至阿爾台山梁則烏里雅蘇台是通準噶爾大路衝要之處一應糧餉軍器馬匹牲畜俱在週圍近處似此重要地方斷不宜令伊等駐劄又此等新降之人常有逃亡尚屬小事若將明年進兵之事向準夷泄漏則一年之間俱可預備妥協與明年進兵之事有礙且安撫投誠之人更須從長計議明年準夷事定後自可令其前往舊游牧但亦尚需經理今此一年内養育二萬餘口若照辦理策凌策凌烏巴什等之例支給牛羊等項則喀爾喀地方不能有此寛餘牲畜倘欲給米石則現今存貯以及輓運之米尚不敷明年軍需之用不能支給伊等臣等公同商酌若安插在喀爾喀王策凌拜都卜游牧之南蘇尼特地方與四子等旗接壤地方則距歸化城張家口獨石口甚近伊等以皇上賞賜銀兩就近兌換食物甚為便易請俟阿睦爾撒納到軍營日諭以皇上恩綸照策凌等初到接濟口種之例分給騍馬牛羊挑其可用之兵將阿睦爾撒納等大台吉一并留在軍營令其守候諭㫖外其餘老少子女俱令擕帶接濟口糧即移至所指地方祈皇上另派通曉䝉古事務大臣前往照管安插辦理似此大事臣等理應恭候諭㫖但䝉古地方霜雪甚早若不乗早而行水草一枯又至遲滯臣等商酌已定一面陳奏一面俟阿睦爾撒納等進卡之後即照此辦理奏入上諭曰策楞等辦理此事甚屬錯謬阿睦爾撒納等係遠方新歸之人豈有將伊妻子如此分散之理此必舒赫德意見策楞從而附㑹耳此㫖到時無論阿睦爾撒納等妻子已經起程與否著即行撒回令其㑹集一處在烏里雅蘇台附近地方游牧居住又諭曰策楞等請將新降阿睦爾撒納等眷屬分駐於戈壁以内留其為首台吉及兵丁等於軍營以備遣用已將辦理錯謬之處指示斥駁此事策楞舒赫德不知是何居心乖張繆戾實為朕所不料即云一時錯誤亦不應出乎情理至於此極試思遠方歸順之人尚未知内地作何安插乃甫經歸命即將其父母妻子發遣留伊本身於軍營伊心豈有不生疑懼不知將伊眷屬作何發落今策楞舒赫德等辦理軍營重務其意只欲安居無事若將此等新降之人未經承受朕恩以前即如此處置倘或心生怨望激成事端伊二人又將如何辦理即為籌畫伊等口糧起見亦當請㫖暫為酌撥若因口糧一時難至則遷移如許戸口又豈能不支給牲畜行糧現在更如何辦給乎即或不然俟阿睦爾撒納到卡以後公同商議再行奏請亦不為遲乃亟亟奏聞且云一面已經辦理聞之實可駭異總因策楞舒赫德全無勇往辦事之心一味畏葸怯懦必欲壞國家大事其居心尚可問耶伊二人究係何人主見著即明白囬奏若以公同商議含糊掩飾斷難逃朕洞鑒定邊左副將軍策楞等疏奏停止往追逃人巴朗及辦理烏梁海事宜策楞等奏言臣等與塞卜騰及薩喇爾等商辦追趕巴朗及驅逐烏梁海之事據塞卜騰稱今距明年進兵時尚有一年倘將烏梁海即行辦理達瓦齊得信預備於進兵之事轉無裨益今即置烏梁海不辦至我兵到日伊等亦不過圖保性命各自逃遁斷無帮助達瓦齊及為送信之事現在似可置之不辦至逃人巴朗已潛逃一月有餘定已囘至伊犁達瓦齊處往追必不能及亦可無庸前追薩喇爾亦以巴朗在逃已久追亦無及為言奏入報聞癸卯訓諭將軍策楞等上諭軍機大臣曰據策楞等奏阿睦爾撒納見努三成衮扎布告稱同伊投降人内有落後千餘户懇求遣兵迎接策楞等聞知此語即應速為辦理乃奏請俟明年大兵進𠞰時再行籌辦所見甚屬舛謬此等落後之人俟至來年安能保其無意外之事阿睦爾撒納懇切求救情實可憫策楞等縱不能即行迎出亦應將即往迎接抑俟明年辦理之處具奏請㫖乃竟顯言推諉一味畏難何以示懷柔遠人之意此又必係舒赫德之主見策楞諸事隨聲附和伊二人深負朕簡用之恩殊出情理之外不勝憤恨業經降㫖令薩喇爾領兵迎接著速傳諭策楞等將此㫖令阿睦爾撒納薩喇爾公同觀看㑹商或即帶領阿睦爾撒納之兵給以馬匹口糧一同前往但不必令阿睦爾撒納親行並傳諭阿睦爾撒納大皇帝念爾初到勞苦暫為安息且已遣侍郎玉保前赴軍營帶往熱河召見封爵筵宴諸事俱照策凌等之例加恩若親往迎接即不能如期瞻仰惟令其差親信台吉宰桑等㑹同薩喇爾前往速為迎接其如何議辦之處即行奏聞策楞舒赫德辦理畏怯不堪著嚴行申飭丙午命班第為定邉左副將軍革將軍策楞尚書舒赫德職仍留軍營効力上諭内閣曰舒赫德自去年命往北路軍營所辦諸事動輙乖張其查拏瑪木特擅入卡倫一案有準噶爾扎那噶爾布差人投書詢問舒赫德並不奏聞請㫖竟擅自致書達瓦齊其舉動冒昧實出意外朕彼時降㫖嚴行申飭及來京時面加訓諭伊亦自知錯謬因未行治罪嗣因策凌策凌烏巴什歸誠知準噶爾簒奪相仍人心離散實有可乗之機特命策楞為定邊左副將軍並令舒赫德協同辦理舒赫德在熱河面領訓誨指授極為詳明伊二人自到軍營畏葸猜疑毫無籌畫凡所部署事事不合機宜即如準噶爾輝特台吉阿睦爾撒納與達瓦齊結釁為達瓦齊所攻窮蹙來歸乃策楞舒赫德於阿睦爾撒結尚未接見即議令將兵壯屯駐軍營同來眷屬悉移置於戈壁之南相距數千里使其父母妻子分析離居此豈在天理人情之内在阿睦爾撒納等甫經歸命焉知天朝將伊等分遣安插究屬何意斷不能不生疑畏且並不候㫖竟稱一面奏聞一面辦理此何等重大事而率意妄行乃爾耶至阿睦爾撒納稱有德濟特台吉率衆一千戸亦傾心向化因為水所阻又阿睦爾撒納之胞兄及其親子為瑪木特所拘並求給與口糧馬匹前往救應接取成衮扎布薩喇爾努三俱以為可行而策楞舒赫德悉堅執不允薩喇爾係熟悉彼處情形之人既以為可行伊二人必欲執拗不知其出何肺腑方今準夷疊遭内亂所屬部落叩關内附者接踵而至此正可以大示懷柔永綏邊境之時策楞舒赫德身膺重寄何顛倒舛謬至於此極葢舒赫德因朕有十月間令伊進京之㫖遂一切茍且辦理其不肯接濟阿睦爾撒納者恐致遷延不得歸家之故且前此致書達瓦齊一事朕未加重譴又自以同列大臣才具大率與彼相若而伊親信已久即辦理不當不過申飭議處未有可代其任者策楞雖素性粗率胸無定見乃亦竟每事附和毫不顧事理之輕重國家簡用大臣寄以專閫重任而乖張僨事如此實為深負朕恩策楞舒赫德俱著革職若即令回京轉得悠然事外適合本心著以閒散在㕘贊上効力贖罪所有家産俱著籍没其子特通額舒常俱著革職發往黑龍江披甲在京諸子著拏交刑部以為大員負恩者戒班第著補授兵部尚書馳往軍營署理定邊左副將軍印務八月癸丑准派新降厄魯特兵預備赴軍營調遣上諭軍機大臣曰據策楞等奏稱投誠之輝特台吉阿睦爾撒納訥黙庫等於明歲進兵時願將伊等屬下人内派兵二千三百餘名等語著照所請准其派出所派喀爾喀兵原定為六千名著裁去三千五百名令其看守游牧將軍策楞等㑹同阿睦爾撒納預籌進兵事宜策楞等奏言臣等於七月二十日至扎卜堪地方見阿睦爾撒納等遵㫖公同籌議明歲進兵之事據阿睦爾撒納等告稱現在準噶爾内亂人心離散黄教頺廢若乗此機㑹領兵前進先將包沁扎哈沁人等收服兵威遠揚使準噶爾聞風有願投誠者即行收納且可乗便將我等同來落後及被擄之人全行救出並搶奪牲畜為我屬下人口糧可以過冬現在達瓦齊處人雖尚有數萬然並無一材能之人衆心瓦解大皇帝即遣一人前往衆心無不歸附臣等諭以爾等誠心向化到此即請兵進𠞰以黄教頺廢羣生罹患為念正合大皇帝聖意聞之必加襃奬各封顯爵俟明年事定後仍令各歸本處安生樂業但今始從遠方來歸尚未瞻仰天顔諭㫖亦未頒到且爾等屬人未免窮困急須安撫若即令爾等進兵聖心亦必不忍今時已七月即領兵前往亦不能直至伊犁若不遵照大皇帝諭㫖一舉成功稍有聲張使達瓦齊聞信預備於事無益自應欽奉聖㫖於明歲進兵方為盡善阿睦爾撒納等咸無異辭臣等細觀阿睦爾撒納之意全欲向包沁扎哈沁地方乗機搶奪不但可以揚威兼可擄其牲畜散給屬下人等是以言之太易若遽允其請恐今歲不能竣事徒令準夷聞知預為防備於明歲進兵大事有礙是以公同商酌今年先將阿睦爾撒納等辦理安插仍俟明年各處兵馬齊集再行進兵較為妥協奏入報聞甲寅陜甘總督永常奏報夷使敦多克還部其阻留卡倫外之貿易夷目阿濟伯克等已先期潛行回部奏入報聞丁巳命兩江總督鄂容安面領指授赴軍營辦事上諭軍機大臣曰年來準夷内亂頻仍人心離散屢有大隊輸誠内嚮正可乗機辦理永敉邊境策楞舒赫德遇事乖張怯懦已降㫖革職一時未得更替之人因欲令尹繼善前往北路今思尹繼善年逾六旬此事亦恐非其所欲辦徒致勉强僨事鄂容安年力壯盛勇敢有為一切𦂳要機宜或尚能曉暢克勝此任著速赴行在面領指授所有兩江總督印務即著尹繼善兼署庚申厄魯特逃人伯克増特正法定邊左副將軍策楞等奏言伯克増特與巴朗等同逃旋經擒獲臣等審訊據供出從前巴朗等隨策凌孟克投誠時行至中途即與伊弟巴雅爾黨及宰桑濟爾哈朗達爾扎達瓦那木凱贊卜尼瑪齊崖等潛謀脱逃往投達瓦齊後策凌孟克前往瞻仰天顔時欲將巴朗巴雅爾黨一同帶往巴朗不願同行是以未去策凌孟克恐伊等脱逃因將巴雅爾黨及宰桑濟爾哈朗達爾扎達瓦齊崖等帶往臨行時巴雅爾黨將馬二十匹人五户託巴朗帶領居住且約欲往何處即行帶往明年必來尋覔同居至巴朗逃後囑伯克増特回告巴雅爾黨濟爾哈朗等我現由哈卜塔克拜塔克逃往巴雅爾黨等可即遇便尋來等語伯克増特本與巴朗同逃又為送信勾引他人情殊可惡請將伯克増特在軍營正法其巴雅爾黨等既有商議同逃情事已密咨麒麟保等加意防範奏入上從之壬戌命停派宣大兩鎮兵丁上諭軍機大臣曰北路進𠞰官兵原派三萬名今該處又有新降厄魯特等咸願出力報効合計兵數已屬有餘所有宣大兩鎮砲手兵一千名著停其派往丁卯命阿睦爾撒納等移至鄂爾昆等處游牧上諭軍機大臣曰據策楞等奏現在烏里雅蘇台地方水草漸枯時亦寒冷應照阿睦爾撒納等所請交與努三得親扎卜令伊等移至鄂爾昆塔米爾等處游牧著照所請即令移至鄂爾昆塔米爾等處居住其照管伊等毋庸派努三前往即令舒赫德同得親扎卜前去照管軍營事務舒赫德不必管理命賞給阿睦爾撒納等銀兩有差上諭軍機大臣曰策楞等奏稱明年大兵進𠞰時阿睦爾撒納訥黙庫等各帶伊等兵丁効力行走經朕降㫖照伊等所請行阿睦爾撒納等屬下之人新來投誠生計艱窘應賞給伊等辦裝銀兩著即行給與俾得從容備辦阿睦爾撒納照策凌之例賞銀二千兩訥黙庫班珠爾照策凌烏巴什之例賞銀一千八百兩於軍營存貯錢糧内動支即行給與其餘台吉等俟到熱河派定出兵之人再行賞給庚午命賞阿睦爾撒納等牛馬羊隻有差上諭軍機大臣曰阿睦爾撒納等欵闗内附冀受朕恩伊等初到聞其生計艱窘牲畜損傷深堪軫念著加恩賞阿睦爾撒納牛馬一百匹羊三百隻訥黙庫班珠爾各賞牛馬八十匹羊二百隻其餘台吉扎木㕘等八人俱各賞牛馬二十匹羊一百隻以資養贍壬申訓諭永常預辦明歲軍行事宜上諭軍機大臣曰永常奏明歲大兵齊集自嘉峪關至哈密應分路前往所有沿途道路并挑穵井泉以及到哈密後駐劄營盤牧放馬駝厰地均須及時酌辦以免臨期貽誤等語官兵經過若遇戈壁水泉缺少之處穵井應用不過偶一為之至於行走道路駐劄營盤牧放厰地俱屬隨時辦理之事若皆先事周章則於軍行迅速之道轉有未協且入夷境之後誰為預先料理此事耶向來綠營習氣毎於此等事宜經營籌辦騰口説而費筆墨徒致行走迂緩總非切要機宜永常此番統率官兵正宜一洗綠營積習務為簡捷便利一切隨時隨地相機辦理總以迅速遄行方為允協若仍蹈故習必為厄魯特兵所笑矣將此傳諭永常知之癸酉命新降貝勒策凌孟克等往西路軍營辦事上諭軍機大臣曰從前降㫖令貝勒策凌孟克塞卜騰同王策凌領兵一千前往阿爾台策應今思策凌烏巴什訥黙庫俱屬年㓜策凌孟克係舊人經歷事務若遣往西路於事有益著將策凌孟克遣往西路在㕘贊大臣上行走策凌烏巴什訥黙庫著照策凌孟克一體在㕘贊大臣上行走其從前西路派出綠旗兵一萬名内著傳諭永常即行裁減三千名命將軍班第等詳愼防範來降厄魯特人等上諭軍機大臣曰策凌孟克之子巴朗現在潛逃聞伊所屬人等尚有相約同逃之語不可不密行防範著傳諭班第等嗣後準噶爾來降之厄魯特等當於投到時詢明如係策凌策凌烏巴什及阿睦爾撒納等所屬之人即應給與各台吉識認同住倘係策凌孟克所屬之人其中恐有别情或係巴朗等使人暗通消息或係達瓦齊假作策凌孟克之人從中謀為詭詐俱未可定即應嚴加防守遣人送至京師安置不可仍令歸入策凌孟克部内居住致生事端尤須密為籌辦母令策凌孟克知覺班第等務宜詳慎妥協辦理乙亥命永常等籌辦運貯軍糧事宜上諭軍機大臣曰據陝甘總督永常甘肅巡撫鄂昌奏西路一切軍需糧石已經陸續購辦將次到齊可以轉運哈密等語但思各處調遣之兵明年三四月始陸續到營為期尚逺此時哈密巡防兵丁僅止綠旗及囘民人等殊不足恃若將一應軍糧悉行運往哈密堆貯則守禦未免單弱恐準夷狡黠或乗雪前來攘竊轉足飽其所欲雍正八年前事可鑒也永常等所辦軍糧宜從容緩運分貯安西以内一帶地方俟明歲大兵齊集之際再行運往哈密則程途既不甚遠儘可源源接濟而於防範之道更為周密平定準噶爾方略正編卷三
