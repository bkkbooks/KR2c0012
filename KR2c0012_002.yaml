  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_002-1a, image: WYG0357/WYG0357-0038c.png}
body:
  text: 康熙五十四年五月申辰命賑濟哈密上諭議政大臣等曰喀密為䇿妄阿喇布坦所侵恐不能生理著甘肅巡撫遣官運送米糧牛羊往賑丁未命給八旗軍前效力人口糧馬匹上諭八旗都統曰此番出兵之路甚逺請往效力軍前人內有不能自備盤費者查明啓奏給與糧馬監禁中除重罪大盜外其餘罪輕者若不能自備亦給與糧馬前去效力功成即可以贖罪誠伊等自新之路也己酉甘肅提督師懿德奏赴甘州㑹議軍務師懿德奏言臣領兵至西吉木地方據總兵官路振聲報稱䇿妄阿喇布坦兵已逺遁臣隨令路振聲暫駐哈密候㫖并撤回凉州官兵臣亦領兵暫回肅州據路振聲云哈密無牧馬之處可以駐兵應去哈密一日程移駐塔勒納沁地方有水草處臣思賊雖逃遁而哈密勢屬孤單應令路振聲等即駐塔勒納沁地方候㫖遵行近奉㫖著吏部尚書富寧安西安將軍督撫等率領滿洲緑旗官兵前往救援臣於五月初一日自肅州赴甘州以備㑹議軍務奏入報聞壬子議政大臣等以訊問被擒厄魯特曼濟供詞奏聞議政大臣等奏言臣等遵㫖詳訊被擒厄魯特曼濟據稱我本土爾扈特人我阿玉竒汗之子三濟札卜當年與父有隙率一萬人投䇿妄阿喇布坦䇿妄阿喇布坦擒三濟札卜送還土爾扈特留我等萬人分給所屬宰桑等至䇿妄阿喇布坦來侵哈密之故聞凖噶爾老人言去年喀爾喀擒我阿爾台打牲一人殺一人又我地貿易者為哈密所阻以是欲蹂躪之其人衆每部落千五百戶計三萬人其徴賦無定額凡有所需斂諸屬下人皆凋敝自和碩特土爾扈特輝特都爾伯特台吉屬人外及其十四部落無不人人怨䇿妄阿喇布坦去年雪深三尺餘其所居伊犁等處牲畜盡斃其子往攻安集延地方之布魯特被殺者五百人還又多病死再我土爾扈特一萬餘人皆愁苦度日各有戀土之心常欲乘間脫歸或歸命天朝方䇿妄阿喇布坦來侵哈密時衆人皆言其不自揣量輕犯天朝若大兵來討何以為計禍敗已徴猶不耕牧安生固自取滅亡耳奏入得㫖䇿妄阿喇布坦處著遣使分兩路齎諭㫖前往將喀爾喀所獲之厄魯特著隨哈密路使臣去哈密所獲之厄魯特著隨喀爾喀路使臣去乙卯命使齎敕宣諭䇿妄阿喇布坦時䇿妄阿喇布坦兵敗潛遁上諭議政大臣詳籌三路進兵之事特頒敕諭宣諭䇿妄阿喇布坦上以敕書示議政大臣等曰朕經厯軍事甚多今觀曼濟所言䇿妄阿喇布坦情勢與朕所預料者相合乘彼人馬疲弱之時應兩路興兵扼要駐劄遣使往諭至是遣原任員外郎保住由喀爾喀路藍翎克什圖由哈密路分道齎往諭曰去年爾衆擅掠我喀爾喀之人故喀爾喀巡哨之兵追遂殺爾打牲一人擒一人而歸我哈密之往吐魯番貿易者因爾亦不令回故從吐魯番處行文與爾不知曽到與否今爾無故領兵二千侵我哈密為我兵二百人所敗而遁今我兵已四路雲集斷難中止從前爾雖狂妄啓奏朕為天下主無不寬容况爾曽奏云令我等喀爾喀厄魯特青海之衆皆復舊業以安人衆爾今可令和碩特土爾扈特輝特之人俱回原處與伊兄弟完聚其在我處之輝特朕亦令回原處完聚於阿拉克山居住拉藏汗之子爾可速送還拉藏爾只領凖噶爾之衆僻在額爾齊斯居住則已再前給爾凖噶爾之衆本我所應有之人彼等亦不願屬爾處爾之人心離異各為身計不但衆人皆知即爾亦自知之爾果欲起兵此等人朕皆當收養誰不欲享太平乃肯為爾冒死耶况我用兵並無掩襲爾常自以為强可親身前來㑹盟定議不然恐爾又詭稱使臣不能盡達爾言也前爾屢奏所遣使人中途為人阻隔朕因遣使約爾來㑹爾又懇奏戶口無幾原不足數且僻在一隅若相近邊境有可效力之處情願報效今何無端食言侵我哈密若不來㑹盟斷無了期兵興之際受傷生齒必多爾若畏懼不來則爾向稱欲安人衆之言皆為虛僞朕必親征或遣王大臣等領兵直抵爾巢穴必不容爾信口支吾也爾其定意即於所遣使臣回時具奏賜擒送厄魯特之哈密佐領色珀爾等蠎袍銀縀衣服等物戊午傳諭俄羅斯楚庫拜甡城頭目上諭議政大臣等曰䇿妄阿喇布坦無故侵我哈密今大兵進討應行文曉諭俄羅斯邊界地方楚庫拜甡城之頭目令其加意防守邊界如有䇿妄阿喇布坦之人投向爾處即冝收留授內閣侍讀品級圖禮琛從前往土爾扈特時路經俄羅斯熟識彼處頭目可著前往酌籌增兵運糧事宜議政大臣等奏言前調西安滿洲緑旗兵五千已各遣一千駐噶斯口扼要外餘兵止有三千及甘肅提標兵已還甘肅由哈密進發之兵稍覺單弱應撥甘肅提標兵三千凉州固原寧夏兵各二千遣官率領前進令席柱富寧安統領其支給兵丁糧米應運肅州等處米二萬石至哈密其運米騾馬令支庫帑在西安甘肅等處採買如不足數則在青海等處採買冬寒驅至甘肅等處飼養備用進兵時兵丁行糧則米及牛羊兼給令甘肅巡撫綽竒隨大兵料理奏入得㫖固原寧夏兵著董大成吳坤率領前進甘凉兵著師懿德率領前進餘如議己未移駐哈密官兵議政大臣等奏言據哈密佐領色珀爾稱䇿妄阿喇布坦兵驟至城北數村莊田不得耕種今官兵駐西喇呼魯蘇台若北徙托和齊哲克得里等處則我衆得安耕種矣請令總兵官路振聲移駐托和齊哲克得里形勝之地令巴里坤等處要路嚴斥堠謹偵諜奏入上從之六月庚午命給喀爾喀扎薩克王符驗上諭議政大臣等曰喀爾喀扎薩克王等著㑹議給與憑據伊等所居地方相隔遙逺若當有事即互相救援甚好况敏珠爾公旗分尤逺居界外勢亦單弱喀爾喀等同係扎薩克倘遇有事私去救援不知是與不是大家觀望事必擔誤著將給與符驗之處議奏議曰推河附近杭愛山隂居住之敏珠爾公等扎薩克鄂爾昆圖拉居住之喀爾喀圖謝圖汗扎薩克等如有至推河備兵者其輜重妻子必留本處應行文祁里德等令杭愛山隂及鄂爾昆圖拉居住之扎薩克兵往額克阿喇勒等處駐劄杭愛山陽居住之扎薩克兵往推河駐劄其間酌量安臺彼此傳信令兵部發豫令箭每扎薩克各給十二枝遇有警持箭傳諭鄰近扎薩克即率兵救援後者按軍法治罪奏入上從之壬申命祁里德等移駐官兵並籌議屯田運餉上諭議政大臣等曰今敏珠爾公所住厄德爾齊老圖地方去推河不逺應令祁里德等在厄德爾齊老圖左近擇有水草可以耕種及魚獸繁多之處移兵駐劄既便於打牲又可保護敏珠爾公等眷屬將米運至駐兵處不但有益而進兵亦近運米事不可遲緩著即繕摺具奏議曰應行文將軍費揚古散秩大臣祁里德㑹同喀爾喀汗王等公議於敏珠爾公所居厄德爾齊老圖附近額克阿喇勒科卜多烏蘭古木等處擇要害適中之地有好水草可耕種者令諸軍駐劄方今右衛等處官兵所支糧雖足一年之用但糧運不可以不預籌請運湖坦河朔細未二萬四千石令直𨽻山西支正帑採買馬騾一萬五千匹於七月驅至湖坦河朔運米一萬二千石至駐兵處再令山東河南亦支正帑採買馬騾一萬五千匹明年草青時驅至湖坦和碩再運米一萬二千石至駐兵處其馬騾運米訖於進兵時令䭾子母炮位等物御製子母炮應運三十位給將軍席柱處五十位給將軍費揚古處備用奏入上從之甲戌西安將軍席柱吏部尚書富寧安議取吐魯番席柱等奏曰吐魯番與哈密接壤且䇿妄阿喇布坦咽喉要地當先取之沿途設站運米之事應於布隆吉爾巴里坤兩處各設兵五百大兵所用馬匹先飼養五十日於七月二十日啓行八月十五日前後至巴里坤休養數日從哈密之北大山後烏蘭烏蘇路進兵九月初五六日可到闢展吐魯番地方越山近臨吐魯番城池相機勦撫平定吐魯番後招安蘇爾統等回人一靣傳檄哈薩克布魯特不但吐魯番易取即䇿妄阿喇布坦自來亦可勦滅既取吐魯番再相機進勦䇿妄阿喇布坦奏入上諭議政大臣等曰覽富寧安席柱所奏今年進兵取吐魯番等語若在甘肅等處將馬匹喂養肥壯於九月間方取吐魯番則時值冬令且伊地方太近不如仍照原議明年前進為當祁里德處信息亦應等候再䇿妄阿喇布坦曽有秋天兵至哈密之語總兵官路振聲之兵止有一千力量單弱西安之兵既在甘肅等處喂養馬匹著將甘肅提標營兵二千添發路振聲處丙子議撤回鑾儀使董大成上命仍往噶斯口議政大臣等奏言據尚書富寧安疏奏臣遵㫖撥滿洲緑旗兵各一千令鑾儀衛鑾儀使董大成率往噶斯口前奉㫖令董大成吳坤領固原寧夏官兵應撤回董大成令將軍席柱遣西安副都統噶爾璧前往奏入得㫖董大成既已派往不必撤回戊寅籌辦進勦官兵馬匹甘肅提督師懿德奏言吏部尚書富寧安將軍席柱等奉命前至甘州與臣等籌議除遣往噶斯路防守之滿洲兵督標緑旗兵各一千外其進勦時撥滿洲兵二千督標緑旗兵一千臣標兵二千火器營兵五百凉州鎮標馬兵一千寧夏鎮標馬兵一千肅州鎮標馬兵一千火器營兵五百其各鎮標撥遣之兵所需乘騎及運米馬匹俱向各鎮取給臣標馬步兵二千五百共需馬五千二百五十匹除現存馬匹給與外尚缺二千匹請以寧夏凉州等鎮標下馬協助但臣所屬各營俱沿邊要路營馬不便空懸請於料理軍務大臣處領帑購買補足奏入上命議政大臣等議奏議如所請上從之並諭曰現今需用緊急收取各營馬匹時價必致騰貴其補給價值務使兵丁得沾實惠令其速補議政大臣等議軍行分駐地方並運米安臺事宜西安將軍席柱疏言運米馬匹請在甘肅等處飼養五十日於七月二十間出口八月十五前後至巴里坤奏入上命議政大臣等議奏議曰口外八月草將乾黃且馬匹飼養僅五十日亦不甚肥今塞草方茂應令將軍席柱等不必在甘肅飼養除師懿德提標下兵二千往駐防哈密總兵官路振聲軍前外其餘兵丁俱令以次出口由布隆吉爾塔勒納沁至巴里坤擇好水草處分駐其運送哈密之米令巡撫綽奇兼用車運自嘉峪關尾大兵後直至巴里坤兵部理藩院各遣司官一人於甘肅州縣調取人馬安設臺站遣部院筆帖式往坐臺奏入上從之己卯撥運河東米麥甘肅巡撫綽竒奏言臣奉㫖大兵所需米石交甘肅所在購備但河西非産米之區倉厫多貯麥豆應於河東鄰省採買奏入上命議政大臣等議奏議曰應行文巡撫綽竒先行辦給前進兵丁兩三月口糧此外應運米石令總督鄂海遣官就鄰省倉內所貯米麥運至綽竒處再令綽奇陸續運至哈密奏入上從之庚辰增給運米安臺兵丁都統圖思海奏言臣奉㫖管理糧運計自瑚坦和碩至推河應設臺七十每臺須兵三十名除所撥直𨽻山西兩省撫標下步兵各二百歸化城土默特兩旗察哈爾右翼四旗兵六百赴臺外其不足者尚一千一百名請以土默特察哈爾兵及直𨽻山西兩省步兵增給奏入上命議政大臣等議奏議如所請上從之乙酉命撥鎮安將軍潘育龍標兵屬甘州總兵官袁鈐管轄甘肅提督師懿德疏言奉㫖命臣率進勦兵丁前往但臣所屬諸營並沿邊防守尤為緊要請令鎮安將軍潘育龍撥標下馬兵二千給甘州總兵官袁鈐管轄兵部議覆應如所請上從之丙戌散秩大臣祁里德等以㑹議進勦䇿妄阿喇布坦事覆奏祁里德等奏言臣等集喀爾喀汗王台吉及熟識路徑之散秩大臣晉巴等㑹議據喀爾喀汗王台吉等言我兵從此進勦䇿妄阿喇布坦有兩路一由布拉罕順額米爾河尋伊犁河過阿勒坦厄默勒嶺一由博克逹額林哈畢爾噶進闥勒竒嶺此兩路俱至額米爾河於博羅塔拉地方㑹合計䇿妄阿喇布坦兵可四萬人尚書富寧安等兵應由哈密至巴里坤同將軍費揚古等先取吐魯番進至朱爾都斯之地我等喀爾喀兵止一萬必合內地兵方可深入請於博克達額林哈畢爾噶一路設兵一萬五千布拉罕一路設兵三萬進勦我等喀爾喀兵於七月二十前後啓行在布魯爾布拉罕口附近駐劄養馬其應否即行進勦或遣使招降再行請㫖至哨探處各扎薩克令臺站連接直至推河等語臣計䇿妄阿喇布坦縱有兵四萬各處分守兵亦無多若博克達額林哈畢爾噶一路有兵一萬布拉罕一路有兵萬五六千度可足用奏入上諭議政大臣等曰喀爾喀汗王等所議意欲增兵助勢似屬相宜今年未便進兵之處喀爾喀等尚在未知其欲令將軍費揚古等兵合并哈密一路朕意哈密一路富寧安之兵甚屬整壯費揚古兵不必發往哈密仍與喀爾喀兵為一路於明嵗進兵時再行添發可也丁亥命西安巡撫噶什圖往甘肅同巡撫綽竒隨軍料理糧餉馬匹等事尚書富寧安亦令總理秋七月甲午朔增給和托輝特公博貝兵丁上諭議政大臣等曰近和托輝特公博貝奏請招撫烏梁海及䇿妄阿喇布坦所屬厄魯特都爾伯特丹津一千戶人若伊等抗拒不服即行攻取等語似此動作以張聲勢甚是其間設有不睦致相仇敵聞博貝之兵前往以為大將軍至紛紛擾亂便不得彼真信雖䇿妄阿喇布坦兵來救援地方亦逺更有阿爾台嶺之雪攔阻不能前進矣又據博貝奏臣有兵一千五百度已足用若聖意以為尚應添兵則有根敦扎薩克羅卜藏所屬翁牛特兵扎薩克濟納米達兵扎薩克台吉阿里雅兵俱善於攻戰可以破敵將此三扎薩克兵添給足矣著照博貝所請將三扎薩克兵添給博貝帶領前去遣人往烏梁海處以好言招撫若不歸順逃入樹林深密處亦無關緊要相機行事可也至都爾伯特丹津處應再探其情實或撫或勦博貝領兵前往時若有䇿妄阿喇布坦兵向我喀爾喀直衝前來即著尾其後以牽制之都爾伯特丹津與厄魯特散秩大臣䇿凌為弟兄可令䇿凌遣一親信人寫給書信爾等將現在所議之事發與博貝或派章京或筆帖式飛馳前往并帶車領人同去即隨博貝兵一齊進發丙申賜出征齊齊哈爾副都統白濟索倫總管布珠孔雀翎銀兩馬匹己亥命協濟推河一路軍臺馬匹上諭議政大臣等曰推河一路臺站俱係歸化城之土默特三處烏喇特毛明安四子部落之臺站伊等去年遭雪牲畜損傷軍需事務恐致遺誤既現有運米大臣所設臺站遇有緊要事務著將運米臺站馬匹通用丁未命籌議運餉上諭議政大臣等曰軍務糧餉關係甚大天時地利不可不通徹籌畫現今運米一事朕甚為躊躇近日直隸河南巡撫奏稱牲口已如數起解又稱因雨水過多恐泥濘不能即到等語看來今嵗雨水實大此項牲口到瑚坦和碩定疲瘦不堪且前去路逺必值沍寒之時回時更屬歲暮嚴寒人與牲口不慣受冷必致損傷所遣大臣雖欲竭力圖效亦無可奈何著將此㫖發示將軍費揚古並散秩大臣祁里德等滿洲索倫䝉古兵糧若能節用支持到明年五月則今嵗預備齊畢來春青草一發運米前往於計為得也著詳議具奏議曰冬行惟駱駝耐寒計今年運米駱駝三千可以足用其直𨽻山西騾馬應暫停其解送即令於本省飼養明年青草將出之前驅至瑚坦和碩交與都統圖思海等并山東河南騾馬運送餘米隨兵前進再圖思海等亦應令停往瑚坦河碩俟來春前去奏入得㫖如議朕有進哨時所用駱駝三百隻在達卜遜淖爾亦取來發往尋議政大臣等奏曰今年運米所需駱駝三千除官駝一千外應遣大臣一人齎帑往張家口殺虎口鄂爾多斯歸化城等處購買以足三千之數送往瑚坦和碩奏入上命吏部侍郎傅紳前往戊午肅州總兵官路振聲請移兵駐烏克克嶺路振聲奏曰臣奉到部文令臣移駐哈密城後托和齊哲克得里等處其地即哈密第三堡西北之沙棗泉土多濕熱牧馬不肥沙棗泉西北九十里有山曰烏克克嶺山下即巴里坤地界登山而望逺近瞭然臣即移營就要路駐劄山峽小徑各撥兵巡防俟額駙阿寶輝特公羅卜藏等兵到日於巴里坤再相度要地駐劄奏入上命議政大臣等議奏議如所請得㫖報可辛酉命公𫝊爾丹等監管喀爾喀蘇勒圖喀喇烏蘇等處屯田事先是上以厄德爾齊老圖地近推河應屯田駐兵令將軍費揚古等與喀爾喀汗王等㑹議至是費揚古等奏言臣等以屯田事詢喀爾喀圖謝圖汗等據稱蘇勒圖喀喇烏蘇拜達里克河明愛察罕格爾庫爾竒勒扎卜罕河察罕廋爾布拉罕口烏蘭古木等處俱可耕種再臣等所統兵丁現駐察罕托輝扎卜罕河特斯河一帶地方應撥土默特兵善種地者一千每旗令台吉塔布囊一人率往屯種遣大臣一人監管奏入上命議政大臣等集議議如費揚古等所請再哈密地亦可耕請一併行文將軍席柱尚書富寧安將西吉木布隆吉爾等處勘明具奏得㫖如議公傅爾丹情願前往效力即交伊辦理再著原任都統宗室愛音圖護軍統領達米納侍郎能泰鐵圖同往後都統穆賽等疏言烏蘭古木在新設汛界之外地並山坡山溝不便耕種其科卜多布延圖郭勒等處耕種收穫甚多應預備耔粒田器給與公傅爾丹率土默特人一千及出兵歸化城之土默特兵一千令往耕種議政大臣等議如所請上從之臣等謹案三代以上寓兵於農漢時始立屯田以資邊食考漢書所載昭宣之代內則金城湟狹外則渠犁車師或以兵留耕或用弛刑募徙之徒領以田官督以校尉都護屯政莫詳於此蓋屯田之設不特省挽輸兼可盡地利使虜離居就貧破之勢而我過師有枕席之安故言邊計者莫要於屯田我聖祖仁皇帝於西事之初即敕所司留意趙充國三奏至是特命大臣經理屯務始則分兵耕種繼更募民田作數年之後嘉峪關以外化沙磧為沃壤裕軍儲於絶域世宗憲皇帝御極復開栁林湖諸屯設官置卒鑿石灑渠灌溉之法益備我皇上聖武布昭凖夷耆定玉門亭障逺越伊犁版章既古所未開儲胥亦古所未有謹考兩朝屯田奏報墾開不下數萬頃歲收率以巨萬計茲當西陲底定諸部歸誠屯政備修農功益普絶塞無不可耕之土荒陬無不習耕之人龍堆極望鏺鍤如雲於以纘承謨烈恢宏憲章猗歟盛哉將軍費揚古奏報進兵日期費揚古疏言臣等於五月初二日率兵啓行中途因少水草分隊而行七月初十日臣等先率前鋒至推河綽諾和碩地方後隊陸續即至奏入報聞八月乙丑停運鄰省米麥四川陜西總督鄂海奏言甘肅所貯米麥及現在採買米石足給兵丁又莊浪西寧鞏昌三處舊貯粟米四萬餘石可運三萬石至甘州與甘肅存倉之麥陸續運至軍前支給有餘若從鄰省運送路逺費多應請停止奏入上命議政大臣等議奏議如所請又議曰前令西安甘肅巡撫俱隨軍料理糧餉今年既不進兵應令一人往軍前一人駐劄肅州籌辦糧運俟明年進兵一同隨軍料理奏入上從之庚午命尚書殷特布齎帑購買駝隻議政大臣等議曰今年用駱駝所運米四千八百石及明年用驃馬所運米一萬二千石俱以預備前往推河之右衛黑龍江兵及藤牌手等口糧但明年進兵時兵數益增所運米石應益多計運米惟駱駝行走便利既不多需人夫而所載倍於騾馬蒿齊特蘇尼特等旗去年牛羊馬匹雖被雪傷而駱駝不損應遣大臣一人齎帑赴各旗購駱駝四千驅至大同宣化交地方官動支帑項飼養肥壯俟明年青草未出之前送至瑚坦和碩亦交與都統圖思海等以備運米之用奏入得㫖著兵部尚書殷特布去餘如議乙亥訓飭甘肅巡撫綽竒綽竒奏請運糧哈密需用嚮導上諭大學士等曰據綽竒題請嚮導看來辦事平常隨尚書富寧安前往之人熟識路徑者甚多且有一佐領回子駐劄肅州何用再以嚮導奏請况富寧安係特㫖派往辦理軍務糧餉大臣凡事應與合心辦理豈可各自具奏若一事而內閣兵部理藩院各自行文巡撫提鎮並不㑹同富寧安各行具奏則往來需四五十日必致誤事驛站亦多騷擾此後除軍機要事外其巡撫提督總兵官所奏之事著㑹同富寧安具奏至此等平常事件著將兩三件㑹為一處遇便進呈事務不可煩多如將軍費揚古散秩大臣祁里德同心辦理事無煩擾殊可嘉也己卯右衛將軍費揚古以病求解任上諭曰費揚古著帶右衛將軍印徐回右衛今年既不進兵將右衛等處兵交與散秩大臣祁里德喀喇沁塔布囊額駙格勒爾齊齊哈爾副都統白濟右衛副都統齊格公同管理著都統穆賽馳驛前往總理軍務俟進兵時另派大將軍給與印信甲申命散秩大臣郭廉等協辦駝隻上諭議政大臣等曰購買䝉古各旗駱駝兵部尚書殷特布一人不能料理著散秩大臣郭廉護軍參領巴祿前往協同購買送至宣化大同喂養即著殷特布監管俟明春發往軍前辛卯訓諭都統穆賽上諭曰朕以爾為人可用特令前往統領大兵其右衛黑龍江喀喇沁察哈爾土默特鄂爾多斯喀爾喀等處兵丁務令共相和好至管攝兵丁不可失之柔弱其效力贖罪諸人可分在各滿洲䝉古緑旗兵內勿任其聚於一處祁里德諳練䝉古事務且誠實有膽氣婁徴額雖老病曽隨朕行兵熟識地利諸事應與伊等酌議奏聞朕所派往之新滿洲等行走熟練可令同我兵往汛界哨探再彼處有黃羊沙米等物應令兵丁採取食用如省一月口糧即得一月之益總兵官藍理頗驍勇熟諳軍機著隨爾辦事其原有官爵效力軍前者可揀選署理章京護軍校驍騎校等官特諭壬辰命鑾儀衛鑾儀使董大成回肅州董大成奏言臣於六月二十二日領兵從肅州出嘉峪關自嘉峪關至噶斯口三千餘里行至常馬爾河因山水暴發所有運米牲口及兵丁所乘馬匹多致傷損倒斃今於八月十二日抵噶斯口奏入得㫖自邊上至噶斯口一千七百里曽經阿南達奏過今董大成何以又稱有三千餘里噶斯口路徑甚窄䇿妄阿喇布坦斷不由彼行走今正寒冷之時著董大成將噶斯口迤內放火燒荒領兵回赴肅州平定凖噶爾方略前編卷二
