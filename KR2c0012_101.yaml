body:
  text: 乾隆二十二年冬十二月辛酉諭酌派兵丁䕶送軍營馬匹上諭軍機大臣曰據吳達善豆斌奏稱䕶送軍營馬八千匹將所派兵丁編隊行走等語所辦甚是其吉林索倫察哈爾等閒散餘丁俱酌量賞給昨成衮扎布等奏請増馬二千匹已諭黄廷桂趲送并留富紹照料計此㫖到時巴圖濟爾噶爾等早已起程著傳諭吳達善等作速行文巴圖濟爾噶爾等將所領兵五百名内挑選索倫䝉古兵一百名交富紹帶回巴里坤䕶送續進馬匹現在將軍等撤兵烏魯木齊等處過冬其地距巴里坤千餘里如相去不逺則巴圖濟爾噶爾兵已足用或尚不足即於巴里坤添派綠旗兵丁䕶送若將軍處迎馬兵丁到來即遣回綠旗兵在富紹隊内行走亦可今吳達善等已行文軍營迎取馬匹并著傳諭成衮扎布等令其速遣至前項馬匹交收後所派綠旗兵不必回巴里坤或入進勦回部隊内或留於屯田處効力將軍等酌量辦理命户部侍郎阿里衮回巴里坤辦事上諭軍機大臣曰昨據阿里衮奏稱同額敏和卓進𠞰沙拉斯瑪呼斯等賊衆距滿福祗隔三站即速為接應等語此時曽否㑹合一處勦滅賊人但巴里坤辦事甚屬𦂳要雖有豆斌德舒仍須大臣駐劄阿里衮未奉朕㫖自必帶兵前進著傳諭阿里衮若沙拉斯瑪呼斯事竣即回巴里坤辦事壬戌諭散秩大臣和碩齊等駐兵勦賊事宜上諭軍機大臣曰前命和碩齊䕶送哈薩克使臣途中遇阿睦爾撒納及大隊賊衆即行擒勦并著唐喀祿帶兵䇿應現在伊等若未與賊人相遇於䕶送來使歸伊游牧後即駐劄額爾齊斯附近明歲西路之兵於正月下旬自烏魯木齊起程三月中旬可至沙喇擘勒若和碩齊唐喀祿往返道途必至遲悞今即就近駐劄既可辦理逋逃賊衆亦得以休息馬力著駐劄科卜多大臣接濟伊等行糧俱速行傳諭知之又諭曰據審訊賊黨烏勒木濟供稱去冬阿睦爾撒納在烏梁海時都爾伯特之孟克博羅特曽相隨同去後又往納木竒游牧等語從前愛隆阿勦殺納木竒賊衆之時未有孟克博羅特名目或竄入額爾齊斯等處藏匿亦未可定著和碩齊等留心查拏解送來京叅贊大臣富德疏奏辦理撤兵及勦賊官兵功次富德奏言臣准兆惠咨文奉到諭㫖以阿睦爾撒納逃入俄羅斯順德訥等不必在彼守候即應遵㫖撤回因遣往哈薩克之額爾克沙喇努三等尚未回營暫令留駐臣於十月二十五日令鄂博什帶兵二百名前往額林哈畢爾噶沿途搜勦嗎哈沁與將軍會合昨據往哈薩克貿易人等帶來額爾克沙喇等書扎聞阿布賚游牧移向巴顔鄂拉又聞巴圖爾烏巴什出痘身死屬實再臣等聞烏梁海安濟格斯奎與俄羅斯素有讐隙派出署防禦達色等於本月二十四日至布克圖爾瑪安濟等十餘户迎戰達色追射安濟遇石傷足前鋒卓丹即奮力前進將安濟生擒其格斯奎亦被擒獲計勦殺烏梁海三百餘户奬賞藍翎烏勒德克陣亡三等侍衛喀勒扎卜等帶傷又於庫克郭勒地方遇郭勒卓輝之烏梁海等二十餘人放鎗迎敵我兵墜馬者數人有寜古塔披甲人英德訥黒龍江打牲達呼里達三保奮勇救出盡勦賊衆又在臣隊前隊行走奮勉之三等侍衛畢拉爾海吉林署協領扎庫齊索倫署協領金濟噶爾阿第木保察哈爾署協領喇嘛扎卜藍領侍衛達桑阿等俱出衆効力謹將伊等功次列單恭呈御覽奏入得㫖富德所奏前隊効力之畢拉爾海授為二等侍衛扎庫齊金濟噶爾阿第木保俱授為協領喇嘛扎卜授為頭等侍衛達桑阿授為三等侍衛擒獲烏梁海安濟格斯奎之達色卓丹俱授為藍領侍衛勦殺烏梁海之英德訥達三保俱授為三等侍衛其餘奮勉効力及陣亡得傷官兵俟造冊到日該部照例議叙議䘏諭巴里坤辦事巡撫吳達善分别辦理軍營効力之厄魯特等各事宜上諭軍機大臣曰富德所奏軍營効力之厄魯特普爾普賽音庫本烏穆什巴圖濟爾噶爾達瓦等五人熟悉回部道路語言著同伊等妻子送至巴里坤給與口糧以備進兵時調遣其璊達喇等十人著分賞官兵又巴爾達穆特得木齊衮楚克扎卜効力軍營已授為二等侍衛與同行之瑪勒占等十人送至巴里坤時著派員解送來京可傳諭吳達善等遵照辦理户部侍郎阿里衮等疏奏都統滿福被害信息阿里衮等奏言臣等聞都統滿福於十一月初六日過肯色嶺追勦沙拉斯瑪呼斯臣等輕騎前進於十三日遇滿福帶往之吉林佐領麻色等官兵一百七十餘人陸續歩回急問情由始知滿福帶領官兵二百七十餘人於初七日遇乘馬賊人百餘因直前攻擊賊俱敗走初九日滿福得臣等來信即欲駐候同行隨據將軍處遣來厄魯特七名有沙拉斯得木齊敦多克哈什哈瑪呼斯得木齊敦多克車凌呈騐印文令將賊首擒拏招降餘衆並言路徑險阻須先遣數人同往招降初十日滿福所遣索倫兵勒克圖回禀云同厄魯特二名呈送羊隻現在敦多克哈什哈已將賊首擒拏等候並派兵修路迎接十一日滿福行至哈喇和落地方見厄魯特等修路山徑尤險樹林甚宻下有深溝滿福懐疑急令前隊收回忽賊衆千餘自林内突出截斷我兵戰至日暮賊衆始回麻色等聚集兵丁探問滿福信息有吉林披甲人平㤗告知賊衆圍急滿福厲聲大呼奮力射賊忽數賊衝入滿福被鎗刺墜溝中麻色即令平㤗前引覔路下溝見一帶傷厄魯特云此溝甚深並無可下之處又詢以賊人游牧據云敦多克哈什哈豫通信息將户口於十月十五日移過達朗嶺留兵守候交戰今已將海都河橋渡嶺路俱行毁壊往投巴圖爾烏巴什游牧等語麻色等過嶺沿河覔路不得因歩行回報臣等查麻色等官兵除得傷之外其餘軍器俱盡因給以口糧暫令撤回臣等即帶兵尋取滿福身屍追勦賊衆奏入上諭軍機大臣曰據阿里衮等奏稱滿福追勦沙拉斯瑪呼斯因叛賊敦多克哈什哈等以迎降誘入伏中被鎗陣亡等語滿福雖為賊所愚究屬捐軀盡節著照陣亡之例議卹其隨從奮勉官兵及陣亡得傷人等即造冊送部照例分别敘卹至阿里衮此行係接應滿福今所奏初未自行引咎及憤恨賊人豈專為取滿福信息耶現在時届冬寒兵力亦乏伊等奉到此㫖如不能竣事即可撤兵哈寜阿亦不必前行俟來年大兵進勦額敏和卓就近往游牧休息阿里衮即回巴里坤辦事併傳諭駐劄烏魯木齊將軍大臣等知之又諭曰滿福追勦沙拉斯瑪呼斯被叛賊敦多克哈什哈敦多克車凌等誘害伊等効力軍營為成衮扎布等信用遣往招降乃與賊衆相通情尤可惡來年將軍大臣等進兵務將二賊嚴行查拏送京看來厄魯特等真不可信即三都克亦當留心察看倘有可疑或即於軍營正法或派員解送來京不可致令逃脱癸亥命山西巡撫塔永寜購辦軍需駝隻上諭軍機大臣曰據黄廷桂奏稱現在軍營需用駝隻業經行文晉省購買三千隻陸續解送等語著傳諭塔永寜即照該督所奏選委妥員分路購買務擇臕壯口輕者隨得隨解從前明德採辦時所定價值未免減少此次購買倘有不敷即酌量加増亦無不可總期於軍行無悞仍遴選妥員加意照料解送乙丑申諭散秩大臣和碩齊等駐兵防賊事宜上諭軍機大臣曰昨諭和碩齊唐喀祿於送哈薩克使臣之便帶兵駐劄額爾齊斯附近截拏逃賊以候阿睦爾撒納信息今據策布登扎布奏稱來年大兵前進巴圖爾烏巴什等賊若欲逃入俄羅斯必經由塔爾巴噶台愛呼斯等語著傳諭和碩齊等於額爾齊斯等處酌量留兵堵截伊等即帶兵至塔爾巴噶台愛呼斯察看賊人來路安設卡倫勤為瞭望如有逃賊即行勦滅不可致令偷越仍將駐兵處所酌定具奏授副將軍喀爾喀郡王策布登扎布帶往軍營之藍翎侍衛拜達爾為三等侍衛虚銜藍翎赫倫㤗莫寜察為藍領侍衛司鞍佛爾賽賞給虚銜藍翎仍賞銀各五十兩員外郎色楞賞銀一百兩丙寅諭添派屯田兵丁備勦回部上諭軍機大臣曰來年進勦沙喇擘勒賊衆派兵四千名由魯克察克往辦回部派兵二千名計兵已六千自屬足用但魯克察克二千兵後再得應援之兵更為有益所有烏魯木齊等處屯田兵丁雖耕作時人力宜多播種後即可酌減著傳諭黄廷桂雅爾哈善等將各處屯田兵約計若干留十分之三四守候成熟其餘仍隨同進兵若可得三千則合之軍營幾及萬人即可號稱數萬愈覺聲勢雄壯如屯田兵不敷抽調即於綠旗兵内添派綠旗兵頗善歩行祗須每人給馬一匹令隨同雅爾哈善暫駐魯克察克之兵進勦回部其酌量抽派之處伊等行文酌議一面辦理一面奏聞併傳諭兆惠策布登扎布知之又諭曰前因成衮扎布等以屯田事宜奏請已命雅爾哈善等相度可耕地畝支給籽種出派兵丁今又於屯田兵内抽調三千續進可傳諭黄廷桂雅爾哈善所派屯田兵丁務與地畝相稱既使可耕之土不致荒閒亦於進勦有益其悉心經理條晰具奏丁卯諭軍營將軍大臣籌辦屯田市馬各事宜上諭軍機大臣曰昨命黄廷桂雅爾哈善查勘屯田處所廣為播種勿致荒閒添派兵丁以資耕作來年我兵進勦自應立奏膚功即使未盡剪除必蓄積有餘始可次第辦理可傳諭兆惠富德等留心經畫務使地無遺利至哈薩克約於來年貿易所到馬匹亦須多為購買馬蕃糧足共樂飽騰於軍務甚有禆益此二事宜與黄廷桂雅爾哈善等同心商辦再努三從哈薩克初回自悉彼處情形軍營現亦無事著來京以備詢問命順天府南路同知范清曠調補甘肅洮州同知承辦哈薩克貿易事務己巳諭添派綠旗兵丁及進勦回部事冝上諭軍機大臣曰昨策布登扎布奏請添派綠旗兵丁接續進勦已命黄廷桂等於屯田兵内酌量抽調三千名矣今阿里衮額敏和卓奏稱領兵至哈喇和落捉生詢問知敦多克哈什哈等同沙拉斯得木齊都噶爾瑪呼斯得木齊根色等帶領游牧由庫車向葉爾羌和闐逃去已遣人從庫車間道引兵堵截等語看來辦理回部一事伊等既知覺豫備則兵勢更須壯盛可傳諭黄廷桂於前抽調兵丁外添派綠旗兵五千名即在甘肅等標營内調撥於來年春盡夏初前進其糧餉馬匹俱應速為料理帶領前後綠旗兵八千名著派馬得勝丑達再派總兵一員同領仍曉示官兵務須顧惜顔面奮勉効力併傳諭軍營將軍大臣等知之又諭曰據阿里衮額敏和卓奏稱領兵至哈喇和落知沙拉斯瑪呼斯游牧已逃往庫車等處現在遣熟識路徑之人取近堵截頗合機宜伊等遇賊游牧收其馬駝牲隻固可以増兵力但與賊衆相持則帶兵尚覺其少朕心頗為厪念阿里衮等惟相機行止如勢難猝辦即可撤兵倘額敏和卓確見庫車可取亦不必遽回游牧諭將軍大臣等查詢脫出兵丁情節上諭軍機大臣曰據吳達善等奏稱由䑓站呈報隨滿福進勦之索倫署領催遜坦等因滿福被害伊等力戰不支至日暮時脱出已送往軍營并於吐魯番派兵二百名接應阿里衮等語所辦尚是但遜坦等之言未足深信若果力戰得脱其情自有可矜如臨敵即逃豈可􅀈頇不問蓋大臣勦賊所恃官兵擁䕶若大臣方奮勇向前而官兵乃棄將先遁以致勢孤被害尤為軍法所不宥著傳諭兆惠富徳阿里衮等將脫出人等加意體訪詢問有無此等情節查明具奏賊黨烏勒木濟正法癸酉恩授新附烏梁海宰桑等官職並定入貢賞賚之例上諭軍機大臣曰據納穆扎爾奏稱阿勒坦淖爾之烏梁海宰桑特勒伯克扎爾納克等新經歸附請照察達克等之例於來年入貢等語烏梁海等輸誠入貢甚屬可嘉宰桑特勒伯克扎爾納克授為三品總管賞戴孔雀翎得木齊竒爾吉斯敦多克䇿楞巴哈雅克俱授為佐領賞戴藍翎准於來年入貢至伊等貢物數目已較舊時裁減仍加以賞賜嗣後毎貢貂䑕十個賞縀一端灰䑕二十個賞布一疋察達克等入貢亦照此例納穆扎爾即傳諭車木楚克扎布等明白宣示俾邊隅臣僕咸知德意命議叙叅贊大臣富德奏報之勦賊䕶糧各官兵上諭軍機大臣曰據富德奏稱過鄂爾和楚克山至摩和爾岱地方有賊衆三十餘户踪跡派鄂博什領兵追至達爾達木圖河官兵奮勇攻擊勦殺男婦二百餘收其馬駝軍器等語此次勦賊効力之委署營總瑪津泰署驍騎校温㤗托新著戴奬賞翎仍同各官兵造冊送部照例議叙又據奏喀喇沁臺站署章京旺楚克帶兵從濟爾哈朗䕶送行糧並無失悞等語和楚克著賞戴孔雀翎亦同官兵等送部議叙諭大學士管理陜甘總督黄廷桂酌辦屯田耕種事宜上諭軍機大臣曰黄廷桂奏稱來春烏魯木齊屯田准巴里坤大臣咨取耕牛五六百隻甘凉肅等處牛隻僅敷耕種難於購辦除将収取厄魯特等牛二百餘隻備用外請與巴里坤牧放之揀剩馬匹一同解送等語騍馬菜馬不堪乘騎者雖可資耕犁之用但軍營馬匹闗係𦂳要巴里坤牧放之馬即有臕分不齊總宜留備乘騎不得因牛隻短少遂為遷就至烏魯木齊一帶地方自宜廣為開墾已傳諭管理屯田大臣令其不必拘泥即以人力犁鋤亦無不可如綠旗兵果能出力自當量為奬賞黄廷桂可并知此意隨宜辦理至甘省現存馬五千匹朕意尚須豫備馬一萬匹方足供緩急之用昨歸化城副都統法起奏稱陕省營馬已買補萬餘匹等語黄廷桂可飭令各營善為餧養以備來年三四月間調遣其價值草料或於定例外因時量為加増總期實足濟用可将此傳諭知之甲戌諭叅贊大臣富德查明鄂羅斯拜逃走情節上諭軍機大臣曰據富德奏稱察哈爾䕶軍鄂羅斯拜於十月二十五日夜騎牽馬匹逃走等語鄂羅斯拜派往軍前効力反向哈薩克逃去情甚可惡但伊雖哈薩克種類來投之後即作為䕶軍給與産業豢養二十餘年家屬俱在察哈爾有何被廹情事隻身逃往哈薩克耶向來兵丁迷路則該管官罪重若逃走則罪輕或該管官員希圖避罪以逃走詳報亦未可定除將伊家屬交該總管暫行嚴加監候外著富德將鄂羅斯拜或係迷路或實係逃走查明具奏此時伊或潛回察哈爾著該旗亦嚴行緝捕諭山西四川督撫協辦馬匹牛隻上諭軍機大臣曰黄廷桂請將軍營用剩之馬挑選數百匹為烏魯木齊等處屯田之用昨已有㫖詳悉傳諭矣軍需馬匹不妨多為豫備著傳諭塔永寜於晉省營馬内擇其臕分壯健者酌撥二三千匹解甘其挑缺營馬另籌買補如定例價值不敷不妨據實奏明量為加増至烏魯木齊一帶屯田需用牛馬甘省耕牛難購騍馬菜馬亦屬無多如晉省民馬内除買補營馬外有騍馬及不堪乘騎之細小馬匹俱可酌量收買或五六百匹或千餘匹即行解赴甘省至川省所産氂牛頗多其馬匹雖小不堪馳驅進勦而服犁耕地尚屬可用可傳諭開㤗將川省牛馬酌量購買一二千即騍馬亦可凑數於來年陸續解交甘省即不能趲赴春耕亦可補下年之用得此兩省協濟無煩另為籌辦矣并傳諭黄廷桂其如何豫備員弁接收分送俟開㤗塔永寜咨到之日一面辦理一面奏聞乙亥封賞招服烏梁海之王公台吉等上諭軍機大臣曰車木楚克扎布數年來効力行間近復招服博和勒那木查爾等烏梁海善為撫納著加恩封為郡王原任公多岳特自行告入叛逆烏梁海寨内勤勞可念著加恩賞給公品級四等台吉帕克穆伍良海陞授三等台吉伍良海身故令伊子承襲内大臣察達克賞縀六端副都統赤倫散秩大臣圖布慎各賞緞五端赤倫之弟察罕賞戴孔雀翎署驍騎校索倫班圖巴爾虎扎卜俱授為驍騎校索倫領催什第著署驍騎校其察達克所屬得木齊收楞額及兵丁等著納穆扎爾酌量賞給銀縀丙子諭叅贊大臣永貴等酌辦䇿應阿里衮官兵上諭軍機大臣曰永貴奏派愛隆阿帶兵三百名䇿應阿里衮等伊即往魯克察克籌辦軍務探聴阿里衮愛隆阿信息等語所辦尚是但阿里衮等此時恐已逺去不能追及則往返徒勞兵力可傳諭永貴愛隆阿若不能追及阿里衮等或伊等由别路撒兵即將愛隆阿調回庚辰命革叅贊大臣舒赫德職留軍營効力贖罪上諭大學士曰舒赫德前在軍營屢干重譴朕皆曲為寛宥今春西師兩路進勦一時不得其人將伊加恩起用凡一切機宜俱詳悉面諭令其到軍營時傳諭將軍成衮扎布并戒以不可如前恇怯善為協辦軍務詎意舒赫德自進兵以來所辦諸事全不奮勉成衮扎布係䝉古人雖經戰陣然未面領訓諭舒赫德自應盡心襄助乃此次所辦諸事動失機宜即如招服克勒特烏魯特等游牧後即當收其馬匹以益兵力使賊伎倆難施方得駕馭之道乃伊等任其屯駐山中致使賊有餘力大兵既過隨即叛逃舉此一端可見諸事全無成算及朕降㫖詰責始東遮西露往來道途疲馬力於無用之地此皆舒赫德並不將朕諭㫖詳悉傳示成衮扎布之所致也蓋兵法忌怯弱而舒赫德選懦性成兵法忌諱飾而舒赫德最工文過合計伊前後罪讉即正法亦不為過但西路進兵以來雖未能就緒尚不至大挫軍威若即寘重辟伊反得諉過於成衮扎布矣朕念成衮扎布去年擒青滚雜卜之功看伊顔面貰舒赫德以不死然其不足復用所謂下愚不移亦屢試而知之者舒赫德著從寛免死革職令為兵丁自備資斧在軍營効力贖罪伊子舒常亦因加恩舒赫德復授為侍衛遣往軍營今舒赫德既經革職舒常仍革退侍衛發往黑龍江至鄂實以叅贊大臣前往軍營不過隨同將軍行走並未奮勉効力亦當治罪但較之舒赫德尚屬稍輕鄂實著革職降為藍翎侍衛自備資斧在軍營効力行走諭查勦叛賊琿齊等並定大臣侍衛等罪上諭軍機大臣曰前命成衮扎布等來京沿途查勦巴哈曼隻等賊衆其叛逃之琿齊額林沁達瓦等令富德於歸途之便就近查勦伊等奉到諭㫖但將端濟布等所報巴哈曼隻爲得木齊哈勒拜所殺隨帶兵進勦等語具奏而沿途曽否遇賊並未奏及即端濟布追賊已久亦未聞探取信息奏聞計此時琿齊額林沁達瓦等皆逃往沙喇擘勒來歲進兵務宜留心勦滅至所奏總管職銜五十六將應正法回人脫逃一名未經具報請革職治罪五十六著從寛免罪降為藍領侍衛効力行走托倫㤗索取多爾濟馬匹以致控告甚不安靜理應正法姑從寛革退侍衛効力贖罪再舒赫德屢獲罪譴加恩復用乃不能領會訓㫖協辦軍務若重治其罪伊反得諉過於成衮扎布是以將伊革職於軍營効力贖罪鄂實全未奮勉亦降為侍衛効力行走已頒發諭㫖成衮扎布雖不可謂無罪而去年擒獲青滚雜卜功足相抵仍傳諭成衮扎布兆惠等將軍營事務及端濟布所辦扎哈沁賊衆信息作速奏聞申諭大學士管理陜甘總督黄廷桂添派兵丁事宜上諭軍機大臣曰據黄廷桂奏稱添派綠旗兵三千名計哈喇沙爾等處屯田兵内抽調十分之六仍須派兵一千九百名請於甘省標營及巴里坤屯田兵内派足等語巴里坤屯田兵一千名若抽調六百則該地恐不敷用宜酌量辦理昨聞賊衆投往回部因慮兵力單弱又諭於三千綠旗兵外添派五千黄廷桂想尚未奉到此㫖看來各處屯田兵數尚少若可耕處多則續派五千名即留十分之四亦無不可且先後兵八千名酌留一二千屯田六七千進勦均覺裕如黄廷桂其與雅爾哈善加意辦理癸未命兆惠為定邊將軍䇿布登扎布為定邊右副將軍成衮扎布仍為定邊左副將軍辦理北路事務上諭軍機大臣曰今命兆惠為定邊將軍䇿布登扎布副之來年辦理進兵惟兆惠等是頼可傳諭兆惠當與䇿布登扎布富德同心協力不可自分畛域至額敏和卓因其熟悉回部情形人亦果毅已命為叅贊大臣在前隊行走兆惠等務宜優待以收其益一切軍前事務相機辦理善自䇿勵以奏膚功叅贊大臣永貴疏奏阿里衮等進勦信息永貴奏言臣於十二月初八日至吐魯番詢問沙拉斯瑪呼斯賊人信息知阿里衮等前至哈喇沙爾賊衆伐樹舉火截斷山路因取間道捉生詢問知賊已逃往庫車阿里衮於十一月二十四日至哈喇沙爾之西南庫爾勒地方額敏和卓遣人持書往諭庫車頭目尚無信息臣伏思阿里衮等口糧宜為接濟今派愛隆阿等帶兵齎送查巴里坤運送軍營口糧駝隻回程經過吐魯番擬截留三百隻於闢展存貯米石内動支起運至臣即應前往魯克察克辦事因吐魯番取阿里衮等信息較近是以暫行駐劄其阿里衮章奏文書均闗進勦要務若有就近辦理事件恐俟報遲延請即行開看亟需辦理者一面辦理隨即具奏奏入報聞命將軍大臣等來年進兵曉示回部上諭軍機大臣曰來年進勦回部宜先傳㫖曉諭以波羅泥都霍集占兄弟在噶爾丹䇿零時獲罪拘禁大兵平定準噶爾始行釋放因係回部頭目令其仍歸故土安集所屬以承恩澤伊等自應感激圖報永矢恭順之忱乃敢戕害使臣稱兵抗拒情罪難逭但聞諸事皆霍集占隂謀不軌至波羅泥都頗圖安靜其屬下人等亦係一時被脅非其本心今大兵進勦惟正霍集占之罪若波羅泥都能將霍集占縛獻亦必宥罪加恩如此一面曉諭即一面進勦不可按兵俟釁若伊等果相猜忌自於軍事有益可傳諭兆惠及雅爾哈善等知之申諭簡派魯克察克辦事大臣上諭軍機大臣曰據成衮扎布等奏稱追勦沙拉斯等賊衆已派哈寜阿愛隆阿陸續䇿應阿里衮等永貴既奉命署理廵撫其辦理魯克察克事務舒赫德巴祿即起程前往其巴里坤送來馬匹外再送吐魯番馬三千匹派兵一千䇿應阿里衮等乘賊不備速行掩襲收其馬駝牲隻則進勦回部益増兵力等語屯田事務已諭雅爾哈善永貴定長等辦理至署理巡撫何必定須永貴惟屯田最爲𦂳要永貴宜加意奮勉舒赫德已降㫖革職無庸承辦巴祿亦不必前往來年再領隊進勦諭副都統巴圖濟爾噶爾等改道解送馬匹上諭軍機大臣曰哈寜阿奏額林哈畢爾噶一路氣寒雪盛全無水草若軍營馬匹由此行走恐致損臕惟自吐魯番至烏魯木齊雪薄而水草亦好兩路逺近相等已行文巴里坤大臣及解送馬匹官員等語所見甚是可傳諭巴圖濟爾噶爾等解送馬匹須由吐魯番一路經行若已向額林哈畢爾噶一路而前行未逺亦另行取道仍由吐魯番行走併諭巴里坤辦事大臣等知之定邊左副將軍成衮扎布疏奏起程來京日期成衮扎布奏言臣欽奉諭㫖辦理北路事務來京請訓謹將定邊將軍印信移交兆惠臣於十二月初四日起程奏入報聞甲申恩免甘省官員彌補軍需仍賞給督撫銀兩上諭大學士曰據黄廷桂奏稱甘省各官承辦軍需有借動公項墊辦銀十萬一千餘兩請撥補一半其半仍令各該員自行彌補等語甘省連年承辦軍需該督悉心籌畫董率屬員該撫吳達善同心協力往來經理俱著勞績在事各員頗能奮勉出力於閭閻毫無擾累深屬可嘉所有墊辦銀兩既係因公費用著加恩免其彌補黄廷桂著賞銀一萬兩吳達善著賞銀五千兩俱於正項錢糧内支給用示優眷賢勞之意丙戌議派撥綠旗兵丁事宜軍機大臣奏言臣等前經遵㫖傳諭黄廷桂於屯田綠旗兵内抽撥三千名再於甘省各營添派五千名給與口糧馬匹令總兵官馬得勝丑達帶領再派總兵官一員同領今該督奏稱從屯田兵撥出一千三百名外添派一千七百名仍於各營選派五千共八千名派馬得勝丑達及總兵五福一同帶領其領隊將弁速行各該提鎮遴選等語俱係遵㫖辦理應如所奏行又據奏減半撥給馬匹每兵各給一馬官兵跟役亦俱減半給與是需馬不過八千數百匹今甘省有未解餘馬二千匹又直𨽻解甘馬五千匹自應即於此内選用仍於各營挑選足額其軍裝器械等項統照進勦之例辦給内盔甲一項不過壯觀無濟實用徒費馱載口外用兵利於便捷應停其帶往查巴里坤有存貯棉甲應按數給與事竣交回再甘省現辦駝二千隻僅供撥運行營口糧之用即塔永寜前後協辦駝五千隻恐一時不能即到該督所奏暫僱車輛毎兵丁餘丁四人合給一車自屬通融籌辦亦應如所奏辦理至各兵口糧實不便多行裹帶今該督既稱於巴里坤裹帶一月口糧又辦羊二萬隻作一月口糧俟駝隻解到再為接濟事屬可行所有應増羊價及沿途草料統於軍需項内核銷再屯田兵丁自應廣為墾種臣等現在遵㫖傳諭該督於備勦兵内酌量抽撥應令遵照辦理奏入上從之平定準噶爾方略正編卷四十七
