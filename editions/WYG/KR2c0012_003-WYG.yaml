body:
  text: 康熙五十四年九月戊戌賞賚右衛官兵上諭兵部曰遣司官一員齎羊袍狐帽各一千六百件馳驛送往右衛將軍費揚古軍前給右衛兵丁之少冬衣者恐有不足並攜銀二千兩於喀爾喀扎薩克處購買酌量賞給庚子以厄魯特貝勒額駙阿寶為席柱等㕘贊議政大臣等奏言厄魯特貝勒額駙阿寶前奉㫖為將軍費揚古散秩大臣祁里徳㕘贊今阿寶等兵既令歸將軍席柱等軍伍應令阿寶為席柱等㕘贊奏入上從之己酉烏梁海歸順和托輝特公博貝疏報所招撫烏梁海悉歸順大學士等奏曰四年前烏梁海頭目和羅爾邁為我哨兵擒獲皇上宥之不殺且重賞遣還以此感恩早欲來歸特以攜持妻子不便恐為厄魯特所追遲遲至今耳頃聞策妄阿喇布坦兵犯哈密即先遣其子胡洛虎納等來輸誠適博貝軍至烏梁海舉部歸順此皆由皇上之恩淪肌浹髓故不發一矢而逺人向化如此上曰前呉三桂遣猓猓數萬到平涼助王輔臣與我軍對敵後來歸順諸大臣皆欲殺之朕謂何以殺為歸順即良民矣悉加恩宥發囘原籍後進四川至保寧賊又欲率伊等與我軍對敵猓猓頭目陸道清云我等雖無知識前䝉聖主不殺之恩豈忍對敵即登山去平賊之後伊等方下山引𨗳我軍極其効力再攻取尼布楚雅克薩城之時俄羅斯數千人諸大臣亦欲盡殺之朕從寛遣囘西洋國聞之皆云攻其城而遣囘其人亘古未有今烏梁海歸順固自然之理也辛酉賞賚厄魯特降人特穆爾伯克黙特等歸旗編伍議政大臣等議覆西安將軍席柱吏部尚書富寧安疏報策妄阿喇布坦屬下特穆爾伯克黙特等首先輸誠應賞賚袍帽等物編置八旗䝉古佐領下為兵給與糧餉産業妻室奏入報可命將軍席柱尚書富寧安駐軍巴里坤西安將軍席柱吏部尚書富寧安疏言臣等於六月二十九日自甘州率兵啟行八月十八日至巴里坤閲視形勢除總兵官路振聲已於烏爾圖等處設立哨探外凡烏圖布拉克庫爾黙圖廋集等處悉增設哨探再巴里坤東西並大谷地勢寛衍水草亦佳已令現到之兵自巴里坤連比立營設置斥堠俟兵悉到時於巴里坤東一百里奎素地方遍置營壘議政大臣等議曰席柱等所奏毋庸另議外查前哈密伯克額敏曾報言策妄阿喇布坦欲於秋時復來哈密現今厄魯特降人特穆爾等亦言策妄阿喇布坦傳令治辦器械預備行糧禁所部不得私騎騸馬有問者但云向哈薩克出兵今大兵已於巴里坤一路阿爾台一路整備正欲策妄阿喇布坦來耳但哨探之地尤屬𦂳要應令將軍席柱等嚴加防範不時巡查奏入上從之十二月丙寅命撤噶斯口官兵分駐肅甘二州吏部尚書富寧安疏言今撤噶斯一路兵囘肅州養馬肅州地狹不足容兵二千且須從他處運草豆甚煩費甘州所在寛敞民房櫛比倉中有舊貯麥豆且於附近買送草束亦便今令西安滿洲兵一千駐劄肅州緑旗兵一千駐劄甘州各令嚴謹約束勿致擾民議政大臣等議覆應如所請奏入上從之尋復諭尚書富寧安將軍席柱等曰朕意撤囘噶斯口駐劄之兵倘策妄阿喇布坦聞知發兵從噶斯路來襲我兵之後亦未可定仍令新滿洲侍衛及厄魯特侍衛等前往偵探富寧安覆奏言貝子阿喇卜珠爾及諾顏綽爾濟等所居色爾騰等處達顏台吉屬下之台吉等所居柴達木等處並通噶斯口之察罕齊老圖地方請令新滿洲二等侍衛俄木巴里厄魯特一等侍衛達克巴臧布等駐劄色爾騰柴達木所在形勝處偵探奏入報聞壬午命䕶軍統領晏布率兵駐西寧侍衛阿齊圖疏言據青海貝勒塞卜騰扎爾來言貝勒察罕丹津等以去年瑚畢勒罕事貝勒阿喇卜坦鄂木布盆蘇克汪扎爾塞卜騰扎爾台吉達顏蘇爾扎等遵㫖不與同心今察罕丹津等將與羅卜藏丹津等盟誓先攻取五家然後送瑚畢勒罕往西地議政大臣等議覆曰去年里塘新出瑚畢勒罕以來皇上睿鑒洞徹若留此瑚畢勒罕在彼則青海諸台吉兄弟必起争端特降勅㫖遣侍衛阿齊圖等往移之今察罕丹津欲送瑚畢勒罕往西地恐塞卜騰扎爾等尾擊其後遂謀先攻諸部事未可定應發西安滿洲兵一千命大臣一人率往西寧并令總兵官王以謙預撥標兵三千以待若察罕丹津果肆猖狂即發兵征勦或塞卜騰扎爾等被攻來奔即收入邊内安插再察罕丹津所居去松潘止四五日程應令四川提督康泰松潘總兵官程正李預備兵馬如有送瑚畢勒罕西往消息即從後追勦奏入得㫖如議著䕶軍統領晏布前往甲申命喀爾喀左翼車臣汗衆扎薩克協濟駝隻散秩大臣祁里徳疏言明年所運軍糧若用直隸山西山東河南購買馬騾輓運道逺勞苦請令喀爾喀左翼車臣汗衆扎薩克協濟駝隻輓運為便議政大臣等議覆曰應如所請令車臣汗等旗分協濟駝六千隻於青草未出時度量自瑚坦和碩至扎卜堪中途有水草處屯劄預備現今尚書殷特布所買駝四千益令增買二千凡駝六千隻兩次可運米二萬石令自瑚坦和碩運至中途有水草處再以喀爾喀之駝六千隻作兩次運米赴軍其四省所購馬騾應就近撥八千匹於明年草生時送往甘肅交尚書富寧安為兵丁騎載之用奏入報可五十五年春正月辛酉初用車運議政大臣等奏言尚書富寧安疏請用山西陜西小車三千輛每輛用夫三人自嘉峪闗至哈密安設十二臺每臺各分車二百五十輛令其陸續轉運應如所奏可令甘肅巡撫綽竒前往設臺奏入得㫖依議速行尋富寧安又奏巡撫綽竒安設臺站直抵哈密應用駱駝馱載所運米至巴里坤哈密至巴里坤雖近中有科舍圖嶺間之請自巴里坤至科舍圖嶺北口設三臺令駐巴里坤步兵牽駝運送自哈密至科舎圖嶺南口設三臺令駐哈密兵牽駝運送即令現今運米官員及發往効力官員等協同管理議政大臣等議覆如所請奏入上從之二月壬戌簡撤在營官兵先是將軍席柱以兵丁米糧不能接濟具奏尋尚書富寧安奏言現在所運到米麥六千五百餘石已於冬季給散各兵有餘議政大臣等奏曰席柱既以米糧不足行文富寧安速運濟軍乃不俟富寧安囘文遽爾具奏殊屬不合俟軍務完日應將席柱查議至是上諭議政大臣等曰運送糧餉安設臺站牧養馬匹等項俱係領兵將軍職任今米糧不能運至皆由水草不足之故朕昔親統大兵中路出征時沿途必留有水草之處以牧運米牲畜爾等所親知者身為領兵將軍此等事不能深曉領兵直前致沿途水草如火燒赤地後隊兵馬及運米人役牲畜有不致困乏者乎朕曾屢諭衆大臣云領兵將軍甚難凡事不可不周到今嵗停止進兵候種地及一應事務預備完畢審察兩下軍情再行定奪者為此故也且去年駐防哈密二百名兵戰敗策妄阿喇布坦時衆大臣俱欲進兵如果彼時即行進兵路途遙逺米糧焉能接濟現在駐劄食用米糧尚不能接續若彼時即行進勦不知作何景况矣如喀爾喀一路都統穆賽等所統之兵俱係滿洲䝉古熟練之人並無糧餉不足等事將軍席柱等所統之兵尚未熟練所以如此倘運糧不至所闗甚大行令將軍席柱提督師懿徳等酌留足用汛守調遣之兵其庸懦不堪者著會議撤囘後席柱等遵㫖議撤西安滿洲兵二百督標馬兵五百固原將軍標及甘肅提標肅州涼州寧夏各鎮標馬步兵四千三百令所管官率之各囘本營其巴里坤駐劄兵除種地五百人外共留滿洲緑旗兵七千五百奏入得㫖噶斯口撤囘之滿洲兵丁一千名緑旗兵一千名現在肅州養馬俱已肥壯於青草盛時發往巴里坤再派緑旗兵三千名預備之處著行文富寧安令其速為料理乙丑命副都統蘇爾徳管理圖古里克都爾博勒金喀喇烏蘇等處屯田事諭議政大臣等曰巴里坤科卜多烏蘭古木等處種地之事甚屬𦂳要若種地得收則諸事俱易著會議具奏尋議曰開墾田地現今公傅爾丹等率土黙特人一千往烏蘭古木等處耕種所需牛種田器應令都統穆賽等支帑購買發往軍前贖罪人等有願耕種者許其耕種俟收成後以米數奏聞議叙又前者尚書富寧安奏言哈密所屬布魯爾圖古里克接壤之處並巴里坤都爾博勒金喀喇烏蘇及西吉木達里圖布隆吉爾附近之上浦下浦等處俱可耕種應各令人耕種給與口糧牛種再兵丁有願耕種者亦令耕種俟收成後以米數奏聞議叙尚書富寧安現駐劄肅州凡肅州附近之西吉木達里圖布隆吉爾等處可令富寧安酌量耕種圖古里克都爾博勒金喀喇烏蘇等處耕種之事令大臣一人管理奏入得㫖依議著副都統蘇爾徳前往管理是冬蘇爾徳奏言都爾博勒金圖古里克喀喇烏蘇所種地並收穫議政大臣等議令蘇爾徳預備牲畜器械籽種為明年計奏入報可三月辛丑命使再諭策妄阿喇布坦罷將軍席柱以晏布代之路振聲為㕘贊上諭議政大臣等曰差往策妄阿喇布坦處之克什圖保住並哲卜尊丹巴胡土克圖之使楚揚託音及策妄阿喇布坦差至哲卜尊丹巴胡土克圖處之使人潘提忠内等來京朕詢問策妄阿喇布坦情形皆已悉知策妄阿喇布坦乃巨猾奸詭之人甚屬無耻以朕之使臣非係使臣㫖意非係諭㫖是部文等語今爾諸大臣等向克什圖保住等詳詢策妄阿喇布坦情形將克什圖保住及楚揚託音潘提忠内等一同遣往其作何遣往之處爾等會同副都統以上並九卿大臣各陳所見詳議再傳諭漢大臣等從前但以兵糧牲畜路逺難到為念今祁里徳處糧米現剰有二千餘石而西路之米亦皆陸續運到兩處之米委屬充裕無庸計慮朕從前中路出兵時曾於沿途按站留米令煮粥以養贍營中困乏之步行跟役并貿易人等大有禆益今兩路進兵之站亦應照此行將軍席柱胸中毫無主見一應軍務糧餉俱將軍之責伊云我但統領兵丁運米之事與我無涉糧到我即行等語可見席柱無將軍之才此處亦著確議再總兵官路振聲一聞侵犯哈密即領兵往救且聞伊愛養標下兵丁甚屬出力路振聲著授為㕘贊據策妄阿喇布坦奏懇遣使一賢能大員等語克什圖保住出使策妄阿喇布坦處所已經數次今加伊等大銜前去即係大員矣再凡為使臣者果能一體同心於事方克有濟若内有不睦互相掣肘彼此言語矛盾一有差失則無益於事伊等有不合處即當明言為是再派出在京一人偕克什圖保住前去此處亦著會議書諭㫖時令克什圖保住等面看繕冩伊等俱以為宜其再明示諸大臣我兩路兵馬牲畜糧米一應俱已齊備兩處軍中業已種地收穫可期此番使臣到策妄阿喇布坦處得其確實情形即將大兵逐漸進至伊地告以會講遣往並非進勦之兵亦無不可也尋議政大臣等遵㫖議曰策妄阿喇布坦實巨猾奸詭之人今仍遣使前往頒示諭㫖彼若怙惡不悛現今阿爾台巴里坤兩路大兵已集應於明年草發時進勦克什圖保住及同往之原任郎中奔璽應加品級候㫖酌定再策妄阿喇布坦行文與哲卜尊丹巴胡土克圖應令哲卜尊丹巴胡土克圖給與囘文仍令楚揚託音攜往現今兩路軍前糧米充裕應行文都統圖思海尚書富寧安等從容輸運前中路出兵時因奉上諭沿途按站留米於步行跟役及貿易人等大有禆益今亦應令每站留米交與驛站官員令其煮粥養贍席柱無將軍之才應遣大臣一人往代總兵官路振聲愛養標下官兵効力行間應授為㕘贊奏入得㫖依議著䕶軍統領晏布前往代將軍席柱是月侍衛滿泰疏劾席柱缺少甲仗倒斃馬匹副都統呉坤年老疲憊議政大臣等議曰席柱應革去將軍調取來京嚴行察議呉坤亦應撤囘更遣總兵官管理奏入得㫖著總兵官張宏印馳驛前往代副都統呉坤餘如議癸丑命土爾扈特貝子阿喇卜珠爾率兵防守噶斯口阿喇卜珠爾奏請軍前効力上諭議政大臣等曰阿喇卜珠爾所居之處與噶斯口甚近伊既奏請往軍前効力著帯領伊屬下兵丁五百名於青草發時前往噶斯口防守設有策妄阿喇布坦往來之人令其擒送并行令青海台吉達顏貝勒盆蘇克汪扎爾亦派兵百名協同防守戊午命貴州巡撫劉䕃樞赴軍前劉䕃樞題請緩圖北征上命九卿等集議至是議覆曰劉䕃樞本不知兵且逺在天末未悉邊界情形妄行陳請應交與該部議處奏入得㫖策妄阿喇布坦無知蠢動侵擾我哈密應發大兵即行殄滅但朕好生為念不忍驟加勦除因備兵邊地遣使宣諭俟其悔罪自新為中外生靈計其萬全措置之際必籌其前後慮及久逺防㣲杜漸始合機宜自策妄阿喇布坦侵擾哈密以來朕從容與大小臣工公同商酌辦理軍務並未嘗有逞一已之怒形諸聲色及統兵親勦之處劉䕃樞聽信訛傳邸抄妄行具奏以為分清邊界便可畢事如策妄阿喇布坦乘間竊發邊民能保不受害乎劉䕃樞尚未衰邁著乘驛前赴軍前盡心周閲矢公詳議具奏閏三月壬戌罷鑾儀使董大成先是大成疏言臣至噶斯口巡視絶無來往人迹噶斯地勢三面雪山中有一線水草並蘆葦其大路在得卜特爾西南走藏東南走青海西寧大通河半月即到永固城西北走柴達木吐魯番等處乃策妄阿喇布坦出入咽喉要路又據營總呉通保等各報兵糧兩月已完運米官又不能悉運至彼是以臣於九月十一日移駐得卜特爾奏入得㫖董大成已有㫖著囘肅州到後著勒限馳驛來京其官兵交尚書富寧安統轄至是兵部題稱前阿南達奏言自邊界至噶斯口一千七百里今鑾儀使董大成奏言自嘉峪闗至噶斯口三千餘里董大成誤信協領呉通保𨗳引不由阿南達所由之路繞道紆行以致兵丁勞苦馬匹損傷請罷董大成鑾儀使奏入上從之癸亥命湖廣總督額倫特署理西安將軍事務并協同川陜總督辦理軍餉己卯命使諭青海二翼台吉侍衛阿齊圖疏言青海台吉等初言送瑚畢勒罕往紅山寺繼又請送往宗喀巴寺始終推諉不令起程自奉㫖令䕶軍統領晏布統兵駐劄西寧四川提督康泰松潘總兵官程正李等整兵預備復屢諭青海台吉等若等始懼於三月十五日送瑚畢勒罕至宗喀巴寺但青海二翼台吉今雖和睦恐不能久請令羅卜藏丹津察罕丹津達顏管理右翼事務額爾徳尼額爾克托克托鼐阿喇卜坦鄂木布管理左翼事務再遣大臣同郎中長受主事巴特瑪至青海會盟令其永逺和睦議政大臣議覆如所請得㫖依議著公策旺諾爾布侍衛布達理前往翼日又諭議政大臣等曰前令西寧駐劄之晏布往噶斯口防守今派晏布令代將軍席柱可將西寧駐劄之西安滿洲兵選五百名令侍衛阿齊圖䕶軍㕘領欽第由統往噶斯口形勝之地防守現在瑚畢勒罕之事俱已就緒其四川松潘等處預備兵丁著撤囘庚辰尚書富寧安奏撥巴里坤緑旗預備官兵富寧安疏言巴里坤官兵庸懦不堪者已撤囘五千人遵㫖噶斯口撤囘之滿洲緑旗兵二千已於四月内發往巴里坤外其預備緑旗兵三千請撥西寧鎮標馬兵一千火器營步兵五百涼州鎮標馬兵七百火器營步兵三百甘肅提標馬兵三百火器營步兵二百令副將等官預備調遣其應給馬請以甘肅等處營馬給之議政大臣等議覆如所請得㫖西寧地方闗係甚要現將西寧之兵派出五百名同阿齊圖前往則西寧兵丁不必再派著仍於固原寧夏兵丁内選擇派出餘如議夏四月戊戌命兩路軍前各嚴防範上諭議政大臣等曰兩路兵駐劄已久軍中哨探之事甚屬𦂳要倘有疎忽致策妄阿喇布坦之人在邊境私自徃來則大有闗係其嚴加防範之處著速議具奏尋議曰各防守處選幹練官校不時巡查若策妄阿喇布坦之人有歸順前來者作速解送來京其私往來者即行拘執奏入上從之五月丁卯賞賚巴里坤留駐官兵四川陜西總督鄂海疏言巴里坤留駐官兵營帳衣帽等物多已敝壊請於西安布政司所貯軍需庫銀借三月兵餉製辦每月於給賞時扣償兵部議覆應如所請得㫖著動正項錢糧製造速行運給不必扣除抵還六月壬子設倉於布隆吉爾尚書富寧安疏言布隆吉爾等處所種田禾俱可豐收應造倉厫及收貯農器房屋請遣官預為修理議政大臣等議如所請奏入上從之秋七月辛未命侍衛阿齊圖駐兵察罕烏蘇阿齊圖疏言臣於六月初六日到察罕烏蘇地方據台吉達賴等言察罕烏蘇地勢寛闊水草亦佳宜於駐兵策妄阿喇布坦使人到青海路必由此若往西藏必由察罕托輝此兩路設兵防守則噶斯口以内不能飛越矣再自噶斯口過達卜遜戈壁有地名噶順可進塞爾騰地方此處亦當設兵臣遣人往視噶斯口果無可以駐兵之處今將分兵為四營駐劄察罕烏蘇令䕶軍㕘領欽第由等領兵駐劄噶順奏入報聞丁亥募民屯田於嘉峪闗外尚書富寧安疏言臣遵㫖於達里圖等處耕種田苗茂盛豐收可期但軍需莫要於糧米臣復細訪自嘉峪闗至達里圖可耕之地尚多肅州之北口外金塔寺地方亦可耕種請於八月間臣親往遍行踏勘會同巡撫綽竒募民耕種外再令甘肅陜西文武大臣及地方官捐輸耕種無論官民有願以已力耕種者亦令前往耕種俟收穫之後人民漸集請設立衛所於邊疆大有禆益得㫖著議政大臣九卿詹事科道會議具奏尋議曰令富寧安會同督撫等同往踏勘詳議具奏奏入上諭議政大臣等曰踏勘墾種地方及設立衛所之事令富寧安會同督撫踏勘之議不合富寧安係駐劄肅州管理軍務之人不宜派往著巡撫綽竒將可以墾種地方前往勘明會同富寧安確議具奏尋富寧安疏報巡撫綽竒勘閲肅州迤北可以開墾之處甚多度量河水所溉田金塔寺可種三百石自嘉峪闗至西吉木可種一百三十石達里圖可種一千一百餘石方城子等處可種五百餘石臣查今嵗西吉木達里圖布隆吉爾三處耕種共收糧一萬四千餘石明年諸處請動正帑遣官募民耕種議政大臣等議如所請從之八月壬辰撥解軍前馬匹先是上諭議政大臣等曰富寧安處需用馬匹可將八旗添設之馬及直隸山東山西河南喂養之馬酌量撥給著議奏至是議曰四省之馬前後已撥一萬四千八百匹送尚書富寧安處至八旗添設之馬應停其撥送奏入上從之九月辛巳命撥盛京吉林等處兵赴軍上諭議政大臣等曰盛京吉林二處著揀選兵丁一千名於伊等弟兄親戚内擇可用之人每一名派與跟役二名於三月十八日前來京給與馬匹器械前赴祁里徳軍前再延綏總兵官李耀曽奏請軍前効力著伊帯領所屬兵丁五百名於青草發時亦前赴祁里徳軍前冬十月癸巳蠲免山陜沿邊衛所額徵銀米上諭戸部曰朕統一寰宇無分中外皆欲久安長治共樂昇平宵旰孜孜五十餘年未嘗頃刻去懐也策妄阿喇布坦前曾頻行請安遣使來往近忽狂悖侵擾哈密哈密已經編置佐領即與内地無異若不遣發師旅置之不問斷乎不可故特徵兵備邊一切飛芻輓粟悉支正項毫無累及閭閻然而行軍置驛及諸凡輓運皆由邊境今嵗山陜二省雖年嵗豐收喜登大有但邊民効力轉輸在所宜恤兹特大沛恩膏將山西屬前衛右衛大同懐仁馬邑朔州保徳等州縣衛陜西屬府谷神木安塞綏徳米脂安定呉堡保安榆林保寧常樂雙山魚河歸徳嚮水波羅懐逺威武清平山丹髙臺古浪莊浪西寧肅鎮寧夏左屯中屯平羅中衛靈寧平涼固原鎮戎西安慶陽阜城甜水河州蘭州洮州等州縣衛所堡康熙五十六年額徵銀八萬六千一百兩零糧米豆穀三十一萬七千七百二十五石零草二百七十六萬五千九百束零通行蠲免并將從前積年逋欠亦悉與蠲除諭㫖到日該督撫即徧行張示使遐陬僻壤莫不周知仍嚴飭所司實心奉行以副朕加厚邊民至意其或陽奉隂違澤不下究該督撫題㕘從重治罪爾部即遵諭行蠲免山陜緑旗官兵借帑上諭兵部曰國家綏靖邊圉剪除賊㓂必須士馬飽騰方克立奏膚功恤兵之道宜亟講也朕御極五十餘年無時不以愛養士卒為念内而八旗禁旅外而各省緑旗兵丁視同一體或代還私債或遣官犒賞或嚴禁尅減所以體恤之者惟恐不至近策妄阿喇布坦狂逞跳梁侵我哈密故特徵兵預備既以轉輸糗糧又復頒給馬駝籌畫倍周加惠尤渥而山陜緑旗兵丁首奉調遣逺途跋涉資用維艱因而預借公帑朕念從軍兵丁披堅執鋭戮力戎行又責以還帑深可憫惻其緑旗兵丁所借帑金四萬八千八百餘兩咸與蠲除並嚴飭統轄將領實心奉行倘有仍行私扣者該督撫據實指㕘從重治罪以仰副朕軫恤邊兵至意爾部即遵諭行甲辰宥劉䕃樞罪仍囘貴州巡撫任先是䕃樞至軍前疏言臣遵㫖親赴巴里坤軍前閲視滿漢官兵共立二十三營週圍二百餘里軍勢雄壯首尾相應但巴里坤地方居雪山之後聞入冬大雪動深數尺倘道路壅阻糧何以運草皆覆壓馬駝何以牧放臣不勝憂懼謹密奏聞奏入上諭大學士等曰軍機事務闗係重大一言可以鼓勵士氣一言可以退縮人心本朝自太祖髙皇帝太宗文皇帝世祖章皇帝迄今百有餘年所向成功事事上應天心以正討逆巡撫劉䕃樞乃讀書之人年已八十非屬無知初以朕為不能忍怒及至軍前無可奏對又稱嗣後雪至三四尺糧何以運駝馬何食於此愈知其無能矣外藩䝉古共有百餘扎薩克人無一分糧餉馬無一束草乾自古及今極寒之地何以各安生業觀其一經雪後驚惶失措忘其身為巡撫管轄文武之責如敵稍強必至效曹申吉羅森方光琛輩所為也朕三統大兵曾當嚴寒盛暑久行沙漠不毛乏水之地於軍機事務以至調養駝馬無不熟悉然後知古人論兵不得其道多無成功每至敗事深為太息朕中路統兵至商都博洛和屯於三月十六等日遇雨雪風霰自京師運米出口馬匹肥者倒斃反多兵丁馬匹不甚傷損䝉古馬匹如常於此愈知古人乘春以圖䝉古之失策也朕近訓兵校獵至烏里雅蘇台八月十六日嶺巔雪深尺許至行營中惟深七寸駐蹕二日雪已全消此去京師七百里即如此矣設劉䕃樞見黒龍江東海北海等處氷結八尺之處必至奏請毁城郭棄地方盡行移徙矣古人云雪盈尺表瑞過尺成災劉䕃樞今奏稱巴里坤地方雪深三四尺或係伊親見或係何人告伊之處並未聲明仍著劉䕃樞前去雪深三四尺果屬親見著據實奏聞倘聽信他人妄誕恐嚇之語亦著據實奏聞䕃樞疏覆言臣妄奏軍前雪深奉㫖令臣親往閲視但臣年老患病不能親往謹在甘州候㫖奏入得㫖劉䕃樞前奉㫖親赴軍前並未周閲營壘即稱患病不候諭㫖囘至甘州且云入冬後雪深數尺恐懼奏陳今令伊親閲彼處積雪情形具實陳奏又不遵㫖往閲仍托病求囘原籍若伊意欲乞休久當奏請乃未奉㫖之前顧戀官職不請休致及至軍前稍經寒雪即舉動失措違㫖退縮奏請囘籍理應從重治罪但伊年老居官以來操守尚清覽伊奏摺情辭甚屬可憫諭㫖到時著即囘貴州辦事從寛免其議處丁未命䕶理西安將軍總督額倫特及尚書富寧安等各率兵分備要地侍衛阿齊圖疏報策妄阿喇布坦賊徒潛來馬厰偷盜馬匹官兵擊敗賊徒遁去臣隨遣官兵會同駐劄噶順汎界之䕶軍㕘領欽第由追緝踪跡始知賊由山後過沙拉於欲來盜馬之時先執青海台吉羅卜藏丹濟卜而去奏入上諭議政大臣等曰策妄阿喇布坦賊性狡詐知我兵在巴里坤阿爾台等處防守嚴密若探聽噶斯口兵勢單弱由噶斯口來犯侵擾青海亦未可定不可不預為防備朕意派西安滿洲兵及督標兵二千名著䕶理西安將軍印務總督額倫特帶往西寧預備如䇿妄阿喇布坦由噶斯口來犯著西寧預備之兵與青海左翼台吉等㑹合提督康泰帶領四川之兵與右翼台吉等㑹合兩路協守策妄阿喇布坦斷不敢來犯倘自嘉峪闗外及布隆吉爾等處以彼微弱之卒驚我大兵之後亦未可定著行文富寧安令選兵一千名預為防備朕意以為䇿妄阿喇布坦知祁里徳之兵今值冬季雨雪之時決不前進或由公博貝之後以微弱之卒潛來驚擾亦未可定著行文曉諭爾等速議具奏尋議曰欽遵上諭各行預備外應行令西寧總兵官王以謙撥派西寧綠旗兵二千名預備王以謙非諳練軍務之人應令固原提督潘育龍將伊標下副將㕘將等官員内有熟練軍旅者派出數員遣往西寧聴尚書富寧安侍衛阿齊圖調遣至主事巴特瑪熟練青海之事令與提督康泰一同協理事務再西寧駐劄之郎中長受亦熟練青海之事令與總督額倫特會同商議不時偵探倘有調遣之處將貝勒盆蘇克汪扎爾等兵酌量調遣䕶軍㕘領欽第由已經進追賊徒若請接續之兵令阿齊圖等即調遣西寧預備之兵前進奏入上從之尋富寧安疏言遵㫖撥甘州提標及涼州肅州鎮標馬步兵共一千名令㕘將等官率往布隆吉爾防守並令沿途居佳之貝勒貝子台吉等遣人不時偵探奏入報聞庚戌命侍衛尤吉爾達等馳驛赴軍前上諭議政大臣等曰一等侍衛尤吉爾達狄納二等侍衛佛替藍翎發喀拉哈爾哈代著往富寧安處聽用二等侍衛諾里爾達色爾圖都墨策徳爾格爾格色立三等侍衛額爾必赫西喇扣尼布齊爾罕藍翎南代查倫插著往阿齊圖處聽用俱令馳驛前往乙卯命散秩大臣阿喇衲赴軍前在㕘贊行走上諭議政大臣等曰散秩大臣阿喇衲著前往西路於八旗察哈爾兵丁内揀選人材壯健並從前隨過阿南達出兵舊人共四百名帯往巴里坤軍前著阿喇衲在㕘贊行走此次派出察哈爾官兵亦照從前䝉古官兵之例給賞十二月丁亥揀選八旗漢軍道府以下官往軍前吏部議覆尚書富寧安疏言兵餉錢糧事務甚繁現在官員不足辦理請揀賢能官員前來肅州以便調用應將陜西鄰近之河南山西湖北等處各揀選五員發往奏入得㫖將八旗漢軍丁憂候補道員以下知縣以上官員九卿揀選三十員發往富寧安處遇缺題請補授丙午命侍衛郎泰等傳諭尚書富寧安先是上諭議政大臣等曰朕綜理軍務年久經厯甚多且曾親統大兵安定邊塞衆議欲於明嵗進兵又慮路逺糧米難運其見不可謂非但大兵進勦策妄阿喇布坦勢不能當必致逃避明年著暫停進兵加意耕種將糧餉馬匹預備整齊後年再行進兵其盛京寧古塔兵丁照舊發往京城之兵著暫停止策妄阿喇布坦詞雖卑遜竟遣人盜我噶斯口兵丁之馬我兵豈可坐守著將空圭扎卜堪兵内揀選精騎由阿爾臺作三四路襲擊巴里坤兵内揀選精騎作兩路襲擊此襲擊之兵遇可擊之處即行襲擊可取則取應退則退相機而行襲擊後仍囘駐兵處策妄阿喇布坦地方必然震動其餘黨或有變端以致逃亡亦未可定我兵如此一舉其道路地勢皆可悉知將此詢滿漢大臣若仍欲明嵗進勦爾等將原議具奏尋議曰明年應暫停進勦令空圭扎卜堪之兵移近汛界駐劄加意耕種然我兵與其坐守不如兩路派兵襲擊至所派兵丁數目由何路襲擊及派領兵官員應令軍中大臣酌議奏聞奏入上從之至是上諭侍衛郎泰等曰爾等往諭尚書富寧安明嵗暫停進兵之故朕親加籌度復命議政大臣等詳議已降㫖於兩路出征大臣矣遣兵襲擊之處爾等與富寧安彼處大臣及公傅爾丹并厄魯特喀爾喀王貝勒貝子公等會同詳議具奏至厄魯特等甚屬狡詐指稱投誠或潛來侵犯亦未可定此處應加意防範如果實心率衆來投將彼為首之人解送來京其餘令在克爾倫河地方遊牧交與左翼喀爾喀扎薩克等酌量安插所遣襲擊兵丁將擒獲賊犯釋放一二人吿彼云汝輩盜竊中國馬匹所以邊上駐劄之兵並未候㫖即行追勦前進今朝廷深憫汝輩降㫖不許肆行殺戮因此各囘汛界再傳諭公博貝此處正伊効力之所著益加勤慎厄魯特喀爾喀公内亦有身材壯健者著將和托輝特等處兵派出一同前往襲擊如此則策妄阿喇布坦情形自然顯露矣然軍機事務臨期酌量難以預揣惟在領兵大臣善為籌度耳爾等會同定議後速行奏聞命散秩大臣阿喇衲與郎泰等傳諭祁里徳先是祁里徳疏言巴里坤之兵若前進必易得吐魯番乘勢即可攻取朱爾都斯地方相應選兵一萬六千分為兩路一由布拉罕河一由額林哈畢爾噶前進兵丁食用駐劄與行走無異必於明年進兵始為有益及是上并諭議政大臣等曰祁里徳奏請明年必宜進兵意見亦是在祁里徳必有確見之處或一應糧餉馬匹俱已齊備有易於成功之機會亦未可定著阿喇衲與郎泰保住同往祁里徳處會同衆喀爾喀王貝勒貝子公等并軍中大臣一同詳議議定後阿喇衲等再往巴里坤軍前會同彼處大臣詳議倘明年進兵之處稍有遲疑即照朕從前諭㫖將襲擊之處詳議具奏乙卯命封羅卜藏丹津等上諭理藩院曰青海已故親王扎什巴圖爾自效順以來一心向化伊子羅卜藏丹津人材亦優著封為親王其台吉達顏係達賴巴圖爾之孫為人誠實感朕深恩實心辦事甚屬勤勞著封為貝勒台吉巴爾珠爾阿喇卜坦拉扎卜阿喇卜坦俱著封為貝子台吉丹津著封為輔國公察罕丹津之壻台吉阿喇卜坦格勒克著封為一等台吉平定準噶爾方略前編巻三
