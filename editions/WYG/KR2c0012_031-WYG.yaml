body:
  text: 雍正十年秋八月庚午巴勒布國雅木布葉楞庫庫木三汗遣使入貢頒敇賞賚有差辦理藏務侍郎僧格等奏言巴勒布國雅木布葉楞庫庫木三汗居西藏極邊萬里之外未嘗與中國通今慕皇帝至德遣使入貢方物辭意誠懇請令來使至京朝見辦理軍機大臣等議曰天寒道逺使臣往返計二年程應令僧格等宣布皇上惠恤逺人之意轉諭來使令其旋歸並加賞賚給與馬匹更換俾得從容啟行奏入上從之敇諭巴勒布國雅木布葉楞庫庫木三汗曰據爾等奏稱從前不知内地禮儀未遂觀光之志今遣使朝覲恭請訓諭進貢之物不多略盡恭敬之忱等語朕為天下主一視同仁爾等汗越在邊逺自古未通華夏慕朕仁化萬里輸誠朕甚嘉恱所進方物悉已收納第念道路遥逺往返艱難爾使臣即由西藏遣回爾等汗但與西藏貝勒頗羅鼐協力和衷維持黄教以副朕普育羣生之至意特賜緞疋玻璃磁器各種一併發往癸酉北路副將軍王丹津多爾濟額駙策凌等大敗賊人於額爾得尼招上命大學士鄂爾泰等於西路阿濟一帶發兵截之丹津多爾濟策凌奏言臣等奉大將軍王錫保派調令率滿洲䝉古索倫喀爾喀等兵二萬追擊準噶爾逆賊八月初五日臣等至額爾得尼招見賊兵與賊戰十餘遇賊且戰且却日暮抵大山梁一面偪水戰益酣殺賊萬餘尸滿山谷河流盡赤餘賊悉負傷大奔所獲器械駝馬牛羊無算現在賊沿鄂爾昆上游向推河而逃臣等身率大兵即日自額爾得尼招發尋賊敗蹤跡窮追進𠞰奏入上諭辦理軍機大臣等曰據王丹津多爾濟等報稱八月初五日在額爾得尼招地方我兵與賊人交戰賊衆大敗由鄂爾昆之上游向推河逃遁而去等語可將原摺録寄大學士鄂爾泰署大將軍查郎阿知之賊人既由西爾哈淖爾投阿爾台而去若遇雪阻截必向阿濟一帶潛行向巴里坤以覔生路大學士鄂爾泰等速將北路得勝情由寄知巴里坤軍營令其於阿濟要隘之處派兵堵截毋得疎忽再者木壘大兵撤回之時賊人或於中途窺伺或潛襲我軍之後務須加意防範至於巴里坤乃根本之地亦須計算萬全俱著大學士鄂爾泰等就近妥協籌畫參贊内大臣侯馬蘭泰奏報敗賊於西爾哈招馬蘭泰奏言八月初九日賊兵二千來犯西爾哈招臣親選兵一千與副都統費雅思哈土黙特總管珠瑚岱喀爾喀協理台吉遜都卜率之出城迎擊賊兵大敗斬賊百餘所獲器械無算次日追至那壘郭勒賊乘夜遁走即檄知綏逺將軍馬爾賽並報大將軍順承親王訖奏入報聞乙亥命革副將軍劉世明職効力贖罪上諭辦理軍機大臣等曰劉世明由侍衛之職朕加恩用至總兵提督伊在提鎮任内居官尚好是以用為福建巡撫陞授總督上年西路領兵需人朕念伊熟悉邊地情形特召來京命為副將軍授以巴里坤領兵之重任料伊受朕深恩必思黽勉宣力為將弁之表率豈知伊茍且瞻顧退縮不前全無奮勵振興之氣既忝職任重負國恩著革職交與署大將軍查郎阿照總兵或副將之例於領兵艱苦之處令其効力贖罪倘再有錯誤疎忽即行參奏在軍前正法戊寅靖邊大將軍順承親王錫保奏發兵追擊賊人錫保奏言副將軍王丹津多爾濟額駙策凌等追賊至額爾得尼招奮勇殺賊萬餘除檄綏逺將軍馬爾賽建勲將軍達爾濟各率兵截殺外臣選兵三千令扎薩克台吉根丕勒前鋒參領達度等率師合擊即日啟行奏入報聞九月乙酉朔命加恩議叙額爾得尼招破賊功上諭辦理軍機大臣等曰此次準噶爾逆賊志欲搶奪哲卜尊丹巴胡土克圖侵掠喀爾喀部落直越察罕廋爾大營由杭愛山肆行猖獗王丹津多爾濟額駙策凌參贊大臣塔爾岱及諸王大臣台吉等共領滿洲䝉古喀爾喀等兵二萬奮勇尾追千里到鄂爾昆河額爾得尼招地方諸王大臣及台吉官兵等同心協力為國輸誠奮勇攻擊將三萬逆賊斬殺大半餘賊䘮膽奔逃甚屬可嘉此次軍功非尋常勞績可比官員兵丁著從優議敘其隨從額駙策凌在克爾森齊老地方擊賊官兵著加倍議敘領兵効力之王貝勒貝子公扎薩克台吉等應賞巴圖魯名號陞授職銜今於議敘軍功之先特沛恩綸喀爾喀和碩親王丹津多爾濟著賞給智勇名號喀爾喀和碩親王額駙策凌著賞給超勇名號喀爾喀多羅貝勒策卜登從前在阿爾台軍前著有勞績去年在蘇克阿勒達呼地方攻擊準噶爾又懋著勤勞朕已賞給信勇名號此次在額爾得尼招大敗準噶爾賊衆又復追擊効力前驅策􅁲登著封為多羅郡王扎賴特固山貝子特古斯從前在阿爾台軍前曽効力行走此次在克爾森齊老擊賊甚力在額爾得尼招又復大敗賊衆建立功勲特古斯著封為多羅貝勒敖漢輔國公羅卜藏隨從額駙策凌在克爾森齊老擊賊又在額爾得尼招大敗賊衆又與貝勒策卜登塔爾岱等追擊賊衆効力前驅羅卜藏著封為固山貝子喀爾喀扎薩克一等台吉巴海從前在阿爾台軍前曽効力行走去年亦著有勞績此次在額爾得尼招大殺賊衆建立功勲喀爾喀扎薩克一等台吉根丕勒去年懋著勞績此次在克爾森齊老額駙策凌隊内力戰得傷回至察罕廋爾軍營調治痊好復行前往追擊賊人巴海根丕勒俱著封為輔國公塔爾岱著授為黑龍江將軍統領軍營東三省兵丁淖爾海著授為内大臣署理黑龍江將軍事務其餘扎薩克喀爾喀王貝勒貝子公台吉内若有似此勞績出衆之人而遺漏者著大將軍順承親王王丹津多爾濟額駙策凌查明具奏命革馬爾賽職以欽拜暫署綏逺將軍上諭辦理軍機大臣等曰朕念馬爾賽之祖圖海功績令其配享聖祖皇考於太廟馬爾賽所襲之三等公爵加為一等擢用為大學士復賞輕車都尉令伊子承襲施恩稠疊衆所共知朕以為馬爾賽必感戴殊恩實心為國効力因授為大將軍遣往軍前乃伊未至歸化城先將馬匹牲畜傷損數千在口外第八臺處聞科卜多地方準噶爾賊衆消息便自怯懦奏請往歸化城又將馬匹牲畜不擇好水草之處牧放折損大半且不禁約兵丁縱其貪饕飲食肆意糜費以致變賣衣服如此乖謬妄為之罪朕猶寛恕與以効力贖罪之途授為將軍令往扎克拜達里克而馬爾賽沿途又不調養駝隻倒斃數千然朕猶優容之望其効力也頃準噶爾賊衆來犯察罕廋爾之大營直越杭愛搶奪喀爾喀等部落王丹津多爾濟策凌參贊塔爾岱等率領大兵尾追至鄂爾昆之額爾得尼招地方大敗賊衆殱其大半賊抛棄馬畜及一切器械膽裂奔敗大將軍順承親王已劄令馬爾賽㑹同達爾濟截殺王丹津多爾濟等亦以賊衆大敗投往推河行文於馬爾賽且馬爾賽接閱順承親王等劄後奏稱賊若來推河必緣伊克鄂拉而遁今已將伊克鄂拉左近之草焚燒等語如此則馬爾賽自應如前所奏率兵前往推河預備截殺乃賊衆既至推河而馬爾賽猶逗留扎克拜達里克至十三日始出城為追趕之狀行二三日聞有賊兵將往伯格爾之語即藉端而回夫以徒手敗走之賊不行追逐知而放去又不奏明達爾濟領兵往追情由朕以馬爾賽必有怯懦逗留明知故誤等情曽降諭㫖於大臣等今據參贊胡琳參稱一聞賊來推河信息將軍達爾濟等即整齊二標兵丁前往截殺賊衆而馬爾賽並不發兵傅鼐請兵殺賊至於跪求伊亦決不允許至十三日因臣等標下兵起程馬爾賽不得已同行至半路而回等語馬爾賽擁兵萬餘有心躭誤國事豈但大負朕之深恩自古以來如此背負國家者史策中亦為罕覯國法軍法俱難寛宥著將馬爾賽之綏逺將軍領侍衛内大臣公以及賞給輕車都尉俱行革退其將軍印務著欽拜暫行署理領侍衛内大臣員缺著侯馬蘭泰補授其公爵係伊祖圖海立功所得著馬禮善承襲今已行文令馬爾賽明白具奏俟回奏時將馬爾賽正法之處另降諭㫖命授軍營參贊正紅旗䝉古副都統胡琳為鑲藍旗䕶軍統領給喀爾喀王敏珠爾多爾濟旗分協理台吉遜都卜扎薩克一等台吉職銜賞銀五百兩給副都統費雅思哈䕶軍統領職銜命賞給額駙策凌等屬人被掠者上諭辦理軍機大臣等曰此次準噶爾賊人前來時額駙策凌屬下及喀爾喀扎薩克袞布策凌游牧等處俱被擄掠著順承親王查明照舊嵗賞給被搶喀爾喀產業之例一面辦理一面奏聞命治喀爾喀汗王以下臨戰退縮者罪上諭辦理軍機大臣等曰喀爾喀扎薩克圖汗策旺扎卜親王喇嘛扎卜公扎薩克等畏懼退縮俱由陣前逃回游牧目今行兵之際軍法豈可姑容著行文順承親王王丹津多爾濟額駙策凌將陣前逃回之汗王以下台吉暨領兵之副都統等查明嚴加治罪命曉諭西路軍營將弁兵丁等上諭曰噶爾丹策零父子兇頑世濟其惡戕害臣服我朝之䝉古部落窺伺我邊疆國家不得已用兵之苦心已屢經曉諭官弁兵丁等知之矣夫三軍司命在於將帥朕慎重其選以岳鍾琪乃將門之子久歴行間從前用兵青海曽有勞績且於西陲情形素為熟練伊亦自信克當此任是以命為西路大將軍一切徵兵運餉選將設官之事凡有所請無不允行實冀其殫心竭力奏績邊疆為一勞永逸之計豈料伊秉性粗疎辦事濶略平居志大言大似有成算及至臨時則張皇失措意見遊移且賞罰不公號令不一不恤士卒不納善言自奉太豐待下鮮惠今畧舉其失機一二事言之前年冬月陛見入都軍營之事全無料理以致賊人盜竊駝馬傷我弁兵嗣後朕時時降㫖諭令慎密周防乃今年正月賊人越過大營直至哈密及塔勒納沁等處搶掠牲畜戕害回民伊將令不行調度無術竟令已入網羅之寇賊由坦道遁逸而去又如木壘駐兵之舉實由岳鍾琪之奏請且稱願以全家性命保其萬全乃我兵移駐之始即任賊人潛過木壘河東搶擄馬匹傷害官兵現今運道牧厰時受侵擾此皆岳鍾琪失算誤國之昭著者其他顛倒昏憒疎忽錯謬之處不可枚舉以統兵之人居心行事如此無怪乎三軍之士離心解體兵氣為之不振也朕思用兵之事闗係重大似此一籌莫展屢失機宜則軍務何日能竣我三軍之士何時得以休息用是特降諭㫖將岳鍾琪調回京師以吏部尚書陜西總督查郎阿署理大將軍事務命大學士鄂爾泰親至肅州頒賜敇書指授方畧查郎阿素性忠良赤心為國虚懷謙受能體下情自辦理軍需以來事事妥協邊疆情形皆所深知一到軍營與副將軍張廣泗常賚等合志同心和衷共濟必能運籌決勝靖寇安邊是在爾將弁兵丁等鼓舞奮興急公努力盡洗從前委靡怠惰之習合千萬之人為一心則忠誠感格和氣致祥必邀上天之黙佑迅速成功膺國家優隆之爵賞是此日之更換將帥酌改規模實爾西路軍營通塞否泰轉移之機也今年七八月間賊兵以三萬人侵犯北路深入額爾得尼招地方意欲迎擊喇嘛擄掠喀爾喀䝉古我師奮勇前追殺死賊兵萬人積屍如山河水盡赤賊夷乗夜逃奔抛遺馬匹牛羊器械不計其數而我兵受傷者不過十餘名領兵之大小將弁未損一員此實行間將士合力同心仰邀天佑之明驗也今賊人既受大創於北路未必不輕視西路重整餘力以向巴里坤冬春防範尤宜嚴密不可疎忽著大將軍等將此曉諭各營將弁兵丁咸使知悉至岳鍾琪屢次失機之罪甚大律以國法不容寛貸又聞軍營弁兵無不含怨著大將軍查郎阿徧行詢問軍營將弁兵丁等岳鍾琪自領兵以來果屬事事乖張人心共怨否抑或尚有可取之處否務使三軍之衆人人各抒已見據實舉出即有互異不妨兩奏以聞癸巳命革博爾屯職以閒散公在軍前効力上諭辦理軍機大臣等曰朕念博爾屯之祖舊日勞績將博爾屯屢加任用伊並不黽勉向前因命往扎克拜達里克馬爾賽軍前効力乃王丹津多爾濟等在額爾得尼招大殱賊衆之後所有疲困奔逃之賊前至扎克拜達里克伊有精兵萬餘並不邀擊懦怯觀望俾其遁去博爾屯如曽勸馬爾賽而不允其罪尚輕如並未經勸過則伊之首領亦難保矣一切情節著據實回奏其參贊大臣内大臣都統俱著革去以閒散公在軍前効力行走乙未訓勵青海王貝勒貝子等上諭青海王貝勒貝子等曰今年七月間準噶爾策零敦多卜帶領三萬賊衆侵擾内地被喀爾喀副將軍王丹津多爾濟等帶領滿洲等兵二萬將賊兵截殺幾盡喀爾喀等既能如此奮勇殺賊爾等何獨不能乎各宜鼓舞振興踴躍効命賊兵前來侵擾青海祇有噶斯一路爾等須在緊要隘口預備㸔守倘有賊兵前來務期協力追殺悉行𠞰除將此曉諭爾等部落知之命以大學士伯鄂爾泰奏摺示達爾濟等大學士伯督巡陜甘經畧軍務鄂爾泰奏言逆賊於八月初五日在北路額爾得尼招為我兵所破自鄂爾昆河源向推河遁按逆賊敗走必經必濟一帶中間有袞塔瑪哈戈壁乃必濟要隘去巴里坤不過三百餘里臣即於八月二十八日檄署寧逺大將軍張廣泗令選滿洲察哈爾精兵二千以前鋒統領阿思海領之佐以副都統達什選綠旗精兵一千以總兵官張存孝領之佐以副將馮廷雄即日赴袞塔瑪哈堵截並令阿思海等一到袞塔瑪哈即遣弁兵哨探必濟一帶如有賊蹤飛報張廣泗率兵追𠞰又令張廣泗備兵數千遣發繼進以壯聲援奏入得㫖鄂爾泰身在肅州一聞信息即遣兵丁截殺賊衆斯可謂為國之大臣達爾濟諾爾琿欽拜等擁兵萬餘駐劄扎克拜達里克遇準噶爾窮寇徒手奔逃並不迎擊待其已過虚作追趕之勢怯懦不堪將此寄與伊等知之丁酉訓勉喀爾喀七旗王貝勒貝子公台吉屬下人等上諭曰去年朕降㫖令爾等移居内地爾等並不感悅遵行朕又屢次催促始勉强遷移此次準噶爾賊兵前來幸王丹津多爾濟等帶領大兵將賊兵殺敗爾等始得脫免否則爾等部落豈能保䕶產業牲畜朕思爾衆喀爾喀本屬一體豈有甘居庸懦受人庇䕶之理嗣後各宜激烈奮發將賊兵悉行𠞰滅不特永享昇平抑且垂光史冊矣勉之庚子䕶寧逺大將軍印務張廣泗奏請撤兵駐巴里坤并籌吐魯畨駐兵運糧事宜張廣泗奏言臣前奏木壘駐兵不便請移兵駐科舎圖今臣與署鎭安將軍卓鼐參贊顧魯暨在營鎮將等密議於八月二十八日自木壘起程三十日抵科舎圖但周閱科舎圖所在路徑叢雜氣候苦寒且現今築城未畢四面草厰悉為賊人所燒亦難久駐臣等不敢固執前議請盡撤大兵至巴里坤於附近要害處設兵駐守按洮賚烏克克嶺二處為賊南走徑路各置兵一千五百廋集察罕哈瑪爾二處為賊人西來大道各置兵一千又鏡兒泉噶順及烏卜圖克勒特克三處並在巴里坤北賊人或由沙磧或由北山來道悉可通應於鏡兒泉置兵二千噶順置兵五百烏􅁲圖克勒特克置兵一千又圖古里克圖爾庫勒二處在巴里坤東北賊人自阿濟必濟越沙磧而來此為孔道應各置兵一千更於一切要隘分設小卡倫撥兵逺哨巡䕶牧厰哈密塔勒納沁二處亦並増兵防守再木壘大兵既撤則吐魯番孤懸一隅駐兵運糧所當籌畫吐魯番駐兵原有八千其現留押運糧糈兵丁五百名並分駐魯克察克喀喇和卓闢展洋赫勒木津塞木津漢墩七處按勒木津塞木津漢墩所在逼近賊人聲勢不相聨絡請悉撤三處官兵併入魯克察克喀喇和卓闢展洋赫四處分駐並三處回民亦令移居魯克察克等城中庶免賊人窺伺之心而我兵亦易於防範矣奏入報聞辛丑黜喀爾喀扎薩克圖汗副將軍策旺扎􅁲爵命以其族弟多羅郡王格勒克雅木丕勒承襲壬寅命賞卹喀爾喀貝勒車木楚克納木扎爾上諭辦理軍機大臣等曰喀爾喀貝勒車木楚克納木扎爾帶伊屬下兵丁前往軍營因途中病足令伊弟與子將兵前往伊自回部猝遇塞卜騰旺布屬下奇爾吉斯等背叛伊率屬下人拒戰身受鎗傷而亡其屬下兵丁奮擊奇爾吉斯等悉行斬殺甚屬可嘉著順承親王查明有已故受傷者議敘恩賞車木楚克納木扎爾受傷身故朕心軫念著派侍衛部屬各一員前往祭奠賞銀一千兩戊申大學士伯經畧鄂爾泰條奏邊地屯田事宜鄂爾泰奏言邊地屯田事宜一總理屯務副都御史孔毓璞請頒給闗防以昭信守一客民首報地畝應分别給與工價每籽種一石上等地給銀二兩中等一兩五錢下等一兩二錢其夫役人等除每月給與工價口糧外每年再加賞銀一兩皮衣皮帽銀二兩至所委監種人員暨跟役每日給銀六錢庶食用有資而驅遣無誤一屯田所需夫役俱在甘涼肅一帶僱募令各地方官出具保結以免逃逸其口内口外沿途往返給與口糧並築一土堡酌量夫役可以容居牛畜等即圏飼於此一屯田所在一切僱募夫役増補農具及給散工價收穫禾稼諸務並令所在有司協同辦理庶免遲延偷竊等弊一各項動用銀兩應令總理屯務大臣奏報在軍需銀内動支另行報銷奏入上從之己酉命革傅爾丹職其振武將軍印信貯軍營上諭辦理軍機大臣等曰據順承親王錫保奏稱傅爾丹在烏遜珠勒地方並不整備官兵預籌堵禦之策輒輕調官兵進擊以致有誤軍機傅爾丹著革去公爵及領侍衛内大臣振武將軍又諭曰北路軍營現有大將軍印信其振武將軍印信著收貯若有調遣之處請㫖派人掌管䕶寧逺大將軍印務張廣泗奏撤兵至巴里坤事宜張廣泗奏言臣等於八月二十八日自木壘撤兵令太原總兵官王緒級等率兵四千五百餘由南路赴洮賚烏克克嶺廋集等處駐劄松潘總兵官張元佐等率兵四千餘由北路赴鏡兒泉噶順察罕哈瑪爾等處駐劄臣與副將軍常賚署鎮安將軍卓鼐等率兵六千餘由中路行過噶順溝即以大兵畀常賚等統轄臣輕騎兼程於初八日已抵巴里坤辦理一切機宜初十日常賚等亦抵巴里坤駐劄其官兵分南北兩路行者悉於初十日前各抵駐劄所在沿途慎重防範並無賊人窺伺奏入報聞庚戌大學士伯經畧鄂爾泰奏請鑿山引水開九家窑屯田鄂爾泰奏言邊地屯田最要按肅州城南九家窑有荒地一區土髙無水不能播種九家窑之北上寨中寨水堡上鹽池等四堡並熟田亦以水源不足兼有漏沙每嵗不過薄收請於上流鑿山開洞引千人壩之水逆流而上以避漏沙則九家窑荒地可墾且餘水下注則上寨等四堡熟地更可倍收於民生軍儲並有裨益奏入上從之癸丑命議築察罕廋爾城上諭辦理軍機大臣等曰察罕廋爾城甚小止可屯積米石是以順承親王又修木城朕意欲照扎克拜達里克城開展濶大著行文順承親王明嵗動支錢糧修築或令彼處兵丁或由京師遣工匠前去著順承親王一併議奏平定準噶爾方略前編卷三十一
