body:
  text: 雍正五年春正月丁巳命内閣學士僧格副都統馬拉往西藏副都統宗室鄂齊奏言臣至西藏審察情形其首領辦事者各不相和往往見於辭色逹賴喇嘛雖聰慧然年少不免私其父索諾木逹爾扎康濟鼐人甚有才但恃其勲績輕視諸噶卜倫衆恨之阿爾布巴中懐隂險所行與康濟鼐殊絶而索諾木逹爾扎以娶隆布鼐二女三人為黨恐其搆逹賴喇嘛與康濟鼐不和必至生事且噶卜倫太多反增繁擾隆布鼐所行妄亂扎爾鼐庸懦無能請予兩人噶卜倫原銜罷其職事以翦阿爾布巴羽翼則其勢孤無作亂之人矣乞降㫖曉諭逹賴喇嘛康濟鼐阿爾布巴等和𠂻共事議政王大臣等議悉如所請請遣大臣一人齎㫖往諭又逹賴喇嘛母舅衮都阿喇木巴既誠心守䕶應給予逹爾漢號賜緞六疋奏入得㫖著内閣學士僧格副都統馬拉差往逹賴喇嘛處各賞銀一千兩二月甲子䘏賚喀爾喀台吉塔布囊等理藩院議奏言喀爾喀台吉塔布囊等前勦烏梁海於和托輝特其陣亡者應加一等世襲如例官兵受傷者各按品級給銀奏入上從之秋七月癸酉西藏噶卜倫扎薩克台吉頗羅鼐等奏報康濟鼐被殺頗羅鼐等奏言康濟鼐與準噶爾搆兵部勒諸事藏人便之乃阿爾布巴隆布鼐扎爾鼐等約前藏頭目於六月十八日共殺康濟鼐臣等收集後藏兵防守駐劄阿爾布巴等復發兵來侵為臣所擊敗今臣率兵進捕阿爾布巴等伏乞皇上速發官兵勦滅逆魁以安西藏奏入報聞八月甲申議叙從征青海土司議叙土司從勦青海等處功雜谷宣撫使同知班第爾吉加宣撫使銜瓦寺安撫使桑朗温愷加宣撫使同知衘莊浪指揮僉事魯華齡三寨指揮僉事丹巴扎什雙岸朗柯四人並加指揮同知衘包坐千戸桑柱等並加指揮僉事衘及各土目土兵等賞賚有差乙酉增設西寧大通鎮等處官兵川陜總督岳鍾琪疏言西寧北川口外大通川白塔川及野馬川之䇿爾圖城垣營房以次告竣應設官兵駐劄臣按肅州鎮屬永固城諸營凉州鎮屬永昌諸營向以近邊設馬六步四或馬步各半今大通鎮營扼險據要肅州口外又設安西重鎮則永固等營並内地應以肅州凉州二鎮所屬永固永昌等十八營馬兵量汰九百六十并寧夏鎮標後營已汰馬兵六百共汰馬兵一千五百六十大通鎮有控制援勦之責應如馬步各半例設馬兵一千步兵一千䇿爾圖遊擊逼近邊境路通青海應設馬兵三百二十步兵四百八十白塔川㕘將與西寧北川營相去五十里距大通鎮不過百里聲氣響應應設馬兵二百四十步兵五百六十議政王大臣等議覆悉如所請奏入得㫖西寜大通等處初設兵丁甚屬𦂳要其應添設㕘將遊擊守備千總等官著岳鍾琪於陜西武官内應題補者題補應調補者具題調補甲辰定俄羅斯疆界郡王額駙䇿凌等奏言臣等與俄羅斯使臣薩瓦等相見議定疆界事宜臣以應定界趾處詳示薩瓦云東邊額爾古納等處昔年内大臣索額圖等與爾使臣費糧多爾等議歸爾國無庸再議今自額爾古納河岸至阿魯哈當蘇阿魯竒都勒齊克太竒蘭並我國斥堠所在應以相對之楚庫河為界自此以西沿布爾古特山以博木沙畢鼐嶺為界定界之後不得雜處及容納逋盜等犯者互相捕治臣即與伯四格侍郎圖理琛等於當立界石處書石給予薩瓦薩瓦及布理雅特烏梁海等並心服據薩瓦云此行幸為使臣瞻仰天顔既優賜我察罕汗復賞賚奉使人等聖恩優渥今既矢公定界永永無渝臣等即遣侍衛瑚畢圖郎中納延泰等與俄羅斯副使一番一番諾費池等指定東西界趾議立界石俟其還時即據界趾山河地名繕寫繪圖恭呈御覽議政王大臣等議覆曰應如䇿凌等所議立石定界曉諭喀爾喀汗王各扎薩克黒龍江將軍等令其約束屬人不得越界生事違者重法治之至於定恰克圖口為貿易所應遣理藩院司官一人管理貿易人數不得過二百如例其京城俄羅斯館應令修整以居使臣其國來京讀書幼童及教習等亦令同居官給養贍願歸國者聽之至領侍衛内大臣克什圖前遣往代隆科多辦事今疆界已定應令來京奏入上從之丁未奪蒼津爵議政王大臣等議奏言翁牛特扎薩克多羅杜楞郡王和碩額駙蒼津奏請令䇿妄阿喇布坦煎茶使者入藏行走悖逆專擅殊甚應盡奪蒼津爵其郡王更請承襲奏入得㫖扎薩克多羅杜楞郡王著貝子鄂齊爾承襲戊申命王大臣等預撥陜西四川滿漢官兵聽調川陜總督岳鍾琪來京面領訓㫖上諭怡親王大學士富寧安張廷玉等曰西安滿洲兵著派二千名令副都統尼瑪善預備管領寧夏滿洲兵派一千名令副都統蘇圖預備管領其緑旗兵陜西省預備五千名四川省預備三千名雲南省預備三千名爾等可行文與岳鍾琪鄂爾泰即遵照派辦管兵之官弁及應用帳房等項一有調發之處候文到即便啟行岳鍾琪現在四川著回到西安將預備兵馬之事料理畢即馳驛來京朕有面降諭㫖之處其川陜總督印務仍著岳鍾琪隨路帶辦不必委人署理九月己未命給康濟鼐屬人移居青海者口糧上諭議政王大臣等曰康濟鼐屬下厄魯特等原係青海之人曾降㫖與逹賴喇嘛令將此等人交副都統馬拉内閣學士僧格移於青海地方居住爾等行文與岳鍾琪將四川布政司庫銀動用一萬兩酌派官兵送往西藏交與馬拉僧格備辦口糧賞移居之厄魯特等庚申命罷陜西等處備調官兵上諭議政王大臣等曰前因逹鼐報稱康濟鼐被擒之信恐䇿妄阿喇布坦有窺伺西藏之意是以降㫖令陜西各路及四川雲南各派兵馬預備以候調遣今康濟鼐被害情由係西藏噶卜倫等彼此不睦自相殘害之小事不須用兵著將各路兵馬停止不必預備命封貝子逹什䇿凌為貝勒理藩院奏言青海貝子噶爾丹戴青諾爾布卒無子其妻請以姪貝子逹什䇿凌兼襲世職按例貝子無兼襲兩職者請無庸議奏入得㫖噶爾丹戴青諾爾布於青海羅卜藏丹津之事著有功績因議叙封為貝子今既病故伊兄弟兩家止有貝子逹什䇿凌一人著從優加恩并兩貝子職晉封為貝勒世襲罔替冬十月癸巳命公博爾屯為將軍查克旦為㕘贊大臣率兵往阿爾台代巴賽等上諭兵部曰明年更換阿爾台駐防兵丁時將軍巴賽員缺著派䕶軍統領公博爾屯前往㕘贊大臣常色禮員缺著派都統查克旦前往其駐防兵丁即令博爾屯查克旦㑹同該旗大臣預將年力精壯漢仗好可以學習成材者揀選派出令其前往己亥命岳鍾琪遣官往藏傳諭駐藏大臣馬拉等上諭議政王大臣等曰阿爾布巴差兵至阿里欲害頗羅鼐被頗羅鼐將伊所發之兵盡行截殺已領兵往招征勦阿爾布巴此舉若能成事於西藏有益但今現有欽差馬拉僧格在藏恐伊等或為阿爾布巴所惑從中講和或被阿爾布巴等誆誘以至頗羅鼐受害則大有闗係著岳鍾琪於川陜標下官員内選擇熟習番情通曉番語可以差遣往藏者速令其前往將一應情節宻述與馬拉僧格俾伊等心中明白則諸事無阻此諭著學士班第送去其詳悉之處班第口傳鄂爾昆圖拉産瑞麥軍營効力行走原任大同總兵官馬覿伯奏言鄂爾昆圖拉為極邊初墾地近産瑞麥一莖十五穗上瑞殊祥希代罕覯奏入得㫖今嵗各省俱産嘉禾頃馬覿伯復進瑞麥朕觀自古聖帝賢王皆務實心實政不以祥瑞為尚朕深明此理擯斥虛文因今嵗為通行藉田典禮之初即獲感召天和是以特為表著以明天人感應之理㨗於影響期中外諸臣益加誠敬共相儆勉於將來也但恐地方有司未必深悉朕心或競尚嘉禾之美名借端粉餙致有隠匿旱潦而不以上聞者亦未可定著將雍正五年以後各省田畝所産嘉禾俱停其進獻奏聞乙巳命塔拉圖為管理䝉古兵副都統往阿爾台上諭兵部曰明年更換阿爾台駐防兵丁時管理䝉古兵之副都統員缺著派䕶軍統領塔拉圖前往十一月發丑命左都御史查郎阿率兵進藏上諭議政王大臣等曰現今西藏頗羅鼐帶兵報康濟鼐之仇與阿爾布巴戰鬬相持應特派大臣領兵料理曾經繕寫諭㫖頒給逹賴喇嘛其來年大臣前往應帶領兵丁目今預備俟青草發萌時前去此所派兵丁著議政王大臣等議奏從前派兵時除官賞置辦預備恩賜銀兩外其稍有不足者多指伊等俸餉支借今次所派官兵應停其借給著從優賞賚其料理藏内軍機事務著左都御史查郎阿副都統邁禄前去選派西安滿洲兵四百名隨往四川緑旗兵丁著散秩大臣品級鑾儀使周瑛帶領陜西緑旗兵丁著西寧總兵官周開㨗帶領雲南緑旗兵丁交與鄂爾泰酌量選派總兵官一員副將一員著留一員在察木多駐劄一員領兵進藏周瑛賞銀四千兩周開㨗并所􅉽雲南之總兵毎人各賞銀三千兩副將各賞銀一千兩叅將各賞銀五百兩至賞給遊擊以下等官爾等酌議具奏尋議曰大臣進藏所率西安滿洲兵四百應令一協領二佐領二防禦四驍騎校轄之再調緑旗兵陜西八千四川四千雲南三千毎兵二千人遣一副將千人遣一㕘將或遊擊轄之守備以下令所在督撫提鎮等酌量調往並遵㫖從優給銀遊擊四百兩守備三百兩千總二百兩把總一百六十兩馬兵二十兩步兵十六兩悉令先期預辦俟明年青草發萌時啟行令查郎阿於正月自京由西安西寧同周開㨗出口進藏應帶部院賢能司官四人筆帖式四人理藩院領催二人各給俸錢整裝奏入上從之丁巳命原任巡撫法敏等辦理軍營糧餉屯種事務上諭議政王大臣等曰阿爾台軍營辦理糧餉事務巴泰雙喜之缺著派原任巡撫法敏原任内閣學士傅德前往更換伊等到日同伊都立三人管理糧餉種地事務効力贖罪明年大兵起程時隨將軍前往庚午命封哲卜尊丹巴胡土克圖等理藩院遵㫖議覆曰哲卜尊丹巴胡土克圖請加封哲卜尊丹巴喇嘛遣官齎捧勅印送至喀爾喀庫倫奏入得㫖哲卜尊丹巴胡土克圖與班禪額爾德尼逹賴喇嘛等之後身出處甚確應封於庫倫地方以掌釋教朕為普天維持宣揚教化之宗主而釋教又無分於内外東西隨處皆可以闡揚昔逹賴喇嘛與班禪額爾德尼在西域時其居住青海之厄魯特顧實汗等實與之鄰近相與䕶持故其教盛行於西藏自此各部落俱為檀越踵而行之有年矣蓋宣揚釋教得有名大喇嘛出世即可宣揚豈僅在西域一方耶哲卜尊丹巴胡土克圖其鍾靈原有根源乃與逹賴喇嘛班禪額爾德尼相等之大喇嘛也故衆喀爾喀俱尊敬供奉之且伊所居庫倫地方弟子甚衆著動用帑銀十萬兩修建大刹封伊後身俾令住持齊集衆喇嘛亦如西域講習經典宣揚釋教再多倫淖爾乃衆喀爾喀歸順時我皇考巡狩於此衆喀爾喀齊來朝覲㑹盟之地也因造寺宇以表彰之俾去世之章嘉胡土克圖居住章嘉胡土克圖者西域有名之大喇嘛也唐古忒人衆敬悦誠服在逹賴喇嘛班禪額爾徳尼之上各處䝉古亦皆尊敬供奉今其後身禀性靈異確實可據著將多倫淖爾地方寺宇亦動帑銀十萬兩修理寛廣使章嘉胡土克圖之後身住持於此齊集喇嘛亦如西域講習經典以宣揚釋教蒙古汗王貝勒貝子公台吉等既同為檀越朕如此推廣教法建造寺宇一如西域令喇嘛居住講習經典於伊等䝉古之誦經行善亦甚便易盖禮佛行善無分逺近宣揚釋教之處愈多則佛法可以日廣即哲卜尊丹巴胡土克圖章嘉胡土克圖皆前世逹賴喇嘛之弟子伊等豈肯忘其宗派耶丁丑停用隨軍効力人等川陜總督岳鍾琪疏言嗣後有自備鞍馬隨軍効力者請令領兵將軍督撫提鎮等考驗報部方予收録兵部議覆如所請奏入得㫖隨軍効力之人往往有未諳營伍而具呈願往濫邀議叙者此等自備鞍馬之人若後來力量不足必致遲誤公事及遲誤之後又不便與衆一同治罪於軍前甚屬無益嗣後若有自備鞍馬願往効力之人俱不必准十二月甲午勅諭準噶爾台吉噶爾丹䇿零準噶爾台吉䇿妄阿喇布坦死子噶爾丹䇿零嗣立遣使特磊來朝頒勅諭一道令來使齎回奉天承運皇帝詔曰據奏知爾父病故不勝惋惜爾父在時將一切事務未得裁處妥協台吉知爾父負朕之恩為非遣使逺來朕甚嘉之方今西藏地方噶卜倫阿爾布巴等與頗羅鼐等彼此結讐舉兵相拒朕正在躊躇爾奏稱欲在西域煎茶設供廣行釋教以安衆生似屬非分準噶爾乃西北隅一小部落耳釋教之廣行與否豈闗爾之煎茶設供耶朕即位元年爾父奏稱寛宥伊罪言詞恭順朕以為出於至誠故欲清理疆界乃命使二次爾父反生嫌疑不能遵奉朕㫖再羅卜藏丹津乃青海和碩特扎什巴圖爾之子伊骨肉中無故弄兵互相殘害朕差大臣前往命各息兵而羅卜藏丹津乃敢悖我皇考聖祖養育之恩負朕之德侵犯内境被守邊輕兵擊敗逺行逃竄爾父應即為擒獻始見和好之誼乃於本地隠匿窩留是何意耶由此觀之從前所奏無一誠實之處可知矣前者羅卜藏丹津乃一愚戾不忠不孝之人爾父年髙厯練力能將伊酌量裁處可以生之亦可以制之必不被伊愚弄是以不曾勒追今爾年少與彼相等以羅卜藏丹津之志氣髙傲不顧恩義斷不肯屈於爾下守分安居必將離間爾等於爾大有不便爾務須將羅卜藏丹津送來朕念伊父扎什巴圖爾從前勞績斷不將伊誅戮仍施恩豢養爾其祗遵朕命爾台吉應將利害輕重盡心籌畫自立主見特兹勅諭乙巳命將軍巴賽仍留阿爾台軍上諭議政王大臣等曰巴賽在軍前年滿原欲換回今王丹津多爾濟奏稱將軍巴賽常色禮辦理一切事務管轄兵丁整飭妥協等語現有羅卜藏舒努事件軍前甚屬緊要巴賽着再留三年着博爾屯查克旦率領更換兵丁前往協助巴賽辦事自京城派副都統諾穆柱速赴軍營同常色禮將兵領回雍正六年春正月丁巳封青海厄魯特扎薩克台吉羅卜藏察罕為輔國公辛未命察罕廋爾軍營前鋒統領穆克登回京三月庚午命巡撫莽鵠立往西寧料理進藏軍需上諭議政王大臣等曰向來大兵駐劄之處皆有大員辦理軍需目今進藏官兵駐劄西寧著巡撫莽鵠立就近前往料理命分别屯種効力候補人員等次兵部奏言阿爾台屯種候補守備等期滿請更代如例奏入得㫖阿爾台種地之候補人員如不分别等次定其優劣則伊等罔知鼓勵著行文該將軍於期滿更換之日分為一二三等具奏如果皆實心効力則皆列一等如皆係平常則當盡列下等不可因有等次遂强分優劣以人就等務須秉公分晰開列具奏夏四月辛巳命議阿爾台駐兵當代者令先期至京上諭議政王大臣等曰阿爾台換班兵丁八月内方得到彼換回兵丁俟到後起程於十一月盡方能至京時既嚴寒兵丁不無苦累如何可使換回兵丁預先起程不受寒凍即能至京著議奏尋議曰自歸化城至扎克拜逹里克有上海新驛舊驛阿喇克諾海古爾班賽堪五路若令換班兵丁於四月下旬啟行由張家口至歸化城分四路行令博爾屯查克旦塔拉圖諾穆柱分領之再令歸化城都統丹晉等選㕘領佐領等官熟識道里者四人亦分路擇水草佳處導之前行約於七月下旬可至扎克拜逹里克軍營兵丁先期在此候代再撥盛京吉林官兵為之哨望俟換班者至即令啟行仍令熟識道理㕘領等官沿途導之十月下旬即可至京官兵得免苦寒矣奏入上從之秋七月乙丑擒獲西藏叛人阿爾布巴等命宣諭中外先是川陜總督岳鍾琪奏言據西藏駐劄㕘將顔清如報稱二十五日頗羅鼐率所部兵自潘玉口至喀巴先發兵千人衝戰喀木卡倫與隆布鼐兵遇是夜西藏斥堠兵並集二十六日頗羅鼐率兵直抵西藏駐藏大臣馬拉僧格即往布逹拉守䕶逹賴喇嘛頗羅鼐一面安撫西藏一面發兵圍布逹拉二十七日馬拉僧格還藏二十八日各廟喇嘛擒阿爾布巴隆布鼐扎爾鼐等以獻頗羅鼐執之來見馬拉僧格且言今率阿里及後藏兵九千以來既獲仇讐即還後藏防守隘口乞奏聞皇上加賚兵丁臣竊見頗羅鼐於我兵未到之前同仇擒賊此皆聖主威德逺布之所致但渠魁雖擒阿爾布巴之子袞布尚在江逹駐劄臣即令鑾儀使周瑛嚴加防範俟大兵到藏併力攻勦頗羅鼐兵九千人請加賞賜以示鼓勵奏入得㫖頗羅鼐兵丁殊為効力著查郎阿等將預備軍需錢糧内動支三萬兩給與頗羅鼐令其酌量賞兵至是諸王大臣等疏言阿爾布巴等殺害駐劄西藏貝子康濟鼐罪不可赦今頗羅鼐仰承天威率兵擒獲阿爾布巴隆布鼐扎爾鼐三人西藏平定合詞奏賀奏入得㫖阿爾布巴等背理妄行藐視國法朕為綏靖邊陲之計特命大臣領兵前往察究情由就近申討今據奏報頗羅鼐率所部兵馬先抵藏地其各寺喇嘛將首惡之阿爾布巴等三人獻出拘禁渠魁既已就擒藏地可以寧謐在大兵不發一矢在西藏未傷一人此等大事而成功之易若此是皆仰賴上帝之垂慈皇考之黙佑實非朕凉德之所及也因諸王大臣等陳奏將此宣諭知之九月乙卯命犒賚阿爾台軍代還官兵上諭兵部曰阿爾台兵即日回京著於領侍衛内大臣内派一人散秩大臣内派一人齎茶食於駐軍地方設幄賜食將軍賞銀一百兩副都統營總賞銀三十兩䕶軍㕘領驍騎叅領賞銀二十兩官員等賞銀十兩䕶軍等賞銀五兩披甲人賞銀四兩令其攜至家中以備家庭歡聚之費丁丑差往西藏吏部尚書查郎阿奏以叛人阿爾布巴等分别正法查郎阿奏言臣等統領大兵於五月初六日自西寧出口八月初一日至西藏即同駐藏副都統馬拉學士僧格鞫訊阿爾布巴隆布鼐扎爾鼐等同謀殺康濟鼐事得實按阿爾布巴等身受國恩敢行叛逆阿爾布巴隆布鼐當凌遲處死扎爾鼐及阿爾布巴之子噶爾丹盆楚克袞楚克拉賈卜鄂逹爾漢噶爾藏吹逹爾隆布鼐之子席木本吹扎特並當斬二逆之妻女兄弟及扎爾鼐之妻并其子喇克桑扎木巴並當離本處發遣至協助阿爾布巴等諸喇嘛亦當分别治罪番人素性兇惡宜令所在目覩阿爾布巴等正法用示懲戒臣等一面奏聞一面即取二逆及在事當斬者正法其應發遣者諸檻送江寧杭州荆州等處將軍令給予兵丁為奴奏入報聞平定準噶爾方略前編卷十七
