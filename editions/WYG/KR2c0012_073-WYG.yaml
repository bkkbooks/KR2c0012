body:
  text: 乾隆二十年秋九月丁酉諭定西將軍扎拉豐阿等查辦巴哈曼集上諭軍機大臣曰永常奏布庫努特得木齊諾爾布等告稱帶領屬人來歸途中遇巴哈曼集搶掠殺傷等語巴哈曼集或係實在叛逆搶掠臺站或但不能約束其衆致多盜竊俱未可定著傳諭扎拉豐阿玉保於到日查明如僅止盗竊仍行寛貸選派伊兵丁帶至軍前効力贖罪如實係從逆即將巴哈曼集擒拏正法安揷其衆西路有似此反覆無定者俱酌量辦理具奏命封厄魯特貝勒齊木庫爾為郡王賞銀一千五百兩貝勒普爾普銀一千兩貝子德濟特銀八百兩閑散台吉策伯克鄂爾咱特銀二百兩隨行宰桑二人各銀四十兩僕役二人各銀十兩命賞給喀爾喀喇嘛諾顏綽爾濟封號上諭軍機大臣曰喀爾喀喇嘛諾顔綽爾濟在阿睦爾撒納游牧誦經聞阿睦爾撒納之喇嘛楚魯木班珠爾以理阻止阿逆部衆不使逃竄諾顔綽爾濟即給與楚魯木班珠爾衣服以示奬勵并令其安撫衆人深知大義殊屬可嘉著加恩賞給清蘇朱克圖諾們汗之號其印信即入於辦理扎薩克印信内鑄給戊戌諭定西將軍扎拉豐阿等曉示巴雅爾沙克都爾曼濟前往游牧事宜上諭軍機大臣曰現在諾爾布林心已擊敗阿巴噶斯是噶爾藏多爾濟游牧自無可慮惟巴雅爾沙克都爾曼濟雖各遣伊宰桑前往游牧此際尚未得信阿睦爾撒納人甚險詐恐煽誘伊等游牧亦未可定若伊等一抵軍營即赴游牧恐有不測著富德明白曉示巴雅爾沙克都爾曼濟所遣宰桑若已向游牧察看情形迎來告知即令各歸游牧集兵會𠞰賊衆若尚未迎來伊等不必急赴致墮賊計或再遣人偵探或與噶爾藏多爾濟之兵同行方為妥協如此曉示看伊等意見語言若何即行具奏扎拉豐阿玉保亦傳諭噶爾藏多爾濟現在或由哈卜塔克拜塔克前往額林哈畢爾噶或由阿濟必濟前往巴里坤並如何與巴雅爾等會合之處一併奏聞申諭㕘贊大臣哈達哈等進兵事宜上諭軍機大臣曰阿蘭泰等奏臺站章京哈林送到貝勒剛多爾濟屬人鄂勒錐諾斯海及被搶臺站脱出官兵所告賊衆情形看來阿睦爾撒納惟就兵力稍弱之臺站肆行搶掠未敢犯我聲援及屯田兵丁伊之伎倆於此可見鄂勒錐所聞派兵搶掠將軍及伊蘇特鏗格爾有二千餘户之語乃阿睦爾撒納有意聲揚皆非實事伊潛逃踪跡必難逺去但速進兵即可擒獲哈達哈等仍遵節次諭㫖俟丹津到時即與青滚雜卜喀喇巴圖魯阿玉錫帶兵前進達爾黨阿等隨後繼進以為聲援務期擒𠞰賊衆通信伊犁鄂勒錐等出使哈薩克歸途遇阿睦爾撒納被其拘禁仍能脱出深屬可嘉著交與哈達哈等量行賞賜其被搶臺站官兵以寡敵衆仍能脱出亦著加恩賞賚命賞給齊木庫爾等户口上諭軍機大臣曰阿睦爾撒納所屬户口内著撥出一百户賞給齊木庫爾其納噶查所屬户口著分賞普爾普德濟特二人前因克什克患病未來入覲令哈達哈等留心察看今伊兄普爾普已受朕恩克什克尚無可疑之處著傳諭哈逹哈等毋庸防範再同班珠爾前來之喇嘛楚木齊班珠爾及阿睦爾撒納宰桑巴雅爾俱經阻止游牧人等逃竄且與班珠爾之禪宗奇爾金阿睦爾撒納之額黙根扎木叅之敦多克巴桑圖布慎俱已供出實情加恩釋放並著哈達哈等將伊等妻子查出遇便送至京師命將阿睦爾撒納等游牧人衆分賞喀爾喀上諭軍機大臣曰朕前諭將阿睦爾撒納班珠爾納噶查等屬人移於通肯呼裕爾今思沿途解送需派兵丁現在喀爾喀部落較從前頗知奮勉効力著將阿睦爾撒納等游牧停其遷移除賞給齊木庫爾等人衆外所有户口俱分賞喀爾喀等為僕即著兆惠策布登扎布查明人數均匀賞給仍令嚴加約束稍有滋事即行治罪毋得令其脱逃庚子命㕘贊大臣哈達哈等籌辦軍營馬匹上諭軍機大臣曰哈達哈等奏收取阿睦爾撒納游牧後未即發兵接濟額林沁多爾濟因兵少路遥馬匹疲乏等語所奏甚屬含糊伊等前為收取阿睦爾撒納游牧奏留馬三千匹又將解送張家口馬一萬匹亦經奏留今所奏疲乏馬匹或指軍營附近者尚可若調來之馬皆久係收放餧養何以至於疲乏著伊等明白回奏仍查明現足敷用馬匹即遵朕㫖帶領哨探兵丁前進若馬匹臕分實有不足即發銀兩縀疋向新收之烏梁海等購買應用亦可或路逺難應急需仍酌量辦理速為奏聞諭㕘贊大臣哈達哈等停止辦理納噶查游牧上諭軍機大臣曰詢問納噶查將阿睦爾撒納一切悖逆妄行之處據實供吐朕己施恩免罪仍留公爵著傳諭哈達哈等將納噶查及伊弟巴勒濟達克巴户口俱停其辦理昨降㫖將納噶查屬人賞給德濟特普爾普等今既給還著於班珠爾屬人内量為分賞亦傳諭兆惠策布登扎布等知之諭㕘贊大臣哈達哈等辦理布珠庫游牧上諭軍機大臣曰哈達哈等奏郡王青滚雜卜報稱汗哈屯烏梁海宰桑布珠庫業已擒獲正法所有屬人或賞給察達克赤倫或給回莽噶拉克之處請㫖定奪等語青滚雜卜此次辦理烏梁海奮勉可嘉近降㫖令其帶兵同哈達哈前往哨探擒𠞰阿睦爾撒納通信伊犁若能奮勉効力必格外加以恩賞至莽噶拉克告稱從前伊父身故噶爾丹䇿凌將伊屬下二得木齊撤出給與布珠庫管理今布珠庫所屬若止莽噶拉克之衆即可給還若此外尚有屬人自應遵㫖賞給察達克赤倫管理可傳諭哈達哈等詢問青滚雜卜令其分晰聲明具奏諭領隊大臣富德傳信和碩特游牧人等上諭軍機大臣曰訊據班珠爾供伊欲寫信付和碩特台吉三濟特鄂齊爾等令其曉示和碩特游牧人等將阿睦爾撒納擒獻等語三濟特鄂齊爾業已起程班珠爾之信交伊宰桑禪宗齎往著傳諭富德俟禪宗到時將班珠爾之信交三濟特鄂齊爾轉送和碩特人等并將三濟特等言語情形奏聞禪宗已加恩授為散秩大世著帶往軍前聽候調遣命奬賞宰桑厄爾錐音等上諭軍機大臣曰朕前諭將永常所奏臺站情形一摺録寄玉保濟福等令傳諭帶往宰桑厄爾錐音哈薩克錫喇恩克博羅特吞圖布等閱看今據奏稱伊等俱各繕書信安撫游牧並將書稿進呈厄爾錐音等誠心籌畫殊屬可嘉昨又將諾爾布林沁擊敗阿巴噶斯等一節録寄扎拉豐阿傳示伊等量必更加踴躍今特加恩賞給御佩荷包及鼻煙壺各一件著扎拉豐阿等傳諭伊等祗受仍各賞銀二百兩以示奬勵冬十月辛丑朔命副都統莽阿納哈寜阿為西路領隊大臣命拏解䇿楞來京革副都統三格職効力贖罪上諭軍機大臣曰據䇿楞奏稱官兵器械須預備整齊隨同將軍進發等語策楞身獲重譴朕加恩賞給都統職衘命往西路理宜奮勉効力今伊觀望遲延毫無振作怯懦已極著扎拉豐阿一至軍營即傳㫖將䇿楞拏解來京仍派員看守不得令其自盡至三格雖非㕘贊亦係領隊大臣一意推諉亦有應得之罪著革去副都統留軍營効力贖罪又諭曰永常䇿楞奏薩喇爾遣探信之䕶軍莽哈前來中途被掠脱出尋至軍營將情形告知等語莽哈以隻身䧟賊猶能脱出且所稱遇見賊衆俱四五十人一起並無大隊此又何足為懼策楞從前或為永常所惑不敢進攻今諾爾布林沁已擊敗阿巴噶斯擒其得木齊班咱則朕前諭一到策楞即當帶兵尾追賊衆即隻身前往督率諾爾布林沁進攻有何不可伊身獲重罪朕格外加恩賞給都統職衘令在叅贊大臣上行走應如何奮勉乃一味推諉深負朕恩已降㫖拏解來京治罪䕶軍莽哈被掠脱出奮勇可嘉著加恩授為藍翎侍衞賞銀一百兩揀派兵丁令其帶領探取伊犁信息即速奏聞壬寅命㕘贊大臣哈達哈等拏解青滚雜卜來京上諭軍機大臣曰哈達哈阿蘭泰等奏郡王青滚雜卜請派兵五萬名於明年進𠞰等語從前因青滚雜卜諸事迎合阿睦爾撒納曾經降㫖拏問第因其情尚可恕且當用人之際是以復諭停止以觀後効今詢問阿睦爾撒納屬人供稱青滚雜卜將班第薩喇爾㕘奏之處通信阿睦爾撒納伊既從中漏洩則聞其叛去心必惶懼現在所請派兵進𠞰之説亦非誠心効力不過藉此姑延時日若留伊辦事非惟不得其力轉須留心防範於事無益著哈達哈等仍遵前㫖將青滚雜卜拏解來京其貝勒令伊子承襲所領和托輝特兵丁哈達哈等即酌派大員管轄臣等謹案青滚雜卜既與阿逆潛通復敢請派多兵托言自効遲迴觀望其心叵測早蒙聖明洞燭其奸是以申諭軍營大臣仍遵前㫖拏解因傳諭到時青滚雜卜先已派兵前進復命哈達哈親至軍營詳察情形斟酌辦理我皇上幬覆如天於萬無可原之中矜全再四冀其湔滌自新乃竟冥心怙終狡焉逋竄甘心附賊自速典刑於是益信反覆背恩者固為天理所不容而聖主懲惡鋤奸斷自宸衷者已歷歴先事灼見如此諭定西將軍扎拉豐阿等派兵進𠞰事宜上諭軍機大臣曰前曾降㫖將此次出兵之台吉宰桑兵丁等各加賞賚已諭知扎拉豐阿令其前至軍營時即將現在派令出兵之噶爾藏多爾濟等分别賞給厄魯特等生性貪饕聞有恩賞必至多派兵丁須為限制計我兵五千餘名伊等再派兵五千名共得萬人已敷調遣扎拉豐阿即遵照辦理仍曉示各台吉宰桑所賞銀兩緞疋若擕帶進兵未免繁重或令游牧人等赴巴里坤支領或凱旋時再行支領議定即行奏聞諭㕘贊大臣哈達哈等進𠞰事宜上諭軍機大臣曰哈達哈等奏稱九月十一日選派索倫喀爾喀兵丁令虛衘藍翎蒙固勒岱帶領自庫卜克爾起程探取班第等信息等語哈達哈等較西路尚知奮勉所奏從四十八臺脱出之喀爾喀達瓦厄魯特巴顔等告稱隨從阿睦爾撒納人衆念其妻子羣相怨恨看此情形惟速帶兵進𠞰即可擒獲達瓦巴顔等被掠脱出著酌量賞賚至根敦扎卜負恩背叛情罪可惡將伊妻子近屬拏解來京其僕人分賞索倫喀爾喀等前命喀喇巴圖魯阿玉錫在哨探隊行走今哈達哈奏稱遣往齊木庫爾游牧此際應已接奉諭㫖即遵照前㫖速赴軍營命䕶理陜甘總督印務吳達善撥解軍需銀兩上諭軍機大臣曰朕命厄魯特台吉噶爾藏多爾濟等帶領所部四五千人會同進𠞰應需賞賚銀兩緞疋著傳諭吳達善令其酌量或即於存貯哈密軍營銀十五萬兩内撥解五六萬兩至巴里坤交軍營大臣收貯行文扎拉豐阿聽其賞給其應貯備軍需銀兩再於内地撥解前往諭署安西提督冶大雄派送官兵事宜上諭軍機大臣曰前據冶大雄奏准劉統勲策楞等扎調安西標兵二千名又續調各營兵二千名隨降㫖將續調官兵停其派往其安西官兵業已進發不必停止嗣經治大雄覆奏續據劉統勲等密札停止調遣因將先進官兵調取回營等語今復據永常等奏請派安西官兵一千名前赴軍營看來伊等忽調忽停茫無定見徒使官兵往返馬力疲乏現在巴里坤有兵五千餘名足敷調遣著傳諭冶大雄此時永常等所調官兵若已前往即赴巴里坤軍營駐劄如尚未起程即無庸派往命喀爾喀貝子策卜登領兵前往伊犁上諭軍機大臣曰永常策楞奏接到噶爾藏多爾濟等送交游牧書信已飭令策卜登交與諾爾布林沁其沙克都爾曼濟等七處書信因各游牧俱在淖爾納林齋爾等處俟噶爾藏多爾濟到時再為送交等語辦理殊屬糊塗此等書信特為安慰伊等游牧自應隨到即行交送始於事有益何得遲留貽悞又伊等通信班第亦交䇿卜登令轉交諾爾布林沁托那噶爾布送往豈不能一同前去即此可見伊等怯懦性成毫無定見著策卜登等至諾爾布林沁處派厄魯特兵一百名同赴伊犁布圖庫若在伊游牧亦著同往并將沙克都爾曼濟書信亦交䇿卜登設法傳送如諾爾布林沁處有便道可以交送即令派人分送其拏獲之阿巴噶斯屬下得木齊班咱著即妥協防範解送來京甲辰命授回人伯克阿底斯等官職上諭軍機大臣曰管理伯得爾格鄂拓克回人伯克阿底斯著授為三品總管賞銀一百五十兩烏蘇卜阿卜都喇伊木俱著授為二等侍衞各賞銀一百二十兩吐魯番回人伊必里野木著授為三等侍衞賞銀一百兩仍按伊等品級每人各賞衣一襲丙午申諭㕘贊大臣哈達哈等查察青滚雜卜情形上諭軍機大臣曰哈達哈等奏令郡王青滚雜卜同扎爾杭阿等帶兵追捕阿睦爾撒納等語朕因和托輝特兵尚可用曾將青滚雜卜暫停拏問近聞其暗結阿睦爾撒納而所請明年派兵進𠞰之語顯係遲迴觀望是以仍令拏解來京但哈達哈等業已派令帶兵前進又復調回必生疑懼著傳諭哈達哈若接到拏問諭㫖尚未舉行即速赴伊營留心察看倘誠心奮勉仍免其拏問將前㫖及奏摺密封進呈若情形叵測哈達哈先酌定堪以管轄和托輝特兵衆之人即將青滚雜卜拏解來京此際最宜斟酌妥協詳愼辦理從前班第等㕘奏阿睦爾撒納伊尚聞知暗中通信今伊自知罪愆必多顧慮尤宜加意愼密申諭㕘贊大臣哈達哈等進𠞰事宜上諭軍機大臣曰哈達哈等奏令郡王青滚雜卜等帶兵前進伊等亦陸續進發又據從臺站脱出人等告稱於鏗格爾西喇托輝等處曾遇阿睦爾撒納等語看來阿睦爾撒納情形甚為窘迫若督兵速進自當擒獲朕已將分隊帶兵之處降㫖伊等自當遵照辦理阿睦爾撒納搶掠臺站時塔木集賽人等亦至額爾齊斯等處搶掠今大兵前往務將從賊黨羽悉力搜捕如塔本集賽等游牧更宜𠞰絶以壯軍威若能直至伊犁地方通信班第等併力夾攻固為甚善或須俟西路兵力即據形勢之地以待聲援相機進𠞰哈達哈等固不可稍存畏葸亦當計出萬全妥協辦理至從臺站脱出之喀爾喀及訥黙庫巴圖博羅特等屬人勞悴可憫哈達哈等即酌量賞賫以示鼓勵申諭定西將軍扎拉豐阿等速赴軍營進𠞰上諭軍機大臣曰今日永常䇿楞奏到尚未進兵前有㫖令阿敏道帶領精兵探取班第等信息亦未遣行畏懦已極著傳諭扎拉豐阿玉保即速馳至軍營一應事宜俱遵節次諭㫖辦理其務體委任之意加意奮勉以奏膚功命授準噶爾諸部盟長上諭軍機大臣曰前因都爾伯特部落人衆已分為兩翼各授盟長看來盟長一員尚屬不敷著將策凌策凌烏巴什訥黙庫俱授為盟長並著塞卜騰為策凌之副策凌孟克為策凌烏巴什之副噶爾藏多爾濟為訥黙庫之副輝特部落人既無多即著齊木庫爾為盟長和碩特部落著沙克都爾曼濟為盟長俱不必副丁未命封親王訥黙庫之子喇嘛扎卜為貝勒加賞訥黙庫銀一千兩宰桑巴圖濟爾噶爾烏察喇勒察罕鼐濟等銀各二百兩定議籌辦西路軍營馬駝糧餉事宜先是協辦陜甘總督劉統勲疏奏籌辦馬駝運送口糧撥貯兵餉各事宜得㫖軍機大臣議奏尋議據劉統勲奏稱臣前奏請調各處未用餘馬二萬匹合之現調哈密馬五千餘匹及軍營所存尚可備用之馬其數約敷七千官兵之用但其中恐有疲乏馬匹請將陜甘現存馬匹察其可用者一例調取至駝隻一項按册尚存四千餘隻其中亦多不堪應用之駝現已行文撫臣購覓就附近營分派兵帶赴哈密聽候調用等語查此次用兵安接臺站追捕逸賊惟務迅速前行陸續進發哈密有馬五千四百匹既已先後送到軍營兩次運送巴里坤糧石計駝一千三百隻俱足備一二千兵之用䇿楞等屢奉諭㫖自當即日帶領前進其續進之兵需用馬駝既據稱陜甘兩省原調未用餘馬尚屬臕壯即令䕶督吳達善尅期催赴軍營昨據吳達善奏稱已將肅鎭馬匹就近赴調先解軍營其餘分别臕分陸續起解其陜省路途稍逺各營馬匹應擇其臕壯者數千尅期前赴俱應交該䕶督分晰查核辦理又軍營有駝一千三百隻續調安西駝一千隻應令該䕶督於各處駝隻調撥購買計足敷用即行停止又所奏運糧事宜請召募殷實商人分别程途險易給與雇値聽其陸續轉運應一併交與該䕶督辦理並派委賢能大員查催務期無悞其所請於蘭州司庫酌撥銀二十萬兩分貯甘肅安西道庫以備軍需亦應如所議行奏入上從之庚戌命傳諭準噶爾部衆上諭準噶爾部衆曰準噶爾鄂拓克人等攻戰頻年互相殘害朕興師平定擒厥渠魁爾台吉宰桑等望風納欵朕優加封賞并籌爾部衆生計俾各安居樂業今逆賊阿睦爾撒納負恩逃叛妄思并吞爾衆肆行驚擾念爾各部豈有不願為天朝臣僕反附和亂逆甘受驅使之理特被其脅從無由自拔耳數年來令爾準部不得安生皆達瓦齊阿睦爾撒納所致達瓦齊已屬昏愚阿睦爾撒納尤為暴虐爾衆素所稔知朕今命將興師聲罪致討咨爾有衆能擒獲阿睦爾撒納者必加恩封賞以示奬勵此時甘心黨惡者不過阿巴噶斯哈丹克什木敦多克曼集數人其餘或為宰桑等挾制非其本心有能擒獲從逆之宰桑得木齊等宰桑即行優叙得木齊即授為宰桑其餘屬人有著勞績者以次授職爾等當以受朕深恩永安生業為念毋為浮言煽惑倘執迷不悟大兵所至必加𠞰絶慎之辛亥命副都統富德為㕘贊大臣兼理西路臺站命定邊左副將軍達爾黨阿等拏解青滚雜卜上諭軍機大臣曰哈達哈等奏詢問厄魯特巴雅爾供稱青滚雜卜帶往烏梁海之諾爾布丹津係巴特瑪車凌之弟於七月内曾往見阿睦爾撒納其巴特瑪車凌所屬六十户現在青滚雜卜軍營等語看來青滚雜卜必有通信於阿睦爾撒納之事是以令諾爾布丹津前往且查出巴特瑪車凌户口亦未呈報前曾兩次降㫖拏伊來京繼又中止倘伊知覺懷疑生懼愈滋事端著傳諭達爾黨阿將青滚雜卜喚回拏解或令哈達哈即於軍前拏解來京其選派大員管理和托輝特兵衆及令伊子承襲貝勒之處俱遵前㫖行㕘贊大臣哈達哈等疏奏解送台吉吹喇錫等來京哈達哈等奏言據永貴文稱九月十八日管理聲援兵副都統扎爾杭阿遣員送到厄魯特台吉吹喇錫等查吹喇錫烏勒木濟係阿睦爾撒納同族扎奇魯克齊他沙係貝勒扎木叅之人因阿睦爾撒納心懷叛逆曾告知喀爾喀王公等今帶領親屬二十餘人户口一百餘人并在布拉罕察罕托輝等處遇見貝子德濟特扎奇魯克齊扎卜等三十餘口又從哈薩克逃出之厄魯特塞倫巴圖爾婦女畢齊罕扣等一俟前來吹喇錫即係根敦扎卜之父更有關係隨派虛衘藍翎瑪虎解送來京其家屬户口暫行看守又據吹喇錫等告稱伊户口内有阿睦爾撒納屬人托博克哈爾布錫和通等三人恐其逃遁臣等現在嚴加看守其同來之德濟特屬人俱交各游牧安挿奏入報聞壬子命授巴哈曼集為二等侍衞上諭軍機大臣曰前據永常䇿楞奏往傳巴哈曼集稱病不行未知虛實今策楞奏九月二十九日帶兵至廋濟地方巴哈曼集患病屬實舁之來見并稱欲令伊子沙喇巴圖魯隨營効力誠懇可嘉著加恩授巴哈曼集為二等侍衞賞銀一百兩再臺站兵丁傳送事件甚屬勤勞而新附之厄魯特等尤宜撫䘏著將派撥臺站之察哈爾喀爾喀等酌量賞給其厄魯特人等從優加賞命寛免劉統勲策楞罪以司員在軍營効力上諭大學士曰劉統勲因永常自穆壘退回巴里坤輕信浮言張皇附和奏請退守哈密拒絶歸附之諾爾布林沁種種乖謬不可枚舉是以降㫖革職拏解來京治罪夫律以逗撓軍機揺惑輿情即置之於法實無可逭但朕念劉統勲所司者在糧餉馬駝其軍行進止原係將軍之事設令模稜之人緘黙自全轉可不致獲罪是其言雖刺謬其心尚可原也况永常尚不識死綏之義何怪於懦弱書生劉統勲在漢大臣中平日尚奮往任事朕於萬無可寛之中求其一綫可生予以自新之路劉統勲著從寛免其治罪發往軍營交班第等令其在司員内辦理軍需効力贖罪倘伊以為士可殺而不可辱欲來京甘受典刑亦惟其所自處伊子俱著釋放劉墉著加恩令在編修上行走自効至策楞去歲即以恇怯獲罪今復用為都統於永常送回時即當一面㕘奏一面帯兵進𠞰乃一味曲從依違觀望故亦降㫖革職拏問在伊實有應得之罪但此番坐失機宜永常實為罪首策楞乃係因伊獲譴亦著從寛免其治罪交與扎拉豐阿令其在司員内辦理糧餉効力贖罪癸丑命封賞喀爾喀扎薩克林丕勒多爾濟等上諭軍機大臣曰喀爾喀扎薩克林丕勒多爾濟等於阿睦爾撒納逃竄時被其掩襲力戰得脫仍將賊人後隊軍裝收獲奮勉可嘉著加恩將林丕勒多爾濟封為公賞銀一百兩其驍騎校齊克愼授為三等侍衞賞銀四十兩虛衘藍翎永德伍岱俱授為藍翎侍衞各賞銀三十兩並馳驛前往軍營効力行走訥黙庫屬人諾斯海剛多爾濟屬人鄂勒錐亦各賞銀二十兩同林丕勒多爾濟遣回各游牧定西將軍扎拉豐阿疏奏前赴軍營日期扎拉豐阿奏言十月初三日欽奏諭㫖令臣與玉保速至軍營帶兵前進會合噶爾藏多爾濟等奮勉𠞰賊臣於烏里雅蘇台揀選馬駝於十月初五日輕騎起程追及玉保前往巴里坤約需二十餘日可抵軍營奏入報聞定邊左副將軍達爾黨阿等疏奏前赴軍營日期達爾黨阿等奏言臣等欽奉諭㫖至烏里雅蘇台辦理行裝即速前赴軍營今定西將軍扎拉豐阿於十月初五日前往西路臣等於是日即馳往北路軍營俟見哈達哈等公同商酌進兵事宜奏入報聞丙辰申諭定邊左副將軍達爾黨阿等進𠞰事宜上諭軍機大臣曰哈達哈等奏先帶索倫喀爾喀兵一千三百餘名進發達爾黨阿等將續進兵三千餘名分隊帶領前進等語哈達哈等此番辦理頗覺奮勉但前隊兵數較少尚未妥協或酌量揀選二三百名先行哨探達爾黨阿等即續進以作聲援方為愼重其兵丁口糧即於包沁牛羊内取用朕前曾降㫖令北路之兵酌量在額爾齊斯或附近卡倫駐劄想伊等亦經奉到若勢可疾驅即行前進但派令成衮扎布塔爾瑪善帶兵進發伊等選輭無能不如巴扎爾什第桑寨多爾濟尚能効力著即派令帶兵留成衮扎布等辦事喀喇巴圖魯阿玉錫丹津俱熟諳厄魯特事宜即會同商酌相機辦理命授汗哈屯烏梁海宰桑郭勒卓輝等為總管上諭軍機大臣曰哈達哈等奏據脱出之巴拜等供稱阿睦爾撒納遣尼瑪前往鳥梁海宰桑郭勒卓輝處通信會合等語汗哈屯烏梁海等係兵力收服非察達克車根赤倫等與賊有讐久經歸順者可比我兵既進伊等或襲其後甚有關係達爾黨阿哈達哈等宜加意防範再察達克等去歲投誠俱加恩授職此次收服宰桑郭勒卓輝瑪濟岱等著加恩授為三品總管賞給翎頂其餘宰桑有應酌量授為三四品總管者未經查奏著達爾黨阿等查明酌量授職一面奏聞一面辦理再伊等馬匹牲隻若以銀兩緞疋與之交易既可分伊等之力亦藉以助給軍需即傳諭察達克等若能勉力承辦必加恩賞命派兵赴達卜遜圖喇堵截賊衆上諭軍機大臣曰富德奏稱額爾齊斯之北有達卜遜圖喇地方係準噶爾哈薩克俄羅斯交界其地産鹽輿圖所載額爾齊斯之北有鹽池即其地也距塔爾巴噶台千里阿睦爾撒納勢力窮蹙或由此路逃往俄羅斯亦未可定著傳諭達爾黨阿哈達哈等帶兵進發後或令察達克赤倫等帶伊舊烏梁海兵數百名赴其地巡查堵截或於索倫兵内分數百人前往亦可伊等願往所派兵丁俱照軍營一體賞賚定議派兵防守巴里坤事宜先是協辦陜甘總督劉統勲疏奏派兵防守巴里坤一摺得㫖軍機大臣議奏尋議據劉統勲奏前奉諭㫖派緑旗兵二三千名令提督豆斌帶領防守巴里坤以為聲援擬派甘州兵一千名肅州兵一千名前往駐防等語查從前九月内奉㫖派兵其時永常尚駐穆壘兵俱隨征是以另派緑旗兵丁防守嗣於十月内已傳諭冶大雄令其將現調安西兵二千名無庸前往惟令該䕶督吳達善趲辦馬駝以應現在兵丁進𠞰之用但巴里坤防兵僅三百名稍覺單弱請將原派安西兵内酌撥一千名前往駐防奏入上從之㕘贊大臣哈達哈等奏報九月二十日遵㫖將擒獲包沁總管阿克珠勒於軍營正法平定準噶爾方略正編卷十九
