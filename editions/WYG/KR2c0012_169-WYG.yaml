  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_169-1a, image: WYG0359/WYG0359-0913c.png}
body:
  text: 乾隆三十年夏四月丁未㕘贊大臣愛隆阿疏奏廵查邊界情形愛隆阿奏言臣於正月初一日領兵自伊犂起程過阿勒坦額黙勒驅逐越界游牧之哈薩克等查自哈喇哲克德至勒卜什畢什罕招摩多俱間有偷越游牧者臣派出侍衛官兵嚴行驅逐哈薩克等俱驚懼遷移臣領兵尾隨出境閏二月二十六日行至雅爾綽克托五岱訥蘓懇亦俱相㑹將前次標識之屯田築城處所逐一指給又派卡倫兵九十名於二十七日起程照原奏安設臣於三月初十日回至伊犂奏入報聞辛亥諭伊犂將軍明瑞等辦理庫爾勒回人事宜上諭軍機大臣曰明普奏稱玉古爾庫爾勒回人俱照常耕種並無可疑惟阿竒木伯克色提克據回人等首告哈子伯克阿璊噶雜納齊伯克和碩爾等散布流言意圖叛逆傳訊回人與原告相符已將阿璊等及應行質訊之人拏獲看守等語昨據明普奏請回抵哈喇沙爾查訊回人朕即諭以宜加愼密若毫無形迹則已設果潛懷反側辦理時當出其不意倘令稍有知覺則各城回人因此驚懼或至另生一事亦未可定著傳諭明瑞朕以額敏和卓熟習回部情事伊至哈喇沙爾時當令其留心體察若回人等實係謀叛何以並未舉事坐待拏問如謂本無其事則回人等首告之言又何以衆證符合將來查明時若祗阿璊等數人起意造言即將伊等正法示懲不必輾轉株連諒額敏和卓必能妥恊辦理再審訊既實則色提克尙屬輸誠効力自應加恩奬賞著明瑞等以朕㫖宣示照伊現在職銜加一級賞戴孔雀翎仍賞緞八疋壬子諭伊犂將軍明瑞等辦理𠞰賊及更換辦事領隊大臣上諭軍機大臣曰明瑞奏自三月初九十三十四十五等日進攻烏什情形又據伯克薩里請遣親信回人呼特呼黙特持書前往招撫回衆等語逆賊等倚恃城堅糧足敢行抗拒朕已節次傳諭不必徒事攻擊惟嚴防要隘俟其自敝此時若尚未竣事則鄂津所領伊犂官兵五百名亦到倍添威力至納世通等攻守一隅屢戰挫衂乆留該處必至僨事昨已降㫖將納世通卞塔海於軍前正法明瑞此時且不必宣露俟阿桂到彼一同傳㫖辦理納世通等俱擾累回人爲衆所惡若不早正典刑則回衆不知天朝法紀著一面傳諭阿桂速行前赴烏什將納世通卞塔海正法後其所領官兵即著阿桂管轄與明瑞協力取城至領隊進𠞰愛隆阿尙屬諳練著明瑞酌量如伊犂不必定須愛隆阿駐劄即派赴烏什辦事至德福與卞塔海同在阿克蘇辦事俱無端緒德福雖罪不至於正法或將伊革職令其効力行走或作何治罪之處亦應定擬所有應辦錢糧𦂳要事件暫調伍爾泰赴阿克蘇辦理俱著明瑞妥議具奏納世通等奏摺俱未批示一併發交明瑞閲看酌量查辦奏聞諭喀什噶爾辦事副都統栢琨查奏納世通罪狀上諭軍機大臣曰納世通進𠞰烏什全無端緒且任意虐使回人看來伊在喀什噶爾時亦必妄自尊大或有無恥情事俱未可定著傳諭栢琨伊至喀什噶爾多時已奏事數次納世通在彼行止豈全無見聞何以未經奏及奉到此㫖務須徹底查訪據實㕘奏亦傳諭明瑞阿桂如栢琨有徇庇納世通稍爲隱匿之處一經查出即行參奏治罪諭伊犂將軍明瑞辦理回部事宜上諭軍機大臣曰明瑞奏哨探人等擒獲一賊交木薩訊供據稱城内回衆議論不一有謂投降必不全戮者有謂烏什城池堅固厄魯特曾以三萬兵圍守九月竟不能克今喀什噶爾阿克蘇人心俱變不過麥熟前亦亂其言雖不可全信似宜留心防範且駐劄大臣等辦理不善回人不能相安似宜專於伊犂駐劄大兵以資彈壓其回部各城仍其舊俗不必駐劄大臣官兵等語所奏未合事機自平定回部以來駐兵辦事已成定制一旦忽爾改易殊非國體且烏什情事皆由大臣等激變既經嚴治其罪則後來定知所懲戒設仍有愍不畏法者亦有誅無赦而已若因烏什一事將各城大臣官兵裁撤非徒示弱於回人即如補授阿竒木伯克誰爲揀選保舉而阿竒木等或妄自尊大不奉伊犂約束又將如何辦理耶至厄魯特三萬兵攻圍不克之語益屬荒誕從前霍集占據有全部何以各城俱皆攻克迎降此不過助惡之伯克等作此語以固其屬人之心耳著傳諭明瑞當持以鎭定一意堵截要隘防賊脫逃彼芻糧既盡自然内潰一切事宜俱同阿桂永貴酌議具奏若各城駐兵尚少將來酌量增加亦可併傳諭阿桂知之乙卯喀什噶爾辦事副都統栢琨疏奏布魯特拏送烏什回人供吐情形栢琨奏言本年三月十四日據布魯特車里克齊遣伊弟喀喇們都前來告稱烏什逆回賴黑木圖拉等差往霍罕求援之巴卜敦瑪瑪達布拉爲我等擒獲解送軍營臣等嚴加究訊據巴卜敦供烏什阿竒木伯克阿卜都拉近年全不愛惜我等將疲瘦馬匹羊隻散與衆人希圖重價素大人並未查問且將烏什回人等妻女子婦喚去調戱所屬官兵亦將我等婦女任意姦宿以致激成事端二月初已有流言十四日適㑹解送沙棗樹科派人稍多賴黑木圖拉與阿哈拉克齊海色木和卓商同叛逆海色木和卓向阿卜都拉出首轉告素大人隨領兵至阿卜都拉所居將大伯克等擒拏以致城内煽動賴黑木圖拉等五人即揚言阿睦爾撒納兩和卓木俱領兵前來遂倡衆堵截街巷戕害官兵素大人父子自盡阿卜都拉被擒隨將鄉村回人盡驅入城以銀兩緞疋遣我等前往霍罕布魯特求援并揚言各城俱叛續有喀什噶爾阿竒木伯克等遣人曉示惟烏什一城變亂餘皆安堵布魯特知我等犯罪實情將銀兩什物俱行搶掠仍行看守又有安集延貿易三人不知去向今喀什噶爾差人到彼即將我等解來其現在有無商議之處實不知情奏入上諭軍機大臣曰栢琨將布魯特車里克齊解到送信回人逐一訊供看守已酌賞車里克齊等緞疋等語此等回人俱賴黑木圖拉親信據供烏什有馬五六百匹口糧將盡較之明瑞捉生詢問所供不符益見前言之未可深信惟絶其糧道防禦逃逸自然内潰但駐守官兵接濟糧餉甚屬𦂳要明瑞當豫爲籌畫再車里克齊等拏解回人先將其銀兩緞疋搶奪亦不可不明白宣諭著明瑞曉示車里克齊云爾等拏解潛通信息回人甚屬可嘉伊等所擕雖係官物即以充賞嗣後凡有此等脫逃通信之人俱照例辦理仍加賞車里克齊緞四疋至栢琨奏巴卜敦瑪瑪達布拉係賊人心腹若縛置軍前俾賊人看視以絶其望救之念於事有益所見尚是明瑞即照此辦理又諭曰前據明瑞查奏烏什回人一事實由素誠等狂縱妄行以致激成事變及納世通之妄自尊大凌辱回衆卞塔海之輕率攻城掩飾敗狀均爲法所難宥已將伊等分别治罪示懲兹復據栢琨奏訊取巴卜敦等供詞則素誠在烏什姦淫婦女苦累回人各欵俱與明瑞前奏相同是其情眞罪當實屬衆口如一著諭衆知之丁巳申諭伊犂將軍明瑞加意堵截賊人毋庸再行招撫上諭軍機大臣曰前據明瑞以圍城無益當遣回人招撫具奏迄今多日未見奏及看來烏什回人死守不降顯然可見若仍設間招撫恐賊人謂攻城無䇿惟以納降爲事著傳諭明瑞毋庸再行招撫現在大臣官兵多係坐糜糧餉此時固不必急於進𠞰而防守堵禦尤當加意如一年不克即駐守一年俟其自潰可耳乙丑諭伊犂將軍明瑞添調兵丁事宜上諭軍機大臣曰據阿桂奏現在明瑞所領之兵尚有盈餘但圍城總覺不足因詳細㑹議添調兵丁二千名等語明瑞在彼一切事宜皆當辦理今阿桂既經知㑹自當盡心選練勿致遲延貽悞著㑹同商辦俱奏戊辰諭將軍總統要務參贊大臣毋得專擅上諭軍機大臣曰據栢琨奏准納世通咨與明瑞㑹商令將回人巴卜敦瑪瑪達布拉送赴烏什等語昨因栢琨請將拏獲潛通信息之回人等縛置軍前俾賊人見之絶其望救之念朕即以此事尙屬可行屢降諭㫖而明瑞等總未具奏此次栢琨所奏則係納世通咨取又云與明瑞㑹商甚不合理明瑞係總統回部將軍納世通不過參贊大臣各城一應事宜當聽將軍查辦豈有參贊大臣專主一事僅知㑹將軍同辦之理且將軍明瑞等數日以來並未將烏什事體如何之處奏聞甚屬不知緩急俱著傳諭知之辛未申諭新疆大臣等和衷集事上諭軍機大臣曰據明瑞奏稱烏什逆回等以死固守而納世通卞塔海等未能和衷辦事每多掣肘等語納世通卞塔海等不能和衷集事朕早已知之但伊等之罪尚不在此惟諱敗飾功存心欺隱其罪甚大是以降㫖將伊等正法大臣等辦理國事原不應分别彼我至朕用人行政一夲大公大臣等如果同心協力自當並錄其功若乖張僨事亦必均任其咎從不稍有偏徇即富德等入㧞達克山索取霍集占兄弟之時兆惠並未前往朕因其事已集未行深究若稍有貽誤自必治兆惠之罪納世通卞塔海因不相合以致僨事今阿桂永貴陸續前往萬不可仍蹈覆轍俱著傳諭知之壬申諭内大臣尙書阿桂等軍前奏事及交代印務各事宜上諭軍機大臣曰阿桂奏稱從前辦理軍務時㕘贊領隊大臣俱不另行奏事今烏什事體雖小業經將軍前往應照向例或同將軍列名或俱呈轉奏庶事權歸一亦可省臺站之勞等語辦理烏什非從前平定準夷回部可比且進攻烏什時明瑞在東納世通在西各有分地一切情形若待呈明將軍然後具奏必致躭延時日現在各處駐劄大臣有事豈能一一呈明將軍代爲具奏耶納世通等罪在有心欺隱諱敗爲功若另行奏事尚無妨礙阿桂至烏什領納世通之兵仍將西城攻守情形酌量即行奏聞有㑹商之事即合詞具奏伊等和衷與否並不在此再阿桂奏請辦理軍務暫用何處印信阿桂抵烏什時永貴尚不能至著暫用喀什噶爾大臣印信計永貴至彼烏什應已蕆事明瑞離伊犂日乆人情未免揣測著即先回阿桂多留數日再與永貴交代前往伊犂並傳諭明瑞知之五月丁丑吐魯番郡王額敏和卓等疏奏審擬逆回阿璊等罪狀額敏和卓等奏言臣等將逆回阿璊及原首回人克伊雅斯等提集審訊據原首人供閏二月初五日薄暮哈子伯克阿璊遣人邀請飲食有伊兄噶雜納齊伯克和碩爾及弟姪等十一人在坐阿璊忽云聞烏什各城俱叛我等何不將阿竒木等殺死掠其所有分與衆人以克伊雅斯爲導至烏什日我爲大伯克爾等俱得大頭目等語衆俱無言和碩爾云我曾經入覲親覩大皇帝威福且賞賚甚重爾如何出此妄言再不改悔必呈報取爾首級即率其子三人先行我等三人隨出告知阿奇木伯克等語據阿璊供因阿竒木伯克色提克與我不和心甚懷恨是以欲將伊殺掠其各城俱叛係屬造言臣等窮詰情由據供去年色提克無故將我毆打一次詢之色提克亦稱去年派差阿璊以老弱充數抗拒不換因以鞭打伊數下是實臣等謹按阿璊以多倫微末回人䝉恩授爲哈子伯克乃敢挾嫌乗隙謀爲叛逆罪不可逭應請將阿璊按律凌遲處死仍梟首示衆妻子緣坐和碩爾雖經斥責並未首告且係親兄亦應擬斬立决其弟姪等俱應緣坐但情事稍有不同謹分别定擬色提克因公將阿璊鞭責應毋庸議奏入上諭軍機大臣曰額敏和卓等審訊多倫逆回阿璊聞知烏什信息倡言惑衆一事阿璊著即凌遲處死將伊妻子解京賞給王大臣爲奴伊兄弟和碩爾等雖不能首告但業經斥責並未聽從且係新附回人不知内地法律俱著加恩省釋餘如議壬午㕘贊大臣綽克托疏奏雅爾屯田駐兵情形綽克托奏言臣於閏二月二十六日至塔爾巴噶台㑹同㕘贊大臣愛隆阿以將軍明瑞所定築城屯田事宜逐一指出查現領緣旗兵六百名即派五百四十名掘渠引水開墾荒地其備差兵六十名以十名入山採取碾磨之石餘令隨同滿洲索倫兵斫取柳條於營外周圍挿䕶營内各分院落苫蓋窩舖暫收糧餉緞疋等物設立堆撥看守計自駐劄月餘以來時雨數降地畝俱已開墾次第播種青稞麥粟正有暇日以臣愚見若趂此時伐木刈葦合土築城則年内似可竣事三月二十六日令㕘將呉士勝原任主事伏魔保領緣旗聽差兵丁興工仍於屯田兵丁内匀出恊助照明瑞所定玉爾雅爾兩處築城即將所帶車輛輓運計所築城垣周圍二里四分髙一丈五尺足敷兵丁一千五百名駐劄所建官署倉庫共六百餘間仍有餘地以備添建謹繪圖貼説恭呈御覽奏入報聞丁亥伊犂將軍明瑞等疏奏豫防逃賊情形明瑞等奏言臣等自三月十五日𠞰賊後恭承訓諭暫緩攻圍但賊人亦時出牧放牲隻竊掘糧石隨派員擒𠞰捉生詢問據供賴黑木圖拉誑衆云大兵久未攻城乃待我自斃之意我既不忍棄爾等而逃若歸降又必被殺四月初十日爲派噶木巴爾成道之期當與東路官兵决戰雖死亦得好處等語臣等看賊人情形漸覺廹切密飭嚴防十一日午時忽有馬兵五百前行隨以歩賊千餘直犯我左翼臣等即領兵力戰於賊多處倍加攻擊賊仍不退因㸃放大神礮礮子落於賊隊者兩次始敗走入城十三日未時城東門先有歩賊埋伏續有馬賊百餘衝我左翼城西北門又有馬賊三百餘衝我右翼合戰良久賊不能支逃入山口桑林内隨以礮攻賊皆遁出我兵襲擊至西北門聞城内有婦子哭聲此日西路官兵聞臣等交戰聲息亦派兵攻擊臣等看得賊雖以死拒戰其氣甚衰誠恐有潛逃之舉現在分兵堵截并行文納世通等一體防範奏入上諭軍機大臣曰明瑞等奏聞賊有决戰之信即整兵進𠞰連戰敗賊恐其事急潛逃於要隘分兵防守等語以賊人現在情形計之賴黑木圖拉若不爲其屬人所殺必至潛逃此時脅從之賊若擒獻首惡尚可寛貸否則仍遵前㫖辦理命革和闐總兵和誠職拏問治罪上諭軍機大臣曰據額爾景額㕘奏和闐總兵和誠於上年十二月派阿竒木伯克阿什黙特署筆帖式松科泰家人李文等假廵查六城爲由松科泰李文索取回人金錢衣物衆回人無不嗟怨等語和誠以辦事大員任聽屬官家人求索所部甚屬不堪且安保無指使情事和誠著革職拏問奏内有名人犯俱交明瑞阿桂嚴審定擬具奏至阿什黙特雖有干渉若衆回人不行首告即毋庸深䆒昨據額爾景額㕘奏和誠私采哈朗圭嗒克之玉隱匿不進朕以采玉尚無關𦂳要姑從寛貸此次所奏情事又在采玉以前則是和誠向日行止不端額爾景額未免爲之姑容今見素誠在烏什以貪婪僨事始補行參奏殊屬闒茸著傳㫖申飭昨伍諾壐以布政使銜赴和闐辦事此時著富明安暫署丑達亦著往和闐辦事諭駐劄各回城辦事大臣等毋得互相瞻徇上諭軍機大臣曰駐劄各回城辦事大臣理宜潔已奉公約束下人撫輯回衆毋令絲毫擾累乃大臣等遇事往往彼此岐視漠不相關以博長厚之名雖有見聞概行容隱若果能以國事爲重於同官有不法之舉即行㕘奏則不肖之徒知所顧忌何至滋生事端即如烏什一事可爲炯戒現在和誠又縱伊屬員家人求索所部額爾景額平日豈無見聞而僅以私采玉石一事入奏朕以爲無關𦂳要姑從寛貸及烏什事發始補行㕘奏若早如此直切指陳則和誠早經治罪矣額爾景額即係姑息瞻徇著傳諭各該大臣等嗣後有仍蹈覆轍擾累回人者鄰城一有見聞即據實㕘奏其或以私事不合互相傾軋亦不能逃朕洞鑒命酌量寛宥霍集斯舊屬人等上諭軍機大臣曰前諭明瑞等以霍集斯之姪及其族人俱在烏什尚可酌量寛免除臨陣斬殺外其俘獲餘人著查出奏聞今據霍集斯將伊親屬之在烏什者開列具奏著即錄寄明瑞等實係脅從者應查出請㫖若有意助逆雖霍集斯親屬亦不可免即行正法又前㫖烏什逆賊妻女俱送往伊犂給厄魯特爲妻至霍集斯舊屬不必同衆辦理仍查出奏聞庚寅命副都統伊勒圖往雅爾辦事更換副都統納蘇懇往阿克蘇同叅贊大臣綽克托辦事癸巳命奬賞擊敗賊人收取牲隻官兵上諭軍機大臣曰明瑞等奏稱四月十八日賊人驅出牲隻甚多一半渡河牧放因伏兵五十名候賊人舍騎刈草之時突起衝擊擒三人殺二十人其渡河之賊被殱大半收取牛馬驢三百餘分賞効力官兵等語此次官兵擊賊收其牲隻甚屬奮勉著查明有應賞巴圖魯號者奏請賞給仍酌量奬賞以示鼓勵今日據納世通等雖奏稱與賊交戰數次並未有實在勞績著傳諭明瑞凡城西堵截賊人樵牧俱著一體加意辦理乙未命解送回人巴卜敦等於軍前不必候獲犯質對上諭軍機大臣曰近據栢琨奏布魯特車里克齊擒送之回人巴卜敦瑪瑪達布拉若令烏什回人觀看可使伊等内亂與明瑞㑹商已解往軍前等語明瑞此時應將伊等使賊人觀看或遣回城内即謂逆黨不便輕縱亦當使所擒生口知之酌量發回數人以亂逆賊之心乃昨據明瑞等奏因供詞不符須布魯特貿易之三人前來質對已行文車里克齊等語巴卜敦等通信情節毫無可疑何必候此三人質對著將現在辦理情形若何作速具奏己亥申諭伊犂將軍明瑞辦理逆回毋事姑息上諭軍機大臣曰明瑞奏四月二十七日桑林内有馬賊二百餘名領歩賊二千餘名斫取桑樹臣急速領兵進攻計捉生七名𠞰殺二百餘名得馬及鳥鎗無算又將拏獲小回人二名放回以離間城内人心等語明瑞此等意見甚不曉事豈欲圖賊人感激耶殊不知我兵初到時累示懲創賊即納降尚可酌量寛宥今已抗拒數次並未悔罪歸附者非闔城誅戮無以示儆將來著傳諭明瑞仍遵前降諭㫖不可稍事姑息壬寅命免哈密郡王品級貝勒玉素富議處上諭軍機大臣曰玉素富奏稱伊弟阿卜都拉騷擾烏什回人以致僨事俱由伊素失教訓請交部嚴加議處等語阿卜都拉以阿奇木伯克縱所屬人等滋擾激變罪由自取與玉素富無渉著加恩免其交部癸卯諭現審庫爾勒回人情節俟烏什事竣㑹辦上諭軍機大臣曰據明瑞奏額敏和卓㑹同明普審訊回人阿璊一案額敏和卓欲將阿璊之兄弟和碩爾等聲請寛免而明普執意不從及額敏和卓告知明普代具奏摺而明普又未將額敏和卓原議敘入是以額敏和卓與臣咨商行文明普暫緩辦理俟烏什事竣再行審訊等語額敏和卓係特派㑹同明普審訊阿璊等罪案若額敏和卓有札商情節明普自當據實陳奏乃偏執己見殊不可解現在烏什事務𦂳要阿璊一案業經停其辦理著俟事竣後明瑞㑹同阿桂再行明白查審具奏申諭伊犂將軍明瑞等加意堵𠞰賊人事宜上諭軍機大臣曰據明瑞節次奏報進攻烏什情形朕以逆賊等一心死守即困憊出降亦不可寛宥今又據所奏捉生詢問之言是賊人口糧將盡不久即可取其城縱使歸降亦不過圖免誅戮非其本心益不可信著傳諭明瑞但遵陸續諭㫖加意堵截搜𠞰拆毁城堡以杜後患萬勿稍存姑息之見伊犂將軍明瑞等疏奏拏問納世通等情形明瑞等奏言伏思烏什軍務甚要納世通卞塔海平日辦事糊塗此次舉動尤爲錯謬荷䝉睿鑒將納世通卞塔海嚴拏正法即令觀音保明亮前往接辦但納世通等分兵西北若解至臣營相距數十里伊等聞屢次斥責之信必甚驚懼恐其知所犯罪重或致自戕未能明正國法臣等即派領隊大臣觀音保明亮前往將納世通卞塔海交與侍衛訥蘇等䕶送前來禀稱拏納世通卞塔海時齊集侍衛官員伯克宣讀諭㫖回人布魯特俱歡喜告語至愛隆阿伍彌泰因伊犂事繁不便遠離德福向在阿克蘇雖辦事糊塗近頗知省改可否暫行寛宥俟綽克托伊勒圖等到時再將伊革職治罪奏入報聞甲辰宣諭納世通罪狀喀什噶爾辦事副都統栢琨奏言臣欽奉諭㫖訪查納世通在喀什噶爾辦事時如何妄自尊大苦累回人并有無卑汚無恥之事臣於接見噶岱黙特等伯克官員之便留心訪查知納世通常出行圍每次約需馬歩回人二三百名以此或失生業及僱覔馬匹科派等項殊爲苦累再納世通每妄自尊大一切委任屬員不常接見回部伯克惟主事烏爾衮因畧曉回語小有才情納世通甚加寵信諸事交辦不加約束烏爾衮因此放縱向所屬回人勒索什物任意凌辱又詢之䕶軍叅領保成云烏爾衮曾管布魯特回人隊伍竟將布魯特散秩大臣阿竒木毆辱阿竒木深爲怨恨其毆辱之由大約因索物不遂等語至納世通有無卑汚無恥之事臣細加訪問衆人咸謂並無其事即納世通或有此心但伊不通回語且與回人隔城居住斷不能掩衆人耳目詢之副都統常岳所言亦同伏思納世通辜負天恩自干重咎早經聖明洞鑒交明瑞等辦理至烏爾衮恃勢凌辱回人索取財物甚至毆辱散秩大臣阿竒木情殊可惡若不拏問審明重治其罪不足以昭炯戒而服人心伊現在烏什軍營臣謹密咨將軍明瑞就近辦理奏入上諭大學士曰前因烏什之事朕以回人斷無無故作亂之理必係彼處大臣官兵等將伊等苦累不堪致啓釁端因交明瑞查奏嗣據明瑞等將納世通平素妄自尊大於辦事人員過為寵信等欵陸續奏聞今栢琨又將納世通在喀什噶爾從前帶領回人行圍并主事烏爾衮任意勒索回人毆詈伯克種種劣蹟查奏各城駐劄辦事大臣俱身受朕恩爲一城統領大員自應潔已率屬安撫回衆即偶爾行圍藉以操練官兵原屬可行但祗應帶内地兵丁至於回人俱以耕種爲生乃常派其出圍以致伊等廢時失業有是理乎曾見内地大臣有帶領農民行圍者乎實屬悖謬不堪再回部伯克俱係恩賞職銜品級之人該管大臣固不可過於優容亦不可任意凌賤至官員等尤非大臣可比烏爾衮不過一主事耳竟敢將散秩大臣阿竒木毆辱實出情理之外此皆大臣等平日過於寵信所致若不重治其罪何以示懲是以降㫖交明瑞阿桂等將納世通卞塔海治罪外併將烏爾衮等審明定罪著傳諭各城辦事大臣嗣後各宜守身潔已善視伯克一切事務秉公辦理屬下人員嚴加約束毋令擾累回衆以納世通爲炯戒著通行曉諭知之平定準噶爾方略續編卷三十
