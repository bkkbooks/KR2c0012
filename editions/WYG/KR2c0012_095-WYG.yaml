body:
  text: 乾隆二十二年夏六月丙戌命陞授三等侍衛穆倫保等上諭軍機大臣曰據唐喀禄等奏稱三等侍衛穆倫保索倫委署叅領多爾吉勒圖察哈爾委署叅領托郭齊等俱經効力年久此次隨同進兵中途遇賊奮勇勦殺等語著加恩將穆倫保補授二等侍衛多爾吉勒圖托郭齊俱著補授三等侍衛丁亥命奬賞叅贊大臣富徳等上諭軍機大臣曰據兆惠奏富徳等追襲阿逆已將巴爾達穆特各鄂拓克人衆收服阿逆窮蹙奔竄如係逃入哈薩克地方即領兵前往擒拏等語富徳等此次奮勇追襲甚屬可嘉如已經弋獲自可竣事若又逃竄他往則應暫行撤兵富徳毋庸前往哈薩克仍遵前㫖俟明春再行辦理至奏請將巴爾達穆特等各鄂拓克人衆暫在安撫事屬可行但伊等若聞現在撤兵明嵗仍行前進之語必致妄生疑懼致滋事端務湏宻行防範富徳著賞給荷包並發往荷包十個著富徳酌量賞給奮勇行走之圖倫楚竒徹布等以示鼓勵努三此次亦屬奮勉著施恩補授二等侍衛其厄魯特侍衛衮楚克扎卜著賞給孔雀翎並銀五十兩所有陣亡之察哈爾子爵策凌多爾濟著交部照例議䘏戊子定邊右副將軍兆惠等疏奏擒獲賊人達什策凌等兆惠等奏言六月初二日叅贊大臣富徳遣員押解阿逆之姪達什䇿凌至軍營親加訊問據供上年阿睦爾撒納因為哈薩克衆人不容回至布空地方今年二月内在博羅塔拉等處㑹集衆厄魯特商議共願推為台吉阿睦爾撒納即遣巴布克往告哈薩克求助馬駝牲隻並同往掠噶爾藏多爾濟扎那噶爾布等游牧又遣宰桑策凌扎卜至和托輝特青衮雜卜處通信阿睦爾撒納至濟爾哈朗遇見大兵即行敗走逃至伊瑪圖鄂倫淖爾等地方復遣我赴哈薩克借兵途中被宰桑塔什拏獲現在阿睦爾撒納或仍往哈薩克或逃入俄羅斯俱未可定等等並據副都統愛隆阿拏獲阿逆遣往烏梁海之塔爾巴及烏梁海等九人所供相同應將達什策凌解京治罪其餘即行正法奏入報聞己丑諭㕘贊大臣納穆扎爾等查拏策凌扎卜上諭軍機大臣曰昨兆惠等奏阿逆之姪達什策凌等供稱阿逆曽遣宰桑策凌扎卜至青滚扎卜游牧著傳諭納穆扎爾飭知各卡倫嚴行查拏策凌扎卜或竄入烏梁海亦未可定並著曉諭烏梁海内大臣察達克派兵緝拏務期戈獲秋七月辛卯朔命建龍神祠於嘉峪闗外上諭大學士曰嘉峪闗外路多戈壁従前並無水泉今年大兵經過鑿井數處俱得甘泉水勢騰湧普濟軍行往來商賈亦多利頼此實神明贊佑所致昔年聖祖用兵時地湧靈泉曽於托里地方建廟以答神庥今即照此例交該督敬謹建造該部遵諭具議以聞訓諭定邊將軍成衮扎布等成衮扎布等奏言侍衛烏爾登瑪瑺等擊敗叛賊扎那噶爾布尼瑪等臣即遣侍衛老格等帯兵堵截臣鄂實帯兵接應續烏爾登等報稱扎那噶爾布等分路敗逃臣又遣侍衛古爾格勒圖等追躡於六月十一日老格等報稱有布魯古特台吉諾諾什為尼瑪唤來相助聞敗潛逃被駐劄克勒特之台吉成衮等擒獲老格等收其馬駝牲隻其屬下二百餘户分別辦理又古爾格勒圖等報稱在察罕烏蘇阿敦庫里等處攻擊布魯古特賽音伯勒克等賊衆奪其寨柵將男婦數十口勦殺收取牲隻臣等將台吉諾諾什派侍衛中秋健鋭營前鋒竒木寧解送來京奏入上諭軍機大臣曰前因扎那噶爾布尼瑪等為永貴三格所敗向哈什河逃去是賊已過額林哈畢爾噶與成衮扎布相近而巴圖爾鳥巴什亦逃入伊犁因令其専辦追擒而以擒拏阿逆等賊付之兆惠今成衮扎布等於扎那噶爾布尼瑪既未擒獲巴圖爾烏巴什亦不知去向所奏鄂實接應烏爾登及前奏明瑞等與阿巴噶斯餘黨相持俱未有聲息僅擒獲賊黨諾諾什豈便可以此塞責耶且解送諾諾什亦不必使中秋中秋係御前侍衛朕特遣於行間効力倘人不堪用即當叅奏今擒一賊黨輙為派送此必中秋意欲回京藉此自便耳著傳諭阿里衮中秋至巴里坤令其留住其諾諾什即交竒木寜解送嗣後特遣効力之侍衛不當如此差遣仍將進𠞰情形作速奏聞乙未定邊將軍成衮扎布等疏奏追勦扎那噶爾布等情形成衮扎布等奏言叛賊扎那噶爾布尼瑪等被我兵擊敗分路逃走經鄂實等帯兵接應六月初九日公明瑞在額卜推嶺口遇賊千餘對敵奪其寨柵追至額林哈畢爾噶之烏里雅蘇台河賊人占據山崖排列鎗礮一時未能前進乃乗夜率鳥鎗兵二百名往奪其崖賊衆逃脱過半捉生詢問賊之游牧已於初二日遷移留兵舊寨相拒以延時日明瑞等因馬匹疲乏帯兵暫回侍衛烏爾登等亦於本月初六日尋蹤追賊由博羅和羅山口往哈什河源一路山險雪融泥濘難行臣等看賊人蹤跡仍向額林哈畢爾噶越嶺向博羅布爾噶蘇登努勒台逃去現在永貴駐兵此地與濟爾哈朗相近已行文令其就近派兵堵截奏入報聞叅贊大臣永貴疏奏追勦巴哈曼集情形永貴奏言扎哈沁叛賊巴哈曼集恃險立寨副都統額爾登額等雖收其牲隻一時不能攻取續經将軍兆惠派巴圖魯侍衛奎瑪岱等分𠞰賊黨并令拏獲之厄魯特屬人持書諭降額爾登額等將博羅通古之賊衆勦殺又問明拏獲之人係隨扎哈沁收楞額扎木布前來現據山險因持書往諭扎木布不從隨即覔路逃竄又捉生訊問巴哈曼集同四得泰帯三百户口越嶺而逃至衛和勒津暫住欲往克勒特烏魯特等鄂拓克去隨派總管端濟布接應奎瑪岱尋踪追勦并行文將軍成衮扎布侍衛烏爾登等協同堵截奏入報聞諭定邊將軍成衮扎布等㑹同勦賊上諭軍機大臣曰成衮扎布等奏稱追賊扎那噶爾布尼瑪等分路攻擊沿途每遇山谿雨雪賊衆或暫留拒守而游牧遷移逺去看來伊等總未盡力窮追若謂地形險阻賊衆何以能行若謂馬力疲乏豈賊馬獨能壯健鄂實明瑞等自應尋蹤追襲即不能盡行勦滅而收其牲隻捉生取路自可前進何至撤回今朕已將擒拏阿逆専委兆惠富徳即據成衮扎布等奏稱賊人去向與濟爾哈朗相近即著永貴専行堵勦至克勒特烏魯特游牧此時曽否内移務将此等鄂拓克加意按撫勿令其與賊衆相合若賊衆往額林哈畢爾噶恐其侵犯臺站著雅爾哈善永貴哈寧阿等留心防範再永貴前奏三格拏獲厄魯特和通喀喇告稱賊衆往庫克烏蘇會合克勒特烏魯特若大兵追急即遁入回部已令三格前往追勦則所報情形當在烏爾登之先何以未經奏及著查明覆奏命将叛賊青衮雜卜之幼子巴里交刑部監禁丁酉諭兩路將軍大臣奏報事宜上諭軍機大臣曰軍營将軍大臣俱可陳奏事件朕曽諭大臣有事告知将軍具奏者因従前軍營將軍大臣各懷意見紛擾無益耳若大臣領兵勦賊離將軍甚逺何必一一報知轉奏不獨時日稽延而伊等奮勉與否亦無由盡知且大臣等若謂報明將軍轉奏事體即可完結尤為陋習著諭兩路領隊大臣若與將軍相近仍照前㫖其分隊領兵與追賊逺去者軍前事件不妨自行陳奏命議處疎脱達瑪林之大臣官員等署理定邊左副將軍印務策布登扎布等奏言遵㫖拏問達瑪林因虚銜藍翎䕶軍瑪竒達前往遲延以致脱逃請將瑪竒達與前次差往之虚銜藍翎䕶軍阿隆阿革職治罪臣與阿蘭泰派員不慎並請交部議處奏入得㫖策布登扎布初經任事著從寛免議阿蘭泰著嚴加議處阿隆阿瑪竒達俱著革退虚銜藍翎䕶軍留於軍營効力贖罪戊戌命革原任河南巡撫圖爾炳阿職發往烏里雅蘇台軍營辦理糧餉事務己亥諭吐魯番貝子額敏和卓辦理回部事宜上諭額敏和卓曰將軍成衮扎布奏請辦理霍集占及波羅泥都朕意於明春進兵已諭知該將軍矣此二賊前被準噶爾囚縶朕特加恩俾仍領舊部乃負恩黨逆戕害我副都統阿敏道其罪必不可逭然皆二賊狡謀其脅從回衆尚屬可宥爾受朕厚恩且係回部望族為衆所信若能設計誘擒或使回衆離心執獻二賊更可不勞師旅爾即酌量辦理若必湏用兵則用兵若干應於何時進𠞰爾即據所見宻奏辛丒訓諭定邊将軍成衮扎布等上諭軍機大臣曰成衮扎布等奏稱軍營㑹集兵丁除駐劄臺站外現有三千餘而馬力不足今揀選兵丁酌給馬匹共得兵一千九百有竒派三格烏爾登由屯旺布多爾濟等分路進勦其馬匹乏弱兵丁一千四百餘名撤回於吐魯番休息又將喀爾喀兵四百餘名撤回游牧等語辦理殊不可解現在扎那噶爾布尼瑪等賊衆俱未擒獲又歸順之沙喇斯瑪呼斯等游牧亦當辦理諸事全未就緒而遽分兵休息何不於伊犁附近將乏馬牧養以截逃歸賊衆較之往吐魯番豈不更省䟦涉之勞但伊等業經調遣除喀爾喀兵自回游牧外其撤回吐魯番之兵不可至巴里坤仍將吐魯番等處屯種口糧果否足用交巴里坤辦事大臣查奏其三格額爾登額追賊回營據稱未曽遇賊伊等所司何事著明白回奏又擒獲之烏巴什供稱巴圖爾烏巴什現在察罕烏蘇居住等語此地去闥勒竒甚近成衮扎布等應遣人偵探何以未經奏及而惟以撤兵為事此必出於舒赫徳之意又所奏博爾奔察懇留於軍營効力尚知奮勉不似伊等全無籌畫著賞銀一百兩其侍衛中秋所報解送之諾諾什於渡河時欲逃因以刀追刺落水其言支離無據著查明具奏仍將追勦扎那噶爾布尼瑪及現辦巴圖爾烏巴什等情事作速奏聞命將隨同阿覇垓親王索諾木喇卜坦擒獲賊盜之台吉官員諾爾津扎卜等交部議敘丙午定邊右副將軍兆惠疏奏擒獲叛賊巴雅爾兆惠奏言臣於五月十九日自濟爾哈朗起程六月初二日至額米爾西岸適遇叅贊大臣富徳遣解阿睦爾撒納之姪達什策凌前來准富徳咨稱遣擒獲之厄魯特特黙齊喀喇前往偵探阿逆踪跡有曽在卡倫行走之厄魯特侍衛衮楚克扎卜等報知阿逆在額卜克特地方距軍營百餘里賊衆約七百餘人富徳隨遣竒徹布達禮善努三等領兵前進而身率羅卜藏多爾濟愛隆阿圖倫楚等隨往五月初一日至額卜克特山探知阿逆已遁遂分路追躡據達什策凌所供阿逆或逃入塔爾巴噶台途次遇竒徹布等亦稱賊踪雖有數處總不離塔爾巴噶台前後乃分兵四路追勦二十一日見有游牧踪跡捉生訊問知係叛賊巴雅爾所在逃去已三日或阿逆亦在其内且巴雅爾亦應擒拏因尋踪深入二十四日至塔爾巴噶台山後極險處竒徹布等截賊去路羅卜藏多爾濟等從東攻入奪險五處夜半時巴雅爾帯眷屬五十人逃出因令竒徹布等前往追擒而暫留勦洗餘黨收取馬駝亦即前進二十八日驍騎校賽扎木蘇擒獲巴雅爾之子塔喇巴勒六月初三日愛隆阿報知五月十三日與哈薩克接戰旋即歸降并竒徹布陣亡之信隨即帯兵接應本日至愛呼斯分兵協助圖倫楚達禮善占頗圖海蘭察等兩路搜尋仍帯兵前往山梁堵截不移時巴雅爾被海蘭察追及猶引弓欲射海蘭察射中其肘占頗圖射中其脛始被擒獲并獲其妻妹及二子查叛賊巴雅爾於五月二十四日夜逃出即令竒徹布等隨踪窮追十有餘日巴雅爾繞行塔爾巴噶台三次馬力疲乏始回原處被擒問以阿逆及哈薩克錫喇所在堅稱不知等語臣竊惟巴雅爾受恩封汗乃敢附和逆亂實為要犯謹派侍衛額爾登額馬甲奬給孔雀翎海蘭察等將巴雅爾馳驛解京其哈薩克歸順情形并派額爾克沙喇努三前往撫納另摺奏聞奏入得㫖富徳著授為内大臣賞給世職貝勒羅卜藏多爾濟封為郡王額爾克沙喇封為公副都統愛隆阿交部議敘侍衛努三授為頭等侍衛首擒巴雅爾之海蘭察其次占頗圖俱授為三等侍衛海蘭察賜號額爾克巴圖魯占頗圖賜號塔蘇爾海巴圖魯各賞銀一百兩其藍翎侍衛額爾登額等俱交部議敘陣亡之侍衛竒徹布察例加倍優䘏伊子富朱隆阿以頭等輕車都尉世襲在三等侍衛上行走定邊右副將軍兆惠疏奏哈薩克歸順情形兆惠奏言臣於六月十二日在塔爾巴噶台之薩里地方接叅贊大臣富徳咨稱貝勒羅卜藏多爾濟副都統愛隆阿等追勦巴雅爾五月三十日至愛登蘇遇賊五十餘人突出拒敵侍衛竒徹布中鳥鎗陣亡賊已敗回又來賊衆二百餘鏖戰數次正調後隊接應復有賊衆舉瑪尼纛四桿排立遣人止戰問係何兵答以天朝征討準噶爾巴雅爾至此遂遣人來告云我等係哈薩克阿布賚屬下阿布賚遣伊弟阿布勒比斯侵擾厄魯特游牧并令如遇大國之兵即出去嵗將軍所發印文為據以來歸附適因倉卒不知是以拒戰我等即退兵告知阿布賚約於五日内遣人來見將軍叅贊等語六月初三日巴雅爾既擒適哈薩克得木齊和托圭達木等到營問係阿布勒比斯等問安請罪並獻馬二匹告稱我等原不敢擅動兵戈祗因阿睦爾撒納去嵗逃來大國遣人索取沿邊居住之人未即達知阿布賚是以煩大皇帝征討致游牧驚擾阿布賚欲将阿賊擒獻以求安静先為所覺盗馬逸去近聞厄魯特潰散欲乗間取其貨物不期猝遇大兵致彼此傷損今特獻馬請罪倘阿賊入我境必行擒送如將軍㕘贊遣人往見阿布賚必遣人請罪并懇帯兵効力以圖往來交易等語因再三詰問仍如前説看其情詞恭順隨遣叅領達里庫等十一人同來使往見阿布賚諭以天朝與哈薩克本無嫌隙因阿逆叛亂逃入爾境爾等反為所愚出兵抗拒是以有干征討将軍等本欲在爾境過冬俟今春再行進勦大皇帝仁恩謂若久居爾境恐爾等不得安生故撤回大兵並傳諭爾擒獻逆賊今爾等既願歸附大皇帝自必加恩封賞或更許爾貿易倘此際阿逆竄入爾境務當擒獻否則我將軍現在三路進兵已將準噶爾勦滅必更入爾境矣六月初七日達里庫至愛呼斯河與阿布賚相見隨以前言開導阿布賚始欲與兄弟商酌旋詰以兵臨游牧不便遲延阿布賚云我係為首之人自應主張我等自祖父來未能受中國皇帝恩典今情願將哈薩克全部歸順永為大皇帝臣僕隨具表文並進馬四匹遣使亨集噶爾等七人入覲又遣使送馬云為臣等賀禮初十日回至富徳軍營富徳仍約與阿布賚相見來使云阿布賚已帯兵巡查游牧如欲知哈薩克全部懇遣大員前往㑹同阿布賚查明具奏十三日臣至富徳軍營撫慰來使遣達里庫等伴送入京又遣台吉額爾克沙喇侍衛努三等攜縀疋禮物答賀與所遣使人同往臣等復得使人申明利害諭以擒獻阿逆並囑額爾克沙喇等見阿布賚時奬其恭順促擒逆賊至查辦各部落但就其情願歸附者偕來不必相強若言及貿易則告以軍營現無商販湏豫行指明處所約定時日以便招商備辦阿布賚如求入厄魯特游牧則告以疆界不可踰越萬難聽許臣等伏思哈薩克逺慕徳威歸順屬實倘阿逆仍入其境或可得協擒之力否則臣等亦必深入務期擒獲謹將阿布賚所進托忒字表文録副馳奏奏入得㫖下部知之尋命譯進哈薩克阿布賚歸降表文表云哈薩克小汗臣阿布賚謹奏中國大皇帝御前自臣祖額什木汗揚吉爾汗以來從未得通中國聲教今祗奉大皇帝諭㫖加恩邊末部落臣暨臣屬靡不懽忭感慕皇仁臣阿布賚願率哈薩克全部歸於鴻化永為中國臣僕伏惟中國大皇帝睿鍳謹遣頭目七人及隨役共十一人齎捧表文恭請萬安並敬備馬匹進獻謹奏丁未諭哈薩克阿布賚奉天承運皇帝諭哈薩克汗阿布賚朕為天下共主中外一體爾哈薩克為準噶爾所隔未通貢使兹以大兵平定準部率屬歸誠朕深鍳悉據將軍等奏爾既歸降應加封號並察明游牧朕謂不必過拘爾等僻處遐方非可與喀爾喀諸部比爾稱號為汗朕即加封無以過此或爾因係自稱欲朕賜以封號亦待來奏朕惟期爾部安居樂業俾游牧各仍舊俗即貢獻亦從爾便如遣使入覲朕自優加賞賚至逆賊阿睦爾撒納負恩叛亂誘爾部衆以致游牧不安將軍等奏爾所言如逆賊等逃入境内即當擒獻朕深信之爾今既向化歸誠則當知準噶爾全部悉我疆域宜謹守本境勿䦨入侵擾惟我軍凱旋後厄魯特等或間有率游牧竄入爾境者爾縛獻首惡而收其屬人尚屬可行兹因爾使入覲還歸尚需時日先由驛遞馳諭並賜爾大縀四端蟒縀二端爾其欽遵朕訓永受無窮之福特諭命以哈薩克歸降宣諭中外上諭大學士曰定邊右副將軍兆惠叅贊大臣富徳奏稱哈薩克汗阿布賚悔過投誠稱臣入貢等語哈薩克一部素為諸厄魯特所畏去嵗逆賊阿睦爾撒納逃竄往投我師追入其境阿布賚率部落逺徙旋欲縛獻逆賊以贖罪為賊所覺遂遁回準噶爾今兆恵等率師進勦擒獲叛賊巴雅爾則逆賊遊魂其能久逃斧鉞耶況賊所藉以虚張聲勢者惟一哈薩克今已歸降願擒賊自効則益無所恃朕心為之欣慰此實上蒼福佑列祖鴻庥以成我大清中外一統之盛然外間無知者流必又謂其不可深信而以阿睦爾撒納巴雅爾等已降復叛為辭不知哈薩克越在萬里外未嘗遣使招徠乃稱臣奉貢自屬本願則歸斯受之不過略示覊縻如安南琉球暹羅諸國俾通天朝聲教而已並非欲郡縣其地張官置吏亦非如喀爾喀之分旗編設佐領也即準噶爾初歸時亦祗分四衛喇特令自為理而伊等屢作不靖是以奉行天罰哈薩克自非準噶爾近接西陲可比若謂準噶爾之事本不當辦則尤不知事理者夫編氓子孫尚期析薪負荷況以兩朝未竟之緒而適值可乗之機乃安坐而失之使天下後世傳為遺憾則朕亦何以上對皇祖皇考在天之靈耶況如阿睦爾撒納初來時若拒而不納伊必將蹂躪我喀爾喀饜其刼掠而後已從前所降諭㫖甚明乃今春南巡時有江南監生張汝霖浙江訓導章知鄴妄請從軍摺内有損兵折將之語夫草野訛傳本不足論然此等妄徒何嘗有忠君愛國之心不過逞其幸災樂禍之口而天下之大其無知而造言者正復不少試思以從古不入版圖之地定之於三五年間安能保其必無一二受傷之人況所用之兵皆我八旗索倫初未嘗徴發閭左調集耕甿如杜甫所哀垂老無家新婚諸咏至現在軍需較之雍正年間所費纔十之三四而各省偏災之蠲賑河工之動撥一切經費賜賚何嘗因此而少減且視昔有加焉較之前代以用兵而増税捐俸者為何如耶朕初非惡逸好勞窮兵黷武必以此事侈誇逺略特以國家大事無過於此而因勢乗便正為長顧逺慮息事寧人之計若以光武之不納鄯善車師為人君盛節不知彼時内亂尚未靖安有餘力他圖若可為之時光武亦必為之而可與本朝全盛之時相提並論耶總之阿睦爾撒納一日不獲則邊陲一日不寧而阿布賚既降則逆賊不患其不獲逆賊既獲則準噶爾全局可以從此奏功矣著將哈薩克阿布賚降表繙譯宣布中外並將此通行曉諭知之臣等謹案哈薩克在古康居大宛間漢武帝興師伐宛慮康居之救僅得其馬以歸史冊所傳便為宣威絶域前此逺隔準夷未通聲教當策妄阿喇布坦噶爾丹策零時不能兼并其地而達瓦齊等則更資其力自是準夷内亂王師罙入㐫渠逆孽咸以為逋逃藪即哈薩克亦未必不挾持兩端貪收小利及遇我偏師動輙挫衂乃率其全部傾心内屬天威所播無逺弗届觀其奉持将軍印文為納降左劵是内附之心匪朝伊夕我皇上懷柔偉略勅諭其君長仍依舊俗各予安全在哈薩克震讋之餘獲䝉煦育疇弗感悦於仁至義盡之淵𠂻而内附之心益堅即準部全局亦從此大定矣至追溯軍興以來既鮮徴發調集之煩經費所需亦無嘗少絀建非常之原而黙運神機行所無事誠亘古罕有之隆軌也申諭叅贊大臣唐喀禄等協擒阿睦爾撒納上諭軍機大臣曰朕昨諭兆惠等擒勦阿睦爾撒納及巴雅爾而以擒拏哈薩克錫喇委唐喀禄今富徳等已擒巴雅爾哈薩克又已歸降想阿逆不敢復入或往投俄羅斯現據兆惠等遣兵堵截著傳諭唐喀禄令其留心協勦阿逆或入俄羅斯或往阿爾台務期擒獲仍以擒拏哈薩克錫喇為要再此二賊或投烏梁海亦未可定並傳諭策布登扎布令其曉諭察達克加意防範申諭兩路將軍協擒阿睦爾撒納上諭軍機大臣曰兆惠等已擒獲巴雅爾而逆賊阿睦爾撒納及扎那噶爾布尼瑪巴圖爾烏巴什哈薩克錫喇等尚在連逃計此數賊力量已窮惟竄伏山谷以延時日著傳諭兩路將軍若將扎那噶爾布等賊俱擒而阿逆尚未獲則以兩路得勝之兵如行圍之中軍纛相對捲回使無地可匿昨據兆惠等奏恐阿逆竄入俄羅斯因派兵堵截此固豫防之善策若竟料其竄入遂生怠心則大不可朕意賊人若潛伏僻處候我撤兵再出哨聚則用兵何時可已此時兩路軍營湏速以擒賊為事即屆撤兵之時只應於濟爾哈朗等處擇地駐劄臨期再行具奏不可豫使兵衆知之以致觀望不前也戊申訓諭定邊將軍成衮扎布等上諭軍機大臣曰成衮扎布等奏俟辦理綽和爾烏喇特昂吉岱等得其馬匹即選派兵丁赴額林哈畢爾噶商辦一應事宜等語殊無頭緒即如巴圖爾烏巴什理應速行查拏所有逃往土爾扈特之言原不可信伊自以為噶爾丹策零之壻且欲為準噶爾總台吉茍非甚迫豈肯逺遁必藏於準噶爾僻地候我撤兵復回伊犁伊等亦應意料及此若撤兵之後而賊人忽出則誰任其咎耶至所奏沙喇斯宰桑三都克請將游牧内移其瑪呼斯游牧亦願同移當看其情形酌量辦理又三都克往擒瑪呼斯宰桑多爾濟未獲與侍衛托倫泰互訐據三都克禀稱托倫泰曽受多爾濟之馬又曽將擒獲正法之回子七人疎脱一名未經具報伊等即應傳唤質訊何得僅行文巴里坤大臣俟其回報耶今已傳諭提督豆斌總管五十六將托倫泰帯至軍營與三都克面質果有此等事自應正法再烏爾登所擒之美諾和什僅一賊犯交把總王俊臣帯兵五十名解送尚致脱逃深屬不堪著將王俊臣即行正法烏爾登著交部嚴加議處可傳諭成衮扎布等速催明瑞就辦理綽和爾等鄂拓克之力往擒巴圖爾烏巴什亦即親身前赴伊犁之察罕烏蘇等處查拏或逃往他所湏確查具奏如謂查緝無踪而賊犯忽然生發朕惟伊等是問定邊將軍成衮扎布等疏奏酌籌沙喇斯瑪呼斯游牧内移事宜成衮扎布等奏言臣等遣沙喇斯宰桑三都克往拏瑪呼斯宰桑多爾濟未回因帯兵前往辦理六月二十九日據三都克遣伊屬人並拏獲兩和卓木之奸細阿卜都爾璊前來次日三都克親到軍營告稱多爾濟已經逃走現派兵前往追拏又聞兩和卓木已聚兵豫備我等游牧與彼相近移於阿勒輝外吐魯番内傍塔什哈山之地過冬今帯馬百匹以助大兵之用等語臣等查三都克自入覲回至軍營節次差遣事件皆伊屬人前往今雖未拏獲多爾濟而業與回部有隙明年進勦時令為前隊可得其力請遵前奉諭㫖将三都克授總管職銜分管沙喇斯人衆其瑪呼斯部落願與沙喇斯一同内移臣等察看情形酌量辦理復訊問阿卜都爾璊據供波羅泥都現居喀什噶爾地方霍集占帯兵七千現居阿克蘇地方因五月間厄魯特錫克錫爾格敗逃恐大兵進勦豫謀防守其前遣之副都統阿敏道與兵丁百人皆為所害嚴禁屬人不許洩露等語謹將霍集占送吐魯番文書譯出併原文恭呈御覽奏入報聞辛亥定邊將軍成衮扎布等疏奏擒獲叛賊尼瑪成衮扎布等奏言臣等令侍衛烏爾登副都統三格等往擒扎那噶爾布副都統職銜由屯貝勒旺布多爾濟等往擒尼瑪臣等相機策應據由屯等報稱七月初一日行至哈什河拏獲尼瑪屬人都噶爾扎卜作為嚮導帯兵二百餘名速進初二日黎明到哈什河之阿爾察圖山口前隊侍衛占丕納等見賊踪跡遂調集官兵分兩翼圍住游牧乗勢攻擊尼瑪等賊衆據山放鎗官兵四面叢射賊遂奔潰因追殺賊衆二百餘將尼瑪及伊子擒獲其妻女及屬下台吉等俱中箭身死收取人口什物馬駝牲隻隨訊問尼瑪扎那噶爾布所在據供扎那噶爾布於六月中旬與呼爾璊台吉達瓦布魯古特台吉琿齊等相惡已被擒獲因其出痘頗重尚未解送等語適三格等前隊兵到遂告知令其速進仍令都噶爾扎卜前導等語臣等俟尼瑪解到時派員解送來京其眷屬即行正法奏入上諭軍機大臣曰成衮扎布等奏擒獲叛賊尼瑪並聞扎那噶爾布被擒之信副都統職銜由屯貝勒旺布多爾濟効力可嘉由屯著授為副都統旺布多爾濟給與郡王品級其首次得功及被傷官兵俱著查明議敘朕昨命兆惠回至濟爾哈朗軍營者特為擒拏扎那噶爾布尼瑪等賊今成衮扎布等業經擒賊已諭令停止前來現在惟擒拏巴圖爾烏巴什搜勦阿巴噶斯哈丹昻吉岱等游牧地方始可寧謐又如色布騰巴爾珠爾疎脱之屯圖卜中秋疎脱之諾諾什王俊臣疎脱之美諾和什亦必查拏擒獲方無後患成衮扎布等其益加奮勉以奏虜功定議喀爾喀臺站馬駝事宜署理定邊左副將軍印務策布登扎布奏言烏里雅蘇台以内喀爾喀二十臺原未官辦馬駝惟派撥臺站之馬甲二十二戸以本身應備馬三匹當差後私馬不敷由四部落公派每臺馬一百匹駝十隻又派兩扎薩克協濟其倒斃疲瘦馬駝俱自應補换未免拮据今差務較前頗少似應將協濟馬駝撤回其喀爾喀二十臺站請照喀喇沁臺站例每臺官辦馬五十匹駝二十隻准以馬三分駝二分按年作為倒斃給價買補約計銀三千三百九十兩其所辦馬駝毋庸給價即就現在馬駝挑選凑足奏入得㫖軍機大臣議奏尋議喀爾喀四部落供應馬駝原分内應辦之事但伊等數年來効力軍前又逢災歉我皇上加恩賑貸一切動用官項今北路軍營差務簡少應如該將軍所奏喀喇沁既官辦馬駝准將協濟之扎薩克等撤回其烏里雅蘇台以内喀爾喀二十臺照例官辦馬五十匹駝二十隻於臺站内挑選凑足准其按年以馬三駝二銷算給價買補仍交該將軍等嚴飭臺員務期買補足數加意牧養庶教伊等生計有益而公事亦無貽悞矣奏入上從之乙卯定邊將軍成衮扎布等疏奏布魯古特台吉琿齊獻扎那噶爾布首級成衮扎布等奏言據副都統由屯等擒獲尼瑪詢問扎那噶爾布踪跡據稱已被台吉達瓦等擒獲因將情形告知副都統三格并帯都噶爾扎卜為導臣等隨飭令協力擒拏并令事竣後協同叅贊大臣永貴進勦阿巴噶斯等游牧今據三格報稱得由屯所告信息於七月初三日至博羅和羅遇額林沁達瓦等百餘户放鎗迎敵即突入奪其嶺口捉生詢問知額林沁達瓦已逃往安集哈雅正欲進勦初四日早據總管端濟布遣人來報適遇琿齊達瓦等率衆投順已將扎那噶爾布首級送到琿齊等又將額林沁達瓦等招服是以公同商議休息馬匹暫各回營將陣亡受傷人等查報收取什物牲隻分别解送賞給等因謹據呈具奏奏入上諭軍機大臣曰成衮扎布等奏稱台吉琿齊達瓦等殺扎那噶爾布獻馘來降又招降額林沁達瓦等語琿齊等殺賊自贖尚可受降若額林沁達瓦始猶抗拒繼迫兵威何得信為降服著傳諭雅爾哈善永貴等俟端濟布將降人送到時曉示琿齊達瓦有擒殺逆賊之勞大皇帝恩㫖許爾自贖賞還原職即來京朝覲爾等游牧亦當内移又向琿齊等面示額林沁達瓦爾係被迫投降非伊等之比今解送京師候㫖看伊等情形稍有猜懼即於軍營正法亦可若俱行解送即宜嚴加防範勿致脱逃至伊等游牧人衆有強悍可疑者即當勦絶所餘户口或歸併烏魯特鄂拓克内居住酌量辦理平定準噶爾方略正編卷四十一
