body:
  text: 乾隆二十四年冬十月庚子定邊右副將軍富徳等疏奏拔達克山呈獻逆賊霍集占之尸函首送京富徳等奏言臣等向拔達克山頭目素勒坦沙索取逆賊霍集占波羅泥都再行遣使前往八月二十五日據巴圖魯侍衛額爾登額遣吉林佐領葉卜充額等稟稱聞拔達克山因鄰部欲來取二賊遂先行殺死隨於九月初九日面見素勒坦沙給與檄文賞物據稱擒獲霍集占等之後即送至柴扎卜拘禁有琿都斯部落前來索取霍集占等又欲潛通我讐國塔爾巴斯所遣之人為我擒獲因集衆公議將伊等殺戮以免後患等語額爾登額等云爾部既獲二賊不縛獻而擅殺已屬不合此時即應將首級獻出素勒坦沙尚以經典為詞再三辯論始云我等已歸順大皇帝但自行獻出恐衆人不服應請遣人驗實再定額爾登額等密諭從準噶爾脱出熟識二賊之右衛滿洲納達齊前往據云驗過霍集占之尸屬實其瘞埋波羅泥都之地與霍集占中隔一牆但有血跡並無尸骸又令同行回人素勒坦和卓密雜帕爾詳驗俱稱確實隨經額爾登額驗得霍集占之尸左手有鳥鎗傷脇上鳥鎗傷直透腋下有鳥鎗輕傷因詢波羅泥都尸骸據稱波羅泥都曾囑其從人云一切罪孽俱汗和卓木所為我死後不可同一處葬或移至喀什噶爾更好等語伊兄弟隨從共四十餘人内有十餘人潛逃或係將尸盜去當遣人究問遂於十三日遣其親信往柴扎卜將守尸之們多索丕等嚴審十九日據素勒坦沙告稱刑訊㸔守人等實不知為何人盜去若未殺而詭稱已死日後敗露天朝豈能容恕隨舉回經設誓額爾登額等亦多遣回人厄魯特等在外密訪俱稱殺死是實二十一日巴圖魯侍衛伍岱將回人們多索丕回婦濟爾噶勒等𫝊来訊問僉稱被殺又據們多索丕告稱兩和卓木在柴扎卜原住居兩處十餘日後有數人来將二人拘於一室三日後忽有二百餘人圍守房屋旋有數十人突入云今来殺汝二人遂將我等曵出良久我搶入門内見二人俱被殺死隨從者逃出十餘人或將波羅泥都之尸盜去等語濟爾噶勒告稱兩和卓木被殺時我與瑪拉塔什阿琿之妻及鄂勒錐圖索丕等三人擁擠不肯出門有執刀二人彼此相顧一人先砍小和卓木首聫一綫其大和卓木被砍未絶我抱持哭泣鄂勒錐圖將一人刺倒衆人遂疊刺和卓木胸前併刺死鄂勒錐圖將我二人曵出我等奮身直前求死瑪拉塔什阿琿之妻遂被刺傷數處而死我被刺絶而復甦等語薩喀勒索丕告稱兩和卓木被殺後我將尸骸掘地埋藏當日即被𫝊喚到此不知為何人盜去等語額爾登額等再四詰訊并將霍集占首級令其識認據呢雅斯索丕哭告伊自幼由我撫養指㸃額角出痘瘡痕記識甚確因將霍集占首級及親見殺死波羅泥都之人令其於二十二日起程將此先行報知三十日額爾登額等到營臣等與領隊大臣侍衛官員及伯克霍集斯摩羅郭波和卓布魯特阿竒木令其識認俱云詳㸔首級視生前雖覺稍變但面龎可識其髪際右太陽瘡痕鬢角及唇頦㣲鬚實係霍集占首級無疑臣等諭来使端伯克云爾等不將逆賊縛獻又不候使人到日遽行殺死而波羅泥都尸骸亦未尋獲况前差侍衛薩穆坦自爾部起程次日爾部遣人追告霍集占因傷身死今又云與波羅泥都同時被殺前後互異顯係藏匿波羅泥都但將霍集占尸身送出據稱我等全部皆投誠大皇帝欲安生業故將二賊擒獲但鄰部俱来索取若縱之他往必㑹兵報讐前此拘禁時𫝊聞霍集占傷重身死及遣人往驗尚存薩穆坦行後琿都斯即領衆五千勒取二人因决計殺死以絶其望但我部不知罪人之尸關係甚重以致㸔守不嚴深為悔恨此次遣使起程素勒坦沙即領兵二千往禦琿都斯之衆若波羅泥都未死或縱其逃去豈能保無敗露等語臣等又詳訊們多索丕等回人俱供係撫養二賊及隨從多年之人親見被殺與額爾登額所報相同查蘇朱克圖之妻濟爾噶勒係奬賞孔雀翎布魯特阿竒木之姊薩喀勒索丕之妻係公鄂對姪三等侍衛阿卜都爾滿之姊伊等現在軍營因令其密行訪問亦稱所言屬實臣等伏思逆賊霍集占波羅泥都䝉聖主繼絶舉廢生死肉骨之仁乃敢悍然反噬傷害使臣抗拒大兵種種逆惡擢髪難數今年閏六月臣等奉命三路進𠞰逆酋聞風潛遁全部乞降臣等輕騎追襲仰藉威福屢摧賊衆陣斬二千餘人收降一萬四千餘口賊勢窮蹙逃入拔達克山臣等以利害曉其酋長二賊遂被拘繫卒就誅戮函首獻欵恭順有加此皆我皇上神謨睿慮纘承聖祖世宗綏靖遐荒之丕緒自用兵以来平定準噶爾全部左右哈薩克東西布魯特塔什罕安集延烏梁海諸部先後内附今又平定回部殱厥渠魁收降拔達克山部落十萬户博洛爾部落三萬餘戸闢地數萬里請為臣僕者數十部五載之間建此偉績考之自古帝王未有若斯之神速者臣等職在戎行幸宣敵愾尤不勝懽欣踴躍謹遣乾清門二等侍衛噶畢雅圖巴圖魯額爾登額等將逆賊霍集占首級函送京師并將親見殺死波羅泥都之們多索丕等及拔達克山素勒坦沙来使額穆爾伯克送京臣等即領官兵於十月初二日回葉爾羌欽遵前奉諭㫖將舊派兵丁分起撤回新派兵丁酌留鎮守俟至日另行詳議具奏敬書露布由驛馳遞奏入上諭軍機大臣曰富徳等奏報拔達克山素勒坦沙全部歸誠呈獻逆賊霍集占首級從前兆惠富徳等撫定葉爾𦍑喀什噶爾等城時朕即諭以速追逆賊為要迨富徳等勒兵向拔達克山索取又諭以理應速入追擒今二賊伏誅情事確實則伊等雖未能生擒俘獻而勞績殊堪嘉悦兆惠富徳明瑞阿里衮舒赫徳及軍營大臣官兵俱分别加恩宣諭中外軍務告竣兆惠富徳等即遵㫖来京商辦善後事宜大臣官員等亦著分起前来至伯克霍集斯入覲時將應行入覲之伯克等酌派數人同来勿令生疑各隊兵丁若係十九年二十年派出者即撤回各該處其餘兵丁酌派駐防聞副都統由屯患病若尚未全愈仍令其加意調養不必亟行前因舒赫徳一人駐劄葉爾羌曾諭阿里衮一同辦事但喀什噶爾尚未有駐劄大臣或令阿里衮前往著舒赫徳等酌議具奏伊等仍於領隊大臣侍衛内酌留二三人以備差遣再富徳等奏波羅泥都身尸未獲回人等有盜往喀什噶爾之語今將逃走之逆賊親隨等十五名𫝊諭阿里衮等留心查獲併身尸送京其富徳所送隨從逆賊之回婦内有布魯特阿竒木及鄂對姪阿卜都爾璊之姊俱著交付伊等仍將軫念勞績加恩賞給之處曉示其烏沙克伯徳爾格等䧏人俱酌量安插及移送肅州分賞官兵前諭策布登扎布於舎楞投入俄羅斯一路駐兵堵截今逆賊授首著即回游牧弩三永貴不必追𠞰嗎哈沁戕害徳舒之賊著舒赫徳於来春派兵數百名搜捕務獲五吉清馥亦遵前㫖將所解馬匹於中途聞信後擇地牧放候㫖安泰蘇勒亦著回京舒常可往省伊父再行轉回額敏和卓玉素富俱著勞績此時若同来則回部經理乏人額敏和卓著加恩晉封郡王同舒赫徳駐劄辦事玉素富著加恩賞給郡王品級来京請訓後回游牧休息俟更换額敏和卓時前往此次紅旗奏捷甚為迅速著加恩將經過各臺站交該管大臣詳查造册送部議敘併將大功告成𫝊諭章嘉胡土克圖及駐藏大臣俾衛藏及阿里拉達克等處知之賜拔達克山素勒坦沙勅書奉天承運皇帝勅諭拔達克山素勒坦沙將軍富徳等奏爾擒獲逆賊霍集占波羅泥都因鄰部生心俱行殺戮遣使請驗逆尸函首以獻全部歸降願為臣僕恭順之忱深用嘉悦俟爾使至京自必優加賞賚兹以降勅賜爾蟒緞四端其爾處所拘之阿卜都海里鄂斯璊俱受逆賊信任附和為惡將軍大臣等奏請諭爾縛獻朕念伊等尚非霍集占之負恩反噬可比爾等若以業經誓約乞其餘生朕亦加恩賞給但此二人在葉爾羌喀什噶爾諸回人中頗著名字爾㳺牧相近當嚴行約束毋俾潛逃生事致有乖誠悃爾與所屬其善自為計以永荷將来之恩澤特諭以平定回部宣諭中外上諭大學士曰將軍富徳等奏報拔達克山素勒坦沙奉檄拘禁逆賊霍集占等於柴扎卜嗣因霍集占欲與琿都斯等部落暗行攻襲當將霍集占波羅泥都𠞰殺呈獻霍集占首級并看守逆尸人等隨經驗看明確馳送京師等語前此大兵平定準噶爾各部悉入版圖而東西布魯特左右哈薩克無不傾心向化獨逆酋霍集占兄弟辜恩反噬不得不興師問罪雖葉爾羌喀什噶爾等城以次撫降設官定賦將就蕆事而兇渠一日不獲則軍務一日不竣是以旁午軍書焦勞籌畫並非好為窮兵黷武之舉自將軍兆惠富徳等勵衆選兵先後追𠞰屢獲全勝賊勢愈蹙安集延與拔達克山諸部共知感仰恩威歸誠恐後今既奉檄自効逆酋授首從此邊陲寧謐各部落永慶安全露布逺聞此皆仰荷上蒼福祐宗社鴻庥俾朕得纘皇祖皇考未竟之丕緒惟益勵持盈保泰之心夙夜倍切氷兢此意當與中外臣民共之兹當殊勲克奏茂典應修郊廟告功益申昭報時當長至朕方躬祀圜丘其勅所司敬舉受釐宣㨗之忱載諸祝冊用申懇欵恭惟盛京三陵禮應親謁叩謝但以序届冬寒恐勤屬車之衆特遣親王前往恭代東陵西陵即擬親赴展謁而計程往返適届慈寧萬夀慶辰敬以明年獻嵗諏日親詣行禮然終不足以抒積悃擬告祭太廟之日朕親行辰事至方澤社稷照例遣親王恭代冬至次日朕恭詣皇太后宫行禮亦於表文内増撰武成慶語其御殿頒詔諸儀一併舉行既以循令節而迓崇禧即以慰慈懐而布溥惠其餘一切典禮各該衙門察例舉行將軍等凱旋至京時朕當親臨郊勞念我大臣官弁等敵愾奏功勛施懋著酬庸論賞應備恩榮將軍兆惠己晉公階并迭賜章服其加賞宗室公品級鞍轡以示寵異將軍富徳著晉封侯爵并賞戴雙眼翎兆惠富德再著加授一子為三等侍衛㕘贊公明瑞公阿里衮并賞戴雙眼翎舒赫徳及在事大臣官員均交部從優議敘兵丁之在行陣者賞給兩月錢糧其葉爾羌等城兵丁并賞錢糧一月爰著策勛之令典益昭綏逺之鴻猷將此通諭知之命陞賞霍斯庫魯克𠞰賊有功官兵上諭軍機大臣曰前據明瑞奏敘𠞰賊於霍斯庫魯克之奮勉有功官兵等應加恩陞賞以酬勞績乾清門二等侍衛什爾瑪海巴圖魯徳爾森保著授為頭等侍衛三等侍衛哈朗圭巴圖魯塔瑪鼐三等侍衛滿柱俱授為二等侍衛二等侍衛莽喀察額爾克巴圖魯海蘭察俱授為頭等侍衛藍翎侍衛肯特克巴圖魯羅托著授為三等侍衛打牲㕘領什爾瑪海巴圖魯奬賞孔雀翎湍濟勒圖著授為總管佐領齊爾瑪海巴圖魯奬賞孔雀翎哲野勒圖著授為㕘領驍騎校奬賞藍翎立格署防禦驍騎校奬賞孔雀翎卓楞徳衣驍騎校烏納哈俱著授為防禦馬甲奬賞藍翎賚布哈伊特格勒圖巴圖魯領催奬賞藍翎穆庫楚白都訥奬賞藍翎領催納喇善吉林領催堪泰俱授為驍騎校奬賞藍翎前鋒遜塔著授為䕶軍校打牲馬甲察罕泰八十九額勒圖呼爾厄魯特馬甲們都伯勒克俱授為領催鑲白旗滿洲䕶軍校署章京常青著授為副䕶軍㕘領副䕶軍校富明鑲黄旗滿洲藍翎長富昆鑲白旗滿洲前鋒烏爾泰鑲黄旗滿洲前鋒九十俱著授為䕶軍校此内莽喀察等奮勉陷陣援出官兵應格外加恩莽喀察著賜號丹巴巴圖魯立格賜號特古爾徳爾巴圖魯卓楞徳賜號特古斯巴圖魯額勒圖呼爾賜號哈叨巴圖魯們都伯勒克賜號卓里克圖巴圖魯九十賜號庫魯巴圖魯各賞銀一百兩命額駙色布騰巴爾珠爾等管理大閱事務上諭軍機大臣曰拔達克山遣使入覲應大閱八旗官兵俾知天朝武備此時預為操演方覺嫻熟著派色布騰巴爾珠爾扎拉豐阿管理定邊右副將軍富徳等疏奏招服博洛爾部落富徳等奏言臣等前於葉爾羌收獲回人愛達爾伯克詢知伊係博洛爾部落有三萬戸與拔達克山接壤因與霍集斯商議繕給托霍斯肯之伯克伊斯邁拉和卓奬賞藍翎敦多卜等印文於九月初三日前往招撫今據博洛爾頭目沙和碩黙持遣使該畢伯克等前往軍營據伊斯邁拉和卓等告稱行至沙和碩黙特所居十里外即遣人迎接次日相見沙和碩黙特敬奉印文譯看訖戴於㡌頂十七日筵宴使人以歸附奏章付該畢等起程并云拔達克山若不獻出霍集占等我即選衆隨征情詞甚為恭順臣等加以撫慰十月初一日同拔達克山使人一體筵宴交額爾登額等伴送来京謹將該部落奏章臣等文檄一併恭呈御覽奏入報聞辛丑諭定邊將軍兆惠等辦理伯克霍集斯等来京上諭軍機大臣曰昨諭兆惠富徳等與霍集斯偕来并將應行入覲回人一同行走使之不疑今大功告成霍集斯不無覬覦率同入覲更宜慎之又慎方合事機伊若以往和闐或烏什整裝為詞即婉言勸阻令其派出親信前往若求兆惠等同去更屬不可霍集斯起程後舒赫徳即將伊子漠咱帊爾及其家屬盡行整裝送京至回地既無滋事之人則將来仍於伊犂駐兵以休息各城回衆惟令其輸納貢賦一應善後事宜伊等即㑹商妥議具奏以用兵準噶爾始末宣諭諸王大臣上諭諸王大臣曰拔達克山素勒坦沙等歸誠逆賊霍集占授首於辦理回部固告成功而平定準噶爾全局亦於此大定昨已降㫖宣諭中外王大臣等躬逢國家景運昌隆殊勲捷奏當與朕同心感慶敬迓天庥而朕於班師奏凱時迴念前事轉深祇懼非僅為履滿思謙之虚語也準噶爾一部久外生成自我皇祖皇考時屢申撻伐未既厥緒前都爾伯特策凌策凌烏巴什等方欵關内附在庸庸無識之徒生際升平日乆方皆狃於便安謂可拒而不納殊不思堂堂天朝撫馭方夏如達瓦齊之蠢然一物縛致京師以降王豢養數載亦朝臣所共見者豈有儼然視如敵國至不敢受其降人之理然彼時朕以任事乏人尚未即決䇿興師也厥後阿睦爾撒納等各部来降者叩關踵接實繁有徒於義固有難辭而處之邊隅又足為喀爾喀貽患勢不得不經理㳺牧返之故地且上蒼錫祚埀禧予以經畫邊陲之事俾朕繼述我祖宗未竟之志事而朕敢惑於浮議不勉思敬以承之乎今統計用兵不越五載内地初不知有徵發之勞而關門以西萬有餘里悉入版圖如左右哈薩克東西布魯特及回部各城以次撫定現在拔達克山諸部落皆知獻俘自効捧檄前驅以亘古不通中國之地悉為我大清臣僕稽之往牒實為未有之盛事即朕始願亦不敢望其遂能至此也人情可與樂成難與慮始在久安長治之餘亦勢所必有然憂盛危明正當動色交儆此番遐方綏靖我將軍㕘贊以及一介執戈之士無不得嫺行陣於國氣人才深有裨益然非朕力為振作信賞必罰以淬勵之其誰不畏難茍安而坐希無事之福乎今即飲至告功而日有萬㡬宵旰疇咨又何能自釋敬事之懐有一日之可逸者即前此軍務方殷運籌乙夜曽不廢令節燕饗之文憂愁二字朕惟於望雨憫農用之於軍務亦未至於憂愁困苦如衆人之所畏者兹雖大功告成亦惟永懐圖易思艱以為昭受凝承之本又豈可恣意求逸耶然如去冬兆惠深入回地猝爾被遮設非朕先時各路派兵運饟在道何由集事神速便若轉圜此一節朕不自謂洞燭先㡬而深荷天地祖宗眷祐黙牖朕𠂻實愜於懐於此益信天人感應之符捷如影響而欽承景命我君臣當益交勉之軍營在事諸臣昨已加恩優敘至同朕辦理軍務者惟大學士傅恒與朕一心日夜不懈前因伊犂平定賜加雙公曽涕泣固辭今伊子傅靈安尚非披堅執銳之嵗而即能奮勇行陣屢著勤勞實愜朕望著賞給傅靈安頭等侍衛以著酬庸之典大學士来保年近八十行走不懈及諸軍機大臣官員日夜隨侍候報抄錄一切均著勤勞大學士𫝊恒来保及軍機大臣并軍機處行走官員著交部一併議敘仍將此㫖通行曉諭知之壬寅諸王大臣請加上尊號上不允復諭曰諸王大臣等以拔達克山素勒坦沙投誠逆賊霍集占授首準噶爾全局大定具表奏賀并請加上尊號雖援据典章而朕功成祇懼彌切於懐豈肯崇尚虛文勉從所請西陲一事仰賴上蒼福祐宗社鴻庥殊勲速奏𨽻版籍者二萬餘里治軍書者不及五年載籍以来實罕有倫比而朕所深用愜心者乃不在逺圖之式廓而在先烈之克成欽惟皇考付畀朕躬夙夜勉圖繼述矧在早年備承皇祖眷顧攸隆每遇軍國重務即令面聆聖訓籌畫是朕躬之仔肩倍重而纘緒者亦倍艱今以數載間運籌決策之勞克全我兩朝撻伐綏遐之略返𠂻自問差可無負燕貽者當在於是故非好大喜功之為見也我皇祖聖徳神功超越萬古戡定殊勲炳於史冊廷臣請上尊號尚未允行乃者關門以西迄乎大漠雖通亘古未通之境究以國家全盛餘力及之視當年之事㑹稍需刻難中輟者其緩急輕重固不可同年語矣然方其罪人未得朕斷不因盈廷畏葸輙事茍安若逆渠既獻馘告功則國法用申而軍威自無可極是以富徳捷奏尚請追索鄂斯璊阿卜都海里二人以絶根株朕以成事已蕆即𫝊諭飭止之固不能惑於築室之謀亦豈或蹈夫佳兵之戒所謂行乎不得不行止乎其所當止無成心也兹功成事定惟欽遵祖宗之成法益深兢業耳所有王大臣等加上尊號之請不必行敬惟辛巳嵗恭逢聖母皇太后七十萬夀慶辰鉅典鴻儀舉行伊邇兹以膚功既奏上慰慈懐已於長至節宣表稱賀推恩展禮稠疊便蕃其崇上徽稱宜以普天大慶時敬謹恭擬再行奏請懿㫖諸王大臣其明體朕意臣等謹案平回之役初由戡定準噶爾部所連及而核其始終本末則西師蕆成全局繫焉方二酋偝徳鴟張滅亡固其自速然當勢窮鋌險三遇王師躡踪摧陷猶冀竄身同教援据經典不即縛獻為辭遊魂暫資假息我皇上神謨逺燭預勅將軍等統兵壓境必以罪人斯得為期是以拔達克山懐徳畏威不獨函馘縶俘計不旋踵而諸部之聞風内附者且逺近琛球相屬於是分屯勸墾定賦贍軍回地日開而伊犂疆索所臻益助金湯之鞏矣設令二酋乘釋縲還巢之後安居故土反噬不生是猶四衛喇特或沿初制世封部長日久保無并吞滋釁勤我逺圖蓋惟天心誕畀純禧故投㑹迎機事獲一勞而永逸亦惟廟算先㡬決策故隨宜定變功歸一舉而兼收而聖徳淵沖尤兢兢以保泰持盈為亟惟天祖錫祚貽庥之厚澤卻臣民崇上尊號之彌文於以勵明作而儆宴安綿億萬世善建不拔之丕基皆於是乎在又豈隆古史書侈陳景爍所能導揚盛美者哉諭定邊將軍兆惠等會商牧放馬匹上諭軍機大臣曰楊應琚奏稱現在大功告成撤兵在即除第一起馬五千匹照常解送以資官兵更换乘騎其二起三起則酌量存留備調及撥補各營缺額等語解送軍營馬匹若已足用即如該督所議分别辦理或内地採買草豆未免拮据而沿途不堪繁費即送往巴里坤擇水草牧放以備伊犂等處駐兵屯田搜捕嗎哈沁之用今該督已奏報起程出關應與兆惠舒赫徳等相遇自當相度情形妥協商辦一面具奏俱著𫝊諭知之癸卯諭定邊將軍兆惠等酌議駐兵屯田事宜上諭軍機大臣曰舒赫徳奏稱駐防伊犂應派出滿洲索倫兵四千名建築城堡亦派綠旗兵四千名所需口糧由水路造船運送第一年派回人三千戸前往屯田或馬匹或牛驢亦購辦二三千豫備調用等語伊犂駐兵屯田一事原議以来年為始由近及逺若一時齊集滿漢兵丁及回人踰萬殊覺張皇頗露作難之意豈謂若此遂可停其辦理乎伊從前與成衮扎布同𠞰厄魯特時拘泥招降之策將沙喇斯瑪呼斯等疎脱以致投入逆回抗拒大兵伊係効力贖罪之人因在阿克蘇辦事頗屬盡心故加恩復用看来舊習全未悛改著𫝊㫖申飭至於屯田伊始或派兵五百名防守回人五百戸耕作計所穫之糧足敷食用再議開擴其原議駐防官兵四千名亦擬分駐葉爾𦍑喀什噶爾阿克蘇等城就回人交納糧石以資養贍况回部不便久駐我兵前此亦曽諭及舒赫徳既如此陳奏著𫝊諭兆惠富徳楊應琚等詳悉妥議具奏命撤噶斯等處卡倫上諭軍機大臣曰從前副都統多爾濟奏請裁撤由西寧之噶斯通伊犂之徳卜特爾等處二十三卡倫彼時因逆賊等尚在逋逃稍為留待今大功既成著將前項卡倫即行撤回一切遵照原議辦理以舉行筵宴典禮命𫝊諭定邊左副將軍成衮扎布等上諭軍機大臣曰平定回部大功告成北路將軍大臣等同此懽慶可𫝊諭成衮扎布等宣示喀爾喀四部落及都爾伯特部落知悉䇿布登扎布即計程於十二月二十前後抵京同赴太平嘉宴阿拉善王羅卜藏多爾濟等從戎頗著勞績亦著徧諭所部并率軍前効力已經出痘之人来京筵宴命四川湖廣等處協濟甘肅錢文上諭大學士曰前因甘省錢價昂貴𫝊諭四川湖廣各督撫於局鑄餘錢内酌撥協濟現在大兵凱旋及一應屯田事務民間日用錢文在所必需著於四川省每年協濟錢十二萬貫湖廣省每年協濟錢八萬貫按數分起解甘濟用其所需工本物料價值以及水陸運費各該省俱作正項報銷毋庸甘省歸還以示體恤其甘省易錢銀兩並著照數報部撥餉該部即遵諭速行甲辰命分别安插收服之嗎哈沁等上諭軍機大臣曰清馥奏稱伊在楚庫爾戈壁内收服厄魯特根敦等男婦五十三名口内根敦等四人請留巴里坤作為嚮導餘人交安西提督歸入綠旗兵缺等語綠旗兵餉原以養贍内地之人此等嗎哈沁性習叵測不但占内地額缺且乘間脱逃又滋事端著𫝊諭清馥將人誠實行走出力者酌量挑補數名餘俱送往肅州賞官兵為奴并𫝊諭楊應琚知之乙巳命以官犯達什朗等緩決情由曉示軍營官兵上諭軍機大臣曰此次勾決人犯將達什朗龔宜謙緩決特以上年庫車僨事皆雅爾哈善之罪此等㣲末官員不過聽其指使因將軍辦理不善致獲罪戾若雅爾哈善等果於軍務妥協辦理而伊等不能遵奉則一經㕘奏早已在軍營正法以昭烱戒尚何待解送京師質訊耶朕辦理一切庶務惟以大公至正為懐毫無偏曲著將此二犯緩決情由𫝊諭軍營官兵知之命議處内閣學士清馥上諭軍機大臣曰清馥奏稱奉到訓飭諭㫖即領兵七十名往追嗎哈沁等語清馥係領兵追賊之人既知踪跡所在即應親身前往乃諉之官兵是以降㫖申飭伊得㫖後不過以十數人趲行㑹合前遣官兵儘可𠞰捕逸賊何必又派多兵其意特在自衛耳伊即往追嗎哈沁等不返復何足惜而我兵七十人徒勞往還乃専為保䕶伊身之用甚屬不堪清馥著交部嚴加議處此次辦給官兵之馬駝牲隻口糧俱著落清馥賠補諭䕶軍統領努三等搜捕嗎哈沁事宜上諭軍機大臣曰努三奏稱阿勒坦和碩嶺在穆素爾額林哈畢爾噶兩山梁之間夏令尚有積雪此時更不可行走惟伊犂河源路通哈什空格斯和洛台等山野獸頗多賊衆或於此藏匿請與永貴合兵搜捕等語所見甚是但永貴似未至穆素爾嶺果如前奏何未見知㑹努三此時伊等應已合兵一處若能擒賊固善否則遵㫖回京交舒赫徳派出領隊大臣侍衛等酌量領兵搜捕努三所帶厄魯特嚮導數人若効力屬實亦著同来併𫝊諭舒赫徳知之丙午諭定邊將軍兆惠等解送降回酌量安插分賞上諭軍機大臣曰兆惠奏稱齊凌扎卜解到回人内係逆賊迫脅之各城回衆俱安插吐魯番其伊犂塔里雅沁伯徳爾格烏沙克等衆送往肅州照厄魯特之例辦理等語兆惠具奏時似尚未聞逆賊伏誅之信葢霍集占一日未獲則此等回人仍懐叵測今大功告成自可從寛免死前已屢降諭㫖仍著送至肅州分賞官兵其葉爾羌等城回衆亦不必安插吐魯番即順便留於各該處若係葉爾羌喀什噶爾回人如已過該處亦不必復回即分派庫車沙雅爾賽里木吐魯番等處安插此數年来各城未免地廣人稀令其耕種亦甚有益著速傳知齊凌扎卜等遵照辦理併諭兆惠舒赫徳知之又諭曰齊凌扎卜所解烏沙克伯徳爾格塔里雅沁等回衆已諭送至肅州分賞官兵但伊等素染惡習今雖從寛免死仍須嚴加防範著𫝊諭楊應琚呉達善分賞此等回人時必離其黨羽每一處以十人為率不可過多楊應琚業經起程出關呉達善即遵照辦理命議敘𠞰殺布魯特賊衆之大臣官兵等上諭軍機大臣曰兆惠等奏稱副都統豐訥亨前往安設臺站至額格爾呼爾璊哨探之厄魯特驍騎校伊薩瑪里見賊踪跡同布魯特嚮導雅克什擒獲一賊雅克什又招降結寨賊衆㡬中鳥鎗豐訥亨續到𠞰殺二十餘賊等語豐訥亨辦理臺站即能𠞰賊殊屬奮勉著交部議敘伊薩瑪里雅克什俱授為藍翎侍衛其隨往効力官兵俱著造册送部議敘命㕘將王玉廷等補授固原副將等缺上諭軍機大臣曰兆惠奏稱陜西固原所屬之博羅營副將莫倫岱病故軍營應陞副將者惟王玉廷一人其遊擊内之富亷巴顔弼請俟㕘將缺出陞補等語王玉廷富亷巴顔弼上年庫車攻戰得傷頗著勞績著加恩將莫倫岱員缺以王玉廷補授所遺㕘將員缺即著富亷補授巴顔弼著記名遇有㕘將缺出即行陞補命解送從安集延脱出之原任䕶軍達林来京上諭軍機大臣曰兆惠奏正紅旗滿洲䕶軍達林於雍正七年被掠轉入安集延近聞大兵進𠞰兩次潛行得脱來至英噶薩爾伊並未薙辮且聞信即行脱回本心尚未盡冺請㫖安插等語達林著解送來京候㫖平定準噶爾方略正編卷八十一
