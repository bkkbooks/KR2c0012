body:
  text: 乾隆元年二月戊辰命緩陜西本年應徴半賦上諭總理王大臣等曰陜甘民人自軍興以來急公効力甚屬可嘉除屢年叨䝉皇考壘沛恩膏外朕又降旨將本年應徴錢糧甘省全數豁免陜省止徵其半以昭格外之恩但查錢糧完納例有定期上年陜省収成未稱大稔今年春夏之際未免輸納艱難著將應徴一半額賦寛至夏禾収成後再行開徴以紓民力至該省應用兵馬錢糧著該撫豫先籌畫另行撥給俟九月徴収之後各歸原欵報部查核可即傳諭該部知之命送䇿凌母還游牧並賜整裝銀兩上諭總理王大臣等曰額駙䇿凌總統北路軍營其母現在京師䇿凌不得常見恐其思念不置可令其母還游牧處所俾得定省用展孝思此行著蘇巴什里送往并賞銀五千兩以備行裝丁丑命籌辦軍營貯米事宜上諭總理王大臣等曰現在軍營貯米甚多足供數年食用又經通智等運致數萬石將來彼處駐戍兵丁為數無多不必需用如許米石若収貯日久恐有霉爛之虞軍興以來喀爾喀等頗為出力近又習慣粒食若將軍營所貯之米搭放支給則米石既不致霉爛於喀爾喀亦屬有益再緑旗兵每年種穫新糧入倉収貯更可留新出陳其如何通融辦理之處著詳悉籌議具奏尋王大臣等奏言大將軍慶復前奏鄂爾昆等處現貯米二十萬餘石中有青稞麥子大麥小黄米二萬餘石軍營所有將軍大臣官員兵丁以至僕從等凡五萬餘人每月需米七千餘石至五月青草出時令所撤兵丁起程又需辦給行糧自五月至八月共需米五萬餘石開除前項仍存米十四萬餘石臣等前議撤兵事宜應留兵一千五百名喀爾喀兵及守卡倫兵並酌支米石近又議每年夏秋時用喀爾喀兵三千名於鄂爾昆附近屯駐俟撤廵哨兵時再令撤還此兵既在軍營亦請毎月賞給羊價米糧自將軍以下至僕從等凡一萬六七千人一年需米約五萬石計軍營存米十四萬餘石再益以通智范毓馪運致米石足供四年食用臣等大概籌畫如此至每年種地収穫新糧入倉存貯出其陳者務令不致霉爛請行文大將軍慶復詳議具奏奏入上從之己卯賜準噶爾台吉噶爾丹䇿零勅書奉天承運皇帝詔曰諭噶爾丹䇿零朕纘承大統繼述皇考世宗憲皇帝之志無分中外一視同仁以振興黄教安養衆生為務今爾遣吹納木喀來奏稱阿爾台本我游牧之地杭愛乃喀爾喀游牧之地既經和好此疆彼界原不必條分縷晰今因遵旨定界故敢奏聞又稱諭旨所示哲爾格西喇呼魯蘇等處雖已指明我部疆界尚未定喀爾喀游牧之界故未敢定議祈再稍展空地遣使來此酌定令喀爾喀與我部邊界彼此濶逺伏乞允行按定界之事本起於爾父䇿妄阿喇布坦奏請乞以阿爾台山外哈道里哈逹清吉勒布拉清吉勒兩隅賜爾初尚未䝉俞允其後皇考一意休兵息民方可其請令以克木齊克汗騰格里循阿爾台山梁下索勒畢嶺由哈卜塔克拜塔克之中過烏蘭烏蘇至噶斯口為界爾父又請以呼遜托輝至喀喇巴爾楚克為居中間地毋與喀爾喀游牧逼近致彼此猜疑皇考降旨此事亦屬可行今爾誠恪遵我皇考聖訓奏請則我原設卡倫不必動移但令喀爾喀游牧稍稍内徙朕自當體皇考興教安民之意降旨俯允爾乃並不遵我皇考之訓竟欲以哲爾格西喇呼魯蘇為爾邊界專令喀爾喀内徙别留中間濶逺之地牽率奏請明係托故支吾如此則朕更遣使何為朕為萬方共主當使羣生皆得其所不但軫恤内地䝉古即爾準部亦在我撫綏之内仰承皇考仁育萬物之心以息兵端業已降旨撤兵豈復更張爾若不恤爾部起釁殃民勞爾部衆擾我邊疆則朕亦無如之何矣爾台吉其圖及久逺將一切利害得失之故再四思維詳悉定議一遵皇考諭旨則遣使來奏否則不必更遣使矣特降勅諭付爾來使齎還隨勅賜各色緞俱十端庚辰命議駐兵備邊事宜總理王大臣等奏言本月十三日奉上諭前經降旨北路撤兵駐兵事宜令喀爾喀衆扎薩克等各陳所見今四部落悉已奏到爾等㑹同額駙策凌王丹津多爾濟定議具奏臣等㑹議據署喀爾喀副將軍成衮扎布等奏請就四部落選兵七千於庫卜克爾駐兵一千卓克索等處駐兵五千特斯駐兵一千三處各築一城令其防守喀爾喀游牧不得越百里之外有事可就近入城伊綳等處現在修廟亦令更築一城附近游牧者得入居之其拜逹里克察罕廋爾推河塔米爾等處所駐内地兵悉撤還惟鄂爾昆應暫駐滿洲䝉古兵一萬以備探信迎敵據扎薩克圖汗格勒克雅木丕勒等奏請精選内地兵一萬三千於鄂爾昆屯駐一萬烏里雅蘇台屯駐三千察賊動静以定進止其三十三卡倫撥兵駐劄如故又請西三部中選兵一萬車臣汗部中選兵五千於鄂衣衮特里墨台西里兩處各駐兵一千五百其餘一萬二千令所在副將軍扎薩克等不時操演以備調發其扎卜堪台西里空圭特斯等處仍設内卡倫令䝉古游牧無過察罕和羅畢留台齊老圖塞楞額等處據車臣汗逹瑪琳等奏請於喀爾喀西境額爾得尼招等處水草肥美之地悉駐兵固守安設卡倫俟探知賊人確耗再議撤兵據署副將軍貝勒䇿卜登等奏滿洲䝉古兵駐劄各路誠屬有益但準噶爾既遣使請和若不撤兵彼仍懐疑請悉撤駐兵其卡倫置設如故令游牧人衆各備器械加以約束庶合機宜臣等伏思喀爾喀四部落扎薩克等各抒己見雖所議不同並以防賊備兵為主前者臣等酌議用東三省兵五千緑旗兵一千駐鄂爾昆用喀爾喀兵一千駐烏里雅蘇台又五百名駐鄂爾昆業已奏行無庸更議其喀爾喀之逼近軍營者當應行防守時更令增兵以助軍威自屬有益若邊境無虞經年屯戍未免勞費請於每嵗防秋之候就各游牧豫備兵中輪選三千名在鄂爾昆附近水草佳處屯駐令隨大兵逐獸行圍練習技勇俟撤廵哨兵時再行停止其餘兵丁並令所在整頓豫備以候調遣毋或失期又格勒克雅木丕勒等所奏扎卜堪台西里空圭特斯等處仍設内卡倫䝉古游牧無過察罕和羅等處應如所請并令副將軍等自明年為始悉行設立嚴謹查察其豫備兵隨時操演整備器械之處著軍營將軍大臣與喀爾喀副將軍等公同酌議隨宜辦理奏入上從之辛巳命那蘭保督運軍糧先是總理王大臣等以鄂爾昆貯米甚多移令歸化城尚書通智等代内扎薩克所運四萬米石停其運致通智等奏言咨文未到以前已發給商人脚價八萬餘兩令其置辦一切不便収還請令范毓馪應運抵欠米四萬石暫行停止仍以前項運致軍營王大臣等議覆范毓馪所運米石大半已抵鄂爾昆其餘亦多啓行今通智所運米須五六月始得起程必無盡給商人脚價之理應准其運致一半奏入上從之尋通智奏言所運米二萬石商人先於去冬飼養駝隻請於二月内即以次起程應遣大臣一人土黙特大員八人官員十六人兵丁一百名送往即令尚書性桂等監収又奏言都統丹津艮敦副都統席爾塔五十六那蘭保並自請前往効力恭候欽命奏入得旨著那蘭保前往三月乙未朔命加恩叙賞前後坐臺官弁兵丁上諭總理王大臣等曰西路軍興以來自京城以至西寧沿途增設腰站齎送公文雍正九年䝉皇考世宗憲皇帝念弁兵遞送勤苦加恩議叙賞賚但自八年七月起至九年六月止兩次撥委弁兵叨䝉恩恤其餘未曾賞及朕思八年以前已安臺站九年以後尚未撤除前後同為効力之人當令均沾恩澤著該部確查辦理將前後坐臺之官弁兵丁遵照雍正九年之例或賞紀録或賞銀兩一體加恩以示朕一視同仁之意丁酉議分給兵丁米糧羊價事宜定邊大將軍平郡王福彭奏言向者䝉古兵例不給糧臣前以坐卡兵丁支領羊價殊屬煩瑣是以折給米石前伊等或用米磨麫對茶或轉賣與商販現今貯米甚多給糧誠便倘日久米少議停不無轉生觖望嗣後或更須駐兵亦難以一例支給按北地寒冷蓋蔵得宜米可經三四年不壊現在米石自當貯以備用其䝉古兵丁仍請給羊價殊為便益王大臣等議覆防秋兵三千毎年暫駐數月又與游牧所在相近無庸支給米石應如平郡王所請仍給羊價其駐劄兵一千五百與防秋兵不同應令平郡王以本處所存倉糧如穈黍青稞蕎麥不耐潮熱等物間給以為磨麫對茶之用再索倫性情與䝉古相近請一體議給其如何間給之法應令慶復辦理尋慶復等奏言向有間給二麥之例毎年三月至九月官兵支領月糧每月量給大麥六日麥二日糜黍一日駐劄兵即照此例行王大臣等議應如所請奏入上從之議增設馬厰事宜定邊大將軍平郡王福彭奏言喀爾喀部落所牧馬匹除留軍營備用外各游牧處現有馬二萬九千餘匹内扎薩克各游牧處現有馬四萬餘匹伏思鄂爾昆駐兵以歸化城為聲援其間相去三千餘里中途須有接應更換之馬請度適中之地與臺站相近水草佳處撥馬二萬匹設立馬厰於土黙特兵或喀爾喀兵内擇有眷屬者移駐牧放令通智丹津協理其事再請撥騸馬一萬匹兒騍馬一萬匹令五十四撥入張家口外官厰中一并牧放以備需用總理王大臣等議覆曰口外行走全資馬力必平時經理得宜孳生蕃衍庻幾備用無缺今據平郡王請於歸化城至鄂爾昆中間附近臺站設立馬厰牧馬備用誠為允協但馬厰應設何處於䝉古游牧有無妨礙并以何處兵丁牧放及一切應辦事宜令通智等遣官察勘詳議具奏至張家口馬厰增馬之請前者内大臣海望亦曾奏請以五十四等言採買馬匹擾累䝉古應俟徐議是以未經允行今平郡王奏稱官馬甚多不須更購按現在各扎薩克騸馬已經定議每年倒斃數目准其開除將來倘有需用自可調集况現今五十四所管馬厰内有王公等所進馬八千餘匹可以備用不必更以扎薩克騸馬調入其請增兒騍馬萬匹於牧放孳生最便應令額駙䇿凌同三路副將軍等計各處現存兒騍馬數目並如何游牧孳生之處詳議具奏到日再行定議奏入上從之辛亥命提督樊廷總統哈密防兵署寜逺大將軍查郎阿奏言原議甘涼等處撥兵五千固原等處撥兵五千往駐哈密應設總統提督一人請於陜西提督樊廷甘肅提督二格二人中用一人奏入得旨駐防哈密總統提督著樊廷去其固原提督印務著河北總兵李繩武前往署理癸丑命撤勇健營兵丁署寧逺大將軍查郎阿奏言巴里坤議撤官兵有勇健營兵一千一百餘名原係新設别無營汛其撤還時若仍聚一營難於部署且屬十五省挑選技勇之人應令各歸本省就近遇營兵缺出即以充補其願告退者聴如有勤勞素著技勇可觀者即酌量㧞補其不法生事者隨時咨部斥革撤還時長途進止應有官弁統轄請即以原領將弁等分領約束到時留本省照銜補用其經過各處所需車輛船隻口糧並如例支給總理王大臣等議應如所請奏入上從之乙卯議移改臺站事宜臺站總管五十四等奏言查第二十一臺至鄂爾昆一路水草甚佳且里數較直因令郎中常保往勘據云沿途井泉溪河隨處相接較今臺站近二百餘里除二十一臺毋庸更動外自哈畢爾噶腰站至第二十九臺議汰腰站一處其餘應行遷移安駐大站腰站凡十一處並將地名里數開注呈送請如所勘辦理其所汰腰站並如原議人歸本處馬付管臺官以抵錢糧駝及廩給羊隻備各營應用總理王大臣等議應如所請奏入報聞尋協理軍臺事務總管覺和托奏言臣閲新移臺站彼此相去逺近不齊請將二十四臺移於東北十五里之克勒扎拉腰站移於東北三十五里之桑衮逹賴二十五臺移於正東十五里之齊希勒逹克岱丁薩腰站移於正東三十里之哲格蘇台二十六臺移於正東五十里之西巴爾圖二十七臺移於東北四十里之烏蘭淖爾常保前次並未詳勘請交部察議得旨常保免其議處該部知道丁巳命弛邊民越界種地之禁先是延綏總兵官米國正奏請以䝉古餘閒套地明展界限令邊民並得租地耕種議不准行至是米國正復奏言邊民違例越界䝉古私得租銀習以為常已非一日其牛具籽種隔年已費且䝉古復有豫支民租三四年者現今榆林神木等處邊口越界耕種之地約三四千頃嵗約得糧十萬石可敷數萬人食用今驟行嚴禁致令銀地兩虚待哺無䇿雖於令制相符實與下情未便臣廵察邊汛至神木一帶百姓紛紛控訴應與扎薩克酌量通融籌議俾邊民生計相安總理王大臣等議覆邊民種地設立界限原恐於䝉古游牧相妨今如米國正所奏邊民藉以穫糧䝉古藉以所租彼此兩得其便事屬可行惟强種勒索滋生事端者悉行禁止奏入上從之戊午恩免范毓馪辦運北路軍糧處分總理王大臣等奏言戸部核奏范毓馪辦理北路軍糧冐銷脚費有旨令臣等議奏臣等查察罕廋爾軍糧康熈六十一年以前遣官辦運毎石自一百餘兩至四十兩不等至雍正六年怡親王奏令范毓馪承辦每石定價二十五兩雍正七年范毓馪報出節省銀一百餘萬兩後即以節省之數核算每石給銀十九兩其運送扎克拜逹里克并推河等處每石給銀十一兩五錢至十五兩惟運送科卜多每石給銀二十五兩至二十八兩此並在未運之先計按道里逺近給與運價雍正九年十月奉旨軍糧闗係重大錢糧不足只令請領有餘不必報出毋得止圖節省再查前以輓運科卜多糧中途改撥鄂爾昆等處収貯經户部核減銀二百五十餘萬兩已扣完八十餘萬兩尚存一百六十餘萬兩現在定限追繳再雍正九年十年沿途搶失米石得旨准其開銷後范毓馪呈報共失米十三萬餘石戸部亦未代奏准銷總計范毓馪前後承辦軍糧一百萬餘石其每石領銀二十五兩至二十八兩者共十四萬餘石餘悉十一兩五錢至十九兩不等經戸部詳詢范毓馪供言給發運價之外尚有設立米局牧厰及催趲糧運採買牲畜雇募人夫一切費用皆屬必需即在從前奏行定價之内亦非冒銷可比至改運核減未完銀一百六十餘萬兩據范毓馪呈請分十二年完納經户部議分八年臣等公同酌議定限五年倘限内不完請以家産變抵交刑部治罪奏入得㫖依議著免其究治夏四月丁卯命核議李如柏等縁事罪案上諭總理王大臣等曰李如柏逹爾濟卓鼐周瑛各有交辦之事著照大將軍慶復所奏四人俱仍留軍前其如何施恩賞給職銜令其効力行走之處著總理事務王大臣等以四人所得之罪分别輕重議奏王大臣等議原任總兵官李如柏濫用公帑革職以總兵官銜率換班緑旗兵往北路効力自到鄂爾昆尚未著勞績今已給職銜應俟所領兵換班時該部請旨原任䕶軍統領逹爾濟前以傷損馬匹牲畜又額爾得尼招之役坐視賊人敗走過扎克拜逹里克不追革職以䕶軍當苦差現在鄂爾昆墾地輸納應償米石原任提督周瑛於西蔵領兵時私買使婢又令兵丁歌唱刑部奏擬充軍奉旨來京引見發往北路軍營効力贖罪又於白格爾駐劄時被賊刦糧有旨著枷示軍前責令償米尋䝉恩釋免其應償米仍令責償今在鄂爾昆管理種地事務按逹爾濟周瑛未便遽給職銜請俟其還時令大將軍以伊等在軍營効力與否報部請旨原任寧夏將軍卓鼐前奏冬令不宜進兵請俟春初馬匹飼肥進發查郎阿等議以進兵怯懦推延時日奉旨革職令在軍前効力按卓鼐愚昧妄奏情尚可恕應否賞給職銜出自聖恩奏入得旨著賞給卓鼐副都統職銜令其効力餘依議壬申命以王常海瀾為㕘贊大臣上諭總理王大臣等曰副將軍常徳㕘贊大臣伊勒慎俱因患病現令回京軍營乏人著王常海瀾俱為㕘贊大臣協同副將軍䇿凌辦事各賞銀二千兩辦給行裝乙亥加恩鄂爾多斯貝勒扎木揚等復爵奬賞有差總理王大臣等奏言鄂爾多斯貝勒扎木揚原襲郡王雍正十年率兵三千進𠞰兵丁沿途逃亡所辦馬匹亦不整齊納延泰奏請降為貝勒仍令率兵効力奉旨扎木揚行走若好著大將軍奏聞又按扎木揚所襲王爵乃其曽祖顧魯率所屬兵丁攻取陜西榆林神木等城斬降賊冦著有勞績因得受封其子東羅卜承襲王爵冊載子孫世襲罔替今大將軍慶復等奏扎木揚在軍前已經四年雖未著殊績尚知感激奮勉修治器械恪勤奉職可否給復原爵出自聖恩台吉䇿旺多爾濟之子圖巴扎􅁲代父効力在軍數年保䕶官馬牲畜運送耕種器械稱職慶復奏請授為額外副台吉頭等副台吉額黙根先於巴里坤率兵擒斬賊衆又在軍臺䕶運官物此次協同扎木揚行走進獻騸馬又䕶送官馬五千至奈曼明安平郡王等稱其為人誠懇盡心公務應加寵錫以示鼓勵三人均應如所請奏入得旨鄂爾多斯貝勒扎木揚此次前往軍營克贖前愆約束兵伍辦理馬匹整頓器械俱實心盡職念其祖父前勞著開復王爵額黙根前次出兵効力行走此次又協助扎木揚竭誠効勞甚屬可嘉著賞翎子以示寵異圖巴扎卜代父前往軍營殊盡心竭力黽勉効職著授本旗額外副台吉丙戌命議辦理臺站及喀爾喀游牧兵丁事宜定邊大將軍慶復奏言臣等與喀爾喀副將軍等酌議安設卡倫每處於侍衛䕶軍中選一人專管再於喀爾喀四部中選賢能台吉一人協同辦理其台吉等月糧照例給與兵丁六月一換喀爾喀内卡倫並如舊例每處揆章京一員兵丁二十名於西三部落按佐領撥出其豫備操演兵三千名於圖謝圖汗敦丹多爾濟部下撥扎薩克一員副台吉三員官七員兵一千三百六十二名於貝子成衮扎布部下撥扎薩克一員副台吉二員官四員兵七百四十八名於車臣汗逹瑪琳部下撥扎薩克一員副台吉二員官四員兵五百三十四名每名給馬三匹每百人纛一杆十人旗一面五人帳房一架計兵三千名内一千名給與鳥鎗每年六月初旬齊集鄂爾昆操演豫備九月撤廵哨兵時令各歸本游牧處先是西邊三部落中共撥兵一萬二百名於車臣汗部下撥牽駝兵六千嗣減一千存五千合計一萬五千二百名除駐劄鄂爾昆烏里雅蘇台一千五百名每年調往鄂爾昆操演三千名尚餘兵萬餘令在本游牧處整練保聚以備緩急之用有事易於調集器械務令整齊令副將軍與叅贊貝勒公等一年一次㑹閲每年出哨之兵各路並撥一百五十名每逢夏秋二季三路分發撥東三省營總三員率領前往其侍衛䕶軍等俱有管轄卡倫之責若復令出哨恐人不敷用請於在京新滿洲索倫巴爾處厄魯特等侍衛中揀發十員以備差委三年期滿更換奏入得旨著照所請行其初次查勘臺站著派㕘贊大臣一員前往嗣後間嵗派㕘贊大臣一員往勘至喀爾喀游牧處豫備之兵其㑹集及檢閲器械著將軍㕘贊大臣㑹議於㕘贊大臣内派出一員㑹同喀爾喀副將軍㕘贊貝勒公等公同閲視其將軍親自㑹閲之期幾年一次著額駙䇿凌酌定具奏命議酌軍營大臣等留撤事宜總理王大臣等奏言本月十七日奉旨前者軍興以來令大臣官員往駐䝉古邊疆辦理事務今大兵既撤僅留駐兵一切防守事宜並已減省其各處辦理駐劄之大臣官員有應撤者著總理事務王大臣等議奏臣等查駐劄歸化城辦事尚書通智駐劄西寧廵撫徳齡散秩大臣塞楞郎中三逹禮員外郎五十七主事齊明駐劄肅州内閣學士岱齊侍讀學士阿蘭泰駐劄哈密員外郎逹桑阿扎史駐劄西蔵副都統馬拉那蘇泰員外郎那遜額爾格圖駐劄呼倫貝爾領侍衛内大臣哈逹哈原任郎中伊特格爾以上各官尚書通智本以歸化城都統根敦副都統席爾塔悉赴軍營其地乏人是以遣往今根敦席爾塔已各還所在應令通智俟修城駐兵等事竣即行還京西寜原駐大臣一員辦理青海䝉古番子事務兵興以來始增駐大臣章京等今既撤兵應於徳齡塞楞三逹禮三員中留一員餘並撤回至五十七齊明軍前歴年最久應令理藩院奏請更換肅州辦理軍需較前亦少應於岱齊阿蘭泰二員中留一員哈密駐劄章京協同扎薩克辦事因一人不能換班又增一員定例二年更代哈密現有駐兵逹桑阿扎史仍應留彼俟年滿更代西藏向無大臣官員駐劄前以康濟鼐與頗羅鼐交惡相攻因遣大臣率兵暫駐今逹賴喇嘛還藏兵亦撤還毋庸更駐大臣現今侍郎杭奕禄有事赴藏令其酌辦奏到日再將瑪喇等定議進止哈逹哈前往軍營亦四載餘請交兵部於明年二三月間奏請遣官赴呼倫貝爾更換伊特格爾亦令同還奏入得旨西寧著留徳齡肅州著留阿蘭泰其通智承辦之修城駐兵等事著令完畢再行具奏請旨餘依議壬辰布魯克巴部入貢總理王大臣等奏言布魯克巴部諾顔林沁齊壘喇卜濟感戴皇恩親至西藏恭請聖安獻珊瑚數珠一串所部織緞五匹伏思布魯克巴乃藏外極逺部落林沁齊壘喇卜濟為其酋長恭請聖安奉獻表文請以所進物付部賞給如例外恩賜粧蟒各一匹大緞三匹奏入得旨依議再酌賞玻璃器數事平定準噶爾方略前編卷四十一
