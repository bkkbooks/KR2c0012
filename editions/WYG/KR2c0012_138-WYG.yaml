body:
  text: 乾隆二十五年春正月戊申恩免甘肅來年地丁錢糧及賑貸被災州縣上諭大學士曰甘省自軍興以來連年加恩豁免正雜錢糧及一切展賑緩徵酌增運費所有正賦已蠲至二十五年俾邊氓普沾渥澤現在大兵凱旋軍務全竣正宜與民休息且上年歲収未能豐稔朕心尤深軫念著再加恩將甘肅省乾隆二十六年應徵地丁錢糧通行豁免俾得共安耕鑿永承樂利之休以示朕優恤邊氓有加無已至意又諭曰甘省上年夏秋田禾均被偏災其較重之臯蘭等十㕔州縣及次重之靜寕等州縣已降㫖分别加恩展賑其災輕之渭源涇州等十七㕔縣亦經照例蠲緩賑恤並於春初借糶兼行以資接濟惟念勘不成災處所夏田被旱改種秋禾小民已費工本未免拮据著加恩將所有春借籽種牛價緩至麥熟後徵還仍於青黄不接之時酌借籽種口糧俾得盡力耕作至該省被災等處尚有無業貧民艱於口食者並著飭令地方官或設厰煮賑或開工傭作俾得餬口以示體恤該部遵諭速行又諭曰甘省蘭州凉州平涼慶陽一帶上年偶被偏災已加恩一體賑恤但念邊氓生計拮据春耕在郎而例賑將停恐不足資接濟著再加恩無論被災分數極次貧民將臯蘭金縣平番古浪㑹寧安定固原靖逆環縣鹽茶等十㕔州縣於正賑之外再展賑至麥熟後停止靜寧隆德狄道三州縣再展賑四個月靈州花馬池中衛河州碾伯五㕔州縣再展賑三個月俾小民得以餬口力耕副朕念切痌瘝至意又諭曰甘省被災各屬倉儲未能充裕業令該督撫撥運本省及陜省倉糧共四十餘萬石分貯災屬備用但春間賑糶兼行恐有不敷著於鞏昌寧夏西寧秦州四府州倉儲有餘之處除留本地備用外再酌撥十餘萬石就近運赴被災各屬俾賑恤借糶得以寛裕儲備命立限報銷軍需欵項上諭大學士曰西陲大功告成統計辦理軍需前後甫及五年欵項易於稽查現在自乾隆二十年以前各案動用錢糧俱經分晰辦理其乾隆二十年九月至二十四年凱旋之日辦理軍需各項錢糧口内予限一年口外予限年半該督撫等督率承辦地方各員分别案欵詳悉造册報銷毋任遲延以清案牘庚戌命給烏魯木齊大臣闗防及揀選辦事官員上諭軍機大臣曰安泰等奏現在烏魯木齊等處屯田與哈薩克交易請賞給闗防及派員辦事等語著照所請賞給闗防仍著陜甘兩省揀選滿洲道員一人同知通判州縣四員縣丞雜職八員發往烏魯木齊道員總辦収支各屯糧餉同知等官分辦各屯糧餉地方事務其凉州等處駐防有熟習滿漢文字之領催前鋒著揀選十員令其協辦事務伊等若行走勤慎即照臺站委署筆帖式之例辦理効力出衆者行文各該處以應陞之缺開列補用命賞駐劄葉爾羌總兵容保駐劄英噶薩爾總兵揚寧戴孔雀翎辛亥申諭定邊左副將軍成衮扎布等辦理烏梁海事宜上諭軍機大臣曰成衮扎布奉到命䇿布登扎布富德領兵二千辦理烏梁海被掠諭㫖將現在應調官兵及牧羣馬匹酌議具奏所辦尚是但此事朕屢有明諭必將賊人部落查詢確實始可進兵至所奏牧羣馬五千餘匹駝九百餘隻牛羊計二萬餘而都爾伯特烏梁海等俱各有乘騎不過酌量賞賚則軍需甚為足用此時惟加意牧放以候額爾克沙喇等實信即作速奏聞命議叙陞用哈密辦事道員文綬等有差上諭軍機大臣曰據五吉等奏哈密辦事道員文綬遊擊陳尚勲都司薩靈阿州同張春俱實心奮勉署防禦驍騎校雙明署筆帖式馬甲伊本泰領催瑚納前鋒三多領催馬玉馬甲諾爾布等俱勤慎無悞等語文綬著加恩交部議叙仍著軍機處記名陳尚勲薩靈阿張春著交督撫記名以應陞之缺補用署防禦雙明著准其實授伊本泰瑚納著賞給驍騎校職銜遇缺即補三多馬玉交該將軍以應陞之缺補用諾爾布既係開戸不便補授旗缺著以綠旗把總用喀爾喀公品級三都卜多爾濟以軍前奮勉効力命加恩晉封輔國公癸丑諭㕘贊大臣舒赫德等派兵捜捕嗎哈沁上諭軍機大臣曰據努三等奏遵㫖於十二月十二日起程赴京并咨明舒赫德阿里衮等語著傳諭舒赫德等努三既遵㫖來京而捜捕嗎哈沁一事又正當春令著派豐訥亨於索倫䝉古兵内挑選堪勝營總一員及努三所留厄魯特嚮導等辦給馬匹口糧前往阿勒坦和碩等處捜捕戕害德舒賊人務期弋獲一舉廓清方為妥協其兵丁即就近調撥努三奏敘之嚮導錫喇庫本恩克勒德克孟克津既屬効力著將其家口一併送京命復察哈爾原任佐領鄂勒錐圖職上諭軍機大臣曰努三等奏稱察哈爾正黄旗原任佐領署營總鄂勒錐圖因管臺時兵丁遺失所送事件革職効力今伊解送阿里蘇羊隻捜捕嗎哈沁甚屬奮勉從前曾隨兆惠在濟爾哈朗突圍等語鄂勒錐圖著加恩復還原職命阿克蘇等處駐劄大臣派員赴肅州核銷軍需上諭軍機大臣曰納世通奏現在軍務告竣阿克蘇庫車哈喇沙爾闢展巴里坤哈密等處俱有承辦軍需應至肅州銷算但阿克蘇等處相隔甚遠往返查核未免致勞臺站請將各處承辦錢糧之章京筆帖式及地方官書吏等派出數人㩦帶册檔往肅州軍需局核對登答等語著照所請交各該處辦事大臣即派員赴肅州銷算仍著該督於道府内酌派一員專司辦理甲寅命㕘贊大臣阿桂等協同捜捕嗎哈沁上諭軍機大臣曰昨諭舒赫德等派豐訥亨領兵於阿勒坦和碩等處捜捕戕害德舒賊人今思阿桂伊柱雖派辦䕶送囘人前往伊犂屯田尚需時日著先派官兵五百名同豐訥亨等捜捕嗎哈沁務宜協心奮勉以清方域若該處馬匹不足即著五吉於巴里坤牧羣内揀選二三千匹親行送往阿克蘇以備軍需乙卯霍罕額爾德尼伯克使人陀克塔瑪特車里克卓爾瑪特使人呼達呼里等至京入覲上御乾清宫陞座陀克塔瑪特等行三跪九叩頭禮命坐賜茶召至御座前親加慰問陀克塔瑪特等叩頭謝恩出賜䕶送霍罕使人之頭等侍衛達克塔納墨爾根巴圖魯號仍賞銀一百兩丙辰拔達克山素勒坦沙使人頭穆爾伯克巴圖爾伯克及博洛爾使人沙伯克等至京入覲上御乾清宫陞座額穆爾伯克等行三跪九叩頭禮命座賜茶召至御座前親加慰問額穆爾伯克等叩頭謝恩出午刻上幸豐澤園御幄次賜拔達克山霍罕諸部落使人筵宴二品以上文武大臣皆預宴丁巳行受俘禮上御午門樓陞座解送俘馘官兵行禮畢兵部尚書李元亮奏定邊將軍兆惠等函送逆囘霍集占首級併俘囚們多索丕等謹獻闕下請㫖傳制著交刑部尚書鄂彌達等承㫖訖諸王公大臣及拔達克山霍罕使人行慶賀禮畢上幸豐澤園幄次賜外藩䝉古王公台吉及拔達克山諸部落使人宴尋命懸逆賊霍集占首級於通衢宥俘人們多索丕等布魯特額德格訥阿濟比使人錫喇噶斯等至京命入宴時坐於霍罕使人之次命陞賞厄魯特侍衛薩穆坦等有差上諭軍機大臣曰厄魯特二等侍衛薩穆坦葉爾羌伯克三等侍衛索勒屯和卓沙爾呼勒伯克虚銜藍翎阿布賚三奉使拔達克山俱屬黽勉薩穆坦著授為頭等侍衛在乾清門行走伊尚未出痘著同伊妻子一併於察哈爾安插索勒屯和卓著陞為四品阿布賚三著陞為五品各賞衣一襲命賞解送俘馘之正黄旗頭等侍衛額爾登額銀一百兩授侍衛伍岱為頭等侍衛賞鍛六端賞侍衛成果緞三端戊午命陞賞厄魯特奬賞孔雀翎阿塔什等有差上諭軍機大臣曰隨額爾登額解送逆賊首級及們多索丕等來京之厄魯特奬賞孔雀翎阿塔什著授為二等侍衛愛呼奬賞孔雀翎塔里善厄魯特藍翎侍衛敦多克著授為三等侍衛吉林防禦阿林保著賞戴孔雀翎右衛馬甲納達齊三姓前鋒阿爾蘇納領催伊三泰索倫領催西圖庫爾馬甲禮達俱著授為藍翎侍衛隨達克塔納䕶送使人之索倫領催訥卜齊披甲卓多巴著授為藍翎侍衛己未上幸萬壽山御勤政殿布魯特阿濟比使人錫喇噶斯等行禮畢上召至御座前親加慰問隨命同䝉古王公台吉及拔達克山等使人入宴命陞賞厄魯特奬賞藍翎薩爾泰等有差上諭軍機大臣曰隨侍衛達克塔納䕶送霍罕使人之厄魯特奬賞藍翎薩爾泰著授為藍翎侍衛巴爾虎驍騎校三集著戴奬賞藍翎䕶送額德格訥使人之藍翎侍衛恩克濟庫厄魯特藍翎侍衛和屯俱著授為三等侍衛庚申命㕘贊大臣阿里衮囘京上諭軍機大臣曰阿里衮久在軍營著派新柱馳驛前往更換俟到日阿里衮將一應事務明白交代即馳驛囘京命陞賞囘人摩羅莫爾瓚等有差上諭軍機大臣曰囘人摩羅莫爾瓚隨達克塔納前往霍罕瑪爾噶朗安集延等處頗屬奮勉著加恩授為五品並准戴翎仍賞縀四端衣一襲諭㕘贊大臣舒赫德等辦理漠咱帊爾及鄂對頗拉特事冝上諭軍機大臣曰據舒赫德奏奉到辦送漠咱帊爾諭㫖擬以公事調來葉爾羌再行解送亦行文阿桂將伊弟呼岱巴勒氐辦送昨據阿桂奏酌量情形相機辦理看來此事尚屬易辦今又據奏阿克蘇伊沙噶伯克頗拉特密呈囘人等聯名文書訐阿竒木伯克鄂對過失請以頗拉特代任己面斥擲還等語囘人猜妬擠排乃其舊習自當嚴為杜絶鄂對果不勝任亦不當因頗拉特之言遽行斥革且鄂對即因此獲咎而頗拉特藉端聳聽希圖代任之罪亦應察究斷無堕其譎計竟授為阿竒木之理鄂對現隨兆惠來京俟到日再行詢問辦理俱著傳諭知之諭巴里坤辦事道員同德查訊捕獲之嗎哈沁等上諭軍機大臣曰清馥奏稱追捕嗎哈沁至莽堪額爾紀斗齊已經遁去獲其妻室及所屬畢克拉扎卜等又招服根敦扎木揚等戸口送往巴里坤質訊若無為匪情事請送肅州備賞其扎木揚與弟持穆爾斗齊屬人達什扎卜留為嚮導又訊得喇嘛伊什班珠爾曾勸斗齊逃走請於巴里坤正法畢克拉扎卜等曾盗巴里坤打牲人等馬駝或即正法或解京備賞等語喇嘛伊什班珠爾畢克拉扎卜情罪可惡著同德等訊明正法其根敦扎本揚所屬人口著與斗齊家口一併送京再斗齊之父巴圖克勒木往尋伊子曾否相遇清馥亦宜問及奏内並未聲明此等情節俱著同德查審具奏命調巴里坤綠旗兵九百名赴烏魯木齊屯田上諭軍機大臣曰安泰奏稱奉到巴里坤綠旗兵可否調往烏魯木齊諭㫖現在烏魯木齊糧石頗屬饒裕内地所辦農器多在巴里坤所有兵丁九百名與其在彼守候即可調來烏魯木齊屯田等語烏魯木齊増兵開墾既有益屯田而哈薩克貿易往來昨尚諭派索倫兵數百名駐劄防範今增調此項兵丁更足以壯聲威即照所奏辦理辛酉上御正大光明殿陞座賜朝正外藩筵宴拔達克山等部落使人皆與宴命豫備舉行郊勞典禮上諭大學士曰朕於二月初八日啟鑾恭謁東陵禮成迴次圓明園恭請皇太后安駐蹕數日於二十二日啟鑾恭詣泰陵祇謁計迴鑾時將軍大臣等正届凱旋即於旋蹕黄新莊次日前往郊勞所有應行典禮該衙門敬謹豫備諭定邊將軍兆惠等解送囘人厄敏都管等來京上諭軍機大臣曰兆惠等奏前據伯克霍集斯告稱伊從弟厄敏都管霍什提卜曾通信霍集占不可留於舊地因將伊等拏禁庫車應請㫖正法或送内地充賞等語大功告成厄敏都管等著從寛免其正法俟解送京師時再行請㫖諭㕘贊大臣阿桂等酌辦伊犂屯田事宜上諭軍機大臣曰阿桂奏伊犁駐防屯田皆必需辨理之事若酌派囘人先往屯囘再添駐官兵增派囘衆即易為力請早為調撥起程等語具見勇往任事適據兆惠富德楊應琚等㑹議本年屯田恐已踰期但可遣兵廵查已行文各駐劄大臣訖阿桂若業經准咨停止則奉到此㫖亦未必能猝辦或伊現在辦理有緒且確見必湏屯田即酌量帶兵前往併傳諭舒赫德楊應琚知之定邊將軍兆惠等疏奏續查陣亡官兵兆惠等奏言欽奉諭㫖因索倫佐領引見時詢出佐領格勒車爾尼薩勒圖陣亡名册未經送部交臣等查奏今據副都統鄂博什等呈稱二人陣亡屬實又同格勒車爾在阿魯海擊賊陣亡尚有索倫兵十六名同尼薩勒圖送文遇賊陣亡尚有兵十七名俱係將軍等交代時遺漏又副都統阿敏道前往囘部所領索倫兵查出被害有名者四十四人餘丁僕役三人倘仍有遺漏於撤囘該管官員處查明補報謹造册送部照例請䘏奏入報聞壬戌諭御前侍衛署副都統安泰等酌調索倫兵丁上諭軍機大臣曰安泰等奏稱烏魯木齊祗有綠旗兵屯田其防範哈薩克等仍須索倫察哈爾兵請於葉爾羌等處調取一百名聽用等語朕昨已傳諭舒赫德等酌於囘城所駐索倫兵内抽調三百名前往烏魯木齊安泰所請兵數為數尚少著傳諭伊等仍遵前㫖辦理命在京安插囘人分歸理藩院内務府管轄上諭軍機大臣曰在京安插囘人内額色尹係公品級瑪穆特圖爾都和卓係扎薩克應歸理藩院管轄又樂工匠藝人等共編一佐領其佐領著白和卓補授歸内務府管轄嗣後續到囘人均入此佐領下命將解送來京之革職噶雜納齊伯克副總管巴巴克及其家口人等交内務府與前次解到囘人一體安插丙寅諭定邊左副將軍成衮扎布等派兵防範哈薩克上諭軍機大臣曰成衮扎布奏莫尼扎卜報稱於恰克圖得俄羅斯文書有哈薩克統衆三萬分三路侵犯卡倫之語看來此必係俄羅斯虛辭設間若其事果屬確實伊部落又豈肯通信然亦不可不豫為準備著䇿布登扎布馳驛至烏里雅蘇台領兵赴布延圖防範若宜前進亦即相機辦理成衮扎布仍駐劄烏里雅蘇台接濟糧餉此行有兵二千名方妥除派調索倫兵一千名外成衮扎布即將都爾伯特扎哈沁烏梁海兵丁揀選數百名不足者以喀爾喀兵充補其馬匹牲隻口糧皆籌酌辦理又諭曰烏里雅蘇台軍營需兵防守著噶布舒諾們察馳驛前往選派呼倫貝爾之索倫達呼里兵五百名黑龍江墨爾根齊齊哈爾三處之索倫兵五百名交署將軍副都統舒泰辦理馬匹牲隻軍器口糧索倫達呼里兵向無俸餉年來効力軍營甚屬黽勉著加恩照呼倫貝爾官兵例賞給一半俸餉其額數著定為二千名舒泰即曉諭官兵等知之烏梁海副管旗章京赤倫病故命伊子䝉肯襲職上諭軍機大臣曰成衮扎布奏烏梁海副管旗章京赤倫病故應否令伊長子䝉肯襲職等語赤倫患病溘逝朕心深為軫惻其副管旗章京著加恩准伊長子䝉肯承襲仍戴奬賞孔雀翎命賞喀爾喀王策布登扎布桑寨多爾濟各銀一千兩車木楚克扎布銀五百兩二等侍衛納旺銀一百兩丁卯諭定邊左副將軍成衮扎布等查訊都爾伯特屬人訐控事宜上諭軍機大臣曰成衮扎布等奏都爾伯特管旗章京策塔爾等因其汗索諾木衮布懦弱而哈屯布尼達喇約束所屬頗嚴計欲遣囘母家據報差員查訊俱將哈屯理直應將策塔爾等治罪但伊部落向無定例請將策塔爾等革職安插其汗哈屯家務交扎竒魯克齊和通副管旗章京巴顔克什克等辦理等語成衮扎布等所辦未免姑息在伊等以布尼達喇乃喀爾喀部落之女若重治䇿塔爾等則有徇庇之嫌殊不知策塔爾為人臣僕而威脅其汗欲逐出哈屯不法已極自應從重治罪或念伊等新附未知禮法姑從寛典亦不可存留舊地致起釁端可傳諭成衮扎布即將伊等互訐之屬人傳齊訊問將其中不受布尼達喇約束因而訂讐設計者著即解送來京至其互訐供詞有策凌烏巴什欲叛之語諒係揑造成衮扎布即置若㒺聞方為妥協其擬派都爾伯特管旗人員著照所請行命派員䕶送拔達克山等部落使人上諭軍機大臣曰拔達克山等部落歸降遣使入覲朕加恩宴賚不日遣囘游牧應派員䕶送其䕶送拔達克山使人仍著額爾登額索勒屯和卓前往再添派明仁巴朗同行䕶送霍罕使人著伍岱阿布賚三摩羅莫爾瓚前往添派索諾木車凌諾爾占同行俟使人等各抵本界明仁額爾登額巴朗索勒屯和卓為一隊賫勅書賜物前往㾗都斯坦索諾木車凌伍岱諾爾占阿布賚三摩羅莫爾瓚為一隊賫勅書賜物前往布哈爾頒給各該頭目命其祇受命乾清門二等侍衛納旺等傳諭曉示哈薩克阿布賚事宜上諭軍機大臣曰納旺熟悉哈薩克情形著前往宣諭阿布賚云我駐劄烏里雅蘇台將軍等據報有統衆搶掠烏梁海者自稱哈薩克部落或稱係阿布賚親身統領將軍等奏請興師問罪奉大皇帝諭㫖阿布賚受朕深恩焉敢妄為其中恐有别情應行查詢明確又據查獲俄羅斯管烏斯得衣尼卡倫頭目寄管雅薩什諾衣頭目書扎内稱哈薩克統衆三萬渡伊爾得衣什河將至烏斯得衣尼可將雅薩什諾衣之人引避附近俄羅斯邊界等語其事深屬可疑阿布賚恭順有加其屬人來烏魯木齊貿易者相繼自必不應出此或係俄羅斯詭詞設間俾我加兵哈薩克以快其意又慮查訊得實故揑造此書使我不疑情形顯然但哈薩克游牧從來散處或彼此妄行搶掠不令阿布賚知悉亦未可定阿布賚惟應據實陳奏自當斟酌辦理此㫖即著納旺詳悉傳諭仍賜阿布賚縀四端戊辰命革内閣學士清馥職効力贖罪上諭軍機大臣曰據清馥奏捜捕逃賊斗齊等因雪盛迷踪未獲等語清馥前此追賊並未親身前往惟委之官兵致被賊誘去馬匹又借䕶送軍營馬匹為名竟囘巴里坤業經部議革職因伊奉到申飭之㫖復行前往是以暫令註册以觀後效今既疎脱首犯罪不可逭著革職交舒赫德差遣効力贖罪庚午㕘贊大臣舒赫德等疏奏採辦駐防火藥舒赫德等奏言查阿克蘇出産硝磺臣曾派囘人十戸採取交納又行文阿桂酌量增派數戸以供阿克蘇烏什駐防兵丁之用至葉爾羌所用火藥於沙爾呼勒托郭斯謙採取硫磺以葉爾羌所産之硝配造其鉛子於和什喇卜製造和闐所用火藥於克勒底雅取硝於塔克取磺配造其鉛子於阿克蘇葉爾羌採買製造喀什噶爾附近産硝亦由沙爾呼勒取磺配造火藥於特勒克製造鉛子現在各城駐防兵丁共五千三百名内鎗礮手三百餘名一年所需火藥約八九千觔即分派各城囘人採辦其如何定價抵補伊等應交糧石俟次年辦交時酌議具奏嗣後需用火藥鉛子停止内地運送奏入報聞辛未㕘贊大臣舒赫德等疏奏土伯特等部落貿易事宜舒赫德等奏言據薩納珠卡倫送到土伯特使人達什佳木撮等十人稱係拉達克汗所遣齎書呈送臣㑹同大臣官員等傳見達什佳木撮云我係管轄右界五千戸頭目聞大兵平定囘部特奉書稱賀請通貿易以番緞囘帶為贄臣等宣慰筵宴訖授以復拉達克汗書及蟒錦縀疋并分賞來使縀布令其起程再查現在囘部安靜其布魯特霍罕安集延瑪爾噶朗等貿易之人絡繹不絶臣等照舊例收税數次後囘城伯克等懇告云舊例收税稍重彼時牲隻價賤尚不甚累今逆酋擾害之後葉爾羌喀什噶爾羊一隻價至十餘兩肥馬一匹價至五六十兩商賈未免觀望不前祈暫行減収等語臣等察看情形屬實謹擬將囘人買來牲隻十分取一暫改為二十分取一外來商人牲隻二十分取一暫改為三十分取一其餘皮張縀布仍照舊例則貿易者多税課自然豐裕奏入報聞甲戌上御豐澤園幄次筵宴拔達克山霍罕安集延等使人命王公大臣及䝉古王公貝勒貝子等俱預宴乙亥申諭乾清門二等侍衛納旺曉示哈薩克阿布賚上諭軍機大臣曰據安泰等奏哈薩克阿布賚屬人於正月初來烏魯木齊貿易並獻馬三匹等語哈薩克於去冬今春往來不絶其情詞益為㳟順則搶掠烏梁海一事斷非出自阿布賚可知著傳諭納旺即與同行厄魯特侍衛等速赴烏魯木齊酌派兵丁數名前往哈薩克與阿布賚相見時不得致令驚疑可備述前後情節俾伊得據實查明委係何處人等搶掠一得確信速行奏聞平定準噶爾方略正編卷八十四
