body:
  text: 康熙五十六年春正月壬申増設噶斯路駐防官兵上諭議政大臣等曰據青海多羅貝勒達顔奏稱噶斯路兵勢單弱應添兵駐劄所奏甚是添兵之處爾等議奏尋議噶斯路駐劄兵僅一千聲勢稍弱應以西安兵二千及西寧鎮標兵一千撥噶斯路駐劄其兵應分兩班更番行走令各攜口糧以省挽運之費一切駐劄設哨分兵防守應令領兵侍衞阿齊圖詳議具奏奏入得㫖依議噶斯路軍前現今止阿齊圖一人著侍衞和善前往阿齊圖處一切軍務公同商酌而行再著石匣副將趙坤河間副將卜應奎前往管領換班緑旗兵丁尋和善疏言噶斯路駐劄官兵前議分兩班更番行走春季更番之兵攜八月糧冬季更番之兵攜四月糧臣查西寧至察罕烏蘇計四十日程往返湏八十日其春季更番兵雖攜八月糧除往返日期餘糧僅支一百六十日冬季更番兵雖攜四月糧除往返日期餘糧僅支四十日且噶斯地甚緊要防守兵丁不可一日空缺又兵丁往返十月以後沿途不得水草養馬甚難臣請更番之兵一年一調自西寧赴汛兵丁令五月起程六月至察罕烏蘇其察罕烏蘇回汛兵丁於更番兵到後即令起程七月中回至西寧每年如此兵丁口糧止増給八十日而防守可無一日空缺又兵丁往返在夏秋時沿途水草足用於養馬亦有裨益議政大臣等議如所請奏入上從之命増給領侍衞内大臣公傅爾丹軍前農具許八旗廢官自請前往効力傅爾丹疏言臣等所攜耕器用敝者三分之二請益購買於本年未播種前送至軍前現今在事開墾諸人臣等督令竭力耕種外請益遣効力者來軍以佐耕務議政大臣等議如所請所購農具令山西有司運送軍前其請益墾種之人八旗廢官有願往効力者許其具呈發往奏入上從之二月乙未命副都統丁夀圖喇率盛京吉林兵一千赴祁里徳軍前辛亥誥諭廷臣上諭九卿等曰去年劉䕃樞所奏軍前之事並無實見徒飾虛語揺惑人心以致將軍晏布亦為所惑任事不如從前渠意不過屢屢言之希圖僥倖或有所中去冬之雪止有尺餘天氣亦和暖渠云雪深三四尺米糧難運水草缺乏今糧亦運到馬亦甚肥此其虚妄之明驗矣劉䕃樞若有人心亦當慚愧朕從前中路出兵與將軍費揚古於五月十五日㑹齊及至克爾倫地方即有以運糧艱難阻朕勿往者彼時髙士竒陳元龍隨從亦勸朕回朕意以出兵時祭告天地宗廟社稷而費揚古已經先去豈可違約不相繼而往乎所以決意前往糧米亦不遲誤遂成大功若聴人言則必有悞大事矣三月戊寅以尚書富寧安為靖逆將軍公傅爾丹為振武將軍散秩大臣祁里徳為協理將軍分路進兵擊賊先是富寧安疏報巴里坤一路選兵八千五百分兩路襲擊䇿妄阿喇布坦邊界烏魯木齊吐魯番等處奏入得㫖軍務闗係緊要著將尚書富寧安授為將軍給與印信其署理西安將軍事務總督額倫特現在西寧駐劄彼處事件無多著額倫特前往駐兵之處與富寧安㑹同商議料理總兵官王以謙係旗人曽厯任西安副都統彼處又有郎中長受將駐劄西寧之西安滿洲兵緑旗兵令王以謙長受管轄肅州地方甚屬緊要延綏總兵官李耀停其前往穆賽等處令將伊所帯之兵前赴肅州駐劄看守今既遣兵前往襲擊䇿妄阿喇布坦之汛界地方其留後接應及緊要形勢之地安營看守接運糧餉等事闗係重大富寧安額倫特二人内著一人帯領襲擊之兵前去留一人料理事務若吐魯番地方可取則取將伊處米石充作口糧食用遂以彼力協同看守倘力稍單弱有由額林哈畢爾噶一路所進五千之兵即將此兵酌量調往併力㸔守過冬之時運送米糧牧放馬匹及防敵人之潛劫襲後等處務湏詳加籌畫看守吐魯番之兵不可撤回别路襲擊之兵作何張大軍勢著兩路大臣公同確議在於要緊適中之處暫行駐劄若易取而難守則仍照前議令其襲擊而回烏魯木齊布魯爾布拉罕額林哈畢爾噶四路之兵亦令襲擊而回此等軍務萬里之外不便請㫖遵行此處亦難遥度指示令軍中大臣等酌量詳議作速遣人知㑹阿爾台路之大臣等互相約定日期相機而行著議政大臣都統滿漢大臣等各抒己見詳議具奏尋又諭議政大臣等曰若大兵前進宜攻取吐魯番或招撫之即與哈宻相類盡入國家版圖既入版圖不得不善為保䕶若襲擊之兵勢覺單弱或䇿妄阿喇布坦擁衆而來救援吐魯番或吐魯番等更變彼時不能看守則得而復失闗係甚大著軍中大臣詳加籌畫如有難處之勢仍照前議襲擊回來為是又軍務應相機而行若此兵襲擊能使䇿妄阿喇布坦軍中内亂分散來歸則竟行襲擊不必請㫖將此訓㫖曉諭軍中大臣至是議政大臣等議曰今尚書富寧安進兵如吐魯番地易攻易守則取之不然仍如前諭襲擊而還奏入得㫖依議軍前革職効力之人甚多伊等俱係小人如偽造浮言揺動衆心應加嚴禁總兵官李耀帯領駐劄肅州之兵令富寧安酌量調遣巴里坤一路授富寧安為將軍給與靖逆將軍印阿爾台一路授公傅爾丹為將軍給與振武將軍印祁里徳授為協理將軍令都統穆賽率阿爾台兵三千出汛界於三路要緊適中地方以備應援其襲擊之兵兩路應互相約㑹路逺者先行路近者接續起程俱於七月前進兵乗秋季而回馬匹方可過冬著郎泰滿泰克什圖保住等將朕㫖傳示兩路將軍臣等謹案傳曰天生五材廢一不可兵者威不軌而昭文徳惟聖人為能用之欽惟聖祖仁皇帝大度深仁卓越三五蘖芽不靖天討必申於時朔漠耆定之後䇿妄阿喇布坦搆釁干誅罪在不赦而一時廷臣如提督師懿徳巡撫劉䕃樞等或以道逺雪深罷兵勿用之説進仰賴聖神獨斷力排羣議特命重臣富寧安等出師討罪克奏大功我皇上纘武集勲永清西極收自古以來未收之地臣自古以來未臣之人累洽重光無思不服伏讀聖祖寳訓有云初兆既吉終無不吉者於今大告武成信如響卜易曰天之所助者順也韓愈亦曰惟斷乃成夫惟成之以斷而上協天心神人助順其斯為王者之師無疆惟休也歟己卯以常闗保為副都統往布魯爾上諭議政大臣等曰布魯爾一路常闗保委署副都統偕公博貝前往常闗保員缺令軍前將軍大臣另行題補由額林哈畢爾噶一路前往夏五月癸酉諭振武將軍公傅爾丹上諭曰烏梁海與禽獸等耳有無總無闗係現今掃滅䇿妄阿喇布坦之事乃屬緊要若大處不理止將烏梁海收取遷移以為緊要一經舉動之日向何地驅逐耶䇿妄阿喇布坦若一揺動烏梁海自俱為我有凡謀大事者應將小處暫置現今羅卜藏達什之信亦尚未來也庚寅振武將軍公傅爾丹奏阿爾衮固哲等處屯務傅爾丹疏奏今嵗除耕熟之田已經播種外其阿爾衮固哲西巴里鄂希納馬爾濟呼勒克察罕郭勒等處地土肥厚現在開渠引水一體増種五月中又遇甘霖霑足所種青稞小麥大麥各極暢茂奏入報聞己亥靖逆將軍富寧安奏報進兵富寧安疏言臣等選兵八千五百分三隊往烏魯木齊襲擊首隊兵令散秩大臣阿喇衲等領之臣自領二隊都統晏布等領三隊各持六十日糧以次前進聞伊勒布爾為䇿妄阿喇布坦汛界即令阿喇衲等於所領首隊兵選五百人夜行晝伏往擒其守汛者又調延綏總兵官李耀尾大軍後於色畢特烏蘭烏蘇等要地設營防守李耀標下兵少請撥巴里坤五百助之并令侍衞哲爾徳等往㑹阿爾台一路將軍約期並進旋據阿爾台將軍公傅爾丹等覆言彼路曽奏令原撥兵由布魯爾布拉罕額林哈畢爾噶三路進發今巴里坤既分三隊往襲烏魯木齊則彼路所撥額林哈畢爾噶之兵可勿往即以益布魯爾布拉罕兩路令俟巴里坤進兵之期同發亦各攜六十日糧至額爾齊斯河烏圖等處相機襲擊議政大臣等議如所奏奏入得㫖從前議進兵時帯四十日口糧不令深入今又議帯六十日口糧深入襲擊時漸寒冷兵回時恐馬匹疲痩應令於何處過冬并進兵道路多有與吐魯番相通處應作何防備之處著再行詳議具奏尋議巴里坤阿爾台兩路進兵應如原議攜四十日糧到烏魯木齊及額爾齊斯河烏圖等處應擊則擊應取則取如有不便仍整兵而回其總兵官李耀兵恐單弱應撥兵五百尾後䇿應凡進兵道路與吐魯番有相通之處遵㫖行文領兵將軍加意防守其回兵時於何處過冬飼養馬匹令將軍等詳酌而行奏入上從之秋七月辛未靖逆將軍富寧安奏報擒賊於烏蘭烏蘇及通郭巴什富寧安疏言臣等分兵三隊於六月二十六日由巴里坤進發令散秩大臣阿喇衲等率兵一千三百餘為首隊往擊厄魯特邊境擒其生口臣統大兵尾其後於七月初四日將至阿克塔斯據阿喇衲報言我等率兵夜行晝伏初三日至烏蘭烏蘇擒獲䇿妄阿喇布坦哨兵二人一人名阿籌拉克一人名吹扎卜應即檻送京師以此二人熟識路徑臣等方率兵前往襲擊暫用為嚮𨗳行且遣還所部宣諭聖訓或前途更有俘獲令歸宣諭即檻送二人至京俟臣等至烏魯木齊後酌量而行奏入得㫖朕年日増血氣漸衰故此事遲疑至今如當朕少壯時早已成功矣然朕以老年之人籌畫調遣無不符合者此即軍機之吉兆也初兆既吉終無不吉矣此疏著示諸皇子及衆大臣翼日大學士馬齊奏言觀將軍富寧安所奏我兵襲擊䇿妄阿喇布坦直抵邊境擒其哨兵不出皇上睿算之中諸酋更相驚恐從此捷音接踵至矣上諭曰䇿妄阿喇布坦之人皆烏合之衆其心不一我大兵一到即或降或散朕經理軍務已久每事慎重所以用襲擊之兵劉䕃樞并不知此意聴傳聞之言即勸朕息怒休兵用兵之事如此妄奏可乎伊不過用此空言作文章而已無知之徒即由此互相𫝊播從來遇賊迎降即此等空言作文之輩流賊李自成進京之際明文臣迎降稱頌李自成奏表云邁湯武而無慚徳比堯舜而多武功本朝兵至復降本朝逆賊吳三桂叛時貴州巡撫曹申吉降而提督李本深亦降四川巡撫羅森降而提督鄭化蛟亦降王師至簞食壺漿迎之賊兵至亦簞食壺漿迎之誠可恥也又諭曰䝉古等感戴本國之恩忘身以奉事者甚衆當索約爾濟河地方與噶爾丹交戰時阿魯科爾沁之棟牛特台吉自戰塲出謂衆曰我等受皇恩甚深若稍退縮有何面目以見聖顔乎率伊屬兵三百名復進皆歿此内祁里徳族中數人亦戰歿朕甚憫之近日緑旗武官亦好逰擊潘至善駐防哈宻䇿妄阿喇布坦二千兵來侵潘至善率伊屬兵二百名即行擊敗臨陣時潘至善奮然一手持刀一手持弓笑曰是我等報皇上之日也哈宻回子及被獲厄魯特等無不言潘至善漢人而有勇如此為之極口稱贊頃者總督滿保摺奏自旅順口逃去之賊從浙江而來福建逰擊鄭勤領兵追及跳上賊船或斬或擒緑旗武官感朕之恩皆有捐生敢死之心朕慮其奮勇太過或致有傷殊以為念耳是月富寧安又疏報臣等於七月初十日至烏魯木齊擒獲回人探問準噶爾消息即於十一日率師前進至通郭巴什分兵捜其山林擒獲回衆男女一百六十九人所獲駝馬牛羊無算其烏魯木齊賽音塔拉毛塔拉等處田畝悉蹂躪之於十二日整兵而歸奏入得㫖著議政大臣議奏尋議靖逆將軍富寧安等統兵襲擊䇿妄阿喇布坦至其邊界烏魯木齊等處捜勦山林多所俘獲振旅而還實能遵奉聖訓奮勉可嘉應令註冊俟事定日大臣以下各予議叙奏入上從之壬申命理藩院尚書赫夀書諭拉藏上諭赫夀曰爾可以已意作一勸諭書送於拉藏汗云䝉皇上之恩將我補授理藩院尚書昔時曽到爾處汗甚愛敬我念彼此相好之情盡我之心作書相告頃者統領駐劄巴里坤地方兵丁將軍富寧安等率先鋒兵問罪於䇿妄阿喇布坦之境拏獲䇿妄阿喇布坦哨兵厄魯特阿籌拉克吹扎卜二人問之云䇿妄阿喇布坦仍住伊本處與俄羅斯哈薩克布魯特皆為讐敵拉藏之子娶䇿妄阿喇布坦之女三年已經生子達賴喇嘛班禪及拉藏之使俱在䇿妄阿喇布坦處聞布木之子䇿零敦多卜托卜齊都噶爾三都克等率六千兵去年往阿里克處助拉藏汗征布魯克巴至今未回以此思之䇿妄阿喇布坦之奸狡甚不可信或助爾征布魯克巴或侵爾以取西邊地方俱未可定再頃者爾呈部之文有部中若不料理我等除爭之外别無他法等語由此觀之爾或欲侵戴青和碩齊羅卜藏丹津以引導䇿妄阿喇布坦之兵亦未可定爾誠受我主之封食我主之禄而侵我邊疆之貝勒我四川等處所有三萬兵丁與貝勒戴青和碩齊同在一處又豈有坐視爾臨諾木琿烏巴什穆魯烏蘇等處侵青海之理乎至彼時我兵助戴青和碩齊與爾交戰我雖有禁止之文亦無及矣將此作書可也癸酉追贈輝特台吉扎木畢為輔國公靖逆將軍富寧安疏言臣等自烏魯木齊回兵往畢留圖遇厄魯特兵三百餘人尾我兵後臣即整兵迎勦賊衆奔竄深山此戰輝特台吉扎木畢首先奮勇以鎗刺賊賊墜馬擒之復進追賊賊發鳥鎗中扎木畢之胸而死奏入得㫖扎木畢首先奮勇勦賊以至陣亡甚屬可嘉著追封輔國公以其子承襲八月壬午朔命署西安將軍總督額倫特駐軍西寧先是靖逆將軍富寧安疏報擒獲回人阿都瑚里言䇿妄阿喇布坦令其宰桑都噶爾三都克䇿零敦多卜托卜齊等領兵六千於去年十一月由阿里克路向西進發其欲襲拉藏或助之未定疏入得㫖䇿妄阿喇布坦由阿里克地方發兵一事雖虛實未知朕意料之甚屬可惡䇿妄阿喇布坦先曽向哲卜尊丹巴胡土克圖之使者云拉藏汗係嗜酒無用之人不足介意羈留其子并留達賴喇嘛班禪之使不令前去今此兵或征取拉藏收取西邊地方或幫助拉藏侵犯青海俱未可定若係征取拉藏其兵於去年十一月前往今已成讐我兵欲救援拉藏恐地方遥逺䇿妄阿喇布坦之兵若幫助拉藏同來侵犯青海則不可不備兵協助迎勦現今巴里坤有富寧安阿喇衲等一應軍務俱已諳練行兵甚易應將額倫特撤回仍駐劄西寧將協助兵丁與青海之人一同豫備著議政大臣等議奏至是議覆曰聖諭周詳應令署理將軍總督額倫特速往西寧料理軍務糧餉西寧總兵官王以謙侍讀學士查禮渾等在松潘備兵提督康泰主事巴特瑪等時時遣人宻往青海偵探若得消息一面奏聞一面彼此知㑹相機而行其駐劄噶斯之侍衞阿齊圖霍善等令加意固防探賊踪跡奏入上從之乙酉振武將軍公傅爾丹奏報擊賊回軍傅爾丹等疏言臣等撥兵分隊襲擊公博貝於六月二十九日至博羅布爾噶蘇見有賊踪即追斬厄魯特五人生擒四人投順者十六人額駙吳爾衮都統穆賽令喀爾喀台吉盆楚克及婁徵額等分路尋探各無賊踪於七月十七日回兵奏入報聞丙申命將軍富寧安傅爾丹等詳議防範事宜并量撤在營官兵上諭議政大臣等曰三路襲擊軍兵俱遵朕指示成功整旅而還其將軍䝉古王貝勒貝子公台吉等及武職大臣官員以下軍兵以上俱到極邊之處回來凡地方逺近道路平險水草多少以至敵人情形大略悉知著逐一繕摺奏聞再今將軍兵作何料理之處令將軍䝉古王貝勒貝子公台吉等及武職大臣官員各抒己見具奏並行文將軍富寧安傅爾丹等三路之兵俱已回來或敵人侵犯哨汛偷竊搶奪事未可定我軍應作何防範著詳議以聞尋㑹議曰自逆賊䇿妄阿喇布坦起釁以來一切軍務悉皆皇上睿慮預行指授將軍大臣等發兵三路襲擊擒俘䇿妄阿喇布坦部落厄魯特回人獲其馬駝牛羊等物蹂躪所部田禾賊衆不支驚駭逃竄今三路兵各奏功旋師應令將軍富寧安傅爾丹等於所屬兵及鄂爾多斯右衞西安緑旗兵丁中簡其羸弱者遣還以聞奏入上從之丁未命撥荆州滿洲兵赴成都太原滿洲兵赴西安議政大臣等議覆西寧駐劄侍讀學士查禮渾等疏言據西邊拉藏汗咨文云䇿妄阿喇布坦於七月初四日發兵掠其納克禪邊内波木寳部人且令䇿零敦多卜率兵萬人來取拉藏我兵不可不備應令松潘西寧兵出口駐營奏入得㫖依議但地方遼逺俟信息到時始行調兵恐或不及可派荆州滿洲兵二千名發往成都派太原滿洲兵五百名發往西安九月壬子朔諭諾爾布色楞布達理等諾爾布色楞布達理奉命往青海恭請訓㫖上諭曰爾等俱往來青海路途已熟所以派往今拉藏若能敗䇿妄阿喇布坦之兵信到即可調回爾等倘拉藏被策妄阿喇布坦所敗爾等即與青海台吉等協力征討明白曉諭務令合而為一使伊等絶無猜疑不致生變方善或拉藏與䇿妄阿喇布坦之兵㑹合欲征戴青和碩齊湏諭知青海衆台吉等云䇿妄阿喇布坦與我大軍為敵今拉藏與之合一是顯為讐敵聖主始終仁愛保䕶顧實汗之子孫直至於今實係聖主天髙地厚之恩此時正當奮發報効與我并力而行甚易易也今四川西寧等處邊界之兵有十萬現在又調荆州滿兵二千在成都預備調太原等處滿兵在西寧預備我兵實不可勝用將此情亦明白諭知戴青和碩齊策妄阿喇布坦之兵先侵拉藏方去圖謀達賴喇嘛必以此告知再將軍額倫特才略過人爾等凡事一體同心若有聞見務必公同商議而行丁巳發帑預給在營兵餉議政大臣等議覆靖逆將軍富寧安奏言來嵗進征滿洲漢軍官兵及各緑旗兵當先期整理馬匹軍器等物借支俸禄錢糧計銀二十五萬六千兩有竒請如數借給俟事定之日扣除奏入得㫖此次官兵雖未臨陣克取地方然同心効力甚屬可嘉將朕内庫銀兩發出二十六萬令其整理馬匹器械如恐路逺不能即達將附近地方所有錢糧著户部速行料理成功時此項銀兩不必扣除若無効力之處空回各本汛者如議政大臣所議仍行扣除現將内庫銀兩照數交與户部此項錢糧係朕特恩其另造檔案務令清楚是月四川陜西總督鄂海疏言西寧鎮標官兵前往噶斯路駐防時借餉六月今代歸當如數扣除兵丁無以自給請於每季扣除一月留兩月糧給本兵贍養又現往噶斯路官兵亦請每季發兩月糧餉至軍散給留一月糧養其家口俟還西寧之日陸續扣除奏入得㫖噶斯路換班回來並現往駐防官兵所借糧餉著暫停扣除俟功成事竣作為朕所賞賜如不成功照該督所題扣除其行月糧餉送至軍前并存留贍養家口之處著照該督所題給放該部知之壬申増給靖逆將軍富寧安官兵富寧安疏言進勦兵一萬三千外請増喀爾喀兵三千上諭議政大臣等曰將軍富寧安處派察哈爾兵一千京城八旗䕶軍一千前往所派䕶軍内將鳥鎗手䕶軍派五百名此兵到時將彼處緑旗兵之不整齊者著將軍酌量撤回再西安滿洲兵派往軍前者甚多將京城驍騎兵内每佐領各派三名前往西寧駐劄預備調遣尋又諭議政大臣等曰派往西安預備驍騎兵丁每佐領三名三名内火器營兵丁一名此火器營兵丁著䕶軍統領瑚錫圖帯領前往甘州駐劄冬十月乙酉命户部左侍郎梁世勲盛京兵部侍郎海夀督理巴里坤屯田乙巳命都統和禮往雲南䕶軍統領温普往打箭爐上諭議政大臣等曰現在西邊用兵之處與雲南及打箭爐地方道路相通應預為防備著都統和禮前往雲南䕶軍統領温普前往打箭爐各帯䕶軍㕘領及侍衞部員二人即行馳驛前往命公䇿旺諾爾布將軍額倫特侍衞阿齊圖率兵分駐青海要地青海親王羅卜藏丹津疏報䇿妄阿喇布坦遣䇿零敦多卜等率兵三千欲取西藏拉藏汗整兵與戰兩無勝負䇿零敦多卜兵自逺道衝雪而來士卒凍餒馬駝倒斃沿途食人犬兵悉徒步三千兵中厄魯特人少烏梁海人多到者二千五百耳其餘疲極不能悉到也奏入上諭議政大臣等曰西藏之地達賴喇嘛所蓄糧餉頗多器械亦備且西藏人衆守法今䇿妄阿喇布坦無故欲毁教占藏衆人豈肯容伊且䇿零敦多卜等之兵疲敝已極除陣亡病死外未必滿二千又安能取得拉藏城池但䇿零敦多卜等自分攻取則兵力不支撤兵而回亦無生路或因情急恣行侵掠亦未可定不可不加意防備爾等其確議具奏尋議曰著青海台吉等即率兵前往令内大臣公䇿旺諾爾布將軍額倫特侍衞阿齊圖等統兵駐劄青海要地松潘之兵亦令駐劄要地以便哨探萬一有警彼此相應相機而行并速行文將軍富寧安等奏入上從之靖逆將軍富寧安請停撤駐營官兵先是上諭富寧安等曰今年襲擊回駐兵丁内有殘疾者應查出撥還原汛并將撥補發往之處爾等速議具奏至是富寧安等疏言現在巴里坤兵中殘疾者少且來年進兵此時議撤未便請止兵丁勿回原汛奏入上從之丙午兵部左侍郎李先復通政使司右通政魏方泰運米回京復命李先復魏方泰入奏上曰運米事難易如何李先復奏曰臣等向未至口外初以為難今二年運米往返六次處處悉得水草始知其易上諭九卿等曰口外路逕未經者輒畏其難伊等運米兩年便知其易明年若再運米益不啻輕車熟路矣口外有一定當行之路水草足用若不諳路徑則難於前進所以行路先須酌量形勢䇿妄阿喇布坦所住之處即古陽闗哈宻以西即古𤓰州沙州所通之地甚廣前有以守邊界之説進者勢必將邊牆之外棄去斷斷不可即如臺灣南澳人以為孤懸海外無闗緊要自得其地福建廣東之賊便無容身之地所係匪輕然海中之路亦有一定福建至盛京沿海一路曽令詳細繪圖島嶼停泊皆有定所口外亦是如此彼處行路宜於冬不宜於春夏昔人用兵以為春間口外馬痩内地馬肥殊不知春間馬一出口肥者先壞受累不小凡人平時易出大言臨事多畏縮逡巡口外行走遇大雨大雪即驚惶無措趙宏燦曽在川陜地方屢經行陣後廣東苗蠻竊發伊率緑旗兵四百往勦俱畏怯退縮伊亦甚倉皇可見用兵須主意堅定若主將倉皇人心皆為揺惑矣趙申喬前在偏沅征紅苗挺身前進新滿洲令其在後以避鳥鎗伊云即有不測我後人尚可得廕襲與我身在何異趙申喬並不嫻軍旅但立定主意便無畏怯從前耿逆變亂李之芳守衢州亦是身先士卒也當初西路用兵滿兵已先進緑旗兵畏死欲退將軍孫思克諭云滿兵前發並未傷損一人汝等且看滿兵若有死傷再退未遲衆始前進因成大功十一月甲戌命甘肅提督師懿徳留京上以甘肅提督師懿徳議不可進兵一摺示滿漢大學士學士九卿詹事科道等諭曰此事彼處督撫不奏師懿徳獨奏亦是仿劉䕃樞之意且將師懿徳等留京用兵之事原要機謀非拘執不通者所能辦理當中路出兵時人云地寒馬痩到彼處馬匹必致凍死又包衣大力言糧餉未到難以前進朕即止之云此中機謀非爾等所知如再妄言即律以軍法朕來時祭告天地宗廟必見噶爾丹方回又與伯費揚古約兩路合兵今不前進如何先回朕親率大兵深入敵境算在必勝也噶爾丹使人來朕留營中七日諭來使云不見噶爾丹必不輕回鼓兵前進差人往視噶爾丹已遁去二日再差人往視已盡棄廬帳器械逺遁矣朕乃回兵今䇿妄阿喇布坦本屬小醜不足為慮但怙惡不悛侵陵哈宻前曽以二百人敗其二千餘人矣今因其移兵到藏道路甚逺又無接應自去年十月起行今年七月方到過三層冰山噶斯等處實為難行然彼既可以到藏我兵即可以到彼處兵亦不用多二百餘人便可破之矣人奏彼處雪深八尺兵不可住今李先復係漢人自阿爾台口外來氣色甚好云途中並不見有病人是邊外水土原可居住故復議明嵗三四月出兵用兵惟以安寧百姓保䕶地方為先故各省督撫奏摺來俱批先固内地緊要不可聴小抄以惑人心我朝驛遞之設最善西邊五千餘里九日可到荆州西安五日可到浙江四日可到三藩叛逆吳三桂輕朕年少及聞驛報神速機謀深逺乃仰天歎服曰休矣未可與爭也臣等謹案古者置郵傳命漢唐驛馬並三十里一置厯代以還其制寖宻詔書日行五百里然或不能如期傳布宋時設急脚遞金初置急遞舖並日行三百里自古郵傳無至五百里以上者固由俗狃便安不習馳驟亦在上者立法之未善也我聖祖仁皇帝時乗六龍翦除羣醜於時軍書迅速數千餘里之程計日即達逆藩奪氣大勲速成聖謨所垂仰見國家制度實足超越千古皇上覲光纘緒耆定西陲羽檄飛馳驛遞六百里至六百里以上絶域所至稟承廟謨指授機宜不爽晷刻拓地二萬餘里成功不越五年易曰惟神也不疾而速不行而至聖天子之設施豈尋常擬議所能窺測萬一者乎五十七年春正月甲寅賞賚松潘鎮屬各土司四川松潘鎮總兵官路振揚疏言松潘所屬黄勝闗無斥堠向於漳臘營設一逰擊統兵六百四十駐劄管轄雜番迤南為雜谷安撫土司部種繁多俗號勇悍其南境直抵打箭爐與天全招討司明正土司接壤土司良爾吉死其子班弟爾吉尚未襲職臣來備兵初宻令所在土司選其部屬防守隘口班弟爾吉尤稱勤順請許其襲職加以賞賚又有加渴瓦寺安撫土司桑郎温愷所部羌番亦衆接近漢地現今募夫運糧其部人居六七又漳臘營所轄之祁命上下包坐司等土官土兵習於戰鬬熟諳邊情臣曽令預備土兵一千聴候調遣咸各踴躍並請各加賞賚如有調發許其支給口糧議政大臣等議覆悉如所請其班弟爾吉請予襲職令都統法喇等查明議奏奏入上從之庚申命䕶軍統領温普率荆州滿洲兵駐打箭爐都統法喇等疏言打箭爐道狹米糧難到去年荆州滿洲兵來時路逺馬痩俟飼養稍肥臣選滿洲兵五百遣官率往駐劄又選建昌鎮緑旗馬步兵七百化林營緑旗馬步兵八百令於所在預備以便酌量調遣議政大臣等議曰應如所請令䕶軍統領温普等率荆州滿洲兵五百往打箭爐駐劄令巡撫年羮堯遣官辦理糧餉奏入上從之戊辰撤松潘等處兵入口駐劄侍衞查什遵㫖以松潘等處兵馬應撤與否往問察罕丹津察罕丹津奏云大兵西進䇿妄阿喇布坦決不敢來方今天寒草枯馬匹難行軍士甚勞苦不若令四川松潘兵撤回原所牧養馬匹休息士卒議政大臣等議覆曰現今兵丁駐劄阿爾錫巴勒錫等處去口不逺應令副都統寧古禮總兵官路振揚撤兵於松潘口内附近駐劄不時遣人至青海偵探消息奏入上從之壬申命侍郎色爾圖駐甘州總兵官范時捷署甘肅提督事同理軍務上諭議政大臣等曰去年朕欲派一大臣在甘州駐劄辦理軍務今額倫特既在西寧諸事可以無虞且自有軍機以來凡事朕皆預為籌畫調度後亦無不相符者近經將軍富寧安奏請兵餉朕已下㫖賞給銀二十五萬兩今提督師懿徳奏請撤兵此銀付之空處不知朕於軍機事務並不惜錢糧已動用過數百萬兩矣又甘肅等處緑旗兵丁自出兵以來曽賞過馬匹錢糧口糧并給在家之妻子米糧此等恩澤曽否均霑其間有無尅扣尚未明晰如兵丁之在家妻子未霑恩澤朕心亦不能安朕思固原地方提督潘育龍乃年久之將軍諸事諳練自可無虞其甘州地方甚屬緊要須派大員在彼駐劄查明此等事務且所處既近可以互相應援尤為有益又派滿洲兵一千名喂養馬匹肥壯春間天暖不令由口外前去著令由内地到肅州駐劄尋議政大臣等開列大臣職名具奏奏入得㫖著派侍郎色爾圖前往寧夏總兵官范時捷著署理甘肅提督事務亦令前往甘州偕色爾圖一同辦理其寧夏總兵官員缺令范時捷舉伊所知之賢能副將䕶理乙亥右衞將軍費揚古以疾乞休許之戊寅特給在軍官兵内製衣上諭議政大臣等曰兩路軍兵駐劄邊塞二三年矣勞苦殊甚衣服亦將損敝朕深加軫念特令製衣二萬襲現今所有一萬襲派侍衞一員由内地驛站送至將軍富寧安軍前賞給軍兵再一萬襲候製造完日送至將軍傅爾丹軍前著爾等大臣查驗裝載牢固發往如尚有不敷計算軍兵數目照此衣服將庫貯布疋賞給令其自行製造二月戊子命總督額倫特等定撥噶斯路更番兵西寧總兵官王以謙疏言噶斯路更番兵止於鎮標所屬撥往數實不敷議政大臣等議覆曰應於都統瑚錫圖率往兵丁及固原凉州所備緑旗兵丁内均匀調撥前往西寧奏入得㫖噶斯一路兵丁換班現有總督額倫特公䇿旺諾爾布侍衞阿齊圖等在彼處著行文令伊等定議具奏己丑設赤金靖逆二衞及柳溝所靖逆將軍富寧安疏言西吉木設赤金衞達里圖設靖逆衞各増設衞守備一員西喇郭勒設柳溝所増設守禦所千總一員再増設同知通判各一員兼管二衞一所其駐防兵丁武職等官令肅州鎮管轄衞所等官令肅州道管轄議政大臣等議如所請奏入上從之庚寅命侍衞色楞等率兵援西藏先是總督額倫特疏報據拉藏使人和喇竒云前者與䇿妄阿喇布坦兵交戰斬獲賊衆二百餘人䇿零敦多卜及準噶爾人等不習水土徧身病腫現今拉藏同達賴喇嘛班禪額爾徳尼在布達拉處固守令我齎疏往奏聖主又大喇嘛芻爾齊木藏布喇木扎木巴奏稱我等由剛諦沙還至拉薩拉藏告云䇿妄阿喇布坦令䇿零敦多卜等率兵六千餘至淨科爾庭山中扼險來戰中夜越嶺而至遂據達木地方尋侍衞阿齊圖等又疏報據拉藏使人胡喇竒云拉藏蘇爾扎前與策妄阿喇布坦兵交戰殺獲甚衆今拉藏蘇爾扎等已自達木悉至招中議政大臣等議曰令侍衞阿齊圖總督額倫特等謹防速備逺偵賊情相機進勦奏入得㫖依議速行至是拉藏奏稱臣世受聖主洪恩不意逆賊䇿妄阿喇布坦發兵六千與我土伯特兵交戰兩月雖各無勝負而敵兵又復入招臣現率兵守䕶招地但土伯特兵少可慮若賊兵入據喀木衞藏地竊恐黄教殄滅以此籲求皇上聖鑒速發兵并青海兵即來䇿應議政大臣等又議曰拉藏係顧實汗裔維持黄教今來求援應令西寧松潘打箭爐噶斯等處各備兵馬并土司楊如松所屬兵同發現今青海王台吉等撥兵六千於正月初十日啟行非益以滿洲兵不可應令侍衞色楞侍讀學士查禮渾選西寧滿洲兵二百緑旗兵二百及土司兵一千率往青海㑹同青海王台吉等商酌行事其青海王台吉等發兵後家屬無人守䕶應令公䇿旺諾爾布總督額倫特與青海王台吉等妥議於屯兵處加意安輯奏入上從之尋又諭議政大臣等曰侍衞色楞等既統兵進征西藏沿路汛守防䕶哨探以及單身行走認識路徑等事甚有闗係曽令侍衞扎克巴藏布將侍衞等酌量派往再於都統瑚錫圖所帯兵丁内將慣習行走漢仗好之新滿洲及烏拉齊索倫揀選幾名即於彼處發往色楞軍前遣劉䕃樞軍前種地刑部議奏原任貴州巡撫劉䕃樞供稱臣年老昏愚茫無知識伏見皇上用兵西陲妄行奏摺及命臣赴軍前周閲營壘誑言適逢大雪墜馬傷足病甚難行又不請㫖徑回甘州䝉恩寛恕令臣仍往看雪又不遵行妄求寛免䝉恩令臣赴任彼時病勢漸減遂爾直行前往種種乖謬罪應萬死劉䕃樞應革職擬絞立決但議政大臣等前於不肯進兵之提督師懿徳議以立絞奉㫖暫停治罪劉䕃樞亦應暫行停決發往侍郎海夀處種地俟大兵回日治罪奏入得㫖劉䕃樞豈可復行發往陜西著發往傅爾丹等地方種地己酉陜西凉州總兵官康海奏報邊防康海疏言紅番薩馬喇木扎木巴等聞拉藏被傷不無恐怖又貝勒羅卜藏亦遣人來言狀臣所巡南山一帯去大通河百餘里即通青海西藏噶斯之要路扁都口酸茨河寛溝等處邊隘險要並宜防守臣令所屬兵丁在城飼養馬匹一有用處聴候調遣臣與督臣㑹商安撫防備奏入報聞平定準噶爾方略前編卷四
