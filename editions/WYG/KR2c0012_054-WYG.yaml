body:
  text: 乾隆十七年春正月乙亥準噶爾使臣圖􅁲濟爾哈朗等入貢準噶爾台吉喇嘛達爾扎奏言前遣使臣額爾欽尼瑪將前往西藏聘請喇嘛之事具奏䝉大皇帝恩准於再遣使臣入貢時延請有徳行喇嘛四五人前来教誨衆喇嘛不勝感激令遣使臣圖卜濟爾哈朗進貢並延請喇嘛仰懇聖恩俯准於胡土克圖三人内恭請一人於推廣黄教實有禆益併祈仍照前奏許令我處遣人輕騎減從前往西藏為我先人設懴進供所有沿途派撥官員兵丁照㸔等事雖覺繁𤨏但已䝉加恩和好而遣往之人為數無幾尚屬易行使逺近聞之無不仰慕大皇帝之盛徳其貿易之事令使臣口奏奏入報聞甲申命尚書舒赫德侍郎玉保赴北路軍營㑹籌防範準夷事宜定邊左副將軍親王成衮扎布奏言據卡倫驍騎校齊克慎報稱準噶爾宰桑瑪木特等遣人前来告稱本處台吉達瓦齊作亂在納林布魯爾地方被我兵殺敗達瓦齊與阿睦爾撒納等十二人逃出不知去向是以我台吉命阿爾台等處㳺牧宰桑三人帶兵往烏蘭大坂努克穆隆都什托羅海華碩羅圖洪郭爾鄂隆舒魯克圖得樓等七處隘口駐劄以防達瓦齊與阿睦爾撒納逺遁恐各卡倫疑我無故動兵特来告知等語又奏據䝉古管旗章京莫尼扎卜前往烏梁海確訪信息有準噶爾人至烏梁海探親告稱達瓦齊於去年九月内與台吉喇嘛達爾扎有隙私與台吉達什阿睦爾撒納班珠爾䇿凌沙克都爾等商議投順大皇帝其後達什沙克都爾反將商議之事告知喇嘛達爾扎即帶兵追趕與達瓦齊戰敗而回達瓦齊又與阿睦爾撒納班珠爾等商議若投中國恐阿爾台地方有兵堵截地狹難過因向額爾齊斯前赴哈薩克等語奏入上諭軍機大臣曰準噶爾向多詭詐伊等如果慮達瓦齊逃竄不過派兵防守足矣今反遣人來告殊屬可疑此或伊等恐我處生疑故為安慰却暗行譎詐猝然闌入我境亦未可知聞喀爾喀㳺牧多有距卡倫甚近者今若不豫籌防範恐賊人一旦竊發不暇向内收移將反令其得利所有附近卡倫之喀爾喀㳺牧應早令收入腹地方妥然此時遽使移徙又不免起衆人驚疑且或賊人聞知轉以我為畏懼此中宜緩宜急應如何熟計妥辦甚闗𦂳要今派尚書舒赫徳侍郎玉保前往軍營查㸔軍容器械著傳諭成衮扎布俟伊等到時㑹商宻議務期籌畫盡善定議具奏戊子命駐藏都統班第等防範準夷窺藏上諭軍機大臣曰此次準噶爾台吉喇嘛達爾扎奏請三事朕俱未准行㸔来喇嘛達爾扎並非為推衍黄教其意以為不准請胡土克圖或准其遣人至藏耳昨準噶爾㑹向拉達克汗轉求達賴喇嘛遣一大喇嘛前去達賴喇嘛未曽給與今或因朕不允所請復囑拉達克汗轉求達賴喇嘛亦未可知應將情由預告達賴喇嘛俾得臨時回答準夷使臣又奏大皇帝若以我等入藏派兵䕶送為煩請以己力前往則伊且將借端圖謀藏地妄生事端班第熟暗藏地情形當預為籌畫準噶爾通藏道路何處近易何處險逺倘有用兵之事應如何添設卡倫遣兵堵禦著班第納穆扎爾妥商定議多爾濟到時亦易遵行倘準夷來犯藏内之人或不能支應將達賴喇嘛如何移駐泰寧之處亦宜預計再班禪額爾徳尼所住扎什倫布地方準夷若来有無干礙班第等務籌萬全勿稍疎漏慎之密之尋班第納穆扎爾議奏所有預籌準噶爾請喇嘛一事已諭達賴喇嘛令其先備回覆之言至準噶爾通藏隘口係阿里那克桑騰格里淖爾阿哈雅克四路惟那克桑一路稍近現已展放卡倫至從前準夷犯藏係由拉卜賽那穆一路然多戈壁難行故彼時由勒底雅路遶走年餘搶掠拉藏汗牲畜始能接濟到藏今亦於此路展放卡倫倘有賊踪即速報信一面派兵抵截一面移徙游牧自不使賊得利又拉達克至阿里之路亦近但拉達克與準噶爾往来貿易人數無多若遣大兵必不許其入境如不由拉達克地方從葉爾羌城亦可通阿里然其中有大山障隔且水草少而戈壁多自阿里至藏尚有兩月路程一得賊信可以備禦惟騰格里淖爾阿哈雅克兩路較為寛濶今亦俱展放卡倫晝夜瞭望不致疎懈臣等與噶卜倫等商議據稱一應卡倫俱極嚴固無庸添設土伯特人雖怯懦自頗羅鼐以來操練熟習現有馬兵萬餘步兵一萬五千有餘若準夷從阿哈雅克騰格里淖爾而來則令䇿凌旺扎爾領䝉古唐古忒兵抵截調功布達克布等處兵接應從那克桑阿里而來則令色玉特色􅁲騰領附近兵抵截調阿里等處兵接應班第達及尼瑪嘉木燦留藏保䕶達賴喇嘛至班禪額爾徳尼所住扎什倫布地方去前藏七百餘里自阿里至前藏亦沿扎什倫布之邊而行若當用兵則令其移至前藏與達賴喇嘛同住可以無虞萬一準夷傾部而來土伯特有不能堵禦之勢臨期相機而行一面將達賴喇嘛及班禪額爾徳尼䕶送至泰寧一面令駐藏官兵協同唐古忒等兵併力守住山險以待川兵入藏應援亦可無慮奏入報聞己丑命黒龍江將軍傅爾丹密籌預備戰兵上諭軍機大臣曰達色現已調補齊齊哈爾副都統著傳諭達色速赴新任即密告將軍傅爾丹今準噶爾台吉喇嘛達爾扎以達瓦齊逃走派兵駐我邊外又本年來使奏請諸事朕俱未准行恐不無藉端生事擾亂喀爾喀游牧朕特派大臣往北路軍營稽查卡倫此時雖並無形跡萬一有事朕欲調發黒龍江之兵二三千名傅爾丹宜密籌預備令五日内即可起程方妥然此特為萬一有事是以先期備辦並非立即用兵也切不可聲張轉致擾惑衆心尋傅爾丹等奏言齊齊哈爾黒龍江墨爾根呼倫貝爾等處本有額設兵七千餘名此内可挑選二千再打牲索倫達瑚里等處丁壯七千餘人此内亦可挑選一千官兵俱有器械其無器械之打牲索倫等查有從前調往金川時所給兵仗撤兵後俱繳回收貯可以給發所需銀兩口糧於現貯倉庫内支給臨期可以速發無悮奏入報聞二月甲午賜準噶爾台吉喇嘛達爾扎勅書奉天承運皇帝詔曰據台吉奏懇准於胡土克圖三人内延請一人前往爾處推演黄教並懇准爾處遣人至藏進供等語去年爾使額爾欽來以延請喇嘛之事具奏朕已明降諭㫖我中國胡土克圖三人及有德行喇嘛俱有教習學藝之事不可遣往但朕不忍令爾處黄教滅絶故特許於西藏揀選有德行喇嘛到京俟爾再遣使來准令請往是時降㫖後朕即令達賴喇嘛揀選精於經咒可以推衍黄教之喇嘛十人送至京師今爾乃不遵朕㫖反以斷不可遣往之胡土克圖為請是爾並非真心推衍黄教可知况西藏選來之喇嘛爾來使亦曽㑹面以未奉爾命不敢延請朕自去年即挑藏内喇嘛至京以待爾之延請今爾使既至又不請往是爾原無請喇嘛之意今并此喇嘛十人亦不遣往矣至爾奏遣人至藏一事去年爾使臣額爾欽來時以爾襲位為辭朕既降㫖必無換一台吉即差人進藏一次之理今來使又以追報爾父噶爾丹策零為辭果爾則從前策妄多爾濟那木扎爾已經為爾父熬茶一次安得今又差人前往設有子十人將十次差人進藏乎來使又奏使臣来往請不限人數肅州貿易牲畜内不好者准其售賣等語從前我大臣與爾使臣哈柳定議有事差人不攜買賣後因每次遣來使臣俱托言預備口糧攜帶貨物漸漸加增本應不准貿易勒令帶回朕因和好是以施恩來使令照尼瑪所帶貨物為准其人數若不限定日久亦難遵行故亦令以五十人為准至肅州貿易復加恩准照乾隆十三年最多之數貿易一節原係小人謀利之事爾等攜來不堪之物慮我中國之人不用若我中國之人將不堪之物給爾等爾等肯受乎此事瑣屑朕所不問即我封疆大臣亦不屑辦理爾何必以此凟奏來使又以逃來之薩喇爾賜回為請薩喇爾雖來自爾處實因懼禍逃生朕為天下大皇帝以生成衆生為本豈肯轉置之死地况我中國逃生爾處如羅􅁲藏丹津者甚多若一一索取不可勝計朕並不索取一人即爾送至朕亦不受朕以為既往之事不忍深究爾反求給回甚屬錯悮爾若念爾父恭順和好年年遣使請安受朕恩典事屬可行若以此等斷不可行之事凟奏究屬何益是以特降勅㫖令爾使圖卜濟爾哈朗賫歸諭爾知之壬寅授公策􅁲登扎􅁲為扎薩克並給予印信丙辰駐藏都統班第等奏報布魯克巴奠長進貢上諭軍機大臣曰據班第等奏稱布魯克巴之額爾德尼第巴博羅特色勒都卜聞朕加恩於達賴喇嘛撫定土伯特衆生抒誠内向進貢方物等語布魯克巴乃遐荒部落聞朕安撫西藏衆生傾心悦服奏請朕安甚屬可嘉著施恩賞賚以示褒奬三月乙丑命尚書舒赫德等議北路防範事宜舒赫德玉保成衮扎布奏言臣舒赫德等至軍營與臣成衮扎布謹遵諭㫖以準夷詭詐難信恐其猝擾我邊隨將各項應行預備事宜密商定議臣等查喀爾喀極西之㳺牧本在内卡之内四五百里後因與準夷和好奏明在内卡之内百餘里㳺牧將軍及㕘贊毎年至青草發生時又令向内收移二三百里此係向例所行今但須於收移時令較前更加向内自不至於紛擾至備兵一事定例每年鄂爾昆一千烏里雅蘇台一千俱係常駐其防秋兵二千毎年六月初十日至塔米爾城九月初十日撤回㳺牧又恐此四千兵力量尚單故喀爾喀四部落另有備用之兵扎薩克圖汗部落一千賽音諾顔部落二千車臣汗部落四千圖謝圖汗部落三千共兵一萬以為救援之用此項兵丁距大營及烏里雅蘇台近者不過數日逺亦不過十餘日俱可趕赴毎年無事時原在各本㳺牧處推演以備㕘贊三年一次查閲今年雖非查閲之年可因新换㕘贊特行查閲一次嗣後查閲時令於七月初旬各在指定地方多演數日始行撤散此皆就毎年成例内酌量備辦既不至紛擾目前而萬一有事亦足抵禦又奏現今準噶爾宰桑瑪木特等遣人禀稱伊台吉令將堵截達瓦齊之兵撤回即日起程各回㳺牧等語奏入上諭軍機大臣曰準夷卡兵撤回目前雖覺無事然保無外示和好來去報明使我不疑至秋又借堵截逃人之名駐兵邊上妄生窺伺成衮扎布等不可因其撤兵遂致疎懈倘今秋又來駐牧即大有可疑當一面備所當備一面遣人諭以原定之約决意逐回著傳諭舒赫德玉保成衮扎布等將伊等復来駐兵應如何逐回萬一有事應如何備禦使喀爾喀不至被累之處悉心宻議具奏尋舒赫德玉保成衮扎布等議奏喀爾喀扎薩克圖汗與賽音諾顔此二部落㳺牧正當西境係準夷來路請自今年六月起於卡倫内以一千五百里計將錫喇烏蘇取中東至齊得爾布克隨喀喇塔勒之啓里穆圖西至麻喇勒圖拜達里克伊克鄂拉等處以内令其游牧内卡共十六處毎卡住兵二十户至秋時毎卡只留十人其家眷牲畜俱令移於烏里雅蘇台軍營附近游牧俟阿爾台山梁雪降後再回至此二部落所預備之兵三千名秋間應令㕘贊達青阿帶領與喀爾喀副將軍得親扎􅁲㕘贊貝勒額林沁同赴錫喇烏蘇駐劄為烏里雅蘇台援兵兼可壯塔米爾大營之聲援其鄂爾昆駐防兵一千應與防秋兵二千合在一處臣成衮扎布與㕘贊阿巴齊得寧帶領在塔米爾相近形勝之地駐劄至圖謝圖汗部落預備兵三千今秋令在鄂爾昆駐劄又哲卜尊丹巴胡土克圖所住庫倫地方闗係甚要應將車臣汗部落預備兵四千令副都統巴爾品帶領在巴顔烏蘭駐劄既可接軍營之力而距庫倫甚近又可保䕶胡土克圖萬一有事一靣將胡土克圖移至多倫淖爾一靣即帶兵前赴軍營以候調遣如此預備後倘秋間準夷復來卡外居住臣成衮扎布即遣曉事識路之章京莫尼扎卜與副都統敦多克前往明白曉諭責以原定之約不准居住務必逐回一面由烏里雅蘇台駐劄兵内㨂選二三百名委員帶至準夷接界之地䕶守卡倫萬一有事即収卡至烏里雅蘇台㑹同烏爾登量賊之勢可戰則戰倘賊人勢衆力强驟難抵禦而喀爾喀游牧早已移入在内不慮侵掠即令烏爾登等將賊引至西喇烏蘇㑹合達青阿之兵相機𠞰殺賊至此已行二三千里人乏馬疲深入重地我以逸待勞又有塔米爾鄂爾昆之兵接應賊衆自不得利總之賊敢深入我境者必恃搶掠游牧以接其力今我既行清野之法又厚集堅兵以待之自居必勝之勢又六㑹盟處所備之兵與綏逺城右衛土黙特及察哈爾八旗兵丁從前原議定軍營有事准其奏調又喀爾喀東與黒龍江接壤黒龍江等處兵亦可調用萬一有事將軍一面具奏一靣行文各該處調取應援如此妥協預備準夷自不能得利奏入報聞夏五月壬申諭陜甘總督黄廷桂安西提督李繩武辦理準夷貿易事宜上諭軍機大臣曰李繩武奏此次準噶爾夷目額倫瑚里等所報貿易之牲畜貨物合算較十三年之數不無浮多再毎次夷人到哈密必有擦掌乏弱牲畜求售應俟該夷到哈密後查明確數以理責問如果恭順懇求再行照例辦理等語此番交易係初次定例必當示之以信不可稍有遷就在該夷貪狡無厭不過得尺進尺得寸進寸向来承辦員弁惟恐生事一味委曲周全將就了事而於奏報時則又稱夷人如何哀求如何苦訴究其實何嘗有是徒粉飾以美觀聴耳朝廷體制尊嚴邊疆奏事有不能盡實而外藩小國其上下之情轉相聨貫交易一事未必不早為所窺破一次踰例後次又復加増厚利所在彼何樂而不為耶今該夷内亂之餘又與哈薩克搆釁其交易較前所増有限已可得其情形此正辦理機㑹總當悉遵前㫖在十三年定數内者許其截長補短通融折算逾數者雖少亦槩駁回至奏報來使言語情形務須一一據實倘稍有粉飾將來查出惟該提督是問將此傳諭黄廷桂李繩武知之尋李繩武將夷目言語情形具奏上諭軍機大臣曰李繩武所奏㸔來竟是毫無主見而姑為㳺移兩可之詞以俟朕之批示如所稱該夷等似覺失望又不敢違背章程其詞色深為作難是以止求轉奏等語又將夷人伴送北山暫住牧放是已明示以據情入奏矣貿易一事既經定有章程自當永逺遵行若因其恭順畏懼而曲為遷就將來勢必逐漸加増何所底止至疲弱馬駝如果實在難行自可留哈密牧放從前准其變售原屬辦理錯悮今既立定限制何得尚復因循故轍視為常例乎李繩武具摺奏請夷人必無不知之理兹反不必㳺移遷就致令夷人窺笑其底裏也著即將入奏奉㫖之處明白宣諭以哈密貿易原屬非例今既新定規模當即按照十三年肅州貿易之例永逺遵守其疲乏牲畜不妨在哈密留人牧放回巢日攜回此事必須如此辦理方可以杜無厭之請在李繩武本非辦事果斷之才但身為提督於此等重務一味周章觀望將来何以承受恩典著嚴行申飭戊寅諭安西提督李繩武等巡查哈密事宜上諭軍機大臣曰李繩武奏巡查哈密情形一摺稱現在籌辦築墻添柵等語所謂知其一不知其二防邊飭備固保境之常經但目今貿易夷人正到哈密彼惟利是圖此時斷不敢冒險無可防範而從前夷人到哈密時從未見提臣親臨其地今見李繩武已不免驚疑又聞築墻添柵彼不知巡邊常事必且多方疑慮况提臣甫回督臣又往不審天朝意欲何為回巢傳播或更繕兵設備啓彼此相疑之端甚非所以安夷心而靖邊圉也著速行傳諭李繩武所籌辦築墻添柵等事此時竟可不必辦理如必須添設亦俟交易事竣夷人回巢後緩圖之黄廷桂另有㫖諭并諭李繩武知之又諭軍機大臣曰前據黄廷桂奏明巡查安西哈密一帶邊境乃按例應行之事但未籌及本年正有夷人來境貿易現在李繩武已巡至哈密乃提督甫回總督又至交易夷人從未見如此不且起其驚疑乎著速諭黄廷桂祇須巡至甘肅不必前往哈密如已經將到不可中止亦即據實奏聞向來邊疆事宜總不肯將實在情形據實入告若謂本欲辦理又因奉㫖中止行令沿邊將弁勿致聲張伊等必聲張更甚此處殊有闗係不可稍存粉飾并諭黄廷桂將奉㫖後實在情形即速奏聞戊子命副都統舒泰往代納穆扎爾駐藏辦事六月甲午準噶爾部人呢雅斯來降命賞給安插如例癸卯命削安西提督李繩武職以涼州將軍綽爾多為安西提督上諭軍機大臣曰李繩武辦理夷人交易一事張皇無措所奏俱非實情即如令夷人在山北居住明係伊一無定見候朕批示而反奏稱夷人懇求在山北緩牧將息且又留住黄廷桂候伊摺回同辦其失措已極此貿易小事尚如此取巧設有不測軍情其何能勝任已有㫖革職令將軍綽爾多補授安西提督綽爾多於夷人交易諸事從未經歴其輕重緩急之宜著黄廷桂一一告知令其隨機籌辦務遵前㫖照十三年之數不可稍有遷就尋又諭軍機大臣曰前因李繩武於夷人貿易一事周章觀望毫無擔當是以降㫖革職令淖爾多往代其任淖爾多到時自當遵照新定章程不容稍有遷就但亦不可因李繩武以此獲咎遂爾矯枉過正使該夷等至於難堪向來綠營習氣惟事因循及一經嚴飭往往又過於苛急皆非酌中辦事之道總之駕馭外夷當使之知畏亦當使之知感可傳諭淖爾多知之秋七月甲子諭陜甘總督黄廷桂防範準夷事宜上諭軍機大臣曰黄廷桂奏稱夷人交易俱已遵㫖如例現在定期過山等語夷人貪得無厭必當示以節制今既將浮多牲畜貨物駁回夷人俱遵奉約束已得天朝控馭之體所有伊等應得貿易利息及本分賞賜觀瞻所係雖不必加厚亦不可矯枉過正故為裁抑前經將此意傳諭淖爾多今黄廷桂兼理甘肅巡撫皆伊任内所應辦之事當酌中區畫務令輕重得宜至夷目阿􅁲都勒患病回巢未必非將現在辦理情形告知伊台吉是以托故先回欲於貢使未起程之前抵該部落耳其求醫診視正欲使知遘疾非虚以掩先回之迹皆其詭詐伎倆無足言者邊防宜加整飭但當不動聲色密為防範夷商數百人耳目窺伺不可稍露形迹致駭觀聴以啓其疑黄廷桂當善體此意新撫鄂樂舜到甘肅併將此諭知之冬十二月丁酉命京口將軍王進泰為安西提督綽爾多補授黒龍江將軍癸卯議塔勒納沁防卡事宜安西提督綽爾多奏言哈密依山據險卡倫密布有事固守實同堅壁惟東北之塔勒納沁僅恃河源小堡之卡倫而河源小堡地處山凹不能逺視且更在塔勒納沁東北五十里止設千總一員卡兵五十名而又分佈於鶯膀山三道大坂舒魯松卡等處此三處卡兵毎年九月初一日氷雪深厚不能往探即撤歸河源小堡倘準夷由上下摩垓等處潜來河源小堡已隔賊人之外似非動出萬全而塔勒納沁地方山既重叠參差徑復四通八達夜行晝伏隨處易以潜形水廣草肥大隊儘堪容納况山頂之東西大坂等處皆屬以髙臨下瞭望最逺毎年夷使及貿易夷衆往返經由亦素知卡倫嚴密必不敢從此路而來是以臣不得不於塔勒納沁鰓鰓過慮應請將三堡額駐兵五百名内撥出一百名再於哈密存城兵内派出一百五十名合之原駐河源小堡之兵五十名共成三百名撥給馬一百匹酌派都司或守備一員分駐於塔勒納沁其地原有昔年駐兵舊城及兵屯地畆今若令駐劄塔勒納沁之兵量為屯種更可有濟應將東北一路大小卡倫統令守備専司毎年於二月初一日起照舊分佈鶯膀山三道大坂舒魯松卡等處登髙暸望毎月更換以均勞逸至九月初一日撤歸塔勒納沁城則令毎二日派營弁一名帶兵四五名設立循環二籖於圖古里克上下摩垓及各土山前後哨探循去環來倘有賊人消息即舉放烟大一面由青山子牛毛泉馳報哈密一面由廟兒灣克色勒延敦從軍臺馳報安西更為便捷所有附近牧放牲隻回民倘一時聞信晝則望烟夜則望火勢急悉入塔勒納沁城協力堅守事緩則令同卡兵盡歸哈密可以無虞奏入得㫖軍機大臣議奏尋議哈密為扼要之區其東北之塔勒納沁距哈密二百餘里又東北五十里設有河源小堡卡訊上年九月内總督黄廷桂於密議防範事宜内奏稱塔勒納沁向派弁兵駐劄但形勢頗低北山一帶由上摩垓可遶至哈密城由坡子泉金鈎峽可直抵橋灣則俱不能瞭見是上摩垓等處較之塔勒納沁尤要亦已各設防卡無從潛過等語是塔勒納沁之前既有河源小堡駐兵探哨而左右之上摩垓等處又俱設有卡汛其於防範之道似已嚴密今綽爾多奏請將三堡及哈密存城兵内共撥出二百五十名合之原駐河源兵共成三百名酌派都司或守備一員分駐於塔勒納沁將東北一路大小卡倫統令専司等語自屬慎重邊防之意其所奏二月照舊分佈各卡九月撤歸塔勒納沁城循環探哨等事宜亦屬應行籌辦之事惟是哈密防兵遇有聲息惟以堅壁清野以待援師為主今若於三堡撥兵一百名哈密城撥兵一百五十名此二處城堡之兵是否足資守禦不致單弱塔勒納沁雖舊有城垣可以駐劄而所撥之兵僅止三百又須分佈各卡存城無多設有緩急是否足以固守以為哈密犄角之勢而河源小堡為塔勒納沁西北門户向設防兵五十名又分派於鶯膀山三道大坂舒魯松卡等處毎年防冬之期則俱駐於河源小堡以為塔勒納沁外障今若將此項兵丁一併歸入塔勒納沁城河源小堡幾為空設即使循環探哨終恐鞭長莫及况塔勒納沁地勢既低不能逺瞭是塔勒納沁撥駐弁兵止可以防賊人之潛越而西北一路則終以河源小堡為要卡不可輕議併撤應交總督黄廷桂確按情形詳悉籌畫妥協定議具奏奏入上從之乾隆十八年春正月戊寅議派員偵察準夷情形定邊左副將軍成衮扎布奏言欽奉諭㫖以準夷近未通使宜密加防範伏思準夷素性詭譎當廣為體察信息請嗣後五六月間派賢能台吉官員各一人以年例購買馬匹為名在烏梁海暗行偵探再喀爾喀副將軍毎年於軍營四季駐班若令其在㕘贊上隨内地大臣行走學習事務亦屬有益奏入得㫖值班副將軍著在㕘贊上行走餘著軍機大臣㑹同該將軍議奏再散秩大臣薩喇爾頗悉準夷情事若選派索倫烏拉齊帶往於軍營有益著一併議奏尋議烏梁海探信之處應如該將軍所奏至薩喇爾前赴軍營應派索倫烏拉齊一百名再令薩喇爾於伊屬下挑選數十名並令察哈爾八旗總管於舊厄魯特等項人内毎旗挑二十餘名密行預備奏入上從之甲子命兩江總督尹繼善為陜甘總督黄廷桂調補四川總督二月戊申命侍郎兆恵赴藏上諭軍機大臣曰近年準噶爾台吉喇嘛達爾扎奏懇延請喇嘛及往藏熬茶等事朕俱未允行今一年以來未有遣使入覲之信或陰懷不軌潛圖入藏亦未可知所當密為防備今遣兆惠前往協同多爾濟舒泰辦事可傳諭多爾濟等俾其乘便曉示達賴喇嘛一切機宜務宜預為留意三月丁巳命四川總督黄廷桂等預挑赴藏換班官兵上諭軍機大臣曰現命侍郎兆惠前往西藏所有駐藏官兵如將届更代之期應於川省各營内早為選派預備其將領中如李中楷馬如龍輩亦即速調數員赴省俟兆惠到時酌量帶往至現在應行代還兵丁仍令暫留防所不必撤回應於何時撤回聴該侍郎㑹同駐藏大臣酌量辦理此係預籌密備之事不可稍涉張皇致駭衆聽可傳諭黄廷桂岳鍾琪知之議察核張家口等處驛站動用馬匹事宜軍機大臣奏言管張家口等站官員奏事需用馬數月摺向貯大内並不交部查核嗣後應令管站官員凡馳驛奏事註明月日數次動用馬匹若干月底咨報兵部理藩院互相稽核奏入報聞夏四月乙未議北路備兵事宜軍機大臣奏言乾隆七年議奏防守北路派兵案内綏逺城一千名右衛一千名土黙特一千名八旗察哈爾二千名遇有調遣照雍正七年例辦給又去年奉㫖令黒龍江將軍預備兵二三千名今應請再行密飭各該處照數預備如遇調遣務令即時可以起程毋得遲悮但現在不必過於張皇致露聲息奏入上從之丙申命尚書舒赫德散秩大臣薩喇爾赴北路軍營丙午侍郎兆恵等奏更代駐藏官兵事宜兆惠黄廷桂岳鍾琪奏言更代駐藏官兵應於本年十月起程來年正月至藏臣黄廷桂等前奉諭㫖即密行派備並於李中楷馬如龍之外遴調熟悉藏地者數員來省臣兆恵於四月初六日至成都公同商議更代官兵共五百餘員名若同時行走不但需馬甚多且未及常期恐啓番民疑慮今臣兆恵酌帶副將李中楷逰擊馬如龍本進忠兵五十名於四月十二日先行出口約五月可到繼今遊擊紀萬年李華帶兵二百名起程於六月可到其藏内代還兵丁臣兆惠到後與駐藏大臣察㸔情形再為遣發至其餘往代兵二百五十名若於十月起行此往彼還適際冬春氷雪應請於來年二月起行四月至藏如䝉俞允並請嗣後更代兵丁五百名分作二起一於本年五月起行七月到藏一於次年二月起行四月到藏庶新舊相間可資學習亦於防務有禆奏入上從之壬子命湖廣總督永常䕶軍統領努三前赴安西先是上諭軍機大臣曰準夷無遣使入覲之信或潛懷窺伺亦未可知安西提督王進泰係屬新任恐未必深悉情形永常在彼更事已久著傳諭永常倘至四五月尚無夷使來信伊即應馳赴安西與王進泰協同商議防範事宜至是上命永常及努三馳赴安西等處並給與欽差大臣闗防五月辛巳尚書舒赫德等疏奏防秋事宜舒赫德成衮扎布等奏言去年三月臣等議防秋摺内請於六月初一日起將喀爾喀西界㳺牧遷移惟留十丁報事其妻子牲畜俱令在烏里雅蘇台以内游牧令扎薩克圖汗賽音諾顔二部落之兵駐於喀喇烏蘇其餘部落各於㳺牧交界駐備十二月臣成衮扎布進京時又奏明四部落兵一萬四千名若在㳺牧界上駐防人馬口糧羊隻俱由各部落派給未免有累若照舊在各游牧内預備則調遣即至而供應不煩再從前防秋兵三千兵曾裁汰一千今請仍復原數其西界所住䝉古將㳺牧收移進内自可無虞經軍機大臣覆准現在傳知各部落遵行臣等竊以預防侵軼守望宜嚴又必接濟兵力始可策應無悮今應於五月下旬即令㸔水草侍衛索拜等往西路尋踪探信六月初十日前後防秋兵到齊將駐防鄂爾昆兵一千名調赴塔米爾鄂爾昆中間保守城池臣等與㕘贊大臣達青阿安崇阿等帶領防秋兵徐徐行圍進至察罕淖爾特爾竒河源等處候索拜等音信並嚴飭各卡倫晝夜瞭望至秋季應更換號樁時仍派人前往更換如有信息即帶兵前進相機辦理奏入報聞癸未命定議哈密派撥防兵事宜陜甘總督尹繼善奏言哈密現設防兵二千名除分駐各城堡及卡倫外在城止八百餘名三堡分駐兵五百名防卡之外亦僅二百名若準夷大隊前來未免衆寡不敵應請添兵一千名分駐城堡在甘凉肅戰兵内每處撥兵二百五十名其餘令安西提臣於預備戰兵内另行酌派奏入得㫖軍機大臣議奏尋議駐防哈密之兵惟以防守為事安西已設重兵聲援相接甘凉肅等處又均有備戰之兵一聞信息先後出口自可協力援勦若謂防兵不敷守禦今即添兵千名分配各城堡毎處所增仍不過百餘名豈可恃以無恐且所増兵丁既須於備戰數内派撥是以一千名援𠞰之勁卒轉令分駐各城堡為待援之人更屬無益該督所奏應無庸議奏入上諭軍機大臣曰尹繼善所奏本非要領朕交爾等議奏特欲觀衆論之同否耳今爾等議駁甚是哈密地方遼濶増兵千人於邊防何有在尹繼善本意亦未必以一千兵遂足資扞禦不過欲以入奏見其留心邊備耳然豈朕所望於尹繼善者耶著傳諭知之六月丙申尚書舒赫徳等奏報準夷信息舒赫徳成衮扎布等奏言據遣往烏梁海探信之四等台吉班扎喇克察等密報準噶爾台吉喇嘛達爾扎發兵往哈薩克索取達瓦齊其兵反隨達瓦齊來擒喇嘛達爾扎現聞達瓦齊已襲台吉臣等復遣喀爾喀侍衛完楚克前往同班扎喇克察訽取實信據回報云我等至克木齊克河巴顔台罕等處託買馬匹察㸔烏梁海情形據貝子旗分宰桑都塔齊等告稱我等曾見準噶爾烏梁海宰桑滿濟岱等據稱達瓦齊承襲台吉是實現今欲往謁見又聞達瓦齊遣使入京亦遣使往俄羅斯不知於何日起程臣等察㸔此次所報信息是達瓦齊自為台吉已屬確實今仍照原議帶防秋兵行圍前進如有信息再行奏聞再查從前西北兩路若有使臣前來俱互相知㑹臣等已密行知㑹安西提督訖奏入報聞丁酉諭欽差大臣永常等西路防範事宜上諭軍機大臣曰據尚書舒赫徳副將軍成衮扎布等奏稱探得準噶爾達瓦齊戕害喇嘛達爾扎自立為台吉現聞遣使前來請安已密行知㑹西路軍營等語可即傳諭永常努三尹繼善王進泰等如夷使到哈密一切事宜並可照舊辦理其擕來人數貨物牲隻亦必遵照立定章程或有額外多帶即按數駁回以示節制其西路現在防範機宜務宜加意慎密不可稍露形迹致使伊等得以窺測也丁未準噶爾部人美諾克來降命賞給安插如例戊申恩賞進獻馬駝之喀爾喀王公台吉等先是定邊左副將軍成衮扎布奏言現在軍營官兵需用馬駝所有喀爾喀四部落預備馬九百匹駝三百隻僅足敷用萬一有事調遣黒龍江官兵自當預籌接濟伏思喀爾喀王公台吉喇嘛等均踴躍急公應請令其預備奏入得㫖軍機大臣議奏尋議應如所奏至是成衮扎布奏言哲􅁲尊丹巴胡土克圖等呈稱我等世受國恩今當購買馬駝之時情願進馬五千七百四十一匹駝一千六百二十隻令台吉達什丕勒三都克扎卜首先交納計六月内可以全交等語奏入得㫖應如何加賞之處著軍機大臣議奏尋議雍正十三年議賞貢獻馬駝之王公台吉扎薩克案内毎駝一隻賞緞三端馬一匹賞緞一端羊五隻賞緞一端其進馬二百匹駝二百隻羊一千隻以上之王公扎薩克俱紀録一次協理台吉加一級胡土克圖喇嘛等酌量加賞大緞臣等查從前用兵之際馬駝昂貴故計數加賞今撤兵年乆䝉古牲畜孳息價值平減此次進獻馬駝應共賞官緞三千端分給衆人其進駝一百隻馬一百匹以上之親王得親扎􅁲一等台吉達什丕勒齊旺多爾濟俱紀錄一次二等台吉策楞多岳特四等台吉巴木丕勒俱加一級此内達什丕勒平日行走奮勉所進駝隻又多應請加與紀錄一次哲卜尊丹巴胡土克圖加賞大緞二十端額爾徳尼班第達胡土克圖加賞大緞十端奏入上從之秋七月丙辰尚書舒赫德等續奏準夷信息舒赫德成衮扎布等奏言探南路探信侍衛䝉固勒等報稱我等由喀爾占和碩卡倫尋踪至巴顔珠爾克遇見厄魯特人巴圖車林我等托以打牲來此詢問伊現在台吉據云係達瓦齊臣等前奏達瓦齊自立之信俱得自烏梁海之人今䝉固勒所報得自準噶爾卡倫是達瓦齊自立之事確無疑義奏入報聞丁巳侍郎兆惠奏藏地防範事宜兆惠奏言臣於五月二十八日到藏遵㫖傳諭達賴喇嘛以準夷去年無故求請喇嘛又續請熬茶俱未允行至今未有來使殊不可信倘潛圖窺藏亦未可定應預為防備從前準夷潛犯藏地土伯特俱受其害又與朱爾黙特那木扎爾潛通書信意懐不軌皇上慮藏地人不知備禦萬一有事被害不淺達賴喇嘛當預為曉示令各保身家勿容準夷一人入境達賴喇嘛云從前土伯特未設卡倫是以準夷得以潛踪侵犯今各路俱派兵駐守山嶺大而戈壁多料不敢輕来窺伺但固守封疆實為要務謹遵諭㫖交與衆噶􅁲倫逮綳等曉示又據噶卜倫公班第達等稱䝉大皇帝睿鑒土伯特情形預籌防範準夷又經達賴喇嘛曉示查藏衛所屬兵丁二萬六千餘名倘有信息即派選一萬三千餘名分派留駐藏地及據守阿里那克桑騰格里淖爾阿哈雅克等處暫將近邊㳺牧牲隻收近藏地斷不使準夷獲利臣等㸔藏地情形益加毖慎相機戰守可以無虞奏入報聞己未議西路邊防事宜陜甘總督尹繼善奏安西等處邊防事宜十條得㫖軍機大臣議奏尋議據該督奏慎選安西將備一條查安西控制哈密首先應援是以領兵將備定例在外題補近又預行保舉已為慎重該督所奏現咨提臣考核㨂選調補係督提等應辦之事無庸另議又挑選精鋭官兵一條查甘凉安肅備戰兵丁原議預先派定毎年㸃驗一次該督所奏逐名㸃視年力技勇分委大員查驗軍裝之處自應如此辦理又加意牧養馬駝一條查該督既稱現在咨行各提鎮詳加查驗疲痩者更換倒缺者購補並令加意牧養用心調習自應嚴飭經管將弁實力奉行又口外路徑先勘水草一條查前赴哈密援兵經由戈壁有八九站及十站不等自當如所奏預為勘明實於赴援有益又防兵宜酌帶烏槍一條查防兵更代原在無事之時賊人亦斷無越過哈密邀截防兵之理但長途千里自未便空手前往應准其帶擕又防所鉛藥宜多為預備一條查哈密孤懸塞外一切軍需自宜儲備充裕軍營餘存鉛藥既統作備貯造冊其肅州所製火藥仍按年解送之處應如所奏行又哈密兵糧宜預為籌備一條査上年黄廷桂奏稱哈密現貯米麥足敷防兵八年之食又楊應琚奏准於柳溝沙河一帶動撥小麥運往則兵糧自屬有餘應無庸再議又分貯銀兩就近酌備一條查肅州舊貯銀三萬兩後經部議提貯甘州府庫但肅州戰兵係首先出口應援若俟赴甘支領不免遲悮肅州既有道員駐劄應即提貯道庫以備撥用又哈密一帶城垣宜修理堅固一條查上年黄廷桂奏稱該處新舊兩城均屬完繕但邊防重鎮自以慎固為要如有應修者應令酌量緩急分别先後陸續葺治亦不必各處工程一時並舉轉致駭人聴聞又哈密耕種牧放宜在附近一條查哈密為準夷扼要之地首當賊鋒一聞信息自宜堅壁清野該督所奏回民逺至塔勒納沁之巴達山等處耕牧者應曉諭禁止亦屬思患預防之意但回民生齒日繁厰地有限槩令就近恐有礙生計應令酌量逺近妥協辦理奏入上從之甲子尚書舒赫徳等疏奏查閲防秋兵丁舒赫徳等奏言喀爾喀四部落防秋兵三千名陸續到齊臣等㑹同將軍成衮扎布㕘贊大臣親王得親扎卜公策􅁲登扎􅁲及帶領防秋兵王桑寨多爾濟等公同查閲兵丁俱年力精壯器械整固馬匹亦屬臕肥又閲兵丁較射相撲并操演陣勢進退整齊馬上放槍亦皆嫻熟喀爾喀王公扎薩克等俱感激皇恩甚屬奮勉應請擇水草豐饒之地令伊等牧放馬匹暫為休息以候調遣奏入報聞丁丑尚書舒赫徳等疏奏撤回派備兵丁舒赫徳成衮扎布等奏言據烏里雅蘇台㕘贊大臣烏爾登解送投降之準噶爾部人烏巴什前来臣等訽問據供我係準噶爾宰桑屬下人我姑母曽經乳養阿克布魯爾乃台吉喇嘛達爾扎之族因得親隨行走喇嘛達爾扎係噶爾丹䇿零外婦所生從前策旺多爾濟那木扎爾被害時尚存㓜弟䝉庫什有台吉達瓦齊及阿睦爾撤納等欲立䝉庫什遣二宰桑前往䝉庫什處為喇嘛達爾扎所覺與䝉庫什俱被害達瓦齊等逃往哈薩克喇嘛達爾扎發兵追索不獲哈薩克汗阿布賚向達瓦齊言此地恐不能相容達瓦齊遂與阿睦爾撤納率所屬乘間逃至舊逰牧地㑹兵四百人沿途收集以兵扼闥勒竒山嶺十一月二十七日黎明猝至喇嘛達爾扎處焚其廬帳喇嘛達爾扎為阿睦爾撤納射傷身殞達瓦齊自立為台吉凡喇嘛達爾扎親信以次誅戮又聞達瓦齊自立後嗜飲無節復與阿睦爾撤納相失我於亂後隨衆藏匿今逃出來降等語查從前所得達瓦齊立為台吉之信業經節次奏報今得烏巴什所供益屬詳悉臣等前已傳諭近邊各處遷移㳺牧其四部落派備兵丁俱裹帶五十日口糧前赴㳺牧邊界防守現在達瓦齊自立之信既確復奉諭㫖以準噶爾正當有事之秋達瓦齊一身未定何暇窺伺仰見聖明逺燭目今將屆八月阿爾台山梁正值降雪之時準夷歸途不便自難深入似宜休息兵力將派備兵丁於八月内量其逺近陸續撤回向内遷移之衆亦令各歸原處游牧奏入報聞戊寅命尚書舒赫德散秩大臣薩喇爾回京庚辰命欽差大臣湖廣總督永常回任䕶軍統領努三回京八月癸未朔議安西等處備戰兵丁馬匹永常奏言安肅等七標戰兵雖有一萬五千六百名而迅速趨戰全在第一撥戰兵九千名官兵一人二馬加以保䕶輜重則實在備戰者僅六千有餘兵力稍為單弱請酌量變通減為二兵三馬安標戰兵三千名可餘馬一千五百匹再於額兵内加派五百名將餘馬通融撥給一同前往可壯先聲其肅甘凉第一撥六千名亦照數減馬即以給二撥戰兵為應援後勁奏入得㫖軍機大臣議奏尋議赴援進𠞰非馬有餘力則赴敵稍援即增兵亦屬無益從前議定之數係按兵撥馬非照馬派兵今永常所奏雖為增兵起見但各處前赴哈密之兵逺者二千里近者尚數百里若於二兵之内頓減一馬長途疲乏倒斃勢難如期赴敵况所增者不過戰兵五百彼若以偏師綴我則第一撥戰兵九千已足扞禦若傾巢而來自必待各處官兵畢集原不僅藉此五百之兵以壯聲威臣等酌議應仍照原議調撥奏入上從之戊戌命侍郎兆惠回京甲辰欽差大臣永常等奏報準夷信息永常等奏言臣等巡查哈密至東大坂有準夷部人伯勒克擕眷來降臣等詢問準夷信息據供上年喇嘛達爾扎為台吉時疑達瓦齊有反意欲誘至伊犁加害達瓦齊不肯前去喇嘛達爾扎即遣宰桑鄂什爾索諾木二人帶兵往拏達瓦齊帶領所屬欲投哈薩克為追兵所截僅率百餘人内有塔爾巴噶台頭目阿睦爾撤納一同投入哈薩克喇嘛達爾扎遂將阿睦爾撤納部衆分給衆人一半給與阿睦爾撤納之兄沙克都爾又將達瓦齊家眷拘至伊犁㸔守遣人向哈薩克索取達瓦齊哈薩克不與隨派宰桑賽音伯勒克及訥黙庫濟爾噶爾二人帶兵三萬往拏哈薩克恐懼欲將達瓦齊等送出達瓦齊聞知即同阿睦爾撤納並原帶之屬人潛至舊㳺牧處將沙克都爾殺害收服衆人至千餘名遂直趨伊犁喇嘛達爾扎聞知遣宰桑圖魯庫烏克圖鄂什爾博第四人挑兵迎戰兵未挑齊於途次遇達瓦齊圖魯庫及烏克圖二人即行投降鄂什爾及博第不肯為達瓦齊所殺去年十一月二十七日到伊犁將喇嘛達爾扎殺害達瓦齊自立為台吉訥黙庫濟爾噶爾旋亦歸順賽音伯勒克潛逃又被擒拏達瓦齊將從前原管地方人衆給與阿睦爾撤納等語奏入報聞九月壬申命欽差大臣永常為陜甘總督尹繼善調補江南河道總督平定準噶爾方略前編巻五十四
