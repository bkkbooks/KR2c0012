  text: 欽定四庫全書平定準噶爾方略正編卷十七
  hash: sha256:6c6017a1357342e9fdb355deb6285ed5ef4d088a3172822073fa99b7835655b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_071-1a, image: WYG0358/WYG0358-0267c.png}
body:
  text: 乾隆二十年秋八月癸亥諭將軍班第等籌辦準噶爾生計上諭軍機大臣曰準噶爾數年以來諸部互相殘殺久失生業甚屬困窮朕統一寰區不忍坐視特命大軍平定伊犂救生靈於塗炭今聞各部落人等貧困者多若不加籌畫必至阽危朕心深為軫䘏因思有無相濟貧富相通各部落中自可通融辦理將軍班第薩喇爾叅贊大臣鄂容安其飭交諸部台吉宰桑等據實查明極貧戸口勸諭富人共相養贍尚恐難於接濟著將西路運到官茶四萬封班第等酌量賞給貧戸或賞給養贍貧戸之家務宜確查徧給俾其實沾恩澤仍諭台吉宰桑等嗣後董率所屬各勤耕牧如有盜竊攘奪等事嚴行禁止若仍踵舊習即照律辦理將此通行曉諭至各台吉宰桑亦宜體朕撫綏準部至意善為教養以期生計日豐盜賊永息勉之毋怠申諭辦理準噶爾事宜上諭軍機大臣曰據班第等奏布庫努特舊宰桑敦多克汪沁密告薩喇爾云阿睦爾撒納入覲之心似屬猶豫或半途復返或遣納黙庫班珠爾等將伊家口遷移俱未可定已密行烏里雅蘇台駐劄大臣留心防範等語所見甚是昨納穆扎爾照阿睦爾撒納宰桑等所請遷移游牧朕即傳諭莫爾渾等留心防範至阿睦爾撒納中途逗留或别生事端班第等即遵節次諭㫖相機辦理又奏稱明阿特部落二千餘戸原係阿爾台居住之烏梁海從前被準夷威刦令其防守北界今願移歸舊游牧若照伊所請將來辦理阿睦爾撒納游牧時可與噶爾藏多爾濟哈薩克錫喇等兵丁一同遣往等語其事尚屬可行但阿睦爾撒納雖有罪應誅其游牧人衆毋庸驚擾誠恐明噶特等肆意搶掠非所以示體䘏仍遵前㫖傳諭伊游牧人衆照舊安居選派喀喇巴圖魯阿玊錫等大員管轄并嚴禁搶掠惟將阿睦爾撒納從前貪取之物查出酌量分賞明噶特人衆方為妥恊至敦多克汪沁舊係布庫努特宰桑若伊游牧人衆羣相推服即給還原職其侍衞吞圖布俟有别鄂拓克宰桑缺出補授班第查明具奏請㫖再土爾扈特台吉巴圖爾烏巴什告稱達瓦齊將伊屬人分散懇請會合游牧等語班第等應查明辦理并將似此分散者一體查出應如何辦理之處酌定奏聞並將此傳諭莫爾渾阿蘭泰舒赫德等將敦多克汪沁所告之處加意防範毋得稍忽甲子申諭駐劄烏里雅蘇台辦事大臣莫爾渾等防範阿睦爾撒納遷移游牧上諭軍機大臣曰朕前降諭㫖俟阿睦爾撒納前來擒治後再將伊扎卜堪游牧人衆辦理今詳察情形前來與否俱未可定若既不前來又將伊扎卜堪游牧人衆遷至塔爾巴噶台一處會合則必挈之潛逃不可不預為防範著速傳諭莫爾渾等阿睦爾撒納如抵烏里雅蘇台逗留時藉稱遷移游牧之後再行入覲則莫爾渾等當以未奉朕㫖不敢擅許為詞如或抗違即帶兵辦理倘坐視遷移致成大釁朕必重治其罪計此時阿蘭泰亦已到彼其會同密議相機果斷一得信息即速奏聞乙丑命鑄給管理巴里坤大臣印信上諭大學士曰策楞已賞給都統職銜令駐劄巴里坤辦理事務著鑄給管理巴里坤等處官兵大臣印以昭信守丙寅密諭派員管理阿睦爾撒納游牧上諭軍機大臣曰朕昨密諭哈達哈俟辦理阿睦爾撒納後其游牧人衆於策凌屬下宰桑内揀選數人管理繼思喀喇巴圖魯阿玉錫素習夷情受恩最久故特派伊前往管理扎卜堪游牧但此時即行諭知阿玊錫恐有洩漏著先傳諭哈達哈等俟阿玉錫到彼將此㫖傳諭仍候諭㫖到時即帶兵會同納穆扎爾將阿睦爾撒納黨惡宰桑烏巴什錫哈瑪和通烏勒木濟巴圖濟爾噶爾巴桑策凌阿穆爾濟爾噶勒們都巴桑及在逃之固穆扎卜等擒拿緝獲其餘宰桑俱不必辦理仍傳諭伊等以阿睦爾撒納負恩悖逆烏巴什等同惡相濟是以擒治與爾等無涉宜照常管領戸口安居樂業永為國家臣僕令阿玊錫等善為撫綏慰諭再班第等奏班珠爾負恩怙勢遷延入覲自應一併治罪伊所屬宰桑無多非阿睦爾撒納黨羽可比應毋庸辦理併將納噶查普爾普屬人俱著阿玉錫管轄其扎木叅齊木庫爾屬人毋得任其逃竄加意防守候朕㫖遵行或因游牧人衆阿玉錫不能獨管即暫派侍衞協辦朕仍遣人相助哈達哈等與阿玉錫其悉心會商相機辦理尤宜周詳愼密毋得稍有洩漏丁卯諭辦理接濟降人口糧事宜上諭軍機大臣曰班第等奏阿睦爾撒納咨稱伊収集屬下人衆五千餘戸俱多窮困請將接濟官兵所剰羊萬餘隻指伊俸銀扣抵售買班第等恐其借端生事致悞行期酌將一半截留候奏請賞給所辦尚合機宜但阿睦爾撒納屬人安得有五千餘户之多明係從各部搶掠俟將伊治罪後遵照前㫖分别給主歸公其餘仍派員管轄又奏稱塔爾巴哈沁台吉額林沁多羅特台吉舍楞等自哈薩克逃出被追兵搶奪所有戸口二千餘户口糧牲隻俱乏係阿睦爾撒納同族兄弟阿睦爾撒納遣額林沁之弟納咱爾舍楞之弟諾爾布來請接濟口糧請暫於額林哈畢爾噶屯耕糧石内計口授食並於塔本集賽及額林哈畢爾噶等鄂拓克各派羊隻并將官茶二千封運往接濟俾在和博克薩里烏隆古等處居住等語此等投降户口自應酌量接濟若由内地運往口糧接濟伊等則斷乎不可班第等辦理尚屬妥協此等人内有應給與職銜者即行具奏請㫖戊辰駐劄烏里雅蘇台辦事大臣莫爾渾等疏奏郡王青滚雜卜収服汗哈屯等處烏梁海部衆莫爾渾等奏言據叅贊大臣喀爾喀副將軍郡王青滚雜卜咨稱四月十六日奉㫖會同察達克赤倫前往汗哈屯地方収服烏梁海等遵於六月初四日起程七月初五日至薩噶勒巴什嶺先遣副都統敦多卜貝子策卜登等領兵三百名前赴汗地方収服烏梁海等親領官兵四百名於初九日抵宰桑哈爾瑪什游牧阿爾呼特地方傳示聖主仁慈許其投誠哈爾瑪什等率衆懇降並遣一等台吉班扎喇克察等傳示得木齊那爾圖四等台吉丹珠爾等傳示明噶特台吉莽納什即領兵至察罕烏蘇宣諭皇仁那爾圖莽納什等俱率衆迎降途中適遇扎薩克齊巴克扎卜根敦等領兵二百名搜緝擅殺卡倫侍衞貝多爾之賊犯等遂會兵前往十五日至巴斯庫斯地方宰桑瑪濟岱等亦懇納降並詢知宰桑那木扎爾住於鄂衣孟保衮住於薩穆勒都莽噶拉克住於薩勒扎河布珠庫和齊賴住於哈屯河各地方隨派署叅領阿必達侍衞多爾濟索諾蘇噶特固穆扎卜等分路傳示於二十五二十七等日多爾濟阿必達等率宰桑那木扎爾保衮來降二十九日侍衞索諾蘇噶特帶領宰桑莽噶拉克來降惟宰桑布珠庫尚未投誠據稱願隨特楞古特宰桑投見而特楞古特宰桑那穆克來見時仍未同至現在嚴飭那穆克等令其帶領布珠庫前來倘不遵行即用兵収服續據貝子策卜登等呈稱七月初五日自薩噶勒巴什嶺帶兵前往宰桑敦爾卓輝來降告知副都統敦多卜業經傳示情願歸降又據敦多卜傳示汗地方烏梁海宰桑鄂木布布魯特宰桑根都什特楞古特宰桑𤓰齊楞布魯特和托克布克圖什那穆克等七人俱率衆降附其查取各宰桑戸口牲隻數目及應辦事宜俟貝勒策布登扎布到時公同商酌辦理臣等伏查汗哈屯等處烏梁海俱已収服惟布珠庫一人未獲現在各處搜緝不日即可弋獲俟青滚雜卜撤兵時將一應辦理事宜會同酌議具奏請㫖奏入報聞九月壬申朔諭尚書公哈達哈辦理阿睦爾撒納事宜上諭軍機大臣曰朕前命哈達哈以収服烏梁海為名往辦阿睦爾撒納游牧今青滚雜卜等既將汗哈屯等處烏梁海収服阿蘭泰亦已抵烏里雅蘇台阿睦爾撒納自必聞知彼處無庸多駐大員致阿睦爾撒納見而啟疑哈達哈此時若已見阿睦爾撒納即告知烏梁海業已竣事有㫖命同伊入覲即會同阿睦爾撒納前來如尚未見亦即前往迎會沿途加意慰諭不得漏洩事機所有傳諭哈達哈辦理阿睦爾撒納游牧之㫖俱著詳密告知阿蘭泰令其遵照辦理諭定北將軍班第等辦理古爾班和卓及哈薩克事宜上諭軍機大臣曰班第等奏阿睦爾撒納前遣得木齊特古斯孟克前往古爾班和卓及西部哈薩克今與伊等使人同至據伊等來文及使人所告請將塔什罕城内向日駐劄囘人阿竒木一員厄魯特哈爾罕一員不必駐劄查此係策妄阿喇布坦時相沿舊制今請裁去是有據占塔什罕之意因示以不便准行令其齎捧頒諭哈薩克勅書與前遣之侍衞章武等同往招撫仍令伯什阿噶什之兵沿途防䕶等語所辦尚合機宜惟哈薩克來文内有聞阿睦爾撒納仍居舊游牧甚為喜悦可復覩噶爾丹策零之時等語此必係阿睦爾撒納隱諱投降受恩之事但以借兵復仇并總統準部為詞從前因阿睦爾撒納離軍營未逺詰問恐致洩漏今已歴多時自當詳詢特古斯孟克將阿睦爾撒納遣伊前往時有何言語明白供出班第等未將曾否詰問之處陳奏殊屬含糊此時特古斯孟克如尚未遣囘阿睦爾撒納處即詳悉詢問具奏再古爾班和卓來文内稱前避達瓦齊之鋒逃往彼處今欲來歸恐遇舊日仇人相害乞為保䕶并恐哈薩克布魯特邀截等語伊若能親身前來受其歸順則可若必須救助至與哈薩克等搆兵將來羣起效尤必無休息斷然不可著傳諭班第等知之癸酉命恩克博羅特吞圖布為散秩大臣仍授吞圖布為扎爾呼齊宰桑恩克博羅特為墨得齊宰桑甲戌綽羅斯台吉噶爾藏多爾濟和碩特台吉沙克都爾曼濟輝特台吉巴雅爾等入覲行在命賜筵宴上行圍派噶爾藏多爾濟等分班隨圍行走喀爾喀親王額林沁多爾濟疏奏阿睦爾撒納潛逃額林沁多爾濟奏言臣等於七月初十日自軍營尼楚滚地方起程八月十九日至烏隆古地方阿睦爾撒納將印信交臣告稱先至游牧束裝再行入覲隨帶領扎薩克林丕勒多爾濟喀爾喀章京雅木丕勒察哈爾喀爾喀兵二十五名及厄魯特兵三百餘名同行至次日阿睦爾撒納並不經由正路繞道從額爾齊斯地方逃去沿途搶掠經各處陸續來報臣當將印信交與王桑寨多爾濟即於桑寨多爾濟統領兵内揀選索倫兵二百名喀爾喀兵一百名於二十日起程向額爾齊斯地方追逐將阿睦爾撒納逃遁縁由報知將軍班第管領聲援兵副都統扎爾杭阿察哈爾副都統栢起侍衞薩木都布管轄種地兵丁䕶軍統領塔爾瑪善并照管阿睦爾撒納游牧副都統納穆扎爾及各處卡倫侍衞駐防烏里雅蘇台大臣奏入上諭軍機大臣曰額林沁多爾濟奏阿睦爾撒納逃遁情形甚屬含糊阿睦爾撒納既未逗留於塔爾巴噶台游牧業已前進離其妻子游牧處不遠何以不挈之同行或搶掠喀爾喀再圖竄逸乃顯將印信交出忽爾遁去此中情形叵測相距甚逺難以揣度著將額林沁多爾濟奏摺抄寄班第等閲看從前伊等奏阿睦爾撒納情事朕已節次降㫖訓諭此時班第等若得伊逋逃信息即遵照前㫖相機辦理仍將所得信息及如何辦理之處速行奏聞是日上駐蹕扎克丹鄂佛洛命軍機大臣帶領宰桑厄爾錐音哈薩克錫喇等入見行幄詢問準噶爾地方情形隨命侍郎玊保等帶領厄爾錐音哈薩克錫喇及散秩大臣恩克博羅特吞圖布等前赴西路軍營聽候調遣賞厄爾錐音哈薩克錫喇銀各三百兩恩克博羅特吞圖布銀各二百兩並命郡王扎拉豐阿同往軍營辦事乙亥命傳㫖奬諭貝勒齊木庫爾普爾普等上諭軍機大臣曰據莫爾渾等奏稱貝勒齊木庫爾普爾普貝子德濟特克什克台吉鄂爾叅等將阿睦爾撒納私遣至伊游牧之們都及二僕人拏獲詢知阿睦爾撒納通信游牧人等先行起程伊即從阿爾台一路來迎等語昨額林沁多爾濟奏報阿睦爾撒納中途逃遁甚屬含糊朕尚未深信今伊私遣屬人通信游牧以冀潛逃種種逆跡俱已敗露實為深負朕恩齊木庫爾普爾普等不顧弟兄私情將伊所遣之人拏獲送到深明大義實可嘉予齊木庫爾等所屬户口仍令伊等自行管轄俟擒治阿睦爾撒納後即將阿睦爾撒納户口產業分别賞給伊等以示鼓勵齊木庫爾普爾普仍俟來京入覲另行加恩著傳諭阿蘭泰等降㫖曉諭伊等知之丙子定西將軍永常疏奏烏魯木齊接續臺站情形永常奏言八月二十日據侍衛瑪瑺管理烏魯木齊臺站筆帖式達桑阿等報稱在瑪納斯河遇見三處臺站兵丁報稱賊衆百餘人將臺站搶掠等語瑪瑺等隨即遇見賊衆三百餘人奪路而出現在將運送官茶人等圍住原欲呈報定北將軍因臺站已斷今星夜馳報西路並准總管臺站副都統職銜阿敏道呈報相同臣聞瑪納斯烏蘭烏蘇地方與阿巴噶斯哈丹等游牧相近有流散布庫努特貧人二千餘户時常盜竊或聞大兵全撤且知臺站兵丁新經更替肆行刼奪但由此至伊犂臺站均關𦂳要恐亦有似此驚擾之處即飭阿敏道接續臺站并行文定北將軍若臺站已斷即令阿敏道親往台吉扎那噶爾布等處令其帶兵前往復遣副將喀爾納帶兵一百名於二十一日前進以為聲援本日復據侍衞瑪瑺烏魯木齊臺站察哈爾驍騎校敦多克前來告稱羅克倫一帶三處臺站亦皆隔絶並稱聞阿睦爾撒納先遣阿巴噶斯哈丹等領兵前行哨探大兵隨後即到總管阿敏道聞知此信已將烏魯木齊臺站陸續撤回等語伏思搶奪賊衆必係䝉古無業貧人斷無意外之事阿敏道聽信浮言遽行捲撤非急圖接續不可但臣等已離烏魯木齊十站現駐木疊地方所帶兵五百名不敷調遣已密行總管畢里衮將索倫巴爾虎兵丁暫停撤回并遣人傳知扎哈沁宰桑鄂爾竒木濟同駐劄侍衞巴哈曼集酌派䝉古索倫等兵接續臺站至烏魯木齊會同額林哈畢爾噶台吉扎那噶爾布噶爾藏多爾濟之子諾爾布林沁呼爾璊台吉納木竒布魯古特台吉胡達里克等公同進𠞰撲滅小醜通信伊犂再索倫巴爾虎撤回兵丁馬匹未免疲瘦現在於巴里坤牧放馬匹七千内調取三千換給兵丁前進奏入上諭軍機大臣曰據永常奏稱阿巴噶斯哈丹等將西路臺站搶掠奪取官茶等語前班第等將阿巴噶斯哈丹等與阿睦爾撒納互結黨援謀為不軌情事曾經奏聞昨額林沁多爾濟又奏阿睦爾撒納於中途逃遁伊已帶兵追逐今阿巴噶斯等搶掠臺站官物則伊等黨惡為奸跡已彰著阿睦爾撒納受朕厚恩盡喪天良謀為叛逆實天理人情所不容必應擒獲治罪永常此次辦理尚屬勇往接到此㫖即將索倫兵調回帶領前進其各隊撤回兵丁如有應調者亦即就近調取彼處現既有馬七千餘匹酌量調用策楞三格等帶領駐防滿洲兵一千名奮勇前進或應𠞰除或應安撫公同妥協辦理如有必需留待之處占據形勢以待後隊兵至併力進𠞰現在噶爾藏多爾濟等俱赴熱河入覲恐阿睦爾撒納阿巴噶斯等揑造妄言煽惑伊等游牧人衆特命噶爾藏多爾濟沙克都爾曼濟巴雅爾等寄信曉諭伊等游牧人衆由驛遞寄永常接到日即委妥員遞交伊等游牧再伊等已派出各宰桑等令玉保帶同馳赴軍營噶爾藏多爾濟等亦不日即令其回至游牧一切應行辦理事宜已降㫖與玉保俟伊到時永常策楞等會同詳細商酌籌辦永常仍著辦理定西將軍事務策楞玊保扎拉豐阿俱著在叅贊大臣上行走又諭曰西路現有應辦之事永常仍令辦理定西將軍事務所需軍餉著傳諭劉統勲令其將此次軍需餘存糧石速交恭泰豫為料理妥協俟永常文到即行應付勿致遲悞命尚書公哈達哈仍留烏里雅蘇台辦事上諭軍機大臣曰前已降㫖令哈達哈回京今阿睦爾撒納現在潛逃西路復有阿巴噶斯等搶掠臺站之事哈達哈毋庸來京著仍留彼處會同阿蘭泰等辦事其所帶往之根敦扎卜係阿睦爾撒納信用之人斷不可留此㫖一到即著於彼處正法丁丑駐劄烏里雅蘇台辦事大臣阿蘭泰等疏奏収獲阿睦爾撒納游牧阿蘭泰等奏言臣等於八月二十四日聞阿睦爾撒納逃竄之信即飭令普慶帶兵速赴阿睦爾撒納扎卜堪游牧収其妻子二十五日普慶領兵至伊游牧先収伊牧厰内馬四百餘匹臣等於二十六日領兵擬往掩襲阿睦爾撒納之妻及班珠爾扎木叅遣宰桑等告稱阿睦爾撒納不能承受聖主厚恩肆行背實未知情今聞官兵前來不勝驚懼臣等隨令班珠爾及衆台吉同來據阿睦爾撒納之妻訴稱去歲投誠以來仰沐皇恩不可勝數阿睦爾撒納悖逆妄行不能承受今情願帶領我子并班珠爾等入訴聖主之前所有游牧人衆應否令我子管領出自天恩並乞將游牧人衆遷至塔米爾等處以防逃竄臣等領兵暫行駐守防範游牧先將阿睦爾撒納妻子交侍衞富亷等由驛解送並將伊游牧人衆令其遷至塔米爾等處就近行知舒明辦理嗣據喀爾喀郡王桑寨多爾濟文稱八月二十日親王額林沁多爾濟將阿睦爾撒納所交印信交令守䕶帶兵行走二十一日至青吉爾地方遇隨阿睦爾撒納行走之扎薩克林丕勒多爾濟驍騎校齊克慎藍翎永德伍岱喀爾喀章京雅木丕勒帶領喀爾喀察哈爾兵二十五名前來告稱阿睦爾撒納逃遁之後忽將我等掩襲奮力射賊始得奪路而出適遇阿睦爾撒納後隊所載軍裝因獲其旗纛盔纓鎻子甲等物又詢據親王額林沁多爾濟解到阿睦爾撒納屬人賓巴巴圖爾哈爾察等供稱阿睦爾撒納潛謀叛逆令長史阿穆爾濟爾噶勒等接取扎卜堪游牧由哲爾格西喇呼魯蘇哈卜塔克拜塔克等各處一同逃出如不能全逃止將妻子帶往又聞令阿巴噶斯之兵搶掠駐劄額林哈畢爾噶之葉克明安台吉巴雅爾宰桑哈薩克錫喇游牧令庫圖齊納爾克勒特烏魯特綽和爾之兵搶掠駐劄伊犂將軍大臣令塔本集賽噶勒雜特之兵由烏隆古路搶掠撤回各兵及聲援兵丁等語續又擒獲阿睦爾撒納屬人鄂立丹津二名查丹津即前遣通使哈薩克之人俱供實不知情因速行將軍班第及卡倫各侍衛等隨帶兵由烏英齊一路前赴烏蘭庫圖爾堵截并行知後隊帶領察哈爾兵丁侍衞官員前往索爾畢烏拉克沁等嶺堵截奏入上諭軍機大臣曰阿蘭泰等奏稱已將阿睦爾撒納妻子及班珠爾等収獲派侍衛富亷等解送來京並派兵將伊游牧人衆遷至塔米爾等處等語阿睦爾撒納妻子等即飭侍衛等中途小心管解速行來京至伊等所奏阿睦爾撒納之妻並不聽從潛逃此特見我兵已至無可逃遁故為此飾詞豈可憑信如果誠心不肯潛逃則阿睦爾撒納之詭計伊妻早已聞知何不先行陳訴著將此情節另行詳悉具奏阿睦爾撒納游牧人衆不特不宜仍在原處居住即遷至塔米爾鄂爾昆等處尚屬未協從前曾令查勘通肯呼裕爾地方為安置伊等游牧之地即著哈達哈阿蘭泰等將阿睦爾撒納游牧人衆馬駝器械盡行収取惟留口糧羊隻派出兵丁嚴行防䕶移至通肯呼裕爾安置俟齊木庫爾等入覲後察其情形即將阿睦爾撒納人等令其管轄所獲阿睦爾撒納遣回游牧之們都等審訊明白即在彼處正法或於烏里雅蘇台地方嚴行看守俟擒獲阿逆時一同獻俘阿蘭泰等現將滿洲索倫兵丁暫在扎卜堪駐劄俟游牧遷定後令在庫克嶺那木嶺二處防守此項兵丁與其在彼二處防守不若接應額林沁多爾濟併力前進更為有益然或相離已逺或馬力不足著阿蘭泰等查明奏聞阿睦爾撒納逃竄後額林沁多爾濟即領兵前進擒拏自易且伊屬下人怨恨者多心已離散阿蘭泰等應遣人知會額林沁多爾濟設法曉諭阿睦爾撒納所屬人等令其自行擒獻永受重恩伊屬下人等必自内生變逸賊更易弋獲將此詳悉傳諭阿蘭泰等遵照辦理臣等謹案阿睦爾撒納逆萌已露屢䝉降㫖將軍大臣密速籌辦而司事者以因循坐失事機不克仰副指授以致免脱逺颺其時逆黨猶依巢穴阿睦爾撒納早蓄異志計必潛通游牧挈致同逃復䝉我皇上密勅諸路豫事防範蓋以賊巢不傾非特無以正助逆之罪且令羽翼游魂假息尤足煽動滋事殊失操刀必割之義觀於被収時逆妻以陳訴表異其言固不足信即普爾普等聞通信而自首亦明知軍營部署已定勢難與阿逆首尾相應不得已為急圖卸罪計耳伏讀聖諭於鬼蜮前後情形一一瞭如指掌是以一舉而黨惡悉就網羅非諸臣僅僅請移游牧者所能窺見萬一也定西將軍永常疏奏諾爾布林沁來投情形永常奏言八月二十四日羅克倫臺站章京三扎卜喀爾喀章京齊爾們禀稱據布魯爾通格臺站之齊巴克告稱遇賊百餘人被傷脱出至噶爾藏多爾濟之子諾爾布林沁游牧告知隨帶兵二百名防禦途遇厄魯特五人詢係扎那噶爾布所屬聞扎那噶爾布已與阿巴噶斯哈丹班珠爾普爾普等會兵搶掠臺站阿睦爾撒納領兵直犯伊犂並欲騷擾巴里坤地方我等回至特訥格爾遇諾爾布林沁擕眷屬内投告稱有布魯古特百餘人搶掠游牧是以遷移前來求轉達將軍另行安置等語臣伏思阿睦爾撒納及新降台吉宰桑等現在入覲何至忽生變亂必係布庫努特之人託名煽動但諾爾布林沁係額林哈畢爾噶大台吉挈眷來投甚屬可疑臣一面傳知烏里雅蘇台大臣偵探阿睦爾撒納蹤跡復傳知駐劄巴里坤大臣策楞等將未過巴里坤之撤回兵丁暫行停止仍飭副將喀爾納接應諾爾布林沁前來奏入報聞己卯諭駐劄烏里雅蘇台辦事大臣阿蘭泰等派兵擒拏阿睦爾撒納及接續臺站各事宜上諭軍機大臣曰覽阿蘭泰等屢次奏摺竟以交辦阿睦爾撒納游牧一節無誤即可茍安無事如所奏第四十站以往臺路斷絶已行文將軍班第轉飭臺站章京永泰速為辦理等語所稱行文班第之語甚屬糊塗現在臺站已斷作何傳送著即明白回奏伊等尚未知西路阿巴噶斯等搶掠臺站之事著將永常所奏抄寄伊等閲看又如接濟額林沁多爾濟追擒阿睦爾撒納之處竟全不置議夫桑寨多爾濟一少年耳尚能出兵分路堵截伊等身為大臣何至一籌莫展著傳諭哈達哈阿蘭泰於撤回索倫察哈爾兵丁内如何調遣接濟額林沁多爾濟之力并通信班第作速籌畫辦理再瑪木特之孫扎木禪人尚可用或令伊揀選扎哈沁兵丁前驅偵探或於伊等内揀選熟悉道路之人徑達伊犂通知班第等協力相助一靣辦理一面將現在情形及陸續信息即行奏聞諭叅贊大臣玊保等詢問各宰桑等進兵事宜上諭軍機大臣曰永常奏摺可即抄寄玉保等給與同行各宰桑等閲看奏内所稱阿睦爾撒納領兵直犯伊犂及班珠爾普爾普搶掠臺站之言顯係虚揑但伊等意見如何阿睦爾撒納現在情形果能直抵伊犂生事與否大兵或宜速進或俟明年整頓前行方為有益將伊等意見告知玉保等轉行陳奏再伊等前赴軍營由阿濟必濟一路前往此時情形恐中途與賊相遇衆寡不敵殊屬未便著由烏里雅蘇台帶兵一二百名同行更為妥協若不便取道阿濟必濟即就近進口由内地前往雖較遲數日亦屬無礙並著詢明商酌具奏命傳諭台吉扎那噶爾布上諭軍機大臣曰永常奏阿巴噶斯哈丹帶兵搶掠扎那噶爾布游牧扎那噶爾布因力弱不能抗拒勉為服從等語是其心本無他情非得已朕已洞悉著傳諭扎那噶爾布此時但約束游牧整頓兵力以待大兵前進共殱逆賊毋致驚惶擾亂事定後自當永受殊恩若扎那噶爾布果能奮力自拔即束身歸命倘或不能惟宜安靜自守斷不得因己同阿巴噶斯等形迹交通妄生疑懼致貽後悔著詳悉曉諭知之庚辰諭駐劄烏里雅蘇台辦事大臣阿蘭泰等辦理包沁及追捕阿睦爾撒納事宜上諭軍機大臣曰阿蘭泰等奏包沁總管阿克珠勒於八月二十九日回至游牧殺傷官兵已遣總管鄂博什帶索倫兵丁追緝包沁人衆并將烏里雅蘇台兵丁分駐各隘口等語所辦尚合機宜仍速行文鄂博什追及包沁人衆時諭以黨同阿陸爾撒納係阿克珠勒一人所為餘皆被其脅從不相株累前阿克珠勒入覲時朕即疑其人狡猾難信擒獲時務訊明情節即在本處正法將家口一併處斬仍於得木齊内揀選一人授為宰桑管理游牧又從前納噶查曾將阿睦爾撒納與阿巴噶斯等逆謀告知將軍班第今已束身來歸誠意可嘉伊兵力甚弱著傳諭令其速赴熱河或即令整兵前進或於明年帶兵追捕阿睦爾撒納至時另行商辦至齊木庫爾先曾擒送阿陸爾撒納所遣之們都今又由烏蘭庫圖爾接出游牧并指陳應行防守堵截各事宜甚屬可嘉仍遵朕㫖前來入覲再阿睦爾撒納有搶掠喀爾喀之信雖未足憑但伊游牧相離甚近平日頗悉喀爾喀情形或迫脅扎哈沁包沁人等驚擾喀爾喀亦未可定哈達哈阿蘭泰等務宜加意豫備計惟速將伊游牧内移沿途嚴密防䕶方為妥協阿蘭泰等現議令青滚雜卜帶領新舊烏梁海堵截賊來要路即傳諭青滚雜卜帶伊所轄兵丁會同察達克赤倫等烏梁海兵丁協助額林沁多爾濟仍諭察達克受朕重恩又與阿睦爾撒納舊有仇隙益宜奮勉務期擒獲逸賊並傳諭現在進兵人等與賊相遇各宜奮勇爭先丕振軍威如能擒獲首惡其功更大必加格外殊恩以示鼓勵命傳諭阿睦爾撒納上諭阿睦爾撒納曰爾上年受困達瓦齊率領妻子游牧前來歸命朕錫以王封資之生計且推誠倚任用為將軍較來降之諸台吉獨加寵渥皆衆人所共知者昨額林沁多爾濟奏爾至烏隆古地方忽行逃竄朕初尚不信以為受恩深重何反覆至此今據各處奏報僉同實出意料之外揆厥所由必因在軍營時與班第薩喇爾等意見不和恐其叅奏自生猜疑耳爾等意見參差之處朕已洞悉意俟爾入覲時詢問明確果無大故自示含容乃不避負恩背義之名輙爾逋逃狂愚實甚爾意以為别娶妻室糾集黨羽從前妻孥游牧即可不顧今爾游牧自妻子至部衆無不以爾受朕深恩自作不靖若非朕曲加仁慈俱因爾株累至於殱滅共相怨恨即爾累及妻孥猶屬細事至所屬人等積勞戰陣今又計日危亡爾固不顧妻孥此等誰無父母兄弟妻子終身隔絶豈人人盡如爾意耶爾受朕恩如此尚懷叵測爾之屬人受爾恩幾何能終保其不生他變耶爾若逃往哈薩克爾前遣通使之丹津云爾兄巴特瑪車凌在彼乞食爾即逃徃能如歸命天朝之受恩寵渥耶况哈薩克來使曾云爾等全不可信久相猜貳即往亦未必容留彼時進退無措朕雖欲施恩曲宥其如國法何爾當詳細籌畫仍悔罪乞恩朕自念爾前勞曲為寛貸若執迷不悟朕命將興師窮搜極捕一被弋獲天網難逃今特不忍爾自罹罪愆且令爾部衆不得安生是以不惜降㫖詳悉訓諭爾思達瓦齊係綽羅斯大族據有伊犂朕大兵所指未敢稍撑螳臂俯首就縛爾與達瓦齊勢力相較何如即令暫収四衞喇特不過一時烏合各欲相機觀變旦夕立見瓦解爾特不知覺悟耳其熟計利害無貽後悔又諭哈達哈等曰現在拏獲阿睦爾撒納宰桑七員除阿穆爾濟爾噶爾外選一庸愚無用之人不必解送來京令其齎曉諭阿睦爾撒納之㫖前往㝷遇阿逆時給伊閲看仍用托忒字多為繕冩交與額林沁多爾濟令其廣為宣布辛巳命協辦陝甘總督劉統勲籌辦馬駝上諭軍機大臣曰劉統勲現在巴里坤所辦駐兵之事尚可稍緩現今阿睦爾撒納尚未擒獲大兵須由西路前進馬駝最關𦂳要著傳諭該督令其回至肅州密速籌辦即將現存營馬加意喂養約計足供五六千人乘騎之用如有不敷即隨便購買其價不必拘泥成例但期籌畫無悞聽候今冬調遣并將辦理情形速行陳奏平定準噶爾方略正編卷十七
