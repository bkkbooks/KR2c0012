body:
  text: 乾隆二十四年二月庚午以將軍兆惠富徳兩路大兵㑹合宣諭中外上諭大學士曰將軍兆惠富徳等奏報正月初六等日富徳等領兵援𠞰轉戰五日四夜兆惠在營聞聲夾擊所向披靡斬獲無算十四日兩路大兵已經㑹合請即乗勢併力進攻𢷬巢擒賊等語上年兆惠統衆薄城軍行神速頗合機宜祇縁我師萬里馳驅馬力疲乏以致一時遮困幸先事綢繆兵馬俱已在途一經檄調皆得如期雲集是以呼爾璊之役内外䇿應大兵刻日㑹齊軍威丕振雖堅壁已經三月而自將軍以至官兵悉皆無恙仰賴上蒼福佑朕心不勝感慰但念一軍困守逾時而後隊續遣之師及一切軍糈現在源源轉運理宜少為休息俟厚集其勢可以一舉竣事已傳諭將軍等令於附近有城之處酌量駐營俟馬匹調齊乗春和臕力壯健以需繼進特恐選愞無知之徒聞爾時援師克捷解圍勢同破竹輒謂可以罷兵息事則大不然毋論逆酋前此辜恩反噬害我王臣難逭天誅即去冬官兵渡河進𠞰輒敢悍然抗拒稔惡更深今雖全師整暇如故而元兇罪大惡極凡我大清國臣民當無不人人切齒使以一戰得志妄語洗甲韜戈不但國威軍紀難於中止且於政體亦甚有闗係佳兵之戒朕所深凜而征討有罪自古無可逭之王章且當我國家全盛時兵力現俱充裕又何不可執言聲罪之理向者兆惠所領不過三千餘人逆酋悉其殘衆負嵎茍活而將軍等尚可力守重圍相拒至於三月之久則其么䯢伎倆並無餘力肆行跳梁亦即此可見况此時兵糧前後輻輳計其成功遲亦不出夏秋間耳若徇首䑕兩端之浮論姑息了事朕實恥之斷斷不為也可將此通諭中外兆惠等摺并發臣等謹案大軍乗勝罙入直薄回城時以馬力不齊逆回因得恃其烏合據險要襲乃退而築壘黑水悉力固守揆之主客衆寡之勢幾不相敵然彼蜂屯蟻襍且數萬衆而我軍以三千人當之賊皆披靡却避惟遙設長圍遮禦莫敢攖鋒而我將士奮厲整嚴同心敵愾伐木以備臨衝則捍衛有資引渠以洩决水則飲汲攸賴賊衆計無所之因欲持久伺釁相拒三閱月我軍亦幾憊矣乃援軍適至内外夾攻賊羣顧驚愕以為自天而降駭竄狂奔蹂躪斃仆相枕藉於是有呼爾璊之捷兩軍遂全旅以振聲威是役也雖由師武臣宣力效忠克襄偉績自非睿算周密更番之兵馬豫調在途則抱水救火遼逺曷濟迨一趣進而應期集事益共仰幾先之智實兆豐功矣至若二逆酋之偝徳反噬螳斧妄干尤神人所共憤是以昊蒼申鑒鴻貺用昭我軍由是出險而亨轉禍為福且掘地而窖米斯獲穿井而圍解乃眢賊銃不著人而著樹既藉燋木為薪材復拾鉛丸以擊賊奇徵靈蹟捷於影響易曰天之所佑者順信乎其佑順也諭定邊將軍兆惠等應援和闐堵截賊衆上諭軍機大臣曰朕因披覽地圖見和闐去葉爾羌頗近阿克蘇則甚逺前舒赫徳進兵時即聞賊人侵犯之信且永貴又將齊凌扎卜請兵情事行文巴禄則將軍大臣等自當㑹議發兵應援蓋霍集占雖經屡敗而力尚能攻取和闐我兵雖不能即取葉爾羌等城而往救和闐則甚易看來和闐之得失惟視我與賊到彼之先後倘為賊所據則我侍衛官兵及伯克鄂對等豈不可惜且各城伯克所積資糧皆為賊用再行攻取更屬煩費昨已諭巴禄領兵數百前往駐劄惟速行為要再觀地圖所列喀什噶爾西北一帶皆布魯特哈薩克游牧牧烏什城亦頗堅固諒逆酋等必不自投羅網或從間道越伯特勒庫庫里里克畢特里克英阿喇特等嶺竄入俄羅斯若於此等可通伊犁之路俱駐兵堵截自易成擒亦粘簽於圖寄示兆惠等其悉心籌辦勿致脱諭三等侍衛達爾黨阿等辦送兵馬事宜上諭軍機大臣曰據官長保奏稱奉到由阿濟必濟前赴巴里坤之㫖即領達什達瓦兵丁從廋濟起程等語官長保既仍㑹達爾黨阿等同行於送馬一事更屬有益達爾黨阿哈達哈傅景伊柱等俟官長保至巴里坤清馥即給與應得錢糧㑹同行走達爾黨阿哈達哈年長歴練當率先奮勉伊等俱係舊人自應和衷集事約束兵丁照看飼秣遇嗎哈沁即行捜𠞰傅景等協同効力不得以董率有人遂生推諉再富徳前有從巴勒琿嶺進取喀什噶爾之奏朕已諭伊等若由此進兵當與現在辦送之兵馬相㑹再行相機辦理俱著傳諭知之陜甘總督呉達善疏奏解送軍營馬駝牲隻呉達善奏言臣辦解阿克蘇馬一萬六千匹西安滿兵厄魯特兵馬七千匹又押送官兵乗騎馬三百五十匹共二萬三千三百五十匹二月初十日俱全數出闗并挑餘馬七百匹續送以備乏斃又青海副都統濟福辦解馬二千匹俟到日續送巴里坤牧放又甘肅各屬截買商駝及西安協濟哈密收買共駝三千餘隻供應官兵尚屬有餘至暫駐吐魯番緑旗兵五千名需駝一千六百五十隻現在山西解駝七百八十餘隻餘亦陸續轉解自可無悮仍酌備車騾送往闢展以資接濟至寧夏道鎮等收解口外採買牛四千餘隻羊五萬三千餘隻已飭沿途州縣按站每牛給料二升草十觔每羊料半升草三觔自肅州出口至安西地多浮土成羣行走易於噴搶且多戈壁臣酌令分起解往又内地採買之羊已獲八九千隻續行趕送唯口外食物昻貴解送牲隻官兵路費未免不敷仰懇聖恩照解馬之例酌量加増則員役愈為踴躍奏入報聞癸酉巴里坤辦事布政使清馥疏奏布魯特使臣等回奏情形清馥奏言布魯特車里克齊等於二月初四日自巴里坤起程臣奉到諭㫖即派原任同知通禄等齎捧星馳追及車里克齊等同䕶送之侍衛托倫泰達桑阿等明白宣示據車里克齊稟稱厄魯特哈薩克錫喇從前並未至我等境内今或潛來藏匿其波羅泥都霍集占等若果逃來自必挐送至搶掠喀什噶爾屬城布魯特人必不敢如此不知係何游牧亦於歸日查訪稟報奏入報聞丙子飭諭阿克蘇辦事侍郎永貴速奏軍前情形上諭軍機大臣曰今日得永貴奏報朕以為軍前要事閲之則係將購辦回人麥石之拕穆齊圖調往阿克蘇辦事又代阿克蘇頭目阿卜都噶頗爾等謝恩殊無甚闗係永貴乃辦事大臣阿克蘇為各城總滙軍營信息及和闐等處情形自當留心查訪具奏或一時未得確信亦當聲叙乃全未提及殊不識事體之輕重著傳諭令其明白回奏戊寅定邊將軍兆惠等疏奏籌議進𠞰事宜兆惠等奏言臣等欽奉諭㫖籌議整兵再進事宜臣等與額敏和卓等㑹商以逆賊霍集占兄弟分守兩城互相救應約計騎賊五六千人歩賊數萬人且葉爾羌本係大城兵少則不足以攻城略地須得馬歩兵二萬人馬兵較多更善且從内地逺來必須休息月餘若能於三四月間抵阿克蘇五六月間至葉爾羌則賊人種麥未收尚可接濟臣等就現在情形酌議由阿克蘇和闐兩路進兵臣兆惠富徳所領官兵又新調之西安滿營及達什達瓦兵丁馬兵可得九千餘名軍營緑旗兵千餘又新調之四千餘及賽里木拜烏什阿克蘇駐劄之二千餘可得七千餘名其不敷之數於魯克沁等屯田兵内抽調馬兵計每人馬二匹及官員乗騎共馬三萬匹又䭾載二萬人兩月口糧軍器火藥共駝一萬隻再臣等抵阿克蘇時未便駐兵一處除臣兆惠阿里衮巴禄阿桂領兵駐候馬駝糧餉外分兵一半令臣愛隆阿前往烏什駐劄以就口糧兼防喀什噶爾一路又臣等於正月二十六日兵至阿爾吉什與巴禄阿桂㑹合知逆賊鄂斯璊等侵犯和闐侍衛齊凌扎卜等請兵應援此時恐賊聞我兵暫撤愈加狂肆應援自不可緩但現在馬力疲乏先揀派官兵數百名令瑚爾起巴圖濟爾噶爾前往沿途捉生詢問若和闐守禦如舊即㑹同馬歩夾擊或已被賊占據則收兵來迎富徳俟糧餉馬匹送到臣富徳福禄即領兵二三千名前往接濟臣兆惠俟辦足五千官兵糧馬再行策應富徳並從和闐往取葉爾羌兩路刻期到日賊若仍前抗拒臣兆惠富徳即前後相機攻擊并堵截逆賊等逃往拔達克山等處路徑賊若固守巢穴即掘濠困城分兵略地今臣舒赫徳額敏和卓努三往阿克蘇催趲糧馬先行起程奏入報聞命議叙副將軍富徳所領有功官兵上諭軍機大臣曰據富徳奏稱呼爾璊等處𠞰賊立功官兵等有三四品官三等侍衛戴孔雀翎者有披甲署驍騎校戴奬賞翎者將索倫總管巴雅爾等十一人列單進呈等語著加恩賞給呼倫貝爾總管巴雅爾二品頂帶打牲處協領署營總金濟噶爾副總管署營總哈坦巴圖魯薩壘叅領署營總博尼俱授為總管三等侍衛侍衛什長多隆武三等侍衛索托隆科打牲索倫三等侍衛固勇巴圖魯伊薩穆俱授為二等侍衛呼倫貝爾佐領署㕘領奇里勒圖著實授㕘領察哈爾防禦署營總斌圖著授為佐領察哈爾總管敏珠爾之弟車凌多爾濟授為䕶軍喀爾喀圖謝圖汗部落台吉副都統職銜額林沁著補授副都統打牲處披甲署驍騎校額勒頗爾肯著授為三等侍衛又諭曰富徳奏叙𠞰賊立功之健鋭營副㕘領以下前鋒以上富虎等四十人又効力及得傷陣亡官兵分别造册送部等語著加恩將富虎等四十人副㕘領陞為㕘領署㕘領陞為副㕘領前鋒校陞為署㕘領副前鋒校陞為前鋒校藍翎前鋒長陞為副前鋒校前鋒陞為藍翎前鋒長暫行换戴翎頂俱著遇缺即補其効力官兵著交部議叙行文將軍大臣等以應陞之缺請補其陣亡得傷官兵俱著該部分别議叙議卹命議叙定邊將軍兆惠所領有功官兵上諭軍機大臣曰兆惠等奏稱此次効力有功人員藍翎扎勒桑等二十二人請戴奬賞翎其侍衛成果等十人原已戴翎將功次列單進呈等語扎勒桑等即照所請准戴奬賞孔雀翎此内扎勒桑署營總端濟勒圖驍騎校愛新署䕶軍校林保等奮勇進𠞰攻破賊營扎勒桑著賜號喀喇巴圖魯端濟勒圖賜號什爾瑪海巴圖魯愛新賜號錫勒哈達克巴圖魯林保賜號噶克察巴圖魯仍賞銀各一百兩其厄魯特都噶爾哈什哈瑪勒占得卜珠爾俄羅什呼䇿伯克固英哈什哈庫庫勒濟克回人阿三和卓特穆爾等俱能奮勉効力著俱授為藍翎侍衛其侍衛成果等十人俱著加一級侍衛上行走之虚銜藍翎琿齊布恩克濟庫哈斯泰倭得勒圖應委藍翎前鋒長之前鋒福柱等効力得傷俱授為藍翎侍衛又諭曰員外郎伊克坦布隨兆惠等𠞰賊及巡查營伍俱能奮勉出力著授為額外郎中遇缺即補至富徳處隨印辦事惟主事赫倫一人著照所請將原任布政使拕穆齊圖調往軍營其阿克蘇承辦事務著永貴另行派委定邊將軍兆惠奏叙緑旗遊擊塞爾凌千總海起雲二員右副將軍富徳奏叙遊擊署㕘將黄世熺等二十九員馬兵潘正學等十三名俱奮勉効力請賞給應陞職銜遇缺補用得㫖著照所請行定邊將軍兆惠等奏請吉林原任協領革職効力委署防禦𠞰賊陣亡之扎庫齊以職銜咨部議卹得㫖如所請行己夘命陞叙副將軍富徳所領効力年久及帶傷効力官兵上諭軍機大臣曰據富徳奏稱健鋭營奬賞藍翎釋迦保等十人皆年久應撤懇請効力之人又虚銜藍翎噶達木保等三人此次俱奮勉𠞰賊等語釋迦保拜凌阿錫蘭保富桑阿武勇額著授為額外前鋒校扎拉芬哈木保六十七太平保文徳授為額外藍翎前鋒長遇缺補用噶達木保賽神保著授為藍翎侍衛納延保既戴奬賞孔雀翎著加恩授為三等侍衛又諭曰富徳奏自正月初六日至十四日擊敗賊衆之侍衛官兵等有奮勇得傷効力出衆者俱奬賞孔雀翎藍翎等語已如所奏准其戴用仍著加恩將藍翎那木扎錫爾庫勒扎勒都侍衛上行走䕶軍校額爾色衣奬賞藍翎領催濟木保愛達漢奬賞藍翎馬甲塞卜騰領催阿特衣前鋒巴爾塔登耨十人再行查明功績如應賞巴圖魯號者奏請賞給又奬賞藍翎回人噶里克巴們等五人厄魯特巴桑等六人俱授為藍翎侍衛至奬賞藍翎馬甲扎哈納等十人並未註明効力得傷事蹟其因何得賞列入奏單之内著富徳查明聲叙那木扎錫爾庫勒是否厄魯特著一倂查奏命調新到闢展緑旗兵丁前赴軍營上諭軍機大臣曰定長奏稱總兵楊寧帶領緑旗兵六千五百名來至闢展以五千名豫偹進𠞰餘供糧運屯田差遣惟進𠞰兵當軍營未經咨調之前若發往額林哈畢爾噶等處耕種則需用農具甚多一時不能趲辦請就近令往哈密駐候俟來年再為調撥等語所見殊屬拘泥從前厄魯特等耕墾之時何嘗運送如許農具且前諭緑旗兵丁候調尚需時日與其閒住不若從事耕作亦係通融酌辦協助屯兵廣開地畝之意非即以此定作屯田兵額也但此等興屯之地於魯克察克兵丁内抽調開墾亦無不可著將緑旗兵五千名發往兆惠軍營諭陜甘總督呉達善等酌量趕送軍需羊隻上諭軍機大臣曰定長等奏鄂爾多斯阿拉善及甘州凉州所辦軍需羊隻尚未送到現在大兵㑹合正資接濟已行文陜甘督撫速為解送等語軍需固宜速到但此項羊隻係豫備官兵口糧前令於青草茁茂之時沿途牧放約五月内送到今雖當春令而草尚未萌若即令趲行必至傷損可傳諭呉達善五吉將辨送闢展羊隻嚴飭解送官兵務於沿途酌量緩急加意牧放既無悞軍需亦不至疲瘦不堪虚糜經費倂傳諭定長等知之乾清門侍衛烏三泰以齎奉恩賞前至軍營願留効力命如其所請軍機大臣奏請行查散秩大臣達什策凌等信息軍機大臣奏言臣等遵㫖查詢軍營所奏厄魯特策伯克効力行走單内散秩大臣達什策凌等哨探兵一百名被賊截斷之處查去年十一月兆惠等奏稱派巴圖魯侍衛喀喇璊綽爾圖散秩大臣達什策凌領哨探兵二百名等語以後伊等行走如何並未奏報請行文將軍兆惠等查奏奏入報聞庚辰諭定邊將軍兆惠等查拏瑪里格爾巴朗上諭軍機大臣曰前聞瑪里格爾巴朗投入回部曾諭兆惠留意查拏昨據納旺奏哈薩克錫喇在布魯特已諭車里克齊拏送伊若被逼亦投回部務期二賊併獲毋致疎脱三月壬午議籌辦軍營馬駝事宜陜甘總督呉達善奏言臣准將軍兆惠密咨和闐阿克蘇兩路派兵二萬名用馬三萬匹駝一萬隻自應豫為籌備查先後送馬二萬四千五十匹俱全數出闗今兆惠奏稿有馬不足數即派兵一萬名之語是所送馬匹已足敷用但進𠞰所闗更宜寛裕現在委員將甘肅等處留牧馬内有四五分臕者再選二三千匹可於三月初出闗送至巴里坤備用至現在直晉二省及西三盟共辦駝七千隻今需駝一萬除已給西安滿兵厄魯特兵一千四百餘隻外又豫備緑旗兵一千六百餘隻尚應送軍營駝六千八百餘隻計不敷駝隻一千五百餘查有運送阿克蘇軍需及前後乗騎駝隻可以撥補或前項辦解之駝不能依期支給應將糧運臺站駝隻先行截撥俟續到補缺至糧運駝隻既經移用恐有不敷現有騾頭一千五百餘可以協濟至各處購買羊隻及闢展留牧北路馬牛羊隻均可以次運送於軍食亦無貽誤奏入得㫖軍機大臣速議具奏尋議軍營馬駝固所急需亦期酌歸實用不必拘泥來文牽合虚數今該督所准兆惠咨送奏稿係未到阿克蘇以前不知内地解送馬匹各數其需用三萬匹不過籠統計算該督只應將現在留牧馬匹飼秣臕壯接續前起出闗馬匹以備調撥若此時照來文數目便行挑解毋論易致疲乏即星夜送至阿克蘇而大兵已經進𠞰亦屬緩不濟急如必俟馬匹到齊則進兵轉致遲悞該督所請再行挑選馬匹之處應毋庸議又軍需駝隻既經陸續出闗自可接濟若將糧運臺站之駝先行截撥則現在已有遲悞且續到之駝逺行疲乏驟令負重轉運必致倒斃於兵糈臺務兩有闗礙亦毋庸如此辦理至所稱添補糧運騾頭應聽酌量協濟其各處趕送牛羊亦應申飭妥速解送以濟軍食可也奏入上諭曰如所議行此議及呉達善奏摺著傳諭該將軍及該督知之總之將軍等原奏頗形難進之意而該督所辦亦不過敷衍成文原無實濟若黄廷桂在必不肯如此朕實痛惜良臣益為憤懣耳諭阿克蘇辦事侍郎永貴酌辦購買回人糧石上諭軍機大臣曰呉達善奏稱查永貴咨送奏稿所定購買回人糧石價值較去秋時尚覺矩少現在内地運糧至闢展每石即需脚價將二十兩應請諭照時價増加庶回人踴躍求售而運費所省實多等語所奏亦是軍營糧運自應照常接濟至購買回人糧石雖較運價甚為節省究係一時􅁠宜非經久之策若盡收回人積蓄於伊等生計殊無裨益嗣後辦買糧石應酌看其實係情願始行增價購偹不可勉强從事命賞給青海王公等捐輸馬駝價值上諭軍機大臣曰據濟福奏稱青海王公等因辦送馬二千匹䝉恩加給價值其倒斃者亦減半給價情願捐輸馬七百餘匹駝三百二十餘隻等語誠悃可嘉著加恩照所增之價賞給分撥凉州莊浪滿營西寧緑旗營牧養備用癸未諭定邊左副將軍成衮扎布等辦送戰箭各事宜上諭軍機大臣曰據兆惠奏將烏里雅蘇台存貯戰箭十萬枝調送軍營又據清馥奏巴里坤有箭三萬枝哈密有箭七萬枝即派員先送軍營仍行文五吉將續到之箭暫貯巴里坤豫備等語烏里雅蘇台戰箭仍須巴里坤轉送長途既難尅期且清馥等業經照數發往自不必續送可傳諭成衮扎布等此時若未經解送即行停止或起程未逺亦即追回申諭定邊將軍兆惠等速行進𠞰應援上諭軍機大臣曰數日來陜甘巴里坤等處奏事皆因兆惠等調發軍需頗覺周章退縮至兆惠富徳昨議兩路進兵俱抵葉爾羌其喀什噶爾並未籌及頃諭舒赫徳同伯克霍集斯駐劄和闐堵截逆賊等逃竄要路各城回兵既可調集則我兵不必多留兆惠從阿克蘇進取葉爾羌富徳或從特穆爾圖淖爾或從烏什進取喀什噶爾似屬有濟但慮伊等志氣先餒難於振作耳適閱清馥奏兆惠將巴里坤等處沿途存留之滿洲索倫䝉古等兵丁盡行調發其意可知軍營現兵近二萬人又何須搜括及此伊等曾以少撃衆潰圍決勝合兵而旋無敢追襲者賊之伎倆可知若謂賊多馬力不過從前掠取阿睦爾撒納之馬數千匹既無從購辦且屢次傷殘以我萬騎取數千賊衆何敢抗行且所運大神等礮實為攻城利器鋒鏑之鋭又不待言我兩路分兵兩城必顧此失彼乗間𢷬虛一舉可得可傳諭兆惠等其毅然決策以奏膚功所有商辦機宜作速奏聞甲申㕘贊大臣舒赫徳等疏奏和闐各城信息舒赫徳奏言二月初十日據侍衛噶布舒散秩大臣鄂對等遣回人阿舒爾和卓報稱賊黨阿卜都克勒木鄂斯璊等領衆分攻額里齊哈喇哈什玉隴哈什三城守禦已六十日又克勒底雅齊爾拉二城之伯克及所屬三百餘人逃至額里齊二城已為賊據祈速發兵救援等語臣等詢問阿舒爾和卓據稱克勒底雅於去年為鄂斯璊所據伯克阿里木沙率所屬二百人投額里齊其餘三千户皆被陷阿里木沙之子被賊阿卜都哈里克縛至額里齊城下俾見其父而殺之齊爾拉城鄂斯璊哈子率百餘人投哈喇哈什其妻子與三百餘户皆被陷又聞玉隴哈什伯克烏努斯亦率其二千七百餘户來額里齊餘三百餘户入於賊今哈喇哈什侍衛齊凌扎卜伯克海里雅木哈子阿瓦斯黙特等領緑旗兵回兵四千餘額里齊自正月十五日以後賊攻更急現有索倫兵七十名緑旗兵三百名回人六千餘糧餉火器俱可支至二月下旬惟玉隴哈什城虚無人而現在所守二城亦有夤夜逃出者克勒底雅被掠回人亦有同賊攻城者惟作速發兵往援等語臣等伏思永貴前發兵二百五十名及兆惠所遣之瑚爾起等月内可至和闐臣等仍於續到兵馬及各城回人馬匹儘力速辦以備調用奏入上諭軍機大臣曰舒赫徳奏據駐守和闐侍衛等呈報賊攻頗急若援兵遲滯難於守禦等語看來富徳等與兆惠合兵即當往援不但解圍救困且可駐兵進取從前舒赫徳有和闐糧足駐兵之奏何以合兵時未見議及著據實奏聞至侍衛等所報各城伯克等被廹來投并力固守且有妻子被害者深為軫惻自應加恩優卹俟事定後著舒赫徳查明具奏若和闐各城既定兆惠富徳等分兵攻取葉爾羌喀什噶爾舒赫徳同霍集斯駐防和闐俱遵前㫖辦理又諭曰前兆惠等被圍富徳奮勉應援至和闐被圍亦急何以未聞往救若謂兵力不足則兆惠一軍尚能與賊相拒况兩隊㑹合轉患其弱耶若謂馬力不足則既可回抵阿克蘇何難就近赴援和闐因糧以守耶富徳此時曾否領兵往援著作速奏聞至兆惠曾為賊困其望援甚切可知以身經艱阻之事而於他人則置之度外何以為情然朕亦不追既往惟促富徳速援兆惠亦酌量策應賊如聞風潰散即以進攻葉爾羌等城為要如和闐已為賊據則伊等俱不必前往惟據實奏聞候朕核定功罪可耳申諭庫車辦事布政使徳舒增給回人糧馬價值上諭軍機大臣曰徳舒奏稱購買阿克蘇庫車回人馬匹及回人等捐助米榖等項賞給價銀過多恐遂成定例日後難於辦理請候議定各城應交實數再酌量賞給等語殊屬拘泥現在逆酋等尚未就擒和闐亦需策應若回人見我大臣等辦事𤨏屑未必傾心降服且伊等貪利性成示以裁節或致妄生追悔若謂將來遂以為例則回部蕩平後不過酌定貢賦並無購辦糧馬之事何必為此過慮况以現在辦送馬匹糧餉較之其勞費不啻數倍自當示以寛大始合機宜看來伊等所定價值尚覺其少仍須酌量增加應時給發嗣後俱遵照辦理諭定邊將軍兆惠等查奏侍衛拜達爾勞績上諭軍機大臣曰聞侍衛拜達爾於雅哈托和鼐之戰憤罵同行身先陷陣衆始競進似此奮勉將軍大臣等自當嘉奬録叙乃未見舉出陳奏惟保列逢迎趨避之員何以服人心而作士氣拜達爾現在何處曾否著有勞績可𫝊諭兆惠等查明因便具奏平定準噶爾方略正編卷六十九
