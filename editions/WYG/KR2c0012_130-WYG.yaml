  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_130-1a, image: WYG0359/WYG0359-0361a.png}
body:
  text: 乾隆二十四年秋七月辛未諭㕘贊大臣舒赫德等安插多倫回人事宜上諭軍機大臣曰舒赫德等奏稱准兆惠咨來投之多倫回人等暫令於阿克蘇賽里木庫車等處過冬來春或在庫爾勒拜哈喇沙爾居住或遷往伊犂交臣等籌辦但此等回人以遷徙為常性習與各城有異若與阿克蘇等回人雜處恐滋生事端請乗勢即移往哈喇沙爾等空曠之地課以耕種交書山就近辦理等語所奏自屬可行然未免稍存推諉之見朕命舒赫德在阿克蘇辦事特以擒獲逆酋官兵奏凱後留伊撫輯回部數年俟屯田駐防諸事就緒再行更替自巴里坤以外一切事件孰非其所當經理即有轉行派委者仍宜總統察核若謂承辦有人遂與己無涉則斷不可此等回人既發往哈喇沙爾等處書山應就近辦理仍與舒赫德㑹同商酌俱著傳諭知之命優卹厄魯特親王達瓦齊上諭大學士曰親王達瓦齊曽為厄魯特台吉被獲獻俘朕念係外藩宥罪錫爵伊自受恩以來隨侍禁近一意抒忱奮勉為人尚屬樸誠今聞溘逝深為軫惻著賞給治喪銀一千兩伊子羅卜扎仍准其襲封郡王甲戌命叅贊大臣阿里衮等堵截逃賊上諭軍機大臣曰昨據阿里衮奏稱領兵追襲霍集占等詢問逃來之回人克伯克等告稱霍集占現在往追搶掠沙喇斯游牧之布魯特等波羅泥都在沙爾呼勒休息馬匹等語阿里衮與逆賊相距五六站兆惠前已派明瑞速往堵截宜即行知㑹以便夾攻再明瑞經過之地多屬外夷伊等曽否助賊或有陸續歸附者俱著詳查具奏乙亥諭定邊將軍兆惠等辦理撫賞各事宜上諭軍機大臣曰兆惠奏稱前因撫定葉爾羌奏請起程而追賊更闗𦂳要且布魯特人等陸續投見者甚多請暫留英噶薩爾令額敏和卓先往葉爾羌等語辦理甚合機宜此時富德阿里衮巴祿明瑞等應已追及逆賊其接濟口糧招徠降衆仍須兆惠督率辦理投見之布魯特等有應加鼓勵者即傳㫖賞賚或須通使即酌派侍衛等前往如願入覲亦照從前哈薩克布魯特之例伴送來京庶拔達克山安集延等處聞風向化又所奏安集延人等願協力擒賊更為可喜一得各路㨗音即速奏聞又諭曰富德等奏稱辦理賞給葉爾羌阿卜都里野木克理雅喇克等翎頂緞疋荷包及擢授阿奇木伊沙噶等伯克酌定貢賦咨明兆惠查辦等語富德所請撫賞諸事俱合機宜可傳諭兆惠將擢授阿奇木等伯克照喀什噶爾例辦理其酌定貢賦之處伊既令額敏和卓前往葉爾羌即著詳悉查辦定議具奏諭㕘贊大臣舒赫德等辦理應留應撤臺站上諭軍機大臣曰現在葉爾羌喀什噶爾業經平定富德等奏報事件由葉爾羌直抵阿克蘇甚為便㨗其葉爾羌至和闐臺站著即行裁撤惟和闐至阿克蘇一路尚應酌留著傳諭舒赫德福祿等遵照辦理諭定邊將軍兆惠等旌表陣亡官兵上諭軍機大臣曰據富德等奏稱前至葉爾羌經過兆惠納穆扎爾等領兵𠞰賊之處陣亡官兵骸骨暴露隨委達爾黨阿鄂博什等瘞埋祭奠等語富德所辦甚是官兵等為國捐軀深可憫惻親製詩章以示軫念可繕寫清漢䝉古回部字發與兆惠令其勒石冡前永昭表忠崇節之至意并𫝊諭富德知之丙子諭㕘贊大臣舒赫德以議處副總管噶雜納齊等曉示回衆上諭軍機大臣曰據舒赫德奏稱阿克蘇伊沙噶伯克頗拉特商伯克呢雅斯揭報副總管噶雜納齊伯克巴巴克專擅委用又徵收糧石將交官之項侵蝕入己且伊等陰結黨援互相唆調恐致滋事等語噶雜納齊伯克巴巴克新經歸附朕加恩授為副總管自應感激奮勉乃肆意妄行如此本當從重治罪姑念伊等向化之初尚未深悉中國法度且上年駐劄大兵伊等亦曽効力著革去職銜免其治罪同妻子押解進京所遺員缺俟阿奇木伯克鄂對回任與舒赫德㑹商揀選補授并著曉示回衆知之八月己夘㕘贊大臣明瑞疏奏追敗賊衆於霍斯庫魯克明瑞奏言臣同兆惠於閏六月十四日至喀什噶爾十五日往追逆賊霍集占等因思逆賊等脫逃已十八日如不在色勒固勒住歇計此時將過帕米勒當即緣山行走繞過高峯數處且日渡溪河四日未得水草馬匹多損察看前途情形覺經過之路似屬紆道因詢之嚮𨗳等另覔㨗徑有隨後到營之布魯特呼都伯克告稱此即前往帕米勒之路但有向拔達克山及博羅爾二道若往安集延由色勒固勒向北經過哈喇庫勒其地係布魯特之哈卜齊克等部落游牧等語臣即遣人招降布魯特一面晝夜趲行本月二十五日行近哈喇庫勒據哨探人等回報布魯特已遷移游牧但一路有賊行踪跡又登高瞭望見五六十里外有飛塵起處臣等即選兵一千三百餘名行至次夜五鼓覔得賊踪隨牧放馬匹捉生詢問二十八日黎明據偵探兵誇普勒圖等擒獲一人名呢雅斯默特詢知霍集占兄弟欲往抜達克山衆伯克不從遂由此路往安集延五日前聞大兵來信棄其輜重令家口先行沿途凡遇無草處俱以大麥飼馬計有騎賊七八千人臣等悉力速追於巳刻至霍斯庫魯克嶺追及賊衆約六千餘人於嶺上排列我兵先至者九百人整兵誘戰賊不肯下山恐相持稍久賊必夜竄當即領兵爭據高阜大聲傳諭若擒獻賊首必加恩賞賊衆向下施放鎗礮且犯我左翼前隊我兵以鎗矢迎擊衝至嶺下向山爭進鏖戰三時賊衆敗遁我兵乗勢追射因馬力不及賊漸逺去旋復聚集恃其人衆分隊合圍我兵直前衝擊且戰且行賊衆尾追臣等一面誘戰一面令步兵據山埋伏賊近即從山上放鎗臣等回兵衝入賊隊至晚賊兵大敗越山遁走臣等見賊衆馬力有餘易至竄逸擬擇水草之地暫息馬力夜行晝伏伺其無備方可擒獲隨探看賊踪由拔達克山一路逃走一面追襲仍遣人通信富德阿里衮併報明兆惠查此次我兵力戰竟日𠞰賊五百餘人受傷者無算生擒男婦三十餘人收獲馬駝牲隻百數我兵陣亡者亦有百餘人容詳查具奏臣明瑞雖經𠞰殺賊衆而未能擒獲渠魁且官兵亦有損傷請㫖將臣明瑞從重治罪奏入上諭軍機大臣曰據㕘贊大臣毅勇公明瑞奏稱追𠞰逆回於霍斯庫魯克嶺賊衆六千餘負嵎固守時我兵先至者九百人整陣鏖戰經厯三時賊衆大敗復恃其馬力前來抗拒我兵直前擊𠞰賊始越嶺逃竄此次進𠞰我兵陣斬逆賊五百餘人俘獲男婦三十餘人駝馬牲隻百數受傷者無算等語我師以寡敵衆力戰敗賊實屬奮勇効力朕心深為嘉悦明瑞著交部從優議敘所有本隊得功之大臣侍衛官兵及陣亡人等並著查明造冊送部議敘議卹諭定邊右副將軍富德等㑹兵奮勉𠞰賊上諭軍機大臣曰富德奏與阿里衮明瑞三隊官兵業經㑹合揀選四千人往追逆回其存留之兵交楊寧管束招降沙爾呼勒回人以候調遣等語此奏未至之前朕因明瑞官兵較少賊勢尚衆頗厪於懷今既三隊㑹合兵力倍増如此應機赴節乃上天垂佑必獲渠魁之兆佇聞伊等㨗音至嚮𨗳等所云拔達克山交界有隘口數十里僅容一騎又隔大河止一渡口等語萬一賊人逃脫得入拔達克山必不得已即遵前㫖撤兵回葉爾羌喀什噶爾休息次年再行進𠞰亦可然終以此時獲賊為上其各加意奮勉諭定邊將軍兆惠等辦理安集延追賊事宜上諭軍機大臣曰兆惠奏詢問嚮𨗳等云拔達克山路遠地狹隨逆賊之伯德爾格等俱係安集延布哈爾之人必前往安集延若果如此則領兵由鄂坡勒穆什一路前往索取等語所見甚是賊若果入安集延兆惠既領兵索取而富德等復行追襲非為我兵所擒即為安集延之人縛獻矣又北路擒獲噶勒雜特得木齊博勒顯據供哈薩克錫喇在安集延布魯特亦未可定併著留心訪查適明瑞捉生詢問有喀什噶爾回人往報逆賊等以大兵信息此等回人尚有藏於喀什噶爾者則葉爾羌亦難保其必無著兆惠留心盤獲即嚴行治罪諭烏魯木齊辦事副都統滿泰辦理哈薩克貿易上諭軍機大臣曰據滿泰奏稱策布登扎布派嚮𨗳等領哈薩克貿易之人陸續至烏魯木齊其頭目哈斯伯克等禀云此次貿易必須倍得利息若如上年則不可而哈薩克之烏穆爾等又云伊等係阿布賚所遣不比哈斯伯克但上年所得緞疋甚為紕薄此次請給以精好者等語從前策布登扎布途遇哈薩克人等即云緞疋不佳求另定價值朕已訓示努三等矣今覽所奏伊等情詞足見其貪得無饜若從所請何所底止且换易馬匹特以備征戰之用今回部計日蕩平亦何必多此糜費著傳諭滿泰等若貿易人等仍執前説即諭云大皇帝恩賞爾等緞疋皆出自内府與商民常用者不同況以外藩所無之物許爾等貿易已屬特恩爾等馬匹即不行貿易仍可帶回若商人貨物則有往返運送之勞倘利息有虧亦難强其再至此次交易與否聽爾所願以此明白曉示看其情形若何一面辦理即行奏聞努三此時尚未轉回范時綬現在前往著㑹同辦理辛巳命以叛賊丹巴林沁之兄齊旺多爾濟賞伯克鄂對為奴上諭軍機大臣曰舒常奏稱查得叛賊察哈爾丹巴林沁並無妻子惟親兄䕶軍齊旺多爾濟現在軍營等語著傳諭兆惠即將齊旺多爾濟賞給伯克鄂對為奴令其嚴加管束稍有滋事即聽鄂對辦理其丹巴林沁若尚在霍集占處著留心查拏送京治罪諭甘肅總督楊應琚等查送貿易緞疋上諭軍機大臣曰昨據滿泰奏哈薩克貿易人等有所得緞疋紕薄之語在伊等貪得無饜欲以交易官緞與前嵗賞給阿布賚等緞疋相較固屬妄生冀倖自當示以節制但從前議將陜甘緞疋式樣轉發江浙織造趲辦或承辦之員因節省工料以致成色太減亦所不免即如各省辦解内府緞疋尚不能一律精好況於應付邊地之用此亦當留心察核以杜朘削之弊且不使過於紕薄致有累逺人著傳諭楊應琚努三等即查明貿易緞疋約有幾種各取一端送京核驗壬午命㕘贊大臣舒赫德往葉爾羌辦事上諭軍機大臣曰富德等現在追捕逆賊霍集占兄弟自當計日功成萬一不能即獲則來年所需馬匹糧餉須就近在葉爾羌辦理今阿克蘇現無要務可傳諭舒赫德奉到此㫖即赴葉爾羌辦事阿克蘇僅納世通一人著德舒前往辦事奏事時列名於前其庫車事務著德文辦理併傳諭兆惠等知之諭辦理屯田副都統定長等换易哈薩克馬匹即送軍營上諭軍機大臣曰近據定長范時綬等奏報哈薩克貿易人等有馬數千匹來烏魯木齊貿易等語現在富德等三隊合兵窮追逆賊倘未即就擒則接濟馬匹最闗𦂳要著傳諭定長范時綬將所易哈薩克馬匹隨其所得若干即送往軍營甲申命䕶軍統領努三等敘卹追𠞰嗎哈沁官兵上諭軍機大臣曰努三等奏稱遣獲扎哈沁之嗎哈沁塔爾巴等十九人供出偷竊烏魯木齊牧羣之訥克衣等因用為嚮𨗳窮追入山賊人棄其馬匹婦子以繩自繫越過髙峯官兵等衣履穿透未能追及仍遣人各路堵截等語數年來侵擾臺站者即此等嗎哈沁自知罪重負固深藏努三等尋踪堵截殊屬奮勉著傳諭定長清馥令其分道夾攻務期弋獲此次追賊中鎗陣亡之吉林馬甲鄂勒布善渡河溺斃之千總曹正宗隨守備胡海追奪羊隻中鎗陣亡之把總李升貴兵丁韓齊貴俱照例賞卹得傷兵三名亦照例賞給用為嚮𨗳之都楞以招降被害克什䝉克津負傷脫出俱可軫念著酌量賞給銀兩又諭曰遊擊唐朝􅔨䕶送第三隊軍需羊隻全行交收又請隨行追賊奮勇効力殊屬可嘉著記名以㕘將用遇缺即補諭定邊左副將軍成衮扎布等辦理新撫烏梁海事宜上諭軍機大臣曰成衮扎布奏稱副都統莫尼扎卜等招降察罕喀巴等處之卓特巴博碩昆等五十七戸伊等俱鄂爾楚克部落原在阿爾台游牧以皮為賦應附入烏梁海大臣管轄等語卓特巴授為章京巴彦授為驍騎校所屬二十九戸歸内大臣察達克管轄博碩昆授為章京雅爾里克授為驍騎校所屬二十八戸歸散秩大臣圖布慎管轄餘俱如所議行伊等皆新附之人務宜留心管束不可滋生事端又諭曰成衮扎布等奏據莫尼扎卜呈稱察達克等七旗之人毎遇公事差遣頗知奮勉効力此次搜捕嗎哈沁雖未全獲而𠞰殺十餘戸招降五十餘戸應行鼓勵著加恩賞察達克圖布慎等緞各四端莫尼扎卜自備口糧効力著賞銀一百兩所報得功官兵二十一員名著成衮扎布等查明酌賞陣亡得傷人等亦照例賞卹丙戌諭烏魯木齊辦事副都統滿泰等查奏貿易情形上諭軍機大臣曰滿泰奏稱哈薩克之哈斯伯克等四隊貿易人等所到馬匹擇其善者每匹作價四兩四錢共得一千匹其次者減價六錢共得一百五十匹交易既竣照例派兵送至羅克倫遣回游牧等語所辦尚屬妥協但伊等從前以緞疋平常爭論價值今豈竟無一語著將交易時情詞因便奏聞又諭曰滿泰奏隨哈薩克貿易前來之厄魯特喀爾查海巴桑藏卜班珠爾三人稱係三年前被擄今情願投歸等語伊等俱係三年前被擄並未抗拒大兵尚應收留但哈薩克亦皆向化嗣後若從前被擄人等私自投回伊等即時追取應仍行查給或無人問及即不妨留養亦不必安插闢展等處可押送至京現在喀爾查海等即遵照辦理諭定邊左副將軍成衮扎布等酌賞𠞰殺嗎哈沁官兵上諭軍機大臣曰成衮扎布等奏稱扎隆阿額爾克沙喇追𠞰盜竊薩拉卜拉克卡倫馬匹賊人至博爾濟河追及計𠞰殺二十一人死於寨内者甚多所得馬駝鳥鎗等物分賞効力之人仍向額爾齊斯搜捕嗎哈沁等語此次雖未能生擒賊人以訊其盜竊踪跡而盡行𠞰殺已屬奮勉𠞰捕此等賊人係扎隆阿專責今因特遣額爾克沙喇伊始藉以成功著加恩賞額爾克沙喇緞四端扎隆阿不必加賞其隨行官兵仍著查明奬賞効力贖罪之台吉瑪克蘇爾等應予開復著查明革職原案候朕酌量加恩近已諭扎隆阿額爾克沙喇不必往博克達山即遵前㫖轉回游牧戊子駐劄烏什辦事按察使職銜納世通等疏奏布魯特貿易情形納世通等奏言七月初八日據庫庫爾里克卡倫送到布魯特貿易之克勒第告稱係薩雅克部落居住一千戸之總管去年將軍等招服布魯特時曽給印文令往招安集延部落來伊犂投見本年正月往伊犂尋覔將軍未遇近聞霍什克伯克等曽見將軍大臣隨帶馬牛羊隻於閏六月初一日起程聞將軍進兵烏什有駐劄大臣懇准貿易等語臣等查克勒第所帶牲隻無多毋庸官買且時價甚昂因曉示云我内地所送牲隻甚多不須貿易但既有將軍印文我等照看令向烏什回人交易隨派員照管馬牛自三十兩至四十兩羊隻概以十三兩定價貿易六日全行售盡克勒第等甚為感悦臣等賞給緞布等物於十八日送赴卡倫令回游牧奏入報聞壬辰定邊右副將軍富德等疏奏追敗逆賊霍集占於阿爾楚爾富德等奏言臣等於喀喇烏蘇合兵追賊捉生詢問霍集占兄弟逃走所向七月初七日探知賊踪相隔一百餘里有大戈壁初八日領兵牽馬星夜急行初九日辰時至阿爾楚爾追及賊尾賊覺以䭾載先行預伏賊衆於兩山間列陣谷口以誘我兵臣等分兵三隊左翼巴圖濟爾噶爾鄂齊爾等以鎗礮攻奪左山右翼由屯伊柱攻奪右山中軍亦發大神礮自辰至午賊皆敗走我兵在山上者奮勇下擊臣富德令噶畢雅圖巴圖魯額爾登額協助左翼塔蘇爾海巴圖魯占頗圖協助右翼仍由中軍呼噪衝突臣阿里衮明瑞巴祿阿桂率領隊大臣侍衛等兩翼衝擊賊遂大潰臣等追射三十餘里賊衆據一髙山臣富德等整兵對戰臣明瑞阿桂攻奪山峯瑚爾起巴圖魯侍衛額爾登額老格侍衛額爾登額塔爾海烏三泰科普薩自山麓横衝賊以死拒守臣富德等佯為奪賊馱載徑往追襲賊懼皆越山敗走臣阿里衮巴祿追保䕶䭾載之賊賊衆又據一山因與達爾黨阿温布由屯伊柱豐安等接戰臣富德阿桂傅景領侍衛官兵策應臣明瑞鄂博什繞出賊後賊又復潰逃臣等領兵急追賊且戰且走至夜收兵擇有水草處暫息馬力計追賊四千餘人𠞰殺者千餘人生擒五十餘人奪纛六桿礮五位鳥鎗長鎗以千計疲乏中傷牛馬亦多并訊知惡黨阿卜都克勒木等數大伯克俱被我兵陣斬我兵陣亡者一名得傷者不過十名餘奮勇出衆官兵照例令戴奬賞翎仍俟查明造冊奏請議敘議卹臣等因賊踪與拔達克山邊界相近次日又速行追襲奏入上諭軍機大臣曰富德等奏稱追及逆酋霍集占於阿爾楚爾我兵奪山衝擊陣斬賊衆千餘人生擒五十餘人獲礮纛器械牲隻無算賊衆大敗窮竄現在乗勝悉力追擒等語大臣官兵等爭先奮勇力𠞰逆回覽奏深為嘉慰仰頼上蒼福佑逆酋計日就擒可立待伊等㨗音也其自將軍至領隊大臣俱交部從優議敘侍衛官兵及陣亡得傷人等俱著查明造冊送部議敘議卹又諭曰富德等奮勉𠞰賊已交部從優議敘以道逺不能多齎賜物惟將軍㕘贊領隊大臣等各賞荷包鼻煙壺即行發往至奏内逆黨阿卜都克勒木等大伯克數人俱已𠞰殺等語其餘大伯克之名及如何𠞰殺係何人立功之處仍著附便奏聞癸巳命議敘拏獲厄魯特僕役盜馬潛逃之官兵等上諭軍機大臣曰清馥等奏稱詳訊被嗎哈沁擒去放回之厄魯特僕役畢里克圖等究出伊等勾通盜馬欲投俄羅斯情由將首謀之巴特瑪等七人俱行拏獲正法等語此等在巴里坤留看行裝之官兵僕役等竟敢造意潛逃清馥即派兵全行拏獲辦理甚妥著交部議敘其効力官兵等俱應加陞賞疎防人等分别議處責懲俱著照所請行丙申諭定邊左副將軍成衮扎布遷移烏梁海等游牧事宜上諭軍機大臣曰成衮扎布奏據莫尼扎卜告稱察達克等因現在科卜多等處貂䑕無多請移往阿爾台在額爾齊斯之源游牧等語察達克所屬烏梁海年來効力行走且額爾齊斯現亦空曠即從伊所請亦可但該處原係都爾伯特游牧今䇿凌烏巴什等在烏蘭古木居住前曽降㫖伊等若願歸舊地亦聽其便可傳諭成衮扎布曉示策凌烏巴什等云察達克等請往額爾齊斯等處游牧奏奉諭㫖以額爾齊斯原係爾等舊地今察達克所指之處若與游牧無礙即從其所請或爾等願歸舊地現在哈薩克俱降伊犂賊衆盡滅全無足懼即可遷移爾等現在游牧之地亦可賞給察達克等但哈薩克新附不比爾等歸誠日久須嚴飭所部安靜無事若騷擾哈薩克邊界則伊等具奏時朕難於訓諭至爾等既遵約束而哈薩克反來擾害則拏獲即行正法亦為理直言順爾等或安土重遷即無庸置議此額爾齊斯之地與其為哈薩克俄羅斯竊據不若使烏梁海人等遷移亦將此㫖宣示察達克等令其各安生業毋得滋事所有辦理情形仍著妥議具奏平定準噶爾方略正編卷七十六
