body:
  text: 乾隆二十五年九月癸卯諭按察使銜納世通安撫多倫囘衆上諭軍機大臣曰納世通奏奉到由庫車調往哈喇沙爾辦事沿途防範多倫囘衆諭㫖俟體察得實續行具奏等語前因阿里衮奏賊犯邁喇木等所供有多倫囘人等倡言煽惑之語因諭納世通密為防範今據審訊明確係邁喇木呢雅斯等敎令多倫囘衆傳說則並非伊等起意揑造不須過為防範仍宜加意安撫俾伊等坦然無疑庶新疆安插囘人可以永期寧謐著傳諭知之議搭放官兵口糧羊隻事宜參贊大臣舒赫德奏言各城臺站官兵口糧若於一年内以三四月搭放羊隻既省運米之費而所得皮張即作冬衣查哈密庫車等處約羊四萬餘隻計送烏魯木齊二萬隻以一萬隻轉送伊犁五千隻存留庫車賽里木拜一萬餘隻解送阿克蘇搭放官兵糧餉其喀爾喀貿易羊隻由巴里坤採買送至烏魯木齊轉送伊犁至布魯特等雖間有羊隻來喀什噶爾貿易但囘人争購其値頗昻請俟價平時再為辦理奏入得㫖軍機大臣議奏尋議現在哈密牧放羊隻係去年官兵口糧所餘應如所奏俟來年草青時分送烏魯木齊伊犂其餘存留庫車及送往阿克蘇以備搭放糧餉但所奏未及葉爾羌喀什噶爾官兵應再行查奏至喀爾喀羊隻除由巴里坤購送烏魯木齊伊犂外查伊犂現駐兵丁應酌量多購牝羊以資孳息其布魯特羊隻應俟價平時酌以銀貨交易此時毋庸辦理奏入上從之戊申諭駐劄巴里坤等處大臣等加意守䕶孳生馬匹上諭軍機大臣曰吳達善奏稱遵照軍機大臣議奏於安西等三營孳生馬内揀選一千四百匹解送巴里坤牧放等語此項馬匹特令軍營分羣孳息以圖久遠獲效著傳諭巴里坤烏魯木齊伊犂之該管大臣等務派妥協官兵加意牧放不致盜竊傷損方為有益現在從哈薩克逃出之厄魯特等若聞牧羣蕃息必來盜竊今地方雖云寧静須仍如用兵時嚴設卡倫加意防範倘日久疎懈致馬匹被盜或大有傷損定將承辦之大員官兵以軍律從事己酉諭陜西巡撫鐘音辦解減撤臺馬事宜上諭軍機大臣曰據鐘音奏陜省沿途各站額外增添馬一千八十匹除已撤五百八十匹外其尚存五百匹應盡行裁撤仍照原價每匹八兩歸款等語此項額外增添臺馬從前雖經軍機大臣議令裁撤歸款但目下陜甘二省馬價尚在昻貴之時若照原價變賣將來倘有需購買之處轉不免周章且烏魯木齊等屯田處所亦皆需馬是以甘省此項增添臺馬及孳生馬匹皆令其解赴巴里坤等處設厰牧放今陜省應撤臺馬事同一例莫若照甘省辦理既免交收之煩而屯田處所亦可就近撥用甚為有益著傳諭該撫令其遴委幹員妥辦解赴勿致疲乏若業經變價歸款即不必另行辦理辛亥葉爾羌辦事都統新柱等疏奏查拿搶臺逸賊新柱等奏言搶掠鄂坡勒臺站為首囘賊海特瑪特呢雅斯索丕傳送逆書囘賊多里雅特黙特俱經逃竄臣等於總兵官楊寧等查拿賊犯時即令吐魯番囘人阿璊密喇卜等識認現獲之賊今准阿里衮咨阿璊密喇卜等識認海特瑪特呢雅斯索丕現在所獲數内已照原奏正法其多里雅特黙特臣等通行各城一體查拿務獲奏入報聞壬子命布魯特散秩大臣阿奇木補授阿喇古阿奇木伯克參贊大臣舒赫德等奏言臣新柱面奉諭㫖命與臣舒赫德酌量將散秩大臣阿奇木補授阿奇木伯克但現在囘部各城阿奇木伯克俱補授有人今阿奇木係布魯特人若於布魯特附近囘城補授庶為人地相宜查阿喇古尚無阿奇木伯克請以布魯特阿奇木補授可以外防布魯特内輯阿斯騰阿喇圖什等處至阿喇古有囘人三百戸從前阿奇木伯克定為六品阿奇木係散秩大臣即以原銜管理阿奇木伯克事務奏入得㫖如所請行參贊大臣舒赫德疏奏奬賞伯克阿卜都喇伊木舒赫德奏言臣欽奉諭㫖以阿卜都喇伊木發覺邁喇木等逆書應行奬賞臣等伏查該伯克從前率葉爾羌之衆歸附此次又將逆書呈出因得早為辦理該伯克現係葉爾羌伊沙噶伯克戴四品頂孔雀翎今擬請加賞二品頂帶伏候欽定奏入得㫖如所請行癸丑命定卡倫官兵欺飾妄報及疎防滋擾之例上諭軍機大臣曰舒赫德奏審訊駐阿喇古卡倫之索倫佐領羅頗里等並未被喀喇和卓搶掠因遇賊得脱恐查詢獲罪故飾詞求免應請革職留軍營効力等語前據永慶奏羅頗里被喀喇和卓圍困三晝夜陣亡兵丁六名始得脫出嗣經阿里衮審訊喀喇和卓據供曾遇羅頗里隨給與口糧指路令赴烏什阿克蘇兩處朕見其情詞互異因諭令查奏今舒赫德尚未奉到諭㫖即已訊得確情則從前情節顯係羅頗里畏罪揑造夫卡倫駐兵無多遇賊力戰不支始得脫出本屬無罪即賊勢委難抵敵暫離汛地其罪猶輕今轉將給糧指路之人誣為搶掠之賊且以管兵官員而欺飾妄報如此理應正法念其尚能與賊接戰未至望風逃竄姑從寛典但僅予斥革不足蔽辜著將羅頗里永遠枷號示衆再有似此者定行正法至新疆駐劄大臣等應嚴飭所屬防範臺站并體察官兵内如有任意欺凌囘人侵占什物者一經發覺即行正法俱著舒赫德通行傳諭知之諭參贊大臣阿桂等調派効力人員辦理屯田事宜上諭軍機大臣曰據阿桂奏稱本年伊犂屯田以播種計之上地所獲二十倍中地所穫十倍足敷千餘人來年麥熟前之食將來增墾益多則需人益衆並請於闢展廢員内遣原任副都統圖克善劉揚前來効力等語今年數百囘人甫經耕墾即收穫豐裕覽奏殊為欣悅伊犂地廣屯田以多為善其圖克善等俱照所請發往若仍需人承辦則烏魯木齊効力官員頗多著一面具奏一面調遣亦傳諭烏魯木齊大臣等知之命安插由哈薩克來投伊犂之厄魯特等上諭軍機大臣曰阿桂奏稱固勒扎卡倫盤獲由哈薩克逃來之厄魯特男婦十名口又洪郭羅鄂博投入厄魯特三名俱解送阿克蘇交舒赫德辦理等語此等厄魯特人苦哈薩克役使陸續投來者必多與其徒煩解送不若即留伊犂等處令其牧放牲隻効力此次投來人等旣送往阿克蘇著傳諭舒赫德將阿克蘇所有之厄魯特通行體察其頑梗叵測者仍留原處若攜有妻子無可疑情節來年即發往伊犂交阿桂等酌於屯田牧馬差遣仍善為撫綏約束戊午總督管甘肅巡撫吳達善疏奏酌撤臺馬及籌給塘驛芻豆事宜吳達善奏言西路自軍興以來各臺站於額馬外加增四匹二匹不等今大功告成自應裁撤但一切章奏雖較前減少而駐劄大臣及屯田臺站文武各員仍屬往來絡繹臣詳加酌核每站設馬六匹已足敷用其餘盡行裁撤分别撥歸本營及變價歸欵附近巴里坤者解往牧放再上年歉收及口外塘驛馬匹請特給本色芻豆以資飼秣俟秋收後停止惟安西至哈密等站或遠距内地或路多戈壁應請仍支本色臣等再行籌辦奏入報聞庚申賜頭等侍衛碩多隆武等巴圖魯號及陞賞有功官兵上諭軍機大臣曰舒赫德阿里衮等奏叙奮勉擒獲賊匪官兵著加恩賜頭等侍衛碩多隆武特穆爾巴圖魯號前鋒參領富虎布哈巴圖魯號仍賞銀一百兩副將索柱著賞戴孔雀翎主事拕穆齊圖著陞授員外郎其餘効力官員各加一級陞用兵丁著照例給賞又諭曰海明奏擒獲賊犯奈納克和卓係索倫馬甲隆恰及鄂勒本圖等語著交部從優議叙命賞擒獲賊犯之英噶薩爾阿奇木伯克色梯巴勒氐二品頂帶吐魯番托克托和卓密喇卜各緞二端參贊大臣舒赫德疏奏籌辦移駐烏魯木齊闢展等處官兵舒赫德奏言臣欽奉諭㫖籌辦闢展等處官兵移補烏魯木齊兵額及哈喇沙爾辦事將書山和其衷酌留一人各事宜臣即咨商各該處今㨿覆到查哈喇沙爾屯田管轄多倫囘衆及臺站卡倫和其衷一人已足敷用至闢展喀喇和卓托克三等處尚有屯田駐防兵二千餘名近准阿桂咨商來田伊犂屯田增兵一千名請即於烏魯木齊現有兵丁内派出一千辦給馬駝籽種農具於來年二月中旬發往伊犂此一千兵缺仍將闢展等處兵丁酌量調往烏魯木齊補額以次進發既不致侵占吐魯番等囘人地畝而於新疆屯田較有禆益再闢展收貯兵丁口糧籽種及上年收穫糧石軍需銀兩緞疋器械等物本年收穫總數必須大員查核請以郎中德爾格暫駐闢展辦理事竣後再赴烏魯木齊至闢展當烏魯木齊阿克蘇之衝應酌留屯田兵六百名以武職一員領千把總數員歸烏魯木齊大臣管轄以文職一員管理糧餉器具等事歸哈密道員查核其喀喇和卓托克三兩處糧石就近交吐魯番公素賚璊看守奏入報聞辛酉命郎中德爾格駐劄闢展辦事上諭軍機大臣曰現在烏魯木齊有安泰辦事永瑞定長亦俱前往據舒赫德奏請以德爾格暫駐闢展將彼處一應事務查核明白交代闢展承辦官員方可赴烏魯木齊等語闢展辦事仍須專員兼轄可傳諭德爾格查核事竣仍駐劄闢展兼轄文武官兵一切事件與舒赫德定長商辦有應行陳奏者准其具摺奏聞併傳諭舒赫德定長等知之癸亥哈薩克阿布賚使人都勒特克勒等入覲恭遇上行圍木蘭召見行禮畢命隨圍與觀是日未刻賜扈從王公滿漢文武大臣扎薩克王公台吉都爾伯特親王策凌烏巴什囘部郡王霍集斯及哈薩克使人食甲子葉爾羌辦事都統新柱等疏奏本年徵收糧石分數新柱等奏言葉爾羌應徵糧石及入官地畝應分之糧前經將軍兆惠等奏於乾隆二十五年徵糧二千帕特瑪其入官地畝所出一半交官今據伊沙噶伯克等分晰大小麥稻黍豌豆各數並稱此等地畝俱間年播種方可豐收今因霍集占等擾累後只得儘力耕作幸䝉聖主福庇山水傾注又得好雨是以所種地畝收穫七倍僅交各色糧石一千二百十一帕特瑪不敢稍有隱匿等語謹將糧石分數列單恭呈御覽奏入報聞乙丑命傳諭各城駐劄大臣等查拏伊犂竊馬之嗎哈沁上諭軍機大臣曰阿桂奏稱察卜沁臺站馬匹被竊派副都統豐訥亨等帶兵追襲迷踪轉囘行文闢展烏魯木齊等處一體查拏其原遣官兵休息數日仍由朱爾都斯河源至阿勒坦呼斯坦等處搜捕等語此等嗎哈沁雖經豐訥亨等追襲迷踪料不能遠遁著傳諭舒赫德安泰通行闢展等處駐劄大臣等嚴飭各站官兵查拏務獲以清臺路辛未議伊犂增派駐防屯田各事宜參贊大臣阿桂等奏言臣等欽奉諭㫖籌辦伊犂耕牧城守次第謹列款具奏一請增派回人屯田查伊犁収穫可敷屯田回人一千戸之食本年現有屯田囘人三百名近經舒赫德增派五百名已照例整裝於來年春初起程仍有應派囘人二百名請俟伊犂麥熟後遣發一請增派官兵駐防屯田查伊犂收穫通來年增派囘人五百名計之可敷官兵二千五百人之食現有駐防滿洲索倫察哈爾兵八百餘名應增兵六百餘名屯田綠旗兵一百名應增九百名以上增兵一千五百名應陸續遣發一增派官兵請隨時酌量定數查屯田囘人一千計其收穫則壬午年即敷官兵三千人之食加以綠旗兵一千則所收又倍應酌量定額以多駐馬兵於邊防有益如駐兵五千則馬三步二駐兵四千則減步兵一千一請次第建置城邑查伊犂要地河北則固勒扎河南則海努克其地土肥饒之處則察罕烏蘇應於海努克築城以囘人三百名屯田用兵數百名駐防西通哈薩克布魯特及囘地諸路察罕烏蘇築城以綠旗兵一千名屯田併駐防伊犂河北一路固勒扎須築大城凡駐劄大臣公署倉庫咸在以為總滙其馬兵於草青時分路巡查霜降各囘汛地擬於壬午年夏季派綠旗兵一千名辦理令囘人協助一年内竣事一預備屯田兵丁馬駝現議增派綠旗屯田兵一千必需馬匹查烏魯木齊所易哈薩克馬六百匹尚不敷用應將陸續市易之馬令安泰等辦理千餘匹及查明哈密巴里坤有無馬匹應用其行裝駝隻查烏魯木齊尚有七百應揀選五百解送即於伊犂牧放從容往來轉運奏入得㫖軍機大臣議奏尋議伊犂屯田原屬次第辦理除現在囘人三百名外舒赫德又派囘人五百名於來春起程其續派之二百名仍令酌量若能一起前往甚善如不能則竟於秋收後發往庶囘人不致竭蹶而伊犂糧石亦可節省至本年所收糧石既足官兵一千人之食則來年增墾可以類推應如阿桂所奏此項官兵於春秋二季分起調往其官兵額數酌以四五千人為率但必隨時出派始不煩内地之力應俟來年秋收後再行酌定其駐防年限照從前成議更換又所奏建置城邑實為邊防永圖不獨地當衝要亦宜相其形勢物產查固勒扎地居曠野薪炭無資應於烏哈爾里克察罕烏蘇哈什空格斯伯勒齊爾等木植多處或近山產煤之地築城駐兵仍令阿桂等再行勘定其海努克察罕烏蘇二城俱應如所奏辦理但另派綠旗兵一千築城未免張大其事且多浮費應令屯田綠旗兵於農隙次第興築不必定以年限又所奏屯田馬駝查所易哈薩克馬匹現議陸續解送其駝隻一項烏魯木齊有駝七百隻即可選出五百俾運送一千人屯田器具至兵丁糧餉春初照初次遣兵例從阿克蘇辦給米麵羊隻麥熟後則但給以程途口糧并請嗣後添駐官兵總於烏魯木齊阿克蘇調撥奏入上從之冬十月癸酉諭參贊大臣舒赫德等奬賞急公囘人及撙節糧餉事宜上諭軍機大臣曰舒赫德奏稱伊犂屯田囘人起程各城囘衆凑足口糧籽種共二十六萬餘觔䕶送之小頭目共五百六十餘人騎䭾之馬共一千三百餘匹等語囘部諸城感恩効力誠悃可嘉著傳諭舒赫德酌量奬賞至伊犂又增如許糧餉將來收穫之時自必益加豐裕其共敷軍食幾月著阿桂查核具奏糧餉即屬有餘亦當撙節不可任意糜費俱傳諭知之議派伊犂屯田綠旗兵事宜參贊大臣舒赫德等奏言前經阿桂奏請於來年伊犂麥熟後酌派綠旗兵一千名屯田臣等公議若早辦兵丁數百名更可及時耕作今烏魯木齊所有馬駝俱約計六百餘隻請令安泰先派綠旗兵五百名於正月初起程其續行發往兵丁請照原議於烏魯木齊派出以闢展等處兵丁補額奏入得㫖軍機大臣議奏尋議查阿桂奏請於伊犂現有綠旗兵一百名外添派九百名臣等議於阿克蘇派出四百名烏魯木齊派出五百名今舒赫德所奏馬駝等事與原議相符應准其先行辦理至續行發往兵丁仍令於阿克蘇派出奏入上從之乙亥諭參贊大臣舒赫德酌派喀什噶爾綠旗兵赴伊犂屯田上諭軍機大臣曰據海明奏稱查閲喀什噶爾有索倫兵二百九十名察哈爾兵二百二十三名綠旗兵九百十名等語喀什噶爾現在有索倫察哈爾兵足資駐防則綠旗兵可以調撥今伊犂地廣而腴屯田兵丁頗覺不敷雖經派兵一千名陸續發往尚可再為增加著傳諭舒赫德來年辦遣屯田兵丁時即將喀什噶爾之綠旗兵丁撤囘由阿克蘇就便發往諭御前侍衛署副都統安泰等酌購商人駝隻上諭軍機大臣曰永寧奏稱喀爾喀貿易人等皆在巴里坤行走亦間往烏魯木齊未有來哈密者其往來商駝已酌於二三十隻内抽買一二隻共得一百二十隻送入牧羣等語前諭五吉等於哈密商駝每百隻抽買二三十隻以備糧運今喀爾喀人等既未往哈密著傳諭安泰同德於烏魯木齊巴里坤商駝内購買仍遵前定額數視其情願不可勉强抑勒參贊大臣舒赫德疏奏派管臺站及移送關防事宜舒赫德奏言准定長咨闢展東西臺站共三十八所俱駐劄大臣管轄今移駐烏魯木齊難以兼顧請令巴里坤烏魯木齊哈喇沙爾三處分派管轄其闢展關防似應奏繳等語查闢展東自蘇魯克圖至廋濟七臺請歸巴里坤大臣兼管自闢展至烏魯木齊鄂倫拜桑等九臺歸烏魯木齊大臣兼管闢展西自布罕至托和鼐二十二臺恐哈喇沙爾大臣不能兼顧酌自布罕至開瀆前岸十一臺歸并兼管其碩爾楚克至托和鼐十一臺歸庫車大臣兼管再查喀什噶爾前係葉爾羌大臣兼管今分派駐劄似應給以關防請將闢展關防不必奏繳即移送喀什噶爾鈐用奏入得㫖如所請行喀什噶爾辦事都統侍郎海明疏奏酌給阿奇木伯克公署海明奏言囘部阿奇木等伯克向係世襲即居其舊有房屋今定為遇缺補放不時更換宜有公署以資辦事查喀什噶爾英噶薩爾牌租阿巴特阿喇古俱有入官房屋請酌定公署四所以垂久遠奏入報聞丙子諭參贊大臣舒赫德申禁囘人誣告及通事擾累地方上諭軍機大臣曰舒赫德奏自喀什噶爾轉囘得永慶所送鄂對噶岱黙特阿什黙特等控告額敏和卓呈詞即將鄂對等申飭曉示伊等悔悟隨將原呈發囘等語所辦甚是囘人積習相沿彼此猜嫌讒毁惟在駐劄大臣持平守正嚴加約束來年舒赫德前往葉爾羌喀什噶爾著留心體察仍曉示囘衆云大皇帝用人不過因材器使即如木薩先因喀什噶爾需員辦事故加委任今伊犂駐兵屯田又將伊補授阿奇木並非常在喀什噶爾爾等何得造言誣謗至舒赫德所奏鄂對呈稱通事苦累囘人甚於烏沙克等語此等通事皆吐魯番哈密之人若盡行裁革轉至無所見聞且此番誣告呈詞實屬奸狡之徒所搆大臣等務宜約束昨諭官兵内有勒取囘人之物者尚以軍法從事嗣後通事等若敢於苦累囘人即從重辦理以示懲創辛巳賜哈薩克阿布賚勅書皇帝勅諭哈薩克阿布賚爾遣使人都勒特克勒入覲經烏里雅蘇台將軍大臣等派員䕶送俱安善前來朕已加恩宴賚賜爾緞疋綢綾玻璃磁器茶芽各若干交使人齎往爾其祗受所賜使人孔雀翎頂㡌衣服緞疋綢綾銀兩器什各有差亦諭爾知之去年爾部落巴魯克巴圖魯搶掠烏梁海據烏里雅蘇台將軍大臣奏請發兵朕未允行惟令察核所掠之人口什物命侍衛納旺齎勒諭爾今據奏稱爾感戴朕恩與伊前往搶掠烏梁海之哈薩克等游牧察核送還又專使入覲誠悃可嘉前事係巴魯克巴圖魯所為與爾不相干涉朕久已洞鑒此時應已察出送還烏梁海游牧矣爾游牧從前與厄魯特接壤被其擾害嘗遠徙以避今厄魯特全部皆朕版圖爾安居游牧已屬寛裕現在伊犂等處駐兵屯田國家法令森嚴决不侵軼爾游牧但爾所部若不守分安業妄行越境游牧則駐劄之將軍大臣等必不肯從轉與爾屬人無益爾惟加意約束所部如當年與準噶爾接壤時即有舊地向為準噶爾所取者亦不得越境游牧守分安生則福祿可久仍以朕德意通行曉諭爾哈薩克衆游牧知之特諭諭巴里坤辦事道員同德查詢烏魯木齊可否牧放駝隻上諭軍機大臣曰同德奏准烏魯木齊大臣等移送奏稿以來年遣往伊犂屯田兵丁需用駝隻甚多將前次駁囘駝隻二百餘仍行解送并新購商駝二百餘隻乗雪未甚大早行起程等語近據烏魯木齊大臣等奏彼處疫氣正作牲隻易於倒斃故將巴里坤送來駝隻仍行發囘即令該大臣等因屯田需用頗急亦應將疫氣曾否止息行文查詢乃遽請解送甚不曉事著俟詢問囘覆之後再為辦理起程壬午諭葉爾羌辦事都統新柱等曉示阿奇木伊沙噶等伯克上諭軍機大臣曰新柱等奏從前伊沙噶伯克阿卜都喇伊木呈告鄂對嗜飲辦事躁妄不宜阿奇木之任若鄂對不知應無庸置議倘知而互相猜妬於公事恐有貽悞當體察情形辦理等語囘人性多疑懼此舉顯有形跡若為之隱覆恐伊等更覺不安朕意竟將伊等傳集於衆前分别是非加以訓飭庶鄂對不啟猜疑而阿卜都喇伊木亦不妄行防備悔悟之後和衷共事自無掣肘之虞可酌量辦理命派總兵金梁管理伊犂屯田綠旗兵丁上諭軍機大臣曰阿桂奏稱來年伊犂增添綠旗兵屯田必需大員管轄等語烏魯木齊現有達啟金梁二員管理屯田兼辦哈薩克貿易等事然大臣尚多較之伊犂屯田伊始自有緩急著傳諭安泰等來年派出屯田兵丁時即令金梁前往伊犂并傳諭阿桂知之參贊大臣阿桂等疏奏致祭伊犂山川阿桂等奏言臣等屯田伊犂因六月間稍旱又穀熟時大風俱經祈禱山川今收穫豐登頗著靈應恭查山川之祀原有常經仰懇皇上頒發祝文香帛於伊犂迤北之格登山迤南之額林哈畢爾噶山及伊犂河毎歲春秋致祭永垂祀典其巡查所至名山大川並請臨時酌量致祭奏入得㫖如所請行該部照例辦理參贊大臣舒赫德奏寧夏鎭屬守備胡海自阿克蘇送羊八千三百餘隻至伊犂無一傷斃命交部議叙兵丁等俱賞給餉銀一月甲申諭參贊大臣舒赫德等移駐官兵事宜上諭軍機大臣曰舒赫德奏葉爾羌馬兵約七百名哈喇沙爾約五百名英噶薩爾約三百名俱有卡倫牧厰差遣又當賊匪邁喇木等滋事之後未便盡行調撥請先調三百名又各城官兵口糧雖未缺乏但所徵騰格錢文不敷支給現在行查會同商辦等語添駐伊犂馬兵先遣三百名即照所請行至所奏錢文不敷支給自應計各城錢糧量入為出閲所奏支給之項不敷者十分之三即可撤去三分兵額是兵一千名核減尚有七百果能簡擇精銳豈不愈於虚縻糧餉况囘城駐兵本意原欲就其糧餉為移駐伊犂之漸將來伊犂既駐大兵則居重馭輕有事自可無虞而囘人等亦各安生業全無擾累總之囘部所駐官兵惟準彼處所得之賦稅不可致煩内地物力著傳諭舒赫德阿桂等知之喀什噶爾辦事都統侍郎海明疏奏入官地畝收成及拏獲逃犯海明奏言前據將軍兆惠奏請將隨同波羅泥都逃走人等地畝入官給囘人耕種分租今據吐魯番公木薩等呈稱入官地畝共四百帕特瑪給囘人耕種因牲隻短少僅種二百帕特瑪收穫約計六分查喀什噶爾每年交糧四千帕特瑪足敷官兵之用現在六百帕特瑪穀石請照時價折收普爾錢以作鹽菜銀兩將來收穫豐裕另行定額具奏又臣在葉爾羌辦事時所有未獲逃犯多里雅特墨特係傳送逆書之人九月初六日據商伯克墨墨氐敏遣人緝獲解送審訊明白照例凌遲梟示其獲賊得功之囘人等均已酌量賞給布疋奏入報聞平定準噶爾方略續編卷六
