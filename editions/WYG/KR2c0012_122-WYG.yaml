body:
  text: 乾隆二十四年二月丙辰議購買俄羅斯馬匹事宜喀爾喀親王桑寨多爾濟奏言查内地商民於恰克圖購買俄羅斯皮張等物又於布里雅特以布疋茶葉换易馬匹牲隻似於軍需有益應請㫖交與管理貿易司員或以官銀令商民承辦或仍令商民置買每年可得馬一二千匹奏入得㫖軍機大臣議奏尋議收買俄羅斯馬匹牲隻事屬可行但必須遴選幹員前往查理藩院員外郎佛禄曽在恰克圖辦事頗悉該處情形户部郎中范清注習於貿易張家口恰克圖等處又有伊商夥臣等酌議派令前往遣人詢訪俄羅斯馬匹實價再動支官銀購買仍不露官辦形迹俟交易後派員送至張家口將騸馬彌補牧羣欠數騍馬兒馬交總管等歸入牧羣孳生於軍需備用自有禆益奏入上從之戊午諭四川總督開泰等接濟甘省錢文上諭軍機大臣曰甘省連年承辦軍需錢價未免昻貴西安鼓鑄爐座無多從前已屢次協撥現存無幾四川為産銅之區添爐鼓鑄錢文必多若由水路運至略陽轉送甘省即増添運費較之甘省現在錢價尚當减省著𫝊諭開泰查明該省存局餘錢儘其所得撥出數萬串委員陸續運至略陽交陜省委員轉運甘肅一帶視錢文之多寡酌定成數搭放兵餉以每銀一兩折錢八百文為率如有贏餘即設局减價兑换并計其兌换銀數報部於撥解甘省協餉時照數扣除改撥川省抵餉以省往返運送之煩并傳諭明徳知之壬戌賜哈薩克阿布勒巴木比特等勅書皇帝勅諭哈薩克汗阿布勒巴木比特阿布賚阿布勒比斯等昨據將軍等具奏爾等遣俄羅斯蘇爾統等代請朕安由烏里雅蘇台伴送至京朕嘉爾等誠悃疊申宴賚念爾阿布勒巴木比特等逺在外藩若照内地扎薩克授以爵秩恐爾等有拘職守前阿布賚等遣使入覲時已𫝊諭及此爾阿布勒巴木比特亦各依舊俗安居游牧庶無擾累爾等如遣使輸忱朕亦不靳恩賞其賜爾阿布勒巴木比特等縀疋器什茶葉若干使臣歸日爾等其各祇受又賜來使等衣物銀兩若干及使臣隨僕等縀疋銀兩俱諭爾等知之又昨准俄羅斯部落來文有爾等哈薩克舊係伊屬之語朕命所司傳諭云前大兵進𠞰厄魯特抵哈薩克邊界伊等慕化投誠我大國之體自當撫納非若汝外邦動以威力相加與之約誓責其貢賦亦未嘗禁其服屬他國也嗣後爾等即與俄羅斯往來亦所不校其勉輸誠悃永享無窮之福特諭諭定邊左副將軍成袞扎布等辦理哈薩克來使歸途事宜上諭軍機大臣曰哈薩克請安使臣歸途仍令納旺照管據伊等奏稱沿途貿易及買䝉古人口請㫖遵行朕諭以貿易之事係爾等私情不便𫝊諭至蒙古等皆朕臣僕與爾等一體而喀爾喀尤服屬年久自不肯售賣人口或新附之都爾伯特扎哈沁等部落有此舉動只得聽其自便亦不能預為期約再伊等稟告軍機大臣欲將留於軍營休息之人一體賞賜恐此次伴送伊等又復言及亦當明白曉示以此等人並未入覲例不應賞念其久住客邸推廣仁恩毎人賞縀一端再此等哈薩克使人等所擕賞物頗多駝隻不足必請添補當告以向無官辦之例或自行僱覔我等仰體皇仁代為𫝊集尚屬可行即以伊等賞項辦理若再三懇求亦止此次酌量辦給後不為例其駝隻仍交納旺帶回斷不可曲順其情致伊等習以為常無所限制癸亥宣諭哈寧阿罪狀上諭大學士曰哈寧阿以軍行失律解京鞫訊據其詞與雅爾哈善相符且將雅爾哈善種種謬戾乖張失機僨事情節指陳如繪是雅爾哈善雖已伏法實不足以蔽其辜夫雅爾哈善既為將軍而哈寧阿即其㕘贊以將軍罪狀如此為㕘贊者自當以軍國之計為重據實㕘奏乃隱忍貽悞又從而附和之滿洲世僕豈宜出此且哈寧阿又非他人可比自伊父哈達哈獲罪經朕加恩矜宥并予以自効之途伊茍有人心念及伊父亦將倍加感奮矧軍旅重寄三軍之命繋焉顧因循玩視可乎核哈寧阿之罪正與雅爾哈善等應即正典刑以肅軍紀第以㕘贊究屬相助為理之人前哈寧阿曽隨將軍兆惠由濟爾哈朗力戰而出雖現在所犯情罪斷難稍貸仍念伊前勞暫緩正法著監候秋後處决以示寛典朕用人行政事無鉅細一秉虚公自問信賞必罰毫無偏倚若事闗軍務尤期法在必行然使其人尚有微績可錄亦不忍竟没臨時必量予加恩此中權衡輕重實可下對天下臣民今將哈寧阿留候秋讞著通諭中外俾衆共知之甲子定邊右副將軍富德等疏奏大敗賊衆於呼爾璊富德等奏言臣舒赫徳等於十二月初四日從阿克蘇領兵三千五百餘名馬一千七百餘匹途次牽趕牧放前至巴爾楚克臣富徳領兵三百餘名於十二月二十五日相㑹一面遣人催送馬匹二十九日臣等捉生詢問據供霍集占聞知大兵來援現在并力攻取將軍兆惠營寨等語臣等即將平常兵丁及一切行李俱酌量存留令進𠞰兵丁乘騎駝隻前進正月初六日至呼爾璊逆賊霍集占領騎賊五千餘迎戰臣富德臣舒赫徳將中軍兩翼馬兵六百餘名令努三愛隆阿帶領又㕘贊大臣福祿領隊大臣永慶乾清門侍衞瑪瑺瑚什公特通額額訥愼訥齊訥正黄旗額爾登額塔爾海正白旗額爾登額科普薩烏爾圖納遜棟保䝉固勒伊達木扎卜巴圖魯侍衞老格占頗圖伍岱瑪呼占丕納福永永德豐訥亨豐安等各按部伍排列鎗礮其索倫察哈爾善射步兵分列兩翼從已至申與賊相持合戰十餘次賊始敗潰提督豆斌領中軍鎗礮攻奪賊人所據髙岡臣富徳努三領左翼兵奪取逆賊帳房及旗纛鎗礮等物臣舒赫德愛隆阿領右翼兵將據溝為營之賊衆撃敗數次計追奔十五里𠞰賊百餘人受傷者甚衆我兵多係步行所有馬匹多因疲乏及中鎗礮倒斃僅存百餘不能馳驟是晚收兵覔水安營次晨領兵前進途遇戈壁賊衆又踞高阜迎戰臣等以鎗礮攻撃賊即退避步兵不能追及相持一晝夜初八日賊知我兵乏馬四面進攻官兵奮勇迎敵撃退數次多有𠞰殺賊恃其衆仍合圍拒守臣等與各官兵因駐兵砂磧兩晝夜無氷吞咽零星氷塊人馬俱乏惟望解送馬匹計日應到臣等是夜布列方陣覔有水之地安營一面遣人往迎臣阿里衮通信行未十里聞賊在後施放鎗礮我殿後之侍衞額爾登額豐訥亨豐安領健鋭營兵接戰賊遂敗退及我兵起行賊復來挑戰天曉至沁達勒河賊又奪我渡口即整兵嚴守賊不能奪相持一晝夜臣等計議逆賊知我馬力不足敢於侵擾若不奮勇𠞰殺無以示威軍營尚有可用之馬五十餘匹給與精壯兵丁乘騎再派健歩兵丁二百名往襲賊營初九日夜月落後行至卡倫適臣阿里衮已遇臣等通信之人即挑選馬駝趲行與襲賊兵會合臣阿里衮鄂博什分兩翼奮呼衝突盡力𠞰殺初十日黎明領兵囘營聞撃敗賊人尚有吹角招集逃衆者臣努三鄂博什等領兵從右攻撃臣阿里衮愛隆阿自左夾攻臣富徳居中追𠞰殺賊數百人收獲鳥鎗長槍及疲乏馬匹無算詢問俘獲人口據稱賊人被𠞰者千餘受傷者甚衆交鋒之初波羅泥都鳥鎗傷脇舁入城中旋囘喀什噶爾又所殺巴圖爾十五人大伯克數十人等語計自正月初六至初十日五日四夜領隊大臣侍衞官兵等俱奮勉𠞰賊至健鋭營兵丁訓練有年火器精利爭先殺賊陣亡者二十餘名得傷者七十餘名滿洲吉林索倫察哈爾綠旗兵丁陣亡七十餘名其大臣官兵内得傷者如提督豆斌脅前總管三都卜唇上侍衞額訥慎腰間塔爾海肩背占丕納手指俱中鳥鎗傷侍衞瑪瑺腮頰齒牙項臂受傷數處老格肩骨及左腿中槍未損此次奮勉官兵内酌量奬賞孔雀翎藍翎與陣亡得傷官兵分别造册送部臣等復詢知將軍兆惠等堅守待援正欲通信適兆惠營中聞臣等鎗礮之聲已知援兵俱集遣索倫兵二名伯克霍集斯所屬囘人二名賫文知會臣等云上年十月十三日領兵至通古斯魯克遇馬步賊衆二萬餘人我官兵千餘人内渡河者僅五百餘名雖有斬獲而馬力疲乏被賊遮圍暫行據守賊亦掘濠立寨相持閲今三月晝夜攻戰賊人初引水灌營我兵即掘濠宣洩又以葦埽蔽體來犯即用火焚燒又掘溝伏身前進即乘高撃退本年正月初八日遥聞北面有鎗礮之聲想援兵已至即乘夜選兵千餘名製備雲梯兩路衝突燒燬賊營陣斬千餘人生擒五百餘人獲旗纛軍器無算即欲㑹同𠞰賊奈步賊雖敗而騎賊尚於逺處偵伺未敢輕動因遣囘人畢齊起等間道宵行移咨將軍大臣等現在何處及𠞰賊情形并作何籌畫來援㑹𠞰現在軍營人等俱安好無恙等語臣等即當定期夾攻備文付來人賷囘今臣阿里衮送到馬一千匹駝四百隻臣等乘賊敗潰整兵往援仰賴聖主天威務期擒獲渠魁以告成功奏入上諭大學士曰據富徳等奏報正月初六日統領官兵行至呼爾璊逆酋霍集占等率賊騎五千抗拒官軍奮勇轉戰至初九日我兵因馬匹行逺力乏不能悉行斬獲是夜月落後適㕘贊阿里衮送馬已到正遇分遣𠞰賊官兵即與鄂博什分為兩翼讙呼馳突陣戮賊衆甚夥至初十日天曉收兵囘營計五日四夜殺賊千餘及中傷者無算初六日交戰時逆酋波羅泥都脅間中鳥鎗傷甚劇賊舁之入城旋囘喀什噶爾計陣戮賊巴圖爾十五名大伯克數十名至將軍兆惠在營中固守聞鎗礮聲知援兵已至即遣索倫兵囘人等賫文通信等語覽奏深為感慰此皆上蒼黙􅂷眷佑諸大臣以及官兵等忠誠敵愾所致富徳數年來宣力勤勞此次奮勇督勦厥功懋著著加恩封為三等伯爵舒赫徳雖屢經獲罪今知奮勉自贖亦屬可嘉阿里衮前雖未著成勞今送馬濟軍如期集事且㑹同𠞰賊撃殺甚多朕心深為奬許計此次𠞰賊有功自領隊大臣以上人人踴躍自効提督豆斌率中軍鎗礮鼓勇前進奪取賊營脅受鎗傷著加恩一體議叙并各賞給世職所有陣亡及効力之侍衞官員兵丁等俟兆惠富徳查明造册報部到日一并照例優加敘䘏富徳等摺奏及兆惠咨文併發又諭曰覽富徳等㨗奏甚屬奮勉伊從前奏請趲行前進及舒赫徳催督各隊兵馬陸續進發俱甚合機宜若不如此辦理焉能𠞰殺賊衆通信軍營朕心深為嘉悦但逆賊霍集占等喪胆之餘惟有逃遁今各城囘衆皆降自必慮其縛獻惟大兵追𠞰後北路駐兵甚少伊曽住伊犂熟其道路或就彼往投俄羅斯亦未可定兆惠富徳等宜籌堵截之策且伊二人既㑹兵一處足以辦事而阿克蘇駐劄需人著舒赫徳即囘阿克蘇辦事明瑞亦遵前㫖馳驛來京至舒赫徳駐劄阿克蘇時有烏什囘人托克托黙特來投據告稱將軍等於營中掘得窖粟及得馬千匹駝千隻波羅泥都已囘喀什噶爾等語今覽兆惠咨文伊等並未收獲馬駝而富徳又奏稱波羅泥都臨陣負傷舁入城中是托克托黙特所言盡屬子虚或係霍集占等遣來詐降以懈我軍心自應嚴加窮詰著永貴玉素富等查明托克托黙特現在何處即嚴拿送往軍營交與兆惠審理俱著𫝊諭知之又諭曰此次應援軍營雖𠞰賊甚多而逆賊等巢穴尚存自必勉强支吾萬一負嵎固守而我馬力尚未甚足仍須駐候前曾諭及我兵若囘阿克蘇則多勞往返即就近駐劄和闐方妥惟是駐兵之後一切糧運自必由烏什一路行走倘逆賊等窺我北路兵少由間道抄截亦未可定故阿克蘇地方最要己諭舒赫徳速囘辦事矣至官兵亦不必俱聚和闐或分駐阿克蘇則糧運易集而聲援亦接若業已擒獲渠魁即無庸置議總之伊等身在軍前惟宜相機辦理固不必拘泥朕㫖亦不可坐失事會也者將辦理情形作速奏聞乙丑諭定邊將軍兆惠等酌調布魯特兵丁事宜上諭軍機大臣曰據清馥奏稱遵㫖詢問布魯特使臣車里克齊等以派兵協𠞰逆囘一事據稱行至游牧後情願量力出兵協助將軍大臣等語前經舒赫徳奏稱侍衞布占泰等見車里克齊之弟言及派兵伊等以游牧事務係明伊勒哈管理復因天寒雪盛布占泰暫行囘營今雖據伊等懇請自効但所言亦恐無定惟視我之情形我兵力精鋭則踴躍隨行或稍覺平常即從中觀望此亦外藩情勢之必然者伊等既有此言若果踐前約兆惠等亦酌量奬賞調用如可以不需自當相機發遣著因便𫝊諭知之恩授總管噶岱黙特為頭等侍衞上諭軍機大臣曰富徳等奏稱囘人噶岱黙特經將軍兆惠派同愛隆阿駐防要隘後同囘阿克蘇又隨軍前進熟習沿途情形頗得其力等語噶岱黙特著加恩授為頭等侍衞有囘城伯克缺出即令其管理命巴圖魯侍衞瑪瑺等來京上諭軍機大臣曰昨諭明瑞遵前㫖馳驛來京詢問軍前情形今思侍衞瑪瑺老格等此次甚屬効力且得傷可念自應來京休息而新派之侍衞等似老格得傷者尚有幾人著兆惠等查明令其分起來京丁卯申諭侍衞官長保等趲送馬匹事宜上諭軍機大臣曰清馥奏稱詢知侍衞官長保等帶領達什達瓦兵丁由烏里雅蘇台哈布塔克拜塔克直抵烏魯木齊因將伊等應得錢糧送至烏魯木齊辦給又達爾黨阿等自巴里坤至烏魯木齊需用熟識水草之嚮導等已於索倫察哈爾厄魯特等兵丁内派出二百餘名等語所辦尚是從前諭官長保等由巴里坤會同達爾黨阿等行走原以厄魯特等頗悉沿途情事今既就近前往自無庸議若伊等接得前㫖仍回巴里坤更為妥協但厄魯特等雖稱熟識水草而我兵豈遂無歴練之人可𫝊諭達爾黨阿等自巴里坤前往務嚴飭新派官兵沿途加意照看并𠞰殺嗎哈沁等或葉爾羌喀什噶爾等處有厄魯特及囘人逃來即行𠞰殺以清臺路庶馬匹不致被竊而渠魁亦難漏網矣命選派俄羅斯送出之索倫察哈爾等來京上諭軍機大臣曰據喀爾喀親王齊巴克雅喇木丕勒等奏報俄羅斯將舍楞等帶往之察哈爾佐領巴彦察克等十八人查出送至恰克圖等語可𫝊諭成衮扎布等巴彦察克等十八人被陷得脱殊可軫念伊等至烏里雅蘇台即於索倫察哈爾厄魯特内擇其明白曉事者各一人賞給行裝馳驛來京以備詢問餘十五人酌量賞給令其各囘游牧其來京之人不必派員照管戊辰諭阿克蘇辦事侍郎永貴派兵防送糧運上諭軍機大臣曰永貴奏稱現在派駝二百五十隻將囘人所交米麪及弓箭火藥鉛丸酌分䭾載又趕送羊一千五百隻前往軍營等語接濟軍需甚闗𦂳要此時將軍等正與逆賊相持恐有賊黨乘間搶刦可𫝊諭永貴於起運時多派官兵沿途防䕶免致疎虞諭辦理屯田副都統定長酌派聽調之綠旗兵丁上諭軍機大臣曰定長奏稱新派綠旗兵丁五千名駐吐魯番聽候調遣已會同總兵楊寧將老弱者撤囘其名糧於屯田兵丁内充補仍飭該管官嚴加約束等語此次派出綠旗兵前諭聽候兆惠行文或調令進𠞰或留派屯田今時值春耕與其坐糜糧餉莫若先事耕作可𫝊諭定長即將兵丁五千名分發吐魯番附近屯田處所令其開墾庶伊等不致閒住滋事於屯務亦有禆益己巳定邊將軍兆惠等疏奏撃敗賊衆與援兵會合兆惠等奏言臣等自上年十月十三日被圍賊人屢次侵犯俱為我兵撃退賊因掘塹築臺彼此相持此三月内賊引水灌營我兵即决濠宣洩或以葦埽蔽體及掘溝潛伏俱為我兵焚燒截殺狡計百出卒不得逞且於帳房附近拾得賊人鎗礮鉛丸數萬即以撃賊仰賴聖主洪福惟侍衞富紹等數人陣亡其餘官兵中傷者尚少賊見不能獲利因遣人於營外告稱從前我等擒獻達瓦齊遣人入覲至今未囘今年天朝因何發兵征討猝圍庫車現在大和卓木自喀什噶爾前來並不知小和卓木抗拒大兵之事祈將軍遣使同我等入覲等語臣答云天朝大兵特為聲討霍集占負恩之罪及追拏自伊犂逃竄之逆囘厄魯特等與波羅泥都無涉大皇帝早已洞鑒奉有諭㫖因不知波羅泥都所在是以未經頒給今既到此即應欽遵諭㫖將伊弟霍集占及阿卜都克勒木等并自伊犂同來助惡囘人沙喇斯瑪呼斯厄魯特等一併擒獻隨恭捧諭㫖設於案上令囘人等捧去逆賊計窮並無囘信今年正月初八日遙聞北面鎗礮聲知援兵已集臣等遂於是夜架豎雲梯挑兵千餘名分為兩翼奮力衝出奪取賊人營壘燒燬髙臺𠞰賊千餘人生擒五十餘人收獲鳥鎗長槍旗纛等軍器無算即欲往會援兵而步賊雖敗騎賊仍於逺處窺伺因遣索倫奈圖善伯圖等夤夜繞道通信臣富徳等領兵進𠞰於十四日早離臣等所駐二十里臣等即帶兵按隊相迎現在合兵一處除此次在事奮勉効力之大臣侍衞官兵遵㫖詳查具奏外其如何整兵再進擒獲賊首𠞰殺逆黨之處公同酌議續奏奏入報聞定邊右副將軍富徳等疏奏撃敗賊衆與將軍等㑹合富徳等奏言臣等於正月初六日在呼爾璊遇賊轉戰五日初十日得兆惠咨文即令來人轉覆十二日伊等復囘據稱賊人卡倫火光甚大不能前進臣等即於十三日整兵二鼓起程五鼓至葉爾羌河岸偵探兆惠軍營相距二十里望見賊營烟火即行駐兵與領隊大臣侍衞等分定中軍兩翼排列整齊十四日黎明前進約行六七里左翼見有賊兵直前攻擊賊並不接戰會入賊人右隊而去時我兵右翼臣阿里衮愛隆阿即領侍衞伍岱營總金集噶爾等以鎗礮接戰敗賊數次餘賊仍依蘆葦放鎗臣富徳舒赫徳同侍衞瑚什老格領左翼兵急進賊遂渡河而逃計𠞰賊二三百人我兵陣亡者二人得傷者十餘人又防範城内賊人突出夾攻臣富徳舒赫徳福祿領中軍自右翼以次進攻但未知兆惠軍營附近有無賊衆因一面令左隊之䕶軍統領努三副都統鄂博什各領馬兵堵截賊人尋覔將軍營盤告知援兵已到將軍之兵應於首隊排列以示聲威且可𠞰殺逸賊旋據努三等告稱我等直抵將軍營内自將軍大臣以至官兵俱各無恙因無馬匹是以明瑞由屯温布端濟布等領步兵向我首隊排列前來等語臣等一面追賊渡河一面辦理官兵乘騎馬駝令努三等迎接將軍兆惠等官兵現在臣等兩路官兵會合一處是晚起行行三十里十五日行二十餘里雖逺見賊人覘望形跡總因屢敗不敢來犯現派帶領馬兵之努三鄂博什由屯温布等為殿以囘阿克蘇其奮勉効力及陣亡得傷官兵謹列單具奏奏入報聞恩諭陞賞將軍大臣侍衞官兵等上諭軍機大臣曰據軍營奏報將軍兆惠富徳等聲援既接分領官兵奮勇𠞰賊合軍一處整頓兵馬再行進𠞰覽奏殊為欣慰此實上天眷佑之恩朕不勝欽感至將軍大臣侍衞官兵等奮勉効力允宜優叙以示奬勸適據兆惠奏辭封爵及所賜章服從前因伊被圍固守是以特加寵錫今果全師制勝何必固辭前固富徳迅速應援屢敗賊衆已封為三等伯今又領兵力戰與將軍㑹合厥功懋著著加恩晉封一等成勇伯兆惠軍營之侍郎公明瑞副都統由屯温布總管端濟布富徳軍營之䕶軍統領努三副都統鄂博什黙爾根巴圖魯瑪瑺散秩大臣永慶俱交部議叙給與世職二等侍衞瑚什卓里克圖巴圖魯額訥愼訥齊訥伯克巴圖魯老格福永俱著授為頭等侍衞三等侍衞傅靈安克丑巴圖魯諾爾本庫爾察巴圖魯扎延保額爾克巴圖魯海蘭察鄂畢達達克塔納瑪格莽喀察公特通額豐安豐訥亨額爾登額永徳塔爾海科晋薩塔蘇爾海巴圖魯占頗圖哈坦巴圖魯瑪呼克爾齊克衣巴圖魯占丕納黙爾根巴圖魯伍岱俱著授為二等侍衛正黄旗三等侍衞額爾登額著補授二等侍衞賜號噶畢雅圖巴圖魯仍賞銀一百兩藍翎侍衞烏爾登永泰滿柱烏爾圖納遜蒙固勒棟保伊達木扎卜奬賞孔雀翎之藍翎侍衞塔尼布侍衞上行走之䕶軍校福保奬賞孔雀翎之索倫驍騎校巴勒琿俱著授為三等侍衞奬賞孔雀翎之察哈爾䕶軍署㕘領茂海賽音伯勒克著授為防禦在㕘領上行走索倫協領安提木保著賞給副都統職銜副總管阿爾哈爾沁著補授總管吉林佐領布爾哈著補授協領署前鋒章京觀音保前鋒侍衞常保柱俱著准其實授索倫驍騎校雅卜唐阿著授為防禦喀爾喀公朗衮扎卜著授為鎮國公賞戴雙眼翎阿拉善輔國公衮楚克著授為鎮國公又諭曰兆惠奏稱侍讀學士温福從軍勦賊面中鳥鎗傷手中槍傷且諸事奮勉効力等語温福著加恩補授内閣學士又奏稱乾清門二等侍衞富紹𠞰賊陣亡富紹年來甚屬効力今又臨陣捐軀甚屬可憫著交部照例議䘏給與世職此次陣亡得傷官兵等俱著查明送部照例叙䘏又諭曰富徳等奏稱提督豆斌總管三都卜俱以負傷身故等語甚屬可憫豆斌著加恩照旗員一品大臣例交部議䘏給與世職三都卜著照陣亡例議䘏豆斌所遺提督員缺著閆相師補授所遺總兵員缺著五福補授遊撃職銜榮保隨富徳立功著加恩授為總兵㕘贊大臣巴祿等疏奏領兵策應軍營巴祿等奏言臣等於正月二十二日駐兵巴爾楚克得富徳撃敗賊衆之信離兆惠軍營僅四五十里計此時應已會合一處恐賊人窮蹙以死抗拒必須多兵協助臣等所領兵一千二百餘名俱係精鋭現有送到馬匹一千有竒分給兵丁惟哨探攻𠞰始行乘騎臣巴祿阿桂巴圖濟爾噶爾瑚爾起即於本日起程又准永貴咨稱和闐等城被賊侵犯急需馬兵二三百名協助等語臣等伏思策應軍營更闗𦂳要即令派往和闐又須轉囘阿克蘇恐徒勞往返是以未能應付奏入報聞阿克蘇辦事侍郎永貴疏奏策應和闐情形永貴奏言正月十九日准侍衞齊凌扎卜散秩大臣伯克鄂對等遣回人呢雅斯呈稱逆囘賊黨鄂斯璊阿卜都克勒木阿卜達哈里克遣塞頗爾等統衆六百於十一月二十六日來犯額里齊哈喇哈什肆行搶刦兩城僅有馬兵五十餘名綠旗兵五百名分守侍衞納爾布於十一月二十一日抵哈喇哈什即派滿洲通事哲勒順等先往克勒底雅守禦不意二十六日賊人鄂斯璊統衆前往克勒底雅有本城回人黙黙里提卜鄂斯璊哈子二人誘守城人飲醉夤夜開門放入哲勒順被害現在兩城糧草甚乏人心搖動賊人不時發書廹脅恐生内變請速發精壯馬兵數百名於正月内趲來救援等語臣等前因齊凌扎卜等請發兵馬隨將阿里衮所留之馬及回人處買來馬匹派兵一百名前往今復據請兵救援自應速為辦理適有預備調用馬二百餘匹到營隨派吉林察哈爾等病痊兵丁六十名挑選跟役四十名又伯克鄂對之妻及衆伯克等派囘人五十名自備行糧馬匹一同起程一面咨商巴祿將伊等所領兵丁内派出二三百名尚未准咨覆倘有可通融亦陸續發往奏入報聞諭定邊將軍兆惠等堵截賊衆及應援和闐事宜上諭軍機大臣曰將軍兆惠等現在合兵自應整頓前進今馬匹口糧俱陸續渾送此時宜催督各城堡及時耕種以資接濟至賊人不耕則無食如耕則未熟之前我兵即前往蹂躪自必困憊就擒惟是霍集占等知我必整兵再進恐被擒獲預籌逃匿之地亦勢所必然計葉爾羌喀什噶爾附近皆哈薩克布魯特人等游牧素有釁隙必畏其縛獻不敢逃往伊等曽久住伊犂等處或向北投入俄羅斯兆惠富徳等應留心防範堵截預為辦理昨巴祿奏稱接永貴咨調馬兵二三百名救援和闐伊以策應將軍等為要俟到軍營後再議等語是時伊惟聞富徳與賊交戰尚未知兩隊會合想此時當相機分兵耳但永貴奏稱齊凌扎卜等呈報賊攻甚急自應作速往援且和闐地廣糧多又當賊人向東南逃走之路我兵會合則人數衆多且葉爾羌距彼亦近即著巴祿領兵數百前往策應庶地方可保亦可減阿克蘇之糧餉兆惠等酌議具奏再富徳曾有從巴勒琿嶺前取喀什噶爾之奏昨派出西安滿兵二千達什達瓦兵五百由額林哈畢爾噶趕送馬匹富徳如欲於巴勒琿嶺進兵即著帶滿洲索倫兵迎囘與西安滿兵等會合亦屬妥便伊等相機辦理不必拘泥朕㫖俱著傳諭知之又諭曰將軍兆惠富徳等兩隊㑹合整兵再進逆賊霍集占等將來若計窮逃匿想未必投往哈薩克布魯特或從伊犂向北往投俄羅斯已諭兆惠等籌備堵截但囘部通伊犂路多著傳諭將軍成衮扎布等將布延圖烏里雅蘇台兵丁酌派一千名給與口糧以策布登扎布為副將軍福祿車木楚克扎布為㕘贊於靑草萌生後越阿爾台西行巡查額爾齊斯塔爾巴噶台巴勒喀什淖爾等處捜捕嗎哈沁凡通俄羅斯路徑俱派兵瞭望堵截逆賊自無所逃策布登扎布其加意奮勉若能擒獲渠魁於超勇之名更増光寵若派兵不足或派扎哈沁扎木禪兵丁一二百名照例賞給整裝前往亦可平定準噶爾方略正編卷六十八
