body:
  text: 乾隆二十四年十一月庚戌諭參贊大臣舒赫徳等查勘回地出産硝磺上諭軍機大臣曰據徳文奏稱内地所送鉛子火繩尚足敷用惟火藥無多查庫車附近出産硝磺可以採取配合給與臺站卡倫官兵其舊存火藥加意照看收貯備用等語庫車附近既産硝磺較之内地運送更屬近便看來阿克蘇等處或有出産亦未可定可傳諭舒赫徳楊應琚留心查勘採取以備軍需壬子定邊將軍兆惠等疏奏留駐兵丁事宜兆惠等奏言副將軍臣富徳於十月初二日自抜達克山凱旋俟抵葉爾羌後臣等酌將葉爾羌喀什噶爾兩城應留駐滿洲索倫䝉古兵若若干餘即行撤回議奏辦理其綠旗兵八千餘名回地糧餉價昻且屯田亦須調遣除伊犂駐兵另議外酌於葉爾羌喀什噶爾各駐兵一千名英噶薩爾駐兵五百名俱于本年派出新兵内揀選以提督董孟總兵容保楊寧分領餘兵令提督閆相師總兵五福等帶徃庫車其舊調之兵即撤回原處又西安兵四百名酌留字識外餘亦撤回奏入上諭軍機大臣曰兆惠所奏撤兵一事朕意上年調徃之滿洲索倫兵俱在外未久且暫留該處惟得傷病廢人等自應撤回將來伊犂駐防需兵尚多應另派京營滿兵更替行走俾伊等練習事務甚有禆益著傳諭知之乙夘諭陜甘總督楊應琚等派兵屯田事宜上諭軍機大臣曰楊應琚奏稱即日班師凱旋其應行派徃烏魯木齊之官兵五千名正可順道分撥必得提鎮大員統轄等語現在閆相師五福等揀選所餘兵丁回至庫車即于此内酌撥著閆相師領赴烏魯木齊辦理屯田事宜可𫝊諭楊應琚舒赫徳㑹同妥辦併諭兆惠知之丙辰命御前侍衞署副都統安泰總理屯田貿易事務上諭軍機大臣曰昨因大功告成無庸再送馬匹命安泰回京今思來年烏魯木齊等處增兵屯田又有哈薩克貿易恐永徳永瑞二人辦事不能周到安泰係内廷人員尚可任使著不必來京即前徃烏魯木齊總理屯田貿易事務戊午定邊將軍兆惠等疏奏霍罕額爾徳尼等遣使入覲兆惠等奏言二等侍衞達克塔納等於十月初十日回營告稱先由克什噶爾起程至額徳格訥布魯特阿濟比所居之諾哈特將伊等收服後隨至安集延其為首四伯克供給羊隻住居六日又收服瑪爾噶朗人衆又住居十二日霍罕額爾徳尼伯克㑹集那木干等城伯克及奇卜察克等布魯特並霍罕摩羅呵琿等相見傳示將軍檄文額爾徳尼告稱聞大兵平定準噶爾收服布魯特我等甚為瞻望今情願將所屬安集延瑪爾噶朗那木干霍罕等四城為大皇帝臣僕敬遣頭目擇吉起程等語旋供給酒食衣服馬匹遣屬人托克托瑪哈瑪特拜嗎哈瑪特同來察看各城生計富饒人情恭順起程後沿途招服齊里克頭目優瑪特之兄呼達呼里及將軍交查額爾克和卓之弟帕爾薩和卓現在嗎爾噶朗城内亦皆同來等語臣等即令來使入見伊等跪獻恭進皇上表章暨臣等書呈譯其書云額爾徳尼伯克敬請大皇帝欽差統兵將軍大人等安仰賴大皇帝洪福大衆安善聞得哈薩克布魯特俱奉檄文我等正在盼望今侍衞等前來不勝感悦特差親信人等面禀如䝉許允進京並求指示等語臣等詢問來使有何靣禀據稱我布魯特諸部每相侵奪我額爾徳尼伯克欲為剖斷是非懇求大皇帝賞給璽書約束布魯特等語臣等告以各布魯特等多有先來歸附者今爾等惟應將四城屬人自行加意管轄不生事端大皇帝自必加恩前經額爾格訥之阿濟比告知額爾徳尼歸附之信己䝉勅諭並賞給縀匹荷包因路逺尚未賫到今將爾等䕶送入京瞻仰天顔敬聆聖訓遵行又詢據呼達呼里等告稱我等共四千餘戸頭目優瑪特因未出痘令我等入京等語請俟額爾徳尼恭進馬匹及阿濟比來使到日即交達克塔納等帶領入覲計來年正月上旬可至京師謹將額爾徳尼等奏章繙繹恭呈御覧其原奏仍交來使齎捧奏入得㫖下部知之命陞賞收服霍罕等城之侍衞達克塔納等上諭軍機大臣曰兆惠等遣徃收服霍罕等部落之侍衞達克塔納及隨行之領催三濟等甚屬奮勉二等侍衞達克塔納著加恩授為頭等侍衞巴爾虎領催署驍騎校三濟著授為驍騎校馬甲納卜齊著授為領催厄魯特薩爾泰著奬賞藍翎命加賞副都統愛隆阿世職官兵從優議敘上諭軍機大臣曰富徳等奏稱愛隆阿領兵百餘名巡查臺站捉生詢問知瑪呼斯賓巴等男婦一百三十餘人謀搶察罕烏蘇等臺站逃徃安集延愛隆阿即領兵追襲𠞰賊五十餘人俘獲男婦七十餘人收取馬駝軍器等語愛隆阿一聞賊人信息即行追𠞰甚屬可嘉從前曽賞伊世職著再行加賞仍從優議敘其得功官兵著造冊送部亦從優議敘諭定邊將軍兆惠等查奏陣亡之索倫尼薩勒圖等上諭軍機大臣曰今日引見索倫佐領據巴巴里奏稱伊父尼薩勒圖於乾隆二十一年賫送諭㫖與達爾黨阿由雅爾拉河前徃未回業經陣亡啟圖奏稱伊兄克勒車爾二十一年在總管畢里衮隊内於阿魯海地方陣亡旋因策楞獲罪未知曽否報部等語隨交該部查閱陣亡冊内並無二人之名著傳諭兆惠等查明具奏定邊右副將軍富徳奏敘西安滿營筆帖式綏保隨侍衞達爾黨阿辦送馬匹行走勤慎命以應陞之缺即用定邊右副將軍富徳等疏奏敘䘏陣亡受傷官兵及辦理沙喇斯瑪呼斯等賊衆富徳等奏言臣等前駐㧞達克山邊界派出官兵搜𠞰盜竊臺站之布魯特等查有察哈爾署參領敦多克兵丁羅卜藏䕶軍噶爾丕等尋踪遇賊中鎗陣亡臺站兵丁阿玉什旺扎爾巴雅爾圖察哈爾兵丁烏巴什俱以遞送事件遇賊被害徤銳營前鋒雙泰因布魯特賊衆盜馬捕賊陣亡並受傷兵丁五名均請交部議敘議䘏又欽奉諭㫖沙喇斯嗎呼斯餘衆内有無戕害滿福之敦多克哈什哈查臣等在瑪爾濟鼐𠞰滅賊衆時即詢及二賊厄魯特等僉稱二賊自誘害官兵後愈肆狂悖為衆所殺並未逃入回部奏入報聞己未以副都統愛隆阿𠞰賊功績宣諭軍營上諭軍機大臣曰愛隆阿巡查臺站一聞瑪呼斯餘孽欲行搶掠即領兵追襲盡𠞰賊衆已諭部從優議敘加賞世職矣愛隆阿此次奮勉更非尋常𠞰賊可比蓋大功既成此等逸賊並未責伊專辦即使逃脫伊亦不至獲咎乃聞信即行俾逆黨不致漏網而臺站得以無虞可謂急公任事大臣官員等果能如此存心何功不就朕深為嘉予從前賞伊雲騎尉世職著加恩賞給騎都尉此時兆惠等應已起程著舒赫徳𫝊諭愛隆阿并通諭大臣官員兵丁等知之諭定邊左副將軍成衮扎布寛免嚮道達什扎卜等鞭責治罪上諭軍機大臣曰成衮扎布奏稱嚮導達什扎卜博博貴等徃䇿布登扎布軍營遞送事件歸途擒獲嗎哈沁知有盜馬賊人踪跡選騎兵十二人徃捕賊黨頗衆我兵被陷者七人旋經脫出達什扎卜等復請前徃追捕効力自贖核其情罪酌將伊等揷箭遊營仍鞭一百等語達什扎卜等係逓送事件之人聞嗎哈沁等踪跡即行追捕尚屬奮勉即以兵少致敗亦屬情有可原著不必治罪命直𨽻等省督撫選㧞沿途臺站各弁加恩酌量録用上諭大學士曰西陲大功告成臺站各員已令該督撫等查明咨部議敘至此次遞送紅旗之千總外委各員自軍興以來均屬按刻飛馳勤慎無悞應量為優擢以示鼓勵著直𨽻山西陜丼各督撫等按照本省道里逺近於沿途各員中分别選擇内有行走奮勉人材可觀者以五人中㧞取一人為率出具考語送部引見候朕酌量錄用辛酉命晉陜甘總督楊應琚官階上諭大學士曰陜甘總督楊應琚籌辦軍需循照大學士伯黄廷桂規畫章程俱能實力經理所辦凱旋馬匹措置尤為妥協現在西陲善後事宜正資襄贊著加恩晉階太子太師以示優奬癸亥諭參贊大臣舒赫徳加意牧放馬匹上諭軍機大臣曰書山奏稱烏魯木齊解送哈薩克馬一千餘匹於九月二十六日至哈喇沙爾休息二日即行起程等語著傳諭舒赫徳此項馬匹解送阿克蘇等處以備搜𠞰嗎哈沁及屯田之用宜加意牧放以備調撥其送馬官兵若辦理妥協亦應加恩原任藍翎侍衞達爾扎桑若行走尚好即酌量奏請開復命丼肅運糧價值仍遵前㫖一體加恩增給上諭大學士曰甘省輓運軍糧及調運協濟糧石所需脚價前據大學士黄廷桂奏明疉經䧏㫖一體増給俟秋成後仍照舊例支給但該省本年收成歉薄糧價尚未平减其一切運費著再加恩仍暫照從前増給之數一體支放俾輓運貧民日用充裕以示體恤該部遵諭速行定邊左副將軍成衮扎布疏奏北路撤兵事宜成衮扎布奏言查䇿布登扎布所領游牧兵三百名卡倫兵二百名布延圖兵三百名扎哈沁兵二百名已遵㫖行文令其各回原處至臣等現議布延圖不必駐兵而烏里雅蘇台兵丁尚少應即令調徃駐劄奏入報聞侍郎銜書山疏奏安揷多倫回衆書山奏言查多倫回衆五千餘人自阿克蘇分隊向庫爾勒前來自庫車以東哈喇沙爾以西起玉古爾臺至碩爾舒克臺有四五處皆可引水漑田分布安揷臣同吐魯番公素賚滿阿卜都賚之姪色底克至庫爾勒等處相度辦理又羅卜淖爾有伯克托克托所屬三百餘戸懇請屯田應請交與伊弟阿卜都賚令其管轄奏入報聞甲子諭定邊將軍兆惠等查辦哈什噶爾等處潛匿之烏沙克回衆上諭軍機大臣曰納世通奏稱烏什卡倫兵張茂等擒獲逃回二人係已經招降之烏沙克旋復逃徃喀什噶爾藏匿二十餘日聞内移之信遂逃向烏什阿克蘇業經正法示衆等語看來喀什噶爾葉爾羌尚有烏沙克等餘衆著傳諭兆惠舒赫徳等查明各處似此潛匿之人若安静無事則已稍有滋事即應酌量辦理具奏諭㕘贊大臣阿桂防範沿途内移回衆上諭軍機大臣曰徳文奏稱章京格勒爾圖由阿克蘇送來多倫回衆五千餘名除沿途病斃及親戚留住外仍有四千四十餘人等語此等回人齎糧無㡬恐沿途流為嗎哈沁宜留心防範毋致盜竊臺站馬匹牲隻如有滋事者即行正法以靖地方諭禮部侍郎五吉等增備臺站馬匹上諭軍機大臣曰現在㧞達克山霍罕等處遣使入覲一路臺站馬匹自應整理妥協以壯觀瞻而速郵𫝊在内地臺站自必預備應付其哈密以外著五吉於巴里坤牧馬一萬匹之内挑選一千匹由哈宻至闢展分派其闢展庫車阿克蘇葉爾羌著定長書山納世通阿桂遞行交辦務使一律整齊俱即傳諭知之諭陜丼總督楊應琚等酌議屯田事宜上諭軍機大臣曰定長等將本年闢展托克三烏魯木齊哈喇沙爾喀喇和卓等處屯田收穫分數具奏又稱除烏魯木齊外其他地畝較之初種時漸覺歉薄等語此等田畝雖不能如内地人工糞治可以常年耕種但地頗寛敞彼此遞年互調耕作自有餘力著𫝊諭楊應琚㑹同舒赫徳定長悉心講求酌議具奏按察使銜納世通疏奏裁汰兵丁納世通奏言查庫車回城地狹事少現駐官兵百餘名足敷調遣其阿克蘇差務頗繁所駐綠旗兵一千二百六十餘名看守城堡倉庫牧放馬駝牲隻添派臺站卡倫城内餘兵僅六十餘名不便再為裁減除軍營將來撤回綠旗兵即遵㫖揀選調徃屯田臣所領追𠞰嗎哈沁之西安兵一百二十名及阿克蘇所留西安兵二百五名内共裁汰一百五十名撤回巴里坤仍辦給車輛遣歸原處奏入報聞管理屯田副都統定長疏奏修建倉堡事宜定長奏言闢展等五處屯田收穫後積貯榖石必湏建倉築堡查闢展已有舊設倉堡仍需添建修葺其喀喇和卓新建倉二十四間堡一座托克三倉二十間堡一座哈喇沙爾倉十五間堡一座烏魯木齊倉二十四間堡一座闢展添倉三十間及修葺舊堡照巴里坤修城例賞給銀兩共六百五十七兩五錢有奇奏入報聞丙寅命凱旋將軍大臣官兵及㧞達克山等部入覲陪臣均由内地南路進京上諭軍機大臣曰㧞達克山安集延等部落陪臣入覲已諭沿途各督撫等加意料理今據鄂弼奏稱沿邊一帶間有偏災恐未能整飭可𫝊諭鄂弼一切供應官兵及回部使人俱由内地南路豫備並𫝊諭直𨽻陜丼各督撫等一體遵照再著陜丼各撫先期知㑹將軍大臣等均由内地來京昨據呉達善奏分飭南北兩路探聴凱旋官兵接濟馬匹今既由南路行走自應酌量調撥其北路豫備馬匹祇須足敷臺站之用其餘可酌量調赴南路俾官兵等遄行無悞併著𫝊諭知之命封公扎拉豐阿為貝子㪚秩大臣薩喇爾為伯戊辰命增給丼肅各營來年糧料草束折色價值上諭大學士曰甘省今嵗收成稍歉糧草價值較昂滿漢各營所支折色若照舊例則購買未免不敷所有來年官兵改折糧料草束及採買滿營糧草價值著加恩照二十三年之例一體加增其河州鎮標臨洮鞏昌二營及陜省之延安榆林固原一帶各標營𨽻于甘省者均屬災歉之區著一例増給以示體恤該部遵諭速行諭䕶軍統領努三等追𠞰嗎哈沁事宜上諭軍機大臣曰努三等奏稱阿拉善佐領布岱招降嗎哈沁雲敦等十五人酌留堪為嚮導者三人餘俱解送京師現在修理穆素爾嶺道路俟追𠞰逸賊事竣後將索倫吉林兵丁撤回等語布岱既招降嗎哈沁等著酌量奨賞此等降人尚未盜竊生事著發徃甘肅分賞官兵努三等修理道路即擬追𠞰逸賊甚屬可嘉若能弋獲匪犯則伊與永貴等從前疎忽之咎俱可寛免但伊等此時應已奉到來京之㫖即暫回亦可將來所撤索倫吉林官兵著從巴里坤辦給車輛由肅州行走各回原處陜甘總督楊應琚疏奏辦送馬駝事宜楊應琚奏言臣前因大兵凱旋擬將巴里坤馬匹解徃以備乘騎今准兆惠咨文停止將第一起馬五千匹仍交總兵存泰牧放其第二起甘省滿漢營馬二千餘匹將抵哈密擬撥一千五百匹赴巴里坤牧放以備伊犂等處駐兵屯田之用其餘留於哈密以備差務至陜省所調馬匹將抵河西請以撥補摘缺則嘉峪闗以外所儲芻豆俱移為凱旋官兵馬匹之用又舒赫徳等請自闢展至庫車分派駝隻以供轉運查臣前辦駝一千一百隻近准定長咨撥昌吉羅克倫烏魯木齊等屯以供轉運應將軍營行裝駝隻及節次收獲賊駝分派各臺站休息牧養及解馬官兵未用之駝三百餘隻亦可添補額數奏入報聞己巳諭定邊將軍兆惠等酌量伊犂駐兵屯田事宜上諭軍機大臣曰據徳文奏稱准舒赫徳咨查沙雅爾河道通葉爾羌喀什噶爾可否造船試運及堆貯糧石之處查沙雅爾距庫車百四十餘里中間有衞林河之奇塔特地方可貯留糧石等語從前舒赫徳以此具奏已降諭㫖謂伊犂駐兵屯田於來年次第辦理不必多派官兵回衆一時安揷并𫝊諭兆惠富徳楊應琚等會啇妥議即如糧運一事自葉爾羌等處由阿克蘇穆素爾嶺前至伊犂乃正路也若謂山嶺難行由庫車運徃則其路更逺豈此間别有㨗徑乎計兆惠等此時已與楊應琚㑹議若業經派出回人數百戸行裝亦辦來年四月尚能耕作即遣徃亦可或不能速辦可酌量派兵一千俟來年草生時由穆素爾嶺前徃伊犂巡查仍向阿克蘇駐劄俟辦理屯田就緒於後年發徃兆惠富徳若已起程舒赫徳即與楊應琚㑹議具奏諭駐劄闢展副都統定長刻石紀功各事宜上諭軍機大臣曰定長奏稱前奉諭㫖來春於伊犂之格登山刻石紀功順便搜捕嗎哈沁請將阿定保所領之兵選派百名並懇請効力之舒景阿前徃等語昨據努三等請派阿定保兵丁過嶺追賊已諭將此等在軍營年久之索倫吉林兵仍遵前㫖撤回又諭兆惠等酌派官兵一千來春徃伊犂巡查則刻石之事自可兼辦今定長處既有工匠著即發徃葉爾羌先行刻石紀功俟工竢後再同發徃官兵前徃伊犂於格登刻石現在葉爾羌督工即著舒景阿去命侍郎海明馳驛前徃葉爾羌協同舒赫徳辦事命闢展糧務同知伊星阿以知府補用遊擊覺羅達興阿以㕘將補用壬申命奬賞喀爾喀營旗章京策木伯勒等上諭軍機大臣曰成衮扎布奏稱管旗章京䇿木伯勒署驍騎校阿喇克遞送策布登扎布軍營事件始終安協等語策木伯勒著加恩賞戴孔雀翎仍賞縀四端阿喇克著賞縀二端以示鼓勵癸酉定邊將軍兆惠等疏奏回城駐兵各事宜兆惠等奏言回部平定各城永息干戈而安撫新降仍須駐兵彈壓請于葉爾羌駐兵一千令副都統豐安領徤銳營兵三百名侍衞達爾黨阿總管巴雅爾領索倫兵五百名㪚秩大臣鄂齊爾領厄魯特兵二百名以㪚秩大臣永慶巡查臺站卡倫於喀什噶爾駐兵一千派索倫兵五百夊察哈爾兵三百名厄魯特兵二百名令副都統伊柱管領于英噶薩爾駐兵五百派索倫兵三百名察哈爾兵二百名令副都統豐訥亨管領其阿克蘓烏什等處官兵以阿桂統領仍派副都統傅景總管羅爾本泰敏珠爾厄魯特副管旗章京密什賚等分管其軍營年久官兵俱行撤回計乾隆二十年二十一年派出之健銳營兵二十餘名吉林兵七百餘名以愛隆阿管領索倫兵二千餘名以瑚爾起由屯鄂博什温布分領察哈爾兵七百餘名以端濟布敏珠爾多爾濟管領喀爾喀兵百餘名以公朗衮扎卜管領阿拉善兵百餘名以公衮楚克管領辦給資裝撤回原處派侍衞訥齊訥特通額塔爾海棟保烏爾圖納遜查拉豐阿塔瑪鼐瑚什科普薩額爾登額䝉固勒烏三泰等沿途照管行走至緑旗官兵臣等業經奏派駐劄葉爾羌等城餘兵撤回本營近准總督楊應琚議奏屯田兵丁需用萬人請于撤回官兵内就近截留除在軍營年久及隨臣兆惠富徳等著有勞績者均撤回休息將續派新兵酌留阿克蘇一千名和闐三百名烏什三百名賽里木二百名拜二百名其餘發徃烏魯木齊等處屯田所有阿克蘇等處駐兵事宜臣阿桂與閆相師五福辦理奏入上諭軍機大臣曰兆惠等奏葉爾羌等處駐劄官兵名數其餘悉行撤回等語所留厄魯特兵二百名尚未妥恊伊等皆新附之人在軍營頗著勞績若令久駐既慮其未諳紀律且亦當稍為休息著𫝊諭舒赫徳等此二百厄魯特兵即著鄂齊爾帶領撤回仍曉示以安揷内地承受恩澤至厄魯特烏魯木齊六人内衮楚克扎卜陣亡殊可憫惻著查伊妻子加恩優䘏烏魯木等亦甚屬奮勉著舒赫徳𫝊諭詢問如願來京即行資給起程或願在軍營効力亦酌量奬賞厄魯特碩通懇請留營効力甚屬可嘉著加恩酌賞銀兩訥齊訥等係乾清門侍衞即著來京供職傅景仍遵前㫖來京命以索倫佐領三達保為副總管上諭軍機大臣曰兆惠等奏稱索倫佐領三達保因在鄂壘扎勒圖𠞰賊有功陞授二等侍衞此次効力出衆官兵俱加恩陞用三達保或授為頭等侍衞或照伊等營制授為副總管請㫖遵行等語三達保係索倫佐領著加恩授為副總管命復革職効力佐領鄂木布原官上諭軍機大臣曰察哈爾佐領鄂木布前以不善牧馬革職今據兆惠等奏稱伊在固木等處收輯流㪚安揷回衆數百戸又訪知回人窖麥接濟臺站口糧辦事亦無遲悞等語鄂木布自悔前愆奮勉効力著加恩仍授為佐領定邊將軍兆惠等疏奏回城伯克入覲各事宜兆惠等奏言回部平定應令各城伯克等輪班入覲請於凱旋之便帶領貝勒霍集斯公噶岱黙特署阿奇木伯克之霍什克伯克等前來其餘分為三班以來年為始次第入覲將來貝子鄂對公阿什黙特押送内移回人事竣即就便來京又安集延相近之哈爾塔金布魯特頭目納㡳爾瑪特遣其弟伯克頗拉特告稱云我兄管領有一千五百戸呼圖和卓管領有五百戸情願歸誠入覲等語臣等即令與奇卜察克之比阿奇木同來奏入報聞甲戌諭定邊將軍兆惠等安揷霍集斯事宜上諭軍機大臣曰兆惠等奏稱大兵凱旋霍集斯告請同行入覲看其情形尚無他故前因霍集斯知額敏和卓已受王封而已尚為貝勒故仍稱為伯克且向舒赫徳飾詞謂烏什原無貢賦恐難信任是以密諭兆惠帶領來京今伊既懇請同行且去年葉爾羌被圍殊為勞苦此次徃㧞達克山亦頗効力自應加恩但仍令其居于舊地究屬未便俟伊到京時再酌量從優安揷伊子漠咱帊爾起程亦不必照解送厄魯特宰桑之例仍與前次入覲一體辦理伊性好猜疑恐其驚惶滋事舒赫徳等當善為慰遣昨命傅景來京即令其沿途䕶送務期妥協霍集斯其餘諸子作何辦理亦著具奏諭陜甘總督楊應琚等酌議新疆官制上諭軍機大臣曰西陲大功告成一應事宜必期熟籌可久從前哈密巴里坤闢展等處辦理糧餉臺站諸務俱由内地派員經理今軍需事竣而新隸版圖均有專則若仍行兼辦致本任久懸殊非常制且甘省各營伍官職較他省獨多原為他屬邊疆起見今準噶爾回部蕩平屯田駐兵自伊犂以達葉爾羌向日之邊陲又成内地則文武員弁均應依次移補方與輿地官制俱為合宜其哈密巴里坤以西應須用道府同知若干員一半于内地事簡處裁汰移駐一半酌量添設駐兵屯田各營應設將弁等亦一體籌辦庶于國計邊防兩得經久之道著𫝊諭楊應琚或途遇兆惠等詳悉㑹商或與舒赫徳等悉心酌議具奏命分貯軍前礟位於哈密巴里坤上諭軍機大臣曰兆惠奏稱内地所送大神威礟十一位回部無需多設請于葉爾羌喀什噶爾各留二位餘七位來春送回原處等語所奏甚是但運送頗覺路逺哈密巴里坤亦可存留著楊應琚酌於此二處分貯命副都統伊勒圖前徃阿克蘇管領兵丁上諭軍機大臣曰昨諭傅景來京著伊勒圖前徃阿克蘇管領兵丁永瑞仍駐劄烏魯木齊辦理屯田事務丙子命提督閆相師來京陛見上諭軍機大臣曰提督閆相師現領屯田兵丁赴烏魯木齊辦事念其隨將軍兆惠等進兵著有勞績今大兵凱旋著𫝊諭楊應琚於内地總兵内派員更替即令其來京陛見平定準噶爾方略正編卷八十二
