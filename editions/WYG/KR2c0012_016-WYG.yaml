body:
  text: 雍正三年六月戊辰議叙駐藏官兵上諭兵部曰陜西四川雲南進藏官兵朕從前俱已加恩議叙其康熙五十九年得藏之後四川雲南兩省官兵駐防藏内及察木多各處地方者久著勤勞甚屬可嘉至今尚未議叙爾部行文岳鍾琪髙其倬各將駐防官兵查明報部交與議政處即行議叙庚午署川陜總督岳鍾琪奏定雜谷大小金川沃日諸土司地界岳鍾琪疏言臣遵㫖遣官到雜谷大小金川沃日等處勘問諸土司搆釁狀立界如故人人恱服又金川土司美同諸寨為金川咽喉前巡撫年羮堯強判與沃日是以讐殺累年今仍歸之金川以龍堡三歌地歸沃日兩家息爭又土司承襲所在有司索取陋規輙延嵗月請立嚴限以杜弊竇奏入得㫖本朝各省土司俱畏威懐德甚為恭順間有一二梗化者皆由地方文武大吏調劑失宜之故今春年羮堯奏稱四川雜谷及大小金川等土司頗有不法情狀朕即知此必年羮堯希冀其多事欲借此名色得以久操大將軍之權固留川陜總督之任耳年羮堯若不速離川陜則川陜必致多事是以將年羮堯調往杭州未㡬南坪壩之事果已安帖兹據岳鍾琪所奏雜谷金川沃日等土司又已恱服彼此和輯矣此諸土司向日皆因年羮堯辦理不公以致互相讎殺今岳鍾琪遵朕諭㫖辦理有方寜番息事殊屬可嘉著交與該部議叙其條奏土司襲職之處著内閣九卿㑹議具奏己丑敇詰年羮堯鎮海堡軍情上諭大學士等曰前據年羮堯摺奏鎮海堡城外之戰我兵已將賊人殺敗城内都統武格帶領滿兵及察哈爾兵開城西門尾追賊後搶掠物件以致賊人折回斫傷西安驍騎校一員滿兵一名察哈爾兵二名武格首先敗回又復衝突綠旗隊伍致鎮海營千總與兵卒帶傷者十有餘人其餘行事昏憒不知羞恥西倫圖輕浮妄言狂呌無禮皆軍事所最忌者臣是以即行撤回等語朕比時即批示令其具本㕘奏隨據年羮堯奏稱都統武格西倫圖本應㕘劾然臣之受恩威權太重若再㕘兩都統於臣不利伏乞暫賜優容置之閒散之地等語朕是以將武格西倫圖調回令其别處効力今據䕶軍㕘領常明奏稱羅卜藏丹津侵犯康城邊界時年羮堯令臣到鎮海堡送信與都統武格武格隨帶西安滿兵一百名察哈爾兵三百八十名入守鎮海堡凡四晝夜至第五日今陞總兵之宋可進帶西寜緑旗兵一千五百名來赴臣與都統武格㕘將張家翰同率在城滿洲䝉古綠旗兵丁六百餘名出西門向城下排列與賊戰賊即奔敗因深入賊壘交戰西安正藍旗驍騎校署㕘領四哥鑲藍旗披甲達三保陣亡正黃旗領催署驍騎校吳泰等五六人俱數處重傷察哈爾兵亦有陣亡及受傷者此皆世受國恩遇敵感憤報効死傷之人臣不敢隠匿謹此奏聞等語常明身在軍前所奏如此與年羮堯從前所奏逈異且年羮堯既稱武格種種失律之處彼時又不㕘劾及朕令其㕘奏又云臣威權太重不便又㕘兩都統夫行軍之道只論功罪之當否豈可意為輕重且以年羮堯之擅作威福所㕘豈止兩都統而至此忽又懼威權太重耶觀常明所奏當日在事官兵奮力殺賊有受傷者有陣亡者深屬可憫武格等既無失律之罪則効力之官兵等應加優䘏此案功罪不便含糊歸結著年羮堯明白回奏秋七月癸亥命優賚青海諸王貝勒貝子來覲者上諭理藩院曰青海和碩親王察罕丹津疏請來京意甚懇切今年郡王額爾徳尼額爾克托克托鼐與察罕丹津應輪班來京來時著侍郎鄂賴各賞銀一千兩明年郡王塞卜騰扎爾貝勒盆蘇克旺扎爾貝子索諾木達什俱應輪班來京來時王賞銀一千兩貝勒賞銀八百兩貝子賞銀六百兩八月乙亥定軍功加銜兵丁錄用給俸之法兵部等衙門遵㫖議奏曰皇上以立功加銜外委兵丁匱乏可念令臣等確議錄用給俸之法謹條列奏聞一康熙三十年以前兵丁加銜或多假借毋庸送部推用其近年以來克取打箭爐恢復西藏臺灣及平定逆番諸有功者計四千人應令督撫提鎮轉下營協州縣所有兵丁三代履歴年貌籍貫開載明白各加印結造冊分送部科存貯以杜假借一前者議叙功冊中或多徇私濫入應敇督撫提鎮令領兵將校及同事在職各官出具功績有無印結送部以杜冒濫一以功加遊擊都司銜者歸於雙月推用如例其加守備班向已汰去現今加守備者㡬至二千餘人請於雙月單月增設功加守備一班一各省把總缺三人以加銜者一人補用如缺二人仍於所在兵丁㧞補一向者立功授劄後悉令除所支糧或無生業以致窮困失所嗣後未得補用者悉令督撫提鎮收置標下其給糧兵丁等勤慎者則以外委把總銜給之老病者奏給半餉終其身一實在立功同役同銜者再令督撫提鎮考驗分三等送部引見分别補用以杜奔競請托之弊如此則立功加銜者錄用有日咸荷聖恩矣奏入上從之丁亥青海固山貝子策零敦多卜卒以其子丹巴襲爵九月丙申川陜總督岳鍾琪奏請陛見允之以西安巡撫圖理琛署理總督事務尋加岳鍾琪兵部尚書銜庚戌領侍衛内大臣公傅爾丹奏率京兵還傅爾丹奏言振武將軍印信已交代將軍穆克登其喀喇沁土黙特兵令協理旗務塔布囊沙津達賴台吉塞楞拉什領之歸化城土黙特兵令㕘領常保佐領三都布綽斯希領之各還所在臣由鄂勒錐圖郭勒啟行率京城官兵赴京奏入報聞壬子靖逆將軍富寜安疏報塔勒納沁等處屯田收穫青稞八千九百三十二石有竒奏入得㫖下部知之冬十月己巳命賞賚進藏官兵上諭内閣曰四川提督周瑛從前領兵進藏時正值天氣寒冷又當匆遽之際弁兵甚屬勤勞朕心深為軫念周瑛回至四川之日著巡撫王景灝動支司庫銀一萬兩交與周瑛將隨往進藏及察木多効力之弁兵等按其勞績分别等次遍行賞賚俾逺征奮力之人得霑恩賜戊寅議設鳥鎗隊長前鋒統領鄂善奏言請於前鋒兵丁中以其半為鳥鎗前鋒八旗各擇能者四人管轄如副䕶軍校例給與藍翎令為鳥鎗前鋒之長奏入得㫖前鋒等偵探信息伺捉賊人恐擕帶鳥鎗有不便之處著八旗都統等㑹同前鋒統領䕶軍統領議奏尋議曰鳥鎗為軍中利器凡行伺捉賊人不得帶平時令之演習無所不便可令前鋒中半習鳥鎗擇能管轄者四人為隊長演習暇時仍令前鋒統領㕘領侍衛等訓練騎射不得生疎奏入上從之辛巳命給喀爾喀上三旗旗纛喀爾喀副將軍多羅郡王和碩額駙策凌等奏言喀爾喀三部兵舊分隸八旗今䝉恩許隸上三旗乞下工部令製鑲黄旗纛六十桿腰旗六百桿給丹津多爾濟軍正黃旗纛四十二桿腰旗四百桿給策凌軍正白旗纛三十桿腰旗三百桿給博貝軍理藩院遵㫖議覆如所請其舊有八旗旗纛令交將軍穆克登收貯奏入上從之庚寅靖逆將軍富寜安疏報吐魯番等處屯田收穫麥糜六千九十石有竒奏入得㫖下部知之十一月乙未正中甸里塘巴塘諸地疆界川陜總督岳鍾琪奏言打箭爐界外里塘巴塘乍了察木多雲南之中甸察木多以外魯隆宗雜哇坐爾剛桑噶吹宗衮卓諸部落悉非達賴喇嘛所屬但魯隆宗去打箭爐甚逺若歸併内地遥制不便請以凡屬内地土司所轄中甸里塘巴塘及沿近得爾格特瓦舒霍耳等處並為内地其頭目給以土司官銜令其管轄其魯隆宗諸部落請給予達賴喇嘛管理特遣大臣往西藏宣諭又康濟鼐阿爾布巴既封貝子管理西藏事務請令康濟鼐總理以阿爾布巴副之頒給敇諭曉諭唐古忒部人悉聽二人約束庶無擾亂之患至前者年羮堯請於噶達設總兵官駐劄若以魯隆宗諸部給達賴喇嘛則噶達所設總兵官可罷之議政王大臣議悉如所請奏入得㫖畫定内地疆界給與達賴喇嘛地方曉諭番人之事著遣副都統宗室鄂齊學士班第扎薩克大喇嘛格勒克綽爾濟前往㑹同提督周瑛詳細辦理尋岳鍾琪奏言巴塘為打箭爐門户舊隸四川省中甸地近雲南舊隸雲南省其巴塘所屬本咱爾祁宗拉普維西等處偪近中甸與雲南汛防地界錯接總㑹於阿墩子實中甸之門户請改隸雲南省管轄設官防汛與四川之里塘打箭爐相犄角足以各收臂指控制番民矣議政王大臣等議如所請奏入上從之雍正四年春正月甲午命隆科多往阿爾台嶺等處協定邊界上諭大學士九卿等曰隆科多深負朕恩種種罪惡應置重典但伊辦事之才尚屬可用現今與策妄阿喇布坦將阿爾台嶺定為邊界之事甚屬緊要差往彼處官員計已將回應預為詳審地勢明晰定議今已派出額駙策凌貝勒博貝散秩大臣伯四格䕶軍統領喀爾吉善前去著隆科多一並同往至阿爾台嶺再由洪郭羅東至楚庫拜甡地方詳察地勢公同定議具奏再由楚庫拜甡之東額爾古納以至黑龍江之源舊定邊界亦未清晰俟阿爾台嶺事竣隆科多即從彼處前往楚庫拜甡將此等地方亦詳審定議現今俄羅斯國為定邊界之故差使前來隆科多候伊使臣到日即將定邊界之處㑹同議結此事隆科多非不能辦者伊若實心任事思葢前愆朕必寛宥其罪若心懐叵測思欲僨事所定邊界不合機宜於策妄阿喇布坦俄羅斯地方生事朕必將伊治罪二月辛未賞給青海親王戴青和碩齊察罕丹津等帑金理藩院以察罕丹津等起程還部日期入奏得㫖察罕丹津等既欲於十一日起程著初十日至圎明圜陛見伊等俱因青海之亂被賊搶掠此時回去恐牲口盤費不足著將内庫銀各賞給一千兩甲戌命編分厄魯特郡王貝勒等佐領理藩院奏言厄魯特多羅郡王額駙策凌旺布多羅貝勒塞卜騰旺布貝子茂海等乞一體編分佐領應遣官前往辦理奏入得㫖此係編分佐領之事甚屬緊要應遣大臣前往今散秩大臣伯四格等往定阿爾台山邊界事竣之日即著四格從彼處前往㑹同副都統花善詳議編分尋議曰郡王策凌旺布貝勒塞卜騰旺布貝子茂海俱授為扎薩克其所屬厄魯特可編置四佐領奏入上從之乙亥議開察罕托輝河渠公舅舅隆科多等奏言臣等到寜夏阿拉善山前相視自察罕托輝至石嘴子一百里其野廣平土脈肥潤籽種易生其地性較暖可引水如西河六羊河並古渠大溝黑龍口倒流河新河黄泥河董家河悉前人引水分水故道以年久多淤塞然形跡尚存今若更修建渠壩及放水閘其兩岸可以墾田萬頃又據甘肅巡撫石文焯等奏言寧夏東北五十里曰察罕托輝其地南北延袤百餘里東西廣四五十里或二三十里東界黄河西至西河地平衍可開墾自鄂爾多斯遷後十餘年民間有私墾者若令開渠通水築堤建閘以時啟閉用資灌溉則曠土可盡為沃壤今相度地勢自雙廟墩至六羊河可百餘里請倣漢唐諸渠法開渠一道建正閘一攩水閘稍閘各一迎水湃一又六羊河口近黄河處亦建正閘攩水閘稍閘各一以資蓄洩又自上泗墩至六羊河岸東距黄河五里許築堤一道約長百里可以永禦黄水墾田六十餘萬畝議政王大臣等議覆曰察罕托輝自漢及唐為靈州地當時廣置屯田元至元間置屯田萬戸所明時套夷渡河而西侵據内地葫蘆河之東居民不得耕種實始棄之我朝德化廣被諸番臣服鄂爾多斯移歸套内以河為界察罕托輝地久隸版圖按寜夏衛志漢唐二渠之支流有百家良田滿逹拉等渠舊在察罕托輝左右若倣其遺跡開渠建閘甚善但隆科多石文焯等所言建閘築堤處情狀各異事計久逺臣等不得懸定方今總督岳鍾琪赴布隆吉爾相視地勢請以隆科多石文焯奏摺並地圖令大理寺卿通智齎往同岳鍾琪至察罕托輝等處照圖驗實核議具奏奏入上從之臣等謹案黄河自西極數千里始入中國龍門下流波勢奔怒往往為患然寧夏之西自昔阻河溉渠漢唐以來號稱沃野史記載武帝時朔方河西並引河及川谷水溉田後漢永建中以虞詡言激河浚渠為屯田唐時曽開濬之為二渠元置屯田萬户所今察罕托輝漢唐二渠之支流踪跡具在也自明中葉始棄之邊外居民不得就耕其地國家威德無外式廓版章世宗憲皇帝特命大臣齎地圖到阿拉善山前相度泉流求復故道爰發帑金於河西牧塲之地經理剏濬開惠農及昌潤二渠溉田數十萬頃為萬世利賴我皇上蕩平絶域西域諸部盡隸中土自是烏魯木齊以外至葉爾𦍑喀什噶爾屯耕以次舉行荷鍤成雲決渠降雨逺至星宿之源穮蓘相望荒陬並登樂利一統無外之鴻規夫豈漢唐諸代所可倫比者哉三月辛丑命撥兵駐劄唐努山特斯等處并賞諭烏梁海上諭議政王大臣等曰據遣往策妄阿喇布坦處衆佛保等奏稱策妄阿喇布坦以克木克木齊克烏梁海地方原係伊所屬被丹津喇卜坦侵佔仍欲得此地方等語今不令策妄阿喇布坦來使入内地即於巴里坤地方遣回恐策妄阿喇布坦乘此時發兵侵擾克木克木齊克烏梁海現今我滿洲䝉古兵丁在茂岱察罕廋爾扎克拜達里克駐劄著前鋒統領丁夀帶滿洲兵五百名䝉古兵五百名副將軍貝勒博貝帶喀爾喀兵一千名前往唐努山前之特斯等形勝地方駐劄於克木克木齊克居住之策凌旺布烏梁海居住之博貝處不時偵探若策妄阿喇布坦侵犯烏梁海等處賊兵若少即襲擊之如賊勢衆斷不可輕進著將軍穆克登副將軍丹津多爾濟策凌博貝等應於何處防守預備定議奏聞尋又諭理藩院曰昨為烏梁海人等特降諭㫖發兵駐防朕復詳思克木克木齊克地方之烏梁海人等俱係策凌旺布博貝屬下其來歸之和羅勒買等現交博貝撫綏存恤居之公所此等人向在喀爾喀邊外樹内打牲為生與準噶爾所屬之烏梁海接壤又與俄羅斯連界必當輕徭薄賦俾伊等生計饒裕乃為有益此等人素無知識萬一策妄阿喇布坦設計哄誘或興兵搶掠雖地屬彈丸人極愚賤而倘被侵犯即與䝉古王貝勒之部落一體豈可置之不問觀策妄阿喇布坦奏章其意於烏梁海毎飯不忘將來未必無乘間侵犯之事今兹夏月我師現在特斯等處游牧朕欲乘此遣大臣一員擕帶布帛茶葉等物同王策凌旺布貝勒博貝或親至克木克木齊克地方或於附近烏梁海之唐努特斯等處齊集伊等為首之人分别賞賜明示朕意曰皇帝軫念爾等民生特命前來傅㫖曉諭爾烏梁海人世居樹内以打牲為生遇力强者即為納賦由來舊矣今爾等既納貢賦於䝉古王貝勒等即為朕之屬國所居與俄羅斯準噶爾邊界甚近據今差往準噶爾使臣回奏策妄阿喇布坦云克木克木齊克地方之烏梁海人等向俱為伊之屬下甚恨爾等皇帝恐爾等受伊侵害故特遣大臣傳諭預為防備且施恩賞賜爾等嗣後逺設營哨盡心防禦策妄阿喇布坦所屬之烏梁海與爾等接壤宜不時探察再俄羅斯亦與爾等甚近倘伊國人等侵爾邊界造屋種地立即報知汛地轉報將軍即使策妄阿喇布坦侵害爾等將軍早聞便可發兵救助倘策妄阿喇布坦兵多事起倉猝爾等力不能當即擕帶妻孥牲餼暫移入内邊游牧若賊兵無多爾等酌量己力可以殄滅即殄滅之與其畧不設備致策妄阿喇布坦忽來見侵刧掠牲畜殺傷人民何如早備之為善也皇帝又軫念爾等生計特命爾主王貝勒等減爾貢賦將所減之數皇帝動支國帑賞賚爾主期於爾等生計有益爾等誠能感戴國恩恪遵訓㫖固守地方探察詳報朝廷恩賚自必有加無已等語策凌旺布博貝同命往大臣如此詳悉曉諭伊等再於伊等中揀選老成服衆之人作為首領令其守望相助其遇有緊急事務作何知㑹傳報之處亦著詳細定議開示伊等伊等果能深知利害感佩恩澤則必輸誠効力從此邊圉益固矣夏四月丁卯命議叙喀爾喀汗旺扎爾多爾濟等上諭議政王大臣等曰前議於鄂爾昆圖拉地方種地時曾有人奏稱喀爾喀人等未必情願朕思喀爾喀地方原被噶爾丹抄掠窮困已極我皇考聖祖施恩收養各按伊等品級封為汗王貝勒貝子公扎薩克加以重恩令食俸祿數年間遂致充裕安居原游牧地方今復安插戍兵令其種地亦係特為喀爾喀䕶庇久逺之計伊等聞之定各欣喜有何不願之處朕曾降此諭㫖今圖謝圖汗旺扎爾多爾濟副將軍王丹津多爾濟等感戴為伊等安插兵丁之恩復因先於額爾得尼招地方開種地畝穀不甚長遣人從俄羅斯處尋得與伊地方相宜之穀實請令按時耕種又情願帮助耕種之人口糧等因具奏與朕前㫖相符喀爾喀汗旺扎爾多爾濟王丹津多爾濟等實係感激深恩為國家竭誠効力之人殊屬可嘉著交與理藩院議叙癸酉撤巴里坤吐魯番官兵撥安西兵駐劄哈密上諭議政王大臣等曰據差往策妄阿喇布坦處衆佛保等奏稱臣等與策妄阿喇布坦議定疆界仍欲以索勒畢嶺至唐努山陰之喀喇巴爾楚克山為界等語其事暫且不能完結朕思巴里坤吐魯番之兵丁理應撤回著議奏尋議曰策妄阿喇布坦怙惡不悛輙敢要求定界乃自取滅亡也皇上愛恤軍士以出征年久令撤巴里坤吐魯番兵應悉撤之但撤兵後賊或來哈密盗竊馬匹牲畜亦未可定今哈密駐兵止五百人請更於安西撥兵五百遣副將遊擊各一人管轄駐劄務逺斥堠嚴汎防俟哈密築城既畢其兵五百仍撤回安西將軍富寧安前有㫖令其陛見即令率所撤兵來京又甘州有京城滿洲兵三百亦令都統查克旦率之還并撤所設軍站其自嘉峪闗以至安西沙州哈密應留軍站以備遞送奏入上從之五月壬辰飭諭川陜總督岳鍾琪岳鍾琪疏言寜夏駐防滿漢兵丁糧餉請分别折給奏入得㫖從來滿洲兵丁性情質樸奉公守法不知爭論財物自圖便利亦未聞於該管上司前有控告錢糧等事昔年福州漢軍駐防兵丁因爭競馬乾錢糧聖祖仁皇帝將為首之人重懲附和之人分别治罪葢恐其漸成惡習故用法以儆將來也毎見旗人為上司往往袒䕶旗人亦有故意刻待旗人袒䕶漢人以示公者漢人為上司又往往袒䕶漢人亦有故意刻待漢人袒䕶旗人以示公者此皆非大公至正之道也朕君臨天下一視同仁惟期事事公平不肯稍有偏向如滿洲駐防兵丁其所得錢糧馬乾等項較綠旗兵丁為多此非厚待旗人也葢綠旗兵丁係土著之人經營度日稍覺容易滿洲兵丁於錢糧之外無所資藉故特加恩惠以養贍之旗兵既有多得錢糧之處則不應復占綠旗之分例今岳鍾琪奏據鍾保詳稱寜夏滿兵初到採買米石草束實難請將夏朔二縣實徴草束并額徵一萬五千石之米盡給滿兵以折價給與綠旗兵丁此奏甚屬錯謬若云折價足敷採買之用則綠旗可以採買滿兵即可以採買且地方官亦可以採買矣若云折價不敷則滿兵不敷綠旗兵亦即不敷矣兵丁同為朝廷豢養之人滿洲素性尚義輕財豈肯奪綠旗兵丁之利以自便其私乎據云詢問綠旗兵丁亦欣然樂從凡辦事衹論理之當行與否若於理當行豈因綠旗兵丁不願而遂停止乎若於理不當行即綠旗兵丁情願固屬可嘉獨不計及滿洲兵丁之顔面乎又稱所需白米毎石以一兩五錢折價為數無㡬等語國家有一定之經費若屬應用則數千數萬亦不為多若不應用則一絲一粟亦宜察核豈有因數目不多而遂可任意增添乎况為數不過七百餘金即將此分與三千人衆為利㡬何而令滿兵徒受與國家較量錙銖之名乎鍾保身為藩司料理軍餉乃其專責滿洲兵丁所需米石草束著交與鍾保管理採買散給不得稍有虧缺若借端貽累地方朕必加重處俟辦理數年兵丁住久熟習之後再行奏聞令兵丁各自採買冬十月甲子賞賚擒賊䝉古兵理藩院遵㫖議覆曰䝉古官兵於布拉罕布魯爾二路襲擊策妄阿喇布坦邊界擒殺賊衆應請分别賞給銀幣奏入上從之十一月乙未命封靖逆將軍富寜安世襲侯爵靖逆將軍富寜安自軍營來京率將士陛見上諭曰富寜安在軍前多年約束兵丁辦理事務俱井井有條而且行止端方廉潔此數年以來領兵之將軍等聲名未有出其右者其於我皇考之寄任實心奮勉不負任使朕實嘉愛今朕代皇考推恩特行旌賞封富寜安世襲侯爵爾諸大臣果能以品行聲名為念於國家公務一意抒誠勉盡人臣効忠之道豈惟主上嘉愛即上天亦必慈佑報之以福矣平定準噶爾方略前編卷十六
