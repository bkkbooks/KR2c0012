body:
  text: 乾隆二十七年八月壬辰喀什噶爾辦事尚書永貴等疏奏暫停折給鹽菜餘糧永貴等奏言上年六月臣舒赫德等遵㫖議奏各城盈餘糧石減價折給官兵鹽菜銀兩計九月十一月除折給官兵外仍餘糧二千九百石有竒現在回人所餘糧石全行出糶糧價益賤較前僅十之三四若仍行折給徒滋糜費今秋收穫較前益豐糧價更減應請暫停折給其鹽菜銀兩仍以普爾錢文扣抵俟糧價適中時再行辦理奏入報聞己亥命以原任主事富魁爲前鋒在本旗行走上諭軍機大臣曰阿桂等奏原任主事富魁帶領匠作於固勒扎格登山監造御製碑文事竣可否量予奬賞等語富魁前因獲罪留於軍營効力今既將固勒札格登山碑文俱監造妥協富魁著加恩授爲前鋒仍在本旗行走葉爾羌辦事都統新柱等疏奏購買回人布疋事宜新柱等奏言本年三月臣等請以葉爾羌庫貯新錢購買回人布疋運送伊犂換易哈薩克馬匹今計存貯錢文共六萬六千騰格以錢四十文買布一疋共布七千五百四十七疋通用新錢六千三十七騰格三十文俟和闐折收紡絲布疋起運後續行運送臣等與衆伯克議自今年十月至來年九月勸課回人織布可得五萬餘疋以庫貯餘錢購買則錢法既可流通而回人生計更有裨益臣等隨飭辦理糧餉之圖桑阿等自十月起凡回人以布易錢者即照時價給發毋許伯克頭目等從中尅漏奏入報聞庚子㕘贊大臣阿桂疏奏伊犂城垣公署工竣阿桂奏言臣等原議伊犂建造城垣公署因烏哈爾里克木植頗多即於該處度地興工派副將國柱領兵八百名專司版築上年八月先將應用器具置辦齊全於二月二十五日起工計四門周圍四里三分所有倉庫及駐劄大臣侍衛官員公署兵丁營房共一千六百八十九間於七月初八日告竣臣等節次查勘土木工程尚屬堅固其闥勒竒河亦伐木成造橋梁前項工程除奏明加給兵丁口糧外並未動用官項無庸造冊請銷奮勉出力之千把總各一員請行文陜甘督臣以應陞之缺補用効力行走千把總各一員以應陞之缺與内地人員間補再回人等在固勒札建造城垣與烏哈爾里克城相倣所造房屋亦俱竣工謹一併繪圖恭呈御覽奏入報聞尋欽定烏哈爾里克城曰緩定城東門曰仁熙南門曰利渠西門曰義集北門曰寧漠固勒札城曰安遠城東門曰景旭南門曰嘉㑹西門曰環瀛北門曰歸極壬寅賜哈薩克阿布賚勅書皇帝勅諭哈薩克阿布賚爾遣使都勒特赫勒蘇爾統前來進呈奏章懇請賜以壐書願世世子孫恪守藩服若非老成明達樂善循理何以及此果能常存此心朕必疊沛恩施永遠無斁爾所以矢恭順之忱者要在約束所部守分安生但爾屬人等往往恃大國寛容越境游牧我駐劄伊犂大臣等愼固封疆自必嚴行驅逐朕雖欲加恩亦不能廢法曲貸試思爾哈薩克等若非潛來塔爾巴噶台等處我大臣等何嘗有領兵逐捕之舉爾當傳諭全部俾共知朕意今命爾來使等隨駕木蘭觀圍加恩宴賚賜爾阿布賚蟒錦及各色緞疋紬綾器什芽茶使人歸日爾其祇受又賜爾使人品級頂帶孔雀翎衣物器什銀兩各有差爾所奏使人烏黙爾舊居伊犂今願安挿該處往來行走已如所請加恩授烏黙爾爲乾清門侍衛准其暫歸挈眷因將來遷移户口别賞烏黙爾及伊弟等路費銀兩併諭爾知之特諭議新疆帶運官茶事宜陜甘總督楊應琚奏言查甘省庫貯官茶自乾隆七年至今陳陳相因欽奉諭㫖令臣與司道等通盤核計俾公私俱益謹列款議奏至新疆户口日繁每歲應需茶封及作何帶運亦㑹商各駐劄大臣據覆歲需官茶二萬七百餘封但新疆遠近不一軍臺馬駝止於遞送文報應㩁覔牲隻陸續運貯令官兵領買其運費即於鹽菜銀兩内扣抵等語謹查新疆現在茶價每封需銀二兩以外若領買官茶稍加運費較之買自商人尚屬減省將來遇有換班兵丁更可酌爲攜帶現在巴里坤哈密有官茶六萬八千餘封應先行撥運行銷再由内地運往奏入得㫖軍機大臣㑹同該部議奏尋議新疆歲需官茶一款既據該督咨商各該駐劄大臣議以官兵領買較之買自商人爲省於官兵有益其陸續撥運并令官兵攜帶各事宜俱應如所奏辦理奏入上從之丙午命解送回人阿塔木和卓及其家口來京上諭軍機大臣曰永慶等奏稱逆賊波羅泥都霍集占族人阿塔木和卓現居烏什所屬之喀薩哈無知回人等因伊爲和卓木近族俱來禮拜伊又將所收糧石散給貧人以沽名譽若聽其留住於地方無益請將阿塔木和卓及其家屬十三名口送往哈密安挿等語阿塔木和卓既係逆賊等近族兄弟且非守分之人永慶所請辦理安挿甚是但哈密亦未便容留滋事著傳諭辦事道員三寶等揀派幹員將阿塔木和卓及其家口加意照看解送來京庚戌命新疆撤回滿洲兵取道闢展行走上諭軍機大臣曰旌額里奏稱回城駐防撤回滿洲兵若從烏魯木齊至巴里坤正屆草枯雪盛之時不便行走請將烏魯木齊預備馬匹改送伊拉里克以候抽換取道闢展等語從前撤回滿洲兵雖有由烏魯木齊至巴里坤之議今旌額理既稱遇雪難行而新柱等亦奏稱經過回地於官兵有益著傳諭旌額理即如所奏撤回滿洲兵不必過烏魯木齊將預備馬匹改送伊拉里克換給取道闢展前至肅州并傳諭永貴新柱楊應琚知之恩免屯田民人應還續借接濟官項上諭軍機大臣曰旌額理等奏稱本年由内地資送屯田民人四百餘名到屯以後所有接濟口糧籽種俱係借給官項請分别定議俟伊等收穫有餘將應還錢糧與從前資送之項分年令其交納等語屯回民人從前所領官項自應照原議分年交納此次所借糧石既因伊等甫經耕墾全賴接濟且又被災傷若仍令償還恐有妨伊等生計著將續借之口糧籽種等項加恩賞給以示體恤甲寅諭哈密辦事道員淑寶等查辦回人貿易物價上諭軍機大臣曰淑寶等奏安集延回人前來貿易内緞疋一項除原價及運費每疋增加銀二三錢等語貿易緞疋俱由内地遠行運送自應準照原價及運費酌量增加視其情願交易與否再爲通融減售乃止議加銀二三錢此或經手之員售多報少甚至將自置貨物開入官項冀獲羡餘行之日久則貿易一事又爲貪吏徼倖之端不可不防其漸著傳諭淑寶等留心稽查據實陳奏諭都統侍郎公明瑞辦理安挿烏黙爾事宜上諭軍機大臣曰昨哈薩克入覲使人有烏黙爾者進呈阿布賚奏章謂烏黙爾情願移居伊犂伊代爲陳情等語隨詢之烏黙爾情願挈眷前來因命伊在乾清門行走已勅諭阿布賚矣烏黙爾又奏稱伊約於來年三月自哈薩克起程請伊犂大臣等派員往彼帶領著傳諭明瑞揀選通哈薩克言語之厄魯特數人按期前往再據烏黙爾奏伊自幼在伊犂生長心戀舊居此猶事之所有至云伊姊已爲阿布賚妻若果如此何必移居或伊等私計烏黙爾居伊犂後哈薩克等設有越境游牧之事伊犂大臣派兵驅逐伊得先通信息亦未可定但此特懸揣之事如謂伊果能洩漏信息則從哈薩克脫出之厄魯特甚多又豈能一一防範耶明瑞知此惟留意體察不可稍著形迹丙辰議駐防屯田餘丁揀補額缺事宜烏魯木齊辦事副都統旌額理等奏言烏魯木齊額設駐防屯田兵四千名其挈眷前來者一千八百有竒餘二千一百餘名原議俟換班時令楊應琚揀選情願挈眷者派往臣等查挈眷兵丁内有子弟者頗多遇有缺出現將伊等揀補若換班兵出缺亦揀補挈眷餘丁則本處增一兵即省内地辦送一兵之費請嗣後馬兵缺出以歩兵揀補所遺之缺即於餘丁内補放其步兵原額缺出亦照例頂補奏入得㫖軍機大臣議奏尋議烏魯木齊定議駐兵四千名除情願回營挈眷兵丁外其餘暫准换班亦選内地挈眷兵丁充補誠以新疆駐兵四千合計家口即有萬衆人丁繁庶於差操之暇亦可耕墾謀生今旌額理所奏自屬通融籌辦但此等換班兵丁若盡以現在餘丁充補既恐人數不敷即勉强足額而户口亦不能增益臣等酌議烏魯木齊現有守候換班綠旗兵二千餘名應定以十缺爲率此十缺之内先行儘補現在餘丁二名俟内地辦送挈眷兵丁到時人數日多每次遞増一倍按十缺之數由二名而四名六名照例揀補至四千兵額屆滿所有缺出悉將餘丁補用再此次内地所派四千兵丁俱由額缺内派往將來内地原額即無庸補缺庶調撥簡便而兵力益歸實用奏入上從之戊午諭駐劄回部大臣等酌定調補伯克之例上諭軍機大臣曰永貴等奏稱伊沙噶伯克古爾班和卓商伯克墨墨氐敏哈子伯克阿卜都拉五品伯克伊斯邁勒密喇卜伯克巴巴和卓俱係奉㫖記名應陞人員若俱候本城缺出補用恐至壅滯應請不拘何城缺出即按品調用等語陞補伯克若不拘本地准其調用别城自屬疏通之法但伊等内如阿竒木伊沙噶噶雜納齊等缺俱承辦要務若照内地之例迴避調補則伊等無掣肘之虞且奉調時尚不覺煩苦至小伯克等既無庸迴避徒慮伊等得缺壅滯調用别城將來遷移之際動需費用恐於伊等生計無益自應分别辦理著傳諭各城駐劄大臣等嗣後補授伯克應按照品級分别照例迴避及坐補本處額缺㑹商妥議具奏九月辛酉命各城駐劄大臣確勘各城回人地畝收成分數上諭軍機大臣曰達桑阿奏稱玉古爾庫爾勒回人等今歲屆陞科之期派員查勘收成分數據報玉古爾大小麥俱已成熟共收穫八千一百餘石庫爾勒所種因蝗蝻傷損僅收三百餘石等語回人所種地畝俱資灌溉之利雖不虞旱澇而蟲鼠爲耗致成偏災亦所不免雖不必盡照内地蠲賑之例辦理而視其被災分數酌量減免伊等自感出望外且實與生計有裨此次庫爾勒回人等陞科伊始既被偏災其作何蠲免之處著速議具奏將來各城回人所種地畝有成災者著各該駐劄大臣詳悉查勘收成分數定議辦理俾回衆咸知朕軫念新附之意即其中有揑報災傷希圖免賦者因此履畝確勘亦得杜其徼倖之端著傳諭永貴等知之癸亥命賞從哈薩克來投之厄魯特巴桑職銜銀幣上諭軍機大臣曰阿桂等奏本年七月自哈薩克來投之厄魯特巴桑告稱伊係塔爾巴噶沁之人被哈薩克搶掠曾在阿布勒比斯處因充使來京䝉恩賞五品頂帶孔雀翎今願爲天朝臣僕將在哈薩克所有之牲隻棄置與妻室來投等語厄魯特巴桑棄其所有產業挈眷來投誠悃可嘉著賞銀五十両緞二端巴桑既經恩賞品級頂翎著歸入厄魯特佐領下照原品給與職銜㕘贊大臣阿桂等疏奏辦理駐劄官兵馬匹事宜阿桂等奏言臣明瑞行抵烏魯木齊時派往伊犂官兵交鄂津曹瑛帶領臣明瑞領兵百餘名先期馳赴伊犂與臣阿桂辦理駐劄事宜續據鄂津等將健銳營及京兵送到應令與臣等駐劄處所相近以便時爲操練現在新造城垣俱有兵丁營房酌量分住伊等所騎馬匹係喀爾喀等由烏里雅蘇台解送巴里坤因係賠償官項未免肥瘠㕘雜若官爲牧放恐不知愛惜倒斃更多應仍令乘騎之兵丁等領回牧養以備差操俟換班屆期即帶往肅州交收如倒斃逾額再著落賠償又有扣扺駝隻之馬五百九十餘匹亦多疲乏臣等議選出可以過冬之馬三百餘匹留於官牧羣其餘二百八十餘匹應併入牛羊内搭放官兵口糧奏入報聞乙丑諭科卜多辦事副都統扎拉豐阿屯田種植事宜上諭軍機大臣曰扎拉豐阿奏稱科卜多屯田約計大小麥收穫在七分以上惟所種之粟因氣寒霜早秀而不實等語都爾伯持人等在烏蘭古木耕種烏梁海人等在布拉罕察罕托輝耕種俱獲豐收科卜多相距不遠從前扎哈沁等亦曾開墾收成尚好看來此次或播種稍遲或霜雪早降又或土性不宜種粟著傳諭扎拉豐阿詳詢該處舊日居人酌量辦理其靑稞一種既係䝉古地方所宜來年自當廣爲播種毋致失時丁卯議派喀爾喀等往科卜多屯田事宜定邊左副將軍成衮扎布等奏言准扎拉豐阿咨本年科卜多所收糧石除給與兵丁籽種外所餘尚敷二百人籽種等語臣等議照原奏於喀爾喀都爾伯特扎哈沁内按數派往請照屯田綠旗兵例從烏里雅蘇台月支鹽菜銀九錢米二斗四升九合令其隨便耕牧至上年所派一百人農具多係舊時存貯殘缺者多請酌爲換給并靑稞籽粒於播種前送往奏入得㫖軍機大臣議奏尋議上年成衮扎布等奏派綠旗兵一百名往科卜多屯田試有成效再酌量派兵增墾但所議都爾伯特扎哈沁人等甫經安挿不便遷移惟扎薩克圖汗部落公品級扎薩克阿喇卜坦屬人曾於扎卜堪耕種現在閑散居住請派出二百名於科卜多附近卡倫内耕牧以裨生計遇有差務輪班行走其月支鹽菜口糧換給農具俱應如所奏辦理奏入上從之己巳命遷移之察哈爾等旗加意耕牧以裨生計上諭軍機大臣曰阿桂明瑞等奏稱新經安挿伊犂之察哈爾厄魯特兵丁編設佐領給與孳息牲隻仍先給口糧以資接濟等語此等察哈爾厄魯特兵丁除牧養牲隻外尤當以耕種爲業今既遷移安挿自應代伊等籌畫生計所有新到各户口俱令其實力開墾餘俱如所議行㕘贊大臣阿桂等疏奏收到葉爾羌布疋及酌停喀什噶爾辦送事宜阿桂等奏言葉爾羌送折交騰格布五千疋喀什噶爾送布二千疋均以正賦所餘接濟回人生計請嗣後哈薩克布魯特貿易及屯田兵丁所需俱於此項動支以省内地運送之費又查葉爾羌布每疋二丈計値銀四錢一二分其喀什噶爾布價値略同而尺寸較短質薄色淺詢係從回人採買非官爲監造者查伊犂存貯布疋及葉爾羌所送甚多喀什噶爾既係採買又較遜於葉爾羌所出請停其辦送奏入報聞庚午以誤派嚮導官兵訓飭烏魯木齊辦事副都統旌額理等上諭軍機大臣曰和其𠂻奏稱派往喀什噶爾等處官兵自烏魯木齊起程有嚮導外委把總丁建業引路錯誤多行五站官兵口糧不足已派德文速辦前往接濟等語官兵嚮導宜派索倫厄魯特等熟悉道路之人始免錯誤乃轉令綠旗兵丁前引以致馬匹疲乏口糧罄竭殊不可解著傳諭旌額理等令其明白回奏外委丁建業甚屬冐昧該處雖經懲責詞後遇應陞缺出不必列名以示儆戒喀什噶爾辦事尚書永貴等疏奏查禁軍器情形永貴等奏言臣等欽奉諭㫖以布魯特等購買回城軍器向例曾否禁止查喀什噶爾葉爾羌阿克蘇等城辦理情形不一喀什噶爾與安集延接壤彼處產銅鐡硝磺以遊獵爲生無藉回城軍器向來未曾禁止英噶薩爾亦同葉爾羌與拔達克山博洛爾人等貿易因本處軍器尚需購買是以例不外售臣等仍照舊禁止和闐亦同阿克蘇烏什俱與喀什噶爾葉爾羌一體安設卡倫而阿克蘇居各城之中布魯特等往來甚少惟烏什與喀什噶爾北邊布魯特相近又通阿克蘇故永慶等於卡倫盤查攜帶軍器以現在情形具奏臣等公議外藩歸誠日久雖不必顯著禁例但往來人等購買軍器應令各阿竒木於卡倫執照内塡寫數目若私行交易及收買過多者酌量截留以示節制奏入報聞辛未葉爾羌辦事都統新柱等疏奏愛烏罕等處情形新柱等奏言八月初五日士伯特拉達克汗策旺那木扎爾遣人致書臣等譯看其書云聞愛烏罕頭目愛哈黙特沙恃强攻痕都期坦部落取扎納巴特城以阿竒木伯克守之自居拉固爾城又克什米爾部落舊頭目名塞克專愛哈黙特沙令其往見不從遂遣人統衆數萬攻之塞克專迎戰敗潰爲其下人執送愛哈黙特沙頗能體恤農商人等如古之尼西爾宛時羊虎同居並不相害等語臣等復書奬其誠悃辦令起程初六日㧞達克山穆喇特伯克等前來貿易告稱起程以前聞愛烏罕欲遣使入覲貢馬已至㧞達克山我等頭目素勒坦沙亦遣使隨同入京奏入報聞叅贊大臣阿桂等疏奏定議孳生駝隻之例阿桂等奏言上年烏里雅蘇台解到孳生駝隻臣等查照甘省之例每駝二百隻應以牝駝一百七十五隻牡駝二十五隻爲一羣每羣以千總一員或把總一員爲牧長外委把總一員爲副牧長所管兵丁九名仍派守備一員總管每百隻五年合算准例斃四十隻逾額即行償補此外仍有孳生駝四十隻照例議敘如再有孳生自一隻至二十隻以上將總管及牧長正副各官定爲等第分别加級紀錄兵丁賞給銀兩孶生不及四十隻總管及牧長分别罰俸副牧長兵丁等責懲至六年合算每牝駝七隻留牡駝一隻其餘即出羣騸養以備使用有老弱者變價以孳生盈餘塡補仍作爲正數以定賞罰此次承辦牧駝之厄魯特等官員既經給俸如有孶生缺少自應照例示罰其議敘加級紀錄伊等既未通曉即折賞緞布其老弱駝隻伊犂雖不能變價亦可折給官兵路費又厄魯特官兵應比照綠旗辦理翼領與守備同佐領與千把總同驍騎校及委員與外委把總同厄魯特兵與綠旗同奏入上從之壬申㕘贊大臣阿桂等疏奏回人孳生牛隻事宜阿桂等奏言據阿竒木公木薩呈稱伊犂屯田回人按户給馬一千二百五十匹每年准銷倒斃三分補給馬三百七十五匹俱屯田用牛較馬爲優請於孳生官牛内給回人等四百四十隻四年内併孳生可得牛一千餘隻四年後又可孳生三百餘隻請即以抵補給馬匹五年後原牛一千隻即可永遠不動等語臣等查回人屯田馬匹例需補給今既有孳生牛隻則五年以後所有補給之項可免另用馬匹之費而以牛服耕於義亦合請將官牧之牛給與回人牝牛四百隻牡牛四十隻令其孳生四年内共應補倒斃馬一千五百匹以牛七百隻分作三年抵補五年後所需牲隻即以孳生牛隻抵補仍以牛一千隻爲限永遠不准倒斃奏入得㫖如所請行丁丑闢展辦事郎中德爾格疏奏回人承佃收成各數德爾格奏言臣奏請闢展等處裁汰兵丁所餘屯田分給回人承佃十分取一今據闢展安挿伯克伊敏和卓連木齊木安挿伯克珈如拉又吐魯番回衆三處共種穫榖石一萬四千一百七十五石五斗應交官糧一千四百一十七石五斗五升查現存官糧尚有三萬七千七百三十餘石其駐劄官兵口糧及應付往來人等歲需僅一千四百石又有額敏和卓及威魯堡遷移回人應交官糧每年可得四千四百五十餘石供支尚屬有餘前項存貯糧石自應及時出糶無庸停止奏入報聞甲申諭定邊左副將軍成衮扎布等查禁烏梁海等竊取外藩牲隻上諭軍機大臣曰成衮扎布等奏准阿桂咨哈薩克奈滿鄂拓克多羅特拜等禀稱聞得烏梁海等今春過額爾齊斯驅哈薩克克勒鄂拓克之馬三百餘匹隨追至渡口僅取回百餘匹因斥以此事既與爾等無干且傳聞未實如果有之俟本人控告再行查辦等語著傳諭成衮扎布車木楚克扎布等轉交烏梁海總管察達克圖布愼等將有無此等情節即行查明如實有其事則甚屬乖謬從前哈薩克巴魯克巴圖爾搶掠烏梁海等朕特命納旺往諭阿布賚始伏罪乞恩將所掠人口牲隻查還今察達克等自當約束屬人俾不滋生事端乃反竊取哈薩克馬匹致伊等得以有詞殊非體制成衮扎布等即嚴行查禁具奏命陞賞建造烏魯木齊城堡營房官員烏魯木齊辦事副都統旌額理等奏言臣等㑹同楊應琚將移駐烏魯木齊兵丁一千八百十四名應建營房三千六百餘間於去年十月派都司永海贖罪原任總兵官吳士勝領綠旗兵五百名在烏魯木齊羅克倫一帶河畔伐木縛葦陸續轉運由舊屯至昌吉屯一帶擇田多水足之地定爲城堡八處計一處造房一千二百間住兵六百名建城一座高一丈六尺圍三里五分一處造房六百間住兵三百名建城一座高一丈五尺圍二里七分餘六處各造房三百間住兵一百五十名建堡一座高一丈一尺圍一里七分又酌量添建官員公署一百四十一間倉庫六十五間計官兵房屋俱於八月訖工城堡尚有未完來年農隙亦可竣事奏入上諭軍機大臣曰旌額理等奏烏魯木齊建造城署營房派都司永海革職總兵官吳士勝等率領弁兵督催奮勉等語永海著以應陞之缺即用呉士勝以遊擊補用其千總把總十一人俱著酌量賞給以示鼓勵尋欽定城名曰寧邊曰輯懷堡名曰宣仁曰懷義曰樂全曰寶昌曰惠徠曰屢豐冬十月甲午葉爾羌辦事都統新柱等疏奏議敘官兵轉運臺糧新柱等奏言查自葉爾羌之愛濟特呼至阿克蘇共設十四臺所有臺站官兵口糧馬牛芻豆從前俱由葉爾羌䭾載運往因水草平常駝隻傷損僅可運至第五臺臣等酌定於第五臺設倉一所令索倫佐領䝉庫圖爾督率兵丁將葉爾羌河所造運船四隻陸續轉運收貯倉内再行支放河水頗急消長無定而䝉庫圖爾辦理三年並無遲延阻滯臣等酌賞兵丁回人等布疋䝉庫圖爾現屆換班之期謹列爲一等應請以陞缺即用奏入報聞己亥命議敘巴里坤等處督辦屯田官員上諭軍機大臣曰永寧等奏巴里坤奎素等處向來地氣較寒一切細糧均難成熟今屯田試種以來該遊擊王紹守備李執中叢天祝焦燝等均能盡心出力督率弁兵多方培溉是以初次試種小麥收成已及五分其餘豌豆等項亦俱有收再革職副將楊景達到屯効力三載並無貽悞等語王紹等俱著交部議敘革職副將楊景達著加恩以都司用壬寅諭烏魯木齊辦事副都統旌額理等移駐貿易地方上諭軍機大臣曰旌額理等奏此次哈薩克帶來之馬一千三百餘匹若仍令在城外貿易因安挿人數漸多恐有匪徒私買且天時稍旱請在羅克倫河畔有水草處貿易等語所見甚是嗣後即照此辦理若人數益多即以漸移往前路庶可以杜私售於遠人暫時駐牧亦禆益癸卯上諭軍機大臣曰新柱等奏稱愛烏罕頭目愛哈黙特沙遣使和卓密爾罕入覲等語愛烏罕部落頗大遣使來京加恩宴賚後自應派員䕶送仍另派回人同往方爲妥協英噶薩爾阿竒木素勒坦和卓從前曾至痕都斯坦等處又在㧞達克山奮勉行走著來京請訓再行派往仍傳諭永貴將召伊入京情節詳悉曉示命定疎脫新疆遣犯之例上諭軍機大臣曰鄂寶奏稱拏獲逃犯六十七審明正法押解之外委把總趙龍陳順等俱有應得之罪已行文哈喇沙爾辦事大臣照例查辦等語六十七以旗人正身自鬻爲奴犯竊發遣又中途脫逃情甚可惡著照鄂寶所奏即行正法嗣後有情罪與此相似者拏獲之日不必具奉候㫖即行正法趙龍等雖止疎防無故縱情弊僅照尋常疎防之例不足示懲著從重定擬嗣後凡發遣回部人犯沿途疎脱除嚴行查拏外即將押解人員監禁一年内拏獲逃人再行釋放照例治罪如限滿不獲將正法之處請㫖著爲令平定準噶爾方略續編卷十八
