body:
  text: 乾隆二十二年冬十一月乙未諭定邊將軍成衮扎布等來京請訓上諭軍機大臣曰現在逆賊阿睦爾撒納已逃入俄羅斯俄羅斯與喀爾喀毗連一應偵探防範事宜甚關𦂳要成衮扎布素得喀爾喀之心為衆所推服且伊久在行間亦宜稍為休息著仍為北路將軍辦理喀爾喀事務策布登扎布年富力強辦事雖不及伊兄而攻戰較為差勝又經休息年餘明歲辦理回部以兆惠為將軍策布登扎布副之已傳諭策布登扎布來京請訓再赴軍營雅爾哈善候伊到日即將副將軍印務交代一同領兵前赴沙喇擘勒𠞰滅巴圖爾烏巴什等賊衆成衮扎布兆惠等亦即來京商辦一切事務其沙喇斯瑪呼斯等賊已專交阿里衮滿福辦理成衮扎布等至巴里坤須作速趲行方不誤兆惠回抵軍營之期也丙申諭户部侍郎阿里衮等追𠞰沙喇斯瑪呼斯賊衆事宜上諭軍機大臣曰據阿里衮等奏稱領兵至托克三擒獲嗎哈沁等訊知沙喇斯瑪呼斯等賊衆越達朗嶺往投昂吉岱等語前據成衮扎布奏稱昂吉岱等賊衆渡伊犂河往沙喇擘勒會合巴圖爾烏巴什今沙喇斯等亦投昂吉岱自係尋踪前往即使時届冬寒不得到沙喇擘勒而巴圖爾烏巴什或料我撤兵復回伊犂㑹合賊黨過冬亦未可定阿里衮額敏和卓等應即趲行攻其不備此時滿福追勦賊衆倘因其逺遁竟行退回阿里衮等更宜前往或知㑹濟爾哈朗軍營派兵策應若果追至伊犂賊衆仍復前去我兵馬力疲乏即撤回亦可至額敏和卓懇請隨同進勦甚屬可嘉著照叅贊分例支取廪給所帯回兵著查明曾否賞給銀兩及關支口糧照進勦官兵例一體辦理命議處副都統三格等上諭軍機大臣曰據雅爾哈善等覆奏端濟布三格額爾登額辦理琿齊額林沁達瓦等脱逃情形端濟布招降渾齊時因伊等稱其投誠隨帯兵前往扎哈沁其琿齊之脱逃與端濟布無涉至三格額爾登額既將琿齊額林沁達瓦喚至軍營即應看守解送乃為賊所欺令其復回因而叛逃猖獗致總管巴寜阿等遇伏陣亡仍未能奮勉進勦三格額爾登額俱著交部嚴察議奏命喀爾喀親王得親扎卜為叅贊大臣協辦軍務上諭軍機大臣曰昨命策布登扎布來京納穆扎爾署理定邊左副將軍印務親王得親扎卜係喀爾喀舊人諳悉事體著授為叅贊大臣協同納穆扎爾辦事命優䘏喀爾喀郡王品級旺布多爾濟等上諭軍機大臣曰成衮扎布等奏稱喀爾喀郡王品級旺布多爾濟公品級頭等台吉三濟扎卜俱出痘身故等語昨因伊等久在軍營令回游牧休息今聞身故深可憫惻著加恩將旺布多爾濟之子承襲貝勒仍賞給郡王品級三濟扎卜之子承襲頭等台吉仍賞給公品級再賞給旺布多爾濟銀五百兩三濟扎卜銀三百兩命陞補軍營効力之主事常鈞及議叙副都統圖倫楚所領官兵上諭軍機大臣曰據兆惠奏稱主事常鈞額外主事法哈委署主事和倫等三人在軍營數年承辦事件既無貽誤且効力行間頗知奮勉等語著照所請將主事常鈞授為額外員外遇缺即補所遺主事員缺著法哈補授委署主事和倫授為額外主事遇缺即補又諭曰兆惠奏稱圖倫楚帯兵一百名擊敗哈薩克錫喇𠞰殺嗎哈沁等以寡敵衆追蹤跟擊頗屬奮勉等語圖倫楚已加恩補授副都統所領官兵著分别功次造冊送部議叙命革副都統三格職降副都統額爾登額為三等侍衞効力贖罪上諭軍機大臣曰昨命兆惠查勘三格額爾登額端濟布等辦理琿齊額林沁達瓦情形據奏厄魯特朝降夕叛衆所深悉而三格額爾登額受其欺詐倉猝回兵以致琿齊等脱逃但額爾登額追勦扎哈沁賊衆頗知奮勉端濟布如何招服琿齊并邇來有無勞績俟至濟爾哈朗㑹同將軍等查奏等語端濟布甫經招降即帶兵勦撫扎哈沁功罪自可相抵三格從前既疎脱尼瑪及琿齊等已至軍營又復縱回游牧其罪較額爾登額更甚三格著革去副都統以兵丁効力贖罪額爾登額革去副都統降為三等侍衞効力贖罪定邊右副將軍兆惠疏請以雙全補授䕶軍留軍營効力兆惠奏言現在軍營行走之雙全係正紅旗蒙古鳥鎗䕶軍雍正九年在和通呼爾哈為厄魯特所掠二十餘年去年隨營効力經臣等奏請如果奮勉即撥回本旗當差查雙全識托忒字習厄魯特言語於哈薩克回部等情形亦頗熟悉本年哈薩克遣使到營令伊通事傳語俱能達意請將雙全咨行該旗坐補䕶軍留於軍營効力行走奏報聞庚子察哈爾總管端濟布疏奏追𠞰扎哈沁情形端濟布奏言臣帶兵捜勦烏魯木齊昌吉羅克倫等處嗎哈沁捉生詢問知扎哈沁得木齊哈勒拜殺巴哈曼集同得木齊達爾扎巴朗藏匿烏蘭烏蘇山内沙扎海地方欲圖搶掠臺站准濟爾哈朗軍營叅贊大臣調令勦捕臣於十月十三日至瑪納斯臺站叅贊大臣哈寜阿派兵協助十五日擒獲嗎哈沁十餘名訊係扎哈沁屬人因哈勒拜肆行搶奪逃向達爾扎游牧達爾扎等欲搶額倫哈達臺站恐有官兵今自沙扎海移來三日等語十六日晚帶兵渡瑪納斯河至美羅托山掩襲達爾扎游牧為賊衆所覺即放鎗逃走官兵奮勇攻擊十七日殺賊百餘人收取馬駝牲隻其臨陣被傷兵丁查明咨報奏入上諭軍機大臣曰據端濟布奏稱追勦扎哈沁賊衆至美羅托山勦殺百餘人等語所有陣亡帶傷兵丁著查明報部優䘏但端濟布奏摺甚屬含混如所云夤夜掩襲為賊衆所覺放鎗逃走則伊等不過追及後隊而逃去者必多端濟布即應就所得馬駝牲隻窮追務獲何以未經奏及著雅爾哈善查明速催端濟布同哈寜阿相機追𠞰又諭曰昨據哈寜阿奏稱帶兵前往瑪納斯呼圖畢羅克倫昌吉等處照看解送口糧捜勦嗎哈沁有應行協助端濟布之處即相機接應等語所奏甚是與朕前降諭㫖相符今據端濟布奏稱𠞰賊百餘仍有逃去者哈寜阿正宜留心偵探相機策應務期盡勦賊衆以清臺站辛丑諭定邊將軍成衮扎布等查滿福𠞰賊情形上諭軍機大臣曰成衮扎布等奏據遣往堵截巴哈曼集之侍衞海林泰報稱在博羅托羅海地方捉生詢問知巴哈曼集為得木齊哈勒拜所殺賊衆欲至空格斯恐有兵堵截即由克勒特前去已過八站適與滿福相遇將情節告知而滿福以現在追勦沙喇斯等叛賊自巴顏阿滿一路安設臺站不可擅動兵丁因無兵追賊遂同滿福前進等語滿福帶兵追賊自當隨遇隨𠞰乃舍現在相近之扎哈沁而追逺竄之沙喇斯等殊屬懦弱滿福果能追𠞰沙喇斯等尚可功罪相抵若藉口窮追不及馬力疲乏竟行撤回則罪不可逭著傳諭成衮扎布等看滿福呈報若何據實速奏若已起程前來即交雅爾哈善查奏命賜二等侍衞寜古禮號克丑巴圖魯總管圖布巴圖魯温布給與副都統衘俱賞銀一百兩乙巳諭喀爾喀郡王品級車木楚克扎布查拏逆賊阿睦爾撒納上諭軍機大臣曰昨據策布登扎布奏稱令車木楚克扎布㑹同察達克辦理烏梁海博和勒那木查爾等語此際應已前往現在逆賊阿睦爾撒納逃入俄羅斯或俄羅斯令伊帶領烏梁海逃人復出滋事亦未可定可傳諭車木楚克扎布於途次留心察訪一聞阿逆之信即帶兵前往擒拏併諭知察達克奮勉協助仍將現辦烏梁海情形及有無他處賊人蹤跡作速奏聞諭厄魯特散秩大臣和碩齊等查拏逆賊阿睦爾撒納上諭軍機大臣曰昨諭和碩齊等於䕶送哈薩克使臣之便沿途或遇逆賊阿睦爾撒納及大隊賊衆伊等兵力無多令唐喀禄帶兵二百名於中途等候一得信息即前往接應今阿逆逃入俄羅斯或俄羅斯令其帶領烏梁海逃人復出滋事亦未可定和碩齊於沿途察訪一有阿逆信息即帶兵往擒仍速飭唐喀禄接應若阿逆果如所料正和碩齊立功之時哈薩克使臣原可自回游牧若願協擒逆賊即與同行至唐喀禄係獲罪之人亦可藉以自贖其務悉心訪查奮勉効力大學士管陜甘總督黄廷桂等疏奏滿漢標營坐扣銀兩分年展扣事宜黄廷桂奏言臣等欽奉恩㫖將陜甘二省滿漢各營採買補缺馬匹借墊銀三十五萬九千三百兩零免其扣還其解送馬駝添補口食盤費坐扣未完銀六十萬八千三百兩零酌量分年展扣以紓兵力仰見皇上俯恤邊兵至意臣等酌議各營應支馬乾俱已留為餧馬之用毎歲添製軍裝及差使盤費俱係該營自行措辦於季餉内扣還又有朋扣銀兩并年底在司庫接濟以及糧貴時豫借銀米均應於季餉内扣繳現在朋餧解送正餘馬一萬三千餘匹加添料豆製備衣裝統需陸續扣還再加此項坐扣銀六十萬八千餘兩誠如恩諭自應寛以期限俾季餉扣還之外各有餘剰應請自乾隆二十三年春季為始各於本營季餉内分作六年扣還庶期限既紓兵力以裕矣奏入得㫖六年尚覺限迫著寛至十年丙午大學士管陜甘總督黄廷桂疏奏查辦克勒特人衆黄廷桂奏言克勒特人衆於十一月初二三等日解送到肅臣隨傳伊總管根達什副總管莽蘇爾等宣示恩㫖移送内地養贍照查送得木齊多爾濟家屬之例并伊等親屬派員送交理藩院查辦所帶馬駝牲隻變價給領其餘男婦二千三百餘口陸續撥送陜甘兩省各標營分賞官兵其馬駝牲隻變價抵補解送口糧之用又奉㫖將端濟布所奏作為嚮導之巴雅爾等移送内地現准軍營大臣等移咨於十月二十一日押解起程俟到日宣示恩㫖照例送京奏入上諭軍機大臣曰現在由巴里坤送至肅州賞給官兵之厄魯特等特因其情有可原始如此辦理但伊等心懷巨測而肅州等處距口甚近或有約㑹逃走妄行生事之處即當正法示衆著曉諭得賞官兵留心驅策如不遵約束雖至死亦不加罪若生事逃竄則罪有所歸黄廷桂等亦當時為稽察大學士管陜甘總督黄廷桂疏奏解送軍營馬匹黄廷桂奏言臣於十月二十八日起解馬匹出關嗣於二十九至十一月初九等日將先到馬内挑選八九分臕壯者按日分起管解出口已有六千匹計月底可至巴里坤其餘西安標營之馬各令速解抵肅亦一律挑選解送以足八千匹之數如止需馬五千五百匹則先解之馬已經足用其餘即行截回又奉㫖派解馬匹之副都統巴圖濟爾噶爾等於初九日抵肅據稱自巴里坤至濟爾哈朗道逺天寒恐馬匹不無倒斃乏弱須於正解外得帶餘馬以備補缺臣查此次解送馬匹係按照官兵數目缺一不可因酌於正馬外又給餘馬五百匹俱挑選臕壯以備軍營撥補之用奏入報聞己酉命奬賞内大臣察達克等上諭軍機大臣曰昨因察達克等所屬之烏梁海歸順已經數載應與新降人等一體納貢曾經降㫖查辦今據策布登扎布奏報察達克此次招服烏梁海博和勒等甚屬奮勉可嘉著傳諭策布登扎布將烏里雅蘇台所貯縀疋酌量奬賞其所屬烏梁海等今年應納之貢俱行寛免以明歲為始即行知車木楚克扎布等遵照辦理庚戌命傳諭招服之烏梁海博和勒等上諭軍機大臣曰察達克招服烏梁海甚屬奮勉著賞縀四端其次奮勉人等各賞縀二端策布登扎布仍傳諭博和勒伊等去年雖附和妄動今察達克一經招撫即時歸服是以寛宥前罪博和勒著還原職仍授為三品總管賞縀二端其那木查爾庫克新等投順之日亦照此傳諭復職受賞博和勒等游牧與俄羅斯相近逆賊阿睦爾撒納逃入俄羅斯伊等一有所聞即當報明陳奏策布登扎布等如得阿逆信息一靣知㑹和碩齊唐喀禄帶兵協助車木楚克扎布等一面帶兵勦捕總以擒獲阿逆始可竣事伊等務益加奮勉以奏膚功再俄羅斯等寄博和勒之托忒字書内有柰曼噶擦克之人逃入内地等語此項人等如果來投即應受降亦當留心辦理議喀爾喀應交馬駝牲隻事宜署定邊左副將軍策布登扎布奏言欽奉恩㫖喀爾喀應賠馬駝牲隻酌量於伊等生計有益寛限辦理臣謹委管理收牧之扎薩克等自乾隆十八年至二十二年收牧動用銷算倒斃數目擬定應免應賠及交還限期具奏得㫖軍機大臣議奏尋議喀爾喀收牧馬匹牲隻由四部落採買各處進獻及厄魯特游牧収取西北兩路官兵交收等項共馬十五萬匹有竒駝二萬一千二百隻有竒牛二萬二千三百頭有竒羊四十六萬九千隻有竒計自乾隆十九年以來追擒巴朗收服扎哈沁包沁烏梁海等平定伊犂追擒阿睦爾撒納進勦和托輝特哈薩克等處支用及患病倒斃并車臣汗等部落趕往各數外現在牧放馬三千三百匹有竒駝一千有奇牛四百有竒羊二萬四千四百有奇查軍營收牧定例按年銷算若未經動用者每年毎百匹准銷倒斃四匹已經動用者准銷八匹今策布登扎布未將倒斃數目按年銷算與例不符但蒙我皇上愛養喀爾喀降有恩㫖臣等仰體皇上仁慈俾喀爾喀生計饒裕酌議應如策布登扎布所奏將乾隆十八年收牧馬六千匹駝三千隻照未經動用例每百准銷四匹十九年以來收牧馬駝照已經動用例每百准銷八匹不計所牧年歲作為一年應免之數銷算其牛羊係屬口糧自難照動用馬駝之例應准其每百内倒斃四隻外仍有額外倒斃亦應如所奏先將車臣汗部落收回各數於一年内追交完項再自己夘年起展限五年交納仍將現在牧放馬駝牲隻飭交扎薩克等加意牧放其應追各項數目令該副將軍分晰造冊報部按限催交奏入上從之議軍營應交馬駝事宜署定邊左副將軍策布登扎布奏言欽奉諭㫖將軍營原有馬駝辦給交回及例准倒斃各數查奏臣謹委管理馬駝之扎薩克等查得大兵平定伊犁各隊官兵共給馬六萬九千匹有竒駝七千七百隻有竒追勦阿睦爾撤納包沁及辦理訥黙庫等給馬六千二百匹有竒駝一千九百有竒進勦烏梁海哈薩克給馬一萬四千二百有竒駝一千六百有竒擒拏青滚雜卜給馬四千六百有竒駝四百有竒計各隊撤回馬一萬二千九百匹有竒駝一千九百隻有竒騎回游牧馬四萬五千七百匹有竒駝五千六百隻有竒存留烏里雅蘇台及調往巴里坤官兵馬三萬五千三百匹有竒駝四千一百隻有竒謹將辦給各隊官兵及交還騎回馬駝數目酌量准銷倒斃分數列單恭呈御覽得㫖軍機大臣議奏尋議查該副將軍所奏乾隆二十年撒回京營黑龍江等兵丁行至額爾齊斯等處者已蒙恩㫖照金川軍需例准其豁免十分之三又另摺所奏都爾伯特汗策凌等應追馬駝業經展限現奉恩㫖豁免均毋庸另議外二十年大兵平定伊犁直抵布魯特邊界較額爾齊斯更逺應將所領馬駝豁免十分之五二十一年進勦烏梁海哈薩克官兵俱至伊什勒河歸途又趲拏青滚雜卜該將軍奏請全行豁免但恐官兵恃有此例將逺行馬駝不復愛惜應較前往伊犂酌量加倍豁免十分之八其和托輝特官兵隨青滚雜卜私回游牧所領馬駝不准豁免俱令照數賠補又擒拏青滚雜卜官兵並未逺行但時值冬寒應將所領馬駝豁免十分之三又收取阿睦爾撒納游牧追勦包沁等官兵亦未逺行應將所領馬駝豁免十分之二再本年撤回之京營綏逺城等官兵交兵部行查現在兩路官兵俟撤回時行查辦理其喀爾喀等所領馬駝内除應豁免數目外其餘理應追繳但伊等賠補牧放牲隻已議展限五年俟交完後再限三年令其補交至厄魯特班珠爾等馬駝業經籍没應毋庸議其扎哈沁烏梁海等原領馬一千七百匹有奇駝二百隻有竒除豁免外仍應追繳馬九百匹有竒駝九十隻有竒照例令其交出其官兵應交馬駝造冊咨送户部喀爾喀等應交馬駝造冊咨送理藩院按限追繳奏入得㫖依議扎哈沁烏梁海人等甚屬安静亦俱奮勉効力應交馬駝著加恩寛免辛亥軍機大臣疏奏詢問伊什克來投情形軍機大臣奏言臣等遵㫖詢問伊什克據供我父原係拉藏汗屬人於康熙年間為準噶爾所掠遂屬綽和爾鄂拓克今因游牧擾亂是以來投等語臣等看伊什克人尚明白年力亦壯應如何安插之處候㫖遵行得㫖伊什克著在上駟院司轡上行走仍編入蒙古旗分壬子密諭内大臣察達克誘擒阿逆之策上諭軍機大臣曰昨命車木楚克扎布等因辦理烏梁海之便察訪逆賊阿睦爾撒納信息今思阿逆奸詭異常或差遣數人到烏梁海探聽情形亦未可定然即擒此數人亦於事無益若果有此舉則察達克不妨陽為約結告伊來人以現在大兵盡撤鳥里雅蘇台亦駐兵不多我等乗此㑹合擾亂喀爾喀搶掠烏里雅蘇台之語若阿逆肯來便可擒獲或察達克相機前往虚作投順之狀誘出逆賊相機辦理亦可著傳諭察達克悉心籌酌不拘何時皆可用此策但宜密而又密不可漏洩致無知妄傳轉足僨事察達克自必有親信數人相與計議若能擒獲逆賊朕於察達克及烏梁海人等必沛殊恩務宜奮勉車木楚克扎布等如何密行傳諭察達克所見如何及現在阿逆信息俱作速奏聞併傳諭納穆扎爾知之申諭將軍大臣等奏報軍營情形上諭軍機大臣曰成衮扎布兆惠等自本月初十十三等日奏事後距今十餘日未見摺奏前經屢諭伊等回至濟爾哈朗同雅爾哈善等酌議駐兵之地及明歲進兵之期并來京請訓等事伊等此時已至何處未見奏到豈臺站尚有遲誤耶至阿里衮雖據奏稱沙喇斯瑪呼斯等賊已過逹朗嶺伊與額敏和卓帶兵追往但曾否與滿福相㑹又端濟布前追巴哈曼集賊衆朕慮伊兵力單弱命哈寜阿帶兵協助若已㑹滿福距端濟布甚逺即不必再往此際哈寜阿究與何人㑹兵均未奏到並著傳諭詢問癸丑諭副都統巴圖濟爾噶爾等沿途勦賊事宜上諭軍機大臣曰此數日軍營並未奏到事件恐臺站或有疎虞今巴圖濟爾噶爾等由巴里坤䕶送馬匹帶有兵丁著傳諭伊等如遇嗎哈沁賊人即行勦殺其兵丁自有乗騎足以擊賊不可動用軍營馬匹以致疲乏如無此事惟以謹䕶馬匹為要計此㫖到日伊等已過巴里坤著交與巴里坤辦事大臣等速為追送乙夘定邊將軍成衮扎布等疏奏駐兵勦賊等事宜成衮扎布等奏言臣等於十月二十八日十一月初一日節次奉到諭㫖令將撤兵過冬處所明春進兵程期及兵丁馬匹數目公同酌議具奏查巴圖爾烏巴什等賊㑹合一處向沙喇擘勒逃去自應速行追勦至回人既敢戕害阿敏道又聞波羅泥都霍集占等聚衆拒守其阿克蘇庫車等處係進兵道路葉爾羌喀什噶爾等處乃其巢穴俱宜陸續辦理計厄魯特賊衆約有數千户可得戰兵五六千伊等皆自知必死如我兵力弱恐致逃竄至勦滅賊衆後即應於特穆爾圖淖爾納林等處休息馬力進取回城臣等公同詳議明春遣發大兵勦滅賊衆收其牲隻直搗回酋巢穴現奉聖謨指示實已洞鑒事機臣成衮扎布等及滿福所領兵共二千七百餘名臣兆惠及富德瑚爾起順德訥端濟布所領兵共三千四百餘名合計現兵六千餘名計可挑選四千名軍營馬匹既多倒斃疲乏濟爾哈朗一帯久住草枯惟烏魯木齊至瑪納斯一帶水草俱佳可以游牧過冬仍派兵五百名安設臺站查駐兵之地至沙喇擘勒程期約四五十日若於來年正月下旬進兵計三月十五日前後可到餘兵千餘名令愛隆阿帶領至魯克察克整理豫備再派巴里坤緑旗兵一千合為二千餘名在魯克察克豫備又現在吐魯番屯田緑旗兵八百名亦令携帶籽種於來春在哈喇沙爾或伊拉里克等處種地令魯克察克豫備兵二千餘名同往以壯聲援又豫備哈薩克貿易派緑旗兵五百名并令額敏和卓酌派回兵遣往烏魯木齊種地俱先至魯克察克自巴里坤辦給口糧籽種至進勦官兵口糧及籽種器具均須大員經理臣等公議派臣永貴前往再臣等現議來年正月進兵若趲赴京師復回軍營恐踰期限謹酌擬領隊大臣侍衞等開列名單恭候欽定奏入上諭軍機大臣曰成衮扎布等奏稱來年正月進兵若趲赴京師往還恐逾期限等語著照所請不必來京但朕昨命策布登扎布同兆惠明歲進兵今阿逆已逃入俄羅斯喀爾喀處索取阿逆及辦理地方事務伊兄弟二人不可不駐劄一人成衮扎布年長喀爾喀素所心服䇿布登扎布年富力強著伊同兆惠進勦成衮扎布仍著來京請訓再赴喀爾喀辦理事務成衮扎布奉到此㫖其將軍印務交與兆惠兆惠俟策布登扎布到日以副將軍印務交代時值冬寒成衮扎布不必速行惟量力前進明歲進兵策布登扎布富德哈寜阿羅卜藏多爾濟明瑞鄂博什温布俱著在哨探隊内行走其巴圖魯侍衞酌量派出巴圖濟爾噶爾送馬到日亦在哨探隊内行走郭木尼勒圖富紹酌派領隊其駐兵魯克察克豫備回部永貴一人不足著雅爾哈善同順德訥愛隆阿酌派巴圖魯侍衞二員前往永貴既在魯克察克辦事候事竣再赴西安巡撫之任其餘大臣侍衞官員分隊安臺屯田牧馬等事俱照所奏行前曾諭策布登扎布雅爾哈善帶兵先行兆惠富德來京馳驛回營尚可追及伊等奉到此㫖如已起程亦不必中途復回再額敏和卓現同阿里衮追勦沙喇斯等賊衆如已竣事即回游牧休息來年辦理回部著同富德在哨探隊内行走又諭曰成衮扎布兆惠等奏來京恐誤進兵之期朕已允所請富德奉到此㫖如尚未起程即不必來京至伊所奏遣使赴哈薩克時令其供備口糧駝馬一事哈薩克甫經歸附且素習貪吝不可稍有派累即遣使前往携帶物件亦可換易口糧今阿睦爾撒納逃入俄羅斯努三不必在哈薩克久住著行文撤回命留乾清門侍衞富紹候送添撥軍營馬匹上諭軍機大臣曰成衮扎布等奏稱明歲進兵計馬八千匹不敷派撥請添送二千匹等語已諭黄廷桂趲辦矣著於巴圖濟爾噶爾三人内留富紹守候巴圖濟爾噶爾等大隊前行已經捜𠞰嗎哈沁富紹䕶送此項馬匹不必多留兵丁惟酌量足敷照管馬羣可也丙辰奬諭户部侍郎阿里衮等上諭軍機大臣曰阿里衮額敏和卓奏稱伊等由阿斯罕布拉克和什特勒克一路取道速行於十月二十八日抵沙喇斯瑪呼斯游牧之哈喇沙爾等處捜查山僻賊衆至塔本順和爾納木噶擒獲嗎哈沁竒齊克等男婦二百餘口今往呼魯木什和羅俟勦滅瑪呼斯賊衆再越達朗嶺進勦沙喇斯昂吉岱賊衆等語阿里衮額敏和卓此次辦理頗屬奮勉從前因阿里衮帶兵遲延交部議處經部議革職朕諭以且觀後效今既自知罪愆奮勉行走著加恩免其革職額敏和卓著賞縀四端遣往偵探之佐領愛斯瑪特及奮勉之官兵回人等俱著查明奬賞再據嗎哈沁供稱瑪呼斯得木齊和通告稱滿都統遣伊前來現在兩三路進兵等語則似滿福已招服瑪呼斯人等矣滿福現在何處究未奏及著阿里衮等帶兵速進即使滿福業已招降亦不可慿信仍行𠞰殺滿福甚屬無用一切事務阿里衮惟與額敏和卓悉心商酌併將滿福信息作速奏聞丁巳命原任巡撫定長以副都統衘馳驛前赴西路軍營辦理糧餉事務在領隊大臣上行走議增派吐魯番屯田兵丁軍機大臣奏言臣等查將軍成衮扎布等奏稱來年派兵二千自魯克察克起程前往哈喇沙爾伊拉里克等處請將吐魯番屯田緑旗兵八百名携帶籽種同往即在哈喇沙爾等處耕種等語但吐魯番今歲耕種已有成效非特不可空閑更當增加開墾臣等酌議吐魯番現在耕種之緑旗兵准其移往哈喇沙爾等處應請㫖交雅爾哈善查明吐魯番現種熟地若干頃此外有無可墾之土共需兵若干酌定數目移咨黄廷桂派出兵丁辦給籽種器具遣往吐魯番接種庶地無遺利而軍食益饒矣奏入報聞大學士管陜甘總督黄廷桂疏奏辦解軍營馬駝黃廷桂奏言臣於十月二十八日至十一月二十一日共解送軍營馬八千餘匹兹准巴里坤辦事大臣移送將軍成衮扎布疏稿内稱臺站兵需馬一千又添給官兵馬一千共需解馬一萬匹等語臣即將發回各營餘馬委員沿途挑選解肅趕送出關又查晉省辦駝三千餘隻於九月陸續抵肅今准提臣豆斌咨取撥用臣因此項駝隻往來解送不無疲乏隨挑選堪用駝二千隻於十一月十二三等日解送餘駝仍令牧養查甘省近邊多有商駝行走即密行涼州平涼寜夏西寜各府速為購買轉解雖略需時日但巴里坤現辦官兵口糧已有羊二萬餘隻其餘米麵等項分次起運自可無悞奏入報聞戊午命以軍營奮勉兵丁行文本旗陞補上諭軍機大臣曰據成衮扎布等奏稱軍營索倫兵丁行走已及四年伊等本旗缺出俱坐補在家之人以致陞轉遲滯請將軍營奮勉兵丁列為一等者咨行該旗遇應陞之缺即行陞補其吉林察哈爾緑旗兵丁亦請照此辦理等語所奏甚是但現在索倫等本地出缺及遇有他處缺出軍營行走之人原有補缺之例因該處未曾行文軍營伊等無從得知著軍機大臣交部將此等補放之人查明知㑹軍營其軍營造冊保送之索倫吉林察哈爾緑旗兵丁亦即行文各該處於行文到日遇有應行陞補之缺俱以軍營之人擬正奏請補授即使伊等年資稍淺而効力疆場與居家者逈異必如此拔擢方足以示鼓舞併傳諭各該將軍總督總管等知之平定準噶爾方略正編卷四十六
