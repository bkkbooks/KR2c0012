body:
  text: 乾隆二十九年秋七月癸丑陜甘總督楊應琚等疏奏哈密等營改𨽻巴里坤鎮標管轄楊應琚等奏言查巴里坤提督與烏魯木齊總兵互相更調經將軍臣明瑞等㑹議請於本年十一月初旬先令提督起程移駐荷䝉俞允臣伏思提督原轄之哈密沙州等一十四營俱在巴里坤之東應就近改歸巴里坤總兵管轄仍屬烏魯木齊提督統轄節制奏入上從之甲子議伊犂添設同知等官事宜伊犂將軍明瑞等奏言現在伊犂挈眷官兵跟役與商民雜處必有詞訟交渉事件請於兵丁全到之後設立理事同知一員或從甘肅等處簡缺裁調或照各駐劄大臣所屬管理糧餉官員三年更換其内地八旗䝉古律例等書附請給發以便查照遵行奏入得㫖軍機大臣議奏尋議查各省駐防旗民雜處之地例設理事同知或通判一員承辦審理詞訟今伊犂所駐滿洲䝉古緑旗兵丁及商民囘人尤為錯雜詞訟案件必多應如明瑞等所奏設立理事同知一員但地方新定員缺𦂳要必須明白敏練熟習滿洲䝉古言語之員始可勝任應請於各部院滿洲䝉古主事及保送頭等筆帖式内揀選發往三年稱職照苗疆例題調所給俸亷似應較内地從優并添設吏役各事宜均請交楊應琚㑹同明瑞酌核具奏所請律例等書亦由各該衙門查取給發至將軍衙門似應照各省駐防之例設立左右司分印房管理糧餉倉庫等官并令明瑞酌議具奏奏入上從之乙丑諭㕘贊大臣納世通等嚴飭素勒坦沙副都統揚桑阿等奏言六月初八日拔達克山素勒坦沙遣使霍濟克蘭呈稱喀什噶爾所屬和爾罕莊有果園一所係呢雅斯索丕故業今伊安插京城其妻子仍在拔達克山請以此園給還等語詢之噶岱黙特據稱園業屬實但現已入官無給還之例臣等因素勒坦沙希圖僥倖行文飭駁謹一并録呈御覽奏入上諭軍機大臣曰揚桑阿等奏因素勒坦沙請將喀什噶爾果園一所給還呢雅斯索丕妻子隨行文飭駁等語所辦尚是但書詞稍弱素勒坦沙貪鄙無恥非嚴加斥責不能杜其僥倖之心著改撰書稿交納世通令其曉示素勒坦沙嗣後伊若妄有請求務宜嚴行斥責不可稍事姑息丙寅宣諭逆囘阿卜都喇伊木罪案并議敘議處在事各官侍郎五吉等奏言臣等遵㫖審訊逆犯阿卜都喇伊木通書霍罕謀叛情節緣阿卜都喇伊木向係喀什噶爾伯克自歸附以來因未授為阿竒木心懷背叛常與額爾德尼致書通問乾隆二十七年冬令伊親屬摩羅郭帕和卓致書額爾德尼告以索取鄂斯游牧一事並未用兵將來遣使到日不必遠迎并約為内應同取喀什噶爾詢之郭帕和卓及伊親信家人哈勒黙特呢雅斯薩木薩克等各供無異詰問阿卜都喇伊木亦據實供吐臣等查阿卜都喇伊木本係逆賊霍集占等親信之人因大兵迫近獻城請降乃心懐叵測通信霍罕謀為叛逆若僅予斬决不足蔽辜應請將阿卜都喇伊木凌遲梟示伊子阿卜都𤓰里擬斬立决郭帕和卓哈勒黙特雖未起意同謀但聽從寄書情節可惡均擬斬立决呢雅斯薩木薩克知情不首應給與厄魯特為奴至員外郎拕穆齊圖二等侍衛鼐庫納奉差同往霍罕於此等謀逆通信之人失於防範覺察伊勒圖雖調往伊犂但從前並未同永貴慎選幹員咎亦難辭俱應交部分别察議奏入上諭軍機大臣曰阿卜都喇伊木係逆賊霍集占黨與本應從坐因其舉城迎降既免誅戮復加恩授為伊沙噶伯克乃不知感戴反交通外藩希圖叛逆情節可惡阿卜都喇伊木著即凌遲梟示伊子俱著處斬妻女及兄弟之妻俱送京備賞所有財産查明入官餘依議又諭曰噶岱黙特首發逆謀著加恩賞緞十端納世通著交部議敘拕穆齊圖失於防範情尚可原但與額爾德尼相見時不能察其情形有異及伊未曾出迎之處並不告知駐劄大臣等希圖省事甚屬怯懦著摘去所戴孔雀翎仍交部嚴加議處永貴等著交部察議以阿卜都喇伊木罪狀敕諭霍罕額爾德尼伯克皇帝敕諭霍罕額爾德尼伯克從前喀什噶爾駐劄大臣遣章京拕穆齊圖率同伊沙噶伯克阿卜都喇伊木諭爾給阿濟北鄂斯之地阿卜都喇伊木濳遣其親信郭帕和卓等致書於爾謂囘部和卓木等皆見誅戮惟爾尚存此次索還侵地來使不過數人未曽派兵爾但示以不懼勿出迎候且喀什噶爾等城留兵甚少爾當領衆前來我為内應等語爾亦權詞相答謂現與丕色勒搆難俟可行時再相約㑹此等情節皆經發覺審訊明確故將阿卜都喇伊木等立寘重典家口亦皆從坐大臣等以爾心懐叵測請發兵問罪朕思阿卜都喇伊木向隨霍集占等為逆本應誅戮因其獻城納欵是以加恩録用今負恩謀叛孽由自作爾歸附以來頗知恭順此次一得逆書若即行首出必重加恩賞原爾之情蓋恐阿卜都喇伊木或仍狡辯致生事端是以未敢出首姑緩言相復則與逆犯結約原非爾本心朕觀爾行止尚屬曉事設爾竟如所約襲取喀什噶爾豈不思葉爾羌阿克蘓和闐皆有官兵伊犂有將軍大兵駐劄爾能守喀什噶爾乎恐大兵一至霍罕安集延盡皆殄滅悔之何及爾蓋籌計及此故數月以來並未私遣一信知爾不敢負朕恩而罪尚可逭也今已諭駐劄大臣等不必進兵爾荷朕包荒大度當益加恭順恪守藩服以期永保福禄於無窮倘有不逞之徒以叛逆之事誘脅爾者即據實以聞勿為所愚特諭庚午諭陜甘總督楊應琚查核安西牧羣上諭軍機大臣曰辦理軍需以來安西孳生馬羣内騸馬多撥征兵乗騎其兒騍馬匹亦有兼備食用者現在軍務告竣業經數載該處既於牧放為宜前此撥用所餘之馬曾否孳生蕃庻足以補設馬羣及此時該督作何籌辦之處著傳諭楊應琚令其查明具奏戊寅命副都統五岱駐劄塔爾巴噶台上諭軍機大臣曰明瑞奏稱塔爾巴噶台初駐兵丁一切事宜必得歴練之人方可勝任五岱久在軍營稽察防範素所熟悉若令其駐劄該處於諸事有益至其家口似應暫停擕帶等語五岱著駐劄塔爾巴噶台但起程尚需時日著仍挈眷前往伊犁俟應行駐劄之日即由伊犂起程阿克蘓辦事副都統卞塔海等疏奏酌購伊犂羊隻卜塔海等奏言查本年四月臣德福奏稱阿克蘓食羊共一千四百餘隻計支給官兵一年及各項公用約需三千六百餘隻尚不敷用請採買羊六千隻内須得牝羊千餘隻以便孳生續准明瑞行知伊犂有貿易之哈薩克等羊隻頗多每隻價銀八錢臣等以伊犁羊多價賤可以節省經費咨覆明瑞先購一千餘隻俟河水消減送至阿克蘓再購二千隻陸續解送臣等更於貿易囘人等羊隻内視其價賤多為購買務足六千之數庻孶生日多而公用無缺奏入報聞八月辛巳恩免甘肅臯蘭等處本年地丁錢糧上諭大學士曰甘省鞏昌府屬前此雨水未足時厪朕懐今據楊應琚奏六月間連次得雨田禾仍屬有秋惟臯蘭等州縣㕔屬不及補種秋禾應查勘辦理等語該處縁邊土瘠雨澤未徧歳事歉收朕心深為軫念該督其速飭所屬悉心察勘實力奉行無使災黎失所因念西陲辦理軍務時嵗嵗加恩蠲除止賦兹大功告竣已閲數載於甘民未沛特恩今秋成既有歉收民力未免拮据著加恩將被災較重之臯蘭等十二州縣㕔稍輕之河州等十八州縣㕔及靈州中衛縣屬之被災旱地所有本年應徴地丁錢糧概予蠲免該督其董率有司妥協辦理毋致胥役人等中飽侵漁副朕加惠元元至意諭陜甘總督楊應琚籌酌新疆接壤居民遷移開墾上諭軍機大臣曰楊應琚奏甘省臯蘭等三十二州縣㕔均有被災之處已降㫖查勘賑恤並加恩蠲免額賦厚示撫綏因念該處現在收成歉薄縁邊瘠土之民生計未免拮据年來新疆屯政屢豐如烏魯木齊等處糧儲甚為饒裕且其地泉甘土沃並無旱潦之虞如令該省接壤居民量其道里近便遷移新屯各處則内地資生既廣而邊陲曠土愈開實為一舉兩得著傳諭楊應琚令其悉心體察隨民情所願設法開導善為經理仍一面熟籌詳議奏聞乙酉諭葉爾羌㕘贊大臣額爾景額等辦理博洛爾等游牧事宜上諭軍機大臣曰額爾景額等奏稱博洛爾伯克沙瑚沙黙特之弟阿玉卜至葉爾羌告稱齊特喇爾邁瑪特什丕與海魯蘭相約掠其村莊請兵復讐伊等行文詰問仍令各吐實情再為辦理務服其心等語看來邁瑪特什丕與阿玉卜等俱係兄弟生隙自相搶掠尚非大事額爾景額等止當如此辦理或伊等將來再有文移應嚴詞斥責若能完局更善即尚須辦理亦第遣伯克薩里等知其性習之人前往曉示若阿玉卜等仍有請兵之語當諭以大兵不可輕動一動則經過各部落妄生驚恐豈有爾兄弟不和致發大兵俾霍罕拔達克山等處驚恐之理此事斷不可行則伊等自無詞復請俱著傳諭知之丙戌議伊犂設立理事同知事宜陜甘總督楊應琚奏言准將軍明瑞咨送奏稿設立伊犂理事同知查該同知承辦旗民事務自應專設實缺查涼州莊浪官兵俱移駐伊犂其西安移駐兵數無多止須於涼州設理事通判一員其涼州理事同知即請裁移伊犂但現任同知長禄未通曉䝉古語言應請在部揀選至伊犂事務較繁一切公費請照烏魯木齊同知之例支給奏入得㫖軍機大臣議奏㝷議伊犂為新疆要地兵民雜處必須專設理事人員以清案牘今該督請將莊浪通判移駐涼州涼州同知移駐伊犂應准其裁移改設由各部院衙門揀選通曉䝉古語言之主事等官補授照邊缺三年應陞之例陞用其養亷公費既較内地加増應令該督等㑹同將軍明瑞辦理奏入上從之葉爾羌㕘贊大臣額爾景額疏奏查辦和闐税務事宜額爾景額等奏言近因阿竒木伯克鄂對查出葉爾羌貿易囘人二百餘名照舊例交二千騰格錢文其和闐亦飭和成詳查據報伊沙噶伯克古爾班和卓等呈編查六城貿易囘人共八十五名除上年派往屯田外所餘五十六名亦願照葉爾羌例酌交五百騰格錢文但伊等因從前辦理和闐田賦時已有應交正項錢糧且俱以耕織為生不似葉爾羌囘人之專於貿易自不便重徴其税若將應交錢文攤派各城囘衆雖屬無多亦覺稍有擾累臣等愚見似應豁免仍令專交正項錢糧以裕囘人生計奏入報聞癸巳命允囘人酌助屯田資裝仍照例給賞上諭軍機大臣曰額爾景額等奏稱由葉爾羌和闐派往伊犂囘人五百戸原議官辦資裝起程而阿竒木伯克鄂對等再三懇請照舊捐助已曉示鄂對等將囘人現有零星什物准其協助至衣服路費仍由官給等語各城資送囘人朕惟恐稍有擾累諭令概從官辦今額爾景額等既據囘衆情詞感恩圖報即照所請量行協助其衣服路費自應動支帑項至協助之回人等著查明照例給賞以示體恤戊戌恩免阿卜都喇伊木縁坐親屬阿卜都克勒木等正法上諭軍機大臣曰納世通等奏稱阿卜都喇伊木之弟阿卜都克勒木等俱係叛逆親屬應行縁坐之犯擬以斬决候㫖正法等語阿卜都克勒木等按律自應正法但與阿卜都喇伊木誼屬兄弟尚非子嗣可比著加恩免死送至京師賞給王大臣等為奴仍傳諭囘衆知之庚子命領隊大臣伊勒圖等分駐伊犂雅爾等城軍機大臣奏言伊犂等處駐劄大臣前奉欽定㕘贊大臣二缺領隊大臣四缺又經奏准將五岱派往塔爾巴噶台其駐劄烏魯木齊大臣綽克托訥蘓懇伍彌泰李景髙等四員移駐雅爾城但雅爾事務不繁無須多人辦理伊犂現有㕘贊大臣一缺或就此四員内揀選補授前往塔爾巴噶台或將愛隆阿派往伏候欽定奏入上諭軍機大臣曰伊犂雅爾等處設領隊大臣四員尚覺不足著増為六員伊犂酌派四員雅爾酌派二員伊勒圖鄂津觀音保勒克著駐劄伊犂五岱訥蘓懇著駐劄雅爾綽克托著授為㕘贊大臣駐劄塔爾巴噶台伍彌泰李景高仍留烏魯木齊同五福辦理屯田貿易事務奏事時伍彌泰列名在前緑旗兵事務著五福管理俱聽伊犂將軍節制伍彌泰李景高或一處駐劄或分駐庫爾喀喇烏蘓著該將軍議奏丁未諭定邊左副將軍成衮扎布停送伊犂羊隻上諭軍機大臣曰成衮扎布等奏稱解送伊犂羊三萬隻應令派往厄魯特及錫伯兵丁分領前往其烏里雅蘓台需用羊隻處頗多據台吉羅卜藏齊旺願進羊三千隻可否收受或另行採買等語伊犂駐劄官兵雖需羊頗多而哈薩克布魯特等不時前來貿易所市羊隻尚可敷用著黙諭成衮扎布等祇須辦羊一萬五千隻交厄魯特等解送錫伯兵丁不諳牧養其餘羊即留烏里雅蘓台應用羅卜藏齊旺所進亦不必收受併諭明瑞等知之九月庚申諭喀什噶爾㕘贊大臣納世通等辦理霍罕事宜上諭軍機大臣曰納世通等奏厄魯特博羅齊等自瑪爾噶朗逃來告稱額爾德尼伯克所居城外仍有厄魯特千餘人又今春遣使霍罕後額爾德尼伯克領衆往侵和濟雅特丕色勒中途忽行撤囘據伊屬人互相傳説恐大兵前來厄魯特必然歸附莫若先行擒殺我等聞風逃走現在遣親信囘人濳入霍罕偵探如無他故即將博羅齊等送往伊犂等語額爾德尼伯克撤兵防範厄魯特等不過因阿卜都喇伊木交通事覺恐大兵問罪欲為守禦計耳豈敢圖謀喀什噶爾如果有此心則從前阿卜都喇伊木濳通信息時何不統衆相應朕昨以阿卜都喇伊木罪狀勅諭額爾德尼伯克伊得㫖知已免其加兵自然安守游牧若納世通等以全無影響之事偵探張皇恐喀什噶爾囘衆聞之轉啓猜疑著傳諭納世通等將此事姑置之不必遣人往探伊犂將軍明瑞等疏奏查辦邊界哈薩克等情形明瑞等奏言此次察哈爾總管達克塔納領兵五百解送羊隻中途馬甲朋蘓克等俱迷踪未囘臣等正在察詢忽朋蘓克與厄魯特男婦五人同來告稱因馬乏落後入哈薩克托克托郭勒等所居被其拘留復乗間與厄魯特等商謀脱出臣等派兵一百名往拏所供之哈薩克等并收其牧羣旋據全行拏獲又查出察哈爾車卜騰因馬乏病卧有哈薩克哈藏哈卜起意欲買車卜騰役使以銀付同行之彦扎卜彦扎卜貪利允從次日遂以病故報知該管官查彦扎卜貪利無恥應請傳集哈薩克人等將伊正法示衆車卜騰重責枷號滿日發往葉爾羌給官兵為奴哈藏哈卜重責釋放托克托郭勒起意拘留官兵應請正法示衆收其馬匹入官其餘人馬匹仍給還原主朋蘓克因病被拘旋行脱出仍令照舊差操其該管官達克塔納等請交部分别嚴加議處奏入得㫖所辦甚是如所請行辛未諭科卜多㕘贊大臣雅郎阿確查屯田歉收情形上諭軍機大臣曰雅郎阿奏稱科卜多屯田計各項籽種一千二百石共收穫四千二百石等語看來所收分數僅三分以上即使土性寒冷耕種已經數載何以歉收若此著將實在情形及上年分數若干查明具奏諭陜甘總督楊應琚查辦巴里坤孶生馬匹上諭軍機大臣曰楊應琚覆奏厰地孳生馬匹一摺該督前因巴里坤厰地寛廣水草豐美是以將安西等處存剰馬匹改撥巴里坤牧放該處自立厰以來節年孳生自應日就蕃庶何以綜計各處所報為數僅及萬匹因思烏魯木齊貿易馬匹尚多巴里坤厰地既佳何不陸續趕赴牧養此處應與綽克托等㑹商至奏内所稱本標暨附近各營陸續撥用一節亦未詳明標營馬匹缺額合例者准其買補過多者另應著賠斷無營馬數虧徑將厰馬抵數之理或者甘省向例如此亦應詳悉聲明此後何以廣為孳生設法妥辦之處著傳諭該督令其再行詳查覆奏諭陜甘總督及江浙巡撫織造等申嚴辦解貿易緞疋處分上諭軍機大臣曰楊應琚奏原任杭州織造赫達色解到貿易紬緞内有霉􅀈二百餘疋請發囘著落經手承辦人員賠補并請嗣後各織造起發時俱令委員騐同包裹一摺所奏甚是哈薩克久經内屬貿易緞疋雖物料稍次亦不敢過為爭執但國家嘉惠遠人所給之物自必令其可以適用斷無一任承辦人員便宜減省致所入不償所出之理況前此傳諭不啻再三該織造自當遵照辦理何得潦草塞責以致霉􅀈二百餘疋之多此項即著解員帶囘令原辦人員按數賠補嗣後各織造所辦紬緞一面移明督撫令派出解員公同㸃騐封解其到甘時楊應琚係總滙之處務須詳悉查檢如騐有質地紕薄丈尺短少以及霉􅀈等弊該督即嚴行駁囘著落原辦人員賠補並將公同㸃騐之員交部議處如騐係中途水漬擦損即著落解員賠補還項以專責成可將此傳諭各該督撫織造等知之壬申喀什噶爾㕘贊大臣納世通等疏奏詢問霍罕等處貿易囘人情形納世通等奏言近據卡倫報稱霍罕有貿易囘人七名前來臣等查看貨物甚少恐係偵探信息因令噶岱黙特等設法詢問據稱我伯克常向和濟雅特之丕色勒争戰今春正在領衆前往因聞伊沙噶伯克阿卜都喇伊木通信事發遂即撤囘再瑪爾噶朗有厄魯特五人脱逃額爾德尼伯克即欲將餘人盡戮恐内地聞信不果但收其馬匹軍器今霍罕所部俱傳説有大兵前來又聞上年赫舎勒巴什之伯克岱音沙報愛烏罕愛哈黙特沙之讐取其九城今年又取兩城愛哈黙特沙力甚窮乏等語臣等查噶岱黙特遣親信囘人偵探未歸今將詢得霍罕來人之言先行具奏奏入報聞丙子諭伊犂將軍明瑞等毋庸偵探霍罕等處信息上諭軍機大臣曰明瑞等奏自哈薩克來投之厄魯特等禀稱霍罕額爾特尼伯克與哈薩克阿布賚等遣使往來恐有勾通情事似應濳遣間諜令其彼此相猜至喀什噶爾地近霍罕布魯特已行文納世通等偵探信息即行知㑹等語昨據納世通等以額爾德尼伯克往攻和濟雅特丕色勒聞有大兵來信撤囘游牧已遣囘人往探具奏朕即謂伊等不過聞阿卜都喇伊木叛情發覺倉卒守禦耳斷無窺伺喀什噶爾之意業經勅諭額爾徳尼伯克伊奉勅後自必心安明瑞等所聞亦不可信以為實哈薩克阿布賚等尚不能約束所部何敢與霍罕合謀藉令相合又誰為主而誰為僕哉且伊犁駐兵甚多亦復何慮著傳諭明瑞等不必濳遣間諜祇以無事處之稍有張皇反啓内地厄魯特囘人等疑懼此時無論伊合謀與否惟加意練兵積榖為要可將節次諭㫖録寄明瑞等閲看此後或别有見聞仍即具奏毋因此㫖遂一切置之不問也又諭曰明瑞等以所得霍罕哈薩克勾通信息知㑹納世通朕前諭納世通之㫖已録寄明瑞矣此時納世通得明瑞知㑹不必張皇辦理再前所降額爾德尼伯克勅諭命納世通派員賷往但所遣必須幹練之員若似拕穆齊圖之怯懦隱匿實情則於事無益著傳諭納世通將派何人賷勅前往及囘報情形若何即行具奏以審明索倫官兵情罪未經陳奏飭諭定邊左副將軍成衮扎布等上諭軍機大臣曰明瑞等奏稱帶領第二起索倫兵之副總管署營總色爾黙勒圖查出兵丁内有將家口重報遺漏及多領馬銀縁由至烏里雅蘓台告知將軍成衮扎布等審明移咨黒龍江將軍又令伊等至伊犁時即行禀報除將伊等浮支銀兩口糧撤出分别應行補給及交還庫項外應將此等辦理率混之官兵分别斥責行文將軍富僧阿照例辦理等語此次派往索倫兵所報家口不符及支給俸餉種種錯繆皆起程時辦理不善所致著照明瑞等所奏行但色爾黙勒圖等既經告知成衮扎布審明咨辦自應即行具奏似此應奏不奏該將軍及㕘贊大臣所司何事著傳諭申飭戊寅以辦理霍罕事宜過於疑懼飭諭喀什噶爾㕘贊大臣納世通等上諭軍機大臣曰納世通等奏稱據遣往霍罕偵探囘人所告與從前來投之厄魯特及霍罕貿易囘人之言相似專候奉到勅諭即派員外郎四十七藍翎侍衛官長保等賫往等語此事伊等初奏時朕即鑒及額爾德尼伯克不過倉皇自守何敢有窺伺之意屢降諭㫖甚明納世通等何過於疑懼若此至賷送勅諭必擇明白信實尚知自愛之人四十七久歴外任並未習熟䝉古風俗亦拕穆齊圖之流豈能辦事官長保性最怯懦前進勦厄魯特時曽經獲咎遣伊同往徒為外藩所輕舒常鄂蘭現俱在彼何為不遣耶著速傳諭納世通等額爾德尼伯克斷不敢來窺伺惟謹遵朕㫖静以鎮之如四十七等業經起程則已若尚未則派舒常前往昨明瑞等奏額爾德尼伯克與阿布賚通和遣使已知㑹納世通等語想納世通等一聞此信必至於張皇失措并著傳㫖申飭毋得仍前疑懼平定準噶爾方略續編卷二十六
