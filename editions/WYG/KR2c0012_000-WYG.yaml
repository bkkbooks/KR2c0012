body:
  text: 平定準噶爾方畧序平定準噶爾方畧書成纂言者以序請夫序者所以叙其事之本末而因文以悉其肯綮也事之本末則方略三編盡之矣太學之碑磨崖之銘西師之詩開惑之論亦既悉其肯綮矣如是則可以不煩重序雖然五年之間大勲兩集又十年而後書成是不可以無序且朔漠金川前例具在也乃允其請而為之序曰功不可以虚成名不可以偽立幸不可以屢徼志不可以少侈夫用兵中國自古為難而況踰沙漠天山萬里而遥乎旰斯宵斯劼劬以至有成功非虚而名非偽是僅可免後人之指摘耳若夫揚揚自詡以為誠若能操必勝之劵則不惟致物議而貽口實於心亦誠恧若也藉衆之力幸底扵績然我士卒之攖鋒鏑者不為少矣故此書之輯率因忠魂義魄不忍令其冺滅無聞具載以誌之而猶不在於擴土開疆之為也既平準噶爾延及回部悉主悉臣耕作賦役興焉此亦一再徼幸矣而猶不自知足欲屢試我鋭而别有圖是志侈也志侈者不祥故近曰撤征緬之㫖甫降而彼適投誠我兵振旅以還告成事焉此非盈虚消息之理捷若響應乎是則此序之作不惟迴思而若有驚亦且永圖而懷有戒也乾隆三十五年庚寅仲春月吉御筆恭進平定準噶爾方畧表上言欽惟我皇上神謨廣運義問遐宣徳耀軒弧地絡拻紫濛之野化覃禹服天山鞏白阜之圖拓二萬里甌脱而遥共球翕集越廿八宿經躔以外疆索閎開周原排築舎之謀握珠鈐於獨斷大漠奏犁庭之績懸金鏡於先幾師期甫再閏而不踰廟算為百王所未有碣樹龍堆絶徼流沙詎盡提封觚操虎觀新編聚米宜昭方畧曰前曰正曰續彚三朝之訓典而兼賅系日系月系年書兩部之蕩平而悉備原夫𫝊標西域錄著班書鎮啟北庭事詳唐籍繞陽闗而保塞外孫之國空傳度隂磧以懸兵都䕶之官旋罷難堅約束焉耆王則侍子終歸畧受羈縻吐谷渾則降番欲散矧復湟流地限徒矜貢馬之連羣要知蒟醬名髙究屬乗槎之鑿空創非常而立極奇功實待於聖人擴無外以恢紘盛事獨超於亘古溯自阿魯台之部别為準噶爾之名顧實汗既老上初强噶爾丹遂夜郎自大四部本伊脣齒雄心已侈鯨吞七旗繄我藩籬狡計將罹蠶食洪惟我聖祖仁皇帝親征三駕兇渠仰藥以歸骸爰逮我世宗憲皇帝大武一匡逆孽輸琛而表界惡未盈於五稔姑稍寛畫斧之期亂彌扇於九黎將自遘焚巢之禍葢威畏徳懷之並用實天時人事之猶須當聖主之初元正神機之黙運乃閧蟻頻經埽穴終焉推刃相尋亡猿亦効􅅃闗正爾操刀宜割迓壺簞以載道競傾馬乳之漿蹴廬帳於窮荒竟折狼頭之纛厄魯特燎原孰避及時春雨其蘇綽羅斯因壘皆降所過秋毫無犯右師麾蝥先濟俄傳頡利之宵奔别部捧檄偕來已見兠題之面縛將欲性馴虎落分封存衛拉之規何期脣沸鴞音交扇起伊犁之黨比烝徒勢集怒螳猶覬當車而小醜途窮毚豈容擇窟邏騎徠大宛汗血共期殊母寡之頭窮鱗剰羅刹游魂早見瘞蚩尤之髀舉虺潜之逆種莫請灰釘暨烏合之兇徒均膏齊斧籌萬全而安袵席因一舉而靖欃槍至分部於花門原連疆於葱嶺責延留之納税誰憐力盡鞭笞等阿惡之拘酋久已命懸湯火詎入檻之纍囚方釋鷹竟離鞲迨乗軺之節使被遮豺還當道實難期于人理寧得逭乎天誅是用申命元戎龔行顯罰下諸城而斷臂白山之士氣胥騰隃重險以攻心黒水之軍聲協應乍睹朽紅囷滿三單因雪窖之糧旋聞鼓角地鳴萬地躡洼池之騎維睿畫早周乎前事六師疑天上而來況聲威尤懾夫後援二豎尚井中而坐伊西洱風雲合陣于䰄之棄甲何多拔達山草木知兵巨骨之専車遂致於是收其種落初興司馬之屯定厥租庸更置宜禾之尉從兹出玉門而風和吹篴開繡壤而雨潤翻犁測月􅙡以分疆正緯度東西之次越繩崖而表景總金山南北之圖查拉則花蘂翻新不數車師白疊騰格則幕文别鑄全銷安息金錢邊營苜蓿千羣不費市臺之採購逺堠黍稌萬􅍒無煩農部之輓輸矧月盈璇璧之河嵗致崑波撈玉露浥葡萄之圃人霑閬苑分漿大都督門户持麾扼蛇陣適中之勢副校尉輔車列鑰規犬牙相制之形秋嚴乗障之烽𤓰期及而一軍番戍春荷釃渠之鍤栁中屯而六郡催耕羣欣通道痕都五印度同遊化宇自悔陸梁烏什一丸泥立墮孤城彎庭氏之神弓蘖芽盡折按形方之要籍灰燼全消葢惟屢變而愈康天授若符乎左券以故一勞而永逸神謀適契乎中權者也今試溯牙璋之初發洎玉斧之長驅實承鴻貺而方臻用展龍韜而屢捷臚奉常以紀績際㑹昌辰譜棡鼓以宣音鋪陳偉伐既施仁而布澤還飾喜以崇儀郊勞臺邊鐃鐲和甘涼之曲策勲閣下丹青傳褒鄂之姿因覘聖武之布昭進頌奎章之炳煥提要揭雲霄之指鐸振聾鄉盤空鐫金石之文星輝昧谷火敦腦粘天浪静慶王師洗甲而還狼居胥冠日峰髙瞻天筆勒銘其上維居中以制外包九天十地而運斡璇樞用原始以要終括二典三謨而文刋玉律莫不六條頒格長貽奠枕之安九域歸懷益見鞏甌之固準天保采薇以出治頌聲之作昭然邁握機鈎要而成經軍志之言粹矣臣等忝効編摩預聞密勿警銅籤而候燎毎聴五夜之傳宣紬石室而濡毫寧藉一辭之潤色匝月再呈夫乙覽為書百七十卷而奇程功託始於亥春閲時十有五年之久欽大業之守而兼創集靈臺偃伯之庥仰淵衷之謙以持盈徴冊府傳心之要臣等無任瞻天仰聖踴躍歡忭之至謹奉表恭進以聞正總裁字位过密無法显示臣傅恒字位過密無法显示臣來保兵部尚書一等誠勇公臣班第經筵講官太子太傅吏部尚書臣汪由敦字位過密無法显示臣劉太子字位過密無法显示臣尹繼善副總裁字位過密無法显示臣兆恵字位過密無法显示臣鄂容安理藩院尚書臣納延泰署理户部侍郎臣雅爾哈善