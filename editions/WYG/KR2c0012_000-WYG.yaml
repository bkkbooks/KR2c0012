寅卷二乾隆二十五年四月庚辰至戊午卷三乾隆二十五年五月辛酉至六月丁亥卷四乾隆二十五年六月戊子至七月辛酉卷五乾隆二十五年七月丙寅至八月己亥卷六乾隆二十五年九月癸夘至十月甲申卷七乾隆二十五年十月壬辰至十一月己巳卷八乾隆二十五年十二月辛未至丁酉卷九乾隆二十六年正月壬寅至二月丁亥卷十乾隆二十六年二月乙酉至三月戊辰卷十一乾隆二十六年四月戊寅至五月丙寅卷十二乾隆二十六年六月壬申至七月丙寅卷十三乾隆二十六年八月庚午至九月乙丑卷十四乾隆二十六年十月丁夘至十一月癸亥卷十五乾隆二十六年十二月丙寅至二十七年二月卷八乾隆二十五年十二月辛未至丁酉乾隆二十八年十月乙酉至十二月丁未卷二十四乾隆二十九年正月甲寅至三月戊寅卷二十五乾隆二十九年四月癸未至六月辛酉卷二十六乾隆二十九年七月癸丑至九月戊寅卷二十七乾隆二十九年十月庚辰至十二月甲辰卷二十八乾隆三十年正月乙酉至閏二月乙亥卷二十九乾隆三十年三月丙子至壬寅卷三十乾隆三十年四月丁未至五月甲辰卷三十一乾隆二十八年十月乙酉至十二月丁未卷二十四恩至渥也自達瓦齊竊位自失其道舉部離心面内歸誠者踵至爰溯自康熙三十九年迄於乾隆十八年之事緝為前編凡五十四卷繼是都爾伯特台吉䇿凌䇿凌烏巴什輝特台吉阿睦爾撤納等先後内屬皇上神武内斷決䇿命將分路致討未浹月而直抵伊犂大漠以北𫝊檄底定縛獻達瓦齊於闕下方將衆建渠長分領其部無何阿睦爾撤納偝恩作孽復勞師旅追𠞰賊渠函骨遐方大定而逆回大小和卓木旋肆反噬爰即伊犂凱旋之師移討之於是葉爾羌喀什噶爾諸城以次撫定而拔達山汗素爾坦沙遂擊殺二酋獻馘軍門大武告成邊陲永靖爰紀乾隆十八年十一月以後訖於二十五年三月戊申之事為正編凡八十五卷是月庚戌以後至三十年十一月凡善後經久設官置屯定賦鑄錢諸政及極邊新附諸部事宜為續編凡三十二卷於列聖垂謨經逺暨我皇上始而撫綏駕馭繼而決幾制勝以及奏凱後持盈保奏為遐方籌久安之盛心實政一一臚載西師顛末具見於御製詩篇及告成勒銘諸碑文昭如日月是編所載按次條系彌為詳悉云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書平定準噶爾方略卷首欽惟大清受命有天下列聖重光凝庥篤祜仁風翔于六合武烈靖乎八紘雕題漆齒編結沮顔之國五帝不能服重譯所未至者莫不陸讋水慄頓首受吏乃厄魯特準噶爾者别出有元阿魯台之部其後聲譌為厄魯特散處西北私立名號國初其酋曰顧實汗始統有都爾伯特青海北厄魯特套西諸部自天聰崇徳之間遣使入貢世祖章皇帝錫之冊印俾統其衆厥後噶爾丹起自北厄魯特自立為台吉狡黠桀驁阻兵安忍侵我屬國喀爾喀攘竊牲畜洊食鄰封惡不可長聖祖仁皇帝怙冒同天地神武震雷霆躬鞠六師直抵拖諾山逆酋駭竄奔命西路大兵邀其去路擊之昭莫多盡殱其屬明年駕復親征出狼居胥山獲逆子塞卜屯班珠爾獻俘行在噶爾丹仰藥死厄魯特等咸厥角稽首請受纓縻於是諸部悉定振旅還都乃俞廷臣之奏編纂親征平定朔漠方略昭示億萬世堂哉皇哉殊勲偉烈書契以來靡得而尚已噶爾丹既殞其兄子策妄阿拉布坦者舊與噶爾丹搆怨至是懾我天威卑詞丐命聖祖宏覆載之仁予以矜宥詎狼子野心旋復梗化擾哈密襲西藏又戕殺拉藏汗横恣日甚屢煩天兵申討問罪已又納我青海叛臣羅卜藏丹津恃其險逺為逋逃藪其子噶爾丹䇿零同惡世濟更肆跳梁世宗憲皇帝特彰撻伐命將出師大破之於額爾得尼招諸酋􅌶懼悔過待命爰許其定界撤兵皇上徳威遐播噶爾丹策零奉約束惟謹遣使通貢乃更准其貿易仍定以年限俾不得違例瀆請葢所以撫綏而控馭之者如此其至也洎䇿妄多爾濟那木扎爾繼立昬暴日甚舉部離心喇嘛達爾扎以孽子簒逆而達瓦齊復踵故智盗竊其位數年之間内亂頻仍厥衆瓦解呼天内向乾隆十五年宰桑薩拉爾首先歸附十八年都爾伯特台吉䇿凌策凌烏巴什等率所部萬餘人來降十九年輝特台吉阿睦爾撒納亦率部人内屬乃召見熱河錫以崇爵推誠布恵恩禮優渥皇上念天地祖宗中外之統仔肩在今今鴻貺備臻授我西土時不可失廟策内斷與神為謀二十年二月命將軍班第等帥兵分西北二路尅期進發以其降人為我前驅所至號令嚴明秋毫無犯一切部勒機宜悉承上指授遂踰雪嶺越沙磧不留不處罙入其阻噶爾藏多爾濟等望風降附諸部泥首頓顙若旱喜雨師出未浹月直抵伊犁蕩平準噶爾大漠以北傳檄底定並獲數十年之逋囚羅卜藏丹津及巴朗等獨達瓦齊脱身遁前軍進躡及之于格登山盡獲其人卒馬駝器械回人阿奇木霍集斯伯克縛達瓦齊詣軍門降後先獻俘闕下上御午門受之于是廷臣以漠北耆定皇帝文武聖神功徳隆盛請上尊號上弗許祇敬上聖母崇慶慈宣康恵敦和裕夀純禧皇太后徽號命所司察典禮祭吿天地宗社山陵釋奠孔子嶽瀆神祇咸秩無文頒詔中外酬庸賚功覃恩加秩蠲租肆赦廣額取士慶賜遂行復御製碑文勒石太學並伊犁格登垂示永久維時我皇上體好生之徳擴如天之度方將分封衆建各立渠長於準噶爾四衛拉特一如䝉古諸部恩威並濟咸與維新乃逆賊阿睦爾撒納潜懐異圖煽誘黨與負恩叛亂臺路中斷帥臣死綏爰命將致討所向克捷其徒黨多倒戈内附逆賊計無所出恇懼逺颺走哈薩克逆黨復蟻聚草竊皇上赫然震怒于二十二年二月復詔分南北兩路出師再抵伊犁適諸酋扎那噶爾布等互相殘殺逆賊阿睦爾撒納逃往哈薩克復歸伊犁我師奄至諸酋面縛軍門逆賊孑身復遁我將軍率衆追捕途遇哈薩克之兵其渠長仰慕天朝稱臣奉貢且誓擒賊自効逆賊技窮亡命入俄羅斯界罪貫既盈旋伏㝠誅俄羅斯遵守舊約不納逋逃遂函其骨請使驗實葢自阿睦爾撒納之叛再煩天討我皇上神謀豫定睿慮無遺用使逆魄潜褫同惡就殱準噶爾之事於是大定徳威所被遐邇慕思東西布魯特左右哈薩克及塔什罕諸回部莫不喁喁嚮化絡繹請朝聲教所訖極于無外而逆回大和卓木波拉泥敦小和卓木霍集占者昔為厄魯特囚於阿巴噶斯天兵耆定伊犁之日釋而出之助以將卒俾長舊部乃敢背恩反噬黨我叛賊戕我王官此而不誅何以伸國威正天討爰命即以伊犁凱旋之師往征不庭既屢下堅城乗機直進逼其巢穴猶敢奮螳臂抗顔行遮我將軍於黒水皇上炳于機先早調援兵戰騎應時繼進賊衆摧敗我將軍整陣還阿克蘇已復稟承廟謨分路刻期進勦兩酋恇駴不得枝梧率逆孥輜重潜遁葉爾羌喀什噶爾諸城以次收撫綏定盡入版圖我師復窮追逆酋于拔達山其汗素爾坦沙讋我威稜遂先後擊殺二酋而以霍集占之首遣使詣軍門獻馘罪人斯得懸示藁街大武告成邊徼永靖乃舉行慶典一如平準噶爾時郊勞策勲論封行賞並繪諸戰圖及諸功臣像於紫光閣御製像賛以旌勲庸其善後事宜更以次擘畫要諸久逺統計兵興以來閲時不踰五年拓地逺逾萬里取荒裔若庭户縛醜虜如圏牢𨽻職方者籍租税附屬國者奉琛賮北斗以北西濛以西悉主悉臣罔有内外開闢以來未有懿爍隆茂若斯之盛者也臣等既奏請編纂平定準噶爾方略以繼聖祖平定朔漠方略之後昭示偉績荷䝉俞允開館纂修復獲從事鉛槧之役不勝欣幸謹編年繫月自康熙三十九年至乾隆十八年為方略前編自乾隆十八年都爾伯特台吉策凌等内附迨十九年命將出師以至平定伊犁回部凱還錫宴為方略正編其大功告成後經理新疆凡設官定賦屯田鑄幣諸務與極邊以次新附各部入覲錫賚諸典禮為方略續編共若干卷凡聖祖世宗之耿光大烈暨我皇上始而撫綏駕馭以大字小之聖心繼而燭幾料勢制勝廟堂之睿略以及奏凱後持盈保泰計久長慮深逺之神謨皆臚列顛末具著於篇垂示無極第臣等學殖蕪陋才識檮昧雖罄竭管蠡懼不足仰窺天地之髙厚宣日月之光華承乏編摹無任悚仄云爾平定準噶爾方略卷首
