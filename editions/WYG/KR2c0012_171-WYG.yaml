body:
  text: 乾隆三十年八月戊申陜甘總督楊應琚疏奏招募烏魯木齊屯田戸口數目楊應琚奏言上年八月間欽奉恩㫖令將甘省與新疆接壤居民量其道路近便遷移烏魯木齊俾資生有藉曠土愈開臣查烏魯木齊泉甘土沃素為邊氓所慕隨於肅州張掖敦煌等州縣招有七八百戸上年十月奏明辦送兹據肅州申稱招民八百餘戸髙臺縣招民四百餘戸臣一面行文辦理糧務道員在瑚圖畢寜邊城昌吉羅克倫等處查明餘地暨渠水情形可以安插照例給與車輛口食派員於八月内管送前往其來歳應招户民仍俟查明安插處所照例辦理奏入報聞己酉諭駐劄和闐總兵官巴延弼潔已和衷毋擾回衆上諭軍機大臣曰巴延弼已授為宣化鎮總兵官命往和闐辦事伊得㫖後若來京請訓往返有需時日著即由彼馳驛前往和闐因思駐劄大臣等多官於内地習尚安逸既以邊隅為勞苦又或不能同寅協恭或不能潔已自愛苛擾其下滿洲世僕豈宜出此即如素誠在烏什貪淫敗檢竟致激成叛亂已身被害并子嗣俱無所逃罪和誠在和闐隱匿應貢之玉又重利盤剥回人亦經治罪正法其明鑒也大臣等果能正己率屬與同官和衷集事將來年滿撤回必加恩擢用著傳諭巴延弼朕因其人尚可用予以奮勉之階伊至和闐當以素誠和誠為戒再和闐采玉係常年土貢毎派出回人供役伊等倘怠玩隱匿自當加意約束若効力行走尚屬勤謹則應酌量賞給以示鼓勵不可絲毫擾累庚戌飭諭伊犂將軍明瑞等不早圍困賊人並誡毋姑息納降上諭軍機大臣曰明瑞阿桂等奏稱賊勢較前衰弱伊等於七月初九日領兵逼近城根掘溝築牆防其迸逸忽東門突出賊衆二千為官兵擊敗入城仍不時衝突城西亦然現在各門俱築長圍俟疊砌堅固自無所逃等語看來我兵從前離城甚遠且掘溝築牆一事何以早未計及若謂兵不敷用明瑞身為將軍即應據實陳奏再伊等奏内有賊人欲割城下未熟之黍為我兵擊敗之語烏什賊人滋事始於二月計其耕種之期不過三四月間何以未聞驅逐毁棄若似此圍困賊人雖經年看守亦不能竣事明瑞等著嚴加申飭至伊等既以長圍困賊無路可逃若仍准納降則姑息過甚斷不可行明瑞等務遵節次所降諭㫖辦理己未命議叙奮勉勦賊官兵上諭軍機大臣曰明瑞等奏稱七月十八日至二十四日賊人屢次出城衝突俱經擊敗等語賊勢窮蹙至此尚敢行抗拒情罪可惡即明瑞等亦知其不可招降矣至官兵等遇以死拒守之賊人能奮勇攻擊甚屬可嘉前已諭明瑞等查明分别奏聞著將此次查奏之出力官兵交部議敘嗣後官兵内有奮勉出衆効力者俱著詳悉存記俟事竣奏請加恩優叙諭伊犂將軍明瑞等查辦和闐滋事回人上諭軍機大臣曰明瑞等奏准額爾景額咨稱阿什黙特所屬回人呢雅斯克伊葉斯常唆聳阿什黙特苛虐屬人不可留於和闐臣以呢雅斯等如何唆聳阿什黙特之處並未有確實證據遽行遣往伊犂恐阿什黙特不無疑懼若訪聞屬實則阿什黙特亦不可留於和闐行令查明定奪等語所見甚是但此案應行質訊之人明瑞應調集該處查辦不當仍委之額爾景額若此時尚未辦結仍著明瑞咨調辦理至回部伯克等如果擾累屬人縱加以寛宥亦難弭其疑懼之心著傳諭明瑞阿桂等查明此案情節若係呢雅斯克伊葉斯倚勢横行阿什黙特失於覺察則呢雅斯等治罪後阿什黙特亦不可仍留該處酌量與别城阿竒木伯克等對調若阿什黙特因聽呢雅斯等之言自行苛虐回人即將呢雅斯克伊葉斯辦理阿什黙特送京安插亦可丙寅諭伊犂將軍明瑞等議叙勦賊官兵及預籌駐兵事宜上諭軍機大臣曰明瑞等奏七月二十八日派巴圖魯兵六百三十餘名分為兩隊取城調伊犂遣犯十二人㩦雲梯前列攻東北隅之兵乗賊未覺鼓勇先登奪據城垣有騎賊來援俱不能上惟在近城房屋拒守攻西南隅之兵因賊已知覺防守未能登城近城之賊又放鎗拒戰恐官兵有失始行撤回此次登城勦賊奮勉可嘉惜西南隅登城稍緩否則竟可克城竣事矣計賊人心膽已寒必至内潰著傳諭明瑞阿桂等將此次効力出衆得傷陣亡之人俱查明具奏候加恩敘䘏其發往伊犂人犯果有出衆効力者亦應加恩或可即令充補緑旗兵丁著一併查奏至另摺所奏官兵不便與回人雜處如沙雅爾等城未嘗駐兵頗屬安靜而烏什有兵轉致滋事不若將各城官兵調集駐劄一處庻兵力不分而擾累回人之弊可杜等語所見非是烏什有事特由素誠激變卞塔海又辦理不善以至如此豈可謂回人無端滋事若因此謂回人俱不可信則烏什事起伊等當羣相附和何以絶無動靜朕前諭將該處城垣毁拆今可毋庸辦及或駐劄緑旗兵屯田或移阿克蘓大臣駐劄亦可至合兵駐劄一事即地方全定亦當於四五年後辦理倘倉遽行之回人等必以我有鑒於烏什而防閑太過不但徒起猜疑亦非所以彰國體所奏不可行俱著傳諭明瑞阿桂知之丁卯諭烏什各城更調駐劄事宜上諭軍機大臣曰據明瑞阿桂等奏烏什平定後酌議駐兵一事朕已諭將該處城垣不必拆毁各城駐劄大臣當以烏什為總滙之地著永貴駐劄辦事其阿克蘓毋庸駐劄大臣官兵即移於烏什綽克托亦著協辦烏什事務兼轄阿克蘓喀什噶爾事雖不煩栢琨一員尚覺不足著與額敏和卓同辦事務其各城大臣仍依舊制烏什等城俱聽伊犂將軍管轄隔一二年親往各城巡查一次至烏什地頗肥饒多駐緑旗兵似於屯田有益一切駐兵籌餉事宜著明瑞阿桂等㑹同詳議具奏九月戊寅伊犂將軍明瑞等疏奏克復烏什城明瑞等奏言八月初九日五鼔烏什城内有賊三四百人來衝西南隅長圍垜口本隊侍衛玉麟領隊大臣觀音保侍衛訥蘓領索倫兵侍衛烏勒木濟巴顔布伊什等協力勦殺自此賊人固守不出臣等計斷賊人登瑚什塔克峰之路添築一臺兩垜以擊登山之賊十二日賊勢窘廹有賊十騎領歩賊四百餘人直犯新築垜口公品級素賚璊伯克薩里等迎敵瑚什塔克峰賊衆來援侍衛阿克棟阿伊達禮海禄副總管庫庫濟克䕶軍校穆克登布等領兵直出垜口衝擊臣明瑞同侍衛保寧永泰佛倫泰前鋒薩炳阿整兵繼進臣永貴臣額敏和卓臣鄂寶以大礟横擊據葉什屯山角垜口佐領碩通伯克阿三布魯特比伯爾克侍衛沙瑚善卡倫侍衛伊什等俱領兵合隊追至城門計此次殺賊百餘人生擒一人我兵得傷二人傷輕者七人陣亡厄魯特一名自築圍以來我兵中礟陣亡者一名得傷者三名又另片附奏云於十五日克復烏什城其首逆額色木圖拉及有名賊衆俱已拏獲俟將各賊嚴行𠞰殺後再將辦理情形詳悉具奏奏入上諭軍機大臣曰今日得明瑞等奏摺僅將八月初九等日與賊相持及為從前守垜陣亡得傷人等聲敘請䘏並未將如何克復回城擒獲賊首情形具奏祇於奏片中渾含數語即得城後有急需辦理之事不及詳悉陳奏亦不應簡略至此著傳諭明瑞阿桂等將入城擒賊情形逐一作速奏聞其城垣形勢及官兵所築長圍臺垜攻守大槩俱著繪圖呈覽又諭曰明瑞等奏稱八月十五日克復烏什城等語烏什賊衆敢行叛逆據險死守久抗大兵甚屬可恨今罪人斯得著傳諭明瑞遵節次所降諭㫖辦理此次烏什一事進𠞰半年僅能克復明瑞阿桂俱朕簡用之將軍大臣如此辦理遲滯幸免於罪足矣豈當復予議敘其在事官兵俱各奮勉効力較從前平定伊犂回部時戰功猶覺過之著明瑞等將官兵内著有勞績及陣亡得傷者分别查明具奏交部議敘議䘏其烏什駐劄大臣官兵之處俱遵前㫖行辛卯伊犂將軍明瑞等疏奏辦理烏什逆賊情形明瑞等奏言臣等領兵築垜圍城賊人屢次衝突俱行𠞰殺城内薪芻俱斷惟拆屋取茅以支旦夕人口馬匹倒斃甚多賊衆各生怨恨而額色木圖拉仍嚴行脅衆凡欲出投降者即行殺死或折其手足暫行監禁復將餘糧運至黙勒徹爾山上據險茍延有原充烏什商伯克之沙布勒三次差人來告欲擒首惡以獻臣等並未允降八月十四夜有二人出城告知沙布勒錫喇卜阿琿等現在擒拏助逆各犯等語及天曉沙布勒已先將助逆要犯四十二人獻出次將額色木圖拉及其子阿穆爾努拉壻塔伊勒等拏獲到營臣等即將首惡監禁一面遣人入城見各處尸骸甚多大小戸口尚存一萬有餘因闗閉城門將舊伯克及賊人所用伯克姓名依次開列又將軍器收取傳集回人布魯特人等將額色木圖拉等首惡即行凌遲處死並將中箭身死之首惡賴黑木圖拉尸骸掘出剉磔此外有名賊犯俱行正法錫喇卜阿琿等雖隨同擒賊但與賊同謀已久所有伊等兄弟子姪六百餘人又魯克察克人等有附和首惡分管回衆看守城垣者其十三歳以上男子四百餘人亦行正法額色木圖拉一戸婦女幼子派員解京其餘俱已分給現在軍營之官兵訖至沙布勒一犯當逆賊倡亂時因押送伊犂戸口並未在城迨聞信䟎回欲與駐劄大臣共辦逆賊而衆皆歸附賊首因托病不出今擒賊獻城將同謀肆惡各賊逐一指出尚與衆賊有間應作何辦理恭候諭㫖其餘被逆賊拘禁折斷手足之人及被殺人等之兄弟子姪又不食逆賊口糧各項匠作僕役窮苦之人以及分給官兵餘乗之婦女幼子大小共一萬餘口分為四起解送伊犂分别辦理奏入上諭軍機大臣曰明瑞阿桂等奏稱烏什賊衆擒獻首惡已分别正法及送往伊犂辦理等語昨據伊等奏報克復烏什語甚含糊距今十二日始以查辦賊衆具奏而所辦又極乖張錯謬即如賊人戕我大臣官兵以死拒守及長圍久廹始縛獻首惡希冀茍免誅戮準以天理人情豈復可赦惟盡以軍法從事始足申國憲而儆愚頑乃辦理半年不能速為擒𠞰仍待賊衆窮急自獻始稱竣事豈不貽各回部布魯特人等姍笑且朕屢降諭㫖特以此等回人逞兇肆惡若不大示懲創將來或効尤滋事轉非辟以止辟之道今伊等既從事姑息著將送往伊犂人等即交伊二人養贍再伊等從前請於烏什駐兵屯田朕已諭令籌議今另摺所奏忽將五福所領緑旗兵撤回何錯謬至於此極所有官兵來往資糧俱著伊二人償補且前諭得城後查核素誠阿卜都拉等一切情事原欲詳其顛末傳諭中外而額色木圖拉既擒亦應訊取確供再正典刑乃一味草率完局不知伊等十數日來所辦何事由此觀之則所查正法之賊人亦皆聽信人言未能脗合情理此必明瑞顧念家室早欲回京而阿桂亦思早至伊犂更替明瑞阿桂著交部嚴加議處俟烏什事竣均即往伊犂候㫖又諭曰明瑞等奏烏魯木齊緑旗兵令五福帶領䕶送移解回人後再行撤回於八月二十一日起程等語著傳諭五福伊所撤之兵若距烏魯木齊尚遠仍令回至烏什或相去已近自當暫為休息俟正月前往以不悞春耕為妥若謂此次派出官兵業經往返即另派亦可以伊犂將軍明瑞等辦理烏什舛謬宣諭中外上諭大學士曰明瑞阿桂等辦理烏什回城一事已降㫖交部嚴加議處但奏摺並未抄發恐衆人不悉其中原委或疑回人既已平定何以不行議敘轉加議處今將伊等奏摺抄發俾衆共知其舛謬之處不一而足即如今春烏什逆回賴黑木圖拉等因素誠激變據城抗拒特命明瑞阿桂帶領官兵前往辦理伊等初至時朕因烏什蕞爾孤城又無外援易於收復官兵毋庸悉鋭進攻輕攖鋒鏑是以令伊等惟嚴圍困之計使賊回勢窮力蹙則乗機攻𠞰尤為事半功倍今圍城已及半載逆回芻糧乏絶馬斃人饑自生離叛此時攻取易若摧枯況既知賊衆内潰并聞城内倉皇救火聚集驚惶即當統率大兵悉力攻城誅殺賊衆以揚我武乃兵已臨城尚退列壘内及經回衆將要賊獻出始行入城復闗閉城門收獲鎗礟弓箭種種示怯全不知奮勇任事則回城之復定尚得謂由伊等收取耶我國家定鼎之初兵威丕振雲梯所向立破堅城從未有稍存畏葸退縮不前之事不謂伊等於烏什彈丸之地選愞周章損我國威伊等罪實在此至素誠等苦累回人各情節雖從前得之俘囚之口今額色木圖拉等正犯既經就獲理應嚴訊起釁縁由及素誠所犯是否屬實使情罪確鑿以成信讞而衆共曉然方結此事之局乃伊等一槩置之不問輙將賊黨正法有是理乎明瑞阿桂此次辦理節節錯謬不得不交部議處以示懲創其在事將弁兵丁仍交部分别議敘朕辦理庻務一秉大公賞罰悉期允當此天下臣民所共知而於軍令賞罰之際更所慎重兹將伊等原奏抄發俾衆共知自見其辦理之無紀緒也並宣諭中外知之甲午伊犂將軍明瑞等疏奏查詢阿卜都拉被害各情形明瑞等奏言烏什阿竒木伯克阿卜都拉當賴黑木圖拉聚衆之時已被監禁後為賊人所害逆賊賴黑木圖拉欲納其長女而伊妻嫉妬遂暗行逼害臣等伏思阿卜都拉雖無獻女賊人之事但縱容所屬激變回人罪無可逭今伊身已被害其所生三子二女現被逆賊監禁似可從寛交與撤回官兵帶往哈密奏入報聞辛丑諭伊犂將軍明瑞烏什酌駐官兵事宜上諭軍機大臣曰明瑞等奏稱烏什新定應酌量留兵五百名滿洲兵以副都統舒泰乾清門侍衛保寜管轄索倫兵以原任總管達克塔納管轄緑旗兵以乾清門侍衛法靈阿管轄並請於効力贖罪人員内留原任協領伊昌阿原任三等侍衛舒明阿管理工作留原任御史忠德管理糧餉其屯田事務調巴里坤遊擊陳堯典辦理等語烏什事竣滿洲索倫兵無須多駐著留滿洲兵一百名索倫兵一百名前據明瑞等請派緑旗兵屯田已諭將五福所領兵丁留駐乃伊等忽令撤回業經降㫖申飭著仍遵前㫖量其行走之遠近若已抵烏魯木齊即於來年正月起程或另派亦可五福亦不必再往烏什仍留烏魯木齊著楊應琚於副將内揀選一員由烏魯木齊領兵前往烏什其管轄兵丁預備差遣各員俱照明瑞等所請行將此傳諭知之冬十月己酉諭伊犂將軍明瑞等各城阿竒木伯克毋庸更調上諭軍機大臣曰明瑞阿桂等奏稱葉爾羌喀什噶爾阿克蘓和闐之阿竒木伯克等多不滿物議此内惟鄂對人尚可用阿什黙特亦能辦理事務至噶岱黙特色梯巴勒氐聲名較前稍減除鄂對駐劄葉爾羌外請將噶岱黙特調往阿克蘓色梯巴勒氐調往和闐阿𤓰斯伯凱補授喀什噶爾阿竒木伯克等語所見又屬錯謬鄂對等皆歸順舊人且遇有軍務頗能出力報効此次若盡行移調則回人布魯特等不知情事妄啓猜疑謂國家乗新取烏什之威將伊等更調若謂伊等貪圖小利亦回人常事安能保其必無惟在大臣等正已率屬賞罰嚴明地方自必安靜毋庸更調紛紜轉滋惶惑即如所奏伊等應行更調之處亦未有確實欵蹟不過得之物議又可盡信乎況明瑞等從前尚欲盡撤各城大臣倘從所請則將來伯克等之賢否復以何人為之體察可謂自相刺謬矣所有更調阿竒木伯克之處俱不必行惟伊等另摺所奏善後事宜尚屬可行著交軍機大臣議奏甲寅議回部善後事宜伊犂將軍明瑞等奏言臣等欽奉諭㫖㑹議回部事宜定為章程以昭法守謹將回部各城應行更正之處列欵具奏一阿竒木之權宜分查各城舊制以阿竒木伯克總辦事務相沿既久體統益尊而大臣或不能兼聽並觀惟阿竒木是信伊等遂任用私人侵奪小伯克等承辦之事以致諸弊叢生請嗣後一切事件阿竒木伯克俱先交承辦之員俟其呈稟仍與伊沙噶伯克㑹商若有仍前攬權獨辦許伯克等於該駐劄大臣前控告查訊得實即治阿竒木之罪虚者反坐一格訥坦之私派宜革回人賦税頗輕惟厄魯特時有格訥坦名色以備差務毎年各城派四五千騰格不等俱係臨時酌派並無定額易滋擾累侵蝕諸弊今各部落使人已官給口糧羊隻大臣等俱有養廉自應將前項陋規禁止查照從前吐魯番定制豫擇富戸給與地畝令其輪值毎戸一二年間輪辦一次以裕回人生計一回人之差役宜均從前厄魯特時每年派哈喇罕一人和卓一人將各城回人户口賦役造冊開除老弱衆所共知後來漸生隱匿賄脱之弊應請仍循舊規每間一年派委妥員查核一次若有輕重不均一經首告訪聞即將該阿竒木等議處一都官伯克之補用宜公查該伯克總辦回人差務最易射利居竒且有阿竒木等之子弟親戚踞為利藪請嗣後該伯克缺出必與伊沙噶噶雜納齊商伯克公同保舉其阿竒木等族姻俱令廻避一伯克等之親隨宜節伯克所用親隨謂之顔齊向有定額惟取中等人戸有陞調别城者但按品級稍為増益今則濫行挑派多至數倍且必派富戸其應納賦税攤入他戸伯克等從中侵蝕而顔齊等又挾制伯克市權攬事擾累回人請將各該伯克之顔齊令阿竒木等公同查核如有額外挑派槩行革除一賦役之定額宜明回人等毎年應辦賦役俱由伯克指派並不預為曉示以致放富差貧種種擾累應請將現辦賦役定額令該大臣等以印文榜示俾衆共知如有不遵定額偏枯擾累准其控告虚者反坐一民人之居處宜别内地貿易商民將來漸多所居或與官兵相近尚可彈壓不令生事若聽其隨意棲止與回人相雜不免易滋事端請交該大臣等徹底清查俱令赴駐兵處所貿易若仍與回人雜處即行治罪一伯克等與大臣官員相見之儀宜定自平定回部以來阿竒木以下伯克並無接見定例以致該大臣等有妄自尊大者請嗣後阿竒木伊沙噶伯克見大臣官員等照總管副總管例其餘伯克俱照官兵之例仍令大臣官員等不得稍形簡傲奏入得㫖軍機大臣議奏尋議阿竒木伯克自當秉公率屬與伊沙噶噶雜納齊伯克等各司其職其都官伯克承辦一切差徭與小戸回人最近亦當公同保舉至伯克等親隨尤宜量行挑選嚴加約束不得派出富民致游手日増賦役暗絀又如除額外之陋規核本年之戸口示賦則以防求索之端定儀注以杜驕矜之漸俱係革弊安良之要務誠如聖諭俱屬可行應請通行各城駐劄大臣遵照辦理近奉諭㫖著伊犂將軍一二年内巡查回部一次應令該將軍一體留心稽察奏入上從之諭將軍明瑞等即回伊犁辦事上諭軍機大臣曰今烏什事竣已經兩月明瑞等即應回伊犂辦事設謂尚有未完之件此等瑣屑事務豈一時可了逐細捜尋轉屬無益且永貴額敏和卓等亦可陸續辦理著傳諭明瑞阿桂與永貴交代後即行起程不必久留烏什丙辰命改鑄總理回城事務印信上諭軍機大臣曰明瑞奏稱阿克蘓官兵俱移駐烏什所有舊頒印信應送部繳銷請另行鑄給等語著該部鑄給總理各回城事務參贊大臣印一顆兼清漢篆及回部字體頒給戊辰命敘卹克復烏什有功及陣亡得傷官兵上諭軍機大臣曰明瑞等奏稱克復烏什官兵於閏二月初六日及六月十八十九二十二十九等日七月二十八日歴次勦賊圍城著有勞績及陣亡得傷之官兵回人等遵㫖分别等次造冊送部請加恩敘卹等語著加恩將有功陣亡得傷之官兵回人等俱分别議敘議卹具奏十一月庚寅伊犂將軍明瑞等疏奏辦理烏什回人情形明瑞等奏言臣等前奏將烏什回人送往伊犂續奉諭㫖將伊等送往内地賞給大臣官員等為奴臣等於十月二十一日㑹商並詢問分起帶領之大臣等俱稱此等回人沿途每欲逃竄屢經追獲又竊食官兵馬匹至伊等彼此搶奪鬭毆無時安靜實屬怙惡不悛若離其妻子長途遠送必致滋生事端除病斃及正法匪犯共三百六十餘人外查明從前並未從賊致被監禁折足及棄其妻子出降者共九十一人應從寛貸其餘始終助惡回人二千三百五十餘名臣等帶領官兵於二十三日行至摩多地方俱經正法所有婦女俱配給無妻之索倫察哈爾厄魯特等兵丁其年老婦人童稚男女賞給各官兵為奴臣等因此等回人未便送往内地是以酌量辦理奏入報聞臣等謹按西陲大功告成回城久經綏輯開屯増市薄賦輕徭耕牧恬熙人安樂利烏什蕞爾彈丸自外生成敢作不靖特以駐守之臣拊循失律逆回賴黑木圖拉等脅衆攖城抗顔負固皇上炳照幾先灼知召變所由既正刑章載申軍律調兵攻𠞰親授機宜破其間諜之謀斷其樵蘓之路深溝髙壘食盡力窮既而賊黨自擕縛渠來獻皆本聖主乙夜疇咨信賞必罰是以逋誅六月拉朽一時克復之機罔踰睿算且烏什壤雖褊小實處阿克蘓喀什噶爾之交憑瑚什塔克峯之險亦諸回城聲援聨絡奥區也伏讀御製戰圖補詠序文有云初以王師勦逆撫順不可無故奪之今值彼變亂自取屠滅因以為回部適中官軍都㑹之地是又開惑論所謂愈變而愈康者大哉皇言向者準夷既定必經阿逆之餘燼就灰而衛喇永靖及回部既平亦經烏什之蘖萌旋折而雜種胥寧葢天純佑我國家所以因小變而益致久安其信如操劵者若此皇上諭臣等以正編成於庚辰西師之凱旋續編成於乙酉烏什之蕆事豐庸所著靈貺交臻為依古史書所未有臣等謹述善後事宜推本聖謨昭垂法守竊愧管牖之識末由導揚萬一云平定準噶爾方略續編卷三十二
