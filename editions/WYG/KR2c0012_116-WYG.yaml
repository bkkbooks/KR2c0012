body:
  text: 乾隆二十三年九月甲辰定邊右副將軍䇿布登扎布疏奏哈喇哈勒巴克部落歸誠䇿布登扎布奏言臣之䕶衞巴圖魯自哈薩克囘營具稟在哈巴木拜游牧遇哈喇哈勒巴克之庫楚克和卓告稱我等從前被哈薩克搶掠今聞哈巴木拜等歸順亦情願投誠具呈乞為轉奏譯其呈文云管哈喇哈勒巴克六萬戸之庫楚克和卓等大小共議聞得大皇帝撫納諸部願為臣僕若有逃人即擒拏解送我等來使因哈巴木拜等不肯導送是以由超勇將軍之䕶衞處具呈懇求轉奏等語復將呈文與哈巴木拜閲看據稱伊等歸誠是實但游牧太逺難於往返從前伊部落人等曽害我阿布勒哈里之弟布勒哈里我阿布賚等領兵相攻伊逺移游牧又為布海爾之人搶掠衆各分散今聞我等歸順亦欲投誠仍囘舊游牧我等亦曽相許等語謹将原文進呈御覽奏入報聞申諭㕘贊大臣富徳速往䇿應兆恵上諭軍機大臣曰據䇿布登扎布奏稱派員探聽富徳信息知右哈薩克並無哈薩克錫喇於九月初間可以囘抵伊犂又伊等從前遇哈薩克之額爾類查詢情節據額爾類等告稱哈薩克錫喇因係舊識未免疎脱現在並不敢蔵匿仍依其土俗銜鎗設誓等語哈薩克錫喇若尚未弋獲或仍在附近幽僻地方蔵匿不過一賊匪耳亦何能為自可徐為訪緝惟辦理囘部最要可𫝊諭富徳此時諒已奉到節次諭㫖今阿克蘇又已乞降即速至彼處䇿應兆恵以奏膚功䇿布登扎布仍囘游牧休息所奏郡王羅卜蔵多爾濟患病前已降㫖令囘游牧而伊感激思奮懇請留軍營効力著加恩賞戴三眼翎亦著仍囘游牧又䕶衞巴圖魯前往哈薩克頗著勞績著賞縀四端以示鼔勵丙午定邊将軍兆恵等疏奏阿克蘇囘衆歸誠兆恵等奏言臣於八月二十日輕裝急度阿勒坦呼斯坦嶺二十二日至雪山口聞雅爾哈善等已過賽里木向阿克蘇臣星馳兩晝夜約四百餘里二十四日五鼔與雅爾哈善相㑹據告稱己令端濟布領兵五百名前往臣於二十五日午刻抵阿克蘇囘衆先已歸降臣領兵巡察囘衆等携子女跪迎城上鳴鉦擊鼔雜以管籥臣等入居公廨據頭目摩羅阿舒爾等稟稱霍集占将伊親信之阿布薩塔爾授為伯克自庫車敗囘阿克蘇時阿布薩塔爾帶城外數百戸強行隨往我等固守殺伊所屬八十餘人幸大兵前來招撫從此永為天朝臣僕等語臣等曉示云大皇帝為天下共主薄海内外罔不賓服屬在遐荒撫綏一體各從本俗以安生理準噶爾狡詐俱已勦滅哈薩克布魯特等盡皆歸附惟霍集占悖逆不道是以興師討罪爾等被脅附和本應從坐今既悔罪投誠謹遵恩㫖待以不死安堵如故囘衆仰天額手叩頭稟稱我等幸蒙撫納斷不敢稍懐貳心現在五千餘戸約二萬餘人所有土田計籽種三四千石摩羅阿舒爾阿琿等俱係出家之人今公議推頗拉特為總伯克巴巴克等分管事務伏祈裁奪等語隨以食物來獻臣等受其飲食還其牲隻𫝊集大小頭目及與霍集占相拒人等分别賞給縀疋荷包茶葉囘衆歡喜叩謝臣等伏思頗拉特巴巴克等既為衆所推擬以散秩大臣鄂對為總管伊等副之并調貝子玉素富辦理事務留總兵閆相師領綠旗兵八百名駐防城池收穫糧石又聞伯克霍集斯及其子漠咱帊爾在烏什城内因馳書招撫一面挑選兩隊官兵二千八百餘名以侍衞噶布舒喀喇為前鋒偵探霍集占所在務期擒獲奏入上諭軍機大臣曰據兆恵奏稱大兵已抵阿克蘇囘衆出降現在領兵速進計霍集占不久就擒朕佇待伊等捷奏從前雅爾哈善兵抵庫車見城堅難克即諉之額敏和卓朕已料其無成嗣後奏報紛紜茫無端緒致使渠魁漏網兆恵進兵時雖當奨勵額敏和卓資其計畫而奮勇勦賊仍恃我兵力此時霍集占應已逃囘葉爾羌昨詢問侍衞雙全據奏葉爾羌城中乏水須從外引入可𫝊諭兆恵如兵至葉爾羌萬一賊衆仍如庫車之堅守則先斷其水道亦是一䇿其或霍集占棄城逺竄投入布魯特及痕都斯坦等部落亦即速往追襲毋失事機又諭曰兆恵奏稱撫定囘城以鄂對為總管等語現在招徠新附令鄂對暫行管理囘可若平定葉爾羌喀什噶爾辦理安插囘衆時朕意不必用囘人為總管仍循其舊制各城分設頭目統於駐劄伊犂之将軍再於庫車派大臣一員管理看來囘部事體将竣其善後事宜更當熟籌妥協俱著𫝊諭知之諭䕶軍統領努三等辦理哈薩克貿易事宜上諭軍機大臣曰努三等奏稱哈薩克哈巴木拜前遣伊子額特赫押送布庫察罕之子前來若便中擕帶貨物即酌量交易至所差納旺俟與阿布賚相見後有大夥貿易人等信息即行奏聞等語從前朕諭伊等若哈薩克既踰貿易之期即將預備商貨量行發囘今思哈薩克人等即今嵗不至明年亦必前來若将貨物帶囘巴里坤來春復擕往烏魯木齊轉覺勞費可𫝊諭努三等將貨物不必發囘即存貯烏魯木齊交屯田大臣等派兵看守豫備來年交易定邉将軍兆恵疏奏審訊雅爾哈善等失機情節兆恵奏言臣奉到諭㫖審訊雅爾哈善哈寜阿順徳訥等情罪分别辦理臣與雅爾哈善相見即𫝊㫖收其印信及節次奏稿又詰問順徳訥聞有賊衆出城既不速行稟報復不悉力追擒以致縱脱首惡至雅爾哈善哈寜阿係将軍㕘贊大臣信順徳訥之䇿誘賊出走並不多派官兵堵截且聞衆口諠𫝊霍集占親援庫車亦未加意偵探防範俱服罪無辭臣𫝊集闔營官兵遵㫖将順徳訥正法雅爾哈善發往屯田處所効力哈寜阿披甲効力其臺站事務請委三泰接管奏入報聞丁未諭留察哈爾官兵搜捕嗎哈沁上諭軍機大臣曰永貴等奏吐魯番公素賚滿等報稱巡查臺站遇有嗎哈沁等追至庫車因大雪迷踪等語從前永貴等派員追捕盜竊軍需之賊未能弋獲曽諭将派往軍營之察哈爾兵一千名内酌留二百名令敏珠爾棟保等帶領搜捕再赴兆恵軍營今兆恵已至阿克蘇官兵足敷調遣可𫝊諭永貴除辦給軍營兵八百名照例整裝外所留兵丁亦一體賞給追捕盜竊臺站之嗎哈沁等務期盡獲不必馳赴軍營命發遣順徳訥之子於廣東上諭軍機大臣曰順徳訥以逹呼里兵丁朕加恩用為副都統伊在軍前并不奮勉効力以致渠魁倖脱核其情罪雖業經正法不足蔽辜著将伊子阿爾綳阿交該部即發往廣東以示懲戒命提督董孟馳赴兆恵軍營分管綠旗兵丁賞治装銀五百兩己酉諭查奏甘肅兵民應行豁免欵項上諭軍機大臣曰甘省牧養馬駝不無賠墊前已特加恩賞其應行著追之項亦有㫖豁免但自去冬以來辦理囘部各省辦送駝騾俱在該省分槽飼養其承辦各官兵或又有賠墊之處至該省承辦軍需雖無派累而小民踴躍急公深為軫念所有本年及來年應徴地丁及各年一切積欠己屢經降㫖蠲免此外或尚有應行寛免之項俱著黄廷桂查明據實具奏候朕酌量加恩庚戌定邉将軍兆恵疏奏伯克霍集斯迎降兆恵奏言臣領兵向烏什進發先𫝊檄伯克霍集斯父子令其擒獻霍集占八月二十九日兵抵哲爾格哲克徳駐宿霍集斯遣其子呼岱巴爾氏賷文來迎譯其文云和闐城伯克霍集斯圖爾璊伯克漠咱帊爾等謹呈從前我等擒獻逹瓦齊䝉大皇帝恩㫖令波羅泥都與我同取葉爾羌喀什噶爾居往曽遣使隨扎倫泰奏明情節詎霍集占不聽兄言拘留天使近從庫車囘至阿克蘇為衆所拒又欲來圖爾璊我等固守不納願為大皇帝臣僕至霍集占原有疑我之心将我子姪分居各城今聞我等歸誠必拏禁我兄阿卜都瓜卜姪阿布薩塔爾等矣臣等詢呼岱巴爾氏據稱霍集占同我父自阿克蘇至圖爾璊時城中頭目欲設席誘伊入城擒獻事洩因遣我父入城令遷其衆於喀什噶爾我父即據城與伊對敵伊始自行囘去等語臣等派侍衞齊凌扎卜等先往招撫隨領兵速行三十日至圖爾璊之烏什城霍集斯率衆來迎行抱見禮至大營跪請皇上萬安臣兆恵中坐額敏和卓及領隊大臣侍衛等列坐令霍集斯旁坐以言慰撫據霍集斯稟稱霍集占敗逃後或往喀什噶爾與波羅泥都相㑹或往葉爾羌俱未可定二城可集衆一萬人今若由烏什至喀什噶爾則山險難行且伊必由葉爾羌逃往痕都斯坦哈喇土伯特㧞逹克山不若徑往葉爾羌伊即在喀什噶爾既與布魯特安集延有隙必不往投仍從葉爾羌經過大兵截擒較易至波羅泥都為人愿謹大兵至喀什噶爾自當歸降惟將軍裁决等語臣詢之軍營諸伯克俱以為實至霍集斯以額敏和卓現為貝勒稍覺謙恭其餘伯克鄂對等俱不加禮伊係囘部望族若即送來京恐附逆者益生疑懼擬遣伊子漠咱帊爾入覲留伊隨軍効力現在招降烏什城囘人五千戸二萬餘口臣即領兵先往葉爾羌一面移檄和闐派侍衛齊凌扎卜噶布舒伯克鄂對等前往其招撫波羅泥都曽奉勅書但中有擒拏伯克霍集斯阿卜都瓜卜之語暫擬恭存先遣霍集斯所屬詭為逃人給與檄文遣往奏入上諭軍機大臣曰據兆恵奏稱伯克霍集斯迎降面陳追擒霍集占之䇿即領兵徑取葉爾羌等語所辦甚合機宜看來囘部諸城自必聞風歸順逆賊不日就擒朕佇聞伊等捷奏兆恵額敏和卓俱賞給荷包鼻烟壺俟成功後再沛珠恩霍集斯有擒獻逹瓦齊之功今又歸誠畫䇿深為嘉悦著加恩錫封公爵賞戴雙眼孔雀翎寳石頂帽天馬褂荷包鼻烟壺用示優眷若能擒獲霍集占當晉加爵賞兆恵即𫝊㫖撫慰至霍集斯有伊子分居各城之語似非長䇿兆恵宜留心體察伊從前與霍集占相助若囘衆有追怨情形或將伊諸子同居一城而伊微覺含怨即令其入覲再伊所言分城居往之故係霍集占内相猜疑殊不可信但既有此語不妨即以此藉口令其同居一城将來囘人中有毁謗霍集斯者若係霍集占黨與自無可疑或其人與霍集占不合而亦怨霍集斯則情形叵測不可聽其久留舊地矣至波羅泥都即能歸命亦不便仍居原處俟擒獲逆賊時再行定奪定邉将軍兆恵疏奏留兵城守等事宜兆恵奏言臣奉到諭㫖綠旗兵丁仍留軍營聽用不必調往屯田查綠旗兵不嫺戰陣馬匹亦甚痩弱臣酌量挑選五百名令髙天喜領隊隨行其二千餘名令閆相師五福等隨後進發俟克取囘城即酌派數百名協同防守及收穫榖石較之已調復撤殊省煩費再烏什既已歸降阿克蘇拜賽里木庫車等處即同内地就中阿克蘇尤為衝要應派大員駐防辦事臣一面調取貝子玉素富遊擊職銜丑逹領兵四百名防守遵㫖將舒赫徳留往烏什阿克蘇其庫車城有㕘將王玉廷及伯克鄂對之子鄂斯璊防守其沙雅爾城亦令兼管仍飭舒赫徳查核囘部貢賦約束兵丁勿令擾累新附其屯田事務俟玉素富到日再行定議奏入上諭軍機大臣曰觀霍集斯望風迎降是囘人畏我軍威將有擒獻霍集占者兆恵成功後亦當稍為休息所有駐兵屯田等事宜自當豫行籌辦朕意於新派索倫兵二千名察哈爾健鋭營兵各一千名内派索倫兵一千察哈爾健鋭營兵各五百共二千名令納穆扎爾三泰駐防伊犂所餘察哈爾等兵各五百酌派七百益以緑旗兵三百共一千名令舒赫徳以頭等侍衛職銜駐防阿克蘇仍餘察哈爾等兵三百益以緑旗兵二百共五百名令鄂實駐防庫車舒赫徳屢獲重譴鄂實全未効力此次當知奮勉贖罪俟駐防數年後派員更換若因久戍思家諸事懈惰仍當重治其罪至平定囘部後諒無難辦理惟派調囘人於伊犂屯田尚須酌量若囘人傷殘者多且伊等地已足用自不必勉強從事如必須派調則宜乘新定之勢稍遲恐伊等安土重遷反覺滋擾再北路之塔爾巴噶台亦宜防守所餘索倫兵一千擬今阿桂帶領駐劄已面為訓諭新兵既經分駐舊兵自宜撤囘凡此籌辦大略可𫝊諭兆恵酌量情形議奏命優卹搜捕逸賊陣亡之索倫兵丁上諭軍機大臣曰富徳奏據瑚爾起報稱在阿里瑪圖河搜捕逸賊索倫兵兆噶見厄魯特二賊踪跡射一人墜馬其一人鎗刺兆噶身死索倫領催約克什勒圖擒兆噶射傷之賊其刺兆噶賊逃走為索倫兵拜喇勒圖追及射死等語兆噶著照陣亡例交部議卹仍賞伊家銀五十兩約克什勒圖拜喇勒圖賞銀各三十兩仍交部議敘辛亥諭定邉将軍兆恵等辦理外藩事宜上諭軍機大臣曰富徳奏稱遇哈薩克之巴魯克詢問伊等入覲之索勒屯巴圖爾及貿易人等曽否起程等語哈薩克布魯特等俱屬外藩伊等入覲雖藉抒誠悃亦為希冀賞賚如果情詞懇切自應准其來京候朕酌量加恩若未經祈請亦任伊等各安游牧何必督令前來可𫝊諭兆恵納穆扎爾富徳等嗣後外藩入覲聽其自來無煩催促即如貿易一節從前因豫備軍需起見今辦理囘部業將竣事無須多辦馬匹伊等即踰期未到不妨將貨物存貯俟其來時再行交易亦不可加之催督於駕馭外藩之道方為允協壬子諭辦理伊犂屯田事宜上諭軍機大臣曰從前因辦理囘部將伊犂屯田事務暫行停止今囘部各城迎降相繼大功計日可成來年駐防伊犂之兵亦已豫為分派則屯田以省轉餉之勞自不可緩軍營綠旗兵丁駐防各城所用無㡬應行派往伊犂并酌派囘人等令納穆扎爾三泰等辦理屯田或将魯克察克哈喇沙爾烏魯木齊等處屯田兵丁移至伊犂再於内地派出兵丁補缺可𫝊諭兆恵納穆扎爾永貴定長黄廷桂等咨商定議具奏一面將應辦之事先時豫備諭定邊左副將軍成衮扎布敘卹追捕烏梁海効力官兵上諭軍機大臣曰阿桂奏稱領兵由察喇斯路向汗哈屯追捕恩克搜勦潛匿幽僻之烏梁海等索倫兵新逹勒圖努竒察滿洲領催阿勒金兵丁王承義喀爾喀兵丁和勒本噶勒蔵等陣亡又溺斃兵丁一名得傷兵丁十一名已行文成衮扎布造冊送部照例查辦等語此次隨阿桂追捕烏梁海之陣亡得傷及効力官兵俱著查明送部照例議敘議卹再所奏拏獲得木齊庫克新疎防脱逃已照例將値班察哈爾䕶軍班株爾正法請將營總班珠爾藍翎侍衛布三泰革職留軍營効力贖罪索倫兵庫塞勒圖等革退從重治罪等語營總班珠爾等此次尚屬効力應交部議敘今既約束不嚴著停止議敘從寛革職留任庫塞勒圖等亦免其革退量加責懲後不為例俱𫝊諭成衮扎布知之諭巴里坤辦事副都統阿里衮調囘阿桂所領年久官兵上諭軍機大臣曰阿桂奏來京請訓馳赴西路軍營酌派所領侍衛官員二三名索倫兵二十餘名將行裝自布延圖先送至巴里坤等語阿桂所領官兵久在軍前自應調囘休息可𫝊諭阿里衮伊等抵巴里坤即令派官兵照看行裝令其由䑓站各囘游牧休息以示體恤癸丑諭定邉左副將軍成衮扎布嚴拏搶奪卡倫之烏梁海等上諭軍機大臣曰昨據舒明奏稱俄羅斯界所設阿噶爾等卡倫被和托輝特之烏梁海等賊人搶奪馬駝致傷兵丁巳派喀爾喀台吉逹瑪林扎卜等㑹同和托輝特扎薩克逹什朋楚克協力擒拏等語此等烏梁海皆青滚雜卜舊屬從前應行治罪因其素性愚昧特加寛貸理宜安静守分乃敢肆意妄行情罪可惡著𫝊諭成滚扎布於北路索倫兵内酌量帶領進勦或即於喀爾喀派老成厯練之人以所部兵丁追獲渠魁正法示衆不可致令漏網巴里坤辦事副都統阿里衮奏於鄂什奚卡倫盤獲軍營逃兵崔文彩正法大學士管陜甘總督黄廷桂奏於嘉峪闗盤獲軍營逃兵李子雲等七名正法冬十月甲寅朔諭定邉將軍兆恵查看囘人阿布薩塔爾踪跡上諭軍機大臣曰昨據兆恵奏報霍集占自庫車敗囘阿克蘇伊親信之伯克阿布薩塔爾將城外數百戸相隨向西等語阿布薩塔爾之叔伯克霍集斯業已歸附此時伊或與霍集占相絶自行來歸或仍隨霍集占俱著兆恵查明具奏乙卯諭大學士管陜甘總督黄廷桂等糧運駝騾不必趲送上諭軍機大臣曰據呉逹善奏稱自哈密至闢展共運送米麵一萬四千七百餘石又自闢展至庫車分三起轉運已行文黄廷桂購驢五六千頭於來春送至托克三哈喇沙爾與駝隻同運糧石等語從前因増派兵丁諭伊等趲運糧餉今囘部諸城迎降相繼逆酋計日可獲所至俱有口糧接濟不須内地運送可𫝊諭黄廷桂呉逹善等現在已送之駝騾即於水草佳處牧放備運伊犂駐防屯田兵丁口糧未送者即在肅州等處飼秣其驢頭一項著停止採買諭定邉將軍兆恵酌量調撤富徳官兵上諭軍機大臣曰昨以辦理囘部將竣諭䇿布登扎布囘游牧休息富徳候兆恵信息如霍集占既獲亦即來京今囘城相繼降附自不必多煩兵力但相距遼逺現在如何辦理尚需富徳之兵否可𫝊諭兆恵酌量兵力如必資協助即調富徳領兵進進若實在可以不須亦行文富徳將所領官兵撤囘游牧即遵前㫖來京但不可因有諭富徳來京之㫖揣摩拘泥仍將現在情形作速奏聞丁巳諭定邉將軍兆恵等查勘布魯特游牧邉界上諭軍機大臣曰布魯特入覲使臣等奏特穆爾圖淖爾係伊等舊游牧懇請賞給朕諭云雖爾等舊游牧久被準噶爾所侵豈可仍視為爾土但爾等既為臣僕此地頗屬寛閒或附近游牧之處酌量賞給以裨生計尚屬可行俟交將軍大臣等查奏後再降諭㫖可𫝊諭兆恵富徳若遇布魯特使人即遵照宣示兆恵等若知此地原委即指明具奏如未深悉可派員詳悉查勘除附近伊犂及尚可屯田之處斷不輕與或附近伊等游牧荒廢無用者酌量指給仍須詳定邉界兆恵富徳若仍有囘部未竣事務即令納穆扎爾到伊犂時遵照辦理戊午上御太和殿受朝布魯特使臣車里克齊等隨班行禮諭㕘贊大臣巴禄查奏圖倫楚等追賊信息上諭軍機大臣曰據永貴奏稱奉到飭諭圖倫楚等速勦阿巴噶斯哈丹餘孽之㫖巳派員賫送據圖倫楚逹禮善敏珠爾多爾濟等云爾等且先囘俟到烏魯木齊再行呈報又據逹里善報稱現在往㑹巴祿等語伊等所報甚屬糊塗前申飭圖倫楚之㫖曽諭令於賫送人員之便即行囘奏乃迄今杳無信息且逹里善等與巴祿何日分兵亦未奏及可𫝊諭巴祿圖倫楚逹里善此時曽相㑹否至辦理厄魯特餘孽已飭催數次何以未見奏報一併作速奏聞己未申諭定邉左副将軍成衮扎布等嚴拏盜竊卡倫賊匪上諭軍機大臣曰成衮扎布等奏稱和托輝特之烏梁海等搶奪阿噶爾等卡倫馬駝即行知舒明等派莫泥扎卜同公多爾濟䇿登查拏伊亦就近馳赴和博克薩里等處搜捕哈薩克錫喇等語舒眀等昨奏烏梁海搶奪卡倫即諭令悉力查拏今成衮扎布已派遣諳練之員前往甚合機宜至右哈薩克節經奏報并無哈薩克錫喇信息成衮扎布不必前往即遵㫖囘烏里雅蘇台辦事又諭曰成衮扎布奏巴爾魯克卡倫拏獲厄魯特朋楚克烏勒木濟徳勒格爾等俱係索倫官兵奴僕偷竊牧羣馬匹從巴里坤逃出除審明正法外其所竊馬匹送交原主識認等語著𫝊諭阿里衮此等賊匪是否官兵奴僕抑或西路逃來之嗎哈沁等若實係奴僕則辦事大臣等全無稽查約束可知至所竊之馬為官為私亦當詳悉查問嗣後官兵等奴僕務宜嚴加約束有逃走滋事者即行嚴拏正法諭定邉將軍兆恵等酌量新派官兵行走緩急上諭軍機大臣曰據領健鋭營兵之侍衛豐安等奏稱奉到速赴軍營諭㫖計日行百里十月十二日可抵哈密十一月十七日可抵阿克蘇等語從前因辦理囘部未悉情形恐急須䇿應今各城相繼迎降度軍營官兵已足竣事増派健鋭營等官兵原為豫備屯戍若行走過急致勞馬力轉於事無益可傳諭兆恵此時若霍集占業已就擒不需多兵即行文豐安等令其從容行走併𫝊諭豐安等通行各隊侍衛官員等知之諭酌定囘人貢賦上諭軍機大臣曰準噶爾從前所收囘人貢賦曽經詢問恩克博羅特等開單呈覽今詳閲伊等繕寫各欵項不過就其一時記憶並無細數殊屬䝉混不足為據即詢之囘人亦未必肯以實告現在軍營効力之厄魯特囘人内必有知者可因便𫝊諭兆惠令其留心查詢噶爾丹䇿零時每年囘部所輸何物其數若干逐一開載俟大功告成酌定貢賦時易於辦理辛酉諭定邉左副將軍成衮扎布等辦理追捕逃匪等事宜上諭軍機大臣曰據成衮扎布奏稱安插呼倫貝爾之厄魯特明噶特得木齊和里木等擕帶眷屬十餘口逃出納林喀喇等卡倫隨派侍衛占丕薩及都爾伯特之王公扎薩克等追至烏闌古木河為都爾伯特公巴圖孟克等追及於夜間突圍逃脱已率領副都統栢起親往追捕等語昨諭成衮扎布囘烏里雅蘇台辦事今既親往追捕逃人即不必拘泥前㫖舒明亦不必來京且暫駐烏里雅蘇台辦事至所奏公巴圖孟克等以大衆圍守十餘人尚致逃脱已嚴加斥責等語此在侍衛占丕薩等自宜以軍紀約束至都爾伯特王公俱係新附奉調從行即屬恭順自可毋庸斥責仍量加賞賚又諭曰成衮扎布奏主事明山扎薩克台吉根敦二等侍衛七格等追捕偷竊臺站馬匹賊匪未能弋獲請交部察議等語自應如所請行但明山等於追賊之便搜勦嗎哈沁等頗屬奮勉功罪尚可相抵著從寛免其察議此係特恩不得援以為例其陣亡之驍騎校老格著加恩交部議卹壬戌諭䕶軍統領努三等辦理貿易哈薩克馬匹上諭軍機大臣曰據努三等奏稱哈薩克哈巴木拜查送布庫察罕之子帶馬三百餘匹於九月十七日到烏魯木齊貿易其阿布賚等俟伊等回抵游牧再行遣人前來請將貿易馬匹交與永貴納世通以備調撥等語此次所得騸馬可𫝊諭努三等與永貴商酌或解送軍營或令新派官兵乘騎前往其兒騍馬留於屯田處所加意牧放將來孳生蕃息便成好牧羣嗣後貿易馬匹即照此辦理諭㕘贊大臣扎隆阿等補給烏梁海内大臣察逹克兵丁口糧上諭軍機大臣曰扎隆阿等奏稱准㕘贊大臣莽古賚郡王車木楚克扎布等支領口糧已經辦給其烏梁海内大臣察逹克所領兵五十名非初次出兵可比應不准支給等語察逹克等内附未久於恩克逃走時即領兵往追擒獲阿喇善及恩克屬人等今又領兵追捕恩克頗為効力乃停其支領口糧殊屬拘泥著仍照上年之例一體賞給命革侍衛圖倫楚職留軍營効力贖罪上諭軍機大臣曰據永貴奏稱圖倫楚等呈報伊等自托多克領兵向額林哈畢爾噶之北又冒雪踰孟庫圖嶺分兵於昌吉和托畢朱爾都斯空格斯哈什波羅和羅等處搜捕逸賊㑹合巴禄之兵等語圖倫楚逹禮善等前追哈丹阿巴噶斯餘黨因阻水却囘朕已降㫖詰責今雖據稱於各處徧行搜捕不過徒勞馬力若早能疾躡賊踪當不至此可𫝊諭巴祿俟圖倫楚等相見時除敏珠爾多爾濟逹禮善已經革職仍將圖倫楚革去侍衛職銜留於巴祿隊内効力贖罪㕘贊大臣永貴疏奏布魯特使臣哈畢啟病故永貴奏言布魯特使臣哈畢啟以病留養九月二十六日據遊撃傅明阿報明病故其從役等照伊部落之禮殯葬候使臣舒庫爾歸程酌量辦理奏入報聞平定準噶爾方略正編卷六十二
