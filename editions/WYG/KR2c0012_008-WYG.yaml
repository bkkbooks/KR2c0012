body:
  text: 康熙五十九年冬十月庚戌定西將軍噶爾弼奏克西藏噶爾弼疏言臣等率兵至拉里聞春丕勒宰桑率賊兵二千六百人自章米爾戎一路來拒我師臣等議乗其不備先取墨朱工喀於八月初四日臣率兵自拉里進王師所至望風響應朱貢之胡土克圖先獻地降次日進取墨朱工喀賞賚第巴頭目安輯民人臣遣千總趙儒等往諭第巴達克咱來降又喇嘛鍾科爾頭目並相繼來降臣等即令第巴達克咱聚集皮船於八月二十二日渡河復令侍衛訥秦等率兵分為三隊二十三日五鼔起程進取西藏集藏中大小第巴頭目並各寺廟喇嘛宣示聖主拯救西藏民人至意凡達賴喇嘛倉庫悉封之於附近要地駐營發兵固守以截準噶爾部人往來及㫁其糧道頃之三廟坎布盡擒各廟所在準噶爾喇嘛凡一百一人以獻其中首惡喇嘛五人據第巴達克咱及三廟坎布等言五人者並受䇿零敦多卜逆命為總管即取五人斬之其喇嘛九十六人悉令拘禁奏入得㫖噶爾弼等遵朕指授率領官兵厯從古用兵未到之絶域各加奮勵克取藏地將準噶爾人等信用之逆惡番僧五人正法撫綏唐古忒土伯特人民甚屬可嘉在事將軍以下兵丁以上俱著從優議叙賞賚四川雲南取藏官兵上諭兵部曰朕惟國家綏乂地方愛養兵民實係𦂳要朕自臨御以來夙興夜寐無時不以軍民生計為念比年策妄阿喇布坦蠢動跋扈侵我哈宻殱及拉藏占取藏地騷擾土伯特唐古忒人民再吐魯番之人皆近四川雲南一帶邊境居住準噶爾人等若將吐魯番侵取又將土伯特唐古忒人民煽惑侵犯青海不但難以應援亦且難於取藏是以調四川雲南滿漢官兵由拉里前發西路大兵由青海進藏官兵俱感朕豢養之恩遵朕指授各加奮勵直抵險逺絶域克取藏地殊堪軫念應大沛恩澤四川雲南滿漢官兵從前所領俸餉俱著免其扣取仍遣堂官將取藏之四川雲南官兵每人賞銀十兩即給本人妻子以示朕軫恤官兵勞苦之至意爾部即遵諭行乙夘撫逺大將軍允禵奏報平逆將軍延信敗賊進藏允禵疏言平逆將軍延信等於八月十五日率兵駐劄布克河策零敦多卜等乗夜來犯擊敗之奪其馬匹器械十九日自卜克河進二十日駐齊諾郭勒三更有賊二千餘人襲我我師嚴整禦之賊衆久持不能當遂奔北二十一日自齊諾郭勒進二十二日次綽瑪喇是夜五更賊兵千餘來奪營營中四面哨兵鎗礮矢石齊發賊兵死者甚衆遁去延信等旋率滿漢官兵於九月初八日自達穆發送新封達賴喇嘛至藏前達賴喇嘛博克達留藏不便應遣還京師奏入得㫖前遣大兵進藏議政大臣及九卿等俱稱藏地遥逺路途險惡且有瘴氣不能遽至宜固守邊疆朕以準噶爾人等現今占取藏地騷擾土伯特唐古忒人民再吐魯番之人皆近雲南四川一帶邊境居住若將吐魯番侵取又鼔動土伯特唐古忒人衆侵犯青海彼時既難以應援亦且不能取藏朕決意獨㫁著靖逆將軍富寧安振武將軍傅爾丹征西將軍祁里徳管領兩路官兵前往策妄阿喇布坦邊境驚擾襲撃又遣定西將軍噶爾弼領雲南四川滿漢官兵由拉里前進平逆將軍延信領西路官兵由青海前進又遣大將軍總領大兵駐劄穆魯烏蘇調遣官兵辦理糧餉伊等俱各加奮勵兩路襲擊之兵至策妄阿喇布坦邊境屢次大勝勦殺賊兵擒獲人畜招撫數千準噶爾人衆兹覽大將軍奏延信等三次將䇿零敦多卜殺敗賊兵逃竄殊屬可嘉在事將軍以下兵丁以上俱著從優議叙丁巳命大將軍等㑹議明年進兵勦賊靖逆將軍富寧安疏言今歳阿爾台巴里坤兩軍襲擊策妄阿喇布坦邊境將軍延信等進兵安藏悉遵皇上指授大振軍威賊人聞之心膽俱碎或以窘迫故遣使乞降為緩兵計臣愚以為賊性奸詭即受降不足信請乗勝於來年大舉進勦現在巴里坤及固原甘肅等處兵約萬有七千請選八千人由額林哈畢爾噶路進六千人由吐魯番阿爾台路進各持三月糧其設置驛站令巡撫綽竒預為料理又巴里坤草厰較勝他處一切設臺運米及調兵所用駝馬若早驅至巴里坤牧放三月則駝馬肥壯有益軍務其來年進兵程期並如何策應臣再與阿爾台路大臣㑹議奏聞奏入得㫖交議政大臣尋議政大臣議曰應如將軍富寧安所奏來年大兵進勦一切軍務悉宜預備至進兵時或直搗賊巢或扼據形勝臨期相機而行大將軍所領兵中應更撥三千益富寧安軍并令與阿爾台路將軍約如何㑹合進發其詳議以聞奏入得㫖此事著行文允禵及富寧安傅爾丹祁里徳等將來年進兵之處互相商酌詳加定議具奏辛酉罷駐守噶斯布特爾及青海兵仍以兵二千防青海撫逺大將軍允禵疏言八月二十三日我師進藏偵知策零敦多卜等先自克勒底雅遁請罷噶斯布特爾及青海駐守之兵議政大臣等議覆曰應如所請但策零敦多卜等狡甚雖已遁去或恐乘隙來侵擾青海應令大將軍仍撥兵二千駐劄青海附近處偵探防守奏入上從之癸亥預給官兵明年俸餉靖逆將軍富寧安疏言據軍前副都統覺羅英柱常夀提督路振聲等云明年大兵進勦一切軍器馬匹悉應預備請借支官兵一年俸餉銀凡三十五萬九千四百二十兩有竒於每季每月給發俸餉時扣除如䝉俞允乞勅諭甘肅巡撫綽竒運送軍前如數如明年或不進兵即留軍前備每年軍餉之用議政大臣等議如所請奏入上從之十一月丙子四川總督年羮堯奏劾麗江土知府木興年羮堯疏言里塘巴塘為蜀省出兵運道奉㫖屬四川管轄乃雲南麗江王知府木興數遣人恐喝巴塘所屬喇皮等處令歸雲南番人咸懼現在四川募夫陸續運米悉不敢前八月二十日木興率蠻兵至喇皮番目巴桑以已歸四川為詞木興殺之又威脅番人令之歸已以致番蠻各思搆兵巴塘之運道遂阻木興狂悖生釁殺良阻運請革職拘禁雲南俟西藏既平嚴訊擬罪議政大臣等議曰平藏大兵尚未入口年羮堯所劾木興之案請俟師旋日遣京師大臣一人往訊奏入上從之辛巳命大學士學士九卿等詳考西南徼外山川地名上諭大學士學士九卿等曰朕於地理從幼留心凡古今山川名號無論邊徼遐荒必詳考圖籍廣詢方言務得其正故遣使臣至崑崙西番等處凡大江黄河黑水金沙瀾滄諸水發源之地皆目擊詳求載入輿圖今大兵得藏邊外諸番悉心歸化三藏阿里之地俱入版圖其山川名號番漢異同當於此時考證明核庶可傳信於後大概中國諸大水皆發於東南諾莫琿烏巴西達罕内外其源委可得而縷析也黄河之源出西寧外庫爾坤山之東衆泉渙散不可勝數望之燦如列星䝉古謂之敖敦塔拉西番謂之索羅木中華謂之星宿海是為河源匯為薩陵鄂陵二澤東南行折北復東行由歸徳堡積石闗入蘭州岷江之源出於黄河之西巴顔喀喇嶺齊齊爾哈納番名岷尼雅克撮漢書所謂岷山在西徼外江水所出是也而禹貢導江之處在今四川黄勝闗外之乃褚山古人謂江源與河源相近禹貢岷山導江乃引其流非源也斯言實有可據其水自黄勝闗流至灌縣分數十支至新津縣復合而為一東南流至叙州府與金沙江合流金沙江之源自達賴喇嘛東北烏尼尹烏蘇峰流出烏尼尹烏蘇峰中華謂之乳牛山也其水名穆魯烏蘇東南流入喀木地又經中甸入雲南塔城闗名金沙江至麗江府又名麗江至永北府㑹打衝河東流經武定府入四川界至叙州府流入岷江經䕫州府入湖廣界由荆州府至武昌府與漢江合漢江源出陜西寧羌州北嶓冢山名漾水東流至南鄭縣為漢水入湖廣界東南流至漢陽縣漢口合岷江此諸水在東南諾莫琿烏巴什達罕之内源發於西番委入於中國也瀾滄江有二源一源於喀木之格爾幾雜噶爾山名雜褚河一源於濟魯肯搭拉名鄂母綽河二水㑹於察木多廟之南名拉克褚河流入雲南境為瀾滄江南流至車里宣撫司名九龍江流入緬國瀾滄之西為喀喇烏蘇即禹貢之黑水今雲南所謂潞江也其水自達賴喇嘛東北哈喇淖爾流出東南流入喀木界又東南流入怒彞界為怒江入雲南大塘隘更名潞江南流經永昌府潞江安撫司境入緬國潞江之西為龍川江龍川江之源從喀木所屬春多嶺流出南流入雲南大塘隘西流為龍川江至漢龍闗入緬國此諸水在東南諾莫琿烏巴什達罕之外皆流入南海也又雲南邊境有㯽榔江者其源發自阿里之岡底斯東達木朱喀巴卜山譯言馬口也有泉流出為雅魯藏布江從南折東流經藏危地至日噶公噶兒城旁合噶爾招穆倫江又南流經公布部落地入雲南古勇州為檳榔江出鐵壁闗入緬國而岡底斯之南有山名郎千喀巴卜譯言象口也有泉流出入馬皮木達賴又流入郎喀淖爾兩河之水西流至桑南地岡底斯之北有山名僧格喀巴卜譯言獅子口也有泉流出西行亦至桑南地二水合而南行又折東行至那克喇蘇木多地與岡底斯西馬卜家喀巴卜山所出之水㑹馬卜家喀巴卜者譯言孔雀口也其水南行至那克喇蘇木多地㑹東行之水東南流至額訥特可克國為岡噶穆倫江即佛法所謂恒河也佛國記載魏法顯順恒河入南海至山東之勃海入口應即此水矣梵書言四大水出於阿耨達山下有阿耨達池以今考之意即岡底斯是唐古忒稱岡底斯者猶云衆山水之根與釋典之言相合岡底斯之前有二湖連接土人相傳為西王母瑶池意即阿耨達池又梵書言普陀山有三一在額納特可克之正南海中山上有石天宫觀自在菩薩逰舍是云真普陀一在浙江之定海縣海中為善財第二十八㕘觀音菩薩説法處一在土伯特今番名布搭拉山也亦謂觀音現身之地釋氏之書本自西域故於彼地山川亦可引以為據也禹貢導黑水至於三危舊註三危為山名而不能知其所在朕今始考其實三危者猶中國之三省也打箭爐西南達賴喇嘛所屬為危地拉里城東南為喀木地班禪額爾得尼所屬為藏地合三地為三危耳喀喇烏蘇由其地入海故曰導黑水至於三危入於南海也至於諸番名號雖與史傳不同而亦有可據者今之土伯特即唐之突厥唐太宗時以公主下降公主供佛像於廟今番人名招招者譯言如來也其地猶有唐時中國載去佛像明成化中烏斯藏大寶法王來朝辭歸時以半駕鹵簿送之遣内監䕶行内監至四川邊境即不能前進而返留其儀仗於佛廟至今往來之人多有見之此載於明實録者爾等將山川地名詳細考明具奏臣等謹按唐一行言天下山河之象存乎兩戒北戒負終南地絡之陰自北而東為北紀南戒負終南地絡之陽自西而南為南紀此特就中國之地以終南山分兩戒而其説未盡也考禹貢所導大川有四河與江漢同入東海而三水之源並在諾莫琿烏巴西達罕以内惟黑水入於南海而其源則在諾莫琿烏巴西達罕以外幹以外者南幹以内者東所謂兩戒之説也然而自古以來未有知而言之者惟我聖祖仁皇帝五十六年詔遣喇嘛楚兒沁藏布喇木占巴及理藩院主事勝住等徧厯西海西藏所在量測星野圖畫地形於江河諸水無不盡得其源委復命廷臣詳考名實載之職方𫝊信萬世皇哉備矣方今諸番回部内𨽻臣僕西極之壤盡入版圖直包烏斯藏西南以外皇上命使候星辰度道里圖寫職方用資乙覽莫不以照以臨歸我同文之盛極從古未到之絶域考厯代未拓之逺猷又豈止於都䕶所領槃木所譯而已哉壬午命四川總督年羮堯酌定官兵凱旋入口諸路年羮堯疏言大兵平藏後有從征把總哈元成還言自西寧進藏路瘴氣獨盛現在平藏師旋並欲由巴爾喀木一路臣度凱旋軍士所攜口糧計日尚有餘所慮馬匹至中途疲甚雖有口糧或不能裹負而行謹飛檄各處多運米以備接濟議政大臣等議如所請奏入得㫖依議年羮堯奏進藏大兵由巴爾喀木一路凱旋朕念武格等所領滿兵由雲南出口進藏今回兵時若仍令往雲南則路途遥逺著即同四川省凱旋之兵從四川入口其雲南緑旗兵丁著年羮堯擇路近之處發往雲南西寧進藏兵著從松潘一路行走至松潘後相視道里逺近或從口外前往西寧或從口内行走俱著年羮堯酌量辦理丁亥增給征西將軍祁里徳軍前滿洲兵上諭議政大臣等曰將軍祁里徳奏伊軍前滿洲兵少請將將軍傅爾丹處所領右衛滿兵酌量撥給朕思傅爾丹處之兵不必調遣可將右衛鳥鎗兵派五百名京城鳥鎗兵每旗派四十名發往祁里徳軍前又富寧安軍前滿兵亦少𫝊爾丹駐兵之處與巴里坤相近或將傅爾丹所領滿兵量撥富寧安軍前又祁里徳傅爾丹兩路官兵或合為一處爾等議奏尋議曰應發右衛漢兵五百八旗滿兵三百二十令副都統瓦哈里率之赴祁里徳軍其傅爾丹所屬漢兵調給富寧安軍至祁里徳傅爾丹兩路兵或應合一路請令大將軍㑹議奏聞再議奏入上從之十二月庚申振武將軍傅爾丹等請預給官兵明年俸餉傅爾丹等疏言明年大兵進勦請借支官兵一年俸餉銀凡二十六萬三千四百兩有竒於毎季每月扣除如數議政大臣等議如所請奏入得㫖軍興時需用錢糧甚多爾等於傅爾丹奏請之處應相度機宜詳核定議明年果否進兵及官兵之馬匹器械曾否齊備糧餉作何運送將軍等並未奏聞爾等亦未議及止議借支餉銀倘明年不進兵至後年進兵將再借乎否乎從前運到軍前之米及種地所收之糧果否足用又各官自備牛種交收之糧或係空名亦未可定官兵惟以借餉為事不思借無底止則錢糧易至匱乏矣如聴信兵丁之言預期借餉又徼倖明年撤兵或謂功成之日必邀恩免此豈將兵之道乎爾等不加詳核罷軟從議亦屬不合軍務本無年限必詳加籌度使糧無匱乏乃於軍務有益此本著再議具奏尋議曰傅爾丹奏請支餉一年即給不便應令大將軍等㑹議明年當進兵與否及傅爾丹一路兵餉可否支給具摺奏聞再議奏入上從之康熙六十年春正月辛巳議叙勦撫生番官兵四川總督年羮堯疏言打箭爐外里塘所屬上下牙色上下雅尼巴塘所屬桑阿壩林卡石等處生番出沒不常數行剽掠臣遣兵勦撫悉降之議政大臣等議俟軍務告竣官兵悉予議叙奏入上從之癸未撫逺大將軍允禵奏報平逆將軍延信兵送達賴喇嘛至藏允禵疏言據平逆將軍延信報大兵送達賴喇嘛赴藏道出雷東噴多等處喇嘛人衆感激聖恩罔不踴躍男婦老幼望我天兵襁負走迎羣來環繞競奏種種樂器合掌跪云自準噶爾賊人據土伯特以來父子夫婦刼掠離散人人凍餒自謂此生不能再覩天日今聖主興師勦賊拯我土伯特人出之水火更享昇平之福生死月骨無以仰報紛紛來言出於至誠奏入報聞既而允禵又疏言西藏已定駐防尤急今兵留者扎薩克䝉古兵五百額駙阿寶兵五百察哈爾兵五百雲南兵三百四川兵千有二百以公策旺諾爾布轄之至空布所在第巴阿爾布巴率先効順從軍取藏阿里所在第巴康濟鼐與準噶爾仇讐擒賊部人㫁賊歸路第巴隆布鼐以身來歸並請授以職銜伏候諭㫖奏入得㫖第巴阿爾布巴第巴康濟鼐著俱授為貝子第巴隆布鼐著授為輔國公三月己丑命平逆將軍延信等統兵駐藏上諭議政大臣等曰藏地甚屬𦂳要現在雖有䝉古緑旗兵三千名駐彼但延信己將將軍印信帶回並無將軍統管兵馬又無滿兵駐劄不可不加籌畫雲南有副都統噶什所領滿兵一千著派五百名並四川歇息之緑旗兵五百名發往速行文延信令其前往藏地延信及雲南四川兵到藏如彼地食物米糧稀少可將喀喇沁翁牛特兵撤回西寧公策旺諾爾布仍駐彼處著議奏尋議政大臣等議曰江寧杭州滿兵留雲南者令都統武格副都統呉納哈率五百人即由雲南取道進藏緑旗兵在四川休息者令總督年羮堯將軍噶爾弼遣一總兵官一副將率五百人即由打箭爐進藏將軍延信可毋往西寧令佩將軍印還四川率四川兵進藏統諸軍駐劄奏入得㫖依議前令原任雲南總督蔣陳錫巡撫甘國璧接應進藏兵糧餉贖罪効力若尚未去令與此兵同往如已赴藏地令應付此兵糧餉効力庚寅命大將軍允禵㑹同三路將軍定議進勦允禵疏言據三路將軍報稱各路馬駝糧餉俱充足器械俱備官兵咸思奮勇進勦乗策妄阿喇布坦人心震動即此進兵擒賊可以直入蕩其巢穴奏入得㫖著議政大臣滿漢九卿詹事科道㑹同詳議具奏尋議曰令靖逆將軍富寧安調兵至烏蘭烏蘇駐劄即軍中選七千人令散秩大臣阿喇衲甘肅提督路振聲領之自烏蘭烏蘇路進取吐魯番如得其地即令富寧安撥阿喇衲所領兵守之但進取吐魯番士馬恐不足當於振武將軍傅爾丹軍選三千人益富寧安軍傅爾丹及征西將軍祁里徳各於所在駐劄候調再於祁里徳軍中選三千人進略地收取策妄阿喇布坦及烏梁海逃竄者無人則撤還合軍一路設此時策妄阿喇布坦部内有變偵得消息三路將軍即相時乗機統大兵進勦奏入得㫖議政大臣等所議甚是朕意亦如此籌算將此行文與大將軍令三路將軍各行定議具奏平定準噶爾方略前編卷八
