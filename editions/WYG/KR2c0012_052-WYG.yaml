  text: 欽定四庫全書平定準噶爾方略前編卷五十二
  hash: sha256:5c61586734f0bfbf8fbc12a6d192a23401b40dc4302365cabdfd0998354d8e93
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_052-1a, image: WYG0357/WYG0357-0760a.png}
body:
  text: 乾隆十四年夏四月庚申準噶爾部人羅卜藏等來降命賞給安插如例秋七月壬子議準夷貿易事宜陜甘總督尹繼善奏言前督黃廷桂奏請將交易之事照前官辦惟令商人領變以所得餘利歸公查交易之事惟商人素所熟習凡置辦紬縀變賣皮貨等物俱能籌畫無遺及講價交換裒多益寡均須通盤計算方不至大有虧折若在官承辦不特官與夷錙銖較量有闗體制而貲本價值亦必不能如商人之斟酌減省且所得羡餘歸公商人毫無所利亦非情理之平應仍令商辦而官為統攝照看庶為妥協又夷人三年之内交易兩次若以一商承辦貲本難於轉輸請派兩商輪值以次接濟至熬茶等年額外交易之事仍交官辦而以貨交商領銷奏入上命軍機大臣議奏尋議應如所請上從之已而尹繼善以明年貿易期近一時艱於募商奏請暫准官辦一次得㫖允行並諭軍機大臣曰尹繼善覆奏準夷交易一摺著照所請暫准動項官辦一次向來夷人於交易年分之外借端不時往來希圖獲利其無厭之求固當少為節制然以字小之恩宏懷逺之略使邊庭息警疆宇寧謐所全實多尹繼善固不可輕信屬員多糜帑項亦不必過求贏餘以益官帑而使夷人觖望有失輕重之宜也著傳諭尹繼善知之冬十月丙戌準噶爾部人鄂倫楚克等來降命賞給安插如例丙申訓飭駐藏副都統紀三加提督傅清都統銜赴藏辦事上諭軍機大臣曰據紀三奏稱到藏以來留心訪察朱爾黙特那木扎爾看來情性乖張屬下俱懷怨望且伊又有疑忌達賴喇嘛之心恐日久衆怨愈深達賴喇嘛亦不能忍致生事端請將伊兄朱爾黙特策卜登移取來藏協同辦事以分其權並將達賴喇嘛自藏移至泰寧安駐等語此奏甚屬舛謬朕前降㫖紀三特令其察看朱爾黙特那木扎爾見朕諭㫖時是否真切感畏伊之行止能效法伊父頗羅鼐否或應教導或應防範俱著留心體察並非即有辦理之意紀三但當將此等情迹據實奏聞至日後生事與否本難逆料況又欲將達賴喇嘛移至泰寧安駐此事尤不可行看來紀三見識甚謬伊係駐藏大臣凡事宜果斷其於朱爾黙特那木扎爾應教導者即為教導應防範者即為防範惟視事之輕重隨機辦理豈可顯露情形轉致起土伯特疑心乎將此寄飭紀三知之又諭軍機大臣曰從前藏地常派大臣二員駐劄辦事後乃裁去一員朕思藏地闗係甚要彼處應辦事件有二人相商較為有益且换班先後更替有一舊人尤覺妥當固原提督傅清從前曽經在藏彼處事體諒屬稔知著賞給都統銜前往與紀三公同辦事其欽差大臣闗防著傅清收掌不必來京可即由彼馳驛赴藏將此傳諭傅清知之戊戌命賞拿獲逃人之台吉旺布多爾濟等額駙策凌奏言台吉額林沁旗下有厄魯特巴黨伊爾格特蒙古烏常巴圖等潛約同逃經烏勒木濟告知羅對羅對轉告額林沁之子旺布多爾濟旺布多爾濟隨即領兵追至貢贊伯勒齊爾地方全行拿獲查旺布多爾濟此事雖屬奮勉但巴黨等本係交與伊父額林沁安插之人因不能撫綏始致逃走應將旺布多爾濟擒獲之功抵罪其隨旺布多爾濟追獲逃人之台吉宰桑巴都虎博第蘇等與送信之烏勒木濟羅對等請照例賞給奏入得㫖策凌所奏將旺布多爾濟之功抵罪固是但旺布多爾濟聞信即追將逃人盡獲尚屬勇往著加恩賞給粧縀一匹大縀一疋烏勒木濟並不入逃人之黨又即時送信甚屬可嘉著加一倍賞給餘依議十二月乙酉西藏郡王朱爾黙特那木扎爾與其兄公朱爾黙特策卜登搆兵降勅訓諭並申諭駐藏副都統紀三紀三奏言郡王朱爾黙特那木扎爾告稱伊兄朱爾黙特策卜登聚兵征取伊駐防阿里地方之果弼柰等并聞有發兵進藏之信該郡王因調兵豫備達賴喇嘛亦告稱朱爾黙特策卜登曽將征取果弼柰之事寄字與達賴喇嘛及班禪額爾得尼等語奏入勅諭朱爾黙特策卜登曰爾父子受朕恩深重爾所素知爾今無故發兵征取果弼柰是出何意若果如此是爾既負朕恩又玷辱爾父矣朕聞爾兄弟稍有不睦但爾於兄弟之間素敦和好爾父王爵尚肯讓爾弟承襲今乃轉欲搆兵取罪乎如果兄弟間有不和之處宜親身赴藏以實情告知辦事大臣與達賴喇嘛今計不出此擅自發兵殊屬糊塗朕此㫖一到爾即欽遵親赴藏地在辦事大臣達賴喇嘛前聲明其故俟伊等奏到朕自另簡大臣將爾兄弟之事分剖明白務令永遠和睦如爾有欲奏之言亦即具奏朕自有措置所有諭爾弟勅㫖一併抄寄知之又勅諭朱爾黙特那木扎爾曰爾父頗羅鼐在時誠心為國故朕叠次加恩由台吉封至郡王深加信用又准其所請將王爵令爾襲封辦理藏地事務今爾兄弟間自生猜嫌爾兄發兵征取果弼柰等朕已降㫖詰問其起兵之由爾可即派土伯特賢員隨同紀三處派出之傳㫖章京前往爾兄如即遵朕諭來藏朕遣大臣將爾兄弟不睦情由分剖明白務令永逺和睦如爾兄有難以來藏之處亦即令其將實情具呈入奏朕覽其呈詞另為裁斷若抗㫖不來藏地又不具呈詞是顯有異心爾即發兵酌量辦理爾惟當感激朕恩用心保守地方斷不可滋事若因兄弟稍有不和即藉端生事是將爾父一生忠誠奮勉之處俱掩没矣爾可度量事理輕重而行所有諭爾兄勅㫖一併抄寄知之又諭紀三曰朕思頗羅鼐父子受朕恩深重朱爾黙特策卜登何以遽有搆兵妄動之事或者朱爾黙特那木扎爾意欲傾陷伊兄設此譎計亦未可知惟當察其實情秉公辦理不可忽略稍致偏袒被欺朕今降㫖詰問朱爾黙特策卜登起兵情由爾可即派章京齎此㫖揀選内地兵丁隨從率同土伯特人前往傳㫖若朱爾黙特策卜登有難以來藏之處亦即令據實具呈爾速行代奏候朕覽後再為裁斷此派去傳㫖之章京務令將朱爾黙特策卜登如何舉動如何言語之處詳細察看爾一併速行具奏丁亥諭都統傅清體察西藏事宜上諭軍機大臣曰昨將紀三所奏藏地搆兵等摺及朕所降諭㫖俱寄知傅清計此時傅清尚未赴藏接到現在既有朱爾黙特策卜登起兵攻取果弼柰之信可速寄信傅清藏地闗係甚要事之真偽今雖不能即定然不可不為留意朱爾黙特那木扎爾年幼躁急性好生事外貌雖依紀三教導其實紀三轉被欺蒙亦未可知使伊本無生事之心伊兄實欲進兵來藏是特其兄弟間互相侵犯辦理尚易若伊兄並無此事而伊造言誣搆藉端生事則伊即係不可存留之人速宜辦理然土伯特人賦性狡詐此事之起或因朱爾黙特那木扎爾嚴刻屬下乘伊兄弟不和從中離間更未可定此處傅清務須留心沿途細訪倘朱爾黙特那木扎爾不願派大臣駐藏藉端設計以陷紀三斷不可忽略以致墮其術中如有見聞即行具奏朕自有措置再紀三過於拘謹遇事毎無定見是以特命傅清前往協同辦事今藏内又添駐藏大臣一員彼處之人不無猜疑傅清凡事當與紀三妥商務期有裨勿因彼此意見不同自生猜疑致土伯特人疑惑諸事細心辦理勉之愼之壬辰準噶爾部人沙喇克等來降命賞給安插如例壬寅命侍郎拉布敦往代紀三駐藏辦事乾隆十五年春正月壬子準噶爾使臣尼瑪等入貢準噶爾台吉策妄多爾濟那木扎爾奏言前者使臣唵集敦多卜等回述大皇帝諭㫖令我永守和好又蒙恩准我處貿易人増加百名為二百名不勝感激伏念大皇帝施恩我父以興黄教安羣生為念永敦和好是以准我處通貢貿易至今今惟有益矢恭敬遵行不違以副大皇帝施恩和好之至意至前蒙大皇帝准我處遣人在唐古忒地方念經二次具荷鴻慈深加矜憫但我處由唐古忒請來喇嘛今大半亡故為此恭懇聖恩准我處毎次差二三十人往唐古忒地方二博克達四大廟及黃教各廟請安伏乞大皇帝睿鑒施行仍令使臣尼瑪等口奏奏入報聞甲寅賜尼瑪等宴於豐澤園戊午賜準噶爾台吉策妄多爾濟那木扎爾勅書奉天承運皇帝詔曰據台吉奏肅州貿易之人蒙恩加増百名感戴陳謝殊屬敬順朕甚嘉之至奏稱所有唐古忒喇嘛已多亡故懇毎次差數十人往唐古忒二博克達四大廟黄教各廟請安等語爾使臣尼瑪等亦經口奏及此朕為天下主可行之事斷無不允行不可行者雖懇求亦不許昨爾奏來肅貿易人少不足照看朕即照所請准加百名從前爾父噶爾丹策零奏請為爾祖策妄阿喇卜坦差人三百名往西藏熬茶朕特加恩派大臣官兵照看并賞沿途牲畜路費至藏完成此事續又據爾奏請為爾父噶爾丹策零差人三百名熬茶朕亦准爾照前辦理似此應行大事朕一一俯從若非此等事則斷不准行從前降㫖甚明今爾又奏請每年差二三十人在唐古忒地方行走是以斷不可行之事來奏也爾意以已准爾等往藏熬茶兩次未必再准前往是以妄生冀倖殊不知果有前此大事朕原未嘗禁止往藏今無故每年令二三十人前往不惟事有不可即照爾所請日後又必言人少請多増人數矣將毎年必派官兵照看爾往來之人可乎况從前往藏熬茶時藏内郡王朱爾黙特那木扎爾曽奏請停止準噶爾人往藏朕若准爾所請則朱爾黙特那木扎爾所奏豈竟置之不問乎爾等即不用朕官兵照看以己力竊往藏地朱爾黙特那木扎爾亦安肯容納乎但今爾地所有自藏延請喇嘛大半亡故誠恐黃教日泯朕方欲廣演黃教豈肯令爾地之教日就澌滅今為爾詳度朕中國大廟有名胡土克圖藏内挑取有徳行喇嘛及各處有學業喇嘛皆住持其中爾可將喇嘛内聰頴者挑選十名或二十名送至京師在大廟勤學三四年令其回去即可助行黃教但此學經喇嘛須擇年少之人學成時可以行教三四十年自後不得每年差來必俟人數將完方准再行挑送學習此特恐爾處黃教漸廢是以多方為爾籌畫非必欲令爾處喇嘛赴京也爾若不願送喇嘛來學即可中止如復以差人至藏為請則斷不許爾惟當感戴朕恩永圖承受勿妄生他念勉之尋又降㫖嗣後準噶爾貢使攜帶貨物如在尼瑪數目以内准其貿易倘逾此數即行駁回著諭尼瑪令其回時傳諭台吉知之二月己丑定邊左副將軍額駙超勇親王策凌卒上諭軍機大臣曰前因㕘贊大臣穆克登額等奏稱額駙策凌患病朕特令額駙之子策布登扎布與蘇巴什里帶領太醫馳驛前往朕意額駙偶然抱病當即痊可後穆克登額等又奏額駙病重朕即特遣乾清門侍衞得山前往看視續又遣貝勒羅卜藏前去不意伊等未到而穆克登額等奏額駙已於二月初五日病故額駙自皇祖時至今始終竭誠宣力忠勤匪懈功在國家今聞溘逝朕心不勝憫悼世子成衮扎布又奏稱伊父遺言身故之後乞附葬公主園寢即此一節身後尚不忘戀闕其一生實心為國可知著照所請即令得山與成衮扎布一同䕶送進口並賞銀一萬兩辦理䘮事俟到京之日朕親往奠酒所有應行䘏典與在京親王一體加恩其左副將軍印務暫令貝勒羅卜藏署理又諭内閣曰額駙策凌有名台吉又係近親在皇祖時即宣力邊陲懋著勲績皇考益加寵倚封為親王專任以邊事身先血戰勦滅猾賊大功昭著彌矢忠勤朕念王為兩朝勲舊用益加優眷倚為屏藩今聞溘逝深為憫惻所有齊集祭祀諸典禮已有㫖照内地親王一體加恩但古之勲戚多有從祀者如王之功允宜配享太廟雖本朝未有有親之蒙古王配享而朕念王勲著國家名顯史冊委任既久殊寵宜膺著加恩配享廟庭並賜祀賢良祠以示朕酬庸展親之至意三月丙寅命達爾扎策凌為頭等台吉先是紀三奏報朱爾黙特策卜登於上年十二月十八日病故朱爾默特那木扎爾懇請收葬其屍并養育其子上特降㫖允行並准朱爾黙特那木扎爾親赴薩海等處安輯被兵驚擾之人至是紀三又奏稱朱爾默特那木扎爾請將伊子達爾扎策凌駐劄阿里地方奏入得㫖朱爾黙特那木扎爾為防守地方欲遣伊子達爾扎策凌前往阿里駐劄所請甚是但達爾扎策凌現無職銜恐不足以統轄兵衆著加恩將達爾扎策凌授為扎薩克頭等台吉己巳喀爾喀副將軍公巴蘇卒賞䘏如例夏四月戊寅命副統班第往代拉布敦駐藏辦事先是上命拉布敦赴藏更換紀三至是以朱爾黙特策卜登已故藏内無事而拉布敦自藏甫回復經派往是以降㫖令辦理青海事務副都統班第往換拉布敦回京其青海事務即令紀三前往辦理尋又諭紀三進京請訓再往青海班第俟紀三到日再行赴藏壬午副都統班第奏西寧所屬四十部番目照例㑹盟癸巳諭安西提督永常等辦理夷使貿易事宜永常奏言夷使尼瑪回至哈密懇求變賣乏弱駝馬購買貨物總兵張世偉恐堅拒啟釁遂悉准其請奏入上諭軍機大臣曰此事尼瑪固屬卑鄙小見而張世偉亦未免過於姑息似此因循怯懦將來或恐貽笑外夷難令其彈壓邊境伊前在西寧辦理喂駝一節尚屬盡心或於内地營務相宜已令其來京陛見酌量另補其員缺令吕瀚補授此㫖不必告知張世偉俟吕瀚到鎮凡夷使分内應得些小利益之處仍照常聽其交易以示懐柔若例外干求當示之節制以杜無厭之望著傳諭永常可逐一詳悉告知吕瀚令其審度輕重妥協辦理五月丙午諭駐藏都統傅清侍郎拉布敦察奏朱爾默特那木扎爾回藏舉動情形先是傅清未進藏時奏朱爾黙特策卜登搆兵之信恐未必確或係朱爾黙特那木扎爾欲并據伊兄之地揑詞以起兵端臣至藏察看情形如機有可乘即將朱爾黙特那木扎爾辦理旋奉諭㫖朱爾黙特那木扎爾乖戾詭譎留之終必生事或乘伊與兄搆兵令四川總督策楞等帶兵以助戰為名相機擒賊或俟明年萬壽遣章嘉胡土克圗赴藏熬茶派川督帶兵䕶送至彼伺間殱除二者孰為利便傅清至藏後可察看情形熟籌具奏至是傅清抵藏朱爾黙特策卜登已故朱爾黙特那木扎爾以曽經奏准親往薩海地方安輯人衆遂調取部落兵丁運帶砲位前往傅清拉布敦奏聞上諭軍機大臣曰此或朱爾黙特那木扎爾以伊兄雖死其部衆未必皆服是以調兵自䕶抑或因弟兄啟釁懼朕問罪妄意離其巢穴即可苟免亦未可定然此皆其畏懼之心所致也苐自去冬不知紀三何以使之疑惑如此其後派傅清前往駐劄又令拉布敦往換紀三因連遣大臣到彼益生疑懼亦不能無但今春伊遣人入貢時朕叠加恩賞又令與青海親王結親亦可以解其疑惑此時想未接到諭㫖如果接到當喜出望外可以不疑著傳諭傅清拉布敦此時惟應靜以鎮之待其自起自止在我原無治罪之心則伊亦不生猜疑之念勿因急欲解其疑心轉生一番忙亂俟其回藏後將如何舉動之處再行奏聞可也六月丙子命扎薩克親王成袞扎布為定邊左副將軍上諭軍機大臣曰額駙策凌為國家竭誠宣力是以皇考加恩封至親王授以定邊左副將軍重任額駙謀勇之名準夷莫不懾伏訓兵飭備使喀爾喀寧靜無事實為國家勲戚重臣不意患病溘逝其定邊左副將軍之任甚屬𦂳要簡任務在得人伊長子扎薩克和碩親王成袞扎布前在軍營著有勞績其才具實堪勝任雖左副將軍非世襲之職而因才器使有所不拘著將成袞扎布授為定邊左副將軍成袞扎布其務矢忠勤效法伊父訓練兵衆安靖地方以副朕任用之意辛卯議準夷貿易章程陜甘總督尹繼善奏言今歳係準夷貿易之年現據報夷目諾落素等已到哈密但準夷自交易以來貨物日漸増多内地愈難銷售允宜示以節制今歳夷貨業已逺來臣已諄諭肅州鎮道俟夷人到肅責其違例不准全數交易如果情詞恭順再行酌量辦理至嗣後章程必宜定議應令商人倣照節次交易數目將牛馬羊隻皮張等項一一與之議定並言明内地商人止照此數備貨若違例多來不准全入交易併不准全入交界奏入得㫖所見甚是軍機大臣議奏尋議應如所請上從之丁酉命副都統保徳為北路軍營㕘贊大臣秋七月壬子準噶爾部人伊拉袞博羅勒岱等來降命賞給安插如例九月甲辰準噶爾部人達鼐來降命賞給安插如例丙午駐藏都統傅清侍郎拉布敦劾奏郡王朱爾黙特那木扎爾傅清拉布敦奏言朱爾黙特那木扎爾往後藏時將噶卜倫第巴布隆贊等誣搆抄没其家分給親愛之人又將朱爾黙特策卜登之子朱爾黙特旺扎爾遣逐在外凡頗羅鼐所用舊人殺害抄没黜革者甚多臣等遣人往後藏問候班禪額爾得尼回稱訪聞朱爾黙特策卜登病故後其子彭蘇克旺布或云逃去或云尚在阿里地方至朱爾默特旺扎爾係奉㫖交與朱爾黙特那木扎爾養育之人今在扎什倫布為喇嘛朱爾黙特那木扎爾現在帶兵二千餘名在前藏後三百餘里達木地方游牧奏入得㫖此皆朱爾黙特那木扎爾乖張悖戾但道路遼逺可暫聽之如果闗係者大再行籌畫丁未授侍郎拉布敦為左都御史庚戌準噶爾部人敦多克等來降命賞給安插如例辛酉準噶爾宰桑薩喇爾率所屬來降報準噶爾台吉策妄多爾濟那木扎爾為其下所弑先是沙喇克來降時稱策妄多爾濟那木扎爾昏暴不理政事日以殺狗為戲其姊烏蘭巴雅爾代管諸務又為策妄多爾濟那木扎爾所疑送往回地羈禁等語及敦多克等來降又稱策妄多爾濟那木扎爾自知凶暴滛亂懼衆人謀害可代伊立為台吉者惟喇嘛達爾扎一人欲託言至沙喇擘勒行圍將喇嘛達爾扎謀害有台吉賽音伯勒兄與為首宰桑厄爾錐音袞布鄂勒吹鄂羅什瑚巴哈曼集那木扎多爾濟博和爾岱商謀乘策妄多爾濟那木扎爾行圍即將伊擒住另立喇嘛達爾扎為台吉經小策零敦多卜之子達什達瓦密告其謀策妄多爾濟那木扎爾聚兵將厄爾錐音拿獲袞布等聞知隨即領兵將厄爾錐音奪回復將策妄多爾濟那木扎爾擒住矐其兩目併達什達瓦俱送往阿克蘇囚禁遂立喇嘛達爾扎為台吉等語至是薩喇爾來降據辦理青海番夷事務副都統班第具奏將薩喇爾送京經軍機大臣詢問據稱策妄多爾濟那木扎爾疑忌其姊夫賽音伯勒克賽音伯勒克遂與宰桑厄爾錐音等同謀將策妄多爾濟那木扎爾殺害立其兄喇嘛達爾扎因我台吉達什達瓦為策妄多爾濟那木扎爾所信任亦遂擒拿又拘喚大策零敦多卜之孫達瓦齊達瓦齊不肯前往喇嘛達爾扎以其人衆地險亦未敢相迫至我台吉被拿後又欲將我等户口分賞各宰桑是以我等來降等語軍機大臣具奏並請將薩喇爾等照例安插賞給畜產等項編設佐領即令薩喇爾管理奏入命安插於察哈爾尋授薩喇爾為散秩大臣冬十一月甲寅四川總督策楞奏報朱爾黙特那木扎爾伏誅都統傅清左都御史拉布敦為逆黨所害命策楞暨提督岳鍾琪進藏綏輯侍郎那木扎爾赴藏辦事先是傅清等奏朱爾黙特那木扎爾謀為不軌逆跡漸形請相機擒戮上密諭策楞岳鍾琪調兵預備進𠞰應援至是策楞等奏言先據西藏糧務通判常明禀稱朱爾黙特那木扎爾謀為不軌告其屬下有我已設計撤回漢兵四百餘名其餘若不知機早回必盡行誅滅等語又拉里糧務州同董恭禀稱朱爾黙特那木扎爾行令沿途凡一切漢土兵民以及文書俱不許往來出入等語兹據駐藏外委王廷斌等禀稱朱爾黙特那木扎爾潛謀不軌駐藏傅拉二大人於十月十三日誘至通司岡衙門接㫖遂將伊誅戮詎逆黨羅卜藏扎什等聞信當即率衆數千圍署施放鎗砲周圍放火達賴喇嘛隨遣衆僧救䕶不能得入拉大人被亂刀砍害傅大人身被槍傷立即自盡所有文武官員多係被難並糧務衙門被刦庫銀八萬五千餘兩十四日羅卜藏扎什帶兵潛逃十五日達賴喇嘛始令公班第達暫理藏王事務附近喇嘛番衆等俱已歸順逃難各兵民皆係達賴喇嘛現在養活等語隨又據管領臺站遊擊殷瑞禀稱十月十八等日達賴喇嘛傳令各塘照舊應付官兵不得違抗并探知達賴喇嘛在藏内傳令各番不得傷害漢人等語又據通判常明禀稱十月二十三等日據公班第達稱逆賊已經擒獲過半其餘亦不難擒拿搶去餉銀現在查追已得二萬餘兩其四面緊要路口亦派人把守等語又據臺站官遞到達賴喇嘛公班第達奏摺二函臣等看此情形朱爾黙特那木扎爾伏誅已屬確實其逆黨亦據達賴喇嘛公班第達次第查拘但羅卜藏扎什等敢率衆傷害大臣不法已極應即進兵擒戮且恐餘孽未盡日後又將滋事臣等酌議帶兵星即赴打箭爐相機分别進𠞰應援現差幹員沿途曉諭番民并將進兵擒拿逆犯緣由寄知達賴喇嘛公班第達以安藏内之心再副都統班第現由青海赴藏聞祇帶兵役二十名達賴喇嘛等或未知赴藏緣由臣等一併寄知達賴喇嘛等令其遣人接䕶奏入上諭内閣曰駐藏都統傅清左都御史拉布敦前因朱爾黙特那木扎爾潛謀不軌情跡顯著奏請相機剪除凶逆朕以伊等孤懸藏地未可輕舉並令俟班第到彼察看情形降㫖辦理乃傅清等未及奉到諭㫖以機有可乘遂爾便宜行事逆渠已經授首而傅清拉布敦旋為逆黨所害為國捐軀深用憫惜除另頒㫖加恩優恤外其隨二人捐軀弁兵著策楞岳鍾琪查明照陣亡例優恤目今藏地雖已撫輯寧謐但善後事宜不可不專遣大臣前往辦理著四川總督策楞提督岳鍾琪統領官兵赴藏綏輯地方搜除逆黨總兵董芳隨後統兵策應尹繼善著就近馳驛前往四川料理一應糧餉軍機侍郎那木扎爾著賞銀一千兩整裝即馳驛前往與班第一同駐藏該部遵諭速行丙辰命侍郎兆惠赴藏偕四川總督策楞等辦理善後事宜己未命公班第達管理噶卜倫事務先是班第達本朱爾黙特那木扎爾妹夫為朱爾黙特那木扎爾所惡抄没家產分散妻子傅清曽遣人密與謀誅逆酋通司岡之變傅清遣人傳班第達救䕶班第達以力不能救奔告達賴喇嘛及事稍定達頼喇嘛隨令班第達暫理藏王事務查捕逆黨綏輯人衆至是與達賴喇嘛各具摺入奏上命班第達以公管理噶卜倫事務又諭軍機大臣曰西藏經此番舉動正是措置轉闗一大機㑹若辦理得當則可永逺寧謐稍有滲漏數十年後又滋事端朱爾黙特那木扎爾敢懷逆萌由於地廣力强事權專一是以潛圖不軌自今藏地應多立頭目以分殺其勢可傳諭策楞抵藏後與班第等通盤籌畫務期辦理得宜為一勞永逸之計至班第達不能救䕶駐藏大臣念其勢孤力弱尚屬無過然亦無功可錄但不附逆黨猶知尊向天朝應俟徐加恩賜策楞到藏可以此意告之以安其心而用其力十二月癸未諭陜甘總督尹繼善辦理準夷貿易事宜上諭軍機大臣曰據員外郎甘布報稱本年辦理準夷交易共銀一十八萬餘兩此次夷人貨物較上屆原多理應按額裁減念該夷逺來復再三懇請是以從寛交易但銀數至一十八萬有餘此内雖有兌給物件而銀數已屬過多以間歳一至計之其數益當不貲夫外夷所増之數即内地所減之數且内地得貨而旋用旋敝外夷得銀則日積日贏不可不為深慮著傳諭尹繼善令其查照軍機大臣從前議准酌定章程劃清界限之處留心熟籌隨宜節制以為防微杜漸之計亦不得因此而過為裁抑輕議更張致駭夷人觀聽總期寓駕馭之意於柔逺之中無濫無苛妥協辦理可也戊子副都統班第自青海至藏壬辰西藏逆黨羅卜藏扎什等伏誅駐藏副都統班第奏言臣於十二月二十一日至藏傳集現存之官員兵丁等查訊起事情形備知十月十三日傅清拉布敦將朱爾黙特那木扎爾傳至寓中上樓相見時傅清拔刀刴殺朱爾黙特那木扎爾并殺其隨從四五人羅卜藏扎什聞信即跳樓而下往喚同黨聚兵圍樓施放鎗砲傅清遣人往傳班第達救䕶班第達因力薄不能救䕶奔告達賴喇嘛達賴喇嘛隨使人攔阻賊黨並不聽從放火燒房傅清身中三傷立即自盡拉布敦中傷更多為賊所害主事策塔爾㕘將黃元龍亦皆自盡筆帖式齊誠自刎未死通判常明亦中矢石之傷陣亡千總二員兵四十九名家人商民七十七人所有官庫帑銀俱被搶奪羅卜藏扎什等乘間逃走次日達賴喇嘛收聚餘兵安撫衆人公班第達擒獲賊犯羅卜藏扎什等十三人牢固監禁臣嚴加刑訊又供出夥賊徳什奈等十四人查各逆犯聚衆為亂殺害大臣刦奪帑銀兇悖已極應即立正國法隨於二十五日將為首之羅卜藏扎什與領衆放火搶奪帑銀之阿喇卜坦吹木札特殺死多人之車臣哈什哈放鳥鎗弓箭打傷大臣之達爾汗雅遜巴特馬古爾濟椿丕勒妄介俱凌遲處死聽從賊首殺人運草放火先行上樓助惡之尚卓特巴拉扎卜曽本旺扎爾曼金得什鼐等俱斬決隨從作亂之通使扎什喇卜坦等俱絞決懼罪自盡之杯隴沙克巴監斃之拉克袞布俱行戮尸與各磔犯一併碎骨仍各梟首示衆餘黨分别發遣家產變價歸帑奏入報聞平定準噶爾方略卷五十二
