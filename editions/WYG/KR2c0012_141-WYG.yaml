body:
  text: 乾隆二十五年夏四月庚辰諭定邊左副將軍成衮扎布等查辦烏梁海總管事宜上諭軍機大臣曰成衮扎布等奏據額爾克沙喇報稱烏梁海總管扎巴罕等游牧逺隔以致被掠又不加意防範致所屬逃走并疎脫看守之俘人布什伯克請議罪示懲等語著傳諭成衮扎布等若扎巴罕不過疎忽並無他故且尚能管轄所屬即加以戒飭仍令安居若情有可疑即將扎巴罕解京其總管之缺另行選補仍與察達克圖布慎等商酌辦理命赴新疆貿易旗民地方官就近給照行走上諭軍機大臣曰同德奏稱北路䝉古等願以牲隻來巴里坤哈密闢展貿易者俱由烏里雅蘓台將軍給與執照其由張家口歸化城前往之商民及内地扎薩克䝉古等因領照紆廻是以來者甚少等語新疆駐兵屯田商販流通所關最要著傳諭直𨽻山西督撫及駐劄將軍扎薩克等凡旗民願往新疆等處貿易除在烏里雅蘓台行走之人仍照前辦理外其張家口歸化城等處由鄂爾多斯阿拉善出口或由推河阿濟行走著各該地方官及扎薩克等按其道里給與印照較之專向烏里雅蘓台一路可省四十餘日程途商販自必雲集更於新疆有益該部即遵諭行命乾清門侍衛訥齊訥棟保鼐庫納蘓魯克沁前往阿克蘓聽叅贊大臣舒赫德差遣委用賜二等侍衛鄂必達博沁巴圖魯號索倫總管塔濟爾圖錫魯古敦巴圖魯號仍各賞銀一百兩癸未命傳諭都爾伯特部落加意收恤屬人上諭軍機大臣曰理藩院奏都爾伯特温圖呼爾等因生計窮乏聞伊弟安插察哈爾告知該扎薩克前往尋覔有違定例請遞解原旗令其管束等語温圖呼爾等窮乏求生實非得已又經告知該管情尚可原著加恩即與伊弟一同安插但該部落自投誠以來編設旗分佐領原欲伊等各安生業若不善收恤漸至分散殊為可憫著成衮扎布傳諭該扎薩克等其各加意撫綏勤於約束俾其守分謀生不致流離失所副朕痌瘝一體之懐命傳諭都爾伯特部落查明内大臣巴圖濟爾噶爾家屬送京完聚仍按例折給該部落銀兩緞疋定邊左副將軍成衮扎布等疏奏安插新附烏梁海户口事宜成衮扎布等奏言額爾克沙喇等報稱二月間在哈薩克附近之納林布魯勒等處收得烏梁海原任總管阿喇善逃散之屬人蘓克色格什等宰桑郭勒卓輝逃散之屬人楚魯木等又嗎哈沁都楞烏拉岱托卜啟等俱情願歸附等語臣等查此等降人向有收納之例請將楚魯木都楞等二十一戸令内大臣察達克兼管烏拉岱托卜啟等二十二戸蘓克色格什等四戸令散秩大臣圖布慎兼管奏入得㫖如所請行乙酉乾清門侍衛德保欽天監監正明安圖監副三品銜西洋人傅作霖四品銜髙慎思侍衛五林泰等繪畫回部輿圖還京命賞緞各四端丁亥諭總兵容保傳示霍集斯子漠咱帊爾在途養疾從容起程上諭軍機大臣曰容保奏稱䕶送漠咱帊爾行至沙泉子伊舊疾復發現令醫人調治似難速行等語漠咱帊爾既有疾待醫即養息數日俟痊愈後從容起程亦無不可伊父霍集斯已加恩優其廩禄居住京師并有家書寄示著容保即交漠咱帊爾閲看仍令其善為調攝與伊父相見有日也戊子諭㕘贊大臣舒赫德等議奏酌補伊犁管轄屯田回人伯克事宜上諭軍機大臣曰舒赫德奏稱伊犁屯田回人一千戸辦理陸續發往應設立阿竒木伯克等缺以資管轄擬設三品阿竒木伯克一員請㫖補授自四品伊沙噶至六品密喇卜伯克十五員或以現任伯克陞補或從著有勞績之人酌量選用其五品以上伯克令戴孔雀翎六品伯克令戴藍翎等語伊犁阿竒木伯克著額敏和卓之子木薩補授仍以公品級管事其四品以下各員應先於阿桂現在帶領之回人伯克内選補庶足以昭平允而示鼓勵其作何酌量揀選補授之處著舒赫德㑹同阿桂議奏所授伯克等品級及戴奬賞翎俱著照所請行諭吏部侍郎副都統海明葉爾羌掌印列名事宜上諭軍機大臣曰據海明奏抵葉爾羌時與額敏和卓章奏列名及掌管闗防之處請㫖遵行等語海明係内地大臣額敏和卓雖加王爵究屬回人不得與額駙策凌將軍成衮扎布為比著海明掌管闗防奏事列名在額敏和卓之前但伊不可以名居前列即輕視額敏和卓額敏和卓老成諳練辦理一切事宜當與和衷商酌則回人等益服我大臣之虛懐於公務自有禆益己丑諭部院衙門及八旗大臣等毋得任意指駁咨詢事件上諭大學士曰定長以恩賞臺站人員等事咨詢兵部而該部以未經具奏請㫖不便查辦駁回具奏從前各部院將外來咨文可以奏請辦理者往往任意指駁屢經訓飭今恩賞臺站人員久經降㫖定長咨詢即當奏請辦理或謂其應先具奏則於奏内附㕘亦無不可乃徑行駁回伊復准咨具奏往返稽遲徒滋案牘此皆推諉拘泥之陋習兵部堂司官著傳㫖申飭嗣後准到各處咨文其應辦理者即行奏辦或當㕘奏亦即附㕘若仍前推諉拘泥任意指駁必將定稿駁行之大臣加以處分著再通行各部院衙門及八旗大臣等知之庚寅命陜甘總督楊應琚即回本任上諭軍機大臣曰前命楊應琚巡閲新疆㑹同舒赫德等查勘駐兵屯田事宜嗣據節次奏報情形屢降諭㫖令其隨宜妥辦現在阿克蘓葉爾羌喀什噶爾等處已有舒赫德專司其事自可次第經理楊應琚身任總督内地事務亦闗𦂳要且舒赫德辦理事宜正資該督為之接應着傳諭楊應琚此時既無㑹商事件即回總督之任并傳諭舒赫德知之辛卯諭㕘贊大臣阿桂等辦理駐兵捜賊事宜上諭軍機大臣曰阿桂奏稱領兵過穆素爾嶺前抵特克斯伊分兵二百五十名往阿勒坦和碩之阿圭雅斯等處捜捕嗎哈沁餘兵䕶送回衆往海努克屯田等語阿桂前奏領兵往塔爾巴噶台堵截嗎哈沁等彼時因烏梁海被掠一事未知確實故由北路派兵令策布登扎布帶領在塔爾巴噶台堵截今已稔知哈薩克巴魯克巴圖魯所為遣使往索停止進兵阿桂亦可俟來年有暇再往巡查併傳諭舒赫德知之再舒赫德奏稱除阿桂帶往兵丁外因豐訥亨送馬伊犁又派滿洲索倫察哈爾兵三百名合之前數共兵九百名等語從前阿桂議奏兵數僅五百名今年屯田收穫若不能給千人之食亦須預為籌畫並傳諭阿桂所駐兵丁惟準收穫榖石量其敷用與否如有不敷即將餘兵發回阿克蘓等處度歳亦可且接濟口食之牛羊併須乗時送往庶不致冐寒行走徒多傷斃舒赫德等當㑹商辦理又諭曰阿桂奏伊領兵往阿圭雅斯一路此時安泰若即前來尚可㑹合但行文未能即達不便守候請令伊在伊犁附近捜捕後即由博羅布爾噶蘓直抵伊犁等語前諭伊等㑹兵特欲其兩路合圍同至伊犁並非謂伊等但一合兵便可了事也安泰此時已抵博羅布爾噶蘓亦未可定伊等宜互相探聽隨便㑹合惟以捜捕盡淨為要至辦理嗎哈沁與前此情形不同現在逃往哈薩克之厄魯特等多以困苦來投或藏匿山谷以丐餘生亦不必盡行勦殺當酌量招撫其台吉宰桑之可疑者解送京師餘人分别安插以供差遣并須預為曉示則降者必多否則伊等妄生疑懼或以死守或逃往他處乗間滋擾臺站俱未可定此内若有哈薩克錫喇等要犯斷不可疎脫併傳諭安泰等加意奮勉從事癸巳命寛免烏梁海總管扎巴罕等革職治罪上諭軍機大臣曰成衮扎布奏稱詢問烏梁海總管扎巴罕從前内大臣察達克等傳令遷移游牧伊仍行戀住致被哈薩克搶掠又不能約束屬人鄂勒錐圖致令逃走詢問章京布特勒圖官兵拏獲之哈薩克布什伯克等交令看守乃因睡疎脫俱罪無可辭布特勒圖應請㫖即行正法看守兵丁碩達等應鞭一百穿箭遊營扎巴罕亦應正法但年甫十七伊屬人藐玩成習情有可原應請革去總管另行揀選承襲等語布特勒圖等疎脫賊犯自應從重治罪但伊等俱係愚蠢之烏梁海布特勒圖著從寛免其正法兵丁等亦僅予斥革示懲免其鞭責穿箭扎巴罕不能管轄屬人疎脱賊犯自應斥革姑念年幼無知從寛免其革職仍令辦理總管事務察達克圖布慎等有與伊游牧相近者著派員協同辦事仍以朕憫念伊等施恩曲宥之處曉示知之丙申命副都統端濟布子伊達禮承襲三等輕車都尉世職己亥命優卹故内大臣薩喇爾上諭大學士曰内大臣薩喇爾人頗篤實効力有年今患病溘逝深為軫惻著加恩派散秩大臣一員侍衛十員往奠茶酒仍賞銀一千兩辦理喪事又諭軍機大臣曰薩喇爾病故伊兄布林現在熱河若欲來奠醊即由驛赴京或因天暑年邁艱於行走亦不必勉强惟令薩喇爾之子奔赴可也壬寅諭㕘贊大臣阿里衮曉示㧞達克山事宜上諭軍機大臣曰㧞達克山素勒坦沙接奉勅書賜物具表奏謝并陳土貢又致書阿里衮云伊與鄂蘓伯克等部落相讐請兵二萬往勦阿里衮復書云爾前此搶掠魯斯塔克俘獲甚多今又請大兵示威鄰部擴充游牧不敢代為懇請為當睦鄰和衆以享升平之福等語阿里衮復書詞意甚為合理素勒坦沙等若因俘獻霍集占等致鄰部興兵攻伐伊等力不能支或失地來投我發兵戡定其難尚屬可行今欲藉兵威以開游牧自當明白曉示朕亦頒給勅書仍著傅虎等齎往再波羅泥都之尸㧞達克山人等雖傳聞為親隨伊犁雅斯盗去已入昆都斯達勒罕但虛實未可知事屬既往嗣後凡遇㧞達克山使人不必再三詢問惟喀什噶爾有伊等先壟或潛行埋瘞駐劄大臣等當留心訪查傅虎等如齎送勅書可令先曉大意俾相見時不致失詞俱著遵照辦理賜㧞達克山素勒坦沙勅書皇帝勅諭㧞達克山素勒坦沙據駐劄葉爾羌大臣奏爾奉到勅書賜物具奏陳謝并陳土貢又致書大臣云從前爾部長密爾雜尼巴特與噶爾丹策零和好曽向彼乞師二萬往攻昆都斯達勒罕安第占之地諸鄂蘓伯克游牧俱歸附爾部落今因為天朝効力誅戮霍集占等致與鄂蘓伯克等為讐祈轉奏大皇帝發兵二萬勦滅讐敵等語爾素勒坦沙因呈送逆尸遣使入覲朕既特勅奬賞又聽爾盡收俘獲使人至京叠申宴賚爾祗受朕恩自當安生樂業奮勉圖報今覽爾所述情節朕嘗聞爾舊部長瑪扎爾伯克之子密爾雜尼巴特曽為鄂蘓伯克部落所擄瑪扎爾伯克以産寳石之地及馬匹什物獻噶爾丹策零請得宰桑哈栁兵萬人往鄂蘓伯克部落雖取回密爾雜尼巴特而準噶爾人等乗便搶掠昆都斯達勒罕安第占俘獲甚多後準噶爾向爾部落索取貢賦不與又遣和托羅等六千人來攻瑪扎爾伯克始服厄魯特回人等莫不知之夫噶爾丹策零之發兵其本意豈相佽助特利爾貢賦又乗便搶掠爾鄰部是非保愛之正所以侵擾之也朕爲天下共主無分内外一體撫卹惟負恩肆逆如霍集占乃不能曲宥其他循理守分之外藩未有無故興戎者即如準噶爾素稱强悍肆擾諸部其後自相殘賊朕以仁愛生靈之故始發兵平定厥後霍集占遁入爾地將軍大臣等咸請進兵朕恐致驚擾諭令駐師邊界遣使索取皆爾素勒坦沙所知爾既著有勞績若鄰部果因爾内附恃强欺弱結黨尋釁或致力不能支自當告之葉爾羌大臣請㫖發兵以申天討若爾地並未侵削更欲開擴游牧無故請兵并吞諸部則非以大恤小之義朕心有所不忍且内地兵馬甚多數萬人無難調集但距爾地頗遠若抵爾游牧所需芻糧宿舎恐未能供應徒滋驚擾耳爾既誠心效順惟宜約束所部和輯鄰封不可自啟釁端以招外侮長子孫而綿福禄計無踰此今以頒降勅書賜爾蟒緞四端爾其欽聽朕言永承恩澤特諭命加侍郎海明都統職銜上諭軍機大臣曰葉爾羌現有海明辦事阿里衮即可回京嗣後海明行文㧞達克山諸部落俱列銜於額敏和卓之前但品秩未崇恐見輕屬國著授為䝉古旗分都統其益加奮勉以副優擢至新柱抵葉爾羌後凡開列名銜又當居首俱傳諭知之諭乾清門三等侍衛舒常等厄魯特兵俘獲人口聽其帶回游牧毋庸另行辦理上諭軍機大臣曰舒常奏鄂齊爾告稱所攜俘獲人等情願於官給錢糧内自行養贍帶回等語從前因鄂齊爾等俘獲頗多沿途行走未便官為廪給故傳諭舒常呉達善等作為己意曉示若伊等能於所得分例通融養贍即准帶回或力有不能則變價出售亦可代為辦理今伊等既稱通融減省足敷口食仍聽帶回游牧無庸另辦癸卯命録用回人薩哈勒索丕等上諭軍機大臣曰内務府奏新編回人佐領内應補驍騎校一員領催四員薩哈勒索丕著加恩授為驍騎校仍賞緞二端其同來之們多索丕呢雅斯索丕業經編入佐領若們多索丕能管轄人戸即㧞補領催授副都統愛隆阿為正白旗䕶軍統領仍兼鑲白旗䝉古副都統瑪常仍兼正白旗漢軍副都統㕘贊大臣舒赫德疏奏審訊清馥罪案舒赫德奏言臣奉到審訊清馥諭㫖隨差人於四月初三日將清馥帶至阿克蘓將飾詞具奏情由逐欵審訊據清馥親供藍翎侍衛毛庫本等招降嗎哈沁斗齊令其先來投見行至中途忽將伴送之金國輔尼瑪殺害逃脱本欲據實具奏令隨印之寧夏防禦巴什勒繕摺巴什勒以為不便毛庫本亦再三懇求一時昏憒飾詞欺罔罪無可辯至巴里坤大臣等㕘奏逗遛近地未曽深入則所行道路隨從官兵俱可詢問臣因清馥既經認罪即遵㫖監看正法謹恭録諭㫖及審訊供詞通行各駐劄大臣知悉奏入得㫖下部知之命革寧夏防禦巴什勒職効力贖罪五月丙午諭管理屯田副都統定長等安設卡倫防範北山逸賊上諭軍機大臣曰納世通奏稱庫車一帶通北山各嶺處所俱安設卡倫派回人瞭望防守等語所奏殊中肯綮現在阿桂等駐兵伊犁捜捕嗎哈沁伊等無可棲止或越嶺侵犯回人村莊乗間盗竊臺站馬匹俱未可定著傳諭各駐劄大臣等將北山要隘可通回地者俱安設卡倫派兵防範仍不時委員巡查嚴拿逸出賊匪不可少有疎忽議烏魯木齊設官事宜陜甘總督楊應琚奏言烏魯木齊現議移駐提督應設管理糧餉文員請照哈密巴里坤之例添設同知一員管理地方監放兵餉通判一員收支糧儲并設倉大使一員又巡檢二員分駐昌吉羅克倫兩處統歸哈密兵偹道管轄奏入得㫖軍機大臣議奏尋議伊犁以迄回部一切駐兵屯田自當另為經理至附近内地等處如烏魯木齊以至昌吉羅克倫一切管轄地方收支錢糧自應添設文職應如所請行其添設各員缺該督又請將漢中府同知同州府通判韓城洋縣縣丞西安府照磨裁汰移駐改補亦照原議辦理奏入得㫖同知著定為滿缺餘依議丁未諭總督管甘肅巡撫呉達善查奏酌撥軍需銀兩事宜上諭軍機大臣曰呉達善請於鄰省撥銀六十七萬餘兩協濟為涼州寧夏莊浪等營加折糧料之用部議以該撫甫經兩次撥銀三百八十萬兩備用應即在二次撥觧銀兩内動支等語該撫前請撥銀八十萬兩原係接准楊應琚移咨即行奏請後該處屯田駐兵事宜概從緩辦則所撥前項銀兩自屬充裕且現在軍務告竣諒亦無甚急需著傳諭呉達善此次請撥銀兩即照部議在第二次撥觧銀八十萬兩内動支是否足敷應用將來不致缺少之處可詳查具奏戊申命致祭穆素爾嶺上諭軍機大臣曰舒赫德奏稱過穆素爾嶺下至山麓有澗名塞塞克愛噶爾雅勒其險處約四十餘里一值風雪即難行走必須住候晴霽從前準噶爾於其地樹旛誦經致祭今四月初旬遞送事件兵丁有凍斃者酌於附近之克斯地方造屋以資避禦等語穆素爾嶺為往來要路今山澗險阻猝遇風雪人力難施䝉古風俗俱誦經致祭著傳諭舒赫德如回人内有善於禳禬者令其䖍誠將事或無其人即遣厄魯特人致祭㕘贊大臣舒赫德等疏奏解送伊犁馬駝軍器事宜舒赫德等奏言四月初七日五吉解馬至阿克蘓臣等挑選三四分臕之馬八百餘匹阿桂前次所領官兵及此次豐訥亨所領官兵分别増給馬匹於初十日起程前往伊犁餘馬一千三百餘匹派員於阿克蘓附近牧放備用又選駝一百一十七隻添送威逺礮一位及火藥鉛繩等項俱交豐訥亨帶往奏入報聞辛亥授革職侍郎德爾格為郎中遇缺即補馳驛前往闢展隨同副都統定長辦事甲寅命革縣丞鮑立應職仍照發遣例留巴里坤安插上諭軍機大臣曰同德㕘奏協辦錢糧之縣丞鮑立應因回民孫起雲與差役馬九互毆違例將年逾七十之孫起雲濫刑致斃請交部嚴加議處等語鮑立應徇庇衙役違例杖斃無辜此等殘酷之員若不重治其罪何以示懲鮑立應著革職枷號示衆滿日仍照發遣民人之例留於該處同德將此等劣員僅請交部議處著傳㫖嚴加申飭乙卯諭烏魯木齊辦事副都統永瑞等市易馬匹事宜上諭軍機大臣曰烏魯木齊市易哈薩克馬一百三十餘匹現議暫於巴里坤牧放俟秋季得馬既多再遣侍衛等前往分羣駐牧等語此項馬匹若候解到之日始派員設立牧塲未免遲悮著傳諭永瑞等就哈薩克貿易情形計至秋季得馬若干先行具奏以便派員前往再從前與哈薩克貿易毎取其騸馬今既立牧塲則多收兒騍馬匹方有孳息但不可使知此意祗云奉有恩㫖因爾等既帶兒騍馬匹不必專收騸馬致勞往返嗣後一體交易俟安泰從伊犁轉回併傳諭知之恩免按察使銜納世通遺漏賞冊處分上諭軍機大臣曰據納世通奏稱從前辦理分賞各城回衆時僅辦理庫車沙雅爾兩城遺漏賽里木拜除補行分賞外請交部嚴加議處等語此等無心遺漏旋即覺察即請嚴加議處則疎脫逃人及進兵不力又當作何辦理納世通著從寛免其議處惟穆素爾嶺係阿克蘓伊犁要路著納世通酌派官兵不時巡查臺站捜捕嗎哈沁以靖地方丁巳命軍前効力撤回官員先補該旗額缺上諭軍機大臣曰黒龍江正黄旗滿洲驍騎校員缺該將軍等以奬賞藍翎領催嘉哈圖金圖擬正奬賞藍翎前鋒錫克索賚領催坦色木保擬陪請㫖驍騎校員缺著擬正之嘉哈圖金圖補授擬陪之錫克索賚坦色木保俱著記名年來官兵因軍前有功額外授職者甚多各該旗缺出應先將此項官員補授俟録用既徧再照舊例揀選應陞人員庶軍前効力者不致壅滯著交各該旗遵照辦理命賞故二等侍衛多隆武恩騎尉世職上諭軍機大臣曰二等侍衛多隆武在呼爾璊等處擊賊頗屬奮勉今於軍營病故雖非陣亡可比亦殊堪軫念著加恩賞給恩騎尉准襲一次仍賞銀五十兩戊午辦理伊犁屯田副都統伊柱疏奏海努克興屯事宜伊柱奏言臣同阿桂分路領屯田回人前來伊犁於三月二十八日至海努克其地舊有廟宇又有築成營壘周圍俱可耕種即將官兵駐劄與屯田回人相隔二三里易為防䕶其應行安臺瞭望之處自東北塔前起至東南離本營四五十里伊犁河南安臺五處其屯田回人三百餘名約相隔半里立一村莊共十五處於四月初二日起各修葺溝渠引水灌田計本月二十日所攜粟麥可播種全完其回人所分各莊均有墻垣基址暫行搭蓋窩舗俟農隙即伐木造房臣等駐劄處所有廟宇二所喇嘛等大小住房百餘間雖俱倒壊加以修葺尚可駐兵六七百名俟阿桂轉回再行酌定具奏奏入上諭軍機大臣曰伊柱奏稱屯田兵丁巳抵伊犁之海努克現在安設村堡修理溝渠等語看來伊犁屯田俱有舊蹟將來漸次開拓更於軍食有裨著傳諭伊柱於一切應辦事宜先時相度加意奮勉督策回人盡力耕耘勿為偷惰其地畝數目收穫情形可遇便陸續奏聞諭御前侍衛署副都統安泰捜捕嗎哈沁事宜上諭軍機大臣曰伊柱奏安泰至鄂勒濟因大水暫駐河沿等語安泰既抵伊犁又經休息可即於塔爾巴噶台一帶捜捕嗎哈沁若不能前往即由舊路回烏魯木齊可也命議叙解送馬匹之都司永成等上諭軍機大臣曰舒赫德奏都司永成等由烏魯木齊送馬一千餘匹時值秋末草黄沿途僅倒斃十五匹應遵㫖查奏請將永成等交部議叙其原任藍翎侍衛達爾扎桑作何加恩之處一併請㫖等語前經書山奏派永成等送馬至阿克蘓即諭舒赫徳俟到時查奏今既辦理妥協著將都司永成防禦布岱千總高天德把總龍顯竒等交部議叙兵丁等賞給一月錢糧達爾扎桑著加恩准其開復命定新疆兵丁回人等盗馬之例上諭軍機大臣曰舒赫德奏拏獲阿克蘓盗馬回人拜密爾咱因係積匪賊犯照回人舊例斬决梟示等語回地新經平定拏獲匪犯自應從重辦理但内地或間有無恥兵丁僕役等偷盗回人馬匹若仍照内地之律完結非所以示懲創著傳諭辦理回部事務大臣等嗣後回人盗本處及内地人馬匹俱照伊等舊例其内地人有犯亦照此例辦理併通行曉諭知之陜甘總督楊應琚等疏奏改設臺站事宜楊應琚等奏言查南路一帶戈壁本多自哈喇沙爾至庫車千餘里内如哈喇布拉克至䇿得爾計二百四十里玉古爾城至托和鼐亦二百四十里俱係戈壁又東至碩爾舒克六十里西至庫爾勒七十餘里有山岡二十四處馬匹易於倒斃臣等詢知玉古爾城至托和鼐戈壁十餘里外有阿爾巴特一處可得水草又距托和鼐七十里有地名喀喇烏蘓頗饒水草行八十里可至阿爾巴特至庫爾勒等處山岡外沿河另有㨗徑不過將山麓剷削簽樁補土如棧道式人馬俱可安行較之踰越山岡計可省三十餘里臣楊應琚書山定長和其衷等㑹商前因玉古爾城至托和鼐戈壁甚遠故於二站安設三站馬匹今既有水草之地應將多備馬匹撥出於阿爾巴特安設一臺再於喀喇烏蘓安設腰站在各臺馬内抽撥則道里之遠近維均而馬駝之往來尤便奏入得㫖如所議行平定準噶爾方略續編卷二
