body:
  text: 乾隆二十年秋七月癸巳密諭定北將軍班第等上諭軍機大臣曰班第等奏阿睦爾撒納種種狡詐屢次虛張哈薩克布魯特之信或云兵來或云欲與伊和好語言不定等語看來阿睦爾撒納妄思蠢動逆跡顯著朕已屢降諭㫖班第等自必遵辦至伊屬下人等應如何歸入公中分管之處此時亦宜密為籌畫再班第等遣員解送達瓦齊宰桑愛爾齊等及與巴朗同逃台吉内齊額布根等九人俱應行審訊其餘並非要犯不必盡行解京惟此内有因病留於囘部之吹索諾木額木齊俟病痊即行解京又從前班第等奏稱喇嘛呼必爾罕曾言阿睦爾撒納有統領準部之分今尚藏匿阿睦爾撒納處等語似此斷不可容留致使煽惑生事班第等即查出派員解送來京毋得任其脫逃又諭曰班第等奏據阿睦爾撒納告稱宰桑拉蘇隆係達瓦齊之黨該鄂拓克人等俱不信服乞將舊宰桑之子布庫補放宰桑拉蘇隆給與職銜令其効力應請㫖遵行等語布庫如果係舊宰桑之子令其補放事尚可行但伊等從前曾奏阿睦爾撒納依勢作威凡與伊有隙者有心阻抑其附和承順之人即與交好今所奏拉蘇隆布庫等一節係班第等照伊所請入奏而阿睦爾撒納反不置一辭或拉蘇隆與伊有隙又或布庫暗中交結皆未可定班第等恐為其所愚著傳諭密詢班第等如無前項情弊俟奏到再降諭㫖又諭曰班第等密奏達瓦齊牲隻什物阿睦爾撒納薩喇爾皆私自掠取彼此不相和協等語班第等以此事陳奏全未知朕用人之意阿睦爾撒納薩喇爾皆係厄魯特貪饕性成若使阿睦爾撒納無悖逆之跡不過貪取財物原可無庸深究至薩喇爾更係厄魯特屬人歸順已久受恩甚厚諒使必不至有僭妄狂悖之事若因此等小事疑而不用何以收羣策之力即以掠取牲隻什物而論朕知薩喇爾必不至如阿睦爾撒納之甚現在班第鄂容安會同薩喇爾辦理𦂳要事務若過於疑心使伊知覺轉屬無益班第等惟當開誠相示據理阻止薩喇爾自必聽從若亦如阿睦爾撒納之多方防範使伊畏懼或致激成事端關係匪細况薩喇爾不過暫住伊犁一二年並非令其長久任事之人此時無庸過於苛求班第等務宜善體朕意公同籌畫以副朕委任臣等謹案薩喇爾歸誠最先受恩最重我皇上念其熟悉彼地情形遇事奮勉因令宣力戎行以資策勵仰見聖主隨材集事之至意若其乗便掠取牲隻一節原屬厄魯特陋習將軍大臣等禁防太過適足啟其猜疑於軍務無益有損且其人即繩檢不周斷不至如阿睦爾撒納妄冀總台吉之比天語所頒實已揭其底裏且自古軍事權宜取濟不廢使貪使詐固與平居斤斤崇尚簠簋亷隅者不同伏讀聖諭曰開誠阻止曰無事苛求不惟用人之大度非諸臣所能窺測而至誠愷惻足以感孚異類兼收羣力睿謨碩畫尤為深切著明矣甲午諭止定北將軍班第等捜查準噶爾人等藏匿牲隻什物上諭軍機大臣曰班第等奏準噶爾内亂之餘時被哈薩克侵掠所有牲隻什物各游牧互行掠奪藏匿者多現在徹底清查等語準噶爾甫經平定辦理諸事俱宜寛大以慰衆心此際未經查出者可即停止惟阿睦爾撒納貪饕恣取不得任其隱匿俟將伊擒治後班第即於伊游牧嚴行捜查若阿睦爾撒納己起程前來候朕㫖到日再行辦理丁酉定議準噶爾投誠各鄂拓克宰桑等授官分職事宜定北將軍班第等奏言準噶爾各鄂拓克宰桑等陸續來降前奉諭㫖令臣等將鄂拓克宰桑世襲之處定議請㫖其達瓦齊所屬人等應歸入公中管轄臣等查各處台吉俱量户口多寡給與職銜應准其世襲其達瓦齊所屬宰桑得木齊等應請照扎哈沁包沁例作為公中屬下將為首宰桑授以三品總管果能奮勉無過准令伊子承襲如辦理不善即另選賢員補授此内有恩賞散秩大臣副都統等職銜者照瑪木特例仍兼總管之任戸口三千戸以上授為内大臣一千戸以上授為散秩大臣一千戸以下授為三品總管一百戸以上授為四品總管計戸口至一千戸以上授副總管一員至二三千戸者授副總管二員毎一百戸編一佐領各選授佐領一員仍留得木齊收楞額舊名謹將各宰桑應授職銜分别請㫖再伊等進貢之例現在稽查原冊酌議裁減其供贍喇嘛之沙畢納爾鄂拓克請仍照舊例辦理奏入得㫖軍機大臣議奏尋議班第等開列率領戸口來降宰桑共五十二人内綽和爾宰桑約蘇圖等前奉恩㫖俱授為散秩大臣至班第等業經議奏應授内大臣之喀喇沁宰桑鄂勒錐應授散秩大臣之克勒特宰桑巴桑等應授三品總管之庫圖齊訥爾宰桑鄂勒錐等共三十二員並已奉㫖俞允其未給職銜之二十人内惟烏爾古勒濟爾係準噶爾舊宰桑現在遵㫖派令入覲恭候欽定職銜其烏喇特宰桑厄爾錐音應授為内大臣巴爾達穆特宰桑扎爾齊木特楞古特宰桑卓特巴吞圖布等三人俱應授為散秩大臣烏魯特宰桑和爾和岱錫克錫爾格托克托博羅特烏爾罕濟蘭宰桑衮楚克扎卜阿都沁宰桑敦多克等五人俱應授為三品總管烏魯特宰桑杭吉勒圖烏克爾沁宰桑頗爾布等二人俱應授為四品總管又宰桑俄羅斯殺舊宰桑竒塔特率其四千餘戸來降應授為内大臣但所率非其屬下應授為散秩大臣並交班第等酌量或令俄羅斯管理該鄂拓克或應另選賢員管理之處詳議具奏其宰桑巴蘇泰糾合庫圖齊納爾之得木齊博托什率九百餘戸來降亦應授為三品總管並交班第等查明博托什現在何處及應否給與職銜之處另行定議再朔包沁之得木齊賽音察克率一百五十餘戸來降奉㫖授為副總管現在定議一百戸以上者俱授為四品總管其賽音察克職銜仍候欽定拉布林集賽得木齊朋楚克綽倫巴圖吹扎木素多爾濟俱應授為四品總管所有賞給内大臣散秩大臣等職銜人員俱照瑪木特例仍令兼總管之任將來或令承襲或另選賢員俟酌量人才分别辦理其分别設立副總管並編設佐領各事宜俱應如班第等所奏辦理至伊等毎歲進貢之例即令班第等查明舊冊酌量裁減其供贍喇嘛之沙畢納爾應仍照舊例辦理奏入得㫖所有準噶爾舊有之四圖什墨勒厄爾錐音約蘇圖阿巴噶斯俱著授為内大臣其衮布所遺之缺俟選人補授亦著授為内大臣賽音察克仍授為副總管餘依議己亥定北將軍班第等疏報分隊撤兵事宜班第等奏言臣等前奏帶兵至尼楚滚地方留駐劄兵丁五百名其各處兵丁俱令陸續撤回今於七月初七日已至尼楚滚地方將察哈爾喀爾喀兵五百名留駐其撤回兵丁按隊編次北路喀爾喀兵五百名扎哈沁兵三百名索倫兵三百名為第一隊令王桑寨多爾濟貝子沙克都爾扎卜公策登薩木丕勒等帶領於十一日起程察哈爾兵二千餘名為第二隊令副都統栢起侍衛薩木都卜等帶領將臣阿睦爾撒納兵一千五百餘名隨後撤回西路都爾伯特兵二千名為第一隊令王策凌孟克等帶領於初十日起程察哈爾兵八百餘名喀爾喀和托輝特兵三百餘名為第二隊令貝勒品級車木楚克扎布公旺布多爾濟總管巴祿等帶領寧夏涼州莊浪滿洲兵及綠旗阿拉善𤓰州哈密囘兵等一千餘名令將軍和起等帶領陸續撤囘最後索倫兵一千七百餘名令副都統額爾登額總管畢里衮等帶領其三格帶領之索倫兵一千名飭營總等帶領撤囘各處兵丁從前給與口糧已踰日期現將尼楚滚牧放羊隻酌量給與俟至塔爾瑪善屯田地方所種糧石計已收穫令毎人支給一斗以資接濟臣阿睦爾撒納遣囘扎卜堪游牧兵七百餘名亦一例支給其安置塔爾巴噶台游牧兵八百名既有此處羊隻可以接濟無庸給與口糧各隊撤囘兵丁俟過烏蘭呼濟爾察罕呼濟爾等處即將喀爾喀聲援兵三千名亦給與口糧羊隻令副都統扎爾杭阿王巴扎爾什第公達爾扎巴圖孟克齊旺多爾濟等帶領撤囘其塔爾瑪善處計可得糧二千石支給撤回兵丁約需七八百石尚餘千餘石請給臣阿睦爾撒納游牧人等作為口糧並將屯田兵丁令塔爾瑪善成衮扎布等陸續撤囘奏入報聞庚子命解布魯古特台吉尼瑪來京先是定邊右副將軍薩喇爾奏言西路進兵時達瓦齊遣布魯古特台吉尼瑪前往額林哈畢爾噶地方探取噶爾藏多爾濟信息經官兵拏獲解赴定西將軍永常營内拘禁至是傳㫖劉統勲遴委幹弁押解尼瑪來京辛丑密諭定北將軍班第等上諭軍機大臣曰班第等密奏阿睦爾撒納種種逆跡圖據準噶爾地方及促令起行後次日即行住宿復遣納噶查告稱阿巴噶斯約蘇圖烏克圖與喇嘛等潛行計議如不令阿睦爾撒納統領駐劄伊等寧剖腹而死不能貪生别事他人等語阿睦爾撒納叛跡已彰辦理自不容猶豫昨據奏阿睦爾撒納已於初十日起行朕意方謂就此辦理甚屬便易但據班第今日所奏則似阿睦爾撒納意中已不無猜疑朕心深為厪念乃班第等奏稱或俟伊至熱河時酌量辦理或令於熱河附近及呼倫貝爾等處居住所言參差不定是全不知事理之輕重矣試思現在事勢至此朕即有姑留阿睦爾撒納之意伊等俱係目悉情形理當據實陳奏無所遲迴而乃二三其説不能果斷若此朕甚不取再如阿睦爾撒納故令納噶查來述阿巴噶斯等之言彼時如何相答亦未奏及又稱將約蘇圖等業行調取等語夫阿睦爾撒納遣囘納噶查逞其誕妄之詞明係試探伊等使識見明敏之人即當向納噶查云阿睦爾撒納與我等同為將軍伊之前去即如我等前去我等在此亦即如伊在此宰桑等何敢作此妄語果其有之即應向阿睦爾撒納查問如此詰責不但當下情詞可以洞悉即伊囘告阿睦爾撒納時亦可欵慰其心今既不出此恐阿睦爾撒納不能不生疑畏再達什達瓦之妻告稱阿睦爾撒納欲娶其女協力相助即可收服四衛喇特之語似覺荒唐以阿睦爾撒納之人之行此言在所必有但今日安肯輕吐使薩喇爾聞之能保其不為傳述乎伊即有此言班第等惟應密加防範而仍示以不疑乃告以將此情節具奏殊非愼密之道今此事既往無庸置議此間相距甚遠一切事宜班第等務宜相機籌辦勿致稍有貽悞再觀阿睦爾撒納欲前復却情形其意詎肯徑行前來班第等此時如遵朕前㫖將伊業已擒治固甚妥協如未及辦理而伊已起程前來勢必在塔爾巴噶台游牧處逗留班第等加意探訪一得信息即遵朕屢次所降諭㫖務期熟籌妥辦一舉萬全無少疎漏愼之申諭定北將軍班第等擒治齊木庫爾事宜上諭軍機大臣曰昨傳諭班第等辦理阿睦爾撒納後即將齊木庫爾等一併擒治今思阿睦爾撒納受恩深重奸狡狂悖實為罪魁齊木庫爾等尚與納噶查之附和生事者有間若一併辦理恐準噶爾各部妄起猜疑且以擒治一二人而發兵動衆亦覺非體著傳諭班第等將來擒治齊木庫爾等不必帶兵但令其前至軍營解送來京若抗拒逃遁再發兵聲罪致討其分散游牧人衆及清查牧場各事宜仍遵前㫖行臣等謹案阿睦爾撒納肆逆潛逃如納噶查等之甘心同惡搆煽相尋其罪自不可逭至脅從之衆株連過甚無論玉石俱焚且適阻其自新之路况阿逆蹤跡始露即妻子兄弟亦知其負恩逆理不能倖免皇上洞悉其衆叛親離必生擕貳雖與逆同氣如齊木庫爾且特降諭㫖暫停擒治即附逆之阿巴噶斯等尚令將軍大臣詳察或係實心黨惡或係勉强服從分别辦理蓋由聖主德威遐鬯所以馭逖聽之衆者事事義盡仁至彰癉咸宜自能感發其去逆效順之天良也觀於齊木庫爾於阿逆未竄之前已將欲叛情形告之額林沁多爾濟愈以見我皇上知人服物之神無遠弗届視史策所稱尤有超出隆古萬萬者矣八月壬寅朔副都統普慶達色疏奏帶領兵丁駐劄烏里雅蘇台日期普慶達色奏言臣普慶帶領第一隊京兵至錫爾古勒圖地方於六月十二日准將軍班第等撤兵文移即遵照撤囘嗣於七月初九日接奉諭㫖令臣普慶於京兵内帶領五百名臣達色於索倫兵内帶領五百名駐劄烏里雅蘇台聽候阿蘭泰調遣臣普慶遵㫖於京兵一千名内揀選五百名派章京五員管轄於七月十九日已抵烏里雅蘇台餘兵五百名交帶領第二隊兵丁之翼領存保等於二十四日起程囘京臣達色於十八日已抵烏里雅蘇台將索倫兵揀選五百名駐劄聽候調遣所有臣原帶黑龍江兵二千名編為四隊於二十四五等日起程遣囘奏入報聞癸夘諭駐劄烏里雅蘇台辦事大臣莫爾渾等上諭軍機大臣曰莫爾渾等奏請將撤囘各隊兵丁内留駐二千名馬三千匹於烏里雅蘇台備用等語所奏殊屬畏葸從前降㫖以看守烏里雅蘇台軍營為名留兵一千今忽倍增其數倘阿睦爾撒納覺悟猜疑將致别生事端若慮伊等游牧滋事須以兵力彈壓則將來所擒治者不過阿睦爾撒納黨羽數人其餘俱可撫慰安定何事張皇今計阿睦爾撒納尚未至烏里雅蘇台著速傳諭莫爾渾等仍遵前㫖留兵一千名馬二千匹已足供調遣之用此時阿蘭泰已應抵烏里雅蘇台諸事悉心會同商酌妥協辦理務宜慎密不得稍露形迹甲辰密諭定北將軍班第等上諭軍機大臣曰班第等奏稱阿睦爾撒納納噶查阿巴噶斯察哈什等迴避衆人密商竟夜或煽動各游牧使不遵約束或與綽和爾約蘇圖等結連哈薩克布魯特侵擾邊境俱未可定等語阿睦爾撒納之必應擒治自無可疑但看此情形伊詎肯即來入覲勢必逗留於塔爾巴噶台游牧班第等即遵前㫖辦理至阿巴噶斯察哈什等跡似同謀或但畏懼伊之總統準部或實係有心甘為黨惡俱宜體察若同黨屬實即應一併辦理若勉强順從而概加擒治準部諸酋見因一人而株連甚衆人人疑懼亦有未便此等機宜班第薩喇爾鄂容安宜詳悉籌酌相機辦理至囘部霍集斯伯克已降㫖令其明年入覲所奏伊於解送達瓦齊時陰求阿睦爾撒納俟招降葉爾羌喀什噶爾後令其總統各部心殊叵測此但因阿睦爾撒納現係將軍且恐其總統準部耳尚無足深慮惟阿睦爾撒納遷延留戀甚有關係班第等若即能辦理固善或前來熱河須候朕㫖再行再班第等前奏阿睦爾撒納起程後納噶查前來試探述阿巴噶斯等誕妄之語今伊等竟夜密商或即係此情節前經班第等將伊等調取曾否前來摺内何以並未聲明又阿睦爾撒納等屏人私議既為班第等偵探而知而遣人偵探之時阿睦爾撒納又豈竟無知覺此等事宜務須密之又密方無貽誤至阿睦爾撒納所收達什達瓦等屬人及掠取别部人等擒治伊等後即當分别辦理或給還本部或編次歸公務宜逐一清查釐正又所奏巴里坤駐兵一節著班第等將久在準噶爾之滿洲䝉古兵丁查明數目令在巴里坤居住伊等言語風土既為熟習若與瓜州安西兵丁更番輪替俾新調各兵漸次學習將來即可挈家駐劄仍俟班第等奏到日交軍機大臣會議以聞己酉申諭辦理阿睦爾撒納事宜上諭軍機大臣曰班第等奏稱奉到六月二十八日諭㫖時阿睦爾撒納業與額林沁多爾濟同行又有各處撤囘兵丁在後阿睦爾撒納自必前來入覲等語阿睦爾撒納果來至熱河辦理自易且將伊罪惡令暴白於新來投誠人等亦可以快衆心而彰國法但伊甫經起程即有人指其罪狀紛紛告訐伊豈不聞風畏懼且伊自揣所為必不敢前來入覲雖已起程或沿途托故戀住游牧事所必至伊現在已抵何處摺内未經奏明前曾諭及起程若尚在十日以内即行擒治此時曾否辦理所當加意愼密如尚未辦理現在雖有攻擊阿睦爾撒納之人且陽為解勸置之不問切勿令其知覺致生他變至阿巴噶斯誕妄情形顯與同惡今伊忽告薩喇爾云從前隨阿睦爾撒納行走未得在將軍前効力等語前經班第等調取阿巴噶斯等前來此時果遵調前來與否摺内亦未明晰又管理伊犁渡口囘目鄂斯滿伯克來訴阿睦爾撒納强取其牲隻口糧俟辦伊游牧後酌量給還即不敷抵補料擒治阿睦爾撒納後衆心已快亦可無庸補給再所奏塔爾巴噶沁台吉額林沁由哈薩克逃囘現住博羅塔拉與阿睦爾撒納同族而有宿嫌今雖攀援内附中心必不相合俟來見時加意體察自可得哈薩克與巴特瑪車凌信息等語班第等或令額林沁前來入覲或酌量安插原游牧處公同酌定即行奏聞至薩喇爾於阿睦爾撒納之姊來見時察其醉語甚屬留心但婦女言詞不足深究即如阿巴噶斯等亦不過趨附勢力勉强脅從之人若概行窮治則各部未免生疑但阿睦爾撒納既有令伊姊子沙津巴圖管領達什達瓦户口協力同助之語將來或即將沙津巴圖安插於察哈爾地方若沙津巴圖尚無異心亦不必安插將此傳諭班第等俟辦理阿睦爾撒納後即遵㫖辦理庚戌定議辦理達什達瓦屬下戸口事宜定邊右副將軍薩喇爾等奏言聞阿睦爾撒納欲將達什達瓦所屬數千户請給伊姊子沙津巴圖管轄應請㫖將達什達瓦屬人作為公中管理併給與游牧地方以絶其僥倖之心奏入得㫖軍機大臣議奏尋議現在遵㫖傳諭將軍班第等俟辦理阿睦爾撒納後將伊所占達什達瓦屬下及各部落人等分别給還本部或編次歸公今達什達瓦部衆分散有見大兵前進陸續來投亦有伊等自行收集者應查出極貧之户較賞給阿睦爾撒納屬人口糧數目酌減每人給與馬一匹羊二隻每二人合給乳牛一隻其德勒格爾之子沙津巴圖特古斯哈什哈之子布圖庫祇應給與伊等舊日屬人所有達什達瓦車凌那木扎爾伯格里等屬人作為公中管理至達什達瓦之孀婦酌量給與户口以資養贍此項人衆應於今年移往舊游牧哈喇沙爾地方從庫車等囘部支給口糧明年令在博克達種地俟秋收後移往科卜多布延圖居住又臣等奉㫖以達什達瓦之妻不與阿睦爾撒納結姻應賞給封號以示奬勵請俟辦理阿睦爾撒納後再行具奏請㫖奏入上從之辛亥諭駐劄烏里雅蘇台辦事大臣莫爾琿等防範阿睦爾撒納游牧地方事宜上諭軍機大臣曰據納穆扎爾奏據阿睦爾撒納屬人告稱現在烏蘭布木地方水草缺乏請將游牧移於扎卜堪河之鏗格爾格固冶地方以度秋冬現已准其所請等語納穆扎爾未知辦理阿睦爾撒納事宜准其遷移游牧今若復令囘至原處徒多紛更亦有未便但現在解送恩克博羅特來京時阿睦爾撒納遣伊宰桑至其游牧其中必有詭計今忽請遷移游牧事甚可疑著將納穆扎爾奏摺抄寄莫爾渾等閱看宜事事留心防範此際若已得阿睦爾撒納前赴游牧信息即速奏聞壬子命厄魯特頭等侍衛恩克博羅特吞圖布在乾清門行走甲寅申諭辦理阿睦爾撒納事宜上諭軍機大臣曰班第等奏都爾伯特台吉伯什阿噶什告稱從前古爾班和卓聞大兵平定伊犁原與哈薩克計議歸附續因阿睦爾撒納遣使到彼哈薩克復有出兵信息請遣兵相助以為聲援班第等遂派侍衛章武宰桑博第前鋒阿喇勒拜等前往等語看此情形明係阿睦爾撒納陰相煽誘即如阿巴噶斯等亦皆受其籠絡今但將阿睦爾撒納擒治釁端即可永弭朕意阿睦爾撒納此時必逗留於游牧地方班第等即遣人往追伊必不遵行惟遵照前㫖即令薩喇爾鄂容安領兵至塔爾巴噶台將伊擒治方為妥協如伊果前來入覲則俟伊到熱河時辦理固甚易也從前遣使至哈薩克時阿睦爾撒納必令伊屬下人前往其中顯有詭計曾降㫖將伊所遣之人訊問班第等如業將阿睦爾撒納擒治即嚴拏阿睦爾撒納遣往哈薩克之人訊明切實供詞具奏再班第等曾奏訪得阿睦爾撒納與阿巴噶斯等竟夜屏人密語而納噶查傳説阿巴噶斯誕妄之言有若不令阿睦爾撒納統率準噶爾伊等惟有剖腹而死等語乃阿巴噶斯又向薩喇爾告稱有被阿睦爾撒納留住不得在將軍前効力之語如班第等訪聞屬實則伊等有心同謀罪在不赦如阿巴噶斯向薩喇爾之言果係實情則是第為阿睦爾撒納威力脅制情尚可原班第等應加意體察不可受其欺紿亦不得過於疑慮且似阿巴噶斯之人亦必不一而足若辦理阿睦爾撒納後一一根究則以一人而株連衆人新降人衆必生疑懼於事無益班第等務宜斟酌辦理今所慮者阿睦爾撒納或乗間逃入哈薩克亦未可定如果逃往班第等即遵朕前㫖遣人曉諭哈薩克務必令其擒獻倘不遵行則以兵力進取現在阿睦爾撒納行至何處及於何處逗留摺内並未聲明著即速查明具奏至此次投誠之台吉宰桑等朕俱酌量施恩賞給爵秩伯什阿噶什將哈薩克情形詳悉告知其輸誠更屬可嘉且係準部大台吉著加恩封為親王前鋒阿喇勒拜亦屬奮勉著賞給藍翎伊等前往招服古爾班和卓後即將情形奏聞定北將軍班第等疏奏辦理霍勒博斯宰桑巴雅爾拉虎事宜班第等奏言霍勒博斯鄂拓克得木齊雙和爾等告稱達瓦齊將我等宰桑吹納木喀之子巴顔哈什哈殺戮用其黨巴雅爾拉虎為宰桑殘虐不法造言煽惑請加懲治等語臣等查從前準噶爾夷使吹納木喀之子巴顔哈什哈既為達瓦齊所害巴雅爾拉虎繼為宰桑大兵到時全部俱已輸誠伊未經前來投順又曾阻止伯什阿噶什歸降今為伊得木齊等控告臣等飭交侍衛章武等前往辦理令伊親身赴質若仍遷延不至即著伯什阿噶什等擒送治罪仍于吹納木喀子孫内令鄂拓克公舉一人補授宰桑奏入報聞定北將軍班第等疏奏平定準噶爾續進各隊官兵自六月初十日至二十四日陸續撤囘奏入報聞乙夘定北將軍班第等疏奏哈薩克通使情形班第等奏言臣等奉到七月初五日諭㫖令臣等追囘阿睦爾撒納相機辦理臣等公同酌議阿睦爾撒納起程已十四日但聞伊在博羅塔拉等處逗留相去自不甚遠即遵㫖行文令其囘至軍營是日據阿睦爾撒納遣往哈薩克之丹津與哈薩克來使阿穆爾巴圖魯同至告稱阿睦爾撒納起程已十三日伊等速囘亦須至額米爾等處方可追及等語臣等詢問哈薩克來使願與阿睦爾撒納同行且辭意極為恭順今若將阿睦爾撒納倉卒調囘伊必益生疑忌且哈薩克來使未知始末見而驚懼逃竄聲張均未可定似應不露形迹俾行近内地時再為辦理因酌量賞給來使遣囘阿睦爾撒納處即星夜遣人追囘送文之丹巴喇等復遣人偵探阿睦爾撒納已至何處作何行止陸續來報奏入上諭軍機大臣曰班第等奏遵㫖行令阿睦爾撒納囘至軍營適伊從前遣往哈薩克之丹津與來使同至辭頗恭順未便遽將阿睦爾撒納調囘致生事端遂即停止追囘等語所辦尚合機宜但哈薩克來使阿穆爾巴圖魯既懇入覲班第等即應明白曉諭以阿布賚誠心欵附恭順可嘉我等即奏聞大皇帝令爾等隨阿睦爾撒納一同入覲如此伊等既知内地將軍權柄所在而阿睦爾撒納亦難於阻止今將來使遣回聽阿睦爾撒納定議恐伊未必遣令前來在阿睦爾撒納初不願哈薩克來使恭請入覲而又難於禁止是以令往班第處定議今班第仍交阿睦爾撒納辦理是則墮其術中殊未允協嗣後哈薩克如再遣使前來即徑送入京至阿睦爾撒納之兄普爾普宰桑烏巴什及在逃之固穆扎卜等或隨伊入覲或留匿伊游牧處俱應分别辦理惟葉克明安之德濟特察衮初降時頗屬安靜後漸驕縱貪饕此特附和阿睦爾撒納之人班第等宜詳察情形相機辦理又所奏善披領集賽之尼爾巴喇嘛密告阿睦爾撒納使伊等保留駐劄不願入覲伊等未經允從又告其暗結各宰桑遣回游牧情事甚屬可嘉著即授為大喇嘛明年令其前來入覲現在章武阿喇勒拜等協同伯什阿噶什招撫哈薩克可即將哈薩克現在遣使前來之處曉示伯什阿噶什等伊等抵哈薩克邊境時毋得搶掠生釁惟加意防守即伊部落有兵侵軼亦先以理諭令其撤回如不遵再為擒𠞰仍將招撫哈薩克情形陸續奏聞己未命副都統鄂實帶領達瓦齊及伊子於張家口外居住俟熱河回鑾行獻俘禮所屬宰桑等即解京看守庚申申諭定北將軍班第等籌辦阿睦爾撒納同黨及游牧事宜上諭軍機大臣曰朕前降諭㫖俟辦理阿睦爾撒納後若將同黨之德濟特察滚阿巴噶斯察哈什等盡行擒治恐準噶爾各部妄生疑懼此中若有實係脅從非其本心者即不必辦理又如阿睦爾撒納之兄普爾普扎木叅齊木庫爾其俱應擒治與否班第等宜悉心體察據實奏聞再阿睦爾撒納之塔爾巴噶台游牧人衆朕意與其分給衆人不若令喀喇巴圖魯阿玉錫管領再擇一協同管領之人在扎卜堪等處居住亦可仍傳示伊游牧以阿睦爾撒納負恩悖逆斷不可留罪止其身與衆無與特不忍伊等離散派出大員管理似此辦理事後可不致别生事端與否班第鄂容安現在彼處薩喇爾稔知伊等情形著即公同會商具奏命授包沁宰桑綽滿為四品總管上諭軍機大臣曰據班第等奏稱上年收服包沁宰桑綽滿屬下九百餘戸時將伊兄阿克珠勒授為總管及大兵抵伊犁綽滿即前來投誠等語上年收服包沁人衆時綽滿未在游牧伊兄阿克珠勒率屬先降是以授為總管今綽滿又經歸降著授為四品總管協同伊兄管領部衆班第等可即傳諭阿克珠勒綽滿知之命授故扎哈沁宰桑敦多克之弟鄂爾竒木濟為散秩大臣仍襲伊兄宰桑管理游牧事辛酉命議給準噶爾台吉宰桑等俸祿上諭軍機大臣曰準噶爾各台吉按其戸口封爵授職俟伊等入覲之日再降諭㫖其給與俸祿應先為查辦再管理事務之宰桑等既有職分亦應給俸但道里遼遠若俱頒自内府未免繁費非久遠可行之道除王公扎薩克俸祿仍由内地頒發外其給與宰桑等俸祿若於衆鄂拓克應交賦税内支給較為便捷著傳諭班第等將準部王公扎薩克等照内地扎薩克一體給俸作何支領其宰桑等俸祿如何酌量等級由交納賦税内除養贍喇嘛外可否足敷支給之處詳悉查明定議具奏命派定準部歸公管轄之二十一昻吉等旗分上諭軍機大臣曰準噶爾四衛喇特台吉等俱照内扎薩克一體分封汗貝勒貝子公扎薩克等爵秩令各管轄所屬諸事俱應照内扎薩克一體辦理此時尚無庸分派旗分其歸公管轄之宰桑等無人統轄此項鄂拓克等應照察哈爾等擬定八旗名目著班第等將歸公管轄之二十一昻吉仍存其舊日名號分立八旗定議具奏平定準噶爾方略正編卷十六
