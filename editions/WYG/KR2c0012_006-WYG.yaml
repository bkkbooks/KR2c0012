body:
  text: 康熙五十八年春正月戊戌議築城于鄂勒錐圖郭勒及茂岱察罕廋爾振武將軍傅爾丹等疏言鄂勒錐圖郭勒土田肥沃四時寒暑與内地同宜築城駐兵其設立驛站員外郎保住已自殺虎口至鄂勒錐圖郭勒一路詳視水草甚佳應設三十六站議政大臣等議如所請奏入得㫖鄂勒錐圖郭勒居喀爾喀游牧地方之中與大兵駐劄處相隔千里今欲衛䕶喀爾喀應于阿爾台科卜多等處築城逺立哨兵方是伊等既奏鄂勒錐圖郭勒之田地肥饒寒暑與内地相同應築城以貯糧餉或于科卜多地方另築一城駐兵看管充發人等耕種其應否築城之處著問保住及喀爾喀王貝勒貝子公等㑹議具奏尋議臣等遵㫖訽保住及自軍前來喀爾喀王等據言科卜多地隔大河水漲時輒阻行且材木難致修築不便近科卜多地曰茂岱察罕廋爾水草佳美木亦易購且其地去鄂勒錐圖郭勒千里與喀爾喀接壤應于其地更築一城屯兵于衛䕶計尤便其間宜設㡬站及發人往耕種者並宜安插應令將軍傅爾丹等詳視地形確議具奏奏入上從之是秋八月傅爾丹等疏言茂岱察罕廋爾及鄂勒錐圖郭勒二地各築一城每城置屋二千間自鄂勒錐圖郭勒至茂岱察罕廋爾宜設十一站議政大臣等議應如所奏令理藩院遣司官一人往同將軍設立驛站其夫馬車輛並視前者古北口外設站例耕種之人于築城建房畢時陸續發往俟耕種一年再遣官兵駐防奏入得㫖依議設立驛站之處甚屬𦂳要著兵部尚書范時崇前往料理癸夘命額駙呉爾衮赴軍前先是額駙呉爾衮以母喪召還至是仍命赴軍諭曰今年大兵既不前進若發兵襲擊則䇿妄阿喇布坦情形自露著派盛京烏拉察哈爾索倫喀喇沁及内地喀爾喀兵一萬自前年進兵處往彼襲擊出兵時不必派厄魯特王車凌旺布公多爾濟塞卜騰之人又前欲令盛京三千兵越過巴里坤地方今暫行停止此次襲擊之兵令六月發往及秋而回倘今年不便襲擊來年另為籌度爾到傅爾丹處詳議後即差人到巴里坤將軍處㑹議具奏二月壬戌靖逆將軍富寧安奏請築城于庫克車勒富寧安奏言烏蘭烏蘇四面皆山地隘不可以多駐兵庫克車勒形勢寛衍且去烏蘭烏蘓近應擇庫克車勒地有水草處築城浚池駐兵二千遣大臣二人管理鄂隆吉噶順哈洮等處並築堡各駐兵一千所在各遣大臣一人管理約洛圖烏蘭烏庫爾黙圖二地去噶順哈洮不逺亦築堡各駐兵五百庫爾黙圖築堡駐兵三百並令侍衞及副將等官管理諸處悉不産材木應築土堡每堡相間處築烽墩酌量置兵令其瞭逺遞送消息庫克車勒等處與巴里坤相間約三百里應酌量派兵于鄂什希廋集等處設營以為應大軍駐劄巴里坤如故自烏爾圖哈畢爾噶一路至庫克車勒鄂隆吉凡設六站臣躬率大臣侍衞往庫克車勒等處相度何處可築城堡烽墩及展汛界設臺站牧放牲畜等務一面修築城堡烽墩一面令兵駐劄奏入得㫖下議政大臣知之癸亥命分牧駝隻于鄂爾多斯議政大臣等議曰解往甘肅駱駝五千應送寧夏令巡撫綽竒撥官及兵丁于察罕托輝水草佳處牧放冬時進口于寧夏支草料飼養奏入得㫖此事議未周詳駱駝何必交付漢人仍令䝉古大臣侍衛並兵丁看守牧放冬時亦在與駱駝相宜之處牧放何必支領草料著另行詳議具奏尋議曰應令沿途撥兵遞送駱駝至鄂爾多斯其散秩大臣殷扎納䇿凌並侍衛等送駱駝者分兩路一出張家口一出殺虎口徐徐驅至鄂爾多斯率彼處官兵擇水草佳處牧放冬時亦于駱駝相宜處牧放以備巡撫綽竒侍郎色爾圖調撥奏入上從之辛未命都統法喇招撫里塘䕶軍統領噶爾弼赴四川辦理軍務法喇等疏言里塘去打箭爐甚近若遣官招撫必當歸順巴塘民心與里塘亦相似請遣官一人先至里塘宣示威徳彼若向化即收其地戸口清冊至巴塘亦如之若有觀望不至者于草長時以兵臨之彼必不敢我抗應選成都滿兵五百令協領等領之緑旗提標兵一千化林永寧兵五百令永寧副將領之并力深入雖巴塘以外亦可𫝊檄而定若察木多亦來歸順則去藏不逺矣便當㑹兵取藏一面檄知西寧雲南領兵大臣一面星夜請㫖議政大臣等議曰應如所奏即令法喇率兵赴打箭爐駐劄遣人招撫如有觀望不至者令法喇率兵進攻里塘巴塘即駐劄巴塘其䕶軍統領温普應調取來京成都既有滿洲兵丁應自京師遣大臣赴成都令其管領奏入得㫖軍前大臣甚多著派䕶軍統領噶爾弼就彼馳驛作速前赴四川與年羮堯一同辦理軍務法喇離打箭爐切近即令領兵前往餘依議癸酉定茶禁都統法喇疏言䝉古及西藏所在悉資茶養生賊人即據藏地非茶㫁難久居我皇上憫念青海與里塘巴塘人衆非茶不生活以如何分别禁止令臣等詳議臣等思唐古忒人悉為賊所迫脅不當禁其養生之物但今松潘路茶價甚賤青海一帶積茶必多應暫嚴禁俟彼懇請再酌定數目令其買運至打箭爐外最近者為里塘遣官招撫令營官收其所管番寨戸口清冊酌量定數許之買運巴塘以外亦如此例其打箭爐一路當視番情向背分别通禁議政大臣等議如所奏奏入上從之三月辛巳命永寧道髙其佩赴打箭爐上諭議政大臣等曰四川總督年羮堯奏據西藏之第巴達克咱報稱䇿零敦多􅁲等將被截取藏之五百名兵丁自巴爾喀木一路送來其或確實送來或借送來之便相度地勢探聴信息俱未可定不可不預為防備此所請甚是爾等詳議具奏尋議曰年羮堯請自率兵往備之但四川省及松潘打箭爐兩路軍務並𦂳要年羮堯自往不便現今議令都統法喇于青草發時率兵招撫里塘巴塘如第巴達克咱所報確實應以兵五百屬永寧道髙其佩往㑹法喇軍相機而行如借此窺探我内地即以兵𠞰之設所報虚令髙其佩率兵還奏入上從之尋年羮堯疏報臣等前聞西藏送還官兵消息恐賊有詐曽奏請令永寧道髙其佩前赴辦理今官兵陸續至里塘者三百七十人其未到者不過數十人髙其佩可毋往里塘至官兵到省時臣等令滿兵入荆州滿兵中漢兵入臣標一同操練以待將來調遣議政大臣等議如所請奏入報可乙未罷吏部侍郎色爾圖都統瑚錫圖以噶什圖辦理糧餉撫逺大將軍允禵疏劾吏部侍郎色爾圖現今奉㫖經理西寧兵餉並不實心辦事恣意遲延推諉縱家人與筆帖式戴通包攬運米通同扣尅請下色爾圖等所司嚴審擬罪再色爾圖虧空甚多糧餉所闗𦂳要請更遣大臣赴西寧料理議政大臣等議悉如所請現今巴里坤有巡撫綽竒噶什圖二人應調噶什圖赴西寧料理糧餉其噶什圖所辦事令侍郎海夀兼管奏入上從之允禵又疏劾都統瑚錫圖進藏時兵無紀律還時又不自率兵先行進口請革瑚錫圖職嚴審議政大臣等議覆如所奏尋色爾圖擬斬解京監候奏入得㫖色爾圖依擬應斬鎖禁西寧遇有苦差之處差遣瑚錫圖擬枷號鞭責奏入得㫖瑚錫圖鎖禁西寧遇有効力之處効力夏四月乙巳命撫逺大將軍允禵駐兵西寧允禵疏言據都統延信等稱準噶爾與青海部人世為婚姻大將軍若將兵出口我軍衆寡青海人知之準噶爾亦知之今年既不進兵我軍可毋出口駐劄又㕘將述明等自喀喇烏蘇來云準噶爾賊人即與我戰其實懼甚土伯特人與我兵對壘時其鳥鎗輒髙舉放過乘賊不見向我營但發空鎗觀此知土伯特特為賊所迫其人心實感聖恩今我軍號稱三十萬進𠞰遣使前往大功可成議政大臣等議曰都統延信等既謂大軍不必出口應于西寧駐劄至一切料理駐劄及留兵若干所用之馬于何處牧放悉令大將軍酌定奏入上從之尋允禵疏言臣遵㫖駐劄西寧相機而行令每佐領下鳥鎗䕶軍各一人公䇿旺諾爾布領之凉州所在每佐領下䕶軍各一人副都統寶色領之喀喇沁等處䝉古兵在寧夏者都統楚宗領之悉赴索羅木駐劄令莊浪所在每佐領下馬兵各一人都統汪悟禮副都統伊禮布領之凉州每佐領下所餘鳥鎗馬兵各一人副都統宗室赫世亨宗扎卜領之悉赴博羅和碩駐劄以張聲勢再令平郡王訥爾素公諾音托和揆慧簡親王之子永謙鎮國將軍敬順蘓爾臣奉恩將軍華玢閒散宗室呉爾琿等往博羅和碩駐劄諸路兵馬俱令于四月杪啟行九月入口飼馬自阿什罕站起至索羅木置十五站站各置馬二十匹自索羅木傍通柴達木路置五站站各置馬十五匹每站撥固原緑旗兵各十人青海兵各十人又據䇿旺諾爾布報若調青海兵六百于軍營附近駐劄則于巡守並汛界差遣一切尤便乃令青海首領于所部兩翼各撥兵三百蘭州所餘䕶軍一百二十九人馬兵八百七十一人悉富西寧駐劄議政大臣等議曰現今調兵出口駐劄汛界巡守事甚要應令所調青海兵六百于汛界處不時防守仍令聲言大兵即日進𠞰奏入上從之庚申命靖逆將軍富寧安振武將軍傅爾丹即軍中自授章京等官富寧安疏言現今用兵之地西安察哈爾旗下員缺詣于從征官兵中按其資格並素有勞績及人材勇健勝鈐束之任者具名舉報與内地職官一並入奏議政大臣等議如所請奏入得㫖朕曽有㫖此次大兵在外如遇章京並䕶軍校驍騎校缺出令大將軍即行補授今若照富寧安所奏出兵地方所出之缺又將軍前人等與内地之人一併開列具奏必致重複富寧安傅爾丹兩路軍中所出官員之缺將出征之官兵内所有應陞及人材勇健善于鈐束素有勞績之人令富寧安傅爾丹等即行遴選補授俟事竣之後再補行引見如外省駐防官缺出仍將在内人等題補壬戌増哈密及巴里坤驛馬靖逆將軍富寧安疏言自巴里坤至哈密毎站並設馬匹哈密以外自塔勒納沁起至布隆吉爾中間伊托特巴勒楚特等十處並戈壁每站遇事輒用駱駝傳送前者䇿妄阿喇布坦部人來投及彼部遣使人至京輒先以巴里坤站馬送至哈密又自額敏撥馬送至布隆吉爾始乘驛馬至京自今來投順者衆或彼部之使再來巴里坤驛馬及額敏馬必不足供請令甘肅巡撫綽竒于預備設站馬匹中撥一百三十匹巴里坤站益馬五十哈密站益馬八十不得以應他務止以給自䇿妄阿喇布坦處來歸者及其使人乘騎議政大臣等議如所請奏入上從之五月癸未命振武將軍公傅爾丹于軍前量撤官兵傅爾丹等疏言據巴林多羅郡王額駙呉爾衮等言内地扎薩克官兵各備米糧牛羊馬匹至軍一年以後月給官兵羊兩隻予銀一兩跟役羊一隻予銀五錢現今羊價騰貴所給不足供食用請自今内地扎薩克官兵及跟役當給羊一隻者以銀一兩給之其喀喇沁兵一千歸化城土黙特兵一千及土黙特種地兵一千當得羊價亦視此支給議政大臣等議曰將軍傅爾丹等軍前現增發黒龍江等處兵三千今兵暫止不進當于滿洲䝉古緑旗官兵中簡其殘弱老病者遣歸千餘以其餉量給䝉古兵丁奏入上從之是秋八月傅爾丹疏言臣等遵㫖簡右衞索倫等處官一百一十人兵丁二千一百六十八人並老病應遣還至効力來軍原任副都統常闗保等六十八人悉老有疾亦應遣還台吉蘇克都爾所屬十一佐領中司屯種官二人撥什庫甲兵七十八人應遣還令于驛站行走兵丁還者其行月糧及羊價悉増給内地二十三部扎薩克並喀喇沁及種地土黙特兵跟役數尚不足請每月増銀六千兩每給羊一隻以銀一兩與之議政大臣等議覆悉如所請奏入上從之辛夘定西吉木等處疆界差往西吉木等三處定設疆界理藩院員外郎巴福夀疏言臣𫝊集厄魯特貝子阿喇卜坦並其所屬台吉阿爾薩郎及貝勒額爾徳尼額爾克所屬宰桑庫魯克貝子車臣所屬䕶衛車臣藏布等㑹同西吉木等三處官示以設立疆界情狀據貝子阿喇卜坦等云青海人等荷聖主恩甚厚何惜隙地地可耕者聴兵民悉耕之但留我等游牧處所足矣臣案西吉木等三處故為西喇郭勒䝉古部人游牧所在兵民先已耕種其隙地令䝉古人等游牧如故達里圖地有車臣貝勒屬人與兵民依水道相雜耕種以西吉木水源並淖泥草墩地不可耕䝉古人等游牧其間循水而下則兵民與貝勒額爾徳尼額爾克及貝子阿喇卜坦等屬人悉在兩岸交錯種地臣即㑹同所司並台吉宰桑等令于交錯耕種處立界不得逾越議政大臣等議令巴福夀以所設之疆界交明巡撫綽竒而還奏入上從之六月甲辰命靖逆將軍富寧安振武將軍傅爾丹預備明年進兵傅爾丹等疏言臣等遵㫖遣貝勒丹津多爾濟等往與將軍富寧安等議巴里坤並阿爾台兩路官兵馬畜軍器口糧俱已足用今年可進兵襲擊但今已使人到䇿妄阿喇布坦處俟使者還如䇿妄阿喇布坦仍前飾詞推托來年即令兩路兵進𠞰今嵗可暫停襲擊兵議政大臣等議曰兩路兵馬駐劄有年前嵗軍未深入今年雖遣使臣往宜乗馬肥士集㑹議襲擊但嵗候已遲應停襲擊兵令兩路將軍預備來年進𠞰奏入上從之丁未四川總督年羮堯䕶軍統領噶爾弼奏報西藏軍情年羮堯疏言近者偵西藏諸部落以貝勒達顔病故人人有相吞併意又聞䇿零敦多卜現令左哨頭目春丕勒率兵六百餘過喀喇烏蘓河往青海又聞發兵八千來藏已至葉爾羌克勒底雅臣思自藏至打箭爐南路險逺北路平近里塘現駐大兵南路可以無虞惟北路宜預為之防臣等已調兵防守中渡河口又酌調提標兵丁于打箭爐附近駐劄防守霍耳一路尋年羮堯噶爾弼又疏報偵䇿零敦多卜率兵六千止二千為準噶爾部人餘悉脅之俱來者且其同將兵三濟舉動輕躁與䇿零敦多卜不和其一郭莽喇嘛即䇿零敦多卜之弟也臣等遥揣賊情䇿零敦多卜深知䇿妄阿喇布坦殘忍又與三濟不和懼不自保近者調夫修築布達拉城池其意欲得為藏王即率衆歸附矣臣以為可密諭䇿零敦多卜速來歸順使守西藏令除三濟以自効奏入報聞丁巳都統法喇奏報平里塘進撫巴塘法喇等疏言臣等遵㫖令副將岳鍾琪率緑旗兵先行臣親率滿洲兵至打箭爐據副將岳鍾琪等云一至里塘即𫝊集達瓦喇木扎木巴第巴塞卜騰阿住等且撫之若等支吾抗拒不􅈕獻其戸籍即擒達瓦喇木扎木巴第巴塞卜騰阿住及其從人以來臣等即數其窺探我師之罪恐遲則滋事不俟奏請已取其七人以軍法誅之撫慰里塘所屬並宣示巴爾喀木處復令副將岳鍾琪率緑旗兵一千進取巴塘議政大臣等議曰都統法喇統兵招撫巴塘受撫之後即駐其地防守不可不増兵䇿應請令䕶軍統領噶爾弼及總督年羮堯于現駐打箭爐滿洲緑旗兵中選調益法喇軍于成都滿洲兵中撥往打箭爐駐劄巴塘與雲南中甸相近請令都統武格偵探準噶爾消息率兵接應松潘與打箭爐相近請令副都統寧古禮等亦偵探準噶爾消息率兵援應奏入上從之尋年羮堯噶爾弼疏言據副將岳鍾琪等報里塘就撫後即遣人至巴塘招撫及率兵行至巴塘所屬立登三木巴地遇前遣往招撫之人率領喀木布第巴所遣之人來歸已受之更令喀木布第巴書其所屬戸口人數俟大兵到巴塘獻之議政大臣等議覆曰巴塘既已就撫應令都統法喇仍駐劄巴塘防守奏入上從之是秋年羮堯噶爾弼又疏言據遣往巴塘知府遲維徳等報乍了察木多察哇三處胡土克圖羅布藏那木扎爾等欲歸順舉其所屬喇嘛民人戸口來獻即遣郎中鄂賴遊撃黄喜林等持銀牌茶緞輕騎前赴三處撫諭犒賞更令詳察三處形勢還報議政大臣等議令年羮堯等俟郎中鄂賴等還即以彼處情形及所得一切消息奏聞奏入上從之年羮堯噶爾弼又疏言前議政大臣等議令于駐劄打箭爐滿兵中選撥益法喇軍及發成都滿兵駐打箭爐今里塘巴塘並投順而乍了察木多察哇亦相繼來歸里塘巴塘現今所駐滿漢兵二千七百且偵探賊兵一無消息請停調撥原駐打箭爐滿兵議政大臣等議如所請奏入報聞秋七月癸酉命都統武格議駐赴滇滿兵武格等疏言江寧兵已抵沅州沅州地狹不可久駐遂以湖南湖北雲南貴州諸營馬先給江寧兵四千九十八匹前鋒自為一起八旗官兵為四起令副都統呉納哈率之赴雲南俟浙江兵到亦視此行令副都統噶什率之赴雲南臣等即馳至雲南詳視駐兵形勝處及如何安置兵馬再入奏議政大臣等議曰請令都統武格俟兵馬悉到與所在有司集議于附近雲南形勝處酌定駐劄仍以時偵探準噶爾消息令其䇿應法喇奏入上從之九月乙未命封新瑚畢勒罕為達賴喇嘛以兵送至西藏先是大將軍允禵疏言扎穆揚善木巴等自西藏來歸公䇿旺諾爾布等送之至西寧詢扎穆楊善木巴等云䇿零敦多卜三濟等領兵駐藏聞三濟將于三月間還䇿妄阿喇布坦處再䇿零敦多卜聞大兵分路進𠞰恐不能支欲于五月間逃歸奏入報聞至是上諭議政大臣等曰此次差往西邉瑚必圖等前來回稱䇿零敦多卜等及土伯特衆喇嘛民人俱言在西寧見有新瑚畢勒罕實係逹賴喇嘛之瑚畢勒罕天朝聖主將新瑚畢勒罕安置在達賴喇嘛禪榻上座廣施法教實與衆人相望之意允協且土伯特處時有瘴氣厄魯特之子孫不能滋生多生疾病有何貪戀之處惟懇天朝聖主將法教速為廣施觀此情形似易結局今將新瑚畢勒罕封為達賴喇嘛給與印冊于明年青草發時送往藏地令登達賴喇嘛之座送往時著大臣帶滿洲兵一千名䝉古兵一千名土番兵二千名緑旗馬兵一千名歩兵一千名前去其行糧牲畜接續之處令大將軍辦理再由巴爾喀木帶四川滿洲兵一千名緑旗兵一千名土番兵酌量派往其行糧牲畜接續之處令年羮堯辦理青海王貝勒貝子公等亦帶領屬兵或一萬或五六千送往前去䇿零敦多卜等若實為法教自必俟達賴喇嘛登禪榻後然後前去若不行等候遁去即為無耻之賊此行大將軍帶領兵馬在梭羅木週圍水草佳處駐劄兼令其照管青海家屬四川兵二千名出口駐劄兼照管王察罕丹津行裝事闗甚大將此㫖傳諭大將軍處令伊等公同確議具奏又青海王台吉等令大將軍傳集一處曉諭唐古忒國内達賴喇嘛班臣法教原係爾祖上設立今䇿妄阿喇布坦無故將拉藏殺害令寺内喇嘛各自散去將衆鄂里格一路截㫁令達賴喇嘛禪榻空虛從前爾將此新瑚畢勒罕稱為達賴喇嘛之瑚畢勒罕若安置在達賴喇嘛禪榻為法教廣施之事我等願捨命効力業經保奏土伯特之喇嘛民人及阿木島地方喇嘛等俱亦稱為達賴喇嘛之瑚畢勒罕皇上將此瑚畢勒罕特封為達賴喇嘛于明年一同送往藏地令登禪榻將法教廣施放開衆鄂里格一路令其販賣茶布此正宜効力之時爾等應各帶兵丁與送去之大臣㑹同一處前去爾等之意如何令伊等各陳已意㑹盟畫一具奏俟㑹盟完時令都統延信楚宗公䇿旺諾爾布侍讀學士常授等由固闗來京具奏平定準噶爾方略前編卷六
