body:
  text: 乾隆二十二年秋八月己夘定邊將軍成衮扎布等疏奏明瑞等進𠞰情形成衮扎布等奏言臣等自朱爾都斯起程策應明瑞等八月初三日據明瑞咨報十月初二日擒獲厄魯特等令其引路越高嶺數處行兩晝夜至布昆哈瑪爾問知綽和爾等渡庫克烏蘇糾合昻吉岱都爾伯特烏喇特等盤踞阿圭雅斯山中伏賊於密林以待因派兵一支截其去路賊見兵勢即逃我兵尾追至葉克特里克嶺賊衆依山結寨鎗礟競發遂虚作撤兵之狀有數百乘馬賊人出寨來追即回馬衝撃鏖戰良久賊始敗走攻奪一寨至第二寨石峯林立氷雪堆積馬乏難行不能奪取續接總管温布來文帶兵二百五十名前來策應途次聞克勒特變動即㝷蹤至察罕齊老圖遇賊交戰未决勝負等語隨遣人往取温布信息暫於明布拉克駐劄七月二十日夜有賊四百餘圍我軍營我兵奮力攻擊賊即敗逃追至特克斯而還二十四日巴圖魯侍衛濟塞布扎竒魯克齊雅璊等帶兵二百到營告稱已將克勒特㳺牧分别順逆辦理前來策應但馬力亦皆瘦乏計此次𠞰賊二百餘奪馬百餘匹所得軍器皆分給兵丁等語臣等因賊衆盤踞險阻明瑞等暫駐以息馬力是以親往策應相機辦理奏入上諭軍機大臣曰成衮扎布奏稱衆賊合兵守險明瑞等力不能取等語將軍等自應前往䇿應但賊衆烏合皆伊等玩忽所致若從前到伊犂時能候賊出入即行𠞰殺亦不至㑹於一處矣况伊等前奏昻吉岱係一㣲末台吉今綽和爾烏喇特人等皆相附和可謂無闗𦂳要即明瑞等領隊前行不能破賊已屬選懦若將軍叅贊親往更難以力弱自解且有帶去砲位正可攻堅伊等務宜盡𠞰羣賊乘勝擒拏巴圖爾烏巴什及搜𠞰阿巴噶斯哈丹等游牧勉之勿怠命叅贊大臣哈達哈自烏里雅蘇台軍營馳驛前赴熱河辛巳定邊右副將軍兆惠等疏奏阿睦爾撒納溺死信息兆惠等奏言七月二十九日據順德訥報稱前在俄羅斯森博羅特圖喇向瑪玉爾等查問阿睦爾撒納蹤跡取其印文回報仍派委署叅領額林策等分路搜查今據額林策等來告二十三日與瑪玉爾相見瑪玉爾云此來甚好適據齊倫圖喇報稱有步行二人前來向刈草之人告云我係阿睦爾撒納可報知爾頭目前來渡我其人即告知喀丕坦遣人操舟前往久未回報復遣人往看并無蹤跡惟於額爾齊斯河曲㝷獲渡口小舟想係溺死水中今我處多派人役㝷覔尸首等語額林策等復向瑪玉爾索取文書瑪玉爾因未得實據只以空紙用印付額林策等回報即派兵十名偵探信息并行文鄂博什將卡倫兵丁抽調一半存營兵内挑選六十名前往接應㝷覔阿睦爾撒納尸首等語臣等伏思瑪玉爾雖稱阿逆步行喚渡而後來并無蹤跡未便據以為實自應親往查看阿逆果否溺死或逃入俄羅斯或係他往因遣使哈薩克已逾四旬尚需守候是以臣富德帶兵往㑹順德訥臣兆惠移兵中路以待兩處信息奏入上諭軍機大臣曰兆惠富德等奏俄羅斯來告有步行二人其一自稱為阿睦爾撒納因遣一人操舟往渡俱無蹤跡等語據俄羅斯所言伊等亦未見阿逆蹤跡豈可信以為實富德既領兵前往著嚴密搜查兆惠亦著盡心訪緝仍速催哈薩克擒獻阿逆詭詐性成必不肯徒步前往即俄羅斯聞來投之信亦必多遣數人豈有僅遣一人往迎之理或阿逆遣二人虚作往投使我不向哈薩克查拏或俄羅斯業已容留飾詞欺我其渡河溺死之語直屬荒唐即使殞命屬實亦必確有可憑兆惠等搜查阿逆身死確據尚非切要惟訪伊投入俄羅斯與否並在各邊界幽僻處搜查當益加奮勉不可輕信浮言心存懈惰倘信為阿睦爾撒納已死而復出滋事伊等自無所辭咎也申諭定邊將軍成衮扎布等擒𠞰巴圖爾烏巴什哈薩克錫喇事宜上諭軍機大臣曰據兆惠等奏順德訥擒獲集賽之厄魯特等供稱巴圖爾烏巴什本年四月前往伊犂及巴什罕沙爾罕等處居住又巴爾達穆特之厄魯特來告云巴圖爾烏巴什六月間收取我等游牧往來於勒卜西察罕烏蘇等處聞大兵相近向伊犂沙喇擘勒而去又據圖倫楚報稱沿途捉生詢問哈薩克錫喇未曾逃往鄂什由布勒哈齊向博羅塔拉前往伊犂已行文唐喀禄令其速往接應等語巴圖爾烏巴什等去向正與成衮扎布軍行相値自可堵截擒𠞰但伊等現往特克斯明布拉克等處接應明瑞等必謂兵少力弱不能兼辦不知力弱之故皆由伊等急於撤兵今雅爾喀善等已派三格往𠞰巴圖爾烏巴什而唐喀禄等亦接應圖倫楚若兩隊㑹合兵力自强可傳諭成衮扎布等將綽和爾昻吉岱等辦理後即前赴伊犂與三格唐喀禄等協力擒𠞰不得推諉因循仍蹈前轍并傳諭雅爾哈善等知之議奏恩賞土爾扈特台吉使臣等事宜軍機大臣奏言土爾扈特台吉敦多卜達什遣使吹扎卜恭請聖安并貢方物皇上加恩賞賚敦多卜達什及其眷屬鍍金器銀器鞍轡緞布茶葉及使臣跟役等緞布茶葉各有差查使臣來時係自備資斧若赴藏歸巢俱官為辦給倂伊等貿易物件亦行齎送殊屬勞費從前賞給使臣銀一百兩跟役等亦賞銀有差臣等酌議於吹扎卜起程時賞銀二百兩跟役等共賞銀三百兩自京至張家口俱由驛站供應自張家口至恰克圖交總管輝色即著來使自行僱覔騎䭾牲隻伏候諭㫖遵照辦理奏入報聞虚銜藍翎扎勒藏等解送叛賊阿睦爾撒納之姪達什策凌三等侍衛額爾登額等解送叛賊巴雅爾俱於木蘭行在審明正法乙酉諭都統滿福巡查烏納哈特等臺站上諭軍機大臣曰成衮扎布等奏稱現在由阿勒輝衮西喇至烏納哈特嶺口設臺站一十三處山谿險阻恐有瑪哈沁藏匿應派滿福帶兵三百名於烏納哈特等站來往巡查等語朕昨傳諭滿福往額林哈畢爾噶一路巡查著照成衮扎布等所指臺站往來搜緝務將藏匿瑪哈沁等盡行𠞰殺以清道路即遵諭速行參贊大臣雅爾哈善等疏奏端濟布等𠞰賊情形雅爾哈善等奏言端濟布奎瑪岱等招服台吉達瓦等戸口仍帶兵前追巴哈曼集等七月十四日至克伯訥克圖嶺捉生詢問知巴哈曼集等在瑪納斯河源之小衛和勒晶居住隨帶兵追入遇從前搶掠臺站之賊人扎木布游牧𠞰賊五十餘人生擒扎木布又遣人招降巴哈曼集屬人有得木齊瑪勒占等率二百餘戸來降據稱巴哈曼集帶百餘戸越大衛和勒晶嶺逃遁端濟布留駐管束新降戸口派新降之瑪勒占等隨總管布喇勒圖往追奎瑪岱於十九日續進至大衛和勒晶有賊四十餘人立寨甚固乘夜攻奪賊皆逃散過嶺即朱爾都斯地方以馬乏不能窮追沿途𠞰殺餘賊回至濟爾哈朗軍營查扎木布曾搶掠巴罕庫蘇臺站應即行正法其瑪勒占等十得木齊戸口俟内移時分别辦理奏入報聞諭兩路將軍大臣等撤兵事宜上諭軍機大臣曰兆惠等所奏逆賊阿睦爾撒納身死信息諒非真實計我遣往哈薩克之額爾克沙喇努三等此際已回至軍營自有確信如仍未擒獲阿逆天氣漸寒應先將哈薩克錫喇巴圖爾烏巴什鄂哲特阿巴噶斯哈丹等游牧辦理俾伊犂等處寧靜則來年更易於集事如此等賊衆業經辦理或撤兵回濟爾哈朗或額林哈畢爾噶過冬著傳諭兩路將軍大臣等定議具奏議定後兆惠可遣人往告阿布賚云我兵久駐爾界恐爾屬人驚疑是以大皇帝命我等撤兵爾等若將阿逆擒獻即速為奏聞自有重賞於歸途之便正可𠞰除諸賊現在成衮扎布等既帶兵前往雅爾哈善又遣三格等追截則以三路兵辦此數賊斷無不獲之理然必待獲賊始可撤兵不得因有此㫖遂亟圖休息也丁亥宣諭達爾黨阿哈達哈罪狀上諭大學士曰去歲擒𠞰逆賊阿睦爾撒納進兵至哈薩克西路以達爾黨阿為將軍北路以哈達哈為將軍伊等既未能擒獲阿逆又致阿布賚脱逃本應治罪朕意伊等未必有心僨事不過為賊所愚路逺遲誤之所致是以從寛免其處分後經詢問自軍營回之侍衛官員則咸稱達爾黨阿追阿逆時相距僅一二里逆賊不及䭾載反遣人託為哈薩克本欲擒獻阿睦爾撒納惟待其汗阿布賚至即便送來達爾黨阿墮其計中耑候擒獻並不督兵追捕且下令不許衆兵前進直至逆賊捆載脱逃後方遣兵追逐哈達哈則路遇阿布賚既經後隊官兵呈報並不勒兵追捕至阿布賚逃去始尾追一次以塞其責衆奏僉同是達爾黨阿哈達哈之怠玩僨事顯然可見因將伊等公爵革去降秩示譴今訊問拏獲阿逆之姪達什䇿凌等供稱阿睦爾撒納於去歲九月下旬自敗走地方潛回又據尼瑪供稱去歲大兵追及阿睦爾撒納我催促進𠞰將軍等等候阿布賚擒獻以致脱逃再阿布賚對面安營我兵亦並不迎敵直至逃去始行追逐旋即撤兵等語與侍衛等所奏脗合觀此則伊二人不能用朕奮勇之官兵且為逆賊等所輕視矣達爾黨阿哈達哈俱勲舊子孫受恩襲爵乃身為將軍專任討賊而因循觀望坐失事機若此實出情理之外且去歲撤兵時伊等奏稱我兵距逆賊逃竄之地速行亦需月餘今於九月初撤兵自葉什勒椿集行五十餘日至巴顔鄂拉南之哈薩拉克地方等語今據達什䇿凌等所供阿睦爾撒納聞大兵既撤於九月下旬回至葉什勒椿集行二十餘日至巴顔鄂拉又十五日抵哈薩拉克東之額布根塔爾琿地方共五十餘日等語設果如伊等所奏有月餘程途則阿逆復回必須兩三月且阿逆必確知撤兵之信方敢起程果與我兵相去月餘往返探聽又必三四月矣乃我兵則於九月初撤回行五十餘日始至哈薩拉克而阿逆即自九月盡起程至額布根塔爾琿亦祗五十餘日何以如此之速耶則其被賊所欺愈為顯著觀阿逆今春即到額林哈畢爾噶地方此即伊等因循推諉之明証也况今歲阿布賚遇我兵三十餘人一戰即降則去歲若稍肯奮勉阿布賚早已投誠將逆賊擒獻矣又伊等擁兵觀望之明証也再兩路官兵㑹合後自應聯為一體乃伊等竟於相見之次日即分營行走第三日即議及撤兵有是理乎伊等即協力追擒尚未知獲賊與否况復自分彼此安能集事且如逆賊兔脱時伊等俱係將軍若肯親行豈不勝於叅贊大臣乃伊二人並不前往止遣阿里衮一人領兵追逐不知將軍所司何事達爾黨阿哈達哈如此種種貽悞若不加罪譴則國家之賞罰何在本當以軍法從事但達爾黨阿本一糊塗無能之人為賊所愚而哈達哈每圖安逸遇事因循尚非出於有心然既悞用於前復姑容於後此即朕之咎也伊等身為將軍且係勲舊子孫似此坐失機宜玷辱滿洲更何顔靦列班聫達爾黨阿哈達哈俱著革職發往熱河披甲効力九月壬辰命議叙副都統愛隆阿所領𠞰賊官兵等上諭軍機大臣曰據兆惠奏稱副都統愛隆阿等𠞰殺納木竒等賊衆一千餘將在事官兵分别功次具報等語此次官兵等進𠞰賊衆頗屬奮勉著加恩將驍騎校拉瑪錫授為三等侍衛領催額勒濟圖授為藍翎侍衛厄魯特三等侍衛達爾漢授為二等侍衛賜號哈什哈巴圖魯賞銀一百兩其餘有功官兵及陣亡得傷者俱著查明報部照例議叙議䘏申諭將軍大臣進𠞰伊犂賊黨事宜上諭軍機大臣曰兆惠奏稱現在駐兵巴雅爾郭勒候遣往哈薩克使臣回營并富德處所探阿睦爾撒納確信或分兵過博羅塔拉與永貴㑹合或前赴成衮扎布軍營等語是兆惠之兵尚需守候不能即往額林哈畢爾噶恐咨行成衮扎布後舒赫德即藉此不往伊犂則進𠞰賊人責當誰屬著傳諭成衮扎布舒赫德速領兵前抵伊犂務將巴圖爾烏巴什哈薩克錫喇昻吉岱鄂哲特等嚴行查拏以期地方寧謐毋得藉端推諉即著作速回奏命議處叅贊大臣唐喀禄上諭軍機大臣曰兆惠所奏唐喀禄等咨報選兵三百名交瑚爾起令其進𠞰其餘兵即行撤回等語唐喀禄等係特派擒𠞰哈薩克錫喇之人今到塔爾巴噶台等處已得賊人信息輙將兵撤回殊屬乖謬伊等即謂馬疲糧竭或赴兆惠軍營或雅爾哈善所駐濟爾哈朗軍營俱可接濟豈伊等自以為北路之兵遂不相聨絡耶唐喀禄著交部嚴加議處車木楚克扎布從寛免其交議至唐喀禄等撤回兆惠已經具奏而伊尚未奏到者是又必自分彼此仍由北路具奏以致遲滯耳伊等既經撤兵此㫖亦不必連遞著納穆扎爾暫存俟唐喀禄到日交發命豫派官兵伴送哈薩克使臣等上諭軍機大臣曰哈薩克使臣等由北路前來將至行在若照常由西路遣回正届我撤兵之期沿途恐有疎失著由烏里雅蘇台過索勒畢烏拉克沁嶺自額爾齊斯塔爾巴噶台送至古爾班察爾回伊游牧派散秩大臣和碩齊侍衛富錫爾穆倫保等帶索倫兵一百名厄魯特兵一百名沿途伴送使臣搜𠞰瑪哈沁等可傳諭成衮扎布等交科卜多駐劄大臣派索倫兵豫備厄魯特兵著和碩齊先往揀派其馬駝牲隻及整裝銀兩俱照例賞給諭定邊將軍成衮扎布等辦理綽羅斯逸賊上諭軍機大臣曰昨詢問尼瑪現在藏匿之綽羅斯台吉等據供尚有昻吉岱薩木丕勒諾爾布特古斯孟克尼瑪諾顔哈什哈納喀達等五人著傳諭成衮扎布等進𠞰哈薩克錫喇等賊衆時將尼瑪所供五人留心查拏解京此外如有綽羅斯之人亦照此辦理䕶軍校鄂畢達以擒獲輝特台吉巴泰吹扎卜授三等侍衛癸巳定邊將軍成衮扎布等疏奏進𠞰賊衆情形成衮扎布等奏言臣等帶兵接應明瑞派副都統由屯侍衛老格等分路𠞰殺瑪哈沁據由屯等報稱克勒特種地賊人聞我兵過巴罕納喇特嶺即逃向哈什八月初八日追至圖爾根河遇賊力戰𠞰殺收楞額博索庫勒等一百餘人收其妻子器械初十日營長伊靈阿索音達爾𠞰殺塔里雅圖口百餘人察克瑪河口賊四十餘人又侍衛老格報稱初九日至濟爾哈朗河𠞰殺烏魯特七戸四十餘人初十日至博多美和羅𠞰殺克勒特一百五十餘人収其馬駝牛隻又遣取明瑞信息之侍衛海林泰於庫哲圖地方遇賊二十人殺賊三人奪馬四十匹臣等仍令海林泰帶兵一百名巡查烏納哈特嶺各臺站十三日明瑞等咨報我等至特克斯因馬匹疲乏暫駐口糧已罄搜取綽和爾所種地畝𠞰殺瑪哈沁三百餘人侍衛濟塞布追獲綽和爾五十餘人收其牛羊詢問賊人所守阿圭雅斯營壘俱已棄去或往察罕烏蘇或往沙喇擘勒等語臣等即㝷蹤前往堵截又准兆惠咨稱巴圖爾烏巴什已往沙喇擘勒等語沙喇擘勒距特克斯程期半月或阿巴噶斯哈丹賊人及綽和爾烏喇特昻吉岱等賊俱與巴圖爾烏巴什㑹合臣等竭力前往辦理奏入上諭軍機大臣曰據成衮扎布等所奏綽和爾等賊人與巴圖爾烏巴什等在沙喇擘勒㑹合必至滋生事端自當奮勉𠞰殺何得以官兵馬力為詞伊等從前於克勒特烏魯特等鄂拓克人衆若早為殄滅收其牲隻即進𠞰巴圖爾烏巴什計已奏功乃惟務姑息安撫以致賊衆㑹合始覺辦理之難其何所歸咎且明瑞等雖經進𠞰總未追及賊人成衮扎布等何以並無一語叅奏賞罰不明誰肯用命著伊等回奏甲午哈薩克阿布賚使臣亨集噶爾烏穆爾台都楞阿蘭扎阿布賚之弟阿布勒比斯使臣塔納錫拜克奈奉表入覲於布扈圖口上御行殿召見亨集噶爾等行禮温語詢問隨賜宴於行營申諭叅贊大臣雅爾哈善等進𠞰阿巴噶斯哈丹游牧上諭軍機大臣曰昨據雅爾哈善等奏稱阿巴噶斯哈丹游牧賊衆逃往烏固勒扎登努勒台等處已調副都統三格等接應侍衛納呼德等語朕諭以賊衆必㑹合一處須協力𠞰除亦已傳諭成衮扎布等矣此際三格等曾否將阿巴噶斯哈丹賊衆追及𠞰除及先後派出官兵𠞰賊情形著雅爾哈善等確查具奏乙未命哈薩克使臣亨集噶爾等隨從行圍命革侍郎副都統唐喀禄職以藍翎侍衛効力上諭軍機大臣曰據唐喀禄等奏稱准兆惠調兵接應圖倫楚已派瑚爾起帶兵三百名前往惟是兵丁口糧不敷馬力疲乏路遠難於接濟不能忍饑步行今準噶爾全部已定阿睦爾撒納又溺水身死哈薩克錫喇必被西路大兵擒獲請遵前㫖撤兵再臣等從前即應撤兵乃專意擒取阿睦爾撒納遠至塔爾巴噶台以致兵馬疲乏請交部治罪等語昨兆惠奏唐喀禄有一面具奏一面撤兵之報朕已將唐喀禄交部察議今覽伊奏以勉强前行請罪朕屢諭伊等追擒哈薩克錫喇何嘗令其撤兵即有豫籌撤兵之語亦謂交辦事竣之後耳豈現諭擒賊而即令撤兵耶唐喀禄若但歸咎於口糧馬力將兵撤回不過交部議處乃竟以遵㫖撤兵飾詞取巧視朕為何如主僅予議處不足示懲著革去侍郎副都統職銜降為藍翎侍衛交納穆扎爾差遣効力車木楚克扎布仍著從寛免其交部虚銜藍翎愛普薩以解送達什策凌齊巴罕巴泰吹扎卜授三等侍衛戊戌駐劄巴里坤辦事大臣阿里衮等疏奏沙喇斯瑪呼斯等游牧逃叛情形阿里袞等奏言侍衛寧古里等報稱克勒特沙喇斯瑪呼斯三游牧内移因路狹難以同行令沙喇斯瑪呼斯人衆暫住察罕通等處八月二十一日據將軍等遣來督催之瑪呼斯得木齊達什敦多卜遣什長博多羅克等告稱沙喇斯得木齊都噶爾丹巴鄂齊爾恩克錫瑪呼斯得木齊肯哲收楞額普爾普等復叛搶掠三都克游牧殺其甥達瓦恩克勒圖及得木齊登德賀自察罕通帶領游牧過海都河因水勢甚大遂由喀喇呼珠至烏蘭和屯欲㑹合昻吉岱等賊衆等語查將軍等前令都統滿福照管此三游牧今滿福帶兵巡查臺站若由阿勒輝追𠞰相去甚近因遣博多羅克前往報知又據博多羅克告稱沙喇斯収楞額巴雅爾係都噶爾之壻業經拏獲交克勒特總管根達什看守等語奏入報聞叅贊大臣雅爾哈善等疏奏琿齊額林沁達瓦等逃叛情形雅爾哈善等奏言前因呼爾璊台吉達瓦布魯古特台吉琿齊等殺扎那噶爾布獻馘來降據總管端濟布報知達瓦出痘身故琿齊等已遣人招降額林沁達瓦等語七月二十七日三格等回至濟爾哈朗軍營告稱途遇琿齊額林沁達瓦之得木齊巴朗庫里因恐游牧内移遇别隊官兵𠞰殺請給文為據臣等即給以文書令箭一面令三格前往博羅布爾噶蘇等處擒𠞰巴圖爾烏巴什等閲今日久琿齊等未見前來據端濟布等來至軍營告稱我等前追巴哈曼集一面遣委署驍騎校達什敦多卜前往督催琿齊等游牧内移今達什敦多卜禀稱琿齊遣人同至額林沁達瓦游牧定於日内遷移忽伊屬人報知大兵將到額林沁達瓦大恐令我往見領隊大臣三格隨將游牧移動因告以大兵已知爾等歸降斷不殺害伊等不信將我綁縛步行隨至哈什河口其夜得脱賊衆已向朱爾都斯逃去等語奏入上諭軍機大臣曰據雅爾哈善等奏稱琿齊額林沁達瓦復叛已行文將軍辦理等語厄魯特奸狡性成反覆無定初降之時辦理必須妥協即如三格等進𠞰額林沁達瓦因端濟布告知業經招降即行撤兵原屬率易著傳諭雅爾哈善將端濟布等從前如何招服琿齊額林沁達瓦之處查明具奏仍速催三格等將巴圖爾烏巴什阿巴噶斯哈丹游牧賊衆奮力擒𠞰毋得玩忽從事申諭兩路將軍大臣辦理進𠞰事宜上諭軍機大臣曰據阿里袞等奏沙喇斯瑪呼斯游牧雅爾哈善等奏琿齊額林沁達瓦游牧俱已降復叛看來此等賊人心懷叵測招降斷不可恃總以嚴行𠞰殺為要但此等皆么麽小醜用兵之道莫要於殱厥渠魁此時惟擒𠞰巴圖爾烏巴什哈薩克錫喇等當以全師制勝不可分兵搜緝俟渠魁既獲再以餘力舉之自難逃於天網矣著傳諭兩路將軍大臣等知之諭駐劄巴里坤辦事大臣阿里袞等辦理降人游牧上諭軍機大臣曰阿里袞等奏稱沙喇斯瑪呼斯游牧叛逃已傳諭滿福令其作速帶兵擒𠞰並諭將軍成衮扎布兆惠等軍行所至嚴行𠞰殺勿以姑息養奸著傳諭阿里袞如有移至巴里坤賊衆即遵前㫖送往肅州辦理再雅爾哈善奏稱達瓦之弟鄂爾竒達遜已送往巴里坤等語俟其到日即著解送來京己亥訓諭兩路將軍大臣豫籌撤兵等事宜上諭軍機大臣曰兆惠奏稱遣往哈薩克之額爾克沙喇等尚未回營哈薩克阿布賚初次所遣使人已往見成袞扎布俟歸途之便再遣使恭齎勅書賜物同往等語計哈薩克使人歸日額爾克沙喇等亦已到來自可得阿逆信息惟成衮扎布等進𠞰巴圖爾烏巴什等賊未必即能完結若遽撤兵回巴里坤過冬則來歲進兵又煩跋涉或酌於濟爾哈朗額林哈畢爾噶等處駐劄其安設臺站接濟口糧馬匹均須豫為籌畫著將軍大臣等定議具奏至成袞扎布數年未曾來京請訓舒赫德雖面受訓㫖而臨事懦弱不能協同辦理以致茫無端緒著成袞扎布兆惠富德於撤兵後來京籌辦一切機宜博爾奔察年邁亦著同來其軍營事務交雅爾哈善總理再此次領隊大臣内三格額爾登額未有勞績而三格從前看守尼瑪竟致脱逃將軍叅贊等即應記過俟其立功自贖以昭賞罰即如色布騰巴爾珠爾往擒吞圖布未獲又不窮追經朕詢問成袞扎布等久未回奏又明瑞從前進𠞰阿巴噶斯哈丹游牧此次色布騰巴爾珠爾進𠞰克勒特等賊衆屢致脱逃亦當議罪而色布騰巴爾珠爾較明瑞為重但伊等初履行間將軍叅贊調遣乖方亦不為無過况領兵𠞰賊將軍自當親行即有應行調遣者叅贊亦宜前往鄂實即叅贊大臣也伊於軍前事務宜奮勉効力至繕冩章奏諒皆舒赫德與成袞扎布商辦非鄂實所能則伊所司何事著將此等情節俱各登記俟成袞扎布等到時察議其功罪不相抵者即行叅奏諭定邊右副將軍兆惠接應瑚爾起兵丁馬匹上諭軍機大臣曰昨唐喀禄派瑚爾起帶兵三百名接應圖倫楚進𠞰哈薩克錫喇若能與三格等㑹合更可協力𠞰賊但唐喀禄派往時即告以酌量馬力所能不便使兵丁步行追緝恐瑚爾起因有此言不復努力前追藉口糧盡馬乏帶兵即回亦未可定著傳諭兆惠如瑚爾起已與圖倫楚三格等相㑹即令其併隊行走如馬力疲乏通融辦給不得以北路所派兵丁稍分畛域不行接濟庚子都統滿福疏奏接續阿勒輝等臺站滿福奏言臣於八月十三日自吐魯番起程巡查臺站二十日侍衛羅卜藏等遣人報稱於十九日阿勒輝嶺之西有賊人百餘搶掠臺站二十二日侍衛寧古里報稱沙喇斯瑪呼斯游牧逃叛二十三日阿勒輝博多克臺站筆帖式富桑阿呈報遞送奏匣公文之兵丁告稱遇賊搶掠臺站筆帖式五達色綠旗兵三名察哈爾兵二名俱中鎗身死等語即帶兵往查問係沙喇斯等賊衆臣即於二十六日到阿勒輝臺站查看賊人蹤跡進南山谷口與沙喇斯等所住察罕通相對復查所送事件惟遺失八月初五日自京遞送定邊將軍奏匣一面報明軍機處補送將所帶兵丁補足臺站仍查各臺站有無失事辦理接續再行帶兵追𠞰賊衆奏入上諭軍機大臣曰沙喇斯瑪呼斯等游牧已降復叛搶掠臺站滿福聞報自應量留兵馬交筆帖式等查看接續一面帶兵速追庶賊衆不至遠颺乃欲俟辦理臺站事竣然後往追則賊衆豈能坐待擒戮著滿福即帶兵速往追𠞰勿更怠忽從事再賊衆或詐稱往烏蘭和通仍回哈喇沙爾亦未可定哈喇沙爾與吐魯番相近併傳諭額敏和卓遣人偵探如賊衆到彼即派兵同閆相師綠旗兵迅往掩襲相機辦理又諭曰沙喇斯瑪呼斯等逃叛已傳諭將軍大臣等矣今滿福奏臺站被搶將軍成衮扎布等在賊之前一得賊人蹤跡即當奮力遮撃數日以來軍營奏事何以未到其八月初五日傳諭成衮扎布等擒𠞰巴圖爾烏巴什之㫖及所批伊等奏摺既經遺失著抄録補寄壬寅授都爾伯特台吉布圖庫班珠爾為二等台吉布林為四等台吉各賜衣一襲命以叛賊尼瑪及其子衮楚克車凌於故將軍和起墓前俱即行凌遲正法平定準噶爾方略正編卷四十三
