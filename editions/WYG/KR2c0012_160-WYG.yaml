body:
  text: 乾隆二十八年三月戊午朔葉爾羌辦事尚書都統新柱等疏奏拔達克山素勒坦沙獻波羅泥都屍骸及其妻子新柱等奏言臣等節次欽奉諭㫖辦理拔達克山素勒坦沙及霍罕額爾德尼伯克之事隨於正月十七日據派往拔達克山之薩里阿布拉三等呈稱上年十二月十九日至抜達克山將所奉訪聞波羅泥都屍骸潛瘞於牌租阿巴特及寄書素勒坦沙速令呈獻等情節再三開導素勒坦沙於二十三日遣密爾咱阿達里卜等同到埋瘞波羅泥都屍骸處所眼同掘出併將伊妻一名珠賚哈係回人生子和卓阿斯瑪一名巴特瑪係厄魯特人生子阿卜都哈里克一名額爾克揚係布魯特人生子和卓巴哈敦俱全行查交又照看伊等之摩羅密爾努魯斯摩羅巴喇特等九名口情願隨來内地遂於二十六日起程等語查散秩大臣阿竒木之姊濟爾噶勒係波羅泥都屬人波羅泥都之妻俱係素識本年正月二十五日臣等將波羅泥都之妻三人令濟爾噶勒及葉爾羌舊伯克等識認僉稱確實又詰問密爾咱阿達里卜云從前素勒坦沙曾言波羅泥都之屍係伊親隨伊里雅斯等盜往琿都斯塔爾罕部落埋於伊瑪瑪拉今從拔達克山牌祖阿巴特掘出恐未確實據稱前將軍等索取時未知盜去原委是以不能查出續因和卓木幼女身故前往埋葬其時正値貿易聚集之期凡波羅泥都舊屬俱於是夜潛往祭奠我等俱經目擊此次掘屍時因摩羅巴喇特不肯直供經薩里等持刀欲殺始指掘一幼女之屍復行嚴訊往掘凡舊隨波羅泥都人等意俱慘沮等語臣等伏思波羅泥都負恩叛逆部滅身亡其屍骸妻子雖無闗輕重但有此餘孽仍留回部保無借端滋事搖惑衆心以致善良被擾今全行獻出回人共見共聞邊陲益為寧帖臣等不勝慶幸謹將逆屍盛匣封固及其妻子屬人派員一同解送再素勒坦沙恭進表文及致臣等書信謹一併進呈御覽奏入得㫖下部知之尋繹出所進表文云拔達克山伯克臣素勒坦沙謹奏請聖鑒自為臣僕受大皇帝深恩實出衆伯克之上今布哈爾烏蘇伯克等皆以臣殺害波羅泥都霍集占等結怨興兵臣雖勉力支持然别無可倚賴所幸為大皇帝臣僕實心効力整頓部落即身故之日亦必囑咐子孫無改臣在日恭順至臣地所埋波羅泥都屍骸及其妻子僕人䝉葉爾羌駐劄大臣等遣使查取臣不敢遲悞即遣臣親隨密爾咱阿達里卜等呈獻并令入覲天顔謹奏命議敘葉爾羌辦事尚書都統新柱等及辦理齊特喇爾事宜上諭軍機大臣曰新柱等奏稱素勒坦沙呈獻波羅泥都屍骸及其妻子遣使入覲惟伊侵掠之齊特喇爾尚在致書自辦未即付還仍行嚴飭令薩里等同密爾咱阿達里卜前往等語新柱額敏和所辦拔達克山事宜甚屬妥協著交部議敘仍各賞御用荷包鼻煙壺薩里等著賞給緞疋以示鼔勵覽傳至素勒坦沙書詞稍覺嚴厲伊進表致書頗屬恭順此次往問侵掠齊特喇爾之事應加以撫慰但業已發行亦自無礙若素勒坦沙盡還侵掠固善其或尚有遲疑推托亦不必遽示兵威即作速奏聞候㫖庚申命吐魯番郡王額敏和卓暫留葉爾羌辦事上諭軍機大臣曰前命玉素富往代額敏和卓因有辦理拔達克山事宜仍令暫留葉爾羌今素勒坦沙既將波羅泥都屍骸及其妻子獻出則額敏和卓原可遵諭起程但現在索還侵掠齊特喇爾游牧又遣薩里等前往拔達克山額敏和卓不若俟此事辦理妥協後再回吐魯番休息著𫝊諭額敏和卓及玉素富知之辛未命議敘帶領察哈爾兵丁之侍衛齊里克特納旺等上諭軍機大臣曰齊里克特納旺奏稱帶領挈眷駐防之察哈爾兵丁已抵烏魯木齊等語齊里克特納旺照管妥協著交部議敘命以原任副都統佟福柱為三等侍衛仍留烏魯木齊効力上諭軍機大臣曰旌額理等奏稱原任副都統佟福柱自到烏魯木齊以來頗知奮勉今三年期滿又懇請多留數年効力應請再留二年等語佟福柱著加恩授為三等侍衛仍留烏魯木齊効力行走壬申喀什噶爾辦事尚書永貴等疏奏霍罕額爾德尼伯克查還阿濟比土地户口永貴等奏言二月十五日據差往霍罕之員外郎拕穆齊圖侍衛鼐庫納伊沙噶伯克阿卜都喇伊木等報稱遣人將額德格訥阿濟比所告鄂斯地方為霍罕額爾德尼所據奉委行文申飭令其查還隨經面見額爾德尼開陳利害詳悉曉示額爾德尼聽從即將額德格訥之原駐鄂斯等處屯種水利全行讓還又令安集延之阿竒木伯克隨同起程面見阿濟比指給并具有呈文頗為恭順等語臣等擬俟拕穆齊圖等回至喀什噶爾詳詢情節謹將遣使霍罕情形先行馳奏並咨㑹明瑞新柱等一體酌量辦理奏入報聞癸酉訓諭㕘贊大臣納世通辦理外藩事宜上諭軍機大臣曰永貴等奏稱拕穆齊圖等前往霍罕以利害曉示額爾德尼伯克即謹遵約束將所侵阿濟比之鄂斯等處交還指給等語額爾德尼伯克頗屬恭順伊將來若常能如此可以永荷朕恩著納世通𫝊諭伊來使等知之再納世通在京奏對曾有永貴新柱等所辦拔達克山霍罕事體稍覺過當之語今看伊等辦理如此妥協可見駕馭外藩若一味姑息伊等必至驕肆自當恩威並用俾先知所懼則其感益深足以預弭滋事之端并傳諭納世通伊至喀什噶爾時遇此等事當慎持大體加意辦理不可茍且塞責命奬賞拔達克山伯克素勒坦沙上諭軍機大臣曰素勒坦沙遵奉傳飭送出波羅泥都屍骸及其妻子所進奏章頗為恭順朕深嘉悦著加恩賞素勒坦沙緞八端交伊使賷往并著新柱納世通等將朕鑒悉素勒坦沙悃忱加恩賞賚之處傳諭知之丁丑諭葉爾羌辦事尚書都統新柱等俟辦理齊特喇爾事竣交代回京上諭軍機大臣曰新柱久駐葉爾羌應派員更换著副都統額爾景額從容由驛前往此時新柱有遣使拔達克山索取齊特喇爾游牧一事若素勒坦沙遵約查還新柱即與額爾景額交代起程其或仍有候辦情形新柱仍暫行駐劄㑹同商辦議伊犂挈眷索倫察哈爾兵丁事宜伊犂將軍明瑞等奏言欽奉諭㫖派出索倫察哈爾兵丁挈眷移駐伊犂所有給與産業預備牲隻口糧等項謹分列五條㑹奏請㫖一索倫察哈爾兵二千名挈眷移駐伊犂除帶來馬駝准其存留外仍應給與孳生牲隻請按現在牛羊數目每户派給羊二十五隻二三户合給牛一隻每羊十隻歳交孳生羊三隻牛十隻交孳生牛二隻其採買辦送候定議遵行一兵丁至伊犂後應支鹽菜銀兩一年屆滿即行停給惟支舊額錢糧兼賞給籽種令其開墾地畝收穫之前仍准給與口糧一伊犂現有遷移察哈爾厄魯特兵共一千八百名應分為二昂吉舊有厄魯特兵千餘名應作一昂吉各設總管副總管佐領驍騎校等官每佐領下領催四名所轄以二百人為率其實授官員不敷以領催委署一察哈爾厄魯特既編設昂吉補授官員一切辦理案件應賞給闗防鈐記以昭信守一厄魯特兵千餘名食餉者僅一百二十名伊等有前隨將軍等進兵効力者有自布魯特哈薩克來投者請再增食餉兵八十名合之察哈爾兵丁共為二千名以符餉額奏入得㫖軍機大臣議奏尋議查辦給索倫察哈爾等牛羊以裕生計其孳生定額應如所奏辦理除伊犂現存羊隻外已議令巴爾品於牧羣辦送四萬隻又成衮扎布奏現有牛五百八十隻及喀爾喀折抵應交馬匹計牛四千隻來年可抵伊犂其鹽菜銀兩一年内應准支給收穫以前口糧大口日給八合三勺小口減半至所議編設昻吉補授官員俱按照該處情形其索倫兵一千名與察哈爾事同一體均請如所奏辦理仍給與總管昂吉闗防佐領鈐記擬定字樣交禮部鑄給再厄魯特等兵丁食餉者少亦應增加以示鼓勵奏入上從之癸未命核定隨征及駐守各兵丁脱逃之例上諭大學士曰向來出征兵丁有自中途及軍營逃囘者即與正法所以懲逗撓肅軍紀也若各省營兵在伍脱逃舊例拏獲之日不過除去軍籍加之重杖葢其情本輕則罪亦薄惟派往伊犂等處換防屯田兵丁較之身列行陣者雖有不同而新疆駐守攸闗又與尋常營伍食糧初逃未攜軍器者有間繩以軍法固覺過嚴若僅照營兵之例子以責革亦不足以示儆前次所定條例殊未周晰著該部將出征及在伍脱逃二項并派往新疆駐守兵丁遇有脱逃應作何分核情罪輕重之處詳悉定議具奏尋議臣等查隨征兵丁有自中途及軍營脱逃者擬斬立决應仍照舊例外其派往新疆駐防種地之滿漢各兵遇有脱逃應請於緝獲日發遣原派地方枷責遊營充當苦差十年無過該將軍等查明具奏准回旗籍再犯者立行正法至京外在伍綠營兵丁脱逃原律或杖九十或杖八十亦未畫一應無論京外俱杖一百枷號一月永逺不准入伍其在京八旗及各省駐防兵脱逃俱仍照舊例辦理奏入上從之丙戌命伊犂屯田厄魯特等照常酌給籽種上諭軍機大臣曰明瑞等奏稱伊犂屯田之厄魯特等已給與籽種二百三十石請核計來歳收穫以前食用需糧若干若所餘足敷本年籽種即停其官給等語厄魯特等甫經安插生計未裕不便停給籽種著𫝊諭明瑞等來年播種之時照常官為給發夏四月戊子朔以徇庇㕘員哈尚德訓飭巴里坤辦事原任巡撫鐘音等上諭軍機大臣曰據鐘音等奏參革副將哈尚德應賠倒斃羊隻尚欠銀一萬二千九十餘兩將伊枷號嚴催至五年之久又分釐未完請交部嚴審一并行查原籍照例辦理等語哈尚德屢經獲罪朕加恩寛宥用至總兵伊又以􅀢贓革職仍賞給副將職銜効力乃解送羊隻全不經意照管至倒斃一萬五千餘隻之多即應重治其罪朕尚恐購辦官員以疲瘦充數致有屈抑特命黃廷桂行查據奏此項羊隻俱係伊揀選收領始令革職枷號賠補力不能完即永逺枷號亦所應得今鐘音等奏請解部審理不思解部之後該部又將加之刑訊耶若訊無欺隱情節即將伊正法耶此特欲設法送回大概出鐘音之意鐘音歴任巡撫凡事茍且因循乃駐劄巴里坤以來一味沽名今又徇庇哈尚德濫行具奏甚屬不合溫敏隨同附和亦屬非是著將哈尚德未完銀一萬二千九十餘兩令鐘音賠補八千兩溫敏賠補二千兩其二千餘兩仍令哈尚德賠補己丑諭陜甘總督楊應琚等查勘貯備火藥及採辦硝磺事宜上諭軍機大臣曰鐘音奏現在巴里坤所餘火藥二萬四千餘觔據提督五福咨明楊應琚定議駐防巴里坤中左右三營預備三年火藥即於巴里坤現存火藥内支取已全交五福以備兵丁操演等語此項火藥從前楊應琚照部議存貯備用而鐘音又云支取以備操演所奏殊未明晰邊陲要地儲備火藥自應充裕此項既供操演又將以何項為儲備耶著𫝊諭楊應琚等查明據實具奏再巴里坤移駐提督需用火藥較多其附近處所有無出産硝磺足資採辦者該督等可彼此咨商廣為察勘以省内地輓運之煩并𫝊諭該督撫提督等知之議駐防索倫兵丁中途換給馬駝事宜伊犂將軍明瑞等奏言臣等准軍機處議挈眷駐防之索倫察哈爾兵抵伊犂時將乘騎馬駝即給為産業查索倫等處距伊犂甚逺原來乘騎不無倒斃應請將索倫兵一千名抵烏里雅蘇台時交成衮扎布派員照看原來馬匹有疲乏者即行易換庶程途無滯於伊犂生計亦屬有益奏入得㫖軍機大臣議奏尋議索倫察哈爾挈眷兵丁道路逺近不同辦理自難畫一今明瑞奏請索倫兵至烏里雅蘇台換易馬駝既可遄行無滯而分給為業亦有益生計但當視其原來牝牡照數酌換其所留疲乏馬駝又可牧放備用奏入上從之癸巳命酌派西安滿洲䝉古兵丁移駐凉州莊浪上諭大學士曰凉州莊浪駐防滿洲兵丁二千二百餘户現在移駐伊犂凉州莊浪雖係内地不必定設駐防但係西陲要路其城署營房俱修葺未久竟令空閒頽廢於觀瞻未協且西安官兵駐防已久生齒日繁若酌量移駐於伊等生計亦有裨益著派西安滿洲兵丁二千名駐劄涼州莊浪兵數無多不必仍設將軍管轄凉州留一副都統莊浪設一城守尉足矣其移駐事宜著楊應琚嵩椿定議具奏丁酉命議敘奬賞喀什噶爾辦事尚書都統永貴等及辦理霍罕事宜上諭軍機大臣曰永貴等奏拕穆齊圖等向霍罕額爾德尼索還所侵阿濟比之鄂斯等處額爾德尼即遵約付還等語永貴伊勒圖辦理妥協著加恩交部議敘員外郎拕穆齊圖侍衛鼐庫納亦著議敘同往之伯克阿卜都喇伊木著酌量奬賞緞疋又諭曰永貴等奏稱聞得愛烏罕遣賽特伯克來霍罕問額爾德尼内附情事額爾德尼亦遣使往報不可無疑應留心訪察詢問等語額爾德尼係外藩新附之人不知内地法度且隣邦通使亦伊等來往之常無庸深究果有結連愛烏罕窺伺回部情形必難掩覆原可直截辦理此時預為意料於事無益著傳諭永貴等知之喀什噶爾辦事尚書都統永貴等疏奏新城房屋工竣永貴等奏言臣等奏派楊寧固世衡於賽爾們修建新城工竣後將舊城官房折卸及回人捐備木料興工修造於本年三月全行告竣合計七百餘間所用銀兩在收税項下動撥造冊送部請銷其加給工役口糧即用收放盈餘糧石再附近所有水泉冬季枯涸惟以池塘接濟殊覺不便臣等令於城内西北角試行掘井幸獲泉脈其味頗甘現在修砌以供汲飲官兵囘人無不歡幸奏入報聞戊申諭伊犂將軍明瑞等酌定撤回官兵道路事宜上諭軍機大臣曰明瑞等奏稱葉爾羌應撤之索倫兵若於八九月起程自當在伊犂過冬或夏令即已遄行則度車克納克嶺由朱爾都斯一路經過烏魯木齊至烏里雅蘇台回抵游牧已行文新柱海明旌額里等語各回城撤回索倫察哈爾兵由伊拉里克至烏魯木齊路多戈壁故皆於伊犂過冬今明瑞等所奏係從阿克蘇以東赫色勒河上游過嶺水草頗饒道路亦近嗣後撤回之索倫察哈爾官兵若値有水草之時自當行走此地即起程稍遲亦不必往伊犂過冬現在各城有積貯糧石隨其所至足資憇息並當取道於此以免紆迴著𫝊諭明瑞及各駐劄大臣等知之陜甘總督楊應琚疏奏駐劄烏魯木齊酌請改設總兵官事宜楊應琚奏言查烏魯木齊為新疆衝要之區現在召募内地貧民攜眷開墾又設副將一員酌分安西提標前後二營及各標情願挈眷前往兵丁共一千八百餘名而原議駐兵四千名尚須陸續調撥查各省營制每營轄兵不過數百名經該處辦事大臣旌額理訥蘇懇與臣往復扎商擬再設一營以符體制規模既大似副將一員不足以資統轄應請改為總兵添設鎮標中營及城守營合原設之左右二營共成四營統聽巴里坤提督節制將來烏魯木齊以東巴里坤以西應行屯種之處其綠旗官兵即責成總兵就近督率辦理而巴里坤提臣東有哈密沙州西有烏魯木齊居中調度形勢允合如䝉俞允所設總兵另行請㫖補授其添設二營之將備千把外委各官即於陜甘二省閒僻營分酌量移改續議具奏奏入得㫖如所請行五月己未命送厄魯特台吉巴朗歸都爾伯特游牧上諭軍機大臣曰明瑞等奏哈薩克來投之厄魯特台吉巴朗交侍衛永平送京或安插京城或在伊母舅策凌烏巴什游牧居住等語巴朗既係策凌烏巴什之甥即著在彼處游牧居住不必送京癸亥議核銷伊犂牲隻事宜伊犂將軍明瑞等奏言伊犂烏魯木齊俱有屯田其牲隻奏銷事同一例所有每年倒斃之數馬騾驢准銷三分牛准銷一分五釐踰額者著落賠補其牧放騸馬及作為口糧之牛隻每百准銷六分至口糧羊隻除孳生者交官外似尚有盈餘可補應不准其倒斃備用駝隻雖不便照軍臺准銷三分之例應請毎年開銷一分踰額亦著落賠補奏入得旨軍機大臣議奏尋議從前烏魯木齊核銷倒斃牲隻各屬開報不符部議准以每百八釐開銷本年二月旌額理等奏稱散牧水草之牲隻與飼秣者不同請將馬騾驢每年准銷三分牛准銷一分五釐今明瑞所奏相符應准其照數核銷其牧放之羊及備用駝隻俱如所奏辦理奏入上從之乙丑諭陜甘總督楊應琚等籌畫營伍兼併添設事宜上諭軍機大臣曰鄂弼奏查閱營伍一摺内稱各標營額設弁兵有分派防守及調任新疆屯田之事而副將㕘將遊擊都司守備等亦多係遞行委署之員不能實力訓練等語前此有事西陲自必調撥官兵以濟急用今駐防屯田規模大定則内地營伍亦應加意整頓鄂弼所奏情形亦前此有不能兼顧之勢可不必深究但西安如此則甘肅可知倘仍不為整頓將來漸至廢弛著𫝊諭楊應琚鄂弼將各該標營現在情形悉心體察或有應行兼併管轄及另議添設之處務收實用不必稍存撙節之見俱著詳議具奏丙寅命回城需用馬匹由伊犂等處調撥上諭軍機大臣曰永貴等奏稱喀什噶爾購馬二百七十九匹用銀二千七百六十三兩有竒計每匹銀十兩以内等語伊犂烏魯木齊貿易哈薩克馬匹甚多嗣後各回城有需馬之處俱著奏請調撥停其購買馬匹喀什噶爾辦事尚書都統永貴等疏奏興修水利事宜永貴等奏言回部地畝俱收資於溝渠據伯克噶岱黙特稟稱灌溉全部地畝之河一名赫色勒河出喀什噶爾之西喀卜喀山中灌溉東南一帶托古斯恰特賽爾們喀什噶爾哈喇刻爾多羅特巴克阿爾巴特牌租阿巴特等大小村莊過巴爾楚克歸於羅卜淖爾一名托庸河出喀什噶爾西北托庸山中灌溉東南玉斯屯阿喇圖什阿喇古霍爾干阿斯騰阿喇圖什伯什克勒木等大小村莊與赫色勒河合流過巴爾楚克一名圖巴里克河出喀什噶爾西南吉斯嶺及西邊烏帕勒山中東流㑹於圖捫此河上流向東浚渠引水灌溉汗河里克提斯衮赫色勒布伊等三村莊下流向東北與赫色勒河合流過巴爾楚克俱滙於羅卜淖爾一名庫森提斯衮河出喀什噶爾西南英噶薩爾城西羌琿山中灌溉東北英噶薩爾之各村地畝散流於戈壁惟赫色勒布伊提斯衮汗阿里克三處分引圖巴里克一河水不足用臣等詳加相度自赫色勒河東南浚渠四十餘里引水入赫色勒布伊村又托庸河水湍急所種地畝多被衝刷臣等酌派伯克等添建土石堤壩并鑿山石以弱水勢仍飭令時加修葺保固期收實效奏入報聞壬申議補授回城伯克事宜軍機大臣奏言據永貴等議奏回部伯克有應行請㫖調補及由各本城奏補一摺欽奉諭㫖交臣等議奏查上年三月奉㫖嗣後伯克等有陞遷降革等事五品以上著各該大臣專摺具奏六品以下著年終彚奏本年正月奉㫖六品以下小伯克擬定正陪具奏補放其各城之阿竒木等缺出將應放之人列名具題俱著有定例至大城阿竒木等向由各城調補其小伯克等即坐補本城之缺所以别等威而示體恤查所奏喀什噶爾葉爾羌阿克蘇和闐烏什庫車沙雅爾庫爾勒玉古爾英噶薩爾塞里木拜哈喇哈什克勒底雅塔克玉隴哈什齊爾拉等城之三四品阿竒木伊沙噶伯克缺出開列具奏及六品以下之伯克等年終彚奏俱無庸另議其喀什噶爾所屬之牌租阿巴特塔什密里克阿斯騰阿喇圖什葉爾羌所屬之巴爾楚克阿克蘇所屬之克勒品烏什所屬之魯克察克托克三喀喇和卓闢展洋赫等城村之阿竒木伯克十四員雖係四五品俱歸大城兼管不必將各城㑹同調補應即坐補本處員缺惟沙爾呼勒竒盤二城地處邊逺山僻其阿竒木等仍由本處揀補餘俱照各城辦理奏入上從之丙戌命副都統額爾景額往葉爾羌辦事上諭軍機大臣曰副都統額爾景額派往葉爾羌辦事照納世通之例授為㕘贊大臣喀什噶爾辦事尚書都統永貴等疏奏阿克蘇伊沙噶伯克頗拉特不職請革任解京永貴等奏言阿克蘇伊沙噶伯克頗拉特賦性愚抝素與阿竒木色梯巴勒氐不和遇事每多掣肘臣等屢戒不悛今據所屬回人呈告頗拉特隱匿巴林回人九十户未辦差糧等語臣等飭查屬實又伊子七品都管伯克梯尼恃勢强占回人田地馬匹俱經呈告臣等齊集大小伯克摘取頗拉特梯尼頂翎并將伊應帶户口交派侍衛驍騎校等解送京師其頗拉特員缺查賽里木伊沙噶伯克密爾頗拉特人明白辦事奮勉應請調署阿克蘇伊沙噶伯克事務伊子員缺一併揀選補放年終彚奏奏入報聞平定準噶爾方略續編卷二十一
