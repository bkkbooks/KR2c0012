body:
  text: 乾隆二十年夏六月庚午定北將軍班第等密奏阿睦爾撒納悖逆情形班第等奏言臣等與阿睦爾撒納將撤兵事宜商酌已定伊遣宰桑們都告稱據多果魯特鄂拓克嗎穆特前來密告途中聞沙克都爾曼濟鄂勒錐訥黙庫與衆喇嘛等商議欲往迎達瓦齊乗隙騷動雖沙克都爾曼濟等已隨扎拉豐阿等起身然行程未遠或乗夜來襲亦未可定應嚴加防備等語臣等即傳瑪木特詢問語甚支吾詳察情形顯係阻撓撤兵之計臣等諭之云達瓦齊在伊犂時沙克都爾曼濟尚不能為力今豈更能往迎即迎之亦何能為惟是行軍防範理固應爾雖無此信原不宜怠忽伊知臣等不為所動復令自哈薩克逃囘之達哈泰前來密告哈薩克約有兵五萬前來之信臣等詳詢達哈泰據稱我去年為哈薩克擄去今年四月三十日逃囘聞知哈薩克聚兵搶掠準噶爾前隊兵於五月初旬起程後隊尚未齊集并聞哈薩克人云達瓦齊與我等積成仇隙斷不令其統轄準噶爾若阿睦爾撒納代為台吉我等不敢發兵兩相和好臣等復以現在阿睦爾撒納同大兵前來哈薩克等曾否聞知阿睦爾撒納從前所遣丹津爾於何處遇見並巴特瑪車凌額林沁現在何處是否同哈薩克兵前來一一詢問據稱我並未遇見丹津巴特瑪車凌額林沁聞其亦與哈薩克兵一同前來阿睦爾撒納領兵到此哈薩克尚未及知如果聞知伊等甚畏阿睦爾撒納自必退囘不敢拒敵等語臣等隨向達哈泰云爾即往哈薩克將阿睦爾撒納現奉大皇帝諭㫖領兵前來平定準噶爾之處一一告知哈薩克伊並不敢前往而阿睦爾撒納即以且俟丹津囘時自得實信為詞又捏稱達瓦齊於八月内即來伊犂種種揑飾惟冀留駐大兵張伊聲勢占據伊犂致悞入覲日期臣等正言力阻雖不稍為搖惑但逆謀現已顯著又阿睦爾撒納遣納噶查宰桑錫哈瑪私給喇嘛熬茶銀一千兩且云我若統轄準噶爾時必將爾等善為養育後經宰桑阿雅勒鵠告知薩喇爾喇嘛人等皆言擾亂準噶爾全部係達瓦齊阿睦爾撒納二人今大兵一到達瓦齊不知逃竄何所我等方慶更生而阿睦爾撒納復散布統轄準噶爾之言我等與其為阿睦爾撒納暴虐不若急圖遠避等語再達瓦齊逃遁後所有投降宰桑衮布達瓦薩爾坦雖曾助達瓦齊為虐但既經歸附理應遵㫖解京乃阿睦爾撒納不行具奏亦不向臣等㑹商擅自殺戮並將家産抄沒又欲襲殺達瓦齊屬下宰桑車凌多爾濟摩羅及恩克博羅特吞圖布等經臣班第鄂容安力阻而止已潛遣人將伊等家産抄沒其尤甚者先經定議將準噶爾錯處之衆分為四衛喇特汗編隸旗分佐領令各居本地不得移居一處阿睦爾撒納又潛行詭計將屬下被擄及向伊順從人等俱行收集并各處遣人往來招致並不遵用皇上頒給印信但用噶爾丹策零小紅圖記查準噶爾噶爾丹策零為總台吉時悉用小紅圖記其下台吉人衆如有私用者罪即應斬部衆莫不稔知今阿睦爾撒納行文竊倣噶爾丹策零其心跡顯然可見仰懇聖明降㫖速將阿睦爾撒納調取回京所有四部落即行分封絶其妄念奏入上諭軍機大臣曰班第薩喇爾鄂容安密奏阿睦爾撒納圖據準噶爾僭越妄行情跡顯著前班第等初奏時朕尚以為防微杜漸之意傳諭公同體察如阿睦爾撒納果有實跡明白具奏嗣復降㫖阿睦爾撒納受恩至重未必即萌悖叛之心使伊罪未彰而治之以法朕心不忍且使新降之人俱生疑懼是以未即傳㫖令伊等辦理今據班第等詳細奏聞阿睦爾撒納種種不法圖據準噶爾已無可疑豈必待其生變始為實據由此觀之伊未必即遵㫖前來入覲即使前來若令仍往準噶爾斷不能安分静守必至妄行滋事與其俟伊交結煽惑變遲而力費何如及今乗機辦理之為得也朕意已决此事即宜速行辦理將此密諭班第等如阿睦爾撒納尚未起程班第等即行密商或托以商議事務密行擒治數其罪惡即於軍前正法齊木庫爾納噶查與伊任用宰桑等一併俱行拏解來京無干人等慰諭釋放候㫖遵行事關𦂳要務期熟籌妥辦俾一舉即得寧謐辦理後班第等即傳諭準噶爾部衆阿睦爾撒納自歸附以來受朕深恩委任信用伊並不遵奉訓諭滋擾投誠人等刼掠牲隻誣衊沙克都爾曼濟叛逆擅殺宰桑等大員抄没家産其意將令準噶爾人衆盡行騷動然後獨踞準噶爾爾等衆台吉宰桑無不為伊屬下前因達瓦齊凌虐爾等部衆朕始定計進兵安轄地方撫綏衆庶今若縱阿睦爾撒納所為是貽害爾等必更甚於達瓦齊是以將阿睦爾撒納正法祇將附和數人治罪至爾等與伊所屬之人俱無干涉照舊安居此正為爾衆人永久安全之計將此通行曉諭如阿睦爾撒納已起身前來俟伊到時朕當另行辦理如伊勉强前進及至中途或於路通哈薩克處逗遛不前或寄信於巴特瑪車凌等勾結生釁則應如何先事豫防之處著班第等悉心籌酌一面辦理一面奏聞倘阿睦爾撒納經伊游牧處托故遷延朕另遣人辦理但辦理阿睦爾撒納後伊游牧處必致驚潰或往哈薩克逃竄此亦當豫為防範朕已降㫖以防守烏里雅蘇台軍營為名留兵一千名令普慶達色帶領駐防前降㫖令阿蘭泰在烏里雅蘇台駐劄辦事其阿睦爾撒納游牧即著阿蘭泰普慶達色領兵前往與納穆扎爾辦理班第等將如何辦理之處一經酌定即速行知阿蘭泰令同普慶達色領兵往游牧處將伊妻子及扎木叅并素日任用之和通等一併拏解來京餘衆俱屬無干亦將此遍行明白宣諭以安衆心至牧場馬駝應即盡行收取使伊等不得乗騎逃遁如阿蘭泰尚未起程即將此等情節詳悉告知若已起程則於辦理阿睦爾撒納之際即作速密檄俾遵諭辦理倘阿睦爾撒納已至熱河臨期朕另降㫖與阿蘭泰等將伊游牧辦理班第等務宜密之又密不得少有洩漏一切其善體朕意計出萬全再辦理此事時雖不能不任智術然仍當示以威信舉動得體方為妥協朕於此厪念甚切此㫖一到班第等即將如何籌辦之處密速奏聞壬申密諭定北將軍班第等豫籌防禦巴特瑪車凌上諭軍機大臣曰朕命班第等遣人曉諭哈薩克而阿睦爾撒納必欲遣伊屬人前往即此可以想見其心其中必潛通信息故令巴特瑪車凌留住哈薩克窺探此處情形若不令阿睦爾撒納統轄準噶爾地方則將藉巴特瑪車凌以為挾制之具今辦理阿睦爾撒納之意已决班第等接到前㫖自當妥辦但事後哈薩克聞知巴特瑪車凌等勢必前來搆釁不可不留心豫備著班第薩喇爾鄂容安公同詳議嚴加防範密諭烏里雅蘇台辦事大臣莫爾渾等豫籌防禦事宜上諭軍機大臣曰據班第等密奏阿睦爾撒納圖據準噶爾種種悖逆不法情事已降㫖令班第等將阿睦爾撒納即在軍營正法但事後伊等游牧人衆必致驚亂逃竄自應豫為防備是以於凱旋索倫兵内留一千名派阿蘭泰普慶達色帶領俟班第信到即往阿睦爾撒納游牧處擒其妻子及任用宰桑等解送來京但思阿蘭泰等如未到烏里雅蘇台辦理無人今特令阿桂前往先將所降班第諭㫖交莫爾渾舒赫德公同閲看俟班第信息一到即遵照辦理班第等辦理阿睦爾撒納時或有伊屬下人逃出至伊等游牧通信甚至搶掠喀爾喀逃往哈薩克種種皆未可定莫爾渾等務為加意籌辦如所留之兵已到而阿蘭泰未即前來莫爾渾等即奮往辦理或阿蘭泰已經前來而兵尚未到應否於喀爾喀各部落内調用之處即行詳議密為豫備勿稍宣露納穆扎爾朕尚未降諭㫖爾等辦理時當密告納穆扎爾公同遵辦再莫爾渾等所奏撤兵一摺内稱所到各隊兵丁統需接濟口糧等語著於給發時略為延緩俾伊等多留數日以備調遣秋七月癸酉朔議定凱旋兵丁口糧駝馬事宜駐劄烏里雅蘇台辦事大臣莫爾渾等奏言各處凱旋兵丁至烏里雅蘇台時按地方遠近應各給與口糧如索倫巴爾虎黑龍江昭烏達等處兵丁酌量給與口糧四十日察哈爾右衛綏遠城及京城兵丁酌量給與口糧一個月喀爾喀厄魯特兵丁無庸給與口糧其口糧於現貯之炒米炒麵内動支若不敷用補給羊隻其自西路凱旋之索倫巴爾虎察哈爾䝉古兵丁至推河時亦應給與口糧所有索倫巴爾虎内扎薩克兵丁酌量給與口糧四十日察哈爾兵丁酌量給與口糧一個月俱於達什和碩牧放羊隻内揀選二萬隻解赴推河分給各處兵丁所有原領口糧未滿日期者仍接筭扣除至察哈爾兵丁及京師滿洲官兵前在烏里雅蘇台辦給馬匹駝隻無庸撤囘即令騎䭾至口上交納黑龍江兵丁亦將原辦給馬匹駝隻令其騎䭾至本處交納昭烏達右衛綏遠城兵丁原有留在烏里雅蘇台牧放馬匹駝隻倘不敷用再行補給前往其由西路凱旋之索倫巴爾虎察哈爾蒙古兵丁騎䭾馬駝至推河時查明從前如何辦給之處亦照此分别辦理奏入得㫖軍機大臣議奏尋議各處凱旋兵丁自應按照道里遠近給與口糧莫爾渾等所奏俱屬可行惟昭烏達與西路撤囘之内扎薩克兵丁游牧較近不必給與口糧四十日應給與口糧一個月其各處撤囘及補給馬駝數目仍分晰具奏所有察哈爾及京師滿洲官兵騎馱馬駝至口上時應交與總管達松阿輝色等接收牧放仍將數目報明以備稽查奏入上從之丁丑定北將軍班第等密奏阿睦爾撒納言語情形班第等奏言臣等察看阿睦爾撒納甫至伊犂即圖安居不願他往臣等詢其何日起程入覲伊推託支吾但言此處事體尚未完竣哈薩克布魯特現有前來之信又云或奉諭㫖令其在此與臣等一同辦事亦未可定臣等據理開導雖勉强聽從而遲疑瞻顧之情時時流露數日内其辭又復變遷自云俟達瓦齊擒獲至尼楚滚地方視凱旋兵丁起程訖我即前往入覲其意更屬可疑臣等暫為安慰不甚催促伊賦性狡詐恐臨期又復託故留頓或於半途稱疾俱未可定喀爾喀王額林沁多爾濟人尚老成有識見每當會議時能逆折其計阿睦爾撒納亦為敬讓臣等公同計議令額林沁多爾濟同伊一路行走又恐先啟其疑此時且不露形跡俟起程期近時告以奉㫖令額林沁多爾濟入覲即可一同起程俟阿睦爾撒納抵熱河後皇上訓諭開導伊背逆之意自必潛消奏入上諭軍機大臣曰前班第等屢次密奏阿睦爾撒納負恩狂悖斷難姑容是以特降諭㫖令其密行擒治今阿睦爾撒納復欲速來入覲語屬可疑未必出於至誠特因所行非理懼班第等擒治因而多方逞其狡獪是其言雖可聽實無欲來之心或行至中途託病遷延或至塔爾巴噶台游牧依戀久居均未可定夫以阿睦爾撒納如此奸宄狂悖豈僅為降㫖開導所能了事若不將伊擒治又何如置之不問今伊惡迹已顯著如此班第等不思密為辦理但稱請朕面加訓諭以折其心是全不知事理之輕重矣著速行密諭班第如此際奉到前月二十八日所降之㫖已將阿睦爾撒納擒治甚善若未及辦理而伊已起程前來班第等接到此㫖約計阿睦爾撒納行程未遠即遣人將伊追囘擒治如已逾旬日之外亦須沿途詳密偵探消息再行辦理朕意阿睦爾撒納至塔爾巴噶台必詭言防範哈薩克遷延不行班第等應即以會同防範哈薩克為辭著薩喇爾鄂容安帶領所留兵五百名及達什達瓦屬下兵聲言會合速行趕赴擒治設伊行至中途託病逗遛伏竄他處不便遣兵擒拏亦著班第等酌量設法妥辦總之阿睦爾撒納逆跡已著不可姑容以致貽患將來然路途遼遠班第等須盡心籌畫乗時决斷毋得稍自委靡致失機宜再額林沁多爾濟不過一小有才之人未經更事一切密要之語且勿令與聞將此一併傳諭班第等知之臣等謹案阿睦爾撒納覬覦不遂逆跡滋彰我皇上哲炳幾先知其必不敢入覲是以屢奉密諭令將軍大臣等即速擒治乃將軍大臣等因循觀望既昧操刀必割之義及其託詞起程遷延不進復荷聖明照察諄訓再三使稍識機宜者亦當慎遣威信素著之大臣部勒同行尚可不致狡焉脱顧計不出此而僅委其責於額林沁多爾濟一人故方奏到之時睿慮即以道里遼遠宜乗時决斷毋稍委靡剴切申諭况額林沁多爾濟之為人將軍等方以為老成有識而聖訓洞燭早以小有才不更事為虞仰見我皇上於萬里之外無弗前事立斷初不待阿逆還印遠颺之日也則其不能禀承謨畫在事諸臣猶得辭其咎哉戊寅定北將軍班第等疏奏都爾伯特台吉伯什阿噶什等率衆來降班第等奏言六月十五日都爾伯特台吉伯什阿噶什和碩特台吉三濟特同至軍營告稱我等游牧在哈薩克邊界大兵平定準噶爾今始聞知是以率衆來降臣等查伯什阿噶什屬下共三四千戸三濟特屬下共三百餘戸即行安撫並令伊等隨同親王班珠爾等入覲後據伯什阿噶什等告稱因游牧與哈薩克接壤如無保䕶之人恐哈薩克乗間擄掠懇將伊弟肯哲畢喀先來入覲伊等回去保䕶游牧俟明年或後年游牧已定再行入覲臣等公同商議伯什阿噶什等原與達瓦齊離心上年即欲歸降曾密語臣薩喇爾之兄布林今因游牧離哈薩克甚近必須親往保䕶亦屬𦂳要即照所請令伊等囘保游牧飭伯什阿噶什速遣伊弟肯折畢喀前來入覲奏入報聞庚辰議定準噶爾善後事宜定北將軍班第等奏準噶爾善後事宜一摺得㫖軍機大臣議奏尋議據班第等奏稱準噶爾四衛喇特奉㫖分封四汗其盟長應即令四汗兼管所有四部落戸口數目各令本部落編次旗分佐領其作為公中之鄂拓克宰桑等戸口數目應按籍編次補放官員頭目所有四部落游牧仍各安原處毋庸遷移等語臣等查加封四衛喇特係按各台吉等品級及戸口多寡加恩封授至盟長乃辦理事務人員非世襲之職似宜選授不必令四汗兼攝應交班第等於四汗及所屬大員内揀選開列職名請㫖補放餘應如所奏辦理又奏稱大兵所至囘部頭目次第來降俱安插於各本處地方惟葉爾羌喀什噶爾等部相距遼遠比年來與準夷並無交納之項其現在來降囘部伯克美穆特等所納貢賦照伊等舊冊辦理至如何酌減如何運送内地及歸何項應用之處俟查明具奏再吐魯番頭目之子滿蘇爾聞大兵一至即赴投誠其屬下人衆應否令其統轄其向住瓜州公額敏和卓情願遷移於吐魯番之魯克察克地方請派照管部員及安西武弁一員同往俟遷移後撤回等語臣等查回部居止遠近不同貢賦亦異應令班第等核對舊册再行辦理其吐魯番部落原屬内地今舊頭目之子滿蘇爾既已歸誠其屬下人衆似應准其統轄但該部落現係何人管轄并額敏和卓移於魯克察克是否相安且魯克察克與吐魯番頭目住處是否相連奏内亦未聲明應俟班第等將各項情節查明具奏後另行定議又奏稱汗哈屯巴斯庫斯等地方烏梁海現派青滾雜卜等前往收服俟收服後編次旗分佐領補放官職其得木齊收楞額等名色照舊存留俱如去嵗辦理至從前收服之烏梁海移向原游牧吹等地方居住亦交青滾雜卜等辦理再汗哈屯等處烏梁海俱係用兵收服非自請歸降者可比將來無庸減其貢賦等語俱應如所奏辦理但烏梁海賦性愚昧所有新降人等貢賦獨不得邀恩裁減未免易生猜疑應令青滾雜卜等明白曉示以從前察達克等裁減貢賦因準夷未定即已投誠與爾等俟大兵到時收服者不同若果實心効順數年之後奏請加恩一體裁減又奏稱扎哈沁人衆俱曾在阿爾台之布拉罕察罕托輝等地方居住今既將包沁人衆亦令瑪木特兼管應俱遷移於阿爾台等處俾喀爾喀與四衛喇特接壤之處多一籓籬再小策零敦多卜之子達什達瓦為喇嘛達爾扎所殺部衆分散今俱歸降隨大兵同討達瓦齊聞達什達瓦有子圖魯巴圖逃入囘部如現在訪求可得或即令統其舊衆否則就部衆中擇人心推服者領之俾移居於喀爾喀扎哈沁包沁接壤之科卜多布延圖地方其餘現無頭目台吉人衆俟查出另辦等語臣等查扎哈沁包沁之人原與四衛喇特分居應如所奏遷移其達什達瓦之子圖魯巴圖雖經尋訪而得與不得及實係伊子與否均未可定且以全部之人令一逃亡稚子統轄亦未允協請將達什達瓦部衆及現無頭目台吉人衆俱愼擇人心推服之宰桑統領令在布延圖居住至訪得圖魯巴圖時請加恩量授職銜給以百戸亦於科卜多布延圖地方指給游牧居住又奏稱由伊犁至哈密及由巴里坤至烏里雅蘇台軍營馳送事件現在俱設有臺站其由烏梁海呈報駐劄伊犁大臣事件即從相近卡倫接遞無庸另設臺站至由伊犁至囘部地方即照策妄阿喇布坦時沿途䝉古供應之例亦無庸安設臺站等語俱應如所議行又奏稱烏魯木齊魯克察克地方遼遠不便攜帶家口無庸安駐内地兵丁今既議將瓜州囘衆遷移魯克察克地方即可派京城蒙古兵二千名攜帶眷屬移往瓜州居住裁汰安西緑旗兵丁等語臣等查從前伊犁駐劄大臣曾議增兵以壯聲威經薩喇爾等奏稱準噶爾甫經降服恐生疑懼并慮將來搶奪今班第等又稱道遠難攜眷屬應無庸安駐内地兵丁近奉諭㫖於巴里坤留兵一千名駐防若瓜州囘衆既遷自宜酌派京兵往駐與巴里坤駐防兵丁更番行走現因酌議西路安駐兵丁事宜令黄廷桂來京俟到時臣等將瓜州巴里坤駐兵事宜公同酌議具奏又奏稱喀爾喀與厄魯特舊為讐敵若將喀爾喀游牧展至阿爾台與厄魯特游牧相近不能無竊盜爭鬭之事即喀爾喀等亦不願離故土逼處厄魯特游牧且喀爾喀等俱以牧養為業其鄂爾昆塔米爾推河等處若派滿洲兵丁攜眷屬前往屯戍一時不能嫻習日後恐開侵占之端應無庸派兵駐劄及安設臺站等語臣等查議令展拓游牧原為喀爾喀生計起見今班第等既稱與厄魯特逼處未便又恐鄂爾昆等處駐劄兵丁或至侵占喀爾喀游牧應如所奏無庸遷移駐劄又奏稱四衛喇特等令各安舊業所屬賦税仍給與伊等收管惟噶爾丹策零舊時分内賦稅俱行交官現在派員查辦等語臣等查四衛喇特荷蒙皇上加恩分封自宜各安舊業其噶爾丹策零分内所有賦稅原與伊等無涉應令班第等查明實數如何收取支用另行酌議具奏奏入上從之辛巳命定北將軍班第等詳察阿睦爾撒納情形上諭軍機大臣曰據班第等奏稱聞哈薩克頭目諾顔阿布賚等私相商議阿睦爾撒納果領兵赴伊犁伊等即永相和好并將從前掠去輝特人等給還等語前據班第等奏阿睦爾撒納種種狂悖情事似應即行擒治續又稱阿睦爾撒納欲來熱河請將伊面加訓諭伊等前後所奏毫無主見即如所聞哈薩克頭目之言看來明係阿睦爾撒納詭言哈薩克懼伊勢力煽惑衆聽顯有併據準噶爾之意若留伊在彼將來必滋生事端不若早為辦理但伊等所奏終屬含糊究未將伊實在情形明白陳奏著傳諭班第薩喇爾鄂容安伊等若接到前月二十八日諭㫖將伊擒治則已如伊已經起程前來仍俟至熱河時另行定奪但阿睦爾撒納來時究宜如何辦理或可姑留與否若將伊訓飭後仍行遣囘伊等能保其不致更生事端否著班第等公同詳悉商議奏聞伊等奏到時朕再為酌定此㫖著速行覆奏命協辦陝甘總督劉統勲查勘巴里坤哈密地方移駐滿洲兵丁事宜上諭軍機大臣曰前有㫖令劉統勲於黄廷桂到任之後囘京供職今黄廷桂川省任内現有應辦之事不能即赴陜甘而甘省政務邊防一切關係𦂳要如現議改駐滿兵處所尤當相度情形通盤籌畫劉統勲即應親身前往會同策楞查勘并與班第咨商至將來瓜州囘民仍囘吐魯番原住牧處於該協督所請改設滿兵之外另設駐防滿洲兵二千名則哈密城堡等處或即於瓜州滿兵内分撥防守其綠旗官兵又可酌量裁減至貿易處如何派兵照料該協督均當親履其地悉心酌議具奏劉統勲係軍機大臣此等事宜伊即囘京亦分所應辦將此傳諭該協督令其詳悉熟籌務期允協乙酉命定北將軍班第等擒治阿睦爾撒納上諭軍機大臣曰據班第等密奏阿睦爾撒納將所賞黄帶孔雀翎置而不用並不將已經内附受恩之處告知厄魯特人衆等語阿睦爾撒納種種悖逆斷不可留朕屢經降㫖密諭班第等遵辦今覽班第等所奏阿睦爾撒納不惟不知感激朕恩且將内附受恩之處欺瞞厄魯特人衆即此一節應即明正典刑其餘悖逆之事更無足問矣班第等如奉到前月二十八日所降諭㫖已將阿睦爾撒納擒治甚屬妥協如尚未辦理伊起程前來朕必將伊拏問班第等諸事務宜密之又密不得稍有洩漏定北將軍班第等疏奏俘解達瓦齊起程日期班第等奏言前經囘人伯克霍集斯報稱擒獲達瓦齊臣等派副都統額爾登額等帶兵前往接應於六月二十四日額爾登額等與伯克霍集斯將達瓦齊父子押解到營臣等查解送達瓦齊赴京取道伊犁經行伊等游牧須派兵嚴密防範現在於撤囘兵丁内選派五百名令公哈達哈率領厄魯特台吉根敦扎卜喀爾喀貝勒那木扎爾車蘇隆等一同押解於本月二十五日遣令起程其宰桑愛爾齊等七人與隨從七十餘人俱在後陸續解到俟到日臣等詳訊應解送者派員管押解京奏入報聞丁亥定北將軍班第等密奏阿睦爾撒納言語情形班第等奏言和碩特親王班珠爾追擒達瓦齊囘營應即赴京入覲阿睦爾撒納揑稱布魯特葉爾羌喀什噶爾有合兵來犯之信特穆爾淖爾游牧人衆現在畏懼向内遷移令貝勒齊木庫爾車布登扎布告知臣等欲於親王班珠爾貝勒齊木庫爾剛多爾濟台吉唐古特宰桑阿巴噶斯察哈什特克爾得克等數人内指派令其統兵防守游牧邉界臣等告以班珠爾齊木庫爾俱係派定入覲之人察哈什亦應奉㫖入覲除此三人外方可選派阿睦爾撒納云此外無可選派之人即便遣往亦不能辦事班珠爾又告稱若將我舊屬賞還情願前往等語臣等詰以從前因防範哈薩克布魯特調兵九千名分駐兩處豈尚不足防守邊界則云所派之兵因統領不得其人至今尚未全往臣等復詰以此時應行入覲之大台吉宰桑既可派留辦事照看游牧從前因何不先派往又云彼時因尚無確信是以僅將得木齊收楞額等遣派又向臣薩喇爾商議欲令齊木庫爾料理兵丁起程後再行入覲臣薩喇爾告之云此時即刻啟行尚恐稽遲若出兵後焉能星速馳赴臣薩喇爾隨派諾海竒齊克與宰桑特克爾得克一同前往且語以布魯特邊界不過宵小盜竊爭奪斷無大事阿睦爾撒納欲留班珠爾等之議始行中止至起身之期猶再三延緩至二十九日始行又班珠爾屬人原自無多特倚藉阿睦爾撒納勢力將噶爾丹時收獲之鄂齊爾圖及車臣汗等和碩特屬人收取甚多臣等遵㫖止將伊等舊日屬人辦給餘俱屢次駁囘奏入上諭軍機大臣曰據班第等密奏阿睦爾撒納阻止班珠爾等前來入覲又班珠爾倚藉勢力將並非伊舊日屬人歸併管轄經班第等駁囘等語阿睦爾撒納種種悖逆深負朕恩屢降諭㫖令班第等遵辦今閲此奏阿睦爾撒納欲留班珠爾齊木庫爾等在彼不令前來入覲明係欲留其黨以增羽翼其叛跡愈著班第等如遵照前月二十八日所降諭㫖已行擒治固屬甚善若伊已起程至塔爾巴噶台游牧地方借防禦哈薩克之名逗遛不前亦遵前㫖著薩喇爾鄂容安帶領兵丁以會同防範為辭將伊擒治倘阿睦爾撒納尚未至伊游牧中途遷延班第等即以奉㫖會商事件追伊囘至軍營辦理如不遵㫖前來即著班第等帶兵追擒先將通哈薩克路徑派兵堵禦使其不至兔脱方為妥協再前經降㫖令伊等辦理阿睦爾撒納時將齊木庫爾納噶查等一併查拏今查班珠爾亦係其黨伊二人乃同母異父之子自必同謀班珠爾亦應一併治罪但伊已於二十九日隨同阿蘭泰來京途中尚可稍緩俟伊至熱河另行辦理班第等此次力折阿睦爾撒納阻止班珠爾之議薩喇爾即將諾海竒齊克等派出防禦不令阿睦爾撒納得逞奸謀甚屬可嘉班第薩喇爾鄂容安務宜加意奮勉和衷集事庶不負朕委任至意戊子議定巴里坤駐劄京兵口糧事宜協辦陝甘總督劉統勲奏言哈密原貯糧米三萬四千五百餘石此次用兵運往米麵約存六萬九千七百餘石又餘存牛羊肉乾十九萬餘斤現為支給防兵口糧之用將來凱旋官兵沿途口食雖未定實存確數但駐防巴里坤京兵共一千名計算毎年口糧約需五千石前項口糧實屬充裕無庸另為籌畫再此項糧石存貯哈密舊設糧員管理今巴里坤駐劄京兵若將口糧運存彼處勢須委員料理查兵丁每季所需有限若將本營牧放駝隻按季赴哈密關領更為省便奏入得㫖軍機大臣議奏尋議現今西路凱旋京兵議於巴里坤駐劄所需口糧奉㫖諭劉統勲令其酌量籌畫今哈密積貯既多而巴里坤兵丁需用無幾自可無庸運貯糧石設員管理祇令京兵按季赴哈密關領較為省便應如所議辦理至瓜州與哈密相去不遠現議瓜州駐防滿洲兵二千名原令屯田供食或將來駐兵之初所入不敷支食即於哈密存貯餘糧内撥往接濟應一併籌辦統俟該協督劉統勲親往巴里坤一帶會同策楞查勘情形定議撥兵駐防後再行妥擬具奏奏入上從之命授吞圖布恩克博羅特為頭等侍衛先是定北將軍班第等奏言六月初四日據厄魯特貝勒扎木叅之宰桑達沙在闥勒竒嶺拏獲達瓦齊宰桑恩克博羅特十六日官兵追擒達瓦齊時拏獲宰桑吞圖布二人俱係達瓦齊信用之人應解送京師隨派侍衛黙德庫等押解前來至是扺京奉㫖吞圖布恩克博羅特俱著授為頭等侍衛並各賞銀一百兩遣赴熱河等候平定準噶爾方略正編卷十五
