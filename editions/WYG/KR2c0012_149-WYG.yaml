body:
  text: 乾隆二十六年二月乙酉授原任按察使圗桑阿為同知原任副都統富昌為三等侍衛上諭軍機大臣曰原任按察使圗桑阿自派往葉爾羌以来一切公事頗知奮勉著加恩賞給同知職銜仍隨新柱辦事原任副都統富昌派往阿克蘇照管牧羣解送牲隻俱屬奮勉今舒赫德又令其駐劄賽里木辦事著加恩授為三等侍衛葉爾羌辦事都統新柱等疏奏查核沙爾呼勒囘人户賦新柱等奏言從前副將軍富德等收服沙爾呼勒伯克時查該處原管五百户舊例每户徴收黄金一錢後經霍集占等擾亂逃散僅存二百餘户今漸次安集據伯克穆喇特禀稱情願照舊按户納金臣等隨行查核酌定二百户上年十二月交收黄金二十兩貯庫俟本年交收後彚送京師嗣後户口日増隨時查核辦理奏入報聞丙戌參贊大臣舒赫徳疏奏酌籌流通庫貯餘錢舒赫德奏言臣等同新柱海明額敏和貞等通籌葉爾𦍑等城交官正項及入官地畆錢糧足敷公用尚有盈餘以錢折價可當銀一萬餘兩但囘城錢文不能如銀兩之到處流通且喀什噶爾等城距阿克蘇頗逺難於運送若乆貯庫中恐於囘人日用有礙查本年派往伊犂馬兵三百名來年綠旗兵一千名俱由各城協助牲隻今葉爾羌等城有庫貯餘錢應請酌購囘人及外藩貿易牲隻即外藩不收錢文亦可購買布疋什物兑換倘牲隻一時不能足額又以餘錢為僱覔價值庶公務辦理裕如而囘人益安生業奏入報聞丁亥恩䘏厄魯特三等侍衛策伯克上諭軍機大臣曰厄魯特三等侍衛策伯克前在軍營甚屬効力今隨永貴於中途病故深可憫惻著賞治䘮銀五十兩并查該員有無子嗣具奏請㫖壬辰諭陜甘總督楊應琚嚴訊解送羊隻倒斃過多情節上諭軍機大臣曰前據德爾格奏稱哈宻解送羊隻在途倒斃六百有餘當即𫝊諭楊應琚等令将千總張文學沿途解送情節查明速奏今據永寜等奏稱張文學自哈宻起程由臺站行走四站後忽由戈壁取道前往直至今年正月始到闢展等語此項羊隻由哈宻至闢展計程祗十一站何不可行而必由戈壁且戈壁較臺站更近一日何以遲至二月之乆至前行四站僅斃三十隻後此六站多至六百餘隻其中顯有盜賣情節張文學著革職拏問交該督楊應琚嚴審具奏癸巳議更換臺站官兵事宜參贊大臣舒赫德奏言穆素爾嶺有塔木噶塔什噶克察哈爾海二臺較各臺差務繁劇所有臺站官兵酌擬一年更換以應陞之缺陞用其委署筆帖式於凉州莊浪駐防官兵内挑選綠旗兵由陜甘各標營派出但現屆更換之期請暫調阿克蘇滿洲綠旗兵前往來年更換官兵應於班期前三月到臺學習行走其哈宻至囘部各臺站官兵定為二年更換仍囘該處操防又各處駐劄大臣有字識差遣等兵丁亦請二年一換照例於甘肅凉州等處選派於班期之前學習其換囘各兵丁行文本處量加奨賞奏入得㫖軍機大臣議奏尋議軍營所設臺站酌量繁簡隨時増減移撤則更換之期未便定以年限如繁劇之地或一年或半年更換一次俱屬可行現在伊犂及囘部各城滿洲綠旗兵丁甚多臺站差務乃伊等奮勉之路令其更換行走本屬近便或有在軍前年乆應行更換者亦可隨時奏報将京師滿洲及陜甘綠旗兵再行選派以均勞逸所有凉州莊浪滿兵及陜甘綠旗兵丁分年派出之處應毋庸議其換囘官兵議敘陞用或量加奨賞等事應如所奏辦理奏入上從之甲午命議處解送屯田牲隻之都司觀德等上諭軍機大臣曰據伊勒圗等奏稱解送伊犂屯田馬牛駝隻令都司觀德守備王成學加意牧放乃所送五百四十九隻倒斃至二百有竒其餘亦多疲乏請将觀德王成學交部嚴加議處並将臣等一併議處仍著落賠補等語損傷牲隻過多乃該解員等牧放水草不得其宜之所致與伊勒圗等無渉至阿桂據觀德等所報即撥給馬匹接濟更屬辦理妥協著将觀德王成學交部嚴加議處餘俱不必處分議肅州囘人移歸吐魯番事宜陜甘總督楊應琚奏言肅州威魯堡安插吐魯番囘人現有二百五十户一千五十餘名口承種熟地一萬五千三百六十餘畆户口日増地畆有限伊等聞瓜州囘人遷囘故土其年老者亦有思歸之意臣前晤額敏和卓亦云願接濟口糧帶囘安插擬即於本年秋收後令該千户珈如拉等帶領仍委員照看起程送至哈宻并先期知㑹吐魯番公素賚璊前來接濟其所遺地畆招募承種於内地民生亦有裨益奏入得㫖軍機大臣議奏尋議肅州所住囘人自雍正四年内附䝉世宗憲皇帝賞給安插不徴賦税至乾隆二年生齒日繁又䝉皇上恩賞可耕荒地減半給與籽種農具但所有户口較初附時已増一倍自當籌畫乆逺今西域蕩平吐魯番已成樂土且可耕之地尚多應照𤓰州囘人例准其遷囘故里但所奏知㑹額敏和卓之子素賚璊之處臣等愚見該千户珈如拉之祖托克托瑪木特與額敏和卓俱被準夷凌虐先後來歸今既遷囘應請交與該督等酌量附近闢展之吐魯番可以耕牧之地於今年秋收後遷往並即於千户珈如拉百户額明和卓二人内揀選一員授為伯克以一員副之其将來賦税即由闢展大臣徴收至沿途照料無令失所請交與該督妥協辦理奏入上從之三月庚子朔命定免死減等人犯改發巴里坤之例上諭大學士曰前因甘省軍務未竣且嵗事尚屬歉收因将免死減等發往巴里坤安插人犯暫行停止以免兵役押解及沿途口食之繁今大功告成年榖時熟屯田收穫亦為充裕自應仍照前例改發俾投諸逺方者得以力耕自給而内地匪類亦知所懲創不致漸染居民此舉實為兩得惟從前所定條例為數稍多著軍機大臣㑹同刑部堂官詳覈各犯案情酌量刪減著為定例奏請通行辛丑命拏獲巴里坤逃犯即於各該處正法上諭大學士曰據明德奏稱嗣後巴里坤逃犯請即於拏獲地方審明正法不必逺解甘省等語所見甚是前於直隸督臣拏獲逃犯一案諭令就本處正法而各省辦理尚未畫一此等匪徒原屬去死一間之人乃復悍然脱逃愍不畏死即解至甘省亦法無可逭而長途押解易致疎虞且徒滋兵役往來之煩嗣後凡有發遣巴里坤等處逃犯經原籍及所過省分盤獲者一經移詢明確即由各該督撫自行奏聞於拏獲處正法示衆以省弊累都統侍郎海明疏奏希卜察克布魯特懇求安插海明奏言二月十五日據駐卡人員報稱居住阿賚之希卜察克布魯特額穆爾比遣人呈稱前隨侍衛托倫泰同波羅泥都等攻取葉爾羌後聞波羅泥都欲相殺害因率四百餘户逃往安集延續知大兵平定囘部願率所部來歸適與伯克額爾德尼有貿易之約遣弟阿璊前往忽為所拘今决意歸誠懇請指地游牧等語臣准其代奏并賞給來使羊隻口糧仍詢公噶岱黙特散秩大臣阿竒木俱言情節屬實謹擬将來使穆魯特與輪班入覲之伯克等同行奏入報聞癸卯授厄魯特侍衛碩通為頭等侍衛上諭軍機大臣曰阿桂奏稱遵㫖𫝊諭厄魯特侍衛碩通來京挈眷於伊犂居住據禀情願乗時効力俟将來再行挈眷等語碩通在軍前宣力有年不以挈眷為急甚屬可嘉著加恩授為頭等侍衛仍聽其隨便來京甲辰諭陜甘總督楊應琚據實查訊解員傷損羊隻情節上諭軍機大臣曰楊應琚查奏千總張文學等倒斃羊隻情節著落不行留牧之永寜淑寳等賠補殊未允協前據永寜查奏該員改道戈壁行走以致羊隻倒斃過多業經𫝊諭該督令其嚴行查辦計具奏時尚未奉到但自哈宻至闢展不過十一站若云戈壁並無水草則從前四萬餘隻何以長途無損且四萬隻既經前往末起千餘隻自應隨行永寜等不令留牧未為不是今以微員不能賠補而加罪於永寜等則所見小而大不公朕辦理軍務豈専為錢糧起見楊應琚何未之知著𫝊諭該督再行秉公查訊據實具奏丙午諭參贊大臣舒赫德等辦理安插囘人事宜上諭軍機大臣曰從前辦理囘人莽噶里克後因伊屬人無所統束暫令安插吐魯番交額敏和卓管理今大功告成囘部皆朕臣僕自應各率其屬不相兼并朕意将此項囘人内擇其賢能者授為伯克等職仍安插原處查明舊日賦役照例供辦又阿里衮前因追賊至羅卜淖爾所收囘人亦應照此辦理著𫝊諭舒赫德即與額敏和卓商酌具奏請㫖丁未葉爾羌辦事都統新柱疏奏辦理查勘引水溉田事宜新柱奏言臣等㸔得葉爾羌形勢毗連戈壁雨水亦少全賴引水溉田是以設有宻喇卜伯克専司其事查囘部舊例凡怠於灌溉及紊亂成規者俱有罰項以充公費無庸另給惟引水時須派撥丁役從葉爾羌河源逐次查勘行二日至愛濟特呼其宻沙爾等七處俱須於一日内分道行走現任宻喇卜伯克邁逹雅爾係和闐人未曽隨帶丁役懇照噶雜納齊商伯克之例給與丁役五十人承辦公事臣等詢之阿竒木伊沙噶等伯克俱稱需用屬實即飭令照例辦理奏入報聞戊申諭定邊左副将軍成衮扎布等展拓喀爾喀等處卡倫上諭軍機大臣曰成衮扎布等奏從前準噶爾未平喀爾喀等卡倫皆向阿爾台山梁安設今準夷囘部俱入版圗向時戍守之區俱成内地實為亘古所無請将扎哈沁烏梁海喀爾喀等卡倫展拓庶耕牧有資等語展拓卡倫於伊犂生計有益所奏阿爾台卡倫以外指定耕牧處所著准其辦理可𫝊諭伊犂烏魯木齊巴里坤等處大臣與成衮扎布等将彼此作何聨接安設卡倫之處㑹商妥辦具奏諭北路解送牲隻暫停補額各事宜上諭軍機大臣曰成衮扎布等奏遵㫖解送伊犂駝一千隻牛三千隻羊三萬隻業已編羣分起所派都爾伯特扎哈沁人等於行糧外各賞銀五兩其派出官兵俱支給一嵗錢糧現在烏里雅蘇台軍營尚餘駝六百隻羊四千餘隻牛二百餘隻請将缺額羊隻仍於春來由牧羣送補外餘俱暫為停止俟需用時再行支給等語成衮扎布等辦理伊犂牲隻甚屬妥速今烏里雅蘇台牲隻既尚足用除羊隻外俱著暫停補額併𫝊諭巴爾品知之己酉命副都統伊勒圗協辦喀什噶爾事務上諭軍機大臣曰舒赫德奏稱喀什噶爾地頗衝繁若駐劄辦事大臣二員較為有益今伊勒圗在阿克蘇尚無承辦要務可否令往喀什噶爾協同永貴辦事如䝉俞允其所管健鋭營兵丁令侍衛揚桑阿管理又侍衛訥齊訥應於秋季囘京所管索倫兵丁令換班侍衛額爾登額管理等語阿克蘇既有和其衷協同海明辦事伊勒圗即著前往喀什噶爾餘俱照所奏行庚戌諭哈宻辦事布政使永寜等酌募造房工作事宜上諭軍機大臣曰永寜奏准劉順咨調哈宻兵丁四百名往巴里坤建造房屋其哈宻房屋俟來年安西兵到時再行建造等語哈宻房屋與其守候安西兵丁不若招募囘人俾赴工作則官房既得速成而伊等生計亦有裨益著𫝊諭永寜等須與玉素富商酌是否可行亦不必勉強從事命賞英噶薩爾阿竒木伯克素勒坦和卓三品頂帶上諭軍機大臣曰素勒坦和卓前因富德等令往㧞達克山甚屬奮勉已加恩賞給四品頂帶雀翎授為阿竒木伯克此次隨明仁額爾登額等奉使外藩又著勞績著加恩賞給三品頂帶以示奨勵甲寅命以波羅泥都㓜子薩木薩克送京養育仍訪察其餘藏匿子嗣上諭軍機大臣曰海明奏稱查出波羅泥都離異之妾愛什阿哈察所生子薩木薩克将伊乳母及收養之囘人博羅特索丕解京等語薩木薩克尚屬童稚不應緣坐送來京師惟加恩養育可耳即博羅特索丕留養舊主之子情亦可矜具著照例安插但聞波羅泥都尚有二子或藏匿囘地亦未可定著𫝊諭永貴等以留養薩木薩克一事曉示囘衆仍留心訪察其餘子嗣毋任藏匿議運闢展餘糧至巴里坤應用事宜駐劄闢展郎中德爾格奏言准軍機處議闢展喀喇和卓托克三共貯糧二萬五千石計嵗需不過四千石其餘一時難於出糶應運至巴里坤接濟兵丁口糧查闢展僱覓囘空商駝若照肅州哈宻解糧之例每一石行走百里給銀四錢九分八釐有竒自闢展至巴里坤七百七十里每石共需運費三兩八錢三分七釐有竒較内地運送似為省便奏入得㫖軍機大臣速議具奏尋議從前由肅州哈宻至巴里坤所運糧石以官價運費合算約十有餘兩今以闢展糧運計之所費不過三分之一自應如此辦理請行文德爾格照臣等原議将嵗需之數約存三年以内餘俱運送巴里坤其運費於兵餉内動用奏入上從之諭陜甘總督楊應琚酌籌撥運新疆糧石事宜上諭軍機大臣曰德爾格奏闢展餘糧運送巴里坤一事已定議准行矣因思哈宻安西等處俱有官兵所需口糧多由肅州等處運送著𫝊諭楊應琚查明内地運至哈宻等處每石約需運費若干若照闢展運送巴里坤之例由吐魯番一路送來哈宻安西每石約需運費若干如較内地運往之費大有節省固不待言即令所費相等而内地多留一石之糧即閭閻受一石之恵其為利更溥也即著詳籌妥議具奏命陞賞照管接濟馬匹之侍衛官兵等上諭軍機大臣曰阿桂等奏由阿克蘇派往伊犂之綠旗兵丁撥馬三百匹接濟令三等侍衛鄂鐸索倫驍騎校署參領伊爾第領兵三十五名前往照管以迄囘營無一傷損等語鄂鐸等此次行走甚屬可嘉鄂鐸著加恩陞授二等侍衛伊爾等著交部議敘兵丁等酌量奨賞㕘贊大臣舒赫德等疏奏酌議移駐闢展等處兵丁舒赫德等奏言查軍機處議奏闢展等處裁汰兵丁請陸續撥往伊犂屯田其各該處仍應留兵若干俱行文舒赫德阿桂定長安泰等㑹商具奏臣等查伊犂所派綠旗兵已足二千名今秋遷移囘人二百户亦足一千户之數惟額林哈畢爾噶為伊犂要路現在闢展等處裁汰兵丁俱送烏魯木齊請於本年秋收時臣安泰定長酌量馬匹牲隻派兵一千名於瑪納斯揚巴勒噶遜安集哈雅晶河等處酌量駐兵屯田則地當伊犂烏魯木齊之中聲勢聨絡接濟臺站亦便至闢展等處應留官兵一事查闢展自大功告成無承辦軍需之事留兵六百名已足惟哈喇沙爾為闢展阿克蘇適中之地又與朱爾都斯之空閒游牧相近有多倫囘人游牧請駐兵八百名将現有官兵七百名内汰其老弱廢疾以闢展餘兵補額其今秋應派伊犂馬兵綠旗兵及葉爾羌等處駐兵額數臣舒赫德仍㑹同各駐劄大臣等議奏奏入上從之御前侍衛烏魯木齊辦事副都統安泰疏奏辦送屯田官兵行抵伊犂日期安泰奏言正月初三日准阿桂咨伊犂屯田由烏魯木齊調取辦餉知縣一員縣丞一員又屯田馬一千匹及籽種口糧農具貿易縀疋鹽菜銀兩令金梁帶領於本月二十六日至鄂伯勒齊爾因尼楚滚登努勒台等處雪大另從博羅布爾噶蘇嶺一路修鑿氷雪阿桂復遣侍衛鐵柱接濟協助已於二月初七日行抵伊犂計馬一千匹又厄魯特七十餘口騎馬一百餘匹駝一千餘隻及馱運各項俱交金梁收訖臣於十六日起程囘烏魯木齊奏入報聞乙卯命議敘御前侍衛副都統安泰等協濟屯田勞績并免總兵官金梁疎防處分上諭軍機大臣曰安泰奏辦送屯田官兵馬駝糧餉器具全抵伊犂等語此次辦理妥協甚屬可嘉著将安泰金梁及隨同送馬官員等俱交部議敘兵丁賞給一月鹽菜銀兩其金梁所領綠旗兵内逃走三人既即時查報著加恩免其議處脫逃兵丁嚴緝務獲諭按察使約世通約束多倫囘人事宜上諭軍機大臣曰據納世通奏稱派往伊犂屯田之多倫囘人等因玉古爾至穆素爾嶺地多戈壁牲隻疲乏将籽種口糧借供飼秣旋准和其衷咨已向阿克蘇囘人通融辦解今准阿桂咨仍少籽種三十五石暫将口糧内大麥抵補再行辦送等語納世通初次辦理殊未妥協至多倫囘人係甫經招撫安插庫爾勒非各城囘衆之馴服者可比嗣後宜留心約束固不當苦累亦不得過於姑息著𫝊諭知之己未諭陜甘總督楊應琚籌議臺站糧運事宜上諭軍機大臣曰楊應琚請撤南路臺站改歸北路安設一摺所奏哈密不必駐劄官兵等語甚屬非是軍機大臣遽照覆定議亦於事理未協前南路安臺特為承辦軍需此時改歸北路原屬可行至欲将哈密各項事宜歸巴里坤大臣承辦而闢展一帶屯務交烏魯木齊大臣稽查無庸再駐官兵則所見甚屬紕繆哈密為新附各囘部總滙之地将來拔達克山布魯特等囘人往來貿易仍當時派大臣辦理或官兵太多酌量裁撤則可若盡歸巴里坤承辦無論鞭長莫及且将來經理之貟勢必由督撫等派委武則副將文則道貟此等不諳外藩情事中朝政體非辦理張皇即因循推諉有不蹈準噶爾貿易之轍而損威失馭者乎楊應琚向知任事何並不計及或因永寧等在彼辦事未免掣肘因為此奏則國家要務将委諸不能任事之有司封疆大吏似此心存畛域豈朕委任重寄之意若永寧果有狥私舞弊之處何妨直㕘其人不必撤其任也至請停運闢展等處餘糧一事所引僅屬安西緑旗兵折價更未可視為成例此項糧運乃為哈密巴里坤等處辦事官兵俸餉及将來接濟之計若果可與駐防綠旗一例辦理朕豈轉不樂從而必斤斤預籌輓運乎該督祗援折色二兩二錢之例絜長較短所謂不揣其本而齊其末矣所有該處辦事一切官兵等現在作何支放及所存糧七萬石實足供支㡬年儻有不敷作何接濟俾将來不致再籌糧運之處奏内並未通盤籌畫著𫝊諭楊應琚令其悉心確核妥議具奏庚申按察使納世通疏奏多倫囘人控告總管情節納世通奏言上年十月初二日玉古爾多倫囘人將總管阿竒木伯克阿木都賚勒索伊等緞疋牲隻列欵呈告因阿卜都賚前往伊犂未囘臣與庫車大臣等㑹商俟該伯克囘日派貟押送並率同吐魯番公素賚璊審訊具奏此時先令素賚璊署理玉古爾等處阿竒木事務奏入報聞辛酉諭直省督撫将軍及巴里坤等處辦事大臣等經理新疆發遣人犯事宜上諭軍機大臣曰軍機大臣㑹同刑部核定發遣巴里坤人犯條例奏請通行已降㫖依議此等罪犯本屬去死一間投畀逺方既不至漸染民俗而新疆屯墾方興又可力耕自給實為一舉兩得前降諭㫖甚明但各省督撫亦當經理盡善如每次起解人數太多僉差既恐紛繁且沿途食宿壅積均屬未協應酌量人數或十餘名至二十名内外分作一起節次遞送始為合宜至甘省乃遣犯㑹集之地而各省解犯必取道西安該撫等於人犯解到時尤宜酌其多寡緩急與甘撫彼此知㑹該督又為統轄照應至既抵遣所該處辦事大臣更當嚴加約束俾勤於耕作毋致㳺手生事則良法不滋流弊方可謂之實力奉行著𫝊諭各省督撫將軍駐劄巴里坤烏魯木齊闢展等處辦事大臣知之乙丑命伊犂等處換班駐防滿兵應支各項照進𠞰例酌減賞給上諭軍機大臣曰如松奏綏逺城挑選烏里雅蘇台換班滿兵五十名俱照派往軍前之例支給馬駝鹽菜等項銀兩等語所辦未免過當伊等不過駐防更換非進𠞰可比應酌量賞給嗣後派往伊犂葉爾羌等處駐防兵丁將應給各項照進𠞰兵丁酌減賞給丙寅命停止内地辦送伊犂牲隻上諭軍機大臣曰阿桂奏稱内地購辦牛驢較之哈薩克馬價一牛可值馬四匹一驢可值馬二匹現在伊犂烏魯木齊貿易馬匹既多且耕作原屬可用請将内地購辦牛驢之處停止等語從前伊犂經畫伊始故從内地辦送牲隻今貿易馬匹甚多自當酌量辦理著𫝊諭楊應琚永寧五吉等除現在購辦牲隻仍即解送外嗣後陜甘哈密巴里坤等處不必購辦伊犂牲隻丁卯授阿桂為内大臣上諭軍機大臣曰阿桂奏稱伊犂烏魯木齊貿易哈薩克馬匹漸多准舒赫德咨取馬二千匹與其從巴里坤解送不如在伊犂所得馬匹内除屯田足用外挑選一千匹送往阿克蘇其餘從烏魯木齊辦送至伊犂所換哈薩克騍馬一二年間即成大羣請将巴里坤等處馬匹仍於本地牧放等語阿桂籌辦馬匹甚屬妥協俱著照所奏辦理仍加恩授為内大臣嗣後宜益加奮勉以副優眷命優䘏副都統端濟布上諭大學士曰端濟布前在軍營頗屬効力今患病溘逝著加恩特贈都統職銜賞治喪銀五百兩應得䘏典著該部察例具奏又諭曰端濟布因軍前得傷囘京病故雖與陣亾官貟有間念其久在戎行身嬰鋒鏑殊可軫惻著加恩准照陣亾例入祀昭忠祠以示優䘏戊辰諭參贊大臣舒赫德等辦理希卜察克布魯特事宜上諭軍機大臣曰前據海明奏希卜察克布魯特額穆爾比願率所部内遷令伊弟穆魯特貢獻土物并據禀稱伊弟阿璊為額爾德尼伯克所拘等語額穆爾比誠心向化甚屬可嘉著加恩賞給三品頂帶仍賞緞二疋額穆爾比既與布魯特阿竒木同族即一處安插亦可伊弟穆魯特著於囘部伯克入覲之便來京現在穆魯特若求向霍罕索取伊弟即告以前此之事皆爾等素不和睦所致且在歸附以前不便代索俱著𫝊諭舒赫德知之平定準噶爾方略續編卷十
