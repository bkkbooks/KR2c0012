body:
  text: 乾隆二十四年三月甲申諭定邊將軍兆惠等撙節軍需各事宜上諭軍機大臣曰兆惠富德等奏稱現在辦理進勦官兵行裝鹽菜等項需銀四五十萬兩咨行定長等以駝隻隨數運送而定長等行查兵數且必候闢展駝隻臕壯再咨行永貴等將阿克蘇應辦米石布疋各數覆到始行辦理恐悞軍行等語定長等外任習風辦事每多推諉固屬見小而兆惠等辦理進𠞰亦甚拘泥查先後觧送軍營備用銀兩將及三十萬自足應用朕於軍行之費非有吝惜但以官兵所需計之如衣裝布疋雖在内地購買一時亦難得數十萬則囘城所出有限可知至賞給銀兩即暫時存貯候功成再行補給亦於伊等生計有益此時官兵等若購買回人之物無裨實用者尚應禁止豈可任其糜費且伊等從前所奏捉生詢問及拘執霍集占等所遣回人一切情形何以未見奏及又布魯特兵丁應否調用哈薩克錫喇投來囘部與否兆惠等進𠞰時務宜留心辦理不可徒托空言其辦送兵丁之乾清門侍衞敦察即著在軍營行走命優䘏隨靖逆將軍納穆扎爾等陣亡得傷官兵上諭軍機大臣曰兆恵等奏稱隨納穆扎爾等進𠞰陣亡之侍衞官員十人兵一百五十餘名又得傷兵六十餘名分别列單進呈造册送部等語前據愛隆阿奏報侍衞奎瑪岱陣亡比即加恩照竒徹布之例給與世職此次查奏之三等侍衞章武著照奎瑪岱例藍翎班泰照三等侍衞例俱給與世職吉林㕘領固爾特衣喀喇沁臺站四品㕘領錫喇卜俱交部照例議䘏索倫驍騎校署㕘領喀爾瑪勒圖領催署㕘領瑪提木保察哈爾驍騎校署防尉阿穆呼朗䕶軍校署防尉齊旺扎卜前鋒署䕶軍校納們俱著照現署職銜議䘏陣亡兵丁等著交部照例議䘏至得傷兵丁從前舒赫德曽奏報途遇脱出兵丁四名此六十餘名曽否與援兵相遇及得脱情形著兆惠查明具奏定邊將軍兆恵疏奏被圍後節次情形兆恵奏言欽奉十二月三十日諭㫖以舒赫德所奏囘人托克托黙特來告臣等被圍情形查明具奏查臣等自十月十三日結營固守後賊見勢難即取亦掘溝築壘起立髙臺施放鎗礮二十二日決水衝灌我營臣即派官兵掘渠引入下流數日内兼資飲用賊又掘溝濳伏以葦埽自蔽欲行偷刼俱經撃退其賊所立髙臺四面俱有䕶身垜口施放雜木巴喇特鳥鎗臣等即立髙臺相對自二十二日至十一月初十日吉林索倫察哈爾緑旗官兵等乘懈攻奪賊始不敢登犯惟看守營壘十一日賊遣吐魯番囘人及我哨探得傷厄魯特隨將軍納穆扎爾得傷察哈爾三人前來告稱霍集占抗拒時波羅泥都本不知情今奉書請和情願捐助口糧并求親信之人同行入覲臣等拘留來人將從前頒發波羅泥都令擒送霍集占阿卜都克勒木之勅諭恭設几案令對陣囘人捧去次日賊人仍申前説臣遣額敏和卓所屬回人傳示云爾等小醜何敢以和好為詞我大兵來問霍集占叛逆之罪尚不悔悟求生計日兵馬雲集髫齓不留矣賊計窮復施放鎗礮臣等即行抵敵并遣人逼近賊營誘擒生口賊不敢出是月十六日十二月初九日兩次派兵四百名分兩翼呼噪焚燒賊營生擒三人奪取軍器牛隻正月初八日聞數十里外鎗礮聲料必援兵是夜選兵千名造雲梯衝出焚燒賊壘傷死千餘人生擒五十五人奪軍器無算自此賊人退避惟逺駐賊騎防守此次固守軍營仰賴聖主威福上天神佑靈蹟甚多即如臣等安營處喀喇烏蘇在其北戈壁在其東南而我兵於深林中駐劄伐木給用潰圍時尚餘二百餘株初憂乏水以賊人引水灌營獲濟嗣後隨地掘井泉即湧出至正月初旬井水忽涸營中拾取賊人鎗礮鉛丸萬億每斫一木即墜落無數而我兵傷損甚少官兵意氣奮發毫無憂懼之形至舒赫德所奏得米百六十窖馬駝千餘隻雖屬𫝊聞但掘塹安營時曽獲回人埋藏米榖二十餘處每處不過一二石奏入報聞戊子㕘贊大臣舒赫德等疏奏酌議囘城田賦舒赫德等奏言臣等前奏阿克蘇等囘城歸附後應行廣種地畝酌定租賦㑹同阿琿伯克等公議具奏今議得從前準噶爾苦累囘人多取貢賦年來霍集占惟用威力挾制各城以致地方凋敝今聖主仁恩疊沛伊等捐輸糧石仍給以價值囘衆無不懽感臣額敏和卓查回人舊制徴收糧石係十分取一載在經教至阿克蘇城乃舊汗之公地收穫時則係平分又霍集占從伊犁同來囘衆墾種之地俱已閒曠昨因駐兵需糧囘人等交米二千四百石頗屬黽勉若將霍集占地畝均給貧人除公地照舊徴收其餘地畝俱十分取一伊等愈為樂業隨傳集阿克蘇賽里木沙雅爾辦事人等曉示俱各情願遵行惟庫車甚為殘破似應另議烏什現有貝勒品級伯克霍集斯徃辦馬匹請行文令其酌定將來平定葉爾羌喀什噶爾再行定議辦理奏入上從之諭定邊將軍兆惠等查詢伯克霍集斯事宜上諭軍機大臣曰適據舒赫德奏伯克霍集斯有徃烏什辦馬之舉伊果係抒誠効力或虚應故事俱當察看酌量賞賚至前諭富德由特穆爾圖淖爾進取喀什噶爾未免太逺若烏什有相通之路則更便易亦詢之霍集斯酌量辦理一面奏聞命齎欽差大臣闗防給阿克蘇辦事大臣行文鈐用己丑申諭定邊將軍兆恵等酌停咨調馬匹銀兩上諭軍機大臣曰吳達善奏據定長等咨稱兆恵調取闢展等處存留索倫察哈爾兵五百名應撥馬一千匹於二月二十八日出口又撥銀三十餘萬由哈密觧送軍營等語辦理軍需當籌實濟不宜徒張虚數現在阿克蘇等處㑹集官兵陸續趲送馬駝量已足用此時調取兵馬已不及進𠞰之期於内地徒増煩擾且兆恵等所辦如咨取賞銀四五十萬多未妥協阿克蘇非内地都㑹可比豈必需用如許銀兩致官兵人等任意糜費向來職貢諸國出産金銀徃來禁止越界今即擒獲霍集占盡平囘部亦仍係外藩豈可以中國財貨耗費於回地而不知惜已諭吳達善此次兵馬出口後無庸再為調撥其已撥之三十萬兩五吉接收後仍存貯哈密以所辦駝隻運送口糧尚屬切要俱著傳諭知之庚寅諭闢展辦事副都統定長等不必遷移臺站上諭軍機大臣曰定長奏稱准巴禄咨送奏稿請將哈喇沙爾至庫車一路臺站移向伊拉里克朱爾都斯至賽里木安設水草較好但舊設臺站現運口糧亦未便遽行裁撤等語朕經軍機處議以舊臺行走一年既已熟習現在糧運絡繹只應酌量添補馬駝若兩地俱設轉覺煩費應無庸議著𫝊諭定長遵行至巴禄昨請辦理臺站今既不必遷移即可前赴軍營其廵察臺站添補馬駝之處交與定長辦理辛卯諭定邊左副將軍成衮扎布等派調堵截兵馬事宜上諭軍機大臣曰成衮扎布等奏稱遵㫖派調副將軍策布登扎布等所領官兵除軍營滿洲喀爾喀緑旗兵九百名仍留備用外酌派三十三卡倫兵二百扎哈沁兵二百喀爾喀㳺牧兵六百共一千名賞給整裝銀兩於四月起程其應補給馬駝或折給銀兩另行具奏等語此次出兵特於搜捕嗎哈沁之便堵截逆囘霍集占等逃路現在布延圖有兵三百著即派入數内將喀爾喀兵減半發徃聞塔爾巴噶台博羅呼濟爾俱可通俄羅斯著策布登扎布等分兵兩隊堵截今派出副都統齊努渾頭等侍衞烏爾登俱授為㕘贊大臣前徃著策布登扎布福禄齊努渾為一隊車木楚克扎布烏爾登為一隊彼此聲息相通互為策應賊人自難脱布延圖兵既經派出著扎隆阿德爾素即為領隊大臣分作兩隊行走扎哈沁公扎木禪亦著在領隊大臣上行走照例賞給整裝銀兩至伊等軍營辦給馬駝不易適據桑寨多爾濟奏於庫倫購得馬三千餘匹駝三百隻即𫝊諭令其送馬二千匹駝一百隻至烏里雅蘇台策布登扎布等此行不必太速亦不可過緩值此青草萌生伊等將馬駝派給官兵沿途加意牧養應機奮勉又諭曰桑寨多爾濟所購車倫馬駝先選臕壯之馬二千匹駝一百隻送至烏里雅蘇台其餘送徃索岳勒濟等牧羣内牧養豫備至現在馬駝價值較前稍昂可酌量増加已諭該部發銀五萬兩交伊收領給價有餘即照所奏於恰克圖購辦馬匹其喀爾喀㳺牧不必採買命賞給喀喇沁臺站撤囘章京署㕘領甘珠爾等十人銀兩軍營効力之厄魯特巴泰巴魯及家口等由巴里坤來京命於京城安插壬辰諭定邊將軍兆恵等偵探賊衆情形上諭軍機大臣曰兆恵富德等前奏俘獲人口頗多而未聞詢問情形曽屢諭令其具奏伊等合兵囘轉時沿途所有村堡亦豈未遇一人且休息月餘與其閒住不若酌遣兵丁捉生詢問兆恵等當於索倫兵内選精壯者四五百名辦給馬匹分為兩隊前後行走偵探賊人若設有卡倫即行拏獲詢問若全無防守則其力竭可知即以大兵陸續前進掠其村堡則耕作之人必畏避入城倘遇大隊賊人即或不能𠞰殺而見我兵分隊行走亦慮有後應不敢前進即可捉生回營旋行釋放給以檄文諭其但能俘獻霍集占餘人皆可不問賊衆未有不動心者我兵撤後賊即再欲耕作而驚擾之下亦已失時必至坐困即使賊人豫作準備示弱相誘而我兵亦即撤回自不墮彼術中朕亦不加譴責也且索倫精兵至四五百人賊亦斷不敢偪若派兵前徃著富德愛隆阿由屯帶領富德如徃和闐伊二人亦可分隊前進但覽伊等近日奏報似不能如此辦理或馬匹不足亦當酌量行止此㫖著因便傳諭知之癸巳諭三等侍衞達爾黨阿等觧送馬匹事宜上諭軍機大臣曰兆恵等奏稱兩路進兵以每人給馬二匹及大臣侍衞官員乘騎計之共需三萬今内地辦送之馬僅二萬三千餘匹而西安滿兵達什達瓦兵丁乘騎即在其内其續調馬匹臕分平常者尚在凉州等處飼秣查軍營兵幾及萬馬匹全數送到尚屬不敷若再給西安等兵乘騎以致疲乏且續送之馬稍遲亦不能趲送已行文駐劄哈密等處大臣及送馬大臣等将所送馬匹仍由朱爾都斯一路趲行不可欠缺送馬官兵應令乘騎原馬或於兒騍馬内酌量添補其西安兵若已派給馬匹仍撤出觧送令暫住闢展俟續到馬匹辦給等語備𠞰馬匹自應多為辦送但西安滿兵不惟備𠞰亦以押送馬匹若留住闢展則現在二萬餘馬非達什達瓦之數百人所能照管著𫝊諭達爾黨阿哈達哈等西安滿兵仍令前行惟每人給馬一匹并勻搭行裝於應得馬匹内能撤出二三千匹更善其達什達瓦兵若已給馬匹亦照此辦理并𫝊諭哈密巴里坤闢展辦事大臣等知之又諭曰兆恵等所奏酌派馬匹一摺殊覺心神恇怯以逆賊霍集占為大敵試思賊勢果强焉能兩軍㑹合耶從前伊等進𠞰回部時已從準噶爾周行萬里馬匹疲乏是以被圍朕即早為計及辦此二萬餘馬匹從容觧送其力大勝於前而賊衆創殘之餘豈敢仍行抗拒且内地馬匹果可寛裕購備自必多為辦給即以治家之道譬之有餘固不妨誇耀而不足亦未始不可通融其能者費少而盡合機宜拙者費多而徒滋虚耗惟在實心實力善為運用耳已傳諭送馬大臣等將派給兵丁馬匹量為撤出仍令照看行走至若應援和闐則當如救焚拯溺又不可以兵馬之多寡計即著傳諭知之命陞賞効力之侍衞占頗圖等上諭軍機大臣曰兆恵等奏稱愛隆阿從葉爾羌收接臺站遇賊人七百餘塔蘇爾海巴圖魯三等侍衞占頗圖常在哨探行走奮勇勦賊得傷吉林虛銜藍翎領催圖音布得傷甚多馬中鎗斃前鋒哈木圖庫署驍騎校哈爾吉納奮身救出俱能連射斃賊効力可嘉占頗圖已加恩授為二等侍衞著交部議叙圖音布賜號沙拉瑪海巴圖魯哈木圖庫賜號克德爾巴圖魯哈爾吉納賜號楚庫爾巴圖魯俱授為藍翎侍衞賞銀一百兩仍交部議叙命閩浙總督楊應琚來京上諭軍機大臣曰朕以西事尚未告竣軍需闗係𦂳要從前黄廷桂在日辦理一切動合機宜因念楊應琚久任甘肅熟悉地方情形且能實心任事可𫝊諭令其作速來京陛見面聆訓誨并將軍需事宜悉心查閲以資督辦之效俟到時再降諭㫖其閩浙總督印務著楊廷璋署理浙江廵撫印務著明山䕶理甲午諭定邊將軍兆惠等辦送馬匹及進𠞰事宜上諭軍機大臣曰據達爾黨阿等奏稱通計馬匹出口日期三月初三日全抵巴里坤擬從木壘至烏魯木齊塔爾巴噶台朱爾都斯過庫庫努特嶺抵阿克蘇現在送馬一萬六千匹以五百匹為一起共三十二起以一日八起為率分派官兵管押等語伊等辦理甚好昨兆惠等奏報行文撤出西安滿兵馬匹令兵丁留住闢展朕諭量為抽撥仍行押送諒達爾黨阿等亦未必據咨辦理看來送馬一萬六千以兆恵軍營所存及舒赫徳等所購回人之馬計之不下二萬匹似不為少將來進兵時令兵丁騎歩兼行以紓馬力雖暫覺勞苦正可見報効之誠惟宜乘機進取通融酌辦至此次進𠞰昨諭兆惠取葉爾羌富徳取喀什噶爾今思和闐待援甚急富德即宜前徃就近堵截痕都斯坦之路兆恵自阿克蘇進攻葉爾羌時能擒獲渠魁固善萬一竄至痕都斯坦等處與富德相遇自必成擒或敗走至喀什噶爾兆惠一面追襲作速行知富德就近夾攻似屬長策俱著伊等相機辦理丙申諭定邊将軍兆恵等撫䘏兵丁事宜上諭軍機大臣曰近因明瑞來京朕詢以軍營情形知兆恵被圍三月實為勞苦富德速徃應援甚屬奮勉伊等同心協力如此深為嘉予至合兵後未稍為駐候亦未速徃和闐皆意見不到處和闐設有疎虞朕即念前功不加罪譴伊等自問於心安乎又聞軍營緑旗兵病故者三百餘名圍觧時將有病者續行䕶送又多致斃所派守䕶病兵之索倫等取其鳥鎗而病兵不肯給與致有争奪之事等語兵丁有病自宜撫䘏非可漠不相闗且此等病人尚能争奪鳥鎗非不可拯救者索倫兵雖嫻於戰陣而䕶視病兵豈能體䘏惟知早取軍器交官便可了事將軍等於兵丁當一體愛惜或令病者乘騎前行而䕶視者步行相送方使衆心感服何忍於棄置乃爾著將此等情節明白回奏再我大臣等方遇艱難未嘗不一心黽勉至事體既過則頓生同異此等習氣最宜深戒若能遵循朕訓何功不成可因便傳諭知之命優卹侍衞璊綽爾圖等上諭軍機大臣曰據明瑞奏稱二等侍衞璊綽爾圖三等侍衞拜達爾藍翎侍衞喀喇等俱以遇賊陣亡深可憫惻璊綽爾圖等著加恩照富紹例議䘏給與世職其散秩大臣達什策凌已諭兆恵等查明旗分子嗣再行加恩議䘏命奬賞吐魯番回人賚子翎頂縀疋上諭軍機大臣曰舒赫德等奏稱阿克蘇囘人托克托黙特見有嗎哈沁踪跡告知吐魯番回人賚子同索倫官兵等徃追俱已收取供係厄魯特輝特台吉為回人黙黙雅爾所獲明知故縱仍給以口糧隠匿不報業將黙黙雅爾正法示懲等語額敏和卓所屬囘人賚子素能効力一聞有嗎哈沁即行窮追深屬可嘉賚子著加著奬賞孔雀翎及頂帶縀疋所擒之嗎哈沁即賞給額敏和卓可也命㕘贊大臣愛隆阿仍以領隊大臣行走戊戌諭定邊將軍兆恵等酌派進𠞰官兵等事宜上諭軍機大臣曰據達爾黨阿等奏稱准兆恵咨令西安滿兵在闢展等處暫駐候續送馬匹再行辦給但觧送馬匹必須多人照管不便留駐業經報明將軍等語所辦甚是頃兆恵等以此具奏朕即以西安滿兵兼為觧送馬匹仍著照舊前徃今達爾黨阿等所奏與朕㫖適相符合看來兆恵富德合兵後所辦事件前後多自相矛盾即如伊等昨將巴里坤哈密等處存留之索倫察哈爾兵逐名查出發徃今又將西安滿兵存留全不計及二萬餘馬匹應需兵若干觧送朕意與其將西安滿兵留駐闢展不若截留軍營緑旗兵防守阿克蘇若總不需用即發徃屯田或竟令其各歸營伍現在總兵楊寧已領緑旗兵五千名前徃乘其新到或可得力可傳諭兆恵等即遵照辦理適據明瑞奏稱健鋭營前鋒不待雲梯直薄賊寨屢次克㨗已奬賞翎頂等語此等奮勉之人仍應加恩著兆恵等將先登陷陣官兵查出指名具奏候朕酌賞巴圖魯號所得和闐信息若何作速奏聞命以領隊大臣公明瑞為㕘贊大臣己亥命議叙辦送馬匹之大臣官兵等上諭軍機大臣曰據明德奏稱辦送軍營馬匹二萬四千有竒全抵巴里坤分隊起程等語此次進𠞰馬匹所闗緊要今自肅州妥協送至巴里坤甚屬可嘉所有承辦馬匹之大臣官員著交部議叙其送馬至巴里坤官兵著吳達善明德等查明具奏將官員交部議叙兵丁酌量奬賞命加㕘贊大臣公明瑞封號上諭軍機大臣曰明瑞宣力軍前奮勉可嘉著加恩賜號毅勇於伊所襲公爵晉封為承恩毅勇公命陞賞軍營効力侍衞瑪格等并優䘏侍衞寧古禮上諭軍機大臣曰明瑞奏稱二等侍衞瑪格三等侍衞烏勒德克索倫奬賞藍翎前鋒署㕘領嘉哈圖奬賞藍翎領催羅托在軍營奮勉効力等語瑪格著加恩賜號哈什哈巴圖魯烏勒德克賜號格勒爾圖巴圖魯嘉哈圖賜號伊德爾巴圖魯羅托著授為藍翎侍衞賜號肯特克巴圖魯照例各賞銀一百兩所奏陣亡之二等侍衞克丑巴圖魯寧古禮著交部照富紹例議䘏給與世職命賞乾清門三等侍衞塔瑪鼐整裝銀一百兩隨㕘贊大臣明瑞馳驛前徃軍營庚子申諭定邊將軍兆恵等曉示布魯特發兵事宜上諭軍機大臣曰前諭兆恵等以可否令布魯特發兵協𠞰事宜議奏今思若需用布魯特人當遣人徃伊等㳺牧曉示云大兵初攻葉爾羌時曽令爾等派兵協助爾等以冬寒雪盛為詞尚非無故後大兵雖稍稽㨗奏而𠞰賊頗多今復整兵大舉逆賊等無難計日就擒爾等歸順天朝䝉大皇帝厚恩自當派兵協助以抒誠悃且為將來受恩之地或不願發兵甚至欲助囘人亦惟爾便但爾等游牧距喀什噶爾不逺我兵攻取葉爾羌喀什噶爾後再行定奪可耳爾等若仍以力量不足為詞亦並不强爾協助惟霍集占等倘被廹投入爾境内則自當速為縛獻若再漠然坐視必行根究矣如此曉示看其言語情形若何再籌畫機宜具奏諭定邊左副將軍成衮扎布曉示哈薩克事宜上諭軍機大臣曰昨命策布登扎布領兵堵截逆囘及捜查嗎哈沁等所過之塔爾巴噶台等處與哈薩克邉界甚近伊等甫經歸順見大兵壓境妄生疑懼亦未可定今哈薩克入覲人等尚在歸途著成衮扎布候前次起程之哈薩克使臣及此次出痘新愈之俄羅斯蘇爾統等抵烏里雅蘇台時告以西路大兵進𠞰囘部恐逆賊等窮廹投徃俄羅斯經由爾等㳺牧因於北路派兵堵截若賊首入爾境内大兵直入追捕斷不驚擾㳺牧爾等有能擒獻者將軍大臣奏㨗叙功大皇帝必加恩賞今爾等囘抵游牧可將此情節告之阿布勒巴木比特阿布賚等通行宣示可傳諭知之三等侍衞納蘭圖等以䕶送哈薩克入貢馬匹進京賜納蘭圖蘇朱克圖巴圖魯號賞銀一百兩隨明瑞前徃軍營其吉林前鋒珠爾薩等四人遣囘游牧壬寅命陞賞重傷官兵并酌留効力年久之侍衞等上諭軍機大臣曰兆恵等奏稱軍營効力之藍翎侍衞錫勒圖訥等十七人得傷較重業經平復懇請留營𠞰賊等語伊等幸獲痊愈仍憤思報効深可軫念著加恩將藍翎侍衞錫勒圖訥授為三等侍衞索倫署㕘領喀爾庫准其實授驍騎校邁勒圖巴爾虎俱授為防禦健鋭營前鋒奬賞藍翎佛保索倫領催奬賞藍翎雅喇木保俱授為藍翎侍衞索倫馬甲拉爾竒魯昆濟木保髙濟保錫敦車騰固勒圖根敦俱授為領催察哈爾領催齊凌旺舒克著授為驍騎校厄魯特奬賞藍翎都喇勒哈什哈巴彦授為藍翎侍衞額敏和卓之䕶衞錫丕阿雅斯巴圖爾霍集斯所屬奨賞藍翎阿里木巴圖爾著將軍等酌量奨賞銀兩又諭曰前諭令來京之副都統瑪瑺侍衞老格等據兆恵奏稱伊等願留軍營効力等語瑪瑺等久在軍前故准其更换昨富德進兵瑪瑺老格奮勉得傷又令瑪瑺先同明瑞前來可傳諭兆恵等瑪瑺仍遵前㫖來京其巴圖魯侍衞老格等如行走尚能出力即留營調遣或有名無實仍著來京其革職効力之原任將軍錫特庫年已衰老亦著調回議撥補駝隻事宜㕘贊大臣舒赫德等奏言准兆恵等咨稱富徳徃援和闐應需駝一千隻查阿克蘇並無另備駝隻惟近准陜甘總督等辦送臺站軍糧駝隻一千餘即於此項調撥但空缺必須撥補隨經移咨軍營據覆稱現在咨取駝一萬隻即於數内扣除臣等伏思内地購買騾頭較駝隻為易而氣候水土亦相宜謹酌將所辦駝隻内用騾一千頭抵補連鞍觧送以速糧運奏入得㫖軍機大臣速議具奏尋議軍需駝隻自應多為豫備但務籌實濟若費繁道逺辦送疲乏又已踰期亦屬無益今舒赫德所奏仍拘泥兆恵等所咨一萬之數查上年冬季有觧送阿克蘇軍需駝三千隻又西安滿兵達什達瓦緑旗兵丁及節次糧運駝隻請令駐劄哈宻闢展庫車大臣等於所有駝騾内挑選將軍量為䭾載送至阿克蘇視其臕分先後撥用大約可得駝數千隻且籌運糧餉内地既送羊十萬餘隻闢展庫車以徃俱已屯田大兵前進正值麥熟亦可因糧接濟則稍減運糧駝隻似亦無礙所有彌補駝隻之騾頭應停其辦送如䝉俞允則現在烏魯木齊牧放騾四百頭即交定長等輕裝遣赴阿克蘇應用仍通行兆恵舒赫德定長吳達善等遵照辦理奏入上從之阿克蘇辦事侍郎永貴疏奏添補兵丁衣服情節永貴奏言臣欽奉諭㫖将咨取兵丁衣服布疋作何賞給應否扣還之處定議具奏查臣前與德舒酌議因進𠞰兵丁衣服殘缺必需添補者移咨陜甘辦送布疋針線俟送到時先儘阿克蘇等城駐防兵丁留用餘俱觧送軍營添補進𠞰兵丁仍查造名册行知哈密陜甘等處於應領鹽菜銀兩及本營錢糧内坐扣還項奏入報聞丙午命以西安滿兵撥補軍營缺額上諭軍機大臣曰定長等奏准兆恵等咨軍營現有緑旗兵及楊寧所領緑旗兵外再調屯田兵二三千名辦給軍裝以及歩兵萬人之數等語昨兆恵等慮馬匹不足令西安滿兵暫駐闢展今又調取緑旗兵前後辦理不相符合且此等兵丁歩行前至軍營力已疲乏亦不可用何如即将西安滿兵補足缺額著即遵照辦理其屯田兵丁不必另派戊申命奬賞賽里木阿克蘇之伯克等上諭軍機大臣曰據舒赫德等奏稱賽里木阿克蘇之伯克等措辦馬匹接濟口糧甚為出力等語伊等感激朕恩急公輸悃深屬可嘉現在賽里木總管阿瓜斯伯凱及弟貝格齊俱在軍營効力著加恩賞阿瓜斯伯凱二品帽頂戴孔雀翎貝格齊四品頂孔雀翎辦理城守事務之密爾博羅特莫滿亦賞給四品頂孔雀翎阿克蘇副總管頗拉特巴卜商伯克尼雅斯親行田野勸課耕作著加恩賞頗拉特巴卜二品頂孔雀翎呢雅斯四品頂孔雀翎其益加黽勉以􅎓恩賚命䕶軍統領努三等囘烏魯木齊辦事上諭軍機大臣曰今年哈薩克貿易人等恐來者較多定長不習䝉古語言仍須諳練之員辦理現在軍營領隊人多著𫝊諭努三永德等即囘烏魯木齊承辦哈薩克貿易事務多購馬匹以給軍用歸途之便即可查勘屯田地畝遇有嗎哈沁賊衆亦酌領緑旗兵捜𠞰平定準噶爾方略正編卷七十
