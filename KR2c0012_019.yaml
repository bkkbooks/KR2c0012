body:
  text: 雍正七年五月乙巳諭出征大將軍等上諭曰出征大將軍副將軍參贊大臣官辨兵丁等準噶爾狡獪凶頑父子濟惡為邊境蒙古之隱患朕仰承皇考聖祖仁皇帝先志特發兩路大兵聲罪致討當四海升平之時國用充裕朕細加籌畫計議再三凡命將遣官派兵運餉以及車馬甲胄兵器耕具之屬無不經理周詳備辦豐足宏綱細目具有規條而派出之官辨兵丁等踴躍歡欣爭先恐後其急公勇往之意甚為可嘉此蓋辨兵等素懷忠君報國之心而又受皇考六十餘年教養之澤感恩慕義出于悃忱故奮發之氣若斯之壯也然軍氣當壯而軍心則不可驕孔子論行軍之道曰必也臨事而懼好謀而成而以暴虎馮河為戒書經曰今豫其恭行天之罰可知古昔聖人於軍旅之事倍加敬謹從未有以士飽馬騰兵甲堅利而遂生驕矜之意忘嚴惕之懷也從來舉大事者固在人事之經營而成大功者必賴天心之眷佑若果仰邀上天慈恩默垂保護則天地間非常之業不世之勳皆計日可以成就而感格上天之道惟有一誠一和聖人曰至諴感神又曰和氣致祥古訓昭垂千載不易今此兩路大兵前往若自大將軍以下兵丁以上皆存一片誠敬之心一團和合之氣視國家之事如已事聨千萬人之心為一心以此感格上蒼蒙天心許一是字如此而大功不唾手告成者無是理也大將軍總統全師為三軍司命當開誠布公虛懷受益能謀於衆能斷於心勿以私意而泯人之勞勿以偏見而掩人之善信賞必罰惠愛嚴明副將軍參贊大臣等和衷協贊合志同心共展謀猷以成韜略其一應文武官辨等各有攸司均關重寄祇奉將軍之令善導所轄之人務殫公心以襄偉績至於兵丁等應思祖孫父子世受國恩今當執戈荷戟之時正效力酬恩之會况朕以至公訓諭大小臣工將軍等秉公心以馭士卒有功必録有過必懲正宜乘時黽勉以圖上進古人以共為一事比於同舟言其休戚相通憂樂與共也朕謂今日之事自將軍以下兵丁以上不但有同舟之誼實乃一體之親朕為元首以股肱耳目視爾等爾等衆人彼此聨屬之情當如手足臂指之痛癢相關肫誠固結不可藏嫉妬之念不可懷推諉之心且不但不當存退縮規避之私衷亦並不應存輕進貪功之淺見蓋一人立功其功小衆人立功其功大果能以誠心和氣感格上天錫福垂恩膚功克奏則凡行軍預事之人皆有光榮膺爵賞於朝廷垂令名於奕世豈不美歟朕自運籌軍務以來及師旅起程以後朕之一心時刻在於戎陳之間爾等宜共體此心也甲寅大閲於南苑是日辰時靖邊大將軍傅爾丹等令車騎營設車騎鎗炮並馬步軍士各按方位旗色布列陳式已時上登晾鷹臺御黃幄賜諸王大臣等坐鳴海螺自臺下以次逹營所營中擊鼓正南紅旗舉諸軍分隊進鎗炮齊發金鳴衆止由是而東而西而北各依旗色次第操演既而兩旗交展兩翼分進首尾相應演畢軍士歡呼凱旋各歸陳所隊伍井然軍容整肅綿亘周望上顧謂大學士張廷玉等曰若等操演可謂熟練今日天氣晴朗朕甚慰悅然此車騎營兵不過數分中之一耳他如盛京察哈爾等處精兵尚多也大學士張廷玉等奏曰三軍和氣上達於天天人交感用昭晴朗精兵所向其誰能敵上又謂浙江總督李衛曰此不過操演軍士之一法耳至於遇敵決勝相機度勢神而明之運用之妙存乎其人豈必拘拘排列陳伍然後可以制敵李衛奏曰皇上天兵馴熟精鋭臣得曕仰可謂見所未見上又謂諸大臣曰此次軍務怡親王同大學士張廷玉蔣廷錫辦理妥協如蒙上天默佑即奏凱歌若等之功不小怡親王大學士張廷玉蔣廷錫同奏曰臣等何知何能仰承皇上指畫周詳臣等不過遵奏辦理而已奏畢賜茶即於營中宣旨賜大將軍銀五千兩副將軍三千兩參贊大臣各千兩隨印內閣學士五百兩營總各二百兩章京等各百五十兩司官各百二十兩中書各百兩筆帖式各八十兩前鋒校護軍校驍騎校各五十兩護軍各二十兩披甲者各十五兩車騎營兵各二十兩戊午命議敘辦解騾匹各官并增給官價上諭內閣曰前因備辦軍需令直𨽻山東河南山西等省採買騾匹運送糧餉今直𨽻山東解京之騾俱屬臕壯則地方官之採買辦理實心效力可知著查明各地方官採辦之多寡及肥腯之髙下分别等次交部議敘以示嘉奬其解送之員一併酌量議敘從前議定每騾一頭給與官價十二兩今所解騾匹甚好諒官價及每日喂養準銷之銀必不敷用著據實報明於本省存公銀兩內給發但不得借此恩旨滋浮冒之弊著該督撫公平辦理後不為例其河南山西二省所辦騾匹解交陜西者著嶽鍾琪驗看據實具奏若能如解京之辦理妥協亦著一體加恩壬戌命速行恤賞陳亡官兵等并豁免預借銀兩上諭內閣曰自本朝開國及平定三藩廓清朔漠以來褒忠録功之典最為優渥凡文武官辨兵丁之效力行間著有勞績及臨戎致命遇敵受傷者皆赤心報國之人朝廷沛澤加恩惟恐不速乃近年以來部臣辦事遲緩因循往往因一二事之駮查遂將衆人恤賞之典俱致淹滯即如陜甘川省從前攻𠞰南川北川青海桌子山等處之文武官辨兵丁已經查核明晰應行恤賞議敘祇因青海等處功加册結內有原任巡撫王景灝同知張梅革職離任所造册結無印可鈐部議駮查以致南川等案恤賞之處一併稽延經朕察訪而後知之夫官辨例應議敘者不得早沾國恩固為不可而陳亡受傷人等遲至數載之後尚未邀帑金之賜尤可憫惻著該部速行恤賞議敘嗣後凡有出兵加恩之案其中若有應行駮查者止將應查之人扣除俟查明補給不得因一二人之行查而稽遲衆人應得之恩典將此永著為例又如從前進藏出征之官辨兵丁若有預借銀兩而本身陳亡或在軍中受傷病故者除照例恤賞外其所預借銀兩槩免追還六月丁丑命封索諾木達爾扎為輔國公達賴喇嘛之父索諾木達爾扎奉表貢方物理藩院以聞得旨索諾木達爾扎乃達賴喇嘛之父指教達賴喇嘛學習經典保護達賴喇嘛勤勞多年西藏之事毫不干預甚屬可嘉著封為輔國公癸未諭怡親王等密辦軍需事宜寧逺大將軍川陜總督公嶽鍾琪専辦西路軍務嶽鍾琪疏言噶爾丹策零三世弗庭百夷被虐天怒人怨衆叛親離我聖祖至德洪慈再三寬宥皇上深仁厚澤屢欲矜全而終不悛悔猶復肆其猖狂不道之語見於表箋若不大彰天討則冠履之分不明番夷之禍不息臣仰承廟謨至周極備約舉王師之十勝決逆酋之必敗一曰主德二曰天時三曰地利四曰人和五曰糗糧之廣備六曰將士之精良七曰車騎營陳之盡善八曰火器兵械之鋭利九曰連環迭戰攻守咸宜十曰士馬逺征節制整暇又加以期日之寬舒機宜之詳密凡此勝略咸出聖心臣得效奔走微勞便成殊績惟兾指日蕩平獻俘奏凱以報國恩奏入得旨準噶爾世濟凶頑心懷叵測將來必為蒙古之巨患貽國家之隱憂是用發兵聲罪致討上承先志下靖邊陲師出有名事非得已兩路軍機朕籌算者久矣其軍需一應事宜交與怡親王大學士張廷玉蔣廷錫密為辦理其西路辦理事宜則専於總督嶽鍾琪是任王大臣等小心慎密是以經理二年有餘而各省不知有出師運餉之事今覽嶽鍾琪摺奏備陳十勝之情形軍務所關重大朕不敢預言其必然惟有倍加敬謹仰懇上天皇考鑒照不得已之情垂慈默佑早奏膚功而已命賞兖州右營車兵李中倫靖邊大將軍公傅爾丹奏言兖州右營車兵李中倫拾銀二封既而訪知為北樓營車兵韓吉玉所遺請歸之吉玉願以金歸中倫中倫堅辭不受應加奬賞奏入得旨講讓興亷最為美俗而師旅出征尤以人和為貴今李中倫拾取遺金知為恩賞軍士之物即時稟知該管將辨情願給還本人似此見利思義同心同力之忱悃甚屬可嘉著賞銀六十兩以示嘉奬並傳諭內外直省兵丁等果聞風慕義共登善行必仰蒙上天之賜同受國家之恩矣命賞總理西藏事務副都統馬拉銀二千兩協理西藏事務西寧總兵官包進忠銀一千兩整裝乙酉命蠲免甘肅四川等處額徵錢糧上諭內閣曰朕愛養黎元遐邇一體而邊逺之地小民家計不及近省尤朕心之所繫念數年以來甘肅四川雲南貴州廣西五省有用兵西藏及𠞰撫苗蠻等事其一應軍需皆動用公帑備辦秋毫不派及於民間而糧餉轉輸亦有資於民力今藏地苗疆俱已寧謐朕心嘉慰特沛恩膏著將庚戌年甘肅四川雲南貴州廣西額徵地丁銀兩悉行蠲免其西安各屬地方近日亦有預備軍需之事朕心軫念著將庚戌年額徵錢糧蠲免十分之三此六省督撫大吏宜仰體朕心轉飭所屬有司敬謹奉行務使閭閻均霑實惠如有奉行不力被不肖有司暗飽私槖或姦胥土棍強紳劣襟包攬侵蝕者經朕訪聞必將通省大小官員分别從重治罪至於國家設官本以理民官有恤下之責民有奉上之義若設官而不為計及養亷之資則冇司之賢者將窘迫而莫能支不肖者又橫取而無所檢是以酌定將錢糧耗羡均給各官此揆情度理上下相安之道但思加恩百姓豁免正賦若將耗羡一併蠲除是民雖邀額外之恩而官員轉有拮據之苦上司或因此稍有寬假則必致巧取苛索於民流弊種種轉多於耗羡之數於吏治民生均無裨益著於庚戌年為始凡遇特恩蠲免錢糧者其耗羡仍舊輸納諒必民所樂從若因水旱蠲免者不得徵收耗羡將此永著為例乙未命靖邊大將軍傅爾丹等出師北路上御太和殿命大學士公馬爾賽蔣廷錫捧敇印授靖邊大將軍公傅爾丹大將軍率出征各官等行禮畢上還宫申時上率大將軍副將軍參贊大臣及在京諸王貝勒貝子公內大臣大學士都統尚書等詣堂子行禮次鳴螺兵部設大纛復於纛前行禮東長安門外設黃幄上御幄大將軍副將軍參贊大臣等咸佩弓矢跪辭上親解御用數珠賜大將軍公傅爾丹大將軍行跪抱禮副將軍參贊大臣等各以次行跪抱禮上諭大將軍等曰爾等此去和衷共濟速奏膚功凱旋時朕當出郊勞師爾等勉力大將軍公傅爾丹奏曰臣等蒙皇上訓諭周詳務期同心協力迅掃氛塵仰答恩榮奏畢上親視大將軍等上馬啓行還宫是日於德勝門外列兵處賜宴命王大臣授大將軍副將軍茶酒禮部兵部大臣授參贊大臣茶酒侍衛授出征各官茶酒禮畢大將軍等望闕謝恩辛丑增設噶達等處駐防兵川陜總督嶽鍾琪奏言乃者噶達建廟以居達賴喇嘛設兵守護尤要現在化林協有兵千人請留兵三百駐化林坪更設都司一員千總一員把總二員彈壓之移兵二百駐打箭爐令化林守備領把總一員分防以五百人移駐噶達令化林副將領把總二員再設一中軍都司一千總令赴噶達防護至噶達外雅籠江上中下三渡並要隘請設二千總各率兵百人分守上下二渡設一守備率兵二百守中渡又噶達之西吹音堡亦屬雅籠江渡口設一千總率兵百人分防化林所屬舊有黎雅峩邊二營今既移兵駐噶達可就近移黎雅營屬建昌鎮峩邊營屬永寧協嗣後有自藏來噶達者令西藏噶卜倫給發圖書路引以便稽察議政王大臣等議悉如所請奏入上從之壬寅增設陜西河州協逰擊一員千總一員把總二員兵八百名駐劄薩喇把總一員兵八十名與舊所設守備同駐保安堡並屬西寧鎮管轄從川陜總督嶽鍾琪請也秋八月辛酉命蘇圖暫行來京候旨上諭兵部曰寧夏副都統蘇圖現領寧夏兵丁前往軍營著伊暫行來京候旨其寧夏兵丁著副都統舒楞額馳驛速往暫行管轄俟蘇圖到時著舒楞額回京九月乙亥議敘平定青海功陜西在事官兵等進階賞恤有差戊寅命免甘肅西寧大同厯年倒弊駝隻應賠銀兩己丑命免寧夏等處及嘉峪關外各衛所額徵本色上諭內閣曰年來用兵西藏𠞰撫苗蠻一切辦理軍需皆動支公帑而糧餉轉輸不無資於民力朕心深為軫念是以降旨將甘肅四川雲貴廣西五省庚戌年地丁錢糧全行豁免查甘屬河西之寧夏西寧甘涼四府及肅州以至嘉峪關外之靖逆赤金柳溝等衛所厯年額徵俱係糧料草束與各省額徵折色無異今當用兵之際雖絲毫不派及民間而黎民踴躍急公之意大將軍嶽鍾琪屢次奏聞甚屬可嘉著將額徵本色加恩豁免以示惠愛邊民之至意十月甲寅命西安將軍常色禮移駐涼州以署川陜總督查郎阿兼理西安將軍印務命護送準噶爾使臣特磊赴京寧逺大將軍嶽鍾琪奏言噶爾丹䇿零使臣特磊於十月初五日至洮賚大坂斥堠翼日臣令理藩院員外郎黑色引至巴里坤軍營據特磊云噶爾丹䇿零已令人執送羅卜藏丹津至伊勒布爾和碩遇蒙古逃人云總督今率兵二萬徑出哈密問罪是以仍歸羅卜藏丹津於伊犁輕騎齎摺而至臣以特磊之言未可深信遣參將劉廷琰等送特磊至肅州謹加防範奏入得旨著劉廷琰伴送特磊赴京丙辰喀爾喀扎薩克多羅郡王達瑪林多爾濟遲悮軍需駝隻命黜其爵戊辰命加靖邊大將軍傅爾丹寧逺大將軍嶽鍾琪為少保吏部尚書查郎阿寧夏將軍席伯為太子少保十一月甲戌定噶斯軍營事宜議政王大臣等遵旨議覆曰噶斯為準噶爾通青海西藏要口宜撥兵駐守已奉旨遣張廷棟葛森鼐滿岱傅寧等辦理軍需今酌定軍營事宜恭候欽定一撥遣官兵選京師八旗兵二百以前鋒參領護軍參領前鋒侍衛副護軍參領護軍校等二十四人領之選歸化城兵三百以參領佐領護軍校驍騎校等十人領之其科爾沁等四十三旗選兵一千以台吉都統副都統參領佐領驍騎校等領之青海等三十旗選兵千五百以台吉等領之其支給跟役口糧馬匹器械賞賚糧餉悉如路北大兵之例一定軍行日期八旗兵以明年正月歸化城兵以三月科爾沁青海等兵酌量於青草發生時遊牧而往一柴達木至嘉峪關其間應設臺站以遞文檄一噶斯地窄可駐兵百人餘並駐柴達木柴達木之西為得卜特爾駐兵六百又西為察罕烏蘇駐兵四百兩地水草足資遊牧所在聲援更聨屬矣奏入上從之丙子命加恩山西承辦軍需官民上諭內閣曰前因北路軍需須用駱駝鞍屉諭令山西地方製辦聞該省人民凡有羊毛繩料之家各出所有赴官領價工匠亦一時爭先應募共計二十餘萬件之物料工作不勞而集於月餘之內此皆該省大吏平日善於訓導民人其製辦器物雇募人工照數給與價值而該省民人又懷尊君親上急公趨事之心是以備辦軍需羣情歡躍尅期告竣甚屬可嘉巡撫石麟布政使蔣泂著交部議敘凡委派辦理之員亦著議敘再將該省辛亥年額徵地丁銀蠲免二十萬兩於辦理鞍屉之各州縣按畝均派使小民共霑實惠以示朕恩奬官民之至意尋山西巡撫石麟疏言軍前所需駝屉等物據士民等願自備車騾運送歸化城奏入得旨前因軍前需用駱駝鞍屉令晉省製辦三萬副該省人民急公趨事朕已降旨蠲免該地方辛亥年額徵銀二十萬兩以示嘉奬今因運送鞍屉該省士民等又復歡欣效力甚屬可嘉著該撫等傳旨奬諭仍令各領應得之腳價不必固辭己卯豫克什圖席伯世職上諭內閣曰管理阿爾台臺站內大臣克什圖寧夏將軍席伯俱係軍前效力勞績茂著之人著各賞給騎都尉世職丁亥以西北兩路大軍所至水泉效順命建廟祀之上諭內閣曰前據靖邊大將軍傅爾丹摺奏統領北路大兵出口已到阿爾台駐劄所過沙磧地方從來無水草之處今嵗青草暢茂清泉湧溢士馬飽騰且冬月天氣和暖清明衆心無不歡忭又口外料理臺站之內大臣克什圖來京所奏相同又據寧逺大將軍嶽鍾琪摺奏統領西路大兵出口已到巴里坤駐劄所過沙磧地方水草並無缺乏道途坦適天氣晴和軍旅歡忭以為神助等語自兩路大兵啓行以來邊塞長途深繫朕念仰蒙神明默佑士馬安寧且於沙磧從無水草之區顯賜靈應朕心實為感慶應於北路西路各建廟宇虔誠展祀以答神貺戊子命兵部尚書查弼納等往陜西督理軍需諸務上諭內閣曰西路軍需前經寧逺大將軍嶽鍾琪悉心經理籌畫周詳一一妥協今嶽鍾琪領兵出口乃地方巡撫大吏有司之専責自應竭力遵照辦理而許容在任凡事推諉馬會伯但以潔已為務不肯擔荷查郎阿武格又係新任諸凡未諳上司屬員彼此猜疑推卸明年乃進兵之期關係最為緊要伊等之身家性命猶其小者耳應命在京大臣前往稽察督理方於軍務有益著兵部尚書查弼納往陜總理稽查軍需諸務常德夀常賚俱著各給印信並令乘驛往來遇有分辦之處即分任其事仍聽查弼納調度凡關係軍需事件俱著查弼納等相機派委該督撫料理其有應行續辦者即令地方官動支錢糧辦理奏聞若地方官有侵欺擾民者一靣革職拿問一靣奏請審擬其怠忽遲延者自督撫以及文武官辨俱著即行題參如有指稱軍需名色擾纍民間之棍徒胥役著即題請正法己丑都爾伯特扎薩克固山貝子巴圖卒以其子班珠爾襲爵乙未命支官帑糴屯田餘榖署川陜總督查郎阿疏言安西沙州等處募民屯墾計二千四百有五户所種小麥青稞粟榖糜子等物每種一斗約收三四斗其餘雜植並豐阜家給人足歡欣樂業臣恐口內囤户姦民興販射利已嚴加糾察禁止並諭民户按一年所需存貯外餘即糶諸本地以濟兵丁商民口食奏入得旨安西屯墾地畝今年人力既勤天時復稔各種糧榖俱獲豐收朕心深為慰慶今查郎阿禁止姦徒興販射利辦理甚是惟是飭令民户多餘之榖只許在本處糶賣尚未妥協朕思民户盈餘之榖原期糶價以為日用之資若本地糴榖者少則出糶未免艱難不可不為計及著該地方官酌量本地情形不必相強若有將盈餘之榖情願出糶者著動支官銀照時價糴買存貯公所明年倘有需用之處聽辦理軍餉之大臣及該督撫行文支撥安西現有備用銀兩即可動用採買再於西安藩庫撥補還項此朕體恤民户俾糶榖得價用度豐裕之至意著地方官善於奉行不可勒令糶賣生事滋擾青海厄魯特扎薩克輔國公策凌卒以其子塞卜騰達什襲爵十二月辛丑晉封哈密鎮國公額敏為固山貝子丁未命鄂善赴涼州上諭兵部曰鄂善著前往涼州協同秦布辦理事務其駐劄大原兵丁著石麟暫行管理戊申命免進藏各官借支庫銀上諭內閣曰康熙五十九年陜西解送駝馬進藏文武官五十員每員借支肅州公庫銀五百兩為行裝路費之資本係應給之項因當時該督撫未經題報不敢作正項開銷是以各員回陜之時仍於各名下著追補項至今尚有未完銀一萬六千八百兩朕念伊等效力戎行逺涉藏地雖非衝鋒破敵者比而間關行役亦屬可憫著將未完銀兩槩行豁免其已完者悉給還本員或交伊之的屬如該員有别項虧欠應追者即準其抵補以示優恤勞役之意己酉振武將軍順承郡王錫保奏報鄂爾昆濟爾瑪台圖拉三處屯田收穫大麥小麥糜子共七千五百五十石有竒奏入得旨下部知之己未議敘進𠞰桌子山棋子山青海等處功前涼莊道升任山西布政使蔣洞等各加級紀録有差已故西寧道趙世錫等各豫一子入監讀書尋復豫陳亡遊擊姬登第署守備張先志王伏金祭葬如例千總施進祿傅瑾把總賀奉金陳昌王谷弼楊之連等各祭一次又喀爾喀扎薩克台吉巴爾漢等賞賚有差平定準噶爾方略前編卷十九
