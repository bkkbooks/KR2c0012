body:
  text: 雍正八年春二月戊辰命緩安西沙州等處屯田升科上諭陜西總督巡撫等曰安西沙州等處招民屯墾原為惠養邊民之計是以纍年以來備極籌畫經營期其得所今從雍正六年民户到齊之日計算至辛亥年例當輸賦之期但念小民甫經安插公私兼顧為難著寬期二年於癸丑年升科俾民力寬裕俯仰有資以副朕格外加恩之至意三月甲戌命西藏辦事內閣學士僧格率兵一千五百至騰格里淖爾駐防五月丁丑召西北兩路大將軍等赴京籌議軍務上諭大學士等曰準噶爾噶爾丹策零藏匿負罪潛逃之羅卜藏丹津抗違國法因特發兩路大兵聲罪致討期於今年進發直搗伊犁今噶爾丹䇿零遣使特磊奉表陳奏謂已將羅卜藏丹津解送天朝因聞進兵之信暫行中止若天朝俯念愚昧赦其已往即將羅卜藏丹津解送等語朕欲將特磊遣回并差大員至準噶爾諭以受封定界敦族睦鄰速將逃匿送出伊若一一聽命朕當寬宥其罪其進兵之期暫緩一年俟特磊起身之後著寧逺大將軍嶽鍾琪靖邊大將軍傅爾丹參贊大臣陳泰蘇圖來京其靖邊大將軍印務著副將軍巴賽護理并令署振武將軍順承郡王錫保就近協理所有應行事宜著馬爾賽張廷玉蔣廷錫等詳議具奏尋議曰靖邊大將軍傅爾丹至京約在九十月間應令行文寧逺大將軍嶽鍾琪先後偕來會同籌議奏入得旨兩路大將軍於九月間起身來京則到京之期已在冬底未免太逺著兩路大將軍在九月十五日前後到京現今差侍郎杭奕祿衆佛保同特磊往諭準噶爾嶽鍾琪俟特磊回過軍營之後即將起程日期知會傅爾丹酌定起程靖邊大將軍印務已命副將軍巴賽等護理寧逺大將軍印務應令何人護理著嶽鍾琪奏聞其陳泰所統官兵著查克旦署理蘇圖所統官兵著舒楞額署理再著副都統圖克善黑色前往軍營交與傅爾丹酌量派管軍營事務乙未命各路兵擇所在便宜駐劄上諭理藩院曰前往嶽鍾琪處額駙阿寶帶領該旗兵五百名目今行至何處著行文阿寶即於彼處駐劄候旨綽本帶領鄂爾多斯兵五百名亦著行文綽本就近揀水草佳處駐劄候旨此一千兵著行文詢問大將軍嶽鍾琪或今年調往巴里坤或俟明年進兵之前調往二者孰為有益並兵丁錢糧足與不足俱著大將軍嶽鍾琪定議具奏再派往噶斯之京城兵歸化城兵共五百名此時將及到彼著格默勒帶領在噶斯駐劄富寧亦著前往噶斯與格默勒一併管理達鼐著來西寧仍與鼐滿岱辦理事務所有扎薩克蒙古等兵著交與達鼐管理或在西喇塔拉地方或在從前額駙阿寶奏請駐劄之烏蘭穆倫等處相視形勢駐劄俟明年文到之日前往噶斯其青海之一千五百兵相近噶斯今年只在各遊牧處預備亦俟明年文到之日前往噶斯達鼐既到噶斯管理之後富寧著回西寧辦理事務秋七月壬申調鄂爾多斯青海蒙古兵一千赴軍寧逺大將軍嶽鍾琪遵旨議奏請調鄂爾多斯青海蒙古兵撥往牧馬者一千人於今年赴軍營大學士等議覆應如所請奏入上從之戊寅暫撤學士僧格等巡防兵議政王大臣等議奏學士僧格貝子頗羅鼐所領巡防兵應令於降雪後撤回俟明年進兵仍往騰格里淖爾駐劄奏入得旨今年大兵既停進發著行文與僧格等令伊等酌量於未降雪之前撤回明年著僧格仍舊帶往其緑旗官兵照今年賞給之例賞給再發銀一萬兩著頗羅鼐明年酌量賞給唐古忒等之兵八月甲辰寧逺大將軍嶽鍾琪奏報赴京日期嶽鍾琪奏言奉使大臣杭奕祿等於八月初四日擕特磊至軍臣遵旨責以大義惕以軍威觀特磊等情狀若誠心感悟者即於八月初六日遣特磊還所有寧逺大將軍印務遵旨交提督紀成斌護理隨印侍郎顧魯協辦臣於初八日就道赴京已咨會靖邊大將軍傅爾丹奏入報聞是冬嶽鍾琪與傅爾丹並入京陛見壬申喀爾喀扎薩克多羅郡王旺扎爾遲誤軍需駝隻命黜其爵丁亥上諭兵部曰周瑛著發往北路大將軍傅爾丹軍營效力贖罪北路軍營總兵官魏麟約束不嚴命罷之冬十月己亥寧逺大將軍嶽鍾琪奏報巴里坤圖古里克等處屯田收穫青稞凡一萬一千六百石有竒奏入得旨下部知之辛丑賞吐魯番效力回人上諭內閣曰據寧逺大將軍嶽鍾琪奏稱吐魯番回目額敏和卓屯田種地恭順效力甚屬可嘉朕聞之深為喜悅額敏和卓賞緞二十匹其種地效力之回民賞銀二千兩著提督紀成斌差遣辨員前往吐魯番會同額敏和卓秉公賞給以示朕加恩外番之至意癸卯命總理西路軍需尚書查弼納來京上諭大學士等曰尚書查弼納著馳驛來京西路軍需著查郎阿前往肅州辦理仍兼理川陜總督印務秦布著回西安將軍之任護軍統領宗室哈爾吉著前往涼州代秦布統領兵丁仍著鄂善協理乙巳寧逺大將軍嶽鍾琪奏報哈密塔勒納沁等處屯田收穫麥青稞凡四千六百石奏入得旨下部知之己酉命原久辦軍需各員之小過應劾者上諭內閣曰辦理軍需必得熟練之員方為有益陜甘二省州縣官員備辦軍需有經手數年者有經手一二年者似此熟練人員若因細過微瑕即行參革則接任之員初辦軍務未免生疏或至遲誤嗣後陜甘地方辦理軍需之州縣官員若無大過其所犯情有可原者著該督撫撥情度理量加寬宥若錢糧微有不清而事屬因公者統俟大軍凱旋之後查核明白以定功過辛亥命兵部尚書查弼納為北路副將軍上諭大學士等曰兵部尚書查弼納著為副將軍命往北路與靖邊大將軍傅爾丹副將軍巴賽辦理軍務副都統德祿著往北路軍前與隨印之內閣學士永國辦事副都統馬爾薩著授為內大臣與陳泰蘇圖海蘭參贊軍務戴豪衮泰石禮哈不必參贊軍務舒楞額不必來京著前往振武將軍處代馬爾薩辦事黑色圖克善俟大將軍到營著令來京石禮哈不暗滿州軍營事務著管緑旗兵丁但不可膺統轄之任著大將軍等酌量派委壬子命酌留帑銀貯府州庫以備軍需上諭內閣曰向因大興宛平二縣近在輦轂之下常有速辦之公事不得不那移庫銀以濟用而上司察知每以虧空題參至於罷斥治罪實為可憫用沛特恩於大宛二縣各發庫銀一萬兩存貯該縣倘遇有速辦之公事準其詳明府尹動支應用此朕體恤有司之至意也近思辦理軍需之州縣其急切應付之處不容刻緩而該州縣並無存貯備用之項若擅動公帑又干嚴譴有司實處兩難不可不為籌及朕意欲於辦理軍需及事務繁劇之州縣亦倣大宛之例酌留帑銀以備急切公事之用其如何舉行俾辦公有賴而弊竇不生著大學士會同大將軍嶽鍾琪總督髙其倬悉心定議具奏尋議曰嗣後辦理軍需之省計其事之繁簡留銀三十萬或二十萬兩其事簡而地饒者留銀十五萬或十萬兩令督撫布政使發各府及直𨽻州貯庫所屬州縣有軍務急需即時請給其相距遼濶而事不容緩者許一靣申請一靣先於本庫支用俟給發後補還仍令按事報銷督撫布政使嚴為稽核奏入上從之丁巳命舉陜西出征將佐署任者上諭內閣曰陜西副將參將等官派令出征者甚多其員缺俱須另員署理而本省辨員各有辦理之事難以兼顧著大將軍嶽鍾琪於直𨽻山西兩省參將逰擊內有平日知其才具可用者舉出具奏候朕酌量命往陜西以備委署之用其直𨽻山西之缺著該上司遞行委署再將來引見武辨時著兵部奏明有可勝陜西之任者朕酌量命往壬戌以正紅旗護軍統領宗室哈爾吉為右翼前鋒統領仍留涼州辦理軍務十一月丙子振武將軍順承郡王錫保奏報鄂爾昆圖拉濟爾瑪台等處屯田收穫大麥小麥糜子凡六千六百五十石有竒奏入得旨下部知之壬午改設近邊郡縣寧逺大將軍嶽鍾琪奏言設立近邊郡縣事宜一陜西延安府屬榆林靖邊神木三廳轄沿邊三十堡除神木同知所轄東十堡已改屬州縣外其榆林同知所轄中十堡靖邊同知所轄西十堡番漢雜居必用大吏彈壓請改榆林廳為府以知府領之府屬設照磨一員并設榆林靖邊定邊懷逺四縣縣設知縣典史各一員改榆林衛教授為府教授榆林靖邊衛訓導為縣訓導其定邊懷逺二縣學即以綏德膚施二縣訓導改設並𨽻榆林府一榆林既增置郡縣足資分理其舊設榆林靖邊同知及波羅州同知威武鎮靖巡檢榆林廣育倉大使悉請汰之惟留神木同知以司糧捕一榆林道舊轄延安綏德鄜州等處今榆林既改為府請改神木道為延綏道移駐綏德州轄延安綏德鄜州等處其新設榆林府及延綏道所屬直𨽻葭州吳堡府谷神木諸州縣悉改𨽻榆林道吏部議覆悉如所請奏入上從之壬辰軍營八旗兵請仍留駐防許之署振武將軍順承郡王錫保奏八旗駐防官兵具言軍營效力兩年一切巡牧諸事皆已習練願仍留駐防以俟大兵凱旋不必三年更代如例奏入得旨此奏甚屬可嘉著照官兵所請行種地緑旗官兵仍照舊更換十二月丁酉靖邊大將軍傅爾丹自京赴北路軍營戊戌命增給嘉峪關營汛兵丁折支米豆草束銀兩上諭兵部曰前因口外用兵哈密為軍需往來之地特準大將軍嶽鍾琪之請將駐防兵丁口糧鹽菜加恩增給又準署總督查郎阿之請將肅鎮兵丁折支米豆草束銀兩各行增給總以肅州哈密一帶地方兵馬往來物價未免昂貴故加於常格之外也今思嘉峪關在肅州哈密之間其地苦寒所需兵糧皆從肅州轉運事屬一體其營汛兵丁折支米豆草束之價俱著照肅鎮之例米豆每石加銀五錢每草一束加銀一分其加增之期亦照肅鎮補行給發以示朕軫恤之至意壬寅寧逺大將軍嶽鍾琪自京赴西路軍營乙卯準噶爾賊人潛入科舍圖卡倫盜駝馬我西路兵擊敗之命北路並嚴防禦護理寧逺大將軍印務紀成斌奏報準噶爾賊人率醜類二萬餘乘我西路不備犯科舍圖卡倫來盜駝馬總兵官樊廷副將冶大雄等率兵二千轉戰七晝夜力保兩卡倫與總兵官張元佐等合擊殺賊無算盡奪還所盜馬駝奏入得旨所奏逆夷盜趕駝馬情形大學士等可傳諭靖邊大將軍傅爾丹參贊陳泰蘇圖令其行文副將軍巴賽等駐牧和博克薩里之逆夷或遣賊衆至北路卡倫偷盜駝馬亦未可定宜小心防範不可疏忽亦不可聞信矜張務宜鎮靜嚴密萬全無弊傅爾丹等亦速馳赴軍營斟酌妥辦丁巳命以撫逺大將軍印授嶽鍾琪於途中辦理軍務上諭大學士等曰大將軍嶽鍾琪從西安由肅州前赴軍營途中有調撥兵丁辦理軍務之處須用印信行文前所頒寧逺大將軍印信留在軍營今特將撫逺大將軍之印遣員賫送交與大將軍嶽鍾琪領受大將軍未到軍營以前一切行文俱用撫逺大將軍印既到軍營以後仍用寧逺大將軍印將撫逺大將軍印繳回并著大將軍嶽鍾琪接到諭旨印信之日通行所屬知之撥各路兵赴涼肅等處上諭大學士等曰涼州駐防滿洲兵丁一千名著右翼前鋒統領宗室哈爾吉原任都統鄂善帶領前往肅州再著西安將軍秦布在西安駐防滿洲兵丁內挑選一千名交與副都統僧保張正文帶領前往涼州駐劄再撥涼州緑旗兵丁一千名令山西太原總兵王緒級馳驛前往帶領赴肅州太原總兵印務著李如柏署理宣化總兵印務著三屯營副將髙宏棨署理固原提標兵丁或撥一千名或撥二千名令大將軍嶽鍾琪酌量調撥京營副將張存孝著加總兵銜馳驛前往肅州聽大將軍委署統理寧夏將軍印務著刑部侍郎常賚署理寧夏兵丁著預備一千名俟有調撥之處著副都統卓鼐統領前往此各路所派辨兵及統領之員俱聽大將軍嶽鍾琪調度節制其辦理軍需署肅州總兵印務馬會伯亦聽大將軍派委張存孝著賞內庫銀二千兩僧保張正文卓鼐王緒級各賞銀一千兩其調撥西安涼州滿洲及固原提標涼州鎮標各官辨照例賞給二年俸銀馬兵每名賞銀三十兩步兵每名賞銀二十兩寧夏官兵若有調撥之處亦照例賞給戊午選募勇健上諭大學士等曰固原甘涼等處兵丁有調撥派遣之用沿邊地方所關緊要著大將軍嶽鍾琪署總督查郎阿作速行令各該提鎮於固原涼州甘州寧夏西寧等處人民內挑選漢仗勇健弓馬嫻習者招募充補兵額其衝要之處於原額之外各添設數百名以備調遣命撥諸路兵調提督副都統等官赴陜西駐防上諭大學士等曰噶斯地方現有滿洲及歸化城兵丁五百名格默勒等帶領防守其從前派出之青海兵丁一千五百名亦著前往令格默勒等分派駐劄於額爾貢穆柴達木等處其扎薩克之官兵著移駐額駙阿寶駐牧相近之處聽阿寶管轄如有準噶爾信息力能進𠞰著阿寶帶領前進倘力稍不足即著進邊協同緑旗官兵防守又諭曰直𨽻古北口提督范時捷著署理陜西固原提督即速來京請訓馳驛前往福建陸路提督石雲倬廣東潮州總兵馬紀勳著前往陜西肅州到大將軍嶽鍾琪處有辦理之事又諭曰江寧將軍鄂彌達在滿洲駐防兵丁內揀選一千名令副都統阿克山帶領前駐西安駐防再著副都御史二格由京前往統領之此派出兵丁著該督撫動支公用銀每人賞給三十兩其應派官員著鄂彌達酌量派出每員各賞給一年俸銀於司庫動用銀兩支給二格著賞內庫銀三千兩阿克山著該省督撫於公用銀兩內各行寬裕幫給再撥河南滿洲駐防兵五百名著副都統職銜城守尉白清格帶領前往西安駐防撥山西太原滿洲駐防兵三百名著城守尉覺羅察庫帶領前往寧夏駐防此二省派出官員每人各賞給一年俸銀其兵丁各賞給銀三十兩於司庫支給官員等照例給與馬匹兵丁等於每人給三馬之外酌量增給其河南城守尉印務著總督田文鏡兼管另派參領一員轄理兵丁太原城守尉印務著巡撫石麟兼管白清格察庫啓程該督撫各行寬裕幫給辛酉定調撥兵馬糧運事宜上諭大學士等曰據查郎阿奏報肅州存營馬兵祇三百名守兵祇四百名協防之兵更不可少已飛咨都統鄂善於涼州駐防滿洲兵內派兵五百名遴委協理一員統領星赴肅州駐劄再甘涼提鎮二標馬步兵丁除原派出兵并現調應援外存營兵丁亦有汛防之責如或另有調遣不便再於二標派撥等語查郎阿於涼州駐防滿洲兵丁僅撥五百名者想因未見朕另撥西安駐防滿洲兵丁一千名之旨所以不敢全撥應仍遵前旨令哈爾吉鄂善作速帶領兵丁前往肅州其涼州緑旗兵丁俟王緒級到後方行帶往此時諒未起程今或仍可將涼州前派之兵令王緒級帶領往肅或於查郎阿調甘待撥之寧夏兵丁內令王緒級帶領一千名往肅著大將軍嶽鍾琪署督查郎阿酌量妥辦至查郎阿所奏摘撥馬匹陜甘各處營馬雖有一萬八千餘匹可供摘撥然營馬亦屬緊要著將上駟院之馬一千七百匹解送至西安交與巡撫武格分發喂養其摘撥四省營馬與採買之馬著嶽鍾琪查郎阿先酌定應交與何處收牧即速行文知會各省文到之日再行解送至所指之處交收再查郎阿奏請西寧糧米撥運肅州一條西寧地方實關緊要存貯米粟不可輕動可令查郎阿知之將爾等所議馬匹糧運一摺查郎阿三摺俱録寄大將軍嶽鍾琪令其斟酌而行將此傳諭大將軍嶽鍾琪總督查郎阿知之壬戌命西北兩路軍營議築城駐兵上諭大學士等曰準噶爾乘我不意傾其賊衆盜趕馬駝狡獪凶惡罪無可赦但西路所存駝馬不無疲乏是從前所議直搗伊犁之計尚非萬全之道朕意欲於西路巴里坤北路之卡倫外各築一城以重兵駐劄時出逰兵以掩擊其衆擒虜其人畜賊兵必撤其遊牧之所逺行藏退我當更進數百里擇地築城開墾屯種以資軍食駝馬牛羊無事牧放有事則盡收入城賊衆既無所獲我軍一出可以襲取其輜重且賊必不敢踰我軍駐劄之城而東矣著嶽鍾琪詳悉定議北路傅爾丹處亦詳細密商之甲子命停喀爾喀兵往卡倫上諭大學士等曰自有軍務以來喀爾喀等甚為出力來嵗大兵進𠞰之時所有派在卡倫預備之二千名喀爾喀兵丁不必前往俾其得以照管牲收著派出內扎薩克之兵二千名前往卡倫駐劄令科爾沁部王羅卜藏喇錫翁牛特貝子羅卜藏敖漢公羅卜藏總統管理此所派出之官兵照例加與恩賞防護阿濟必濟卡倫北路大將軍傅爾丹遵旨議奏曰臣等閲紀成斌所奏慮準噶爾賊人或分兵來犯阿濟必濟卡倫擾喀爾喀公通摩克及輝特公巴濟遊牧臣行文副將軍巴賽等選精兵二千令前鋒統領丁夀統之率副都統馬爾齊喇錫等以察哈爾喀爾喀兵現駐庫卜克爾者一千三百人往伊克斯淖爾附近駐劄防護阿濟必濟卡倫等處並令王格勒克雅木丕勒公通摩克達什達爾扎等率兵一千協丁夀駐劄令副都統阿三公達福率兵二千駐庫卜克爾以為應援奏入報聞平定準噶爾方略前編卷二十
