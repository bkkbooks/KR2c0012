  text: 欽定四庫全書平定準噶爾方略續編卷二十五
  hash: sha256:f5bc16b5c6b25a66460f56733fe5c76c8d91a56625398e16a8f485569795ee08
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_164-1a, image: WYG0359/WYG0359-0843c.png}
body:
  text: 乾隆二十九年夏四月癸未命定伊犂侍衛更換勸懲之例上諭軍機大臣曰明瑞等奏稱現在伊犂聽差侍衛六員除素尼勒圖一員係效力贖罪不在按期換班之內其餘五員皆三年屆滿應請照例更換再侍衛六員內其三員係奏定額缺在京揀選餘三員請從索倫兵內挑選給以虛銜頂翎令在卡倫行走一年更換分别等次頭等照常行走二等摘去頂翎三等斥革等語素尼勒圖效力甫及二年無庸即為更換其侍衛額缺三員在京揀選發往及虛銜侍衛分别勸懲之處俱著照所請行乙未議撤巴里坤卡倫事宜巴里坤辦事侍郎鐘音等奏言查從前進兵巴里坤為軍需要滙故於西北山一帶安設卡倫以護守牧羣防範逋逃今大功告成巴里坤已成內地臣等勘得東至呼濟爾台西至鄂什希四百里間共設卡倫十八處此內有通烏里雅蘇台歸化城闢展烏魯木齊等處大路者有貿易人等行走尚須巡查其餘皆非要地應請將卡倫兵丁撤回本營差操以歸實用奏入得旨軍機大臣議奏尋議巴里坤地方現甚寧謐所有遣犯皆知耕作牧羣亦不虞偷竊應如所奏將現通大路之卡倫三處酌留其餘槩行裁撤其裁撤之都司把總等官亦歸本營以資管轄庶差操得收實濟而浮費亦可節省奏入上從之庚子諭伊犂將軍明瑞等優給新派厄魯特官員食俸上諭軍機大臣曰明瑞等奏稱伊犂現有察哈爾厄魯特官員辦事者俱照部咨給與全俸而陸續所派之察哈爾厄魯特止稱照前次派往之例發給並未聲明是否全俸近奉諭旨令將新派厄魯特官員俱照察哈爾例給與半俸辦理尚未畫一等語前次派往伊犂之厄魯特官員經軍機大臣議奏令照察哈爾例給與半俸並未將察哈爾辦事人員給與全俸世職人員給與半俸之處分别聲明是以諭令伊等至伊犂時一體給與半俸今詳閲明瑞等所奏及軍機大臣原議俱未明晰朕思現在伊犂之厄魯特官員業已給與全俸自不便無故裁減至新派之厄魯特官員亦俱歸附有年情願效力之人不應止給半俸著傳諭明瑞等將厄魯特五百戶內所有辦事及世職官員俱照察哈爾之例分别給俸於伊犂生計更有裨益并著傳諭烏爾登曉示厄魯特等知朕格外加恩之意伊犂將軍明瑞等疏奏巴爾托輝築城造房事宜明瑞等奏言前臣等將遷來伊犂回人三千二十戶交阿竒木公木薩派往各處屯田惟令於巴爾托輝築一小城仍以伊犂河北固勒扎城為總滙蓋因回人素性愚昧安插甫定又事版築未免妄生疑懼是以姑緩籌畫今據木薩呈稱詳詢回人俱稱巴爾托輝地方泉甘土肥情願出力築一大城移往駐劄臣等詳勘形勢如回人所種之地稍遷迤西可空出摩垓圖阿里瑪圖兩處水泉為滿洲兵丁屯田之用且伊犂哈什二水之間築一大城駐劄回衆則聲勢愈覺聨絡而於回人生計亦甚有益嗣後即再添人一二千戶亦自可容無須另辦請將伊犂河南海努克之二百戶河北固勒扎一千九百戶內之八百戶仍在原處駐劄其河南和濟格爾之二百戶河北固勒扎之一千一百戶巴爾托輝之七百二十戶并續派呼倫貝爾兵丁一百戶共計二千一百二十戶俱令其駐劄巴爾托輝於今年屯田之暇先造住房明年再行築城奏入報聞丙午以私逃回人不應遣歸本籍訓飭伊犂將軍明瑞等上諭軍機大臣曰額爾景額奏稱明瑞等因派往伊犂屯田回人端索丕中途逃走即將回人阿卜都喇伊木補缺以端索丕之妻配給將端索丕發回葉爾羌移咨前來端索丕係私逃之人今仍遣回葉爾羌恐回人等相率效尤不足示懲請將端索丕賞給伊犂兵丁為奴等語額爾景額所奏甚是端索丕逃回本籍一經拏獲即應重加責處或賞給兵丁庶足以昭炯戒乃遣歸故土遂其本意所辦殊出情理之外著將端索丕發往伊犂給兵丁為奴如再有逃匿生事之處即行正法明瑞等辦理未協著傳旨申飭嗣後諸務俱應加意妥辦科卜多參贊大臣雅郎阿疏奏賞給築城兵丁米石茶封雅郎阿奏言前因參贊大臣扎拉豐阿商辦築城事宜查屯田兵四百名內以二十名備造器具餘三百八十名除屯田外派出八十名築城又於屯田兵三百名內派出三十人協助本年即可完竣但喀爾喀兵丁俱依水草離修城之地稍遠每日往還飲食不免需時有誤工作請將烏里雅蘇台庫貯米石茶封賞給接濟則兵丁飲食有資可以早集晚歸既免往返之勞而城工亦得速竣奏入報聞五月甲寅諭喀什噶爾參贊大臣納世通以伊犂官兵被害非實曉示布魯特上諭軍機大臣曰據納世通等奏沖噶巴什布魯特阿瓦勒比稟稱去年伊犂有官一員帶兵七人至塔拉斯地方遇克特滿圖伯之布魯特盜竊哈薩克牲隻時當昏夜誤將八人殺害臣等隨交伯克噶岱默特差回人海連達爾往問沖噶巴什頭目車里克齊據云是布魯特尼沙比屬人所害又聞人言是瑪木特呼里所害已令阿竒木伯克素勒坦和卓等向尼沙瑪木特呼里遊牧索取戕害官兵人犯令其即行獻出從重治罪等語伊犂果有巡查官兵為外藩戕害明瑞豈有不知即知之豈不奏聞此事尚未可信納世通等遽行差人查拏殊屬鹵莽著傳諭納世通奉到此旨如所遣伯克尚未轉回即續派妥員將此事虛妄之處詳悉曉示令素勒坦和卓等速回議烏里雅蘇台修城及添派兵丁事宜軍機大臣奏言據成衮扎布等奏烏里雅蘇台舊城年久傾圯應行修築其工作等項請添派緑旗兵一百名前往等語查科卜多現在城工所撥緑旗兵一百名即係烏里雅蘇台派出至該處舊城傾圯請動工修築於收貯錢糧實為有益該處只有兵六十名看守倉庫尚屬不足自應酌復原額以資差遣其派出緑旗兵丁一百名於宣化大同等處調取奏入上從之乙卯命分别護送察哈爾兵丁等官員議敘議處上諭軍機大臣曰明瑞等奏稱此次解送伊犂之察哈爾兵丁五百名所帶牲隻有駝馬全未損傷及馬匹倒斃未至一分者又有倒斃雖至二分其餘皆臕壯者請將該員等議敘其倒斃牲隻之數尚未踰額總管成果應否議處請旨遵行等語著照所請將佐領巴里瑪特等交部議敘佐領巴圖蒙克等交部議處總管成果著免其交議伊犂將軍明瑞等疏奏布魯特訛傳官兵被害情形明瑞等奏言四月初十日據納世通等咨稱聞沖噶巴什布魯特等傳聞伊犂官兵八人被害等語查官兵果被戕害自當領兵進勦但現在並無此事惟去年伊勒圖巡查邊界回營告稱行至吹地方曾派三等侍衛品圖庫領兵十名前行遇布魯特數人將察哈爾兵丁一名用鎗刺透皮襖品圖庫等往擒布魯特見其頂翎即下馬叩首告稱實係悮認為哈薩克人懇求免罪彼時因察哈爾兵丁並未傷損遂釋放遣回臣以此事尚無甚關係是以未經具奏奏入報聞丙辰命治委署筆帖式雙官保疏脫逃犯之罪仍務獲逃犯正法上諭軍機大臣曰據卞塔海奏自伊犂解送葉爾羌之脫逃回人端索丕至圖巴喇克台經委署筆帖式雙官保派兵李彬送交下站現在李彬端索丕俱無蹤迹請將雙官保革退委署職銜充當苦差俟拏獲李彬端索丕一併嚴審加等治罪等語雙官保解送逃犯違例止派兵丁一名以致復逃實屬不職著照所請辦理李彬俟拏獲時審明有無情弊定擬至端索丕兩次脫逃情罪可惡且李彬被其戕害亦未可定既係回人必然潛匿原處著傳諭卡塔海額爾景額速即查拏務獲審明正法示衆諭陜甘總督楊應琚遞奏尋常事件毋得動用驛馬上諭軍機大臣曰今日楊應琚奏到各摺俱係尋常事件並不關係軍機自可不由驛遞著傳諭該督新疆軍務久已告竣其善後事宜亦俱辦有成效嗣後凡遇此等奏摺止須委妥協辨役或家人等賫奏不得仍前動用驛馬致纍臺站戊午葉爾羌辦事副都統額爾景額等疏奏安插無業回人事宜額爾景額奏言據阿竒木伯克鄂對呈報有攜眷尋歸故土回人共一百八十餘名係前經霍集占之亂逃避遠出者此內葉爾羌回人七十三户伊等親屬尚存其餘一百餘戶係喀什噶爾英噶薩爾之回人查明並無自伊犂逃回等情臣等伏思此項回人聞聖主樂育之恩復歸故土應令仍於原處居住但伊等離散多年已無産業請給以田畝籽種仍仰體皇仁暫緩徴收租賦俾得經理生計奏入報聞辛酉以新疆取用銀兩不行轉咨飭諭巴里坤辦事侍郎鐘音等上諭軍機大臣曰據鐘音等奏稱納世通等以從前永貴等奏準取用銀三萬兩陸續支用僅存九千餘兩請於哈密巴里坤二處各送銀一萬五千兩備用隨以不能挪解咨覆等語喀什噶爾等處需銀原應楊應琚辦送若巴里坤存銀不敷鐘音等接到納世通咨文即應行知楊應琚今並不轉咨僅以空文塞責此皆外任推諉陋習鐘音溫敏著傳旨申飭仍傳諭楊應琚將應需銀兩即行辦理解送勿致遲悮癸亥喀什噶爾參贊大臣納世通等疏奏霍罕額爾德尼情形納世通等奏言臣等前遣回人阿克伯克等往問霍罕額爾德尼拘留阿濟比及私取鄂斯賦稅等事據額爾德尼遣努爾默特比稟稱奉到來文詞意嚴切懇求勿信布魯特等妄言等語又所具呈文內稱因阿濟比與鄂斯人等不睦代為和解至鄂斯布魯特等並無頭目恐其離散暫遣五十戶前往居住雖一普爾不敢私取其阿濟比呈文所言略同且稱額爾德尼已將所耕水田給還所遣五十戶亦經撤回等語臣等伏思額爾德尼與愛哈默特沙結好情本叵測今據阿克伯克等訪知愛哈默特沙為岱音沙所困不足倚恃又懾我天威是以情詞恭順但狡猾之性日後難免復萌今既給還鄂斯水田撤去移住人戶似可暫免深求奏入報聞丁卯命副都統宗室明普前往哈喇沙爾辦事更換達桑阿回京甲戌議雅爾駐兵事宜軍機大臣奏言據伊犂將軍明瑞等將雅爾駐兵各事宜列為六條具奏臣等遵旨議覆一派出屯田緑旗兵五百名請添派一百名除烏魯木齊派兵四百名外其二百名由三屯兵內抽撥此項兵丁應於冬春之交派大臣侍衛等帶領由齋爾擇雪少之路前往勤力耕作以餘暇築城務於兩年內竣事其應給之車輛牛馬口糧籽種器具應自烏魯木齊或伊犂備辦者如數預備又伊犂之索倫兵六百名烏魯木齊之一百名應於明年十月換班令回遊牧但冬令雪大須待春草生時方能行走請即以此七百名兵丁防護屯田烏魯木齊兵同緑旗兵前往伊犂兵於麥收以前由齋爾前往與烏魯木齊兵合隊行走將來新派一千五百名兵到時再行撤回一烏魯木齊庫爾喀喇烏蘇之察哈爾厄魯特三百餘戶原議移駐雅爾但緑旗兵行時正值雪後孶生羊隻難以牧放未便一同行走請量留幹練官一二員俟春草生時緩行前往至烏魯木齊尚有滿洲兵二百名應令與索倫兵同行既可學習技藝且益壯聲威如有由伊犂解往牲隻即可交伊帶送合併原隊俟於應撤之時一同撤回一雅爾既經築城駐兵哈薩克自必遠避但此等愚昧外藩惟知自便應酌派滿洲索倫兵九百名分東北兩路順便巡察有越境遊牧者嚴行驅逐若有潛至烏梁海種地之華額爾齊斯等處遊牧或有換易糧米乘隙搶奪等情另請咨行烏里雅蘇台將軍成衮扎布禁止驅逐一兵丁沿途及到後口糧現在雖有牛馬車輛足敷裝載但牲隻專供屯田之用若遠行重載難免疲瘦請於伊犂通融辦交羊一千二百隻派兵解送合之烏魯木齊存剩羊三千餘隻分給各項兵丁則可稍省載運口糧牛馬皆有餘力於屯田有益一雅爾築城以後哈薩克商人必就近貿易此例一開則所用緞匹銀兩既須從伊犂運送而所換馬匹牲隻又須送往伊犂殊為煩瑣請飭諭哈薩克商人俱向伊犂貿易其有攜帶牲隻數少者如雅爾有須補額之處亦仍令其交易但伊等路費既省其馬匹等作價應較伊犂少減一駐防兵丁原議用察哈爾今已添派錫伯請令明瑞等酌量派撥不必拘定未到之前波羅塔拉接放之一卡倫則另於伊犂派出馬兵暫駐額敏河沿等之三大卡倫則即以滿洲索倫兵暫駐遞送伊犂雅爾兩處文移又所請侍衛十一員未到之前亦請暫行委派其所奏烏魯木齊舊印帶往雅爾鈐用之處似於體制未合請令明瑞等擬定字樣交部另行鑄給奏入上從之議巴里坤提督移駐烏魯木齊事宜伊犂將軍明瑞等奏言臣等前議雅爾駐兵後哈薩克等不來烏魯木齊貿易請將烏魯木齊巴里坤大臣撤回將巴里坤提督改駐烏魯木齊烏魯木齊總兵移駐巴里坤經軍機處議奏欽奉諭旨雅爾地方新築城垣安設兵丁理宜專派大臣駐劄著將巴里坤提督移駐烏魯木齊其烏魯木齊大臣即著移駐雅爾巴里坤既有總兵雅爾駐兵後巴里坤大臣即著裁撤臣等伏思巴里坤提督烏魯木齊總兵自應於烏魯木齊大臣移駐雅爾之先互相調駐以便接辦事務今臣等酌請將雅爾屯田兵丁於本年十二月及來年正月令烏魯木齊大臣帶領行走其巴里坤提督移駐之期自應於本年十一月初旬由巴里坤起程並令烏魯木齊大臣與該鎮兵俱候提臣到彼交代庶於公務有裨奏入得旨軍機大臣議奏尋議烏魯木齊大臣既帶官兵移駐雅爾所有任內經手事務必須大員接辦後辦理起程應如明瑞所奏本年十月初旬令提督由巴里坤起程其烏魯木齊大臣及該總兵等均候提臣交代至烏魯木齊總兵移駐巴里坤及巴里坤大臣遵旨裁撤並所有官兵馬駝等項交代辦理之處統令該將軍會議具奏奏入上從之丁丑諭伊犂將軍明瑞等移駐雅爾厄魯特兵丁照伊犂給發錢糧上諭軍機大臣曰旌額理奏稱現駐烏魯木齊之厄魯特兵舊例每月給銀四錢五分單丁每月給銀三錢自給與孳生羊隻以來生計漸裕甚為得所請將所食錢糧停其支給等語此項厄魯特兵皆間散餘丁所充現在伊犂等處者並未給與錢糧旌額理等請裁甚是但厄魯特馬甲等在烏魯木齊者每月俱給銀九錢在伊犂者每月給銀一兩現將烏魯木齊庫爾喀喇烏蘇等處厄魯特兵移往雅爾城駐防所有錢糧應照伊犂兵丁加恩一體給發著傳諭明瑞等從伊犂至雅爾時遵照辦理其烏魯木齊佐領錢糧亦著照伊犂厄魯特佐領之例給發六月乙酉恩減葉爾羌貿易回人交官騰格上諭軍機大臣曰額爾景額等奏稱從前因葉爾羌貿易回人離散所有交官稅額俱未計算現在有二百二十人投回葉爾羌各立産業請酌量定擬每年令交錢二千騰格今年已過四月請自五月起至十二月令交錢一千三百騰格等語從前霍集占肆逆回衆散亂全部蕩平數年內始投回立業此時若即照所定額數令其交官尚恐拮據著加恩將所定今年應交錢一千三百騰格酌免五百嗣後每年俱令交一千五百騰格以示體恤以誤行斥責報事之布魯特飭諭領隊大臣副都統揚桑阿等上諭軍機大臣曰據揚桑阿等奏薩爾巴噶什之比車里克齊等以從前布魯特等妄報官兵被害前來認罪因諭以內地妄報治罪之例斥責遣回等語揚桑阿所辦非是外部之人一有所聞即行稟知尚屬恭順若遽行斥責則將來雖有實事亦必畏懼不敢稟告此事本係該大臣等冒昧查拏於前兹復以斥責車里克齊為塞責之舉即傳斥之言亦未得體著傳諭揚桑阿等遇便諭知車里克齊阿瓦勒比等爾等所報前經具奏奉旨此係我大臣不行細心查究之過爾等所報雖虛並無不是之處嗣後凡有聞見無論虛實即行稟報如此明白曉諭庶足以釋其疑壬辰命增派伊犂種地回人上諭軍機大臣曰據明瑞等奏現在涼州莊浪熱河移駐兵丁需用口糧除所存餘糧及本年秋收雖可多得二三萬石僅足補數年不敷之數未可遽以為羡餘請於此二年內挈眷兵未曽全到之時於各回城再派回人二千名赴伊犂屯田等語著照所請即行知各回城駐劄大臣酌量派往惟擇其情願赴屯者不必勉強至從前所派回人該伯克等捐助資送此次所派俱著官辦起程毋庸協助併傳諭明瑞等知之命酌裁總管臺站伯克上諭軍機大臣曰據庫車辦事原任巡撫鄂寶奏稱從前新疆甫定設有總管臺站六品伯克令其約束臺站官兵回人今官兵回人漸已言語相通如有鬬毆細事各臺站筆帖式俱可即時辦理此項伯克並無應辦之事請隨其出缺陸續裁扣等語著照所請行但各回城俱有總管臺站之伯克若無應辦之事自應一體裁扣其中或尚有需人辦事者仍準存留不必拘泥著傳諭各回城大臣酌量辦理具奏辛丑諭葉爾羌辦事副都統額爾景額等曉示素勒坦沙事宜上諭軍機大臣曰據額爾景額等奏拔達克山素勒坦沙遣使霍濟克蘭請給伊等齊特喇爾遊牧及工匠人等又告稱愛烏罕人常來侵擾業經回文斥責并將原文及回文呈奏等語素勒坦沙妄思僥幸請給遊牧並乞工匠殊屬貪詐額爾景額回文斥責甚是而詞氣尚覺太弱此事若額爾景額直以不便陳奏回覆可毋庸頒發敕諭今文內無此語似我大臣等並未具奏未免視同泛常著另繕敕書交額爾景額派員賫送曉諭再從前素勒坦沙稱額敏和卓為父今伊甫離葉爾羌素勒坦沙即呈告其過失甚屬不堪著將額爾景額奏摺及素勒坦沙之書俱録寄額敏和卓閲看亦著作書交額爾景額轉寄素勒坦沙令知所警戒賜拔達克山素勒坦沙敕書皇帝敕諭拔達克山伯克素勒坦沙據葉爾羌駐劄大臣進爾奏章及大臣與爾往復文書朕俱覽悉爾奏稱前此獻出霍集占首級意希重賞因道遠未得委曲陳奏又稱愛烏罕等時窺伺爾遊牧齊特喇爾乃爾先世舊地因葉爾羌大臣聽沙瑚沙默特一偏之詞勒令給還懇恩查給并懇賞爾所屬萬人糧餉本年收取遊牧數處請俱為天朝臣僕等語從前霍集占兄弟逃入爾地爾畏我大兵又利其所有始決計獻馘朕已優加賞賚而逆賊所有資裝皆未索取獨非賞乎爾以獻馘為有功不思爾若再為容留尚能保爾遊牧乎且年來遣使入覲賞賚尤多此次給還齊特喇爾遊牧復加奬賞皆以爾恭順之故當益加謹恪若仍不知足是自取咎矣至愛烏罕等果窺爾遊牧似非無端生釁即如爾奏收取附近遊牧數處則爾之侵擾鄰封可知朕為天下共主一視同仁非於爾有所偏徇也齊特喇爾為博洛爾所屬在準夷時為爾舅氏沙瑪瑪特所據後沙瑚沙默特之祖恢復故地皆我大臣所深悉爾肆行攘奪尚應問罪因業已遵諭給還反加奬賞可謂寬厚之至而爾詭詞具奏豈以葉爾羌大臣新經更替謂可欺飾耶今駐劄大臣玉素富乃故哈密國王後裔豈不知回部舊事且前駐大臣吐魯番郡王額敏和卓日後仍來更替爾斯時又將何以為詞爾從前稱額敏和卓為父乃伊甫回遊牧即詆其偏聽人言亦太反覆矣爾所請萬衆糧餉以天朝之廣大何所吝惜但賞以酬勞非巧言可得爾之所屬未嘗與葉爾羌等處回人一體效力豈可無勞而獲賞哉朕念爾前功欲長加保護特降敕訓諭爾其循理守分勿萌僥幸無厭之心始可永承恩澤也勉之勿怠葉爾羌辦事副都統額爾景額等疏奏布哈爾懇請內附情形額爾景額奏言據拔達克山使人和濟克蘭稟稱素勒坦沙令我等告知今有布哈爾之諾羅斯伯克達雅爾伯克二人至拔達克山聞我等歸附大皇帝身受重恩其汗阿布勒噶子等情願率屬歸阿因寄字素勒坦沙素勒坦沙覆以應向葉爾羌將軍大人請示等語臣等查布哈爾尚在拔達克山之外去葉爾羌甚遠其懇請內附必係傳聞聖朝柔遠之仁傾心向化否則畏懼外部侵擾欲仗天威懾服俱未可定但布哈爾果係誠心歸附儘可自到邊境稟告何必向素勒坦沙轉求恐係素勒坦沙欲藉為已功邀取恩澤再或假借聖朝威聲懾服布哈爾俱未可定若不明白曉諭則外部愚人未免受其挾制臣等因將皇上體恤遠人不欲強令歸附之意詳悉曉諭並將希圖僥幸不能妄邀恩賜之處委曲開導使之自悟如果布哈爾頭目阿布勒噶子遣使來附臣等詢明情由再行具奏奏入報聞平定準噶爾方略續編卷二十五
