body:
  text: 乾隆二十三年春正月己丑諭加給陜甘買補營馬及屯田牛隻官價上諭大學士曰據黃廷桂奏稱現在陜甘買補摘缺營馬官價八兩實有不敷及買解巴里坤等處屯田牛隻請於官價四兩四錢外添給一兩六錢等語兩省連年需馬甚多市價未免昻貴若拘定成例誠有不敷著於定價八兩外準其加給二兩至牛隻係本省農民所需用時屆春耕不惟官價四兩四錢不足即增一兩六錢亦未必充裕若再加二兩給以官平足數採買自屬易集而閭閻亦無滋纍因此次購辦過多特格外加恩以示體恤後不為例以接濟軍營牛馬事宜諭大學士管陜甘總督黃廷桂上諭軍機大臣曰據黃廷桂奏稱川省既無黃牛而晉省騍馬多老不堪用已諭開泰塔永寧停其購辦但令晉省於標營內挑取不中乘騎之騸馬一二千匹解甘備用至軍營牛馬自應充裕現命軍機大臣於太僕寺上駟院牛馬羣內挑取亦可以資接濟著傳諭知之庚寅諭定邊將軍兆惠等奮勉相機進勦上諭軍機大臣曰昨因將軍成衮扎布等辦理進勦毫無端緒業已分别示懲兆惠䇿布登扎布富德等領兵勦賊當以為戒同心協力自可奏功此時如逆賊阿睦爾撒納有竊發之信即將勦除賊黨及辦理回部之事暫行停止專意擒拏若無信息則將沙喇擘勒賊衆回部諸城於本年內辦竣方為妥協數年來屢次用兵自當休息即阿逆未就擒獲亦可相機辦理著傳諭兆惠䇿布登扎布富德等知之諭參贊大臣雅爾哈善等傳示阿竒木伯克霍集斯上諭軍機大臣曰從前平定伊犁時達瓦齊敗走回部為圖爾璊阿竒木伯克霍集斯等遣阿舒爾瑪特擒送軍營不知此時圖爾璊地方尚係伯克霍集斯辦事抑或更替他人可傳諭雅爾哈善等於進兵時訪問若仍係伯克霍集斯辦事則即向伊等云爾等從前將達瓦齊擒獻係有功之人皇上即施恩賞賚尚欲陸續加恩因辦理厄魯特等無暇今厄魯特等俱已平定領兵前來專為問兩和卓木之罪與爾等無涉爾等惟誠心效順自必永承恩澤仍酌賞縀匹等物以示奬勵凡大兵經過地方皆當如此宣示及酌量奬賞俾回人聞風歸嚮或將逆酋拏送亦未可定即不然而衆心內附逆酋等自必力窮無助我兵擒勦亦易如歸附人等有奮勉行走者更宜核實奬賞雅爾哈善等當加意辦理諭定邊將軍兆等專辦進勦沙喇擘勒賊衆上諭軍機大臣曰兆惠等奏稱正月內馬匹送到即進勦巴圖爾烏巴什等再往葉爾羌喀什噶爾擒拏波羅泥都霍集占倘辦不隨意不能即入回部則且屯田積榖市哈薩克健馬俟次年整兵再進等語兆惠等所見亦是但不可有意遲疑惟當相機以應如上年進兵時即計及辦理回部其後竟如所言今謂賊人在沙喇擘勒恐又復他往或向內來俱未可定若伊等果在沙喇擘勒坐食勢必貧人盜竊其富家不堪為命互相殺害斷無安靜之理我兵乘機取之甚易兆惠所奏未免豫留地步即非有心觀望而怯懦固其本懷以為事若無成伊已先為奏及不知臨時果有阻滯即俟次年辦理又有何礙况䇿布登扎布陛辭日朕已諭今年儘力趕辦如趕辦不及即明歲辦理亦可且辦理回部現諭添派緑旗兵八千名兆惠惟帶原議四千兵前往沙喇擘勒其辦理回部已命雅爾哈善額敏和卓前往觀今日兆惠所奏顯係以兵少為慮欲留雅爾哈善所帶之索倫兵一千用壯聲勢耳可於緑旗兵八千內派出一千合原議之四千兵前往沙喇擘勒其索倫兵一千仍令雅爾哈善帶往諭參贊大臣雅爾哈善等專辦進勦回部上諭軍機大臣曰朕因兆惠有辦理需時之慮已命專辦沙喇擘勒賊衆其葉爾羌喀什噶爾回部令雅爾哈善額敏和卓二人辦理已添派緑旗兵八千名合之雅爾哈善所帶索倫兵一千自足敷用額敏和卓熟悉回部情形伊等盡心商酌以奏膚功即或今歲不能竣事惟整兵前進蹂其禾稼振旅而還彼力自絀將來進取更易至額敏和卓傳示庫車回人之事及此次進兵何時起程作何辦理著即行奏聞再兆惠處侍衛頗多雅爾哈善進兵時可咨取數人以備差遣辛卯申諭將軍大臣進勦事冝上諭軍機大臣曰昨命兆惠雅爾哈善等分路進勦以專責成但兆惠既有畏難之心雅爾哈善至今猶未至魯克察克朕心深為厪念辦理沙喇擘勒賊衆已派兵五千自屬裕如兆惠等宜加意擒勦不留餘孽若仍不能集事朕惟兆惠是問至由庫車阿克蘇進兵回部雅爾哈善惟與額敏和卓同心協力資其計畫加以鼓舞不可稍存歧視再額敏和卓所屬之回兵亦屬可用宜向彼商酌派出或得一千或得數百即將緑旗兵照數撥除此項撥除兵丁所分例著賞給回兵分派直省大員專司巡察臺站上諭軍機大臣曰自京至巴里坤所設臺站向俱特派人員巡察今觀內地軍臺遞送事件較前稍覺遲滯總因日久懈弛馬匹亦多疲乏著將直𨽻軍臺事務交按察使永寧山西軍臺交按察使明山陜山軍臺交布政使武忱自甘肅至巴里坤軍臺交巡撫吳達善專司巡察管理如馬匹有疲乏者或令更換或於事簡臺路調撥壯健者應用其應如何辦理之處即各具摺奏聞命奬勵巴里坤至軍營臺站官兵上諭軍機大臣曰數年進兵以來自巴里坤至軍營所設臺站官兵馳送事件尚無貽誤且有勦殺賊衆奪回劫虜官物者應加特恩以示奬勵著永貴吳達善查明臺站筆帖式內有遇賊勦殺奪回官物者或即題補本部主事或交部議敘請旨其餘兵丁槩賞兩月錢糧巴里坤以外臺站事務即著永貴巡察管理臺馬有疲乏者即會同吳達善等調撥更換壬辰諭續送軍營馬匹派給魯克察克之索倫兵丁上諭軍機大臣曰昨命黃廷桂再辦馬二千匹留富紹於巴里坤續送烏魯木齊軍營今雅爾哈善領兵由魯克察克進發著改送魯克察克分給所領索倫兵一千名富紹將馬匹交收後即在雅爾哈善隊內行走其巴圖濟爾噶爾郭木尼勒圖將前起馬匹送至烏魯木齊即在軍營行走可傳諭兆惠雅爾哈善富紹等知之申諭參贊大臣雅爾哈善辦理回部事宜上諭軍機大臣曰朕昨諭雅爾哈善將額敏和卓所屬回兵派出進勦因伊等情形熟悉而額敏和卓亦便於指使但恐回人馬匹不敷著傳諭雅爾哈善將原派緑旗兵每人馬一匹照數給與回兵此次辦理回部朕專交雅爾哈善額敏和卓二人應進兵時即一面具奏一面起程惟知會將軍兆惠毋庸往返咨商再雅爾哈善等由阿克蘇庫車進取葉爾羌喀什噶爾等城所有收獲器什除應交內府者酌量齎送外其衣服等物即奬賞兵丁至軍器馬駝尤當盡行查取以給軍用諭定邊將軍兆惠等進勦賊衆事冝上諭軍機大臣曰聞向來進兵時自哨探兵丁外又派數十人瞭望謂之墨爾根哨探兵凡行兵遣發哨探特為豫偵賊人信息掩其不備之意今於哨探隊前復遣人行走設為賊所窺得以豫作準備而大兵逺隔一時不能猝至轉似與賊送信者然是名為審慎其實自示怯懦有何裨益此次進兵不過與大營相去四五十里間遣發哨探一見賊蹤即行馳報則大隊兵丁自可接踵迎擊至厄魯特性習反覆無定往往自相戕害從前達瓦齊在伊犁時人心尚且離散今日豈有堪為統率之人即如巴圖爾烏巴什亦嘗收合黨衆究未聞推為台吉今又伏冥誅則哈薩克錫喇等小醜焉能使衆賊服從且衆厄魯特等已成嗎哈沁冬寒竄伏棲止一處必致互相爭奪大兵乘其潰亂迅往襲擊立可奏功兆惠等勿因其烏合之勢過為顧慮即遵朕節次諭旨相機辦理諭户部侍郎阿里衮等酌量勦賊撤兵上諭軍機大臣曰據阿里衮等奏稱現在前往庫車於所到山谷內搜捕嗎哈沁偵探賊人蹤迹等語阿里衮等前次奏事距今二十餘日朕心深為厪念今雖稱尋蹤追賊然伊等兵馬之力如何未經奏及前已降旨令伊等撤兵令額敏和卓同雅爾哈善辦理回部此時能收服庫車回衆固善否則竟回遊牧暫息再整兵往魯克察克一切與雅爾哈善商酌辦理阿里兖亦不必前赴軍營仍回巴里坤辦事癸巳命革職原任巡撫盧焯在巴里坤辦理糧餉處效力甲午命副都統濟福等馳驛前往靑海辦事上諭軍機大臣曰副都統濟福帶領乾清門二等侍衛查拉豐阿察哈爾三等侍衛那木查爾差往靑海有應辦事件濟福著賞銀五十兩查拉豐阿那木查爾各賞銀三十兩整裝馳驛前往諭副都統濟福等備勦沙喇斯瑪呼斯賊衆上諭軍機大臣曰去年進勦厄魯特叛賊餘黨分路逃竄近據阿里衮等奏稱沙喇斯瑪呼斯賊人俱逃向愛什瑪山之東南察其蹤迹應在呼爾塔克山羅卜淖爾等處藏匿等語羅卜淖爾等處與噶斯相近可通靑海或賊人逃往彼處亦未可定因特派濟福查拉豐阿那木查爾前赴西寧與副都統德爾素靑海郡王索諾木丹津貝子那木查爾策凌等會同辦理濟福等至西寧德爾素即同往靑海令索諾木丹津等派兵一千聽候調遣仍選派熟識路徑兵丁三四十名交查拉豐阿那木查爾等帶往噶斯一路跟尋賊人蹤迹若有藏匿逃竄之厄魯特等查拉豐阿報知濟福等即帶兵前往搜勦若並無蹤迹查拉豐阿等亦即回京濟福可傳諭索諾木丹津等密為豫備不必宣露諭參贊大臣雅爾哈善等酌辦沙喇斯瑪呼斯賊衆事冝上諭軍機大臣曰據阿里衮奏沙喇斯瑪呼斯賊人向愛什瑪山之東南呼爾塔克山逃去呼爾塔克山興羅卜淖爾相近等語因披覽地圖呼爾塔克山羅卜淖爾等處與魯克察克相近未知阿里衮曾否行文雅爾哈善等可傳諭雅爾哈善在魯克察克一帶留心訪查此時阿里衮若已追及賊人固善倘又逃往他處或向噶斯一路已調靑海蒙古兵丁豫備堵截再呼爾塔克山等處既與魯克察克相近去巴里坤亦當不逺巴里坤大臣等亦應逺設卡倫加意瞭望如有賊人蹤迹即行搜勦似此分途防範賊衆自難藏匿又諭曰據舒赫德等奏稱闢展秋收豐稔已行文黃廷桂派緑旗兵四百名今歲廣為墾種等語所辦尚是但舒赫德已革職令於軍營效力將軍等遣往魯克察克辦理沙喇斯等賊衆看來非伊所能承辦可傳諭雅爾哈善等就近堵勦若賊蹤甚逺亦無關緊要即於進勦回部之便再為搜捕亦可舒赫德不必在魯克察克即遣回軍營效力贖罪至屯田一事實為要務亦傳諭雅爾哈善永貴等矣雅爾哈善在軍營無應辦之事著速至魯克察克與永貴商辦一切若屆進勦回部之期即宜奮勉前往乙未命優恤哲卜尊丹巴胡土克圖上諭軍機大臣曰喀爾喀親王桑寨多爾濟等奏稱哲卜尊丹巴胡土克圖於去冬圓寂等語哲卜尊舟巴胡土克圖係喀爾喀四部落遵奉之大喇嘛雖不比前人德壽兼全久興黃教然伊在時亦能作興黃教極力安衆朕用是疊沛恩施常加優禮今聞圓寂深為軫惻著加給敷教安衆喇嘛封誥印信照舊例頒賜器幣鞍馬品物以示優恤丙申諭乾清門頭等侍衛官長保奬勵內大臣察達克上諭軍機大臣曰納穆扎爾等奏據車木楚克扎布等呈稱遵旨將訪查阿睦爾撒納信息傳諭察達克察達克以遣人前往俄羅斯恐形迹可疑於事無益查俄羅斯圖喇外有從前逃走之烏梁海特楞古特擬帶兵以擒拏逃人為名訪取阿逆確信若可擒拏即行呈報等語察達克所見甚是近因此事特命官長保前往著傳諭官長保奬勵察達克即就伊所見相機辦理阿逆若果在俄羅斯圖喇附近毋論內外酌量擒拏若相離甚逺不必輕進即訪取確信作速奏聞再伊等往俄羅斯圖喇時官長保自宜同行如察達克等有恐內廷侍衛分功之意即不必前往丁酉命議敘甘肅辦解馬匹官員上諭大學士曰據巴里坤辦事大臣等奏稱甘肅解送軍營馬一萬二千匹俱陸續妥協解到今已辦理起程等語黃廷桂辦解軍營馬匹妥協無誤深屬可嘉黃廷桂及承辦馬匹官員俱交部議敘其解送馬匹至巴里坤官兵著黃廷桂查明官員交部議敘兵丁酌量加恩賞給以示鼓勵戊戌命喀爾喀扎木巴勒多爾濟喇嘛掌管喀木布諾門汗印信上諭軍機大臣曰據桑寨多爾濟奏稱尚卓特巴遜都卜多爾濟等請將札木巴勒多爾濟掌管經教衆心悅服等語著照所請將喀木布諾門汗之印給與扎木巴勒多爾濟掌管勤宣黃教約束喇嘛其尚卓特巴遜都卜多爾濟著協辦事務命解送回人阿卜都爾璊來京軍機大臣奏言哈密拘禁莽噶里克差遣之回人阿卜都爾璊及跟隨阿舒爾瑪特三達色前來之回人厄魯特共二十三人查阿舒爾瑪特三達色拏送京城時阿舒爾瑪特於途次病故現在拘禁之阿卜都爾璊係莽噶里克遣探信息之人應行正法其餘二十二人分賞額敏和卓王素富之處請旨遵行奏入得旨著將阿卜都爾璊解送來京庚子命停止副都統愛隆阿議敘定邊將軍兆惠奏言據副都統愛隆阿呈稱伊從前擒拏巴雅爾與哈薩克對陳奪回竒徹布尸骸參贊大臣富德俱未奏報等語臣等照伊原呈查詢富德據稱查從前愛隆阿原報並無奪回竒徹布尸骸之語查詢隨從竒徹布兵丁麟保諾卜竒俱云伊二人護守尸骸送赴軍營愛隆阿欲留竒徹布之馬經貝勒羅卜藏多爾濟勸解始發給馱載至擒拏巴雅爾後即委羅卜藏多爾濟愛隆阿等將官兵功次呈報將愛隆阿領隊行走之處特為聲明業經蒙恩交部議敘惟圖倫楚達禮善等因一時遺漏復補請加恩並無隱匿等語臣等查愛隆阿呈詞情節與原報不相符合顯係爭功妄控伏乞皇上敕部將愛隆阿嚴加議處以為軍營造言生事者戒奏入上諭軍機大臣曰據兆惠等奏稱愛隆阿呈控伊從前擒拏巴雅爾及奪取竒徹布尸骸等事俱為富德隱匿今查擒賊功次已經奏報而奪取竒徹布尸骸伊原報並無此事等語愛隆阿貪功訐告甚屬器小理應從重治罪但伊此次行走尚為出力著加恩免其治罪所有議敘之處即著停止又諭曰愛隆阿以領隊大臣在軍前效力行走已降旨交部議敘自無可格外加恩伊乃貪功告訐其意以羅卜藏多爾濟晉封王爵伊第邀議敘心懷不足耳殊不思羅卜藏多爾濟係蒙古台吉從軍出力固應加恩即循次晉階亦其常分愛隆阿何可相比今但停止議敘免其治罪已屬加恩前曽降旨令在雅爾哈善隊內行走此次進兵伊當知立功自贖若不奮勉效力必將伊從重治罪斷不寬宥并將此曉諭愛隆阿知之諭參贊大臣雅爾哈善酌留索倫接馬兵丁帶往上諭軍機大臣曰雅爾哈善奏於十二月二十日起程往魯克察克前諭雅爾哈善將兆惠所領索倫兵一千名帶領前進此時若已到魯克察克甚善若尚未到現有接取解送馬匹之索倫兵丁雅爾哈善即可存留帶往一面咨行兆惠於遣來索倫兵內合計所留兵數裁扣亦通融辦理之法併傳諭兆惠知之命將私閲軍臺文報之五十七拏解巴里坤正法上諭軍機大臣曰據兆惠奏稱查出私開文報之委署臺站筆帖式五十七請即正法等語軍臺文報關係緊要五十七以委署筆帖式竟敢私行竊看情甚可惡著將五十七拏解將前項情節沿途通行曉示各臺站人等至巴里坤即行正法諭定邊將軍兆惠等奏報進兵日期上諭軍機大臣曰兆惠等從前擬定今年正月內起程進兵今已屆初旬矣或就馬匹解到即行起程或待草青以濟馬力俱當奏報軍營奏事數日不至朕即為厪念雖時當新歲例有行禮筵宴等事而伊等在外時切眷懷豈以朕為令節歡娛竟忘爾等耶朕豈如是之主耶兆惠富德皆內廷行走之人豈不知朕意伊等理宜用心辦理一切諸務其應行辦理者即行辦理應陳奏者即行陳奏乃何以並未奏報即如巴圖爾烏巴什身死果實則但餘舍楞等辦理更易至衆賊烏合未知哈薩克錫喇亦在其內否或在沙喇擘勒居住或漸移近地此等情節兆惠等亦當遣發哨探擒拏嗎哈沁詢問伊等曾否如此辦理於何時進兵馬力若何俱作速奏聞甲辰喀爾喀親王桑寨多爾濟等疏奏逆賊阿睦爾撒納出痘身死桑寨多爾濟等奏言本年正月初七日據俄羅斯畢爾噶底爾遣圖勒瑪齊畢什拉等報稱阿睦爾撒納因被追兵所迫入我交界溺水幾斃我卡倫人等救出拏送固伯喇納托爾處監禁旋即出痘身死我固伯喇納托爾念與大國和好若但將阿睦爾撒納身死情節備文通知恐不足取信今將伊身尸移至我等邊界大國速遣人來或至塞楞格城或至恰克圖邊界驗看等語臣等伏思阿睦爾撒納一案節經理藩院行文該薩納特衙門理應將阿逆身死備文移覆乃伊等邊界頭目但移知臣等其中或有别情况伊等並不將同阿逆拏獲之人若干是何名目或同阿逆尸骸解送與否現今身尸或已腐壞或尚完全分晰具報殊屬含混可疑臣等現將此等情節行文畢爾噶底爾等令其據實聲明即派頭等台吉齊旺扎卜前往察看情形俟回文到日具奏奏入上諭軍機大臣曰桑寨多爾濟等據俄羅斯邊界報稱逆賊阿睦爾撒納出痘身死今將身尸移至恰克圖等處請遣人驗看等語看來逆賊阿睦爾撒納罪惡貫盈身死屬實林丕勒多爾濟向認識阿睦爾撒納今天氣尚寒逆尸想未腐壞接到此旨桑寨多爾濟即遣林丕勒多爾濟速往恰克圗驗看並曉示彼處頭目云爾等念兩國和好將逆賊之尸送來以彰信義大皇帝深為嘉悅已命理藩院行文爾薩納特衙門一面命我取逆賊身尸解送京師等語如逆尸已到恰克圖林丕勒多爾濟即取以來倘伊等謂逆尸在塞楞格城亦即前往驗看勿因恰克圖是交界在彼住侯或伊等祗令驗看不肯發遣務宜嚴行曉示仍先期作速奏聞委署前鋒參領觀音保前鋒奎思德以護送哈薩克貢馬至京命在雅爾哈善隊內行走各賞銀三十兩乙巳命恤敘進勦扎哈沁官兵并訓諭將軍大臣等上諭軍機大臣曰據兆惠等奏稱鄂實等領兵追勦逃往瑪納斯河源之扎哈沁哈勒拜等官兵奮勇殺賊一百四十餘人獲馬駝軍器甚多厄魯特侍衛達爾漢等九人陳亡侍衛老格等二十六人得傷等語此次官兵勦賊甚屬奮勉厄魯特侍衛達爾漢乃達什達瓦屬人從前因進勦納木竒庫圖齊訥爾鄂拓克較衆尤為出力是以授為二等侍衛賞給巴圖魯名號今奮勇捐軀深為憫惻著加恩賞給雲騎尉令伊子承襲仍將伊户口移於察哈爾照例安插并將此旨傳示達什達瓦屬人及軍前厄魯特等侍衛官員其餘陳亡得傷官兵俱交部照例議恤議敘至此次進勦正值隆冬大雪之時馬力自當疲乏尚能勦賊奏功使去年進兵若此何患無成彼時鄂實係參贊大臣有事但諉之將軍不加䇿勵今自知負罪不敢如去年之互相推諉是以直前勦賊朕深悉其隱著傳諭兆惠等進兵之時當似此各知奮勉不可稍存意見並將鄂實畏罪圖功之處曉示衆人鄂實著加恩授為三等侍衛瑚爾起端濟布與效力官兵亦著交部議敘以示鼓勵命安插哈爾察海戶口於巴里坤上諭軍機大臣曰兆惠等奏招降噶爾藏多爾濟之哈爾察海等七十餘口㨂選七人作為嚮導餘交巴圖魯侍衛齊努渾解送巴里坤候旨等語哈爾察海等見我九人前往招降即率二十餘户歸順非兵威迫脅可比從前因厄魯特等反覆無常故送往肅州正法今助惡逆黨俱多殱滅此輩原無關緊要當酌量安插稍給産業同緑旗兵支領錢糧以供調遣使衆厄魯特聞知猜懼之心稍釋其藏匿餘賊自必來投庶疆圉可以永靖著傳諭巴里坤大臣等現在哈爾察海等即遵照酌量安插嗣後有似此者一體具奏俟事竣之後量其情節分别辦理并傳諭兆惠知之以逆賊阿睦爾撒納身死情節諭定邊將軍兆惠等上諭軍機大臣曰昨俄羅斯報稱逆賊阿睦爾撒納入伊邊境出痘身死將尸送驗等語看其情節尚非虛假蓋前此逆賊尚存俄羅斯未必不思留用是以遲久未見擒送今伊已死留尸無益又恐反傷和好因報明送驗此亦情理之可信者已遣林丕勒多爾濟往取逆賊之尸著傳諭兆惠於進兵之便再留心訪查使所得信息與俄羅斯告語相符則尤確實足信矣然逆賊阿睦爾撒納雖死而哈薩克錫喇舍楞等尚未就擒兆惠等勿因此稍存懈怠務宜加意奮往速奏膚功并傳諭雅爾哈善等知之丙午以逆賊阿睦爾撒納身死宣諭中外上諭大學士曰準噶爾一事自用兵以來伊犁既已蕩定而哈薩克汗阿布賚等亦輸誠內嚮實皆仰荷上蒼之默佑列祖之鴻庥獨因叛賊阿睦爾撒納逋逃未獲以致勞我師旅於今三年蓋此賊一日未能成擒則西事一日不能就緒不得不極力追捕以為邊圉久逺之計非朕之好為窮兵黷武從前所降諭旨甚明去歲聞阿睦爾撒納竄入俄羅斯境內俄羅斯向為和好之部定議彼此不許容留逃人况阿睦爾撒納罪大惡極尤非他逃人可比當令理藩院行文俄羅斯薩納特衙門向索今據辦理俄羅斯邊界事務喀爾喀親王桑寨多爾濟等奏稱俄羅斯畢爾噶底爾差圖勒瑪齊畢什拉等前來并移文內稱阿睦爾撒納逃至伊境渡河被溺隨經救出拘禁旋因患痘身死今將尸獻出等語若惟恐不能取信於天朝而亟亟以獻尸為確據者夫以阿睦爾撒納之貪殘狡詐貽害生靈負恩悖叛天良滅絶即暫逃於顯戮必難逭於冥誅斷無久延視息之理其身死諒無可疑至俄羅斯之收留叛賊始未嘗不欲撫而用之及其已死無可希冀然後獻出亦係其實在情節且彼既以謹守舊約克全信義為詞自不當逆料其詐拒而不受更行深責也况國家之所期必獲者不過一阿睦爾撒納耳今其人已死其尸已得準噶爾全局自可以告厥成功朕惟以大公之心為順應之舉斷不肯恃我國威誅求過當萬一所獻不實意圖欺罔則其曲自在俄羅斯彼若妄生事端則朕可以上告天地而下對臣民再興師問罪亦未為遲即無知苟安之徒亦無從議朕為好武矣始議向俄羅斯索取阿睦爾撒納時衆人之意未必不竊議又生邊釁是總不知駕馭外藩之道示之以謙則愈驕怵之以威則自畏此二言若子孫世世能守實大清國億萬年無疆之庥也即如漢唐宋明和親稱姪歲幣屢增是亦遜讓之極矣而於邊患寧稍救耶即如俄羅斯既已收留叛賊若不嚴行索取彼必不將尸獻出設從史貽直陳世倌所議且將遷就隱忍竟若叛賊一入俄羅斯遂無可如何者所謂唾面自乾之為朕甚恥之朕於軍國重務惟有乘機度勢因物順理不但初無搆釁於俄羅斯之心即此用兵三年雖未如康熙雍正年間之久而朕已慮衆人之勞時切於懷特因叛賊未獲萬難中止初非朕之本意也向使前後在事諸臣果能迅合機宜則叛賊自不至逃竄亦當早為弋獲何至輾轉愆期此用人不當實朕之愧然統計連年軍興徵調皆出自公帑不但未加賦閭閻而賑恤有加於往歲此亦天下臣民所共知者今逆尸已獲伊犁全部悉入版圖徐謀耕牧纘成皇祖皇考未竟之緒而自古未通中國之哈薩克亦皆稱臣納貢其於我皇清疆宇式廓萬年久安之道為有益為無益朕亦不更置論至葉爾羌喀什噶爾等回部原可計日平定不必更煩動衆所有阿睦爾撒納身尸俟解到之日驗明戮示以彰國憲先將此通行曉諭知之臣等謹案阿睦爾撒納負恩逃叛聨猭駾走之餘尚思潛蹤煽惑其在哈薩克時即遣人入俄羅斯冀增狡窟以逋刑憲且其反覆叵測衆所稔知若非悉力窮追或致跧伏滋蔓誠有如聖諭所云阿逆一日不除西陲一日不靖者乃哈薩克既悔過輸誠驅凶渠於境外而俄羅斯於容納之初廋詞嘗試皇上洞燭情偽飭索綦嚴且搜捕餘孽聲威四訖阿逆雖逃顯戮遂伏冥誅其罪大惡極自不能復容於覆載於理固實有可憑而俄羅斯當阿逆尚存或不免稍懷觀望及其既斃則豈肯因臭腐之骨致失恭順之忱呈報逆尸時不容緩於情更確有可信由此益見德威昭播遠服讋懷尺一所傳捷於影響當廟謨甫授之時彼狃於目睫之見者方慮索逋冦以啓釁端務為姑息奚啻夏蟲之不可語氷今恭讀諭旨示之以謙則愈驕怵之以威則自畏誠為駕馭外藩之要道我國家億萬世無疆之福所當敬守而弗違者也丁未授巴圖魯侍衛老格為二等侍衛上諭軍機大臣曰巴圖魯侍衛老格同鄂實等追勦扎哈沁賊衆臨陳得傷洵屬奮勉效力著加恩授為二等侍衛平定準噶爾方略正編卷四十八
