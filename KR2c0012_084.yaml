body:
  text: 乾隆二十一年秋七月丁亥宣示薩喇爾罪狀上諭大學士曰班第鄂容安同薩喇爾駐守伊犂當阿逆叛亂之時班第鄂容安捐軀殉節而薩喇爾獨自脫逃及拏解來京朕親加審訊據稱彼時以賊衆四集恐力不能支是以帶兵逃出冀圖再舉等語朕因其所言情節尚應質對暫行監禁今巴寧阿柏琨等到京質訊之下言頗相符但供拔去所賜孔雀翎而逃是其偷生負國已屬顯然然在滿漢世受國恩之臣而臨難茍免自當明正典刑伊係厄魯特新附之人不足責以死綏大義今班第鄂容安靈櫬已到朕親臨祭奠優豫恤典靈櫬俱令進城即著旺扎爾帶同薩喇爾前往班第鄂容安柩前將逆黨阿巴噶斯克什木先行馘耳祭奠令薩喇爾在旁看視夫人孰無死使薩喇爾亦能如二臣之決計就義則今日哀榮之典自當一體同受而乃顚越至此使伊稍有人心能無愧乎其阿巴噶斯等俟阿逆拏獲到日一併正法以彰國憲薩喇爾著永遠拘禁將此傳諭中外知之戊子命優恤伊犂陳亡官員上諭大學士曰去歲伊犂擾亂時跟隨將軍大臣之滿洲䝉古侍衛官員喀爾喀王公台吉等其奮勇殺賊及自盡復生後經陸續旋歸者朕已悉加恩賞晉秩升用至陳亡自盡之滿洲䝉古侍衛官員喀爾喀台吉等甚屬可憫著俟兆惠查明奏到之日交該部照陳亡例議奏賞給世職以示優恤命土爾扈特使臣入覲上諭軍機大臣曰前因土爾扈特遣人前往西藏特派麒麟保帶領同行今據奏稱已於七月初旬起程赴藏計其回時朕已駐蹕熱河著傳諭麒麟保即帶領土爾扈特使臣由張家口外前赴熱河入覲己丑諭擒拏青滚雜卜事宜上諭軍機大臣曰據納穆扎爾奏青滚雜卜遣人至烏里雅蘇台煽惑喀爾喀等情形可疑等語青滚雜卜居心詭詐深可痛恨著舒明等詳細察看此時若已露背叛情形即㑹同親王成衮扎布得親扎卜等相機擒拏若尚未生事端止宜留心防範俟哈達哈撤兵回時再行辦理青滚雜卜游牧與唐努山甚近其或在游牧或向唐努山至烏梁海皆未可定並著傳諭哈達哈臨期確訪或先派兵豫阻去路再行擒拏毋得任其脫逃再貝勒策登扎卜呈稱不能辦理臺務必係聽青滚雜卜指使著一併拏解來京其臺站事務即速交親王成衮扎布接續辦理毋致貽誤至哈達哈等自哈薩克回時馬匹不免疲瘦舒明等即豫選馬匹善為牧放俟哈達哈將到即解往接續以增兵力並著學士阿桂速赴軍營協同辦理命以青滚雜卜罪狀傳諭喀爾喀王公等上諭喀爾喀王公等曰青滚雜卜原係獲罪斥革之人因其尚知奮勇仍加恩承襲貝勒並授為喀爾喀副將軍上年從征伊犂加恩封授郡王稍有人心自當感激圖報孰意其深負厚恩實出情理之外伊前同阿逆進兵時聽從指使將巴特瑪車凌之弟諾爾布丹津私行帶回將軍大臣參奏阿逆罪狀竟敢潛為泄漏嗣後追擒阿逆退縮阻撓奏請兩路出師五萬方可追緝種種悖謬乖張不可枚舉彼時本應即行正法朕因念及伊祖博貝舊日勞績特加寬宥以觀後效是以此次辦理烏梁海復授為參贊豫以自新之路伊至烏梁海並未拏獲鄂木布郭勒卓輝等即撤兵而回雖尚有將軍哈達哈等領兵在彼伊即退回無關輕重但既為參贊並不奏請諭㫖亦不咨報將軍帶兵擅回律以軍法罪不容誅且揑為種種浮言煽惑衆聽其心實不可問試思辦理準噶爾一事原為喀爾喀經理久長之計是以命將興師以期一勞永逸然選派喀爾喀官兵俱經賞給錢糧米石派辦牲隻何次不給發價值而青滚雜卜乃謂喀爾喀以連年用兵為纍是誠何心至於軍行賞罰乃國家憲典所必行達木巴扎卜係管理都爾伯特游牧人員縱令巴朗脫逃諱匿不報額林沁多爾濟監視阿逆來京明知其叛跡已露袖手旁觀致令脫二人情罪斷難姑容然猶念伊等祖父不忍加之顯戮令其自盡此而曲為寬縱國法何在而青滚雜卜乃謂喀爾喀係青吉斯汗後裔向不治罪此語舛謬更甚如朕宗室中有犯刑章者朕又何嘗廢法耶至於稍知奮勉如巴扎爾什第桑寨多爾濟及策布登扎布等則俱優封顯秩賜豫便蕃青滚雜卜寧不聞之耶已交軍營大臣等拏解青滚雜卜來京治罪本應除其屬衆削其封爵朕始終眷念伊祖不忍泯其勞績所有貝勒封爵仍施恩准令額林沁之子旺布多爾濟承襲朕辦理庶政一秉至公有功者豫之厚恩犯法者斷無姑貸將此曉諭衆喀爾喀王公等知之諭親王成衮扎布擒拏和托輝特青滚雜卜事宜上諭軍機大臣曰親王成衮扎布世受國恩深知感激伊聞和托輝特青滚雜卜種種狂悖即移咨納穆扎爾轉奏能念伊父額駙素日篤誠力圖報效深堪嘉豫著賞荷包一對以示優眷和托輝特青滚雜卜去歲進兵時迎合阿逆種種不法今又擅自撤兵復托言衆喀爾喀以用兵為纍逞其詭詐喀爾喀等深受國家厚恩斷不為伊煽惑已降㫖詳悉曉諭青滚雜卜應即拏解來京治罪朕已諭舒明阿蘭泰等㑹同親王成衮扎布得親扎卜等審機辦理青滚雜卜乃無足重輕之人第喀爾喀舊臣僕中有似此敗類不可不申明國憲成衮扎布等務宜留心防範毋得泄漏此時如應速為擒治即會同衆喀爾喀王公等領兵擒拏否則仍遵前㫖俟哈達哈等回時再行辦理參贊大臣富德疏奏會同將軍哈達哈等進兵事宜富德奏言臣遣璊綽爾圖扎什保前往確探兩路大兵信息至濟爾瑪台地方遇定邊左副將軍哈達哈等大兵已渡額爾齊斯河即令臣等由阿勒圭前進㑹齊臣等即帶兵迅速前往俟遇哈達哈時㑹議將兵丁分隊進發務使聲息相通協力擒拏逆賊再從前脫逃之唐古忒至散秩大臣烏魯木游牧內搶掠已為烏魯木所殺又擒獲與唐古忒同逃之索諾木達爾扎之子䝉固勒訥默庫二人係額林沁之女所生並喇嘛羅卜占三濟亦係同額林沁行走之人現在派員解至軍營奏入報聞壬辰諭都爾伯特王公台吉等分年入覲事宜上諭軍機大臣曰策凌策凌烏巴什等自歸降以來感朕厚恩奮勉效力今移至額爾齊斯舊游牧地方遣使請定輪班朝覲之期具見誠悃伊等遣使請安毋庸立定期限每年原應遣人來京領俸若於遣使請安之時支領俸餉事屬兩便至輪班朝覲一事都爾伯特部落著分作三班每年輪值一班來京入覲即於明年為始應何處盟長帶領王公台吉等來京交該盟長等酌量定議具奏至伊等遷回舊游牧後自需馬匹應用著施恩將從前領赴軍營應交馬駝等項展限至戊寅年交還以示體恤再從前舒明等奏請安插達什達瓦部落人衆於和通鄂博布拉罕察罕托輝地方原因卡倫內額克阿喇勒等處現有都爾伯特人等居住是以如此籌辦今都爾伯特人等既經遷去所有達什達瓦人衆著即在額克阿喇勒地方游牧命都爾伯特扎薩克多第巴之子尼爾完齊承襲扎薩克諭駐劄烏里雅蘇台辦事大臣舒明等擒拏青滚雜卜事宜上諭軍機大臣曰舒明等奏沙喇布魯圖等卡倫所派和托輝特台吉兵丁聽從青滚雜卜私行棄卡潛回等語前因青滚雜卜雖私行撤兵尚無背叛形跡姑俟哈達哈等回時再行辦理今其罪狀已著不容稍緩著傳諭舒明等此時如哈達哈等已回即㑹同辦理否則即將現在駐劄兵丁酌量調遣㑹同親王成衮扎布得親扎卜桑寨多爾濟及塔爾瑪善等同至和托輝特游牧即將青滚雜卜并伊妻子拏解來京其屬人內聽從指使人等俱著擒拏正法俾衆人知所畏懼朕念青滚雜卜之祖博貝舊勳不忍削其封爵仍著額林沁之子旺布多爾濟承襲貝勒其屬人等俱查出交旺布多爾濟管轄上年青滚雜卜至伊犂時收取達瓦齊之物甚多一一查出有應解京者即行解京餘著賞給效力官員人等並將從前進兵時掠取馬匹牲隻等一併查出歸公充用阿蘭泰著仍留納米爾沙扎海軍營辦理事務俟青滚雜卜拏獲後再將擅棄卡倫之台吉兵丁等查明從重治罪諭定邊左副將軍哈達哈協擒青滚雜卜事宜上諭軍機大臣曰青滚雜卜叛跡已著舒明等㑹同親王成衮扎布等領兵擒拏哈達哈自哈薩克回時務宜趲行㑹同辦理即已後期亦可堵禦青滚雜卜逃竄之路更為妥協再多爾濟策登亦係和托輝特部落今既辦理青滚雜卜若不行告知恐伊反生疑懼著哈達哈留心試看果其人無可疑則將擒拏青滚雜卜之事明白諭知且告以係青滚雜卜一人之罪與伊無涉令伊協力擒拏事後尚當格外加恩若不可深信即無庸告知并將伊拏送京師哈達哈務宜詳愼辦理癸巳命安插沙克都爾曼濟人衆於巴里坤上諭軍機大臣曰雅爾哈善奏和碩特汗沙克都爾曼濟及達什達瓦部落特古斯哈什哈之妻俱率領所屬由朱爾都斯向巴里坤前來等語沙克都爾曼濟上年來京入覲朕見其為人誠實深感朕恩今因其舊游牧地方無以資生跋涉遠來殊堪憫惻準噶爾頻年不靖自相蹂躪厄魯特等生計自不免艱難然使台吉等各收集屬衆在各游牧地方耕種牧養善自謀生不過一二年間元氣即可全復今沙克都爾曼濟等雖向巴里坤前來究非本土難以久居况現在喀爾喀地方居住之都爾伯特輝特和碩特人等俱令移回舊游牧又節次傳諭伊等嚴禁盜賊各安本業則沙克都爾曼濟等自宜仍回本處但甫經遠至復令遷回不免勞頓轉瞬又屆冬令行走稍艱今年即令沙克都爾曼濟等暫住巴里坤地方俟明春再議遷回雅爾哈善將此詳悉曉諭伊等並查明戶口人數酌量賞給口糧以資食用其達什達瓦部落人衆亦量為賞給即令由阿濟必濟卡倫前赴阿爾台會同達什達瓦人等一併居住著交與富森辦理甲午命以德都摩垓圖古里克等地仍給哈密回人耕種上諭軍機大臣曰黃廷桂奏據哈密貝子玉素富呈稱從前哈密回人所種德都摩垓圖古里克等處地方仍請賞給耕種等語哈密回人生齒日繁現在準噶爾全部底定無庸於此等地方更設卡倫著施恩將德都摩垓圖古里克地方仍賞給回人耕種命議敘副將滿祿等上諭軍機大臣曰據達爾黨阿等奏副將滿祿參將邁斯哈等護送軍營馬匹甚屬妥協滿祿邁斯哈奮勉急公著交部議敘原任定西將軍策楞疏奏逆黨巴顔正法策楞奏言前侍衛中秋拏獲厄魯特巴顔解至軍營臣等將伊所告阿逆帶領哈薩克兵三萬前來之語詳悉訊問實係揑造希圖搖惑衆心因即將巴顔正法奏入報聞八月戊戌命議敘喀爾喀親王桑寨多爾濟上諭軍機大臣曰桑寨多爾濟等奏青滚雜卜擅撤卡倫兵丁業經派兵接續并將台吉阿雅喇等傳布青滚雜卜撤兵原文查出呈覽桑寨多爾濟辦理甚屬妥協著交部議叙俟擒獲青滚雜卜時并將台吉阿雅喇等一並擒拏勿令脫逃至棄卡兵丁皆係䝉古無知之人著加恩寬宥免其治罪并通行傳諭各卡倫台吉兵丁等果能悔悟速回本卡者台吉即指名具奏其兵丁酌量賞賜辛丑命安插伯什阿噶什烏巴什等屬人於額克阿喇勒地方上諭軍機大臣曰前降㫖令達什達瓦部落人衆赴額克阿喇勒地方游牧今舒明奏稱伯什阿噶什烏巴什等前來入覲其屬人在青吉勒暫住等語其地已與卡倫甚近著一併令赴額克阿喇勒地方居住俟明年再令遷回舊游牧壬寅命喀爾喀貝勒策卜登協拏青滚雜卜上諭軍機大臣曰前據舒明等奏喀爾喀貝勒策卜登亦撤兵擅回朕意策卜登不應為青滚雜卜所惑今復奏伊在納林喀喇地方暫行駐兵聽待調遣等語看來實非聽信青滚雜卜之言果不出朕所科至伊稱郭勒卓輝博博等俱已逃入俄羅斯不必遣兵追逐所見甚是著傳諭策卜登即帶所有兵丁會同親王成衮扎布等速往和托輝特擒拏青滚雜卜伊係喀爾喀舊人今見青滚雜卜負恩背叛必深為痛恨務奮力擒拏以雪衆喀爾喀之恥癸卯命理藩院尚書納延泰馳驛前往北路軍營查辦事務甲辰申諭烏里雅蘇台辦事大臣舒明等擒拏青滚雜卜事宜上諭軍機大臣曰納穆扎爾奏稱青滚雜卜叛跡已著恐衆喀爾喀等俱為煽惑遂向伊等曉示利害等語納穆扎爾辦理甚是喀爾喀等不免為青滚雜卜搖惑然亦不過無知之輩其世受國恩明白事體者决不應出此著傳諭舒明等遵㫖即行辦理並明白曉諭喀爾喀王公等令其協力擒拏毋墮奸計再據巴蘭泰奏巴勒達爾達什丕勒齊旺等告稱聞青滚雜卜欲虜掠伊等游牧伊等俱回至游牧豫備等語看此情形愈宜即為擒治舒明等務期妥速辦理駐劄巴里坤辦事大臣雅爾哈善等疏奏回人莽噶里克遣子白和卓入覲日期雅爾哈善等奏言臣等遵㫖曉諭回人莽噶里克暫留部落約束屬衆令伊子弟中派出一人入覲今據莽噶里克遣伊子白和卓入覲於七月二十七日自巴里坤起程進京奏入報聞乙巳命授喀爾喀親王成衮扎布為定邊左副將軍上諭軍機大臣曰親王成衮扎布舊任將軍今定邊左副將軍哈達哈撤兵將回著授成衮扎布為定邊左副將軍哈達哈回時將印信交與掌管成衮扎布接到諭㫖即辦理將軍事務帶兵前往和托輝特擒拏青滚雜卜舒明阿蘭泰桑寨多爾濟得親扎卜塔爾瑪善等俱著授為參贊大臣桑寨多爾濟如尚未同舒明進兵即在彼處㑹同阿蘭泰辦理馬匹事務命申諭喀爾喀王公等上諭喀爾喀王公等曰副都統巴蘭泰奏稱扎薩克圖汗巴勒達爾等屬人揚言青滚雜卜欲搶掠衆喀爾喀等游牧伊等俱回游牧防護等語青滚雜卜負恩背叛種種不法早應擒拏治罪今又欲搶掠喀爾喀等游牧情理更屬可惡喀爾喀衆王公等皆沐國家厚恩自不為青滚雜卜煽惑朕可深信巴勒達爾等之歸保游牧亦無庸深責但青滚雜卜欲搶掠喀爾喀伊獨非喀爾喀之人自相戕賊伊將焉往即如羅卜藏丹津逃竄準噶爾已數十年今伊犂底定尚不能逃天網若俄羅斯不容留內地逃人亦爾等所知者青滚雜卜不過逞其奸詐搖惑衆心朕已早料其無能為也至巴勒達爾等聞有將喀爾喀王公盡行拏問之語其為青滚雜卜奸計更屬顯然喀爾喀王公等數年來效力戎行朕加恩體恤無所不至惟額林沁多爾濟達木巴扎卜等二人貽誤軍務不得已治以應得之罪此外之優封晉秩者不可勝計即以青滚雜卜而論上年略知奮勉即施恩晉封郡王其種種不法之處皆曲為寬宥今乃肆行背叛理應絶其封爵朕尚念其祖父舊勳令旺布多爾濟承襲貝勒朕辦理庶政一秉至公毫無偏倚特為詳悉曉諭爾喀爾喀王公等務宜遵朕訓示黽勉效力無為浮言所惑自取罪戾命布魯勒之子瑪木特承襲公爵上諭軍機大臣曰厄魯特公布魯勒之子瑪木特同輝特汗巴雅爾等遣使來京請安詢知布魯勒上年出痘身故其公爵尚未承襲因特施恩令瑪木特承襲布魯勒公爵但外藩王公扎薩克等襲職俱由該盟長等擬定應襲之人報部奏請今噶爾藏多爾濟等係新降之人不諳定例未經報部著傳諭兆惠遍行曉諭嗣後有事故應行襲爵之人該盟長等報明該部奏請不得援此次瑪木特之例丙午命喀喇沁貝子瑚圖靈阿郎中噶木布馳驛前往北路軍營清查臺站命哲卜尊丹巴胡土克圖等曉諭喀爾喀事宜上諭哲卜尊丹巴胡土克圖等曰青滚雜卜負恩背叛種種不法已屢降㫖曉諭衆喀爾喀等喀爾喀王公等世受國恩自必切齒痛恨雖駐劄卡倫臺站台吉兵丁亦有為青滚雜卜所惑擅回游牧者此皆無知之輩斷非有心黨惡此時如已回至卡倫臺站朕自格外寬宥不加譴責若仍觀望不前一經查出定行從重治罪胡土克圖乃喀爾喀部落供養大喇嘛尚卓特巴喇嘛係代胡土克圖辦理事務之人應於爾等信任之沙畢納爾內揀選數人前往各游牧曉諭俾知安分守法毋為浮言所惑丁未命遣烏梁海總管赤倫協擒青滚雜卜上諭軍機大臣曰舒明等奏青滚雜卜現在游牧居住其屬衆移居唐努山地方等語唐努山離新烏梁海甚近著舒明等選派侍衛數員同桑寨多爾濟護衛都喇勒遣往新烏梁海曉諭總管赤倫帶兵協擒青滚雜卜赤倫果能奮力朕自格外加恩命奬賞扎薩克台吉遜都卜等上諭軍機大臣曰普慶等奏辦理值班事務扎薩克台吉遜都卜及管理馬匹扎薩克台吉承衮扎卜等人甚誠實俱能約束屬人又協理台吉達瑪林接續臺站行走奮勉等語遜都卜等甚屬可嘉著賞給荷包以示奬勵俟拏獲青滚雜卜後另行加恩值班地方乃伊等聚集之處著抄録朕㫖遍行曉諭至貝子諾爾布扎卜公多嶽特等擅帶牧放馬匹私回游牧著交將軍成衮扎布查辦並令其即往原駐劄處管理馬匹伊等不諳法度此次姑從寬免如更有誤差委朕必重治其罪戊申命西北兩路將軍等暫停進兵哈薩克上諭軍機大臣曰達爾黨阿哈達哈等前往哈薩克擒拏阿逆今天時漸寒馬力亦恐疲乏如阿逆尚未就擒毋庸更為深入著傳諭一面撤兵一面曉諭阿布賚朕念哈薩克係邊遠部落以一逃人之故大兵久壓其境使伊等不得安居是以暫行撤兵以圖再舉達爾黨阿哈達哈等即將厄魯特兵丁遣回各游牧自行輕騎帶兵速由阿爾台一路前行併力擒拏青滚雜卜其後隊兵丁亦派員帶領陸續而行即此時青滚雜卜已經就擒亦須帶兵赴喀爾喀各游牧善為安撫并諭哈寧阿仍遵前㫖帶兵數百名前往伊犂㑹同兆惠辦事己酉命綏遠城將軍富昌等選派兵丁聽候調遣上諭軍機大臣曰親王成衮扎布領兵擒拏青滚雜卜諒不日即可就擒但恐尚有需用內地兵丁之處應豫為派定著傳諭綏遠城將軍富昌於所轄兵丁內揀選二千名豫備候朕㫖到日即帶領起程并諭吉林將軍額爾登揀選馬數千匹解往黑龍江以應打牲索倫等處兵丁調遣之用其西林郭勒盟長親王品級索諾木喇卜坦厄魯特貝勒羅卜藏多爾濟等游牧與喀爾喀甚近倘或需添派兵丁即於此二處各選兵一二千名聽候調遣並傳諭黃廷桂速赴寧夏㑹同羅卜藏多爾濟等商辦馬匹及賞給兵丁事宜庚戌命仍授蘇巴什里公爵賞銀三百兩同侍衛誠林馳驛前往軍營辦理臺站事務命郡王策布登扎布協同親王成衮扎布辦事上諭軍機大臣曰朕命親王成衮扎布為定邊左副將軍擒拏青滚雜卜應需人協同辦理伊弟策布登扎布現在軍營著傳諭哈達哈即令策布登扎布㑹同富德帶兵五六百名速行回至成衮扎布處辦事命副都統阿爾斌領兵赴烏里雅蘇台上諭軍機大臣曰昨降㫖令富昌選派兵二千名聽候調遣現在烏里雅蘇台內地兵丁甚少地方緊要著即於所選兵丁內先派一千名交副都統阿爾斌鶴山先行帶往駐劄餘著富昌續行帶往辛亥命授納穆扎爾得木楚克為參贊大臣上諭軍機大臣曰納穆扎爾照管輝特人等已回各原游牧現在無事著與得木楚克同赴將軍成衮扎布處辦事俱著在參贊大臣上行走命授扎薩克台吉遜都卜承衮扎卜等公爵上諭軍機大臣曰據普慶等奏扎薩克台吉遜都卜承衮扎卜告稱得親扎卜給一無印文書傳令伊等散回游牧伊等未經聽從等語遜都卜承衮扎卜深曉大義甚屬可嘉著加恩賞給公爵又據奏稱貝勒車木楚克扎布接續臺站亦屬奮勉著賞給荷包以示奬勸至得親扎卜給發無印文書傳散人衆或係他人假冒伊名亦未可定姑從寬不必深究著傳諭得親扎卜速飭所屬仍回各所派地方接續臺站安設卡倫不得稍有貽誤命定西將軍達爾黨阿等查辦貝勒策登扎卜等上諭軍機大臣曰昨已降㫖令達爾黨阿哈達哈等撤兵㑹同成衮扎布擒拏青滚雜卜今喀爾喀貝勒策登扎卜復棄其所管臺站而貝勒策卜登亦私回游牧伊等係世受國恩之人乃目無法紀深為可恨著傳諭達爾黨阿等回至軍營時將策登扎卜等傳齊聽候調遣如少有可疑即將伊等一併擒拏治罪壬子命以青滚雜卜背叛罪狀宣諭中外上諭大學士曰和托輝特青滚雜卜乃喀爾喀內一小部落無足比數者上年跟隨班第等出兵伊犂始則趨奉班第後見阿逆潛蓄叛志亦隱有二心與賊交結及見朕辦理額林沁多爾濟之後心懷疑懼自軍營私行逃歸遂將伊卡倫臺站兵丁盡行撤回并布散浮言多方煽惑衆喀爾喀人等亦有竟棄臺站潛歸游牧者在衆喀爾喀斷不因伊一人負固即生叛心然青滚雜卜則已逆跡顯著不得不明正其罪現已命親王成衮扎布為定邊左副將軍督師擒拏自可計日授首并屢經降㫖曉諭衆喀爾喀等協力擒𠞰如能即行獲獻自可無煩師旅即不然則就近調遣布置我之兵力已足戡定况現今準噶爾盡入版圖其北則俄羅斯境地伊即欲竄逃斷不能脫身遠揚適足見其狂愚自取誅滅耳况朕年來辦理準噶爾一事本意原非得已試思策凌策凌烏巴什等來降天朝豈可拒而不納至阿逆率衆來歸若使深加拒絶伊有不早肆劫掠為患於喀爾喀者乎繼而狡賊中叛勢不得不命將追擒如令置而不問伊必潛據伊犂侵擾無已是朕之前後興師問罪者全為保護衆喀爾喀游牧而青滚雜卜轉以用兵致纍為詞流言四布在衆喀爾喀怯懦性成妄生疑懼於雍正年間用兵之際即屢有劫奪之事旋亦綏靜今經朕曉諭之後揆其事理青滚雜卜孤立之形已見自可計日就縛於西陲大勢本無關輕重但其反覆背恩實出情理之外恐我內外臣工未能周悉用將辦理緣由宣諭知之癸丑賊黨阿巴噶斯等正法上諭軍機大臣曰刑部監禁阿巴噶斯庫什克什木等本應俟阿逆擒獲時一同正法今已患病垂斃著即行凌遲以彰國憲擅殺宰桑恩克博羅特之綽克察等正法上諭軍機大臣曰兆惠奏查出擅殺宰桑恩克博羅特之得木齊綽克察等請㫖正法等語著照所奏辦理其查拏綽克察等之得木齊策凌巴布和托甚屬奮勉著加恩補授佐領並賞給孔雀翎以示鼓勵命封回人莽噶里克公爵授宰桑賽齎喇呼散秩大臣上諭軍機大臣曰據兆惠奏吐魯番回人莽噶里克懇請將伊屬衆編次旗分佐領等語莽噶里克感戴朕恩甚屬可嘉著施恩封授公爵即照額敏和卓之例編次旗分佐領再宰桑賽齎喇呼得木齊之子阿卜濟爾噶爾等將盜竊臺站馬匹賊人擒拏亦屬可嘉著授賽齎喇呼為散秩大臣賞緞二匹阿卜濟爾噶爾等賞緞一匹銀二十兩以示鼓勵乙卯命綏遠城將軍富昌等帶兵接續臺站上諭軍機大臣曰納延泰奏喀喇沁二十七八等臺站為喀爾喀賊人搶掠已交臺站附近王車林拜都卜等部落人等查拏賊人並向歸化城調兵接續臺站等語辦理甚是前已降㫖諭富昌派兵二千名前往烏里雅蘇台又派公蘇巴什里侍衛誠林㑹同達松阿等將喀喇沁臺站安設至烏里雅蘇台並據蘇巴什里等奏聞安設妥協著再傳諭富昌先派兵三百名作速起程馳赴並著瑚圖靈阿保德速往察哈爾四旗選兵一千名帶領至烏里雅蘇台接續臺站查拏賊人其車林拜都卜上年進兵伊犂病故應襲王爵未經該盟長等擬請承襲今著加恩即令伊子丹衷多爾濟承襲務將搶掠臺站賊人令其擒拏治罪丁巳命公敏珠爾多爾濟領兵赴北路軍營上諭軍機大臣曰公敏珠爾多爾濟著授為營長帶領察哈爾兵丁馳驛前往北路軍營並派侍衛敏珠爾等九員及司員留保柱等齎諭送往哲卜尊丹巴胡土克圖處曉諭戊午命章嘉胡土克圖赴喀爾喀㑹盟上諭喀爾喀王公等曰爾衆喀爾喀世受國恩今因和托輝特青滚雜卜煽惑竟有擅棄卡倫臺站私回游牧者應即發兵致討已派滿洲䝉古內扎薩克等兵丁分路前往繼思爾等無知負恩一朝殄滅心實不忍是以特派章嘉胡土克圖率同內地大臣及內扎薩克王公等令赴鄂爾昆塔米爾等處齊集爾喀爾喀衆王公等會盟爾等果能感念國恩深悔誤聽青滚雜卜之罪即曉諭擅棄臺站卡倫人等仍回各處當差協力擒拏青滚雜卜不惟寬宥爾罪並將格外加恩倘爾等力弱不能擒拏朕自派兵辦理亦不爾責爾等如能遵朕諭㫖朕即將現在已發兵丁酌量撤回使爾等照舊安居毫無侵擾爾等其深思熟計一切與章嘉胡土克圖陳明轉奏其哲卜尊丹巴胡土克圖係爾衆喀爾喀供養喇嘛亦著前來㑹盟命授察罕鼐濟為頭等侍衛齊里克特衣為三等侍衛馳驛前往尚書納延泰處聽候差遣命安插厄魯特達瑪林等上諭軍機大臣曰據雅爾哈善等奏厄魯特達瑪林禀稱伊係額駙阿保屬人從前出征和通呼爾哈淖爾時為準噶爾所虜今帶領妻子并所屬布庫勒等四十戶投來等語達瑪林既係厄魯特郡王額駙阿保屬人即交與阿保之子貝勒羅卜藏多爾濟游牧內安插其布庫勒等四十戶著交兆惠於二十一昂吉內歸併居住議定吐魯番回人疆界事宜定邊右副將軍兆惠疏奏回人額敏和卓遷至魯克察克地方應與回人莽噶里克所屬地方畫定疆界事宜一摺得㫖軍機大臣議奏尋議吐魯番東界自闢展至喀喇和卓地方原係額敏和卓所居舊地應仍給與額敏和卓管轄其西界自伊拉里克至阿斯塔克地方應令莽噶里克管轄至額敏和卓懇借麥種一千石俟明年收穫後交還籽種一千石外再交麥一千石次年交三千石自第三年為始每年交四千石莽噶里克亦請自明年為始交麥五百石應照所請借給所有每年交納麥石應令副將軍兆惠指定何地運往存貯回人額敏和卓等永遠輪納麥石應酌量賞賜布匹茶葉等物以示鼓勵請交與總督黃廷桂查議請㫖賞給再額敏和卓請於托里布拉克他呼那呼齊克塔木闢展等五處每處各設兵五名馬十匹馳遞事件其伊拉里克等處亦令莽噶里克派人安設臺站專司馳遞奏入上從之己未命授貝勒達什丕勒郡王品級上諭軍機大臣曰據誠林等奏喀爾喀貝勒達什丕勒帶領屬人自二十五臺至二十九臺接續臺站等語達什丕勒甚屬奮勉著加恩授郡王品級其搶掠臺站之人查係得親扎卜等四旗所屬該扎薩克人既衆多所有此等愚妄無知之輩或不能遍行覺察著傳諭將軍成衮扎布轉飭得親扎卜等嚴行查出將為首搶掠者即行正法其餘概從寬免庚申命派兵協擒青滚雜卜上諭軍機大臣曰北路臺站俱經接續其調往綏遠城及察哈爾兵丁除補設卡倫臺站之外餘著俱赴將軍成衮扎布處㑹同擒拏青滚雜卜瑚圖靈阿富昌保德哲庫納阿爾斌領兵到彼俱著授為參贊大臣隨同成衮扎布辦事尚書納延泰親王得親扎卜留駐烏里雅蘇台會同普慶等查出搶掠臺站人等審明正法辛酉諭定邊右副將軍兆惠駐兵防守事宜上諭軍機大臣曰據兆惠奏稱大兵自哈薩克撤回應酌定駐劄地方已與圖什墨勒扎爾呼齊等商議在空格斯安集哈雅等處駐兵防守等語大兵駐劄原為保護衆厄魯特游牧應在衆厄魯特游牧之外周圍布置設遇哈薩克侵擾大兵即行抵敵或再調厄魯特兵同禦方合機宜且使厄魯特等知大兵全為保護伊等起見愈加感戴兆惠即曉諭圖什墨勒扎爾呼齊等遵照辦理不必泥定何地再大兵撤回後坐臺兵丁亦應裁汰所有厄魯特坐臺人等俱令回至各游牧惟酌派察哈爾兵丁安設臺站倘有不敷再添派緑旗兵丁同往辦理壬戌上駐蹕張三營都爾伯特親王伯什阿噶什貝子烏巴什等入覲命賜筵宴癸亥命議敘定邊左副將軍成衮扎布等上諭軍機大臣曰定邊左副將軍成衮扎布及親王得親扎卜感戴朕恩聞逆賊青滚雜卜背叛即與衆㑹盟調集兵丁復令哲卜尊丹巴胡土克圖曉諭衆喀爾喀等共圖擒賊甚屬可嘉著交部議敘此時成衮扎布亦毋庸領兵赴納米爾沙扎海㑹同得親扎卜致稽時日惟應速行進兵擒拏逆賊並曉諭衆喀爾喀等毋為浮言煽惑自取罪戾至舒明阿蘭泰等不能早擒逆賊反致衆人疑懼如巴勒達爾達什丕勒等屬人俱擅自棄回游牧皆由伊二人辦理不善之故已命納穆扎爾為參贊大臣協同將軍辦事著成衮扎布將舒明阿蘭泰撤回詢明伊等前後辦理情節據實具奏甲子命定邊左副將軍成衮扎布查拏貝勒策卜登等上諭軍機大臣曰據烏里雅蘇台辦事大臣等奏貝勒策登扎卜策卜登等俱私回游牧等語策登扎卜人本庸懦雖私回游牧不過誤聽浮言所致無庸深究惟貝勒策卜登係喀爾喀舊人受恩深重乃亦棄其職守擅自逃回情甚可惡著傳諭將軍成衮扎布將策卜登拏解來京前曾降㫖旺布多爾濟令其擒拏青滚雜卜即將伊承襲貝勒如不行擒獻應與青滚雜卜一體辦理其屬人即著賞給將軍成衮扎布再貝勒品級車木楚克扎布前在軍營甚著勞績此次接續臺站亦屬奮勉著加恩封為貝勒管理臺站台吉扎木揚因阻止臺站人逃散反被擒執甚屬可憫應如何加恩之處著成衮扎布奏聞請㫖乙丑命奬賞出征哈薩克官兵上諭軍機大臣曰達爾黨阿哈達哈等奏稱領兵赴哈薩克擒拏阿逆兩次與哈薩克交戰斬獲甚多等語達爾黨阿哈達哈等領兵深入奮勇可嘉哈達哈前已賞給雙眼翎達爾黨阿亦著賞給所有效力官兵俱著達爾黨阿等查明奏聞交部議敘前已降㫖令伊等暫撤大兵此時自應接到仍著遵前㫖辦理脫逃阿逆皆由策楞玉保二人遲誤退縮之罪今玉保雖同赴哈薩克並未立功策楞亦領兵繼進皆因接朕屢次訓飭之㫖勉强前赴初非出於本心伊二人之罪實屬萬無可逭著達爾黨阿等由哈薩克回時仍遵前㫖將策楞玉保拏解來京治罪扎拉豐阿係䝉古人且未經更事其罪尚與策楞玉保二人有間前已革去王爵仍著加恩授為貝子公明瑞派往軍前行走迅速此次同達爾黨阿等奮勇行陳甚屬可嘉著授為副都統額爾登額亦能效力自贖著加恩授為頭等侍衛命奬諭喀爾喀親王桑寨多爾濟等上諭軍機大臣曰參贊大臣喀爾喀親王桑寨多爾濟感戴朕恩將擅棄卡倫人等力為阻止甚屬可嘉現在軍營正在需人毋庸前來入覲著即赴將軍成衮扎布處協辦擒賊事務又濟福達禮善率領得親扎卜之子諾爾布扎卜接續臺站辦理妥協濟福著授為副郡統達禮善著授為二等侍衛其諾爾布扎卜果能奮勉出力即行奏聞加恩平定準噶爾方略正編卷三十
