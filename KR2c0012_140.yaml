body:
  text: 乾隆二十五年三月庚戌命犒凱旋之索倫等官兵上諭軍機大臣曰兵部奏稱凱旋之索倫吉林察哈爾等官兵經過京城請於德勝門外敎塲暫為休息再行起程等語所奏甚是伊等俱軍前効力之人咫尺京師若即令遄行非所以示體恤現在各隊官兵陸續到京著内務府大臣㑹同特派之御前大臣侍衛等照看賜以飯食稍為休息再令其各回本處命將軍兆惠等查奏官兵親屬陣亡人數上諭軍機大臣曰軍營効力有功及陣亡官兵等俱據奏節次勅部議叙議卹至父子兄弟祖孫三人内有二人陣亡者即未著有勞績而情尤可憫自應格外加恩著將軍兆惠等陸續查奏命優卹陣亡官兵奴僕等上諭軍機大臣曰軍營効力有功及陣亡官兵朕皆分别加恩叙卹至官兵奴僕陣亡均屬為國捐軀自當加恩議卹著查明交部若官員奴僕陣亡將伊子弟准其開戸為民如係兵丁奴僕著酌賞伊主身價亦准其為民即照陣亡例議卹其昭忠祠祭祀列名於兵丁之次以示優奬諭御前侍衛署副都統安泰等辦理哈薩克入覲事宜上諭軍機大臣曰安泰等奏稱哈薩克阿布勒瑪木比特阿布賚等遣呼圖拜阿塔賚等至烏魯木齊恭進馬匹並求入覲謹將奏章封進等語看來哈薩克等恭順有加著降勅奬諭俟納旺抵烏魯木齊安泰即令其同往仍傳諭來使云已代爾等奏請入覲恩㫖派侍衛薩穆坦䕶送來京沿途行走亦不必過急一日約百里以外併傳諭黒龍江將軍綽爾多前所派索倫兵一千若尚未派出即行停止或業已整裝亦令其在該處候㫖併傳諭成衮扎布等知之賜哈薩克阿布勒瑪木比特阿布賚等勅書皇帝勅諭哈薩克阿布勒瑪木比特阿布賚阿布勒比斯哈巴木拜等去歳爾等哈薩克之人搶掠烏梁海我將軍大臣等即欲興師問罪朕因爾阿布賚等歸誠已久須詢問確實續因爾等貿易之人告稱搶掠烏梁海係爾處之巴魯克巴圖魯則與爾等無渉但爾等受朕深恩若力能擒獻巴魯克巴圖魯更見悃誠特遣侍衛納旺傳諭尚在中途爾等已遣使貢馬並求入覲或爾等知烏梁海被掠之事悚懼祈請以昭恭順朕益鑒爾等誠意爾等但遵㫖將搶掠烏梁海等所獲察出送還即巴魯克巴圖魯亦尚可加恩曲宥嗣後惟約束所部以安生業至爾等所奏遵㫖與布魯特和好而去年貿易人等為所掠奪等語凡爾等外藩使人來京朕皆面諭以和輯鄰部將來布魯特入覲必更加訓諭務使守法安生不至互相戕賊爾等來使已命侍衛等䕶送來京至日自加恩賞今以降勅賜緞各四端爾等其祗受敬悉特諭賜御前頭等侍衛敦察拜哈巴圖魯號賞銀一百兩壬子諭巴里坤辦事道銜同德等解送葉爾羌馬匹上諭軍機大臣曰同德等奏稱准楊應琚咨將巴里坤牧馬一千一百八十餘匹交存泰於三月十五日起程由朱爾都斯賽里木一路送往葉爾羌等語近據舒赫德奏請送馬三千匹朕以五吉業已送馬二千匹諭同德再選一千匹送往今所奏與朕㫖相符著沿途加意照看牧放毋致傷損遺失癸丑諭參贊大臣舒赫徳等補授各城阿竒木伯克上諭軍機大臣曰舒赫德等奏烏什阿竒木伯克員缺甚屬𦂳要請以玉素富之弟阿卜都拉補授又據阿桂請以拜城阿竒木伯克噶岱黙特補授咨送奏稿前來查和闐六城之阿竒木伯克尤屬𦂳要請以噶岱黙特調補其拜城之缺令伊子阿卜都喇瑪補授照英噶薩爾等城例作為四品等語烏什阿竒木伯克著阿卜都拉補授和闐阿竒木伯克著阿什黙特補授喀什噶爾阿竒木伯克著噶岱黙特補授葉爾羌阿竒木伯克著鄂對調補阿克蘓阿竒木伯克著色梯巴勒氐調補英噶薩爾阿竒木伯克著索勒屯和卓補授其拜城阿竒木伯克作為四品即著阿卜都喇瑪補授甲寅諭㕘贊大臣阿桂等伊犁辦事屯田各事宜上諭軍機大臣曰阿桂奏稱官兵回人過穆素爾嶺時即領兵二三百名在呼爾岱等處捜捕嗎哈沁令伊柱先往海努克督課回人耕作若豐訥亨已到即與同行否則暫留阿克蘓俟五吉送馬到日續來接濟等語所辦甚是伊犁辦事需人常亮現在丁憂來京著即帶關防馳驛前往交阿桂收掌協同辦事又所奏圖桑阿固世衡現在葉爾羌請派調一員等語俱著前往伊犁協辦又所稱官兵行糧例載滿洲索倫等兵丁月支羊三隻綠旗兵月支二隻現在伊犁未通貿易綠旗兵於開墾營造亦屬勤勞請一體支給俟秋收後再照舊例等語著照所請行來年所發屯田兵丁秋收前亦照此辦理其烏什之貧回五百餘人亦准將霍集斯所存糧石酌量借給以為籽種秋收時照數扣還併傳諭舒赫徳知之丁巳諭定新疆鬬毆殺人之例上諭軍機大臣曰永寧等奏稱固原州回民林福與民人馬友飲醉互毆扎傷馬友殞命將林福擬以絞候解送巡撫衙門報部入於秋審案内等語哈密尚與肅州相近若伊犁葉爾羌等處又焉能長途解送肅州此等新定地方立法不可不嚴將來内地貿易人民與回人雜處凡鬬毆殺人之案即應於本處正法庶凶暴之徒知所儆畏非可盡以内地之法治也著傳諭各該駐劄大臣等遇有似此案件即遵照辦理俟新疆一切就緖再降諭㫖其林福一犯不必解送肅州著即行正法己未上御同樂園召哈密郡王品級貝勒玉素富郡王品級貝勒霍集斯貝勒品級貝子鄂對等四十六人賜衣服茶果諭定邊左副將軍成衮扎布等辦理都爾伯特屬人事宜上諭軍機大臣曰成衮扎布奏稱都爾伯特汗索羅木衮布之喀屯布尼達喇告稱自扎竒魯克齊䇿塔爾等滋事以來副管旗章京巴顔克什克等頗屬誠心効力請即以該章京等代䇿塔爾等之任等語策塔爾獲罪由巴顔克什克等告訐若即補其員缺則無知之徒又復以告訐為能妄生希冀且扎竒魯克齊現有和通辦理巴顔克什克等不過令其協助足矣其所查策塔爾等牲隻什物即令索羅木衮布分賞所屬不必歸公命以軍營解京回人等分别安插發遣上諭軍機大臣曰軍營陸續解送之回人内特穆爾汗之後裔莽蘓爾哈什木著加恩授為頭等台吉舊和卓之孫阿卜都爾璊和卓著加恩授為二等台吉歸併額色尹等佐領下安插其霍集占之舊索丕摩羅瑪里木等皆附和逆賊之人雖從寛免死未便留京著并其家口發往廣東福建浙江江南等處賞給官兵為奴命加賑陜省沿邊州縣上諭大學士曰上年陜省沿邊一帶偶被偏災業經加恩賑恤現屆青黄不接之際麥秋未至而例賑已停農民口食未免仍有拮据著再加恩將被災五分以上之定邊榆林葭州神木府谷懐遠等六州縣無論極次貧民俱加賑兩月被災五分之安定延川宜川等三縣俱加賑一月照例折給以資接濟該部遵諭速行壬戌命安置回部郡王品級貝勒霍集斯於京師上諭軍機大臣曰朕詢問霍集斯以烏什回衆等告伊父子情事據奏稱因回人等與伊不合是以被控今懇情留京等語其意殊屬誠切著照所請厚為資給安置京師但其先世墳墓遠隔故鄉著加恩將伊幼子托克托索丕遣回阿克蘓以供祭掃其烏什所有田産即行變價在阿克蘓置業賞給托克托索丕承管著舒赫德等遵照辦理仍傳諭該處回衆俾咸知朕意命䕶視回部舊和卓木等墳墓上諭軍機大臣曰逆賊霍集占等雖負恩肆惡自取誅戮至其先世君長一方尚無罪戾今回部全定喀什噶爾所有從前舊和卓木等墳墓可派人看守禁止樵採汚穢其應行修葺分例並著官為經理以昭國家矜恤之仁而外藩等亦共知所激勸著舒赫德新柱等即遵諭行癸亥諭陜甘總督楊應琚等停止購辦商駝上諭軍機大臣曰舒赫德楊應琚奏稱運送伊犁屯田兵丁口糧需駝三千餘隻除現存千餘隻外再將哈密闢展貿易人等所有駝隻採買一二千始足敷用等語伊犁駐兵屯田祗宜節次措辦阿桂等現在前往自應計其收穫何如再行添派兵丁則駝隻亦不能預定且官買商駝諸多未便設該商等聞風不前則緩急何所取資即著傳諭楊應琚速行停止仍將原奏議覆併諭伊等知之甲子諭參贊大臣舒赫德等酌調臺站馬匹上諭軍機大臣曰舒赫德奏稱由阿克蘓至伊犁臺站馬匹不足請將庫車所有之馬千餘匹選擇備用等語駐兵屯田關係𦂳要臺站馬匹必須充足今烏魯木齊所易哈薩克馬匹甚多著即酌量調用仍宜善為牧放不可因哈薩克貿易馬匹源源接濟遂可任其倒斃損傷著加意妥協辦理諭㕘贊大臣阿桂等辦理伊犁屯田事宜上諭軍機大臣曰阿桂奏稱現在辦理屯田兵丁回人等於二月二十五日起程伊柱亦陸續行走至阿克蘓督辦農具又凑出馬匹之伊沙噶頗拉特烏什辦事之葉爾羌噶雜納齊薩里等各賞給縀疋等語阿桂此次奮勉辦理甚屬可喜回人頗拉特等亦俱能急公趨事著加恩分别加賞縀疋以示鼓勵至所奏聞哈薩克有搶掠烏梁海之事伊等若來伊犁請體察情形加意防範等語哈薩克阿布賚等現在恭順有加其滋事特一巴魯克巴圖魯已命納旺前往傳諭索取若哈薩克等前來伊犁當佯為不知密加防範不必使回人等知之恐伊等性多疑畏於事無益至巡查塔爾巴噶台亦以屯田餘力酌量辦理不必過於急遽議新疆屯田糧運及設官駐兵事宜㕘贊大臣舒赫德阿里衮陜甘總督楊應琚等奏言來年前赴伊犁之滿漢兵丁四千名及大臣官員跟役等共需七個月口糧一萬零五百石屯田籽種一千五百石除羊隻抵支四千五百石外實運糧七千五百石需用駝三千餘隻除哈密闢展官駝一千餘隻尚須購買商駝一二千隻并於肅州等處辦買驢騾一千五百頭備用又臣等前奉諭㫖酌議新疆添設文武員弁請於伊犁阿克蘓葉爾羌各設總兵一員兵備道一員其同知通判都司遊撃及佐雜千把等員弁均按南北兩路情形添設列單恭呈御覽奏入得㫖軍機大臣議奏尋議伊犁屯田駐兵原係將來次第辦理之事未便以數千官兵回衆同時並集於久曠之地以増餽運之勞應俟阿桂辦理就緒視其足敷若干人口食再行酌量加増至採買商駝並非急需之務轉令貿易民人聞風疑懼而驢騾一項尤與口外不宜業經奉㫖停止應毋庸議至伊犁回部各處俱有辦事大臣已足控制逺近若添設鎮道以下各官既與口外體制不符而一切建造衙署添設俸工俱從内地經理更滋煩費且回衆不相浹洽易起猜疑殊未妥協亦毋庸議總之新疆非巴里坤哈密可比當因地制宜在回城固不宜久駐官兵即伊犁一帶亦仍當以滿洲將軍大員駐守統俟阿桂辦理一年之後再行酌辦可也奏入上從之戊辰命正藍旗䝉古都統新柱前往葉爾羌辦事所遺員缺以㕘贊大臣巴禄補授己巳上以回部各使人等於二十五日庚午起程御長春園澹懐堂賜哈密郡王品級貝勒玉素富郡王品級貝勒霍集斯貝勒品級貝子鄂對等四十六人宴畢召至同樂園賜茶果又諭軍機大臣曰此次入覲回人等賞賜頗多伊等亦有自置之物念其初來京師僱覔䭾載維艱是以官為辦理但伊等若視為成例亦非經久之道著䕶送大臣等善為曉示仍傳諭永寧此等回人至哈密時即用所留馬匹更換若原數稍有倒斃亦酌量代為僱覔起程毋庸官辦諭㕘贊大臣阿桂等曉示哈薩克事宜上諭軍機大臣曰成衮扎布奏據薩拉布拉克卡倫送到從哈薩克脱出之厄魯特和屯博勒等告稱現在哈薩克等游牧已遷移塔爾巴噶台又聞伊等因巴魯克巴圖魯搶掠烏梁海一事恐大兵查拏致累議令將人丁牲隻送還倘仍不從即當擒獻等語哈薩克遷移游牧之信其果否雖難遽定但伊等部落人衆素無約束或有數戸人口潛來居住亦未可知著傳諭阿桂酌派官兵數人往探虚實伊等果有踪跡即曉譬利害諭以此地為天朝平定將來辦理駐兵爾等從前在準噶爾時尚不敢越界此時豈可私行游牧立行驅逐出界併傳諭納旺見阿布賚時務即索取搶掠烏梁海之人或探知塔爾巴噶台有哈薩克等亦即以己意曉示阿布賚令其移回俱著伊等相機辦理授領隊大臣巴圖濟爾噶爾為内大臣庚午命陞賞安臺効力之伯克薩里等舒赫德奏言臣於二月十九日自葉爾羌起程三十日抵阿克蘓查詢應設臺站處所由阿克蘓至穆素爾嶺請設六臺嶺上無水酌為步站過嶺至海努克臺站人數酌量増添為三大臺俱派察哈爾總管敏珠爾原任副都統揚桑阿辦理至官兵需用馬匹惟烏什尚可酌派現在烏什之伯克薩里等願為承辦謹將臺站地名里數及官兵回人馬匹數目具奏奏入上諭軍機大臣曰伊犁臺站馬匹伯克薩里額塞木圖拉等願為承辦殊屬効力昨據舒赫德奏以阿卜都拉補烏什阿竒木之缺薩里即無職掌但遇有伊沙噶等缺亦可補授著傳諭舒赫德若烏什未有伊沙噶之缺則各城有伊應陞缺出亦可奏補仍與額塞木圖拉俱酌量奬賞縀疋諭㕘贊大臣舒赫德察核霍集斯等應得屬人産業上諭軍機大臣曰霍集斯霍什克伯克請留京居住將伊等帶來屬人及留住該處之戸口具奏又有烏什和闐哈密吐魯番應取來京之人及遣往原處回人俱加恩照所請行但霍集斯所請賞給伊子托克托索丕屬人内多伊族且産業頭緒繁多著傳諭舒赫德等查明伊所派屬人果係世代僕役即照所請賞給或乗便指派官人則不可給與其霍什克伯克請在和闐安插之耕種回人及哈喇哈什所屬巴塔木蘓扎等處房産是否舊日原業一併查明辦理如實係伊等故物絲毫不可令其入官若稍有影射不實斷不可任其得遂儌倖之計著將原奏一併録寄閲看命定邊左副將軍成衮扎布等停派喀爾喀等處兵丁及駐劄布延圖事宜上諭軍機大臣曰成衮扎布奏准策布登扎布等咨現在領兵三百前往布延圖應需預備口糧所有從前奏派喀爾喀兵一千名向塔爾巴噶台駐哈薩克邊界之處應行請㫖辦理等語前經安泰以哈薩克入覲貢馬情形具奏是阿布賚等恭順有加已將所調索倫兵一千名停止近日脫出之厄魯特等又有哈薩克人等欲擒獻巴魯克巴圖魯之語則喀爾喀扎哈沁之兵俱可不用策布登扎布前往布延圖之處亦可一併停止朕於軍行進止惟相度機宜必不肯徒勞師旅倘哈薩克將來竟不擒獻巴魯克巴圖魯其勢必須用兵俟臨時再降諭㫖定邊左副將軍成衮扎布解送都爾伯特汗索羅木衮布所屬欺主滋事之策塔爾等十四人至京命分别發遣廣東福建等處辛未命加索倫總管薩壘副都統職銜軍機大臣遵㫖查奏軍營官兵親屬陣亡較多之索倫馬甲登濟圖引見得㫖登濟圖著照驍騎校職銜即用壬申命吐魯番郡王額敏和卓之子木薩遇阿竒木缺即補上諭軍機大臣曰據楊應琚奏前往英噶薩爾勸導回人等耕種謀生令木薩明切曉示衆皆誠心聽受踴躍奮勉等語木薩係額敏和卓之子頗屬効力近將玉素富之弟阿卜都拉授為烏什阿竒木木薩自應加恩一體補用現在未有缺出著傳諭舒赫徳遇有各城阿竒木缺出時即以木薩奏補諭陜甘總督楊應琚等酌籌新疆屯牧事宜上諭軍機大臣曰據楊應琚奏巴里坤現存馬一千二三百匹而甘肅各營馬匹毎年例應出厰巴里坤一帶水草豐裕請於安西等五處提鎮標營摘撥三千匹赴巴里坤牧放即於此内撥出一千五百解赴阿克蘓其伊犁屯田需馬九百匹竟由巴里坤解往烏魯木齊預備其餘俱存巴里坤牧放備撥等語所辦自屬可行但不知内地馬匹是否足敷調撥若已經照數撥往則缺額竟不必亟於籌補甘肅綠旗額馬視他省較多原為邊防起見今西陲平定則各營馬匹不過供應差操足矣況巴里坤水草既佳同一牧放而於馬有益且省飼秣之費豈不甚便又如各營額缺有必須購補者即於哈薩克馬匹内酌量抽撥亦可不必於内地採買致費周章或秋冬之際有必須收槽馬匹臨時預爲奏聞至該督前奏伊犁等處設官屯田事宜已據軍機大臣議奏行知矣總之新疆自應次第經理不可懈弛亦無庸急遽惟各就本地情形因利乗便隨時酌辦以規久遠之計若又大費内地財力以為設官屯田之用殊屬無謂且軍務現已全竣而收買駝騾紛紛滋擾愚民轉致猜疑亦豈休息静鎮之道併傳諭舒赫德等知之甲戌諭巴里坤辦事道銜同德停辦商駝及稽察牧羣事宜上諭軍機大臣曰同徳奏准舒赫德等行文將巴里坤之馬於六月間挑選九百匹送往阿克蘓將駝騾驢頭内擇其臕壯者送往烏魯木齊其現有駝七十五隻又購買商駝四百餘隻俱於三月間緩行送往等語近因楊應琚以籌辦伊犁屯田駐兵各事宜具奏朕諭以次第辦理不宜急遽亦毋庸購買商駝今同德等業經據文辦理嗣後不必再行仍曉示商人以停止縁由則價值自然平減至巴里坤牧放馬駝一事據奏交齊大勇辦理齊大勇才具平常若經管未能妥協雖㕘處亦屬無益仍當留心稽察再於巴里坤滿員内派一人協辦賜打牲總管阿爾哈爾沁察達克齊巴圖魯號賞銀一百兩夏四月乙亥朔命賞給在京安置回人禄米上諭軍機大臣曰伯克霍集斯霍什克伯克額色尹瑪木特圖爾都和卓等安置京師著照伊等應得俸銀賞給禄米以資養贍嗣後在京安置回人俱遵照辦理丙子命索倫達呼里應授總管等官借補食俸上諭軍機大臣曰此次索倫達呼里等軍前甚屬効力因加恩額外補授總管副總管等官但缺少人多候補尚需時日著将候補總管副總管暫以佐領借補候補佐領驍騎校暫以驍騎校領催借補俱照原品給與俸餉俟應得缺出即補庶於伊等生計有益該將軍等即遵諭行議給索倫等官兵俸餉事宜黒龍江將軍綽爾多奏言欽奉恩㫖賞給打牲之索倫達呼里官員半俸揀選兵丁二千名賞給半餉查乾隆七年軍機處議覆呼倫貝爾博爾德曽經出兵之壯丁二千三百九十餘名俱給與錢糧候缺出裁汰至二十四年裁過一千三百三十餘名尚存一千五十餘名未便入於新選兵内請於軍前撤回之索倫達呼里等未得錢糧者㨂選二千名賞給得㫖軍機大臣議奏尋議索倫達呼里等向未給與俸餉今䝉恩軫念伊等効力軍前准照呼倫貝爾等官兵之例賞給自應於軍前撤回官兵内揀選不必將從前給餉候裁之人派入至撤回官兵等現始到京回抵游牧候該將軍等揀選即屆七八月之間請以八月初一日為始即行給與俸餉奏入上從之丁丑諭㕘贊大臣舒赫德辦理屯田事宜上諭軍機大臣曰舒赫德從前議奏伊犁屯田一時即欲移駐數千兵丁回衆朕見其意在作難降㫖訓飭嗣於㑹議屯田摺内並無一語提及阿桂前往伊犁一事其意特以阿桂奮然請行即謂與伊無與將來辦理若稍有掣肘當惟伊是問復經飭諭今據具摺回奏並請竭蹶自効著傳諭舒赫德伊非不能辦事之人一切惟宜實心盡力此時若與阿桂和衷商酌善為協力成全非特二人均任其功伊之出力仍當在阿桂之上其或意存沮抑則朕亦自能鑒察至所奏烏魯木齊牧放哈薩克馬匹於來年送往屯田處備用自後仍多為市易送至阿克蘓等語所見甚是馬匹就近撥用較之巴里坤辦解行走便易臕分亦足即照此辦理朕以屯田一事委之舒赫徳其加意勉之諭㕘贊大臣阿桂等㑹商捜捕逸賊事宜上諭軍機大臣曰舒赫德奏捜捕藏匿嗎哈沁一事擬咨商阿桂於抵伊犁時候馬匹送到即領兵赴伊犁上游渡特克斯向空格斯哈什捜捕安泰領兵往額林哈畢爾噶等處越博羅布爾噶蘓嶺至洪郭羅鄂博和洛霍澌齊齊罕車濟捜捕再循行伊犁河之阿布蘭山與阿桂㑹合等語著將原奏録寄阿桂等閲看伊等如馬力有餘即照此行走或稍有不足亦不必勉强仍將作何辦理情形具奏命陞叙三等侍衛齊克慎等上諭軍機大臣曰舒赫德奏三等侍衛齊克慎伊凌阿藍翎侍衛阿玉什從前大兵被遮在阿克蘓承辦事件及呼爾璊等處敗賊時俱屬奮勉西安馬甲髙士勉繕寫摺奏勤慎願留軍營効力等語齊克慎以辦理錢糧業經議叙陞用伊凌阿阿玉什俱著以應陞之缺即用髙士勉著以西安將軍衙門筆帖式坐補戊寅命加賞伯克薩里等縀疋上諭軍機大臣曰舒赫德奏稱伯克薩里等六人辦馬一百三十匹解至阿克蘓詳加騐看臕分頗好已照採買回人馬匹例每匹給價十二兩並賞給薩里等縀疋氊料等語薩里等辦解馬匹情願捐助殊屬可嘉雖經給與價值並賞給縀氊仍著酌量加賞縀疋以示奬勵諭定邊左副將軍成衮扎布等撤回駐劄哈薩克邊界官兵上諭軍機大臣曰額爾克沙喇等久在哈薩克邊界此時信息若何若曽示以兵威即以朕㫖宣示謂阿布賚業已遣使入貢搶掠烏梁海一事係巴魯克巴圖魯所為與伊等無渉不必進兵或但遣人前往詢問亦即宣㫖撤兵俱著傳諭成衮扎布酌量辦理䕶軍統領努三奏送擒捕嗎哈沁之厄魯特嚮導錫喇庫本恩克勒德克䝉克津色楞及其家口至京命賞給緞疋安插於察哈爾旗分平定準噶爾方略續編卷一
