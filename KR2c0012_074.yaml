body:
  text: 乾隆二十年冬十月丁巳以解送達瓦齊至京遣官告祭太廟社稷行獻俘禮戊午上御午門樓行受俘禮奉旨達瓦齊及伊子羅卜扎等俱著交理藩院候旨申諭定邊左副將軍達爾黨阿等進𠞰事宜上諭軍機大臣曰哈達哈等奏現在帶兵前進約於一月內可到察罕呼濟爾等語阿睦爾撒納雖孑身逃竄傳聞在博羅塔拉地方會合彼處賊衆約有三四千人若哈達哈等兵少輕進亦有可虞伊等固不可恇怯退縮亦不宜冒昧嘗試著傳諭達爾黨阿哈達哈等遵旨先遣精壯兵丁前行哨探相機進止與西路會合共得兵四五千名即奮勇追𠞰務期弋獲又所奏遣往哈薩克之索倫跟役布顔圖傳哈薩克有出兵之信從前伊部落遣使前至軍營甚屬恭順兹復何由起釁或被阿睦爾撒納煽惑或布顔圖棄伊主逃回妄為揑飾俟送到時嚴行審訊既有此語達爾黨阿等應行知遣往哈薩克之侍衛德善令伊等暫時留待俟審訊明確再行遣往命兆惠阿思哈分管北路臺站上諭軍機大臣曰哈達哈等奏帶兵前進隨路安設臺站於撤回臺站兵丁及察哈爾兵內共挑選五百名辦給馬駝每臺安設十人現在兆惠富德俱經出差請另派大臣總管臺站等語軍行臺站關係緊要每臺十人尚覺單弱著於察哈爾兵丁內添派數百名每臺約以十五人為率昨經降旨令兆惠總理北路臺站今添派阿思哈所有隨營安設臺站事務著阿思哈辦理其自烏里雅蘇台至張家口臺站著兆惠辦理己未諭定邊左副將軍達爾黨阿等派遣偵探兵丁事宜上諭軍機大臣曰昨因阿睦爾撒納屬人根丕勒協助坐臺台吉班第等鎗斃厄魯特甚屬奮勉又遣探賊信回報曾經降旨將根丕勒不必分賞喀爾喀送至察哈爾安插今思根丕勒誠心效力且正在需人之際著加恩授為藍翎侍衛賞銀五十兩令其隨營效力或於哨探隊內差遣將伊妻子送往扎哈沁遊牧暫行安插至哨探兵丁捉生取信必使賊人全無知覺為要若擒獲時有一二人逃脫則賊早已防備反為無益有損著傳諭達爾黨阿等嚴飭遣往各員務期全獲不得任其脫逃仍於索倫喀爾喀厄魯特內選派精壯兵丁前往庚申諭定邊左副將軍達爾黨阿等酌議會同西路進𠞰事宜上諭軍機大臣曰哈達哈等奏瑪木特之收楞額訥默庫自伊犂脫出告稱班第薩喇爾等從哈什帶兵前來瑪木特亦由闥勒竒嶺前來隨派識路之人從哈卜塔克拜塔克往會瑪木特并行文西路等語哈達哈等所辦甚是訥默庫等既識路徑即在前隊作嚮導行走但詢得阿睦爾撒納現將噶勒雜特人等遷往伊犂則北路進兵必無蹤迹且班第等既出西路自當由額林哈畢爾噶進兵噶爾藏多爾濟等遊牧俱在此一帶亦可以接濟兵力朕意哈達哈等即將現有兵丁與噶爾藏多爾濟等由哈卜塔克拜塔克前往會同西路以壯軍威方為有益著傳諭達爾黨阿哈達哈等如噶爾藏多爾濟尚未前往西路伊等會同商議可否由阿濟必濟前往如屬不便毋庸拘泥若已經起程即詢問識路之人一面帶兵前行一面送信與噶爾藏多爾濟於中途會合進𠞰其北路雖不需多兵可否約留千人交與阿蘭泰舒赫德於卡倫附近駐守伊等其悉心商議即行奏聞命籌運烏里雅蘇台軍營米石上諭軍機大臣曰哈達哈等奏現在烏里雅蘇台存貯米石及今歲可以運到米石共十二萬有餘足支官兵五六年之用等語此奏惟計算給發官兵數目其接濟厄魯特等口糧並未籌及著交達爾黨阿哈達哈等於現在米石內除應給官兵數目外計一年之內應支給厄魯特等口糧需用若干即以今年成數為準通盤籌畫再行具奏並傳諭山西巡撫恆文等於今年採買米石數目減半豫備俟明年陸續運至軍營此項雖非急需亦不得過於遲滯辛酉命授策楞為參贊大臣會同北路進𠞰上諭軍機大臣曰策楞奏稱據達什達瓦屬人索諾木從伊犂脫出告知將軍班第等陷賊之信現在達什達瓦之妻率其遊牧前來等語此信屬實必須會合兵力大為辦理昨降旨令達爾黨阿等同噶爾藏多爾濟帶兵前往西路會同進𠞰伊等諒已前進今聞阿巴噶斯哈丹等兵敗後潛匿山中策楞即帶兵與諾爾布林沁相見若其力可用即會兵速進如少覺單弱則據守要害之地俟達爾黨阿等到日整頓兵力嚴行𠞰捕已諭總督方觀承等趲辦馬駝解赴軍營應用將來自必陸續得信策楞惟相機乘勢勿少退諉亦勿致冒昧前進方為妥協但此係索諾木一人之言達什達瓦之妻及軍營侍衛滿楚等尚未抵營或係逆賊造言惑聽亦未可定策楞尤宜加意偵探達什達瓦家口若至軍營即令在巴里坤居住令和起照管其派出達什達瓦兵丁隨營進𠞰存留寧夏莊浪兵丁駐防各事宜俱照所奏行派出兵丁照現在進兵例賞給整裝銀兩外仍每名賞銀三兩并派散秩大臣阿雅勒虎揀選可用宰桑數員在軍營效力行走至索諾木所稱八月內敦多克曼集巴朗圖布慎會同喇嘛回人等作亂班第鄂容安被陷而薩喇爾帶兵百人為烏魯特宰桑納親哈什哈之子錫克錫爾格所困又伊犂之喇嘛等傳書達什達瓦遊牧阻其遷移各情節俱屬可惡策楞等進𠞰時務將此項賊人臨陳斬獲或擒拏解京治罪勿使漏網看來助惡者亦不過數人未必全行煽亂著派侍衛滿楚及陸續投來人內令其前赴伊犂曉諭衆厄魯特寬其脅從勸以反正有能擒賊自效者必格外加恩倘阿睦爾撒納已在伊犂即不必宣示惟整兵進𠞰速行擒捕以昭國法現在既有此信則從前發回班第等奏匣及節次諭旨不必久候著扎拉豐阿策楞即行閲看相其緩急次第辦理策楞此次辦事頗知奮勉著加恩授為參贊大臣給與副都統職銜扎拉豐阿未到時仍署理將軍事務並著傳諭扎拉豐阿知之申諭定邊左副將軍達爾黨阿等會同西路進𠞰上諭軍機大臣曰據策楞奏從伊犂脫出之達什達瓦屬人索諾木來告將軍班第等陷賊之信著將原奏及朕諭旨録寄達爾黨阿哈達哈等閲看從前北路進兵因未得伊犂信息且傳聞阿睦爾撒納尚在鏗格爾等處居住今既得此信且聞噶勒雜特人等俱為逆賊帶往伊犂自當於西路進𠞰著達爾黨阿哈達哈等遵朕昨降諭旨與西路會合由額林哈畢爾噶進𠞰至噶爾藏多爾濟入覲遣回賞賜頗多沿途必須防護伊等或帶兵同行或派兵千名交富德帶領前行如噶爾藏多爾濟業經起程伊等即帶兵隨後速進方為妥協諭署陜甘總督方觀承等籌辦馬駝上諭軍機大臣曰西路大兵現議進𠞰阿睦爾撒納軍行馬匹最要已節次傳諭該督撫等速為購買雖據吳達善奏派甘省營馬二萬匹但不妨寬裕籌辦若拘泥原數恐臨期轉不敷用著再傳諭方觀承等速於西安等處凡有産馬地方多為購買分起解送巴里坤軍營其有臕分稍次及此次揀剩收槽馬匹均須作速餵養務令壯健以收實用至糧餉茶斤亦須寬裕籌備酌量馱裝車運陸續解送巴里坤聽候撥用諭西寧副都統德爾素購辦馬駝上諭軍機大臣曰現在大兵進𠞰阿睦爾撒納需用馬駝去年雖在青海採買為數無多著傳諭西寧副都統德爾素速往青海扎薩克遊牧會同郡王索諾木丹津盟長等於各旗酌量採買即派伊等所屬官兵酌量由青海至巴里坤程途賞給路費護送前往交與西路軍營聽候調撥其需用價銀即向西寧地方官支給務期多方購買速為馳送毋得因循推諉訊問阿穆爾濟爾噶爾供詞軍機大臣奏言臣等遵旨訊問阿逆宰桑阿穆爾濟爾噶爾供稱阿睦爾撒納遣我迎接遊牧人等約定在烏蘭托羅海或哈卜塔克拜塔克地方會齊如阿睦爾撒納已往别處即將遊牧人等往阿巴噶斯哈丹等遊牧暫候總之今歲必在博羅塔拉過冬令我務必尋往後我至遊牧時因阿睦爾撒納之妻不願即行要候班珠爾到時商議始定嗣班珠爾到日正欲商議逃遁已聞派兵將遊牧馬羣收取旋被擒獲再阿睦爾撒納自擒獲達瓦齊後即有統據準噶爾之意雖與阿巴噶斯等商議尚未謀及衆人後撤兵至固勒扎始與衆台吉宰桑等潛謀叛逆有葉克明安台吉察衮阻止阿睦爾撒納前來入覲阿巴噶斯哈丹烏勒木濟等皆與同謀齊木庫爾普爾普等俱云大皇帝恩不可負不宜妄動阿睦爾撒納並不聽從現在與阿睦爾撒納同黨者不過數人餘皆勉強服從聞阿睦爾撒納有移在穆素爾居住之言穆素爾在特克斯之西與布魯特回人交界如遇大兵追捕窮蹙即擬投入回人境內至哈薩克雖與阿睦爾撒納和好但與額林沁仇隙甚深今阿睦爾撒納已娶額林沁之媳為妻以其孫為己子復聚塔本集賽庫圖齊訥爾等各鄂拓克牲隻資助額林沁向日被哈薩克虜掠之人哈薩克聞之必不能與伊和好至將軍大臣等參奏阿睦爾撒納之處郡王青滾雜卜私行告知我並無所聞惟聞有德勒克瑚畢勒罕及尼爾巴羅卜藏策凌二人由瑪木特處聞信私自告知阿巴噶斯轉告阿睦爾撒納等語臣等將阿穆爾濟爾噶爾所供一一詢問納噶查情節約略相符奏入報聞參贊大臣策楞疏奏扎哈沁迎候大兵情形策楞奏言臣於十月初六日前至扎哈沁交界正遇伊部落向內遷移臣即宣布皇仁告以將軍永常將汝等棄置是以拏解治罪今特帶兵前來接應伊部落人等俱合掌跪告大皇帝為我羣生發兵平定伊犂正欲安居樂業不意阿睦爾撒納叛逆阿巴噶斯哈丹復煽惑衆鄂拓克我扎哈沁人衆並不從賊聞將軍帶兵退回無所依恃將遊牧向內遷移今蒙傳示恩旨不勝感激且經將軍帶兵前來仍願各回遊牧等語臣體察伊等情形頗屬實心即酌量賞賚並將接設臺站派令嚮導等事面為指示又詢問宰桑鄂爾竒木濟各鄂拓克情形據稱倡亂之初雖各有搶奪而全部尚未驚擾惟布庫努特因伊宰桑敦多克曼集悖叛遂乘勢盜竊衆鄂拓克等語臣查現在從伊犂脫出之索諾木告稱敦多克曼集倡亂則布庫努特人等附和從逆是實臣即會同扎哈沁等兵衆嚴行𠞰絶奏入報聞參贊大臣哈達哈等疏奏遵旨派遣扎木禪通信伊犂哈達哈等奏言瑪木特之孫扎木禪於十月初十日帶兵百名前來臣等將奉到諭旨宣示據扎木禪跪告我等投誠以來天恩稠疊今又將我妻賞令完聚並賞給銀兩實屬感激難名情願帶兵前往伊犂臣等隨向扎木禪挑取熟識哈卜塔克拜塔克路徑人等各給馬二匹駝一隻裹帶口糧齎捧宣諭準噶爾人衆托忒字敕旨仍派索倫喀爾喀官兵帶領於本月十二日起程前往奏入報聞癸亥申諭定西將軍扎拉豐阿等通信進𠞰事宜上諭軍機大臣曰昨據策楞奏從伊犂脫出之索諾木告知班第等陷賊之信朕心深為憫惻已傳諭策楞令其派侍衛滿楚等前往偵探並著從優賞賚期速得班第等實在情形蓋進𠞰烏合之衆原屬無難惟班第薩喇爾鄂容安因國事為賊所困每一思之不勝憤悶然亦未知虛實著扎拉豐阿玉保策楞等設法通信傳諭班第等以朕初意準噶爾危亂之餘甫經安定若屯駐大兵恐多驚擾是以但命伊等駐劄辦事兵少力弱為賊所困非失守封疆可比伊等或相機脫出或忍死以待大兵方為大臣舉止若謂事勢至此惟以一身殉之則所見反小矣鄂容安素稱讀書人漢蘇武為胸奴拘係十九年全節而歸阿睦爾撒納固不足比胸奴我大清又豈漢時可及自當愛惜此身以圖後效恐伊等以失守罹罪不識大義遽爾輕生夫為人臣子若君父欲加之罪亦惟順受豈可豫料而以一死為賢於生於心安乎朕今大興師旅陸續進發務期擒𠞰逆賊扎拉豐阿等務體朕憫惻伊等之心即會合各路大兵竭力𠞰捕俾逆惡知所懲創扎拉豐阿係蒙古人恐於助逆喇嘛有意寬假即玉保策楞亦稍存招撫之見俱斷不可行惟厄爾錐音哈薩克錫喇因入覲前來其屬人或被脅從尚可詢問伊等分别𠞰撫其餘俱不得少存姑息致反覆叛亂無所底止臣等謹按班第鄂容安當阿睦爾撒納逆迹乍萌屢奉密旨命以便宜從事其時誠燭其詭言入覲之狡謀操刀必割則殱厥渠魁可以為國除凶而不徒以捐軀完節此因循顧慮坐失事機有不能不為二臣惜者然聖主愛惜人材仁至義盡一聞伊犂竊發即諄諭軍營大臣接臺通信且命傳諭班第等毋僅以一死塞責而班第等以世受國恩慷慨死綏義不茍活是以始聞被困猶望其生全及引決自裁更上勤憫惻所以示萬世勸忠之道曷以加哉甲子參贊大臣策楞疏奏諾爾布林沁等遣使迎候及詢問伊犂情形策楞奏言十月初九日據遣往傳示諾爾布林沁之千總策卜登告稱諾爾布林沁與扎那噶爾布因葉克明安台吉察衮德濟特叛附阿睦爾撒納相持力戰未即就擒已獲察衮之子達爾扎遣宰桑諾爾布齊木布來見臣詢問諾爾布齊木布告稱諾爾布林沁擊敗阿巴噶斯哈丹之後即欲整兵進𠞰而塔本集賽復與阿巴噶斯哈丹相合且察衮德濟特俱為同黨占據險阻是以未能全勝恐其夾攻已將遊牧暫移於都爾博勒津之地阿巴噶斯等現於圖古里克等處拒守等語又伊犂叛賊克什木敦多克曼集及喇嘛等遣布魯古特台吉納旺送付額林哈畢爾噶等處台吉宰桑等書信為扎那噶爾布之屬人濟爾噶爾所獲并原書呈送前來臣隨詢問納旺供稱係鄂勒吹鄂羅什虎之子達瓦齊殺害我父囚我於阿巴噶斯鄂拓克將軍薩喇爾進兵時帶往伊犂遣取回人貢賦八月二十三日宰桑克什木搶掠臺站將軍班第等遣敦多克曼集安撫衆心二十四日將軍大臣等帶兵沿河向空吉斯行走我並未隨行二十九日宰桑巴桑向衆云宰桑克什木敦多克曼集烏克圖圖布慎巴朗及喇嘛回人等率衆前至烏蘭庫圖勒圍守將軍大臣正在搶掠班將軍鄂參贊俱行自盡薩將軍由小路帶達什達瓦兵百人脫出三十日敦多克曼集令我傳書於額林哈畢爾噶各台吉宰桑九月初八日至哈丹鄂拓克見阿巴噶斯又令我探聽諾爾布林沁之信我尋山路前來即被擒獲前在哈丹鄂拓克時聞薩將軍為烏魯特宰桑納親哈什哈之子錫克錫爾格所獲送往伊犂臣復嚴詢納旺敦多克曼集更有何事交付阿睦爾撒納現在何處據稱在伊犂時敦多克曼集恐薩將軍由吐魯番脫出已遣兵阻截哈丹帶兵二百名至烏隆古尋阿睦爾撒納並無蹤迹臣伏思納旺所供伊犂情事恐係詭計揚言煽惑自應帶兵速進擬即日輕騎往會諾爾布林沁共商進𠞰事宜又塔爾巴噶沁台吉唐古特率五百餘户來降現住諾爾布林沁遊牧遣其得木齊俄羅斯前來又呼爾璊台吉達瓦及察哈甲勒鄂拓克俱遣使前來達瓦前為阿巴噶斯所迫搶掠入覲台吉噶爾丹達爾扎濟克濟扎卜等今俱送至軍營謹將台吉噶爾丹達爾扎濟克濟扎卜令副章京德明保押解赴京其納旺達爾扎及前次拏獲之班咱一併解京奏入上諭軍機大臣曰策楞奏擒獲台吉納旺所供伊犂情形並輕騎往會諾爾布林沁商議進𠞰所辦俱合機宜策楞會同諾爾布林沁時即將阿巴噶斯哈丹遊牧奮勇𠞰捕其牲隻分給兵丁老弱賞給諾爾布林沁此際更宜偵探阿睦爾撒納如前至伊犂策楞等即拒守要害候北路大兵與噶爾藏多爾濟到時併力進𠞰若逆賊尚無蹤迹䇿楞等即整頓兵力直抵伊犂𠞰捕賊黨然亦須量力前進不可輕忽前因未得伊犂信息因令扎拉豐阿暫駐額林哈畢爾噶今事勢如此扎拉豐阿自應同哈達哈策楞玉保等前進其安撫遊牧辦理臺站各事宜著達爾黨阿雅爾哈善帶兵繼進以作聲援富德仍遵前旨巡查臺站策楞並傳諭諾爾布林沁伊少年奮勉朕甚嘉悅已封為郡王此次進𠞰有功必加重賞扎那噶爾布亦知奮勉著封為貝勒賜雙眼翎擒獲納旺之濟爾噶爾賞給孔雀翎并銀五十兩擒獲達爾扎之人著查明賞銀五十兩嗣後有應行加賞者策楞即酌量賞給策楞自知前譴勇往任事著給與都統職銜仍以參贊大臣行走并傳諭扎拉豐阿知之恩加宰桑厄爾錐音等世職上諭軍機大臣曰昨玉保奏中途出痘之宰桑哈薩克錫喇吞圖布等留於臺站照看仍帶厄爾錐音等起程今至努空西喇臺站厄爾錐音鄂哲特亦皆出痘玉保先行留烏爾登在途照看等語聞伊等痘疹輕稀自易痊好且嗣後來京更無他慮益覺可喜著加恩賞給厄爾錐音哈薩克錫喇騎都尉世職恩克博羅特吞圖布鄂哲特雲騎尉世職聽伊等指出子弟承襲此際須寬心調養俟全愈後從容行走勿稍勉強烏爾登善為照看頗知悔過奮勉著授為頭等侍衛仍將各宰桑等身體平復日期速為奏聞諭參贊大臣富德曉示沙克都爾曼濟通信遊牧事宜上諭軍機大臣曰現據索諾木所告伊犂信息阿睦爾撒納大約前往伊犂沙克都爾曼濟若遽回遊牧恐有他變且伊遊牧人等尚未知伊領兵前往或啓猜疑亦未可定若由回人路徑前往安慰伊遊牧人等由彼處派兵堵截阿睦爾撒納會合大兵似更妥協朕已密派侍衛等傳諭回人霍集斯伯克令其堵𠞰逆賊著傳諭富德曉示沙克都爾曼濟派伊親信宰桑一二人傳示遊牧派兵堵截相機前進伊等仍同將軍大臣進兵夾攻於軍事甚有禆益富德即遵旨曉示仍將伊意見言語如何及派出宰桑所付書信即行奏聞此事最宜愼密自噶爾藏多爾濟等台吉外勿使他有漏泄乙丑諭參贊大臣策楞曉示唐古特通信額林沁事宜上諭軍機大臣曰策楞奏稱塔爾巴噶沁台吉唐古忒遣宰桑鄂羅斯率五百餘戶來歸并將臺站被掠之察哈爾喀爾喀等送回等語唐古忒誠悃可嘉著加恩封為貝勒賞給雙眼翎策楞俟伊來見時即傳旨奬諭再台吉額林沁從前阿睦爾撒納曾殺害伊子外雖相依心必不合唐古忒若能通信額林沁俾擒獲逆賊不但藉復前讐更使身邀恩賞如力不能辦即令其束身來歸亦當施恩封賞策楞將此傳諭唐古特令其盡心辦理以期承受朕恩如通信額林沁時其書詞大指告以阿睦爾撒納與阿布賚久相和好而額林沁從哈薩克逃出時曾傷害多人阿布賚甚懷憤恨今阿睦爾撒納欲將額林沁擒送哈薩克以修好此係詢問和碩特台吉納噶查所告之詞其言必非無據額林沁自知與阿睦爾撒納有隙且與哈薩克不和伊亦閲歷有年豈不預防禍害若令其將阿睦爾撒納擒拏既可復讐免患且可承受恩賞策楞即傳諭唐古特將此意作書開導額林沁并將唐古特言語情形奏聞再現在軍前新附頗多兵勢自當振作若得阿睦爾撒納未往伊犂之實信即可速行進𠞰蓋以噶爾藏多爾濟與恩克博羅特等頗重待喇嘛若會同進兵將助惡喇嘛擒𠞰恐伊等拘泥習俗少覺掣肘惟於未到時能先示懲創庶合事機又如辦理喇嘛一事昨命全行𠞰滅今思蒙古厄魯特俱重黃教亦宜分别辦理倘實係助惡臨陳仍復抗拒自當誅戮其擒獲者俱解送來京老弱量從寬宥并將喇嘛係出家人不守清規好亂生事是以特為整頓明白曉示俾衆共知其罪無可逭併傳諭扎拉豐阿玉保知之命台吉吹喇錫烏勒木濟前往西路軍營上諭軍機大臣曰哈達哈等解送阿睦爾撒納近族台吉吹喇錫烏勒木濟到京詢非賊人黨羽人亦可用著加恩各賞銀三百兩衣一襲仍交瑪虎帶回俟達爾黨阿等到西路軍營時酌量調遣伊等妻子不必送往察哈爾即在鄂爾昆塔米爾等處居住其扎木參所屬之他沙阿睦爾撒納屬人托博克哈爾布錫和通仍著解送來京命授和通鄂勤等為扎薩克頭等台吉上諭軍機大臣曰富德奏稱帶領前往軍營之台吉和通鄂勤琿齊與伊等父兄分居所領各有一百餘戶等語從前報明户口時因伊等父兄應封爵秩僅授和通鄂勤等為間散台吉但和通鄂勤之父巴圖爾額默根應封貝子琿齊之兄諾海竒齊克應封公俱未經入覲不便封爵伊等既與父兄分居現在從軍效力著加恩俱授為扎薩克頭等台吉賞給孔雀翎并傳諭噶爾藏多爾濟等進兵之時伊等父兄投來即奏聞封授惟是厄魯特等貪求無厭今用兵之際富德既有此奏自當加恩鼓勵將來相繼干求若一一代為陳奏必開僥幸之端此風斷不可長並傳諭富德等知之定議陜甘兩省辦理馬駝事宜署西安巡撫台柱甘肅巡撫吳達善疏奏辦理馬駝二摺得旨軍機大臣議奏尋議台柱奏稱陜西撫標應解馬一百三十六匹督標應解馬一千七百三十匹惟挑出堪用馬七百餘匹已向將軍都賚面商將滿營堪用馬三千匹內先行借撥督標解送又稱現在各屬採買大率馬少騾多近省州縣已共得馬騾一千七八百餘匹離省稍遠州縣陸續買報大約可至二千數百餘匹現在尅期起解等語查前據劉統勳奏報陜省督撫提鎮各標共調馬七千匹今督標既止堪用馬七百餘匹而滿營現有堪用馬三千匹即可行文將軍照數撥解何必復稱借撥至騾頭一項前經議覆劉統勳奏令其無庸購買今既已購買騾頭雖不足應付軍行而驛站馱載自屬可用現據大學士黃廷桂奏抽撥驛馬俱係簡僻之驛無須撥補其沿邊衝途及邊口臺站差務繁多即將此項騾頭分撥協濟於驛務亦屬有益吳達善奏稱駝隻一項軍營現有駝二千三百隻又甘省提鎮解送及各州縣購買共一千二百七十餘隻誠恐哈密糧運仍有需用現在行知軍營酌量數目移知即行文兩省將已經購買駝隻解肅備用其未經購買者即行停止等語查本月內議覆劉統勳奏除軍營現有駝隻外再於各處挑選并行文兩省及沿邊購買備用今吳達善奏州縣買得之數合之軍營現有之數僅及三千五百七十餘隻大兵進𠞰需駝正多計此際軍營必將需用實數移知該督等應令該督等於實數之外仍行購買務期有贏無絀以利軍行至所奏派調堪用馬匹約計月內可全令出關其臕分不及者即以撥補安西各營摘缺之數及撥運巴里坤糧石已據安西道文綬雇覔商人牲隻并於所存疲駝內挑選馱運均應如所奏行奏入上從之丙寅命達爾黨阿掌定邊右副將軍印領兵前往西路哈達哈掌定邊左副將軍印仍留北路軍營上諭軍機大臣曰朕前降旨令哈達哈等帶兵會合西路今思北路厄魯特遊牧及新降汗哈屯烏梁海等既須彈壓烏里雅蘇台存貯糧石甚多亦應防守西路既有兵六千現須豫備馬駝自不便更加籌辦哈達哈等所領兵三千名應仍留北路惟令達爾黨阿帶兵一千或數百名同噶爾藏多爾濟前往西路合之扎拉豐阿玉保富德等陸續帶往兵丁八百名統計西路兵已及八千名足敷調遣惟馬匹最宜多備若將哈達哈等所調翁金達什和碩阿西克托里等處馬匹挑選二三千由相近岔道解往應用更屬有益如繞道遠行亦可不必哈達哈仍遵前旨於北路駐劄以作聲援并令喀喇巴圖魯阿玉錫丹津帶領精兵千名以內前行哨探如遇阿逆由北路逃遁即相機𠞰捕如此兩路進兵較為周密哈達哈既專辦北路即掌定邊左副將軍印雅爾哈善在參贊大臣上行走達爾黨阿往西路時掌定邊右副將軍印若薩喇爾前來即行移交仍在參贊大臣上行走其烏里雅蘇台大臣印著阿蘭泰管理伊等務公同商酌隨宜辦理勿但知奉行成命以副委任命封授達什達瓦之妻車臣默爾根哈屯名號上諭軍機大臣曰達什達瓦之妻因伊犂擾亂並不聽從彼處衆喇嘛等之言帶領遊牧人衆前來投順誠悃可嘉著封授車臣默爾根哈屯名號派副都統鄂實齎粧蟒緞十匹銀五百兩茶葉一千斤前往賞賚鄂實至巴里坤後即赴扎拉豐阿處隨同辦事在領隊大臣上行走丁卯訓諭軍營將軍大臣等上諭軍機大臣曰今春大兵平定伊犂時兩路將軍大臣等未免各存意見不能和衷共濟此皆扎拉豐阿哈達哈達爾黨阿玉保策楞等稔悉但彼時因逆賊阿睦爾撒納從中交搆致啓猜疑此次進兵皆我國家親信大臣又皆由西路進發辦理諸事朕俱逐一指示務期同寅協恭略去形迹公爾忘私則國事有濟而伊等之勳勞亦著倘仍懷挾私意妄分爾我自不能逃朕洞鑒著傳諭軍營將軍大臣等加意奮勉力洗積習勿為噶爾藏多爾濟等所笑命散秩大臣普爾普前往西路軍營在哨探隊內行走戊辰諭侍郎兆惠等辦理阿睦爾撒納等遊牧事宜上諭軍機大臣曰據兆惠等奏遵旨將阿睦爾撒納班珠爾等遊牧人衆分别賞給齊木庫爾德濟特普爾普其餘俱賞給喀爾喀惟將阿睦爾撒納宰桑吹扎卜暫行看守其餘宰桑亦分賞喀爾喀等語吹扎卜既為阿睦爾撒納所信用自不便仍留遊牧著將伊妻子一併解送來京其餘宰桑達瓦等十八人俱賞給喀爾喀亦未妥協著同查出扎木參之宰桑等併其妻子俱交與侍衛竒徹布解送來京昨台吉吹喇錫送到時朕加恩將伊子根敦扎卜及所屬俱行給還此奏內根敦扎卜戶口若係逃竄之根敦扎卜即賞給喀爾喀若係吹喇錫之子仍遵旨給還又班珠爾之寡姊及伊前妻俱不必送京仍交與烏勒木濟管轄班珠爾同族台吉敦多克達什唐拉扎卜特默齊俱不必辦理仍令照舊居住遊牧其餘查出馬匹軍械交與烏里雅蘇台軍營大臣查收己巳諭都爾伯特台吉伯什阿噶什回部頭目阿卜都伯克擒送阿睦爾撒納上諭伯什阿噶什曰準噶爾內亂頻仍各部落人衆失其生業甚屬困窮朕為統一天下之主懷保羣生無分中外是以特發大兵平定伊犂方欲施恩定制永安反側乃逆賊阿睦爾撒納潛謀叛逆妄思併吞諸部肆其暴虐形迹敗露畏罪潛逃朕已命將窮追務期弋獲爾台吉輸誠歸命前經將軍大臣陳奏定於明年入覲今逆賊一日未獲爾諸部一日不得安生爾能仰體朕旨去逆效順或派兵協𠞰阿睦爾撒納或俟其來投爾遊牧擒獲解送朕必大沛殊恩今特命和碩特台吉公納噶查前來傳諭爾其欽承奮勉自效又諭阿卜都伯克曰爾回部原係吐魯番舊屬今年春大兵平定伊犂達瓦齊逃往爾遊牧爾能擒獲及其眷屬解送軍前將軍大臣等奏報朕已加恩賞賚又定於明年入覲再沛殊恩今逆賊阿睦爾撒納妄思併吞諸部狡謀敗露畏罪潛逃朕已命將窮追爾雖不必派兵協𠞰但須豫飭遊牧伺察防守若阿睦爾撒納逃竄至爾遊牧時擒獲解送朕必重加爵賞兹特命和碩特台吉公納噶查傳諭并齎賜物爾其領悉申諭署陜甘總督方觀承等辦解軍營馬匹上諭軍機大臣曰駐劄巴里坤寧夏將軍和起奏安西及內地撥解馬匹均未送到俟到日即將索倫兵料理進發等語此次進𠞰兵丁利在迅速策楞已帶兵前進後繼尤不可稍遲看來管解馬匹雖派有將領仍須大員專司催督署總督方觀承此時諒已抵肅著傳諭令其駐肅料理馬駝糧餉事務甘肅巡撫吳達善著來往稽查專司催送馬駝速抵軍營固不可稍有遲延亦不得因有此旨將馬匹過於疲頓有誤軍行平定準噶爾方略正編卷二十
