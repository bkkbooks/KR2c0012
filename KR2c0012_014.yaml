  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_014-1a, image: WYG0357/WYG0357-0220a.png}
body:
  text: 雍正二年夏四月乙巳叙平定青海功大將軍年羮堯已授為一等公將軍嶽鍾琪已授為三等公外授參贊蘇丹總兵官宋可進為三等輕車都尉總兵官黃喜林為二等輕車都尉按察使王景灝總兵官周瑛副將王嵩紀成斌為騎都尉提督郝玉麟總兵官武正安為雲騎尉以侍衛達鼐為副都統授騎都尉其餘有功將士各擢賞有差戊午以青海平定功成上御太和殿諸王貝勒貝子公文武百官以下上表行慶賀禮撫逺大將軍年羮堯奏擒阿布濟車陳台吉並降喀爾喀扎薩克沙爾都台吉年羮堯奏言侍衛達鼐副將紀成斌等率兵至布哈色卜蘇擒獲阿布濟車陳台吉又喀爾喀扎薩克沙爾都台吉來降奏入報聞丁卯撫逺大將軍年羮堯奏𠞰定河州口外鐡布諸番年羮堯奏言河州口外鐡布等寨番人並青海所屬劫掠道路猖狂妄行臣遺署河州副將嶽超龍等率兵進勦取四十一寨收服三十七寨殺傷番賊二千一百餘人擒獲人口牲畜無算悉實給官兵奏入報聞閏四月癸未行獻俘受俘典禮先是總理事務王大臣奏言青海大捷請獻俘於太廟皇上親御午門受俘奏入得㫖平定青海實乃皇考留貽之功故捷音到日恭告景陵今造逆首惡吹喇克諾木齊阿喇卜坦溫布藏巴札卜等三人檻送來京朕令議獻俘太廟之禮以慰列祖在天之靈諸王大臣等乃議請受俘歸功於朕非朕本意也可否祗行獻俘不行受俘之禮諸王大臣等再察典禮具奏尋議曰出師凱旋執獲醜類獻於廟社即受俘於廷歷代行之典禮甚巨應請允行奏入上從之至是以平定青海所獲逆俘吹喇克諾木齊阿喇卜坦溫布藏巴扎三人檻送至京行獻俘禮遣官告祭太廟社稷越三日丙戌王以下文武百官齊集午門前設鹵薄鳴金鼓上御午門樓前楹升寶座受俘兵部官率楹送俘囚將校以逆俘吹喇克諾木齊阿喇卜坦溫布藏巴扎卜三人至白練擊頸跪伏兵部大臣奏言所獲俘囚謹獻闕下上命交刑部於是刑部官領㫖兵部官引俘出王以下文武各官行禮畢上回宫是日賜檻送俘囚官各蠎縀朝衣帽鞾加賞銀百兩兵丁各賞銀二十兩庚寅命順承郡王世子𢎞晟還京上諭總理事務王大臣等曰䇿妄阿喇布坦來使已回胡土克圖處事務亦竣前令順承郡王世子𢎞晟在彼守獲今既無事著伊等從容回京五月庚申撫逺大將軍年羮堯奏勦桌子山碁子山番賊年羮堯奏言莊浪謝勒蘇部番人倡惡竊據桌子山碁子山又凉州南崇寺沙瑪喇木扎卜等與䝉古通去年輒劫掠新城張義諸堡又郭隆寺郭莾寺喇嘛脫走者煽動西寧納朱公寺朝天堂加爾多寺諸番與莊浪番賊搆亂臣與奮威將軍嶽鍾琪及在西寧大臣等共議發緑旗土司兵分十一路於四月十五日由西寧進兵尋據嶽鍾琪等報納朱公寺喇嘛番人悉降即延小章嘉胡土克圖以朝天堂居之加爾多寺諸番遣副將紀成斌張玉總兵官黃喜林等分四路抵賊巢殺賊數百餘多死溝河中諸寺悉燬又據報遊擊馬忠孝王大勳等殺賊於和石溝遊擊王序吉范世雄敗賊於石門口凉莊道蔣泂殱賊於喜逢堡而前鋒統領蘇丹率兵至旁伯拉夏口番人詭辭來降蘇丹怪其踪跡令偵之則賊衆伏鎗且發遂率兵直抵賊穴殺賊甚衆又凉莊道蔣泂搜勦碁子山破賊於巴洞溝土司魯華齡殺賊於天王溝前後勦賊略盡其賊首謝勒蘇部阿旺䇿零為先密寺喇嘛縛之至軍嶽鍾琪又率兵至鎮羌諜賊在木茂山即遣校率兵截殺賊大殱餘賊悉棄妻子逃去乃留總兵官宋可進凉莊道蔣泂令統緑旗土司兵五千暫駐防守又守備馬光於寬溝殺賊二十餘人賊潰散又先密寺番人數反覆且其地與碁子山賊穴相連恐後復聚為亂已令其地喇嘛諸番移居於加爾多寺外其先密寺已燬之此次陳亡被傷緑旗土司官兵及所招撫諸番户口數俟核明具冊咨部奏入得㫖桌子山碁子山番賊甚屬凶頑倚恃地方危險屢行劫掠大將軍年羮堯籌畫調遣令奮威將軍嶽鍾琪等統率官兵進勦於山險林密之處奮戰五十餘日盡行勦滅黽勉效力克奏膚功永靖邊塞甚屬可嘉此次勳績著將大將軍年羮堯及嶽鍾琪等辨兵俱從優議叙辛酉布隆吉爾副將軍阿喇衲有疾命署固原提督噶爾弼署理以軍前正黃旗䝉古都統蘇丹署理陜西固原提督以陜西西安左翼副都統覺羅伊禮布署理陜西西安將軍壬戌命詳議青海善後事宜及禁約等事上諭總理事務王大臣等曰自西陲逆賊羅卜藏丹津等背棄國恩招集同惡殘其骨肉侵犯邊城朕命年羮堯揆度機宜指麾將士犁庭掃漠迅奏膚功惟逆賊犯塞之初邊民略被騷擾克敵之後居民安堵不知有兵且士馬有飽騰之歡閭閻無轉運之苦支用錢糧一無糜費昨因野番劫掠成性出沒無常又令奮威將軍嶽鍾琪領兵搜捕餘孽將士用命於深山林木之中轉戰五十餘日俱已蕩平從此鋒鏑永清疆圉開拓今具奏善後事宜十三條又定禁約青海十二事運籌周密措置精詳朕心嘉悅之至其所奏善後諸事皆合機宜惟新闢地方宜廣屯種而欲令五省有罪之人發往開墾恐此等之人未必習於耕種又無室家可以羈留於邊塞之處少當留意耳爾等一併悉心妥議具奏尋議曰據撫逺大將軍年羮堯條奏青海善後事宜十三條一奏言青海諸部宜分别功罪以加賞罰前者羅卜藏丹津侵犯內地時貝勒塞卜騰扎爾輒來告我消息及賊人來犯西川南川未嘗助賊首率所屬來歸台吉噶爾丹戴青亦始終不肯助賊且與貝勒盆蘇克旺扎爾併力戰敗吹喇克諾木齊賊以是就擒又隨大兵出口效力扎薩克阿喇卜坦乃察罕丹津之壻隨大將軍進勦效力並請加封爵以示奬勸應如所請塞卜騰扎爾晉封郡王噶爾丹戴青封固山貝子阿喇卜坦封輔國公又奏言俘獲諾顔格隆乃土爾扈特台吉今已為喇嘛隨提督嶽鍾琪軍效力貝勒盆蘇克旺扎爾前雖從賊已而自悔歸命願擒賊贖罪請與來降公䇿凌諾爾布留其前所封爵以示寬大應如所請各復其爵又言輔國公羅卜藏察罕台吉濟克濟扎卜雖降前與貝子阿喇卜坦巴爾珠爾阿喇卜坦擾亂內地請奪其爵為民貝勒䇿零敦多卜貝子拉察卜雖降前數助逆賊並請降所封爵以示懲戒應如所請羅卜藏察罕濟克濟扎卜奪爵為民䇿零敦多卜降為固山貝子拉察卜降為鎮國公一奏言青海部落宜令分别游牧居住請如內扎薩克編置佐領以申約束每百户置一佐領其不滿百户者為半佐領其台吉悉授扎薩克於其兄弟中選授協理台吉每扎薩克設一協領一副協領一參領每佐領設一佐領一驍騎校四領催其一旗有十佐領以上者增設一副協領二佐領或增設一參領如䝉俞允請令一等侍衛副都統達鼐暫留辦理其每年㑹盟奏選其老成恭順者令充盟長不得私推以致滋事並應如所請一奏言朝貢交易宜立期定地請自雍正三年始於諸王台吉中定約人幾何自備馬駝由邊外入京朝貢令分青海諸王貝勒為三班三年一至九年一周其與內地交易則定以每年二月八月二次交易令俱集邊外臣相擇西寧西川邊外其地曰那喇薩喇請定為中外互集之地不得移置届期令總兵官遣將校率兵督視如有擅入邊牆者治之應如所請但諸䝉古所需茶葉布麵等物其交易期逺恐窘乏應令四時交易一奏言羅卜藏丹津屬人吹宰桑實率先歸順請令於松潘口外駐牧授以土百户銜丹忠部下宰桑噶隆塞卜騰達什等率數百人至松潘來降今駐潘州請授以千百户官並應如所請一奏言喀爾喀厄魯特四部宜勿隸青海按諸部既非被虜之人今青海諸王台吉咸歸德來降其助逆者悉皆擒獲而喀爾喀部隨軍降者所在多有宜乘我軍威令凡喀爾喀部不願為青海屬者請如青海例編旗各置佐領增設扎薩克等令分駐勦賊故地其願歸者聽之如此則青海之勢分而喀爾喀台吉等莫不感勵應如所請一奏言西番部人宜屬內地管轄凡陜西所屬甘州凉州莊浪西寧河州四川所屬松潘打箭爐里塘巴塘雲南所屬中甸等處並西番所在駐牧地自明以來失撫治之道或為喇嘛耕種地或為青海屬人交納租稅但知有䝉古而不知有㕔衛營伍諸官今西番歸化悉為內民應相度地勢增設衛所以撫治之擇番人頭目心服於我者給豫土司千百户土司巡檢等銜令分管之并令附近道㕔及增設衛所諸官管轄其應納糧草較前所納數請減之以示寬大至近邊居帳屋逐水草游牧者仍許其游牧均應如所請一奏言青海所在宜加約束按青海巴爾喀木藏危乃唐古忒四大部顧實汗據有之以青海地宏敞可以牧養牲畜喀木人衆糧富遂令其子孫分處二地嘗於青海游牧居處而喀木地納貢賦焉藏危二地舊施豫達賴喇嘛班禪喇嘛供給香火今以青海叛盡取其地令四川雲南諸官管理達賴喇嘛遣人到打箭爐貿易其駝裝過察木多乍了巴塘里塘輒向所在喇嘛索取銀各有差名曰鞍租至打箭爐為納稅用請飭達賴喇嘛等不得收所在鞍租且請飭打箭爐收稅官免其稅再每年請給達賴喇嘛茶葉五千斤班禪喇嘛給減半均應如所請一奏言喇嘛諸廟宜定例稽察西寧各廟喇嘛多者數千少者五六百遂為藏垢納汚之藪番民為喇嘛納租稅與納貢無異而喇嘛輒私藏甲胄軍器前者羅卜藏丹津叛喇嘛輒率番民與大兵抗拒今臣於塔兒寺喇嘛選其老成者三百人給與大將軍印信執照諭以學習清規請嗣後定例廟舍不得過二百間喇嘛多者三百少者十餘人每年稽察二次令首領喇嘛具甘結給官至番民糧悉令地方官管理每年度各廟所用給發且加給喇嘛衣銀如此庶可分别良否官得以時稽察諸廟應如所請一奏言陜西邊防宜嚴界限按邊外自黃河入中國處至河州西寧蘭州中衛寧夏榆林莊浪甘州其間水草豐美林麓茂密乃棄此不守以致䝉古諸部據大草灘地以常寧湖為牧厰以故所在相通更無阻礙請於西寧北川邊外上下白塔處自巴爾托海至扁都口一帶創築邊牆悉建城堡則西番部人妄行竊據之區悉為內地又肅州之西洮賚河常瑪爾鄂敦塔拉等處膏腴之地應募民耕種自布隆吉爾修城駐兵後可漸致富饒至寧夏險要無過阿拉善山顧實汗諸孫及額駙阿寶等舊悉居山後游牧今或徒置山前請令阿寶等嚴飭所屬仍令各歸阿拉善山後則山前營盤水長流水等處悉為內地並應如所請一奏言甘州等處宜增設官按甘州西寧疆界相接應於此兩處設立營汛至青海巴爾處鹽池自古屬內地後竟棄之塞外䝉古等至西藏噶斯等處道必出此應速取之於新設邊內大通河設一總兵兵三千管轄中左右三營於大通河南設一參將兵八百大通河北設一遊擊兵八百鹽池設一副將及左右二都司兵一千六百四川邊外單噶爾斯處移鎮海營參將兵一千駐劄再拉科暗們等處各設一守備兵二百五十恆鈴子處移南川守備兵五百駐劄其南川舊營留一千總兵百人至西寧宜改設同知移西寧通判於鹽池駐劄令其辦理稅務再河州保安堡應設一遊擊一千總一把總兵四百歸德堡應增設一把總兵二百令悉𨽻西寧總兵道員等管轄則䝉古不敢覬覦番民有所依賴並應如所請一奏言打箭爐等處亦宜增設各官青海既平凡巴爾喀木部人悉應收集除羅隆宗以東察木多乍了等處並隸胡土克圖管轄其餘諸番頭目悉應給與印信執照令與內地土司同打箭爐外木雅吉達處請設總兵遊擊守備以下等官兵二千人雅龍江中渡處設一守備二千總兵五百里塘巴塘所屬吹音等處設一守備兵二百里塘地當四衝請設一副將一都司兵一千二百鄂羅為諸路咽喉請設一參將兵六百巴塘形勝要害請設一遊擊兵五百宗都當雲南孔道請設一參將兵千人並令新設總兵官統轄以為雲南四川兩省聲援又青海所屬左格諸番請亟移之內地又阿巴土司頭目墨丹住等率兵進勦屢有功請給與安撫司銜不隸青海管轄又黃勝關外潘州舊城請設一遊擊兵六百阿巴地形山河四繞請設一副將一都司兵一千五百黃河兩岸渡口請設一守備兵三百悉隸松潘總兵官統轄里塘增設一同知令掌軍糧收納番人貢賦如此則南至雲南北至陜西皆可援助並應如所請一奏言邊地軍士宜各歸併裁汰今西寧設總兵官留兵四千便可足用請裁五百歸大通鎮屬甘凉莊浪等處其餘營汛兵可裁一千寧夏既增駐滿洲兵其緑旗兵亦可裁一千改為四營以後營遊擊以下等官補入大通鎮標四川重慶川北二鎮請設副將都司守備千總把總等官裁二總兵六遊擊遵義䕫州兩協四遊擊亦請汰之化林一副將兵千人請改置一遊擊留兵五百並應如所請一奏言邊內地宜開墾屯種西寧邊牆以內田並可耕布隆吉爾所在修築城垣請發直隸山西河南山東陜西五省軍罪當遣者盡往大通布隆吉爾等處墾種按今大通駐兵三千其子弟親戚及西寧民人願往屯種者甚衆大通河可毋發往惟布隆吉爾逺在邊外人不願往應如所請敕下刑部並直隸山西河南山東陜西五省僉妻軍犯中除盜賊外有能種地者即發往布隆吉爾令地方官動支正帑買給牛具籽種三年後起科如例一奏言諸番部落宜加意撫綏今兵事竣臣當遵㫖回西安辦理三省事務暫令奮威將軍嶽鍾琪駐劄西寧留兵四千令其統束其撫逺大將軍印信現今䇿妄阿喇布坦遣使請罪請俟撤回諸路將軍時臣即繳上收貯內庫再甘州黃番諸部落乘我軍威召集撫綏亦可以禦青海臣與嶽鍾琪議俟七八月馬匹肥壯親率兵由西寧口外到甘州招撫諸番並應如所請至年羮堯奏請禁約青海十二事一朝見入貢定以限期一不得自稱盟長一番子唐古忒部人勿令擾纍一喀爾喀輝特土爾扈特部落不令青海據為屬下一編置佐領不許違拒一中外交易定地約時以上六事臣等已於善後事宜內議定其餘六事一背二者必勦一遣官捧諭往者不論品秩崇卑王公以下跪迎餘相見以賔主禮一恪守分地不得強據一使者商賈往來母劫掠一父沒不得娶繼母及強娶兄弟之妻一察罕諾們汗喇嘛廟中不得妄聚議事並應如所請奏入得㫖所議甚屬周詳依議六月己卯移殺虎口等處軍臺於張家口外總管阿爾台路軍臺宗扎卜奏言阿爾台路軍臺四十七處除十二站不移如故其自殺虎口扎克拜達里克城所設軍營三十五站水草不佳道里迂逺請移設張家口外理藩院議覆如所請奏入上從之乙酉命調都統丁夀還京上諭總理事務王大臣等曰丁夀在軍前年久朕欲調回另用著議奏尋議曰都統丁夀自阿爾台率兵往巴里坤方今巴里坤有將軍富寧安吐魯番有都統穆森統兵分駐請令丁夀以所率兵屬富寧安就近遣大臣管轄令丁夀馳驛來京奏入上從之勒平定青海碑文於國學禮部奏請御製平定青海碑文勒石國學頒行天下以昭功德御製碑文曰我國家受天眷命撫臨八極日月所照罔不臣順遐邇乂安兆人䝉福乃有羅卜藏丹津者其先世顧實汗自國初稽首歸命當時使臣建議畀以駐牧之地其居雜番羌密近甘凉我皇上聖祖仁皇帝睿慮深逺每厪於懷既親御六師平定朔漠威靈所加青海部落扎什巴圖爾等震讋承命聖祖仁皇帝因沛殊恩封為親王兄弟八人咸錫爵祿羈縻包容示以寬大而狼心梟性不可以德義化三十年來包藏異志朕紹登寶位優之錫賚榮其封號尚冀革心緝寧部衆而羅卜藏丹津昏謬狂悖同黨吹喇克諾木齊阿喇卜坦溫布藏巴扎卜等實為元惡謂國家方宏浩蕩之恩不設嚴密之備誕敢首造逆謀迫脅番羌侵犯邊城反狀彰露用不可釋於天誅遂命川陜總督太保公年羮堯為撫逺大將軍聲罪致討以雍正元年十月師出塞自冬涉春屢破其衆凡同叛之部落戈鋋所指應時摧敗招降數十萬衆又降其貝勒貝子公台吉等二十餘人朕猶閔其蠢愚若悔禍思愆束手來歸尚可全宥而怙惡不悛負險抗違乃决翦滅之計以方略密付大將軍年羮堯調度軍謀簡稽將士用四川提督嶽鍾琪為奮威將軍於仲春初旬禡牙徂征分道深入搗其窟穴電掃風馳搜剔巖阻賊徒倉皇糜潰窮蹙失據羅卜藏丹津之母及謀逆渠魁悉就俘執擒獲賊衆纍萬牲畜軍械不可數計賊首逃遁我師踰險窮追獲其輜重人口殆盡羅卜藏丹津孑身易服竄匿荒山殘喘待斃自二月八日至二十有二日僅旬有五日軍士無久役之勞內地無轉輸之費克奏膚功永清西徼三月之朔奏凱旋旅鐃歌喧轟士衆欣喜四月十有二日以倡逆之吹喇克諾木齊等三人獻俘廟社受俘之日臣民稱慶伏念聖祖仁皇帝威靈震於遐方福慶流於奕葉用克張皇六師殄滅狂賊行間將士亦由感激湛恩厚澤為朕踴躍用命斯役也芟夷凶悖綏靖番羌俾烽熢永息中外人民胥享安阜實成先志以懋有丕績廷臣上言稽古典禮出征而受成於學所以定兵謀也獻􅀈而釋奠於學所以告凱捷也宜刋諸珉石揭於太學用昭示於無極遂為之銘曰天有雷霆聖作弧矢輔仁而行威逺寧邇維此青海種類實繁錫之茅土列在藩垣被我寵光位崇祿富負其阻遐禍心潛搆恭惟聖祖慮逺智周眷念荒服綏撫懷柔朔野既清西陲攸震爵號洊加示之恩信如何凶狡造謀逆天鼓動昏憝寇侵於邊惟彼有罪自干天罰桓桓虎貔爰張九伐王師即路冬雪初零日耀組練雷響鼙鉦蠢兹不順敢逆戎旅奮張螳臂以當齊斧止如山嶽疾如雨風我戰則克賊壘其空彼昏終迷曾不悔戾當翦而滅斯焉決計厲兵簡將往搗其巢踰厯嶔嶇坦若坰郊賊棄其家我縶而獲牛馬谷量器仗山積蹇失窟何所逋逃枯魚游釡假息煎熬師以順動神明所福旬日凱歸不疾而速殪彼逆謀懸首藁街獻俘成禮金鼓調諧西域所瞻此惟雄特天討既申羣酋惕息櫜戈偃革告成辟雍聲教遐暨萬國來同惟我聖祖親平大漠巍功焕文邁桓軼酌流光悠久視此銘辭繼志述事念兹在兹辛丑撫逺大將軍年羮堯奏移降番噶住等於一司魯華齡處并撤進勦官兵年羮堯奏言據嶽鍾琪報進勦碁子山桌子山謝勒蘇所屬諸番殺傷賊目班第瑪雅及賊衆餘悉奔竄山中即遣署總兵官宋可進統兵進勦賊番頭目噶住率男婦老弱一千一百六十二人來降已受之但仍居桌子山恐日久生事請移於土司魯華齡處令其約束其四川陜西緑旗土司官兵已撤回奏入報聞八月乙亥撫逺大將軍年羮堯奏雙篷諸番來降進勦拉扁二寨年羮堯奏言據嶽鍾琪報副將張玉率緑旗土司官兵出口至歸德堡其雙篷攢都澤蓋博拉諸番頭目各以其屬來降兵至薩喇分二路進勦拉扁上下二寨殺傷回賊無算撫其餘人安插如舊奏入報聞撤駐劄凉州等處兵撫逺大將軍年羮堯奏言平定青海功成前者調集駐防凉州等處西安滿洲兵一千白柴達木調還察哈爾兵一百駐劄松潘所在四川滿洲兵五百駐劄甘州鄂爾多斯土默特兵一千駐劄山丹大同兵一千駐劄布隆吉爾滿洲䝉古烏拉索倫察哈爾厄魯特兵二千悉令原管將校陸續統領撤回奏入報聞戊戌命議叙𠞰撫歸德至松潘口外諸番功上諭兵部曰青海既平之後凉州莊浪所有賊番以次勦撫官兵效力歷著功勳今大將軍年羮堯等奏稱乘川兵回泛之便並將歸德至松潘口外一帶番族或勦或撫悉無梗化殊屬可嘉在事有功人員著於勦撫桌子山之外另行議叙九月辛丑特給丁夀騎都尉世職上諭總理事務王大臣等曰阿爾台處軍事已竣著將軍功議叙將軍丁夀特給騎都尉世襲罔替議叙時仍照伊應得爵級歸併計算癸卯命停捐納事例上諭總理事務王大臣等曰開例捐納少助軍需原屬一時權宜非可行之久逺皇考曾屢言捐納非美事朕纘承大統亦以軍需浩繁户部供支不繼捐納事例仍暫開收今仰賴皇考在天之靈西邊軍務將已告竣即現有需用錢糧之處為數無多著將户部與陜西各項事例即行停止其運糧赴巴里坤及肅州所動西安藩庫銀兩悉作正項報銷平定準噶爾方略前編卷十四
