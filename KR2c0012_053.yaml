body:
  text: 乾隆十六年春正月戊申諭安西提督永常等辦理準夷交易事宜永常奏言準噶爾遣使額爾欽尼瑪入貢現已至哈密伊等所帶人畜過多臣等援定例責拒夷使等愧懼認罪遵受節制至乏弱牲隻俱照上屆尼瑪數內懇求挑變挑剩者願即趕回不敢例外干求並下次不以為例奏入得旨永常所奏自屬辦理正道從來夷人貪利見小乃其常技我國家全盛之時施恩字小與前代和戎陋習逈殊駕馭逺人理應詞嚴義正方為得體前此夷使多帶貨物每藉口於未諳定制是以格外求寬今尼瑪自上次入貢已與申明約束現在復來充使更不得以未奉成約為詞宜及此時辦定成規以塞其無厭之請所有酌令按數變價及餘數駁回之處著即照摺內所請據理妥辦不必因意在柔逺過存遷就之見致啓干請之漸也尋陜甘總督尹繼善奏報辦理上次貿易夷目所帶皮張等項作價十八萬六千餘兩兌給內地紬緞茶線等項作價十六萬七千餘兩外酌給現銀一萬八千餘兩開具總數一摺得旨尹繼善所奏準噶爾交易一事朕從前以為銀數太多未免繁費不可不為樽節蓋我大清國勢強盛許逺夷互市者不過寓綏懷之略而已其權操之自我非前代和親邊市可比即示之裁制亦屬當然今詳覽尹繼善所奏彼此原不過以貨物相準所費銀亦有限即令彼沾受微利感恱而去亦足見天朝字小之恩若照該督所定議單之數未免過於裁減如以為出自官商所定彼固未必遵信奉行即重以奏聞請旨彼亦必具奏懇求多費唇舌再或堅執成議令彼失所利賴設或鋌而走險攘竊邊儲牛馬以激我興師其能置之不問己乎偏師一出較之交易之費何啻十倍是交易雖有小費所全實多朕意該督所定實屬過嚴難行若定以此番交易為大局令其不出範圍或尚屬可行俟彼使到日朕自酌量降旨傳諭再行傳諭該督又朕觀準噶爾每次熬茶費至一二十萬金似亦非仗此交易以濟其用即尹繼善所奏亦未必如朕向所諭從國勢逺大起見或慮及該省一時難於售變耳若然則何妨奏明折價以供賞恤何惜此數萬皮張羊馬以安邊圉耶戊辰準噶爾部人鄂勒濟圖巴勒圖拜來降命賞給安插如例二月癸酉命四川總督策楞等訓諭公班第達上諭軍機大臣曰據西藏糧務通判常明等報軍機處文內稱阿里地方與準噶爾接壤其原管轄之清特古斯與朱爾默特那木扎爾同日被誅所遺之缺公班第達選得集都鼐前往賞給卓里克圖台吉名號等語觀班第達派人往阿里接管事務即賞給台吉名號是儼然以藏王自居今令以公爵管噶卜倫事又命多立數人以分其勢彼已大失所望恐因此生心亦未可定著傳諭策楞等到藏時留心觀看料伊此時斷未必敢顯有違抗但其心稍不快足將來又恐積疑成釁外番詭譎多疑竟須明切開導以從前朱爾默特那木扎爾因有藏王稱號是以擁勢太重釀成嫌隙今之多立噶卜倫正可保全終始令彼渙然疑釋庶可永寧亦不必預設成見遽事猜防致伊又成一朱爾默特那木扎爾轉於事理無益也尋策楞等奏班第達恭順可信所有賞給集都鼐台吉名號乃係達賴喇嘛以阿里地方緊要派往之人必須重其名號是以權宜賞給臣等又將所奉諭旨事理開誠曉諭班第達云朱爾默特那木扎爾因恃有王爵肆行無忌是以致取重罪今聖恩授爾為噶卜倫并多立噶卜倫正所以保全爾身家子孫較封王之恩為尤重班第達聞之惟有感激涕零自誓竭誠報效奏入報聞乙亥命親王得親扎布為喀爾喀副將軍公䇿卜登扎卜為喀爾喀參贊大臣命四川總督䇿楞等防範準夷通藏道路上諭軍機大臣曰據班第奏言公班第逹告稱有拉逹克汗書來稱近日準噶爾人從葉爾羌城至伊處貿易詢問逹賴喇嘛班禪額爾德尼安否并及廣興黃教之事等語近日準噶爾每遣使奏懇差人進藏朕俱不允前聞準噶爾進藏道路艱難若不往迎斷不能到今觀準噶爾常差人赴拉逹克貿易則彼處自有通藏之路朕雖不準其進藏而伊倘由葉爾羌城差人進藏則所關甚要將此事寄知總督䇿楞等詢問逹賴喇嘛與班第逹凡準噶爾通藏道路應行防範之處詳議具奏尋䇿楞等奏言臣等詢問達賴喇嘛與班第達俱稱準噶爾由葉爾羌城至阿里地方中間橫隔大山水草甚少難以行走每年貿易人赴拉達克皆有定數始準放入若大衆前來拉達克汗亦不許過即使前至阿里地方自阿里至藏尚有兩月路程亦不難於備禦又葉爾羌城有路可通魯都克地方亦須經過戈壁行走月餘現在魯都克地方常設卡倫至冬不撤至於各處卡倫嚴密連絡自咱拉山以外至拉卜賽那穆自阿哈雅克以外至順圖古爾等處亦屬通準噶爾之路今請將卡倫再行展放嚴加防範仍派諳練扎薩克台吉前往巡查奏入報聞辛卯命治朱爾默特那木扎爾妻子叛逆親屬之罪上諭軍機大臣曰據駐藏副都統班第奏稱朱爾默特那木扎爾立心叛逆勾通準夷寄書前去私立假號種種背逆惡迹顯露等語從前駐藏大臣傅清拉布敦奏朱爾默特那木扎爾有猖獗之心斷不可留請乘機擒翦朕尚意朱爾默特那木扎爾未必至於此極令伊等詳察確實再行辦理嗣後傅清拉布敦將朱爾默特那木扎爾誅戮朕猶以伊等雖為國除逆要是並無籌畫草率舉事以致捐軀今觀班第所奏則朱爾默特那木扎爾逆迹已露實屬時不可待而傅清拉布敦即乘機辦理可謂奮不顧身盡忠報國者矣前朕降旨以朱爾默特那木扎爾之子達爾扎策凌年幼令解送來京今朱爾默特那木扎爾背逆之罪既已顯著應照叛逆之律辦理以為衆戒著將班第奏摺及朱爾默特那木扎爾與準噶爾私通書札一併寄與總督策楞等令其將朕此旨曉諭藏內之人將朱爾默特那木扎爾之妻子即在彼處誅戮以彰國法尋策楞等奏稱在江卡爾地方將朱爾默特那木扎爾之妻子正法奏入報聞壬辰授駐藏副都統班第都統銜癸巳準噶爾使臣額爾欽等進貢入覲於蘇州行宫丙申賜準噶爾台吉喇嘛達爾扎敕書奉天承運皇帝詔曰據台吉奏請差人前往西藏喇嘛處遞贄見儀懇賜恩準等語曩者爾故台吉噶爾丹策零為父策妄阿喇布坦既殁奏請往藏熬茶策妄多爾濟那木扎爾為父噶爾丹策零既殁亦以熬茶奏請此皆欲追報先人是以俯從所請並加恩沿途賞給牲畜路費特派大臣官員照管彼時朕即降旨爾台吉因有此大事朕方允行否則斷然不許所降諭旨甚明今爾並非有如此大事何恩之當報乃欲差人往藏耶不但無換一台吉即遣人赴藏一次之理即中國亦豈有屢派官兵照管之理耶爾所請遣人赴藏之事斷不可行至所奏喇嘛學經一節因爾舊台吉策妄多爾濟那木扎爾奏稱準噶爾地方所有西藏喇嘛大半物故懇準少派數人至藏學經以廣黃教朕念差人至藏學習則事不可行而爾地黃教就衰亦殊可念因為爾等計中國大廟內原有自藏選來髙僧是以許爾處將可以學經之聰慧喇嘛或十人或二十人送至京師習學數年而回可以闡揚黃教此朕念和好日久周詳曲體之特恩初非敕令爾處夷人來為僧徒也今乃謂爾處喇嘛未曽出痘不能赴京學習懇將精通經典喇嘛準請四五人到爾處教習夫學習文藝有就學無往教爾處既稱無可赴京之喇嘛應即行停止今爾使臣額爾欽口奏又謂台吉令伊等奏懇自藏延請四五喇嘛教習數年再令回籍等語此又與爾奏書有異朕今念爾護持黃教之意準爾所請令髙等喇嘛前往教誨但既命往之後爾毋得藉稱命往之喇嘛平常揑詞再來瀆奏是以令爾使回巢後明白宣示爾再遣使來請并將不行此等伎倆之處抒誠具奏然後令喇嘛前往此亦有關中華聲教朕豈肯令漫無德行不能訓導之人充數耶爾固不必慮此再交易一事乃朕優恤逺方之大惠前既定以年嵗約以章程即當永逺遵照而近年來貿易者貨物每次加增較前數倍邊疆司事之臣屢請駁回朕念其攜貨逺來若不準銷售則虧損實多姑準量為交易而該使該商皆謂不知從前議定成數又謂非能自作主張歸當告之台吉伊等果歸告與否固未可知然恃朕遷就加恩因而屢增無厭將來必至定數之外一一駁令帶回而後已今特明切曉諭嗣後肅州貿易毋得過乾隆十三年貨物之數使臣前來以尼瑪上次帶來貨物為準如逾此數即由邊境駁回不準貿易爾其曉諭使臣商人等俾知敬謹遵行朕亦敕諭疆吏照此辦理今後不得仍以不知成例為辭也丁酉申諭陜甘總督尹繼善準夷貿易事宜上諭軍機大臣曰準噶爾夷人交易一事每嵗加增固屬無厭而為數太多亦屬難行前見尹繼善所定交易之數較之上次未及其半伊等歷年已加增至數倍何能強之驟減朕即料其未能奉行昨召見夷使果稱總督曾有字來原非奉旨事理未便遵行等語觀此則其不能遵奉可知朕今諭該台吉肅州交易以十三年來數為準來使交易以尼瑪來數為準不得出此範圍可寄知尹繼善令其遵照辦理在此數內者許其交易多者駁令帶回總在不離大數貨物內此多彼少許其折算相當如此則伊等不致受苦其心自平而後來亦有節制矣三月庚戌飭禁喀爾喀私與準噶爾回人貿易先是定邊左副將軍親王成衮扎布奏稱喀爾喀卡倫侍衛前鋒有私與準噶爾回人交易者現在賒欠回人帳目多有未還致相爭論請將該侍衛前鋒等革職審擬定罪其坐卡倫之台吉內如有私自交易者亦革退審擬奏入得旨著嚴審究治至是成衮扎布覆奏私相貿易一事相沿已十餘年喀爾喀各旗俱有不止一案應請一併查究奏入上諭軍機大臣曰前以私相交易一事所關甚大是以令成衮扎布究治今覽此奏則從前額駙策凌在時已有此弊且各旗俱有並非僅此數人如將伊等俱革退台吉訊究則獲罪者衆朕心實有不忍著祇將此次發覺之案訊治餘皆從寬免究仍遍諭喀爾喀之衆扎薩克蒙古等嗣後如再有違例出境交易不獨將貿易之人治罪并該扎薩克亦從重治罪斷不輕貸將此交與將軍參贊大臣等不時嚴查禁止毋得怠忽甲寅定議達木蒙古歸駐藏大臣管轄四川總督策楞等奏言臣等奉旨令將達木蒙古歸駐藏大臣管轄並命查玉暑那克舒番人應否亦令赴藏聽調查玉暑那克舒一種番人離藏千餘里不但調至藏地須料理養贍且恐啓唐古忒人之疑惟達木蒙古自頗羅鼐奏準差派防範卡隘後遂不時選調駐藏跟隨支領達賴喇嘛倉內口糧并有因牛馬養贍而就食於藏地者前朱爾默特那木扎爾就戮時跟隨之蒙古共三十餘人俱不敢從逆各奔避原住之達穆地方甚屬恭順今令歸駐藏大臣統轄易於料理查訊各蒙古頭目亦俱願歸達穆住牧以聽調遣從前頗羅鼐父子濫賞宰桑台吉等名號實屬僭越應照內地之例編設佐領將現在頭目給以固山大名號其下每一佐領再選派佐領一名驍騎校一名照例一體賞給頂帶每年一次查考勤勞恭順者加以賞賚不守法度者分别懲革奏入上從之戊午陜甘總督尹繼善奏撤西寧口外添防官兵尹繼善奏言青海境外得卜特爾及伊克柴達木等處乃通準噶爾要路歷年派撥緑旗蒙古官兵分設臺站卡倫哨探瞭望上年九月內因準噶爾夷人至西寧口外投誠誠恐無知逃竄之人乘機擾我邊界防範不可不嚴是以添派遊擊一員守備一員千總二員外委二員緑旗兵一百一十名並令郡王索諾木丹津衮楚克達什帶領蒙古官兵三百六員名同緑旗官兵駐劄得卜特爾伊克柴達木兩處今準夷新立台吉之後即遣使入貢甚為恭順且時值春融已過防冬之候原設卡倫足資防範其添設官兵自應飭令各歸本汛以省糜費奏入上從之夏四月戊寅定議西藏分設噶卜倫四員公同辦事並敕諭公班第逹等四川總督策楞等奏言臣等奉旨令將藏地噶卜倫多立數人以分其勢隨密訪與論舊例噶卜倫本屬四人一係公班第達餘係策凌旺扎爾色玉特色卜騰布隆贊三人俱藏內大族素為番衆所服內布隆贊雙目失明難以録用其策凌旺扎爾色玉特色卜騰皆老成明白可勝噶卜倫之任應請仍放為噶卜倫至布隆贊所遺之缺據達賴喇嘛以番衆不能深曉黃教保舉喇嘛尼瑪嘉木燦明白可信臣等擬請給豫扎薩克喇嘛職銜放為噶卜倫公同辦事奏入上從之復敕諭噶卜倫公班第達扎薩克台吉策凌旺扎爾色玉特色卜騰扎薩克喇嘛尼瑪嘉木燦等曰西藏廣興黃教為清淨善地達賴喇嘛掌管西方佛教廣演經法從前供養喇嘛一切事務原係噶卜倫四人至朱爾默特那木扎爾諸事專擅不與衆噶卜倫商議負恩任性潛懷異圖因此駐藏大臣將伊正法今藏內已經平靜噶卜倫事務不可一人專辦特令總督策楞揀選賢能仍照舊例分設噶卜倫四員公同辦事爾等當感戴朕恩尊敬達賴喇嘛和衷協力黽勉供職勿存私意致生猜疑勿分彼此互相瞻顧遇有緊要事務稟知達賴喇嘛與駐藏大臣遵其指示而行爾等其感恩宣力副朕興黃教安羣生之至意癸未定議藏地遣使入貢章程四川總督策楞等奏言向例達賴喇嘛進貢正副二使俱係達賴喇嘛派遣自郡王頗羅鼐以來遂以正使為達賴喇嘛之貢使副使為該郡王之貢使今應仍照舊例正副二使均歸達賴喇嘛派遣其四噶卜倫所進丹書克即交該二使附奏奏入報聞定議仍設駐藏官兵及臺站事宜四川總督策楞等奏言臣等奉旨藏內仍須駐兵五百其沿途臺站亦應照數安設妥協臣等現將所帶進藏官兵內照數挑選駐藏其臺站各官兵向係遊擊一員守備一員千把總十員兵一千名查舊設塘汛視地之簡要定兵之多寡聲氣尚屬聨絡惟各汛兵丁半屬老弱其故皆由向例三年之內遇有缺出該管官即就近招募濫行充補所致今酌議拉里以西離藏尚近如有缺出應聽駐藏大臣將藏地可拔之餘丁驗補其拉里以東距藏較逺駐藏大臣不能挑驗應令嗣後遇有缺出不準就地招募即於下臺現兵內挨站遞行撥補將所遺糧缺趲至打箭爐令阜和營遊擊於內地餘丁選拔奏入上從之戊子命立傅清拉布敦祠於通司岡五月丙辰命議藏地防範事宜上諭軍機大臣曰頃準噶爾使臣額爾欽等稱伊新台吉喇嘛達爾扎為王自策妄阿喇布坦以來皆稱台吉並無稱王者朕已降旨詰責然觀其能使屬下稱奉如此或尚係稍有才能之人不可不備其窺伺凡我疆界益應嚴加防範前玉保奏稱進藏熬茶之人回遊牧時俱出西藏喀勒占庫車卡倫由阿哈雅克直入噶斯路而去自喀勒占庫車至阿哈雅克其間並無卡倫因於綳安里瑪爾地方添設卡倫四五處至阿哈雅克地方寬廣由噶斯路而來直通西藏之喀喇烏蘇又與玉暑那克舒番衆相近此阿哈雅克既係準夷抵藏之路似應添設數卡等語將此寄知班第等令其與達賴喇嘛及四噶卜倫酌量地勢詳悉密議以聞尋駐藏都統班第侍郎納穆扎爾奏言臣等與達賴喇嘛傳集噶卜倫班第達策凌旺扎爾色玉特色卜騰尼瑪嘉木燦公同商議據稱本年各卡地方俱已添派兵役嚴固防範自喀喇烏蘇及穆什哲爾根綳安里瑪爾阿哈雅克等要地亦添兵駐劄再阿哈雅克路離藏遙逺今照從前準噶爾人前來之例自喀喇烏蘇以往至那克桑喀勒占庫車等處接連添設八臺以便送信現在備辦亦極堅固可以無慮仍嚴飭巡卡之扎薩克台吉等不時留心巡察俟大雪後撤回奏入報聞閏五月甲午命兩江總督黃廷桂調補陜甘總督尹繼善調補兩江總督六月癸卯定議查核烏梁海出入卡倫事宜定邊左副將軍親王成衮扎布奏言和托輝特貝勒青滚雜卜公額林沁等所屬烏梁海住居卡倫內外者原未禁其出入是以近日有賒欠回人帳目等事敗露如再不定例行走日久恐有夾帶蒙古出界往返貿易賊盜潛生等弊臣等公同酌議每年遣往烏梁海徵差者青滚雜卜旗人三十名駝不得過五十額林沁旗人十名駝不得過三十每人騎馬二匹於遣往時將數目呈報烏里雅蘇台參贊大臣給與出卡文票再伊等所屬烏梁海內如有詞訟盜賊等事須遣人辦理亦豫將遣往人數呈報請給文憑至卡倫內外居住之烏梁海彼此往來從無文憑但稟告卡倫侍衛台吉前往今若忽給文憑恐愚昧之徒妄生猜疑請照前準其出入其逺在卡外之烏梁海等前來謁見扎薩克帶來伯勒克牲畜等物俱著卡倫侍衛查明呈報參贊大臣準其進卡至回歸時扎薩克酬賞伊等貨物亦將數目聲明移咨卡倫侍衛查閲放出惟不許將人口帶出至厄魯特貝勒彭蘇克公丹拜所屬烏梁海亦係青滚雜卜額林沁之屬下仍照前例準其進卡謁見如有帶來之物及賞賜帶歸之物俱交卡倫侍衛查閲呈報烏里雅蘇台參贊大臣奏入得旨軍機大臣議奏尋議應如所請上從之甲子準噶爾部人布圖遜布林特古斯來降命賞給安插如例秋八月乙未準噶爾部人濟爾噶爾來降命賞給安插如例辛丑陜甘總督黃廷桂奏預備明年準夷交易請仍歸官辦得旨允行九月丁亥申禁邊境私相貿易上諭軍機大臣曰據定邊左副將軍親王成衮扎布奏稱準噶爾回人阿克珠勒等帶領四百人馬匹牲口四萬餘至伊都克卡倫求告貿易因使侍衛傅永等將禁止貿易之故曉諭又遣頭等台吉策卜登與效力行走索拜帶蒙古兵前往禁止貿易等語所奏甚是準噶爾詭詐難信禁止貿易之事伊等非不聞知今復攜貨求售若以其逺來辛苦恩準貿易伊等又習為固然嗣後更多帶貨物何所底止且日久或致别生事端必當速為嚴禁可寄知成衮扎布令其轉諭額默根明白曉諭回人阿克珠勒等云準噶爾與我大國和好以來議定祗在肅州與京城兩處貿易後又歸於肅州一處並未有在喀爾喀貿易之例爾等何得私帶貨物前來雖稱貿易已十餘年此皆下人私事亦從無數萬牲畜之多所有從前與爾等私相貿易之人已經查出治罪所欠之項亦已追出給還爾等豈得佯為不知自今以後不許再來貿易若因雪大難行暫準卡外過冬貿易則斷乎不可如此明白曉諭只作成衮扎布之意不必告以諭旨再準噶爾之人詭詐多計觀其能帶大隊牲口前來豈不能令大隊人衆行走乎成衮扎布又一摺奏稱準噶爾烏梁海八十餘戶在卡倫附近遊牧過冬請照例許其過冬回去等語由此觀之準噶爾之人明係習慣漸進今雖無事若任其如此日久恐致生事伊等漸次向內地遊牧或窺探喀爾喀等遊牧此等處不可不嚴緊防守先期預備各處卡倫時加稽察可傳諭成衮扎布知之庚寅授安西提督永常湖廣總督以甘肅提督李繩武為安西提督冬十月甲辰定議哈密防兵班滿回營敘勞擢補調任安西提督永常奏言哈密防兵二年一次更換伊等守卡瞭夜甚屬勤苦雖防所遇有缺出原可擢補奈防員無幾經年不得一缺而本營遇有缺出又以該兵逺在駐防不能擢補逮至回營或所知之本官升調他往新到之官不知該兵之能否依然困於卒伍請照直隸官兵派往北路軍臺之例於班滿回營時駐防哈密總兵將各兵勤惰分别等第造册移咨提臣核實報部轉發各該營遇有缺出將頭二等官兵以次與在營官兵相間擢補奏入得旨軍機大臣議奏尋議應如所請上從之己酉定議西路防範事宜先是總督尹繼善自陜甘調任兩江來京陛見上命軍機大臣詢問防範準夷事宜尹繼善將應行籌備各條具奏並請旨交陜甘總督黃廷桂安西提督永常等再行悉心詳議至是黃廷桂等密議尹繼善所陳各條及籌畫未盡事宜具奏得旨軍機大臣議奏尋議據黃廷桂奏稱哈密一帶城堡現俱堅固所需兵民糧食亦俱充足以及嚴飭卡倫晝夜偵探萬一有事堅壁清野務使賊無所利並甘涼安肅備戰兵丁現皆一一挑選精壯等條現在既屬有備應無庸再議其甘涼安肅戰兵所需馬駝一條查善後原議每一戰兵給二馬四兵合給一駝每炮一位配駝三隻經尹繼善奏準將甘涼肅三標兵丁按照一兵二馬之數儘馬派兵遇調先行其餘戰兵不敷馬匹以駝二隻折馬五匹今黃廷桂等稱甘涼寧肅備戰駝隻經慶復減半奏裁之後不敷撥給酌將三標原定戰兵一萬三千名除駐防哈密外先派甘提標二千一百名肅鎮標二千名涼鎮標一千九百名共六千名為首先應援一應馬駝俱照原定數目預備再派甘提六百名肅鎮四百名涼鎮一千名共二千名有馬則以馬摘撥無馬則以駝折給以備二起出口在甘肅二標馬駝可以通融敷用涼鎮少駝一百隻於甘標駝羔內揀補少馬二千匹將寧夏餘馬儘數協濟外尚少馬九百五十八匹請於涼州駐防馬匹內摘調再寧夏駐防馬駝别無動用之處應請摘馬二千匹駝二百八十隻遇調時即分解涼甘二標應用則涼甘二標又可各派兵五百名其三千名均可隨後出口加之安西戰兵三千名寧夏戰兵一千名共有一萬三千名兵勢不少等語俱應如所奏辦理至所奏甘涼肅三標不敷馬駝西寧固原河州已裁駝隻應作何籌補俟明春另行妥辦一節查現據永常奏稱安西提標於積年節省戰駝草料銀內採買餘駝以備逾額倒斃屢嵗買積及孳生駝羔共有一千五百五十二隻除口老嵗小不任馱載外現有堪用駝六百二十八隻其駝羔漸次長成亦可應用等語自可即於此項駝隻內酌量撥補甘涼等處應交與黃廷桂等妥協籌辦又固原等處不敷馬匹一條查固原戰兵二千名需馬四千匹並折駝馬一千四百匹而該提所屬止有馬四千六百八十四匹不敷馬七百一十六匹河鎮戰兵一千名原派馬六步四需馬二千匹並折駝馬六百八十八匹該鎮所屬亦止有馬一千五百七十匹不敷馬一千一百一十八匹今黃廷桂等稱固原戰兵依次出口與首先援𠞰之師有間應量為變通每兵給騎馬一匹二兵合給馱馬三匹並馱炮馬一百五十匹共需馬五千一百五十匹除該提馬匹儘數撥給外僅少馬四百六十六匹臨時可以雇覔駝騾馱載運往不致有誤河鎮戰兵亦應照固原戰兵馬匹之數將所有馬一千五百七十匹先儘馬兵六百名足用聞調即行其步兵四百名為數有限應請停派等語其量為變通之處應如所奏辦理至固原臨時雇覔駝騾是否可以尅期雇齊無誤軍行應令黃廷桂等臨期妥協籌辦其河鎮步兵四百名既無馬可撥且各路出口兵丁足資策應應準其停派但善後原議稱酌留甘標兵一千河鎮兵一千交與甘提備用今此項步兵既經停派是河鎮兵已不敷一千之數應令甘提於各標戰兵量撥足數留以備用至所奏各路官兵一切賞給等項令各州縣不拘何項錢糧臨時借動事後一併報銷等語亦應如所請行又哈密卡汛一條據稱天山西北之烏克克嶺正北之東大坂及東北之河源小堡等處均可大隊行走今已挖溝築柵勢難飛越其塔勒納沁距哈密二百餘里向派辨兵駐劄但形勢頗低北山一帶由上摩垓可繞至哈密城由坡子泉金鈎峽可直抵橋灣瞭望俱不能及是上摩垓等處尤為緊要現亦各設防卡等語防守已屬嚴密自可不致疏虞但賊或虛張聲勢而內地援師不審虛實遽往赴援又徒疲於道路應令密派幹辨務期偵探確實勿致張皇錯誤又臨期用兵機宜一條據稱哈密防兵專主堅守待援斷不致被誘輕出如賊以偏軍綴哈密而挾大隊邀我安西援師於中道我師不可輕敵必先據地勢然後相機擊之否則速約續至各兵并力攻𠞰或分兵繞赴哈密先襲其綴城偏軍使彼首尾莫顧我乃前後夾擊等語計議頗為詳慎但防兵雖不可被誘而有時機在可乘援師雖不可輕敵而有時利於速戰情形難以預料惟在該督提等審時度勢動出萬全庶可制勝又西寧赴援青海一條據稱青海蒙古逼近西寧設有緩急應照善後原議自西寧派兵或二千或三千赴援查該處實存馬三千八百三匹駝五百隻不敷撥用但西寧至清海不過百餘里倘有調遣自可輕裝前往毋庸多給馬駝應按現有馬駝通融預備馬步兵各一千五百名聞調即行等語應如所奏辦理至所稱以冬防為詞於西寧鎮標內派守備千把四員帶兵百名前赴各處要卡加意巡防偵探之處查青海之額率勒津及伊克柴達木得卜特爾等處汛地遼濶原派駐卡官兵每處不過數十人似屬不敷應照所請添派鎮標官兵巡防偵探其過冬應否撤回仍令該督提等酌量辦理奏入上從之十一月乙亥駐藏都統班第侍郎納穆扎爾奏報拉達克汗與達賴喇嘛致書回答情形班第納穆扎爾奏言準噶爾遣使吹扎卜達爾扎等十人到拉達克汗處通問在黃教寺中熬茶探聽土伯特信息又稱欲於藏內延請喇嘛難以前往求拉達克汗代向藏地請喇嘛數人至拉達克地方再差人前來迎接達拉克汗因致書達賴喇嘛將可否給與喇嘛之處請達賴喇嘛指示達賴喇嘛告知臣等並稱已答回書云我受大皇帝恩甚重土伯特地方人衆皆仰賴大皇帝養育今準噶爾欲請喇嘛若不奏明斷不可遣往近奉諭旨揀選藏內喇嘛進京甚衆伊等果誠心奏懇大皇帝必然賞給等語臣等思準噶爾台吉喇嘛達爾扎差人往拉達克探聽土伯特信息或因聞朱爾默特那木扎爾受戮妄意機有可乘故藉端探聽動靜拉達克部落弱小處於其間為之通信亦其常事但恐為準噶爾所愚將緊要信息透漏則大有關係臣等已令邊界卡倫嚴加防範又令達賴喇嘛與噶卜倫等曉諭拉達克汗諸凡見聞陸續報知藏內並賞給緞匹以示奬勵奏入報聞癸未定邊左副將軍親王成衮扎布奏報準噶爾內亂情形成衮扎布奏言據派出禁止貿易之驍騎校齊克慎等密報十月十四日有厄魯特庫本等六十人前來將貿易回衆及厄魯特人聚集於十七日黎明將回人庫楚克穆魯特等三十六人厄魯特孟克等十六人縛去我等將回人巴起帶至喀爾喀副都統班珠爾家中設法詢問據稱台吉喇嘛達爾扎夏間遣人往額爾齊斯地方喚大策零敦多卜之孫達瓦齊達瓦齊不敢去與台吉達什策凌烏巴什商議投奔大皇帝定於九月十二日帶領妻子及屬下人來投達什策凌烏巴什等暗將達瓦齊私謀告知喇嘛達爾扎至約定日期達什等集兵五千將達瓦齊屬下三千人擒獲一半並此處貿易內所有達瓦齊之屬下人亦行縛去等語又詢問貿易來之厄魯特錫喇卜據稱聞今年秋問台吉喇嘛逹爾扎差宰桑博和勒岱往唤達瓦齊議事達瓦齊不奉命喇嘛達爾扎遂遣博和勒岱鄂勒錐二人帶兵一萬往擒有人逃往達瓦齊處報信達瓦齊商議欲於九月二十六日前來投順大皇帝後聞博和勒岱鄂勒錐帶兵將到遂於二十二日帶兵五千行至和通哈爾垓地方被策凌烏巴什領兵追戰策凌烏巴什戰敗猶帶領殘兵尾追而博和勒岱鄂勒錐所帶萬餘兵在納林布魯爾河阿爾台山梁邀截此時光景未知如何等語臣等已令參贊大臣保德密諭各卡倫一應瞭望巡察之處加意防範如有投誠前來者酌量情形辦理奏入得旨達瓦齊乃準噶爾大策零敦多卜之孫在彼處衆台吉中較為強大今與伊台吉喇嘛達爾扎不合前來投誠若論與準噶爾和好自不應收受然議定疆界時並無彼此不留逃人之條且自康熙年間以來收養此等投來之準噶爾人不知凡幾今若不收達瓦齊等是絶伊歸路矣著寄信成衮扎布等達瓦齊若投入我卡倫實係力窮懇求收養可加恩給與口糧及騎馱牲口量為接濟照去年薩喇爾等投來之例將達瓦齊及屬下緊要頭目揀選數人先行馳驛送赴京師其餘人衆照例妥辦候旨倘未入我卡倫之先豫使人來懇求接濟則斷不可應付恐墮準噶爾詭計再此際達瓦齊實係率衆投誠與否一得實信即行具摺奏聞十二月甲辰命副都統多爾濟往代班第赴藏辦事丙午諭安西提督李繩武辦理夷使交易事宜上諭軍機大臣曰李繩武奏準噶爾使臣圖卜濟爾哈朗到境日期一摺內稱今次所帶人畜數目雖據稱不越欽定之例然或以多報少亦未可知現在留心查察等語準夷交易一事每嵗加增貪得無厭前經尹繼善奏請定以數目未免過於減少朕酌量加恩傳諭該台吉等嗣後肅州交易以十三年來數為準貢使交易以尼瑪來數為準多者駁令帶回今夷使所帶人畜貨物據報雖在定例之內但夷情狡詐或以多報少臨時又再三懇求以圖例外多售亦所不免此番係定例後初次交易不可稍有遷就著傳諭李繩武即行查明夷使等所帶人畜貨物如在定例之內準其交易若有浮多一面先令貢使進京一面查明所多之數槩行駁回使該夷將來知所遵循不致妄生希冀尋李繩武又奏稱此次來使所帶人畜俱在前次夷使尼瑪數內惟駱駝浮多二十隻與從前所奉此多彼少折算相當之諭旨相符並擦掌乏弱牲畜似俱應準其變售奏入上諭軍機大臣曰據李繩武所奏是該夷等已知恪遵朕諭不敢越例多帶矣其浮多駱駝既合之少帶之數折算相當自應準其交易至擦掌乏弱牲畜即留之口外喂養俟其回巢時帶歸亦未為不可何必定在哈密變售但為數無多需銀不過二千餘兩此次該提鎮等既循往例代為售變亦姑照所奏辦理然究屬不在額數之內者總之夷性狡詐不足深信或因此次定例之初故為恭順以相嘗試將來又復逐次增添亦未可定向來緑營習氣多圖遷就了事此次夷人交易必應明白曉諭示以節制俾其懷德畏威方為妥協若一味委曲周旋致夷人不但不知感激且窺測該提鎮等有畏彼之心則大不可矣著一併傳諭知之平定準噶爾方略前編卷五十三
