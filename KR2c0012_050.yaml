  text: 欽定四庫全書平定準噶爾方略前編卷五十
  hash: sha256:ef9046587881a17f7e6863b3e0b15e9fd9e5e42355ab62d1d4d5dc1505a0e9e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_050-1a, image: WYG0357/WYG0357-0716a.png}
body:
  text: 乾隆十二年春正月壬辰賞辦理夷使赴藏事務侍郎玉保路費銀二千兩乙未賜準噶爾使臣瑪木特等宴於豐澤園禮成隨頒賜準噶爾台吉策妄多爾濟那木扎爾粧緞等物如例丙申賜準噶爾使臣瑪木特等緞布銀兩冠服有差乙卯賜準噶爾台吉策妄多爾濟那木扎爾敕書奉天承運皇帝詔曰閲爾奏書爾能仰體朕加恩之意諸事俱遵㫖辦理如此恭順必能安爾屬下利爾部落朕深為嘉悅所奏往西藏念經人等有俟貿易後始往念經有即將貨物帶往念經者俱懇在哈集爾得卜特爾過冬俟貿易人由東科爾回歸㑹齊同往之處已俱照所請行至爾使臣瑪木特口奏念經人需用牲畜祈降㫖頗羅鼐令其協助東科爾貿易時俱令以銀兩交易等語頗羅鼐雖受朕封號究係逺方部落之人非內地臣民可比其資助與否朕未便降㫖至需用馬匹口糧朕自加恩照前賞給即頗羅鼐此次或多為資助亦未可定至貿易人等銀貨交易止可各從其便不便以官法抑勒但爾既特行奏請亦非甚難行之事現在照看爾使臣前往仍派侍郎玉保已令玉保與爾使㑹商計議而行爾使回時自能詳告也嗣後爾宜益加敬慎永歸和好以體朕廣教安民之至意特敕付來使齎回隨敕賜各色緞十端粧緞十端玻璃琺琅磁器十八事準噶爾使臣瑪木特等自京起程還部二月丙寅豫籌夷使進藏熬茶事宜辦理軍機大臣等奏言此次準噶爾夷使往藏熬茶仍由噶斯路行走其卡倫應添兵展放並豫先搬移青海衆䝉古眷屬等事應交與副都統銜衆佛保照乾隆八年例辦理至賞助來使口糧仍照前次賞給之數豫備牛羊米麵等物來使馬匹有罷乏者酌量賞給伊等若留罷乏牲口派官兵牧放再賞給所留人口糧官兵馬匹若有罷乏者於豫備駝馬內换給即將罷乏牲口交地方官牧放豫備回時更换以上諸項請交侍郎玉保亦照八年例辦理前次備往接濟馬匹口糧銀三萬兩餘剩一萬兩此次應動銀二萬兩交侍郎玉保帶往至回時核實報銷再乾隆八年來使在東科爾貿易事畢始啓行入藏故派西寧緑營兵三百名令往卡倫留一百名照看準噶爾留下人畜其餘兵丁照看來使至東科爾後即令各回本營另派滿洲兵五百名照看入藏此次夷使不至東科爾將貨物就近在卡倫上貿易即由彼處入藏不需更派滿洲兵請專派西寧緑營官兵照看來使留下之人其至藏後往各廟行禮時亦需防範跟隨之人請共派兵四百名交該督慶復選派總兵官一員帶領前往若報來使於八月到卡倫令派出官兵於六月內起程往哈集爾卡倫等候若信息不到仍照伊等原奏九月方來令官兵於七月起程其理藩院司官及筆帖式領催等交侍郎玉保帶領於四月起程往西寧凡應辦之項與衆佛保公同商辦再準噶爾此次在卡倫貿易因伊等念經需費懇求以銀交易應比前次帶往銀兩十七八萬兩之數略多豫備令巡撫黃廷桂於府道大員內揀派賢能之員曾經辦理貿易事務者前往辦理奏入上從之丙戍命駐藏副都統傅清覆奏郡王頗羅鼐意見情形上諭軍機大臣等曰據駐藏副都統𫝊清摺奏郡王頗羅鼐告稱部中參奏言其挾有私意殊屬屈抑又以部院與伊不合因有疑惑等情或係伊意中果有委曲怨望情形或因部參語重伊心畏懼思改已過殊未明晰頗羅鼐係彼處辦事之人伊所陳訴俱有關係理宜留心查察詳細具奏傅清此摺詞意甚屬含糊况伊應辦事務俱不留心惟事偷安繕寫奏摺俱甚潦草著傳諭傅清將頗羅鼐意見情形據實奏聞再上年十二月內曽降敕密諭頗羅鼐計其時日在傅清未奏此摺之時早已接到頗羅鼐見此㫖後作何言語傅清此次因何並未奏聞著一併傳詢令其覆奏己丑駐藏副都統傅清奏報拉達克汗䇿卜登那木扎爾訪察準噶爾情形傅清奏言正月初九日據郡王頗羅鼐告稱我囑令拉達克鄂勒錐圖汗䇿卜登那木扎爾遣彭蘇克與其屬下等共七人充作貿易前往葉爾羌等處體察準噶爾情形今彭蘇克等已回據云到葉爾羌等處時有葉爾羌回子頭目唤去訊問天竺巴巴咱汗及土伯特藏信息我等告以藏內現䝉大皇帝恩甚屬平安我等係多木津地方之人機密事不能深知彼處聞言疑惑發往準噶爾居住半年我等因將彼部內情形細加採訪訪得前年八月噶爾丹䇿零病故遺言令次子䇿妄多爾濟那木扎爾坐床將長子喇嘛達爾扎分路一千餘户令各自管轄其後令哈栁為使進京於上年六月回巢稱大皇帝隆恩甚厚許令進藏熬茶又准走喀喇烏蘇一路不勝欣喜又訪得䇿卜登台吉已獲罪被殺並其妻子及其叔父郭莽堪布喇嘛皆被殺郭莽堪布喇嘛之缺已令扎什倫布之阿克巴喇嘛補授阿克巴喇嘛之缺已令羅卜藏丹怎補授策妄多爾濟那木扎爾之姪女許與拉藏汗之孫納噶查為妻現在彼處所最重者是納沁宰桑察罕宰桑巴雅斯瑚朗宰桑小䇿零敦多卜固子宰桑等但因其台吉已亡而新立台吉年幼用事之人彼此不和惟恐阿卜都爾噶里木哈薩克土爾扈特喀爾喀等處發兵襲之所以防範卡倫甚嚴等語奏入報聞三月乙巳恤賞故西藏郡王頗羅鼐以其子朱爾默特那木扎爾襲封郡王辦理藏務上諭內閣曰據副都統傅清奏稱郡王頗羅鼐病故頗羅鼐任事以來克盡忠誠實心效力今聞溘逝深為軫悼著加恩於彼處收貯錢糧內賞銀一千兩料理喪事例應遣大臣致祭著派索拜前往祭奠應行恤典該部照例查奏朕從前因念伊奮勉肫誠降㫖令頗羅鼐保奏一子承襲封爵據頗羅鼐以次子朱爾默特那木扎爾堪以效力具奏業加恩封為長子今辦理藏衛噶卜倫事務乏人即將伊子朱爾默特那木扎爾襲封郡王但年尚幼小甫經襲爵辦事噶卜倫等務如頗羅鼐在時同心協力黽勉辦理著傅清將此㫖通行曉諭知之命駐藏副都統傅清體察西藏情形加意辦理上諭軍機大臣等曰西藏地方關係甚要頗羅鼐經事練達下人信服伊亦能奮勉效力諸事無庸置念今頗羅鼐已故雖命伊子朱爾默特那木扎爾襲封總辦藏衛事務而藏地素屬多事衆心不一值朱爾默特那木扎爾年幼新襲之時未必即能如頗羅鼐收服衆人之心頗羅鼐在時凡事俱由伊主張不過商同傅清斟酌辦理今非頗羅鼐時可比著傅清逐處留心留心訪查如有朱爾默特那木扎爾意見不到之處即行指示不得稍有疏忽再上年有達賴喇嘛屬下人鎮壓頗羅鼐一事伊等彼此已露不和之意今頗羅鼐暴殁朱爾默特那木扎爾或念伊父動生猜疑與達賴喇嘛不睦或達賴喇嘛又信人言即照所行於頗羅鼐者行之於朱爾默特那木扎爾則更有關係傅清於此兩人善為和解惟期地方安靜不生事端伊等彼此和好屬下人即有奸詐者亦不能滋事矣頗羅鼐總理藏務多年皆因能用其屬下可信之人凡事始皆妥當朱爾默特那木扎爾宜令其用伊父信用舊人協力料理方為有益再今嵗準噶爾又往熬茶恐其聞頗羅鼐已殁彼處無總理之人任意藉端造言生事亦未可定亦當留心防範凡應備辦牲畜口糧等項務須豫為儲備至照看來使之侍郎玉保係前次承辦之人一應事宜俱宜㑹同商酌務期妥協現在頗羅鼐殁後彼處衆人情形若何即應奏聞乃並未具奏殊屬疏忽此際彼處衆人意見情形及朱爾默特那木扎爾襲爵辦事後各處人心輸服與否俱著一一加意體訪具摺奏聞倘有一二不肖滋事之人亦著傅清即行酌量辦理以示警戒丙午命古北口提督索拜赴藏與副都統傅清同辦藏務安西提督李繩武奏報準噶爾使臣瑪木特等出境己酉軍營參贊大臣副都統保明期滿以副都統那蘭保往代夏四月壬戌籌議藏地防範事宜駐藏副都統傅清奏言從前阿里克地方原係頗羅鼐長子公朱爾默特䇿卜登駐劄管轄嗣因染患足疾奏明回藏調養兹頗羅鼐病故阿里克地方緊要伊足疾亦已漸愈臣即令其仍赴阿里克防範地方卡倫據公朱爾默特䇿卜登告稱請俟伊父建塔完竣即行前往再騰格里淖爾喀喇烏蘇等處每年夏季令朱爾默特那木扎爾領兵駐防今因伊父病故朱爾默特那木扎爾留藏辦事臣令其派親信宰桑那旺根敦管轄喀喇烏蘇之兵䇿凌達什管轄騰格里淖爾之兵無庸俟至夏季先期前往駐劄再從阿哈雅克卡倫起至阿里克地方止每卡俱添兵三十名用心防範其巡察阿哈雅克卡倫派扎薩克頭等台吉旺對前往奏入得㫖軍機大臣㑹同索拜議奏尋議阿里克地方甚屬緊要與拉達克連界今頗羅鼐病故正宜防範應令公朱爾默特䇿卜登親身前往方為有益再騰格里淖爾喀喇烏蘇等處朱爾默特那木扎爾既留藏辦事即令其派出親信宰桑等前往駐劄防範務期加意體察其阿哈雅克等處卡倫添兵巡察及委派專管之處俱應如所奏辦理再據公朱爾默特䇿卜登等奏伊父頗羅鼐遺言摺內報出喇嘛噶津林沁病故噶津林沁久住準噶爾地方回藏之後交與頗羅鼐看守防範今已七十餘嵗久經患病其言似無虛揑但正當頗羅鼐病革之際而看守之人指稱伊已病故略覺可疑恐朱爾默特那木扎爾為其屬下所䝉亦未可定應令索拜到彼留心體訪具奏入報聞乙丑駐防哈密總兵官王能愛奏報詢問夷使言語情形王能愛奏言臣於二月內欽奉諭㫖以準噶爾使臣瑪木特來京㑹議貿易熬茶事務伊等原奏明於九月中旬前來經玉保令其於八月初旬到哈濟爾得卜特爾貿易九月初即行進藏瑪木特等因已經伊台吉奏明未便遽定俟歸告台吉若如所議當於四月內遣人至哈密通信若照前奏即不送信可傳諭王能愛令於夷使回巢經過時將何時遣人確切詢明具摺奏聞臣於三月十一日接見夷使遵諭㫖事理詢問瑪木特據稱進藏熬茶之事已䝉大皇帝俞允我台吉原奏明於九月十五前後到哈濟爾得卜特爾地方貿易完畢進藏念經經天朝大臣等仰體大皇帝體恤之恩令於八月初旬前來九月間進藏天氣溫和行走便利此實有益我等之事我是以急欲回去酌定日期以便前來報信現在即欲啓程懇由烏克克嶺行走路途較近並有疲乏馬匹懇求换給數匹必得於四月十五前回到伊犁方不致誤事臣問以四月十五前方到伊犁報信人如何即能於四月內得到哈密汝須約定準期我在此等候呈報據夷使云我到伊犁定期後遣報信人來揀選好馬由我處卡倫晝夜兼行四月內必到哈密或仍照原奏於九月內前來即不送信臣諭以即使九月前來亦應送信為是據夷使云若仍九月前來送信與否當禀知台吉而行我亦不敢主張臣察具言詞及沿途行走甚緊其意亦欲於八月內前來是以急於回巢已照例護送出境奏入報聞甲戌籌辦夷人貿易進藏事宜甘肅巡撫黃廷桂奏言本年九月內準噶爾夷使進藏熬茶䝉聖恩允准除已有成例者俱照乾隆八年之例備辦外惟是前次係在東科爾交易今次由哈濟爾易銀前往所有應行隨時酌辦之處悉心逐一酌議恭陳聖鑒一夷人在哈濟爾易换銀兩不需貨物廷議令較上次交易之數略為多備查上次交易用官銀七萬八千餘兩今酌量豫備交易銀十六萬兩進藏備用銀二萬兩又料理官兵口糧鹽萊應賞俸餉運送腳價等項約需銀十五萬兩除八年熬茶案內剩銀三萬餘兩外尚應需銀三十萬兩請先在甘肅藩庫內撥用仍於鄰近省分速撥解甘還項一上次運糧及通信緑旗官兵口糧鹽菜俱係從寧裹帶今次護送夷使派出緑旗官兵同行全資馬力未便攜帶口糧以致遲纍除從寧赴卡由藏回寧令其自行攜帶外其由哈濟爾進藏時所需口糧三個月鹽菜六個月應照上次滿洲官兵例撥兵運送其到藏駐劄及留牧兵丁並運糧兵丁仍照上次之例辦理一防護緑旗兵丁於賞銀外每名請借支半年餉銀至緑旗官員照例賞給一年俸銀均不敷用請酌借總兵銀五百兩遊擊都司二百兩守備一百五十兩千把總八十兩於回營之日在俸餉內分季扣還一乾隆八年夷使至東科爾貿易奏明賞給食物三次今次仍請於哈濟爾俟夷使初到時賞給一次外其二次賞給應請於卡倫交易事畢起身進藏時令照看夷使之侍郎玉保等宣布皇上隆恩再賞一次熬茶事畢回巢時仍在附近青海之處賞給一次其應賞物件廷議令備牛羊米麵等物查乾隆八年准侍郎玉保咨明將牛羊米麵酌换茶奶酥油賞給今應仍照前例辦理奏入得㫖軍機大臣議奏尋議上次交易用銀共二十三萬餘兩此次在卡倫貿易零星貨物俱需官買自較前次之數有加是以臣等議令略為多備今該撫酌定帶銀十六萬兩量已敷用其官兵口糧及備帶銀兩共估需銀三十餘萬兩應照所請即行動用敕部酌撥補還再前次護送滿洲官兵口糧俱另撥官兵護送緑旗兵丁口糧則令自行裹帶此次護送夷使緑旗官兵若照舊例概令自行裹帶誠多未便亦應照該撫所請除從寧赴卡由藏回寧外俱照滿洲官兵例撥兵運送其到藏駐劄及留牧運糧兵丁俱照前例辦理至上次護送夷使進藏緑旗官辨賞一年俸銀馬兵賞銀十兩步兵賞銀六兩與滿洲官兵之例不同但此次緑旗官兵係護送夷使往藏長途跋涉未免拮据應悉照該撫所奏數目借給回營之日按季扣還其三次賞給夷使並備用黑茶酥油白麵等物之處均應如所請辦理奏入上從之丁丑命副都統銜巴爾品赴軍營效力上諭內閣曰那蘭保不必前往軍營著調補熱河副都統巴爾品著革職賞給副都統銜自備資斧前往軍營效力三年再行請㫖五月壬辰飭禁買馬兵民私越卡倫辦理軍機大臣等奏言從前甘肅一帶所需營馬原由金塔寺出口往喀爾喀等處採買乾隆七年肅州鎮臣遣人逺赴額爾得尼招附近軍營買馬額駙䇿凌恐其滋事報部禁止嗣經總督慶復議以每年定限給票不得濫往並指明地方甘肅各營由金塔寺口外行走安西各營由布隆吉爾西喇呼魯蘇一路行走在北路喀爾喀䝉古庫倫恰克圖一帶購買業經部議覆准今安西提督李繩武奏買馬辨兵經過圖古里克遇見準噶爾脫出䝉古孟克一名等語查買馬辨兵不遵原奏擅赴圖古里克其地在哈密卡倫之外與準夷邊界相通誠如聖諭彼處人可從此逃來則內地或有不肖之人亦可從此潛往將來買馬之人由此經過未免滋釁應嚴加防範以肅邊境除甘肅各營出金塔寺口者仍照原議亦不得至哈密卡倫外其安西各營即在附近西寧一帶採買不得逺至喀爾喀即或需往喀爾喀䝉古等處採買亦令在卡倫以內行走其圖古里克一帶及哈密卡倫外行走之處永行禁止奏入上從之己酉安西提督李繩武奏報夷使赴藏熬茶日期李繩武奏言本年五月初五日準噶爾夷使奔塔爾來至哈密報赴藏熬茶的期據稱我宰桑瑪木特於四月初六日回至伊犁告台吉䇿妄多爾濟那木扎爾云進藏一事䝉大皇帝恩准令於八月初十日前後到哈濟爾及早進藏我台吉不勝感激給我字單令我先來報信隨將所送字單譯出內稱往西邊念經熬茶之人定於八月十五前後致哈濟爾約共三百人宰桑四人一瑪木特一吹納木喀一巴雅斯瑚朗一圖魯庫喇嘛三人一綏綳一溫都遜一固尼爾等語奏入報聞庚戌定邊副將軍額駙䇿凌疏奏暫停派閲看喀爾喀軍裝䇿凌奏言今年正當喀爾喀四部落大㑹之年又遇閲看軍裝之期應派參贊大臣稽察喀爾喀四部落所備軍裝但盟長與各扎薩克帶領人衆兩次豫備未免煩費請照乾隆八年之例將閲看軍裝事暫停派參贊大臣前往即交副將軍及盟長等令其在各游牧處查看奏入報聞定邊副將軍額駙䇿凌疏奏減撤喀爾喀防秋兵䇿凌奏言定例每年派喀爾喀兵三千名於秋間來至軍營操練防範今軍營無事各䝉古力量應加體恤請裁減兵一千名奏入得㫖軍營現在無事操練防範之兵原不必如此之多所奏是依議己未定議進藏沿途卡倫臺站事宜軍機大臣奏言據侍郎玉保等奏稱乾隆八年準噶爾來使入藏熬茶由噶斯路行走於來使到時將伊克柴達木得卜特爾兩卡倫展設於哈濟爾察罕烏蘇派出西寧緑營兵一百名今年來使仍由噶斯路應照八年之例辦理等語應如所奏交與西寧總兵官張士偉派兵一百名與䝉古兵同在哈濟爾等處展放卡倫再乾隆八年侍郎玉保帶領準噶爾之人赴藏因沿路未設臺站凡奏摺傳事俱從四川馳遞不但路途逺逺若有候㫖辦理之事必致遲誤今次應請於現派出卡倫䝉古緑營兵丁內酌量派五六十名交玉保進藏時帶往自哈坦和碩至喀喇烏蘇暫安臺站遇有緊急事務沿途遞送俟準噶爾人回巢後仍行撤回奏入上從之六月癸亥籌議夷使進藏熬茶添兵防範事宜駐藏副都統傅清奏言夷使赴藏熬茶各緊要地方俱應添兵防範所有阿哈雅克騰格里淖爾一路地方前次派兵六千令朱爾默特那木扎爾防守今朱爾默特那木扎爾既留藏辦事其地已派宰桑那旺根敦䇿凌達什在彼管轄應即交與伊等防範駐守至準噶爾進藏之時臣另派噶卜倫䇿凌旺扎爾等前至喀喇烏蘇帶兵三百名護送至藏其防守阿里克一路已令公朱爾默特䇿卜登前往仍照前次帶兵五千名在彼駐劄又查工布與達克布及藏內地方其備過兵四千名臣仍照數防備現在調用兵共一萬五千名再從準噶爾至藏路徑甚多共有五處每處俱須安設卡倫每卡俱派兵一百名頭目一名令其小心偵探又歸併藏內之那克素三十九部落番子原係羅卜藏丹津屬下之人罔知法紀聞夷使入藏難保其必無生事之處應於夷使將到時令其游牧移至别處以避其路仍派人約束照管暗行防範其準噶爾人等往各寺廟熬茶之時仍派官兵與原護送之官兵一同約束並密飭各寺廟喇嘛之處已俱交朱爾默特那木扎爾小心辦理奏入得㫖軍機大臣議奏尋議準噶爾往藏熬茶因係奏明為伊父修行善事是以䝉恩俞允而藏內之人慮其狡詐不敢輕信防範豫備自不可忽但調兵至一萬五千不免聲張耳目且準噶爾此次尤極恭順諸事俱遵㫖而行應外示以寬和之恩而從中暗行防範以備不虞現在調兵太多不但勞費無益反恐伊等聞知轉生疑懼應令傅清酌量豫備調兵數千名於緊要各處嚴行防守尤當行所無事不涉張皇方為妥協一切與郡王朱爾默特那木扎爾公同商酌相機辦理至將那克素各處番子於準噶爾將到時約束搬移以及密飭各寺喇嘛之處俱應如所奏辦理奏入上從之籌辦赴藏大臣官兵等米糧事宜駐藏副都統𫝊清奏言前次準噶爾赴藏熬茶管送之大臣官兵等所用米糧動用庫項採買二千三百餘石後實支用九百餘石所餘米石作為駐藏官員兵丁口糧現已無存此次應較前次量為減少豫備二千石再管送之大臣官兵及準噶爾熬茶人等所用之柴草奶油茶葉炒麵等項應酌量豫備之處交朱爾默特那木扎爾妥協豫備其用過銀兩即於彼處收貯錢糧內照數支給奏入得㫖軍機大臣議奏尋議此次管送之大臣官兵較前次為數既少上次止用過米糧九百餘石則此次豫備二千石尚屬過多採買挽運不無勞費相應飭令採買一千石以備支用其草料等項應如所奏豫備事竣核實報銷奏入上從之戊辰定防範逃人事宜定邊副將軍額駙䇿凌奏言所有交與和托輝特公額林沁安插約束之投誠準噶爾烏梁海泯達遜一户私自逃回旋經拿獲已將泯達遜等正法其子索雲解送理藩院照例辦理奏入得㫖著查明由準噶爾投誠交與各扎薩克地方安插之烏梁海等共有若干人將如何防範不令逃回之處軍機大臣等議奏尋議由準噶爾陸續脫回及投來欲歸親族之厄魯特烏海梁及回人等共五十起二百二十一名口俱由軍營詢明情節奏明交與各該旗安插今泯達遜一户無故私自逃回則此投誠人內未必無似此者應交額駙䇿凌及提督李繩武令其密飭各該扎薩克等嚴加約束並令各處坐卡人員不時巡查毋稍疏懈至平日防範之處亦不宜顯露形迹過於聲張致令伊等妄生疑懼惟暗中留心防範方為妥協其解送逃人索雲一名俟到京之日交與刑部永逺圈禁奏入上從之辛未命兩路軍營大臣分别辦理投誠人等上諭軍機大臣等曰提督李繩武奏稱詢問自準夷投來之厄魯特巴雅爾據稱伊係去年隨同來使瑪木特前來之人回巢時因副使都喇勒哈什哈出痘令伊調治未愈身死瑪木特不令伊同行都喇勒哈什哈從人又欲將伊加害兩次向家逃歸在路被獲今又乘間逃來等情應將巴雅爾照例辦理送至京師等語此人係近日隨來使到京之人又有逃回兩次被獲情節今投順前來彼處斷無不知非從前投誠之人可比李繩武應具奏請㫖辦理乃即向伊詳問彼處一應事宜信息送至京師辦理甚屬不合但此時若再令回歸伊必備細歸告緣由反令彼處疑惑致生事端此案著即照此完結朕思屢收此等投誠之人竟無裨益從前用兵時尚欲得其信息方今罷息干戈伊等甚屬恭順來使交易往來並無事端得其信息與否無甚關係且此投誠人內大抵皆沿邊居住或幽僻處所者居多彼處要緊大事未必稔知即伊道聽之言亦難憑信假如一人前來謂彼處有進兵之信可即信其言遽爾出征乎亦不過照原先定議固守疆界耳現今將若輩收留安插不但需費繁多將來辦理亦費周章但原定疆界時並未有彼此不留逃人之語不便將投來之人即行拏解伊處嗣後如有投至卡倫者務須問明逃時曾否有人知覺或有無追拏之處如有前項緣由不必詳問彼處細事即諭以現今和好爾台吉甚屬恭順大國施恩不比從前汝國逃來之人不便收留若即拏送又恐致汝受罪可即自行投回明白曉諭不必令進卡倫倘自彼處來時無人知覺又並無追拏等情問明後送至軍營聽候辦理可密諭兩路軍營大臣等知之戊寅命郡王朱爾默特那木扎爾酌量資助熬茶人等牲畜口糧上諭軍機大等等曰此次準噶爾使臣瑪木特來京奏稱從前伊處赴藏熬茶人等頗羅鼐並未照舊例幫助牲畜口糧等語經朕以頗羅鼐雖係受封號之人究屬逺方部落非內地臣民可比不便降㫖令其資助但此次或較前量加資助亦未可定詳悉曉諭該夷使等並於玉保前往時令其向朱爾默特那木扎爾公同商酌妥協辦理著再傳諭傅清令其轉諭朱爾默特那木扎爾此次夷使到藏時雖毋庸循照舊例二十日即行辦給一次著於初到資助之外酌量駐藏日期多寡再行辦給一二次俾夷使等咸知感恱安插準噶爾烏梁海扎勒布辦理軍機大臣等奏言雍正十二年內北路軍營將拏獲準噶爾烏梁海宰桑鄂魯什野勒之子扎勒布解送來京奉㫖著將扎勒布暫且留養俟後來再定業經留養在聖華寺內至今十有餘年年近三十前因軍務未竣是以未經請㫖定奪今準夷恭順軍前寧謐扎勒布毋庸看守又不便發回游牧請照投誠厄魯特給與娶妻立産銀兩照例安插奏入報聞丙申定邊副將軍額駙策凌疏奏撥解軍營備貯銀兩䇿凌奏言現在軍營一年需用錢糧約計一十萬兩有零自乾隆十年十月內解到銀二十五萬兩陸續支放外尚存貯銀一十二萬兩有零足支一年之用而軍需錢糧理應豫備請將乾隆己巳庚午兩年應用銀二十二萬兩及備用銀三萬兩一併解交軍營以備應用奏入上從之秋七月己酉命移金塔寺回衆于哈密安置上諭軍機大臣等曰肅州金塔寺安插吐魯番回子內有不服水土至於生計艱窘者一百餘户經大臣等議奏請移于哈密種地居住此項回衆向被準夷凌虐情願移入內地迄今二十餘年因水土異宜積蓄者少窮迫者多若將伊等移于他處究不能于生計有益哈密吐魯番雖部落各異其教則一情性相宜且哈密貝子玉素富自伊曾祖額貝都拉塔爾罕伯克以來數世受國家恩澤竭誠報效奮勉急公教養所屬之人亦甚妥協現在哈密地方尚有可種餘地著將安插金塔寺回衆交貝子玉素富併入伊所屬旗分佐領加意撫恤令新舊回衆和好如一撥給餘田令其耕種俾永逺不致失所將此傳諭貝子玉素富知之丁巳准暫停青海王公等巡察卡倫軍機大臣奏言據侍郎玉保等奏稱每年春秋二季巡察額色勒金柴達本兩路卡倫派定青海王公扎薩克台吉等每一路遣一人巡察卡倫又派莊浪滿官四員帶領兵丁每年於秋間巡察一次均應於九月間自西寧起程前往今值夷使進藏熬茶請暫行停止等語查準噶爾夷使赴藏熬茶侍郎玉保現已在哈濟爾駐劄倘巡察卡倫人等照舊前往正值夷使將到人多勢衆恐致夷使生疑反多不便應請將今秋巡察卡倫之青海王公等並莊浪官兵俱暫行停止俟明年春季仍照舊派往奏入上從之八月戊寅準噶爾部人鄂勒錐尼瑪挈眷來降命賞給安插如例辛巳訓飭綏逺城將軍補熙等上諭軍機大臣等曰據額駙策凌奏稱綏逺城將軍補熙等遣佐領素爾芳阿前來軍營買馬經臣告知遣員汝等賫來俱係官帑途間萬一遇有賊盜關係非小不比客商既經逺來可到鄂爾昆買得牲畜即便回歸嗣後不可為例等語此事額駙策凌尚能籌及告知遣員補熙等辦理疏忽不知大體甚屬不合滋生銀兩雖應酬辦或在他處貿易或交商人領辦皆無不可特差官兵持銀逺赴軍營貿易不特事理不宜設途中遇有宵小竊發更於大體有關補熙等著傳㫖申飭該副都統等曾否與之商議究竟出自何人之意並著伊等明白回奏壬午準噶爾部人博克來降命賞給安插如例更定軍營官員換班事宜副都統保德奏言軍營侍衛官員拜唐阿等應換班時隨伊等報滿日期更換未有定時但此等換班人員一出張家口均係馳騎䝉古馬匹若適遇冬春正值䝉古牲畜疲瘦之時應付馬匹及供應食物未免拮据請將軍營換班人等於五月半間自京起身換回之人於七八月間來抵京城其差使來京者除有要緊事件外其尋常賫送檔冊事件差使亦令俟五月起身於九月間回至軍營再軍營換班若均在一年應換之人太多亦殊未便請將看水草侍衛部院衙門官員作為一年更換卡倫侍衛作為一年更換再口外行走惟工珠及珠爾惠兩路若換往之人由工珠一路行走則換回之人令從珠爾惠一路行走則換回之人路換班行走䝉古人等自不致於拮据奏入得㫖軍機大臣議奏尋議均應如所請辦理現在軍營官員內有冬春應換者即照此奏俟於來年五月內更換其看水草侍衛向係新舊錯綜更換不便令與部院官員一時全換現在十員侍衛內仍留一半另作一次更換奏入上從之九月辛亥命原任布政使安圖更替原任按察使劉柏辦理北路軍營糧餉事務癸丑命侍郎玉保覆奏夷使熬茶情形上諭軍機大臣等曰據玉保奏準夷熬茶來使先遣阿喇卜扎報知伊等至塔里木河因水大難渡不能如原約於八月十五前後到來緣由又詢問此處現派大臣幾員領兵若干駐劄何處各情由看其光景似有疑慮等語此次準噶爾進藏熬茶諸事皆允其所請又係伊等從前經過之事理宜無所疑慮玉保此奏亦甚含糊並未詳悉聲明著即傳㫖詢問若因伊遲誤約期預先遣人來報即料其有疑慮玉保尚屬曉事人不應如此或準噶爾人等違背約期自知食言遂有掩飾之意玉保即從此生疑亦未可定務將實在情形明白速奏以便豫行辦理朕思準噶爾人等素行詭詐難以憑信近又新襲台吉或借赴藏緣由窺我邊界且進藏熬茶離青海甚近藉端謀襲青海亦不可不慮及凡一應豫備防範之處即令玉保會同地方大員密行商酌設法辦理倘伊等本無疑惑之形而內地稍露張皇之意反致伊等疑懼則更大有關係此事已令大學士慶復暫駐陜西豫行籌辦凡應行會商之事就近密商妥辦仍俟玉保覆奏到日再行酌量並將此㫖寄慶復知之命慶復留駐陜西密行防範上諭軍機大臣等曰據侍郎玉保奏稱準夷熬茶來使於中途遣阿喇卜扎前來告稱伊等至塔里木河因水大難渡將約定八月十五日期不能到來緣由先行報知又詢問此處現派大臣幾員領兵多少駐劄何處各情形看其光景似有疑慮等語準夷如何疑慮之處具奏不明已降㫖詢問玉保著將此摺抄寄大學士慶復閲看準夷向來不可憑信策妄多爾濟那木扎爾新襲台吉往藏熬茶離青海甚近藉端謀襲青海亦未可定自應防範豫備現在玉保止領兵丁四百名提督李繩武逺在西安總督張廣泗又駐軍營西寧等處並無大員設或偶生事端亦屬可慮前令大學士慶復回京必取道於陜西此時如已起程即令在陜西暫住靜候玉保信息就近將一應豫防事宜暗為備辦設有事端一面具奏一面辦理然不過先事豫籌之計務宜加意慎密斷不可令夷使等稍有知覺反生疑惑即內地人等亦不可稍露形迹致令泄漏俟應令伊回京時候朕降㫖再行回京己未命收留投誠人等毋得拘泥辦理定邊副將軍額駙䇿凌奏言本年七月內有準噶爾烏梁海杭噶勒投誠前來經臣等詢問伊逃來時與一䝉古台吉額倫同逃額倫已被人拏回伊一人步至卡倫已遵㫖阻回嗣後除即行阻回者毋庸另議其有畏本處治罪不肯回巢者臣等難以辦理請酌量照前收留俟夷使進貢來京時特降諭㫖將不容留逃人之處曉諭準噶爾台吉彼必愈加感激聖恩而臣等亦得遵循辦理奏入得㫖此次投誠之杭噶勒其情節並不與巴雅爾相似乃遽令阻回辦理殊屬拘泥嗣後有似此及必不願回巢者仍著收留安插冬十月己卯侍郎玉保奏報夷使至哈濟爾情形玉保奏言九月十四日準噶爾宰桑巴雅斯瑚朗瑪木特及喇嘛綏綳等帶領三百人來至哈濟爾告稱我等於六月初十日起程七月二十四日到塔里木河因河水泛溢不能即渡遲留守候故至今始到我等帶來貨物懇求大人等照料貿易俾得攜銀入藏等語臣等當即將哈濟爾卡倫一次賞給口糧傳聖主恩㫖散給來使訖臣於十五日帶領來使自哈濟爾起身往得卜特爾貿易伏查準夷來使因水發稽遲約於九月二十以後到得卜特爾地方趕辦貿易事務約需一月至十月二十以後起身十一月內方能到藏熬茶事畢已在來年正月十五以後藏地風俗每正月初五日起至二十九日止修好事念經各處人衆瞻拜聚集準夷賦性狡詐從中藉生事端均未可定臣意欲令及早竣事於正月初五以內帶領來使回巢倘初五內不能完竣則藏地聚集人衆隨到令其瞻拜不留久住庶可不致滋事奏入上諭軍機大臣等曰前據玉保具奏準夷熬茶人等因不能如期到卡豫先差人送信一摺內有伊等似有疑慮一語含糊具奏朕初以為果有别項事端今據奏報宰桑巴雅斯瑚朗等三百人於九月十四日到哈濟爾現往得卜特爾交易等語是準夷並無異意可知又奏稱藏地風俗正月修好事念經各處人衆前來瞻拜商賈聚集甚屬擾攘恐準夷乘間滋事伊欲催促熬茶於初五日以內完竣即帶來使回巢如遲久不能畢事將內地人衆隨到瞻拜不令久聚等語此等意見又屬太過準夷到藏熬茶事畢即可回歸游牧但伊等見藏地修好事念經必懇求多住數日瞻仰數次若遽催促起程并將內地聚集瞻禮人衆驅逐不令久聚使彼知覺反生疑慮至期惟有約束內地人等暗為防範不使滋事著寄信玉保帶領夷人至藏與駐藏辦事大臣索拜傅清等公同商議妥協辦理斷不可稍有疏忽亦不可使準夷知覺稍有疑惑因玉保之奏令大學士慶復暫駐陜西豫行防範令並無事故慶復即著回京並諭玉保知之十一月己酉允定邊副將軍額駙䇿凌奏請入覲以塔爾瑪善暫駐將軍印務乙卯申諭兩路軍營大臣等酌收投誠人等事宜上諭軍機大臣等曰據李繩武奏稱有準夷逃來之巴顔庫車克等逃出時曾被人知覺又有追拿情節理宜遵㫖阻回但巴顔庫車克情極取出佩刀意欲自盡苦求收留伏祈降㫖訓諭等語朕從前降㫖如有人投誠至卡倫時即將伊曽否遇見彼處之人及有無追拿情事詢明辦理特為此等投來人內有從前逃出被擒後復投誠者其中情節彼處人業已深悉是以令伊等詢問明白不令收留令巴顔庫車克等三人內一人經額敏和卓查明係伊屬下部落其無檔案可稽之二人亦稱係自幼被虜伊等雖非內地之人並無被獲復逃情事而李繩武自應斟酌辦理乃堅持不受所謂因噎廢食固執太甚况哀懇迫切斷不肯回情亦可憫著傳諭李繩武令收留伊等照例辦理從前額駙䇿凌以投誠之杭噶勒曽遇見彼處之人即行阻回經朕批諭所辦甚屬拘泥再有似此不願回去者仍著收留今覽李繩武所奏伊等皆未能領㑹前降諭㫖著將此再行傳㫖曉諭兩路軍營大臣嗣後務須審度情形酌量妥辦不得仍前拘泥丙辰甘肅巡撫黃廷桂奏報夷使貿易情形黃廷桂奏言據派出辦理貿易知府劉宏緒等禀報夷使等於九月二十一日至得卜特爾十月初四日將所帶皮貨議定價值挑收先經酌議豫備銀十六萬兩尚不敷用祈為酌撥臣即檄行西寧道楊應琚就近于道庫內動銀三萬兩量派辨兵於十月二十一日兼程運赴該處備用訖奏入報聞甲子準噶爾部人多爾濟巴顔巴克什都拜等四人來降命賞給安插如例乙亥侍郎玉保奏報夷使赴藏日期玉保奏言十一月初七日準噶爾宰桑巴雅斯瑚郎等告稱我等前次來至東科爾交易路逺往返勞苦駝馬亦多倒斃此次熬茶䝉大皇帝天恩在卡倫交易不勞往返駝馬亦無倒斃今交易事竣我等身受大皇帝洪恩感激不盡今欲於本月十三日起程進藏大人帶領我等由何路行走臣告之云汝等在卡倫交易可以就近進藏實大皇帝格外之恩前次進藏由巴顔喀喇納木齊圖穆倫渡穆魯烏蘇渡口彼處地雖險窄時因秋令少雪行走尚易今值冬令若遇大雪不能過險窄之處馬畜必致困乏今自此起程進藏當踰哈什哈嶺在巴顔喀喇山後由布魯爾道路行走仍渡穆魯烏蘇渡口道路平坦方為便利巴雅斯瑚朗等聽從臣於次日將聖主施恩賞給該夷使等駝馬及第二次口糧俱行賞給該夷使等感激欣喜復請照前例將沈重什物疲瘦馬駝留交三十八人在哈濟爾得卜特爾地方寄頓臣照依所請派人照看俟熬茶事畢該夷使由噶斯一路回巢時此處照看之人送至噶斯令其一同回巢其因交易前來回子瑪米第等十二人據夷使稱回教不同不必帶往藏內臣即派人送出卡倫先行回巢臣於十一月十三日帶領該夷使起程進藏奏入報聞十二月辛巳以安插青州厄魯特博羅特等潛逃被獲正法示衆上諭內閣曰理藩院以安插青州之厄魯特內有逃走旋經拏獲博羅特等五人請㫖正法應如所奏派侍衛賽音圖理藩院郎中善泰即速馳驛前往青州會同該將軍詢問伊等逃走情由傳集在彼投誠之厄魯特及官兵等一同觀看將博羅特等五人即行正法命各省駐防將軍大臣嚴密防範安插厄魯特回人等上諭軍機大臣等曰據理藩院奏稱安插青州之厄魯特博羅特等約齊逃走經官兵追趕將五人拏獲已降㫖即行正法以昭國憲伊等逃時將軍額爾圖尚未丁憂似此逆賊理應一面嚴緝一面奏聞拏獲時即問明緣由正法乃博羅特等於九月二十七日逃走而副都統三達色遲延許久始行具報又惟以錢糧咨請觀此可知伊等全不曉事將軍副都統俱係駐防地方大員乃不知事之輕重至於此極辦理草率實屬不合額爾圖三達色俱著傳㫖嚴行申飭並傳諭各省駐防將軍大臣各處俱有安插此等厄魯特回人令其密行防範毋稍疏懈然並非於無事時欲其過嚴在投誠人等俱屬安靜若因此一事稍露形跡伊等知覺反生疑懼致滋事端亦有不便該將軍等務宜用心妥協辦理其未經拏獲之厄魯特達什哈乃去嵗投來安插內地居住一年有餘通曉內地言語地方情形伊若將內地道路沿途詢知逃回準噶爾地方甚有關係著開明達什哈年貌交與兩路將軍大臣傳諭各處卡倫嚴行查緝並行文直𨽻山西陜西甘肅四川河南等處督撫令其留心加緊查拏斷勿使之兔脫以致逃回巢穴俟於何處拏獲時即速奏聞己亥定議減派軍營緑旗换班兵丁定邊副將軍額駙䇿凌奏言軍營緑旗兵向例三年一换嗣以軍前無事改為五年一换現在宣化大同二處派往兵丁巳滿五年應請更换奏入得㫖軍機大臣議奏尋議緑旗兵丁原因軍營糧草軍器甚多令其看守並無别事現在所派緑旗兵六百名請酌量留三百名俟䝉古等熟習之後再行全撤如䝉俞允明年更换時止派三百名前往並請專派宣化所轄兵丁其大同兵丁停其派往奏入上從之平定準噶爾方略前編卷五十
