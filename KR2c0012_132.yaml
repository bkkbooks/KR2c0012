body:
  text: 乾隆二十四年九月癸丑諭定博克達山祀典上諭軍機大臣曰努三奏稱博克達山在烏魯木齊之東為西陲重鎮前年將軍兆惠於察罕郭勒曽經致祭嗣後未見舉行請頒祭文香帛令駐劄大臣每年春季於烏魯木齊之巴爾哈達致祭等語所奏甚是著照所請行除祭文香帛由內頒發交該處駐劄大臣敬謹致祭外其所用犧牲品物即於該處虔辦著為例申諭內閣學士清馥回巴里坤解送馬匹上諭軍機大臣曰清馥奏搜捕嗎哈沁行至格根與努三相遇知訥克衣等已獲伊即向哈卜塔克拜塔克前往等語昨已諭清馥回巴里坤管解軍營馬匹若歸途之便遇有嗎哈沁即行就便辦理不必逺行搜捕定邊右副將軍富德等疏奏奬賞效力回人富德等奏言臣等前從和闐進兵奉有奬賞效力回人銀兩縀匹之旨查所帶六城伯克及回人六百名原以備攻城掘濠之用因逆賊等聞風先遁已經遣回無庸賞給此次隨臣等追賊之貝勒品級霍集斯等俱奏請議敘外伊等帶領侍衛藍翎侍衛三人兵丁五十四名頗屬效力酌將奮勉出衆之額穆爾等七人分别賞戴孔雀翎藍翎此內陳亡之藍翎侍衛阿里木伯克乃霍集斯所屬於伊西洱庫爾之戰帶我瑪尼纛招撫山上賊衆被鳥鎗傷身故酌賞阿里木伯克家屬銀五十兩其侍衛等賞縀二端銀三十兩戴奬賞翎者賞銀十五兩兵丁縀一端銀十五兩奏入報聞甲寅命賞軍營效力官員等孔雀翎藍翎上諭軍機大臣曰富德等揀選效力之侍衛官兵九十人除加恩賜以巴圖魯號及原戴奬賞孔雀翎藍翎之三十五人外其原未賞翎者五十五人著頒發孔雀翎十五枝藍翎十枝交富德酌量揀選分别奬賞以示鼓勵乙卯諭護軍統領努三搜捕庫車等處嗎哈沁上諭軍機大臣曰據德舒奏稱由阿克蘇送來回人等行至賽里木遇嗎哈沁二十餘人把總徐天成及兵丁二人被害掠去回婦一人馬十四匹駝四隻外委把總一員得傷又兵丁一名回人一名不知蹤迹今選𣲖庫車緑旗回人兵丁前往追捕等語此等嗎哈沁賊人肆行搶掠殊可痛恨伊等或藏匿穆素爾嶺等處亦未可定必須搜勦淨盡德舒既未諳戎行而緑旗回部兵衆亦復何濟著傳諭努三選𣲖兵丁百名給以哈薩克馬二百匹前往庫車搜捕倘德舒尚未獲賊即宜趲行昨努三請將收服之嗎哈沁等安插烏魯木齊等處屯田俾招其黨衆之藏匿者朕已命侍衛巴朗前往辦理看來此等賊人不可豢養努三即將奮勉嚮導人等酌給錢糧如著有勞績或編入京師旗分亦可其餘人衆努三既許以不死俱著解赴京城備賞現在可用之人暫行帶往招撫事竣後再行酌量辦理丙辰命添𣲖哈喇沙爾等處辦事大員上諭軍機大臣曰哈喇沙爾地居闢展阿克蘇之中既有查辦糧運屯田事務近又安插多倫回衆書山一人未能兼顧著𣲖和其衷前往協同辦理努三已回烏魯木齊著永瑞前往闢展協同定長辦事丁巳定邊右副將軍富德等疏奏拔達克山所屬遣使情形富德等奏言臣等因拔達克山所屬衮都村之沙莽蘇爾差人來見即行曉示遣回八月初七日臣等所差厄魯特阿達什等領沙莽蘇爾及住居拔達克山交界之伯克阿里木差人密爾兹穆爾昆等同來臣等會集大臣侍衛官員等令其入見據沙莽蘇爾告稱我父自噶爾丹䇿零時管轄此地今聞葉爾羌等城皆為大皇帝臣僕霍集占敗竄我等即遵令追其後隊賊人逃入伯克沙穆爾遊牧我因此面求歸附又據密爾兹穆爾昆告稱我伯克阿里木管轄五百户昨奉將軍等令擒霍集占我伯克即行追賊各有傷損所遣來使曽經親見情願歸附以安生計等語臣等恐係飾詞窺探因曉示云我前此差往之人至今未回顯係爾汗素勒坦沙故縱逆賊或暗行容隱我等亦不便久候惟進兵擒拏霍集占耳因給以印文勒限十二日回報初九日臣等差往沙爾呼勒之回人沙瑪木特與伯克沙穆爾差人賽特多羅特及綽椿村伯克聶則爾差人三金同來據賽特多羅特等告稱我伯克在拔達克山之錫克南村管轄二千户前霍集占猝然來到以禮拜為詞伯克沙穆爾適往拔達克山汗處我等不知遂聽其經過後得將軍等印文賞物即送交沙穆爾呈拔達克山汗閲看當即親身領兵邀截霍集占又將沙穆爾遣回遊牧换給沙穆坦伯克素勒坦馬匹隨後遣往汗處此時應已到矣今伯克特遣我等賫書告知至我等起程時拔達克山汗又調沙穆爾協勦霍集占聞來人云素勒坦沙汗在阿爾渾楚哈嶺遇霍集占交戰霍集占退回嶺下暫住齊納爾小河又交戰二次彼此俱有損傷但霍集占所駐之地通布哈爾薩瑪爾罕鄂漢等三處此時未知擒獲否又詢問三金等俱稱情願歸附等語臣等察看來人等情形雖屬恭順言詞尚覺遊移因面加曉示以霍集占為大兵所敗窮蹙已極爾等又屢經追戰自難逃脫所言賊人住處有三路可通明係有心縱放豫留地步今我𣲖哨探兵先與爾等同行大兵亦即分路進發再遣侍衛賽音圖克什克圖阿竒木等同往若已經擒獲即遣人同來報知可也隨酌量加賞於初十日遣令起程一面𣲖副都統伊柱巴圖濟爾噶爾領兵一百五十名於原設卡倫駐劄其卡倫舊有兵一百五十名向前移駐以張形勢奏入上諭軍機大臣曰覽富德奏沙穆爾來人所告拔達克山素勒坦沙追襲霍集占情形設當日𣲖兵窮追賊已早獲此時拔達克山若尚未將逆賊擒獻富德等既徹兵轉回來年再行進兵亦仍是伊等前往總之道路遙逺朕雖多方指示亦已後時伊等惟當應機速辦耳又諭曰沙喇斯瑪呼斯餘衆內有達什達瓦之人二十九口或伊等不知從前遷移人等現蒙恩養或因無力遷移為逆賊所迫脅今軍前效力之總管鄂齊爾等既懇請查交管束著一體賞給口糧歸入伊隊若有妄行滋事者即嚴拏正法命議敘𠞰賊立功之總管布尼等上諭軍機大臣曰富德等奏稱布魯特之竒卜察克哈卜察克等部落承辦博羅爾拔達克山往來人使及外來盜竊事件伊等見小貪得每盜取馬駝侵擾臺站宜示以懲創因𣲖兵二百名令總管布尼等訪緝賊蹤於八月初二日分三隊圍守七村莊將頭目阿卜巴斯等擒來訊問據供兩次偷盜馬匹駝隻屬實隨將阿卜巴斯嶽勒多錫等三十餘人正法收其牲隻軍器其餘部落皆知警畏再議安插等語所辦甚合機宜著加恩將總管布尼交部議敘呼倫貝爾之奬賞藍翎克車德隻身遇賊力戰右肘為鳥鎗所傷著加恩授為藍翎侍衛在事官兵等俱酌量給賞定邊右副將軍富德等疏奏查辦降回事宜富德等奏言臣等收降回衆查有安集延之喇木呼里等二十九人以貿易來葉爾羌為霍集占迫脅同行臣等即加以撫慰令其自回遊牧如霍集占逃入伊地即宜擒獻又嚴查有無厄魯特逆黨逃入回部者據歸附之伯克等告云上年瑪里格爾巴朗來投霍集占未加優待伊於隨同逃出時有厄魯特告伊欲逃即為霍集占所殺此外並無有名之厄魯特等奏入報聞已未議撥解軍需馬匹甘肅總督楊應琚奏言臣奉到先期籌備馬匹接濟軍營諭旨謹查前督臣吳達善奏明於陜甘二省分派朋餧馬五千匹閲今數月臕分已壯又撥解巴里坤備用之馬尚有六千匹擇取五千匹備用可得萬匹其陜省馬匹先期調至甘肅以便就近轉解至沿途草豆俱已籌辦一面分檄調解并知會巴里坤辦事道員等奏入得旨軍機大臣速議具奏尋議臣等前令該督查明各標營馬匹嗣因扎拉豐阿等奏解甘馬一萬一千餘匹則為數愈多應先儘久餧之馬挑解軍營又經遵旨傳諭今該督查明夏季草肥之時已分𣲖收割堆貯料豆亦截留採買俱可供支應如所奏即將各處馬匹調至近地作速解往哈密現在奉旨派清馥及侍衛等管解應先行解送五千匹隨後續挑五六千匹其如何分起行走及沿途照看令該督會同清馥等商酌辦理奏入上從之命以革職按察使圖桑阿道員固世衡發往葉爾羌效力贖罪庚申定邊將軍兆惠等疏奏安集延部長阿濟比等歸誠兆惠等奏言前因堵截逆賊等逃路遣二等侍衛達克塔納等傳檄霍罕額爾德尼伯克瑪爾噶朗安集延那木干等城并布魯特之額德格訥伊什竒里克等部落八月十二日據達克塔納遣人同額德格訥之阿濟比差人沙喇庫楚克等呈稱閠六月十八日由喀什噶爾起程二十九日至安集延為首伯克四人俱係額德格訥之阿濟比總統與霍罕額爾德尼伯克交好隨至阿濟比遊牧據云將軍大人今遣使前來我等不勝欣喜願為大皇帝臣僕逆賊霍集占並未到此我等現在領兵遮截仍往告知額爾德尼隨據報稱額爾德尼云阿濟比既投誠我亦同心歸順并迓來使阿濟比一面差沙喇庫楚克報知軍營等語臣等即於霍集占舊居令侍衛官員等列坐傳來使進見獻手帕為贄呈阿濟比之書譯文云謹呈如天普覆廣大無外如愛養衆生素賚璊佛之鴻仁如古伊斯干達里之神威如魯斯塔木天下無敵之大勇富有四海乾隆大皇帝欽命將軍軍前額德格訥布魯特小臣阿濟比恭祝大皇帝萬萬夀今將軍自喀什噶爾遣人傳諭我等所給印文謹已奉到不勝歡喜踴躍適合我等心願布哈爾以東我等二十一萬人皆為臣僕今來使侍衛到我等部落日久恐煩將軍大人逺懷敬遣使同侍衛差人至將軍前稟明侍衛等不久回營為此將鈐記文書賫呈等語臣等對來使奬阿濟比等誠心歸順並告以現在𠞰賊情形勉其協力堵截至阿濟比等如欲瞻仰天顔可即前來命子弟代行亦可如一時難以逺離亦聽其便來使等敬諾仍授以答書分别賞給縀匹於八月十三日起程奏入得旨覽兆惠奏阿濟比額爾德尼俱恭順可嘉著頒給敕書賜以縀匹荷包伊等若遣使入覲即辦理伴送來京賜安集延霍罕等部落敕書奉天承運皇帝敕諭霍罕瑪爾噶朗安集延那木干額爾德尼伯克額德格訥阿濟比等將軍兆惠等奏稱侍衛達克塔納等至安集延霍罕見阿濟比額爾德尼伯克俱誠心內附情詞肫懇朕深嘉悅朕為天下共主內外一體凡向化來歸者皆加以撫育各順其道以安生理爾等如願入覲即可前來或遣子弟屬人代行亦一體加以恩賞兹以路遙不能多齎賜物賞彩縀各二端大小荷苞各一對爾等尚其約束所部永享升平之福特諭諭護軍統領努三等協𠞰傷害大臣之嗎哈沁上諭軍機大臣曰從前德舒奏稱由阿克蘇解來回人於途次被嗎哈沁搶掠已領兵追捕今永貴奏伊來京時行至庫車據都司舒明阿等報稱德舒行至賽里木之阿勒坦和碩遇厄魯特百餘殺傷官兵德舒中鳥鎗身故即行文舒赫德選兵三四百名前來伊帶領搜𠞰等語德舒本未諳練營伍而所領之兵又復無用朕前已慮及命努三前往協助今竟為賊害雖非遇敵捐軀可比究屬殁於國事深可憫惻著加恩照陳亡例交部議恤永貴雖調阿克蘇之兵恐亦係裁汰所餘著仍駐賽里木候努三同進如努三未到即差人往促若馬匹不敷即於解送軍營之一千匹馬內酌量帶往務將為首之賊解京嚴懲或臨陳𠞰殺亦必盡殱逆黨前據德舒等奏請歸併臺站原以防備盜賊但伊等既經領兵搜捕著照舊分設以速陲遞命參贊大臣阿桂前往阿克蘇辦事上諭軍機大臣曰前命舒赫德往辦葉爾羌事務其阿克蘇辦事著德舒前往今德舒身故著阿桂前往阿克蘇辦事諭喀爾喀副將軍䇿布登扎布堵截嗎哈沁上諭軍機大臣曰據策布登扎布奏八月初十前後可抵伊犂等語前因霍集占業已逺揚即令策布登扎布轉回遊牧今努三同永貴協𠞰戕害德舒之賊將來恐被迫逃入伊犂或投俄羅斯亦未可定著傳諭策布登扎布若尚未起程即於伊犂堵截或已在道即由上年舍楞等逃入俄羅斯之路巡查追捕倘糧餉不敷即向成衮扎布定長等支給仍行文伊等酌量䇿應命晉封貝勒品級玉素富為貝勒上諭軍機大臣曰玉素富自駐劄烏什以來辦理諸事實心報效著加恩晉封為貝勒命伯克摩羅和卓等補授馬什伊沙噶等缺上諭軍機大臣曰舒赫德奏烏什城除阿竒木外雖有伊沙噶並不協同辦事亦無噶雜納齊商伯克等擬將四品頂藍翎之哈子伯克摩羅和卓授為伊沙噶協辦阿竒木事務添設噶雜納齊一缺將四品頂舊伊沙噶伯克默特補授商伯克一缺將四品頂什錫野東補授哈子一缺將阿爾咱默特補授托克三伯克一缺將烏提塞拉木補授魯克察克闢展喀喇和卓托克三等四村莊之伯克請作為六品其餘密喇卜達魯罕訥赫卜哈提卜等二十九缺俱作為七品等語俱著照所請行命議處遲報逃兵之總兵官楊寧上諭軍機大臣曰舒赫德奏侍衛齊克慎在阿克蘇之雅爾巴什查出緑旗洮岷營逃兵馬定國行查提督董孟據稱六月初一日在逃總兵官於十五日通報隨已正法示衆等語楊寧係専管緑旗兵丁大員於兵丁脫逃遲報半月若非盤獲幾至漏網殊屬不合著交部議處參贊大臣舒赫德疏奏安設臺站舒赫德奏言查自阿克蘇至巴爾楚克應設六臺每臺安設西安滿洲兵五名緑旗兵十名又於滿洲兵內揀選通曉文義之兵六名委署筆帖式給與頂帶分守各臺仍令三等侍衛伊靈阿兼管奏入報聞辛酉諭刑部侍郎永貴等領兵巡查臺站上諭軍機大臣曰永貴奏德舒被賊戕害請將赫塞勒臺站歸併賽里木等語已令其照舊安設但嗎哈沁等既有百餘人則巡查臺站亦甚緊要著傳諭永貴於努三未來之先即領兵巡查各臺所有解運器物馬駝羊隻毋使賊人窺伺俟努三一到即同行進𠞰至此等大隊賊人器械齊備非尋常嗎哈沁可比或有逃出之回人及厄魯特等亦未可定伊等進𠞰時即行詳查具奏定邊將軍兆惠等疏奏查辦波羅泥都出妻事宜兆惠等奏言準富德咨據波羅泥都之妻愛蘭供稱尚有出妻托和齊鄂和拉在喀什噶爾等處行查到臣臣即會同提督閻相師等查得鄂和拉於逃走時為阿卜都克勒木之弟阿卜都舒庫爾領去據查出鄂和拉之弟呢雅斯供同應俟愛蘭到日再行詳訊辦理又據提督董孟查報托和齊係英噶薩爾舊阿竒木呢雅斯之妻為波羅泥都所奪後復離異托和齊係竒卜察克布魯特比阿竒木之從妹應遣人往取等語查布魯特阿竒木早經歸附現為阿里衮嚮導若逺取伊妹恐新降人等妄生疑懼是以檄令停止并將因阿竒木效力免其查取之處曉示伊遊牧奏入報聞甲子諭甘肅總督楊應琚辦理軍需駝隻上諭軍機大臣曰楊應琚奏軍需駝隻現可得壯健者一千二百餘隨同馬匹解送軍營所辦甚妥至所奏闢展催運商駝咨明定長等於卸載後給價雇用等語軍營既得健駝千餘諒足敷用若前項商駝既經停止官買又復截留守候內地商民或致聞風不進何如留此有餘俾得轉輸接濟至若詢之將軍等自必以軍營所需多多益善豈有遽稱足用而轉為推却者自可不必行文乙丑諭護軍統領努三等速𠞰嗎哈沁及查辦脫出官兵上諭軍機大臣曰舒赫德奏聞德舒被害之信已令納世通領兵四百名前往追𠞰又永貴奏伊先派庫車之回兵起程與阿克蘇兵相迎會𠞰等語永貴奏到時朕已諭努三領兵與伊協同進𠞰今永貴雖與納世通期會仍宜候努三同進著傳諭努三以速行為要再舒赫德奏有緑旗把總等見德舒被害旋行逃出之語官兵等隨營進勦統領之人不幸陳亡即應奮力殺賊或身受重傷尚可藉口若臨陳即逃此風斷不可長在回人猶可謂不知紀律至緑旗兵自應以軍法從事著努三於事竣後查辦具奏又所奏嗎哈沁等有二三百人大概逃回之人草木皆兵妄行稟告且臺站無恙而遽請防範三城亦屬太過俱著傳諭知之丙寅命以安西鎮為安西府安西栁溝二衛為淵泉縣靖逆赤金二衛為玉門縣沙州衛為敦煌縣丁卯諭哈密辦事侍郎五吉等解送軍營馬匹上諭軍機大臣曰楊應琚奏軍營馬匹分起解送第一起已於本月十六日起程等語此時清馥若已遵旨回至巴里坤自可適相會合倘尚未轉回即著五吉同侍衛舒常蘇勒等送馬至葉爾羌除𣲖出哈密滿洲兵及回人外仍行文同德淑寶將巴里坤存留索倫察哈爾阿拉善等蒙古兵調用又楊應琚派出從前脫出之滿洲兵解馬前抵哈密伊等熟諳道路亦令送至葉爾羌其緑旗兵著五吉裁撤仍行文清馥酌量辦理命免參贊大臣舒赫德追賊未及處分仍申諭護軍統領努三等追捕上諭軍機大臣曰舒赫德奏阿克蘇北山之布魯特噶岱密爾咱等遊牧被賊盜去馬匹隨𣲖兵越穆素爾嶺未能追及己行文永貴納世通等并自請交部議處等語追賊官兵以馬乏不及舒赫德尚無大過著從寬免議至賊人係何處蹤迹未據聲説殊屬含混現在戕害德舒未知即此等賊人否努三奉到節次諭旨諒已迅速起程著再行傳諭知之諭陜甘總督楊應琚等解送回人家口來京上諭軍機大臣曰將軍兆惠等解送已經正法之回人薩拉阿琿等家屬請照例賞給肅州等處官兵為奴但此等回人家屬獲罪較重若相去較近或不免逃脫著傳諭楊應琚派員解送來京戊辰命升賞拏獲嗎哈沁之官兵有差上諭軍機大臣曰努三等奏敘拏獲嗎哈沁奮勉效力官兵裕木扎卜等十五人功次著加恩將察哈爾署參領裕木扎卜索倫署防禦茂罕俱準其實授厄魯特藍翎侍衛巴桑授為三等侍衛索倫署驍騎校喀滿泰察哈爾署驍騎校布顔圖阿拉善署驍騎校塞卜騰索倫領催翁科爾俱實授驍騎校前鋒署筆帖式巴顔岱著授為前鋒校察哈爾署護軍校阿喇卜坦準其實授哈薩克烏拉什厄魯特哈什哈鄂欽俱授為護軍索倫兵布拉凱吉林兵烏林泰俱授為領催阿拉善兵延扎卜托卜羅克著賞戴藍翎仍賞銀各二十兩命以索倫兵慶安保為驍騎校上諭軍機大臣曰兆惠等奏遵旨查得侍衛成果至喀什噶爾聞布魯特人衆圍布喇村即𣲖索倫兵慶安保同額爾克和卓額色尹之人令布魯特息兵布魯特遂收兵轉回等語成果已恩賜已圖魯號慶安保著加恩授為驍騎校申諭護軍統領努三等勦撫嗎哈沁事宜上諭軍機大臣曰努三等奏俟雪落後搜捕嗎哈沁餘黨將闢展兵三十名留用等語昨已屢諭努三速往庫車協同永貴𠞰除戕害德舒之賊至烏魯木齊附近即有一二餘黨永德儘可辦理再所奏拏獲之厄魯特伯楞泰因其熟習鳥鎗令為嚮導伊奮勉效力擒獲多人等語努三查明拏獲嗎哈沁等仍有似此效力之人即帶領進兵一面酌量奏請給以職銜其餘賊衆不可仍留原處即設法移入內地𣲖員解送來京分賞王大臣為奴命以革職之原任副都統富昌發往葉爾羌交參贊大臣舒赫德差遣委用己巳訓諭定邊右副將軍富德等擒賊不力上諭軍機大臣曰富德等奏屢次遣使前往拔達克山久無信息今派伯克霍集斯巴圖魯侍衛額爾登額領兵一百名向拔達克山索取霍集占等語所辦殊屬錯謬從前既不發兵此次何以忽遣且將軍參贊大臣俱未聞前往僅使侍衛額爾登額同伯克霍集斯一行有是理乎即謂將軍不宜輕進明瑞亦當前往况拔達克山豈因一霍集斯之言遂縛賊以獻即令獻出賊人而其功似出於霍集斯將軍大臣等復置身何地乎此事從前伊等初奏時即有畏難之心朕因伊等馬力實乏是以未經申飭今觀所奏是早蓄不能獲賊亦可退兵之意不過難以啓口耳從前之將軍大臣等何嘗不效力行間每因功已垂成稍為退縮遂致僨事獲罪富德等豈未之知昨因富德母老諭令前來省視看來伊不能承受恩澤著仍駐葉爾羌俟拏獲逆賊後再行請旨併傳諭兆惠知之命議敘𠞰殺盜馬賊衆之官兵等上諭軍機大臣曰富德等奏稱協領布爾哈等將盜馬之布魯特等五十餘賊全行𠞰殺收其牲隻軍器等語著加恩將吉林協領布顔圖巴圖魯布爾哈藍翎侍衛奬賞孔雀翎丹巴巴圖魯那木查爾馬甲奬賞孔雀翎伯勒格圖巴圖魯扎竒勒圖奬賞藍翎寧古塔馬甲錫勒畢善索倫領催錫勒爾圖馬甲恩德保寧古塔馬甲烏林保俱交部議敘奬賞藍翎之索倫領催塔本岱厄魯特兵扎勒俱受鎗傷塔本岱著授為藍翎侍衛扎勒著奬賞藍翎各賞銀二十兩仍交部議敘厄魯特兵哈薩克回人阿卜都爾璊亦各賞銀二十兩命按察使銜納世通在庫車辦事道銜德文協辦阿克蘇事務上諭軍機大臣曰據德文奏稱準舒赫德永貴等行文催往庫車辦事已領兵四十名起程續調闢展兵一百名接應等語此等嗎哈沁能有幾人納世通領兵四百已足敷用德文又增兵如許不過為保身之計甚屬怯懦看來庫車事務非德文所能辦著調往阿克蘇隨阿桂辦事納世通著辦理庫車事務俱傳諭知之平定準噶爾方略正編卷七十八
