  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_168-1a, image: WYG0359/WYG0359-0899a.png}
body:
  text: 乾隆三十年三月丙子朔飭諭參贊大臣納世通阻止明瑞及調撥觀音保兵丁之謬上諭軍機大臣曰納世通等奏稱辦理烏什官兵現有一千八百餘名已足敷用伊犂事務緊要明瑞可毋庸前來止須撥馬四五百匹接濟已由驛六百里行文知會等語明瑞係節制各城將軍遇此等情事理應前往查辦納世通行文阻止甚屬錯謬諒明瑞未必因此撤回即一時所見未到亦必作速再往一切事宜俱遵照陸續所降諭旨辦理併傳諭納世通朕命明瑞前往不獨藉壯軍聲兼以查核起釁情節即烏什平定伊仍有應辦之事何以行文阻止顯係納世通視辦理烏什事甚易恐明瑞與伊分功懷此忮心何由集事奏內又稱葉爾羌派來兵丁二百名甚屬平常已將觀音保所領兵丁撥往隘口堵禦尤屬非是觀音保所領伊犂官兵既屬可用乃不以之𠞰賊而置之間地豈又恐觀音保分伊等之功耶將來明瑞到彼如伊等和衷協助自當一體敘功若果存此等小見即幸而竣事亦所不取納世通著傳諭嚴行申飭諭伊犂將軍明瑞等嚴行查辦逆回及奬賞效力伯克等事宜上諭軍機大臣曰昨因烏什回人叛亂曽諭嚴懲首惡宥其脅從今卞塔海等既進功數次而納世通至彼尚未竣事是逆回等助惡者多情節實為可惡觀音保現在領兵前往若烏什回人等稍知畏懼或擒獻首惡乘間納降是其情尚屬可矜倘愍不畏死仍行抗拒必俟我兵全至力竭始降自不得概從寬貸著傳諭明瑞納世通等得城之後必嚴行查辦不可稍事姑息至叛犯婦女毋庸解京現在安插之厄魯特等鰥居者甚多應送往伊犂酌量給配其烏什城亦不可留徑行拆毁以其地給回人耕種俱著明瑞等遵照辦理又諭曰據納世通奏布魯特阿竒木領兵前來協助甚屬可嘉著明瑞傳諭奬賞其各回城伯克等似此奮勉效力者俱著分别功次具奏俟平定之日從優賞賚壬午以將軍明瑞領兵將至烏什諭示進𠞰機宜及查辦納世通等情罪明瑞奏言臣因烏什回人叛亂先派觀音保領兵五百名前往續因駐劄大臣被害復親領官兵一千三百餘名起程閏二月十三日至穆素爾嶺準納世通咨送奏稿知賊人尚在據守屢行突圍臣恐其以逸待勞佯為拒戰乘間逃走隨回文指示防範十四日頭起二起兵過嶺又準咨會現兵已足敷進𠞰不必前來惟協濟馬匹為要臣思烏什回城甚小似易竣事但前據卞塔海等捉生詢問城內馬匹牛羊有四千餘且觀音保之兵又撥防隘口其進𠞰兵丁半係回人及布魯特臣不無疑慮且業經聲揚進𠞰復倉卒撤兵則沿途回人等轉似伊犂有警妄生猜懼惟有照常前往駐於阿克蘇烏什之間若辦理以竣固善或仍須協助亦即赴援其接濟馬匹之處現在尚可通融俱行文納世通等俟至日面啇辦理奏入上諭軍機大臣曰昨因觀音保所領之兵納世通不用以進𠞰令其遠防要隘又咨行明瑞不必前來種種錯謬已傳諭申飭且謂明瑞未必因此撤回今據明瑞所奏甚合朕意納世通已與賊人攻戰數次尚未竣事倘明瑞不行前往更當何若除遵照陸續所降諭旨辨理外看來回人以耕種為生既防其要隘不能脫逃而農時又失自然內潰今納世通惟知急攻與賊相持受其誘敵之計翻覺彼逸我勞明瑞至烏什時宜知所鑒再納世通奏稱觀音保領兵進攻因厄魯特兵先退以致受傷等語所言未足深信即厄魯特等果有先退情節此時且不必深求或係伊等推諉脫卸則尤失人心併著明瑞酌量查辦又諭曰納世通等奏與觀音保會合攻城觀音保受傷護守炮位兵丁為賊所襲失炮一位卞塔海亦奏稱從前伊與賊戰失炮三位俱奏請議處進𠞰賊人轉致失我軍器罪固難辭然尚屬事之所有但卞塔海一有此失即應具奏何以遲延至今待納世通有失炮之事始行陳奏其意圖隱飾已可概見至納世通之罪則又並不在此既據奏明俱著明瑞於辦理烏什竣事後再行查參請旨甲申諭吐魯番郡王額敏和卓暫駐烏什俟事竣再往喀什噶爾辦事上諭軍機大臣曰額敏和卓奏稱伊行抵遊牧稍加整頓趲赴烏什等語額敏和卓聞烏什有事即請前往甚屬可嘉計此時明瑞應亦辦理將竣著傳諭額敏和卓若明瑞尚須協助伊即暫駐烏什軍前其喀什噶爾與霍罕額爾德尼部落相近亦關緊要烏什事竣額敏和卓仍以參贊大臣駐劄辦事玉素富俟額敏和卓往代後再回哈密申諭伊犂將軍明瑞索取潛往霍罕求援賊人及克取回城事宜上諭軍機大臣曰昨據卞塔海等奏稱烏什逆回潛遣安集延回人求援於霍罕額爾德尼等語朕意以大兵前抵烏什應遣人向額爾德尼索取若此時額爾德尼早將此數人縛獻或遵檄付還俱可勿論倘索而不與即屬有心抗拒應將霍罕一併平定另授伯克今明瑞以將軍領兵如遣人前往則額爾德尼更知畏懼即烏什逆回等望救之心亦絶或可自潰至克取烏什之道不在攻城惟嚴防逃走要隘擇近城水草之地牧養馬匹牲隻賊衆飢疲無措庶不致大煩兵力併著傳諭知之以納世通等在烏什乖張錯謬諭將軍明瑞專任其事並察辦前此怠誤各情罪上諭軍機大臣曰納世通等奏稱閏二月十九日領兵進攻烏什城人數次潰敗追至城濠𠞰殺頗多雖甚驚懼但恃險死守難於即克聞明瑞領兵二三日內可至即會商進𠞰務期殱滅以安各城反側之心等語近據納世通等將進𠞰烏什無須明瑞前來行文阻止之處具奏朕即屢加申飭以納世通所見非是觀其行止斷不能竣事此次所奏愈覺不堪明係始以辦理烏什為易慮及分功今乃知其難又復巧為托飾甚屬無恥至所稱安撫各城尤為悖謬烏什業經叛亂尚何安撫之有若指其餘各城則現在回人俱感激朕恩捐輸口糧牲隻領兵協助又何待於安撫蓋納世通方寸已亂將效力回人俱視為敵國尚可倚以集事乎即如攻城一事若克一城又有一城不得不急圖進取今死守者只此一城自當俟其困極自潰而納世通等株守城下兵疲力竭如此是納世通等全不曉事著傳諭明瑞此事惟伊是賴一切俱自行決斷不可稍有推諉又據德福奏稱烏什未亂十日前有布魯特等乘間將阿竒木伯克阿卜都拉所牧羊隻及牧人家屬十五名口掠去等語此等布魯特雖事發在前而相去不遠焉知非賊人等已隂相約結乘釁搶掠明瑞到彼務將此事情節查明辦理將起意為匪之人正法示衆德福又稱納世通所失炮位並非大威遠炮從前係伊悮奏等語近因納世通卞塔海俱將失炮之處奏請議處已交明瑞查辦並著於竣事後查明參奏命奬賞布魯特車里克齊等上諭軍機大臣曰納世通奏稱噶岱默特遣往額德格納薩爾巴噶什偵探回人愛伊特默特路遇烏什回人等揚言布魯特俱已疑二伊前至車里克齊等遊牧曉示車里克齊即遣伊弟海蘭達爾前來求見又請示聽候調遣等語車里克齊素稱恭順兹復知奮勉懇請自效甚屬可嘉著加恩賞緞四端伊弟著賞緞二端愛伊特默特著加恩賞給七品頂帶遇有小伯克缺出即補仍賞銀二十兩戊子申諭伊犂將軍明瑞索取通信霍罕回人及查核卞塔海進𠞰情形上諭軍機大臣曰納世通奏稱噶岱默特遣往額德格訥偵探回人聞烏什逆回等散布流言即曉示車里克齊已令伊弟前來聽候調遣雖此等造言逆犯應向額爾德尼索取但現在進攻烏什伊若稍有支吾又須辦理請俟事竣後再辦等語前因烏什逆回遣安集延回人向額爾德尼求援朕即諭伊等宜遣人索取倘支吾不行傳送則將額爾德尼一并辦理續因伊等種種錯謬又諭明瑞當檄行霍罕索取逆犯以壯軍聲今納世通轉以恐生事端為言真怯懦不堪之至著傳諭明瑞速遵前旨索取再納世通奏卞塔海於二月十九日閏二月初六日兩次為賊所敗而卞塔海前奏並未及此如納世通之言屬實卞塔海固難逭諱飾之罪若納世通與卞塔海不和意圖誣陷則其罪尤為重大俱著明瑞查明具奏辛卯諭哈喇沙爾辦事副都統明普速查庫爾勒回衆情形上諭軍機大臣曰明普奏稱哈喇沙爾遊擊李大勇因庫爾勒阿竒木伯克色提克體察多倫回人情形不甚安靜前來呈報伊與納世通相商暫回庫爾勒查辦等語昨因明普應援烏什忽以乘時耕種為詞欲回哈喇沙爾曾降旨申飭今既有色提克所報之言雖不可遽信為實自應前往查辦並將現在情形作速奏聞壬辰諭伊犂將軍明瑞酌量𠞰撫烏什回人事宜上諭軍機大臣曰明瑞奏稱烏什回人雖係小醜無難勦滅但據城固守必須攻擊未免傷我官兵且城內迫脅者必多似宜設間以離其黨從前護送伊犂屯田回人之烏什伯克呢雅斯等四十餘人實不知叛逆情事俱暫交薩里看守今傳喚詢問酌將數人帶往軍前相機調遣又據從烏什脫出送信之回人阿卜都郭普爾告稱賴黑木圖拉倡亂時西城一帶回人俱不願從逆率其家屬投向駐劄大臣而素城等疑惑不肯收留皆哭泣而去等語昨據卞塔海將數次攻城情形具奏朕即諭克城不必以進攻為事今明瑞欲相機設間使之內潰所見尚是前因烏什回人從逆為之死守自應大加懲創但如送信回人之言則合城並非同叛此等挈眷投向駐劄大臣之回人等若果係實情自應從寬免死但明瑞兵至烏什即來歸附始可寬貨若抗拒如初直待困極始降則又不可姑息至阿卜都郭普爾脫出先向阿克蘇報知又詳述城中情事甚屬出力著加恩賞給六品頂帶仍賞銀五十兩諭吐魯番郡王額敏和卓等查辦多倫回人事宜上諭軍機大臣曰據明普奏庫爾勒阿竒木伯克色提克告稱多倫回人情形不甚安靜請回哈喇沙爾查辦等語多倫回人安插已久雖形迹稍有可疑亦未可全信額敏和卓熟悉回人情事前往烏什時著順道至哈喇沙爾若烏什事竣伊等安靜如常則已或稍有可疑惟在額敏和卓酌量辦理但新有烏什一事回人等未免驚恐當使之不覺方為妥協併傳諭明普諸事聽額敏和卓辦理不可自執已見癸巳諭哈密辦事道員薩瀚等毋庸防守摩羅和卓上諭軍機大臣曰據侍衛保寧奏稱伊帶領入覲回人內有伊沙噶伯克摩羅和卓係烏什人伊家口皆在城中今聞信必自生心擬將摩羅和卓暫留哈密看守等語摩羅和卓雖不無疑慮然伊究何能為即脫逃又將何往耶著仍照常帶領行走不必留於哈密并傳諭薩瀚曉示摩羅和卓以保寧奏伊係烏什人請留哈密奉到諭旨謂烏什之事與伊無涉仍照常行走一面另派妥員酌量帶領保寧辦理過當著傳旨嚴行申飭甲午諭伊犂將軍明瑞進𠞰烏什事宜上諭軍機大臣曰據卞塔海奏稱明瑞領兵於閏二月二十七日至烏什與納世通等會議明瑞觀音保攻城之東面納世通卞塔海鄂寶攻城之西面等語明瑞已抵烏什既經定議夾攻何以具奏者僅卞塔海一人著傳諭明瑞伊知卞塔海有此奏否如知之何以不言若明瑞不知而卞塔海私自爭先具奏不知是何意見况此議雖定究未舉行即限行六百里馳奏尤為可詫著明瑞據實陳奏毋稍隱諱此次辦理軍務納世通卞塔海德福等乖張錯謬之處皆交與明瑞查明參奏但明瑞性情朕所深悉諸事惟委靡推讓伊若於此事不量輕重為周旋世故之舉斷不能逃朕洞鑒且將來若命阿桂續查伊能當其咎乎至明瑞定議攻城東面或因地屬緊要但東路通阿克蘇賊若逃潰必由西走是西面亦屬要地納世通等又豈能防其逃逸且盡獲要犯耶朕甚為伊等念之仍將進攻情形作速奏聞命副都統伊勒圖等往阿克蘇辦事上諭軍機大臣曰卞塔海德福等辦理烏什一事全無端緒將來竣事後伊等俱當治罪應另行派員前往伊勒圖著在阿克蘇協同綽克托辦事其雅爾屯田事務著安泰以參贊大臣前往辦理前命丑達往葉爾羌辦事額爾景額往喀什噶爾與納世通交代今額敏和卓已往喀什噶爾即與額爾景額一同駐劄柏琨著往葉爾羌同丑達辦事丙申伊犂將軍明瑞疏奏進𠞰烏什情形明瑞奏言臣領兵於閏二月二十七日至烏什東北之薩哈爾齊與納世通等會議納世通等攻城之西臣與觀音保攻城之東納世通等由烏什北山覔路前行本日次海喇巴克次日至烏什城西之鄂托巴什三月初一日共議兩路夾攻取城西路兵起程後臣與觀音保商議烏什因山為城不便攻圍祇宜斷其樵牧之路旋據哨探兵報稱近城山口有賊觀音保負傷未痊即領兵四百餘名前往臣一面整兵一面調遣官兵搜查南山下村莊令侍衛恆斌等帶兵百名為左翼前鋒參領委署行營翼領賽沙布等帶兵百名為右翼前往策應賊衆有馬步二千餘正犯西路觀音保馳往衝擊總管達克塔納等協同攻奪山隘賽沙布等斷賊末隊與察哈爾佐領和通貝克等奪取賊人炮臺七座漸近城東北角格鬬良久賊衆益多臣與木薩恆斌等奮擊賊人賊藏於城濠放鎗拒敵官兵鎗矢並發賊敗入城此次進𠞰殺馬步賊衆二百餘名負傷者甚衆我兵陳亡七名得傷者三十六名奏入上諭軍機大臣曰明瑞奏稱三月初一日東西夾攻烏什𠞰殺賊衆二百餘人等語此次進攻方可謂之奮勇𠞰賊且奪據山隘斷其樵牧尤為知要觀音保負傷效力愛隆阿在雅爾聞明瑞前往烏什即遣恆斌協助甚屬可嘉俱賞給荷包觀音保仍賜號卓理克圖巴圖魯賞銀一百兩效力之侍衛官員兵丁及陳亡得傷人等俱著明瑞查明交該部分别議敘議恤命參贊大臣納世通等賠補濫給口糧上諭軍機大臣曰德福奏納世通調取官兵及布魯特回人等口糧一事殊屬瑣屑在兵丁等雖有應給之項自當酌量辦理何必按口計日致滋糜費其布魯特回人等向無給與口糧成例不過酌加賞賚豈可與官兵一體給與口糧是伊等全不知事理之輕重著傳諭明瑞此次所給布魯特回人糧餉俱著納世通德福賠還戊戌命敘恤進𠞰烏什西面官兵及布魯特回人等上諭軍機大臣曰納世通等奏稱三月初一日進𠞰烏什自辰至午衝敗賊人數次直抵西門未及關閉馬上賊衆急於入城將步下賊人踏死者甚多官兵亦𠞰賊百餘名二等侍衛烏爾圖及兵丁二名陳亡官兵得傷者四十五名布魯特等五名著照納世通等所奏將伊所領官兵有陳亡得傷效力出衆人等俱查明奏聞參贊大臣綽克托疏奏駐兵雅爾日期綽克托奏言臣於本年正月初六日帶領滿洲索倫兵前往雅爾訥蘇懇於初八日護送糧餉農器及貿易紬緞前後起程日行三四十里以紓馬力二月初六日遇哈薩克十餘人帶馬百餘匹前來貿易臣令其到塔爾巴噶台時再行商辦續又有阿布勒比斯所屬二十餘人帶馬百餘匹羊二百餘隻前來亦一體曉示十五日至尼瑪圖往宿看其水草甚好即休息馬匹駐劄訥蘇懇亦於十七日前來五岱至烏魯木齊安頓家口並於十九日至尼瑪圖前與將軍明瑞約定派出索倫兵六百名在巴爾楚克山之西合隊隨遣人哨探適與索倫哨探兵相遇即令其回報因沿途雪深數尺定於閏二月初起程派緑旗兵二百名除雪開路沿途所遇哈薩克等俱屬恭順十八日至額敏河馬皆浮渡又縛木為筏以渡行李什物二十六日行抵雅爾合計行走五十餘日馬匹尚無傷損且不誤耕種之期臣選擇膏腴之地興工開墾量築城堡安設卡倫俟副都統舒泰至雅爾時再令訥蘇懇回京奏入上諭軍機大臣曰據綽克托奏自伊犂行抵雅爾官兵馬匹全無傷損糧餉器什亦俱運到等語此次帶領移駐官兵行走甚屬妥協綽克托五岱訥蘇懇俱著交部議敘辛丑申諭伊犂將軍明瑞酌量𠞰撫烏什事宜上諭軍機大臣曰明瑞奏稱與納世通商議以烏什南山距城不遠約分為兩翼前往攻取賊盤踞山嶺施放鳥鎗為我兵衝擊敗走入城盡奪其輜重又焚西北門外所有水磨棄其麥麵計殺賊三百餘名得傷者甚多我宗室侍衛恆斌被鳥鎗傷陳亡厄魯特瑭海被鳥鎗傷墜馬其餘得傷者十五名似難力攻因暫息官兵等語逆回等怙惡不悛必大加𠞰殺始知所警戒但烏什山險城堅進攻不易續據明瑞奏遣回人等設間以離其黨看來此時明瑞雖經辦理而逆回等未必即聽其言仍以力攻致傷損官兵殊屬可憫自仍以防守要害堵截逋逃坐待其斃為要再納世通定議攻城西面今明瑞兵至西北未知納世通於何處夾攻著明瑞查明具奏至阿克蘇辦送口糧尚覺拮據烏什城小被圍日久何未見糧餉不足而軍器火藥亦甚有餘伊等起事時何以能預為儲積如此著明瑞查明具奏此次效力及陳亡得傷官兵俱著交部分别議敘議恤又諭曰明瑞奏稱進攻烏什時遣回人阿卜都海色木至城下招撫有賊四人出應云我等歸順以來久屬臣僕安敢作逆因哈密屬人擾害不堪以致犯此重罪又抗拒大兵除畏死之外别無他意俟回城商議等語前據卞塔海奏烏什回人因派送沙棗樹科忽然滋事朕即諭以察看起釁情由必係素誠平日辦理不善所致著明瑞查明具奏今看回人等所告尚將緑旗兵欺凌伊等情事隱而未發至阿卜都拉所屬人等任意擾害回人素誠全未查辦現在額敏和卓前往喀什噶爾先至哈喇沙爾查辦多倫回人事竣即赴烏什暫行協辦額敏和卓與玉素富俱朕臣僕練事有年自不至縱容所屬擾害回人然所屬愚人不知事體輕重希圖小利倚勢橫行亦未可定著通行傳諭駐劄大臣等烏什既有此等情事可為鑒戒將來必須留心體察約束下人斷不可失於防範以致自貽伊戚諭駐劄雅爾大臣等酌議哈薩克貿易事宜上諭軍機大臣曰前議雅爾駐兵哈薩克等有小商販前來準其貿易至大商則令前赴伊犂特恐伊等因雅爾貿易近便遂不復前往伊犂但哈薩克等若以同一商販而區分大小未免妄生揣度且雅爾既駐官兵則馬匹牲隻在所必需惟減其價值以運送多費為詞聽其情願與否即將來馬匹牲隻較多亦可陸續解送伊犂著傳諭綽克托愛隆阿等將雅爾貿易情形會同明瑞定議具奏壬寅宣諭素誠等罪狀伊犂將軍明瑞奏言臣領兵過穆素爾嶺以來留心訪問知回人等素有怨恨駐劄大臣辦事官員之語而怨恨烏什大臣及阿竒木伯克辦事人者尤甚擬俟事竣據實陳奏今蒙皇上洞鑒及此交臣查辦謹據現在所聞言之烏什糴買官糧發給工價俱不能如數大臣公署及辦事處所用油薪俱向回人索取其不肖兵丁常將回人欺凌尚不敢與爭較至素誠父子及辦事筆帖式伊哈齊將城村回人婦女任意姦宿又見伯克之妻年少者託故傳喚入署過宿不令歸家再阿竒木伯克阿卜都拉從前尚知守分因伊妻去歲病故遂與親隨哈密回人等恣意妄為此次辦送沙棗樹科素誠令伊子回京一切行李俱令回衆背負並派小伯克賴黑木圖拉押送而賴黑木圖拉之妻前經素誠留住署內因此挾嫌倡亂煽惑所派回人彼時城內回衆尚未盡變卞塔海領兵到彼不問事由即行放鎗旋經射書招撫衆心未定第三日又用炮攻城賊衆始出抗拒卞塔海被其掩擊敗走數十里步兵百人炮三位俱沒於賊又體察阿克蘇喀什噶爾回衆及大伯克甚畏印房行走之人而納世通卞塔海接見領隊大臣侍衛官員較從前進𠞰之將軍參贊大臣體統尤尊其待承辦事務之四十七烏爾衮扎木粲轉覺過優即大伯克亦皆向伊等長跪並多派回人服役據領隊大臣觀音保告稱伊至烏什納世通等即送回人二百名為官兵薪水之役伊不敢用等語又聞喀什噶爾協辦大臣揚桑阿因不安靜惡瘡遍體經年不愈潰爛身故再查伊犂所交賦稅較各城為重而烏什回人願往者衆詢據告稱伊犂賦有定額由此觀之烏什回人作亂實因擾纍所致其餘各城亦恐未能妥協將來更須經理得宜仰懇特簡親信大臣前赴回部酌定章程庶可永遠遵守奏入上諭軍機大臣曰明瑞將素誠在烏什平日苦纍回人伊父子及辦事筆帖式等任意姦淫回人婦女此次辦送沙棗樹科將伊子行裝多派回人背負又小伯克賴黑木圖拉之妻曾經素誠留宿以致挾嫌作亂卞塔海並不查訊緣由輒用炮攻城逮回人出拒遽爾敗北再阿克蘇喀什噶爾大小伯克見辦事人員極為畏懼而納世通等妄自尊大惟優待辦事各員昨觀音保領兵赴援即撥回人二百名以供樵汲等語納世通卞塔海素誠俱受朕深恩身為大臣各駐專城辦事乃素誠父子在烏什任意將回人科派苦纍且姦其婦女納世通卞塔海平日妄自尊大一聽所屬官兵將回人凌虐至辦理烏什一事卞塔海既冒昧進攻又復倉卒敗北并將此等情節希圖隱匿不即據實奏聞而納世通領兵甫至彼處始則恐明瑞爭功行文阻止繼復懇求援助無恥實甚彼時明瑞若聽其阻止竟行撤回尚不知釀成何等事端且正當撫輯未生事之回衆令其傾心出力之時反撥給觀音保回兵二百名以備使令是又具何肺腑即此撥兵一節其平日之任意苦纍更不問可知納世通卞塔海種種背謬乖張不可枚舉是烏什之始而激變繼而聽賊猖獗不能尅日平定者皆伊等卑鄙無恥庸妄僨事所致實堪髮指此內素誠情罪尤屬可惡雖經自戕不足蔽辜著交留京辦事王大臣將素誠家産查抄其現有之子著俱革退差使發往伊犂充步甲當差納世通卞塔海之罪雖不至將伊子一併從坐而伊等本身斷難寬恕所有治罪之處另降諭旨其二人家産亦俱著查抄明瑞奏併發諭伊犂將軍明瑞等辦理烏什及接辦善後事宜上諭軍機大臣曰據明瑞查奏素誠納世通卞塔海等情事朕已節次鑒悉故一切專委明瑞辦理又命阿桂前往協辦阿桂至烏什即同明瑞傳旨將納世通卞塔海於軍前正法看來烏什回人雖罪在不赦亦大臣等擾纍所致自宜分别辦理著傳諭明瑞此時如尚未克城即將查奏情事宣諭招撫若抗拒如前仍盡行𠞰殺至善後事宜已派永貴前往喀什噶爾將來陸續辦理阿桂著速赴烏什一切事宜與明瑞會議具奏明瑞先回伊犂阿桂留烏什數月俟事定後與永貴交代再往伊犂接辦明瑞所管事務明瑞於來年回京亦可俱著傳諭知之平定準噶爾方略續編卷二十九
