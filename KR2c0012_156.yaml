body:
  text: 乾隆二十七年五月庚子諭都統侍郎公明瑞等通融派撥回城兵數事宜上諭軍機大臣曰明瑞奏稱永貴等所定各城滿洲索倫兵數喀什噶爾二百一十名葉爾羌阿克蘇英噶薩爾等處各一百四十名必致離其本旗難資管轄查換班滿洲兵每旗正數皆一百五十名請按滿洲兵六百索倫兵三百正數喀什噶爾派滿洲兵二百索倫兵一百葉爾羌阿克蘇各派滿洲兵一百五十索倫兵五十英噶薩爾派滿洲兵一百索倫兵一百等語前永貴將各城兵數瑣細分派已覺過當今明瑞又斤斤較量所奏亦未明晰此項官兵非盡駐劄本城兼有臺站卡倫差遣即令稍為撥補亦無不可著傳諭明瑞等彼此通融商酌不必過於拘泥辛丑命選侍衛三員派往烏魯木齊上諭軍機大臣曰據旌額里等奏稱烏魯木齊照管貿易巡察臺站卡倫牧羣等事尚需侍衛人員等語著領侍衛內大臣揀選門上侍衛三員引見派往陜甘總督楊應琚疏奏辦送挈眷移駐官兵楊應琚奏言準烏魯木齊辦事大臣旌額理咨承準軍機處議覆現在烏魯木齊兵丁有情願挈眷遷移者行文陜甘酌量辦送起程隨查本處有願駐官兵二百八十一員名俱給文令其各回該標營料理臣俱飭令各該地方官遵照原議妥協辦理并派委都司守備等員沿途照管於本年三四月內陸續起程奏入報聞乙巳命補授伊犂厄魯特佐領等官上諭軍機大臣曰據阿桂等奏稱現在伊犂新編厄魯特四佐領除侍衛庫庫濟克達什都卜珠爾分管三佐領外所餘一佐領請以驍騎校楚楚木擬正鄂勒錐博勒瑚擬陪其驍騎校現有四缺可否以虛銜藍翎和雅克齊等四員補授等語伊犂厄魯特從前所編兩佐領已命侍衛碩通等管轄今陸續來投之厄魯特等又增編四佐領著照阿桂所請除庫庫濟克等三員俱補授佐領外所餘一缺著擬正之楚楚木補授其驍騎校四缺著和雅克齊綽哈普爾普達瓦烏哈圖補授壬子烏魯木齊辦事侍郎旌額理等疏奏製造農具事宜旌額理等奏言查烏魯木齊屯田農具皆從內地運送今需用數多若本處有産鐵處所可以採取製造較為省便臣等訪之舊厄魯特等聞喀喇巴勒噶遜昌吉河源等處向曾産鐵隨飭吐魯番公素賚璊派回人採取鐵砂百餘斤鎔鑄試看雖不及內地所出尚可供用但伊等僅能鎔鑄犂鏵於錘鍊刀鐮等器未為熟習因行文楊應琚調取匠役數名前來製造俾屯田兵丁等習熟後即行發回奏入報聞甲寅諭陜甘總督楊應琚核奏新疆茶法上諭軍機大臣曰明德有減配茶封之奏業經下部議行但思茶商等照例完課應望多銷獲利何以轉願減少即云近議搭放兵餉地方行茶日夥是以不樂多配而兵丁所支茶封恐未必獲利蓋兵利有餘則商價自必日損商茶有利更無須抑派兵丁二者不可得兼其理甚明且現在庫茶實在存積若干其最陳者起於何時近來折餉之外有無存積應行設法銷售之處著楊應琚逐一通核妥辦務俾公私均益此時新疆生聚漸繁物産豐裕惟茶必取之內地既縻腳價仍屬有名無實或臺站往來之便量力擕帶分貯俾日久積少成多則不動聲色而其事易集為利亦溥即今歲明瑞所領各處换班兵三千餘名皆應裹帶鹽菜口糧或兵丁途次需茶而庫茶有餘可以酌量搭放俾資日用即一面辦理一面奏聞乙卯議鑄給扎哈沁烏梁海部落印信等事宜定邊左副將軍成衮扎布等奏言現在扎哈沁等一旗阿爾台烏梁海七旗唐努烏梁海四旗各安耕牧俱在卡倫以外雖各有總管未經頒給印信一切出入行走殊多不便查從前都爾伯特汗王扎薩克等請給印信臣等具奏蒙恩頒發謹援例代請一體賞給其唐努烏梁海等尚未諳習事體所給印信或暫交副都統莫尼扎卜掌管俟該總管稍知約束所部再行賞給奏入得旨軍機大臣議奏尋議扎哈沁烏梁海人等自乾隆十九年以來陸續歸附隨其户口多寡編設旗分佐領計扎哈沁一旗九佐領二千餘口烏梁海七旗二十五佐領四千四百餘口唐努烏梁海四旗十六佐領四千八百餘口雖經補授總管尚未鑄給印信應如成衮扎布所請擬給扎哈沁公扎木禪扎哈沁一旗總管之印一顆烏梁海內大臣察達克等阿爾台烏梁海七旗總管之印一顆唐努烏梁海四旗總管之印一顆兼用滿洲蒙古字照察哈爾總管印信式樣鑄造分别賞給及交該副都統暫掌又阿爾台淖爾烏梁海二旗四佐領七百餘口現係總管扎喇納克巴勒桑統轄可否給與印信該將軍未經奏及應令查明具奏奏入上從之閏五月癸亥朔喀什噶爾辦事尚書永貴等疏奏查辦續報回地果園事宜永貴等奏言從前喀什噶爾查出波羅泥都等果園因伯克等初次呈報不無遺漏臣等曉示令其首出免罪續據阿竒木伯克噶岱默特等於賞給官兵之果園十三處外續報出二十九處自應全行入官但念該伯克等始雖瞻徇一奉曉示即盡行呈首情有可原臣等酌量賞給阿竒木伯克果園三處伊沙噶以下伯克四處又希卜察克布魯特散秩大臣阿竒木英噶薩爾阿竒木伯克素勒坦和卓沖噶巴什布魯特阿瓦勒比等各給一處以為來城住宿之地其餘入官仍交回人看守採取賞給官兵再此等果園內尚有餧馬之苜蓿草每年可得二萬餘束定額徵收以供飼牧俱造具印册永遠遵照奏入得旨如所請行戊辰以新疆底定恩賞在事諸臣世職宣諭中外上諭大學士曰從前準噶爾部落素不安分憑凌衆蒙古自噶爾丹時即肆跳梁侵擾喀爾喀西藏是以皇祖皇考不惜勞費先後興師征討數十年來上煩聖慮伊等野性難馴喜事爭奪以致內自生亂互相殘滅爰有䇿凌等各率所屬歸誠朕以機會可乘選將出師掃除凶逆大兵所至勢如破竹不一二年戡定禍難肅清疆宇擬欲綏爰有衆俾安生計詎伊等無福承受數應滅亡迭生叛亂是以更遣偏師殱除醜類遂有伊犂至回人為準夷役使波羅泥都霍集占俱被拘於額林哈畢爾噶我兵初定伊犂時念伊等為派噶木巴爾後裔釋歸故里乃霍集占受朕深恩毫不知感輒敢反噬傷我王臣因諭凱旋官兵乘勝收服葉爾羌喀什噶爾諸回城追𠞰逆賊兄弟直抵拔達克山部落該酋即馘霍集占以獻此皆伊等罪惡貫盈上干天譴是以軍行所過降服者撫抗命者誅數十載未竟之緒五年以來悉為底定拓地二萬餘里均如內地兵民駐劄屯墾誠所謂非常之功也在事奮勉諸臣現經部臣查奏請旨應得世職者約五百餘人朕以敵愾奏功勞績克著酬庸之典即稍從優渥亦非賞賚無節者比雖其間實有奮勇出衆及隨營效力之不同但宣力行間均屬勤勞王事正不必過為區别此內除達爾黨阿哈達哈皆僨事獲罪無容議給世職外其餘諸臣俱著照部臣所奏一體加恩賞給世職各於本身兼帶此等皆滿洲世僕得邀恩賞世祿以贍其家更覺充裕而八旗添設世職五百餘員於旗人生計亦大有俾益並將此通諭知之辛未諭定邊左副將軍成衮扎布等哈薩克貿易事宜上諭軍機大臣曰成衮扎布奏準科卜多副都統扎拉豐阿報稱哈薩克阿布賚遣使貢馬九匹所帶馬匹四百餘已派台吉等禁止貿易護送入覲等語哈薩克來使著派出為首者數人緩行前往熱河候旨伊等所帶馬匹頗多自必乘便貿易從前阿桂請禁哈薩克北路貿易蓋慮伊等貪程途近便遂不肯遠至伊犂但伊犂烏里雅蘇台皆屬內地如過示區别亦於體制未協惟應禁止私市概從官辦而稍增物值減其馬價伊等無利可圖自必專向伊犂即令其仍貪近便情願減價則烏里雅蘇台官庫緞匹等物尚有雍正年間收貯者與其徒為朽腐即以易馬或就近牧放或酌量撥解亦無不可成衮扎布接奉此旨若業經禁止貿易即以朕旨傳諭準其一體開市伊等若謂物價較伊犂有加亦諭以蒙古地方價值情形難與伊犂一例至卡倫臺站人等私行交易斷宜嚴禁有犯必懲并傳諭阿桂知之壬申烏魯木齊辦事侍郎旌額理等疏奏建造兵丁房屋事宜旌額理等奏言安西移駐烏魯木齊兵丁一千八百餘名約需住房三千六百餘間臣等於去年十月派員挑選屯田兵五百名查定各屯住址伐木刈葦分造房屋計本年八月內可以竣事奏入報聞戊寅參贊大臣阿桂疏奏相度安設卡倫各事宜阿桂奏言上年臣駐兵塔爾巴噶台查勘應設卡倫擬自輝邁拉呼至愛古斯招摩多自阿勒坦額默勒至伊犂河岸十七處立木為記對伊犂河四處壘石為記今春派護軍統領伊勒圖等前往安設訖又據厄魯特等告稱特穆爾里克有準噶爾所埋大銅炮及炮內鐵子臣委護軍統領伊勒圖等前往辦理據報掘得大銅炮四位衝天炮筒八件大小炮子萬餘顆陸續運回收貯備用俟嗒爾巴噶台駐兵時再將所立木石記號之處酌量安設卡倫奏入報聞己卯諭巴里坤辦事都統永寧等預備換班官兵羊隻上諭軍機大臣曰阿桂等奏稱新來伊犂换班之滿洲察哈爾侍衛官兵等自夲年八月起一年內應支食羊三個月共需一萬三千餘隻除牧放及孳生羊隻外仍需羊七千五百餘隻可否交巴里坤大臣辦送等語著照所請傳諭該大臣等將喀爾喀等往巴里坤所售羊隻照數採買選派官兵沿途加意牧放送伊犂庚辰以巴里坤辦事副都統永慶疏奏查辦布魯特所攜軍器傳諭阿克蘇等處駐劄大臣查核外藩貿易舊例上諭軍機大臣曰永慶奏稱布魯特車里克齊遊牧人等以貿易前來據卡倫查報所攜鳥鎗三桿及事畢起程又查出鳥鎗十七桿及腰刀棉甲等件與原數不符業將軍器扣留給還原價等語布魯特等與回人接壤彼此以軍器交易必相沿已久有何關係如謂伊等心懷叵測豈買得鳥鎗數桿遂能生事似此辦理轉覺琑屑但向例禁止與否亦未可知著傳諭阿克蘇等處駐劄大臣等會同查核具奏壬午喀什噶爾辦事尚書永貴等疏奏辦送伊犂布匹事宜永貴等奏言前準阿桂咨商以葉爾羌喀什噶爾餘糧折算普爾售買布匹運送伊犂臣等通計喀什噶爾餘糧及需用各款儘數辦理其餘再行辦買布匹具奏欽奉諭旨觀此情形僅敷爾等之用不能再助伊犂何不從實具奏仰惟聖明洞鑒無微不悉查前次阿桂咨商之時臣等正在預備採買換班官兵馬匹牲隻是以未能定議今烏魯木齊伊犂大臣俱奏明馬匹牲隻足用停止採買喀什噶爾餘糧作價之普爾除支用外仍可得三千騰格回地每布一匹其價止普爾四十文計辦運布匹二千及染色包裹共用普爾一千九百四十餘騰格以臺車送至阿克蘇轉運伊犂仍餘普爾一千五百餘騰格以備來歲之需奏入報聞六月壬辰朔申諭定邊左副將軍成衮扎布等哈薩克貿易事宜上諭軍機大臣曰成衮扎布等奏奉到辦理哈薩克貿易諭旨隨酌量曉示該使人據稱因道遠多帶馬匹並非專來貿易若有願售者亦可變價等語哈薩克全部均為臣僕其在西邊遊牧者與伊犂烏魯木齊相近自應在彼貿易至阿布賚遊牧與古爾班察爾相近在北路行走為便伊等情願來烏里雅蘇台貿易亦無不可至盜賊爭鬭等事惟派委幹員照料約束自然安靜其貿易之處可不必停止癸巳諭參贊大臣扎拉豐阿奏報科卜多屯田情形上諭軍機大臣曰科卜多新開屯田特派扎拉豐阿前往伊至彼處即應將一切情形一面報知將軍一面具奏迄今數月雖將墾田二十頃之處呈報一次此時地土肥磽雨澤應時與否及禾苗若何滋長並未奏及伊係參贊大臣副都統又專辦軍屯有事自應入告著成衮扎布等傳諭扎拉豐阿令將前項情形明白具奏己亥命議給世職官員通較前後功次上諭軍機大臣曰據正白旗滿洲奏稱黑爾根城副都統鄂博什在軍前效力曾賞給雲騎尉今又議賞三等輕車都尉其所得雲騎尉應居何等現在咨查該部等語此次平定伊犂回部有軍功出衆者一經奏報即交部議敘給與世職原屬鼓勵戎行之意今大功告成通行查核從前曾賞世職人員該部自應分别辦理蓋世職之崇卑視軍功之大小現在議給之職若大於從前所賞者即銷去前職尚屬可行至前後功次略同俱令留襲既屬太過或將前次功牌注銷專諭後來功賞亦未免偏枯此間權衡較量必通計前後所得功次應給何職酌量定議方為平允著該部將此次議給世職各員通行查核畫一辦理具奏乙巳諭回部辦事大臣等酌定伯克等貢獻事宜上諭軍機大臣曰達桑阿奏稱庫爾勒玉古爾伯克等貢獻馬匹緞匹等物謹派員賚送等語庫爾勒玉古爾等回人遷居甫定其生計自屬不足且回人等欲有所獻亦當視其品級以昭體制若小頭目等皆準入貢則各城互相倣效殊覺非體且伊等果出於誠悃或當入覲來京時行之尋常何必瀆獻上年皇太后萬壽大慶回人恭效祝釐俱已計值賞賜嗣後會逢盛典回人等所進方物該大臣等察收具奏此外不必允準現在所進馬匹什物既經收受著計值頒賞并通諭各城駐劄大臣曉示該伯克等知之丙午參贊大臣阿桂等疏奏伊犂恭建關帝神祠阿桂等奏言臣等因伊犂建造城垣公署謹擇地恭建關帝廟繪像供奉每年春秋致祭又原任將軍班第參贊大臣鄂容安在伊犂竭忠全節應否製造神牌於廟後房屋設位致祭伏候欽定奏入報聞尋賜名雙烈祠庚戌命議敘解送阿克蘇馬匹官兵上諭軍機大臣曰海明等奏稱烏魯木齊送馬一千二百匹至阿克蘇全無傷損等語烏魯木齊至阿克蘇中間踰越山嶺經行戈壁解送馬匹官兵等善為照料不致傷損殊屬可嘉著將在事官辨等交部議敘兵丁照例給賞阿克蘇辦事都統侍郎海明等疏奏各城羊隻足敷支給情形海明等奏言前準巴里坤駐劄大臣永寧等咨查阿克蘇本年官兵口糧羊隻果否敷用來年於何時辦理臣等以現購布魯特羊隻頗多無庸辦送咨覆查本年除支給阿克蘇烏什庫車賽里木拜五城官兵羊隻外阿克蘇現有內地辦送及購買布魯特之羊共九千二百餘隻五城官兵三年共需羊一萬三千餘隻雖現數不敷而歲有孶生羊一千四百餘隻三年內合算已足敷支給奏入報聞甲寅命加給屯田被災民人口糧上諭軍機大臣曰旌額理等奏稱內地送到屯田民人四百餘户俱知勉力耕作因雨澤稍歉又有野鼠食禾被災自一二分至七八分等語內地民人頗知力作偶值偏災伊等俱係新遷並無積蓄若不加以接濟則伊等拮據口食不能盡力耕耘現在烏魯木齊尚有餘糧其作何加給升斗俾無失所著傳諭旌額理等一面辦理即行具奏秋七月壬戌議哈密裁撤司員筆帖式事宜禮部尚書永貴等奏言準噶爾回部自平定以來駐兵屯田巴里坤哈密已成內地而哈密尤為事簡所有辦事大員應請裁撤再從前因係回民雜處派理藩院司官筆帖式諭班辦事今玉素富所屬回人頗知守法無庸添設冗員請一併裁去奏入得旨軍機大臣議奏尋議前經楊應琚等請裁哈密辦事大員歸巴里坤兼辦欽奉諭旨哈密為新疆往來要地未便裁撤大員今永貴所奏相同應無庸議至所請裁汰理藩院司官筆帖式查從前派出司員原為承辦軍務今既有辦事大員及隨印司員筆帖式等則該衙門官員自可撤回嗣後不必輪班派出奏入上從之己巳陜甘總督楊應琚等疏奏移駐烏魯木齊官兵起程日期楊應琚等奏言安西提標前後二營兵丁一千四百九十二名前經奏準移駐烏魯木齊於本年秋初起程續經奏請烏魯木齊設副將一員提標前後二營改為協標左右二營仍聽提臣統轄兹值官兵起程屆期臣五福於六月初旬自巴里坤前來安西將移駐兵丁酌分五起第一起定於九月初二日起程間日一行並飭副將舒敏妥協料理奏入報聞辛未命撤回索倫察哈爾兵丁由邊外行走上諭軍機大臣曰阿桂奏稱新疆所駐索倫察哈爾官兵現在阿克蘇以西今因換班撤回索倫兵過烏里雅蘇台察哈爾兵過烏魯木齊各歸遊牧甚近應令其先至伊犂由邊外轉回即末隊稍值冬寒亦可在伊犂度歲等語所見甚是撤回兵丁非派出征𠞰者可比惟視其行走便利方為有益且更代兵丁亦係緩行則撤回者不妨在伊犂少為休息於來年二三月遣回遊牧著傳諭永貴楊應琚遵照辦理癸酉命副都統侯訥蘇懇往烏魯木齊辦事上諭軍機大臣曰永德在烏魯木齊有年著派訥蘇懇往代永德即著來京甲戌哈薩克阿布賚使人都爾特赫勒蘇爾統等入覲於廣仁嶺前恭迎聖駕上駐蹕避暑山莊行宫召見命隨觀木蘭圍場乙亥諭禮部尚書永貴等派員曉示霍罕部落事宜上諭軍機大臣曰永貴等奏稱額德格訥阿濟比所屬鄂斯等處為額爾德尼占據親來懇請遣使持書往諭因酌給印文令其自行傳送等語額爾德尼自恃力強侵擾鄰部若將額德格訥所屬占據不還未免滋事永貴等措辭未為嚴厲伊等豈能警動此時額爾德尼若將所據之地給回固善如稍涉遊移永貴等即派幹員諭以致書係我等私意欲保全爾等遊牧尚未陳奏今欲視為無足重輕則當奏聞請旨夫以強凌弱乃大皇帝所深惡萬一天威不測命我等興師問罪雖後悔無及矣似此剴切曉示伊等自必信從所遣使人歸日即將該部落情形具奏丁丑諭新疆駐劄大臣等更換辦事官員事宜上諭軍機大臣曰海明奏稱員外郎夔舒在新疆行走四年本年十一月又一年屆滿主事七十一等從乾隆二十五年正月扣至本年十二月亦滿三年請預派人員更換等語夔舒已滿四年自應更換至七十一等又何必亟為奏請派遣伊等辦事特豫以奮勉之路以臣僕之義論之雖多駐一二年本情理之常原不必計算年限即限年更換亦必計其任事之日月乃并奉派起程之時俱行算入則往還即滿三年又何暇辦理公事若司員等有意請求即係顧戀私家不知大體或大臣等為之陳奏更屬沽名邀譽致長澆風甚覺紕繆著傳諭各該駐劄大臣等凡派出人員必任事三年再行奏請更換不得似此預行具奏戊寅命更代阿克蘇等處辦事大員上諭軍機大臣曰永寧在巴里坤和其衷在阿克蘇辦事並逾三年著德福往代和其衷鐘音往代永寧曹瑛仍回西安副都統任其協辦伊犂事務著伍彌泰前往甲申命更代哈密辦事道員上諭軍機大臣曰淑寶在哈密辦事已逾三年著楊應琚於陜甘道員內揀選一員前往辦事淑寶即著來京庚寅命升授侍衛扎竒勒圖等二等侍衛賞給世職上諭軍機大臣曰近將軍功人員交部核對功牌賞給世職因三等侍衛扎竒勒圖阿勒丹察等功次平常未經議給此二人在兆惠軍前殊屬奮勉而出入重圍冒險請援尤為勞績懋著雖伊等得官後功牌較少而前在兵丁分內所得之功牌甚多足以相抵自應格外加恩扎竒勒圖阿勒丹察著授為二等侍衛賞給騎都尉令伊等本身隨帶平定準噶爾方略續編卷十七
