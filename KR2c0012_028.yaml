  text: 欽定四庫全書平定準噶爾方略前編卷二十八
  hash: sha256:7f5643a3af57ec9715c223af1ff071032d869ff142daa6cf8519ebb865c161fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0012_WYG_028-1a, image: WYG0357/WYG0357-0402a.png}
body:
  text: 雍正九年冬十一月辛未敕諭靖邊大將軍順承親王錫保敕曰奉天伐罪治世之常經鋤暴除凶安邊之遠略逆賊噶爾丹策零者狂悖冥頑父子濟惡妄欲侵陵我屬國窺伺我邊陲包藏逆心狡焉思邐若不深加懲創實為衆蒙古之巨害是以命爾為靖邊大將軍統領滿洲蒙古緑旗大兵一切事冝爾與副將軍和碩親王丹津多爾濟和碩親王和碩額駙策凌振武將軍傅爾丹等酌定方略公同計議而行勿謂己能而不納衆論勿當事㑹而致失機宜勿恃兵強而輕視賊寇密偵遠探備極周詳各路大兵及䝉古兵丁聽爾調遣凡遇有警即遣發官兵應援撲勦有能擒斬賊首者奏聞加恩優賞有情急來歸者加意撫恤其不抗拒官兵者毋加殺戮兵將所過地方須申嚴紀律毋得騷擾百姓毋得淫人婦女毋得離散人之父子夫婦毋得損壞人之墳墓室廬毋得強取貨物毋得驅役平民其或有臨戰退縮貽誤擾亂軍機者爾㑹同商議文官四品以下武官三品以下即以軍法示衆官兵有犯小過者㑹同商議徑行處治毋泯沒戎行之勞績毋寬縱違法之辨兵法紀務極嚴明賞罰悉期公當一切機宜爾商酌調遣振武將軍傅爾丹綏遠將軍馬爾賽俱聽爾調度有應知會西路寧遠大將軍者即行知會一同辦理爾其嚴重精詳殫心奮力克奏膚功永清邊徼以副朕戡亂靖逆安民綏衆之至意欽哉故敕甲戌加賞駐劄昂古里將士有差上諭大學士等曰副都統黑色帶領在昂古里駐劄科爾沁之兵離家二年效力行走領兵之科爾沁台吉衮濟扎卜敖漢台吉羅卜藏著各賞元狐帽一頂猞猁猻馬褂一件其餘台吉管旗章京副章京等各賞銀三十兩參領佐領等各賞銀二十兩驍騎校等各賞銀十兩兵丁各賞銀五兩丁丑給頗羅鼐銀印大學士等議奏言據辦理西藏事務護軍統領馬拉等奏言頗羅鼐䝉恩授為貝勒又令辦理前藏後藏噶卜倫事務今具禀懇求印信以便行文該管地方與軍機調發事務應如所請令禮部鑄給辦理衛藏噶卜倫事務多羅貝勒銀印一顆交於頗羅鼐掌管奏入上從之戊寅命順承親王錫保辦理北路辨員升補事冝上諭大學士等曰各省出征之員未能即回本任者前曾降㫖著於十缺之中分出三缺為出征辨員升補之缺西路交與嶽鍾琪北路交與馬爾賽題補今馬爾賽授為綏遠將軍領兵駐劄扎克拜達里克其靖邊大將軍印務已交與順承親王掌管嗣後題補北路辨員著順承親王辦理庚辰命復旺扎爾貝勒原爵上諭大學士等曰喀爾喀郡王旺扎爾前因追殺逃走之烏梁海由貝勒封為王爵去歲軍營送駝誤期經部議黜革此次出兵著賞給旺扎爾貝勒原爵同公策凌旺布領兵前往甲申命加賞領兵往歸化城之副都統綽爾多銀二千兩管轄索倫兵丁之侍衛博爾本察銀一千兩乙酉命給貝勒策登扎卜等屬人産業扎薩克圖汗策旺扎卜等所失官駝馬免其賠償上諭大學士等曰朕去歲屢降諭㫖令喀爾喀等將妻子牲畜向內遷移於嚴密處居住乃並不預行遷移以致貝勒策登扎卜等旗分被賊劫掠牲畜傷損皆不能遵㫖之故耳昨傅爾丹奏請將策登扎卜之屬下分給衆喀爾喀等養贍據此辦理甚不妥協應查明戶口給與産業今扎薩克圖汗策旺扎卜奏請將伊等被掠之官馬官駝令伊部落內照數賠補策登扎卜屬下之人被賊虜掠朕深為惻然正欲施恩豈有著落伊等賠補牲畜之理著俱寬免交與王丹津多爾濟報銷丙戍命厄魯特貝勒多爾濟塞卜騰內移大學士等議奏據靖邊大將軍順承親王錫保奏言厄魯特貝勒多爾濟塞卜騰呈稱今年率領所屬遷過推河不料台吉索諾木吹濟引誘屬下四十餘户一同叛逃現今所餘之人亦屬難信請率令伊等向內遷移至歸化城等處游牧居住應如所請奏入上從之戊子命追封一等搭布囊丹巴為輔國公大學士等議奏據傅爾丹奏稱管領喀喇沁兵一等搭布囊丹巴從軍勦賊衝鋒力戰受傷入骨今因傷發病故臣等遵㫖從優議恤或贈為扎薩克一等搭布囊或授為輔國公恭候欽定奏入得㫖丹巴著追封輔國公世襲罔替十二月辛卯酌遣寧夏滿兵回本營上諭大學士等曰前將寧夏滿洲兵丁派撥一千名往西備備用今巴里坤大營已有滿漢兵三萬四千餘名其寧夏滿兵應令仍回本營著將軍卓鼐挑選一百名留在軍營聽用其九百名於明年春間著伊禮布帶領回至寧夏以一等伯欽拜為內大臣副都統阿岱為正紅旗護軍統領俱仍留軍營壬辰命封西藏一等台吉噶錫巴那木扎爾塞卜騰為輔國公上諭理藩院曰西藏一等台吉噶錫巴那木扎爾塞卜騰具奏謝恩進獻方物從前因伊父噶錫鼐於阿里地方陳亡經頗羅鼐奏請將噶錫鼐贈為一等台吉令伊子噶錫巴那木扎爾塞卜騰承襲聞噶錫巴那木扎爾塞卜騰甚是勤勞效力伊又係康濟鼐之兄子康濟鼐誠心效力始終不懈並無子嗣今將噶錫巴那木扎爾塞卜騰格外施恩封為輔國公世襲罔替寧遠大將軍嶽鍾琪奏報巴里坤圖古里克等處屯田穫青稞三萬六百八十石有竒奏入得㫖下部知之戊戍靖邊大將軍順承親王錫保奏報鄂爾昆等處屯田穫麥糜一萬六百三十石有竒奏入得㫖下部知之庚子命步軍統領阿齊圖等派領東路喀爾喀兵至軍營上諭理藩院曰東路派喀爾喀兵三千名著步軍統領阿齊圖去令侍讀學士查克旦與阿齊圖協同辦理此派出兵丁每人賞銀五兩令查克旦同二等侍衛阿敏道帶領至大將軍順承親王軍營照王指示之處駐劄仍令兵丁等不時操演甲辰賞賚寧古塔副都統塔爾岱仍留軍營靖邊大將軍順承親王錫保奏言據寧古塔副都統塔爾岱呈稱皇上恩㫖念塔爾岱宣力可憫令回原任但大兵正值滅賊之期是塔爾岱報國雪恥之日若負罪而還無顔復見老母仰懇仍留軍前等語謹此代奏奏入得㫖朕覽塔爾岱所奏為之惻然若准伊所請朕實不忍若不准則軍中難得此練習之賢將今暫依所請賞伊母銀一千兩再賞塔爾岱一千兩資伊用度乙巳上諭大學士等曰侍讀學士查克旦現今派往喀爾喀地方操兵防範著給還侍郎原銜丁未降紀成斌為沙州副將以顔清如代之上諭大學士等曰紀成斌久歷戎行曾有戰功是以朕加恩用至總兵官後因大將軍嶽鍾琪極力保薦謂其可以大用始將伊擢用四川提督令在西路協贊軍務上年嶽鍾琪來京陛見將大將軍印信交與紀成斌護理乃紀成斌隄防疏忽為賊人所窺始則盜竊馬駝既則逼近軍營無所忌憚此時紀成斌一籌莫展幸賴樊廷等奮力出擊以寡敵衆大挫其鋒而賊衆始退紀成斌之罪誠擢髮難數朕猶暫寬其罪俾得黽勉效力以贖前愆乃伊一年以來怠忽逡巡每見欽差大臣但言我實係巴里坤辨兵之罪魁紀成斌有忝職守深負朕恩著革去提督改為副將交與嶽鍾琪凡有差遣之處令其效力贖罪若仍不知愧悔著即參奏嚴究四川提督著陜西延綏總兵官顔清如補授陜西延綏總兵著陜西沙州副將張豹補授紀成斌著補授陜西沙州副將加賞鄂爾多斯王查木陽等上諭大學士等曰派出古爾班賽堪地方駐防之鄂爾多斯王查木陽四子部落王阿喇卜坦多爾濟著各賞銀一千兩鄂爾多斯台吉策旺多爾濟額默根索諾木著各賞銀五百兩征𠞰準噶爾賊人喀爾喀貝勒策卜登賞元狐帽一頂貂皮馬褂􅀈袍各一件銀五千兩命副都統銜馬哈達等築扎克拜達里克等處城垣大學士等奏請派員赴扎克拜達里克推河翁吉三處修築城垣奏入得㫖扎克拜達里克地方著副都統銜馬哈達原任巡撫圖理琛等前往推河地方著副參領桑吉柱等前往翁吉地方著原任將軍來文等前往以加副都統銜阿成阿為都察院左副都御史加侍衛瑚習禮副都統銜俱仍留軍營以寧古塔副都統塔爾岱為內大臣在軍營參贊行走戊申升正藍旗前鋒參領阿那布為本旗䝉古副都統仍留軍營庚戌封喀爾喀扎薩克輔國公阿努里為固山貝子壬子命復貝勒阿寶郡王爵上諭大學士等曰貝勒阿寶並伊子衮布在西路軍營甚屬效力阿寶又帶所屬兵丁防範游牧殊為可嘉著賞還伊郡王原爵命左副都御史阿成阿為綏遠將軍馬爾賽參贊癸丑命喀爾喀郡王敏珠爾多爾濟等來京大學士等遵㫖議覆據靖邊大將軍順承親王錫保參奏喀爾喀郡王敏珠爾多爾濟扎薩克台吉成衮扎布調往軍營逗遛不至扎薩克一等台吉鄂木布濟擅離汛地回往游牧罪難寬宥請將伊等郡王台吉俱行革退奏入得㫖王敏珠爾多爾濟之祖墨爾根濟農顧魯什希乃喀爾喀內首領扎薩克從前恭順進貢後遇噶爾丹之亂甚屬效力此次調兵敏珠爾多爾濟遲誤未到或有别故著將敏珠爾多爾濟成衮扎布調取來京扎薩克台吉鄂木布濟既派在庫卜克爾地方駐劄伊聞賊信私離汛地罪不可赦猶能保守伊之游牧未被賊掠尚屬可矜著將鄂木布濟亦調取來京俱俟朕面詢後再降諭㫖寧遠大將軍嶽鍾琪奏報哈密塔勒納沁等處屯田收穫青稞麥子共五千石奏入得㫖下部知之丙辰以護軍統領達爾濟為將軍駐古爾班賽堪上諭大學士等曰古爾班賽堪地方駐滿洲䝉古兵五千名甚屬緊要護軍統領達爾濟著給與將軍印信令其總統鄂爾多斯王查木陽四子部落王阿喇卜坦多爾濟俱授為副將軍原任散秩大臣四格巴咱爾原任侍郎傅鼐俱賞給原銜與副都統瑚琳並在參贊上行走達爾濟現在歸化城著減從馳驛來京靣請訓㫖再赴軍營戊午和托輝特貝勒班第奏報移駐塞楞格河靖邊大將軍順承親王錫保奏言臣遵㫖遣人詢問和托輝特貝勒班第現在移駐地方今據呈稱本年秋間因準噶爾逆賊來犯由原駐桑金達賴等處東遷至塞楞格河北山額格地方駐牧聞逆賊逃遁已逾阿爾台山嶺仍由額格地方前進來至塞楞格河同扎薩克根敦貝勒車蘇隆等部落於南北兩岸駐牧山嶺險峻樹木叢繁更兼河流深濶占據要害可以禦敵奏入報聞北路軍營將士擊敗準噶爾賊夷於蘇克阿勒達瑚得㫖議叙喀爾喀貝勒策卜登扎薩克台吉齊巴克扎卜根丕勒齊旺協理台吉巴海額默根羅卜藏及辨兵等俱賞賚有差雍正十年壬子春正月丁卯甘肅巡撫許容請禁諸部內移許容奏言臣以沿邊要地或有蠢動加意防範今准甘提凉鎮各咨稱准署督臣今貝勒丹𠂻在阿拉克山阿勒坦特卜什等處駐牧並准其部下人等至邊內貿易又據肅州報稱遵奉署督臣安插公巴濟旗下領催哈喇等戶口於哈魯鼐地方給以米麵茶封又據寧夏道府報稱奉署督臣遵㫖安插公通摩克公巴濟人衆於阿拉善山後並將喀爾喀部落扎薩克台吉鄂木布濟扎薩克台吉多爾濟王格勒克雅木丕勒公拉旺公完舒克等一體安插支給米麵茶封近又據地方官禀報鎮夷口內紅布湖地方住有夷帳云是巴濟公部落為賊衆迫脅逃避內地臣聞鎮夷口外之巴濟公已叛歸準噶爾而伊等部落言稱避賊豈可深信置之內地恐至藏奸且寧夏地土平漫僅隔一阿拉善山並無險要凉之鎮番孤懸塞北自凉抵肅徑竇繁多外通邊墻而諸夷漸次逼處人心難測在查郎阿宋可進自必悉心籌畫防範嚴密而臣鰓鰓過慮殊懷隱憂請嗣後塞外附屬諸夷未奉諭㫖安插而伊等口稱避賊內徙者不許縱令入口即有力量單弱不足禦賊而勢當應援者寧可遣兵追護不冝拔帳近移伏惟聖裁奏入報聞乙亥上諭大學士等曰張家口外領兵駐劄之都統薩穆哈著來京令都統綽竒副都統宗室滿珠錫禮前往綽竒所管鑲藍旗事務著平郡王福彭署理丙子命給被掠王格勒克雅木丕勒公通摩克等産業口糧署陜西總督查郎阿奏言臣遵㫖委遊擊朱竒芳等出口至阿拉克山貝勒丹衷處派人協同詢問公通摩克等遷移遊牧之故今據朱竒芳等禀前至諾顔哈喇見公通摩克回稱王格勒克雅木丕勒在錐崙地方駐牧公拉旺欲往哈魯鼐去扎薩克台吉鄂木布濟并巴濟旗下佐領翁鄂柴等俱欲往綽確去此等地方俱於阿拉善山甚近扎薩克台吉多爾濟與我附近駐牧扎薩克台吉錫里扎卜仍在古爾班塞堪我等産業牲畜俱被逆賊搶劫屬下之人漸至饑餒兼無居住帳房仰懇給發口糧等語臣查諾顔哈喇等處係喀爾喀游牧之地於哈魯鼐阿拉善山甚近臣暫將王格勒克雅木丕勒併公通摩克人等酌量給發茶麵帳房等物其作何料理安插之處伏祈皇上敕部議覆施行奏入得㫖大學士等議奏尋議王格勒克雅木丕勒公通摩克等被賊劫掠今游牧俱係於諾顔哈喇等處駐劄應派章京一員動支戶部銀二萬兩馳驛前往將王格勒克雅木丕勒公通摩克屬下查明戶口善加撫育台吉及屬下之人每家各賞牛羊牲畜每人賞給銀六兩以製帳房其所賞之牲畜於未滋生之前行文查郎阿交與寧夏官員等辦理一年口糧賞給奏入得㫖公通摩克率屬下之人向內移行路遇賊人搶掠人口牲畜甚為可憫王格勒克雅木丕勒之戶口牲畜亦被劫掠著賞給二人銀各一千兩以為立産之具餘依議庚辰署陜甘總督查郎阿奏防範哈喇等事冝查郎阿奏言據大學士等咨稱甘州係沿邊要地阿拉善山亦附近寧夏領催哈喇等二十七戶係叛逆輝特公巴濟屬下安插於此究有未便應飭令甘肅文武員辨嚴加防範不時稽查將來作何安插之處再行酌議臣即密令甘提臣宋可進寧夏鎮臣李繩武等㑹同文員加謹防範小心查察令酌量安插於附近邊牆之內嚴加管轄以固疆圉奏入報聞辛巳厄魯特郡王額駙塞卜騰旺布移住喀爾喀河命賞賚有差大學士等議奏據厄魯特郡王額附塞卜騰旺布告稱屬下人等現存游牧處有四百二十戶其內有十四宰桑若將伊等移住內地其中未出痘疹者多未免恐懼但現在游牧又與賊交界伏乞皇上施恩往東移於喀爾喀河附近居住甚便至屬下人等牲畜並無倒斃傷損力能遷移等語應如所請移住於喀爾喀河地方伊屬下人等既稱牲畜豐足力能遷移不必更加賞給奏入得㫖塞卜騰旺布屬下人等不隨逆賊誠心歸附伊主甚屬可嘉著加恩賞給宰桑等銀各一百兩屬下人等每戶銀十兩塞卜騰旺布感念朕恩不受準噶爾賊人之欺誘屬下逃竄又效力往追著加恩賞銀一千兩癸未鏡兒泉哨兵被傷命議處寧遠大將軍嶽鍾琪等嶽鍾琪奏言臣因入冬以來積雪甚深嚴飭卡倫之辨兵祗令登城瞭望不許分遣遠哨乃駐防鏡兒泉副將馬順陽奉陰違擅遣辨兵遠出巡哨以致城北山內兵丁突遇賊夷被傷二名衝失一名副將馬順隨遣遊擊楊玉守備張嵩先後帶兵追趕賊夷遠遁其違令之副將馬順理合參奏奏入得㫖鏡兒泉卡倫離軍營不及百里駐兵不少賊來即至傷失兵丁一任遠遁嶽鍾琪是何防範且安設卡倫原為巡探如雪霧黑夜尤冝加意若止令登城瞭望不許分遣遠哨以為恐有疏防是必將待賊臨城而後防矣是何軍令嶽鍾琪不知自咎僅以副將陽奉陰違為詞朕實不解將嶽鍾琪與副將等交部嚴察議奏甲申命給駐劄古爾班賽堪將軍達爾濟建勳將軍印賞銀二千兩命議叙追勦準噶爾賊人功科爾沁郡王羅卜藏喇錫巴林郡王桑里達扎賴特貝子特古斯翁牛特貝子羅卜藏敖漢公額駙羅卜藏喀爾喀公敏珠爾屠巴巴木丕勒多爾濟扎薩克台吉旺扎爾旺布達什丕勒根敦諾爾布扎卜齊旺扎卜特克什策卜登喇卜坦等各賞賚有差寧遠大將軍嶽鍾琪請築城木壘駐兵從之嶽鍾琪奏言去年襲擊賊夷沿途細看有木壘地方形勢險要兼可屯種若於此建築城池駐兵二萬賊兵斷難飛渡而東再於巴里坤駐兵一萬於魯克察克闢展等城添設官兵足一萬之數如此則賊兵來時我軍互為犄角前後邀截可令大創而去若將來木壘駐兵有未協之處請將臣置之重典妻子從重治罪奏入得㫖木壘果為要隘之地可以堵截賊人來路又與魯克察克等處互為聲援著照所奏定議舉行丙戌命選西北兩路將辨兵丁派往木壘等處上諭大學士等曰木壘駐兵一事最關緊要若大將軍嶽鍾琪定議舉行可於緑旗兵丁內揀選二萬名遣往其魯克察克等處應添兵若干亦酌量派出西路蒙古兵丁較少應酌議添撥以資行間之用前京城派往之驍勇兵一百名巴爾虎兵一百名額駙阿寶屬下兵丁五百名俱著派去軍營所有歸化城之土默特兵丁內挑選五百名鄂爾多斯兵丁內挑選三百名一併帶往再北路副都統達什帶去察哈爾兵一千名亦著往西路原任總管班第給與副都統職銜令其與達什一同管領達什班第二人各賞銀一千兩其察哈爾兵辨著順承親王酌量每人賞給銀兩俾其行裝寬裕給與馬匹於二月杪三月初由阿濟一路前去至阿寶之兵前曾降㫖令於今春撤回本游牧處今既留在軍營著大將軍嶽鍾琪量加恩賞可即傳諭兩路大將軍知之又諭曰侍郎顧魯軍前效力有年著授為內大臣在西路參贊上行走賞銀一千兩又諭曰綏遠將軍馬爾賽至軍營時著副都統阿岱前赴順承親王處在參贊上行走丁亥命封公衮布為固山貝子上諭理藩院曰厄魯特郡王額駙阿寶之子公衮布在西路軍前甚屬效力著加恩封為固山貝子平定準噶爾方略前編卷二十八
