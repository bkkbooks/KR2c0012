body:
  text: 乾隆二十年春正月癸巳命西北兩路將軍尅期進兵定邊左副將軍阿睦爾撒納等奏言臣等詳詢收服之包沁宰桑阿克珠勒等知哈薩克兵與達瓦齊交戰情形雖未悉果到伊犂與否其已至博羅塔拉地方之信似屬確實至所言達瓦齊擊敗哈薩克兵現在擁兵七千駐劄伊犂巴特瑪車凌帶兵三千在和爾郭斯結壘等語似屬荒唐何則若達瓦齊果擊敗哈薩克兵必其得勝之處行知各路應遣使處亦必遣使今各處俱無一信則準噶爾潰敗難支可見且和洛霍斯至伊犂僅數十里兩軍本非和好而謂各結營駐劄益覺難信蓋達瓦齊恐人聞其游牧搶掠故特宣言互相對壘以飾耳目看來博羅塔拉以外已被哈薩克搶掠惟餘集賽布庫努特噶勒雜特之鄂拓克人等竭力選兵不過六七千之數我軍長驅直入並通信於巴特瑪車凌等所居之愛古斯地方仰賴皇上天威自當迅奏膚功奏入上諭軍機大臣曰阿睦爾撤納將阿克珠勒等所告巴特瑪車凌與哈薩克人衆往征達瓦齊之處奏聞可見達瓦齊勢已窮蹙準噶爾業成瓦解之形若不迅速進兵必致哈薩克倖獲其利著阿睦爾撒納度量馬力或五六千或三四千務期奮勇前進迅奏膚功先因察達克等為包沁人言所誑即行撒兵朕已降有明旨今觀阿克珠勒之言則其為欺誑愈見俟達什敦多卜到彼仍遵前旨與察達克圖倫楚帶兵前往在阿睦爾撒納所領大隊之前另作一隊哨探兵方有禆益仍將達什敦多卜與阿睦爾撒納各帶兵若干及何時起程之處奏聞再朕曾降旨令西路哨探兵聽候北路起程日期亦於原定日期之前先行進發今已另諭薩喇爾若西路先至博羅塔拉有機可乘則不必更候北路倘北路先至亦然如必需兩路合攻則仍守候一齊進發總之兩路將軍大臣皆為朕出力之人不論孰先孰後惟期尅日成功可傳諭阿睦爾撒納等知之復奉上諭曰阿睦爾撒納奏到朕已諭令速即帶兵前進著并諭薩喇爾扎拉豐阿鄂容安等遵旨辦理但朕所微慮者巴特瑪車凌係阿睦爾撒納之兄現在力量稍強恐達瓦齊被伊擒獻阿睦爾撒納因此恣意不可不慮何如我兵擒獲更足示威薩喇爾等努力為之見阿睦爾撒納時毋露此意申諭擒解背叛逃人巴朗等上諭軍機大臣曰巴朗等負恩逃叛情甚可惡即使窮蹙來降究非投誠可比現在伊父䇿凌孟克在西路進兵或巴朗逃避額林哈畢爾噶至伊父前懇求藉稱招撫希圖寛宥亦未可定著傳諭薩喇爾一聞巴朗等消息即撒囘䇿凌孟克另派精兵擒拏則伊等無可藉口擒獲時即將巴朗孟克特穆爾等為首之人解送來京其所屬人等酌量派人管轄具奏請旨甲午定邊左副將軍阿睦爾撒納等疏奏籌辦進𠞰官兵馬駝事宜阿睦爾撒納等奏言現在軍營馬三萬九千餘匹駝四千餘隻内可給官兵之駝計二千七百餘隻臣等欽遵諭旨酌添兵一千入於哨探兵隊内共兵六千名所有駝隻雖不足辦給六千官兵然額林沁多爾濟所買之駝現在陸續送到於進兵時不致有悞務於二月十五内領兵前進至各處應行解送及採買馬匹到時可以添兵幾千之處臨時再酌量辦理陸續起程再議派六千兵内除臣阿睦爾撒納將厄魯特兵二千八百三十名俱行帶往外派出察哈爾兵一千名和托輝特兵五百名扎哈沁兵三百名其一千三百七十名即於喀爾喀兵内揀選添補所有官兵應得糧馬等項交舒赫德等照新定之例辦給其安設臺站處自阿爾台以外臣等遵旨令厄魯特喀爾喀一同安設至屯田綠旗兵三百名喀爾喀兵七百名厄魯特兵一百名俟農具籽種到時亦於哨探兵起程後陸續令其前進奏入報聞乙未申諭將軍班第等軍前事宜上諭軍機大臣曰前色布騰巴爾珠爾奏稱阿睦爾撒納曾言瑪木特係軍威收服與傾心降附者不同乞將伊在哨探兵内領兵之處停止朕因降旨在前忽爾中止啟其疑心隨即批示曉諭今據阿睦爾撒納奏稱二月十五日内兵即前進瑪木特於正月十七日始自京起程斷難馳赴朕思阿睦爾撒納自到軍營諸事盡心辦理井井此次進兵唯伊是頼瑪木特之去否原屬無關𦂳要若既到軍前自不便不令其前往今已遲延不能同進伊自不妄生疑慮原派扎哈沁兵三百名仍著阿睦爾撒納帶往再額爾齊斯屯田兵前命努三帶往今努三已解任著以塔爾瑪善代之親王成衮扎布向請効力軍前朕原派往額爾齊斯屯田著仍派伊前往辦理原定屯田兵丁僅派䇿凌等數十人及喀爾喀綠旗兵數百名尚未敷用著阿木爾撒納酌留厄魯特兵一二百名於屯田處展放卡倫防守又前哨大隊兵俱進烏里雅蘇台不可無人鎭守著留莫爾渾駐劄辦事此際辦理糧餉馬匹亦屬需人著舒赫德以章京銜協辦事務奏事一體列名著傳諭班第阿睦爾撒納等知之丙申命撤囘副都統銜唐喀祿以副都統納穆扎爾管理阿睦爾撒納等游牧軍機大臣等奏言唐喀祿據班珠爾等稱伊等人衆除已派出兵之人其現在游牧者俱係老穉不能耕種恐夏秋難免饑餒代為陳奏查伊等自投誠以來荷䝉天恩賞給牲畜以及口糧籽種俾其生計豐裕自應節儉度日永享樂利即或將來稍有匱乏儘可隨時酌辦不應目前即為凟請唐喀禄理宜委曲曉諭令盡心耕種毋得藉端偷安乃竟據情冐凟殊為不合應將所奏毋庸議唐喀祿交部察議奏入得旨依議班珠爾等投誠以來朕已屢次施恩現在去夏秋尚遠果有必須接濟之處朕自加恩賞給如去歲䇿凌等人衆遇災生計稍窘朕即賞給口糧何必預為陳請前以唐喀祿尚能通曉䝉古語言是以賞給副都統銜俾照管阿睦爾撒納游牧乃一切未能盡心徒事𤨏屑著即撒囘仍在員外郎上行走納穆扎爾著管理阿睦爾撒納等游牧事務納穆扎爾所辦事務著舒明馳驛前往接辦定邊左副將軍阿睦爾撒納等疏奏北路進兵事宜阿睦爾撒納等奏言臣等奉到十二月二十九日諭旨仰見睿慮周詳準噶爾内亂情形俱在聖明洞鑒今前隊已派兵六千名臣等於二月十五日以内即帶領前往屯田兵丁約一千名亦令隨後起程但北路係往賊巢要路較西路更關𦂳要因於哈達哈等陸續送到馬匹内量其可用者挑出再派兵三千名令在臣等隊後接續起程共成一萬之數則軍威愈盛俟到額爾齊斯時度量情形如可與巴特瑪車凌等通信一面奏聞一面即遣人宣揚聖諭俾伊等帶兵前進臣等與西路將軍等於博羅塔拉等處協力擒拏達瓦齊仰頼天威遠播大功自可速奏奏入報聞丁酉申飭定西將軍永常上諭軍機大臣曰昨據方觀承奏永常催趲各隊兵丁朕已降旨令仍按站行走凡經過各省不必照永常行文辦理今據安泰奏稱接到永常催趲兵丁之文議將所帶第三隊兵十站併為五站此皆永常悞㑹朕催令哨探兵前進之旨以致冐昧一併催趲自京起程兵丁抑思大隊之兵現有尚未起程者若朕前降旨非指哨探兵丁則大隊兵丁豈能於二月二十九日馳到軍營二十九日尚不能到又能向前更行趲進乎永常謬悞至此殊不可解著於兵丁經過各省速再行文知㑹令其仍按原站不必催趲永常著傳旨嚴行申飭戊戌命將軍班第等㑹議備禦哈薩克事宜定邊左副將軍阿睦爾撒納等奏言察達克等遣莫寧察將噶勒雜特之庫綳送至軍營臣等詢問據庫綳告稱係噶勒雜特宰桑都噶爾屬下人都噶爾聞大兵收取扎哈沁集衆相商俱願歸順天朝唯得木齊索和爾車凌等欲暫為觀望俟達瓦齊果敗再為投誠今聞大兵收獲包沁想已紛紛逃避我向包沁而來途遇哈薩克錫喇所屬三人傳言哈薩克至伊犂將囘衆所種穀麥搶去現在察罕烏蘇之伯勒齊爾居住達瓦齊住西巴爾圖地方曾遣伊宰桑恩克博羅特於哈薩克處捉生被哈薩克拏住哈薩克居住之巴朗向恩克博羅特云我係噶爾丹䇿零之弟爾等老多玉特喇嘛與我認識我遣人與爾同往告知達瓦齊令其仍囘舊游牧居住我在伊犂為台吉從此兩相和好不料達瓦齊暴虐異常竟殺巴朗來使奏入上諭軍機大臣曰據阿睦爾撒納等詢問庫綳告稱哈薩克居住之巴朗自稱係噶爾丹䇿零之弟著班第詢問瑪木特伊係準噶爾舊人必能知之倘伊亦不知則巴朗並非噶爾丹䇿零之弟與準噶爾無涉矣又庫綳稱哈薩克兵入伊犂將囘人穀麥搶奪在察罕烏蘇之伯勒齊爾居住看來哈薩克兵現在伊犂就近地方如我兵前進遇哈薩克在彼當如何辦理著班第阿睦爾撒納㑹議速奏安插新降包沁人等定邊左副將軍阿睦爾撒納等奏言察達克等收獲包沁人等戸口牲畜臣等詳查包沁之七得秦共六百五十九戸二千八百一十九口駝二百五十四隻馬二千九百八匹牛四千四百二十七頭羊二萬五百三十八隻看來牲畜尚豐毋庸另給養贍其通瑪木特之戸口䝉恩賞給盤費牲畜現在辦理其與包沁一併收獲之扎哈沁布庫努特葉克明安之台吉德濟特等屬下人及臣阿睦爾撒納屬下被擄之人并逃人巴朗之僕人共八十戸三百四十五口内將臣阿睦爾撒納屬下男婦十五口交努三等酌量辦理送至軍營令其完聚扎哈沁之九戸二十五口并庫克新瑪木特屬下五戸二十七口布庫努特之五戸十九口俱交照管扎哈沁之侍衛台吉等暫行安置俟瑪木特囘時編定旗分佐領將伊等一併編入葉克明安之台吉德濟特等屬下四十五戸一百八十五口暫交努三等於伊駐劄附近地方安插派員照管俟平定準噶爾後再行查辦都爾伯特之十二戸七十二口俟查明係何台吉屬下令其歸併居住其巴朗僕人諾爾一戸三口拏送軍營詳審如實係隨巴朗逃亡即照沙拜等例解送京師發遣奏入上諭軍機大臣曰阿睦爾撒納等辦理安插新降包沁人等甚屬妥協均著照所請行其巴朗僕人諾爾一戸訊明解京之處從前扎哈沁查出逃人沙拜等朕已施恩分賞伊等台吉想諾爾亦不過為巴朗逼勒隨行著將此三人訊明不必解京仍給還䇿凌孟克此時䇿凌孟克尚在西路軍營令伊屬下宰桑等嚴行約束命遷移阿睦爾撒納等游牧上諭軍機大臣曰阿睦爾撒納以托忒字奏請遷伊游牧於烏里雅蘇台等處地方並將管理伊等游牧大臣更換一員又稱伊屬下人内有從前離散者懇賞給印文前往招降等語從前朕已降旨俟平定準噶爾後分封四衛喇特其輝特人等即在其内毋庸另給印文在阿睦爾撒納之意以班第不允所行為此陳奏著傳諭班第俟準噶爾既定將輝特所有阿睦爾撒納原管之人即照所請令與伊等㑹合居住如有屬人衆多之頭目亦一體賞給封號管束其屬即䇿凌等之都爾伯特班珠爾等之和碩特亦均照此辦理至唐喀祿乃新用之人不諳事務朕已降旨撤囘阿睦爾撒納等游牧移至烏里雅蘇台等處甚屬妥協即照所請行班珠爾係與阿睦爾撒納同來之人亦應一併遷移其如何遷移之處著班第阿睦爾撒納㑹同納穆扎爾一面辦理一面奏聞阿睦爾撒納唯圖迅速成功早受朕恩勿以游牧為念新派之納穆扎爾曾照管都爾伯特游牧因彼處無事特將伊調管輝特和碩特部落至於該部落生計果有不足納穆扎爾即行奏聞朕自加恩撫䘏即如䇿凌䇿凌烏巴什等來降後偶遇災疫稍為艱窘朕即加恩撫綏伊等俱感戴朕恩撙節勤儉漁獵為生儘可樂業阿睦爾撒納可令宰桑等諄切曉諭其屬務令盡力耕種使永遠生計有資以副朕懷柔遠人至意並諭定邊右副將軍薩喇爾曰阿睦爾撒納以托忒字奏請將伊游牧移居烏里雅蘇台等處朕以事屬可行已准其請惟奏請印文招降伊輝特台吉屬人一事是其欲取多人占據地方之意已經微露似平定準噶爾全為伊一人集事矣薩喇爾到彼務須留心防範愼勿任其所行然亦不可稍為漏洩此時薩喇爾進兵愈速愈妥若使阿睦爾撒納先進似覺稍為未便薩喇爾其善體朕意己亥諭尚書公哈達哈等揀選喀爾喀馬匹事宜上諭軍機大臣曰前命哈達哈等往喀爾喀部内揀選馬匹備用查軍營現存馬六千匹已足為哨探兵乘騎之用各處購買馬匹亦陸續送至自更充裕哈達哈等不必於喀爾喀部内挑馬過多如有臕壯騸馬量為揀選帶往軍營將彼處臕欠馬匹換交䝉古牧厰數月間即可肥壯則既於我兵有益而䝉古生計亦屬無損至兒馬騍馬則彼所頼以孳生不必挑取著傳諭哈達哈阿蘭泰阿思哈等遵旨妥協辦理辛丑定邊左副將軍阿睦爾撒納等疏奏詢明達瓦齊現在情形阿睦爾撒納等奏言察達克等將收服包沁之顔達什洪郭爾瑚泰托克托瑪什等四人解送軍營臣等細加詢問據顔達什告稱我原在兩額爾齊斯之伯勒齊爾居住包沁人等投誠並未與我信息適至華額爾齊斯始知此信隨與我同住十八戸人口攜妻子牲畜前來投誠又稱我於去秋前往伊犂見達瓦齊惟終日飲酒一切事務俱廢九月内達瓦齊遣伊舊宰桑薩爾坦帶兵往擒額林沁旋即敗囘後傳聞哈薩克兵來達瓦齊又行文各處備兵兵皆未到及我囘至托和木圖地方恰遇哈薩克兵將我擒去行走五日始行釋放由齋爾以至伊犂所有游牧俱被哈薩克搶奪並無戸口凡達瓦齊所屬皆言自伊為台吉以來竟無一日安寧是以人人嗟怨至伊犂地畝雖稍有收成而馬匹皆甚平常臣等察看顔達什等聞風効順實出至誠理合照例安置隨飭剛什勒圖解送努三等安插奏入報聞壬寅諭協辦陜甘總督劉統勲籌辦進兵運糧各事宜上諭軍機大臣曰劉統勲奏酌辦軍務摺内稱涼莊寧夏滿洲兵俱於二十四五日前可抵肅州其甘涼肅一提二鎭兵亦於三月初旬均可抵巴里坤軍營前隊哨探兵原定於二月二十九日自軍營起程嗣降旨令於二月中旬進發若三月初間始抵巴里坤已屬遲悞想奏摺時尚未接此旨接到自必遵照辦理著再傳諭劉統勲前隊哨探兵丁令其速行催調務於二月初十日全抵軍營其隨後續進官兵若可趲進亦酌量先行數起總以六千名為率其餘仍按站行走不必嚴催致竭馬力至官兵進𠞰口糧原議俱令自行裹帶若進𠞰時於自行裹帶外又復官為䭾運仍屬軍行糧隨故套從前岳鍾琪等辦理舊例與此次輕騎捷趨機宜殊未符合况北路進𠞰口糧俱自行裹帶而西路又官運三分之二辦理亦不畫一應速行籌畫以便㨗輕利為主西北兩路亦不致參差其所奏大兵齊集軍營所需口糧酌量運往散給巴里坤可以不留餘糧所見尚是巴里坤原可無庸另設倉庫存貯即有應需接濟亦可自哈密運往料不至於有悞應照所奏辦理諭定邊右副將軍薩喇爾速行進兵上諭軍機大臣曰昨覽阿睦爾撒納等疏奏顔達什所告準噶爾情形可見達瓦齊勢窮力竭我兵一到即可成功但哈薩克兵力稍強又與達瓦齊甚近若達瓦齊為哈薩克兵所擒或為阿睦爾撒納及巴特瑪車凌拏獲均不如薩喇爾俘獲為善前已屢經降旨著再傳諭薩喇爾仍遵前諭不必拘定何處兵丁乘機速行前進西路之兵但能較北路先期到彼迅奏膚功方副朕委任之意仍將帶領兵丁若干及何日起程之處速行奏聞癸卯諭酌辦扎哈沁包沁貢賦事宜上諭軍機大臣曰去年辦理烏梁海等貢賦已有章程新降扎哈沁包沁人等想在準噶爾時亦有定賦除瑪木特及伊子弟朕已加恩寛免著傳諭班第等即查明扎哈沁包沁人等在準噶爾時如何交納貢賦亦照烏梁海之例寬免一年自明年起作何裁減交納之處酌辦具奏甲辰賜包沁宰桑阿克珠勒等官爵銀兩有差上諭軍機大臣曰包沁宰桑阿克珠勒著授為三品總管賞給孔雀翎并銀五十兩台拉克著授為四品翼領和濟木瑚里著授為佐領俱著賞給藍翎銀各三十兩再阿克珠勒等願往軍前効力著毎人再賞銀五十兩并加恩寛免伊等納貢阿克珠勒等既願効力軍前著班第等於包沁人内挑選百名或五十名賞給整裝銀兩交阿睦爾撒納親身帶領前往軍營効力二月乙巳命侍郎兆惠協辦烏里雅蘇台軍營事務上諭軍機大臣曰兆惠奏請同哨探兵前進與富德辦理臺站事務哨探兵進發隨營安臺既有將軍指麾又有富德查辦可以無庸兆惠前往烏里雅蘇台甚屬𦂳要莫爾琿一人尚恐不能周詳著兆惠即留烏里雅蘇台協辦事務在領隊大臣上行走丙午諭將軍班第等進兵事宜上諭軍機大臣曰據阿睦爾撒納奏前隊兵六千名於二月十五日以前進𠞰屯田兵丁亦相繼前往末後再派兵三千接續䇿應辦理甚是阿睦爾撒納等隊後添派之三千兵即著班第帶往現在準噶爾情形窮蹙已極成功甚易朕意兩路哨探兵至博羅塔拉等處則與伊犂甚近彼處形勢即可瞭然著阿睦爾撒納薩喇爾詳察彼處情形若無需續進大隊之兵可一面檄令撤囘一面速行奏聞即駐劄伊犂之大臣等須留兵跟隨亦即於現在所領兵内挑留應用著傳諭兩路將軍等知之丁未諭西北兩路將軍等㑹合進𠞰定邊左副將軍阿睦爾撒納等奏言臣等欽奉諭旨俾於二月十五日以前帶兵進勦不必候西路之兵查西路兵於二月二十八日自巴里坤起程至博羅塔拉不過二十一二日北路兵於二月十五以前自烏里雅蘇台起程至博羅塔拉須四十六七日則西路兵先到十餘日北路不能馳赴不惟孤軍深入殊屬可虞且恐賊衆亦易於備禦臣等商議不若仍令西路兵聽候北路進發之後按期前往同至博羅塔拉㑹兵前進則軍威更為壯盛益可迅奏膚功奏入上諭軍機大臣曰從前因恐達瓦齊為哈薩克兵所獲或為巴特瑪車凌擒縛是以屢降諭旨令勿論何路之兵先至即行相機前進不必兩路㑹合今阿睦爾撒納奏到恐西路先到北路不能㑹齊不無孤軍深入之虞朕思用兵自宜計出萬全著將阿睦爾撒納原奏抄寄薩喇爾令其仍遵原定二月二十八日起程不必拘泥前旨俟到額林哈畢爾噶候北路信息再同至博羅塔拉㑹兵前進伊犂其如何通信㑹合之處速即奏報再阿睦爾撒納此奏能合機宜與否伊若有所見亦即速行奏聞庚戌命陜西巡撫陳𢎞謀等撫䘏沿途出痘兵丁上諭軍機大臣曰陳𢎞謀奏索倫兵丁内現有患病及出痘之人從前派索倫兵丁原令該將軍將已經出痘者派往今在途又有出痘之人或係内地氣候使然否則兵丁等情愿前往不復慮及或冀年長未必出痘耳此非他病可比即䕶送行走亦恐傳染究非所宜至因痘重而留於所在地方調治者若俟其痊愈時附入後隊前往度亦不能責其勞苦出力現在各路官兵尅期齊集固不需此數人也著傳諭陳𢎞謀及沿途督撫等如兵丁中有出痘者俱即留於各該處上𦂳調治俟其痊愈時資送來京交與兵部送囘其現在業經䕶送前進者亦即一體留養毋令力疾行走如有因疾身故者亦加恩料理遺骼令歸故土以副朕體恤士卒之至意壬子諭將軍班第等籌辦安插包沁人等事宜上諭軍機大臣曰朕於阿克珠勒等入覲已授為總管等職又命瑪木特兼管包沁因彼係準噶爾舊人現授為内大臣命彼監收包沁人等貢賦轉行交納并管理一切事務非謂令伊管轄便係屬下為伊納貢也前已諭知班第等令阿睦爾撒納奏稱將包沁之得木齊與扎哈沁之得木齊調遣安置之處雖百端開示不免疑懼看來包沁人風敎各異若令别部人兼管或轉無益著班第等曉諭包沁人等伊等若願移往西路與吐魯番囘子同住則既離北路即無庸瑪木特兼管今西路額敏和卓之囘子亦移至吐魯番即著額敏和卓兼管亦可倘願居舊處則仍令瑪木特兼管阿睦爾撒納既熟悉包沁人情可同班第詳細商酌妥辦甲寅諭厄魯特副都統職銜達什敦多卜帶兵先進事宜定北將軍班第等奏言臣等接奉正月十八日諭旨後厄魯特副都統職銜達什敦多卜亦至軍營臣阿睦爾撒納細問達什敦多卜所言皆係伊被獲以前情形至包沁投降後噶勒雜特游牧情形若何及哈薩克錫喇都噶爾等現在何處俱未深曉查臣等遵旨挑選兵丁一千令達什敦多卜帶領先進現在所派厄魯特兵尚未到營若即令達什敦多卜起程徑至阿爾台離臣等大兵啟行之期尚遠彼此不能接應雖伊兄都噶爾在彼達什敦多卜一到自可降服但人心難測且住居都噶爾游牧之索和爾車凌係哈薩克錫喇之妻父適都噶爾等議欲來降伊尚攔阻達什敦多卜孤軍深入後兵不至恐於事未必有益現在臣等所領哨探兵起程日期已近臣等公議令達什敦多卜䇿同圖倫楚察達克等往齊齊克淖爾守候於哨探兵起程前二三日再令前往阿爾台務於大兵未進之前拏獲巴朗臣等隨即繼進以為應援斷不敢遲疑觀望貽悞軍機奏入上諭軍機大臣曰班第等奏達什敦多卜等於哨探兵起程前二三日前往甚屬妥協但達什敦多卜起程太早則大兵不能接續未為盡善倘其相隔甚近則兩隊竟為一隊亦恐無益著達什敦多卜等必在阿睦爾撒納等前期三四日起程為善可即傳諭班第阿睦爾撒納等知之又諭將軍班第曰朕前命達什敦多卜先往之旨原令阿睦爾撒納速即囘奏乃阿睦爾撒納於二十二日接諭而二十三日奏事竟未言及至二十四日班第到軍營始行具奏或阿睦爾撒納不願達什敦多卜前往故稍為徘徊俟班第到時方定主見抑或更有他故著班第密行具奏定北將軍班第等疏奏新編烏梁海人等旗分佐領事宜班第等奏言據青滾雜卜等文稱新收烏梁海人等應編旗分佐領隨查各總管屬下户口多寡不齊若勻配分旗勢不免於離析是以將察達克屬下四十六户編為一佐領作鑲黄旗其在都塔齊處之恩克錫克等十八戸俟移來時即附入此佐領下赤倫屬下二百五户編為三佐領作正黄旗車根屬下六十七戸編為一佐領作正白旗原係宰桑雅爾都屬下之一百三十五户編為兩佐領即附入鑲黄旗從前散失人等如有陸續投來者各入本佐領下令其家室完聚嗣後如有帶領大衆來降之烏梁海宰桑各以次添設旗分編定佐領此次所編七佐領下應補放佐領各一員得木齊各一員收楞額各一名俱著各該總管保送臣等驗看補放隨剴切曉諭爾等荷䝉聖主洪恩賞賜官爵輕減差徭務各節儉謀生謹愼奉法毋得稍有怠玩奏入報聞諭將軍班第留心密察阿睦爾撒納上諭軍機大臣曰阿睦爾撒納前奏請移伊游牧地方朕已允行其請給印文招降輝特台吉一事不無欲取多人占據地方之意是以不准所請因思從前唐喀祿奏請班珠爾等有事定之後封阿睦爾撒納為汗之語似專封阿睦爾撒納一人統轄準噶爾地方者隨命班第留心辦理并將事定後封阿睦爾撒納為輝特汗其餘三姓亦封為汗之處時為宣露俾其妄念可除今乃更請印文㑹合伊從前分散屬下人等則其意更顯然阿睦爾撒納本有併吞準噶爾之意今若令伊收合舊日人衆則我兵全為伊集事矣班第接旨後應於無意中道破令彼瞿然知悟從此斂跡則已倘或妄念日生則薩喇爾瑪木特等均非其匹敵班第或能制之但阿睦爾撒納已帶領哨探兵前往班第若不隨後進發則於事恐有未便朕昨命班第選兵三千帶領前往倘一時不能齊集則先選一二千兵亦必於阿睦爾撒納隊後即行前進倘阿睦爾撒納稍露形迹班第係統領將軍即以便宜從事前此本欲諭知恐為阿睦爾撒納知覺此際彼已進兵故特密諭惟班第留心酌辦愼勿洩漏又奉上諭曰朕前諭班第令兩路兵至博羅塔拉相機深入不必彼此等候乃阿睦爾撒納但云於十二日帶兵起程並未奏及到博羅塔拉後或乘勢即進或候西路兵同進殊屬含糊兩路究竟必須㑹合與否著班第速即奏聞至北路之兵原定十五日起程今已改於十二日較前已早三日則西路亦應於二十八日前數日方妥並著傳諭薩喇爾酌奪具奏平定準噶爾方略正編卷六
