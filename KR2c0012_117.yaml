body:
  text: 乾隆二十三年冬十月癸亥申諭定邊將軍兆惠辦理回部事宜上諭軍機大臣曰兆惠奏稱伯克霍集斯將烏什所屬之布魯特頭目噶第喚至軍營據告稱從前霍集占領衆三千經過隨行人等俱甚困憊有毁棄軍器宰殺馬駝者怨聲載道等語賊黨俱已離心大功自可立奏至從賊人內有霍集斯之兄姪此時若自拔來歸應加恩賞即或後時降附亦為寬貸惟阿卜都克勒木斷不可宥至前諭庫車阿克蘇等處分兵駐劄原為護視回人起見並無勞敝伊等之處恐風聞妄生疑懼可𫝊諭兆惠等務宜明白曉示再此兩處駐防有無裨益或暫行一二年或可埀之永久俱著悉心籌畫其屯戍貢賦等事亦即酌定仍遵㫖來京交納穆扎爾等辦理甲子以預備軍營馬匹及移駐官兵等事諭定邊將軍兆惠等上諭軍機大臣曰兆惠等軍營馬匹俱長途跋涉若功成奏凱乘騎疲乏於回衆觀瞻非體已𫝊諭阿里衮永貴在巴里坤牧養馬內挑選二千匹送至庫車備兆惠等行文調取亦使回人知我兵力若非迎降相繼自必陸續調撥斷不中止至所派官兵駐防庫車阿克蘇等處仍遵前㫖惟伊犂駐防兵二千塔爾巴噶台一千此時且不必前往或就近在吐魯番闢展或巴里坤過冬俟來年再行進發既便於糧運而官兵亦得少為休息併傳諭黃廷桂知之又諭曰昨據兆惠奏稱伊等度阿勒坦呼斯坦嶺時官兵有中滚石身死者又伊犂河水漲時騎牽馬駝浮渡亦有溺斃數人等語官兵急公殞命深屬可憫著照陳亡例議敘此次兆惠所領官兵行走殊屬奮勉從前議照進兵例減半賞給著加恩給以全賞即將大臣侍衛官員等職名開列具奏命副都統范時綬前往屯田處協同定長辦事丙寅諭參贊大臣巴祿等議敘搜勦逸賊官兵仍另派索倫兵勦賊上諭軍機大臣曰巴祿奏稱領兵分路搜勦嗎哈沁等至扎木巴拉布拉克之源探有賊踪署筆帖式四逹色奮勇衝擊勦殺五十餘人計陳亡兵三名得傷兵二名又喀喇沁參領賽圖於圖爾根察罕烏蘇勦賊四十餘人計陳亡官一員兵六名得傷兵十名察哈爾護軍錫喇卜現未回營覓尸無獲等語此二次搜勦嗎哈沁陳亡得傷官兵俱著交部議恤議敘四逹色原係健鋭營前鋒著加恩授為護軍校遇缺即補其賽圖等效力官兵俱著造冊送部議敘仍𫝊諭巴祿伊所領兵丁久應更換若未能即殱逸賊可回抵烏魯木齊照富德兵丁例賞給遣回現在辦理回部將竣新派索倫兵尚未效力巴祿即選派五百名每人給馬三匹裹糧前往凡藏匿之嗎哈沁及哈丹阿巴噶斯餘賊盡行搜捕勦除併𫝊諭永貴阿里衮知之戊辰諭定邉將軍兆惠等㑹同進兵事宜上諭軍機大臣曰兆惠奏稱從卡倫擒獲回人等據供霍集占將多倫回衆移往葉爾羌等處隨將橋道燒燬伊等逃至舊地掘埋藏糧食以度日等語當此冬寒水涸時橋梁雖毁我兵或浮渡或拴筏無不可者兆惠宜努力前行乘回衆離心渠魁目當就縛昨已促富德前往㑹合兆惠惟酌量行文調取至回人多有窖藏糧食者軍行所至須留心誘詰以資接濟又所奏巴爾楚克為葉爾羌喀什噶爾要路恐兵抵葉爾羌後賊衆乘隙擾我臺站已留兵駐防等語富德須沿途訪問若兆惠尚未成功即由巴爾楚克領兵攻取喀什噶爾俾賊見兩路有兵自然瓦解成功愈速矣俱著𫝊諭知之諭大學士管陜甘總督黃廷桂酌派屯田差遣官兵上諭軍機大臣曰據永貴奏行文黃廷桂派參將遊擊等官二三員千把總等官四五員以備差委并酌派應差兵役二三百名又闢展同知伊星阿一人管理收支等事未免竭蹶請添派諳習糧務同知二員雜職二員協辦等語屯田伊始差務頗繁所需官員自不可少至聽差兵役等則現在屯田兵丁未必日事耕作自可通融調換何必多為添派可𫝊諭黃廷桂永貴所需文武官員照數發往再派兵一百名以備差遣命升賞署章京逹爾扎桑等上諭軍機大臣曰永貴奏喀喇沁臺站署章京逹爾扎桑隨兆惠西路出兵奉委巡查臺站節次勦殺嗎哈沁頗屬奮勉等語逹爾扎桑著加恩授為藍翎侍衛伊招降之厄魯特收楞額巴泰亦著有勞績又屯田副將張兆潘署把總戴謹等拏獲逃兵馬順正法俱著永貴酌量賞給以示鼓勵己巳諭大學士管陜甘總督黃廷桂等酌辦伊犂屯田事宜上諭軍機大臣曰閲黃廷桂所奏伊犂屯田一摺未免有竭蹶從事情形如請將駐防官兵及烏魯木齊屯田兵丁於今冬由哈密起程前往方可無誤春耕等語果能如此自屬有益倘實難猝辦則隨時籌畫朕亦必不以從事稍緩遽加督責但不得因此遂生作輟之意耳現在烏魯木齊屯田漸廣所獲穀石酌量運送伊犂接濟可省甘肅給密等處轉運之煩黃廷桂惟辦給烏魯木齊屯田籽種其伊犂屯田則從回部凱旋緑旗兵丁自可留用此外或酌派回人同往庶人不勞而事易集墾得一畝即收一畝之用總之辦理屯務惟在該管大臣相度事勢次第辦理如烏魯木齊人力有餘自可量為抽調或不足亦不必勉强前諭所云由近及逺意正在此無取過為周章也又諭曰黃廷桂籌議伊犁屯田之奏辦理甚覺周章已諭令隨時酌量不必竭蹶從事矣但伊犂現議駐兵兆惠納穆扎爾等辦理回部事竣即可調緑旗兵及回人等酌量派出籽種前往伊犂耕作以濟軍食即籽種無多亦就其足敷應用者施功若仍未能設措亦不必拘泥可𫝊諭伊等令其作速奏聞命厄魯特侍衛碩通在參贊大臣阿桂隊內行走上諭軍機大臣曰阿桂奏稱厄魯特侍衛碩通在軍營殊屬奮勉今仍懇隨往西路等語著准其所請碩通既於布延圖候與妻子相見可𫝊諭扎隆阿將伊妻子查出酌量辦給資裝發往察哈爾居住伊安插家屬後仍即來京再赴阿桂隊內行走西路現無急應前往之事該總管等亦不必過於催迫併𫝊諭知之命侍衛奎薩等撤回本處休息上諭軍機大臣曰西路所有舊兵現俱更換隨阿桂前來之侍衛奎薩索倫兵亨申禪新俱久在軍前行走著賞銀各二十兩馳驛回至本處休息仍𫝊諭綽爾多遇有驍騎校缺出即將亨申禪新補用辛未諭參贊大臣富德酌量策應兆惠巴祿等上諭軍機大臣曰據富德奏稱奉到前往阿克蘇諭㫖即領兵速進一抵烏魯木齊先選健兵數百名策應兆惠餘兵及後隊疲乏者行文永貴辦給馬匹口糧陸續進發等語現届寒冬氷雪之時自不便由穆素爾嶺行走即從烏魯木齊取道亦可但前諭云若兆惠大功已成富德即來京現在𫝊聞阿巴噶斯哈丹餘賊回博洛和羅藏匿若領兵掩襲自可盡殱已𫝊諭巴祿於新到兵丁內酌派五百名前往搜捕富德若得兆惠成功之信亦酌派新兵策應巴祿事竣即可回京不過紆回一兩月程期其舊兵交與永貴等沿途辦給資裝各回本處富德其悉心奮勉勿以伊母為念朕適從圓明園進宫伊母迎駕甚屬康健曾加恩賜併著𫝊諭知之參贊大臣富德疏奏查獲叛賊吞圖布首級梟示富德奏言臣於九月初三日領兵至扎哈喀喇烏蘇擒獲布庫努特之塞塔爾等據供去年隨吞圖布逃走與同行六人謀殺吞圖布欲投大兵適遇巴圖爾烏巴什之游騎即將吞圖布首級裏以馬皮埋於中察罕烏蘇後巴圖爾烏巴什欲殺我等我乘間脫逃等語隨派侍衛額爾登額帶塞塔爾等前往照所指之地掘出頭骨一具係馬皮包裏即於衝要路口樹上懸牌梟示仍將塞塔爾送往巴里坤以備詢問奏入報聞壬申申諭定邉將軍兆惠等分辦屯田事務上諭軍機大臣曰適因黃廷桂咨商兆惠永貴辦理屯田朕已諭令專辦烏魯木齊籽種其伊犂屯田事務交與兆惠等於回部酌派籽種農器運往矣伊犂屯田原為駐防兵丁糧餉起見伊等乘騎馬匹稍為休息自可助耕如有不足則輔以人力但回人甫經平定派出籽種時或即抵應納之貢賦至農器則給以官價若仍有未便亦從容籌畫不可勉强從事癸酉定邉左副將軍成衮扎布疏奏擒獲逃犯和里木成衮扎布奏言前因安插呼倫貝爾之明噶特得木齊和里木等脫逃隨派奬賞孔雀翎托爾蘇岱等領兵追捕臣復領兵親往十月初二日據參贊大臣莽古賚等報稱總管莽噶拉克之子扎巴罕等於九月三十日在伊勒登鄂嶽克將和里木擒獲初四日解至軍營據供因口糧斷絶起意往阿爾台鳥梁海處就食帶男婦十六口同逃沿途有兵追捕俱以行術致雨迷踪得脫并拏獲所遇人等訪問馬羣處所偷竊更換沿途殺害多人惟導引者仍行釋放行至努肯穆倫遇莽噶拉克之子領數人追捕是時同行只餘四人俱已投降遂被擒置馬上中途縛解逃匿山谷旋思無地可往遂就擒獲等語謹將和里木嚴加看守派藍翎侍衛素魯克沁等押解送亰其奮勉擒賊係莽噶拉克之子扎巴罕哈克圖之子巴雅爾圖及其從弟瑪爾扎克章亰索濟克烏巴等俱酌賞縀匹效力兵丁二十七名各賞給布茶煙草奏入上諭軍機大臣曰成衮扎布此次追捕逃犯和里木等甚合機宜素魯克沁托爾蘇岱俱授為三等侍衛扎巴罕巴雅爾圖著賞戴孔雀翎加賞縀二端索濟克烏巴瑪爾扎克亦加賞縀二端效力兵丁等加賞銀各五兩仍以恩㫖𫝊諭伊等俾知鼓勵乙亥飭諭提督豆斌前赴兆惠軍營上諭軍機大臣曰豆斌巡查臺站搜捕餘賊已踰一載前後所報拏獲嗎哈沁不過一二無關輕重之人即如所奏特伯爾古臺站既有厄魯特盜馬之事乃並不親身查辦僅委侍衛五恰守備馬守全等前往搜緝甚屬無能豆斌著遵照前㫖即速前往軍營帶領緑旗官兵聽將軍兆惠調遣丙子命哈密辦事巡撫吳逹善等各回本任上諭軍機大臣曰前因哈密有健鋭營官兵經過及運送糧餉等事命吳逹善德舒等前往辦理德舒於官兵經過後即隨往庫車辦事今官兵既已經過而糧餉亦皆運送德舒即遵㫖前往庫車吳逹善著回原任五吉前往巴里坤隨阿里衮辦事其哈密事務仍令巴里坤大臣等兼管丁丒諭巴里坤辦事副都統阿里衮將厄魯特降人巴泰等送亰上諭軍機大臣曰永貴奏稱喀喇沁署章京逹爾扎桑招降厄魯特巴泰巴魯及伊等妻子俟送至巴里坤時照例辦理等語巴泰等降附後隨逹爾扎桑搜捕嗎哈沁效力行走伊等至巴里坤時著阿里衮酌量資給送亰己卯命議叙送馬官兵及量賠倒斃牛隻上諭軍機大臣曰扎拉豐阿等奏稱護送軍需馬牛羊隻至巴里坤查得商都逹卜遜淖爾等牧羣送馬六千匹全數交收上駟院所送馬匹及牧羣羊隻雖有倒斃不及原定一成之數惟牧羣所送牛六千三百隻染疫倒斃踰額一千五百九十有竒應著落解送官兵賠補等語此項解送軍需馬匹羊隻或全數無虧或倒斃不及分數牧羣官兵殊屬勤慎著查明議敘至倒斃牛隻踰額雖云染疫究係牧養疏忽自應照所奏賠補但獲咎尚屬有因著加恩作為二成准其銷算其餘應賠牛隻無多事關軍需未便概行豁免著寬限三年令副牧長額林沁等及牧羣兵丁分賠完項似此從寬辦理特念伊等效力行走之故可𫝊諭知之命吐魯番公素賚璊回游牧休息上諭軍機大臣曰前因臺路未清派素賚璊領回兵巡查搜捕今已派敏珠爾等前往則回兵可以不需可𫝊諭永貴即令素賚璊領兵回伊游牧伊等往來頗久仍酌量賞給俾得專治耕作之事辛巳辦理屯田侍郎永貴等疏奏秋收分數永貴等奏言本年闢展等五處屯田兵三千六百名今届收穫之期看得地有肥磽榖分豐歉米麥合算通計實屯田三萬三千五百四十五畝每畝收獲一石九斗至一石四斗不等共收榖三萬七千三百四十餘石以去年每畝一石四斗計之增出五升至三斗六升不等共多收六千七十餘石所收穀石次年自闢展至哈喇沙爾烏魯木齊新舊兵丁又烏魯木齊附近額林哈畢爾噶羅克倫昌吉至西托摩楚克等處新兵共需籽種一千五百二十石餘穀三萬五千八百二十六石碾米一萬七千九百十三石共敷官兵跟役九千一百九十人口糧七個月有竒其不足之數次年所種小麥青稞六月內即可收穫以資接濟奏入上諭軍機大臣曰永貴等所奏闢展等處屯田收穫分數看來祗敷屯兵口糧其伊犂駐防官兵仍需籌畫可𫝊諭兆惠遵照節次諭㫖辦理至從前屢諭永貴等確查收成分數除新舊屯田兵丁外尚足敷幾千人之食伊等遲久方奏微覺難於籌辦不思內地農民何以畝有餘糧蓋由家長善於勸課且食用撙節毫無欺隱耳兵民雖異其理則同永貴其悉心經畫於軍需自有裨益壬午申飭提督豆斌上諭軍機大臣曰豆斌奏稱派員從北山一帶巡查賊人踪跡於西大山溝內搜得馬匹行至山嶺天降大雪無處尋覓等語所奏甚屬謬誕搜捕逸賊係豆斌專責既得被搶之馬即此便是賊踪急宜盡力追襲雖遇大雪賊又豈能飛行絶跡乃稱跋涉瞭望全無影響是必待賊人自來束手就縛耶向來緑旗惡習專以欺謊文其選愞豆斌受任以來申飭不啻再三總未見努力辦理一事即如奏內情形是賊既窮蹙而猶致令逺揚其自述無能之狀可謂曲盡矣可見此事不應付之若輩也豆斌著𫝊㫖嚴行申飭癸未諭黑龍江將軍綽爾多酌辦明噶特等戶口上諭軍機大臣曰據擒獲逃犯和里木供稱伊所屬九十餘人除無食餓斃及賣身與人外尚有七十餘人伊母妻亦在內等語著𫝊諭綽爾多查明和里木母妻及同逃人等家口若分賞官兵即嚴加管束如未賞即解送來亰給與王大臣等為奴至所供逃走之二十餘人外尚有四十餘人若忍饑待死殊屬可憫宜酌量施恩稍為賑濟仍曉示伊等因其不敢妄動故蒙恩恤若似和里木逃走早已正法嗣後各謀生理安分度日稍可自給即無庸縻費十一月甲申朔上駐蹕南苑右部哈薩克使臣卓蘭等來朝賜宴命扈從王公大臣等與宴索倫奬賞藍翎林保厄魯特奬賞藍翎齊里克齊以護送哈薩克使臣來亰俱授為三等侍衛乙酉諭辦理屯田侍郎永貴等巡查闢展至阿克蘇臺站上諭軍機大臣曰永貴等奏稱健鋭營索倫等兵於十月二十等日經過闢展等語新兵既已經過屯榖亦皆收穫惟兆惠軍前奏報二旬未到或因臺站稍有羈遲可𫝊諭永貴揀派兵丁由闢展至哈喇沙爾庫車阿克蘇一路稽察臺站中途遇有軍營捷音作速馳奏仍即轉回侍衛蒙古勒岱解送逆賊阿睦爾撤納之姪伊什扎卜至亰命免其緣坐仍隨嗒什罕使臣回給與買主并賞伊主縀一端辦理屯田侍郎永貴等疏奏預備穆壘等處屯田事宜永貴等奏言來年自額林哈畢爾噶之穆壘羅克倫昌吉等處屯田要在先興水利水之多寡又視泉源之髙下强弱本年托克三哈喇沙爾二處因無熟悉水利之人殊費經畫查穆壘至庫爾竒勒十六處俱係努三等率道員薩瀚原任道員成德詳勘來春屯田兵丁耕作時請派出一員前往指示又舊居穆壘等處今賞給肅州一帶官兵之厄魯特等有能識泉源者請揀發數人以備差遣更有裨益至屯田八百餘里用兵萬人收支所穫榖石請揀發同知通判二員雜職四員分司出入仍以原任布政司拖穆齊圖兼管又闢展等處文移多兼䝉古字理藩院署主事察喜納頗屬諳練請以辦理行文事件仍於西安凉州等處送馬官兵內酌留十數名繕寫清文其書山滿泰舒景阿等到日即遵㫖分地駐劄辦理奏入報聞戊子上於南苑大閲八旗官兵哈薩克使臣卓蘭等皆從觀定邉將軍兆惠等疏奏進兵葉爾羌情形兆惠等奏言臣等領兵向葉爾羌進發十月初三日至輝齊阿里克離城四十里派侍衛璊綽爾圖領兵哨探夤夜紆道潛至城下擒賊卡倫入城取糧回人一名卡倫人來奪見發矢逃走城內有二三百騎衝出亦不敢逺追臣等詳加詢問據供名們都拜係布魯特人生長伊犂備陳阿克蘇烏什投誠後霍集占領回衆三千入喀什噶爾城一宿駐雅普爾噶四日聞波羅泥都深怨霍集占妄動定約各守一城相為聲援波羅泥都領馬步萬餘人於離喀什噶爾城一站之當噶勒齊駐劄霍集占移村莊回衆糧草入葉爾羌城令舍勒默特摩羅噶里卜領衆五十人於布爾吉博斯屯安設卡倫又訊以現在城內兵馬若干霍集占信任何人衆心何如曽往喀什噶爾通信否又葉爾羌之伯克阿卜都瓜卜何在據供城內厄魯特布魯特伊犂回人有馬者五千餘名步行人甚多與霍集占相結者伯克阿卜都克勒木阿卜都哈里克呢雅斯索丕阿什噶伊朗和里布坤等數人餘皆含怨霍集占詭衆云大兵盡勦回人伯克霍集斯已被殺至霍集占曾否通信伊兄實未聞知但伊既收沙雅爾人口牲隻又將阿卜都瓜卜及其子弟俱籍沒監禁又烏什賽里木移來回衆三百餘口殺害已經六日等語臣等兵臨城下未見賊衆迎敵或避我之鋭固守待援即應近城攻取但此城較庫車甚大四面共十二門所領馬步兵四千餘祇足圍其一面且自烏什前來行戈壁一千五百里馬一千餘匹甚屬疲乏若圍城則兵力單弱賊將衝突逃走計賊若逃走惟向南路之痕都斯坦拔逹克山喀喇土伯特等處擬於此等要隘駐兵堵截臣等仍領兵攻擊誘賊出戰又分遣兵馬搜括村莊發掘窖粟及山谷牛羊斷其芻牧樵採伊等自生內變至兵丁馬匹均須接濟所有駐劄庫車賽里木拜等處緑旗兵丁應請調赴軍前併送馬三千匹但巴里坤等處程期兩月有餘長途必致疲之請於馬匹至阿克蘇時令舒赫德驗看若不能前進即存留牧放俟草青時解送方為有濟奏入上諭軍機大臣曰兆惠等章奏日久未來朕深為厪念今據奏兵抵葉爾羌情形賊衆暫未出戰而我兵馬以逺行疲乏朕亦深悉勿以未即攻克致生急遽惟加意偵探多方誘致以協機宜波羅泥都既怨霍集占自應持原降敕書往諭至霍集占以伯克霍集斯被殺飭詞惑衆亦應明白曉示或令回衆等目覩又如斷其樵汲擾其村落皆屬善䇿所奏解送馬匹亦𫝊諭駐劄辦事之大臣侍衛等矣再索倫察哈爾等兵已過闢展兆惠之盡調緑旗兵因未得信息耳至賊人可逃之路宜嚴為堵截倘其北走則無地可逃必就俘獲兆惠等宜奮勉辦理併傳諭富德速往䇿應己丑命辦理屯田侍郎永貴暫駐阿克蘇上諭軍機大臣曰昨兆惠以兵扺葉爾羌急需馬匹接濟已傳諭舒赫德查照軍營咨文辦理矣可傳諭永貴伊現在巡查臺站前至阿克蘇時即行暫駐同舒赫德辦理一切運送馬匹糧餉事務巴里坤辦事副都統阿里衮疏奏親解馬匹前赴軍營阿里兖奏言十月二十五日准兆惠咨送奏稿內稱軍營兵丁雖有四千餘名但馬匹不足若再得三千匹方有裨益等語臣昨奉諭㫖預備軍營凱旋馬二千匹送至闢展聽候調撥已遣存泰前往哈密催辦今兆惠奏取馬匹關係緊要務宜妥速送往若委之官兵恐有遲誤臣䝉皇上天恩進兵數次於地方形勢水草有無尚識大概臣即赴哈密同吳逹善等將內地送到馬匹除先行挑選二千外再選一千匹仍酌備餘馬親身帶領俟到闢展與永貴等商議催督照看又兆惠咨行永貴取駝七百隻臣慮運糧之駝不無疲之併於哈密挑選帶往因係軍營要務臣一面具奏即行起程奏入上諭軍機大臣曰據阿里衮奏准兆惠咨調馬三千匹即往哈密酌量多為挑選親身送至軍營等語所辦甚合機宜馬匹固應趕送而沿途亦須加意牧放不致疲乏送至軍營時如尚未成功阿里衮著以參贊大臣行走現在巴里坤辦事著吳逹善署理俟阿里衮事竣轉回仍回甘肅巡撫任諭大學士管陜甘總督黃廷桂等運送軍營糧餉上諭軍機大臣曰從前兆惠以回地可得口糧行文巴里坤等處駐劄大臣而各處所送糧餉亦已敷用是以諭令暫行停止今兆惠兵扺葉爾羌一切尚須辦理糧餉所關最要不妨稍為寬裕已諭永貴阿里衮等酌量運送可𫝊諭黃廷桂吳逹善照常籌辦申諭定邉將軍兆惠取城擒賊事宜上諭軍機大臣曰昨覽兆惠奏頗望送馬接濟即諭永貴舒赫德等加意辦理今日阿里兖奏親送軍營馬匹則程期自必迅速可𫝊諭兆惠勿以為念此時但當籌畫取城擒獲渠魁毋使逃逸至霍集占將阿卜都瓜卜等拘禁可見霍集斯從前降附之心甚誠著兆惠𫝊㫖撫慰仍加恩賞縀六端軍營一切事宜向伊商辦以收其用又運送糧餉亦已諭知黃廷桂吳逹善等諸事有備即目前不能奏效來春辦理亦覺易為仍將現在情形作速奏聞諭參贊大臣富德等令副都統巴圖濟爾噶爾留捕逸賊上諭軍機大臣曰昨諭富德䇿應兆惠但搜捕厄魯特逸賊亦不可疏懈已圖濟爾噶爾原在富德隊中不必隨往葉爾羌即同巴祿領兵搜捕哈丹阿巴噶斯餘賊及沿途所遇嗎哈沁等凡奏事行文列名於次不必受巴祿節制巴祿與巴圖濟爾噶爾當和衷協力以期集事若能盡勦餘孽併獲哈薩克錫喇則真伊二人之福也庚寅諭參贊大臣富德分别留遣本隊官兵上諭軍機大臣曰富德奏稱本隊官兵在軍前年久者遵㫖遣回游牧其未及二年者或留或遣又有補授藍翎侍衛之索倫五員亦未便照年久兵丁之例俱請㫖遵行等語所奏年久官兵即著遣回游牧其年分尚淺及已授侍衛等人員仍留軍前隨富德行走俟凱旋撒兵時各隊官兵或應留用或應遣回游牧再為分别酌定命總兵楊寧馳驛前赴軍營分管緑旗兵丁辛卯三等侍衛䝉郭勒岱驍騎校署參領赫善以招撫右部哈薩克護送使臣等至亰授蒙郭勒岱為二等侍衛赫善為本旗佐領遇缺即補壬辰諭大學士管陜甘總督黃廷桂籌辦馬駝事宜上諭軍機大臣曰黃廷桂所奏馬匹駝隻二摺所見正與朕意相合看來阿克蘇等處回城業經歸附若能即取葉爾羌則此項馬駝特為預備伊犂屯田之用固無庸急遽辦理即軍營尚須接濟而兆惠咨到時亦當在來春正二月間青草漸生自可從容運送庶臕分不致頓減不必於冬間趲辦一切總候兆惠來咨隨時應付為妥併將原奏録寄兆惠閲看甲午諭副都統職銜定長總辦屯田事務上諭軍機大臣曰近因阿克蘇辦事需人已命永貴前往計此時巳得㫖起程其闢展等處屯田事務著定長總辦丙申申諭參贊大臣富德等䇿應兆惠事宜上諭軍機大臣曰富德見兆惠調取馬匹之咨隨行文永貴等於新派四千兵內先到之索倫一千名暫行駐候將健鋭營察哈爾兵丁乘騎之馬揀選三千匹交照看索倫兵大臣等送至阿克蘇伊仍帶舊兵之有馬者二千人過巴爾渾嶺徑攻喀什噶爾富德籌辦機宜頗屬盡心竭力但阿里衮業經送馬起程新兵亦過闢展富德仍遵㫖趲行與兆惠㑹合攻克葉爾羌再取喀什噶爾亦可至運送糧餉長途頗屬不易前諭永貴舒赫德等或於阿克蘇等處回人取用給以價值事若可行即寬裕預備又諭曰富德將副都統鄂博什瑚爾起等懇請隨往回部之處陳奏伊等及索倫官兵效力西路有年今既新派官兵毋庸前往仍著鄂博什瑚爾起帶領各回游牧命賞擒勦嗎哈沁之護軍統領努三等官兵上諭軍機大臣曰努三等奏稱偵知博羅托海有嗎哈沁賊衆藏匿蘆葦中即領官兵往勦巴圖魯侍衛老格自䇿布登扎布隊內前來即領兵協助擒獲賊衆收取馬匹等語伊等此次行走殊屬效力努三著賞縀三端永德老格賞縀各二端索倫署營總固寧保署參領阿卜逹察署防禦綽勒頗勒圖原任協領革職效力之扎庫齊察哈爾署驍騎校布顔圖厄魯特嚮導巴桑賞縀各一端其隨往兵丁各賞一月錢糧軍機大臣疏奏安插軍營送亰之厄魯特等軍機大臣奏言副將軍䇿布登扎布派員將布庫察罕之子特克庫本諾雅特台吉衮布之子庫勒爾德孫阿格拉克由巴里坤送亰查布庫察罕業經正法伊子年甫七嵗應請賞給王大臣等又查將軍兆惠等將兖布之子舒倫哈什哈庫勒爾德作為嚮導頗屬效力舒倫哈什哈於前次送亰奉㫖授為三等侍衛賞銀五十兩在亰居住庫勒爾德留於䇿布登扎布軍營效力今於送特克之便來亰應令與伊兄同居其酌量加恩之處請㫖遵行奏入得㫖庫勒爾德著授為三等侍衛賞銀五十兩特克著賞給傅恆平定準噶爾方略正編卷六十三
